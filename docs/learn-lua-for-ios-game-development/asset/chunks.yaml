    \ 5x5 的棋盘，可以存放棋子。让我们用一些物品（即非零数字）来填充棋盘。\n\n```\nlocal board = {} -- 注意，这只是一个一维数组\n\
    local i,j\nlocal boardW, boardH = 5,5     -- 一个 5x5 的棋盘\nfor i = 1,boardH do\n\
    \    board[i] = {}        -- 现在为数组创建第二个维度\n    for j = 1,boardW do\n        board[i][j]\
    \ = 0  -- 初始化为空，即 0\n    end\nend\nfor i = 1,7 do -- 让我们在 25 个格子中随机放置 7 个物品\n\
    \    local xCo, yCo = math.random(1,boardW), math.random(1,boardH)\n    board[yCo][xCo]\
    \ = 1\nend\nfor i = 1,boardH do\n    for j = 1,boardW do\n        print(i, j,\
    \ board[i][j])\n    end\nend\n```\n\n我们可以看到哪些格子被随机填充了。\n\n蛇梯棋\n"
- fmt: "你非常可能在小时候玩过这个游戏。它由一个 10×10 的方格棋盘组成，棋盘上画着一些梯子和一些蛇。你掷骰子，并移动所掷点数对应的格子数。如果你落在有梯子顶端的格子上，你会移动到梯子底端的格子；如果你落在有蛇的格子上，你会移动到蛇尾的位置（见图\
    \ [4-1](#9781430246626_Ch04.xhtml#Fig1) 和 [4-2](#9781430246626_Ch04.xhtml#Fig2)）。\n\
    \n![9781430246626_Fig04-01.jpg](OEBPS/Images/9781430246626_Fig04-01.jpg)\n\n[Figure\
    \ 4-1](#9781430246626_Ch04.xhtml#_Fig1). Snakes and Ladders\n\n![9781430246626_Fig04-02.jpg](OEBPS/Images/9781430246626_Fig04-02.jpg)\n\
    \n[Figure 4-2](#9781430246626_Ch04.xhtml#_Fig2). The Snakes and Ladders board\n\
    \n接下来，我们将尝试自己编写一个“蛇与梯子”的版本。请注意，我们目前还没有使用框架，所以屏幕上无法显示太多内容。稍后引入框架时，我们会将这个想法与它们整合。现在，我们先专注于游戏背后的逻辑，并首先使用\
    \ Lua 来实现它。\n\n## 哪里有蛇？哪里有梯子？\n\n我们以图 [4-3](#9781430246626_Ch04.xhtml#Fig3) 所示的棋盘作为游戏的起点。\n\
    \n![9781430246626_Fig04-03.jpg](OEBPS/Images/9781430246626_Fig04-03.jpg)\n\n[Figure\
    \ 4-3](#9781430246626_Ch04.xhtml#_Fig3). The board of Snakes and Ladders game\n\
    \n棋盘上有六条蛇和五架梯子。梯子位于以下位置（从底部到顶部）：\n\n*   起点 58，终点 20\n*   起点 68，终点 47\n*   起点 76，终点\
    \ 55\n*   起点 90，终点 69\n*   起点 97，终点 78\n\n蛇位于以下位置（从前往后）：\n\n*   蛇头 22，蛇尾 5\n*\
    \   蛇头 35，蛇尾 12\n*   蛇头 51，蛇尾 34\n*   蛇头 80，蛇尾 57\n*   蛇头 89，蛇尾 66\n*   蛇头 99，蛇尾\
    \ 76\n\n## 关于棋盘的一些事实\n\n棋盘从 1 到 100 编号，采用蛇形排列：前十个数从左到右，接下来十个数从右到左，再下一组又从左到右，以此类推。\n\
    \n玩家可以在任何格子上，当他们到达第 100 格时，就赢得了游戏。这个游戏可以由多名玩家一起玩，并且多个玩家可以停留在同一个格子上。\n\n## 将其转换为代码\n\
    \n我们可以将棋盘设置成一个类，用来保存蛇和梯子的信息，就像前面代码中我们随机向棋盘存储一个值那样。不过，现在我们把这个信息存储在一个数组中。这个表中的每条记录都有两个字段：`start`（起点）和\
    \ `end`（终点）。\n\n```lua\nlocal tableSquares = {\n{startPos = 20, endPos = 58},\n\
    {startPos = 47, endPos = 68},\n{startPos = 55, endPos = 76},\n{startPos = 69,\
    \ endPos = 90},\n{startPos = 78, endPos = 97},\n{startPos = 22, endPos = 5},\n\
    {startPos = 35, endPos = 12},\n{startPos = 51, endPos = 34},\n{startPos = 80,\
    \ endPos = 57},\n{startPos = 89, endPos = 66},\n{startPos = 99, endPos = 76},\n\
    }\n```\n\n我们还需要一个数组来保存玩家的位置，所以我们创建了一个数组：\n\n```lua\nlocal players = {}\nlocal\
    \ playersInGame = 0\nlocal playersTurn = 1\n```\n\n由于这是一个数组，我们可以通过简单地插入记录到表中来添加任意数量的玩家。让我们创建一个函数来添加新玩家：\n\
    \n```lua\nfunction addPlayer(playerName)\n    playersInGame = playersInGame+ 1\n\
    \    table.insert(players, {name=\nplayerName, square=\n0, isPlaying=\ntrue})\n\
    end\n```\n\n这个函数的作用是：首先将代表游戏中玩家数量的变量 `playersInGame` 加 1，然后为玩家添加一条包含 `name`、`square`\
    \ 和 `isPlaying` 字段的记录。`name` 取自我们传递给函数的参数，我们将玩家设置在 0 号格子，并将 `isPlaying` 设置为 `true`。这样我们就可以追踪玩家，并检查他们是否仍在游戏中，或者已经完成了游戏。\n\
    \n我们始终可以使用 `#` 运算符从数组中获取玩家数量，但当玩家完成游戏时，我们会减少 `playersInGame` 来反映仍在游戏中的玩家数量，而不是遍历所有玩家并检查他们是否在游戏中。\n\
    \n我们还需要另一个函数来为返回骰子点数，类似于我们之前编写的一个：\n\n```lua\nfunction rollDice(maxSides)\n  \
    \  local maxSides = maxSides or 6\n    return math.random(1,maxSides)\nend\n```\n\
    \n现在我们可以从骰子中得到一个点数，接下来需要根据这个点数移动玩家。让我们创建基于骰子点数移动玩家的函数：\n\n```lua\nfunction movePlayer(playerNo,\
    \ paces)\n    if paces < 1 or paces > 6 then return end\n    -- Just to make sure\
    \ that we do not get an invalid number of paces\n    if playerNo > #players or\
    \ playerNo <1 then return end\n    -- Just to make sure that we do not get an\
    \ invalid player number\n    if players[playerNo].isPlaying == false then return\
    \ end\n    -- Make sure that the player is still playing\n    local square = players[playerNo].square\
    \ + paces\n    if square > 100 then return end\n    -- You need to have the exact\
    \ paces to reach the 100th square\n    if square == 100 then\n        -- Reached\
    \ the 100th square, won or finished the game\n        player[playerNo].isPlaying\
    \ = false\n        print(\"Player \" .. players[playerNo].name  .. \" has completed\
    \ the game.\")\n        playersInGame = playersInGame - 1\n    end\n    -- Check\
    \ if we have reached a snake or a ladder\n    local square1 = specialSquare(square)\n\
    \    if square1 then\n        print(\"Got a special square on \" .. square ..\
    \ \", leading to \" .. square1)\n    end\n    players[playerNo].square = square\n\
    \    -- The player is now at the new square\n    print(\"The player \" .. players[playerNo].name\
    \ .. \"is now on sqaure \" .. square)\nend\n```\n\n在上面的函数 `movePlayer` 中，它接收两个变量：`playerNo`\
    \ 和 `paces`。首先，我们进行几项检查，以确保不会收到无效参数。首先检查 `paces`，它必须在 1 到 6 的范围内，因为这是我们从骰子中得到的点数。如果\
    \ `paces` 无效，我们就从函数返回。接下来，我们检查 `playerNo` 是否有效，它应该在 1 和 `players` 数组元素数量之间。我们还能过检查\
    \ `player[playerNo].isPlaying` 标志来确认玩家是否仍在游戏中且尚未完成游戏。通过这些检查后，我们确信玩家是有效且在游戏中的，并且步数也是有效的。然后，我们将玩家当前所在的格子和步数相加的结果存储到一个名为\
    \ `square` 的变量中。根据游戏规则，玩家只能通过到达第 100 格来获胜，所以如果玩家在 99 格并掷出了 2，他们就不能移动；他们**必须**掷出\
    \ 1 才能获胜。我们做的第一件事是检查总数是否大于 100；如果是，则从函数返回（即不做任何操作）。如果正好是 100，则标记该玩家已完成游戏，并将 `isPlaying`\
    \ 标志设置为 `false`。同时，我们显示一条消息，表示该玩家已完成游戏。"
  raw: 'You very likely played this game as a child. It consists of a 10 × 10-square
    board with some ladders and some snakes drawn on the board. You roll the dice
    and move the number of squares you rolled. If you land on a square that has the
    top of a ladder, you move to the square that has the bottom of the ladder, and
    if you land on a snake, you move to the tail of the snake (see [Figures 4-1](#9781430246626_Ch04.xhtml#Fig1)
    and [4-2](#9781430246626_Ch04.xhtml#Fig2)).


    ![9781430246626_Fig04-01.jpg](OEBPS/Images/9781430246626_Fig04-01.jpg)


    [Figure 4-1](#9781430246626_Ch04.xhtml#_Fig1) .  Snakes and Ladders


    ![9781430246626_Fig04-02.jpg](OEBPS/Images/9781430246626_Fig04-02.jpg)


    [Figure 4-2](#9781430246626_Ch04.xhtml#_Fig2) .  The Snakes and Ladders board


    Next, we’ll try coding a version of Snakes and Ladders ourselves. Note that we
    have not as yet gotten to using a framework, so we won’t have much to display
    on the screen. Later on, when frameworks are introduced, we shall integrate this
    idea with them. For now, we’ll concentrate on the logic behind the game and work
    out how to write the logic using Lua first.


    Where Are the Snakes and Where Are the Ladders?


    Let’s take the board shown in [Figure 4-3](#9781430246626_Ch04.xhtml#Fig3) as
    the starting point for our game.


    ![9781430246626_Fig04-03.jpg](OEBPS/Images/9781430246626_Fig04-03.jpg)


    [Figure 4-3](#9781430246626_Ch04.xhtml#_Fig3) .  The board of Snakes and Ladders
    game


    There are six snakes and five ladders on the board. The ladders are at the following
    positions, from bottom to top:


    *   Starting at 58 and ending at 20

    *   Starting at 68 and ending at 47

    *   Starting at 76 and ending at 55

    *   Starting at 90 and ending at 69

    *   Starting at 97 and ending at 78


    And the snakes are at the following positions, from front to back:


    *   The head starts at 22 and the tail ends on 5.

    *   The head starts at 35 and the tail ends on 12.

    *   The head starts at 51 and the tail ends on 34.

    *   The head starts at 80 and the tail ends on 57.

    *   The head starts at 89 and the tail ends on 66.

    *   The head starts at 99 and the tail ends on 76.


    Some Board Facts


    The board is numbered from 1 to 100, in a zigzag where the first ten numbers go
    from left to right, the next ten right to left, the next from left to right, and
    so on.


    The player can be at any square, and when they reach 100, they win the game. This
    game can be played with multiple players, and there can be multiple players on
    the same square.


    Converting This to Code


    We can have the board set up like a class that would hold information about the
    snakes and ladders, as in the preceding code where we randomly stored a value
    to the board. However, for now, we shall store this code in an array. Each record
    in this table shall have two fields: a start and an end square.


    ```

    local tableSquares = {

    {startPos = 20, endPos = 58},

    {startPos = 47, endPos = 68},

    {startPos = 55, endPos = 76},

    {startPos = 69, endPos = 90},

    {startPos = 78, endPos = 97},

    {startPos = 22, endPos = 5},

    {startPos = 35, endPos = 12},

    {startPos = 51, endPos = 34},

    {startPos = 80, endPos = 57},

    {startPos = 89, endPos = 66},

    {startPos = 99, endPos = 76},

    }

    ```


    We also need to have an array to hold the player’s locations, so we create an
    array:


    ```

    local players = {}

    local playersInGame = 0

    local playersTurn = 1

    ```


    Because this is an array, we can add as many players are we want by simply inserting
    their record into the table. Let’s create a function to add a new player:


    ```

    function addPlayer(playerName)

        playersInGame = playersInGame+ 1

        table.insert(players, {name=

    playerName, square=

    0, isPlaying=

    true})

    end

    ```


    What this function does is first increase the number of players represented by
    the playersInGame variable by 1, and then add a record for the player that includes
    fields called name, square, and isPlaying. The name is taken from what we pass
    to the function, and we set the player to be on square 0 and also set isPlaying
    to true. So, we can track the players and check if they are still playing or if
    they have already finished the game.


    We can always get the number of players from the array using the # operator, but
    when players finish the game, we reduce playersInGame to reflect how many are
    still in the game instead of looping through all of the players and checking if
    they are in the game or not.


    We will need another function that returns a dice roll for us, similar to the
    one we wrote earlier:


    ```

    function rollDice(maxSides)

        local maxSides = maxSides or 6

        return math.random(1,maxSides)

    end

    ```


    We can get the number from a dice roll, and now we need to move the player based
    on that dice roll. Let’s create the function that moves the player based on the
    dice roll:


    ```

    function movePlayer(playerNo, paces)

        if paces < 1 or paces > 6 then return end

        -- Just to make sure that we do not get an invalid number of paces

        if playerNo > #players or playerNo <1 then return end

        -- Just to make sure that we do not get an invalid player number

        if players[playerNo].isPlaying == false then return end

        -- Make sure that the player is still playing

        local square = players[playerNo].square + paces

        if square > 100 then return end

        -- You need to have the exact paces to reach the 100th square

        if square == 100 then

            -- Reached the 100th square, won or finished the game

            player[playerNo].isPlaying = false

            print("Player " .. players[playerNo].name  .. " has completed the game.")

            playersInGame = playersInGame - 1

        end

        -- Check if we have reached a snake or a ladder

        local square1 = specialSquare(square)

        if square1 then

            print("Got a special square on " .. square .. ", leading to " .. square1)

        end

        players[playerNo].square = square

        -- The player is now at the new square

        print("The player " .. players[playerNo].name .. "is now on sqaure " .. square)

    end

    ```


    In the preceding function, movePlayer takes two variables, a playerNo and paces.
    First, we do a few checks to make sure that we do not get any invalid parameters.
    First we check the paces, which have to be in the range 1 to 6, as this is what
    we get from the dice roll. If the paces are invalid, then we return from the function.
    Next, we check if the playerNo is valid, which should be between 1 and the number
    of elements in the players array. We also check if the player is still in play
    and has not completed the game. We check that using the player[playerNo].isPlaying
    flag, which tells us if the player is still playing or not. After all these checks,
    we are sure that the player is valid and in play, and that the number of paces
    is valid too. We then store the value of the square the player is at with the
    paces into a variable called square. According to the game rules, the player can
    only win by arriving at the 100th square, so if the player is on 99 and rolls
    a 2, they cannot move; they *must* roll a 1 to win. The first thing we do is check
    if the total is greater than 100; if it is, then we return from the function (i.e.,
    do nothing). If the total is 100, then we flag the player as having finished and
    set the isPlaying flag to false. We also display the message that the player has
    completed the game.'
