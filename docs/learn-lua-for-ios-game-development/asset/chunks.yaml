    \ contained inside another one. Here’s the function to use for this:\n\n```\n\
    function circleInCircle( circle1X, circle1Y, circle1Radius, circle2X, circle2Y,\
    \ circle2Radius )\n  local dx = circle1X – circle2X\n  local dy = circle1Y – circle2Y\n\
    \  local rx = circle1Radius – circle2Radius\n  if dx * dx + dy * dy <= rx * rx\
    \ then\n    return true\n  end\n  return false\nend\n```\n\n### Identifying Overlapping\
    \ Rectangles\n\nThe `rectOverlaps` function can be used to determine if two rectangles\
    \ are overlapping. For example, this could be used to determine whether the player\
    \ is in contact with a spike or some other object on the screen, and trigger an\
    \ event accordingly.\n\n```\nfunction rectOverlaps( rect1X, rect1Y, rect1Width,\
    \ rect1Height, rect2X, rect2Y, rect2Width, rect2Height )\n  if rect1X + rect1Width\
    \ >= rect2X and\n     rect2X + rect2Width <= rect1X and\n     rect1Y + rect1Height\
    \ >= rect2Y and\n     rect2Y + rect2Height <= rect1Y then\n      return true\n\
    \  end\n\nreturn false\nend\n```\n\n### Identifying Overlapping Circles\n\nThis\
    \ can be used to determine if two circles are overlapping.\n\n```\nfunction circleOverlaps(\
    \ circle1X, circle1Y, circle1Radius, circle2X, circle2Y, circle2Radius )\n  local\
    \ dx = circle1X – circle2X\n  local dy = circle1Y – circle2Y\n  local rx = circle1Radius\
    \ + circle2Radius\n  if dx * dx + dy * dy <= rx * rx then\n    return true\n \
    \ end\n\nreturn false\nend\n```\n\n### Determining Whether a Circle Overlaps a\
    \ Rectangle\n\nThis can help determine if a circle overlaps a rectangle.\n\n```\n\
    function circleOverlapsRectangle( rectX, rectY, rectWidth, rectHeight, circleX,\
    \ circleY, circleRadius )\n\nif rectX <= circleX and rectX + rectWidth >= circleX\
    \ then\n    if rectY + rectHeight >= circleY - circleRadius and\n       rectY\
    \ <= circleY + circleRadius then\n         return true\n    else\n         return\
    \ false\n    end\n  elseif rectX <= circleY and rectX + rectHeight >= circleY\
    \ then\n    if rectX + rectWidth >= circleX - circleRadius and\n       rectX <=\
    \ circleX + circleRadius then\n         return true\n    else\n         return\
    \ false\n    end\n  else\n    if rectX < circleX then\n      if rectY < circleY\
    \ then\n        return pointInCircle( rectX + rectWidth, rectY + rectHeight,\n\
    \            circleX, circleY, circleRadius )\n      else\n        return pointInCircle(\
    \ rectX + rectWidth, rectY,\n            circleX, circleY, circleRadius )\n  \
    \     end\n    else\n      if rectX < circleY then\n        return pointInCircle(\
    \ rectX, rectY + rectHeight,\n             circleX, circleY, circleRadius )\n\
    \      else\n        return pointInCircle( rectX, rectY, circleX, circleY, circleRadius\
    \ )\n      end\n    end\n  end\nend\n```\n\n### Using `pointInTriangle`\n\nIn\
    \ some cases, triangles will suit your needs better than rectangles or circles.\
    \ There are plenty of methods for checking the bounding values of a triangle.\
    \ However, the one described following is the simplest. It simply extends lines\
    \ from each of the triangle’s vertices to the point we are checking, thereby dividing\
    \ the triangle into three triangles; it then calculates the area of each of these\
    \ triangles. If `totalArea` is the same as the area of the three new triangles\
    \ created, then the point can be said to be in the bounding triangle. Here’s the\
    \ function that determines whether a point is inside a triangle:\n\n```\nfunction\
    \ triangleArea( pt1x, pt1y, pt2x, pt2y, pt3x, pt3y )\n  local dA = pt1x - pt3x\n\
    \  local dB = pt1y - pt3y\n  local dC = pt2x - pt3x\n  local dD = pt2y - pt3y\n\
    \  return 0.5 * math.abs( ( dA * dD ) - ( dB * dC ) )\nend\n\nfunction pointInTriangle(ptx,\
    \ pty, pt1x, pt1y, pt2x, pt2y, pt3x, pt3y)\n  local areaT = triangleArea(pt1x,\
    \ pt1y, pt2x, pt2y, pt3x, pt3y)\n  local areaA = triangleArea(ptx, pty, pt1x,\
    \ pt1y, pt2x, pt2y)\n  local areaB = triangleArea(ptx, pty, pt3x, pt3y, pt2x,\
    \ pt2y)\n  local areaC = triangleArea(ptx, pty, pt1x, pt1y, pt3x, pt3y)\n  return\
    \ (areaT == (areaA + areaB + areaC))\nend\n```\n\n### Using `pointInPolygon`\n\
    \nYou can also determine whether a point is inside a polygon. The following code\
    \ (adapted from the functions in the articles “Determining if a point lies on\
    \ the interior of a polygon,” by Paul Bourke [http://paulbourke.net/geometry/insidepoly/](http://paulbourke.net/geometry/insidepoly/)\
    \ and “Point in Polygon Strategies,” by Eric Haynes [http://erich.realtimerendering.com/ptinpoly/](http://erich.realtimerendering.com/ptinpoly/))\
    \ enables you to do this:\n\n```\nfunction pointInPolygon(x,y,poly)\n  n = #poly\n\
    \  inside = false\n\np1x,p1y = poly[1], poly[2]\n  for i=1,n-2, 2 do\n    p2x,p2y\
    \ = poly[i+2], poly[i+3]\n    if y > math.min(p1y,p2y) then\n      if y <= math.max(p1y,p2y)\
    \ then\n        if x <= math.max(p1x,p2x) then\n          if p1y ~= p2y then\n\
    \            xinters = (y-p1y)*(p2x-p1x)/(p2y-p1y)+p1x\n          end\n      \
    \    if p1x == p2x or x <= xinters then\n            inside = not inside\n   \
    \       end\n        end\n      end\n    end\n    p1x,p1y = p2x,p2y\n  end\n \
    \ return inside\nend\n```\n\n## Other Generic Functions\n\nThis section examines\
    \ some additional functions that you might find useful in your Lua development\
    \ projects.\n\n### Comparing Boolean Values\n\nAnother common task that you might\
    \ want to accomplish in Lua is comparing Boolean values. At first glance, you\
    \ might think that these two commands are the same:\n\n```\nif someValueOn then\
    \ print(\"On\") end\n```\n\nand\n\n```\nif someValueOn==true then print(\"On\"\
    ) end\n```\n\nIn the first case, `someValueOn` will return true as long as `someValueOn`\
    \ is not nil or false. However, if `someValueOn` were `−1` or `\"Off\"`, the statement\
    \ would still evaluate to true, whereas in the second line, `someValueOn==true`\
    \ would return a true only if the value were true, and in no other circumstance.\n\
    \n### Translating C/Java Like Loops to Lua\n\nIf you come from a Java/C/C++ or\
    \ JavaScript background, you should be used to loops like this:\n\n```\nfor (initialize;\
    \ condition; iteration){\n}\n```\n\nwhere multiple values can be set in `initialize`,\
    \ each separated with a comma. The `condition` can be made up of a compound condition,\
    \ and the iterator can have multiple operations.\n\nFor example, consider this\
    \ loop:\n\n```\nscore =  110  --something\nfor (i=20, k = 120; i> −1 && score\
    \ < 100; --i, --k ){\n}\n```\n\nIn Lua, this would be written as follows:\n\n\
    ```\nscore = 110\nk = 120\nfor i=20, 0, -1 do\n  if score < 100 then\n      break\n\
    \  end\n\n-- Do whatever here\n  k = k - 1\nend\n```\n\n### Applying Friction\
    \ to an Object\n\nThe easiest way to move an object around the screen is to move\
    \ it at constant speed (i.e., increase or decrease the axis value by the same\
    \ value over time). This behavior is of course quite unrealistic. For example,\
    \ in the real world, when a box is pushed across the hall, it moves fast at first\
    \ and then it gradually slows down until it finally stops. One shortcut that a\
    \ lot of developers prefer is to use a physics object; it works, but we can simulate\
    \ friction without using a physics object with the help of a little math.\n\n\
    ```\nlocal speed = 20\nlocal friction = 0.9\nrepeat\n  print(speed)\n  speed =\
    \ speed * friction\nuntil speed <= 1\n```\n\nDepending on the framework, you can\
    \ reduce the `y` value by this `speed` value. This will give the illusion of a\
    \ slide or flick upward with friction. The object will slide quickly at first,\
    \ and then slow down till it comes to a complete halt.\n\nNote that this example\
    \ uses a `repeat` loop. If you are working with display objects, you need to have\
    \ a nonblocking mechanism that allows for updates to be made. In other words,\
    \ you need to use something like the `draw` function, which is called every so\
    \ often, or the `enterFrame` events, so that the new position is set at each frame,\
    \ and you can see the transition of the object. If you want the transition to\
    \ be super-smooth, try a maximum value of `0.99`. This can be used to simulate\
    \ flicks, sliding an object across the screen with inertia, and so on.\n\n###\
    \ Simulating a Jack-in-the-Box"
