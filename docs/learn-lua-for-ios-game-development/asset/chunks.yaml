    has support for Corona SDK, Gideros Studio, and Moai. It features a preview functionality
    that lists out the functions and variables from a Lua file, along with their class
    type and inherited members. It also features smart class-aware autocompletion
    functionality that will give the most relevant items in a given context. It has
    advanced debugging features like step-in, step-out, step-over, run to cursor,
    call stacks, and more. Variables can be watched and even changed dynamically while
    running. Ultimote in Glider presently has functionality to simulate Corona SDK
    hardware events in the IDE. It even has integrated versioning support for Git,
    Subversion, and Mercurial and also includes a local file history, which retains
    every change made on the file.


    ![9781430246626_Fig14-01.jpg](OEBPS/Images/9781430246626_Fig14-01.jpg)


    [Figure 14-1](#9781430246626_Ch14.xhtml#_Fig1) .  The Glider IDE


    ## CoronaComplete


    - *URL*: [http://coronacomplete.com](http://coronacomplete.com)

    - *Price*: $26.99 ($29.99 on the Mac App Store)

    - *Platforms*: Mac OS X


    CoronaComplete is a Mac OS X–only IDE (that currently only works with Corona SDK).
    It was created by Vladu Bogdan, who is also the author of the wonderful utilities
    SpriteHelper and LevelHelper (mentioned later in this chapter). CoronaComplete
    includes functionality for viewing assets, and has smart arguments so you can
    use autocomplete to select a function. It even has built-in documentation added
    by the author, so you do not have to go online to the web site to get API documentation.
    It integrates with the Corona debugger and offers functionality for displaying
    variables and stepping through or over code while debugging. One if its best features
    is its ability to record your running app and create a video, which can be placed
    on a web site or used for promotional activities. A screenshot of CoronaComplete
    is shown in [Figure 14-2](#9781430246626_Ch14.xhtml#Fig2).


    ![9781430246626_Fig14-02.jpg](OEBPS/Images/9781430246626_Fig14-02.jpg)


    [Figure 14-2](#9781430246626_Ch14.xhtml#_Fig2) .  CoronaComplete, displaying the
    project assets


    **Note**   CoronaComplete is now superceeded by CodeHelper Pro.


    ## Lua Studio


    - *URL*: [http://lua-studio.luaforge.net](http://lua-studio.luaforge.net)

    - *Price*: Free

    - *Platform*: Windows


    This is a Windows-only application and is a complete IDE for Lua. It does not
    cater to Lua-based frameworks. Lua Studio is a well-integrated Lua IDE; it displays
    a list of local and global variables, along with information about the calling
    stack (see [Figure 14-3](#9781430246626_Ch14.xhtml#Fig3)). It even allows for
    step-in, step-out, and step-over functionality while debugging.


    ![9781430246626_Fig14-03.jpg](OEBPS/Images/9781430246626_Fig14-03.jpg)


    [Figure 14-3](#9781430246626_Ch14.xhtml#_Fig3) .  Lua Studio for Windows running
    a debug session with Lua code


    ## ZeroBrane Studio


    - *URL*: [http://studio.zerobrane.com/](http://studio.zerobrane.com/)

    - *Price*: Free

    - *Platform*: Windows, Mac OS X, Linux


    This is the only IDE for Lua written in Lua and it has support for most of the
    frameworks we discussed, including Gideros, Moai and LÖVE. It has a small footprint
    and is easy to use, providing most of the professional features that developers
    expect from an IDE, including syntax highlighting, a remote debugger, a code analyzer,
    live coding, and debugging. It also supports auto complete and a scratch pad for
    running and testing Lua code snippets. This is available from the author’s site
    in binary format or as source code from his GitHub account at [https://github.com/pkulchenko/zerobranestudio/](https://github.com/pkulchenko/zerobranestudio/).


    ## Text Editors


    While IDEs offer a complete environment, as you develop, your reliance on IDEs
    may vary. Many people reach a point where they feel that they no longer require
    an IDE, but a very good text editor instead. There are some wonderful free and
    paid text editors for both Mac OS X and Windows. Since Lua is such a simple language,
    in theory, a very simple Notepad-like text editor is all you need to write code.
    However, it always helps to have syntax highlighting, code folding, and ability
    to jump between functions, dynamic debugging, and so on.


    ### Notepad++


    - *URL*: [http://notepad-plus-plus.org](http://notepad-plus-plus.org)

    - *Price*: Free

    - *Platforms*: Windows


    This is a Windows-only editor; it is open source and quite powerful, and is updated
    on a regular basis. It features syntax highlighting, code folding, and multitab
    editing (as shown in [Figure 14-4](#9781430246626_Ch14.xhtml#Fig4)). It has support
    for several languages other than Lua, and it can be extended with plug-ins.


    ![9781430246626_Fig14-04.jpg](OEBPS/Images/9781430246626_Fig14-04.jpg)


    [Figure 14-4](#9781430246626_Ch14.xhtml#_Fig4) .  Notepad++


    ### TextMate


    - *URL*: [http://macromates.com/](http://macromates.com/)

    - *Price*: $50

    - *Platforms*: Mac OS X


    TextMate is one of the few text editors for the Mac that has bundles (for syntax,
    functions, etc.) to help extend the functionality of TextMate. The earlier version,
    1.5.x, is a paid app, whereas the newer version, TextMate 2.0 is open source and
    freely available. It includes bundles created for Corona SDK and Gideros Studio,
    in addition to basic Lua. [Figure 14-5](#9781430246626_Ch14.xhtml#Fig5) shows
    a Lua file being edited in TextMate.


    ![9781430246626_Fig14-05.jpg](OEBPS/Images/9781430246626_Fig14-05.jpg)


    [Figure 14-5](#9781430246626_Ch14.xhtml#_Fig5) .  Editing a Lua file in TextMate
    1.5


    ### TextWrangler


    - *URL*: [http://barebones.com/products/TextWrangler](http://barebones.com/products/TextWrangler)

    - *Price*: Free

    - *Platforms*: Mac OS X only


    TextWrangler is a free text editor, available from Bare Bones Software. It has
    many features, including code folding, syntax highlighting, and project browsing.
    Text Wrangler is free, and is basically a lite version of BBEdit (described next).
    Some of the features of TextWrangler are shown in [Figure 14-6](#9781430246626_Ch14.xhtml#Fig6).


    ![9781430246626_Fig14-06.jpg](OEBPS/Images/9781430246626_Fig14-06.jpg)


    [Figure 14-6](#9781430246626_Ch14.xhtml#_Fig6) .  TextWrangler


    ### BBEdit


    - *URL*: [http://itunes.apple.com/us/app/bbedit/id404009241?mt=12](http://itunes.apple.com/us/app/bbedit/id404009241?mt=12)

    - *Price*: $49.99

    - *Platforms*: Mac OS X


    BBEdit is a full-featured text editor, also from Bare Bones Software. It includes
    all of the features of TextWrangler, along with autocomplete and some additional
    SSH-related functionality. [Figure 14-7](#9781430246626_Ch14.xhtml#Fig7) shows
    many of the features available in BBEdit.


    ![9781430246626_Fig14-07.jpg](OEBPS/Images/9781430246626_Fig14-07.jpg)


    [Figure 14-7](#9781430246626_Ch14.xhtml#_Fig7) .  BBEdit and its features


    ### Sublime Text 2


    - *URL*: [www.sublimetext.com](http://www.sublimetext.com)

    - *Price*: $59

    - *Platforms*: Mac OS X only


    Like TextMate and BBEdit, Sublime Text 2 is a modern text editor that includes
    functionality like syntax highlighting, code folding, and so on. It is a bit expensive
    comparatively, but it allows for unlimited usage without disabling any features,
    so in effect it can be used as free software. (However, it is *not* free, and
    if you use it on a continual basis, then you should purchase a license for it.)
    [Figure 14-8](#9781430246626_Ch14.xhtml#Fig8) shows Lua code being edited with
    syntax highlighting and line numbers.


    ![9781430246626_Fig14-08.jpg](OEBPS/Images/9781430246626_Fig14-08.jpg)


    [Figure 14-8](#9781430246626_Ch14.xhtml#_Fig8) .  Editing a Lua file in Sublime
    Text 2


    ### Textastic Code Editor'
