    Shaders


    LÖVE has supported pixel shaders since 0.8.0; these are also called fragment shaders.
    These compute the color and other attributes for each pixel. With shaders, you
    can generate a variety of effects, including adding color to images.


    The pixel effects are not programmed or described in Lua; they use OpenGL Shading
    Language (GLSL) instead, which is a subset of functions used by the pixel shaders.
    Note the C or JavaScript type syntax of GLSL in contrast to the Lua syntax.


    Let’s make a sample that colors an image black and white:


    ```

    local image = love.graphics.newImage("myImage.png")

    imagesx = image:getWidth()

    imagesy = image:getHeight()


    effect = {}

    effect.name = "Black and White"

    effect.effect = love.graphics.newPixelEffect [[

        extern number value;

        vec4 effect(vec4 color, Image texture, vec2 texture_coords, vec2 pixel_coords)

          {

            vec4 pixel = Texel(texture, texture_coords);

            float avg = max(0, ((pixel.r + pixel.g + pixel.b)/3) + value/10);

            pixel.r = avg;

            pixel.g = avg;

            pixel.b = avg;

            return pixel;

          }

    ]]


