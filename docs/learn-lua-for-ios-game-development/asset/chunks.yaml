    You will see that the output window has three lines:


    ```

    main.lua is uploading.

    Uploading finished.

    Hello World

    ```


    The last line is the output of the program, which we are printing from the code.
    The second line indicates that the uploading of the code and resources is finished.
    Gideros Studio copies the resources to the player (uploads them), displays each
    on the output panel as it’s uploaded, prints a confirmation, and then executes
    the program.


    ## Configuring the Project


    Right-click the project name on the left-hand side of the screen and select the
    `Properties` option. This allows you to set the properties for the project. Here
    you can set the scale mode for the app, the logical dimensions, the orientation,
    the frame rate, and even the suffix for image files, if required. This is an advanced
    option that you probably won’t use at first while you are learning Gideros Studio,
    but it’s very useful, so I’ll describe it here.


    The first option, `Scale Mode`, sets how the app will scale when run on various
    devices—this is covered in more detail later in this chapter. The logical dimensions
    are used to set the base settings for the application; it is from these dimensions
    that the display scales up using the scale mode on the various devices. Apple
    has suffixes of `@2x` or `@4x` that allow you to load retina graphics on the new
    iPhone and iPad. Gideros is a multi-platform system and it extends this format
    for the Android platforms as well. So you can have `@1.5`, `@2`, `@4`, etc. as
    suffixes.


    **Tip** The scaling suffix can be used not only for high-resolution graphics,
    but also to have a graphic for each platform without having to write any code
    checking for specific platforms.


    The `iOS` tab is useful to configure a few other settings specific to iOS; for
    example, whether the app should consider the target device a device with a retina
    display, and whether autorotation should be enabled. If the logical dimensions
    are set to `320×480` and the retina display set to `No retina display`, then the
    display is deemed to have dimensions of `320×480`, as shown in [Figure 9-8](#9781430246626_Ch09.xhtml#Fig8),
    while with the retina-display option, the device is deemed to have a `640×960`
    display, as shown in [Figure 9-9](#9781430246626_Ch09.xhtml#Fig9). Both of the
    images are taken from the player running on the iPhone 4, which has dimensions
    of `960×640`, but based on the project settings, the display can vary.


    ![9781430246626_Fig09-08.jpg](OEBPS/Images/9781430246626_Fig09-08.jpg)


    [Figure 9-8](#9781430246626_Ch09.xhtml#_Fig8). The Gideros Player running at a
    resolution of `320×480` (no retina display)


    ![9781430246626_Fig09-09.jpg](OEBPS/Images/9781430246626_Fig09-09.jpg)


    [Figure 9-9](#9781430246626_Ch09.xhtml#_Fig9). The Gideros Player running at a
    logical resolution of `320×480` with retina display


    ## Architecture


    The architecture of Gideros is similar to other frameworks. The core Gideros engine
    talks to Lua code on one side, and in the background it interacts with the device
    or desktop using OpenGL. [Figure 9-10](#9781430246626_Ch09.xhtml#Fig10) shows
    the architecture of Gideros Studio. There are a couple of utilities that form
    the Gideros Studio family; these were discussed at the start of the chapter.'
