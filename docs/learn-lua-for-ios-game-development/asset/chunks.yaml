    \    if square1 then\n        print(\"Got a special square on \" .. square ..\
    \ \", leading to \" .. square1)\n    end\n    players[playerNo].square = square\n\
    \    -- The player is now at the new square\n    print(\"The player \" .. players[playerNo].name\
    \ .. \"is now on sqaure \" .. square)\nend\n```\n\n在上面的函数 `movePlayer` 中，它接收两个变量：`playerNo`\
    \ 和 `paces`。首先，我们进行几项检查，以确保不会收到无效参数。首先检查 `paces`，它必须在 1 到 6 的范围内，因为这是我们从骰子中得到的点数。如果\
    \ `paces` 无效，我们就从函数返回。接下来，我们检查 `playerNo` 是否有效，它应该在 1 和 `players` 数组元素数量之间。我们还能通过检查\
    \ `player[playerNo].isPlaying` 标志来确认玩家是否仍在游戏中且尚未完成游戏。通过这些检查后，我们确信玩家是有效且在游戏中的，并且步数也是有效的。然后，我们将玩家当前所在的格子和步数相加的结果存储到一个名为\
    \ `square` 的变量中。根据游戏规则，玩家只能通过到达第 100 格来获胜，所以如果玩家在 99 格并掷出了 2，他们就不能移动；他们**必须**掷出\
    \ 1 才能获胜。我们做的第一件事是检查总数是否大于 100；如果是，则从函数返回（即不做任何操作）。如果正好是 100，则标记该玩家已完成游戏，并将 `isPlaying`\
    \ 标志设置为 `false`。同时，我们显示一条消息，表示该玩家已完成游戏。\n"
- fmt: "Since this is Snakes and Ladders, we also need to check if the player has\
    \ reached the head of a snake or is at the bottom of a ladder. When you arrive\
    \ at the head of the snake, the player moves to the tail, and if the player arrives\
    \ at the bottom of the ladder, the player moves to the top of the ladder. We check\
    \ that via a `specialSquare` function, which takes a parameter of `square` and\
    \ returns the corresponding square for a snake’s tail or the top of the ladder;\
    \ otherwise, it simply returns the same square. This way we can simply set the\
    \ value without a lot of code.\n\n```\nfunction specialSquare(theSquare)\n   \
    \ local theSquare = theSquare\n    local  i\n    for i = 1,#tableSquares do\n\
    \        local currSquare = tableSquares[i]\n        if currSquare.startPos ==\
    \ theSquare then\n            -- We have reached a special square\n          \
    \  return currSquare.endPos\n        end\n    end\n    -- There was no special\
    \ square, so simply return the same square value back\n    return theSquare\n\
    end\n```\n\nWith these functions, we have covered the major logical bulk of the\
    \ game. The rest of the functions are mostly cosmetic and deal with UI interactions\
    \ and updating the display.\n\nWe also need an `init` function that sets or resets\
    \ the game defaults before we start:\n\n```\nfunction init()\n    -- Blank out\
    \ the players table\n    players = {}\n    playersInGame = 0\nend\n```\n\nFirst,\
    \ to test, we shall try the game with two players. The easiest way to do so is\
    \ as follows:\n\n```\nfunction reset()\n  init()\n  addPlayer(\"Jayant\")\n  addPlayer\
    \ (\"Douglas\")\nend\n```\n\nWe have almost everything in place for it to conceptually\
    \ work, but we need to stitch it all together to make it work. When we start the\
    \ game, what we need is a function that shall roll the die, move the player to\
    \ a new square, change to the next player, and repeat, till there is one player\
    \ left. Therefore, the game cannot start unless there are at least two players.\n\
    \nBecause we are going to run this game in the Lua terminal rather than with a\
    \ graphical framework, we shall not be able to avail ourselves of the various\
    \ graphical and touch functionalities. This shall limit the interactivity of our\
    \ sample for now. Though many games give the players a great deal of interactivity,\
    \ this particular game doesn’t need that much. In this game, the die is simply\
    \ thrown (a random number is generated) and the player token is moved (by the\
    \ program), so the only interactivity we would need is to have the players tap\
    \ the screen at every stage to proceed to the next, and tap to roll dice. While\
    \ we are in text mode, we are not able to get any touch events, hence the game\
    \ might look more like a self-running simulation, which announces to the terminal\
    \ whose turn it is and then what they rolled and where the player is currently,\
    \ till one player is left.\n\n```\nfunction startGame()\n    if #players < 2 then\
    \ return end\n    -- Need to have at least 2 players\n-- This is our check that\
    \ if one player is left, then the game is over\n    while playersInGame > 1 do\n\
    \        local thePlayer = players[playersTurn]\n        if thePlayer.isPlaying\
    \ == true then\n            print(\"it is \" .. thePlayer.name .. \" turn\")\n\
    \            local diceRoll = rollDice()\n            print(\"and rolled a \"\
    \ .. diceRoll)\n            movePlayer(playersTurn, diceRoll)\n        end\n \
    \       -- It's the next player's turn\n        nextPlayer()\n    end\n    print(\"\
    Game over\")\nend\n```\n\nWe can increment `playersTurn` in the preceding function\
    \ block, but we need to make sure that `playersTurn` is in the range of 1 and\
    \ the maximum number players. We also need to ensure that the player is still\
    \ playing.\n\n```\nfunction nextPlayer()\n    playersTurn = playersTurn + 1\n\
    \    -- Loop back to the first if the current player was the last player\n   \
    \ if playersTurn > #players then playersTurn = 1 end\n    if players[playersTurn].isPlaying\
    \ == false then\n        nextPlayer()\n    end\n    -- All done, nothing more\
    \ to do really. . .\nend\n```\n\nPut all of the code together, and we have an\
    \ automatic-running game of Snakes and Ladders. The idea behind this code is to\
    \ teach you how to create functions that are modular, and that it is mostly Lua\
    \ code that runs the app; the framework is more of glue that allows the glitter\
    \ to stick.\n\nIn case you are wondering why we do not see any output to the terminal\
    \ window, it is because we need to start the game. We can quickly create a function\
    \ called `restart`, which will set all the variables to the initial values and\
    \ then start the game for us:\n\n```\nfunction restart()\n  init()\n  startGame()\n\
    end\n```\n\nTo run the game, we simply call `restart()`, and the game runs in\
    \ the console (see [Figure 4-4](#9781430246626_Ch04.xhtml#Fig4)).\n\n![9781430246626_Fig04-04.jpg](OEBPS/Images/9781430246626_Fig04-04.jpg)\n\
    \n[Figure 4-4](#9781430246626_Ch04.xhtml#_Fig4) . The game running in the console\n\
    \n## Moving a Character\n\nIn any 2D game, you are in control of a character,\
    \ and this character moves on the screen as you tap or swipe the screen of the\
    \ mobile device. Let’s examine the code that makes the character move. The screen\
    \ is a grid that has two dimensions: height and width. Most screens start with\
    \ `(0,0)` being the top-left corner of the screen, with a positive `x` value indicating\
    \ that the character is to the right from the origin and a negative value indicating\
    \ that the character is to the left of the origin. Similarly, a positive `y` indicates\
    \ that the character is below the origin and a negative `y` indicates that the\
    \ character is above it. Using this information, we can safely deduce that to\
    \ move a character to the right, we need to add a positive increment to the `x`-coordinate,\
    \ and to move the character to the left, we add a negative increment to the `x`-coordinate.\n\
    \nLet’s create the structure for our character as a table structure like a point\
    \ that will hold the `x` and `y` position of the character:\n\n```\nlocal point\
    \ = {x = 0,y = 0}\n-- Initialize the point structure with x and y as 0\n```\n\n\
    Now let’s move the character 5 units to the right:\n\n```\nlocal i\nfor i = 1,5\
    \ do\n point.x = point.x + 1\nend\n```\n\nThis can also be used to increment the\
    \ position one pixel a time. However, in the preceding example, we could have\
    \ also used `point.x = point.x + 5`, like so:\n\n```\nprint(point.x, point.y)\n\
    ```\n\nWe do not see anything on the screen as yet, as we have not written any\
    \ code to display anything. Some might feel this to be a rather boring method,\
    \ but if you look at it in the larger scheme of things, you shall find that if\
    \ you can get this code working perfectly fine, you can use it with any framework\
    \ and language. This shall help you keep your code as modular and portable as\
    \ possible.\n\n## Going Offscreen\n\nOne of the most common issues that many beginner\
    \ developers face is that of how to limit a character to a confined space on the\
    \ screen. The approach with this book is a bit different than you might expect.\
    \ Rather than describing a graphical solution, we shall look at the problem in\
    \ the debug window. Not only will this strengthen your debugging skills, but it\
    \ will also help you look at the data for conceptual code, where you might not\
    \ be able to have a visual representation.\n\nLet’s bounce a ball on the screen.\
    \ The ball has `x`- and `y`-coordinates in the `point` table structure that we\
    \ defined earlier. The ball keeps moving in a particular direction, and as soon\
    \ as it reaches the edge of the confining dimensions, it bounces in the opposite\
    \ direction."
  raw: 'Since this is Snakes and Ladders, we also need to check if the player has
    reached the head of a snake or is at the bottom of a ladder. When you arrive at
    the head of the snake  the player moves to the tail and if the player arrives
    at the bottom of the ladder, the player moves to the top of the ladder. We check
    that via a specialSquare function, which takes a parameter of square and returns
    the corresponding square for a snake’s tail or the top of the ladder; otherwise,
    it simply returns the same square. This way we can simply set the value without
    a lot of code.


    ```

    function specialSquare(theSquare)

        local theSquare = theSquare

        local  i

        for i = 1,#tableSquares do

            local currSquare = tableSquares[i]

            if currSquare.startPos == theSquare then

                -- We have reached a special square

                return currSquare.endPos

            end

        end

        -- There was no special square, so simply return the same square value back

        return theSquare

    end

    ```


    With these functions, we have covered the major logical bulk of the game. The
    rest of the functions are mostly cosmetic and deal with UI interactions and updating
    the display.


    We also need an init function that sets or resets the game defaults before we
    start:


    ```

    function init()

        -- Blank out the players table

        players = {}

        playersInGame = 0

    end

    ```


    First, to test, we shall try the game with two players. The easiest way to do
    so is as follows:


    ```

    function reset()

      init()

      addPlayer("Jayant")

      addPlayer ("Douglas")

    end

    ```


    We have almost everything in place for it to conceptually work, but we need to
    stitch it all together to make it work. When we start the game, what we need is
    a function that shall roll the die, move the player to a new square, change to
    the next player, and repeat, till there is one player left. Therefore, the game
    cannot start unless there are at least two players.


    Because we are going to run this game in the Lua terminal rather than with a graphical
    framework, we shall not be able to avail ourselves of the various graphical and
    touch functionalities. This shall limit the interactivity of our sample for now.
    Though many games give the players a great deal of interactivity, this particular
    game doesn’t need that much. In this game, the die is simply thrown (a random
    number is generated) and the player token is moved (by the program), so the only
    interactivity we would need is to have the players tap the screen at every stage
    to proceed to the next, and tap to roll dice. While we are in text mode, we are
    not able to get any touch events, hence the game might look more like a self-running
    simulation, which announces to the terminal whose turn it is and then what they
    rolled and where the player is currently, till one player is left.


    ```

    function startGame()

        if #players < 2 then return end

        -- Need to have at least 2 players

    -- This is our check that if one player is left, then the game is over

        while playersInGame > 1 do

            local thePlayer = players[playersTurn]

            if thePlayer.isPlaying == true then

                print("it is " .. thePlayer.name .. " turn")

                local diceRoll = rollDice()

                print("and rolled a " .. diceRoll)

                movePlayer(playersTurn, diceRoll)

            end

            -- It''s the next player''s turn

            nextPlayer()

        end

        print("Game over")

    end

    ```


    We can increment playersTurn in the preceding function block, but we need to make
    sure that playersTurn is in the range of 1 and the maximum number players. We
    also need to ensure that the player is still playing.


    ```

    function nextPlayer()

        playersTurn = playersTurn + 1

        -- Loop back to the first if the current player was the last player

        if playersTurn > #players then playersTurn = 1 end

        if players[playersTurn].isPlaying == false then

            nextPlayer()

        end

        -- All done, nothing more to do really. . .

    end

    ```


    Put all of the code together, and we have an automatic-running game of Snakes
    and Ladders. The idea behind this code is to teach you how to create functions
    that are modular, and that it is mostly Lua code that runs the app; the framework
    is more of glue that allows the glitter to stick.


    In case you are wondering why we do not see any output to the terminal window,
    it is because we need to start the game. We can quickly create a function called
    restart, which will set all the variables to the initial values and then start
    the game for us:


    ```

    function restart()

      init()

      startGame()

    end

    ```


    To run the game, we simply call restart(), and the game runs in the console (see
    [Figure 4-4](#9781430246626_Ch04.xhtml#Fig4)).


    ![9781430246626_Fig04-04.jpg](OEBPS/Images/9781430246626_Fig04-04.jpg)


    [Figure 4-4](#9781430246626_Ch04.xhtml#_Fig4) .  The game running in the console


    Moving a Character


    In any 2D game, you are in control of a character, and this character moves on
    the screen as you tap or swipe the screen of the mobile device. Let’s examine
    the code that makes the character move. The screen is a grid that has two dimensions:
    height and width. Most screens start with (0,0) being the top-left corner of the
    screen, with a positive x value indicating that the character is to the right
    from the origin and a negative value indicating that the character is to the left
    of the origin. Similarly, a positive y indicates that the character is below the
    origin and a negative y indicates that the character is above it. Using this information,
    we can safely deduce that to move a character to the right, we need to add a positive
    increment to the x-coordinate, and to move the character to the left, we add a
    negative increment to the x-coordinate.


    Let’s create the structure for our character as a table structure like a point
    that will hold the x and y position of the character:


    ```

    local point = {x = 0,y = 0}

    -- Initialize the point structure with x and y as 0

    ```


    Now let’s move the character 5 units to the right:


    ```

    local i

    for i = 1,5 do

     point.x = point.x + 1

    end

    ```


    This can also be used to increment the position one pixel a time. However, in
    the preceding example, we could have also used point.x = point.x + 5, like so:


    ```

    print(point.x, point.y)

    ```


    We do not see anything on the screen as yet, as we have not written any code to
    display anything. Some might feel this to be a rather boring method, but if you
    look at it in the larger scheme of things, you shall find that if you can get
    this code working perfectly fine, you can use it with any framework and language.
    This shall help you keep your code as modular and portable as possible.


    Going Offscreen


    One of the most common issues that many beginner developers face is that of how
    to limit a character to a confined space on the screen. The approach with this
    book is a bit different than you might expect. Rather than describing a graphical
    solution, we shall look at the problem in the debug window. Not only will this
    strengthen your debugging skills, but it will also help you look at the data for
    conceptual code, where you might not be able to have a visual representation.


    Let’s bounce a ball on the screen. The ball has x- and y-coordinates in the point
    table structure that we defined earlier. The ball keeps moving in a particular
    direction, and as soon as it reaches the edge of the confining dimensions, it
    bounces in the opposite direction.'
  trans: "\n由于这是“蛇与梯子”游戏，我们还需要检查玩家是否到达了蛇头或梯子底部。当玩家到达蛇头时，会移动到蛇尾；若到达梯子底部，则会移动到梯子顶端。我们通过一个名为\
    \ `specialSquare` 的函数来实现这一检查，该函数接收一个 `square` 参数，并返回蛇尾或梯子顶端对应的方格；如果未触发特殊方格，则直接返回原方格。这样一来，我们便可用较少的代码实现方格数值的设定。\n\
    \n```\nfunction specialSquare(theSquare)\n    local theSquare = theSquare\n  \
    \  local  i\n    for i = 1,#tableSquares do\n        local currSquare = tableSquares[i]\n\
    \        if currSquare.startPos == theSquare then\n            -- 到达了特殊方格\n  \
    \          return currSquare.endPos\n        end\n    end\n    -- 没有特殊方格，直接返回原方格数值\n\
    \    return theSquare\nend\n```\n\n有了这些函数，我们就涵盖了游戏的大部分核心逻辑。其余函数主要用于界面展示，负责处理用户交互及显示更新。\n\
    \n在游戏开始前，我们还需要一个 `init` 函数来设置或重置游戏默认值：\n\n```\nfunction init()\n    -- 清空玩家表格\n\
    \    players = {}\n    playersInGame = 0\nend\n```\n\n首先，我们尝试用两名玩家来测试游戏。最简单的方式如下：\n\
    \n```\nfunction reset()\n  init()\n  addPlayer(\"Jayant\")\n  addPlayer (\"Douglas\"\
    )\nend\n```\n\n概念上所需的大部分代码都已就绪，但我们还需将它们整合起来才能生效。游戏启动时，我们需要一个函数来掷骰子、移动玩家到新方格、切换到下一玩家，并重复这一过程，直到只剩一名玩家。因此，游戏至少需要两名玩家才能开始。\n\
    \n由于我们将在 Lua 终端而非图形框架中运行此游戏，无法使用各种图形和触摸功能。这限制了我们当前示例的交互性。虽然许多游戏提供了丰富的交互体验，但这个游戏并不需要太多。在本游戏中，骰子由程序自动投掷（生成随机数），玩家棋子也由程序移动，所以我们所需的交互仅仅是让玩家在每个阶段点击屏幕以继续，以及点击掷骰子。由于处于文本模式，我们无法获取任何触摸事件，因此游戏看起来更像一个自动运行的模拟程序：它会在终端中依次显示当前轮到哪位玩家、掷出了几点、玩家当前位置，直至最后只剩一名玩家。\n\
    \n```\nfunction startGame()\n    if #players < 2 then return end\n    -- 至少需要两名玩家\n\
    -- 这是我们的检查条件：当只剩一名玩家时，游戏结束\n    while playersInGame > 1 do\n        local thePlayer\
    \ = players[playersTurn]\n        if thePlayer.isPlaying == true then\n      \
    \      print(\"轮到 \" .. thePlayer.name .. \" 行动\")\n            local diceRoll\
    \ = rollDice()\n            print(\"掷出了 \" .. diceRoll)\n            movePlayer(playersTurn,\
    \ diceRoll)\n        end\n        -- 轮到下一个玩家\n        nextPlayer()\n    end\n\
    \    print(\"游戏结束\")\nend\n```\n\n在前面的函数块中，我们可以递增 `playersTurn`，但需要确保 `playersTurn`\
    \ 的值在 1 到最大玩家数之间。同时，还需确保该玩家仍在游戏中。\n\n```\nfunction nextPlayer()\n    playersTurn\
    \ = playersTurn + 1\n    -- 如果当前玩家是最后一名，则循环回第一位\n    if playersTurn > #players\
    \ then playersTurn = 1 end\n    if players[playersTurn].isPlaying == false then\n\
    \        nextPlayer()\n    end\n    -- 全部完成，无需其他操作...\nend\n```\n\n将以上所有代码整合在一起，我们就得到了一个自动运行的“蛇与梯子”游戏。这段代码旨在教你如何创建模块化的函数，并说明运行应用的主要是\
    \ Lua 代码；框架更像是将“光彩”粘合在一起的“胶水”。\n\n如果你好奇为什么终端窗口没有输出任何内容，那是因为我们尚未启动游戏。我们可以快速创建一个名为\
    \ `restart` 的函数，它会将所有变量重置为初始值，然后为我们启动游戏：\n\n```\nfunction restart()\n  init()\n\
    \  startGame()\nend\n```\n\n要运行游戏，只需调用 `restart()`，游戏便会在控制台运行（见图 4-4）。\n\n![9781430246626_Fig04-04.jpg](img/9781430246626_Fig04-04.jpg)\n\
    \n图 4-4. 在控制台运行的游戏\n\n## 移动角色\n\n在任何 2D 游戏中，你控制一个角色，该角色会随着你在移动设备屏幕上的点击或滑动而移动。让我们来研究让角色移动的代码。屏幕是一个具有两个维度（高度和宽度）的网格。大多数屏幕以屏幕左上角为原点\
    \ `(0,0)`，正 `x` 值表示角色位于原点右侧，负值表示位于左侧；同样，正 `y` 值表示角色位于原点下方，负值表示位于上方。基于此，我们可以推断：要向右移动角色，需为\
    \ `x` 坐标增加一个正值；要向左移动，则为 `x` 坐标增加一个负值。\n\n我们来为角色创建一个类似点的表格结构，用于存储角色的 `x` 和 `y`\
    \ 位置：\n\n```\nlocal point = {x = 0,y = 0}\n-- 将点结构初始化为 x = 0, y = 0\n```\n\n现在，将角色向右移动\
    \ 5 个单位：\n\n```\nlocal i\nfor i = 1,5 do\n point.x = point.x + 1\nend\n```\n\n\
    这段代码也可以用于逐像素地递增位置。不过在前面的例子中，我们也可以直接使用 `point.x = point.x + 5`，就像这样：\n\n```\nprint(point.x,\
    \ point.y)\n```\n\n目前我们看不到屏幕上的任何内容，因为我们还没有编写任何显示代码。有些人可能觉得这种方法相当枯燥，但从更大的角度看，你会发现，如果这段代码能完美运行，你就可以在任何框架和语言中使用它。这有助于你保持代码的最大模块化和可移植性。\n\
    \n## 脱离屏幕\n\n许多初级开发者常遇到的一个问题是如何将角色限制在屏幕上的特定区域内。本书采用的方法可能与你预期的略有不同。我们不会描述图形化的解决方案，而是在调试窗口中分析这个问题。这不仅会强化你的调试技能，还能帮助你分析那些可能无法可视化呈现的概念性代码数据。\n\
