  raw: 'If for some particular reason you want to overwrite a value in the read-only
    table, there is a way (but if you have to use it, then the whole point of using
    read-only tables would be lost). The way to do this is to bypass the metatable
    functions of __newindex and set the value directly, as follows:


    ```

    function overrideValue(theTable, theKey, theValue)

      rawset(theTable, theKey, theValue)

    end

    ```


    Implementing a Stack


    In your game you might want to create a stack, place objects on the stack (i.e.,
    *push* them onto the stack), and later remove them (i.e., *pop* them from the
    stack). The usage scenarios for a stack can vary based on how you write the logic
    and code. In some scenarios, you can place all the items you collected on a stack,
    and then at the end of the level, you can award points based on what was collected,
    while removing the items from the stack. To try out this example, place this code
    into a file called stacks.lua.


    ```

    local _stack = {}


    -- Create a table with stack functions

    function _stack:create()


    local theStack = {}

      theStack._entries = {}


    -- push a value onto the stack

      function theStack:push(...)

        if  ... then

          local tArgs = {...}

          -- add these values

          for i,v in pairs(tArgs) do

            table.insert(self._entries, v)

          end

        end

      end


    -- pop a number of values from the stack

      function theStack:pop(num)


    -- get num of values from stack

        local num = num or 1


    -- return table

        local entries = {}


    -- get values into entries

        for i = 1, num do

          -- get last entry

          if #self._entries ~= 0 then

            table.insert(entries, self._entries[#self._entries])

            -- remove last value

            table.remove(self._entries)

          else

            break

          end

        end

        -- return unpacked entries

        return unpack(entries)

      end


    -- get the number of entries on the stack

      function theStack:getn()

        return #self._entries

      end


    -- print the list values on the stack

      function theStack:list()

        for i,v in pairs(self._entries) do

          print(i, v)

        end

      end


    return theStack

    end

    ```


    And using it is as simple as this:


    ```

    myStack = _stack:create()

    myStack:push("A","small","world")

    print(myStack:pop(2))

    myStack:list()

    print(myStack:pop(1))

    ```


    Converting Between Parameters and Tables


    Sometimes functions take a variable number of parameters and sometimes they take
    tables. A simple example would be in the case of colors that are specified as
    a tuple, but in some functions they would be required to be given as r, g, and
    b values instead of the table.


    ```

    local theColor = {255,0,0}

    --[[

      this is easier to specify than

      theColorR = 255

      theColorG = 0

      theColorB = 0

    --]]

    ```


    The functions that accept the color generally take four variables, as in the following
    function:


    ```

    setTheColor(r, g, b, a)

    ```


    theColor, which is a table, cannot be passed to the function, as the function
    expects numbers, not a table. This is easily fixed with the unpack function, as
    follows:


    ```

    setTheColor(unpack(theColor))

    ```


    Converting values into a table is perhaps the easiest approach; we can add them
    to the table using table.insert, like so:


    ```

    table.insert(theTable, param1); table.insert(theTable, param2); table.insert(theTable,
    param3)

    ```


    or by enclosing them in the curly braces, as follows:


    ```

    theTable = {param1, param2, param3}

    ```


    Vector 2D


    This section demonstrates a set of functions that help perform tasks using vectors.
    This book will not get into explaining vectors; however, if you are looking for
    some good reading points, the Vectors for Flash site, at [http://tonypa.pri.ee/vectors/index.html](http://tonypa.pri.ee/vectors/index.html),
    is a good starting point. Place this entire code into a file called vectors.lua.


    ```

    _vec2D = {}


    function _vec2D:new(x, y)

      local _newVec = {x = x, y = y}

      setmetatable(_newVec, { __index = _vec2D } )

      return _newVec

    end


    function _vec2D:magnitude()

     return math.sqrt(self.x * self.x + self.y * self.y)

    end


    function _vec2D:normalize()

      local t = self:magnitude()

      if t > 0 then

        self.x = self.x / t

        self.y = self.y / t

      end

    end


    function _vec2D:limit(theLimit)

      if self.x > theLimit then

        self.x = theLimit

      end


    if self.y > theLimit then

          self.y = theLimit

      end

    end


    function _vec2D:equals(theVec)

      if self.x == theVec.c and self.y == theVec.y

        return true

      else

        return false

      end

    end


    function _vec2D:add(theVec)

      self.x = self.x + theVec.x

      self.y = self.y + theVec.y

    end


    function _vec2D:sub(theVec)

      self.x = self.x - theVec.x

      self.y = self.y - theVec.y

    end


    function _vec2D:multiply(scalar)

      self.x = self.x * scalar

      self.y = self.y * scalar

    end


    function _vec2D:divide(scalar)

      self.x = self.x / scalar

      self.y = self.y / scalar

    end


    function _vec2D:dot(theVec)

      return self.x * theVec.x + self.y * theVec.y

    end


    function _vec2D:dist()

      return math.sqrt((self.x * self.x) + (self.y * self.y))

    end


    function _vec2D:Normalize(theVec)

      local tmpVec = _vec2D:new(theVec.x, theVec.y)

      local vecMag = tmpVec:magnitude()

      if vecMag > 0 then

        tmpVec.x = tmpVec.x / vecMag

        tmpVec.y = tmpVec.y / vecMag

      end

      return tmpVec

    end


    function _vec2D:addVec(theVec, theVec2)

      local tmpVec = Vector2D:new(0,0)

      tmpVec.x = theVec.x + theVec2.x

      tmpVec.y = theVec.y + theVec2.y

      return tmpVec

    end


    function _vec2D:subVec(theVec, theVec2)

      local tmpVec = Vector2D:new(0,0)

      tmpVec.x = theVec.x - theVec2.x

      tmpVec.y = theVec.y - theVec2.y

      return tmpVec

    end


    function _vec2D:multiplyVec(theVec, scalar)

      local tmpVec = Vector2D:new(0,0)

      tmpVec.x = theVec.x * scalar

      tmpVec.y = theVec.y * scalar

      return tmpVec

    end


    function _vec2D:divideVec(theVec, scalar)

      local tmpVec = Vector2D:new(0,0)

      tmpVec.x = theVec.x / scalar

      tmpVec.y = theVec.y / scalar

      return tmpVec

    end


    function _vec2D:distance(theVec, theVec2)

      return math.sqrt((theVec2.x – theVec1.x)^2 + (theVec2.y – theVec1.y)^2)

    end


    return _vec2D

    ```


    Summary


    The functions described in this chapter represent only a small selection of the
    functionality you might need when creating your games. Some of the most frequently
    used functions were included here, and they can be used in many ways. The tips
    and tricks mentioned in this section are generic and do not rely on any particular
    framework, which means that they will work with every Lua-based framework mentioned
    in this book. After you finish reading the next few chapters, which introduce
    the various frameworks, [Chapters 13](#9781430246626_Ch13.xhtml) and [14](#9781430246626_Ch14.xhtml)
    will provide you more details on framework-specific libraries and third-party
    applications to get things done.


    Chapter     8


    Corona SDK


    If you have embarked on the journey to develop cross-platform apps for mobile
    devices, you will have heard of Corona SDK, from Corona Labs (previously called
    Ansca Mobile). It is available for both Windows and Mac OS X (though running it
    on Wine is not reported as stable). A trial version of Corona SDK allows for unlimited
    testing and building for the device (although it includes a trial message). Once
    you purchase a license, you can deploy the apps on the app stores.


    Setting Up Corona SDK


    To start using Corona SDK, you will need to download the trial edition, either
    as a .dmg file (for the Mac) or an .msi file (for Windows), from [https://developer.coronalabs.com/downloads/coronasdk](https://developer.coronalabs.com/downloads/coronasdk).


    To be able to download the file, you will have to register with Corona Labs. You
    can convert the trial version into a full version at any time by simply purchasing
    an appropriate license. There are several licensing options that you can choose
    from. The Indie license ($199) allows you to run one platform, either iOS or Android,
    the Pro license ($399) allows you to run both iOS and Android, and the Enterprise
    license (in the range of $3,000—pricing is on demand from Corona Labs). Details
    on the Enterprise Edition can be found towards the end of the chapter.'
  trans: "\n如果出于某种特殊原因，你想要覆盖只读表中的某个值，有一种方法可以实现（但如果必须使用此方法，那么使用只读表的全部意义也就丧失了）。实现方法是绕过\
    \ `__newindex` 元方法，直接设置该值，具体如下：\n\n```\nfunction overrideValue(theTable, theKey,\
    \ theValue)\n  rawset(theTable, theKey, theValue)\nend\n```\n\n## 实现栈\n\n在你的游戏中，你可能想要创建一个栈，将对象放入栈中（即*压入*栈），然后稍后将其移除（即从栈中*弹出*）。栈的使用场景会根据你编写逻辑和代码的方式而有所不同。在某些场景中，你可以将收集到的所有物品放入一个栈，然后在关卡结束时，根据收集到的物品来奖励分数，同时从栈中移除这些物品。为了尝试这个示例，请将以下代码放入一个名为\
    \ `stacks.lua` 的文件中。\n\n```\nlocal _stack = {}\n\n-- 创建一个包含栈函数的表\nfunction _stack:create()\n\
    \nlocal theStack = {}\n  theStack._entries = {}\n\n-- 将一个值压入栈\n  function theStack:push(...)\n\
    \    if  ... then\n      local tArgs = {...}\n      -- 添加这些值\n      for i,v in\
    \ pairs(tArgs) do\n        table.insert(self._entries, v)\n      end\n    end\n\
    \  end\n\n-- 从栈中弹出指定数量的值\n  function theStack:pop(num)\n\n-- 从栈中获取指定数量的值\n   \
    \ local num = num or 1\n\n-- 返回表\n    local entries = {}\n\n-- 将值获取到 entries 中\n\
    \    for i = 1, num do\n      -- 获取最后一个条目\n      if #self._entries ~= 0 then\n\
    \        table.insert(entries, self._entries[#self._entries])\n        -- 移除最后一个值\n\
    \        table.remove(self._entries)\n      else\n        break\n      end\n \
    \   end\n    -- 返回解包后的条目\n    return unpack(entries)\n  end\n\n-- 获取栈中条目的数量\n\
    \  function theStack:getn()\n    return #self._entries\n  end\n\n-- 打印栈中的列表值\n\
    \  function theStack:list()\n    for i,v in pairs(self._entries) do\n      print(i,\
    \ v)\n    end\n  end\n\nreturn theStack\nend\n```\n\n使用方法非常简单：\n\n```\nmyStack\
    \ = _stack:create()\nmyStack:push(\"A\",\"small\",\"world\")\nprint(myStack:pop(2))\n\
    myStack:list()\nprint(myStack:pop(1))\n```\n\n## 在参数和表之间转换\n\n有时函数需要接受可变数量的参数，有时则需要接受表。一个简单的例子是颜色被指定为元组的情况，但在某些函数中，它们需要以\
    \ `r`、`g` 和 `b` 值的形式给出，而不是表。\n\n```\nlocal theColor = {255,0,0}\n--[[\n  这样指定比以下方式更简单\n\
    \  theColorR = 255\n  theColorG = 0\n  theColorB = 0\n--]]\n```\n\n接受颜色的函数通常接受四个变量，如下函数所示：\n\
    \n```\nsetTheColor(r, g, b, a)\n```\n\n`theColor` 是一个表，无法传递给该函数，因为该函数期望的是数字，而不是表。使用\
    \ `unpack` 函数可以轻松解决此问题，如下所示：\n\n```\nsetTheColor(unpack(theColor))\n```\n\n将值转换为表可能是最简单的方法；我们可以使用\
    \ `table.insert` 将它们添加到表中，如下所示：\n\n```\ntable.insert(theTable, param1); table.insert(theTable,\
    \ param2); table.insert(theTable, param3)\n```\n\n或者用花括号将它们括起来，如下所示：\n\n```\n\
    theTable = {param1, param2, param3}\n```\n\n## 二维向量\n\n本节演示一组有助于使用向量执行任务的函数。本书不会深入解释向量；不过，如果你正在寻找一些好的阅读资料，位于\
    \ [`tonypa.pri.ee/vectors/index.html`](http://tonypa.pri.ee/vectors/index.html)\
    \ 的 Vectors for Flash 网站是一个很好的起点。请将以下全部代码放入一个名为 `vectors.lua` 的文件中。\n\n```\n_vec2D\
    \ = {}\n\nfunction _vec2D:new(x, y)\n  local _newVec = {x = x, y = y}\n  setmetatable(_newVec,\
    \ { __index = _vec2D } )\n  return _newVec\nend\n\nfunction _vec2D:magnitude()\n\
    \ return math.sqrt(self.x * self.x + self.y * self.y)\nend\n\nfunction _vec2D:normalize()\n\
    \  local t = self:magnitude()\n  if t > 0 then\n    self.x = self.x / t\n    self.y\
    \ = self.y / t\n  end\nend\n\nfunction _vec2D:limit(theLimit)\n  if self.x > theLimit\
    \ then\n    self.x = theLimit\n  end\n\nif self.y > theLimit then\n      self.y\
    \ = theLimit\n  end\nend\n\nfunction _vec2D:equals(theVec)\n  if self.x == theVec.c\
    \ and self.y == theVec.y\n    return true\n  else\n    return false\n  end\nend\n\
    \nfunction _vec2D:add(theVec)\n  self.x = self.x + theVec.x\n  self.y = self.y\
    \ + theVec.y\nend\n\nfunction _vec2D:sub(theVec)\n  self.x = self.x - theVec.x\n\
    \  self.y = self.y - theVec.y\nend\n\nfunction _vec2D:multiply(scalar)\n  self.x\
    \ = self.x * scalar\n  self.y = self.y * scalar\nend\n\nfunction _vec2D:divide(scalar)\n\
    \  self.x = self.x / scalar\n  self.y = self.y / scalar\nend\n\nfunction _vec2D:dot(theVec)\n\
    \  return self.x * theVec.x + self.y * theVec.y\nend\n\nfunction _vec2D:dist()\n\
    \  return math.sqrt((self.x * self.x) + (self.y * self.y))\nend\n\nfunction _vec2D:Normalize(theVec)\n\
    \  local tmpVec = _vec2D:new(theVec.x, theVec.y)\n  local vecMag = tmpVec:magnitude()\n\
    \  if vecMag > 0 then\n    tmpVec.x = tmpVec.x / vecMag\n    tmpVec.y = tmpVec.y\
    \ / vecMag\n  end\n  return tmpVec\nend\n\nfunction _vec2D:addVec(theVec, theVec2)\n\
    \  local tmpVec = Vector2D:new(0,0)\n  tmpVec.x = theVec.x + theVec2.x\n  tmpVec.y\
    \ = theVec.y + theVec2.y\n  return tmpVec\nend\n\nfunction _vec2D:subVec(theVec,\
    \ theVec2)\n  local tmpVec = Vector2D:new(0,0)\n  tmpVec.x = theVec.x - theVec2.x\n\
    \  tmpVec.y = theVec.y - theVec2.y\n  return tmpVec\nend\n\nfunction _vec2D:multiplyVec(theVec,\
    \ scalar)\n  local tmpVec = Vector2D:new(0,0)\n  tmpVec.x = theVec.x * scalar\n\
    \  tmpVec.y = theVec.y * scalar\n  return tmpVec\nend\n\nfunction _vec2D:divideVec(theVec,\
    \ scalar)\n  local tmpVec = Vector2D:new(0,0)\n  tmpVec.x = theVec.x / scalar\n\
    \  tmpVec.y = theVec.y / scalar\n  return tmpVec\nend\n\nfunction _vec2D:distance(theVec,\
    \ theVec2)\n  return math.sqrt((theVec2.x – theVec1.x)² + (theVec2.y – theVec1.y)²)\n\
    end\n\nreturn _vec2D\n```\n\n## 总结\n\n本章描述的函数仅代表创建游戏时可能需要的一小部分功能。此处包含了一些最常用的函数，并且它们可以以多种方式使用。本节中提到的技巧和诀窍是通用的，不依赖于任何特定框架，这意味着它们适用于本书中提到的所有基于\
    \ Lua 的框架。在你读完接下来介绍各个框架的几章之后，第 13 章和第 14 章将为你提供更多关于框架特定库和第三方应用程序的详细信息，以帮助你完成工作。\n\
    \n# 第 8 章：Corona SDK\n\n如果你已踏上为移动设备开发跨平台应用的征程，那么你肯定听说过 Corona Labs（之前名为 Ansca\
    \ Mobile）推出的 Corona SDK。它可用于 Windows 和 Mac OS X（但据报道，在 Wine 上运行并不稳定）。Corona SDK\
    \ 的试用版允许进行无限制的测试和为设备构建（尽管会包含试用版消息）。一旦你购买了许可证，就可以将应用部署到应用商店。\n\n## 设置 Corona SDK\n\
    \n要开始使用 Corona SDK，你需要从 [`developer.coronalabs.com/downloads/coronasdk`](https://developer.coronalabs.com/downloads/coronasdk)\
    \ 下载试用版，无论是 `.dmg` 文件（适用于 Mac）还是 `.msi` 文件（适用于 Windows）。\n\n要能够下载该文件，你必须在 Corona\
    \ Labs 注册。你可以随时通过购买合适的许可证将试用版转换为完整版。有几种许可选项可供你选择。Indie 许可证（$199）允许你运行一个平台，无论是\
    \ iOS 还是 Android；Pro 许可证（$399）允许你同时运行 iOS 和 Android；Enterprise 许可证（价格在 $3000 范围——定价需向\
    \ Corona Labs 咨询）。关于 Enterprise 版的详情可以在本章末尾找到。\n"
- fmt: '如果您之前没有使用过 Corona SDK 的经验，第一印象可能会相当令人生畏，因为它不附带任何 IDE 或编辑器。


    ## Corona SDK 的工作原理


    Corona SDK 以*Corona 终端*和*Corona 模拟器*的形式提供。建议通过 Corona 终端启动 Corona SDK。这将启动一个终端（您可以在其中看到所有调试输出），然后终端会自动启动
    Corona 模拟器。SDK 的欢迎屏幕如[图 8-1](#9781430246626_Ch08.xhtml#Fig1) 所示。


    从这里，您可以导航到项目文件所在的目录，模拟器将运行您的代码。


    ![9781430246626_Fig08-01.jpg](OEBPS/Images/9781430246626_Fig08-01.jpg)


    [图 8-1](#9781430246626_Ch08.xhtml#_Fig1) . 启动 Corona SDK 时的欢迎屏幕


    Corona SDK 项目的入口点是`main.lua`文件。该文件与其他项目文件一起用于运行项目。


    ## Corona SDK 的 Hello World


    Corona SDK 的架构如[图 8-2](#9781430246626_Ch08.xhtml#Fig2) 所示：Corona SDK 引擎在模拟器或设备上运行，并利用构成项目的所有资源，包括代码、美术资源、声音等。这些资源都位于模拟器查找入口点的目录中。入口点以`main.lua`文件的形式存在，该文件会被打开并执行。


    ![9781430246626_Fig08-02.jpg](OEBPS/Images/9781430246626_Fig08-02.jpg)


    [图 8-2](#9781430246626_Ch08.xhtml#_Fig2) . Corona SDK 架构


    首先，创建一个新目录`Proj_01`，然后使用您喜欢的文本编辑器，输入以下代码并将其保存为`Proj_01`目录中的`main.lua`。


    ```

    -- Hello world for Corona SDK

    print("Hello World")

    ```


    现在启动 Corona SDK 并点击“模拟器”（Simulator）。然后导航到您刚刚创建的目录并点击“打开”（Open）。这将以一个空白屏幕启动模拟器，但如果您查看终端窗口，您会看到文本`Hello
    World`已显示。


    ## 图形版本


    Corona 引擎由基本的 Lua 库以及其他负责显示、音频、视频等的库组成。[表 8-1](#9781430246626_Ch08.xhtml#Tab1)
    列出了 Corona SDK 中可用的库，这些库构成了 Corona 引擎。


    [表 8-1.](#9781430246626_Ch08.xhtml#_Tab1) Corona SDK 中可用的命名空间


    | 库 | 描述 |

    | --- | --- |

    | `ads` | 所有广告展示库 |

    | `analytics` | 所有与使用分析相关的函数 |

    | `audio` | 所有与音频相关的函数 |

    | `credits` | 所有与虚拟货币相关的函数 |

    | `crypto` | 所有与加密相关的函数 |

    | `display` | 所有与显示元素相关的函数 |

    | `easing` | 用于过渡动画的所有缓动选项 |

    | `facebook` | 所有与 Facebook 相关的函数 |

    | `gameNetwork` | 所有与 Apple Game Center 和 OpenFeint/Gree 相关的函数 |

    | `graphics` | 所有帮助处理显示元素的图形相关函数 |

    | `json` | 所有与读写 JSON 数据相关的函数 |

    | `lfs` | 用于处理文件和文件夹的 Lua 文件系统库 |

    | `media` | 用于显示视频和音频的媒体函数 |

    | `native` | 用于处理设备原生功能（native functionality）的函数 |

    | `network` | 与网络和数据通信相关的函数 |

    | `physics` | Box2D 相关的物理库 |

    | `socket` | 允许进行所有 TCP 和 UDP 套接字通信的 LuaSocket 库 |

    | `sprite` | 用于处理精灵（sprite）库的函数 |

    | `sqlite3` | 允许访问 SQLite3 数据库的函数 |

    | `store` | 所有与应用内购买相关的函数 |

    | `storyboard` | 所有与故事板（storyboard）相关的函数 |

    | `timer` | 所有与定时器相关的函数 |

    | `transition` | 所有用于执行过渡动画的函数 |

    | `widget` | 所有用于创建小部件的函数 |


    关于这些库和函数的更多详细信息，Corona Labs 网站上的在线 API 参考非常有用（请参见 [http://docs.coronalabs.com/api/](http://docs.coronalabs.com/api/)）。它列出了
    API，如果有任何新增内容，此在线参考提供了所有最新的 API 更新。


    ## 在屏幕上显示 Hello World


    在本练习中，让我们在设备上显示“Hello World”，让世界看到（[图 8-3](#9781430246626_Ch08.xhtml#Fig3)）。我们将使用一个警告框在设备上显示“Hello
    World”，而不是在终端中显示。


    ```

    native.showAlert("Hello World", "via the showAlert", {"OK"})

    ```


    ![9781430246626_Fig08-03.jpg](OEBPS/Images/9781430246626_Fig08-03.jpg)


    [图 8-3](#9781430246626_Ch08.xhtml#_Fig3) . 在 iOS 设备的警告对话框中显示的“Hello World”


    这是向用户显示信息最简单、最快捷的方式，无需费心创建显示对象。最棒的是，它会根据您运行应用的平台自动适应原生样式。


    ## 在设备上显示 Hello World


    `display`命名空间中的函数用于创建基本的显示对象，包括图像、文本、矩形、圆角矩形、圆形、线条、组等。首先，我们将创建一个文本对象并将其显示在屏幕上。


    ```

    local lblText = display.newText("Hello World",10,50)

    ```


    这一行代码将创建一个新的文本对象，其中包含文本`Hello World`，并将其放置在屏幕上的 (10, 50) 位置，使用默认的系统字体，如[图 8-4](#9781430246626_Ch08.xhtml#Fig4)
    所示。`newText`函数的语法如下：


    ```

    display.newText( [parentGroup,] string, left, top, font, size )

    display.newText( [parentGroup,] string, left, top, [width, height,] font, size
    )

    ```


    在任何时候，您都可以为设备构建应用程序并在设备上运行，而不是在模拟器中运行。要能够将构建好的应用上传到 iOS 设备，您需要加入 Apple 的 iOS 开发者计划，并拥有必要的证书来签名应用，以便能够上传到设备。在
    Android 上，这应该不是问题，您可以构建一个 APK 并上传到 Android 设备。


    ![9781430246626_Fig08-04.jpg](OEBPS/Images/9781430246626_Fig08-04.jpg)


    [图 8-4](#9781430246626_Ch08.xhtml#_Fig4) . 在设备上作为标签显示的“Hello World”


    ## 超越 Hello World：在屏幕上创建一个矩形


    以同样的方式，我们可以在屏幕上创建一个矩形，如[图 8-5](#9781430246626_Ch08.xhtml#Fig5) 所示。


    ```

    local rect_01 = display.newRect( 50, 50, 200, 200 )

    ```


    ![9781430246626_Fig08-05.jpg](OEBPS/Images/9781430246626_Fig08-05.jpg)


    [图 8-5](#9781430246626_Ch08.xhtml#_Fig5) . 设备上带有默认填充颜色的矩形


    这将在屏幕上创建一个矩形，该矩形位于 (50, 50) 位置，尺寸为 200x200。当创建显示元素时，它们会被分配默认设置；因此，即使我们没有指定填充，也会在屏幕上看到一个白色矩形。


    我们可以更改一些属性，例如填充颜色、轮廓颜色、透明度（alpha），以及矩形的缩放和旋转。让我们修改矩形来操作所有这些属性。


    ```

    rect_01:setFillColor(255,0,0)

    ```


    `setFillColor`接受四个值作为颜色：红色（R）、绿色（G）、蓝色（B）和可选的透明度（A）。颜色的值范围是 0 到 255，透明度默认为不透明（255）。


    我们可以通过指定描边颜色和描边线宽来为矩形添加轮廓，如下所示：


    ```

    rect_01.strokeWidth = 2

    rect_01:setStrokeColor(0,255,0)

    ```


    `strokeWidth`设置描边线（轮廓）的宽度；将其设置为 0 相当于为对象指定无边框或无轮廓。`setStrokeColor`在参数方面与`setFillColor`类似。这些颜色以
    RGBA 格式指定。


    我们可以使用缩放函数来缩放矩形。'
  raw: 'If you have no previous experience with Corona SDK, the first impressions
    can be quite intimidating, as there is no IDE or editor whatsoever.


    How Corona SDK Works


    Corona SDK is offered as *Corona terminal* and *Corona simulator*. It is advisable
    to launch Corona SDK using Corona terminal. This will start up a terminal (where
    you can see all the debugging output), and this will in turn start Corona simulator.
    The welcome screen for the SDK is shown in [Figure 8-1](#9781430246626_Ch08.xhtml#Fig1).


    From here you can navigate to the directory where your project files are and the
    simulator will run your code.


    ![9781430246626_Fig08-01.jpg](OEBPS/Images/9781430246626_Fig08-01.jpg)


    [Figure 8-1](#9781430246626_Ch08.xhtml#_Fig1) .  The welcome screen when you start
    Corona SDK


    The entry point for a Corona SDK project is the main.lua file. This, along with
    the other project files, is used to run the project.


    Hello World for Corona SDK


    The architecture of Corona SDK, shown in [Figure 8-2](#9781430246626_Ch08.xhtml#Fig2),
    is as follows: the Corona SDK engine runs in the simulator or on the device and
    runs with all the resources that make up the project, including the code, artwork,
    sound, and so on. These resources all reside in a directory from which the simulator
    looks for the entry point. The entry point is in the form of the main.lua file
    that is opened and executed.


    ![9781430246626_Fig08-02.jpg](OEBPS/Images/9781430246626_Fig08-02.jpg)


    [Figure 8-2](#9781430246626_Ch08.xhtml#_Fig2) .  The Corona SDK architecture


    First, create a new directory, Proj_01, and with the text editor of your choice,
    type the following code and save it as main.lua in the Proj_01 directory.


    ```

    -- Hello world for Corona SDK

    print("Hello World")

    ```


    Now start Corona SDK and click Simulator. Then navigate to the directory you just
    created and click Open. This will start the simulator with a blank screen, but
    if you look at the terminal window, you’ll see the text Hello World displayed.


    Graphic Version


    The Corona Engine is made up of the basic Lua libraries and other libraries that
    are responsible for display, audio, video, etc. [Table 8-1](#9781430246626_Ch08.xhtml#Tab1)
    provides a list of the libraries that are available with Corona SDK that make
    up the Corona Engine.


    [Table 8-1.](#9781430246626_Ch08.xhtml#_Tab1) The Namespaces Available in Corona
    SDK


    | Library | Description |

    | --- | --- |

    | ads | All ad-displaying libraries |

    | analytics | All functions relating to using analytics |

    | audio | All audio-related functions |

    | credits | All functions related to virtual currency |

    | crypto | All crypto-related functions |

    | display | All functions related to display elements |

    | easing | All easing-related options used in transitions |

    | facebook | All Facebook-related functions |

    | gameNetwork | All functions relating to Apple Game Center and OpenFeint/Gree
    |

    | graphics | All graphics-related functions that help with the display elements
    |

    | json | All functions related to reading and writing JSON data |

    | lfs | The Lua file system library for dealing with files and folders |

    | media | The media functions to display video and audio |

    | native | The functions to deal with native functionality of the devices |

    | network | The functions related to the network and data communications |

    | physics | The Box2D-related physics libraries |

    | socket | The LuaSocket library to allow for all TCP and UDP socket communication
    |

    | sprite | The functions to work with sprite libraries |

    | sqlite3 | The functions that allow for SQLite3 database access |

    | store | All functions related to in-app purchases |

    | storyboard | All functions related to storyboards |

    | timer | All functions related to timers |

    | transition | All functions for performing transitions |

    | widget | All functions for creating widgets |


    For more details on the libraries and functions, the online API reference found
    on the Corona Labs web site is quite useful (see [http://docs.coronalabs.com/api/](http://docs.coronalabs.com/api/)).
    It lists the API and if there are any additions, this online reference provides
    all of the latest updates to the API.


    Hello World on the Screen


    In this exercise, let’s display “Hello World” on the device for the world to see
    ([Figure 8-3](#9781430246626_Ch08.xhtml#Fig3)). We shall use an alert box to display
    “Hello World” on the device, instead of the terminal.


    native.showAlert("Hello World", "via the showAlert", {"OK"})


    ![9781430246626_Fig08-03.jpg](OEBPS/Images/9781430246626_Fig08-03.jpg)


    [Figure 8-3](#9781430246626_Ch08.xhtml#_Fig3) .  “Hello World” displayed in an
    alert dialog on the iOS device


    This is the easiest and the quickest way to display information to the user without
    the hassle of creating display objects. The best part is that this adapts natively
    to the platform you are running the app on.


    Hello World on the Device


    The display namespace has functions to create basic display objects, including
    images, text, rectangles, rounded rectangles, circles, lines, groups, and so forth.
    To begin, we’ll create a text object and display it on the screen.


    ```

    local lblText = display.newText("Hello World",10,50)

    ```


    This one line will place a new text object with the text Hello World on the screen
    at locations 10 and 50 in the default system font as can be seen in [Figure 8-4](#9781430246626_Ch08.xhtml#Fig4).
    The syntax of the function newText is as follows:


    ```

    display.newText( [parentGroup,] string, left, top, font, size )

    display.newText( [parentGroup,] string, left, top, [width, height,] font, size
    )

    ```


    At any point, you can build the application for the device and run it on the device
    rather than running it in the simulator. To be able to upload a built app onto
    an iOS device, you will need to be enrolled in Apple’s iOS Developer Program and
    have the necessary certificate to sign the app to be able to upload to the device.
    On Android, this should not be an issue, and you can build an APK that can be
    uploaded to the Android device.


    ![9781430246626_Fig08-04.jpg](OEBPS/Images/9781430246626_Fig08-04.jpg)


    [Figure 8-4](#9781430246626_Ch08.xhtml#_Fig4) .  “Hello World” displayed as a
    label on the device


    Beyond Hello World: Creating a Rectangle on the Screen


    In the same manner, we can create a rectangle on the screen, as shown in [Figure
    8-5](#9781430246626_Ch08.xhtml#Fig5).


    ```

    local rect_01 = display.newRect( 50, 50, 200, 200 )

    ```


    ![9781430246626_Fig08-05.jpg](OEBPS/Images/9781430246626_Fig08-05.jpg)


    [Figure 8-5](#9781430246626_Ch08.xhtml#_Fig5) .  A rectangle on the device with
    the default fill colors


    This shall create a rectangle on the screen that is placed at position 50, 50
    and has the dimensions 200×200\. The display elements, when created, are assigned
    the default settings; therefore, we see a white rectangle on the screen even if
    we do not specify a fill.


    We can change some of the attributes, such as the fill color, outline color, and
    alpha (transparency), as well as the scale and the rotation of the rectangle.
    Let’s modify the rectangle to manipulate all of these.


    ```

    rect_01:setFillColor(255,0,0)

    ```


    setFillColortakes the color as four values: red (R), green (G), blue (B), and
    the optional alpha (A). The values for the colors are in the range of 0 to 255,
    and the alpha is opaque (255) by default.


    We can add an outline to the rectangle by specifying the stroke color and the
    stroke line width, as follows:


    ```

    rect_01.strokeWidth = 2

    rect_01:setStrokeColor(0,255,0)

    ```


    strokeWidthsets the width of the stroke line (outline); setting it to 0 is equivalent
    to specifying no border or outline for the object. setStrokeColor is similar to
    setFillColor in terms of the arguments it takes. These are colors specified in
    the RGBA format.


    We can scale the rectangle using the scale function.'
  trans: '

    如果您之前没有使用过 Corona SDK 的经验，第一印象可能会相当令人生畏，因为它不附带任何 IDE 或编辑器。


    ## Corona SDK 的工作原理


    Corona SDK 以*Corona 终端*和*Corona 模拟器*的形式提供。建议通过 Corona 终端启动 Corona SDK。这将启动一个终端（您可以在其中看到所有调试输出），然后终端会自动启动
    Corona 模拟器。SDK 的欢迎屏幕如图 8-1 所示。


    从这里，您可以导航到项目文件所在的目录，模拟器将运行您的代码。


    ![9781430246626_Fig08-01.jpg](img/9781430246626_Fig08-01.jpg)


    图 8-1 . 启动 Corona SDK 时的欢迎屏幕


    Corona SDK 项目的入口点是`main.lua`文件。该文件与其他项目文件一起用于运行项目。


    ## Corona SDK 的 Hello World


    Corona SDK 的架构如图 8-2 所示：Corona SDK 引擎在模拟器或设备上运行，并利用构成项目的所有资源，包括代码、美术资源、声音等。这些资源都位于模拟器查找入口点的目录中。入口点以`main.lua`文件的形式存在，该文件会被打开并执行。


    ![9781430246626_Fig08-02.jpg](img/9781430246626_Fig08-02.jpg)


    图 8-2 . Corona SDK 架构


    首先，创建一个新目录`Proj_01`，然后使用您喜欢的文本编辑器，输入以下代码并将其保存为`Proj_01`目录中的`main.lua`。


    ```

    -- Hello world for Corona SDK

    print("Hello World")

    ```


    现在启动 Corona SDK 并点击“模拟器”（Simulator）。然后导航到您刚刚创建的目录并点击“打开”（Open）。这将以一个空白屏幕启动模拟器，但如果您查看终端窗口，您会看到文本`Hello
    World`已显示。


    ## 图形版本


    Corona 引擎由基本的 Lua 库以及其他负责显示、音频、视频等的库组成。表 8-1 列出了 Corona SDK 中可用的库，这些库构成了 Corona
    引擎。


    表 8-1. Corona SDK 中可用的命名空间


    | 库 | 描述 |

    | --- | --- |

    | `ads` | 所有广告展示库 |

    | `analytics` | 所有与使用分析相关的函数 |

    | `audio` | 所有与音频相关的函数 |

    | `credits` | 所有与虚拟货币相关的函数 |

    | `crypto` | 所有与加密相关的函数 |

    | `display` | 所有与显示元素相关的函数 |

    | `easing` | 用于过渡动画的所有缓动选项 |

    | `facebook` | 所有与 Facebook 相关的函数 |

    | `gameNetwork` | 所有与 Apple Game Center 和 OpenFeint/Gree 相关的函数 |

    | `graphics` | 所有帮助处理显示元素的图形相关函数 |

    | `json` | 所有与读写 JSON 数据相关的函数 |

    | `lfs` | 用于处理文件和文件夹的 Lua 文件系统库 |

    | `media` | 用于显示视频和音频的媒体函数 |

    | `native` | 用于处理设备原生功能（native functionality）的函数 |

    | `network` | 与网络和数据通信相关的函数 |

    | `physics` | Box2D 相关的物理库 |

    | `socket` | 允许进行所有 TCP 和 UDP 套接字通信的 LuaSocket 库 |

    | `sprite` | 用于处理精灵（sprite）库的函数 |

    | `sqlite3` | 允许访问 SQLite3 数据库的函数 |

    | `store` | 所有与应用内购买相关的函数 |

    | `storyboard` | 所有与故事板（storyboard）相关的函数 |

    | `timer` | 所有与定时器相关的函数 |

    | `transition` | 所有用于执行过渡动画的函数 |

    | `widget` | 所有用于创建小部件的函数 |


    关于这些库和函数的更多详细信息，Corona Labs 网站上的在线 API 参考非常有用（请参见 [`docs.coronalabs.com/api/`](http://docs.coronalabs.com/api/)）。它列出了
    API，如果有任何新增内容，此在线参考提供了所有最新的 API 更新。


    ## 在屏幕上显示 Hello World


    在本练习中，让我们在设备上显示“Hello World”，让世界看到（图 8-3）。我们将使用一个警告框在设备上显示“Hello World”，而不是在终端中显示。


    ```

    native.showAlert("Hello World", "via the showAlert", {"OK"})

    ```


    ![9781430246626_Fig08-03.jpg](img/9781430246626_Fig08-03.jpg)


    图 8-3 . 在 iOS 设备的警告对话框中显示的“Hello World”


    这是向用户显示信息最简单、最快捷的方式，无需费心创建显示对象。最棒的是，它会根据您运行应用的平台自动适应原生样式。


    ## 在设备上显示 Hello World


    `display`命名空间中的函数用于创建基本的显示对象，包括图像、文本、矩形、圆角矩形、圆形、线条、组等。首先，我们将创建一个文本对象并将其显示在屏幕上。


    ```

    local lblText = display.newText("Hello World",10,50)

    ```


    这一行代码将创建一个新的文本对象，其中包含文本`Hello World`，并将其放置在屏幕上的 (10, 50) 位置，使用默认的系统字体，如图 8-4 所示。`newText`函数的语法如下：


    ```

    display.newText( [parentGroup,] string, left, top, font, size )

    display.newText( [parentGroup,] string, left, top, [width, height,] font, size
    )

    ```


    在任何时候，您都可以为设备构建应用程序并在设备上运行，而不是在模拟器中运行。要能够将构建好的应用上传到 iOS 设备，您需要加入 Apple 的 iOS 开发者计划，并拥有必要的证书来签名应用，以便能够上传到设备。在
    Android 上，这应该不是问题，您可以构建一个 APK 并上传到 Android 设备。


    ![9781430246626_Fig08-04.jpg](img/9781430246626_Fig08-04.jpg)


    图 8-4 . 在设备上作为标签显示的“Hello World”


    ## 超越 Hello World：在屏幕上创建一个矩形


    以同样的方式，我们可以在屏幕上创建一个矩形，如图 8-5 所示。


    ```

    local rect_01 = display.newRect( 50, 50, 200, 200 )

    ```


    ![9781430246626_Fig08-05.jpg](img/9781430246626_Fig08-05.jpg)


    图 8-5 . 设备上带有默认填充颜色的矩形


    这将在屏幕上创建一个矩形，该矩形位于 (50, 50) 位置，尺寸为 200x200。当创建显示元素时，它们会被分配默认设置；因此，即使我们没有指定填充，也会在屏幕上看到一个白色矩形。


    我们可以更改一些属性，例如填充颜色、轮廓颜色、透明度（alpha），以及矩形的缩放和旋转。让我们修改矩形来操作所有这些属性。


    ```

    rect_01:setFillColor(255,0,0)

    ```


    `setFillColor`接受四个值作为颜色：红色（R）、绿色（G）、蓝色（B）和可选的透明度（A）。颜色的值范围是 0 到 255，透明度默认为不透明（255）。


    我们可以通过指定描边颜色和描边线宽来为矩形添加轮廓，如下所示：


    ```

    rect_01.strokeWidth = 2

    rect_01:setStrokeColor(0,255,0)

    ```


    `strokeWidth`设置描边线（轮廓）的宽度；将其设置为 0 相当于为对象指定无边框或无轮廓。`setStrokeColor`在参数方面与`setFillColor`类似。这些颜色以
    RGBA 格式指定。


    我们可以使用缩放函数来缩放矩形。

