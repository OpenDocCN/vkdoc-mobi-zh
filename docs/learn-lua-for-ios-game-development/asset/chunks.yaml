    text:setPosition(10,50)

    text:setTextColor(0xff0000)

    stage:addChild(text)

    text:setText("Hello from Gideros Studio")

    -- Change the text

    text:setScale(2,2)

    ```


    When this is run, the player displays the text “Hello from Gideros Studio” in
    red and at twice the size of the default font, as shown in [Figure 9-12](#9781430246626_Ch09.xhtml#Fig12).


