    \ program flow used to be linear. The code would run from the first line and continue\
    \ until it reached the last line and the program ended. This worked best for the\
    \ technology of the times. However, with today’s touch screens and GUI-based apps,\
    \ the linear flow model does not fit. We might have a touch or an event at any\
    \ point in time, so applications are no longer necessarily synchronous in their\
    \ flow. Events can occur and need to be handled at various times in an app’s life\
    \ cycle.\n\nTo enable us to use GUI-based applications, the concept of *event-based\
    \ programming* was introduced. As shown in the diagram in [Figure 8-8](#9781430246626_Ch08.xhtml#Fig8),\
    \ in this type of processing, an event occurs and is passed to the application\
    \ to be processed, and based on the event type, the application does what’s necessary.\
    \ In our case, the most commonly used event that we shall be working with is the\
