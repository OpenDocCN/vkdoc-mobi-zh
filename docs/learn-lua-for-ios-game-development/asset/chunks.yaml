    \ 模式\n\n如果您是开发新手，或者没有使用过内置模式匹配或类似正则表达式功能的语言，那么您可能想知道什么是模式。Lua 中有四个基本概念：\n\n* \
    \  字符类\n*   模式项\n*   模式\n*   捕获\n\n#### 字符类\n\n字符类用于表示一组字符，可以是以下任意一种：\n\n*   `x`：表示字符`x`本身，而不是魔术字符`^`、`$`、`(`、`)`、`%`、`.`、`[`、`]`、`*`、`+`、`-`、`?`\n\
    *   `.`：功能类似于通配符，表示所有字符\n*   `%a`：表示所有字母\n*   `%c`：表示所有控制字符\n*   `%d`：表示所有数字\n\
    *   `%l`：表示所有小写字母\n*   `%p`：表示所有标点字符\n*   `%s`：表示所有空格字符\n*   `%u`：表示所有大写字母\n*\
    \   `%w`：表示所有字母数字字符\n*   `%x`：表示所有十六进制字符\n*   `%z`：表示值为`0`的字符\n*   `%*x*`：允许您转义任何魔术字符（注意，`*x*`不是字面字符`x`，而是任何非字母数字字符）\n\
    *   `[*set*]`：表示集合`*set*`中所有字符的并集。字符范围可以用连字符（`-`）指定，如`[0-9]`或`[a-z]`。\n*   `[*^set*]`：表示集合`*set*`的补集。所以，`[⁰-9]`表示所有不在`0`到`9`范围内的字符。\n\
    \n对于所有由单个字母表示的类（例如`%a`、`%c`、`%s`等），相应的大写字母表示该类的补集。因此，`%S`表示所有非空格字符。\n\n#### 模式项\n\
    \n模式项是一个单一的字符类，用于匹配该类中的任意单个字符。\n\n有一些字符有助于量化匹配：\n\n*   `*`：匹配该类中字符的零次或多次重复。这将始终返回最长的可能序列。\n\
    *   `+`：匹配该类中字符的一次或多次重复。这将返回最长的可能序列。\n*   `-`：也匹配该类中字符的零次或多次重复，但与`*`不同，它将匹配最短的可能序列。\n\
    *   `?`：匹配该类中字符的零次或一次出现。\n\n#### 模式\n\n模式是一系列模式项。脱字符（`^`）表示模式的开头，`$`符号指定模式的结尾。在其他位置，它们没有特殊含义，仅代表自身。\n\
    \n#### 捕获\n\n一个模式可以包含用圆括号括起来的子模式；这些被称为捕获。当匹配成功时，匹配所捕获的子字符串会被存储（捕获）以供后续使用。捕获根据其左括号进行编号。在模式`\"\
    (a*(.)%w(%s*))\"`中，匹配`\"(a*(.)%w(%s*))\"`的字符串部分存储为第一个捕获，匹配点号（`.`）的字符存储为第二个捕获，匹配`%s*`的部分存储为第三个捕获。\n\
    \n### 使用字符串函数\n\n虽然我们可以将文本存储为字符串并打印到屏幕上，但有时我们也需要操作或转换它们。使用前面描述的一些 Lua 函数，我们可以做到这一点。\n\
    \n#### 将字符串转换为大写\n\n如前所述，将字符串转换为大写的函数非常简单。下面是一个使其更易于使用的函数：\n\n```\nfunction upper(theString)\n\
    \    return string.upper(theString)\nend\n```\n\n#### 将字符串转换为小写\n\n这与前一个函数类似。\n\
    \n```\nfunction lower(theString)\n    return string.lower(theString)\nend\n```\n\
    \n#### 将字符串转换为首字母大写\n\n此函数将字符串转换为首字母大写格式，其中所有单词的第一个字符都大写：\n\n```\nfunction title_case(theString)\n\
    \  return (theString:gsub(\"^%a\", string.upper):gsub(\"%s + %a\", string.upper))\n\
    end\n```\n\n或者，我们可以让函数以面向对象的方式工作，直接作为字符串命名空间的一部分来调用，如下所示：\n\n```\ntString = \"\
    hello how are you?\"\ntString:title_case()\n```\n\n为此，我们需要按如下方式声明该函数：\n\n```\n\
    function string:title_case()\n    return (self:gsub(\"^%a\", string.upper):gsub(\"\
    %s + %a\", string.upper))\nend\n```\n\n#### 填充字符串\n\n在处理文本时，有时需要对文本进行填充。此函数有助于通过填充来创建特定长度的字符串：\n\
    \n```\nfunction pad(s, width, padder)\n  padder = string.rep(padder or \" \",\
    \ math.abs(width))\n  if width < 0 then return string.sub(padder .. s, width)\
    \ end\n  return string.sub(s .. padder, 1, width)\nend\n```\n\n此函数兼顾了左填充和右填充。对于左填充，我们只需传递一个负数长度，如下面代码中的第二个示例所示：\n\
    \n```\nprint(pad(\"hello\",20))\nprint(pad(\"hello\",-10,\"0\"))\n```\n\n####\
    \ CSV 功能\n\n在创建游戏时，可能需要以 CSV（逗号分隔值）格式保存数据，其中数据存储为用逗号分隔的值组成的长字符串。CSV 函数可以帮助您在表和\
    \ CSV 格式之间进行转换。\n\n##### 将 CSV 字符串转换为表\n\n第一个示例将 CSV 格式的字符串解析并转换为表：\n\n```\n--\
    \ Convert from CSV string to table (converts a single line of a CSV file)\nfunction\
    \ fromCSV (s)\n    s = s .. ','        -- ending comma\n    local t = {}     \
    \   -- table to collect fields\n    local fieldstart = 1\n    repeat\n    -- next\
    \ field is quoted? (start with `\"'?)\n    if string.find(s, '^\"', fieldstart)\
    \ then\n        local a, c\n        local i  = fieldstart\n        repeat\n  \
    \      -- find closing quote\n              a, i, c = string.find(s, '\"(\"?)',\
    \ i + 1)\n        until c ~ = '\"'    -- quote not followed by quote?\n      \
    \  if not i then error('unmatched \"') end\n            local f = string.sub(s,\
    \ fieldstart + 1, i-1)\n            table.insert(t, (string.gsub(f, '\"\"', '\"\
    ')))\n            fieldstart = string.find(s, ',', i) + 1\n        else      \
    \        -- unquoted; find next comma\n            local nexti = string.find(s,\
    \ ',', fieldstart)\n            table.insert(t, string.sub(s, fieldstart, nexti-1))\n\
    \            fieldstart = nexti + 1\n        end\n    until fieldstart > string.len(s)\n\
    \    return t\nend\n```\n\n##### 从表转换为 CSV\n\n下一个函数将表转换为 CSV 格式。这对于将表数据导出为诸如 Excel\
    \ 等电子表格程序可以打开和读取的文件非常有用。\n\n```\n-- Convert from table to CSV string\nfunction\
    \ toCSV (tt)\n    local s = \"\"\n    for _,p in pairs(tt) do\n        s = s ..\
    \ \",\" .. escapeCSV(p)\n    end\n    return string.sub(s, 2)      -- Remove first\
    \ comma\nend\n```\n\n##### 转义 CSV\n\n此处的转义与避免不同，而是指替换字符或更改它们以用作字符串。以下是转义 CSV 格式数据的一个示例：\n\
    \n```\n-- Used to escape \"'s by toCSV\nfunction escapeCSV (s)\n    if string.find(s,\
    \ '[,\"]') then\n        s = '\"' .. string.gsub(s, '\"', '\"\"') .. '\"'\n  \
    \  end\n    return s\nend\n```\n"
