    函数`dec`没有获得`byVal`的值，因此`byVal`为`nil`。在函数中，我们首先声明一个局部变量并将其赋值为`byVal`，由于它是`nil`，我们将其赋值为1。然后我们返回`theVar`减去`byVal`的值。\n\
