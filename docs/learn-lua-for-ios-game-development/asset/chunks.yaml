    Application Settings – conf.lua


    LÖVE allows you to configure the settings for the application. To do so, you need
    a conf.lua file and it has to contain a love.conf function. If the conf.lua file
    is present, it is run before main.lua is.


    We can create an application window of any size we choose. This example sets the
    application to a mobile-app screen size of 320×480 (see [Figure 11-10](#9781430246626_Ch11.xhtml#Fig10)).


    ![9781430246626_Fig11-10.jpg](OEBPS/Images/9781430246626_Fig11-10.jpg)


    [Figure 11-10](#9781430246626_Ch11.xhtml#_Fig10) .  Running the application with
    mobile-app dimensions


    ```

    function love.conf(t)

      t.screen.width = 320

      t.screen.height = 480

      t.title = "iPhone3"

      t.author = "Jayant C Varma"

    end

    ```


    Some of the other settings that can be added to the love.conf function are t.screen.fullscreen
    which can be either true or false.


    You can also use the module settings to enable or disable certain modules. Here
    are some examples:


    ```

    t.modules.joystick =false

    t.modules.keyboard = true

    t.modules.event = true

    t.modules.physics = false

    ```


    Creating Effects


    LÖVE comes prepackaged with particle effects, so you can create many spectacular
    effects in your app or game, including smoke trails, fog, and snow.


    To create particles, we need to create a *particle emitter*—a source that will
    emit a particle. Then we need to set the parameters on what our particle is like
    (e.g., how fast it moves, its lifespan, how long it takes to decay, what kind
    of particle is it, etc.).


    ```

    function love.load()

      img = love.graphics.newImage("part2.png")

      p = love.graphics.newParticleSystem(img, 256)

      -- This creates a new particle emitter that emits particles

      -- with the image img and shall have a maximum of 256 particles.

      p:setEmissionRate (20)

      p:setLifetime(1)

      p:setParticleLife(4)

      p:setPosition(50,50)

      p:setDirection(0)

      p:setSpread(2)

      p:setSpeed(10,30)

      p:setGravity(30)

      p:setRadialAcceleration(10)

      p:setTangentialAcceleration(0)

      p:setSize(1)

      p:setSizeVariation(0.5)

      p:setRotation(0)

      p:setSpin(0)

      p:setSpinVariation(0)

      p:setColor(200,200,255,240,255,255,255,10)

      p:stop()

    end


    function love.update(dt)

      p:start()  -- Create a particle burst

      p:update(dt) -- Update the particle’s position as required

    end


    function love.draw()

      love.graphics.draw(p, 20, 0)

    end

    ```


    If you want to move the particle emitter with the mouse, you can simply change
    the love.update function to the following:


    ```

    function love.update(dt)

      p:setLocation(love.mouse:getX(), love.mouse:getY())

      p:start()  -- Create a particle burst

      p:update(dt) -- Update the particle’s position as required

    end

    ```


    This will now move the particle emitter to the location of the mouse cursor. If
    you want to remove the pointer, add this line to the love.load function:


    ```

    love.mouse.setVisible(false)

    ```


    As shown in [Figure 11-11](#9781430246626_Ch11.xhtml#Fig11), this creates a particle
    emitter that spews particles. You can play with the various setGravity values;
    for example, a negative number will make the particles float. You can also play
    with setSize to make the particles bigger or smaller, and setColor to change the
    color of the particles.


    ![9781430246626_Fig11-11.jpg](OEBPS/Images/9781430246626_Fig11-11.jpg)


    [Figure 11-11](#9781430246626_Ch11.xhtml#_Fig11) .  Particle effects following
    the mouse pointer'
