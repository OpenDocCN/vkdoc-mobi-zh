    \ body 上；这将显示图像而不是物理 body。\n\n```\nimage = MOAIProp2D.new()\nimage:setDeck(texture)\n\
    image:setParent(body)\nlayer:insertProp(image)\n```\n\n## Moai Cloud\n\n当您登录 Moai\
    \ 帐户时，会看到 Moai 仪表板，您可以在其中设置云帐户并选择其他选项。您可以在此处创建的云服务完全独立于您是否使用 Moai 或任何其他框架或浏览器来使用这些服务。\n\
    \n### 创建 Web 服务\n\n让我们从创建一个 Web 服务开始。您可以通过在 Moai 云服务下单击“创建服务”按钮，从仪表板创建该服务。图 10-13\
    \ 显示了创建服务的屏幕；您主要需要提供一个应用程序名称，同时接受剩余的默认设置。\n\n![9781430246626_Fig10-13.jpg](img/9781430246626_Fig10-13.jpg)\n\
    \n图 10-13 在 Moai 仪表板中创建新服务\n\n创建服务后，您会看到一个屏幕，允许您创建另一个服务或编辑现有服务。注意图 10-14 中，我们称为`Test01`的服务状态为“未部署”，这意味着它在\
    \ Web 上不可用。为了能够访问它，我们需要部署它。\n\n![9781430246626_Fig10-14.jpg](img/9781430246626_Fig10-14.jpg)\n\
    \n图 10-14 创建服务后的仪表板\n\n首先单击“编辑”按钮以编辑此服务的设置，如图 10-15 所示。对于最简单的服务，我们无需更改任何内容；只需单击“部署服务”即可。\n\
    \n![9781430246626_Fig10-15.jpg](img/9781430246626_Fig10-15.jpg)\n\n图 10-15 Moai\
    \ 云服务的属性\n\n一旦我们单击“部署服务”，该服务即可使用。注意顶部的 URL；在此示例中，它设置为`http://services.moaicloud.com/USERNAME/test`。您需要为您自己的服务使用该\
    \ URL。如果您打开一个新的浏览器窗口并导航到该 URL，您将看到显示文本“hello world!”。\n"
- fmt: "如果你想要修改并创建一个更好、更有用的 Web 服务，可以点击右上角资源（Resources）下的“编辑文件”（Edit Files）链接，如图 [Figure\
    \ 10-15](#9781430246626_Ch10.xhtml#Fig15) 所示。这将打开一个代码编辑器，允许你编写 Lua 代码。其中唯一存在的文件是\
    \ `main.lua`，包含以下代码：\n\n```\nfunction main(web,req)\n    web:page('hello world!',\
    \ 200, 'OK')\nend\n```\n\n这类似于用于创建动态 Web 页面的 PHP 和 ASP 环境，但这里我们使用的是 Lua 语言。关于如何使用该服务的文档，请访问\
    \ [http://getmoai.com/wiki/index.php?title=MoaiCloud](http://getmoai.com/wiki/index.php?title=MoaiCloud)。\n\
    \n## 使用 Web 服务\n\n该 Web 服务是一个简单的 HTTP 类型服务，通过 URL 访问。我们将尝试从 Moai 应用程序中访问我们创建的服务。简单的代码如下所示：\n\
    \n```\ntheURL = http://services.moaicloud.com/USERNAME/SERVICENAME\nMoaiSim.openWindow(\"\
    Consume Web Services\", 320, 480)\n\nfunction getData(theTask)\n    print(theTask:getString())\n\
    end\n\ntask = MOAIHttpTask.new()\ntask:setCallback( getData )\ntask:httpGet (theURL)\n\
    ```\n\n运行代码时，终端将输出 `\"hello world!\"`。我们可以使用任何支持 HTTP 访问的语言或框架来从 Moai 云服务获取数据。\n\
    \n**注意**：Moai 云服务提供几种选项（类似手机套餐）。所有创建的账户默认使用沙盒（Sandbox）计划，该计划免费，提供 50 MB 空间、1 GB\
    \ 传输量、100,000 条推送通知和 100,000 次 API 请求。如果你的需求超出这些限制，还有其他计划可供选择，价格从面向爱好者的每月 19 美元到面向工作室的每月\
    \ 499 美元不等。\n\n## 总结\n\n本章讨论了 Moai 框架提供的许多功能，涵盖如何更改显示坐标系。还介绍了在 Moai 模拟器中运行的应用程序是该应用程序的桌面版本。因此，在为移动设备构建和部署应用程序之前，可以先准备好一个适用于\
    \ Mac App Store（如果需要）的桌面版本。此外，还讨论了 Moai 处理输入的方式：设置额外接口的侦听器并检查它们是否存在是很容易的。最后，介绍了独立于\
    \ Moai SDK 免费版的 Moai 云服务，它允许开发者直接在应用程序内部使用云功能。虽然一开始使用 Moai 开发可能令人生畏，但如果你坚持下去，它能够提供非常愉快的开发体验。\n\
    \n# 第 11 章\n\n# LÖVE\n\nLÖVE 是一个使用 Lua 和 OpenGL 的开源框架，与大多数其他框架类似。它支持 Windows、Mac\
    \ 和 Unix 操作系统。尽管 LÖVE 本身不能在 iOS 设备上使用，但它对于在桌面上快速创建游戏或应用程序的原型非常有价值。LÖVE 的另一个优势是，它可以用来创建应用程序的桌面扩展，这些扩展可以与移动应用程序通信。\n\
    \nLÖVE 还可以用来为你的游戏创建关卡编辑器，由于它使用 Lua 语言，你可以坚持使用单一语言。\n\n## 架构\n\n与其他框架不同，LÖVE 依赖于特定的回调函数。与其他框架不同，没有特定的结构需要遵循——对于\
    \ LÖVE，需要声明一些特殊的函数才能使应用程序运行。通过这些 *回调函数*，解释器会查找这些函数，如果它们被声明，就会被调用。LÖVE 应用程序的架构如\
    \ [Figure 11-1](#9781430246626_Ch11.xhtml#Fig1) 所示。\n\n![9781430246626_Fig11-01.jpg](OEBPS/Images/9781430246626_Fig11-01.jpg)\n\
    \n[Figure 11-1](#9781430246626_Ch11.xhtml#_Fig1) . LÖVE 的基本架构及其回调函数\n\nLÖVE 基于回调原理工作，回调可以是用户通过代码设置的自定义函数，也可以是作为回调的预定义函数。在\
    \ LÖVE 中，回调用是预定义函数。因此，如果你定义了其中一个函数，它将在适当的时候被调用。\n\n## 安装 LÖVE\n\nLÖVE 运行在桌面上。你可以通过下载源码并构建二进制文件，或者直接下载预构建的二进制文件来安装\
    \ LÖVE。LÖVE 的源码托管在 Bitbucket 上，可以从 [https://bitbucket.org/rude/love](https://bitbucket.org/rude/love)\
    \ 下载。适用于相应平台的预构建二进制文件可以从 [https://love2d.org/#download](https://love2d.org/#download)\
    \ 下载。\n\n## 运行 LÖVE\n\n在 LÖVE 中创建第一个 Hello World 程序与许多其他框架类似。我们创建一个文件夹——称之为 `Love_01`——然后在其中创建一个名为\
    \ `main.lua` 的文本文件，内容如下：\n\n```\nprint(\"Hello World from Love\")\n```\n\n我们可以通过将项目文件夹拖放到\
    \ LÖVE 可执行文件上来启动应用程序。或者，我们可以在终端中输入以下命令：\n\n```\nlove projectdir/main.lua\n```\n\
    \n我们将看到一个空白的窗口，代码中的 `print` 语句显示在终端中。要显示文本，只需在 `main.lua` 文件中添加以下代码并重新运行，你会看到如\
    \ [Figure 11-2](#9781430246626_Ch11.xhtml#Fig2) 所示的输出。\n\n![9781430246626_Fig11-02.jpg](OEBPS/Images/9781430246626_Fig11-02.jpg)\n\
    \n[Figure 11-2](#9781430246626_Ch11.xhtml#_Fig2) . 在 LÖVE 中运行的 Hello World\n\n\
    ```\nfunction love.draw()\n    love.graphics.print('Hello World!', 400, 300)\n\
    end\n```\n\n## 回调函数\n\n本节描述我们可以重写以使 LÖVE 为我们工作的回调函数。\n\n### `love.load()`\n\n\
    该函数在游戏启动时被调用；它类似于 JavaScript 中的 `window_onLoad` 函数或 C 语言中的 `main()` 入口点。它只被调用一次，用于执行诸如加载资源、设置特定设置、初始化变量等任务。在面向对象的环境中，可以将其视为构造函数；它在\
    \ LÖVE 应用程序启动时只运行一次。\n\n### `love.update(dt)`\n\n该函数几乎连续不断地被调用。这就像一个 `enterFrame`\
    \ 事件或应用程序的心跳。传递给该函数的参数是 `dt`，即 *增量时间*（delta time）——自上次调用该函数以来经过的时间，以秒为单位。这可能是一个非常小的值——小至\
    \ 0.025714 秒（取决于你的平台）。帧率也会影响增量时间。\n\n### `love.draw()`\n\n这是所有屏幕绘制工作发生的地方。如果你之前有过使用\
    \ Visual C++、MFC、ATL、OWL 或 Objective-C 进行开发的经验，你会熟悉这种类型的函数。如果在此函数外部调用任何绘制命令，它们将不会产生任何效果。\n\
    \n### `love.mousepressed(x, y, button)`\n\n每当按下鼠标按钮时，都会调用此函数；此函数是鼠标按下事件的处理程序，并传递鼠标按下时所在的\
    \ x 和 y 坐标。它还会获取按下了哪个鼠标按钮：左键、右键或中键。\n\n### `love.mousereleased(x, y, button)`\n\
    \n当释放鼠标按钮时，会调用此函数；它充当鼠标释放事件的处理程序，并传递鼠标释放时所在的 x 和 y 坐标以及释放的鼠标按钮。\n\n### `love.keypressed(key,\
    \ unicode)`\n\n当按下键盘上的某个键时，会调用此函数；此函数充当按键按下事件的处理程序，并传递键码。`key` 参数保存所按下键的字符，`unicode`\
    \ 参数保存该键的 ASCII 码。如果你按下 `a` 键，那么 `key` 将是 `a`，`unicode` 将是 `97`。\n\n### `love.keyreleased(key)`"
  raw: 'If you want to modify and create a better and more useful web service, you
    can click the Edit Files link under Resources in the top-right corner, as shown
    in [Figure 10-15](#9781430246626_Ch10.xhtml#Fig15). This shall open the code editor
    that allows you to work with Lua code. The only file present is main.lua, which
    has the following code:


    ```

    function main(web,req)

        web:page(''hello world!'', 200, ''OK'')

    end

    ```


    This is similar to the PHP and ASP environments for creating dynamic web pages,
    but we use the Lua language for doing so. Documentation on how to use this can
    be found at [http://getmoai.com/wiki/index.php?title=MoaiCloud](http://getmoai.com/wiki/index.php?title=MoaiCloud).


    Consuming the Web Service


    The web service is a simple HTTP-type service that is accessed via an URL. We
    shall try to access the service we created from our Moai application. Our simple
    code would look something like this:


    ```

    theURL = http://services.moaicloud.com/USERNAME/SERVICENAME

    MoaiSim.openWindow("Consume Web Services", 320, 480)


    function getData(theTask)

        print(theTask:getString())

    end


    task = MOAIHttpTask.new()

    task:setCallback( getData )

    task:httpGet (theURL)

    ```


    When we run the code, "hello world!" will be output to in the terminal. We can
    use any other language or framework that supports HTTP access to get data from
    the Moai cloud service.


    **Note**   The Moai cloud service has a few options (like a phone plan). All accounts
    created come with the Sandbox plan by default, which is free and offers 50 MB
    of space, 1 GB of transfer, 100,000 push notifications, and 100,000 API requests.
    If your needs exceed these, there are other plans to suit your requirements, ranging
    from $19 per month for hobbyists to $499 per month for studios.


    Summary


    This chapter discussed a number of features offered by the Moai framework. It
    covered how to change the display coordinate system. It also discussed that the
    app running in the Moai simulator is the desktop version of the application. So,
    before you can build and deploy your application for a mobile device, you can
    have a desktop version ready for the Mac App store (if required). It also discussed
    the way Moai handles input; it is easy to set up listeners for additional interfaces
    and check if they exist. Finally, it covered the Moai cloud, which is separate
    from the Moai SDK free offering, and allows developers to use the cloud features
    from right inside your app. While developing with Moai may be daunting at first,
    if you persist with it, it can provide a very pleasant development experience.


    Chapter     11


    LÖVE


    LÖVE is an open source framework that uses Lua and OpenGL, similar to what most
    other frameworks offer. It’s available on Windows, Mac, and Unix operating systems.
    Although LÖVE can’t be used on iOS devices themselves, it’s valuable for whipping
    up quick and easy prototypes of your game or app on the desktop. Another advantage
    of LÖVE is that it can be used to create desktop extensions to your application,
    which could communicate with mobile applications.


    LÖVE can also be used to create a level editor for your games, and since it works
    with the Lua language, you can keep to the single language of choice.


    The Architecture


    LÖVE, unlike other frameworks, relies on specific callback functions. As with
    other frameworks, there is no specific structure to follow—with LÖVE there are
    special functions that need to be declared to allow the application to run. With
    these *callback functions*, the interpreter looks for these functions, and they’re
    called if they’re declared. The LÖVE application architecture is shown in [Figure
    11-1](#9781430246626_Ch11.xhtml#Fig1).


    ![9781430246626_Fig11-01.jpg](OEBPS/Images/9781430246626_Fig11-01.jpg)


    [Figure 11-1](#9781430246626_Ch11.xhtml#_Fig1) .  The basic architecture of LÖVE
    and its callback functions


    LÖVE works on the principle of callbacks, which can be in the form of custom functions
    that are passed as callbacks, where the user sets them via code or as predefined
    functions that serve as callbacks. With LÖVE, the callbacks are predefined functions.
    So if you define one of the functions, it will be called as appropriate.


    Installing LÖVE


    LÖVE works on desktops. You can install LÖVE by downloading the source and building
    the binaries or downloading the prebuilt binaries. The source for LÖVE is hosted
    on bitbucket and can be downloaded from [https://bitbucket.org/rude/love](https://bitbucket.org/rude/love).
    The prebuilt binaries for the appropriate platform can be downloaded from [https://love2d.org/#download](https://love2d.org/#download).


    Running LÖVE


    Creating our first Hello world in LÖVE is similar to doing so in many other frameworks.
    We create a folder—let’s call it *Love_01*—and then create a text file called
    main.lua with the following code inside it:


    ```

    print("Hello World from Love")

    ```


    We can get LÖVE to start our app by simply dragging and dropping the project folder
    onto the LÖVE executable. Or we can start a terminal and then type


    ```

    love projectdir/main.lua

    ```


    We’ll be greeted with a blank window, and the print statement from our code will
    be displayed to the terminal. To see the text, simply add the following code in
    the main.lua file and run it again to see the output shown in [Figure 11-2](#9781430246626_Ch11.xhtml#Fig2).


    ![9781430246626_Fig11-02.jpg](OEBPS/Images/9781430246626_Fig11-02.jpg)


    [Figure 11-2](#9781430246626_Ch11.xhtml#_Fig2) .  Hello World running in LÖVE


    ```

    function love.draw()

        love.graphics.print(''Hello World!'', 400, 300)

    end

    ```


    The Callback Functions


    The callback functions that we can override to make LÖVE work for us are described
    in this section.


    love.load ( )


    This function is called when the game starts; it’s similar to the window_onLoad
    function in JavaScript or the main() entry point in C. This is called only once,
    and it is used to perform tasks like loading the resources, setting specific settings,
    initializing variables, and so on. In an object-oriented setting, think of this
    as the constructor; it is run only once, when a LÖVE applications starts.


    love.update ( dt )


    This function is called almost continuously. This is like an enterFrame event
    or the heartbeat of the application. The parameter passed to the function is dt,
    which is the *delta time*—the amount of time since the function was last called,
    in seconds. This can be a very small value—as small as 0.025714 seconds (depending
    on your platform). Frame rates can also affect the delta time.


    love.draw ( )


    This is the function where all the onscreen drawing takes place. If you have had
    any previous experience with development using Visual C++, MFC, ATL, OWL, or Objective-C,
    you will be familiar with this type of function. If any of the draw commands are
    called outside of this function, they will have no effect.


    love.mousepressed ( x, y, button )


    This function is called whenever a mouse button is pressed; this function is a
    handler for the mouse button’s down event and is passed the x- and y-coordinates
    of where the mouse button was pressed. It also gets which mouse button was pressed:
    left, right, or middle.


    love.mousereleased ( x, y, button )


    This function is called when the mouse button is released; it acts as a handler
    for the mouse button’s release event and is passed the x-and y-coordinates of
    where the mouse button was released and which mouse button was released.


    love.keypressed ( key, unicode )


    This function is called when a key is pressed on the keyboard; this function acts
    as a handler for the keypress down event and is passed the key code. The key parameter
    holds the character of the key pressed and the unicode parameter holds the ASCII
    code of the key. If you press the key *a*, then key would be a and unicode would
    be 97.


    love.keyreleased ( key )'
