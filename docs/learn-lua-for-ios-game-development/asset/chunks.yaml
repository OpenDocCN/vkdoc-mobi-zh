  raw: 'function love.update(dt)

      x = x + dirX

      y = y + dirY


    if x < 0 or x > _W then dirX = − dirX end

      if y < 0 or y > _H then dirY = − dirY end

    end

    ```


    At first we get the width and height of the window. This could be different on
    different systems, or it could be set via the conf.lua file. We get this using
    the getWidth and getHeight functions, so that we know what the size is at this
    instance. We save the width and height in the _W and _H variables.


    Next we set the speed of movement; in this case, we’re setting the dirX and dirY
    variables to 10 and 10\. This shall be used to change the position of the image
    at each update call.


    In the function love.load, which is called only once, when the app starts, we
    load the image and set it to the variable theImage, and set the variables x and
    y to 50 and 50, which will be the starting position for this image.


    In the love.draw function, we position the image at x, y.


    In our love.update function, we increment the x and y by the dirX and dirY, and
    then we check if the position of x or y is outside of the bounds, 0,0 or width,
    height of the window. If the x or the y coordinates are outside of the window’s
    bounds, we invert the dirX or the dirY accordingly, which results in creating
    a bounce effect and places the image back within the bounds of the window.


    The Active Window


    The love.focus function can be used to determine if the window is active and has
    focus or not. This could be used, for example, to stop processing when the current
    window loses focus and continue accordingly when it regains focus again.


    We add a line at the top of our existing code from above:


    ```

    local current = true

    ```


    And then we simply add a function at the end of the code:


    ```

    function love.focus(f)

        current = f

    end

    ```


    Finally, we redefine the update function as follows:


    ```

    function love.update(dt)

      if current then

        x = x + dirX

        y = y + dirY


    if x < 0 or x > _W then dirX = − dirX end

        if y < 0 or y > _H then dirY = − dirY end

      end

    end

    ```


    So, whenever we move away from the window, the love.focus function is triggered,
    and that sets the current variable to true or false depending on if the window
    has focus. In the update, we increment the position of our image if the current
    variable is not false or nil. So, the moment we switch away from the application
    window, the image freezes, and when we click the window again, it starts to move.


    Moving Around with the Keyboard


    If we want to move the image on the screen using the keyboard instead of the love.update
    function, we can use the love.keypressed function.


    ```

    local _W, _H = love.graphics.getWidth(), love.graphics.getHeight()

    local dirX, dirY = 10, 10


    local theImage, x, y

    function love.load()

       theImage = love.graphics.newImage("myImage3.png")

       x = 50

       y = 50

       love.graphics.setColor(0,0,0,255)

       love.graphics.setBackgroundColor(255,255,255,255)

    end


    function love.draw()

       love.graphics.draw(theImage, x, y)

    end


    function love.keypressed(key, unicode)

        if key=="up" then

            y = y - dirY

        elseif key =="down" then

            y = y + dirY

        elseif key=="left" then

            x = x - dirX

        elseif key =="right" then

            x = x + dirX

        end

    end

    ```


    In this example, the image only moves when the relevant keys are pressed.


    We can add another function, love.mousepressed, that is invoked every time we
    use the mouse. We can position the image at the location where we click the mouse.
    We reposition the image only if the left mouse button is pressed.


    ```

    function love.mousepressed(x1, y1, button)

        if button == "l" then

            x = x1

            y = y1

        end

    end

    ```


    You might notice that this is not very smooth, and wouldn’t be acceptable in a
    game setting. You need to tap the key and then release it every time to make the
    object move. We could, however, create some smoother movement based on the cursor
    keys. To do so, we can move the key-handling routine out of its own function and
    into the update function. That way we shall check for keypresses many more times.


    ```

    local _W, _H = love.graphics.getWidth(), love.graphics.getHeight()

    local dirX, dirY = 10, 10


    local theImage, x, y

    function love.load()

       theImage = love.graphics.newImage("myImage3.png")

       x = 50

       y = 50

       love.graphics.setColor(0,0,0,255)

       love.graphics.setBackgroundColor(255,255,255,255)

    end


    function love.draw()

       love.graphics.draw(theImage, x, y)

    end


    function love.update(dt)

        local key = love.keyboard.isDown

        if key("up") then

            y = y - dirY

        elseif key("down") then

            y = y + dirY

        elseif key("left") then

            x = x - dirX

        elseif key("right") then

            x = x + dirX

        end

    end

    ```


    The movement should be much smoother now.


    Finally, we need to fix the image so that it can turn in the direction of our
    choice, instead of just moving backward as moonwalking. Here’s how we can do that:


    ```

    local _W, _H = love.graphics.getWidth(), love.graphics.getHeight()

    local dirX, speed = 1, 10


    local theImage, x, y

    function love.load()

       theImage = love.graphics.newImage("myImage3.png")

       x = 50

       y = 50

       love.graphics.setColor(0,0,0,255)

       love.graphics.setBackgroundColor(255,255,255,255)

    end


    function love.draw()

       love.graphics.draw(theImage, x, y, 0, dirX, 1)

    end


    function love.update(dt)

        local key = love.keyboard.isDown

        if key("up") then

            y = y - dirY

        elseif key("down") then

            y = y + dirY

        elseif key("left") then

            x = x – dirX

                    dirX = −1

        elseif key("right") then

            x = x + dirX

            dirX = 1

        end

    end

    ```


    This allows us to achieve the effect we want without creating a new sprite. We’ve
    done this by manipulating the scale factor. The draw function can take quite a
    few parameters:


    ```

    love.graphics.draw(imgObject, x, y, angle, sx, sy, ox, oy, kx, ky)

    ```


    Here, sx and sy are what we are interested in. By keeping them at 1, we are not
    changing the size of the image, but by setting it as 1 or −1, we can flip the
    images, so −1 is flipping the image on the horizontal axis and −1 on the vertical.
    [Figure 11-6](#9781430246626_Ch11.xhtml#Fig6) shows how this mirrors our image
    on the x-axis.


    ![9781430246626_Fig11-06.jpg](OEBPS/Images/9781430246626_Fig11-06.jpg)


    [Figure 11-6](#9781430246626_Ch11.xhtml#_Fig6) .  Mirroring an image


    Turning the Player


    In your game, you might want to rotate the player graphic based on where you click—for
    example, in a tower defense–type game where the player is holding a gun.


    As mentioned before, the math or the code can be applied to any framework, so
    to determine the angle of rotation based on a point on the screen, we can use
    the following formula:


    ```

    theAngle = math.atan2(posY – startY, posX– startX)

    ```


    startX and startY are the coordinates of the player (as in our preceding example),
    and posX and posY are the coordinates of a point on the screen.


    Using this knowledge, let’s make an image on the screen that shall always point
    to the direction of the mouse cursor.


    ```

    local _W, _H = love.graphics.getWidth(), love.graphics.getHeight()

    local dirX, dirY = 10, 10

    local theImage, x, y

    local theAngle = 0

    function love.load()

       theImage = love.graphics.newImage("myImage.png")

       x = 50

       y = 50

       love.graphics.setColor(0,0,0,255)

       love.graphics.setBackgroundColor(255,255,255,255)

    end


    function love.draw()

       love.graphics.draw(theImage, x, y, theAngle)

    end

    function love.update(dt)

      local mouseX, mouseY = love.mouse.getX(), love.mouse.getY()

      theAngle = math.atan2(mouseY – y, mouseX-x)

    end

    ```


    Now move your cursor around the screen, and you’ll find the image turning to point
    toward where the cursor currently is. To make it look even better, we could add
    a crosshair that is displayed at the current position.


    The changes that we have made to the code are hiding the cursor using the love.mouse.setVisible
    function, and we display the crosshair image at the current position of where
    the cursor should be.'
