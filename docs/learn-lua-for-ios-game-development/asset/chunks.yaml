- fmt: "方括号中的值是可选的。在此函数中，第一个参数（`parent`）是可选的，第二个参数（`object`）是必填的，第三和第四个参数（`x` 和 `y`）是可选的（但如果设置了`x`或`y`中的任意一个，则另一个也必须设置）。最后一个参数（`position`）是可选的。\n\
    \n解析这个问题可能会有些困难，但Lua让这变得简单。以下是实现方式。我们知道`parent`和`object`是表类型的变量，`x`和`y`是数值类型，而`position`是字符串类型。首先，我们检查传递的参数数量——如果只传递了一个参数，它必须是必填参数`object`。如果传递了两个参数且第二个参数的类型是`table`，则第一个是`parent`，第二个是`object`。如果第二个参数的类型是`string`，则它是`position`。否则，它就是`x`位置。\n\
    \n```\nfunction addObjectAtPosition(param1, param2, param3, param4, param5)\n\
    \  local  lstPassed = {param1, param2, param3, param4, param5}\n  -- set the default\
    \ values\n  local parent = nil -- or default value if you want to set any\n  local\
    \ object = nil\n  local x =0\n  local y = 0\n  local position = \"left\"\n\nlocal\
    \ numPassed = #lstPassed\n  if numPassed == 1 then\n    object = lstPassed [1]\n\
    \  elseif numPassed == 2 then\n    if type(lstPassed[2])==\"number\" then\n  \
    \    x = lstPassed[2]\n      object = lstPassed[1]\n    elseif type(lstPassed[2])==\"\
    string\" then\n      position = lstPassed[2]\n      object = lstPassed[1]\n  \
    \  elseif type(lstPassed[2])==\"table\" then\n      object = lstPassed[2]\n  \
    \    parent = lstPassed[1]\n    end\n  elseif numPassed == 3 then\n    if type(lstPassed[2])==\"\
    number\" then\n      object = lstPassed[1]\n      x = lstPassed[2]\n      y =\
    \ lstPassed[3]\n    else\n      parent = lstPassed[1]\n      object = lstPassed[2]\n\
    \      x = lstPassed[3]\n    end\n  elseif numPassed == 4 then\n    if type(lstPassed[4])==\"\
    string\" then\n      object = lstPassed[1]\n      x = lstPassed[2]\n      y =\
    \ lstPassed[3]\n      position = lstpassed[4]\n    else\n      parent = lstPassed[1]\n\
    \      object = lstPassed[2]\n      x = lstPassed[3]\n      y = lstpassed[4]\n\
    \    end\n  else\n    parent = param1\n    object = param2\n    x = param3\n \
    \   y = param4\n    position = param5\n  end\nend\n```\n\n这有助于创建非常灵活的解析方法。其思路是检查参数的类型以确定传递了哪些参数。虽然前面的例子有些复杂，但也有更简单的例子。例如，考虑以下函数，其中第一个参数是可选的：\n\
    \n```\nparseParams( [parent, ] theMessage, theTime )\n```\n\n我们可以按如下方式轻松解析它：\n\
    \n```\nfunction parseParams( param1, param2, param3 )\n  local lstPassed = {param1,\
    \ param2, param3}\n  local parent = nil\n  if type(lstPassed[1]) == \"table\"\
    \ then\n    parent = lstPassed[1]\n    table.remove(lstPassed, 1)\n  end\n  theMessage\
    \ = lstPassed[1]\n  theTime = lstPassed[2]\nend\n```\n\n在这个函数中，如果第一个参数是`parent`，我们将其从表中移除，之后函数的其余部分就可以按需访问参数了。\n\
    \n## 创建只读表\n\n有时你可能希望表的一部分是只读的，而另一部分可修改。当大量的`if...then`语句开始充斥你的代码时，这一切就变得不那么美好了。元表修改可以实现很多有趣的技巧。\n\
    \n```\nfunction readonlyTable(theTable)\n  return setmetatable({}, {\n    __index\
    \ = table,\n    __newindex = function (table, key, value)\n      --Do not update\
    \ or create the key with the value\n    end,\n    __metatable = false\n    })\n\
    end\n```\n\n如果你希望保留表的一部分不锁定，你可以通过`readonlyTable`函数保留一个未锁定的表类型成员，并像这样向其添加数据：\n\n\
    ```\nlocal myRO = readonlyTable{\n    name = \"Jayant\",\n    device = \"iOS\"\
    ,\n    model = \"iPhone5\",\n    apps = {},\n}\n```\n\n这样一来，`name`、`device`和`model`无法被更改；但是`apps`表可以通过各种函数进行修改。\n\
    \n```\nprint(myRO.name)\nRO.name = \"Something Else\"\nprint(myRO.name)\n```"
  raw: 'The values in square brackets are optional. In this function, the first parameter
    (parent) is optional, the second (object) is not, and the third and fourth (x
    and y) are optional (but if either x or y is set, the other must be set as well).
    The last parameter(position) is optional.


    Parsing this could get a bit difficult, but Lua makes it easy. Here’s how it can
    be done. We know that the parent and the object are table-type variables, x and
    y would be numeric, and the position is a string. First, we check for the number
    of parameters passed—if only one is passed, we know it must be the required parameter,
    object. If two are passed and the second one is of type table, the first one is
    the parent and the second the object. If the second is of type string, then it
    is position. Otherwise, it is the x position.


    ```

    function addObjectAtPosition(param1, param2, param3, param4, param5)

      local  lstPassed = {param1, param2, param3, param4, param5}

      -- set the default values

      local parent = nil -- or default value if you want to set any

      local object = nil

      local x =0

      local y = 0

      local position = "left"


    local numPassed = #lstPassed

      if numPassed == 1 then

        object = lstPassed [1]

      elseif numPassed == 2 then

        if type(lstPassed[2])=="number" then

          x = lstPassed[2]

          object = lstPassed[1]

        elseif type(lstPassed[2])=="string" then

          position = lstPassed[2]

          object = lstPassed[1]

        elseif type(lstPassed[2])=="table" then

          object = lstPassed[2]

          parent = lstPassed[1]

        end

      elseif numPassed == 3 then

        if type(lstPassed[2])=="number" then

          object = lstPassed[1]

          x = lstPassed[2]

          y = lstPassed[3]

        else

          parent = lstPassed[1]

          object = lstPassed[2]

          x = lstPassed[3]

        end

      elseif numPassed == 4 then

        if type(lstPassed[4])=="string" then

          object = lstPassed[1]

          x = lstPassed[2]

          y = lstPassed[3]

          position = lstpassed[4]

        else

          parent = lstPassed[1]

          object = lstPassed[2]

          x = lstPassed[3]

          y = lstpassed[4]

        end

      else

        parent = param1

        object = param2

        x = param3

        y = param4

        position = param5

      end

    end

    ```


    This can help create very flexible parsing methods. The idea is to check the type
    of parameters to determine the parameters passed. While the preceding example
    was somewhat complex, there are simpler examples. For instance, take the following
    function, in which the first parameter is optional:


    ```

    parseParams( [parent, ] theMessage, theTime )

    ```


    We can easily parse this as follows:


    ```

    function parseParams( param1, param2, param3 )

      local lstPassed = {param1, param2, param3}

      local parent = nil

      if type(lstPassed[1]) == "table" then

        parent = lstPassed[1]

        table.remove(lstPassed, 1)

      end

      theMessage = lstPassed[1]

      theTime = lstPassed[2]

    end

    ```


    In this function, if the first parameter is the parent, we remove it from the
    table, and the rest of the function can access the parameters as required.


    Making Read-Only Tables


    There may be times when you want portions of your table to be read-only and other
    portions modifiable. This is all fine till the numerous if...then statements start
    to plague your code. The metatable modifications make for a lot of interesting
    hacks and tricks.


    ```

    function readonlyTable(theTable)

      return setmetatable({}, {

        __index = table,

        __newindex = function (table, key, value)

          --Do not update or create the key with the value

        end,

        __metatable = false

        })

    end

    ```


    If you want to keep a portion of your table unlocked, you can keep a table-type
    member that is not locked via the readonlyTable function, and you can add data
    to this as follows:


    ```

    local myRO = readonlyTable{

        name = "Jayant",

        device = "iOS",

        model = "iPhone5",

        apps = {},

    }

    ```


    With this, the name, device, and model cannot be changed; however, the apps table
    can be altered using the various functions.


    ```

    print(myRO.name)

    RO.name = "Something Else"

    print(myRO.name)

    ```'
