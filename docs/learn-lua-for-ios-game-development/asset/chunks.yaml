    \nString manipulation is an important part of any programming language. In this\
    \ chapter we looked at the various functions available in Lua for string manipulation.\
    \ We also created a few functions that you can use in your own apps. You can include\
    \ these functions in your own utility library that you can use as a generic library\
    \ for your app development.\n\nChapter 6\n\n# Threading\n\nThere was a time in\
    \ the 1980s when a computer did one and only one task at a time. In the times\
    \ of MS-DOS and CP/M, one could execute an application, exit from it back to the\
    \ prompt, and then invoke another. Additionally, Unix-like systems used the concept\
    \ of multiuser usage, where each user could run separate applications. While the\
    \ OS can be multitasking—running several apps—each application can perform different\
    \ tasks. For example, downloading a file asynchronously while playing music and\
    \ updating the progress bar. To understand this concept better, we need to look\
    \ into these three important topics: processes, multitasking, and threads.\n\n\
    *   A *process* is an instance of a computer program—a list of code-based instructions—that\
    \ is being executed, or run. Several processes can be associated with the same\
    \ program, and several instances of the same program can be executed simultaneously;\
    \ for example, each open window within a browser is a process of its own.\n* \
    \  *Multitasking* is a method that allows multiple processes to share processors\
    \ and other system resources. With multitasking, a CPU can switch between tasks\
    \ being executed without having to wait for one to finish. The way this works\
    \ can differ from system to system.\n*   The smallest unit of processing that\
    \ an operating system runs or executes is called a *thread*. A process can have\
    \ multiple threads, and the CPU can switch between these threads to provide the\
    \ perception of multiple threads running at the same time.\n\n# Coroutines\n\n\
    Programming languages use subroutine or functions to call a set of instructions.\
    \ The function or subroutine is called and executed, and when it completes, it\
    \ returns. A *coroutine* is a special type of subroutine; like a subroutine or\
    \ a function, it has an entry point, but it can be *yielded* (paused in the middle)\
    \ and then resumed from that point. A coroutine can be passed parameters at any\
    \ time when it is called, not just at the point of entry.\n\n## Coroutine Functions\n\
    \nSeveral functions are associated with working with coroutines. This section\
    \ provides brief descriptions of these functions.\n\n### coroutine.create ( f\
    \ )\n\nThis function creates a new coroutine with the function body `f`, which\
    \ should be a Lua function. On successful creation, it returns the new coroutine\
    \ an object with the type thread.\n\n```\nthread = coroutine.create(function()\
    \ print(\"Started\") end)\ncoroutine.resume(thread)\n```\n\n### coroutine.resume\
    \ ( co [, val1, …] )"
  raw: 'Formatting a Number with the Thousand Separator


    While displaying scores, you might want to display them in a readable format.
    You can use the *thousand separator* for this, like so:


    ```

    function comma_value(amount)

        local formatted = amount

        while true do

            formatted, k = string.gsub(formatted, "^(−?%d+)(%d%d%d)", ''%1,%2'')

            if (k==0) then

                break

            end

        end

        return formatted

    end

    ```


    The comma_value function can be used to print formatted numbers, as in the following
    example.


    ```

    print(comma_value(123456.78))       -- prints 123,456.78

    ```


    Frequency of Letters


    With the getFrequency function, we can determine the frequency of certain letters
    in a string. The gsub function calls the function passed for every match of the
    pattern. We can use this information to get the frequency of the characters. So,
    to get the frequency, we create a function called tally that will increase the
    character count of the character we pass to the function.


    ```

    function string:getFrequency()

        local inst = {}

        function tally(char)

            char = string.upper(char)

            inst[char] = (inst[char] or 0) + 1

        end

        self:gsub("%a", tally)

        return inst

    end

    ```


    We can test this function with the following code:


    ```

    testString = "Hello, how are you?"

    tbl = testString:getFrequency()

    for i,j in pairs(tbl) do

        print(i,j)

    end

    ```


    Detecting Whether a String Is a Palindrome


    We can use the reverse function to check if a string is a palindrome or not. The
    easiest way do this is to check whether the string is the same forward as it is
    when reversed.


    ```

    function string:isPalindrome( )

        return self == self:reverse()

    end

    ```


    Splitting a String


    Earlier, you learned how to split a string in a function and convert the string
    into a table. In this example, we shall use the function string.gsub to split
    a string based on patterns (as described earlier). Here’s an easy way to do this:


    ```

    function string:split(sep)

        local sep, fields = sep or ":", {}

        local pattern = string.format("([^%s]+)", sep)

        self:gsub(pattern, function(c) fields[#fields + 1] = c end)

        return fields

    end

    ```


    This returns a table that has the strings split based on the separator. Here’s
    an example of how we can use this:


    ```

    str = "name = Jayant"

    results = str:split(" = ")

    print("The value of " .. results[1] .. " is " .. results[2])

    ```


    Level Management


    If you’re creating a board game, you will be faced with creating levels for it.
    Though there are lots of ways to create levels, one of the easiest and best is
    to create a string that corresponds to each square on the board. For example,
    if the game has a board of 5 × 5 that contains a start position, an end position,
    and obstacles, then you could create it as shown in [Figure 5-1](#9781430246626_Ch05.xhtml#Fig1).


