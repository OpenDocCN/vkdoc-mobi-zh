  raw: "The httpGet function works synchronously; however, if you want that the data\
    \ be loaded *asynchronously*, you need to call the performAsync function instead:\n\
    \n```\nfunction onFinish ( task, responseCode )\n\nprint ( \"onFinish\" )\n  print\
    \ ( responseCode )\n\nif ( task:getSize ()) then\n    print ( task:getString ())\n\
      else\n    print ( \"nothing\" )\n  end\nend\n\ntask = MOAIHttpTask.new ()\n\n\
    task:setVerb ( MOAIHttpTask.HTTP_GET )\ntask:setUrl ( \"www.cnn.com\" )\ntask:setCallback\
    \ ( onFinish )\ntask:setUserAgent ( \"Moai\" )\ntask:setHeader ( \"Foo\", \"foo\"\
    \ )\ntask:setHeader ( \"Bar\", \"bar\" )\ntask:setHeader ( \"Baz\", \"baz\" )\n\
    task:setVerbose ( true )\ntask:performAsync ()\n```\n\nIf you want to run some\
    \ command in a blocking manner (where the entire application freezes to perform\
    \ one operation and resumes once the task is completed), instead of performAsync,\
    \ you use the performSync function.\n\nHttpTask is a two-way function, which means\
    \ not only can you use it for downloading using HTTP_GET, but also to upload data\
    \ and set the headers. The commands that can be used with the HttpTask are\n\n\
    *   HTTP_HEAD\n*   HTTP_GET\n*   HTTP_PUT\n*   HTTP_POST\n*   HTTP_DELETE\n\n\
    Using JSON\n\nThere is good support for using JSON in Moai. To decode or encode\
    \ a JSON string, you can use the MOAIJsonParser object. This has just two functions,\
    \ encode and decode. The decode function takes a JSON string and converts it into\
    \ a hierarchy of tables, whereas encode converts a hierarchy of tables into a\
    \ JSON string.\n\n```\nlocal test = {name=\"Jayant\", Msg={BaaBaa=\"BlackSheep\"\
    , Line1=\"Have you any wool?\"}}\nprint(MOAIJsonParser.encode(test))\n```\n\n\
    Using Base64\n\nWhen developing a game, to send messages or upload or download\
    \ data, you might need to encode data into Base64 in order to be able to send\
    \ data in text format. The MOAIDataBuffer class gives you the base-conversion\
    \ functionality.\n\n```\ntheText = \"This is plain text, but...\"\nencoded = MOAIDataBuffer.base64Encode(theText)\n\
    print(encoded)\ndecoded = MOAIDataBuffer.base64Decode(encoded)\nprint(decoded)\n\
    ```\n\nIn some cases, you might need to work with data that is streamed; for this,\
    \ you can use the MOAIStreamReader and MOAIStreamWriter classes. The stream can\
    \ be used like a file, where you can open a stream, seek, and write data. Here’s\
    \ an example:\n\n```\nstream = MOAIMemStream.new ()\nstream:open ()\n\ndata =\
    \ 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Duis id massa vel\
    \ leo blandit pharetra.\n Aenean a nisl mi. Vestibulum ante ipsum primis in faucibus\
    \ orci luctus et ultrices posuere cubilia Curae;\n Nam quis magna sit amet diam\
    \ fermentum consequat. Donec dapibus pharetra diam vel convallis. \nPellentesque\
    \ quis tellus mauris.\n Sed eget risus tortor, in cursus nisi. Sed ultrices nulla\
    \ non nunc ullamcorper id venenatis urna ultrices.\n Cum sociis natoque penatibus\
    \ et magnis dis parturient montes, nascetur ridiculus mus.\n Nam sodales tellus\
    \ et diam imperdiet pharetra sagittis odio tempus. Lorem ipsum dolor sit amet,\
    \ consectetur adipiscing elit.\n Nunc mollis adipiscing nibh ut malesuada. Proin\
    \ rutrum volutpat est sed feugiat. Suspendisse at imperdiet justo.\n Pellentesque\
    \ ullamcorper risus venenatis tellus elementum mattis. Quisque adipiscing feugiat\
    \ orci vitae egestas.'\nlen = #data\n\nprint ( data )\n\nwriter = MOAIStreamWriter.new\
    \ ()\nwriter:openBase64 ( stream )\nwriter:write ( data, len )\nwriter:close ()\n\
    \nstream:seek ( 0 )\n\nreader = MOAIStreamReader.new ()\nreader:openBase64 ( stream\
    \ )\ndata = reader:read ( len )\nreader:close ()\n\nprint ()\nprint ( data )\n\
    ```\n\nCompressing Data\n\nWhen you work with online data, you might want to not\
    \ only convert data, but also compress it to save on data transfer and bandwidth.\
    \ The MOAIDataBuffer class allows you to compress or uncompress data using the\
    \ deflate and inflate functions.\n\n```\ndata = 'Lorem ipsum dolor sit amet, consectetur\
    \ adipiscing elit. Duis id massa vel leo blandit\n pharetra. Aenean a nisl mi.\
    \ Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere\n cubilia\
    \ Curae; Nam quis magna sit amet diam fermentum consequat. Donec dapibus pharetra\
    \ diam vel\n convallis. Pellentesque quis tellus mauris. Sed eget risus tortor,\
    \ in cursus nisi. Sed ultrices\n nulla non nunc ullamcorper id venenatis urna\
    \ ultrices. Cum sociis natoque penatibus et magnis dis\n parturient montes, nascetur\
    \ ridiculus mus. Nam sodales tellus et diam imperdiet pharetra sagittis\n odio\
    \ tempus. Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nunc mollis\
    \ adipiscing nibh\n ut malesuada. Proin rutrum volutpat est sed feugiat. Suspendisse\
    \ at imperdiet justo. Pellentesque\n ullamcorper risus venenatis tellus elementum\
    \ mattis. Quisque adipiscing feugiat orci vitae egestas.'\n\nprint ( data )\n\
    print ()\n\nprint ( 'original length: ' .. #data )\n\ndata = MOAIDataBuffer.deflate\
    \ ( data, 9 )\nprint ( 'deflated length: ' .. #data )\nprint ( \"The compressed\
    \ encoded data\")\nprint ( MOAIDataBuffer.base64Encode(data))\n\ndata = MOAIDataBuffer.inflate\
    \ ( data )\nprint ( 'inflated length: ' .. #data )\n\nprint ()\nprint ( data )\n\
    ```\n\nPhysics\n\nPhysics is the most used feature in game apps, and Box2D is\
    \ the library most commonly used library by most of the frameworks. Moai includes\
    \ Box2D, as well as the Chipmunk library. This section will describe both.\n\n\
    Box2D Physics\n\nThe first thing we need to do when using physics in Moai is create\
    \ a world using the MOAIBox2dWorld class.\n\n```\nMOAISim.openWindow(\"Physics\"\
    , 640, 480)\nviewport = MOAIViewport.new()\nviewport:setSize(640,480)\nviewport:setScale(16,0)\n\
    \nlayer = MOAILayer2D.new()\nlayer:setViewport(viewport)\nMOAISim.pushRenderPass(layer)\n\
    \nworld = MOAIBox2dWorld.new()\nworld:setGravity(0,-9.8)\nworld:setUnitsToMeters(2)\n\
    world:start()\nlayer:setBox2DWorld(world)\n```\n\nAfter creating the world, we\
    \ need to add a physics body. This will interact with the physics world that we\
    \ have created via the addBody function as a *dynamic body*. Generally, all bodies\
    \ are created as static bodies by default. *Static bodies* are immovable, i.e.\
    \ forces do not act upon a static body, whereas a dynamic body reacts to forces\n\
    \nTo get the gravity to work realistically, we need to set it to −9.8; if we set\
    \ it to 9.8, the objects will start to float.\n\nBox2D units work quite well with\
    \ meter-kilogram-second (MKS) units, and the moving objects work well within a\
    \ range of 0.1 to 10 meters. Although it might be tempting to use pixels as the\
    \ units, this leads to some weird behavior and poor simulation.\n\nLastly, we\
    \ need to start the physics simulation with world:start(). To stop the physics\
    \ simulation, we can use world:stop().\n\n```\nbody = world:addBody( MOAIBox2DBody.DYNAMIC)\n\
    poly = {0,-1,1,0,0,1,-1,0}\n\nfixture = body:addPolygon(poly)\nfixture:setDestiny(1)\n\
    fixture:setFriction(0.3)\nfixture:setFilter(0x01)\nfixture:setCollisionHandler(onCollide,\
    \ MOAIBox2DArbiter.BEGIN + MOAIBox2DArbiter.END, 0x02)\nbody:resetMassData()\n\
    body:applyAngularImpulse(2)\n```\n\nNow that we have created a dynamic body, we\
    \ create a fixture that binds a shape to a body and gives the body material properties\
    \ like density, friction, and restitution.\n\n**Note**   *Restitution* deals with\
    \ the way an object returns to its original shape or position after it has been\
    \ deformed after a collision.\n\nIf we run our code, a physics box will appear\
    \ on the screen, as shown in [Figure 10-12](#9781430246626_Ch10.xhtml#Fig12).\n\
    \n![9781430246626_Fig10-12.jpg](OEBPS/Images/9781430246626_Fig10-12.jpg)\n\n[Figure\
    \ 10-12](#9781430246626_Ch10.xhtml#_Fig12) .  Moai Box2D physics bodies\n\n```\n\
    body2 = world:addBody(MOAIBox2DBody.STATIC)\nfixture2 = body2:addRect(-5,-5,5,-3)\n\
    fixture2:setFilter(0x02)\nfixture2:setCollisionHandler(onCollide, MOAIBox2DArbiter.BEGIN\
    \ + MOAIBox2DArbiter.END, 0x01)\n```\n\nThis creates a static body, which acts\
    \ as a ground that prevents the dynamic box from falling off the screen."
