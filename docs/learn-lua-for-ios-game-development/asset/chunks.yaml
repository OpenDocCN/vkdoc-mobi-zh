    ## 绘制形状


    Gideros Studio 还提供了一个 `Shape` 对象，当您需要创建矢量形状（如线条、矩形等）时，可以使用该对象。在 Gideros 中绘制形状的原理与许多其他语言中在
    `deviceContext` 上绘图的原理相同。本节将介绍如何创建线条和矩形以及如何填充形状，帮助您入门。


    ### 线条


    线条是最简单的可绘制形状。一条线条本质上由四个点定义：起点的 `x,y` 坐标和终点的 `x,y` 坐标，线条连接这两个点。


    ```

    function newLine(x1, y1, x2, y2)

      local obj = Shape.new()

      obj:setLineStyle(2, 0x000000)

      obj:beginPath()

      obj:moveTo(x1, y1)

      obj:lineTo(x2, y2)

       obj:endPath()

      stage:addChild(obj)

      return obj

    end

    ```


    要绘制线条，按如下方式调用函数：


    ```

    local line = newline(10,10,250,50)

    ```


    这将创建一条从 `10, 10` 到 `250, 50`、宽度为 2 像素的线条。我们可以使用 `setLineStyle` 函数设置线条宽度和颜色。我们还可以扩展该函数，将宽度和颜色也作为参数，并默认宽度为
    1、颜色为 `0x000000`。


    ```

    function newLine(x1, y1, x2, y2, lineWidth, lineColour)

      local lineWidth = lineWidth or 1

      local lineColour = lineColour or 0x000000

      local obj = Shape.new()

      obj:setLineStyle(lineWidth, lineColour)

      obj:beginPath()

      obj:moveTo(x1, y1)

      obj:lineTo(x2, y2)

       obj:endPath()

      stage:addChild(obj)

      return obj

    end

    ```


    现在，我们可以像之前一样绘制线条，但还可以选择自定义的线条宽度和颜色，如下所示：


    ```

    local line = newLine(10, 10, 250, 50, 4, 0x00FFFF)

    ```


    ### 矩形


    矩形是线条的轻微变体。它由四条线组成，并且可以包含填充色。如果我们不为填充色传递参数，矩形将只有轮廓；否则，矩形将填充传入的颜色。图 9-13 展示了这两种情况的示例。


    ```

    function newRectangle(x1, y1, x2, y2, lw, lc, fc)

      local obj = Shape.new()

      local lw = lw or 1

      local lc = lc or 0x000000

      obj:beginPath()

      obj:setLineStyle(lw, lc)

      if fc then

        obj:setFillStyle(Shape.SOLID, fc)

      end

      obj:moveTo(x1,y1)

      obj:lineTo(x2, y1)

      obj:lineTo(x2, y2)

      obj:lineTo(x1, y2)

      obj:lineTo(x1, y1)

      obj:closePath()

      obj:endPath()

      stage:addChild(obj)

      return obj

    end


    newRectangle(10,10,200,50,1,0x0000FF)

    newRectangle(100,150,250,250,1,nil, 0xFF0000)

    ```


    ![9781430246626_Fig09-13.jpg](img/9781430246626_Fig09-13.jpg)


    图 9-13.  带轮廓的矩形（上方）和填充色的矩形（下方）


    **注意**：请注意上述代码存在一个问题。虽然它能得到预期结果，但如果您尝试重新定位矩形，它会产生少量像素偏移。这主要是因为我们在相对于矩形自身位置的地方绘制线条。我们更恰当的做法是：在位置
    `0, 0` 处绘制所有内容，然后将形状移动到起始的 `x,y` 坐标处。


    ### 填充形状


    Gideros Studio 允许使用纯色或图像填充形状。这有助于实现一些有趣的效果，例如创建图像遮罩或无缝填充纹理。以下是一个使用图像填充形状的示例代码：'
- fmt: '```lua

    local texture = Texture.new("image.png") setFillStyle(Shape.TEXTURE, texture)

    ```


    ——将填充样式设置为带有`image.png`的纹理


    我们可以使用这个来创建一个用纹理填充的矩形，方便创建平铺背景等。图9-14展示了一个示例。


    ```lua

    function newImgRectangle(x1, y1, x2, y2, lw, lc, imgName)

      local obj = Shape.new()


    -- The image for the fill

      local img = Texture.new(imgName)

      local lw = lw or 1

      local lc = lc or 0x000000


    local wd, ht = x2-x1, y2-y1


    obj:clear()

      obj:setLineStyle(lw, lc)

      obj:setFillStyle(Shape.TEXTURE, img)


    obj:beginPath()

      obj:moveTo(0,0)

      obj:lineTo(0, ht)

      obj:lineTo(wd, ht)

      obj:lineTo(wd,0)

      obj:lineTo(0,0)

      obj:closePath()

      obj:endPath()


    obj:setPosition(x1, y1)


    stage:addChild(obj)


    return obj

    end


    newImgRectangle(10, 10, 70, 70, 0, nil, "myImage2.png")

    ```


    ![9781430246626_Fig09-14.jpg](OEBPS/Images/9781430246626_Fig09-14.jpg)


    [Figure 9-14](#9781430246626_Ch09.xhtml#_Fig14). 使用填充形状平铺背景


    在这个示例中，如果矩形更大，我们会看到图像被空白区域包围。但Gideros Studio也提供了在背景中平铺图像的选项。要使用此功能，只需将加载纹理的代码修改为以下内容：


    ```lua

    local img = Texture.new(imgName, false, {wrap=Texture.REPEAT})

    ```


    现在我们可以用同样的方式尝试这个示例：


    ```lua

    newImgRectangle(10, 10, 220, 220, 1, nil, "myImage2.png")

    ```


    我们甚至可以创建完整的背景图像，如下所示：


    ```lua

    newImgRectangle(0,0,application:getDeviceWidth(),application:getDeviceWidth(),
    0, nil, "tile.png")

    ```


    ## 绘制其他形状


    由于Gideros Studio为用户提供了绘制任意形状的画布，因此没有针对线条、矩形、圆形或弧线的内置API函数。不过，你可以使用`moveTo`和`lineTo`绘制任何你想要的形状。这允许你创建自己的贝塞尔曲线、弧线、椭圆、圆形等。


    **注意**：当你在形状上绘制内容时，它会与随后在形状上已有的内容一起保留。因此，最好在绘制前先调用`obj:clear()`清除形状。


    ## Application对象


    你可能需要获取设备宽度、设备高度或设备区域设置等细节（例如在制作多语言应用时）。你可能还想知道设备运行的是iOS还是Android等。Gideros Studio提供了丰富的函数，允许我们查询`Application`对象来获取这些详细信息。以下是一些示例：


    ```lua

    local width = application:getDeviceWidth()

    local height = application:getDeviceHeight()

    local model = application:getDeviceInfo()

    print("On " .. model .. " (" .. width .. " x " .. height .. " )" )

    ```


    **注意**：保存`Application`对象的变量是`application`，而不是`Application`（注意小写字母a）。


    查看IDE中的输出窗格。如果你在设备上运行此程序，输出将是当前运行的设备；如果像本例一样运行桌面版，则根据运行环境会显示“Mac OS”或“Windows”。在移动设备上，`application:getDeviceInfo()`返回多个值。对于Android，它返回“Android”后跟版本号；对于iOS设备，它返回五个值：“iOS”、版本、设备类型、UI习惯用法和设备型号。以下是在运行Gideros
    Player的iPhone上的一些示例输出：


    ```

    iOS 5.1 iPhone iPhone iPhone3,1

    ```


    ### 保持设备唤醒


    如果你需要执行一些计算，并担心在此期间设备可能会变暗然后进入睡眠或关机状态，可以通过以下方式确保设备不会变暗：


    ```lua

    application:setKeepAwake(true)

    -- 防止设备变暗

    ```


    或者，你可以使用以下代码：


    ```lua

    application:setKeepAwake(false)

    -- 允许设备变暗

    ```


    ### 方向


    如果你需要获取设备在特定时间点的手持方式，可以查询设备的方向，如下所示：


    ```lua

    application:getOrientation()

    ```


    如果需要设置方向，可以使用以下代码：


    ```lua

    application:setOrientation(theOrientation)

    ```


    以下是可供选择的方向选项：


    *   `Application.PORTRAIT`

    *   `Application.PORTRAIT_UPSIDE_DOWN`

    *   `Application.LANDSCAPE_LEFT`

    *   `Application.LANDSCAPE_RIGHT`


    **注意**：`Application`对象的常量都以大写字母A开头，而变量则如前所述以小写字母a开头。


    你可以使用`setOrientation`将设备定向到所需方式——例如，如果你希望游戏固定在横屏模式，需要在设置中明确指定，或使用`setOrientation`函数更改方向。注意，如果设置了此函数，它将覆盖项目设置。


    ### 缩放


    开发者面临的挑战之一是确保支持所有屏幕分辨率。许多开发者仍采用的方式是将项目分辨率设置为320×480，然后对更高分辨率使用自动缩放。缩放模式可以在项目属性窗口中设置，也可以通过代码使用`application:setScaleMode(theMode)`进行设置。图9-15展示了缩放选项及其对显示的影响。


    ![9781430246626_Fig09-15.jpg](OEBPS/Images/9781430246626_Fig09-15.jpg)


    [Figure 9-15](#9781430246626_Ch09.xhtml#_Fig15). 各种缩放选项的图示


    这将缩放屏幕以适应完全不同的分辨率，可选择的设置包括：


    *   `Application.NO_SCALE`：不应用缩放，屏幕对齐到左上角。在更大屏幕的设备上，超出项目屏幕尺寸的区域保持空白。

    *   `Application.CENTER`：不应用缩放，但屏幕居中显示。

    *   `Application.PIXEL_PERFECT`：屏幕设置为设备可用的精确像素。

    *   `Application.LETTERBOX`：屏幕以信箱模式显示，两侧出现黑边。

    *   `Application.CROP`：缩放后多余的区域被裁剪掉。

    *   `Application.STRETCH`：屏幕拉伸以适应设备分辨率，*不*考虑宽高比。

    *   `Application.FIT_HEIGHT`：屏幕缩放至设备屏幕的高度。

    *   `Application.FIT_WIDTH`：屏幕缩放至设备屏幕的宽度。


    ## 添加音效


    如果你正在创建游戏，添加音效很重要——例如，用铿锵的节拍营造悬念，或用舒缓的旋律伴随平静的时刻。本节将介绍如何为游戏添加音效。


    Gideros Studio的声音库浓缩为几个函数；这些函数足以实现我们刚才讨论的内容。


    使用Gideros Studio播放声音时，首先要注意有两个不同的对象：`Sound`对象和`SoundChannel`对象。`Sound`对象提供需要播放的数据，而`SoundChannel`对象实际播放声音。


    ```lua

    local mySound = Sound.new("sound.wav")

    local theChannel = mySound:play()

    ```


    如果你想播放长音轨并可能循环播放文件，还可以指定声音开始播放的位置以及是否循环播放。


    ```lua

    local channel = mySound:play(startTime, loops)

    ```


    `startTime`默认为0，`loops`定义声音循环播放的次数。`loops`值为0（默认值）表示声音不循环，只播放一次；值为1表示循环一次；值为2表示循环两次，依此类推。如果你希望声音无限循环，可以使用`math.huge`。'
