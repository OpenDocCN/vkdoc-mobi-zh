    Drawing Other Shapes


    Because Gideros Studio offers the user a canvas to draw any shape, there are no
    built-in API functions for lines, rectangles, circles, or arcs. However, you can
    use moveTo and lineTo to draw any shape you want. This allows you to create your
    own Bezier curves, arcs, ovals, circles, and so on.


    **Note**   When you draw something on the shape, it is retained along with any
    subsequent draw over whatever is already present on the shape. Therefore, it is
    best to start with obj:clear() to clear out the shape before drawing.


    The Application Object


    You might want to get details such as the width of the device, the height of the
    device, or the locale of the device, in case you are making multilingual apps.
    You might want to know if the device runs iOS or Android, and so on. Gideros Studio
    has an extensive range of functions that allow us to query the Application object
    to get these types of details. Here are a few examples:


    ```

    local width = application:getDeviceWidth()

    local height = application:getDeviceHeight()

    local model = application:getDeviceInfo()

    print("On " .. model .. " (" .. width .. " x " .. height .. " )" )

    ```


    **Note**   The variable that holds the Application object is application, not
    Application (note the lowercase *a*).


    Look at the output pane in the IDE. If you are running this on a device player,
    the output would be the device you are running it on, and if you are running the
    desktop player, as in this case, you will see “Mac OS” or “Windows,” depending
    on which is being run. In the case of a mobile device, application:getDeviceInfo()
    returns multiple values. For Android, it returns “Android” followed by the version
    number, and on an iOS device, it returns five values: “iOS,” the version, the
    device type, the UI idiom, and the device model. Here’s some sample output from
    the iPhone running the Gideros Player:


    ```

    iOS 5.1 iPhone iPhone iPhone3,1

    ```


    Keeping the Device Awake


    If you need to perform some calculations and are worried that in that time the
    device might dim and then go to sleep or switch off, you can ensure that the device
    does not dim simply by using the following:


    ```

    application:setKeepAwake(true)

    -- Prevent the device from dimming

    ```


    Alternatively, you can use this:


    ```

    application:setKeepAwake(false)

    -- Allow the device to dim

    ```


    Orientation


    If you need to gather how the device is held at a particular point in time, you
    can query the orientation of the device, like so:


    ```

    application:getOrientation()

    ```


    And if you need to set the orientation, you can use the following:


    ```

    application:setOrientation(theOrientation)

    ```


    These are the orientation options:


    *   Application.PORTRAIT

    *   Application.PORTRAIT_UPSIDE_DOWN

    *   Application.LANDSCAPE_LEFT

    *   Application.LANDSCAPE_RIGHT


    **Note**   The constants for the Application object all begin with a capital *A*,
    whereas the variables begin with a lowercase *a*, as mentioned earlier.


    You can use setOrientation to orient the device in the manner you want—for example,
    if you want a game fixed in landscape mode, you need to explicitly set it in the
    settings or change the orientation using the setOrientation function. Note that
    if you set this function, it overrides the project settings.


    Scaling


    One of the challenges faced by developers is ensuring that all screen resolutions
    are supported. One way that many developers still address this is by setting the
    resolutions of the project to 320×480 and then using autoscaling for higher resolutions.
    The scale mode can be set from the project properties window, but it can also
    be set via code using application:setScaleMode(theMode). [Figure 9-15](#9781430246626_Ch09.xhtml#Fig15)
    shows the scaling options and how they affect the display.


    ![9781430246626_Fig09-15.jpg](OEBPS/Images/9781430246626_Fig09-15.jpg)


    [Figure 9-15](#9781430246626_Ch09.xhtml#_Fig15).  An illustration of the various
    scaling options


    This will scale the screen to fit an entirely different resolution, and the settings
    to choose from are


    *   Application.NO_SCALE: No scaling is applied and the screen is aligned to the
    top-left corner. On a device with a larger screen, the area beyond the size of
    the project screen is left blank.

    *   Application.CENTER: No scaling is applied but the screen is centered and displayed.

    *   Application.PIXEL_PERFECT: The screen is set to the exact pixels that are
    available on the device.

    *   Application.LETTERBOX: The screen is displayed in letterbox mode with banding
    on the sides.

    *   Application.CROP: The excess area when scaled is cropped off

    *   Application.STRETCH: The screen is stretched to fit the device resolution,
    and the aspect ratio is *not* considered.

    *   Application.FIT_HEIGHT: The screen is scaled to the height of the device’s
    screen.

    *   Application.FIT_WIDTH: The screen is scaled to the width of the device’s screen.


    Adding Sound Effects


    If you’re creating a game, it’s important to include sound effects—for example,
    thumping beats to create suspense or soothing melodies to accompany calmer moments.
    This section will describe how to include sound effects for your game.


    The Gideros Studio sound library is condensed into a couple of functions; these
    are enough to achieve what we just discussed.


    The first thing to note while playing sound with Gideros Studio is that there
    are two distinct objects: the Sound object and the SoundChannel object. The Sound
    object provides the data that needs to be played, whereas the SoundChannel object
    actually plays the sound.


    ```

    local mySound = Sound.new("sound.wav")

    local theChannel = mySound:play()

    ```


    If you want to play a long track and perhaps loop through the file, you can also
    specify the point from where you want the sound to start playing and whether you
    want to loop the sound.


    ```

    local channel = mySound:play(startTime, loops)

    ```


    startTime is 0 by default, and loops defines how many times you want the sound
    to be looped. A loops value of 0 (the default) means that the sound will not be
    looped but just played once, 1 means that it will be looped once, a value of 2
    looped twice and so on. If you want the sound to loop infinitely, you can use
    math.huge.'
