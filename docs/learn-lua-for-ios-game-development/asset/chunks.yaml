    Finding the Difference Between Two Tables


    In your game, you might have the player collect items, so that you can display
    the items collected at the end of the level. But you might also want to display
    the items that the could have collected but did not. An easy way to do so is to
    use two tables—one with the items collected and one with all of the items that
    could have been collected. Then, using the following function, you can determine
    the items that exist in table 2 but not in table 1:


    ```

    function differenceOfTables(table1, table2)

      local res = {}

      for i, j in pairs(table1) do

        if not isValueInTable(j,table2) then

          table.insert(res, j)

        end

      end

    end

    ```


    Getting a Return Value As a Table


    In some cases you expect to get a table, but if the return value is a number or
    a string, it just breaks your code and causes errors. You can ensure that you
    get returned a table value with the following:


    ```

    function getTable(theValue)

      if type(theValue) == "table" then

        return theValue

      else

      return {theValue}

      end

    end

    ```


    Sorting on Elements of a Table


    The table.sort function is a very handy function for sorting tables with single
    dimensions and that have numeric or string values. If we were given a table that
    was a record with the structure as follows, the generic sort function would not
    work:


    ```

    {

    name = "Jayant",

    subject = "IT",

    grade = "A"

    }

    ```


    We might want to sort these records according to one of the three fields: grade,
    name, or subject. As this is sorting on more than one dimension, the sort function
    would not work.


    We sort a table using the function table.sort(theTable, functionToSort). In the
    case of this example, we can use


    ```

    function sortOnField(theTable, theField)

      table.sort(theTable,

        function(a,b)

            return a[theField] < b[theField]

        end)

    end

    ```


    If the table is a multidimensional array, you can simply pass the dimension instead
    of the field name, and it should work.


    Determining Frequency of an Item in a Table


    The table can be used as a storage space. For example, you could save all the
    items that the player collects during the game to be used in calculating an end-of-level
    score, using a multiplier based on the collected items. To do so, you might want
    to know how many items of a particular type there are in the table. If these were
    plain numbers, you might want to know the frequency of the numbers in the table.


    ```

    function getCount(theTable, theValue)

      local count = 0

      for i,j in pairs(theTable)

        if j == theValue then

          count = count + 1

        end

      end

      return count

    end

    ```


    Converting Numbers into Roman Numerals


    If you ever need to translate number into Roman numerals, you use the toRoman
    function, as follows:


    ```

    function toRoman(theNumber)

      local res = ""

      local romans = {

          {1000, "M"}, {900, "CM"}, {500, "D"}, {400, "CD"}, {100, "C"},

          {90,  "XC"}, {50, "L"}, {40, "XL"}, {10, "X"}, {9, "IX"},

         {5,   "V"}, {4, "IV"}, {1, "I"}

        }

      local k = theNumber

      for i,j in ipairs(romans) do

        theVal, theLet = unpack(j)

        while k >= theVal do

          k = k – theVal

          res = res .. theLet

        end

      end

      return res

    end

    ```


