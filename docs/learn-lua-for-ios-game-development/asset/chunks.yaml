    \n模式末尾还可以加上 `\"b\"`，表示以二进制模式而不是文本模式打开文件。此函数返回一个可在显式文件操作中使用的文件句柄。\n\n```\nfile\
    \ = io.open(\"myfilename.txt\", \"r\")\n```\n\n### `io.output ( [file] )`\n"
- fmt: "# Lua File I/O Functions\n\nThis function is similar to `io.input()` but operates\
    \ on the default output file instead. Using this function, you can redirect the\
    \ output to the file you want. Here’s an example of how it’s used:\n\n```\noldIOFile\
    \ = io.output()\nio.output(\"mynewfile.txt\")\nio.write(\"Hello world\")\nio:output():close()\n\
    io.output(oldIOFile)\n```\n\n## `io.read ( … )`\n\nThis function is equivalent\
    \ to `io.input():read()`.\n\n```\nprint(io.read())\n```\n\n## `io.tmpfile ( )`\n\
    \nThis function returns a handle for a temporary file; the file is opened in update\
    \ mode and removed automatically when the program ends.\n\n```\nfh = io.tmpfile()\n\
    fh:write(\"Some sample data\")\nfh:flush()\n-- Now let's read the data we just\
    \ wrote\nfh:seek(\"set\", 0)\ncontent = fh:read(\"*a\")\nprint(\"We got : \",\
    \ content)\n```\n\n## `io.type ( obj )`\n\nThis function returns the result if\
    \ the handle specified by `obj` is a valid file handle. It returns the string\
    \ `\"file\"` if `obj` is an open file handle and the string `\"closed file\"`\
    \ if `obj` is a closed file handle. It returns `nil` if `obj` is not a file handle.\n\
    \n```\nprint(io.type(fh)) -- prints nil as fh is nil\nfh = io.input()\nprint(io.type(fh))\n\
    ```\n\n## `io.write ( … )`\n\nThis function is equivalent to `io.output():write()`.\n\
    \n```\nio.write(\"Hello World\")\n```\n\n# Explicit Functions\n\nThis section\
    \ lists and describes the explicit functions you’ll be using in your Lua programming\
    \ work.\n\n## `file:close ( )`\n\nThis function closes the file that is referenced\
    \ by the file.\n\n```\nfile = io.open(\"myFile.txt\", \"w\")\nfile:write(\"Some\
    \ Data\")\nfile:close()\n```\n\n## `file:flush ( )`\n\nThis function saves any\
    \ data that is not as yet written (in the buffer) to the file.\n\n```\nfh = io.tmpfile()\n\
    fh:write(\"Some sample data\")\nfh:flush()\n```\n\n## `file:lines ( )`\n\nThis\
    \ function returns an iterator function that returns a new line from the file\
    \ every time it is called. It is similar to `io.lines()`, with the difference\
    \ that this function does not close the file when the loop ends.\n\n```\nlocal\
    \ file = io.open(filename)\nfor line in file:lines() do print(line) end\nfile:close()\n\
    ```\n\n## `file:read ( [format] )`\n\nThis function reads data from the file according\
    \ to the given format. By default, `read` reads the entire next line. The formats\
    \ that are available for reading are:\n\n- `'*n'`: Reads a number; returns a number\
    \ instead of a string\n- `'*a'`: Reads the whole file starting from the current\
    \ position\n- `'*l'`: Reads the next line; returns `nil` when the current position\
    \ is at the end of the file (default format)\n- `number`: Reads a string of characters\
    \ as specified by the number, returning `nil` at the end of the file.\n\nFollowing\
    \ are some examples of using these:\n\n```\nlocal filename = \"data_test.txt\"\
    \nlocal file = io.open(filename)\nlocal contents = file:read(\"*a\")\nfile:close()\n\
    print(\"Contents of the file:\", contents)\n```\n\nIf this file were opened in\
    \ binary mode and we needed to get only a particular number of characters, then\
    \ we would use it as follows:\n\n```\nlocal filename = \"test.zip\"\nlocal file\
    \ = io.open(filename,\"rb\")\nlocal contents = file:read(2)\nfile:close()\nprint(\"\
    File Header:\", contents)       -- All ZIP files have the starting two characters\
    \ as PK\n```\n\n## `file:seek ( [whence] [, offset] )`\n\nThis functions sets\
    \ and gets the current file position. `whence` is a string value that can be any\
    \ of the following:\n\n- `'set'`: The base position 0 (beginning of the file)\n\
    - `'cur'`: The current position (default value)\n- `'end'`: The end of the file\n\
    \nThe `offset` value passed is measured in bytes from the base specified as per\
    \ one of these three options.\n\n`file:seek()` is one of most important functions\
    \ when working with binary files and fixed formats; it allows the developer to\
    \ iterate back and forth to overwrite or update certain portions of the file.\n\
    \n```\nfh = io.tmpfile()\nfh:write(\"Some sample data\")\nfh:flush()\n-- Now let's\
    \ read the data we just wrote\nfh:seek(\"set\", 0)\ncontent = fh:read(\"*a\")\n\
    print(\"We got : \", content)\n```\n\n## `file:setvbuf (mode [, size] )`\n\nThis\
    \ function sets the buffering mode for an output file. There are three buffering\
    \ modes available in Lua, and their values are passed as strings:\n\n- `'no'`:\
    \ No buffering is set, so the output of any operation appears immediately.\n-\
    \ `'full'`: Full buffering is set, so the output operation is only performed when\
    \ the buffer is full. You can force a flush to write the buffers.\n- `'line'`:\
    \ Line buffering is set, so the output is buffered until a newline character (Enter)\
    \ is found.\n\n```\nio.output():setvbuf(\"no\")\n```\n\n## `file:write( … )`\n\
    \nThis function writes to the file each of the arguments passed to the function.\
    \ The arguments must be either strings or numbers. To write other values, you\
    \ might have to convert them to string format.\n\n```\nfile = io.open(\"myfile.txt\"\
    ,\"w\")\nfile:write(\"Writing to a file\")\nfile:close()\n```\n\n**Note**: The\
    \ pure implementation of Lua lacks the functions and commands required for file\
    \ system access. This is generally available as an external library that can be\
    \ added. It is called *Lua File System (LFS)*. As of this writing, you can integrate\
    \ it with all frameworks (the amount of effort this takes, however, depends on\
    \ the framework.)\n\n# Uses of File I/O in Gaming\n\nThough this is a no-brainer,\
    \ there are so many reasons why you might want to read or write data from the\
    \ storage. It can be for little things like level-related data and high scores,\
    \ or for complex things like saving the state of the game with the entire inventory,\
    \ units, and so on. In the game, the onus is on you to save and load the data\
    \ to help provide continuity and seamless game play to the player.\n\nLet’s look\
    \ at how we would do that when dealing with stuff like life, health, score, level,\
    \ and so forth.\n\n## Saving a Variable\n\nIn many games, you generally get only\
    \ about three lives. So, consider the following code:\n\n```\nlocal lives = 3\n\
    print(\"You have \" .. lives .. \" lives left\")\n```\n\nThere are many ways of\
    \ dealing with this. One good way would be to save the data as soon as you change\
    \ it—something like an autosave option. So, let’s write out `lives` variable to\
    \ the storage so that it persists.\n\n```\nfunction writeToFileSingle(value, filename)\n\
    \    local hfile = io.open(filename,\"w\")\n    if hfile==nil then return end\
    \ -- Did not get a handle on the file\n    hfile:write(value)\n    hfile:close()\n\
    end\n```\n\nIn the preceding code, we declare a function called `writeToFileSingle`\
    \ that takes two parameters: `value` and `filename`. The function opens a file,\
    \ writes the data to the file, and then closes the file. If we open a file, we\
    \ are responsible for closing it too. When we try to open a file using the `io.open()`\
    \ function, it returns the file handle and a string that contains the reason for\
    \ the failure (if it fails to open the file).\n\nTo save our value using this\
    \ function, we simply call:\n\n```\nwriteToFileSingle(score, \"score\")\nwriteToFileSingle(health,\
    \ \"health\")\n```\n\nand so on.\n\nCongratulations, you have now written code\
    \ to save a variable, and it can be run in the interactive Lua shell, as expected.\n\
    \n**Note**: Irrespective of which platform you choose as a developer, the preceding\
    \ Lua code should work across most of the platforms and Lua frameworks.\n\n##\
    \ Grabbing the Data\n\nIn addition to saving data, we also need to retrieve it.\
    \ In a game, dumping data that we cannot retrieve is as good as not saving any\
    \ data at all. We have, with the earlier function `writeToFileSingle()`, saved\
    \ our data to a variable. Now comes the tricky part: reading the values from the\
    \ file.\n\nIn theory, reading the data from a file should be the reverse process\
    \ of writing to the file. So, we open the file that we have saved our data into\
    \ and then we read all of the data from the file.\n\n```\nfunction readFromFileSingle(filename)\n\
    \    local hfile = io.open(filename, \"r\")\n    if hfile==nil then return end\n\
    \    local value = hfile:read(\"*a\")\n    hfile:close()\n    return value\nend\n\
    ```\n\nSince we’ve saved our data using the `writeToFileSingle()` function, we\
    \ can retrieve our data easily, like so:\n\n```\nprint(readFromFileSingle(\"score\"\
    ))\nprint(readFromFileSingle(\"health\"))\n```"
