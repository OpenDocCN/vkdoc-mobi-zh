  trans: '

    **注意**    你可使用 `scale()` 函数或 `xScale` 与 `yScale` 属性来调整对象的缩放比例，尽管它们的工作方式略有不同。前者是相对于当前缩放比例进行缩放，而后者则是为对象赋予绝对的缩放值。


    在本练习中，我们将简单使用 `xScale` 或 `yScale` 方法来缩放矩形。其优势在于，当我们只需要在单一轴上缩放对象时，可以使用 `scale`
    属性；而使用 `scale()` 函数时，则需要同时指定 x 轴和 y 轴的缩放值。


    ```

    rect_01.xScale = 0.5

    ```


    旋转对象同样简单——我们可以直接使用 `rotation` 属性或 `rotate()` 函数。与缩放函数和方法类似，`rotate` 和 `rotation`
    也分别处理相对旋转或绝对旋转。如果我们对同一个对象连续调用三次 `rotate()` 函数，每次角度值为 30，那么对象将旋转 90 度（即 30 度 ×
    3）；而如果多次将 `rotation` 属性值设为 30，则对象始终只会旋转到绝对的 30 度位置。


    ```

    rect_01.rotation = 30

    ```


    以下是完整的代码：


    ```

    local rect_01 = display.newRect( 50, 50, 200, 200 )

    rect_01:setFillColor(255,0,0)

    rect_01.strokeWidth = 2

    rect_01:setStrokeColor(0,255,0, 128)

    rect_01.xScale = 0.5

    rect_01.rotation = 30

    ```


    图 8-6 展示了应用上述所有变换后的效果。


    ![9781430246626_Fig08-06.jpg](img/9781430246626_Fig08-06.jpg)


    图 8-6 . 应用于矩形的变换


    ## 组


    所有显示元素都可以被放入一个组中。可以将组视为一个能够容纳显示元素的容器。组的好处在于，通过操控组的位置和显示属性，你可以同时影响组内所有显示元素。你可以对它们进行移动、旋转和缩放，也可以修改它们的
    `alpha` 属性和可见性。


    ```

    local grp = display.newGroup()

    local text1 = display.newText("One", 10, 10)

    local text2 = display.newText("Two", 10, 30)

    local text3 = display.newText("Cha-Cha Cha", 10, 50)

    ```


    运行这段代码时，屏幕上会显示三行文本。我们可以通过修改元素的 `x` 或 `y` 位置来移动其中任何一个。将以下代码添加到上述代码的末尾。要重新运行或刷新，在
    Mac 上只需按下 ![image](img/flower.jpg) + `R`，在 Windows 上则按下 `Ctrl + R`。Corona SDK
    还会监视目录中的更改，如果项目发生改变，它会提供重新启动项目的选项。


    ```

    text2.y = 90

    ```


    运行后，“Two”文本会显示在“Cha-Cha Cha”文本的下方，而原来显示“Two”的位置现在变成了空白。


    让我们将文本“One”添加到组中：


    ```

    grp:insert(text1)

    ```


    刷新后，一切看起来应该和之前一样。现在我们来尝试定位包含文本“One”的那个组。


    ```

    grp.x = 100

    grp.y = 20

    ```


    刷新模拟器后，文本“One”发生了移动，如 图 8-7 所示。它现在位于原来文本“Two”所在的位置，但稍微靠右一些。虽然我们修改的是组的位置，但因为文本包含在该组中，所以它也随着移动。


    ![9781430246626_Fig08-07.jpg](img/9781430246626_Fig08-07.jpg)


    图 8-7 . 在组中显示文本


    默认情况下，所有元素都有一个父级，或者说一个包含它们的组。所有已创建元素的根组或父组被称为*舞台*（stage）。我们可以通过 `display.getCurrentStage()`
    函数来访问它。


    ## 图像


    相较于 C、C++ 或 Objective-C 等语言，选择 Lua 的优势之一在于，它无需手动分配和释放内存。与原生代码相比，框架提供的封装器使得编码更加简便。使用
    Corona SDK 时，我们可以轻松地加载并在屏幕上显示图像。

