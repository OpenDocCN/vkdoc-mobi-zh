- fmt: '**Tip**：如果你希望可视化地创建粒子效果，有一款用LÖVE编写的应用程序可以实现交互式粒子创建。你可以在[https://love2d.org/forums/viewtopic.php?f=5&t=8747&sid=9bf680d6ed9857549d63fb2ba63fc078](https://love2d.org/forums/viewtopic.php?f=5&t=8747&sid=9bf680d6ed9857549d63fb2ba63fc078)找到它。


    ## Physics


    在物理引擎方面，Box2D是所有框架的共同核心。如前所述，Box2D是一个非常复杂且庞大的库。虽然有些框架封装并提供了少量函数来使用该库，但LÖVE为开发者提供了完整的访问权限，因此创建物理体需要多几个额外步骤。


    首先，我们需要设置物理世界，在其中定义其边界。一个不错的起点是使用屏幕尺寸作为世界的大小。


    ```

    world = love.physics.newWorld(0,0,_W,_H)

    ```


    **注意**：在LÖVE 0.8.0中，`love.physics.newWorld`函数的参数已更改为接收重力的x、y分量以及是否允许物体休眠：`love.physics.newWorld(
    xg, yg, sleep )`。


    接下来，我们设置物体的缩放比例（这在Corona SDK中是无法实现的，这也导致其在物理体方面存在一些缺陷）：


    ```

    world:setMeter( number )

    ```


    这个物理世界中的所有坐标都会除以这个数值。这是一种无需图形变换即可在屏幕上绘制的便捷方法。


    然后，我们创建物理体：


    ```

    local body = love.physics.newBody(world, 10, 10, 0, 0)

    ```


    传递的参数依次是：世界对象、x坐标、y坐标、物体的质量以及物体的转动惯量。


    物理世界不会自动更新自己，需要由我们来手动更新。我们可以通过`love.update`方法来确保它更新，如下所示：


    ```

    function love.update(dt)

      world:update (dt)

    end

    ```


    **注意**：在LÖVE 0.8.0中，此函数已被修改，不再接受质量和惯量参数，而是接收一个定义物体类型的字符串，类型可以是静态（static）、动态（dynamic）或运动学（kinematic），定义方式为`love.physics.newBody(
    world, x, y, type )`。


    创建物体后，我们需要赋予它一个形状。这是物理对象上的边界框，可以是矩形、圆形、多边形、边缘形状或链状形状。*边缘形状*是一个线段，而*链状形状*则由多个线段组成。


    ```

    local bodyshape = local.physics.newRectangleShape(body, 0, 0, 20, 40, 0)

    ```


    这段代码赋予了物体一个矩形形状，起始位置相对于物体为(0, 0)，宽度为20个单位，高度为40个单位。


    如果此时运行这段代码，什么也不会发生。我们还需要将物体绘制到屏幕上。为此，我们需要在`love.draw()`函数中绘制形状：


    ```

    function love.draw()

      love.graphics.rectangle("fill", body:getX(), body:getY(), 20, 40)

    end

    ```


    现在，你会看到屏幕左上角绘制了一个矩形。但它并不会像物理体那样自动移动。这是因为质量当前被设置为0，意味着物体没有重量，因此不会移动。如果我们修改它，赋予它一点重量，它就会开始下落或上升（取决于重力设置）。如果在这个例子中给物体赋予一个正的质量值，它将会掉出屏幕，因为没有其他物体阻止它下落。


    我们为`bodyShape`选择矩形而非多边形的原因之一是：由于这个对象将是一个动态对象，我们需要它随着移动而被绘制。使用`body:getX()`和`body:getY()`函数可以获取对象的当前x和y位置并在此绘制。如果我们使用了多边形方法，它会在固定位置创建一个静态对象。


    我们在`love.load()`函数中添加以下两行代码：


    ```

    ground = love.physics.newBody(world, 400,600,0,0)

    groundShape = love.physics.newRectangleShape(ground, 0,0,800,65,0)

    ```


    这创建了一个名为`ground`的静态对象，它是一个矩形形状的物体。然后我们在`love.draw()`函数中添加以下代码，用于渲染实心形状：


    ```

    love.graphics.polygon("fill", groundShape:getPoints())

    ```


    现在，底部有了一个地面，它可以防止较小的物理体掉出屏幕。


    我们还可以通过鼠标点击为物体添加冲量来实现交互功能。这通过`love.mousepressed`函数实现：


    ```

    function love.mousepressed(key, button)

      if button == "l" then

        body:addImpulse(0,-20)

      end

    end

    ```


    当我们在窗口中点击时，物体会跳起，然后再次落回地面。你可以将冲量值改为更大或更小的数字来改变结果。


    当物体超出我们设置的世界范围时，它会被移除，所以如果它跳得过高，就不会再返回。如果你希望物体跳出屏幕后能返回，那么需要创建一个比屏幕尺寸更大的世界——例如：


    ```

    world = love.physics.newWorld(−_W, -_H, _W*2, _H*2)

    ```


    ## Displaying Text


    在游戏中，除了精灵、物理体等元素之外，我们可能还希望在屏幕上显示文本。我们使用`love.graphics`库中的`print`或`printf`函数。以下是`print`函数的示例：


    ```

    love.graphics.print("Hello world", 10, 10)

    ```


    下面是`printf`函数的示例：


    ```

    love.graphics.printf("Hello World finally but right aligned", 25, 45, 30, "right")

    ```


    如前所述，这需要放在`love.draw`函数中；否则，它不会在屏幕上显示。


    `print`函数只是将文本绘制在提供的x、y坐标处，而`printf`函数则绘制格式化、自动换行并对齐的文本。`printf`函数的语法是：


    ```

    printf(text, x, y, width, alignment)

    ```


    `alignment`参数是一个字符串，可以是`left`、`right`或`center`，`width`参数指定文本的宽度；任何超过该值的文本都会自动换行。


    正如前面“图像”部分所述，我们可以通过`love.graphics.setColor`函数设置颜色。这将为后续绘制的所有对象设置颜色。因此，管理颜色的方法是在绘制每个对象之前为其设置颜色。


    要打印彩虹的七种颜色，我们可以使用：


    ```

    lg = love.graphics

    lgc = love.graphics.setColor

    function love.load()

      lg.setBackgroundColor(255,255,255)

    end


    function love.draw()

      lgc(141,56,201) -- Violet

      lg.print("Violet", 10,10)

      lgc(46,08,84) -- Indigo

      lg.print("Indigo", 10,30)

      lgc(0,0,255) -- Blue

      lg.print("Blue", 10,50)

      lgc(0,255,0) -- Green

      lg.print("Green", 10,70)

      lgc(255,255,0) -- Yellow

      lg.print("Yellow", 10,90)

      lgc(255,165,0) -- Orange

      lg.print("Orange", 10,110)

      lgc(255,0,0) -- Red

      lg.print("Red", 10,130)

    end

    ```


    ## Shaders


    LÖVE从0.8.0版本开始支持像素着色器，这些也被称为片段着色器。它们计算每个像素的颜色和其他属性。使用着色器，你可以生成各种效果，包括为图像添加颜色。


    像素效果不是用Lua编程或描述的，而是使用OpenGL着色语言（GLSL），它是像素着色器使用的函数子集。请注意GLSL与Lua语法相比更接近C或JavaScript类型的语法。


    让我们制作一个将图像着色为黑白效果的示例：


    ```

    local image = love.graphics.newImage("myImage.png")

    imagesx = image:getWidth()

    imagesy = image:getHeight()


    effect = {}

    effect.name = "Black and White"

    effect.effect = love.graphics.newPixelEffect [[

        extern number value;

        vec4 effect(vec4 color, Image texture, vec2 texture_coords, vec2 pixel_coords)

          {

            vec4 pixel = Texel(texture, texture_coords);

            float avg = max(0, ((pixel.r + pixel.g + pixel.b)/3) + value/10);

            pixel.r = avg;

            pixel.g = avg;

            pixel.b = avg;

            return pixel;

          }

    ]]


    value = 0

    ```'
  raw: '**Tip**   If you want to visually create particle effects, there is an application
    written in LÖVE that allows for interactive particle creation. It can be found
    at [https://love2d.org/forums/viewtopic.php?f=5&t=8747&sid=9bf680d6ed9857549d63fb2ba63fc078](https://love2d.org/forums/viewtopic.php?f=5&t=8747&sid=9bf680d6ed9857549d63fb2ba63fc078).


    Physics


    Box2D is the common thread across all of these frameworks when it comes to physics.
    As mentioned earlier, Box2D is a very complex and large library. While some frameworks
    wrap and offer a few functions to work with the library, LÖVE offers developers
    complete access, so there are a couple of extra steps involved to create a physics
    body.


    First we need to set up the physics world, in which we define its boundaries.
    A good place to start is to use the screen dimensions for the world.


    ```

    world = love.physics.newWorld(0,0,_W,_H)

    ```


    **Note**   In LÖVE 0.8.0, the function love.physics.newWorld has been changed
    to take the x, y components of gravity and if the bodies are allowed to sleep
    or not: love.physics.newWorld( xg, yg, sleep ).


    Next we set the scaling factor of the bodies (something that is not possible in
    Corona SDK, which gives it some bugs regarding physics bodies):


    ```

    world:setMeter( number )

    ```


    All the coordinates in this physics world are divided by this number value. This
    is a convenient way to draw on the screen without the need for graphic transformations.


    Next we create a physics body:


    ```

    local body = love.physics.newBody(world, 10, 10, 0, 0)

    ```


    The parameters that we pass are the world object, the x- and y-coordinates, the
    mass of the object, and the rotational inertia of the object.


    The physics world does not automatically update itself; it is up to us to do the
    updating. We can ensure that it updates via the love.update method, as follows:


    ```

    function love.update(dt)

      world:update (dt)

    end

    ```


    **Note**   With LÖVE 0.8.0, this function has been modified, and it does not take
    the mass and inertia. Instead it takes a string that defines the body type, which
    can be static, dynamic, or kinematic and is defined as love.physics.newBody( world,
    x, y, type ).


    After having created the body, we need to give it a shape. This is the bounding
    box on the physics object, which can be a rectangle, circle, polygon, edge shape,
    or chain shape. An *edge shape* is a line segment, while a *chain shape* is made
    up of multiple line segments.


    ```

    local bodyshape = local.physics.newRectangleShape(body, 0, 0, 20, 40, 0)

    ```


    This code gives the body a shape that is a rectangle starting at 0, 0 (relative
    to the body) that is 20 units in width and 40 units in height.


    If we run this code at this point, it will do nothing. We still need to draw the
    body onto the screen. To do so, in the love.draw() function, we draw the shapes:


    ```

    function love.draw()

      love.graphics.rectangle("fill", body:getX(), body:getY(), 20, 40)

    end

    ```


    You will now see the rectangle drawn at the top-left corner of the screen. It
    does not automatically move like a physics body should. This is because the mass
    is currently set to 0, which means that the body does not move, as it is weightless.
    If we change that and assign it a little weight, it will start to descend or ascend
    (depending on the gravity settings). If we give the object a positive weight value
    in this example, it will off the screen, as there is no other object to stop it
    from falling off the screen.


    One of the reasons we have used a rectangle and not a polygon for the bodyShape
    is that since this object is going to be a dynamic object, we need it to be drawn
    as it moves. Using the body:getX() and body:getY() functions, we get the current
    x and y position of the object and draw it there. If we had used the polygon method,
    it would have created a static object at a fixed location.


    We add these two lines in the love.load() function:


    ```

    ground = love.physics.newBody(world, 400,600,0,0)

    groundShape = love.physics.newRectangleShape(ground, 0,0,800,65,0)

    ```


    This creates a static object called ground which is a rectangular-shaped body
    and then we add this line in the love.draw() function, which will render the shape
    solid:


    ```

    love.graphics.polygon("fill", groundShape:getPoints())

    ```


    Now we have a ground at the bottom that will prevent the smaller physics body
    from falling off the screen.


    We can also add interactivity by adding an impulse to the object when the mouse
    is clicked. We do this via the love.mousepressed function.


    ```

    function love.mousepressed(key, button)

      if button == "l" then

        body:addImpulse(0,-20)

      end

    end

    ```


    When we click in the window, the object jumps up and then lands on the ground
    again. You can change the impulse value to a larger or smaller number to vary
    the results.


    When the object goes out of the world that we set, it gets removed, so if it jumps
    up too high, it will not return. If you want the object to jump off the screen
    and return, then you’ll need to create a world that is larger than the screen
    size—for example:


    ```

    world = love.physics.newWorld(−_W, -_H, _W*2, _H*2)

    ```


    Displaying Text


    In a game, we might want to display text on the screen in addition to sprites,
    physics bodies, and so on. We use the print or the printf function available in
    the love.graphics library. Here’s an example of the print function:


    ```

    love.graphics.print("Hello world", 10, 10)

    ```


    And here’s the printf function:


    ```

    love.graphics.printf("Hello World finally but right aligned", 25, 45, 30, "right")

    ```


    As mentioned, this needs to be in the love.draw function; otherwise, it won’t
    be visible on the screen.


    The print function just draws the text on the screen at the x,y-coordinates provided,
    whereas the printf function draws text that is formatted and also wrapped and
    aligned. The syntax for the printf function is


    ```

    printf(text, x, y, width, alignment)

    ```


    The alignment is a string that can be left, right, or center, while the width
    specifies the width of the text; any text that exceeds this value gets wrapped
    automatically.


    As described earlier, in the "Images" section, we can set the color via the love.graphics.setColor
    function. This will set the color for all objects drawn subsequently. So, the
    way to manage this is to set the color for every object before it is drawn.


    To print the seven colors of the rainbow, we can use


    ```

    lg = love.graphics

    lgc = love.graphics.setColor

    function love.load()

      lg.setBackgroundColor(255,255,255)

