    error events. Each time a chunk of data is received, the progress event is fired
    and the event object passes bytesLoaded and bytesTotal. This can be used to track
    and display the progress in bytes or as a percentage. If there is an error, the
    error event is raised, and on successful completion, the complete event is raised.


    GPS and Compass


    The device can be queried for the GPS location and the compass location details.
    We can get these readings by setting a event listener for Event.HEADING_UPDATE
    for the GPS and Event.LOCATION_UPDATE for compass details, as follows:


    ```

    require "geolocation"


    function onHeadingUpdate()


    end


    function onLocationUpdate(event)

      latitude  = event.latitude

      longitude = event.longitude

      altitude  = event.altitude

      print(latitude, longitude, altitude)

    end


    function onHeadingUpdate(event)

      local tHeading = event.trueHeading

      local mHeading = event.magneticHeading

      print(tHeading, mHeading)

    end


    geolocation:addEventListener(Event.HEADING_UPDATE, onHeadingUpdate)

    geolocation:addEventListener(Event.LOCATION_UPDATE, onLocationUpdate)

    geolocation:start()

    ```


    You can check the hardware if the GPS is available or if the user has enabled
    the GPS capability by using the function isAvailable. You can also check for the
    heading details via the isHeadingAvailable function on the geolocation objects.


    You can start and stop the updating of the heading and location information by
    using the startUpdatingHeading and startUpdatingLocation functions, and the stopUpdatingHeading
    and stopUpdatingLocation functions, respectively.


    Accelerometer


    The Accelerometer class is used to access the accelerometer data, if the device
    has an accelerometer. To be able to access the accelerometer, you need to call
    require "accelerometer", and when this is loaded, a variable of type Accelerometer
    is created. It can be accessed as accelerometer. Then you can call the start function
    on the accelerometer object. If at any time you need to stop the accelerometer
    for any reason—including saving battery life or preventing unnecessary events
    from being triggered—you can call the stop function.'
