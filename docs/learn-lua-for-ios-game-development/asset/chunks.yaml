    **动画**\n\n基本的逐帧动画是通过以固定频率改变帧中的图像来实现的。这个频率被称为帧率（`fps`）。然而，对于文本、矩形和圆形等其他对象，随着时间的推移修改它们的属性也能产生动画效果。\n\
    \n要获取或设置`prop`的位置，可以使用`getLoc`或`setLoc`函数。这相当于为`prop`设置一个属性。\n\n```\nx, y = prop:getLoc()\n\
    等同于\nx = prop:getAttr( MOAISprite2D.ATTR_X_LOC )\ny = prop:getAttr( MOAISprite2D.ATTR_Y_LOC\
    \ )\n```\n\n`setLoc`和`getLoc`基本上是用于从`prop`访问属性的便捷方法。另一个非常有用的便捷方法是`moveRot`，它用于在指定的时间段内将对象旋转特定角度。\n\
    \n```\nprop:moveRot(180, 2)\n```\n\n这段代码将在 2 秒内将`prop`旋转 180 度。\n\n`MOAIEaseDriver`可以直接操作属性；我们只需指定要操作的对象和属性。`MOAIEaseDriver`对节点属性应用简单的缓动曲线。以下是其使用示例。\n\
    \n```\nease = MOAIEaseDriver.new()\nease:reserveLinks(3)\nease:setLink(1, prop,\
    \ MOAIProp2D.ATTR_X_LOC, 64)\nease:setLink(2, prop, MOAIProp2D.ATTR_Y_LOC, 64)\n\
    ease:setLink(3, prop, MOAIProp2D.ATTR_Z_ROT, 360)\nease:start()\n```\n\n这段代码创建了一个缓动驱动器，然后设置每个通道以定位单个`prop`的特定属性。这将使`prop`从屏幕左上角旋转并移动到新位置。\n\
    \n**注意**：当你设置两个`prop`（称为图节点）之间的父子关系（以及依赖关系）时，父节点会先被更新，然后才是子节点。\n\n**图块组（Tile Decks）**\n\
    \n本章前面我描述了可以使用的各种图块组。在本节中，我们将更深入地了解`MOAITileDeck2D`，它有助于创建逐帧动画。`TileDeck2D`的精灵表要求所有帧的尺寸相同。加载纹理时，需要设置横向的帧数和纵向的帧数。由于所有帧的尺寸相同，因此当你使用`setSize`函数设置尺寸时，精灵表会根据函数指定的参数被等分为若干帧。尺寸的计算方式如下：\n\
    \n```\nframeWidth = spriteSheetWidth / columns\nframeHeight = spriteSheetHeight\
    \ / rows\n```\n\n以下示例展示了如何使用帧动画。代码的结果如图 10-6 所示。\n\n![9781430246626_Fig10-06.jpg](img/9781430246626_Fig10-06.jpg)\n\
    \n图 10-6. 在 Moai 中使用单独帧对精灵进行动画\n\n```\n_max_ = 11\n\nMOAISim.openWindow(\"Tiles\
    \ Deck Sample\",320,480)\n\nviewport = MOAIViewport.new()\nviewport:setSize(320,480)\n\
    viewport:setScale(320,-480)\nviewport:setOffset(-1,1)\n\nlayer = MOAILayer2D.new()\n\
    layer:setViewport(viewport)\nMOAISim.pushRenderPass(layer)\n\ntile = MOAITileDeck2D.new()\n\
    tile:setTexture(\"stick.png\")\ntile:setSize(_max_,1)\ntile:setRect(-20,31,20,-31)\n\
    \nprop1 = MOAIProp2D.new()\nprop1:setDeck(tile)\nlayer:insertProp(prop1)\n\ncurve\
    \ = MOAIAnimCurve.new()\ncurve:reserveKeys(_max_)\n\nfor i=1,_max_ do\n curve:setKey(i,\
    \ i*(1/_max_), i, MOAIEaseType.FLAT)\nend\n\nanim = MOAIAnim:new()\nanim:reserveLinks(1)\n\
    anim:setLink(1, curve, prop1, MOAIProp2D.ATTR_INDEX)\nanim:setMode(MOAITimer.LOOP)\n\
    anim:start()\nprop1:setLoc(100,100)\n```\n\n在这个示例中，我们首先创建可用于动画的图块：\n\n```\ntile\
    \ = MOAITileDeck2D.new()\ntile:setTexture(\"stick.png\")\ntile:setSize(11,1)\n\
    tile:setRect(-20,31,20,-31)\n```\n\n我们的精灵表横向有 11 帧，纵向有 1 帧（见图 10-7）。所有帧的尺寸均为 40×62，我们通过`setRect`来设置。\n\
    \n![9781430246626_Fig10-07.jpg](img/9781430246626_Fig10-07.jpg)\n\n图 10-7. 我们将用于动画的`stick.png`图像\n\
    \n在`setRect`函数中为矩形尺寸设置负值，会将对象沿值为负的坐标轴翻转。由于 Moai 的 y 轴是递增的，我们将比例尺设置为以左上角为原点（0,0），因此我们的图像会沿\
    \ y 轴翻转显示。为了修正这一点，我们使用`tile:setRect(-20,31,20,-31)`而不是`tile:setRect(-20,-31,20,31)`。\n\
    \n```\nprop1 = MOAIProp2D.new()\nprop1:setDeck(tile)\nlayer:insertProp(prop1)\n\
    ```\n\n我们创建一个`MOAIProp2D`对象，将刚创建的图块设置为该`prop`的图块组，然后将该`prop`插入到图层中：\n\n```\ncurve\
    \ = MOAIAnimCurve.new()\n_max_ = 11\ncurve:reserveKeys(_max_)\nfor i=1, _max_\
    \ do\n  curve:setKey(I, I * (1/_max_), I, MOAIEaseType.FLAT)\nend\n```\n\n我们创建一个`MOAIAnimCurve`对象，然后使用`reserveKeys`函数指定帧数。接着创建帧，并为每个帧设置索引和时间索引，以及曲线在该时间索引处的值。时间索引是看待动画的另一种方式，但不是基于索引，而是通过设置时间索引来指定该时间点上的动画/变换。\n\
    \n```\nanim = MOAIAnim:new()\nanim:reserveLinks(1)\nanim:setLink(1, curve, prop1,\
    \ MOAIProp2D.ATTR_INDEX)\nanim:setMode(MOAITimer.LOOP)\nanim:start()\n```\n\n\
    我们使用`MOAIAnim`类来创建动画。我们在`prop1`和`curve`之间建立了一个关于`Index`属性的链接。将模式设置为循环（作为定时器）。然后通过`start`函数启动动画。\n\
    \n最后，我们将`prop1`对象重新定位到屏幕上的（100,100）位置。\n\n我们还可以使用监听器来挂钩动画。可以捕获的监听器有：\n\n*   `MOAITimer.EVENT_TIMER_KEYFRAME`。每次关键帧改变时都会调用此监听器，它是一个回调函数，签名如下：\n\
    \n```\n    onKeyFrame ( MOAITimer_self, number_keyFrame, number_timesExecuted,\
    \ number_time, number_value)\n    ```\n\n*   `MOAITimer.EVENT_TIMER_LOOP`。每次函数循环时都会调用此监听器，其回调签名如下：\n\
    \n```\n    onLoop(MOAITimer_self,  number_timesExecuted)\n    ```\n"
- fmt: '# MOAITimer Events


    - `MOAITimer.EVENT_TIMER_BEGIN_SPAN`. This is called when the timer playback mode
    reaches the `beginSpan` time set using the `setSpan` function; otherwise this
    is 0 (i.e. as soon as the animation starts). This has the following callback signature:


    ```

    onBeginSpan(MOAITimer_self, number_timesExecuted)

    ```


    - `MOAITimer.EVENT_TIMER_END_SPAN`. This is called when the timer playback reaches
    the `endSpan` time set using the `setSpan` function; otherwise this is set to
    the end of the animation. This has the following callback signature:


    ```

    onEndSpan(MOAITimer_self, number_timesExecuted)

    ```


    Here''s an example of using the `MOAITimer.EVENT_TIMER_KEYFRAME` listener:


    ```

    function onKeyFrame(self, index, time, value)

      print("Keyframe : ", index, time, value)

    end

    anim:setListener(MOAITimer.EVENT_TIMER_KEYFRAME, onKeyFrame)

    ```


    ## Threading


    By default, all of the functions used to transform Moai objects are nonblocking
    and are executed in parallel. For example, if we have transforms on a prop, they
    will all be executed simultaneously. Here''s an example:


    ```

    prop:moveLoc(180, 180, 3)

    prop:moveScl(1.2, 1.2, 1)

    prop:moveLoc(-180, -180, 3)

    prop:moveScl(0.9, 0.9, 1)

    ```


    Moai can perform all these transformations at the same time; if you were to run
    this code, you would see only the end result of the four transforms, rather than
    each individual one.


    Moai has the concept of threads; we had a look at them and coroutines in earlier
    chapters. We can create blocking threads in Moai so that we can run each of the
    actions in blocking mode. Here''s an example:


    ```

    function threadFunction()

      action = prop:moveLoc(180, 180, 3.0)

      MOAIThread.blockOnAction(action)


      action = prop:moveScl(1.2, 1.2, 1.0)

      MOAIThread.blockOnAction(action)


      action = prop:moveLoc(-180, -180, 3.0)

      MOAIThread.blockOnAction(action)


      action = prop:moveScl(0.8, 0.8, 1.0)

      MOAIThread.blockOnAction(action)

    end


    thread = MOAIThread.new()

    thread:run(threadFunction)

    ```


    The blocking actions that we create can be run only for action items (transformations).


    ## Groups


    The definition of groups as described by other frameworks is that of a container—one
    that holds all the other display objects. Generally, groups are nonvisual display
    objects. With Moai, the concept is a bit different—you can set up a parent–child
    relation between two objects. When the parent object is modified or moved, the
    child object follows suit, as shown in [Figure 10-8](#9781430246626_Ch10.xhtml#Fig8).


    ![9781430246626_Fig10-08.jpg](OEBPS/Images/9781430246626_Fig10-08.jpg)


    [Figure 10-8](#9781430246626_Ch10.xhtml#_Fig8). The Moai equivalent of groups,
    using traits


    In Moai, this is called setting a *trait source*, where *traits* are the attributes,
    such as the location, transform, color, visibility, and so on. The `setParent`
    function is actually an alias to the `setTraitSource`.


    ```

    MOAISim.openWindow("Group Test", 320, 480)


    viewport = MAOIViewport.new()

    viewport:setSize(320, 480)

    viewport:setScale(320, -480)

    viewport:setOffset(-1, 1)


    layer = MOAILayer2D.new()

    layer:setViewport(viewport)

    MOAISim.pushRenderPass(layer)


    function newImage(imageName, xPos, yPos)

      local xPos = xPos or 0

      local yPos = yPos or 0

      local wd, ht


      local img = MOAIImage.new()

      img:load(imageName)

      wd, ht = img:getSize()


      quad = MOAIGfxQuad2D.new()

      quad:setTexture(imageName)

      quad:setRect(-(wd/2), (ht/2), (wd/2), -(ht/2))


      prop = MOAIProp2D.new()

      prop:setDeck(quad)

      prop:setLoc(xPos, yPos)


      layer:insertProp(prop)

      return prop

    end


    magnet = newImage("myImage2.png", 40, 260)

    robo = newImage("myImage3.png", 40, -140)


    robo:setParent(magnet)


    magnet:moveLoc(170, 170, 3)

    ```


    Notice that the robot has a magnet that pulls the robot along with it when we
    move the magnet. Any operation performed will affect both the props.


    Let''s add some scaling at the end of the code:


    ```

    magnet:moveScl(-0.5, -0.5, 3)

    ```


    Notice that both the magnet and the robot start to scale as they move. All of
    the attributes/traits are inherited from the parent object when you set it as
    the parent of another. The resulting action can be seen in [Figure 10-9](#9781430246626_Ch10.xhtml#Fig9).


    ![9781430246626_Fig10-09.jpg](OEBPS/Images/9781430246626_Fig10-09.jpg)


    [Figure 10-9](#9781430246626_Ch10.xhtml#_Fig9). Scaling affects both the images
    (using traits)


    ## Handling Input


    Since Moai can generate executables from a single source for mobile devices, desktops,
    and web browsers, it has a very highly involved input system. This includes the
    keyboard, mouse, and touch.


    Input is encapsulated in the `MOAIInputMgr` class; this depends on a callback
    function to handle an input event.


    ### Keyboard Events


    While developing, you will test your code on the desktop. For this you will need
    to capture and test the keyboard events. To capture these events, you set a callback
    for the `MOAIInputMgr.device.keyboard` object.


    ```

    function onKeyEvent(key, down)

      if down == true then

        print("Key down : ", key)

      else

        print("Key up : ", key)

      end

    end

    MOAIInputMgr.device.keyboard:setCallback(onKeyEvent)

    ```


    On an iOS device, `MOAIInputMgr.device.keyboard` is not present; instead, you
    use the `MOAIKeyboardIOS` class and set the listeners for the `EVENT_INPUT` and
    the `EVENT_RETURN`.


    ```

    function onInput(start, length, text)

      print("on input")

      print(start, length, text)

      print(MOAIKeyboardIOS.getText())

    end


    function onReturn()

      print("on return")

      print(MOAIKeyboardIOS.getText())

    end


    MOAIKeyboardIOS.setListener(MOAIKeyboardIOS.EVENT_INPUT, onInput)

    MOAIKeyboardIOS.setListener(MOAIKeyboardIOS.EVENT_RETURN, onReturn)

    MOAIKeyboardIOS.showKeyboard()

    ```


    ### Mouse Events


    For devices that do not have touch events, Moai offers mouse handlers. In a similar
    fashion to keyboard handlers, you need to set a callback on the `MOAIInputMgr.device.pointer`
    object. This captures the mouse movement events.


    ```

    function onMove(evtX, evtY)

      print("Pointer : ", x, y)

    end

    MOAIInputMgr.device.pointer:setCallback(onMove)

    ```


    If we want to capture when the mouse buttons are clicked, you need to set callback
    functions for the mouse buttons, like `mouseLeft`, `mouseRight`, and `mouseCenter`.


    ```

    function onMouseL(down)

      print("The Left Mouse button down is ", down)

    end

    function onMouseR(down)

      print("The Right Mouse button down is ", down)

    end

    function onMouseC(down)

      print("The Center Mouse button down is ", down)

    end

    MOAIInputMgr.device.mouseLeft:setCallback(onMouseL)

    MOAIInputMgr.device.mouseRight:setCallback(onMouseL)

    MOAIInputMgr.device.mouseCenter:setCallback(onMouseL)

    ```


    In some cases you might not want to set callback functions on the mouse buttons.
    In such cases, you can query for them using the `isUp` and `isDown` functions.
    You can set a callback on the pointer, and in the callback also check for the
    button states.


    ```

    function handleMouse(x, y)

      if MOAIInputMgr.device.mouseLeft:isUp() then

        print("Left button clicked at : ", x, y)

      end

    end


    MOAIInputMgr.device.pointer:setCallback(handleMouse)

    ```


    You might have noticed the pull-to-refresh functionality in quite a few applications.
    With iOS 6, the mail application has a pull-to-refresh; when you pull, the circle
    elongates like slime, pulling down from the larger blob on the top. We can quickly
    re-create the same effect with Moai and the mouse. In this example, the blob reacts
    to the mouse pointer moving down as you move the mouse in the window. The effect
    is shown in [Figure 10-10](#9781430246626_Ch10.xhtml#Fig10).


    ![9781430246626_Fig10-10.jpg](OEBPS/Images/9781430246626_Fig10-10.jpg)


    [Figure 10-10](#9781430246626_Ch10.xhtml#_Fig10). The new pull-to-refresh organic
    blob, as seen in iOS 6


    First, we create the window and the viewport, and the layer on which we shall
    place all of our display objects:


    ```

    MOAISim.openWindow("Slimey Blob", 320, 480)


    viewport = MOAIViewport.new()

    viewport:setSize(320, 480)

    viewport:setScale(320, -480)

    viewport:setOffset(-1, 1)

    ```'
