    \ = false\n  -- 添加在轻触时发射子弹的处理器\n  addHandler(tapEvent, shoot)\nend \n```\n\n##\
    \ 碰撞\n\n在整体方案中，最后一件事是检测直升机何时与任何场景物品发生碰撞（这将导致坠毁），以及直升机何时与幸存者发生碰撞（这将救下幸存者）。\n\n\
    ```\nfunction checkCollisions()\n  -- 创建玩家矩形\n  local hx, hy = getPosition(heli)\n\
    \  pRect = {\n    x = hx,\n    y = hy,\n    wd = heli.width,\n    ht = heli.height,\n\
