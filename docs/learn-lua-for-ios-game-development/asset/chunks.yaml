    \ C 或 C++ 编写的插件可以同时用于 iOS 和 Android 设备。用 Java 编写的插件只能用于 Android，而用 Objective-C\
    \ 编写的插件只能用于 iOS。\n\n## 总结\n\nGideros Studio 是一个在 Windows 和 Mac OS X 上完整的开发包，包含一系列用于开发和测试应用程序的工具。如果框架本身不能满足你的需求，或者你想通过添加一些额外代码（例如\
    \ C、C++、Objective-C 或 Java）来扩展应用，你可以通过 Lua API 桥接将代码封装成插件来实现。Gideros Studio 是一个不断发展且拥有不断壮大社区支持的框架。该框架与\
