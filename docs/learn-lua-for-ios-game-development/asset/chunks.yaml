    \ pointer. We also ensure that bottomOriginY remains in the range of 40 to 400.\
    \ We also set the radius of the bottom circle to shrink or expand as it moves\
    \ (see [Figure 10-11](#9781430246626_Ch10.xhtml#Fig11)).\n\n![9781430246626_Fig10-11.jpg](OEBPS/Images/9781430246626_Fig10-11.jpg)\n\
    \n[Figure 10-11](#9781430246626_Ch10.xhtml#_Fig11) .  A simplified version of\
    \ a pull-to-refresh blob\n\nTouch Events\n\nOn mobile devices, which have no mouse\
    \ pointer but instead react to touch, we can set the callback for touches. The\
    \ object to set a callback on is MOAIInputMgr.device.touch. This captures the\
    \ touch events. The callback function is passed an eventType, which can be one\
    \ of the following:\n\n*   MOAITouchSensor.TOUCH_DOWN\n*   MOAITouchSensor.TOUCH_UP\n\
    *   MOAITouchSensor.TOUCH_MOVE\n*   MOAITouchSensor.TOUCH_CANCEL\n\n```\nfunction\
    \ onTouch(eventType, idx, x, y, tapCount)\n  print(eventType)\nend\nMOAIInputMgr.device.touch:setCallback(onTouch)\n\
    ```\n\nIf you run this code on the desktop, it will result in an error, as there\
    \ is no touch device.\n\nThe best way to set up handlers is to ensure the existence\
    \ of a device before the callback is set. Here’s how to check for the existence\
    \ of a device:\n\n```\nif MOAIInputMgr.device.touch then\n  MOAIInputMgr.device.touch:setCallback(onTouch)\n\
    end\n```\n\n**Note**   Setting a callback can cause an error if the device in\
    \ question is not supported. It is best to check for the presence of the device\
    \ before setting the callback. This is applicable to devices involving touch,\
    \ mouse pointers, keyboards, and even GPS and accelerometers.\n\nSound\n\nWhile\
    \ some frameworks have an elaborate and complex audio functionality, Moai has\
    \ a very simple function available in the MOAIUntzSound class. However, before\
    \ you can use the audio functions, you need to initialize the MOAIUntzSystem,\
    \ like so:\n\n```\nMOAIUntzSystem.initialize ()\n\nsound = MOAIUntzSound.new ()\n\
    sound:load ( 'mono16.wav' )\nsound:setVolume ( 1 )\nsound:setLooping ( false )\n\
    sound:play ()\n```\n\nDisplaying a Dialog\n\nMoai allows you to display messages\
    \ to the user and even get input from the user in the form of a yes/no/cancel-type\
    \ dialog. In such a scenario, you can use the showDialog function from the MOAIDialogIOS\
    \ class. Here’s an example:\n\n```\nfunction onDialogDismiss(code)\n  print(\"\
    Dialog Dismissed\")\n  if (code==MOAIDialog.DIALOG_RESULT_POSITIVE) then\n    print(\"\
    Clicked Yes\")\n  elseif (code==MOAIDialog.DIALOG_RESULT_NEUTRAL) then\n    print(\"\
    Clicked Maybe\")\n  elseif (code==MOAIDialog.DIALOG_RESULT_NEGATIVE) then\n    print(\"\
    Clicked No\")\n  elseif (code==MOAIDialog.DIALOG_RESULT_CANCEL) then\n    print(\"\
    Clicked Cancel\")\n  else then\n    print(\"Clicked Unknown\")\n  end\nend\n\n\
    MOAIDialogIOS.showDialog(\"Sample Dialog\", \"\", \"Yes\", \"Maybe\", \"No\",\
    \ true, onDialogDismiss)\n```\n\nDisplaying Video\n\nIf you want to play a video\
    \ on the iOS device—for example, as an intro or a lead-in to a level in a game—you\
    \ can use the MOAIMoviePlayer class. To play the movie, you need to initialize\
    \ it with the path to the movie and then invoke the play function:\n\n```\nMOAIMoviePlayer.init\
    \ ( \n\"http://km.support.apple.com/library/APPLE/APPLECARE_ALLGEOS/HT1211/sample_iTunes.mov\"\
    \ )\nMOAIMoviePlayer.play ()\n```\n\nDevice Orientation\n\nWhen it comes to orientation,\
    \ many the frameworks raise an orientation-change event. However, in Moai when\
    \ the device orientation is changed, the EVENT_RESIZE event is triggered. We can\
    \ listen for this event by adding a listener on the MOAIGfxDevice class.\n\n```\n\
    _W, _H = MOAIGfxDevice.getViewSize()\nfunction onResize(width, height)\n  viewport:setSize(width,\
    \ height)\n  viewport:setScale(width, height)\nend\nMOAIGfxDevice.setListener(MOAIGfxDevice.EVENT_RESIZE,\
    \ onResize)\n```\n\nNotifications\n\nIn some scenarios, you might want to notify\
    \ the user with some information—for example, when a task is complete (e.g., when\
    \ the crops are ready to be harvested in a Farmville-type application). To enable\
    \ you to do this, Moai has a MOAINotifications class that needs a listener to\
    \ be added listening to the events. The code below has three distinct portions.\
    \ onRegComplete is called when we try to register for a remote notification; it\
    \ also informs us if it was successful or if it failed. The other function displays\
    \ the notification when it occurs, based on the data passed. And the last bit\
    \ sets up and registers the notification.\n\n```\nfunction onRegComplete(code,\
    \ token)\n  print(\"Registered\")\n  if code==MOAINotification.REMOTE_NOTIFICATION_RESULT_REGISTERED\
    \ then\n    print(\"Registered \" .. token)\n  elseif code==MOAINotification.REMOTE_NOTIFICATION_RESULT_UNREGISTERED\
    \ then\n  else\n    print(\"Registration failed\")\n  end\nend\n\nfunction onRemoteNotification(event)\n\
      print(\"Notification received\")\n  message = event.aps.alert\n\nlocal action,\
    \ data, title\n  if event.action then action = event.action end\n  if event.data\
    \ then data = event.data end\n  if event.title then title = event.title end\n\n\
    print(\"Message : \" .. message)\n  print(\"action : \" .. action)\n  print(\"\
    data : \" .. data)\n  print(\"title : \", title)\nend\n\nMOAINotification.setListener(MOAINotification.REMOTE_NOTIFICATION_REGISTRATION_COMPLETE,\
    \ onRegComplete)\nMOAINotification.setListener(MOAINotification.REMOTE_NOTIFICATION_MESSAGE_RECEIVED,\
    \ onRemoteNotification)\nMOAINotification.setAppIconBadgeNumber(0)\nMOAINotification.registerForRemoteNotification(\n\
        MOAINotification.REMOTE_NOTIFICATION_BADGE +\n    MOAINotification.REMOTE_NOTIFICATION_ALERT)\n\
    ```\n\nNetworking\n\nIn your game, you might need to download level data or some\
    \ other data using the HTTP or HTTPS protocol. Moai has a MOAIHttpTask class that\
    \ allows for downloading data from an HTTP/S source.\n\n```\nfunction onDone(task,\
    \ responseCode)\n  print(\"Downloaded\", responseCode)\n  if task:getSize() then\n\
        print(task:getString())\n  else\n    print(\"Got nothing\")\n  end\nend\n\n\
    theTask = MOAIHttpTask.new(\"Download Webpage\")\ntheTask:setCallback(onDone)\n\
    theTask:httpGet(\"http://www.oz-apps.com\")\n```"
