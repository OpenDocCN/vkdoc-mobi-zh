    end\n```\n\n**注意**：Lua 非常灵活，因此即使你混合了这两种数组类型，它也非常宽容。\n\n```lua\nlocal theMixedTable\
    \ = {}\nfor i = 1, 5 do\n  theMixedTable[i] = \"item \".. i\nend\ntheMixedTable[\"\
    name\"] = \"mixedTable\"\ntheMixedTable[\"subject\"] = \"coding\"\nprint(theMixedTable.name,\
    \ theMixedTable[3])\n```\n\n## 函数：进阶探讨\n\n在上一章中，我们了解了函数以及 Lua 如何看待它们。Lua 对象和结构是\
    \ Lua 表，而好的方面在于表可以包含函数以及其他表、字符串和数字。实际上，每个带有函数的对象就像一个拥有自己专属函数集的命名空间。要访问特定对象的函数，你需要使用该命名空间作为前缀来访问该函数。\n\
