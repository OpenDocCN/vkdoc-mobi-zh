    local birdie = newImage("bird.png", 100, 100)

    ```


    关于 Gideros Studio 的另一点是，它加载多个 Lua 文件时无需使用 `require` 函数。我们可以利用这一点，创建一个单独的文件来存放项目中的所有实用函数。让我们创建一个
    `myutils.lua` 文件，将 `newImage` 函数添加进去，并将其包含在我们的项目中。


    ## 对齐图像


    所有图像都有一个*锚点*，图像以此点为轴心进行旋转；当图像旋转时，正是这个点决定了旋转的方式。锚点是一个从 0 到 1 的数值，代表图像的高度或宽度百分比。这一点在图
    9-11 中进行了说明。你可以将这个值视为百分比：0 表示顶部，100 表示底部（在 y 轴上）；0 表示左侧，100 表示右侧（在 x 轴上）。要得到我们的值，只需将这个百分比除以
