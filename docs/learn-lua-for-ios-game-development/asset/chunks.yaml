    The Enterprise Edition is a new offering from Corona Labs that allows developers
    to add features using native Objective-C or Java into their applications. This
    also provides the functionality of offline and automated builds. This is a rather
    expensive option but provides game studios with the flexibility and power that
    they might require when working with Corona SDK.


    Summary


    Corona SDK is one of the easiest-to-use frameworks that support mobile development.
    The API has functionality for use of the objects, display elements that one might
    require of a framework. Using physics is quite easy, as Corona SDK abstracts most
    of the Box2D functions, and you never really have to bother with fixtures and
    the like. It even has features that enable enterprise developers to add native
    code functionality.


    In the next few chapters we’ll explore the other frameworks and look at the basic
    similarities toward developing for the iOS devices.


