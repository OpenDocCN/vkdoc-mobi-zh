    \n[图11-6](#9781430246626_Ch11.xhtml#_Fig6) . 镜像图像\n\n## 旋转玩家\n\n在您的游戏中，您可能希望根据点击位置旋转玩家图形——例如，在塔防类游戏中，玩家手持枪支。\n\
