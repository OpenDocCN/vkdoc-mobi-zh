    \ = MOAIStreamReader.new ()\nreader:openBase64 ( stream )\ndata = reader:read\
    \ ( len )\nreader:close ()\n\nprint ()\nprint ( data )\n```\n\n## 压缩数据\n\n处理在线数据时，你可能不仅希望转换数据，还希望对其进行压缩以节省数据传输和带宽。`MOAIDataBuffer`类允许你使用`deflate`和`inflate`函数对数据进行压缩或解压。\n\
    \n```\ndata = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Duis id\
