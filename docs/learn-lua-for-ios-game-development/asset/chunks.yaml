  trans: "\n# 矩形的绘制模式\n\n`rect()` 函数支持以下几种绘制模式：\n\n- `CENTER`：此模式以中心点的 x、y 坐标为参数，后接宽度和高度。\n\
    - `RADIUS`：此模式以中心点的 x、y 坐标为参数，后接宽度和高度的一半。\n- `CORNER`：此模式以矩形左下角的 x、y 坐标为参数，后接宽度和高度。矩形将被绘制在参数指定的边界矩形内。\n\
    - `CORNERS`：此模式以矩形左下角的 x、y 坐标为参数，后接右上角的绝对坐标，而非宽度和高度。矩形将被绘制在参数指定的边界矩形内。\n\n以下代码片段展示了上述模式的用法：\n\
    \n```\nrectMode(CENTER)\nrect(100,100,50,50)\n\nrectMode(RADIUS)\nrect(100,200,50,50)\n\
    \nrectMode(CORNER)\nrect(100,100,50,50)\n\nrectMode(CORNERS)\nrect(100,200,50,50)\n\
    ```\n\n# 绘制文本\n\n用于在屏幕上绘制文本的函数是 `text`。它需要三个参数：文本本身，以及文本显示位置的 x、y 坐标。\n\n```\n\
    text(\"This is sample text\", 10,200)\n```\n\n还有其他函数可以帮助设置所显示文本的属性，例如字体名称和大小。以下函数会创建文本，同时返回所创建文本的宽度和高度：\n\
    \n```\nw, h = textSize(\"Hello World\")\nprint(w, h)\n```\n\n## 绘制模式\n\n`text`\
    \ 函数也有两种绘制模式，用于指定如何解析传入的参数以及如何显示文本：\n\n- `CENTER`：在此模式下，文本将围绕传递给 `text` 函数进行绘制的\
    \ x、y 坐标居中显示。这是默认的文本绘制模式。\n- `CORNERS`：在此模式下，传递给 `text` 函数的 x、y 坐标指定文本的左下角。\n\n\
    ## 文本对齐\n\n绘制文本时，可以将其设置为左对齐（`LEFT`）、右对齐（`RIGHT`）或居中对齐（`CENTER`）。默认的文本对齐设置为 `LEFT`。\n\
    \n## 文本换行\n\n在绘制文本时，你还可以设置要显示的文本宽度，任何超出该宽度的文本都将自动换行。如果文本换行设置设为 `0`，则文本不会换行。\n\n\
    ```\ntextWrapWidth(80)\ntext(\"This text would get wrapped onto multiple lines\"\
    ,100,100)\n```\n\n## 更改字体\n\n`font` 函数可用于渲染文本。在 iOS 设备上，可以设置的字体仅限于设备上可用的字体列表，默认使用的字体是\
    \ `Helvetica`。\n\n## 更改字号\n\n`fontSize` 函数可用于更改正在渲染的字体大小。文本渲染的默认大小是 17 磅。\n\n\
    # 显示图像\n\nCodea 中的精灵（Sprite）是可以使用 `sprite` 函数加载并显示在屏幕上的图像。但是，根据 Codea 架构的定义方式，存在*精灵包（sprite\
    \ packs）*，你可以从中使用图像。要加载图像，不像其他框架那样使用图像的路径，而是将图像引用为 `SpritePack:SpriteName`。此函数至少需要三个参数：`spriteName`（即*图像句柄*），以及精灵将放置的\
    \ x、y 坐标。该函数也可以将宽度和高度作为参数。\n\n```\nsprite(\"Planet Cute:Grass Block\", WIDTH/2,\
    \ HEIGHT/2)\n```\n\n**注意** 在当前版本的 Codea 中，你还可以使用来自设备相册或剪贴板的图像，以及来自 Dropbox 和 Codea\
    \ 内置免费精灵库（来自 Dan Cook 的 [`lostgarden.com`](http://lostgarden.com)）的图像。\n\n从设备或在线来源加载的图像可以在\
    \ Codea 中用作精灵。要确定精灵的大小，你可以使用 `spriteSize` 函数，该函数会返回传递给它的精灵名称的宽度和高度。\n\n```\nsprWidth,\
    \ sprHeight = spriteSize(\"Planet Cute:Grass Block\")\nprint(sprWidth, sprHeight)\n\
    ```\n\n你还可以设置*精灵模式（sprite mode）*，它决定了精灵在屏幕上的显示方式。x、y 坐标用于定位精灵，这与绘图的选项类似。`SpriteMode`\
    \ 的默认值是 `CENTER`。其他可设置的模式有 `RADIUS`、`CORNER` 和 `CORNERS`，它们的功能类似于绘制椭圆和矩形时使用的模式。\n\
    \n在 Codea 中，*图像（images）* 与精灵不同。图像是通过代码创建的*画布（canvases）*，其像素点通过 `set` 方法结合 x、y\
    \ 坐标和颜色来设置。特定像素的颜色可以通过 `get` 方法获取。可以使用 `image.copy` 函数复制图像的部分区域来创建新图像。\n\n## 离屏绘制\n\
    \n正如我们在上述段落中所看到的，大多数绘图函数都是直接在屏幕上绘制的。我们可以使用 `setContext` 函数指示绘图函数在我们指定的上下文（绘图区域）上进行绘制。当我们希望恢复在屏幕上下文上进行绘制时，只需再次调用\
    \ `setContext` 函数而不传递任何参数即可。\n\n```\nmyImage = image(400,400)\n\nsetContext(myImage)\n\
    ellipse(200,200,200)\nrect(0,0,100,100)\nsetContext()\n\nsprite(myImage, WIDTH/2,\
    \ HEIGHT/2)\n```\n\n## 将精灵加载到图像中\n\n虽然图像可以通过获取或设置像素颜色来操作，并且可以使用 `image.copy` 函数创建，但精灵不能以这些方式操作。为了能够操作精灵图像，你可以使用\
    \ `readImage` 函数将精灵复制或加载到图像中，该函数会从精灵创建一个图像对象，如下所示：\n\n```\nmyImage = readImage(\"\
    Planet Cute:Heart\")\n```\n\n## 保存图像\n\n`saveImage` 函数可以帮助创建图像并将其保存到设备或 Dropbox。保存图像的方式是向它传递精灵包名称（可以是\
    \ `Documents` 或 `Dropbox`），后跟文件名。请注意，如果文件名已经存在，原始文件将被覆盖；如果图像被设置为 `nil`，则指定的文件将被删除。\n\
    \n```\nsaveImage(\"Documents:theSprite\", image)\n```\n\n**注意** 如果设备是视网膜（Retina）设备，使用此函数将保存两个文件：一个带有\
    \ `@2x` 后缀的视网膜尺寸图像，和一个缩放到 50% 的非视网膜图像。\n\n## 保存数据\n\n在开发应用程序时，你可能希望保存数据以使其持久化。数据可以保存在本地，仅对当前的\
    \ Codea 项目可用，也可以全局保存，使其对设备上的所有 Codea 项目可用。以下是本地保存数据的示例：\n\n```\nlocal theName\
    \ = (readLocalData(\"username\"))\nif theName == nil then\n  theName = \"Default\"\
    \n  saveLocalData(\"username\", theName)\nend\nprint(theName)\n```\n\n如果你运行这段代码，“Default”\
    \ 将被打印到输出控制台。\n\n如果你想要重新开始并移除所有存储的值，可以使用 `clearLocalData` 函数。\n\n# 无颜色绘制\n\n有时你可能会想用透明颜色绘制某些内容——例如，如果你想要一个无填充（透明）的形状或一个没有轮廓的形状。这可以通过前缀为\
    \ `no` 的示例函数来实现。这些函数将在以下小节中描述。\n\n## `noFill`\n\n`noFill` 函数将填充颜色设置为透明，绘制一个没有填充（但可能有轮廓）的形状。图\
    \ 12-3 演示了绘制有填充和无填充的矩形。\n\n![9781430246626_Fig12-03.jpg](img/9781430246626_Fig12-03.jpg)\n\
    \n图 12-3. 一个有填充的矩形（左）和一个没有填充的矩形（右）\n\n## `noStroke`\n\n`noStroke` 函数将用于绘制的颜色设置为透明。此函数会移除形状的轮廓。（见图\
    \ 12-4。）\n\n![9781430246626_Fig12-04.jpg](img/9781430246626_Fig12-04.jpg)\n\n\
    图 12-4. 一个有轮廓的矩形（左）和一个没有轮廓的矩形（右）\n\n## `noTint`\n"
- fmt: '# Codea文档排版


    `tint`函数根据图像处理软件中的乘法效果改变精灵的颜色。`noTint`函数在绘制精灵时移除所有色调。


    ## 变换函数


    我们可以创建的显示对象可以通过多种方式进行变换，包括旋转和缩放，使用的函数有`rotate`、`scale`、`translate`和`zLevel`（许多开发人员称之为z轴索引）。这些函数将相应的变换应用于后续所有绘制，而不仅仅是单个显示对象。


    ### `rotate`


    `rotate`函数接受角度参数，单位为度。


    ```

    rotate(30)

    rect(226,226,52,52)

    ```


    ### `scale`


    `scale`函数接受缩放参数，可以是应用于所有轴的单个缩放因子，也可以是各个轴的独立缩放因子。


    ```

    scale(amount)

    scale(xScale, yScale)

    scale(xScale, yScale, zScale)

    ```


    ### `translate`


    `translate`函数指定后续绘制的位移量。*位移*就像添加到坐标上的偏移量。


    ```

    rect(0,0,50,50)

    translate(20,20)

    rect(0,0,50,50)

    translate(40,40)

    rect(0,0,50,50)

    ```


    **注意**：所有变换函数都是相对的，这意味着它们将根据当前值执行给定值的操作。例如，`rotate(10)`将使对象从其当前位置旋转10度。


    变换函数会改变*显示矩阵*。显示矩阵类似于栈，可以使用`pushMatrix`函数保存当前设置，使用`popMatrix`函数恢复原始设置。在某些情况下，还可以使用`resetMatrix`函数将整个显示矩阵重置为默认值。


    ## 录制视频


    Codea具有用于录制视频的内置函数。用于视频录制的函数很简单：


    * `startRecording`：通过调用此函数开始录制。不要在`setup`函数中调用此函数。

    * `stopRecording`：通过调用此函数停止录制。停止录制时，视频将保存到设备的相机胶卷中。

    * `isRecording`：通过此函数可以查询是否正在录制视频。


    ## 触摸


    Codea运行在iPad上，这是一种触摸设备，因此除了键盘输入之外，获取输入的方式是通过触摸。


    管理屏幕触摸事件的函数是`touched`函数。每个触摸点生成一个触摸对象，该对象具有以下成员：


    * `id`：触摸的唯一标识符

    * `x`：触摸在屏幕上的x坐标

    * `y`：触摸在屏幕上的y坐标

    * `prevX`：触摸上一帧的x坐标

    * `prevY`：触摸上一帧的y坐标

    * `deltaX`：触摸在x轴上移动的距离

    * `deltaY`：触摸在y轴上移动的距离

    * `state`：触摸的状态，可以是`BEGAN`、`MOVING`或`ENDED`

    * `tapCount`：触摸点被轻触的次数


    有一个名为`CurrentTouch`的全局变量，它包含屏幕上最近的触摸点。以下是一个使用示例：


    ```

    function draw()

      background(0)

      fill(255)

      ellipse(CurrentTouch.x, CurrentTouch.y, 300)

    end

    ```


    这段代码在屏幕上生成一个白色圆圈，看起来像聚光灯，当手指在屏幕上滑动时，它会跟随触摸移动。


    ### 使用触摸绘图


    我之前讨论过如何根据触摸点移动显示对象。如果创建一个触摸点数组，你可以渲染它们以生成有趣的结果。以下是一个示例：


    ```

    points = {}

    index = 0

    maxPts = 99


    function setup()

      watch("index")

    end


    function touched(touch)

      index = index + 1

      if index > maxPts then

        index = maxPts

        table.remove(points, 1)

      end

      table.insert(points, touch)

    end


    function draw()

      background(40,40,50)


    strokeWidth(3)

      lineCapMode(ROUND)


    if index > 1 then

        ptx, pty = points[1].x, points[1].y


    for i=2, index do

          sx, sy = points[i].x, points[i].y

          line(ptx,pty, sx, sy)

          ptx, pty = sx, sy

        end

      end

    end

    ```


    为了增加一些变化，你也可以调整`maxPts`变量并查看结果。


    **注意**：要监视变量，只需使用`watch`函数，但记得将变量名用引号括起来才能生效。如果变量是一个表，它会显示为`Table`和内存地址，而Codea创建的内部对象可以在不指定单个组件的情况下进行监视，例如`watch("Gravity")`可以用来监视所有三个轴的数据，而不是分别监视`watch("Gravity.x")`、`watch("Gravity.y")`和`watch("Gravity.z")`。


    ## 多点触控


    iPad支持多点触控，但不会自动处理。你可以通过将触摸保存到数组，并在`BEGAN`和`ENDED`状态触发之间迭代它们来处理多点触控。以下是一个示例：


    ```

    touches = {}

    function touched(touch)

      if touch.state == ENDED then

        touches[touch.id] = nil

      else

        touches[touch.id] = touch

      end

    end


    function draw()

      background(0)

      for k,v in pairs(touches) do

        math.randomseed(v.id)

        fill(math.random(255), math.random(255), math.random(255))

        ellipse(v.x, v.y, 100, 100)

      end

    end

    ```


    **警告**：如果你启用了系统范围的多手势功能，你可能还需要在iPad的“设置”中关闭它们，因为当有两个以上手指触摸时，它们会优先处理并干扰触摸。


    ## 制作声音


    虽然其他框架播放WAV或MP3文件，但Codea允许播放动态生成的波形。这样做的好处是在最终分发版本中占用更少的空间，并且允许你创建动态声音。


    以下是如何创建跳跃声音的示例：


    ```

    function touched(touch)

      sound(SOUND_JUMP, 1234)

    end

    ```


    现在，当你触摸屏幕时，它会播放一个声音。


    以下是Codea中预定义的内置声音类型，每种类型都有各种设置，可以像上面的示例中使用设置#1234：


    * `SOUND_BLIT`

    * `SOUND_EXPLODE`

    * `SOUND_HIT`

    * `SOUND_JUMP`

    * `SOUND_PICKUP`

    * `SOUND_POWERUP`

    * `SOUND_RANDOM`

    * `SOUND_SHOOT`

    * `DATA`


    Codea编辑器还允许你将声音的不同参数微调为Base64编码字符串，该字符串可以传递给函数，根据字符串中的编码字符播放声音。自定义声音通常类型为`DATA`，后跟指定设置的字符串。


    ```

    sound(DATA, "ZbBAJgBAQEBAQEBAQEBAMqqQPXtbpz3NzMw+QABAf0BAQEBAQEBA")

    ```


    或者，可以使用合成器波形来制作声音。以下是Codea内置支持的波形类型：


    * `SOUND_NOISE`

    * `SOUND_SAWTOOTH`

    * `SOUND_SINEWAVE`

    * `SOUND_SQUAREWAVE`


    这些波形可以通过向`sound`函数传递参数进行微调：


    ```

    function touched(touch)

      sound({

        Waveform = SOUND_NOISE,

        AttackTime = 1.2,

        SustainTime = 1

      })

    end

    ```


    其他可微调的设置包括：


    * `AttackTime`

    * `SustainTime`

    * `SustainPunch`

    * `DecayTime`

    * `StartFrequency`

    * `MinimumFrequency`

    * `Slide`

    * `DeltaSlide`

    * `VibratoDepth`

    * `VibratoSpeed`

    * `SquareDuty`

    * `DutySweep`

    * `RepeatSweep`

    * `PhaserSweep`

    * `LowPassFilterCutOff`

    * `LowPassFilterCutOffSweep`

    * `LowPassFilterResonance`

    * `HighPassFilterCutOff`

    * `HighPassFilterCutOffSweep`

    * `Volume`


    ## iOS硬件


    iOS设备的一个优势是集成了加速度计和陀螺仪。如前所述，Codea的一个优点是，由于你在设备上编写和运行应用程序，因此你也可以在设备上进行实际测试，并从硬件获取真实数据反馈。


    加速度计返回重力加速度。加速度计的数据可以从`Gravity`变量获取，该变量包含`x`、`y`和`z`成员。'
  raw: 'The tint function changes the color of the sprite according to the multiply
    effect in image-processing packages. The noTint function removes all of the tinting
    while drawing the sprites.


    Transformation Functions


    The display objects that we can create can be transformed in various ways, including
    rotating and scaling, with functions like rotate, scale, translate, and zLevel
    (what a lot of developers refer to as the z-Index). These functions apply the
    respective transformations to all subsequent drawings, not just an individual
    display object.


    Rotate


    The rotate function takes the angle arguments in degrees.


    ```

    rotate(30)

    rect (226,226,52,52)

    ```


    Scale


    The scale function takes the scaling parameters either as a single scaling factor
    that is applied to all the axes, or as individual axes.


    ```

    scale(amount)

    scale(xScale, yScale)

    scale(xScale, yScale, zScale)

    ```


    Translate


    The translate function specifies an amount to displace the subsequent drawings.
    *Displacement* is like an offset that is added to the coordinates.


    ```

    rect(0,0,50,50)

    translate(20,20)

    rect(0,0,50,50)

    translate(40,40)

    rect(0,0,50,50)

    ```


    **Note**   All of the transformation functions are relative, which means that
    they will perform the operations of the given value from the current value. For
    example, rotate(10) will rotate the object 10 degrees from its current position.


    Transform functions change the *display matrix*. The display matrix is like a
    stack, where the current settings can be saved using the pushMatrix function and
    the original settings can be restored using the popMatrix function. In certain
    cases, you can also reset the entire display matrix to its default values using
    the resetMatrix function.


    Recording Video


    Codea has built-in functions for recording video. The functions for working with
    video recording are simple:


    *   startRecording: You can start the recording by calling this function. Do not
    call this function from within the setup function.

    *   stopRecording: You can stop recording by calling this function. When we stop
    recording, the video is saved to the device’s camera roll.

    *   isRecording: With this function, you can query if something is currently being
    recording.


    Touch


    Codea runs on the iPad, which is a touch device, so the way to get input other
    than from the keyboard is via touches.


    The function that manages when the screen is touched is the touched function.
    Each touch point generates a touch object, which has the following members:


    *   id: The unique identifier for the touch

    *   x: The x position of the touch on the screen

    *   y: The y position of the touch on the screen

    *   prevX: The x position from the previous frame of the touch

    *   prevY: The y position from the previous frame of the touch

    *   deltaX: The amount the touch has moved on the x-axis

    *   deltaY: The amount the touch has moved on the y-axis

    *   state: The state of the touch, which can be BEGAN, MOVING, or ENDED

    *   tapCount: The number of times the touch point has been tapped


    There is a global variable called CurrentTouch that contains the most recent touch
    on the screen. Here’s an example of its use:


    ```

    function draw()

      background(0)

      fill(255)

      ellipse(CurrentTouch.x, CurrentTouch.y, 300)

    end

    ```


    This code produces a white circle on the screen that looks like a spotlight and
    moves with the touch as you glide the finger across the screen.


    Drawing with Touch


    I previously discussed how you can move the display object based on the touch
    point. If you create an array of touch points, you can render them to generate
    interesting results. Here’s an example:


    ```

    points = {}

    index = 0

    maxPts = 99


    function setup()

      watch("index")

    end


    function touched(touch)

      index = index + 1

      if index > maxPts then

        index = maxPts

        table.remove(points, 1)

      end

      table.insert(points, touch)

    end


    function draw()

      background(40,40,50)


    strokeWidth(3)

      lineCapMode(ROUND)


    if index > 1 then

        ptx, pty = points[1].x, points[1].y


    for i=2, index do

          sx, sy = points[i].x, points[i].y

          line(ptx,pty, sx, sy)

          ptx, pty = sx, sy

        end

      end

    end

    ```


    For some variety, you can also play with maxPts variable and see the results.


    **Note**   To watch a variable, simply use the function watch but remember to
    enclose the variable name in quotes for it to work. If the variable is a table,
    it displays as Table and an address to the memory, while the internal objects
    created by Codea can be watched without specifying the individual components,
    like watch("Gravity") can be used to watch all of the three axis data instead
    of each individual axis as watch("Gravity.x"), watch("Gravity.y") and watch("Gravity.z")


    Multitouch


    Multitouch is supported on the iPad, but it is not handled automatically. You
    can handle multitouch by saving the touches into an array and iterating through
    them between the time that the BEGAN and ENDED states are triggered. Here’s an
    example:


    ```

    touches = {}

    function touched(touch)

      if touch.state == ENDED then

        touches[touch.id] = nil

      else

        touches[touch.id] = touch

      end

    end


    function draw()

      background(0)

      for k,v in pairs(touches) do

        math.randomseed(v.id)

        fill(math.random(255), math.random(255), math.random(255))

        ellipse(v.x, v.y, 100, 100)

      end

    end

    ```


    **Caution**   If you have system-wide multigestures enabled, then you might also
    want to turn them off on the iPad from Settings, as they take precedence and interfere
    with touches if there are more than two-finger touches.


    Making Sound


    While other frameworks play WAV or MP3 files, Codea allows for playing dynamically
    created waveforms. This has the advantage of taking up less space in the final
    distribution and also allows you to create dynamic sounds.


    Here’s an example of how to create a jump sound:


    ```

    function touched(touch)

      sound(SOUND_JUMP, 1234)

    end

    ```


    Now when you touch the screen, it plays a sound.


    Following are the types of predefined built-in sounds in Codea, each one of these
    have various settings that can be used as in the example above we use setting
    #1234:


    *   SOUND_BLIT

    *   SOUND_EXPLODE

    *   SOUND_HIT

    *   SOUND_JUMP

    *   SOUND_PICKUP

    *   SOUND_POWERUP

    *   SOUND_RANDOM

    *   SOUND_SHOOT

    *   DATA


    The Codea editor also allows you to fine-tune the different parameters for a sound
    as a Base64-encoded string, which can be passed to a function to play sound based
    on the encoded characters in the string. The custom sound is typically of type
    DATA followed by the string that specifies the settings.


    ```

    sound(DATA, "ZbBAJgBAQEBAQEBAQEBAMqqQPXtbpz3NzMw+QABAf0BAQEBAQEBA")

    ```


    Alternatively, synthesizer waveforms can be used to make sound. Following are
    the types of waveforms that Codea has in-built support for:


    *   SOUND_NOISE

    *   SOUND_SAWTOOTH

    *   SOUND_SINEWAVE

    *   SOUND_SQUAREWAVE


    These waveforms can be fine-tuned by passing the parameters to the sound function:


    ```

    function touched(touch)

      sound({

        Waveform = SOUND_NOISE,

        AttackTime = 1.2,

        SustainTime = 1

      })

    end

    ```


    The other settings that can be fine-tuned are


    *   AttackTime

    *   SustainTime

    *   SustainPunch

    *   DecayTime

    *   StartFrequency

    *   MinimumFrequency

    *   Slide

    *   DeltaSlide

    *   VibratoDepth

    *   VibratoSpeed

    *   SquareDuty

    *   DutySweep

    *   RepeatSweep

    *   PhaserSweep

    *   LowPassFilterCutOff

    *   LowPassFilterCutOffSweep

    *   LowPassFilterResonance

    *   HighPassFilterCutOff

    *   HighPassFilterCutOffSweep

    *   Volume


    iOS Hardware


    One of the advantages of iOS devices is the inclusion of an accelerometer and
    a gyroscope. As mentioned previously, a great thing about Codea is that since
    you code and run the app on the device, you can actually test on the device as
    well, and you can get actual data feedback from the hardware.


    The accelerometer returns the gravitational acceleration. The data from the accelerometer
    can be obtained from the Gravity variable, which has x, y, and z as its members.'
