    \n对于所有由单个字母表示的类（例如`%a`、`%c`、`%s`等），相应的大写字母表示该类的补集。因此，`%S`表示所有非空格字符。\n\n#### 模式项\n\
    \n模式项是一个单一的字符类，用于匹配该类中的任意单个字符。\n\n有一些字符有助于量化匹配：\n\n*   `*`：匹配该类中字符的零次或多次重复。这将始终返回最长的可能序列。\n\
