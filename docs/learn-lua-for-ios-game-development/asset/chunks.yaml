    ```

    __index = function(tbl, key)

        local a = tbl[key]

        if a <=0 then a = 0 end

        if a > 5 then a = 0 end

        return a

    end

    ```


    Though the preceding code looks very innocent and tries to keep the value of the
    element in the table within a range, this code will cause problems and circular
    references. The first line in the function, a = tbl[key], will actually trigger
    another __index function call, and that in turn will invoke another, and so on.


    Now that we’ve identified the issue, we still need to resolve it. To do this,
    we can use the Lua function rawget, which retrieves the value of the table without
    invoking the __index metamethod. So, we could write the same function as


    ```

    __index = function(tbl, key)

        local a = rawget(tbl, key)

        if a<=0 then a = 0 end

        if a > 5 then a = 0 end

        return a

    end

    ```


    __newindex


    This function is similar to the __index function, but is different in the way
    it’s used to set a value; so, when we assign a value to a table, this function
    is called. This gets passed three parameters: the table, the key, and the value.


    ```

    a = setmetatable({},{

        __newindex = function(t, key, value)

          print("Setting  [" .. key .. "]=" .. value)

          rawset(t, key, value )

        end})

    a.year = 2012

    a.apps = 15

    ```


    In a way similar to the preceding example where table[key]=value would invoke
    the __newindex function and could get into an endless loop and cause errors, this
    example uses rawset to set the value of the key.


    **Note**   This function is called the very first time, when the value of the
    key is not set at all. If the value is set, the function is not invoked at all.
    The value is directly altered.


    __mode


    In programming languages like Lua that employ garbage collection, objects are
    said to be *weak* if they cannot prevent themselves from being collected. Lua
    can set the table as a weak table where the keys and the values are weak references.
    If the key or the value of such a table is collected, the entry of the table is
    collected.


    The mode of these weak tables can be set using the __mode metafunction, and it
    can be used to set the keys or the values as weak using the k or v parameter,
    as follows:


    ```

    local weaktable = setmetatable({}, {__mode="k"})

    ```


    __call


    This allows the table to be used like a function. If the table is followed by
    parentheses, the metatable tries to locate the __call function and invoke it;
    if it is not present, it returns an error. Otherwise, it is passed the table and
    the arguments passed.


    ```

    t = setmetatable({},{

        __call = function(t, value)

                print("Calling the table with " .. value)

        end})


    t("2012")

    ```


    **Note**   Every time the metatable is set, it overwrites the earlier metatable
    entries, which means that in the preceding example, we do not have an entry for
    __newindex. If we had that defined earlier, it would have been removed, and the
    only function set would have been __call. You need to define all the relevant
    keys in one go, or get the metatable and then add or alter the new metafunction.


    __metatable


    This hides the metatable. When the getmetatable function is used and the table
    has a __metatable string, then the value of that key is returned instead of the
    actual metatable.


    __tostring


    This function is called when a sting representation of a table or object is requested.
    This can be used to provide a description for custom objects.


    ```

    t=setmetatable({},{__tostring=function() return "This is my custom table" end})

    print(t)

    print(tostring(t))

    ```


    __gc


    This function is called when the table is set to be garbage collected. If __gc
    is pointing to a function, this function is first invoked. This function is only
    available for user data (i.e., usable via the C APIs).


    __unm


    This function is the unary minus; it is equivalent to the – sign. To convert a
    number into a negative (e.g., 5 to –5), we add a – sign in front. The unary minus
    function is used to perform this conversion on a table or an object. It can be
    used to perform negation on complex objects; for example, a table of values.


    ```

    t = setmetatable({},{__unm=function() return -3 end})

    print(t - 5)

    print(5 - -t)

    ```


    **Note**   In this example, we are returning a fixed number, –3\. In your program,
    you might want to calculate the value to return.


    __add


    This function is the normal addition function; it is called when adding a variable
    to a table object using the + operator. Overriding this can be very useful when
    trying to add objects that do not have a numeric value that can be simply added.


    The first example that comes to mind is that of fractions. This is perhaps one
    of the most common examples of operator overloading with C++ and using addition
    between two objects that are nonnumeric.


    ```

    t = setmetatable({},{__add=function(tbl, val) return 5+val end})

    print(t+5)

    ```'
  trans: "\n这段代码首先创建一个新的空白表对象 `res`。接着，它保存元表签名——该签名用于标识某个表属于特定类型。若此元表被修改，该对象可能无法被识别为特定类型。随后，它将所有数据复制到新表中，如果某个元素类型是表，则会递归遍历该表中的每个元素和子表，完成后将数据保存到对应的新表数据元素中。最后，它为新表对象设置元表，并返回该表对象的副本。\n\
    \n## 自定义元表\n\n请记住，在 Lua 中，最重要的变量类型之一就是表。如前所述，数组、关联数组和对象本质上都是表。数组的可定制性不高，但对象具备更强的定制性——它们拥有一些数组所没有的额外功能和函数。所有这些功能构成了对象的独特“指纹”，有助于识别对象类型。Lua\
    \ 中的每个表都可以拥有一个元表。元表本质上只是一个定义了原始表和用户数据行为的普通表。如果在元表中设置特定字段，就能修改对象的行为。由此，我们可以创建对象并允许它们拥有自定义操作，类似于\
    \ C++ 中的运算符重载。不过，在 Lua 中可修改的内容是有限的。\n\n以下小节将描述帮助 Lua 修改或自定义表行为的关键字段。\n\n### `__index`\n\
    \n当我们尝试获取 Lua 表中某个元素的值时，Lua 会尝试定位该元素；如果元素不存在，Lua 会调用 `__index` 元函数。如果没有此方法，则返回\
    \ `nil`。\n\n例如，假设我们运行以下代码：\n\n```\nt = {}\nprint(t.name)\nprint(t.age)\n```\n\n\
    这会为 name 和 age 都打印 `nil`，因为我们尚未定义它们。如果修改代码，加入以下内容：\n\n```\ndefault = { name =\"\
    Lua\" }\nt = setmetatable( {}, {__index=default} )\nprint(t.name)\nprint(t.age)\n\
    ```\n\n我们会看到第一个 `print` 显示“Lua”，第二个仍然打印 `nil`。\n\n`__index` 元函数可以是表中的数据（如前述代码所示），也可以是一个函数。当调用\
    \ `__index` 函数时，会传递两个参数：表（Table）和键（Key）。\n\n我们可以通过以下代码看到这一行为：\n\n```\nt = setmetatable({},\
    \ {__index=function(theTable, theKey) print(theTable, theKey) return\".\" end})\n\
    print(t.name)\nprint(t.age)\nprint(t[1])\nprint(t[2][3])\nprint(t.whatever)\n\
    ```\n\n我们从函数中返回了一个 `.`，因此会看到它打印表的地址和试图访问的元素名称，随后是一个 `.`。\n\n**注意** 每次访问表时，都会调用\
    \ `__index` 元函数。\n\n因此，在 `__index` 函数内部访问表值时必须小心。这可能导致循环引用，造成栈溢出，如下面的定义所示：\n\n\
    ```\n__index = function(tbl, key)\n    local a = tbl[key]\n    if a <=0 then a\
    \ = 0 end\n    if a > 5 then a = 0 end\n    return a\nend\n```\n\n虽然上述代码看起来非常无害，试图将表中元素的值限制在某个范围内，但这段代码会引发问题并导致循环引用。函数中的第一行\
    \ `a = tbl[key]` 实际上会触发另一个 `__index` 函数调用，进而再触发下一个，依次类推。\n\n既然我们已经发现了问题，仍需解决它。为此，我们可以使用\
    \ Lua 的 `rawget` 函数，该函数在获取表的值时不会调用 `__index` 元方法。因此，我们可以将同一个函数写成：\n\n```\n__index\
    \ = function(tbl, key)\n    local a = rawget(tbl, key)\n    if a<=0 then a = 0\
    \ end\n    if a > 5 then a = 0 end\n    return a\nend\n```\n\n### `__newindex`\n\
    \n该函数与 `__index` 函数类似，但不同之处在于它用于设置值；因此，当我们给表赋值时，会调用此函数。它接收三个参数：表、键和值。\n\n```\n\
    a = setmetatable({},{\n    __newindex = function(t, key, value)\n      print(\"\
    Setting  [\" .. key .. \"]=\" .. value)\n      rawset(t, key, value )\n    end})\n\
    a.year = 2012\na.apps = 15\n```\n\n与之前的示例类似，`table[key]=value` 会调用 `__newindex`\
    \ 函数，并可能陷入无限循环导致错误，因此此示例使用 `rawset` 来设置键的值。\n\n**注意** 该函数仅在键的值从未被设置时首次调用。如果值已被设置，该函数不会被调用，值直接修改。\n\
    \n### `__mode`\n\n在使用垃圾回收机制的编程语言（如 Lua）中，如果对象无法阻止自身被回收，则称其为*弱引用*对象。Lua 可以将表设置为弱表，其中键和值都是弱引用。如果此类表的键或值被回收，则表中的对应条目也会被回收。\n\
    \n这些弱表的模式可以通过 `__mode` 元函数设置，并可使用 `k` 或 `v` 参数将键或值设为弱引用，如下所示：\n\n```\nlocal weaktable\
    \ = setmetatable({}, {__mode=\"k\"})\n```\n\n### `__call`\n\n这允许表像函数一样被使用。如果表后面紧跟着括号，元表会尝试定位\
    \ `__call` 函数并调用它；如果不存在，则返回错误。否则，会将表和传入的参数传递给它。\n\n```\nt = setmetatable({},{\n\
    \    __call = function(t, value)\n            print(\"Calling the table with \"\
    \ .. value)\n    end})\n\nt(\"2012\")\n```\n\n**注意** 每次设置元表时，都会覆盖之前的元表条目，这意味着在上述示例中，我们没有\
    \ `__newindex` 的条目。如果之前定义了它，它将被移除，唯一设置的功能就是 `__call`。你需要一次性定义所有相关键，或者先获取元表，再添加或修改新的元函数。\n\
    \n### `__metatable`\n\n此功能用于隐藏元表。当使用 `getmetatable` 函数且表具有 `__metatable` 字符串时，将返回该键的值，而不是实际的元表。\n\
    \n### `__tostring`\n\n当请求表或对象的字符串表示形式时，会调用此函数。这可用于为自定义对象提供描述。\n\n```\nt=setmetatable({},{__tostring=function()\
    \ return \"This is my custom table\" end})\nprint(t)\nprint(tostring(t))\n```\n\
    \n### `__gc`\n\n当表被设置为待垃圾回收时，会调用此函数。如果 `__gc` 指向一个函数，则首先调用该函数。此函数仅适用于用户数据（即通过\
    \ C API 使用）。\n\n### `__unm`\n\n此函数是一元负号运算符；等同于 `-` 符号。要将数字转换为负数（例如，将 5 转换为 `-5`），我们在前面添加一个\
    \ `-` 符号。一元负号函数用于在表或对象上执行此转换。它可用于对复杂对象执行取负操作；例如，一个包含值的表。\n\n```\nt = setmetatable({},{__unm=function()\
    \ return -3 end})\nprint(t - 5)\nprint(5 - -t)\n```\n\n**注意** 在此示例中，我们返回一个固定数字\
    \ `-3`。在你的程序中，你可能需要计算要返回的值。\n\n### `__add`\n\n此函数是普通的加法函数；当使用 `+` 运算符向表对象添加变量时调用。在尝试添加没有简单数值表示的对象时，重写此函数非常有用。\n\
    \n首先想到的例子是分数。这或许是 C++ 中最常见的运算符重载示例之一，用于两个非数值对象之间的加法。\n\n```\nt = setmetatable({},{__add=function(tbl,\
    \ val) return 5+val end})\nprint(t+5)\n```\n"
