    \ `event:getTarget()` 函数。\n\n### 进入帧事件\n\n你可以设置进入帧事件来实现逐帧动画，例如：\n\n```\nlocal\
    \ _W = application:getLogicalWidth()\nlocal _H = application:getLogicalHeight()\n\
    \nlocal xD, yD, speed = 1, 1, 10\nlocal img = newImage(\"myImage2.png\",0,0)\n\
    local wd, ht = img:getWidth(), img:getHeight()\n\nfunction onEnterFrame(event)\n\
    local xP, yP = img:getPosition()\nxP = xP + xD*speed\nyP = yP + yD*speed\nif xP\
    \ >= _W-wd or xP == 0 then xD = -xD end\nif yP >= _H-ht or yP == 0 then yD = -yD\
    \ end\nimg:setPosition(xP, yP)\nend\n\nimg:addEventListener(Event.ENTER_FRAME,\
    \ onEnterFrame)\n```\n\n进入帧事件包含一个 `frameCount` 属性，它返回自应用启动以来经过的帧数。`time` 返回自应用启动以来经过的秒数，`deltaTime`\
    \ 包含上一帧与当前帧之间的时间差。这可用于动画制作，并有助于协调对时间敏感的动画。\n\n### 系统事件\n\n`stage` 对象在应用生命周期的全程都存在。我们可以像在其他显示对象上一样，在\
