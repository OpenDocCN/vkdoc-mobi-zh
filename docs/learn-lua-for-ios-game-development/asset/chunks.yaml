    cat_01:speak()

    cat_02 = animal.new("dog")

    cat_02:speak()

    ```


    When we run the code, the functions get the object passed rather than the Animal
    namespace. This also ensures that the variables that are modified are specific
    to the object rather than the ones in the Animal namespace. That will thereby
    eliminate the issues mentioned earlier.


    Summary


    This chapter focused on functions and tables, the building blocks of Lua programming.
    It’s important to remember that everything that is not a string, a number of boolean
    is a Table. Tables are very powerful and important in Lua. You’ll be reading a
    lot about them (in some form or other) in most of the chapters.


    Another important concept that we touched upon is the namespace. Namespaces help
    to distinguish between the functions available in the main namespace (the global
    functions) and the functions in a custom library.


    Chapter     3


    File Operations


    When creating an app or a game, you need file I/O (input/output). You may not
    be working with a database, but there will always be the need to save something
    back to the disk; it could be the levels, the high score, a character the player
    might have unlocked, or some information regarding in-app purchases.


    So, let’s first look at what we have available in terms of functions that offer
    file operation functionality. Lua has two sets of functions for file operations,
    one called *implicit* and the other *explicit*. The difference between the two
    is that implicit functions work on the default file as provided by the io namespace,
    whereas explicit functions work with a file handle provided from a previous operation,
    such as io.open.


    Implicit Functions


    This section lists and describes the implicit functions you’ll be using in your
    Lua programming work, accompanied by a short example of how each is used in code.


    io.close ( [file] )


    This function closes the output file; it is similar to file:close(), but when
    no file is passed, it closes the default output file. You can see how io.close
    is used to close a fileHandle. To confirm, we print the type of fileHandle to
    check if the file is open or closed.


    ```

    fileHandle = io.open("file.txt", "w")

    print(io.type(fileHandle))

    fileHandle:write("Hello world")

    io.close(fileHandle)

    print(io.type(fileHandle))

    ```


    io.flush ( )


    This function runs file:flush() on the default file. When a file is in buffered
    mode, the data is not written to the file immediately; it remains in the buffers
    and is written when the buffer nears getting full. This function forces the buffers
    to write to file and clear up.


    io.input ( [file] )


    This function returns the current default input file when called without any parameters.
    The parameter passed can be either a filename or a file handle. When the function
    is called with a filename, it sets the handle to this named file as the default
    input file. If it is called with a file handle, it just sets the default input
    file handle to this passed file handle.


    io.lines ( [filename] )


    This function opens a given filename in read mode and returns an iterator function
    that returns a new line from the file every time it is called. When the iterator
    function detects that the end of the file has been reached, it closes the file
    and returns nil.


    When io.lines is called without a filename, it is equivalent to io.input():lines(),
    and it reads from the default input file and does not close the file when the
    end is reached.


    Here’s a way to access this function:


    ```

    for line in io.lines(filename) do

        print(line)

    end

    ```


    io.open ( filename [,mode] )


    This function is the main function that you use in reading and writing files with
    Lua. The mode is a string value that can be one of the following:


    *   "r": Read mode (default).

    *   "w": Write mode.

    *   "a": Append mode.

    *   "r + ": Update mode. All previous data is preserved.

    *   "w + ": Update mode. All previous data is erased.

    *   "a + ": Append update mode. All previous data is preserved and writing is
    only allowed at the end of the file.


    The mode can also have a "b" at the end to indicate that the file is to be opened
    in binary mode rather than in text mode. This function returns a file handle that
    can be used in explicit file operations.


    ```

    file = io.open("myfilename.txt", "r")

    ```


