    More Events


    We added event listeners for touch, tap, and enterFrame. Similarly, we can add
    listeners for other events, such as the *system* event, which raises events for
    system-related tasks.


    We set a listener for the system event if we want to catch the events such as
    the following:


    *   The applications starts (when the user taps the icon)

    *   The app is placed into suspension (when the user presses the home button and
    the app is in the background)

    *   The app is resumed (when the app is started again from the previous state
    rather than from the beginning)

    *   The app exits.


    ```

    Runtime:addEventListener("system",

        function(event)

            print("System event : " .. event.type)

        end)

    ```


    In other instances when the device is reoriented (i.e., changed from portrait
    mode to landscape). We can catch that with the orientation event.


    ```

    Runtime:addEventListener("orientation",

        function(event)

            print("Orientation changed to.. event.type)

        end)

    ```


    **Note**   The system events cannot be seen in the Corona simulator or terminal
    window, as they require the Apple iOS simulator or an actual device to function.
    However, the applicationStart, applicationSuspend, and applicationResume events
    can be generated in the Corona simulator.


    Custom Events


    In addition to the system events, you can also have custom events—events that
    you create specifically for your application. This way, you can manage the asynchronous
    portions of your game. Let’s say the game involves a boss battle with a gigantic
    spider; each time you take a limb off the giant spider, you can raise an event
    that will add a special bonus to your score and/or make the spider do something
    specific at that moment. With a game in the style of a top-down plane-shooter,
    you could use the events to update the score as you hit each plane.


    Let’s say we have a function that increases the score by a specified number; these
    parameters are passed to the function in a table-type structure:


    ```

    function updateScore(event)

        local score = lblScore.score +  event.points

        lblScore.text = score

        lblScore.score = score

    end

    ```


    In the function where a plane is shot down or a giant spider loses a leg, we can
    use the following:


    ```

    function triggerPoint(theObject)

        local points = theObject.value

        Runtime:dispatchEvent({

            name = "score",

            points = points,

            object = theObject

        })

    end

    ```


    To tie the two together, we also need to set a listener, which is done using the
    addEventListener function:


    ```

    Runtime:addEventListener("score", updateScore)

    ```


    One thing to note is that the event dispatcher works across modules, which means
    that two modules in the same application can communicate with each other without
    even being aware of the presence of the other. Think of an event as a radio broadcasting
    station. The radio station will broadcast its program irrespective of how many
    listeners are listening. Even if there are no listeners, the broadcast carries
    on no differently than if there were hundreds. The only thing required of the
    listeners is to be able to tune in to the correct station. So, the broadcast is
    made using the dispatchEvent function, and the audience tunes in using the addEventListener
    function that listens to the score event.


    **Note**   A dispatchEvent requires that the event object be provided a name;
    this is used to identify it when the listener filters the events and calls the
    appropriate handler function. You can pass any data in the event object.


    Alternatives to Events


    As an alternative to using events, you can use *callbacks*. The shortcoming for
    callbacks, however, is that instead of a radio station, it is more like a telephone
    conversation—a communication between two parties. When you set a callback, it
    is set for one module alone. This is useful in scenarios such as when we want
    to monitor something specific. For example, in a game, if connectivity is lost,
    rather than broadcast that and have every function that relies on the network
    connectivity try to manage the situation, we could simply have just one function
    that registers as the callback for that event and handle the situation accordingly.
    Callbacks also provide a way to communicate between the modules in the same application.


    ```

    local theCallback = nil

    local callback =

        function(event)

            print("callback called")

        end

    local mainLoop =

        function()

            for i=1, 20 do

                if i==15 then

                    if theCallback then

                        theCallback()

                    end

                end

           end

           print("Loop ended")

        end

    mainLoop()  -- call the loop without a callback set

    theCallback = callback  -- set the callback

    mainLoop()  -- call the loop with a callback set

    ```


    Using Maps


    One of the features of the iOS platform that sparked the interest of many developers
    was the ability to place maps in an application, as shown in [Figure 8-18](#9781430246626_Ch08.xhtml#Fig18).
    UIMapKit (created by Apple) was a bit too complicated, since it involved a series
