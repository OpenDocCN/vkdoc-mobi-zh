    Here, we create a new text field with `nil` as the parameter, which will use the
    default font. Then we position the text on the screen. Text in Gideros is displayed
    using *baseline font*. Simply, the y parameter is where the base of the font is
    aligned, which may take a while to get used to. For example, if we do not position
    the text at position 10 from the top, the text might not be visible. Then we add
    the text to the stage and change the text displayed.


    The `TextField` object can be modified like any other display object. The text
    color can be set using the function `object:setTextColor(colour)`, where `colour`
    is a hexadecimal value derived from `b + g * 256 + r * 65536`, and `r`, `g`, and
    `b` represent the red, green, and blue values of the color, respectively.


