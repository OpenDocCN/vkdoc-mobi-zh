    This function starts or resumes the execution of the coroutine `co`. The first\
    \ time this function is called, it starts running its body. The values (`val1`,\
    \ ...) are all passed as arguments to the main function. The function returns\
    \ `true` plus any values passed to `yield` or any values returned by the body\
    \ function. If the coroutine body is already finished or an error occurs while\
    \ executing the coroutine body, `resume` returns `false` plus an error message.\n\
    \n```\nthread = coroutine.create(function() print(\"Started\") end)\ncoroutine.resume(thread)\n\
    ```\n\n#### `coroutine.running()`\n\nThis function returns the running coroutine,\
    \ or `nil` when the running coroutine is the main one.\n\n```\nprint( coroutine.running(thread))\n\
    thread = coroutine.create( function() print(\"Hello\") end)\nprint( coroutine.running(thread))\n\
    ```\n\n#### `coroutine.status(co)`\n\nThis function returns the status of the\
    \ coroutine `co` as a string. The possible return values are:\n\n- `running`:\
    \ If the coroutine is running\n- `suspended`: If the coroutine is suspended in\
    \ a call to `yield` or hasn’t started running\n- `normal`: If the coroutine is\
    \ active but not running\n- `dead`: If the coroutine has finished its body function\
    \ or has stopped with an error\n\n```\nprint( coroutine.status(thread))\nthread\
    \ = coroutine.create( function() print(\"Hello\") end)\nprint( coroutine.status(thread))\n\
    ```\n\n#### `coroutine.wrap(f)`\n\nThis function creates a new coroutine with\
    \ the body `f`, similar to `create`. However, `coroutine.wrap` returns a function\
    \ that can be used with the coroutines.\n\n```\nthread = coroutine.wrap( function()\
    \ print(\"Hello\") end)\nthread()       -- to start the coroutine.\n```\n\n####\
    \ `coroutine.yield(...)`\n\nThis function suspends the execution of the calling\
    \ routine. Any of the arguments to `yield` are passed as extra results to `resume`.\n\
    \n### Creating a New Coroutine\n\nYou can use the following code to create a new\
    \ coroutine:\n\n```\nco = coroutine.create(function() print(\"hello world\") end)\n\
    print(co)\nprint(type(co))\ncoroutine.resume(co)\nprint(coroutine.status(co))\n\
    ```\n\nIn this code, we create a new coroutine using the function `coroutine.create`\
