    \n```\ncreateHUDItems()\n```\n\n游戏结束文本会保持在屏幕正中央。我们希望它只在游戏实际结束时显示，而在游戏进行中不显示。为此，我们可以简单地将该文本的可见性设为`false`——即使用`setVisible`函数隐藏它：\n\
