    \ theText)\n  _text.width = _text:getWidth()\n  _text.height= _text:getHeight()\n\
    \nstage:addChild(_text)\n  position(_text, xPos, yPos - _text.height) -- Gideros\
    \ uses baseline font\n  return _text\nend\n```\n\n现在我们有了创建文本项的`newText`函数，接下来可以创建用于更新文本对象内容的函数。\n\
