    __eq


    This is the equal operator (==); it can be used to help compare two table values
    that are not easily comparable. The not (a==b) is equivalent to a~=b.


    __lt


    This is the *less-than* operator (<); it can be used to help compare two table
    values that are not easily comparable.


    __le


    The *less-than-or-equal-to* operator (<=) is also useful for comparing two table
    values that are not easily comparable.


    A Useful Example


    Let’s look at a sample that demonstrates the practical use of the functions just
    described and their use with tables. The + operator works well between numbers.
    If we try to add two tables using the + operator, it will not work. We can create
    the functions that can be used to manage operations such as adding these tables.
    In the following example, we override the __add function, which allows us to add
    two tables using the + operator.


    ```

    thePos = {}


    thePos.__add = function (a, b)

        local res = {

            a[1] + b[1],

            a[2] + b[2]

        }

        setmetatable(res, thePos)

        return res

    end


    function make_pos(x,y)

        local res = { x, y }

        setmetatable(res, thePos)

        return res

    end


    p1 = make_pos(5,6)

    p2 = make_pos(2,4)

    p3 = p1 + p2

    print(p3[1], p3[2])

    ```


    Object-Oriented Lua


    Lua is not an object-oriented language, but it has functionality that allows for
    it to be used like one. I described this in [Chapter 2](#9781430246626_Ch02.xhtml),
    where functions can be added to a table, called with the : operator, and passed
    to the function.


    We had a look at deepcopy earlier—a way to create a copy of a table other than
    just passing a pointer to memory. We also had a look at tweaking the metatable
    to override some of the functionality of tables.


    The logic programming language Prolog has features that help to create relationships
    and thereby connections between data, and then look this information up using
    predicates. In the most basic manner, Lua can provide similar functionality.


    First, here’s an example of how we can create the relationships:


    ```

    -- Create the relationships

    company(Jayant, OZApps)

    language(CoronaSDK, Lua)

    language(GiderosStudio, Lua)

    language(Moai, Lua)

    language(XCode, ObjectiveC)


    -- Query the relationships

    print(is_language(CoronaSDK, ObjectiveC))

    print(is_company(Jack, OZApps))

    print(is_company(Jayant, OZApps))


    -- additionally

    father(Vader, Luke)

    father(Vader, Leia)

    brother(Luke, Leia)

    sister(Leia, Luke)


    print(is_sister(Leia, Luke))

    print(is_sister(Leia, Han))

    ```


    All of this can be run from the terminal. One of the challenges in this is that
    Lua does not have commands that help associate these relationships; the first
    thing you will get if you type father(Vader, Luke) in the terminal window is an
    error that states that there is no global called father. This happens because
    there is no function or variable called father, Vader, or Luke. To rectify this
    situation, we take the help of metatables. As described previously, whenever Lua
    tries to retrieve a missing value, it calls the __index function. Let’s see what
    happens when we set an __index metamethod and try to invoke father(Vader, Luke):


    ```

    setmetatable(_G, {__index =

        function(tbl, name)

            print("Retrieving the variable :", name)

        end

    })


    what(was, this)

    ```


    Notice that we still get an error that the global variable what was not found.
    When we access a member from the table, the member is returned, but if the member
    is not present, the __index function is used to calculate or determine the data
    to be returned. If there is no __index function, then we get the error.


    We can rectify that by using rawset and making sure that there is a global function
    (if it is not found) similar to an autodeclare, where the variable would get declared
    if not declared already.


    ```

    setmetatable(_G, {__index =

        function(tbl, name)

            print("Retrieving the variable :", name)

            rawset(tbl,name,{})

        end

    })


    what(was, this)

    ```


    While this should have removed the error, we find that this doesn’t rectify the
    situation, even though a new global variable called what is declared. This fails
    because what is a table, not a function, and we are trying to invoke it like a
    function.


    An easy way to rectify this is to replace the rawset(tbl, name,{}) with rawset(tbl,
    name, function() end. This way, we return a function that can be called without
    invoking errors in Lua. The most important point here is that the __index metamethod
    has to return something expected in the context.


    ```

    setmetatable(_G, {__index =

        function(tbl, name)

            print("Name :", name)

            rawset(tbl,name,function() end)

            return rawget(tbl, name)

        end

    })


    what(was, this)

    ```


    This is fine; however, since Vader and Luke are also not defined, we cannot have
    them converted into functions. One logical solution is to identify that all variable
    names starting with a lowercase letter are functions and all uppercase names are
    variables. So, in the case of father(Vader, Luke), Vader and Luke would be variables,
    while father would be a function.


    ```

    setmetatable(_G, {__index =

        function(tbl, name)

             if name:match("^[A-Z]") then

                rawset(tbl, name, {} )

            else

                rawset(tbl, name, function() end)

            end

            return rawget(tbl,name)

        end

    })


    what(was, this)

    ```


    Now we are able to create as many relationships as we want—the preceding code
    will check if the words begin with uppercase or lowercase letters; if uppercase,
    then it will create a function, and if not, then it will simply create an empty
    table. However, despite all of this, we still need to create relationships between
    the two elements.'
