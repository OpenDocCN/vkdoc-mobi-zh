- fmt: "在某些角色扮演类游戏中，抛硬币可能不够用。你可能希望有更多可能的数值，而不仅仅是1或2——类似于掷骰子的效果。最常见的骰子有六个面，能得到的数字范围是1到6。\n\
    \n```\nlocal theDice = math.random(1,6)\nprint(\"we got \", theDice)\n```\n\n\
    在角色扮演类游戏或类似类型的棋盘游戏中，骰子通常是非标准的，可能不止六个面。模拟这种情况就像之前的示例一样简单。我们只需要改变骰子能得到的最大值。例如，对于一个20面的骰子，我们可以这样写：\n\
    \n```\nlocal maxValue = 20\nlocal theDice = math.random(1,maxValue)\nprint(\"\
    we got \", theDice)\n```\n\n如果你需要多次投掷，可以简单地将其改为一个函数来获取骰子值：\n\n```\nfunction diceRoll(maxSides)\n\
    \  local maxSides = maxSides or 6\n return math.random(1,maxSides)\nend\n```\n\
    \n在前面的`inc`和`dec`示例中，你可能注意到我们使用了一个Lua的便捷特性，即允许为变量分配默认值。在刚刚展示的`diceRoll`函数中，如果调用该函数时没有传入任何值（即`maxSides`参数为`nil`），那么第二行会创建一个名为`maxSides`的局部变量，并将其赋值为参数`maxSides`的值（如果参数为`nil`或缺失，则赋值为6）。\n\
    \n使用标志（Flags）\n\n这里指的不是旗杆上飘扬的旗帜。这里的标志是一个保存布尔值`true`或`false`的变量。例如，在一个游戏中，一个标志可以指示你是否拥有宝箱的钥匙；如果你有钥匙，就可以打开宝箱；如果没有，则不能。因此，代码会检查你是否拥有钥匙，并相应地允许你打开宝箱。\n\
    \n```\nfunction openTreasureChest(withKey)\n    if withKey == true then\n    \
    \    print(\"The treasure chest opens\")\n    else\n        print(\"Nothing happens,\
    \ you are unable to open the chest\")\n    end\nend\nlocal hasKey = false\nopenTreasureChest(hasKey)\n\
    hasKey = true\nopenTreasureChest(hasKey)\n```\n\n注意，我们有一个名为`hasKey`的变量，初始值设为`false`。然后调用`openTreasureChest`函数，函数打印出\"\
    Nothing happens\"。但当我们将`hasKey`设置为`true`后再次调用时，它打印出\"The treasure chest opens\"\
    。这是标志的最简单示例。在游戏中，你可以有许多标志，它们可能一起使用来决定某些动作。\n\n在某些情况下，你还可以使用标志来阻止某些事情发生。例如，你可以设置一个标志来阻止函数运行。\n\
    \n使用标志来管理某些动作是否可以执行，非常简单：\n\n```\nonHold = false\nfunction giveBlessings()\n \
    \   if onHold == true then return end\n    print(\"Bless you\")\nend\ngiveBlessings()\n\
    onHold = true\ngiveBlessings()\n```\n\n开始时，`onHold`为`false`，所以当调用`giveBlessings`函数时，它会打印\"\
    Bless you\"。下一次，我们调用它时`onHold`设置为`true`，函数直接返回，什么也不打印。\n\n在标志之间游弋：多个标志\n\n让我们设想一个场景：我们需要收集多件物品才能去屠龙。这些物品包括盔甲、剑、坐骑、盾牌和一些法术。共有五件物品。要检查多件物品，我们使用布尔运算符`and`和`or`。在Lua中，它们以短路方式工作——简单来说，这意味着它们只在需要时才评估条件。\n\
    \n假设我们物品的标志分别叫做`item1`到`item5`，我们可以这样做：\n\n```\nif item1 and item2 and item3 and\
    \ item4 and item5 then\n    print(\"The king blesses you on your journey to battle\
    \ the dragon\")\nelse\n    print(\"You are still not ready for battling the dragon\"\
    )\nend\n```\n\n这段代码运行得很好，但可以改进。如果游戏需要向玩家报告已收集物品数量与需要收集的总物品数量，我们就会想知道如何实现。以下是实现方法之一：\n\
    \n```\nlocal items = {}       -- 最好使用数组来存放多个物品\nlocal maxItems = 5       -- 需要准备好的物品数量\n\
    function isPlayerReady(theItemsArray)\n    local count = 0\n    local i\n    for\
    \ i = 1,maxItems do\n        if theItemsArray[i] then count = count + 1 end\n\
    \    end\n   return count\nend\n```\n\n现在我们可以这样调用这个函数来检查玩家是否准备好了：\n\n```\nif isPlayerReady(items)==5\
    \ then\n    print(\"The king blesses you on your journey to battle the dragon\"\
    )\nelse\n    print(\"You are still not ready for battling the dragon\")\nend\n\
    ```\n\n通过使用数组，我们不仅减少了所需的变量数量，还在保存物品列表时使操作更简单；换句话说，如果你可以收集的物品数量是100，那么设置`item1`到`item100`会很愚蠢。创建数组来保存这些值要容易得多。\n\
    \n许多新手开发者常问的另一个问题是：如何创建动态变量？答案是使用数组；在它们被使用的上下文中，数组等效于动态变量。\n\n使用数学进行循环\n\nLua中最安全的循环是`for`循环。还有其他使用循环的方式，但如果使用不当，有些可能会导致Lua挂起。\n\
    \n```\nlocal result = false\nlocal  value = 0\nwhile result == false do\n  print(\"\
    The value is \", value)\n  value = value + 1\n  if value>=\n5 then\n    result\
    \ = true\n  end\nend\n```\n\n当值达到5或更大时，我们将`result`设置为`true`，这样`result==false`这个条件就不再为真，从而中断循环。使用一个标志来退出`while`循环是一个好习惯，但如果你遇到需要使用`while\
    \ true do`循环的情况，可以使用`break`语句来退出循环。\n\n```\nlocal  value = 0\nwhile true do\n\
    \ print(\"The value is \", value)\nvalue = value + 1\nif value>= 5 then break\
    \ end\nend\n```\n\n在游戏中使用网格\n\n如果你曾创建过一个简单的棋盘游戏，你会意识到游戏基本上是一个由存放物品的方格组成的网格。本例将探讨这种组织形式。为简单起见，棋盘上的每个方格在每个槽位上只存放一个棋子。\n\
    \n```\nlocal board = {} -- 注意，这只是一个一维数组\nlocal i,j\nlocal boardW, boardH = 5,5..\
    \   -- 一个5x5的棋盘\nfor i = 1,boardH do\n    board[i] = {}\n    for j = 1,boardW\
    \ do\n        board[i][j] = 0  -- 初始化为空，即0\n    end\nend\n```\n\n这样，我们就创建了一个5x5的棋盘，可以存放棋子。让我们用一些物品（即非零数字）来填充棋盘。\n\
    \n```\nlocal board = {} -- 注意，这只是一个一维数组\nlocal i,j\nlocal boardW, boardH = 5,5\
    \     -- 一个5x5的棋盘\nfor i = 1,boardH do\n    board[i] = {}        -- 现在为数组创建第二个维度\n\
    \    for j = 1,boardW do\n        board[i][j] = 0  -- 初始化为空，即0\n    end\nend\n\
    for i = 1,7 do -- 让我们在25个格子中随机放置7个物品\n    local xCo, yCo = math.random(1,boardW),\
    \ math.random(1,boardH)\n    board[yCo][xCo] = 1\nend\nfor i = 1,boardH do\n \
    \   for j = 1,boardW do\n        print(i, j, board[i][j])\n    end\nend\n```\n\
    \n我们可以看到哪些格子被随机填充了。\n\n蛇梯棋"
  raw: 'In some RPG-style games, a coin flip might not be enough. You might want to
    have more possible values than either 1 or 2—something that would emulate the
    roll of a die. The most common die has six sides, and the numbers that one can
    get are in the range of 1 to 6.


    ```

    local theDice = math.random(1,6)

    print("we got ", theDice)

    ```


    In RPG-type games or board games of a similar genre, the dice are often nonstandard
    and could have more than six sides. It is just as easy to simulate that as the
    previous example. The only change that we need to make is the maximum value that
    we can get on the die. For example, for a 20-sided die, we’d use this:


    ```

    local maxValue = 20

    local theDice = math.random(1,maxValue)

    print("we got ", theDice)

    ```


    In case you want multiple rolls, you can simply change this into a function and
    get the dice-roll values:


    ```

    function diceRoll(maxSides)

      local maxSides = maxSides or 6

     return math.random(1,maxSides)

    end

    ```


    In the preceding example with inc and dec, you might have noted that we used a
    nifty feature of Lua that allows for assigning a default value to a variable.
    In the diceRoll function just shown, if the function is called without any value
    (i.e., the maxSides parameter is nil), then the second line creates a local variable
    called maxSides and assigns it the value of the parameter maxSides (or 6 if the
    parameter is nil or missing).


    Using Flags


    This doesn’t refer to the flag that we all recognize flying from the flagpole.
    The flag in reference here is instead a variable that holds the value true or
    false. For example, in a game, one flag could indicate whether you have a treasure
    chest’s key or not; if you have the key, then you can open the treasure box, but
    if you don’t, then you can’t. So the code would check if you have the key or not
    and allow you to open the treasure chest accordingly.


    ```

    function openTreasureChest(withKey)

        if withKey == true then

            print("The treasure chest opens")

        else

            print("Nothing happens, you are unable to open the chest")

        end

    end

    local hasKey = false

    openTreasureChest(hasKey)

    hasKey = true

    openTreasureChest(hasKey)

    ```


    Notice that we have a variable called hasKey, and at first, the value is set to
    false. With that, we call the function openTreasureChest, and the functions prints
    Nothing happens. But when we call it again after setting hasKey to true, it prints
    The treasure chest opens. This is the simplest example of a flag. In a game, you
    could have many flags that might be used together to determine certain actions.


    In some cases, you can also use a flag to prevent certain things from happening.
    For example, you can have a flag that would prevent a function from running.


    Using a flag to manage if some actions can be run or not, it is very simple:


    ```

    onHold = false

    function giveBlessings()

        if onHold == true then return end

        print("Bless you")

    end

    giveBlessings()

    onHold = true

    giveBlessings()

    ```


    When we start, onHold is false, so when the giveBlessings function is called,
    it prints Bless you. The next time around, we call it with onHold set to true,
    and the function simply returns and nothing is printed.


    Swimming Between the Flags: Multiple Flags


    Let’s consider a scenario where we need to get multiple items before we can go
    and slay a dragon. These would include having armor, a sword, a steed, a shield,
    and some spells. These are five items. To check for multiple items, we use the
    Boolean and and or operators. In Lua, they work in a short-circuiting manner—in
    plain terms, this just means that they evaluate a condition only when required.


    Assuming that the flags for our items are called item1 through to item5, we can
    do the following:


    ```

    if item1 and item2 and item3 and item4 and item5 then

        print("The king blesses you on your journey to battle the dragon")

    else

        print("You are still not ready for battling the dragon")

    end

    ```


    This code works perfectly fine, but it can be made better. If the game had to
    report back to the player on the number of items collected vs. the total number
    of items that were to be collected, we would be left wondering how to achieve
    that. Here’s one way to accomplish it:


    ```

    local items = {}       -- Better to have an array for multiple items

    local maxItems = 5       -- Number of items required to be ready

    function isPlayerReady(theItemsArray)

        local count = 0

        local i

        for i = 1,maxItems do

            if theItemsArray[i] then count = count + 1 end

        end

       return count

    end

    ```


    Now we can call this function to check if the player is ready or not, as follows:


    ```

    if isPlayerReady(items)==5 then

        print("The king blesses you on your journey to battle the dragon")

    else

        print("You are still not ready for battling the dragon")

    end

    ```


    By having an array, we not only reduce the number of variables required, but also
    make it easier to work with while saving a list of items; in other words, if the
    number of items that you could collect were 100, it would be silly to have item1
    through item100\. Creating arrays to hold those values is easier.


    Another common question that a lot of new developers ask is, How can I create
    dynamic variables? The answer is to use arrays instead; they are the equivalent
    to the dynamic variables in the context that they were to be used.


    Using Math to Loop


    The safest loops to use in Lua are for loops. There are other ways to use loops,
    but some of them can cause Lua to hang if not used properly.


    ```

    local result = false

    local  value = 0

    while result == false do

      print("The value is ", value)

      value = value + 1

      if value>=

    5 then

        result = true

      end

    end

    ```


    When we reach a value of 5 or greater, we simply set the result to true, which
    does not evaluate the condition result==false as being true, and hence breaks
    the loop. It is a good practice to have a flag to exit a while loop, but if you
    ever face a situation where you need to have a while true do loop, you can use
    the break statement to exit the loop.


    ```

    local  value = 0

    while true do

     print("The value is ", value)

    value = value + 1

    if value>= 5 then break end

    end

    ```


    Using a Grid in a Game


    If you ever end up creating a simple board game, you will realize that the game
    is basically a grid made up of squares that hold items. This example will look
    at this type of organization. For simplicity’s sake, each square on the board
    shall hold only one piece per slot on the board.


    ```

    local board = {} -- Note that this is a single-dimension array only

    local i,j

    local boardW, boardH = 5,5..   -- A 5x5 board

    for i = 1,boardH do

        board[i] = {}

        for j = 1,boardW do

            board[i][j] = 0  -- Initialize it to nothing; i.e., 0

        end

    end

    ```


    So, we have just created a 5 × 5 board that can hold the tiles. Let’s fill the
    board with some item (i.e., a nonzero number).


    ```

    local board = {} -- Note that this is a single-dimension array only

    local i,j

    local boardW, boardH = 5,5     -- A 5x5 board

    for i = 1,boardH do

        board[i] = {}        -- Now we create the second dimension for the array

        for j = 1,boardW do

            board[i][j] = 0  -- Initialize it to nothing; i.e., 0

        end

    end

    for i = 1,7 do -- Let''s place 7 items randomly in some of the 25 slots

        local xCo, yCo = math.random(1,boardW), math.random(1,boardH)

        board[yCo][xCo] = 1

    end

    for i = 1,boardH do

        for j = 1,boardW do

            print(i, j, board[i][j])

        end

    end

    ```


    We can see which of the squares are randomly filled.


    Snakes and Ladders'
