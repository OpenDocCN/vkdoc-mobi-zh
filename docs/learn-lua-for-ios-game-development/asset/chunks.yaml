    \n## Summary\n\nThis chapter discussed the various functions available in LÖVE.\
    \ This is a very comprehensive and powerful framework for desktop applications\
    \ and can be used to integrate desktop features with your mobile applications.\
    \ LÖVE is a complete framework in many regards; it is cross platform and fully\
    \ functional, with physics, sound, particle systems, and drawing functions. Additionally,\
    \ it is one of the very few frameworks that allows for pixel access.\n\nIn the\
    \ next chapter, we shall look at Codea, which was inspired by LÖVE and is modeled\
    \ on the Processing libraries.\n\n## Chapter 12: Codea\n\nThe last of the frameworks\
    \ on our list is Codea. This was created as an IDE on the iPad. The highlight\
    \ of the app was and rather still is the editor, which makes editing, or rather\
    \ writing, code on the iPad fun. It has autocomplete functionality and a custom\
    \ keyboard that puts commonly used keys at your fingertips, rather than making\
    \ you switch between layouts to reach certain numbers or symbols.\n\nThe biggest\
    \ advantage of Codea is that you can test your app on the target device directly,\
    \ rather than having to upload to test on the device or use a simulator, as is\
    \ the case with other frameworks. In this sense, Codea is the fastest and the\
    \ most accurate simulator and player that you can use.\n\n### Getting Codea\n\n\
    The first step for getting Codea is purchasing it from the iTunes store; it is\
    \ available only for the iPad at the moment. The link for the Codea app can be\
    \ found at [http://itunes.apple.com/au/app/codea/id439571171?mt=8](http://itunes.apple.com/au/app/codea/id439571171?mt=8).\n\
    \nWhen you start Codea, you’ll see the start screen, shown in [Figure 12-1](#9781430246626_Ch12.xhtml#Fig1),\
    \ which offers the option to either open some samples to study or start a new\
    \ project. When a new project is created, Codea also creates a skeleton template\
    \ to build upon. Clicking the Getting Started button will take you to a complete\
    \ reference to Codea, including the reference manual, forums, and wiki, and the\
    \ Lua reference manual.\n\n![9781430246626_Fig12-01.jpg](OEBPS/Images/9781430246626_Fig12-01.jpg)\n\
    \n[Figure 12-1](#9781430246626_Ch12.xhtml#_Fig1) .  The start screen when you\
    \ launch Codea\n\n### Codea Architecture\n\nThe major portion of Codea is the\
    \ editor, which includes Lua syntax highlighting. The engine that powers Codea\
    \ shares a lot with the Processing language (see [http://processing.org](http://processing.org)).\
    \ The concepts and APIs are taken from Processing, and Codea benefits from Processing’s\
    \ mature and stable API.\n\nWith the Codea runtime, your code can be compiled\
    \ on the desktop using a Mac with Xcode. The code that you write with Codea can\
    \ be compiled with the runtime, and the app can be uploaded to the iOS App Store.\
    \ The first app that was created using the Codea runtime was Cargo-Bot, which\
    \ proved that the Codea runtime was ready for use as a framework.\n\n### Hello\
    \ World\n\nLike most of the Lua-based frameworks, Codea uses `main.lua` as the\
    \ entry point to the code being run. The `main.lua` file has two functions that\
    \ help work with the application.\n\nThe first one is `setup`; this is the function\
    \ that is run only once at the start of the application. This function can be\
    \ used to run all the initialization code required for the application. The second\
    \ function is `draw`; this is the function that is responsible for drawing, or\
    \ rather updating, the screen at every frame. Here are the two functions:\n\n\
    ```\nfunction setup()\n  print(\"Hello World\")\nend\n\nfunction draw()\n  background(100,120,160,255)\n\
    \  font(\"Georgia\")\n  fill(255)\n  fontSize(20)\n  textWrapWidth(70)\n  text(\"\
    Hello World from Codea\", WIDTH/2, HEIGHT/2)\nend\n```\n\nWhen you run these functions,\
    \ you’ll see the text “Hello World from Codea” in the middle of the screen, as\
    \ shown in [Figure 12-2](#9781430246626_Ch12.xhtml#Fig2). The Codea run screen\
    \ has two property windows on the left side, which display parameters and the\
    \ console output window. The rest of the screen displays the graphical output\
    \ of the code.\n\n![9781430246626_Fig12-02.jpg](OEBPS/Images/9781430246626_Fig12-02.jpg)\n\
    \n[Figure 12-2](#9781430246626_Ch12.xhtml#_Fig2) .  Hello World using Codea\n\n\
    **Note**: You can remove the two left-hand windows by using the function `displayMode(FULLSCREEN)`\
    \ to give yourself more screen space.\n\nThe parameters can be used for interactive\
    \ input to the code. These are typically in the form of sliders that can help\
    \ set ranges.\n\n### Parameters\n\nWhile in interactive running mode, you might\
    \ want to be able to change some of the code on the fly to see how it will alter\
    \ the output. For example, say you want to alter the stroke width or the radius\
    \ of a circle. Rather than setting that in the code and running it again, you\
    \ can use the parameter sliders to alter it on the fly.\n\nParameters can be created\
    \ using the `parameter` function. The `parameter` function takes three arguments:\
    \ the *name* of the parameter, the *starting* range, and the *end* range. The\
    \ name of the parameter is also the name of the global variable, which can be\
    \ accessed in the code. Here’s an example:\n\n```\nparameter(\"Radius\", 1, 10)\n\
    ```\n\nThis shall create a slider in the Parameters window that allows for choosing\
    \ the radius. The best place to create the parameter sliders is in the `setup`\
    \ function. The `parameter` function allows for the slider value to be changed\
    \ as a floating-point number, whereas the `iparameter` function allows for selection\
    \ of an integer number in the range.\n\n```\nfunction setup()\n  parameter(\"\
    Radius\", 100, 500)\n  iparameter(\"BlueAmount\", 0, 255)\nend\n\nfunction draw()\n\
    \  background(10,10,20)\n  stroke(255)\n  fill(255,0,BlueAmount)\n\nstrokeWidth(1)\n\
    \  ellipseMode(RADIUS)\n  ellipse(0,0,Radius, Radius)\nend\n```\n\nNow when we\
    \ run the code, we can adjust the radius of the ellipse that we draw and also\
    \ modify the blue color amount. This allows the color to change from Red to Magenta.\n\
    \n**Note**: You can add a fourth argument to the `parameter` or the `iparameter`\
    \ function that sets the initial value of the global variable.\n\n### Drawing\
    \ with Codea\n\nSince Codea is a GUI-based framework, we’ll focus on the `draw`\
    \ function, which enables us to create graphics."
