    \ an additional parameter that allows for passing data to the event handler. The\
    \ event handler gets two parameters: the extra data that we pass to the handler\
    \ and the event object that contains the event-related data.\n\n**Note:** The\
    \ parameters passed to the function are different for the mouse events than for\
    \ the touch events. The touch event has a record called `touches`, which is not\
    \ present in a mouse event. This is mainly because the user can place multiple\
    \ fingers on the screen—so, each `touches` record has an `x,y`-coordinates and\
