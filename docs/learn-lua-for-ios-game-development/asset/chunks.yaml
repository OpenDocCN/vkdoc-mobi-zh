    \n## 摘要\n\n本章讨论了 LÖVE 中可用的各种函数。这是一款功能全面且强大的桌面应用框架，可用于将桌面特性集成到移动应用中。LÖVE 在多个方面堪称完备框架：它具备跨平台能力，功能完善，集物理、音效、粒子系统和绘图函数于一身。此外，它是极少数能支持像素级访问的框架之一。\n\
    \n下一章我们将介绍 Codea，该框架受 LÖVE 启发并借鉴了 Processing 库的设计。\n\n## 第 12 章：Codea\n\n我们列表中的最后一个框架是\
    \ Codea。它最初是作为 iPad 上的集成开发环境创建的。该应用最大的亮点（至今依然如此）是其编辑器，它让在 iPad 上编辑（或更准确地说，编写）代码变得充满乐趣。编辑器具备自动补全功能，并配备定制键盘，将常用键触手可及，无需在键盘布局间切换来输入特定数字或符号。\n\
    \nCodea 的最大优势在于，你可以直接在目标设备上测试应用，无需像其他框架那样上传至设备或使用模拟器。从这个意义上讲，Codea 是可用的最快、最精确的模拟器和运行器。\n\
    \n### 获取 Codea\n\n获取 Codea 的第一步是从 iTunes 商店购买；目前它仅支持 iPad。Codea 应用的下载链接为：[`itunes.apple.com/au/app/codea/id439571171?mt=8`](http://itunes.apple.com/au/app/codea/id439571171?mt=8)。\n\
    \n启动 Codea 后，你会看到如图 12-1 所示的启动画面，你既可以选择打开示例项目进行学习，也可以创建新项目。新建项目时，Codea 会自动生成一个骨架模板供你扩展。点击“入门指南”按钮将跳转至\
    \ Codea 的完整参考文档，包括参考手册、论坛、维基以及 Lua 参考手册。\n\n![9781430246626_Fig12-01.jpg](img/9781430246626_Fig12-01.jpg)\n\
    \n图 12-1 . 启动 Codea 时的初始界面\n\n### Codea 架构\n\nCodea 的主要部分是编辑器，它具备 Lua 语法高亮功能。驱动\
    \ Codea 的引擎与 Processing 语言（参见 [`processing.org`](http://processing.org)）有很多共通之处。其概念和\
    \ API 取自 Processing，Codea 受益于 Processing 成熟稳定的 API。\n\n借助 Codea 运行时，你可以使用 Mac\
    \ 上的 Xcode 在桌面端编译代码。使用 Codea 编写的代码可通过运行时编译，并可将应用上传至 iOS App Store。首个使用 Codea 运行时创建的应用是\
    \ Cargo-Bot，这证明了 Codea 运行时已具备作为框架使用的成熟度。\n\n### Hello World\n\n与大多数基于 Lua 的框架一样，Codea\
    \ 使用 `main.lua` 作为代码运行的入口点。`main.lua` 文件中包含两个辅助应用运行的函数。\n\n第一个是 `setup` 函数，该函数仅在应用启动时运行一次，可用于执行所有初始化代码。第二个是\
    \ `draw` 函数，负责在每一帧绘制（或者说更新）屏幕内容。以下是这两个函数的示例：\n\n```\nfunction setup()\n  print(\"\
    Hello World\")\nend\n\nfunction draw()\n  background(100,120,160,255)\n  font(\"\
    Georgia\")\n  fill(255)\n  fontSize(20)\n  textWrapWidth(70)\n  text(\"Hello World\
    \ from Codea\", WIDTH/2, HEIGHT/2)\nend\n```\n\n运行这些函数时，屏幕中央会显示文字“Hello World\
    \ from Codea”，如图 12-2 所示。Codea 运行窗口左侧有两个属性面板，分别显示参数和控制台输出窗口，其余区域则显示代码的图形输出。\n\n\
    ![9781430246626_Fig12-02.jpg](img/9781430246626_Fig12-02.jpg)\n\n图 12-2 . 使用 Codea\
    \ 实现的 Hello World\n\n**注**：可以通过 `displayMode(FULLSCREEN)` 函数移除左侧两个窗口，以获取更多屏幕空间。\n\
    \n参数可用于对代码进行交互式输入，通常以滑块形式呈现，帮助设置数值范围。\n\n### 参数\n\n在交互式运行模式下，你可能希望实时修改部分代码以观察输出变化。例如，假设你想调整线条宽度或圆的半径，无需在代码中设置并重新运行，而可以使用参数滑块实时调整。\n\
    \n参数通过 `parameter` 函数创建。`parameter` 函数接受三个参数：参数*名称*、*起始*范围和*结束*范围。参数名称同时也是可在代码中访问的全局变量名。示例如下：\n\
    \n```\nparameter(\"Radius\", 1, 10)\n```\n\n这将在“参数”窗口中创建一个滑块，用于选择半径。创建参数滑块的最佳位置是\
    \ `setup` 函数。`parameter` 函数允许滑块值为浮点数，而 `iparameter` 则用于选择范围内的整数值。\n\n```\nfunction\
    \ setup()\n  parameter(\"Radius\", 100, 500)\n  iparameter(\"BlueAmount\", 0,\
    \ 255)\nend\n\nfunction draw()\n  background(10,10,20)\n  stroke(255)\n  fill(255,0,BlueAmount)\n\
    \nstrokeWidth(1)\n  ellipseMode(RADIUS)\n  ellipse(0,0,Radius, Radius)\nend\n\
    ```\n\n运行代码后，我们可以调整绘制椭圆的半径，并修改蓝色分量值，从而使颜色从红色渐变为品红色。\n\n**注**：可以为 `parameter` 或\
    \ `iparameter` 函数添加第四个参数，用于设置全局变量的初始值。\n\n### 使用 Codea 绘图\n\n由于 Codea 是基于图形用户界面的框架，我们重点介绍用于创建图形的\
    \ `draw` 函数。"
- fmt: "# Codea 绘制基础\n\n在 `Codea` 绘制表面上，屏幕每秒刷新（或者说绘制）超过 60 次。然而，不能保证 `draw` 函数每秒会被调用\
    \ 60 次，因为这取决于 `draw` 内部的代码完成并返回所需的时间。\n\n`Codea` 中的屏幕与其他框架略有不同。在大多数框架中，左上角是原点\
    \ `(0, 0)`，`x` 轴值向右增加，`y` 轴值向下增加。在 `Codea` 中，左下角是原点，`x` 轴值向右递增，`y` 轴值向上递增。\n\n\
    其次，由于侧面板的存在，屏幕会被遮挡，在横屏模式下报告的大小为 750×768，在竖屏模式下为 494×1024。你可以通过调用 `displayMode(FULLSCREEN)`\
    \ 函数来移除这个面板。然而，即使在全屏模式下，[Figure 12-2](#9781430246626_Ch12.xhtml#Fig2) 底部显示的按钮仍然存在。要同时移除这些按钮，你可以使用\
    \ `displayMode(FULLSCREEN_NOBUTTONS)` 函数。\n\n如果你使用 `displayMode` 函数并传入 `FULLSCREEN_NO_BUTTONS`\
    \ 参数，则需要手动调用 `close` 函数才能返回到编辑器。\n\n## 方向\n\n可以使用 `supportedOrientation` 函数来设置\
    \ `Codea` 应用程序的方向。`supportedOrientation` 的默认值是 `ANY`，它支持所有方向。但是，你可以将其预设为你需要的方向。\n\
    \n选项如下：\n\n*   `ANY`\n*   `LANDSCAPE_ANY`\n*   `LANDSCAPE_LEFT`\n*   `LANDSCAPE_RIGHT`\n\
    *   `PORTRAIT`\n*   `PORTRAIT_ANY`\n*   `PORTRAIT_UPSIDE_DOWN`\n\n## 系统键盘\n\n\
    可以根据需要使用 `showKeyboard` 和 `hideKeyboard` 函数来显示或隐藏键盘。还有另一个与键盘相关的函数 `keyboardBuffer`，它返回键盘缓冲区中的文本。每次显示键盘时，键盘缓冲区都会被清除。以下是使用\
    \ `showKeyboard` 和 `keyboardBuffer` 函数的示例：\n\n```lua\nfunction touched(touch)\n\
    \  showKeyboard()\nend\n\nfunction draw()\n  background(40,40,50)\n  fill(255)\n\
    \  textMode(CORNER)\n\nbuffer = keyboardBuffer()\n  _, bufferHeight = textSize(buffer)\n\
    \  if buffer then\n  text (buffer, 10, HEIGHT – 30 – bufferHeight)\n  end \nend\n\
    ```\n\n## 绘制模式\n\n当你绘制某些内容时，它不会自动持久化，即每次都会被擦除并需要重新绘制。但是，你可以设置模式，使先前绘制的帧保留在屏幕上而不会被擦除。你可以通过将\
    \ `backingMode` 设置为 `RETAINED` 来实现这一点。默认模式是 `STANDARD`。\n\n**注意**：当 `RETAINED`\
    \ 模式与新 iPad 一起使用时，iOS5 中的一个 bug 会导致其无法按预期工作。不过 Apple 在 iOS6 中修复了这个问题，现在可以正常工作。\n\
    \n## 背景颜色\n\n可以使用 `background` 函数来更改背景颜色。该函数接受 RGBA 格式的颜色值。使用 `Codea` 编辑器时，你也可以通过简单地点击数字来手动选择和设置颜色，这会弹出一个颜色选择器供手动选择。\n\
    \n`background(red, green, blue, alpha)`\n\n## 笔颜色\n\n可以使用 `stroke` 函数来设置用于所有绘图的笔颜色（或*前景*颜色）。`stroke`\
    \ 函数接受的参数也是 RGBA 格式的。\n\n```lua\nstroke(0,0,0,255)  -- 会将笔颜色设置为黑色\n```\n\n## 填充颜色\n\
    \n可以使用 `fill` 函数来设置填充颜色。其参数的设置方式与前面两个颜色函数类似。\n\n```lua\nfill(255,164,0)  -- 将填充颜色设置为橙色\n\
    ```\n\n## 线宽\n\n可以使用 `strokeWidth` 函数来更改绘图的线宽。\n\n```lua\nstrokeWidth(3)  -- 将描边宽度设置为\
    \ 3\n```\n\n**注意**：虽然你可以通过 `fill(255,164,0)` 设置填充颜色，或通过 `stroke(0,0,0)` 设置笔颜色，或通过\
    \ `strokeWidth(3)` 设置描边宽度，但你也可以不传递任何参数来获取这些值，例如 `fill()` 会返回当前填充颜色，`stroke()`\
    \ 会返回描边颜色，`strokeWidth()` 会返回宽度。\n\n## 绘制线条\n\n绘制线条的函数是 `line`。它接受四个参数：线条起点的 `x`\
    \ 和 `y` 坐标以及终点的 `x` 和 `y` 坐标。线条在这两点之间绘制。\n\n```lua\nline(10,10,300,300)  -- 在\
    \ (10,10) 和 (300,300) 之间绘制一条线\n```\n\n*线帽*模式用于确定线条端点的绘制方式。绘制线条时有三种*线帽*模式：`ROUND`、`SQUARE`\
    \ 和 `PROJECT`。默认模式是 `ROUND`。\n\n*   `ROUND`：绘制末端为圆形的线条\n*   `SQUARE`：绘制末端为方形的线条\n\
    *   `PROJECT`：绘制方形边缘但向外突出的线条，类似于 `ROUND` 模式。\n\n## 抗锯齿\n\n绘制线条时，最终可能会出现锯齿边缘，这会造成不愉快的视觉体验。为了解决这个问题，`Codea`\
    \ 有一个平滑边缘的函数——即所谓的*抗锯齿*。要执行抗锯齿，你可以调用 `smooth` 函数，之后绘制的所有线条都将被抗锯齿处理。\n\n**注意**：在绘制细线时，你可能希望使用\
    \ `noSmooth` 函数切换到无抗锯齿模式。抗锯齿处理后的细线可能看起来比没有抗锯齿的细线更差。\n\n## 绘制圆和椭圆\n\n绘制圆或椭圆的函数是\
    \ `ellipse`。它接受四个参数，这些参数取决于绘制椭圆所使用的*椭圆模式*（如下所述）。在其中一种模式 `CENTER` 下，四个参数分别是绘制圆的中心点的\
    \ `x`、`y` 坐标，然后是直径——一个用于 `x` 轴，一个用于 `y` 轴。如果这两个值相同，则绘制一个圆。如果不同，则绘制一个椭圆。\n\n以下是绘制圆的语法：\n\
    \n```lua\nellipse(50,50,20,20)\n```\n\n以下是绘制椭圆的语法：\n\n```lua\nellipse(100,100,20,50)\n\
    ```\n\n如前所述，有四种椭圆模式允许你以多种方式绘制椭圆：\n\n*   `CENTER`：在这种模式下，参数是中心点的 `x`、`y` 坐标，然后是\
    \ `x` 和 `y` 方向的直径。这是前面示例中使用的模式。\n*   `RADIUS`：此模式使用中心点的 `x`、`y` 坐标，然后是 `x` 和 `y`\
    \ 方向的*半径*（而不是直径）。\n*   `CORNER`：此模式接受椭圆左下角的 `x`、`y` 坐标，然后是宽度和高度。椭圆在参数指定的边界矩形内绘制。\n\
    *   `CORNERS`：此模式接受椭圆左下角的 `x`、`y` 坐标，然后是椭圆右上角的 `x`、`y` 坐标。椭圆在参数指定的边界矩形内绘制。\n\n\
    以下代码片段提供了上述模式的示例：\n\n```lua\nellipseMode(CENTER)\nellipse(100,100,50,50)\n\nellipseMode(RADIUS)\n\
    ellipse(100,200,50,50)\n\nellipseMode(CORNER)\nellipse(200,100,50,50)\n\nellipseMode(CORNERS)\n\
    ellipse(200,200,50,50)\n```\n\n## 绘制矩形\n\n绘制矩形的函数是 `rect`。它接受四个参数，与椭圆一样，这些参数取决于绘制矩形时所处的模式。在\
    \ `CENTER` 模式下，参数是起始点的 `x`、`y` 坐标，然后是矩形的宽度和高度。\n\n```lua\nrect(10,10,300,100)\
    \  -- 绘制一个 300×100 的矩形，并将其放置在 (10,10) 位置\n```\n\n以下是绘制矩形的四种模式："
  raw: "On the Codea drawing surface, the screen is refreshed, or rather drawn, over\
    \ 60 times a second. However, there is no certainty that the draw function will\
    \ be called 60 times per second, as this is dependent on the time the code inside\
    \ of draw takes to complete and return.\n\nThe screen in Codea is a bit different\
    \ from other frameworks. In most frameworks, the top-left corner is the origin\
    \ (0, 0), and the x-axis value increases moving right and the y-axis value increasing\
    \ moving downward. In Codea, the lower-left corner is the origin, and the x-axis\
    \ value increments as it moves to the right and the y-axis increases as it moves\
    \ upward.\n\nSecondly, because of the side panels, the screen is obscured, and\
    \ the size reported is 750×768 in landscape mode and 494×1024 in portrait mode.\
    \ You can remove this panel by calling the displayMode(FULLSCREEN) function. However,\
    \ even in full-screen mode, the buttons as seen at the bottom of the screen in\
    \ [Figure 12-2](#9781430246626_Ch12.xhtml#Fig2) above, still remain. To remove\
    \ the buttons as well, you can use the displayMode(FULLSCREEN_NOBUTTONS) function.\n\
    \nIf you use the displayMode function with the FULLSCREEN_NO_BUTTONS, argument,\
    \ you need to manually call the close function to return back to the editor.\n\
    \nOrientation\n\nThe orientation for your Codea app can be set using the supportedOrientation\
    \ function. The default value for supportedOrientation is ANY, which supports\
    \ all orientations. However, you can preset it to the ones that you need.\n\n\
    The options are\n\n*   ANY\n*   LANDSCAPE_ANY\n*   LANDSCAPE_LEFT\n*   LANDSCAPE_RIGHT\n\
    *   PORTRAIT\n*   PORTRAIT_ANY\n*   PORTRAIT_UPSIDE_DOWN\n\nSystem Keyboard\n\n\
    The keyboard can be displayed or hidden as needed using the showKeyboard and hideKeyboard\
    \ functions. There is another keyboard-related function, keyboardBuffer, which\
    \ returns the text in the keyboard buffer. Every time the keyboard is shown, the\
    \ keyboard buffer is cleared. Here is an example of using the showKeyboard and\
    \ keyboardBuffer functions:\n\n```\nfunction touched(touch)\n  showKeyboard()\n\
    end\n\nfunction draw()\n  background(40,40,50)\n  fill(255)\n  textMode(CORNER)\n\
    \nbuffer = keyboardBuffer()\n  _, bufferHeight = textSize(buffer)\n  if buffer\
    \ then\n  text (buffer, 10, HEIGHT – 30 – bufferHeight)\n  end \nend\n```\n\n\
    Drawing Mode\n\nWhen you draw something, it is not automatically persisted, i.e.\
    \ erased and needs to be redrawn everytime. However, you can set the mode so that\
    \ the previously drawn frame persists on the screen and is not erased. You can\
    \ do so by setting the backingMode to RETAINED. The default mode is STANDARD.\n\
    \n**Note**   When the RETAINED mode is used with the new iPad, a bug in iOS5 does\
    \ not work as expected. It is however fixed by Apple in iOS6 and works as expected.\n\
    \nBackground Color\n\nThe background color can be changed using the background\
    \ function. This function takes the color in RGBA format. With the Codea editor,\
    \ you can also manually select and set the color by simply tapping on the numbers,\
    \ which brings up a color picker for manual selection of the color.\n\nbackground(red,\
    \ green, blue, alpha)\n\nPen Color\n\nThe pen color, or *foreground* color, that\
    \ is used for all the drawing can be set using the stroke function. The parameters\
    \ that the stroke function takes are also in RGBA format.\n\n```\nstroke(0,0,0,255)  --\
    \ Would set the pen color to black\n```\n\nFill Color\n\nThe fill color can be\
    \ set using the fill function. It is set in terms of arguments, similar to the\
    \ preceding two color functions.\n\n```\nfill(255,164,0)  -- sets the fill color\
    \ to orange\n```\n\nLine Width\n\nThe line width for the drawing can be altered\
    \ using the strokeWidth function.\n\n```\nstrokeWidth(3)  -- sets the stroke width\
    \ to 3\n```\n\n**Note**   While you can set the fill color by using fill(255,164,0)\
    \ or set the pen color by using stroke(0,0,0) or the stroke Width by using the\
    \ strokeWidth(3), you can retrieve these values by passing nothing to these functions,\
    \ simply as fill() which would return the current fill color, stroke() would return\
    \ the stroke color and strokeWidth() would return the width.\n\nDrawing Lines\n\
    \nThe function to draw lines is the line function. This takes four arguments:\
    \ the x- and y-coordinates of the start point and endpoint of the line. The line\
    \ is drawn between these two points.\n\n```\nline(10,10,300,300)  -- draws a line\
    \ between 10,10 and 300,300\n```\n\nThe *line cap* mode is used to determine how\
    \ the ends of the lines are drawn. There are three *line cap* modes that are used\
    \ when drawing lines: ROUND, SQUARE, and PROJECT. The default mode is ROUND.\n\
    \n*   ROUND: Draws the lines with the ends rounded off\n*   SQUARE: Draws the\
    \ lines with the ends squared off\n*   PROJECT: Draws the lines with square edges,\
    \ but projected out, as in ROUND mode.\n\nAnti-Aliasing\n\nWhen drawing lines,\
    \ you can end up with jagged edges, which make for an unpleasant visual experience.\
    \ To deal with this, Codea has a function that smoothes the edges out—what is\
    \ known as *anti-aliasing*. To perform anti-aliasing, you call the smooth function,\
    \ all subsequently drawn lines will be anti-aliased.\n\n**Note**   While drawing\
    \ thin lines, you might want to switch to no anti-aliasing using the noSmooth\
    \ function. Thin lines when anti-aliased would look worse than without anti-aliasing.\n\
    \nDrawing Circles and Ellipses\n\nThe function to draw a circle or ellipses is\
    \ the ellipse function. This takes four parameters, which depend on the *ellipse\
    \ mode* being used to draw the ellipse (discussed following). In one such mode,\
    \ CENTER, the four parameters are the x,y-coordinates of the center point around\
    \ which the circle is drawn, followed by the diameters—one for the x-axis and\
    \ one for the y-axis. If these are the same, a circle is drawn. If these are different,\
    \ an ellipse is drawn.\n\nHere’s the syntax for drawing a circle:\n\n```\nellipse(50,50,20,20)\n\
    ```\n\nAnd here’s the syntax for drawing a ellipse:\n\n```\nellipse(100,100,20,50)\n\
    ```\n\nAs mentioned, there are four ellipse modes that allow you to draw ellipses\
    \ in various different ways:\n\n*   CENTER: In this mode, the parameters are the\
    \ center x,y-coordinates, followed by the x and y diameters. This is the mode\
    \ used in the previous example.\n*   RADIUS: This mode uses the center x,y-coordinates,\
    \ followed by the x and y *radii*, instead of the diameters.\n*   CORNER: This\
    \ mode takes the x,y-coordinates of the lower-left corner of the ellipse, followed\
    \ by the width and height. The ellipse is drawn in the bounding rectangle as specified\
    \ by the arguments.\n*   CORNERS: This mode takes the x,y-coordinates of the lower-left\
    \ corner of the ellipse, followed by the upper-right corner of the ellipse. The\
    \ ellipse is drawn in the bounding rectangle as specified by the arguments.\n\n\
    The following snippets provide examples of the preceding modes:\n\n```\nellipseMode(CENTER)\n\
    ellipse(100,100,50,50)\n\nellipseMode(RADIUS)\nellipse(100,200,50,50)\n\nellipseMode(CORNER)\n\
    ellipse(200,100,50,50)\n\nellipseMode(CORNERS)\nellipse(200,200,50,50)\n```\n\n\
    Drawing Rectangles\n\nThe function for drawing rectangles is the rect function.\
    \ It takes four arguments, which, as with ellipses, depend on the mode in which\
    \ the rectangle is being drawn. In CENTER mode, the arguments are the starting\
    \ x,y-coordinates, followed by the width and height of the rectangle.\n\n```\n\
    rect(10,10,300,100)  -- draws a rectangle that is 300×100 and positions it at\
    \ 10,10\n```\n\nFollowing are the four modes for drawing rectangles:"
  trans: "\n# Codea 绘制基础\n\n在 `Codea` 绘制表面上，屏幕每秒刷新（或者说绘制）超过 60 次。然而，不能保证 `draw` 函数每秒会被调用\
    \ 60 次，因为这取决于 `draw` 内部的代码完成并返回所需的时间。\n\n`Codea` 中的屏幕与其他框架略有不同。在大多数框架中，左上角是原点\
    \ `(0, 0)`，`x` 轴值向右增加，`y` 轴值向下增加。在 `Codea` 中，左下角是原点，`x` 轴值向右递增，`y` 轴值向上递增。\n\n\
    其次，由于侧面板的存在，屏幕会被遮挡，在横屏模式下报告的大小为 750×768，在竖屏模式下为 494×1024。你可以通过调用 `displayMode(FULLSCREEN)`\
    \ 函数来移除这个面板。然而，即使在全屏模式下，Figure 12-2 底部显示的按钮仍然存在。要同时移除这些按钮，你可以使用 `displayMode(FULLSCREEN_NOBUTTONS)`\
    \ 函数。\n\n如果你使用 `displayMode` 函数并传入 `FULLSCREEN_NO_BUTTONS` 参数，则需要手动调用 `close`\
    \ 函数才能返回到编辑器。\n\n## 方向\n\n可以使用 `supportedOrientation` 函数来设置 `Codea` 应用程序的方向。`supportedOrientation`\
    \ 的默认值是 `ANY`，它支持所有方向。但是，你可以将其预设为你需要的方向。\n\n选项如下：\n\n*   `ANY`\n*   `LANDSCAPE_ANY`\n\
    *   `LANDSCAPE_LEFT`\n*   `LANDSCAPE_RIGHT`\n*   `PORTRAIT`\n*   `PORTRAIT_ANY`\n\
    *   `PORTRAIT_UPSIDE_DOWN`\n\n## 系统键盘\n\n可以根据需要使用 `showKeyboard` 和 `hideKeyboard`\
    \ 函数来显示或隐藏键盘。还有另一个与键盘相关的函数 `keyboardBuffer`，它返回键盘缓冲区中的文本。每次显示键盘时，键盘缓冲区都会被清除。以下是使用\
    \ `showKeyboard` 和 `keyboardBuffer` 函数的示例：\n\n```lua\nfunction touched(touch)\n\
    \  showKeyboard()\nend\n\nfunction draw()\n  background(40,40,50)\n  fill(255)\n\
    \  textMode(CORNER)\n\nbuffer = keyboardBuffer()\n  _, bufferHeight = textSize(buffer)\n\
    \  if buffer then\n  text (buffer, 10, HEIGHT – 30 – bufferHeight)\n  end \nend\n\
    ```\n\n## 绘制模式\n\n当你绘制某些内容时，它不会自动持久化，即每次都会被擦除并需要重新绘制。但是，你可以设置模式，使先前绘制的帧保留在屏幕上而不会被擦除。你可以通过将\
    \ `backingMode` 设置为 `RETAINED` 来实现这一点。默认模式是 `STANDARD`。\n\n**注意**：当 `RETAINED`\
    \ 模式与新 iPad 一起使用时，iOS5 中的一个 bug 会导致其无法按预期工作。不过 Apple 在 iOS6 中修复了这个问题，现在可以正常工作。\n\
    \n## 背景颜色\n\n可以使用 `background` 函数来更改背景颜色。该函数接受 RGBA 格式的颜色值。使用 `Codea` 编辑器时，你也可以通过简单地点击数字来手动选择和设置颜色，这会弹出一个颜色选择器供手动选择。\n\
    \n`background(red, green, blue, alpha)`\n\n## 笔颜色\n\n可以使用 `stroke` 函数来设置用于所有绘图的笔颜色（或*前景*颜色）。`stroke`\
    \ 函数接受的参数也是 RGBA 格式的。\n\n```lua\nstroke(0,0,0,255)  -- 会将笔颜色设置为黑色\n```\n\n## 填充颜色\n\
    \n可以使用 `fill` 函数来设置填充颜色。其参数的设置方式与前面两个颜色函数类似。\n\n```lua\nfill(255,164,0)  -- 将填充颜色设置为橙色\n\
    ```\n\n## 线宽\n\n可以使用 `strokeWidth` 函数来更改绘图的线宽。\n\n```lua\nstrokeWidth(3)  -- 将描边宽度设置为\
    \ 3\n```\n\n**注意**：虽然你可以通过 `fill(255,164,0)` 设置填充颜色，或通过 `stroke(0,0,0)` 设置笔颜色，或通过\
    \ `strokeWidth(3)` 设置描边宽度，但你也可以不传递任何参数来获取这些值，例如 `fill()` 会返回当前填充颜色，`stroke()`\
    \ 会返回描边颜色，`strokeWidth()` 会返回宽度。\n\n## 绘制线条\n\n绘制线条的函数是 `line`。它接受四个参数：线条起点的 `x`\
    \ 和 `y` 坐标以及终点的 `x` 和 `y` 坐标。线条在这两点之间绘制。\n\n```lua\nline(10,10,300,300)  -- 在\
    \ (10,10) 和 (300,300) 之间绘制一条线\n```\n\n*线帽*模式用于确定线条端点的绘制方式。绘制线条时有三种*线帽*模式：`ROUND`、`SQUARE`\
    \ 和 `PROJECT`。默认模式是 `ROUND`。\n\n*   `ROUND`：绘制末端为圆形的线条\n*   `SQUARE`：绘制末端为方形的线条\n\
    *   `PROJECT`：绘制方形边缘但向外突出的线条，类似于 `ROUND` 模式。\n\n## 抗锯齿\n\n绘制线条时，最终可能会出现锯齿边缘，这会造成不愉快的视觉体验。为了解决这个问题，`Codea`\
    \ 有一个平滑边缘的函数——即所谓的*抗锯齿*。要执行抗锯齿，你可以调用 `smooth` 函数，之后绘制的所有线条都将被抗锯齿处理。\n\n**注意**：在绘制细线时，你可能希望使用\
    \ `noSmooth` 函数切换到无抗锯齿模式。抗锯齿处理后的细线可能看起来比没有抗锯齿的细线更差。\n\n## 绘制圆和椭圆\n\n绘制圆或椭圆的函数是\
    \ `ellipse`。它接受四个参数，这些参数取决于绘制椭圆所使用的*椭圆模式*（如下所述）。在其中一种模式 `CENTER` 下，四个参数分别是绘制圆的中心点的\
    \ `x`、`y` 坐标，然后是直径——一个用于 `x` 轴，一个用于 `y` 轴。如果这两个值相同，则绘制一个圆。如果不同，则绘制一个椭圆。\n\n以下是绘制圆的语法：\n\
    \n```lua\nellipse(50,50,20,20)\n```\n\n以下是绘制椭圆的语法：\n\n```lua\nellipse(100,100,20,50)\n\
    ```\n\n如前所述，有四种椭圆模式允许你以多种方式绘制椭圆：\n\n*   `CENTER`：在这种模式下，参数是中心点的 `x`、`y` 坐标，然后是\
    \ `x` 和 `y` 方向的直径。这是前面示例中使用的模式。\n*   `RADIUS`：此模式使用中心点的 `x`、`y` 坐标，然后是 `x` 和 `y`\
    \ 方向的*半径*（而不是直径）。\n*   `CORNER`：此模式接受椭圆左下角的 `x`、`y` 坐标，然后是宽度和高度。椭圆在参数指定的边界矩形内绘制。\n\
    *   `CORNERS`：此模式接受椭圆左下角的 `x`、`y` 坐标，然后是椭圆右上角的 `x`、`y` 坐标。椭圆在参数指定的边界矩形内绘制。\n\n\
    以下代码片段提供了上述模式的示例：\n\n```lua\nellipseMode(CENTER)\nellipse(100,100,50,50)\n\nellipseMode(RADIUS)\n\
    ellipse(100,200,50,50)\n\nellipseMode(CORNER)\nellipse(200,100,50,50)\n\nellipseMode(CORNERS)\n\
    ellipse(200,200,50,50)\n```\n\n## 绘制矩形\n\n绘制矩形的函数是 `rect`。它接受四个参数，与椭圆一样，这些参数取决于绘制矩形时所处的模式。在\
    \ `CENTER` 模式下，参数是起始点的 `x`、`y` 坐标，然后是矩形的宽度和高度。\n\n```lua\nrect(10,10,300,100)\
    \  -- 绘制一个 300×100 的矩形，并将其放置在 (10,10) 位置\n```\n\n以下是绘制矩形的四种模式：\n"
- fmt: "# Drawing Modes for Rectangles\n\nThe `rect()` function supports the following\
    \ drawing modes:\n\n- `CENTER`: This mode takes as parameters the center x,y-coordinates,\
    \ followed by the width and the height.\n- `RADIUS`: The mode takes the center\
    \ x,y-coordinates, followed by half the width and height.\n- `CORNER`: This mode\
    \ takes the x,y-coordinates of the lower-left corner of the rectangle, followed\
    \ by the width and height. The rectangle is drawn in the bounding rectangle as\
    \ specified by the arguments.\n- `CORNERS`: This mode takes the x,y-coordinates\
    \ of the lower-left corner of the rectangle, followed by the absolute coordinates\
    \ of the upper-right corner, rather than the width and height. The rectangle is\
    \ drawn in the bounding rectangle as specified by the arguments.\n\nThe following\
    \ snippets provide examples of the preceding modes:\n\n```\nrectMode(CENTER)\n\
    rect(100,100,50,50)\n\nrectMode(RADIUS)\nrect(100,200,50,50)\n\nrectMode(CORNER)\n\
    rect(100,100,50,50)\n\nrectMode(CORNERS)\nrect(100,200,50,50)\n```\n\n# Drawing\
    \ Text\n\nThe function to draw text onto the screen is `text`. It takes three\
    \ arguments: the text itself, and the position in x- and y-coordinates where the\
    \ text needs to be displayed.\n\n```\ntext(\"This is sample text\", 10,200)\n\
    ```\n\nThere are other functions that help to set the attributes of the text being\
    \ displayed, like the font name and size. The following function creates the text\
    \ and also returns the width and the height of the text that was created:\n\n\
    ```\nw, h = textSize(\"Hello World\")\nprint(w, h)\n```\n\n## Drawing Modes\n\n\
    The `text` function also has two drawing modes that specify how the arguments\
    \ passed are parsed and the text is displayed:\n\n- `CENTER`: In this mode, the\
    \ text is centered around the x,y-coordinates passed to the `text` function for\
    \ drawing. This is the default text-drawing mode.\n- `CORNERS`: In this mode,\
    \ the x,y-coordinates passed to the `text` function specify the lower-left corner\
    \ of the text.\n\n## Text Alignment\n\nThe text when drawn can be aligned as either\
    \ of the alignments, `LEFT`, `RIGHT`, or `CENTER`. The default text alignment\
    \ setting is `LEFT`.\n\n## Text Wrapping\n\nWhile drawing the text, you can also\
    \ set the width of the text to be displayed, and any text that exceeds that width\
    \ gets wrapped to the next line. If the text wrap setting is set to `0`, text\
    \ is not wrapped.\n\n```\ntextWrapWidth(80)\ntext(\"This text would get wrapped\
    \ onto multiple lines\",100,100)\n```\n\n## Changing the Font\n\nThe `font` function\
    \ can be used for rendering text. The fonts that can be set on the iOS device\
    \ are limited to a list of fonts available on the device, and the default font\
    \ used is `Helvetica`.\n\n## Changing the Font Size\n\nThe `fontSize` function\
    \ can be used to change the size of the font being rendered. The default size\
    \ for text rendering is 17 points.\n\n# Displaying Images\n\nSprites in Codea\
    \ are images that can be loaded and displayed on the screen using the `sprite`\
    \ function. However, the way the architecture of Codea is defined, there are *sprite\
    \ packs* from which you can use images. To load an image, you don’t use the path\
    \ to the image, as in other framework, but instead refer to the image as `SpritePack:SpriteName`.\
    \ This function requires at least three arguments: the `spriteName`, or the *image\
    \ handle*, and the x,y-coordinates where the sprites will be positioned. The function\
    \ can also take the width and height as arguments.\n\n```\nsprite(\"Planet Cute:Grass\
    \ Block\", WIDTH/2, HEIGHT/2)\n```\n\n**Note** In the current version of Codea,\
    \ you can also use images from the photo library or the clipboard on the device,\
    \ as well as images from Dropbox and from the library of free sprites available\
    \ in Codea (from Dan Cook, of [http://lostgarden.com](http://lostgarden.com)).\n\
    \nImages loaded from the device or an online source can be used as sprites in\
    \ Codea. To determine the size of the sprites, you can use the function `spriteSize`,\
    \ which returns the width and height of the sprite name passed to the function.\n\
    \n```\nsprWidth, sprHeight = spriteSize(\"Planet Cute:Grass Block\")\nprint(sprWidth,\
    \ sprHeight)\n```\n\nYou can also set the *sprite mode*, which determines how\
    \ the sprite is displayed on the screen. The x,y-coordinates are used to position\
    \ the sprite, just like the options for drawing. The default value for `SpriteMode`\
    \ is `CENTER`. The other modes that can be set are `RADIUS`, `CORNER`, and `CORNERS`,\
    \ which function similarly to the modes used for drawing ellipses and rectangles.\n\
    \nWith Codea, *images* are different from sprites. Images are *canvases* that\
    \ are created via code, and their bits are set using the `set` method with an\
    \ x,y-coordinate and a color. The color of a particular pixel can be obtained\
    \ by using the `get` method. Portions of the image can be copied to create new\
    \ images using the `image.copy` function.\n\n## Drawing Off-screen\n\nMost of\
    \ the drawing functions as we have seen in the above paragraphs draw directly\
    \ on screen. The drawing functions can be instructed to draw onto a context (a\
    \ drawing area) as we specify using the `setContext` function. When we want the\
    \ drawing to be resumed back onto the screen context, we can simply call the `setContext`\
    \ function again without passing it any parameters.\n\n```\nmyImage = image(400,400)\n\
    \nsetContext(myImage)\nellipse(200,200,200)\nrect(0,0,100,100)\nsetContext()\n\
    \nsprite(myImage, WIDTH/2, HEIGHT/2)\n```\n\n## Loading Sprites into an Image\n\
    \nWhile images can be manipulated by getting or setting the pixel colors and created\
    \ using the `image.copy` function, sprites cannot be manipulated in these ways.\
    \ To be able to manipulate sprite images, you can copy or load the sprite onto\
    \ an image using the `readImage` function, which creates an image object from\
    \ the sprite, like so:\n\n```\nmyImage = readImage(\"Planet Cute:Heart\")\n```\n\
    \n## Saving Images\n\nThe `saveImage` function can help create and save images\
    \ to the device or Dropbox. The way to save an image is by passing it the sprite\
    \ pack—which is either `Documents` or `Dropbox`—followed by the file name. Note\
    \ that if the file name already exists, the original file will be overwritten,\
    \ and if the image is set to `nil`, then the file specified will be deleted.\n\
    \n```\nsaveImage(\"Documents:theSprite\", image)\n```\n\n**Note** If the device\
    \ is a retina device, it will save two files when using this function: a retina-sized\
    \ image with a `@2x` suffix and a non-retina image scaled to 50 percent.\n\n##\
    \ Saving Data\n\nWhen working with an application, you might want to save the\
    \ data so that it persists. The data can be saved either locally, making it available\
    \ to only the current Codea project, or globally, making it available to all Codea\
    \ projects on the device. Here’s an example of saving data locally:\n\n```\nlocal\
    \ theName = (readLocalData(\"username\"))\nif theName == nil then\n  theName =\
    \ \"Default\"\n  saveLocalData(\"username\", theName)\nend\nprint(theName)\n```\n\
    \nIf you run this code, “Default” will be printed to the output console.\n\nIf\
    \ you want to start afresh and remove all of the values stored, you can use the\
    \ `clearLocalData` function.\n\n# Drawing Without Color\n\nThere are times when\
    \ you might want to draw something with a clear color—for example, if you want\
    \ a nonfilled (transparent) shape or a shape with no outline. This can be done\
    \ with the sample functions that have the prefix `no`. These are described in\
    \ the following subsections.\n\n## `noFill`\n\nThe `noFill` function sets the\
    \ fill color to transparent, drawing a shape that has no fill (but could have\
    \ an outline). Figure 12-3 demonstrates drawing a rectangle with and without a\
    \ fill.\n\n![9781430246626_Fig12-03.jpg](OEBPS/Images/9781430246626_Fig12-03.jpg)\n\
    \nFigure 12-3. A rectangle with a fill (left) and one without (right)\n\n## `noStroke`\n\
    \nThe `noStroke` function sets the color used for drawing to transparent. This\
    \ function removes the outline from a shape. (See Figure 12-4.)\n\n![9781430246626_Fig12-04.jpg](OEBPS/Images/9781430246626_Fig12-04.jpg)\n\
    \nFigure 12-4. A rectangle with a stroke (left) and one without (right)\n\n##\
    \ `noTint`"
  raw: '*   CENTER: This mode takes as parameters the center x,y-coordinates, followed
    by the width and the height.

    *   RADIUS: The mode takes the center x,y-coordinates, followed by half the width
    and height.

    *   CORNER: This mode takes the x,y-coordinates of the lower-left corner of the
    rectangle, followed by the width and height. The rectangle is drawn in the bounding
    rectangle as specified by the arguments.

    *   CORNERS: This mode takes the x,y-coordinates of the lower-left corner of the
    rectangle, followed by the absolute coordinates of the upper-right corner, rather
    than the width and height. The rectangle is drawn in the bounding rectangle as
    specified by the arguments.


    The following snippets provide examples of the preceding modes:


    ```

    rectMode(CENTER)

    rect(100,100,50,50)


    rectMode(RADIUS)

    rect(100,200,50,50)


    rectMode(CORNER)

    rect(100,100,50,50)


    rectMode(CORNERS)

    rect(100,200,50,50)

    ```


    Drawing Text


    The function to draw text onto the screen is text. It takes three arguments: the
    text itself, and the position in x- and y-coordinates where the text needs to
    be displayed.


    ```

    text("This is sample text", 10,200)

    ```


    There are other functions that help to set the attributes of the text being displayed,
    like the font name and size. The following function creates the text and also
    returns the width and the height of the text that was created:


    ```

    w, h = textSize("Hello World")

    print(w, h)

    ```


    Drawing Modes


    The text function also has two drawing modes that specify how the arguments passed
    are parsed and the text is displayed:


    *   CENTER: In this mode, the text is centered around the x,y-coordinates passed
    to the text function for drawing. This is the default text-drawing mode.

    *   CORNERS: In this mode, the x,y-coordinates passed to the text function specify
    the lower-left corner of the text.


    Text Alignment


    The text when drawn can be aligned as either of the alignments, LEFT, RIGHT, or
    CENTER. The default text alignment setting is LEFT.


    Text Wrapping


    While drawing the text, you can also set the width of the text to be displayed,
    and any text that exceeds that width gets wrapped to the next line. If the text
    wrap setting is set to 0, text is not wrapped.


    ```

    textWrapWidth(80)

    text("This text would get wrapped onto multiple lines",100,100)

    ```


    Changing the Font


    The font function can be used for rendering text. The fonts that can be set on
    the iOS device are limited to a list of fonts available on the device, and the
    default font used is *Helvetica*.


    Changing the Font Size


    The fontSize function can be used to change the size of the font being rendered.
    The default size for text rendering is 17 points.


    Displaying Images


    Sprites in Codea are images that can be loaded and displayed on the screen using
    the sprite function. However, the way the architecture of Codea is defined, there
    are *sprite packs* from which you can use images. To load an image, you don’t
    use the path to the image, as in other framework, but instead refer to the image
    as *SpritePack* :*SpriteName*. This function requires at least three arguments:
    the spriteName, or the *image handle*, and the x,y-coordinates where the sprites
    will be positioned. The function can also take the width and height as arguments.


    ```

    sprite("Planet Cute:Grass Block", WIDTH/2, HEIGHT/2)

    ```


    **Note**   In the current version of Codea, you can also use images from the photo
    library or the clipboard on the device, as well as images from Dropbox and from
    the library of free sprites available in Codea (from Dan Cook, of [http://lostgarden.com](http://lostgarden.com)).


    Images loaded from the device or an online source can be used as sprites in Codea.
    To determine the size of the sprites, you can use the function spriteSize, which
    returns the width and height of the sprite name passed to the function.


    ```

    sprWidth, sprHeight = spriteSize("Planet Cute:Grass Block)

    print(sprWidth, sprHeight)

    ```


    You can also set the *sprite mode*, which determines how the sprite is displayed
    on the screen. The x,y-coordinates are used to position the sprite, just like
    the options for drawing. The default value for SpriteMode is CENTER. The other
    modes that can be set are RADIUS, CORNER, and CORNERS, which function similarly
    to the modes used for drawing ellipses and rectangles.


    With Codea, *images* are different from sprites. Images are *canvases* that are
    created via code, and their bits are set using the set method with an x,y-coordinate
    and a color. The color of a particular pixel can be obtained by using the get
    method. Portions of the image can be copied to create new images using the image.copy
    function.


    Drawing Off-screen


    Most of the drawing functions as we have seen in the above paragraphs draw directly
    on screen. The drawing functions can be instructed to draw onto a context (a drawing
    area) as we specify using the setContext function. When we want the drawing to
    be resumed back onto the screen context, we can simply call the setContext function
    again without passing it any parameters.


    ```

    myImage = image (400,400)


    setContext(myImage)

    ellipse(200,200,200)

    rect(0,0,100,100)

    setContext()


    sprite(myImage, WIDTH/2, HEIGHT/2)

    ```


    Loading Sprites into an Image


    While images can be manipulated by getting or setting the pixel colors and created
    using the image.copy function, sprites cannot be manipulated in these ways. To
    be able to manipulate sprite images, you can copy or load the sprite onto an image
    using the readImage function, which creates an image object from the sprite, like
    so:


    ```

    myImage = readImage("Planet Cute:Heart")

    ```


    Saving Images


    This saveImage function can help create and save images to the device or Dropbox.
    The way to save an image is by passing it the sprite pack—which is either Documents
    or Dropbox—followed by the file name. Note that if the file name already exists,
    the original file will be overwritten, and if the image is set to nil, then the
    file specified will be deleted.


    ```

    saveImage("Documents:theSprite", image)

    ```


    **Note**   If the device is a retina device, it will save two files when using
    this function: a retina-sized image with a @2x suffix and a non-retina image scaled
    to 50 percent.


    Saving Data


    When working with an application, you might want to save the data so that it persists.
    The data can be saved either locally, making it available to only the current
    Codea project, or globally, making it available to all Codea projects on the device.
    Here’s an example of saving data locally:


    ```

    local theName = (readLocalData("username"))

    if theName == nil then

      theName = "Default"

      saveLocalData("username", theName)

    end

    print(theName)

    ```


    If you run this code, “Default” will be printed to the output console.


    If you want to start afresh and remove all of the values stored, you can use the
    clearLocalData function.


    Drawing Without Color


    There are times when you might want to draw something with a clear color—for example,
    if you want a nonfilled (transparent) shape or a shape with no outline. This can
    be done with the sample functions that have the prefix no. These are described
    in the following subsections.


    noFill


    The noFill function sets the fill color to transparent, drawing a shape that has
    no fill (but could have an outline). [Figure 12-3](#9781430246626_Ch12.xhtml#Fig3)
    demonstrates drawing a rectangle with and without a fill.


    ![9781430246626_Fig12-03.jpg](OEBPS/Images/9781430246626_Fig12-03.jpg)


    [Figure 12-3](#9781430246626_Ch12.xhtml#_Fig3) .  A rectangle with a fill (left)
    and one without (right)


    noStroke


    The noStroke function sets the color used for drawing to transparent. This function
    removes the outline from a shape. (See [Figure 12-4](#9781430246626_Ch12.xhtml#Fig4).)


    ![9781430246626_Fig12-04.jpg](OEBPS/Images/9781430246626_Fig12-04.jpg)


    [Figure 12-4](#9781430246626_Ch12.xhtml#_Fig4) .  A rectangle with a stroke (left)
    and one without (right)


