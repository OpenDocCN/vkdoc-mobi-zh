    # Lua 入门


    作为一名对开发感兴趣的人，你已经迈出了这段旅程的第一步。你可能是从未开发过的学生，也可能是能在几分钟内构建企业级应用的资深开发者。关键是，无论你的背景如何，你出于某种原因被这门听起来很奇怪的语言——`Lua`（发音为
    *LOO-ah*）所吸引。


