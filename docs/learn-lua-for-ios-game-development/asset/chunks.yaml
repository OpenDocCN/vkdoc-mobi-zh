    Gideros Studio


    In the previous chapter, we looked at using our first Lua-based mobile framework,
    Corona SDK. The things that we noted while working with it was that it has no
    IDE and the trial version does not allow for creating an app that can be uploaded
    to the app store. Knowing that there comes a point at which you might want to
    extend the capabilities of the framework, our other offering, Gideros Studio,
    fills in the gap here.


    License


    Gideros Studio has four licenses to offer:


    *   *Community*: This free license provides all of the functionality of the other
    versions, but displays a “Made with Gideros” splash screen.

    *   *Indie*: At $149 per year, this license offers all of the functionality of
    the Community license, but allows for having your own splash screens.

    *   *Student*: This license is similar to the Indie license, but is discounted
    for students and academic staff ($79 per year).

    *   *Professional*: The Professional license ($449 per year) is advised for those
    that have an annual turnover of over $100,000.


    Installing Gideros Studio


    Before downloading Gideros Studio, you need to create an account. This shall then
    allow for downloading the binaries as appropriate for your operating system. The
    latest version at the moment is Gideros 2012.09.1.


    However, there are some requirements for building to your mobile device. For iOS,
    the prerequisites are the following:


    *   A 64-bit Mac OS X operating system (Snow Leopard or later)

    *   Xcode

    *   An Apple Developer license


    Building apps for the Android platform is a bit more involved and requires that
    you have the following:'
