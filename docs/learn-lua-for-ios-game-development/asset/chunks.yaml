    \n## 陀螺仪\n\n所有新的 iOS 设备都配有陀螺仪，可以从设备读取数据。首先，我们使用`require \"gyroscope\"`命令，这会创建一个名为`gyroscope`的变量，属于`Gyroscope`类。\n\
