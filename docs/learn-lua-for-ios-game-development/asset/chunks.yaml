    \n### 模拟弹簧玩偶盒\n"
- fmt: "### Simulating a Jack-in-the-Box\n\nWhen you open a jack-in-the-box, the spring-loaded\
    \ “Jack” springs out with full force, and then bobs more slowly over time, until\
    \ it stops. We can simulate a jack-in-the-box with the help of a little bit of\
    \ trigonometry.\n\n**Note:** Since we aren't using a GUI-based framework, the\
    \ code here is generic and will produce `x` and `y` values that can be applied\
    \ to display objects in a GUI to simulate the visual effect. For the purpose of\
    \ this function, however, we shall display the values to the console.\n\n```\n\
    frequency  = 5.0\namplitude  = 35\ndecay      = 1.0\ntime       = 0\n\nfunction\
    \ jackInTheBox(time)\n  y = amplitude * math.cos(frequency * time * 2 * math.pi)\
    \ / math.exp(decay * time)\n  return y\nend\n```\n\nTo use this function, we need\
    \ to call the function and pass it a `time` value. If you were to use this in\
    \ a loop, you would increment the `time` variable in increments (e.g., of `0.01`,\
    \ or another value that suits the delay of your calling function).\n\n### Using\
    \ a Sine Scroller\n\nThe preceding function makes use of a cosine wave. Similarly,\
    \ you can vary the parameters and even use sine waves. These were most commonly\
    \ used in the 1980s on sine scrollers and to animate waves of attacking aliens\
    \ (e.g., in games like *R-Type*, *Zynaps*, and *Crosswise*). In a similar fashion,\
    \ the following function shall calculate the `x` and `y` values, which can be\
    \ used to set the `x`- and `y`-coordinates of a display object to simulate the\
    \ visual effect.\n\n```\namplitude = 55\nfrequency = 0.6\nspeed     = frequency\n\
    \nfunction sineScroll(time)\n     y = (amplitude * math.sin(frequency * time *\
    \ 2 * math.pi) )\n    return y\nend\n```\n\nTo make the object move, you would\
    \ also need to manipulate the `x` position. With every call of this function,\
    \ you’d alter the `x` value by either increasing it or decreasing it by the `frequency`\
    \ (`speed`). To understand better how the `amplitude` and `frequency` would affect\
    \ the output, you can play with the settings. As in the previous function, a good\
    \ time increment to start with is `0.01`.\n\n### Placing a Tile on a Board with\
    \ No Other Tile in the Same Row and Column\n\nSometimes in a board game you might\
    \ need to quickly check the board for empty squares, or squares that might share\
    \ a row or a column. This function will help identify if a tile that we place\
    \ on the board shares a row or a column with another tile.\n\n```\nN = 8\nboard\
    \ = {}\nfor i=1, N do\n  board[i] = {}\n  for j=1, N do\n    board[i][j] = false\n\
    \  end\nend\n\nfunction allowedAt(x,y)\n\nfor i=1, N do\n    if board[x][i] ==\
    \ true or board[i][y] == true then\n      return false\n    end\n  end\n\nreturn\
    \ true\nend\n```\n\nThis can be expanded to solve other problems like the N-Queen,\
    \ or the N-Rook.\n\n### Using Arrays to Output Large Amounts of Text Using Templates\n\
    \nThe children’s poem “There Was an Old Lady Who Swallowed a Fly,” in which a\
    \ woman swallows increasingly larger animals to catch the previously swallowed\
    \ one, is a good example to rebuild using arrays. We have a series of animals\
    \ that she swallowed and each has a corresponding output line.\n\n```\nanimals\
    \ = {\n  {\"fly\"  , \"But I don't know why she swallowed a fly, \\nperhaps she\
    \ will die\"},\n  {\"spider\", \"That wriggled and jiggled and tickled inside\
    \ her\"},\n  {\"bird\"  , \"quite absurd\"},\n  {\"cat\"   , \"Fancy that\"},\n\
    \  {\"dog\"   , \"what a hog\"},\n  {\"pig\"   , \"Her mouth was so big\"},\n\
    \  {\"goat\"  , \"she just opened her throat\"},\n  {\"cow\"   , \"I don't know\
    \ how\"},\n  {\"donkey\", \"It was rather wonky\"},\n  {\"horse\" , \"She's dead,\
    \ of course!\"},\n}\nline1 = \"I knew an old lady who swallowed a %s,\"\nline2\
    \ = \" She swallowed the %s to catch the %s,\"\n\nfunction printf(format,  ...)\n\
    \  print(string.format(format,  ...))\nend\n\nfor i=1, #animals do\n  if i==1\
    \ then\n    printf(line1, animals[i][1])\n  else\n    printf(line2, animals[i][1],\
    \ animals[i-1][1])\n  end\n  print(animals[i][2])\nend\n```\n\n### Parameter Handling\n\
    \nYou can write functions to break longer and repetitive tasks making them modular.\
    \ To make them work for you, these functions need to be sent parameters. In some\
    \ C-type languages, functions with the same name but different parameter types\
    \ can be declared. For example, you can have this:\n\n```\nfunction one(int, int)\n\
    ```\n\nand also this:\n\n```\nfunction one (int)\n```\n\nWith Lua, the function\
    \ can accept anything, including varargs, as mentioned earlier when we saw the\
    \ `printf` function. There are three types of parameters you can pass to the function:\n\
    \n- **A primitive**: This can be a number, a string, a Boolean, or `nil`.\n- **A\
    \ table**: This can be an array or a hash table.\n- **A vararg**: This is an arbitrary\
    \ number of arguments, represented by three dots (`...`).\n\nIn the function,\
    \ you can check for the type of parameter by using the `type` function, which\
    \ will return the type of variable the parameter is.\n\n### Fixed Parameters\n\
    \nThe default convention for passing parameters to a function is using fixed parameters.\
    \ These tell the function how many parameters there will be and the order of the\
    \ parameters. When using fixed parameters, you know what to expect from the function,\
    \ and based on the values of the parameters passed, you can take appropriate action.\n\
    \n```\nfunction listParams(one, two, three)\n  print(\"We got :\", one, two, three)\n\
    \  if one==\"one\" then\n     print(\"Something\")\n  else\n    print(\"Nothing\"\
    )\n  end\nend\n```\n\nWhile calling this function, the first parameter has to\
    \ be `one`, the second `two`, and the third `three`.\n\n### Variable Parameters\n\
    \nYou can use variable parameters (passed as a table) when we want to pass multiple\
    \ parameters. An alternative would be to use varargs; both approaches act as a\
    \ table of parameters.\n\n```\nfunction arrayParams(arrTable)\n  print(\"We got\
    \ :\")\n  for i, j in pairs(arrTable) do\n    print(\"\", i, j)\n  end\nend\n\
    ```\n\n### Variable Named Parameters\n\nYou can use variable named parameters\
    \ when you do not know what is passed, but you want to check for certain parameters.\
    \ This is also a table like in the example above, but instead of having table\
    \ items, it has named items, which can be referenced by name rather than an index.\n\
    \n```\nfunction namedArrayParams(arrTable)\n  if arrTable.debug == true then\n\
    \    print(\"We are now in Debug Mode\")\n  else\n    print(\"We are not in Debug\
    \ Mode\")\n  end\n  if arrTable.color then\n    print(\"We got the color as \"\
    , arrTable.color)\n  else\n    print(\"We shall use the default color\")\n  end\n\
    end\n```\n\nThe way to pass parameters to this type of function is as follows:\n\
    \n```\nnamedArrayParams({debug=true, 56,\"One\", color=\"red\", false})\n```\n\
    \n**Note:** When calling a function in Lua with a table—for example, `someFunction({one=1,two=2})`—you\
    \ can also call it as follows: `someFunction {one=1, two=2}`. This can only be\
    \ used if the table is the only parameter being passed to the function. It cannot\
    \ be used for any type of parameter other than a table value being passed.\n\n\
    ### Using Varargs\n\nVarargs are similar to variable parameters, as described\
    \ previously, but instead of a variable name, they are defined by a special combination\
    \ of three dots. Though they may seem a lot like table arrays, they are different\
    \ in the way that you can interact with them.\n\n```\nfunction passvarargs(...)\n\
    \  local a, b = ...\n  print(a, b)\nend\n```\n\n`a` and `b` get the first and\
    \ the second parameter passed; this is not possible with table arrays.\n\nYou\
    \ can create a list of elements from the varargs by simply enclosing them in curly\
    \ brackets, like so: `local tbl = {...}`. This is now a table array.\n\nWith the\
    \ `return...` command, you can return all of the received vararg parameters.\n\
    \n**Note:** As mentioned earlier, the `...` is also available as a named variable,\
    \ `arg`, of type table, which is the equivalent of `{...}`.\n\n### Parsing a List\
    \ of Passed Parameters\n\nSome functions have optional parameters, like so:\n\n\
    ```\nfunction addObjectAtPosition( [parent,] object, [x [, y [,position ] ] ]\
    \ )\n```"
  raw: 'When you open a jack-in-the-box, the spring-loaded “Jack” springs out with
    full force, and then bobs more slowly over time, until it stops. We can simulate
    a jack-in-the-box with the help of a little bit of trigonometry.


    **Note**   Since we aren''t using a GUI-based framework, the code here is generic
    and will produce x and y values that can be applied to display objects in a GUI
    to simulate the visual effect. For the purpose of this function, however, we shall
    display the values to the console.


    ```

    frequency  = 5.0

    amplitude  = 35

    decay      = 1.0

    time       = 0


    function jackInTheBox(time)

      y = amplitude * math.cos(frequency * time * 2 * math.pi) / math.exp(decay *
    time)

      return y

    end

    ```


    To use this function, we need to call the function and pass it a time value. If
    you were to use this in a loop, you would increment the time variable in increments
    (e.g., of 0.01, or another value that suits the delay of your calling function).


    Using a Sine Scroller


    The preceding function makes use of a cosine wave. Similarly, you can vary the
    parameters and even use sine waves. These were most commonly used in the 1980s
    on sine scrollers and to animate waves of attacking aliens (e.g., in games like
    R-Type, Zynaps, and Crosswise). In a similar fashion, the following function shall
    calculate the x and y values, which can be used to set the x- and y-coordinates
    of a display object to simulate the visual effect.


    ```

    amplitude = 55

    frequency = 0.6

    speed     = frequency


    function sineScroll(time)

         y = (amplitude * math.sin(frequency * time * 2 * math.pi) )

        return y

    end

    ```


    To make the object move, you would also need to manipulate the x position. With
    every call of this function, you’d alter the x value by either increasing it or
    decreasing it by the frequency (speed). To understand better how the amplitude
    and frequency would affect the output, you can play with the settings. As in the
    previous function, a good time increment to start with is 0.01.


    Placing a Tile on a Board with No Other Tile in the Same Row and Column


    Sometimes in a board game you might need to quickly check the board for empty
    squares, or squares that might share a row or a column. This function will help
    identify if a tile that we place on the board shares a row or a column with another
    tile.


    ```

    N = 8

    board = {}

    for i=1, N do

      board[i] = {}

      for j=1, N do

        board[i][j] = false

      end

    end


    function allowedAt(x,y)


    for i=1, N do

        if board[x][i] == true or board[i][y] == true then

          return false

        end

      end


    return true

    end

    ```


    This can be expanded to solve other problems like the N-Queen, or the N-Rook.


    Using Arrays to Output Large Amounts of Text Using Templates


    The children’s poem “There Was an Old Lady Who Swallowed a Fly,” in which a woman
    swallows increasingly larger animals to catch the previously swallowed one, is
    a good example to rebuild using arrays. We have a series of animals that she swallowed
    and each has a corresponding output line.


    ```

    animals = {

      {"fly"  , "But I don''t know why she swallowed a fly, \nperhaps she will die"},

      {"spider", "That wriggled and jiggled and tickled inside her"},

      {"bird"  , "quite absurd"},

      {"cat"   , "Fancy that"},

      {"dog"   , "what a hog"},

      {"pig"   , "Her mouth was so big"},

      {"goat"  , "she just opened her throat"},

      {"cow"   , "I don''t know how"},

      {"donkey", "It was rather wonky"},

      {"horse" , "She''s dead, of course!"},

    }

    line1 = "I knew an old lady who swallowed a %s,"

    line2 = " She swallowed the %s to catch the %s,"


    function printf(format,  ...)

      print(string.format(format,  ...))

    end


    for i=1, #animals do

      if i==1 then

        printf(line1, animals[i][1])

      else

        printf(line2, animals[i][1], animals[i-1][1])

      end

      print(animals[i][2])

    end

    ```


    Parameter Handling


    You can write functions to break longer and repetitive tasks making them modular.
    To make them work for you, these functions need to be sent parameters. In some
    C-type languages, functions with the same name but different parameter types can
    be declared. For example, you can have this:


    ```

    function one(int, int)

    ```


    and also this:


    ```

    function one (int)

    ```


    With Lua, the function can accept anything, including varargs, as mentioned earlier
    when we saw the printf function. There are three types of parameters you can pass
    to the function:


    *   *A primitive*: This can be a number, a string, a Boolean, or nil.

    *   *A table*: This can be an array or a hash table.

    *   *A vararg*: This is an arbitrary number of arguments, represented by three
    dots (...).


    In the function, you can check for the type of parameter by using the type function,
    which will return the type of variable the parameter is.


    Fixed Parameters


    The default convention for passing parameters to a function is using fixed parameters.
    These tell the function how many parameters there will be and the order of the
    parameters. When using fixed parameters, you know what to expect from the function,
    and based on the values of the parameters passed, you can take appropriate action.


    ```

    function listParams(one, two, three)

      print("We got :", one, two, three)

      if one=="one" then

         print("Something")

      else

        print("Nothing")

      end

    end

    ```


    While calling this function, the first parameter has to be one, the second two,
    and the third three.


    Variable Parameters


    You can use variable parameters (passed as a table) when we want to pass multiple
    parameters. An alternative would be to use varargs; both approaches act as a table
    of parameters.


    ```

    function arrayParams(arrTable)

      print("We got :")

      for i, j in pairs(arrTable) do

        print("", i, j)

      end

    end

    ```


    Variable Named Parameters


    You can use variable named parameters when you do not know what is passed, but
    you want to check for certain parameters. This is also a table like in the example
    above, but instead of having table items, it has named items, which can be referenced
    by name rather than an index.


    ```

    function namedArrayParams(arrTable)

      if arrTable.debug == true then

        print("We are now in Debug Mode")

      else

        print("We are not in Debug Mode")

      end

      if arrTable.color then

        print("We got the color as ", arrTable.color)

      else

        print("We shall use the default color")

      end

    end

    ```


    The way to pass parameters to this type of function is as follows:


    ```

    namedArrayParams({debug=true, 56,"One", color="red", false})

    ```


    **Note**   When calling a function in Lua with a table—for example, someFunction({one=1,two=2})—you
    can also call it as follows: someFunction {one=1, two=2}. This can only be used
    if the table is the only parameter being passed to the function. It cannot be
    used for any type of parameter other than a table value being passed.


    Using Varargs


    Varargs are similar to variable parameters, as described previously, but instead
    of a variable name, they are defined by a special combination of three dots. Though
    they may seem a lot like table arrays, they are different in the way that you
    can interact with them.


    ```

    function passvarargs(...)

      local a, b = ...

      print(a, b)

    end

    ```


    a and b get the first and the second parameter passed; this is not possible with
    table arrays.


    You can create a list of elements from the varargs by simply enclosing them in
    curly brackets, like so: local tbl = {...}. This is now a table array.


    With the return... command, you can return all of the received vararg parameters.


    **Note**   As mentioned earlier, the ... is also available as a named variable,
    arg, of type table, which is the equivalent of {...}.


    Parsing a List of Passed Parameters


    Some functions have optional parameters, like so:


    ```

    function addObjectAtPosition( [parent,] object, [x [, y [,position ] ] ] )

    ```'
