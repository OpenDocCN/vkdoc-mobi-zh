    Padding Zeros to a String


    In many games, it can be interested to display scores with leading zeros (e.g.,
    0003 instead of 3)—for instance, to make the score look like old-style games,
    many of which used this type of display. This can be used to create many interesting
    effects—for example, you could have an odometer-type display roll the numbers
    as the score increases.


    Here’s how you can pad numbers with zeros:


    ```

    function paddWithZero(theNumber, numOfDigits)

      return string.rep("0", numOfDigits - string.len(theNumber)) .. theNumber

    end

    ```


