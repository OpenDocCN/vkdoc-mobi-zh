    Making Sound


    A game framework is incomplete if you cannot play sound. With LÖVE, first we need
    to load the sound into memory and then play it as required.


    ```

    popSound = love.audio.newSource("pop.ogg", "static")

    ```


    static tells LÖVE that it needs to load and decode this sound entirely before
    it starts to play. This is different from streaming, where the sound can be played
    in parts as it is streamed from disk.


    To play the sound, we simply use


    ```

    love.audio.play(popSound)

    ```


    Let’s create an example that makes a popping sound each time the window is clicked:


    ```

    function love.load()

      pop = love.audio.newSource("pop.ogg", "static")

    end

    function love.mousepressed(mx, my, mButton)

      if mButton == "l" then

        love.audio.play(popSound)

      end

    end

    ```


    Apart from playing a sound, LÖVE also provides functions to increase and decrease
    the volume. You can also change the pitch by simply using popSound:setPitch(value),
    where value has a range between 0 and 1\. The same ranges apply for setVolume
    and can be set as popSound:setVolume(value).


    In this sample, we’ll have a bit of fun with the pitch:


    ```

    count = 1

    function love.load()

      pop = love.audio.newSource("pop.ogg", "static")

    end

    function love.mousepressed(mx, my, mButton)

      if mButton == "l" then

        count = count + 1

        if count>15 then count = 1 end

        pop:setPitch(count/10)

        love.audio.play(popSound)

      end

    end

    ```


    With what you have learned, try to create a grid that resembles a repeating bubble-wrap
    pattern, using a bubble image for each cell in the grid. When each bubble is clicked,
    make the image change to a popped bubble and have it make a popping sound.


    If you want to play some background music—music that keeps repeating or playing
    for the duration of the game or till you want it to stop—you can use the function
    setLooping:


    ```

    backgroundMusic = love.audio.newSource("music.mp3")

    backgroundMusic:setLooping(true)

    love.audio.play(backgroundMusic)

    ```


    Sample Game Code


    This final section will give an example of a game that incorporates all of the
    topics covered in the chapter. The example creates a picture-logic puzzle (aka
    nanogram puzzle), which is similar to a crossword puzzle, except the player has
    to fill in squares with numbers instead of letters, based on numerical clues that
    are provided. For example, if the clue is 2, it means that the row or column contains
    two filled squares that are contiguous. A clue of 1,1 means that the row or column
    contains two squares that are not contiguous and must have at least one blank
    square between them.


    In our sample, we shall randomly create a puzzle for a 5×5 grid and create the
    clues, as shown in [Figure 11-12](#9781430246626_Ch11.xhtml#Fig12).


    ![9781430246626_Fig11-12.jpg](OEBPS/Images/9781430246626_Fig11-12.jpg)


    [Figure 11-12](#9781430246626_Ch11.xhtml#_Fig12) .  A picture-logic puzzle game


    ```

    squares = 5

    _W = love.graphics:getWidth()


    _H = love.graphics:getHeight()


    math.randomseed(os.time())

    local size = 400/squares

    local boxes = {}

    local solved = false


    function make_board()

      solved = false

      size = 400/squares    -- Recalculate the sizes

      boxes = {}            -- Reset the array


    -- Create a random puzzle by filling the board

      for x = 1, squares do

        for y = 1, squares do

          box = {Orig = math.random(0,1), X = x, Y = y, Curr = 0}

          -- We set the value for that box randomly to on or off

          table.insert(boxes, box)

        end

      end


    -- Set the first row to be on

      for k,v in pairs(boxes) do

        if v.X == 1 then

          v.Orig = 1

        end

      end


    end


    make_board()


    function findnumberx(x)

      -- This returns the clue for the column x

      local n = {}

      local c = 0


    for k,v in pairs(boxes) do

        if v.X == x then

          if v.Orig == 1 then

            c = c + 1

          else

            if c > 0 then

              table.insert(n, tostring(c))

            end

            c = 0

          end

        end

      end


    if c > 0 then

        table.insert(n, tostring(c))

      end


    return table.concat(n,",")

    end


    function findnumbery(y)

      -- This returns the clue for the row y

      local n = {}

      local c = 0

      for k,v in pairs(boxes) do

        if v.Y == y then

          c = c + 1

        else

          if c > 0 then

            table.insert(n, tostring(c))

          end

          c = 0

        end

      end

      if c > 0 then

        table.insert(n, tostring(c))

      end

      return table.concat(n, ",")

    end


    function love.load()

      button_off = love.graphics.newImage("buttonoff.png")

      button_on = love.graphics.newImage("buttonon.png")

      button_not = love.graphics.newImage("buttonnot.png")

    end


    function love.draw()

      love.graphics.setColor(255,255,255)  -- White

      love.graphics.setFont(love.graphics.newFont(12))  -- 12pt size

      -- Draw the appropriate image, On, Off or Not

      for k, v in pairs(boxes) do

        if v.Curr == 0 then

          love.graphics.draw(button_off, v.X*size, v.Y*size, size/30, size/30, 0,
    0)

        elseif v.Curr == 1 then

          love.graphics.draw(button_on, v.X*size, v.Y*size, size/30, size/30, 0, 0)

        elsif v.Curr == 2 then

          love.graphics.draw(button_not, v.X*size, v.Y*size, size/30, size/30, 0,
    0)

        end

      end


    -- Display the clues for the columns

      for x=1, squares do

        love.graphics.print(findnumberx(x), x*size, size - 40

      end


    -- Display the clues for the rows

      for y=1, squares do

        love.graphics.print(findnumbery(y), size-40, size*y

      end


    -- Show if the puzzle has been solved

      if solved then

        love.graphics.setColor(255,0,0)  -- Red

        love.graphics.setFont(love.graphics.newFont(24))  -- 24pt size

        love.graphics.print("You have solved the puzzle",

          size + 10, _H/2)

      end


    end'
