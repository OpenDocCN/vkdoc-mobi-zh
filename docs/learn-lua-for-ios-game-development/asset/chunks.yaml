    Using pointInTriangle


    In some cases, triangles will suit your needs better than rectangles or circles.
    There are plenty of methods for checking the bounding values of a triangle. However,
    the one described following is the simplest. It simply extends lines from each
    of the triangle’s vertices to the point we are checking, thereby dividing the
    triangle into three triangles;  it then calculates the area of each of these triangles.
    If totalArea is the same as the area of the three new triangles created, then
    the point can be said to be in the bounding triangle. Here’s the function that
    determines whether a point is inside a triangle:


    ```

    function triangleArea( pt1x, pt1y, pt2x, pt2y, pt3x, pt3y )

      local dA = pt1x - pt3x

      local dB = pt1y - pt3y

      local dC = pt2x - pt3x

      local dD = pt2y - pt3y

      return 0.5 * math.abs( ( dA * dD ) - ( dB * dC ) )

    end


    function pointInTriangle(ptx, pty, pt1x, pt1y, pt2x, pt2y, pt3x, pt3y)

      local areaT = triangleArea(pt1x, pt1y, pt2x, pt2y, pt3x, pt3y)

      local areaA = triangleArea(ptx, pty, pt1x, pt1y, pt2x, pt2y)

      local areaB = triangleArea(ptx, pty, pt3x, pt3y, pt2x, pt2y)

      local areaC = triangleArea(ptx, pty, pt1x, pt1y, pt3x, pt3y)

      return (areaT == (areaA + areaB + areaC))

    end

    ```


    Using pointInPolygon


    You can also determine whether a point is inside a polygon. The following code
    (adapted from the functions in the articles “Determining if a point lies on the
    interior of a polygon,” by Paul Bourke [[http://paulbourke.net/geometry/insidepoly/](http://paulbourke.net/geometry/insidepoly/)]
    and “Point in Polygon Strategies,” by Eric Haynes [[http://erich.realtimerendering.com/ptinpoly/](http://erich.realtimerendering.com/ptinpoly/)]
    enables you to do this:


    ```

    function pointInPolygon(x,y,poly)

      n = #poly

      inside = false


    p1x,p1y = poly[1], poly[2]

      for i=1,n-2, 2 do

        p2x,p2y = poly[i+2], poly[i+3]

        if y > math.min(p1y,p2y) then

          if y <= math.max(p1y,p2y) then

            if x <= math.max(p1x,p2x) then

              if p1y ~= p2y then

                xinters = (y-p1y)*(p2x-p1x)/(p2y-p1y)+p1x

              end

              if p1x == p2x or x <= xinters then

                inside = not inside

              end

            end

          end

        end

        p1x,p1y = p2x,p2y

      end

      return inside

    end

    ```


    Other Generic Functions


    This section examines some additional functions that you might find useful in
    your Lua development projects.


    Comparing Boolean Values


    Another common task that you might want to accomplish in Lua is comparing Boolean
    values. At first glance, you might think that these two commands are the same:


    ```

    if someValueOn then print("On") end

    ```


    and


    ```

    if someValueOn==true then print("On") end

    ```


    In the first case, someValueOn will return true as long as someValueOn is not
    nil or false. However, if someValueOn were −1 or "Off", the statement would still
    evaluate to true, whereas in the second line, someValueOn==true would return a
    true only if the value were true, and in no other circumstance.


    Translating C/Java Like Loops to Lua


    If you come from a Java/C/C++ or JavaScript background, you should be used to
    loops like this:


    ```

    for (initialize; condition; iteration){

    }

    ```


    where multiple values can be set in initialize, each separated with a comma. The
    condition can be made up of a compound condition, and the iterator can have multiple
    operations.


    For example, consider this loop:


    ```

    score =  110  --something

    for (i=20, k = 120; i> −1 && score < 100; --i, --k ){

    }

    ```


    In Lua, this would be written as follows:


    ```

    score = 110

    k = 120

    for i=20, 0, -1 do

      if score < 100 then

          break

      end


    -- Do whatever here

      k = k - 1

    end

    ```


    Applying Friction to an Object


    The easiest way to move an object around the screen is to move it at constant
    speed (i.e., increase or decrease the axis value by the same value over time).
    This behavior is of course quite unrealistic. For example, in the real world,
    when a box is pushed across the hall, it moves fast at first and then it gradually
    slows down until it finally stops. One shortcut that a lot of developers prefer
    is to use a physics object; it works, but we can simulate friction without using
    a physics object with the help of a little math.


    ```

    local speed = 20

    local friction = 0.9

    repeat

      print(speed)

      speed = speed * friction

    until speed <= 1

    ```


    Depending on the framework, you can reduce the y value by this speed value. This
    will give the illusion of a slide or flick upward with friction. The object will
    slide quickly at first, and then slow down till it comes to a complete halt.


    Note that this example uses a repeat loop. If you are working with display objects,
    you need to have a nonblocking mechanism that allows for updates to be made. In
    other words, you need to use something like the draw function, which is called
    every so often, or the enterFrame events, so that the new position is set at each
    frame, and you can see the transition of the object. If you want the transition
    to be super-smooth, try a maximum value of 0.99\. This can be used to simulate
    flicks, sliding an object across the screen with inertia, and so on.


