    \      wd = hx + tanker.width,\n      ht = hy + tanker.height,\n    }\n    if\
    \ collides(tRect, pRect) == true then \n      fuel = MAX_FUEL\n      updateText(txtFuel,\
    \ fuel)\n      setVisible(tanker, false)\n```"
  raw: "We could set up the colors with named references instead of using a numeric\
    \ index, but since we want to give the objects a random color within a particular\
    \ range, a numeric index is better. If we wanted to use named colors instead,\
    \ we could use the following:\n\n```\nColors = {\n  Red = {255, 0, 0},\n  Blue\
    \ = {0, 0, 255},\n  Green = {0, 255, 0},\n  -- and so on...\n}\n```\n\nDisplaying\
    \ Information\n\nWe also need to display information to the player about how many\
    \ survivors were saved, how much fuel is left, how much distance covered, and\
    \ so on. To display this information, we use text objects.\n\nHere’s the code\
    \ for Corona SDK:\n\n```\nfunction newText(theText, xPos, yPos, theFontName, theFontSize)\n\
      local xPos, yPos = xPos or 0, yPos or 0\n  local theFontSize = theFontSize or\
    \ 14\n  local theFontName = theFontName or native.systemFont\n  local _text =\
    \ display.newText(theText, xPos, yPos, font, 24)\n  position(_text, xPos, yPos)\n\
      _text:setTextColor(0,0,0)\n  return _text\nend\n```\n\nAnd here’s the code for\
    \ Gideros Studio:\n\n```\nfunction newText(theText, xPos, yPos, theFontName, theFontSize)\n\
      local xPos, yPos = xPos or 0, yPos or 0\n  local theFontSize = theFontSize or\
    \ 24\n  local theFontName = theFontName or \"Helvetica.ttf\"\n  local _font =\
    \ TTFont.new(theFontName, theFontSize)\n  local _text = TextField.new(_font, theText)\n\
      _text.width = _text:getWidth()\n  _text.height= _text:getHeight()\n\nstage:addChild(_text)\n\
      position(_text, xPos, yPos - _text.height) -- Gideros uses baseline font\n  return\
    \ _text\nend\n```\n\nNow that we have the newText function, which creates our\
    \ text items, we can create the function to update the text on the text object.\n\
    \nHere’s the code for Corona SDK:\n\n```\nfunction updateText(theObject, theNewText)\n\
      if theObject == nil then return end\n  theObject.text = theNewText or \"\"\n\
    end \n```\n\nAnd here’s the code for Gideros Studio:\n\n```\nfunction updateText(theObject,\
    \ theNewText)\n  if theObject == nil then return end\n  theObject:setText(theNewText\
    \ or \"\")\nend \n```\n\nNext we can create the HUD items.\n\nHere’s the Corona\
    \ SDK code:\n\n```\nlocal textLine = baseLine + 10\n```\n\nAnd here’s the Gideros\
    \ Studio code:\n\n```\nlocal textLine = baseLine + 55\nlocal txtLives, txtFuel,\
    \ txtSaved, txtScore, txtGameOver, txtTapAgain\nfunction createHUDItems()\n  --\
    \ create the items lives, fuel, saved, score, and game-over text\n\ntxtLives =\
    \ newText(lives, 170, textLine)\n  txtFuel = newText(fuel, 610, textLine)\n  txtSaved\
    \ = newText(collected, 840, textLine)\n  txtScore = newText(score, 410, textLine)\n\
      txtGameOver = newText(\"G a m e  O v e r\", 0, 0)\n  position(txtGameOver, (_W\
    \ - txtGameOver.width)/2, _H/2)\n  txtTapAgain = newText(\"Tap to play again\"\
    , 0, 0)\n  position(txtTapAgain, (_W - txtGameOver.width)/2, _H/2 + 40)\nend \n\
    ```\n\nTo create these text objects, we first need to call createHUDItems, and\
    \ then we can toggle their visibility as required:\n\n```\ncreateHUDItems()\n\
    ```\n\nThe game-over text remains on the screen right in the middle. We want to\
    \ display that only when the game is actually over, not while it is in progress.\
    \ To do this, we can simply set the *visibility* of that text to false—that is,\
    \ hide it using the setVisible function:\n\n```\nsetVisible(txtGameOver, false)\n\
    setVisible(txtTapAgain, false)\n```\n\nWhen the game is over and we need to display\
    \ the game-over text, we simply set the *visibility* to true.\n\nTo update all\
    \ of the text in the text objects that we created, we use the updateAllText function:\n\
    \n```\nfunction updateAllText()\n  updateText(txtLives, lives)\n  updateText(txtFuel,\
    \ fuel)\n  updateText(txtScore, score)\n  updateText(txtSaved, collected)\nend\
    \ \n```\n\nAt the start, we call the createHUDItems function to initially display\
    \ the text objects, and then we add the updateAllText function in our update function\
    \ loop so that it keeps updating the amount of fuel left, the number of survivors\
    \ collected, and the number of lives remaining.\n\nGame Over; Play Again?\n\n\
    When the number of lives reaches zero, we display the message “Game Over” and\
    \ offer the user the choice to play again. Then the program simply waits for the\
    \ player to tap the screen to play again.\n\nTo handle taps or touches on the\
    \ screen, event listeners have to be set. We can add or remove eventHandlers as\
    \ follows in Corona SDK:\n\n```\nfunction addHandler(theEventName, theHandler,\
    \ theObject)\n  local theObject = theObject or Runtime\n  theObject:addEventListener(theEventName,\
    \ theHandler)\nend \nfunction removeHandler(theEventName, theHandler, theObject)\n\
      local theObject = theObject or Runtime\n  theObject:removeEventListener(theEventName,\
    \ theHandler)\nend \n```\n\nand like so Gideros Studio:\n\n```\nfunction addHandler(theEventName,\
    \ theHandler, theObject)\n  local theObject = theObject or stage\n  theObject:addEventListener(theEventName,\
    \ theHandler)\nend\n\nfunction removeHandler(theEventName, theHandler, theObject)\n\
      local theObject = theObject or stage\n  theObject:removeEventListener(theEventName,\
    \ theHandler)\nend \n```\n\nNow we’ve added handlers, we need to set up a listener\
    \ for taps on the screen.\n\nHere’s the code for Corona SDK:\n\n```\ntapEvent\
    \ = \"tap\"\n```\n\nAnd here’s the code for Gideros Studio:\n\n```\ntapEvent =\
    \ Event.TOUCHES_END\n```\n\nWith this we can create a generic handler:\n\n```\n\
    function showReplayScreen()\n  removeHandler(tapEvent, shoot) \n  addHandler(tapEvent,\
    \ restartGame)\nend\n```\n\nAnd the *tapped* handler can be defined as follows:\n\
    \n```\nfunction restartGame(event)\n  -- restart the game by setting most of the\
    \ values to defaults\n  wTime = 2\n  -- we can set the reinitialization code here;\
    \ e.g., setting the values, repositioning elements, etc.\n  setVisible(txtGameOver,\
    \ false)\n  setVisible(txtTapAgain, false)\n  score = 0\n  distance = 0\n  collected\
    \ = 0\n  fuel = MAX_FUEL\n  lives = MAX_LIVES \n  setVisible(heli,true)\n\nupdateText(txtFuel,\
    \ fuel)\n  updateText(txtScore, score)\n  updateText(txtSaved, saved)\n  updateText(txtLives,\
    \ lives)\n\n-- remove the handler that will restart the game removeHandler(tapEvent,\
    \ restartGame) gameOver = false\n  -- add the handler to shoot bullets when tapped\
    \ addHandler(tapEvent, shoot) end \n```\n\nCollisions\n\nThe last thing left in\
    \ the grand scheme of things is to detect when the helicopter collides with any\
    \ of the scenery items, which will crash it, and when the helicopter collides\
    \ with a survivor, which will save the survivor.\n\n```\nfunction checkCollisions()\n\
      -- create the player rect local hx, hy = getPosition(heli) pRect = {\n    x\
    \ = hx, \n    y = hy,\n    wd = heli.width,\n    ht = heli.height,\n  }\n\n--\
    \ find if the helicopter collided with a scenery object\n  for i = #scenery, 1,\
    \ -1 do\n    local nme = scenery[i]\n    if nme.objType == objects.plane or nme.objType\
    \ == objects.balloon or\n      nme.objType == objects.lamppost or nme.objType\
    \ == objects.house or\n      nme.objType == objetcs.tallHouse or nme.objType ==\
    \ objects.angryCloud then \n      hx, hy = getPosition(nme.sprite)\n      nRect\
    \ = {\n        x = hx,\n        y = hy,\n        wd = nme.sprite.width,\n        ht\
    \ = nme.sprite.height,\n      }\n\nif collides(nRect, pRect) == true then\n        reduceLife()\n\
            break\n      end\n    end\n  end\n  hx, hy = getPosition(survivor)\n  sRect\
    \ = {\n    x = hx,\n    y = hy,\n    wd = hx + survivor.width,\n    ht = hy +\
    \ survivor.height,\n  }\n\n-- check if we have collected the survivor\n  if collides(sRect,\
    \ pRect) == true then\n    collected = collected + 1\n    updateText(txtSaved,\
    \ collected)\n    setVisible(survivor, false)\n    score = score + 100\n    updateText(txtScore,\
    \ score)\n    playSound(sounds.collectSurvivor)\n  end \n  -- check if we have\
    \ collected the fuel\n  if tanker~= nil then \n    hx, hy = getPosition(tanker)\n\
        tRect = {\n      x = hx,\n      y = hy,\n      wd = hx + tanker.width,\n      ht\
    \ = hy + tanker.height,\n    }\n    if collides(tRect, pRect) == true then \n\
          fuel = MAX_FUEL\n      updateText(txtFuel, fuel)\n      setVisible(tanker,\
    \ false)"
