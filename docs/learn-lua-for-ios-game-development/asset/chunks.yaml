    ```\n\n## 事件\n\n与大多数框架类似，Gideros 采用异步方式处理事件。当特定情况发生时便会触发事件——例如，用户触摸屏幕、帧更新以及系统事件（如应用启动、挂起、恢复或退出）。表\
    \ 9-1 列出了 Gideros Studio 处理的事件。\n\n**表 9-1.** Gideros Studio 处理的事件\n\n| 事件类型 |\
    \ 处理的事件 |\n| --- | --- |\n| 触摸 | `TOUCHES_BEGIN` `TOUCHES_MOVE` `TOUCHES_END`\
    \ `TOUCHES_CANCEL` |\n| 帧与舞台 | `ENTER_FRAME` `ADDED_TO_STAGE` `REMOVED_FROM_STAGE`\
    \ |\n| 系统与应用 | `APPLICATION_START` `APPLICATION_RESUME` `APPLICATION_SUSPEND`\
