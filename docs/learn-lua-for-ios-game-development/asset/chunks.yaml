    \nfunction theFunc(param)\n  print(\"已调用，参数为 \\n\\t\" .. param.data1 .. \", \"\
    \ .. param.data2)\n  stage:removeEventListener(\"myEvent\", theFunc)\nend\n\n\
    function raiseEvent(msg)\n    print(msg)\n    myEvent.data1 = msg\n    stage:dispatchEvent(myEvent)\n\
    end\n\nstage:addEventListener(\"myEvent\", theFunc)\n```\n"
