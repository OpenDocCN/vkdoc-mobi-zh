    \ in earlier chapters that the you can include libraries by using the `require`\
    \ keyword, like so:\n\n```\nlocal physics = require \"physics\"\nphysics.start()\n\
    ```\n\nThese two lines are of utmost importance: the first one gets a handle on\
    \ the physics library, which allows us to call the physics-related functions from\
    \ the `physics` namespace, and the second line actually starts the physics engine.\
    \ Making the objects physics objects does not make a difference until `physics.start`\
    \ is called. This is mostly used in games that allow the user to position the\
    \ objects on the screen and then invoke the `physics.start` function to start\
    \ the physics simulation interacting with the placed objects. Some examples that\
    \ use this are Bubble Ball and Angry Orange (not made with Corona SDK).\n\nHowever,\
    \ even after adding these two lines, the rectangle we created doesn’t yet act\
    \ as a physics body, because we have not as yet marked it as a physics body. To\
    \ do so, add the following line of code:\n\n```\nphysics.addBody( ground )\n```\n\
    \nUpon refreshing the project in the simulator, the rectangle starts to obey gravity\
    \ and falls down, off the screen.\n\nLet’s create another object that falls; for\
