    \ which is called when the concatenation operator (`..`) is used to concatenate\
    \ two or more table values.\n\n```\nt = setmetatable({}, {__concat=function(tbl,val)\
    \ return \"Hello \" .. val end})\nprint(t .. \"Jayant\")\n```\n\n`__eq`\n\nThis\
    \ is the equal operator (`==`); it can be used to help compare two table values\
    \ that are not easily comparable. The not (`a==b`) is equivalent to `a~=b`.\n\n\
    `__lt`\n\nThis is the *less-than* operator (`<`); it can be used to help compare\
    \ two table values that are not easily comparable.\n\n`__le`\n\nThe *less-than-or-equal-to*\
    \ operator (`<=`) is also useful for comparing two table values that are not easily\
    \ comparable.\n\n### A Useful Example\n\nLet’s look at a sample that demonstrates\
    \ the practical use of the functions just described and their use with tables.\
    \ The `+` operator works well between numbers. If we try to add two tables using\
    \ the `+` operator, it will not work. We can create the functions that can be\
    \ used to manage operations such as adding these tables. In the following example,\
    \ we override the `__add` function, which allows us to add two tables using the\
    \ `+` operator.\n\n```\nthePos = {}\n\nthePos.__add = function (a, b)\n    local\
    \ res = {\n        a[1] + b[1],\n        a[2] + b[2]\n    }\n    setmetatable(res,\
    \ thePos)\n    return res\nend\n\nfunction make_pos(x,y)\n    local res = { x,\
    \ y }\n    setmetatable(res, thePos)\n    return res\nend\n\np1 = make_pos(5,6)\n\
    p2 = make_pos(2,4)\np3 = p1 + p2\nprint(p3[1], p3[2])\n```\n\n## Object-Oriented\
    \ Lua\n\nLua is not an object-oriented language, but it has functionality that\
    \ allows for it to be used like one. I described this in [Chapter 2](#9781430246626_Ch02.xhtml),\
    \ where functions can be added to a table, called with the `:` operator, and passed\
    \ to the function.\n\nWe had a look at `deepcopy` earlier—a way to create a copy\
    \ of a table other than just passing a pointer to memory. We also had a look at\
    \ tweaking the metatable to override some of the functionality of tables.\n\n\
    The logic programming language Prolog has features that help to create relationships\
    \ and thereby connections between data, and then look this information up using\
    \ predicates. In the most basic manner, Lua can provide similar functionality.\n\
    \nFirst, here’s an example of how we can create the relationships:\n\n```\n--\
    \ Create the relationships\ncompany(Jayant, OZApps)\nlanguage(CoronaSDK, Lua)\n\
    language(GiderosStudio, Lua)\nlanguage(Moai, Lua)\nlanguage(XCode, ObjectiveC)\n\
    \n-- Query the relationships\nprint(is_language(CoronaSDK, ObjectiveC))\nprint(is_company(Jack,\
    \ OZApps))\nprint(is_company(Jayant, OZApps))\n\n-- additionally\nfather(Vader,\
    \ Luke)\nfather(Vader, Leia)\nbrother(Luke, Leia)\nsister(Leia, Luke)\n\nprint(is_sister(Leia,\
    \ Luke))\nprint(is_sister(Leia, Han))\n```\n\nAll of this can be run from the\
    \ terminal. One of the challenges in this is that Lua does not have commands that\
    \ help associate these relationships; the first thing you will get if you type\
    \ `father(Vader, Luke)` in the terminal window is an error that states that there\
    \ is no global called `father`. This happens because there is no function or variable\
    \ called `father`, `Vader`, or `Luke`. To rectify this situation, we take the\
    \ help of metatables. As described previously, whenever Lua tries to retrieve\
    \ a missing value, it calls the `__index` function. Let’s see what happens when\
    \ we set an `__index` metamethod and try to invoke `father(Vader, Luke)`:\n\n\
    ```\nsetmetatable(_G, {__index =\n    function(tbl, name)\n        print(\"Retrieving\
    \ the variable :\", name)\n    end\n})\n\nwhat(was, this)\n```\n\nNotice that\
    \ we still get an error that the global variable `what` was not found. When we\
    \ access a member from the table, the member is returned, but if the member is\
    \ not present, the `__index` function is used to calculate or determine the data\
    \ to be returned. If there is no `__index` function, then we get the error.\n\n\
    We can rectify that by using `rawset` and making sure that there is a global function\
    \ (if it is not found) similar to an auto-declare, where the variable would get\
    \ declared if not declared already.\n\n```\nsetmetatable(_G, {__index =\n    function(tbl,\
    \ name)\n        print(\"Retrieving the variable :\", name)\n        rawset(tbl,name,{})\n\
    \    end\n})\n\nwhat(was, this)\n```\n\nWhile this should have removed the error,\
    \ we find that this doesn’t rectify the situation, even though a new global variable\
    \ called `what` is declared. This fails because `what` is a table, not a function,\
    \ and we are trying to invoke it like a function.\n\nAn easy way to rectify this\
    \ is to replace the `rawset(tbl, name,{})` with `rawset(tbl, name, function()\
    \ end`. This way, we return a function that can be called without invoking errors\
    \ in Lua. The most important point here is that the `__index` metamethod has to\
    \ return something expected in the context.\n\n```\nsetmetatable(_G, {__index\
    \ =\n    function(tbl, name)\n        print(\"Name :\", name)\n        rawset(tbl,name,function()\
    \ end)\n        return rawget(tbl, name)\n    end\n})\n\nwhat(was, this)\n```\n\
    \nThis is fine; however, since `Vader` and `Luke` are also not defined, we cannot\
    \ have them converted into functions. One logical solution is to identify that\
    \ all variable names starting with a lowercase letter are functions and all uppercase\
    \ names are variables. So, in the case of `father(Vader, Luke)`, `Vader` and `Luke`\
    \ would be variables, while `father` would be a function.\n\n```\nsetmetatable(_G,\
    \ {__index =\n    function(tbl, name)\n         if name:match(\"^[A-Z]\") then\n\
    \            rawset(tbl, name, {} )\n        else\n            rawset(tbl, name,\
    \ function() end)\n        end\n        return rawget(tbl,name)\n    end\n})\n\
    \nwhat(was, this)\n```\n\nNow we are able to create as many relationships as we\
    \ want—the preceding code will check if the words begin with uppercase or lowercase\
    \ letters; if uppercase, then it will create a function, and if not, then it will\
    \ simply create an empty table. However, despite all of this, we still need to\
    \ create relationships between the two elements."
