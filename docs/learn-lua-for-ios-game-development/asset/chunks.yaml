    ## Hello Birdie


    延续我们的 Hello World 示例，接下来我们将把一个图像显示到屏幕上。


    关于 Gideros Studio，需要注意一点：资源放在目录中并不意味着什么；你需要通过添加*新*文件或*现有*文件的方式，将项目中需要的每个文件都添加进来。因此，在应用中使用
    `bird.png` 之前，我们需要先将其添加到项目中。


