    ## 声音工具


    没有声音的游戏是不完整的。即使是最精彩的烟花动画，如果没有伴随的嗖嗖声、砰声、噼啪声和爆裂声，也会显得乏味。作为画面的补充，声音在应用程序的成功中扮演着重要的角色。本节将介绍一些可以帮助您为应用程序创建和处理声音及效果的应用。


    ### Audacity


    * *URL*: [`audacity.sourceforge.net/`](http://audacity.sourceforge.net/)

    * *价格*: 免费

    * *平台*: Mac OS X, Windows


    这是一个开源且跨平台的波形编辑器。它允许以多种方式处理声音文件，包括裁剪、延长、添加效果、减慢或加快播放速度以及改变音高。许多人使用 `Audacity`
    创建用于有声读物的音频文件标记。图 14-29 显示了在 `Audacity` 中编辑的音频波形。


    ![9781430246626_Fig14-29.jpg](img/9781430246626_Fig14-29.jpg)


    图 14-29. 在 `Audacity` 中编辑波形


    ### Bfxr


    * *URL*: [www.bfxr.net/](http://www.bfxr.net/)

    * *价格*: 免费

    * *平台*: 网页浏览器，基于 Adobe Air 的桌面版


    此实用程序允许您创建可通过调整各种参数来操控的 8 位声音。生成的声音可用于您游戏中的各种音效。`Bfxr` 提供了一种非常简单且经济的方式来为您的游戏创建有趣的音效。图
    14-30 显示了 `Bfxr` 的界面以及可为您的音效设置的各种参数。


    ![9781430246626_Fig14-30.jpg](img/9781430246626_Fig14-30.jpg)


    图 14-30. `Bfxr`——用于创建 8 位音效的实用工具


    ### NodeBeat


    * *URL*: [`itunes.apple.com/us/app/nodebeat/id428440804?mt=8`](http://itunes.apple.com/us/app/nodebeat/id428440804?mt=8)

    * *价格*: $0.99

    * *平台*: iOS 4.2+


    `NodeBeat` 是一个在 iOS 上运行的应用，可用于创建随机但有趣的音乐。虽然许多乐器应用需要不同程度的技能和知识来创作音乐，但 `NodeBeat`
    让您可以生成随机音乐，并且可以在应用播放时动态更改。图 14-31 展示了 `NodeBeat` 中的一个作品。该作品可以录制为 `wav` 文件，并通过
    iTunes 或电子邮件导出。还有一个免费的 Flash 版 `NodeBeat`，功能比 iOS 版少，适用于所有 Windows、Mac OS X 和
    Linux 系统。可从 [`nodebeat.com/`](http://nodebeat.com/) 获取。


    ![9781430246626_Fig14-31.jpg](img/9781430246626_Fig14-31.jpg)


    图 14-31. `NodeBeat`，一个允许您以可视化方式创作音乐的 iOS 应用


    ## 总结


    本章介绍了各种第三方工具，它们可以帮助您创建应用或游戏。我介绍的大多数工具都经过了众多开发者的测试（或者是少数适用于特定框架的工具之一）。您还会遇到许多其他可以自己尝试的第三方工具。本章绝非一个详尽的可用工具列表，每天都有更多的工具和实用程序发布。


    ## 第 15 章 示例源代码


    您已经快读完本书了；希望您阅读愉快并学到了很多知识。在本书的第一部分，我向您介绍了 Lua 及其函数；在第二部分，我向您介绍了可用于为 iOS 设备开发的各种基于
    Lua 的框架。本章将提供一个名为 `Chopper Rescue` 的应用程序的完整源代码，您可以将其作为创建自己游戏的基础。

    '
- fmt: "# Chopper Rescue\n\nIn `Chopper Rescue`, you are in control of a rescue chopper,\
    \ with the goal of saving survivors. As your chopper moves, you’ll need to avoid\
    \ various obstacles that can cause you to crash. When survivors appear, your job\
    \ is to collect them. In certain situations, you’ll need to tap the screen to\
    \ shoot bullets; you can only shoot a certain number of bullets at any given time,\
    \ so you must use this feature carefully. The game is controlled using the accelerometer\
    \ on the device.\n\nThis chapter contains details on how the game works. The complete\
    \ source code can be downloaded from the book’s page on `apress.com`. This source\
    \ code is specifically designed for `Corona SDK` and `Gideros Studio` only.\n\n\
    ## Graphics\n\nWhen you begin designing a game, the second thing after coming\
    \ up with a wonderful idea is creating graphics. For the `Chopper Rescue` game,\
    \ I had an idea of what I needed, but not having access to a graphic artist, I\
    \ drew some images by hand and scanned them. [Figure 15-1](#9781430246626_Ch15.xhtml#Fig1)\
    \ shows what I came up with, and [Figure 15-2](#9781430246626_Ch15.xhtml#Fig2)\
    \ shows the resulting sprite sheet.\n\n![9781430246626_Fig15-01.jpg](OEBPS/Images/9781430246626_Fig15-01.jpg)\n\
    \n[Figure 15-1](#9781430246626_Ch15.xhtml#_Fig1). The hand-drawn scanned images\
    \ before being converted into sprites\n\n![9781430246626_Fig15-02.jpg](OEBPS/Images/9781430246626_Fig15-02.jpg)\n\
    \n[Figure 15-2](#9781430246626_Ch15.xhtml#_Fig2). The sprite sheet created for\
    \ the graphics used in `Chopper Rescue`\n\n## Setting Up the Environment\n\nOur\
    \ code will need to constantly calculate positions. Unless we make the app for\
    \ a specific resolution, we will never know what resolutions the app will be running\
    \ at. Therefore, we set up our environment and collect these bits of information,\
    \ which will be useful later and save us from having to calculate them again.\n\
    \nTo get the width and height of the device, you can use the following in `Corona\
    \ SDK`:\n\n```lua\nlocal  _W, _H = display.contentWidth, display.contentHeight\n\
    ```\n\nand the following in `Gideros Studio`:\n\n```lua\nlocal _W, _H = application:getDeviceWidth(),\
    \ application:getDeviceHeight()\n_H, _W = _W, _H\n```\n\n**Note**: Under `Gideros`,\
    \ the height and width of the device is always returned in reference to the Portrait\
    \ orientation. Because this game is going to run in Landscape orientation, we\
    \ need to swap the height and width.\n\nWe also set up a few other variables that\
    \ will be useful throughout the game:\n\n```lua\nlocal MAX_BULLETS = 5   -- the\
    \ maximum number of bullets you can shoot\nlocal MAX_FUEL = 500    -- the amount\
    \ of fuel that you get when you refuel\nlocal MAX_LIVES = 3     -- the maximum\
    \ number of lives\nlocal lives = MAX_LIVES -- the maximum number of tries\nlocal\
    \ fuel = MAX_FUEL   -- the maximum amount of fuel available\nlocal score = 0\n\
    local distance = 0\nlocal hiscore = 0\nlocal collected = 0\nlocal filter = 0.8\n\
    local gameover = false\n```\n\nWe set the following for `Corona SDK`:\n\n```lua\n\
    local NORMAL = 6  -- the normal speed for things that move\nlocal FAST = 12  \
    \ -- the speed of things that move fast\n```\n\nand the following for `Gideros\
    \ Studio`:\n\n```lua\nlocal NORMAL = 3  -- the normal speed for things that move\n\
    local FAST = 6    -- the speed of things that move fast\nlocal TOPLINE = 100 \n\
    local BOTTOMLINE = 500\n\nlocal random = math.random\nlocal floor = math.floor\n\
    local background\n```\n\nWe also set the following for `Corona SDK`:\n\n```lua\n\
    local performAfter = timer.performWithDelay\nbackground = display.newRect(0,0,_W,_H)\n\
    background:setFillColor(255,255,255)\n-- Corona SDK has a black background, so\
    \ we need to have a white rectangle \n-- till it is replaced with a background\
    \ image.\n```\n\nand the following for `Gideros Studio`:\n\n```lua\nlocal performAfter\
    \ = Timer.delayedCall\nlocal bullets = {}      -- container to hold the bullets\
    \ fired\nlocal scenery = {}      -- the objects that make up the scenery\nlocal\
    \ sounds = {}       -- the array that holds all the sounds in it\nlocal restartGame\
    \ = nil -- the handler function\nlocal survivor, tanker\nlocal waiting = 0\nlocal\
    \ baseLine = 578\n\nlocal wTime = 0\nlocal fwait = false\nlocal fx, fy = 0,0\n\
    ```\n\n## Making the Chopper Fly\n\nWith the graphics ready, placing the chopper\
    \ on the screen is an easy task. Keeping with the idea of keeping the app portable,\
    \ we rely on having generic functions that can be swapped out to accommodate another\
    \ framework.\n\nHere’s the code for `Corona SDK`:\n\n```lua\nfunction loadImage(imageName,\
    \ x, y)\n    local x = x or 0\n    local y = y or 0\n    local image = display.newImage(imageName,\
    \ x, y) \n    return image \n end\n```\n\nAnd with `Gideros Studio`, we use the\
    \ following:\n\n```lua\nfunction loadImage(imageName, x, y)\n  local x = x or\
    \ 0\n  local y = y  or 0\n  local image = Bitmap.new(Texture.new(imageName))\n\
    \  stage:addChild(image)\n  image:setPosition(x,y)\n  image.width = image:getWidth()\n\
    \  image.height = image:getHeight()\n  return image\nend\n```\n\nWe simply create\
    \ a generic function called `loadImage` that takes the `imageName` and the `x,y`-coordinates\
    \ and loads the image for us. If you decide to switch your code to another framework,\
    \ you will only need to address this function, and the rest of your code will\
    \ work fine. Using this function, we display our helicopter in the middle of the\
    \ screen:\n\n```lua\nlocal heli = loadImage(\"_chopper.png\", _W/2, _H/2) -- middle\
    \ of the screen\n```\n\nIn order to position our items, as we’ll do later, we\
    \ create a generic function called `position` and pass it the object to position\
    \ followed by the `x,y`-coordinates.\n\nHere’s the code for `Corona SDK`:\n\n\
    ```lua\nfunction position(theObj, x, y)\n  if theObj == nil then return end\n\
    \  theObj:setReferencePoint(display.TopLeftReferencePoint)\n  theObj.x = x\n \
    \ theObj.y = y\nend \n```\n\nAnd here’s the code for `Gideros Studio`:\n\n```lua\n\
    function position(theObj, x, y)\n  if theObj ~= nil then\n    theObj:setPosition(x,y)\n\
    \  end\nend \n```\n\n## Using the Accelerometer\n\nWe can plug into the accelerometer\
    \ to move the helicopter on the screen as follows.\n\nHere’s the code for `Corona\
    \ SDK`:\n\n```lua\nlocal isSimulator = system.getInfo(\"environment\") == \"simulator\"\
    \nlocal _hasAccel = not isSimulator\n```\n\nAnd here’s the code for `Gideros Studio`:\n\
    \n```lua\nrequire (\"accelerometer\")\nlocal _hasAccel = accelerometer:isAvailable()\n\
    if _hasAccel then \n  accelerometer:start()\nend \n```\n\nThere is no function\
    \ equivalent to `accelerometer:start()` in `Corona SDK`. To deal with this, we\
    \ have to set an `EventListener` that listens to the events; the events are then\
    \ fired based on the update frequency set.\n\n```lua\nfunction onAccelerometer(event)\n\
    \  -- capture the events here\nend \nRuntime:addEventListener(\"accelerometer\"\
    , onAccelerometer)\n```\n\n## Moving the Helicopter\n\nNow that we’ve set up the\
    \ accelerometer, we can move the helicopter based on the data returned from the\
    \ accelerometer. We set up an `enterFrame` event that runs 30 or 60 times per\
    \ second (depending on the `fps` setting and the responsiveness of your code).\n\
    \nHere’s the code for `Corona SDK`:\n\n```lua\nRuntime:addEventListener(\"enterFrame\"\
    , update)\n```\n\nAnd here’s the code for `Gideros Studio`:\n\n```lua\nstage:addEventListener(Event.ENTER_FRAME,\
    \ update)\n```\n\nThe `update` is a function defined as follows:\n\n```lua\nfunction\
    \ update(event)\n -- check if the game is over\n  if gameOver == true then return\
    \ end\n  fWait = (wTime > 0)\n  if fWait then\n    wTime = wTime – 0.01\n    if\
    \ wTime < 0 then \n      wTime = 0 \n    end\n    return \n  end\n\nif _hasAccel==true\
    \ then\n    local gx, gy = getAcceleration()\n    fx = gx * filter + fx * (1-filter)\n\
    \    fy = gy * filter + fy * (1-filter)\n    updatePlayer(fx, fy)\n  end\nend\
    \ \n```\n\nWe use the generic function `getAcceleration()` because `Corona SDK`\
    \ returns the acceleration to the function `onAccelerometer`. In `Gideros`, we\
    \ need to poll the data when we need it.\n\nHere’s the code for `Corona SDK`:\n\
    \n```lua\nlocal gpx, gpy, gpz\nfunction onAccelerometer(event)\n  -- capture the\
    \ events here\n  gpx, gpy, gpz = event.xGravity, event.yGravity, event.zGravity\n\
    end \nfunction getAcceleration()\n    return gpx, gpy, gpz\nend\n```\n\nAnd here’s\
    \ the code for `Gideros Studio`"
