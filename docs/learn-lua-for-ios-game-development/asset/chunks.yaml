    \n```\nsprite(\"Planet Cute:Character Boy\", ball.x, ball.y, ball.radius*2)\n\
    ```\n\n并非所有物理函数都在 Codea 中可用。以下列表描述了 Codea 允许我们使用的函数：\n\n*   `body.applyForce`：此函数以向量的形式对物理体施加力。\n\
    *   `body.applyTorque`：此函数对物理体施加扭矩。\n*   `body.destroy`：此函数销毁物理体，之后该物理体将被垃圾回收。\n\
    *   `body.getLinearVelocityFromLocalPoint`：此函数获取物理体在局部空间中某一点的线速度。\n*   `body.getLinearVelocityFromWorldPoint`：此函数获取物理体在世界空间中某一点的线速度。\n\
    *   `body.getLocalPoint`：此函数返回物理体在局部坐标系中的点。\n*   `body.getWorldPoint`：此函数返回物理体在世界坐标系中的点。\n\
    *   `body.testOverlap`：此函数测试物理体是否与给定的物理体相交。\n*   `body.testPoint`：此函数可用于判断一个世界点是否在物理体内部。\n\
    \n## 向量数学\n\nCodea 内置了向量数学功能。向量结构有两种类型：`vec2` 和 `vec3`。`vec2` 结构包含用于二维向量数学的函数，而\
    \ `vec3` 包含用于三维数学的函数。可用的函数类似，但 `vec2` 需要两个参数，而 `vec3` 需要三个参数。\n\n### `angleBetween`\n\
    \n`angleBetween` 函数返回以弧度为单位的夹角。它接受另一个点作为参数，以 `vec2` 点形式计算两点之间的角度。\n\n```\nv1 =\
    \ vec2(100,100)\nangle = math.deg(v1:angleBetween(vec2(100,200)))\nprint(angle)\n\
    ```\n\n### `cross`\n\n`cross` 函数返回两个 `vec2` 类型的叉积。\n\n```\nv1 = vec2(1,1)\nvec\
    \ = v1:cross(vec2(2,5))\nprint(vec)\n```\n\n### `dist`\n\n`dist` 函数返回两个向量之间的距离。\n\
    \n```\nv1 = vec2(1,1)\nvec = v1:dist(vec2(2,5))\nprint(vec)\n```\n\n### `distSqr`\n\
    \n`distSqr` 函数返回两个向量之间的距离的平方。\n\n```\nv1 = vec2(1,1)\nvec = v1:distSqr(vec2(2,5))\n\
    print(vec)\n```\n\n### `dot`\n\n`dot` 函数返回两个向量的点积。\n\n```\nv1 = vec2(1,1)\nvec\
    \ = v1:dot(vec2(2,5))\nprint(vec)\n```\n\n### `len`\n\n`len` 函数返回向量的长度。\n\n```\n\
    v1 = vec2(1,1)\nprint(vec:len())\n```\n\n### `lenSqr`\n\n`lenSqr` 函数返回向量长度的平方。\n\
    \n```\nv1 = vec2(1,1)\nvec = v1:lenSqr()\nprint(vec)\n```\n\n### `normalize`\n\
    \n`normalize` 函数返回向量的归一化版本。\n\n```\nv1 = vec2(1,1)\nvec = v1:normalize()\nprint(vec)\n\
    ```\n\n### `rotate`\n\n`rotate` 函数返回旋转后的向量副本。角度必须以弧度为单位。\n\n```\nv1 = vec2(1,1)\n\
    vec = v1:rotate(math.rad(45))\nprint(vec)\n```\n\n### `rotate90`\n\n`rotate90`\
    \ 函数返回向量旋转 90 度后的副本。\n\n```\nv1 = vec2(1,1)\nvec = v1:rotate90()\nprint(vec)\n\
    ```\n\n## 总结\n\n如本章所述，Codea 是迄今为止唯一一款能在设备本身上运行的 Lua 框架。这使得它成为所有现有框架中最准确的模拟器。其\
    \ API 基于 Processing，涵盖了移动应用开发所需的大部分功能。它还包含一些超出本章范围但在渲染复杂 2D 和 3D 图形时有所帮助的额外功能。其中一个用于实现高级效果的函数是\
    \ `mesh` 对象。\n\n本章还讨论了如何使用 Codea 创建视频和生成声音。Codea 提供对 iPad 硬件的完全访问权限，为您提供 Box2D\
    \ 物理引擎功能的实质性子集，并内置了 2D 和 3D 图形处理能力。借助 Codea 运行时，应用现在可以被编译并上传至 Mac App Store 进行销售。最后，Codea\
    \ 在设备本身上包含了完整的 API 参考和集成开发环境（IDE），使其成为移动开发者随时随地进行开发的绝佳解决方案。\n\n# 第 13 章\n\n##\
    \ 库\n"
- fmt: "# Third-Party Libraries and Tools\n\nWhile these frameworks discussed in this\
    \ book are complete in their own respects, developers always require a little\
    \ bit more. This subtle demand generally translates into libraries and tools that\
    \ are created for internal use. Some people also share these tools and libraries,\
    \ either commercially or under the MIT license. The use of these third-party libraries\
    \ does not undermine the power of these frameworks, but instead works to enhance\
    \ the frameworks further. In this chapter, we shall look at some libraries that\
    \ are useful when developing—some of which can be adapted for use with frameworks\
    \ other than the one they were initially developed for.\n\nThis chapter doesn’t\
    \ present an all-inclusive list of libraries, as there are many talented developers\
    \ that keep creating newer libraries. Many of them are variants of a previous\
    \ library. For example, there are several particle engine libraries for Corona\
    \ SDK, not all of which can be covered.\n\n## Particle Candy\n\n*   *URL*: [www.x-pressive.com/ParticleCandy_Corona/index.html](http://www.x-pressive.com/ParticleCandy_Corona/index.html)\n\
    *   *Price*: € 39.95\n*   *Platforms*: Corona SDK\n\nThis is a popular and extremely\
    \ useful particle generator library written in Lua, from [www.x-pressive.com](http://www.x-pressive.com).\
    \ It is specific to Corona SDK. Because Corona SDK code has to be distributed\
    \ in plain-text form, this is available as full source code, which allows you\
    \ to study the way it works. It is expected that you do not redistribute the code\
    \ or resell it in any modified form. The library comes with several very useful\
    \ and impressive examples. It makes so many effects look easy and abstracts the\
    \ calculations required to achieve them. Apart from standard smoke- and fire-type\
    \ effects, it allows you to create more advanced effects, and provides access\
    \ to things like attractors (as shown in [Figure 13-1](#9781430246626_Ch13.xhtml#Fig1)),\
    \ repellers, and emission shapes.\n\n![9781430246626_Fig13-01.jpg](OEBPS/Images/9781430246626_Fig13-01.jpg)\n\
    \n[Figure 13-1](#9781430246626_Ch13.xhtml#_Fig1) .  Particle Candy emitter running\
    \ the attractor sample\n\n**Note**   [Chapter 14](#9781430246626_Ch14.xhtml) will\
    \ discuss a related tool, Particle Designer, which can be used to visually create\
    \ particle effects and export the settings to Particle Candy.\n\n### Sample Code\n\
    \n```\nParticles.CreateEmitter(\"E1\", screenW*0.05, screenH*0.5, 45, true, true)\n\
    -- DEFINE A PARTICLE TYPE\nParticles.CreateParticleType (\"Test\",\n    {\n  \
    \  imagePath    = \"arrow.png\",\n    imageWidth   = 32,    -- PARTICLE IMAGE\
    \ WIDTH  (newImageRect)\n    imageHeight   = 32,          -- PARTICLE IMAGE HEIGHT\
    \ (newImageRect)\n    velocityStart = 150,   -- PIXELS PER SECOND\n    alphaStart\
    \    = 0,          -- PARTICLE START ALPHA\n    fadeInSpeed   = 2.0,   -- PER\
    \ SECOND\n    fadeOutSpeed  = -1.0,  -- PER SECOND\n    fadeOutDelay  = 3000,\
    \  -- WHEN TO START FADE-OUT\n    scaleStart    = 1.0,   -- PARTICLE START SIZE\n\
    \    weight        = 0,  -- PARTICLE WEIGHT (>0 FALLS DOWN, <0 WILL RISE UPWARDS)\n\
    \    bounceX       = false, -- REBOUND FROM SCREEN LEFT & RIGHT BORDER\n    bounceY\
    \       = false, -- REBOUND FROM SCREEN TOP & BOTTOM BORDER\n    bounciness  \
    \  = 0.75,  -- REBOUND ENERGY\n    emissionShape = 0,          -- 0 = POINT, 1\
    \ = LINE, 2 = RING, 3 = DISC\n    emissionRadius= 140,   -- SIZE / RADIUS OF EMISSION\
    \ SHAPE\n    killOutsideScreen  = true,       -- PARENT LAYER MUST NOT BE NESTED\
    \ OR ROTATED!\n    lifeTime      = 4000,       -- MAX. LIFETIME OF A PARTICLE\n\
    \    autoOrientation    = true,       -- AUTO-ROTATE INTO MOVEMENT DIRECTION\n\
    \    useEmitterRotation = true,       --INHERIT EMITTER'S CURRENT ROTATION\n \
    \       } )\n\n-- FEED EMITTERS\n-- (EMITTER NAME, PARTICLE TYPE NAME, EMISSION\
    \ RATE, DURATION, DELAY)\nParticles.AttachParticleType(\"E1\", \"Test\", 10, 9999,0)\n\
    -- TRIGGER THE EMITTERS\nParticles.StartEmitter(\"E1\")\nlocal Emitter1 = Particles.GetEmitter(\"\
    E1\")\n-- ATTRACTION FIELD\nParticles.CreateFXField(\"A1\", 0, screenW*0.5,screenH*0.5,\
    \ 1.5, 140, true)\n```\n\n## Text Candy\n\n*   *URL*: [www.x-pressive.com/TextCandy_Corona/index.html](http://www.x-pressive.com/TextCandy_Corona/index.html)\n\
    *   *Price*: €39.95\n*   *Platforms*: Corona SDK\n\nThis is another offering by\
    \ X-Pressive.com, which works with text. It offers special effects that can be\
    \ used to rotate, animate, and otherwise play with text (see [Figure 13-2](#9781430246626_Ch13.xhtml#Fig2)).\
    \ For example, it can be used to create ‘80s-style sine-scrollers with literally\
    \ one line of code.\n\n![9781430246626_Fig13-02.jpg](OEBPS/Images/9781430246626_Fig13-02.jpg)\n\
    \n[Figure 13-2](#9781430246626_Ch13.xhtml#_Fig2) .  Text Candy animating text\n\
    \nThe code that runs the preceding animation is pretty simple, and is shown following:\n\
    \n### Sample Code\n\n```\nlocal MyText = TextCandy.CreateText({\n    fontName\
    \    = \"FONT1\",\n    x           = screenW*.5,\n    y           = screenH*.5,\n\
    \    text        = \"ARE YOU READY TO ROCK? \",\n    originX     = \"CENTER\"\
    ,\n    originY     = \"CENTER\",\n    textFlow    = \"CENTER\",\n    charSpacing\
    \ = -5,\n    lineSpacing = -4,\n    showOrigin  = false,\n    })\n\nMyText:applyDeform({\n\
    \    type          = TextCandy.DEFORM_CIRCLE,\n    radius        = 120,\n    autoStep\
    \      = true,\n    ignoreSpaces  = false,\n    })\n\nMyText:applyAnimation({\n\
    \    startNow        = true,\n    restartOnChange = true,\n    charWise      \
    \  = true,\n    frequency       = 60,\n    alphaRange      = 0.5,\n    })\n```\n\
    \n## Widget Candy\n\n*   *URL*: [www.x-pressive.com/WidgetCandy_Corona/index.html](http://www.x-pressive.com/WidgetCandy_Corona/index.html)\n\
    *   *Price*: € 39.95\n*   *Platforms*: CoronaSDK\n\nThis is a third offering from\
    \ X-Pressive.com. This library deals with creating GUIs using visual elements.\
    \ It has functionality for using themes, which means that you can not only create\
    \ custom widgets, but you can *skin* them (change their appearance) on the fly.\
    \ It provides for most of the commonly used widgets, including list boxes, radio\
    \ buttons, check boxes, buttons, and sliders. One of the salient features of Widget\
    \ Candy is its ability to scale widgets. You can set the widget to be a percentage\
    \ (as in HTML) so that if you run it on a different device, the display element\
    \ will scale accordingly. This feature eliminates having to design your UI specifically\
    \ for every new device. [Figure 13-3](#9781430246626_Ch13.xhtml#Fig3) displays\
    \ some of the UI elements that can be created using Widget Candy.\n\n![9781430246626_Fig13-03.jpg](OEBPS/Images/9781430246626_Fig13-03.jpg)\n\
    \n[Figure 13-3](#9781430246626_Ch13.xhtml#_Fig3) .  Widget Candy, displaying various\
    \ widgets on the device\n\n### Sample Code\n\n```\n_G.GUI.NewList(\n    {\n  \
    \  x            = \"center\",\n    y            = \"center\",\n    width     \
    \   = \"80%\",\n    height       = \"90%\",\n    scale        = _G.GUIScale,\n\
    \    parentGroup  = nil,\n    theme        = \"theme_1\",\n    name         =\
    \ \"LST_MAIN\",\n    caption      = \"WIDGET CANDY SAMPLES:\",\n    list     \
    \    = ListData,\n    allowDelete  = false,\n    readyCaption = \"Quit Editing\"\
    ,\n    border       = {\"shadow\", 8,8, 64},\n    onSelect     = function(EventData)\
    \ _G.LoadSample(EventData) end,\n    } )\n```\n\n## Corona AutoLAN\n\n*   *URL*:\
    \ [www.mydevelopersgames.com/AutoLAN/](http://www.mydevelopersgames.com/AutoLAN/)\n\
    *   *Price*: Free\n*   *Platforms*: Corona SDK\n\nThis library is a Lua sockets\
    \ implementation that allows for multiplayer communication over wireless using\
    \ a combination of UDP and TCP socket communications. It features automatic network\
    \ discovery and integration, which can be achieved with just a couple of lines\
    \ of code. Because AutoLan uses plain Lua socket communications, it can be adapted\
    \ to work with frameworks other than Corona SDK. It also has file transfer and\
    \ flow control functionality.\n\n### Sample Code\n\n```\nlocal client = require\
    \ \"Client\"\nclient:start()\nclient:autoconnect()\n```\n\nOn the server side,\
    \ it is as simple as this:\n\n```\nlocal server = require \"Server\"\nserver:start()\n\
    ```\n\nAnd transferring files is as easy as this:\n\n```\nclient:sendFile(filename,\
    \ srcPath, destFile)\n```\n\n## Corona Profiler"
  raw: 'While these frameworks discussed in this book are complete in their own respects,
    developers always require a little bit more. This subtle demand generally translates
    into libraries and tools that are created for internal use. Some people also share
    these tools and libraries, either commercially or under the MIT license. The use
    of these third-party libraries does not undermine the power of these frameworks,
    but instead works to enhance the frameworks further. In this chapter, we shall
    look at some libraries that are useful when developing—some of which can be adapted
    for use with frameworks other than the one they were initially developed for.


    This chapter doesn’t present an all-inclusive list of libraries, as there are
    many talented developers that keep creating newer libraries. Many of them are
    variants of a previous library. For example, there are several particle engine
    libraries for Corona SDK, not all of which can be covered.


    Particle Candy


    *   *URL*: [www.x-pressive.com/ParticleCandy_Corona/index.html](http://www.x-pressive.com/ParticleCandy_Corona/index.html)

    *   *Price*: € 39.95

    *   *Platforms*: Corona SDK


    This is a popular and extremely useful particle generator library written in Lua,
    from [www.x-pressive.com](http://www.x-pressive.com). It is specific to Corona
    SDK. Because Corona SDK code has to be distributed in plain-text form, this is
    available as full source code, which allows you to study the way it works. It
    is expected that you do not redistribute the code or resell it in any modified
    form. The library comes with several very useful and impressive examples. It makes
    so many effects look easy and abstracts the calculations required to achieve them.
    Apart from standard smoke- and fire-type effects, it allows you to create more
    advanced effects, and provides access to things like attractors (as shown in [Figure
    13-1](#9781430246626_Ch13.xhtml#Fig1)), repellers, and emission shapes.


    ![9781430246626_Fig13-01.jpg](OEBPS/Images/9781430246626_Fig13-01.jpg)


    [Figure 13-1](#9781430246626_Ch13.xhtml#_Fig1) .  Particle Candy emitter running
    the attractor sample


    **Note**   [Chapter 14](#9781430246626_Ch14.xhtml) will discuss a related tool,
    Particle Designer, which can be used to visually create particle effects and export
    the settings to Particle Candy.


    Sample Code


    ```

    Particles.CreateEmitter("E1", screenW*0.05, screenH*0.5, 45, true, true)

    -- DEFINE A PARTICLE TYPE

    Particles.CreateParticleType ("Test",

        {

        imagePath    = "arrow.png",

        imageWidth   = 32,    -- PARTICLE IMAGE WIDTH  (newImageRect)

        imageHeight   = 32,          -- PARTICLE IMAGE HEIGHT (newImageRect)

        velocityStart = 150,   -- PIXELS PER SECOND

        alphaStart    = 0,          -- PARTICLE START ALPHA

        fadeInSpeed   = 2.0,   -- PER SECOND

        fadeOutSpeed  = −1.0,  -- PER SECOND

        fadeOutDelay  = 3000,  -- WHEN TO START FADE-OUT

        scaleStart    = 1.0,   -- PARTICLE START SIZE

        weight        = 0,  -- PARTICLE WEIGHT (>0 FALLS DOWN, <0 WILL RISE UPWARDS)

        bounceX       = false, -- REBOUND FROM SCREEN LEFT & RIGHT BORDER

        bounceY       = false, -- REBOUND FROM SCREEN TOP & BOTTOM BORDER

        bounciness    = 0.75,  -- REBOUND ENERGY

        emissionShape = 0,          -- 0 = POINT, 1 = LINE, 2 = RING, 3 = DISC

        emissionRadius= 140,   -- SIZE / RADIUS OF EMISSION SHAPE

        killOutsideScreen  = true,       -- PARENT LAYER MUST NOT BE NESTED OR ROTATED!

        lifeTime      = 4000,       -- MAX. LIFETIME OF A PARTICLE

        autoOrientation    = true,       -- AUTO-ROTATE INTO MOVEMENT DIRECTION

        useEmitterRotation = true,       --INHERIT EMITTER''S CURRENT ROTATION

            } )


    -- FEED EMITTERS

    -- (EMITTER NAME, PARTICLE TYPE NAME, EMISSION RATE, DURATION, DELAY)

    Particles.AttachParticleType("E1", "Test", 10, 9999,0)

    -- TRIGGER THE EMITTERS

    Particles.StartEmitter("E1")

    local Emitter1 = Particles.GetEmitter("E1")

    -- ATTRACTION FIELD

    Particles.CreateFXField("A1", 0, screenW*0.5,screenH*0.5, 1.5, 140, true)

    ```


    Text Candy


    *   *URL*: [www.x-pressive.com/TextCandy_Corona/index.html](http://www.x-pressive.com/TextCandy_Corona/index.html)

    *   *Price*: €39.95

    *   *Platforms*: Corona SDK


    This is another offering by X-Pressive.com, which works with text. It offers special
    effects that can be used to rotate, animate, and otherwise play with text (see
    [Figure 13-2](#9781430246626_Ch13.xhtml#Fig2)). For example, it can be used to
    create ‘80s-style sine-scrollers with literally one line of code.


    ![9781430246626_Fig13-02.jpg](OEBPS/Images/9781430246626_Fig13-02.jpg)


    [Figure 13-2](#9781430246626_Ch13.xhtml#_Fig2) .  Text Candy animating text


    The code that runs the preceding animation is pretty simple, and is shown following:


    Sample Code


    ```

    local MyText = TextCandy.CreateText({

        fontName    = "FONT1",

        x           = screenW*.5,

        y           = screenH*.5,

        text        = "ARE YOU READY TO ROCK? ",

        originX     = "CENTER",

        originY     = "CENTER",

        textFlow    = "CENTER",

        charSpacing = −5,

        lineSpacing = −4,

        showOrigin  = false,

        })


    MyText:applyDeform({

        type          = TextCandy.DEFORM_CIRCLE,

        radius        = 120,

        autoStep      = true,

        ignoreSpaces  = false,

        })


    MyText:applyAnimation({

        startNow        = true,

        restartOnChange = true,

        charWise        = true,

        frequency       = 60,

        alphaRange      = 0.5,

        })

    ```


    Widget Candy


    *   *URL*: [www.x-pressive.com/WidgetCandy_Corona/index.html](http://www.x-pressive.com/WidgetCandy_Corona/index.html)

    *   *Price*: € 39.95

    *   *Platforms*: CoronaSDK


    This is a third offering from X-Pressive.com. This library deals with creating
    GUIs using visual elements. It has functionality for using themes, which means
    that you can not only create custom widgets, but you can *skin* them (change their
    appearance) on the fly. It provides for most of the commonly used widgets, including
    list boxes, radio buttons, check boxes, buttons, and sliders. One of the salient
    features of Widget Candy is its ability to scale widgets. You can set the widget
    to be a percentage (as in HTML) so that if you run it on a different device, the
    display element will scale accordingly. This feature eliminates having to design
    your UI specifically for every new device. [Figure 13-3](#9781430246626_Ch13.xhtml#Fig3)
    displays some of the UI elements that can be created using Widget Candy.


    ![9781430246626_Fig13-03.jpg](OEBPS/Images/9781430246626_Fig13-03.jpg)


    [Figure 13-3](#9781430246626_Ch13.xhtml#_Fig3) .  Widget Candy, displaying various
    widgets on the device


    Sample Code


    ```

    _G.GUI.NewList(

        {

        x            = "center",

        y            = "center",

        width        = "80%",

        height       = "90%",

        scale        = _G.GUIScale,

        parentGroup  = nil,

        theme        = "theme_1",

        name         = "LST_MAIN",

        caption      = "WIDGET CANDY SAMPLES:",

        list         = ListData,

        allowDelete  = false,

        readyCaption = "Quit Editing",

        border       = {"shadow", 8,8, 64},

        onSelect     = function(EventData) _G.LoadSample(EventData) end,

        } )

    ```


    Corona AutoLAN


    *   *URL*: [www.mydevelopersgames.com/AutoLAN/](http://www.mydevelopersgames.com/AutoLAN/)

    *   *Price*: Free

    *   *Platforms*: Corona SDK


    This library is a Lua sockets implementation that allows for multiplayer communication
    over wireless using a combination of UDP and TCP socket communications. It features
    automatic network discovery and integration, which can be achieved with just a
    couple of lines of code. Because AutoLan uses plain Lua socket communications,
    it can be adapted to work with frameworks other than Corona SDK. It also has file
    transfer and flow control functionality.


    Sample Code


    ```

    local client = require "Client"

    client:start()

    client:autoconnect()

    ```


    On the server side, it is as simple as this:


    ```

    local server = require "Server"

    server:start()

    ```


    And transferring files is as easy as this:


    ```

    client:sendFile(filename, srcPath, destFile)

    ```


