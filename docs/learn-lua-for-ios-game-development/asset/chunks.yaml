    \ - 1\nend\n```\n\n### 对物体应用摩擦力\n\n在屏幕上移动物体的最简单方法是让物体以恒定速度移动（即，随时间以相同值增加或减少轴坐标值）。当然，这种行为是非常不真实的。例如，在现实世界中，当箱子被推着穿过大厅时，它开始时移动得很快，然后逐渐变慢，直到最终停止。许多开发者喜欢的一个捷径是使用物理对象；这确实可行，但我们也可以通过一点数学运算，在不使用物理对象的情况下模拟摩擦力。\n\
