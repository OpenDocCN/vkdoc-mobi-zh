    ```


    **Note**   When we set the x- and y-coordinates, this is generally the upper-left
    corner position, so the image is not exactly centered on the x, y coordinates.


    ![9781430246626_Fig11-07.jpg](OEBPS/Images/9781430246626_Fig11-07.jpg)


    Figure 11-7 .  The screen coordinates in LÖVE


    Drawing Primitives


    Now that we’ve played around a bit with some images, we’ll look at vector art—rectangles,
    circles, and so on. In many games, these primitives can help create the backdrops
    without the added overhead of additional graphics images.


    Lines


    The simplest of all vector-drawing objects are lines. A line is a series of points
    that are joined between two points. The syntax for drawing a line is


    ```

    love.graphics.line(x1, y1, x2, y2,...)

    ```


    You can specify a series of points and they will all be drawn. A line object can
    also be modified via the LineWidth and LineStyle attributes, either individually,
    as love.graphics.setLineWidth and love.graphics.setLineStyle, or at once, as love.graphics.setLine(width,
    type). In the code below, we set the line width to 2 and use the smooth type;
    we then draw a line from 15, 15 to 70, 90.


    ```

    love.graphics.setLine(2,"smooth")

    love.graphics.line(15, 15, 70,90)

    ```


    Rectangles


    This is the syntax for drawing a rectangle:


    ```

    love.graphics.rectangle( mode, x, y, width, height )

    ```


    mode can be either fill, which will fill the rectangle, or line, which will display
    the rectangle with an outline and no fill.


    In this example, we’ll put the concept of rectangles to work by drawing chessboard.
    The first thing about a chessboard is that it has squares of alternating color
    and is generally 8×8 squares in size.


    ```

    local _W, _H = love.graphics.getWidth(), love.graphics.getHeight()

    local smaller = math.min(_W, _H)

    local tileSize = math.floor(smaller/10)  -- To allow for spacing above and below


    function love.load()

        love.graphics.setColor(0,0,0,255)

        love.graphics.setBackgroundColor(255,255,255)

    end


    function drawBoard()

      local mode = 1

      for i = 1, 8 do

        for j = 1, 8 do

          if mode ==1 then

            theMode = "fill"

          else

            theMode = "line"

          end

          mode = 1 - mode

          love.graphics.rectangle(theMode, j*tileSize, i*tileSize, tileSize, tileSize)

        end

       mode = 1 - mode

      end

    end

    function love.draw()

      drawBoard()

    end

    ```


    The code is quite straightforward; we are just toggling fill and line by simply
    using the fact that 1 – 1 = 0 and 1 – 0 = 1, so 1 - mode will help us toggle the
    number held in mode between 0 and 1\. Then, using an if statement, we set theMode
    to fill if the value of mode is 1 or line if the value of mode is 0\. Because
    we are dealing with an even number of squares, at the end of the inner loop, the
    value of mode will again be what we started with, so we do a toggle once again.
    That way, the next line will start with the alternate mode, hence the alternating
    pattern. To see what would happen if we did not do that, comment out mode = 1
    - mode after the rectangle function and see what the code renders.


    Circles


    The syntax for the function to draw a circle is


    ```

    love.graphics.circle(mode, x, y, radius, segments)

    ```


    mode, as before, is either fill or line, x and y are the center points, and radius
    is the size of the circle. The default number of segments is 10, which draws a
    jagged circle, good for debugging or for systems that have low resources. For
    smooth good quality circles, the number of segments recommended are 100.


    Let’s try animating some circles:


    ```

    local circles = {}

    function love.mousepressed(x, y, button)

      if button == "l" then

        newCircle = {

          size = 0,

          n = 20,

          x = x,

          y= y

          }

        table.insert(circles, newCircle)

      end

    end

    function love.update(dt)

      for _, c1 in pairs(circles) do

        c1.size = c1.size + c1.n * dt

      end

    end


    function love.keypressed(key)

      if key == " " then

        circles = {}

      end

    end

    function love.draw()

      for _, c in pairs(circles) do

        love.graphics.circle( "line", c.x, c.y, c.size, 100)

      end

    end

    ```


    This code makes the circles grow indefinitely. However, we can set a limit for
    the maximum and minimum size of the circles.


    Let’s choose a maximum of 20 and a minimum of 0\. To do this, we just need to
    change the update function, as follows:


    ```

    function love.update(dt)

      for _, c1 in pairs(circles) do

        c1.size = c1.size + c1.n * dt

        if c1.size < 0 then

          c1.size = 0

          c1.n = c1.n * -1

        elseif c1.size > 20 then

          c1.size = 20

          c1.n = c1.n * -1

        end

      end

    end

    ```


    Polygons


    Polygons are drawn using the function love.graphics.polygon, which has the following
    syntax:


    ```

    love.graphics.polygon(mode, vertices)

    ```


    The vertices make up a table with the points to draw the shape. The following
    example draws a triangle pointing downward:


    ```

    love.graphics.polygon ("fill", 100,100,200,100,150,200)

    ```


    **Note**   If you are using fill mode, the polygons must be convex and simple;
    otherwise, they can produce rendering artifacts.


    Quads


    We can also draw a quadrilateral shape (a four-sided polygon) by using the love.graphics.quad
    function. The syntax is


    ```

    love.graphics.quad( mode, x1, y1, x2, y2, x3, y3, x4, y4 )

    ```


    Though quads may seem just like polygons, they can be used for different purposes—for
    example, to copy a portion of a specified image onto the screen. You can create
    an animation from a series of images all stored on one image (texture), and then
    use the quads to help you display portions of the image.


    We can create a quad using the newQuad function and then draw it on the screen
    using the drawq function. This can be very useful for creating animation sheets.


    ![9781430246626_Fig11-08.jpg](OEBPS/Images/9781430246626_Fig11-08.jpg)


    Figure 11-8 .  Sprite sheet to be used for animating the stick figure (courtesy
    of Bonzo Industries; [http://bonzo_industries.webs.com/sprites.htm](http://bonzo_industries.webs.com/sprites.htm))


    ```

    lg = love.graphics

    sheet = lg.newImage("stick.png")

    wd, ht = sheet:getWidth(), sheet:getHeight()

    frameCount = 11

    frameSpeed = 5

    tileWd, tileHt = 39, 62

    delay = 0

    curr = 1

    scale = 2

    frames = {}

    function love.load()

       for i=1, frameCount do

        frames[i] = lg.newQuad((i-1)*tileWd, 0, tileWd, tileHt)

      end

    end

    function love.draw()

      lg.drawq(sheet, frames[curr], (_W-(tileWd*scale))/2, (_H-(tileHt*scale))/2,
    0, scale, scale)

    end

    function love.update(dt)

      delay = delay + 1

      if delay > frameSpeed then

        delay = 0

       curr = curr + 1

       if curr > frameCount then curr = 1 end

      end

    end

    ```


    In our love.load function, we create and store the quads, representing each frame.
    This helps in achieving speed and efficiency. We can simply draw any frame in
    the sequence after that by simply referencing the quad as stored in the table.
    To get the fourth frame, we simply reference the fourth quad (i.e., frames[4]).
    In our drawq function, we are multiplying tileWd and tileHt by the scale value
    and also passing the scale as a parameter. This helps to create the animation
    at the specified scale, which is double in our case (i.e., 2).'
