    ## Drawing Shapes


    Gideros Studio also has a `Shape` object, which you might use when you want to
    create vector shapes like lines, rectangles, and so on. Drawing shapes in Gideros
    is based on the same principles as drawing on a `deviceContext` in many other
    languages. This section will help you get started by describing how to create
    lines and rectangles, as well as how to fill shapes.


    ### Lines


    Lines are the simplest shapes to draw. A line is basically defined as four points:
    a starting `x,y`-coordinate and an ending `x,y`-coordinate. The line joins these
    two points.


    ```

    function newLine(x1, y1, x2, y2)

      local obj = Shape.new()

      obj:setLineStyle(2, 0x000000)

      obj:beginPath()

      obj:moveTo(x1, y1)

      obj:lineTo(x2, y2)

       obj:endPath()

      stage:addChild(obj)

      return obj

    end

    ```


    To draw the line, we call the function as follows:


    ```

    local line = newline(10,10,250,50)

    ```


    This creates a line from `10, 10` to `250, 50` with a width of 2 pixels. We can
    set the line width and the color with the `setLineStyle` function. We could extend
    that function to also include a width and color, which could default to the standard
    values of 1 for the width and `0x000000` for the color.


    ```

    function newLine(x1, y1, x2, y2, lineWidth, lineColour)

      local lineWidth = lineWidth or 1

      local lineColour = lineColour or 0x000000

      local obj = Shape.new()

      obj:setLineStyle(lineWidth, lineColour)

      obj:beginPath()

      obj:moveTo(x1, y1)

      obj:lineTo(x2, y2)

       obj:endPath()

      stage:addChild(obj)

      return obj

    end

    ```


    Now we can draw a line in pretty much the same way as earlier, but also choose
    our own line width and color, like so:


    ```

    local line = newLine(10, 10, 250, 50, 4, 0x00FFFF)

    ```


    ### Rectangles


    A rectangle is a slightly modified form of a line. It is made up of four lines,
    and also includes a fill color. If we don’t pass a parameter for the fill color,
    the rectangle will have an outline; otherwise, it will be filled in with the color
    passed. [Figure 9-13](#9781430246626_Ch09.xhtml#Fig13) shows an example of the
    each.


    ```

    function newRectangle(x1, y1, x2, y2, lw, lc, fc)

      local obj = Shape.new()

      local lw = lw or 1

      local lc = lc or 0x000000

      obj:beginPath()

      obj:setLineStyle(lw, lc)

      if fc then

        obj:setFillStyle(Shape.SOLID, fc)

      end

      obj:moveTo(x1,y1)

      obj:lineTo(x2, y1)

      obj:lineTo(x2, y2)

      obj:lineTo(x1, y2)

      obj:lineTo(x1, y1)

      obj:closePath()

      obj:endPath()

      stage:addChild(obj)

      return obj

    end


    newRectangle(10,10,200,50,1,0x0000FF)

    newRectangle(100,150,250,250,1,nil, 0xFF0000)

    ```


    ![9781430246626_Fig09-13.jpg](OEBPS/Images/9781430246626_Fig09-13.jpg)


    [Figure 9-13](#9781430246626_Ch09.xhtml#_Fig13).  An outlined rectangle (top)
    and a filled one (bottom)


    **Note**: Note that there is an issue with the preceding code. Although it gives
    the results expected, if you try to reposition the rectangle, it will be a few
    pixels off. This is mainly because we are drawing the lines on the shape with
    respect to its position. What we should rather be doing is drawing everything
    at the position `0, 0` and then moving the shape to the starting `x,y`-coordinates.


    ### Filled Shapes


    Gideros Studio allows for filling shapes with either a solid color or an image.
    This can help for some interesting results like creating an image mask or seamlessly
    filled textures. Here’s some example code for filling a shape with an image:'
