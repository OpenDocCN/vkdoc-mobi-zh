    end\n```\n\n这段代码在 Lua 终端中运行时是响应式的，但在某些框架上运行时可能会非常不稳定，因为它会在运行循环时占用大量 CPU（类似于应用程序冻结）。这是一个很好的例子，说明协程如何提供帮助。\n\
    \n我们有一个协程函数，它运行从 1 到 100,000 的代码。每次调用此协程时，它都会迭代到下一个数字并返回（yield）。我们设置了另一个循环，不断调用此代码，直到协程状态变为\
