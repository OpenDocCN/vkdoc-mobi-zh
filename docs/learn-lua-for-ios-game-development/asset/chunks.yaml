    \n## 使用 JSON\n\nMoai 对 JSON 提供了很好的支持。要解码或编码 JSON 字符串，可以使用`MOAIJsonParser`对象。它只有两个函数：`encode`和`decode`。`decode`函数接受一个\
    \ JSON 字符串并将其转换为表层级结构，而`encode`则将表层级结构转换为 JSON 字符串。\n\n```\nlocal test = {name=\"\
