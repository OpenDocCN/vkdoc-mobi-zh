    Gyroscope


    All new iOS devices have gyroscopes that can be read from the device. First, we
    use the require "gyroscope" command, which creates a variable called gyroscope
    that is of the Gyroscope class.


    The data from the gyroscope is read using the getRotationRate function, which
    returns the rate of rotation in radians.


    ```

    require "gyroscope"

    gyroscope:start()

    local angx, angy, angz = 0,0,0

    function onEnterFrame(event)

        local x, y, z = gyroscope:getRotationRate()


    angx = angx + x * event.deltaTime

        angy = angy + y * event.deltaTime

        angz = angz + z * event.deltaTime


    print(angx * 180 / math.pi, angy * 180 / math.pi, angz * 180 / math.pi)

    end

    stage:addEventListener("enterFrame", onEnterFrame)

    ```


    Physics


    Gideros Studio offers a wrapper on Box2D for using physics. To use physics in
    Gideros Studio, you use require "box2d", and that creates a local variable called
    b2 that is of type Box2D, and offers all of the physics-related functions.


    The next thing that you need to do is create a physics world in which the physics
    objects will reside. The following code shows an example.


    **Note**   In Gideros Studio, physics objects need to be updated to allow the
    dynamic physics bodies to be updated; typically this is done using an enter_frame
    event.


    ```

    require "box2d"


    local world = b2.World.new( 0 , 9.8) -- Set the gravity

    local ground = world:createBody({})


    local shape = b2.EdgeShape.new(0, 480, 320, 480)

    shape:set(−20, 290, 620, 290)

    ground:createFixture({shape = shape, density = 0})


    local shape = b2.PolygonShape.new()

    shape:setAsBox(10,10)

    local fixture = {shape = shape, density = 1, friction = 0.3}


    local x, y = 100, 10

    bodyD = {type = b2.DYNAMIC_BODY, position={x=x, y=y}}

    body = world:createBody(bodyD)

    body:createFixture(fixture)


    function onEnterFrame()

      world:step(1/60, 8, 3)

    end


    stage:addEventListener(Event.ENTER_FRAME, onEnterFrame)

    ```


    When you run the program, notice that nothing happens. This is because we need
    to place an object on the screen that is updated as the physics body moves.


    So, we can add an image that shall represent this physics body and also update
    it on the screen.


    ```

    local img = Bitmap.new(Texture.new("image2.png"))

    img:setAnchorPoint(0.5,0.5)

    stage:addChild(img)

    ```


    Then we redefine the onEnterFrame function as follows:


    ```

    function onEnterFrame()

      world:step(1/60, 8, 3)

      img:setPosition(body:getPosition())

    end

    ```


    The image is displayed centered where the dynamic body is. The world:step function
    updates the body and takes three parameters. The first is timeStep, which determines
    the steps. The other two parameters are velocityIterations and positionIterations.
    The number of iterations for both velocity and position define how many calculations
    are needed to determine the next velocity and position of the physics body.


    Plug-Ins


    One advantage of Gideros Studio is that you can create your own plug-ins, thereby
    extending its functionality by introducing features that it doesn’t currently
    have.


    **Note**   The BhWax plug-in (discussed in [Chapter 13](#9781430246626_Ch13.xhtml))
    provides complete access to the iOS API and you can use it to create UIWindows,
    UIViews, UIKit objects, practically everything that the Apple API offers.


    The structure of a Gideros plug-in stub looks like this:


    ```

    #include "gideros.h"

    #include "lua.h"

    #include "lauxlib.h"


    static int myFunc(lua_State *L)

    {

      int first  = lua_tointeger(L, -1);

      int second = lua_tointeger(L, -2);

      int result = first + second;


    lua_pushinteger(L, result);

      return 1;

    }


    static int luaMy_func(lua_State *L)

    {

      const luaL_Reg functionlist[] = {

        {"myFunc", myFunc},

        {NULL, NULL},

      };

      luaL_register(L, "myPlugin", functionlist);

    }


    static void g_initializePlugin(lua_State *L)

    {

      lua_getglobal(L, "package");

      lua_getfield(L, -1, "preload");


    lua_pushcfunction(L, luaMy_func);

      lua_setfield(L, -2, "test");


    lua_pop(L, 2);

    }


    static void g_deinitializePlugin(lua_State *L) {

    }


    REGISTER_PLUGIN("Test", "1.0")

    ```


    These plug-ins  can be written in C++, Objective-C, or C. First, we include the
    headers of the libraries that we need—namely gideros.h, which has the entry point
    to the Gideros Engine; lua.h, which gives us access to the Lua functions; and
    luaxlib.h, which provides the Lua interface functions.


    We need to write two functions and a macro to register our plug-ins.


    g_initializePlugIn is the entry point that initializes the plug-in for the first
    time and g_deinitializePlugin is called when Lua does not require the plug-in
    any more—for example, when it is unloaded. The macro REGISTER_PLUGIN is used to
    register the plug-in to be available for use in Gideros Studio.


    When we initialize the plug-in, we use the package.preload function and load the
    function that we need. In the preceding sample code, we initialize the plug-in
    by invoking the luaMy_func function.


    In Gideros Studio, to use this plug-in in Lua code we need to first require the
    library:


    ```

    require "test"

    local result = Test.myFunc(10,20)

    print("The sum is : ", result)

    ```


    To write the code for plug-ins, read up on the Lua C API found at [http://www.lua.org/manual/5.2/manual.html#4](http://www.lua.org/manual/5.2/manual.html#4)).
    Plug-ins are similar to Lua bytecode commands, and C code can be mixed with the
    Lua C API.


    The following Lua code


    ```

    a = f("how", t.x, 14)

    ```


    when written in the Lua C API, this looks like:


    ```

    lua_getglobal(L, "f");

    lua_pushstring(L, "how");

    lua_getglobal(L, "t");

    lua_getfield(L, -1, "x");

    lua_remove(L, -2);

    lua_pushinteger(L, 14);

    lua_call(L, 3, 1);

    lua_setglobal(L, "a");

    ```


    **Note**   More detailed information can be found on the Lua web site ([http://www.lua.org](http://www.lua.org)).
    Since C-related code is somewhat out of the scope of this book, I won’t cover
    this in detail.


    When you want to use the plug-in, you need to add it to the Gideros Player (while
    testing) or to Xcode and compile it in the final build. For the desktop player,
    the code needs to be compiled and present in the directory as a dynamic library
    (.dylib).


    If you plan to distribute a plug-in for other users, it would need to be built
    as a library. The required files are


    *   .dll for the Windows desktop player

    *   .dylib for the Mac desktop player

    *   .so for the android device player

    *   .a for the iOS device player


    **Note**   The choice of language also determines the platforms the plug-in can
    be used on. A plug-in written in C or C++ can be used on both iOS and Android
    devices. A plug-in written in Java can be used only on Android, and a plug-in
    written in Objective-C can be used only on iOS.


    Summary


    Gideros Studio is a package that comes complete on both Windows and Mac OS X and
    includes a range of tools to help develop and test applications. If the framework
    does not fulfill your expectations, or if you want to extend your application
    by adding some additional code (e.g., C, C++, Objective-C, or Java), you can do
    this by using the Lua API bridge and wrapping the code in a plug-in. Gideros Studio
    is a growing framework with a growing community. The framework is very similar
    to ActionScript, and hence it is an easy move for ActionScript 3 developers. Where
    Corona SDK positions itself as an easy-to-use framework (which it is), Gideros
    Studio fills the gaps providing the plug-in. While a simple task like displaying
    an image on the screen is a bit involved with Gideros Studio, it has the advantage
    of letting you keep a library of functions that allow for simpler usage, as in
    the examples in this chapter.


    Chapter     10


    Moai'
