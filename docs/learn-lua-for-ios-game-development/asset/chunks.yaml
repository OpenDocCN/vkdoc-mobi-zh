    Compared to Corona SDK and Gideros Studio, this may seem a bit excessive for displaying
    an image on the screen. This is the reason why Moai is known as the tool for *professional*
    developers. It offers low-level access to a very rich API. However, that does
    not mean that hobbyist developers cannot use Moai. As mentioned previously, you
    can use the RapaNui library, which gives developers an easy-to-use high-level
    wrapper over the lower-level API of Moai. RapaNui wraps all of the Moai functions
    in easier-to-use functions and reduces the number of lines of code you need to
    write to get things done.


    Quads can also be *pinned*, or as it is described in Moai, the pivot point can
    be set; the pivot point is used as the point around which the quad is rotated,
    where 0, 0 is the center (by default). This is similar to the anchorPoint with
    Gideros or the referencePoint with Corona


    ```

    prop:setPiv(xCenter, yCenter)

    ```


    Displaying Text


    Text can be displayed in Moai using either TrueType or bitmap fonts. MOAITextBox
    is the class that allows for working with text in Moai.


    TrueType Fonts


    The easiest way to display text is using TrueType font. You can create a new font
    object using the MOAIFont class and pass it the characters to load from the font,
    the size (in points), and the dpi of the font.


    ```

    charcodes = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789,.?!:()&/-"

    font = MOAIFont.new()

    font:loadFromTTF( ''arial.ttf'', charcodes, 12, 163 )

    ```


    Then you can create a text box to display the text using MOAITextBox:


    ```

    textbox = MOAITextBox.new()

    textbox:setFont(font)

    textbox:setRect(-160, -80, 160, 80)

    textbox:setLoc(0,160)

    textbox:setAlignment(MOAITextBox.CENTER_JUSTIFY)

    layer:insertProp( textbox )


    textbox:setString( "Hello World from MOAI" )

    ```


    **Note**   The characters passed to the MOAIFont function are created as a texture
    and cached, and if new glyphs are used, they are dynamically created and also
    cached, thereby providing faster speeds while rendering text.


    Bitmap Fonts


    The other way to display text is by using bitmap fonts (from an image file), in
    which each glyph (character) is divided by a solid-color guideline, as shown in
    [Figure 10-2](#9781430246626_Ch10.xhtml#Fig2). This way it becomes easy to create
    bitmap fonts; however, kerning is not supported by this format.


    ![9781430246626_Fig10-02.jpg](OEBPS/Images/9781430246626_Fig10-02.jpg)


    [Figure 10-2](#9781430246626_Ch10.xhtml#_Fig2) .  A bitmap font with an outline
    to indicate the dimensions of the glyph


    To use the bitmap, you can use MOAIBitmapFontReader and load the glyphs using
    the loadPage function of the newly created bitmapFontReader object.


    ```

    charcodes = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz1234567890 .,:;!?()&/-"

    font = MOAIFont.new()


    bitmapFR = MOAIBitmapFontReader.new()

    bitmapFR:loadPage( "Font.png", charcodes, 16 )

    ```


    font:setReader( bitmapFR )


    If you use an app like Glyph Designer (from 71² ; see [www.71squared.com/](http://www.71squared.com/))
    to create a .fnt file containing the data related to the bitmap image file, you
    can use the loadFromBMFont function from the MOAIFont class, like so:


    ```

    charcodes = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz1234567890 .,:;!?()&/-"

    font = MOAIFont.new()


    font:loadFromBMFont( "Font2.png" )

    font:preloadGlyphs(charcodes, 64)

    ```


    Text Attributes


    A MOAITextBox can display text, which can be altered using the setString function.
    Note that the text can include embedded codes that alter the color of the text,
    similar to HTML tags:


    ```

    textbox:setString("This text is in <c:ff0000>Red<c>, while this one is <c:00ff00>Green<c>.")

    ```


    The tag to change the color starts with <c:*xxxxxx* > and ends with <c>. The *xxxxxx*
    is the color in hex (in the RRGGBBAA format). You can also use c:*xxx* and c:*xxxx*
    for lower-precision color codes.


    Text Styles


    You can alter the font, size, and color of text. We just discussed using <c> tags
    to change color and passing font sizes while creating a MOAIFont object. If you
    wanted to create text that requires different sized fonts in other frameworks,
    you would create multiple textbox objects with different sizes and then position
    them accordingly. However, with Moai, you can create styles that can be used for
    this, as well as for changing the font and color. These styles can be embedded
    in text in a manner similar to the color <c> tags:


    ```

    function newStyle(font, size)

      local style = MOAITextStyle.new()

      style:setFont(font)

      style:setSize(size)

      return style

    end

    textbox:setStyle(newStyle(font, 24))

    textbox:setStyle( "foo", newStyle(font, 32))

    textbox:setStyle("bar", newStyle(font, 48))

    text = "This text is <foo>Large</> and this is <bar>Larger</> than the normal
    text."

    textbox:setString(text)

    ```


    **Note**   The tags can be nested but must not overlap—that is, a child tag must
    be closed before closing a parent tag.


    Aligning Text


    After creating a MOAITextBox, you can change its properties. The text alignment
    can be altered using the setAlignment function. The parameters passed to setAlignment
    can be one of the following:


    *   MOAITextBox.LEFT_JUSTIFY

    *   MOAITextBox.RIGHT_JUSTIFY

    *   MOAITextBox.CENTER_JUSTIFY


    Animating Text


    The MOAITextBox has a spool function, which allows for the text to be revealed
    character by character. This provides for some interesting effects when displaying
    text.


    ```

    textbox:spool()

    ```


    Drawing Vector Primitives


    Moai uses the class MOAIDeck to create a canvas on which drawing operations can
    be performed. All drawing is performed in the local space of the deck.


    Before you can draw, you have to create an object of type MOAIScriptDeck type,
    as follows:


    ```

    scriptDeck = MOAIScriptDeck.new()

    ```


    It is important to note that the drawing coordinates of Moai are different from
    those of most of the frameworks. While most other frameworks have the top left
    as 0,0, Moai has the center as 0,0\. In this way, a 320×480 screen extends 160
    pixels in both directions on the x-axis and 240 pixels on the y-axis.


    The scriptDeck object relies on a callback function to manage the drawing of the
    scriptDeck, which can be set using the setDrawCallback function. The callback
    has the parameters index, xOffset, yOffset, xScale, and yScale. The index determines
    the deck that needs to be redrawn, and the offsets and scales help in drawing.


    The MOAI drawing classes allow for drawing all of the following:


    *   Lines

    *   Rectangles

    *   Filled rectangles

    *   Circles

    *   Filled circles

    *   Ellipses

    *   Filled ellipses

    *   Polygons

    *   Points

    *   Drawing attributes


    Drawing Lines


    A single line can be drawn using the drawRay function, the syntax for which is
    MOAIDraw.drawRay(x, y, dx, dy). The x and y are the absolute coordinates, and
    the dx and dy are the directions of the line extending from the x and y coordinates.


    Drawing Rectangles


    The easiest way to draw a rectangle is to use the syntax MOAIDraw.drawRect(x1,
    y1, x2, y2). It takes four parameters: the x and y coordinates where the rectangle
    starts and the endpoints that enclose the rectangle. The code below draws a rectangle
    on the screen as seen in [Figure 10-3](#9781430246626_Ch10.xhtml#Fig3).


    ![9781430246626_Fig10-03.jpg](OEBPS/Images/9781430246626_Fig10-03.jpg)


    [Figure 10-3](#9781430246626_Ch10.xhtml#_Fig3) .  Drawing a rectangle with a stroke
    (border)


    ```

    MOAISim.openWindow ( "test", 320, 480 )


    viewport = MOAIViewport.new ()

    viewport:setSize ( 320, 480 )

    viewport:setScale ( 320, -480 )


    layer = MOAILayer2D.new ()

    layer:setViewport ( viewport )

    MOAISim.pushRenderPass ( layer )


    function onDraw ( index, xOff, yOff, xFlip, yFlip )

      MOAIDraw.drawRect(-150,-150,0,-50)

    end'
