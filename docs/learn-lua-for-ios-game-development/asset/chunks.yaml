    \ loops have fired. The default value for `loops` is 0, which is the same as indicating\
    \ infinite loops for the timer.\n\n```\nlocal theTimer = Timer.new(1000, 5)\n\
    theTimer:addEventListener(Event.TIMER,\n    function(event)\n        print(\"\
    Timer fired\")\n    end)\ntheTimer:addEventListener(Event.TIMER_COMPLETE,\n  \
    \  function(event)\n        print(\"All timer loops completed\")\n    end)\n```\n\
    \nThis code creates a new timer that fires at a set frequency and runs a specified\
    \ number of times. In this case, the frequency is 1,000 ms and the loop runs five\
