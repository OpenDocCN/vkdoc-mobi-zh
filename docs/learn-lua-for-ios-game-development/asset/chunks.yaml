    \n## 游戏结束；再来一次？\n\n当生命数归零时，我们显示“Game Over”消息，并让用户选择是否重玩。然后程序等待玩家轻触屏幕以重新开始游戏。\n\
    \n要处理屏幕上的轻触或触摸事件，需要设置事件监听器。我们可以像这样在 Corona SDK 中添加或移除事件处理器：\n\n```\nfunction addHandler(theEventName,\
    \ theHandler, theObject)\n  local theObject = theObject or Runtime\n  theObject:addEventListener(theEventName,\
    \ theHandler)\nend \nfunction removeHandler(theEventName, theHandler, theObject)\n\
    \  local theObject = theObject or Runtime\n  theObject:removeEventListener(theEventName,\
    \ theHandler)\nend \n```\n\n以及在 Gideros Studio 中类似这样：\n\n```\nfunction addHandler(theEventName,\
    \ theHandler, theObject)\n  local theObject = theObject or stage\n  theObject:addEventListener(theEventName,\
    \ theHandler)\nend\n\nfunction removeHandler(theEventName, theHandler, theObject)\n\
    \  local theObject = theObject or stage\n  theObject:removeEventListener(theEventName,\
    \ theHandler)\nend \n```\n\n现在我们已经添加了处理器，需要为屏幕轻触设置监听器。\n\n以下是针对 Corona SDK 的代码：\n\
    \n```\ntapEvent = \"tap\"\n```\n\n以及针对 Gideros Studio 的代码：\n\n```\ntapEvent =\
    \ Event.TOUCHES_END\n```\n\n利用这一点，我们可以创建一个通用的处理器：\n\n```\nfunction showReplayScreen()\n\
    \  removeHandler(tapEvent, shoot) \n  addHandler(tapEvent, restartGame)\nend\n\
    ```\n\n而`tapped`处理器可以定义如下：\n\n```\nfunction restartGame(event)\n  -- restart the\
    \ game by setting most of the values to defaults\n  wTime = 2\n  -- we can set\
    \ the reinitialization code here; e.g., setting the values, repositioning elements,\
    \ etc.\n  setVisible(txtGameOver, false)\n  setVisible(txtTapAgain, false)\n \
    \ score = 0\n  distance = 0\n  collected = 0\n  fuel = MAX_FUEL\n  lives = MAX_LIVES\
    \ \n  setVisible(heli,true)\n\nupdateText(txtFuel, fuel)\n  updateText(txtScore,\
    \ score)\n  updateText(txtSaved, saved)\n  updateText(txtLives, lives)\n\n-- remove\
    \ the handler that will restart the game removeHandler(tapEvent, restartGame)\
    \ gameOver = false\n  -- add the handler to shoot bullets when tapped addHandler(tapEvent,\
    \ shoot) end \n```\n\n## 碰撞\n\n在整体方案中，最后一件事是检测直升机何时与任何场景物品发生碰撞（这将导致坠毁），以及直升机何时与幸存者发生碰撞（这将救下幸存者）。\n\
    \n```\nfunction checkCollisions()\n  -- create the player rect local hx, hy =\
    \ getPosition(heli) pRect = {\n    x = hx, \n    y = hy,\n    wd = heli.width,\n\
    \    ht = heli.height,\n  }\n\n-- find if the helicopter collided with a scenery\
    \ object\n  for i = #scenery, 1, -1 do\n    local nme = scenery[i]\n    if nme.objType\
