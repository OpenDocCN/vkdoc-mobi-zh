    \ line from the file every time it is called. It is similar to io.lines, with\
    \ the difference that this function does not close the file when the loop ends.\n\
    \n```\nlocal file = io.open(filename)\nfor line in file:lines() do print(line)\
    \ end\nfile:close()\n```\n\nfile:read ( [format] )\n\nThis function reads data\
    \ from the file according to the given format. By default, read reads the entire\
    \ next line. The formats that are available for reading are\n\n*   '*n': Reads\
    \ a number; returns a number instead of a string\n*   '*a': Reads the whole file\
    \ starting from the current position\n*   '*l': Reads the next line; returns nil\
    \ when the current position is at the end of the file (default format)\n*   number:\
    \ Reads a string of characters as specified by the number, returning nil at the\
    \ end of the file.\n\nFollowing are some examples of using these:\n\n```\nlocal\
    \ filename = \"data_test.txt\"\nlocal file = io.open(filename)\nlocal contents\
    \ = file:read(\"*a\")\nfile:close()\nprint(\"Contents of the file:\", contents)\n\
    ```\n\nIf this file were opened in binary mode and we needed to get only a particular\
    \ number of characters, then we would use it as follows:\n\n```\nlocal filename\
    \ = \"test.zip\"\nlocal file = io.open(filename,\"rb\")\nlocal contents = file:read(2)\n\
    file:close()\nprint(\"File Header:\", contents)       -- All ZIP files have the\
    \ starting two characters as PK\n```\n\nfile:seek ( [whence] [, offset] )\n\n\
    This functions sets and gets the current file position. whence is a string value\
    \ that can be any of the following\n\n*   'set': The base position 0 (beginning\
    \ of the file)\n*   'cur': The current position (default value)\n*   'end': The\
    \ end of the file\n\nThe offset value passed is measured in bytes from the base\
    \ specified as per one of these three options.\n\nfile:seek is one of most important\
    \ functions when working with binary files and fixed formats; it allows the developer\
    \ to iterate back and forth to overwrite or update certain portions of the file.\n\
    \n```\nfh = io.tmpfile()\nfh:write(\"Some sample data\")\nfh:flush()\n-- Now let's\
    \ read the data we just wrote\nfh:seek(\"set\", 0)\ncontent = fh:read(\"*a\")\n\
    print(\"We got : \", content)\n```\n\nfile:setvbuf (mode [, size] )\n\nThis function\
    \ sets the buffering mode for an output file. There are three buffering modes\
    \ available in Lua, and their values are passed as strings:\n\n*   'no': No buffering\
    \ is set, so the output of any operation appears immediately.\n*   'full': Full\
    \ buffering is set, so the output operation is only performed when the buffer\
    \ is full. You can force a flush to write the buffers.\n*   'line': Line buffering\
    \ is set, so the output is buffered until a newline character (Enter) is found.\n\
    \n```\n    io.output():setvbuf(\"no\")\n    ```\n\nfile:write( … )\n\nThis function\
    \ writes to the file each of the arguments passed to the function. The arguments\
    \ must be either strings or numbers. To write other values, you might have to\
    \ convert them to string format.\n\n```\nfile = io.open(\"myfile.txt\",\"w\")\n\
    file:write(\"Writing to a file\")\nfile:close()\n```\n\n**Note**   The pure implementation\
    \ of Lua lacks the functions and commands required for file system access. This\
    \ is generally available as an external library that can be added. It is called\
    \ *Lua File System (LFS)*. As of this writing, you can integrate it with all frameworks\
    \ (the amount of effort this takes, however, depends on the framework.)\n\nUses\
    \ of File I/O in Gaming\n\nThough this is a no-brainer, there are so many reasons\
    \ why you might want to read or write data from the storage. It can be for little\
    \ things like level-related data and high scores, or for complex things like saving\
    \ the state of the game with the entire inventory, units, and so on. In the game,\
    \ the onus is on you to save and load the data to help provide continuity and\
    \ seamless game play to the player.\n\nLet’s look at how we would do that when\
    \ dealing with stuff like life, health, score, level, and so forth.\n\nSaving\
    \ a Variable\n\nIn many games, you generally get only about three lives. So, consider\
    \ the following code:\n\n```\nlocal lives = 3\nprint(\"You have \" .. lives ..\
    \ \" lives left\")\n```\n\nThere are many ways of dealing with this. One good\
    \ way would be to save the data as soon as you change it—something like an autosave\
    \ option. So, let’s write out lives variable to the storage so that it persists.\n\
    \n```\nfunction writeToFileSingle(value, filename)\n    local hfile = io.open(filename,\"\
    w\")\n    if hfile==nil then return end -- Did not get a handle on the file\n\
        hfile:write(value)\n    hfile:close()\nend\n```\n\nIn the preceding code,\
    \ we declare a function called writeToFileSingle that takes two parameters: value\
    \ and filename. The function opens a file, writes the data to the file, and then\
    \ closes the file. If we open a file, we are responsible for closing it too. When\
    \ we try to open a file using the io.open function, it returns the file handle\
    \ and a string that contains the reason for the failure (if it fails to open the\
    \ file).\n\nTo save our value using this function, we simply call\n\n```\nwriteToFileSingle(score,\
    \ \"score\")\nwriteToFileSingle(health, \"health\")\n```\n\nand so on.\n\nCongratulations,\
    \ you have now written code to save a variable, and it can be run in the interactive\
    \ Lua shell, as expected.\n\n**Note**   Irrespective of which platform you choose\
    \ as a developer, the preceding Lua code should work across most of the platforms\
    \ and Lua frameworks.\n\nGrabbing the Data\n\nIn addition to saving data, we also\
    \ need to retrieve it. In a game, dumping data that we cannot retrieve is as good\
    \ as not saving any data at all. We have, with the earlier function writeToFileSingle,\
    \ saved our data to a variable. Now comes the tricky part: reading the values\
    \ from the file.\n\nIn theory, reading the data from a file should be the reverse\
    \ process of writing to the file. So, we open the file that we have saved our\
    \ data into and then we read all of the data from the file.\n\n```\nfunction readFromFileSingle(filename)\n\
        local hfile = io.open(filename, \"r\")\n    if hfile==nil then return end\n\
        local value = hfile:read(\"*a\")\n    hfile:close()\n    return value\nend\n\
    ```\n\nSince we’ve saved our data using the writeToFileSingle function, we can\
    \ retrieve our data easily, like so:\n\n```\nprint(readFromFileSingle(\"score\"\
    ))\nprint(readFromFileSingle(\"health\"))\n```"
  trans: "\n# Lua 文件 I/O 函数\n\n此函数类似于 `io.input()`，但操作的是默认输出文件。使用此函数，你可以将输出重定向到你想要的文件。以下是其用法示例：\n\
    \n```\noldIOFile = io.output()\nio.output(\"mynewfile.txt\")\nio.write(\"Hello\
    \ world\")\nio:output():close()\nio.output(oldIOFile)\n```\n\n## `io.read ( …\
    \ )`\n\n此函数等同于 `io.input():read()`。\n\n```\nprint(io.read())\n```\n\n## `io.tmpfile\
    \ ( )`\n\n此函数返回一个临时文件的句柄；该文件以更新模式打开，并在程序结束时自动删除。\n\n```\nfh = io.tmpfile()\nfh:write(\"\
    Some sample data\")\nfh:flush()\n-- 现在读取我们刚刚写入的数据\nfh:seek(\"set\", 0)\ncontent\
    \ = fh:read(\"*a\")\nprint(\"We got : \", content)\n```\n\n## `io.type ( obj )`\n\
    \n如果 `obj` 指定的句柄是一个有效的文件句柄，此函数返回结果。如果 `obj` 是一个打开的文件句柄，则返回字符串 `\"file\"`；如果 `obj`\
    \ 是一个已关闭的文件句柄，则返回字符串 `\"closed file\"`。如果 `obj` 不是文件句柄，则返回 `nil`。\n\n```\nprint(io.type(fh))\
    \ -- 因为 fh 为 nil，所以打印 nil\nfh = io.input()\nprint(io.type(fh))\n```\n\n## `io.write\
    \ ( … )`\n\n此函数等同于 `io.output():write()`。\n\n```\nio.write(\"Hello World\")\n\
    ```\n\n# 显式函数\n\n本节列出并描述了你将在 Lua 编程工作中使用的显式函数。\n\n## `file:close ( )`\n\n此函数关闭由该文件引用的文件。\n\
    \n```\nfile = io.open(\"myFile.txt\", \"w\")\nfile:write(\"Some Data\")\nfile:close()\n\
    ```\n\n## `file:flush ( )`\n\n此函数将所有尚未写入（在缓冲区中的）数据保存到文件中。\n\n```\nfh = io.tmpfile()\n\
    fh:write(\"Some sample data\")\nfh:flush()\n```\n\n## `file:lines ( )`\n\n此函数返回一个迭代器函数，每次调用时都会从文件中返回一个新行。它类似于\
    \ `io.lines()`，区别在于此函数不会在循环结束时关闭文件。\n\n```\nlocal file = io.open(filename)\nfor\
    \ line in file:lines() do print(line) end\nfile:close()\n```\n\n## `file:read\
    \ ( [format] )`\n\n此函数根据给定的格式从文件中读取数据。默认情况下，`read` 读取整个下一行。可用的读取格式如下：\n\n- `'*n'`：读取一个数字；返回一个数字而非字符串\n\
    - `'*a'`：从当前位置读取整个文件\n- `'*l'`：读取下一行；当当前位置位于文件末尾时返回 `nil`（默认格式）\n- `number`：读取由该数字指定的字符数组成的字符串，在文件末尾返回\
    \ `nil`。\n\n以下是使用这些格式的一些示例：\n\n```\nlocal filename = \"data_test.txt\"\nlocal\
    \ file = io.open(filename)\nlocal contents = file:read(\"*a\")\nfile:close()\n\
    print(\"Contents of the file:\", contents)\n```\n\n如果此文件以二进制模式打开，并且我们需要仅获取特定数量的字符，那么我们将按如下方式使用：\n\
    \n```\nlocal filename = \"test.zip\"\nlocal file = io.open(filename,\"rb\")\n\
    local contents = file:read(2)\nfile:close()\nprint(\"File Header:\", contents)\
    \       -- 所有 ZIP 文件的前两个字符都是 PK\n```\n\n## `file:seek ( [whence] [, offset] )`\n\
    \n此函数设置并获取当前文件位置。`whence` 是一个字符串值，可以是以下任意一个：\n\n- `'set'`：基位置 0（文件开头）\n- `'cur'`：当前位置（默认值）\n\
    - `'end'`：文件末尾\n\n传递的 `offset` 值是以字节为单位从根据这三个选项之一指定的基准位置开始测量的。\n\n`file:seek()`\
    \ 是处理二进制文件和固定格式时最重要的函数之一；它允许开发者来回迭代以覆盖或更新文件的特定部分。\n\n```\nfh = io.tmpfile()\n\
    fh:write(\"Some sample data\")\nfh:flush()\n-- 现在读取我们刚刚写入的数据\nfh:seek(\"set\"\
    , 0)\ncontent = fh:read(\"*a\")\nprint(\"We got : \", content)\n```\n\n## `file:setvbuf\
    \ (mode [, size] )`\n\n此函数设置输出文件的缓冲模式。Lua 中有三种可用的缓冲模式，它们的值以字符串形式传递：\n\n- `'no'`：无缓冲，因此任何操作的输出都会立即显示。\n\
    - `'full'`：完全缓冲，因此仅当缓冲区满时才执行输出操作。你可以强制刷新以写入缓冲区。\n- `'line'`：行缓冲，因此输出会被缓冲，直到找到换行符（Enter）。\n\
    \n```\nio.output():setvbuf(\"no\")\n```\n\n## `file:write( … )`\n\n此函数将传递给函数的每个参数写入文件。参数必须是字符串或数字。要写入其他值，你可能需要将它们转换为字符串格式。\n\
    \n```\nfile = io.open(\"myfile.txt\",\"w\")\nfile:write(\"Writing to a file\"\
    )\nfile:close()\n```\n\n**注意**：Lua 的纯实现缺少文件系统访问所需的函数和命令。这通常作为可添加的外部库提供。它被称为 *Lua\
    \ 文件系统 (LFS)*。截至撰写本文时，你可以将其与所有框架集成（但这需要的工作量取决于框架）。\n\n# 文件 I/O 在游戏中的用途\n\n虽然这显而易见，但读取或写入存储数据的原因有很多。它可以是用于关卡数据和高分等小事情，也可以是用于保存包含整个库存、单位等游戏状态的复杂事情。在游戏中，你有责任保存和加载数据，以帮助为玩家提供连续性和无缝的游戏体验。\n\
    \n让我们看看在处理生命值、健康值、分数、等级等内容时，我们将如何做到这一点。\n\n## 保存变量\n\n在许多游戏中，你通常只有大约三条命。因此，请考虑以下代码：\n\
    \n```\nlocal lives = 3\nprint(\"You have \" .. lives .. \" lives left\")\n```\n\
    \n处理此问题的方法有很多。一个好方法是，在更改数据后立即保存数据——类似于自动保存选项。所以，让我们将 `lives` 变量写入存储，以便它持久化。\n\n\
    ```\nfunction writeToFileSingle(value, filename)\n    local hfile = io.open(filename,\"\
    w\")\n    if hfile==nil then return end -- 未能获取文件句柄\n    hfile:write(value)\n\
    \    hfile:close()\nend\n```\n\n在前面的代码中，我们声明了一个名为 `writeToFileSingle` 的函数，它接受两个参数：`value`\
    \ 和 `filename`。该函数打开一个文件，将数据写入文件，然后关闭文件。如果我们打开了一个文件，我们也有责任关闭它。当我们尝试使用 `io.open()`\
    \ 函数打开文件时，它会返回文件句柄和一个包含失败原因（如果打开文件失败）的字符串。\n\n要使用此函数保存我们的值，我们只需调用：\n\n```\nwriteToFileSingle(score,\
    \ \"score\")\nwriteToFileSingle(health, \"health\")\n```\n\n等等。\n\n恭喜你，你现在已经编写了保存变量的代码，并且可以按照预期在交互式\
    \ Lua shell 中运行。\n\n**注意**：无论你作为开发者选择哪个平台，上述 Lua 代码都应该能在大多数平台和 Lua 框架上运行。\n\n\
    ## 获取数据\n\n除了保存数据，我们还需要检索数据。在游戏中，丢弃无法检索的数据与根本不保存数据一样糟糕。我们使用之前的函数 `writeToFileSingle()`\
    \ 将数据保存到了变量中。现在到了棘手的部分：从文件中读取值。\n\n理论上，从文件读取数据应该是写入文件的逆过程。所以，我们打开保存数据的文件，然后从中读取所有数据。\n\
    \n```\nfunction readFromFileSingle(filename)\n    local hfile = io.open(filename,\
    \ \"r\")\n    if hfile==nil then return end\n    local value = hfile:read(\"*a\"\
    )\n    hfile:close()\n    return value\nend\n```\n\n由于我们使用 `writeToFileSingle()`\
    \ 函数保存了数据，我们可以轻松地检索数据，如下所示：\n\n```\nprint(readFromFileSingle(\"score\"))\nprint(readFromFileSingle(\"\
    health\"))\n```\n"
- fmt: "**Note** Since the data is one piece of information per file, the order in\
    \ which you save it and the order in which you load it shouldn’t matter.\n\nIf\
    \ the file does not have any data, it just returns `nil`, which pretty much means\
    \ the same and can be managed if required.\n\n## How the Code Works\n\nIt is rather\
    \ easy. Most of the code is similar to what we used in `writeToFileSingle`, which\
    \ involves opening a file, but in read mode instead. (If you do not specify a\
    \ mode while opening a file to read, the default mode is read mode). Then we use\
    \ the `read` function with the `\"*a\"` parameter to read the entire contents\
    \ of the file. This is fine for this scenario, as we only have a small amount\
    \ of data to read. Then we close the file and return the data read from the file.\n\
    \n## Potential Issues\n\nThese two functions work well for loading and saving\
    \ data. But, as mentioned, it’s not good to have a file for each piece of data\
    \ that we want to save; it would be better to have a single file than multiple\
    \ files with scraps of data in them. So, the next possible option is to save all\
    \ of the data in a single file. Doing so isn’t much different than what we did\
    \ in the preceding code. The difference is that we save multiple values to the\
    \ file, like so:\n\n```\nfunction readFromFile(filename)\n    local results =\
    \ {}\n    local hfile  = io.open(filename)\n    if hfile==nil then return end\n\
    \    for line in hfile:lines() do\n       table.insert(results, line)\n    end\n\
    \    return results\nend\n```\n\nThere are a couple of differences in this code\
    \ as compared to the earlier code. The first is that we use an array table called\
    \ `results` to store everything we read from the file. The next is that instead\
    \ of using `hfile:read(\"*a\")` to read the content, we use `hfile:lines()` to\
    \ get one line at a time from the file. The newline character (Enter) separates\
    \ the data and is the delimiter between the two lines. Once we get this data,\
    \ we store it into the array `results` by using the `table.insert` function to\
    \ add the data to the end of the table.\n\nOnce we get the array returned to us,\
    \ the positioning of the data is important. The positions of the data shall be\
    \ fixed, so we need to know in advance what position coincides with what data.\n\
    \n## Saving Data to a Variable\n\nHere’s a quick tip on how to manipulate global\
    \ variables. In [Chapter 2](#9781430246626_Ch02.xhtml), you read about a variable\
    \ `_G`, which is actually a table object and holds all the global variables, functions,\
    \ and so on. When we declare a variable (without local scope), it is assigned\
    \ to this table as a global variable. What we are going to do in this quick exercise\
    \ is declare a global variable, read the value of the variable, and then manipulate\
    \ it using the `_G` table.\n\n```\nmyVar = 1\nprint(myVar)\nmyVar = myVar + 1\n\
    print(_G[\"myVar\"])\n_G[\"myVar\"] = _G[\"myVar\"] + 1\nprint(myVar)\n_G.myVar\
    \ = _G.myVar + 1\nprint(myVar)\n```\n\n### How the Code Works\n\nWe start our\
    \ code with declaring a global variable called `myVar` and assigning it a value\
    \ of `1`, and then we print it to the screen. Next we increment it by `1` using\
    \ `myVar = myVar + 1`. This time we print the value again, but instead of using\
    \ `print(myVar)`, we access it directly from the global table `_G` via `print(_G[\"\
    myVar\"])`. Then we increment the variable by `1` again but using `_G[\"myVar\"\
    ]` and print the value using `print(myVar)`.\n\nLastly, we increment the value\
    \ again by `1`, but this time we access it using the `_G.myVar` method to access\
    \ the value and print the results. The idea of this exercise is to demonstrate\
    \ how Lua uses global variables and how they can be accessed using `_G`.\n\n**Note**\
    \ Though global variables can be accessed in this manner, it is suggested that\
    \ local variables be used instead; this reduces the number of variables used,\
    \ saves on stack memory, and also had a speed advantage over global variables.\n\
    \n## Back to Our Saving and Loading of Data\n\nWe want to consolidate our data\
    \ into one file so that we can read our data in one go. In our modified version,\
    \ we are reading the data into an array called `results`. The only issue is that\
    \ to access the values, we need to access the data by the numbered index—but how\
    \ would we know what each numeric index corresponds to?\n\nLet’s try to read the\
    \ data and also set the global variables with the values.\n\n```\nfunction readFromFile(filename)\n\
    \    local results = {}\n    local hfile = io.open(\"filename\")\n    if hfile==nil\
    \ then return end\n    local lineNo = 0\n    for line in hFile:lines() do\n  \
    \      table.insert(results, line)\n        lineNo = lineNo + 1\n        if lineNo\
    \ == 1 then\n            _G[\"score\"] = line\n        elseif lineNo == 2 then\n\
    \            _G[\"lives\"] = line\n        elseif lineNo == 3 then\n         \
    \   _G[\"health\"] = line\n        elseif lineNo == 4 then\n            _G[\"\
    level\"] = line\n        end\n    end\n    return results\nend\n```\n\nThis is\
    \ more or less what our code looked like earlier, only we have added a variable\
    \ called `lineNo` and we keep incrementing it based on the lines read. When `lineNo`\
    \ is `1`, we save the value we have read into the variable `score`. Then we save\
    \ `lineNo` `2` into `lives`, and so on, till `lineNo` is `4`, after which (if\
    \ there are more lines) we just don’t read them.\n\n## Potential Issues\n\nIn\
    \ your app, the number of variables that you might store could be different for\
    \ each application. You would never know the order in which your data is saved,\
    \ and if the order of saving the data or reading the data is changed, you might\
    \ have values that end up in the wrong variables. Most importantly, it would be\
    \ near impossible to set up multiple `if ... then` statements to load the variables,\
    \ not to mention the names for those variables.\n\nSo what we are going to do\
    \ to fix this issue is have a table with the data and field names in it. This\
    \ will provide us with the flexibility to expand this further in the future.\n\
    \n```\nfunction readFromFile(filename,resTable)\n    local hfile = io.open(filename)\n\
    \    if hfile == nil then return\n    local results = {}\n    local a = 1\n  \
    \  for line in hfile:lines() do\n        _G[resTable[a]] = line\n        a = a\
    \ + 1\n    end\nend\n```\n\nWe read through the data one line at a time, and with\
    \ each loop, we increment the index variable `a`. We store the value that we have\
    \ read into a global variable with a name specified in the array. For example,\
    \ if we had specified in our array that we wanted the values to be `Line1 = Score`,\
    \ `Line2 = Lives`, and `Line3 = health`, then the function will automatically\
    \ create global variables with these names and assign the value to them.\n\nThis\
    \ function will now read the data, save it into the array table, and access it\
    \ via the global variable. However, we need to pass it the table that is modified\
    \ for this.\n\n```\nlocal aryTable = {\n    \"Score\",\n   \"Lives\",\n   \"Health\"\
    ,\n}\n```\n\nWe call the function simply as follows:\n\n```\nreadFromFile(\"datafile\"\
    , aryTable)\n```\n\nThis method has its own set of problems. What if we were to\
    \ add some data in `aryTable` not at the end, but in the middle? This would make\
    \ the variables all mixed up and in the wrong places. So how do we fix that? There\
    \ are many easy ways to approach this issue, and each has its own set of pros\
    \ and cons. However, the best method would be to get the name of the variable\
    \ and the value of the variable from the file.\n\n## Writing Data to the File\n\
    \nWe have written some code to read our data from the file. Now we’ll write some\
    \ code to write the data, which could be read using the preceding function.\n\n\
    ```\nfunction writeToFile(filename, resTable)\n    local  hfile = io.open(filename,\
    \ \"w\")\n    if hfile == nil then return end\n    local  i\n   for i = 1, #resTable\
    \ do\n        hfile:write(_G[resTable[i]])\n   end\nend\n```"
  raw: '**Note**   Since the data is one piece of information per file, the order
    in which you save it and the order in which you load it shouldn’t matter.


    If the file does not have any data, it just returns nil, which pretty much means
    the same and can be managed if required.


    How the Code Works


    It is rather easy. Most of the code is similar to what we used in writeToFileSingle,
    which involves opening a file, but in read mode instead. (If you do not specify
    a mode while opening a file to read, the default mode is read mode). Then we use
    the read function with the "*a" parameter to read the entire contents of the file.
    This is fine for this scenario, as we only have a small amount of data to read.
    Then we close the file and return the data read from the file.


    Potential Issues


    These two functions work well for loading and saving data. But, as mentioned,
    it’s not good to have a file for each piece of data that we want to save; it would
    be better to have a single file than multiple files with scraps of data in them.
    So, the next possible option is to save all of the data in a single file. Doing
    so isn’t much different than what we did in the preceding code. The difference
    is that we save multiple values to the file, like so:


    ```

    function readFromFile(filename)

        local results = {}

        local hfile  =io.open(filename)

        if hfile==nil then return end

        for line in hfile:lines() do

           table.insert(results, line)

        end

        return results

    end

    ```


    There are a couple of differences in this code as compared to the earlier code.
    The first is that we use an array table called results to store everything we
    read from the file. The next is that instead of using hfile:read("*a") to read
    the content, we use hfile:lines() to get one line at a time from the file. The
    newline character (Enter) separates the data and is the delimiter between the
    two lines. Once we get this data, we store it into the array results by using
    the table.insert function to add the data to the end of the table.


    Once we get the array returned to us, the positioning of the data is important.
    The positions of the data shall be fixed, so we need to know in advance what position
    coincides with what data.


    Saving Data to a Variable


    Here’s a quick tip on how to manipulate global variables. In [Chapter 2](#9781430246626_Ch02.xhtml),
    you read about a variable _G, which is actually a table object and holds all the
    global variables, functions, and so on. When we declare a variable (without local
    scope), it is assigned to this table as a global variable. What we are going to
    do in this quick exercise is declare a global variable, read the value of the
    variable, and then manipulate it using the _G table.


    ```

    myVar = 1

    print(myVar)

    myVar = myVar + 1

    print(_G["myVar"])

    _G["myVar"] = _G["myVar"] + 1

    print(myVar)

    _G.myVar = _G.myVar + 1

    print(myVar)

    ```


    How the Code Works


    We start our code with declaring a global variable called myVar and assigning
    it a value of 1, and then we print it to the screen. Next we increment it by 1
    using myVar = myVar + 1\. This time we print the value again, but instead of using
    print(myVar), we access it directly from the global table _G via print(_G["myVar"]).
    Then we increment the variable by 1 again but using _G["myVar"] and print the
    value using print(myVar).


    Lastly, we increment the value again by 1, but this time we access it using the
    _G.myVar method to access the value and print the results. The idea of this exercise
    is to demonstrate how Lua uses global variables and how they can be accessed using
    _G.


    **Note**   Though global variables can be accessed in this manner, it is suggested
    that local variables be used instead; this reduces the number of variables used,
    saves on stack memory, and also had a speed advantage over global variables.


    Back to our saving and loading of data, we want to consolidate our data into one
    file so that we can read our data in one go. In our modified version, we are reading
    the data into an array called results. The only issue is that to access the values,
    we need to access the data by the numbered index—but how would we know what each
    numeric index corresponds to?


    Let’s try to read the data and also set the global variables with the values.


    ```

    function readFromFile(filename)

        local results = {}

        local hfile = io.open("filename")

        if hfile==nil then return end

        local lineNo = 0

        for line in hFile:lines() do

            table.insert(results, line)

            lineNo = lineNo + 1

            if lineNo == 1 then

                _G["score"] = line

            elseif lineNo == 2 then

                _G["lives"] = line

            elseif lineNo == 3 then

                _G["health"] = line

            elseif lineNo == 4 then

                _G["level"] = line

            end

        end

        return results

    end

    ```


    This is more or less what our code looked like earlier, only we have added a variable
    called lineNo and we keep incrementing it based on the lines read. When lineNo
    is 1, we save the value we have read into the variable score. Then we save lineNo
    2 into lives, and so on, till lineNo is 4, after which (if there are more lines)
    we just don’t read them.


    Potential Issues


    In your app, the number of variables that you might store could be different for
    each application. You would never know the order in which your data is saved,
    and if the order of saving the data or reading the data is changed, you might
    have values that end up in the wrong variables. Most importantly, it would be
    near impossible to set up multiple if .. then statements to load the variables,
    not to mention the names for those variables.


    So what we are going to do to fix this issue is have a table with the data and
    field names in it. This will provide us with the flexibility to expand this further
    in the future.


    ```

    function readFromFile(filename,resTable)

        local hfile = io.open(filename)

        if hfile == nil then return

        local results = {}

        local a = 1

        for line in hfile:lines() do

            _G[resTable[a]] = line

            a = a + 1

        end

    end

    ```


    We read through the data one line at a time, and with each loop, we increment
    the index variable a. We store the value that we have read into a global variable
    with a name specified in the array. For example, if we had specified in our array
    that we wanted the values to be Line1 = Score, Line2 = Lives, and Line3 = health,
    then the function will automatically create global variables with these names
    and assign the value to them.


    This function will now read the data, save it into the array table, and access
    it via the global variable. However, we need to pass it the table that is modified
    for this.


    ```

    local aryTable = {

        "Score",

       "Lives",

       "Health,

    }

    ```


    We call the function simply as follows:


    ```

    readFromFile("datafile", aryTable)

    ```


    This method has its own set of problems. What if we were to add some data in aryTable
    not at the end, but in the middle? This would make the variables all mixed up
    and in the wrong places. So how do we fix that? There are many easy ways to approach
    this issue, and each has its own set of pros and cons. However, the best method
    would be to get the name of the variable and the value of the variable from the
    file.


    Writing Data to the File


    We have written some code to read our data from the file. Now we’ll write some
    code to write the data, which could be read using the preceding function.


    ```

    function writeToFile(filename, resTable)

        local  hfile = io.open(filename, "w")

        if hfile == nil then return end

        local  i

       for i = 1, #resTable do

            hfile:write(_G[resTable[i]])

       end

    end

    ```'
  trans: "\n**注意** 由于每个文件只包含一条数据，因此保存和加载数据的顺序无关紧要。\n\n如果文件没有任何数据，它只会返回 `nil`，这基本意味着相同的情况，并且在需要时可以进行处理。\n\
    \n## 代码工作原理\n\n这相当简单。大部分代码与我们之前在 `writeToFileSingle` 中使用的代码类似，都涉及打开文件，但此处是读取模式（如果在打开文件进行读取时未指定模式，则默认模式为读取模式）。然后我们使用带有\
    \ `\"*a\"` 参数的 `read` 函数来读取文件的全部内容。这种情况非常适合，因为我们要读取的数据量很小。接着我们关闭文件，并返回从文件中读取的数据。\n\
    \n## 潜在问题\n\n这两个函数在加载和保存数据方面表现良好。但如前所述，为每一条要保存的数据都创建一个文件并不好；最好是只有一个文件，而不是多个包含零散数据的文件。因此，下一个可行的方案是将所有数据保存到一个文件中。这样做与之前代码的区别不大，不同之处在于我们要向文件中保存多个值，如下所示：\n\
    \n```\nfunction readFromFile(filename)\n    local results = {}\n    local hfile\
    \  = io.open(filename)\n    if hfile==nil then return end\n    for line in hfile:lines()\
    \ do\n       table.insert(results, line)\n    end\n    return results\nend\n```\n\
    \n此代码与之前的代码相比有几个不同之处。首先，我们使用一个名为 `results` 的数组表来存储从文件中读取的所有内容。其次，我们没有使用 `hfile:read(\"\
    *a\")` 读取内容，而是使用 `hfile:lines()` 逐行从文件获取数据。换行符（Enter）用于分隔数据，是两行数据之间的分隔符。获取数据后，我们使用\
    \ `table.insert` 函数将数据添加到表末尾，从而将其存储到数组 `results` 中。\n\n一旦数组返回给我们，数据的位置就很重要了。数据的位置必须是固定的，因此我们需要提前知道哪个位置对应哪条数据。\n\
    \n## 将数据保存到变量\n\n这里有一个关于如何操作全局变量的快速技巧。在第 2 章中，你了解了一个变量 `_G`，它实际上是一个表对象，保存了所有全局变量、函数等。当我们声明一个变量时（没有局部作用域），它会作为全局变量被赋值到这个表中。我们在这个快速练习中要做的是：声明一个全局变量，读取该变量的值，然后使用\
    \ `_G` 表来操作它。\n\n```\nmyVar = 1\nprint(myVar)\nmyVar = myVar + 1\nprint(_G[\"\
    myVar\"])\n_G[\"myVar\"] = _G[\"myVar\"] + 1\nprint(myVar)\n_G.myVar = _G.myVar\
    \ + 1\nprint(myVar)\n```\n\n### 代码工作原理\n\n我们从声明一个名为 `myVar` 的全局变量并将其赋值为 `1` 开始，然后将其打印到屏幕上。接下来，我们使用\
    \ `myVar = myVar + 1` 将其增加 `1`。这次我们再次打印该值，但不是使用 `print(myVar)`，而是通过 `print(_G[\"\
    myVar\"])` 直接从全局表 `_G` 中访问它。然后我们再次将变量增加 `1`，但这次使用 `_G[\"myVar\"]`，并通过 `print(myVar)`\
    \ 打印该值。\n\n最后，我们再次将值增加 `1`，但这次使用 `_G.myVar` 方法来访问值并打印结果。这个练习的目的是演示 Lua 如何使用全局变量，以及如何通过\
    \ `_G` 访问它们。\n\n**注意** 虽然可以以这种方式访问全局变量，但建议仍使用局部变量；这样可以减少使用的变量数量，节省栈内存，并且相比全局变量还拥有速度优势。\n\
    \n## 回到数据的保存与加载\n\n我们希望将数据整合到一个文件中，以便一次性读取数据。在修改后的版本中，我们将数据读取到一个名为 `results` 的数组中。唯一的问题在于，要访问这些值，我们需要通过数字索引来访问数据——但我们如何知道每个数字索引对应什么内容呢？\n\
    \n让我们尝试读取数据并同时用这些值设置全局变量。\n\n```\nfunction readFromFile(filename)\n    local results\
    \ = {}\n    local hfile = io.open(\"filename\")\n    if hfile==nil then return\
    \ end\n    local lineNo = 0\n    for line in hFile:lines() do\n        table.insert(results,\
    \ line)\n        lineNo = lineNo + 1\n        if lineNo == 1 then\n          \
    \  _G[\"score\"] = line\n        elseif lineNo == 2 then\n            _G[\"lives\"\
    ] = line\n        elseif lineNo == 3 then\n            _G[\"health\"] = line\n\
    \        elseif lineNo == 4 then\n            _G[\"level\"] = line\n        end\n\
    \    end\n    return results\nend\n```\n\n这基本上与我们之前的代码相似，只是添加了一个名为 `lineNo` 的变量，并根据读取的行数不断递增它。当\
    \ `lineNo` 为 `1` 时，我们将读取到的值保存到变量 `score` 中。然后将 `lineNo` `2` 保存到 `lives`，依此类推，直到\
    \ `lineNo` 为 `4`，之后（如果还有更多行）我们就不再读取它们。\n\n## 潜在问题\n\n在你的应用中，可能存储的变量数量因应用而异。你永远不知道数据保存的顺序，如果保存或读取数据的顺序发生变化，可能会导致值存入了错误的变量。最重要的是，要设置多个\
    \ `if ... then` 语句来加载变量几乎是不可能的，更不用说为这些变量命名了。\n\n为了解决这个问题，我们将创建一个包含数据和字段名称的表。这将为我们将来进一步扩展提供灵活性。\n\
    \n```\nfunction readFromFile(filename,resTable)\n    local hfile = io.open(filename)\n\
    \    if hfile == nil then return\n    local results = {}\n    local a = 1\n  \
    \  for line in hfile:lines() do\n        _G[resTable[a]] = line\n        a = a\
    \ + 1\n    end\nend\n```\n\n我们逐行读取数据，每次循环递增索引变量 `a`。我们将读取到的值存储到一个全局变量中，该变量的名称由数组指定。例如，如果我们在数组中指定希望\
    \ `Line1 = Score`, `Line2 = Lives`, `Line3 = health`，那么函数将自动创建具有这些名称的全局变量并为其赋值。\n\
    \n现在，这个函数将读取数据，将其保存到数组表中，并通过全局变量进行访问。不过，我们需要为此传入要修改的表。\n\n```\nlocal aryTable\
    \ = {\n    \"Score\",\n   \"Lives\",\n   \"Health\",\n}\n```\n\n我们只需如下调用函数：\n\n\
    ```\nreadFromFile(\"datafile\", aryTable)\n```\n\n这种方法本身存在一些问题。如果我们在 `aryTable`\
    \ 中间（而不是末尾）添加一些数据，会怎样？这会导致变量全部混淆，位置错乱。那么如何解决这个问题呢？有很多简单的方法可以处理这个问题，每种方法都各有优缺点。不过，最好的方法是从文件中获取变量名及其值。\n\
    \n## 将数据写入文件\n\n我们已经编写了一些代码来从文件读取数据。现在，我们将编写一些代码来写入数据，这些数据可以使用前面的函数读取。\n\n```\n\
    function writeToFile(filename, resTable)\n    local  hfile = io.open(filename,\
    \ \"w\")\n    if hfile == nil then return end\n    local  i\n   for i = 1, #resTable\
    \ do\n        hfile:write(_G[resTable[i]])\n   end\nend\n```\n"
- fmt: "The code for writing the data to the file is not very different. We open the\
    \ file in write mode, and then we iterate through the list of variables that we\
    \ want to save to the file. These are found from the `resTable` parameter passed.\
    \ So, whatever we have in this table, the function shall attempt to save those\
    \ variables to the file.\n\n## Saving a Table\n\nWe just saved data that is in\
    \ the form of either strings or numbers. If the data to be saved is anything else,\
    \ the functions will start to fail, and more so if the variable is a table. The\
    \ biggest issue with tables is iterating through the depths of the table.\n\n\
    If you were to use any other programming language, you would hear, “Why not serialize\
    \ the data?” I’ll explain why this isn’t a good idea in Lua.\n\nThe mark of good\
    \ developers is their ability to avoid reinventing the wheel, instead spending\
    \ their time with things that warrant their focus. Lua has a third-party Lua library\
    \ that allows you to use JSON in your Lua projects; this library can help encode\
    \ or decode the information between the table object and a JSON-encoded string,\
    \ like so:\n\n```lua\nlocal json = require(\"json\")\nlocal theTable = {\n   \
    \ title = \"Learn Lua for iOS game development\",\n    author = \"Jayant Varma\"\
    ,\n    publisher = \"Apress\",\n    eBook = true,\n    year = 2012,\n}\nlocal\
    \ resString = json.encode(theTable)\nwriteToFileSingle(restring,\"mytable\")\n\
    local readString = readFromFileSingle(\"mytable\")\nlocal resTable = json.decode(readString)\n\
    for k,v in pairs(resTable) do\n    print(k,v)\nend\n```\n\nWhen you run this code,\
    \ you will see that we save the data we create as a string to a file called `mytable`.\
    \ In the example, we read the data back and decode the JSON-encoded string to\
    \ an expanded Lua form table. Then we list the fields available in that table\
    \ to prove that the code works.\n\n**Note**   Though this code is completely valid,\
    \ if you run the code in the Lua interactive shell, you might face issues such\
    \ as error messages, as there is no `json.lua` file in the path.\n\n## Dynamic\
    \ Variables\n\nHow do I create dynamic variables? is one of the most commonly\
    \ asked question by many developers, especially ones that are beginning their\
    \ journey with development. Some beginner developers use variables as follows:\n\
    \n```lua\nObject1 = \"Apple\"\nObject2 = \"Ball\"\nObject3 = \"Cat\"\nObject4\
    \ = \"Dog\"\n```\n\nIn this code, the developer wants to create a series of such\
    \ variables dynamically and be able to access them by specifying the last digit,\
    \ so the access expected would be:\n\n```lua\nnumber = 3\nprint(\"Object\" ..\
    \ number)\n```\n\nand the expectation is that it should output `Cat`. However,\
    \ what it outputs is `Object3`. Most beginning developers assume that it should\
    \ have worked as expected. If you need to access the variable in this manner,\
    \ it is not by creating multiple variables. The proper way to do so is to create\
    \ an array. The array can be accessed by passing it the number as we expected\
    \ to do.\n\n```lua\nObjects = {\"Apple\", \"Ball\", \"Cat\", \"Dog\"}\nnumber\
    \ = 3\nprint(Objects[number])\n```\n\nThis works perfectly fine for what we need.\
    \ This time around we see the output `Cat`.\n\n## Summary\n\nIn this chapter you\
    \ learned about the implicit and explicit functions relating to file I/O. You\
    \ also saw how to read and write data as singular values, and how to write an\
    \ entire table of data onto the storage space on the device. Files are good for\
    \ saving scraps of data; however, when you need to access larger amounts of data,\
    \ it would be better to use a database.\n\nIn the next chapter we shall look at\
    \ the math namespace, which offers functions that we can use to do all of the\
    \ calculations required for our apps.\n\n# Chapter 4: Math with Lua\n\nLove it\
    \ or hate it, if you have decided to be a developer, you will have to come face\
    \ to face with math. It is indeed surprising to see how many students dislike\
    \ or shy away from math, but it just comes back to us in some form or the other,\
    \ irrespective of our profession. An accountant needs to look at the accounts\
    \ and add them up (requiring math), a surveyor needs to apply trigonometric principles\
    \ to get elevation and terrain information, a banker needs to calculate interest\
    \ and yield for investments, and so on. It reminds me of Homer Simpson, who once\
    \ said, “English? Who needs that? I’m never going to England!” However, you have\
    \ decided to be a developer, and you will come back to this time and time again,\
    \ as many of the things that you need to do are based on simple math principles.\
    \ These can be applied with any framework or language.\n\n## Introduction to Math\
    \ in Lua\n\nThere is a system library included with Lua that offers a series of\
    \ math functions. The following is a list of the functions available. Most of\
    \ these functions are self-explanatory.\n\n### `math.abs (x)`\n\nThis returns\
    \ the absolute value of *x*. If you pass this function a negative value, it returns\
    \ the positive value of *x*.\n\n```lua\nprint(math.abs(−10))   -- Will return\
    \ 10\n```\n\n### `math.acos (x)`\n\nThis returns the arc cosine of the value *x*\
    \ in radians.\n\n```lua\nprint (math.acos(1))   -- Prints zero '0'\n```\n\n###\
    \ `math.asin (x)`\n\nThis returns the arc sine of the value *x* in radians.\n\n\
    ```lua\nprint(math.asin(1))  -- Prints 1.5707963267949\n```\n\n### `math.atan\
    \ (x)`\n\nThis returns the arctangent of the value *x* in radians. This is in\
    \ the range of –pi/2 to pi/2.\n\n```lua\nprint(math.atan(1))  -- Prints 0.78539816339745\n\
    ```\n\n### `math.atan2 (y,x)`\n\nThis returns the principal value of the arctangent\
    \ of the quotient of the two numbers passed.\n\n```lua\nprint(math.atan2(1, 0))\
    \     --   pi/2\nprint(math.atan2(−1, 0))    --   -pi/2\nprint(math.atan2(0, 1))\
    \     --   0\nprint(math.atan2(0, -1))    --   pi\n```\n\n**Note**   The parameters\
    \ passed are *y* and then *x*, not *x,y*, as are generally passed.\n\n### `math.ceil\
    \ (x)`\n\nThis returns the integer value of the passed value of *x* closest to\
    \ the next integer.\n\n```lua\nprint (math.ceil(0.1))  -- Returns 1\nprint (math.ceil(0.5))\
    \  -- Returns 1\nprint (math.ceil(0.6))  -- Returns 1\n```\n\n### `math.cos (x)`\n\
    \nThis returns the cosine value of *x* passed in radians.\n\n```lua\nprint(math.cos(1))\
    \  -- 0.54030230586814\n```\n\n### `math.cosh (x)`\n\nThis returns the hyperbolic\
    \ cosine of a value.\n\n```lua\nprint(math.cosh(1)) -- 1.5430806348152\n```\n\n\
    ### `math.deg (x)`\n\nThis function converts a value from degree to radians.\n\
    \n```lua\nprint(math.deg(math.pi))  -- 180\n```\n\n### `math.exp (x)`\n\nThis\
    \ returns e, the base of natural logarithms raised to a given power.\n\n```lua\n\
    print (math.exp(2)) -- 7.3890560989307\n```\n\n### `math.floor (x)`\n\nThis returns\
    \ the lower integer value from the passed value of *x*.\n\n```lua\nprint (math.floor(0.1))\
    \  -- 0\nprint (math.floor(0.5))  -- 0\nprint (math.floor(0.9))  -- 0\n```\n\n\
    ### `math.fmod (x)`\n\nThis returns the remainder of the division of the arguments\
    \ that rounds the quotient toward zero, according to the following equation:\n\
    \nremainder = numerator – quotient * denominator\n\nThe function itself is used\
    \ like this:\n\n```lua\nprint(math.fmod(7.5,3))  -- 1.5\n```\n\n### `math.frexp\
    \ (x)`\n\nThis function splits the value into a normalized fraction and an exponent.\
    \ The results are two numbers. The number *x* can be represented as follows:\n\
    \nfraction * 2^exponent\n\nHere are some examples of the function in code:\n\n\
    ```lua\nprint(math.frexp(2))  -- 0.5       2\nprint(math.frexp(3))  -- 0.75  \
    \     1\nprint(math.frexp(1))  -- 0.5       1\n```\n\n### `math.huge`\n\nThis\
    \ is a constant than a function; it returns inf, which is a very large number.\n\
    \n```lua\nprint(math.inf)\n```\n\n### `math.ldexp (m, e)`\n\nThis returns a number\
    \ generated from the combination of the mantissa *m* and the exponent *e*. The\
    \ formula used is:\n\nnumber = m * 2^e\n\nHere’s the function in use:\n\n```lua\n\
    print(math.ldexp(0.5, 8)) -- 128\n```\n\n### `math.log (x)`\n\nThis returns the\
    \ natural logarithm value of *x*.\n\n```lua\nprint(math.log(0.5))  -- (−0.69314718055995)\n\
    ```\n\n### `math.log10 (x)`\n\nThis returns the base 10 logarithm value of *x*.\n\
    \n```lua\nprint(math.log10(100))  -- 2.0\n```"
  raw: 'The code for writing the data to the file is not very different. We open the
    file in write mode, and then we iterate through the list of variables that we
    want to save to the file. These are found from the resTable parameter passed.
    So, whatever we have in this table, the function shall attempt to save those variables
    to the file.


    Saving a Table


    We just saved data that is in the form of either strings or numbers. If the data
    to be saved is anything else, the functions will start to fail, and more so if
    the variable is a table. The biggest issue with tables is iterating through the
    depths of the table.


    If you were to use any other programming language, you would hear, “Why not serialize
    the data?” I’ll explain why this isn’t a good idea in Lua.


    The mark of good developers is their ability to avoid reinventing the wheel, instead
    spending their time with things that warrant their focus. Lua has a third-party
    Lua library that allows you to use JSON in your Lua projects; this library can
    help encode or decode the information between the table object and a JSON-encoded
    string, like so:


    ```

    local json = require("json")

    local theTable = {

        title = "Learn Lua for iOS game development",

        author = "Jayant Varma",

        publisher = "Apress",

        eBook = true,

        year = 2012,

    }

    local resString = json.encode(theTable)

    writeToFileSingle(restring,"mytable")

    local readString = readFromFileSingle("mytable")

    local resTable = json.decode(readString)

    for k,v in pairs(resTable) do

        print(k,v)

    end

    ```


    When you run this code, you will see that we save the data we create as a string
    to a file called mytable. In the example, we read the data back and decode the
    JSON-encoded string to an expanded Lua form table. Then we list the fields available
    in that table to prove that the code works.


    **Note**   Though this code is completely valid, if you run the code in the Lua
    interactive shell, you might face issues such as error messages, as there is no
    json.lua file in the path.


    Dynamic Variables


    How do I create dynamic variables? is one of the most commonly asked question
    by many developers, especially ones that are beginning their journey with development.
    Some beginner developers use variables as follows:


    ```

    Object1 = "Apple"

    Object2 = "Ball"

    Object3 = "Cat"

    Object4 = "Dog"

    ```


    In this code, the developer wants to create a series of such variables dynamically
    and be able to access them by specifying the last digit, so the access expected
    would be


    ```

    number = 3

    print("Object" .. number)

    ```


    and the expectation is that it should output Cat. However, what it outputs is
    Object3\. Most beginning developers assume that it should have worked as expected.
    If you need to access the variable in this manner, it is not by creating multiple
    variables. The proper way to do so is to create an array. The array can be accessed
    by passing it the number as we expected to do.


    ```

    Objects = {"Apple", "Ball", "Cat", "Dog"}

    number = 3

    print(Objects[number])

    ```


    This works perfectly fine for what we need. This time around we see the output
    Cat.


    Summary


    In this chapter you learned about the implicit and explicit functions relating
    to file I/O. You also saw how to read and write data as singular values, and how
    to write an entire table of data onto the storage space on the device. Files are
    good for saving scraps of data; however, when you need to access larger amounts
    of data, it would be better to use a database.


    In the next chapter we shall look at the math namespace, which offers functions
    that we can use to do all of the calculations required for our apps.


    Chapter     4


    Math with Lua


    Love it or hate it, if you have decided to be a developer, you will have to come
    face to face with math. It is indeed surprising to see how many students dislike
    or shy away from math, but it just comes back to us in some form or the other,
    irrespective of our profession. An accountant needs to look at the accounts and
    add them up (requiring math), a surveyor needs to apply trigonometric principles
    to get elevation and terrain information, a banker needs to calculate interest
    and yield for investments, and so on. It reminds me of Homer Simpson, who once
    said, “English? Who needs that? I’m never going to England!” However, you have
    decided to be a developer, and you will come back to this time and time again,
    as many of the things that you need to do are based on simple math principles.
    These can be applied with any framework or language.


    Introduction to Math in Lua


    There is a system library included with Lua that offers a series of math functions.
    The following is a list of the functions available. Most of these functions are
    self-explanatory.


    math.abs (x)


    This returns the absolute value of *x*. If you pass this function a negative value,
    it returns the positive value of *x*.


    ```

    print(math.abs(−10))   -- Will return 10

    ```


    math.acos (x)


    This returns the arc cosine of the value *x* in radians.


    ```

    print (math.acos(1))   -- Prints zero ''0''

    ```


    math.asin (x)


    This returns the arc sine of the value *x* in radians.


    ```

    print(math.asin(1))  -- Prints 1.5707963267949

    ```


    math.atan (x)


    This returns the arctangent of the value *x* in radians. This is in the range
    of –pi/2 to pi/2.


    ```

    print(math.atan(1))  -- Prints 0.78539816339745

    ```


    math.atan2 (y,x)


    This returns the principal value of the arctangent of the quotient of the two
    numbers passed.


    ```

    print(math.atan2(1, 0))     --   pi/2

    print(math.atan2(−1, 0))    --   -pi/2

    print(math.atan2(0, 1))     --   0

    print(math.atan2(0, -1))    --   pi

    ```


    **Note**   The parameters passed are *y* and then *x*, not *x,y*, as are generally
    passed.


    math.ceil (x)


    This returns the integer value of the passed value of *x* closest to the next
    integer.


    ```

    print (math.ceil(0.1))  -- Returns 1

    print (math.ceil(0.5))  -- Returns 1

    print (math.ceil(0.6))  -- Returns 1

    ```


    math.cos (x)


    This returns the cosine value of *x* passed in radians.


    ```

    print(math.cos(1))  -- 0.54030230586814

    ```


    math.cosh (x)


    This returns the hyperbolic cosine of a value.


    ```

    print(math.cosh(1)) -- 1.5430806348152

    ```


    math.deg (x)


    This function converts a value from degree to radians.


    ```

    print(math.deg(math.pi))  -- 180

    ```


    math.exp (x)


    This returns e, the base of natural logarithms raised to a given power.


    ```

    print (math.exp(2)) -- 7.3890560989307

    ```


    math.floor (x)


    This returns the lower integer value from the passed value of *x*.


    ```

    print (math.floor(0.1))  -- 0

    print (math.floor(0.5))  -- 0

    print (math.floor(0.9))  -- 0

    ```


    math.fmod (x)


    This returns the remainder of the division of the arguments that rounds the quotient
    toward zero, according to the following equation:


    remainder = numerator – quotient * denominator


    The function itself is used like this:


    ```

    print(math.fmod(7.5,3))  -- 1.5

    ```


    math.frexp (x)


    This function splits the value into a normalized fraction and an exponent. The
    results are two numbers. The number *x* can be represented as follows:


    fraction * 2^exponent


    Here are some examples of the function in code:


    ```

    print(math.frexp(2))  -- 0.5       2

    print(math.frexp(3))  -- 0.75       1

    print(math.frexp(1))  -- 0.5       1

    ```


    math.huge


    This is a constant than a function; it returns inf, which is a very large number.


    ```

    print(math.inf)

    ```


    math.ldexp (m, e)


    This returns a number generated from the combination of the mantissa *m* and the
    exponent *e*. The formula used is


    number = m * 2^e


    Here’s the function in use:


    ```

    print(math.ldexp(0.5, 8)) -- 128

    ```


    math.log (x)


    This returns the natural logarithm value of *x*.


    ```

    print(math.log(0.5))  -- (−0.69314718055995)

    ```


    math.log10 (x)


    This returns the base 10 logarithm value of *x*.'
  trans: "\n将数据写入文件的代码与之前差异不大。我们以写入模式打开文件，然后遍历要保存到文件中的变量列表。这些变量来自传入的`resTable`参数。因此，无论此表中有何内容，该函数都将尝试将这些变量保存到文件中。\n\
    \n## 保存表\n\n我们刚才保存的数据要么是字符串，要么是数字形式。如果要保存的数据是其他类型，函数就会开始出错，如果变量是一个表，则问题更严重。表的最大难点在于遍历表的深度。\n\
    \n如果你使用任何其他编程语言，你会听到这样的建议：“为什么不序列化数据？” 我将解释为什么这在 Lua 中不是一个好主意。\n\n优秀开发者的标志是能够避免重复造轮子，而是将时间花在值得关注的事情上。Lua\
    \ 有一个第三方 Lua 库，允许你在 Lua 项目中使用 JSON；这个库可以帮助你在表对象和 JSON 编码的字符串之间进行编码或解码信息，如下所示：\n\
    \n```lua\nlocal json = require(\"json\")\nlocal theTable = {\n    title = \"Learn\
    \ Lua for iOS game development\",\n    author = \"Jayant Varma\",\n    publisher\
    \ = \"Apress\",\n    eBook = true,\n    year = 2012,\n}\nlocal resString = json.encode(theTable)\n\
    writeToFileSingle(restring,\"mytable\")\nlocal readString = readFromFileSingle(\"\
    mytable\")\nlocal resTable = json.decode(readString)\nfor k,v in pairs(resTable)\
    \ do\n    print(k,v)\nend\n```\n\n运行这段代码时，你会看到我们将创建的数据作为字符串保存到名为`mytable`的文件中。在示例中，我们读取回数据，并将\
    \ JSON 编码的字符串解码为展开的 Lua 形式表。然后，我们列出该表中可用的字段，以证明代码可以工作。\n\n**注意**  尽管这段代码完全有效，但如果你在\
    \ Lua 交互式 shell 中运行它，可能会遇到错误消息等问题，因为路径中没有`json.lua`文件。\n\n## 动态变量\n\n如何创建动态变量？这是许多开发者，尤其是那些刚踏上开发之旅的人，最常问的问题之一。一些初学开发者会像下面这样使用变量：\n\
    \n```lua\nObject1 = \"Apple\"\nObject2 = \"Ball\"\nObject3 = \"Cat\"\nObject4\
    \ = \"Dog\"\n```\n\n在这段代码中，开发者希望动态创建一系列这样的变量，并通过指定最后一个数字来访问它们，因此期望的访问方式是：\n\n\
    ```lua\nnumber = 3\nprint(\"Object\" .. number)\n```\n\n并且期望它应该输出`Cat`。然而，它实际输出的是`Object3`。大多数初学开发者认为它本应正常工作。如果你需要以这种方式访问变量，那并不是通过创建多个变量来实现的。正确的方法是创建一个数组。可以通过按预期传入数字来访问该数组。\n\
    \n```lua\nObjects = {\"Apple\", \"Ball\", \"Cat\", \"Dog\"}\nnumber = 3\nprint(Objects[number])\n\
    ```\n\n这对于我们的需求来说完美运行。这次我们看到了输出`Cat`。\n\n## 本章小结\n\n在本章中，你学习了与文件 I/O 相关的隐式和显式函数。你还了解了如何读取和写入单个值的数据，以及如何将整个数据表写入设备上的存储空间。文件适用于保存少量数据；然而，当你需要访问大量数据时，最好使用数据库。\n\
    \n在下一章中，我们将介绍数学命名空间，它提供了我们可以用来为应用程序执行所有必要计算的函数。\n\n# 第 4 章：用 Lua 玩转数学\n\n无论你喜欢还是讨厌它，如果你决定成为一名开发者，你就必须直面数学。看到有多少学生不喜欢或回避数学确实令人惊讶，但无论我们从事何种职业，数学总会以某种形式回到我们身边。会计师需要查看账目并对其进行加总（需要数学），测量员需要运用三角学原理来获取高程和地形信息，银行家需要计算投资利息和收益，等等。这让我想起了荷马·辛普森，他曾说过：“英语？谁需要它？我从来不去英格兰！”\
    \ 然而，你已决定成为一名开发者，你会一次又一次地回到数学上，因为你需要做的许多事情都基于简单的数学原理。这些原理可以应用于任何框架或语言。\n\n## Lua\
    \ 数学简介\n\nLua 附带了一个系统库，提供了一系列数学函数。以下是可用函数的列表。这些函数大多不言自明。\n\n### `math.abs (x)`\n\
    \n返回 *x* 的绝对值。如果你向此函数传递一个负值，它将返回 *x* 的正值。\n\n```lua\nprint(math.abs(−10))   --\
    \ 将返回 10\n```\n\n### `math.acos (x)`\n\n以弧度为单位返回值 *x* 的反余弦值。\n\n```lua\nprint\
    \ (math.acos(1))   -- 打印零 '0'\n```\n\n### `math.asin (x)`\n\n以弧度为单位返回值 *x* 的反正弦值。\n\
    \n```lua\nprint(math.asin(1))  -- 打印 1.5707963267949\n```\n\n### `math.atan (x)`\n\
    \n以弧度为单位返回值 *x* 的反正切值。范围在 –pi/2 到 pi/2 之间。\n\n```lua\nprint(math.atan(1))  --\
    \ 打印 0.78539816339745\n```\n\n### `math.atan2 (y,x)`\n\n返回所传递的两个数字之商的反正切主值。\n\n\
    ```lua\nprint(math.atan2(1, 0))     --   pi/2\nprint(math.atan2(−1, 0))    --\
    \   -pi/2\nprint(math.atan2(0, 1))     --   0\nprint(math.atan2(0, -1))    --\
    \   pi\n```\n\n**注意**  传入的参数是 *y* 然后是 *x*，而不是通常传递的 *x,y*。\n\n### `math.ceil (x)`\n\
    \n返回传入值 *x* 的向上取整到下一个最接近整数的整数值。\n\n```lua\nprint (math.ceil(0.1))  -- 返回 1\nprint\
    \ (math.ceil(0.5))  -- 返回 1\nprint (math.ceil(0.6))  -- 返回 1\n```\n\n### `math.cos\
    \ (x)`\n\n返回以弧度传入的 *x* 的余弦值。\n\n```lua\nprint(math.cos(1))  -- 0.54030230586814\n\
    ```\n\n### `math.cosh (x)`\n\n返回一个值的双曲余弦值。\n\n```lua\nprint(math.cosh(1)) -- 1.5430806348152\n\
    ```\n\n### `math.deg (x)`\n\n此函数将弧度值转换为角度。\n\n```lua\nprint(math.deg(math.pi))\
    \  -- 180\n```\n\n### `math.exp (x)`\n\n返回 e（自然对数的底数）的给定次幂的值。\n\n```lua\nprint\
    \ (math.exp(2)) -- 7.3890560989307\n```\n\n### `math.floor (x)`\n\n返回传入值 *x* 的向下取整的整数值。\n\
    \n```lua\nprint (math.floor(0.1))  -- 0\nprint (math.floor(0.5))  -- 0\nprint\
    \ (math.floor(0.9))  -- 0\n```\n\n### `math.fmod (x)`\n\n根据以下等式，返回参数相除后向零取整的余数：\n\
    \n余数 = 分子 – 商 * 分母\n\n该函数的使用方法如下：\n\n```lua\nprint(math.fmod(7.5,3))  -- 1.5\n\
    ```\n\n### `math.frexp (x)`\n\n此函数将一个值分解为规格化分数和指数。结果返回两个数字。数字 *x* 可以表示如下：\n\n\
    分数 * 2^指数\n\n以下是一些代码示例：\n\n```lua\nprint(math.frexp(2))  -- 0.5       2\nprint(math.frexp(3))\
    \  -- 0.75       1\nprint(math.frexp(1))  -- 0.5       1\n```\n\n### `math.huge`\n\
    \n这是一个常量而非函数；它返回 inf，一个非常大的数字。\n\n```lua\nprint(math.inf)\n```\n\n### `math.ldexp\
    \ (m, e)`\n\n返回由尾数 *m* 和指数 *e* 组合生成的数字。使用的公式是：\n\n数字 = m * 2^e\n\n以下是函数用法：\n\n\
    ```lua\nprint(math.ldexp(0.5, 8)) -- 128\n```\n\n### `math.log (x)`\n\n返回 *x*\
    \ 的自然对数值。\n\n```lua\nprint(math.log(0.5))  -- (−0.69314718055995)\n```\n\n###\
    \ `math.log10 (x)`\n\n返回 *x* 的以 10 为底的对数值。\n\n```lua\nprint(math.log10(100)) \
    \ -- 2.0\n```\n"
- fmt: "`print(math.log10(0.5))`  --  (−0.30102999566398)\n\n`math.max (x, …)`\n\n\
    返回传入值中的最大值。\n\n```\nprint(math.max(2,5,3,8,3,4,5))  -- 8\n```\n\n`math.min (x,\
    \ …)`\n\n返回传入值中的最小值。\n\n```\nprint(math.min(2,5,3,8,3,4,5))  -- 2\n```\n\n`math.modf\
    \ (x)`\n\n返回传入数字的整数部分和小数部分。因此，如果传入`x.y`，它将返回`x`和`y`。\n\n```\nprint(math.modf(3.75))\
    \  -- 3       0.75\n```\n\n`math.pi`\n\n返回数学常数π。\n\n```\nprint(math.pi)  -- 3.1415926535898\n\
    ```\n\n`math.pow (x,y)`\n\n返回`x`的`y`次幂的结果（即`x ^ (y)`）。\n\n```\nprint(math.pow(3,3))\
    \  -- 27 => 3^3\nprint(math.pow(5,2))  -- 25 => 5^5\n```\n\n`math.rad (x)`\n\n\
    返回角度`x`转换成的弧度值。\n\n```\nprint(math.rad(math.pi))  -- 3.1415296535898\n```\n\n\
    `math.random ( [m [,n]] )`\n\n返回`m`到`n`之间的随机值。如果未传入`m`和`n`的值，则函数返回0到1之间的值。如果只传入一个值，则返回1到该数字之间的整数值。\n\
    \n```\nprint(math.random())  -- 0到1之间的十进制数\nprint(math.random(10))  -- 1到10之间的整数值\n\
    print(math.random(5,25))  -- 5到25之间的整数值\n```\n\n`math.randomseed (x)`\n\n设置随机数生成器的种子。如果设置了种子，则可以获得相同的随机值。\n\
    \n`math.sin (x)`\n\n返回以弧度传入角度的正弦值。\n\n```\nprint(math.sin(30))  -- (−0.98803162409286)\n\
    ```\n\n`math.sinh (x)`\n\n返回一个值的双曲正弦。\n\n```\nprint(math.sinh(1))  -- 1.1752011936438\n\
    ```\n\n`math.sqrt (x)`\n\n返回`x`指定数字的平方根。\n\n```\nprint(math.sqrt(144)) -- 12\n\
    print(math.sqrt(9))  -- 3\n```\n\n`math.tan (x)`\n\n返回以弧度传入角度的正切值。\n\n```\nprint\
    \ (math.tan(45))  -- 1.6197751905439\n```\n\n`math.tanh (x)`\n\n返回一个值的双曲正切。\n\n\
    ```\nprint(math.tanh(1))  -- 0.76159415595576\n```\n\n## 数学在游戏中的实际应用\n\n如果你开发游戏，你会被数学包围。任何游戏都会涉及的最简单场景就是移动角色，这涉及在x轴或y轴上移动角色，通俗地说就是左右或上下移动。角色左右移动被称为在`x轴`上，上下移动则在`y轴`上。\n\
    \n另一个使用数学的例子是简单的计分，根据在游戏中收集的对象类型来增加分数。你还会使用数学来处理拥有多条生命的玩家，每次回合减少一个值，直到归零，游戏结束。\n\
    \n但首先，让我们复习一些关于数学的基础知识（尽管我们在学校都学过）。\n\n### 赋值\n\n我们要看的第一件事是赋值。还记得学校里的那些日子，我们曾这样写：\n\
    \n令`x`等于5  \n令`y`等于3  \n`x + y = 5 + 3`  \n`= 8`\n\n这个概念至今依然存在。在Lua中，当我们给变量赋值时，这个值可以是[第1章](#9781430246626_Ch01.xhtml)中讨论的八种基本类型之一。最常用的是数字、字符串和表。\n\
    \n上述代数方程将转换为：\n\n```\nx = 5\ny = 3\nprint( \"x + y = \" .. x + y)\n```\n\n###\
    \ 递增与递减\n\n如果你是从C/C++背景转到Lua，你可能习惯了运算符重载。这就是为什么很多开发者会问Lua为什么没有`var++`或`var--`运算符来递增或递减值。虽然Lua没有这个功能有很多原因，但一个简单的理由是Lua被设计得易于使用。然而，在Lua中实现这种功能并不困难；它就像这样简单：\n\
    \n```\nvar = var + 1\n```\n\n或者\n\n```\nvar = var – 1\n```\n\n如果这很关键，Lua最棒的一点是你可以创建自己的函数，通过集成它们的语法，让你获得使用自己偏好语言的那种安全感。\n\
