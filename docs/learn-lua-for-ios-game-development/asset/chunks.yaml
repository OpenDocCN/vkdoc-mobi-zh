    Tips and Tricks


    The dilemma that many developers face is, as the old saying goes, there are many
    ways to skin a cat. In simple terms, while there are many ways to achieve an outcome,
    many developers face the issue of how to and where to start. This chapter will
    help you with those starting points. It will offer the tips and tricks that can
    be applied across most of the frameworks. The main differences to note are the
    native display objects as used by the frameworks and some quirks associated with
    those.


    Generic Lua Functions


    This section addresses some generic functions that help developers and can be
    used across all frameworks. Most of these are related to tables for storage, retrieval,
    and indexing, and math relevant to game development.


    Using the printf Function


    Lua has a print function, but it does not allow for formatted output like the
    C printf does. It is always nice to have outputs that are formatted and read like
    a sentence, as opposed to pieces of information stuck together. "There are 5 boys
    and 4 girls in the Math class" rather than "Boys: 5 Girls: 3, Class: Math" which
    could have been outputted using the code


    ```

    print("Boys:", boys, "Girls:", girls, "Class:", className)

    ```


    The printf function is quite simple, and can be used as follows:


    ```

    function printf(format,  ...)

      print(string.format(format,  ...))

    end

    ```


    Here’s an example of the function in use:


    ```

    local boys = 5

    local girls = 3

    local className = "Math"

    print("Boys:", boys, "Girls:", girls, "Class:", className)

    printf("There are %d boys and %d girls in the %s class", boys, girls, className)

    ```


    Counting the Number of Elements in a Table


    Tables were introduced in [Chapter 2](#9781430246626_Ch02.xhtml). Tables that
    are stored as arrays can return the number of elements present via the # (length-of)
    operator. But when dealing with tables that are not arrays or a combination of
    arrays, this functionality does not work as expected. To remedy this, we can write
    a quick function to get the length of any table type:


    ```

    function tableLen(theTable)

      local count = 0

      for i,j in pairs(theTable) do

        count = count + 1

      end

      return count

    end

    ```


    We simply iterate through every element in the table, increment our count variable,
    and then return the count value as a result.


    Using IsEmpty


    Sometimes, you want to know if a variable is empty. But the definition of *empty*
    depends on the type of variable it is. A numeric variable holding a zero value
    would be considered empty, a string with no characters would be empty, a table
    with no elements would be empty, and all of these, if nil, could also be considered
    empty. We can use the function tableLen (which we just created in the preceding
    example) to determine the length of a table-type variable.


    ```

    function isEmpty(var)

        if var == nil then return true end


    local varType = type(var)


    if varType == "number" and var == 0 then

            return true

        elseif varType == "string" and #var == 0 then

            return true

        elseif varType == "table" and tableLen(var)==0 then

            return true

        end


    return false

    end

    ```


    Knowing the Index of an Element


    When working with a table (array object), we can get the element if we know the
    index of the element (e.g., if we have a list of names and we know that the fifth
    element is Jayant, then we can access it as arrTable[5]). However, there are cases
    when we would have no clue about the index, but might know the value. If we wanted
    to know what element in the table has the value of Jayant, we can use the indexOf
    function:


    ```

    function indexOf(arrTable, theValue)

        for i, j in pairs(arrTable) do

            if j == theValue then

                return i

            end

        end

    end

    ```


    This will also work for non-array tables, but the return value will not be a numeric
    index, but a key of type string.


    Determining Whether a Table Is an Array


    There could be a scenario when you need to know if a table is a hash table or
    an array. We can determine this because the # operator returns the number of elements
    in an array, whereas for a table it returns 0 or the count of elements that it
    can determine as an array. A non-array table will be one that has more elements
    than the # operator can return.


    ```

    function isArray(arrTable)

      return #arrTable == tableLen(arrTable)

    end

    ```


    Setting Default Values


    If you have been developing with other languages, you might be used to checking
    for values and ensuring that they are set, as missing values can cause errors.
    You may be familiar with something like the following:


    ```

    function foo(bar)

      if bar == nil then

        bar = "Untitled"

      end


    print("We got :", bar)

    end

    ```


    While working with Lua, this is not really an issue; we can get rid of all these
    conditional statements like so


    ```

    function foo(bar, baz, faz)

      local bar = bar or "Bar"

      local baz = baz or "Baz"

      local faz = faz or "Faz"


    print("We got", bar, baz, faz)

    end

    ```


    Notice that we set the default values of variables by simply using or. A good
    idea is to use a local variable with the same name.


    Not only is this helpful in assigning default values to variables that are unassigned
    (i.e. are nil), but also in creating blank tables, as you can use it like this:


    ```

    local theTable = theTable or {}

    ```


    Copying Tables


    One word of caution while copying tables is that tables are like pointers, so
    when you assign a new variable with the table variable, it just makes a copy to
    the location where the table is stored, not a copy of the table.


    ```

    function copyTable(table 1)

      local res = {}

      for i, j in pairs(table 1) do

        res[i] = j

      end

      return res

    end

    ```


    Please note that the preceding function is called a *shallow copy*, as it does
    not copy the embedded tables, so if the table has any nested tables, those are
    not copied. To make an exact copy, we need to perform what is called a *deep copy*.


    Performing a Deep Copy


    As mentioned in the preceding section, to completely create a copy of a table,
    we need to perform a deep copy. This will copy all elements recursively and also
    set the metatables as required. Normal copying does not set the metatable.'
