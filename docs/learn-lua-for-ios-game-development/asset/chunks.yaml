    printf(\"There are %d boys and %d girls in the %s class\", boys, girls, className)\n\
    ```\n\n### 计算表中的元素数量\n\n表在第 2 章中介绍过。存储为数组的表可以通过 `#`（长度）运算符返回元素的数量。但是在处理非数组表或数组组合表时，此功能无法按预期工作。为了解决这个问题，我们可以编写一个快速函数来获取任何表类型的长度：\n\
    \n```lua\nfunction tableLen(theTable)\n  local count = 0\n  for i,j in pairs(theTable)\
    \ do\n    count = count + 1\n  end\n  return count\nend\n```\n\n我们只需遍历表中的每个元素，递增我们的\
    \ `count` 变量，然后返回 `count` 值作为结果。\n\n### 使用 `isEmpty`\n\n有时，你想知道一个变量是否为空。但*空*的定义取决于变量的类型。数值变量为零值会被视为空，没有字符的字符串为空，没有元素的表为空，而所有这些变量，如果为\
    \ `nil`，也可以被视为空。我们可以使用之前示例中创建的 `tableLen` 函数来确定表类型变量的长度。\n\n```lua\nfunction isEmpty(var)\n\
    \    if var == nil then return true end\n\n    local varType = type(var)\n\n \
    \   if varType == \"number\" and var == 0 then\n        return true\n    elseif\
    \ varType == \"string\" and #var == 0 then\n        return true\n    elseif varType\
    \ == \"table\" and tableLen(var)==0 then\n        return true\n    end\n\n   \
    \ return false\nend\n```\n\n### 查找元素的索引\n\n在使用表（数组对象）时，如果我们知道元素的索引，就可以获取该元素（例如，如果我们有一个姓名列表，并且知道第五个元素是\
    \ `Jayant`，那么我们可以通过 `arrTable[5]` 访问它）。然而，在某些情况下，我们可能不知道索引，但知道值。如果我们想知道表中哪个元素的值是\
    \ `Jayant`，可以使用 `indexOf` 函数：\n\n```lua\nfunction indexOf(arrTable, theValue)\n\
    \    for i, j in pairs(arrTable) do\n        if j == theValue then\n         \
    \   return i\n        end\n    end\nend\n```\n\n这也适用于非数组表，但返回值将不是数字索引，而是字符串类型的键。\n\
    \n### 判断表是否为数组\n\n在某些情况下，你可能需要知道一个表是哈希表还是数组。我们可以判断这一点，因为 `#` 运算符返回数组中的元素数量，而对于表，它返回\
    \ 0 或它可以确定为数组的元素数量。非数组表指那些元素数量超过 `#` 运算符返回数量的表。\n\n```lua\nfunction isArray(arrTable)\n\
    \  return #arrTable == tableLen(arrTable)\nend\n```\n\n### 设置默认值\n\n如果你使用过其他语言进行开发，你可能习惯于检查值并确保它们已被设置，因为缺失值可能导致错误。你可能熟悉类似下面的写法：\n\
    \n```lua\nfunction foo(bar)\n  if bar == nil then\n    bar = \"Untitled\"\n  end\n\
    \n  print(\"We got :\", bar)\nend\n```\n\n在使用 Lua 时，这其实不是问题；我们可以像这样去掉所有这些条件语句：\n\
    \n```lua\nfunction foo(bar, baz, faz)\n  local bar = bar or \"Bar\"\n  local baz\
    \ = baz or \"Baz\"\n  local faz = faz or \"Faz\"\n\n  print(\"We got\", bar, baz,\
    \ faz)\nend\n```\n\n注意，我们通过简单地使用 `or` 来设置变量的默认值。一个好的做法是使用同名的局部变量。\n\n这不仅有助于为未赋值（即\
    \ `nil`）的变量分配默认值，也有助于创建空表，你可以像这样使用它：\n\n```lua\nlocal theTable = theTable or {}\n\
    ```\n\n### 复制表\n\n复制表时需要提醒一点：表类似于指针，所以当你用表变量赋值给一个新变量时，它只是复制了指向表存储位置的引用，而不是表的副本。\n\
