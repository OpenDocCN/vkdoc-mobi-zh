    \n### Animating Text\n\nThe `MOAITextBox` has a `spool` function, which allows\
    \ for the text to be revealed character by character. This provides for some interesting\
    \ effects when displaying text.\n\n```\ntextbox:spool()\n```\n\n## Drawing Vector\
    \ Primitives\n\n`Moai` uses the class `MOAIDeck` to create a canvas on which drawing\
    \ operations can be performed. All drawing is performed in the local space of\
    \ the deck.\n\nBefore you can draw, you have to create an object of type `MOAIScriptDeck`\
    \ type, as follows:\n\n```\nscriptDeck = MOAIScriptDeck.new()\n```\n\nIt is important\
    \ to note that the drawing coordinates of `Moai` are different from those of most\
    \ of the frameworks. While most other frameworks have the top left as 0,0, `Moai`\
    \ has the center as 0,0. In this way, a 320×480 screen extends 160 pixels in both\
    \ directions on the x-axis and 240 pixels on the y-axis.\n\nThe `scriptDeck` object\
    \ relies on a callback function to manage the drawing of the `scriptDeck`, which\
    \ can be set using the `setDrawCallback` function. The callback has the parameters\
    \ `index`, `xOffset`, `yOffset`, `xScale`, and `yScale`. The `index` determines\
    \ the deck that needs to be redrawn, and the offsets and scales help in drawing.\n\
    \nThe `MOAI` drawing classes allow for drawing all of the following:\n\n*   Lines\n\
