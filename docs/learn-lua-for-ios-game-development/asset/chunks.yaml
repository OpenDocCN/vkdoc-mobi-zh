    \ false\n    end\nend\n```\n\n尽管大多数开发者会这样编写代码，但其中包含了可以避免的不必要的`if .. then`语句。这个函数可以简洁地重写为：\n\
    \n```lua\nlocal function getTrueOrFalse(thisCondition)\n    return thisCondition\
    \ == true\nend\n```\n\n可以看到，代码被精简了，只剩一行。这种做法同样适用于根据条件范围返回`true`或`false`的函数。例如，假设我们要编写一个函数`isNumberGreaterThanTen`：\n\
    \n```lua\nlocal function isNumberGreaterThanTen(theNumber)\n    return theNumber\
    \ > 10\nend\n```\n\n我们可以直接评估条件结果，而无需使用`if .. then`语句来返回`true`或`false`。\n\n你可能还想知道如何根据条件来切换代码的特定部分。这个问题对于本次讨论来说范围有点太广了，但让我们尝试将其缩小到适合本节上下文的程度。\n\
    \n控制代码的某些部分是否允许执行的一种方法是使用一系列`if`语句：\n\n```lua\nlocal flag = false\n\nfunction\
    \ doSomething()\n    if flag == true then\n        -- 仅当标志为真时执行此部分\n    end\n\
    \    -- 无论标志为何，都会执行此部分\nend\n\ndoSomething()\n```\n\n类似地，你也可以使用标志来禁用某些函数。假设我们每隔几秒就调用一个函数来更新玩家在屏幕地图上的位置。在地图完全加载并显示之前，没有必要在屏幕上显示信息。或者，在另一种场景中，有一个触摸处理器负责处理屏幕上的触摸或点击事件，但我们可能想临时禁用它，使其不处理这些事件。在下面的代码示例中，我们检查变量`fDisable`是否为`true`。如果是，我们就直接从代码中`return`，不再执行后续代码。\n\
    \n```lua\nfunction someFunction()\n    if fDisable == true then return end\n \
    \   -- 后续代码是当该函数实际运行时你想要执行的内容\nend\n```"
- fmt: "# 函数基础与字符串处理\n\n通过从函数中直接返回，我们实际上并未执行函数的代码，这相当于暂时禁用了该函数。与此相反，你可能需要移除事件处理器然后再重新设置它们，这比简单的标志位方法更繁琐。\n\
    \nLua 的另一个重要特性是 `and` 和 `or` 的工作方式。Lua 允许你不将它们用作位运算符（如果你有 C 语言背景）。\n\n布尔运算符 `or`\
    \ 在 Lua 中被广泛用于给变量分配默认值，就像这样：\n\n```lua\nlocal aVal = somevalue\nif aVal == nil\
    \ then\n    aVal = defaultValue\nend\n```\n\n在 Lua 中，前面的代码可以很容易地转换为一行，如下所示：\n\n\
    ```lua\nlocal aVal = somevalue or defaultValue\n```\n\n[Table 4-1](#9781430246626_Ch04.xhtml#Tab1)\
    \ 提供了 `and` 和 `or` 工作方式的快速概述。\n\n[Table 4-1](#9781430246626_Ch04.xhtml#_Tab1)\
    \ Boolean Operations\n\n![image](OEBPS/Images/Table04-01.jpg)\n\n## 总结\n\n如果你认真对待游戏开发，你需要理解数学。有许多函数可以帮助你作为开发者。你可以检查碰撞；检查直线、矩形和圆形的交集；以及确定两个对象之间的角度和距离。许多\
    \ Lua 数学函数在各种框架中都是有效的，并且有些框架集成了数学库。我们在 [Chapter 7](#9781430246626_Ch07.xhtml)\
    \ 中有很多这些通用函数，而在 [Chapter 13](#9781430246626_Ch13.xhtml) 中，我们将讨论第三方库，创建一个数学向量库，这对于没有向量函数的框架将非常有用。\n\
    \n# Chapter 5: 字符串\n\n希望你能挺过上一章关于 Lua 数学的内容。这几章的整体思路是向你介绍，你可以在 Lua 中创建逻辑，然后使用任何框架来添加图形。因此，我们将在这些章节中创建的许多函数可以在大多数框架中通用，而无需太多更改。在本章中，我们将探讨字符串这个主题。\n\
    \n## 什么是字符串？\n\n字符串是 Lua 中可用的多种变量类型之一。它可以保存任意长度的字母数字字符。它不能像表那样具有多个维度。如果字符串用于任何形式的算术运算，Lua\
    \ 会自动将字符串转换为数字。这个过程称为*强制转换*，并且是自动的。\n\n你之前已经见过多种形式的字符串，最简单的例子是：\n\n```lua\nprint(\"\
    hello world!\")\n```\n\n这里的字符串是 `\"hello world!\"`。它的主要特征是将字母数字字符用双引号或单引号括起来。\n\
    \n在这种情况下，由于 `\"hello world\"` 没有被赋值给变量而直接使用，它被称为*常量字符串*。\n\n大多数字符串函数用于操作文本。以下部分描述了\
    \ Lua 中可用的函数。\n\n**注意** 许多可用的函数也在命名空间内提供。因此，你也可以以面向对象的风格使用这些函数。例如，`string.byte(s,i)`\
    \ 可以表示为 `s:byte(i)`。\n\n### `string.byte ( s [,i [,j ] ] )`\n\n对于设备来说，一个字符是一个从\
    \ 0 到 255 的 ASCII 数字。虽然我们将字符识别为 *A* 或 *a*，但每个字符都用数字表示，例如 65、97 等。`byte` 函数返回指定位置字符的数字或\
    \ ASCII 码。可以传递三个参数：字符串本身 (`s`) 以及可选的 `i` 和 `j`；`i` 标记字符串的起始位置（默认是 1），`j` 标记字符串的结束位置（默认与\
    \ `i` 相同）。这是一个例子：\n\n```lua\nprint(string.byte(\"One\"))\nprint(string.byte(\"\
    One\",1,3))\n```\n\n### `string.char (. . .)`\n\n这个函数与前一个函数类似，区别在于它不是将字符转换为数值，而是将数值转换为字符。该函数接受一个整数，并返回一个长度等于传入整数数量的字符串。\n\
    \n```lua\nprint(string.char(72, 101, 108, 108, 111, 32, 87, 111, 114, 108, 100))\n\
    ```\n\n### `string.dump ( function )`\n\n这个函数返回一个包含给定函数二进制表示的字符串。这个字符串之后可以与 `loadstring`\
    \ 函数一起使用，返回该函数的一个副本。尽管大多数框架允许 `loadstring`，但 CoronaSDK 已屏蔽了此函数，因此如果使用 CoronaSDK，对此函数做不了太多事情。\n\
    \n### `string.find ( s, pattern [,init [,plain] ] )`\n\n这个函数在字符串 `s` 中查找 `pattern`\
    \ 的首次匹配。如果找到，则返回匹配开始和结束位置的索引。如果未找到匹配，则返回 `nil`。参数 `init`（如果传递）决定了搜索的起始位置。此参数的默认值是\
    \ 1。参数 `plain` 是一个布尔值，要么是 `true`，要么是 `false`。它决定 `pattern` 是否只是用于子字符串匹配的纯文本。如果这是\
    \ `true`，那么 `pattern` 可以有占位符和通配符用于匹配。如果 `pattern` 有捕获，则该函数会在两个索引之后返回捕获的值。\n\n\
    ### `string.format ( formatString, . . . )`\n\n这个函数返回一个基于传入的格式和值格式化后的字符串。这类似于\
    \ C 函数 `printf`。选项/修饰符 `*`、`l`、`L`、`n`、`p` 和 `h` 不受支持。此函数有一个新选项 `q`，它以一种适合且安全的方式格式化字符串，以便与\
    \ Lua 解释器一起使用。所有字符都被正确转义以正常工作。例如：\n\n```lua\nstring.format('%q', 'a string with\
    \ \"quotes\" and \\n new line')\n```\n\n将产生字符串：\n\n```\n\"a string with \\\"quotes\\\
    \" and \\\nnew line\"\n```\n\n虽然大多数选项 `c`、`d`、`E`、`e`、`f`、`g`、`G`、`I`、`o`、`u`、`X`\
    \ 和 `x` 期望一个数字作为参数，但 `s` 和 `q` 期望一个字符串。\n\n### `string.gmatch ( s, pattern )`\n\
    \n这个函数返回一个迭代器函数，每次调用时，它返回字符串 `s` 中 `pattern` 的下一个捕获。如果模式没有指定要捕获的内容，则返回整个匹配。\n\n\
    ### `string.gsub ( s, pattern, repl [,n] )`\n\n这个函数用 `repl` 中的字符串替换 `pattern`\
    \ 中的字符串。`n` 决定了要进行的替换次数。\n\n```lua\nstr = \"this is a red apple\"\nnewstr = str:gsub(\
    \ \"red\", \"green\" )\nprint(newstr)\n```\n\n下面是另一个解释使用 `n` 参数进行替换字符串的例子。在这段代码中，注意第一个\
    \ `str:gsub` 函数将所有 \"is\" 的实例替换为 \"are\"。第二个函数将 \"is\" 的前四个实例替换为 \"are\"，而最后一次，`str:gsub`\
    \ 将 \"is\" 的前两个实例替换为 \"are\"。\n\n```lua\nstr = \"The data is one, is two, is three,\
    \ is four, is five\"\nprint(str:gsub(\"is\", \"are\"))\nprint(str:gsub(\"is\"\
    , \"are\",4))\nprint(str:gsub(\"is\", \"are\", 2))\n```\n\n### `string.len ( s\
    \ )`\n\n这个函数返回字符串 `s` 的长度。这类似于 `#` 运算符。该函数也包含嵌入的空字符；所以，例如，`\"a\\000bc\\000\"`\
    \ 的长度是 5。\n\n### `string.lower ( s )`\n\n这是一个函数，它在将所有字符转换为小写后返回字符串，而所有其他字符保持不变。请注意，*大写*的定义取决于当前的区域设置。例如，在默认的英语区域设置中，带重音符号的字符不会转换为小写。\n\
    \n### `string.match ( s, patterns [,init] )`\n\n这个函数查找并返回字符串 `s` 中 `pattern` 的首次匹配。如果没有找到，它将返回\
    \ `nil`。`init` 参数指定搜索的起始位置，并且可以为负数。\n\n### `string.rep ( s, n )`\n\n这个函数返回一个包含\
    \ `n` 次重复传入字符串 `s` 的字符串。这等同于其他一些语言中的 `replicate`。例如："
  raw: 'By just returning from the function, we do not in effect execute the code
    of the function, which is as good as disabling the function temporarily. In contrast
    to this, you might have to remove event handlers and then set them up again, which
    is more cumbersome than this simple flag method.


    Another important feature of Lua is the way and and or work. Lua gives you the
    ability to not use them as bit operators (if you are coming from a C background).


    The Boolean operator or is widely used in Lua is to assign default values to variables,
    like so:


    ```

    local aVal = somevalue

    if aVal == nil then

        aVal = defaultValue

    end

    ```


    In Lua, the preceding code can easily be converted into a single line, as follows:


    ```

    local aVal = somevalue or defaultValue

    ```


    [Table 4-1](#9781430246626_Ch04.xhtml#Tab1) gives a quick overview of how and
    and or work.


    [Table 4-1.](#9781430246626_Ch04.xhtml#_Tab1) Boolean Operations


    ![image](OEBPS/Images/Table04-01.jpg)


    Summary


    If you are serious about game development, you need to understand math. There
    are a lot of functions that can help you as a developer. You can check for collisions;
    check for intersections of lines, rectangles, and circles; and determine the angle
    and distance between two objects. Many Lua math functions are valid across frameworks,
    and there are some frameworks that have integrated math libraries. We have a lot
    of these generic functions in [Chapter 7](#9781430246626_Ch07.xhtml) and in [Chapter
    13](#9781430246626_Ch13.xhtml), which discusses third-party libraries, we’ll create
    a math vector library, which will be useful with frameworks that do not have vector
    functions.


    Chapter     5


    Strings


    Hopefully you survived the previous chapter, on Lua math. The whole idea of these
    first few chapters is to introduce you to the fact that you can create your logic
    in Lua and then use any framework to add the graphics. So, many of the functions
    that we shall create in these chapters can be used universally across most of
    the frameworks without many changes. In this chapter we shall explore the topic
    of strings.


    What Is a String?


    A string is one of the many variable types available in Lua. It can hold alphanumeric
    characters of arbitrary lengths. It cannot have multiple dimensions like a table
    can. Lua automatically converts strings into numbers if the strings are used in
    any form of arithmetic operation. This process is called *coercion*, and it is
    automatic.


    You have seen strings in many forms earlier, the simplest being


    ```

    print("hello world!")

    ```


    The string in this case is "hello world!". It is mainly characterized by enclosing
    the alphanumeric characters within double or single quotes.


    In this case, since the "hello world" is not assigned to a variable but used directly,
    it is called a *constant string*.


    Most of the string functions are used to manipulate text. The functions available
    for use in Lua are described in the following sections.


    **Note**   Many of the functions available are also provided within a namespace.
    So, you can also use the functions in an object-oriented style. For example string.byte(s,i)
    can be represented as s:byte(i).


    string.byte ( s [,i [,j ] ] )


    For the devices, a character is an ASCII number from 0 to 255\. While we recognize
    characters as an *A* or *a*, each character is represented with a number, such
    as 65, 97, and so on. The byte function returns the number or the ASCII code of
    the character at the position in question. There are three parameters that can
    be passed: the string itself (s) and the optional i and j; i marks the start position
    of the string (by default it is 1) and j marks the end of the string (its default
    is the same as i). Here’s an example:


    ```

    print(string.byte("One"))

    print(string.byte("One",1,3))

    ```


    string.char (. . .)


    This function is similar to the previous function, except that instead of converting
    a character into a numeric value, this function converts a numeric value into
    a character. The function takes an integer and returns a string with a length
    equal to the number of integers passed.


    ```

    print(string.char(72, 101, 108, 108, 111, 32, 87, 111, 114, 108, 100))

    ```


    string.dump ( function )


    This function returns a string that contains the binary representation of the
    given function. This can later be used with the loadstring function on the string
    and returns a copy of the function. Though most of the frameworks allow loadstring,
    CoronaSDK has blocked this function, so there isn’t much that one can do with
    this if using CoronaSDK.


    string.find ( s, pattern [,init [,plain] ] )


    This function looks for the first match of the pattern in the string s. If found,
    it returns the indices of where the match starts and ends. If a match is not found,
    it returns nil. The parameter init (if passed) determines the starting position
    of the search. The default value for this is 1\. The parameter for plain is a
    Boolean value that is either true or false. This determines if pattern is false;
    it is just plain text for substring matching. If this is true, then pattern can
    have placeholders and wildcards for matching. If pattern has captures, then the
    function returns the captured values after the two indices.


    string.format ( formatString, . . . )


    This function returns a string that is formatted based on the format and the values
    passed. This is similar to the C function printf. The options/modifiers *, l,
    L, n, p, and h are not supported. This function has a new option, q, that formats
    the string in a form that is suitable and safe for use with the Lua interpreter.
    All the characters are correctly escaped to work. For example


    ```

    string.format(''%q'', ''a string with "quotes" and \n new line'')

    ```


    will produce the string


    ```

    "a string with \"quotes\" and \

    new line"

    ```


    While most of the options c, d, E, e, f, g, G, I, o, u, X, and x expect a number
    as an argument, s and q expect a string.


    string.gmatch ( s, pattern )


    This function returns an iterator function that returns the next capture from
    pattern over string s each time it is called. If the patterns specified nothing
    to capture, the entire match is returned.


    string.gsub ( s, pattern, repl [,n] )


    This function replaces the string held in pattern with the string held in repl.
    n determines the number of substitutions to be made.


    ```

    str = "this is a red apple"

    newstr = str:gsub( "red", "green" )

    print(newstr)

    ```


    Here’s another example that explains the replacement strings using the n parameter.
    In this code, notice that the first str:gsub function replaces all of the instances
    of "is" with "are". The second function replaces the first four instances of "is"
    with "are", and the last time, the str:gsub replaces the first two instances of
    "is" with "are".


    ```

    str = "The data is one, is two, is three, is four, is five"

    print(str:gsub("is", "are"))

    print(str:gsub("is", "are",4))

    print(str:gsub("is", "are", 2))

    ```


    string.len ( s )


    This function returns the length of the string s. This is similar to the # operator.
    The function also includes embedded zeros; so, for example, "a\000bc\000" has
    a length of 5.


    string.lower ( s )


    This is a function that returns the string after converting all the characters
    in it to lowercase, while all other characters are left unchanged. Note that the
    definition of *uppercase* is dependent on the current locale. For instance, in
    the default English locale, accented characters are not converted to lowercase.


    string.match ( s, patterns [,init] )


    This function looks for and returns the first match of pattern in the string s.
    It will return nil if none is found. The init parameter specifies where to start
    the search and can be negative.


    string.rep ( s, n )


    This function returns a string that contains n repetitions of the string s passed.
    This is equivalent to replicate in some other languages. For example'
