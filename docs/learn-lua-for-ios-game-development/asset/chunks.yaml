  trans: "\n# 第三方库与工具\n\n虽然本书讨论的这些框架各自功能完备，但开发者们总会需要更多。这种细微的需求通常会转化为供内部使用的库和工具。有些人也会以商业形式或遵循\
    \ MIT 许可协议分享这些工具和库。使用这些第三方库不会削弱这些框架的能力，反而会进一步增强它们。在本章中，我们将探讨一些在开发过程中有用的库——其中一些库还可以适配到最初开发框架之外的其它框架。\n\
    \n本章不会列出所有库的完整清单，因为有许多才华横溢的开发者一直在创造新的库。其中许多库都是先前库的变体。例如，针对 Corona SDK 就有好几个粒子引擎库，不可能全部涵盖。\n\
    \n## Particle Candy\n\n*   *网址*：[www.x-pressive.com/ParticleCandy_Corona/index.html](http://www.x-pressive.com/ParticleCandy_Corona/index.html)\n\
    *   *价格*：€ 39.95\n*   *平台*：Corona SDK\n\n这是一个流行且极其有用的粒子生成器库，用 Lua 编写，来自 [www.x-pressive.com](http://www.x-pressive.com)。它专为\
    \ Corona SDK 设计。由于 Corona SDK 代码必须以纯文本形式分发，因此该库以完整源代码形式提供，方便你研究其工作原理。希望你**不要**重新分发代码或以任何修改形式转售。该库附带几个非常有用且令人印象深刻的示例。它让许多特效变得简单易行，并抽象了实现这些特效所需的计算。除了标准的烟雾和火焰类型特效外，它还允许你创建更高级的特效，并提供了对吸引子（如图\
    \ 13-1 所示）、排斥子和发射形状等功能的访问。\n\n![9781430246626_Fig13-01.jpg](img/9781430246626_Fig13-01.jpg)\n\
    \n图 13-1 .  Particle Candy 发射器运行吸引子示例\n\n**注意**   第 14 章将讨论一个相关工具 Particle Designer，它可以用来可视化创建粒子特效并将设置导出到\
    \ Particle Candy。\n\n### 示例代码\n\n```\nParticles.CreateEmitter(\"E1\", screenW*0.05,\
    \ screenH*0.5, 45, true, true)\n-- 定义一个粒子类型\nParticles.CreateParticleType (\"\
    Test\",\n    {\n    imagePath    = \"arrow.png\",\n    imageWidth   = 32,    --\
    \ 粒子图像宽度 (newImageRect)\n    imageHeight   = 32,          -- 粒子图像高度 (newImageRect)\n\
    \    velocityStart = 150,   -- 像素每秒\n    alphaStart    = 0,          -- 粒子起始透明度\n\
    \    fadeInSpeed   = 2.0,   -- 每秒\n    fadeOutSpeed  = -1.0,  -- 每秒\n    fadeOutDelay\
    \  = 3000,  -- 开始淡出的时间\n    scaleStart    = 1.0,   -- 粒子起始大小\n    weight     \
    \   = 0,  -- 粒子重量 (>0 下落, <0 上升)\n    bounceX       = false, -- 从屏幕左右边界反弹\n  \
    \  bounceY       = false, -- 从屏幕上下边界反弹\n    bounciness    = 0.75,  -- 回弹能量\n \
    \   emissionShape = 0,          -- 0 = 点, 1 = 线, 2 = 环, 3 = 盘\n    emissionRadius=\
    \ 140,   -- 发射形状的大小/半径\n    killOutsideScreen  = true,       -- 父图层不得嵌套或旋转!\n\
    \    lifeTime      = 4000,       -- 粒子的最大生命周期\n    autoOrientation    = true,\
    \       -- 自动旋转至运动方向\n    useEmitterRotation = true,       -- 继承发射器的当前旋转\n   \
    \     } )\n\n-- 输入发射器\n-- (发射器名称, 粒子类型名称, 发射速率, 持续时间, 延迟)\nParticles.AttachParticleType(\"\
    E1\", \"Test\", 10, 9999,0)\n-- 触发发射器\nParticles.StartEmitter(\"E1\")\nlocal Emitter1\
    \ = Particles.GetEmitter(\"E1\")\n-- 吸引场\nParticles.CreateFXField(\"A1\", 0, screenW*0.5,screenH*0.5,\
    \ 1.5, 140, true)\n```\n\n## Text Candy\n\n*   *网址*：[www.x-pressive.com/TextCandy_Corona/index.html](http://www.x-pressive.com/TextCandy_Corona/index.html)\n\
    *   *价格*：€39.95\n*   *平台*：Corona SDK\n\n这是 X-Pressive.com 的另一款产品，主要用于处理文本。它提供特殊效果，可用于旋转、动画以及以其他方式操作文本（见\
    \ 图 13-2）。例如，它只需一行代码就能创建 80 年代风格的正弦滚动文本。\n\n![9781430246626_Fig13-02.jpg](img/9781430246626_Fig13-02.jpg)\n\
    \n图 13-2 .  Text Candy 文本动画\n\n运行上述动画的代码非常简单，如下所示：\n\n### 示例代码\n\n```\nlocal MyText\
    \ = TextCandy.CreateText({\n    fontName    = \"FONT1\",\n    x           = screenW*.5,\n\
    \    y           = screenH*.5,\n    text        = \"ARE YOU READY TO ROCK? \"\
    ,\n    originX     = \"CENTER\",\n    originY     = \"CENTER\",\n    textFlow\
    \    = \"CENTER\",\n    charSpacing = -5,\n    lineSpacing = -4,\n    showOrigin\
    \  = false,\n    })\n\nMyText:applyDeform({\n    type          = TextCandy.DEFORM_CIRCLE,\n\
    \    radius        = 120,\n    autoStep      = true,\n    ignoreSpaces  = false,\n\
    \    })\n\nMyText:applyAnimation({\n    startNow        = true,\n    restartOnChange\
    \ = true,\n    charWise        = true,\n    frequency       = 60,\n    alphaRange\
    \      = 0.5,\n    })\n```\n\n## Widget Candy\n\n*   *网址*：[www.x-pressive.com/WidgetCandy_Corona/index.html](http://www.x-pressive.com/WidgetCandy_Corona/index.html)\n\
    *   *价格*：€ 39.95\n*   *平台*：CoronaSDK\n\n这是 X-Pressive.com 的第三款产品。这个库使用可视化元素创建图形用户界面\
    \ (GUI)。它具有使用主题的功能，这意味着你不仅可以创建自定义小部件，还可以随时为它们*换肤*（改变外观）。它提供了大多数常用的小部件，包括列表框、单选按钮、复选框、按钮和滑块。Widget\
    \ Candy 的一个显著特点是其缩放小部件的能力。你可以将小部件设置为百分比（如同在 HTML 中一样），这样当你在不同设备上运行时，显示元素将相应地缩放。此功能无需你为每个新设备专门设计用户界面。图\
    \ 13-3 展示了一些可以使用 Widget Candy 创建的 UI 元素。\n\n![9781430246626_Fig13-03.jpg](img/9781430246626_Fig13-03.jpg)\n\
    \n图 13-3 .  Widget Candy，在设备上显示各种小部件\n\n### 示例代码\n\n```\n_G.GUI.NewList(\n   \
    \ {\n    x            = \"center\",\n    y            = \"center\",\n    width\
    \        = \"80%\",\n    height       = \"90%\",\n    scale        = _G.GUIScale,\n\
    \    parentGroup  = nil,\n    theme        = \"theme_1\",\n    name         =\
    \ \"LST_MAIN\",\n    caption      = \"WIDGET CANDY SAMPLES:\",\n    list     \
    \    = ListData,\n    allowDelete  = false,\n    readyCaption = \"Quit Editing\"\
    ,\n    border       = {\"shadow\", 8,8, 64},\n    onSelect     = function(EventData)\
    \ _G.LoadSample(EventData) end,\n    } )\n```\n\n## Corona AutoLAN\n\n*   *网址*：[www.mydevelopersgames.com/AutoLAN/](http://www.mydevelopersgames.com/AutoLAN/)\n\
    *   *价格*：免费\n*   *平台*：Corona SDK\n\n这个库是一个 Lua sockets 实现，允许通过结合使用 UDP 和 TCP socket\
    \ 通信，在无线网络上进行多人通信。它具有自动网络发现和集成功能，只需几行代码即可实现。由于 AutoLan 使用纯 Lua socket 通信，它可以被适配以在\
    \ Corona SDK 之外的其它框架上工作。它还具备文件传输和流量控制功能。\n\n### 示例代码\n\n```\nlocal client = require\
    \ \"Client\"\nclient:start()\nclient:autoconnect()\n```\n\n在服务器端，则简单如下：\n\n```\n\
    local server = require \"Server\"\nserver:start()\n```\n\n传输文件也同样简单：\n\n```\n\
    client:sendFile(filename, srcPath, destFile)\n```\n\n## Corona Profiler\n"
- fmt: '-   **URL**: [www.mydevelopersgames.com/site/](http://www.mydevelopersgames.com/site/)

    -   **Price**: $9.99

    -   **Platforms**: Corona SDK


    This is perhaps the only analyzer available that goes about its business while
    you run the app in the CoronaSDK simulator. This can help determine how your code
    is performing. The profiler can be started and stopped via Lua commands in your
    app. While it is running, it creates analysis data on a line-by-line basis, inspecting
    the time taken for each line or function to run. While it is specifically created
    for Corona SDK, it relies on pure Lua for functioning. With a few minor changes,
    it can be adapted to work with any framework. Sample output from `Corona Profiler`
    is shown in [Figure 13-4](#9781430246626_Ch13.xhtml#Fig4).


    ![9781430246626_Fig13-04.jpg](OEBPS/Images/9781430246626_Fig13-04.jpg)


    [Figure 13-4](#9781430246626_Ch13.xhtml#_Fig4) . The visual analysis/results of
    your app after running `Corona Profiler`


    Sample Code


    ```

    profiler = require "Profiler"

    profiler.startProfiler()

    ```


    ## Director


    -   **URL**: [http://rauberlabs.blogspot.com.au/2011/08/director-14-books.html](http://rauberlabs.blogspot.com.au/2011/08/director-14-books.html)

    -   **Price**: Free

    -   **Platforms**: Corona SDK


    `Director` is a scene-manager library available that—while very useful and popular—is
    being phased out, as Corona Labs is replacing it with its own version, called
    `Storyboard`. There was a time when `Director` was more popular than Corona SDK
    itself. However, because `Storyboard` is officially supported by Corona Labs and
    offers similar options, it is advised that you use `Storyboard` (although `Director`
    is still widely used in a lot of e-books and games).


    Sample Code


    ```

    director = require("director")

    local mainGroup = display.newGroup()


    mainGroup :insert(director.directorView)

    director:changeScene("Screen1")

    ```


    Note that `Screen1.lua` contains the code and display logic for `screen1`.


    ## Lime


    -   **URL**: [www.justaddli.me](http://www.justaddli.me)

    -   **Price**: £20.00

    -   **Platforms**: Corona SDK


    `Lime` is a library that provides functions to load maps created with the tile
    editor `Tiled`. `Gideros Studio` and `Moai` have built-in functions to load `Tiled`
    maps, so this is most applicable for Corona SDK only. The sample code following
    can display a map like that shown in [Figure 13-5](#9781430246626_Ch13.xhtml#Fig5).


    ![9781430246626_Fig13-05.jpg](OEBPS/Images/9781430246626_Fig13-05.jpg)


    [Figure 13-5](#9781430246626_Ch13.xhtml#_Fig5) . Map displayed using `Lime`


    Sample Code


    ```

    local lime = require("lime")

    local map = lime.loadMap("platform.tmx")

    local visual = lime.createVisual(map)

    ```


    ## RapaNui


    -   **URL**: [https://github.com/ymobe/rapanui](https://github.com/ymobe/rapanui)

    -   **Price**: Free

    -   **Platforms**: Moai


    `RapaNui` is a high-level Moai-only library that sits on top of the Moai SDK and
    offers easy-to-use syntax, similar to that of Corona SDK. While in Moai it would
    take a couple of lines of code to load and display an image on the screen, with
    `RapaNui` it takes literally a line of code.


    Sample Code


    ```

    ball = RNFactory.createImage("ball.png")

    ball.x = 10

    ball.y = 10

    ```


    ## Gideros Illustrator (SVG Library)


    -   **URL**: [http://go.to/gideros-illustrator](http://go.to/gideros-illustrator)

    -   **Price**: Free

    -   **Platforms**: Gideros Studio


    If you create your designs with Adobe Illustrator or a similar app, you can make
    much crisper graphics and art than with scaled bitmaps. This library works with
    `Gideros Studio` and can currently parse SVG files exported from Adobe Illustrator.
    Currently this library is free and has functions that facilitate working with
    vector graphics. You can load SVG images and render them to the device using just
    one line of code. The graphic shown in [Figure 13-6](#9781430246626_Ch13.xhtml#Fig6)
    is drawn using vector objects in Gideros with the help of the SVG library.


    ![9781430246626_Fig13-06.jpg](OEBPS/Images/9781430246626_Fig13-06.jpg)


    [Figure 13-6](#9781430246626_Ch13.xhtml#_Fig6) . An SVG image displayed in the
    Gideros Player


    Sample Code'
