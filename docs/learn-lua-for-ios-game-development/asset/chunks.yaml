    \ tx, ty)\n    if tx < - survivor.width then\n      position(survivor , _W + random(5,10)\
    \ * survivor.width, ty)\n      score = score - 50  -- 未接住幸存者的惩罚\n      if score\
    \ < 0 then score = 0 end \n    end\n  end \nend\n```\n\n## 整合所有代码\n\n前面的代码可以工作，但某些函数需要初始化。为此，我们将以下代码放入`init`函数中：\n\
    \n```lua\nfunction init()\n  background = loadImage(\"background.png\") \n  heli\
    \ = loadImage(\"_chopper.png\", _W/2, _H/2) -- 屏幕中央\n  objects =     enumerate{\"\
    plane\", \"balloon\", \"flower\", \"grass\", \"lamppost\",\n   \"house\", \"tallHouse\"\
    , \"cloud1\", \"cloud2\", \"cloud3\", \"angryCloud\"}\n  survivor = loadImage(\"\
    _man.png\")\n  tanker   = loadImage(\"_tanker.png\")\n  setupSound()\n  colors\
    \ = {\n    {0,   0,   255},    -- 蓝色\n    {255, 0,   0},      -- 红色\n    {0, \
    \  255, 0},      -- 绿色\n    {255, 0,   255},    -- 洋红色\n    {0,   255, 255}, \
    \   -- 青色\n    {255, 255, 0},      -- 黄色\n    {255, 255, 255},    -- 白色\n    {179,\
    \ 115, 255},    -- 橙色\n  }\n  createHUDItems()\n  setVisible(txtGameOver,false)\n\
    \  setVisible(tanker,     false)\n  setVisible(survivor,   false)\n  setVisible(txtTapAgain,false)\n\
    end\n```\n\n图 15-7 展示了游戏的最终版本。\n\n![9781430246626_Fig15-07.jpg](img/9781430246626_Fig15-07.jpg)\n\
    \n图 15-7. 可运行的 Chopper Rescue 游戏，添加了背景。\n\n**注意** 上述代码仅为完整源代码的摘录。虽然它可以运行并演示本章所述的功能，但并非完全功能完备。要体验完整的游戏，请从\
    \ Apress 网站下载完整的源代码并运行。\n\n## 总结\n\n本章向您介绍了创建一个在不同框架之间只需少量修改即可移植的游戏的过程。您可以对代码应用很多优化，但我将把这留作您在进一步学习\
    \ Lua 和本书所涵盖的框架时的练习。大部分逻辑是用 Lua 编写的，而特定于框架的函数被抽象为可以修改以适应不同 SDK 的函数。\n\nLua 的灵活性和易用性可以帮助您快速开发游戏，并且\
    \ Lua 使您的游戏易于测试、调试和实现。\n\n至此，我们的旅程已接近尾声。期待看到您使用 Lua 创建的游戏。\n\n索引\n\n![images](img/square1.jpg)\
    \ **A**\n\nAllen 库\n"
