    yScale = 0.5})

    end

    --

    function sunrise()

        transition.to ( ball, {time=2000, y=80, alpha=1, xScale = 1.2, yScale = 1.2,
    onComplete = sunset})

    end

    --

    sunrise()

    ```


    Notice that in the sunset function, we have a new parameter: delay. This tells
    the transition function to wait for the duration specified before starting the
    transition.


    **Note**   Any value assignable to the object can be transitioned over the time
    specified. If you create your own custom display objects, like widgets, you can
    animate them by modifying their values in a transition function.


    The transition namespace has a couple of functions. The one that is used the most
    is transition.to, and the other is transition.from.


    When transition functions are called, depending on the to or the from, the object
    being transitioned is modified based on the attributes specified to be transitioned.
    If we use transition.from, the object is at first set to the attributes provided
    and then transitioned to the current settings of the object. So, if we were to
    use transition.from as transform.from(theObject, {time=500, alpha=0}), the alpha
    setting for the theObject would be first set to 0, and then the transition would
    end by setting the current attributes to theObject.


    On the other hand, if we use transition.to, theObject is transitioned from the
    current settings to the settings that we specify in the transition. This is also
    the reason that this transition is used more often than the transition.from.


    Both of the transition functions return a transition handle that we can capture.
    This handle can be used with the transition.cancel function to cancel the transition.


    **Tip**   One good way to manage the transition handle and transitions without
    creating additional variables is to save the transition into the object itself.
    This way, you can cancel the transition without having to look very far before
    you can delete the object especially if the object is halfway through the transition.


    The way it works is that when we set a transition, the function returns a handle.
    In the majority of cases, programmers do not capture this handle, as it wouldn’t
    be necessary in the case of a one-off transition. In the example of our scrolling
    text, the transition goes on for about 8 seconds, whereas our sunrise and sunset
    takes a total of 6 seconds. If in our app the user taps the screen to move to
    the next set of transitions, the scrolling transition will still continue, as
    it is active. If our code removes the text object from memory, the transition
    function will try to set the next position for the text object, and finding it
    gone, it will throw an error. To avoid such an error, we can cancel our transitions
    so they do not get left behind and cause problems.


    ```

    local theText = display.newText("Hello, hope you are enjoying your journey with
    Lua so far",0,440)

    theText.x = theText.contentWidth

    theText.trans = transition.to(

        theText,{time=8000, x=-theText.contentWidth})

    --

    local ball = display.newCircle ( 160, 480, 50 )

    ball:setFillColor(255,255,0)

    ball.alpha = 0.5

    ball:scale(0.5,0.5)

    --

    transition.to (ball, {time = 2000, y = 80, onComplete=function()

        transition.cancel(theText.trans)

      end} )

    ```


    Notice that the moment the sun reaches the top of the screen, the transition stops
    the text-scrolling transition by canceling it.


    There is another parameter that you can pass to these transition functions, and
    that is delta. This is a Boolean value that is either true or false. The default
    value is false, and it specifies whether the values passed are absolute values
    or relative to current values.


    The transitions do not have to be linear (i.e., uniform in the steps) while sliding
    the text off the screen; for example, you can give your transition the effect
    of acceleration or deceleration as it reaches its target position. This type of
    acceleration and deceleration behavior is knows as *easing in* and *easing out*,
    respectively. There are a few easing options that are available with Corona SDK.


    ```

    local theText = display.newText("Hello, hope you are enjoying your journey with
    Lua so far",0,440)

    theText.x = theText.contentWidth

    theText.trans = transition.to(

        theText,{time=8000, x=-theText.contentWidth})

    --

    local ball = display.newCircle ( 160, 480, 50 )

    ball:setFillColor(255,255,0)

    ball.alpha = 0.5

    ball:scale(0.5,0.5)

    --

    transition.to (ball, {time = 2000, y = 80,

    transition = easing.outExpo

    , onComplete=function()

        transition.cancel(theText.trans)

      end} )

    ```


    In this code, transition = easing.outExpo causes the ball to slow down and then
    speed up as it moves toward the top of the screen.


    You can also add other interesting effects by simply writing your own easing function.
    Such a function is declared as follows:


    ```

    easing.function(t,tMax,start,delta)

    ```


    In this declaration, *t* is the time since the start of the transition, *tMax*
    is the overall length of the transition time, *start* is the initial value, and
    *delta* is the change in the value at the end of the transition. The final value
    should always be *start* + *delta*.


    Here’s an example of easeOutBounce, with the result illustrated in [Figure 8-16](#9781430246626_Ch08.xhtml#Fig16).


    ```

    function easeOutBounce(t,b,c,d)

         t,d,b,c= t,b,c,d;

         t=t/d;

         if (t<(1/2.75)) then

              ret=c*(7.5625*t*t)+b

         elseif (t<(2/2.75)) then

              t=t-(1.5/2.75)

              ret=c*(7.5625*(t*t)+.75)+b

         elseif (t<(2.5/2.75)) then

              t=t-2.25/2.75;

              ret=c*(7.5625*t*t+.9375)+b

         else

              t=t-2.625/2.75;

              ret=c*(7.5625*t*t+.984375)+b

         end

    return ret;

    end

    ```


    This code is taken from the LHTween library on GitHub, authored by logHound.


    ![9781430246626_Fig08-16.jpg](OEBPS/Images/9781430246626_Fig08-16.jpg)


    [Figure 8-16](#9781430246626_Ch08.xhtml#_Fig16) .  The graph plot of the easeOutBounce
    function


    Removing Objects from the Screen


    You just learned how to stop a transition. However, the object still remains on
    the screen. If this were a screen that displayed the score between levels, for
    example, we would want it to disappear. In the simplest way, we could just turn
    off the visibility of the object by setting the isVisible property to false. However,
    with this method, the object would still remain in memory (though not visible
    on the screen) and would be created again; if you were to play a game with a substantial
    number of levels, there would be quite a few objects on the screen taking up valuable
    memory.


    A better way to remove these objects is to remove them from the stage. When we
    create an object, it is added to the stage or the parent object automatically.
    To remove an object, we simply pass the object handle to the remove() function
    in the display namespace. For instance, to remove the text in the preceding example
    , we just pass it the following:


    ```

    display.remove(theText)

    ```


    Another way to remove the objects—which seems simpler and more direct—is to call
    the removeSelf function of the display object:


    ```

    theText:removeSelf()

    ```


    **Note**   If the object is already removed or is nil, then the removeSelf function
    will fail and give an error. However, the display.remove function exits gracefully
    without any errors if the object being removed has previously been removed.


