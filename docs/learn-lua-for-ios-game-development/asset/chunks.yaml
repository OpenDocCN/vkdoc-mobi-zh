    \ that will increase the character count of the character we pass to the function.\n\
    \n```\nfunction string:getFrequency()\n    local inst = {}\n    function tally(char)\n\
    \        char = string.upper(char)\n        inst[char] = (inst[char] or 0) + 1\n\
    \    end\n    self:gsub(\"%a\", tally)\n    return inst\nend\n```\n\nWe can test\
