    \n[Figure 15-5](#9781430246626_Ch15.xhtml#_Fig5) .  The scenery objects scrolling\
    \ from right to left\n\nLosing a Life\n\nWhen you crash into the ground or another\
    \ object, or run out of fuel, you lose a life. This involves reducing the number\
    \ of lives, and when the number of lives reaches zero, the game is over. We created\
    \ the reduceLife function earlier; now let’s add some more functionality to that\
