    Drawing Filled Rectangles


    You can use the function MOAIDraw.fillRect(x1, y1, x2, y2) to draw a filled rectangle.
    This function takes four parameters, similar to the drawRect function. The fill
    color is set using the MOAIGfxDevice.setPenColor function. The code draws a filled
    rectangle on the screen as seen in [Figure 10-4](#9781430246626_Ch10.xhtml#Fig4)
    below.


    ![9781430246626_Fig10-04.jpg](OEBPS/Images/9781430246626_Fig10-04.jpg)


    [Figure 10-4](#9781430246626_Ch10.xhtml#_Fig4) .  Drawing a rectangle with a fill
    color and no stroke


    ```

    MOAISim.openWindow ( "test", 320, 480 )


    viewport = MOAIViewport.new ()

    viewport:setSize ( 320, 480 )

    viewport:setScale ( 320, -480 )


    layer = MOAILayer2D.new ()

    layer:setViewport ( viewport )

    MOAISim.pushRenderPass ( layer )


    function onDraw ( index, xOff, yOff, xFlip, yFlip )

      MOAIGfxDevice.setPenColor(1, 0.64, 0, 1)

      MOAIDraw.drawRect(-150,-150,0,-50)

    end


    scriptDeck = MOAIScriptDeck.new ()

    scriptDeck:setRect ( -64, -64, 64, 64 )

    scriptDeck:setDrawCallback ( onDraw )


    prop = MOAIProp2D.new ()

    prop:setDeck ( scriptDeck )

    layer:insertProp ( prop )

    ```


    Drawing Circles


    You can use the drawCircle function to draw circles. The syntax is MOAIDraw.drawCircle(xPos,
    yPos, radius, steps), where xPos and yPos are the center of the circle, radius
    determines the radius of the circle to be drawn, and the steps determines the
    *granularity*, or number of segments used to draw the circle. A good number for
    steps is 100.


    ```

    function onDraw ( index, xOff, yOff, xFlip, yFlip )

      MOAIDraw.drawCircle(0, 0, 100, 100)

    end

    ```


    Drawing Filled Circles


    You can use the fillCircle function to draw filled circles. The syntax is MOAIDraw.fillCircle(xPos,
    yPos, radius, steps), just like an unfilled circle. The pen color determines the
    circle fill color.


    ```

    function onDraw ( index, xOff, yOff, xFlip, yFlip )

      MOAIGfxDevice.setPenColor(1, 0.64, 0, 1)

      MOAIDraw.fillCircle(0, 0, 100, 100)

    end

    ```


    Drawing Ellipses


    To draw ellipses, you can use the function drawEllipse. The syntax is MOAIDraw.drawEllipse(xPos,
    yPos, xRadius, yRadius, steps), where xPos and yPos are the center, xRadius and
    yRadius determine the vertical and horizontal radii of the ellipse, and steps
    determines the granularity. A good number for steps is 100.


    ```

    function onDraw ( index, xOff, yOff, xFlip, yFlip )

      MOAIDraw.drawEllipse(0, 0, 100, 100)

    end

    ```


    Drawing Filled Ellipses


    Similarly, you can use the function fillEllipse to draw a filled ellipse. The
    syntax is the same as a regular ellipse, and the pen color determines the fill
    color.


    ```

    function onDraw ( index, xOff, yOff, xFlip, yFlip )

      MOAIDraw.drawEllipse(0, 0, 100, 100)

    end

    ```


    Drawing Polygons


    To draw polygons, you need define a series of vertices to pass to the drawLines
    function. The vertices are absolute points on the screen, not relative to the
    previous coordinate.


    ```

    function onDraw ( index, xOff, yOff, xFlip, yFlip )

      MOAIDraw.drawLines(-50,50,50,50,50,-50,-50,-50,-50,50)

    end

    ```


    Drawing Points


    The function drawPoints can be used to plot points at the given list of vertices.
    The following code gives an example of using the MOAIDraw.drawPoints function,
    the results of which are shown in [Figure 10-5](#9781430246626_Ch10.xhtml#Fig5).


    ![9781430246626_Fig10-05.jpg](OEBPS/Images/9781430246626_Fig10-05.jpg)


    [Figure 10-5](#9781430246626_Ch10.xhtml#_Fig5) .  Points set in the quadrants,
    demonstrating the coordinate system in Moai


    ```

    function onDraw ( index, xOff, yOff, xFlip, yFlip )

      MOAIDraw.drawRay ( 0, 0, 1, 0)

      MOAIDraw.drawRay ( 0, 0, 0, 1)

      MOAIGfxDevice.setPointSize(5)

      MOAIGfxDevice.setPenColor(1,0,0,1)

      MOAIDraw.drawPoints(-50,50,50,50,50,-50,-50,-50,-50,50)

    end

    ```


    The Drawing Attributes


    The canvas on which MOAIDraw draws the vector primitives is called MOAIGfxDevice.
    You can query it and set certain drawing attributes, such as the color, line width,
    and point size. This section will describe each of these.


    Color


    The MOAIGfxDevice.setPenColor function is used to set the color for drawing and
    filling. The syntax for setting the color is setPenColor(r, g, b, a). The values
    for r, g, b, and a are in the range of 0 to 1\. For example, the following line
    sets the color to green:


    ```

    MOAIGfxDevice.setPenColor(0,1,0,1)

    ```


    Line Width


    The MOAIGfxDevice.setPenWidth function sets the width of any line drawn after
    the function call. The function is passed a width value, which determines how
    thick the line is usually expressed in positive integer units.


    ```

    function onDraw ( index, xOff, yOff, xFlip, yFlip )

      MOAIGfxDevice.setPenWidth(3)

      MOAIGfxDevice.setPenColor(1,0,0,1)

      MOAIDraw.drawRect(-50,-50,50,50)

    end

    ```


    Point Size


    The MOAIGfxDevice.setPointSize function sets the size of the points that are drawn
    using the drawPoints function usually expresses in positive integer units.


    ```

    function onDraw ( index, xOff, yOff, xFlip, yFlip )

      MOAIDraw.drawRay ( 0, 0, 1, 0)

      MOAIDraw.drawRay ( 0, 0, 0, 1)

      MOAIGfxDevice.setPointSize(5)

      MOAIGfxDevice.setPenColor(1,0,0,1)

      MOAIDraw.drawPoints(-50,50,50,50,50,-50,-50,-50,-50,50)

    end

    ```


    Drawing Images


    You’ve already learned that the way to create a display object on the screen is
    by creating a MOAIProp that needs to be added to a layer. Similarly, to display
    images, you create a MOAIProp object by creating a quad object for which you set
    the texture as the image you want to load. This can then be set as the deck object.


    ```

    gfxQuad = MOAIGfxQuad2D.new ()

    gfxQuad:setTexture ( "moai.png" )

    gfxQuad:setRect ( -64, -64, 64, 64 )


    prop = MOAIProp2D.new ()

    prop:setDeck ( gfxQuad )

    prop:setLoc ( 0, 80 )

    layer:insertProp ( prop )

    ```


    Drawing Custom Images


    You can use the MOAIImage class to create a blank image that can be used as a
    canvas, like so:


    ```

    local image = MOAIImage.new()

    image:init(width, height)

    ```


    **Note**   The image that you create must be a power of 2—that is, the width and
    height must be a number that is a power of 2. While creating an image dynamically,
    if you create an image that does not conform to the power of 2, you can use the
    function padToPow2 to pad the image to the appropriate size as required.


    This image object created can then be used to create the Quad2D object, which
    is then added to the layer.


    ```

    gfxQuad = MOAIGfxQuad2D.new ()

    gfxQuad:setTexture ( image )

    gfxQuad:setRect ( -64, -64, 64, 64 )


    prop = MOAIProp2D.new ()

    prop:setDeck ( gfxQuad )

    layer:insertProp ( prop )

    ```


    This code will display nothing, as the image created is a blank image. In the
    following code we create a bitmap in memory and display that to the screen. This
    is a good way to create dynamic images via code.


    ```

    local image = MOAIImage.new()

    image:init(25, 40)

    image:padToPow2()

    image:fillRect(-70,-70,150,150,1,1,1,1)

    image:fillRect( 20,20,50,50,1,0.6,0,1)


    gfxQuad = MOAIGfxQuad2D.new ()

    gfxQuad:setTexture ( image )

    gfxQuad:setRect ( -64,-64,64,64 )


    prop = MOAIProp2D.new ()

    prop:setDeck ( gfxQuad )

    layer:insertProp ( prop )

    ```


    Loading Images


    Images can be loaded onto a MOAIImage object using the load function, as follows:


    ```

    theImage = MOAIImage.new ()

    theImage:load( "myImage2.png" )

    ```


    Once you’ve loaded the image, you can perform various functions on it and apply
    transformations.


    Copying Images


    You can copy an image from another image using either the copyRect or copyBits
    function. Note that copyBits makes a copy of the source (which cannot be scaled
    or flipped); a rectangular region from the source can be copied onto the destination
    at the position passed. Here’s an example of using the copyBits function:


    ```

    srcImage = MOAIImage.new ()

    srcImage:load ( "myImage2.png" )

    iWd, iHt = srcImage:getSize()

    destImage = MOAIImage.new()

    destImage:init(64,64)

    destImage:copyBits(srcImage,0,0,0,0,iWd, iHt)

    ```'
