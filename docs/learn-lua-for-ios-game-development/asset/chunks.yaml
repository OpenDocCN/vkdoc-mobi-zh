- fmt: "# Lua 基础\n\n使用 Lua 时，您无需定义变量的类型；只需赋值即可，并且值可以随时更改。在 Visual Basic 6（不要与 Visual\
    \ Basic.NET 混淆）中，这种类型的变量被称为 *variant* 变量，并且必须显式定义如下：\n\n```vb\ndim i as variant\n\
    ```\n\n相比之下，Lua 将变量存储在内存中。Lua 同时存储变量的值和类型。Lua 中的所有变量都是**一等值**。这仅仅意味着这些值可以存储在变量中、作为参数传递给其他函数，以及从函数返回。\n\
    \nLua 中有八种不同类型的变量，下文将逐一介绍。\n\n## `nil`\n\n这与`null`相同。如果某个变量持有一个对最后持有值的引用，而垃圾回收器尚未清理它，则可以将该变量设置为`nil`，以指示该引用空间可以被垃圾回收。\n\
    \n## `boolean`\n\n`boolean`变量就是我们熟悉的`true`和`false`。它们用于检查条件；但需要注意的是，`nil`和`false`都会导致条件为`false`，而任何其他值都会导致条件为`true`。\n\
    \n```lua\ntrusted = false\nif (trusted) then print(\"Yes\") end        -- 不输出任何内容\n\
    trusted = 1\nif (trusted) then print(\"Yes\") end        -- 输出 Yes\ntrusted =\
    \ nil\nif (trusted) then print(\"Yes\") end        -- 不输出任何内容\n```\n\n## `number`\n\
    \n`number`变量是可以表示为小数、长整型、整数、十六进制数和浮点数的数字。Lua 将数字保存为双精度浮点数。\n\n## `string`\n\n\
    Lua 字符串通常是 8 位干净的字符串（即，它们可以包含任何 8 位字符，包括嵌入的零值）。Unicode 变量略有不同，但如果平台支持 Unicode，Lua\
    \ 也可以处理。\n\n## `function`\n\n在 Lua 中，函数也可以作为变量存储和传递。这种将函数作为参数存储和传递的功能，使得 Lua 中的函数成为“**一等函数**”。\n\
    \n## `userdata`\n\n这是一个从 C 语言分配的内存块，允许 C 语言函数存储和访问数据。`userdata`变量不能在 Lua 中创建或操作，只能通过\
    \ C API 进行。\n\n## `thread`\n\n这是一种特殊的变量类型；它指定一个独立的执行线程。这与操作系统线程不同。\n\n## `table`\n\
    \n`table`变量在 Lua 中就是我们所说的数组、关联数组、哈希表、集合、记录、列表、树，甚至是对象。\n\n**注意**：`table`、`function`和`thread`实际上并不持有任何值——只持有对它们的引用。\n\
    \n# 代码块和作用域\n\n在 Lua 中，每个变量都有一个作用域，这意味着其可访问性取决于由作用域决定的生命周期。变量要么是**全局**的，要么是**局部**的。默认情况下，变量定义为全局变量，除非显式定义为局部变量。\n\
    \n在代码中，在`do`和`end`块之间设置的变量在该块外部不可访问，而在该块外部设置的任何局部变量在该块内部是可访问的。\n\n让我们通过一个示例来看：\n\
    \n```lua\ni = 1\nprint(\"i = \", i)\ndo\n  local i = 2\n  print(\"i = \", i)\n\
    end\nprint(\"i = \", i)\n```\n\n**强制转换**是一个简单术语，指的是根据转换规则（如果可能）将字符串转换为数字，以便在字符串和数字之间进行算术运算的过程。\n\
    \n```lua\none = \"1\"\ntwo = 2\nprint(one + two)       -- 输出 3\n```\n\n在许多语言中，尝试在两种不同数据类型（本例中为字符串和数字）之间进行此类算术运算会失败。在其他一些脚本语言中，此代码会将值添加到字符串中，得到字符串`\"\
    12\"`。然而，在 Lua 中，这会输出值`3`，其中`one`被转换为数值`1`，然后与`two`的值相加，输出`3`。\n\n但是，如果我们想要将两个字符串`\"\
    1\"`和`\"2\"`拼接成`\"12\"`，则需要使用所谓的**连接**操作。在 Lua 中，连接运算符是双点（`..`）。它连接两个字符串并返回一个包含这两个字符串的新字符串。\n\
    \n# Lua 运算符\n\nLua 中的运算符可以分为不同类型，包括算术运算符、关系运算符和逻辑运算符等。\n\n## 算术运算符\n\n这些运算符无需过多介绍；它们简单直接。表\
    \ 1-1 列出了它们。\n\n**表 1-1.** 算术运算符\n\n| 运算符 | 描述 |\n| --- | --- |\n| `+` | 加法 |\n\
    | `-` | 减法 |\n| `*` | 乘法 |\n| `/` | 除法 |\n| `%` | 取模 |\n| `^` | 指数 |\n| `-` |\
    \ 一元负号 |\n\n## 关系运算符\n\n这些是用于比较或条件的运算符。它们列在表 1-2 中。\n\n**表 1-2.** 关系运算符\n\n| 运算符\
    \ | 描述 |\n| --- | --- |\n| `==` | 等于（检查两个值是否相等） |\n| `~=` | 不等于（等于的反义） |\n| `<`\
    \ | 小于 |\n| `>` | 大于 |\n| `<=` | 小于等于 |\n| `>=` | 大于等于 |\n\n这些运算符总是返回`true`或`false`。需要注意的是，比较两个数字或值时，使用`==`，而在\
    \ Lua 中单个`=`表示赋值。\n\n## 逻辑运算符\n\nLua 中的逻辑运算符是：\n\n```lua\nand\nor\nnot\n```\n\n\
    `and`和`or`在 Lua 中的工作方式是通过所谓的**短路求值**。它检查一个值，并且仅在需要时才进一步检查。如果第一个参数值为`false`或`nil`，则`and`返回第一个参数；否则返回第二个参数。另一方面，如果第一个结果不为`false`或`nil`，则`or`返回第一个值；如果第一个参数为`false`或`nil`，则返回第二个参数。\n\
    \n`or`的最佳用途是在函数中分配默认值：\n\n```lua\na = a or 5 -- 如果 a 的值为 nil 或 false，可用于将 a 赋值为\
    \ 5\n```\n\n我们可以这样测试它们的工作方式：\n\n```lua\ntesting = nil\nprint(testing)\nprint(testing\
    \ and 5)\nprint(testing or 5)\nprint(not testing)\ntesting = 15\nprint(testing)\n\
    print(testing and 5)\nprint(testing or 5)\nprint(not testing)\n```\n\n## 其他运算符\n\
    \n除了我们讨论过的标准运算符之外，Lua 还为我们提供了其他几个运算符。它们用于连接操作和获取某物的长度等操作；这两个运算符都适用于字符串，不过`#`运算符也可以用于数组。\n\
    \n*   连接运算符：`..`\n*   长度运算符：`#`\n\n如前所述，Lua 中的连接运算符是双点（`..`）。它用于将两个字符串相加，如下所示：\n\
    \n```lua\nprint(\"one, two, \" .. \" buckle my shoe\")\n```\n\n长度运算符返回字符串的长度。\n\
    \n```lua\nprint(#\"this is a long string\")       -- 输出 21 作为字符串的长度\n```\n\n#\
    \ 总结\n\nLua 的可移植性意味着我们可以在各种设备和桌面系统上运行代码。Lua 的小巧体积以及非常灵活且容错的语法，使得快速原型开发和代码测试成为可能。我们已经看到\
    \ Lua 在游戏开发者中越来越受欢迎。在下一章中，我们将更详细地了解标准 Lua 库，这些库提供了构成标准 Lua 的所有命令。\n\n---\n\n**第二章**\n\
    \n# Lua 库"
  raw: 'With Lua, you do not have to define the type of variable; you can simply assign
    the value, and the value can change on the fly. In Visual Basic 6 (not to be confused
    with Visual Basic.NET), this type of variable was called a *variant*variable,
    and had to be explicitly defined as follows:


    ```

    dim i as variant

    ```


    In contrast, Lua stores variables in memory. Lua stores a variable’s value and
    type together. All variables in Lua are first-class values. This simply means
    that these values can be stored in variables, passed to other functions as arguments,
    and returned from a function.


    There are eight different types of variables in Lua, which I’ll describe next.


    nil


    This is the same as null. If you have a variable that holds a reference to the
    last-held value and the garbage collector doesn’t clean it up, you can set the
    variable to nil to indicate that the space referenced can be garbage collected.


    boolean


    boolean variables are our trusty true and false. These are used to check for conditions;
    however, it should be noted that both nil and false will result in the condition
    being false and any other value resulting in true.


    ```

    trusted = false

    if (trusted) then print("Yes") end        -- Nothing is printed

    trusted = 1

    if (trusted) then print("Yes") end        -- Yes is printed

    trusted = nil

    if (trusted) then print("Yes") end        -- Nothing is printed

    ```


    number


    number variables are numbers that can be expressed as decimals, longs, integers,
    hexadecimals, and floats. Lua saves the numbers as double-precision floating-point
    numbers.


    string


    Lua strings are generally 8-bit clean strings (i.e., they can hold any 8-bit character,
    including embedded zeros). Unicode variables are a slightly different matter,
    but are handled by Lua if the platform supports Unicode.


    function


    In Lua, functions can also be stored and passed as variables. This functionality
    of being able to store and pass functions as parameters makes the functions in
    Lua “*first-class functions*.”


    userdata


    This is a memory block that is allocated from C, allowing C functions to store
    and access data. userdata variables cannot be created or manipulated in Lua, but
    only through the C API.


    thread


    This is a special type of variable; this specifies an independent thread of execution.
    This is not the same as the operating system thread.


    table


    table variables are what we would call arrays, associative arrays, hash tables,
    sets, records, lists, trees, and even objects in Lua.


    **Note**   Tables, functions, and threads do not really hold any values—only references
    to them.


    Code Blocks and Scopes


    In Lua, every variable has a scope, which means that it is accessible to the code
    depending on its life cycle as determined by the scope. Variables are either *global*
    or *local*. By default, variables are defined as global unless explicitly defined
    as local.


    In code, variables set between a do and an end block are not accessible outside
    of the block, and any local variables that are set outside of the block are accessible
    inside the block.


    Let us look at this with an example:


    ```

    i = 1

    print("i = ", i)

    do

      local i = 2

      print("i = ", i)

    end

    print("i = ", i)

    ```


    *Coercion* is a simple term given to the process of converting a string into a
    number following the conversion rules (if possible) to provide arithmetic operations
    between a string and a number.


    ```

    one = "1"

    two = 2

    print(one + two)       -- 3 is printed

    ```


    In many languages, attempting such an arithmetic operation between two different
    data types (in this case a string and a number) would fail. In some other scripting
    languages, this code would instead add the value to the string, resulting in the
    string "12". However, in Lua, this outputs the value 3, where one is converted
    into numeric 1 and then added to the value of two to output 3.


    However, if we wanted to add the two strings "1" and "2" to get "12", then we
    would need to use what is called *concatenation*. In Lua the concatenation operator
    is the double-dot (..). This combines the two strings and returns a new string
    that contains the two strings passed.


    Lua Operators


    The operators in Lua can be grouped into different types of operators, which include
    arithmetic, relational, and logical operators, among others.


    Arithmetic Operators


    These do not need much of an introduction; they are simple and straightforward.
    [Table 1-1](#9781430246626_Ch01.xhtml#Tab1) lists them.


    [Table 1-1.](#9781430246626_Ch01.xhtml#_Tab1) Arithmetic Operators


    | Operator | Description |

    | --- | --- |

    | + | Addition |

    | - | Subtraction |

    | * | Multiplication |

    | / | Division |

    | % | Modulo |

    | ^ | Exponent |

    | - | Unary negation |


    Relational Operators


    These are the operators used for comparing or conditions. They’re listed in [Table
    1-2](#9781430246626_Ch01.xhtml#Tab2).


    [Table 1-2.](#9781430246626_Ch01.xhtml#_Tab2) Relational Operators


    | Operator | Description |

    | --- | --- |

    | == | Equality (to check for equality between two values) |

    | ~= | Not equal to (the opposite of equality) |

    | < | Less than |

    | > | Greater than |

    | <= | Less than or equal to |

    | >= | Greater than or equal to |


    These operators will always result in a true or a false return value. It should
    be noted that when comparing two numbers or values, use the == where as a single
    = in Lua signifies assignment.


    Logical Operators


    The logical operators in Lua are


    ```

    and

    or

    not

    ```


    The way the and and or work in Lua is by what’s called the *shortcut evaluation*.
    It checks for a value, and checks further only if it is required. and returns
    the first arguments if the value is false or nil; if it isn’t, then it returns
    the second argument. or, on the other hand, returns the first value if the result
    is not false or nil, and returns the second argument if the first argument is
    false or nil.


    The best use of or is in functions for assigning default values:


    ```

    a = a or 5 -- Can be used to assign the value of 5 if the value of a is nil or
    false

    ```


    We can test how these work as follows:


    ```

    testing = nil

    print(testing)

    print(testing and 5)

    print(testing or 5)

    print(not testing)

    testing = 15

    print(testing)

    print(testing and 5)

    print(testing or 5)

    print(not testing)

    ```


    Other Operators


    Apart from the standard operators that we have discussed, there are a couple of
    other operators offered to us by Lua. They are used for operations like concatenation
    and obtaining the length of something; these two work with strings, though the
    # operator can also be used with arrays.


    *   Concatenation operator: ..

    *   Length operator: #


    As mentioned previously, the concatenation operator in Lua is the double-dot (..).
    It is used to add two strings together, like so:


    ```

    print("one, two, " .. " buckle my shoe")

    ```


    The length operator returns the length of the string.


    ```

    print(#"this is a long string")       -- prints 21 as the length of the string

    ```


    Summary


    The portability of Lua means that we can run our code on various devices and desktops.
    The small footprint of Lua and a very flexible and forgiving syntax allows for
    rapid prototyping and code testing. We have seen that Lua is increasing in popularity
    with game developers. In the next chapter, we shall take a closer look at the
    standard Lua libraries that provide all the commands that make up standard Lua.


    Chapter     2


