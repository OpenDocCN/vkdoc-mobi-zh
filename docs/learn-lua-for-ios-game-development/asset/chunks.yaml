        if theObject == nil then return end\n  stage:addChild(theObject, 1)\nend\n\
    ```\n\nLet There Be Some Color\n\nThe graphics that we created for the game are\
    \ all black and white. To add some variety, we can colorize the objects by giving\
    \ them particular RGB values in our code. We can set up a table of basic colors,\
    \ which can be then used to colorize the graphics.\n\n```\nLocal Colors = {\n\
      {0,   0,   255},    -- blue\n  {255, 0,   0},      -- red\n  {0,   255, 0},      --\
    \ green\n  {255, 0,   255},    -- magenta\n  {0,   255, 255},    -- cyan\n  {255,\
    \ 255, 0},      -- yellow\n  {255, 255, 255},    -- white\n  {179, 115, 255},    --\
    \ orange\n}\n```\n\nHere’s the code specific to Corona SDK:\n\n```\nFunction Colorize(Theobject,\
    \ Thecolor)\n  If Thecolor < 1 Or Thecolor > #Colors Then\n    Return\n  End\n\
      Local R, G, B, A = Unpack(Colors[Thecolor])\n  A = A Or 255\n  Theobject:Setfillcolor(R,\
    \ G, B, A) \nEnd \n```\n\nAnd here’s the code specific to Gideros Studio:\n\n\
    ```\nFunction Colorize(Theobject, Thecolor)\n  If Thecolor < 1 Or Thecolor > #Colors\
    \ Then\n    Return\n  End \n  Local R, G, B, A = Unpack(Colors[Thecolor])\n  A\
    \ = A Or 255\n  R = R / 255 \n  G = G / 255 \n  B = B / 255 \n  A = A / 255\n\n\
    Theobject:Setcolortransform(R, G, B, A)\nEnd \n```\n\nWe can colorize the enemies\
