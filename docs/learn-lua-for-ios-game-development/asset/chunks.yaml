    ## Inkscape


    - *URL*: [`inkscape.org/`](http://inkscape.org/)

    - *价格*: 免费

    - *平台*: Mac OS X, Windows


    随着视网膜显示屏的出现，苹果要求以不同分辨率创建资源：普通分辨率、`@2x`（针对视网膜设备），以及现在的 `@HD` 或 `@4x`（针对视网膜 iPad）。从普通分辨率放大到大型高清图形时，光栅或位图图像很容易出现缩放感和像素化。而使用矢量图形，图像可以缩放以适应各种分辨率，而不会明显丢失细节。Adobe
    Illustrator 和 Corel Draw 在该领域确立了标准；然而，Inkscape 拥有一套庞大的工具集，可与这些程序相媲美（如图 14-16 的示例图所示）。更棒的是，它是开源且免费的。


    ![9781430246626_Fig14-16.jpg](img/9781430246626_Fig14-16.jpg)


    图 14-16 .  使用 Inkscape 通过矢量对象创作的艺术作品示例


    ## Paint.NET


    - *URL*: [www.getpaint.net](http://www.getpaint.net)

    - *价格*: 免费

    - *平台*: Windows


    这款适用于 Windows 的开源绘画软件提供了类似 Photoshop 的图层和功能，但完全免费。Paint.NET 提供了 Photoshop 的大部分功能，包括同时编辑多张图像的能力。它的图层功能支持合成效果和编辑。它拥有无限的撤销历史记录。它运行在
    Windows 平台上，速度相当快。它还支持插件。图 14-17 展示了运行中的 Paint.NET。


    ![9781430246626_Fig14-17.jpg](img/9781430246626_Fig14-17.jpg)


    图 14-17 .  在 Paint.NET 中编辑的图像


    ## iConify


    - *URL*: [`itunes.apple.com/us/app/iconify/id416289784?mt=12`](http://itunes.apple.com/us/app/iconify/id416289784?mt=12)

    - *价格*: 免费

    - *平台*: 仅限 Mac OS X


    当你完成游戏或应用的创建后，需要为打包应用创建图标和资源。尤其是苹果，要求你使用几个特定尺寸的图标，然后才能在 App Store 中上架你的应用。iConify
    是众多可用的实用工具之一，可以帮助你创建各种所需尺寸的图标。图 14-18 展示了 iConify 的简洁界面。


    ![9781430246626_Fig14-18.jpg](img/9781430246626_Fig14-18.jpg)


    图 14-18 .  使用 iConify 为 iOS 设备创建合适尺寸的图标


    以下是它的一些主要功能：


    - 应用程序使用简单。

    - 你可以将 `512×512` 像素或 `1024×1024` 像素的图标拖拽到画布上，所有必要的较小图标都会自动为你创建。


    ## 精灵动画与关卡创建工具


    本节介绍多种工具，用于在你的游戏中创建精灵动画和关卡，以增加额外的精致感和视觉吸引力。


    ### SpriteHelper


    - *URL*: [`itunes.apple.com/us/app/spritehelper/id416068717?mt=12`](http://itunes.apple.com/us/app/spritehelper/id416068717?mt=12)

    - *价格*: $12.99

    - *平台*: Mac OS X


    这是一款工具，它接收单个帧并创建一个包含这些帧的单一精灵表单纹理。SpriteHelper 的功能更进一步，它还可以为帧设置物理对象属性，如图 14-19
    所示。Corona SDK 是目前唯一一个 SpriteHelper 原生支持的框架。不过，调整 SpriteHelper 以用于 Gideros Studio
    或 Moai 也相当容易。SpriteHelper 仅可通过 Mac App Store 获取。它还有一个功能有限的免费精简版，但足以用于测试该产品。


    ![9781430246626_Fig14-19.jpg](img/9781430246626_Fig14-19.jpg)


    图 14-19 .  使用 SpriteHelper 编辑精灵的物理边界


    ### LevelHelper


    - *URL*: [`itunes.apple.com/us/app/levelhelper/id421740820?mt=12`](http://itunes.apple.com/us/app/levelhelper/id421740820?mt=12)

    - *价格*: $19.99

    - *平台*: Mac OS X


    作为 SpriteHelper 的补充，此应用可帮助你为游戏创建关卡。它类似于基于图块的编辑器，但不同之处在于，它还可以向关卡中添加物理对象和形状，如图 14-20
    所示。它目前只能输出适用于 cocos2D 和 Corona SDK 的关卡。与 SpriteHelper 类似，LevelHelper 也仅可通过 Mac
    App Store 获取，并提供一个免费的精简版。


    ![9781430246626_Fig14-20.jpg](img/9781430246626_Fig14-20.jpg)


    图 14-20 .  LevelHelper，屏幕上显示关卡并在设备上进行模拟


    ### Tiled


    - *URL*: [www.mapeditor.org/](http://www.mapeditor.org/)

    - *价格*: 免费

    - *平台*: Mac OS X, Windows, `*nix`


    Tiled 是一款广受推荐且被广泛使用的开源编辑器，用于创建图块地图。它通过生成包含地图定义的 `TMX` 文件来工作。Gideros Studio 拥有读取此格式的原生
    API。生成的图块地图可以被其他框架读取，并用于 RPG 风格或基于图块的游戏中。图 14-21 显示了在 Tiled 中创建 RPG 地图的过程。


    ![9781430246626_Fig14-21.jpg](img/9781430246626_Fig14-21.jpg)


    图 14-21 .  在 Tiled 编辑器中进行地图编辑


    ### TexturePacker


    - *URL*: [www.codeandweb.com/texturepacker](http://www.codeandweb.com/texturepacker)

    - *价格*: $24.84

    - *平台*: Mac OS X, Windows, Ubuntu


    此实用工具有助于创建精灵表单和纹理图谱。它甚至可以从 `PSD` 和 `SWF` 文件创建精灵表单。它拥有多样化的输出格式，支持 Corona SDK、Gideros
    Studio 和 Moai，以及其他一些框架，甚至还支持通用 JSON 格式，该格式解析后可用于任何框架。TexturePacker 网站上提供了一些关于纹理打包的有趣信息，以及教程和文章，帮助你了解如何使用
    TexturePacker。TexturePacker 还可以通过使用 Xcode、Ant、CMake 等工具与构建过程自动化集成。图 14-22 展示了在
    TexturePacker 中从一个 Flash 动画（`SWF`）创建精灵表单的过程。


    ![9781430246626_Fig14-22.jpg](img/9781430246626_Fig14-22.jpg)


    图 14-22 .  TexturePacker 从一个 Flash 动画（`SWF`）创建精灵表单


    ### PhysicsEditor


    - *URL*: [www.codeandweb.com/physicseditor](http://www.codeandweb.com/physicseditor)

    - *价格*: $19.87

    - *平台*: Mac OS X 和 Windows


    PhysicsEditor 是 TexturePacker 作者开发的配套应用。PhysicsEditor 是一款为你的图形定义物理对象的工具，以便在你的游戏框架中使用。它允许你创建逼真的碰撞和其他物理事件。它甚至具备在对象之间创建碰撞掩码的功能，并且能与多种框架配合使用，包括
    Corona SDK、Gideros Studio 和 Moai。PhysicsEditor 的作者非常积极主动地调整该工具，使其能与尽可能多的框架配合使用。图
    14-23 展示了一个工作中的 PhysicsEditor 示例。


