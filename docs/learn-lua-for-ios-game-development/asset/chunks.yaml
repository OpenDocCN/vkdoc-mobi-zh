    \n## 陀螺仪\n\n所有新的iOS设备都配有陀螺仪，可以从设备读取数据。首先，我们使用`require \"gyroscope\"`命令，这会创建一个名为`gyroscope`的变量，属于`Gyroscope`类。\n\
    \n使用`getRotationRate`函数读取陀螺仪数据，该函数返回以弧度表示的旋转速率。\n\n```lua\nrequire \"gyroscope\"\
