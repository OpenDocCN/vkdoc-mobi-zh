    ## 绘制基本图形


    现在我们已经在图像上做了一些尝试，接下来将学习矢量图形——矩形、圆形等。在许多游戏中，这些基本图形可以帮助创建背景，而无需额外的图形图像开销。


    ### 线条


    所有矢量绘图对象中最简单的就是线条。线条是连接两点之间的一系列点。绘制线条的语法是：


    ```lua

    love.graphics.line(x1, y1, x2, y2,...)

    ```


    你可以指定一系列的点，它们都会被绘制出来。线条对象也可以通过 `LineWidth` 和 `LineStyle` 属性进行修改，既可以单独修改，如 `love.graphics.setLineWidth`
    和 `love.graphics.setLineStyle`，也可以一次性修改，如 `love.graphics.setLine(width, type)`。下面的代码中，我们设置线宽为
    2 并使用平滑类型（`smooth`），然后从 (15, 15) 到 (70, 90) 绘制一条线。


    ```lua

    love.graphics.setLine(2,"smooth")

    love.graphics.line(15, 15, 70,90)

    ```


    ### 矩形


    这是绘制矩形的语法：


    ```lua

    love.graphics.rectangle( mode, x, y, width, height )

    ```


    `mode` 可以是 `fill`（填充矩形）或 `line`（仅显示矩形轮廓，不填充）。


    在这个例子中，我们将通过绘制国际象棋棋盘来实践矩形的概念。棋盘的特点是由交替颜色的方格组成，通常是 8×8 的大小。


    ```lua

    local _W, _H = love.graphics.getWidth(), love.graphics.getHeight()

    local smaller = math.min(_W, _H)

    local tileSize = math.floor(smaller/10)  -- 为上下留出空间


    function love.load()

        love.graphics.setColor(0,0,0,255)

        love.graphics.setBackgroundColor(255,255,255)

    end


    function drawBoard()

      local mode = 1

      for i = 1, 8 do

        for j = 1, 8 do

          if mode ==1 then

            theMode = "fill"

          else

            theMode = "line"

          end

          mode = 1 - mode

          love.graphics.rectangle(theMode, j*tileSize, i*tileSize, tileSize, tileSize)

        end

       mode = 1 - mode

      end

    end

    function love.draw()

      drawBoard()

    end

    ```


    代码相当简单直接，我们利用 `1 - 1 = 0` 和 `1 - 0 = 1` 这一事实来切换 `fill` 和 `line`。因此 `1 - mode`
    帮助我们切换 `mode` 中保存的值（在 0 和 1 之间）。然后，使用 `if` 语句，如果 `mode` 值为 1，则设置 `theMode` 为 `fill`；如果
    `mode` 值为 0，则设置为 `line`。由于我们处理的是偶数个方格，在内层循环结束时，`mode` 的值会恢复为初始值，因此我们再次进行一次切换。这样，下一行就会以交替的模式开始，从而形成交替的图案。如果想看看如果不这样做会发生什么，可以将矩形函数后面的
    `mode = 1 - mode` 注释掉，然后查看代码渲染效果。


    ### 圆形


    绘制圆形的函数语法是：


    ```lua

    love.graphics.circle(mode, x, y, radius, segments)

    ```


    `mode` 和之前一样，是 `fill` 或 `line`；`x` 和 `y` 是圆心点；`radius` 是圆的大小。默认的片段数（`segments`）是
    10，这会导致绘制出一个有锯齿的圆，适用于调试或资源较少的系统。为了获得平滑高质量的圆，推荐片段数设为 100。


    让我们尝试动画化一些圆形：


    ```lua

    local circles = {}

    function love.mousepressed(x, y, button)

      if button == "l" then

        newCircle = {

          size = 0,

          n = 20,

          x = x,

          y= y

          }

        table.insert(circles, newCircle)

      end

    end

    function love.update(dt)

      for _, c1 in pairs(circles) do

        c1.size = c1.size + c1.n * dt

      end

    end


    function love.keypressed(key)

      if key == " " then

        circles = {}

      end

    end

    function love.draw()

      for _, c in pairs(circles) do

        love.graphics.circle( "line", c.x, c.y, c.size, 100)

      end

    end

    ```


    这段代码使圆圈无限增长。但是，我们可以为圆圈的大小设置最大和最小限制。


    让我们选择最大值为 20，最小值为 0。为此，我们只需要修改 `update` 函数，如下所示：


    ```lua

    function love.update(dt)

      for _, c1 in pairs(circles) do

        c1.size = c1.size + c1.n * dt

        if c1.size < 0 then

          c1.size = 0

          c1.n = c1.n * -1

        elseif c1.size > 20 then

          c1.size = 20

          c1.n = c1.n * -1

        end

      end

    end

    ```


    ### 多边形


    多边形使用 `love.graphics.polygon` 函数绘制，其语法如下：


    ```lua

    love.graphics.polygon(mode, vertices)

    ```


    `vertices` 构成一个包含绘制形状所需点的表格。下面的例子绘制了一个朝下的三角形：


    ```lua

    love.graphics.polygon ("fill", 100,100,200,100,150,200)

    ```


    **注意：** 如果使用 `fill` 模式，多边形必须是凸且简单的；否则可能会产生渲染伪影。


    ### 四边形


    我们还可以使用 `love.graphics.quad` 函数绘制四边形形状（四边多边形）。语法是：


    ```lua

    love.graphics.quad( mode, x1, y1, x2, y2, x3, y3, x4, y4 )

    ```


    虽然四边形看起来和多边形很相似，但它们可用于不同的目的——例如，将指定图像的一部分复制到屏幕上。你可以从一张存储了系列图像（纹理）的图片创建动画，然后利用四边形来帮助显示图像的部分区域。


    我们可以使用 `newQuad` 函数创建一个四边形，然后使用 `drawq` 函数将其绘制到屏幕上。这对于创建动画表非常有用。


    ![9781430246626_Fig11-08.jpg](img/9781430246626_Fig11-08.jpg)


    图 11-8. 用于动画化火柴人的精灵表（图片由 Bonzo Industries 提供；[`bonzo_industries.webs.com/sprites.htm`](http://bonzo_industries.webs.com/sprites.htm)）


    ```lua

    lg = love.graphics

    sheet = lg.newImage("stick.png")

    wd, ht = sheet:getWidth(), sheet:getHeight()

    frameCount = 11

    frameSpeed = 5

    tileWd, tileHt = 39, 62

    delay = 0

    curr = 1

    scale = 2

    frames = {}

    function love.load()

       for i=1, frameCount do

        frames[i] = lg.newQuad((i-1)*tileWd, 0, tileWd, tileHt)

      end

    end

    function love.draw()

      lg.drawq(sheet, frames[curr], (_W-(tileWd*scale))/2, (_H-(tileHt*scale))/2,
    0, scale, scale)

    end

    function love.update(dt)

      delay = delay + 1

      if delay > frameSpeed then

        delay = 0

       curr = curr + 1

       if curr > frameCount then curr = 1 end

      end

    end

    ```


    在我们的 `love.load` 函数中，我们创建并存储了代表每一帧的四边形。这有助于提高速度和效率。之后，我们只需引用存储在表格中的四边形，就可以简单地绘制序列中的任何一帧。要获取第四帧，我们只需引用第四个四边形（即
    `frames[4]`）。在我们的 `drawq` 函数中，我们将 `tileWd` 和 `tileHt` 乘以缩放值（`scale`），并且也将缩放值作为参数传递。这有助于以指定的缩放比例创建动画，在我们的例子中是双倍大小（即
    2）。

