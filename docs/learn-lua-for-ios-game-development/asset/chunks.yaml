    [Figure 9-4](#9781430246626_Ch09.xhtml#_Fig4) .  The Gideros Studio start screen


    To create your first application, choose the Create New Project option; if required,
    we can customize the project path and the name. Following this, we are presented
    with a blank IDE to start our development.


    The first step is to create a new Lua file, so right-click the project name and
    select Add New File. If you have a file that you want to add to the project from
    the hard drive, you can select the Add Existing File option and navigate to the
    file to be added.


    After you add a new file, name it file main.lua. Leave the location set to the
    value displayed, and double-click the file name (main.lua) displayed under the
    project name. The editor will open for us to type our code. Start with typing
    the following:


    ```

    print ("Hello World")

    ```


    Running the Code


    To run the code, we need to connect to the Gideros Player, either on the desktop
    or the device. We have the option of using either the desktop player or the device
    player to run our code. We can select Player ![image](OEBPS/Images/arrow.jpg)
    Player Settings, which brings up the dialog box shown in [Figure 9-5](#9781430246626_Ch09.xhtml#Fig5)
    and allows us to set the IP address of the player device. If you want to use the
    desktop player, check the Localhost check box, which sets the IP address to 127.0.0.1
    (localhost). When the player app starts (either on the device or the desktop),
    it displays some basic information, including the version number and the IP addresses,
    as shown in [Figure 9-6](#9781430246626_Ch09.xhtml#Fig6).


    ![9781430246626_Fig09-05.jpg](OEBPS/Images/9781430246626_Fig09-05.jpg)


    [Figure 9-5](#9781430246626_Ch09.xhtml#_Fig5).  The Gideros Player settings'
