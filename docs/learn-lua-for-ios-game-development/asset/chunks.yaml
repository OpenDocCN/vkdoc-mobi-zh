    # Snippets Collectors


    Every now and then you might come across some function or routine that is interesting,
    but might not be related to your project at that moment. Later, when you might
    need it, it’s possible that you might draw a blank on the function code. In these
    cases, a snippet collector is always a good tool to have. This section describes
    two useful ones.


    ## CodeBox


    - **URL**: [http://itunes.apple.com/us/app/codebox/id412536790?mt=12](http://itunes.apple.com/us/app/codebox/id412536790?mt=12)

    - **Price**: $4.99

    - **Platforms**: Mac OS X


    This is an unstructured snippet collector. It allows for snippets to be added
    to a data file. Each of the snippets can have multiple tables, which can each
    have a different syntax language highlighting. You can mix web pages and text
    files, as shown in [Figure 14-10](#9781430246626_Ch14.xhtml#Fig10). This is a
    particularly useful tool for developers, as it does not suffer from the one-file-per-snippet
    problem; instead, it can store an entire project per snippet entry.


    ![9781430246626_Fig14-10.jpg](OEBPS/Images/9781430246626_Fig14-10.jpg)


    [Figure 14-10](#9781430246626_Ch14.xhtml#_Fig10) . CodeBox with snippets, including
    a URL and a text file


    ## Code Collector Pro


    - **URL**: [www.mcubedsw.com/software/codecollectorpro/](http://www.mcubedsw.com/software/codecollectorpro/)

    - **Price**: Free (soon to be open source)

    - **Platforms**: Mac OS X


    This is one of the earlier offerings and has a bit of structure to it; it looks
    similar to an e-mail client—that is, it includes folders, each containing a snippet,
    and the snippet can be previewed in the bottom pane (as shown in [Figure 14-11](#9781430246626_Ch14.xhtml#Fig11)).
    Each snippet has only one text box or tab, and it can be set to be of a particular
    language.


    ![9781430246626_Fig14-11.jpg](OEBPS/Images/9781430246626_Fig14-11.jpg)


    [Figure 14-11](#9781430246626_Ch14.xhtml#_Fig11) . Snippets in Code Collector
    Pro


    # Versioning


    Code is ever evolving—you often have to add or alter data in a file while developing
    or while testing. For this reason, it’s good to have some form of versioning so
    that you can keep track of changes and switch back and forth between code versions.
    While you can choose between `CVS`, `Subversion`, `Mercurial`, and `Git`, I find
    that `Git` works best as a stand-alone versioning system with the ability to extend
    to a team repository. There are plenty of `Git` clients that can help with managing
    the `Git` repository both on the desktop and online. For online repositories,
    you can start by creating a repository on `GitHub` or `Bitbucket`.


    # Bitmap Editors


    The selling point of most non-3D games is generally the graphics—the majority
    of users’ decisions to purchase games are made based on the screenshots in the
    App Store. Now, graphics of course don’t make themselves, but not everyone can
    afford (or even needs) `Photoshop` (although it has become the de facto standard
    as the software for creating graphics). This section describes some alternative
    software products you can use to create your graphics, depending on your requirements.


    ## Pixen


    - **URL**: [http://pixenapp.com/](http://pixenapp.com/)

    - **Price**: $9.99 if purchased from the Mac App Store

    - **Platforms**: Mac OS X


    If you are creating 8-bit graphics or pixel graphics, then you need tools that
    are well suited for the task; zooming in onto the canvas and using the grid is
    one approach, but bitmap editors are made for the specific tasks of pixel art
    manipulation, as shown in [Figure 14-12](#9781430246626_Ch14.xhtml#Fig12). `Pixen`
    a tool for Mac OSX is now available on the Mac App Store and is priced at $9.99;
    the free version has been taken down from the website. However, the source is
    still available on `GitHub`.


    ![9781430246626_Fig14-12.jpg](OEBPS/Images/9781430246626_Fig14-12.jpg)


    [Figure 14-12](#9781430246626_Ch14.xhtml#_Fig12) . Editing a sprite or image using
    Pixen


    ## GraphicsGale


    - **URL**: [www.humanbalance.net/gale/us/](http://www.humanbalance.net/gale/us/)

    - **Price**: ¥1995 (approximately $25; also available in a free edition)

    - **Platforms**: Windows only


    `GraphicsGale` is wonderful tool available on the Windows platform for working
    with 8-bit or pixel graphics. While you could use `Microsoft Paint` for certain
    tasks, such as magnifying and setting a grid, the additional features available
    in `GraphicsGale` make it a tool of choice. It has onion-skinning to aid in cell
    animation, and it has functionality to export and import between several formats.
    It is a single tool that can help create animated cursors, icons, and so on. [Figure
    14-13](#9781430246626_Ch14.xhtml#Fig13) shows `GraphicsGale` in action.


    ![9781430246626_Fig14-13.jpg](OEBPS/Images/9781430246626_Fig14-13.jpg)


    [Figure 14-13](#9781430246626_Ch14.xhtml#_Fig13) . Editing a pixel sprite in GraphicsGale


    ## Pixelmator


    - **URL**: [http://itunes.apple.com/us/app/pixelmator/id407963104?mt=12](http://itunes.apple.com/us/app/pixelmator/id407963104?mt=12)

    - **Price**: $14.99 (launch price)

    - **Platforms**: Mac OS X


    `Pixelmator`, which has evolved over the past few years, is a painting application
    that runs on the Mac. It is a beautiful application in terms of its UI, and offers
    many features such as layers, effects, handling multiple file formats, brushes,
    etc., that you might only expect from a more advanced program, like `Photoshop`,
    for a fraction of the cost. The new version, dubbed `Cherry`, is a workhorse,
    offering a visual repository of over 150 effects that are much faster and more
    responsive than similar features in to `Photoshop` (one of which—a kaleidoscope
    effect—is shown in [Figure 14-14](#9781430246626_Ch14.xhtml#Fig14)). It can handle
    `RAW` files as well as many other file formats.


    ![9781430246626_Fig14-14.jpg](OEBPS/Images/9781430246626_Fig14-14.jpg)


    [Figure 14-14](#9781430246626_Ch14.xhtml#_Fig14) . An image in Pixelmator with
    a kaleidoscope effect applied


    ## Axialis IconWorkshop


    - **URL**: [www.axialis.com/iconworkshop/](http://www.axialis.com/iconworkshop/)

    - **Price**: $69.95

    - **Platforms**: Windows


    This is a Windows-only application designed primarily as an icon-creating tool.
    It has some lovely visual templates you can use to create great-looking results.
    The icons can be used as images for the tab bars, and so on. The image packs even
    include things like shine and highlighting so you can create icons that have the
    same glossy feel as professionally made ones. [Figure 14-15](#9781430246626_Ch14.xhtml#Fig15)
    highlights some of the features available.


    ![9781430246626_Fig14-15.jpg](OEBPS/Images/9781430246626_Fig14-15.jpg)'
