- fmt: '# Gideros Studio Architecture


    ![Figure 9-10](OEBPS/Images/9781430246626_Fig09-10.jpg)


    *[Figure 9-10](#9781430246626_Ch09.xhtml#_Fig10). The Gideros Studio family architecture*


    The Lua code that we write is compiled into bytecode and executed.


    Unlike Corona SDK, Gideros offers offline compilation, which a lot of developers
    like. The entire Gideros engine is available as a library that has to be linked
    to the final app (similar to the Corona SDK Enterprise offering). So, the Xcode
    or Android project has some wrapper code that starts off the scripts and compiles
    the Gideros library into the final application binary. Any plug-in is also compiled
    as a static library into the application.


    The plug-in feature is very handy and powerful; we’ll explore it later in this
    chapter.


    ## The Gideros Engine


    The Gideros engine is the framework that is facilitated by the Lua language for
    development. This contains all the specific commands that grant access to the
    Gideros API. This is what a developer can use to code and display an application
    to the device.


    Gideros is object oriented, but do not let that sentence scare you. This just
    means that the Gideros API uses colon notation rather than dot notation—for example,
    it would use `image:setX(100)` instead of `image.x = 100`.


    ## Hello Birdie


    To follow up our Hello World example, we’ll now display an image on to the screen.


    One point to note about Gideros Studio is that having a resource in the directory
    means nothing; you should add each of the files that you want for the project
    by either adding a *new* file or an *existing* file. So, before we can use `bird.png`
    in our application, we need to add that to the project.


    ```

    local texture = Texture.new("bird.png")

    local image = Bitmap.new(texture)

    stage:addChild(image)

    image:setPosition(100,100)

    ```


    This piece of code first creates a texture from a file called `bird.png`, and
    then creates a bitmap image using that texture. This image instance is the *sprite*,
    or the object that we display on the screen; we can reposition it as we like using
    the `setPosition` function.


    In Gideros, when an object is created, it is stored in memory but not made visible
    to the user. We need to add the display object that we create to the stage to
    be able to see it on the device screen.


    ```

    local image = Bitmap.new(Texture.new("bird.png"))

    ```


    To make things easier, we can also create our own shortcut methods or library:


    ```

    function newImage (imageName, posX, posY)

      local image = Bitmap.new(Texture.new(imageName))

      stage:addChild(image)

      image:setPosition(posX, posY)

      return image

    end

    ```


    Now, all we need to do is call this function, as follows:


    ```

    local birdie = newImage("bird.png", 100, 100)

    ```


    Another point to note about Gideros Studio is that it loads multiple Lua files
    without having to use the `require` function. We can use this to our advantage
    by having a separate file that houses all of the utility functions for our projects.
    Let’s create a file, `myutils.lua`, add the `newImage` function to it, and include
    it in our projects.


    ## Aligning the Images


    All images have an *anchor point* on which they are hinged; when an image is rotated,
    it is this point that determines how the rotation takes place. The anchor point
    is a numerical value from 0 to 1, which represents the height or width of the
    image. This is illustrated in [Figure 9-11](#9781430246626_Ch09.xhtml#Fig11).
    You can think of this value as a percentage: 0 being the top and 100 being the
    bottom on the y-axis and 0 being the left and 100 being the right on the x-axis.
    To get our value, we simply divide this percentage by 100.


    ![Figure 9-11](OEBPS/Images/9781430246626_Fig09-11.jpg)


    *[Figure 9-11](#9781430246626_Ch09.xhtml#_Fig11). A bitmap object with the anchor
    point set at 0, 0*


    The center anchor point would be 0.5 on both x- and y-axis. Consider the following
    code:


    ```

    local birdie = newImage("post-it.png", 100, 100)

    birdie:setAnchorPoint(0.5,0.5)

    birdie:setRotation(45)

    ```


    Notice that the image is rotated around the center of the image when run. Now
    try to change the `0.5, 0.5` to different numbers to observe the effect of the
    anchor point.


    ## Groups


    A group is a container of different display objects. When the attributes of the
    group are altered, it affects all of the display objects contained in the group.
    The stage is a group; in fact it is the root group, which is the container for
    all of the other display objects. The way to add an object to a group is using
    the following syntax:


    ```

    group:addChild(displayObject)

    ```


    To remove an object from the group, you use this function:


    ```

    displayObject:removeFromParent()

    ```


    To create a new group, you create a new object that inherits from the Gideros
    class:


    ```

    local obj = Core.class(Sprite).new()

    ```


    Now we need to place this object on to the stage:


    ```

    stage:addChild(obj)

    ```


    Here’s a new function to add to `myUtils.lua` file:


    ```

    function newGroup()

      local obj = Core.class(Sprite).new()

      stage:addChild(obj)

      return obj

    end

    ```


    We can use this henceforth to create a group object.


    We use `stage:addChild` to add most of the objects to the stage. We can now use
    this function to add an object to a group by using the `group:addChild`.


    To get the handle of an object in a particular group, we can get it using the
    function `getChildAt` by passing it the index. Alternatively, we can get the index
    position by passing the object to the function `getChildIndex`. We can also use
    this to check if a particular parent group contains a display object or not by
    using this function by passing it the display object.


    We can determine the number of objects contained in the parent by using the `group:getNumChildren`
    function.


    After we are done with the group or the objects in the group, we can remove the
    objects from the stage or the group using the `removeChild` or `removeFromParent`
    function, or using the `removeChildAt` function, which takes the index of the
    display object.


    ```

    object:removeChild()

    group:removeChildAt(index)

    group:removeFromParent(object)

    ```


    There is another function, `addChildAt`, which allows for adding a child at a
    particular index position. This allows for positioning display objects that is
    equivalent of moving an object to the front or to the back relative to the other
    objects.


    ## Displaying Text


    This section will describe how to display text to the screen in your application.
    Gideros Studio allows you to use custom fonts in your application, and it works
    with both TrueType and bitmapped fonts. Note that if you want to use a custom
    font, then it needs to be loaded before use.


    **Note:** Gideros Studio comes with Gideros Font Creator, an application for creating
    bitmapped fonts that can be used with Gideros Studio.


    The first thing you need to do to display text is create a text field, which you
    can do as follows:


    ```

    -- To use the default font, pass a nil value for the font parameter

