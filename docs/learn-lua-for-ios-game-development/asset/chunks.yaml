    \n初始化插件时，我们使用`package.preload`函数并加载所需的函数。在上述示例代码中，我们通过调用`luaMy_func`函数来初始化插件。\n\
    \n在 Gideros Studio 中，要在 Lua 代码中使用此插件，首先需要引用（require）该库：\n\n```lua\nrequire \"\
    test\"\nlocal result = Test.myFunc(10,20)\nprint(\"The sum is : \", result)\n\
    ```\n\n要编写插件代码，请参考 Lua C API 文档（[`www.lua.org/manual/5.2/manual.html#4`](http://www.lua.org/manual/5.2/manual.html#4)）。插件类似于\
    \ Lua 字节码命令，C 代码可以与 Lua C API 混合使用。\n\n以下 Lua 代码：\n\n```lua\na = f(\"how\", t.x,\
