  - **URL**: [www.mcubedsw.com/software/codecollectorpro/](http://www.mcubedsw.com/software/codecollectorpro/)

  - **价格**: 免费（即将开源）

  - **平台**: Mac OS X


  这是较早推出的一款工具，结构感稍强；它看起来类似于电子邮件客户端——也就是说，它包含文件夹，每个文件夹包含一个代码片段，并且可以在底部窗格中预览该代码片段（如图
  Figure 14-11 所示）。每个片段只有一个文本框或标签页，并且可以设置为特定的语言。


  ![9781430246626_Fig14-11.jpg](img/9781430246626_Fig14-11.jpg)


  图 14-11 . Code Collector Pro 中的代码片段


  ## 版本控制


  代码总是在演变——在开发或测试过程中，你经常需要在文件中添加或更改数据。因此，采用某种形式的版本控制是好的，这样你可以跟踪更改并在不同代码版本之间来回切换。虽然你可以选择
  `CVS`、`Subversion`、`Mercurial` 和 `Git`，但我发现 `Git` 作为独立版本控制系统效果最好，并且能够扩展到团队仓库。有很多
  `Git` 客户端可以帮助管理桌面端和在线端的 `Git` 仓库。对于在线仓库，你可以从在 `GitHub` 或 `Bitbucket` 上创建仓库开始。


  ## 位图编辑器


  大多数非 3D 游戏的卖点通常是图形——大多数用户购买游戏的决定是基于 App Store 中的截图。当然，图形不会自己产生，但并非每个人都能负担得起（甚至需要）`Photoshop`（尽管它已经成为创建图形的实际标准软件）。本节描述了一些备选软件产品，你可以根据需求使用它们来创建图形。


