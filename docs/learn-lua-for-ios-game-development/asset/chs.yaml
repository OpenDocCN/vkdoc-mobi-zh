  \ `属性` 选项。在此可以设置项目的属性。你可以在这里设置应用的缩放模式、逻辑尺寸、方向、帧率，甚至根据需要设置图像文件的后缀。虽然这是你学习 Gideros\
  \ Studio 初期可能不会用到的高级选项，但它非常实用，因此我将在此进行说明。\n\n第一个选项 `缩放模式` 设置了应用在不同设备上运行时的缩放方式——本章后续内容将对此进行更详细的介绍。逻辑尺寸用于设置应用的基础参数；显示画面将基于这些尺寸，通过缩放模式在不同设备上进行适配。苹果系统使用\
  \ `@2x` 或 `@4x` 后缀来加载新款 iPhone 和 iPad 的视网膜图形。Gideros 作为一个多平台系统，也将这种格式扩展到了 Android\
  \ 平台。因此，你可以使用 `@1.5`、`@2`、`@4` 等作为后缀。\n\n**提示** 缩放后缀不仅可用于高清图形，还可以为每个平台提供对应的图形，而无需编写任何检测特定平台的代码。\n\
  \n`iOS` 标签页可用于配置 iOS 特定的其他设置；例如，应用是否应将目标设备视为视网膜屏设备，以及是否启用自动旋转。如果逻辑尺寸设置为 `320×480`，并且视网膜显示设置为\
  \ `非视网膜显示`，则显示尺寸被视为 `320×480`，如图 9-8 所示；而如果启用了视网膜显示选项，则设备被视为具有 `640×960` 的显示尺寸，如图\
  \ 9-9 所示。这两张图片均来自运行在 iPhone 4 上的播放器，该设备实际尺寸为 `960×640`，但根据项目设置，显示效果会有所不同。\n\n![9781430246626_Fig09-08.jpg](img/9781430246626_Fig09-08.jpg)\n\
  \n图 9-8. 以 `320×480` 分辨率运行的非视网膜显示模式的 Gideros Player\n\n![9781430246626_Fig09-09.jpg](img/9781430246626_Fig09-09.jpg)\n\
  \n图 9-9. 以逻辑尺寸 `320×480` 并启用视网膜显示模式运行的 Gideros Player\n\n## 架构\n\nGideros 的架构与其他框架类似。Gideros\
  \ 核心引擎一方面与 Lua 代码交互，另一方面在后台通过 OpenGL 与设备或桌面端进行交互。图 9-10 展示了 Gideros Studio 的架构。构成\
  \ Gideros Studio 系列的工具还包括一些实用程序；这些在章节开头已经讨论过。\n\n\n\n## Gideros Studio 架构\n\n![图\
  \ 9-10](img/9781430246626_Fig09-10.jpg)\n\n*图 9-10. Gideros Studio 家族架构*\n\n我们编写的\
  \ Lua 代码会被编译成字节码并执行。\n\n与 Corona SDK 不同，Gideros 提供离线编译功能，这一点深受众多开发者喜爱。整个 Gideros\
  \ 引擎以库的形式存在，需要链接到最终的应用中（类似于 Corona SDK 的企业版）。因此，Xcode 或 Android 项目会包含一些包装代码，用于启动脚本并将\
  \ Gideros 库编译到最终的应用二进制文件中。任何插件也会作为静态库编译到应用中。\n\n插件功能非常便捷且强大；我们将在本章后面进行探讨。\n\n###\
  \ Gideros 引擎\n\nGideros 引擎是一个框架，通过 Lua 语言进行开发。它包含所有用于访问 Gideros API 的特定命令，开发者可以借助这些命令编写代码并在设备上显示应用。\n\
  \nGideros 是面向对象的，但请不要被这句话吓到。这仅仅意味着 Gideros API 使用冒号表示法而非点表示法——例如，它会使用 `image:setX(100)`\
  \ 而不是 `image.x = 100`。\n\n### Hello Birdie\n\n延续我们的 Hello World 示例，接下来我们将把一个图像显示到屏幕上。\n\
  \n关于 Gideros Studio，需要注意一点：资源放在目录中并不意味着什么；你需要通过添加*新*文件或*现有*文件的方式，将项目中需要的每个文件都添加进来。因此，在应用中使用\
  \ `bird.png` 之前，我们需要先将其添加到项目中。\n\n```\nlocal texture = Texture.new(\"bird.png\"\
  )\nlocal image = Bitmap.new(texture)\nstage:addChild(image)\nimage:setPosition(100,100)\n\
  ```\n\n这段代码首先从名为 `bird.png` 的文件创建了一个纹理，然后使用该纹理创建了一个位图图像。这个图像实例就是*精灵*，或者说我们在屏幕上显示的对象；我们可以使用\
  \ `setPosition` 函数随意调整其位置。\n\n在 Gideros 中，当一个对象被创建时，它会被存储在内存中，但不会对用户可见。我们需要将创建的显示对象添加到舞台上，才能在设备屏幕上看到它。\n\
  \n```\nlocal image = Bitmap.new(Texture.new(\"bird.png\"))\n```\n\n为了方便起见，我们也可以创建自己的快捷方法或库：\n\
  \n```\nfunction newImage (imageName, posX, posY)\n  local image = Bitmap.new(Texture.new(imageName))\n\
    stage:addChild(image)\n  image:setPosition(posX, posY)\n  return image\nend\n\
  ```\n\n现在，我们只需像下面这样调用这个函数即可：\n\n```\nlocal birdie = newImage(\"bird.png\", 100,\
  \ 100)\n```\n\n关于 Gideros Studio 的另一点是，它加载多个 Lua 文件时无需使用 `require` 函数。我们可以利用这一点，创建一个单独的文件来存放项目中的所有实用函数。让我们创建一个\
  \ `myutils.lua` 文件，将 `newImage` 函数添加进去，并将其包含在我们的项目中。\n\n### 对齐图像\n\n所有图像都有一个*锚点*，图像以此点为轴心进行旋转；当图像旋转时，正是这个点决定了旋转的方式。锚点是一个从\
  \ 0 到 1 的数值，代表图像的高度或宽度百分比。这一点在图 9-11 中进行了说明。你可以将这个值视为百分比：0 表示顶部，100 表示底部（在 y 轴上）；0\
  \ 表示左侧，100 表示右侧（在 x 轴上）。要得到我们的值，只需将这个百分比除以 100。\n\n![图 9-11](img/9781430246626_Fig09-11.jpg)\n\
  \n*图 9-11. 锚点设置在 (0, 0) 的位图对象*\n\n中心锚点将在 x 轴和 y 轴上均为 0.5。考虑以下代码：\n\n```\nlocal birdie\
  \ = newImage(\"post-it.png\", 100, 100)\nbirdie:setAnchorPoint(0.5,0.5)\nbirdie:setRotation(45)\n\
  ```\n\n注意，运行时图像会围绕其中心旋转。现在尝试将 `0.5, 0.5` 改为不同的数值，以观察锚点的效果。\n\n### 组\n\n组是一个包含不同显示对象的容器。当组的属性被更改时，会影响其中包含的所有显示对象。舞台就是一个组；实际上，它是根组，是所有其他显示对象的容器。向组中添加对象的方法如下：\n\
  \n```\ngroup:addChild(displayObject)\n```\n\n要从组中移除对象，使用以下函数：\n\n```\ndisplayObject:removeFromParent()\n\
  ```\n\n要创建一个新组，需要创建一个继承自 Gideros 类的新对象：\n\n```\nlocal obj = Core.class(Sprite).new()\n\
  ```\n\n现在我们需要将这个对象放置到舞台上：\n\n```\nstage:addChild(obj)\n```\n\n以下是添加到 `myUtils.lua`\
  \ 文件中的一个新函数：\n\n```\nfunction newGroup()\n  local obj = Core.class(Sprite).new()\n\
    stage:addChild(obj)\n  return obj\nend\n```\n\n此后，我们可以使用这个函数来创建组对象。\n\n我们使用 `stage:addChild`\
  \ 将大多数对象添加到舞台。现在，我们可以通过 `group:addChild` 使用这个函数将对象添加到组中。\n\n要获取特定组中某个对象的句柄，我们可以使用\
  \ `getChildAt` 函数，并传入索引。或者，我们可以通过将对象传递给 `getChildIndex` 函数来获取其索引位置。我们也可以使用这个函数，通过将显示对象传递给它，来检查某个父组是否包含该显示对象。\n\
  \n我们可以使用 `group:getNumChildren` 函数来确定父组中包含的对象数量。\n\n当我们处理完组或组中的对象后，可以使用 `removeChild`\
  \ 或 `removeFromParent` 函数，或者使用接受显示对象索引的 `removeChildAt` 函数，将对象从舞台或组中移除。\n\n```\n\
  object:removeChild()\ngroup:removeChildAt(index)\ngroup:removeFromParent(object)\n\
  ```\n\n还有另一个函数 `addChildAt`，它允许在特定的索引位置添加子对象。这可以实现显示对象的定位，效果等同于将对象相对于其他对象移到前面或后面。\n\
  \n## 显示文本\n\n本节将描述如何在应用中向屏幕显示文本。Gideros Studio 允许你在应用中使用自定义字体，并且支持 TrueType 字体和位图字体。请注意，如果你想使用自定义字体，则需要在用之前进行加载。\n\
  \n**注意：** Gideros Studio 自带 Gideros Font Creator 应用程序，用于创建可与 Gideros Studio 一起使用的位图字体。\n\
  \n显示文本首先要做的是创建文本字段，操作如下：\n\n```\n-- 要使用默认字体，请将字体参数传递为 nil\nlocal text = TextField.new(nil,\
  \ \"Hello World\")\ntext:setPosition(10,10)\nstage:addChild(text)\ntext:setText(\"\
  Hello from Gideros Studio\")\n-- 更改文本\n```\n\n这里，我们使用 `nil` 作为参数创建了一个新的文本字段，这将使用默认字体。然后，我们将文本定位到屏幕上。Gideros\
  \ 中的文本使用*基线字体*显示。简单来说，y 参数是字体基线对齐的位置，这可能需要一点时间来适应。例如，如果我们不将文本定位在距顶部 10 像素的位置，文本可能不可见。然后，我们将文本添加到舞台并更改显示的文本。\n\
  \n`TextField` 对象可以像其他任何显示对象一样进行修改。文本颜色可以使用 `object:setTextColor(colour)` 函数设置，其中\
  \ `colour` 是由 `b + g * 256 + r * 65536` 计算得出的十六进制值，`r`、`g` 和 `b` 分别代表颜色的红色、绿色和蓝色值。\n\
  \n要使前面的文本变为红色，我们使用以下代码：\n\n\n\n```\n-- 若要使用默认字体，请为字体参数传递 nil 值\nlocal text = TextField.new(nil,\
  \ \"Hello World\")\ntext:setPosition(10,50)\ntext:setTextColor(0xff0000)\nstage:addChild(text)\n\
  text:setText(\"Hello from Gideros Studio\")\n-- 修改文本\ntext:setScale(2,2)\n```\n\n\
  运行时，播放器将以红色显示文本 “Hello from Gideros Studio”，且大小为默认字体的两倍，如图 9-12 所示。\n\n![9781430246626_Fig09-12.jpg](img/9781430246626_Fig09-12.jpg)\n\
  \n图 9-12.  在 Gideros 播放器中显示经过颜色修改的文本\n\n### 绘制形状\n\nGideros Studio 还提供了一个 `Shape`\
  \ 对象，当您需要创建矢量形状（如线条、矩形等）时，可以使用该对象。在 Gideros 中绘制形状的原理与许多其他语言中在 `deviceContext` 上绘图的原理相同。本节将介绍如何创建线条和矩形以及如何填充形状，帮助您入门。\n\
  \n### 线条\n\n线条是最简单的可绘制形状。一条线条本质上由四个点定义：起点的 `x,y` 坐标和终点的 `x,y` 坐标，线条连接这两个点。\n\n```\n\
  function newLine(x1, y1, x2, y2)\n  local obj = Shape.new()\n  obj:setLineStyle(2,\
  \ 0x000000)\n  obj:beginPath()\n  obj:moveTo(x1, y1)\n  obj:lineTo(x2, y2)\n   obj:endPath()\n\
    stage:addChild(obj)\n  return obj\nend\n```\n\n要绘制线条，按如下方式调用函数：\n\n```\nlocal\
  \ line = newline(10,10,250,50)\n```\n\n这将创建一条从 `10, 10` 到 `250, 50`、宽度为 2 像素的线条。我们可以使用\
  \ `setLineStyle` 函数设置线条宽度和颜色。我们还可以扩展该函数，将宽度和颜色也作为参数，并默认宽度为 1、颜色为 `0x000000`。\n\n\
  ```\nfunction newLine(x1, y1, x2, y2, lineWidth, lineColour)\n  local lineWidth\
  \ = lineWidth or 1\n  local lineColour = lineColour or 0x000000\n  local obj = Shape.new()\n\
    obj:setLineStyle(lineWidth, lineColour)\n  obj:beginPath()\n  obj:moveTo(x1, y1)\n\
    obj:lineTo(x2, y2)\n   obj:endPath()\n  stage:addChild(obj)\n  return obj\nend\n\
  ```\n\n现在，我们可以像之前一样绘制线条，但还可以选择自定义的线条宽度和颜色，如下所示：\n\n```\nlocal line = newLine(10,\
  \ 10, 250, 50, 4, 0x00FFFF)\n```\n\n### 矩形\n\n矩形是线条的轻微变体。它由四条线组成，并且可以包含填充色。如果我们不为填充色传递参数，矩形将只有轮廓；否则，矩形将填充传入的颜色。图\
  \ 9-13 展示了这两种情况的示例。\n\n```\nfunction newRectangle(x1, y1, x2, y2, lw, lc, fc)\n\
    local obj = Shape.new()\n  local lw = lw or 1\n  local lc = lc or 0x000000\n  obj:beginPath()\n\
    obj:setLineStyle(lw, lc)\n  if fc then\n    obj:setFillStyle(Shape.SOLID, fc)\n\
    end\n  obj:moveTo(x1,y1)\n  obj:lineTo(x2, y1)\n  obj:lineTo(x2, y2)\n  obj:lineTo(x1,\
  \ y2)\n  obj:lineTo(x1, y1)\n  obj:closePath()\n  obj:endPath()\n  stage:addChild(obj)\n\
    return obj\nend\n\nnewRectangle(10,10,200,50,1,0x0000FF)\nnewRectangle(100,150,250,250,1,nil,\
  \ 0xFF0000)\n```\n\n![9781430246626_Fig09-13.jpg](img/9781430246626_Fig09-13.jpg)\n\
  \n图 9-13.  带轮廓的矩形（上方）和填充色的矩形（下方）\n\n**注意**：请注意上述代码存在一个问题。虽然它能得到预期结果，但如果您尝试重新定位矩形，它会产生少量像素偏移。这主要是因为我们在相对于矩形自身位置的地方绘制线条。我们更恰当的做法是：在位置\
  \ `0, 0` 处绘制所有内容，然后将形状移动到起始的 `x,y` 坐标处。\n\n#### 填充形状\n\nGideros Studio 允许使用纯色或图像填充形状。这有助于实现一些有趣的效果，例如创建图像遮罩或无缝填充纹理。以下是一个使用图像填充形状的示例代码：\n\
  \n\n```lua\nlocal texture = Texture.new(\"image.png\") setFillStyle(Shape.TEXTURE,\
  \ texture)\n```\n\n——将填充样式设置为带有`image.png`的纹理\n\n我们可以使用这个来创建一个用纹理填充的矩形，方便创建平铺背景等。图\
  \ 9-14 展示了一个示例。\n\n```lua\nfunction newImgRectangle(x1, y1, x2, y2, lw, lc, imgName)\n\
    local obj = Shape.new()\n\n-- 用于填充的图像\n  local img = Texture.new(imgName)\n  local\
  \ lw = lw or 1\n  local lc = lc or 0x000000\n\nlocal wd, ht = x2-x1, y2-y1\n\nobj:clear()\n\
    obj:setLineStyle(lw, lc)\n  obj:setFillStyle(Shape.TEXTURE, img)\n\nobj:beginPath()\n\
    obj:moveTo(0,0)\n  obj:lineTo(0, ht)\n  obj:lineTo(wd, ht)\n  obj:lineTo(wd,0)\n\
    obj:lineTo(0,0)\n  obj:closePath()\n  obj:endPath()\n\nobj:setPosition(x1, y1)\n\
  \nstage:addChild(obj)\n\nreturn obj\nend\n\nnewImgRectangle(10, 10, 70, 70, 0, nil,\
  \ \"myImage2.png\")\n```\n\n![9781430246626_Fig09-14.jpg](img/9781430246626_Fig09-14.jpg)\n\
  \n图 9-14. 使用填充形状平铺背景\n\n在这个示例中，如果矩形更大，我们会看到图像被空白区域包围。但 Gideros Studio 也提供了在背景中平铺图像的选项。要使用此功能，只需将加载纹理的代码修改为以下内容：\n\
  \n```lua\nlocal img = Texture.new(imgName, false, {wrap=Texture.REPEAT})\n```\n\n\
  现在我们可以用同样的方式尝试这个示例：\n\n```lua\nnewImgRectangle(10, 10, 220, 220, 1, nil, \"myImage2.png\"\
  )\n```\n\n我们甚至可以创建完整的背景图像，如下所示：\n\n```lua\nnewImgRectangle(0,0,application:getDeviceWidth(),application:getDeviceWidth(),\
  \ 0, nil, \"tile.png\")\n```\n\n### 绘制其他形状\n\n由于 Gideros Studio 为用户提供了绘制任意形状的画布，因此没有针对线条、矩形、圆形或弧线的内置\
  \ API 函数。不过，你可以使用`moveTo`和`lineTo`绘制任何你想要的形状。这允许你创建自己的贝塞尔曲线、弧线、椭圆、圆形等。\n\n**注意**：当你在形状上绘制内容时，它会与随后在形状上已有的内容一起保留。因此，最好在绘制前先调用`obj:clear()`清除形状。\n\
  \n### Application 对象\n\n你可能需要获取设备宽度、设备高度或设备区域设置等细节（例如在制作多语言应用时）。你可能还想知道设备运行的是 iOS\
  \ 还是 Android 等。Gideros Studio 提供了丰富的函数，允许我们查询`Application`对象来获取这些详细信息。以下是一些示例：\n\
  \n```lua\nlocal width = application:getDeviceWidth()\nlocal height = application:getDeviceHeight()\n\
  local model = application:getDeviceInfo()\nprint(\"On \" .. model .. \" (\" .. width\
  \ .. \" x \" .. height .. \" )\" )\n```\n\n**注意**：保存`Application`对象的变量是`application`，而不是`Application`（注意小写字母\
  \ a）。\n\n查看 IDE 中的输出窗格。如果你在设备上运行此程序，输出将是当前运行的设备；如果像本例一样运行桌面版，则根据运行环境会显示“Mac OS”或“Windows”。在移动设备上，`application:getDeviceInfo()`返回多个值。对于\
  \ Android，它返回“Android”后跟版本号；对于 iOS 设备，它返回五个值：“iOS”、版本、设备类型、UI 习惯用法和设备型号。以下是在运行 Gideros\
  \ Player 的 iPhone 上的一些示例输出：\n\n```\niOS 5.1 iPhone iPhone iPhone3,1\n```\n\n####\
  \ 保持设备唤醒\n\n如果你需要执行一些计算，并担心在此期间设备可能会变暗然后进入睡眠或关机状态，可以通过以下方式确保设备不会变暗：\n\n```lua\n\
  application:setKeepAwake(true)\n-- 防止设备变暗\n```\n\n或者，你可以使用以下代码：\n\n```lua\napplication:setKeepAwake(false)\n\
  -- 允许设备变暗\n```\n\n### 方向\n\n如果你需要获取设备在特定时间点的手持方式，可以查询设备的方向，如下所示：\n\n```lua\napplication:getOrientation()\n\
  ```\n\n如果需要设置方向，可以使用以下代码：\n\n```lua\napplication:setOrientation(theOrientation)\n\
  ```\n\n以下是可供选择的方向选项：\n\n*   `Application.PORTRAIT`\n*   `Application.PORTRAIT_UPSIDE_DOWN`\n\
  *   `Application.LANDSCAPE_LEFT`\n*   `Application.LANDSCAPE_RIGHT`\n\n**注意**：`Application`对象的常量都以大写字母\
  \ A 开头，而变量则如前所述以小写字母 a 开头。\n\n你可以使用`setOrientation`将设备定向到所需方式——例如，如果你希望游戏固定在横屏模式，需要在设置中明确指定，或使用`setOrientation`函数更改方向。注意，如果设置了此函数，它将覆盖项目设置。\n\
  \n#### 缩放\n\n开发者面临的挑战之一是确保支持所有屏幕分辨率。许多开发者仍采用的方式是将项目分辨率设置为 320×480，然后对更高分辨率使用自动缩放。缩放模式可以在项目属性窗口中设置，也可以通过代码使用`application:setScaleMode(theMode)`进行设置。图\
  \ 9-15 展示了缩放选项及其对显示的影响。\n\n![9781430246626_Fig09-15.jpg](img/9781430246626_Fig09-15.jpg)\n\
  \n图 9-15. 各种缩放选项的图示\n\n这将缩放屏幕以适应完全不同的分辨率，可选择的设置包括：\n\n*   `Application.NO_SCALE`：不应用缩放，屏幕对齐到左上角。在更大屏幕的设备上，超出项目屏幕尺寸的区域保持空白。\n\
  *   `Application.CENTER`：不应用缩放，但屏幕居中显示。\n*   `Application.PIXEL_PERFECT`：屏幕设置为设备可用的精确像素。\n\
  *   `Application.LETTERBOX`：屏幕以信箱模式显示，两侧出现黑边。\n*   `Application.CROP`：缩放后多余的区域被裁剪掉。\n\
  *   `Application.STRETCH`：屏幕拉伸以适应设备分辨率，*不*考虑宽高比。\n*   `Application.FIT_HEIGHT`：屏幕缩放至设备屏幕的高度。\n\
  *   `Application.FIT_WIDTH`：屏幕缩放至设备屏幕的宽度。\n\n### 添加音效\n\n如果你正在创建游戏，添加音效很重要——例如，用铿锵的节拍营造悬念，或用舒缓的旋律伴随平静的时刻。本节将介绍如何为游戏添加音效。\n\
  \nGideros Studio 的声音库浓缩为几个函数；这些函数足以实现我们刚才讨论的内容。\n\n使用 Gideros Studio 播放声音时，首先要注意有两个不同的对象：`Sound`对象和`SoundChannel`对象。`Sound`对象提供需要播放的数据，而`SoundChannel`对象实际播放声音。\n\
  \n```lua\nlocal mySound = Sound.new(\"sound.wav\")\nlocal theChannel = mySound:play()\n\
  ```\n\n如果你想播放长音轨并可能循环播放文件，还可以指定声音开始播放的位置以及是否循环播放。\n\n```lua\nlocal channel = mySound:play(startTime,\
  \ loops)\n```\n\n`startTime`默认为 0，`loops`定义声音循环播放的次数。`loops`值为 0（默认值）表示声音不循环，只播放一次；值为\
  \ 1 表示循环一次；值为 2 表示循环两次，依此类推。如果你希望声音无限循环，可以使用`math.huge`。\n\n\n\n## Gideros 声音、事件与定时器\n\
  \n你可以通过 `soundChannel` 对象进一步控制声音（暂停、停止、调节音量等）。以下是一个使用 `soundChannel` 对象按通道调节音量的示例：\n\
  \n```\nchannel:setVolume(0.5) -- 将通道音量设置为一半\n```\n\n### 事件\n\n与大多数框架类似，Gideros 采用异步方式处理事件。当特定情况发生时便会触发事件——例如，用户触摸屏幕、帧更新以及系统事件（如应用启动、挂起、恢复或退出）。表\
  \ 9-1 列出了 Gideros Studio 处理的事件。\n\n**表 9-1.** Gideros Studio 处理的事件\n\n| 事件类型 | 处理的事件\
  \ |\n| --- | --- |\n| 触摸 | `TOUCHES_BEGIN` `TOUCHES_MOVE` `TOUCHES_END` `TOUCHES_CANCEL`\
  \ |\n| 帧与舞台 | `ENTER_FRAME` `ADDED_TO_STAGE` `REMOVED_FROM_STAGE` |\n| 系统与应用 | `APPLICATION_START`\
  \ `APPLICATION_RESUME` `APPLICATION_SUSPEND` `APPLICATION_EXIT` |\n| 声音与定时器 | `COMPLETE`\
  \ `TIMER` `TIMER_COMPLETE` |\n| 鼠标 | `MOUSE_DOWN` `MOUSE_UP` `MOUSE_MOVE` |\n| URL\
  \ 加载器 | `COMPLETE` `ERROR` `PROGRESS` |\n| 物理 | `BEGIN_CONTACT` `END_CONTACT` `PRE_SOLVE`\
  \ `POST_SOLVE` |\n\n#### 触摸事件\n\n应用程序需要设置事件监听器才能监听特定事件。事件监听器可以附加到任何显示对象上。\n\n```\n\
  local image = newImage(\"myImage.png\")\nfunction handler(object, event)\n  print(\"\
  收到一个事件\")\nend\n\nimage:addEventListener(Event.TOUCHES_BEGIN, handler, image)\n\
  ```\n\n事件监听器接收事件、处理函数以及一个额外参数，该参数用于向事件处理函数传递数据。事件处理函数会收到两个参数：我们传递给处理函数的额外数据，以及包含事件相关数据的事件对象。\n\
  \n**注意：** 鼠标事件和触摸事件传递给函数的参数是不同的。触摸事件包含一个名为 `touches` 的记录，而鼠标事件中没有。这主要是因为用户可以用多个手指触摸屏幕——因此，每个\
  \ `touches` 记录都包含 `x,y` 坐标和 ID，而鼠标事件则没有。\n\n触摸事件包含两个记录：`touches` 和 `allTouches`。`touches`\
  \ 是当前触摸点，包含 `x,y` 坐标和 ID，而 `allTouches` 是一个数组，包含所有 `touches` 记录。要获取触发触摸事件的对象，可以使用\
  \ `event:getTarget()` 函数。\n\n#### 进入帧事件\n\n你可以设置进入帧事件来实现逐帧动画，例如：\n\n```\nlocal _W\
  \ = application:getLogicalWidth()\nlocal _H = application:getLogicalHeight()\n\n\
  local xD, yD, speed = 1, 1, 10\nlocal img = newImage(\"myImage2.png\",0,0)\nlocal\
  \ wd, ht = img:getWidth(), img:getHeight()\n\nfunction onEnterFrame(event)\nlocal\
  \ xP, yP = img:getPosition()\nxP = xP + xD*speed\nyP = yP + yD*speed\nif xP >= _W-wd\
  \ or xP == 0 then xD = -xD end\nif yP >= _H-ht or yP == 0 then yD = -yD end\nimg:setPosition(xP,\
  \ yP)\nend\n\nimg:addEventListener(Event.ENTER_FRAME, onEnterFrame)\n```\n\n进入帧事件包含一个\
  \ `frameCount` 属性，它返回自应用启动以来经过的帧数。`time` 返回自应用启动以来经过的秒数，`deltaTime` 包含上一帧与当前帧之间的时间差。这可用于动画制作，并有助于协调对时间敏感的动画。\n\
  \n#### 系统事件\n\n`stage` 对象在应用生命周期的全程都存在。我们可以像在其他显示对象上一样，在 `stage` 对象上设置监听器。管理系统事件的推荐方式是将其设置在\
  \ `stage` 对象上。然而，系统事件类似于广播，它们会被发送给每个设置了监听器的对象，而非仅限于某一个。\n\n```\nstage:addEventListener(Event.APPLICATION_START,\n\
  \    function(event)\n      print(\"已启动\")\n    end)\n```\n\n你还可以监控应用被挂起或恢复的时间，以便保存应用状态，并在应用恢复时重新加载。\n\
  \n### 定时器\n\n你可以通过使用 `Timer.new` 函数在 Gideros Studio 中设置定时器，然后添加一个事件监听器来监听定时器触发。你还可以监听定时器完成事件，该事件在所有定时器循环触发后发生。`loops`\
  \ 的默认值为 0，这与指示定时器无限循环相同。\n\n```\nlocal theTimer = Timer.new(1000, 5)\ntheTimer:addEventListener(Event.TIMER,\n\
  \    function(event)\n        print(\"定时器触发\")\n    end)\ntheTimer:addEventListener(Event.TIMER_COMPLETE,\n\
  \    function(event)\n        print(\"所有定时器循环已完成\")\n    end)\n```\n\n这段代码创建了一个新的定时器，它以设定的频率触发并运行指定的次数。在本例中，频率为\
  \ 1000 毫秒，循环运行五次。然后必须使用 `start` 函数启动定时器。\n\n```\ntheTimer:start()\n```\n\n现在你可以在输出窗口中看到结果，显示定时器每\
  \ 1 秒（1000 毫秒）触发一次，并在触发五次后完成。\n\n定时器有一个 `currentCount` 属性（只读属性），用于保存定时器已触发的次数。`repeatCount`\
  \ 保存定时器应重复的次数，当 `currentCount` 值达到 `repeatCount` 值时，定时器停止。我们可以使用 `reset` 函数将 `currentCount`\
  \ 设置为 0。你可以使用 `setRepeatCount` 函数设置 `repeatCount`，并使用 `setDelay` 函数更改延迟时间。\n\n定时器可以通过\
  \ `start`、`pause` 和 `stop` 函数进行精细控制。此外，所有活动的定时器可以分别使用 `pauseAll`、`resumeAll` 和 `stopAll`\
  \ 函数暂停、恢复或停止。还可以使用 `isRunning` 函数查询定时器，该函数返回定时器是否正在运行。\n\n如果你需要在延迟后触发一个函数，可以使用 `Timer.delayedCall`\
  \ 函数。该函数接受三个参数：延迟时间（之后函数被调用）、一个函数以及一个可以传递给该函数的自定义参数。\n\n```\nTimer.delayedCall(1000,\n\
  \    function(msg)\n        print(\"你好 \"..msg)\n    end,\n    \"Gideros\")\n```\n\
  \n#### 自定义事件\n\n你还可以创建自己的事件，这些事件可以被分发，并可以为这些自定义事件设置监听器，如下所示：\n\n```\nlocal theTimer\
  \ = Timer.new(1000, 5)\ntheTimer:addEventListener(Event.TIMER,\n  function(event)\n\
  \    theTimer:setRepeatCount(10)\n    if theTimer:getCurrentCount() == 4 then\n\
  \      evt = Event.new(\"hi\")\n      stage:dispatchEvent(evt)\n    end\n  end)\n\
  \ntheTimer:addEventListener(Event.TIMER_COMPLETE,\n  function(event)\n    print(\"\
  所有定时器循环已完成\")\n  end)\n\ntheTimer:start()\n\nstage:addEventListener(\"hi\",\n  function()\n\
  \    print(\"你好\")\n  end)\n```\n\n管理自定义事件的方式是使用 `addEventListener` 为特定类型的事件设置事件监听器。使用\
  \ `Event` 类通过 `Event.new(eventName)` 创建事件后，当我们想要触发该事件时，可以使用 `dispatchEvent` 函数。\n\
  \n#### 移除事件\n\n事件可以使用 `removeEventListener` 移除，其方式类似于使用 `addEventListener` 添加事件。要添加事件处理函数，可以使用以下方法：\n\
  \n```\nobject:addEventListener(EventName, evtHandler)\n```\n\n同样，以下是移除事件处理函数的方法：\n\
  \n```\nobject:removeEventListener(EventName, evtHandler)\n```\n\n还可以向事件添加额外的数据并将其传递给处理函数。以下是一个示例：\n\
  \n```\nlocal myEvent = Event.new(\"myEvent\")\n myEvent.data1 = \"数据一\"\n myEvent.data2\
  \ = \"数据二\"\n\nfunction theFunc(param)\n  print(\"已调用，参数为 \\n\\t\" .. param.data1\
  \ .. \", \" .. param.data2)\n  stage:removeEventListener(\"myEvent\", theFunc)\n\
  end\n\nfunction raiseEvent(msg)\n    print(msg)\n    myEvent.data1 = msg\n    stage:dispatchEvent(myEvent)\n\
  end\n\nstage:addEventListener(\"myEvent\", theFunc)\n```\n\n\n\n-- 调用事件\n`print(\"\
  ------------\\nInvoking the event\")`\n`Timer.delayedCall(1000, raiseEvent, \"first\
  \ time\")`\n`Timer.delayedCall(5000, raiseEvent, \"second time\")`\n`Timer.delayedCall(10000,\
  \ raiseEvent, \"third time\")`\n\n程序运行时，定时器最初在 1000 毫秒触发，并调用 `raiseEvent` 处理函数。程序随后打印消息\
  \ \"first time\"，并进而分派自定义事件。当自定义事件被触发时，程序会打印传递给处理函数的参数中的 `data1` 和 `data2` 成员，最后该事件处理函数被移除。\n\
  \n5000 毫秒后，`raiseEvent` 函数再次被调用，打印消息 \"second time\"，并分派自定义事件。然而，由于我们上次移除了事件监听器，`theFunc`\
  \ 函数并未被调用。\n\n10000 毫秒后，打印消息 \"third time\"，但由于事件监听器已不再生效，不会有任何操作发生。\n\n现在，你已经了解了如何设置事件监听器、分派自定义事件以及移除事件监听器。\n\
  \n### 查询事件\n\n如果你已经设置了事件监听器，或者想知道某个特定事件监听器是否已在对象上设置，那么你可以使用 `hasEventListener` 函数。\n\
  \n```\nprint(stage:hasEventListener(\"noEvent\"))\n```\n\n**提示** 自定义或标准事件可以使用 `dispatchEvent`\
  \ 函数进行分派。这可用于模拟触摸事件，例如在教程中。因此，数据可以被读取并保存在数组或表中，然后传递给模拟用户与应用交互的过程。\n\n### 动画\n\n\
  Gideros Studio 提供了 `MovieClip` 类用于创建动画。它允许创建帧，动画将基于这些帧进行播放。以下是一个代码示例：\n\n```\nLocal\
  \ image = newImage(\"myImage2.png\")\n```\n\n```\nlocal mc = MovieClip.new{\n  \
  \  {1, 100, sprite, {x = {0, 200, \"linear\"}}}}\n```\n\n这将创建一个 100 帧的动画，使精灵在 x\
  \ 轴上从 0 到 200 线性变化。要播放动画，我们可以使用 `play` 函数。一旦我们创建了影片剪辑，动画会自动开始播放。\n\n```\nmc:play()\n\
  ```\n\n我们还可以设置在动画到达特定帧后要跳转到的帧。通常动画会按顺序播放下一帧，但我们可以将其设置为另一个帧号。例如，这可用于创建并无限循环播放动画，如下例所示：\n\
  \n```\nmc:setGotoAction(100, 1)\n```\n\n该命令指示影片剪辑在到达第 100 帧时，将循环回第 1 帧。\n\n与 `gotoAction`\
  \ 类似，你可以设置 `stopAction`，当动画到达特定帧时停止播放；这可用于将动画分割成多个部分。你可以使用 `clearAction` 函数停止 `gotoAction`\
  \ 和 `stopAction` 的活动。同样，还有 `gotoAndPlay` 和 `gotoAndStop` 函数，它们分别从 `gotoAndPlay`\
  \ 指定的帧开始播放，或在 `gotoAndStop` 指定的帧停止。\n\n### 网络与互联网\n\n在你的游戏中，你可能想打开一个指向你网站的链接，或者上传或下载一些数据。在其他情况下，你可能想发送电子邮件或拨打电话号码。本节将描述如何执行这些操作。\n\
  \n导航到网站最简单的方法是使用函数 `application:openUrl(THE_URL)`，其中 URL 可以是以下任意一种：`http:`、`https:`、`tel:`\
  \ 和 `mailto:`。\n\n要打开一个网页，你可以使用以下代码：\n\n```\napplication:openUrl(\"http://www.oz-apps.com\
  \ \")\n```\n\n要发送一封电子邮件，你可以使用以下代码：\n\n```\napplication:openUrl(\"mailto:dev.ozapps@gmail.com\"\
  )\n```\n\n你还可以添加主题和消息，如下所示：\n\n```\napplication:openUrl(\"mailto:dev.ozapps@gmail.com?subject=Hello\
  \ Gideros&body=This is a test \")\n```\n\n如果你在 iPhone 上运行应用，你还可以使用以下代码拨打电话：\n\n\
  ```\napplication:openUrl(\"tel:555-7827-9277\")\n```\n\n在游戏中，你可能想要下载一个文件、一些 JSON\
  \ 数据或一个包含关卡数据的文本文件。这无法通过 `openUrl` 函数实现。不过，我们可以使用 `UrlLoader` 类。以下是一个示例：\n\n```\n\
  local loader = UrlLoader.new(\"http://example.com/image.png \")\n\nlocal function\
  \ onComplete(event)\n    local out = io.open(\"|D|image.png\", \"wb\")\n    out:write(event.data)\n\
  \    out:close()\n\nlocal b = Bitmap.new(Texture.new(\"|D|image.png\"))\n    stage:addChild(b)\n\
  end\n\nlocal function onError()\n    print(\"error\")\nend\n\nlocal function onProgress(event)\n\
  \    print(\"progress: \" .. event.bytesLoaded .. \" of \" .. event.bytesTotal)\n\
  end\n\nloader:addEventListener(Event.COMPLETE, onComplete)\nloader:addEventListener(Event.ERROR,\
  \ onError)\nloader:addEventListener(Event.PROGRESS, onProgress)\n```\n\n在这段代码中，我们首先创建了一个\
  \ `UrlLoader` 的新实例，这将启动下载。`UrlLoader` 的默认方法是 `UrlLoader.GET`。其他选项有 `POST`、`PUT`\
  \ 和 `DELETE`。当使用 `POST` 或 `PUT` 时，可以将头部信息和数据传递给 URL。\n\n```\nlocal url = \" http://www.[yourDomain].com/application.php?userid=gideros&login=guest\"\
  \n\nlocal loader1 = UrlLoader.new(url)\nlocal loader2 = UrlLoader.new(url, UrlLoader.GET)\
  \ -- 与上一行相同\nlocal loader3 = UrlLoader.new(url, UrlLoader.POST, \"my post data\"\
  )\nlocal loader4 = UrlLoader.new(url, UrlLoader.PUT, \"my put data\")\nlocal loader5\
  \ = UrlLoader.new(url, UrlLoader.DELETE)\n\nlocal headers = {\n    [\"Content-Type\"\
  ] = \"application/x-www-form-urlencoded\",\n    [\"User-Agent\"] = \"Gideros Browser\"\
  ,\n}\nlocal loader6 = UrlLoader.new(url, UrlLoader.PUT, headers, \"key=value\")\n\
  ```\n\n我们可以设置监听器来监听进度事件、完成事件和错误事件。每次接收到数据块时，都会触发进度事件，事件对象会传递 `bytesLoaded` 和 `bytesTotal`。这可用于跟踪并以字节或百分比形式显示进度。如果出现错误，则会触发错误事件；成功完成后，则会触发完成事件。\n\
  \n### GPS 与罗盘\n\n可以查询设备的 GPS 位置和罗盘位置详情。我们可以通过为 GPS 设置 `Event.HEADING_UPDATE` 事件监听器，以及为罗盘设置\
  \ `Event.LOCATION_UPDATE` 事件监听器来获取这些读数，如下所示：\n\n```\nrequire \"geolocation\"\n\n\
  function onHeadingUpdate()\n\nend\n\nfunction onLocationUpdate(event)\n  latitude\
  \  = event.latitude\n  longitude = event.longitude\n  altitude  = event.altitude\n\
  \  print(latitude, longitude, altitude)\nend\n\nfunction onHeadingUpdate(event)\n\
  \  local tHeading = event.trueHeading\n  local mHeading = event.magneticHeading\n\
  \  print(tHeading, mHeading)\nend\n\ngeolocation:addEventListener(Event.HEADING_UPDATE,\
  \ onHeadingUpdate)\ngeolocation:addEventListener(Event.LOCATION_UPDATE, onLocationUpdate)\n\
  geolocation:start()\n```\n\n你可以通过使用 `isAvailable` 函数来检查硬件是否支持 GPS，或者用户是否已启用 GPS\
  \ 功能。你还可以通过 `geolocation` 对象上的 `isHeadingAvailable` 函数来检查方向详情的可用性。\n\n你可以分别使用 `startUpdatingHeading`\
  \ 和 `startUpdatingLocation` 函数来开始更新方向和位置信息，并使用 `stopUpdatingHeading` 和 `stopUpdatingLocation`\
  \ 函数来停止更新。\n\n### 加速度计\n\n如果设备有加速度计，`Accelerometer` 类用于访问加速度计数据。为了能够访问加速度计，你需要调用\
  \ `require \"accelerometer\"`，当加载完毕后，会创建一个 `Accelerometer` 类型的变量。可以通过 `accelerometer`\
  \ 来访问它。然后你可以在 `accelerometer` 对象上调用 `start` 函数。如果由于任何原因（包括节省电池寿命或防止触发不必要的事件）需要随时停止加速度计，你可以调用\
  \ `stop` 函数。\n\n\n\n```lua\nrequire \"accelerometer\"\naccelerometer:start()\nfunction\
  \ onEnterFrame(event)\n    local x, y, z = accelerometer:getAcceleration()\n   \
  \ print(x, y, z)\nend\nstage:addEventListener(\"enterFrame\", onEnterFrame)\n```\n\
  \n**注意**：在桌面播放器上运行此代码将只显示一系列零，因为桌面播放器没有加速度计。要测试此代码，应在设备播放器上运行。\n\n### 陀螺仪\n\n所有新的\
  \ iOS 设备都配有陀螺仪，可以从设备读取数据。首先，我们使用`require \"gyroscope\"`命令，这会创建一个名为`gyroscope`的变量，属于`Gyroscope`类。\n\
  \n使用`getRotationRate`函数读取陀螺仪数据，该函数返回以弧度表示的旋转速率。\n\n```lua\nrequire \"gyroscope\"\
  \ngyroscope:start()\nlocal angx, angy, angz = 0,0,0\nfunction onEnterFrame(event)\n\
  \    local x, y, z = gyroscope:getRotationRate()\n\nangx = angx + x * event.deltaTime\n\
  \    angy = angy + y * event.deltaTime\n    angz = angz + z * event.deltaTime\n\n\
  print(angx * 180 / math.pi, angy * 180 / math.pi, angz * 180 / math.pi)\nend\nstage:addEventListener(\"\
  enterFrame\", onEnterFrame)\n```\n\n### 物理引擎\n\nGideros Studio 提供了一个基于 Box2D 的封装以使用物理引擎。要在\
  \ Gideros Studio 中使用物理引擎，你需要使用`require \"box2d\"`，这会创建一个名为`b2`的局部变量，类型为`Box2D`，并提供所有物理相关的函数。\n\
  \n接下来需要创建一个物理世界，用于容纳物理对象。以下代码展示了一个示例。\n\n**注意**：在 Gideros Studio 中，物理对象需要更新以让动态物理体同步更新；通常通过监听`enter_frame`事件来实现。\n\
  \n```lua\nrequire \"box2d\"\n\nlocal world = b2.World.new( 0 , 9.8) -- 设置重力\nlocal\
  \ ground = world:createBody({})\n\nlocal shape = b2.EdgeShape.new(0, 480, 320, 480)\n\
  shape:set(-20, 290, 620, 290)\nground:createFixture({shape = shape, density = 0})\n\
  \nlocal shape = b2.PolygonShape.new()\nshape:setAsBox(10,10)\nlocal fixture = {shape\
  \ = shape, density = 1, friction = 0.3}\n\nlocal x, y = 100, 10\nbodyD = {type =\
  \ b2.DYNAMIC_BODY, position={x=x, y=y}}\nbody = world:createBody(bodyD)\nbody:createFixture(fixture)\n\
  \nfunction onEnterFrame()\n  world:step(1/60, 8, 3)\nend\n\nstage:addEventListener(Event.ENTER_FRAME,\
  \ onEnterFrame)\n```\n\n运行程序时，你会注意到没有任何反应。这是因为我们需要在屏幕上放置一个对象，并让它随着物理体的移动而更新。\n\n\
  因此，我们可以添加一个图像来代表这个物理体，并在屏幕上更新它。\n\n```lua\nlocal img = Bitmap.new(Texture.new(\"\
  image2.png\"))\nimg:setAnchorPoint(0.5,0.5)\nstage:addChild(img)\n```\n\n然后，我们重新定义`onEnterFrame`函数如下：\n\
  \n```lua\nfunction onEnterFrame()\n  world:step(1/60, 8, 3)\n  img:setPosition(body:getPosition())\n\
  end\n```\n\n图像会显示在动态体的中心位置。`world:step`函数用于更新物理体，它接受三个参数：第一个是`timeStep`，决定更新时间步长；另外两个参数分别是`velocityIterations`（速度迭代次数）和`positionIterations`（位置迭代次数）。速度和位置的迭代次数决定了计算物理体下一时刻速度和位置所需的计算量。\n\
  \n### 插件\n\nGideros Studio 的一个优势是你可以创建自己的插件，通过引入当前不具备的功能来扩展其能力。\n\n**注意**：BhWax\
  \ 插件（在[第 13 章]中讨论）提供了对 iOS API 的完全访问，你可以用它创建 UIWindow、UIView、UIKit 对象，几乎可以操作 Apple\
  \ API 提供的所有功能。\n\nGideros 插件的骨架结构如下：\n\n```c\n#include \"gideros.h\"\n#include \"\
  lua.h\"\n#include \"lauxlib.h\"\n\nstatic int myFunc(lua_State *L)\n{\n  int first\
  \  = lua_tointeger(L, -1);\n  int second = lua_tointeger(L, -2);\n  int result =\
  \ first + second;\n\nlua_pushinteger(L, result);\n  return 1;\n}\n\nstatic int luaMy_func(lua_State\
  \ *L)\n{\n  const luaL_Reg functionlist[] = {\n    {\"myFunc\", myFunc},\n    {NULL,\
  \ NULL},\n  };\n  luaL_register(L, \"myPlugin\", functionlist);\n}\n\nstatic void\
  \ g_initializePlugin(lua_State *L)\n{\n  lua_getglobal(L, \"package\");\n  lua_getfield(L,\
  \ -1, \"preload\");\n\nlua_pushcfunction(L, luaMy_func);\n  lua_setfield(L, -2,\
  \ \"test\");\n\nlua_pop(L, 2);\n}\n\nstatic void g_deinitializePlugin(lua_State\
  \ *L) {\n}\n\nREGISTER_PLUGIN(\"Test\", \"1.0\")\n```\n\n这些插件可以用 C++、Objective-C\
  \ 或 C 编写。首先，我们需要包含所需库的头文件：`gideros.h`，它提供了 Gideros 引擎的入口点；`lua.h`，用于访问 Lua 函数；以及`luaxlib.h`，提供了\
  \ Lua 接口函数。\n\n我们需要编写两个函数和一个宏来注册我们的插件。\n\n`g_initializePlugIn` 是初始化插件的入口点，在插件首次加载时调用；`g_deinitializePlugin`\
  \ 在 Lua 不再需要该插件时（例如，卸载时）被调用。宏`REGISTER_PLUGIN` 用于注册插件，使其可在 Gideros Studio 中使用。\n\
  \n初始化插件时，我们使用`package.preload`函数并加载所需的函数。在上述示例代码中，我们通过调用`luaMy_func`函数来初始化插件。\n\n\
  在 Gideros Studio 中，要在 Lua 代码中使用此插件，首先需要引用（require）该库：\n\n```lua\nrequire \"test\"\
  \nlocal result = Test.myFunc(10,20)\nprint(\"The sum is : \", result)\n```\n\n要编写插件代码，请参考\
  \ Lua C API 文档（[`www.lua.org/manual/5.2/manual.html#4`](http://www.lua.org/manual/5.2/manual.html#4)）。插件类似于\
  \ Lua 字节码命令，C 代码可以与 Lua C API 混合使用。\n\n以下 Lua 代码：\n\n```lua\na = f(\"how\", t.x,\
  \ 14)\n```\n\n如果用 Lua C API 编写，则如下所示：\n\n```lua\nlua_getglobal(L, \"f\");\nlua_pushstring(L,\
  \ \"how\");\nlua_getglobal(L, \"t\");\nlua_getfield(L, -1, \"x\");\nlua_remove(L,\
  \ -2);\nlua_pushinteger(L, 14);\nlua_call(L, 3, 1);\nlua_setglobal(L, \"a\");\n\
  ```\n\n**注意**：更多详细信息可以在 Lua 网站（[`www.lua.org`](http://www.lua.org)）上找到。由于 C 相关代码超出了本书的讨论范围，此处不再详述。\n\
  \n当你想要使用该插件时，需要将其添加到 Gideros Player（测试阶段）或 Xcode 中，并在最终构建时编译。对于桌面播放器，代码需要编译为动态库（`.dylib`）并存放在相应目录中。\n\
  \n如果你打算分发插件给其他用户使用，需要将其构建为库。所需的文件包括：\n\n*   `.dll`：用于 Windows 桌面播放器\n*   `.dylib`：用于\
  \ Mac 桌面播放器\n*   `.so`：用于 Android 设备播放器\n*   `.a`：用于 iOS 设备播放器\n\n**注意**：编程语言的选择也决定了插件可运行的平台。用\
  \ C 或 C++ 编写的插件可以同时用于 iOS 和 Android 设备。用 Java 编写的插件只能用于 Android，而用 Objective-C 编写的插件只能用于\
  \ iOS。\n\n## 总结\n\nGideros Studio 是一个在 Windows 和 Mac OS X 上完整的开发包，包含一系列用于开发和测试应用程序的工具。如果框架本身不能满足你的需求，或者你想通过添加一些额外代码（例如\
  \ C、C++、Objective-C 或 Java）来扩展应用，你可以通过 Lua API 桥接将代码封装成插件来实现。Gideros Studio 是一个不断发展且拥有不断壮大社区支持的框架。该框架与\
  \ ActionScript 非常相似，因此对于 ActionScript 3 开发者来说易于上手。Corona SDK 定位为易用型框架（也确实如此），而 Gideros\
  \ Studio 则通过提供插件来填补其空白。虽然在 Gideros Studio 中像在屏幕上显示图像这样的简单任务可能略显复杂，但它允许你维护一个函数库以实现更简单的使用，正如本章示例所示。\n\
  \n\n\n## Moai 框架概述\n\n在本章中，我们将介绍另一个框架：Moai。在开发跨平台移动应用程序的众多选项中，Moai 是专业游戏开发者的工具。它是一个开源平台，提供了封装在\
  \ Lua 中的 C++ 类。这些类可用于为多种平台开发基本的 2D 和 3D 游戏：iOS、Android、Windows、Mac OS X 和 Chrome。Moai\
  \ 以免费使用的 Moai SDK 形式提供，但需要在应用中显示“Made with Moai”启动画面或在游戏致谢中提及。Moai 还提供付费服务 Moai\
  \ Cloud Services，可以集成在使用 Moai 或不使用 Moai 构建的应用中。\n\n## 什么是 Moai？\n\nMoai 的创意源于其开发者，他们都是游戏行业的资深人士。它并不适合只想快速制作应用的个人爱好者；Moai\
  \ 的学习曲线可能会有些陡峭。不过，这个小小的障碍可以通过 RapaNui 在某种程度上克服，它是一个开源层，通过一些高级 API 提供 Moai 的功能（详见第\
  \ 13 章）。一些商业应用已经使用 Moai 开发，还有更多正在开发中。几乎所有这些应用都达到了大工作室所期望的 A 级卓越水准，并且大多数拥有巨大的下载量。Moai\
  \ 的核心是 C++ 库，它们帮助你编写适用于移动设备、浏览器和桌面的跨平台应用程序。然而，Lua 接口消除了处理这些复杂库的需要。这些封装在 Lua 中的 C++\
  \ 库还允许访问许多底层函数。一旦你掌握了应用开发（尤其是游戏开发）的基础知识，Moai 便是一个符合逻辑的专业工具集选择。\n\n## 获取 Moai\n\n\
  你的第一步是在 Moai 上创建一个账户，然后下载 SDK。你可以从以下选项中选择：\n\n*   SDK 发布版本 1.3 (构建 98)\n*   SDK\
  \ 开发者构建版本 1.3 (构建 102)\n*   Moai 源代码\n\n开箱即用，Moai 没有像 Gideros Studio 那样的 IDE 或工具。然而，它确实包含了用于测试\
  \ Lua 代码的 `moai` 二进制文件。当你解压 ZIP 文件（所有平台的压缩包相同）后，`bin` 目录包含了所有平台的库，以及用于 Windows 和\
  \ Mac OS X 的可执行文件（这些可执行文件充当测试 Moai 代码的模拟器）。\n\n## Moai SDK\n\n开始使用 Moai 进行开发，你首先需要一个文本编辑器（第\
  \ 13 章讨论了一些替代方案），因为没有集成 Moai 开发环境的 IDE（不过 ZeroBrane 填补了这一空白，但 Moai 默认不包含它）。\n\n\
  `bin` 目录包含用于 Windows 和 Mac 的可执行文件；你可以在终端窗口中运行 `moai`，并将要运行的 Lua 文件传递给它。对于 Windows，传递\
  \ `moai.exe main.lua`；对于 Mac OS X，传递 `moai main.lua`。\n\n如果你通过 `run.bat` 或 `run.sh`\
  \ 运行 samples 文件夹中的 Hello Moai 代码，你应该会在屏幕上看到如图 10-1 所示的输出。\n\n![9781430246626_Fig10-01.jpg](img/9781430246626_Fig10-01.jpg)\n\
  \n图 10-1. 正在运行示例应用的 Moai 模拟器\n\n## Hello Moai\n\n要让一个 Moai 应用运行起来，我们需要做几件事。首先，我们需要一个窗口来显示我们的应用程序，这个窗口在桌面上也充当模拟器。我们使用\
  \ `MOAISim` 类创建一个窗口，并调用 `openWindow` 函数。`openWindow` 函数接受三个参数：标题、宽度和高度。\n\n```\n\
  MOAISim.openWindow(\"Hello World 窗口\", 320,480)\n```\n\n然后我们需要创建一个视口。由于 Moai 使用\
  \ OpenGL，要创建一个绘制表面，我们需要设置用于渲染的表面大小。这个矩形区域被称为*视口*。在我们开始渲染之前，需要创建并设置好视口。方法如下：\n\n\
  ```\nviewport = MOAIViewport.new()\nviewport:setSize(320,480)\nviewport:setScale(320,480)\n\
  ```\n\n我们可以将大小设置为特定尺寸，或者不向 `setSize` 函数传递任何参数来简单地使用整个表面。所有渲染都基于单位；这些单位不一定与像素相同。但是，您可以使用\
  \ `setScale` 函数来设置这些单位。这些单位通过根据视口的大小和比例设置进行计算来定义渲染像素的大小。像素的大小由以下两个公式确定：\n\n```\n\
  pixelsizeX = viewportSizeWidth / viewportScaleX\npixelsizeY = viewportSizeHeight\
  \ / viewportScaleY\n```\n\n大小为 320×480，比例为 320、480，则将像素大小设置为 1。在大小为 320×480 的表面上设置比例为\
  \ 10、15，将得到像素大小为 32×32。在大小为 640×960 的表面上使用相同的比例 10、15，则会得到像素大小为 64×64。在这种情况下，您会看到显示拉伸以填充空间。\n\
  \nMoai 中的坐标系以原点 (0,0) 位于屏幕中心进行组织。y 轴正方向朝上。值为 100 的点在屏幕上的位置高于像 20 这样的较低值。您可以通过将比例设置为负值来反转轴，从而获得负比例：\n\
  \n```\nviewport:setScale(320, -480)\n```\n\n还可以使用 `setOffset` 函数更改视口。偏移量是在一个设置为\
  \ 2×2 的投影空间中设置的。将偏移量设置为 −1, 1 会将投影系统向左移动一半，向上移动一半。这将有效地将原点置于屏幕的左上角。\n\n```\nviewport:setOffset(-1,1)\n\
  ```\n\nMoai 不会直接渲染任何精灵、图像或显示对象；相反，这些对象会被渲染到*图层*上。多个图层可以相互堆叠。每个图层都需要与一个视口关联。\n\n\
  ```\nlayer = MOAILayer2D.new()\nlayer:setViewport(viewport)\n```\n\n然后，在渲染之前，需要将该图层推入渲染栈。\n\
  \n```\nMOAISim.pushRenderPass(layer)\n```\n\n一旦我们设置了用于渲染的图层，我们就需要一个显示对象来显示在这个图层上。在\
  \ Moai 中，场景图对象被称为*道具*；它是表面上的位置和对象表示的组合。几何体或对象的表示（例如，三角形、四边形或样条曲线）保存在称为*组*的东西中。一个组可以包含多个几何体项目，也可以被称为*集合*。\n\
  \n有几种类型的组可供选择：\n\n*   `MOAIGfxQuad2D`：这是一个单纹理四边形。\n*   `MOAIGfxQuadDeck2D`：这是一个纹理四边形数组（来自同一纹理）。这类似于我们所说的精灵表。\n\
  *   `MOAIGfxQuadListDeck2D`：这是一个纹理四边形列表的数组（来自同一纹理）。可用于高级精灵表。\n*   `MOAIMesh`：这是一个自定义顶点缓冲区对象（用于\
  \ 3D）。\n*   `MOAIStretchPatch2D`：这是一个包含可伸缩行和列的单个补丁。\n*   `MOAITileDeck2D`：用于创建通过索引访问的瓦片地图和精灵表。纹理被分为\
  \ *n×m* 个瓦片，所有瓦片大小相同。可用于帧动画。\n\n我们可以使用 `MOAIGfxQuad2D` 类创建一个单纹理四边形，并加载一个图像作为四边形的纹理：\n\
  \n```\ngfxQuad = MOAIGfxQuad2D.new()\ngfxQuad:setTexture(\"myTile.png\")\ngfxQuad:setRect(-32,-32,\
  \ 32, 32)\n```\n\n创建四边形后，我们需要创建一个道具来显示该四边形。我们使用 `setRect` 函数设置矩形区域，这类似于设置四边形的尺寸：\n\
  \n```\nprop = MOAIProp2D.new()\nprop:setDeck(gfxQuad)\nprop:setLoc(32,32)\n```\n\
  \n最后，我们需要将这个道具添加到图层中，以便渲染：\n\n```\nlayer:insertProp(prop)\n```\n\n完整的代码块如下所示。当我们运行它时，会在屏幕上看到图像。\n\
  \n```\nMOAISim.openWindow ( \"test\", 320, 480 )\n\nviewport = MOAIViewport.new\
  \ ()\nviewport:setSize ( 320, 480 )\nviewport:setScale ( 320, 480 )\n```\n\n\n\n\
  ```lua\nlayer = MOAILayer2D.new ()\nlayer:setViewport ( viewport )\nMOAISim.pushRenderPass\
  \ ( layer )\n\ngfxQuad = MOAIGfxQuad2D.new ()\ngfxQuad:setTexture ( \"moai.png\"\
  \ )\ngfxQuad:setRect ( -64, -64, 64, 64 )\n\nprop = MOAIProp2D.new ()\nprop:setDeck\
  \ ( gfxQuad )\nprop:setLoc ( 0, 80 )\nlayer:insertProp ( prop )\n```\n\n与`Corona\
  \ SDK`和`Gideros Studio`相比，在屏幕上显示一张图片似乎略显繁琐。这正是`Moai`被称为*专业*开发者工具的原因。它提供了对非常丰富的 API\
  \ 的低级访问权限。然而，这并不意味着业余开发者不能使用`Moai`。如前所述，你可以使用`RapaNui`库，它为开发者提供了一个易于使用的高级封装，封装在`Moai`的低级\
  \ API 之上。`RapaNui`将所有`Moai`函数包装成更易用的函数，并减少了你完成工作所需编写的代码行数。\n\n`Quads`也可以被*固定*，或者如`Moai`所描述的，可以设置其枢轴点；枢轴点是四边形旋转的中心点，(默认情况下)\
  \ 0, 0 是中心。这类似于`Gideros`中的`anchorPoint`或`Corona`中的`referencePoint`：\n\n```\nprop:setPiv(xCenter,\
  \ yCenter)\n```\n\n## 显示文本\n\n在`Moai`中，可以使用 TrueType 字体或位图字体显示文本。`MOAITextBox`是用于在`Moai`中处理文本的类。\n\
  \n### TrueType 字体\n\n显示文本最简单的方法是使用 TrueType 字体。你可以使用`MOAIFont`类创建一个新的字体对象，并向其传递要从字体加载的字符、字号（以点为单位）以及字体的\
  \ dpi。\n\n```\ncharcodes = \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789,.?!:()&/-\"\
  \nfont = MOAIFont.new()\nfont:loadFromTTF( 'arial.ttf', charcodes, 12, 163 )\n```\n\
  \n然后你可以使用`MOAITextBox`创建一个文本框来显示文本：\n\n```\ntextbox = MOAITextBox.new()\ntextbox:setFont(font)\n\
  textbox:setRect(-160, -80, 160, 80)\ntextbox:setLoc(0,160)\ntextbox:setAlignment(MOAITextBox.CENTER_JUSTIFY)\n\
  layer:insertProp( textbox )\n\ntextbox:setString( \"来自 MOAI 的 Hello World\" )\n\
  ```\n\n**注意：** 传递给`MOAIFont`函数的字符会被创建为纹理并缓存，如果使用了新的字形，它们会被动态创建并缓存，从而在渲染文本时提供更快的速度。\n\
  \n### 位图字体\n\n另一种显示文本的方法是使用位图字体（来自图像文件），其中每个字形（字符）由纯色参考线分隔，如图 10-2 所示。这种方式使得创建位图字体变得容易；但是，这种格式不支持字距调整。\n\
  \n![9781430246626_Fig10-02.jpg](img/9781430246626_Fig10-02.jpg)\n\n图 10-2 . 带有轮廓以指示字形尺寸的位图字体\n\
  \n要使用位图，你可以使用`MOAIBitmapFontReader`，并通过新创建的`bitmapFontReader`对象的`loadPage`函数加载字形。\n\
  \n```\ncharcodes = \"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz1234567890\
  \ .,:;!?()&/-\"\nfont = MOAIFont.new()\n\nbitmapFR = MOAIBitmapFontReader.new()\n\
  bitmapFR:loadPage( \"Font.png\", charcodes, 16 )\n\nfont:setReader( bitmapFR )\n\
  ```\n\n如果你使用像`Glyph Designer`（来自 71²；请参阅[www.71squared.com/](http://www.71squared.com/)）这样的应用来创建一个包含与位图图像文件相关数据的`.fnt`文件，你可以使用`MOAIFont`类中的`loadFromBMFont`函数，如下所示：\n\
  \n```\ncharcodes = \"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz1234567890\
  \ .,:;!?()&/-\"\nfont = MOAIFont.new()\n\nfont:loadFromBMFont( \"Font2.png\" )\n\
  font:preloadGlyphs(charcodes, 64)\n```\n\n### 文本属性\n\n`MOAITextBox`可以显示文本，可以使用`setString`函数进行修改。请注意，文本可以包含改变文本颜色的嵌入代码，类似于\
  \ HTML 标签：\n\n```\ntextbox:setString(\"这段文字是<c:ff0000>红色<c>，而这一段是<c:00ff00>绿色<c>。\"\
  )\n```\n\n改变颜色的标签以`<c:*xxxxxx*>`开头，以`<c>`结尾。*xxxxxx* 是颜色的十六进制值（采用`RRGGBBAA`格式）。你也可以对较低精度的颜色代码使用`<c:*xxx*>`和`<c:*xxxx*>`。\n\
  \n### 文本样式\n\n你可以改变文本的字体、字号和颜色。我们刚刚讨论了如何使用`<c>`标签改变颜色，以及在创建`MOAIFont`对象时传入字号。如果你想创建在其他框架中需要不同字号字体的文本，你需要创建多个不同大小的`textbox`对象，然后相应地定位它们。然而，使用`Moai`，你可以创建可用于此目的的样式，也可以用于改变字体和颜色。这些样式可以像颜色`<c>`标签一样嵌入到文本中：\n\
  \n```\nfunction newStyle(font, size)\n  local style = MOAITextStyle.new()\n  style:setFont(font)\n\
  \  style:setSize(size)\n  return style\nend\ntextbox:setStyle(newStyle(font, 24))\n\
  textbox:setStyle( \"foo\", newStyle(font, 32))\ntextbox:setStyle(\"bar\", newStyle(font,\
  \ 48))\ntext = \"这段文字是<foo>大号</>而这个是<bar>更大号</>，都比普通文字大。\"\ntextbox:setString(text)\n\
  ```\n\n**注意：** 标签可以嵌套但绝不能重叠——也就是说，在关闭父标签之前，必须先关闭子标签。\n\n### 对齐文本\n\n创建`MOAITextBox`后，你可以更改其属性。可以使用`setAlignment`函数改变文本对齐方式。传递给`setAlignment`的参数可以是以下之一：\n\
  \n*   `MOAITextBox.LEFT_JUSTIFY`\n*   `MOAITextBox.RIGHT_JUSTIFY`\n*   `MOAITextBox.CENTER_JUSTIFY`\n\
  \n### 文本动画\n\n`MOAITextBox`有一个`spool`函数，允许逐字逐句地显示文本。这在显示文本时提供了一些有趣的效果。\n\n```\n\
  textbox:spool()\n```\n\n## 绘制矢量图元\n\n`Moai`使用`MOAIDeck`类来创建一个画布，在其上可以进行绘制操作。所有绘制都在画布的局部空间中进行。\n\
  \n在绘制之前，你必须创建一个`MOAIScriptDeck`类型的对象，如下所示：\n\n```\nscriptDeck = MOAIScriptDeck.new()\n\
  ```\n\n需要注意的是，`Moai`的绘制坐标与大多数框架不同。大多数其他框架将左上角作为 (0,0)，而`Moai`将中心点作为 (0,0)。这样，一个\
  \ 320×480 的屏幕在 x 轴上的两个方向各延伸 160 像素，在 y 轴上各延伸 240 像素。\n\n`scriptDeck`对象依赖于一个回调函数来管理`scriptDeck`的绘制，该回调函数可以使用`setDrawCallback`函数设置。回调函数具有参数`index`、`xOffset`、`yOffset`、`xScale`和`yScale`。`index`确定需要重绘的画布，偏移量和缩放有助于绘制。\n\
  \n`MOAI`绘制类允许绘制以下所有内容：\n\n*   线\n*   矩形\n*   填充矩形\n*   圆形\n*   填充圆形\n*   椭圆\n* \
  \  填充椭圆\n*   多边形\n*   点\n*   绘制属性\n\n### 绘制线条\n\n可以使用`drawRay`函数绘制单条线，其语法为`MOAIDraw.drawRay(x,\
  \ y, dx, dy)`。`x`和`y`是绝对坐标，`dx`和`dy`是从`x`和`y`坐标延伸出的线条方向。\n\n### 绘制矩形\n\n绘制矩形最简单的方法是使用语法`MOAIDraw.drawRect(x1,\
  \ y1, x2, y2)`。它接受四个参数：矩形起始点的 x 和 y 坐标，以及包围矩形的端点。下面的代码在屏幕上绘制一个矩形，如图 10-3 所示。\n\n\
  ![9781430246626_Fig10-03.jpg](img/9781430246626_Fig10-03.jpg)\n\n图 10-3 . 绘制带有描边（边框）的矩形\n\
  \n```\nMOAISim.openWindow ( \"test\", 320, 480 )\n\nviewport = MOAIViewport.new\
  \ ()\nviewport:setSize ( 320, 480 )\nviewport:setScale ( 320, -480 )\n\nlayer =\
  \ MOAILayer2D.new ()\nlayer:setViewport ( viewport )\nMOAISim.pushRenderPass ( layer\
  \ )\n\nfunction onDraw ( index, xOff, yOff, xFlip, yFlip )\n  MOAIDraw.drawRect(-150,-150,0,-50)\n\
  end\n```\n\n\n```lua\nscriptDeck = MOAIScriptDeck.new ()\nscriptDeck:setRect (-64,\
  \ -64, 64, 64 )\nscriptDeck:setDrawCallback ( onDraw )\n\nprop = MOAIProp2D.new\
  \ ()\nprop:setDeck ( scriptDeck )\nlayer:insertProp ( prop )\n```\n\n## 绘制填充矩形\n\
  \n你可以使用 `MOAIDraw.fillRect(x1, y1, x2, y2)` 函数来绘制填充矩形。该函数接受四个参数，与 `drawRect` 函数类似。填充颜色通过\
  \ `MOAIGfxDevice.setPenColor` 函数设置。下面的代码在屏幕上绘制了一个填充矩形，如下图 图 10-4 所示。\n\n![9781430246626_Fig10-04.jpg](img/9781430246626_Fig10-04.jpg)\n\
  \n图 10-4 .  绘制一个带有填充色且无描边的矩形\n\n```lua\nMOAISim.openWindow ( \"test\", 320, 480\
  \ )\n\nviewport = MOAIViewport.new ()\nviewport:setSize ( 320, 480 )\nviewport:setScale\
  \ ( 320, -480 )\n\nlayer = MOAILayer2D.new ()\nlayer:setViewport ( viewport )\n\
  MOAISim.pushRenderPass ( layer )\n\nfunction onDraw ( index, xOff, yOff, xFlip,\
  \ yFlip )\n  MOAIGfxDevice.setPenColor(1, 0.64, 0, 1)\n  MOAIDraw.drawRect(-150,-150,0,-50)\n\
  end\n\nscriptDeck = MOAIScriptDeck.new ()\nscriptDeck:setRect ( -64, -64, 64, 64\
  \ )\nscriptDeck:setDrawCallback ( onDraw )\n\nprop = MOAIProp2D.new ()\nprop:setDeck\
  \ ( scriptDeck )\nlayer:insertProp ( prop )\n```\n\n## 绘制圆形\n\n你可以使用 `drawCircle`\
  \ 函数来绘制圆形。其语法为 `MOAIDraw.drawCircle(xPos, yPos, radius, steps)`，其中 `xPos` 和 `yPos`\
  \ 是圆心坐标，`radius` 决定要绘制的圆的半径，`steps` 决定绘制圆所用的*精细度*（即线段数量）。`steps` 的推荐值为 100。\n\n\
  ```lua\nfunction onDraw ( index, xOff, yOff, xFlip, yFlip )\n  MOAIDraw.drawCircle(0,\
  \ 0, 100, 100)\nend\n```\n\n## 绘制填充圆形\n\n你可以使用 `fillCircle` 函数来绘制填充圆形。其语法为 `MOAIDraw.fillCircle(xPos,\
  \ yPos, radius, steps)`，这与未填充的圆形相同。笔触颜色决定了圆的填充色。\n\n```lua\nfunction onDraw ( index,\
  \ xOff, yOff, xFlip, yFlip )\n  MOAIGfxDevice.setPenColor(1, 0.64, 0, 1)\n  MOAIDraw.fillCircle(0,\
  \ 0, 100, 100)\nend\n```\n\n## 绘制椭圆\n\n要绘制椭圆，你可以使用 `drawEllipse` 函数。其语法为 `MOAIDraw.drawEllipse(xPos,\
  \ yPos, xRadius, yRadius, steps)`，其中 `xPos` 和 `yPos` 是中心坐标，`xRadius` 和 `yRadius`\
  \ 决定了椭圆的纵向和横向半径，`steps` 决定了精细度。`steps` 的推荐值为 100。\n\n```lua\nfunction onDraw ( index,\
  \ xOff, yOff, xFlip, yFlip )\n  MOAIDraw.drawEllipse(0, 0, 100, 100)\nend\n```\n\
  \n## 绘制填充椭圆\n\n类似地，你可以使用 `fillEllipse` 函数来绘制填充椭圆。其语法与常规椭圆相同，笔触颜色决定了填充色。\n\n```lua\n\
  function onDraw ( index, xOff, yOff, xFlip, yFlip )\n  MOAIDraw.drawEllipse(0, 0,\
  \ 100, 100)\nend\n```\n\n## 绘制多边形\n\n要绘制多边形，你需要定义一系列顶点并将其传递给 `drawLines` 函数。这些顶点是屏幕上的绝对坐标点，而非相对于上一个坐标的偏移。\n\
  \n```lua\nfunction onDraw ( index, xOff, yOff, xFlip, yFlip )\n  MOAIDraw.drawLines(-50,50,50,50,50,-50,-50,-50,-50,50)\n\
  end\n```\n\n## 绘制点\n\n`drawPoints` 函数可用于在给定的顶点列表处绘制点。以下代码给出了使用 `MOAIDraw.drawPoints`\
  \ 函数的示例，其结果如图 图 10-5 所示。\n\n![9781430246626_Fig10-05.jpg](img/9781430246626_Fig10-05.jpg)\n\
  \n图 10-5 .  象限中设置的点，展示了 Moai 中的坐标系\n\n```lua\nfunction onDraw ( index, xOff, yOff,\
  \ xFlip, yFlip )\n  MOAIDraw.drawRay ( 0, 0, 1, 0)\n  MOAIDraw.drawRay ( 0, 0, 0,\
  \ 1)\n  MOAIGfxDevice.setPointSize(5)\n  MOAIGfxDevice.setPenColor(1,0,0,1)\n  MOAIDraw.drawPoints(-50,50,50,50,50,-50,-50,-50,-50,50)\n\
  end\n```\n\n## 绘制属性\n\n`MOAIDraw` 绘制矢量图元的画布称为 `MOAIGfxDevice`。你可以查询并设置某些绘制属性，例如颜色、线宽和点大小。本节将逐一介绍这些属性。\n\
  \n### 颜色\n\n`MOAIGfxDevice.setPenColor` 函数用于设置绘制和填充的颜色。设置颜色的语法为 `setPenColor(r,\
  \ g, b, a)`。`r`、`g`、`b` 和 `a` 的值在 0 到 1 的范围内。例如，以下代码将颜色设置为绿色：\n\n```lua\nMOAIGfxDevice.setPenColor(0,1,0,1)\n\
  ```\n\n### 线宽\n\n`MOAIGfxDevice.setPenWidth` 函数用于设置在该函数调用之后绘制的所有线条的宽度。该函数接受一个宽度值，该值决定了线条的粗细，通常以正整数单位表示。\n\
  \n```lua\nfunction onDraw ( index, xOff, yOff, xFlip, yFlip )\n  MOAIGfxDevice.setPenWidth(3)\n\
  \  MOAIGfxDevice.setPenColor(1,0,0,1)\n  MOAIDraw.drawRect(-50,-50,50,50)\nend\n\
  ```\n\n### 点大小\n\n`MOAIGfxDevice.setPointSize` 函数用于设置使用 `drawPoints` 函数绘制的点的大小，通常以正整数单位表示。\n\
  \n```lua\nfunction onDraw ( index, xOff, yOff, xFlip, yFlip )\n  MOAIDraw.drawRay\
  \ ( 0, 0, 1, 0)\n  MOAIDraw.drawRay ( 0, 0, 0, 1)\n  MOAIGfxDevice.setPointSize(5)\n\
  \  MOAIGfxDevice.setPenColor(1,0,0,1)\n  MOAIDraw.drawPoints(-50,50,50,50,50,-50,-50,-50,-50,50)\n\
  end\n```\n\n## 绘制图像\n\n你已经了解到，在屏幕上创建显示对象的方法是通过创建一个需要添加到图层的 `MOAIProp`。类似地，要显示图像，你需要通过创建一个四边形对象（并为其设置纹理为要加载的图像）来创建\
  \ `MOAIProp` 对象。然后，这可以设置为合牌对象。\n\n```lua\ngfxQuad = MOAIGfxQuad2D.new ()\ngfxQuad:setTexture\
  \ ( \"moai.png\" )\ngfxQuad:setRect ( -64, -64, 64, 64 )\n\nprop = MOAIProp2D.new\
  \ ()\nprop:setDeck ( gfxQuad )\nprop:setLoc ( 0, 80 )\nlayer:insertProp ( prop )\n\
  ```\n\n## 绘制自定义图像\n\n你可以使用 `MOAIImage` 类创建一个空白图像作为画布，如下所示：\n\n```lua\nlocal image\
  \ = MOAIImage.new()\nimage:init(width, height)\n```\n\n**注意：** 你创建的图像必须是 2 的幂次方大小——也就是说，宽度和高度必须是\
  \ 2 的幂次方数。在动态创建图像时，如果你创建的图像不符合 2 的幂次方要求，可以使用 `padToPow2` 函数将图像填充到所需的大小。\n\n创建的这个图像对象随后可用于创建\
  \ `Quad2D` 对象，并将其添加到图层中。\n\n```lua\ngfxQuad = MOAIGfxQuad2D.new ()\ngfxQuad:setTexture\
  \ ( image )\ngfxQuad:setRect ( -64, -64, 64, 64 )\n\nprop = MOAIProp2D.new ()\n\
  prop:setDeck ( gfxQuad )\nlayer:insertProp ( prop )\n```\n\n这段代码不会显示任何内容，因为创建的图像是空白图像。在下面的代码中，我们在内存中创建了一个位图并将其显示到屏幕上。这是通过代码创建动态图像的好方法。\n\
  \n```lua\nlocal image = MOAIImage.new()\nimage:init(25, 40)\nimage:padToPow2()\n\
  image:fillRect(-70,-70,150,150,1,1,1,1)\nimage:fillRect( 20,20,50,50,1,0.6,0,1)\n\
  \ngfxQuad = MOAIGfxQuad2D.new ()\ngfxQuad:setTexture ( image )\ngfxQuad:setRect\
  \ ( -64,-64,64,64 )\n\nprop = MOAIProp2D.new ()\nprop:setDeck ( gfxQuad )\nlayer:insertProp\
  \ ( prop )\n```\n\n## 加载图像\n\n可以使用 `load` 函数将图像加载到 `MOAIImage` 对象中，如下所示：\n\n```lua\n\
  theImage = MOAIImage.new ()\ntheImage:load( \"myImage2.png\" )\n```\n\n加载图像后，你可以对其执行各种操作并应用变换。\n\
  \n## 复制图像\n\n你可以使用 `copyRect` 或 `copyBits` 函数从另一个图像复制图像。请注意，`copyBits` 会复制源图像（此操作无法进行缩放或翻转）；源图像中的矩形区域可以被复制到目标图像的指定位置。以下是使用\
  \ `copyBits` 函数的示例：\n\n```lua\nsrcImage = MOAIImage.new ()\nsrcImage:load ( \"myImage2.png\"\
  \ )\niWd, iHt = srcImage:getSize()\ndestImage = MOAIImage.new()\ndestImage:init(64,64)\n\
  destImage:copyBits(srcImage,0,0,0,0,iWd, iHt)\n```\n\n\n如果你想能够缩放或翻转图像，可以使用`copyRect`函数，该函数将源图像中的一个矩形区域复制到目标图像中。你可以通过反转矩形的最小/最大参数来翻转图像。此函数将按照`srcMin`和`srcMax`指定的尺寸，将源图像绘制到`destMin`和`destMax`指定的目标区域中。如果目标尺寸更大，图像会放大；如果更小，图像会缩小。\n\
  \n```\ncopyRect(source, srcXMin, srcYMin, srcXMax, srcYMax, destXMin, destYMin,\
  \ destXMax, destYMax, filter)\n```\n\n**保存图像**\n\n你可能需要将图像保存到设备或硬盘上以备后用。可以使用`writePNG`函数保存图像：\n\
  \n```\nimage = MOAIImage:new()\nimage:init(64,64)\n-- 此处为绘图代码\nimage:writePNG(\"\
  myimage.png\")\n```\n\n**调整图像大小**\n\n可以使用`resize`或`resizeCanvas`函数调整图像大小。`resize`函数将图像复制到新尺寸的图像，而`resizeCanvas`函数将图像复制到新尺寸的画布。\n\
  \n```\nimage:resize(width, height)\nimage:resizeCanvas(width, height)\n```\n\n**图像像素访问**\n\
  \n通过`x`和`y`坐标，可以使用`getRGBA`函数或`getColor32`函数获取图像中某点的颜色。这两个函数分别以 RGBA 格式或 32 位整数格式返回数据。\n\
  \n```\nimage:getRGBA(xPos, yPos)\n```\n\n以及\n\n```\nimage:getColor32(xPos, yPos)\n\
  ```\n\n同样，可以使用`setRGBA`和`setColor32`函数设置像素：\n\n```\nimage:setRGBA(xPos, yPos, red,\
  \ green, blue, alpha)\nimage:setColor32(xPos, yPos, colour)\n```\n\n**动画**\n\n基本的逐帧动画是通过以固定频率改变帧中的图像来实现的。这个频率被称为帧率（`fps`）。然而，对于文本、矩形和圆形等其他对象，随着时间的推移修改它们的属性也能产生动画效果。\n\
  \n要获取或设置`prop`的位置，可以使用`getLoc`或`setLoc`函数。这相当于为`prop`设置一个属性。\n\n```\nx, y = prop:getLoc()\n\
  等同于\nx = prop:getAttr( MOAISprite2D.ATTR_X_LOC )\ny = prop:getAttr( MOAISprite2D.ATTR_Y_LOC\
  \ )\n```\n\n`setLoc`和`getLoc`基本上是用于从`prop`访问属性的便捷方法。另一个非常有用的便捷方法是`moveRot`，它用于在指定的时间段内将对象旋转特定角度。\n\
  \n```\nprop:moveRot(180, 2)\n```\n\n这段代码将在 2 秒内将`prop`旋转 180 度。\n\n`MOAIEaseDriver`可以直接操作属性；我们只需指定要操作的对象和属性。`MOAIEaseDriver`对节点属性应用简单的缓动曲线。以下是其使用示例。\n\
  \n```\nease = MOAIEaseDriver.new()\nease:reserveLinks(3)\nease:setLink(1, prop,\
  \ MOAIProp2D.ATTR_X_LOC, 64)\nease:setLink(2, prop, MOAIProp2D.ATTR_Y_LOC, 64)\n\
  ease:setLink(3, prop, MOAIProp2D.ATTR_Z_ROT, 360)\nease:start()\n```\n\n这段代码创建了一个缓动驱动器，然后设置每个通道以定位单个`prop`的特定属性。这将使`prop`从屏幕左上角旋转并移动到新位置。\n\
  \n**注意**：当你设置两个`prop`（称为图节点）之间的父子关系（以及依赖关系）时，父节点会先被更新，然后才是子节点。\n\n**图块组（Tile Decks）**\n\
  \n本章前面我描述了可以使用的各种图块组。在本节中，我们将更深入地了解`MOAITileDeck2D`，它有助于创建逐帧动画。`TileDeck2D`的精灵表要求所有帧的尺寸相同。加载纹理时，需要设置横向的帧数和纵向的帧数。由于所有帧的尺寸相同，因此当你使用`setSize`函数设置尺寸时，精灵表会根据函数指定的参数被等分为若干帧。尺寸的计算方式如下：\n\
  \n```\nframeWidth = spriteSheetWidth / columns\nframeHeight = spriteSheetHeight\
  \ / rows\n```\n\n以下示例展示了如何使用帧动画。代码的结果如图 10-6 所示。\n\n![9781430246626_Fig10-06.jpg](img/9781430246626_Fig10-06.jpg)\n\
  \n图 10-6. 在 Moai 中使用单独帧对精灵进行动画\n\n```\n_max_ = 11\n\nMOAISim.openWindow(\"Tiles\
  \ Deck Sample\",320,480)\n\nviewport = MOAIViewport.new()\nviewport:setSize(320,480)\n\
  viewport:setScale(320,-480)\nviewport:setOffset(-1,1)\n\nlayer = MOAILayer2D.new()\n\
  layer:setViewport(viewport)\nMOAISim.pushRenderPass(layer)\n\ntile = MOAITileDeck2D.new()\n\
  tile:setTexture(\"stick.png\")\ntile:setSize(_max_,1)\ntile:setRect(-20,31,20,-31)\n\
  \nprop1 = MOAIProp2D.new()\nprop1:setDeck(tile)\nlayer:insertProp(prop1)\n\ncurve\
  \ = MOAIAnimCurve.new()\ncurve:reserveKeys(_max_)\n\nfor i=1,_max_ do\n curve:setKey(i,\
  \ i*(1/_max_), i, MOAIEaseType.FLAT)\nend\n\nanim = MOAIAnim:new()\nanim:reserveLinks(1)\n\
  anim:setLink(1, curve, prop1, MOAIProp2D.ATTR_INDEX)\nanim:setMode(MOAITimer.LOOP)\n\
  anim:start()\nprop1:setLoc(100,100)\n```\n\n在这个示例中，我们首先创建可用于动画的图块：\n\n```\ntile\
  \ = MOAITileDeck2D.new()\ntile:setTexture(\"stick.png\")\ntile:setSize(11,1)\ntile:setRect(-20,31,20,-31)\n\
  ```\n\n我们的精灵表横向有 11 帧，纵向有 1 帧（见图 10-7）。所有帧的尺寸均为 40×62，我们通过`setRect`来设置。\n\n![9781430246626_Fig10-07.jpg](img/9781430246626_Fig10-07.jpg)\n\
  \n图 10-7. 我们将用于动画的`stick.png`图像\n\n在`setRect`函数中为矩形尺寸设置负值，会将对象沿值为负的坐标轴翻转。由于 Moai\
  \ 的 y 轴是递增的，我们将比例尺设置为以左上角为原点（0,0），因此我们的图像会沿 y 轴翻转显示。为了修正这一点，我们使用`tile:setRect(-20,31,20,-31)`而不是`tile:setRect(-20,-31,20,31)`。\n\
  \n```\nprop1 = MOAIProp2D.new()\nprop1:setDeck(tile)\nlayer:insertProp(prop1)\n\
  ```\n\n我们创建一个`MOAIProp2D`对象，将刚创建的图块设置为该`prop`的图块组，然后将该`prop`插入到图层中：\n\n```\ncurve\
  \ = MOAIAnimCurve.new()\n_max_ = 11\ncurve:reserveKeys(_max_)\nfor i=1, _max_ do\n\
  \  curve:setKey(I, I * (1/_max_), I, MOAIEaseType.FLAT)\nend\n```\n\n我们创建一个`MOAIAnimCurve`对象，然后使用`reserveKeys`函数指定帧数。接着创建帧，并为每个帧设置索引和时间索引，以及曲线在该时间索引处的值。时间索引是看待动画的另一种方式，但不是基于索引，而是通过设置时间索引来指定该时间点上的动画/变换。\n\
  \n```\nanim = MOAIAnim:new()\nanim:reserveLinks(1)\nanim:setLink(1, curve, prop1,\
  \ MOAIProp2D.ATTR_INDEX)\nanim:setMode(MOAITimer.LOOP)\nanim:start()\n```\n\n我们使用`MOAIAnim`类来创建动画。我们在`prop1`和`curve`之间建立了一个关于`Index`属性的链接。将模式设置为循环（作为定时器）。然后通过`start`函数启动动画。\n\
  \n最后，我们将`prop1`对象重新定位到屏幕上的（100,100）位置。\n\n我们还可以使用监听器来挂钩动画。可以捕获的监听器有：\n\n*   `MOAITimer.EVENT_TIMER_KEYFRAME`。每次关键帧改变时都会调用此监听器，它是一个回调函数，签名如下：\n\
  \n```\n    onKeyFrame ( MOAITimer_self, number_keyFrame, number_timesExecuted, number_time,\
  \ number_value)\n    ```\n\n*   `MOAITimer.EVENT_TIMER_LOOP`。每次函数循环时都会调用此监听器，其回调签名如下：\n\
  \n```\n    onLoop(MOAITimer_self,  number_timesExecuted)\n    ```\n\n\n\n## MOAITimer\
  \ 事件\n\n- `MOAITimer.EVENT_TIMER_BEGIN_SPAN`。当计时器播放模式达到通过 `setSpan` 函数设置的 `beginSpan`\
  \ 时间时调用此事件；否则为 0（即动画开始时）。其回调签名如下：\n\n```\nonBeginSpan(MOAITimer_self, number_timesExecuted)\n\
  ```\n\n- `MOAITimer.EVENT_TIMER_END_SPAN`。当计时器播放达到通过 `setSpan` 函数设置的 `endSpan` 时间时调用此事件；否则设置为动画的结束时间。其回调签名如下：\n\
  \n```\nonEndSpan(MOAITimer_self, number_timesExecuted)\n```\n\n以下是使用 `MOAITimer.EVENT_TIMER_KEYFRAME`\
  \ 监听器的示例：\n\n```\nfunction onKeyFrame(self, index, time, value)\n  print(\"Keyframe\
  \ : \", index, time, value)\nend\nanim:setListener(MOAITimer.EVENT_TIMER_KEYFRAME,\
  \ onKeyFrame)\n```\n\n## 线程（Threading）\n\n默认情况下，所有用于变换 Moai 对象的函数都是非阻塞的，并且并行执行。例如，如果我们在一个属性（prop）上应用变换，它们将同时执行。示例如下：\n\
  \n```\nprop:moveLoc(180, 180, 3)\nprop:moveScl(1.2, 1.2, 1)\nprop:moveLoc(-180,\
  \ -180, 3)\nprop:moveScl(0.9, 0.9, 1)\n```\n\nMoai 可以同时执行所有这些变换；如果你运行这段代码，只会看到四个变换的最终结果，而不会逐个看到它们。\n\
  \nMoai 拥有线程的概念；我们在之前的章节中已经简要了解了线程和协程。我们可以在 Moai 中创建阻塞线程，以便以阻塞模式运行每个动作。示例如下：\n\n\
  ```\nfunction threadFunction()\n  action = prop:moveLoc(180, 180, 3.0)\n  MOAIThread.blockOnAction(action)\n\
  \n  action = prop:moveScl(1.2, 1.2, 1.0)\n  MOAIThread.blockOnAction(action)\n\n\
    action = prop:moveLoc(-180, -180, 3.0)\n  MOAIThread.blockOnAction(action)\n\n\
    action = prop:moveScl(0.8, 0.8, 1.0)\n  MOAIThread.blockOnAction(action)\nend\n\
  \nthread = MOAIThread.new()\nthread:run(threadFunction)\n```\n\n我们创建的阻塞动作只能用于动作项（变换）。\n\
  \n## 组（Groups）\n\n其他框架对“组”的定义是一个容器——它容纳所有其他显示对象。通常，组是非可视的显示对象。在 Moai 中，这个概念略有不同——你可以在两个对象之间建立父子关系。当父对象被修改或移动时，子对象也会随之变化，如图\
  \ 10-8 所示。\n\n![9781430246626_Fig10-08.jpg](img/9781430246626_Fig10-08.jpg)\n\n\
  图 10-8. Moai 中利用特性（traits）实现的组\n\n在 Moai 中，这被称为设置*特性源（trait source）*，其中*特性*是属性，例如位置、变换、颜色、可见性等。`setParent`\
  \ 函数实际上是 `setTraitSource` 的别名。\n\n```\nMOAISim.openWindow(\"Group Test\", 320, 480)\n\
  \nviewport = MAOIViewport.new()\nviewport:setSize(320, 480)\nviewport:setScale(320,\
  \ -480)\nviewport:setOffset(-1, 1)\n\nlayer = MOAILayer2D.new()\nlayer:setViewport(viewport)\n\
  MOAISim.pushRenderPass(layer)\n\nfunction newImage(imageName, xPos, yPos)\n  local\
  \ xPos = xPos or 0\n  local yPos = yPos or 0\n  local wd, ht\n\n  local img = MOAIImage.new()\n\
    img:load(imageName)\n  wd, ht = img:getSize()\n\n  quad = MOAIGfxQuad2D.new()\n\
    quad:setTexture(imageName)\n  quad:setRect(-(wd/2), (ht/2), (wd/2), -(ht/2))\n\
  \n  prop = MOAIProp2D.new()\n  prop:setDeck(quad)\n  prop:setLoc(xPos, yPos)\n\n\
    layer:insertProp(prop)\n  return prop\nend\n\nmagnet = newImage(\"myImage2.png\"\
  , 40, 260)\nrobo = newImage(\"myImage3.png\", 40, -140)\n\nrobo:setParent(magnet)\n\
  \nmagnet:moveLoc(170, 170, 3)\n```\n\n注意，当移动磁铁时，机器人会随着磁铁一起移动。任何对父对象执行的操作都会影响到这两个属性。\n\
  \n让我们在代码末尾添加一些缩放操作：\n\n```\nmagnet:moveScl(-0.5, -0.5, 3)\n```\n\n你会注意到，磁铁和机器人在移动时都开始缩放。当你将一个对象设置为另一个对象的父对象时，所有属性/特性都会从父对象继承。最终效果如图\
  \ 10-9 所示。\n\n![9781430246626_Fig10-09.jpg](img/9781430246626_Fig10-09.jpg)\n\n\
  图 10-9. 缩放操作同时影响两个图像（利用特性）\n\n## 处理输入（Handling Input）\n\n由于 Moai 可以从单一源代码为移动设备、桌面和网页浏览器生成可执行文件，因此它拥有一个高度复杂的输入系统。这包括键盘、鼠标和触摸输入。\n\
  \n输入封装在 `MOAIInputMgr` 类中；该类依赖于一个回调函数来处理输入事件。\n\n### 键盘事件\n\n在开发过程中，你会在桌面上测试代码。为此，你需要捕获并测试键盘事件。要捕获这些事件，你需要为\
  \ `MOAIInputMgr.device.keyboard` 对象设置一个回调。\n\n```\nfunction onKeyEvent(key, down)\n\
    if down == true then\n    print(\"Key down : \", key)\n  else\n    print(\"Key\
  \ up : \", key)\n  end\nend\nMOAIInputMgr.device.keyboard:setCallback(onKeyEvent)\n\
  ```\n\n在 iOS 设备上，`MOAIInputMgr.device.keyboard` 不存在；你需要改用 `MOAIKeyboardIOS` 类，并为\
  \ `EVENT_INPUT` 和 `EVENT_RETURN` 设置监听器。\n\n```\nfunction onInput(start, length,\
  \ text)\n  print(\"on input\")\n  print(start, length, text)\n  print(MOAIKeyboardIOS.getText())\n\
  end\n\nfunction onReturn()\n  print(\"on return\")\n  print(MOAIKeyboardIOS.getText())\n\
  end\n\nMOAIKeyboardIOS.setListener(MOAIKeyboardIOS.EVENT_INPUT, onInput)\nMOAIKeyboardIOS.setListener(MOAIKeyboardIOS.EVENT_RETURN,\
  \ onReturn)\nMOAIKeyboardIOS.showKeyboard()\n```\n\n### 鼠标事件\n\n对于没有触摸事件的设备，Moai\
  \ 提供了鼠标处理器。与键盘处理器类似，你需要为 `MOAIInputMgr.device.pointer` 对象设置一个回调。该回调用于捕获鼠标移动事件。\n\
  \n```\nfunction onMove(evtX, evtY)\n  print(\"Pointer : \", x, y)\nend\nMOAIInputMgr.device.pointer:setCallback(onMove)\n\
  ```\n\n如果我们想要捕获鼠标按钮点击事件，需要为鼠标按钮设置回调函数，例如 `mouseLeft`、`mouseRight` 和 `mouseCenter`。\n\
  \n```\nfunction onMouseL(down)\n  print(\"The Left Mouse button down is \", down)\n\
  end\nfunction onMouseR(down)\n  print(\"The Right Mouse button down is \", down)\n\
  end\nfunction onMouseC(down)\n  print(\"The Center Mouse button down is \", down)\n\
  end\nMOAIInputMgr.device.mouseLeft:setCallback(onMouseL)\nMOAIInputMgr.device.mouseRight:setCallback(onMouseL)\n\
  MOAIInputMgr.device.mouseCenter:setCallback(onMouseL)\n```\n\n在某些情况下，你可能不想设置鼠标按钮的回调函数。这时，你可以使用\
  \ `isUp` 和 `isDown` 函数来查询它们的状态。你可以在指针上设置回调，并在回调中检查按钮状态。\n\n```\nfunction handleMouse(x,\
  \ y)\n  if MOAIInputMgr.device.mouseLeft:isUp() then\n    print(\"Left button clicked\
  \ at : \", x, y)\n  end\nend\n\nMOAIInputMgr.device.pointer:setCallback(handleMouse)\n\
  ```\n\n你可能在很多应用中注意到过“下拉刷新”功能。在 iOS 6 中，邮件应用就有下拉刷新功能；当你下拉时，圆圈会像粘液一样拉长，从顶部的较大块中向下拉伸。我们可以用\
  \ Moai 和鼠标快速重现相同的效果。在这个例子中，当你在窗口中移动鼠标时，粘液块会对鼠标指针向下移动做出反应。效果如图 10-10 所示。\n\n![9781430246626_Fig10-10.jpg](img/9781430246626_Fig10-10.jpg)\n\
  \n图 10-10. iOS 6 中全新的有机粘液下拉刷新效果\n\n首先，我们创建窗口、视口以及用于放置所有显示对象的图层：\n\n```\nMOAISim.openWindow(\"\
  Slimey Blob\", 320, 480)\n\nviewport = MOAIViewport.new()\nviewport:setSize(320,\
  \ 480)\nviewport:setScale(320, -480)\nviewport:setOffset(-1, 1)\n```\n\n\n```markdown\n\
  \n`layer = MOAILayer2D.new()`\n`layer:setViewport(viewport)`\n`MOAISim.pushRenderPass(layer)`\n\
  \n然后，我们创建用来绘制图形的`scriptDeck`：\n\n`canvas = MOAIScriptDeck.new()`\n`canvas:setRect(-64,-64,64,64)`\n\
  `canvas:setDrawCallback(onDraw)`\n\n`prop = MOAIProp2D.new()`\n`prop:setDeck(canvas)`\n\
  `layer:insertProp(prop)`\n\n最后，我们需要创建负责所有绘制的函数：\n\n```\nbottomOriginY = 100\nbottomRadius\
  \ = 10\ntopRadius = 25\n  topOrigin = {\n    x = _W/2,\n    y = 30\n  }\n\nfunction\
  \ onDraw(index, xOrg, yOrg, xFlp, yFlp)\n  MOAIGfxDevice.setPenColor(1,0.64,0.1)\n\
  \nMOAIDraw.fillCircle(topOrigin.x,topOrigin.y,topRadius,100)\n  MOAIDraw.fillCircle(_W/2,bottomOriginY,bottomRadius,100)\n\
  \nMOAIDraw.fillFan(\n    topOrigin.x-currentTopRadius, topOrigin.y,\n    topOrigin.x+currentTopRadius,\
  \ topOrigin.y,\n    topOrigin.x+bottomRadius, bottomOriginY,\n    topOrigin.x-bottomRadius,\
  \ bottomOriginY\n  )\n\nend\n```\n\n在我们的绘制函数中，首先绘制两个圆，一个在上方，一个在下方，位置分别由`topOrigin.y`和`bottomOriginY`指定，半径由`topRadius`和`bottomRadius`指定。\n\
  \n接下来，我们从上方圆的中心到下方圆的中心绘制一个四边形，实际上是将两者连接起来。为了看起来更逼真一些，这条线可以是一条向内拱起的曲线，给人一种正在膨胀的粘液滴的印象。但为简单起见，我们只使用一个能提供类似外观的四边形。\n\
  \n你可以通过添加另一个线段来使其更逼真，但这作为练习留给你。\n\n我们需要将下方的粘液块定位到鼠标当前所在的位置；这样，我们就能模拟将粘液块从较大的粘液块上拉下来的效果。\n\
  \n```\nfunction onMove(mx, my)\n  bottomOriginY = my\n  if bottomOriginY < 40 then\
  \ bottomOriginY = 40 end\n  if bottomOriginY > 400 then bottonOriginY = 400 end\n\
  \nbottomRadius = 12 – ((my-currentTopRadius)/48)\nend\nMOAIInputMgr.device.pointe:setCallback(onMove)\n\
  ```\n\n在鼠标移动函数中，我们首先将`bottomOriginY`设置为鼠标指针当前的`y`坐标。我们还确保`bottomOriginY`保持在 40 到\
  \ 400 的范围内。同时，我们设置下方圆的半径，使其在移动时缩小或扩大（参见图 10-11）。\n\n![9781430246626_Fig10-11.jpg](img/9781430246626_Fig10-11.jpg)\n\
  \n图 10-11 . 一个简化版的“下拉刷新”粘液块\n\n触摸事件\n\n在没有鼠标指针而是响应触摸的移动设备上，我们可以为触摸设置回调。要设置回调的对象是`MOAIInputMgr.device.touch`。它捕获触摸事件。回调函数接收一个`eventType`，它可以是以下值之一：\n\
  \n*   `MOAITouchSensor.TOUCH_DOWN`\n*   `MOAITouchSensor.TOUCH_UP`\n*   `MOAITouchSensor.TOUCH_MOVE`\n\
  *   `MOAITouchSensor.TOUCH_CANCEL`\n\n```\nfunction onTouch(eventType, idx, x, y,\
  \ tapCount)\n  print(eventType)\nend\nMOAIInputMgr.device.touch:setCallback(onTouch)\n\
  ```\n\n如果在桌面端运行此代码，将会出错，因为没有触摸设备。\n\n设置处理程序的最佳方法是在设置回调之前确保设备存在。以下是如何检查设备是否存在：\n\n\
  ```\nif MOAIInputMgr.device.touch then\n  MOAIInputMgr.device.touch:setCallback(onTouch)\n\
  end\n```\n\n**注意**：如果相关设备不受支持，设置回调可能会导致错误。最好在设置回调之前检查设备是否存在。这适用于涉及触摸、鼠标指针、键盘甚至 GPS\
  \ 和加速度计的设备。\n\n声音\n\n虽然有些框架具有复杂繁复的音频功能，但 Moai 在`MOAIUntzSound`类中提供了一个非常简单的功能。但是，在使用音频功能之前，你需要像这样初始化`MOAIUntzSystem`：\n\
  \n```\nMOAIUntzSystem.initialize ()\n\nsound = MOAIUntzSound.new ()\nsound:load\
  \ ( 'mono16.wav' )\nsound:setVolume ( 1 )\nsound:setLooping ( false )\nsound:play\
  \ ()\n```\n\n显示对话框\n\nMoai 允许你向用户显示消息，甚至可以通过是/否/取消类型的对话框从用户那里获取输入。在这种情况下，你可以使用`MOAIDialogIOS`类的`showDialog`函数。示例如下：\n\
  \n```\nfunction onDialogDismiss(code)\n  print(\"Dialog Dismissed\")\n  if (code==MOAIDialog.DIALOG_RESULT_POSITIVE)\
  \ then\n    print(\"Clicked Yes\")\n  elseif (code==MOAIDialog.DIALOG_RESULT_NEUTRAL)\
  \ then\n    print(\"Clicked Maybe\")\n  elseif (code==MOAIDialog.DIALOG_RESULT_NEGATIVE)\
  \ then\n    print(\"Clicked No\")\n  elseif (code==MOAIDialog.DIALOG_RESULT_CANCEL)\
  \ then\n    print(\"Clicked Cancel\")\n  else then\n    print(\"Clicked Unknown\"\
  )\n  end\nend\n\nMOAIDialogIOS.showDialog(\"Sample Dialog\", \"\", \"Yes\", \"Maybe\"\
  , \"No\", true, onDialogDismiss)\n```\n\n播放视频\n\n如果你想在 iOS 设备上播放视频——例如，作为游戏关卡的介绍或引子——你可以使用`MOAIMoviePlayer`类。要播放视频，你需要使用视频路径进行初始化，然后调用`play`函数：\n\
  \n```\nMOAIMoviePlayer.init ( \n\"http://km.support.apple.com/library/APPLE/APPLECARE_ALLGEOS/HT1211/sample_iTunes.mov\"\
  \ )\nMOAIMoviePlayer.play ()\n```\n\n设备方向\n\n当涉及到方向变化时，许多框架会触发一个方向变化事件。然而，在 Moai\
  \ 中，当设备方向改变时，会触发`EVENT_RESIZE`事件。我们可以通过向`MOAIGfxDevice`类添加一个监听器来监听此事件。\n\n```\n\
  _W, _H = MOAIGfxDevice.getViewSize()\nfunction onResize(width, height)\n  viewport:setSize(width,\
  \ height)\n  viewport:setScale(width, height)\nend\nMOAIGfxDevice.setListener(MOAIGfxDevice.EVENT_RESIZE,\
  \ onResize)\n```\n\n通知\n\n在某些场景下，你可能希望向用户发送一些信息通知——例如，当任务完成时（比如，在类似 Farmville 的应用中作物可以收割时）。为了实现这一点，Moai\
  \ 拥有一个`MOAINotifications`类，需要添加一个监听器来监听事件。下面的代码包含三个不同的部分。`onRegComplete`在我们尝试注册远程通知时被调用；它还会通知我们是成功还是失败。另一个函数在通知发生时，基于传递的数据显示通知。最后一部分设置并注册通知。\n\
  \n```\nfunction onRegComplete(code, token)\n  print(\"Registered\")\n  if code==MOAINotification.REMOTE_NOTIFICATION_RESULT_REGISTERED\
  \ then\n    print(\"Registered \" .. token)\n  elseif code==MOAINotification.REMOTE_NOTIFICATION_RESULT_UNREGISTERED\
  \ then\n  else\n    print(\"Registration failed\")\n  end\nend\n\nfunction onRemoteNotification(event)\n\
  \  print(\"Notification received\")\n  message = event.aps.alert\n\nlocal action,\
  \ data, title\n  if event.action then action = event.action end\n  if event.data\
  \ then data = event.data end\n  if event.title then title = event.title end\n\n\
  print(\"Message : \" .. message)\n  print(\"action : \" .. action)\n  print(\"data\
  \ : \" .. data)\n  print(\"title : \", title)\nend\n\nMOAINotification.setListener(MOAINotification.REMOTE_NOTIFICATION_REGISTRATION_COMPLETE,\
  \ onRegComplete)\nMOAINotification.setListener(MOAINotification.REMOTE_NOTIFICATION_MESSAGE_RECEIVED,\
  \ onRemoteNotification)\nMOAINotification.setAppIconBadgeNumber(0)\nMOAINotification.registerForRemoteNotification(\n\
  \    MOAINotification.REMOTE_NOTIFICATION_BADGE +\n    MOAINotification.REMOTE_NOTIFICATION_ALERT)\n\
  ```\n\n网络\n\n在你的游戏中，你可能需要使用 HTTP 或 HTTPS 协议下载关卡数据或其他数据。Moai 有一个`MOAIHttpTask`类，允许从\
  \ HTTP/S 源下载数据。\n\n```\nfunction onDone(task, responseCode)\n  print(\"Downloaded\"\
  , responseCode)\n  if task:getSize() then\n    print(task:getString())\n  else\n\
  \    print(\"Got nothing\")\n  end\nend\n\ntheTask = MOAIHttpTask.new(\"Download\
  \ Webpage\")\ntheTask:setCallback(onDone)\ntheTask:httpGet(\"http://www.oz-apps.com\"\
  )\n```\n\n```\n\n\n`httpGet`函数是同步工作的，然而，如果你希望数据被**异步**加载，则需要调用`performAsync`函数：\n\
  \n```\nfunction onFinish ( task, responseCode )\n\nprint ( \"onFinish\" )\n  print\
  \ ( responseCode )\n\nif ( task:getSize ()) then\n    print ( task:getString ())\n\
  \  else\n    print ( \"nothing\" )\n  end\nend\n\ntask = MOAIHttpTask.new ()\n\n\
  task:setVerb ( MOAIHttpTask.HTTP_GET )\ntask:setUrl ( \"www.cnn.com\" )\ntask:setCallback\
  \ ( onFinish )\ntask:setUserAgent ( \"Moai\" )\ntask:setHeader ( \"Foo\", \"foo\"\
  \ )\ntask:setHeader ( \"Bar\", \"bar\" )\ntask:setHeader ( \"Baz\", \"baz\" )\n\
  task:setVerbose ( true )\ntask:performAsync ()\n```\n\n如果你想以阻塞方式（即整个应用冻结以执行一个操作，任务完成后恢复）运行某些命令，应使用`performSync`函数而非`performAsync`。\n\
  \n`HttpTask`是一个双向函数，这意味着它不仅可用于通过`HTTP_GET`下载数据，还可用于上传数据和设置标头。可以与`HttpTask`一起使用的命令有：\n\
  \n*   `HTTP_HEAD`\n*   `HTTP_GET`\n*   `HTTP_PUT`\n*   `HTTP_POST`\n*   `HTTP_DELETE`\n\
  \n## 使用 JSON\n\nMoai 对 JSON 提供了很好的支持。要解码或编码 JSON 字符串，可以使用`MOAIJsonParser`对象。它只有两个函数：`encode`和`decode`。`decode`函数接受一个\
  \ JSON 字符串并将其转换为表层级结构，而`encode`则将表层级结构转换为 JSON 字符串。\n\n```\nlocal test = {name=\"\
  Jayant\", Msg={BaaBaa=\"BlackSheep\", Line1=\"Have you any wool?\"}}\nprint(MOAIJsonParser.encode(test))\n\
  ```\n\n## 使用 Base64\n\n在开发游戏时，为了发送消息或上传/下载数据，你可能需要将数据编码为 Base64，以便能以文本格式发送数据。`MOAIDataBuffer`类提供了基础转换功能。\n\
  \n```\ntheText = \"This is plain text, but...\"\nencoded = MOAIDataBuffer.base64Encode(theText)\n\
  print(encoded)\ndecoded = MOAIDataBuffer.base64Decode(encoded)\nprint(decoded)\n\
  ```\n\n在某些情况下，你可能需要处理流式数据；为此，你可以使用`MOAIStreamReader`和`MOAIStreamWriter`类。流可以像文件一样使用，你可以打开流、定位和写入数据。以下是一个示例：\n\
  \n```\nstream = MOAIMemStream.new ()\nstream:open ()\n\ndata = 'Lorem ipsum dolor\
  \ sit amet, consectetur adipiscing elit. Duis id massa vel leo blandit pharetra.\n\
  \ Aenean a nisl mi. Vestibulum ante ipsum primis in faucibus orci luctus et ultrices\
  \ posuere cubilia Curae;\n Nam quis magna sit amet diam fermentum consequat. Donec\
  \ dapibus pharetra diam vel convallis. \nPellentesque quis tellus mauris.\n Sed\
  \ eget risus tortor, in cursus nisi. Sed ultrices nulla non nunc ullamcorper id\
  \ venenatis urna ultrices.\n Cum sociis natoque penatibus et magnis dis parturient\
  \ montes, nascetur ridiculus mus.\n Nam sodales tellus et diam imperdiet pharetra\
  \ sagittis odio tempus. Lorem ipsum dolor sit amet, consectetur adipiscing elit.\n\
  \ Nunc mollis adipiscing nibh ut malesuada. Proin rutrum volutpat est sed feugiat.\
  \ Suspendisse at imperdiet justo.\n Pellentesque ullamcorper risus venenatis tellus\
  \ elementum mattis. Quisque adipiscing feugiat orci vitae egestas.'\nlen = #data\n\
  \nprint ( data )\n\nwriter = MOAIStreamWriter.new ()\nwriter:openBase64 ( stream\
  \ )\nwriter:write ( data, len )\nwriter:close ()\n\nstream:seek ( 0 )\n\nreader\
  \ = MOAIStreamReader.new ()\nreader:openBase64 ( stream )\ndata = reader:read (\
  \ len )\nreader:close ()\n\nprint ()\nprint ( data )\n```\n\n## 压缩数据\n\n处理在线数据时，你可能不仅希望转换数据，还希望对其进行压缩以节省数据传输和带宽。`MOAIDataBuffer`类允许你使用`deflate`和`inflate`函数对数据进行压缩或解压。\n\
  \n```\ndata = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Duis id\
  \ massa vel leo blandit\n pharetra. Aenean a nisl mi. Vestibulum ante ipsum primis\
  \ in faucibus orci luctus et ultrices posuere\n cubilia Curae; Nam quis magna sit\
  \ amet diam fermentum consequat. Donec dapibus pharetra diam vel\n convallis. Pellentesque\
  \ quis tellus mauris. Sed eget risus tortor, in cursus nisi. Sed ultrices\n nulla\
  \ non nunc ullamcorper id venenatis urna ultrices. Cum sociis natoque penatibus\
  \ et magnis dis\n parturient montes, nascetur ridiculus mus. Nam sodales tellus\
  \ et diam imperdiet pharetra sagittis\n odio tempus. Lorem ipsum dolor sit amet,\
  \ consectetur adipiscing elit. Nunc mollis adipiscing nibh\n ut malesuada. Proin\
  \ rutrum volutpat est sed feugiat. Suspendisse at imperdiet justo. Pellentesque\n\
  \ ullamcorper risus venenatis tellus elementum mattis. Quisque adipiscing feugiat\
  \ orci vitae egestas.'\n\nprint ( data )\nprint ()\n\nprint ( 'original length:\
  \ ' .. #data )\n\ndata = MOAIDataBuffer.deflate ( data, 9 )\nprint ( 'deflated length:\
  \ ' .. #data )\nprint ( \"The compressed encoded data\")\nprint ( MOAIDataBuffer.base64Encode(data))\n\
  \ndata = MOAIDataBuffer.inflate ( data )\nprint ( 'inflated length: ' .. #data )\n\
  \nprint ()\nprint ( data )\n```\n\n## 物理\n\n物理是游戏应用中最常用的功能，而 Box2D 是大多数框架最常用的库。Moai\
  \ 包含了 Box2D 以及 Chipmunk 库。本节将描述这两者。\n\n### Box2D 物理\n\n在 Moai 中使用物理时，首先要做的事情是使用`MOAIBox2dWorld`类创建一个世界。\n\
  \n```\nMOAISim.openWindow(\"Physics\", 640, 480)\nviewport = MOAIViewport.new()\n\
  viewport:setSize(640,480)\nviewport:setScale(16,0)\n\nlayer = MOAILayer2D.new()\n\
  layer:setViewport(viewport)\nMOAISim.pushRenderPass(layer)\n\nworld = MOAIBox2dWorld.new()\n\
  world:setGravity(0,-9.8)\nworld:setUnitsToMeters(2)\nworld:start()\nlayer:setBox2DWorld(world)\n\
  ```\n\n创建世界后，我们需要添加一个物理物体。这将通过`addBody`函数与我们创建的物理世界进行交互，作为一个**动态物体**。通常，所有物体默认被创建为静态物体。**静态物体**是不可移动的，即力不会作用于静态物体，而动态物体对力有反应。\n\
  \n为了让重力真实地工作，我们需要将其设置为 −9.8；如果设置为 9.8，物体将开始漂浮。\n\nBox2D 的单位与米-千克-秒（MKS）单位配合得很好，移动物体在\
  \ 0.1 到 10 米的范围内工作良好。虽然可能很想使用像素作为单位，但这会导致一些奇怪的行为和糟糕的模拟。\n\n最后，我们需要使用`world:start()`启动物理模拟。要停止物理模拟，可以使用`world:stop()`。\n\
  \n```\nbody = world:addBody( MOAIBox2DBody.DYNAMIC)\npoly = {0,-1,1,0,0,1,-1,0}\n\
  \nfixture = body:addPolygon(poly)\nfixture:setDestiny(1)\nfixture:setFriction(0.3)\n\
  fixture:setFilter(0x01)\nfixture:setCollisionHandler(onCollide, MOAIBox2DArbiter.BEGIN\
  \ + MOAIBox2DArbiter.END, 0x02)\nbody:resetMassData()\nbody:applyAngularImpulse(2)\n\
  ```\n\n现在我们创建了一个动态物体，我们创建一个夹具（fixture），它将形状绑定到物体上，并赋予物体材料属性，如密度、摩擦力和弹性。\n\n**注意**　*弹性*涉及物体在碰撞变形后恢复其原始形状或位置的方式。\n\
  \n如果我们运行代码，一个物理盒子将出现在屏幕上，如图 10-12 所示。\n\n![9781430246626_Fig10-12.jpg](img/9781430246626_Fig10-12.jpg)\n\
  \nFigure 10-12. Moai Box2D 物理物体\n\n```\nbody2 = world:addBody(MOAIBox2DBody.STATIC)\n\
  fixture2 = body2:addRect(-5,-5,5,-3)\nfixture2:setFilter(0x02)\nfixture2:setCollisionHandler(onCollide,\
  \ MOAIBox2DArbiter.BEGIN + MOAIBox2DArbiter.END, 0x01)\n```\n\n这将创建一个静态物体，它充当地面，防止动态盒子掉出屏幕。\n\
  \n\n\n对于这两个 body fixtures，我们都设置了一个碰撞处理器，该处理器会针对`MOAIBox2DArbiter.BEGIN`和`MOAIBox2DArbiter.END`事件调用`onCollide`函数。`BEGIN`事件在碰撞开始时触发，`END`事件在碰撞结束时触发。我们可以在`onCollide`函数中捕获它。\n\
  \n```\nfunction onCollide(event)\n  if event == MOAIBox2DArbiter.BEGIN then\n  \
  \  print(\"Begin!\")\n  elseif event == MOAIBox2DArbiter.END then\n    print(\"\
  End!\")\n  end\nend\n```\n\n我们可以向这个 body 添加一个图像，这样我们看到的就不是方框，而是其位置上的图像：\n\n```\n\
  texture = MOAIGfxQuad2D.new()\ntexture:setTexture(\"moai.png\")\ntexture:setRect(-0.5,\
  \ -0.5, 0.5, 0.5)\n```\n\n现在我们需要将此图像添加到 body：\n\n```\nimage = MOAIProp2D.new()\n\
  image:setDeck(texture)\nimage:setParent(body)\nlayer:insertProp(image)\n```\n\n\
  我们使用`poly`创建的多边形是菱形的；如果我们希望它是正方形，可以使用以下代码：\n\n```\npoly = {-0.5, -0.5, 0.5, -0.5,\
  \ 0.5, 0.5, -0.5, 0.5}\n```\n\n物体在接触地面时不会弹跳。我们可以通过使用`setRestitution`函数设置恢复系数，使两个物体都具有弹性。\n\
  \n```\nfixture:setRestitution(0.5)\n```\n\n和\n\n```\nfixture:setRestitution(0.7)\n\
  ```\n\n为了让这个小代码示例更有趣，我们将世界的重力改为-1，这会使物体表现得像一个气球。为此，我们使用`world:setGravity(0,-1)`。现在物体下落得更慢了。我们还可以添加一个鼠标事件，使物体弹跳。\n\
  \n```\nfunction onClick(down)\n  body:setLinearVelocity(0,0)\n  body:applyLinearImpulse(0,1)\n\
  end\nMOAIInputMgr.device.mouseLeft:setCallback(onClick)\n```\n\n现在，每次我们单击鼠标左键时，都会将速度重置为\
  \ 0，然后施加一个(0, 1)的线性冲量，这会在 x 轴上施加 0 的冲量，在 y 轴上施加 1 的冲量。这使得物体向上跳跃。\n\n### Chipmunk\
  \ Physics\n\n我们也可以在 Moai 中使用 Chipmunk 物理引擎。其原理与 Box2D 类似。首先，我们需要使用`MOAICpSpace`类创建\
  \ Chipmunk 世界空间：\n\n```\nspace = MOAICpSpace.new()\nspace:setGravity(0,-2000)\n\
  space:setIterations(5)\nspace:start()\n```\n\n`iterations`是用于确定物体之间是否发生碰撞的计算次数。较大的迭代次数将提供更平滑、更好的物理模拟；然而，这会占用大量的\
  \ CPU 时间和处理资源。另一方面，如果我们使用较小的迭代值，所需的 CPU 能力较少，但运动可能看起来过于弹跳和不真实。\n\n要创建物理 body，我们可以使用`MOAICpBody`类，它会返回一个\
  \ Chipmunk 物理 body。然后，我们可以将一个多边形夹具添加到该物理 body。\n\n```\npoly = {-32, 32, 32, 32,\
  \ 32, -32, -32, -32}\nmass = 1\nmoment = MOAICpShape.momentForPolygon (mass, poly)\n\
  body = MOAICpBody.new(1, moment)\nspace:insertPrim(body)\n\nshape = body:addPolygon(\
  \ poly )\nshape:setElasticity( 0.8 )\nshape:setFriction( 0.8 )\nshape:setType( 1\
  \ )\nspace:insertPrim( shape )\n```\n\n当我们现在运行代码时，物体会直接掉出屏幕。让我们创建一个地板类型的物体，这样物理\
  \ body 就不会掉出屏幕：\n\n```\nbody = space:getStaticBody()\n\nx1,y1,x2,y2 = -320, -240,\
  \ 320, -240\nshape = body:addSegment(x1,y1,x2,y2)\nshape:setElasticity(1)\nshape:setFriction(0.1)\n\
  shape:setType(2)\nspace:insertPrim(shape)\n```\n\n现在，物体到达屏幕底部时将会弹跳。\n\n我们可以添加一些代码来让物体在屏幕上移动，但在此之前，让我们在屏幕的四个角创建一个墙壁，这样当移动物理\
  \ body 时，它不会从屏幕侧面掉出。\n\n```\nfunction addSegment(x1, y1, x2, y2)\n  shape = body:addSegment(x1,y1,x2,y2)\n\
  \  shape:setElasticity(1)\n  shape:setFriction(0.1)\n  shape:setType(2)\n  space:insertPrim(shape)\n\
  end\n\naddSegment(-320, -240, 320, -240)\naddSegment(-320, 240, 320, 240)\naddSegment(-320,\
  \ -240, -320, 240)\naddSegment(320, -240, 320, 240)\n```\n\n我们可以通过使用`space:shapeForPoint`函数来获取给定点处的\
  \ body。我们还可以通过在指针设备上设置回调函数，根据鼠标的位置移动该点。\n\n```\nmouseBody = MOAICpBody.new(MOAICp.INFINITY,\
  \ MOAICp.INFINITY)\nmx, my = 0,0\nfunction onMove(x,y)\n  mx, my = layer:wndToWorld(x,y)\n\
  \  mouseBody:setPos(mx, my)\nend\n```\n\n现在，随着鼠标移动，`mouseBody`对象被放置在指针当前所在的位置。我们还可以为鼠标左键函数设置一个回调，该函数可以帮助拾取和移动物体。\n\
  \n```\nfunction onClick(down)\n  if down then\n    pick = space:shapeForPoint(mx,\
  \ my)\n    if pick then\n      body = pick:getBody()\n      mouseJoint = MOAICpConstraint.newPivotJoint(\n\
  \        mouseBody, body, 0, 0, body:worldToLocal(mx, my))\n      space:insertPrim(mouseJoint)\n\
  \    else\n      if mouseJoint then\n        space:removePrim(mouseJoint)\n    \
  \    mouseJoint = nil\n      end\n    end\n  end\nend\n```\n\n我们还可以通过添加更多可以使用鼠标交互的物理物体来扩展这一点。为此，我们可以创建多个物体。\n\
  \n```\npoly = {-32, 32, 32, 32, 32, -32, -32, -32}\nmass = 1\n\nfunction makeObject()\n\
  \  moment = MOAICpShape.momentForPolygon (mass, poly)\n  body = MOAICpBody.new(1,\
  \ moment)\n  space:insertPrim(body)\n\nshape = body:addPolygon( poly )\n  shape:setElasticity(\
  \ 0.8 )\n  shape:setFriction( 0.8 )\n  shape:setType( 1 )\n  space:insertPrim( shape\
  \ )\nend\n\nfor i=1, 15 do\n  makeObject()\nend\n```\n\n注意物体如何相互交互，以及如何使用鼠标进行操作。我们还可以将图像附加到物理\
  \ body 上；这将显示图像而不是物理 body。\n\n```\nimage = MOAIProp2D.new()\nimage:setDeck(texture)\n\
  image:setParent(body)\nlayer:insertProp(image)\n```\n\n## Moai Cloud\n\n当您登录 Moai\
  \ 帐户时，会看到 Moai 仪表板，您可以在其中设置云帐户并选择其他选项。您可以在此处创建的云服务完全独立于您是否使用 Moai 或任何其他框架或浏览器来使用这些服务。\n\
  \n### 创建 Web 服务\n\n让我们从创建一个 Web 服务开始。您可以通过在 Moai 云服务下单击“创建服务”按钮，从仪表板创建该服务。图 10-13\
  \ 显示了创建服务的屏幕；您主要需要提供一个应用程序名称，同时接受剩余的默认设置。\n\n![9781430246626_Fig10-13.jpg](img/9781430246626_Fig10-13.jpg)\n\
  \n图 10-13 在 Moai 仪表板中创建新服务\n\n创建服务后，您会看到一个屏幕，允许您创建另一个服务或编辑现有服务。注意图 10-14 中，我们称为`Test01`的服务状态为“未部署”，这意味着它在\
  \ Web 上不可用。为了能够访问它，我们需要部署它。\n\n![9781430246626_Fig10-14.jpg](img/9781430246626_Fig10-14.jpg)\n\
  \n图 10-14 创建服务后的仪表板\n\n首先单击“编辑”按钮以编辑此服务的设置，如图 10-15 所示。对于最简单的服务，我们无需更改任何内容；只需单击“部署服务”即可。\n\
  \n![9781430246626_Fig10-15.jpg](img/9781430246626_Fig10-15.jpg)\n\n图 10-15 Moai\
  \ 云服务的属性\n\n一旦我们单击“部署服务”，该服务即可使用。注意顶部的 URL；在此示例中，它设置为`http://services.moaicloud.com/USERNAME/test`。您需要为您自己的服务使用该\
  \ URL。如果您打开一个新的浏览器窗口并导航到该 URL，您将看到显示文本“hello world!”。\n\n\n\n如果你想要修改并创建一个更好、更有用的\
  \ Web 服务，可以点击右上角资源（Resources）下的“编辑文件”（Edit Files）链接，如图 Figure 10-15 所示。这将打开一个代码编辑器，允许你编写\
  \ Lua 代码。其中唯一存在的文件是 `main.lua`，包含以下代码：\n\n```\nfunction main(web,req)\n    web:page('hello\
  \ world!', 200, 'OK')\nend\n```\n\n这类似于用于创建动态 Web 页面的 PHP 和 ASP 环境，但这里我们使用的是 Lua\
  \ 语言。关于如何使用该服务的文档，请访问 [`getmoai.com/wiki/index.php?title=MoaiCloud`](http://getmoai.com/wiki/index.php?title=MoaiCloud)。\n\
  \n### 使用 Web 服务\n\n该 Web 服务是一个简单的 HTTP 类型服务，通过 URL 访问。我们将尝试从 Moai 应用程序中访问我们创建的服务。简单的代码如下所示：\n\
  \n```\ntheURL = http://services.moaicloud.com/USERNAME/SERVICENAME\nMoaiSim.openWindow(\"\
  Consume Web Services\", 320, 480)\n\nfunction getData(theTask)\n    print(theTask:getString())\n\
  end\n\ntask = MOAIHttpTask.new()\ntask:setCallback( getData )\ntask:httpGet (theURL)\n\
  ```\n\n运行代码时，终端将输出 `\"hello world!\"`。我们可以使用任何支持 HTTP 访问的语言或框架来从 Moai 云服务获取数据。\n\
  \n**注意**：Moai 云服务提供几种选项（类似手机套餐）。所有创建的账户默认使用沙盒（Sandbox）计划，该计划免费，提供 50 MB 空间、1 GB\
  \ 传输量、100,000 条推送通知和 100,000 次 API 请求。如果你的需求超出这些限制，还有其他计划可供选择，价格从面向爱好者的每月 19 美元到面向工作室的每月\
  \ 499 美元不等。\n\n## 总结\n\n本章讨论了 Moai 框架提供的许多功能，涵盖如何更改显示坐标系。还介绍了在 Moai 模拟器中运行的应用程序是该应用程序的桌面版本。因此，在为移动设备构建和部署应用程序之前，可以先准备好一个适用于\
  \ Mac App Store（如果需要）的桌面版本。此外，还讨论了 Moai 处理输入的方式：设置额外接口的侦听器并检查它们是否存在是很容易的。最后，介绍了独立于\
  \ Moai SDK 免费版的 Moai 云服务，它允许开发者直接在应用程序内部使用云功能。虽然一开始使用 Moai 开发可能令人生畏，但如果你坚持下去，它能够提供非常愉快的开发体验。\n\
  \n"
- '# 第 11 章


  '
- "# LÖVE\n\nLÖVE 是一个使用 Lua 和 OpenGL 的开源框架，与大多数其他框架类似。它支持 Windows、Mac 和 Unix 操作系统。尽管\
  \ LÖVE 本身不能在 iOS 设备上使用，但它对于在桌面上快速创建游戏或应用程序的原型非常有价值。LÖVE 的另一个优势是，它可以用来创建应用程序的桌面扩展，这些扩展可以与移动应用程序通信。\n\
  \nLÖVE 还可以用来为你的游戏创建关卡编辑器，由于它使用 Lua 语言，你可以坚持使用单一语言。\n\n## 架构\n\n与其他框架不同，LÖVE 依赖于特定的回调函数。与其他框架不同，没有特定的结构需要遵循——对于\
  \ LÖVE，需要声明一些特殊的函数才能使应用程序运行。通过这些 *回调函数*，解释器会查找这些函数，如果它们被声明，就会被调用。LÖVE 应用程序的架构如 Figure\
  \ 11-1 所示。\n\n![9781430246626_Fig11-01.jpg](img/9781430246626_Fig11-01.jpg)\n\n\
  Figure 11-1 . LÖVE 的基本架构及其回调函数\n\nLÖVE 基于回调原理工作，回调可以是用户通过代码设置的自定义函数，也可以是作为回调的预定义函数。在\
  \ LÖVE 中，回调用是预定义函数。因此，如果你定义了其中一个函数，它将在适当的时候被调用。\n\n## 安装 LÖVE\n\nLÖVE 运行在桌面上。你可以通过下载源码并构建二进制文件，或者直接下载预构建的二进制文件来安装\
  \ LÖVE。LÖVE 的源码托管在 Bitbucket 上，可以从 [`bitbucket.org/rude/love`](https://bitbucket.org/rude/love)\
  \ 下载。适用于相应平台的预构建二进制文件可以从 [`love2d.org/#download`](https://love2d.org/#download)\
  \ 下载。\n\n## 运行 LÖVE\n\n在 LÖVE 中创建第一个 Hello World 程序与许多其他框架类似。我们创建一个文件夹——称之为 `Love_01`——然后在其中创建一个名为\
  \ `main.lua` 的文本文件，内容如下：\n\n```\nprint(\"Hello World from Love\")\n```\n\n我们可以通过将项目文件夹拖放到\
  \ LÖVE 可执行文件上来启动应用程序。或者，我们可以在终端中输入以下命令：\n\n```\nlove projectdir/main.lua\n```\n\n\
  我们将看到一个空白的窗口，代码中的 `print` 语句显示在终端中。要显示文本，只需在 `main.lua` 文件中添加以下代码并重新运行，你会看到如 Figure\
  \ 11-2 所示的输出。\n\n![9781430246626_Fig11-02.jpg](img/9781430246626_Fig11-02.jpg)\n\
  \nFigure 11-2 . 在 LÖVE 中运行的 Hello World\n\n```\nfunction love.draw()\n    love.graphics.print('Hello\
  \ World!', 400, 300)\nend\n```\n\n## 回调函数\n\n本节描述我们可以重写以使 LÖVE 为我们工作的回调函数。\n\n###\
  \ `love.load()`\n\n该函数在游戏启动时被调用；它类似于 JavaScript 中的 `window_onLoad` 函数或 C 语言中的 `main()`\
  \ 入口点。它只被调用一次，用于执行诸如加载资源、设置特定设置、初始化变量等任务。在面向对象的环境中，可以将其视为构造函数；它在 LÖVE 应用程序启动时只运行一次。\n\
  \n### `love.update(dt)`\n\n该函数几乎连续不断地被调用。这就像一个 `enterFrame` 事件或应用程序的心跳。传递给该函数的参数是\
  \ `dt`，即 *增量时间*（delta time）——自上次调用该函数以来经过的时间，以秒为单位。这可能是一个非常小的值——小至 0.025714 秒（取决于你的平台）。帧率也会影响增量时间。\n\
  \n### `love.draw()`\n\n这是所有屏幕绘制工作发生的地方。如果你之前有过使用 Visual C++、MFC、ATL、OWL 或 Objective-C\
  \ 进行开发的经验，你会熟悉这种类型的函数。如果在此函数外部调用任何绘制命令，它们将不会产生任何效果。\n\n### `love.mousepressed(x,\
  \ y, button)`\n\n每当按下鼠标按钮时，都会调用此函数；此函数是鼠标按下事件的处理程序，并传递鼠标按下时所在的 x 和 y 坐标。它还会获取按下了哪个鼠标按钮：左键、右键或中键。\n\
  \n### `love.mousereleased(x, y, button)`\n\n当释放鼠标按钮时，会调用此函数；它充当鼠标释放事件的处理程序，并传递鼠标释放时所在的\
  \ x 和 y 坐标以及释放的鼠标按钮。\n\n### `love.keypressed(key, unicode)`\n\n当按下键盘上的某个键时，会调用此函数；此函数充当按键按下事件的处理程序，并传递键码。`key`\
  \ 参数保存所按下键的字符，`unicode` 参数保存该键的 ASCII 码。如果你按下 `a` 键，那么 `key` 将是 `a`，`unicode` 将是\
  \ `97`。\n\n### `love.keyreleased(key)`\n\n\n\n## LÖVE 函数与命名空间\n\n当按下某个按键被释放时，会调用此函数。此函数作为按键释放事件的处理程序，并接收按键码。按键码的完整参考可以在\
  \ [`love2d.org/wiki/KeyConstant`](https://love2d.org/wiki/KeyConstant) 找到。\n\n`love.focus()`\n\
  \n当用户点击 LÖVE 窗口（或点击到其他任何窗口/桌面）时，会调用此函数。这对于判断游戏是否处于当前窗口非常有用；如果不是，您可以暂停游戏或限制处理进程。\n\
  \n`love.quit()`\n\n当用户通过点击关闭按钮（Windows 下的 X 按钮和 Mac OS X 下的红点）关闭窗口时，会调用此函数。这可以被视为游戏退出时调用的析构函数；它可用于释放所有已加载对象的内存，甚至保存游戏数据（如果有的话）。\n\
  \n### LÖVE 命名空间\n\nLÖVE 系统有多个命名空间，每个命名空间都包含相关函数。前面章节描述的函数属于全局 `love` 命名空间，因此以 `love.`\
  \ 为前缀。其他命名空间将在本节中介绍。\n\n#### `love.audio`\n\n此命名空间提供了从扬声器输出音频的接口。该命名空间负责播放实际的声音。所有与音频处理相关的功能都可以在这里找到，包括更改音量、播放、暂停和停止声音。\n\
  \n#### `love.event`\n\n正如我们之前所学，此命名空间管理事件。所有事件（例如按键、鼠标点击等）都属于 `love.event` 命名空间。\n\
  \n应用程序使用*事件队列*在应用内部进行通信。这类似于事件分发器和事件监听器。\n\n```lua\n-- 使用事件队列\nfunction love.keypressed(k)\n\
  \    if k == 'escape' then\n       love.event.push('quit') -- 退出游戏\n        -- 在\
  \ LÖVE 7.0 中，你只需将 'q' 压入事件队列\n    end\nend\n\n-- 使用 event.poll\nfor event, arg1,\
  \ arg2, arg3, arg4 in love.event.poll() do\n    if event == \"quit\" then -- 退出！\n\
  \        -- 在 LÖVE 7.0 中，你需要查找 'q'\n    end\nend\n```\n\n`love.event.wait` 是一个阻塞函数（即它会停止应用程序并等待，直到找到一个事件）。\n\
  \n```lua\nevent, arg1, arg2, arg3 = love.event.wait( )\n```\n\n**注意** LÖVE 0.7.2\
  \ 和 0.8.0 在 `love.event` 函数返回的参数数量上存在一些差异。\n\n#### `love.filesystem`\n\n此命名空间提供了对用户文件系统的接口。可以说，这是一个沙盒环境，仅授权访问两个目录：\n\
  \n* `.love` 归档文件（或源目录）的根文件夹\n* 游戏*保存目录*的根文件夹\n\n写入权限仅授予游戏的保存目录。该目录在不同操作系统上的位置如下：\n\
  \n* *Windows XP*: `C:\\Documents and Settings\\user\\Application Data\\Love\\` 或\
  \ `%appdata%\\Love\\`\n* *Windows Vista 和 7*: `C:\\Users\\user\\AppData\\Roaming\\\
  LOVE` 或 `%appdata%\\Love\\`\n* *Linux*: `$XDG_DATA_HOME/love/` 或 `~/.local/share/love/`\n\
  * *Mac*: `/Users/user/Library/Application Support/LOVE/`\n\n#### `love.font`\n\n\
  此命名空间提供了一系列用于处理字体的函数。该命名空间中的函数允许创建或使用自定义字体。\n\n#### `love.graphics`\n\n此命名空间提供了非常大量的图形相关函数。所有图形功能相关的函数都位于此处。\n\
  \n#### `love.image`\n\n`love.image` 命名空间包含一系列可用于解码和编码图像文件的函数。\n\n#### `love.joystick`\n\
  \n此命名空间包含的功能类似于鼠标和触控板相关的函数。摇杆只是另一种输入选项。\n\n#### `love.mouse`\n\n此命名空间提供了对用户鼠标的接口。它包含一些函数，可以获取鼠标光标的\
  \ x、y 坐标，显示和隐藏光标，以及确定鼠标的状态（例如，某个按钮是否被按下）。\n\n#### `love.physics`\n\n此命名空间包含了用于在应用或游戏中引入物理效果的\
  \ Box2D 函数集。尽管大多数框架中物理接口都很简单，但其底层的 Box2D 仍然庞大且复杂。\n\n#### `love.sound`\n\n不要与 `love.audio`\
  \ 命名空间混淆，`sound` 命名空间中的函数用于处理编码的声音文件。此命名空间提供了音频文件编码函数。\n\n#### `love.thread`\n\n\
  此命名空间提供了用于处理线程的函数。\n\n#### `love.timer`\n\n此命名空间是所有计时器相关函数的所在地。\n\n## 图形模块\n\n图形库帮助创建所有的线条、形状、文本、图像和其他可绘制对象。它也负责处理诸如粒子和画布之类的特殊对象。\n\
  \n构成 LÖVE 的图形对象有几种类型：\n\n*   **Canvas**（画布）：这是离屏渲染目标。\n*   **Drawable**（可绘制对象）：包含所有可以绘制的项目。\n\
  *   **Font**（字体）：可以在屏幕上绘制的字符。\n*   **Framebuffer**（帧缓冲）：这是离屏渲染目标。\n*   **Image**（图像）：可以被绘制的图像。\n\
  *   **ParticleSystem**（粒子系统）：这是粒子系统，可用于创建酷炫特效。\n*   **PixelEffect**（像素特效）：这是像素着色器。\n\
  *   **Quad**（四边形）：一个包含纹理信息的四边形。\n*   **SpriteBatch**（精灵批处理）：将几何图形存储在缓冲区中以便稍后绘制。\n\
  \n### 图像\n\n我们可以使用 `newImage` 函数加载图像；但是，要将其显示在屏幕上，执行绘制的代码必须放在 `love.draw` 回调函数中。下面的代码将显示如图\
  \ 11-3 所示的输出。\n\n![9781430246626_Fig11-03.jpg](img/9781430246626_Fig11-03.jpg)\n\
  \n图 11-3。使用 LÖVE 显示图像\n\n```lua\nlocal theImage, x, y\nfunction love.load()\n  \
  \ theImage = love.graphics.newImage(\"myImage.png\")\n   x = 50\n   y = 50\nend\n\
  function love.draw()\n   love.graphics.draw(theImage, x, y)\nend\n```\n\n在以下代码中，我们可以加载一个图像（可称为纹理），并且可以多次使用此纹理进行显示，而无需重新加载。\n\
  \n```lua\nimg = love.graphics.newImage(\"myImage.png\")\nwd, ht = img:getWidth(),\
  \ img:getHeight()\nfunction love.draw()\n  love.graphics.draw(img, 10, 10)\n  love.graphics.draw(img,\
  \ 10+wd, 10)\n  love.graphics.draw(img, 10, 10+ht)\n  love.graphics.draw(img, 10+wd,\
  \ 10+ht)\nend\n```\n\n例如，你可以将此技术用于基于瓦片的游戏，其中需要平铺或重复显示图像。\n\n![9781430246626_Fig11-04.jpg](img/9781430246626_Fig11-04.jpg)\n\
  \n图 11-4。多次显示同一图像\n\n如果我们想显示图像的轮廓，可以将图像重新着色为黑色，如图 11-5 所示。这可以通过简单的函数 `setColor`\
  \ 实现。\n\n![9781430246626_Fig11-05.jpg](img/9781430246626_Fig11-05.jpg)\n\n图 11-5。将图像着色为黑色以创建蒙版或剪影\n\
  \n```lua\nlocal theImage, x, y\nfunction love.load()\n   theImage = love.graphics.newImage(\"\
  myImage.png\")\n   x = 50\n   y = 50\n   love.graphics.setColor(0,0,0,255)\n   love.graphics.setBackgroundColor(255,255,255,255)\n\
  end\nfunction love.draw()\n   love.graphics.draw(theImage, x, y)\nend\n```\n\n你可以在儿童游戏中使用此技术——例如，让孩子们通过黑色剪影猜测物体是什么。\n\
  \n## 移动对象\n\n你之前了解了 `love.update` 函数，它相当于其他框架中的 `enterFrame`。在此练习中，我们将使用它来使 `myImage2.png`\
  \ 在屏幕上移动。\n\n```lua\nlocal _W, _H = love.graphics.getWidth(), love.graphics.getHeight()\n\
  local dirX, dirY = 10, 10\n\nlocal theImage, x, y\nfunction love.load()\n   theImage\
  \ = love.graphics.newImage(\"myImage2.png\")\n   x = 50\n   y = 50\n   love.graphics.setColor(0,0,0,255)\n\
  \   love.graphics.setBackgroundColor(255,255,255,255)\nend\n\nfunction love.draw()\n\
  \   love.graphics.draw(theImage, x, y)\nend\n```\n\n\n\n### 使用键盘和鼠标控制图像\n\n### 基本移动逻辑\n\
  \n```lua\nfunction love.update(dt)\n  x = x + dirX\n  y = y + dirY\n\nif x < 0 or\
  \ x > _W then dirX = - dirX end\n  if y < 0 or y > _H then dirY = - dirY end\nend\n\
  ```\n\n首先，我们获取窗口的宽度和高度。这在不同的系统上可能不同，或者可以通过`conf.lua`文件设置。我们使用`getWidth`和`getHeight`函数来获取当前窗口的尺寸，并将其保存在`_W`和`_H`变量中。\n\
  \n接下来，我们设置移动速度；在本例中，我们将`dirX`和`dirY`变量设置为 10 和 10。这将用于在每次`update`调用时改变图像的位置。\n\n\
  在`love.load`函数中（该函数在应用启动时仅被调用一次），我们加载图像并将其赋值给变量`theImage`，然后将`x`和`y`变量设置为 50 和 50，这将是图像的起始位置。\n\
  \n在`love.draw`函数中，我们将图像定位在`x`和`y`处。\n\n在我们的`love.update`函数中，我们通过`dirX`和`dirY`递增`x`和`y`，然后检查`x`或`y`的位置是否超出了窗口的边界（0,0\
  \ 或宽度、高度）。如果`x`或`y`坐标超出窗口边界，我们相应地反转`dirX`或`dirY`，从而产生弹跳效果，并将图像放回窗口边界内。\n\n### 活动窗口\n\
  \n`love.focus`函数可用于判断窗口是否处于活动状态并拥有焦点。例如，当当前窗口失去焦点时，可以使用该函数停止处理，并在重新获得焦点时继续处理。\n\n\
  我们在现有代码顶部添加一行：\n\n```lua\nlocal current = true\n```\n\n然后在代码末尾添加一个函数：\n\n```lua\n\
  function love.focus(f)\n    current = f\nend\n```\n\n最后，我们重新定义`update`函数如下：\n\n\
  ```lua\nfunction love.update(dt)\n  if current then\n    x = x + dirX\n    y = y\
  \ + dirY\n\nif x < 0 or x > _W then dirX = - dirX end\n    if y < 0 or y > _H then\
  \ dirY = - dirY end\n  end\nend\n```\n\n因此，每当我们离开窗口时，`love.focus`函数被触发，并根据窗口是否拥有焦点将`current`变量设置为`true`或`false`。在`update`中，如果`current`变量不为`false`或`nil`，我们则递增图像的位置。因此，当我们切换离开应用窗口时，图像会冻结，而当我们再次点击窗口时，图像会开始移动。\n\
  \n### 使用键盘移动\n\n如果我们想使用键盘而不是`love.update`函数在屏幕上移动图像，可以使用`love.keypressed`函数。\n\n\
  ```lua\nlocal _W, _H = love.graphics.getWidth(), love.graphics.getHeight()\nlocal\
  \ dirX, dirY = 10, 10\n\nlocal theImage, x, y\nfunction love.load()\n   theImage\
  \ = love.graphics.newImage(\"myImage3.png\")\n   x = 50\n   y = 50\n   love.graphics.setColor(0,0,0,255)\n\
  \   love.graphics.setBackgroundColor(255,255,255,255)\nend\n\nfunction love.draw()\n\
  \   love.graphics.draw(theImage, x, y)\nend\n\nfunction love.keypressed(key, unicode)\n\
  \    if key==\"up\" then\n        y = y - dirY\n    elseif key ==\"down\" then\n\
  \        y = y + dirY\n    elseif key==\"left\" then\n        x = x - dirX\n   \
  \ elseif key ==\"right\" then\n        x = x + dirX\n    end\nend\n```\n\n在这个例子中，图像仅在按下相应按键时移动。\n\
  \n我们可以添加另一个函数`love.mousepressed`，该函数在每次使用鼠标时被调用。我们可以将图像定位到鼠标点击的位置。仅当按下鼠标左键时，我们才重新定位图像。\n\
  \n```lua\nfunction love.mousepressed(x1, y1, button)\n    if button == \"l\" then\n\
  \        x = x1\n        y = y1\n    end\nend\n```\n\n您可能会注意到这并不流畅，在游戏设置中难以接受。您需要每次敲击按键然后释放它来让对象移动。然而，我们可以基于方向键创建更平滑的移动。为此，我们可以将按键处理例程从其自己的函数中移出，移到`update`函数中。这样我们就可以更频繁地检查按键状态。\n\
  \n```lua\nlocal _W, _H = love.graphics.getWidth(), love.graphics.getHeight()\nlocal\
  \ dirX, dirY = 10, 10\n\nlocal theImage, x, y\nfunction love.load()\n   theImage\
  \ = love.graphics.newImage(\"myImage3.png\")\n   x = 50\n   y = 50\n   love.graphics.setColor(0,0,0,255)\n\
  \   love.graphics.setBackgroundColor(255,255,255,255)\nend\n\nfunction love.draw()\n\
  \   love.graphics.draw(theImage, x, y)\nend\n\nfunction love.update(dt)\n    local\
  \ key = love.keyboard.isDown\n    if key(\"up\") then\n        y = y - dirY\n  \
  \  elseif key(\"down\") then\n        y = y + dirY\n    elseif key(\"left\") then\n\
  \        x = x - dirX\n    elseif key(\"right\") then\n        x = x + dirX\n  \
  \  end\nend\n```\n\n现在移动应该更加流畅了。\n\n最后，我们需要修复图像，使其能够朝我们选择的方向转动，而不是像太空步一样向后移动。以下是实现方法：\n\
  \n```lua\nlocal _W, _H = love.graphics.getWidth(), love.graphics.getHeight()\nlocal\
  \ dirX, speed = 1, 10\n\nlocal theImage, x, y\nfunction love.load()\n   theImage\
  \ = love.graphics.newImage(\"myImage3.png\")\n   x = 50\n   y = 50\n   love.graphics.setColor(0,0,0,255)\n\
  \   love.graphics.setBackgroundColor(255,255,255,255)\nend\n\nfunction love.draw()\n\
  \   love.graphics.draw(theImage, x, y, 0, dirX, 1)\nend\n\nfunction love.update(dt)\n\
  \    local key = love.keyboard.isDown\n    if key(\"up\") then\n        y = y -\
  \ dirY\n    elseif key(\"down\") then\n        y = y + dirY\n    elseif key(\"left\"\
  ) then\n        x = x - dirX\n                dirX = -1\n    elseif key(\"right\"\
  ) then\n        x = x + dirX\n        dirX = 1\n    end\nend\n```\n\n这使我们无需创建新精灵就能实现所需效果。我们通过操纵缩放因子来实现。`draw`函数可以接受很多参数：\n\
  \n```lua\nlove.graphics.draw(imgObject, x, y, angle, sx, sy, ox, oy, kx, ky)\n```\n\
  \n这里，`sx`和`sy`是我们感兴趣的参数。将它们保持为 1 时，我们不会改变图像的大小，但将其设置为 1 或-1 时，我们可以翻转图像，因此-1 是水平翻转图像，-1\
  \ 是垂直翻转图像。图 11-6 显示了这如何在 x 轴上镜像我们的图像。\n\n![9781430246626_Fig11-06.jpg](img/9781430246626_Fig11-06.jpg)\n\
  \n图 11-6 . 镜像图像\n\n### 旋转玩家\n\n在您的游戏中，您可能希望根据点击位置旋转玩家图形——例如，在塔防类游戏中，玩家手持枪支。\n\n\
  如前所述，数学或代码可应用于任何框架，因此要根据屏幕上的某个点确定旋转角度，我们可以使用以下公式：\n\n```lua\ntheAngle = math.atan2(posY\
  \ - startY, posX - startX)\n```\n\n`startX`和`startY`是玩家的坐标（如我们之前的例子所示），`posX`和`posY`是屏幕上某个点的坐标。\n\
  \n利用这个知识，让我们在屏幕上创建一个始终指向鼠标光标方向的图像。\n\n```lua\nlocal _W, _H = love.graphics.getWidth(),\
  \ love.graphics.getHeight()\nlocal dirX, dirY = 10, 10\nlocal theImage, x, y\nlocal\
  \ theAngle = 0\nfunction love.load()\n   theImage = love.graphics.newImage(\"myImage.png\"\
  )\n   x = 50\n   y = 50\n   love.graphics.setColor(0,0,0,255)\n   love.graphics.setBackgroundColor(255,255,255,255)\n\
  end\n\nfunction love.draw()\n   love.graphics.draw(theImage, x, y, theAngle)\nend\n\
  function love.update(dt)\n  local mouseX, mouseY = love.mouse.getX(), love.mouse.getY()\n\
  \  theAngle = math.atan2(mouseY - y, mouseX - x)\nend\n```\n\n现在，在屏幕上移动光标，您会发现图像转向指向光标当前所在的位置。为了使其看起来更好，我们可以添加一个显示在当前位置的十字准星。\n\
  \n我们对代码所做的更改是使用`love.mouse.setVisible`函数隐藏光标，并显示十字准星图像在光标应处的位置。\n\n\n\n```lua\n\
  local _W, _H = love.graphics.getWidth(), love.graphics.getHeight()\nlocal dirX,\
  \ dirY = 10, 10\nlocal theImage, x, y\nlocal theAngle = 0\nlocal crosshair\nfunction\
  \ love.load()\n   theImage = love.graphics.newImage(\"myImage.png\")\n   crosshair\
  \ = love.graphics.newImage(\"crosshair.png\")\n   x = _W/2\n   y = _H/2\n   love.graphics.setBackgroundColor(255,255,255,255)\n\
     love.mouse.setVisible(false)\nend\n\nfunction love.draw()\n   love.graphics.draw(theImage,\
  \ x, y, theAngle)\n   love.graphics.draw(crosshair, love.mouse.getX(), love.mouse.getY())\n\
  end\nfunction love.update(dt)\n  local mouseX, mouseY = love.mouse.getX(), love.mouse.getY()\n\
  theAngle = math.atan2(mouseY - y, mouseX - x)\nend\n```\n\n**注意:** 当我们设置 x 和 y 坐标时，这通常是左上角的位置，所以图像并不完全以\
  \ (x, y) 为中心。\n\n![9781430246626_Fig11-07.jpg](img/9781430246626_Fig11-07.jpg)\n\
  \n图 11-7. LÖVE 中的屏幕坐标\n\n## 绘制基本图形\n\n现在我们已经在图像上做了一些尝试，接下来将学习矢量图形——矩形、圆形等。在许多游戏中，这些基本图形可以帮助创建背景，而无需额外的图形图像开销。\n\
  \n### 线条\n\n所有矢量绘图对象中最简单的就是线条。线条是连接两点之间的一系列点。绘制线条的语法是：\n\n```lua\nlove.graphics.line(x1,\
  \ y1, x2, y2,...)\n```\n\n你可以指定一系列的点，它们都会被绘制出来。线条对象也可以通过 `LineWidth` 和 `LineStyle`\
  \ 属性进行修改，既可以单独修改，如 `love.graphics.setLineWidth` 和 `love.graphics.setLineStyle`，也可以一次性修改，如\
  \ `love.graphics.setLine(width, type)`。下面的代码中，我们设置线宽为 2 并使用平滑类型（`smooth`），然后从 (15,\
  \ 15) 到 (70, 90) 绘制一条线。\n\n```lua\nlove.graphics.setLine(2,\"smooth\")\nlove.graphics.line(15,\
  \ 15, 70,90)\n```\n\n### 矩形\n\n这是绘制矩形的语法：\n\n```lua\nlove.graphics.rectangle( mode,\
  \ x, y, width, height )\n```\n\n`mode` 可以是 `fill`（填充矩形）或 `line`（仅显示矩形轮廓，不填充）。\n\n\
  在这个例子中，我们将通过绘制国际象棋棋盘来实践矩形的概念。棋盘的特点是由交替颜色的方格组成，通常是 8×8 的大小。\n\n```lua\nlocal _W,\
  \ _H = love.graphics.getWidth(), love.graphics.getHeight()\nlocal smaller = math.min(_W,\
  \ _H)\nlocal tileSize = math.floor(smaller/10)  -- 为上下留出空间\n\nfunction love.load()\n\
      love.graphics.setColor(0,0,0,255)\n    love.graphics.setBackgroundColor(255,255,255)\n\
  end\n\nfunction drawBoard()\n  local mode = 1\n  for i = 1, 8 do\n    for j = 1,\
  \ 8 do\n      if mode ==1 then\n        theMode = \"fill\"\n      else\n        theMode\
  \ = \"line\"\n      end\n      mode = 1 - mode\n      love.graphics.rectangle(theMode,\
  \ j*tileSize, i*tileSize, tileSize, tileSize)\n    end\n   mode = 1 - mode\n  end\n\
  end\nfunction love.draw()\n  drawBoard()\nend\n```\n\n代码相当简单直接，我们利用 `1 - 1 = 0`\
  \ 和 `1 - 0 = 1` 这一事实来切换 `fill` 和 `line`。因此 `1 - mode` 帮助我们切换 `mode` 中保存的值（在 0 和\
  \ 1 之间）。然后，使用 `if` 语句，如果 `mode` 值为 1，则设置 `theMode` 为 `fill`；如果 `mode` 值为 0，则设置为\
  \ `line`。由于我们处理的是偶数个方格，在内层循环结束时，`mode` 的值会恢复为初始值，因此我们再次进行一次切换。这样，下一行就会以交替的模式开始，从而形成交替的图案。如果想看看如果不这样做会发生什么，可以将矩形函数后面的\
  \ `mode = 1 - mode` 注释掉，然后查看代码渲染效果。\n\n### 圆形\n\n绘制圆形的函数语法是：\n\n```lua\nlove.graphics.circle(mode,\
  \ x, y, radius, segments)\n```\n\n`mode` 和之前一样，是 `fill` 或 `line`；`x` 和 `y` 是圆心点；`radius`\
  \ 是圆的大小。默认的片段数（`segments`）是 10，这会导致绘制出一个有锯齿的圆，适用于调试或资源较少的系统。为了获得平滑高质量的圆，推荐片段数设为\
  \ 100。\n\n让我们尝试动画化一些圆形：\n\n```lua\nlocal circles = {}\nfunction love.mousepressed(x,\
  \ y, button)\n  if button == \"l\" then\n    newCircle = {\n      size = 0,\n      n\
  \ = 20,\n      x = x,\n      y= y\n      }\n    table.insert(circles, newCircle)\n\
    end\nend\nfunction love.update(dt)\n  for _, c1 in pairs(circles) do\n    c1.size\
  \ = c1.size + c1.n * dt\n  end\nend\n\nfunction love.keypressed(key)\n  if key ==\
  \ \" \" then\n    circles = {}\n  end\nend\nfunction love.draw()\n  for _, c in\
  \ pairs(circles) do\n    love.graphics.circle( \"line\", c.x, c.y, c.size, 100)\n\
    end\nend\n```\n\n这段代码使圆圈无限增长。但是，我们可以为圆圈的大小设置最大和最小限制。\n\n让我们选择最大值为 20，最小值为 0。为此，我们只需要修改\
  \ `update` 函数，如下所示：\n\n```lua\nfunction love.update(dt)\n  for _, c1 in pairs(circles)\
  \ do\n    c1.size = c1.size + c1.n * dt\n    if c1.size < 0 then\n      c1.size\
  \ = 0\n      c1.n = c1.n * -1\n    elseif c1.size > 20 then\n      c1.size = 20\n\
        c1.n = c1.n * -1\n    end\n  end\nend\n```\n\n### 多边形\n\n多边形使用 `love.graphics.polygon`\
  \ 函数绘制，其语法如下：\n\n```lua\nlove.graphics.polygon(mode, vertices)\n```\n\n`vertices`\
  \ 构成一个包含绘制形状所需点的表格。下面的例子绘制了一个朝下的三角形：\n\n```lua\nlove.graphics.polygon (\"fill\"\
  , 100,100,200,100,150,200)\n```\n\n**注意：** 如果使用 `fill` 模式，多边形必须是凸且简单的；否则可能会产生渲染伪影。\n\
  \n### 四边形\n\n我们还可以使用 `love.graphics.quad` 函数绘制四边形形状（四边多边形）。语法是：\n\n```lua\nlove.graphics.quad(\
  \ mode, x1, y1, x2, y2, x3, y3, x4, y4 )\n```\n\n虽然四边形看起来和多边形很相似，但它们可用于不同的目的——例如，将指定图像的一部分复制到屏幕上。你可以从一张存储了系列图像（纹理）的图片创建动画，然后利用四边形来帮助显示图像的部分区域。\n\
  \n我们可以使用 `newQuad` 函数创建一个四边形，然后使用 `drawq` 函数将其绘制到屏幕上。这对于创建动画表非常有用。\n\n![9781430246626_Fig11-08.jpg](img/9781430246626_Fig11-08.jpg)\n\
  \n图 11-8. 用于动画化火柴人的精灵表（图片由 Bonzo Industries 提供；[`bonzo_industries.webs.com/sprites.htm`](http://bonzo_industries.webs.com/sprites.htm)）\n\
  \n```lua\nlg = love.graphics\nsheet = lg.newImage(\"stick.png\")\nwd, ht = sheet:getWidth(),\
  \ sheet:getHeight()\nframeCount = 11\nframeSpeed = 5\ntileWd, tileHt = 39, 62\n\
  delay = 0\ncurr = 1\nscale = 2\nframes = {}\nfunction love.load()\n   for i=1, frameCount\
  \ do\n    frames[i] = lg.newQuad((i-1)*tileWd, 0, tileWd, tileHt)\n  end\nend\n\
  function love.draw()\n  lg.drawq(sheet, frames[curr], (_W-(tileWd*scale))/2, (_H-(tileHt*scale))/2,\
  \ 0, scale, scale)\nend\nfunction love.update(dt)\n  delay = delay + 1\n  if delay\
  \ > frameSpeed then\n    delay = 0\n   curr = curr + 1\n   if curr > frameCount\
  \ then curr = 1 end\n  end\nend\n```\n\n在我们的 `love.load` 函数中，我们创建并存储了代表每一帧的四边形。这有助于提高速度和效率。之后，我们只需引用存储在表格中的四边形，就可以简单地绘制序列中的任何一帧。要获取第四帧，我们只需引用第四个四边形（即\
  \ `frames[4]`）。在我们的 `drawq` 函数中，我们将 `tileWd` 和 `tileHt` 乘以缩放值（`scale`），并且也将缩放值作为参数传递。这有助于以指定的缩放比例创建动画，在我们的例子中是双倍大小（即\
  \ 2）。\n\n\n  \n为了让动画可见，我们通过`love.update`函数中的循环使其减慢，每 5 次更新递增一帧。这仅用于演示目的；如果此动画至关重要，则必须依赖`dt`（经过时间）而非\
  \ 5 次更新，以在所有平台上实现相同帧率。如果运行系统较慢，这可能导致某些帧被跳过。  \n\n我们可以看到一个蹒跚行走的火柴人，如图 Figure 11-9\
  \ 所示。  \n\n![9781430246626_Fig11-09.jpg](img/9781430246626_Fig11-09.jpg)  \n\nFigure\
  \ 11-9. 我们的火柴人动画  \n\n## 应用程序设置 – `conf.lua`  \n\nLÖVE 允许你配置应用程序的设置。为此，你需要一个`conf.lua`文件，其中必须包含一个`love.conf`函数。如果`conf.lua`文件存在，它会在`main.lua`之前运行。\
  \  \n\n我们可以创建任意大小的应用程序窗口。此示例将应用程序设置为移动应用屏幕尺寸 320×480（参见 Figure 11-10）。  \n\n![9781430246626_Fig11-10.jpg](img/9781430246626_Fig11-10.jpg)\
  \  \n\nFigure 11-10. 以移动应用尺寸运行应用程序  \n\n```\nfunction love.conf(t)\n  t.screen.width\
  \ = 320\n  t.screen.height = 480\n  t.title = \"iPhone3\"\n  t.author = \"Jayant\
  \ C Varma\"\nend\n```\n\n可以添加到`love.conf`函数中的其他设置包括`t.screen.fullscreen`，其值可为`true`或`false`。\
  \  \n\n你还可以使用模块设置来启用或禁用某些模块。以下是一些示例：  \n\n```\nt.modules.joystick = false\nt.modules.keyboard\
  \ = true\nt.modules.event = true\nt.modules.physics = false\n```\n\n## 创建效果  \n\n\
  LÖVE 预装了粒子效果，因此你可以在应用或游戏中创建许多壮观的效果，包括烟雾轨迹、雾和雪。  \n\n要创建粒子，我们需要创建一个 *粒子发射器*——一个将发射粒子的源。然后我们需要设置粒子的参数（例如，移动速度、生命周期、衰变时间、粒子类型等）。\
  \  \n\n```\nfunction love.load()\n  img = love.graphics.newImage(\"part2.png\")\n\
  \  p = love.graphics.newParticleSystem(img, 256)\n  -- 创建一个新的粒子发射器，它发射具有图像 img 的粒子，最多可有\
  \ 256 个粒子。\n  p:setEmissionRate(20)\n  p:setLifetime(1)\n  p:setParticleLife(4)\n\
  \  p:setPosition(50,50)\n  p:setDirection(0)\n  p:setSpread(2)\n  p:setSpeed(10,30)\n\
  \  p:setGravity(30)\n  p:setRadialAcceleration(10)\n  p:setTangentialAcceleration(0)\n\
  \  p:setSize(1)\n  p:setSizeVariation(0.5)\n  p:setRotation(0)\n  p:setSpin(0)\n\
  \  p:setSpinVariation(0)\n  p:setColor(200,200,255,240,255,255,255,10)\n  p:stop()\n\
  end\n\nfunction love.update(dt)\n  p:start()  -- 创建一个粒子爆发\n  p:update(dt) -- 根据需要更新粒子的位置\n\
  end\n\nfunction love.draw()\n  love.graphics.draw(p, 20, 0)\nend\n```\n\n如果你希望粒子发射器跟随鼠标移动，只需将`love.update`函数修改如下：\
  \  \n\n```\nfunction love.update(dt)\n  p:setLocation(love.mouse:getX(), love.mouse:getY())\n\
  \  p:start()  -- 创建一个粒子爆发\n  p:update(dt) -- 根据需要更新粒子的位置\nend\n```\n\n现在，粒子发射器将移动到鼠标光标的位置。如果你希望移除指针，请在`love.load`函数中添加以下行：\
  \  \n\n```\nlove.mouse.setVisible(false)\n```\n\n如图 Figure 11-11 所示，这将创建一个喷出粒子的粒子发射器。你可以尝试调整各种`setGravity`值；例如，负数会使粒子漂浮。你还可以调整`setSize`来改变粒子的大小，以及调整`setColor`来改变粒子的颜色。\
  \  \n\n![9781430246626_Fig11-11.jpg](img/9781430246626_Fig11-11.jpg)  \n\nFigure\
  \ 11-11. 跟随鼠标指针的粒子效果  \n\n\n  \n**提示**：如果你希望可视化地创建粒子效果，有一款用 LÖVE 编写的应用程序可以实现交互式粒子创建。你可以在[`love2d.org/forums/viewtopic.php?f=5&t=8747&sid=9bf680d6ed9857549d63fb2ba63fc078`](https://love2d.org/forums/viewtopic.php?f=5&t=8747&sid=9bf680d6ed9857549d63fb2ba63fc078)找到它。\n\
  \n### 物理引擎\n\n在物理引擎方面，Box2D 是所有框架的共同核心。如前所述，Box2D 是一个非常复杂且庞大的库。虽然有些框架封装并提供了少量函数来使用该库，但\
  \ LÖVE 为开发者提供了完整的访问权限，因此创建物理体需要多几个额外步骤。\n\n首先，我们需要设置物理世界，在其中定义其边界。一个不错的起点是使用屏幕尺寸作为世界的大小。\n\
  \n```\nworld = love.physics.newWorld(0,0,_W,_H)\n```\n\n**注意**：在 LÖVE 0.8.0 中，`love.physics.newWorld`函数的参数已更改为接收重力的\
  \ x、y 分量以及是否允许物体休眠：`love.physics.newWorld( xg, yg, sleep )`。\n\n接下来，我们设置物体的缩放比例（这在\
  \ Corona SDK 中是无法实现的，这也导致其在物理体方面存在一些缺陷）：\n\n```\nworld:setMeter( number )\n```\n\
  \n这个物理世界中的所有坐标都会除以这个数值。这是一种无需图形变换即可在屏幕上绘制的便捷方法。\n\n然后，我们创建物理体：\n\n```\nlocal body\
  \ = love.physics.newBody(world, 10, 10, 0, 0)\n```\n\n传递的参数依次是：世界对象、x 坐标、y 坐标、物体的质量以及物体的转动惯量。\n\
  \n物理世界不会自动更新自己，需要由我们来手动更新。我们可以通过`love.update`方法来确保它更新，如下所示：\n\n```\nfunction love.update(dt)\n\
    world:update (dt)\nend\n```\n\n**注意**：在 LÖVE 0.8.0 中，此函数已被修改，不再接受质量和惯量参数，而是接收一个定义物体类型的字符串，类型可以是静态（static）、动态（dynamic）或运动学（kinematic），定义方式为`love.physics.newBody(\
  \ world, x, y, type )`。\n\n创建物体后，我们需要赋予它一个形状。这是物理对象上的边界框，可以是矩形、圆形、多边形、边缘形状或链状形状。*边缘形状*是一个线段，而*链状形状*则由多个线段组成。\n\
  \n```\nlocal bodyshape = local.physics.newRectangleShape(body, 0, 0, 20, 40, 0)\n\
  ```\n\n这段代码赋予了物体一个矩形形状，起始位置相对于物体为(0, 0)，宽度为 20 个单位，高度为 40 个单位。\n\n如果此时运行这段代码，什么也不会发生。我们还需要将物体绘制到屏幕上。为此，我们需要在`love.draw()`函数中绘制形状：\n\
  \n```\nfunction love.draw()\n  love.graphics.rectangle(\"fill\", body:getX(), body:getY(),\
  \ 20, 40)\nend\n```\n\n现在，你会看到屏幕左上角绘制了一个矩形。但它并不会像物理体那样自动移动。这是因为质量当前被设置为 0，意味着物体没有重量，因此不会移动。如果我们修改它，赋予它一点重量，它就会开始下落或上升（取决于重力设置）。如果在这个例子中给物体赋予一个正的质量值，它将会掉出屏幕，因为没有其他物体阻止它下落。\n\
  \n我们为`bodyShape`选择矩形而非多边形的原因之一是：由于这个对象将是一个动态对象，我们需要它随着移动而被绘制。使用`body:getX()`和`body:getY()`函数可以获取对象的当前\
  \ x 和 y 位置并在此绘制。如果我们使用了多边形方法，它会在固定位置创建一个静态对象。\n\n我们在`love.load()`函数中添加以下两行代码：\n\n\
  ```\nground = love.physics.newBody(world, 400,600,0,0)\ngroundShape = love.physics.newRectangleShape(ground,\
  \ 0,0,800,65,0)\n```\n\n这创建了一个名为`ground`的静态对象，它是一个矩形形状的物体。然后我们在`love.draw()`函数中添加以下代码，用于渲染实心形状：\n\
  \n```\nlove.graphics.polygon(\"fill\", groundShape:getPoints())\n```\n\n现在，底部有了一个地面，它可以防止较小的物理体掉出屏幕。\n\
  \n我们还可以通过鼠标点击为物体添加冲量来实现交互功能。这通过`love.mousepressed`函数实现：\n\n```\nfunction love.mousepressed(key,\
  \ button)\n  if button == \"l\" then\n    body:addImpulse(0,-20)\n  end\nend\n```\n\
  \n当我们在窗口中点击时，物体会跳起，然后再次落回地面。你可以将冲量值改为更大或更小的数字来改变结果。\n\n当物体超出我们设置的世界范围时，它会被移除，所以如果它跳得过高，就不会再返回。如果你希望物体跳出屏幕后能返回，那么需要创建一个比屏幕尺寸更大的世界——例如：\n\
  \n```\nworld = love.physics.newWorld(−_W, -_H, _W*2, _H*2)\n```\n\n## 显示文本\n\n在游戏中，除了精灵、物理体等元素之外，我们可能还希望在屏幕上显示文本。我们使用`love.graphics`库中的`print`或`printf`函数。以下是`print`函数的示例：\n\
  \n```\nlove.graphics.print(\"Hello world\", 10, 10)\n```\n\n下面是`printf`函数的示例：\n\n\
  ```\nlove.graphics.printf(\"Hello World finally but right aligned\", 25, 45, 30,\
  \ \"right\")\n```\n\n如前所述，这需要放在`love.draw`函数中；否则，它不会在屏幕上显示。\n\n`print`函数只是将文本绘制在提供的\
  \ x、y 坐标处，而`printf`函数则绘制格式化、自动换行并对齐的文本。`printf`函数的语法是：\n\n```\nprintf(text, x, y,\
  \ width, alignment)\n```\n\n`alignment`参数是一个字符串，可以是`left`、`right`或`center`，`width`参数指定文本的宽度；任何超过该值的文本都会自动换行。\n\
  \n正如前面“图像”部分所述，我们可以通过`love.graphics.setColor`函数设置颜色。这将为后续绘制的所有对象设置颜色。因此，管理颜色的方法是在绘制每个对象之前为其设置颜色。\n\
  \n要打印彩虹的七种颜色，我们可以使用：\n\n```\nlg = love.graphics\nlgc = love.graphics.setColor\n\
  function love.load()\n  lg.setBackgroundColor(255,255,255)\nend\n\nfunction love.draw()\n\
    lgc(141,56,201) -- 紫色\n  lg.print(\"Violet\", 10,10)\n  lgc(46,08,84) -- 靛色\n\
    lg.print(\"Indigo\", 10,30)\n  lgc(0,0,255) -- 蓝色\n  lg.print(\"Blue\", 10,50)\n\
    lgc(0,255,0) -- 绿色\n  lg.print(\"Green\", 10,70)\n  lgc(255,255,0) -- 黄色\n  lg.print(\"\
  Yellow\", 10,90)\n  lgc(255,165,0) -- 橙色\n  lg.print(\"Orange\", 10,110)\n  lgc(255,0,0)\
  \ -- 红色\n  lg.print(\"Red\", 10,130)\nend\n```\n\n## 着色器\n\nLÖVE 从 0.8.0 版本开始支持像素着色器，这些也被称为片段着色器。它们计算每个像素的颜色和其他属性。使用着色器，你可以生成各种效果，包括为图像添加颜色。\n\
  \n像素效果不是用 Lua 编程或描述的，而是使用 OpenGL 着色语言（GLSL），它是像素着色器使用的函数子集。请注意 GLSL 与 Lua 语法相比更接近\
  \ C 或 JavaScript 类型的语法。\n\n让我们制作一个将图像着色为黑白效果的示例：\n\n```\nlocal image = love.graphics.newImage(\"\
  myImage.png\")\nimagesx = image:getWidth()\nimagesy = image:getHeight()\n\neffect\
  \ = {}\neffect.name = \"Black and White\"\neffect.effect = love.graphics.newPixelEffect\
  \ [[\n    extern number value;\n    vec4 effect(vec4 color, Image texture, vec2\
  \ texture_coords, vec2 pixel_coords)\n      {\n        vec4 pixel = Texel(texture,\
  \ texture_coords);\n        float avg = max(0, ((pixel.r + pixel.g + pixel.b)/3)\
  \ + value/10);\n        pixel.r = avg;\n        pixel.g = avg;\n        pixel.b\
  \ = avg;\n        return pixel;\n      }\n]]\n\nvalue = 0\n```\n\n\n\n```lua\nfunction\
  \ effect.func()\n    effect.effect:send(\"value\", value)\n    love.graphics.setPixelEffect(effect.effect)\n\
  \    love.graphics.draw(image)\nend\n\nfunction love.draw()\n    love.graphics.setColor(255,255,255)\n\
  \    effect.func()\n    love.graphics.setPixelEffect()\nend\n```\n\n要反转图像的颜色，我们可以简单地将效果修改如下：\n\
  \n```lua\neffect.effect = love.graphics.newPixelEffect [[\n    vec4 effect(vec4\
  \ color, Image texture, vec2 texture_coords, vec2 pixel_coords)\n      {\n     \
  \   vec4 pixel = Texel(texture, texture_coords);\n        pixel.r = 1.0 - pixel.r;\n\
  \        pixel.g = 1.0 - pixel.g;\n        pixel.b = 1.0 - pixel.b;\n        return\
  \ pixel;\n      }\n]]\n```\n\n这也需要对`effect.func`函数进行细微调整：\n\n```lua\nfunction effect.func()\n\
  \    love.graphics.setPixelEffect(effect.effect)\n    love.graphics.draw(image)\n\
  end\n```\n\n我们所做的只是将像素的`r`、`g`和`b`颜色值设置为 1 减去原值，这类似于反转图像的顏色。如需更多特效，可以阅读 [`www.opengl.org/documentation/glsl/`](http://www.opengl.org/documentation/glsl/)\
  \ 上的 GLSL 文档，也可以自行尝试修改代码。论坛上有相当多的示例可供下载和学习。苹果公司有自己的 GLSL 文档，位于 [`developer.apple.com/library/mac/#documentation/GraphicsImaging/Conceptual/OpenGLShaderBuilderUserGuide/Introduction/Introduction.html`](https://developer.apple.com/library/mac/#documentation/GraphicsImaging/Conceptual/OpenGLShaderBuilderUserGuide/Introduction/Introduction.html)，该文档指向的是较旧的\
  \ 1.20.8 版本。应该使用这个版本而非更新的版本，因为苹果公司提供信息的版本正是 iOS 设备上可用的版本。\n\n### 制作声音\n\n如果不能播放声音，游戏框架就是不完整的。使用\
  \ LÖVE 时，我们首先需要将声音加载到内存中，然后按需播放。\n\n```lua\npopSound = love.audio.newSource(\"pop.ogg\"\
  , \"static\")\n```\n\n`\"static\"`参数告诉 LÖVE，它需要在开始播放之前完全加载并解码这个声音。这与流式播放不同，后者可以在从磁盘流式传输的过程中分段播放声音。\n\
  \n要播放声音，我们只需使用：\n\n```lua\nlove.audio.play(popSound)\n```\n\n我们来创建一个示例，每次点击窗口时都会发出“砰”的一声：\n\
  \n```lua\nfunction love.load()\n  pop = love.audio.newSource(\"pop.ogg\", \"static\"\
  )\nend\n\nfunction love.mousepressed(mx, my, mButton)\n  if mButton == \"l\" then\n\
  \    love.audio.play(popSound)\n  end\nend\n```\n\n除了播放声音，LÖVE 还提供了增大和减小音量的函数。你也可以通过使用`popSound:setPitch(value)`来改变音调，其中`value`的范围在\
  \ 0 到 1 之间。`setVolume`也使用相同的范围，可以设置为`popSound:setVolume(value)`。\n\n在这个示例中，我们会在音调上做一些有趣的变化：\n\
  \n```lua\ncount = 1\n\nfunction love.load()\n  pop = love.audio.newSource(\"pop.ogg\"\
  , \"static\")\nend\n\nfunction love.mousepressed(mx, my, mButton)\n  if mButton\
  \ == \"l\" then\n    count = count + 1\n    if count>15 then count = 1 end\n   \
  \ pop:setPitch(count/10)\n    love.audio.play(popSound)\n  end\nend\n```\n\n利用你学到的知识，尝试创建一个类似于重复气泡膜图案的网格，网格中的每个单元格使用一个气泡图像。当每个气泡被点击时，让图像变为一个已戳破的气泡，并发出“砰”的破裂声。\n\
  \n如果你想播放一些背景音乐——即在游戏期间持续循环播放，或直到你希望停止为止——可以使用`setLooping`函数：\n\n```lua\nbackgroundMusic\
  \ = love.audio.newSource(\"music.mp3\")\nbackgroundMusic:setLooping(true)\nlove.audio.play(backgroundMusic)\n\
  ```\n\n## 示例游戏代码\n\n最后这部分将给出一个游戏示例，它涵盖了本章讨论的所有主题。该示例创建了一个图片逻辑谜题（也称为数织谜题），类似于填字游戏，不同之处在于玩家需要根据提供的数字线索，用数字而不是字母来填充方格。例如，如果线索是`2`，表示该行或列包含两个连续的填充方格。线索`1,1`表示该行或列包含两个不连续的方格，且它们之间至少有一个空白方格。\n\
  \n在我们的示例中，我们将为 5×5 的网格随机创建一个谜题并生成线索，如图 11-12 所示。\n\n![9781430246626_Fig11-12.jpg](img/9781430246626_Fig11-12.jpg)\n\
  \n图 11-12 . 一个图片逻辑谜题游戏\n\n```lua\nsquares = 5\n_W = love.graphics:getWidth()\n_H\
  \ = love.graphics:getHeight()\n\nmath.randomseed(os.time())\nlocal size = 400/squares\n\
  local boxes = {}\nlocal solved = false\n\nfunction make_board()\n  solved = false\n\
  \  size = 400/squares    -- 重新计算尺寸\n  boxes = {}            -- 重置数组\n\n  -- 通过填充棋盘创建一个随机谜题\n\
  \  for x = 1, squares do\n    for y = 1, squares do\n      box = {Orig = math.random(0,1),\
  \ X = x, Y = y, Curr = 0}\n      -- 我们随机将该方格的原始值设为开或关\n      table.insert(boxes,\
  \ box)\n    end\n  end\n\n  -- 将第一行设为开启状态\n  for k,v in pairs(boxes) do\n    if\
  \ v.X == 1 then\n      v.Orig = 1\n    end\n  end\nend\n\nmake_board()\n\nfunction\
  \ findnumberx(x)\n  -- 返回列 x 的线索\n  local n = {}\n  local c = 0\n\n  for k,v in\
  \ pairs(boxes) do\n    if v.X == x then\n      if v.Orig == 1 then\n        c =\
  \ c + 1\n      else\n        if c > 0 then\n          table.insert(n, tostring(c))\n\
  \        end\n        c = 0\n      end\n    end\n  end\n\n  if c > 0 then\n    table.insert(n,\
  \ tostring(c))\n  end\n\n  return table.concat(n,\",\")\nend\n\nfunction findnumbery(y)\n\
  \  -- 返回行 y 的线索\n  local n = {}\n  local c = 0\n  for k,v in pairs(boxes) do\n \
  \   if v.Y == y then\n      c = c + 1\n    else\n      if c > 0 then\n        table.insert(n,\
  \ tostring(c))\n      end\n      c = 0\n    end\n  end\n  if c > 0 then\n    table.insert(n,\
  \ tostring(c))\n  end\n  return table.concat(n, \",\")\nend\n\nfunction love.load()\n\
  \  button_off = love.graphics.newImage(\"buttonoff.png\")\n  button_on = love.graphics.newImage(\"\
  buttonon.png\")\n  button_not = love.graphics.newImage(\"buttonnot.png\")\nend\n\
  \nfunction love.draw()\n  love.graphics.setColor(255,255,255)  -- 白色\n  love.graphics.setFont(love.graphics.newFont(12))\
  \  -- 12 磅字号\n\n  -- 绘制对应的图像：开、关或未标记\n  for k, v in pairs(boxes) do\n    if v.Curr\
  \ == 0 then\n      love.graphics.draw(button_off, v.X*size, v.Y*size, size/30, size/30,\
  \ 0, 0)\n    elseif v.Curr == 1 then\n      love.graphics.draw(button_on, v.X*size,\
  \ v.Y*size, size/30, size/30, 0, 0)\n    elseif v.Curr == 2 then\n      love.graphics.draw(button_not,\
  \ v.X*size, v.Y*size, size/30, size/30, 0, 0)\n    end\n  end\n\n  -- 显示列的线索\n \
  \ for x=1, squares do\n    love.graphics.print(findnumberx(x), x*size, size - 40)\n\
  \  end\n\n  -- 显示行的线索\n  for y=1, squares do\n    love.graphics.print(findnumbery(y),\
  \ size-40, size*y)\n  end\n\n  -- 显示谜题是否已解开\n  if solved then\n    love.graphics.setColor(255,0,0)\
  \  -- 红色\n    love.graphics.setFont(love.graphics.newFont(24))  -- 24 磅字号\n    love.graphics.print(\"\
  你已解开谜题\",\n      size + 10, _H/2)\n  end\nend\n```\n\n```lua\nfunction love.mousepressed(mx,\
  \ my, button)\n  for k, v in pairs(boxes) do\n    theBox = mx > v.X * size and my\
  \ > v.Y * size and\n             mx < v.X * size + size and my < v.Y * size + size\n\
  \    -- 检查鼠标点击位置是否在格子内\n    -- v 为当前所在格子\n    if theBox then\n      if mouse==\"\
  l\" then\n        -- 若点击左键，则设置或取消网格\n        if v.Curr == 0 or c.Curr == 2 then\n\
  \          v.Curr = 1\n        else\n          v.Curr = 0\n        end\n      elseif\
  \ mouse == \"r\" then\n      -- 若点击右键，则标记或取消网格\n        if v.Curr == 0 or v.Curr\
  \ == 1 then\n          v.Curr = 2\n        else\n          v.Curr = 0\n        end\n\
  \      end\n    end\n  end\n\nsolved = true\n  for k,v in pairs(boxes) do\n    if\
  \ v.Curr == 2 then v.Curr = 0 end\n    if v.Orig == v.Curr then\n      -- 不做任何操作，一切正常\n\
  \    else\n      -- 若 Orig 与 Curr 不相等，则表示谜题尚未解开\n      solved = false\n      break\n\
  \    end\n  end\nend\n\nfunction love.keypressed(key)\n  if key == \"up\" or key\
  \ == \"w\" then\n  -- 若按下 w 或上箭头键，则增加棋盘尺寸\n    if sqaures < 9 then\n      squares\
  \ = squares + 1\n      make_board()\n    end\n  elseif key == \"down\" or key ==\
  \ \"s\" then\n  -- 若按下 s 或下箭头键，则减小棋盘尺寸\n    if sqaures > 2 then\n      squares =\
  \ squares - 1\n      make_board()\n    end\n  end\nend\n```\n\n**注**：此代码取自 LÖVE\
  \ 论坛，由用户 GijsB 编写，原文链接：[`love2d.org/forums/viewtopic.php?f=5&t=3391`](https://love2d.org/forums/viewtopic.php?f=5&t=3391)。\n\
  \n## 摘要\n\n本章讨论了 LÖVE 中可用的各种函数。这是一款功能全面且强大的桌面应用框架，可用于将桌面特性集成到移动应用中。LÖVE 在多个方面堪称完备框架：它具备跨平台能力，功能完善，集物理、音效、粒子系统和绘图函数于一身。此外，它是极少数能支持像素级访问的框架之一。\n\
  \n下一章我们将介绍 Codea，该框架受 LÖVE 启发并借鉴了 Processing 库的设计。\n\n"
- "# 第 12 章：Codea\n\n我们列表中的最后一个框架是 Codea。它最初是作为 iPad 上的集成开发环境创建的。该应用最大的亮点（至今依然如此）是其编辑器，它让在\
  \ iPad 上编辑（或更准确地说，编写）代码变得充满乐趣。编辑器具备自动补全功能，并配备定制键盘，将常用键触手可及，无需在键盘布局间切换来输入特定数字或符号。\n\
  \nCodea 的最大优势在于，你可以直接在目标设备上测试应用，无需像其他框架那样上传至设备或使用模拟器。从这个意义上讲，Codea 是可用的最快、最精确的模拟器和运行器。\n\
  \n## 获取 Codea\n\n获取 Codea 的第一步是从 iTunes 商店购买；目前它仅支持 iPad。Codea 应用的下载链接为：[`itunes.apple.com/au/app/codea/id439571171?mt=8`](http://itunes.apple.com/au/app/codea/id439571171?mt=8)。\n\
  \n启动 Codea 后，你会看到如图 12-1 所示的启动画面，你既可以选择打开示例项目进行学习，也可以创建新项目。新建项目时，Codea 会自动生成一个骨架模板供你扩展。点击“入门指南”按钮将跳转至\
  \ Codea 的完整参考文档，包括参考手册、论坛、维基以及 Lua 参考手册。\n\n![9781430246626_Fig12-01.jpg](img/9781430246626_Fig12-01.jpg)\n\
  \n图 12-1 . 启动 Codea 时的初始界面\n\n## Codea 架构\n\nCodea 的主要部分是编辑器，它具备 Lua 语法高亮功能。驱动 Codea\
  \ 的引擎与 Processing 语言（参见 [`processing.org`](http://processing.org)）有很多共通之处。其概念和 API\
  \ 取自 Processing，Codea 受益于 Processing 成熟稳定的 API。\n\n借助 Codea 运行时，你可以使用 Mac 上的 Xcode\
  \ 在桌面端编译代码。使用 Codea 编写的代码可通过运行时编译，并可将应用上传至 iOS App Store。首个使用 Codea 运行时创建的应用是 Cargo-Bot，这证明了\
  \ Codea 运行时已具备作为框架使用的成熟度。\n\n## Hello World\n\n与大多数基于 Lua 的框架一样，Codea 使用 `main.lua`\
  \ 作为代码运行的入口点。`main.lua` 文件中包含两个辅助应用运行的函数。\n\n第一个是 `setup` 函数，该函数仅在应用启动时运行一次，可用于执行所有初始化代码。第二个是\
  \ `draw` 函数，负责在每一帧绘制（或者说更新）屏幕内容。以下是这两个函数的示例：\n\n```\nfunction setup()\n  print(\"\
  Hello World\")\nend\n\nfunction draw()\n  background(100,120,160,255)\n  font(\"\
  Georgia\")\n  fill(255)\n  fontSize(20)\n  textWrapWidth(70)\n  text(\"Hello World\
  \ from Codea\", WIDTH/2, HEIGHT/2)\nend\n```\n\n运行这些函数时，屏幕中央会显示文字“Hello World from\
  \ Codea”，如图 12-2 所示。Codea 运行窗口左侧有两个属性面板，分别显示参数和控制台输出窗口，其余区域则显示代码的图形输出。\n\n![9781430246626_Fig12-02.jpg](img/9781430246626_Fig12-02.jpg)\n\
  \n图 12-2 . 使用 Codea 实现的 Hello World\n\n**注**：可以通过 `displayMode(FULLSCREEN)` 函数移除左侧两个窗口，以获取更多屏幕空间。\n\
  \n参数可用于对代码进行交互式输入，通常以滑块形式呈现，帮助设置数值范围。\n\n## 参数\n\n在交互式运行模式下，你可能希望实时修改部分代码以观察输出变化。例如，假设你想调整线条宽度或圆的半径，无需在代码中设置并重新运行，而可以使用参数滑块实时调整。\n\
  \n参数通过 `parameter` 函数创建。`parameter` 函数接受三个参数：参数*名称*、*起始*范围和*结束*范围。参数名称同时也是可在代码中访问的全局变量名。示例如下：\n\
  \n```\nparameter(\"Radius\", 1, 10)\n```\n\n这将在“参数”窗口中创建一个滑块，用于选择半径。创建参数滑块的最佳位置是\
  \ `setup` 函数。`parameter` 函数允许滑块值为浮点数，而 `iparameter` 则用于选择范围内的整数值。\n\n```\nfunction\
  \ setup()\n  parameter(\"Radius\", 100, 500)\n  iparameter(\"BlueAmount\", 0, 255)\n\
  end\n\nfunction draw()\n  background(10,10,20)\n  stroke(255)\n  fill(255,0,BlueAmount)\n\
  \nstrokeWidth(1)\n  ellipseMode(RADIUS)\n  ellipse(0,0,Radius, Radius)\nend\n```\n\
  \n运行代码后，我们可以调整绘制椭圆的半径，并修改蓝色分量值，从而使颜色从红色渐变为品红色。\n\n**注**：可以为 `parameter` 或 `iparameter`\
  \ 函数添加第四个参数，用于设置全局变量的初始值。\n\n## 使用 Codea 绘图\n\n由于 Codea 是基于图形用户界面的框架，我们重点介绍用于创建图形的\
  \ `draw` 函数。\n\n\n## Codea 绘制基础\n\n在 `Codea` 绘制表面上，屏幕每秒刷新（或者说绘制）超过 60 次。然而，不能保证\
  \ `draw` 函数每秒会被调用 60 次，因为这取决于 `draw` 内部的代码完成并返回所需的时间。\n\n`Codea` 中的屏幕与其他框架略有不同。在大多数框架中，左上角是原点\
  \ `(0, 0)`，`x` 轴值向右增加，`y` 轴值向下增加。在 `Codea` 中，左下角是原点，`x` 轴值向右递增，`y` 轴值向上递增。\n\n其次，由于侧面板的存在，屏幕会被遮挡，在横屏模式下报告的大小为\
  \ 750×768，在竖屏模式下为 494×1024。你可以通过调用 `displayMode(FULLSCREEN)` 函数来移除这个面板。然而，即使在全屏模式下，Figure 12-2\
  \ 底部显示的按钮仍然存在。要同时移除这些按钮，你可以使用 `displayMode(FULLSCREEN_NOBUTTONS)` 函数。\n\n如果你使用 `displayMode`\
  \ 函数并传入 `FULLSCREEN_NO_BUTTONS` 参数，则需要手动调用 `close` 函数才能返回到编辑器。\n\n### 方向\n\n可以使用\
  \ `supportedOrientation` 函数来设置 `Codea` 应用程序的方向。`supportedOrientation` 的默认值是 `ANY`，它支持所有方向。但是，你可以将其预设为你需要的方向。\n\
  \n选项如下：\n\n*   `ANY`\n*   `LANDSCAPE_ANY`\n*   `LANDSCAPE_LEFT`\n*   `LANDSCAPE_RIGHT`\n\
  *   `PORTRAIT`\n*   `PORTRAIT_ANY`\n*   `PORTRAIT_UPSIDE_DOWN`\n\n### 系统键盘\n\n可以根据需要使用\
  \ `showKeyboard` 和 `hideKeyboard` 函数来显示或隐藏键盘。还有另一个与键盘相关的函数 `keyboardBuffer`，它返回键盘缓冲区中的文本。每次显示键盘时，键盘缓冲区都会被清除。以下是使用\
  \ `showKeyboard` 和 `keyboardBuffer` 函数的示例：\n\n```lua\nfunction touched(touch)\n\
  \  showKeyboard()\nend\n\nfunction draw()\n  background(40,40,50)\n  fill(255)\n\
  \  textMode(CORNER)\n\nbuffer = keyboardBuffer()\n  _, bufferHeight = textSize(buffer)\n\
  \  if buffer then\n  text (buffer, 10, HEIGHT – 30 – bufferHeight)\n  end \nend\n\
  ```\n\n#### 绘制模式\n\n当你绘制某些内容时，它不会自动持久化，即每次都会被擦除并需要重新绘制。但是，你可以设置模式，使先前绘制的帧保留在屏幕上而不会被擦除。你可以通过将\
  \ `backingMode` 设置为 `RETAINED` 来实现这一点。默认模式是 `STANDARD`。\n\n**注意**：当 `RETAINED` 模式与新\
  \ iPad 一起使用时，iOS5 中的一个 bug 会导致其无法按预期工作。不过 Apple 在 iOS6 中修复了这个问题，现在可以正常工作。\n\n###\
  \ 背景颜色\n\n可以使用 `background` 函数来更改背景颜色。该函数接受 RGBA 格式的颜色值。使用 `Codea` 编辑器时，你也可以通过简单地点击数字来手动选择和设置颜色，这会弹出一个颜色选择器供手动选择。\n\
  \n`background(red, green, blue, alpha)`\n\n### 笔颜色\n\n可以使用 `stroke` 函数来设置用于所有绘图的笔颜色（或*前景*颜色）。`stroke`\
  \ 函数接受的参数也是 RGBA 格式的。\n\n```lua\nstroke(0,0,0,255)  -- 会将笔颜色设置为黑色\n```\n\n### 填充颜色\n\
  \n可以使用 `fill` 函数来设置填充颜色。其参数的设置方式与前面两个颜色函数类似。\n\n```lua\nfill(255,164,0)  -- 将填充颜色设置为橙色\n\
  ```\n\n### 线宽\n\n可以使用 `strokeWidth` 函数来更改绘图的线宽。\n\n```lua\nstrokeWidth(3)  -- 将描边宽度设置为\
  \ 3\n```\n\n**注意**：虽然你可以通过 `fill(255,164,0)` 设置填充颜色，或通过 `stroke(0,0,0)` 设置笔颜色，或通过\
  \ `strokeWidth(3)` 设置描边宽度，但你也可以不传递任何参数来获取这些值，例如 `fill()` 会返回当前填充颜色，`stroke()` 会返回描边颜色，`strokeWidth()`\
  \ 会返回宽度。\n\n### 绘制线条\n\n绘制线条的函数是 `line`。它接受四个参数：线条起点的 `x` 和 `y` 坐标以及终点的 `x` 和 `y`\
  \ 坐标。线条在这两点之间绘制。\n\n```lua\nline(10,10,300,300)  -- 在 (10,10) 和 (300,300) 之间绘制一条线\n\
  ```\n\n*线帽*模式用于确定线条端点的绘制方式。绘制线条时有三种*线帽*模式：`ROUND`、`SQUARE` 和 `PROJECT`。默认模式是 `ROUND`。\n\
  \n*   `ROUND`：绘制末端为圆形的线条\n*   `SQUARE`：绘制末端为方形的线条\n*   `PROJECT`：绘制方形边缘但向外突出的线条，类似于\
  \ `ROUND` 模式。\n\n### 抗锯齿\n\n绘制线条时，最终可能会出现锯齿边缘，这会造成不愉快的视觉体验。为了解决这个问题，`Codea` 有一个平滑边缘的函数——即所谓的*抗锯齿*。要执行抗锯齿，你可以调用\
  \ `smooth` 函数，之后绘制的所有线条都将被抗锯齿处理。\n\n**注意**：在绘制细线时，你可能希望使用 `noSmooth` 函数切换到无抗锯齿模式。抗锯齿处理后的细线可能看起来比没有抗锯齿的细线更差。\n\
  \n### 绘制圆和椭圆\n\n绘制圆或椭圆的函数是 `ellipse`。它接受四个参数，这些参数取决于绘制椭圆所使用的*椭圆模式*（如下所述）。在其中一种模式\
  \ `CENTER` 下，四个参数分别是绘制圆的中心点的 `x`、`y` 坐标，然后是直径——一个用于 `x` 轴，一个用于 `y` 轴。如果这两个值相同，则绘制一个圆。如果不同，则绘制一个椭圆。\n\
  \n以下是绘制圆的语法：\n\n```lua\nellipse(50,50,20,20)\n```\n\n以下是绘制椭圆的语法：\n\n```lua\nellipse(100,100,20,50)\n\
  ```\n\n如前所述，有四种椭圆模式允许你以多种方式绘制椭圆：\n\n*   `CENTER`：在这种模式下，参数是中心点的 `x`、`y` 坐标，然后是 `x`\
  \ 和 `y` 方向的直径。这是前面示例中使用的模式。\n*   `RADIUS`：此模式使用中心点的 `x`、`y` 坐标，然后是 `x` 和 `y` 方向的*半径*（而不是直径）。\n\
  *   `CORNER`：此模式接受椭圆左下角的 `x`、`y` 坐标，然后是宽度和高度。椭圆在参数指定的边界矩形内绘制。\n*   `CORNERS`：此模式接受椭圆左下角的\
  \ `x`、`y` 坐标，然后是椭圆右上角的 `x`、`y` 坐标。椭圆在参数指定的边界矩形内绘制。\n\n以下代码片段提供了上述模式的示例：\n\n```lua\n\
  ellipseMode(CENTER)\nellipse(100,100,50,50)\n\nellipseMode(RADIUS)\nellipse(100,200,50,50)\n\
  \nellipseMode(CORNER)\nellipse(200,100,50,50)\n\nellipseMode(CORNERS)\nellipse(200,200,50,50)\n\
  ```\n\n### 绘制矩形\n\n绘制矩形的函数是 `rect`。它接受四个参数，与椭圆一样，这些参数取决于绘制矩形时所处的模式。在 `CENTER` 模式下，参数是起始点的\
  \ `x`、`y` 坐标，然后是矩形的宽度和高度。\n\n```lua\nrect(10,10,300,100)  -- 绘制一个 300×100 的矩形，并将其放置在\
  \ (10,10) 位置\n```\n\n以下是绘制矩形的四种模式：\n\n\n\n#### 矩形的绘制模式\n\n`rect()` 函数支持以下几种绘制模式：\n\
  \n- `CENTER`：此模式以中心点的 x、y 坐标为参数，后接宽度和高度。\n- `RADIUS`：此模式以中心点的 x、y 坐标为参数，后接宽度和高度的一半。\n\
  - `CORNER`：此模式以矩形左下角的 x、y 坐标为参数，后接宽度和高度。矩形将被绘制在参数指定的边界矩形内。\n- `CORNERS`：此模式以矩形左下角的\
  \ x、y 坐标为参数，后接右上角的绝对坐标，而非宽度和高度。矩形将被绘制在参数指定的边界矩形内。\n\n以下代码片段展示了上述模式的用法：\n\n```\n\
  rectMode(CENTER)\nrect(100,100,50,50)\n\nrectMode(RADIUS)\nrect(100,200,50,50)\n\
  \nrectMode(CORNER)\nrect(100,100,50,50)\n\nrectMode(CORNERS)\nrect(100,200,50,50)\n\
  ```\n\n### 绘制文本\n\n用于在屏幕上绘制文本的函数是 `text`。它需要三个参数：文本本身，以及文本显示位置的 x、y 坐标。\n\n```\n\
  text(\"This is sample text\", 10,200)\n```\n\n还有其他函数可以帮助设置所显示文本的属性，例如字体名称和大小。以下函数会创建文本，同时返回所创建文本的宽度和高度：\n\
  \n```\nw, h = textSize(\"Hello World\")\nprint(w, h)\n```\n\n#### 绘制模式\n\n`text`\
  \ 函数也有两种绘制模式，用于指定如何解析传入的参数以及如何显示文本：\n\n- `CENTER`：在此模式下，文本将围绕传递给 `text` 函数进行绘制的\
  \ x、y 坐标居中显示。这是默认的文本绘制模式。\n- `CORNERS`：在此模式下，传递给 `text` 函数的 x、y 坐标指定文本的左下角。\n\n\
  #### 文本对齐\n\n绘制文本时，可以将其设置为左对齐（`LEFT`）、右对齐（`RIGHT`）或居中对齐（`CENTER`）。默认的文本对齐设置为 `LEFT`。\n\
  \n#### 文本换行\n\n在绘制文本时，你还可以设置要显示的文本宽度，任何超出该宽度的文本都将自动换行。如果文本换行设置设为 `0`，则文本不会换行。\n\n\
  ```\ntextWrapWidth(80)\ntext(\"This text would get wrapped onto multiple lines\"\
  ,100,100)\n```\n\n#### 更改字体\n\n`font` 函数可用于渲染文本。在 iOS 设备上，可以设置的字体仅限于设备上可用的字体列表，默认使用的字体是\
  \ `Helvetica`。\n\n#### 更改字号\n\n`fontSize` 函数可用于更改正在渲染的字体大小。文本渲染的默认大小是 17 磅。\n\n\
  ### 显示图像\n\nCodea 中的精灵（Sprite）是可以使用 `sprite` 函数加载并显示在屏幕上的图像。但是，根据 Codea 架构的定义方式，存在*精灵包（sprite\
  \ packs）*，你可以从中使用图像。要加载图像，不像其他框架那样使用图像的路径，而是将图像引用为 `SpritePack:SpriteName`。此函数至少需要三个参数：`spriteName`（即*图像句柄*），以及精灵将放置的\
  \ x、y 坐标。该函数也可以将宽度和高度作为参数。\n\n```\nsprite(\"Planet Cute:Grass Block\", WIDTH/2,\
  \ HEIGHT/2)\n```\n\n**注意** 在当前版本的 Codea 中，你还可以使用来自设备相册或剪贴板的图像，以及来自 Dropbox 和 Codea\
  \ 内置免费精灵库（来自 Dan Cook 的 [`lostgarden.com`](http://lostgarden.com)）的图像。\n\n从设备或在线来源加载的图像可以在\
  \ Codea 中用作精灵。要确定精灵的大小，你可以使用 `spriteSize` 函数，该函数会返回传递给它的精灵名称的宽度和高度。\n\n```\nsprWidth,\
  \ sprHeight = spriteSize(\"Planet Cute:Grass Block\")\nprint(sprWidth, sprHeight)\n\
  ```\n\n你还可以设置*精灵模式（sprite mode）*，它决定了精灵在屏幕上的显示方式。x、y 坐标用于定位精灵，这与绘图的选项类似。`SpriteMode`\
  \ 的默认值是 `CENTER`。其他可设置的模式有 `RADIUS`、`CORNER` 和 `CORNERS`，它们的功能类似于绘制椭圆和矩形时使用的模式。\n\
  \n在 Codea 中，*图像（images）* 与精灵不同。图像是通过代码创建的*画布（canvases）*，其像素点通过 `set` 方法结合 x、y 坐标和颜色来设置。特定像素的颜色可以通过\
  \ `get` 方法获取。可以使用 `image.copy` 函数复制图像的部分区域来创建新图像。\n\n#### 离屏绘制\n\n正如我们在上述段落中所看到的，大多数绘图函数都是直接在屏幕上绘制的。我们可以使用\
  \ `setContext` 函数指示绘图函数在我们指定的上下文（绘图区域）上进行绘制。当我们希望恢复在屏幕上下文上进行绘制时，只需再次调用 `setContext`\
  \ 函数而不传递任何参数即可。\n\n```\nmyImage = image(400,400)\n\nsetContext(myImage)\nellipse(200,200,200)\n\
  rect(0,0,100,100)\nsetContext()\n\nsprite(myImage, WIDTH/2, HEIGHT/2)\n```\n\n####\
  \ 将精灵加载到图像中\n\n虽然图像可以通过获取或设置像素颜色来操作，并且可以使用 `image.copy` 函数创建，但精灵不能以这些方式操作。为了能够操作精灵图像，你可以使用\
  \ `readImage` 函数将精灵复制或加载到图像中，该函数会从精灵创建一个图像对象，如下所示：\n\n```\nmyImage = readImage(\"\
  Planet Cute:Heart\")\n```\n\n#### 保存图像\n\n`saveImage` 函数可以帮助创建图像并将其保存到设备或 Dropbox。保存图像的方式是向它传递精灵包名称（可以是\
  \ `Documents` 或 `Dropbox`），后跟文件名。请注意，如果文件名已经存在，原始文件将被覆盖；如果图像被设置为 `nil`，则指定的文件将被删除。\n\
  \n```\nsaveImage(\"Documents:theSprite\", image)\n```\n\n**注意** 如果设备是视网膜（Retina）设备，使用此函数将保存两个文件：一个带有\
  \ `@2x` 后缀的视网膜尺寸图像，和一个缩放到 50% 的非视网膜图像。\n\n#### 保存数据\n\n在开发应用程序时，你可能希望保存数据以使其持久化。数据可以保存在本地，仅对当前的\
  \ Codea 项目可用，也可以全局保存，使其对设备上的所有 Codea 项目可用。以下是本地保存数据的示例：\n\n```\nlocal theName =\
  \ (readLocalData(\"username\"))\nif theName == nil then\n  theName = \"Default\"\
  \n  saveLocalData(\"username\", theName)\nend\nprint(theName)\n```\n\n如果你运行这段代码，“Default”\
  \ 将被打印到输出控制台。\n\n如果你想要重新开始并移除所有存储的值，可以使用 `clearLocalData` 函数。\n\n## 无颜色绘制\n\n有时你可能会想用透明颜色绘制某些内容——例如，如果你想要一个无填充（透明）的形状或一个没有轮廓的形状。这可以通过前缀为\
  \ `no` 的示例函数来实现。这些函数将在以下小节中描述。\n\n### `noFill`\n\n`noFill` 函数将填充颜色设置为透明，绘制一个没有填充（但可能有轮廓）的形状。图\
  \ 12-3 演示了绘制有填充和无填充的矩形。\n\n![9781430246626_Fig12-03.jpg](img/9781430246626_Fig12-03.jpg)\n\
  \n图 12-3. 一个有填充的矩形（左）和一个没有填充的矩形（右）\n\n### `noStroke`\n\n`noStroke` 函数将用于绘制的颜色设置为透明。此函数会移除形状的轮廓。（见图\
  \ 12-4。）\n\n![9781430246626_Fig12-04.jpg](img/9781430246626_Fig12-04.jpg)\n\n图 12-4.\
  \ 一个有轮廓的矩形（左）和一个没有轮廓的矩形（右）\n\n### `noTint`\n\n\n\n## Codea 文档排版\n\n`tint`函数根据图像处理软件中的乘法效果改变精灵的颜色。`noTint`函数在绘制精灵时移除所有色调。\n\
  \n### 变换函数\n\n我们可以创建的显示对象可以通过多种方式进行变换，包括旋转和缩放，使用的函数有`rotate`、`scale`、`translate`和`zLevel`（许多开发人员称之为\
  \ z 轴索引）。这些函数将相应的变换应用于后续所有绘制，而不仅仅是单个显示对象。\n\n#### `rotate`\n\n`rotate`函数接受角度参数，单位为度。\n\
  \n```\nrotate(30)\nrect(226,226,52,52)\n```\n\n#### `scale`\n\n`scale`函数接受缩放参数，可以是应用于所有轴的单个缩放因子，也可以是各个轴的独立缩放因子。\n\
  \n```\nscale(amount)\nscale(xScale, yScale)\nscale(xScale, yScale, zScale)\n```\n\
  \n#### `translate`\n\n`translate`函数指定后续绘制的位移量。*位移*就像添加到坐标上的偏移量。\n\n```\nrect(0,0,50,50)\n\
  translate(20,20)\nrect(0,0,50,50)\ntranslate(40,40)\nrect(0,0,50,50)\n```\n\n**注意**：所有变换函数都是相对的，这意味着它们将根据当前值执行给定值的操作。例如，`rotate(10)`将使对象从其当前位置旋转\
  \ 10 度。\n\n变换函数会改变*显示矩阵*。显示矩阵类似于栈，可以使用`pushMatrix`函数保存当前设置，使用`popMatrix`函数恢复原始设置。在某些情况下，还可以使用`resetMatrix`函数将整个显示矩阵重置为默认值。\n\
  \n### 录制视频\n\nCodea 具有用于录制视频的内置函数。用于视频录制的函数很简单：\n\n* `startRecording`：通过调用此函数开始录制。不要在`setup`函数中调用此函数。\n\
  * `stopRecording`：通过调用此函数停止录制。停止录制时，视频将保存到设备的相机胶卷中。\n* `isRecording`：通过此函数可以查询是否正在录制视频。\n\
  \n### 触摸\n\nCodea 运行在 iPad 上，这是一种触摸设备，因此除了键盘输入之外，获取输入的方式是通过触摸。\n\n管理屏幕触摸事件的函数是`touched`函数。每个触摸点生成一个触摸对象，该对象具有以下成员：\n\
  \n* `id`：触摸的唯一标识符\n* `x`：触摸在屏幕上的 x 坐标\n* `y`：触摸在屏幕上的 y 坐标\n* `prevX`：触摸上一帧的 x 坐标\n\
  * `prevY`：触摸上一帧的 y 坐标\n* `deltaX`：触摸在 x 轴上移动的距离\n* `deltaY`：触摸在 y 轴上移动的距离\n* `state`：触摸的状态，可以是`BEGAN`、`MOVING`或`ENDED`\n\
  * `tapCount`：触摸点被轻触的次数\n\n有一个名为`CurrentTouch`的全局变量，它包含屏幕上最近的触摸点。以下是一个使用示例：\n\n```\n\
  function draw()\n  background(0)\n  fill(255)\n  ellipse(CurrentTouch.x, CurrentTouch.y,\
  \ 300)\nend\n```\n\n这段代码在屏幕上生成一个白色圆圈，看起来像聚光灯，当手指在屏幕上滑动时，它会跟随触摸移动。\n\n#### 使用触摸绘图\n\
  \n我之前讨论过如何根据触摸点移动显示对象。如果创建一个触摸点数组，你可以渲染它们以生成有趣的结果。以下是一个示例：\n\n```\npoints = {}\n\
  index = 0\nmaxPts = 99\n\nfunction setup()\n  watch(\"index\")\nend\n\nfunction\
  \ touched(touch)\n  index = index + 1\n  if index > maxPts then\n    index = maxPts\n\
  \    table.remove(points, 1)\n  end\n  table.insert(points, touch)\nend\n\nfunction\
  \ draw()\n  background(40,40,50)\n\nstrokeWidth(3)\n  lineCapMode(ROUND)\n\nif index\
  \ > 1 then\n    ptx, pty = points[1].x, points[1].y\n\nfor i=2, index do\n     \
  \ sx, sy = points[i].x, points[i].y\n      line(ptx,pty, sx, sy)\n      ptx, pty\
  \ = sx, sy\n    end\n  end\nend\n```\n\n为了增加一些变化，你也可以调整`maxPts`变量并查看结果。\n\n**注意**：要监视变量，只需使用`watch`函数，但记得将变量名用引号括起来才能生效。如果变量是一个表，它会显示为`Table`和内存地址，而\
  \ Codea 创建的内部对象可以在不指定单个组件的情况下进行监视，例如`watch(\"Gravity\")`可以用来监视所有三个轴的数据，而不是分别监视`watch(\"\
  Gravity.x\")`、`watch(\"Gravity.y\")`和`watch(\"Gravity.z\")`。\n\n### 多点触控\n\niPad\
  \ 支持多点触控，但不会自动处理。你可以通过将触摸保存到数组，并在`BEGAN`和`ENDED`状态触发之间迭代它们来处理多点触控。以下是一个示例：\n\n```\n\
  touches = {}\nfunction touched(touch)\n  if touch.state == ENDED then\n    touches[touch.id]\
  \ = nil\n  else\n    touches[touch.id] = touch\n  end\nend\n\nfunction draw()\n\
  \  background(0)\n  for k,v in pairs(touches) do\n    math.randomseed(v.id)\n  \
  \  fill(math.random(255), math.random(255), math.random(255))\n    ellipse(v.x,\
  \ v.y, 100, 100)\n  end\nend\n```\n\n**警告**：如果你启用了系统范围的多手势功能，你可能还需要在 iPad 的“设置”中关闭它们，因为当有两个以上手指触摸时，它们会优先处理并干扰触摸。\n\
  \n### 制作声音\n\n虽然其他框架播放 WAV 或 MP3 文件，但 Codea 允许播放动态生成的波形。这样做的好处是在最终分发版本中占用更少的空间，并且允许你创建动态声音。\n\
  \n以下是如何创建跳跃声音的示例：\n\n```\nfunction touched(touch)\n  sound(SOUND_JUMP, 1234)\nend\n\
  ```\n\n现在，当你触摸屏幕时，它会播放一个声音。\n\n以下是 Codea 中预定义的内置声音类型，每种类型都有各种设置，可以像上面的示例中使用设置#1234：\n\
  \n* `SOUND_BLIT`\n* `SOUND_EXPLODE`\n* `SOUND_HIT`\n* `SOUND_JUMP`\n* `SOUND_PICKUP`\n\
  * `SOUND_POWERUP`\n* `SOUND_RANDOM`\n* `SOUND_SHOOT`\n* `DATA`\n\nCodea 编辑器还允许你将声音的不同参数微调为\
  \ Base64 编码字符串，该字符串可以传递给函数，根据字符串中的编码字符播放声音。自定义声音通常类型为`DATA`，后跟指定设置的字符串。\n\n```\n\
  sound(DATA, \"ZbBAJgBAQEBAQEBAQEBAMqqQPXtbpz3NzMw+QABAf0BAQEBAQEBA\")\n```\n\n或者，可以使用合成器波形来制作声音。以下是\
  \ Codea 内置支持的波形类型：\n\n* `SOUND_NOISE`\n* `SOUND_SAWTOOTH`\n* `SOUND_SINEWAVE`\n\
  * `SOUND_SQUAREWAVE`\n\n这些波形可以通过向`sound`函数传递参数进行微调：\n\n```\nfunction touched(touch)\n\
  \  sound({\n    Waveform = SOUND_NOISE,\n    AttackTime = 1.2,\n    SustainTime\
  \ = 1\n  })\nend\n```\n\n其他可微调的设置包括：\n\n* `AttackTime`\n* `SustainTime`\n* `SustainPunch`\n\
  * `DecayTime`\n* `StartFrequency`\n* `MinimumFrequency`\n* `Slide`\n* `DeltaSlide`\n\
  * `VibratoDepth`\n* `VibratoSpeed`\n* `SquareDuty`\n* `DutySweep`\n* `RepeatSweep`\n\
  * `PhaserSweep`\n* `LowPassFilterCutOff`\n* `LowPassFilterCutOffSweep`\n* `LowPassFilterResonance`\n\
  * `HighPassFilterCutOff`\n* `HighPassFilterCutOffSweep`\n* `Volume`\n\n### iOS 硬件\n\
  \niOS 设备的一个优势是集成了加速度计和陀螺仪。如前所述，Codea 的一个优点是，由于你在设备上编写和运行应用程序，因此你也可以在设备上进行实际测试，并从硬件获取真实数据反馈。\n\
  \n加速度计返回重力加速度。加速度计的数据可以从`Gravity`变量获取，该变量包含`x`、`y`和`z`成员。\n\n\n\n`ht = HEIGHT -\
  \ 20`  \n`function draw()`  \n`  text(Gravity.x, 100,ht)`  \n`  text(Gravity.y,\
  \ 200,ht)`  \n`  text(Gravity.z, 300,ht)`  \n`end`\n\n现在，当你倾斜 iPad 时，可以观察到这些数值的变化。\n\
  \n```\nGravityX = 0\nGravityY = 0\nsupportedOrientation(LANDSCAPE_LEFT)\n\nfunction\
  \ setup()\n  watch(\"Gravity\")\nend\n\nfunction draw()\n  GravityX = Gravity.x\n\
  \  GravityY = Gravity.y\n\nbackground(127,127,127,255)\n  stroke(255,255,255,255)\n\
  \  strokeWidth(15)\n  lineCapMode(ROUND)\n  pushMatrix()\n  translate(WIDTH/2, HEIGHT/2)\n\
  \ngrav = vec2(Gravity.x * 300, Gravity.y * 300)\n\nline(0,0,grav.x, grav.y)\n\n\
  down = vec2(1,0)\n  orient = down:angleBetween(grav)\n\npushMatrix()\n  resetMatrix()\n\
  \ntranslate(WIDTH/2, HEIGHT/2)\n  translate(grav.x, grav.y)\n  rotate(math.deg(orient))\n\
  \nline(0,0,-25,-20)\n  line(0,0,-25,20)\n\npopMatrix()\n\npopMatrix()\nend\n```\n\
  \n上述代码来自 Codea 示例项目；它用于测量设备的倾斜角度。如图 12-5 所示，该代码绘制了一个箭头来演示设备的倾斜状态。\n\n![9781430246626_Fig12-05.jpg](img/9781430246626_Fig12-05.jpg)\n\
  \n图 12-5. 在 Codea 中运行的加速度计应用\n\n### 下载数据\n\n在你的应用中，你可能希望在运行时从互联网下载数据，这些数据可能是信息、图形或新闻。LuaSocket\
  \ 库已集成到 Codea 中，提供了处理网络数据和功能的方法。`http` 类拥有一个 `request` 函数，可用于从互联网下载数据。\n\n```\n\
  function done(theData, status, headers)\n  data = theData\n  if status == 200 then\n\
  \    print(\"YAY!! Done\")\n    print(theData)\n  else\n    print(\"Error downloading\
  \ the file\")\n  end\nend\n\nhttp.request(\"http://www.oz-apps.com\", done)\n```\n\
  \n当我们调用 `request` 函数时，向其传递我们希望下载数据的 URL，以及一个在下载完成时被调用的函数。该函数接收三个参数：`theData`、`status`\
  \ 和 `headers` 表。`status` 是 HTTP 状态码，成功时为 `200`，页面未找到时为 `404`，禁止访问时为 `403`，等等。\n\n\
  ### 显示网页\n\n在某些应用中，你可能希望浏览网页，而不仅仅是下载数据或文件。在这种情况下，我们使用 `openURL` 函数。此函数会启动移动版 Safari\
  \ 浏览器并打开传入的 URL。\n\n```\nopenURL(\"http://www.oz-apps.com\")\n```\n\n### 物理引擎\n\n\
  与本书涵盖的所有框架一样，Codea 使用 Box2D 作为其物理引擎。以下示例展示了如何创建一个物理体，然后根据物理对象的位置更新显示对象：\n\n```\n\
  bouncy = 0.5\n\nfunction createPhysicsObj(x1, y1, x2, y2)\n  local temp = physics.body(EDGE,\
  \ vec2(x1,t1), vec2(x2,y2))\n  temp.type = STATIC\n  temp.restitution = bouncy\n\
  \ return bouncy\nend\n\nfunction setup()\nball.physics.body(CIRCLE, 50)\n  ball.x\
  \ = WIDTH/2\n  ball.y = HEIGHT/2\n  ball.restitution = bouncy\nball.sleepingAllowed\
  \ = false\n\ncreatePhysicsObject(0,0,0,HEIGHT)\n  createPhysicsObject(0,0,WIDTH,0)\n\
  \  createPhysicsObject(WIDTH,0,WIDTH,HEIGHT)\n  createPhysicsObject(WIDTH,HEIGHT,0,HEIGHT)\n\
  end\n\nfunction draw()\n  background(40,40,50)\n  strokewidth(0)\n  fill(255)\n\n\
  physics.gravity(Gravity)\n  ellipse(ball.x, ball.y, ball.radius*2)\nend\n```\n\n\
  现在，当你倾斜设备时，可以看到球在移动（见图 12-6）。\n\n![9781430246626_Fig12-06.jpg](img/9781430246626_Fig12-06.jpg)\n\
  \n图 12-6. 当你倾斜设备时，椭圆移动并弹离屏幕边缘\n\n如前所述，随着每一帧位置更新，我们可以将显示对象放置在物理对象的坐标上。在前面的例子中，我们使用了椭圆。在这里，我们可以简单地将绘制椭圆的代码行替换为绘制精灵的代码：\n\
  \n```\nsprite(\"Planet Cute:Character Boy\", ball.x, ball.y, ball.radius*2)\n```\n\
  \n并非所有物理函数都在 Codea 中可用。以下列表描述了 Codea 允许我们使用的函数：\n\n*   `body.applyForce`：此函数以向量的形式对物理体施加力。\n\
  *   `body.applyTorque`：此函数对物理体施加扭矩。\n*   `body.destroy`：此函数销毁物理体，之后该物理体将被垃圾回收。\n\
  *   `body.getLinearVelocityFromLocalPoint`：此函数获取物理体在局部空间中某一点的线速度。\n*   `body.getLinearVelocityFromWorldPoint`：此函数获取物理体在世界空间中某一点的线速度。\n\
  *   `body.getLocalPoint`：此函数返回物理体在局部坐标系中的点。\n*   `body.getWorldPoint`：此函数返回物理体在世界坐标系中的点。\n\
  *   `body.testOverlap`：此函数测试物理体是否与给定的物理体相交。\n*   `body.testPoint`：此函数可用于判断一个世界点是否在物理体内部。\n\
  \n### 向量数学\n\nCodea 内置了向量数学功能。向量结构有两种类型：`vec2` 和 `vec3`。`vec2` 结构包含用于二维向量数学的函数，而\
  \ `vec3` 包含用于三维数学的函数。可用的函数类似，但 `vec2` 需要两个参数，而 `vec3` 需要三个参数。\n\n#### `angleBetween`\n\
  \n`angleBetween` 函数返回以弧度为单位的夹角。它接受另一个点作为参数，以 `vec2` 点形式计算两点之间的角度。\n\n```\nv1 = vec2(100,100)\n\
  angle = math.deg(v1:angleBetween(vec2(100,200)))\nprint(angle)\n```\n\n#### `cross`\n\
  \n`cross` 函数返回两个 `vec2` 类型的叉积。\n\n```\nv1 = vec2(1,1)\nvec = v1:cross(vec2(2,5))\n\
  print(vec)\n```\n\n#### `dist`\n\n`dist` 函数返回两个向量之间的距离。\n\n```\nv1 = vec2(1,1)\n\
  vec = v1:dist(vec2(2,5))\nprint(vec)\n```\n\n#### `distSqr`\n\n`distSqr` 函数返回两个向量之间的距离的平方。\n\
  \n```\nv1 = vec2(1,1)\nvec = v1:distSqr(vec2(2,5))\nprint(vec)\n```\n\n#### `dot`\n\
  \n`dot` 函数返回两个向量的点积。\n\n```\nv1 = vec2(1,1)\nvec = v1:dot(vec2(2,5))\nprint(vec)\n\
  ```\n\n#### `len`\n\n`len` 函数返回向量的长度。\n\n```\nv1 = vec2(1,1)\nprint(vec:len())\n\
  ```\n\n#### `lenSqr`\n\n`lenSqr` 函数返回向量长度的平方。\n\n```\nv1 = vec2(1,1)\nvec = v1:lenSqr()\n\
  print(vec)\n```\n\n#### `normalize`\n\n`normalize` 函数返回向量的归一化版本。\n\n```\nv1 = vec2(1,1)\n\
  vec = v1:normalize()\nprint(vec)\n```\n\n#### `rotate`\n\n`rotate` 函数返回旋转后的向量副本。角度必须以弧度为单位。\n\
  \n```\nv1 = vec2(1,1)\nvec = v1:rotate(math.rad(45))\nprint(vec)\n```\n\n#### `rotate90`\n\
  \n`rotate90` 函数返回向量旋转 90 度后的副本。\n\n```\nv1 = vec2(1,1)\nvec = v1:rotate90()\nprint(vec)\n\
  ```\n\n## 总结\n\n如本章所述，Codea 是迄今为止唯一一款能在设备本身上运行的 Lua 框架。这使得它成为所有现有框架中最准确的模拟器。其 API\
  \ 基于 Processing，涵盖了移动应用开发所需的大部分功能。它还包含一些超出本章范围但在渲染复杂 2D 和 3D 图形时有所帮助的额外功能。其中一个用于实现高级效果的函数是\
  \ `mesh` 对象。\n\n本章还讨论了如何使用 Codea 创建视频和生成声音。Codea 提供对 iPad 硬件的完全访问权限，为您提供 Box2D 物理引擎功能的实质性子集，并内置了\
  \ 2D 和 3D 图形处理能力。借助 Codea 运行时，应用现在可以被编译并上传至 Mac App Store 进行销售。最后，Codea 在设备本身上包含了完整的\
  \ API 参考和集成开发环境（IDE），使其成为移动开发者随时随地进行开发的绝佳解决方案。\n\n"
