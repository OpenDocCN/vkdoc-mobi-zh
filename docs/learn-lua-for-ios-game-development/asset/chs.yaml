  \ Gideros Studio，你将看到如图 9-4 所示的 IDE，它可以让你创建新项目、打开最近的项目、打开示例项目以及使用参考资料。\n\n![9781430246626_Fig09-04.jpg](img/9781430246626_Fig09-04.jpg)\n\
