  随着视网膜显示屏的出现，苹果要求以不同分辨率创建资源：普通分辨率、`@2x`（针对视网膜设备），以及现在的 `@HD` 或 `@4x`（针对视网膜 iPad）。从普通分辨率放大到大型高清图形时，光栅或位图图像很容易出现缩放感和像素化。而使用矢量图形，图像可以缩放以适应各种分辨率，而不会明显丢失细节。Adobe
  Illustrator 和 Corel Draw 在该领域确立了标准；然而，Inkscape 拥有一套庞大的工具集，可与这些程序相媲美（如图 14-16 的示例图所示）。更棒的是，它是开源且免费的。


