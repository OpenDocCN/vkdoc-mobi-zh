  *   *学生版*：此许可证与独立开发者版类似，但面向学生和学术人员提供折扣（每年 79 美元）。  \n*   *专业版*：建议年营业额超过 10 万美元的用户选择专业版（每年\
  \ 449 美元）。  \n\n## 安装 Gideros Studio  \n\n下载 Gideros Studio 前，您需要先创建一个账户。之后便可下载适用于您操作系统的二进制文件。目前最新版本是\
  \ Gideros 2012.09.1。  \n\n不过，构建移动应用需要满足一些前提条件。对于 iOS 平台，需要以下环境：  \n\n*   64 位 Mac\
  \ OS X 操作系统（Snow Leopard 或更高版本）  \n*   Xcode  \n*   Apple 开发者许可证  \n\n构建 Android\
  \ 平台的应用则稍微复杂一些，您需要准备以下内容：\n\n\n\n*   Java SDK\n*   最新版 Android SDK\n*   Android\
  \ 开发工具\n*   Eclipse IDE\n\n如果你想在 Unix 上安装 Gideros Studio，可以通过 Wine 来实现。详细的指南可以在线查阅\
  \ [`giderosmobile.com/DevCenter/index.php/Running\\_Gideros\\_Studio\\_under\\_Linux`](http://giderosmobile.com/DevCenter/index.php/Running_Gideros_Studio_under_Linux)。\n\
  \n## 包含内容\n\n安装 Gideros Studio 时，它会附带一套工具（如图 9-1 所示），这些工具都已准备就绪，可助你创建应用程序。该软件包包含以下内容：\n\
