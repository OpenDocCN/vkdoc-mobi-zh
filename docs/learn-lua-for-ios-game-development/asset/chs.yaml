  这是一款仅适用于 Windows 的应用程序，是专为 Lua 设计的完整 IDE。它不针对基于 Lua 的框架。Lua Studio 是一款集成度很高的 Lua
  IDE；它会显示局部和全局变量的列表，以及关于调用堆栈的信息（参见图 14-3）。它甚至允许在调试时使用**单步进入**、**单步跳出**和**单步跳过**功能。


