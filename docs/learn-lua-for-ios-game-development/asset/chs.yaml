  \ 播放器\n*   Gideros Studio\n\n它还包含几个存放示例和文档的文件夹、一个适用于你安卓设备的安卓版播放器，以及 iPhone 和 iPad\
  \ 播放器的源代码。\n\n## 设置许可证\n\n开始使用 Gideros Studio 时，第一件要做的事就是启动许可证管理器（如图 9-2 所示），它允许使用你在创建账户下载\
  \ Gideros Studio 时使用的用户名来授权许可证。输入详细信息并授权免费许可证后，你将看到如图 9-3 所示的许可证窗口。\n\n![9781430246626_Fig09-02.jpg](img/9781430246626_Fig09-02.jpg)\n\
