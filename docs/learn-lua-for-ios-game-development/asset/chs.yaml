   -- body\n  print(i,v)\nend\n```\n\n### `load ( func [,chunkname] )`\n\n此函数类似于`dofile`命令；它使用函数`func`加载一个块。每次调用该函数时，它必须返回一个与前一个结果拼接的字符串。当块完成时，它返回`nil`和一个错误消息。`chunkname`用于调试。当函数被调用并发生错误时，Lua\
