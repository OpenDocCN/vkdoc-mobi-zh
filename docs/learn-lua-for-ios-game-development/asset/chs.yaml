  *   `setstepmul`：将`arg`设置为步进倍数的新值，并返回`step`的先前值。\n\n**提示** 如果您想知道应用程序的内存使用情况并清除内存和对象，您可以强制垃圾回收器释放并回收已分配的内存，然后使用`print(collectgarbage(\"\
  count\"))`命令打印清理后使用的内存量。\n\n### `dofile ( [filename] )`\n\n您在第 1 章中了解到，Lua 以块的形式执行代码。此函数打开指定的文件并执行其内容作为\
