  正如我们在前几章中所见，`AddListView` 包含以下用户可交互的元素，且这些元素必须链接到 `AddListViewModel`：一个 `UITextField`\
  \ 元素、两个 `UIButton` 元素（一个用于添加列表，另一个用于返回），以及一个 `IconSelector`。\n\n接下来，我们将探讨如何在 `bindViewToModel`\
  \ 方法中，针对这些元素中的每一个，与 `AddListViewModel` 执行数据绑定。\n\n`titleTextField` 元素是我们输入列表标题的地方。我们必须记住，要创建一个任务，此字段不能为空；否则，`addListButton`\
  \ 按钮将被禁用。\n\n因此，我们必须将 `titleTextField` 的内容同时绑定到 `addListButton` 按钮以启用它（`addListButton.rx.isEnabled`），以及绑定到\
  \ `AddListViewModel` 中的标题输入（`input.title`）（列表 4-18）。\n\n```\ntitleTextfield\n.rx.text\n\
  .map({ !($0?.isEmpty)! })\n.bind(to: addListButton.rx.isEnabled)\n.disposed(by:\
  \ disposeBag)\ntitleTextfield.rx.text\n.map({ $0! })\n.bind(to: viewModel.input.title\
  \ )\n.disposed(by: disposeBag)\n列表 4-18\n将 titleTextField 的内容绑定到 addListButton 的状态\n\
  ```\n\n通过 `rx.text`，我们访问 `UITextField` 的内容；然后通过 `map`，我们评估其是否为空，并将状态传递给 `addListButton`\
  \ 的 `isEnabled` 参数（这样，如果为空，则 `isEnabled` 为 `false`；如果包含文本，则 `isEnabled` 为 `true`）。\n\
  \n接下来，我们配置 `addListButton` 和 `backButton` 按钮在 `tap` 事件前的行为（列表 4-19）。\n\n```\naddListButton.rx.tap\n\
  .bind(to: viewModel.input.addList)\n.disposed(by: disposeBag)\nbackButton.rx.tap\n\
  .bind(to: viewModel.input.dismiss)\n.disposed(by: disposeBag)\nviewModel.output.dismiss\n\
  .drive(onNext: { [self] _ in\ndelegate?.navigateBack()\n})\n.disposed(by: disposeBag)\n\
  列表 4-19\n将 addListButton 和 backButton 绑定到它们对应的点击事件\n```\n\n`addListButton` 的功能是告诉\
  \ `AddListViewModel` 将新的任务列表保存到数据库（然后报告已添加，这样我们就回到了 `Home` 界面）。我们通过 `input.addList`\
  \ 参数来传达此信息。\n\n`backButton` 的功能是返回 `HomeScreen`，例如在完成添加新任务列表时。因此，我们不将其与 `delegate.navigateBack`\
  \ 方法的直接调用关联，而是在 ViewModel 中创建一个执行该调用功能的 Output（`output.dismiss`）和一个允许调用它的 Input（`input.dismiss`）。\n\
  \n对于 `iconSelectorView` 的情况，我们将修改 `IconSelectorView` 组件以使用 RxSwift，而不是委托模式。为此，我们所做的是消除该组件的协议（我们在\
  \ MVC 和 MVP 架构中使用过该协议），并引入一个类型为 `BehaviorRelay` 的新变量，该变量将发出所选图标的名称。\n\n```\nvar\
  \ selectedIcon = BehaviorRelay(value: \"checkmark.seal.fill\")\n```\n\n我们还将修改当选择一个图标时其名称通过委托发送的方法。我们只需将该值传递给创建的变量，让其传递即可：\n\
  \n```\nfunc collectionView(_ collectionView: UICollectionView, didSelectItemAt indexPath:\
  \ IndexPath) {\nselectedIcon.accept(Constants.icons[indexPath.item])\n}\n```\n\n\
  现在我们可以将 `iconSelectorView` 绑定到 `AddListViewModel`，以将图标名称作为输入（`input.icon`）传递给它（列表\
  \ 4-20）：\n\n```\niconSelectorView.selectedIcon\n.bind(to: viewModel.input.icon)\n\
  .disposed(by: disposeBag)\n列表 4-20\n将所选图标的名称与 AddListViewModel 绑定\n```\n\n最后，我们将绑定到\
  \ `AddListViewModel` 的 `addedList` 方法，以便当该方法执行时，应用程序导航回 `Home`。\n\n## `AddListViewModel`\n\
  \n`AddListModel` 类非常简单。在实例化这个类时，所做的操作是传递一个对 `TaskListService` 的引用（作为协议），以便它可以与模型交互，此外，我们还初始化了一个\
  \ `TaskListModel` 对象。\n\n遵循输入/输出约定，我们设置 `AddListViewModel` 的输入和输出参数。\n\n`AddListViewModel`\
  \ 的输入和输出定义。\n\n```\nclass AddListViewModel {\nvar output: Output!\nvar input: Input!\n\
  struct Input {\nlet icon: PublishRelay\nlet title: PublishRelay\nlet addList: PublishRelay\n\
  let dismiss: PublishRelay\n}\nstruct Output {\nlet dismiss: Driver\n}\n...\n}\n\
  ```\n\n现在，我们只需要在 `AddListViewModel` 的初始化中设置这些参数的行为（列表 4-21）。\n\n```\nclass AddListViewModel\
  \ {\n...\nprivate var tasksListService: TasksListServiceProtocol!\nprivate(set)\
  \ var list: TasksListModel!\nprivate let dismiss = BehaviorRelay(value: ())\ninit(tasksListService:\
  \ TasksListServiceProtocol) {\nself.tasksListService = tasksListService\nself.list\
  \ = TasksListModel(id: ProcessInfo().globallyUniqueString, icon: \"checkmark.seal.fill\"\
  ,\ncreatedAt: Date())\n// 输入\nlet icon = PublishRelay()\n_ = icon.subscribe(onNext:\
  \ { [self] newIcon in\nlist.icon = newIcon\n})\nlet title = PublishRelay()\n_ =\
  \ title.subscribe(onNext: { [self] newTitle in\nlist.title = newTitle\n})\nlet addList\
  \ = PublishRelay()\n_ = addList.subscribe(onNext: { [self] _ in\ntasksListService.saveTasksList(list)\n\
  dismiss.accept(())\n})\nlet dismissView = PublishRelay()\n_ = dismissView.subscribe(onNext:\
  \ { [self] _ in\ndismiss.accept(())\n})\ninput = Input(icon: icon, title: title,\
  \ addList: addList, dismiss: dismissView)\n// 输出\nlet backNavigation = dismiss.asDriver()\n\
  output = Output(dismiss: backNavigation)\n...\n}\n}\n列表 4-21\n建立与输入和输出相关联的参数的行为\n\
  ```\n\n`input.icon` 和 `input.title` 参数将接收所选图标和输入标题的相应值。\n\n对于 `input.addList` 参数，它将执行将新列表添加到数据库的方法，然后调用\
  \ `dismiss` 方法（我们已经在 `AddListView` 中看到该方法绑定到了委托的 `navigateBack` 方法）。\n\n`dismiss`\
  \ 方法将与通过 `input.dismiss` 参数调用的方法相同（我们在 `AddListView` 中已将其绑定到了 `backButton`）。\n\n\
  #### 任务列表界面\n\n此界面负责显示构成一个列表的任务，将它们标记为已完成、删除以及添加新任务。其组件之间的通信如图 4-13 所示。\n\n![](img/531999_1_En_4_Fig13_HTML.png)\n\
