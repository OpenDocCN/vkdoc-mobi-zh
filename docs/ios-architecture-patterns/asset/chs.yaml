  \ Presenter 从视图获取信息\n\n用户也可以在不创建任何任务列表的情况下退出此屏幕。只需选择导航后退按钮（`HomePresenter` 可以调用此方法，因为在实例化它时，我们将其传递给了它必须遵守的\
