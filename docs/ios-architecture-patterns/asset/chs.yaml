  这样，就会生成四个文件（每个实体对应两个文件）：\n\n```\nTask+CoreDataClass.swift\nTask+CoreDataProperties.swift\n\
  TasksList+CoreDataClass.swift\nTasksList+CoreDataProperties.swift\n```\n\n生成这些文件后，我们现在可以在项目中使用这些实体了。\n\
  \n## 创建 CoreDataManager\n\n现在，我们只需创建我们的类（`CoreDataManager.swift`）来管理应用程序的 Core Data\
  \ 栈。如以下代码所示，该类允许我们访问主上下文并能够保存它：\n\n```swift\nimport Foundation\nimport CoreData\n\
  \nclass CoreDataManager {\n    static let shared = CoreDataManager()\n    \n   \
  \ init() {}\n    \n    lazy var persistentContainer: NSPersistentContainer = {\n\
  \        let container = NSPersistentContainer(name: \"ToDoList\")\n        container.loadPersistentStores\
  \ { _, error in\n            if let error = error {\n                fatalError(\"\
  无法加载持久存储: \\(error)\")\n            }\n        }\n        return container\n   \
  \ }()\n    \n    lazy var mainContext: NSManagedObjectContext = {\n        return\
  \ persistentContainer.viewContext\n    }()\n    \n    func saveContext() {\n   \
  \     saveContext(mainContext)\n    }\n    \n    func saveContext(_ context: NSManagedObjectContext)\
  \ {\n        if context.parent == mainContext {\n            saveDerivedContext(context)\n\
  \            return\n        }\n        \n        context.perform {\n          \
  \  do {\n                try context.save()\n            } catch let error as NSError\
  \ {\n                fatalError(\"错误: \\(error.localizedDescription)\")\n      \
  \      }\n        }\n    }\n    \n    func saveDerivedContext(_ context: NSManagedObjectContext)\
  \ {\n        context.perform { [self] in\n            do {\n                try\
  \ context.save()\n            } catch let error as NSError {\n                fatalError(\"\
  错误: \\(error.localizedDescription)\")\n            }\n            saveContext(mainContext)\n\
  \        }\n    }\n}\n```\n\n## 总结\n\n对于本章，我们来总结一下所涉及的内容，可以将其分为两个部分：\n\n- 第一部分，我们重点讨论了如何高效地构建和搭建一个应用程序，因此我们研究了：\n\
  \    - 什么是软件架构、什么是架构模式，以及在开发应用程序时使用它们的好处\n    - 什么是 Clean Architecture 及其使用的优势\n\
  - 在本章的第二部分，我们重点讨论了将用于实践不同架构模式的示例应用程序：\n    - 我们了解了应用程序的总体描述、构成它的不同屏幕及其功能。\n    -\
  \ 我们了解了如何开发一个无需 storyboard 即可运行的应用程序。\n    - 我们使用 Core Data 创建了一个数据库，创建了用于存储数据的实体，最后，我们建立了一个类来处理\
  \ Core Data 的栈。\n\n脚注 1 2\n\n"
- "# 2. MVC：模型-视图-控制器\n\n## 什么是 MVC？\n\n### 一点历史\n\n模型-视图-控制器（MVC）模式由 Trygve Reenskaug\
  \ 于 20 世纪 70 年代末为 Smalltalk-76 编程语言引入。正如 Reenskaug 所写：[`https://folk.uio.no/trygver/`](https://folk.uio.no/trygver/)。\n\
  \n> 我创建模型-视图-控制器模式，是作为解决一个普遍问题的明显方案，即让用户从多个角度控制他们的信息。\n\n在这个初始版本中，用户通过视图进行交互，视图将操作发送给控制器，控制器进而更新模型（数据）并重绘视图。模型在更新时通知视图，并接收视图的新状态（图\
  \ 2-1）。\n\n![](img/531999_1_En_2_Fig1_HTML.png)\n\n一个框图展示了三个分别标记为视图、控制器和模型的区块。它说明了用户操作与控制器和视图之间的渲染通信。视图与模型之间通过通知和获取状态更新进行交互，以及控制器对模型的更新。\n\
  \n**图 2-1** 原始的模型-视图-控制器示意图\n\n\n\n### Apple 的模型-视图-控制器\n\n目前使用的 `MVC` 模式是经过更新以适应当前软件和设备的最新版本。它是当今移动应用开发中最著名且最常用的模式之一，也是苹果公司为此类开发推荐的模式（图\
  \ 2-2）。\n\n![](img/531999_1_En_2_Fig2_HTML.png)\n\n一个框图展示了三个分别标记为视图、控制器和模型的模块。它表示了从控制器到视图和模型的输出，而视图和模型则分别以用户操作和更新的形式向控制器提供输入。\n\
  \n图 2-2  \nApple 模型-视图-控制器架构图\n\n由于在移动应用开发中，通常会重用诸如视图之类的组件，因此对原始的 `MVC` 模式进行了修改，使得模型和视图不再直接关联。\n\
  \n通过这种新方案，视图接收用户的操作并将其传达给控制器。控制器在必要时更新模型（数据），更新完成后，再更新视图。\n\n在其文档中^(³)，苹果指出 `MVC`\
  \ 基于三种设计模式（我们在第 1 章已从通用角度介绍过）：\n\n- **组合模式**：视图由遵循树状结构的其他视图组成。例如，设想一个由更多视图（按钮、标签、图片……）组成的视图。\n\
  - **策略模式**：控制器可以管理一个或多个视图（这些视图没有内部逻辑，因此可重用），而视图将如何显示的问题委托给控制器。\n- **观察者模式**：需要知道应用状态（即模型中的数据）何时发生变化的控制器，必须订阅这些变化。\n\
  \n## MVC 中的组件\n\n我们刚刚看到这种架构中有三个组件：视图、模型和控制器。让我们更详细地研究每个组件的功能。\n\n##### 模型\n\n模型是保存业务逻辑并负责访问、操作或存储应用数据的组件。\n\
  \n- 它包含与数据持久化相关的类，例如，通过使用数据库（`Core Data`、`SQLite`、`Realm`……）或使用用户偏好设置（`UserDefaults`）。\n\
  - 它包含管理应用通信（`Networking`）并允许我们接收和发送数据的类。\n- 它包含解析来自应用外部的信息并将其转换为模型对象的类。\n- 它包含扩展、常量和辅助类。\n\
  - 一个模型对象可以与其他模型对象通信。\n- 模型不能直接与视图通信。模型与视图之间的通信是通过控制器进行的。\n\n#### 视图\n\n视图由用户可以看到的那些组件组成：\n\
  \n- 它们是派生自 `UIKit`、`AppKit`、`Core Animation` 和 `Core Graphics` 库的类。\n- 它们显示来自模型的数据，尽管它们不与模型直接连接（它们通过控制器进行）。\n\
  - 这些组件可以接收用户交互。\n\n### 控制器\n\n控制器充当模型和视图之间的中介：\n\n- 它是 `MVC` 模型的主要组件，并与视图和模型通信。\n\
  - 它接收并解释用户在视图上执行的操作，并相应地更新模型。\n- 如果模型中的数据发生变化，它会根据这些变化更新视图。\n- 它负责应用的生命周期。\n\n##\
  \ MVC 的优缺点\n\n`MVC` 架构模式是苹果推荐用于应用开发的模式；它通常是人们首先学习且最常用的模式。使用模型-视图-控制器架构既有优点也有缺点。\n\
  \n### MVC 模式的优点\n\n使用 `MVC` 模式具有一些优点：\n\n- 其设计简单。\n- 与其他架构模式相比，它使用的代码更少。\n- 它提供了清晰的职责分离；每个组件都有明确定义的职责。\n\
  - 它允许你在短时间内开发简单的应用。\n\n### MVC 模式的缺点\n\n`MVC` 模式的主要缺点在于控制器，这有以下几个原因：\n\n![](img/531999_1_En_2_Fig3_HTML.jpg)\n\
  \n一个框图展示了两个相邻的块，分别标记为控制器和视图，它们之间存在通信。还有一个标记为模型的块，它接收更新并向左侧的这两个块发送通知。\n\n图 2-3  \n\
  视图与控制器之间的耦合\n\n- 控制器与视图和模型耦合得非常紧密，因此其可重用性不高。\n- 控制器继承自 `UIViewController` 类，在这个类中，视图与控制器紧密绑定。这意味着职责分离通常会丧失，从而产生如下所示的架构（图\
  \ 2-3）。\n\n由于视图和控制器之间存在这种耦合，在没有视图介入的情况下独立测试控制器变得更加复杂。\n\n- 存在一种强烈的倾向去“过度加载”控制器，为其添加一系列并非其职责的任务，例如部分业务逻辑、代理、表格和集合的数据源、导航等。这导致了所谓的“巨型视图控制器”。\n\
  \n为了解决这个问题，我们可以采取一些措施，例如将视图代码迁移到其他类，将视图控制器之间的导航分离给协调器，或者将 `UITableViewControllers`\
  \ 或 `UICollectionView` 的代理和数据源移出视图控制器。\n\n## MVC 应用实践\n\n在我们了解了 `MVC` 架构的特性之后，现在我们将在应用开发中应用它。\n\
  \n注意\n\n整个项目可以从本书的代码仓库中下载。在解释如何在我们的项目中实现 `MVC` 架构时，我们只会展示最相关的代码部分。\n\n### MVC 分层\n\
  \n为了遵循应用架构模式（模型-视图-控制器）的逻辑，我们将创建一个模拟该架构各层的文件夹结构（图 2-4）。\n\n![](img/531999_1_En_2_Fig4_HTML.jpg)\n\
  \n一张截图突出显示了主文件夹“MVC, my to dos”下的一个文件夹和文件集合。它在“controller”子文件夹下展示了名为 App delegate、scene\
  \ delegate、assets、launch screen、info 和 to-do list 的文件。\n\n图 2-4  \nMVC 项目文件夹结构\n\
  \n\n\n##### 模型\n\n在此文件夹中，我们将存放所有与业务逻辑、数据访问与操作、扩展、常量等相关的内容。此外，我们可以创建子文件夹来按功能对文件进行分组（图\
  \ 2-5）：核心数据、扩展、服务等。\n\n![](img/531999_1_En_2_Fig5_HTML.jpg)\n\n该截图展示了 `model` 文件夹子文件夹下的文件，`model`\
  \ 本身也是 `MVC` 架构中 `my-to-dos` 下的子文件夹。`model` 下的子文件夹包括 `core data`、`models`、`services`、`extensions`\
  \ 和 `helpers`。\n\n**图 2-5** 模型层文件\n\n在 MVC 模型模式中我们看到，模型会通知控制器（使用观察者设计模式）。\n\n这样一来，控制器应当订阅模型中所发生的变更。\n\
  \n由于模型中发生的变更本质上是数据库中数据的添加、更新或删除操作，因此我们将利用 Core Data 自身的能力来获知这些变更。Core Data 能够根据产生的变更发出通知。\n\
  \n在我们的场景中，我们希望知道数据库何时发生变更（无论是添加新对象、删除对象还是更新对象），因此我们将使用以下通知：\n\n```\nNSManagedObjectContextObjectsDidChangeNotification\n\
  ```\n\n为此，我们只需在想要感知模型变更的控制器中的 `viewDidLoad` 方法里添加一个该通知的观察者：\n\n```\nNotificationCenter.default.addObserver(self,\n\
  \                                         selector: #selector(methodToExecute),\n\
  \                                         name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
  \                                         object: context)\n```\n\n`NSNotification.Name.NSManagedObjectContextObjectsDidChange`\
  \ 是控制器订阅的通知名称，`context` 是我们要关注的对象，而 `methodToExecute` 是检测到变更时要运行的方法，例如：\n\n```\n\
  @objc func methodToExecute() {\n    view.updateView()\n}\n```\n\n##### 核心数据\n\n\
  在此文件夹中，我们将存放 `CoreDataManager.swift` 文件（我们在第 1 章中创建）以及 Xcode 为数据库实体自动创建的四个文件。\n\n\
  ##### 模型\n\n这里存放的是我们可以将数据库实体转换成的模型。此外，我们将创建一个模型必须遵循的协议，以便在模型与实体之间相互转换（代码清单 2-1）。\n\
  \n```\nprotocol EntityModelMapProtocol {\n    associatedtype EntityType: NSManagedObject\n\
  \    func mapToEntityInContext(_ context: NSManagedObjectContext) -> EntityType\n\
  \    static func mapFromEntity(_ entity: EntityType) -> Self\n}\n```\n\n**代码清单 2-1**\
  \ EntityModelMapProtocol 代码\n\n在我们的应用程序中，将定义两个模型（`TaskModel` 和 `TasksListModel`），分别对应数据库中的一个实体。\n\
  \n每个模型也将遵循 `EntityModelMapProtocol` 协议，以便我们能够在模型与实体（`NSManagedObject` 子类）之间相互转换（代码清单\
  \ 2-2 和代码清单 2-3）。\n\n```\nstruct TaskModel {\n    var id: String!\n    var title:\
  \ String!\n    var icon: String!\n    var done: Bool!\n    var createdAt: Date!\n\
  }\n```\n\n**代码清单 2-3** `TaskModel.swift` 文件内容\n\n```\nstruct TasksListModel {\n\
  \    var id: String!\n    var title: String!\n    var icon: String!\n    var tasks:\
  \ [TaskModel]!\n    var createdAt: Date!\n}\n```\n\n**代码清单 2-2** `TasksListModel.swift`\
  \ 文件内容\n\n\n\n### 服务层\n\n在这里，我们将定义一些类，用于向数据库发送信息（创建、更新或删除）或从数据库中检索信息并将其转换为模型。\n\n\
  对于管理任务列表的类，我们将找到添加、检索或删除任务列表所需的方法。我们将在 `TasksListServiceProtocol` 协议中定义这些方法，然后在\
  \ `TasksListService` 类（清单 2-4）中实现它们。\n\n```\nprotocol TasksListServiceProtocol:\
  \ AnyObject {\n    init(coreDataManager: CoreDataManager)\n    func saveTasksList(_\
  \ list: TasksListModel)\n    func fetchLists() -> [TasksListModel]\n    func fetchListWithId(_\
  \ id: String) -> TasksListModel?\n    func deleteList(_ list: TasksListModel)\n\
  }\n\nclass TasksListService: TasksListServiceProtocol {\n    let context: NSManagedObjectContext\n\
  \    let coreDataManager: CoreDataManager\n\n    required init(coreDataManager:\
  \ CoreDataManager = CoreDataManager.shared) {\n        self.context = coreDataManager.mainContext\n\
  \        self.coreDataManager = coreDataManager\n    }\n\n    func saveTasksList(_\
  \ list: TasksListModel) {\n        _ = list.mapToEntityInContext(context)\n    \
  \    coreDataManager.saveContext(context)\n    }\n\n    func fetchLists() -> [TasksListModel]\
  \ {\n        var lists = [TasksListModel]()\n        do {\n            let fetchRequest:\
  \ NSFetchRequest = TasksList.fetchRequest()\n            let value = try context.fetch(fetchRequest)\n\
  \            lists = value.map({ TasksListModel.mapFromEntity($0) })\n         \
  \   lists = lists.sorted(by: { $0.createdAt.compare($1.createdAt) == .orderedDescending\
  \ })\n        } catch {\n            debugPrint(\"CoreData Error\")\n        }\n\
  \        return lists\n    }\n\n    func fetchListWithId(_ id: String) -> TasksListModel?\
  \ {\n        do {\n            let fetchRequest: NSFetchRequest = TasksList.fetchRequest()\n\
  \            fetchRequest.predicate = NSPredicate(format: \"id = %@\", id)\n   \
  \         let listEntities = try context.fetch(fetchRequest)\n            guard\
  \ let list = listEntities.first else {\n                return nil\n           \
  \ }\n            return TasksListModel.mapFromEntity(list)\n        } catch {\n\
  \            debugPrint(\"CoreData Error\")\n            return nil\n        }\n\
  \    }\n\n    func deleteList(_ list: TasksListModel) {\n        do {\n        \
  \    let fetchRequest: NSFetchRequest = TasksList.fetchRequest()\n            fetchRequest.predicate\
  \ = NSPredicate(format: \"id = %@\", list.id)\n            let listEntities = try\
  \ context.fetch(fetchRequest)\n            for listEntity in listEntities {\n  \
  \              context.delete(listEntity)\n            }\n            coreDataManager.saveContext(context)\n\
  \        } catch {\n            debugPrint(\"CoreData Error\")\n        }\n    }\n\
  }\n```\n\n清单 2-4\nTasksListServiceProtocol 和 TasksListService 的结构与方法\n\n对于管理任务的类\
  \ `TaskService`，我们将找到添加、检索、更新或删除任务所需的方法（清单 2-5）。与前例一样，我们将在一个协议中定义待实现的方法。\n\n```\n\
  protocol TaskServiceProtocol: AnyObject {\n    init(coreDataManager: CoreDataManager)\n\
  \    func saveTask(_ task: TaskModel, in taskList: TasksListModel)\n    func fetchTasksForList(_\
  \ taskList: TasksListModel) -> [TaskModel]\n    func updateTask(_ task: TaskModel)\n\
  \    func deleteTask(_ task: TaskModel)\n}\n\nclass TaskService: TaskServiceProtocol\
  \ {\n    let context: NSManagedObjectContext\n    let coreDataManager: CoreDataManager\n\
  \n    required init(coreDataManager: CoreDataManager = CoreDataManager.shared) {\n\
  \        self.context = coreDataManager.mainContext\n        self.coreDataManager\
  \ = coreDataManager\n    }\n\n    func saveTask(_ task: TaskModel, in taskList:\
  \ TasksListModel) {\n        do {\n            let fetchRequest: NSFetchRequest\
  \ = TasksList.fetchRequest()\n            fetchRequest.predicate = NSPredicate(format:\
  \ \"id = %@\", taskList.id)\n            guard let list  = try context.fetch(fetchRequest).first\
  \ else {\n                return\n            }\n            let taskEntity = task.mapToEntityInContext(context)\n\
  \            list.addToTasks(taskEntity)\n            coreDataManager.saveContext(context)\n\
  \        } catch {\n            debugPrint(\"CoreData Error\")\n        }\n    }\n\
  \n    func fetchTasksForList(_ taskList: TasksListModel) -> [TaskModel] {\n    \
  \    var tasks = [TaskModel]()\n        do {\n            let fetchRequest: NSFetchRequest\
  \ = TasksList.fetchRequest()\n            fetchRequest.predicate = NSPredicate(format:\
  \ \"id = %@\", taskList.id)\n            guard let list  = try context.fetch(fetchRequest).first,\n\
  \                  let taskEntities = list.tasks else {\n                return\
  \ tasks\n            }\n            tasks = taskEntities.map({ TaskModel.mapFromEntity($0\
  \ as! Task) })\n        } catch {\n            debugPrint(\"CoreData Error\")\n\
  \        }\n        return tasks\n    }\n\n    func updateTask(_ task: TaskModel)\
  \ {\n        do {\n            let fetchRequest: NSFetchRequest = Task.fetchRequest()\n\
  \            fetchRequest.predicate = NSPredicate(format: \"id = %@\", task.id)\n\
  \            guard let taskEntity = try context.fetch(fetchRequest).first else {\n\
  \                return\n            }\n            taskEntity.done = task.done\n\
  \            coreDataManager.saveContext(context)\n        } catch {\n         \
  \   debugPrint(\"CoreData Error\")\n        }\n    }\n\n    func deleteTask(_ task:\
  \ TaskModel) {\n        do {\n            let fetchRequest: NSFetchRequest = Task.fetchRequest()\n\
  \            fetchRequest.predicate = NSPredicate(format: \"id = %@\", task.id)\n\
  \            let taskEntities = try context.fetch(fetchRequest)\n            for\
  \ taskEntity in taskEntities {\n                context.delete(taskEntity)\n   \
  \         }\n            coreDataManager.saveContext(context)\n        } catch {\n\
  \            debugPrint(\"CoreData Error\")\n        }\n    }\n}\n```\n\n清单 2-5\n\
  TaskServiceProtocol 和 TaskService 的结构与方法\n\n##### 扩展\n\n在此示例中，我们创建了一个 `UIColor`\
  \ 扩展，以便轻松访问专门为此应用程序创建的、位于 `Assets` 文件中的颜色。\n\n我们还将为 `NSManagedObject` 类添加一个扩展，该扩展将避免我们在进行测试部分时与上下文发生冲突。\n\
  \n##### 常量\n\n常量包含了我们在应用程序中将使用的固定参数。在本例中，它是一个图标名称列表，用户可以在创建任务或任务列表时从中选择图标。\n\n###\
  \ 视图层\n\n这一层包含了用户可以看到的所有元素，这些元素构成了图形界面，并且用户可以与它们进行交互（图 2-6）。\n\n这些视图可以是简单的，比如一个按钮或一个标签，也可以是复杂的，比如包含按钮、标签、图像等元素的整个页面视图。\n\
  \n对于简单的视图，它们通常是整个应用程序中重复使用的图形元素，例如一个按钮。\n\n更复杂的视图则由更简单视图组合而成。由于我们不使用 `storyboards`\
  \ 或 `xib` 文件，我们将通过约束来定义每个组件的特性，例如其位置或大小。\n\n![](img/531999_1_En_2_Fig6_HTML.jpg)\n\
  \n此截图显示了视图文件夹子文件夹下的文件，该视图文件夹又是 M V C, my-to-dos 下的子文件夹。视图下的子文件夹包括：empty state, labels,\
  \ collection, screen, buttons, 和 cells。\n\n图 2-6\n视图层文件\n\n### 控制器层\n\n控制器（`UIViewController`\
  \ 的子类）是应用程序的主要部分，负责连接模型和视图。我们应用程序中的每个屏幕都是一个视图控制器（图 2-7）。\n\n![](img/531999_1_En_2_Fig7_HTML.jpg)\n\
  \n此截图显示了名为 controller 的文件夹下的文件，该文件夹是 M V C, my-to-dos 下的子文件夹。这些文件是：home view controller,\
  \ add list controller, add task controller, 和 task view controller。\n\n图 2-7\n控制器层文件\n\
  \n### MyToDos 应用程序屏幕\n\n在第一章 1 中，我们描述了我们将用于实现本书中将要讲解的每种架构模式的应用程序。\n\n你可能还记得，这个应用程序有四个屏幕，每个屏幕由一个\
  \ `UIViewController` 表示，并与视图和模型相关联，管理信息在两者之间的传递。\n\n\n\n### 信息流\n\n那么，我们如何传递这些信息呢？\n\
  \n控制器是 MVC 模式的核心部分，它将包含对视图和模型的引用（实例）。因此，控制器能够通过直接调用视图和模型的公有方法来传递信息。\n\n例如，如果我们的控制器中有一个\
  \ `TasksListService` 类（模型）的实例，我们可以通过调用它的 `fetchList` 方法来获取任务列表：\n\n```\nlet tasksLists\
  \ = tasksListService.fetchLists()\n```\n\n然后将这些信息传递给视图：\n\n```\nlet view = HomeView()\n\
  view.setLists(taskLists)\n```\n\n#### 委托模式\n\n那么，视图中的用户交互，我们如何将其传递给控制器呢？\n\n由于视图没有控制器实例来调用其方法，我们可以通过使用*委托模式*来实现这一点。\n\
  \n这种设计模式允许一个类将某些职责委托给另一个类的实例。在我们的案例中，针对视图中用户交互的行为将由控制器来实现。\n\n#### 如何实现委托模式\n\n\
  要实现*委托模式*，首先，我们创建一个协议（protocol），其中包含我们想要委托的方法。例如，让我们创建一个包含两个方法的示例协议：\n\n```\nprotocol\
  \ ExampleDelegate: AnyObject {\n    func methodA()\n    func methodB(value: String)\n\
  }\n```\n\n下一步是在进行委托的类（在我们的案例中就是视图）中，创建一个我们已创建的协议类型的属性，并将其命名为 `delegate`：\n\n```\n\
  class ExampleView {\n    ...\n    weak var delegate: ExampleDelegate?\n    ...\n\
  }\n```\n\n现在，根据视图中发生的事件（按下按钮、在文本框中输入等），我们可以调用协议中的不同方法：\n\n```\ndelegate?.methodA()\n\
  delegate?.methodB(value: \"Input text\")\n```\n\n现在，在控制器中，为了让它能够实现协议方法，我们必须将 `exampleView`\
  \ 实例的 `delegate` 属性设置为 `self`，表明将由该控制器来实现协议方法：\n\n```\nclass ExampleViewController\
  \ {\n    ...\n    exampleView.delegate = self\n    ...\n}\n```\n\n最后，我们必须让控制器采纳该协议并实现其方法（我们可以在扩展中这样做，以提高代码可读性）：\n\
  \n```\nextension ExampleViewController: ExampleDelegate {\n    func methodA() {\
  \ ... }\n    func methodB(value: String) { ... }\n}\n```\n\n现在，我们来看看如何在我们应用开发中实现这一切。在每个界面的开头，我们将展示一个图表，说明不同组件（主要组件）之间如何相互通信。\n\
  \n#### AppDelegate 和 SceneDelegate\n\n自 iOS 13 发布以来，`AppDelegate` 在先前版本中的部分职责已转移到了\
  \ `SceneDelegate`。因此，现在 `AppDelegate` 负责应用的生命周期及其设置，而 `SceneDelegate` 则负责屏幕上显示的内容及其显示方式。\n\
  \n在我们要开发的示例应用中，我们不会修改 Xcode 创建应用时自动生成的 `AppDelegate`。我们要做的是修改 `SceneDelegate`，特别是\
  \ `scene(_:willConnectTo:options:)` 方法，这是 `UISceneSession` 生命周期中第一个被调用的方法（代码清单 2-6）。\n\
  \n```\nfunc scene(_ scene: UIScene, willConnectTo session: UISceneSession, options\
  \ connectionOptions: UIScene.ConnectionOptions) {\n    if let windowScene = scene\
  \ as? UIWindowScene {\n        let window = UIWindow(windowScene: windowScene)\n\
  \        let navigationController = UINavigationController(rootViewController: HomeViewController(tasksListService:\
  \ TasksListService(), taskService: TaskService()))\n        navigationController.interactivePopGestureRecognizer?.isEnabled\
  \ = false\n        window.backgroundColor = .white\n        window.rootViewController\
  \ = navigationController\n        self.window = window\n        window.makeKeyAndVisible()\n\
  \    }\n}\n```\n\n**代码清单 2-6** — 在 `SceneDelegate` 中修改以调用 `HomeViewController`\n\
  \n如您所见，我们在此方法中所做的是创建一个新的 `UIWindow`，设置应用的根视图控制器（它是一个 `UINavigationController` 组件，其第一个控制器将是\
  \ `HomeViewController` 类），最后，使我们创建的窗口成为要显示的关键窗口。\n\n### 主屏幕\n\n在主屏幕上，主要组件是 `HomeViewController`\
  \ 类，我们可以在图 2-8 中看到它如何与其余组件进行通信。\n\n![](img/531999_1_En_2_Fig8_HTML.png)\n\n**图 2-8**\
  \ — 主屏幕组件通信示意图\n\n\n\n### `HomeViewController`\n\n控制器（`HomeViewController`）是 MVC\
  \ 模式的核心，必须持有对视图（`HomeView`）和模型（`TasksListServiceProtocol` 及 `TaskServiceProtocol`）的引用，如代码清单\
  \ 2-7 所示。\n\n在初始化器中传入所需的类的实例（这被称为*依赖注入*），可以使组件之间的耦合度更低，并便于实施单元测试（例如使用 mock 对象）。\n\
  \n```\nclass HomeViewController: UIViewController {\n    private var homeView =\
  \ HomeView()\n    private var tasksListService: TasksListServiceProtocol!\n    private\
  \ var taskService: TaskServiceProtocol!\n    init(tasksListService: TasksListServiceProtocol,\n\
  \         taskService: TaskServiceProtocol) {\n        super.init(nibName: nil,\
  \ bundle: nil)\n        self.tasksListService = tasksListService\n        self.taskService\
  \ = taskService\n    }\n    ...\n}\nListing 2-7\nHomeViewController initialization\n\
  ```\n\n正如我们在 MVC 架构中所见，控制器会将信息传递给视图进行展示。我们通过 `fetchTasksLists` 方法来实现这一点，其功能是从数据库中检索信息并将其传递给视图（代码清单\
  \ 2-8）。\n\n```\nfunc fetchTasksLists() {\n    let lists = tasksListService.fetchLists()\n\
  \    homeView.setTasksLists(lists)\n}\nListing 2-8\nThe fetchTasksLists method calls\
  \ the Model to fetch the lists and then passes them to the View\n```\n\n另一方面，控制器会通过*委托模式*接收用户交互并做出相应处理。\n\
  \n这些交互包括：\n\n*   访问任务列表。\n*   添加任务列表。\n*   删除任务列表。\n\n为此，我们首先定义一个包含这些交互相关方法的协议（代码清单\
  \ 2-9）。\n\n```\nprotocol HomeViewDelegate: AnyObject {\n    func addListAction()\n\
  \    func selectedList(_ list: TasksListModel)\n    func deleteList(_ list: TasksListModel)\n\
  }\nListing 2-9\nHomeViewDelegate protocol\n```\n\n然后，我们让 `HomeViewController` 遵循此协议并实现其方法（代码清单\
  \ 2-10）。\n\n```\nextension HomeViewController: HomeViewDelegate {\n    func addListAction()\
  \ {\n        let addListViewController = AddListViewController(tasksListModel: list,\
  \ taskService: taskService, tasksListService: tasksListService)\n        navigationController?.pushViewController(addListViewController,\
  \ animated: true)\n    }\n    func selectedList(_ list: TasksListModel) {\n    \
  \    let taskViewController = TaskListViewController(tasksListModel: list)\n   \
  \     navigationController?.pushViewController(taskViewController, animated: true)\n\
  \    }\n    func deleteList(_ list: TasksListModel) {\n        tasksListService.deleteList(list)\n\
  \    }\n}\nListing 2-10\nHomeViewController extension that implements the HomeViewDelegate\
  \ protocol methods\n```\n\n当用户点击“添加列表”按钮时，会执行 `addListAction` 方法，并将应用导航到 `AddListViewController`\
  \ 屏幕。\n\n`selectedList` 方法会将应用导航到 `TaskListViewController` 屏幕（并将所选的列表信息传递给它）。\n\n\
  最后，`deleteList` 方法负责通知模型必须从数据库中删除所选列表，然后重新加载视图。\n\n此外，我们还需要实现对模型的观察，以便在任务列表被添加或删除时更新视图（代码清单\
  \ 2-11）。\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    NotificationCenter.default.addObserver(self,\n\
  \                                           selector: #selector(contextObjectsDidChange),\n\
  \                                           name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
  \                                           object: CoreDataManager.shared.mainContext)\n\
  }\n@objc func contextObjectsDidChange() {\n    fetchTasksLists()\n}\nListing 2-11\n\
  Model observer implementation\n```\n\n### `HomeView`\n\n基本上，`HomeView` 由一个 `UITableView`\
  \ 元素（用于显示信息）和一个 `UIButton` 元素（用于添加新列表）组成。我们之前已经看到，控制器通过 View 的 `setTasksList` 方法将需要显示的信息传递给视图（代码清单\
  \ 2-12）。\n\n```\nfunc setTasksLists(_ lists: [TasksListModel]) {\n    tasksList\
  \ = lists\n    tableView.reloadData()\n    emptyState.isHidden = tasksList.count\
  \ > 0\n}\nListing 2-12\nUpon receiving the information from HomeViewController,\
  \ the HomeView is updated with the new data\n```\n\n在这个函数中，我们获取 `lists` 参数并将其赋值给类的\
  \ `taskList` 变量（我们将使用它来填充表格），重新加载表格，并根据列表是否包含值来隐藏或显示“空状态”。\n\n另一方面，View 还需要通过委托将用户交互传递给控制器。\n\
  \n我们将在 `HomeView` 的顶部添加一个 `HomeViewDelegate` 类型的委托属性来实现这一点：\n\n```\nclass HomeView:\
  \ UIView {\n    ...\n    weak var delegate: HomeViewDelegate?\n    ...\n}\n```\n\
  \n此外，在 `HomeViewController` 中，我们必须将 `HomeView` 实例的 `delegate` 属性配置为 `self`，以指示将由\
  \ `HomeViewController` 来实现协议方法（代码清单 2-13）。\n\n```\nclass HomeViewController: UIViewController\
  \ {\n    ...\n    override func loadView() {\n        super.loadView()\n       \
  \ setupHomeView()\n    }\n    private func setupHomeView() {\n        homeView.delegate\
  \ = self\n        self.view = homeView\n    }\n    ...\n}\nListing 2-13\nSetting\
  \ HomeView delegate on HomeViewController\n```\n\n一旦定义了委托，我们就可以在代码中使用它，并调用各个协议函数。\n\
  \n因此，`addListAction` 方法将从与添加列表按钮关联的函数中被调用（代码清单 2-14）。\n\n```\nextension HomeView\
  \ {\n    ...\n    func configureAddListButton() {\n        addListButton.addTarget(self,\
  \ action: #selector(addListAction), for: .touchUpInside)\n        ...\n    }\n \
  \   @objc func addListAction() {\n        delegate?.addListAction()\n    }\n   \
  \ ...\n}\nListing 2-14\nConfigure the addListButton target\n```\n\n当用户选中表格中的某个单元格时，将调用\
  \ `selectList` 方法（代码清单 2-15）。\n\n```\nfunc tableView(_ tableView: UITableView, didSelectRowAt\
  \ indexPath: IndexPath) {\n    delegate?.selectedList(tasksList[indexPath.row])\n\
  }\nListing 2-15\nHomeView delegates the selectedList method implementation to the\
  \ HomeViewController\n```\n\n当用户滑动某个单元格时，将调用 `deleteList` 方法（代码清单 2-16）。\n\n```\n\
  func tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,\
  \ forRowAt indexPath: IndexPath) {\n    if editingStyle == .delete {\n        let\
  \ list = tasksList[indexPath.row]\n        tasksList.remove(at: indexPath.row)\n\
  \        tableView.deleteRows(at: [indexPath], with: .automatic)\n        delegate?.deleteList(list)\n\
  \    }\n}\nListing 2-16\nOn swipe a cell, the delete method is called (removing\
  \ cell from the table, and delegating the deletion from the Model to the HomeViewController)\n\
  ```\n\n### 添加列表屏幕\n\n此屏幕负责添加任务列表，其组件之间的通信如图 2-9 所示。\n\n![](img/531999_1_En_2_Fig9_HTML.png)\n\
  \n该框图展示了添加列表视图、添加列表视图控制器和任务列表服务之间的通信。添加列表视图包含一个名为图标选择器视图的子视图。中间的添加列表视图控制器与主视图控制器之间存在导航。\n\
  \n**图 2-9**\n\n添加列表屏幕组件通信示意图\n\n\n\n### `AddListViewController`\n\n在`AddListViewController`（即添加任务列表的界面）中，我们持有视图（`AddListView`）和模型（`TasksListService`）的引用；不过在本例中，我们不会将信息从控制器传递到视图，而仅通过委托来接收用户交互（如代码清单\
  \ 2-17 所示）。\n\n```\nclass AddListViewController: UIViewController {\nprivate var\
  \ tasksListService: TasksListService!\ninit(tasksListService: TasksListService)\
  \ {\nsuper.init(nibName: nil, bundle: nil)\nself.tasksListService = tasksListService\n\
  }\n...\nprivate func setupAddListView() {\naddListView.delegate = self\nself.view\
  \ = addListView\n}\nprivate func backToHome() {\nnavigationController?.popViewController(animated:\
  \ true)\n}\n}\nextension AddListViewController: AddListViewDelegate {\nfunc addList(_\
  \ list: TasksListModel) {\ntasksListService.saveTasksList(list)\nbackToHome()\n\
  }\n}\nextension AddListViewController: BackButtonDelegate {\nfunc navigateBack()\
  \ {\nbackToHome()\n}\n}\n代码清单 2-17\nAddListViewController 的实现\n```\n\n如您所见，我们在`AddListView`类上只设置了一个委托参数，但`AddListViewController`却遵循了两个协议：`AddListViewDelegate`和`BackButtonDelegate`。这是因为，正如我们接下来要看到的，我们可以为委托设置多种类型。\n\
  \n### `AddListView`\n\n`AddListView`包含一个用于输入任务列表名称的`UITextField`元素、一个用于选择列表图标的`UICollectionView`元素、一个创建列表的按钮，以及另一个返回`Home`界面的按钮。\n\
  \n在此视图中，我们可以同时看到委托模式的两个方面。\n\n一方面，它将一系列方法的实现委托给了引用它的控制器。\n\n因此，`AddListView`将`BackButtonDelegate`和`AddListViewDelegate`协议所涉及方法的实现委托给了`AddListViewController`（如代码清单\
  \ 2-18 所示）。\n\n```\nprotocol BackButtonDelegate: AnyObject {\nfunc navigateBack()\n\
  }\nprotocol AddListViewDelegate: AnyObject {\nfunc addList(_ list: TasksListModel)\n\
  }\n代码清单 2-18\nBackButtonDelegate 和 AddListViewDelegate 的实现\n```\n\n第一个协议用于指示用户选择了返回按钮，且未创建任何列表。第二个协议允许我们将已创建列表的数据传递给控制器（控制器将负责请求模型将其保存到数据库中）。\n\
  \n由于我们希望在控制器中实现所有这些协议，因此在视图中，我们可以创建一个同时遵循所有这些协议的委托（如果我们不想实现其中任何一个，则应创建名称不同的独立委托）：\n\
  \n```\nweak var delegate: (AddListViewDelegate & BackButtonDelegate)?\n```\n\n现在，我们可以通过委托调用不同的方法了（如代码清单\
  \ 2-19 所示）。\n\n```\n@objc func backAction() {\ndelegate?.navigateBack()\n}\n@objc\
  \ func addListAction() {\nguard titleTextfield.hasText else { return }\nlistModel.title\
  \ = titleTextfield.text\nlistModel.id = ProcessInfo().globallyUniqueString\nlistModel.icon\
  \ = listModel.icon ?? \"checkmark.seal.fill\"\nlistModel.createdAt = Date()\ndelegate?.addList(listModel)\n\
  }\n代码清单 2-19\n通过委托调用 AddListViewController 中的方法\n```\n\n但`AddListView`不仅委托了方法的实现，它自身也实现了其他方法。因此，我们在该视图中集成的图标选择器`IconSelectorView`引入了`IconSelectorViewDelegate`协议。\n\
  \n该协议要求我们实现一个用于返回用户所选图标的方法（如代码清单 2-20 所示）。\n\n```\nprotocol IconSelectorViewDelegate:\
  \ AnyObject {\nfunc selectedIcon(_ icon: String)\n}\nfunc configureCollectionView()\
  \ {\n...\niconSelectorView.delegate = self\n...\n}\nextension AddListView: IconSelectorViewDelegate\
  \ {\nfunc selectedIcon(_ icon: String) {\nlistModel.icon = icon\n}\n}\n代码清单 2-20\n\
  IconSelectorViewDelegate 的实现\n```\n\n#### 任务列表界面\n\n该界面负责显示构成某个列表的任务，并对它们进行标记完成、删除以及添加新任务等操作。其组件之间的通信如图\
