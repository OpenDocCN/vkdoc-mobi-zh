  ```\n清单 6-27: `AddListViewController`初始化\n\n最后，我们编写代码使`AddListViewController`遵循`AddListViewControllerInput`协议（清单\
  \ 6-28）。\n\n```\nextension AddListViewController: AddListViewControllerInput {\n\
