  \ })\n        .disposed(by: disposeBag)\n}\n列表 4-30 AddTaskView 与 AddTaskViewModel\
  \ 之间的绑定元素\n```\n\n\n\n`AddTaskViewModel`\n\n`AddTaskViewModel`类将负责在数据库中创建和记录任务。与之前的\
  \ ViewModel 类似，我们从设置输入和输出开始（列表 4-31）。\n\n```swift\nclass AddTaskViewModel {\n  \
  \  var output: Output!\n    var input: Input!\n    \n    struct Input {\n      \
