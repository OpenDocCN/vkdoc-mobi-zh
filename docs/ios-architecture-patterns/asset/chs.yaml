  *图 1-17* – 移除 `Main.storyboard`\n\n*   然后，我们删除 `Main.storyboard` 文件（图 1-17）。\n\n\
  ![](img/531999_1_En_1_Fig18_HTML.png)\n\n*图 1-18* – 从 `Info.plist` 中移除 storyboard\
  \ 引用\n\n*   最后，我们访问 `Info.plist` 文件，展开其内容，并移除 Storyboard Name 这一行：*Information Property\
  \ List* ➤ *Application Scene Manifest* ➤ *Scene Configuration* ➤ *Application Session\
  \ Role* ➤ *Item 0* ➤ *Storyboard Name*（图 1-18）。\n\n*   当使用 storyboard 时，`window`\
  \ 属性会自动初始化，并且根视图控制器会被设置为 storyboard 中的初始视图控制器。移除 storyboard 后，我们需要自己完成这项工作。\n\n\
  这需要在 `SceneDelegate.swift` 文件中完成，修改函数的内容\n\n```swift\nfunc scene(_ scene: UIScene,\
  \ willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
