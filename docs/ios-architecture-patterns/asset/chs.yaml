  \n*列表 5-53. `addTaskList` 方法的测试*\n\n### `HomeInteractor`\n\n`HomeInteractorTest`\
  \ 中的测试设置与 `HomePresenterTest` 类似；我们创建不同类的实例，以便配置环境及其关系。与 `HomePresenterTest` 相同，我们也将使用\
  \ `MockHomeRouter` 来模拟导航并进行测试（列表 5-54）。\n\n```\nimport XCTest\n@testable import\
