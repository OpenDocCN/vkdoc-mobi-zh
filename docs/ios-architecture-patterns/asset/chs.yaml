  \ TaskModel\n}\nstruct Response {\nlet tasks: [TaskModel]\n}\nstruct ViewModel {\n\
  let tasks: [TaskModel]\n}\n}\n}\nListing 6-50\nTaskListModel code\n```\n\n### `TaskListRouter`\n\
  \n从我们在开发此场景中看到的情况来看，我们知道需要在 `TaskListRouter`（通过其协议）中建立两个方法：一个不允许我们返回首页（`navigateBack`），另一个向我们展示添加新任务的场景（`showAddTaskView`）（代码清单\
  \ 6-51）。\n\n```\nprotocol TaskListRouterDelegate {\nfunc navigateBack()\nfunc showAddTaskView(delegate:\
  \ AddTaskDelegate, tasksList: TasksListModel)\n}\nListing 6-51\nTaskListRouterDelegate\
  \ protocol definition\n```\n\n这些方法的实现与其他案例中已实现的类似。要返回首页，我们只需使用 `popViewController`\
  \ 方法；要显示 `AddTask` 场景，我们将创建并配置 `AddTaskViewController`，并向其传递 `addTaskDelegate`（我们在开发\
  \ `TaskListInteractor` 时已提及）以及包含任务列表的 `TasksListModel` 对象，新任务将添加到此列表中（代码清单 6-52）。\n\
  \n```\nfinal class TaskListRouter {\nweak var viewController: UIViewController?\n\
  }\nextension TaskListRouter: TaskListRouterDelegate {\nfunc navigateBack() {\nviewController?.navigationController?.popViewController(animated:\
  \ true)\n}\nfunc showAddTaskView(delegate: AddTaskDelegate, tasksList: TasksListModel)\
  \ {\nlet addTaskViewController = AddTaskViewController(addTaskView: AddTaskView())\n\
  viewController?.present(AddTaskConfigurator.configure(addTaskViewController, delegate:\
  \ delegate, tasksList: tasksList), animated: true)\n}\n}\nListing 6-52\nTaskListRouterDelegate\
  \ conformation code\n```\n\n## AddTask 场景\n\n应用的最后一个屏幕 AddTask，允许我们向任务列表中添加新任务。在图\
  \ 6-6 中，您可以看到构成它的组件以及它们之间的连接。\n\n![](img/531999_1_En_6_Fig6_HTML.png)\n\n一张说明添加任务场景组件的插图，包括路由器、配置器、视图、交互器、展示器、任务列表和任务列表服务。\n\
  \nFigure 6-6\n\nAddTask 场景组件和通信架构\n\n### AddTaskConfigurator\n\n在开发 `AddTaskConfigurator`\
  \ 时，除了实例化不同组件并建立它们之间的连接，我们还必须牢记，在 `AddTaskInteractor` 实例中，我们必须同时传递要添加新任务的任务列表和用于连接\
  \ `TaskListInteractor` 以更新任务列表视图的委托（`AddTaskDelegate`）（代码清单 6-53）。\n\n```\nfinal\
  \ class AddTaskConfigurator {\nstatic func configure( _ viewController: AddTaskViewController,\
  \ delegate: AddTaskDelegate, tasksList: TasksListModel) -> AddTaskViewController\
  \ {\nlet interactor = AddTaskInteractor(tasksList: tasksList, taskService: TaskService(),\
  \ delegate: delegate)\nlet presenter = AddTaskPresenter()\nlet router = AddTaskRouter()\n\
  router.viewController = viewController\npresenter.viewController = viewController\n\
  interactor.presenter = presenter\nviewController.interactor = interactor\nviewController.router\
  \ = router\nreturn viewController\n}\n}\nListing 6-53\nAddTaskConfigurator code\n\
  ```\n\n### AddTaskView\n\n`AddTaskView` 在概念上与 `AddTaskListView` 非常相似，包含一个用于添加任务标题的字段和一个图标选择器。但与\
  \ `AddTaskListView` 不同的是，后者有一个按钮，可以在我们不想添加新列表时返回上一屏幕。由于我们现在是在 `TaskList` 场景上弹出此屏幕，而不是导航到它，因此我们不需要那个按钮，因为我们可以通过向下滑动的手势来让此屏幕消失。\n\
  \n因此，允许我们与 `AddTaskViewController` 通信的协议只有一个方法（`addTaskWith(title:_, icon:_)`）（代码清单\
  \ 6-54）。\n\n```\nprotocol AddTaskViewDelegate: AnyObject {\nfunc addTaskWith(title:\
  \ String, icon: String)\n}\nfinal class AddTaskView: UIView {\nweak var delegate:\
  \ AddTaskViewDelegate?\n...\n}\nextension AddTaskView {\n...\n@objc func addTaskAction()\
  \ {\nguard titleTextfield.hasText else { return }\ndelegate?.addTaskWith(title:\
  \ titleTextfield.text!, icon: icon)\n}\n}\nListing 6-54\nAddTaskViewDelegate definition\
  \ and use\n```\n\n#### AddTaskViewController\n\n通过减少视图的功能，我们也减少了 `AddTaskViewController`\
  \ 中的代码。因此，我们为此类创建的输入和输出协议在这种情况下各自只包含一个方法：用于输出的 `addTask` 和用于输入的 `dismissView`（代码清单\
  \ 6-55）。\n\n```\nprotocol AddTaskViewControllerInput: AnyObject {\nfunc dismissView()\n\
  }\nprotocol AddTaskViewControllerOutput: AnyObject {\nfunc addTask(request: AddTaskModel.AddTask.Request)\n\
  }\nListing 6-55\nAdTaskViewControllerInput and AddTaskViewControllerOutput protocols\
  \ definition\n```\n\n另一方面，我们还定义了其方法应由 `TaskListInteractor` 实现的协议，以告诉它在添加新任务时更新列表中的任务视图（代码清单\
  \ 6-56）。\n\n```\nprotocol AddTaskDelegate: AnyObject {\nfunc didAddTask()\n}\nListing\
  \ 6-56\nAddTaskDelegate protocol definition to allow AddTask scene to connect to\
  \ TaskList scene\n```\n\n定义了这些协议后，我们继续开发 `AddTaskViewController` 的初始化代码。在此代码中，我们基本上将从\
  \ `AddTaskView` 传递的实例分配给视图，向其分配委托，并实现该委托的方法（代码清单 6-57）。在此方法中，我们所做的是生成一个包含新任务标题和图标值的请求，并将其传递给交互器。\n\
  \n```\nfinal class AddTaskViewController: UIViewController {\nvar interactor: AddTaskInteractorInput?\n\
  var router: AddTaskRouterDelegate?\nprivate let addTaskView: AddTaskView\ninit(addTaskView:\
  \ AddTaskView) {\nself.addTaskView = addTaskView\nsuper.init(nibName: nil, bundle:\
  \ nil)\n}\nrequired init?(coder: NSCoder) {\nfatalError(\"init(coder:) has not been\
  \ implemented\")\n}\noverride func viewDidLoad() {\nsuper.viewDidLoad()\naddTaskView.delegate\
  \ = self\nself.view = addTaskView\n}\n}\n...\nextension AddTaskViewController: AddTaskViewDelegate\
  \ {\nfunc addTaskWith(title: String, icon: String) {\nlet request = AddTaskModel.AddTask.Request(title:\
  \ title, icon: icon)\ninteractor?.addTask(request: request)\n}\n}\nListing 6-57\n\
  AddTaskViewController initialization code\n```\n\n最后，我们需要让 `AddTaskViewController`\
  \ 符合其输入协议，该协议在这种情况下指示路由器让视图消失。\n\n```\nextension AddTaskViewController: AddTaskViewControllerInput\
  \ {\nfunc dismissView() {\nrouter?.dismissView()\n}\n}\n```\n\n\n\n### `AddTaskInteractor`\n\
  \n从 `AddListInteractor` 开始，我们定义了输出协议（`AddTaskInteractorOutput`），该协议只有一个方法，并且与之前的情况类似，我们将\
  \ `AddTaskViewControllerOutput` 输出协议重命名为 `AddTaskInteractorInput`（清单 6-58）。\n\n\
  ```\nprotocol AddTaskInteractorOutput: AnyObject {\n    func dismissView()\n}\n\
  typealias AddTaskInteractorInput = AddTaskViewControllerOutput\n```\n\n接下来，我们进入这个类的初始化部分，在这里我们传入\
  \ `TaskListModel` 对象（将向其添加新创建的任务）、`TaskService`（用于连接数据库并保存新任务）以及委托（该委托允许我们向 `TaskList`\
  \ 场景指示用新任务更新视图）（清单 6-59）。\n\n```\nfinal class AddTaskInteractor {\n    var presenter:\
  \ AddTaskPresenterInput?\n    private var tasksList: TasksListModel!\n    private\
  \ var taskService: TaskServiceProtocol!\n    weak var delegate: AddTaskDelegate?\n\
  \n    init(tasksList: TasksListModel,\n         taskService: TaskServiceProtocol,\n\
  \         delegate: AddTaskDelegate) {\n        self.tasksList = tasksList\n   \
  \     self.taskService = taskService\n        self.delegate = delegate\n    }\n\
  }\n```\n\n最后，我们需要让 `AddTaskInteractor` 遵循 `AddTaskInteractorInput` 协议。该协议只有一个方法\
  \ `addTask`，我们向它传递一个包含新任务标题和图标的请求。\n\n在此方法中，我们首先创建 `TaskModel` 对象，并将其传递给 `TaskService`\
  \ 以保存到数据库。然后，我们通过委托通知 `TaskList` 场景更新任务列表，最后，我们通知 Presenter 关闭视图（清单 6-60）。\n\n```\n\
  extension AddTaskInteractor: AddTaskInteractorInput {\n    func addTask(request:\
  \ AddTaskModel.AddTask.Request) {\n        let task = TaskModel(id: ProcessInfo().globallyUniqueString,\n\
  \                            title: request.title,\n                           \
  \ icon: request.icon,\n                            done: false,\n              \
  \              createdAt: Date())\n        taskService.saveTask(task, in: tasksList)\n\
  \        delegate?.didAddTask()\n        presenter?.dismissView()\n    }\n}\n```\n\
  \n### `AddTaskPresenter`\n\n与之前的情况类似，`AddTaskPresenter` 通过将输入协议重命名为 `AddTaskViewController`，将输出协议重命名为\
  \ `AddTaskPresenter`，来获取其两个输入和输出协议（清单 6-61）。\n\n```\ntypealias AddTaskPresenterInput\
  \ = AddTaskInteractorOutput\ntypealias AddTaskPresenterOutput = AddTaskViewControllerInput\n\
  ```\n\n遵循 `AddTaskPresenterInput` 协议的过程相当简单（清单 6-62）。\n\n```\nfinal class AddTaskPresenter\
  \ {\n    weak var viewController: AddTaskPresenterOutput?\n}\n\nextension AddTaskPresenter:\
  \ AddTaskPresenterInput {\n    func dismissView() {\n        viewController?.dismissView()\n\
  \    }\n}\n```\n\n### `AddTaskModel`\n\n`AddTaskModel` 相当简单，因为只有请求呈现了创建任务所需的字段（其余部分虽然为空，但出于教学目的已展示）（清单\
  \ 6-63）。\n\n```\nenum AddTaskModel {\n    enum AddTask {\n        struct Request\
  \ {\n            var title: String\n            var icon: String\n        }\n  \
  \      struct Response {}\n        struct ViewModel {}\n    }\n}\n```\n\n### `AddTaskRouter`\n\
  \n`AddTaskRouter` 也很简单，因为它只有一个方法，即关闭视图（清单 6-64）。\n\n```\nprotocol AddTaskRouterDelegate\
  \ {\n    func dismissView()\n}\n\nfinal class AddTaskRouter {\n    weak var viewController:\
  \ UIViewController?\n}\n\nextension AddTaskRouter: AddTaskRouterDelegate {\n   \
  \ func dismissView() {\n        viewController?.dismiss(animated: true)\n    }\n\
  }\n```\n\n## VIP-MyToDos 测试\n\n在 VIP 架构中，我们将要测试的三个主要组件是 ViewControllers、Interactors\
  \ 和 Presenters，因为这些是 VIP 循环的组成部分。\n\n**注意：** 请记住，您可以在本书附带的代码仓库中找到完整的项目代码，包括测试代码。\n\
  \n现在，作为示例，让我们看看如何为 `Home` 场景的 `HomeViewController`、`HomeInteractor` 和 `HomePresenter`\
  \ 类设置单元测试。\n\n在针对这些组件的每个测试文件中，我们还将定义每个场景所需的其他组件的模拟对象。\n\n### `HomeViewControllerTest`\n\
  \n正如我们在其他情况中所见，首先要做的是定义测试中需要的组件。在这里，我们的 *sut*（即被测试系统）是 `HomeViewController`。\n\n\
  由于 `HomeViewController` 与 `HomeInteractor` 和 `HomeRouter` 相关，我们将为这些类定义模拟对象：`MockHomeInteractor`\
  \ 和 `MockHomeRouter`（清单 6-65）。\n\n```\nimport XCTest\n@testable import VIP_MyToDos\n\
  \nfinal class HomeViewControllerTest: XCTestCase {\n    private var sut: HomeViewController!\n\
  \    private var interactor: MockHomeInteractor!\n    private var router: MockHomeRouter!\n\
  \    private var view: HomeView!\n\n    let taskList = TasksListModel(id: \"12345-67890\"\
  ,\n                                  title: \"Test List\",\n                   \
  \               icon: \"test.icon\",\n                                  tasks: [TaskModel](),\n\
  \                                  createdAt: Date())\n\n    override func setUpWithError()\
  \ throws {\n        super.setUp()\n        interactor = MockHomeInteractor()\n \
  \       router = MockHomeRouter()\n        view = HomeView()\n        sut = HomeViewController(homeView:\
  \ view)\n        sut.interactor = interactor\n        sut.router = router\n    }\n\
  \    ...\n}\n```\n\n`MockHomeInteractor` 必须遵循与 `HomeInteractor` 相同的协议（尽管我们不会使用 `didAddList`\
  \ 和 `updateList` 方法，它们将 `Home` 场景与 `AddList` 和 `TaskList` 场景连接起来）（清单 6-66）。其余方法将修改一些变量，我们可以通过这些变量检查它们是否已从\
  \ `HomeViewController` 正确调用。\n\n```\nfinal class MockHomeInteractor: HomeInteractorInput,\
  \ AddListDelegate, SelectedListDelegate {\n    private(set) var addListRequest:\
  \ Bool = false\n    private(set) var fetchTasksListRequest: Bool = false\n    private(set)\
  \ var selectTasksListIndex: IndexPath = IndexPath(row: 0, section: 0)\n    private(set)\
  \ var deleteTasksListIndex: IndexPath = IndexPath(row: 0, section: 0)\n\n    func\
