  \n由于更新数据库的操作是从控制器调用的，因此我们需要将任务的更新调用从这个视图（`TaskListView`）传递给控制器（`TaskListViewController`）。\n\
  \n### 添加任务屏幕\n\n此屏幕负责向给定列表中添加任务，其各组件之间的通信如图 2-11 所示。\n\n![](img/531999_1_En_2_Fig11_HTML.png)\n\
