  \ 2-11** 添加任务屏幕组件通信架构\n\n### `AddTaskViewController`\n\n最后一个屏幕由`AddTaskViewController`控制，它将允许我们向列表中新增任务。该控制器持有对视图（`AddTaskView`）和模型的引用。用户在视图中输入的信息会通过委托模式（如前面案例所示）传递给控制器（清单\
