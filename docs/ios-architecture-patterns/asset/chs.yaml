  \ `TasksList` 和 `Task`。为此，我们选择 `ToDoList.xcdatamodeld` 文件，并添加上述两个实体，其属性如图 1-21 和图\
  \ 1-22 所示。\n- 通过创建这些实体，我们也在它们之间建立了 1 对 *n* 的关系。也就是说，一个列表可以关联多个任务，但一个任务只能关联一个列表。\n\
  \n创建实体后，我们可以使用 Xcode 生成管理这些实体的代码（作为 `NSManagedObject` 子类）。为此，我们选择 `ToDoList.xcdatamodeld`\
  \ 文件，然后在 Xcode 主菜单中选择 *编辑器* ➤ *创建 NSManagedObject 子类…*（图 1-23）。\n\n![](img/531999_1_En_1_Fig23_HTML.png)\n\
