  \ else { return }\n        delegate?.addListWith(title: titleTextfield.text!, icon:\
  \ icon)\n    }\n    ...\n}\n```\n\n**代码清单 6-24** 显示`AddListViewDelegate`协议及其方法调用位置的`AddListView`类代码\n\
  \n\n\n### `AddListViewController`\n\n在`AddListViewController`中，正如我们所知，我们将定义`Input`和`Output`协议，其中包含允许我们向`AddListInteractor`发起请求或接收来自`AddListPresenter`的调用的方法。在这种情况下，`AddListViewControllerInput`协议中只有一个方法，而`AddListViewControllerOutput`协议中有两个方法（清单\
  \ 6-25）。\n\n```\nprotocol AddListViewControllerInput: AnyObject {\n    func navigateToHome()\n\
  }\nprotocol AddListViewControllerOutput: AnyObject {\n    func navigateBack()\n\
  \    func addList(request: AddListModel.AddList.Request)\n}\n```\n清单 6-25: `AddListViewControllerInput`和`AddListViewControllerOutput`协议定义\n\
  \n在`AddListViewControllerInput`协议中，我们只有`navigateToHome`方法，因此`AddListViewController`会通知`AddListRouter`它应该返回到`Home`（无论是添加新列表后还是按下返回按钮时都会触发）。\n\
  \n对于`AddListViewControllerOutput`，它有两个方法，因为我们会有两种可能的请求：添加新列表或直接返回`Home`。\n\n除了这两个协议外，我们还将创建第三个协议`AddListDelegate`，正如我们在描述`Home`场景的组件时所见，它允许我们指示`Home`在添加新任务列表时更新其界面（清单\
  \ 6-26）。\n\n```\nprotocol AddListDelegate: AnyObject {\n    func didAddList()\n\
  }\n```\n清单 6-26: `AddListDelegate`定义，允许与`HomeInteractor`交互\n\n接下来，我们开发启动`AddListViewController`的代码部分，在这里我们接收`AddListView`实例，将其分配给`AddListViewcontroller`的视图，并配置其委托，因此`AddListViewController`类必须遵循`AddListViewDelegate`协议（清单\
