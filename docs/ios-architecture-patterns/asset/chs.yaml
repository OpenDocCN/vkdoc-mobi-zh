  \n### 添加任务屏幕\n\n此屏幕负责向给定列表添加任务，其组件之间的通信如图 4-14 所示。\n\n![](img/531999_1_En_4_Fig14_HTML.png)\n\
  \n图 4-14 添加任务屏幕组件通信示意图\n\n### `AddTaskViewController`\n\n在此情况下，`AddTaskViewController`负责在其初始化中接收`taskListModel`对象（包含要添加新任务的任务列表），并实例化`AddTaskViewModel`（向其传递任务列表和`TaskService`的实例），然后将其传递给视图（列表\
  \ 4-29）。\n\n```\nclass AddTaskViewController: UIViewController {\n    private var\
  \ addTaskView: AddTaskView!\n    private var tasksListModel: TasksListModel!\n \
