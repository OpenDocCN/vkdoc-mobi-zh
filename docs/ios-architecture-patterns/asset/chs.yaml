  }\n`\n\n*列表 5-52. `deleteRowAtIndex` 的测试*\n\n通过最后一个测试，我们将验证调用 `addTaskList` 方法时，路由器会将我们重定向到\
  \ `TaskList` 模块（列表 5-53）。\n\n```\nfunc testAddTaskList_whenAddTaskIsCalled_routerShouldNavigate()\
