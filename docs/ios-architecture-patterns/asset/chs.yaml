  \ tasksListModel, taskService: taskService)\naddTaskViewController.modalPresentationStyle\
  \ = .pageSheet\npresent(addTaskViewController, animated: true)\n}\nfunc updateTask(_\
  \ task: TaskModel) {\ntaskService.updateTask(task)\n}\nfunc deleteTask(_ task: TaskModel)\
  \ {\ntaskService.deleteTask(task)\n}\n}\nextension TaskListViewController: BackButtonDelegate\
  \ {\nfunc navigateBack() {\nnavigationController?.popViewController(animated: true)\n\
  }\n}\n代码清单 2-22\nTaskListViewController 的实现\n```\n\n如果您注意到，在`addTaskAction`函数中（该函数在选中“添加任务”按钮时执行），我们以模态方式显示了创建新任务的界面。\n\
  \n\n\n### `TaskListView`\n\n此视图将展示构成列表的任务，正如我们刚才所见，这些任务是通过`setTasksLists`方法从控制器传递过来的（清单\
  \ 2-23）。\n\n```\nfunc setTasksLists(_ tasksList: TasksListModel) {\ntasks = tasksList.tasks.sorted(by:\
