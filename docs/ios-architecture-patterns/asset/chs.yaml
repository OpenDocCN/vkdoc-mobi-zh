  \ 方法以返回到主屏幕（正如我们刚才看到的，它是通过委托完成的）。\n\n### 任务列表屏幕\n\n此屏幕负责显示构成列表的任务、标记任务为已完成、删除任务以及添加新任务。其组件之间的通信如图\
  \ 3-8 所示。\n\n![](img/531999_1_En_3_Fig8_HTML.png)\n\n任务列表屏幕的流程图由 `TaskListViewController`、`TaskListView`、`TaskListPresenter`、`TaskListService`\
  \ 和 `TaskService` 组成。\n\n**图 3-8** 任务列表屏幕组件通信示意图\n\n## TaskListViewController\n\n\
  与 MVC 架构不同（在 MVC 中 `TaskListViewController` 具有与模型通信的功能），这里它只负责实例化 `TaskListPresenter`（列表\
