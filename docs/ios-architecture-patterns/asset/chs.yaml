  \ 场景中的任务列表也必须更新。在图 6-5 中，您可以看到 `TaskList` 场景的不同组件及其之间的通信关系。\n\n![](img/531999_1_En_6_Fig5_HTML.png)\n\
  \n一张展示任务列表场景组件的示意图，包括路由器、配置器、视图、交互器、展示器、任务列表、任务列表服务以及 Home 交互器。\n\n图 6-5\n\nTaskList\
  \ 场景组件及通信架构\n\n### TaskListConfigurator\n\n`TaskListConfigurator` 与我们之前看到的配置器类似；它负责实例化场景中的不同元素并将它们相互关联起来。\n\
  \n也许值得特别提及的是 `TaskListInteractor` 的实例化过程，因为此时我们需要向其传递在 `Home` 中选中的任务列表、用于与数据库交互的\
  \ `TaskService` 和 `TaskListService` 实例，以及一个委托，该委托允许它与 `HomeInteractor` 建立连接，以便在任务发生任何变化时通知\
  \ `HomeInteractor` 更新 `Home`（清单 6-36）。\n\n```\nfinal class TaskListConfigurator\
  \ {\nstatic func configure( _ viewController: TaskListViewController, delegate:\
  \ SelectedListDelegate, tasksList: TasksListModel) -> TaskListViewController {\n\
  let interactor = TaskListInteractor(tasksList: tasksList, taskService: TaskService(),\n\
  tasksListService: TasksListService(),\ndelegate: delegate)\nlet presenter = TaskListPresenter()\n\
  let router = TaskListRouter()\nrouter.viewController = viewController\npresenter.viewController\
  \ = viewController\ninteractor.presenter = presenter\nviewController.interactor\
  \ = interactor\nviewController.router = router\nreturn viewController\n}\n}\n清单\
  \ 6-36\nTaskListConfigurator 代码\n```\n\n### TaskListView\n\n`TaskListView` 类与 `HomeView`\
