- "# AddListRouter\n\n`AddListRouter`采用`PresenterToRouterAddListProtocol`协议，因此它必须实现两个方法：使用`createScreen`方法创建`AddList`模块，以及（在需要时）通过`popToHomeFrom`方法（参见\
  \ 5-24）返回导航栈中的`Home`屏幕。\n\n```swift\nclass AddListRouter: PresenterToRouterAddListProtocol\
  \ {\n    static func createScreen() -> UIViewController {\n        let presenter:\
  \ ViewToPresenterAddListProtocol & InteractorToPresenterAddListProtocol = AddListPresenter()\n\
  \        let viewController = AddListViewController()\n        viewController.presenter\
  \ = presenter\n        viewController.presenter.router = AddListRouter()\n     \
  \   viewController.presenter?.view = viewController\n        viewController.presenter?.interactor\
  \ = AddListInteractor(tasksListService: TasksListService())\n        viewController.presenter?.interactor?.presenter\
  \ = presenter\n        return viewController\n    }\n    func popToHomeFrom(view:\
  \ PresenterToViewAddListProtocol) {\n        let viewController = view as! AddListViewController\n\
  \        viewController.navigationController?.popViewController(animated: true)\n\
  \    }\n}\n```\n\n*列表 5-24* - `AddListRouter`必须采用`PresenterToRouterAddListProtocol`并实现其方法\n\
  \n### AddListViewController\n\n正如我们在评论此模块中使用的不同协议时所见，`AddListViewController`不需要实现`PresenterToViewAddListProtocol`（该协议为空，我们保留该协议是为了维护每个模块中实现的各个协议结构）。\n\
  \n与`Presenter`的唯一关系将通过创建的变量实现，该变量使我们能够调用`Presenter`的`backAction`和`addList`函数（参见\
  \ 5-25）。\n\n```swift\nclass AddListViewController: UIViewController, PresenterToViewAddListProtocol\
  \ {\n    ...\n    var presenter: ViewToPresenterAddListProtocol!\n    ...\n}\nextension\
  \ AddListViewController {\n    ...\n    @objc func backAction() {\n        presenter.backAction()\n\
  \    }\n    ...\n    @objc func addListAction() {\n        guard titleTextfield.hasText\
  \ else { return }\n        listModel.title = titleTextfield.text\n        listModel.id\
  \ = ProcessInfo().globallyUniqueString\n        listModel.icon = listModel.icon\
  \ ?? \"checkmark.seal.fill\"\n        listModel.createdAt = Date()\n        presenter.addList(taskList:\
  \ listModel)\n    }\n    ...\n}\n...\n```\n\n*列表 5-25* - `AddListViewController`实现\n\
  \n### AddListPresenter\n\n在`AddListPresenter`中，我们有两个基本函数。第一个是通知`Interactor`应向数据库添加新的任务列表（`interactor?.addList`），另一个是通知`Router`应用程序应在列表添加完成或选中返回按钮时（参见\
  \ 5-26）返回到`Home`屏幕（`router?.popToHomeFrom`）。\n\n```swift\nclass AddListPresenter:\
  \ ViewToPresenterAddListProtocol {\n    var view: PresenterToViewAddListProtocol?\n\
  \    var interactor: PresenterToInteractorAddListProtocol?\n    var router: PresenterToRouterAddListProtocol?\n\
  \    func addList(taskList: TasksListModel) {\n        interactor?.addList(taskList:\
  \ taskList)\n    }\n    func backAction() {\n        router?.popToHomeFrom(view:\
  \ view!)\n    }\n}\nextension AddListPresenter: InteractorToPresenterAddListProtocol\
  \ {\n    func addedList() {\n        router?.popToHomeFrom(view: view!)\n    }\n\
  }\n```\n\n*列表 5-26* - `AddListPresenter`实现，遵循`ViewToPresenterAddListProtocol`和`InteractorToPresenterAddListProtocol`\n\
  \n### AddListInteractor\n\n`AddListInteractor`的代码非常简单，因为您只需实现`PresenterToInteractorAddListProtocol`（`addList`）协议中的单一方法。在此方法中，您首先告诉数据库添加一个新的任务列表（通过`TasksListService`），然后通知`Presenter`列表已经添加（这将导致`Presenter`通知`Router`返回到`Home`）（参见\
  \ 5-27）。\n\n```swift\nclass AddListInteractor: PresenterToInteractorAddListProtocol\
  \ {\n    var presenter: InteractorToPresenterAddListProtocol?\n    var tasksListService:\
  \ TasksListServiceProtocol!\n    init(tasksListService: TasksListServiceProtocol)\
  \ {\n        self.tasksListService = tasksListService\n    }\n    func addList(taskList:\
  \ TasksListModel) {\n        tasksListService.saveTasksList(taskList)\n        presenter?.addedList()\n\
  \    }\n}\n```\n\n*列表 5-27* - `PresenterToInteractorAddListProtocol`实现，遵循`PresenterToInteractorAddListProtocol`\n\
  \n### 任务列表模块\n\n此屏幕负责显示构成列表的任务，将它们标记为已完成、删除它们以及添加新任务。根据 VIPER 架构，这些组件之间的通信如图 5-5\
  \ 所示。\n\n![任务列表模块组件通信流程图](img/531999_1_En_5_Fig5_HTML.png)\n\n*图 5-5* - 任务列表模块组件通信模式\n\
  \n\n\n"
- "# TaskListProtocols\n\n`TaskList`模块是构成应用程序的四个模块中最复杂的一个，因为它允许与用户进行更多交互：更新和删除任务、导航回主页或展示任务创建界面。因此，我们会看到在不同通信协议中有更多的方法。\n\
  \n在`TaskListProtocol`中，除了`createScreen`方法（在此处我们已修改该方法，用于传递我们想要显示的任务列表）之外，我们还有`presentAddTaskOn`方法，用于访问任务创建界面。如您所见，我们将传递要添加已创建任务的任务列表，以及`popToHomeFrom`方法，我们必须实现该方法以返回主页（列表\
  \ 5-28）。\n\n```\n// MARK: Router Input\nprotocol PresenterToRouterTaskListProtocol\
  \ {\nstatic func createScreenFor(list: TasksListModel) -> UIViewController\nfunc\
  \ presentAddTaskOn(view: PresenterToViewTaskListProtocol, forTaskList: TasksListModel)\n\
  func popToHomeFrom(view: PresenterToViewTaskListProtocol)\n}\n```\n\n*列表 5-28* `PresenterToRouterTaskListProtocol`\
  \ 代码\n\n如果我们现在看看管理视图和展示器之间通信的两个协议，我们可以看到，在`ViewToPresenterTaskListProtocol`协议的情况下，第一个方法在模块加载时执行（`viewDidLoad`），四个方法与显示和交互任务列表有关（`numberOfRowsInSection`、`taskAt`、`deleteRowAt`和`update`），还有两个方法与按钮操作有关（`addTask`和`backAction`）（列表\
  \ 5-29）。\n\n```\n// MARK: View Input\nprotocol ViewToPresenterTaskListProtocol {\n\
  var view: PresenterToViewTaskListProtocol? { get set }\nvar interactor: PresenterToInteractorTaskListProtocol?\
  \ { get set }\nvar router: PresenterToRouterTaskListProtocol? { get set }\nfunc\
  \ viewDidLoad()\nfunc numberOfRowsInSection() -> Int\nfunc taskAt(indexPath: IndexPath)\
  \ -> TaskModel\nfunc deleteRowAt(indexPath: IndexPath)\nfunc update(task: TaskModel)\n\
  func addTask()\nfunc backAction()\n}\n```\n\n*列表 5-29* `ViewToPresenterTaskListProtocol`\
  \ 代码\n\n关于`PresenterToViewTaskListProtocol`协议，它将为我们提供必须在视图中实现的方法，包括重新加载要显示的数据以及显示或隐藏`EmptyState`（列表\
  \ 5-30）。\n\n```\n// MARK: View Output\nprotocol PresenterToViewTaskListProtocol\
  \ {\nfunc onFetchTasks()\nfunc showEmptyState()\nfunc hideEmptyState()\n}\n```\n\
  \n*列表 5-30* `PresenterToViewTaskListProtocol` 代码\n\n对于交互器和展示器之间的交互，我们将使用两个协议。第一个，`InteractorToPresenterTaskListProtocol`，指明了交互器必须实现的方法，所有这些方法都与任务相关：加载、添加、更新和删除（列表\
  \ 5-31）。\n\n```\n// MARK: Interactor Input\nprotocol PresenterToInteractorTaskListProtocol\
  \ {\nvar presenter: InteractorToPresenterTaskListProtocol? { get set }\nfunc loadTasks()\n\
  func deleteTaskAt(indexPath: IndexPath)\nfunc updateTask(task: TaskModel)\nfunc\
  \ addTask()\n}\n```\n\n*列表 5-31* `PresenterToInteractorTaskListProtocol` 代码\n\n\
  在第二个协议`InteractorToPresenterTaskListProtocol`中，我们拥有将在展示器中实现的方法，这些方法将允许我们访问数据库以从列表中获取任务，或与路由器通信以使其不展示添加任务界面（列表\
  \ 5-32）。\n\n```\n// MARK: Interactor Output\nprotocol InteractorToPresenterTaskListProtocol\
  \ {\nfunc fetchedTasks(tasks: [TaskModel])\nfunc addTaskTo(list: TasksListModel)\n\
  }\n```\n\n*列表 5-32* `InteractorToPresenterTaskListProtocol` 代码\n\n## TaskListRouter\n\
  \n正如我们已经知道的，`TaskListRouter`类必须符合`PresenterToRouterTaskListProtocol`协议并实现其方法。这些方法将使我们能够创建模块、展示任务创建界面以及返回主页界面（列表\
  \ 5-33）。\n\n```\nclass TaskListRouter: PresenterToRouterTaskListProtocol {\n   \
  \ static func createScreenFor(list: TasksListModel) -> UIViewController {\n    \
  \    let presenter: ViewToPresenterTaskListProtocol & InteractorToPresenterTaskListProtocol\
  \ = TaskListPresenter()\n        let viewController = TaskListViewController()\n\
  \        viewController.presenter = presenter\n        viewController.presenter.router\
  \ = TaskListRouter()\n        viewController.presenter?.view = viewController\n\
  \        viewController.presenter?.interactor = TaskListInteractor(taskList: list,\
  \ taskService: TaskService())\n        viewController.presenter?.interactor?.presenter\
  \ = presenter\n        return viewController\n    }\n    \n    func presentAddTaskOn(view:\
  \ PresenterToViewTaskListProtocol, forTaskList: TasksListModel) {\n        let addTaskController\
  \ = AddTaskRouter.createScreenFor(list: forTaskList)\n        let viewController\
  \ = view as! TaskListViewController\n        addTaskController.modalPresentationStyle\
  \ = .pageSheet\n        viewController.present(addTaskController, animated: true)\n\
  \    }\n    \n    func popToHomeFrom(view: PresenterToViewTaskListProtocol) {\n\
  \        let viewController = view as! TaskListViewController\n        viewController.navigationController?.popViewController(animated:\
  \ true)\n    }\n}\n```\n\n*列表 5-33* 在`TaskListRouter`中实现`PresenterToRouterTaskListProtocol`\n\
  \n## TaskListViewController\n\n`TaskListViewController`负责在屏幕上向我们显示属于某个特定列表的任务（如果没有任务，则显示`EmptyState`）。该界面提供了与用户交互的多种可能性：删除或更新任务、按下“添加任务”按钮或按下按钮返回主页。\n\
  \n所有这些操作，以及一些其他操作（例如配置表格的不同单元格或了解表格中的行数），都将通过`presenter`变量（其类型为`ViewToPresenterTaskListProtocol`）传递到展示器（列表\
  \ 5-34）。\n\n```\nclass TaskListViewController: UIViewController {\n    ...\n   \
  \ var presenter: ViewToPresenterTaskListProtocol!\n    ...\n}\n\nprivate extension\
  \ TaskListViewController {\n    ...\n    @objc func backAction() {\n        presenter.backAction()\n\
  \    }\n    ...\n    @objc func addTaskAction() {\n        presenter?.addTask()\n\
  \    }\n}\n\nextension TaskListViewController: UITableViewDelegate, UITableViewDataSource\
  \ {\n    ...\n    func tableView(_ tableView: UITableView, numberOfRowsInSection\
  \ section: Int) -> Int {\n        return presenter.numberOfRowsInSection()\n   \
  \ }\n    \n    func tableView(_ tableView: UITableView, cellForRowAt indexPath:\
  \ IndexPath) -> UITableViewCell {\n        let cell = tableView.dequeueReusableCell(withIdentifier:\
  \ TaskCell.reuseId, for: indexPath) as! TaskCell\n        cell.setParametersForTask(presenter.taskAt(indexPath:\
  \ indexPath))\n        cell.delegate = self\n        return cell\n    }\n    ...\n\
  \    func tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,\
  \ forRowAt indexPath: IndexPath) {\n        if editingStyle == .delete {\n     \
  \       presenter.deleteRowAt(indexPath: indexPath)\n        }\n    }\n}\n\nextension\
  \ TaskListViewController: TaskCellDelegate {\n    func updateTask(_ task: TaskModel)\
  \ {\n        presenter.update(task: task)\n    }\n}\n```\n\n*列表 5-34* `TaskListViewController`\
  \ 代码\n\n另一方面，`TaskListViewController`必须实现`PresenterToViewTaskListProtocol`协议，以便展示器能够进行更新视图所需的调用（例如重新加载任务列表或显示/隐藏`EmptyState`）（列表\
  \ 5-35）。\n\n```\nextension TaskListViewController: PresenterToViewTaskListProtocol\
  \ {\n    func onFetchTasks() {\n        tableView.reloadData()\n    }\n    \n  \
  \  func showEmptyState() {\n        emptyState.isHidden = false\n    }\n    \n \
  \   func hideEmptyState() {\n        emptyState.isHidden = true\n    }\n}\n```\n\
  \n*列表 5-35* `TaskListViewController` 必须实现 `PresenterToViewTaskListProtocol` 方法\n\
  \n\n\n### `TaskListPresenter`\n\n`TaskListsPresenter`，由于它与`TaskListViewController`和`TaskListInteractor`的关系，必须实现相应的协议。\n\
  \n第一个协议`ViewToPresenterTaskListProtocol`迫使我们实现必要的方法，以便视图可以将请求发送给 Presenter。这些方法中的大多数是需要传递给`TaskListInteractor`以访问数据库的请求，例如检索任务、更新或删除任务（清单\
  \ 5-36）。\n\n```swift\nclass TaskListPresenter: ViewToPresenterTaskListProtocol {\n\
  \    var view: PresenterToViewTaskListProtocol?\n    var interactor: PresenterToInteractorTaskListProtocol?\n\
  \    var router: PresenterToRouterTaskListProtocol?\n    var tasks: [TaskModel]\
  \ = [TaskModel]()\n    func viewDidLoad() {\n        NotificationCenter.default.addObserver(self,\n\
  \                                               selector: #selector(fetchTasks),\n\
  \                                               name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
  \                                               object: CoreDataManager.shared.mainContext)\n\
  \        interactor?.loadTasks()\n    }\n    func numberOfRowsInSection() -> Int\
  \ {\n        tasks.count\n    }\n    func taskAt(indexPath: IndexPath) -> TaskModel\
  \ {\n        tasks[indexPath.row]\n    }\n    func deleteRowAt(indexPath: IndexPath)\
  \ {\n        interactor?.deleteTaskAt(indexPath: indexPath)\n    }\n    func update(task:\
  \ TaskModel) {\n        interactor?.updateTask(task: task)\n    }\n    func addTask()\
  \ {\n        interactor?.addTask()\n    }\n    @objc private func fetchTasks() {\n\
  \        interactor?.loadTasks()\n    }\n    func backAction() {\n        router?.popToHomeFrom(view:\
  \ view!)\n    }\n}\n// 清单 5-36\n// TaskListPresenter 对 ViewToPresenterTaskListProtocol\
  \ 的适配\n```\n\n`TaskListPresenter`对`InteractorToPresenterTaskListProtocol`协议的适配将使其能够响应来自`TaskListInteractor`的请求（清单\
  \ 5-37）。\n\n```swift\nextension TaskListPresenter: InteractorToPresenterTaskListProtocol\
  \ {\n    func fetchedTasks(tasks: [TaskModel]) {\n        self.tasks = tasks\n \
  \       tasks.count == 0 ? view?.showEmptyState() : view?.hideEmptyState()\n   \
  \     view?.onFetchTasks()\n    }\n    func addTaskTo(list: TasksListModel) {\n\
  \        router?.presentAddTaskOn(view: view!, forTaskList: list)\n    }\n}\n//\
  \ 清单 5-37\n// TaskListPresenter 对 InteractorToPresenterTaskListProtocol 的适配\n```\n\
  \n### `TaskListInteractor`\n\n`TaskListInteractor`必须实现`PresenterToInteractorTaskListProtocol`协议。如你所见（清单\
  \ 5-38），这些方法中的大多数都会通过`TaskService`对数据库进行调用。\n\n```swift\nclass TaskListInteractor:\
  \ PresenterToInteractorTaskListProtocol {\n    var presenter: InteractorToPresenterTaskListProtocol?\n\
  \    var tasks: [TaskModel] = [TaskModel]()\n    var taskList: TasksListModel!\n\
  \    var taskService: TaskServiceProtocol!\n    init(taskList: TasksListModel, taskService:\
  \ TaskServiceProtocol) {\n        self.taskList = taskList\n        self.taskService\
  \ = taskService\n    }\n    func loadTasks() {\n        tasks = (taskService?.fetchTasksForList(taskList))!\n\
  \        presenter?.fetchedTasks(tasks: tasks)\n    }\n    func deleteTaskAt(indexPath:\
  \ IndexPath) {\n        guard tasks.indices.contains(indexPath.row) else { return\
  \ }\n        taskService.deleteTask(tasks[indexPath.row])\n    }\n    func updateTask(task:\
  \ TaskModel) {\n        taskService.updateTask(task)\n    }\n    func addTask()\
  \ {\n        presenter?.addTaskTo(list: taskList)\n    }\n}\n// 清单 5-38\n// TaskListInteractor\
  \ 代码\n```\n\n#### Add Task 模块\n\n该屏幕负责向给定列表添加任务。使用 VIPER 架构的组件之间的通信如图 5-6 所示。\n\n\
  ![](img/531999_1_En_5_Fig6_HTML.png)\n\n*一个添加任务模块的流程图包含：添加任务视图控制器、添加任务 Presenter、添加任务路由器、添加任务交互器以及任务列表视图控制器。*\n\
  \n**图 5-6**\n*添加任务模块组件通信架构*\n\n##### `AddTaskProtocols`\n\n与添加任务列表模块一样，此模块的功能很少（基本上只是添加一个任务），因此我们继续沿用与其他模块相同的协议，并且需要实现的方法数量更少。\n\
  \n例如，`PresenterToRouterAddTaskProtocol`除了`createScreen`方法之外，只会提供`dismissFrom`方法，该方法包含关闭添加任务屏幕的代码（清单\
  \ 5-39）。\n\n```swift\n// MARK: Router Input\nprotocol PresenterToRouterAddTaskProtocol\
  \ {\n    static func createScreenFor(list: TasksListModel) -> UIViewController\n\
  \    func dismissFrom(view: PresenterToViewAddTaskProtocol)\n}\n// 清单 5-39\n// PresenterToRouterAddTaskProtocol\
  \ 代码\n```\n\n在与视图和 Presenter 相关的两个协议中，只有`ViewToPresenterAddTaskProtocol`会包含内容（这与添加任务列表模块的情况相同）。此协议将由\
  \ Presenter 实现，并且与允许访问模块其他类（`view`、`interactor`和`router`）的变量一起，仅提供`addTask`方法（用于添加新任务）（清单\
  \ 5-40）。\n\n```swift\n// MARK: View Input\nprotocol ViewToPresenterAddTaskProtocol\
  \ {\n    var view: PresenterToViewAddTaskProtocol? { get set }\n    var interactor:\
  \ PresenterToInteractorAddTaskProtocol? { get set }\n    var router: PresenterToRouterAddTaskProtocol?\
  \ { get set }\n    func addTask(task: TaskModel)\n}\n\n// MARK: View Output\nprotocol\
  \ PresenterToViewAddTaskProtocol {}\n// 清单 5-40\n// ViewToPresenterAddTaskProtocol\
  \ 和 ViewToPresenterAddTaskProtocol 代码\n```\n\n`PresenterToInteractorAddTaskProtocol`（将由`AddTaskInteractor`实现）提供了一个单一的函数`addTask`，正如稍后我们将看到的，该函数将告诉数据库（通过`TaskService`）添加一个新任务，然后告诉\
  \ Presenter 任务已添加（清单 5-41）。\n\n```swift\n// MARK: Interactor Input\nprotocol PresenterToInteractorAddTaskProtocol\
  \ {\n    var presenter: InteractorToPresenterAddTaskProtocol? { get set }\n    func\
  \ addTask(task: TaskModel)\n}\n// 清单 5-41\n// PresenterToInteractorAddTaskProtocol\
  \ 代码\n```\n\n最后，我们将拥有`InteractorToPresenterAddTaskProtocol`（将由`AddTaskPresenter`实现），其唯一的方法是`addedTask`，通过它我们将告诉`AddTaskPresenter`任务已添加（清单\
  \ 5-42）。\n\n```swift\n// MARK: Interactor Output\nprotocol InteractorToPresenterAddTaskProtocol\
  \ {\n    func addedTask()\n}\n// 清单 5-42\n// InteractorToPresenterAddTaskProtocol\
  \ 代码\n```\n\n### `AddTaskRouter`\n\n正如我们在前面的模块中已经看到的，`AddTaskRouter`必须实现`PresenterToRouterAddTaskProtocol`协议，因此也要实现组成该协议的方法：`createScreenFor`和`dismissFrom`（清单\
  \ 5-43）。\n\n```swift\nclass AddTaskRouter: PresenterToRouterAddTaskProtocol {\n\
  \    static func createScreenFor(list: TasksListModel) -> UIViewController {\n \
  \       let presenter: ViewToPresenterAddTaskProtocol & InteractorToPresenterAddTaskProtocol\
  \ = AddTaskPresenter()\n        let viewController = AddTaskViewController()\n \
  \       viewController.presenter = presenter\n        viewController.presenter.router\
  \ = AddTaskRouter()\n        viewController.presenter?.view = viewController\n \
  \       viewController.presenter?.interactor = AddTaskInteractor(taskList: list,\
  \ taskService: TaskService())\n        viewController.presenter?.interactor?.presenter\
  \ = presenter\n        return viewController\n    }\n    func dismissFrom(view:\
  \ PresenterToViewAddTaskProtocol) {\n        let viewController = view as! AddTaskViewController\n\
  \        viewController.dismiss(animated: true)\n    }\n}\n// 清单 5-43\n// AddTaskRouter\
  \ 类遵循 PresenterToRouterAddTaskProtocol\n```\n\n\n\n### `AddTaskViewController`\n\
  \n尽管它不包含任何方法，但为了保持协议的结构一致，我们将让 `AddTaskViewController` 遵循 `PresenterToViewAddTaskProtocol`\
  \ 协议。\n\n另一方面，借助 presenter 变量（类型为 `ViewToPresenterAddTaskProtocol`），我们可以向 Presenter\
  \ 发出指令，告知其要添加一个任务（类型为 `TaskModel`）（见代码清单 5-44）。\n\n```\nclass AddTaskViewController:\
  \ UIViewController, PresenterToViewAddTaskProtocol {\n...\nvar presenter: ViewToPresenterAddTaskProtocol!\n\
  ...\n}\nextension AddTaskViewController {\n...\n@objc func addTaskAction() {\nguard\
  \ titleTextfield.hasText else { return }\ntaskModel.title = titleTextfield.text\n\
  taskModel.icon = taskModel.icon ?? \"checkmark.seal.fill\"\ntaskModel.done = false\n\
  taskModel.id = ProcessInfo().globallyUniqueString\ntaskModel.createdAt = Date()\n\
  presenter.addTask(task: taskModel)\n}\n...\n}\n...\n代码清单 5-44\nAddTaskViewController\
  \ 类\n```\n\n### `AddTaskPresenter`\n\n`AddTaskPresenter` 必须遵循两个协议：`ViewToPresenterAddTaskProtocol`（包含\
  \ View 可调用的方法）和 `InteractorToPresenterAddTaskProtocol`（包含 Interactor 可调用的方法）。\n\n\
  通过遵循第一个协议 `ViewToPresenterAddTaskProtocol`，View 将能够调用 `addTask` 方法并将包含用户想要创建的任务的对象传递给它。然后，Presenter\
  \ 将与 Interactor 通信，负责在数据库中创建该任务（见代码清单 5-45）。\n\n```\nclass AddTaskPresenter: ViewToPresenterAddTaskProtocol\
  \ {\nvar view: PresenterToViewAddTaskProtocol?\nvar interactor: PresenterToInteractorAddTaskProtocol?\n\
  var router: PresenterToRouterAddTaskProtocol?\nfunc addTask(task: TaskModel) {\n\
  interactor?.addTask(task: task)\n}\n}\n代码清单 5-45\n遵循 ViewToPresenterAddTaskProtocol\
  \ 的 AddTaskPresenter 类\n```\n\n借助第二个协议 `InteractorToPresenterAddTaskProtocol`，Interactor\
  \ 将能够告知 Presenter 它已经在数据库中创建了任务，因此 Presenter 可以通知 Router 关闭 `AddTask` 视图（见代码清单 5-46）。\n\
  \n```\nextension AddTaskPresenter: InteractorToPresenterAddTaskProtocol {\nfunc\
  \ addedTask() {\nrouter?.dismissFrom(view: view!)\n}\n}\n代码清单 5-46\n遵循 InteractorToPresenterAddTaskProtocol\
  \ 的 AddTaskPresenter 扩展\n```\n\n### `AddTaskInteractor`\n\n最后，我们来看 `AddTaskInteractor`，它必须遵循\
  \ `PresenterToInteractorAddTaskProtocol` 协议。正如我们所见，该协议仅包含一个方法（`addTask`），Presenter\
  \ 将调用该方法来传递必须在数据库中创建的 `TaskModel` 对象（见代码清单 5-47）。\n\n```\nclass AddTaskInteractor:\
  \ PresenterToInteractorAddTaskProtocol {\nvar presenter: InteractorToPresenterAddTaskProtocol?\n\
  var taskList: TasksListModel!\nvar taskService: TaskServiceProtocol!\ninit(taskList:\
  \ TasksListModel, taskService: TaskServiceProtocol) {\nself.taskList = taskList\n\
  self.taskService = taskService\n}\nfunc addTask(task: TaskModel) {\ntaskService?.saveTask(task,\
  \ in: taskList)\npresenter?.addedTask()\n}\n}\n代码清单 5-47\n遵循 PresenterToInteractorAddTaskProtocol\
  \ 的 AddTaskInteractor 类\n```\n\n## VIPER-MyToDos 测试\n\n在 VIPER 架构中，我们打算测试的两个主要组件是\
  \ Interactor（负责应用业务逻辑）和 Presenter（负责更新 View 并与 Interactor 和 Router 通信）。\n\n**注意：**\
  \ 请记住，你可以在本书关联的代码仓库中找到包含测试的完整项目代码。\n\n现在，作为一个示例，我们来看看如何为 `Home` 模块的 `HomePresenter`\
  \ 和 `HomeInteractor` 类编写单元测试。\n\n### `HomePresenter`\n\n首先，我们将准备测试类的设置部分。在这个类中，我们的\
  \ `sut`（或 `system under test`，即被测系统）将是 `HomePresenter`，但我们还将创建不同类的实例，以便能够重建环境以及类之间的不同关系（见代码清单\
  \ 5-48）。\n\n```\nimport XCTest\n@testable import VIPER_MyToDos\nclass HomePresenterTest:\
  \ XCTestCase {\nvar sut: HomePresenter!\nvar view: HomeViewController!\nvar router:\
  \ MockHomeRouter!\nvar interactor: HomeInteractor!\nlet taskList = TasksListModel(id:\
  \ \"12345-67890\",\ntitle: \"Test List\",\nicon: \"test.icon\",\ntasks: [TaskModel](),\n\
  createdAt: Date())\noverride func setUpWithError() throws {\nsut = HomePresenter()\n\
  let mockTaskListService = MockTaskListService(lists: [taskList])\ninteractor = HomeInteractor(tasksListService:\
  \ mockTaskListService)\ninteractor.presenter = sut\nview = HomeViewController()\n\
  view.presenter = sut\nrouter = MockHomeRouter()\nsut.interactor = interactor\nsut.view\
  \ = view\nsut.router = router\n}\noverride func tearDownWithError() throws {\nsut\
  \ = nil\nsuper.tearDown()\n}\n...\n}\n代码清单 5-48\nHomePresenterTest 的设置\n```\n\n\
  在这些实例中，有一个我们准备作为 `mock`（`MockTaskListService` 除外）的是 `MockHomeRouter`，这样我们就可以验证在调用其方法时应用程序的导航路径（见代码清单\
  \ 5-49）。\n\n```\nimport UIKit\n@testable import VIPER_MyToDos\nclass MockHomeRouter:\
  \ PresenterToRouterHomeProtocol {\nvar isPushedToAddList: Bool = false\nvar isPushedToTasksList:\
  \ Bool = false\nvar selectedTaskList: TasksListModel = TasksListModel()\nstatic\
  \ func createScreen() -> UINavigationController {\nUINavigationController()\n}\n\
  func pushToAddListOn(view: PresenterToViewHomeProtocol) {\nisPushedToAddList = true\n\
  }\nfunc pushToTaskListOn(view: PresenterToViewHomeProtocol, taskList: TasksListModel)\
  \ {\nselectedTaskList = taskList\nisPushedToTasksList = true\n}\n}\n代码清单 5-49\n\
  MockHomeRouter 代码\n```\n\n如你所见，我们设置了一对变量：`isPushedToAddList` 和 `isPushedToTasksList`，初始值均为\
  \ `false`，但在调用相应方法时会变为 `true`。\n\n现在我们可以继续测试 `HomePresenter` 的各个方法。\n\n首先，我们测试在创建\
  \ `mockTaskListService` 实例时添加了一个列表的情况。一旦调用了 `viewDidLoad` 方法（如果我们查看 `HomePresenter`\
  \ 类，该方法会调用 Interactor 的 `loadLists` 方法，该方法负责从数据库中检索列表并将其返回给 Presenter），表格中的行数应为\
  \ 1，同时，表格中应存在一个对象（见代码清单 5-50）。\n\n```\nfunc testNumberOfRows_whenAddedOneList_shouldBeOne()\
  \ {\nsut.viewDidLoad()\nXCTAssertTrue(sut.numberOfRowsInSection() == 1)\n}\nfunc\
  \ testListAtIndex_whenAddedOneList_shouldExists() {\nsut.viewDidLoad()\nXCTAssertNotNil(sut.listAt(indexPath:\
  \ IndexPath(row: 0, section: 0)))\n}\n代码清单 5-50\n测试 MockTaskListService 中存在一个对象\n\
  ```\n\n接下来，我们编写一个测试，验证如果我们选择了一个单元格（直接传入 `IndexPath`），一方面，Router 会将我们重定向到 `TaskList`\
  \ 模块，另一方面，我们传递的是包含所选列表的对象（见代码清单 5-51）。\n\n```\nfunc testSelectRowAtIndex_whenAddedOneList_shouldReturnList()\
  \ {\nsut.viewDidLoad()\nsut.selectRowAt(indexPath: IndexPath(row: 0, section: 0))\n\
  XCTAssertTrue(router.isPushedToTasksList)\nXCTAssertTrue(router.selectedTaskList.id\
  \ == \"12345-67890\")\n}\n代码清单 5-51\nselectRowAtIndex 测试\n```\n\n现在我们将测试删除列表的功能。为此，我们调用\
