  \ Model 之间的关系\n```\n\n### 添加列表屏幕\n\n此屏幕负责添加任务列表及其各组件之间的通信。根据 MVVM 架构，这些组件之间的通信如图\
  \ 4-12 所示。\n\n![](img/531999_1_En_4_Fig12_HTML.png)\n\n一个框图说明了从任务列表服务到添加列表视图控制器的通信流程，该流程通过添加列表视图模型和添加列表视图自下而上进行。图中最上方标明了添加列表视图控制器与主视图控制器之间的导航关系，中间部分则展示了添加列表视图与图标选择器视图之间的通信。\n\
