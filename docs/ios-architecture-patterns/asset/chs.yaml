  \ windowScene)\n        window.rootViewController = ViewController()\n        window.makeKeyAndVisible()\n\
  \        self.window = window\n    }\n}\n```\n\n#### Core Data 配置\n\n在此应用程序中，我们将使用\
  \ Apple 的数据库 Core Data，但在设置项目时我们没有选择它，以便我们可以使用自己的数据库管理类。\n\n\n\n"
