  \n## MVVM-MyToDos 测试\n\n在我们刚刚研究的 MVVM 架构中，View 和 Model 之间的连接是通过一个新组件 ViewModel 完成的。除此之外，View\
  \ 和 ViewModel 之间的连接是通过一个称为数据绑定的过程完成的，为此我们使用了特定的库：RxSwift。通过这种方式，View 能够感知 ViewModel\
  \ 中发生的变化并进行相应更新。\n\n因此，出现的问题是：我们如何测试一个与事件和数据流（即随时间变化的值）协同工作的系统？我们如何测试使用 RxSwift\
  \ 开发的代码？为此，我们将使用 RxSwift 附带的库：`RxTest`。\n\n> **注意**\n> \n> 你会记得，在本章开头，当我们使用 Swift\
  \ Package Manager 安装 RxSwift 时，除了 RxSwift、RxCocoa 和 RxRelay 之外，我们还包含了 RxTest（并将其添加到\
  \ MVVM_MyToDosTests 目标中）。\n\n### RxTest 简介\n\n正如我们所看到的，使用 RxSwift，我们从处理单个值转向处理随时间发射值的流。而`RxTest`将帮助我们测试这些流。\n\
  \n为此，我们将使用`RxTest`的主要组件：`TestScheduler`。\n\n该组件允许我们创建可观察对象（`Observable`）和观察者（`Observer`），我们可以绑定和拦截它们，以便查看进入和离开\
  \ ViewModel 的数据。我们可以在特定的“虚拟时间”中进行此操作；因此，我们可以在特定时间创建事件。\n\n因此，要执行测试，我们必须首先创建一个`TestScheduler`实例（初始参数`initialClock`，它将定义传输的开始）、一个`DisposeBag`实例用于存放先前测试的订阅，以及一个\
  \ ViewModel 实例（列表 4-33）。\n\n```swift\nclass ExampleTests: XCTestCase {\n    var\
  \ testScheduler: TestScheduler!\n    var disposeBag: DisposeBag!\n    var viewModel:\
  \ ViewModel!\n    \n    override func setUpWithError() throws {\n        testScheduler\
  \ = TestScheduler(initialClock: 0)\n        disposeBag = DisposeBag()\n        viewModel\
  \ = ViewModel()\n    }\n    \n    override func tearDownWithError() throws {\n \
  \       testScheduler = nil\n        disposeBag = nil\n        viewModel = nil\n\
  \        super.tearDown()\n    }\n}\n// 列表 4-33 为测试创建 TestScheduler、DisposeBag 和\
  \ ViewModel 实例\n```\n\n现在，我们只需将这些元素应用到测试中。例如，假设我们要测试在激活重拨按钮后数据是否已从服务器加载（列表 4-34）。\n\
  \n```swift\nfunc testLoading_whenThereIsNoList_shouldShowEmptyState() {\n    //\
  \ 我们创建一个观察者，它将是我们想要观察的对象，并且是 ViewModel 输出的结果。\n    let isLoaded = testScheduler.createObserver(Bool.self)\n\
  \    \n    // 我们将要测试的输出链接到可观察对象。\n    viewModel.output.isLoadedData\n        .drive(isLoaded)\n\
  \        .disposed(by: disposeBag)\n    \n    // 我们通过时间 10 的下一个事件向 ViewModel 发送调用服务器的操作。\n\
  \    testScheduler.createColdObservable([.next(10, ())])\n        .bind(to: viewModel.input.callServer)\n\
  \        .disposed(by: disposeBag)\n    \n    // 启动调度器\n    testScheduler.start()\n\
  \    \n    // 最后，我们使用 XCAssert 进行测试。\n    XCTAssertEqual(isLoaded.events, [.next(0,\
  \ false), .next(10, true)])\n}\n// 列表 4-34 使用 TestScheduler 的测试示例\n```\n\n### HomeViewModel\
  \ 测试\n\n现在，我们将应用刚刚了解的关于`RxTest`和基于 RxSwift 的 ViewModel 测试的知识到`HomeViewModel`组件上。\n\
  \n> **注意**\n> \n> 请记住，你可以在本书关联的代码仓库中找到完整的项目代码，包括测试。\n\n首先，我们创建`TestScheduler`、`DisposeBag`和`HomeViewModel`的实例。此外，由于实例化`HomeViewModel`时需传入`TaskListService`的引用，我们还需要创建它的一个实例以及一个额外的`TaskList`对象（列表\
  \ 4-35）。\n\n```swift\nimport XCTest\nimport RxSwift\nimport RxTest\n@testable import\
  \ MVVM_MyToDos\n\nvar disposeBag: DisposeBag!\nvar viewModel: HomeViewModel!\nvar\
  \ testScheduler: TestScheduler!\nlet tasksListService = TasksListService(coreDataManager:\
  \ InMemoryCoreDataManager.shared)\nlet taskList = TasksListModel(id: \"12345-67890\"\
  ,\n                              title: \"Test List\",\n                       \
  \       icon: \"test.icon\",\n                              tasks: [TaskModel](),\n\
  \                              createdAt: Date())\n\noverride func setUpWithError()\
  \ throws {\n    disposeBag = DisposeBag()\n    testScheduler = TestScheduler(initialClock:\
  \ 0)\n    tasksListService.fetchLists().forEach { tasksListService.deleteList($0)\
  \ }\n    viewModel = HomeViewModel(tasksListService: tasksListService)\n}\n\noverride\
  \ func tearDownWithError() throws {\n    disposeBag = nil\n    viewModel = nil\n\
  \    testScheduler = nil\n    tasksListService.fetchLists().forEach { tasksListService.deleteList($0)\
  \ }\n    super.tearDown()\n}\n...\n}\n// 列表 4-35 HomeViewModelTests 各组件的实例化\n```\n\
  \n与我们在 MVC 和 MVP 架构中所做的不同（我们使用了`TasksListService`和`TaskService`的模拟对象），这里我们将使用应用程序的数据库（Core\
  \ Data），但我们会将其配置为在内存中工作，而不是在设备的内存中（`InMemoryCoreDataManager`）。\n\n为了使用干净的数据库，我们引入了一些调用，允许我们在每次测试前后删除所有已创建的列表：\n\
  \n```swift\ntasksListService.fetchLists().forEach { tasksListService.deleteList($0)\
  \ }\n```\n\n现在，我们只需为`HomeViewModel`创建不同的测试。\n\n\n\n### EmptyState 测试\n\n正如在清单 4-36\
  \ 中所见，在第一个测试中，我们验证当数据库为空时，会显示 `EmptyState`。因此，最后一个事件（重新加载表格后）必须返回 false（`*.next(10,\
  \ false)*`），因为根据 `HomeViewModel` 的逻辑，`output.hideEmptyState` 返回布尔值 `!items.isEmpty`。\n\
  \n在第二个测试中，由于我们先添加了一个列表，此时 `!items.isEmpty` 的值将为 true，所以最后一个事件是 `*.next(10, true)*`。\n\
