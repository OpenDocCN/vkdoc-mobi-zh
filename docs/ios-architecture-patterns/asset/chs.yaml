  \ 的输入和输出\n```\n\n在本例中，我们只有三个输入（图标、任务标题和注册任务的操作）和一个输出（关闭视图的操作）。\n\n然后，我们在`AddTaskViewModel`的初始化中设置它们（列表\
  \ 4-32）。\n\n```swift\nclass AddTaskViewModel {\n    ...\n    private var tasksListModel:\
  \ TasksListModel!\n    private var taskService: TaskServiceProtocol!\n    private(set)\
