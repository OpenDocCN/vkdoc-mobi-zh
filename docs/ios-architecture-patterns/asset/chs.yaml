  }\n}\nextension TaskListView: TaskCellDelegate {\nfunc updateTask(_ task: TaskModel)\
  \ {\ndelegate?.updateTask(task)\n}\n}\n清单 6-39\n从视图调用协议方法\n```\n\n\n\n### `TaskListViewController`\n\
