  \        presenter.router = router\n        presenter.view = view\n        sut.presenter\
  \ = presenter\n    }\n    override func tearDownWithError() throws {\n        sut\
  \ = nil\n        super.tearDown()\n    }\n    ...\n}\n```\n\n*列表 5-54. `HomeInteractorTest`\
  \ 的设置*\n\n现在我们开始测试不同的方法。\n\n通过第一个测试，我们验证了从数据库加载列表时，由于我们使用了预加载了 `TaskListModel` 对象的\
  \ `MockTaskListService`，将会向 Presenter 返回一个列表（列表 5-55）。\n\n```\nfunc testLoadLists_whenLoadLists_shouldBeOneList()\
  \ {\n    sut.loadLists()\n    XCTAssertTrue(presenter.lists.count == 1)\n}\n```\n\
  \n*列表 5-55. 测试 `loadLists` 方法*\n\n在以下方法中，我们将验证当在 Presenter 中选择一个列表，并将该列表的 `IndexPath`\
  \ 传递给 Interactor 时，Interactor 会将相应的列表传递给 Presenter，然后该 Presenter 会告诉路由器通过将选定的列表传递给它来调用\
  \ `TaskList` 模块（列表 5-56）。\n\n```\nfunc testGetList_whenGetListIsCalled_shouldRouterNavigate()\
  \ {\n    sut.loadLists()\n    sut.getListAt(indexPath: IndexPath(row: 0, section:\
  \ 0))\n    XCTAssertTrue(router.isPushedToTasksList)\n    XCTAssertTrue(router.selectedTaskList.id\
  \ == \"12345-67890\")\n}\n```\n\n*列表 5-56. 测试选择列表时导航到 `TaskList` 模块*\n\n最后，我们将检查删除列表的操作。为此，最后一个测试证明，在删除我们预加载到\
  \ `MockTaskListService` 中的唯一列表后，Presenter 的 `lists` 变量为空（列表 5-57）。\n\n```\nfunc\
  \ testDeleteList_whenListIsDeleted_shouldBeZeroLists() {\n    sut.loadLists()\n\
  \    sut.deleteListAt(indexPath: IndexPath(row: 0, section: 0))\n    sut.loadLists()\n\
  \    XCTAssertTrue(presenter.lists.count == 0)\n}\n```\n\n*列表 5-57. `deleteList`\
  \ 方法的测试*\n\n## 总结\n\nVIPER 架构的诞生始终遵循 Clean Architecture 的概念，在此架构中，应用程序被划分为不同的层，每层都有明确定义的职责。这使得代码易于测试和复用。\n\
  \n功能的解耦和模块化使我们能够轻松地为项目添加新功能。\n\n正如我们在本章开头所见，VIPER 架构有许多优点，但也有一些缺点，例如对于小型项目会带来一定的复杂性，或者出现大量重复代码（可以通过使用从互联网上找到的多种\
  \ Xcode 模板之一来简化和自动化 VIPER 中这些重复代码的创建）。\n\n在下一章中，我们将看到一种遵循 Clean Code 原则的新架构：VIP（View–Interactor–Presenter）。这种架构已经开始拥有相当多的追随者，它试图解决\
  \ VIPER 架构中出现的一些情况：例如，它通过使组件之间的流成为单向来简化流程，而在 VIPER 中则是双向的。\n\n脚注 1\n\n"
- '# 6. VIP: View–Interactor–Presenter


  ## 什么是 VIP？


  ### 一点历史


  大约在 2015 年，Raymond Law 创建了所谓的 Clean Swift^(¹²) 或 VIP（View–Interactor–Presenter）架构，其思想是将
  Clean Architecture（如我们在第一章 1 中所见）应用于 iOS 和 macOS 项目。


  这种架构的范式是 VIP 循环中发生的单向流，即信息始终沿一个方向流动：从 View 到 Interactor，从 Interactor 到 Presenter，再从
  Presenter 到 View。


  ### 工作原理


  正如我们刚刚解释的，该架构的核心在于 View、Interactor 和 Presenter 之间的单向循环。然而，此架构的应用通常需要其他组件的存在（尽管取决于每个屏幕的复杂性，某些组件可能存在也可能不存在）：Router、Model
  和 Worker。图 6-1 显示了组件之间的连接方式。


  ![](img/531999_1_En_6_Fig1_HTML.png)


  *一个视图交互器展示器模式的框图，流程从视图到路由器和交互器，再与展示器连接，然后进一步流向工作器和模型。*


  **图 6-1. VIP 模式**


  ### VIP 中的组件


  现在，我们将详细了解此架构中的各个组件。


  **注意**


  随着我们深入学习 VIP 架构，我们会发现生成的类、重复代码和通信协议的数量都很大。如果你在互联网上搜索，会找到许多模板示例，尽管它们都指代 VIP 架构，但由于是针对不同项目进行的适配，其命名、功能等方面可能存在一些差异。




  '
- '# 视图（UIViewController）


  我们可以将视图（+`UIViewController`）视为每个 VIP 循环的起点和终点（它将信息和事件传递给交互器，并接收来自展示器的响应）：


  - `UIViewController` 管理场景，并持有对视图的强引用。

  - 每个 `UIViewController` 都持有对交互器和路由器的强引用。

  - 视图中发生的事件将传递给交互器。

  - 视图从展示器接收数据，因为 `UIViewController` 必须遵守展示器用于发送信息的协议。


  例如，下面的初始代码展示了如何呈现一个场景的 ViewController 和视图（我们应用程序的*首页*屏幕）（清单 6-1 和清单 6-2）。


  ```swift

  import UIKit

  protocol HomeViewDelegate: AnyObject {}

  final class HomeView: UIView {

  var delegate: HomeSceneViewDelegate?

  }

  ```


  *清单 6-2：视图定义了连接到 ViewController 的协议*


  ```swift

  import UIKit

  protocol HomeViewControllerInput: AnyObject {}

  protocol HomeViewControllerOutput: AnyObject {}

  final class HomeViewController: UIViewController {

  var interactor: HomeInteractorInput?

  var router: HomeRoutingDelegate?

  }

  extension HomeViewController: HomeViewControllerInput {}

  extension HomeViewController: HomeViewDelegate {}

  ```


  *清单 6-1：ViewController 类包含 Input 协议以及对交互器、路由器和视图的引用*


  '
- '# 交互器


  交互器负责管理视图请求，获取必要的数据（无论是来自数据库还是网络），并将其传递给展示器：


  - 交互器包含每个场景的业务逻辑。

  - 根据视图的请求，交互器会连接一个或多个工作者/服务（我们稍后将看到，它们负责获取数据）。

  - 交互器持有对展示器的强引用。

  - 交互器必须遵守视图用于发送事件的协议。


  在清单 6-3 中，您可以看到我们开始处理 `HomeInteractor` 的基础代码。


  ```swift

  import Foundation

  protocol HomeInteractorOutput: AnyObject {}

  typealias HomeInteractorInput = HomeInteractorOutput

  final class HomeInteractor {

  var presenter: HomePresenterInput?

  }

  ```


  *清单 6-3：交互器类定义其输出协议*


  '
- '# 展示器


  展示器（清单 6-4）的功能是接收来自交互器的信息，并将其转换为视图可以呈现的信息（即，我们将信息转换为 ViewModel）：


  - 展示器包含展示逻辑。

  - 它持有对视图的弱引用（视图充当展示器的输出）。

  - 展示器将交互器的结果转换为视图可渲染的对象。


  ```swift

  import UIKit

  typealias HomePresenterInput = HomeInteractorOutput

  typealias HomePresenterOutput = HomeViewControllerInput

  final class HomePresenter {

  weak var viewController: HomePresenterOutput?

  }

  extension HomePresenter: HomePresenterInput {}

  ```


  *清单 6-4：在展示器代码中，我们将 `HomeInteractorOutput` 和 `HomeViewControllerInput` “重命名”为“展示器”命名规范*


  '
- '# 路由器


  路由器是负责在 ViewController 之间导航并在它们之间传递信息的组件（清单 6-5）：


  - 路由器包含导航逻辑（这使得我们将其从 ViewController 中移除）。

  - 它持有对视图（ViewController）的弱引用。

  - 这是一个可选组件，因为一个场景的 ViewController 可能没有导航选项。


  ```swift

  protocol HomeRouterDelegate {}

  final class HomeRouter {

  weak var source: UIViewController?

  }

  extension HomeRouter: HomeRouterDelegate {}

  ```


  *清单 6-5：`HomeSceneRouterLogic` 结构代码*


  '
- '# 工作者/服务


  工作者/服务是一个抽象类，主要负责数据库信息检索操作、API 请求和文件下载：


  - 每个工作者/服务应具有单一功能（单一职责原则）。

  - 一个交互器可以调用一个或多个工作者/服务。

  - 它们必须是通用的，以便可以被不同的交互器使用。


  ##### 模型


  在 VIP 循环中，信息沿一个方向流动：从视图到交互器（以请求的形式），从交互器到展示器（作为响应），再回到视图（作为 ViewModel）。因此，使用与场景相关并包含（清单
  6-6）的模型是非常成熟的：


  - **请求模型**：包含允许交互器执行操作的参数。

  - **响应模型**：包含工作者获取并传递给展示器的适当数据。

  - **ViewModel 模型**：通常是原始类型的数据，传递给视图以更新它。


  ```swift

  enum HomeModel {

  enum Fetch {

  struct Request {}

  struct Response {}

  struct ViewModel {}

  }

  }

  ```


  *清单 6-6：VIP 循环的模型代码结构*


  '
- '# 配置器


  这是一个可选组件，但经常被大量使用，因为它允许我们初始化场景的组件并建立它们之间的关系（清单 6-7）：


  ```swift

  import UIKit

  final class HomeConfigurator {

  func configured(_ viewController: HomeViewController) -> HomeViewController {

  let interactor = HomeInteractor()

  let presenter = HomePresenter()

  let router = HomeRouter()

  router.viewController = viewController

  presenter.viewController = viewController

  interactor.presenter = presenter

  viewController.interactor = interactor

  viewController.router = router

  return viewController

  }

  }

  ```


  *清单 6-7：`HomeConfigurator` 类代码*


  > 注意：正如您在 VIPER 架构中所见，这里我们也使用了基于 Input/Output 术语的协议命名规范，以便于识别和使用。


  '
- "# VIP 的优点和缺点\n\n在开发项目时，VIP 架构有很多优点，因为它追求“干净架构”，但也存在一些缺点。\n\n### 优点\n\nVIP 架构的主要优点如下：\n\
  \n- 它基于干净架构的原则。\n- 它通过将所有逻辑传递给交互器来减小 ViewController 的规模。\n- 它呈现单向数据流。\n- 它是一种模块化且可重用的架构，因为大量使用协议允许对单个组件进行更改而不影响应用程序的其余部分。\n\
  - 应用单一职责原则减少了所使用方法的大小，这也利于模块化。\n- 其结构易于维护，且任何错误都可以轻松纠正。\n- 单元测试的实现很简单，这有利于通过 TDD（测试驱动开发）进行开发以及应用程序的可测试性。\n\
  \n### 缺点\n\nVIP 架构也有缺点，例如：\n\n- 该架构基于大量协议，这可能一开始会让人感到困惑（可以通过使用模板来减少这种困惑）。\n- 使用如此多的协议使得编写大量代码成为必要，即使对于最简单的任务也是如此。\n\
  - 大量的代码使其不适合小型应用程序。\n- 它可能看起来设计过度或过于复杂。\n- 因此，它可能对刚起步的开发者缺乏吸引力。\n\n\n\n### VIP 层级\n\
  \n与我们在前一章中将使用 VIPER 架构创建的项目划分为文件夹的方式类似，使用 VIP 架构时我们也会进行类似的操作，区别在于，现在不再是拥有一个包含多个模块的文件夹，而是拥有一个包含多个场景的文件夹。\n\
  \n每个场景对应一个屏幕，并包含视图（*UIView* 和 *UIViewController*）、交互器、展示器、配置器、路由器以及模型。我们还会有一个存放服务或工作器的文件夹，最后，还有一个存放通用组件的文件夹（图\
  \ 6-2）。\n\n![](img/531999_1_En_6_Fig2_HTML.jpg)\n\nVIP 文件夹项目窗口的截图，其中高亮显示了 App Delegate。\n\
  \n图 6-2 VIP 文件夹项目结构\n\n#### 场景\n\n正如我们刚才讨论的，`Scenes` 文件夹将为每个屏幕包含一个子文件夹。这些子文件夹中的每一个都包含七个文件。因此，例如，对于\
  \ *Home* 屏幕，我们将拥有 `HomeView`、`HomeViewController`、`HomePresenter`、`HomeInteractor`、`HomeRouter`、`HomeConfigurator`\
  \ 和 `HomeModel`。\n\n#### 服务/工作器\n\n在这里，我们将拥有 `TaskService` 和 `TasksListService`\
  \ 类，它们允许我们向数据库发送信息（创建、更新或删除信息），或者从数据库检索信息并将其转换为模型。\n\n#### 通用\n\n##### Core Data\n\
  \n在此文件夹中，我们将拥有 `CoreDataManager.swift` 文件，以及由 Xcode 为数据库实体自动创建的四个文件。\n\n### 组件\n\
  \n在此文件夹中，我们将存放那些将在不同屏幕中使用的视觉元素：标签、按钮、单元格……\n\n##### 模型\n\n这里存放的是我们可以将数据库实体转换成的模型。此外，我们还将创建一个协议，模型必须遵守该协议，以便能够在模型和实体之间进行相互转换。\n\
  \n##### 扩展\n\n在这种情况下，我们创建了一个 `UIColor` 扩展，以便能够轻松访问专门为此应用程序创建的颜色；以及一个针对 `NSManagedObject`\
  \ 类的扩展，该扩展将防止我们在进行测试部分时与上下文发生冲突。\n\n##### 辅助工具\n\n它们包含了我们在应用程序中将要使用的常量参数。\n\n###\
  \ MyToDos 应用屏幕\n\n正如我们所解释的，VIP 架构基于视图 - 交互器 - 展示器循环以及信息的单向流动。在此基础上，我们还将拥有其他组件，这些组件将在导航、信息检索等方面为我们提供帮助，例如路由器、配置器和工作器/服务，所有这些都是通过一系列协议或接口相互连接的。\n\
  \n与任何架构一样，如果你对它进行更深入的研究，你会发现协议的命名各不相同，它们使用工作器或服务或用例，是否使用配置器等等……关键是理解架构的基本思想，并使用我们最习惯的格式。\n\
  \n例如，在协议的命名中，我更喜欢使用输入/输出的术语来表示它们是组件的输入或输出函数。\n\n#### AppDelegate 和 SceneDelegate\n\
  \n要启动应用程序，在 `SceneDelegate` 中，我们将创建第一个场景，即 *Home* 场景，通过实例化 `HomeViewController`\
  \ 类（我们向其传递一个视图实例 `HomeView`）。接下来，我们使用 `HomeConfigurator` 配置 `HomeViewController`，并将其传递给\
  \ `UINavigationController` 组件，该组件将负责控制应用程序的所有导航（代码清单 6-8）。\n\n```\nfunc scene(_\
  \ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:\
  \ UIScene.ConnectionOptions) {\nif let windowScene = scene as? UIWindowScene {\n\
  let window = UIWindow(windowScene: windowScene)\nwindow.backgroundColor = .white\n\
  let homeViewController = HomeViewController(homeView: HomeView())\nlet navigationController\
  \ = UINavigationController(rootViewController: HomeConfigurator.configure(homeViewController))\n\
  navigationController.navigationBar.isHidden = true\nnavigationController.interactivePopGestureRecognizer?.isEnabled\
  \ = false\nwindow.rootViewController = navigationController\nself.window = window\n\
  window.makeKeyAndVisible()\n}\n}\n```\n代码清单 6-8 从 `SceneDelegate` 访问 Home\n\n####\
  \ Home 场景\n\n在图 6-3 中，我们可以看到构成 *Home* 场景的不同组件、它们是如何相互连接的、被调用的方法以及信息流的方向。\n\n![](img/531999_1_En_6_Fig3_HTML.png)\n\
  \nHome 场景不同组件的框图，包括 Home 路由器、Home 配置器、Home 视图、Home 交互器、Home 展示器和任务列表服务。\n\n图 6-3\
  \ Home 场景组件及通信方案\n\n##### HomeConfigurator\n\n`HomeConfigurator` 负责获取一个 `HomeViewController`\
  \ 实例，并建立场景的所有组件以及它们之间的依赖关系。\n\n因此，在这个类中，我们将实例化 `HomeInteractor`（我们向其传递一个 `TasksListService`\
  \ 实例，它将是允许我们访问数据库的工作器或服务）、`HomePresenter` 和 `HomeRouter`。接下来，我们建立每个组件之间的关系，最后返回已经配置好的\
  \ `HomeViewController` 实例（代码清单 6-9）。\n\n```\nfinal class HomeConfigurator {\nstatic\
  \ func configure(_ viewController: HomeViewController) -> HomeViewController {\n\
  let interactor = HomeInteractor(tasksListService: TasksListService())\nlet presenter\
  \ = HomePresenter()\nlet router = HomeRouter()\nrouter.viewController = viewController\n\
  presenter.viewController = viewController\ninteractor.presenter = presenter\nviewController.interactor\
  \ = interactor\nviewController.router = router\nreturn viewController\n}\n}\n```\n\
  代码清单 6-9 `HomeConfigurator` 代码\n\n##### HomeView\n\n`HomeView` 类包含构成图形界面的不同元素，这些元素通过两种不同的方式与\
  \ `HomeViewController` 通信：直接方式，用于传递任务列表并将其显示在表格中（`showTasksLists`）；以及通过 `HomeViewDelegate`\
  \ 协议的方法，`HomeViewController` 必须实现这些方法（代码清单 6-10）。\n\n```\nimport UIKit\n\nprotocol\
  \ HomeViewDelegate: AnyObject {\nfunc addList()\nfunc selectedListAt(index: IndexPath)\n\
  func deleteListAt(indexPath: IndexPath)\n}\n\nfinal class HomeView: UIView {\nweak\
  \ var delegate: HomeViewDelegate?\n...\nfunc showTasks(lists: [TasksListModel])\
  \ {\nself.lists = lists\ntableView.reloadData()\nemptyState.isHidden = self.lists.count\
  \ > 0\n}\n}\n\nprivate extension HomeView {\n...\n@objc func addListAction() {\n\
  delegate?.addList()\n}\n...\n}\n\nextension HomeView: UITableViewDelegate {\n...\n\
  func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath) {\n\
  delegate?.selectedListAt(index: indexPath)\n}\n}\n\nextension HomeView: UITableViewDataSource\
  \ {\n...\nfunc tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,\
  \ forRowAt indexPath: IndexPath) {\nif editingStyle == .delete {\ndelegate?.deleteListAt(indexPath:\
  \ indexPath)\n}\n}\n}\n```\n代码清单 6-10 `HomeView` 类代码，展示了 `HomeViewDelegate` 协议及其方法被调用的位置\n\
  \n\n\n### `HomeViewController`\n\n我们可以将 `HomeViewController` 视为 VIP 循环的起点和终点。正如我们在解释\
  \ VIP 架构中使用的不同协议时所见，该类将与两个协议相关联：一个包含用于向 `HomeInteractor` 发送请求的方法（`HomeViewControllerOutput`），另一个则包含由\
  \ `HomePresenter` 调用、且需要由 `HomeViewController` 实现的方法（`HomeViewControllerInput`）（代码清单\
  \ 6-11）。\n\n```\nprotocol HomeViewControllerInput: AnyObject {\n    func reloadDataWithTaskList(viewModel:\
  \ HomeModel.FetchTasksLists.ViewModel)\n    func showAddListView(viewModel: HomeModel.AddTasksList.ViewModel)\n\
  \    func showSelectedList(viewModel: HomeModel.SelectTasksList.ViewModel)\n}\n\n\
  protocol HomeViewControllerOutput: AnyObject {\n    func fetchTasksLists(request:\
  \ HomeModel.FetchTasksLists.Request)\n    func addList(request: HomeModel.AddTasksList.Request)\n\
  \    func selectList(request: HomeModel.SelectTasksList.Request)\n    func removeList(request:\
  \ HomeModel.RemoveTasksList.Request)\n}\n```\n*代码清单 6-11 HomeViewControllerInput\
  \ 与 HomeViewControllerOutput 协议*\n\n在实例化 `HomeViewController` 的过程中，我们会向其传递一个 `HomeView`\
  \ 的实例（这一步在 `HomeConfigurator` 中完成），并将其委托设置为 `HomeViewController`。因此，我们需要让该类遵循 `HomeViewDelegate`\
  \ 协议（代码清单 6-12）。\n\n```\nfinal class HomeViewController: UIViewController {\n  \
  \  var interactor: HomeInteractorInput?\n    var router: HomeRouterDelegate?\n \
  \   private let homeView: HomeView\n\n    init(homeView: HomeView) {\n        self.homeView\
  \ = homeView\n        super.init(nibName: nil, bundle: nil)\n    }\n\n    required\
  \ init?(coder: NSCoder) {\n        fatalError(\"init(coder:) has not been implemented\"\
  )\n    }\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n   \
  \     homeView.delegate = self\n        self.view = homeView\n        fetchTasksLists()\n\
  \    }\n\n    private func fetchTasksLists() {\n        let request = HomeModel.FetchTasksLists.Request()\n\
  \        interactor?.fetchTasksLists(request: request)\n    }\n}\n\nextension HomeViewController:\
  \ HomeViewDelegate {\n    func addList() {\n        let request = HomeModel.AddTasksList.Request()\n\
  \        interactor?.addList(request: request)\n    }\n\n    func selectedListAt(index:\
  \ IndexPath) {\n        let request = HomeModel.SelectTasksList.Request(index: index)\n\
  \        interactor?.selectList(request: request)\n    }\n\n    func deleteListAt(indexPath:\
  \ IndexPath) {\n        let request = HomeModel.RemoveTasksList.Request(index: indexPath)\n\
  \        interactor?.removeList(request: request)\n    }\n}\n```\n*代码清单 6-12 HomeViewController\
  \ 初始化与 HomeViewDelegate 遵循*\n\n如你所见，在 `HomeViewDelegate` 的这三个方法中，我们都会创建一个请求（在 `addList`\
  \ 方法中，请求为空，但我们出于教学目的将其保留），然后调用 `HomeViewController` 输出协议的相应方法，这些方法需要由 `HomeInteractor`\
  \ 来实现。\n\n最后，`HomeViewController` 必须遵循 `HomeViewControllerInput` 协议，以便展示器能够向其传递信息——无论是更新界面还是导航到另一个屏幕（代码清单\
  \ 6-13）。\n\n```\nextension HomeViewController: HomeViewControllerInput {\n    func\
  \ showAddListView(viewModel: HomeModel.AddTasksList.ViewModel) {\n        router?.showAddListView(delegate:\
  \ viewModel.addListDelegate)\n    }\n\n    func reloadDataWithTaskList(viewModel:\
  \ HomeModel.FetchTasksLists.ViewModel) {\n        homeView.showTasks(lists: viewModel.tasksLists)\n\
  \    }\n\n    func showSelectedList(viewModel: HomeModel.SelectTasksList.ViewModel)\
  \ {\n        router?.showSelectedList(delegate: viewModel.selectedListDelegate,\
  \ list: viewModel.tasksList)\n    }\n}\n```\n*代码清单 6-13 HomeViewControllerInput\
  \ 遵循*\n\n\n\n### `HomeInteractor`\n\n正如我们所知，`HomeInteractor` 涉及两个协议的方法：一个输入协议，对应于\
  \ `HomeViewController` 的输出协议（`HomeViewControllerOutput`），因此我们将其重命名为 `HomeInteractorInput`（使用\
  \ `typealias` 命令）；另一个是输出协议（`HomeInteractorOutput`），其中包含 `HomeInteractor` 将调用的方法，用于向\
  \ presenter 传递在 `HomeViewController` 中发出的请求的响应结果（列表 6-14）。\n\n```\nprotocol HomeInteractorOutput:\
  \ AnyObject {\nfunc presentTasksLists(response: HomeModel.FetchTasksLists.Response)\n\
  func showAddTaskList(response: HomeModel.AddTasksList.Response)\nfunc showSelectedList(response:\
  \ HomeModel.SelectTasksList.Response)\n}\ntypealias HomeInteractorInput = HomeViewControllerOutput\n\
  Listing 6-14\nHomeInteractor 的输入/输出协议。输入协议对应 HomeViewControllerOutput，因此我们在该类中更改了其名称\n\
  ```\n\n在 `HomeInteractor` 中，我们拥有此场景的业务逻辑。为了实现它，我们将使用 `TasksListService` 服务，以便能够访问与包含任务列表的表格相关的数据库。我们将在该类的初始化方法中传入\
  \ `TasksListService`（正如我们在 `HomeConfigurator` 中看到的那样）（列表 6-15）。\n\n```\nfinal class\
  \ HomeInteractor {\nvar presenter: HomePresenterInput?\nprivate var lists = [TasksListModel]()\n\
  private let tasksListService: TasksListServiceProtocol!\ninit(tasksListService:\
  \ TasksListServiceProtocol) {\nself.tasksListService = tasksListService\n}\nfunc\
  \ fetchTasksLists() {\nfetchTasksLists(request: HomeModel.FetchTasksLists.Request())\n\
  }\n}\nListing 6-15\nHomeInteractor 初始化\n```\n\n正如我们所知，`HomeInteractor` 必须遵循 `HomeInteractorInput`（这是我们在该类中赋予\
  \ `HomeViewControllerOutput` 的名称），因此我们实现其方法（列表 6-16）。\n\n```\nextension HomeInteractor:\
  \ HomeInteractorInput {\nfunc addList(request: HomeModel.AddTasksList.Request) {\n\
  let response = HomeModel.AddTasksList.Response(addListDelegate: self)\npresenter?.showAddTaskList(response:\
  \ response)\n}\nfunc fetchTasksLists(request: HomeModel.FetchTasksLists.Request)\
  \ {\nlists = tasksListService.fetchLists()\nlet response = HomeModel.FetchTasksLists.Response(tasksLists:\
  \ lists)\npresenter?.presentTasksLists(response: response)\n}\nfunc selectList(request:\
  \ HomeModel.SelectTasksList.Request) {\nlet list = lists[request.index.row]\nlet\
  \ response = HomeModel.SelectTasksList.Response(selectedListDelegate: self, tasksList:\
  \ list)\npresenter?.showSelectedList(response: response)\n}\nfunc removeList(request:\
  \ HomeModel.RemoveTasksList.Request) {\nlet list = lists[request.index.row]\ntasksListService.deleteList(list)\n\
  lists.remove(at: request.index.row)\nlet response = HomeModel.FetchTasksLists.Response(tasksLists:\
  \ lists)\npresenter?.presentTasksLists(response: response)\n}\n}\nListing 6-16\n\
  遵循 HomeInteractorInput 协议\n```\n\n请注意，在 `addList` 方法中，在准备响应时，我们将 `HomeInteractor`\
  \ 设置为委托（`addListDelegate`），因为我们必须谨记，当我们从 `AddListView` 场景添加新列表时（将在后面看到），必须使用新列表更新\
  \ Home 场景。\n\n在这些方法中，在向 `TasksListService` 发出相应请求（如有必要）之后，我们准备响应并将其通过相应的方法传递给 presenter。\n\
  \n此外，在 `selectList` 方法中创建响应时，我们还将 `HomeInteractor` 设置为委托（`selectedListDelegate`），以便在\
  \ `TaskList` 场景中修改某个列表的任务时，Home 场景也能得到更新。\n\n因此，`HomeInteractor` 必须遵循它作为委托的两个协议。在这两种情况下，它都会调用\
  \ `fetchTasksLists` 方法，正如我们所见，该方法负责从数据库中检索任务列表并将其传递给 `HomePresenter`（列表 6-17）。\n\
  \n```\nextension HomeInteractor: AddListDelegate {\nfunc didAddList() {\nfetchTasksLists()\n\
  }\n}\nextension HomeInteractor: SelectedListDelegate {\nfunc updateLists() {\nfetchTasksLists()\n\
  }\n}\nListing 6-17\n遵循 AddListDelegate 和 SelectedListDelegate 协议\n```\n\n### `HomePresenter`\n\
  \n该类负责接收来自 `HomeInteractor` 的响应，并对其进行处理，以便 `HomeViewController` 能够显示这些数据，并以 ViewModel\
  \ 的形式传递给 `HomeViewController`。\n\n在 HomePresenter 中，我们也将拥有一个输入协议，它对应于 `HomeInteractor`\
  \ 的输出协议（这就是我们更改其名称的原因），以及另一个输出协议，它对应于 `HomeViewController` 的输入协议（因此我们同样更改了其名称）（列表\
  \ 6-18）。\n\n```\ntypealias HomePresenterInput = HomeInteractorOutput\ntypealias\
  \ HomePresenterOutput = HomeViewControllerInput\nListing 6-18\n我们更改了协议的名称，以便更容易看出它们在\
  \ HomePresenter 中的功能\n```\n\n最后，我们只需让 `HomePresenter` 遵循 `HomePresenterInput` 协议并实现其方法，以便\
  \ `HomeInteractor` 能够传递其响应，并在处理之后发送给 `HomeViewController`（列表 6-19）。\n\n```\nfinal\
  \ class HomePresenter {\nweak var viewController: HomePresenterOutput?\n}\nextension\
  \ HomePresenter: HomePresenterInput {\nfunc presentTasksLists(response: HomeModel.FetchTasksLists.Response)\
  \ {\nlet viewModel = HomeModel.FetchTasksLists.ViewModel(tasksLists: response.tasksLists)\n\
  viewController?.reloadDataWithTaskList(viewModel: viewModel)\n}\nfunc showAddTaskList(response:\
  \ HomeModel.AddTasksList.Response) {\nlet viewModel = HomeModel.AddTasksList.ViewModel(addListDelegate:\
  \ response.addListDelegate)\nviewController?.showAddListView(viewModel: viewModel)\n\
  }\nfunc showSelectedList(response: HomeModel.SelectTasksList.Response) {\nlet viewModel\
  \ = HomeModel.SelectTasksList.ViewModel(selectedListDelegate: response.selectedListDelegate,\
  \ tasksList: response.tasksList)\nviewController?.showSelectedList(viewModel: viewModel)\n\
  }\n}\nListing 6-19\n遵循 HomePresenterInput 协议\n```\n\n\n\n### `HomeModel`\n\n正如我们在`Home`场景各组件代码中看到的，我们通过`HomeModel`以`Request`、`Response`和`ViewModel`的形式传递信息。`HomeModel`为每个用例或请求包含一个`enum`：因此，我们有一个用于向数据库请求任务列表的枚举（`enum\
  \ FetchTasksLists`），一个用于调用允许我们添加新列表的场景的枚举（`enum AddTasksList`），以及另一个用于调用显示列表任务的场景的枚举（`enum\
  \ SelectTasksList`）。\n\n此外，正如我们在本章开头讨论的那样，每个枚举都包含三个结构体：`Request`（用于从`ViewController`到`Interactor`的请求）、`Response`（用于将响应从`Interactor`传递给`Presenter`）和`ViewModel`（用于将数据从`Presenter`传递给`ViewController`）（见代码清单\
  \ 6-20）。\n\n```\nenum HomeModel {\n    enum FetchTasksLists {\n        struct Request\
  \ {}\n        struct Response {\n            let tasksLists: [TasksListModel]\n\
  \        }\n        struct ViewModel {\n            let tasksLists: [TasksListModel]\n\
  \        }\n    }\n    enum AddTasksList {\n        struct Request {}\n        struct\
  \ Response {\n            let addListDelegate: AddListDelegate\n        }\n    \
  \    struct ViewModel {\n            let addListDelegate: AddListDelegate\n    \
  \    }\n    }\n    enum SelectTasksList {\n        struct Request {\n          \
  \  let index: IndexPath\n        }\n        struct Response {\n            let selectedListDelegate:\
  \ SelectedListDelegate\n            let tasksList: TasksListModel\n        }\n \
  \       struct ViewModel {\n            let selectedListDelegate: SelectedListDelegate\n\
  \            let tasksList: TasksListModel\n        }\n    }\n    enum RemoveTasksList\
  \ {\n        struct Request {\n            let index: IndexPath\n        }\n   \
  \     struct Response {\n            let list: TasksListModel\n        }\n    }\n\
  }\n```\n\n**代码清单 6-20** `HomeModel` 代码\n\n### `HomeRouter`\n\n`HomeRouter`包含的方法支持从`Home`导航到允许添加新列表的屏幕（`AddList`场景），或导航到允许查看列表中任务的屏幕（`TasksList`场景）。这两种方法都在`HomeRouterDelegate`协议中定义（见代码清单\
  \ 6-21）。\n\n```\nprotocol HomeRouterDelegate {\n    func showAddListView(delegate:\
  \ AddListDelegate)\n    func showSelectedList(delegate: SelectedListDelegate, list:\
  \ TasksListModel)\n}\n```\n\n**代码清单 6-21** `HomeRouterDelegate` 协议的定义\n\n当导航到一个新场景时，我们必须先创建对应的`ViewController`，然后通过其`Configurator`进行配置（见代码清单\
  \ 6-22）。\n\n```\nextension HomeRouter: HomeRouterDelegate {\n    func showAddListView(delegate:\
  \ AddListDelegate) {\n        let addListViewController = AddListViewController(addListView:\
  \ AddListView())\n        viewController?.navigationController?.pushViewController(AddListConfigurator.configure(addListViewController,\
  \ delegate: delegate), animated: true)\n    }\n    func showSelectedList(delegate:\
  \ SelectedListDelegate, list: TasksListModel) {\n        let taskListController\
  \ = TaskListViewController(taskListView: TaskListView())\n        viewController?.navigationController?.pushViewController(TaskListConfigurator.configure(taskListController,\
  \ delegate: delegate, tasksList: list), animated: true)\n    }\n}\n```\n\n**代码清单\
  \ 6-22** `HomeRouter` 遵守 `HomeRouterDelegate` 协议\n\n这样，要导航到`AddList`场景，我们实例化`AddListViewController`，然后通过`AddListConfigurator`进行配置（我们将`AddListViewController`实例和`AddListDelegate`委托均作为参数传递给它）。\n\
  \n在导航到`TasksListDelegate`场景的情况下，我们会实例化`TaskListViewController`，然后用`TaskListConfigurator`进行配置，同时将我们要显示其任务的列表作为`SelectedListDelegate`传递给它。\n\
  \n> **注意：** 请记住，这两个委托的作用是通知`Home`场景，在添加或更新列表时更新其视图。\n\n## `AddList` 场景\n\n这个屏幕允许我们添加新的任务列表。在图\
  \ 6-4 中，你可以看到构成该场景的组件以及它们之间的连接。\n\n![](img/531999_1_En_6_Fig4_HTML.jpg)\n\n**图 6-4**\
  \ `AddList` 场景组件与通信架构\n\n### `AddListConfigurator`\n\n`AddListConfigurator`负责接收我们从`HomeRouter`传递过来的`AddListViewController`实例（正如我们刚才所见），对其进行配置，创建构成此场景的不同组件，并建立它们之间的不同关系（见代码清单\
  \ 6-23）。\n\n```\nfinal class AddListConfigurator {\n    static func configure( _\
  \ viewController: AddListViewController, delegate: AddListDelegate) -> AddListViewController\
  \  {\n        let interactor = AddListInteractor(tasksListService: TasksListService(),\
  \ delegate: delegate)\n        let presenter = AddListPresenter()\n        let router\
  \ = AddListRouter()\n        router.viewController = viewController\n        presenter.viewController\
  \ = viewController\n        interactor.presenter = presenter\n        viewController.interactor\
  \ = interactor\n        viewController.router = router\n        return viewController\n\
  \    }\n}\n```\n\n**代码清单 6-23** `AddListConfigurator` 代码\n\n如你所见，在实例化`AddListInteractor`时，我们向其传递了一个`TasksListService`实例，因为它将负责将新的任务列表添加到数据库中。\n\
  \n### `AddListView`\n\n`AddListView`包含用户与之交互的图形元素，用于添加新的任务列表或在未添加任何列表的情况下返回主页。在这两种情况下，用户的操作都将通过实现`AddListViewDelegate`协议来传达给`AddListViewController`（见代码清单\
  \ 6-24）。\n\n```\nprotocol AddListViewDelegate: AnyObject {\n    func navigateBack()\n\
  \    func addListWith(title: String, icon: String)\n}\n\nfinal class AddListView:\
  \ UIView {\n    weak var delegate: AddListViewDelegate?\n    ...\n}\n\nprivate extension\
