  \ tasksListModel, taskService: TaskService())\n        addTaskView = AddTaskView(viewModel:\
  \ viewModel)\n        addTaskView.delegate = self\n        self.view = addTaskView\n\
  \    }\n}\n列表 4-29 设置 AddTaskViewController 代码\n```\n\n#### `AddTaskView`\n\n`AddTaskView`的代码与我们为`AddListView`开发的非常相似，因为它包含一个`UITextField`元素、一个`IconsSelectorView`元素和一个`UIButton`元素。因此，`bindViewToModel`方法的代码您会很熟悉（列表\
