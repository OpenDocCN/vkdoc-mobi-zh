  \ 作为界面，*Swift* 作为语言，并勾选*包含测试*（图 1-15）。\n\n![](img/531999_1_En_1_Fig16_HTML.png)\n\
  \n*图 1-16* – 项目配置界面\n\n*   创建项目后，其配置界面将会出现。在此界面上，我们必须移除 *Deployment Info* ➤ *Main\
