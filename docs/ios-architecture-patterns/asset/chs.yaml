  \n从核心数据创建数据模型的窗口。点击下一步后，将其保存为 `ToDoList`，然后选择创建选项。\n\n**图 1-20** 创建数据模型文件\n\n![](img/531999_1_En_1_Fig19_HTML.png)\n\
