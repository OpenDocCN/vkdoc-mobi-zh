- "# 控制器测试\n\n控制器是 MVC 的核心，它们是视图与模型之间的中介，同时还负责管理屏幕间的导航。因此，我们将在控制器中进行的测试将侧重于与模型层的交互以及从一个屏幕到另一个屏幕的导航。\n\
  \n例如，在 `HomeViewControllerTest.swift` 文件中，我们有一个测试，用于验证当执行 `deleteList` 方法时，选定的任务列表将从数据库中删除（代码清单\
  \ 2-34）。\n\n```\nclass HomeViewControllerTest: XCTestCase {\nvar sut: HomeViewController!\n\
  var navigationController: MockNavigationController!\nvar tasksListService: MockTaskListService!\n\
  var taskService: MockTaskService!\nlet list = TasksListModel(id: ProcessInfo().globallyUniqueString,\n\
  title: \"Test title\",\nicon: \"test.icon\",\ntasks: [TaskModel](),\ncreatedAt:\
  \ Date())\noverride func setUpWithError() throws {\ntasksListService = MockTaskListService(lists:\
  \ [list])\ntaskService = MockTaskService()\nsut = HomeViewController(tasksListService:\
  \ tasksListService, taskService: taskService)\nnavigationController = MockNavigationController(rootViewController:\
  \ UIViewController())\nnavigationController.pushViewController(sut, animated: false)\n\
  navigationController.vcIsPushed = false\n}\noverride func tearDownWithError() throws\
  \ {\nsut = nil\nnavigationController = nil\ntaskService = nil\nsuper.tearDown()\n\
  }\nfunc testDeleteList_whenDeletedActionIsCalled_shouldBeNoneOnDatabase() {\nsut.deleteList(list)\n\
  XCTAssertEqual(tasksListService.fetchLists().count, 0)\n}\nfunc testPushVC_whenAddListIsCalled_thenPushAddListVCCalled()\
  \ {\nsut.addListAction()\nXCTAssertTrue(navigationController.vcIsPushed)\n}\nfunc\
  \ testPushVC_whenTaskListIsCalled_thenPushTaskListVCCalled() {\nsut.selectedList(TasksListModel())\n\
  XCTAssertTrue(navigationController.vcIsPushed)\n}\n}\n代码清单 2-34\nHomeViewControllerTest\
  \ 代码测试\n```\n\n这里我们可以看到，在初始化控制器时注入 `MockTasksListService` 和 `MockTaskService` 类的依赖关系，如何使我们能够使用这些具有可控结果的“模拟”类（从而加速测试）。\n\
  \n我们在 `testDeleteList_whenDeletedActionIsCalled_shouldBeNoneOnDatabase` 测试中所做的是，首先创建一个任务列表并保存到数据库，然后执行\
  \ `deleteList` 方法，并检查该列表是否已从数据库中删除。\n\n在 `testPushVC_whenAddListIsCalled_thenPushAddListVCCalled`\
  \ 测试中，我们执行 `addListAction` 方法，并检查 `vcIsPushed` 参数是否为 `true`，该参数已在 `MockNavigationController`\
  \ 中定义。\n\n应用程序中的其余控制器也包含类似的单元测试，正如你在项目代码中所见。\n\n\n\n### 视图测试\n\n在 `Views` 中，我们要测试的是不同组件是否显示了正确的信息，以及用户交互是否产生了预期结果。\n\
  \n例如，对于 `HomeView`，我们有一个按钮用于进入添加任务列表界面。因此，我们将测试该按钮是否以 `addListAction` 方法作为其目标（列表\
  \ 2-35）。\n\n```\nfunc testButtonAction_whenAddListButtonIsTapped_shouldBeCalledAddListAction()\
  \ {\n    let addListButton = sut.addListButton\n    XCTAssertNotNil(addListButton,\
  \ \"UIButton does not exist\")\n    guard let addListButtonAction = addListButton.actions(forTarget:\
  \ sut, forControlEvent: .touchUpInside) else {\n        XCTFail(\"Not actions assigned\
  \ for .touchUpInside\")\n        return\n    }\n    XCTAssertTrue(addListButtonAction.contains(\"\
  addListAction\"))\n}\n```\n\n*列表 2-35* – `HomeView` 的 `addListButton` 测试代码\n\n我们在测试中所做的是，首先检查按钮是否存在，然后检查它是否关联了一个方法，并且该方法是\
  \ `addListAction`。\n\n在 `HomeView` 中，还有一个用于显示用户创建的任务列表的表格。表格带有多种方法，我们都需要进行测试。因此，例如，如果在\
  \ `setUpWithError` 方法中我们在数据库中创建了一个列表，我们必须验证该列表有一行，该行显示了一个单元格，或者，当我们删除该列表时，列表数量不为零（列表\
  \ 2-36）。\n\n```\n// UITableView 有一行\nfunc testTableView_whenModelHasAList_shouldBeOneRow()\
  \ {\n    XCTAssertEqual(sut.tableView.numberOfRows(inSection: 0), 1)\n}\n\n// 在\
  \ IndexPath(row: 0, section: 0) 处的 UITableView 有一个 UITableViewCell\nfunc testTableView_whenModelHasAList_shoulBeACellAtIndexPath()\
  \ {\n    let indexPath = IndexPath(row: 0, section: 0)\n    let cell = sut.tableView.dataSource?.tableView(sut.tableView,\
  \ cellForRowAt: indexPath)\n    XCTAssertNotNil(cell)\n}\n\n// 在 TasksList 对象被删除后，tasksList\
  \ 包含 0 个元素\nfunc testTableView_whenListIsDeleted_shouldBeNoneOnModel() {\n    let\
  \ indexPath = IndexPath(row: 0, section: 0)\n    sut.tableView.dataSource?.tableView?(sut.tableView,\
  \ commit: .delete, forRowAt: indexPath)\n    XCTAssertEqual(sut.tasksList.count,\
  \ 0)\n}\n```\n\n*列表 2-36* – 用于 `UITableView` 方法的测试\n\n---\n\n## 总结\n\n模型-视图-控制器架构可能是最常用的，也是开始开发应用程序时通常首先使用的架构，因为它最简单。\n\
  \nMVC 有清晰的职责分离（模型、视图和控制器），尽管很多时候视图与控制器紧密耦合，这降低了其可重用性。这使得在没有视图干预的情况下测试控制器变得更加困难。\n\
  \n另一方面，必须注意不要使控制器过载，因为作为 MVC 的核心部分，通常会将职责添加到其中，例如业务逻辑、导航到其他屏幕、视图本身及其组件。\n\n在我们开发的应用程序示例中，由于它是一个相当简单的应用程序，所以控制器很小，但想想如果我们开始添加额外的功能会发生什么。因此，最好采取一些有助于减小其规模的措施（其中一些我们已经应用了）：\n\
  \n-   将视图代码移动到其自己的类中，并在控制器本身中保留一个引用。\n-   将所有与数据相关的内容（例如获取和处理数据，或数据排序）传递给模型。\n-\
  \   通过协调器管理屏幕之间的导航。\n\n从现在开始，我们将看到更复杂的架构，这些架构旨在解决 MVC 可能存在的问题，并且其中展示的一些解决方案可以迁移到这种架构中。\n\
  \n---\n\n"
- "# 3. MVP：模型-视图-展示器\n\n## 什么是 MVP？\n\n### 一点历史\n\n模型-视图-展示器模式源于我们在前一章中看到的模型-视图-控制器模式。它是在\
  \ 20 世纪 90 年代早期，由软件公司 Taligent（由苹果、IBM 和惠普共同拥有）开发的。^(⁵)\n\n### 它是如何工作的\n\nMVP 模式由三个组件组成：模型、视图和展示器，其中展示器充当模型和视图（`UIViewController`\
  \ + `View`）之间的中介，连接方式如图 3-1 所示。\n\n![](img/531999_1_En_3_Fig1_HTML.jpg)\n\n*一个由展示器、视图和模型组成的示意图。它们通过用户操作、更新和通知进行连接。*\n\
  \n**图 3-1** – 模型-视图-展示器示意图\n\n### MVP 中的组件\n\n现在我们更详细地看一下 MVP 模式中这三个组件的特性。\n\n#####\
  \ 模型\n\n与 MVC 模式相同，模型是负责业务逻辑以及存储、操作和访问应用程序数据的组件（或多个组件）：\n\n-   它包含与数据持久化相关的类。\n\
  -   它包含控制应用程序通信的类。\n-   它负责将从外部接收的信息转换为模型对象。\n-   它包含扩展、常量……\n-   在 MVP 中，模型层只能与展示器层通信（即，模型不知道视图的存在）。\n\
  \n因此，例如，当用户与视图交互时，这种交互通过展示器传递给模型。同样，如果模型被更新并且需要更新视图，那么展示器将负责更新它。\n\n#### 视图\n\n\
  在 MVP 模型中，视图层同时包含视图（`UIView`）和控制器（`UIViewController`）组件，这与 MVC 模式不同，在 MVC 中我们将它们放在不同的层。\n\
  \n此外，在 MVP 模式中，视图和控制器存储的逻辑都比 MVC 模型少得多，这使得它们更轻量。\n\n现在，控制器仅具有协调/路由功能，负责处理屏幕之间的导航，并在必要时通过委托模式传递信息。\n\
  \n在 MVP 中，控制器负责实例化视图并将其传递给展示器（列表 3-1）。\n\n```\nclass ExampleController: UIViewController\
  \ {\n    private var exampleView = ExampleView()\n    ...\n    override func loadView()\
  \ {\n        super.loadView()\n        setupExampleView()\n    }\n\n    private\
  \ func setupExampleView() {\n        let presenter = ExamplePresenter(exampleView:\
  \ ExampleView)\n        exampleView.presenter = presenter\n        exampleView.setupView()\n\
  \        self.view = exampleView\n    }\n}\n```\n\n*列表 3-1* – 展示器和视图实例化；将视图传递给展示器\n\
  \n"
- "# 展示器\n\n展示器负责接收视图中发生的事件并将其传递给模型。另一方面，展示器也负责在数据更改时更新视图。\n\n为了进一步解耦，我们不会直接将视图传递给展示器，而是创建一个包含展示器用于更新视图的方法的协议（列表\
  \ 3-2）。\n\n```\nprotocol ExampleViewDelegate: AnyObject {\n    func updateView()\n\
  }\n\nclass ExamplePresenter {\n    private weak var exampleView: ExampleViewDelegate?\n\
  \n    init(exampleView: ExampleViewDelegate? = nil) {\n        self.exampleView\
  \ = exampleView\n    }\n    ...\n}\n```\n\n*列表 3-2* – 在 `init` 方法中将视图传递给展示器\n\n\
  ### MVP 的优点和缺点\n\nMVP 模型比 MVC 模型稍微复杂一些，因为引入了一个新元素——展示器，因此需要稍多一点的开发经验。\n\n下面，您可以看到这种架构最重要的优点和缺点。\n\
  \n\n#### 优势\n\nMVP 架构的主要优势如下：\n\n-   尽管它比 MVC 稍微复杂一些，但它源于 MVC，因此我们可以在短时间内适应它的工作方式。\n\
  -   与 MVC 模式相比，它呈现出更好的职责分离。\n-   业务逻辑可以更好地进行测试。\n\n#### 劣势\n\n主要劣势如下：\n\n-   由于比\
  \ MVC 更复杂，通常不建议在小型和简单的应用程序中使用。\n-   尽管我们进一步模块化了架构，但仍然存在一些问题，例如 Controller 仍然处理屏幕间的导航。这可以通过引入\
  \ Router 或 Coordinator 来处理该任务来解决。\n-   就像在 MVC 中 Controller 可能变得臃肿一样，在 MVP 中，Presenter\
  \ 也可能遇到同样的问题。\n\n## MVP 应用\n\n了解了 MVP 架构的特性后，我们将把它应用到应用程序的开发中。\n\n> **注意**  \n>\
  \ 整个项目可以从本书的代码仓库下载。在解释如何在项目中实现 MVP 架构时，我们将仅展示代码中最相关的部分。\n\n### MVP 层\n\n为了遵循所应用的架构模式（Model–View–Presenter）的逻辑，我们将创建一个模拟其各层的文件夹结构（图\
  \ 3-2）。\n\n![一个屏幕截图显示了 MVP 项目文件夹及其组件。](img/531999_1_En_3_Fig2_HTML.jpg)  \n**图 3-2**\
  \ MVP 项目文件夹结构\n\n#### Model\n\n与 MVC 架构相同，此文件夹包含与业务逻辑、数据访问及其操作相关的所有内容。它包含与 MVC 案例中相同的文件（图\
  \ 3-3）。\n\n![一个屏幕截图显示了 MVP 项目文件夹及其组件以及模型层文件。](img/531999_1_En_3_Fig3_HTML.jpg) \
  \ \n**图 3-3** 模型层文件\n\n然而，在 MVC 架构中，模型产生的变化会通知给 Controller（使用观察者模式），而在 MVP 架构中，这些变化会通知给\
  \ Presenter（即 Presenter 必须订阅这些变化）。\n\n与 MVC 架构中我们在 Controller 的`viewDidLoad`方法中添加观察者不同，在\
  \ MVP 架构中，我们将在 Presenter 的`init`方法中添加它（列表 3-3）。\n\n```init\ninit() {\n    NotificationCenter.default.addObserver(self,\n\
  \        selector: #selector(contextObjectsDidChange),\n        name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
  \        object: CoreDataManager.shared.mainContext)\n}\n@objc func contextObjectsDidChange()\
  \ {\n    updateView()\n}\n```\n**列表 3-3** 在 Presenter 初始化时设置观察者\n\n##### Core Data\n\
  \n在此文件夹中，我们将放置 `CoreDataManager.swift` 文件（我们在第 1 章中创建），以及由 Xcode 为数据库实体自动创建的四个文件。\n\
  \n##### Models\n\n如第 2 章所述，这里存放的是我们可以从数据库实体转换而来的模型。此外，我们将创建一个模型必须遵守的协议，以便在模型和实体之间相互转换。\n\
  \n##### Services\n\n这里我们将放置允许我们向数据库发送信息（创建、更新或删除）或从数据库检索信息并将其转换为模型的类。\n\n##### Extensions\n\
  \n在这种情况下，我们创建了一个 `UIColor` 扩展，以便能够轻松访问为此应用程序专门创建的颜色，以及一个 `NSManagedObject` 类的扩展，这将防止我们在进行测试部分时出现上下文冲突。\n\
  \n##### Constants\n\n它们包含我们将在应用程序中使用的常量参数。\n\n#### View\n\n在 View 文件夹中，我们不仅会有 View\
  \ 文件及其构成的组件（如同在 MVC 中），还会有 Controller 文件（`UIViewController`的子类），如图 3-4 所示。\n\n![一个\
  \ MVP 项目文件夹及其组件与视图层文件的屏幕截图。](img/531999_1_En_3_Fig4_HTML.png)  \n**图 3-4** 视图层文件\n\
  \n请记住，在 MVP 中，Controllers 通常只具有协调/路由功能（用于屏幕间导航），并且在某些情况下传递信息（例如，通过委托模式）。\n\n####\
  \ Presenter\n\n此文件夹仅包含 Presenters，正如我们所见，它们连接 Model 和 View（图 3-5）。\n\n![MVP 项目 Presenter\
  \ 层文件的屏幕截图。](img/531999_1_En_3_Fig5_HTML.jpg)  \n**图 3-5** Presenter 层文件\n\n###\
  \ MyToDos 应用程序屏幕\n\n正如我们刚才提到的，在 MVP 架构中，与 MVC 不同，Presenter 负责业务逻辑（将导航任务留给 Controller）。\n\
  \n接下来，我们将针对我们应用程序的每个不同屏幕，了解如何将不同层连接起来：Model、View（+`UIViewController`）和 Presenter。\n\
  \n#### AppDelegate 和 SceneDelegate\n\n正如我们在第 2 章中看到的，`AppDelegate` 和 `SceneDelegate`\
  \ 负责管理应用程序的生命周期以及屏幕上显示什么及如何显示。\n\n在我们的案例中，我们只会修改 `SceneDelegate`，它将负责创建一个新的 `UIWindow`，配置应用程序的根视图控制器，并最终使创建的\
  \ `UIWindow` 成为关键窗口。\n\n与我们研究 MVC 时不同（我们将 `HomeViewController` 的实例传递给 `UINavigationController`\
  \ 组件，该组件在初始化时需要将依赖项传递给 `TasksListService` 和 `TaskService` 服务），现在 `HomeViewController`\
  \ 不需要它们，因为稍后我们将看到，这些依赖项将由 `HomePresenter` 组件持有。\n\n```\nfunc scene(_ scene: UIScene,\
  \ willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
  \ {\n    if let windowScene = scene as? UIWindowScene {\n        let window = UIWindow(windowScene:\
  \ windowScene)\n        let navigationController = UINavigationController(rootViewController:\
  \ HomeViewController())\n        navigationController.navigationBar.isHidden = true\n\
  \        navigationController.interactivePopGestureRecognizer?.isEnabled = false\n\
  \        window.backgroundColor = .white\n        window.rootViewController = navigationController\n\
  \        self.window = window\n        window.makeKeyAndVisible()\n    }\n}\n```\n\
  \n#### 首页屏幕\n\n在首页屏幕上，主要组件是 Presenter，它负责将信息传递给 Model 并订阅其变化通知。此外，它还负责接收 View 中的用户交互，并使用从\
  \ Model 接收到的信息更新 View。\n\nView 与 Controller 是分离的，其某些操作（例如导航到另一个屏幕）委托给 Controller（图\
  \ 3-6）。\n\n![一个流程图展示了首页屏幕组件，包括首页视图控制器、首页视图、首页 presenter 以及任务列表服务等。](img/531999_1_En_3_Fig6_HTML.png)\
  \  \n**图 3-6** 首页屏幕组件通信示意图\n\n\n### HomeController\n\n关于 MVC 架构，在 MVP 架构中，`HomeController`已经失去了与\
  \ Model 层的关联。现在，它一方面负责实例化`HomeView`并将其传递给`HomePresenter`（正如我们所看到的，我们将以协议形式传递该 Presenter，并附带其必须使用的方法）（代码清单\
  \ 3-4）。\n\n```swift\nclass HomeViewController: UIViewController {\n    private var\
  \ homeView = HomeView()\n    ...\n    override func loadView() {\n        super.loadView()\n\
  \        setupHomeView()\n    }\n\n    private func setupHomeView() {\n        let\
  \ presenter = HomePresenter(homeView: homeView, tasksListService: TasksListService())\n\
  \        homeView.delegate = self\n        homeView.presenter = presenter\n    \
  \    homeView.setupView()\n        self.view = homeView\n    }\n}\n代码清单 3-4\n在 HomeViewController\
  \ 中实例化 HomePresenter\n```\n\n另一方面，`HomeViewController`还负责处理屏幕间的路由跳转（在`HomeView`中，用户可以选择访问列表或创建新列表，这些导航操作会委托给`HomeViewController`），如代码清单\
  \ 3-5 所示。\n\n```swift\nextension HomeViewController: HomeViewControllerDelegate\
  \ {\n    func addList() {\n        navigationController?.pushViewController(AddListViewController(),\
  \ animated: true)\n    }\n\n    func selectedList(_ list: TasksListModel) {\n  \
  \      let taskViewController = TaskListViewController(tasksListModel: list)\n \
  \       navigationController?.pushViewController(taskViewController, animated: true)\n\
  \    }\n}\n代码清单 3-5\n实现 HomeViewControllerDelegate 的方法\n```\n\n##### HomeView\n\n\
  现在，`HomeView`从`HomePresenter`接收需要显示的信息。这一点体现在填充已创建任务列表的表格，或是实现`HomeViewDelegate`时（代码清单\
  \ 3-6）。\n\n```swift\nextension HomeView: UITableViewDataSource {\n    ...\n    func\
  \ tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) -> Int\
  \ {\n        return presenter.numberOfTaskLists\n    }\n\n    func tableView(_ tableView:\
  \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n       \
  \ let cell = tableView.dequeueReusableCell(withIdentifier: ToDoListCell.reuseId,\
  \ for: indexPath) as! ToDoListCell\n        cell.setCellParametersForList(presenter.listAtIndex(indexPath.row))\n\
  \        return cell\n    }\n\n    func tableView(_ tableView: UITableView, commit\
  \ editingStyle: UITableViewCell.EditingStyle, forRowAt indexPath: IndexPath) {\n\
  \        if editingStyle == .delete {\n            presenter.removeListAtIndex(indexPath.row)\n\
  \            tableView.deleteRows(at: [indexPath], with: .automatic)\n        }\n\
  \    }\n}\n\nextension HomeView: HomeViewDelegate {\n    func reloadData() {\n \
  \       tableView.reloadData()\n        emptyState.isHidden = presenter.numberOfTaskLists\
  \ > 0\n    }\n}\n代码清单 3-6\n在 HomeView 中设置任务列表表格\n```\n\n另一方面，它将需要在应用程序内进行导航的操作（例如选择并访问某个任务列表，或创建新列表）委托给\
  \ Controller 处理（代码清单 3-7）。\n\n```swift\nextension HomeView: UITableViewDelegate\
  \ {\n    ...\n    func tableView(_ tableView: UITableView, didSelectRowAt indexPath:\
  \ IndexPath) {\n        delegate?.selectedList(presenter.listAtIndex(indexPath.row))\n\
  \    }\n}\n\nprivate extension HomeView {\n    ...\n    @objc func addListAction()\
  \ {\n        delegate?.addList()\n    }\n    ...\n}\n代码清单 3-7\nHomeView 将导航方法委托给\
  \ HomeViewController\n```\n\n### HomePresenter\n\nPresenter 负责充当 View 和 Model 之间的中介。因此，在初始化\
  \ `HomePresenter` 时，我们传递了对 View（以协议形式存在的 `HomeView`）和 Model（`TaskListService`）的引用。通过\
  \ `TaskListService` 访问 Model，使我们既能获取想要展示的信息（任务列表），也能删除选中的列表。\n\n为了知晓数据库何时发生变化，从而更新视图，我们在\
  \ `HomePresenter` 的初始化中还引入了一个观察者，如代码清单 3-8 所示。\n\n```swift\nclass HomePresenter\
  \ {\n    private weak var homeView: HomeViewDelegate?\n    private var tasksListService:\
  \ TasksListService!\n    private var lists: [TasksListModel] = [TasksListModel]()\n\
  \n    init(homeView: HomeViewDelegate? = nil,\n         tasksListService: TasksListService)\
  \ {\n        self.homeView = homeView\n        self.tasksListService = tasksListService\n\
  \        NotificationCenter.default.addObserver(self,\n                        \
  \                       selector: #selector(contextObjectsDidChange),\n        \
  \                                       name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
  \                                               object: CoreDataManager.shared.mainContext)\n\
  \    }\n\n    @objc func contextObjectsDidChange() {\n        fetchTasksLists()\n\
  \    }\n\n    func fetchTasksLists() {\n        lists = tasksListService.fetchLists()\n\
  \        homeView?.reloadData()\n    }\n\n    var numberOfTaskLists: Int {\n   \
  \     return lists.count\n    }\n\n    func listAtIndex(_ index: Int) -> TasksListModel\
  \ {\n        return lists[index]\n    }\n    ...\n}\n代码清单 3-8\nHomePresenter 初始化\n\
  ```\n\n当观察者收到数据库已更改的通知时，会触发 `contextObjectsDidChange` 事件（该事件会调用 `fetchTasksLists`\
  \ 事件），从而更新 `HomePresenter` 中有关待显示任务列表的信息，随后调用 `HomeView` 的 `reloadData` 方法。\n\n\
  如果用户想要删除一个任务列表，`HomeView` 会将此操作传递给 `HomePresenter`，而 `HomePresenter` 将负责将此操作传达给\
  \ Model（代码清单 3-9）。\n\n```swift\nclass HomePresenter {\n    ...\n    func removeListAtIndex(_\
  \ index: Int) {\n        let list = listAtIndex(index)\n        tasksListService.deleteList(list)\n\
  \        lists.remove(at: index)\n    }\n}\n代码清单 3-9\nHomePresenter 与 Model 通信以删除列表\n\
  ```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n### 添加列表屏幕\n\
  \n此屏幕负责添加任务列表及其组件之间的通信。不同组件之间的连接如图 3-7 所示。\n\n![](img/531999_1_En_3_Fig7_HTML.png)\n\
  \n添加列表屏幕组件的流程图由 `AddListViewController`、`AddListView`、`AddListPresenter` 和 `TaskListService`\
  \ 组成。\n\n**图 3-7** 添加列表屏幕组件通信示意图\n\n### AddListViewController\n\n与我们之前在 `HomeViewController`\
  \ 中所做的方式相同，`AddListViewController` 类负责初始化 Presenter 并将其传递给视图（列表 3-10）。\n\n```swift\n\
  private func setupAddListView() {\n    let presenter = AddListPresenter(addListView:\
  \ addListView, tasksListService: TasksListService())\n    addListView.delegate =\
  \ self\n    addListView.presenter = presenter\n    self.view = addListView\n}\n\
  ```\n\n**列表 3-10** 在 `AddListViewController` 中实例化 `AddListPresenter`\n\n一旦列表创建完成，或者用户通过后退按钮操作，它就会导航回主屏幕（`AddListView`\
  \ 已委托此操作，如列表 3-11 所示）。\n\n```swift\nextension AddListViewController: BackButtonDelegate\
