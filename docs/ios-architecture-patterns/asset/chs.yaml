  \        ...\n    }\n    ...\n}\n代码清单 4-49\n在 addList 和 dismiss 输入中使用 Coordinator\n\
  ```\n\n现在，我们只需要修改`TaskListView`中用于将`addTaskButton`和`backButton`的操作与`TaskListViewModel`关联起来的代码。我们现在将它们直接绑定到创建的输入上，从而消除对调用`TaskListViewController`来执行相应导航的代理（delegate）的使用（代码清单\
  \ 4-50）。\n\n```\naddTaskButton.rx.tap\n    .bind(to: viewModel.input.addTask)\n\
  \    .disposed(by: disposeBag)\nbackButton.rx.tap\n    .bind(to: viewModel.input.dismiss)\n\
  \    .disposed(by: disposeBag)\n代码清单 4-50\n设置 addList 和 dismiss 输入参数的绑定\n```\n\n\
  #### 添加任务界面\n\n此界面仅提供一种导航流程：添加任务时关闭界面。也就是说，我们需要向 Coordinator 添加一个`dismiss`方法（代码清单\
  \ 4-51）。\n\n```\nprotocol AddTaskCoordinatorProtocol {\n    func dismiss()\n}\n\
  class AddTaskCoordinator: Coordinator, AddTaskCoordinatorProtocol {\n    var navigationController:\
  \ UINavigationController\n    var tasksList: TasksListModel!\n    init(navigationController:\
  \ UINavigationController, tasksList: TasksListModel) {\n        self.navigationController\
  \ = navigationController\n        self.tasksList = tasksList\n    }\n    func start()\
  \ {\n        let viewModel = AddTaskViewModel(tasksListModel: tasksList, taskService:\
  \ TaskService(),\n                                         coordinator: self)\n\
  \        navigationController.present(AddTaskViewController(viewModel: viewModel),\
  \ animated: true)\n    }\n    func dismiss() {\n        navigationController.dismiss(animated:\
  \ true)\n    }\n}\n代码清单 4-51\nAddTaskCoordinatorProtocol 和 AddTaskCoordinator 代码\n\
  ```\n\n通过从`AddListViewController`中移除导航，你的代码将如下所示（代码清单 4-52）。\n\n```\nclass AddTaskViewController:\
  \ UIViewController {\n    private var addTaskView: AddTaskView!\n    private var\
  \ viewModel: AddTaskViewModel!\n    init(viewModel: AddTaskViewModel) {\n      \
  \  super.init(nibName: nil, bundle: nil)\n        self.viewModel = viewModel\n \
  \   }\n    ...\n    private func setupAddTaskView() {\n        addTaskView = AddTaskView(viewModel:\
  \ viewModel)\n        self.view = addTaskView\n    }\n}\n代码清单 4-52\nAddListViewController\
  \ 代码\n```\n\n在`AddTaskViewModel`中，当集成 Coordinator 时，我们将不需要生成一个告诉`AddTaskView`它应该关闭视图的输出，因此我们将移除`AddTaskViewModel`的输出以及`AddTaskView`中的`viewModel.output.dismiss`（代码清单\
  \ 4-53）。\n\n```\nclass AddTaskViewModel {\n    var input: Input!\n    var coordinator:\
  \ AddTaskCoordinatorProtocol!\n    struct Input {\n        ...\n        let addTask:\
  \ PublishRelay\n    }\n    private var tasksListModel: TasksListModel!\n    private\
  \ var taskService: TaskServiceProtocol!\n    private(set) var task: TaskModel!\n\
  \    init(tasksListModel: TasksListModel,\n         taskService: TaskServiceProtocol,\n\
  \         coordinator: AddTaskCoordinatorProtocol) {\n        self.tasksListModel\
  \ = tasksListModel\n        self.taskService = taskService\n        self.coordinator\
  \ = coordinator\n        self.task = TaskModel(id: ProcessInfo().globallyUniqueString,\n\
  \                              icon: \"checkmark.seal.fill\",\n                \
  \              done: false,\n                              createdAt: Date())\n\
  \        // Inputs\n        ...\n        let addTask = PublishRelay()\n        _\
  \ = addTask.subscribe(onNext: { [self] _ in\n            taskService.saveTask(task,\
  \ in: tasksListModel)\n            coordinator.dismiss()\n        })\n        input\
  \ = Input(icon: icon, title: title, addTask: addTask)\n    }\n}\n代码清单 4-53\n在 AddTaskViewModel\
  \ 中使用 Coordinator 来关闭界面\n```\n\n\n\n## 总结\n\n与我们在 MVP 架构中的做法类似，在 MVVM 架构中，我们已将业务逻辑从\
  \ Controller 中解放出来，并将其传递给 ViewModel。但与 MVP 架构不同的是，ViewModel 并不知道 View 的存在，这实现了进一步的解耦。\n\
  \n在本章末尾，我们还了解了如何通过将所有导航逻辑传递给一个新的类 Coordinator，来进一步减少 Controller 中的代码。这使得 Controller\
  \ 可以被复用。\n\n一方面，如果我们在开发一个小型应用（或者仅仅是在制作应用原型），数据绑定过程可能会显得过于繁琐；另一方面，使用像 RxSwift 这样的库可能会增加应用的大小并影响其性能，此外，要熟练运用它们还需要一定的学习曲线。\n\
  \n尽管如此，MVVM（以及 MVVM-C）架构凭借其职责分离的特性以及易用性，仍然拥有众多拥趸。\n\n在下一章中，我们将介绍 VIPER 架构，这种架构正得到越来越广泛的应用。它完全遵循\
  \ SOLID 原则和职责分离，使得应用更加模块化，代码更清晰，且更易于维护。\n\n脚注 1 2 3 4 5\n\n"
- '# 5. VIPER：视图-交互器-展示器-实体-路由器


  ## 什么是 VIPER？


  ### 一点历史


  VIPER 由 Jeff Gilbert 和 Conrad Stoll 于 2014 年提出，它是首次尝试应用整洁架构（我们在第 1 章中介绍过）的实践，创建了一系列组件，每个组件都承担着独一无二的职责。^(¹¹)


  VIPER 是 View（视图）、Interactor（交互器）、Presenter（展示器）、Entity（实体）和 Router（路由器）的首字母缩写，其目标是将一个功能或实现划分为五个不同的层级，并汇集在一个模块内（图
  5-1）。


  ### 工作原理


  使用这些组件使我们能够在应用程序内分离职责，从而遵循单一职责原则。此外，由于我们在各层之间使用协议（接口）进行通信，因此也遵循了接口隔离原则。


  ![](img/531999_1_En_5_Fig1_HTML.png)


  VIPER 模式的流程图包含视图、交互器、展示器、实体和路由器。


  图 5-1 VIPER 模式


  ### VIPER 中的组件


  现在我们来详细了解该架构中的每个组件。


  #### 视图


  视图，包含 `UIViewController`：


  *   它不包含任何逻辑，仅由被动元素组成：按钮、标签、视图……

  *   它将用户交互发送给展示器。

  *   它知道如何展示从展示器接收到的信息。

  *   它不会向展示器请求信息，而是由展示器在需要更新视图时主动发送信息。


  '
- '# 交互器


  交互器是包含业务逻辑的组件：


  *   它负责从数据库、服务器等处接收信息（模型）。

  *   它独立于视图。

  *   它接收来自展示器的动作，经过信息处理后，通过委托（委托模式）将结果返回给展示器。

  *   交互器绝不会将实体发送给展示器。


  '
- '# 展示器


  展示器是 VIPER 架构的核心：


  *   它充当不同组件之间的连接纽带。

  *   它从视图接收用户交互，并包含处理这些交互的逻辑，以及向交互器请求信息。

  *   它以简单数据结构的形式（而非实体）接收来自交互器的信息。

  *   它不知道视图由哪些组件构成，但知道应该显示什么内容以及何时显示。

  *   它负责以最高效的方式将信息传递给视图。

  *   它通过路由器处理导航到其他屏幕的逻辑。


  #### 实体


  关于实体：


  *   它们是简单的对象模型。

  *   通常是数据结构（`struct`）。

  *   唯一能与实体打交道的组件是交互器。


  '
- "# 路由器\n\n路由器在屏幕创建和导航方面承担多项职责：\n\n*   它负责创建屏幕（`UIViewController`）。\n*   它负责管理从一个屏幕到另一个屏幕的导航（包含导航逻辑）。\n\
  *   它拥有 `UINavigationController` 和 `UIViewController` 的所有权。\n*   它类似于我们在第 4 章末尾\
  \ MVVM-C 架构中提到的 Coordinator。\n\n### VIPER 的优缺点\n\n在开发项目时，VIPER 架构因其追求“整洁架构”而具有许多优点，但也存在一些缺点。\n\
  \n### 优点\n\nVIPER 架构的主要优点如下：\n\n*   由于将单一职责原则（SRP）作为基本原则，代码更加整洁。\n*   代码耦合度更低。\n\
  *   由于这些特性，编写单元测试更加简单。\n*   开发代码时抽象程度更高，因此更容易添加新功能并扩展产品规模。\n*   层级之间的职责分离意味着，例如，交互器只包含业务逻辑，完全独立于视图，这使得编写自动化测试更加容易。\n\
  *   由于业务逻辑被隔离等特性，它被认为是处理复杂应用程序时非常有用的架构。\n*   由于使用具有明确定义通信接口的独立模块，我们可以将项目的开发工作分配给多个团队。\n\
  \n### 缺点\n\nVIPER 架构的主要缺点如下：\n\n*   每个模块包含如此多的类：视图、交互器、展示器、实体、路由器……导致项目最终拥有大量的代码和类。\n\
  *   必须编写大量的样板代码。\n*   它通常不适用于那些不打算扩展新功能的小型应用。\n*   学习 VIPER 起初可能令人生畏，尤其是对于新手开发者。\n\
  *   为了便于模块复用，最好不要使用 Segue 进行屏幕间导航。\n\n## VIPER 应用\n\n了解了 VIPER 架构的特点后，我们将在开发应用程序时应用它们。\n\
  \n注意\n\n整个项目可以从本书的代码仓库中下载。在解释如何将 VIPER 架构应用于我们的项目时，我们只会展示代码中最相关的部分。\n\n### 组件之间的通信\n\
  \n正如我们所解释的，该架构中不同组件之间的通信是通过协议进行的。我们可以根据与展示器相关的数据流（`Input`/`Output`）来定义每一个协议，然后将其应用于相应的组件。\n\
  \n\n\n### 展示层与视图之间的通信\n\n我们将为 `Presenter` 和 `View` 建立两个协议：一个用于 `Presenter` 的输入，一个用于\
  \ `Presenter` 的输出（列表 5-1）。\n\n```swift\n// MARK: 视图输入 (视图 -> 展示层)\nprotocol ViewToPresenterProtocol\
  \ {\n    var view: PresenterToViewProtocol? { get set }\n    var interactor: PresenterToInteractorProtocol?\
  \ { get set }\n    var router: PresenterToRouterProtocol? { get set }\n}\n\n// MARK:\
  \ 视图输出 (展示层 -> 视图)\nprotocol PresenterToViewProtocol { }\n```\n\n*列表 5-1 展示层相对于视图的输入/输出协议*\n\
  \n开发 `Presenter` 时，我们将使其遵循视图相对于展示层的输入协议（`View` -> `Presenter`）。该协议包含三个重要参数，这些参数将其与\
  \ `View`、`Interactor` 和 `Router` 绑定（列表 5-2）。\n\n```swift\nclass Presenter: ViewToPresenterProtocol\
  \ {\n    var view: PresenterToViewProtocol?\n    var interactor: PresenterToInteractProtocol?\n\
  \    var router: PresenterToRouterProtocol?\n    ...\n}\n```\n\n*列表 5-2 展示层与视图之间输入协议的应用*\n\
  \n另一方面，开发 `View` 时，我们将使其符合展示层到视图的输出协议（`Presenter` -> `View`）。为了组织代码，我们可以将其作为扩展来应用（列表\
  \ 5-3）。\n\n```swift\nextension ViewController: PresenterToViewProtocol { }\n```\n\
  \n*列表 5-3 展示层与视图之间输出协议的应用*\n\n### 展示层与交互器之间的通信\n\n我们将为 `Presenter` 和 `Interactor`\
  \ 建立两个协议：一个用于 `Presenter` 的输入，一个用于 `Presenter` 的输出（列表 5-4）。\n\n```swift\n// MARK:\
  \ 交互器输入 (展示层 -> 交互器)\nprotocol PresenterToInteractorHomeProtocol {\n    var presenter:\
  \ InteractorToPresenterProtocol? { get set }\n}\n\n// MARK: 交互器输出 (交互器 -> 展示层)\n\
  protocol InteractorToPresenterProtocol: AnyObject { }\n```\n\n*列表 5-4 展示层相对于交互器的输入/输出协议*\n\
  \n开发 `Presenter` 时，我们将使其遵循从 `Presenter` 到 `Interactor` 的输出协议（通过扩展）（列表 5-5）。\n\n\
  ```swift\nextension Presenter: InteractorToPresenterProtocol { }\n```\n\n*列表 5-5\
  \ 展示层与交互器之间输出协议的应用*\n\n另一方面，开发 `Interactor` 时，必须使其符合 `Presenter` 与 `Interactor`\
  \ 之间的输入协议（列表 5-6）。\n\n```swift\nclass Interactor: PresenterToInteractorHomeProtocol\
  \ {\n    var presenter: InteractorToPresenterHomeProtocol?\n    ...\n}\n```\n\n\
  *列表 5-6 展示层与交互器之间输出协议的应用*\n\n### 展示层与路由器之间的通信\n\n`Presenter` 和 `Router` 之间的通信是单向的，因此我们只需在\
  \ `Presenter` 和 `Router` 之间建立一个输入协议。\n\n该协议包含主要方法 `createScreen()`，它允许我们创建 `UIViewController`（`View`）（列表\
  \ 5-7）。\n\n```swift\n// MARK: 路由器输入 (展示层 -> 路由器)\nprotocol PresenterToRouterProtocol\
  \ {\n    func createScreen() -> UIViewController\n}\n```\n\n*列表 5-7 展示层相对于路由器的输入协议*\n\
  \n该协议将是 `Router` 必须遵循的协议（列表 5-8）。\n\n```swift\nclass Router: PresenterToRouterProtocol\
  \ {\n    static func createScreen() -> UIViewController {\n        let presenter:\
  \ ViewToPresenterProtocol & InteractorToPresenterProtocol = Presenter()\n      \
  \  let viewController = ViewController()\n        viewController.presenter = presenter\n\
  \        viewController.presenter.router = Router()\n        viewController.presenter?.view\
  \ = viewController\n        viewController.presenter?.interactor = Interactor()\n\
  \        viewController.presenter?.interactor?.presenter = presenter\n        return\
  \ viewController\n    }\n}\n```\n\n*列表 5-8 展示层与路由器之间输出协议的应用*\n\n我们为这些协议展示的内容是基础内容，之后我们需要根据每个屏幕的需求对其进行完善（某些情况下可能需修改）。\n\
  \n## VIPER 分层\n\n与之前按功能（视图、展示层、视图模型...）组织文件的架构不同，在 VIPER 中，我们将按模块划分文件，每个屏幕一个模块，其中包含协议、视图、交互器的引入和路由器；用于与数据库通信的服务；以及最后的组件元素：数据库、UI\
  \ 组件、扩展等（图 5-2）。\n\n![VIPER 文件夹项目结构](img/531999_1_En_5_Fig2_HTML.png)\n\n*图 5-2\
  \ VIPER 文件夹项目结构*\n\n### 模块\n\n正如我们刚才讨论的，`Modules` 文件夹将为每个屏幕包含一个子文件夹。这些子文件夹中的每一个都有五个文件。因此，例如，对于\
  \ `Home` 屏幕，我们将有 `HomeProtocols`、`HomeViewController`、`HomePresenter`、`HomeInteractor`\
  \ 和 `HomeRouter`。\n\n### 服务\n\n这里我们将有 `TaskService` 和 `TasksListService` 类，它们允许我们向数据库发送信息（创建、更新或删除）或从数据库检索信息并将其转换为模型。\n\
  \n### 公共部分\n\n##### Core Data\n\n在此文件夹中，我们将包含 `CoreDataManager.swift` 文件，以及由 Xcode\
  \ 为数据库实体自动创建的四个文件。\n\n### 组件\n\n在此文件夹中，我们将包含在不同屏幕中使用的视觉元素：标签、按钮、单元格等。\n\n##### 模型\n\
  \n这里我们有可以将数据库实体转换成的模型。此外，我们将创建一个模型必须遵循的协议，以便在模型和实体之间进行转换。\n\n##### 扩展\n\n在本例中，我们创建了一个\
  \ `UIColor` 扩展，以便轻松访问为此应用专门创建的颜色；以及一个 `NSManagedObject` 类的扩展，该扩展将防止我们在进行测试部分时与上下文发生冲突。\n\
  \n##### 辅助工具\n\n它们包含我们将要在应用程序中使用的常量参数。\n\n### MyToDos 应用程序屏幕\n\n在使用 VIPER 架构时，不仅要清楚在此架构的每个组件中引入哪些功能，还要在每个组件之间建立适当的通信协议，正如我们之前提到的。\n\
  \n与我们在前几章中看到的架构不同，在本例中，我们将把 `View` 和 `Controller` 的代码合并，以简化开发。\n\n#### AppDelegate\
  \ 和 SceneDelegate\n\n通过在每个屏幕的 `Router` 类中拥有一个实例化配置屏幕所需各类的函数，从 `SceneDelegate` 访问\
  \ `Home` 屏幕的方式比我们之前看到的架构更简化（列表 5-9）。\n\n```swift\nfunc scene(_ scene: UIScene, willConnectTo\
  \ session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
  \ {\n    if let windowScene = scene as? UIWindowScene {\n        let window = UIWindow(windowScene:\
  \ windowScene)\n        window.backgroundColor = .white\n        window.rootViewController\
  \ = HomeRouter.createScreen()\n        self.window = window\n        window.makeKeyAndVisible()\n\
  \    }\n}\n```\n\n*列表 5-9 从 SceneDelegate 访问 Home*\n\n\n\n"
- "# 主屏幕模块\n\n`Home` 模块负责显示主屏幕，并建立与用户的不同交互（图 5-3）。\n\n![](img/531999_1_En_5_Fig3_HTML.png)\n\
  \n该架构由相互连接的主视图控制器、主表现器、主交互器和主路由器组成。\n\n**图 5-3** 主屏幕模块组件通信架构\n\n## 主屏幕协议\n\n根据主屏幕对应模块的图表，以及我们在研究不同组件间通信时看到的示例，我们可以为此案例建立通信接口（协议）。\n\
  \n`Router` 只有一个输入协议；它包含了创建屏幕的静态方法，以及用于 `AddListViewController` 和 `TaskListViewController`\
  \ 的导航方法（代码清单 5-10）。\n\n```\n// MARK: Router Input\nprotocol PresenterToRouterHomeProtocol\
  \ {\nstatic func createScreen() -> UINavigationController\nfunc pushToAddListOn(view:\
  \ PresenterToViewHomeProtocol)\nfunc pushToTaskListOn(view: PresenterToViewHomeProtocol,\
  \ taskList: TasksListModel)\n}\n```\n\n**代码清单 5-10** `PresenterToRouterHomeProtocol`\
  \ 代码\n\n关于 `View` 和 `Presenter`，我们有两个协议：一个用于输入，一个用于输出（针对 `View`）。\n\n输入协议 `ViewToPresenterHomeProtol`\
  \ 使得 `View` 能够与 `Presenter` 通信。基本上，我们将拥有与展示任务列表的表格的构建和操作相关的方法（代码清单 5-11）。\n\n```\n\
  // MARK: View Input\nprotocol ViewToPresenterHomeProtocol {\nvar view: PresenterToViewHomeProtocol?\
  \ { get set }\nvar interactor: PresenterToInteractorHomeProtocol? { get set }\n\
  var router: PresenterToRouterHomeProtocol? { get set }\nfunc viewDidLoad()\nfunc\
  \ numberOfRowsInSection() -> Int\nfunc listAt(indexPath: IndexPath) -> TasksListModel\n\
  func selectRowAt(indexPath: IndexPath)\nfunc deleteRowAt(indexPath: IndexPath)\n\
  func addTaskList()\n}\n```\n\n**代码清单 5-11** `ViewToPresenterHomeProtocol` 代码\n\n\
  另一方面，我们将拥有输出协议 `PresenterToViewHomeProtocol`，它允许 `Presenter` 与 `View` 通信（代码清单 5-12）。\n\
  \n```\n// MARK: View Output\nprotocol PresenterToViewHomeProtocol {\nfunc onFetchLists()\n\
  func showEmptyState()\nfunc hideEmptyState()\n}\n```\n\n**代码清单 5-12** `PresenterToViewHomeProtocol`\
  \ 代码\n\n最后，我们将拥有两个与 `Presenter` 和 `Interactor` 相关的协议。\n\n第一个协议 `PresenterToInteractorHomeProtocol`\
  \ 向我们展示了 `Presenter` 如何与 `Interactor` 通信（代码清单 5-13）。\n\n```\nprotocol PresenterToInteractorHomeProtocol\
  \ {\nvar presenter: InteractorToPresenterHomeProtocol? { get set }\nfunc loadLists()\n\
  func getListAt(indexPath: IndexPath)\nfunc deleteListAt(indexPath: IndexPath)\n\
  }\n```\n\n**代码清单 5-13** `PresenterToInteractorHomeProtocol` 代码\n\n第二个协议 `InteractorToPresenterHomeProtocol`\
  \ 展示了从 `Interactor` 到 `Presenter` 的通信（代码清单 5-14）。\n\n```\nprotocol InteractorToPresenterHomeProtocol\
  \ {\nfunc fetchedLists(taskLists: [TasksListModel])\nfunc selectedList(taskList:\
  \ TasksListModel?)\n}\n```\n\n**代码清单 5-14** `InteractorToPresenterHomeProtocol`\
  \ 代码\n\n这些协议是模块开发的最终成果。现在让我们看看它们从何而来，以及我们如何实现它们。\n\n## HomeRouter\n\n正如我们所见，`HomeRouter`\
  \ 负责实例化主屏幕以及它与其他屏幕之间的导航流程。\n\n对于 `HomeRouter` 类，如代码清单 5-15 所示，它必须采用 `PresenterToRouterHomeProtocol`\
  \ 协议，并实现其所有方法。\n\n```\nclass HomeRouter: PresenterToRouterHomeProtocol {\nstatic\
  \ func createScreen() -> UINavigationController {\nlet presenter: ViewToPresenterHomeProtocol\
  \ & InteractorToPresenterHomeProtocol = HomePresenter()\nlet viewController = HomeViewController()\n\
  viewController.presenter = presenter\nviewController.presenter.router = HomeRouter()\n\
  viewController.presenter?.view = viewController\nviewController.presenter?.interactor\
  \ = HomeInteractor(tasksListService: TasksListService())\nviewController.presenter?.interactor?.presenter\
  \ = presenter\nlet navigationController = UINavigationController(rootViewController:\
  \ viewController)\nnavigationController.interactivePopGestureRecognizer?.isEnabled\
  \ = false\nnavigationController.navigationBar.isHidden = true\nreturn navigationController\n\
  }\nfunc pushToAddListOn(view: PresenterToViewHomeProtocol) {\nlet addListController\
  \ = AddListRouter.createScreen()\nlet viewController = view as! HomeViewController\n\
  viewController.navigationController?\n.pushViewController(addListController, animated:\
  \ true)\n}\nfunc pushToTaskListOn(view: PresenterToViewHomeProtocol, taskList: TasksListModel)\
  \ {\nlet taskListController = TaskListRouter.createScreenFor(list: taskList)\nlet\
  \ viewController = view as! HomeViewController\nviewController.navigationController?\n\
  .pushViewController(taskListController, animated: true)\n}\n}\n```\n\n**代码清单 5-15**\
  \ `HomeRouter` 代码，采用 `PresenterToRouterHomeProtocol`\n\n如您所见，我们有一个创建模块并返回组件（此处为\
  \ `UINavigationController`，因为它是应用程序的主屏幕）的方法。\n\n另外两个方法 `pushToAddListOn` 和 `pushToTaskListOn`\
  \ 分别负责构建并导航至 `AddList` 和 `TasksList` 模块。通过这种方式，我们将导航逻辑与 `UIViewController` 再次分离，将其功能限定在纯粹的视觉层面。\n\
  \n## HomeViewController\n\n`HomeViewController` 类负责构建和显示用户将与之交互的 `View`。由于 `View`\
  \ 与 `Presenter` 交互，我们将拥有一个类型为 `ViewToPresenterHomeProtocol` 的 `presenter` 变量，它允许\
  \ `View` 与 `Presenter` 通信（代码清单 5-16）。\n\n```\nclass HomeViewController: UIViewController\
  \ {\n...\nvar presenter: ViewToPresenterHomeProtocol!\noverride func loadView()\
  \ {\nsuper.loadView()\nsetupHomeView()\npresenter.viewDidLoad()\n}\n...\n}\nprivate\
  \ extension HomeViewController {\n...\n@objc func addListAction() {\npresenter.addTaskList()\n\
  }\n}\nextension HomeViewController: UITableViewDelegate {\n...\nfunc tableView(_\
  \ tableView: UITableView, didSelectRowAt indexPath: IndexPath) {\npresenter.selectRowAt(indexPath:\
  \ indexPath)\n}\n}\nextension HomeViewController: UITableViewDataSource {\n...\n\
  func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->\
  \ Int {\nreturn presenter.numberOfRowsInSection()\n}\nfunc tableView(_ tableView:\
  \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\nlet cell\
  \ = tableView.dequeueReusableCell(withIdentifier: ToDoListCell.reuseId, for: indexPath)\
  \ as! ToDoListCell\ncell.setCellParametersForList(presenter.listAt(indexPath: indexPath))\n\
  return cell\n}\nfunc tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,\
  \ forRowAt indexPath: IndexPath) {\nif editingStyle == .delete {\npresenter.deleteRowAt(indexPath:\
  \ indexPath)\n}\n}\n}\nextension HomeViewController: PresenterToViewHomeProtocol\
  \ {\nfunc onFetchLists() {\ntableView.reloadData()\n}\nfunc showEmptyState() {\n\
  emptyState.isHidden = false\n}\nfunc hideEmptyState() {\nemptyState.isHidden = true\n\
  }\n}\n```\n\n**代码清单 5-16** `HomeViewController` 代码（仅显示与表现器交互的部分）\n\n在代码的最后部分，我们可以看到\
  \ `HomeViewController` 如何采用 `PresenterToViewHomeProtocol` 协议。这是因为，正如我们将看到的，`HomePresenter`\
  \ 通过一个类型为 `PresenterToViewHomeProtocol` 的 `view` 变量与 `HomeViewController` 关联。\n\n\
  \n\n### `HomePresenter`\n\n`HomePresenter`（即`HomeViewPresenter`）绑定到`HomeRouter`、`HomeViewController`和`HomeViewInteractor`。由于`HomePresenter`从`HomeViewController`和`HomeInteractor`接收事件，因此在两个类中都创建了两个`presenter`变量：\n\
  \n```swift\n// HomeViewController.swift\nvar presenter: ViewToPresenterHomeProtocol!\n\
  // HomeInteractor.swift\nvar presenter: InteractorToPresenterHomeProtocol?\n```\n\
  \n因此，`HomePresenter`类需要采用这两个协议才能与这些类通信。\n\n因此，我们可以创建该类并使其符合`ViewToPresenterHomeProtocol`。该协议包含与视图中显示的信息（`numberOfRowsInSection`、`listAt`）或与视图的交互（`selectRowAt`、`deleteRowAt`、`addTaskList`）相关的方法。我们还引入了一个`viewDidLoad`方法，允许我们在进入此屏幕时加载任务列表（清单\
  \ 5-17）。\n\n```swift\nclass HomePresenter: ViewToPresenterHomeProtocol {\n    var\
  \ view: PresenterToViewHomeProtocol?\n    var interactor: PresenterToInteractorHomeProtocol?\n\
  \    var router: PresenterToRouterHomeProtocol?\n    var lists: [TasksListModel]\
  \ = [TasksListModel]()\n\n    func viewDidLoad() {\n        NotificationCenter.default.addObserver(self,\n\
  \            selector: #selector(fetchLists),\n            name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
  \            object: CoreDataManager.shared.mainContext)\n        interactor?.loadLists()\n\
  \    }\n\n    func numberOfRowsInSection() -> Int {\n        lists.count\n    }\n\
  \n    func listAt(indexPath: IndexPath) -> TasksListModel {\n        lists[indexPath.row]\n\
  \    }\n\n    func selectRowAt(indexPath: IndexPath) {\n        interactor?.getListAt(indexPath:\
  \ indexPath)\n    }\n\n    func deleteRowAt(indexPath: IndexPath) {\n        interactor?.deleteListAt(indexPath:\
  \ indexPath)\n    }\n\n    func addTaskList() {\n        router?.pushToAddListOn(view:\
  \ view!)\n    }\n\n    @objc private func fetchLists() {\n        interactor?.loadLists()\n\
  \    }\n}\n```\n*清单 5-17 – 采用`ViewToPresenterHomeProtocol`的`HomePresenter`代码*\n\n\
  另一方面，通过一个扩展，我们将使`HomePresenter`符合`InteractorToPresenterHomeProtocol`协议。这样，当我们调用\
  \ Interactor（例如加载列表、选择列表或删除列表）时，该协议方法的实现将允许我们从 Interactor 接收信息并采取相应操作（显示列表或`EmptyState`，或导航到`TaskList`屏幕），如清单\
  \ 5-18 所示。\n\n```swift\nextension HomePresenter: InteractorToPresenterHomeProtocol\
  \ {\n    func fetchedLists(taskLists: [TasksListModel]) {\n        lists = taskLists\n\
  \        taskLists.count == 0 ? view?.showEmptyState() : view?.hideEmptyState()\n\
  \        view?.onFetchLists()\n    }\n\n    func selectedList(taskList: TasksListModel?)\
  \ {\n        guard let taskList = taskList else {\n            return\n        }\n\
  \        router?.pushToTaskListOn(view: view!, taskList: taskList)\n    }\n}\n```\n\
  *清单 5-18 – 在`HomePresenter`中采用`InteractorToPresenterHomeProtocol`*\n\n---\n\n###\
  \ `HomeInteractor`\n\n`HomeInteractor`包含应用程序的业务逻辑。它负责与数据库通信，并将必要的信息返回给`HomePresenter`。\n\
  \n此类必须实现`PresenterToInteractorHomeProtocol`（清单 5-19）。\n\n```swift\nclass HomeInteractor:\
  \ PresenterToInteractorHomeProtocol {\n    var presenter: InteractorToPresenterHomeProtocol?\n\
  \    var lists: [TasksListModel] = [TasksListModel]()\n    var tasksListService:\
  \ TasksListServiceProtocol!\n\n    init(tasksListService: TasksListServiceProtocol)\
  \ {\n        self.tasksListService = tasksListService\n    }\n\n    func loadLists()\
  \ {\n        lists = (tasksListService?.fetchLists())!\n        presenter?.fetchedLists(taskLists:\
  \ lists)\n    }\n\n    func getListAt(indexPath: IndexPath) {\n        guard lists.indices.contains(indexPath.row)\
  \ else {\n            presenter?.selectedList(taskList: nil)\n            return\n\
  \        }\n        presenter?.selectedList(taskList: lists[indexPath.row])\n  \
  \  }\n\n    func deleteListAt(indexPath: IndexPath) {\n        guard lists.indices.contains(indexPath.row)\
  \ else { return }\n        tasksListService.deleteList(lists[indexPath.row])\n \
  \   }\n}\n```\n*清单 5-19 – 实现`PresenterToInteractorHomeProtocol`的`HomeInteractor`代码*\n\
  \n可以看到，在`init`方法中，我们注入了`TasksListService`的实例，以便向数据库发送关于任务列表的请求。\n\n---\n\n### Add\
  \ List Module\n\n此屏幕负责添加任务列表及其组件之间的通信。根据 VIPER 架构，这些组件之间的通信如图 5-4 所示。\n\n![](img/531999_1_En_5_Fig4_HTML.png)\n\
