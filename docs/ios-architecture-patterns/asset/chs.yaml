  \ 组件与 TaskListViewModel 之间的绑定\n```\n\n相信所有这些代码你都很熟悉。唯一的添加项是允许我们更新任务状态的按钮（`checkButton`），我们为表格中的每个单元格都配置了该按钮。\n\
  \n接下来，我们来看将目标关联到此屏幕上两个按钮的代码（代码清单 4-24）。\n\n```\naddTaskButton.rx.tap\n.asDriver()\n\
  .drive(onNext: { [self] in\ndelegate?.addTask()\n})\n.disposed(by: disposeBag)\n\
