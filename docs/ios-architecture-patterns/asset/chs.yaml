  ```\n\n## MVVM-C：模型-视图-视图模型-协调器\n\n到目前为止，在已研究的不同架构中，我们已经看到不同屏幕之间的导航（或不同视图控制器之间的导航）是在这些控制器内部进行的。\n\
  \n这使得一方面难以对它们进行测试，另一方面也难以在应用程序的其他部分重用它们。\n\n为了解决这个问题，我们将使用协调器模式。\n\n### 什么是协调器？\n\
  \n`Coordinator`（协调器）是一个用于处理视图控制器外部导航的类。这样，我们将导航代码从视图控制器中抽离出来，使它们更简单、更易于重用。因此，`Coordinator`\
  \ 的职责包括：加载我们要访问的视图控制器，并管理从该视图控制器到其他控制器的导航流程（图 4-15）。\n\n![](img/531999_1_En_4_Fig15_HTML.png)\n\
  \n**图 4-15**  \n模型-视图-视图模型-协调器架构图\n\n我们首先要做的是创建一个协议，让所有协调器都遵循该协议。由于应用程序相对简单，这个协议也会很简单（清单\
  \ 4-39）。\n\n```\nprotocol Coordinator {\n    var navigationController: UINavigationController\
  \ { get set }\n    func start()\n}\n\n清单 4-39\n协调器协议\n```\n\n所有实现此协议的协调器都必须定义一个\
  \ `navigationController` 变量（我们将应用程序的 `navigationController` 赋值给它）和一个 `start()` 函数，该函数负责调用视图控制器。\n\
  \n> 注意  \n> 在拥有更复杂导航流程的大型应用程序中，一个好的策略是将它们分解成更简单的部分，由 `ParentCoordinator`（父协调器）管理，而该协调器依赖于一个\
  \ `ChildCoordinator`（子协调器）数组。\n\n### 在 MyToDos 中使用 MVVM-C\n\n由于应用程序大部分代码与我们之前看到的\
  \ MVVM 架构相同，因此我们只关注新增的部分。\n\n> 注意  \n> 请记住，项目的所有代码都可以在本书的存储库中找到。\n\n#### SceneDelegate\n\
  \n在 `SceneDelegate` 中，我们现在所做的是加载 `HomeCoordinator`，并将 `navigationController` 传递给它。接着，调用\
  \ `start()` 方法。\n\n```\nclass SceneDelegate: UIResponder, UIWindowSceneDelegate\
  \ {\n    var window: UIWindow?\n    var homeCoordinator: HomeCoordinator?\n\n  \
  \  func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:\
  \ UIScene.ConnectionOptions) {\n        if let windowScene = scene as? UIWindowScene\
  \ {\n            let window = UIWindow(windowScene: windowScene)\n            let\
  \ navigationController = UINavigationController.init()\n            navigationController.navigationBar.isHidden\
  \ = true\n            navigationController.interactivePopGestureRecognizer?.isEnabled\
  \ = false\n\n            homeCoordinator = HomeCoordinator(navigationController:\
  \ navigationController)\n            homeCoordinator?.start()\n\n            window.backgroundColor\
  \ = .white\n            window.rootViewController = navigationController\n     \
  \       self.window = window\n            window.makeKeyAndVisible()\n        }\n\
  \    }\n    ...\n}\n```\n\n\n\n### 主屏幕\n\n负责管理导航的类是从`SceneDelegate`中调用的`HomeCoordinator`。如代码清单\
  \ 4-40 所示，除了协议中定义的`start`方法外，它还提供了几个方法，包括`showSelectedList`方法（用于加载显示列表任务的屏幕的协调器）和`addList`方法（用于从创建新列表屏幕加载协调器）。\n\
  \n```\nprotocol HomeCoordinatorProtocol {\n    func showSelectedList(_ list: TasksListModel)\n\
  \    func gotoAddList()\n}\n\nclass HomeCoordinator: Coordinator, HomeCoordinatorProtocol\
  \ {\n    var navigationController: UINavigationController\n    \n    init(navigationController:\
  \ UINavigationController) {\n        self.navigationController = navigationController\n\
  \    }\n    \n    func start() {\n        let viewModel = HomeViewModel(tasksListService:\
  \ TasksListService(), coordinator: self)\n        navigationController.pushViewController(HomeViewController(viewModel:\
  \ viewModel), animated: true)\n    }\n    \n    func showSelectedList(_ list: TasksListModel)\
  \ {\n        let taskListCoordinator = TaskListCoordinator(navigationController:\
  \ navigationController, taskList: list)\n        taskListCoordinator.start()\n \
  \   }\n    \n    func gotoAddList() {\n        let addListCoordinator = AddListCoordinator(navigationController:\
  \ navigationController)\n        addListCoordinator.start()\n    }\n}\n```\n\n*代码清单\
  \ 4-40 — `HomeCoordinatorProtocol` 和 `HomeCoordinator` 类*\n\n如你所见，当将`HomeViewController`传递到导航控制器时，我们还传入了`HomeViewModel`的一个实例，该实例包含对协调器本身的引用，以便能够从该`ViewModel`管理导航调用，而无需经过视图和控制器。\n\
  \n因此，例如，如果我们调用`HomeCoordinator`的`gotoAddList`方法，它将负责实例化`AddListCoordinator`并调用其`start()`方法，该方法将在`AddListController`中加载导航堆栈（所有这些都无需经过`HomeViewController`）。\n\
  \n这样一来，`HomeViewController`只需负责实例化视图（我们知道，视图位于不同的类中）并将 ViewModel 传递给它即可（代码清单 4-41）。\n\
  \n```\nclass HomeViewController: UIViewController {\n    private var homeView: HomeView!\n\
  \    private var viewModel: HomeViewModel!\n    \n    init(viewModel: HomeViewModel)\
  \ {\n        super.init(nibName: nil, bundle: nil)\n        self.viewModel = viewModel\n\
  \    }\n    \n    required init?(coder: NSCoder) {\n        fatalError(\"init(coder:)\
  \ has not been implemented\")\n    }\n    \n    override func loadView() {\n   \
  \     super.loadView()\n        setupHomeView()\n    }\n    \n    private func setupHomeView()\
  \ {\n        homeView = HomeView(viewModel: viewModel)\n        self.view = homeView\n\
  \    }\n}\n```\n\n*代码清单 4-41 — `HomeViewController` 的功能已大幅精简*\n\n通过在`HomeViewModel`的初始化中加入协调器，我们对之前\
  \ MVVM 架构中的`HomeViewModel`进行了如下改造（代码清单 4-42）。\n\n```\nclass HomeViewModel {\n  \
  \  var output: Output!\n    var input: Input!\n    let coordinator: HomeCoordinator\n\
  \    \n    struct Input {\n        ...\n        let addList: PublishRelay\n    }\n\
  \    ...\n    \n    init(tasksListService: TasksListServiceProtocol, coordinator:\
  \ HomeCoordinator) {\n        self.tasksListService = tasksListService\n       \
  \ self.coordinator = coordinator\n        \n        // 输入\n        ...\n       \
  \ let selectRow = PublishRelay()\n        _ = selectRow.subscribe(onNext: { [self]\
  \ indexPath in\n            coordinator.showSelectedList(listAtIndexPath(indexPath))\n\
  \        })\n        \n        let addList = PublishRelay()\n        _ = addList.subscribe(onNext:\
  \ { _ in\n            coordinator.gotoAddList()\n        })\n        \n        self.input\
  \ = Input(reload: reload, deleteRow: deleteRow, selectRow: selectRow, addList: addList)\n\
  \        ...\n    }\n    ...\n}\n```\n\n*代码清单 4-42 — 为使用协调器而适配的 `HomeViewModel`*\n\
  \n这样，当我们选择一个列表或点击`addListButton`时，无需在视图中执行调用，然后通过委托传递给控制器，而是直接从`HomeViewModel`本身调用`HomeCoordinator`来执行导航流程。\n\
  \n最后，在`HomeView`类中，我们修改了`bindingToModel`方法中与`addListButton`相关的绑定（代码清单 4-43）。\n\n\
  ```\naddListButton.rx.tap\n    .bind(to: viewModel.input.addList)\n    .disposed(by:\
  \ disposeBag)\n```\n\n*代码清单 4-43 — `addListButton` 的新绑定*\n\n并且我们移除了与`viewModel.output.selectedList`的绑定，因为其通过`delegate`调用`HomeViewController`以加载`TasksListViewController`的功能，现在由`HomeViewModel`本身通过调用`HomeCoordinator`来完成了。\n\
  \n### 添加列表屏幕\n\n此屏幕允许我们创建一个新的任务列表，并且它只呈现一个可能的导航流程：返回主屏幕。因此，`AddListCoordinator`将只包含一个方法（除了`start()`方法之外），即`navigateBack`方法，该方法将在添加新列表或选择返回按钮时被调用（代码清单\
  \ 4-44）。\n\n```\nprotocol AddListCoordinatorProtocol {\n    func navigateBack()\n\
  }\n\nclass AddListCoordinator: Coordinator, AddListCoordinatorProtocol {\n    var\
  \ navigationController: UINavigationController\n    \n    init(navigationController:\
  \ UINavigationController) {\n        self.navigationController = navigationController\n\
  \    }\n    \n    func start() {\n        let viewModel = AddListViewModel(tasksListService:\
  \ TasksListService(), coordinator: self)\n        navigationController.pushViewController(AddListViewController(viewModel:\
  \ viewModel), animated: true)\n    }\n    \n    func navigateBack() {\n        navigationController.popViewController(animated:\
  \ true)\n    }\n}\n```\n\n*代码清单 4-44 — `AddListCoordinatorProtocol` 和 `AddListCoordinator`\
  \ 代码*\n\n这样一来，`AddListViewController`类的代码被精简到了最低限度（代码清单 4-45）。\n\n```\nclass AddListViewController:\
  \ UIViewController {\n    private var addListView: AddListView!\n    private var\
  \ viewModel: AddListViewModel!\n    \n    init(viewModel: AddListViewModel) {\n\
  \        super.init(nibName: nil, bundle: nil)\n        self.viewModel = viewModel\n\
  \    }\n    ...\n    \n    private func setupAddListView() {\n        addListView\
  \ = AddListView(viewModel: viewModel)\n        self.view = addListView\n    }\n\
  }\n```\n\n*代码清单 4-45 — `AddListViewController` 代码*\n\n现在，由于在创建`AddListViewModel`实例时，我们会传入协调器，因此我们不再需要在输入中添加与视图相关的关闭事件（用于添加列表（`addList`）或返回主屏幕（`dismiss`）），只需直接调用协调器的`navigateBack`方法即可。因此，我们可以移除\
  \ ViewModel 中的输出部分（代码清单 4-46）。\n\n```\nclass AddListViewModel {\n    ...\n    var\
  \ coordinator: AddListCoordinator!\n    \n    struct Input {\n        ...\n    \
  \    let addList: PublishRelay\n        let dismiss: PublishRelay\n    }\n    ...\n\
  \    \n    init(tasksListService: TasksListServiceProtocol, coordinator: AddListCoordinator)\
  \ {\n        self.tasksListService = tasksListService\n        self.coordinator\
  \ = coordinator\n        ...\n        \n        let addList = PublishRelay()\n \
  \       _ = addList.subscribe(onNext: { [self] _ in\n            tasksListService.saveTasksList(list)\n\
  \            coordinator.navigateBack()\n        })\n        \n        let dismissView\
  \ = PublishRelay()\n        _ = dismissView.subscribe(onNext: { _ in\n         \
  \   coordinator.navigateBack()\n        })\n        ...\n    }\n}\n```\n\n*代码清单\
  \ 4-46 — 在 `addList` 和 `dismiss` 输入中使用协调器*\n\n通过移除输出，我们也将移除之前在 MVVM 架构中，视图上与之对应的绑定（`viewModel.output.dismiss`）。\n\
  \n\n\n#### 任务列表界面\n\n此界面以列表形式展示任务，并提供两种导航流程：显示添加新任务的界面，或返回`Home`界面。因此，在`TaskListCoordiantor`中，除了`start()`方法外，我们还需要`gotoAddTask`方法和`navigateBack`方法（代码清单\
  \ 4-47）。\n\n```\nprotocol TaskListCoordinatorProtocol {\n    func gotoAddTask()\n\
  \    func navigateBack()\n}\nclass TaskListCoordinator: Coordinator, TaskListCoordinatorProtocol\
  \ {\n    var navigationController: UINavigationController\n    var taskList: TasksListModel!\n\
  \    init(navigationController: UINavigationController, taskList: TasksListModel)\
  \ {\n        self.navigationController = navigationController\n        self.taskList\
  \ = taskList\n    }\n    func start() {\n        let viewModel = TaskListViewModel(tasksListModel:\
  \ taskList, taskService: TaskService(),\n                                      \
  \    tasksListService: TasksListService(),\n                                   \
  \       coordinator: self)\n        let taskViewController = TaskListViewController(viewModel:\
  \ viewModel)\n        navigationController.pushViewController(taskViewController,\
  \ animated: true)\n    }\n    func gotoAddTask() {\n        let addTaskCoordinator\
  \ = AddTaskCoordinator(navigationController: navigationController,\n           \
  \                                         tasksList: taskList)\n        addTaskCoordinator.start()\n\
  \    }\n    func navigateBack() {\n        navigationController.popViewController(animated:\
  \ true)\n    }\n}\n代码清单 4-47\nTaskListCoordinatorProtocol 和 TaskListCoordinator\
  \ 代码\n```\n\n通过从`TaskListViewController`中移除导航功能，你的代码将如下所示（代码清单 4-48）。\n\n```\nclass\
  \ TaskListViewController: UIViewController {\n    private var taskListView: TaskListView!\n\
  \    private var viewModel: TaskListViewModel!\n    init(viewModel: TaskListViewModel)\
  \ {\n        self.viewModel = viewModel\n        super.init(nibName: nil, bundle:\
  \ nil)\n    }\n    ...\n    private func setupTaskListView() {\n        taskListView\
  \ = TaskListView(viewModel: viewModel)\n        self.view = taskListView\n    }\n\
  }\n代码清单 4-48\nAddListViewController 代码\n```\n\n对于原始的`TaskListViewModel`类，我们将在`Input`结构体中添加几个参数，以便能够管理对\
  \ Coordinator 的调用，从而返回`Home`并访问`Add Task`界面（代码清单 4-49）。\n\n```\nclass TaskListViewModel\
  \ {\n    var output: Output!\n    var input: Input!\n    let coordinator: TaskListCoordinatorProtocol!\n\
  \    struct Input {\n        ...\n        let addTask: PublishRelay\n        let\
  \ dismiss: PublishRelay\n    }\n    ...\n    init(tasksListModel: TasksListModel,\n\
  \         taskService: TaskServiceProtocol,\n         tasksListService: TasksListServiceProtocol,\n\
  \         coordinator: TaskListCoordinatorProtocol) {\n        self.tasksListModel\
  \ = tasksListModel\n        self.taskService = taskService\n        self.tasksListService\
  \ = tasksListService\n        self.coordinator = coordinator\n        // Inputs\n\
  \        ...\n        let addTask = PublishRelay()\n        _ = addTask.subscribe(onNext:\
  \ { _ in\n            coordinator.gotoAddTask()\n        })\n        let dismissView\
  \ = PublishRelay()\n        _ = dismissView.subscribe(onNext: { _ in\n         \
