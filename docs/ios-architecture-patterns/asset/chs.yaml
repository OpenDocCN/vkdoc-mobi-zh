  XCTAssertEqual(presenter.list.title, \"Test title\")\n}\nfunc testIcon_whenIconIsSetted_shouldBeIconInList()\
  \ {\nlet mockTaskListService = MockTaskListService(lists: [TasksListModel]())\n\
