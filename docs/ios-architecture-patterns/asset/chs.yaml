  \ 发生变化时，我们都必须在 `XCTAssertEqual` 中处理该变化。\n\n### 测试列表删除\n\n在此测试中，我们将验证在从表格中删除某个单元格后，表格为空（清单\
  \ 4-37）。具体步骤为：向数据库中添加一个列表，重新加载表格，触发单元格的删除操作，再次重新加载列表，并确认数据库中已无列表。\n\n```\nfunc testRemoveListAtIndex_whenAddedOneList_shouldBeEmptyModelOnDeleteList()\
