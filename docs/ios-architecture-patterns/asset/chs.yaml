  \n**图 2-10** 任务列表界面组件通信示意图\n\n### `TaskListViewController`\n\n`TaskListViewController`负责控制显示构成某个列表任务的界面，它持有视图（`TaskListView`）和模型（`TaskServiceProtocol`和`TasksListServiceProtocol`）的引用。\n\
