  func testAddIcon_whenAddedIcon_shouldContainObjectIcon() {\nsut.setListIcon(\"test.icon\"\
  )\nXCTAssertEqual(sut.list.icon, \"test.icon\")\n}\nfunc testAddTitle_whenAddedTitle_shouldContainObjectTitle()\
  \ {\nsut.addListWithTitle(\"Test List\")\nXCTAssertEqual(sut.list.title, \"Test\
  \ List\")\nXCTAssertEqual(mockTaskListService.fetchLists().first?.title, \"Test\
  \ List\")\n}\n}\n代码清单 3-29\nAddListViewPresenterTest 代码\n```\n\n如你所见，我们使用了`MockTaskListService`类，正如我们在第\
  \ 2 章中看到的，这个类允许我们模拟`TaskListService`类的原始行为，但它返回的是我们指定的数据。\n\n## 小结\n\n我们可以将 MVP\
  \ 架构视为 MVC 架构的演进。我们所做的只是将业务逻辑从 Controller 转移到了 Presenter。Presenter 还会从 View 接收用户的交互并做出相应的反应。\n\
  \n我们已经看到了使用 MVP 架构的一些优点，例如它比 MVC 能获得更好的职责分离，并且业务逻辑可以在 Presenter 中得到更好的测试。\n\n然而，也需要考虑到它可能带来的一些问题，例如开发时需要更多的代码（且比\
  \ MVC 稍复杂），或者就像 MVC 中的 Controller 一样，Presenter 可能因为添加了更多职责而变得臃肿。\n\n在下一章中，我们将看到一个与\
  \ MVP 相似的架构：MVVM，即 Model–View–ViewModel。我们将看到视图如何与模型绑定（为此我们将使用`RxSwift`库进行响应式函数式编程），最后，我们将在\
  \ MVVM 的基础上进行变体，添加一个管理屏幕间导航的 Coordinator（MVVM-C）。\n\n---\n\n"
- "# 4. MVVM：Model–View–ViewModel\n\n## 什么是 MVVM？\n\n### 一点历史\n\nMVVM 架构是由微软的 Ken\
  \ Cooper 和 Ted Peters 开发的（后来由 John Gossman 在 2005 年通过他的博客宣布），目的是简化 Web 界面的**事件驱动编程**（即事件驱动程序流程）。^(⁶)\n\
  \n### 工作原理\n\nMVVM 架构是 MVP 架构的一种演进，其中 Presenter 层被 ViewModel 层取代。此外，它解决了 MVP 架构存在的一些问题。最主要的是\
  \ MVP 架构中 View 与 Presenter 之间的**耦合**。在 MVVM 架构中，ViewModel 没有对 View 的引用，即不存在耦合（图\
  \ 4-1）。\n\n![](img/531999_1_En_4_Fig1_HTML.png)\n\n一个框图表示三个模块，分别标记为视图模型、视图和模型。视图和视图模型通过**数据绑定**相互连接。视图模型通知模型并接收模型的更新。\n\
  \n图 4-1\n\nModel–View–ViewModel 模式示意图\n\n### MVVM 中的组件\n\n现在我们更详细地了解 MVVM 模式中这三个组件的特性。\n\
  \n#### 模型（Model）\n\n与 MVC 或 MVP 模式相同，Model 是负责业务逻辑以及存储、操作和访问应用程序数据的组件：\n\n-   包含与数据持久化相关的类。\n\
  -   包含控制应用程序通信的类。\n-   负责将从外部接收的信息转换为模型对象。\n-   包含扩展、常量等。\n-   Model 层只能与 ViewModel\
  \ 层通信（即 Model 不知道 View 的存在）。\n\n#### 视图（View）\n\nView 层包含`UIView`组件和`UIViewController`元素（我们将其保存在独立的文件中，如前几章所述）：\n\
  \n-   View 负责随时向用户显示最新的信息（这些信息来自 ViewModel）。\n-   View 不包含任何逻辑。\n-   View 可以有多个对\
  \ ViewModel 的引用。\n\nController 仅承担**协调/路由**功能，处理屏幕间的导航，并在必要时通过**委托模式**传递信息。在本章末尾，我们将看到如何将所有这些协调/路由功能转移到一个新类——Coordinator\
  \ 中，从而产生 MVVM-C 架构。\n\n\n\n#### ViewModel\n\n`ViewModel`是 MVVM 架构的核心（类似于 MVC 中的`Controller`或\
  \ MVP 中的`Presenter`），位于视图（View）与模型（Model）之间：\n\n-   `ViewModel`必须始终呈现视图的当前状态。\n\
  -   `ViewModel`负责处理控制视图的输入/输出信息。\n-   `ViewModel`由视图拥有，而模型由`ViewModel`拥有。\n\n`ViewModel`通过所谓的数据绑定（Data\
  \ Binding）与视图相连。⁷ 此过程允许你将视图与`ViewModel`连接起来，因此如果`ViewModel`所管理的信息状态发生变化，视图会自动更新。\n\
  \n#### 数据绑定\n\n视图与`ViewModel`之间应用数据绑定的方法有多种，例如：\n\n-   使用`RxSwift`、`Bond`或`Combine`等库。这是最常用的系统，在开发我们的\
  \ MVVM 应用时，我们将使用`RxSwift`库。⁸\n-   使用 KVO（键值观察）模式，通过该模式，我们可以通知特定对象关于其他对象属性发生的变化。⁹\n\
  -   使用委托模式，通过闭包实现……\n\n## MVVM 的优缺点\n\nMVVM 架构模式常被用作 MVC 架构的替代方案，与其他架构一样，使用 Model–View–ViewModel\
  \ 架构既有优点也有缺点。\n\n### 优点\n\nMVVM 架构的主要优点如下：\n\n-   它实现了良好的职责分离，因为我们引入了一个新的组件（`ViewModel`），负责转换模型数据以在视图中显示。这样，我们就将控制器从该项工作中解放出来（这在\
  \ MVC 中并未实现）。\n-   由于职责分离更彻底，其维护也变得更加容易。\n-   它提高了可测试性，因为我们可以测试`ViewModel`的业务逻辑，而无需考虑视图。测试控制器也更容易，因为与\
  \ MVC 不同，它们不依赖于模型。\n-   在从 MVC 架构迁移时，MVVM 架构被广泛应用于应用开发中。\n\n### 缺点\n\n主要缺点如下：\n\n\
  -   如果我们使用第三方库来执行数据绑定（例如`RxSwift`或`Bond`），必须考虑几个因素：\n    -   一方面，添加外部库会增加我们应用的体积。\n\
  \    -   另一方面，添加这些库通常会影响应用的性能。\n    -   最后，我们还必须考虑到正确使用每个库所需的学习曲线。\n-   数据绑定是一种声明式范式，我们告诉程序**做什么**，而不是**怎么做**（命令式范式），这可能会增加调试难度。此外，这种范式在`SwiftUI`中比在`UIKit`中更有意义。\n\
  -   与其他架构一样，如果应用不当，我们最终可能会用不相关的函数过度加载`ViewModel`。\n-   它对刚入门的开发人员来说有一定复杂性。\n\n##\
  \ MVVM 应用\n\n了解了 MVVM 架构的特性之后，我们将在自己的应用开发中应用它们。\n\n**注意**\n\n整个项目可以从本书的仓库中下载。在解释如何将\
  \ MVVM 架构应用于我们项目的过程中，我们只会展示代码中最相关的部分。\n\n### MVVM 分层\n\n为了延续所应用架构模式（Model–View–ViewModel）的逻辑，我们将创建一个模拟其层的文件夹结构（图\
  \ 4-2）。\n\n![](img/531999_1_En_4_Fig2_HTML.png)\n\n该截图显示了 MVVM MyToDos 下的子文件夹和文件。它包含名为\
  \ model、view 和 view model 的子文件夹。高亮显示了 view model 下的文件列表。\n\n**图 4-2** – MVVM 项目文件夹结构\n\
  \n##### 模型\n\n与之前的情况类似，此文件夹包含与业务逻辑、数据访问及数据处理相关的所有内容（图 4-3）。\n\n![](img/531999_1_En_4_Fig3_HTML.jpg)\n\
  \n该截图显示了 model 文件夹的子文件夹，model 又是 MVVM MyToDos 下的子文件夹。子文件夹的名称是 core data、models、services、extensions\
  \ 和 helpers。\n\n**图 4-3** – 模型层文件\n\n在 MVVM 架构中，模型发生的变化会通知给`ViewModel`（就像在 MVC 中通知给\
  \ Controller、在 MVP 中通知给 Presenter 一样）。\n\n在这种情况下，我们在`ViewModel`的`init`方法中添加了观察者（列表\
  \ 4-1）。\n\n```swift\ninit() {\n    NotificationCenter.default.addObserver(self,\n\
  \                                         selector: #selector(contextObjectsDidChange),\n\
  \                                         name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
  \                                         object: CoreDataManager.shared.mainContext)\n\
  }\n@objc func contextObjectsDidChange() {\n    updateView()\n}\n```\n\n**列表 4-1**\
  \ – 在`ViewModel`初始化时设置观察者\n\n##### 核心数据\n\n在此文件夹中，我们将包含`CoreDataManager.swift`文件，以及由\
  \ Xcode 为数据库实体自动创建的四个文件。\n\n##### 模型\n\n这里存放着我们可以用来转换数据库实体的模型。此外，我们将创建一个模型必须遵守的协议，用于模型与实体之间的相互转换。\n\
  \n### 服务\n\n这里存放着允许我们向数据库发送信息（创建、更新或删除）或从数据库检索信息并将其转换为模型的类。\n\n##### 扩展\n\n在这里，我们创建了一个`UIColor`扩展，以便能够轻松访问为此应用程序专门创建的颜色，以及一个针对`NSManagedObject`类的扩展，这将防止我们在进行测试部分时与上下文发生冲突。\n\
  \n##### 常量\n\n它们包含我们将在应用程序中使用的常量参数。\n\n#### 视图\n\n在 View 文件夹中，我们不仅有视图文件及其组成组件（如\
  \ MVC 中），还有控制器文件（`UIViewController`的子类），如图 4-4 所示。\n\n![](img/531999_1_En_4_Fig4_HTML.png)\n\
  \n该截图显示了 view 下的文件和子文件夹，view 也是 MVVM MyToDos 的子文件夹。有名为 empty state、labels、collection\
  \ 和 screen 的文件夹。高亮显示了 screen 子文件夹下的文件列表。\n\n**图 4-4** – 视图层文件\n\n请记住，在 MVVM 中，控制器通常只具有协调/路由功能（用于在屏幕之间导航），并且在某些情况下传递信息（例如，通过委托模式）。\n\
  \n#### ViewModel\n\n此文件夹仅包含 ViewModels，正如我们所看到的，它们将模型连接到视图（图 4-5）。\n\n![](img/531999_1_En_4_Fig5_HTML.jpg)\n\
  \n该截图显示了名为 view model 的文件夹下的文件，该文件夹是 MVVM MyToDos 下的子文件夹。子文件夹下的文件有：home view、add\
  \ list view、task list view 和 add task view models。\n\n**图 4-5** – ViewModel 层文件\n\
  \n### MyToDos 数据绑定\n\n在开始介绍我们应用程序的不同屏幕如何配置之前，就像我们在 MVC 和 MVP 案例中所做的那样，我们将看看如何在`ViewModel`和视图之间执行数据绑定过程。\n\
  \n正如我们之前所见，执行此过程有多种方法，但在我们的案例中，我们将使用`RxSwift`。\n\n\n\n"
- "# 什么是 RxSwift？\n\n`RxSwift` 是一款用于 iOS 应用程序开发的响应式编程库。\n\n`RxSwift` 是一个库，它让我们能够在应用程序中开发异步代码，简化代码在面对新到达数据时的行为方式，并以顺序且隔离的方式处理这些数据。\n\
  \n在本书中，我们不会深入研究 `RxSwift` 和响应式编程，只需知道响应式编程允许你动态响应数据变化和用户事件即可。\n\n`RxSwift` 使用我们称之为\
  \ *Observables* 的对象来工作，这些对象是任何数据类型的包装器，我们可以订阅或链接到它们，以便所述 *Observables* 中发生的任何变化都会触发一系列预先编程的操作。\n\
  \n## Observables 和 Observers\n\n使用这个库时，我们会有两种类型的元素：\n\n- **Observable** : 在发生更改时发出通知。\n\
  - **Observer** : 观察者订阅一个 Observable 以接收其通知。一个 Observable 可以有一个或多个观察者。\n\n## 安装 RxSwift\n\
  \n`RxSwift` 作为一个外部库，其安装可以通过多种方式完成（*Swift Package Manager*，*Carthage*，*CocoaPods*）。在我们的案例中，我们将使用\
  \ Swift Package Manager (SPM)，这是 Xcode 集成的用于在应用程序中引入第三方库的系统。\n\n要在我们的项目中安装 `RxSwift`，我们将遵循以下步骤：\n\
  \n首先，进入 Xcode 主菜单，选择 *File* ➤ *Add Packages…* （图 4-6）。\n\n![](img/531999_1_En_4_Fig6_HTML.png)\n\
  \n文件选项卡下上下文菜单的截图。它高亮显示了选项列表中的添加包选项。\n\n图 4-6 — 选择添加包… 菜单\n\nXcode Swift Package\
  \ Manager 屏幕将会出现（图 4-7）。\n\n![](img/531999_1_En_4_Fig7_HTML.png)\n\n截图展示了苹果 Swift\
  \ 包列表。它高亮显示了 Swift 算法包，并在右侧提供了 Swift 算法的详细信息。底部有取消和添加包的按钮。\n\n图 4-7 — Swift Package\
  \ Manager 屏幕\n\n此时，我们要做的是复制 `RxSwift` git 仓库的地址（我们可以在其网站上找到），并将其粘贴到右上角的搜索字段中（图 4-8）。\n\
  \n```\nhttps://github.com/ReactiveX/RxSwift.git\n```\n\n执行此操作后，Xcode 会负责搜索该库，并提示我们是否要安装它。\n\
  \n![](img/531999_1_En_4_Fig8_HTML.png)\n\n截图展示了从所有源搜索出来的 R x swift 包。顶部的搜索栏高亮显示了一个链接以及\
  \ R X swift 的详细信息。底部有两个按钮用于取消和添加包。\n\n图 4-8 — 搜索 RxSwift 包\n\n在添加 `RxSwift` 之前，我们要做的是将“*Dependency\
  \ Rule*”选项从“*Branch*”更改为“*Up To Next Major Version*”。完成此更改后，选择“*Add Package*”。\n\
  \n接下来，会出现一个屏幕，我们可以在其中选择要安装的 `RxSwift` 库的组件或产品。对于我们的应用程序，我们将选择 `RxCocoa`、`RxRelay`\
  \ 和 `RxSwift`（用于主代码），以及 `RxTest`（用于测试目的），然后再次选择“*Add Package*”（图 4-9）。\n\n![](img/531999_1_En_4_Fig9_HTML.png)\n\
  \n截图展示了包含包产品列表及其种类和要添加的目标的表格。在 r x cocoa、r x relay、r x swift 和 r x text 包产品旁边有复选标记。\n\
  \n图 4-9 — RxSwift 的产品选择器\n\n安装完成后，我们可以看到我们的项目已经将 `RxSwift` 显示为依赖项（图 4-10）。\n\n![](img/531999_1_En_4_Fig10_HTML.png)\n\
  \n截图展示了 M V V M my to-dos 下的文件和文件夹以及包依赖项下的 R x swift 6 点 5 点 0。\n\n图 4-10 — 在包依赖项下，显示了所有已安装的\
  \ SPM 依赖项\n\n要在我们的代码中使用这些产品中的任何一个，我们只需导入它们（在需要时导入对应的即可）：\n\n```swift\nimport RxCocoa\n\
  import RxRelay\nimport RxSwift\n```\n\n## 输入/输出方法\n\n为了以更有组织的方式使用 `RxSwift` 以及不同组件和事件之间的绑定，我们将使用一种简化的流程，该方法基于一个相当普遍的约定，其起源是\
  \ Kickstarter 公司。^(¹⁰)\n\n这是一种函数式方法，其中使用了输入/输出的概念。\n\n- **Input** : 指发生在 View 中并影响\
  \ ViewModel 的所有事件和交互（写入文本、按下按钮……）。\n- **Output** : 指模型中发生的、必须在 View 中反映出来的更改。\n\n\
  让我们看一个应用此约定的简单示例。我们从 ViewModel 的代码开始（列表 4-2）。\n\n```swift\nclass ExampleViewModel\
  \ {\n    var output: Output!\n    var input: Input!\n    \n    struct Input {\n\
  \        let text: PublishRelay<String>\n    }\n    \n    struct Output {\n    \
  \    let title: Driver<String>\n    }\n    \n    init() {\n        let text = PublishRelay<String>()\n\
  \        let capsTitle = text\n            .map({ return text.uppercased() })\n\
  \            .asDriver(onErrorJustReturn: \"\")\n        \n        input = Input(text:\
  \ text)\n        output = Output(title: capsTitle)\n    }\n}\n```\n\n列表 4-2 — ViewModel\
  \ 中 RxSwift 输入/输出方法的示例\n\n尽管我们已经说过不会深入探讨像 `RxSwift` 这样庞大而复杂的库，但我们还是会解释一下在应用程序中使用的不同元素及其功能。\n\
  \n首先，我们可以看到 `PublishRelay<String>` 和 `Driver<String>` 元素：\n\n- `PublishRelay` 是\
  \ `RxSwift` 的一个组件，其功能是将其观察到的最近项目（以及后续项目）广播给所有已订阅的观察者。在这种情况下，传递的项目类型是 `String`，是我们放在\
  \ `UITextField` 元素中的文本。\n- `Driver` 是一个在主线程上运行的 observable（因此用于更新视图）。在这种情况下，它所做的是传递来自\
  \ `UITextField` 元素的值（通过已创建并正在观察的 `PublishRelay`）。由于我们将其传递给 UI 组件，因此必须在主线程上进行。\n\n\
  现在，让我们看看如何将 ViewModel 与 View 的元素绑定（列表 4-3）。\n\n```swift\nclass ExampleView {\n \
  \   func bind() {\n        textfield.rx.text\n            .bind(to: viewModel.input.text)\n\
  \            .disposed(by: disposeBag)\n        \n        viewModel.output.title\n\
  \            .drive(titleLabel.rx.text)\n            .disposed(by: disposeBag)\n\
  \    }\n}\n```\n\n列表 4-3 — View 中的元素绑定\n\n这里我们看到两个代码块：\n\n- 第一个块将 `UITextField`\
  \ 元素的 text 参数绑定到 ViewModel 的 text 变量（作为 `Input`）。这样，当我们在此字段中输入时，ViewModel 将会收到它。\n\
  - 第二个块将 ViewModel 的 title 变量（作为 `Output`）绑定到 `UILabel` 元素的 text 参数。因此，当我们输入时，ViewModel\
  \ 中的文本会被转换为大写并转发到 View 进行显示。\n\n**注意**：`RxSwift` 为我们在 Swift 开发中使用的大部分对象和类提供了几个扩展。这些扩展通过\
  \ `rx` 粒子访问，如 `tableView.rx`。\n\n当我们想要销毁已创建的 observable 时，必须调用 `dispose()` 方法。为了简化这项工作，我们拥有来自\
  \ `RxSwift` 的 `DisposeBag`。因此，每当我们创建一个 observable 时，都必须使用 `.disposed(by: disposeBag)`\
  \ 方法将其添加到创建的 `disposeBag` 对象中。\n\n\n\n"
- "# MyToDos 应用界面\n\n正如我们刚刚看到的，MVVM 架构的核心是 `ViewModel`，它负责维护 `View` 的状态，并在每次状态发生变化时对其进行修改（得益于数据绑定）。\n\
  \n虽然 MVVM 架构与 MVP 架构（我们在第三章 3 中已经介绍过）类似，其中 `ViewModel` 的功能与 `Presenter` 类似，但 MVVM\
  \ 解决了 MVP 中 `View` 与 `Presenter` 之间的耦合问题（在 MVP 中，`View` 持有 `Presenter` 的引用，反之亦然）：在\
  \ MVVM 中，由于使用了数据绑定，这种耦合不复存在。\n\n因此，我们将重点介绍如何编写 `ViewModel` 和 `View`（以及 `Controller`），以及它们之间的绑定。\n\
  \n#### AppDelegate 和 SceneDelegate\n\n在我们的 MVVM 项目中，`AppDelegate` 和 `SceneDelegate`\
  \ 展示的代码与 MVP 案例中的相同，我们将 `HomeViewController` 的一个实例添加到 `UINavigationController` 组件中，但没有传递对\
  \ `TasksListService` 和 `TaskService` 服务的依赖，因为这些依赖将在 `HomeViewModel` 组件中建立（列表 4-4）。\n\
  \n```swift\nfunc scene(_ scene: UIScene, willConnectTo session: UISceneSession,\
  \ options connectionOptions: UIScene.ConnectionOptions) {\n    if let windowScene\
  \ = scene as? UIWindowScene {\n        let window = UIWindow(windowScene: windowScene)\n\
  \        let navigationController = UINavigationController(rootViewController: HomeViewController())\n\
  \        navigationController.navigationBar.isHidden = true\n        navigationController.interactivePopGestureRecognizer?.isEnabled\
  \ = false\n        window.backgroundColor = .white\n        window.rootViewController\
  \ = navigationController\n        self.window = window\n        window.makeKeyAndVisible()\n\
  \    }\n}\n```\n\n*列表 4-4*  \n`SceneDelegate` 为加载 `HomeViewController` 所做的更改\n\n\
  ### 主屏幕\n\n在“主”屏幕上，主要组件是 `HomeViewModel`，它与 `HomeView` 绑定在一起（数据绑定）（图 4-11）。\n\n\
  ![](img/531999_1_En_4_Fig11_HTML.png)\n\n一张框图从下到上说明了从任务列表服务到主视图控制器，再通过主视图模型和主视图的通信流程。它标明了主视图控制器、添加列表视图和任务列表视图控制器之间的导航路径。\n\
  \n*图 4-11*  \n主屏幕组件通信示意图\n\n## HomeViewController\n\n该屏幕的 `Controller` 与我们之前在 MVP\
  \ 模型中看到的类似：现在它负责实例化 `HomeViewModel` 并将其传递给 `View`（列表 4-5）。\n\n```swift\nclass HomeViewController:\
  \ UIViewController {\n    private var homeView: HomeView!\n    ...\n    override\
  \ func loadView() {\n        super.loadView()\n        setupHomeView()\n    }\n\n\
  \    private func setupHomeView() {\n        let viewModel = HomeViewModel(tasksListService:\
  \ TasksListService())\n        homeView = HomeView(viewModel: viewModel)\n     \
  \   homeView.delegate = self\n        self.view = homeView\n    }\n}\n```\n\n*列表\
  \ 4-5*  \n在 `HomeViewController` 中实例化 `HomeViewModel`\n\n另一方面，`HomeViewController`\
  \ 还处理屏幕之间的路由（在 `HomeView` 中，用户可以选择访问某个列表或创建一个新列表，并将导航委托给 `HomeViewController`），如列表\
  \ 4-6 所示。\n\n```swift\nextension HomeViewController: HomeViewControllerDelegate\
  \ {\n    func addList() {\n        navigationController?.pushViewController(AddListViewController(),\
  \ animated: true)\n    }\n\n    func selectedList(_ list: TasksListModel) {\n  \
  \      let taskViewController = TaskListViewController(tasksListModel: list)\n \
  \       navigationController?.pushViewController(taskViewController, animated: true)\n\
  \    }\n}\n```\n\n*列表 4-6*  \n`HomeViewControllerDelegate` 方法的实现\n\n在本章末尾，我们将了解如何通过使用\
  \ `Coordinator` 来移除 `UIViewController` 中的这一导航部分。\n\n\n\n##### HomeView\n\n`HomeView`\
  \ 相比我们在 MVC 或 MVP 中看到的版本有相当大的变化，这种变化并非体现在构成它的组件上，而是体现在这些组件如何通过数据绑定来感知 `ViewModel`\
  \ 状态的变化上。\n\n使用诸如 `RxSwift` 这样的库，使我们能够轻松地将视图的每个组件（及其属性）与模型关联起来。\n\n为了在 `ViewModel`\
  \ 和视图的组件之间建立所有连接，我们将创建一个方法对它们进行分组（清单 4-7）。\n\n```swift\nclass HomeView: UIView {\n\
  \    ...\n    private let viewModel: HomeViewModel!\n    private let disposeBag\
  \ = DisposeBag()\n    init(frame: CGRect = .zero, viewModel: HomeViewModel) {\n\
  \        self.viewModel = viewModel\n        ...\n        bindViewToModel(viewModel)\n\
  \    }\n}\nprivate extension HomeView {\n    ...\n    func bindViewToModel(_ viewModel:\
  \ HomeViewModel) {\n        ...\n    }\n}\n```\n\n*清单 4-7 在 HomeView 中设置 ViewModel*\n\
  \n我们现在来看一下将在这个方法中引入的代码，它将允许我们把视图的组件与 `ViewModel` 关联起来。\n\n我们从 `UITableView` 组件开始，它用于展示我们创建的任务列表。\n\
  \n首先，我们设置表格的委托（针对 `UITableViewDelegate` 协议），并且我们仅用它来设置行高（清单 4-8）。\n\n```swift\n\
  tableView.rx\n    .setDelegate(self)\n    .disposed(by: disposeBag)\n```\n\n*清单\
  \ 4-8 使用 RxSwift 设置 tableView 委托*\n\n接下来，我们需要向表格传递构成表格的分区数、行数以及项目数的信息。\n\n从我们将要使用的输入/输出约定的角度来看，任务列表将是\
  \ `ViewModel` 的一个输出（`output.lists`）。通过 `tableView.rx.items(cellIdentifier: ...)`\
  \ 语句可以将这些数据与 `UITableView` 元素关联起来（清单 4-9）。\n\n```swift\nviewModel.output.lists\n\
  \    .drive(tableView.rx.items(cellIdentifier: ToDoListCell.reuseId, cellType: ToDoListCell.self))\
  \ { (_, list, cell) in\n        cell.setCellParametersForList(list)\n    }\n   \
  \ .disposed(by: disposeBag)\n```\n\n*清单 4-9 将任务列表数据绑定到 tableView*\n\n接着，我们设置指令，以便能够订阅用户对单元格的选择操作。这通过\
  \ `input.selectRow` 参数实现。每当用户选择一个单元格时，该单元格的 `IndexPath` 信息将被发送给 `ViewModel`（清单 4-10）。\n\
  \n当我们选中一个表格单元格并将相应的 `IndexPath` 值传递给 `ViewModel` 时，`ViewModel` 会负责选择对应的 `TaskListModel`\
  \ 对象，并将其作为输出发出。因此，我们必须从视图中绑定这个输出（`output.selectedList`）。\n\n```swift\ntableView.rx.itemSelected\n\
  \    .bind(to: viewModel.input.selectRow)\n    .disposed(by: disposeBag)\n\nviewModel.output.selectedList\n\
  \    .drive(onNext: { [self] list in\n        delegate?.selectedList(list)\n   \
  \ })\n    .disposed(by: disposeBag)\n```\n\n*清单 4-10 订阅 itemSelected 事件*\n\n与 `UITableView`\
  \ 组件相关的最后一条指令是删除一个单元格（清单 4-11）。每当用户执行删除单元格的手势时，ViewModel 将被要求从模型中将其删除。这个删除列表的事件将对应于\
  \ `ViewModel` 的一个输入（`input.deleteRow`）。\n\n```swift\ntableView.rx.itemDeleted\n\
  \    .bind(to: viewModel.input.deleteRow)\n    .disposed(by: disposeBag)\n```\n\n\
  *清单 4-11 订阅 itemDeleted 事件*\n\n完成 `UITableView` 组件的绑定后，我们接着绑定 `EmptyState` 组件和 `AddListButton`\
  \ 组件。\n\n在第一种情况下，我们想要根据是否创建了任务列表来隐藏或显示 `EmptyState`。ViewModel 必须告知视图是否应该显示 `EmptyState`，因此这条信息将是一个输出（`output.hideEmptyState`），如清单\
  \ 4-12 所示。\n\n```swift\nviewModel.output.hideEmptyState\n    .drive(emptyState.rx.isHidden)\n\
  \    .disposed(by: disposeBag)\n```\n\n*清单 4-12 将 ViewModel 的 output.hideEmptyState\
  \ 属性绑定到 EmptyState 的 isHidden 属性*\n\n当 ViewModel 中的 `hideEmptyState` 取值为 false 时，`EmptyState`\
  \ 将会可见；而当其取值为 true 时，则会被隐藏。\n\n关于 `AddListButton`，在 MVC 或 MVP 中，我们为其分配了一个目标（target），该目标会调用我们创建的一个方法；而使用\
  \ `RxSwift`，我们只需将待执行的代码分配给 `tap` 方法即可（清单 4-13）。\n\n```swift\naddListButton.rx.tap\n\
  \    .asDriver()\n    .drive(onNext: { [self] in\n        delegate?.addList()\n\
  \    })\n    .disposed(by: disposeBag)\n```\n\n*清单 4-13 为 AddListButton 设置 tap 事件*\n\
  \n在 `bindToViewModel` 方法的末尾，我们执行的操作是调用重新加载表格的方法，正如我们将在 ViewModel 中看到的，该方法会调用数据库以获取已创建的任务列表。\n\
  \n```swift\nviewModel.input.reload.accept(())\n```\n\n正如我们在 RxSwift 的介绍中所提到的，我们不会深入探讨这个库提供的能力（它们非常多）。我们只是展示如何在我们的示例项目中使用其中的一些功能。\n\
  \n\n\n### `HomeViewModel`\n\n正如我们在本章开头所见，`ViewModel` 负责从 `Model` 获取数据，并将其准备为可供 `View`\
  \ 显示的状态，同时还管理该 `View` 的业务逻辑。\n\n正如我们在 `HomeView` 的开发过程中所见，`HomeViewModel` 必须包含三个输入（`reload`、`deleteRow`\
  \ 和 `selectRow`）以及三个输出（`lists`、`selectedList` 和 `hideEmptyState`）。因此，我们将按如下方式定义\
  \ `struct Input` 和 `struct Output`（代码清单 4-14）。\n\n```swift\nclass HomeViewModel\
  \ {\n    var output: Output!\n    var input: Input!\n    struct Input {\n      \
  \  let reload: PublishRelay<Void>\n        let deleteRow: PublishRelay<IndexPath>\n\
  \        let selectRow: PublishRelay<IndexPath>\n    }\n    struct Output {\n  \
  \      let hideEmptyState: Driver<Bool>\n        let lists: Driver<[TasksListModel]>\n\
  \        let selectedList: Driver<TasksListModel>\n    }\n    ...\n}\n// 代码清单 4-14\n\
  // 为 HomeViewModel 定义 Input 和 Output\n```\n\n一旦我们定义了 `Input` 和 `Output`，我们就在 `HomeViewModel`\
  \ 的初始化过程中设置它们的行为（代码清单 4-15）。\n\n```swift\nclass HomeViewModel {\n    ...\n    private\
  \ let lists = BehaviorRelay<[TasksListModel]>(value: [])\n    private let taskList\
  \ = BehaviorRelay<TasksListModel>(value: TasksListModel())\n    private var tasksListService:\
  \ TasksListServiceProtocol!\n    \n    init(tasksListService: TasksListServiceProtocol)\
