    The class that will manage the navigation, and which we have called from the *SceneDelegate*,
    is the *HomeCoordinator*. As shown in Listing [4-40](#531999_1_En_4_Chapter.xhtml#PC49),
    in addition to the start method, which is given by the protocol, it presents a
    couple of methods plus the *showSelectedList* method (which loads the Coordinator
    of the screen that shows the tasks of a list) and *addList* (which loads the Coordinator
    from the create a new list screen).


    ```

    protocol HomeCoordinatorProtocol {

    func showSelectedList(_ list: TasksListModel)

    func gotoAddList()

    }

    class HomeCoordinator: Coordinator, HomeCoordinatorProtocol {

    var navigationController: UINavigationController

    init(navigationController: UINavigationController) {

    self.navigationController = navigationController

    }

    func start() {

    let viewModel = HomeViewModel(tasksListService: TasksListService(), coordinator:
    self)

    navigationController.pushViewController(HomeViewController(viewModel: viewModel),
    animated: true)

    }

    func showSelectedList(_ list: TasksListModel) {

    let taskListCoordinator = TaskListCoordinator(navigationController: navigationController,
    taskList: list)

    taskListCoordinator.start()

    }

