    \ tasks = [TaskModel]()\n    weak var delegate: SelectedListDelegate?\n\n    init(tasksList:\
    \ TasksListModel,\n         taskService: TaskServiceProtocol,\n         tasksListService:\
    \ TasksListServiceProtocol,\n         delegate: SelectedListDelegate) {\n    \
    \    self.tasksList = tasksList\n        self.taskService = taskService\n    \
    \    self.tasksListService = tasksListService\n        self.delegate = delegate\n\
    \    }\n}\n```\n\n*列表 6-45：`TaskListInteractor` 初始化*\n\n接下来，我们需要让 `TaskListInteractor`\
    \ 遵循其输入协议，从而使 `TaskListViewController` 能够与之通信（列表 6-46）。\n\n```swift\nextension\
    \ TaskListInteractor: TaskListInteractorInput {\n    func navigateBack() {\n \
    \       presenter?.navigateBack()\n    }\n\n    func addTask(request: TaskListModel.AddTask.Request)\
    \ {\n        let response = TaskListModel.AddTask.Response(addTaskDelegate: self,\
    \ taskList: tasksList)\n        presenter?.showAddTask(response: response)\n \
    \   }\n\n    func fetchTasks(request: TaskListModel.FetchTasks.Request) {\n  \
    \      guard let list = tasksListService.fetchListWithId(tasksList.id) else {\
    \ return }\n        tasksList = list\n        tasks = tasksList.tasks.sorted(by:\
    \ { $0.createdAt.compare($1.createdAt) == .orderedDescending })\n        let response\
    \ = TaskListModel.FetchTasks.Response(tasks: tasks)\n        presenter?.presentTasks(response:\
    \ response)\n    }\n\n    func removeTask(request: TaskListModel.RemoveTask.Request)\
    \ {\n        let task = tasks[request.index.row]\n        taskService.deleteTask(task)\n\
    \        tasks.remove(at: request.index.row)\n        let response = TaskListModel.RemoveTask.Response(tasks:\
    \ tasks)\n        presenter?.removedTask(response: response)\n        delegate?.updateLists()\n\
    \    }\n\n    func updateTask(request: TaskListModel.UpdateTask.Request) {\n \
    \       taskService.updateTask(request.task)\n        fetchTasks()\n        let\
    \ response = TaskListModel.UpdateTask.Response(tasks: tasks)\n        presenter?.updatedTask(response:\
    \ response)\n        delegate?.updateLists()\n    }\n}\n```\n\n*列表 6-46：`TaskListInteractorInput`\
    \ 的遵循代码*\n\n如果你注意到，在 `addTask` 方法中，当创建我们将传递给展示器的响应时，我们将 `TaskListInteractor` 添加为委托（`addTaskDelegate`）。如果你还记得，我们在\
    \ `HomeInteractor` 中也这样做了，以便在 `AddTaskList` 场景中添加新任务列表，或从当前查看的场景中修改任务列表时，能够更新\
    \ `Home` 视图。\n\n最后三个方法 `fetchTasks`、`removeTask` 和 `updateTask` 是需要与数据库交互的方法（通过\
    \ `TasksListService` 和 `TaskService`），随后调用 `TaskListPresenter` 来更新视图。\n\n最后但同样重要的是，我们让\
