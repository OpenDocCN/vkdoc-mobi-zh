    # 5. VIPER：视图-交互器-展示器-实体-路由器


    ## 什么是 VIPER？


    ### 一点历史


    VIPER 由 Jeff Gilbert 和 Conrad Stoll 于 2014 年提出，它是首次尝试应用整洁架构（我们在第 1 章中介绍过）的实践，创建了一系列组件，每个组件都承担着独一无二的职责。^(¹¹)


    VIPER 是 View（视图）、Interactor（交互器）、Presenter（展示器）、Entity（实体）和 Router（路由器）的首字母缩写，其目标是将一个功能或实现划分为五个不同的层级，并汇集在一个模块内（图
    5-1）。


    ### 工作原理


    使用这些组件使我们能够在应用程序内分离职责，从而遵循单一职责原则。此外，由于我们在各层之间使用协议（接口）进行通信，因此也遵循了接口隔离原则。


    ![](img/531999_1_En_5_Fig1_HTML.png)


    VIPER 模式的流程图包含视图、交互器、展示器、实体和路由器。


    图 5-1 VIPER 模式


    ### VIPER 中的组件


    现在我们来详细了解该架构中的每个组件。


    #### 视图


    视图，包含 `UIViewController`：


    *   它不包含任何逻辑，仅由被动元素组成：按钮、标签、视图……

    *   它将用户交互发送给展示器。

    *   它知道如何展示从展示器接收到的信息。

    *   它不会向展示器请求信息，而是由展示器在需要更新视图时主动发送信息。


    #### 交互器


    交互器是包含业务逻辑的组件：


    *   它负责从数据库、服务器等处接收信息（模型）。

    *   它独立于视图。

    *   它接收来自展示器的动作，经过信息处理后，通过委托（委托模式）将结果返回给展示器。

    *   交互器绝不会将实体发送给展示器。


    #### 展示器


    展示器是 VIPER 架构的核心：


    *   它充当不同组件之间的连接纽带。

    *   它从视图接收用户交互，并包含处理这些交互的逻辑，以及向交互器请求信息。

    *   它以简单数据结构的形式（而非实体）接收来自交互器的信息。

    *   它不知道视图由哪些组件构成，但知道应该显示什么内容以及何时显示。

    *   它负责以最高效的方式将信息传递给视图。

    *   它通过路由器处理导航到其他屏幕的逻辑。


    #### 实体


    关于实体：


    *   它们是简单的对象模型。

    *   通常是数据结构（`struct`）。

    *   唯一能与实体打交道的组件是交互器。


    #### 路由器


    路由器在屏幕创建和导航方面承担多项职责：


    *   它负责创建屏幕（`UIViewController`）。

    *   它负责管理从一个屏幕到另一个屏幕的导航（包含导航逻辑）。

    *   它拥有 `UINavigationController` 和 `UIViewController` 的所有权。

    *   它类似于我们在第 4 章末尾 MVVM-C 架构中提到的 Coordinator。


    ### VIPER 的优缺点


    在开发项目时，VIPER 架构因其追求“整洁架构”而具有许多优点，但也存在一些缺点。


    #### 优点


    VIPER 架构的主要优点如下：


    *   由于将单一职责原则（SRP）作为基本原则，代码更加整洁。

    *   代码耦合度更低。

    *   由于这些特性，编写单元测试更加简单。

    *   开发代码时抽象程度更高，因此更容易添加新功能并扩展产品规模。

    *   层级之间的职责分离意味着，例如，交互器只包含业务逻辑，完全独立于视图，这使得编写自动化测试更加容易。

    *   由于业务逻辑被隔离等特性，它被认为是处理复杂应用程序时非常有用的架构。

    *   由于使用具有明确定义通信接口的独立模块，我们可以将项目的开发工作分配给多个团队。


    #### 缺点


    VIPER 架构的主要缺点如下：


    *   每个模块包含如此多的类：视图、交互器、展示器、实体、路由器……导致项目最终拥有大量的代码和类。

    *   必须编写大量的样板代码。

    *   它通常不适用于那些不打算扩展新功能的小型应用。

    *   学习 VIPER 起初可能令人生畏，尤其是对于新手开发者。

    *   为了便于模块复用，最好不要使用 Segue 进行屏幕间导航。


    ## VIPER 应用


    了解了 VIPER 架构的特点后，我们将在开发应用程序时应用它们。


    注意


    整个项目可以从本书的代码仓库中下载。在解释如何将 VIPER 架构应用于我们的项目时，我们只会展示代码中最相关的部分。


    ### 组件之间的通信


    正如我们所解释的，该架构中不同组件之间的通信是通过协议进行的。我们可以根据与展示器相关的数据流（`Input`/`Output`）来定义每一个协议，然后将其应用于相应的组件。

