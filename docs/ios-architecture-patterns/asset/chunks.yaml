    \ the output protocol (`AddTaskInteractorOutput`), which has a single method,\
    \ and as in the previous cases, we rename the `AddTaskViewControllerOutput` output\
    \ protocol to `AddTaskInteractorInput` (Listing [6-58](#531999_1_En_6_Chapter.xhtml#PC59)).\n\
    \n```\nprotocol AddTaskInteractorOutput: AnyObject {\n    func dismissView()\n\
    }\ntypealias AddTaskInteractorInput = AddTaskViewControllerOutput\n```\n\nNext,\
    \ we go to the initialization of this class, in which we pass the `TaskListModel`\
    \ object where we will add the new task created, the `TaskService` to connect\
    \ to the database and save the new task, and the delegate that allows us to indicate\
    \ to the `TaskList` scene that updates the view with the new task (Listing [6-59](#531999_1_En_6_Chapter.xhtml#PC60)).\n\
    \n```\nfinal class AddTaskInteractor {\n    var presenter: AddTaskPresenterInput?\n\
    \    private var tasksList: TasksListModel!\n    private var taskService: TaskServiceProtocol!\n\
    \    weak var delegate: AddTaskDelegate?\n\n    init(tasksList: TasksListModel,\n\
    \         taskService: TaskServiceProtocol,\n         delegate: AddTaskDelegate)\
    \ {\n        self.tasksList = tasksList\n        self.taskService = taskService\n\
    \        self.delegate = delegate\n    }\n}\n```\n\nFinally, we need to make the\
    \ `AddTaskInteractor` conform to the `AddTaskInteractorInput` protocol. This protocol\
    \ only has one method, `addTask`, to which we pass a request with the title and\
    \ icon of the new task.\n\nIn this method, we first create the `TaskModel` object,\
    \ which we pass to the `TaskService` for saving to the database. Then we tell\
    \ the `TaskList` scene to update the task list (via the delegate), and finally,\
    \ we tell the Presenter to dismiss the View (Listing [6-60](#531999_1_En_6_Chapter.xhtml#PC61)).\n\
    \n```\nextension AddTaskInteractor: AddTaskInteractorInput {\n    func addTask(request:\
    \ AddTaskModel.AddTask.Request) {\n        let task = TaskModel(id: ProcessInfo().globallyUniqueString,\n\
    \                            title: request.title,\n                         \
    \   icon: request.icon,\n                            done: false,\n          \
    \                  createdAt: Date())\n        taskService.saveTask(task, in:\
    \ tasksList)\n        delegate?.didAddTask()\n        presenter?.dismissView()\n\
    \    }\n}\n```\n\n### `AddTaskPresenter`\n\nThe `AddTaskPresenter`, as in the\
    \ previous cases, acquires its two input and output protocols by renaming the\
    \ input protocol the `AddTaskViewController` and the output protocol the `AddTaskPresenter`\
    \ (Listing [6-61](#531999_1_En_6_Chapter.xhtml#PC62)).\n\n```\ntypealias AddTaskPresenterInput\
    \ = AddTaskInteractorOutput\ntypealias AddTaskPresenterOutput = AddTaskViewControllerInput\n\
    ```\n\nThe conformation to the `AddTaskPresenterInput` protocol is quite simple\
    \ (Listing [6-62](#531999_1_En_6_Chapter.xhtml#PC63)).\n\n```\nfinal class AddTaskPresenter\
    \ {\n    weak var viewController: AddTaskPresenterOutput?\n}\n\nextension AddTaskPresenter:\
    \ AddTaskPresenterInput {\n    func dismissView() {\n        viewController?.dismissView()\n\
    \    }\n}\n```\n\n### `AddTaskModel`\n\nThe `AddTaskModel` is quite simple since\
    \ only the Request presents the fields that are needed to create the task (the\
    \ rest, although empty, are shown for pedagogical purposes) (Listing [6-63](#531999_1_En_6_Chapter.xhtml#PC64)).\n\
    \n```\nenum AddTaskModel {\n    enum AddTask {\n        struct Request {\n   \
    \         var title: String\n            var icon: String\n        }\n       \
    \ struct Response {}\n        struct ViewModel {}\n    }\n}\n```\n\n### `AddTaskRouter`\n\
    \nThe `AddTaskRouter` is also simple, as it only has one method, and that is to\
    \ dismiss the View (Listing [6-64](#531999_1_En_6_Chapter.xhtml#PC65)).\n\n```\n\
    protocol AddTaskRouterDelegate {\n    func dismissView()\n}\n\nfinal class AddTaskRouter\
    \ {\n    weak var viewController: UIViewController?\n}\n\nextension AddTaskRouter:\
    \ AddTaskRouterDelegate {\n    func dismissView() {\n        viewController?.dismiss(animated:\
    \ true)\n    }\n}\n```\n\n## VIP-MyToDos Testing\n\nIn the VIP architecture, the\
    \ three main components that we are going to test are the ViewControllers, the\
    \ Interactors, and the Presenters as those are the components of the VIP cycle.\n\
    \n**Note:** Remember that you can find the complete project code, including the\
    \ tests, in the repository associated with this book.\n\nNow, as an example, let's\
    \ see how to set unit tests to the `HomeViewController`, the `HomeInteractor`,\
    \ and the `HomePresenter` classes of the `Home` scene.\n\nIn the files of each\
    \ of the tests for these components, we will also define the mocks of the other\
    \ components of each scene that are necessary.\n\n### `HomeViewControllerTest`\n\
    \nAs we have seen in other cases, the first thing we will do is define the components\
    \ that we will need in the test. In this case, our *sut* (or *system under test*)\
    \ is the `HomeViewController`.\n\nAs the `HomeViewController` is related to the\
    \ `HomeInteractor` and the `HomeRouter`, what we will do is define mocks for these\
    \ classes: `MockHomeInteractor` and `MockHomeRouter` (Listing [6-65](#531999_1_En_6_Chapter.xhtml#PC66)).\n\
    \n```\nimport XCTest\n@testable import VIP_MyToDos\n\nfinal class HomeViewControllerTest:\
    \ XCTestCase {\n    private var sut: HomeViewController!\n    private var interactor:\
    \ MockHomeInteractor!\n    private var router: MockHomeRouter!\n    private var\
    \ view: HomeView!\n\n    let taskList = TasksListModel(id: \"12345-67890\",\n\
    \                                  title: \"Test List\",\n                   \
    \               icon: \"test.icon\",\n                                  tasks:\
    \ [TaskModel](),\n                                  createdAt: Date())\n\n   \
    \ override func setUpWithError() throws {\n        super.setUp()\n        interactor\
    \ = MockHomeInteractor()\n        router = MockHomeRouter()\n        view = HomeView()\n\
    \        sut = HomeViewController(homeView: view)\n        sut.interactor = interactor\n\
    \        sut.router = router\n    }\n    ...\n}\n```\n\nThe `MockHomeInteractor`\
    \ must conform to the same protocols as the `HomeInteractor` (although we won't\
    \ use the `didAddList` and `updateList` methods, which connect the `Home` scene\
    \ to the `AddList` and `TaskList` scenes) (Listing [6-66](#531999_1_En_6_Chapter.xhtml#PC67)).\
    \ What the rest of the methods will do is modify some variables with which we\
    \ can check if they have been called correctly from the `HomeViewController`.\n\
    \n```\nfinal class MockHomeInteractor: HomeInteractorInput, AddListDelegate, SelectedListDelegate\
    \ {\n    private(set) var addListRequest: Bool = false\n    private(set) var fetchTasksListRequest:\
    \ Bool = false\n    private(set) var selectTasksListIndex: IndexPath = IndexPath(row:\
    \ 0, section: 0)\n    private(set) var deleteTasksListIndex: IndexPath = IndexPath(row:\
    \ 0, section: 0)\n\n    func fetchTasksLists(request: HomeModel.FetchTasksLists.Request)\
    \ {\n        fetchTasksListRequest = true\n    }\n\n    func addList(request:\
    \ HomeModel.AddTasksList.Request) {\n        addListRequest = true\n    }\n\n\
    \    func selectList(request: HomeModel.SelectTasksList.Request) {\n        selectTasksListIndex\
    \ = request.index\n    }\n\n    func removeList(request: HomeModel.RemoveTasksList.Request)\
    \ {\n        deleteTasksListIndex = request.index\n    }\n\n    func didAddList()\
    \ {}\n    func updateLists() {}\n}\n```\n\nThe `MockHomeRouter` must conform to\
    \ the `HomeRouterDelegate` protocol. In the same way as in the `MockHomeInteractor`,\
    \ we set a series of variables that will allow us to verify that the methods have\
    \ been called correctly (Listing [6-67](#531999_1_En_6_Chapter.xhtml#PC68)).\n\
    \n```\nfinal class MockHomeRouter: HomeRouterDelegate {\n    private(set) var\
    \ navigateToAddList: Bool = false\n    private(set) var navigateToTaksList: Bool\
    \ = false\n    private(set) var selectedList: TasksListModel = TasksListModel()\n\
    \n    func showAddListView(delegate: AddListDelegate) {\n        navigateToAddList\
    \ = true\n    }\n\n    func showSelectedList(delegate: SelectedListDelegate, list:\
    \ TasksListModel) {\n        navigateToTaksList = true\n        selectedList =\
    \ list\n    }\n}\n```\n\nFinally, we set the tests for the `HomeViewControllerTest`\
    \ (Listing [6-68](#531999_1_En_6_Chapter.xhtml#PC69))."
