    As you can see, we have set a single delegate parameter on the *AddListView* class,
    but the *AddListViewController* is adopting two protocols: *AddListViewDelegate*
    and *BackButtonDelegate*. This is because, as we will now see, we can set multiple
    types for the delegate.


    ##### AddListView


    *AddListView* contains a *UITextField* element to enter the name of the task list,
    a *UICollectionView* element to choose an icon for the list, a button to create
    the list, and another button to return to the *Home* screen.


    In this view, we can see both sides of the Delegate pattern at the same time.


    On the one hand, it delegates the implementation of a series of methods to the
    controller that references it.


    Thus, *AddListView* delegates to *AddListViewController* the implementation of
    the methods referring to the *BackButtonDelegate* and *AddListViewDelegate* protocols
    (Listing [2-18](#531999_1_En_2_Chapter.xhtml#PC29)).


    ```

    protocol BackButtonDelegate: AnyObject {

    func navigateBack()

    }

    protocol AddListViewDelegate: AnyObject {

    func addList(_ list: TasksListModel)

    }

    Listing 2-18

    BackButtonDelegate and AddListViewDelegate implementation

    ```


    The first serves to indicate that the user has selected the button to navigate
    back without having created any list. The second allows us to pass the data of
    the created list to the Controller (which will be in charge of asking the Model
    to save it in the database).


    Since we want to implement all these protocols in our controller, in the View
    we can create a delegate that conforms to all of them (in case we don’t want to
    implement any of them, we should create independent delegates with different names):


    ```

    weak var delegate: (AddListViewDelegate & BackButtonDelegate)?

    ```


    Now we can call the different methods via the delegate (Listing [2-19](#531999_1_En_2_Chapter.xhtml#PC31)).


    ```

    @objc func backAction() {

    delegate?.navigateBack()

    }

    @objc func addListAction() {

    guard titleTextfield.hasText else { return }

    listModel.title = titleTextfield.text

    listModel.id = ProcessInfo().globallyUniqueString

    listModel.icon = listModel.icon ?? "checkmark.seal.fill"

    listModel.createdAt = Date()

    delegate?.addList(listModel)

    }

    Listing 2-19

    Calling methods on AddListViewController via delegate

    ```


    But *AddListView* not only delegates the implementation of methods but also implements
    others. Thus, the icon selector of icons that we have incorporated in this view,
    *IconSelectorView*, introduces the *IconSelectorViewDelegate* protocol.


    This protocol makes us implement the method that returns the icon selected by
    the user (Listing [2-20](#531999_1_En_2_Chapter.xhtml#PC32)).


    ```

    protocol IconSelectorViewDelegate: AnyObject {

    func selectedIcon(_ icon: String)

    }

    func configureCollectionView() {

    ...

    iconSelectorView.delegate = self

    ...

    }

    extension AddListView: IconSelectorViewDelegate {

    func selectedIcon(_ icon: String) {

    listModel.icon = icon

    }

    }

