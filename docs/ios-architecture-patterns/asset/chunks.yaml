    \ = AddTaskPresenter()\n        let viewController = AddTaskViewController()\n\
    \        viewController.presenter = presenter\n        viewController.presenter.router\
    \ = AddTaskRouter()\n        viewController.presenter?.view = viewController\n\
    \        viewController.presenter?.interactor = AddTaskInteractor(taskList: list,\
    \ taskService: TaskService())\n        viewController.presenter?.interactor?.presenter\
    \ = presenter\n        return viewController\n    }\n    func dismissFrom(view:\
    \ PresenterToViewAddTaskProtocol) {\n        let viewController = view as! AddTaskViewController\n\
    \        viewController.dismiss(animated: true)\n    }\n}\n// 清单 5-43\n// AddTaskRouter\
