    ### `AddTaskPresenter`


    `AddTaskPresenter` 必须遵循两个协议：`ViewToPresenterAddTaskProtocol`（包含 View 可调用的方法）和
    `InteractorToPresenterAddTaskProtocol`（包含 Interactor 可调用的方法）。


    通过遵循第一个协议 `ViewToPresenterAddTaskProtocol`，View 将能够调用 `addTask` 方法并将包含用户想要创建的任务的对象传递给它。然后，Presenter
    将与 Interactor 通信，负责在数据库中创建该任务（见代码清单 5-45）。


    ```

    class AddTaskPresenter: ViewToPresenterAddTaskProtocol {

    var view: PresenterToViewAddTaskProtocol?

    var interactor: PresenterToInteractorAddTaskProtocol?

    var router: PresenterToRouterAddTaskProtocol?

    func addTask(task: TaskModel) {

    interactor?.addTask(task: task)

    }

    }

    代码清单 5-45

    遵循 ViewToPresenterAddTaskProtocol 的 AddTaskPresenter 类

    ```


    借助第二个协议 `InteractorToPresenterAddTaskProtocol`，Interactor 将能够告知 Presenter 它已经在数据库中创建了任务，因此
    Presenter 可以通知 Router 关闭 `AddTask` 视图（见代码清单 5-46）。


    ```

    extension AddTaskPresenter: InteractorToPresenterAddTaskProtocol {

    func addedTask() {

    router?.dismissFrom(view: view!)

    }

    }

