    Add Task screen


    ### App Development


    Before we start working with the different architectures in the next chapters,
    let’s first see how to prepare the application for it.


    #### Technologies Used


    For the development of this application with each of the architectures, Xcode
    13.3 and Swift 5.6 have been used.


    The database used is Apple’s own Core Data, and the views and navigation between
    them have been developed directly with code, without using .xib or .storyboard
    files.


    #### How to Remove Storyboard Dependence


