    ## Summary


    The VIPER architecture was developed keeping in mind the concept of Clean Architecture,
    in which the application is divided into different layers, each with well-defined
    responsibilities. This makes the code easily testable and also reusable.


    The decoupling and modularization of functionalities allow us to easily add new
    functions to our project.


    As we have seen at the beginning of this chapter, the VIPER architecture has numerous
    advantages, but also some disadvantages, such as presenting a certain complexity
    for small projects or presenting a lot of repetitive code (the creation of this
    repetitive code in VIPER can be facilitated and automated using one of the multiple
    templates for Xcode that can be found on the Internet).


    In the next chapter, we will see a new architecture that follows the principles
    of clean code: VIP (View–Interactor–Presenter). This architecture, which is starting
    to have quite a few followers, seeks to solve some of the situations that occurred
    in the VIPER architecture: for example, it simplifies the flow between components
    by making it unidirectional, while in VIPER it was bidirectional.


    Footnotes [1](#531999_1_En_5_Chapter.xhtml#Fn1_source)


    # 6. VIP: View–Interactor–Presenter


    ## What Is VIP?


    ### A Little History


    Around the year 2015, Raymond Law created what is known as Clean Swift^([^(12)](#fn12))
    or VIP (View–Interactor–Presenter) architecture with the idea of applying the
    Clean Architecture (as we saw in Chapter [1](#531999_1_En_1_Chapter.xhtml)) to
    projects for both iOS and macOS.


    The paradigm of this architecture is the unidirectional flow that occurs within
    the VIP cycle, that is, the information always flows in one direction: from the
    View to the Interactor, from the Interactor to the Presenter, and from the Presenter
    to the View.


    ### How It Works


    As we just explained, the core of this architecture lies in the one-way loop between
    the View, Interactor, and Presenter. However, the application of this architecture
    usually requires the presence of other components (although depending on the complexity
    of each screen, some may or may not be present): Router, Model, and Worker. Figure
    [6-1](#531999_1_En_6_Chapter.xhtml#Fig1) shows how components are connected.


    ![](images/531999_1_En_6_Chapter/531999_1_En_6_Fig1_HTML.png)


    A block diagram of the view interactor presenter schema, which flows from view
    to router and interactor with presenter, which further flows to worker and models.


    Figure 6-1


    VIP schema


    ### Components in VIP


    Now we are going to see in detail each of the components of this architecture.


    Note


    As we will see as we go through the study of the VIP architecture, the number
    of generated classes, repetitive code, and communication protocols is high. If
    you search the Internet, you will find numerous examples of templates, which,
    although they all refer to the VIP architecture, may present some variations in
    their nomenclature, functionalities… due to the fact that they are adapted to
    different projects.'
