    We’re here to put a dent in the universe. Otherwise, why else even be here?


    —Steve Jobs


    *They didn’t know it was impossible, so they did it.*


    —Mark Twain


    Introduction


    As we will see throughout the book, various architectural patterns have been developed
    to apply in the development of our applications – some well known (and older),
    such as MVC or MVVM, and others more innovative, such as VIPER or VIP.


    If you are just starting to develop applications or have been at it for some time,
    you have surely searched for information on how an application is built and what
    architecture pattern is the best to apply. But possibly you have also reached
    the same conclusion as me: from a global point of view, there is no perfect architecture
    pattern, they all have advantages and disadvantages, and it almost always depends
    on how we apply said pattern that our code is readable, testable, and scalable.


    In addition, you will also have noticed that an architecture pattern comes to
    mark some kind of application rules, but that later many developers adapt or modify
    it looking to improve its features or solve some of its possible drawbacks.


    ## Who Is This Book For?


    This book is aimed both at those developers who are starting now and who want
    to know what architecture patterns they can apply to their applications, as well
    as those developers who have been developing applications for some time but who
    want to know other possible architectures to apply.


    Therefore, this book is for you if what you want is


    *   Learn to develop applications following some of the architecture patterns
    explained


    *   Understand the advantages and disadvantages of each of the architecture patterns
    explained and choose the one that suits you best


    *   Understand the advantages of developing a readable, testable, and scalable
    code


    In this book I have not sought to delve into the use of each of the architectures
    explained, but rather to serve as a point of introduction to their use, to understand
    why they are important, and from here on you will be able to choose one or those
    that suit you best, know how to delve into them, apply them, and evolve in your
    career as a developer.


    ## How to Use This Book?


    Apart from a theoretical introduction to each of the architectural patterns presented
    (there are numerous articles for each of the architectures that we will cover
    that talk about their features, advantages, and disadvantages), this book is eminently
    practical. In Chapters [2](#531999_1_En_2_Chapter.xhtml)–[6](#531999_1_En_6_Chapter.xhtml)
    (MVC, MVP, MVVM, VIPER, and VIP architecture patterns), the development of an
    application (MyToDos) following each of these patterns is presented.


    For the sake of simplicity, although the main parts of the code are presented
    (depending on the concept explained), you will be able to observe omitted parts
    of the code (marked with “...”). However, you can find the full code for each
    of the projects in this book’s repository.


    Therefore, I am going to assume that you have some knowledge of both Swift and
    Xcode that should allow you to follow the course of the book without problems.


    Acknowledgments


    First of all, I would like to thank my family for their support, their words of
    encouragement, their inspiration… during the preparation and writing of this book
    and, in general, ever since. This book is dedicated to them.


    Second, I would like to thank the entire Apress team for the opportunity to write
    this book, starting with Aaron Black who contacted me and raised the possibility
    of writing a book on iOS development, and not forgetting Jessica Vakili and Nirmal
    Selvaraj for their great work in managing and editing this book.


    Learning is a journey that never ends, so I would also like to thank the work
    of all those who in one way or another teach us something new every day.


    Finally, thanks to you, reader. I hope that once you have read this book you consider
    it a wise decision and that, to a greater or lesser extent, it has helped you
    in your evolution as a developer.


    About the Author About the Technical Reviewer


    # 1. Introduction


    Assume the following situation: you and your team have received a new project
    to develop a mobile application. A project, whether it originates from our idea
    or is commissioned by a client, will present a series of specifications, functionalities,
    behaviors, etc.


    Continuing with our assumption, we are going to consider that all these specifications
    and functionalities have already been studied and transformed into user stories
    (i.e., how a functionality would be described from the point of view of a user:
    for example, “As a user, I want to login in the application”) and that we could
    already start developing the application by writing the first lines of code.


    It has happened to all of us that when we have a new project, we want to start
    writing code. However, if we work in this way, without proposing a project structure
    or taking into account the type of application, we can end up developing an application
    that works, but whose code is later difficult to maintain.


    To avoid this situation, before starting to write code we have to determine what
    structure we are going to give it, what the Software Architecture is going to
    be, and what architecture pattern is the most suitable for our project.


    Before starting to see the most used architecture patterns in the development
    of iOS applications, we are going to make an introduction to what Software Architecture
    is, what architecture patterns are, why their use is necessary, and how to choose
    the most suitable one for our projects.'
