    A screenshot of a window displays options for your new projects with the product
    name as My To Dos. The 3 options at the bottom are cancel, previous, and next.


    Figure 1-15


    Choose project options screen


    *   The next step is to indicate the name of the application (*Product Name*),
    select the development team and the organization identifier, and choose *Storyboard*
    as the interface, *Swift* as the language, and *Include Tests* (Figure [1-15](#531999_1_En_1_Chapter.xhtml#Fig15)).


    ![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig16_HTML.png)


    A window of the my to dos screen displays the configuration screen. On this screen,
    it highlights the removal of the main option in the deployment info.


    Figure 1-16


    Project configuration screen


    *   After creating the project, its configuration screen will appear. On this
    screen we must remove the “Main” option in the *Deployment Info* ➤ *Main Interface*
    section (Figure [1-16](#531999_1_En_1_Chapter.xhtml#Fig16)).


    ![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig17_HTML.png)


    A window displays the main tab under the my to dos folder. It displays a pop-up
    window requesting to move the main dot storyboard to the trash.


    Figure 1-17


    Remove Main.storyboard


    *   Then we delete the `Main.storyboard` file (Figure [1-17](#531999_1_En_1_Chapter.xhtml#Fig17)).


    ![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig18_HTML.png)


    A window of the my to dos folder highlights the storyboard name option under the
    info tab.


    Figure 1-18


    Remove storyboard reference from Info.plist


    *   Finally, we access the `Info.plist` file, display its content, and remove
    the Storyboard Name line: *Information Property List* ➤ *Application Scene Manifest*
    ➤ *Scene Configuration* ➤ *Application Session Role* ➤ *Item 0* ➤ *Storyboard
    Name* (Figure [1-18](#531999_1_En_1_Chapter.xhtml#Fig18)).


    *   When working with a storyboard, the window property is automatically initialized
    and the root view controller is set as the initial view controller in the storyboard.
    When removing the storyboard, we will have to do it ourselves.


    This is done in the `SceneDelegate.swift` file, modifying the content of the function


    ```

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:
    UIScene.ConnectionOptions) {

    guard let _ = (scene as? UIWindowScene) else {

    return

    }

    }

    ```


    by this code (this part of the code can be modified depending on the needs of
    our application):


    ```

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:
    UIScene.ConnectionOptions) {

    if let windowScene = scene as? UIWindowScene {

    let window = UIWindow(windowScene: windowScene)

    window.rootViewController = ViewController()

    window.makeKeyAndVisible()

    self.window = window

    }

    }

    ```


    #### Core Data Configuration


    In this application we will use Apple’s database, Core Data, but we have not selected
    it when setting up the project so that we can use our own database management
    class.'
  trans: "\n### 任务列表界面\n\n此界面通过选择首页中显示的某个列表进行导航。如果我们尚未创建任何任务，则会显示一个“空状态”提示，说明如何创建任务（图\
    \ 1-8）。\n\n![](img/531999_1_En_1_Fig8_HTML.png)\n\n*图 1-8* – 任务列表空状态\n\n用户可以在该界面上的三个位置进行交互：\n\
    \n![](img/531999_1_En_1_Fig9_HTML.png)\n\n*图 1-9* – 添加了任务后的任务列表界面\n\n*   使用*添加任务*按钮，该按钮允许我们创建一个新任务（图\
    \ 1-9）。\n*   选择每个任务右侧的圆圈，可将其标记为已完成（图 1-10）。\n*   在列表中使用滑动手势删除任务（图 1-11）。\n\n![](img/531999_1_En_1_Fig11_HTML.png)\n\
    \n*图 1-11* – 删除任务\n\n![](img/531999_1_En_1_Fig10_HTML.png)\n\n*图 1-10* – 任务被标记为已完成\n\
    \n在此界面上的任何修改（更改任务状态或删除任务）都会自动保存到数据库中。\n\n如果用户想要不创建任何任务就返回首页，只需选择屏幕左上角的返回箭头按钮即可。\n\
    \n### 添加任务界面\n\n此界面通过任务列表界面上的*添加任务*按钮进行导航，并以模态形式显示。在此，用户需要指定任务的标题，并从显示的任务列表中选择一个图标。\n\
    \n当你选择*添加任务*按钮时，输入的信息会保存到数据库（Core Data）中，然后你会返回到任务列表界面。\n\n如果用户想要不创建任何任务就返回任务列表界面，只需将屏幕向下拖动即可（图\
    \ 1-12）。\n\n![](img/531999_1_En_1_Fig12_HTML.png)\n\n*图 1-12* – 添加任务界面\n\n###\
    \ 应用程序开发\n\n在我们开始学习后续章节中不同的架构之前，首先来看看如何为此准备应用程序。\n\n#### 使用的技术\n\n为了使用每种架构开发此应用程序，我们使用了\
    \ Xcode 13.3 和 Swift 5.6。\n\n所使用的数据库是 Apple 自带的 Core Data，并且视图以及视图之间的导航是直接通过代码开发的，没有使用\
    \ `.xib` 或 `.storyboard` 文件。\n\n#### 如何移除对 Storyboard 的依赖\n\n要开发不使用 storyboard\
    \ 的应用程序（使用不同的架构），我们需要执行以下操作：\n\n![](img/531999_1_En_1_Fig13_HTML.png)\n\n*图 1-13*\
    \ – 欢迎使用 Xcode 界面\n\n*   首先，我们打开 Xcode 并选择*创建一个新的 Xcode 项目*选项（图 1-13）。\n\n![](img/531999_1_En_1_Fig14_HTML.png)\n\
    \n*图 1-14* – App 模板选择界面\n\n*   接下来，在 iOS 部分选择*App* 模板（图 1-14）。\n\n![](img/531999_1_En_1_Fig15_HTML.png)\n\
    \n*图 1-15* – 选择项目选项界面\n\n*   下一步是指定应用程序的名称（*产品名称*），选择开发团队和组织标识符，然后选择 *Storyboard*\
    \ 作为界面，*Swift* 作为语言，并勾选*包含测试*（图 1-15）。\n\n![](img/531999_1_En_1_Fig16_HTML.png)\n\
    \n*图 1-16* – 项目配置界面\n\n*   创建项目后，其配置界面将会出现。在此界面上，我们必须移除 *Deployment Info* ➤ *Main\
    \ Interface* 部分中的“Main”选项（图 1-16）。\n\n![](img/531999_1_En_1_Fig17_HTML.png)\n\n\
    *图 1-17* – 移除 `Main.storyboard`\n\n*   然后，我们删除 `Main.storyboard` 文件（图 1-17）。\n\
    \n![](img/531999_1_En_1_Fig18_HTML.png)\n\n*图 1-18* – 从 `Info.plist` 中移除 storyboard\
    \ 引用\n\n*   最后，我们访问 `Info.plist` 文件，展开其内容，并移除 Storyboard Name 这一行：*Information\
    \ Property List* ➤ *Application Scene Manifest* ➤ *Scene Configuration* ➤ *Application\
    \ Session Role* ➤ *Item 0* ➤ *Storyboard Name*（图 1-18）。\n\n*   当使用 storyboard\
    \ 时，`window` 属性会自动初始化，并且根视图控制器会被设置为 storyboard 中的初始视图控制器。移除 storyboard 后，我们需要自己完成这项工作。\n\
    \n这需要在 `SceneDelegate.swift` 文件中完成，修改函数的内容\n\n```swift\nfunc scene(_ scene: UIScene,\
    \ willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
    \ {\n    guard let _ = (scene as? UIWindowScene) else {\n        return\n    }\n\
    }\n```\n\n替换为以下代码（这部分代码可以根据我们应用程序的需求进行修改）：\n\n```swift\nfunc scene(_ scene: UIScene,\
    \ willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
    \ {\n    if let windowScene = scene as? UIWindowScene {\n        let window =\
    \ UIWindow(windowScene: windowScene)\n        window.rootViewController = ViewController()\n\
    \        window.makeKeyAndVisible()\n        self.window = window\n    }\n}\n\
    ```\n\n#### Core Data 配置\n\n在此应用程序中，我们将使用 Apple 的数据库 Core Data，但在设置项目时我们没有选择它，以便我们可以使用自己的数据库管理类。\n"
- fmt: "# How to Create Database and Entities\n\nTo do this we will start by creating\
    \ the database model and its entities:\n\n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig20_HTML.png)\n\
    \nA window to create a data model from core data. After clicking next, save it\
    \ as `ToDoList` and then choose the create option.\n\n**Figure 1-20** Create a\
    \ Data Model file\n\n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig19_HTML.png)\n\
    \nA window of the choose a template for the new file. It highlights the data model\
    \ under core data of the iOS tab. The 3 options at the bottom are cancel, previous,\
    \ and next.\n\n**Figure 1-19** Select Data Model file template\n\n- In the main\
    \ menu of Xcode, we select *File* ➤ *New* ➤ *File…*. In the templates menu that\
    \ appears, descend to the *Core Data* section and select *Data Model* (Figure\
    \ [1-19](#531999_1_En_1_Chapter.xhtml#Fig19)).\n- Next, we give the file a name\
    \ (in this case `ToDoList`) and create it (Figure [1-20](#531999_1_En_1_Chapter.xhtml#Fig20)).\n\
    \n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig22_HTML.png)\n\nA window to\
    \ create task entity in the core data.\n\n**Figure 1-22** Creation of the Task\
    \ entity\n\n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig21_HTML.png)\n\n\
    A window to create a tasklist from core data and add the two entities with the\
    \ properties.\n\n**Figure 1-21** Creation of the TasksList entity\n\n- Now we\
    \ are going to create the entities that we will use in the application, `TasksList`\
    \ and `Task`. To do this, we select the `ToDoList.xcdatamodeld` file and add the\
    \ two entities mentioned with the properties shown in Figure [1-21](#531999_1_En_1_Chapter.xhtml#Fig21)\
    \ and Figure [1-22](#531999_1_En_1_Chapter.xhtml#Fig22).\n- By creating the entities,\
    \ we have also created a 1-*n* relationship between them. That is, a list can\
    \ be related to multiple tasks, but a task can only be related to one list.\n\n\
    Once the entities are created, we can use Xcode to generate the code that manages\
    \ these entities (as `NSManagedObject` subclasses). To do this, we select the\
    \ `ToDoList.xcdatamodeld` file and, in the main Xcode menu, select *Editor* ➤\
    \ *Create NSManagedObject Subclass…* (Figure [1-23](#531999_1_En_1_Chapter.xhtml#Fig23)).\n\
    \n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig23_HTML.png)\n\nA window to\
    \ create NSManagedObject subclasses in the core data.\n\n**Figure 1-23** Create\
    \ NSManagedObject subclasses for our entities\n\nIn this way, four files are generated\
    \ (two for each of the entities):\n\n```\nTask+CoreDataClass.swift\nTask+CoreDataProperties.swift\n\
    TasksList+CoreDataClass.swift\nTasksList+CoreDataProperties.swift\n```\n\nOnce\
    \ these files have been generated, we can now use the entities in our project.\n\
    \n## Create CoreDataManager\n\nNow, we just need to create our class (`CoreDataManager.swift`)\
    \ to manage the Core Data stack of our application. As shown in the following\
    \ code, this class allows us to access the main context and to be able to save\
    \ it:\n\n```swift\nimport Foundation\nimport CoreData\n\nclass CoreDataManager\
    \ {\n    static let shared = CoreDataManager()\n    \n    init() {}\n    \n  \
    \  lazy var persistentContainer: NSPersistentContainer = {\n        let container\
    \ = NSPersistentContainer(name: \"ToDoList\")\n        container.loadPersistentStores\
    \ { _, error in\n            if let error = error {\n                fatalError(\"\
    Unable to load persistent stores: \\(error)\")\n            }\n        }\n   \
    \     return container\n    }()\n    \n    lazy var mainContext: NSManagedObjectContext\
    \ = {\n        return persistentContainer.viewContext\n    }()\n    \n    func\
    \ saveContext() {\n        saveContext(mainContext)\n    }\n    \n    func saveContext(_\
    \ context: NSManagedObjectContext) {\n        if context.parent == mainContext\
    \ {\n            saveDerivedContext(context)\n            return\n        }\n\
    \        \n        context.perform {\n            do {\n                try context.save()\n\
    \            } catch let error as NSError {\n                fatalError(\"Error:\
    \ \\(error.localizedDescription)\")\n            }\n        }\n    }\n    \n \
    \   func saveDerivedContext(_ context: NSManagedObjectContext) {\n        context.perform\
    \ { [self] in\n            do {\n                try context.save()\n        \
    \    } catch let error as NSError {\n                fatalError(\"Error: \\(error.localizedDescription)\"\
    )\n            }\n            saveContext(mainContext)\n        }\n    }\n}\n\
    ```\n\n## Summary\n\nFor this chapter, we are going to make a summary of what\
    \ we have worked on, and that we can divide into two blocks:\n\n- In the first\
    \ part, we have focused on how to structure and build an application efficiently,\
    \ so we have studied:\n    - What is Software Architecture, what are architecture\
    \ patterns, and why is it convenient to use them when developing an application\n\
    \    - What is considered Clean Architecture and the advantages of its use\n-\
    \ In the second part of the chapter, we have focused on the example application\
    \ that we will use to work with different architecture patterns:\n    - We have\
    \ seen a general description of what the application will be like, the different\
    \ screens that make it up, and its functionality.\n    - We have seen how we can\
    \ develop an application that works without a storyboard.\n    - We have created\
    \ a database with Core Data, we have created the entities that we will use for\
    \ our data, and, finally, we have established a class to handle the stack of the\
    \ Core Data.\n\nFootnotes [1](#531999_1_En_1_Chapter.xhtml#Fn1_source) [2](#531999_1_En_1_Chapter.xhtml#Fn2_source)\n\
    \n# 2. MVC: Model–View–Controller\n\n## What Is MVC?\n\n### A Little History\n\
    \nThe Model–View–Controller (MVC) pattern was introduced by Trygve Reenskaug for\
    \ the Smalltalk-76 programming language in the late 1970s. As Reenskaug wrote:\
    \ [`https://folk.universitetetioslo.no/trygver/`](https://folk.universitetetioslo.no/trygver/).\n\
    \n> I created the Model-View-Controller pattern as an obvious solution to the\
    \ general problem of giving users control over their information as seen from\
    \ multiple perspectives.\n\nIn this first version, the user interacted through\
    \ the View, which sent the actions to the Controller, and this, in turn, updated\
    \ the Model (data) and redrew the View. The Model notified the View when it was\
    \ updated and received the new state of the View (Figure [2-1](#531999_1_En_2_Chapter.xhtml#Fig1)).\n\
    \n![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig1_HTML.png)\n\nA block diagram\
    \ represents 3 blocks labeled view, controller, and model. It illustrates the\
    \ communication of user action and renders between the collector and view. Notification\
    \ and getting updates of state between view and model, and the updates from the\
    \ controller to model.\n\n**Figure 2-1** Original Model–View–Controller schema"
