  raw: '##### TasksListViewModel


    In the *TasksListViewModel*, we will have the logic that will manage this screen
    of the application and in which we will establish the inputs and outputs to which
    we will bind from the *TaskListView* (Listing [4-26](#531999_1_En_4_Chapter.xhtml#PC33)).


    ```

    class TaskListViewModel {

    var output: Output!

    var input: Input!

    struct Input {

    let reload: PublishRelay

    let deleteRow: PublishRelay

    let updateRow: PublishRelay

    }

    struct Output {

    let hideEmptyState: Driver

    let tasks: Driver

    let pageTitle: Driver

    }

    ...

    }

    Listing 4-26

    Setting the inputs and outputs of the TaskListViewModel

    ```


    Now, as in the previous cases, we set them in the initialization of the *TaskListViewModel*
    (Listing [4-27](#531999_1_En_4_Chapter.xhtml#PC34)).


    ```

    class TaskListViewModel {

    ...

    init(tasksListModel: TasksListModel,

    taskService: TaskServiceProtocol,

    tasksListService: TasksListServiceProtocol) {

    self.tasksListModel = tasksListModel

    self.taskService = taskService

    self.tasksListService = tasksListService

    // Inputs

    let reload = PublishRelay()

    _ = reload.subscribe(onNext: { [self] _ in

    fetchTasks()

    })

    let deleteRow = PublishRelay()

    _ = deleteRow.subscribe(onNext: { [self] indexPath in

    deleteTaskAt(indexPath: indexPath)

    })

    let updateRow = PublishRelay()

    _ = updateRow.subscribe(onNext: { [self] indexPath in

    updateTaskAt(indexPath: indexPath)

    })

    input = Input(reload: reload, deleteRow: deleteRow, updateRow: updateRow)

    // Outputs

    let items = tasks

    .asDriver(onErrorJustReturn: [])

    let hideEmptyState = tasks

    .map({ items in

    return !items.isEmpty

    })

    .asDriver(onErrorJustReturn: false)

    let pageTitle = pageTitle

    .asDriver(onErrorJustReturn: "")

    output = Output(hideEmptyState: hideEmptyState, tasks: items, pageTitle: pageTitle)

    ...

    }

    ...

    }

    Listing 4-27

    Establishment of the behavior of the parameters associated with the inputs and
    outputs

    ```


    The *input.reload* parameter will execute the method that fetches the tasks recorded
    in the database.


    The *input.deleteRow* parameter will receive the position in the table of the
    cell we want to delete (as *IndexPath*) and will execute the corresponding *TaskService*
    method.


    The *input.updateRow* parameter will receive the position in the table of the
    cell that we want to update (as *IndexPath*) and will execute the corresponding
    *TaskService* method.


    The parameter *output.hideEmptyState* will emit a boolean that will be true if
    there are tasks in the list and false if there are not.


    The *output.tasks* parameter will emit an array with the tasks that form a list
    (as a *TaskModel*), each time it receives them from the database.


    The *output.pageTitle* parameter is in charge of passing the title of the task
    list.


    Finally, we establish the methods that allow us to access the model (the database),
    as shown in Listing [4-28](#531999_1_En_4_Chapter.xhtml#PC35).


    ```

    class TaskListViewModel {

    ...

    private var tasksListModel: TasksListModel!

    private var taskService: TaskServiceProtocol!

    private var tasksListService: TasksListServiceProtocol!

    let tasks = BehaviorRelay(value: [])

    let pageTitle = BehaviorRelay(value: "")

    init(tasksListModel: TasksListModel,

    taskService: TaskServiceProtocol,

    tasksListService: TasksListServiceProtocol) {

    ...

    NotificationCenter.default.addObserver(self,

    selector: #selector(contextObjectsDidChange),

    name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,

    object: CoreDataManager.shared.mainContext)

    }

    @objc func contextObjectsDidChange() {

    fetchTasks()

    }

    func fetchTasks() {

    guard let list = tasksListService.fetchListWithId(tasksListModel.id) else { return
    }

    let orderedTasks = list.tasks.sorted(by: { $0.createdAt.compare($1.createdAt)
    == .orderedDescending })

    tasks.accept(orderedTasks)

    pageTitle.accept(list.title)

    }

    func deleteTaskAt(indexPath: IndexPath) {

    taskService.deleteTask(tasks.value[indexPath.row])

    }

    func updateTaskAt(indexPath: IndexPath) {

    var taskToUpdate = tasks.value[indexPath.row]

    taskToUpdate.done.toggle()

    taskService.updateTask(taskToUpdate)

    }

    }

    Listing 4-28

    Relationship between the ViewModel and the Model

    ```


    As you can see, by initializing this class we set the database change watcher.
    In this way, every time there is a change, the *fetchTasks* function will be called,
    which will be in charge of calling the database (through the *TaskListService*),
    it will order the tasks by creation date, and then, it will pass the corresponding
    values to the Observables that we have created so that the View is updated according
    to the new data.


    #### Add Task Screen


    This screen is responsible for adding tasks to a given list and the communication
    between its components is shown in Figure [4-14](#531999_1_En_4_Chapter.xhtml#Fig14).


    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig14_HTML.png)


    A block diagram illustrates the flow of communication from the task service to
    the add task view controller through the add task view model and the add task
    view, from bottom to top. It also indicates the communication between the add
    task view controller and task list view controller, and the add task view and
    the icon selector view.


    Figure 4-14


    Add task screen components communication schema


    ##### AddTaskViewController


    In this case, *AddTaskViewController* is in charge of receiving the *taskListModel*
    object in its initialization (with the list of tasks in which we want to add new
    tasks) and of instantiating the *AddTaskViewModel* (passing it the list of tasks
    and an instance of the *TaskService*), and later passing it to the view (Listing
    [4-29](#531999_1_En_4_Chapter.xhtml#PC36)).


    ```

    class AddTaskViewController: UIViewController {

    private var addTaskView: AddTaskView!

    private var tasksListModel: TasksListModel!

    init(tasksListModel: TasksListModel) {

    super.init(nibName: nil, bundle: nil)

    self.tasksListModel = tasksListModel

    }

    ...

    private func setupAddTaskView() {

    let viewModel = AddTaskViewModel(tasksListModel: tasksListModel, taskService:
    TaskService())

    addTaskView = AddTaskView(viewModel: viewModel)

    addTaskView.delegate = self

    self.view = addTaskView

    }

    }

    Listing 4-29

    Setting AddTaskViewController code

    ```


    ##### AddTaskView


    The code for the *AddTaskView* is very similar to what we developed for the *AddListView*,
    as it contains a *UITextField* element, an *IconsSelectorView* element, and a
    *UIButton* element. Therefore, the code of the *bindViewToModel* method will be
    familiar to you (Listing [4-30](#531999_1_En_4_Chapter.xhtml#PC37)).


    ```

    func bindViewToModel(_ viewModel: AddTaskViewModel) {

    titleTextfield.rx.text

    .map({!($0?.isEmpty)!})

    .bind(to: addTaskButton.rx.isEnabled)

    .disposed(by: disposeBag)

    titleTextfield.rx.text

    .map({ $0! })

    .bind(to: viewModel.input.title )

    .disposed(by: disposeBag)

    addTaskButton.rx.tap

    .bind(to: viewModel.input.addTask)

    .disposed(by: disposeBag)

    iconSelectorView.selectedIcon

    .bind(to: viewModel.input.icon)

    .disposed(by: disposeBag)

    viewModel.output.dismiss

    .skip(1)

    .drive(onNext: { [self] in

    delegate?.addedTask()

    })

    .disposed(by: disposeBag)

    }

    Listing 4-30

    Binding elements between AddTaskView and AddTaskViewModel

    ```'
