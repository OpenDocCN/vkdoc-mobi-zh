- fmt: "# TaskListProtocols\n\nThe `TaskList` module is the most complex of the four\
    \ modules that make up the application since it allows greater interaction with\
    \ the user: updating and deleting tasks, navigating back to Home, or presenting\
    \ the task creation screen. For this reason, we will see that there are a greater\
    \ number of methods in the different communication protocols.\n\nIn the `TaskListProtocol`,\
    \ together with the `createScreen` method (which in this case we have modified\
    \ to pass the list of tasks that we want to show), we will have the `presentAddTaskOn`\
    \ method, to access the task creation screen. As you can see, we will pass the\
    \ list of tasks to which to add the created task, and the `popToHomeFrom` method,\
    \ which we must implement to return to Home (Listing [5-28](#531999_1_En_5_Chapter.xhtml#PC30)).\n\
    \n```\n// MARK: Router Input\nprotocol PresenterToRouterTaskListProtocol {\nstatic\
    \ func createScreenFor(list: TasksListModel) -> UIViewController\nfunc presentAddTaskOn(view:\
    \ PresenterToViewTaskListProtocol, forTaskList: TasksListModel)\nfunc popToHomeFrom(view:\
    \ PresenterToViewTaskListProtocol)\n}\n```\n\n*Listing 5-28* `PresenterToRouterTaskListProtocol`\
    \ code\n\nIf we now look at the two protocols that manage the communications between\
    \ View and Presenter, we can see that, in the case of the `ViewToPresenterTaskListProtocol`\
    \ protocol, we have a first method that is executed when the module is loaded\
    \ (`viewDidLoad`), four methods related to the fact that show and interact with\
    \ the task list (`numberOfRowsInSection`, `taskAt`, `deleteRowAt`, and `update`),\
    \ and two more methods related to button actions (`addTask` and `backAction`)\
    \ (Listing [5-29](#531999_1_En_5_Chapter.xhtml#PC31)).\n\n```\n// MARK: View Input\n\
    protocol ViewToPresenterTaskListProtocol {\nvar view: PresenterToViewTaskListProtocol?\
    \ { get set }\nvar interactor: PresenterToInteractorTaskListProtocol? { get set\
    \ }\nvar router: PresenterToRouterTaskListProtocol? { get set }\nfunc viewDidLoad()\n\
    func numberOfRowsInSection() -> Int\nfunc taskAt(indexPath: IndexPath) -> TaskModel\n\
    func deleteRowAt(indexPath: IndexPath)\nfunc update(task: TaskModel)\nfunc addTask()\n\
    func backAction()\n}\n```\n\n*Listing 5-29* `ViewToPresenterTaskListProtocol`\
    \ code\n\nRegarding the `PresenterToViewTaskListProtocol` protocol, it will give\
    \ us the methods that we must implement in the view, both to reload the data to\
    \ be displayed and to show or hide the `EmptyState` (Listing [5-30](#531999_1_En_5_Chapter.xhtml#PC32)).\n\
    \n```\n// MARK: View Output\nprotocol PresenterToViewTaskListProtocol {\nfunc\
    \ onFetchTasks()\nfunc showEmptyState()\nfunc hideEmptyState()\n}\n```\n\n*Listing\
    \ 5-30* `PresenterToViewTaskListProtocol` code\n\nFor the interaction between\
    \ the Interactor and the Presenter, we will use two protocols. The first, `InteractorToPresenterTaskListProtocol`,\
    \ indicates the methods that the Interactor must implement, all related to the\
    \ tasks: load, add, update, and delete (Listing [5-31](#531999_1_En_5_Chapter.xhtml#PC33)).\n\
    \n```\n// MARK: Interactor Input\nprotocol PresenterToInteractorTaskListProtocol\
    \ {\nvar presenter: InteractorToPresenterTaskListProtocol? { get set }\nfunc loadTasks()\n\
    func deleteTaskAt(indexPath: IndexPath)\nfunc updateTask(task: TaskModel)\nfunc\
    \ addTask()\n}\n```\n\n*Listing 5-31* `PresenterToInteractorTaskListProtocol`\
    \ code\n\nIn the second protocol, `InteractorToPresenterTaskListProtocol`, we\
    \ have the methods that we will implement in the Presenter and that will allow\
    \ us to access the database to obtain the tasks from a list or communicate with\
    \ the router so that it does not present the add tasks screen (Listing [5-32](#531999_1_En_5_Chapter.xhtml#PC34)).\n\
    \n```\n// MARK: Interactor Output\nprotocol InteractorToPresenterTaskListProtocol\
    \ {\nfunc fetchedTasks(tasks: [TaskModel])\nfunc addTaskTo(list: TasksListModel)\n\
    }\n```\n\n*Listing 5-32* `InteractorToPresenterTaskListProtocol` code\n\n## TaskListRouter\n\
    \nAs we already know, the `TaskListRouter` class must conform to the `PresenterToRouterTaskListProtocol`\
    \ protocol and implement its methods. These methods are the ones that will allow\
    \ us to create the module, present the task creation screen, and return to the\
    \ Home screen (Listing [5-33](#531999_1_En_5_Chapter.xhtml#PC35)).\n\n```\nclass\
    \ TaskListRouter: PresenterToRouterTaskListProtocol {\n    static func createScreenFor(list:\
    \ TasksListModel) -> UIViewController {\n        let presenter: ViewToPresenterTaskListProtocol\
    \ & InteractorToPresenterTaskListProtocol = TaskListPresenter()\n        let viewController\
    \ = TaskListViewController()\n        viewController.presenter = presenter\n \
    \       viewController.presenter.router = TaskListRouter()\n        viewController.presenter?.view\
    \ = viewController\n        viewController.presenter?.interactor = TaskListInteractor(taskList:\
    \ list, taskService: TaskService())\n        viewController.presenter?.interactor?.presenter\
    \ = presenter\n        return viewController\n    }\n    \n    func presentAddTaskOn(view:\
    \ PresenterToViewTaskListProtocol, forTaskList: TasksListModel) {\n        let\
    \ addTaskController = AddTaskRouter.createScreenFor(list: forTaskList)\n     \
    \   let viewController = view as! TaskListViewController\n        addTaskController.modalPresentationStyle\
    \ = .pageSheet\n        viewController.present(addTaskController, animated: true)\n\
    \    }\n    \n    func popToHomeFrom(view: PresenterToViewTaskListProtocol) {\n\
    \        let viewController = view as! TaskListViewController\n        viewController.navigationController?.popViewController(animated:\
    \ true)\n    }\n}\n```\n\n*Listing 5-33* Implementation of `PresenterToRouterTaskListProtocol`\
    \ on `TaskListRouter`\n\n## TaskListViewController\n\nThe `TaskListViewController`\
    \ is in charge of showing us on the screen the tasks that belong to a certain\
    \ list (or an `EmptyState` in case there is none). This screen presents numerous\
    \ possibilities for interaction with the user: delete or update a task, press\
    \ the \"Add task\" button, or press the button to return to Home.\n\nAll these\
    \ actions, and some more (such as configuring the different cells of the table\
    \ or knowing the number of rows in a table), will be transmitted to the Presenter\
    \ thanks to the presenter variable that is of the `ViewToPresenterTaskListProtocol`\
    \ type (Listing [5-34](#531999_1_En_5_Chapter.xhtml#PC36)).\n\n```\nclass TaskListViewController:\
    \ UIViewController {\n    ...\n    var presenter: ViewToPresenterTaskListProtocol!\n\
    \    ...\n}\n\nprivate extension TaskListViewController {\n    ...\n    @objc\
    \ func backAction() {\n        presenter.backAction()\n    }\n    ...\n    @objc\
    \ func addTaskAction() {\n        presenter?.addTask()\n    }\n}\n\nextension\
    \ TaskListViewController: UITableViewDelegate, UITableViewDataSource {\n    ...\n\
    \    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int)\
    \ -> Int {\n        return presenter.numberOfRowsInSection()\n    }\n    \n  \
    \  func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
    \ -> UITableViewCell {\n        let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ TaskCell.reuseId, for: indexPath) as! TaskCell\n        cell.setParametersForTask(presenter.taskAt(indexPath:\
    \ indexPath))\n        cell.delegate = self\n        return cell\n    }\n    ...\n\
    \    func tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,\
    \ forRowAt indexPath: IndexPath) {\n        if editingStyle == .delete {\n   \
    \         presenter.deleteRowAt(indexPath: indexPath)\n        }\n    }\n}\n\n\
    extension TaskListViewController: TaskCellDelegate {\n    func updateTask(_ task:\
    \ TaskModel) {\n        presenter.update(task: task)\n    }\n}\n```\n\n*Listing\
    \ 5-34* `TaskListViewController` code\n\nOn the other hand, the `TaskListViewController`\
    \ must implement the `PresenterToViewTaskListProtocol` protocol, so that the Presenter\
    \ can make the necessary calls that update the View (such as reloading the task\
    \ list or showing/hiding the `EmptyState`) (Listing [5-35](#531999_1_En_5_Chapter.xhtml#PC37)).\n\
    \n```\nextension TaskListViewController: PresenterToViewTaskListProtocol {\n \
    \   func onFetchTasks() {\n        tableView.reloadData()\n    }\n    \n    func\
    \ showEmptyState() {\n        emptyState.isHidden = false\n    }\n    \n    func\
    \ hideEmptyState() {\n        emptyState.isHidden = true\n    }\n}\n```\n\n*Listing\
    \ 5-35* `TaskListViewController` must implement `PresenterToViewTaskListProtocol`\
    \ methods"
