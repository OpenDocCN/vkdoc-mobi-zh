- fmt: '# Summary


    Similar to what we did with the MVP architecture, in the MVVM architecture we
    have freed the Controller from the business logic, which we pass to the ViewModel.
    But unlike in the MVP architecture, the ViewModel is not aware of the existence
    of the View, which leads to further decoupling.


    At the end of this chapter, we have also seen how to further reduce the code in
    the Controller by passing all the navigation logic to a new class: the Coordinator.
    This allows the Controller to be reused.


    On the one hand, the Data Binding process can be excessive if we are developing
    a small application (or we are simply making a prototype of our app), and, on
    the other, the use of libraries such as RxSwift can increase the size of the applications
    and their performance, and in addition, they present a certain learning curve
    to apply them conveniently.


    Still, the MVVM (and MVVM-C) architecture has many fans, thanks to the separation
    of responsibilities and ease of use.


    In the next chapter, we will see the VIPER architecture that is being used more
    and more and that fully respects the use of SOLID principles and the separation
    of responsibilities, allowing for more modular applications, with cleaner code,
    and easier to maintain.


