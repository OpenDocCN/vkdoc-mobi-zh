  trans: '

    # 视图（UIViewController）


    我们可以将视图（+`UIViewController`）视为每个 VIP 循环的起点和终点（它将信息和事件传递给交互器，并接收来自展示器的响应）：


    - `UIViewController` 管理场景，并持有对视图的强引用。

    - 每个 `UIViewController` 都持有对交互器和路由器的强引用。

    - 视图中发生的事件将传递给交互器。

    - 视图从展示器接收数据，因为 `UIViewController` 必须遵守展示器用于发送信息的协议。


    例如，下面的初始代码展示了如何呈现一个场景的 ViewController 和视图（我们应用程序的*首页*屏幕）（清单 6-1 和清单 6-2）。


    ```swift

    import UIKit

    protocol HomeViewDelegate: AnyObject {}

    final class HomeView: UIView {

    var delegate: HomeSceneViewDelegate?

    }

    ```


    *清单 6-2：视图定义了连接到 ViewController 的协议*


    ```swift

    import UIKit

    protocol HomeViewControllerInput: AnyObject {}

    protocol HomeViewControllerOutput: AnyObject {}

    final class HomeViewController: UIViewController {

    var interactor: HomeInteractorInput?

    var router: HomeRoutingDelegate?

    }

    extension HomeViewController: HomeViewControllerInput {}

    extension HomeViewController: HomeViewDelegate {}

    ```


    *清单 6-1：ViewController 类包含 Input 协议以及对交互器、路由器和视图的引用*


    # 交互器


    交互器负责管理视图请求，获取必要的数据（无论是来自数据库还是网络），并将其传递给展示器：


    - 交互器包含每个场景的业务逻辑。

    - 根据视图的请求，交互器会连接一个或多个工作者/服务（我们稍后将看到，它们负责获取数据）。

    - 交互器持有对展示器的强引用。

    - 交互器必须遵守视图用于发送事件的协议。


    在清单 6-3 中，您可以看到我们开始处理 `HomeInteractor` 的基础代码。


    ```swift

    import Foundation

    protocol HomeInteractorOutput: AnyObject {}

    typealias HomeInteractorInput = HomeInteractorOutput

    final class HomeInteractor {

    var presenter: HomePresenterInput?

    }

    ```


    *清单 6-3：交互器类定义其输出协议*


    # 展示器


    展示器（清单 6-4）的功能是接收来自交互器的信息，并将其转换为视图可以呈现的信息（即，我们将信息转换为 ViewModel）：


    - 展示器包含展示逻辑。

    - 它持有对视图的弱引用（视图充当展示器的输出）。

    - 展示器将交互器的结果转换为视图可渲染的对象。


    ```swift

    import UIKit

    typealias HomePresenterInput = HomeInteractorOutput

    typealias HomePresenterOutput = HomeViewControllerInput

    final class HomePresenter {

    weak var viewController: HomePresenterOutput?

    }

    extension HomePresenter: HomePresenterInput {}

    ```


    *清单 6-4：在展示器代码中，我们将 `HomeInteractorOutput` 和 `HomeViewControllerInput` “重命名”为“展示器”命名规范*


    # 路由器


    路由器是负责在 ViewController 之间导航并在它们之间传递信息的组件（清单 6-5）：


    - 路由器包含导航逻辑（这使得我们将其从 ViewController 中移除）。

    - 它持有对视图（ViewController）的弱引用。

    - 这是一个可选组件，因为一个场景的 ViewController 可能没有导航选项。


    ```swift

    protocol HomeRouterDelegate {}

    final class HomeRouter {

    weak var source: UIViewController?

    }

    extension HomeRouter: HomeRouterDelegate {}

    ```


    *清单 6-5：`HomeSceneRouterLogic` 结构代码*


    # 工作者/服务


    工作者/服务是一个抽象类，主要负责数据库信息检索操作、API 请求和文件下载：


    - 每个工作者/服务应具有单一功能（单一职责原则）。

    - 一个交互器可以调用一个或多个工作者/服务。

    - 它们必须是通用的，以便可以被不同的交互器使用。


    # 模型


    在 VIP 循环中，信息沿一个方向流动：从视图到交互器（以请求的形式），从交互器到展示器（作为响应），再回到视图（作为 ViewModel）。因此，使用与场景相关并包含（清单
    6-6）的模型是非常成熟的：


    - **请求模型**：包含允许交互器执行操作的参数。

    - **响应模型**：包含工作者获取并传递给展示器的适当数据。

    - **ViewModel 模型**：通常是原始类型的数据，传递给视图以更新它。


    ```swift

    enum HomeModel {

    enum Fetch {

    struct Request {}

    struct Response {}

    struct ViewModel {}

    }

    }

    ```


    *清单 6-6：VIP 循环的模型代码结构*


    # 配置器


    这是一个可选组件，但经常被大量使用，因为它允许我们初始化场景的组件并建立它们之间的关系（清单 6-7）：


    ```swift

    import UIKit

    final class HomeConfigurator {

    func configured(_ viewController: HomeViewController) -> HomeViewController {

    let interactor = HomeInteractor()

    let presenter = HomePresenter()

    let router = HomeRouter()

    router.viewController = viewController

    presenter.viewController = viewController

    interactor.presenter = presenter

    viewController.interactor = interactor

    viewController.router = router

    return viewController

    }

    }

    ```


    *清单 6-7：`HomeConfigurator` 类代码*


    > 注意：正如您在 VIPER 架构中所见，这里我们也使用了基于 Input/Output 术语的协议命名规范，以便于识别和使用。


    # VIP 的优点和缺点


    在开发项目时，VIP 架构有很多优点，因为它追求“干净架构”，但也存在一些缺点。


    ## 优点


    VIP 架构的主要优点如下：


    - 它基于干净架构的原则。

    - 它通过将所有逻辑传递给交互器来减小 ViewController 的规模。

    - 它呈现单向数据流。

    - 它是一种模块化且可重用的架构，因为大量使用协议允许对单个组件进行更改而不影响应用程序的其余部分。

    - 应用单一职责原则减少了所使用方法的大小，这也利于模块化。

    - 其结构易于维护，且任何错误都可以轻松纠正。

    - 单元测试的实现很简单，这有利于通过 TDD（测试驱动开发）进行开发以及应用程序的可测试性。


    ## 缺点


    VIP 架构也有缺点，例如：


    - 该架构基于大量协议，这可能一开始会让人感到困惑（可以通过使用模板来减少这种困惑）。

    - 使用如此多的协议使得编写大量代码成为必要，即使对于最简单的任务也是如此。

    - 大量的代码使其不适合小型应用程序。

    - 它可能看起来设计过度或过于复杂。

    - 因此，它可能对刚起步的开发者缺乏吸引力。

    '
- fmt: '### VIP Layers


    In a similar way to how we divided the project made with the VIPER architecture
    into folders in the previous chapter, with the VIP architecture we will do something
    similar, except that now instead of a folder with modules we have a folder with
    scenes.


    Each scene corresponds to a screen and contains the View (*UIView* and *UIViewController*),
    the Interactor, the Presenter, the Configurator, the Router, and the Model. We
    will also have a folder with the Services or Workers and, finally, a folder with
    common components (Figure [6-2](#531999_1_En_6_Chapter.xhtml#Fig2)).


    ![](images/531999_1_En_6_Chapter/531999_1_En_6_Fig2_HTML.jpg)


    A screenshot of the window of the VIP folder project highlights App Delegate.


    Figure 6-2 VIP folder project structure


    #### Scenes


    As we just discussed, the `Scenes` folder will contain a subfolder for each screen.
    Each of these subfolders has seven files. Thus, for example, in the case of the
    *Home* screen, we will have `HomeView`, `HomeViewController`, `HomePresenter`,
    `HomeInteractor`, `HomeRouter`, `HomeConfigurator`, and `HomeModel`.


    #### Services/Workers


    Here we will have the `TaskService` and `TasksListService` classes, which allow
    us to send information to the database (create, update, or delete it) or retrieve
    information from the database and transform it into models.


    #### Common


    ##### Core Data


    In this folder, we will have the `CoreDataManager.swift` file, along with the
    four files automatically created by Xcode for the database entities.


    ##### Components


    In this folder, we will have those visual elements that we will use in the different
    screens: labels, buttons, cells…


    ##### Models


    Here we have the models into which we can transform the database entities. In
    addition, we will create a protocol that the models must comply with, in order
    to transform from model to entity and vice versa.


    ##### Extensions


    In this case, we have created a `UIColor` extension to be able to easily access
    the colors created especially for this application and an extension to the `NSManagedObject`
    class that will prevent us from conflicting with contexts when we do the test
    part.


    ##### Helpers


    They contain the constant parameters that we will use in the application.


    ### MyToDos Application Screens


    As we have explained, the VIP architecture is based on the View–Interactor–Presenter
    cycle and on the unidirectional flow of information. From here, we will have other
    components that will help us with navigation, information retrieval… such as Router,
    Configurator, and Workers/Services, all of them interconnected through a series
    of protocols or interfaces.


    Like any architecture, if you investigate more about it you will see that the
    nomenclature of the protocols varies, they use workers or services or use cases,
    they use configurators or not… The idea is to know the basic idea of the architecture
    and use the format with which we are most comfortable.


    For example, in the nomenclature of protocols, I prefer to use the terminology
    Input/Output to indicate that they are input or output functions to a component.


    #### AppDelegate and SceneDelegate


    To start the application, in the `SceneDelegate` we will create the first scene,
    the *Home*, by instantiating the `HomeViewController` class (to which we pass
    an instance of the view, `HomeView`). Next, we configure the `HomeViewController`
    using the `HomeConfigurator` and pass it to the `UINavigationController` components,
    which will be the one that holds all the navigation of the application (Listing
    [6-8](#531999_1_En_6_Chapter.xhtml#PC8)).


    ```

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:
    UIScene.ConnectionOptions) {

    if let windowScene = scene as? UIWindowScene {

    let window = UIWindow(windowScene: windowScene)

    window.backgroundColor = .white

    let homeViewController = HomeViewController(homeView: HomeView())

    let navigationController = UINavigationController(rootViewController: HomeConfigurator.configure(homeViewController))

    navigationController.navigationBar.isHidden = true

    navigationController.interactivePopGestureRecognizer?.isEnabled = false

    window.rootViewController = navigationController

    self.window = window

    window.makeKeyAndVisible()

    }

    }

    ```

    Listing 6-8 Access to Home from `SceneDelegate`


    #### Home Scene


    In Figure [6-3](#531999_1_En_6_Chapter.xhtml#Fig3), we can see the different components
    that make up the *Home* Scene, how they are interconnected, the methods that are
    called, and the direction of the information flow.


    ![](images/531999_1_En_6_Chapter/531999_1_En_6_Fig3_HTML.png)


    A block diagram of the different components of the home scene consists of home
    router, home configuration, home view, home interactor, home presenter, and tasks
    list service.


    Figure 6-3 Home scene components and communication schema


    ##### HomeConfigurator


    The `HomeConfigurator` is in charge of taking an instance of the `HomeViewController`
    and establishing all the components of the scene and the dependencies between
    them.


    Thus, in this class, we will instantiate the `HomeInteractor` (to which we pass
    an instance of the `TasksListService`, which will be the worker or service that
    will allow us to access the database), the `HomePresenter`, and the `HomeRouter`.
    Next, we establish the relations of each one of them, to finally return the instance
    of the `HomeViewController` already configured (Listing [6-9](#531999_1_En_6_Chapter.xhtml#PC9)).


    ```

    final class HomeConfigurator {

    static func configure(_ viewController: HomeViewController) -> HomeViewController
    {

    let interactor = HomeInteractor(tasksListService: TasksListService())

    let presenter = HomePresenter()

    let router = HomeRouter()

    router.viewController = viewController

    presenter.viewController = viewController

    interactor.presenter = presenter

    viewController.interactor = interactor

    viewController.router = router

    return viewController

    }

    }

    ```

    Listing 6-9 `HomeConfigurator` code


    ##### HomeView


    The `HomeView` class contains the different elements that make up the graphical
    interface and that communicate with the `HomeViewController` in two different
    ways: directly to pass the task lists and display them in the table (`showTasksLists`)
    and through the methods of the `HomeViewDelegate` protocol, which must implement
    the `HomeViewController` (Listing [6-10](#531999_1_En_6_Chapter.xhtml#PC10)).


    ```

    import UIKit


    protocol HomeViewDelegate: AnyObject {

    func addList()

    func selectedListAt(index: IndexPath)

    func deleteListAt(indexPath: IndexPath)

    }


    final class HomeView: UIView {

    weak var delegate: HomeViewDelegate?

    ...

    func showTasks(lists: [TasksListModel]) {

    self.lists = lists

    tableView.reloadData()

    emptyState.isHidden = self.lists.count > 0

    }

    }


    private extension HomeView {

    ...

    @objc func addListAction() {

    delegate?.addList()

    }

    ...

    }


    extension HomeView: UITableViewDelegate {

    ...

    func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)
    {

    delegate?.selectedListAt(index: indexPath)

    }

    }


    extension HomeView: UITableViewDataSource {

    ...

    func tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,
    forRowAt indexPath: IndexPath) {

    if editingStyle == .delete {

    delegate?.deleteListAt(indexPath: indexPath)

    }

    }

    }

    ```

    Listing 6-10 `HomeView` class code showing `HomeViewDelegate` protocol and where
    their methods are called'
