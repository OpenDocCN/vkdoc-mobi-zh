- fmt: '##### `TaskListPresenter`


    `TaskListPresenter`是四个组件中最复杂的，因为它需要显示列表中的任务、管理任务的删除或更新，并观察新任务的添加。


    因此，在该类的初始化中，我们不仅必须传递视图，还必须传递包含待显示任务的`TaskListModel`对象，以及`TaskListService`和`TaskService`服务的实例，这将使我们能够与模型交互。


    我们将使用`TaskListService`从数据库中检索当前正在处理的任务列表，并使用`TaskService`来更新或删除指定任务。


    此外，我们需要为数据库的更改添加一个观察者（列表[3-20](#531999_1_En_3_Chapter.xhtml#PC21)）。


    ```

    class TasksListPresenter {

    ...

    init(taskListView: TaskListViewDelegate? = nil,

    tasksListModel: TasksListModel,

    taskService: TaskService,

    tasksListService: TasksListService) {

    self.taskListView = taskListView

    self.tasksListModel = tasksListModel

    self.taskService = taskService

    self.tasksListService = tasksListService

    NotificationCenter.default.addObserver(self,

    selector: #selector(contextObjectsDidChange),

    name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,

    object: CoreDataManager.shared.mainContext)

    }

    @objc func contextObjectsDidChange() {

    fetchTasks()

    }

    func fetchTasks() {

    guard let list = tasksListService.fetchListWithId(tasksListModel.id) else { return
    }

    tasksListModel = list

    tasks = tasksListModel.tasks.sorted(by: { $0.createdAt.compare($1.createdAt) ==
    .orderedDescending })

    taskListView?.reloadData()

    }

    ...

    }

    Listing 3-20

    TaskListPresenter initialization code

    ```


    在列表[3-21](#531999_1_En_3_Chapter.xhtml#PC22)中，您还可以看到`TaskListPresenter`与模型交互的代码。在本例中，`TaskListView`会将删除任务的操作传递给`TaskListPresenter`，由`TaskListPresenter`负责将其传达给模型。


    ```

    extension TasksListPresenter {

    func updateTask(_ task: TaskModel) {

    taskService.updateTask(task)

    }

    func removeTaskAtIndex(_ index: Int) {

    let task = taskAtIndex(index)

    taskService.deleteTask(task)

    tasks.remove(at: index)

    }

    }

    Listing 3-21

    TaskListPresenter code for interaction with TaskService

    ```


    ### 添加任务屏幕


    此屏幕负责向指定列表添加任务，其组件之间的通信如图[3-9](#531999_1_En_3_Chapter.xhtml#Fig9)所示。


    ![](images/531999_1_En_3_Chapter/531999_1_En_3_Fig9_HTML.png)


    添加任务屏幕组件的流程图包括：添加任务视图控制器、添加任务视图、添加任务演示器和任务服务。


    **图 3-9**


    添加任务屏幕组件通信示意图


    ##### `AddTaskViewController`


    与之前的控制器类似，在`AddTaskViewController`中会初始化`AddTaskPresenter`，并向其传递视图、要添加新任务的任务列表对象以及访问模型的`TaskService`服务（列表[3-22](#531999_1_En_3_Chapter.xhtml#PC23)）。


    ```

    private func setupAddTaskView() {

    let presenter = AddTaskPresenter(addTaskView: addTaskView,

    tasksListModel: tasksListModel,

    taskService: TaskService())

    addTaskView.delegate = self

    addTaskView.presenter = presenter

    self.view = addTaskView

    }

    Listing 3-22

    AddTaskPresenter instantiation in AddTaskViewController

    ```


    从导航的角度来看，此控制器仅负责在任务添加完成后关闭视图（因为此屏幕以模态方式呈现），如列表 3-23 所示。


    ```

    extension AddTaskViewController: AddedTaskViewControllerDelegate {

    func addedTask() {

    dismiss(animated: true)

    }

    }

    Listing 3-23

    AddedTaskViewControllerDelegate implementation in AddTaskViewController

    ```


    ##### `AddTaskView`


    在`AddTaskView`中，用户可以通过选择图标和添加标题来创建任务。所有这些信息都通过视图维护的对`AddTaskPresenter`的引用传递给`AddTaskPresenter`（列表[3-24](#531999_1_En_3_Chapter.xhtml#PC25)）。


    ```

    private extension AddTaskView {

    @objc func addTaskAction() {

    guard titleTextfield.hasText else { return }

    presenter.addTaskWithTitle(titleTextfield.text!)

    }

    }

    extension AddTaskView: IconSelectorViewDelegate {

    func selectedIcon(_ icon: String) {

    presenter.setTaskIcon(icon)

    }

    }

    Listing 3-24

    Presenter gets info from the view

    ```


    另一方面，一旦用户执行了添加任务的操作，`AddTaskPresenter`将调用`addedTask`方法（定义在`AddTaskViewDelegate`协议中，`AddTaskView`应该实现此方法）（列表[3-25](#531999_1_En_3_Chapter.xhtml#PC26)）。


    ```

    extension AddTaskView: AddTaskViewDelegate {

    func addedTask() {

    delegate?.addedTask()

    }

    }

    Listing 3-25

    AddTaskViewDelegate implementation in AddTaskView

    ```


    相应地，与`addedTask`方法相关的操作被委托给`AddTaskViewController`，正如我们刚才所见，它将移除屏幕。


    ##### `AddTaskPresenter`


    `AddTaskPresenter`负责创建任务并将其添加到列表中。在其初始化中，我们将传递`AddTaskView`（作为协议）、包含将添加新任务列表的`TaskListModel`对象以及`TaskService`，`TaskService`将是与模型层的连接，并允许我们将任务添加到数据库中。


    此外，与添加新任务列表时的操作类似，我们将初始化一个任务，稍后只需用标题和所选图标完成它（列表[3-26](#531999_1_En_3_Chapter.xhtml#PC27)）。


    ```

    class AddTaskPresenter {

    private var addTaskView: AddTaskViewDelegate?

    private var tasksListModel: TasksListModel!

    private var taskService: TaskService!

    private var task: TaskModel!

    init(addTaskView: AddTaskViewDelegate? = nil,

    tasksListModel: TasksListModel,

    taskService: TaskService) {

    self.addTaskView = addTaskView

    self.tasksListModel = tasksListModel

    self.taskService = taskService

    self.task = TaskModel(id: ProcessInfo().globallyUniqueString,

    icon: "checkmark.seal.fill",

    done: false,

    createdAt: Date())

    }

    func setTaskIcon(_ icon:  String) {

    task.icon = icon

    }

    func addTaskWithTitle(_ title: String) {

    task.title = title

    taskService.saveTask(task, in: tasksListModel)

    addTaskView?.addedTask()

    }

    Listing 3-26

    AddTaskPresenter code

    ```


    ### MVP-MyToDos 测试


    如果我们比较 MVC 架构和 MVP 架构，可以看到在 MVP 中，业务逻辑已从控制器转移到演示器，控制器中仅保留导航逻辑。因此，所有业务逻辑的测试都将转移到演示器上。


    我们现在来看看如何测试属于允许用户添加新列表的屏幕的组件。


    注意


    请记住，正如我们在第[2](#531999_1_En_2_Chapter.xhtml)章中提到的，尽管出于教学原因我们分别展示了代码和测试，但建议在开发应用程序时，我们应遵循
    TDD（测试驱动开发）方法论。


    #### `AddListViewController`


    正如我们刚刚讨论的，控制器仅处理导航。在本例中，我们将处理导航回主屏幕的操作（列表[3-27](#531999_1_En_3_Chapter.xhtml#PC28)）。


    ```

    class AddListViewControllerTest: XCTestCase {

    var sut: AddListViewController!

    var navigationController: MockNavigationController!

    override func setUpWithError() throws {

    sut = AddListViewController()

    navigationController = MockNavigationController(rootViewController: UIViewController())

    navigationController.pushViewController(sut, animated: false)

    navigationController.vcIsPushed = false

    }

    override func tearDownWithError() throws {

    sut = nil

    navigationController = nil

    super.tearDown()

    }

    func testPopVC_whenBackActionIsCalled_thenPopHomeCalled() {

    sut.navigateBack()

    XCTAssertTrue(navigationController.vcIsPopped)

    }

    }

    Listing 3-27

    AddListViewControllerTest code

    ```'
  raw: '##### TaskListPresenter


    The *TaskListPresenter* is the most complex of the four since it has to display
    the tasks that make up a list, manage the deletion or update of a task, as well
    as observe the addition of new tasks.


    Therefore, in the initialization of this class, we must pass not only the view
    but also the *TaskListModel* object with the tasks to be displayed, and instances
    to the *TaskListService* and *TaskService* services, which will allow us to interact
    with the Model.


    We’ll use the *TaskListService* to retrieve the list of tasks we’re working with
    from the database and the *TaskService* to update or delete a given task.


    In addition, we will need to add an observer for changes in the database (Listing
    [3-20](#531999_1_En_3_Chapter.xhtml#PC21)).


    ```

    class TasksListPresenter {

    ...

    init(taskListView: TaskListViewDelegate? = nil,

    tasksListModel: TasksListModel,

    taskService: TaskService,

    tasksListService: TasksListService) {

    self.taskListView = taskListView

    self.tasksListModel = tasksListModel

    self.taskService = taskService

    self.tasksListService = tasksListService

    NotificationCenter.default.addObserver(self,

    selector: #selector(contextObjectsDidChange),

    name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,

    object: CoreDataManager.shared.mainContext)

    }

    @objc func contextObjectsDidChange() {

    fetchTasks()

    }

    func fetchTasks() {

    guard let list = tasksListService.fetchListWithId(tasksListModel.id) else { return
    }

    tasksListModel = list

    tasks = tasksListModel.tasks.sorted(by: { $0.createdAt.compare($1.createdAt) ==
    .orderedDescending })

    taskListView?.reloadData()

    }

    ...

    }

    Listing 3-20

    TaskListPresenter initialization code

    ```


    In Listing [3-21](#531999_1_En_3_Chapter.xhtml#PC22), you can also see the code
    for the interaction of the *TaskListPresenter* with the Model. In this case, *TaskListView*
    will pass the delete task action to the *TaskListPresenter*, which will be in
    charge of communicating it to the Model.


    ```

    extension TasksListPresenter {

    func updateTask(_ task: TaskModel) {

    taskService.updateTask(task)

    }

    func removeTaskAtIndex(_ index: Int) {

    let task = taskAtIndex(index)

    taskService.deleteTask(task)

    tasks.remove(at: index)

    }

    }

    Listing 3-21

    TaskListPresenter code for interaction with TaskService

    ```


    #### Add Task Screen


    This screen is responsible for adding tasks to a given list and the communication
    between its components is shown in Figure [3-9](#531999_1_En_3_Chapter.xhtml#Fig9).


    ![](images/531999_1_En_3_Chapter/531999_1_En_3_Fig9_HTML.png)


    A flowchart of add task screen components consists of add task view controller,
    add task view, add task presenter, and task service.


    Figure 3-9


    Add task screen components communication schema


    ##### AddTaskViewController


    As in the case of the previous controllers, in the *AddTaskViewController* the
    *AddTaskPresenter* is initialized, to which the view is passed, the object of
    the list of tasks to which we want to add a new task, and the service with which
    to access the Model (*TaskService*) (Listing [3-22](#531999_1_En_3_Chapter.xhtml#PC23)).


    ```

    private func setupAddTaskView() {

    let presenter = AddTaskPresenter(addTaskView: addTaskView,

    tasksListModel: tasksListModel,

    taskService: TaskService())

    addTaskView.delegate = self

    addTaskView.presenter = presenter

    self.view = addTaskView

    }

    Listing 3-22

    AddTaskPresenter instantiation in AddTaskViewController

    ```


    From a navigation point of view, this Controller is only responsible for dismissing
    the View once a task has been added (since this screen is presented as a modal),
    as shown in Listing 3-23.


    ```

    extension AddTaskViewController: AddedTaskViewControllerDelegate {

    func addedTask() {

    dismiss(animated: true)

    }

    }

    Listing 3-23

    AddedTaskViewControllerDelegate implementation in AddTaskViewController

    ```


    ##### AddTaskView


    In *AddTaskView*, the user can create a task by selecting an icon and adding a
    title. All of this information is passed to the *AddTaskPresenter* through the
    reference the View maintains to it (Listing [3-24](#531999_1_En_3_Chapter.xhtml#PC25)).


    ```

    private extension AddTaskView {

    @objc func addTaskAction() {

    guard titleTextfield.hasText else { return }

    presenter.addTaskWithTitle(titleTextfield.text!)

    }

    }

    extension AddTaskView: IconSelectorViewDelegate {

    func selectedIcon(_ icon: String) {

    presenter.setTaskIcon(icon)

    }

    }

    Listing 3-24

    Presenter gets info from the view

    ```


    On the other hand, once the user performs the action of adding the task, the *AddTaskPresenter*
    will call the *addedTask* method (defined in the *AddTaskViewDelegate* protocol,
    and which *AddTaskVie*w should implement) (Listing [3-25](#531999_1_En_3_Chapter.xhtml#PC26)).


    ```

    extension AddTaskView: AddTaskViewDelegate {

    func addedTask() {

    delegate?.addedTask()

    }

    }

    Listing 3-25

    AddTaskViewDelegate implementation in AddTaskView

    ```


    In turn, the action related to the *addedTask* method is delegated to the *AddTaskViewController*
    which, as we just saw, will remove the screen.


    ##### AddTaskPresenter


    The *AddTaskPresenter* is in charge of creating and adding tasks to a list. In
    its initialization, we will pass the *AddTaskView* (as a protocol), the object
    (*TaskListModel*) that contains the list to which we will add the new task, and
    the *TaskService*, which will be the connection with the Model layer, and that
    will allow us to add the task in the database.


    Also, similar to how we did when adding a new task list, we will initialize a
    task that we only have to complete later with the title and the selected icon
    (Listing [3-26](#531999_1_En_3_Chapter.xhtml#PC27)).


    ```

    class AddTaskPresenter {

    private var addTaskView: AddTaskViewDelegate?

    private var tasksListModel: TasksListModel!

    private var taskService: TaskService!

    private var task: TaskModel!

    init(addTaskView: AddTaskViewDelegate? = nil,

    tasksListModel: TasksListModel,

    taskService: TaskService) {

    self.addTaskView = addTaskView

    self.tasksListModel = tasksListModel

    self.taskService = taskService

    self.task = TaskModel(id: ProcessInfo().globallyUniqueString,

    icon: "checkmark.seal.fill",

    done: false,

    createdAt: Date())

    }

    func setTaskIcon(_ icon:  String) {

    task.icon = icon

    }

    func addTaskWithTitle(_ title: String) {

    task.title = title

    taskService.saveTask(task, in: tasksListModel)

    addTaskView?.addedTask()

    }

    Listing 3-26

    AddTaskPresenter code

    ```


    ### MVP-MyToDos Testing


    If we compare the MVC architecture with the MVP, we can see that in the MVP the
    business logic has passed from the Controller to the Presenter, leaving only the
    navigation in the Controller. Therefore, all the testing of the business logic
    will have to be transferred to the Presenter.


    We are now going to see how the testing of the components belonging to the screen
    that allows the user to add a new list would be.


    Note


    Remember, as we indicated in Chapter [2](#531999_1_En_2_Chapter.xhtml), that although
    we show the code and the tests separately for pedagogical reasons, it is recommended
    that when developing our applications, we work according to the TDD (test-driven
    development) methodology.


    #### AddListViewController


    As we just discussed, the Controller only handles navigation. In this case, we
    will have the navigation back to the Home screen (Listing [3-27](#531999_1_En_3_Chapter.xhtml#PC28)).


    ```

    class AddListViewControllerTest: XCTestCase {

    var sut: AddListViewController!

    var navigationController: MockNavigationController!

    override func setUpWithError() throws {

    sut = AddListViewController()

    navigationController = MockNavigationController(rootViewController: UIViewController())

    navigationController.pushViewController(sut, animated: false)

    navigationController.vcIsPushed = false

    }

    override func tearDownWithError() throws {

    sut = nil

    navigationController = nil

    super.tearDown()

    }

    func testPopVC_whenBackActionIsCalled_thenPopHomeCalled() {

    sut.navigateBack()

    XCTAssertTrue(navigationController.vcIsPopped)

    }

    }

    Listing 3-27

    AddListViewControllerTest code

    ```'
