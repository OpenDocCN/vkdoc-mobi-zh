    \  }\n\n    func fetchTasksForList(_ taskList: TasksListModel) -> [TaskModel]\
    \ {\n        var tasks = [TaskModel]()\n        do {\n            let fetchRequest:\
    \ NSFetchRequest = TasksList.fetchRequest()\n            fetchRequest.predicate\
    \ = NSPredicate(format: \"id = %@\", taskList.id)\n            guard let list\
    \  = try context.fetch(fetchRequest).first,\n                  let taskEntities\
    \ = list.tasks else {\n                return tasks\n            }\n         \
    \   tasks = taskEntities.map({ TaskModel.mapFromEntity($0 as! Task) })\n     \
    \   } catch {\n            debugPrint(\"CoreData Error\")\n        }\n       \
    \ return tasks\n    }\n\n    func updateTask(_ task: TaskModel) {\n        do\
    \ {\n            let fetchRequest: NSFetchRequest = Task.fetchRequest()\n    \
    \        fetchRequest.predicate = NSPredicate(format: \"id = %@\", task.id)\n\
    \            guard let taskEntity = try context.fetch(fetchRequest).first else\
    \ {\n                return\n            }\n            taskEntity.done = task.done\n\
    \            coreDataManager.saveContext(context)\n        } catch {\n       \
    \     debugPrint(\"CoreData Error\")\n        }\n    }\n\n    func deleteTask(_\
    \ task: TaskModel) {\n        do {\n            let fetchRequest: NSFetchRequest\
    \ = Task.fetchRequest()\n            fetchRequest.predicate = NSPredicate(format:\
    \ \"id = %@\", task.id)\n            let taskEntities = try context.fetch(fetchRequest)\n\
    \            for taskEntity in taskEntities {\n                context.delete(taskEntity)\n\
    \            }\n            coreDataManager.saveContext(context)\n        } catch\
    \ {\n            debugPrint(\"CoreData Error\")\n        }\n    }\n}\n```\n\n\
    清单 2-5\nTaskServiceProtocol 和 TaskService 的结构与方法\n\n### 扩展\n\n在此示例中，我们创建了一个 `UIColor`\
    \ 扩展，以便轻松访问专门为此应用程序创建的、位于 `Assets` 文件中的颜色。\n\n我们还将为 `NSManagedObject` 类添加一个扩展，该扩展将避免我们在进行测试部分时与上下文发生冲突。\n\
    \n### 常量\n\n常量包含了我们在应用程序中将使用的固定参数。在本例中，它是一个图标名称列表，用户可以在创建任务或任务列表时从中选择图标。\n\n###\
    \ 视图层\n\n这一层包含了用户可以看到的所有元素，这些元素构成了图形界面，并且用户可以与它们进行交互（图 2-6）。\n\n这些视图可以是简单的，比如一个按钮或一个标签，也可以是复杂的，比如包含按钮、标签、图像等元素的整个页面视图。\n\
    \n对于简单的视图，它们通常是整个应用程序中重复使用的图形元素，例如一个按钮。\n\n更复杂的视图则由更简单视图组合而成。由于我们不使用 `storyboards`\
    \ 或 `xib` 文件，我们将通过约束来定义每个组件的特性，例如其位置或大小。\n\n![](img/531999_1_En_2_Fig6_HTML.jpg)\n\
    \n此截图显示了视图文件夹子文件夹下的文件，该视图文件夹又是 M V C, my-to-dos 下的子文件夹。视图下的子文件夹包括：empty state,\
    \ labels, collection, screen, buttons, 和 cells。\n\n图 2-6\n视图层文件\n\n### 控制器层\n\n\
    控制器（`UIViewController` 的子类）是应用程序的主要部分，负责连接模型和视图。我们应用程序中的每个屏幕都是一个视图控制器（图 2-7）。\n\
    \n![](img/531999_1_En_2_Fig7_HTML.jpg)\n\n此截图显示了名为 controller 的文件夹下的文件，该文件夹是 M\
    \ V C, my-to-dos 下的子文件夹。这些文件是：home view controller, add list controller, add task\
    \ controller, 和 task view controller。\n\n图 2-7\n控制器层文件\n\n### MyToDos 应用程序屏幕\n\
    \n在第一章 1 中，我们描述了我们将用于实现本书中将要讲解的每种架构模式的应用程序。\n\n你可能还记得，这个应用程序有四个屏幕，每个屏幕由一个 `UIViewController`\
    \ 表示，并与视图和模型相关联，管理信息在两者之间的传递。\n"
- fmt: "### Information Flow\n\nBut how will we pass this information?\n\nThe controller\
    \ is the central part of the MVC model, and it will be the one that contains references\
    \ (instances) to the view and the model. Therefore, the controller will be able\
    \ to pass information by directly calling public methods of both the view and\
    \ the model.\n\nFor example, if we have an instance of the `TasksListService`\
    \ class (model) in our controller, we can retrieve the task lists by calling its\
    \ `fetchList` method:\n\n```\nlet tasksLists = tasksListService.fetchLists()\n\
    ```\n\nAnd then pass this information to the view:\n\n```\nlet view = HomeView()\n\
    view.setLists(taskLists)\n```\n\n#### Delegate Pattern\n\nAnd, the user interactions\
    \ in the view, how do we pass them to the controller?\n\nSince the view doesn’t\
    \ have a controller instance to call its methods, we can do that by using the\
    \ *Delegate pattern*.\n\nThis design pattern allows a class to delegate some of\
    \ its responsibilities to an instance of another class. In our case, the behavior\
    \ against user interactions in the view will be implemented by the controller.\n\
    \n#### How to Implement Delegate Pattern\n\nTo implement the *Delegate pattern*,\
    \ first, we create a protocol that will contain the methods we want to delegate.\
    \ For example, let’s create an example protocol with two methods:\n\n```\nprotocol\
    \ ExampleDelegate: AnyObject {\n    func methodA()\n    func methodB(value: String)\n\
    }\n```\n\nThe next step is to create a property of the type of the protocol that\
    \ we have created, which we will call `delegate`, in the class that delegates\
    \ (which in our case would be the view):\n\n```\nclass ExampleView {\n    ...\n\
    \    weak var delegate: ExampleDelegate?\n    ...\n}\n```\n\nNow, depending on\
    \ what happens in the view (pressing a button, writing in a text field, etc.),\
    \ we can call the different methods of the protocol:\n\n```\ndelegate?.methodA()\n\
    delegate?.methodB(value: \"Input text\")\n```\n\nNow, in the controller, so that\
    \ it can implement the protocol methods, we must configure the delegate property\
    \ of the `exampleView` instance to `self`, indicating that it will be the controller\
    \ that implements the protocol methods:\n\n```\nclass ExampleViewController {\n\
    \    ...\n    exampleView.delegate = self\n    ...\n}\n```\n\nAnd, finally, we\
    \ have to make the controller adopt the protocol and its methods (we can do this\
    \ in an extension to improve code readability):\n\n```\nextension ExampleViewController:\
    \ ExampleDelegate {\n    func methodA() { ... }\n    func methodB(value: String)\
    \ { ... }\n}\n```\n\nNow we are going to see how to implement all this in the\
    \ development of our application. At the beginning of each screen, we will show\
    \ a diagram of how the different components (the main ones) communicate with each\
    \ other.\n\n### AppDelegate and SceneDelegate\n\nSince the release of iOS 13,\
    \ some of the responsibilities that the `AppDelegate` had in previous versions\
    \ were transferred to the `SceneDelegate`. Thus, now, while the `AppDelegate`\
    \ is in charge of the life cycle of the application and its setup, the `SceneDelegate`\
    \ is responsible for what is displayed on the screen and how it is displayed.\n\
    \nIn the example application that we are going to develop, we will not modify\
    \ the `AppDelegate` that Xcode generates when creating the application. What we\
    \ will do is modify the `SceneDelegate`, specifically the `scene(_:willConnectTo:options:)`\
    \ method, which is the first one called in the `UISceneSession` life cycle (Listing\
    \ [2-6](#531999_1_En_2_Chapter.xhtml#PC16)).\n\n```\nfunc scene(_ scene: UIScene,\
    \ willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
    \ {\n    if let windowScene = scene as? UIWindowScene {\n        let window =\
    \ UIWindow(windowScene: windowScene)\n        let navigationController = UINavigationController(rootViewController:\
    \ HomeViewController(tasksListService: TasksListService(), taskService: TaskService()))\n\
    \        navigationController.interactivePopGestureRecognizer?.isEnabled = false\n\
    \        window.backgroundColor = .white\n        window.rootViewController =\
    \ navigationController\n        self.window = window\n        window.makeKeyAndVisible()\n\
    \    }\n}\n```\n\nListing 2-6 — Modification in the `SceneDelegate` to call `HomeViewController`\n\
    \nAs you can see, what we do in this method is create a new `UIWindow`, we set\
    \ the application’s root view controller (which is a `UINavigationController`\
    \ component, whose first controller will be the `HomeViewController` class), and\
    \ finally, we make the window we have created be the key window that should be\
    \ displayed.\n\n### Home Screen\n\nOn the Home screen, the main component is the\
    \ `HomeViewController` class and we can see how it communicates with the rest\
    \ of the components in Figure [2-8](#531999_1_En_2_Chapter.xhtml#Fig8).\n\n![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig8_HTML.png)\n\
    \nFigure 2-8 — Home screen components communication schema"
  raw: '#### Information Flow


    But how will we pass this information?


    The controller is the central part of the MVC model, and it will be the one that
    contains references (instances) to the view and the model. Therefore, the controller
    will be able to pass information by directly calling public methods of both the
    view and the model.


    For example, if we have an instance of the *TasksListService* class (model) in
    our controller, we can retrieve the task lists by calling its *fetchList* method:


    ```

    let tasksLists = tasksListService.fetchLists()

    ```


    And then pass this information to the view:


    ```

    let view = HomeView()

    view.setLists(taskLists)

    ```


    ##### Delegate Pattern


    And, the user interactions in the view, how do we pass them to the controller?


    Since the view doesn’t have a controller instance to call its methods, we can
    do that by using the *Delegate pattern*.


    This design pattern allows a class to delegate some of its responsibilities to
    an instance of another class. In our case, the behavior against user interactions
    in the view will be implemented by the controller.


    ##### How to Implement Delegate Pattern


    To implement the *Delegate pattern*, first, we create a protocol that will contain
    the methods we want to delegate. For example, let’s create an example protocol
    with two methods:


    ```

    protocol ExampleDelegate: AnyObject {

    func methodA()

    func methodB(value: String)

    }

    ```


    The next step is to create a property of the type of the protocol that we have
    created, which we will call *delegate*, in the class that delegates (which in
    our case would be the view):


    ```

    class ExampleView {

    ...

    weak var delegate: ExampleDelegate?

    ...

    }

    ```


    Now, depending on what happens in the view (pressing a button, writing in a text
    field, etc.), we can call the different methods of the protocol:


    ```

    delegate?.methodA()

    delegate?.methodB(value: "Input text")

    ```


    Now, in the controller, so that it can implement the protocol methods, we must
    configure the delegate property of the *exampleView* instance to “*self*,” indicating
    that it will be the controller that implements the protocol methods:


    ```

    class ExampleViewController {

    ...

    exampleView.delegate = self

    ...

    }

    ```


    And, finally, we have to make the controller adopt the protocol and its methods
    (we can do this in an extension to improve code readability):


    ```

    extension ExampleViewController: ExampleDelegate {

    func methodA() { ... }

    func methodB(value: String) { ... }

    }

    ```


    Now we are going to see how to implement all this in the development of our application.
    At the beginning of each screen, we will show a diagram of how the different components
    (the main ones) communicate with each other.


    #### AppDelegate and SceneDelegate


    Since the release of iOS 13, some of the responsibilities that the *AppDelegate*
    had in previous versions were transferred to the *SceneDelegate*. Thus, now, while
    the *AppDelegate* is in charge of the life cycle of the application and its setup,
    the *SceneDelegate* is responsible for what is displayed on the screen and how
    it is displayed.


    In the example application that we are going to develop, we will not modify the
    *AppDelegate* that Xcode generates when creating the application. What we will
    do is modify the *SceneDelegate*, specifically the *scene(_:willConnectTo:options:)*
    method, which is the first one called in the *UISceneSession* life cycle (Listing
    [2-6](#531999_1_En_2_Chapter.xhtml#PC16)).


    ```

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:
    UIScene.ConnectionOptions) {

    if let windowScene = scene as? UIWindowScene {

    let window = UIWindow(windowScene: windowScene)

    let navigationController = UINavigationController(rootViewController: HomeViewController(tasksListService:
    TasksListService(), taskService: TaskService()))

    navigationController.interactivePopGestureRecognizer?.isEnabled = false

    window.backgroundColor = .white

    window.rootViewController = navigationController

    self.window = window

    window.makeKeyAndVisible()

    }

    }

    Listing 2-6

    Modification in the SceneDelegate to call HomeViewController

    ```


    As you can see, what we do in this method is create a new *UIWindow*, we set the
    application’s root view controller (which is a *UINavigationController* component,
    whose first controller will be the *HomeViewController* class), and finally, we
    make the window we have created be the key window that should be displayed.


    #### Home Screen


    On the Home screen, the main component is the *HomeViewController* class and we
    can see how it communicates with the rest of the components in Figure [2-8](#531999_1_En_2_Chapter.xhtml#Fig8).


    ![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig8_HTML.png)


    A block diagram represents the communication between the home view, home controller,
    and task list service. The home view controller in the middle has navigations
    with add list view and task list view controllers.


    Figure 2-8


    Home screen components communication schema'
  trans: "\n### 信息流\n\n那么，我们如何传递这些信息呢？\n\n控制器是 MVC 模式的核心部分，它将包含对视图和模型的引用（实例）。因此，控制器能够通过直接调用视图和模型的公有方法来传递信息。\n\
    \n例如，如果我们的控制器中有一个 `TasksListService` 类（模型）的实例，我们可以通过调用它的 `fetchList` 方法来获取任务列表：\n\
    \n```\nlet tasksLists = tasksListService.fetchLists()\n```\n\n然后将这些信息传递给视图：\n\n\
    ```\nlet view = HomeView()\nview.setLists(taskLists)\n```\n\n#### 委托模式\n\n那么，视图中的用户交互，我们如何将其传递给控制器呢？\n\
    \n由于视图没有控制器实例来调用其方法，我们可以通过使用*委托模式*来实现这一点。\n\n这种设计模式允许一个类将某些职责委托给另一个类的实例。在我们的案例中，针对视图中用户交互的行为将由控制器来实现。\n\
    \n#### 如何实现委托模式\n\n要实现*委托模式*，首先，我们创建一个协议（protocol），其中包含我们想要委托的方法。例如，让我们创建一个包含两个方法的示例协议：\n\
    \n```\nprotocol ExampleDelegate: AnyObject {\n    func methodA()\n    func methodB(value:\
    \ String)\n}\n```\n\n下一步是在进行委托的类（在我们的案例中就是视图）中，创建一个我们已创建的协议类型的属性，并将其命名为 `delegate`：\n\
    \n```\nclass ExampleView {\n    ...\n    weak var delegate: ExampleDelegate?\n\
    \    ...\n}\n```\n\n现在，根据视图中发生的事件（按下按钮、在文本框中输入等），我们可以调用协议中的不同方法：\n\n```\ndelegate?.methodA()\n\
    delegate?.methodB(value: \"Input text\")\n```\n\n现在，在控制器中，为了让它能够实现协议方法，我们必须将 `exampleView`\
    \ 实例的 `delegate` 属性设置为 `self`，表明将由该控制器来实现协议方法：\n\n```\nclass ExampleViewController\
    \ {\n    ...\n    exampleView.delegate = self\n    ...\n}\n```\n\n最后，我们必须让控制器采纳该协议并实现其方法（我们可以在扩展中这样做，以提高代码可读性）：\n\
    \n```\nextension ExampleViewController: ExampleDelegate {\n    func methodA()\
    \ { ... }\n    func methodB(value: String) { ... }\n}\n```\n\n现在，我们来看看如何在我们应用开发中实现这一切。在每个界面的开头，我们将展示一个图表，说明不同组件（主要组件）之间如何相互通信。\n\
    \n### AppDelegate 和 SceneDelegate\n\n自 iOS 13 发布以来，`AppDelegate` 在先前版本中的部分职责已转移到了\
    \ `SceneDelegate`。因此，现在 `AppDelegate` 负责应用的生命周期及其设置，而 `SceneDelegate` 则负责屏幕上显示的内容及其显示方式。\n\
    \n在我们要开发的示例应用中，我们不会修改 Xcode 创建应用时自动生成的 `AppDelegate`。我们要做的是修改 `SceneDelegate`，特别是\
    \ `scene(_:willConnectTo:options:)` 方法，这是 `UISceneSession` 生命周期中第一个被调用的方法（代码清单\
    \ 2-6）。\n\n```\nfunc scene(_ scene: UIScene, willConnectTo session: UISceneSession,\
    \ options connectionOptions: UIScene.ConnectionOptions) {\n    if let windowScene\
    \ = scene as? UIWindowScene {\n        let window = UIWindow(windowScene: windowScene)\n\
    \        let navigationController = UINavigationController(rootViewController:\
    \ HomeViewController(tasksListService: TasksListService(), taskService: TaskService()))\n\
    \        navigationController.interactivePopGestureRecognizer?.isEnabled = false\n\
    \        window.backgroundColor = .white\n        window.rootViewController =\
    \ navigationController\n        self.window = window\n        window.makeKeyAndVisible()\n\
    \    }\n}\n```\n\n**代码清单 2-6** — 在 `SceneDelegate` 中修改以调用 `HomeViewController`\n\
    \n如您所见，我们在此方法中所做的是创建一个新的 `UIWindow`，设置应用的根视图控制器（它是一个 `UINavigationController`\
    \ 组件，其第一个控制器将是 `HomeViewController` 类），最后，使我们创建的窗口成为要显示的关键窗口。\n\n### 主屏幕\n\n在主屏幕上，主要组件是\
    \ `HomeViewController` 类，我们可以在图 2-8 中看到它如何与其余组件进行通信。\n\n![](img/531999_1_En_2_Fig8_HTML.png)\n\
    \n**图 2-8** — 主屏幕组件通信示意图\n"
- fmt: "### `HomeViewController`\n\n控制器（`HomeViewController`）是 MVC 模式的核心，必须持有对视图（`HomeView`）和模型（`TasksListServiceProtocol`\
    \ 及 `TaskServiceProtocol`）的引用，如代码清单 [2-7](#531999_1_En_2_Chapter.xhtml#PC17) 所示。\n\
    \n在初始化器中传入所需的类的实例（这被称为*依赖注入*），可以使组件之间的耦合度更低，并便于实施单元测试（例如使用 mock 对象）。\n\n```\n\
    class HomeViewController: UIViewController {\n    private var homeView = HomeView()\n\
    \    private var tasksListService: TasksListServiceProtocol!\n    private var\
    \ taskService: TaskServiceProtocol!\n    init(tasksListService: TasksListServiceProtocol,\n\
    \         taskService: TaskServiceProtocol) {\n        super.init(nibName: nil,\
    \ bundle: nil)\n        self.tasksListService = tasksListService\n        self.taskService\
    \ = taskService\n    }\n    ...\n}\nListing 2-7\nHomeViewController initialization\n\
    ```\n\n正如我们在 MVC 架构中所见，控制器会将信息传递给视图进行展示。我们通过 `fetchTasksLists` 方法来实现这一点，其功能是从数据库中检索信息并将其传递给视图（代码清单\
    \ [2-8](#531999_1_En_2_Chapter.xhtml#PC18)）。\n\n```\nfunc fetchTasksLists() {\n\
    \    let lists = tasksListService.fetchLists()\n    homeView.setTasksLists(lists)\n\
    }\nListing 2-8\nThe fetchTasksLists method calls the Model to fetch the lists\
    \ and then passes them to the View\n```\n\n另一方面，控制器会通过*委托模式*接收用户交互并做出相应处理。\n\n\
    这些交互包括：\n\n*   访问任务列表。\n*   添加任务列表。\n*   删除任务列表。\n\n为此，我们首先定义一个包含这些交互相关方法的协议（代码清单\
    \ [2-9](#531999_1_En_2_Chapter.xhtml#PC19)）。\n\n```\nprotocol HomeViewDelegate:\
    \ AnyObject {\n    func addListAction()\n    func selectedList(_ list: TasksListModel)\n\
    \    func deleteList(_ list: TasksListModel)\n}\nListing 2-9\nHomeViewDelegate\
    \ protocol\n```\n\n然后，我们让 `HomeViewController` 遵循此协议并实现其方法（代码清单 [2-10](#531999_1_En_2_Chapter.xhtml#PC20)）。\n\
    \n```\nextension HomeViewController: HomeViewDelegate {\n    func addListAction()\
    \ {\n        let addListViewController = AddListViewController(tasksListModel:\
    \ list, taskService: taskService, tasksListService: tasksListService)\n      \
    \  navigationController?.pushViewController(addListViewController, animated: true)\n\
    \    }\n    func selectedList(_ list: TasksListModel) {\n        let taskViewController\
    \ = TaskListViewController(tasksListModel: list)\n        navigationController?.pushViewController(taskViewController,\
    \ animated: true)\n    }\n    func deleteList(_ list: TasksListModel) {\n    \
    \    tasksListService.deleteList(list)\n    }\n}\nListing 2-10\nHomeViewController\
    \ extension that implements the HomeViewDelegate protocol methods\n```\n\n当用户点击“添加列表”按钮时，会执行\
    \ `addListAction` 方法，并将应用导航到 `AddListViewController` 屏幕。\n\n`selectedList` 方法会将应用导航到\
    \ `TaskListViewController` 屏幕（并将所选的列表信息传递给它）。\n\n最后，`deleteList` 方法负责通知模型必须从数据库中删除所选列表，然后重新加载视图。\n\
    \n此外，我们还需要实现对模型的观察，以便在任务列表被添加或删除时更新视图（代码清单 [2-11](#531999_1_En_2_Chapter.xhtml#PC21)）。\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    NotificationCenter.default.addObserver(self,\n\
    \                                           selector: #selector(contextObjectsDidChange),\n\
    \                                           name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
    \                                           object: CoreDataManager.shared.mainContext)\n\
    }\n@objc func contextObjectsDidChange() {\n    fetchTasksLists()\n}\nListing 2-11\n\
    Model observer implementation\n```\n\n### `HomeView`\n\n基本上，`HomeView` 由一个 `UITableView`\
    \ 元素（用于显示信息）和一个 `UIButton` 元素（用于添加新列表）组成。我们之前已经看到，控制器通过 View 的 `setTasksList`\
    \ 方法将需要显示的信息传递给视图（代码清单 [2-12](#531999_1_En_2_Chapter.xhtml#PC22)）。\n\n```\nfunc\
    \ setTasksLists(_ lists: [TasksListModel]) {\n    tasksList = lists\n    tableView.reloadData()\n\
    \    emptyState.isHidden = tasksList.count > 0\n}\nListing 2-12\nUpon receiving\
    \ the information from HomeViewController, the HomeView is updated with the new\
    \ data\n```\n\n在这个函数中，我们获取 `lists` 参数并将其赋值给类的 `taskList` 变量（我们将使用它来填充表格），重新加载表格，并根据列表是否包含值来隐藏或显示“空状态”。\n\
    \n另一方面，View 还需要通过委托将用户交互传递给控制器。\n\n我们将在 `HomeView` 的顶部添加一个 `HomeViewDelegate`\
    \ 类型的委托属性来实现这一点：\n\n```\nclass HomeView: UIView {\n    ...\n    weak var delegate:\
    \ HomeViewDelegate?\n    ...\n}\n```\n\n此外，在 `HomeViewController` 中，我们必须将 `HomeView`\
    \ 实例的 `delegate` 属性配置为 `self`，以指示将由 `HomeViewController` 来实现协议方法（代码清单 [2-13](#531999_1_En_2_Chapter.xhtml#PC24)）。\n\
    \n```\nclass HomeViewController: UIViewController {\n    ...\n    override func\
    \ loadView() {\n        super.loadView()\n        setupHomeView()\n    }\n   \
    \ private func setupHomeView() {\n        homeView.delegate = self\n        self.view\
    \ = homeView\n    }\n    ...\n}\nListing 2-13\nSetting HomeView delegate on HomeViewController\n\
    ```\n\n一旦定义了委托，我们就可以在代码中使用它，并调用各个协议函数。\n\n因此，`addListAction` 方法将从与添加列表按钮关联的函数中被调用（代码清单\
    \ [2-14](#531999_1_En_2_Chapter.xhtml#PC25)）。\n\n```\nextension HomeView {\n \
    \   ...\n    func configureAddListButton() {\n        addListButton.addTarget(self,\
    \ action: #selector(addListAction), for: .touchUpInside)\n        ...\n    }\n\
    \    @objc func addListAction() {\n        delegate?.addListAction()\n    }\n\
    \    ...\n}\nListing 2-14\nConfigure the addListButton target\n```\n\n当用户选中表格中的某个单元格时，将调用\
    \ `selectList` 方法（代码清单 [2-15](#531999_1_En_2_Chapter.xhtml#PC26)）。\n\n```\nfunc\
    \ tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath) {\n\
    \    delegate?.selectedList(tasksList[indexPath.row])\n}\nListing 2-15\nHomeView\
    \ delegates the selectedList method implementation to the HomeViewController\n\
    ```\n\n当用户滑动某个单元格时，将调用 `deleteList` 方法（代码清单 [2-16](#531999_1_En_2_Chapter.xhtml#PC27)）。\n\
    \n```\nfunc tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,\
    \ forRowAt indexPath: IndexPath) {\n    if editingStyle == .delete {\n       \
    \ let list = tasksList[indexPath.row]\n        tasksList.remove(at: indexPath.row)\n\
    \        tableView.deleteRows(at: [indexPath], with: .automatic)\n        delegate?.deleteList(list)\n\
    \    }\n}\nListing 2-16\nOn swipe a cell, the delete method is called (removing\
    \ cell from the table, and delegating the deletion from the Model to the HomeViewController)\n\
    ```\n\n### 添加列表屏幕\n\n此屏幕负责添加任务列表，其组件之间的通信如图 [2-9](#531999_1_En_2_Chapter.xhtml#Fig9)\
    \ 所示。\n\n![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig9_HTML.png)\n\n该框图展示了添加列表视图、添加列表视图控制器和任务列表服务之间的通信。添加列表视图包含一个名为图标选择器视图的子视图。中间的添加列表视图控制器与主视图控制器之间存在导航。\n\
