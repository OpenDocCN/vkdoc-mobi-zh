  trans: "\n### 模型\n\n在此文件夹中，我们将存放所有与业务逻辑、数据访问与操作、扩展、常量等相关的内容。此外，我们可以创建子文件夹来按功能对文件进行分组（图\
    \ 2-5）：核心数据、扩展、服务等。\n\n![](img/531999_1_En_2_Fig5_HTML.jpg)\n\n该截图展示了 `model`\
    \ 文件夹子文件夹下的文件，`model` 本身也是 `MVC` 架构中 `my-to-dos` 下的子文件夹。`model` 下的子文件夹包括 `core\
    \ data`、`models`、`services`、`extensions` 和 `helpers`。\n\n**图 2-5** 模型层文件\n\n在\
    \ MVC 模型模式中我们看到，模型会通知控制器（使用观察者设计模式）。\n\n这样一来，控制器应当订阅模型中所发生的变更。\n\n由于模型中发生的变更本质上是数据库中数据的添加、更新或删除操作，因此我们将利用\
    \ Core Data 自身的能力来获知这些变更。Core Data 能够根据产生的变更发出通知。\n\n在我们的场景中，我们希望知道数据库何时发生变更（无论是添加新对象、删除对象还是更新对象），因此我们将使用以下通知：\n\
    \n```\nNSManagedObjectContextObjectsDidChangeNotification\n```\n\n为此，我们只需在想要感知模型变更的控制器中的\
    \ `viewDidLoad` 方法里添加一个该通知的观察者：\n\n```\nNotificationCenter.default.addObserver(self,\n\
    \                                         selector: #selector(methodToExecute),\n\
    \                                         name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
    \                                         object: context)\n```\n\n`NSNotification.Name.NSManagedObjectContextObjectsDidChange`\
    \ 是控制器订阅的通知名称，`context` 是我们要关注的对象，而 `methodToExecute` 是检测到变更时要运行的方法，例如：\n\n```\n\
    @objc func methodToExecute() {\n    view.updateView()\n}\n```\n\n### 核心数据\n\n\
    在此文件夹中，我们将存放 `CoreDataManager.swift` 文件（我们在第 1 章中创建）以及 Xcode 为数据库实体自动创建的四个文件。\n\
    \n### 模型\n\n这里存放的是我们可以将数据库实体转换成的模型。此外，我们将创建一个模型必须遵循的协议，以便在模型与实体之间相互转换（代码清单 2-1）。\n\
    \n```\nprotocol EntityModelMapProtocol {\n    associatedtype EntityType: NSManagedObject\n\
    \    func mapToEntityInContext(_ context: NSManagedObjectContext) -> EntityType\n\
    \    static func mapFromEntity(_ entity: EntityType) -> Self\n}\n```\n\n**代码清单\
    \ 2-1** EntityModelMapProtocol 代码\n\n在我们的应用程序中，将定义两个模型（`TaskModel` 和 `TasksListModel`），分别对应数据库中的一个实体。\n\
    \n每个模型也将遵循 `EntityModelMapProtocol` 协议，以便我们能够在模型与实体（`NSManagedObject` 子类）之间相互转换（代码清单\
    \ 2-2 和代码清单 2-3）。\n\n```\nstruct TaskModel {\n    var id: String!\n    var title:\
    \ String!\n    var icon: String!\n    var done: Bool!\n    var createdAt: Date!\n\
    }\n```\n\n**代码清单 2-3** `TaskModel.swift` 文件内容\n\n```\nstruct TasksListModel {\n\
    \    var id: String!\n    var title: String!\n    var icon: String!\n    var tasks:\
    \ [TaskModel]!\n    var createdAt: Date!\n}\n```\n\n**代码清单 2-2** `TasksListModel.swift`\
    \ 文件内容\n"
- fmt: "### Services\n\nHere we will have the classes that allow us to send information\
