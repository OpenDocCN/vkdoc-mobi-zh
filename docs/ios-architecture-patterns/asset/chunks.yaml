    In the second protocol, *InteractorToPresenterTaskListProtocol*, we have the methods
    that we will implement in the Presenter and that will allow us to access the database
    to obtain the tasks from a list or communicate with the router so that it does
    not present the add tasks screen (Listing [5-32](#531999_1_En_5_Chapter.xhtml#PC34)).


    ```

    // MARK: Interactor Output

    protocol InteractorToPresenterTaskListProtocol {

    func fetchedTasks(tasks: [TaskModel])

    func addTaskTo(list: TasksListModel)

    }

    Listing 5-32

    InteractorToPresenterTaskListProtocol code

    ```


    ##### TaskListRouter


    As we already know, the *TaskListRouter* class must conform to the *PresenterToRouterTaskListProtocol*
    protocol and implement its methods. These methods are the ones that will allow
    us to create the module, present the task creation screen, and return to the *Home*
    screen (Listing [5-33](#531999_1_En_5_Chapter.xhtml#PC35)).


    ```

    class TaskListRouter: PresenterToRouterTaskListProtocol {

    static func createScreenFor(list: TasksListModel) -> UIViewController {

    let presenter: ViewToPresenterTaskListProtocol & InteractorToPresenterTaskListProtocol
    = TaskListPresenter()

    let viewController = TaskListViewController()

    viewController.presenter = presenter

    viewController.presenter.router = TaskListRouter()

    viewController.presenter?.view = viewController

    viewController.presenter?.interactor = TaskListInteractor(taskList: list, taskService:
    TaskService())

    viewController.presenter?.interactor?.presenter = presenter

    return viewController

    }

    func presentAddTaskOn(view: PresenterToViewTaskListProtocol, forTaskList: TasksListModel)
    {

    let addTaskController = AddTaskRouter.createScreenFor(list: forTaskList)

    let viewController = view as! TaskListViewController

    addTaskController.modalPresentationStyle = .pageSheet

    viewController.present(addTaskController, animated: true)

    }

    func popToHomeFrom(view: PresenterToViewTaskListProtocol) {

    let viewController = view as! TaskListViewController

    viewController.navigationController?.popViewController(animated: true)

    }

    }

    Listing 5-33

    Implementation of PresenterToRouterTaskListProtocol on TaskListRuter

    ```


    ##### TaskListViewController


    The *TaskListViewController* is in charge of showing us on the screen the tasks
    that belong to a certain list (or an *EmptyState* in case there is none). This
    screen presents numerous possibilities for interaction with the user: delete or
    update a task, press the “*Add task*” button, or press the button to return to
    Home.


    All these actions, and some more (such as configuring the different cells of the
    table or knowing the number of rows in a table), will be transmitted to the Presenter
    thanks to the presenter variable that is of the *ViewToPresenterTaskListProtocol*
    type (Listing [5-34](#531999_1_En_5_Chapter.xhtml#PC36)).


    ```

    class TaskListViewController: UIViewController {

    ...

    var presenter: ViewToPresenterTaskListProtocol!

    ...

    }

    private extension TaskListViewController {

    ...

    @objc func backAction() {

    presenter.backAction()

    }

    ...

    @objc func addTaskAction() {

    presenter?.addTask()

    }

    }

    extension TaskListViewController: UITableViewDelegate, UITableViewDataSource {

    ...

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    return presenter.numberOfRowsInSection()

    }

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: TaskCell.reuseId, for:
    indexPath) as! TaskCell

    cell.setParametersForTask(presenter.taskAt(indexPath: indexPath))

    cell.delegate = self

    return cell

    }

    ...

    func tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,
    forRowAt indexPath: IndexPath) {

    if editingStyle == .delete {

    presenter.deleteRowAt(indexPath: indexPath)

    }

    }

    }

    extension TaskListViewController: TaskCellDelegate {

    func updateTask(_ task: TaskModel) {

    presenter.update(task: task)

    }

    }

    Listing 5-34

    TaskListViewController code

    ```


    On the other hand, the *TaskListViewController* must implement the *PresenterToViewTaskListProtocol*
    protocol, so that the Presenter can make the necessary calls that update the View
    (such as reloading the task list or showing/hiding the *EmptyState*) (Listing
    [5-35](#531999_1_En_5_Chapter.xhtml#PC37)).


    ```

    extension TaskListViewController: PresenterToViewTaskListProtocol {

    func onFetchTasks() {

    tableView.reloadData()

    }

    func showEmptyState() {

    emptyState.isHidden = false

    }

    func hideEmptyState() {

    emptyState.isHidden = true

    }

    }

    Listing 5-35

    TaskListViewController must implement PresenterToViewTaskListProtocol methods

