    # 4. MVVM：Model–View–ViewModel


    ## 什么是 MVVM？


    ### 一点历史


    MVVM 架构是由微软的 Ken Cooper 和 Ted Peters 开发的（后来由 John Gossman 在 2005 年通过他的博客宣布），目的是简化
    Web 界面的**事件驱动编程**（即事件驱动程序流程）。^(⁶)


    ### 工作原理


    MVVM 架构是 MVP 架构的一种演进，其中 Presenter 层被 ViewModel 层取代。此外，它解决了 MVP 架构存在的一些问题。最主要的是
    MVP 架构中 View 与 Presenter 之间的**耦合**。在 MVVM 架构中，ViewModel 没有对 View 的引用，即不存在耦合（图
    4-1）。


    ![](img/531999_1_En_4_Fig1_HTML.png)


    一个框图表示三个模块，分别标记为视图模型、视图和模型。视图和视图模型通过**数据绑定**相互连接。视图模型通知模型并接收模型的更新。


    图 4-1


    Model–View–ViewModel 模式示意图


    ### MVVM 中的组件


    现在我们更详细地了解 MVVM 模式中这三个组件的特性。


    #### 模型（Model）


    与 MVC 或 MVP 模式相同，Model 是负责业务逻辑以及存储、操作和访问应用程序数据的组件：


    -   包含与数据持久化相关的类。

    -   包含控制应用程序通信的类。

    -   负责将从外部接收的信息转换为模型对象。

    -   包含扩展、常量等。

    -   Model 层只能与 ViewModel 层通信（即 Model 不知道 View 的存在）。


    #### 视图（View）


    View 层包含`UIView`组件和`UIViewController`元素（我们将其保存在独立的文件中，如前几章所述）：


    -   View 负责随时向用户显示最新的信息（这些信息来自 ViewModel）。

    -   View 不包含任何逻辑。

    -   View 可以有多个对 ViewModel 的引用。


    Controller 仅承担**协调/路由**功能，处理屏幕间的导航，并在必要时通过**委托模式**传递信息。在本章末尾，我们将看到如何将所有这些协调/路由功能转移到一个新类——Coordinator
    中，从而产生 MVVM-C 架构。

    '
- fmt: "#### ViewModel\n\nThe `ViewModel` is the core of the MVVM architecture (as\
    \ is the `Controller` in MVC or the `Presenter` in MVP) and sits between the View\
    \ and the Model:\n\n- The `ViewModel` must present the current state of the View\
    \ at all times.\n- The `ViewModel` is in charge of processing the Input/Output\
    \ information that controls the View.\n- The `ViewModel` is owned by the View,\
    \ and the Model is owned by the `ViewModel`.\n\nThe `ViewModel` is bound to the\
    \ View through what is known as Data Binding.⁷ This process allows you to connect\
    \ the View with the `ViewModel` so that if the state of the information managed\
    \ by the `ViewModel` changes, the View is updated automatically.\n\n#### Data\
    \ Binding\n\nThere are different methodologies to apply the Data Binding between\
    \ the View and the `ViewModel`, such as follows:\n\n- By using libraries like\
    \ `RxSwift`, `Bond`, or `Combine`. It is the most used system, and for the development\
    \ of our application with MVVM, we will use the `RxSwift` library.⁸\n- With the\
    \ KVO (key-value observing) pattern, by which we can notify certain objects about\
    \ the changes produced in the properties of other objects.⁹\n- By using the Delegated\
    \ Pattern, using closures…\n\n## Advantages and Disadvantages of MVVM\n\nThe MVVM\
    \ architecture pattern is often used as a replacement for the MVC architecture,\
    \ and as with other architectures, using the Model–View–ViewModel architecture\
    \ has advantages and disadvantages.\n\n### Advantages\n\nThe main advantages of\
    \ the MVVM architecture are as follows:\n\n- It presents a good separation of\
    \ responsibilities since we have introduced a new component (`ViewModel`) that\
    \ is responsible for transforming the Model data to display it in the View. In\
    \ this way, we release the Controller from said work (as it did not happen in\
    \ the MVC).\n- By having a greater separation of responsibilities, its maintenance\
    \ becomes easier.\n- It improves testability since we can test the business logic\
    \ of the `ViewModel` without having to take the View into account. It’s also easier\
    \ to test Controllers, since, unlike MVC, they don’t depend on the Model.\n- The\
    \ MVVM architecture is widely used in application development when migrating from\
    \ the MVC architecture.\n\n### Disadvantages\n\nThe main disadvantages are as\
    \ follows:\n\n- If we use third-party libraries to perform the Data Binding (such\
    \ as `RxSwift` or `Bond`), we have to take several factors into account:\n   \
    \ - On the one hand, by adding an external library, we are increasing the size\
    \ of our app.\n    - On the other hand, the addition of these libraries usually\
    \ affects the performance of the applications.\n    - Finally, we must also take\
    \ into account the learning curve required to correctly use each of these libraries.\n\
    - Data Binding is a declarative paradigm, in which we tell the program what to\
    \ do, and not how to do it (imperative paradigm), which can make debugging difficult.\
    \ Also, this kind of paradigm makes a lot more sense in `SwiftUI` than in `UIKit`.\n\
    - In the same way as in other architectures, if it is not applied well, we can\
    \ end up overloading the `ViewModel` with functions that do not correspond to\
    \ it.\n- It presents some complexity for developers just starting.\n\n## MVVM\
    \ Application\n\nOnce we have seen the characteristics of the MVVM architecture,\
    \ we are going to apply them in the development of our application.\n\n**Note**\n\
    \nThe entire project can be downloaded from the repository of this book. During\
    \ the explanation of the implementation of the MVVM architecture in our project,\
    \ we will only show the most relevant parts of the code.\n\n### MVVM Layers\n\n\
    To continue with the logic of the applied architecture pattern (Model–View–ViewModel),\
    \ we will create a folder structure that simulates its layers (Figure 4-2).\n\n\
    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig2_HTML.png)\n\nA screenshot\
    \ represents the sub-folders and files under M V V M my to-dos. It consists of\
    \ the sub-folder named model, view, and view model. It highlights the list of\
    \ files under the view model.\n\n**Figure 4-2** – MVVM project folder structure\n\
    \n#### Model\n\nIn the same way as in the previous cases, this folder contains\
    \ everything related to business logic, data access, and its manipulation (Figure\
    \ 4-3).\n\n![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig3_HTML.jpg)\n\nA\
    \ screenshot represents the sub-folders of the folder model which is again a sub-folder\
    \ under M V V M, my to-dos. The names of the sub-folders are core data, models,\
    \ services, extensions, and helpers.\n\n**Figure 4-3** – Model layer files\n\n\
    In the MVVM architecture, the changes produced in the Model are notified to the\
    \ `ViewModel` (in the same way that they were communicated to the Controller in\
    \ the MVC and the Presenter in the MVP).\n\nIn this case, we add the observer\
    \ in the `ViewModel`’s `init` method (Listing 4-1).\n\n```swift\ninit() {\n  \
    \  NotificationCenter.default.addObserver(self,\n                            \
    \             selector: #selector(contextObjectsDidChange),\n                \
    \                         name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
    \                                         object: CoreDataManager.shared.mainContext)\n\
    }\n@objc func contextObjectsDidChange() {\n    updateView()\n}\n```\n\n**Listing\
    \ 4-1** – Setting the observer on `ViewModel` initialization\n\n##### Core Data\n\
    \nIn this folder, we will have the `CoreDataManager.swift` file, along with the\
    \ four files created by Xcode automatically for the database entities.\n\n#####\
    \ Models\n\nHere we have the models into which we can transform the database entities.\
    \ In addition, we will create a protocol that the models must comply with, to\
    \ transform from model to entity and vice versa.\n\n##### Services\n\nHere we\
    \ will have the classes that allow us to send information to the database (create,\
    \ update, or delete it) or retrieve information from the database and transform\
    \ it into models.\n\n##### Extensions\n\nIn this case, we have created a `UIColor`\
    \ extension to be able to easily access the colors created especially for this\
    \ application and an extension to the `NSManagedObject` class that will prevent\
    \ us from conflicting with the contexts when we do the testing part.\n\n#####\
    \ Constants\n\nThey contain the constant parameters that we will use in the application.\n\
    \n#### View\n\nIn the View folder, we will not only have the View files and the\
    \ components that form them (as in MVC), but also the Controller files (subclasses\
    \ of `UIViewController`), as shown in Figure 4-4.\n\n![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig4_HTML.png)\n\
    \nA screenshot represents the files and sub-folders under view, which is also\
    \ a sub-folder of M V V M my to-dos. There are folders named empty state, labels,\
    \ collection, and screen. It highlights a list of files under the sub-folder screen.\n\
    \n**Figure 4-4** – View layer files\n\nRemember that in MVVM, Controllers usually\
    \ only have coordination/routing functions (to navigate between screens) and,\
    \ in some cases, pass information (via a Delegate pattern, for example).\n\n####\
    \ ViewModel\n\nThis folder only contains the ViewModels, which, as we have seen,\
    \ connect the Model to the View (Figure 4-5).\n\n![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig5_HTML.jpg)\n\
    \nA screenshot represents the files under a folder naming view model which is\
    \ a sub-folder under M V V M, my to-dos. The files under the sub-folder are, home\
    \ view, add list view, task list view, and add task view models.\n\n**Figure 4-5**\
    \ – ViewModel layer files\n\n### MyToDos Data Binding\n\nBefore starting to see\
    \ how the different screens of our application are configured, as we have done\
    \ in the case of MVC and MVP, we are going to see how we will carry out the Data\
    \ Binding process between the `ViewModel` and the View.\n\nAs we have seen before,\
    \ there are different ways to carry out this procedure, but in our case, we will\
    \ use `RxSwift`."
