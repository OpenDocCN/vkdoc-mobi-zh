  trans: "\n#### ViewModel\n\n`ViewModel`是 MVVM 架构的核心（类似于 MVC 中的`Controller`或 MVP\
    \ 中的`Presenter`），位于视图（View）与模型（Model）之间：\n\n-   `ViewModel`必须始终呈现视图的当前状态。\n- \
    \  `ViewModel`负责处理控制视图的输入/输出信息。\n-   `ViewModel`由视图拥有，而模型由`ViewModel`拥有。\n\n`ViewModel`通过所谓的数据绑定（Data\
    \ Binding）与视图相连。⁷ 此过程允许你将视图与`ViewModel`连接起来，因此如果`ViewModel`所管理的信息状态发生变化，视图会自动更新。\n\
    \n#### 数据绑定\n\n视图与`ViewModel`之间应用数据绑定的方法有多种，例如：\n\n-   使用`RxSwift`、`Bond`或`Combine`等库。这是最常用的系统，在开发我们的\
    \ MVVM 应用时，我们将使用`RxSwift`库。⁸\n-   使用 KVO（键值观察）模式，通过该模式，我们可以通知特定对象关于其他对象属性发生的变化。⁹\n\
    -   使用委托模式，通过闭包实现……\n\n## MVVM 的优缺点\n\nMVVM 架构模式常被用作 MVC 架构的替代方案，与其他架构一样，使用 Model–View–ViewModel\
    \ 架构既有优点也有缺点。\n\n### 优点\n\nMVVM 架构的主要优点如下：\n\n-   它实现了良好的职责分离，因为我们引入了一个新的组件（`ViewModel`），负责转换模型数据以在视图中显示。这样，我们就将控制器从该项工作中解放出来（这在\
    \ MVC 中并未实现）。\n-   由于职责分离更彻底，其维护也变得更加容易。\n-   它提高了可测试性，因为我们可以测试`ViewModel`的业务逻辑，而无需考虑视图。测试控制器也更容易，因为与\
    \ MVC 不同，它们不依赖于模型。\n-   在从 MVC 架构迁移时，MVVM 架构被广泛应用于应用开发中。\n\n### 缺点\n\n主要缺点如下：\n\
    \n-   如果我们使用第三方库来执行数据绑定（例如`RxSwift`或`Bond`），必须考虑几个因素：\n    -   一方面，添加外部库会增加我们应用的体积。\n\
    \    -   另一方面，添加这些库通常会影响应用的性能。\n    -   最后，我们还必须考虑到正确使用每个库所需的学习曲线。\n-   数据绑定是一种声明式范式，我们告诉程序**做什么**，而不是**怎么做**（命令式范式），这可能会增加调试难度。此外，这种范式在`SwiftUI`中比在`UIKit`中更有意义。\n\
    -   与其他架构一样，如果应用不当，我们最终可能会用不相关的函数过度加载`ViewModel`。\n-   它对刚入门的开发人员来说有一定复杂性。\n\n\
    ## MVVM 应用\n\n了解了 MVVM 架构的特性之后，我们将在自己的应用开发中应用它们。\n\n**注意**\n\n整个项目可以从本书的仓库中下载。在解释如何将\
    \ MVVM 架构应用于我们项目的过程中，我们只会展示代码中最相关的部分。\n\n### MVVM 分层\n\n为了延续所应用架构模式（Model–View–ViewModel）的逻辑，我们将创建一个模拟其层的文件夹结构（图\
    \ 4-2）。\n\n![](img/531999_1_En_4_Fig2_HTML.png)\n\n该截图显示了 MVVM MyToDos 下的子文件夹和文件。它包含名为\
    \ model、view 和 view model 的子文件夹。高亮显示了 view model 下的文件列表。\n\n**图 4-2** – MVVM 项目文件夹结构\n\
    \n#### 模型\n\n与之前的情况类似，此文件夹包含与业务逻辑、数据访问及数据处理相关的所有内容（图 4-3）。\n\n![](img/531999_1_En_4_Fig3_HTML.jpg)\n\
    \n该截图显示了 model 文件夹的子文件夹，model 又是 MVVM MyToDos 下的子文件夹。子文件夹的名称是 core data、models、services、extensions\
    \ 和 helpers。\n\n**图 4-3** – 模型层文件\n\n在 MVVM 架构中，模型发生的变化会通知给`ViewModel`（就像在 MVC\
    \ 中通知给 Controller、在 MVP 中通知给 Presenter 一样）。\n\n在这种情况下，我们在`ViewModel`的`init`方法中添加了观察者（列表\
    \ 4-1）。\n\n```swift\ninit() {\n    NotificationCenter.default.addObserver(self,\n\
    \                                         selector: #selector(contextObjectsDidChange),\n\
    \                                         name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
    \                                         object: CoreDataManager.shared.mainContext)\n\
    }\n@objc func contextObjectsDidChange() {\n    updateView()\n}\n```\n\n**列表 4-1**\
    \ – 在`ViewModel`初始化时设置观察者\n\n##### 核心数据\n\n在此文件夹中，我们将包含`CoreDataManager.swift`文件，以及由\
    \ Xcode 为数据库实体自动创建的四个文件。\n\n##### 模型\n\n这里存放着我们可以用来转换数据库实体的模型。此外，我们将创建一个模型必须遵守的协议，用于模型与实体之间的相互转换。\n\
    \n##### 服务\n\n这里存放着允许我们向数据库发送信息（创建、更新或删除）或从数据库检索信息并将其转换为模型的类。\n\n##### 扩展\n\n\
    在这里，我们创建了一个`UIColor`扩展，以便能够轻松访问为此应用程序专门创建的颜色，以及一个针对`NSManagedObject`类的扩展，这将防止我们在进行测试部分时与上下文发生冲突。\n\
    \n##### 常量\n\n它们包含我们将在应用程序中使用的常量参数。\n\n#### 视图\n\n在 View 文件夹中，我们不仅有视图文件及其组成组件（如\
    \ MVC 中），还有控制器文件（`UIViewController`的子类），如图 4-4 所示。\n\n![](img/531999_1_En_4_Fig4_HTML.png)\n\
    \n该截图显示了 view 下的文件和子文件夹，view 也是 MVVM MyToDos 的子文件夹。有名为 empty state、labels、collection\
    \ 和 screen 的文件夹。高亮显示了 screen 子文件夹下的文件列表。\n\n**图 4-4** – 视图层文件\n\n请记住，在 MVVM 中，控制器通常只具有协调/路由功能（用于在屏幕之间导航），并且在某些情况下传递信息（例如，通过委托模式）。\n\
    \n#### ViewModel\n\n此文件夹仅包含 ViewModels，正如我们所看到的，它们将模型连接到视图（图 4-5）。\n\n![](img/531999_1_En_4_Fig5_HTML.jpg)\n\
    \n该截图显示了名为 view model 的文件夹下的文件，该文件夹是 MVVM MyToDos 下的子文件夹。子文件夹下的文件有：home view、add\
    \ list view、task list view 和 add task view models。\n\n**图 4-5** – ViewModel 层文件\n\
    \n### MyToDos 数据绑定\n\n在开始介绍我们应用程序的不同屏幕如何配置之前，就像我们在 MVC 和 MVP 案例中所做的那样，我们将看看如何在`ViewModel`和视图之间执行数据绑定过程。\n\
    \n正如我们之前所见，执行此过程有多种方法，但在我们的案例中，我们将使用`RxSwift`。\n"
- fmt: "# What Is RxSwift?\n\n`RxSwift` is a reactive programming library for iOS\
    \ application development.\n\n`RxSwift` is a library that allows us to develop\
    \ asynchronous code in our applications, simplifying the way our code will act\
    \ in front of the new data that arrives, treating them in a sequential and isolated\
    \ way.\n\nIn this book, we will not delve into the study of `RxSwift` and reactive\
    \ programming, suffice it to say that reactive programming allows you to dynamically\
    \ respond to changes in data and user events.\n\n`RxSwift` works with what we\
    \ call *Observables*, which are wrapper objects for any type of data, to which\
    \ we can subscribe or link so that any change that occurs in said *Observables*\
    \ triggers a series of previously programmed operations.\n\n## Observables and\
    \ Observers\n\nWhen using this library, we will have two types of elements:\n\n\
    - **Observable**: Issue notifications when a change occurs.\n- **Observer**: An\
    \ Observer subscribe to an Observable to receive its notifications. An Observable\
    \ can have one or more observers.\n\n## Installing RxSwift\n\nThe installation\
    \ of `RxSwift`, as it is an external library, can be done in different ways (*Swift\
    \ Package Manager*, *Carthage*, *CocoaPods*). In our case, we will use the Swift\
    \ Package Manager (SPM), which is the system integrated with Xcode to introduce\
    \ third-party libraries in our applications.\n\nTo install `RxSwift` in our project,\
    \ we will follow these steps:\n\nFirst of all, we access the Xcode main menu and\
    \ select *File* ➤ *Add Packages…* (Figure [4-6](#531999_1_En_4_Chapter.xhtml#Fig6)).\n\
    \n![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig6_HTML.png)\n\nA screenshot\
    \ of the context menu under the file tab. It highlights the add packages option\
    \ from the list of options.\n\nFigure 4-6 — Add Packages… menu selection\n\nThe\
    \ Xcode Swift Package manager will appear on the screen (Figure [4-7](#531999_1_En_4_Chapter.xhtml#Fig7)).\n\
    \n![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig7_HTML.png)\n\nA screenshot\
    \ represents a list of apple swift packages. It highlights the swift algorithm\
    \ package and on the right and provides the details of the swift algorithms. There\
    \ are buttons to cancel and add the package at the bottom.\n\nFigure 4-7 — Swift\
    \ Package Manager screen\n\nAt this point, what we do is copy the address of the\
    \ `RxSwift` git repository (which we will find on their website), and we will\
    \ place it in the search field that appears in the upper right (Figure [4-8](#531999_1_En_4_Chapter.xhtml#Fig8)).\n\
    \n```\nhttps://github.com/ReactiveX/RxSwift.git\n```\n\nBy doing this, Xcode takes\
    \ care of searching for this library and tells us if we want to install it.\n\n\
    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig8_HTML.png)\n\nA screenshot\
    \ represents the R x swift package from the search result of all sources. The\
    \ search bar at the top highlights a link at the top along with the details of\
    \ the R X swift. There are 2 buttons at the bottom to cancel and add the package.\n\
    \nFigure 4-8 — Search for the RxSwift package\n\nBefore adding `RxSwift`, what\
    \ we will do is change the “*Dependency Rule*” option from “*Branch*” to “*Up\
    \ To Next Major Version*.” Once this change is made, select “*Add Package*.”\n\
    \nNext, a screen will appear in which we can select which components or products\
    \ of the `RxSwift` library we want to install. For our application, we will select\
    \ `RxCocoa`, `RxRelay`, and `RxSwift` (for main code), along with `RxTest` (for\
    \ testing purposes), and select “*Add Package*” again (Figure [4-9](#531999_1_En_4_Chapter.xhtml#Fig9)).\n\
    \n![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig9_HTML.png)\n\nA screenshot\
    \ represents a table with a list of package products along with their kinds and\
    \ targets to be added. There are checkmarks beside the r x cocoa, r x relay, r\
    \ x swift, and r x text package products.\n\nFigure 4-9 — Products selector for\
    \ RxSwift\n\nOnce the installation is finished, we can see that our project already\
    \ presents `RxSwift` as a dependency (Figure [4-10](#531999_1_En_4_Chapter.xhtml#Fig10)).\n\
    \n![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig10_HTML.png)\n\nA screenshot\
    \ represents the files and folders under M V V M my to-dos along with the R x\
    \ swift 6 point 5 point 0 under package dependencies.\n\nFigure 4-10 — Under Package\
    \ Dependencies, all SPM dependencies installed are shown\n\nTo use any of these\
    \ products in our code, we simply have to import them (the ones we need at any\
    \ given time):\n\n```swift\nimport RxCocoa\nimport RxRelay\nimport RxSwift\n```\n\
    \n## Input/Output Approach\n\nTo work in a more organized way with `RxSwift` and\
    \ the bind between the different components and events, we will use a simplified\
    \ procedure based on a fairly widespread convention whose origin is the Kickstarter\
    \ company.^([^(10)](#fn10))\n\nIt is a functional approach in which the concept\
    \ of Input/Output is used.\n\n- **Input**: It refers to all the events and interactions\
    \ that occur in the View and that affect the ViewModel (write a text, press a\
    \ button…).\n- **Output**: These are the changes that occur in the model and that\
    \ must be reflected in the View.\n\nLet’s see a simple example of the application\
    \ of this convention. We will start with the code of the ViewModel (Listing [4-2](#531999_1_En_4_Chapter.xhtml#PC4)).\n\
    \n```swift\nclass ExampleViewModel {\n    var output: Output!\n    var input:\
    \ Input!\n    \n    struct Input {\n        let text: PublishRelay<String>\n \
    \   }\n    \n    struct Output {\n        let title: Driver<String>\n    }\n \
    \   \n    init() {\n        let text = PublishRelay<String>()\n        let capsTitle\
    \ = text\n            .map({ return text.uppercased() })\n            .asDriver(onErrorJustReturn:\
    \ \"\")\n        \n        input = Input(text: text)\n        output = Output(title:\
    \ capsTitle)\n    }\n}\n```\n\nListing 4-2 — Example of RxSwift Input/Output approach\
    \ in the ViewModel\n\nAlthough, as we have said, we are not going to delve into\
    \ a library as extensive and complex as `RxSwift`, we will explain the different\
    \ elements used in our application and what their function is.\n\nFirst, we can\
    \ see the `PublishRelay<String>` and `Driver<String>` elements:\n\n- `PublishRelay`\
    \ is a component of `RxSwift` whose function is to broadcast the most recent item\
    \ it has watched (and subsequent ones) to all those watchers that have subscribed.\
    \ In this case, the passed item is of type `String` and is the text that we put\
    \ in the `UITextField` element.\n- `Driver` is an observable that runs on the\
    \ main thread (so it’s used to update the View). In this case, what it does is\
    \ pass the value that comes from the `UITextField` element (through the `PublishRelay`\
    \ created and that it is observing). Since we’re passing it to a UI component,\
    \ we have to do it on the main thread.\n\nNow, let’s see how we bind the ViewModel\
    \ with the elements of the View (Listing [4-3](#531999_1_En_4_Chapter.xhtml#PC5)).\n\
    \n```swift\nclass ExampleView {\n    func bind() {\n        textfield.rx.text\n\
    \            .bind(to: viewModel.input.text)\n            .disposed(by: disposeBag)\n\
    \        \n        viewModel.output.title\n            .drive(titleLabel.rx.text)\n\
    \            .disposed(by: disposeBag)\n    }\n}\n```\n\nListing 4-3 — Element\
    \ binding in the View\n\nHere we can see two blocks of code:\n\n- The first binds\
    \ the text parameter of the `UITextField` element to the text variable (as `Input`)\
    \ of the ViewModel. In this way, when we write in that field, the ViewModel will\
    \ receive it.\n- The second block binds the title variable (such as `Output`)\
    \ of the ViewModel to the text parameter of the `UILabel` element. Therefore,\
    \ as we type, the text in the ViewModel is converted to uppercase and forwarded\
    \ to the View for display.\n\n**Note**: `RxSwift` provides several extensions\
    \ for most of the objects and classes we use in Swift development. These extensions\
    \ are accessed via the `rx` particle, as in `tableView.rx`.\n\nWhen we want to\
    \ destroy an observable that we have created, we must call the `dispose()` method.\
    \ To make this job easier, we have `DisposeBag` from `RxSwift`. Therefore, every\
    \ time we create an observable, we must add it to the created `disposeBag` object\
    \ using the `.disposed(by: disposeBag)` method."
  raw: '#### What Is RxSwift?


    RxSwift is a reactive programming library for iOS application development.


    RxSwift is a library that allows us to develop asynchronous code in our applications,
    simplifying the way our code will act in front of the new data that arrives, treating
    them in a sequential and isolated way.


    In this book, we will not delve into the study of RxSwift and reactive programming,
    suffice it to say that reactive programming allows you to dynamically respond
    to changes in data and user events.


    RxSwift works with what we call *Observables*, which are wrapper objects for any
    type of data, to which we can subscribe or link so that any change that occurs
    in said *Observables* triggers a series of previously programmed operations.


    ##### Observables and Observers


    When using this library, we will have two types of elements:


    *   **Observable**: Issue notifications when a change occurs.


    *   **Observer**: An Observer subscribe to an Observable to receive its notifications.
    An Observable can have one or more observers.


    ##### Installing RxSwift


    The installation of RxSwift, as it is an external library, can be done in different
    ways (*Swift Package Manager*, *Carthage*, *CocoaPods*). In our case, we will
    use the Swift Package Manager (SPM), which is the system integrated with Xcode
    to introduce third-party libraries in our applications.


    To install RxSwift in our project, we will follow these steps:


    First of all, we access the Xcode main menu and select *File* ➤ *Add Packages…*
    (Figure [4-6](#531999_1_En_4_Chapter.xhtml#Fig6)).


    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig6_HTML.png)


    A screenshot of the context menu under the file tab. It highlights the add packages
    option from the list of options.


    Figure 4-6


    Add Packages… menu selection


    The Xcode Swift Package manager will appear on the screen (Figure [4-7](#531999_1_En_4_Chapter.xhtml#Fig7)).


    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig7_HTML.png)


    A screenshot represents a list of apple swift packages. It highlights the swift
    algorithm package and on the right and provides the details of the swift algorithms.
    There are buttons to cancel and add the package at the bottom.


    Figure 4-7


    Swift Package Manager screen


    At this point, what we do is copy the address of the RxSwift git repository (which
    we will find on their website), and we will place it in the search field that
    appears in the upper right (Figure [4-8](#531999_1_En_4_Chapter.xhtml#Fig8)).


    ```

    https://github.com/ReactiveX/RxSwift.git

    ```


    By doing this, Xcode takes care of searching for this library and tells us if
    we want to install it.


    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig8_HTML.png)


    A screenshot represents the R x swift package from the search result of all sources.
    The search bar at the top highlights a link at the top along with the details
    of the R X swift. There are 2 buttons at the bottom to cancel and add the package.


    Figure 4-8


    Search for the RxSwift package


    Before adding RxSwift, what we will do is change the “*Dependency Rule*” option
    from “*Branch*” to “*Up To Next Major Version*.” Once this change is made, select
    “*Add Package*.”


    Next, a screen will appear in which we can select which components or products
    of the RxSwift library we want to install. For our application, we will select
    RxCocoa, RxRelay, and RxSwift (for main code), along with RxTest (for testing
    purposes), and select “*Add Package*” again (Figure [4-9](#531999_1_En_4_Chapter.xhtml#Fig9)).


    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig9_HTML.png)


    A screenshot represents a table with a list of package products along with their
    kinds and targets to be added. There are checkmarks beside the r x cocoa, r x
    relay, r x swift, and r x text package products.


    Figure 4-9


    Products selector for RxSwift


    Once the installation is finished, we can see that our project already presents
    RxSwift as a dependency (Figure [4-10](#531999_1_En_4_Chapter.xhtml#Fig10)).


    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig10_HTML.png)


    A screenshot represents the files and folders under M V V M my to-dos along with
    the R x swift 6 point 5 point 0 under package dependencies.


    Figure 4-10


    Under Package Dependencies, all SPM dependencies installed are shown


    To use any of these products in our code, we simply have to import them (the ones
    we need at any given time):


    ```

    import RxCocoa

    import RxRelay

    import RxSwift

    ```


    ##### Input/Output Approach


    To work in a more organized way with RxSwift and the bind between the different
    components and events, we will use a simplified procedure based on a fairly widespread
    convention whose origin is the Kickstarter company.^([^(10)](#fn10))


    It is a functional approach in which the concept of Input/Output is used.


    *   **Input**: It refers to all the events and interactions that occur in the
    View and that affect the ViewModel (write a text, press a button…).


    *   **Output**: These are the changes that occur in the model and that must be
    reflected in the View.


    Let’s see a simple example of the application of this convention. We will start
    with the code of the ViewModel (Listing [4-2](#531999_1_En_4_Chapter.xhtml#PC4)).


    ```

    class ExampleViewModel {

    var output: Output!

    var input: Input!

    struct Input {

    let text: PublishRelay

    }

    struct Output {

    let title: Driver

    }

    init() {

    let text = PublishRelay()

    let capsTitle = text

    .map({

    return text.uppercased()

    })

    .asDriver(onErrorJustReturn: "")

    input = Input(text: text)

    output = Output(title: capsTitle)

    }

    }

    Listing 4-2

    Example of RxSwift Input/Output approach in the ViewModel

    ```


    Although, as we have said, we are not going to delve into a library as extensive
    and complex as RxSwift, we will explain the different elements used in our application
    and what their function is.


    First, we can see the *PublishRelay<String>* and *Driver<String>* elements:


    *   *PublishRelay* is a component of RxSwift whose function is to broadcast the
    most recent item it has watched (and subsequent ones) to all those watchers that
    have subscribed. In this case, the passed item is of type String and is the text
    that we put in the *UITextField* element.


    *   *Driver* is an observable that runs on the main thread (so it’s used to update
    the View). In this case, what it does is pass the value that comes from the *UITextField*
    element (through the *PublishRelay* created and that it is observing). Since we’re
    passing it to a UI component, we have to do it on the main thread.


    Now, let’s see how we bind the ViewModel with the elements of the View (Listing
    [4-3](#531999_1_En_4_Chapter.xhtml#PC5)).


    ```

    class ExampleView {

    func bind() {

    textfield.rx.text

    .bind(to: viewModel.input.text )

    .disposed(by: disposeBag)

    viewModel.output.title

    .drive(titleLabel.rx.text)

    .disposed(by: disposeBag)

    }

    }

    Listing 4-3

    Element binding in the View

    ```


    Here we can see two blocks of code:


    *   The first binds the text parameter of the *UITextField* element to the text
    variable (as *Input*) of the ViewModel. In this way, when we write in that field,
    the ViewModel will receive it.


    *   The second block binds the title variable (such as *Output*) of the ViewModel
    to the text parameter of the *UILabel* element. Therefore, as we type, the text
    in the ViewModel is converted to uppercase and forwarded to the View for display.


    Note


    RxSwift provides several extensions for most of the objects and classes we use
    in Swift development. These extensions are accessed via the *rx* particle, as
    in *tableView.rx*.


    When we want to destroy an observable that we have created, we must call the *dispose*(
    ) method. To make this job easier, we have *DisposeBag* from RxSwift. Therefore,
    every time we create an observable, we must add it to the created *diposeBag*
    object using the *.disposed(by: disposeBag)* method.'
  trans: "\n# 什么是 RxSwift？\n\n`RxSwift` 是一款用于 iOS 应用程序开发的响应式编程库。\n\n`RxSwift` 是一个库，它让我们能够在应用程序中开发异步代码，简化代码在面对新到达数据时的行为方式，并以顺序且隔离的方式处理这些数据。\n\
    \n在本书中，我们不会深入研究 `RxSwift` 和响应式编程，只需知道响应式编程允许你动态响应数据变化和用户事件即可。\n\n`RxSwift` 使用我们称之为\
    \ *Observables* 的对象来工作，这些对象是任何数据类型的包装器，我们可以订阅或链接到它们，以便所述 *Observables* 中发生的任何变化都会触发一系列预先编程的操作。\n\
    \n## Observables 和 Observers\n\n使用这个库时，我们会有两种类型的元素：\n\n- **Observable** : 在发生更改时发出通知。\n\
    - **Observer** : 观察者订阅一个 Observable 以接收其通知。一个 Observable 可以有一个或多个观察者。\n\n## 安装\
    \ RxSwift\n\n`RxSwift` 作为一个外部库，其安装可以通过多种方式完成（*Swift Package Manager*，*Carthage*，*CocoaPods*）。在我们的案例中，我们将使用\
    \ Swift Package Manager (SPM)，这是 Xcode 集成的用于在应用程序中引入第三方库的系统。\n\n要在我们的项目中安装 `RxSwift`，我们将遵循以下步骤：\n\
    \n首先，进入 Xcode 主菜单，选择 *File* ➤ *Add Packages…* （图 4-6）。\n\n![](img/531999_1_En_4_Fig6_HTML.png)\n\
    \n文件选项卡下上下文菜单的截图。它高亮显示了选项列表中的添加包选项。\n\n图 4-6 — 选择添加包… 菜单\n\nXcode Swift Package\
    \ Manager 屏幕将会出现（图 4-7）。\n\n![](img/531999_1_En_4_Fig7_HTML.png)\n\n截图展示了苹果 Swift\
    \ 包列表。它高亮显示了 Swift 算法包，并在右侧提供了 Swift 算法的详细信息。底部有取消和添加包的按钮。\n\n图 4-7 — Swift Package\
    \ Manager 屏幕\n\n此时，我们要做的是复制 `RxSwift` git 仓库的地址（我们可以在其网站上找到），并将其粘贴到右上角的搜索字段中（图\
    \ 4-8）。\n\n```\nhttps://github.com/ReactiveX/RxSwift.git\n```\n\n执行此操作后，Xcode\
    \ 会负责搜索该库，并提示我们是否要安装它。\n\n![](img/531999_1_En_4_Fig8_HTML.png)\n\n截图展示了从所有源搜索出来的\
    \ R x swift 包。顶部的搜索栏高亮显示了一个链接以及 R X swift 的详细信息。底部有两个按钮用于取消和添加包。\n\n图 4-8 — 搜索\
    \ RxSwift 包\n\n在添加 `RxSwift` 之前，我们要做的是将“*Dependency Rule*”选项从“*Branch*”更改为“*Up\
    \ To Next Major Version*”。完成此更改后，选择“*Add Package*”。\n\n接下来，会出现一个屏幕，我们可以在其中选择要安装的\
    \ `RxSwift` 库的组件或产品。对于我们的应用程序，我们将选择 `RxCocoa`、`RxRelay` 和 `RxSwift`（用于主代码），以及\
    \ `RxTest`（用于测试目的），然后再次选择“*Add Package*”（图 4-9）。\n\n![](img/531999_1_En_4_Fig9_HTML.png)\n\
    \n截图展示了包含包产品列表及其种类和要添加的目标的表格。在 r x cocoa、r x relay、r x swift 和 r x text 包产品旁边有复选标记。\n\
    \n图 4-9 — RxSwift 的产品选择器\n\n安装完成后，我们可以看到我们的项目已经将 `RxSwift` 显示为依赖项（图 4-10）。\n\n\
    ![](img/531999_1_En_4_Fig10_HTML.png)\n\n截图展示了 M V V M my to-dos 下的文件和文件夹以及包依赖项下的\
    \ R x swift 6 点 5 点 0。\n\n图 4-10 — 在包依赖项下，显示了所有已安装的 SPM 依赖项\n\n要在我们的代码中使用这些产品中的任何一个，我们只需导入它们（在需要时导入对应的即可）：\n\
    \n```swift\nimport RxCocoa\nimport RxRelay\nimport RxSwift\n```\n\n## 输入/输出方法\n\
    \n为了以更有组织的方式使用 `RxSwift` 以及不同组件和事件之间的绑定，我们将使用一种简化的流程，该方法基于一个相当普遍的约定，其起源是 Kickstarter\
    \ 公司。^(¹⁰)\n\n这是一种函数式方法，其中使用了输入/输出的概念。\n\n- **Input** : 指发生在 View 中并影响 ViewModel\
    \ 的所有事件和交互（写入文本、按下按钮……）。\n- **Output** : 指模型中发生的、必须在 View 中反映出来的更改。\n\n让我们看一个应用此约定的简单示例。我们从\
    \ ViewModel 的代码开始（列表 4-2）。\n\n```swift\nclass ExampleViewModel {\n    var output:\
    \ Output!\n    var input: Input!\n    \n    struct Input {\n        let text:\
    \ PublishRelay<String>\n    }\n    \n    struct Output {\n        let title: Driver<String>\n\
    \    }\n    \n    init() {\n        let text = PublishRelay<String>()\n      \
    \  let capsTitle = text\n            .map({ return text.uppercased() })\n    \
    \        .asDriver(onErrorJustReturn: \"\")\n        \n        input = Input(text:\
    \ text)\n        output = Output(title: capsTitle)\n    }\n}\n```\n\n列表 4-2 —\
    \ ViewModel 中 RxSwift 输入/输出方法的示例\n\n尽管我们已经说过不会深入探讨像 `RxSwift` 这样庞大而复杂的库，但我们还是会解释一下在应用程序中使用的不同元素及其功能。\n\
    \n首先，我们可以看到 `PublishRelay<String>` 和 `Driver<String>` 元素：\n\n- `PublishRelay`\
    \ 是 `RxSwift` 的一个组件，其功能是将其观察到的最近项目（以及后续项目）广播给所有已订阅的观察者。在这种情况下，传递的项目类型是 `String`，是我们放在\
    \ `UITextField` 元素中的文本。\n- `Driver` 是一个在主线程上运行的 observable（因此用于更新视图）。在这种情况下，它所做的是传递来自\
    \ `UITextField` 元素的值（通过已创建并正在观察的 `PublishRelay`）。由于我们将其传递给 UI 组件，因此必须在主线程上进行。\n\
    \n现在，让我们看看如何将 ViewModel 与 View 的元素绑定（列表 4-3）。\n\n```swift\nclass ExampleView {\n\
    \    func bind() {\n        textfield.rx.text\n            .bind(to: viewModel.input.text)\n\
    \            .disposed(by: disposeBag)\n        \n        viewModel.output.title\n\
    \            .drive(titleLabel.rx.text)\n            .disposed(by: disposeBag)\n\
    \    }\n}\n```\n\n列表 4-3 — View 中的元素绑定\n\n这里我们看到两个代码块：\n\n- 第一个块将 `UITextField`\
    \ 元素的 text 参数绑定到 ViewModel 的 text 变量（作为 `Input`）。这样，当我们在此字段中输入时，ViewModel 将会收到它。\n\
    - 第二个块将 ViewModel 的 title 变量（作为 `Output`）绑定到 `UILabel` 元素的 text 参数。因此，当我们输入时，ViewModel\
    \ 中的文本会被转换为大写并转发到 View 进行显示。\n\n**注意**：`RxSwift` 为我们在 Swift 开发中使用的大部分对象和类提供了几个扩展。这些扩展通过\
    \ `rx` 粒子访问，如 `tableView.rx`。\n\n当我们想要销毁已创建的 observable 时，必须调用 `dispose()` 方法。为了简化这项工作，我们拥有来自\
    \ `RxSwift` 的 `DisposeBag`。因此，每当我们创建一个 observable 时，都必须使用 `.disposed(by: disposeBag)`\
    \ 方法将其添加到创建的 `disposeBag` 对象中。\n"
- fmt: "# MyToDos Application Screens\n\nAs we have just seen, the core of the MVVM\
    \ architecture is the `ViewModel`, which is in charge of maintaining the state\
    \ of the `View` and modifying it every time that state changes (thanks to the\
    \ Data Binding).\n\nAlthough the MVVM architecture is similar to the MVP architecture\
    \ (which we have already seen in Chapter [3](#531999_1_En_3_Chapter.xhtml)), where\
    \ the `ViewModel` would have similar functions to the `Presenter`, MVVM solves\
    \ the coupling problem between the `View` and `Presenter` of the MVP (in which\
    \ the `View` has a reference to the `Presenter` and vice versa): in the MVVM this\
    \ coupling does not exist thanks to the use of Data Binding.\n\nTherefore, we\
    \ are going to focus on how to program the `ViewModel` and the `View` (along with\
    \ the `Controller`) and the binding between them.\n\n## AppDelegate and SceneDelegate\n\
    \nIn our MVVM project, `AppDelegate` and `SceneDelegate` present the same code\
