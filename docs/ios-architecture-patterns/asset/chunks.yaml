    Finally, we need to make the *AddTaskInteractor* conform to the *AddTaskInteractorInput*
    protocol. This protocol only has one method, *addTask*, to which we pass a request
    with the title and icon of the new task.


    In this method, we first create the *TaskModel* object, which we pass to the *TaskService*
    for saving to the database. Then we tell the *TaskList* scene to update the task
    list (via the delegate), and finally, we tell the Presenter to dismiss the View
    (Listing [6-60](#531999_1_En_6_Chapter.xhtml#PC61)).


    ```

    extension AddTaskInteractor: AddTaskInteractorInput {

    func addTask(request: AddTaskModel.AddTask.Request) {

    let task = TaskModel(id: ProcessInfo().globallyUniqueString,

    title: request.title,

    icon: request.icon,

    done: false,

    createdAt: Date())

    taskService.saveTask(task, in: tasksList)

    delegate?.didAddTask()

    presenter?.dismissView()

    }

    }

