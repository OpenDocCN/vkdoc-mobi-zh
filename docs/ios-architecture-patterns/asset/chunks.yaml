    \ `setUpWithError` 方法中我们在数据库中创建了一个列表，我们必须验证该列表有一行，该行显示了一个单元格，或者，当我们删除该列表时，列表数量不为零（列表\
    \ 2-36）。\n\n```\n// UITableView 有一行\nfunc testTableView_whenModelHasAList_shouldBeOneRow()\
    \ {\n    XCTAssertEqual(sut.tableView.numberOfRows(inSection: 0), 1)\n}\n\n//\
    \ 在 IndexPath(row: 0, section: 0) 处的 UITableView 有一个 UITableViewCell\nfunc testTableView_whenModelHasAList_shoulBeACellAtIndexPath()\
    \ {\n    let indexPath = IndexPath(row: 0, section: 0)\n    let cell = sut.tableView.dataSource?.tableView(sut.tableView,\
    \ cellForRowAt: indexPath)\n    XCTAssertNotNil(cell)\n}\n\n// 在 TasksList 对象被删除后，tasksList\
    \ 包含 0 个元素\nfunc testTableView_whenListIsDeleted_shouldBeNoneOnModel() {\n   \
    \ let indexPath = IndexPath(row: 0, section: 0)\n    sut.tableView.dataSource?.tableView?(sut.tableView,\
    \ commit: .delete, forRowAt: indexPath)\n    XCTAssertEqual(sut.tasksList.count,\
    \ 0)\n}\n```\n\n*列表 2-36* – 用于 `UITableView` 方法的测试\n\n---\n\n### 总结\n\n模型-视图-控制器架构可能是最常用的，也是开始开发应用程序时通常首先使用的架构，因为它最简单。\n\
    \nMVC 有清晰的职责分离（模型、视图和控制器），尽管很多时候视图与控制器紧密耦合，这降低了其可重用性。这使得在没有视图干预的情况下测试控制器变得更加困难。\n\
    \n另一方面，必须注意不要使控制器过载，因为作为 MVC 的核心部分，通常会将职责添加到其中，例如业务逻辑、导航到其他屏幕、视图本身及其组件。\n\n在我们开发的应用程序示例中，由于它是一个相当简单的应用程序，所以控制器很小，但想想如果我们开始添加额外的功能会发生什么。因此，最好采取一些有助于减小其规模的措施（其中一些我们已经应用了）：\n\
    \n-   将视图代码移动到其自己的类中，并在控制器本身中保留一个引用。\n-   将所有与数据相关的内容（例如获取和处理数据，或数据排序）传递给模型。\n\
    -   通过协调器管理屏幕之间的导航。\n\n从现在开始，我们将看到更复杂的架构，这些架构旨在解决 MVC 可能存在的问题，并且其中展示的一些解决方案可以迁移到这种架构中。\n\
    \n---\n\n# 3. MVP：模型-视图-展示器\n\n## 什么是 MVP？\n\n### 一点历史\n\n模型-视图-展示器模式源于我们在前一章中看到的模型-视图-控制器模式。它是在\
    \ 20 世纪 90 年代早期，由软件公司 Taligent（由苹果、IBM 和惠普共同拥有）开发的。^(⁵)\n\n### 它是如何工作的\n\nMVP\
    \ 模式由三个组件组成：模型、视图和展示器，其中展示器充当模型和视图（`UIViewController` + `View`）之间的中介，连接方式如图 3-1\
    \ 所示。\n\n![](img/531999_1_En_3_Fig1_HTML.jpg)\n\n*一个由展示器、视图和模型组成的示意图。它们通过用户操作、更新和通知进行连接。*\n\
    \n**图 3-1** – 模型-视图-展示器示意图\n\n### MVP 中的组件\n\n现在我们更详细地看一下 MVP 模式中这三个组件的特性。\n\n\
    #### 模型\n\n与 MVC 模式相同，模型是负责业务逻辑以及存储、操作和访问应用程序数据的组件（或多个组件）：\n\n-   它包含与数据持久化相关的类。\n\
    -   它包含控制应用程序通信的类。\n-   它负责将从外部接收的信息转换为模型对象。\n-   它包含扩展、常量……\n-   在 MVP 中，模型层只能与展示器层通信（即，模型不知道视图的存在）。\n\
    \n因此，例如，当用户与视图交互时，这种交互通过展示器传递给模型。同样，如果模型被更新并且需要更新视图，那么展示器将负责更新它。\n\n#### 视图\n\n\
    在 MVP 模型中，视图层同时包含视图（`UIView`）和控制器（`UIViewController`）组件，这与 MVC 模式不同，在 MVC 中我们将它们放在不同的层。\n\
    \n此外，在 MVP 模式中，视图和控制器存储的逻辑都比 MVC 模型少得多，这使得它们更轻量。\n\n现在，控制器仅具有协调/路由功能，负责处理屏幕之间的导航，并在必要时通过委托模式传递信息。\n\
    \n在 MVP 中，控制器负责实例化视图并将其传递给展示器（列表 3-1）。\n\n```\nclass ExampleController: UIViewController\
    \ {\n    private var exampleView = ExampleView()\n    ...\n    override func loadView()\
    \ {\n        super.loadView()\n        setupExampleView()\n    }\n\n    private\
    \ func setupExampleView() {\n        let presenter = ExamplePresenter(exampleView:\
    \ ExampleView)\n        exampleView.presenter = presenter\n        exampleView.setupView()\n\
    \        self.view = exampleView\n    }\n}\n```\n\n*列表 3-1* – 展示器和视图实例化；将视图传递给展示器\n\
    \n#### 展示器\n\n展示器负责接收视图中发生的事件并将其传递给模型。另一方面，展示器也负责在数据更改时更新视图。\n\n为了进一步解耦，我们不会直接将视图传递给展示器，而是创建一个包含展示器用于更新视图的方法的协议（列表\
    \ 3-2）。\n\n```\nprotocol ExampleViewDelegate: AnyObject {\n    func updateView()\n\
    }\n\nclass ExamplePresenter {\n    private weak var exampleView: ExampleViewDelegate?\n\
    \n    init(exampleView: ExampleViewDelegate? = nil) {\n        self.exampleView\
    \ = exampleView\n    }\n    ...\n}\n```\n\n*列表 3-2* – 在 `init` 方法中将视图传递给展示器\n\n\
    ### MVP 的优点和缺点\n\nMVP 模型比 MVC 模型稍微复杂一些，因为引入了一个新元素——展示器，因此需要稍多一点的开发经验。\n\n下面，您可以看到这种架构最重要的优点和缺点。\n"
- fmt: "#### Advantages\n\nThe main advantages of the MVP architecture are as follows:\n\
    \n- Although it is somewhat more complex than MVC, it derives from it, so in a\
    \ short time we can get used to working with it.\n- It presents a better separation\
    \ of responsibilities than the MVC pattern.\n- Business logic can be tested better.\n\
    \n#### Disadvantages\n\nThe main disadvantages are as follows:\n\n- Being more\
    \ complex than MVC, it is not usually recommended for use in small and simple\
    \ applications.\n- Although we have further modularized the architecture, there\
    \ are still some issues, such as the fact that the Controller still handles navigation\
    \ between screens. This can be solved by introducing a Router or Coordinator to\
    \ take care of that task.\n- In the same way that in the MVC the Controller could\
    \ become a massive component, in the MVP the same can happen with the Presenter.\n\
    \n## MVP Application\n\nOnce we have seen the characteristics of the MVP architecture,\
    \ we are going to apply it in the development of our application.\n\n> **Note**\
    \  \n> The entire project can be downloaded from the repository of this book.\
    \ During the explanation of the implementation of the MVP architecture in our\
    \ project, we will only show the most relevant parts of the code.\n\n### MVP Layers\n\
    \nTo continue with the logic of the applied architecture pattern (Model–View–Presenter),\
    \ we will create a folder structure that simulates its layers (Figure [3-2](#531999_1_En_3_Chapter.xhtml#Fig2)).\n\
    \n![A screenshot depicts an M V P project folder and its components.](images/531999_1_En_3_Chapter/531999_1_En_3_Fig2_HTML.jpg)\
    \  \n**Figure 3-2** MVP project folder structure\n\n#### Model\n\nIn the same\
    \ way as in the MVC architecture, this folder contains everything related to business\
    \ logic, data access, and its manipulation. It contains the same files as in the\
    \ case of MVC (Figure [3-3](#531999_1_En_3_Chapter.xhtml#Fig3)).\n\n![A screenshot\
    \ depicts M V P project folder along its components and the model layer files.](images/531999_1_En_3_Chapter/531999_1_En_3_Fig3_HTML.jpg)\
    \  \n**Figure 3-3** Model layer files\n\nHowever, while in the MVC architecture\
    \ the changes produced in the model were notified to the Controller (using the\
    \ Observe pattern), in the MVP architecture these changes are notified to the\
    \ Presenter (i.e., the Presenter must be subscribed to these changes).\n\nUnlike\
    \ in the MVC architecture, where we added the observer in the Controller’s `viewDidLoad`\
    \ method, in the MVP architecture, we will add it in the Presenter’s `init` method\
    \ (Listing [3-3](#531999_1_En_3_Chapter.xhtml#PC3)).\n\n```\ninit() {\n    NotificationCenter.default.addObserver(self,\n\
    \        selector: #selector(contextObjectsDidChange),\n        name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
    \        object: CoreDataManager.shared.mainContext)\n}\n@objc func contextObjectsDidChange()\
    \ {\n    updateView()\n}\n```\n**Listing 3-3** Setting the observer on Presenter\
    \ initialization\n\n##### Core Data\n\nIn this folder, we will have the `CoreDataManager.swift`\
    \ file (which we created in Chapter [1](#531999_1_En_1_Chapter.xhtml)), along\
    \ with the four files created by Xcode automatically for the database entities.\n\
    \n##### Models\n\nAs described in Chapter [2](#531999_1_En_2_Chapter.xhtml), here\
    \ we have the models into which we can transform the database entities. In addition,\
    \ we will create a protocol that the models must comply with, to transform from\
    \ model to entity and vice versa.\n\n##### Services\n\nHere we will have the classes\
    \ that allow us to send information to the database (create, update, or delete\
    \ it) or retrieve information from the database and transform it into models.\n\
    \n##### Extensions\n\nIn this case, we have created a `UIColor` extension to be\
    \ able to easily access the colors created especially for this application and\
    \ an extension to the `NSManagedObject` class that will prevent us from conflicting\
    \ with the contexts when we do the testing part.\n\n##### Constants\n\nThey contain\
    \ the constant parameters that we will use in the application.\n\n#### View\n\n\
    In the View folder, we will not only have the View files and the components that\
    \ form them (as in MVC), but also the Controller files (subclasses of `UIViewController`),\
    \ as shown in Figure [3-4](#531999_1_En_3_Chapter.xhtml#Fig4).\n\n![A screenshot\
    \ of M V P project folder and its components with view layer files.](images/531999_1_En_3_Chapter/531999_1_En_3_Fig4_HTML.png)\
    \  \n**Figure 3-4** View layer files\n\nRemember that in MVP, Controllers usually\
    \ only have coordination/routing functions (to navigate between screens) and,\
    \ in some cases, pass information (via a Delegate pattern, for example).\n\n####\
    \ Presenter\n\nThis folder only contains the Presenters, which, as we have seen,\
    \ connect the Model to the View (Figure [3-5](#531999_1_En_3_Chapter.xhtml#Fig5)).\n\
    \n![A screenshot of M V P project presenter layer files.](images/531999_1_En_3_Chapter/531999_1_En_3_Fig5_HTML.jpg)\
    \  \n**Figure 3-5** Presenter layer files\n\n### MyToDos Application Screens\n\
    \nAs we have just commented, in the MVP architecture, unlike the MVC, it is the\
    \ Presenter that is in charge of the business logic (leaving the navigation tasks\
    \ to the Controller).\n\nNext, we will see, for each of the different screens\
    \ of our app, how we connect the different layers with each other: Model, View(+`UIViewController`),\
    \ and Presenter.\n\n#### AppDelegate and SceneDelegate\n\nAs we saw in Chapter\
    \ [2](#531999_1_En_2_Chapter.xhtml), the `AppDelegate` and the `SceneDelegate`\
    \ are in charge of managing the life cycle of the application and what is displayed\
    \ and how it is displayed on the screen.\n\nIn our case, we will only modify the\
    \ `SceneDelegate`, which will be in charge of creating a new `UIWindow`, configuring\
    \ the root view controller of the application, and, finally, that the created\
    \ `UIWindow` is the key window.\n\nUnlike when we studied the MVC, in which we\
    \ passed an instance of the `HomeViewController` to the `UINavigationController`\
    \ component, which in its initialization required that the dependencies be passed\
    \ to the `TasksListService` and `TaskService` services, now the `HomeViewController`\
    \ does not require them, since as we will see in a moment, these dependencies\
    \ will be held by the `HomePresenter` component.\n\n```\nfunc scene(_ scene: UIScene,\
    \ willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
    \ {\n    if let windowScene = scene as? UIWindowScene {\n        let window =\
    \ UIWindow(windowScene: windowScene)\n        let navigationController = UINavigationController(rootViewController:\
    \ HomeViewController())\n        navigationController.navigationBar.isHidden =\
    \ true\n        navigationController.interactivePopGestureRecognizer?.isEnabled\
    \ = false\n        window.backgroundColor = .white\n        window.rootViewController\
    \ = navigationController\n        self.window = window\n        window.makeKeyAndVisible()\n\
    \    }\n}\n```\n\n#### Home Screen\n\nOn the Home screen, the main component is\
    \ the Presenter, which is in charge of passing information to the Model and subscribing\
    \ to notifications of its changes. In addition, it is also responsible for receiving\
    \ user interactions in the View and updating it with the information it receives\
    \ from the Model.\n\nThe View is separate from the Controller, and some of its\
    \ actions, such as navigating to another screen, are delegated to the Controller\
    \ (Figure [3-6](#531999_1_En_3_Chapter.xhtml#Fig6)).\n\n![A flowchart depicts\
    \ home screen components, such as home view controller, home view, home presenter,\
    \ and task list service among others.](images/531999_1_En_3_Chapter/531999_1_En_3_Fig6_HTML.png)\
    \  \n**Figure 3-6** Home screen components communication schema"
  raw: '#### Advantages


    The main advantages of the MVP architecture are as follows:


    *   Although it is somewhat more complex than MVC, it derives from it, so in a
    short time we can get used to working with it.


    *   It presents a better separation of responsibilities than the MVC pattern.


    *   Business logic can be tested better.


    #### Disadvantages


    The main disadvantages are as follows:


    *   Being more complex than MVC, it is not usually recommended for use in small
    and simple applications.


    *   Although we have further modularized the architecture, there are still some
    issues, such as the fact that the Controller still handles navigation between
    screens. This can be solved by introducing a Router or Coordinator to take care
    of that task.


    *   In the same way that in the MVC the Controller could become a massive component,
    in the MVP the same can happen with the Presenter.


    ## MVP Application


    Once we have seen the characteristics of the MVP architecture, we are going to
    apply it in the development of our application.


    Note


    The entire project can be downloaded from the repository of this book. During
    the explanation of the implementation of the MVP architecture in our project,
    we will only show the most relevant parts of the code.


    ### MVP Layers


    To continue with the logic of the applied architecture pattern (Model–View–Presenter),
    we will create a folder structure that simulates its layers (Figure [3-2](#531999_1_En_3_Chapter.xhtml#Fig2)).


    ![](images/531999_1_En_3_Chapter/531999_1_En_3_Fig2_HTML.jpg)


    A screenshot depicts an M V P project folder and its components.


    Figure 3-2


    MVP project folder structure


    #### Model


    In the same way as in the MVC architecture, this folder contains everything related
    to business logic, data access, and its manipulation. It contains the same files
    as in the case of MVC (Figure [3-3](#531999_1_En_3_Chapter.xhtml#Fig3)).


    ![](images/531999_1_En_3_Chapter/531999_1_En_3_Fig3_HTML.jpg)


    A screenshot depicts M V P project folder along its components and the model layer
    files.


    Figure 3-3


    Model layer files


    However, while in the MVC architecture the changes produced in the model were
    notified to the Controller (using the Observe pattern), in the MVP architecture
    these changes are notified to the Presenter (i.e., the Presenter must be subscribed
    to these changes).


    Unlike in the MVC architecture, where we added the observer in the Controller’s
    *viewDidLoad* method, in the MVP architecture, we will add it in the Presenter’s
    *init* method (Listing [3-3](#531999_1_En_3_Chapter.xhtml#PC3)).


    ```

    init() {

    NotificationCenter.default.addObserver(self,

    selector: #selector(contextObjectsDidChange),

    name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,

    object: CoreDataManager.shared.mainContext)

    }

    @objc func contextObjectsDidChange() {

    updateView()

    }

    Listing 3-3

    Setting the observer on Presenter initialization

    ```


    ##### Core Data


    In this folder, we will have the `CoreDataManager.swift` file (which we created
    in Chapter [1](#531999_1_En_1_Chapter.xhtml)), along with the four files created
    by Xcode automatically for the database entities.


    ##### Models


    As described in Chapter [2](#531999_1_En_2_Chapter.xhtml), here we have the models
    into which we can transform the database entities. In addition, we will create
    a protocol that the models must comply with, to transform from model to entity
    and vice versa.


    ##### Services


    Here we will have the classes that allow us to send information to the database
    (create, update, or delete it) or retrieve information from the database and transform
    it into models.


    ##### Extensions


    In this case, we have created a *UIColor* extension to be able to easily access
    the colors created especially for this application and an extension to the *NSManagedObject*
    class that will prevent us from conflicting with the contexts when we do the testing
    part.


    ##### Constants


    They contain the constant parameters that we will use in the application.


    #### View


    In the View folder, we will not only have the View files and the components that
    form them (as in MVC), but also the Controller files (subclasses of *UIViewController*),
    as shown in Figure [3-4](#531999_1_En_3_Chapter.xhtml#Fig4).


    ![](images/531999_1_En_3_Chapter/531999_1_En_3_Fig4_HTML.png)


    A screenshot of M V P project folder and its components with view layer files.


    Figure 3-4


    View layer files


    Remember that in MVP, Controllers usually only have coordination/routing functions
    (to navigate between screens) and, in some cases, pass information (via a Delegate
    pattern, for example).


    #### Presenter


    This folder only contains the Presenters, which, as we have seen, connect the
    Model to the View (Figure [3-5](#531999_1_En_3_Chapter.xhtml#Fig5)).


    ![](images/531999_1_En_3_Chapter/531999_1_En_3_Fig5_HTML.jpg)


    A screenshot of M V P project presenter layer files.


    Figure 3-5


    Presenter layer files


    ### MyToDos Application Screens


    As we have just commented, in the MVP architecture, unlike the MVC, it is the
    Presenter that is in charge of the business logic (leaving the navigation tasks
    to the Controller).


    Next, we will see, for each of the different screens of our app, how we connect
    the different layers with each other: Model, View(+*UIViewController*), and Presenter.


    #### AppDelegate and SceneDelegate


    As we saw in Chapter [2](#531999_1_En_2_Chapter.xhtml), the *AppDelegate* and
    the *SceneDelegate* are in charge of managing the life cycle of the application
    and what is displayed and how it is displayed on the screen.


    In our case, we will only modify the *SceneDelegate*, which will be in charge
    of creating a new *UIWindow*, configuring the root view controller of the application,
    and, finally, that the created *UIWindow* is the key window.


    Unlike when we studied the MVC, in which we passed an instance of the *HomeViewController*
    to the *UINavigationController* component, which in its initialization required
    that the dependencies be passed to the *TasksListService* and *TaskService* services,
    now the *HomeViewController* does not require them, since as we will see in a
    moment, these dependencies will be held by the *HomePresenter* component.


    ```

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:
    UIScene.ConnectionOptions) {

    if let windowScene = scene as? UIWindowScene {

    let window = UIWindow(windowScene: windowScene)

    let navigationController = UINavigationController(rootViewController: HomeViewController())

    navigationController.navigationBar.isHidden = true

    navigationController.interactivePopGestureRecognizer?.isEnabled = false

    window.backgroundColor = .white

    window.rootViewController = navigationController

    self.window = window

    window.makeKeyAndVisible()

    }

    }

    ```


    #### Home Screen


    On the Home screen, the main component is the Presenter, which is in charge of
    passing information to the Model and subscribing to notifications of its changes.
    In addition, it is also responsible for receiving user interactions in the View
    and updating it with the information it receives from the Model.


    The View is separate from the Controller, and some of its actions, such as navigating
    to another screen, are delegated to the Controller (Figure [3-6](#531999_1_En_3_Chapter.xhtml#Fig6)).


    ![](images/531999_1_En_3_Chapter/531999_1_En_3_Fig6_HTML.png)


    A flowchart depicts home screen components, such as home view controller, home
    view, home presenter, and task list service among others.


    Figure 3-6


    Home screen components communication schema'
  trans: "#### 优势\n\nMVP 架构的主要优势如下：\n\n-   尽管它比 MVC 稍微复杂一些，但它源于 MVC，因此我们可以在短时间内适应它的工作方式。\n\
    -   与 MVC 模式相比，它呈现出更好的职责分离。\n-   业务逻辑可以更好地进行测试。\n\n#### 劣势\n\n主要劣势如下：\n\n-   由于比\
    \ MVC 更复杂，通常不建议在小型和简单的应用程序中使用。\n-   尽管我们进一步模块化了架构，但仍然存在一些问题，例如 Controller 仍然处理屏幕间的导航。这可以通过引入\
    \ Router 或 Coordinator 来处理该任务来解决。\n-   就像在 MVC 中 Controller 可能变得臃肿一样，在 MVP 中，Presenter\
    \ 也可能遇到同样的问题。\n\n## MVP 应用\n\n了解了 MVP 架构的特性后，我们将把它应用到应用程序的开发中。\n\n> **注意**  \n\
    > 整个项目可以从本书的代码仓库下载。在解释如何在项目中实现 MVP 架构时，我们将仅展示代码中最相关的部分。\n\n### MVP 层\n\n为了遵循所应用的架构模式（Model–View–Presenter）的逻辑，我们将创建一个模拟其各层的文件夹结构（图\
    \ 3-2）。\n\n![一个屏幕截图显示了 MVP 项目文件夹及其组件。](img/531999_1_En_3_Fig2_HTML.jpg)  \n**图\
    \ 3-2** MVP 项目文件夹结构\n\n#### Model\n\n与 MVC 架构相同，此文件夹包含与业务逻辑、数据访问及其操作相关的所有内容。它包含与\
    \ MVC 案例中相同的文件（图 3-3）。\n\n![一个屏幕截图显示了 MVP 项目文件夹及其组件以及模型层文件。](img/531999_1_En_3_Fig3_HTML.jpg)\
    \  \n**图 3-3** 模型层文件\n\n然而，在 MVC 架构中，模型产生的变化会通知给 Controller（使用观察者模式），而在 MVP 架构中，这些变化会通知给\
    \ Presenter（即 Presenter 必须订阅这些变化）。\n\n与 MVC 架构中我们在 Controller 的`viewDidLoad`方法中添加观察者不同，在\
    \ MVP 架构中，我们将在 Presenter 的`init`方法中添加它（列表 3-3）。\n\n```init\ninit() {\n    NotificationCenter.default.addObserver(self,\n\
    \        selector: #selector(contextObjectsDidChange),\n        name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
    \        object: CoreDataManager.shared.mainContext)\n}\n@objc func contextObjectsDidChange()\
    \ {\n    updateView()\n}\n```\n**列表 3-3** 在 Presenter 初始化时设置观察者\n\n##### Core\
    \ Data\n\n在此文件夹中，我们将放置 `CoreDataManager.swift` 文件（我们在第 1 章中创建），以及由 Xcode 为数据库实体自动创建的四个文件。\n\
    \n##### Models\n\n如第 2 章所述，这里存放的是我们可以从数据库实体转换而来的模型。此外，我们将创建一个模型必须遵守的协议，以便在模型和实体之间相互转换。\n\
    \n##### Services\n\n这里我们将放置允许我们向数据库发送信息（创建、更新或删除）或从数据库检索信息并将其转换为模型的类。\n\n#####\
    \ Extensions\n\n在这种情况下，我们创建了一个 `UIColor` 扩展，以便能够轻松访问为此应用程序专门创建的颜色，以及一个 `NSManagedObject`\
    \ 类的扩展，这将防止我们在进行测试部分时出现上下文冲突。\n\n##### Constants\n\n它们包含我们将在应用程序中使用的常量参数。\n\n\
    #### View\n\n在 View 文件夹中，我们不仅会有 View 文件及其构成的组件（如同在 MVC 中），还会有 Controller 文件（`UIViewController`的子类），如图\
    \ 3-4 所示。\n\n![一个 MVP 项目文件夹及其组件与视图层文件的屏幕截图。](img/531999_1_En_3_Fig4_HTML.png)\
    \  \n**图 3-4** 视图层文件\n\n请记住，在 MVP 中，Controllers 通常只具有协调/路由功能（用于屏幕间导航），并且在某些情况下传递信息（例如，通过委托模式）。\n\
    \n#### Presenter\n\n此文件夹仅包含 Presenters，正如我们所见，它们连接 Model 和 View（图 3-5）。\n\n![MVP\
    \ 项目 Presenter 层文件的屏幕截图。](img/531999_1_En_3_Fig5_HTML.jpg)  \n**图 3-5** Presenter\
    \ 层文件\n\n### MyToDos 应用程序屏幕\n\n正如我们刚才提到的，在 MVP 架构中，与 MVC 不同，Presenter 负责业务逻辑（将导航任务留给\
    \ Controller）。\n\n接下来，我们将针对我们应用程序的每个不同屏幕，了解如何将不同层连接起来：Model、View（+`UIViewController`）和\
    \ Presenter。\n\n#### AppDelegate 和 SceneDelegate\n\n正如我们在第 2 章中看到的，`AppDelegate`\
    \ 和 `SceneDelegate` 负责管理应用程序的生命周期以及屏幕上显示什么及如何显示。\n\n在我们的案例中，我们只会修改 `SceneDelegate`，它将负责创建一个新的\
    \ `UIWindow`，配置应用程序的根视图控制器，并最终使创建的 `UIWindow` 成为关键窗口。\n\n与我们研究 MVC 时不同（我们将 `HomeViewController`\
    \ 的实例传递给 `UINavigationController` 组件，该组件在初始化时需要将依赖项传递给 `TasksListService` 和 `TaskService`\
    \ 服务），现在 `HomeViewController` 不需要它们，因为稍后我们将看到，这些依赖项将由 `HomePresenter` 组件持有。\n\n\
    ```\nfunc scene(_ scene: UIScene, willConnectTo session: UISceneSession, options\
    \ connectionOptions: UIScene.ConnectionOptions) {\n    if let windowScene = scene\
    \ as? UIWindowScene {\n        let window = UIWindow(windowScene: windowScene)\n\
    \        let navigationController = UINavigationController(rootViewController:\
    \ HomeViewController())\n        navigationController.navigationBar.isHidden =\
    \ true\n        navigationController.interactivePopGestureRecognizer?.isEnabled\
    \ = false\n        window.backgroundColor = .white\n        window.rootViewController\
    \ = navigationController\n        self.window = window\n        window.makeKeyAndVisible()\n\
    \    }\n}\n```\n\n#### 首页屏幕\n\n在首页屏幕上，主要组件是 Presenter，它负责将信息传递给 Model 并订阅其变化通知。此外，它还负责接收\
    \ View 中的用户交互，并使用从 Model 接收到的信息更新 View。\n\nView 与 Controller 是分离的，其某些操作（例如导航到另一个屏幕）委托给\
    \ Controller（图 3-6）。\n\n![一个流程图展示了首页屏幕组件，包括首页视图控制器、首页视图、首页 presenter 以及任务列表服务等。](img/531999_1_En_3_Fig6_HTML.png)\
    \  \n**图 3-6** 首页屏幕组件通信示意图"
