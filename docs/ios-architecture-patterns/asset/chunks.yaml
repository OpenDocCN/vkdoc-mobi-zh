- fmt: "`AddTaskViewModel`\n\n`AddTaskViewModel`类将负责在数据库中创建和记录任务。与之前的ViewModel类似，我们从设置输入和输出开始（列表4-31）。\n\
    \n```swift\nclass AddTaskViewModel {\n    var output: Output!\n    var input:\
    \ Input!\n    \n    struct Input {\n        let icon: PublishRelay<String>\n \
    \       let title: PublishRelay<String>\n        let addTask: PublishRelay<Void>\n\
    \    }\n    \n    struct Output {\n        let dismiss: Driver<Void>\n    }\n\
    \    \n    ...\n}\n// 列表4-31 设置AddTaskViewModel的输入和输出\n```\n\n在本例中，我们只有三个输入（图标、任务标题和注册任务的操作）和一个输出（关闭视图的操作）。\n\
    \n然后，我们在`AddTaskViewModel`的初始化中设置它们（列表4-32）。\n\n```swift\nclass AddTaskViewModel\
    \ {\n    ...\n    private var tasksListModel: TasksListModel!\n    private var\
    \ taskService: TaskServiceProtocol!\n    private(set) var task: TaskModel!\n \
    \   let dismiss = BehaviorRelay(value: ())\n    \n    init(tasksListModel: TasksListModel,\n\
    \         taskService: TaskServiceProtocol) {\n        self.tasksListModel = tasksListModel\n\
    \        self.taskService = taskService\n        self.task = TaskModel(id: ProcessInfo().globallyUniqueString,\n\
    \                              icon: \"checkmark.seal.fill\",\n              \
    \                done: false,\n                              createdAt: Date())\n\
    \        \n        // Inputs\n        let icon = PublishRelay<String>()\n    \
    \    _ = icon.subscribe(onNext: { [self] newIcon in\n            task.icon = newIcon\n\
    \        })\n        \n        let title = PublishRelay<String>()\n        _ =\
    \ title.subscribe(onNext: { [self] newTitle in\n            task.title = newTitle\n\
    \        })\n        \n        let addTask = PublishRelay<Void>()\n        _ =\
    \ addTask.subscribe(onNext: { [self] _ in\n            taskService.saveTask(task,\
    \ in: tasksListModel)\n            dismiss.accept(())\n        })\n        \n\
    \        input = Input(icon: icon, title: title, addTask: addTask)\n        \n\
    \        // Outputs\n        let dismissView = dismiss.asDriver()\n        output\
    \ = Output(dismiss: dismissView)\n    }\n}\n// 列表4-32 建立与输入和输出关联的参数行为\n```\n\n\
    `input.icon`和`input.title`参数将接收所选图标和输入标题的对应值。\n\n对于`input.addTask`参数，它将执行将新任务添加到数据库的方法，然后调用`dismiss`方法（我们已经看到该方法在`AddTaskView`上绑定到了委托的`navigateBack`方法）。\n\
    \n## MVVM-MyToDos 测试\n\n在我们刚刚研究的MVVM架构中，View和Model之间的连接是通过一个新组件ViewModel完成的。除此之外，View和ViewModel之间的连接是通过一个称为数据绑定的过程完成的，为此我们使用了特定的库：RxSwift。通过这种方式，View能够感知ViewModel中发生的变化并进行相应更新。\n\
    \n因此，出现的问题是：我们如何测试一个与事件和数据流（即随时间变化的值）协同工作的系统？我们如何测试使用RxSwift开发的代码？为此，我们将使用RxSwift附带的库：`RxTest`。\n\
    \n> **注意**\n> \n> 你会记得，在本章开头，当我们使用Swift Package Manager安装RxSwift时，除了RxSwift、RxCocoa和RxRelay之外，我们还包含了RxTest（并将其添加到MVVM_MyToDosTests目标中）。\n\
    \n### RxTest 简介\n\n正如我们所看到的，使用RxSwift，我们从处理单个值转向处理随时间发射值的流。而`RxTest`将帮助我们测试这些流。\n\
    \n为此，我们将使用`RxTest`的主要组件：`TestScheduler`。\n\n该组件允许我们创建可观察对象（`Observable`）和观察者（`Observer`），我们可以绑定和拦截它们，以便查看进入和离开ViewModel的数据。我们可以在特定的“虚拟时间”中进行此操作；因此，我们可以在特定时间创建事件。\n\
    \n因此，要执行测试，我们必须首先创建一个`TestScheduler`实例（初始参数`initialClock`，它将定义传输的开始）、一个`DisposeBag`实例用于存放先前测试的订阅，以及一个ViewModel实例（列表4-33）。\n\
    \n```swift\nclass ExampleTests: XCTestCase {\n    var testScheduler: TestScheduler!\n\
    \    var disposeBag: DisposeBag!\n    var viewModel: ViewModel!\n    \n    override\
    \ func setUpWithError() throws {\n        testScheduler = TestScheduler(initialClock:\
    \ 0)\n        disposeBag = DisposeBag()\n        viewModel = ViewModel()\n   \
    \ }\n    \n    override func tearDownWithError() throws {\n        testScheduler\
    \ = nil\n        disposeBag = nil\n        viewModel = nil\n        super.tearDown()\n\
    \    }\n}\n// 列表4-33 为测试创建TestScheduler、DisposeBag和ViewModel实例\n```\n\n现在，我们只需将这些元素应用到测试中。例如，假设我们要测试在激活重拨按钮后数据是否已从服务器加载（列表4-34）。\n\
    \n```swift\nfunc testLoading_whenThereIsNoList_shouldShowEmptyState() {\n    //\
    \ 我们创建一个观察者，它将是我们想要观察的对象，并且是ViewModel输出的结果。\n    let isLoaded = testScheduler.createObserver(Bool.self)\n\
    \    \n    // 我们将要测试的输出链接到可观察对象。\n    viewModel.output.isLoadedData\n        .drive(isLoaded)\n\
    \        .disposed(by: disposeBag)\n    \n    // 我们通过时间10的下一个事件向ViewModel发送调用服务器的操作。\n\
    \    testScheduler.createColdObservable([.next(10, ())])\n        .bind(to: viewModel.input.callServer)\n\
    \        .disposed(by: disposeBag)\n    \n    // 启动调度器\n    testScheduler.start()\n\
    \    \n    // 最后，我们使用XCAssert进行测试。\n    XCTAssertEqual(isLoaded.events, [.next(0,\
    \ false), .next(10, true)])\n}\n// 列表4-34 使用TestScheduler的测试示例\n```\n\n### HomeViewModel\
    \ 测试\n\n现在，我们将应用刚刚了解的关于`RxTest`和基于RxSwift的ViewModel测试的知识到`HomeViewModel`组件上。\n\
    \n> **注意**\n> \n> 请记住，你可以在本书关联的代码仓库中找到完整的项目代码，包括测试。\n\n首先，我们创建`TestScheduler`、`DisposeBag`和`HomeViewModel`的实例。此外，由于实例化`HomeViewModel`时需传入`TaskListService`的引用，我们还需要创建它的一个实例以及一个额外的`TaskList`对象（列表4-35）。\n\
    \n```swift\nimport XCTest\nimport RxSwift\nimport RxTest\n@testable import MVVM_MyToDos\n\
    \nvar disposeBag: DisposeBag!\nvar viewModel: HomeViewModel!\nvar testScheduler:\
    \ TestScheduler!\nlet tasksListService = TasksListService(coreDataManager: InMemoryCoreDataManager.shared)\n\
    let taskList = TasksListModel(id: \"12345-67890\",\n                         \
    \     title: \"Test List\",\n                              icon: \"test.icon\"\
    ,\n                              tasks: [TaskModel](),\n                     \
    \         createdAt: Date())\n\noverride func setUpWithError() throws {\n    disposeBag\
    \ = DisposeBag()\n    testScheduler = TestScheduler(initialClock: 0)\n    tasksListService.fetchLists().forEach\
    \ { tasksListService.deleteList($0) }\n    viewModel = HomeViewModel(tasksListService:\
    \ tasksListService)\n}\n\noverride func tearDownWithError() throws {\n    disposeBag\
    \ = nil\n    viewModel = nil\n    testScheduler = nil\n    tasksListService.fetchLists().forEach\
    \ { tasksListService.deleteList($0) }\n    super.tearDown()\n}\n...\n}\n// 列表4-35\
    \ HomeViewModelTests各组件的实例化\n```\n\n与我们在MVC和MVP架构中所做的不同（我们使用了`TasksListService`和`TaskService`的模拟对象），这里我们将使用应用程序的数据库（Core\
    \ Data），但我们会将其配置为在内存中工作，而不是在设备的内存中（`InMemoryCoreDataManager`）。\n\n为了使用干净的数据库，我们引入了一些调用，允许我们在每次测试前后删除所有已创建的列表：\n\
    \n```swift\ntasksListService.fetchLists().forEach { tasksListService.deleteList($0)\
    \ }\n```\n\n现在，我们只需为`HomeViewModel`创建不同的测试。"
  raw: '##### AddTaskViewModel


    The *AddTaskViewModel* class will be in charge of creating and recording a task
    in the database. In the same way as in the ViewModel earlier, we start by setting
    the inputs and outputs (Listing [4-31](#531999_1_En_4_Chapter.xhtml#PC38)).


    ```

    class AddTaskViewModel {

    var output: Output!

    var input: Input!

    struct Input {

    let icon: PublishRelay

    let title: PublishRelay

    let addTask: PublishRelay

    }

    struct Output {

    let dismiss: Driver

    }

    ...

    }

    Listing 4-31

    Setting the inputs and outputs of the AddTaskViewModel

    ```


    In this case, we only have three inputs (the icon, the task title, and the action
    to register the task) and one output (the action to dismiss the view).


    Then we just have to set them in the initialization of the *AddTaskViewModel*
    (Listing [4-32](#531999_1_En_4_Chapter.xhtml#PC39)).


    ```

    class AddTaskViewModel {

    ...

    private var tasksListModel: TasksListModel!

    private var taskService: TaskServiceProtocol!

    private(set) var task: TaskModel!

    let dismiss = BehaviorRelay(value: ())

    init(tasksListModel: TasksListModel,

    taskService: TaskServiceProtocol) {

    self.tasksListModel = tasksListModel

    self.taskService = taskService

    self.task = TaskModel(id: ProcessInfo().globallyUniqueString,

    icon: "checkmark.seal.fill",

    done: false,

    createdAt: Date())

    // Inputs

    let icon = PublishRelay()

    _ = icon.subscribe(onNext: { [self] newIcon in

    task.icon = newIcon

    })

    let title = PublishRelay()

    _ = title.subscribe(onNext: { [self] newTitle in

    task.title = newTitle

    })

    let addTask = PublishRelay()

    _ = addTask.subscribe(onNext: { [self] _ in

    taskService.saveTask(task, in: tasksListModel)

    dismiss.accept(())

    })

    input = Input(icon: icon, title: title, addTask: addTask)

    // Outputs

    let dismissView = dismiss.asDriver()

    output = Output(dismiss: dismissView)

    }

    }

    Listing 4-32

    Establishment of the behavior of the parameters associated with the inputs and
    outputs

    ```


    The *input.icon* and *input.title* parameters will receive the corresponding values
    for the selected icon and the entered title.


    For the *input.addTask* parameter, it will execute the method that adds the new
    task to the database and then call the dismiss method (which we’ve seen is bound
    to the delegate’s *navigateBack* method on the *AddTaskView*).


    ### MVVM-MyToDos Testing


    In the MVVM architecture that we have just studied, the link between the View
    and the Model has been done through a new component, the ViewModel. But, in addition
    to the link between the View and the ViewModel, we have done it through a process
    called Data Binding, for which we have used a specific library: RxSWift. In this
    way, we get the View to be aware of the changes that occur in the ViewModel, and
    update accordingly.


    Therefore, the question that arises is, how can we test a system that works with
    events and data streams (i.e., values ​​that change over time)? How do we test
    code developed with RxSwift? For this, we will use a library that accompanies
    RxSwift: RxTest.


    Note


    As you will remember, at the beginning of this chapter, when we installed RxSwift
    with the Swift Package Manager, together with RxSwift, RxCocoa, and RxRelay, we
    also included RxTest (which we added to the MVVM_MyToDosTests target).


    #### RxTest Introduction


    As we have seen, using RxSwift, we go from working with individual values ​​to
    working with streams that emit values ​​over time. And RxTest is going to help
    us test these streams.


    For this, we will use the main component of RxTest: *TestScheduler*.


    This component allows us to create Observables and Observers that we can bind
    and intercept so that we can see what goes in and what goes out of our ViewModel.
    We can do this in certain “virtual times”; therefore, we can create events at
    specific times.


    Therefore, to carry out a test, we must first create an instance of *TestScheduler*
    (with an initial argument “*initialClock*”, which will define the start of the
    transmission), an instance of DisposeBag to have the subscriptions of previous
    tests, and also an instance of the ViewModel (Listing [4-33](#531999_1_En_4_Chapter.xhtml#PC40)).


    ```

    class ExampleTests: XCTestCase {

    var testScheduler: TestScheduler!

    var disposeBag: DisposeBag!

    var viewModel: ViewModel!

    override func setUpWithError() throws {

    testScheduler = TestScheduler(initialClock: 0)

    disposeBag = DisposeBag()

    vieModel = ViewModel()

    }

    override func tearDownWithError() throws {

    testScheduler = nil

    disposeBag = nil

    viewModel = nil

    super.tearDown()

    }

    }

    Listing 4-33

    Creating instances of TestScheduler, DisposeBag, and ViewModel for our tests

    ```


    Now we just have to apply these elements to a test. For example, suppose we want
    to test if the data has been loaded from a server after activating the redial
    button (Listing [4-34](#531999_1_En_4_Chapter.xhtml#PC41)).


    ```

    func testLoading_whenThereIsNoList_shouldShowEmptyState() {

    // We create an observer that will be what we want to observe and that will be
    the result of the ViewModel output.

    let isLoaded = testScheduler.createObserver(Bool.self)

    // We link the output we want to test to the observable.

    viewModel.output.isLoadedData

    .drive(isLoaded)

    .disposed(by: disposeBag)

    // We send to the ViewModel the action of calling the server through a next event
    at time 10.

    testScheduler.createColdObservable([.next(10, ())])

    .bind(to: viewModel.input.callServer)

    .disposed(by: disposeBag)

    // Start the scheduler

    testScheduler.start()

    // Finally, we test using XCAssert.

    XCTAssertEqual(isLoaded.events, [.next(0, false), .next(10, true)])

    }

    Listing 4-34

    Test example with TestScheduler

    ```


    #### HomeViewModel Tests


    Now we are going to apply what we have just seen about RxTest and the testing
    of RxSwift-based ViewModels in the *HomeViewModel* component.


    Note


    Remember that you can find the complete project code, including the tests, in
    the repository associated with this book.


    First, we create instances of *TestScheduler*, *DisposeBag*, and *HomeViewModel*.
    Also, since to instantiate the *HomeViewModel* we have to pass a reference to
    the *TaskListService*, we also create an instance of it and an additional *TaskList*
    object (Listing [4-35](#531999_1_En_4_Chapter.xhtml#PC42)).


    ```

    import XCTest

    import RxSwift

    import RxTest

    @testable import MVVM_MyToDos

    var disposeBag: DisposeBag!

    var viewModel: HomeViewModel!

    var testScheduler: TestScheduler!

    let tasksListService = TasksListService(coreDataManager: InMemoryCoreDataManager.shared)

    let taskList = TasksListModel(id: "12345-67890",

    title: "Test List",

    icon: "test.icon",

    tasks: [TaskModel](),

    createdAt: Date())

    override func setUpWithError() throws {

    disposeBag = DisposeBag()

    testScheduler = TestScheduler(initialClock: 0)

    tasksListService.fetchLists().forEach { tasksListService.deleteList($0) }

    viewModel = HomeViewModel(tasksListService: tasksListService)

    }

    override func tearDownWithError() throws {

    disposeBag = nil

    viewModel = nil

    testScheduler = nil

    tasksListService.fetchLists().forEach { tasksListService.deleteList($0) }

    super.tearDown()

    }

    ...

    }

    Listing 4-35

    Instantiation of the different components of the HomeViewModelTests

    ```


    Unlike what we did in the MVC and MVP architectures, in which we used *TasksListSevice*
    and *TaskService* mocks, here we will use the application’s database (Core Data),
    but we will configure it to work its persistence in memory and not in the memory
    of the device (*InMemoryCoreDataManager*).


    To work with a clean database, we have introduced some calls that allow us to
    delete all the lists created in each test, both before and after performing the
    test:


    ```

    tasksListService.fetchLists().forEach { tasksListService.deleteList($0) }

    ```


    Now we just have to create the different tests for the *HomeViewModel*.'
  trans: "\n`AddTaskViewModel`\n\n`AddTaskViewModel`类将负责在数据库中创建和记录任务。与之前的 ViewModel\
    \ 类似，我们从设置输入和输出开始（列表 4-31）。\n\n```swift\nclass AddTaskViewModel {\n    var output:\
    \ Output!\n    var input: Input!\n    \n    struct Input {\n        let icon:\
    \ PublishRelay<String>\n        let title: PublishRelay<String>\n        let addTask:\
    \ PublishRelay<Void>\n    }\n    \n    struct Output {\n        let dismiss: Driver<Void>\n\
    \    }\n    \n    ...\n}\n// 列表 4-31 设置 AddTaskViewModel 的输入和输出\n```\n\n在本例中，我们只有三个输入（图标、任务标题和注册任务的操作）和一个输出（关闭视图的操作）。\n\
    \n然后，我们在`AddTaskViewModel`的初始化中设置它们（列表 4-32）。\n\n```swift\nclass AddTaskViewModel\
    \ {\n    ...\n    private var tasksListModel: TasksListModel!\n    private var\
    \ taskService: TaskServiceProtocol!\n    private(set) var task: TaskModel!\n \
    \   let dismiss = BehaviorRelay(value: ())\n    \n    init(tasksListModel: TasksListModel,\n\
    \         taskService: TaskServiceProtocol) {\n        self.tasksListModel = tasksListModel\n\
    \        self.taskService = taskService\n        self.task = TaskModel(id: ProcessInfo().globallyUniqueString,\n\
    \                              icon: \"checkmark.seal.fill\",\n              \
    \                done: false,\n                              createdAt: Date())\n\
    \        \n        // Inputs\n        let icon = PublishRelay<String>()\n    \
    \    _ = icon.subscribe(onNext: { [self] newIcon in\n            task.icon = newIcon\n\
    \        })\n        \n        let title = PublishRelay<String>()\n        _ =\
    \ title.subscribe(onNext: { [self] newTitle in\n            task.title = newTitle\n\
    \        })\n        \n        let addTask = PublishRelay<Void>()\n        _ =\
    \ addTask.subscribe(onNext: { [self] _ in\n            taskService.saveTask(task,\
    \ in: tasksListModel)\n            dismiss.accept(())\n        })\n        \n\
    \        input = Input(icon: icon, title: title, addTask: addTask)\n        \n\
    \        // Outputs\n        let dismissView = dismiss.asDriver()\n        output\
    \ = Output(dismiss: dismissView)\n    }\n}\n// 列表 4-32 建立与输入和输出关联的参数行为\n```\n\n\
    `input.icon`和`input.title`参数将接收所选图标和输入标题的对应值。\n\n对于`input.addTask`参数，它将执行将新任务添加到数据库的方法，然后调用`dismiss`方法（我们已经看到该方法在`AddTaskView`上绑定到了委托的`navigateBack`方法）。\n\
    \n## MVVM-MyToDos 测试\n\n在我们刚刚研究的 MVVM 架构中，View 和 Model 之间的连接是通过一个新组件 ViewModel\
    \ 完成的。除此之外，View 和 ViewModel 之间的连接是通过一个称为数据绑定的过程完成的，为此我们使用了特定的库：RxSwift。通过这种方式，View\
    \ 能够感知 ViewModel 中发生的变化并进行相应更新。\n\n因此，出现的问题是：我们如何测试一个与事件和数据流（即随时间变化的值）协同工作的系统？我们如何测试使用\
    \ RxSwift 开发的代码？为此，我们将使用 RxSwift 附带的库：`RxTest`。\n\n> **注意**\n> \n> 你会记得，在本章开头，当我们使用\
    \ Swift Package Manager 安装 RxSwift 时，除了 RxSwift、RxCocoa 和 RxRelay 之外，我们还包含了 RxTest（并将其添加到\
    \ MVVM_MyToDosTests 目标中）。\n\n### RxTest 简介\n\n正如我们所看到的，使用 RxSwift，我们从处理单个值转向处理随时间发射值的流。而`RxTest`将帮助我们测试这些流。\n\
    \n为此，我们将使用`RxTest`的主要组件：`TestScheduler`。\n\n该组件允许我们创建可观察对象（`Observable`）和观察者（`Observer`），我们可以绑定和拦截它们，以便查看进入和离开\
    \ ViewModel 的数据。我们可以在特定的“虚拟时间”中进行此操作；因此，我们可以在特定时间创建事件。\n\n因此，要执行测试，我们必须首先创建一个`TestScheduler`实例（初始参数`initialClock`，它将定义传输的开始）、一个`DisposeBag`实例用于存放先前测试的订阅，以及一个\
    \ ViewModel 实例（列表 4-33）。\n\n```swift\nclass ExampleTests: XCTestCase {\n    var\
    \ testScheduler: TestScheduler!\n    var disposeBag: DisposeBag!\n    var viewModel:\
    \ ViewModel!\n    \n    override func setUpWithError() throws {\n        testScheduler\
    \ = TestScheduler(initialClock: 0)\n        disposeBag = DisposeBag()\n      \
    \  viewModel = ViewModel()\n    }\n    \n    override func tearDownWithError()\
    \ throws {\n        testScheduler = nil\n        disposeBag = nil\n        viewModel\
    \ = nil\n        super.tearDown()\n    }\n}\n// 列表 4-33 为测试创建 TestScheduler、DisposeBag\
    \ 和 ViewModel 实例\n```\n\n现在，我们只需将这些元素应用到测试中。例如，假设我们要测试在激活重拨按钮后数据是否已从服务器加载（列表 4-34）。\n\
    \n```swift\nfunc testLoading_whenThereIsNoList_shouldShowEmptyState() {\n    //\
    \ 我们创建一个观察者，它将是我们想要观察的对象，并且是 ViewModel 输出的结果。\n    let isLoaded = testScheduler.createObserver(Bool.self)\n\
    \    \n    // 我们将要测试的输出链接到可观察对象。\n    viewModel.output.isLoadedData\n        .drive(isLoaded)\n\
    \        .disposed(by: disposeBag)\n    \n    // 我们通过时间 10 的下一个事件向 ViewModel 发送调用服务器的操作。\n\
    \    testScheduler.createColdObservable([.next(10, ())])\n        .bind(to: viewModel.input.callServer)\n\
    \        .disposed(by: disposeBag)\n    \n    // 启动调度器\n    testScheduler.start()\n\
    \    \n    // 最后，我们使用 XCAssert 进行测试。\n    XCTAssertEqual(isLoaded.events, [.next(0,\
    \ false), .next(10, true)])\n}\n// 列表 4-34 使用 TestScheduler 的测试示例\n```\n\n###\
    \ HomeViewModel 测试\n\n现在，我们将应用刚刚了解的关于`RxTest`和基于 RxSwift 的 ViewModel 测试的知识到`HomeViewModel`组件上。\n\
    \n> **注意**\n> \n> 请记住，你可以在本书关联的代码仓库中找到完整的项目代码，包括测试。\n\n首先，我们创建`TestScheduler`、`DisposeBag`和`HomeViewModel`的实例。此外，由于实例化`HomeViewModel`时需传入`TaskListService`的引用，我们还需要创建它的一个实例以及一个额外的`TaskList`对象（列表\
    \ 4-35）。\n\n```swift\nimport XCTest\nimport RxSwift\nimport RxTest\n@testable\
    \ import MVVM_MyToDos\n\nvar disposeBag: DisposeBag!\nvar viewModel: HomeViewModel!\n\
    var testScheduler: TestScheduler!\nlet tasksListService = TasksListService(coreDataManager:\
    \ InMemoryCoreDataManager.shared)\nlet taskList = TasksListModel(id: \"12345-67890\"\
    ,\n                              title: \"Test List\",\n                     \
    \         icon: \"test.icon\",\n                              tasks: [TaskModel](),\n\
    \                              createdAt: Date())\n\noverride func setUpWithError()\
    \ throws {\n    disposeBag = DisposeBag()\n    testScheduler = TestScheduler(initialClock:\
    \ 0)\n    tasksListService.fetchLists().forEach { tasksListService.deleteList($0)\
    \ }\n    viewModel = HomeViewModel(tasksListService: tasksListService)\n}\n\n\
    override func tearDownWithError() throws {\n    disposeBag = nil\n    viewModel\
    \ = nil\n    testScheduler = nil\n    tasksListService.fetchLists().forEach {\
    \ tasksListService.deleteList($0) }\n    super.tearDown()\n}\n...\n}\n// 列表 4-35\
    \ HomeViewModelTests 各组件的实例化\n```\n\n与我们在 MVC 和 MVP 架构中所做的不同（我们使用了`TasksListService`和`TaskService`的模拟对象），这里我们将使用应用程序的数据库（Core\
    \ Data），但我们会将其配置为在内存中工作，而不是在设备的内存中（`InMemoryCoreDataManager`）。\n\n为了使用干净的数据库，我们引入了一些调用，允许我们在每次测试前后删除所有已创建的列表：\n\
    \n```swift\ntasksListService.fetchLists().forEach { tasksListService.deleteList($0)\
    \ }\n```\n\n现在，我们只需为`HomeViewModel`创建不同的测试。\n"
