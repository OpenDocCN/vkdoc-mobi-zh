    \        self.taskListView = taskListView\n        super.init(nibName: nil, bundle:\
    \ nil)\n    }\n    \n    required init?(coder: NSCoder) {\n        fatalError(\"\
    init(coder:) has not been implemented\")\n    }\n    \n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        taskListView.delegate = self\n     \
    \   self.view = taskListView\n        fetchTasks()\n    }\n    \n    private func\
    \ fetchTasks() {\n        let request = TaskListModel.FetchTasks.Request()\n \
    \       interactor?.fetchTasks(request: request)\n    }\n}\n...\nextension TaskListViewController:\
    \ TaskListViewDelegate {\n    func navigateBack() {\n        interactor?.navigateBack()\n\
    \    }\n    \n    func addTask() {\n        let request = TaskListModel.AddTask.Request()\n\
    \        interactor?.addTask(request: request)\n    }\n    \n    func deleteTaskAt(indexPath:\
    \ IndexPath) {\n        let request = TaskListModel.RemoveTask.Request(index:\
    \ indexPath)\n        interactor?.removeTask(request: request)\n    }\n    \n\
    \    func updateTask(_ task: TaskModel) {\n        let request = TaskListModel.UpdateTask.Request(task:\
    \ task)\n        interactor?.updateTask(request: request)\n    }\n}\n```\n\n*Listing\
    \ 6-42: `TaskListViewController` initialization and `TaskListViewDelegate` conformation\
    \ code*\n\nFinally, since the `TaskListViewController` must conform to the `TaskListViewControllerInput`\
    \ input protocol, we apply its methods (Listing [6-43](#531999_1_En_6_Chapter.xhtml#PC43)).\n\
    \n```\nextension TaskListViewController: TaskListViewControllerInput {\n    func\
    \ navigateToHome() {\n        router?.navigateBack()\n    }\n    \n    func showAddTaskView(viewModel:\
    \ TaskListModel.AddTask.ViewModel) {\n        router?.showAddTaskView(delegate:\
    \ viewModel.addTaskDelegate, tasksList: viewModel.taskList)\n    }\n    \n   \
    \ func presentLoadedTasks(viewModel: TaskListModel.FetchTasks.ViewModel) {\n \
    \       taskListView.show(tasks: viewModel.tasks)\n    }\n    \n    func presentRemainingTasks(viewModel:\
    \ TaskListModel.RemoveTask.ViewModel) {\n        taskListView.show(tasks: viewModel.tasks)\n\
    \    }\n    \n    func presentUpdatedTasks(viewModel: TaskListModel.UpdateTask.ViewModel)\
    \ {\n        taskListView.show(tasks: viewModel.tasks)\n    }\n}\n```\n\n*Listing\
    \ 6-43: `TaskListViewControllerInput` conformation code*"
