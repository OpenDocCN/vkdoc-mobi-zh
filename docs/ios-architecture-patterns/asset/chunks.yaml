    # 5. VIPER: View–Interactor–Presenter–Entity–Router


    ## What Is VIPER?


    ### A Little History


    VIPER was introduced in 2014 by Jeff Gilbert and Conrad Stoll and was the first
    attempt to apply the Clean Architecture (which we saw in Chapter [1](#531999_1_En_1_Chapter.xhtml)),
    creating a series of components, each of which has a unique responsibility.^([^(11)](#fn11))


    VIPER is an acronym for View, Interactor, Presenter, Entity, and Router, and what
    is achieved is to divide a functionality or implementation into five different
    layers, gathered within a module (Figure [5-1](#531999_1_En_5_Chapter.xhtml#Fig1)).


    ### How It Works


    The use of these components allows us to separate responsibilities within the
    application, which allows us to comply with the single-responsibility principle.
    In addition, it will also comply with the interface segregation principle, since
    we will use protocols (interfaces) to communicate between the layers.


    ![](images/531999_1_En_5_Chapter/531999_1_En_5_Fig1_HTML.png)


    A flowchart of viper schema consists of view, interactor, presenter, entity, and
    router.


    Figure 5-1 VIPER schema


    ### Components in VIPER


    Now we are going to see in detail each of the components of this architecture.


    #### View


    The View, that includes the `UIViewController`:


    * It does not contain any logic and is only made up of passive elements: buttons,
    labels, views…

    * It sends the user interactions to the Presenter.

    * It knows how to display the information it receives from the Presenter.

    * It does not ask the Presenter for information, but it is the Presenter that
    sends it when the View needs to be updated.


    #### Interactor


    The Interactor is the component that contains the business logic:


    * It is responsible for receiving the information (models) from the database,
    servers…

    * It is independent of the View.

    * It receives actions from the Presenter and, after processing the information,
    returns the result to the Presenter via a delegate (Delegate Pattern).

    * The Interactor never sends entities to the Presenter.


    #### Presenter


    The Presenter is the center of the VIPER architecture:


    * It acts as a link between the different components.

    * It receives user interactions from the View and contains the logic to act on
    these interactions and request information from the Interactor.

    * It receives the information from the Interactor in the form of simple data structures,
    never the Entities.

    * You don’t know what components make up the view, but you know what content should
    be displayed and when.

    * It is responsible for passing the information to the View in the most efficient
    way possible.

    * It handles navigation to other screens using the Router.


    #### Entity


    Regarding the Entities:


    * They are simple object models.

    * Usually, they are data structures (`struct`).

    * The only one who can work with the Entities is the Interactor.


    #### Router


    The Router has several responsibilities regarding the creation and navigation
    between screens:


    * It is in charge of creating the screens (`UIViewController`).

    * It is in charge of managing the navigation from one screen to another (it contains
    the navigation logic).

    * It is the owner of the `UINavigationController` and the `UIViewController`.

    * It would be like the Coordinator we saw at the end of Chapter [4](#531999_1_En_4_Chapter.xhtml),
    in the MVVM-C architecture.


    ### Advantages and Disadvantages of VIPER


    When developing a project, the VIPER architecture has many advantages due to the
    fact that it seeks a “Clean Architecture,” but it also has some disadvantages.


    #### Advantages


    The main advantages of the VIPER architecture are as follows:


    * By having the single-responsibility principle (SRP) as a basic principle, the
    code is cleaner.

    * The code is more decoupled.

    * Due to these characteristics, writing unit tests is simpler.

    * There is more abstraction when developing the code, so more functionality can
    be easily added and the product scale.

    * The separation of responsibilities between layers means that, for example, the
    Interactor only contains the business logic and is completely independent of the
    View, which makes it easier to write automated tests.

    * It is considered to be quite useful in the case of complex applications due
    to, among other things, this isolation of business logic.

    * The fact of working with independent modules, with well-defined communication
    interfaces, allows us to distribute the development of a project among several
    teams.


    #### Disadvantages


    The main disadvantages of the VIPER architecture are as follows:


    * The fact that each module contains so many classes: View, Interactor, Presenter,
    Entities, Router… makes the project end up with a huge amount of code, and classes.

    * There is a lot of boilerplate code you must write.

    * It is not usually useful for small applications that do not plan to be extended
    with new functionality.

    * Learning VIPER can seem daunting at first, especially for novice developers.

    * To facilitate the reuse of modules, it is better not to use navigation between
    screens using Segue.


    ## VIPER Application


    Once we have seen the characteristics of the VIPER architecture, we are going
    to apply them in the development of our application.


    Note


    The entire project can be downloaded from the repository of this book. During
    the explanation of the implementation of the VIPER architecture in our project,
    we will only show the most relevant parts of the code.


    ### Communication Between Components


    As we have explained, the communication between the different components of this
    architecture is carried out through protocols. We can define each of these protocols
    based on the flow (`Input`/`Output`) with respect to the Presenter and then apply
    it to the appropriate component.'
