- fmt: '### `HomeInteractor`


    As we already know, the `HomeInteractor` involves the methods of two protocols:
    one input, which corresponds to the output protocol of the `HomeViewController`
    (`HomeViewControllerOutput`), so what we do is rename it as `HomeInteractorInput`
    (using the `typealias` command), and another output protocol (`HomeInteractorOutput`)
    with the methods that the `HomeInteractor` will call to pass to the presenter
    the responses of the requests made in the `HomeViewController` (Listing [6-14](#531999_1_En_6_Chapter.xhtml#PC14)).


    ```

    protocol HomeInteractorOutput: AnyObject {

    func presentTasksLists(response: HomeModel.FetchTasksLists.Response)

    func showAddTaskList(response: HomeModel.AddTasksList.Response)

    func showSelectedList(response: HomeModel.SelectTasksList.Response)

    }

    typealias HomeInteractorInput = HomeViewControllerOutput

    Listing 6-14

    Input/Output protocols for HomeInteractor. The input protocol corresponds to the
    HomeViewControllerOut, so we changed its name in this class

    ```


    In the `HomeInteractor` we have the business logic of this scene, and in order
    to implement it, we will use the `TasksListService` service to be able to access
    the database in relation to the table that contains the task lists. We will pass
    the `TasksListService` in the initialization of this class (as we have seen in
    the `HomeConfigurator`) (Listing [6-15](#531999_1_En_6_Chapter.xhtml#PC15)).


    ```

    final class HomeInteractor {

    var presenter: HomePresenterInput?

    private var lists = [TasksListModel]()

    private let tasksListService: TasksListServiceProtocol!

    init(tasksListService: TasksListServiceProtocol) {

    self.tasksListService = tasksListService

    }

    func fetchTasksLists() {

    fetchTasksLists(request: HomeModel.FetchTasksLists.Request())

    }

    }

    Listing 6-15

    HomeInteractor initialization

    ```


    As we already know, the `HomeInteractor` must conform to the `HomeInteractorInput`
    (which is the name we have given to the `HomeViewControllerOutput` in this class),
    so we implement its methods (Listing [6-16](#531999_1_En_6_Chapter.xhtml#PC16)).


    ```

    extension HomeInteractor: HomeInteractorInput {

    func addList(request: HomeModel.AddTasksList.Request) {

    let response = HomeModel.AddTasksList.Response(addListDelegate: self)

    presenter?.showAddTaskList(response: response)

    }

    func fetchTasksLists(request: HomeModel.FetchTasksLists.Request) {

    lists = tasksListService.fetchLists()

    let response = HomeModel.FetchTasksLists.Response(tasksLists: lists)

    presenter?.presentTasksLists(response: response)

    }

    func selectList(request: HomeModel.SelectTasksList.Request) {

    let list = lists[request.index.row]

    let response = HomeModel.SelectTasksList.Response(selectedListDelegate: self,
    tasksList: list)

    presenter?.showSelectedList(response: response)

    }

    func removeList(request: HomeModel.RemoveTasksList.Request) {

    let list = lists[request.index.row]

    tasksListService.deleteList(list)

    lists.remove(at: request.index.row)

    let response = HomeModel.FetchTasksLists.Response(tasksLists: lists)

    presenter?.presentTasksLists(response: response)

    }

    }

    Listing 6-16

    HomeInteractorInput conformation

    ```


    Note that in the `addList` method, when preparing the response, we have established
    the `HomeInteractor` as a delegate (`addListDelegate`), since we must bear in
    mind that when we add a new list from the `AddListView` scene (as we will see
    later) we must update the scene Home with the new list.


    In these methods, after making the corresponding request (if necessary) to the
    `TasksListService`, we prepare the response and pass it to the presenter through
    the corresponding method.


    In addition, when creating the response in the `selectList` method, we have also
    set the `HomeInteractor` as a delegate (`selectedListDelegate`), so that when
    we modify the tasks of a list in the `TaskList` scene, the Home is also updated.


    Therefore, the `HomeInteractor` must conform to the two protocols to which it
    is a delegate. In both cases, it calls the `fetchTasksLists` method which, as
    we have seen, is responsible for retrieving the task lists from the database and
    passing them to `HomePresenter` (Listing [6-17](#531999_1_En_6_Chapter.xhtml#PC17)).


    ```

    extension HomeInteractor: AddListDelegate {

    func didAddList() {

    fetchTasksLists()

    }

    }

    extension HomeInteractor: SelectedListDelegate {

    func updateLists() {

    fetchTasksLists()

    }

    }

    Listing 6-17

    AddListDelegate and SelectedListDelegate conformation

    ```


    ### `HomePresenter`


    This class is in charge of receiving the responses from the `HomeInteractor`,
    and processing them so that they can be displayed by the `HomeViewController`,
    to which they are passed as a ViewModel.


    In the HomePresenter, we will also have an input protocol, which corresponds to
    the output protocol of the `HomeInteractor` (which is why we changed its name),
    and another output protocol, which corresponds to the input protocol of the `HomeViewController`
    (and therefore what we also change the name) (Listing [6-18](#531999_1_En_6_Chapter.xhtml#PC18)).


    ```

    typealias HomePresenterInput = HomeInteractorOutput

    typealias HomePresenterOutput = HomeViewControllerInput

    Listing 6-18

    We changed the names of the protocols so that it is easier to see what their function
    is in the HomePresenter

    ```


    Finally, we only have to make the `HomePresenter` conform to the `HomePresenterInput`
    protocol and implement its methods so that the `HomeInteractor` can pass its responses
    and, after being processed, send them to the `HomeViewController` (Listing [6-19](#531999_1_En_6_Chapter.xhtml#PC19)).


    ```

    final class HomePresenter {

    weak var viewController: HomePresenterOutput?

    }

    extension HomePresenter: HomePresenterInput {

    func presentTasksLists(response: HomeModel.FetchTasksLists.Response) {

    let viewModel = HomeModel.FetchTasksLists.ViewModel(tasksLists: response.tasksLists)

    viewController?.reloadDataWithTaskList(viewModel: viewModel)

    }

    func showAddTaskList(response: HomeModel.AddTasksList.Response) {

    let viewModel = HomeModel.AddTasksList.ViewModel(addListDelegate: response.addListDelegate)

    viewController?.showAddListView(viewModel: viewModel)

    }

    func showSelectedList(response: HomeModel.SelectTasksList.Response) {

    let viewModel = HomeModel.SelectTasksList.ViewModel(selectedListDelegate: response.selectedListDelegate,
    tasksList: response.tasksList)

    viewController?.showSelectedList(viewModel: viewModel)

    }

    }

    Listing 6-19

    HomePresenterInput conformation

    ```'
