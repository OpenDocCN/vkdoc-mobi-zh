    \    testScheduler.start()\n    XCTAssertEqual(hideEmptyState.events, [.next(0,\
    \ false), .next(10, true)])\n}\n\n清单 4-36\nEmptyState 测试方法\n```\n\n> 注意  \n> 请注意，每当\
    \ `HomeViewModel` 中的 `output.hideEmptyState` 发生变化时，我们都必须在 `XCTAssertEqual` 中处理该变化。\n\
    \n### 测试列表删除\n\n在此测试中，我们将验证在从表格中删除某个单元格后，表格为空（清单 4-37）。具体步骤为：向数据库中添加一个列表，重新加载表格，触发单元格的删除操作，再次重新加载列表，并确认数据库中已无列表。\n\
    \n```\nfunc testRemoveListAtIndex_whenAddedOneList_shouldBeEmptyModelOnDeleteList()\
    \ {\n    let lists = testScheduler.createObserver([TasksListModel].self)\n   \
    \ tasksListService.saveTasksList(taskList)\n    viewModel.output.lists\n     \
    \   .drive(lists)\n        .disposed(by: disposeBag)\n    testScheduler.createColdObservable([.next(10,\
    \ ())])\n        .bind(to: viewModel.input.reload)\n        .disposed(by: disposeBag)\n\
    \    testScheduler.createColdObservable([.next(20, IndexPath(row: 0, section:\
    \ 0))])\n        .bind(to: viewModel.input.deleteRow)\n        .disposed(by: disposeBag)\n\
    \    testScheduler.createColdObservable([.next(30, ())])\n        .bind(to: viewModel.input.reload)\n\
    \        .disposed(by: disposeBag)\n    testScheduler.start()\n    XCTAssertEqual(lists.events,\
    \ [.next(0, []), .next(10, [taskList]), .next(30, []), .next(30, [])])\n}\n\n\
    清单 4-37\n测试单元格删除的方法\n```\n\n### 列表选择测试\n\n在最后一个测试中，我们将验证在向数据库添加列表后，我们可以在表格中选择该列表，并且模型能正确返回该列表（清单\
    \ 4-38）。\n\n```\nfunc testSelectListAtIndex_whenSelectAList_shouldBeReturnOneList()\
    \ {\n    let selectedList = testScheduler.createObserver(TasksListModel.self)\n\
    \    tasksListService.saveTasksList(taskList)\n    viewModel.output.selectedList\n\
    \        .drive(selectedList)\n        .disposed(by: disposeBag)\n    testScheduler.createColdObservable([.next(10,\
    \ ())])\n        .bind(to: viewModel.input.reload)\n        .disposed(by: disposeBag)\n\
    \    testScheduler.createColdObservable([.next(20, IndexPath(row: 0, section:\
    \ 0))])\n        .bind(to: viewModel.input.selectRow)\n        .disposed(by: disposeBag)\n\
    \    testScheduler.start()\n    XCTAssertEqual(selectedList.events, [.next(0,\
    \ TasksListModel()), .next(20, taskList)])\n}\n\n清单 4-38\n测试列表选择的方法\n```\n\n##\
    \ MVVM-C：模型-视图-视图模型-协调器\n\n到目前为止，在已研究的不同架构中，我们已经看到不同屏幕之间的导航（或不同视图控制器之间的导航）是在这些控制器内部进行的。\n\
    \n这使得一方面难以对它们进行测试，另一方面也难以在应用程序的其他部分重用它们。\n\n为了解决这个问题，我们将使用协调器模式。\n\n### 什么是协调器？\n\
    \n`Coordinator`（协调器）是一个用于处理视图控制器外部导航的类。这样，我们将导航代码从视图控制器中抽离出来，使它们更简单、更易于重用。因此，`Coordinator`\
    \ 的职责包括：加载我们要访问的视图控制器，并管理从该视图控制器到其他控制器的导航流程（图 4-15）。\n\n![](img/531999_1_En_4_Fig15_HTML.png)\n\
    \n**图 4-15**  \n模型-视图-视图模型-协调器架构图\n\n我们首先要做的是创建一个协议，让所有协调器都遵循该协议。由于应用程序相对简单，这个协议也会很简单（清单\
    \ 4-39）。\n\n```\nprotocol Coordinator {\n    var navigationController: UINavigationController\
    \ { get set }\n    func start()\n}\n\n清单 4-39\n协调器协议\n```\n\n所有实现此协议的协调器都必须定义一个\
    \ `navigationController` 变量（我们将应用程序的 `navigationController` 赋值给它）和一个 `start()`\
    \ 函数，该函数负责调用视图控制器。\n\n> 注意  \n> 在拥有更复杂导航流程的大型应用程序中，一个好的策略是将它们分解成更简单的部分，由 `ParentCoordinator`（父协调器）管理，而该协调器依赖于一个\
    \ `ChildCoordinator`（子协调器）数组。\n\n### 在 MyToDos 中使用 MVVM-C\n\n由于应用程序大部分代码与我们之前看到的\
    \ MVVM 架构相同，因此我们只关注新增的部分。\n\n> 注意  \n> 请记住，项目的所有代码都可以在本书的存储库中找到。\n\n#### SceneDelegate\n\
    \n在 `SceneDelegate` 中，我们现在所做的是加载 `HomeCoordinator`，并将 `navigationController` 传递给它。接着，调用\
    \ `start()` 方法。\n\n```\nclass SceneDelegate: UIResponder, UIWindowSceneDelegate\
    \ {\n    var window: UIWindow?\n    var homeCoordinator: HomeCoordinator?\n\n\
    \    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options\
    \ connectionOptions: UIScene.ConnectionOptions) {\n        if let windowScene\
    \ = scene as? UIWindowScene {\n            let window = UIWindow(windowScene:\
    \ windowScene)\n            let navigationController = UINavigationController.init()\n\
    \            navigationController.navigationBar.isHidden = true\n            navigationController.interactivePopGestureRecognizer?.isEnabled\
    \ = false\n\n            homeCoordinator = HomeCoordinator(navigationController:\
    \ navigationController)\n            homeCoordinator?.start()\n\n            window.backgroundColor\
    \ = .white\n            window.rootViewController = navigationController\n   \
    \         self.window = window\n            window.makeKeyAndVisible()\n     \
    \   }\n    }\n    ...\n}\n```\n"
- fmt: "### Home Screen\n\nThe class that will manage the navigation, and which we\
    \ have called from the `SceneDelegate`, is the `HomeCoordinator`. As shown in\
    \ Listing 4-40, in addition to the `start` method, which is given by the protocol,\
    \ it presents a couple of methods plus the `showSelectedList` method (which loads\
    \ the Coordinator of the screen that shows the tasks of a list) and `addList`\
    \ (which loads the Coordinator from the create a new list screen).\n\n```\nprotocol\
    \ HomeCoordinatorProtocol {\n    func showSelectedList(_ list: TasksListModel)\n\
    \    func gotoAddList()\n}\n\nclass HomeCoordinator: Coordinator, HomeCoordinatorProtocol\
    \ {\n    var navigationController: UINavigationController\n    \n    init(navigationController:\
    \ UINavigationController) {\n        self.navigationController = navigationController\n\
    \    }\n    \n    func start() {\n        let viewModel = HomeViewModel(tasksListService:\
    \ TasksListService(), coordinator: self)\n        navigationController.pushViewController(HomeViewController(viewModel:\
    \ viewModel), animated: true)\n    }\n    \n    func showSelectedList(_ list:\
    \ TasksListModel) {\n        let taskListCoordinator = TaskListCoordinator(navigationController:\
    \ navigationController, taskList: list)\n        taskListCoordinator.start()\n\
    \    }\n    \n    func gotoAddList() {\n        let addListCoordinator = AddListCoordinator(navigationController:\
    \ navigationController)\n        addListCoordinator.start()\n    }\n}\n```\n\n\
    *Listing 4-40 — `HomeCoordinatorProtocol` and `HomeCoordinator` class*\n\nAs you\
    \ can see, when passing the `HomeViewController` to the navigation controller,\
    \ we are also passing an instance of the `HomeViewModel`, which includes a reference\
    \ to the Coordinator itself to be able to manage navigation calls from said `ViewModel`,\
    \ without the need for it to go through the View and the Controller.\n\nTherefore,\
    \ if we call, for example, the `gotAddList` method of the `HomeCoordinator`, it\
    \ will take care of instantiating the `AddListCoordinator` and calling its `start()`\
    \ method, which will load the navigation stack in the `AddListController` (and\
    \ all this without going through the `HomeViewController`).\n\nIn this way, the\
    \ `HomeViewController` only takes care of instantiating the View (which, as we\
    \ already know, we have in a different class) and passing the ViewModel to it\
    \ (Listing 4-41).\n\n```\nclass HomeViewController: UIViewController {\n    private\
    \ var homeView: HomeView!\n    private var viewModel: HomeViewModel!\n    \n \
    \   init(viewModel: HomeViewModel) {\n        super.init(nibName: nil, bundle:\
    \ nil)\n        self.viewModel = viewModel\n    }\n    \n    required init?(coder:\
    \ NSCoder) {\n        fatalError(\"init(coder:) has not been implemented\")\n\
    \    }\n    \n    override func loadView() {\n        super.loadView()\n     \
    \   setupHomeView()\n    }\n    \n    private func setupHomeView() {\n       \
    \ homeView = HomeView(viewModel: viewModel)\n        self.view = homeView\n  \
    \  }\n}\n```\n\n*Listing 4-41 — `HomeViewController` has reduced significantly\
    \ its functions*\n\nBy adding the coordinate in the initialization of the `HomeViewModel`,\
    \ we have moved the `HomeViewModel` that we saw in the MVVM architecture as follows\
    \ (Listing 4-42).\n\n```\nclass HomeViewModel {\n    var output: Output!\n   \
    \ var input: Input!\n    let coordinator: HomeCoordinator\n    \n    struct Input\
    \ {\n        ...\n        let addList: PublishRelay\n    }\n    ...\n    \n  \
    \  init(tasksListService: TasksListServiceProtocol, coordinator: HomeCoordinator)\
    \ {\n        self.tasksListService = tasksListService\n        self.coordinator\
    \ = coordinator\n        \n        // Inputs\n        ...\n        let selectRow\
    \ = PublishRelay()\n        _ = selectRow.subscribe(onNext: { [self] indexPath\
    \ in\n            coordinator.showSelectedList(listAtIndexPath(indexPath))\n \
    \       })\n        \n        let addList = PublishRelay()\n        _ = addList.subscribe(onNext:\
    \ { _ in\n            coordinator.gotoAddList()\n        })\n        \n      \
    \  self.input = Input(reload: reload, deleteRow: deleteRow, selectRow: selectRow,\
    \ addList: addList)\n        ...\n    }\n    ...\n}\n```\n\n*Listing 4-42 — `HomeViewModel`\
    \ adaptation for the use of a Coordinator*\n\nIn this way, when we select a list\
    \ or click the `addListButton`, instead of executing calls in the View and then\
    \ passing it via delegate to the Controller, from the `HomeViewModel` itself,\
    \ the `HomeCoordinator` will be called to execute the navigation flow.\n\nFinally,\
    \ in the `HomeView` class, we have changed in the `bindingToModel` method the\
    \ link associated with the `addListButton` (Listing 4-43).\n\n```\naddListButton.rx.tap\n\
    \    .bind(to: viewModel.input.addList)\n    .disposed(by: disposeBag)\n```\n\n\
    *Listing 4-43 — New bind for `addListButton`*\n\nAnd we have removed the link\
    \ to the `viewModel.output.selectedList`, since its function of calling the `HomeViewController`\
    \ (via `delegate`), so that it loads the `TasksListViewController`, is fulfilled\
    \ by the `HomeViewModel` itself calling the `HomeCoordinator`.\n\n### Add List\
    \ Screen\n\nThis screen is the one that allows us to create a new task list, and\
    \ it only presents one possible navigation flow from it: return to Home. For this\
    \ reason, the `AddListCoordinator` will only contain one method (in addition to\
    \ the `start()` method), the `navigateBack` method, which will be called either\
    \ on adding a new list or on selecting the back button (Listing 4-44).\n\n```\n\
    protocol AddListCoordinatorProtocol {\n    func navigateBack()\n}\n\nclass AddListCoordinator:\
    \ Coordinator, AddListCoordinatorProtocol {\n    var navigationController: UINavigationController\n\
    \    \n    init(navigationController: UINavigationController) {\n        self.navigationController\
    \ = navigationController\n    }\n    \n    func start() {\n        let viewModel\
    \ = AddListViewModel(tasksListService: TasksListService(), coordinator: self)\n\
    \        navigationController.pushViewController(AddListViewController(viewModel:\
    \ viewModel), animated: true)\n    }\n    \n    func navigateBack() {\n      \
    \  navigationController.popViewController(animated: true)\n    }\n}\n```\n\n*Listing\
    \ 4-44 — `AddListCoordinatorProtocol` and `AddListCoordinator` code*\n\nIn this\
    \ way, the code of the `AddListViewController` class is reduced to a minimum expression\
    \ (Listing 4-45).\n\n```\nclass AddListViewController: UIViewController {\n  \
    \  private var addListView: AddListView!\n    private var viewModel: AddListViewModel!\n\
    \    \n    init(viewModel: AddListViewModel) {\n        super.init(nibName: nil,\
    \ bundle: nil)\n        self.viewModel = viewModel\n    }\n    ...\n    \n   \
    \ private func setupAddListView() {\n        addListView = AddListView(viewModel:\
    \ viewModel)\n        self.view = addListView\n    }\n}\n```\n\n*Listing 4-45\
    \ — `AddListViewController` code*\n\nNow, as when creating the instance of `AddListViewModel`,\
    \ we will pass the Coordinator, we will not need to add a dismiss event related\
    \ to the View in the inputs to add list (`addList`) or return to Home (`dismiss`),\
    \ we will simply call the `navigateBack` method of the Coordinator. Therefore,\
    \ we can remove the output part of the ViewModel (Listing 4-46).\n\n```\nclass\
    \ AddListViewModel {\n    ...\n    var coordinator: AddListCoordinator!\n    \n\
    \    struct Input {\n        ...\n        let addList: PublishRelay\n        let\
    \ dismiss: PublishRelay\n    }\n    ...\n    \n    init(tasksListService: TasksListServiceProtocol,\
    \ coordinator: AddListCoordinator) {\n        self.tasksListService = tasksListService\n\
    \        self.coordinator = coordinator\n        ...\n        \n        let addList\
    \ = PublishRelay()\n        _ = addList.subscribe(onNext: { [self] _ in\n    \
    \        tasksListService.saveTasksList(list)\n            coordinator.navigateBack()\n\
    \        })\n        \n        let dismissView = PublishRelay()\n        _ = dismissView.subscribe(onNext:\
    \ { _ in\n            coordinator.navigateBack()\n        })\n        ...\n  \
    \  }\n}\n```\n\n*Listing 4-46 — Use of the coordinator in the `addList` and `dismiss`\
    \ inputs*\n\nBy removing the output, we will also remove its binding on the View\
    \ (`viewModel.output.dismiss`) that we had used in the MVVM architecture."
