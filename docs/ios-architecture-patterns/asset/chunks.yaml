    Starting with the *AddListInteractor*, we define the output protocol (*AddTaskInteractorOutput*),
    which has a single method, and as in the previous cases, we rename the *AddTaskViewControllerOutput*
    output protocol to *AddTaskInteractorInput* (Listing [6-58](#531999_1_En_6_Chapter.xhtml#PC59)).


