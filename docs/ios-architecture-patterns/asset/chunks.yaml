- fmt: '# Let’s Create the First Test


    In Chapter [1](#531999_1_En_1_Chapter.xhtml), we saw how to create our application
    project and how to activate the “Include Tests” option when creating it. In this
    way, Xcode creates our test target, so that we only have to add our tests.


    When initially creating our project, for the MVC architecture, with the name *MVC-MyToDos*,
    we will see that two folders have been created, *MVC-MyToDosTests* and *MVC-MyToDosUITests*,
    although we will only focus on the first one, which will be the one that contains
    the unit tests that we have mentioned before (Figure [2-12](#531999_1_En_2_Chapter.xhtml#Fig12)).


    ![A screenshot represents the files under a folder named mocks which is a sub-folder
    under M V C, my to-dos tests. There are files named mock navigation controller,
    mock task list service, and mock task service along with others.](images/531999_1_En_2_Chapter/531999_1_En_2_Fig12_HTML.jpg)


    **Figure 2-12** MVC-MyToDos test files


    Now, let’s create our first test. Suppose we first create the Home view, `HomeView.swift`.
    We select the *MVC-MyToDosTests* folder and add a new file. From the different
    file options, we choose the “*Unit Test Case Class*” and give it the name `HomeViewTest`
    (Figure [2-13](#531999_1_En_2_Chapter.xhtml#Fig13) and Figure [2-14](#531999_1_En_2_Chapter.xhtml#Fig14)).


    ![A screenshot reads the text home view test inside the textbox beside the class,
    the subclass is selected as X C test case and the language is swift. A text at
    the top reads, choose options for your new file.](images/531999_1_En_2_Chapter/531999_1_En_2_Fig14_HTML.png)


    **Figure 2-14** `HomeViewTest` class creation


    ![A screenshot represents a set of files under the source and user interface.
    The text at the top reads, choose a template for your new file. It highlights
    a file named unit test case class.](images/531999_1_En_2_Chapter/531999_1_En_2_Fig13_HTML.png)


    **Figure 2-13** Unit Test Case Class template selection


    Doing this, Xcode will create a file with some initial code (Listing [2-27](#531999_1_En_2_Chapter.xhtml#PC39)).


    ```

    import XCTest

    class HomeViewTestd: XCTestCase {

    override func setUpWithError() throws {}

    override func tearDownWithError() throws {}

    func testExample() throws {}

    func testPerformanceExample() throws {}

    }

    Listing 2-27

    Initial HomeViewTest code

    ```


    In the `setUpWithError()` function, we will put the code that is executed before
    each test and in `tearDownWithError()`, the one that should be executed after
    each test.


    The other two functions are examples, which tell us that all the tests we write
    (the functions) must start with the word “*test*.”


    Once we know this, we are going to write the first test (Listing [2-28](#531999_1_En_2_Chapter.xhtml#PC40)).


    ```

    import XCTest

    @testable import MVC_MyToDos

    class HomeViewTest: XCTestCase {

    var sut: HomeView!

    override func setUpWithError() throws {

    sut = HomeView()

    }

    func testViewLoaded_whenViewIsInstantiated_shouldBeComponents() {

    XCTAssertNotNil(sut.pageTitle)

    XCTAssertNotNil(sut.addListButton)

    XCTAssertNotNil(sut.tableView)

    XCTAssertNotNil(sut.emptyState)

    }

    }

    Listing 2-28

    Test code for checking HomeView components

    ```


    In order to test the `HomeView`, we must first make it visible to our `MVC_MyTodosTests`
    target. To do this, we have imported our project using the command:


    ```

    @testable import MVC_MyToDos

    ```


    The next step has been to create a variable of type `HomeView`:


    ```

    var sut: HomeView!

    ```


    The name of the parameter, `sut`, comes from “*system under test*.” By this, we
    mean which class we are testing.


    Finally, we have created the test:


    ```

    testViewLoaded_whenViewIsInstantiated_shouldBeComponents

    ```


    For the Apple framework to detect that it is a test to run, the function must
    begin with the word “*test*.” Also, it is a good practice to define in the name
    of the function that you want to test (`ViewLoaded`), when (`whenViewIsInstantiated`),
    and what we should get as a result (`shouldBeComponents`).


    When creating the different components of the `HomeView`, we have defined them
    as `private(set)`, which allows us to access them from outside the class to read
    them but not modify them (Figure [2-15](#531999_1_En_2_Chapter.xhtml#Fig15)).


    ![A screenshot represents 6 lines of code. It indicates the application of the
    function that reads X C T assert not nil at 4 instances.](images/531999_1_En_2_Chapter/531999_1_En_2_Fig15_HTML.png)


    **Figure 2-15** First test passed


    In this case, we have used a type of `XCAssert` function, `XCTAssertNotNil`; what
    it does is to validate that what is inside the parentheses is not nil (different
    functions depend on what we want to test: `XCAssertEqual`, `XCAssertTrue`, etc.).


    ## Helper Classes


    To facilitate the testing of our code, it is necessary to create some classes
    that will help us.


    The first of them, `InMemoryCoreDataManager`, has the same functionalities as
    the application’s `CoreDataManager` file, but the database is generated in memory
    and does not persist when the tests are finished (Listing [2-29](#531999_1_En_2_Chapter.xhtml#PC44)).


    ```

    class InMemoryCoreDataManager: CoreDataManager {

    override init() {

    super.init()

    let persistentStoreDescription = NSPersistentStoreDescription()

    persistentStoreDescription.type = NSInMemoryStoreType

    let container = NSPersistentContainer(name: "ToDoList")

    container.persistentStoreDescriptions = [persistentStoreDescription]

    container.loadPersistentStores { _, error in

    if let error = error as NSError? {

    fatalError("Unresolved error \(error), \(error.userInfo)")

    }

    }

    persistentContainer = container

    }

    }

    Listing 2-29

    InMemoryCoreDataManager help class

    ```


    The second file, `MockNavigationController`, allows us to identify when navigation
    calls (push and pop) have been made in the application. This is achieved by making
    a *mock* of the `UINavigationController` class in which some variables are introduced
    that allow us to know if a push call or a pop call has occurred (Listing [2-30](#531999_1_En_2_Chapter.xhtml#PC45)).


    ```

    class MockNavigationController: UINavigationController {

    var vcIsPushed: Bool = false

    var vcIsPopped: Bool = false

    override func pushViewController(_ viewController: UIViewController,

    animated: Bool) {

    super.pushViewController(viewController,

    animated: animated)

    vcIsPushed = true

    }

    override func popViewController(animated: Bool) -> UIViewController? {

    vcIsPopped = true

    return viewControllers.first

    }

    }

    Listing 2-30

    MockNavigationController to test navigation in app

    ```


    ## MVC-MyToDos Testing


    With all this in mind, we continue to develop our tests and code. We have a test
    file for each of the services (access to the database), two files per screen (for
    each controller and each view), and two more files that will help when performing
    the tests.


    We are not going to show on these pages all the tests carried out for the *MVC-MyToDos*
    project since you can find them in its repository. However, we are going to show
    those that may be more relevant.


    **Note**


    From the pedagogical point of view when working with the different architectures
    of an application, we will first see how the code is structured, and then, with
    ease or difficulty from the point of view of its testing, it is recommended that
    in our day-to-day work as developers, we work with the TDD (test-driven development)
    methodology. This methodology is based on first writing the tests (generally unit
    tests), then writing the code that allows the tests to pass, and, finally, refactoring
    said code.^([⁴](#fn4))'
