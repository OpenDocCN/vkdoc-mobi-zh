    \    }\n}\n```\n\n### `AddTaskPresenter`\n\n与之前的情况类似，`AddTaskPresenter` 通过将输入协议重命名为\
    \ `AddTaskViewController`，将输出协议重命名为 `AddTaskPresenter`，来获取其两个输入和输出协议（清单 6-61）。\n\
    \n```\ntypealias AddTaskPresenterInput = AddTaskInteractorOutput\ntypealias AddTaskPresenterOutput\
    \ = AddTaskViewControllerInput\n```\n\n遵循 `AddTaskPresenterInput` 协议的过程相当简单（清单\
    \ 6-62）。\n\n```\nfinal class AddTaskPresenter {\n    weak var viewController:\
    \ AddTaskPresenterOutput?\n}\n\nextension AddTaskPresenter: AddTaskPresenterInput\
    \ {\n    func dismissView() {\n        viewController?.dismissView()\n    }\n\
    }\n```\n\n### `AddTaskModel`\n\n`AddTaskModel` 相当简单，因为只有请求呈现了创建任务所需的字段（其余部分虽然为空，但出于教学目的已展示）（清单\
    \ 6-63）。\n\n```\nenum AddTaskModel {\n    enum AddTask {\n        struct Request\
    \ {\n            var title: String\n            var icon: String\n        }\n\
    \        struct Response {}\n        struct ViewModel {}\n    }\n}\n```\n\n###\
    \ `AddTaskRouter`\n\n`AddTaskRouter` 也很简单，因为它只有一个方法，即关闭视图（清单 6-64）。\n\n```\nprotocol\
    \ AddTaskRouterDelegate {\n    func dismissView()\n}\n\nfinal class AddTaskRouter\
    \ {\n    weak var viewController: UIViewController?\n}\n\nextension AddTaskRouter:\
    \ AddTaskRouterDelegate {\n    func dismissView() {\n        viewController?.dismiss(animated:\
    \ true)\n    }\n}\n```\n\n## VIP-MyToDos 测试\n\n在 VIP 架构中，我们将要测试的三个主要组件是 ViewControllers、Interactors\
    \ 和 Presenters，因为这些是 VIP 循环的组成部分。\n\n**注意：** 请记住，您可以在本书附带的代码仓库中找到完整的项目代码，包括测试代码。\n\
    \n现在，作为示例，让我们看看如何为 `Home` 场景的 `HomeViewController`、`HomeInteractor` 和 `HomePresenter`\
    \ 类设置单元测试。\n\n在针对这些组件的每个测试文件中，我们还将定义每个场景所需的其他组件的模拟对象。\n\n### `HomeViewControllerTest`\n\
    \n正如我们在其他情况中所见，首先要做的是定义测试中需要的组件。在这里，我们的 *sut*（即被测试系统）是 `HomeViewController`。\n\
    \n由于 `HomeViewController` 与 `HomeInteractor` 和 `HomeRouter` 相关，我们将为这些类定义模拟对象：`MockHomeInteractor`\
    \ 和 `MockHomeRouter`（清单 6-65）。\n\n```\nimport XCTest\n@testable import VIP_MyToDos\n\
    \nfinal class HomeViewControllerTest: XCTestCase {\n    private var sut: HomeViewController!\n\
    \    private var interactor: MockHomeInteractor!\n    private var router: MockHomeRouter!\n\
    \    private var view: HomeView!\n\n    let taskList = TasksListModel(id: \"12345-67890\"\
    ,\n                                  title: \"Test List\",\n                 \
    \                 icon: \"test.icon\",\n                                  tasks:\
    \ [TaskModel](),\n                                  createdAt: Date())\n\n   \
    \ override func setUpWithError() throws {\n        super.setUp()\n        interactor\
    \ = MockHomeInteractor()\n        router = MockHomeRouter()\n        view = HomeView()\n\
    \        sut = HomeViewController(homeView: view)\n        sut.interactor = interactor\n\
    \        sut.router = router\n    }\n    ...\n}\n```\n\n`MockHomeInteractor` 必须遵循与\
    \ `HomeInteractor` 相同的协议（尽管我们不会使用 `didAddList` 和 `updateList` 方法，它们将 `Home` 场景与\
    \ `AddList` 和 `TaskList` 场景连接起来）（清单 6-66）。其余方法将修改一些变量，我们可以通过这些变量检查它们是否已从 `HomeViewController`\
    \ 正确调用。\n\n```\nfinal class MockHomeInteractor: HomeInteractorInput, AddListDelegate,\
    \ SelectedListDelegate {\n    private(set) var addListRequest: Bool = false\n\
    \    private(set) var fetchTasksListRequest: Bool = false\n    private(set) var\
    \ selectTasksListIndex: IndexPath = IndexPath(row: 0, section: 0)\n    private(set)\
    \ var deleteTasksListIndex: IndexPath = IndexPath(row: 0, section: 0)\n\n    func\
    \ fetchTasksLists(request: HomeModel.FetchTasksLists.Request) {\n        fetchTasksListRequest\
    \ = true\n    }\n\n    func addList(request: HomeModel.AddTasksList.Request) {\n\
    \        addListRequest = true\n    }\n\n    func selectList(request: HomeModel.SelectTasksList.Request)\
    \ {\n        selectTasksListIndex = request.index\n    }\n\n    func removeList(request:\
    \ HomeModel.RemoveTasksList.Request) {\n        deleteTasksListIndex = request.index\n\
    \    }\n\n    func didAddList() {}\n    func updateLists() {}\n}\n```\n\n`MockHomeRouter`\
    \ 必须遵循 `HomeRouterDelegate` 协议。与 `MockHomeInteractor` 类似，我们设置了一系列变量，以便验证方法是否被正确调用（清单\
    \ 6-67）。\n\n```\nfinal class MockHomeRouter: HomeRouterDelegate {\n    private(set)\
    \ var navigateToAddList: Bool = false\n    private(set) var navigateToTaksList:\
    \ Bool = false\n    private(set) var selectedList: TasksListModel = TasksListModel()\n\
    \n    func showAddListView(delegate: AddListDelegate) {\n        navigateToAddList\
    \ = true\n    }\n\n    func showSelectedList(delegate: SelectedListDelegate, list:\
