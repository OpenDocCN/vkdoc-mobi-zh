    ##### TaskListView


    *TaskListView* has, from the point of view of the components that make it up,
    functionality similar to *HomeView*: it presents a *UITableView* component that
    must be filled with the tasks that make up a list, a button to be able to add
    a new task, and we can delete tasks. But, in addition, it includes the title of
    the task list, a button to return to *HomeView*, and the possibility of updating
    a task, employing a button that allows it to go from undone to done, and vice
    versa.


    So, let’s start by seeing what code we have to introduce in the *TaskListView''s
    bindToModel* method to bind the *UITableView* element with the *TaskListViewModel*,
    keeping in mind that we are working with inputs and outputs (Listing [4-23](#531999_1_En_4_Chapter.xhtml#PC29)).


    ```

    tableView.rx

    .setDelegate(self)

    .disposed(by: disposeBag)

    tableView.rx.itemDeleted

    .bind(to: viewModel.input.deleteRow)

    .disposed(by: disposeBag)

    viewModel.output.tasks

    .drive(tableView.rx.items(cellIdentifier: TaskCell.reuseId, cellType: TaskCell.self))
    { (index, task, cell) in

    cell.setParametersForTask(task, at: index)

    cell.checkButton.rx.tap

    .map({ IndexPath(row: cell.cellIndex, section: 0) })

    .bind(to: viewModel.input.updateRow)

    .disposed(by: cell.disposeBag)

    }

    .disposed(by: disposeBag)

    Listing 4-23

    Binding between the UITableView component and the TaskListViewModel

    ```


    Surely all this code is familiar to you. The only addition is the button that
    allows us to update the status of the task (*checkButton*), and that we configure
    for each of the cells of the table.


    Next, we have the code that allows us to associate a target to each of the two
    buttons on this screen (Listing [4-24](#531999_1_En_4_Chapter.xhtml#PC30)).


    ```

    addTaskButton.rx.tap

    .asDriver()

    .drive(onNext: { [self] in

    delegate?.addTask()

    })

    .disposed(by: disposeBag)

    backButton.rx.tap

    .asDriver()

    .drive(onNext: { [self] in

    delegate?.navigateBack()

    })

    .disposed(by: disposeBag)

    Listing 4-24

    Configuration of the targets of the addTaskButton and backButton buttons

    ```


    Pressing these buttons will call the corresponding methods of the *TaskListViewController*
    via the *delegate*.


    Finally, we have the link with two parameters of type output of the *TaskListViewModel*,
    and that will allow us, on the one hand, to show the title of the task list and,
    on the other, to hide or show the *EmptyState* depending on whether or not there
    are tasks in the list (Listing [4-25](#531999_1_En_4_Chapter.xhtml#PC31)).


    ```

    viewModel.output.pageTitle

    .drive(pageTitle.rx.text)

    .disposed(by: disposeBag)

    viewModel.output.hideEmptyState

    .drive(emptyState.rx.isHidden)

    .disposed(by: disposeBag)

    Listing 4-25

    Binding of the pageTitle and emptyState elements to the pageTitle and hideEmptyState
    outputs of the TaskListViewModel

    ```


    As we have done in the *HomeView*, at the end of the *bindToViewModel* method,
    what we do is make a call to reload the table which, as we will see now in the
    ViewModel, calls the database to obtain the created task lists.


    ```

    viewModel.input.reload.accept(())

    ```'
