    ### 工作原理


    Elm 架构遵循以下循环运作（图 7-3）：


    ![](img/531999_1_En_7_Fig3_HTML.png)


    Elm 架构流程图包含 `Update`、`Runtime` 和 `View`。


    图 7-3 Elm 架构示意图


    - 首先，将 `Model` 传递给 `View`，由 `View` 负责呈现该模型。

    - 当用户与 `View` 交互时，此交互会作为消息传递给 `Runtime`，随后 `Runtime` 将该消息与当前的 `Model` 一并转发给 `Update`。

    - `Update` 负责根据消息中的信息更新 `Model`，并将其返回给 `Runtime`。

    - 当 `Runtime` 将更新后的 `Model` 发送给 `View`，使其基于新的 `Model` 进行更新时，循环重新开始。


    ### 组件


    在 Elm 架构中，（正如我们刚才所见）包含四个组件：`Model`、`View`、`Update` 和 `Runtime`。


    #### Model


    `Model` 包含（已定义的）数据和应用程序的状态。


    #### View


    `View` 是一个函数，它根据接收到的 `Model`（或状态）返回或渲染一个新的视图。


    #### Update


    `Update` 是一个函数，它根据接收到的消息更新 `Model`（或状态）。


    #### Runtime


    它负责连接并关联 `Model`、`View` 和 `Update`。


    ### 优点与缺点


    现在我们来看看这种架构的一些优缺点。


    #### 优点


    作为优点，我们可以强调以下几点：


    -   架构简单。

    -   允许我们以声明式方式开发视图。

    -   每个组件的逻辑定义及其行为使得我们可以轻松地对其进行测试。

    -   它采用单向数据流（如同 VIP 架构）。


    #### 缺点


    一些最重要的缺点如下：


    -   尽管架构简单，但对于刚入门或经验较少的开发人员来说可能比较复杂。

    -   此外，除了一些代码仓库和博客之外，互联网上关于此架构的资料并不丰富，这使得学习变得困难。


    ## Redux


    ### 历史简介


    Redux 是一个开源 JavaScript 库，由 Dan Abramov 和 Andrew Clark 于 2015 年开发。^(¹⁷) Redux 的作用是管理和集中应用程序状态，其灵感来源于
    Facebook 开发的 Flux 架构。^(¹⁸) 根据 Dan Abramov 的说法：^(¹⁹)


    > 我就是想做一个 Flux 的概念验证原型，能够让我改变逻辑。它要能实现时间旅行，还要能在代码变更时重新应用未来的操作。那就是目标所在。


    ### 工作原理


    Redux 架构基于这样一个事实：数据只沿一个方向流动（正如我们在 Elm 架构中也看到的那样），并且我们只有一个模型（它将作为单一数据源），负责存储和修改要显示的数据。


    Redux 中的流程（图 7-4）始于 `View` 上的一个 `Action`（例如，点击按钮）。该 action 被传递给 `Reducer` 组件，`Reducer`
    根据该 `Action` 负责修改应用程序的状态。


    ![](img/531999_1_En_7_Fig4_HTML.png)


    Redux 架构流程图包含 `View`、`Store`、`Middleware` 和 `Reducer`。


    图 7-4 Redux 架构示意图


    状态的改变导致 `View` 用更新后的信息进行更新（为此，我们将使用观察者模式，使视图*订阅*状态变化）。


    ### 组件


    现在让我们更详细地了解一下每个组件的功能。


    #### State


    它是应用程序的状态，且只能有一个。因此我们也可以将其称为*单一数据源*。


    #### Store


    `Store` 包含 `State`，并负责数据的流通。如上所述，它负责从 `View` 接收 `Action`，并将其与状态一起传递给 `Reducer`。


    然后，它接收 `Reducer` 生成的应用程序新状态，而我们已经订阅了 `State` 变化的 `View` 会接收到该状态并更新图形界面。应用程序中只有一个
    `Store`。


    #### Reducer


    `Reducer` 包含业务逻辑，是一个纯同步函数，负责修改应用程序的 `State`（它们是唯一能够这样做的组件）。


    `Reducer` 接收来自 `Store` 的 `State` 和 `Action`，并生成一个新的 `State` 返回给 `Store`。如果想要拆分应用程序的逻辑，更好的做法是使用不同的
    `Reducer`（组合模式），而不是使用不同的 `Store`。


    #### Action


    `Action` 是一个简单的对象，可以携带信息也可以不携带，由 `View` 发送以改变应用程序的 `State`。这些 action 可能由各种原因触发，例如触摸按钮或接收外部服务器调用的响应。


    #### View


    它是用户看到的内容，负责呈现应用程序的 `State`。它订阅了 `State` 的变化，因此每当 `State` 发生变化时，它都会更新。


    #### Middleware


    `Middleware` 是负责在应用程序中使用依赖的组件：数据库访问、服务器调用等，因为 `Reducer` 是不使用依赖的纯函数。当一个 action
    被触发时，它会连同应用程序状态一起经过 `Middleware`，如有必要，它们可以异步地发起一个新的 action。


    ## 优点与缺点


    与任何架构一样，Redux 既有优点也有缺点。


    ### 优点


    在我们的项目中使用 Redux 有一些优点：


    -   Redux 非常轻量，无需使用外部库。

    -   单一状态的事实有利于调试。

    -   在应用程序中，我们可以将当前状态保存到本地，这允许我们在重启应用程序时恢复到该状态。

    -   由于 `Reducer` 由纯函数组成，业务逻辑更易于测试。

    -   通过将业务逻辑（`Reducer`）与依赖（`Middleware`）分离，我们减少了测试中的模拟对象数量。

    -   它具有良好的职责分离。


    ### 缺点


    以下是它的一些缺点：


    -   随着应用程序的增长，由于每次传递 `Action` 时都会重新创建整个 `State`，系统的内存消耗将会增加。

    -   由于架构非常特定，当我们在项目中使用它时，几乎不可能将项目转换为不同的架构。

    -   虽然它在 Web 领域是众所周知的架构，但在 iOS 开发中并不那么知名，因此对于新手开发人员来说可能会很复杂。

    -   `Middleware` 可以异步地发起新的 `Action`，这一事实可能导致（如果存在大量 `Middleware`）出现矛盾的操作、无限循环等问题，从而使得系统不稳定。

    -   这是一个相当僵化的架构，允许的变体很少。


    ## TCA：可组合架构


    ### 历史简介


    可组合架构 (TCA) 由 Point-Free 公司的 Brandon Williams 和 Stephen Celis 开发。^(²⁰)


    这种架构的诞生是为了解决我们在开发应用程序时遇到的一些问题：


    -   以简单的方式管理应用程序的状态，并在不同屏幕之间共享该状态，以便在一个屏幕中发生的任何状态变化都能被另一个屏幕观察到。

    -   能够将大型功能划分为多个更小且独立的子功能，但特点是可以将它们合并（组合）起来，重新形成一个整体。

    -   促进应用程序的测试，不仅限于单元测试层面，还包括集成测试和端到端测试。

    -   通过使用一个提供 API 来实现每个组件的库，你可以轻松获得所有这些能力。

    '
- fmt: '### How It Works


    The Composable Architecture is an architecture that works in a declarative way
    (and not in an imperative way), according to the principles of reactive programming,
    structuring the code according to Redux patterns. Although fully optimized for
    use with SwiftUI (which is declarative), it can also be used with UIKit (which
    is imperative).


    TCA derives from The Elm Architecture, but now, for example, TCA works with the
    idea that each `View` has its `Store`, although each of these child stores has
    a partial copy of the parent view state. Every time an action is sent to a view’s
    `Store`, it is reactively passed to the parent’s stores (Figure [7-5](#531999_1_En_7_Chapter.xhtml#Fig5)).


    ![](images/531999_1_En_7_Chapter/531999_1_En_7_Fig5_HTML.png)


    A diagram depicts the parent view and the child view. Parent view store and child
    view store are connected via dotted lines. The dotted lines represent state changes
    child to parent propagation and parent-to-child propagation.


    **Figure 7-5** Each `View` has its `Store`


    We have seen in Figure [7-5](#531999_1_En_7_Chapter.xhtml#Fig5) that in this architecture,
    each `View` has a `Store`. Let’s now see what components make up The Composable
    Architecture (Figure [7-6](#531999_1_En_7_Chapter.xhtml#Fig6)).


    ![](images/531999_1_En_7_Chapter/531999_1_En_7_Fig6_HTML.jpg)


    A TCA schema consists of `View`, `Action`, `Store`, `Reducer`, and `State`. They
    all form a closed-ended cycle starting from view and ending with state, which
    is further connected to view.


    **Figure 7-6** TCA schema


    ### Components


    The Composable Architecture is based on six components: `State`, `View`, `Action`,
    `Reducer`, `Environment`, and `Store`.


    #### State


    It is a set of variables that represent the state of the application and that
    are necessary to update the `View`.


    #### View


    It is responsible for receiving and representing the data of the `State`.


    #### Action


    It is usually an `enum` that contains as cases all the actions that can occur:
    events, notifications, user actions…. For example, an action can be both receiving
    data from a server and touching a button.


    #### Reducer


    It is simply a function that takes an `Action` and the current `State` and transforms
    it into a new `State`. It is also in charge of returning any `Effect` (such as
    the call to an external server).


    #### Environment (Effect)


    It involves the dependencies that may exist in an application (such as an external
    call to a server) and contains the logic of interaction with the outside. It is
    like the Redux Middleware, and it is normally injected (dependency injection)
    into the `Reducer`.


    The `Effect` is the result of an `Action` and is generated by the `Reducer` (and
    allows it to connect with the outside). When an `Effect` completes its work, it
    can trigger another action for the `Reducer`.


    #### Store


    `Store` is a combination of `State`, `Action`, and `Reducer`. It receives the
    user’s actions and sends them to the `Reducer` together with the `State`. When
    a new state is generated, the `View` is updated.


    ## Advantages and Disadvantages


    To follow the same line as in the rest of the architectures that we have seen,
    we are going to see some of the most important advantages and disadvantages.


    ### Advantages


    The main advantages of The Composable Architecture are as follows:


    *   The data flow is unidirectional.

    *   The `Reducer`s are the only ones that can modify the `State`, which facilitates
    testing.

    *   The application is built with a composition of different functionalities.
    This allows for designing, developing, and testing each functionality separately.

    *   In the `Environment`, we find all the dependencies. This makes the debugging
    job easier. Also, it is easier to switch from a development environment to a production
    environment.

    *   It allows you to develop views in a declarative way.


    ### Disadvantages


    The main disadvantages of The Composable Architecture are as follows:


    *   It is more intended for SwiftUI (declarative UI) than for UIKit (reactive
    UI).

    *   By having multiple states, synchronization between them can be complicated.

    *   In the same way as RIB, TEA, or Redux, it is an architecture that is not as
    well known as the ones that we have dealt with in depth in the first chapters.
    This means that not so much information is found and can be intimidating for beginner
    developers.


    ## Summary


    To end the topic of Software Architectures in iOS, we have reviewed some of the
    lesser known or less used ones (RIBs, TEA, Redux, and TCA). These are more modern
    architectures, whose bases differ from those we saw initially (MVC, MVP, MVVM,
    VIP, or VIPER), for example, in the use of states.


    The fact that they are little used and even in demand means that the information
    available is also reduced, which can make access difficult for novice developers.
    But more than an impediment, we can consider it a learning challenge!


