    \n本 Apress 印记由 Springer Nature 旗下的注册公司 APress Media, LLC 出版。  \n注册公司地址为：1 New\
    \ York Plaza, New York, NY 10004, U.S.A.  \n\n> 我们要在宇宙中留下印记。否则，我们为何还要存在于此？  \n\
    > ——史蒂夫·乔布斯  \n\n> *他们不知道这是不可能的，所以就这么做了。*  \n> ——马克·吐温  \n\n## 引言\n\n正如我们将要在本书中看到的，开发应用程序时已发展出多种可应用的架构模式——有些是众所周知的（且较老的），如`MVC`或`MVVM`；还有一些更具创新性，如`VIPER`或`VIP`。\n\
    \n无论你是刚开始开发应用程序，还是已经从事了一段时间，你肯定曾搜索过关于应用程序如何构建以及哪种架构模式最适合应用的信息。但你可能也得出了与我相同的结论：从全局角度来看，并没有完美的架构模式，它们各有优缺点，而我们的代码是否可读、可测试和可扩展，几乎总是取决于我们如何应用该模式。\n\
    \n此外，你还会注意到，一种架构模式往往会设定一些应用程序规则，但后来许多开发人员会对其进行调整或修改，以期改进其特性或解决其某些潜在缺陷。\n\n## 本书目标读者\n\
    \n本书既面向那些刚刚起步、希望了解可应用于自身应用的架构模式的开发人员，也面向那些已有一定开发经验、希望了解其他可能架构的开发人员。\n\n因此，如果你希望实现以下目标，本书就适合你：\n\
    \n*   学习遵循所讲解的某些架构模式来开发应用程序\n*   理解每种架构模式的优缺点，并选择最适合你的那一种\n*   理解开发可读、可测试且可扩展代码的优势\n\
    \n本书并非旨在深入探讨每种架构的具体使用，而是作为其应用的入门点，帮助你理解它们为何重要。从此出发，你将能够选择最适合你的一种或多种架构，知道如何深入研究、应用它们，并在你的开发者生涯中不断进步。\n\
    \n## 如何使用本书？\n\n除了对每种介绍的架构模式进行理论介绍（对于我们将涉及的每种架构，都有大量文章讨论其特性、优缺点）外，本书主要以实践为导向。在第\
    \ 2 章至第 6 章（`MVC`、`MVP`、`MVVM`、`VIPER`和`VIP`架构模式）中，将展示按照这些模式开发一个应用程序（`MyToDos`）的过程。\n\
    \n为简单起见，虽然会呈现代码的主要部分（取决于所解释的概念），但你会看到被省略的代码部分（以“...”标记）。不过，你可以在本书的代码仓库中找到每个项目的完整代码。\n\
    \n因此，我假定你已经具备一些`Swift`和`Xcode`的知识，能够顺利阅读本书。\n\n## 致谢\n\n首先，我要感谢我的家人，感谢他们在本书准备和写作期间，以及一直以来给予我的支持、鼓励的话语和灵感。本书献给他们。\n\
    \n其次，我要感谢整个 Apress 团队给我写作本书的机会，从最初联系我并提出撰写一本关于 iOS 开发书籍可能性的 Aaron Black 开始，更不用说\
    \ Jessica Vakili 和 Nirmal Selvaraj 在书籍管理和编辑方面所做的出色工作。\n\n学习是一场永无止境的旅程，因此，我也想感谢所有以各种方式每天教给我们新知识的人。\n\
    \n最后，感谢你，读者。希望你在读完这本书后，认为这是一个明智的决定，并且无论程度如何，它都对你的开发者成长之路有所帮助。\n\n## 关于作者  \n##\
    \ 关于技术审校者  \n\n# 1. 引言  \n\n设想如下情景：你和你的团队接到一个新项目，需要开发一个移动应用。一个项目，无论是源于我们自己的创意，还是客户委托的，都会包含一系列规范、功能、行为等。\n\
    \n继续我们的设想，我们假设所有这些规范和功能都已研究完毕，并转化为用户故事（即从用户角度描述一个功能的方式：例如，“作为一名用户，我希望在应用中登录”），并且我们已经可以开始编写第一行代码来开发应用了。\n\
    \n我们都曾遇到过这样的情况：当有一个新项目时，我们想立刻开始编写代码。然而，如果我们以这种方式工作，不预先提出项目结构或考虑应用类型，最终开发出的应用虽然能运行，但其代码日后将难以维护。\n\
    \n为了避免这种情况，在开始编写代码之前，我们必须确定我们将赋予它什么样的结构，软件架构将是什么，以及哪种架构模式最适合我们的项目。\n\n在开始了解 iOS\
    \ 应用开发中最常用的架构模式之前，我们将先介绍什么是软件架构、什么是架构模式、为什么需要它们，以及如何为我们的项目选择最合适的一种。"
- fmt: "## What Is Software Architecture?\n\nThe Software Architecture defines how\
    \ the software structure is, what are the components that form it, how they are\
    \ joined, and how they communicate with each other.\n\nAll these points that intervene\
    \ in the definition of the Software Architecture can be represented according\
    \ to different models or views, the following three being the main ones (and an\
    \ example of their application is one of the architectures that we will study\
    \ later, the MVVM or Model–View–ViewModel):\n\n- **Static view**: It indicates\
    \ which components make up the structure. In MVVM, these components would be `View`,\
    \ `Model`, and `ViewModel`.\n- **Dynamic view**: It establishes the behavior of\
    \ the different components and the communication between them over time.\n- **Functional\
    \ view**: It shows us what each component does. For example, in the example we\
    \ are seeing, each of the components would have the following functionalities:\n\
    \  - **Model**: It contains the classes and structures responsible for storing\
    \ and transferring an application’s data. It also includes business logic.\n \
    \ - **View**: It represents the interface with the elements that form it, the\
    \ interaction with the user, and how it is updated to show the user the information\
    \ received.\n  - **ViewModel**: It acts as an intermediary between the `View`\
    \ and the `Model`; it usually includes presentation logic, that is, those methods\
    \ that allow the data received from the `Model` to be transformed to be presented\
    \ in the `View`.\n\n## Architecture Patterns\n\nWe have just seen that Software\
    \ Architecture helps us to give structure to our project. However, not all projects\
    \ are the same or have the same purpose, so, logically, the architectures used\
    \ are different and appropriate to each project.\n\nDevelopers have been finding\
    \ different solutions when facing their projects. The fact that the requirements\
    \ and functionalities of a project, its components, or the way of communicating\
    \ between them vary from one project to another has given rise to different architectural\
    \ solutions and architecture patterns.\n\nKeep in mind that an architecture pattern\
    \ is like a template that offers us some rules or guidelines on how to develop\
    \ and structure the different components of the application. Each architectural\
    \ pattern has its advantages and disadvantages, as we will see later.\n\n## Why\
    \ Do We Need an Architecture Pattern for Our Applications?\n\nThe selection and\
    \ use of an architecture pattern when developing our applications will allow us\
    \ to avoid a series of problems that applications that have been developed without\
    \ using these patterns can present.\n\nSome of these problems are as follows:\n\
    \n- These are applications that are difficult to maintain. This problem increases\
    \ if new developers are involved, as it is more costly for them to understand\
    \ the software they are working on.\n- It usually increases the development time\
    \ and, therefore, increases its cost.\n- As it is not a structured code, it is\
    \ more complicated to add new features or scale it.\n- They are very likely to\
    \ have duplicate, unused, and messy code. All this makes it more prone to errors.\n\
    \nTherefore, the use of a good architecture pattern will allow us to reduce these\
    \ problems:\n\n- We will work with a code that is simpler, more organized, and\
    \ easier to understand (and following good development practices, such as the\
    \ SOLID principles) for all developers since they will act according to the same\
    \ rules.\n- The written code will be easily testable and less prone to errors.\n\
    - A correct distribution of the components and their responsibilities will lead\
    \ to a structure that is easy to maintain, modify, and extend.\n- All of this\
    \ will result in reduced development time and, by extension, reduced costs.\n\n\
    ## Design from High Level to Low Level\n\nIn this book, we are going to study\
    \ and apply different architectural patterns in iOS applications, so we will also\
    \ see the code with which we implement them and the best way to implement it.\n\
    \nAs we have seen, an architecture pattern gives us guidelines to build an application\
    \ that is efficient, scalable, and easy to maintain, among other advantages.\n\
    \nBut we can think of an architecture pattern as the high-level design of the\
    \ application, and then we have to go down to the code (Figure [1-1](#531999_1_En_1_Chapter.xhtml#Fig1)).\n\
    \nThis is where the design patterns and their implementation through the programming\
    \ language come in, trying to follow some principles (SOLID), which will make\
    \ the code flexible, stable, maintainable, and reusable.\n\n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig1_HTML.jpg)\n\
    \n*A flow diagram of the levels of design and implementation in an application\
    \ consists of architecture pattern, design pattern, and programming language,\
    \ from high to low level.*\n\n**Figure 1-1** Levels of design and implementation\
    \ in an application\n\nLet’s see briefly what design patterns are (some of which\
    \ we will apply) and how to work following the SOLID principles.\n\n### Design\
    \ Patterns\n\nIn the same way that an architecture pattern is a generic solution\
    \ to a certain problem when it comes to the structure of our software (i.e., it\
    \ will affect the entire project), design patterns give us solutions to recurring\
    \ problems that affect a project component.\n\nThere are 23 design patterns, which\
    \ are described in the book *Design Patterns: Elements of Reusable Object-Oriented\
    \ Software*.^([¹](#fn1)) They described the 23 design patterns and classified\
    \ them into three groups: structural patterns, creational patterns, and behavioral\
    \ patterns.\n\n#### Creational Patterns\n\nCreational patterns are those that\
    \ allow us to create objects. These patterns encapsulate the procedure for creating\
    \ an object and generally work through interfaces.\n\n##### Factory Method\n\n\
    It provides an interface that allows you to create objects in a superclass, but\
    \ delegates the implementation and alteration of objects to subclasses.\n\n#####\
    \ Abstract Factory\n\nIt provides an interface that allows groups of related objects\
    \ to be generated, but without specifying their specific classes or implementation.\n\
    \n##### Builder\n\nIt allows building complex objects step by step, separating\
    \ the creation of the object from its structure. In this way, we can use the same\
    \ construction process to obtain different types and representations of an object.\n\
    \n##### Singleton\n\nThis pattern ensures that a class has only one possible instance,\
    \ which is globally accessible.\n\n##### Prototype\n\nIt allows you to copy or\
