- fmt: "### AddListRouter\n\n`AddListRouter`采用`PresenterToRouterAddListProtocol`协议，因此它必须实现两个方法：使用`createScreen`方法创建`AddList`模块，以及（在需要时）通过`popToHomeFrom`方法（参见\
    \ [5-24](#531999_1_En_5_Chapter.xhtml#PC26)）返回导航栈中的`Home`屏幕。\n\n```swift\nclass\
    \ AddListRouter: PresenterToRouterAddListProtocol {\n    static func createScreen()\
    \ -> UIViewController {\n        let presenter: ViewToPresenterAddListProtocol\
    \ & InteractorToPresenterAddListProtocol = AddListPresenter()\n        let viewController\
    \ = AddListViewController()\n        viewController.presenter = presenter\n  \
    \      viewController.presenter.router = AddListRouter()\n        viewController.presenter?.view\
    \ = viewController\n        viewController.presenter?.interactor = AddListInteractor(tasksListService:\
    \ TasksListService())\n        viewController.presenter?.interactor?.presenter\
    \ = presenter\n        return viewController\n    }\n    func popToHomeFrom(view:\
    \ PresenterToViewAddListProtocol) {\n        let viewController = view as! AddListViewController\n\
    \        viewController.navigationController?.popViewController(animated: true)\n\
    \    }\n}\n```\n\n*Listing 5-24* - `AddListRouter`必须采用`PresenterToRouterAddListProtocol`并实现其方法\n\
    \n### AddListViewController\n\n正如我们在评论此模块中使用的不同协议时所见，`AddListViewController`不需要实现`PresenterToViewAddListProtocol`（该协议为空，我们保留该协议是为了维护每个模块中实现的各个协议结构）。\n\
    \n与`Presenter`的唯一关系将通过创建的变量实现，该变量使我们能够调用`Presenter`的`backAction`和`addList`函数（参见\
    \ [5-25](#531999_1_En_5_Chapter.xhtml#PC27)）。\n\n```swift\nclass AddListViewController:\
    \ UIViewController, PresenterToViewAddListProtocol {\n    ...\n    var presenter:\
    \ ViewToPresenterAddListProtocol!\n    ...\n}\nextension AddListViewController\
    \ {\n    ...\n    @objc func backAction() {\n        presenter.backAction()\n\
    \    }\n    ...\n    @objc func addListAction() {\n        guard titleTextfield.hasText\
    \ else { return }\n        listModel.title = titleTextfield.text\n        listModel.id\
    \ = ProcessInfo().globallyUniqueString\n        listModel.icon = listModel.icon\
    \ ?? \"checkmark.seal.fill\"\n        listModel.createdAt = Date()\n        presenter.addList(taskList:\
    \ listModel)\n    }\n    ...\n}\n...\n```\n\n*Listing 5-25* - `AddListViewController`实现\n\
    \n### AddListPresenter\n\n在`AddListPresenter`中，我们有两个基本函数。第一个是通知`Interactor`应向数据库添加新的任务列表（`interactor?.addList`），另一个是通知`Router`应用程序应在列表添加完成或选中返回按钮时（参见\
