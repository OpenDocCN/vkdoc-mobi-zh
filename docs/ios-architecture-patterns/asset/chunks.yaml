    \ state, labels, collection, screen, buttons, and cells.\n\nFigure 2-6\nView layer\
    \ files\n\n### Controller\n\nThe controllers (subclasses of `UIViewController`)\
    \ are the main part of the application and the ones in charge of connecting the\
    \ model with the view. Each of the screens in our application is a view controller\
    \ (Figure [2-7](#531999_1_En_2_Chapter.xhtml#Fig7)).\n\n![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig7_HTML.jpg)\n\
    \nA screenshot represents the files under a folder naming controller which is\
    \ a sub-folder under M V C, my to-dos. The files are the home view controller,\
    \ add list controller, add task controller, and task view controller.\n\nFigure\
    \ 2-7\nController layer files\n\n### MyToDos Application Screens\n\nIn Chapter\
    \ [1](#531999_1_En_1_Chapter.xhtml), we described how the application that we\
    \ would use to implement each of the architecture patterns that we will work on\
    \ in this book would be.\n\nAs you may remember, this application has four screens,\
    \ each one represented by a `UIViewController`, which will be related to the view\
    \ and the model, managing the passage of information from one to the other."
  raw: '##### Services


    Here we will have the classes that allow us to send information to the database
    (create, update, or delete it) or retrieve information from the database and transform
    it into models.


    In the case of the class that will manage the task lists, we will find the necessary
    methods to add, retrieve, or delete task lists. We will define these methods in
    the *TasksListServiceProtocol* protocol that we will then implement in the *TasksListService*
    class (Listing [2-4](#531999_1_En_2_Chapter.xhtml#PC7)).


    ```

    protocol TasksListServiceProtocol: AnyObject {

    init(coreDataManager: CoreDataManager)

    func saveTasksList(_ list: TasksListModel)

    func fetchLists() -> [TasksListModel]

    func fetchListWithId(_ id: String) -> TasksListModel?

    func deleteList(_ list: TasksListModel)

    }

    class TasksListService: TasksListServiceProtocol {

    let context: NSManagedObjectContext

    let coreDataManager: CoreDataManager

    required init(coreDataManager: CoreDataManager = CoreDataManager.shared) {

    self.context = coreDataManager.mainContext

    self.coreDataManager = coreDataManager

    }

    func saveTasksList(_ list: TasksListModel) {

    _ = list.mapToEntityInContext(context)

    coreDataManager.saveContext(context)

    }

    func fetchLists() -> [TasksListModel] {

    var lists = [TasksListModel]()

    do {

    let fetchRequest: NSFetchRequest = TasksList.fetchRequest()

    let value = try context.fetch(fetchRequest)

    lists = value.map({ TasksListModel.mapFromEntity($0) })

    lists = lists.sorted(by: { $0.createdAt.compare($1.createdAt) == .orderedDescending
    })

    } catch {

    debugPrint("CoreData Error")

    }

    return lists

    }

    func fetchListWithId(_ id: String) -> TasksListModel? {

    do {

    let fetchRequest: NSFetchRequest = TasksList.fetchRequest()

    fetchRequest.predicate = NSPredicate(format: "id = %@", id)

    let listEntities = try context.fetch(fetchRequest)

    guard let list = listEntities.first else {

    return nil

    }

    return TasksListModel.mapFromEntity(list)

    } catch {

    debugPrint("CoreData Error")

    return nil

    }

    }

    func deleteList(_ list: TasksListModel) {

    do {

    let fetchRequest: NSFetchRequest = TasksList.fetchRequest()

    fetchRequest.predicate = NSPredicate(format: "id = %@", list.id)

    let listEntities = try context.fetch(fetchRequest)

    for listEntity in listEntities {

    context.delete(listEntity)

    }

    coreDataManager.saveContext(context)

    } catch {

    debugPrint("CoreData Error")

    }

    }

    }

    Listing 2-4

    TasksListServiceProtocol and TasksListService structure and methods

    ```


    In the case of the class that will manage the tasks, *TaskService*, we will find
    the necessary methods to add, retrieve, update, or delete tasks (Listing [2-5](#531999_1_En_2_Chapter.xhtml#PC8)).
    In this case, as in the previous ones, we will define the methods to be implemented
    in a protocol.


    ```

    protocol TaskServiceProtocol: AnyObject {

    init(coreDataManager: CoreDataManager)

    func saveTask(_ task: TaskModel, in taskList: TasksListModel)

    func fetchTasksForList(_ taskList: TasksListModel) -> [TaskModel]

    func updateTask(_ task: TaskModel)

    func deleteTask(_ task: TaskModel)

    }

    class TaskService: TaskServiceProtocol {

    let context: NSManagedObjectContext

    let coreDataManager: CoreDataManager

    required init(coreDataManager: CoreDataManager = CoreDataManager.shared) {

    self.context = coreDataManager.mainContext

    self.coreDataManager = coreDataManager

    }

    func saveTask(_ task: TaskModel, in taskList: TasksListModel) {

    do {

    let fetchRequest: NSFetchRequest = TasksList.fetchRequest()

    fetchRequest.predicate = NSPredicate(format: "id = %@", taskList.id)

    guard let list  = try context.fetch(fetchRequest).first else {

    return

    }

    let taskEntity = task.mapToEntityInContext(context)

    list.addToTasks(taskEntity)

    coreDataManager.saveContext(context)

    } catch {

    debugPrint("CoreData Error")

    }

    }

    func fetchTasksForList(_ taskList: TasksListModel) -> [TaskModel] {

    var tasks = [TaskModel]()

    do {

    let fetchRequest: NSFetchRequest = TasksList.fetchRequest()

    fetchRequest.predicate = NSPredicate(format: "id = %@", taskList.id)

    guard let list  = try context.fetch(fetchRequest).first,

    let taskEntities = list.tasks else {

    return tasks

    }

    tasks = taskEntities.map({ TaskModel.mapFromEntity($0 as! Task) })

    } catch {

    debugPrint("CoreData Error")

    }

    return tasks

    }

    func updateTask(_ task: TaskModel) {

    do {

    let fetchRequest: NSFetchRequest = Task.fetchRequest()

    fetchRequest.predicate = NSPredicate(format: "id = %@", task.id)

    guard let taskEntity = try context.fetch(fetchRequest).first else {

    return

    }

    taskEntity.done = task.done

    coreDataManager.saveContext(context)

    } catch {

    debugPrint("CoreData Error")

    }

    }

    func deleteTask(_ task: TaskModel) {

    do {

    let fetchRequest: NSFetchRequest = Task.fetchRequest()

    fetchRequest.predicate = NSPredicate(format: "id = %@", task.id)

    let taskEntities = try context.fetch(fetchRequest)

    for taskEntity in taskEntities {

    context.delete(taskEntity)

    }

    coreDataManager.saveContext(context)

    } catch {

    debugPrint("CoreData Error")

    }

    }

    }

    Listing 2-5

    TaskServiceProtocol and TaskService structure and methods

    ```


    ##### Extensions


    In this case, we have created a *UIColor* extension to be able to easily access
    the colors created especially for this application, which are found in the *Assets*
    file.


    We will also add an extension to the *NSManagedObject* class that will prevent
    us from conflicting with the contexts when we do the testing part.


    ##### Constants


    They contain the constant parameters that we will use in the application. In this
    case, it is a list with the names of the icons that the user can choose when creating
    tasks and task lists.


    #### View


    This layer contains all those elements that the user can see and that make up
    the graphical interface and those with which the user can interact (Figure [2-6](#531999_1_En_2_Chapter.xhtml#Fig6)).


    These views can be simple, like a button or a label, or complex like the entire
    view of a page that contains buttons, labels, images, etc.


    In the case of simple views, they are usually graphic elements that are reused
    throughout the application, such as a button, for example.


    The most complex views are formed by the composition of simpler views. Since we
    are not working with *storyboards* or *xib* files, we will define the characteristics
    of each component, such as its position or size, using constraints.


