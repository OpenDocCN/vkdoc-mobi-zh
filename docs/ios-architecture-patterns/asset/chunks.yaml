    RIB is a cross-platform architecture developed by Uber for use in mobile applications
    involving multiple developers and nested states.


    Each RIB is made up of three components: Router, Interactor, and Builder, and
    represents an application state. Keep in mind that in the RIB architecture, since
    it is guided by business logic and not by views, each of the application’s functionalities
    may or may not have a view.


    This can be seen more clearly if we make a diagram of an application and indicate
    the different RIBs (Figure [7-1](#531999_1_En_7_Chapter.xhtml#Fig1)).


    ![](images/531999_1_En_7_Chapter/531999_1_En_7_Fig1_HTML.png)


    An R I B tree consists of root, signed in, app news, shop, signed out, log in
    and onboarding.


    Figure 7-1


    RIB tree example (in red, RIBs without View)


    As you can see in this figure, the *Signed in* and *Signed out* states do not
    present a view, since they only determine if the user already had an active session
    (so they continue along that path) or if they did not (so they would continue
    by the other route).


    Each of these states connects to the following states via an interface, with which
    they can pass whatever dependencies they need. In this way, each of these features
    can be worked on independently, without the fact of working on one of them affecting
    the rest (e.g., when each feature is developed by a different team).


    ### How It Works


    As we have just seen, we can represent an application and its state using different
    RIBs interconnected with each other, which we have represented in the form of
    a tree.


    In moving through the application and, therefore, of the different states, these
    states will be connected and disconnected.


    On the other hand, as we move through the RIB tree, information will flow from
    one RIB to another:


    *   If it is downstream, that is, from a parent RIB to a child, the direction
    of communication is usually done as an emission to an Rx data stream.


    *   If it is ascending, from a child to a parent, this communication usually takes
    place through a listening interface.


    ### Components


    Although we have mentioned the three main components in the RIB architecture (*Router*,
    *Interactor*, and *Builder*), we can find other components: *Component*, *Presenter*,
    and *View* (the latter two being optional, since, as we have seen, a RIB does
    not have to be associated to a View) (Figure [7-2](#531999_1_En_7_Chapter.xhtml#Fig2)).


    ![](images/531999_1_En_7_Chapter/531999_1_En_7_Fig2_HTML.png)


    An R I B schema consists of a router, interactor, presenter, view, builder, and
    component.


    Figure 7-2


    RIB schema


    #### Router


    Routers are in charge of attaching and detaching RIBs based on the events that
    occur in the Interactors. The presence of the RIBs allows, among other things,
    to be able to test the Interactors independently (since it is not necessary to
    know which ones are above or below) or reduce the amount of code of these Interactors
    by taking the routing part.


    #### Interactor


    An Interactor contains the business logic of its RIB, and therefore all functions
    performed within it can only be limited to its life cycle. In this way, it is
    possible to avoid that there may be a disconnected RIB (and, therefore, its Interactor),
    but there are active subscriptions.


    An Interactor is the component where Rx subscriptions occur, how their state is
    changed, or which other RIBs need to connect.


    #### Builder


    The Builder of a RIB is like the Configurator that we saw in VIPER: it is in charge
    of instantiating the different components of the RIB.


    #### Component


    A Component is a help for the Builders since they are in charge of managing the
    dependencies (both internal and external in a RIB). It is common practice to inject
    the component of a parent RIB into its children so that they have access to its
    properties.


    #### Presenter


    The Presenter, as we already know from other architectures, is in charge of transforming
    the information that comes from the Interactor into a format that can be displayed
    by the View (if the RIB has an associated View).


    #### View


    As in the case of the Presenter, it is an optional component (for RIBs with an
    associated View) and it contains the components that define the user interface.
    They should not have any associated logic and only display information and collect
    user interaction.


    ### Advantages and Disadvantages


    As in any architecture, there are advantages and disadvantages in its application.


    #### Advantages


    As advantages of the RIB architecture, we can highlight the following:


    *   Uber RIBs is an open source project, so we can freely modify and adapt it
    for our applications.


    *   This project is accompanied by a series of tools that allow us to quickly
    generate and configure the RIBs of our application to perform static analysis.


    *   It is an architecture that can be used on both iOS and Android, which facilitates
    collaboration between teams on both platforms.


    *   Thanks to the use of protocols, each RIB is independent of the rest, which
    allows us to simultaneously develop different RIBs without blocking between them.


    *   Thanks to this use of protocols, and to the fact that each component of a
    RIB has clearly defined functions, the testability of each of them is facilitated.


    *   It has been proven that it is a scalable architecture since, for example,
    in the case of Uber there are hundreds of developers working on the same source
    code.


    #### Disadvantages


    Among its disadvantages we have the following:


    *   As in architectures such as VIPER or VIP, a large amount of repetitive code
    and a high number of components per RIB are generated. This is partially mitigated
    by the tools provided by Uber to generate these components.


    *   The learning curve is significant and can be intimidating for developers who
    are just starting out or with little experience.


    *   In addition, apart from the documentation (with some tutorials) provided by
    the project itself, there is not a large bibliography on the Internet, which makes
    it difficult to learn.


    *   Communication between RIBs is based on RxSwift for iOS and RxJava or Dagger2
    for Android, which can be a problem if we want to use, or already use, another
    type of reactive library.


    ## The Elm Architecture


    ### A Little History


    Elm is a highly typed, pure functional programming language, developed by Evan
    Czaplicki in 2012,^([^(14)](#fn14)) intended for developing graphical user interfaces
    for web browsers.


    The Elm Architecture is born from the use of Elm and is a simple pattern to structure
    web apps.^([^(15)](#fn15)) In this architecture, we have a Model that contains
    the state of the application, a View that generates the HTML according to the
    Model, and an Update that transforms the Model. Its first application with Swift
    was on 2017.^([^(16)](#fn16))'
  trans: '

    ### 简史


    该架构由优步^(¹³)于 2017 年开发，旨在解决他们所面临的一系列情况：


    - 从软件角度来看，代码量已大幅增长，并添加了许多功能。这导致优步的技术债务极其庞大，使得添加新功能变得非常困难，限制了可扩展性。

    - 此外，还需要一种能够处理应用中多种状态的架构。

    - 优步的开发人员数量增加了，因此有必要鼓励每个团队能够独立开发组件，不受任何阻碍。也就是说，他们寻求一种模块化架构。


    `RIB`是一个由优步开发的跨平台架构，适用于涉及多名开发人员和嵌套状态移动应用。


    每个`RIB`由三个组件组成：`Router`、`Interactor`和`Builder`，并代表一个应用状态。请记住，在`RIB`架构中，由于它是由业务逻辑而非视图驱动的，因此每个应用功能可能有视图，也可能没有。


    如果我们绘制一个应用的图示并标出不同的`RIB`（图 7-1），这一点会看得更清楚。


    ![](img/531999_1_En_7_Fig1_HTML.png)


    一个`RIB`树由根节点、已登录、应用新闻、商店、已登出、登录和入门引导组成。


    图 7-1


    `RIB`树示例（红色标记的是不带`View`的`RIB`）


    正如你在图中看到的，*已登录*和*已登出*状态并未呈现视图，因为它们仅用于判断用户是否已有活跃会话（如果有，则继续沿该路径；如果没有，则沿另一条路线继续）。


    每个状态都通过一个接口连接到后续状态，通过这些接口，它们可以传递所需的任何依赖项。这样，每个功能都可以独立开发，而不会因开发其中一个功能而影响其他功能（例如，当每个功能由不同团队开发时）。


    ### 工作原理


    正如我们刚才所见，我们可以使用相互连接的多个`RIB`来表示一个应用及其状态，我们以树形形式表示了这些`RIB`。


    在应用中导航，进而经历不同状态时，这些状态将会连接和断开。


    另一方面，当我们在`RIB`树中移动时，信息会从一个`RIB`流向另一个`RIB`：


    - 如果是向下游流动，即从父`RIB`流向子`RIB`，通信方向通常是通过向 Rx 数据流发送事件来实现。

    - 如果是向上游流动，即从子`RIB`流向父`RIB`，这种通信通常通过监听接口进行。


    ### 组件


    虽然我们已经提到了`RIB`架构中的三个主要组件（`Router`、`Interactor`和`Builder`），但我们还可以找到其他组件：`Component`、`Presenter`和`View`（后两者是可选的，因为正如我们所见，`RIB`不一定需要与`View`关联）（图
    7-2）。


    ![](img/531999_1_En_7_Fig2_HTML.png)


    一个`RIB`架构图包含路由器、交互器、展示器、视图、构建器和组件。


    图 7-2


    `RIB`架构图


    #### 路由器（Router）


    `Router`负责根据`Interactor`中发生的事件来附加和分离`RIB`。`RIB`的存在使得能够独立测试`Interactor`（因为无需知道其上下的其他组件），或者通过接管路由部分来减少这些`Interactor`的代码量。


    #### 交互器（Interactor）


    `Interactor`包含其所属`RIB`的业务逻辑，因此在其内部执行的所有功能只能限于其生命周期之内。这样，就可以避免出现已断开的`RIB`（因此其`Interactor`也已断开）但仍存在活跃订阅的情况。


    `Interactor`是发起 Rx 订阅、改变其状态或确定需要连接哪些其他`RIB`的组件。


    #### 构建器（Builder）


    `RIB`的`Builder`类似于我们在`VIPER`中看到的配置器：它负责实例化`RIB`的各个不同组件。


    #### 组件（Component）


    `Component`是对`Builder`的帮助，因为它们负责管理依赖关系（包括`RIB`内部和外部的依赖关系）。常见的做法是将父`RIB`的组件注入其子`RIB`，使子`RIB`能够访问其属性。


    #### 展示器（Presenter）


    `Presenter`，正如我们通过其他架构所知，负责将来自`Interactor`的信息转换为`View`可以显示的格式（如果该`RIB`有关联的`View`）。


    #### 视图（View）


    与`Presenter`的情况一样，它是一个可选组件（用于有关联`View`的`RIB`），并包含定义用户界面的组件。它们不应包含任何相关逻辑，只负责显示信息和收集用户交互。


    ### 优点与缺点


    与其他任何架构一样，其应用既有优点也有缺点。


    #### 优点


    作为`RIB`架构的优点，我们可以强调以下几点：


    - `Uber RIBs`是一个开源项目，因此我们可以自由修改并使其适用于我们的应用。

    - 该项目附带一系列工具，使我们能够快速生成和配置应用中的`RIB`，以执行静态分析。

    - 它是一种可以在 iOS 和 Android 上使用的架构，这有助于两个平台上的团队协作。

    - 由于使用了协议，每个`RIB`都独立于其他`RIB`，这使我们能够同时开发不同的`RIB`，而不会相互阻塞。

    - 得益于这种协议的使用，以及`RIB`每个组件都有明确定义的功能，每个组件的可测试性都得到了提升。

    - 它已被证明是一种可扩展的架构，例如在优步，有成百上千的开发人员在同一个源代码上工作。


    #### 缺点


    其缺点包括以下几点：


    - 与`VIPER`或`VIP`等架构一样，会产生大量重复代码以及每个`RIB`有大量组件的情况。优步提供的用于生成这些组件的工具部分缓解了这个问题。

    - 学习曲线相当陡峭，可能会让刚入门或经验不足的开发人员感到望而生畏。

    - 此外，除了项目本身提供的文档（以及一些教程）外，互联网上并没有大量的参考文献，这给学习增加了难度。

    - `RIB`之间的通信基于 iOS 的`RxSwift`和 Android 的`RxJava`或`Dagger2`，如果我们想要使用或已经在使用其他类型的响应式库，这可能会成为一个问题。


    ## Elm 架构


    ### 简史


    `Elm`是一种高度类型化的纯函数式编程语言，由 Evan Czaplicki 于 2012 年开发^(¹⁴)，旨在为网页浏览器开发图形用户界面。


    `Elm 架构`源于`Elm`语言的使用，是一种用于构建网页应用的简单模式。^(¹⁵) 在这种架构中，我们有一个包含应用状态的`Model`，一个根据`Model`生成
    HTML 的`View`，以及一个转换`Model`的`Update`。它首次应用于 Swift 是在 2017 年。^(¹⁶)

    '
- fmt: '### How It Works


    The Elm Architecture works according to the following cycle (Figure [7-3](#531999_1_En_7_Chapter.xhtml#Fig3)):


    ![](images/531999_1_En_7_Chapter/531999_1_En_7_Fig3_HTML.png)


    A flowchart of Elm architecture consists of `Update`, `Runtime`, and `View`.


    Figure 7-3 The Elm Architecture schema


    - In the first place, a `Model` is passed to the `View`, which is in charge of
    representing it.

    - When the user interacts with the `View`, this interaction is transmitted to
    `Runtime` as a message, which is relayed to `Update` along with the current `Model`.

    - The `Update` is in charge of updating the `Model` according to the information
    in the Message and returning it to the `Runtime`.

    - The loop restarts when the `Runtime` sends the updated `Model` to the `View`
    to update based on the new `Model`.


    ### Components


    In The Elm Architecture, we have (as we just saw) four components: `Model`, `View`,
    `Update`, and `Runtime`.


    #### Model


    The `Model` contains the data (as defined) and the state of the application.


    #### View


    The `View` is a function that returns or renders a new view based on the `Model`
    (or state) it receives.


    #### Update


    An `Update` is a function that updates the `Model` (or state) based on the Message
    it receives.


    #### Runtime


    It is what unites and relates the `Model`, the `View`, and the `Update`.


    ### Advantages and Disadvantages


    Let’s now see some of the advantages and disadvantages of this architecture.


    #### Advantages


    As advantages we can highlight the following:


    - It is a simple architecture.

    - It allows us to develop our views in a declarative way.

    - The logical definition of each of the components and their behavior allows us
    to test them easily.

    - It uses a one-way data flow (as in VIP).


    #### Disadvantages


    Some of the most important disadvantages are as follows:


    - Even with its simplicity, it can be complex for developers who are just starting
    or have little experience.

    - Furthermore, apart from some repositories and blogs, there is not a large bibliography
    on the Internet, which makes it difficult to learn.


    ## Redux


    ### A Little History


    Redux is an open source JavaScript library developed by Dan Abramov and Andrew
    Clark in 2015.^([^(17)](#fn17)) What Redux does is manage and centralize the application
    state, and it is inspired by the Flux architecture developed by Facebook.^([^(18)](#fn18))
    According to Dan Abramov:^([^(19)](#fn19))


    > *And I just, I was trying to make a proof of concept of Flux where I could change
    the logic. And it would let me time travel. And it would let me reapply the future
    actions on the code change. So that was like, the goal.*


    ### How It Works


    The Redux architecture is based on the fact that the data only flows in one direction
    (as we have also seen in The Elm Architecture) and we only have one model (which
    will act as the source of truth) that will be in charge of storing and modifying
    the data to be displayed.


    The flow in Redux (Figure [7-4](#531999_1_En_7_Chapter.xhtml#Fig4)) starts with
    an `Action` on the `View` (e.g., clicking a button). This action is passed to
    the `Reducer` component, which, based on said `Action`, is in charge of modifying
    the state of the application.


    ![](images/531999_1_En_7_Chapter/531999_1_En_7_Fig4_HTML.png)


    A flowchart of Redux schema consists of `View`, `Store`, `Middleware`, and `Reducer`.


    Figure 7-4 Redux schema


    The change in state causes the `View` to be updated with the new information (to
    achieve this we will use the Observer pattern, making the view *subscribe* to
    state changes).


    ### Components


    Let us now see in a little more detail the function of each component.


    #### State


    It is the state of the application and there can only be one. That is why we can
    also indicate that it is the *source of truth*.


    #### Store


    The `Store` contains the `State` and is in charge of circulating the data. As
    we have seen, it is in charge of receiving the `Action` from the `View` and passing
    it to the `Reducer`, along with the state.


    Then it receives the new state of the application that the `Reducer` has generated,
    and the `View`, which we have subscribed to the changes of the `State`, receives
    it and updates the graphical interface. There is only one `Store` in the application.


    #### Reducer


    A `Reducer` contains the logic and it is a pure and synchronous function, in charge
    of modifying the `State` of the application (they are the only components that
    can do it).


    The `Reducer` receives the `State` and the `Action` of the `Store` and generates
    a new `State` that it returns to the `Store`. In the case of wanting to divide
    the logic of an application, it is better to use different `Reducer`s (Composition
    pattern) than to use different `Store`s.


    #### Action


    An `Action` is a simple object, which may or may not carry information, and which
    is sent by the `View` to change the `State` of the application. These actions
    can be caused by various reasons, such as touching a button or receiving the response
    of a call to an external server.


    #### View


    It is what the user sees and is responsible for representing the `State` of the
    application. It is subscribed to changes in the `State`, so it is updated every
    time the `State` changes.


    #### Middleware


    `Middleware`s are the components that are responsible for the use of dependencies
    in the application: database access, calls to servers… since `Reducer`s are pure
    functions that do not use dependencies. When an action is launched, it passes
    through the `Middleware`s along with the application state and, if necessary,
    they can launch a new action asynchronously.


    ## Advantages and Disadvantages


    Like any architecture, Redux has advantages and disadvantages.


    ### Advantages


    Using Redux in our projects has some advantages:


    - Redux is very lightweight, and there is no need to use external libraries.

    - The fact of having a single state favors its debugging.

    - In applications we can save the current state locally, which allows us, for
    example, to return to that state when restarting the application.

    - Since the `Reducer` is made up of pure functions, the business logic is easier
    to test.

    - By separating the business logic (`Reducer`s) from the dependencies (`Middleware`s),
    we reduce the number of mocks in the test.

    - It has a good separation of responsibilities.


    ### Disadvantages


    These are some of its disadvantages:


    - As the application grows, since every time an `Action` is passed the entire
    `State` is re-created, the system memory consumption will increase.

    - Being such a specific architecture, when we use it in a project, it is practically
    impossible to transform the project into a different architecture.

    - Although it is a well-known architecture in the web world, it is not so well
    known in iOS development, so it can be complicated for novice developers.

    - The fact that `Middleware`s can launch new `Action`s asynchronously can lead
    to, if there are a large number of `Middleware`s, contradictory actions, infinite
    loops… that make the system unstable.

    - It is a fairly rigid architecture that allows few variations.


    ## TCA: The Composable Architecture


    ### A Little History


    The Composable Architecture (TCA) was developed by Brandon Williams and Stephen
    Celis of Point-Free.^([^(20)](#fn20))


    This architecture was born to solve some of the problems that we find when developing
    our applications:


    - Manage the state of applications in a simple way, and share it between different
    screens so that any change in state in one of them can be observed by another.

    - To be able to divide large functionalities into multiple much smaller and isolated
    functionalities, but with the characteristic of being able to unite them (compose
    them) and form a whole again.

    - Facilitate the testing of the application, not only at the level of unit tests
    but also of integration tests and end-to-end tests.

    - You may easily get all of this by using a library that offers an API to implement
    each component.'
