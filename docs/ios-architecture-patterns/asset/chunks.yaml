    \ PresenterToInteractorAddTaskProtocol? { get set }\n    var router: PresenterToRouterAddTaskProtocol?\
    \ { get set }\n    func addTask(task: TaskModel)\n}\n\n// MARK: View Output\n\
    protocol PresenterToViewAddTaskProtocol {}\n// 清单 5-40\n// ViewToPresenterAddTaskProtocol\
    \ 和 ViewToPresenterAddTaskProtocol 代码\n```\n\n`PresenterToInteractorAddTaskProtocol`（将由`AddTaskInteractor`实现）提供了一个单一的函数`addTask`，正如稍后我们将看到的，该函数将告诉数据库（通过`TaskService`）添加一个新任务，然后告诉\
    \ Presenter 任务已添加（清单 5-41）。\n\n```swift\n// MARK: Interactor Input\nprotocol PresenterToInteractorAddTaskProtocol\
    \ {\n    var presenter: InteractorToPresenterAddTaskProtocol? { get set }\n  \
    \  func addTask(task: TaskModel)\n}\n// 清单 5-41\n// PresenterToInteractorAddTaskProtocol\
    \ 代码\n```\n\n最后，我们将拥有`InteractorToPresenterAddTaskProtocol`（将由`AddTaskPresenter`实现），其唯一的方法是`addedTask`，通过它我们将告诉`AddTaskPresenter`任务已添加（清单\
    \ 5-42）。\n\n```swift\n// MARK: Interactor Output\nprotocol InteractorToPresenterAddTaskProtocol\
    \ {\n    func addedTask()\n}\n// 清单 5-42\n// InteractorToPresenterAddTaskProtocol\
    \ 代码\n```\n\n##### `AddTaskRouter`\n\n正如我们在前面的模块中已经看到的，`AddTaskRouter`必须实现`PresenterToRouterAddTaskProtocol`协议，因此也要实现组成该协议的方法：`createScreenFor`和`dismissFrom`（清单\
