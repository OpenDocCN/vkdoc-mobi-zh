    \ Xcode 模板之一来简化和自动化 VIPER 中这些重复代码的创建）。\n\n在下一章中，我们将看到一种遵循 Clean Code 原则的新架构：VIP（View–Interactor–Presenter）。这种架构已经开始拥有相当多的追随者，它试图解决\
    \ VIPER 架构中出现的一些情况：例如，它通过使组件之间的流成为单向来简化流程，而在 VIPER 中则是双向的。\n\n脚注 1\n\n# 6. VIP:\
    \ View–Interactor–Presenter\n\n## 什么是 VIP？\n\n### 一点历史\n\n大约在 2015 年，Raymond Law\
    \ 创建了所谓的 Clean Swift^(¹²) 或 VIP（View–Interactor–Presenter）架构，其思想是将 Clean Architecture（如我们在第一章\
    \ 1 中所见）应用于 iOS 和 macOS 项目。\n\n这种架构的范式是 VIP 循环中发生的单向流，即信息始终沿一个方向流动：从 View 到 Interactor，从\
    \ Interactor 到 Presenter，再从 Presenter 到 View。\n\n### 工作原理\n\n正如我们刚刚解释的，该架构的核心在于\
    \ View、Interactor 和 Presenter 之间的单向循环。然而，此架构的应用通常需要其他组件的存在（尽管取决于每个屏幕的复杂性，某些组件可能存在也可能不存在）：Router、Model\
    \ 和 Worker。图 6-1 显示了组件之间的连接方式。\n\n![](img/531999_1_En_6_Fig1_HTML.png)\n\n*一个视图交互器展示器模式的框图，流程从视图到路由器和交互器，再与展示器连接，然后进一步流向工作器和模型。*\n\
    \n**图 6-1. VIP 模式**\n\n### VIP 中的组件\n\n现在，我们将详细了解此架构中的各个组件。\n\n**注意**\n\n随着我们深入学习\
    \ VIP 架构，我们会发现生成的类、重复代码和通信协议的数量都很大。如果你在互联网上搜索，会找到许多模板示例，尽管它们都指代 VIP 架构，但由于是针对不同项目进行的适配，其命名、功能等方面可能存在一些差异。\n"
- fmt: '# View (UIViewController)


    We can consider that the View (+`UIViewController`) is where each VIP cycle begins
    and ends (it passes information and events to the Interactor and receives the
    response from the Presenter):


    - The `UIViewController` manages the scene and maintains a strong reference to
    the View.

    - Each `UIViewController` has strong references to the Interactor and the Router.

    - Events that occur in the View are passed to the Interactor.

    - The View receives the data from the Presenter since the `UIViewController` must
    conform to the protocol used by the Presenter to send the information.


    For example, it shows the initial code that could present the ViewController and
    the View of a scene (the *Home* screen of our app) (Listing [6-1](#531999_1_En_6_Chapter.xhtml#PC1)
    and Listing [6-2](#531999_1_En_6_Chapter.xhtml#PC2)).


    ```swift

    import UIKit

    protocol HomeViewDelegate: AnyObject {}

    final class HomeView: UIView {

    var delegate: HomeSceneViewDelegate?

    }

    ```


    *Listing 6-2: The View defines the protocol which connects to the ViewController*


    ```swift

    import UIKit

    protocol HomeViewControllerInput: AnyObject {}

    protocol HomeViewControllerOutput: AnyObject {}

    final class HomeViewController: UIViewController {

    var interactor: HomeInteractorInput?

    var router: HomeRoutingDelegate?

    }

    extension HomeViewController: HomeViewControllerInput {}

    extension HomeViewController: HomeViewDelegate {}

    ```


    *Listing 6-1: The ViewController class contains the Input protocol and references
    to the Interactor, the Router, and the View*


    # Interactor


    The Interactor is in charge of managing the View requests, obtaining the necessary
    data (whether from the Database or the Network), and passing it to the Presenter:


    - The Interactor contains the business logic of each scene.

    - Depending on the requests from the View, the Interactor connects with one or
    more Workers/Services (which, as we shall see, are in charge of obtaining the
    data).

    - The Interactor maintains a strong reference to the Presenter.

    - The Interactor must conform to the protocol that the View uses to send events.


    In Listing [6-3](#531999_1_En_6_Chapter.xhtml#PC3), you can see the base code
    with which we would start working on our `HomeInteractor`.


    ```swift

    import Foundation

    protocol HomeInteractorOutput: AnyObject {}

    typealias HomeInteractorInput = HomeInteractorOutput

    final class HomeInteractor {

    var presenter: HomePresenterInput?

    }

    ```


    *Listing 6-3: The Interactor class defines its output protocol*


    # Presenter


    The function of the Presenter (Listing [6-4](#531999_1_En_6_Chapter.xhtml#PC4))
    is to take the information it receives from the Interactor and transform it into
    information that can be represented by the View (i.e., we transform the information
    into a ViewModel):


    - The Presenter contains the presentation logic.

    - It has a weak reference to the View (which acts as an output of the Presenter).

    - The Presenter transforms the results of the Interactor into objects renderable
    by the View.


    ```swift

    import UIKit

    typealias HomePresenterInput = HomeInteractorOutput

    typealias HomePresenterOutput = HomeViewControllerInput

    final class HomePresenter {

    weak var viewController: HomePresenterOutput?

    }

    extension HomePresenter: HomePresenterInput {}

    ```


    *Listing 6-4: In the Presenter code, we “rename” the `HomeInteractorOutput` and
    `HomeViewControllerInput` to a “Presenter” nomenclature*


    # Router


    The Router is the component in charge of navigating between ViewControllers and
    passing information between them (Listing [6-5](#531999_1_En_6_Chapter.xhtml#PC5)):


    - The Router contains the navigation logic (which causes us to remove it from
    the ViewController).

    - It maintains a weak reference to the View (ViewController).

    - This is an optional component, as a scene’s ViewController may not have navigation
    options.


    ```swift

    protocol HomeRouterDelegate {}

    final class HomeRouter {

    weak var source: UIViewController?

    }

    extension HomeRouter: HomeRouterDelegate {}

    ```


    *Listing 6-5: `HomeSceneRouterLogic` structure code*


    # Worker/Service


    A Worker/Service is an abstract class that deals, basically, with database information
    retrieval operations, API requests, and file downloads:


    - Each Worker/Service should have a single function (single-responsibility principle).

    - An Interactor can call one or more Workers/Services.

    - They must be generic so that they can be used by different Interactors.


    # Model


    In the VIP cycle, information flows in one direction: from the View to the Interactor
    (in the form of a Request), from the Interactor to the Presenter (as a Response),
    and back to the View (as a ViewModel). Therefore, the use of a Model related to
    the scene and containing (Listing [6-6](#531999_1_En_6_Chapter.xhtml#PC6)) is
    very established:


    - **Request model**: Contains the parameters to allow the Interactor to perform
    the operations.

    - **Response model**: Contains the appropriate data obtained by the Workers and
    to be passed to the Presenter.

    - **ViewModel model**: They are usually primitive-type data, which is passed to
    the View to update it.


    ```swift

    enum HomeModel {

    enum Fetch {

    struct Request {}

    struct Response {}

    struct ViewModel {}

    }

    }

    ```


    *Listing 6-6: Model code structure for the VIP cycle*


    # Configurator


    It is an optional component, but it is often used a lot since it allows us to
    initialize the components of a scene and establish the relationships between them
    (Listing [6-7](#531999_1_En_6_Chapter.xhtml#PC7)):


    ```swift

    import UIKit

    final class HomeConfigurator {

    func configured(_ viewController: HomeViewController) -> HomeViewController {

    let interactor = HomeInteractor()

    let presenter = HomePresenter()

    let router = HomeRouter()

    router.viewController = viewController

    presenter.viewController = viewController

    interactor.presenter = presenter

    viewController.interactor = interactor

    viewController.router = router

    return viewController

    }

    }

    ```


    *Listing 6-7: `HomeConfigurator` class code*


    > Note: As you have seen in the VIPER architecture, here we also have used a protocol
    nomenclature based on Input/Output terminology to facilitate its recognition and
    use.


    # Advantages and Disadvantages of VIP


    When developing a project, the VIP architecture has many advantages due to the
    fact that it seeks a “Clean Architecture,” but it also has some disadvantages.


    ## Advantages


    The main advantages of VIP architecture are as follows:


    - It is based on the principles of Clean Architecture.

    - It reduces the size of ViewControllers by passing all logic to Interactors.

    - It presents a unidirectional flow of data.

    - It is a modular and reusable architecture since the use of numerous protocols
    allows changes to a single component without affecting the rest of the application.

    - The application of the Single-Responsibility principle reduces the size of the
    methods used, which is also a point in favor of modularity.

    - Its structure allows easy maintenance and any error can be easily corrected.

    - The implementation of unit tests is simple, which facilitates the development
    through TDD (test-driven development) and the testability of the application.


    ## Disadvantages


    The VIP architecture also has disadvantages, such as follows:


    - This architecture is based on a large number of protocols, which can be confusing
    at first (this can be reduced by using templates).

    - The use of so many protocols makes it necessary to write a large amount of code,
    even for the simplest tasks.

    - This large amount of code makes it unsuitable for small applications.

    - It may appear as if it has excessive design or complexity.

    - Because of all this, it can be unappealing to developers just starting out.'
