- fmt: '# AddListRouter


    As we have seen, the `AddListRouter` class will be quite simple, since it has
    a protocol with a single method (`navigateBack`), which is the one that will implement
    the return navigation from the `AddList` scene to the `Home` scene (Listing [6-35](#531999_1_En_6_Chapter.xhtml#PC35)).


    ```

    protocol AddListRouterDelegate {

    func navigateBack()

    }

    final class AddListRouter {

    weak var viewController: UIViewController?

    }

    extension AddListRouter: AddListRouterDelegate {

    func navigateBack() {

    viewController?.navigationController?.popViewController(animated: true)

    }

    }

    Listing 6-35

    AddListRouterDelegate protocol definition and implementation in AddListRouter

    ```


    ## TaskList Scene


    The `TaskList` scene is the most complex from the protocol point of view since
    different actions have to be managed: show the tasks in a list, delete them, update
    them, present the add tasks screen, and navigate back to `Home`.


    Also, keep in mind that we have to inform the `Home`, through the `HomeInteractor`’s
    `selectedListDelegate`, that with each change of a task, the list of tasks in
    the `Home` scene must be updated. In Figure [6-5](#531999_1_En_6_Chapter.xhtml#Fig5),
    you can see the different components of the `TaskList` scene and the communications
    between them.


    ![](images/531999_1_En_6_Chapter/531999_1_En_6_Fig5_HTML.png)


    An illustration of the task list scene components that are router, configurator,
    view, interactor, presenter, task list, task list service, and home interactor.


    Figure 6-5


    TaskList scene components and communication schema


    ### TaskListConfigurator


    The `TaskListConfigurator` is similar to the ones we have seen so far; it instantiates
    the different elements of the scene and relates them to each other.


    Perhaps, it is worth mentioning the instantiation of the `TaskListInteractor`,
    since at this point we will have to pass it the list of tasks that we have selected
    in the `Home`, instances of the `TaskService` and the `TaskListService` for the
    interaction with the database, and the delegate that allows it to connect with
    the `HomeInteractor` to tell it to update the `Home` when there is any change
    in the tasks (Listing [6-36](#531999_1_En_6_Chapter.xhtml#PC36)).


    ```

    final class TaskListConfigurator {

    static func configure( _ viewController: TaskListViewController, delegate: SelectedListDelegate,
    tasksList: TasksListModel) -> TaskListViewController {

    let interactor = TaskListInteractor(tasksList: tasksList, taskService: TaskService(),

    tasksListService: TasksListService(),

    delegate: delegate)

    let presenter = TaskListPresenter()

    let router = TaskListRouter()

    router.viewController = viewController

    presenter.viewController = viewController

    interactor.presenter = presenter

    viewController.interactor = interactor

    viewController.router = router

    return viewController

    }

    }

    Listing 6-36

    TaskListConfigurator code

    ```


    ### TaskListView


    The `TaskListView` class is quite similar to the `HomeView` since it presents
    a table with the tasks in a list, it has a button that presents the screen for
    adding new tasks, tasks can be deleted…


    And, in the same way, as in the rest of the Views, it presents a protocol (`TaskListViewDelegate`)
    that allows communicating the user’s interactions to the `TaskListViewController`,
    which will be in charge of implementing the methods of the said delegate (Listing
    [6-37](#531999_1_En_6_Chapter.xhtml#PC37)).


    ```

    import UIKit

    protocol TaskListViewDelegate: AnyObject {

    func navigateBack()

    func addTask()

    func deleteTaskAt(indexPath: IndexPath)

    func updateTask(_ task: TaskModel)

    }

    Listing 6-37

    TaskListViewDelegate protocol definition

    ```


    The tasks that the table must show are passed directly from the `TaskListViewController`
    through the `show(tasks:_)` method, as shown in Listing [6-38](#531999_1_En_6_Chapter.xhtml#PC38).


    ```

    final class TaskListView: UIView {

    weak var delegate: TaskListViewDelegate?

    ...

    func show(tasks: [TaskModel]) {

    self.tasks = tasks

    tableView.reloadData()

    emptyState.isHidden = tasks.count > 0

    }

    }

    Listing 6-38

    Tasks to show are passed through the show(tasks:_) method

    ```


    Finally, in Listing [6-39](#531999_1_En_6_Chapter.xhtml#PC39), we show the different
    points of the code in which, through the delegate, we pass the user interactions
    to the `TaskListViewController`.


    ```

    private extension TaskListView {

    ...

    @objc func backAction() {

    delegate?.navigateBack()

    }

    ...

    @objc func addTaskAction() {

    delegate?.addTask()

    }

    ...

    }

    extension TaskListView: UITableViewDelegate, UITableViewDataSource {

    ...

    func tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,
    forRowAt indexPath: IndexPath) {

    if editingStyle == .delete {

    delegate?.deleteTaskAt(indexPath: indexPath)

    }

    }

    }

    extension TaskListView: TaskCellDelegate {

    func updateTask(_ task: TaskModel) {

    delegate?.updateTask(task)

    }

    }

    Listing 6-39

    Calling the protocol methods from the View

    ```'
