  raw: '##### HomeModel


    As we have been seeing in the code of the different components of the *Home* scene,
    we have done the passing of information in the form of *Request*, *Response*,
    and *ViewModel* through the *HomeModel*, which contains an enum for each use or
    request: thus, we have one for the request of the task lists to the database (*enum
    FetchTasksLists*), another to call the scene that allows us to add a new list
    (*enum AddTasksList*), and another to call the scene that shows the tasks of a
    list (*enum SelectTasksList*).


    In addition, each of these enums contains, as we discussed at the beginning of
    the chapter, three structs: *Request* (for requests from the ViewController to
    the Interactor), *Response* (to pass the responses from the Interactor to the
    Presenter), and *ViewModel* (to pass the data from the Presenter to the ViewController)
    (Listing [6-20](#531999_1_En_6_Chapter.xhtml#PC20)).


    ```

    enum HomeModel {

    enum FetchTasksLists {

    struct Request {}

    struct Response {

    let tasksLists: [TasksListModel]

    }

    struct ViewModel {

    let tasksLists: [TasksListModel]

    }

    }

    enum AddTasksList {

    struct Request {}

    struct Response {

    let addListDelegate: AddListDelegate

    }

    struct ViewModel {

    let addListDelegate: AddListDelegate

    }

    }

    enum SelectTasksList {

    struct Request {

    let index: IndexPath

    }

    struct Response {

    let selectedListDelegate: SelectedListDelegate

    let tasksList: TasksListModel

    }

    struct ViewModel {

    let selectedListDelegate: SelectedListDelegate

    let tasksList: TasksListModel

    }

    }

    enum RemoveTasksList {

    struct Request {

    let index: IndexPath

    }

    struct Response {

    let list: TasksListModel

    }

    }

    }

    Listing 6-20

    HomeModel code

    ```


    ##### HomeRouter


    The *HomeRouter* contains the methods that allow you to navigate from the *Home*
    to the screen that allows you to add new lists (*AddList* scene) or to the screen
    that allows you to view the tasks in a list (*TasksList* scene). Both methods
    are defined in the *HomeRouterDelegate* protocol (Listing [6-21](#531999_1_En_6_Chapter.xhtml#PC21)).


    ```

    protocol HomeRouterDelegate {

    func showAddListView(delegate: AddListDelegate)

    func showSelectedList(delegate: SelectedListDelegate, list: TasksListModel)

    }

    Listing 6-21

    Definition of HomeRouterDelegate protocol

    ```


    When navigating to a new scene, we must first create the corresponding ViewController,
    and then we will configure it through its Configurator (Listing [6-22](#531999_1_En_6_Chapter.xhtml#PC22)).


    ```

    extension HomeRouter: HomeRouterDelegate {

    func showAddListView(delegate: AddListDelegate) {

    let addListViewController = AddListViewController(addListView: AddListView())

    viewController?.navigationController?.pushViewController(AddListConfigurator.configure(addListViewController,
    delegate: delegate), animated: true)

    }

    func showSelectedList(delegate: SelectedListDelegate, list: TasksListModel) {

    let taskListController = TaskListViewController(taskListView: TaskListView())

    viewController?.navigationController?.pushViewController(TaskListConfigurator.configure(taskListController,
    delegate: delegate, tasksList: list), animated: true)

    }

    }

    Listing 6-22

    Conformation of HomeRouter to HomeRouterDelegate protocol

    ```


    In this way, to navigate to the *AddList* scene, we instantiate the *AddListViewController*
    and then configure it through the *AddListConfigurator* (to which we will pass
    both the *AddListViewController* instance and the *AddListDelegate* delegate as
    parameters).


    In the case of navigating to the *TasksListDelegate* scene, we’ll instantiate
    the *TaskListViewController* and then configure it with the *TaskListConfigurator*,
    to which we’ll also pass the list whose tasks we want to display as the *SelectedListDelegate*.


    Note


    Remember that both delegates are what will allow us to communicate to the *Home*
    scene that it should update its view when adding or updating a list.


    #### AddList Scene


    This screen is the one that allows us to add new task lists. In Figure [6-4](#531999_1_En_6_Chapter.xhtml#Fig4),
    you can see the components that form it and the connections between them.


    ![](images/531999_1_En_6_Chapter/531999_1_En_6_Fig4_HTML.jpg)


    An illustration of the add list scene components that are configurator, router,
    view, interactor, presenter, and tasks list service.


    Figure 6-4


    AddList scene components and communication schema


    ##### AddListConfigurator


    The *AddListConfigurator* is in charge of taking the instance of the *AddListViewController*
    that we pass to it from *HomeRouter* (as we have just seen) and configuring it,
    creating the different components that make up this scene and establishing the
    different relations between them (Listing [6-23](#531999_1_En_6_Chapter.xhtml#PC23)).


    ```

    final class AddListConfigurator {

    static func configure( _ viewController: AddListViewController, delegate: AddListDelegate)
    -> AddListViewController  {

    let interactor = AddListInteractor(tasksListService: TasksListService(), delegate:
    delegate)

    let presenter = AddListPresenter()

    let router = AddListRouter()

    router.viewController = viewController

    presenter.viewController = viewController

    interactor.presenter = presenter

    viewController.interactor = interactor

    viewController.router = router

    return viewController

    }

    }

    Listing 6-23

    AddListConfigurator code

    ```


    As you can see, when instantiating the *AddListInteractor* we pass it an instance
    of the *TasksListService*, since it will be the one that allows us to add new
    task lists to the database.


    ##### AddListView


    The *AddListView* contains the graphic elements with which the user interacts
    to add a new task list or to go back to Home without having added any list. In
    both cases, the user’s actions will be communicated to the *AddListViewController*
    by implementing the *AddListViewDelegate* protocol (Listing [6-24](#531999_1_En_6_Chapter.xhtml#PC24)).


    ```

    protocol AddListViewDelegate: AnyObject {

    func navigateBack()

    func addListWith(title: String, icon: String)

    }

    final class AddListView: UIView {

    weak var delegate: AddListViewDelegate?

    ...

    }

    private extension AddListView {

    ...

    @objc func backAction() {

    delegate?.navigateBack()

    }

    ...

    @objc func addListAction() {

    guard titleTextfield.hasText else { return }

    delegate?.addListWith(title: titleTextfield.text!, icon: icon)

    }

    ...

    }

    Listing 6-24

    AddListView class code showing AddListViewDelegate protocol and where their methods
    are called

    ```'
