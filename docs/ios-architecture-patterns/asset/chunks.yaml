    Listing 2-5\nTaskServiceProtocol and TaskService structure and methods\n\n###\
    \ Extensions\n\nIn this case, we have created a `UIColor` extension to be able\
    \ to easily access the colors created especially for this application, which are\
    \ found in the `Assets` file.\n\nWe will also add an extension to the `NSManagedObject`\
    \ class that will prevent us from conflicting with the contexts when we do the\
    \ testing part.\n\n### Constants\n\nThey contain the constant parameters that\
    \ we will use in the application. In this case, it is a list with the names of\
    \ the icons that the user can choose when creating tasks and task lists.\n\n###\
    \ View\n\nThis layer contains all those elements that the user can see and that\
    \ make up the graphical interface and those with which the user can interact (Figure\
    \ [2-6](#531999_1_En_2_Chapter.xhtml#Fig6)).\n\nThese views can be simple, like\
    \ a button or a label, or complex like the entire view of a page that contains\
    \ buttons, labels, images, etc.\n\nIn the case of simple views, they are usually\
    \ graphic elements that are reused throughout the application, such as a button,\
    \ for example.\n\nThe most complex views are formed by the composition of simpler\
    \ views. Since we are not working with `storyboards` or `xib` files, we will define\
    \ the characteristics of each component, such as its position or size, using constraints.\n\
    \n![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig6_HTML.jpg)\n\nA screenshot\
    \ represents the files under the sub-folders of the folder view which is also\
