    在第二个协议`InteractorToPresenterTaskListProtocol`中，我们拥有将在展示器中实现的方法，这些方法将允许我们访问数据库以从列表中获取任务，或与路由器通信以使其不展示添加任务界面（列表\
    \ 5-32）。\n\n```\n// MARK: Interactor Output\nprotocol InteractorToPresenterTaskListProtocol\
