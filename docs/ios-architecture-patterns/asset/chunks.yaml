- fmt: '# `AddListView`


    As we have seen in previous chapters, `AddListView` has the following elements
    that the user can interact with and that we must link to the `AddListViewModel`:
    a `UITextField` element, two `UIButton` elements (one to add the list and another
    to go back), and an `IconSelector`.


    We are now going to see how we perform the Data Binding with the `AddListViewModel`
    for each of these elements in the `bindViewToModel` method.


    The `titleTextField` element is where we will enter the title of the list. We
    have to remember that to create a task this field cannot be empty; otherwise,
    the `addListButton` button will be disabled.


    Therefore, we must bind the content of `titleTextField` both to the `addListButton`
    button to enable it (`addListButton.rx.isEnabled`) and to the title input in the
    `AddListViewModel` (`input.title`) (Listing [4-18](#531999_1_En_4_Chapter.xhtml#PC21)).


    ```

    titleTextfield

    .rx.text

    .map({ !($0?.isEmpty)! })

    .bind(to: addListButton.rx.isEnabled)

    .disposed(by: disposeBag)

    titleTextfield.rx.text

    .map({ $0! })

    .bind(to: viewModel.input.title )

    .disposed(by: disposeBag)

    Listing 4-18

    Binding of the content of titleTextField to the state of addListButton

    ```


    With `rx.text`, we access the content of the `UITextField`; then through `map`,
    we evaluate whether or not it is empty and we pass the state to the `isEnabled`
    parameter of the `addListButton` (so that if it is empty, `isEnabled` is `false`,
    and if it contains text, `isEnabled` is `true`).


    Next, we configure the behavior of the `addListButton` and `backButton` buttons
    in front of the `tap` event (Listing [4-19](#531999_1_En_4_Chapter.xhtml#PC22)).


    ```

    addListButton.rx.tap

    .bind(to: viewModel.input.addList)

    .disposed(by: disposeBag)

    backButton.rx.tap

    .bind(to: viewModel.input.dismiss)

    .disposed(by: disposeBag)

    viewModel.output.dismiss

    .drive(onNext: { [self] _ in

    delegate?.navigateBack()

    })

    .disposed(by: disposeBag

    Listing 4-19

    Bind addListButton and backButton to their corresponding tap events

    ```


    The function of `addListButton` is to tell the `AddListViewModel` to save the
    new task list to the database (and then report that it’s already added, so we’re
    back on the `Home` screen). We communicate this to the `input.addList` parameter.


    The `backButton`’s function is to return to the `HomeScreen`, such as when finishing
    adding a new task list. For this reason, instead of associating a direct call
    to the `delegate.navigateBack` method, we will create an Output in the ViewModel
    that fulfills that call function (`output.dismiss`) and an Input that allows it
    to be called (`input.dismiss`).


    For the case of the `iconSelectorView`, we will modify the `IconSelectorView`
    component to work with RxSwift instead of using the delegate pattern. To do this,
    what we do is eliminate the protocol of this component (which we use in the MVC
    and MVP architectures) and introduce a new variable of type `BehaviorRelay`, which
    will emit the name of the selected icon.


    ```

    var selectedIcon = BehaviorRelay(value: "checkmark.seal.fill")

    ```


    We will also modify the method by which when selecting one of the icons, its name
    was sent through the delegate. We simply pass that value to the created variable
    for it to pass:


    ```

    func collectionView(_ collectionView: UICollectionView, didSelectItemAt indexPath:
    IndexPath) {

    selectedIcon.accept(Constants.icons[indexPath.item])

    }

    ```


    Now we can bind the `iconSelectorView` to the `AddListViewModel` to pass the icon
    name to it as an input (`input.icon`) (Listing [4-20](#531999_1_En_4_Chapter.xhtml#PC25)):


    ```

    iconSelectorView.selectedIcon

    .bind(to: viewModel.input.icon)

    .disposed(by: disposeBag)

    Listing 4-20

    Binding of the name of the selected icon with the AddListViewModel

    ```


    Finally, we will bind to the `addedList` method of the `AddListViewModel`, so
    that when this method is executed, the application navigates back to the `Home`.


    ## `AddListViewModel`


    The `AddListModel` class is pretty straightforward. What is done in this class
    when instantiating it is to pass a reference to the `TaskListService` (as a protocol)
    so that it can interact with the Model, and in addition, we initialize a `TaskListModel`
    object.


    Following the Input/Output convention, we set the input and output parameters
    of the `AddListViewModel`.


    Definition of Input and Output for the `AddListViewModel`.


    ```

    class AddListViewModel {

    var output: Output!

    var input: Input!

    struct Input {

    let icon: PublishRelay

    let title: PublishRelay

    let addList: PublishRelay

    let dismiss: PublishRelay

    }

    struct Output {

    let dismiss: Driver

    }

    ...

    }

    ```


    Now we only have to set the behavior of these parameters in the initialization
    of the `AddListViewModel` (Listing [4-21](#531999_1_En_4_Chapter.xhtml#PC27)).


    ```

    class AddListViewModel {

    ...

    private var tasksListService: TasksListServiceProtocol!

    private(set) var list: TasksListModel!

    private let dismiss = BehaviorRelay(value: ())

    init(tasksListService: TasksListServiceProtocol) {

    self.tasksListService = tasksListService

    self.list = TasksListModel(id: ProcessInfo().globallyUniqueString, icon: "checkmark.seal.fill",

    createdAt: Date())

    // Inputs

    let icon = PublishRelay()

    _ = icon.subscribe(onNext: { [self] newIcon in

    list.icon = newIcon

    })

    let title = PublishRelay()

    _ = title.subscribe(onNext: { [self] newTitle in

    list.title = newTitle

    })

    let addList = PublishRelay()

    _ = addList.subscribe(onNext: { [self] _ in

    tasksListService.saveTasksList(list)

    dismiss.accept(())

    })

    let dismissView = PublishRelay()

    _ = dismissView.subscribe(onNext: { [self] _ in

    dismiss.accept(())

    })

    input = Input(icon: icon, title: title, addList: addList, dismiss: dismissView)

    // Outputs

    let backNavigation = dismiss.asDriver()

    output = Output(dismiss: backNavigation)

    ...

    }

    }

    Listing 4-21

    Establishment of the behavior of the parameters associated with the inputs and
    outputs

    ```


    The `input.icon` and `input.title` parameters will receive the corresponding values
    for the selected icon and the entered title.


    For the `input.addList` parameter, it will execute the method that adds the new
    list to the database and then call the `dismiss` method (which we’ve seen is bound
    to the delegate’s `navigateBack` method on the `AddListView`).


    The `dismiss` method will be the same method that we call via the `input.dismiss`
    parameter (which we have bound to the `backButton` in the `AddListView`).


    ## Tasks List Screen


    This screen is responsible for displaying the tasks that make up a list, marking
    them as done, deleting them, and adding new ones. The communication between its
    components is shown in Figure [4-13](#531999_1_En_4_Chapter.xhtml#Fig13).


    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig13_HTML.png)


    A block diagram illustrates the flow of communication from the task list view
    model to the task list view controller through the task list view, from bottom
    to top. It indicates the communication of the task list view model with the task
    list service and task service at the bottom and the navigations of the task list
    view controller with the home view and the add task view controllers at the top.


    Figure 4-13


    Tasks list screen components communication schema'
