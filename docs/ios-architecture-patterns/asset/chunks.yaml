    ## Summary


    We can consider the MVP architecture as an evolution of the MVC architecture.
    What we have done is pass the business logic from the Controller to the Presenter.
    The Presenter will also receive the user’s interactions from the View and will
    act accordingly.


    We have seen some of the advantages that the use of the MVP architecture presents,
    such as a better separation of responsibilities is obtained than in the case of
    the MVC and the business logic can be better tested in the Presenter.


    However, it is also necessary to take into account some of the problems that it
    can present, such as the fact that more code is required in development (and somewhat
    more complex than in MVC) or that, in the same way as with the Controller in the
    MVC, the Presenter can become massive by adding more responsibilities.


    In the next chapter, we will see an architecture similar to MVP: MVVM, or Model–View–ViewModel.
    We will see how the view is linked to the model (for which we will use reactive
    functional programming with the `RxSwift` library), and, finally, we will make
    a variation of the MVVM with the addition of a Coordinate that manages the navigation
    between screens (MVVM-C).


    Footnotes [1](#531999_1_En_3_Chapter.xhtml#Fn1_source)


    # 4. MVVM: Model–View–ViewModel


    ## What Is MVVM?


    ### A Little History


    The MVVM architecture was developed by Ken Cooper and Ted Peters of Microsoft
    (and later announced by John Gossman on his blog in 2005), to simplify event-driven
    programming (in which events drive program flow) of web interfaces.^([⁶](#fn6))


    ### How It Works


    The MVVM architecture is an evolution of the MVP architecture, in which the Presenter
    layer is replaced by the ViewModel layer. In addition, it solves some of the problems
    presented by the MVP architecture. The main one is the coupling that exists in
    the MVP architecture between the View and the Presenter. In the case of the MVVM
    architecture, the ViewModel has no references to the view, that is, there is no
    coupling (Figure [4-1](#531999_1_En_4_Chapter.xhtml#Fig1)).


    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig1_HTML.png)


    A block diagram represents 3 blocks labeled view model, view, and model. The view
    and view model connect with each other through data binding. The view model notifies
    the model and receives updates from it.


    Figure 4-1


    Model–View–ViewModel schema


    ### Components in MVVM


    We are now going to see in more detail the characteristics of these three components
    in the MVVM pattern.


    #### Model


    In the same way as in the MVC or MVP patterns, the Model is the component (or
    components) in charge of the business logic and of storing, manipulating, and
    accessing the application data:


    - It contains classes related to data persistence.

    - It contains the classes that control the communications of the application.

    - It is responsible for transforming the information it receives from the outside
    into model objects.

    - It contains extensions, constants…

    - The Model layer can only communicate with the ViewModel layer (i.e., the Model
    is unaware of the existence of a View).


    #### View


    The View layer contains both the `UIView` components and the `UIViewController`
    elements (which we keep in separate files, as we have seen in previous chapters):


    - The View is responsible for showing the user updated information at all times
    (which comes from the ViewModel).

    - The View does not contain any logic.

    - The View can have multiple references to the ViewModel.


    The Controller only has coordination/routing functions, handling navigation between
    screens and, if necessary, passing information through a Delegation pattern. At
    the end of this chapter, we will see how we can pass all this coordination/routing
    to a new class, a Coordinator, giving rise to the MVVM-C architecture.'
