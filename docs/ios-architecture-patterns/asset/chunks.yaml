  raw: '### MyToDos Application Screens


    As we have just seen, the core of the MVVM architecture is the ViewModel, which
    is in charge of maintaining the state of the View and modifying it every time
    that state changes (thanks to the Data Binding).


    Although the MVVM architecture is similar to the MVP architecture (which we have
    already seen in Chapter [3](#531999_1_En_3_Chapter.xhtml)), where the ViewModel
    would have similar functions to the Presenter, MVVM solves the coupling problem
    between the View and Presenter of the MVP (in which the View has a reference to
    the Presenter and vice versa): in the MVVM this coupling does not exist thanks
    to the use of Data Binding.


    Therefore, we are going to focus on how to program the ViewModel and the View
    (along with the Controller) and the binding between them.


    #### AppDelegate and SceneDelegate


    In our MVVM project, *AppDelegate* and *SceneDelegate* present the same code as
    in the case of the MVP, in which we add an instance of the *HomeViewController*
    to the *UINavigationController* component, without passing the dependencies to
    the *TasksListService* and *TaskService* services since these dependencies will
    be established in the *HomeViewModel* component (Listing [4-4](#531999_1_En_4_Chapter.xhtml#PC6)).


    ```

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:
    UIScene.ConnectionOptions) {

    if let windowScene = scene as? UIWindowScene {

    let window = UIWindow(windowScene: windowScene)

    let navigationController = UINavigationController(rootViewController: HomeViewController())

    navigationController.navigationBar.isHidden = true

    navigationController.interactivePopGestureRecognizer?.isEnabled = false

    window.backgroundColor = .white

    window.rootViewController = navigationController

    self.window = window

    window.makeKeyAndVisible()

    }

    }

    Listing 4-4

    SceneDelegate changes to load HomeViewController

    ```


    #### Home Screen


    On the Home screen, the main component is the *HomeViewModel*, which is bound
    to the *HomeView* (Data Binding) (Figure [4-11](#531999_1_En_4_Chapter.xhtml#Fig11)).


    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig11_HTML.png)


    A block diagram illustrates the flow of communication from the task list service
    to the home view controller through the home view model and home view, from bottom
    to top. It denotes the navigations between the home view controller, the add list
    view, and the task list view controllers at the top.


    Figure 4-11


    Home screen components communication schema


    ##### HomeViewController


    The Controller for this screen is similar to the one we saw in the MVP model:
    now it is in charge of instantiating the *HomeViewModel* and passing it to the
    View (Listing [4-5](#531999_1_En_4_Chapter.xhtml#PC7)).


    ```

    class HomeViewController: UIViewController {

    private var homeView: HomeView!

    ...

    override func loadView() {

    super.loadView()

    setupHomeView()

    }

    private func setupHomeView() {

    let viewModel = HomeViewModel(tasksListService: TasksListService())

    homeView = HomeView(viewModel: viewModel)

    homeView.delegate = self

    self.view = homeView

    }

    }

    Listing 4-5

    HomeViewModel instantiation in HomeViewController

    ```


    On the other hand, the *HomeViewController* also handles the routing between screens
    (in *HomeView*, the user can select to access a list or create a new one, and
    this delegates the navigation to the *HomeViewController*), as shown in Listing
    [4-6](#531999_1_En_4_Chapter.xhtml#PC8).


    ```

    extension HomeViewController: HomeViewControllerDelegate {

    func addList() {

    navigationController?.pushViewController(AddListViewController(), animated: true)

    }

    func selectedList(_ list: TasksListModel) {

    let taskViewController = TaskListViewController(tasksListModel: list)

    navigationController?.pushViewController(taskViewController, animated: true)

    }

    }

    Listing 4-6

    Implementation of the methods of the HomeViewControllerDelegate

    ```


    At the end of this chapter, we will see how to remove this navigation part of
    the *UIViewController* by using a Coordinator.'
  trans: "\n# MyToDos 应用界面\n\n正如我们刚刚看到的，MVVM 架构的核心是 `ViewModel`，它负责维护 `View` 的状态，并在每次状态发生变化时对其进行修改（得益于数据绑定）。\n\
    \n虽然 MVVM 架构与 MVP 架构（我们在第三章 3 中已经介绍过）类似，其中 `ViewModel` 的功能与 `Presenter` 类似，但 MVVM\
    \ 解决了 MVP 中 `View` 与 `Presenter` 之间的耦合问题（在 MVP 中，`View` 持有 `Presenter` 的引用，反之亦然）：在\
    \ MVVM 中，由于使用了数据绑定，这种耦合不复存在。\n\n因此，我们将重点介绍如何编写 `ViewModel` 和 `View`（以及 `Controller`），以及它们之间的绑定。\n\
    \n## AppDelegate 和 SceneDelegate\n\n在我们的 MVVM 项目中，`AppDelegate` 和 `SceneDelegate`\
    \ 展示的代码与 MVP 案例中的相同，我们将 `HomeViewController` 的一个实例添加到 `UINavigationController`\
    \ 组件中，但没有传递对 `TasksListService` 和 `TaskService` 服务的依赖，因为这些依赖将在 `HomeViewModel`\
    \ 组件中建立（列表 4-4）。\n\n```swift\nfunc scene(_ scene: UIScene, willConnectTo session:\
    \ UISceneSession, options connectionOptions: UIScene.ConnectionOptions) {\n  \
    \  if let windowScene = scene as? UIWindowScene {\n        let window = UIWindow(windowScene:\
    \ windowScene)\n        let navigationController = UINavigationController(rootViewController:\
    \ HomeViewController())\n        navigationController.navigationBar.isHidden =\
    \ true\n        navigationController.interactivePopGestureRecognizer?.isEnabled\
    \ = false\n        window.backgroundColor = .white\n        window.rootViewController\
    \ = navigationController\n        self.window = window\n        window.makeKeyAndVisible()\n\
    \    }\n}\n```\n\n*列表 4-4*  \n`SceneDelegate` 为加载 `HomeViewController` 所做的更改\n\
    \n## 主屏幕\n\n在“主”屏幕上，主要组件是 `HomeViewModel`，它与 `HomeView` 绑定在一起（数据绑定）（图 4-11）。\n\
    \n![](img/531999_1_En_4_Fig11_HTML.png)\n\n一张框图从下到上说明了从任务列表服务到主视图控制器，再通过主视图模型和主视图的通信流程。它标明了主视图控制器、添加列表视图和任务列表视图控制器之间的导航路径。\n\
    \n*图 4-11*  \n主屏幕组件通信示意图\n\n### HomeViewController\n\n该屏幕的 `Controller` 与我们之前在\
    \ MVP 模型中看到的类似：现在它负责实例化 `HomeViewModel` 并将其传递给 `View`（列表 4-5）。\n\n```swift\nclass\
    \ HomeViewController: UIViewController {\n    private var homeView: HomeView!\n\
    \    ...\n    override func loadView() {\n        super.loadView()\n        setupHomeView()\n\
    \    }\n\n    private func setupHomeView() {\n        let viewModel = HomeViewModel(tasksListService:\
    \ TasksListService())\n        homeView = HomeView(viewModel: viewModel)\n   \
    \     homeView.delegate = self\n        self.view = homeView\n    }\n}\n```\n\n\
    *列表 4-5*  \n在 `HomeViewController` 中实例化 `HomeViewModel`\n\n另一方面，`HomeViewController`\
    \ 还处理屏幕之间的路由（在 `HomeView` 中，用户可以选择访问某个列表或创建一个新列表，并将导航委托给 `HomeViewController`），如列表\
    \ 4-6 所示。\n\n```swift\nextension HomeViewController: HomeViewControllerDelegate\
    \ {\n    func addList() {\n        navigationController?.pushViewController(AddListViewController(),\
    \ animated: true)\n    }\n\n    func selectedList(_ list: TasksListModel) {\n\
    \        let taskViewController = TaskListViewController(tasksListModel: list)\n\
    \        navigationController?.pushViewController(taskViewController, animated:\
    \ true)\n    }\n}\n```\n\n*列表 4-6*  \n`HomeViewControllerDelegate` 方法的实现\n\n在本章末尾，我们将了解如何通过使用\
    \ `Coordinator` 来移除 `UIViewController` 中的这一导航部分。\n"
- fmt: "### HomeView\n\n`HomeView` changes quite a bit concerning the one we saw in\
    \ the MVC or the MVP, not from the point of view of the components that form it,\
    \ but from the point of view of how they are aware of the changes in the state\
    \ of the `ViewModel` through Data Binding.\n\nThe fact of using a library like\
    \ `RxSwift` allows us to easily link each of the components of the view (and its\
    \ properties) to the model.\n\nTo establish all the links between the `ViewModel`\
    \ and the components of the View, we will create a method that groups them (Listing\
    \ [4-7](#531999_1_En_4_Chapter.xhtml#PC9)).\n\n```swift\nclass HomeView: UIView\
    \ {\n    ...\n    private let viewModel: HomeViewModel!\n    private let disposeBag\
    \ = DisposeBag()\n    init(frame: CGRect = .zero, viewModel: HomeViewModel) {\n\
    \        self.viewModel = viewModel\n        ...\n        bindViewToModel(viewModel)\n\
    \    }\n}\nprivate extension HomeView {\n    ...\n    func bindViewToModel(_ viewModel:\
    \ HomeViewModel) {\n        ...\n    }\n}\n```\n\n*Listing 4-7 Setting ViewModel\
    \ in HomeView*\n\nWe are now going to see what is the code we will introduce in\
    \ this method, and that will allow us to link the components of the View with\
    \ the `ViewModel`.\n\nWe start with the `UITableView` component, which is the\
    \ one that shows us which lists of tasks we have created.\n\nFirst, we set the\
    \ table’s delegate (for the `UITableViewDelegate` protocol) and which we will\
    \ only use to set the height of the row (Listing [4-8](#531999_1_En_4_Chapter.xhtml#PC10)).\n\
    \n```swift\ntableView.rx\n    .setDelegate(self)\n    .disposed(by: disposeBag)\n\
    ```\n\n*Listing 4-8 Setting tableView delegate with RxSwift*\n\nNext, we need\
    \ to pass information about the number of sections, rows, and items that make\
    \ up the table to the table.\n\nFrom the point of view of the Input/Output convention\
    \ that we are going to use, the task lists will be an output of the `ViewModel`\
    \ (`output.lists`). Linking this data to the `UITableView` element is done through\
    \ the statement `tableView.rx.items(cellIdentifier: ...)` (Listing [4-9](#531999_1_En_4_Chapter.xhtml#PC11)).\n\
    \n```swift\nviewModel.output.lists\n    .drive(tableView.rx.items(cellIdentifier:\
    \ ToDoListCell.reuseId, cellType: ToDoListCell.self)) { (_, list, cell) in\n \
    \       cell.setCellParametersForList(list)\n    }\n    .disposed(by: disposeBag)\n\
    ```\n\n*Listing 4-9 Binding tasks lists data to tableView*\n\nNext, we set the\
    \ instruction that allows us to subscribe to the user’s cell selection action.\
    \ This is done via the `input.selectRow` parameter. Every time the user selects\
    \ a cell, the `IndexPath` information of the selected cell is sent to the `ViewModel`\
    \ (Listing [4-10](#531999_1_En_4_Chapter.xhtml#PC12)).\n\nWhen we select a table\
    \ cell and pass the corresponding `IndexPath` value to the `ViewModel`, it will\
    \ take care of selecting the corresponding `TaskListModel` object and will emit\
    \ it as output. Therefore, we must bind this output (`output.selectedList`) from\
    \ the View.\n\n```swift\ntableView.rx.itemSelected\n    .bind(to: viewModel.input.selectRow)\n\
    \    .disposed(by: disposeBag)\n\nviewModel.output.selectedList\n    .drive(onNext:\
    \ { [self] list in\n        delegate?.selectedList(list)\n    })\n    .disposed(by:\
    \ disposeBag)\n```\n\n*Listing 4-10 Subscription to the itemSelected event*\n\n\
    The last instruction related to the `UITableView` component is to delete a cell\
    \ (Listing [4-11](#531999_1_En_4_Chapter.xhtml#PC13)). Every time the user makes\
    \ the gesture to delete a cell, the ViewModel will be asked to delete it in the\
    \ Model. This event of deleting a list will correspond to an input of the `ViewModel`\
    \ (`input.deleteRow`).\n\n```swift\ntableView.rx.itemDeleted\n    .bind(to: viewModel.input.deleteRow)\n\
    \    .disposed(by: disposeBag)\n```\n\n*Listing 4-11 Subscription to the itemDeleted\
    \ event*\n\nOnce we have finished binding the `UITableView` component, we move\
    \ on to binding the `EmptyState` component and the `AddListButton` component.\n\
    \nIn the first case, what we want is to hide or show the `EmptyState` depending\
    \ on whether or not there are task lists created. The ViewModel must communicate\
    \ to the View if it should show the `EmptyState` or not, so this information will\
    \ be an output (`output.hideEmptyState`), as shown in Listing [4-12](#531999_1_En_4_Chapter.xhtml#PC14).\n\
    \n```swift\nviewModel.output.hideEmptyState\n    .drive(emptyState.rx.isHidden)\n\
    \    .disposed(by: disposeBag)\n```\n\n*Listing 4-12 Binding output.hideEmptyState\
    \ property of the ViewModel to the EmptyState’s isHidden property*\n\nWhen in\
    \ the ViewModel `hideEmptyState` takes a false value, the `EmptyState` will be\
    \ visible, while if it takes a true value, it will be hidden.\n\nRegarding the\
    \ `AddListButton`, while in MVC or MVP, we assigned a target that called a method\
    \ that we had created, with `RxSwift` we simply assigned the code to be executed\
    \ to the `tap` method (Listing [4-13](#531999_1_En_4_Chapter.xhtml#PC15)).\n\n\
    ```swift\naddListButton.rx.tap\n    .asDriver()\n    .drive(onNext: { [self] in\n\
    \        delegate?.addList()\n    })\n    .disposed(by: disposeBag)\n```\n\n*Listing\
    \ 4-13 Setting tap event for AddListButton*\n\nAt the end of the `bindToViewModel`\
    \ method, what we do is make a call to reload the table which, as we will see\
    \ now in the ViewModel, calls the database to obtain the created task lists.\n\
    \n```swift\nviewModel.input.reload.accept(())\n```\n\nAs we have commented in\
    \ the introduction to RxSwift, we are not going to delve into the possibilities\
    \ offered by this library (which are many). We simply show how to use some of\
    \ them in our example project."
