  raw: '##### AddListRouter


    The *AddListRouter* adopts the *PresenterToRouterAddListProtocol* protocol, so
    it must implement its two methods: create the *AddList* module using the *createScreen*
    method and navigate back to the *Home* screen (when required), going back in the
    navigation stack using the *popToHomeFrom* method (Listing [5-24](#531999_1_En_5_Chapter.xhtml#PC26)).


    ```

    class AddListRouter: PresenterToRouterAddListProtocol {

    static func createScreen() -> UIViewController {

    let presenter: ViewToPresenterAddListProtocol & InteractorToPresenterAddListProtocol
    = AddListPresenter()

    let viewController = AddListViewController()

    viewController.presenter = presenter

    viewController.presenter.router = AddListRouter()

    viewController.presenter?.view = viewController

    viewController.presenter?.interactor = AddListInteractor(tasksListService: TasksListService())

    viewController.presenter?.interactor?.presenter = presenter

    return viewController

    }

    func popToHomeFrom(view: PresenterToViewAddListProtocol) {

    let viewController = view as! AddListViewController

    viewController.navigationController?.popViewController(animated: true)

    }

    }

    Listing 5-24

    AddListRouter must adopt the PresenterToRouterAddListProtocol and implement its
    methods

    ```


    ##### AddListViewController


    As we have seen when commenting on the different protocols used in this module,
    the *AddListViewController* does not need to implement the *PresenterToViewAddListProtocol*
    (which is empty, and which we have left to maintain the structure of the different
    protocols that are implemented in each module).


    The only relationship with the Presenter will be through the variable created
    and that will allow us to call the *backAction* and *addList* functions of the
    Presenter (Listing [5-25](#531999_1_En_5_Chapter.xhtml#PC27)).


    ```

    class AddListViewController: UIViewController, PresenterToViewAddListProtocol
    {

    ...

    var presenter: ViewToPresenterAddListProtocol!

    ...

    }

    extension AddListViewController {

    ...

    @objc func backAction() {

    presenter.backAction()

    }

    ...

    @objc func addListAction() {

    guard titleTextfield.hasText else { return }

    listModel.title = titleTextfield.text

    listModel.id = ProcessInfo().globallyUniqueString

    listModel.icon = listModel.icon ?? "checkmark.seal.fill"

    listModel.createdAt = Date()

    presenter.addList(taskList: listModel)

    }

    ...

    }

    ...

    Listing 5-25

    AddListViewController implementation

    ```


    ##### AddListPresenter


    In the *AddListPresenter*, we have two basic functions. The first is to tell the
    Interactor that it should add a new task list to the database (*interactor?.addList*),
    and the other function is to tell the Router that the app should return to the
    Home screen (*router?.popToHomeFrom*) once a list is added or when the back button
    is selected (Listing [5-26](#531999_1_En_5_Chapter.xhtml#PC28)).


    ```

    class AddListPresenter: ViewToPresenterAddListProtocol {

    var view: PresenterToViewAddListProtocol?

    var interactor: PresenterToInteractorAddListProtocol?

    var router: PresenterToRouterAddListProtocol?

    func addList(taskList: TasksListModel) {

    interactor?.addList(taskList: taskList)

    }

    func backAction() {

    router?.popToHomeFrom(view: view!)

    }

    }

    extension AddListPresenter: InteractorToPresenterAddListProtocol {

    func addedList() {

    router?.popToHomeFrom(view: view!)

    }

    }

    Listing 5-26

    AddListPresenter implementation, conforming to ViewToPresenterAddListProtocol
    and InteractorToPresenterAddListProtocol

    ```


    ##### AddListInteractor


    The code for the *AddListInteractor* is quite simple since you only need to implement
    the single method of the *PresenterToInteractorAddListProtocol* (*addList*) protocol.
    In this method, you first tell the database to add a new task list (via the *TasksListService*)
    and then tell the Presenter that the list has already been added (which will cause
    the Presenter to tell the Router that returns to *Home*) (Listing [5-27](#531999_1_En_5_Chapter.xhtml#PC29)).


    ```

    class AddListInteractor: PresenterToInteractorAddListProtocol {

    var presenter: InteractorToPresenterAddListProtocol?

    var tasksListService: TasksListServiceProtocol!

    init(tasksListService: TasksListServiceProtocol) {

    self.tasksListService = tasksListService

    }

    func addList(taskList: TasksListModel) {

    tasksListService.saveTasksList(taskList)

    presenter?.addedList()

    }

    }

    Listing 5-27

    PresenterToInteractorAddListProtocol implementation, conforming to PresenterToInteractorAddListProtocol

    ```


    #### Task List Module


    This screen is responsible for displaying the tasks that make up a list, marking
    them as done, deleting them, and adding new ones. The communication between these
    components according to the VIPER architecture is shown in Figure [5-5](#531999_1_En_5_Chapter.xhtml#Fig5).


    ![](images/531999_1_En_5_Chapter/531999_1_En_5_Fig5_HTML.png)


    A flowchart of task list module consists of task list view controller, task list
    presenter, task list interactor, task list router, and home view controller.


    Figure 5-5


    Task list module components communication schema'
