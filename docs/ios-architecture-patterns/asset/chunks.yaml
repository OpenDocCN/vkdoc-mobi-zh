    ## Summary


    The Model–View–Controller architecture is perhaps the most used and the first
    one that is usually used when starting to develop applications since it is the
    simplest.


    MVC has a clear separation of responsibilities (Model, View, and Controller),
    although many times the View is very tied to the Controller, which reduces its
    usability. This makes it more difficult to test the Controller without the View
    intervening.


    On the other hand, you have to be careful not to overload the controller since,
    being the central part of the MVC, responsibilities are usually added to it as
    part of the business logic, navigation to other screens, the view itself, and
    its components.


    In the example of the application that we have worked on, being a fairly simple
    application, the controllers are small but think about what could happen if we
    start adding additional functionality. For this reason, it is better to take some
    actions that help us reduce its size (some of which we have already applied):


    *   Move the View code to its own class, with a reference in the Controller itself.


    *   Pass everything related to the data to the model (such as obtaining and processing
    data, or its ordering).


    *   Manage navigation between screens through Coordinators.


    From now on, we will see more elaborate architectures that seek to solve the problems
    that MVC may present, and in which some of the solutions that will be shown could
    be transferred to this architecture.


    Footnotes [1](#531999_1_En_2_Chapter.xhtml#Fn1_source)   [2](#531999_1_En_2_Chapter.xhtml#Fn2_source)


    # 3. MVP: Model–View–Presenter


    ## What Is MVP?


    ### A Little History


    The Model–View–Presenter pattern derives from the Model–View–Controller pattern
    that we have seen in the previous chapter. It was developed in the early 1990s,
    at the software company Taligent (which was owned by Apple, IBM, and Hewlett-Packard).^([⁵](#fn5))


    ### How It Works


    The MVP pattern is made up of three components: Model, View, and Presenter, where
    the Presenter acts as an intermediary between the Model and the View (UIViewController
    + View), connected as shown in Figure [3-1](#531999_1_En_3_Chapter.xhtml#Fig1).


    ![](images/531999_1_En_3_Chapter/531999_1_En_3_Fig1_HTML.jpg)


    A schema consists of presenter, view, and model. They connect via user actions,
    updates, and notifications.


    Figure 3-1


    Model–View–Presenter schema


    ### Components in MVP


    We are now going to see in more detail the characteristics of these three components
    in the MVP pattern.


    #### Model


    In the same way as in the MVC pattern, the Model is the component (or components)
    in charge of the business logic and of storing, manipulating, and accessing the
    application data:


    *   It contains classes related to data persistence.


    *   It contains the classes that control the communications of the application.


    *   It is responsible for transforming the information it receives from the outside
    into model objects.


    *   It contains extensions, constants…


    *   In MVP, the Model layer can only communicate with the Presenter layer (i.e.,
    the Model is unaware of the existence of a View).


    So, for example, when the user interacts with the View, this interaction is transmitted
    to the Model through the Presenter. In the same way, if the Model is updated and
    the View needs to be updated, the Presenter will be in charge of updating it.


    #### View


    In the MVP model, the View layer contains both the View (*UIView*) and the Controller
    (*UIViewController*) components, unlike the MVC pattern, where we put them on
    different layers.


    Also, in the MVP pattern, both the View and the Controller store much less logic
    than in the MVC model, which makes them lighter.


    Now, the Controller only has coordination/routing functions, handling navigation
    between screens and, if necessary, passing information via a Delegation pattern.


    In MVP, the Controller is in charge of instantiating the View and passing it to
    the Presenter (Listing [3-1](#531999_1_En_3_Chapter.xhtml#PC1)).


    ```

    class ExampleController: UIViewController {

    private var exampleView = ExampleView()

    ...

    override func loadView() {

    super.loadView()

    setupExampleView()

    }

    private func setupExampleView() {

    let presenter = ExamplePresenter(exampleView: ExampleView)

    exampleView.presenter = presenter

    exampleView.setupView()

    self.view = exampleView

    }

    }

    Listing 3-1

    Presenter and View instantiation; passing View to the Presenter

    ```


    #### Presenter


    The Presenter is in charge of receiving the events that occur in the View and
    passing them to the Model. On the other hand, the Presenter is also in charge
    of updating the View when the data changes.


    For further decoupling, rather than passing the View to the Presenter, we will
    create a protocol with the methods that the Presenter will execute to update the
    View (Listing [3-2](#531999_1_En_3_Chapter.xhtml#PC2)).


    ```

    protocol ExampleViewDelegate: AnyObject {

    func updateView()

    }

    class ExamplePresenter {

    private weak var exampleView: ExampleViewDelegate?

    init(exampleView: ExampleViewDelegate? = nil) {

    self.exampleView = exampleView

    }

    ...

    }

    Listing 3-2

    Passing View to the Presenter in the init method

    ```


    ### Advantages and Disadvantages of the MVP


    The MVP model is somewhat more complex than the MVC model as a new element comes
    into play, the Presenter, and therefore requires a little more experience.


    In the following, you can see what are the most important advantages and disadvantages
    of this architecture.'
