  raw: '##### HomeController


    Regarding the MVC architecture, in the MVP architecture, the *HomeController*
    has lost its relationship with the Model layer. Now, it is in charge, on the one
    hand, of instantiating the *HomeView* and passing it to the *HomePresenter* (which,
    as we have seen, we will pass as a protocol with the methods it must use) (Listing
    [3-4](#531999_1_En_3_Chapter.xhtml#PC5)).


    ```

    class HomeViewController: UIViewController {

    private var homeView = HomeView()

    ...

    override func loadView() {

    super.loadView()

    setupHomeView()

    }

    private func setupHomeView() {

    let presenter = HomePresenter(homeView: homeView, tasksListService: TasksListService())

    homeView.delegate = self

    homeView.presenter = presenter

    homeView.setupView()

    self.view = homeView

    }

    }

    Listing 3-4

    HomePresenter instantiation in HomeViewController

    ```


    On the other hand, *HomeViewController* also takes care of the routing between
    screens (in the *HomeView*, the user can select to access a list or create a new
    one, and this delegates the navigation to the *HomeViewController*), as shown
    in Listing [3-5](#531999_1_En_3_Chapter.xhtml#PC6).


    ```

    extension HomeViewController: HomeViewControllerDelegate {

    func addList() {

    navigationController?.pushViewController(AddListViewController(), animated: true)

    }

    func selectedList(_ list: TasksListModel) {

    let taskViewController = TaskListViewController(tasksListModel: list)

    navigationController?.pushViewController(taskViewController, animated: true)

    }

    }

    Listing 3-5

    Implementation of the methods of the HomeViewControllerDelegate

    ```


    ##### HomeView


    Now the *HomeView* receives from the *HomePresenter* the information it should
    display. This is seen when filling the table with the task lists that are created
    or the *HomeViewDelegate* implementation (Listing [3-6](#531999_1_En_3_Chapter.xhtml#PC7)).


    ```

    extension HomeView: UITableViewDataSource {

    ...

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    return presenter.numberOfTaskLists

    }

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: ToDoListCell.reuseId,
    for: indexPath) as! ToDoListCell

    cell.setCellParametersForList(presenter.listAtIndex(indexPath.row))

    return cell

    }

    func tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,
    forRowAt indexPath: IndexPath) {

    if editingStyle == .delete {

    presenter.removeListAtIndex(indexPath.row)

    tableView.deleteRows(at: [indexPath], with: .automatic)

    }

    }

    }

    extension HomeView: HomeViewDelegate {

    func reloadData() {

    tableView.reloadData()

    emptyState.isHidden = presenter.numberOfTaskLists > 0

    }

    }

    Listing 3-6

    Setup of the tasks lists table in the HomeView

    ```


    On the other hand, it delegates to the Controller those actions that require navigation
    within the application, such as when selecting and accessing a list of tasks or
    creating a new one (Listing [3-7](#531999_1_En_3_Chapter.xhtml#PC8)).


    ```

    extension HomeView: UITableViewDelegate {

    ...

    func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)
    {

    delegate?.selectedList(presenter.listAtIndex(indexPath.row))

    }

    }

    private extension HomeView {

    ...

    @objc func addListAction() {

    delegate?.addList()

    }

    ...

    }

    Listing 3-7

    HomeView delegates navigation methods to HomeViewController

    ```


    ##### HomePresenter


    The Presenter is in charge of acting as an intermediary between the View and the
    Model. For this reason, in the initialization of the *HomePresenter*, we pass
    references to both the View (*HomeView*, in protocol form) and the Model (*TaskListService*).
    Access to the Model through the *TaskListService* will allow us both to retrieve
    the information that we want to show (task lists) and to delete those lists that
    we select.


    To know when there was a change in the database and, thus, update the view, we
    also introduce an observer in the initialization of the *HomePresenter*, as shown
    in Listing [3-8](#531999_1_En_3_Chapter.xhtml#PC9).


    ```

    class HomePresenter {

    private weak var homeView: HomeViewDelegate?

    private var tasksListService: TasksListService!

    private var lists: [TasksListModel] = [TasksListModel]()

    init(homeView: HomeViewDelegate? = nil,

    tasksListService: TasksListService) {

    self.homeView = homeView

    self.tasksListService = tasksListService

    NotificationCenter.default.addObserver(self,

    selector: #selector(contextObjectsDidChange),

    name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,

    object: CoreDataManager.shared.mainContext)

    }

    @objc func contextObjectsDidChange() {

    fetchTasksLists()

    }

    func fetchTasksLists() {

    lists = tasksListService.fetchLists()

    homeView?.reloadData()

    }

    var numberOfTaskLists: Int {

    return lists.count

    }

    func listAtIndex(_ index: Int) -> TasksListModel {

    return lists[index]

    }

    ...

    }

    Listing 3-8

    HomePresenter initialization

    ```


    When the observer receives a notification that the database has changed, the *contextObjectsDidChange*
    event is fired (which calls the *fetchTasksLists* event), with which the information
    that the *HomePresenter* has about the task lists to be displayed is updated,
    to then call to the *reloadData* method of the *HomeView*.


    If the user wants to delete a task list, the *HomeView* will pass the action to
    the *HomePresenter* and this will be in charge of communicating it to the Model
    (Listing [3-9](#531999_1_En_3_Chapter.xhtml#PC10)).


    ```

    class HomePresenter {

    ...

    func removeListAtIndex(_ index: Int) {

    let list = listAtIndex(index)

    tasksListService.deleteList(list)

    lists.remove(at: index)

    }

    }

    Listing 3-9

    HomePresenter communicates with Model to delete lists

    ```'
