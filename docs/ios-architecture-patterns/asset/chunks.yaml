  trans: "\n# 如何创建数据库和实体\n\n为此，我们首先要创建数据库模型及其实体：\n\n![](img/531999_1_En_1_Fig20_HTML.png)\n\
    \n从核心数据创建数据模型的窗口。点击下一步后，将其保存为 `ToDoList`，然后选择创建选项。\n\n**图 1-20** 创建数据模型文件\n\n\
    ![](img/531999_1_En_1_Fig19_HTML.png)\n\n为新文件选择模板的窗口。其中高亮显示了 iOS 标签页下核心数据中的数据模型。底部的三个选项分别为取消、上一步和下一步。\n\
    \n**图 1-19** 选择数据模型文件模板\n\n- 在 Xcode 的主菜单中，我们选择 *文件* ➤ *新建* ➤ *文件…*。在弹出的模板菜单中，向下滚动到\
    \ *Core Data* 部分，并选择 *Data Model*（图 1-19）。\n- 接下来，我们给文件命名（此处为 `ToDoList`）并创建它（图\
    \ 1-20）。\n\n![](img/531999_1_En_1_Fig22_HTML.png)\n\n在核心数据中创建任务实体的窗口。\n\n**图 1-22**\
    \ 创建 Task 实体\n\n![](img/531999_1_En_1_Fig21_HTML.png)\n\n从核心数据创建任务列表并添加两个带属性的实体的窗口。\n\
    \n**图 1-21** 创建 TasksList 实体\n\n- 现在我们要创建将在应用程序中使用的实体，即 `TasksList` 和 `Task`。为此，我们选择\
    \ `ToDoList.xcdatamodeld` 文件，并添加上述两个实体，其属性如图 1-21 和图 1-22 所示。\n- 通过创建这些实体，我们也在它们之间建立了\
    \ 1 对 *n* 的关系。也就是说，一个列表可以关联多个任务，但一个任务只能关联一个列表。\n\n创建实体后，我们可以使用 Xcode 生成管理这些实体的代码（作为\
    \ `NSManagedObject` 子类）。为此，我们选择 `ToDoList.xcdatamodeld` 文件，然后在 Xcode 主菜单中选择 *编辑器*\
    \ ➤ *创建 NSManagedObject 子类…*（图 1-23）。\n\n![](img/531999_1_En_1_Fig23_HTML.png)\n\
    \n在核心数据中创建 NSManagedObject 子类的窗口。\n\n**图 1-23** 为我们的实体创建 NSManagedObject 子类\n\n\
    这样，就会生成四个文件（每个实体对应两个文件）：\n\n```\nTask+CoreDataClass.swift\nTask+CoreDataProperties.swift\n\
    TasksList+CoreDataClass.swift\nTasksList+CoreDataProperties.swift\n```\n\n生成这些文件后，我们现在可以在项目中使用这些实体了。\n\
    \n## 创建 CoreDataManager\n\n现在，我们只需创建我们的类（`CoreDataManager.swift`）来管理应用程序的 Core\
    \ Data 栈。如以下代码所示，该类允许我们访问主上下文并能够保存它：\n\n```swift\nimport Foundation\nimport CoreData\n\
    \nclass CoreDataManager {\n    static let shared = CoreDataManager()\n    \n \
    \   init() {}\n    \n    lazy var persistentContainer: NSPersistentContainer =\
    \ {\n        let container = NSPersistentContainer(name: \"ToDoList\")\n     \
    \   container.loadPersistentStores { _, error in\n            if let error = error\
    \ {\n                fatalError(\"无法加载持久存储: \\(error)\")\n            }\n    \
    \    }\n        return container\n    }()\n    \n    lazy var mainContext: NSManagedObjectContext\
    \ = {\n        return persistentContainer.viewContext\n    }()\n    \n    func\
    \ saveContext() {\n        saveContext(mainContext)\n    }\n    \n    func saveContext(_\
    \ context: NSManagedObjectContext) {\n        if context.parent == mainContext\
    \ {\n            saveDerivedContext(context)\n            return\n        }\n\
    \        \n        context.perform {\n            do {\n                try context.save()\n\
    \            } catch let error as NSError {\n                fatalError(\"错误:\
    \ \\(error.localizedDescription)\")\n            }\n        }\n    }\n    \n \
    \   func saveDerivedContext(_ context: NSManagedObjectContext) {\n        context.perform\
    \ { [self] in\n            do {\n                try context.save()\n        \
    \    } catch let error as NSError {\n                fatalError(\"错误: \\(error.localizedDescription)\"\
    )\n            }\n            saveContext(mainContext)\n        }\n    }\n}\n\
    ```\n\n## 总结\n\n对于本章，我们来总结一下所涉及的内容，可以将其分为两个部分：\n\n- 第一部分，我们重点讨论了如何高效地构建和搭建一个应用程序，因此我们研究了：\n\
    \    - 什么是软件架构、什么是架构模式，以及在开发应用程序时使用它们的好处\n    - 什么是 Clean Architecture 及其使用的优势\n\
    - 在本章的第二部分，我们重点讨论了将用于实践不同架构模式的示例应用程序：\n    - 我们了解了应用程序的总体描述、构成它的不同屏幕及其功能。\n  \
    \  - 我们了解了如何开发一个无需 storyboard 即可运行的应用程序。\n    - 我们使用 Core Data 创建了一个数据库，创建了用于存储数据的实体，最后，我们建立了一个类来处理\
    \ Core Data 的栈。\n\n脚注 1 2\n\n# 2. MVC：模型-视图-控制器\n\n## 什么是 MVC？\n\n### 一点历史\n\n\
    模型-视图-控制器（MVC）模式由 Trygve Reenskaug 于 20 世纪 70 年代末为 Smalltalk-76 编程语言引入。正如 Reenskaug\
    \ 所写：[`https://folk.uio.no/trygver/`](https://folk.uio.no/trygver/)。\n\n> 我创建模型-视图-控制器模式，是作为解决一个普遍问题的明显方案，即让用户从多个角度控制他们的信息。\n\
    \n在这个初始版本中，用户通过视图进行交互，视图将操作发送给控制器，控制器进而更新模型（数据）并重绘视图。模型在更新时通知视图，并接收视图的新状态（图 2-1）。\n\
    \n![](img/531999_1_En_2_Fig1_HTML.png)\n\n一个框图展示了三个分别标记为视图、控制器和模型的区块。它说明了用户操作与控制器和视图之间的渲染通信。视图与模型之间通过通知和获取状态更新进行交互，以及控制器对模型的更新。\n\
    \n**图 2-1** 原始的模型-视图-控制器示意图\n"
- fmt: '### Apple Model–View–Controller


    Currently, the `MVC` pattern used is an updated version adapted to current software
    and devices. It is one of the best-known and used patterns today in the development
    of mobile applications, as well as the one recommended by Apple for such development
    (Figure [2-2](#531999_1_En_2_Chapter.xhtml#Fig2)).


    ![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig2_HTML.png)


    A block diagram represents 3 blocks labeled view, controller, and model. It indicates
    the output from the controller to view and model, whereas both view and model
    provide input to the controller in the form of user action and updates, respectively.


    Figure 2-2


    Apple Model–View–Controller schema


    As in the development of mobile applications it is usual to reuse components,
    such as views, the original `MVC` pattern was modified so that the Model and the
    View are not linked.


    With this new scheme, the View receives the user’s actions and communicates them
    to the Controller. This, if necessary, updates the Model (data) and, once done,
    updates the View.


    In its documentation,^([³](#fn3)) Apple indicates that `MVC` is based on three
    design patterns (which we already saw in Chapter [1](#531999_1_En_1_Chapter.xhtml)
    in a generic way):


    - **Composite**: Views are made up of other views following a tree-like structure.
    For example, imagine a view that was made up of more views (buttons, labels, images…).

    - **Strategy**: Controllers can manage one or more views (which have no internal
    logic and are therefore reusable), and these delegate to Controllers how they
    should be displayed.

    - **Observer**: A Controller that needs to know when the state of the application
    (i.e., the data in the Model) changes must be subscribed to these changes.


    ## Components in MVC


    We have just seen that there are three components in this architecture: View,
    Model, and Controller. Let us study each component’s functions in more detail.


    ### Model


    The Model is the component (or components) that holds the business logic and is
    in charge of accessing, manipulating, or storing the data of the application.


    - It contains classes related to data persistence, for example, through the use
    of databases (`Core Data`, `SQLite`, `Realm`…) or the use of user preferences
    (`UserDefaults`).

    - It contains the classes that manage the application’s communications (`Networking`)
    and that allow us to receive and send data.

    - It contains the classes that parse the information received from outside the
    application and convert it into model objects.

    - It contains extensions, constants, and helper classes.

    - A model object can communicate with other model objects.

    - The Model must not communicate directly with the View. The communication between
    the Model and the View is done through the Controller.


    ### View


    The View is made up of those components that the user can see:


    - They are the classes that derive from the `UIKit`, `AppKit`, `Core Animation`,
    and `Core Graphics` libraries.

    - They show the data that comes from the Model, although they are not directly
    connected to it (they do it through the Controller).

    - These components can receive user interactions.


    ### Controller


    The Controller acts as an intermediary between the Model and the View:


    - It is the main component of the `MVC` model and communicates with both the View
    and the Model.

    - It receives and interprets the actions that the user performs on the View and
    updates the Model accordingly.

    - If the data in the Model changes, it updates the View according to these changes.

    - It takes care of the life cycle of the application.


    ## Advantages and Disadvantages of MVC


    The `MVC` architecture pattern is the one recommended by Apple for application
    development; it is the first one that is usually learned and the most commonly
    used. Using the Model–View–Controller architecture has advantages and disadvantages.


    ### Advantages of the MVC Pattern


    The use of the `MVC` pattern has some advantages:


    - Its design is simple.

    - It uses less code compared to other architecture patterns.

    - It presents a clear separation of responsibilities; each component has clearly
    defined responsibilities.

    - It allows you to develop simple applications in a short time.


    ### Disadvantages of the MVC Pattern


    The main disadvantage of the `MVC` pattern is located in the Controller for several
    reasons:


    ![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig3_HTML.jpg)


    A block diagram represents 2 adjacent blocks labeled controller and view, having
    communication between them. There is another block labeled model that receives
    updates and sends notifications to the set of 2 blocks on the left.


    Figure 2-3


    Coupling between View and Controller


    - The Controller is very coupled to the View and the Model, so it is not very
    reusable.

    - The Controller derives from the `UIViewController` class, where the View is
    closely tied to the Controller. This means that the separation of responsibilities
    is usually lost, giving rise to a scheme such as the following (Figure [2-3](#531999_1_En_2_Chapter.xhtml#Fig3)).


    Having this coupling between View and Controller, it becomes more complicated
    to test the Controller independently without the intervention of the View.


    - There is a great tendency to “overload” the Controller, adding a series of responsibilities
    that do not correspond to it, such as part of the business logic, the delegates
    and the data sources of tables and collections, navigation, etc. This results
    in what is known as a “Massive View Controller.”


    To solve this problem, we can take some actions, such as moving the view code
    to other classes, separating the navigation between view controllers to a coordinator,
    or passing the `UITableViewControllers` or `UICollectionView` delegates and data
    sources out of the view controllers.


    ## MVC Application


    Once we have seen the characteristics of the `MVC` architecture, we are going
    to apply it in the development of our application.


    Note


    The entire project can be downloaded from the repository of this book. During
    the explanation of the implementation of the `MVC` architecture in our project,
    we will only show the most relevant parts of the code.


    ### MVC Layers


    To continue with the logic of the applied architecture pattern (Model–View–Controller),
    we will create a folder structure that simulates the layers of this architecture
    (Figure [2-4](#531999_1_En_2_Chapter.xhtml#Fig4)).


    ![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig4_HTML.jpg)


    A screenshot highlights a set of folders and files under the primary folder named
    M V C, my to dos. It represents the files named App delegate, scene delegate,
    assets, launch screen, info, and to-do list under the sub-folder controller.


    Figure 2-4


    MVC project folder structure'
  raw: '### Apple Model–View–Controller


    Currently, the MVC pattern used is an updated version adapted to current software
    and devices. It is one of the best-known and used patterns today in the development
    of mobile applications, as well as the one recommended by Apple for such development
    (Figure [2-2](#531999_1_En_2_Chapter.xhtml#Fig2)).


    ![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig2_HTML.png)


    A block diagram represents 3 blocks labeled view, controller, and model. It indicates
    the output from the controller to view and model, whereas both view and model
    provide input to the controller in the form of user action and updates, respectively.


    Figure 2-2


    Apple Model–View–Controller schema


    As in the development of mobile applications it is usual to reuse components,
    such as views, the original MVC pattern was modified so that the Model and the
    View are not linked.


    With this new scheme, the View receives the user’s actions and communicates them
    to the Controller. This, if necessary, updates the Model (data) and, once done,
    updates the View.


    In its documentation,^([³](#fn3)) Apple indicates that MVC is based on three design
    patterns (which we already saw in Chapter [1](#531999_1_En_1_Chapter.xhtml) in
    a generic way):


    *   **Composite**: Views are made up of other views following a tree-like structure.
    For example, imagine a view that was made up of more views (buttons, labels, images…).


    *   **Strategy**: Controllers can manage one or more views (which have no internal
    logic and are therefore reusable), and these delegate to Controllers how they
    should be displayed.


    *   **Observer**: A Controller that needs to know when the state of the application
    (i.e., the data in the Model) changes must be subscribed to these changes.


    ## Components in MVC


    We have just seen that there are three components in this architecture: View,
    Model, and Controller. Let us study each component’s functions in more detail.


    ### Model


    The Model is the component (or components) that holds the business logic and is
    in charge of accessing, manipulating, or storing the data of the application.


    *   It contains classes related to data persistence, for example, through the
    use of databases (Core Data, SQLite, Realm…) or the use of user preferences (UserDefaults).


    *   It contains the classes that manage the application’s communications (Networking)
    and that allow us to receive and send data.


    *   It contains the classes that parse the information received from outside the
    application and convert it into model objects.


    *   It contains extensions, constants, and helper classes.


    *   A model object can communicate with other model objects.


    *   The Model must not communicate directly with the View. The communication between
    the Model and the View is done through the Controller.


    ### View


    The View is made up of those components that the user can see:


    *   They are the classes that derive from the UIKit, AppKit, Core Animation, and
    Core Graphics libraries.


    *   They show the data that comes from the Model, although they are not directly
    connected to it (they do it through the Controller).


    *   These components can receive user interactions.


    ### Controller


    The Controller acts as an intermediary between the Model and the View:


    *   It is the main component of the MVC model and communicates with both the View
    and the Model.


    *   It receives and interprets the actions that the user performs on the View
    and updates the Model accordingly.


    *   If the data in the Model changes, it updates the View according to these changes.


    *   It takes care of the life cycle of the application.


    ## Advantages and Disadvantages of MVC


    The MVC architecture pattern is the one recommended by Apple for application development;
    it is the first one that is usually learned and the most commonly used. Using
    the Model–View–Controller architecture has advantages and disadvantages.


    ### Advantages of the MVC Pattern


    The use of the MVC pattern has some advantages:


    *   Its design is simple.


    *   It uses less code compared to other architecture patterns.


    *   It presents a clear separation of responsibilities; each component has clearly
    defined responsibilities.


    *   It allows you to develop simple applications in a short time.


    ### Disadvantages of the MVC Pattern


    The main disadvantage of the MVC pattern is located in the Controller for several
    reasons:


    ![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig3_HTML.jpg)


    A block diagram represents 2 adjacent blocks labeled controller and view, having
    communication between them. There is another block labeled model that receives
    updates and sends notifications to the set of 2 blocks on the left.


    Figure 2-3


    Coupling between View and Controller


    *   The Controller is very coupled to the View and the Model, so it is not very
    reusable.


    *   The Controller derives from the UIViewController class, where the View is
    closely tied to the Controller. This means that the separation of responsibilities
    is usually lost, giving rise to a scheme such as the following (Figure [2-3](#531999_1_En_2_Chapter.xhtml#Fig3)).


    Having this coupling between View and Controller, it becomes more complicated
    to test the Controller independently without the intervention of the View.


    *   There is a great tendency to “overload” the Controller, adding a series of
    responsibilities that do not correspond to it, such as part of the business logic,
    the delegates and the data sources of tables and collections, navigation, etc.
    This results in what is known as a “Massive View Controller.”


    To solve this problem, we can take some actions, such as moving the view code
    to other classes, separating the navigation between view controllers to a coordinator,
    or passing the *UITableViewControllers* or *UICollectionView* delegates and data
    sources out of the view controllers.


    ## MVC Application


    Once we have seen the characteristics of the MVC architecture, we are going to
    apply it in the development of our application.


    Note


    The entire project can be downloaded from the repository of this book. During
    the explanation of the implementation of the MVC architecture in our project,
    we will only show the most relevant parts of the code.


    ### MVC Layers


    To continue with the logic of the applied architecture pattern (Model–View–Controller),
    we will create a folder structure that simulates the layers of this architecture
    (Figure [2-4](#531999_1_En_2_Chapter.xhtml#Fig4)).


    ![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig4_HTML.jpg)


    A screenshot highlights a set of folders and files under the primary folder named
