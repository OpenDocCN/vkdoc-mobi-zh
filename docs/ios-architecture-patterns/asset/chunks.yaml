  raw: '##### HomeViewController


    The Controller (*HomeViewController*) is the core of the MVC model and must have
    references to both the view (*HomeView*) and the model (*TasksListServiceProtocol*
    and *TaskServiceProtocol*), as seen in Listing [2-7](#531999_1_En_2_Chapter.xhtml#PC17).


    The fact of passing instances of the classes that we need in the initializer (this
    is what is known as *dependency injection*) allows us a greater decoupling of
    the components and facilitates the implementation of unit tests (using, for example,
    mock objects).


    ```

    class HomeViewController: UIViewController {

    private var homeView = HomeView()

    private var tasksListService: TasksListServiceProtocol!

    private var taskService: TaskServiceProtocol!

    init(tasksListService: TasksListServiceProtocol,

    taskService: TaskServiceProtocol) {

    super.init(nibName: nil, bundle: nil)

    self.tasksListService = tasksListService

    self.taskService = taskService

    }

    ...

    }

    Listing 2-7

    HomeViewController initialization

    ```


    As we have seen for the MVC architecture, the Controller will pass the information
    to the View for display. We do this with the *fetchTasksLists* method, whose function
    is to retrieve the information from the database and pass it to the view (Listing
    [2-8](#531999_1_En_2_Chapter.xhtml#PC18)).


    ```

    func fetchTasksLists() {

    let lists = tasksListService.fetchLists()

    homeView.setTasksLists(lists)

    }

    Listing 2-8

    The fetchTasksLists method calls the Model to fetch the lists and then passes
    them to the View

    ```


    On the other hand, the Controller will receive user interactions (through the
    *Delegate pattern*) and act accordingly.


    These interactions are as follows:


    *   Access a tasks list.


    *   Add a tasks list.


    *   Delete a tasks list.


    To do this, we first define a protocol with the methods related to these interactions
    (Listing [2-9](#531999_1_En_2_Chapter.xhtml#PC19)).


    ```

    protocol HomeViewDelegate: AnyObject {

    func addListAction()

    func selectedList(_ list: TasksListModel)

    func deleteList(_ list: TasksListModel)

    }

    Listing 2-9

    HomeViewDelegate protocol

    ```


    And then, we make the *HomeViewController* adopt this protocol and implement its
    methods (Listing [2-10](#531999_1_En_2_Chapter.xhtml#PC20)).


    ```

    extension HomeViewController: HomeViewDelegate {

    func addListAction() {

    let addListViewController = AddListViewController(tasksListModel: list, taskService:
    taskService, tasksListService: tasksListService)

    navigationController?.pushViewController(addListViewController, animated: true)

    }

    func selectedList(_ list: TasksListModel) {

    let taskViewController = TaskListViewController(tasksListModel: list)

    navigationController?.pushViewController(taskViewController, animated: true)

    }

    func deleteList(_ list: TasksListModel) {

    tasksListService.deleteList(list)

    }

    }

    Listing 2-10

    HomeViewController extension that implements the HomeViewDelegate protocol methods

    ```


    The *addListAction* method is executed when the user clicks the “*Add list*” button
    and navigates the application to the *AddListViewController* screen.


    The *selectedList* method navigates the application to the *TaskListViewController*
    screen (passing it the selected list information).


    Finally, the *deleteList* method is in charge of communicating to the model that
    it must delete the selected list from the database and then reloads the view.


    In addition, we have to implement the observation of the model to know when task
    lists are added or deleted and thus update the view (Listing [2-11](#531999_1_En_2_Chapter.xhtml#PC21)).


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    NotificationCenter.default.addObserver(self,

    selector: #selector(contextObjectsDidChange),

    name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,

    object: CoreDataManager.shared.mainContext)

    }

    @objc func contextObjectsDidChange() {

    fetchTasksLists()

    }

    Listing 2-11

    Model observer implementation

    ```


    ##### HomeView


    Basically, the *HomeView* is made up of a *UITableView* element (to display the
    information) and a *UIButton* element (to be able to add a new list). We have
    seen how the Controller will pass the information that the View should display
    through the *setTasksList* method of the View (Listing [2-12](#531999_1_En_2_Chapter.xhtml#PC22)).


    ```

    func setTasksLists(_ lists: [TasksListModel]) {

    tasksList = lists

    tableView.reloadData()

    emptyState.isHidden = tasksList.count > 0

    }

    Listing 2-12

    Upon receiving the information from HomeViewController, the HomeView is updated
    with the new data

    ```


    What we do in this function is take the “lists” parameter and assign it to the
    *taskList* variable of our class (which is the one we will use to fill the table),
    reload the table, and hide or show an “*Empty state*” depending on whether or
    not the list contains values.


    On the other hand, the View will also need to pass user interactions to the controller
    via delegation.


    We will do this by adding a delegate property of the type *HomeViewDelegate* to
    the top of our *HomeView*:


    ```

    class HomeView: UIView {

    ...

    weak var delegate: HomeViewDelegate?

    ...

    }

    ```


    Also, in the *HomeViewController*, we must configure the delegate property of
    the *HomeView* instance to “*self*,” indicating that it will be the *HomeViewController*
    that implements the protocol methods (Listing [2-13](#531999_1_En_2_Chapter.xhtml#PC24)).


    ```

    class HomeViewController: UIViewController {

    ...

    override func loadView() {

    super.loadView()

    setupHomeView()

    }

    private func setupHomeView() {

    homeView.delegate = self

    self.view = homeView

    }

    ...

    }

    Listing 2-13

    Setting HomeView delegate on HomeViewController

    ```


    Once the delegate is defined, we can use it to implement it in our code and call
    each of the protocol functions.


    Thus, the *addListAction* method will be called from the function associated with
    the add list button (Listing [2-14](#531999_1_En_2_Chapter.xhtml#PC25)).


    ```

    extension HomeView {

    ...

    func configureAddListButton() {

    addListButton.addTarget(self, action: #selector(addListAction), for: .touchUpInside)

    ...

    }

    @objc func addListAction() {

    delegate?.addListAction()

    }

    ...

    }

    Listing 2-14

    Configure the addListButton target

    ```


    The *selectList* method will be called when the user selects a cell in the table
    (Listing [2-15](#531999_1_En_2_Chapter.xhtml#PC26)).


    ```

    func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)
    {

    delegate?.selectedList(tasksList[indexPath.row])

    }

    Listing 2-15

    HomeView delegates the selectedList method implementation to the HomeViewController

    ```


    And the method *deleteList* will be called on swipe a cell (Listing [2-16](#531999_1_En_2_Chapter.xhtml#PC27)).


    ```

    func tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,
    forRowAt indexPath: IndexPath) {

    if editingStyle == .delete {

    let list = tasksList[indexPath.row]

    tasksList.remove(at: indexPath.row)

    tableView.deleteRows(at: [indexPath], with: .automatic)

    delegate?.deleteList(list)

    }

    }

    Listing 2-16

    On swipe a cell, the delete method is called (removing cell from the table, and
    delegating the deletion from the Model to the HomeViewController)

    ```


    #### Add List Screen


    This screen is responsible for adding task lists and the communication between
    its components is shown in Figure [2-9](#531999_1_En_2_Chapter.xhtml#Fig9).


    ![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig9_HTML.png)


    A block diagram represents the communication between the add list view, add list
    view controller, and task list service. The add list view has a sub-view named
    icon selector view. The add list view controller in the middle has navigations
    with the home view controller.


    Figure 2-9


    Add list screen components communication schema'
