    *   **A testable code**: The previous points result in the fact that it is easier
    to test a code if the functionalities are correctly separated than if they are
    not.


    *   **A solid, stable, reliable, and durable code over time**.


    ### Most Used Architecture Patterns


    From a generic point of view of software development, there are numerous architecture
    patterns, but we will focus on the most used for the development of iOS applications:


    *   Model–View–Controller (MVC)


    *   Model–View–Presenter (MVP)


    *   Model–View–ViewModel (MVVM)


    *   View–Interactor–Presenter–Entity–Router (VIPER)


    *   View–Interactor–Presenter (VIP)


    We will start with the best-known model and the one that every developer usually
    starts working with, the MVC. From here we will work on models that derive from
    it, such as the MVP and the MVVM, to end up with much more elaborate models of
    higher complexity, such as the VIPER and the VIP.


    After these architectural patterns, we will see, in a more summarized way, some
    more patterns, perhaps not so used or known, but that can give us a better perspective
    of how to structure an application. Examples of these types of patterns are RIBs
    (developed by Uber) and Redux (based on an initial idea of ​​Facebook for a one-way
    architecture).


    ## In Search of a “Clean Architecture”


    The “Clean Architecture” concept was introduced by Robert C. Martin in 2012,^([²](#fn2))
    and it is not an architecture, but a series of rules that, together with the SOLID
    principles, will allow us to develop software with responsibilities separate,
    robust, easy to understand, and testable.'
  trans: '

    # 结构型模式


    结构型模式规定了对象与类之间如何相互关联，以形成更复杂且灵活高效的结构。它们依赖继承来定义接口并获取新功能。


    ## 适配器模式


    这是一种结构型模式，允许两个接口不兼容的对象通过一个中间代理进行协作，它们通过该代理进行通信和交互。


    ## 桥接模式


    在此模式中，抽象部分与其实现部分解耦，从而使两者可以独立地演进。


    ## 组合模式


    该模式允许你创建具有树状结构的对象，然后将这些结构当作单个对象来处理。在这种情况下，结构中的所有元素都使用相同的接口。


    ## 装饰器模式


    该模式允许在不改变同类对象行为的前提下，向一个对象添加新功能（将该对象包含在一个拥有新功能的容器中）。


    ## 外观模式


    它为复杂结构（如一个库或一组类）提供了简化的接口。


    ## 享元模式


    这是一种通过让多个对象在同一个对象上共享公共属性，而不是在每个对象上都维护这些属性，从而节省内存的模式。


    ## 代理模式


    这是一个充当原始对象简化版本的对象。代理控制对原始对象的访问，允许在访问该对象之前或之后执行某些任务。该模式通常用于互联网连接、设备文件访问等场景。


    # 行为型模式


    这一类模式数量最多，专注于对象间的通信，负责管理对象之间的算法、关系和职责。


    ## 责任链模式


    它允许请求沿着一条由处理者组成的链进行传递。链中的每个处理者都可以处理该请求，或将其传递给下一个处理者。这样，发送者和最终接收者之间就实现了解耦。


    ## 命令模式


    它将请求转换为一个对象，该对象封装了执行该请求所需的行为和信息。


    ## 解释器模式


    这是一种模式，针对给定的语言，定义了其语法的表示形式以及对该语法进行求值的机制。


    ## 迭代器模式


    它允许遍历集合中的元素，而无需暴露其底层表示（如列表、栈、树等）。


    ## 中介者模式


    它限制对象间的直接通信，并强制它们通过一个充当中介者的单一对象进行通信。


    ## 备忘录模式


    它允许在不暴露对象实现细节的情况下，将对象保存并恢复到先前的状态。


    ## 观察者模式


    它允许建立一种订阅机制，以便向多个对象通知它们所观察的对象中发生的事件。


    ## 状态模式


    它允许一个对象在其内部状态改变时改变其行为。


    ## 策略模式


    它允许从一组算法中，在运行时选择其中一个来执行特定操作。


    ## 模板方法模式


    该模式在超类中定义了一个算法的骨架，但允许子类在不改变算法结构的情况下重写某些方法。


    ## 访问者模式


    它允许将算法与它们所操作的对象分离开来。


    # SOLID 原则


    这五项原则使我们能够创建可重用、易于维护且代码质量更高的组件。


    `SOLID` 是由这五项原则的首字母组成的缩写。


    ## 单一职责原则（`SRP`）


    一个类应该只有一个引起它变化的原因。也就是说，一个类应该只负责一个职责。


    ## 开闭原则（`OCP`）


    我们必须能够在不改变类行为的情况下对其进行扩展。这可以通过抽象来实现。


    ## 里氏替换原则（`LSP`）


    在程序中，任何类都应该可以被其子类替换，而不会影响程序的正常运行。


    ## 接口隔离原则（`ISP`）


    拥有针对每个客户端的具体接口（协议），比拥有一个通用接口更好。此外，客户端不应该被迫实现它不需要的方法。


    ## 依赖反转原则（`DIP`）


    高层模块不应依赖低层模块，两者都应依赖抽象。抽象不应依赖细节，细节应依赖抽象。其目标是减少模块之间的依赖关系，从而降低类之间的耦合度。


    # 如何选择正确的架构模式


    我们刚刚看到了为应用程序选择良好架构所带来的好处。但是，如何为我们的项目选择合适的架构模式呢？


    首先，我们需要了解项目的一些信息以及我们将要使用的技术，因为我们已经看到，某些架构模式更适合某些项目，而其他架构模式则更适合另一些项目。


    因此，我们应当考虑，例如：


    - 项目的类型

    - 开发所使用的技术

    - 支持基础设施（服务器、云平台、数据库等）

    - 用户界面（可用性、内容、导航等）

    - 预算和开发时间

    - 未来的可扩展性及新功能的添加


    如果我们综合考虑以上所有方面，选择一个优秀的架构模式（并结合使用设计模式和 `SOLID` 原则）将使我们能够实现以下目标：


    - **可扩展的应用程序**：一个优秀的架构模式应允许我们添加新功能，甚至更换某些使用的技术，而无需修改整个应用程序。

    - **关注点分离**：从代码角度来看，每个组件都应该是独立的。也就是说，一个组件为了正常运行，只需要了解其周围的组件即可，无需了解其他。这将使我们能够，例如，重用这些组件或将其替换为其他组件。

    - **易于维护的代码**：编写良好、结构清晰且无重复的代码更易于理解、审查或修改。此外，任何加入项目的新开发者也能更快上手。

    - **可测试的代码**：上述几点带来的结果是，如果功能被正确分离，那么测试代码就会比功能未分离时容易得多。

    - **稳固、稳定、可靠且耐久的代码**。


    ## 最常用的架构模式


    从软件开发的一般角度来看，存在众多架构模式，但我们将重点关注 iOS 应用开发中最常用的几种：


    - 模型-视图-控制器（`MVC`）

    - 模型-视图- presenter（`MVP`）

    - 模型-视图-视图模型（`MVVM`）

    - 视图-交互器-演示者-实体-路由器（`VIPER`）

    - 视图-交互器-演示者（`VIP`）


    我们将从最知名、也是每位开发者通常开始接触的模型——`MVC` 开始介绍。从这开始，我们将研究由其衍生出的模型，如 `MVP` 和 `MVVM`，最后介绍更复杂、更精细的模型，如
    `VIPER` 和 `VIP`。


    在这些架构模式之后，我们将更简要地介绍一些其他模式，它们可能不那么常用或知名，但能为我们构建应用程序提供更好的视角。这类模式的例子包括 `RIBs`（由优步开发）和
    `Redux`（基于脸书关于单向架构的初步构想）。


    # 追寻“简洁架构”


    “简洁架构”这个概念由罗伯特·C·马丁于 2012 年提出，^(²)，它本身并非一种架构，而是一系列规则，与 `SOLID` 原则相结合，将使我们能够开发出职责分离、健壮、易于理解和可测试的软件。

    '
- fmt: '### Clean Architecture Layers


    According to this philosophy, for an architecture to be considered “clean” it
    must have at least the following three layers: `Domain Layer`, `Presentation Layer`,
    and `Data Layer` (Figure [1-2](#531999_1_En_1_Chapter.xhtml#Fig2)).


    ![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig2_HTML.png)


    A wheel diagram of the scheme of the layer structure in clean architecture consists
    of a `presentation layer` that has a user interface and presenters, a `domain
    layer` that has use cases and entities, and a `data layer` that has data sources
    and repositories, according to the dependency rule.


    Figure 1-2


    Scheme of the layer structure in Clean Architecture. Dependency rule arrows show
    how the outermost layers depend on the innermost ones and not the other way around.


    #### Domain Layer


    It is the core of this architecture and contains the application logic and business
    logic. In this layer we find the `Use Cases` or `Interactors`, the `Entities`,
    and the `Interfaces of the Repositories`:


    *   **Use Cases or interactors**: They are in charge of defining and implementing
    the business logic. They control the flow of information to and from the `Entities`.
    They can work with one or more entities and access their methods.

    *   **Entities**: These are simple objects (which can be simple data structures
    or can also contain methods) that contain the business rules.

    *   **Repository interfaces**: They contain the definition of the methods that
    will be implemented in the `Repositories`. `Repositories` are responsible for
    obtaining and passing data from databases, servers, etc.


    This layer has no external dependencies, so it is easily testable (`Use Cases`)
    and can be reused in other projects.


    #### Presentation Layer


    This layer contains all those elements that show information to the user or that
    receive their interaction.


    The `Presentation layer` also includes those components, such as `ViewModels`
    or `Presenters`, that help prepare the data to be displayed on the screen.


    The `ViewModels` or `Presenters` are also in charge of executing the `Use Cases`.
    The `Presentation Layer` only depends on the `Domain Layer`.


    #### Data Layer


    It contains the implementation classes of the `Repositories` and the data sources
    such as databases, user preferences, or access to servers. In the same way as
    the `Presentation Layer`, the `Data Layer` only depends on the `Domain Layer`.


    ### The Dependency Rule


    For this type of architecture to work correctly, we must apply the so-called `Dependency
    Rule`. According to this rule, the inner layers must not know the outer layers
    (i.e., no variable, method, etc., of an outer layer is mentioned in a more inner
    layer).


    ### Advantages of Applying a Clean Architecture


    The application of a `Clean Architecture` in our projects will give us a series
    of advantages (some of which we have already seen in the introduction to Software
    Architecture):


    *   **Testable**: The fact that the business logic is isolated in its layer, and
    that it does not depend on the rest of the layers, makes it easily testable.

    In addition, this same separation by layers allows them to be tested separately
    and more easily locate any possible error.

    *   **Independent of frameworks**: The code must be independent of specific libraries.

    In other words, we can change one library for another without the need for major
    changes in the code and without the internal layers stopping working because of
    it. This is achieved by preventing our code from having direct dependencies on
    these libraries.

    *   **Independent of the user interface**: The user interface is the outermost
    layer and only displays the data supplied by the presenter.

    Therefore, we must be able to modify it without affecting the most internal part,
    the business logic. In other words, the user interface must adapt to changes in
    business logic and not the other way around.

    *   **Independent of data sources**: In a similar way to what was explained for
    the independence of the user interface, we must be able to change the data sources
    (local, external databases…) without affecting the business logic, since it is
    these sources that fit the business logic.

    *   **Independent of external elements**: The business logic must be independent
    of everything that surrounds it, which must allow us to change any part of the
    rest of the system without affecting it.


    ## MyToDos: A Simple App to Test Architectures


    To work with the different architectures that we have mentioned before (`MVC`,
    `MVP`, `MVVM`, `VIPER`, and `VIP`), we are going to create a simple task management
    application, which is, usually, one of the first applications that a developer
    usually does.


    ### App Screens


    Our `MyToDos` app will allow us to work the navigation between different screens
    (create lists, create tasks…); use a database to save, update, or delete tasks;
    and, finally, manage user interactions on the different screens.


    #### Launch Screen


    It is the screen that appears when loading the application (Figure [1-3](#531999_1_En_1_Chapter.xhtml#Fig3)).


    ![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig3_HTML.png)


    A photograph of a mobile phone displays the launch screen of `My To Dos`.


    Figure 1-3


    Launch screen


    #### Home Screen


    This screen shows the lists we have created. If we haven’t created any list, an
    “Empty State” will appear to tell us to create our first list.


    For each created list, we will be able to see the icon that we have associated
    with the list, the title of the list, and the number of tasks that compose it
    (Figure [1-4](#531999_1_En_1_Chapter.xhtml#Fig4)).


    ![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig4_HTML.png)


    A photograph of a mobile phone displays the home screen of my to do lists, with
    the option to add list.


    Figure 1-4


    Empty state on Home screen


    The user can interact on this screen at three points:


    ![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig6_HTML.png)


    A photograph of a mobile phone displays the screen of my to do lists, with the
    delete option on the swipe cell and the add list option at the bottom.


    Figure 1-6


    Delete list on swipe cell


    ![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig5_HTML.png)


    A photograph of a mobile phone displays the screen of my to do lists, with an
    access task list and the add list option at the bottom.


    Figure 1-5


    Access tasks list on select cell


    *   Using the *Add List* button, which will allow us to create a new list

    *   Selecting one of the lists to access its content (Figure [1-5](#531999_1_En_1_Chapter.xhtml#Fig5))

    *   Deleting lists by a swipe gesture on the list (Figure [1-6](#531999_1_En_1_Chapter.xhtml#Fig6))


    #### Add List Screen


    This screen is navigated through the *Add List* button on the `Home` screen. Here,
    the user has to indicate the title that will be given to the list and select an
    icon from those that are shown (Figure [1-7](#531999_1_En_1_Chapter.xhtml#Fig7)).


    ![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig7_HTML.jpg)


    A photograph of a mobile phone displays the screen of the add list with different
    icons, and the add list option at the bottom.


    Figure 1-7


    Add List screen


    When you select the *Add List* button, the entered information is saved in the
    database (`Core Data`) and you return to `Home`.


    If the user wants to return to `Home` without creating any list, they simply have
    to select the button with the return arrow located at the top left of the screen.'
