  trans: "\n# TaskListProtocols\n\n`TaskList`模块是构成应用程序的四个模块中最复杂的一个，因为它允许与用户进行更多交互：更新和删除任务、导航回主页或展示任务创建界面。因此，我们会看到在不同通信协议中有更多的方法。\n\
    \n在`TaskListProtocol`中，除了`createScreen`方法（在此处我们已修改该方法，用于传递我们想要显示的任务列表）之外，我们还有`presentAddTaskOn`方法，用于访问任务创建界面。如您所见，我们将传递要添加已创建任务的任务列表，以及`popToHomeFrom`方法，我们必须实现该方法以返回主页（列表\
    \ 5-28）。\n\n```\n// MARK: Router Input\nprotocol PresenterToRouterTaskListProtocol\
    \ {\nstatic func createScreenFor(list: TasksListModel) -> UIViewController\nfunc\
    \ presentAddTaskOn(view: PresenterToViewTaskListProtocol, forTaskList: TasksListModel)\n\
    func popToHomeFrom(view: PresenterToViewTaskListProtocol)\n}\n```\n\n*列表 5-28*\
