  raw: "## What Is Software Architecture?\n\nThe Software Architecture defines how\
    \ the software structure is, what are the components that form it, how they are\
    \ joined, and how they communicate with each other.\n\nAll these points that intervene\
    \ in the definition of the Software Architecture can be represented according\
    \ to different models or views, the following three being the main ones (and an\
    \ example of their application is one of the architectures that we will study\
    \ later, the MVVM or Model–View–ViewModel):\n\n*   **Static view**: It indicates\
    \ which components make up the structure. In MVVM, these components would be View,\
    \ Model, and ViewModel.\n\n*   **Dynamic view**: It establishes the behavior of\
    \ the different components and the communication between them over time.\n\n*\
    \   **Functional view**: It shows us what each component does. For example, in\
    \ the example we are seeing, each of the components would have the following functionalities:\n\
    \    *   **Model**: It contains the classes and structures responsible for storing\
    \ and transferring an application’s data. It also includes business logic.\n\n\
    \    *   **View**: It represents the interface with the elements that form it,\
    \ the interaction with the user, and how it is updated to show the user the information\
    \ received.\n\n    *   **ViewModel**: It acts as an intermediary between the View\
    \ and the Model; it usually includes presentation logic, that is, those methods\
    \ that allow the data received from the Model to be transformed to be presented\
    \ in the View.\n\n## Architecture Patterns\n\nWe have just seen that Software\
    \ Architecture helps us to give structure to our project. However, not all projects\
    \ are the same or have the same purpose, so, logically, the architectures used\
    \ are different and appropriate to each project.\n\nDevelopers have been finding\
    \ different solutions when facing their projects. The fact that the requirements\
    \ and functionalities of a project, its components, or the way of communicating\
    \ between them vary from one project to another has given rise to different architectural\
    \ solutions and architecture patterns.\n\nKeep in mind that an architecture pattern\
    \ is like a template that offers us some rules or guidelines on how to develop\
    \ and structure the different components of the application. Each architectural\
    \ pattern has its advantages and disadvantages, as we will see later.\n\n## Why\
    \ Do We Need an Architecture Pattern for Our Applications?\n\nThe selection and\
    \ use of an architecture pattern when developing our applications will allow us\
    \ to avoid a series of problems that applications that have been developed without\
    \ using these patterns can present.\n\nSome of these problems are as follows:\n\
    \n*   These are applications that are difficult to maintain. This problem increases\
    \ if new developers are involved, as it is more costly for them to understand\
    \ the software they are working on.\n\n*   It usually increases the development\
    \ time and, therefore, increases its cost.\n\n*   As it is not a structured code,\
    \ it is more complicated to add new features or scale it.\n\n*   They are very\
    \ likely to have duplicate, unused, and messy code. All this makes it more prone\
    \ to errors.\n\nTherefore, the use of a good architecture pattern will allow us\
    \ to reduce these problems:\n\n*   We will work with a code that is simpler, more\
    \ organized, and easier to understand (and following good development practices,\
    \ such as the SOLID principles) for all developers since they will act according\
    \ to the same rules.\n\n*   The written code will be easily testable and less\
    \ prone to errors.\n\n*   A correct distribution of the components and their responsibilities\
    \ will lead to a structure that is easy to maintain, modify, and extend.\n\n*\
    \   All of this will result in reduced development time and, by extension, reduced\
    \ costs.\n\n## Design from High Level to Low Level\n\nIn this book, we are going\
    \ to study and apply different architectural patterns in iOS applications, so\
    \ we will also see the code with which we implement them and the best way to implement\
    \ it.\n\nAs we have seen, an architecture pattern gives us guidelines to build\
    \ an application that is efficient, scalable, and easy to maintain, among other\
    \ advantages.\n\nBut we can think of an architecture pattern as the high-level\
    \ design of the application, and then we have to go down to the code (Figure [1-1](#531999_1_En_1_Chapter.xhtml#Fig1)).\n\
    \nThis is where the design patterns and their implementation through the programming\
    \ language come in, trying to follow some principles (SOLID), which will make\
    \ the code flexible, stable, maintainable, and reusable.\n\n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig1_HTML.jpg)\n\
    \nA flow diagram of the levels of design and implementation in an application\
    \ consists of architecture pattern, design pattern, and programming language,\
    \ from high to low level.\n\nFigure 1-1\n\nLevels of design and implementation\
    \ in an application\n\nLet’s see briefly what design patterns are (some of which\
    \ we will apply) and how to work following the SOLID principles.\n\n### Design\
    \ Patterns\n\nIn the same way that an architecture pattern is a generic solution\
    \ to a certain problem when it comes to the structure of our software (i.e., it\
    \ will affect the entire project), design patterns give us solutions to recurring\
    \ problems that affect a project component.\n\nThere are 23 design patterns, which\
    \ are described in the book *Design Patterns: Elements of Reusable Object-Oriented\
    \ Software*.^([¹](#fn1)) They described the 23 design patterns and classified\
    \ them into three groups: structural patterns, creational patterns, and behavioral\
    \ patterns.\n\n#### Creational Patterns\n\nCreational patterns are those that\
    \ allow us to create objects. These patterns encapsulate the procedure for creating\
    \ an object and generally work through interfaces.\n\n##### Factory Method\n\n\
    It provides an interface that allows you to create objects in a superclass, but\
    \ delegates the implementation and alteration of objects to subclasses.\n\n#####\
    \ Abstract Factory\n\nIt provides an interface that allows groups of related objects\
    \ to be generated, but without specifying their specific classes or implementation.\n\
    \n##### Builder\n\nIt allows building complex objects step by step, separating\
    \ the creation of the object from its structure. In this way, we can use the same\
    \ construction process to obtain different types and representations of an object.\n\
    \n##### Singleton\n\nThis pattern ensures that a class has only one possible instance,\
    \ which is globally accessible.\n\n##### Prototype\n\nIt allows you to copy or\
    \ clone an object without requiring our code to depend on its classes."
  trans: "\n## 什么是软件架构？\n\n软件架构定义了软件的结构是怎样的、构成它的组件有哪些、这些组件如何连接以及它们之间如何相互通信。\n\n所有介入软件架构定义的这些要点都可以根据不同的模型或视图来表示，以下是其中三种主要的视图（我们将稍后学习的架构之一——MVVM（模型-视图-视图模型）就是这些视图的一个应用示例）：\n\
    \n- **静态视图**：指明哪些组件构成了该结构。在 MVVM 中，这些组件是 `View`、`Model` 和 `ViewModel`。\n- **动态视图**：确立不同组件随时间推移的行为以及它们之间的通信方式。\n\
    - **功能视图**：向我们展示每个组件的功能。例如，在我们看到的示例中，每个组件具有以下功能：\n  - **Model**：包含负责存储和传输应用程序数据的类与结构。它还包含业务逻辑。\n\
    \  - **View**：表示包含构成界面的元素、与用户的交互，以及它如何更新以向用户显示接收到的信息。\n  - **ViewModel**：充当 `View`\
    \ 和 `Model` 之间的中介；它通常包含表示逻辑，即那些将从 `Model` 接收的数据转换以在 `View` 中呈现的方法。\n\n## 架构模式\n\
    \n我们刚刚看到，软件架构有助于为我们的项目赋予结构。然而，并非所有项目都相同或具有相同的目的，因此，很自然地，所使用的架构是不同的，并且适用于每个项目。\n\
    \n开发人员在面对项目时一直在寻找不同的解决方案。一个项目的需求和功能、其组件或组件间的通信方式会因项目而异，这一事实催生了不同的架构解决方案和架构模式。\n\
    \n请记住，架构模式就像一个模板，提供了一些关于如何开发和构建应用程序不同组件的规则或指导方针。每种架构模式都有其优点和缺点，稍后我们将看到这一点。\n\n\
    ## 为什么我们需要为应用程序采用架构模式？\n\n在开发应用程序时，选择并使用一种架构模式将使我们能够避免一系列问题，而那些未使用这些模式开发的应用程序可能会出现这些问题。\n\
    \n其中一些问题如下：\n\n- 这些应用程序难以维护。如果有新开发者加入，这个问题会加剧，因为他们更难理解正在开发的软件。\n- 这通常会增加开发时间，从而增加成本。\n\
    - 由于代码缺乏结构，添加新功能或进行扩展会更加复杂。\n- 很可能存在重复、未使用且杂乱的代码。所有这些都使其更容易出错。\n\n因此，使用良好的架构模式将使我们能够减少这些问题：\n\
    \n- 我们将使用更简单、更有条理且更容易理解的代码（并遵循良好的开发实践，例如 SOLID 原则）进行工作，对所有开发者来说都是如此，因为他们将根据相同的规则行事。\n\
    - 编写的代码将易于测试，且更不容易出错。\n- 组件的正确分配及其职责将带来易于维护、修改和扩展的结构。\n- 所有这些都将缩短开发时间，进而降低成本。\n\
    \n## 从高层级到低层级进行设计\n\n在本书中，我们将研究并在 iOS 应用程序中应用不同的架构模式，因此我们还将看到实现它们的代码以及最佳的实现方式。\n\
    \n正如我们所见，架构模式为我们提供了构建高效、可扩展且易于维护的应用程序的指导方针，以及其他优势。\n\n但我们可以将架构模式视为应用程序的高层级设计，然后我们必须深入到代码层面（图\
    \ 1-1）。\n\n这就是设计模式及其通过编程语言实现发挥作用的地方，同时尝试遵循一些原则（SOLID），这些原则将使代码灵活、稳定、可维护且可复用。\n\
    \n![](img/531999_1_En_1_Fig1_HTML.jpg)\n\n*应用程序设计与实现层级流程图，自上而下依次为：从高层级到低层级分别是架构模式、设计模式和编程语言。*\n\
    \n**图 1-1** 应用程序的设计与实现层级\n\n让我们简要了解一下什么是设计模式（其中一些我们将要应用），以及如何遵循 SOLID 原则进行工作。\n\
    \n### 设计模式\n\n正如架构模式是针对软件结构特定问题的通用解决方案（即它会影响整个项目）一样，设计模式为我们提供了针对影响项目组件的重复性问题的解决方案。\n\
    \n共有 23 种设计模式，它们在《设计模式：可复用面向对象软件的基础》一书中有描述。^(¹) 该书描述了这 23 种设计模式，并将其分为三类：结构型模式、创建型模式和行为型模式。\n\
    \n#### 创建型模式\n\n创建型模式是允许我们创建对象的模式。这些模式封装了创建对象的过程，并且通常通过接口工作。\n\n##### 工厂方法\n\n\
    它提供了一个接口，允许在超类中创建对象，但将对象的实现和更改委托给子类。\n\n##### 抽象工厂\n\n它提供一个接口，允许生成相关的对象组，但无需指定它们的具体类或实现。\n\
    \n##### 生成器\n\n它允许逐步构建复杂对象，并将对象的创建与其结构分离。通过这种方式，我们可以使用相同的构建过程来获得同一对象的不同类型和表示。\n\
    \n##### 单例\n\n此模式确保一个类只有一个可能的实例，并且该实例是全局可访问的。\n\n##### 原型\n\n它允许复制或克隆一个对象，而无需我们的代码依赖于该对象的类。\n"
- fmt: '# Structural Patterns


    Structural patterns specify how objects and classes relate to each other to form
    more complex structures so that they are flexible and efficient. They rely on
    inheritance to define interfaces and obtain new functionality.


    ## Adapter


    It is a structural pattern that allows two objects with incompatible interfaces
    to collaborate, through an intermediary with which they communicate and interact.


    ## Bridge


    In this pattern, an abstraction is decoupled from its implementation, so it can
    evolve independently.


    ## Composite


    It allows you to create objects with a tree-like structure and then work with
    these structures as if they were individual objects. In this case, all the elements
    of the structure use the same interface.


    ## Decorator


    This pattern allows you to add new features to an object (including this object
    in a container that contains the new features) without changing the behavior of
    objects of the same type.


    ## Façade


    It provides a simplified interface to a complex structure (such as a library or
    set of classes).


    ## Flyweight


    It is a pattern that allows you to save RAM by having many objects share common
    properties on the same object, instead of maintaining these properties on every
    object.


    ## Proxy


    It is an object that acts as a simplified version of the original. A proxy controls
    access to the original object, allowing it to perform some tasks before or after
    accessing that object. This pattern is often used for Internet connections, device
    file access, etc.


    # Behavioral Patterns


    They are the most numerous, and they focus on communication between objects and
    are responsible for managing algorithms, relationships, and responsibilities between
    these objects.


    ## Chain of Responsibility


    It allows requests to be passed through a chain of handlers. Each of these handlers
    can either process the request or pass it on to the next. In this way, the transmitter
    and the final receiver are decoupled.


    ## Command


    It transforms a request into an object that encapsulates the action and information
    you need to execute it.


    ## Interpreter


    It is a pattern that, given a language, defines a representation for its grammar
    and the mechanism for evaluating it.


    ## Iterator


    It allows to cycle through the elements of a collection without exposing its representation
    (list, stack, tree…).


    ## Mediator


    It restricts direct communications between objects and forces communication through
    a single object, which acts as a mediator.


    ## Memento


    It allows you to save and restore an object to a previous state without revealing
    the details of its implementation.


    ## Observe


    It allows establishing a subscription mechanism to notify different objects of
    the events that occur in the object that they observe.


    ## State


    It allows an object to change its behavior when its internal state changes.


    ## Strategy


    It allows defining that, from a family of algorithms, we can select one of them
    at execution time to perform a certain action.


    ## Template Method


    This pattern defines the skeleton of an algorithm in a superclass but allows subclasses
    to override some methods without changing their structure.


    ## Visitor


    It allows algorithms to be separated from the objects with which they operate.


    # SOLID Principles


    These are five principles that will allow us to create reusable components, easy
    to maintain, and with higher quality code.


    `SOLID` is an acronym that comes from the first letter of the five principles.


    ## Single-Responsibility Principle (`SRP`)


    A class should have one reason, and one reason only, to change. That is, a class
    should only have one responsibility.


    ## Open–Closed Principle (`OCP`)


    We must be able to extend a class without changing its behavior. This is achieved
    by abstraction.


    ## Liskov Substitution Principle (`LSP`)


    In a program, any class should be able to be replaced by one of its subclasses
    without affecting its operation.


    ## Interface Segregation Principle (`ISP`)


    It is better to have different interfaces (protocols) that are specific to each
    client than to have a general interface. Also, a client would not have to implement
    methods that it does not use.


    ## Dependency Inversion Principle (`DIP`)


    High-level classes should not depend on low-level classes. Both should depend
    on abstractions. Abstractions should not depend on details. The details should
    depend on the abstractions. What is sought is to reduce dependencies between modules
    and thus achieve less coupling between classes.


    # How to Choose the Right Architectural Pattern


    We have just seen the advantages that our applications have a good architecture
    offers us. But how do we choose the right architecture pattern for our project?


    In the first place, we have to know some information about our project and the
    technology that we are going to use since we have seen that some architecture
    patterns are better adapted to some projects and other patterns to others.


    Therefore, we must take into account, for example:


    - The type of project

    - The technologies used to develop it

    - Support infrastructure (servers, clouds, databases…)

    - User interface (usability, content, navigation…)

    - Budget and development time

    - Future scalability and the addition of new functionalities


    If we take into account everything seen so far, the choice of a good architecture
    pattern (along with the use of design patterns and `SOLID` principles) will allow
    us to have the following:


    - **A scalable application**: A good architecture pattern should allow us to add
    new features and even change some of the technologies used, without having to
    modify the entire application.

    - **Separation of interests**: Each component should be independent of the code
    point of view. That is, to function correctly, a component should only be aware
    of those around it and nothing else. This will allow us, for example, to reuse
    these components or simply change them for others.

    - **A code easy to maintain**: Well-written, structured code without repetition
    makes it easier to understand, review, or modify. Also, any new developer joining
    the project will require less time to get hold of.

    - **A testable code**: The previous points result in the fact that it is easier
    to test a code if the functionalities are correctly separated than if they are
    not.

    - **A solid, stable, reliable, and durable code over time**.


    ## Most Used Architecture Patterns


    From a generic point of view of software development, there are numerous architecture
    patterns, but we will focus on the most used for the development of iOS applications:


    - Model–View–Controller (`MVC`)

    - Model–View–Presenter (`MVP`)

    - Model–View–ViewModel (`MVVM`)

    - View–Interactor–Presenter–Entity–Router (`VIPER`)

    - View–Interactor–Presenter (`VIP`)


    We will start with the best-known model and the one that every developer usually
    starts working with, the `MVC`. From here we will work on models that derive from
    it, such as the `MVP` and the `MVVM`, to end up with much more elaborate models
    of higher complexity, such as the `VIPER` and the `VIP`.


    After these architectural patterns, we will see, in a more summarized way, some
    more patterns, perhaps not so used or known, but that can give us a better perspective
    of how to structure an application. Examples of these types of patterns are `RIBs`
    (developed by Uber) and `Redux` (based on an initial idea of Facebook for a one-way
    architecture).


    # In Search of a “Clean Architecture”


    The “Clean Architecture” concept was introduced by Robert C. Martin in 2012,^([²](#fn2))
    and it is not an architecture, but a series of rules that, together with the `SOLID`
    principles, will allow us to develop software with responsibilities separate,
    robust, easy to understand, and testable.'
