    \ data access and manipulation, extensions, constants, etc. In addition, we can\
    \ create subfolders to group files with similar functions (Figure [2-5](#531999_1_En_2_Chapter.xhtml#Fig5)):\
    \ Core Data, Extensions, Services, etc.\n\n![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig5_HTML.jpg)\n\
    \nA screenshot represents the files under the sub-folders of the folder `model`\
    \ which is also a sub-folder under `MVC`, `my-to-dos`. The sub-folders under the\
    \ `model` are `core data`, `models`, `services`, `extensions`, and `helpers`.\n\
    \n**Figure 2-5** Model layer files\n\nWe have seen in the MVC model schema that\
    \ the Model notifies the Controller (using the Observer design pattern).\n\nIn\
    \ this way, the Controller should subscribe to the changes that occur in the model.\n\
    \nAs the changes that occur in the model are basically those of adding, updating,\
    \ or deleting data in the database, what we will do is use Core Data’s own capabilities\
    \ to be informed of the changes. Core Data is capable of issuing notifications\
    \ based on the changes produced.\n\nIn our case, what we want to know is when\
    \ a change occurs in the database, either by adding a new object, deleting it,\
    \ or updating it, so we will use the following notification:\n\n```\nNSManagedObjectContextObjectsDidChangeNotification\n\
    ```\n\nTo do this, we will simply have to add an observer for this notification\
    \ in the `viewDidLoad` method of the controller that we want to be aware of the\
    \ changes produced in the model:\n\n```\nNotificationCenter.default.addObserver(self,\n\
    \                                         selector: #selector(methodToExecute),\n\
    \                                         name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
    \                                         object: context)\n```\n\n`NSNotification.Name.NSManagedObjectContextObjectsDidChange`\
    \ is the name of the notification the controller subscribes to, `context` is the\
    \ object we’re looking at, and `methodToExecute` is the method to run when a change\
    \ is detected, for example:\n\n```\n@objc func methodToExecute() {\n    view.updateView()\n\
    }\n```\n\n### Core Data\n\nIn this folder, we will have the `CoreDataManager.swift`\
    \ file (which we created in Chapter [1](#531999_1_En_1_Chapter.xhtml)), along\
    \ with the four files created by Xcode automatically for the database entities.\n\
    \n### Models\n\nHere we have the models into which we can transform the database\
    \ entities. In addition, we will create a protocol that the models must comply\
    \ with, to transform from model to entity and vice versa (Listing [2-1](#531999_1_En_2_Chapter.xhtml#PC4)).\n\
    \n```\nprotocol EntityModelMapProtocol {\n    associatedtype EntityType: NSManagedObject\n\
    \    func mapToEntityInContext(_ context: NSManagedObjectContext) -> EntityType\n\
    \    static func mapFromEntity(_ entity: EntityType) -> Self\n}\n```\n\n**Listing\
    \ 2-1** EntityModelMapProtocol code\n\nIn our application, we will define two\
    \ models (`TaskModel` and `TasksListModel`), one for each entity in the database.\n\
    \nEach of these models will also conform to the `EntityModelMapProtocol` protocol\
    \ so that we can go from model to entity (`NSManagedObject` subclass) and vice\
    \ versa (Listing [2-2](#531999_1_En_2_Chapter.xhtml#PC5) and Listing [2-3](#531999_1_En_2_Chapter.xhtml#PC6)).\n\
    \n```\nstruct TaskModel {\n    var id: String!\n    var title: String!\n    var\
    \ icon: String!\n    var done: Bool!\n    var createdAt: Date!\n}\n```\n\n**Listing\
    \ 2-3** `TaskModel.swift` file content\n\n```\nstruct TasksListModel {\n    var\
    \ id: String!\n    var title: String!\n    var icon: String!\n    var tasks: [TaskModel]!\n\
    \    var createdAt: Date!\n}\n```\n\n**Listing 2-2** `TasksListModel.swift` file\
    \ content"
  raw: '#### Model


    In this folder, we will have everything related to business logic, data access
    and manipulation, extensions, constants, etc. In addition, we can create subfolders
    to group files with similar functions (Figure [2-5](#531999_1_En_2_Chapter.xhtml#Fig5)):
    Core Data, Extensions, Services, etc.


    ![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig5_HTML.jpg)


    A screenshot represents the files under the sub-folders of the folder model which
    is also a sub-folder under M V C, my to-dos. The sub-folders under the model are
    core data, models, services, extensions, and helpers.


    Figure 2-5


    Model layer files


    We have seen in the MVC model schema that the Model notifies the Controller (using
    the Observer design pattern).


    In this way, the Controller should subscribe to the changes that occur in the
    model.


    As the changes that occur in the model are basically those of adding, updating,
    or deleting data in the database, what we will do is use Core Data’s own capabilities
    to be informed of the changes. Core Data is capable of issuing notifications based
    on the changes produced.


    In our case, what we want to know is when a change occurs in the database, either
    by adding a new object, deleting it, or updating it, so we will use the following
    notification:


    ```

    NSManagedObjectContextObjectsDidChangeNotification

    ```


    To do this, we will simply have to add an observer for this notification in the
    *viewDidLoad* method of the controller that we want to be aware of the changes
    produced in the model:


    ```

    NotificationCenter.default.addObserver(self,

    selector: #selector(methodToExecute),

    name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,

    object: context)

    ```


    *NSNotification.Name.NSManagedObjectContextObjectsDidChange* is the name of the
    notification the controller subscribes to, *context* is the object we’re looking
    at, and *methodToExecute* is the method to run when a change is detected, for
    example:


    ```

    @objc func methodToExecute() {

    view.updateView()

    }

    ```


    ##### Core Data


    In this folder, we will have the `CoreDataManager.swift` file (which we created
    in Chapter [1](#531999_1_En_1_Chapter.xhtml)), along with the four files created
    by Xcode automatically for the database entities.


    ##### Models


    Here we have the models into which we can transform the database entities. In
    addition, we will create a protocol that the models must comply with, to transform
    from model to entity and vice versa (Listing [2-1](#531999_1_En_2_Chapter.xhtml#PC4)).


    ```

    protocol EntityModelMapProtocol {

    associatedtype EntityType: NSManagedObject

    func mapToEntityInContext(_ context: NSManagedObjectContext) -> EntityType

    static func mapFromEntity(_ entity: EntityType) -> Self

    }

    Listing 2-1

    EntityModelMapProtocol code

    ```


    In our application, we will define two models (*TaskModel* and *TasksListModel*),
    one for each entity in the database.


    Each of these models will also conform to the *EntityModelMapProtocol* protocol
    so that we can go from model to entity (*NSManagedObject subclass*) and vice versa
    (Listing [2-2](#531999_1_En_2_Chapter.xhtml#PC5) and Listing [2-3](#531999_1_En_2_Chapter.xhtml#PC6)).


    ```

    struct TaskModel {

    var id: String!

    var title: String!

    var icon: String!

    var done: Bool!

    var createdAt: Date!

    }

    Listing 2-3

    TaskModel.swift file content

    ```


    ```

    struct TasksListModel {

    var id: String!

    var title: String!

    var icon: String!

    var tasks: [TaskModel]!

    var createdAt: Date!

    }

    Listing 2-2

