    \ AddListDelegate) {\n        self.tasksListService = tasksListService\n     \
    \   self.delegate = delegate\n    }\n}\n```\n清单 6-30: `AddListInteractor`初始化\n\
    \n最后，我们实现使`AddListInteractor`遵循`AddListInteractorInput`协议的代码。在第一个方法（`navigateBack`）中，我们向呈现器指示要返回`Home`（我们已暂停返回按钮）。\n\
    \n在第二个方法（`addList`）中，我们使用通过`AddListModel.AddList.Request`传递的参数创建新的任务列表，并借助`TasksListService`实例将其保存到数据库。\n\
    \n接着，通过我们从`HomeInteractor`传递过来的委托，我们指示`Home`必须更新它要显示的任务列表。最后，我们通知`HomePresenter`必须返回`Home`（清单\
    \ 6-31）。\n\n```\nextension AddListInteractor\n    : AddListInteractorInput {\n\
    \    func navigateBack() {\n        presenter?.navigateBack()\n    }\n\n    func\
    \ addList(request: AddListModel.AddList.Request) {\n        let list = TasksListModel(\n\
    \            id: ProcessInfo().globallyUniqueString,\n            title: request.title,\n\
    \            icon: request.icon,\n            createdAt: Date()\n        )\n \
    \       tasksListService.saveTasksList(list)\n        delegate?.didAddList()\n\
    \        presenter?.navigateBack()\n    }\n}\n```\n清单 6-31: `AddListInteractor`遵循`AddListInteractorInput`\n\
    \n### `AddListPresenter`\n\n`AddListPresenter`展示了两个协议：`AddListPresenterInput`（对应于`AddListInteractorOutput`协议）和`AddListPresenterOutput`（对应于`AddListViewControllerInput`协议）（清单\
    \ 6-32）。\n\n```\ntypealias AddListPresenterInput = AddListInteractorOutput\ntypealias\
    \ AddListPresenterOutput = AddListViewControllerInput\n```\n清单 6-32: 通过`typealias`重命名协议，在`AddListInteractor`中将它们称为`Input`和`Output`\n\
    \n`AddListPresenter`的逻辑相当简单，因为你只需要实现`AddListPresenterInput`的单一方法，这一个方法告诉`HomeViewController`导航回`Home`（清单\
    \ 6-33）。\n\n```\nfinal class AddListPresenter {\n    weak var viewController:\
    \ AddListPresenterOutput?\n}\n\nextension AddListPresenter: AddListPresenterInput\
    \ {\n    func navigateBack() {\n        viewController?.navigateToHome()\n   \
    \ }\n}\n```\n清单 6-33: `AddListPresenter`代码，包含对`AddListPresenterInput`协议的遵循\n\n\
    ### `AddListModel`\n\n正如我们在`AddList`场景不同组件的代码中所见，`AddListModel`类用于在 VIP 循环中传递信息，我们只在传递包含创建列表标题和图标的`Request`时使用它。然而，出于教学目的，在创建类时我们展示了所有的结构体，即使其中有两个是空的（清单\
    \ 6-34）。\n\n```\nenum AddListModel {\n    enum AddList {\n        struct Request\
    \ {\n            var title: String\n            var icon: String\n        }\n\
