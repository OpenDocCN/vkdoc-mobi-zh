- fmt: '# Moving Forward


    Now you have a broader understanding of the most commonly used architectures in
    iOS app development (and how lesser-known ones work).


    But this does not end here; to continue advancing, you should apply these architectures
    in different projects and see for yourself the advantages they provide and the
    difficulties you may encounter.


    Whichever architecture or architectures you choose to develop your applications,
    I recommend that you delve into it, search for information (books, blogs, videos,
    conferences…), document yourself, and study projects in which they have been applied.
    In this way you will be able to see more clearly its advantages and disadvantages,
    possible problems in its implementation, or solutions to problems that keep you
    stuck at one point.


    Remember that by itself a given architecture is neither bad nor good, they all
    have advantages and disadvantages. And, although it is a very important part of
    the development of an application, you should not forget other important points
    to focus on:


    - TDD or test-driven development

    - SOLID principles

    - Dependency injection


    Finally, I hope you have found this book interesting and useful in your development
    career.


