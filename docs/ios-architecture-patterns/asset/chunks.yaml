    \ struct Response {\n            let list: TasksListModel\n        }\n    }\n\
    }\n```\n\n**Listing 6-20** `HomeModel` code\n\n### `HomeRouter`\n\nThe `HomeRouter`\
    \ contains the methods that allow you to navigate from the `Home` to the screen\
