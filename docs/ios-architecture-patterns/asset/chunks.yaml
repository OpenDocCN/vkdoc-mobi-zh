    for adding tasks), *fetchTasks* (to show the tasks in a list), *removeTask* (to
    delete a task), and *updateTask* (to update a task).


    For the input protocol, *TaskListViewControllerInput*, we define the methods *navigateBack*
    (to return to *Home*), *showAddTaskView* (to show the task addition screen), *presentLoadedTasks*
    (which returns the tasks of the selected list), *presentRemainingTasks* (which
    returns the tasks that remain after deleting one of them), and *presentUpdatedTasks*
    (which returns the tasks when one of them is updated).


    On the other hand, we will define a third protocol, *SelectedListDelegate*, which,
    as you will remember, is the one we use in the HomeInteractor to establish the
    delegate that will allow us to update the task lists of the *Home* after any change
    made in this scene (Listing [6-41](#531999_1_En_6_Chapter.xhtml#PC41)).


    ```

    protocol SelectedListDelegate: AnyObject {

    func updateLists()

    }

    Listing 6-41

    SelectedListDelegate protocol definition

    ```


    The next step is to prepare the initialization of the *TaskListController*. In
    the init method, we pass it an instance of the *TaskListView* (we pass it in the
    *TaskListConfigurator*) and make the *TaskListController* its delegate (so it
    will need to implement its methods). In addition, we make the first request to
    the *TaskListInteractor*, which is to retrieve the tasks from the selected list
    (Listing [6-42](#531999_1_En_6_Chapter.xhtml#PC42)).


    ```

    final class TaskListViewController: UIViewController {

    var interactor: TaskListInteractorInput?

    var router: TaskListRouterDelegate?

    private let taskListView: TaskListView

    init(taskListView: TaskListView) {

    self.taskListView = taskListView

    super.init(nibName: nil, bundle: nil)

    }

    required init?(coder: NSCoder) {

    fatalError("init(coder:) has not been implemented")

    }

    override func viewDidLoad() {

    super.viewDidLoad()

    taskListView.delegate = self

    self.view = taskListView

    fetchTasks()

    }

    private func fetchTasks() {

    let request = TaskListModel.FetchTasks.Request()

    interactor?.fetchTasks(request: request)

    }

    }

    ...

    extension TaskListViewController: TaskListViewDelegate {

    func navigateBack() {

    interactor?.navigateBack()

    }

    func addTask() {

    let request = TaskListModel.AddTask.Request()

    interactor?.addTask(request: request)

    }

    func deleteTaskAt(indexPath: IndexPath) {

    let request = TaskListModel.RemoveTask.Request(index: indexPath)

    interactor?.removeTask(request: request)

    }

    func updateTask(_ task: TaskModel) {

    let request = TaskListModel.UpdateTask.Request(task: task)

    interactor?.updateTask(request: request)

    }

    }

    Listing 6-42

    TaskListViewController initialization and TaskListViewDelegate conformation code

    ```


    Finally, since the *TaskListViewController* must conform to the *TaskListViewControllerInput*
    input protocol, we apply its methods (Listing [6-43](#531999_1_En_6_Chapter.xhtml#PC43)).


