  trans: '

    ### 工作原理


    可组合架构（The Composable Architecture）是一种遵循声明式（而非命令式）工作方式的架构，它遵循响应式编程原则，并依据 Redux
    模式组织代码。虽然它完全针对 SwiftUI（声明式框架）进行了优化，但也可用于 UIKit（命令式框架）。


    TCA 源于 Elm 架构，但现在，例如，TCA 的核心思想是每个 `View` 都拥有自己的 `Store`，尽管每个子 Store 都包含父视图状态的一个副本。每当一个动作被发送到视图的
    `Store` 时，它会被响应式地传递给父级 Store（图 7-5）。


    ![](img/531999_1_En_7_Fig5_HTML.png)


    该图描绘了父视图和子视图。父视图 Store 和子视图 Store 通过虚线连接。虚线代表从子级到父级以及从父级到子级的状态变更传播。


    **图 7-5** 每个 `View` 都有其 `Store`


    我们在图 7-5 中看到，在这种架构中，每个 `View` 都有一个 `Store`。现在让我们看看可组合架构由哪些组件构成（图 7-6）。


    ![](img/531999_1_En_7_Fig6_HTML.jpg)


    TCA 模式包含 `View`、`Action`、`Store`、`Reducer` 和 `State`。它们共同构成一个闭环周期，从视图开始，到 State
    结束，而 State 又进一步连接到视图。


    **图 7-6** TCA 模式


    ### 组件


    可组合架构基于六个组件：`State`、`View`、`Action`、`Reducer`、`Environment` 和 `Store`。


    #### State


    它是一组代表应用程序状态的变量，这些变量是更新 `View` 所必需的。


    #### View


    它负责接收和呈现 `State` 的数据。


    #### Action


    它通常是一个 `enum`，其枚举值包含了所有可能发生的动作：事件、通知、用户操作等。例如，一个动作既可以是从服务器接收数据，也可以是点击按钮。


    #### Reducer


    它本质上是一个函数，接收一个 `Action` 和当前 `State`，并将其转换为一个新的 `State`。它还负责返回任何 `Effect`（例如调用外部服务器）。


    #### Environment


    它涉及应用程序中可能存在的依赖关系（例如对服务器的外部调用），并包含与外部交互的逻辑。它类似于 Redux 中间件，通常通过依赖注入注入到 `Reducer`
    中。


    `Effect` 是 `Action` 的结果，由 `Reducer` 生成（并允许其与外部连接）。当 `Effect` 完成其工作时，它可以为 `Reducer`
    触发另一个动作。


    #### Store


    `Store` 是 `State`、`Action` 和 `Reducer` 的组合。它接收用户的操作，并将其与 `State` 一起发送给 `Reducer`。当生成新的状态时，`View`
    会更新。


    ## 优点与缺点


    为了与我们讨论过的其他架构保持一致，我们将看一下一些最重要的优点和缺点。


    ### 优点


    可组合架构的主要优点如下：


    *   数据流是单向的。

    *   `Reducer` 是唯一可以修改 `State` 的组件，这便于测试。

    *   应用程序由不同功能的组合构建而成。这允许单独设计、开发和测试每个功能。

    *   在 `Environment` 中，我们找到所有的依赖关系。这使得调试工作更加容易。同时，从开发环境切换到生产环境也更加简单。

    *   它允许以声明式方式开发视图。


    ### 缺点


    可组合架构的主要缺点如下：


    *   它更适用于 SwiftUI（声明式 UI）而非 UIKit（响应式 UI）。

    *   由于存在多个状态，它们之间的同步可能会变得复杂。

    *   与 RIB、TEA 或 Redux 一样，它不如我们在前几章深入讨论过的那些架构广为人知。这意味着可找到的资料较少，并且可能会让新手开发者望而生畏。


    ## 总结


    为了结束 iOS 软件架构这一主题，我们回顾了一些不太为人知或较少使用的架构（RIBs、TEA、Redux 和 TCA）。这些是更现代的架构，其基础与我们最初看到的（MVC、MVP、MVVM、VIP
    或 VIPER）有所不同，例如，体现在对状态的使用上。


    它们使用较少甚至需求也少这一事实意味着可用信息也较少，这可能会增加新手开发者的学习难度。但与其说是障碍，不如将其视为一个学习的挑战！


    脚注 1   2   3   4   5   6   7   8


    # 8. 结论


    ## 整洁架构的重要性


    我们已到达本书的结尾。我希望通过您的阅读，您已经深刻认识到，一方面，软件架构在我们应用开发中的重要性，另一方面，该架构应尽可能遵循整洁架构的原则。


    我们较为深入地研究了那些在今天可以被认为是 iOS 操作系统应用开发中使用最广泛或需求最迫切的架构：MVC、MVP、MVVM、VIPER 和 VIP。


    随后，我们以不那么具体的方式了解了一些架构，它们虽然不那么广为人知或常用，但为我们提供了应用开发的其他观点或方法：RIB、TEA、Redux 和 TCA。


    正如我们在研究本书中展示的不同架构时所看到的，并且我们一直在强调在应用开发中使用整洁架构的重要性，使用整洁架构将使我们能够：


    *   将业务逻辑隔离在一个层中，使其易于测试。

    *   隔离用户界面，使其仅负责显示提供给它的数据。此外，我们必须能够修改它而不影响其余代码。

    *   独立于所使用的任何库，这应允许我们更换一个库而不必大幅修改应用程序代码。

    *   独立于数据源，这样我们就可以更换数据源而不影响业务逻辑。


    简而言之，采用整洁架构开展工作应使我们能够开发出可扩展且可测试的应用程序，任何开发者都可以在这样的应用中工作。

