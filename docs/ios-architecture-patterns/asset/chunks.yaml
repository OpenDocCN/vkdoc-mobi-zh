- fmt: "### Tasks List Screen\n\nThis screen is navigated by selecting one of the\
    \ lists that appear in the Home. If we do not have any task created, an \"Empty\
    \ State\" will appear indicating how to create a task (Figure [1-8](#531999_1_En_1_Chapter.xhtml#Fig8)).\n\
    \n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig8_HTML.png)\n\n*Figure 1-8*\
    \ – Tasks List empty state\n\nThe user can interact on this screen at three points:\n\
    \n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig9_HTML.png)\n\n*Figure 1-9*\
    \ – Tasks List screen with an added task\n\n* Using the *Add Task* button, which\
    \ will allow us to create a new task (Figure [1-9](#531999_1_En_1_Chapter.xhtml#Fig9)).\n\
    * Selecting the circle to the right of each task will allow us to mark it as done\
    \ (Figure [1-10](#531999_1_En_1_Chapter.xhtml#Fig10)).\n* Deleting tasks using\
    \ a swipe gesture in the list (Figure [1-11](#531999_1_En_1_Chapter.xhtml#Fig11)).\n\
    \n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig11_HTML.png)\n\n*Figure 1-11*\
    \ – Delete task\n\n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig10_HTML.png)\n\
    \n*Figure 1-10* – Task checked as done\n\nAny modification on this screen (change\
    \ the status of a task or delete it) is automatically saved in the database.\n\
    \nIf the user wants to return to Home without creating any task, they simply have\
    \ to select the button with the return arrow located at the top left of the screen.\n\
    \n### Add Task Screen\n\nThis screen is navigated through the *Add Task* button\
    \ on the Tasks List screen and is displayed as a modal. Here, the user has to\
    \ indicate the title that will be given to the task and select an icon from those\
    \ that are displayed.\n\nWhen you select the *Add Task* button, the entered information\
    \ is saved in the database (Core Data) and you are returned to the Tasks List\
    \ screen.\n\nIf the user wants to return to the Tasks List screen without creating\
    \ any tasks, they simply have to drag the screen down (Figure [1-12](#531999_1_En_1_Chapter.xhtml#Fig12)).\n\
    \n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig12_HTML.png)\n\n*Figure 1-12*\
    \ – Add Task screen\n\n### App Development\n\nBefore we start working with the\
    \ different architectures in the next chapters, let's first see how to prepare\
    \ the application for it.\n\n#### Technologies Used\n\nFor the development of\
    \ this application with each of the architectures, Xcode 13.3 and Swift 5.6 have\
    \ been used.\n\nThe database used is Apple's own Core Data, and the views and\
    \ navigation between them have been developed directly with code, without using\
    \ `.xib` or `.storyboard` files.\n\n#### How to Remove Storyboard Dependence\n\
    \nTo develop the application (with the different architectures) without using\
    \ a storyboard, we have to do the following:\n\n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig13_HTML.png)\n\
    \n*Figure 1-13* – Welcome to Xcode screen\n\n* First of all, we open Xcode and\
    \ select the *Create a new Xcode project* option (Figure [1-13](#531999_1_En_1_Chapter.xhtml#Fig13)).\n\
    \n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig14_HTML.png)\n\n*Figure 1-14*\
    \ – App template selection screen\n\n* Next, we select the *App* template in iOS\
    \ (Figure [1-14](#531999_1_En_1_Chapter.xhtml#Fig14)).\n\n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig15_HTML.png)\n\
    \n*Figure 1-15* – Choose project options screen\n\n* The next step is to indicate\
    \ the name of the application (*Product Name*), select the development team and\
    \ the organization identifier, and choose *Storyboard* as the interface, *Swift*\
    \ as the language, and *Include Tests* (Figure [1-15](#531999_1_En_1_Chapter.xhtml#Fig15)).\n\
    \n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig16_HTML.png)\n\n*Figure 1-16*\
    \ – Project configuration screen\n\n* After creating the project, its configuration\
    \ screen will appear. On this screen we must remove the \"Main\" option in the\
    \ *Deployment Info* ➤ *Main Interface* section (Figure [1-16](#531999_1_En_1_Chapter.xhtml#Fig16)).\n\
    \n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig17_HTML.png)\n\n*Figure 1-17*\
    \ – Remove `Main.storyboard`\n\n* Then we delete the `Main.storyboard` file (Figure\
    \ [1-17](#531999_1_En_1_Chapter.xhtml#Fig17)).\n\n![](images/531999_1_En_1_Chapter/531999_1_En_1_Fig18_HTML.png)\n\
    \n*Figure 1-18* – Remove storyboard reference from `Info.plist`\n\n* Finally,\
    \ we access the `Info.plist` file, display its content, and remove the Storyboard\
    \ Name line: *Information Property List* ➤ *Application Scene Manifest* ➤ *Scene\
    \ Configuration* ➤ *Application Session Role* ➤ *Item 0* ➤ *Storyboard Name* (Figure\
    \ [1-18](#531999_1_En_1_Chapter.xhtml#Fig18)).\n\n* When working with a storyboard,\
    \ the window property is automatically initialized and the root view controller\
    \ is set as the initial view controller in the storyboard. When removing the storyboard,\
    \ we will have to do it ourselves.\n\nThis is done in the `SceneDelegate.swift`\
    \ file, modifying the content of the function\n\n```swift\nfunc scene(_ scene:\
    \ UIScene, willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
    \ {\n    guard let _ = (scene as? UIWindowScene) else {\n        return\n    }\n\
    }\n```\n\nby this code (this part of the code can be modified depending on the\
    \ needs of our application):\n\n```swift\nfunc scene(_ scene: UIScene, willConnectTo\
    \ session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
    \ {\n    if let windowScene = scene as? UIWindowScene {\n        let window =\
    \ UIWindow(windowScene: windowScene)\n        window.rootViewController = ViewController()\n\
    \        window.makeKeyAndVisible()\n        self.window = window\n    }\n}\n\
    ```\n\n#### Core Data Configuration\n\nIn this application we will use Apple's\
    \ database, Core Data, but we have not selected it when setting up the project\
    \ so that we can use our own database management class."
