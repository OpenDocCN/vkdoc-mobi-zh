    在第一个测试中，我们将验证：如果向 Presenter 传递一个包含列表的数组，它会将其传递给 ViewController，因此 ViewController
    的`lists`参数不会为空。


    在第二个测试中，我们将证明：调用`HomePresenter`的`showAddTaskList`方法会修改`MockHomeViewController`的`showAddList`参数以及`MockHomeRouter`的`navigateToTaskList`参数。


    最后一个`HomePresenter`测试检查：当调用`showSelectedList`方法并向其传递一个任务列表（就像我们已选中该列表一样）时，ViewController
    会接收到该列表，Router 也会接收到该列表并导航至`TaskList`场景。


    ## 总结


    Clean Swift 或 VIP 架构的设计初衷，主要是为了减少臃肿的 ViewController，它遵循 Clean Architecture 的原则，并采用单向信息流（我们称之为
    VIP 循环）。代码围绕所谓的“场景”进行组织，这些场景对应应用程序的各个界面（类似于 VIPER 架构中的“模块”）。


    VIP 架构具有许多优点，例如可扩展、易于维护和可测试。然而，它也有一些缺点。其中一个最重要的缺点可能是：由于使用了大量协议进行通信，该架构在初期可能显得复杂，甚至看起来有些过度设计。


    为了在这方面提供帮助，互联网上很容易找到一些模板。一旦将这些模板导入 Xcode，我们只需输入想要创建的场景名称，就能生成所有重复的代码。


    通过 VIP 架构，我们完成了对当今五种最常用架构的研究，指出了它们的优缺点，并将其应用于一个简单应用的开发。


    在下一章中，我们将从更宏观的角度探讨一些使用频率略低的架构，了解它们的结构基础以及各自的优缺点。


    脚注 1


    # 7. 其他架构模式


    ## 引言


    到目前为止，我们了解了那些被认为最常用和广为人知的架构：MVC、MVP、MVVM、VIPER 和 VIP。但我们可以找到不同的方案，每一种方案都试图解决其他架构可能存在的某些问题，或者为开发者的工作提供便利。


    在众多不同的方案中，我们将从以下角度来审视它们：其工作原理的基础是什么，组件是如何组织的，以及使用它们的优缺点：


    - RIBs：路由器、交互器和构建器

    - TEA：Elm 架构

    - Redux

    - TCA：可组合架构


    注意 本章仅旨在介绍一些可能不太为人所熟悉的架构。因此，我们只会简要介绍其起源、组件或工作原理，而不会像之前讨论的架构那样提供代码示例。


    ## RIBs：路由器、交互器和构建器

    '
- fmt: '### A Little History


    This architecture was developed by Uber^([^(13)](#fn13)) in 2017 as a solution
    to a series of situations they faced:


    - From a software point of view, the code had grown a lot and many features had
    been added. This led to Uber’s technical debt being enormous, which made it very
    difficult to add new features, limiting scalability.

    - Furthermore, an architecture was needed that could handle multiple states in
    an application.

    - The number of developers working at Uber had increased, so it was necessary
    to encourage the fact that each team could work on developing components separately
    without any impediment. That is, a modular architecture was sought.


    `RIB` is a cross-platform architecture developed by Uber for use in mobile applications
    involving multiple developers and nested states.


    Each `RIB` is made up of three components: `Router`, `Interactor`, and `Builder`,
    and represents an application state. Keep in mind that in the `RIB` architecture,
    since it is guided by business logic and not by views, each of the application’s
    functionalities may or may not have a view.


    This can be seen more clearly if we make a diagram of an application and indicate
    the different `RIB`s (Figure [7-1](#531999_1_En_7_Chapter.xhtml#Fig1)).


    ![](images/531999_1_En_7_Chapter/531999_1_En_7_Fig1_HTML.png)


    An `RIB` tree consists of root, signed in, app news, shop, signed out, log in
    and onboarding.


    Figure 7-1


    `RIB` tree example (in red, `RIB`s without `View`)


    As you can see in this figure, the *Signed in* and *Signed out* states do not
    present a view, since they only determine if the user already had an active session
    (so they continue along that path) or if they did not (so they would continue
    by the other route).


    Each of these states connects to the following states via an interface, with which
    they can pass whatever dependencies they need. In this way, each of these features
    can be worked on independently, without the fact of working on one of them affecting
    the rest (e.g., when each feature is developed by a different team).


    ### How It Works


    As we have just seen, we can represent an application and its state using different
    `RIB`s interconnected with each other, which we have represented in the form of
    a tree.


    In moving through the application and, therefore, of the different states, these
    states will be connected and disconnected.


    On the other hand, as we move through the `RIB` tree, information will flow from
    one `RIB` to another:


    - If it is downstream, that is, from a parent `RIB` to a child, the direction
    of communication is usually done as an emission to an Rx data stream.

    - If it is ascending, from a child to a parent, this communication usually takes
    place through a listening interface.


    ### Components


    Although we have mentioned the three main components in the `RIB` architecture
    (`Router`, `Interactor`, and `Builder`), we can find other components: `Component`,
    `Presenter`, and `View` (the latter two being optional, since, as we have seen,
    a `RIB` does not have to be associated to a `View`) (Figure [7-2](#531999_1_En_7_Chapter.xhtml#Fig2)).


    ![](images/531999_1_En_7_Chapter/531999_1_En_7_Fig2_HTML.png)


    An `RIB` schema consists of a router, interactor, presenter, view, builder, and
    component.


    Figure 7-2


    `RIB` schema


    #### Router


    `Router`s are in charge of attaching and detaching `RIB`s based on the events
    that occur in the `Interactor`s. The presence of the `RIB`s allows, among other
    things, to be able to test the `Interactor`s independently (since it is not necessary
    to know which ones are above or below) or reduce the amount of code of these `Interactor`s
    by taking the routing part.


    #### Interactor


    An `Interactor` contains the business logic of its `RIB`, and therefore all functions
    performed within it can only be limited to its life cycle. In this way, it is
    possible to avoid that there may be a disconnected `RIB` (and, therefore, its
    `Interactor`), but there are active subscriptions.


    An `Interactor` is the component where Rx subscriptions occur, how their state
    is changed, or which other `RIB`s need to connect.


    #### Builder


    The `Builder` of a `RIB` is like the Configurator that we saw in `VIPER`: it is
    in charge of instantiating the different components of the `RIB`.


    #### Component


    A `Component` is a help for the `Builder`s since they are in charge of managing
    the dependencies (both internal and external in a `RIB`). It is common practice
    to inject the component of a parent `RIB` into its children so that they have
    access to its properties.


    #### Presenter


    The `Presenter`, as we already know from other architectures, is in charge of
    transforming the information that comes from the `Interactor` into a format that
    can be displayed by the `View` (if the `RIB` has an associated `View`).


    #### View


    As in the case of the `Presenter`, it is an optional component (for `RIB`s with
    an associated `View`) and it contains the components that define the user interface.
    They should not have any associated logic and only display information and collect
    user interaction.


    ### Advantages and Disadvantages


    As in any architecture, there are advantages and disadvantages in its application.


    #### Advantages


    As advantages of the `RIB` architecture, we can highlight the following:


    - `Uber RIBs` is an open source project, so we can freely modify and adapt it
    for our applications.

    - This project is accompanied by a series of tools that allow us to quickly generate
    and configure the `RIB`s of our application to perform static analysis.

    - It is an architecture that can be used on both iOS and Android, which facilitates
    collaboration between teams on both platforms.

    - Thanks to the use of protocols, each `RIB` is independent of the rest, which
    allows us to simultaneously develop different `RIB`s without blocking between
    them.

    - Thanks to this use of protocols, and to the fact that each component of a `RIB`
    has clearly defined functions, the testability of each of them is facilitated.

    - It has been proven that it is a scalable architecture since, for example, in
    the case of Uber there are hundreds of developers working on the same source code.


    #### Disadvantages


    Among its disadvantages we have the following:


    - As in architectures such as `VIPER` or `VIP`, a large amount of repetitive code
    and a high number of components per `RIB` are generated. This is partially mitigated
    by the tools provided by Uber to generate these components.

    - The learning curve is significant and can be intimidating for developers who
    are just starting out or with little experience.

    - In addition, apart from the documentation (with some tutorials) provided by
    the project itself, there is not a large bibliography on the Internet, which makes
    it difficult to learn.

    - Communication between `RIB`s is based on `RxSwift` for iOS and `RxJava` or `Dagger2`
    for Android, which can be a problem if we want to use, or already use, another
    type of reactive library.


    ## The Elm Architecture


    ### A Little History


    `Elm` is a highly typed, pure functional programming language, developed by Evan
    Czaplicki in 2012,^([^(14)](#fn14)) intended for developing graphical user interfaces
    for web browsers.


    The `Elm Architecture` is born from the use of `Elm` and is a simple pattern to
    structure web apps.^([^(15)](#fn15)) In this architecture, we have a `Model` that
    contains the state of the application, a `View` that generates the HTML according
    to the `Model`, and an `Update` that transforms the `Model`. Its first application
    with Swift was on 2017.^([^(16)](#fn16))'
