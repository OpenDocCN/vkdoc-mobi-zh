- fmt: '# TasksListServiceTest


    This class contains the tests for the `TasksListService` class (we won’t put the
    tests for the `TaskService` class because they are very similar), as shown in
    Listing [2-31](#531999_1_En_2_Chapter.xhtml#PC46).


    ```

    class TasksListServiceTest: XCTestCase {

    var sut:TasksListServiceProtocol!

    var list: TasksListModel!

    override func setUpWithError() throws {

    sut = TasksListService(coreDataManager: InMemoryCoreDataManager())

    list = TasksListModel(id: "12345-67890",

    title: "Test List",

    icon: "test.icon",

    tasks: [TaskModel](),

    createdAt: Date())

    }

    override func tearDownWithError() throws { ... }

    func testSaveOnDB_whenSavesAList_shouldBeOneOnDatabase() {

    sut.saveTasksList(list)

    XCTAssertEqual(sut.fetchLists().count, 1)

    }

    func testSaveOnDB_whenSavesAList_shouldBeOneWithGivenIdOnDatabase() { ... }

    func testDeleteOnDB_whenSavesAListAndThenDeleted_shouldBeNoneOnDatabase() {

    sut.saveTasksList(list)

    XCTAssertNotNil(sut.fetchListWithId("12345-67890"))

    sut.deleteList(list)

    XCTAssertEqual(sut.fetchLists().count, 0)

    }

    }

    Listing 2-31

    TaskListServiceTest file code tests

    ```


    In the test `testSaveOnDB_whenSavesAList_shouldBeOneOnDatabase`, we first save
    a list to the database and then check that a list exists in the database (we use
    the `XCTAssertEqual` function to do this).


    In the test `testDeleteOnDB_whenSavesAListAndThenDeleted_shouldBeNoneOnDatabase`,
    we first save a list to the database, check that the list exists, then delete
    it, and finally check that it no longer exists in the database. In this case,
    we have combined two `XCTAssert` functions (`XCTAssertNotNil` and `XCTAssertEqual`).


    # Mocking Services


    To facilitate the testing of those classes that depend on access to the Model
    layer, we can use “mocks” of said model, which will allow us to simulate the behavior
    of real classes and, at the same time, more easily verify the results.


    In our case, we will set two such classes to “impersonate” the services: `MockTaskListService`
    and `MockTaskService` (Listing [2-32](#531999_1_En_2_Chapter.xhtml#PC49) and Listing
    [2-33](#531999_1_En_2_Chapter.xhtml#PC50)).


    ```

    class MockTaskService: TaskServiceProtocol {

    private var list: TasksListModel!

    required init(coreDataManager: CoreDataManager) {}

    convenience init(list: TasksListModel) {

    self.init(coreDataManager: CoreDataManager.shared)

    self.list = list

    }

    override func saveTask(_ task: TaskModel, in taskList: TasksListModel) {

    list = taskList

    list.tasks.append(task)

    }

    override func fetchTasksForList(_ taskList: TasksListModel) -> [TaskModel] {

    return list.tasks

    }

    override func updateTask(_ task: TaskModel) {

    guard let tasks = list.tasks else { return }

    var updatedTasks = [TaskModel]()

    tasks.forEach({

    var updatedTask = $0

    if $0.id == task.id {

    updatedTask.done.toggle()

    }

    updatedTasks.append(updatedTask)

    })

    list.tasks = updatedTasks

    }

    override func deleteTask(_ task: TaskModel) {

    list.tasks = list.tasks.filter({ $0.id != task.id })

    }

    }

    Listing 2-33

    MockTaskService code

    ```


    ```

    class MockTaskListService: TasksListServiceProtocol {

    private var lists: [TasksListModel] = [TasksListModel]()

    required init(coreDataManager: CoreDataManager) {}

    convenience init(lists: [TasksListModel]) {

    self.init(coreDataManager: CoreDataManager.shared)

    self.lists = lists

    }

    override func saveTasksList(_ list: TasksListModel) {

    lists.append(list)

    }

    override func fetchLists() -> [TasksListModel] {

    return lists

    }

    override func fetchListWithId(_ id: String) -> TasksListModel? {

    return lists.filter({ $0.id == id }).first

    }

    override func deleteList(_ list: TasksListModel) {

    lists = lists.filter({ $0.id != list.id })

    }

    }

    Listing 2-32

    MockTaskListService code

    ```


    As we can see, these classes override the methods of the original classes, but
    they work with the data that we pass to them and without accessing the database.


    # Controllers Testing


    The Controllers are the heart of the MVC and are the ones that act as intermediaries
    between the View and the Model, apart from managing the navigation between screens.
    For this reason, the tests that we will carry out in the Controllers will be focused
    on the interaction with the Model and on the navigation from one screen to another.


    For example, in the `HomeViewControllerTest.swift` file we have a test that allows
    us to verify that when the `deleteList` method is executed, the selected list
    of tasks will be deleted from the database (Listing [2-34](#531999_1_En_2_Chapter.xhtml#PC51)).


    ```

    class HomeViewControllerTest: XCTestCase {

    var sut: HomeViewController!

    var navigationController: MockNavigationController!

    var tasksListService: MockTaskListService!

    var taskService: MockTaskService!

    let list = TasksListModel(id: ProcessInfo().globallyUniqueString,

    title: "Test title",

    icon: "test.icon",

    tasks: [TaskModel](),

    createdAt: Date())

    override func setUpWithError() throws {

    tasksListService = MockTaskListService(lists: [list])

    taskService = MockTaskService()

    sut = HomeViewController(tasksListService: tasksListService, taskService: taskService)

    navigationController = MockNavigationController(rootViewController: UIViewController())

    navigationController.pushViewController(sut, animated: false)

    navigationController.vcIsPushed = false

    }

    override func tearDownWithError() throws {

    sut = nil

    navigationController = nil

    taskService = nil

    super.tearDown()

    }

    func testDeleteList_whenDeletedActionIsCalled_shouldBeNoneOnDatabase() {

    sut.deleteList(list)

    XCTAssertEqual(tasksListService.fetchLists().count, 0)

    }

    func testPushVC_whenAddListIsCalled_thenPushAddListVCCalled() {

    sut.addListAction()

    XCTAssertTrue(navigationController.vcIsPushed)

    }

    func testPushVC_whenTaskListIsCalled_thenPushTaskListVCCalled() {

    sut.selectedList(TasksListModel())

    XCTAssertTrue(navigationController.vcIsPushed)

    }

    }

    Listing 2-34

    HomeViewControllerTest code tests

    ```


    Here, we can see how the fact of injecting the dependencies of the `MockTasksListService`
    and `MockTaskService` classes when initializing the controller allows us to use
    those “mock” classes with controlled results (which speeds up testing).


    What we have done in the `testDeleteList_whenDeletedActionIsCalled_shouldBeNoneOnDatabase`
    test is, first, create a list of tasks and save it in the database, and then execute
    the `deleteList` method and check that it has been deleted from the database.


    In the `testPushVC_whenAddListIsCalled_thenPushAddListVCCalled`, what we do is
    execute the `addListAction` method and check that the `vcIsPushed` parameter is
    true, as we have defined in the `MockNavigationController`.


    The rest of the controllers in the application have similar unit tests, as you
    can see in the project code.'
