  raw: '#### Add List Screen


    This screen is responsible for adding task lists and the communication between
    its components. The connection between the different components is shown in Figure
    [3-7](#531999_1_En_3_Chapter.xhtml#Fig7).


    ![](images/531999_1_En_3_Chapter/531999_1_En_3_Fig7_HTML.png)


    A flowchart of add list screen components consists of add list view controller,
    add list view, add list presenter, and task list service.


    Figure 3-7


    Add list screen components communication schema


    ##### AddListViewController


    In the same way that we did in the *HomeViewController*, the *AddListViewController*
    class is in charge of initializing the Presenter and passing it to the view (Listing
    [3-10](#531999_1_En_3_Chapter.xhtml#PC11)).


    ```

    private func setupAddListView() {

    let presenter = AddListPresenter(addListView: addListView, tasksListService: TasksListService())

    addListView.delegate = self

    addListView.presenter = presenter

    self.view = addListView

    }

    Listing 3-10

    AddListPresenter instantiation in AddListViewController

    ```


    Once the list is created, or also by user action on the back button, it navigates
    back to the Home screen (which the *AddListView* has delegated, as shown in Listing
    [3-11](#531999_1_En_3_Chapter.xhtml#PC12)).


    ```

    extension AddListViewController: BackButtonDelegate {

    func navigateBack() {

    backToHome()

    }

    }

    Listing 3-11

    BackButtonDelegate implementation in AddListViewController

    ```


    ##### AddListView


    In *AddListView* the user can create a task list by selecting an icon and adding
    a title. All this information is passed to the *AddListPresenter* through the
    reference that the view maintains with it (Listing [3-12](#531999_1_En_3_Chapter.xhtml#PC13)).


    ```

    extension AddListView {

    @objc func addListAction() {

    guard titleTextfield.hasText else { return }

    presenter.addListWithTitle(titleTextfield.text!)

    }

    }

    extension AddListView: IconSelectorViewDelegate {

    func selectedIcon(_ icon: String) {

    presenter.setListIcon(icon)

    }

    }

    Listing 3-12

    Presenter gets info from the view

    ```


    The user can also exit this screen without creating any task lists. Simply select
    the navigate back button (the *HomePresenter* can call this method because when
    instantiating it we have passed it to the *AddListViewDelegate* protocol that
    it must comply with). In this case, the View delegates to the Controller to implement
    this action (Listing [3-13](#531999_1_En_3_Chapter.xhtml#PC14)).


    ```

    extension AddListView: AddListViewDelegate {

    func backToHome() {

    delegate?.navigateBack()

    }

    }

    Listing 3-13

    AddListView implements the AddListViewDelegate protocol

    ```


    ##### AddListPresenter


    The *AddListPresenter* is in charge of managing the creation of lists on this
    screen. In its initialization, we will pass both the *AddListView* (as a protocol)
    and the *TaskListService* that allows it to connect to the Model.


    In addition, we will initialize a list that will be completed with the information
    of the title and the icon that comes from the View (Listing [3-14](#531999_1_En_3_Chapter.xhtml#PC15)).


    ```

    class AddListPresenter {

    private weak var addListView: AddListViewDelegate?

    private var tasksListService: TasksListService!

    private var list: TasksListModel!

    init(addListView: AddListViewDelegate? = nil,

    tasksListService: TasksListService) {

    self.addListView = addListView

    self.tasksListService = tasksListService

    self.list = TasksListModel(id: ProcessInfo().globallyUniqueString,

    icon: "checkmark.seal.fill",

    createdAt: Date())

    }

    func setListIcon(_ icon: String) {

    list.icon = icon

    }

    func addListWithTitle(_ title: String) {

    list.title = title

    tasksListService.saveTasksList(list)

    addListView?.backToHome()

    }

    }

    Listing 3-14

    AddListPresenter code

    ```


    As you can see at the end of the *addListWithTitle* method, once the order to
    create the list has been sent to the service, the Presenter tells the view to
    execute the *backToHome* method to return to the Home screen (which, as we just
    saw, it does by delegation).


    #### Tasks List Screen


    This screen is responsible for displaying the tasks that make up a list, marking
    them as done, deleting them, and adding new ones. The communication between its
    components is shown in Figure [3-8](#531999_1_En_3_Chapter.xhtml#Fig8).


    ![](images/531999_1_En_3_Chapter/531999_1_En_3_Fig8_HTML.png)


    A flowchart of task list screen consists of task list view controller, task list
    view, task list presenter, task list service, and task service.


    Figure 3-8


    Tasks list screen components communication schema


    ##### TaskListViewController


    Unlike the MVC architecture, in which the *TaskListViewController* had communication
    functions with the Model, here it is only in charge of instantiating the *TaskListPresenter*
    (Listing [3-15](#531999_1_En_3_Chapter.xhtml#PC16)).


    ```

    private func setupTaskListView() {

    let presenter = TasksListPresenter(taskListView: taskListView,

    tasksListModel: tasksListModel,

    taskService: TaskService(),

    tasksListService: TasksListService())

    taskListView.delegate = self

    taskListView.presenter = presenter

    taskListView.setupView()

    self.view = taskListView

    }

    Listing 3-15

    TaskListPresenter instantiation in TaskListViewController

    ```


    And to manage navigation, either to the add tasks screen (*AddTaskViewController*)
    or to return to the Home screen, we''ll implement the methods associated with
    the *TaskListViewControllerDelegate* and *BackButtonDelegate* protocols (Listing
    [3-16](#531999_1_En_3_Chapter.xhtml#PC17)).


    ```

    extension TaskListViewController: TaskListViewControllerDelegate {

    func addTask() {

    let addTaskViewController = AddTaskViewController(tasksListModel: tasksListModel)

    addTaskViewController.modalPresentationStyle = .pageSheet

    present(addTaskViewController, animated: true)

    }

    }

    extension TaskListViewController: BackButtonDelegate {

    func navigateBack() {

    navigationController?.popViewController(animated: true)

    }

    }

    Listing 3-16

    Implementation of TaskListViewControllerDelegate and BackButtonDelegate methods

    ```


    ##### TaskListView


    In the *TaskListView*, similar to what we did in the *HomeView*, we have a *UITableView*
    element that shows us the information it gets from the *TaskListPresenter* (Listing
    [3-17](#531999_1_En_3_Chapter.xhtml#PC18)).


    ```

    extension TaskListView: UITableViewDelegate, UITableViewDataSource {

    ...

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    return presenter.numberOfTasks

    }

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: TaskCell.reuseId, for:
    indexPath) as! TaskCell

    cell.setParametersForTask(presenter.taskAtIndex(indexPath.row))

    cell.delegate = self

    return cell

    }

    func tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,
    forRowAt indexPath: IndexPath) {

    if editingStyle == .delete {

    presenter.removeTaskAtIndex(indexPath.row)

    tableView.deleteRows(at: [indexPath], with: .automatic)

    }

    }

    }

    Listing 3-17

    UITableViewDelegate and UITableViewDatasource implementation in TaskListView

    ```


    On the other hand, you have to implement the methods of the *TaskListViewDelegate*
    protocol that will allow the *TaskListPresenter* to update the view (Listing [3-18](#531999_1_En_3_Chapter.xhtml#PC19)).


    ```

    extension TaskListView: TaskListViewDelegate {

    func setPageTitle(_ title: String) {

    pageTitle.text = title

    }

    func reloadData() {

    tableView.reloadData()

    emptyState.isHidden = presenter.numberOfTasks > 0

    }

    }

    Listing 3-18

    TaskListViewDelegate methods implementation in TaskListView

    ```


    Finally, we must also implement the *TaskCellDelegate* protocol method associated
    with the *TaskCell* component, and that is the one that will allow us to modify
    the state of a task in the database via the *TaskListPresenter* (Listing [3-19](#531999_1_En_3_Chapter.xhtml#PC20)).


    ```

    extension TaskListView: TaskCellDelegate {

    func updateTask(_ task: TaskModel) {

    presenter.updateTask(task)

    }

    }

    Listing 3-19

    TaskCellDelegate method implementation in TaskListView

    ```'
