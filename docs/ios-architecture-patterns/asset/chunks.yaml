  raw: '##### TaskListInteractor


    Continuing with what we have seen in the other Interactors, the *TaskListInteractor*
    has two protocols: the input protocol, *TaskListInteractorInput*, which corresponds
    to the output protocol of the *TaskListViewController* (*TaskListViewControllerOutput*),
    and the output protocol (*TaskListInteractorOutput*), in which we define the methods
    which you will need to implement the *TaskListPresenter* (Listing [6-44](#531999_1_En_6_Chapter.xhtml#PC44)).


    ```

    protocol TaskListInteractorOutput: AnyObject {

    func navigateBack()

    func showAddTask(response: TaskListModel.AddTask.Response)

    func presentTasks(response: TaskListModel.FetchTasks.Response)

    func removedTask(response: TaskListModel.RemoveTask.Response)

    func updatedTask(response: TaskListModel.UpdateTask.Response)

    }

    typealias TaskListInteractorInput = TaskListViewControllerOutput

    Listing 6-44

    Definition of the TaskListInteractorOutput protocol and renaming the TaskListViewControllerOutput
    to TaskListInteractorInput

    ```


    Once the protocols are defined, we set the initialization of the *TaskListInteractor*.
    We will modify the *init* method to be able to pass, on the one hand, the list
    of tasks that we have selected in the *Home*, the two services that allow us to
    access the database, and the delegate that we pass from the *HomeInteractor* and
    that will allow us to update the *Home* before any change in the list tasks (Listing
    [6-45](#531999_1_En_6_Chapter.xhtml#PC45)).


    ```

    final class TaskListInteractor {

    var presenter: TaskListPresenterInput?

    private var tasksList: TasksListModel!

    private var taskService: TaskServiceProtocol!

    private var tasksListService: TasksListServiceProtocol!

    private var tasks = [TaskModel]()

    weak var delegate: SelectedListDelegate?

    init(tasksList: TasksListModel,

    taskService: TaskServiceProtocol,

    tasksListService: TasksListServiceProtocol,

    delegate: SelectedListDelegate) {

    self.tasksList = tasksList

    self.taskService = taskService

    self.tasksListService = tasksListService

    self.delegate = delegate

    }

    }

    Listing 6-45

    TaskListInteractor initialization

    ```


    Next, we need to make the *TaskListInteractor* conform to its input protocol,
    thereby allowing the *TaskListViewController* to communicate with it (Listing
    [6-46](#531999_1_En_6_Chapter.xhtml#PC46)).


    ```

    extension TaskListInteractor: TaskListInteractorInput {

    func navigateBack() {

    presenter?.navigateBack()

    }

    func addTask(request: TaskListModel.AddTask.Request) {

    let response = TaskListModel.AddTask.Response(addTaskDelegate: self, taskList:
    tasksList)

    presenter?.showAddTask(response: response)

    }

    func fetchTasks(request: TaskListModel.FetchTasks.Request) {

    guard let list = tasksListService.fetchListWithId(tasksList.id) else { return
    }

    tasksList = list

    tasks = tasksList.tasks.sorted(by: { $0.createdAt.compare($1.createdAt) == .orderedDescending
    })

    let response = TaskListModel.FetchTasks.Response(tasks: tasks)

    presenter?.presentTasks(response: response)

    }

    func removeTask(request: TaskListModel.RemoveTask.Request) {

    let task = tasks[request.index.row]

    taskService.deleteTask(task)

    tasks.remove(at: request.index.row)

    let response = TaskListModel.RemoveTask.Response(tasks: tasks)

    presenter?.removedTask(response: response)

    delegate?.updateLists()

    }

    func updateTask(request: TaskListModel.UpdateTask.Request) {

    taskService.updateTask(request.task)

    fetchTasks()

    let response = TaskListModel.UpdateTask.Response(tasks: tasks)

    presenter?.updatedTask(response: response)

    delegate?.updateLists()

    }

    }

    Listing 6-46

    TaskListInteractorInput conformation code

    ```


    If you notice, in the *addTask* method, when creating the response that we will
    pass to the presenter, we have added the *TaskListInteractor* as a delegate (*addTaskDelegate*).
    If you remember, we already did this in the *HomeInteractor* so that we can update
    the *Home* view when adding a new task list in the *AddTaskList* scene or when
    modifying a task list from a list from the scene we are looking at now.


    The last three methods, *fetchTasks*, *removeTask*, and *updateTask*, are the
    ones that require interaction with the database (through the *TasksListService*
    and the *TaskService*), and the subsequent call to the *TaskListPresenter* to
    update the view.


    Last but not least, we make the *TaskListInteractor* conform to the *AddTaskDelegate*
    protocol (which we will create when developing the *AddTask* scene) and which
    we have just explained is the protocol that will allow us to tell the current
    scene to update its view when adding a new one (Listing [6-47](#531999_1_En_6_Chapter.xhtml#PC47)).


    ```

    extension TaskListInteractor: AddTaskDelegate {

    func didAddTask() {

    fetchTasks(request: TaskListModel.FetchTasks.Request())

    delegate?.updateLists()

    }

    }

    Listing 6-47

    AddTaskDelegate conformation code

    ```


    ##### TaskListPresenter


    The first thing we do in the *TaskListPresenter*, as in the previous cases, is
    to rename the output protocol of the *TaskListInteractor* as the presenter’s input
    protocol and the input protocol of the *TaskListViewController* as output protocol
    (Listing [6-48](#531999_1_En_6_Chapter.xhtml#PC48)). Remember that we do this
    to have a better view of the Input/Output flow of each component.


    ```

    typealias TaskListPresenterInput = TaskListInteractorOutput

    typealias TaskListPresenterOutput = TaskListViewControllerInput

    Listing 6-48

    Renaming protocols with typealias to obtain the TaskListPresenter protocols

    ```


    Then, we only have to implement the methods of the *TaskListPresenterInput* protocol,
    to which the *TaskListPresenter* must conform (Listing [6-49](#531999_1_En_6_Chapter.xhtml#PC49)).


    ```

    final class TaskListPresenter {

    weak var viewController: TaskListPresenterOutput?

    }

    extension TaskListPresenter: TaskListPresenterInput {

    func navigateBack() {

    viewController?.navigateToHome()

    }

    func showAddTask(response: TaskListModel.AddTask.Response) {

    let viewModel = TaskListModel.AddTask.ViewModel(taskList: response.taskList, addTaskDelegate:
    response.addTaskDelegate)

    viewController?.showAddTaskView(viewModel: viewModel)

    }

    func presentTasks(response: TaskListModel.FetchTasks.Response) {

    let viewModel = TaskListModel.FetchTasks.ViewModel(tasks: response.tasks)

    viewController?.presentLoadedTasks(viewModel: viewModel)

    }

    func removedTask(response: TaskListModel.RemoveTask.Response) {

    let viewModel = TaskListModel.RemoveTask.ViewModel(tasks: response.tasks)

    viewController?.presentRemainingTasks(viewModel: viewModel)

    }

    func updatedTask(response: TaskListModel.UpdateTask.Response) {

    let viewModel = TaskListModel.UpdateTask.ViewModel(tasks: response.tasks)

    viewController?.presentUpdatedTasks(viewModel: viewModel)

    }

    }

    Listing 6-49

    TaskListPresenter conformation to TaskListPresenterInput protocol

    ```


    Observe how in the *showAddTask* method, we pass in the *ViewModel* the list to
    which we want to add the new task and the delegate that will allow us to update
    the view when adding the said task.


    In the last three methods, what we do is pass the tasks of the selected list inside
    the *ViewModel* (to show them when entering this scene and after deleting or updating
    some tasks).'
