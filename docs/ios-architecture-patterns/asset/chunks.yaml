- fmt: '### `TaskListModel`


    The information exchange model within this scene is shown in Listing [6-50](#531999_1_En_6_Chapter.xhtml#PC50).
    As you can see, we created a submodel for each of the processes within this scene
    (`FetchTasks`, `AddTask`, `RemoveTask`, and `UpdateTask`), although some of them
    have very similar parameters.


    ```

    enum TaskListModel {

    enum FetchTasks {

    struct Request {}

    struct Response {

    let tasks: [TaskModel]

    }

    struct ViewModel {

    let tasks: [TaskModel]

    }

    }

    enum AddTask {

    struct Request {}

    struct Response {

    let addTaskDelegate: AddTaskDelegate

    let taskList: TasksListModel

    }

    struct ViewModel {

    let taskList: TasksListModel

    let addTaskDelegate: AddTaskDelegate

    }

    }

    enum RemoveTask {

    struct Request {

    let index: IndexPath

    }

    struct Response {

    let tasks: [TaskModel]

    }

    struct ViewModel {

    let tasks: [TaskModel]

    }

    }

    enum UpdateTask {

    struct Request {

    let task: TaskModel

    }

    struct Response {

    let tasks: [TaskModel]

    }

    struct ViewModel {

    let tasks: [TaskModel]

    }

    }

    }

    Listing 6-50

    TaskListModel code

    ```


    ### `TaskListRouter`


    From what we have been seeing in the development of this scene, we know that we
    will have to establish two methods in the `TaskListRouter` (through its protocol):
    one that does not allow us to return to Home (`navigateBack`) and another that
    presents us with the scene of add new tasks (`showAddTaskView`) (Listing [6-51](#531999_1_En_6_Chapter.xhtml#PC51)).


    ```

    protocol TaskListRouterDelegate {

    func navigateBack()

    func showAddTaskView(delegate: AddTaskDelegate, tasksList: TasksListModel)

    }

    Listing 6-51

    TaskListRouterDelegate protocol definition

    ```


    The implementation of these methods is similar to that already seen in other cases.
    To return to Home, we simply have to use the `popViewController` method, and to
    display the `AddTask` scene, we will create and configure the `AddTaskViewController`,
    to which we will pass the `addTaskDelegate` (which we have already mentioned when
    developing the `TaskListInteractor`) and the `TasksListModel` object with the
    list of tasks to which we will add the new task (Listing [6-52](#531999_1_En_6_Chapter.xhtml#PC52)).


    ```

    final class TaskListRouter {

    weak var viewController: UIViewController?

    }

    extension TaskListRouter: TaskListRouterDelegate {

    func navigateBack() {

    viewController?.navigationController?.popViewController(animated: true)

    }

    func showAddTaskView(delegate: AddTaskDelegate, tasksList: TasksListModel) {

    let addTaskViewController = AddTaskViewController(addTaskView: AddTaskView())

    viewController?.present(AddTaskConfigurator.configure(addTaskViewController, delegate:
    delegate, tasksList: tasksList), animated: true)

    }

    }

    Listing 6-52

    TaskListRouterDelegate conformation code

    ```


    ## AddTask Scene


    This last screen of the application, AddTask, allows us to add new tasks to a
    task list. In Figure [6-6](#531999_1_En_6_Chapter.xhtml#Fig6), you can see the
    components that form it and the connections between them.


    ![](images/531999_1_En_6_Chapter/531999_1_En_6_Fig6_HTML.png)


    An illustration of the add task scene components that are router, configurator,
    view, interactor, presenter, task list, and task list service.


    Figure 6-6


    AddTask scene components and communication schema


    ### AddTaskConfigurator


    When developing the `AddTaskConfigurator`, together with the instantiation of
    the different components and the connection between them, we must bear in mind
    that in the `AddTaskInteractor` instance we must pass both the list of tasks to
    which we want to add the new tasks and the delegate (`AddTaskDelegate`) that will
    allow us to connect to the `TaskListInteractor` to update the task list view (Listing
    [6-53](#531999_1_En_6_Chapter.xhtml#PC53)).


    ```

    final class AddTaskConfigurator {

    static func configure( _ viewController: AddTaskViewController, delegate: AddTaskDelegate,
    tasksList: TasksListModel) -> AddTaskViewController {

    let interactor = AddTaskInteractor(tasksList: tasksList, taskService: TaskService(),
    delegate: delegate)

    let presenter = AddTaskPresenter()

    let router = AddTaskRouter()

    router.viewController = viewController

    presenter.viewController = viewController

    interactor.presenter = presenter

    viewController.interactor = interactor

    viewController.router = router

    return viewController

    }

    }

    Listing 6-53

    AddTaskConfigurator code

    ```


    ### AddTaskView


    The `AddTaskView` is quite similar in concept to the `AddTaskListView`, with a
    field to add the task title and an icon picker. But unlike the `AddTaskListView`,
    which had a button to go back to the previous screen if we didn’t want to add
    any new list, since we now present the screen on the `TaskList` scene and don’t
    navigate to it, we don’t need that button, since we can make the screen disappear
    with a downward swipe gesture.


    For this reason, the protocol that will allow us to communicate with the `AddTaskViewController`
    only has one method (`addTaskWith(title:_, icon:_)` (Listing [6-54](#531999_1_En_6_Chapter.xhtml#PC54)).


    ```

    protocol AddTaskViewDelegate: AnyObject {

    func addTaskWith(title: String, icon: String)

    }

    final class AddTaskView: UIView {

    weak var delegate: AddTaskViewDelegate?

    ...

    }

    extension AddTaskView {

    ...

    @objc func addTaskAction() {

    guard titleTextfield.hasText else { return }

    delegate?.addTaskWith(title: titleTextfield.text!, icon: icon)

    }

    }

    Listing 6-54

    AddTaskViewDelegate definition and use

    ```


    #### AddTaskViewController


    By reducing the capabilities of the view, we also reduce the code in the `AddTaskViewController`.
    Thus, the input and output protocols that we create for these classes, in this
    case, only contain one method each: `addTask` for output and `dismissView` for
    input (Listing [6-55](#531999_1_En_6_Chapter.xhtml#PC55)).


    ```

    protocol AddTaskViewControllerInput: AnyObject {

    func dismissView()

    }

    protocol AddTaskViewControllerOutput: AnyObject {

    func addTask(request: AddTaskModel.AddTask.Request)

    }

    Listing 6-55

    AdTaskViewControllerInput and AddTaskViewControllerOutput protocols definition

    ```


    On the other hand, we also define the protocol whose method should be implemented
    by the `TaskListInteractor` to tell it that it should update the view of the tasks
    in the list when adding a new one (Listing [6-56](#531999_1_En_6_Chapter.xhtml#PC56)).


    ```

    protocol AddTaskDelegate: AnyObject {

    func didAddTask()

    }

    Listing 6-56

    AddTaskDelegate protocol definition to allow AddTask scene to connect to TaskList
    scene

    ```


    With these protocols defined, we proceed to develop the `AddTaskViewController`
    initialization code, in which we basically assign the instance that we passed
    from the `AddTaskView` to the view, assign the delegate to it, and implement the
    method of the said delegate (Listing [6-57](#531999_1_En_6_Chapter.xhtml#PC57)).
    In this method, what we do is generate a request with the title and icon values
    of the new task, and we pass it to the interactor.


    ```

    final class AddTaskViewController: UIViewController {

    var interactor: AddTaskInteractorInput?

    var router: AddTaskRouterDelegate?

    private let addTaskView: AddTaskView

    init(addTaskView: AddTaskView) {

    self.addTaskView = addTaskView

    super.init(nibName: nil, bundle: nil)

    }

    required init?(coder: NSCoder) {

    fatalError("init(coder:) has not been implemented")

    }

    override func viewDidLoad() {

    super.viewDidLoad()

    addTaskView.delegate = self

    self.view = addTaskView

    }

    }

    ...

    extension AddTaskViewController: AddTaskViewDelegate {

    func addTaskWith(title: String, icon: String) {

    let request = AddTaskModel.AddTask.Request(title: title, icon: icon)

    interactor?.addTask(request: request)

    }

    }

    Listing 6-57

    AddTaskViewController initialization code

    ```


    Lastly, we need to make the `AddTaskViewController` conform to its input protocol,
    which in this case tells the Router to make the view disappear.


    ```

    extension AddTaskViewController: AddTaskViewControllerInput {

    func dismissView() {

    router?.dismissView()

    }

    }

    ```'
