    # 8. Conclusion


    ## The Importance of Clean Architecture


    We have reached the end of this book. I hope that throughout your reading, you
    have strengthened the importance of, on the one hand, Software Architecture in
    the development of our applications and, on the other, that this architecture
    adheres to, as much as possible, the principles of Clean Architecture.


    We have worked in some depth on the architectures that today we can consider the
    most used or most demanded in the development of applications for the iOS operating
    system: MVC, MVP, MVVM, VIPER, and VIP.


    Then we have seen some architectures in a less specific way that, although they
    are not as well known or used, provide us with other points of view or approaches
    to the development of applications: RIB, TEA, Redux, and TCA.


    As we have been seeing when we have studied the different architectures shown
    in this book, and we have been seeing the importance of using a Clean Architecture
    in the development of our applications, the use of Clean Architecture will allow
    us to:


    *   Isolate the business logic in a layer so that it is easily testable.

    *   Isolate the user interface, so that it is only responsible for displaying
    the data that is supplied to it. In addition, we must be able to modify it without
    affecting the rest of the code.

    *   Be independent of any library used, which should allow us to change one library
    for another without significantly modifying the application code.

    *   Be independent of the data sources, so that we can change one data source
    for another without affecting the business logic.


    In a few words, the fact of working with a Clean Architecture should allow us
    to develop scalable and testable applications, in which any developer can work.'
