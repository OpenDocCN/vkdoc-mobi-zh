- fmt: "### Communication Between Presenter and View\n\nWe will establish two protocols\
    \ between the `Presenter` and the `View`: one for Input to the `Presenter` and\
    \ one for Output (Listing [5-1](#531999_1_En_5_Chapter.xhtml#PC1)).\n\n```swift\n\
    // MARK: View Input (View -> Presenter)\nprotocol ViewToPresenterProtocol {\n\
    \    var view: PresenterToViewProtocol? { get set }\n    var interactor: PresenterToInteractorProtocol?\
    \ { get set }\n    var router: PresenterToRouterProtocol? { get set }\n}\n\n//\
    \ MARK: View Output (Presenter -> View)\nprotocol PresenterToViewProtocol { }\n\
    ```\n\n*Listing 5-1 Input/Output protocols of the Presenter with respect to the\
    \ View*\n\nWhen developing the `Presenter`, we will make it adhere to the input\
    \ protocol of the `View` with respect to the `Presenter` (`View` -> `Presenter`).\
    \ This protocol has three important parameters, which bind you to the `View`,\
    \ the `Interactor`, and the `Router` (Listing [5-2](#531999_1_En_5_Chapter.xhtml#PC2)).\n\
    \n```swift\nclass Presenter: ViewToPresenterProtocol {\n    var view: PresenterToViewProtocol?\n\
    \    var interactor: PresenterToInteractProtocol?\n    var router: PresenterToRouterProtocol?\n\
    \    ...\n}\n```\n\n*Listing 5-2 Application of the Input protocol between Presenter\
    \ and View*\n\nOn the other hand, when developing the `View`, we will make it\
    \ comply with the output protocol of the `Presenter` to the `View` (`Presenter`\
    \ -> `View`). To organize the code, we can apply it as an extension (Listing [5-3](#531999_1_En_5_Chapter.xhtml#PC3)).\n\
    \n```swift\nextension ViewController: PresenterToViewProtocol { }\n```\n\n*Listing\
    \ 5-3 Application of the Output protocol between Presenter and View*\n\n### Communication\
    \ Between Presenter and Interactor\n\nWe will establish two protocols between\
    \ the `Presenter` and the `Interactor`: one for Input to the `Presenter` and one\
    \ for Output (Listing [5-4](#531999_1_En_5_Chapter.xhtml#PC4)).\n\n```swift\n\
    // MARK: Interactor Input (Presenter -> Interactor)\nprotocol PresenterToInteractorHomeProtocol\
    \ {\n    var presenter: InteractorToPresenterProtocol? { get set }\n}\n\n// MARK:\
    \ Interactor Output (Interactor -> Presenter)\nprotocol InteractorToPresenterProtocol:\
    \ AnyObject { }\n```\n\n*Listing 5-4 Input/Output protocols of the Presenter with\
    \ respect to the Interactor*\n\nWhen we develop the `Presenter`, we will make\
    \ it comply with the Output protocol from the `Presenter` to the `Interactor`\
    \ (via an extension) (Listing [5-5](#531999_1_En_5_Chapter.xhtml#PC5)).\n\n```swift\n\
    extension Presenter: InteractorToPresenterProtocol { }\n```\n\n*Listing 5-5 Application\
    \ of the Output protocol between Presenter and Interactor*\n\nOn the other hand,\
    \ when developing the `Interactor`, it will have to be made to comply with the\
    \ input protocol between the `Presenter` and the `Interactor` (Listing [5-6](#531999_1_En_5_Chapter.xhtml#PC6)).\n\
    \n```swift\nclass Interactor: PresenterToInteractorHomeProtocol {\n    var presenter:\
    \ InteractorToPresenterHomeProtocol?\n    ...\n}\n```\n\n*Listing 5-6 Application\
    \ of the Output protocol between Presenter and Interactor*\n\n### Communication\
    \ Between Presenter and Router\n\nThe communication between the `Presenter` and\
    \ the `Router` is unidirectional, so we will only establish an Input protocol\
    \ between the `Presenter` and `Router`.\n\nThis protocol contains the main method\
    \ `createScreen()`, which is what allows us to create the `UIViewController` (`View`)\
    \ (Listing [5-7](#531999_1_En_5_Chapter.xhtml#PC7)).\n\n```swift\n// MARK: Router\
    \ Input (Presenter -> Router)\nprotocol PresenterToRouterProtocol {\n    func\
    \ createScreen() -> UIViewController\n}\n```\n\n*Listing 5-7 Input protocol of\
    \ the Presenter with respect to the Router*\n\nThis protocol will be the one that\
    \ the `Router` must comply with (Listing [5-8](#531999_1_En_5_Chapter.xhtml#PC8)).\n\
    \n```swift\nclass Router: PresenterToRouterProtocol {\n    static func createScreen()\
    \ -> UIViewController {\n        let presenter: ViewToPresenterProtocol & InteractorToPresenterProtocol\
    \ = Presenter()\n        let viewController = ViewController()\n        viewController.presenter\
    \ = presenter\n        viewController.presenter.router = Router()\n        viewController.presenter?.view\
    \ = viewController\n        viewController.presenter?.interactor = Interactor()\n\
    \        viewController.presenter?.interactor?.presenter = presenter\n       \
    \ return viewController\n    }\n}\n```\n\n*Listing 5-8 Application of the Output\
    \ protocol between Presenter and Router*\n\nThe content that we have shown for\
    \ these protocols is the basic one, which we will then have to complete (and in\
    \ some cases, modify) according to the needs of each screen.\n\n## VIPER Layers\n\
    \nUnlike the previous architectures in which we organized the files according\
    \ to their function – view, presenter, viewmodel… – in VIPER, we will divide them\
    \ by modules, one per screen, which will include the protocols, the view, the\
    \ introduction of the interactor, and the router; the services that allow us to\
    \ communicate with the database, and, finally, the component elements: database,\
    \ UI components, extensions, etc. (Figure [5-2](#531999_1_En_5_Chapter.xhtml#Fig2)).\n\
    \n![VIPER folder project structure](images/531999_1_En_5_Chapter/531999_1_En_5_Fig2_HTML.png)\n\
    \n*Figure 5-2 VIPER folder project structure*\n\n### Modules\n\nAs we just discussed,\
    \ the `Modules` folder will contain a subfolder for each screen. Each of these\
    \ subfolders has five files. Thus, for example, in the case of the `Home` screen,\
    \ we will have `HomeProtocols`, `HomeViewController`, `HomePresenter`, `HomeInteractor`,\
    \ and `HomeRouter`.\n\n### Services\n\nHere we will have the `TaskService` and\
    \ `TasksListService` classes, which allow us to send information to the database\
    \ (create, update, or delete it) or retrieve information from the database and\
    \ transform it into models.\n\n### Common\n\n#### Core Data\n\nIn this folder,\
    \ we will have the `CoreDataManager.swift` file, along with the four files automatically\
    \ created by Xcode for the database entities.\n\n#### Components\n\nIn this folder,\
    \ we will have those visual elements that we will use in the different screens:\
    \ labels, buttons, cells, etc.\n\n#### Models\n\nHere we have the models into\
    \ which we can transform the database entities. In addition, we will create a\
    \ protocol that the models must comply with, in order to transform from model\
    \ to entity and vice versa.\n\n#### Extensions\n\nIn this case, we have created\
    \ a `UIColor` extension to be able to easily access the colors created especially\
    \ for this application and an extension to the `NSManagedObject` class that will\
    \ prevent us from conflicting with contexts when we do the test part.\n\n####\
    \ Helpers\n\nThey contain the constant parameters that we will use in the application.\n\
    \n### MyToDos Application Screens\n\nWhen we work with the VIPER architecture,\
    \ it is not only important to be clear about what functions to introduce in each\
    \ of the components of this architecture, but also to establish the appropriate\
    \ communication protocols between each component, as we have previously mentioned.\n\
    \nUnlike the architectures that we have seen in previous chapters, in this case,\
    \ we will join the code of the `View` and the `Controller` to simplify the development.\n\
    \n#### AppDelegate and SceneDelegate\n\nBy having a function within the `Router`\
    \ class of each screen that instantiates each of the different classes needed\
    \ to configure the screen, access to the `Home` screen from the `SceneDelegate`\
    \ is simplified compared to the architectures we have seen previously (Listing\
    \ [5-9](#531999_1_En_5_Chapter.xhtml#PC9)).\n\n```swift\nfunc scene(_ scene: UIScene,\
    \ willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
    \ {\n    if let windowScene = scene as? UIWindowScene {\n        let window =\
    \ UIWindow(windowScene: windowScene)\n        window.backgroundColor = .white\n\
    \        window.rootViewController = HomeRouter.createScreen()\n        self.window\
    \ = window\n        window.makeKeyAndVisible()\n    }\n}\n```\n\n*Listing 5-9\
    \ Access to Home from SceneDelegate*"
  raw: '#### Communication Between Presenter and View


    We will establish two protocols between the Presenter and the View: one for Input
    to the Presenter and one for Output (Listing [5-1](#531999_1_En_5_Chapter.xhtml#PC1)).


    ```

    // MARK: View Input (View -> Presenter)

    protocol ViewToPresenterProtocol {

    var view: PresenterToViewProtocol? { get set }

    var interactor: PresenterToInteractorProtocol? { get set }

    var router: PresenterToRouterProtocol? { get set }

    }

    // MARK: View Output (Presenter -> View)

    protocol PresenterToViewProtocol { }

    Listing 5-1

    Input/Output protocols of the Presenter with respect to the View

    ```


    When developing the *Presenter*, we will make it adhere to the input protocol
    of the *View* with respect to the *Presenter* (*View* -> *Presenter*). This protocol
    has three important parameters, which bind you to the *View*, the *Interactor*,
    and the *Router* (Listing [5-2](#531999_1_En_5_Chapter.xhtml#PC2)).


    ```

    class Presenter: ViewToPresenterProtocol {

    var view: PresenterToViewProtocol?

    var interactor: PresenterToInteractProtocol?

    var router: PresenterToRouterProtocol?

    ...

    }

    Listing 5-2

    Application of the Input protocol between Presenter and View

    ```


    On the other hand, when developing the View, we will make it comply with the output
    protocol of the Presenter to the View (Presenter -> View). To organize the code,
    we can apply it as an extension (Listing [5-3](#531999_1_En_5_Chapter.xhtml#PC3)).


    ```

    extension ViewController: PresenterToViewProtocol { }

    Listing 5-3

    Application of the Output protocol between Presenter and View

    ```


    #### Communication Between Presenter and Interactor


    We will establish two protocols between the Presenter and the Interactor: one
    for Input to the Presenter and one for Output (Listing [5-4](#531999_1_En_5_Chapter.xhtml#PC4)).


    ```

    // MARK: Interactor Input (Presenter -> Interactor)

    protocol PresenterToInteractorHomeProtocol {

    var presenter: InteractorToPresenterProtocol? { get set }

    }

    // MARK: Interactor Output (Interactor -> Presenter)

    protocol InteractorToPresenterProtocol: AnyObject { }

    Listing 5-4

    Input/Output protocols of the Presenter with respect to the Interactor

    ```


    When we develop the Presenter, we will make it comply with the Output protocol
    from the Presenter to the Interactor (via an extension) (Listing [5-5](#531999_1_En_5_Chapter.xhtml#PC5)).


    ```

    extension Presenter: InteractorToPresenterProtocol { }

    Listing 5-5

    Application of the Output protocol between Presenter and Interactor

    ```


    On the other hand, when developing the Interactor, it will have to be made to
    comply with the input protocol between the Presenter and the Interactor (Listing
    [5-6](#531999_1_En_5_Chapter.xhtml#PC6)).


    ```

    class Interactor: PresenterToInteractorHomeProtocol {

    var presenter: InteractorToPresenterHomeProtocol?

    ...

    }

    Listing 5-6

    Application of the Output protocol between Presenter and Interactor

    ```


    #### Communication Between Presenter and Router


    The communication between the Presenter and the Router is unidirectional, so we
    will only establish an Input protocol between the Presenter and Router.


    This protocol contains the main method *createScreen*, which is what allows us
    to create the *UIViewController* (*View*) (Listing [5-7](#531999_1_En_5_Chapter.xhtml#PC7)).


    ```

    // MARK: Router Input (Presenter -> Router)

    protocol PresenterToRouterProtocol {

    func createScreen() -> UIViewController

    }

    Listing 5-7

    Input protocol of the Presenter with respect to the Router

    ```


    This protocol will be the one that the Router must comply with (Listing [5-8](#531999_1_En_5_Chapter.xhtml#PC8)).


    ```

    class Router: PresenterToRouterProtocol {

    static func createScreen() -> UIViewController {

    let presenter: ViewToPresenterProtocol & InteractorToPresenterProtocol = Presenter()

    let viewController = ViewController()

    viewController.presenter = presenter

    viewController.presenter.router = Router()

    viewController.presenter?.view = viewController

    viewController.presenter?.interactor = Interactor()

    viewController.presenter?.interactor?.presenter = presenter

    return viewController

    }

    }

    Listing 5-8

    Application of the Output protocol between Presenter and Router

    ```


    The content that we have shown for these protocols is the basic one, which we
    will then have to complete (and in some cases, modify) according to the needs
    of each screen.


    ### VIPER Layers


    Unlike the previous architectures in which we organized the files according to
    their function – view, presenter, viewmodel… – in VIPER, we will divide them by
    modules, one per screen, which will include the protocols, the view, the introduction
    of the interactor, and the router; the services that allow us to communicate with
    the database, and, finally, the component elements: database, UI components, extensions,
    etc. (Figure [5-2](#531999_1_En_5_Chapter.xhtml#Fig2)).


    ![](images/531999_1_En_5_Chapter/531999_1_En_5_Fig2_HTML.png)


    A screenshot of viper my to dos menu and the items below it. It consists of modules,
    services, and common, among others.


    Figure 5-2


    VIPER folder project structure


    #### Modules


    As we just discussed, the Modules folder will contain a subfolder for each screen.
    Each of these subfolders has five files. Thus, for example, in the case of the
    *Home* screen, we will have *HomeProtocols*, *HomeViewController*, *HomePresenter*,
    *HomeInteractor*, and *HomeRouter*.


    #### Services


    Here we will have the *TaskService* and *TasksListService* classes, which allow
    us to send information to the database (create, update, or delete it) or retrieve
    information from the database and transform it into models.


    #### Common


    ##### Core Data


    In this folder, we will have the CoreDataManager.swift file, along with the four
    files automatically created by Xcode for the database entities.


    ##### Components


    In this folder, we will have those visual elements that we will use in the different
    screens: labels, buttons, cells, etc.


    ##### Models


    Here we have the models into which we can transform the database entities. In
    addition, we will create a protocol that the models must comply with, in order
    to transform from model to entity and vice versa.


    ##### Extensions


    In this case, we have created a UIColor extension to be able to easily access
    the colors created especially for this application and an extension to the NSManagedObject
    class that will prevent us from conflicting with contexts when we do the test
    part.


    ##### Helpers


    They contain the constant parameters that we will use in the application.


    ### MyToDos Application Screens


    When we work with the VIPER architecture, it is not only important to be clear
    about what functions to introduce in each of the components of this architecture,
    but also to establish the appropriate communication protocols between each component,
    as we have previously mentioned.


    Unlike the architectures that we have seen in previous chapters, in this case,
    we will join the code of the View and the Controller to simplify the development.


    #### AppDelegate and SceneDelegate


    By having a function within the Router class of each screen that instantiates
    each of the different classes needed to configure the screen, access to the *Home*
    screen from the *SceneDelegate* is simplified compared to the architectures we
    have seen previously (Listing [5-9](#531999_1_En_5_Chapter.xhtml#PC9)).


    ```

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:
    UIScene.ConnectionOptions) {

    if let windowScene = scene as? UIWindowScene {

    let window = UIWindow(windowScene: windowScene)

    window.backgroundColor = .white

    window.rootViewController = HomeRouter.createScreen()

    self.window = window

    window.makeKeyAndVisible()

    }

    }

    Listing 5-9

    Access to Home from SceneDelegate

    ```'
  trans: "\n### 展示层与视图之间的通信\n\n我们将为 `Presenter` 和 `View` 建立两个协议：一个用于 `Presenter` 的输入，一个用于\
    \ `Presenter` 的输出（列表 5-1）。\n\n```swift\n// MARK: 视图输入 (视图 -> 展示层)\nprotocol ViewToPresenterProtocol\
    \ {\n    var view: PresenterToViewProtocol? { get set }\n    var interactor: PresenterToInteractorProtocol?\
    \ { get set }\n    var router: PresenterToRouterProtocol? { get set }\n}\n\n//\
    \ MARK: 视图输出 (展示层 -> 视图)\nprotocol PresenterToViewProtocol { }\n```\n\n*列表 5-1\
    \ 展示层相对于视图的输入/输出协议*\n\n开发 `Presenter` 时，我们将使其遵循视图相对于展示层的输入协议（`View` -> `Presenter`）。该协议包含三个重要参数，这些参数将其与\
    \ `View`、`Interactor` 和 `Router` 绑定（列表 5-2）。\n\n```swift\nclass Presenter: ViewToPresenterProtocol\
    \ {\n    var view: PresenterToViewProtocol?\n    var interactor: PresenterToInteractProtocol?\n\
    \    var router: PresenterToRouterProtocol?\n    ...\n}\n```\n\n*列表 5-2 展示层与视图之间输入协议的应用*\n\
    \n另一方面，开发 `View` 时，我们将使其符合展示层到视图的输出协议（`Presenter` -> `View`）。为了组织代码，我们可以将其作为扩展来应用（列表\
    \ 5-3）。\n\n```swift\nextension ViewController: PresenterToViewProtocol { }\n```\n\
    \n*列表 5-3 展示层与视图之间输出协议的应用*\n\n### 展示层与交互器之间的通信\n\n我们将为 `Presenter` 和 `Interactor`\
    \ 建立两个协议：一个用于 `Presenter` 的输入，一个用于 `Presenter` 的输出（列表 5-4）。\n\n```swift\n// MARK:\
    \ 交互器输入 (展示层 -> 交互器)\nprotocol PresenterToInteractorHomeProtocol {\n    var presenter:\
    \ InteractorToPresenterProtocol? { get set }\n}\n\n// MARK: 交互器输出 (交互器 -> 展示层)\n\
    protocol InteractorToPresenterProtocol: AnyObject { }\n```\n\n*列表 5-4 展示层相对于交互器的输入/输出协议*\n\
    \n开发 `Presenter` 时，我们将使其遵循从 `Presenter` 到 `Interactor` 的输出协议（通过扩展）（列表 5-5）。\n\n\
    ```swift\nextension Presenter: InteractorToPresenterProtocol { }\n```\n\n*列表 5-5\
    \ 展示层与交互器之间输出协议的应用*\n\n另一方面，开发 `Interactor` 时，必须使其符合 `Presenter` 与 `Interactor`\
    \ 之间的输入协议（列表 5-6）。\n\n```swift\nclass Interactor: PresenterToInteractorHomeProtocol\
    \ {\n    var presenter: InteractorToPresenterHomeProtocol?\n    ...\n}\n```\n\n\
    *列表 5-6 展示层与交互器之间输出协议的应用*\n\n### 展示层与路由器之间的通信\n\n`Presenter` 和 `Router` 之间的通信是单向的，因此我们只需在\
    \ `Presenter` 和 `Router` 之间建立一个输入协议。\n\n该协议包含主要方法 `createScreen()`，它允许我们创建 `UIViewController`（`View`）（列表\
    \ 5-7）。\n\n```swift\n// MARK: 路由器输入 (展示层 -> 路由器)\nprotocol PresenterToRouterProtocol\
    \ {\n    func createScreen() -> UIViewController\n}\n```\n\n*列表 5-7 展示层相对于路由器的输入协议*\n\
    \n该协议将是 `Router` 必须遵循的协议（列表 5-8）。\n\n```swift\nclass Router: PresenterToRouterProtocol\
    \ {\n    static func createScreen() -> UIViewController {\n        let presenter:\
    \ ViewToPresenterProtocol & InteractorToPresenterProtocol = Presenter()\n    \
    \    let viewController = ViewController()\n        viewController.presenter =\
    \ presenter\n        viewController.presenter.router = Router()\n        viewController.presenter?.view\
    \ = viewController\n        viewController.presenter?.interactor = Interactor()\n\
    \        viewController.presenter?.interactor?.presenter = presenter\n       \
    \ return viewController\n    }\n}\n```\n\n*列表 5-8 展示层与路由器之间输出协议的应用*\n\n我们为这些协议展示的内容是基础内容，之后我们需要根据每个屏幕的需求对其进行完善（某些情况下可能需修改）。\n\
    \n## VIPER 分层\n\n与之前按功能（视图、展示层、视图模型...）组织文件的架构不同，在 VIPER 中，我们将按模块划分文件，每个屏幕一个模块，其中包含协议、视图、交互器的引入和路由器；用于与数据库通信的服务；以及最后的组件元素：数据库、UI\
    \ 组件、扩展等（图 5-2）。\n\n![VIPER 文件夹项目结构](img/531999_1_En_5_Fig2_HTML.png)\n\n*图 5-2\
    \ VIPER 文件夹项目结构*\n\n### 模块\n\n正如我们刚才讨论的，`Modules` 文件夹将为每个屏幕包含一个子文件夹。这些子文件夹中的每一个都有五个文件。因此，例如，对于\
    \ `Home` 屏幕，我们将有 `HomeProtocols`、`HomeViewController`、`HomePresenter`、`HomeInteractor`\
    \ 和 `HomeRouter`。\n\n### 服务\n\n这里我们将有 `TaskService` 和 `TasksListService` 类，它们允许我们向数据库发送信息（创建、更新或删除）或从数据库检索信息并将其转换为模型。\n\
    \n### 公共部分\n\n#### Core Data\n\n在此文件夹中，我们将包含 `CoreDataManager.swift` 文件，以及由 Xcode\
    \ 为数据库实体自动创建的四个文件。\n\n#### 组件\n\n在此文件夹中，我们将包含在不同屏幕中使用的视觉元素：标签、按钮、单元格等。\n\n####\
    \ 模型\n\n这里我们有可以将数据库实体转换成的模型。此外，我们将创建一个模型必须遵循的协议，以便在模型和实体之间进行转换。\n\n#### 扩展\n\n\
    在本例中，我们创建了一个 `UIColor` 扩展，以便轻松访问为此应用专门创建的颜色；以及一个 `NSManagedObject` 类的扩展，该扩展将防止我们在进行测试部分时与上下文发生冲突。\n\
    \n#### 辅助工具\n\n它们包含我们将要在应用程序中使用的常量参数。\n\n### MyToDos 应用程序屏幕\n\n在使用 VIPER 架构时，不仅要清楚在此架构的每个组件中引入哪些功能，还要在每个组件之间建立适当的通信协议，正如我们之前提到的。\n\
    \n与我们在前几章中看到的架构不同，在本例中，我们将把 `View` 和 `Controller` 的代码合并，以简化开发。\n\n#### AppDelegate\
    \ 和 SceneDelegate\n\n通过在每个屏幕的 `Router` 类中拥有一个实例化配置屏幕所需各类的函数，从 `SceneDelegate`\
    \ 访问 `Home` 屏幕的方式比我们之前看到的架构更简化（列表 5-9）。\n\n```swift\nfunc scene(_ scene: UIScene,\
    \ willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
    \ {\n    if let windowScene = scene as? UIWindowScene {\n        let window =\
    \ UIWindow(windowScene: windowScene)\n        window.backgroundColor = .white\n\
    \        window.rootViewController = HomeRouter.createScreen()\n        self.window\
    \ = window\n        window.makeKeyAndVisible()\n    }\n}\n```\n\n*列表 5-9 从 SceneDelegate\
    \ 访问 Home*\n"
- fmt: '# Home Module


    The `Home` module is responsible for displaying the `Home` screen and establishing
    the different interactions with the user (Figure 5-3).


    ![](images/531999_1_En_5_Chapter/531999_1_En_5_Fig3_HTML.png)


    A schema consists of home view controller, home presenter, home interactor, and
    home router interconnected with each other.


    **Figure 5-3** Home module components communication schema


    ## Home Protocols


    From the diagram of the module corresponding to the `Home` screen and the examples
    we saw when studying the communication between the different components, we can
    establish the communication interfaces (protocols) for this case.


    The `Router` only has one input protocol; it contains the static method that creates
    the screen and the navigation methods for both the `AddListViewController` and
    the `TaskListViewController` (Listing 5-10).


    ```

    // MARK: Router Input

    protocol PresenterToRouterHomeProtocol {

    static func createScreen() -> UINavigationController

    func pushToAddListOn(view: PresenterToViewHomeProtocol)

    func pushToTaskListOn(view: PresenterToViewHomeProtocol, taskList: TasksListModel)

    }

    ```


    **Listing 5-10** `PresenterToRouterHomeProtocol` code


    Regarding the `View` and the `Presenter`, we have two protocols: one for Input
    and one for Output (regarding the `View`).


    The input protocol, `ViewToPresenterHomeProtol`, is what allows us to have the
    `View` communicate with the `Presenter`. Basically, we will have methods related
    to the construction and actions on the table that shows the task lists (Listing
    5-11).


    ```

    // MARK: View Input

    protocol ViewToPresenterHomeProtocol {

    var view: PresenterToViewHomeProtocol? { get set }

    var interactor: PresenterToInteractorHomeProtocol? { get set }

    var router: PresenterToRouterHomeProtocol? { get set }

    func viewDidLoad()

    func numberOfRowsInSection() -> Int

    func listAt(indexPath: IndexPath) -> TasksListModel

    func selectRowAt(indexPath: IndexPath)

    func deleteRowAt(indexPath: IndexPath)

    func addTaskList()

    }

    ```


    **Listing 5-11** `ViewToPresenterHomeProtocol` code


    On the other hand, we will have `PresenterToViewHomeProtocol`, the output protocol,
    which allows the `Presenter` to communicate with the `View` (Listing 5-12).


    ```

    // MARK: View Output

    protocol PresenterToViewHomeProtocol {

    func onFetchLists()

    func showEmptyState()

    func hideEmptyState()

    }

    ```


    **Listing 5-12** `PresenterToViewHomeProtocol` code


    Finally, we will have two protocols that relate to the `Presenter` and the `Interactor`.


    The first one, `PresenterToInteractorHomeProtocol`, shows us how the `Presenter`
    communicates with the `Interactor` (Listing 5-13).


    ```

    protocol PresenterToInteractorHomeProtocol {

    var presenter: InteractorToPresenterHomeProtocol? { get set }

    func loadLists()

    func getListAt(indexPath: IndexPath)

    func deleteListAt(indexPath: IndexPath)

    }

    ```


    **Listing 5-13** `PresenterToInteractorHomeProtocol` code


    The second, `InteractorToPresenterHomeProtocol`, shows the communication from
    the `Interactor` to the `Presenter` (Listing 5-14).


    ```

    protocol InteractorToPresenterHomeProtocol {

    func fetchedLists(taskLists: [TasksListModel])

    func selectedList(taskList: TasksListModel?)

    }

    ```


    **Listing 5-14** `InteractorToPresenterHomeProtocol` code


    These protocols are the end result of module development. Let’s see now where
    they come from and how we implement them.


    ## HomeRouter


    As we have seen, the `HomeRouter` is in charge of instantiating the `Home` screen
    and the navigation flow between it and other screens.


    In the case of the `HomeRouter` class, as shown in Listing 5-15, it must adopt
    the `PresenterToRouterHomeProtocol` protocol and must implement all of its methods.


    ```

    class HomeRouter: PresenterToRouterHomeProtocol {

    static func createScreen() -> UINavigationController {

    let presenter: ViewToPresenterHomeProtocol & InteractorToPresenterHomeProtocol
    = HomePresenter()

    let viewController = HomeViewController()

    viewController.presenter = presenter

    viewController.presenter.router = HomeRouter()

    viewController.presenter?.view = viewController

    viewController.presenter?.interactor = HomeInteractor(tasksListService: TasksListService())

    viewController.presenter?.interactor?.presenter = presenter

    let navigationController = UINavigationController(rootViewController: viewController)

    navigationController.interactivePopGestureRecognizer?.isEnabled = false

    navigationController.navigationBar.isHidden = true

    return navigationController

    }

    func pushToAddListOn(view: PresenterToViewHomeProtocol) {

    let addListController = AddListRouter.createScreen()

    let viewController = view as! HomeViewController

    viewController.navigationController?

    .pushViewController(addListController, animated: true)

    }

    func pushToTaskListOn(view: PresenterToViewHomeProtocol, taskList: TasksListModel)
    {

    let taskListController = TaskListRouter.createScreenFor(list: taskList)

    let viewController = view as! HomeViewController

    viewController.navigationController?

    .pushViewController(taskListController, animated: true)

    }

    }

    ```


    **Listing 5-15** `HomeRouter` code, adopting the `PresenterToRouterHomeProtocol`


    As you can see, we have a first method that creates the module and returns, in
    this case, a `UINavigationController` component (because it is the application’s
    home screen).


    The other two methods, `pushToAddListOn` and `pushToTaskListOn`, are responsible
    for building and navigating to the `AddList` and `TasksList` modules, respectively.
    In this way, we again separate the navigation logic from the `UIViewController`,
    limiting its functionality to the purely visual.


    ## HomeViewController


    The `HomeViewController` class is responsible for building and displaying the
    `View` with which the user will interact. Since the `View` interacts with the
    `Presenter`, we will have a `presenter` variable of type `ViewToPresenterHomeProtocol`,
    which allows the `View` to communicate with the `Presenter` (Listing 5-16).


    ```

    class HomeViewController: UIViewController {

    ...

    var presenter: ViewToPresenterHomeProtocol!

    override func loadView() {

    super.loadView()

    setupHomeView()

    presenter.viewDidLoad()

    }

    ...

    }

    private extension HomeViewController {

    ...

    @objc func addListAction() {

    presenter.addTaskList()

    }

    }

    extension HomeViewController: UITableViewDelegate {

    ...

    func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)
    {

    presenter.selectRowAt(indexPath: indexPath)

    }

    }

    extension HomeViewController: UITableViewDataSource {

    ...

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    return presenter.numberOfRowsInSection()

    }

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: ToDoListCell.reuseId,
    for: indexPath) as! ToDoListCell

    cell.setCellParametersForList(presenter.listAt(indexPath: indexPath))

    return cell

    }

    func tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,
    forRowAt indexPath: IndexPath) {

    if editingStyle == .delete {

    presenter.deleteRowAt(indexPath: indexPath)

    }

    }

    }

    extension HomeViewController: PresenterToViewHomeProtocol {

    func onFetchLists() {

    tableView.reloadData()

    }

    func showEmptyState() {

    emptyState.isHidden = false

    }

    func hideEmptyState() {

    emptyState.isHidden = true

    }

    }

    ```


    **Listing 5-16** `HomeViewController` code (only the parts in which there is interaction
    with the presenter are shown)


    In the final part of the code, we can see how the `HomeViewController` adopts
    the `PresenterToViewHomeProtocol` protocol. This is because, as we will see, the
    `HomePresenter` is related to the `HomeViewController` through a `view` variable
    of type `PresenterToViewHomeProtocol`.'
