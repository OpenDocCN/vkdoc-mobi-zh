- fmt: '# HomePresenterTest


    In order to test the `HomePresenter`, we will need to mock the `HomeViewController`
    ( `MockHomeViewController` ) and use the `MockHomeRouter` that we created when
    testing the `HomeViewController` (Listing [6-72](#531999_1_En_6_Chapter.xhtml#PC73)).


    ```

    import XCTest

    @testable import VIP_MyToDos

    final class HomePresenterTest: XCTestCase {

    private var sut: HomePresenter!

    private var viewController: MockHomeViewController!

    private var router: MockHomeRouter!

    let taskList = TasksListModel(id: "12345-67890",

    title: "Test List",

    icon: "test.icon",

    tasks: [TaskModel](),

    createdAt: Date())

    override func setUpWithError() throws {

    super.setUp()

    viewController = MockHomeViewController()

    router = MockHomeRouter()

    viewController.router = router

    sut = HomePresenter()

    sut.viewController = viewController

    }

    ...

    }

    Listing 6-72

    HomePresenterTest setup

    ```


    When setting the `MockHomeViewController`, keep in mind that it must conform to
    the `HomeViewControllerInput`, `AddListDelegate`, and `SelectedListDelegate` protocols
    (Listing [6-73](#531999_1_En_6_Chapter.xhtml#PC74)).


    ```

    final class MockHomeViewController: HomeViewControllerInput, AddListDelegate,
    SelectedListDelegate {

    var router: HomeRouterDelegate?

    private(set) var lists: [TasksListModel] = [TasksListModel]()

    private(set) var selectedList: TasksListModel = TasksListModel()

    private(set) var showAddList: Bool = false

    func reloadDataWithTaskList(viewModel: HomeModel.FetchTasksLists.ViewModel) {

    lists = viewModel.tasksLists

    }

    func showAddListView(viewModel: HomeModel.AddTasksList.ViewModel) {

    showAddList = true

    router?.showAddListView(delegate: self)

    }

    func showSelectedList(viewModel: HomeModel.SelectTasksList.ViewModel) {

    selectedList = viewModel.tasksList

    router?.showSelectedList(delegate: self, list: viewModel.tasksList)

    }

    func didAddList() {}

    func updateLists() {}

    }

    Listing 6-73

    MockHomeViewController code

    ```


    Finally, we set the different tests for the `HomePresenter` (Listing [6-74](#531999_1_En_6_Chapter.xhtml#PC75)).


    ```

    final class HomePresenterTest: XCTestCase {

    ...

    func testPresentLists_whenShouldPresentList_reloadDataIsCalled() {

    let response = HomeModel.FetchTasksLists.Response(tasksLists: [taskList])

    sut.presentTasksLists(response: response)

    XCTAssertTrue(!viewController.lists.isEmpty)

    }

    func testShowAddTaskList_whenAddTaskListIsSelected_shouldNavigateToAddTaskList()
    {

    let response = HomeModel.AddTasksList.Response(addListDelegate: viewController)

    sut.showAddTaskList(response: response)

    XCTAssertTrue(viewController.showAddList)

    XCTAssertTrue(router.navigateToAddList)

    }

    func testShowSelectedList_whenTaskListIsSelected_shouldNavigateToTasksList() {

    let response = HomeModel.SelectTasksList.Response(selectedListDelegate: viewController,
    tasksList: taskList)

    sut.showSelectedList(response: response)

    XCTAssertEqual(viewController.selectedList.id, taskList.id)

    XCTAssertTrue(router.navigateToTaskList)

    XCTAssertEqual(router.selectedList.id, taskList.id)

    }

    }

    Listing 6-74

    HomePresenterTest test cases code

    ```


    In the first test, we will verify that if we pass an array with a list to the
    Presenter, it will pass it to the ViewController, and therefore, its `lists` parameter
    will not be empty.


    In the second test, we will prove that calling the `showAddTaskList` method of
    the `HomePresenter` will modify the parameters `showAddList` of the `MockHomeViewController`
    and `navigateToTaskList` of the `MockHomeRouter`.


    The last `HomePresenter` test checks that when calling the `showSelectedList`
    method and passing it a list of tasks (as if we had selected it), the ViewController
    receives said list, and the Router also receives said list and navigates to the
    `TaskList` scene.


    ## Summary


    The Clean Swift or VIP architecture was thought, mainly, to reduce the massive
    ViewControllers following the indications of the Clean Architecture and following
    a unidirectional flow of information (what we have named as VIP cycle). The code
    is structured around the so-called "scenes," which would correspond to the application
    screens (similar to the "modules" in the VIPER architecture).


    The VIP architecture has many advantages, such as being scalable, easy to maintain,
    and testable. However, it also has some drawbacks. Perhaps one of the most important
    is that, because numerous protocols are used for communication, the use of this
    architecture can be complex at first and can seem overengineered.


    To help at this point, it is easy to find templates on the Internet that allow
    us, once introduced in Xcode, to create all the repetitive code simply by entering
    the name of the scene we want to create.


    With the VIP architecture, we have finished the study of the five most used architectures
    today, indicating their advantages and disadvantages and applying them to the
    development of a simple application.


    In the next chapter, we will deal with some other somewhat less used architectures,
    from a more general point of view, seeing what their structure is based on and
    what their advantages and disadvantages are.


    Footnotes [1](#531999_1_En_6_Chapter.xhtml#Fn1_source)


    # 7. Other Architecture Patterns


    ## Introduction


    Until now we have seen the architectures that we can consider most used and known:
    MVC, MVP, MVVM, VIPER, and VIP. But we can find different proposals, each of which
    seeks to solve some of the problems that other architectures may present or facilitate
    the work of developers.


    Of the different proposals that can be found, we are going to review the following
    from the point of view of what its operation is based on, how its components are
    structured, as well as the advantages and disadvantages of its use:


    - RIBs: Router, Interactor, and Builder

    - TEA: The Elm Architecture

    - Redux

    - TCA: The Composable Architecture


    Note This chapter is only intended to introduce some architectures that may seem
    less familiar. For this reason, we will simply give an introduction to its origin,
    components, or operation, without presenting code as we have done in the architectures
    already seen.


    ## RIBs: Router, Interactor, and Builder'
