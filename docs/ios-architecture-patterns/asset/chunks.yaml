    \ = homeView\n        fetchTasksLists()\n    }\n\n    private func fetchTasksLists()\
    \ {\n        let request = HomeModel.FetchTasksLists.Request()\n        interactor?.fetchTasksLists(request:\
    \ request)\n    }\n}\n\nextension HomeViewController: HomeViewDelegate {\n   \
    \ func addList() {\n        let request = HomeModel.AddTasksList.Request()\n \
