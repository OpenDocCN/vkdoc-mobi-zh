  raw: '##### HomeViewController


    We can see the *HomeViewController* as the start and end of a VIP cycle. As we
    have already seen when explaining the different protocols used in the VIP architecture,
    this class will be associated with two protocols: one with the methods that are
    used to send requests to the *HomeInteractor* (*HomeViewControllerOutput*) and
    another that will contain the methods that will be called by the *HomePresenter*
    and that you will need to implement the *HomeViewController* (*HomeViewControllerInput*)
    (Listing [6-11](#531999_1_En_6_Chapter.xhtml#PC11)).


    ```

    protocol HomeViewControllerInput: AnyObject {

    func reloadDataWithTaskList(viewModel: HomeModel.FetchTasksLists.ViewModel)

    func showAddListView(viewModel: HomeModel.AddTasksList.ViewModel)

    func showSelectedList(viewModel: HomeModel.SelectTasksList.ViewModel)

    }

    protocol HomeViewControllerOutput: AnyObject {

    func fetchTasksLists(request: HomeModel.FetchTasksLists.Request)

    func addList(request: HomeModel.AddTasksList.Request)

    func selectList(request: HomeModel.SelectTasksList.Request)

    func removeList(request: HomeModel.RemoveTasksList.Request)

    }

    Listing 6-11

    HomeViewControllerInput and HomeViewControllerOutput protocols

    ```


    In the process of instantiating the *HomeViewController*, we pass it an instance
    of the *HomeView* (we do it in the *HomeConfigurator*) and make its delegate the
    *HomeViewController*. For that reason, we’ll need to make this class conform to
    the *HomeViewDelegate* protocol (Listing [6-12](#531999_1_En_6_Chapter.xhtml#PC12)).


    ```

    final class HomeViewController: UIViewController {

    var interactor: HomeInteractorInput?

    var router: HomeRouterDelegate?

    private let homeView: HomeView

    init(homeView: HomeView) {

    self.homeView = homeView

    super.init(nibName: nil, bundle: nil)

    }

    required init?(coder: NSCoder) {

    fatalError("init(coder:) has not been implemented")

    }

    override func viewDidLoad() {

    super.viewDidLoad()

    homeView.delegate = self

    self.view = homeView

    fetchTasksLists()

    }

    private func fetchTasksLists() {

    let request = HomeModel.FetchTasksLists.Request()

    Interactor?.fetchTasksLists(request: request)

    }

    }

    extension HomeViewController: HomeViewDelegate {

    func addList() {

    let request = HomeModel.AddTasksList.Request()

    interactor?.addList(request: request)

    }

    func selectedListAt(index: IndexPath) {

    let request = HomeModel.SelectTasksList.Request(index: index)

    interactor?.selectList(request: request)

    }

    func deleteListAt(indexPath: IndexPath) {

    let request = HomeModel.RemoveTasksList.Request(index: indexPath)

    interactor?.removeList(request: request)

    }

    }

    Listing 6-12

    HomeViewController init and HomeViewDelegate conformation

    ```


    As you can see, in each of these three methods of the *HomeViewDelegate*, we create
    a request (in the *addList* method, the request is empty, but we include it didactically),
    and then we call the corresponding methods of the output protocol of the *HomeViewController*,
    and that you will need to implement the *HomeInteractor*.


    Finally, the *HomeViewController* must conform to the *HomeViewControllerInput*
    protocol, so that the presenter can pass information to it, either to update the
    interface or to navigate to another screen (Listing [6-13](#531999_1_En_6_Chapter.xhtml#PC13)).


    ```

    extension HomeViewController: HomeViewControllerInput {

    func showAddListView(viewModel: HomeModel.AddTasksList.ViewModel) {

    router?.showAddListView(delegate: viewModel.addListDelegate)

    }

    func reloadDataWithTaskList(viewModel: HomeModel.FetchTasksLists.ViewModel) {

    homeView.showTasks(lists: viewModel.tasksLists)

    }

    func showSelectedList(viewModel: HomeModel.SelectTasksList.ViewModel) {

    router?.showSelectedList(delegate: viewModel.selectedListDelegate, list: viewModel.tasksList)

    }

    }

    Listing 6-13

    HomeViewControllerInput conformation

    ```'
