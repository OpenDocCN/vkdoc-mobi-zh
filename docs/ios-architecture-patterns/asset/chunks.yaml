  raw: '##### HomePresenter


    The *HomeViewPresenter* is bound to the *HomeRouter*, the *HomeViewController*,
    and the *HomeViewInteractor*. Since the *HomePresenter* receives events from the
    *HomeViewController* and *HomeInteractor*, two *presenter* variables are created
    in both classes:


    ```

    // HomeViewController.swift

    var presenter:ViewToPresenterHomeProtocol!

    // HomeInteractor.swift

    var presenter: InteractorToPresenterHomeProtocol?

    ```


    Therefore, the *HomePresenter* class will need to adopt both protocols in order
    to communicate with those classes.


    So, we can create the class and make it conform to the *ViewToPresenterHomeProtocol*.
    This protocol includes the methods related to the information displayed in the
    view (*numberOfRowsInSection*, *listAt*) or the interaction with it (*selectRowAt*,
    *deleteRowAt*, *addTaskList*). We also introduce a *viewDidLoad* method that will
    allow us to load the task lists when entering this screen (Listing [5-17](#531999_1_En_5_Chapter.xhtml#PC18)).


    ```

    class HomePresenter: ViewToPresenterHomeProtocol {

    var view: PresenterToViewHomeProtocol?

    var interactor: PresenterToInteractorHomeProtocol?

    var router: PresenterToRouterHomeProtocol?

    var lists: [TasksListModel] = [TasksListModel]()

    func viewDidLoad() {

    NotificationCenter.default.addObserver(self,

    selector: #selector(fetchLists),

    name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,

    object: CoreDataManager.shared.mainContext)

    interactor?.loadLists()

    }

    func numberOfRowsInSection() -> Int {

    lists.count

    }

    func listAt(indexPath: IndexPath) -> TasksListModel {

    lists[indexPath.row]

    }

    func selectRowAt(indexPath: IndexPath) {

    interactor?.getListAt(indexPath: indexPath)

    }

    func deleteRowAt(indexPath: IndexPath) {

    interactor?.deleteListAt(indexPath: indexPath)

    }

    func addTaskList() {

    router?.pushToAddListOn(view: view!)

    }

    @objc private func fetchLists() {

    interactor?.loadLists()

    }

    }

    Listing 5-17

    HomePresenter code with the adoption of ViewToPresenterHomeProtocol

    ```


    On the other hand, and through an extension, we will make the *HomePresenter*
    conform to the *InteractorToPresenterHomeProtocol* protocol. In this way, when
    we make calls to the Interactor (such as when loading the lists, selecting a list,
    or deleting another), the implementation of the methods of this protocol will
    allow us to receive the information from the Interactor and act accordingly (show
    the lists or an *EmptyState*, or navigate to the *TaskList* screen), as shown
    in Listing [5-18](#531999_1_En_5_Chapter.xhtml#PC19).


    ```

    extension HomePresenter: InteractorToPresenterHomeProtocol {

    func fetchedLists(taskLists: [TasksListModel]) {

    lists = taskLists

    taskLists.count == 0 ? view?.showEmptyState() : view?.hideEmptyState()

    view?.onFetchLists()

    }

    func selectedList(taskList: TasksListModel?) {

    guard let taskList = taskList else {

    return

    }

    router?.pushToTaskListOn(view: view!, taskList: taskList)

    }

    }

    Listing 5-18

    Adoption of the InteractorToPresenterHomeProtocol in the HomePresenter

    ```


    ##### HomeInteractor


    The *HomeInteractor* contains the business logic of the application. It is responsible
    for communicating with the database and returning the necessary information to
    the *HomePresenter*.


    This class must implement the *PresenterToInteractorHomeProtocol* (Listing [5-19](#531999_1_En_5_Chapter.xhtml#PC20)).


    ```

    class HomeInteractor: PresenterToInteractorHomeProtocol {

    var presenter: InteractorToPresenterHomeProtocol?

    var lists: [TasksListModel] = [TasksListModel]()

    var tasksListService: TasksListServiceProtocol!

    init(tasksListService: TasksListServiceProtocol) {

    self.tasksListService = tasksListService

    }

    func loadLists() {

    lists = (tasksListService?.fetchLists())!

    presenter?.fetchedLists(taskLists: lists)

    }

    func getListAt(indexPath: IndexPath) {

    guard lists.indices.contains(indexPath.row) else {

    presenter?.selectedList(taskList: nil)

    return

    }

    presenter?.selectedList(taskList: lists[indexPath.row])

    }

    func deleteListAt(indexPath: IndexPath) {

    guard lists.indices.contains(indexPath.row) else { return }

    tasksListService.deleteList(lists[indexPath.row])

    }

    }

    Listing 5-19

    HomeInteractor code implementing the PresenterToInteractorHomeProtocol

    ```


    You can see how in the *init* method we inject an instance of *TasksListService*
    to make requests about task lists to the database.


    #### Add List Module


    This screen is responsible for adding task lists and communication between its
    components. The communication between these components according to the VIPER
    architecture is shown in Figure [5-4](#531999_1_En_5_Chapter.xhtml#Fig4).


    ![](images/531999_1_En_5_Chapter/531999_1_En_5_Fig4_HTML.png)


    A flowchart of an add list module consists of add list presenter, add list interactor,
    add list router, and home view controller.


    Figure 5-4


    Add list module components communication schema


    ##### AddListProtocols


    If we look at the schematic of this module, we can see that the methods used in
    communication between components have been reduced.


    Thus, for example, the *PresenterToRouterAddListProtocol* protocol only has one
    method, *popToHomeFrom* (to return to the *Home* screen), in addition to the one
    to create the screen (*createScreen*) (Listing [5-20](#531999_1_En_5_Chapter.xhtml#PC21)).


    ```

    // MARK: Router Input

    protocol PresenterToRouterAddListProtocol {

    static func createScreen() -> UIViewController

    func popToHomeFrom(view: PresenterToViewAddListProtocol)

    }

    Listing 5-20

    PresenterToRouterAddListProtocol code

    ```


    In the case of the *ViewToPresenterAddListProtocol* protocol, we will have two
    methods: *addList*, whose function is to send the created list to the database
    (and which is called when selecting the “Add List” button), and *backAction*,
    which returns the *Home* (Listing [5-21](#531999_1_En_5_Chapter.xhtml#PC22)).


    ```

    // MARK: View Input

    protocol ViewToPresenterAddListProtocol {

    var view: PresenterToViewAddListProtocol? { get set }

    var interactor: PresenterToInteractorAddListProtocol? { get set }

    var router: PresenterToRouterAddListProtocol? { get set }

    func addList(taskList: TasksListModel)

    func backAction()

    }

    Listing 5-21

    ViewToPresenterAddListProtocol code

    ```


    As in this case the actions carried out on this screen do not require updating,
    we will not have methods in the *PresenterToViewAddListProtocol* protocol (although
    we will keep it here to maintain a similar structure to the rest of the modules
    for its study).


    ```

    // MARK: View Output

    protocol PresenterToViewAddListProtocol {}

    ```


    The *PresenterToInteractorAddListProtocol*, which communicates the Presenter with
    the Interactor, has a single *addList* method, which will tell the Interactor
    to save the list of tasks passed to it to the database (Listing [5-22](#531999_1_En_5_Chapter.xhtml#PC24)).


    ```

    // MARK: Interactor Input

    protocol PresenterToInteractorAddListProtocol {

    var presenter: InteractorToPresenterAddListProtocol? { get set }

    func addList(taskList: TasksListModel)

    }

    Listing 5-22

    PresenterToInteractorAddListProtocol code

    ```


    Finally, we have the *InteractorToPresenterAddListProtocol* protocol, with a single
    method, *addedList*, which is used to communicate to the Presenter that the list
    of tasks has already been added to the database (Listing [5-23](#531999_1_En_5_Chapter.xhtml#PC25)).


    ```

    // MARK: Interactor Output

    protocol InteractorToPresenterAddListProtocol {

    func addedList()

    }

    Listing 5-23

    InteractorToPresenterAddListProtocol code

    ```'
