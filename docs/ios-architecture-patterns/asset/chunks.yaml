- fmt: '### `AddTaskViewController`


    Although it doesn’t contain any methods, to keep with the protocol structure,
    we’ll make the `AddTaskViewController` conform to the `PresenterToViewAddTaskProtocol`
    protocol.


    On the other hand, and thanks to the presenter variable (of the `ViewToPresenterAddTaskProtocol`
    type), we can tell the Presenter that we want to add a task (of the `TaskModel`
    type) (Listing [5-44](#531999_1_En_5_Chapter.xhtml#PC46)).


    ```

    class AddTaskViewController: UIViewController, PresenterToViewAddTaskProtocol
    {

    ...

    var presenter: ViewToPresenterAddTaskProtocol!

    ...

    }

    extension AddTaskViewController {

    ...

    @objc func addTaskAction() {

    guard titleTextfield.hasText else { return }

    taskModel.title = titleTextfield.text

    taskModel.icon = taskModel.icon ?? "checkmark.seal.fill"

    taskModel.done = false

    taskModel.id = ProcessInfo().globallyUniqueString

    taskModel.createdAt = Date()

    presenter.addTask(task: taskModel)

    }

    ...

    }

    ...

    Listing 5-44

    AddTaskViewController class

    ```


    ### `AddTaskPresenter`


    The `AddTaskPresenter` must conform to two protocols: `ViewToPresenterAddTaskProtocol`
    (with the method that the View can call) and `InteractorToPresenterAddTaskProtocol`
    (with the method that the Interactor can call).


    By conforming to the first protocol, `ViewToPresenterAddTaskProtocol`, the View
    will be able to call the `addTask` method and pass it the object with the tasks
    that the user wants to create. Then, the Presenter will communicate to the interactor
    to be in charge of creating a said task in the database (Listing [5-45](#531999_1_En_5_Chapter.xhtml#PC47)).


    ```

    class AddTaskPresenter: ViewToPresenterAddTaskProtocol {

    var view: PresenterToViewAddTaskProtocol?

    var interactor: PresenterToInteractorAddTaskProtocol?

    var router: PresenterToRouterAddTaskProtocol?

    func addTask(task: TaskModel) {

    interactor?.addTask(task: task)

    }

    }

    Listing 5-45

    AddTaskPresenter class conforming to ViewToPresenterAddTaskProtocol

    ```


    With the second protocol, `InteractorToPresenterAddTaskProtocol`, the interactor
    will be able to tell you that it has already created the task in the database,
    and therefore, you can tell the Router to dismiss the `AddTask` view (Listing
    [5-46](#531999_1_En_5_Chapter.xhtml#PC48)).


    ```

    extension AddTaskPresenter: InteractorToPresenterAddTaskProtocol {

    func addedTask() {

    router?.dismissFrom(view: view!)

    }

    }

    Listing 5-46

    AddTaskPresenter extension conforming to InteractorToPresenterAddTaskProtocol

    ```


    ### `AddTaskInteractor`


    Finally, we have the `AddTaskInteractor` that must conform to the `PresenterToInteractorAddTaskProtocol`
    protocol. This protocol, as we have seen, consists of a single method (`addTask`),
    which is what the Presenter will call to pass the `TaskModel` object that must
    be created in the database (Listing [5-47](#531999_1_En_5_Chapter.xhtml#PC49)).


    ```

    class AddTaskInteractor: PresenterToInteractorAddTaskProtocol {

    var presenter: InteractorToPresenterAddTaskProtocol?

    var taskList: TasksListModel!

    var taskService: TaskServiceProtocol!

    init(taskList: TasksListModel, taskService: TaskServiceProtocol) {

    self.taskList = taskList

    self.taskService = taskService

    }

    func addTask(task: TaskModel) {

    taskService?.saveTask(task, in: taskList)

    presenter?.addedTask()

    }

    }

    Listing 5-47

    AddTaskInteractor class conforming to PresenterToInteractorAddTaskProtocol

    ```


    ## VIPER-MyToDos Testing


    In the VIPER architecture, the two main components that we are going to test are
    the Interactors (which are the ones that apply the business logic) and the Presenters
    (which are the ones in charge of updating the View and communicating with both
    the Interactor and the Router).


    **Note:** Remember that you can find the complete project code, including the
    tests, in the repository associated with this book.


    Now, as an example, let’s see how to set unit tests to the `HomePresenter` and
    `HomeInteractor` classes of the `Home` module.


    ### `HomePresenter`


    First, we will prepare the setup of our test class. In this class, our `sut` (or
    `system under test`) will be the `HomePresenter`, but we will also create instances
    of the different classes to be able to re-create the environment and the different
    relations between the classes (Listing [5-48](#531999_1_En_5_Chapter.xhtml#PC50)).


    ```

    import XCTest

    @testable import VIPER_MyToDos

    class HomePresenterTest: XCTestCase {

    var sut: HomePresenter!

    var view: HomeViewController!

    var router: MockHomeRouter!

    var interactor: HomeInteractor!

    let taskList = TasksListModel(id: "12345-67890",

    title: "Test List",

    icon: "test.icon",

    tasks: [TaskModel](),

    createdAt: Date())

    override func setUpWithError() throws {

    sut = HomePresenter()

    let mockTaskListService = MockTaskListService(lists: [taskList])

    interactor = HomeInteractor(tasksListService: mockTaskListService)

    interactor.presenter = sut

    view = HomeViewController()

    view.presenter = sut

    router = MockHomeRouter()

    sut.interactor = interactor

    sut.view = view

    sut.router = router

    }

    override func tearDownWithError() throws {

    sut = nil

    super.tearDown()

    }

    ...

    }

    Listing 5-48

    Setup for HomePresenterTest

    ```


    Of all these instances, there is one that we have prepared as a `mock` (not counting
    `MockTaskListService`), `MockHomeRouter`, so that we can verify where the application
    would navigate when calling its methods (Listing [5-49](#531999_1_En_5_Chapter.xhtml#PC51)).


    ```

    import UIKit

    @testable import VIPER_MyToDos

    class MockHomeRouter: PresenterToRouterHomeProtocol {

    var isPushedToAddList: Bool = false

    var isPushedToTasksList: Bool = false

    var selectedTaskList: TasksListModel = TasksListModel()

    static func createScreen() -> UINavigationController {

    UINavigationController()

    }

    func pushToAddListOn(view: PresenterToViewHomeProtocol) {

    isPushedToAddList = true

    }

    func pushToTaskListOn(view: PresenterToViewHomeProtocol, taskList: TasksListModel)
    {

    selectedTaskList = taskList

    isPushedToTasksList = true

    }

    }

    Listing 5-49

    MockHomeRouter code

    ```


    As you can see, we have set a couple of variables, `isPushedToAddList` and `isPushedToTasksList`,
    with an initial value of `false`, but which change to `true` when calling the
    corresponding methods.


    Now we can move on to testing the different methods of the `HomePresenter`.


    First of all, we test that, how we have added a list when creating the `mockTaskListService`
    instance, once the `viewDidLoad` method is called (which if we look at the `HomePresenter`
    class calls the `loadLists` method of the Interactor, which is in charge of retrieving
    the lists of the database and return them to the Presenter), the number of rows
    in the table is 1 and, at the same time, an object exists in the table (Listing
    [5-50](#531999_1_En_5_Chapter.xhtml#PC52)).


    ```

    func testNumberOfRows_whenAddedOneList_shouldBeOne() {

    sut.viewDidLoad()

    XCTAssertTrue(sut.numberOfRowsInSection() == 1)

    }

    func testListAtIndex_whenAddedOneList_shouldExists() {

    sut.viewDidLoad()

    XCTAssertNotNil(sut.listAt(indexPath: IndexPath(row: 0, section: 0)))

    }

    Listing 5-50

    Testing the existence of one object in mocked TaskListService

    ```


    Next, we write a test that allows us to verify that if we select a cell (directly
    passing the `IndexPath`), on the one hand, the Router redirects us to the `TaskList`
    module and, on the other hand, we are passing the object with the selected list
    (Listing [5-51](#531999_1_En_5_Chapter.xhtml#PC53)).


    ```

    func testSelectRowAtIndex_whenAddedOneList_shouldReturnList() {

    sut.viewDidLoad()

    sut.selectRowAt(indexPath: IndexPath(row: 0, section: 0))

    XCTAssertTrue(router.isPushedToTasksList)

    XCTAssertTrue(router.selectedTaskList.id == "12345-67890")

    }

    Listing 5-51

    Test for selectRowAtIndex

    ```


    Now we will test the ability to delete lists. To do this, we call the `deleteRowAt`
    method (passing the `IndexPath` directly) and then check that the `lists` variable
    is empty (Listing [5-52](#531999_1_En_5_Chapter.xhtml#PC54)).'
