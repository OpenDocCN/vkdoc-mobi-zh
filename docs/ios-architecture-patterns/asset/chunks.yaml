    \ `Response` (to pass the responses from the `Interactor` to the `Presenter`),\
    \ and `ViewModel` (to pass the data from the `Presenter` to the `ViewController`)\
    \ (Listing [6-20](#531999_1_En_6_Chapter.xhtml#PC20)).\n\n```\nenum HomeModel\
    \ {\n    enum FetchTasksLists {\n        struct Request {}\n        struct Response\
