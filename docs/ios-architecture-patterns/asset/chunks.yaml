    ### `TaskListModel`


    此场景中的信息交换模型如代码清单 6-50 所示。可以看到，我们为此场景中的每个流程（`FetchTasks`、`AddTask`、`RemoveTask`
    和 `UpdateTask`）都创建了一个子模型，尽管其中一些子模型的参数非常相似。


    ```

    enum TaskListModel {

    enum FetchTasks {

    struct Request {}

    struct Response {

    let tasks: [TaskModel]

    }

    struct ViewModel {

    let tasks: [TaskModel]

    }

    }

    enum AddTask {

    struct Request {}

    struct Response {

    let addTaskDelegate: AddTaskDelegate

    let taskList: TasksListModel

    }

    struct ViewModel {

    let taskList: TasksListModel

    let addTaskDelegate: AddTaskDelegate

    }

    }

    enum RemoveTask {

    struct Request {

    let index: IndexPath

    }

    struct Response {

    let tasks: [TaskModel]

    }

    struct ViewModel {

    let tasks: [TaskModel]

    }

    }

    enum UpdateTask {

    struct Request {

    let task: TaskModel

    }

    struct Response {

    let tasks: [TaskModel]

    }

    struct ViewModel {

    let tasks: [TaskModel]

    }

    }

    }

    Listing 6-50

    TaskListModel code

    ```


    ### `TaskListRouter`


    从我们在开发此场景中看到的情况来看，我们知道需要在 `TaskListRouter`（通过其协议）中建立两个方法：一个不允许我们返回首页（`navigateBack`），另一个向我们展示添加新任务的场景（`showAddTaskView`）（代码清单
    6-51）。


    ```

    protocol TaskListRouterDelegate {

    func navigateBack()

    func showAddTaskView(delegate: AddTaskDelegate, tasksList: TasksListModel)

    }

    Listing 6-51

    TaskListRouterDelegate protocol definition

    ```


    这些方法的实现与其他案例中已实现的类似。要返回首页，我们只需使用 `popViewController` 方法；要显示 `AddTask` 场景，我们将创建并配置
    `AddTaskViewController`，并向其传递 `addTaskDelegate`（我们在开发 `TaskListInteractor` 时已提及）以及包含任务列表的
    `TasksListModel` 对象，新任务将添加到此列表中（代码清单 6-52）。


    ```

    final class TaskListRouter {

    weak var viewController: UIViewController?

    }

    extension TaskListRouter: TaskListRouterDelegate {

    func navigateBack() {

    viewController?.navigationController?.popViewController(animated: true)

    }

    func showAddTaskView(delegate: AddTaskDelegate, tasksList: TasksListModel) {

    let addTaskViewController = AddTaskViewController(addTaskView: AddTaskView())

    viewController?.present(AddTaskConfigurator.configure(addTaskViewController, delegate:
    delegate, tasksList: tasksList), animated: true)

    }

    }

    Listing 6-52

    TaskListRouterDelegate conformation code

    ```


    ## AddTask 场景


    应用的最后一个屏幕 AddTask，允许我们向任务列表中添加新任务。在图 6-6 中，您可以看到构成它的组件以及它们之间的连接。


    ![](img/531999_1_En_6_Fig6_HTML.png)


    一张说明添加任务场景组件的插图，包括路由器、配置器、视图、交互器、展示器、任务列表和任务列表服务。


    Figure 6-6


    AddTask 场景组件和通信架构


    ### AddTaskConfigurator


    在开发 `AddTaskConfigurator` 时，除了实例化不同组件并建立它们之间的连接，我们还必须牢记，在 `AddTaskInteractor`
    实例中，我们必须同时传递要添加新任务的任务列表和用于连接 `TaskListInteractor` 以更新任务列表视图的委托（`AddTaskDelegate`）（代码清单
    6-53）。


    ```

    final class AddTaskConfigurator {

    static func configure( _ viewController: AddTaskViewController, delegate: AddTaskDelegate,
    tasksList: TasksListModel) -> AddTaskViewController {

    let interactor = AddTaskInteractor(tasksList: tasksList, taskService: TaskService(),
    delegate: delegate)

    let presenter = AddTaskPresenter()

    let router = AddTaskRouter()

    router.viewController = viewController

    presenter.viewController = viewController

    interactor.presenter = presenter

    viewController.interactor = interactor

    viewController.router = router

    return viewController

    }

    }

    Listing 6-53

    AddTaskConfigurator code

    ```


    ### AddTaskView


    `AddTaskView` 在概念上与 `AddTaskListView` 非常相似，包含一个用于添加任务标题的字段和一个图标选择器。但与 `AddTaskListView`
    不同的是，后者有一个按钮，可以在我们不想添加新列表时返回上一屏幕。由于我们现在是在 `TaskList` 场景上弹出此屏幕，而不是导航到它，因此我们不需要那个按钮，因为我们可以通过向下滑动的手势来让此屏幕消失。


    因此，允许我们与 `AddTaskViewController` 通信的协议只有一个方法（`addTaskWith(title:_, icon:_)`）（代码清单
    6-54）。


    ```

    protocol AddTaskViewDelegate: AnyObject {

    func addTaskWith(title: String, icon: String)

    }

    final class AddTaskView: UIView {

    weak var delegate: AddTaskViewDelegate?

    ...

    }

    extension AddTaskView {

    ...

    @objc func addTaskAction() {

    guard titleTextfield.hasText else { return }

    delegate?.addTaskWith(title: titleTextfield.text!, icon: icon)

    }

    }

    Listing 6-54

    AddTaskViewDelegate definition and use

    ```


    #### AddTaskViewController


    通过减少视图的功能，我们也减少了 `AddTaskViewController` 中的代码。因此，我们为此类创建的输入和输出协议在这种情况下各自只包含一个方法：用于输出的
    `addTask` 和用于输入的 `dismissView`（代码清单 6-55）。


    ```

    protocol AddTaskViewControllerInput: AnyObject {

    func dismissView()

    }

    protocol AddTaskViewControllerOutput: AnyObject {

    func addTask(request: AddTaskModel.AddTask.Request)

    }

    Listing 6-55

    AdTaskViewControllerInput and AddTaskViewControllerOutput protocols definition

    ```


    另一方面，我们还定义了其方法应由 `TaskListInteractor` 实现的协议，以告诉它在添加新任务时更新列表中的任务视图（代码清单 6-56）。


    ```

    protocol AddTaskDelegate: AnyObject {

    func didAddTask()

    }

    Listing 6-56

    AddTaskDelegate protocol definition to allow AddTask scene to connect to TaskList
    scene

    ```


    定义了这些协议后，我们继续开发 `AddTaskViewController` 的初始化代码。在此代码中，我们基本上将从 `AddTaskView` 传递的实例分配给视图，向其分配委托，并实现该委托的方法（代码清单
    6-57）。在此方法中，我们所做的是生成一个包含新任务标题和图标值的请求，并将其传递给交互器。


    ```

    final class AddTaskViewController: UIViewController {

    var interactor: AddTaskInteractorInput?

    var router: AddTaskRouterDelegate?

    private let addTaskView: AddTaskView

    init(addTaskView: AddTaskView) {

    self.addTaskView = addTaskView

    super.init(nibName: nil, bundle: nil)

    }

    required init?(coder: NSCoder) {

    fatalError("init(coder:) has not been implemented")

    }

    override func viewDidLoad() {

    super.viewDidLoad()

    addTaskView.delegate = self

    self.view = addTaskView

    }

    }

    ...

    extension AddTaskViewController: AddTaskViewDelegate {

    func addTaskWith(title: String, icon: String) {

    let request = AddTaskModel.AddTask.Request(title: title, icon: icon)

    interactor?.addTask(request: request)

    }

    }

    Listing 6-57

    AddTaskViewController initialization code

    ```


    最后，我们需要让 `AddTaskViewController` 符合其输入协议，该协议在这种情况下指示路由器让视图消失。


    ```

    extension AddTaskViewController: AddTaskViewControllerInput {

    func dismissView() {

    router?.dismissView()

    }

    }

    ```

