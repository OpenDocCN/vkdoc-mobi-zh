- fmt: "### Add List Screen\n\nThis screen is responsible for adding task lists and\
    \ the communication between its components. The connection between the different\
    \ components is shown in Figure [3-7](#531999_1_En_3_Chapter.xhtml#Fig7).\n\n\
    ![](images/531999_1_En_3_Chapter/531999_1_En_3_Fig7_HTML.png)\n\nA flowchart of\
    \ add list screen components consists of `AddListViewController`, `AddListView`,\
    \ `AddListPresenter`, and `TaskListService`.\n\n**Figure 3-7** Add list screen\
    \ components communication schema\n\n#### AddListViewController\n\nIn the same\
    \ way that we did in the `HomeViewController`, the `AddListViewController` class\
    \ is in charge of initializing the Presenter and passing it to the view (Listing\
