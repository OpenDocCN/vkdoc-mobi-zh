    #### Add Task Module


    This screen is responsible for adding tasks to a given list. The communication
    between its components using a VIPER architecture is shown in Figure [5-6](#531999_1_En_5_Chapter.xhtml#Fig6).


    ![](images/531999_1_En_5_Chapter/531999_1_En_5_Fig6_HTML.png)


    A flowchart of an add task module consists of add task view controller, add task
    presenter, add task router, add task interactor, and task list view controller.


    Figure 5-6


    Add task module components communication schema


    ##### AddTaskProtocols


    Like the module for adding task lists, this module has few functionalities (basically,
    adding a task), so we continue to have the same protocols as in the rest of the
    modules, and the number of methods to apply is smaller.


    For example, the *PresenterToRouterAddTaskProtocol* will only present, in addition
    to the *createScreen* method, the *dismissFrom* method, which is the one that
    will contain the code to close the add task screen (Listing [5-39](#531999_1_En_5_Chapter.xhtml#PC41)).


    ```

    // MARK: Router Input

    protocol PresenterToRouterAddTaskProtocol {

    static func createScreenFor(list: TasksListModel) -> UIViewController

    func dismissFrom(view: PresenterToViewAddTaskProtocol)

    }

    Listing 5-39

    PresenterToRouterAddTaskProtocol code

    ```


    Of the two protocols associated with the relationship between View and Presenter,
    only the *ViewToPresenterAddTaskProtocol* will have content (this is the same
    case as the add task list module). This protocol will be implemented by the Presenter,
    and together with the variables that allow access to other classes of the module
    (*view*, *interactor*, and *router*), it only presents the *addTask* method (to
    add a new task) (Listing [5-40](#531999_1_En_5_Chapter.xhtml#PC42)).


    ```

    // MARK: View Input

    protocol ViewToPresenterAddTaskProtocol {

    var view: PresenterToViewAddTaskProtocol? { get set }

    var interactor: PresenterToInteractorAddTaskProtocol? { get set }

    var router: PresenterToRouterAddTaskProtocol? { get set }

    func addTask(task: TaskModel)

    }

    // MARK: View Output

    protocol PresenterToViewAddTaskProtocol {}

    Listing 5-40

    ViewToPresenterAddTaskProtocol and ViewToPresenterAddTaskProtocol code

    ```


    The *PresenterToInteractorAddTaskProtocol*, which will implement the *AddTaskInteractor*,
    presents a single function, *addTask*, which, as we will see later, will tell
    the database (via the *TaskService*) to add a new task and then tell the Presenter
    that it has already been added (Listing [5-41](#531999_1_En_5_Chapter.xhtml#PC43)).


    ```

    // MARK: Interactor Input

    protocol PresenterToInteractorAddTaskProtocol {

    var presenter: InteractorToPresenterAddTaskProtocol? { get set }

    func addTask(task: TaskModel)

    }

    Listing 5-41

    PresenterToInteractorAddTaskProtocol code

    ```


    Finally, we will have the *InteractorToPresenterAddTaskProtocol*, which will implement
    the *AddTaskPresenter*, and whose only method will be *addedTask*, with which
    we will be telling the *AddTaskPresenter* that the task has already been added
    (Listing [5-42](#531999_1_En_5_Chapter.xhtml#PC44)).


    ```

    // MARK: Interactor Output

    protocol InteractorToPresenterAddTaskProtocol {

    func addedTask()

    }

    Listing 5-42

    InteractorToPresenterAddTaskProtocol code.

    ```


    ##### AddTaskRouter


    As we have already seen in the previous modules, *AddTaskRouter* must implement
    the *PresenterToRouterAddTaskProtocol* protocol and, therefore, the methods that
    make it up: *createrScreenFor* and *dismissFrom* (Listing [5-43](#531999_1_En_5_Chapter.xhtml#PC45)).


    ```

    class AddTaskRouter: PresenterToRouterAddTaskProtocol {

    static func createScreenFor(list: TasksListModel) -> UIViewController {

    let presenter: ViewToPresenterAddTaskProtocol & InteractorToPresenterAddTaskProtocol
    = AddTaskPresenter()

    let viewController = AddTaskViewController()

    viewController.presenter = presenter

    viewController.presenter.router = AddTaskRouter()

    viewController.presenter?.view = viewController

    viewController.presenter?.interactor = AddTaskInteractor(taskList: list, taskService:
    TaskService())

    viewController.presenter?.interactor?.presenter = presenter

    return viewController

    }

    func dismissFrom(view: PresenterToViewAddTaskProtocol) {

    let viewController = view as! AddTaskViewController

    viewController.dismiss(animated: true)

    }

    }

    Listing 5-43

    AddTaskRouter class conforming to PresenterToRouterAddTaskProtocol

