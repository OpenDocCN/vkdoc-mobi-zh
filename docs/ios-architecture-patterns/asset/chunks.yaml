    \ navigationController, taskList: list)\n        taskListCoordinator.start()\n\
    \    }\n    \n    func gotoAddList() {\n        let addListCoordinator = AddListCoordinator(navigationController:\
    \ navigationController)\n        addListCoordinator.start()\n    }\n}\n```\n\n\
    *代码清单 4-40 — `HomeCoordinatorProtocol` 和 `HomeCoordinator` 类*\n\n如你所见，当将`HomeViewController`传递到导航控制器时，我们还传入了`HomeViewModel`的一个实例，该实例包含对协调器本身的引用，以便能够从该`ViewModel`管理导航调用，而无需经过视图和控制器。\n\
    \n因此，例如，如果我们调用`HomeCoordinator`的`gotoAddList`方法，它将负责实例化`AddListCoordinator`并调用其`start()`方法，该方法将在`AddListController`中加载导航堆栈（所有这些都无需经过`HomeViewController`）。\n\
    \n这样一来，`HomeViewController`只需负责实例化视图（我们知道，视图位于不同的类中）并将 ViewModel 传递给它即可（代码清单 4-41）。\n\
    \n```\nclass HomeViewController: UIViewController {\n    private var homeView:\
    \ HomeView!\n    private var viewModel: HomeViewModel!\n    \n    init(viewModel:\
    \ HomeViewModel) {\n        super.init(nibName: nil, bundle: nil)\n        self.viewModel\
    \ = viewModel\n    }\n    \n    required init?(coder: NSCoder) {\n        fatalError(\"\
    init(coder:) has not been implemented\")\n    }\n    \n    override func loadView()\
    \ {\n        super.loadView()\n        setupHomeView()\n    }\n    \n    private\
    \ func setupHomeView() {\n        homeView = HomeView(viewModel: viewModel)\n\
    \        self.view = homeView\n    }\n}\n```\n\n*代码清单 4-41 — `HomeViewController`\
    \ 的功能已大幅精简*\n\n通过在`HomeViewModel`的初始化中加入协调器，我们对之前 MVVM 架构中的`HomeViewModel`进行了如下改造（代码清单\
    \ 4-42）。\n\n```\nclass HomeViewModel {\n    var output: Output!\n    var input:\
    \ Input!\n    let coordinator: HomeCoordinator\n    \n    struct Input {\n   \
    \     ...\n        let addList: PublishRelay\n    }\n    ...\n    \n    init(tasksListService:\
    \ TasksListServiceProtocol, coordinator: HomeCoordinator) {\n        self.tasksListService\
    \ = tasksListService\n        self.coordinator = coordinator\n        \n     \
    \   // 输入\n        ...\n        let selectRow = PublishRelay()\n        _ = selectRow.subscribe(onNext:\
    \ { [self] indexPath in\n            coordinator.showSelectedList(listAtIndexPath(indexPath))\n\
    \        })\n        \n        let addList = PublishRelay()\n        _ = addList.subscribe(onNext:\
    \ { _ in\n            coordinator.gotoAddList()\n        })\n        \n      \
    \  self.input = Input(reload: reload, deleteRow: deleteRow, selectRow: selectRow,\
    \ addList: addList)\n        ...\n    }\n    ...\n}\n```\n\n*代码清单 4-42 — 为使用协调器而适配的\
    \ `HomeViewModel`*\n\n这样，当我们选择一个列表或点击`addListButton`时，无需在视图中执行调用，然后通过委托传递给控制器，而是直接从`HomeViewModel`本身调用`HomeCoordinator`来执行导航流程。\n\
    \n最后，在`HomeView`类中，我们修改了`bindingToModel`方法中与`addListButton`相关的绑定（代码清单 4-43）。\n\
    \n```\naddListButton.rx.tap\n    .bind(to: viewModel.input.addList)\n    .disposed(by:\
    \ disposeBag)\n```\n\n*代码清单 4-43 — `addListButton` 的新绑定*\n\n并且我们移除了与`viewModel.output.selectedList`的绑定，因为其通过`delegate`调用`HomeViewController`以加载`TasksListViewController`的功能，现在由`HomeViewModel`本身通过调用`HomeCoordinator`来完成了。\n\
    \n### 添加列表屏幕\n\n此屏幕允许我们创建一个新的任务列表，并且它只呈现一个可能的导航流程：返回主屏幕。因此，`AddListCoordinator`将只包含一个方法（除了`start()`方法之外），即`navigateBack`方法，该方法将在添加新列表或选择返回按钮时被调用（代码清单\
    \ 4-44）。\n\n```\nprotocol AddListCoordinatorProtocol {\n    func navigateBack()\n\
    }\n\nclass AddListCoordinator: Coordinator, AddListCoordinatorProtocol {\n   \
    \ var navigationController: UINavigationController\n    \n    init(navigationController:\
    \ UINavigationController) {\n        self.navigationController = navigationController\n\
    \    }\n    \n    func start() {\n        let viewModel = AddListViewModel(tasksListService:\
    \ TasksListService(), coordinator: self)\n        navigationController.pushViewController(AddListViewController(viewModel:\
    \ viewModel), animated: true)\n    }\n    \n    func navigateBack() {\n      \
    \  navigationController.popViewController(animated: true)\n    }\n}\n```\n\n*代码清单\
    \ 4-44 — `AddListCoordinatorProtocol` 和 `AddListCoordinator` 代码*\n\n这样一来，`AddListViewController`类的代码被精简到了最低限度（代码清单\
    \ 4-45）。\n\n```\nclass AddListViewController: UIViewController {\n    private\
    \ var addListView: AddListView!\n    private var viewModel: AddListViewModel!\n\
    \    \n    init(viewModel: AddListViewModel) {\n        super.init(nibName: nil,\
    \ bundle: nil)\n        self.viewModel = viewModel\n    }\n    ...\n    \n   \
    \ private func setupAddListView() {\n        addListView = AddListView(viewModel:\
    \ viewModel)\n        self.view = addListView\n    }\n}\n```\n\n*代码清单 4-45 — `AddListViewController`\
    \ 代码*\n\n现在，由于在创建`AddListViewModel`实例时，我们会传入协调器，因此我们不再需要在输入中添加与视图相关的关闭事件（用于添加列表（`addList`）或返回主屏幕（`dismiss`）），只需直接调用协调器的`navigateBack`方法即可。因此，我们可以移除\
    \ ViewModel 中的输出部分（代码清单 4-46）。\n\n```\nclass AddListViewModel {\n    ...\n   \
    \ var coordinator: AddListCoordinator!\n    \n    struct Input {\n        ...\n\
    \        let addList: PublishRelay\n        let dismiss: PublishRelay\n    }\n\
    \    ...\n    \n    init(tasksListService: TasksListServiceProtocol, coordinator:\
    \ AddListCoordinator) {\n        self.tasksListService = tasksListService\n  \
    \      self.coordinator = coordinator\n        ...\n        \n        let addList\
    \ = PublishRelay()\n        _ = addList.subscribe(onNext: { [self] _ in\n    \
    \        tasksListService.saveTasksList(list)\n            coordinator.navigateBack()\n\
    \        })\n        \n        let dismissView = PublishRelay()\n        _ = dismissView.subscribe(onNext:\
    \ { _ in\n            coordinator.navigateBack()\n        })\n        ...\n  \
    \  }\n}\n```\n\n*代码清单 4-46 — 在 `addList` 和 `dismiss` 输入中使用协调器*\n\n通过移除输出，我们也将移除之前在\
    \ MVVM 架构中，视图上与之对应的绑定（`viewModel.output.dismiss`）。\n"
