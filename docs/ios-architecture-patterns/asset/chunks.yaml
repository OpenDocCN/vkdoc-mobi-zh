    tasks = tasksList.tasks.sorted(by: { $0.createdAt.compare($1.createdAt) == .orderedDescending
    })

    pageTitle.setTitle(tasksList.title)

    tableView.reloadData()

    emptyState.isHidden = tasks.count > 0

    }

    Listing 2-23

    Upon receiving the information from TaskListViewController, the TaskListView is
    updated with the new data

    ```


    This View contains as user interaction elements a *UITableView* element that shows
    the tasks in the list and two buttons: the one to go back (to the Home screen)
    and the “*Add Task*” button (Listing [2-24](#531999_1_En_2_Chapter.xhtml#PC36)).


    As we have seen in previous cases, the actions on these elements are delegated
    to the controller.


    ```

    class TaskListView: UIView {

    ...

    weak var delegate: (TaskListViewDelegate & BackButtonDelegate)?

    ...

    }

    private extension TaskListView {

    ...

    @objc func backAction() {

    delegate?.navigateBack()

    }

    ...

    @objc func addTaskAction() {

    delegate?.addTaskAction()

    }

    }

    TaskListView extension: UITableViewDelegate, UITableViewDataSource {

    ...

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: TaskCell.reuseId, for:
    indexPath) as! TaskCell

    cell.setParametersForTask(tasksList[indexPath.row])

    cell.delegate = self

    return cell

    }

    ...

    func tableView(_ tableView: UITableView, commit editingStyle: UITableViewCell.EditingStyle,
    forRowAt indexPath: IndexPath) {

    if editingStyle == .delete {

    let task = tasksList[indexPath.row]

    list.remove(at: indexPath.row tasks)

    tableView.deleteRows(at: [indexPath], with: .automatic)

    delegate?.deleteTask(task)

    }

    }

    }

    extension TaskListView: TaskCellDelegate {

    func updateTask(_ task: TaskModel) {

    delegate?.updateTask(task)

    }

    }

    Listing 2-24

    TaskListView implementation

    ```


    But, as we can see in that code, the cells that are displayed in the table delegate
    (*TaskCellDelegate*) to it to implement the update of the cells when they are
    made to go to the Done state by pressing the circle to the right of each cell.


    Since the fact of updating the database is called from the Controller, we will
    have to pass the update call of the tasks from this View (*TaskListView*) to the
    Controller (*TaskListViewController*).


    #### Add Task Screen


    This screen is responsible for adding tasks to a given list and the communication
    between its components is shown in Figure [2-11](#531999_1_En_2_Chapter.xhtml#Fig11).


    ![](images/531999_1_En_2_Chapter/531999_1_En_2_Fig11_HTML.png)


    A block diagram represents the communication between the add task view, add task
    view controller, and task service. The add task view controller in the middle
    further updates the task in the task list view controller via delegate.


    Figure 2-11


    Add task screen components communication schema


    ##### AddTaskViewController


    The last screen, controlled by *AddTaskViewController*, is the one that will allow
    us to add new tasks to a list. This Controller presents references to the View,
    *AddTaskView*, and the model. The information entered by the user in the View
    will reach the Controller (as in the previous cases) by delegation (Listing [2-25](#531999_1_En_2_Chapter.xhtml#PC37)).


    ```

    class AddTaskViewController: UIViewController {

    private var taskService: TaskServiceProtocol!

    init(tasksListModel: TasksListModel,

    taskService: TaskServiceProtocol) {

    super.init(nibName: nil, bundle: nil)

    self.tasksListModel = tasksListModel

    self.taskService = taskService

    }

    ...

    private func setupAddTaskView() {

    addTaskView.delegate = self

    self.view = addTaskView

    }

    }

    extension AddTaskViewController: AddTaskViewDelegate {

    func addTask(_ task: TaskModel) {

    taskService.saveTask(task, in: tasksListModel)

    dismiss(animated: true)

    }

    }

    Listing 2-25

    AddTaskViewController initialization

    ```


    ##### AddTaskView


    This View has a structure similar to the one we use to create task lists, with
    a *UITextField* element, an *IconSelectorView* element, and a *UIButton* element.


    This View will both delegate task creation to the Controller via the protocol,
    as well as implement the method associated with the icon selector (Listing [2-26](#531999_1_En_2_Chapter.xhtml#PC38)).


    ```

    protocol AddTaskViewDelegate: AnyObject {

    func addTask(_ task: TaskModel)

    }

    class AddTaskView: UIView {

    ...

    weak var delegate: AddTaskViewDelegate?

    ...

    }

    private extension AddTaskView {

    ...

    @objc func addTaskAction() {

    guard titleTextfield.hasText else { return }

    taskModel.title = titleTextfield.text

    taskModel.icon = taskModel.icon ?? "checkmark.seal.fill"

    taskModel.done = false

    taskModel.id = ProcessInfo().globallyUniqueString

    taskModel.createdAt = Date()

    delegate?.addTask(taskModel)

    }

    func configureCollectionView() {

    ...

    iconSelectorView.delegate = self

    ...

    }

    }

    extension AddTaskView: IconSelectorViewDelegate {

    func selectedIcon(_ icon: String) {

    taskModel.icon = icon

    }

    }

    Listing 2-26

    AddTaskViewDelegate and AddTaskView implementation

    ```


    ### Testing


    In Chapter [1](#531999_1_En_1_Chapter.xhtml) we saw that one of the important
    points of a good architecture is that it is testable. Now we are going to write
    a few tests for the application that we have developed with the MVC architecture.


    For this, we will use Apple’s framework, XCTest, to write our tests. As an introduction
    to the development of tests, and that will serve us for the next chapters, what
    we will do is test the main functionalities, such as the services that work with
    the database, the user interactions, and the main navigation flows.


    #### How Should the Tests Be?


    In addition, when writing the tests, we have to take into account a series of
    criteria, known by the acronym FIRST:


    *   **Fast**: The tests must be fast.


    *   **Independent**: The tests must be independent of each other and not pass
    information so that they can be executed in any order.


    *   **Repeatable**: The result of the tests must be the same each time they are
    executed and in any environment.


    *   **Self-validating**: The tests must be self-validating, that is, whether they
    pass or fail must not depend on any external intervention (such as having to check
    a log).


    *   **Timely**: Tests should be written before the production code is written.
    This is what is known as *test-driven development*.'
