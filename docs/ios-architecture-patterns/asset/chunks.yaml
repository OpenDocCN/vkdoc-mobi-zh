  trans: "\n### HomeView\n\n`HomeView` 相比我们在 MVC 或 MVP 中看到的版本有相当大的变化，这种变化并非体现在构成它的组件上，而是体现在这些组件如何通过数据绑定来感知\
    \ `ViewModel` 状态的变化上。\n\n使用诸如 `RxSwift` 这样的库，使我们能够轻松地将视图的每个组件（及其属性）与模型关联起来。\n\n\
    为了在 `ViewModel` 和视图的组件之间建立所有连接，我们将创建一个方法对它们进行分组（清单 4-7）。\n\n```swift\nclass HomeView:\
    \ UIView {\n    ...\n    private let viewModel: HomeViewModel!\n    private let\
    \ disposeBag = DisposeBag()\n    init(frame: CGRect = .zero, viewModel: HomeViewModel)\
    \ {\n        self.viewModel = viewModel\n        ...\n        bindViewToModel(viewModel)\n\
    \    }\n}\nprivate extension HomeView {\n    ...\n    func bindViewToModel(_ viewModel:\
    \ HomeViewModel) {\n        ...\n    }\n}\n```\n\n*清单 4-7 在 HomeView 中设置 ViewModel*\n\
    \n我们现在来看一下将在这个方法中引入的代码，它将允许我们把视图的组件与 `ViewModel` 关联起来。\n\n我们从 `UITableView` 组件开始，它用于展示我们创建的任务列表。\n\
    \n首先，我们设置表格的委托（针对 `UITableViewDelegate` 协议），并且我们仅用它来设置行高（清单 4-8）。\n\n```swift\n\
    tableView.rx\n    .setDelegate(self)\n    .disposed(by: disposeBag)\n```\n\n*清单\
    \ 4-8 使用 RxSwift 设置 tableView 委托*\n\n接下来，我们需要向表格传递构成表格的分区数、行数以及项目数的信息。\n\n从我们将要使用的输入/输出约定的角度来看，任务列表将是\
    \ `ViewModel` 的一个输出（`output.lists`）。通过 `tableView.rx.items(cellIdentifier: ...)`\
    \ 语句可以将这些数据与 `UITableView` 元素关联起来（清单 4-9）。\n\n```swift\nviewModel.output.lists\n\
    \    .drive(tableView.rx.items(cellIdentifier: ToDoListCell.reuseId, cellType:\
    \ ToDoListCell.self)) { (_, list, cell) in\n        cell.setCellParametersForList(list)\n\
    \    }\n    .disposed(by: disposeBag)\n```\n\n*清单 4-9 将任务列表数据绑定到 tableView*\n\n\
    接着，我们设置指令，以便能够订阅用户对单元格的选择操作。这通过 `input.selectRow` 参数实现。每当用户选择一个单元格时，该单元格的 `IndexPath`\
    \ 信息将被发送给 `ViewModel`（清单 4-10）。\n\n当我们选中一个表格单元格并将相应的 `IndexPath` 值传递给 `ViewModel`\
    \ 时，`ViewModel` 会负责选择对应的 `TaskListModel` 对象，并将其作为输出发出。因此，我们必须从视图中绑定这个输出（`output.selectedList`）。\n\
    \n```swift\ntableView.rx.itemSelected\n    .bind(to: viewModel.input.selectRow)\n\
    \    .disposed(by: disposeBag)\n\nviewModel.output.selectedList\n    .drive(onNext:\
    \ { [self] list in\n        delegate?.selectedList(list)\n    })\n    .disposed(by:\
    \ disposeBag)\n```\n\n*清单 4-10 订阅 itemSelected 事件*\n\n与 `UITableView` 组件相关的最后一条指令是删除一个单元格（清单\
    \ 4-11）。每当用户执行删除单元格的手势时，ViewModel 将被要求从模型中将其删除。这个删除列表的事件将对应于 `ViewModel` 的一个输入（`input.deleteRow`）。\n\
    \n```swift\ntableView.rx.itemDeleted\n    .bind(to: viewModel.input.deleteRow)\n\
    \    .disposed(by: disposeBag)\n```\n\n*清单 4-11 订阅 itemDeleted 事件*\n\n完成 `UITableView`\
    \ 组件的绑定后，我们接着绑定 `EmptyState` 组件和 `AddListButton` 组件。\n\n在第一种情况下，我们想要根据是否创建了任务列表来隐藏或显示\
    \ `EmptyState`。ViewModel 必须告知视图是否应该显示 `EmptyState`，因此这条信息将是一个输出（`output.hideEmptyState`），如清单\
    \ 4-12 所示。\n\n```swift\nviewModel.output.hideEmptyState\n    .drive(emptyState.rx.isHidden)\n\
    \    .disposed(by: disposeBag)\n```\n\n*清单 4-12 将 ViewModel 的 output.hideEmptyState\
    \ 属性绑定到 EmptyState 的 isHidden 属性*\n\n当 ViewModel 中的 `hideEmptyState` 取值为 false\
    \ 时，`EmptyState` 将会可见；而当其取值为 true 时，则会被隐藏。\n\n关于 `AddListButton`，在 MVC 或 MVP 中，我们为其分配了一个目标（target），该目标会调用我们创建的一个方法；而使用\
    \ `RxSwift`，我们只需将待执行的代码分配给 `tap` 方法即可（清单 4-13）。\n\n```swift\naddListButton.rx.tap\n\
    \    .asDriver()\n    .drive(onNext: { [self] in\n        delegate?.addList()\n\
    \    })\n    .disposed(by: disposeBag)\n```\n\n*清单 4-13 为 AddListButton 设置 tap\
    \ 事件*\n\n在 `bindToViewModel` 方法的末尾，我们执行的操作是调用重新加载表格的方法，正如我们将在 ViewModel 中看到的，该方法会调用数据库以获取已创建的任务列表。\n\
    \n```swift\nviewModel.input.reload.accept(())\n```\n\n正如我们在 RxSwift 的介绍中所提到的，我们不会深入探讨这个库提供的能力（它们非常多）。我们只是展示如何在我们的示例项目中使用其中的一些功能。\n"
- fmt: "### `HomeViewModel`\n\nAs we have seen at the beginning of this chapter, the\
    \ `ViewModel` is responsible for obtaining the data from the `Model` and preparing\
    \ it to be displayed by the `View` and also manages the business logic of this\
    \ `View`.\n\nAs we have seen in the development of the `HomeView`, the `HomeViewModel`\
    \ must have three inputs (`reload`, `deleteRow`, and `selectRow`) and three outputs\
    \ (`lists`, `selectedList`, and `hideEmptyState`). Therefore, we will define the\
    \ `struct Input` and the `struct Output` as follows (Listing [4-14](#531999_1_En_4_Chapter.xhtml#PC17)).\n\
    \n```swift\nclass HomeViewModel {\n    var output: Output!\n    var input: Input!\n\
    \    struct Input {\n        let reload: PublishRelay<Void>\n        let deleteRow:\
    \ PublishRelay<IndexPath>\n        let selectRow: PublishRelay<IndexPath>\n  \
    \  }\n    struct Output {\n        let hideEmptyState: Driver<Bool>\n        let\
    \ lists: Driver<[TasksListModel]>\n        let selectedList: Driver<TasksListModel>\n\
    \    }\n    ...\n}\n// Listing 4-14\n// Definition of Input and Output for the\
    \ HomeViewModel\n```\n\nOnce we have defined `Input` and `Output`, we set their\
    \ behavior in the initialization of the `HomeViewModel` (Listing [4-15](#531999_1_En_4_Chapter.xhtml#PC18)).\n\
    \n```swift\nclass HomeViewModel {\n    ...\n    private let lists = BehaviorRelay<[TasksListModel]>(value:\
    \ [])\n    private let taskList = BehaviorRelay<TasksListModel>(value: TasksListModel())\n\
    \    private var tasksListService: TasksListServiceProtocol!\n    \n    init(tasksListService:\
    \ TasksListServiceProtocol) {\n        self.tasksListService = tasksListService\n\
    \        // Inputs\n        let reload = PublishRelay<Void>()\n        _ = reload.subscribe(onNext:\
    \ { [self] _ in\n            fetchTasksLists()\n        })\n        let deleteRow\
    \ = PublishRelay<IndexPath>()\n        _ = deleteRow.subscribe(onNext: { [self]\
    \ indexPath in\n            tasksListService.deleteList(listAtIndexPath(indexPath))\n\
    \        })\n        let selectRow = PublishRelay<IndexPath>()\n        _ = selectRow.subscribe(onNext:\
    \ { [self] indexPath in\n            taskList.accept(listAtIndexPath(indexPath))\n\
    \        })\n        self.input = Input(reload: reload, deleteRow: deleteRow,\
    \ selectRow: selectRow)\n        // Outputs\n        let items = lists\n     \
    \       .asDriver(onErrorJustReturn: [])\n        let hideEmptyState = lists\n\
    \            .map({ items in\n                return !items.isEmpty\n        \
    \    })\n            .asDriver(onErrorJustReturn: false)\n        let selectedList\
    \ = taskList.asDriver()\n        output = Output(hideEmptyState: hideEmptyState,\
    \ lists: items, selectedList: selectedList)\n        ...\n    }\n    ...\n}\n\
    // Listing 4-15\n// Establishment of the behavior of the parameters associated\
    \ with the inputs and outputs\n```\n\nThe `input.reload` parameter will execute\
    \ the method that fetches the lists recorded in the database.\n\nThe `input.deleteRow`\
    \ parameter will receive the position in the table of the cell we want to delete\
    \ (as `IndexPath`).\n\nThe `input.selectRow` parameter will receive the position\
    \ in the table of the cell we have selected (as `IndexPath`).\n\nThe `output.lists`\
    \ parameter will emit an array of `TasksListModel`, each time it receives it from\
    \ the database.\n\nThe `output.selectedList` parameter will emit a `TasksListModel`\
    \ object, corresponding to the cell selected by the user.\n\nThe `output.hideEmptyState`\
    \ parameter will emit a boolean that will be `true` if there are task lists in\
    \ the database and `false` if there aren’t.\n\nFinally, we set the methods related\
    \ to accessing the `Model`, such as calls to the database, or setting a database\
    \ change observer (Listing [4-16](#531999_1_En_4_Chapter.xhtml#PC19)).\n\n```swift\n\
    class HomeViewModel {\n    ...\n    init(tasksListService: TasksListServiceProtocol)\
    \ {\n        ...\n        NotificationCenter.default.addObserver(self,\n     \
    \       selector: #selector(contextObjectsDidChange),\n            name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,\n\
    \            object: CoreDataManager.shared.mainContext)\n    }\n    \n    @objc\
    \ func contextObjectsDidChange() {\n        fetchTasksLists()\n    }\n    \n \
    \   func fetchTasksLists() {\n        lists.accept(tasksListService.fetchLists())\n\
    \    }\n    \n    func listAtIndexPath(_ indexPath: IndexPath) -> TasksListModel\
    \ {\n        lists.value[indexPath.row]\n    }\n}\n// Listing 4-16\n// Relationship\
    \ between the ViewModel and the Model\n```\n\n### Add List Screen\n\nThis screen\
    \ is responsible for adding task lists and the communication between its components.\
    \ The communication between these components according to an MVVM architecture\
    \ is shown in Figure [4-12](#531999_1_En_4_Chapter.xhtml#Fig12).\n\n![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig12_HTML.png)\n\
    \nA block diagram illustrates the flow of communication from the task list service\
    \ to the add list view controller through the add list view model and the add\
    \ list view, from bottom to top. It denotes the navigations between the add list\
    \ view controller and home view controller at the top and the communication between\
    \ the add list view and icon selector view in the middle.\n\nFigure 4-12  \nAdd\
    \ list screen components communication schema\n\n#### `AddListViewController`\n\
    \nThe `AddListViewController` only takes care of installing the `AddListViewModel`\
    \ and passing it to the `AddListView`, and handling the navigation back to the\
    \ home screen (Listing [4-17](#531999_1_En_4_Chapter.xhtml#PC20)).\n\n```swift\n\
    class AddListViewController: UIViewController {\n    private var addListView:\
    \ AddListView!\n    ...\n    private function setupAddListView() {\n        let\
    \ viewModel = AddListViewModel(tasksListService: TasksListService())\n       \
    \ addListView = AddListView(viewmodel: viewmodel)\n        addListView.delegate\
    \ = self\n        self.view = addListView\n    }\n}\n\nAddListViewController extension:\
    \ BackButtonDelegate {\n    func navigateBack() {\n        navigationController?.popViewController(animated:\
    \ true)\n    }\n}\n// Listing 4-17\n// Setting AddListViewController code\n```"
  raw: '##### HomeViewModel


    As we have seen at the beginning of this chapter, the ViewModel is responsible
    for obtaining the data from the Model and preparing it to be displayed by the
    View and also manages the business logic of this View.


    As we have seen in the development of the *HomeView*, the *HomeViewModel* must
    have three inputs (reload, *deleteRow*, and *selectRow*) and three outputs (*lists*,
    *selectedList*, and *hideEmptyState*). Therefore, we will define the *struct Input*
    and the *struct Output* as follows (Listing [4-14](#531999_1_En_4_Chapter.xhtml#PC17)).


    ```

    class HomeViewModel {

    var output: Output!

    var input: Input!

    struct Input {

    let reload: PublishRelay

    let deleteRow: PublishRelay

    let selectRow: PublishRelay

    }

    struct Output {

    let hideEmptyState: Driver

    let lists: Driver

    let selectedList: Driver

    }

    ...

    }

    Listing 4-14

    Definition of Input and Output for the HomeViewModel

    ```


    Once we have defined Input and Output, we set their behavior in the initialization
    of the *HomeViewModel* (Listing [4-15](#531999_1_En_4_Chapter.xhtml#PC18)).


    ```

    class HomeViewModel {

    ...

    private let lists = BehaviorRelay(value: [])

    private let taskList = BehaviorRelay(value: TasksListModel())

    private var tasksListService: TasksListServiceProtocol!

    init(tasksListService: TasksListServiceProtocol) {

    self.tasksListService = tasksListService

    // Inputs

    let reload = PublishRelay()

    _ = reload.subscribe(onNext: { [self] _ in

    fetchTasksLists()

    })

    let deleteRow = PublishRelay()

    _ = deleteRow.subscribe(onNext: { [self] indexPath in

    tasksListService.deleteList(listAtIndexPath(indexPath))

    })

    let selectRow = PublishRelay()

    _ = selectRow.subscribe(onNext: { [self] indexPath in

    taskList.accept(listAtIndexPath(indexPath))

    })

    self.input = Input(reload: reload, deleteRow: deleteRow, selectRow: selectRow)

    // Outputs

    let items = lists

    .asDriver(onErrorJustReturn: [])

    let hideEmptyState = lists

    .map({ items in

    return !items.isEmpty

    })

    .asDriver(onErrorJustReturn: false)

    let selectedList = taskList.asDriver()

    output = Output(hideEmptyState: hideEmptyState, lists: items, selectedList: selectedList)

    ...

    }

    ...

    }

    Listing 4-15

    Establishment of the behavior of the parameters associated with the inputs and
    outputs

    ```


    The *input.reload* parameter will execute the method that fetches the lists recorded
    in the database.


    The *input.deleteRow* parameter will receive the position in the table of the
    cell we want to delete (as *IndexPath*).


    The *input.selectRow* parameter will receive the position in the table of the
    cell we have selected (as *IndexPath*).


    The *output.lists* parameter will emit an array of *TasksListModel*, each time
    it receives it from the database.


    The *output.selectedList* parameter will emit a *TasksListModel* object, corresponding
    to the cell selected by the user.


    The *output.hideEmptyState* parameter will emit a boolean that will be *true*
    if there are task lists in the database and *false* if there aren’t.


    Finally, we set the methods related to accessing the Model, such as calls to the
    database, or setting a database change observer (Listing [4-16](#531999_1_En_4_Chapter.xhtml#PC19)).


    ```

    class HomeViewModel {

    ...

    init(tasksListService: TasksListServiceProtocol) {

    ...

    NotificationCenter.default.addObserver(self,

    selector: #selector(contextObjectsDidChange),

    name: NSNotification.Name.NSManagedObjectContextObjectsDidChange,

    object: CoreDataManager.shared.mainContext)

    }

    @objc func contextObjectsDidChange() {

    fetchTasksLists()

    }

    func fetchTasksLists() {

    lists.accept(tasksListService.fetchLists())

    }

    func listAtIndexPath(_ indexPath: IndexPath) -> TasksListModel {

    lists.value[indexPath.row]

    }

    }

    Listing 4-16

    Relationship between the ViewModel and the Model

    ```


    #### Add List Screen


    This screen is responsible for adding task lists and the communication between
    its components. The communication between these components according to an MVVM
    architecture is shown in Figure [4-12](#531999_1_En_4_Chapter.xhtml#Fig12).


    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig12_HTML.png)


    A block diagram illustrates the flow of communication from the task list service
    to the add list view controller through the add list view model and the add list
    view, from bottom to top. It denotes the navigations between the add list view
    controller and home view controller at the top and the communication between the
    add list view and icon selector view in the middle.


    Figure 4-12


    Add list screen components communication schema


    ##### AddListViewController


    The *AddListViewController* only takes care of installing the *AddListViewModel*
    and passing it to the *AddListView*, and handling the navigation back to the home
    screen (Listing [4-17](#531999_1_En_4_Chapter.xhtml#PC20)).


    ```

    class AddListViewController: UIViewController {

    private var addListView: AddListView!

    ...

    private function setupAddListView() {

    let viewModel = AddListViewModel(tasksListService: TasksListService())

    addListView = AddListView(viewmodel: viewmodel)

    addListView.delegate = self

    self.view = addListView

    }

    }

    AddListViewController extension: BackButtonDelegate {

    func navigateBack() {

    navigationController?.popViewController(animated: true)

    }

    }

    Listing 4-17

    Setting AddListViewController code

    ```'
