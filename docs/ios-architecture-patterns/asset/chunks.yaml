- fmt: "### `TaskListViewController`\n\nAs in the previous cases, we are going to\
    \ set the input and output protocols for the `TaskListViewController` (Listing\
    \ [6-40](#531999_1_En_6_Chapter.xhtml#PC40)).\n\n```\nprotocol TaskListViewControllerInput:\
    \ AnyObject {\n    func navigateToHome()\n    func showAddTaskView(viewModel:\
    \ TaskListModel.AddTask.ViewModel)\n    func presentLoadedTasks(viewModel: TaskListModel.FetchTasks.ViewModel)\n\
    \    func presentRemainingTasks(viewModel: TaskListModel.RemoveTask.ViewModel)\n\
    \    func presentUpdatedTasks(viewModel: TaskListModel.UpdateTask.ViewModel)\n\
    }\n\nprotocol TaskListViewControllerOutput: AnyObject {\n    func navigateBack()\n\
    \    func addTask(request: TaskListModel.AddTask.Request)\n    func fetchTasks(request:\
    \ TaskListModel.FetchTasks.Request)\n    func removeTask(request: TaskListModel.RemoveTask.Request)\n\
    \    func updateTask(request: TaskListModel.UpdateTask.Request)\n}\n```\n\n*Listing\
    \ 6-40: `TaskListViewControllerInput` and `TaskListViewControllerOutput` protocols\
    \ definition*\n\nIn the case of the output protocol, `TaskListViewControllerOutput`,\
    \ we have defined the methods `navigateBack` (to return to `Home`), `addTask`\
    \ (to present the screen for adding tasks), `fetchTasks` (to show the tasks in\
    \ a list), `removeTask` (to delete a task), and `updateTask` (to update a task).\n\
    \nFor the input protocol, `TaskListViewControllerInput`, we define the methods\
    \ `navigateBack` (to return to `Home`), `showAddTaskView` (to show the task addition\
    \ screen), `presentLoadedTasks` (which returns the tasks of the selected list),\
    \ `presentRemainingTasks` (which returns the tasks that remain after deleting\
    \ one of them), and `presentUpdatedTasks` (which returns the tasks when one of\
    \ them is updated).\n\nOn the other hand, we will define a third protocol, `SelectedListDelegate`,\
    \ which, as you will remember, is the one we use in the `HomeInteractor` to establish\
    \ the delegate that will allow us to update the task lists of the `Home` after\
    \ any change made in this scene (Listing [6-41](#531999_1_En_6_Chapter.xhtml#PC41)).\n\
    \n```\nprotocol SelectedListDelegate: AnyObject {\n    func updateLists()\n}\n\
    ```\n\n*Listing 6-41: `SelectedListDelegate` protocol definition*\n\nThe next\
    \ step is to prepare the initialization of the `TaskListController`. In the `init`\
    \ method, we pass it an instance of the `TaskListView` (we pass it in the `TaskListConfigurator`)\
    \ and make the `TaskListController` its delegate (so it will need to implement\
    \ its methods). In addition, we make the first request to the `TaskListInteractor`,\
    \ which is to retrieve the tasks from the selected list (Listing [6-42](#531999_1_En_6_Chapter.xhtml#PC42)).\n\
    \n```\nfinal class TaskListViewController: UIViewController {\n    var interactor:\
