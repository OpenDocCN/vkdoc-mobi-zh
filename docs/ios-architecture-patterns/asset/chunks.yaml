    HomeCoordinatorProtocol and HomeCoordinator class

    ```


    As you can see, when passing the *HomeViewController* to the navigation controller,
    we are also passing an instance of the *HomeViewModel*, which includes a reference
    to the Coordinator itself to be able to manage navigation calls from said ViewModel,
    without the need for it to go through the View and the Controller.


    Therefore, if we call, for example, the *gotAddList* method of the *HomeCoordinator*,
    it will take care of instantiating the *AddListCoordinator* and calling its *start()*
    method, which will load the navigation stack in the *AddListController* (and all
    this without going through the *HomeViewController*).


    In this way, the *HomeViewController* only takes care of instantiating the View
