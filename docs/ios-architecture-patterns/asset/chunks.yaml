    ## MVVM-C: Model–View–ViewModel–Coordinator


    Until now, in the different architectures studied, we have seen how the navigation
    between the different screens, or what is the same between the different view
    controllers, occurred within said controllers.


    This made it difficult, on the one hand, to test them and, on the other, that
    they could be reused in other parts of the application.


    To solve this situation, we are going to use the Coordinator pattern.


    ### What Is a Coordinator?


    A *Coordinator* is a class that handles navigation outside of view controllers.
    This way we extract the navigation code from the view controllers, making them
    simpler and more reusable. Therefore, a Coordinator will have the tasks of loading
    the view controller that we are going to access and managing the navigation flow
    from that view controller to others (Figure [4-15](#531999_1_En_4_Chapter.xhtml#Fig15)).


    ![](images/531999_1_En_4_Chapter/531999_1_En_4_Fig15_HTML.png)


    A block diagram denotes a block at the top labeled coordinator at the top that
    points an arrow to the view model at the bottom. The view model connects with
    2 blocks at the bottom named view and model. The coordinator presents and manages
    the view model.


    Figure 4-15


    Model–View–ViewModel–Coordinator schema


    The first thing we will do is create a protocol for all of our coordinators to
    adhere to. Since the application is simple, this protocol will also be simple
    (Listing [4-39](#531999_1_En_4_Chapter.xhtml#PC47)).


    ```

    protocol Coordinator {

    var navigationController: UINavigationController { get set }

    func start()

    }

    Listing 4-39

    Coordinator protocol

    ```


    All coordinators that implement this protocol must define a *navigationController*
    variable (to which we will assign the application’s *navigationController*) and
    a *start()* function, which will be in charge of calling the view controller.


    Note


    In large applications, with more complex navigation flows, it is a good strategy
    to break them into simpler parts, managed by a *ParentCoordinator* on which an
    array of *ChildCoordinator* depends.


    ### Using MVVM-C in MyToDos


    As most of the application code is the same as when we have seen the MVVM architecture,
    we are going to see only those things that we have added new.


    Note


    Remember that all the code of the project can be found in the repository of this
    book.


    #### SceneDelegate


    In the *SceneDelegate*, what we do now is load the *HomeCoordinator*, passing
    it the *navigationController*. Next, we call *the start()* method.


    ```

    class SceneDelegate: UIResponder, UIWindowSceneDelegate {

    var window: UIWindow?

    var homeCoordinator: HomeCoordinator?

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:
    UIScene.ConnectionOptions) {

    if let windowScene = scene as? UIWindowScene {

    let window = UIWindow(windowScene: windowScene)

    let navigationController = UINavigationController.init()

    navigationController.navigationBar.isHidden = true

    navigationController.interactivePopGestureRecognizer?.isEnabled = false

    homeCoordinator = HomeCoordinator(navigationController: navigationController)

    homeCoordinator?.start()

    window.backgroundColor = .white

    window.rootViewController = navigationController

    self.window = window

    window.makeKeyAndVisible()

    }

    }

    ...

    }

    ```'
