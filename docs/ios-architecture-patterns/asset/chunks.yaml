    \ = TaskListViewController(taskListView: TaskListView())\n        viewController?.navigationController?.pushViewController(TaskListConfigurator.configure(taskListController,\
    \ delegate: delegate, tasksList: list), animated: true)\n    }\n}\n```\n\n**代码清单\
    \ 6-22** `HomeRouter` 遵守 `HomeRouterDelegate` 协议\n\n这样，要导航到`AddList`场景，我们实例化`AddListViewController`，然后通过`AddListConfigurator`进行配置（我们将`AddListViewController`实例和`AddListDelegate`委托均作为参数传递给它）。\n\
    \n在导航到`TasksListDelegate`场景的情况下，我们会实例化`TaskListViewController`，然后用`TaskListConfigurator`进行配置，同时将我们要显示其任务的列表作为`SelectedListDelegate`传递给它。\n\
    \n> **注意：** 请记住，这两个委托的作用是通知`Home`场景，在添加或更新列表时更新其视图。\n\n## `AddList` 场景\n\n这个屏幕允许我们添加新的任务列表。在图\
    \ 6-4 中，你可以看到构成该场景的组件以及它们之间的连接。\n\n![](img/531999_1_En_6_Fig4_HTML.jpg)\n\n**图\
    \ 6-4** `AddList` 场景组件与通信架构\n\n### `AddListConfigurator`\n\n`AddListConfigurator`负责接收我们从`HomeRouter`传递过来的`AddListViewController`实例（正如我们刚才所见），对其进行配置，创建构成此场景的不同组件，并建立它们之间的不同关系（见代码清单\
    \ 6-23）。\n\n```\nfinal class AddListConfigurator {\n    static func configure(\
    \ _ viewController: AddListViewController, delegate: AddListDelegate) -> AddListViewController\
    \  {\n        let interactor = AddListInteractor(tasksListService: TasksListService(),\
    \ delegate: delegate)\n        let presenter = AddListPresenter()\n        let\
    \ router = AddListRouter()\n        router.viewController = viewController\n \
    \       presenter.viewController = viewController\n        interactor.presenter\
    \ = presenter\n        viewController.interactor = interactor\n        viewController.router\
    \ = router\n        return viewController\n    }\n}\n```\n\n**代码清单 6-23** `AddListConfigurator`\
    \ 代码\n\n如你所见，在实例化`AddListInteractor`时，我们向其传递了一个`TasksListService`实例，因为它将负责将新的任务列表添加到数据库中。\n\
    \n### `AddListView`\n\n`AddListView`包含用户与之交互的图形元素，用于添加新的任务列表或在未添加任何列表的情况下返回主页。在这两种情况下，用户的操作都将通过实现`AddListViewDelegate`协议来传达给`AddListViewController`（见代码清单\
    \ 6-24）。\n\n```\nprotocol AddListViewDelegate: AnyObject {\n    func navigateBack()\n\
    \    func addListWith(title: String, icon: String)\n}\n\nfinal class AddListView:\
    \ UIView {\n    weak var delegate: AddListViewDelegate?\n    ...\n}\n\nprivate\
    \ extension AddListView {\n    ...\n    @objc func backAction() {\n        delegate?.navigateBack()\n\
    \    }\n    ...\n    @objc func addListAction() {\n        guard titleTextfield.hasText\
    \ else { return }\n        delegate?.addListWith(title: titleTextfield.text!,\
    \ icon: icon)\n    }\n    ...\n}\n```\n\n**代码清单 6-24** 显示`AddListViewDelegate`协议及其方法调用位置的`AddListView`类代码\n"
- fmt: "### `AddListViewController`\n\n在`AddListViewController`中，正如我们所知，我们将定义`Input`和`Output`协议，其中包含允许我们向`AddListInteractor`发起请求或接收来自`AddListPresenter`的调用的方法。在这种情况下，`AddListViewControllerInput`协议中只有一个方法，而`AddListViewControllerOutput`协议中有两个方法（清单[6-25](#531999_1_En_6_Chapter.xhtml#PC25)）。\n\
    \n```\nprotocol AddListViewControllerInput: AnyObject {\n    func navigateToHome()\n\
    }\nprotocol AddListViewControllerOutput: AnyObject {\n    func navigateBack()\n\
    \    func addList(request: AddListModel.AddList.Request)\n}\n```\n清单 6-25: `AddListViewControllerInput`和`AddListViewControllerOutput`协议定义\n\
    \n在`AddListViewControllerInput`协议中，我们只有`navigateToHome`方法，因此`AddListViewController`会通知`AddListRouter`它应该返回到`Home`（无论是添加新列表后还是按下返回按钮时都会触发）。\n\
    \n对于`AddListViewControllerOutput`，它有两个方法，因为我们会有两种可能的请求：添加新列表或直接返回`Home`。\n\n除了这两个协议外，我们还将创建第三个协议`AddListDelegate`，正如我们在描述`Home`场景的组件时所见，它允许我们指示`Home`在添加新任务列表时更新其界面（清单[6-26](#531999_1_En_6_Chapter.xhtml#PC26)）。\n\
    \n```\nprotocol AddListDelegate: AnyObject {\n    func didAddList()\n}\n```\n\
    清单 6-26: `AddListDelegate`定义，允许与`HomeInteractor`交互\n\n接下来，我们开发启动`AddListViewController`的代码部分，在这里我们接收`AddListView`实例，将其分配给`AddListViewcontroller`的视图，并配置其委托，因此`AddListViewController`类必须遵循`AddListViewDelegate`协议（清单[6-27](#531999_1_En_6_Chapter.xhtml#PC27)）。\n\
    \n```\nfinal class AddListViewController: UIViewController {\n    var interactor:\
    \ AddListInteractorInput?\n    var router: AddListRouterDelegate?\n    private\
    \ let addListView: AddListView\n\n    init(addListView: AddListView) {\n     \
    \   self.addListView = addListView\n        super.init(nibName: nil, bundle: nil)\n\
    \    }\n\n    required init?(coder: NSCoder) {\n        fatalError(\"init(coder:)\
    \ has not been implemented\")\n    }\n\n    override func viewDidLoad() {\n  \
    \      super.viewDidLoad()\n        addListView.delegate = self\n        self.view\
    \ = addListView\n    }\n}\n...\nextension AddListViewController: AddListViewDelegate\
    \ {\n    func navigateBack() {\n        interactor?.navigateBack()\n    }\n\n\
    \    func addListWith(title: String, icon: String) {\n        let request = AddListModel.AddList.Request(title:\
    \ title, icon: icon)\n        interactor?.addList(request: request)\n    }\n}\n\
    ```\n清单 6-27: `AddListViewController`初始化\n\n最后，我们编写代码使`AddListViewController`遵循`AddListViewControllerInput`协议（清单[6-28](#531999_1_En_6_Chapter.xhtml#PC28)）。\n\
    \n```\nextension AddListViewController: AddListViewControllerInput {\n    func\
    \ navigateToHome() {\n        router?.navigateBack()\n    }\n}\n```\n清单 6-28:\
    \ `AddListViewController`遵循`AddListViewControllerInput`协议\n\n### `AddListInteractor`\n\
    \n我们已经知道`AddListInteractor`涉及两个协议，一个`Input`（`AddListInteractorInput`）和另一个`Output`（`AddListInteractorOutput`），并且`Input`协议对应于`AddListViewController`的`Output`协议（`AddListViewControllerOutput`），因此我们在这里改变名称以便使用它（清单[6-29](#531999_1_En_6_Chapter.xhtml#PC29)）。\n\
    \n```\nprotocol AddListInteractorOutput: AnyObject {\n    func navigateBack()\n\
    }\ntypealias AddListInteractorInput = AddListViewControllerOutput\n```\n清单 6-29:\
    \ `AddListInteractorOutput`协议的定义以及将`AddListViewControllerOutput`重命名为`AddListInteractorInput`\n\
    \n`AddListInteractorOutput`协议只有一个方法，因为无论我们是添加列表还是想在不添加的情况下返回`Home`，只需给`AddListPresenter`下达返回`Home`的指令。\n\
    \n`AddListInteractor`开发的下一部分是其初始化部分，在这里我们收集传递给它的`TasksListService`实例以及与`HomeInteractor`通信的委托（清单[6-30](#531999_1_En_6_Chapter.xhtml#PC30)）。\n\
    \n```\nfinal class AddListInteractor {\n    var presenter: AddListPresenterInput?\n\
    \    private let tasksListService: TasksListServiceProtocol!\n    weak var delegate:\
    \ AddListDelegate?\n\n    init(tasksListService: TasksListServiceProtocol, delegate:\
    \ AddListDelegate) {\n        self.tasksListService = tasksListService\n     \
    \   self.delegate = delegate\n    }\n}\n```\n清单 6-30: `AddListInteractor`初始化\n\
    \n最后，我们实现使`AddListInteractor`遵循`AddListInteractorInput`协议的代码。在第一个方法（`navigateBack`）中，我们向呈现器指示要返回`Home`（我们已暂停返回按钮）。\n\
    \n在第二个方法（`addList`）中，我们使用通过`AddListModel.AddList.Request`传递的参数创建新的任务列表，并借助`TasksListService`实例将其保存到数据库。\n\
    \n接着，通过我们从`HomeInteractor`传递过来的委托，我们指示`Home`必须更新它要显示的任务列表。最后，我们通知`HomePresenter`必须返回`Home`（清单[6-31](#531999_1_En_6_Chapter.xhtml#PC31)）。\n\
    \n```\nextension AddListInteractor\n    : AddListInteractorInput {\n    func navigateBack()\
    \ {\n        presenter?.navigateBack()\n    }\n\n    func addList(request: AddListModel.AddList.Request)\
    \ {\n        let list = TasksListModel(\n            id: ProcessInfo().globallyUniqueString,\n\
    \            title: request.title,\n            icon: request.icon,\n        \
    \    createdAt: Date()\n        )\n        tasksListService.saveTasksList(list)\n\
    \        delegate?.didAddList()\n        presenter?.navigateBack()\n    }\n}\n\
    ```\n清单 6-31: `AddListInteractor`遵循`AddListInteractorInput`\n\n### `AddListPresenter`\n\
    \n`AddListPresenter`展示了两个协议：`AddListPresenterInput`（对应于`AddListInteractorOutput`协议）和`AddListPresenterOutput`（对应于`AddListViewControllerInput`协议）（清单[6-32](#531999_1_En_6_Chapter.xhtml#PC32)）。\n\
    \n```\ntypealias AddListPresenterInput = AddListInteractorOutput\ntypealias AddListPresenterOutput\
    \ = AddListViewControllerInput\n```\n清单 6-32: 通过`typealias`重命名协议，在`AddListInteractor`中将它们称为`Input`和`Output`\n\
    \n`AddListPresenter`的逻辑相当简单，因为你只需要实现`AddListPresenterInput`的单一方法，这一个方法告诉`HomeViewController`导航回`Home`（清单[6-33](#531999_1_En_6_Chapter.xhtml#PC33)）。\n\
    \n```\nfinal class AddListPresenter {\n    weak var viewController: AddListPresenterOutput?\n\
    }\n\nextension AddListPresenter: AddListPresenterInput {\n    func navigateBack()\
    \ {\n        viewController?.navigateToHome()\n    }\n}\n```\n清单 6-33: `AddListPresenter`代码，包含对`AddListPresenterInput`协议的遵循\n\
    \n### `AddListModel`\n\n正如我们在`AddList`场景不同组件的代码中所见，`AddListModel`类用于在VIP循环中传递信息，我们只在传递包含创建列表标题和图标的`Request`时使用它。然而，出于教学目的，在创建类时我们展示了所有的结构体，即使其中有两个是空的（清单[6-34](#531999_1_En_6_Chapter.xhtml#PC34)）。\n\
    \n```\nenum AddListModel {\n    enum AddList {\n        struct Request {\n   \
    \         var title: String\n            var icon: String\n        }\n       \
    \ struct Response {}\n        struct ViewModel {}\n    }\n}\n```\n清单 6-34: `AddListModel`代码。只有`Request`包含参数"
  raw: '##### AddListViewController


    In the *AddListViewController*, as we already know, we will define the Input and
    Output protocols with the methods that will allow us to make requests to the *AddListInteractor*
    or receive calls from the *AddListPresenter*. In this case, we will only have
    one method in the *AddListViewControllerInput* protocol and two in the case of
    the *AddListViewControllerOutput* protocol (Listing [6-25](#531999_1_En_6_Chapter.xhtml#PC25)).


    ```

    protocol AddListViewControllerInput: AnyObject {

    func navigateToHome()

    }

    protocol AddListViewControllerOutput: AnyObject {

    func navigateBack()

    func addList(request: AddListModel.AddList.Request)

    }

    Listing 6-25

    AddListViewControllerInput and AddListViewControllerOutput protocols definition

    ```


    In the *AddListViewControllerInput* protocol, we only have the *navigateToHome*
    method, so the *AddListViewController* communicates to the *AddListRouter* that
    it should return to the *Home* (this happens both if we add a new list and if
    we press the back button).


    In the case of the *AddListViewControllerOutput*, it has two methods, since we
    will have two possible requests: add a new list or return to *Home* directly.


    In addition to these two protocols, we will create a third protocol, *AddListDelegate*,
    which, as we saw when describing the components of the *Home* scene, is the one
    that allows us to indicate to the *Home* that it should update its interface when
    adding a new list of tasks (Listing [6-26](#531999_1_En_6_Chapter.xhtml#PC26)).


    ```

    protocol AddListDelegate: AnyObject {

    func didAddList()

    }

    Listing 6-26

    AddListDelegate definition that allows interaction with the HomeInteractor

    ```


    Next, we develop the part of the code that starts the *AddListViewController*,
    and that is where we receive the *AddListView* instance, assign it to the *AddListViewcontroller*
    view, and configure its delegate, so the *AddListViewController* class must conform
    to the *AddListViewDelegate* protocol (Listing [6-27](#531999_1_En_6_Chapter.xhtml#PC27)).


    ```

    final class AddListViewController: UIViewController {

    var interactor: AddListInteractorInput?

    var router: AddListRouterDelegate?

    private let addListView: AddListView

    init(addListView: AddListView) {

    self.addListView = addListView

    super.init(nibName: nil, bundle: nil)

    }

    required init?(coder: NSCoder) {

    fatalError("init(coder:) has not been implemented")

    }

    override func viewDidLoad() {

    super.viewDidLoad()

    addListView.delegate = self

    self.view = addListView

    }

    }

    ...

    extension AddListViewController: AddListViewDelegate {

    func navigateBack() {

    interactor?.navigateBack()

    }

    func addListWith(title: String, icon: String) {

    let request = AddListModel.AddList.Request(title: title, icon: icon)

    interactor?.addList(request: request)

    }

    }

    Listing 6-27

    AddListViewController initialization

    ```


    Finally, we create the code for the *AddListViewController* to conform to the
    *AddListViewControllerInput* protocol (Listing [6-28](#531999_1_En_6_Chapter.xhtml#PC28)).


    ```

    extension AddListViewController: AddListViewControllerInput {

    func navigateToHome() {

    router?.navigateBack()

    }

    }

    Listing 6-28

    AddListViewController conformation to AddListViewControllerInput protocol

    ```


    ##### AddListInteractor


    We already know that the AddListInteractor involves two protocols, one Input (*AddListInteractorInput*)
    and another *Output* (*AddListInteractorOutput*), and that the Input protocol
    corresponds to the output protocol of the *AddListViewController* (*AddListViewControllerOutput*),
    so we change the name to use it here (Listing [6-29](#531999_1_En_6_Chapter.xhtml#PC29)).


    ```

    protocol AddListInteractorOutput: AnyObject {

    func navigateBack()

    }

    typealias AddListInteractorInput = AddListViewControllerOutput

    Listing 6-29

    Definition of the AddListInteractorOutput protocol and renaming the AddListViewControllerOutput
    to AddListInteractorInput

    ```


    The *AddListInteractorOutput* protocol only has one method, since whether we add
    a list or want to return to the Home without adding it, we only have to give the
    *AddListPresenter* the order to return to the *Home*.


    The next part of the development of the *AddListInteractor* is the part of its
    initialization in which we collect both the instance of the *TasksListService*
    that we pass to it, as well as the delegate that communicates with the *HomeInteractor*
    (Listing [6-30](#531999_1_En_6_Chapter.xhtml#PC30)).


    ```

    final class AddListInteractor {

    var presenter: AddListPresenterInput?

    private let tasksListService: TasksListServiceProtocol!

    weak var delegate: AddListDelegate?

    init(tasksListService: TasksListServiceProtocol, delegate: AddListDelegate) {

    self.tasksListService = tasksListService

    self.delegate = delegate

    }

    }

    Listing 6-30

    AddListInteractor initialization

    ```


    Lastly, we implement the code by which we will make the *AddListInteractor* conform
    to the *AddListInteractorInput* protocol. In the first method (*navigateBack*),
    what we indicate to the presenter is that we want to return to *Home* (we have
    paused the back button).


    In the second method (*addList*), what we do is create a new task list with the
    parameters that we have passed through the *AddListModel.AddList.Request* and
    save it in the database thanks to the *TasksListService* instance.


    Next, and thanks to the delegate that we have passed from the *HomeInteractor*,
    we indicate that the *Home* must update the list of tasks that it must show. Finally,
    we communicate to the *HomePresenter* that it must return to the *Home* (Listing
    [6-31](#531999_1_En_6_Chapter.xhtml#PC31)).


    ```

    extension AddListInteractor

    : AddListInteractorInput {

    func navigateBack() {

    presenter?.navigateBack()

    }

    func addList(request: AddListModel.AddList.Request) {

    let list = TasksListModel(id: ProcessInfo().globallyUniqueString,

    title: request.title,

    icon: request.icon,

    createdAt: Date())

    tasksListService.saveTasksList(list)

    delegate?.didAddList()

    presenter?.navigateBack()

    }

    }

    Listing 6-31

    AddListInteractor conformation to AddListInteractorInput

    ```


    ##### AddListPresenter


    The *AddListPresenter* presents two protocols: *AddListPresenterInput* (which
    corresponds to the *AddListInteractorOutput* protocol) and *AddListPresenterOutput*
    (which corresponds to the *AddListViewControllerInput* protocol) (Listing [6-32](#531999_1_En_6_Chapter.xhtml#PC32)).


    ```

    typealias AddListPresenterInput = AddListInteractorOutput

    typealias AddListPresenterOutput = AddListViewControllerInput

    Listing 6-32

    With typealias we rename the protocols to refer to them as Input and Output the
    AddListInteractor

    ```


    The logic of *AddListPresenter* is quite simple, as you only need to implement
    the single method of *AddListPresenterInput*, and this is the one that tells the
    *HomeViewController* to navigate back to the *Home* (Listing [6-33](#531999_1_En_6_Chapter.xhtml#PC33)).


    ```

    final class AddListPresenter {

    weak var viewController: AddListPresenterOutput?

    }

    extension AddListPresenter: AddListPresenterInput {

    func navigateBack() {

    viewController?.navigateToHome()

    }

    }

    Listing 6-33

    AddListPresenter code, with AddListPresenterInput protocol conformation

    ```


    ##### AddListModel


    As we have seen in the code of the different components of the *AddList* scene,
    the *AddListModel* class, with which we pass information in the VIP cycle, we
    have only used it in the case of passing the *Request* with the title and icon
    of the created list. However, for didactic purposes, when creating the class,
    we show all the structs, even if there are a couple of them empty (Listing [6-34](#531999_1_En_6_Chapter.xhtml#PC34)).


    ```

    enum AddListModel {

    enum AddList {

    struct Request {

    var title: String

    var icon: String

    }

    struct Response {}

    struct ViewModel {}

    }

    }

    Listing 6-34

    AddListModel code. Only the request has parameters

    ```'
