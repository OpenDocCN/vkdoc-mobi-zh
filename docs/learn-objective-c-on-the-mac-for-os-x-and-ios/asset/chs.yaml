  \n![9781430241881_Fig03-03.tif](img/9781430241881_Fig03-03_fmt.jpg)\n\n图 3-3. `argv`数组输出\n\
  \n只是为了好玩，请用`/usr/share/dict/words`来运行您的程序，该文件包含超过 230，000 个单词。您的程序可以处理海量数据！当您厌倦了在\
  \ Xcode 控制台窗口中看着单词飞速闪过时，可以点击“停止”按钮来终止程序。\n\n由于您在运行时提供了参数，每个人都可以使用您的程序来获取任何单词集的长度，即使是荒谬的大单词集也是如此。用户无需更改代码即可更改数据，正如自然所设计的那样。这就是间接性的本质：它告诉我们在哪里获取所需的数据。\n\
  \n## 在面向对象编程中使用间接性\n\n面向对象编程全是关于间接性的。OOP 使用间接性来访问数据，就像我们在之前的示例中使用变量、文件和参数所做的那样。OOP\
  \ 真正的革命在于它使用间接性来*调用代码*。您不是直接调用函数，而是间接地调用它。\n\n现在您明白了这一点，您就是 OOP 方面的专家了。其他一切都只是这种间接性的副作用。\n\
  \n## 过程式编程\n\n为了完整地领略 OOP 的灵活性，我们将快速了解一下过程式编程，这样您就能明白 OOP 是为了解决哪些问题而创建的。过程式编程已经存在了非常非常久远的时间，几乎可以追溯到事物的发明之后。过程式编程是典型的入门编程书籍和课程中教授的类型。大多数使用\
  \ BASIC、C、Tcl 和 Perl 等语言编写的程序都是过程式的。\n\n在过程式程序中，数据通常保存在简单的结构中，例如 C 语言的`struct`元素。也存在更复杂的数据结构，例如链表和树。当您调用一个函数时，您将数据传递给该函数，然后函数对数据进行操作。函数是过程式编程体验的核心：您决定要使用哪些函数，然后调用这些函数，并传入它们所需的数据。\n\
  \n## 待绘制图形的形状\n\n考虑一个在屏幕上绘制一堆几何形状的程序。多亏了计算机的魔力，您不仅可以思考它——您可以在`03.08 Shapes-Procedural`文件夹中找到该程序的源代码。为简单起见，`Shapes-Procedural`程序实际上不会在屏幕上绘制形状，它只是有趣地打印出一些与形状相关的文本。我们省略了实际绘制形状的代码，因为这会增加复杂性并分散我们期望的重点，即编写一个程序来处理几种以类似方式处理的元素。\n\
  \n`Shapes-Procedural`使用了纯 C 语言和过程式编程风格。代码首先定义一些常量和结构体。\n\n\n```content\n在必需的 foundation\
  \ 头文件之后，是一个枚举，列出了可以绘制的基本形状：圆形、矩形和蛋形实体：\n\n```objc\n#import <Foundation/Foundation.h>\n\
  \ntypedef enum {\n    kCircle,\n    kRectangle,\n    kEgg\n} ShapeType;\n```\n\n\
  接下来是一个枚举，定义了绘制形状时可以使用的颜色：\n\n```objc\ntypedef enum {\n    kRedColor,\n    kGreenColor,\n\
  \    kBlueColor\n} ShapeColor;\n```\n\n然后，我们有一个描述矩形的结构体，它指定了形状在屏幕上绘制的区域。对于本章的示例，我们不关心这个矩形具体如何用于放置每种形状，只关心它最终能以某种方式实现即可。\n\
  \n```objc\ntypedef struct {\n    int x, y, width, height;\n} ShapeRect;\n```\n\n\
  最后，我们有一个结构体，它将所有要素组合在一起，用于描述一个形状：\n\n```objc\ntypedef struct {\n    ShapeType type;\n\
  \    ShapeColor fillColor;\n    ShapeRect bounds;\n} Shape;\n```\n\n## 执行工作的部分\n\
  \n在我们示例的后续部分，`main()` 声明了一个我们将要绘制的形状数组。声明数组后，通过赋值其字段来初始化数组中的每个形状结构体。以下代码创建了一个红色圆形、一个绿色矩形和一个蓝色蛋形，它们位于不同的随机位置：\n\
  \n```objc\nint main (int argc, const char * argv[])\n{\n    Shape shapes[3];\n\n\
  \    ShapeRect rect0 = { 0, 0, 10, 30 };\n    shapes[0].type = kCircle;\n    shapes[0].fillColor\
  \ = kRedColor;\n    shapes[0].bounds = rect0;\n\n    ShapeRect rect1 = { 30, 40,\
  \ 50, 60 };\n    shapes[1].type = kRectangle;\n    shapes[1].fillColor = kGreenColor;\n\
  \    shapes[1].bounds = rect1;\n\n    ShapeRect rect2 = { 15, 18, 37, 29 };\n  \
  \  shapes[2].type = kEgg;\n    shapes[2].fillColor = kBlueColor;\n    shapes[2].bounds\
  \ = rect2;\n\n    drawShapes (shapes, 3);\n    return (0);\n} // main\n```\n\n##\
  \ 一个方便的 C 语言快捷方式\n\n`Shapes-Procedural` 程序的 `main()` 方法中的矩形是使用一个方便的 C 语言小技巧声明的：当你声明一个结构体变量时，可以一次性初始化该结构体的所有元素。\n\
  \n```objc\nShapeRect rect0 = { 0, 0, 10, 30 };\n```\n\n结构体元素按照它们声明的顺序获取值。回想一下，`ShapeRect`\
  \ 是这样声明的：\n\n```objc\ntypedef struct {\n    int x, y, width, height;\n} ShapeRect;\n\
  ```\n\n上述对 `rect0` 的赋值意味着 `rect0.x` 和 `rect0.y` 的值都将为 `0`；`rect0.width` 将为 `10`；而\
  \ `rect0.height` 将为 `30`。\n\n这种技术让你可以在不牺牲可读性的前提下，减少程序中的打字量。\n\n初始化 `shapes` 数组后，`main()`\
  \ 调用 `drawShapes()` 函数来绘制形状。\n\n`drawShapes()` 中有一个循环，用于检查数组中的每个 `Shape` 结构体。一个\
  \ `switch` 语句查看结构体的 `type` 字段，并选择一个绘制该形状的函数。程序调用相应的绘图函数，传入绘制所用的屏幕区域和颜色参数。请看：\n\n\
  ```objc\nvoid drawShapes (Shape shapes[], int count)\n{\n    for (int i = 0; i <\
  \ count; i++) {\n        switch (shapes[i].type) {\n            case kCircle:\n\
  \                drawCircle (shapes[i].bounds,\n                            shapes[i].fillColor);\n\
  \                break;\n            case kRectangle:\n                drawRectangle\
  \ (shapes[i].bounds,\n                               shapes[i].fillColor);\n   \
  \             break;\n            case kEgg:\n                drawEgg (shapes[i].bounds,\n\
  \                         shapes[i].fillColor);\n                break;\n      \
  \  }\n    }\n} // drawShapes\n```\n\n以下是 `drawCircle()` 的代码，它仅打印出传入的边界矩形和颜色：\n\n\
  ```objc\nvoid drawCircle (ShapeRect bounds, ShapeColor fillColor)\n{\n    NSLog\
  \ (@\"drawing a circle at (%d %d %d %d) in %@\",\n           bounds.x, bounds.y,\n\
  \           bounds.width, bounds.height,\n           colorName(fillColor));\n} //\
  \ drawCircle\n```\n\n在 `NSLog()` 内部调用的 `colorName()` 函数，只是对传入的颜色值执行一个 `switch` 判断，并返回一个如\
  \ `@\"red\"` 或 `@\"blue\"` 之类的字面量 `NSString`：\n\n```objc\nNSString *colorName (ShapeColor\
  \ colorName)\n{\n    switch (colorName) {\n        case kRedColor:\n           \
  \ return @\"red\";\n            break;\n        case kGreenColor:\n            return\
  \ @\"green\";\n            break;\n        case kBlueColor:\n            return\
  \ @\"blue\";\n            break;\n    }\n    return @\"no clue\";\n} // colorName\n\
  ```\n\n其他绘图函数与 `drawCircle` 几乎相同，区别在于它们分别绘制矩形和蛋形。\n\n以下是 `Shapes-Procedural` 的输出（不包括\
  \ `NSLog()` 添加的时间戳和其他信息）：\n\n```\ndrawing a circle at (0 0 10 30) in red\n```\n\n\
  \n绘制一个矩形`(30 40 50 60)`，颜色为绿色\n\n绘制一个椭圆`(15 18 37 29)`，颜色为蓝色\n\n这一切看起来都非常简单直接，对吧？当你使用过程式编程时，你会花时间将数据与专门处理该类型数据的函数连接起来。你必须小心地为每种数据类型使用正确的函数：例如，你必须调用`drawRectangle()`来处理类型为`kRectangle`的形状。将一个矩形传递给一个本该处理圆形的函数是过于容易发生的。\n\
  \n像这样的编码还有另一个问题，即它会使得程序的扩展和维护变得困难。为了说明这一点，让我们增强`Shapes-Procedural`，添加一种新的形状：三角形。你可以在*03.09\
  \ Shapes-Procedural-2*项目中找到修改后的程序。为了完成这个任务，我们至少需要在四个不同的地方修改程序。\n\n首先，我们将在`ShapeType`枚举中添加一个`kTriangle`常量：\n\
  \n```c\ntypedef enum {\n   kCircle,\n   kRectangle,\n   kEgg,\n   kTriangle\n} ShapeType;\n\
  ```\n\n然后，我们将实现一个`drawTriangle()`函数，它看起来与它的同类函数完全相同：\n\n```c\nvoid drawTriangle\
  \ (ShapeRect bounds,\n                   ShapeColor fillColor)\n{\n   NSLog (@\"\
  drawing triangle at (%d %d %d %d) in %@\",\n          bounds.x, bounds.y,\n    \
  \      bounds.width, bounds.height,\n          colorName(fillColor));\n} // drawTriangle\n\
  ```\n\n接下来，我们将在`drawShapes()`的`switch`语句中添加一个新的`case`分支。这将检查`kTriangle`并在适当的情况下调用`drawTriangle()`：\n\
  \n```c\nvoid drawShapes (Shape shapes[], int count)\n{\n   for (int i = 0; i < count;\
  \ i++) {\n      switch (shapes[i].type) {\n         case kCircle:\n            drawCircle\
  \ (shapes[i].bounds, shapes[i].fillColor);\n            break;\n         case kRectangle:\n\
  \            drawRectangle (shapes[i].bounds, shapes[i].fillColor);\n          \
  \  break;\n         case kEgg:\n            drawEgg (shapes[i].bounds, shapes[i].fillColor);\n\
  \            break;\n         case kTriangle:\n            drawTriangle (shapes[i].bounds,\
  \ shapes[i].fillColor);\n            break;\n      }\n   }\n} // drawShapes\n```\n\
  \n最后，我们将在`shapes`数组中添加一个三角形。别忘了增加`shapes`数组中的形状数量：\n\n```c\nint main (int argc,\
  \ const char * argv[])\n{\n   Shape shapes[4];\n   ShapeRect rect0 = { 0, 0, 10,\
  \ 30 };\n   shapes[0].type = kCircle;\n   shapes[0].fillColor = kRedColor;\n   shapes[0].bounds\
  \ = rect0;\n   ShapeRect rect1 = { 30, 40, 50, 60 };\n   shapes[1].type = kRectangle;\n\
  \   shapes[1].fillColor = kGreenColor;\n   shapes[1].bounds = rect1;\n   ShapeRect\
  \ rect2 = { 15, 18, 37, 29 };\n   shapes[2].type = kEgg;\n   shapes[2].fillColor\
  \ = kBlueColor;\n   shapes[2].bounds = rect2;\n   ShapeRect rect3 = { 47, 32, 80,\
  \ 50 };\n   shapes[3].type = kTriangle;\n   shapes[3].fillColor = kRedColor;\n \
  \  shapes[3].bounds = rect3;\n   drawShapes (shapes, 4);\n   return (0);\n} // main\n\
  ```\n\n好了，让我们看看`Shapes-Procedural-2`的实际运行效果：\n\n绘制一个圆形`(0 0 10 30)`，颜色为红色\n\n绘制一个矩形`(30\
  \ 40 50 60)`，颜色为绿色\n\n绘制一个椭圆`(15 18 37 29)`，颜色为蓝色\n\n绘制一个三角形`(47 32 80 50)`，颜色为红色\n\
  \n添加对三角形的支持并不算太糟，但我们的小程序只做一种操作——绘制形状（或者至少是打印关于绘制形状的文本）。程序越复杂，扩展起来就越棘手。例如，假设程序对形状做了更多的处理；假设它计算它们的面积并判断鼠标指针是否位于它们内部。在这种情况下，你必须修改所有对形状执行操作的函数，接触那些一直运行良好的代码，并可能引入错误。\n\
  \n另一个充满风险的情景是：添加一个需要更多信息来描述的新形状。例如，圆角矩形需要其他形状都不需要的信息：其圆角的半径。为了支持圆角矩形，你可以向`Shape`结构体添加一个`radius`字段，但这会浪费空间，因为该字段不会被其他形状使用；或者你可以使用\
  \ C 语言的联合体在同一结构体中叠加不同的数据布局，这会使所有形状都需要深入到联合体中才能获取它们感兴趣的数据，从而让事情变得复杂。\n\n面向对象编程（OOP）优雅地解决了这些问题。当我们教我们的程序使用\
  \ OOP 时，我们将看到 OOP 如何处理第一个问题，即修改已经运行的代码以添加新的形状种类。\n\n## 实现面向对象\n\n过程式程序基于函数。数据围绕着函数转。面向对象则反转了这一观点，将程序的数据置于中心，让函数围绕着数据转。与其关注程序中的函数，不如将注意力集中在数据上。\n\
  \n这听起来很有趣，但它如何工作呢？在 OOP 中，数据通过间接寻址包含了对操作它的代码的引用。与其告诉`drawRectangle()`函数“使用这个形状结构体去绘制一个矩形”，不如要求一个矩形“去绘制你自己”（天哪，这听起来很粗鲁，但确实如此）。通过间接寻址的神奇魔力，矩形的数据知道如何找到执行绘制的函数。\n\
  \n那么对象到底是什么？它不过是一个花哨的 C 语言结构体，能够找到与之关联的代码，通常是通过一个函数指针。 图 3-4 展示了四个`Shape`对象：两个矩形、一个圆形和一个椭圆。每个对象都能够找到一个函数来执行其绘制。\n\
  \n![9781430241881_Fig03-04.eps](img/9781430241881_Fig03-04_fmt.jpg)\n\n图 3-4. 基本形状对象\n\
  \n每个对象都有自己的`draw()`函数，该函数知道如何“绘制”其特定的形状。例如，一个圆形对象的`draw()`知道如何绘制圆形。一个矩形的`draw()`知道如何绘制矩形。\n\
  \n`Shapes-Object`程序（位于*03.10 -Shapes-Object*）执行与`Shapes-Procedural`相同的功能，但使用了 Objective-C\
  \ 的面向对象特性来实现。这是来自`Shapes-Object`的`drawShapes()`：\n\n```objc\nvoid drawShapes (id\
  \ shapes[], int count)\n{\n   for (int i = 0; i < count; i++) {\n      id shape\
  \ = shapes[i];\n      [shape draw];\n   }\n} // drawShapes\n```\n\n这个函数包含一个循环，遍历数组中的每个形状。在循环中，程序告诉形状绘制自身。\n\
  \n注意这个版本的`drawShapes()`与原始版本之间的差异。首先，这个版本短得多！代码不必询问每个单独的形状它是什么类型。\n\n另一个变化是`shapes[]`，函数的第一个参数：它现在是一个`id`对象的数组。什么是`id`？它是一个心理学术语，指代心灵中先天本能冲动和初级过程得以显现的那部分吗？在这个上下文中并非如此：它代表**identifier**（标识符），发音为“eye\
  \ dee”。`id`是一种通用类型，用于指代任何类型的对象。回想一下，对象只是一个带有一些附加代码的 C 结构体，所以`id`实际上是指向这些结构体之一的指针；在这种情况下，这些结构体构成了各种形状。\n\
  \n`drawShapes()`的第三个变化是循环体：\n\n```objc\nid shape = shapes[i];\n[shape draw];\n```\n\
  \n第一行看起来像普通的 C 代码。代码从`shapes`数组中获取`id`——即指向对象的指针——并将其存入名为`shape`的变量中，该变量的类型是`id`。这只是一个指针赋值：它实际上并没有复制形状的全部内容。看看\
  \ 图 3-5 ，了解`Shapes-Object`中可用的各种形状。`shapes[0]`是指向红色圆形的指针；`shapes[1]`是指向绿色矩形的指针；`shapes[2]`是指向蓝色椭圆的指针。\n\
  \n![9781430241881_Fig03-05.eps](img/9781430241881_Fig03-05_fmt.jpg)\n\n图 3-5. `shapes`数组\n\
  \n现在我们来到了函数中的最后一行代码：\n\n```objc\n[shape draw];\n```\n\n\n\n这相当奇怪。到底是怎么回事？我们知道 `C`\
  \ 语言使用方括号来引用数组元素，但这里似乎并未涉及数组操作。在 Objective-C 中，方括号还有另一层含义：它们用于向对象发送指令。方括号内的第一个条目是对象，其余部分是你希望该对象执行的操作。在这个例子中，我们让名为\
  \ `shape` 的对象执行 `draw` 操作。如果 `shape` 是一个圆形，那么一个圆形就会被“绘制”。如果 `shape` 是一个矩形，我们就会得到一个矩形。\n\
  \n在 Objective-C 中，让对象执行某个操作被称为**发送消息**（尽管有些人也称之为“调用方法”）。代码 `[shape draw]` 将消息 `draw`\
  \ 发送给对象 `shape`。`[shape draw]` 的一种读法是“向 shape 发送 draw”。`shape` 具体如何执行绘制操作，取决于 `shape`\
  \ 自身的实现。\n\n当你向对象发送消息时，所需的代码是如何被调用的？这需要在幕后辅助角色（称为**类**）的协助下完成。\n\n请看一下图 3-6。图的左侧显示，这是\
  \ `shapes` 数组中索引为零的圆形对象，它最后一次出现在图 3-2 中。该对象包含一个指向其类的指针。类是一种结构，它描述了如何成为该类的一个对象。在图\
  \ 3-3 中，`Circle` 类包含一个指向绘制圆形代码、计算圆形面积代码以及其他必要代码的指针，以便成为一个合格的 `Circle` 对象。\n\n![9781430241881_Fig03-06.eps](img/9781430241881_Fig03-06_fmt.jpg)\n\
  \n图 3-6。圆形及其类\n\n拥有类对象的意义何在？让每个对象直接指向其代码岂不是更简单？确实，这会更简单，一些面向对象编程系统正是这样做的。但拥有类对象有一个巨大优势：如果你在运行时修改了类，该类的所有对象都会自动应用这些更改（我们将在后续章节中详细讨论这一点）。\n\
  \n图 3-7 展示了 `draw` 消息如何最终为圆形对象调用正确的函数。\n\n![9781430241881_Fig03-07.eps](img/9781430241881_Fig03-07_fmt.jpg)\n\
  \n图 3-7。圆形找到其绘制代码。\n\n以下是图 3-4 中所展示的步骤：\n\n1.  首先检查作为消息目标的对象（此处为红色圆形），找出它属于哪个类。\n\
  2.  该类在其代码中查找 `draw` 函数的位置。\n3.  找到后，执行用于绘制圆形的函数。\n\n图 3-8 展示了当你对数组中的第二个形状（即绿色矩形）调用\
  \ `[shape draw]` 时会发生什么。\n\n![9781430241881_Fig03-08.eps](img/9781430241881_Fig03-08_fmt.jpg)\n\
  \n图 3-8。矩形找到其绘制代码。\n\n图 3-5 中使用的步骤与上图几乎相同：\n\n1.  首先检查消息的目标对象（绿色矩形），找出它属于哪个类。\n\
  2.  矩形类在其代码库中查找，获取 `draw` 函数的地址。\n3.  Objective-C 运行用于绘制矩形的代码。\n\n这个程序展示了非常酷的间接操作！在程序的函数式版本中，我们必须编写代码来决定调用哪个函数。而现在，这个决策由\
  \ Objective-C 在幕后做出，它通过询问对象属于哪个类来完成。这降低了调用错误函数的可能性，并使我们的代码更易于维护。\n\n## 术语小憩\n\n\
  在我们深入研究 `Shapes-Object` 程序的其余部分之前，让我们花点时间回顾一些面向对象编程的术语。我们已经讨论过其中一些术语；其他术语则是全新的。\n\
  \n*   ![image](img/9781430241881_square_fmt.jpg) `类` — **类**是一种表示对象类型的结构。对象通过引用其类来获取关于自身的各种信息，特别是处理每个操作时要运行的代码。简单的程序可能只有少数几个类；中等复杂度的程序可能有几十个类。Objective-C\
  \ 的风格建议开发者将类名首字母大写。\n*   ![image](img/9781430241881_square_fmt.jpg) `对象` — **对象**是一种包含值以及指向其类的隐藏指针的结构。运行中的程序通常有成百上千个对象。引用对象的\
  \ Objective-C 变量通常首字母不大写。\n*   ![image](img/9781430241881_square_fmt.jpg) `实例` —\
  \ **实例**是“对象”的另一种说法。例如，一个圆形对象也可以被称为 `Circle` 类的一个实例。\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ `消息` — **消息**是对象可以执行的一个操作。你通过向对象发送消息来指示它执行某个动作。在 `[shape draw]` 代码中，`draw` 消息被发送给\
  \ `shape` 对象，告诉它绘制自身。当一个对象收到消息时，会查询其类以找到要运行的适当代码。\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ `方法` — **方法**是针对消息而运行的代码。同一个消息（例如 `draw`）可以根据对象的类不同而调用不同的方法。\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ `方法调度器` — **方法调度器**是 Objective-C 用于判断针对特定消息将执行哪个方法的机制。我们将在下一章中深入挖掘 Objective-C\
  \ 的方法调度机制。\n\n这些是你阅读本书后续内容所需的关键面向对象编程术语。此外，还有一些通用的编程术语很快就会变得非常重要：\n\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ `接口` — **接口**是对某类对象所提供功能的描述。例如，`Circle` 类的接口声明了圆形对象可以接受 `draw` 消息。\n\n**注** 接口的概念并不仅限于面向对象编程。例如，在\
  \ `C` 语言中，头文件为标准 I/O 库（通过 `#include <stdio.h>` 获得）和数学库（`#include <math.h>`）等库提供了接口。接口不提供实现细节，通常的理念是你无需关心它们。\n\
  \n*   ![image](img/9781430241881_square_fmt.jpg) `实现` — **实现**是使接口生效的代码。在我们的示例中，圆形对象的实现包含了在屏幕上绘制圆形的代码。当你向圆形对象发送\
  \ `draw` 消息时，你不需要知道也不关心该函数是如何工作的，只需要知道它能在屏幕上绘制一个圆形即可。\n\n## Objective-C 中的面向对象编程\n\
  \n如果你的大脑现在开始感到吃力，这很正常。我们一直在往里面灌输大量新知识，消化所有这些术语和技术需要一些时间。在你的潜意识默默消化前几节内容的同时，让我们来看看\
  \ `Shapes-Object` 程序的其余代码，其中包括一些用于声明类的新语法。\n\n### `@interface` 部分\n\n在创建特定类的对象之前，Objective-C\
  \ 编译器需要了解该类的一些信息。具体来说，它必须知道对象的数据成员（即该对象的 `C struct` 长什么样）以及它提供了哪些功能。你使用 `@interface`\
  \ 指令将这些信息提供给编译器。\n\n**注** 在 `Shapes-Object` 中，我们把所有内容都放在了它的 *Shapes-Object.m* 文件中。在更大的程序中，你会使用多个文件，为每个类提供自己的一组文件。我们将在第\
  \ 6 章探讨组织类和文件的方法。\n\n以下是 `Circle` 类的接口：\n\n```\n@interface Circle : NSObject\n\n\
  {\n@private\nShapeColor fillColor;\nShapeRect bounds;\n}\n\n- (void) setFillColor:\
  \ (ShapeColor) fillColor;\n```\n\n\n\n```objc\n- (void) setBounds: (ShapeRect) bounds;\n\
  \n- (void) draw;\n\n@end // Circle\n```\n\n这段代码包含了一些我们尚未讨论过的语法，让我们来逐一讲解。这几行代码中包含了大量信息，我们逐行拆解分析。\n\
  \n第一行代码如下：\n\n```objc\n@interface Circle : NSObject\n```\n\n正如我们在第 2 章中所说，每当你在 Objective-C\
  \ 中看到 `@` 符号时，你看到的就是对 C 语言的扩展。`@interface Circle` 告诉编译器：“接下来是一个名为 `Circle` 的新类的接口。”\n\
  \n**注意**：`@interface` 行中的 `NSObject` 告诉编译器 `Circle` 类是基于 `NSObject` 类的。这句话表明每个 Circle\
  \ 对象同时也是 NSObject 对象，并且每个 Circle 对象都将继承 `NSObject` 类定义的所有行为。我们将在下一章更详细地探讨继承。\n\n\
  接下来是一些看起来类似于 C 函数原型的代码行：\n\n```objc\n- (void) draw;\n- (void) setFillColor: (ShapeColor)\
  \ fillColor;\n- (void) setBounds: (ShapeRect) bounds;\n```\n\n在 Objective-C 中，这些被称为**方法声明**。它们很像传统的\
  \ C 函数原型，用来表示：“这是我支持的功能。”这些方法声明给出了每个方法的名称、返回类型以及任何参数。\n\n让我们从最简单的 `draw` 方法开始：\n\
  \n```objc\n- (void) draw;\n```\n\n前导短横线表示这是一个 Objective-C 方法的声明。这也是区分方法声明和函数原型的方式之一（函数原型没有前导短横线）。短横线之后是方法的返回类型，用括号括起来。在本例中，`draw`\
  \ 方法只负责绘制图形，不返回任何内容。Objective-C 使用 `void` 表示没有返回值。\n\nObjective-C 方法可以返回与 C 函数相同的类型：标准类型（`int`、`float`\
  \ 和 `char`）、指针、对象引用以及结构体。\n\n接下来的方法声明更有趣：\n\n```objc\n- (void) setFillColor: (ShapeColor)\
  \ fillColor;\n- (void) setBounds: (ShapeRect) bounds;\n```\n\n每个方法都接受一个参数。`setFillColor:`\
  \ 接受一个颜色作为参数。Circle 对象在绘制自身时会使用这个颜色。`setBounds:` 接受一个矩形作为参数。Circle 对象使用这个矩形来定义其边界。\n\
  \n### 了解中缀表示法\n\nObjective-C 使用一种称为**中缀表示法**的语法技巧。方法的名称及其参数是交织在一起的。例如，调用一个单参数的方法如下：\n\
  \n```objc\n[circle setFillColor: kRedColor];\n```\n\n而接受两个参数的方法调用如下：\n\n```objc\n\
  [textThing setStringValue: @\"hello there\" color: kBlueColor];\n```\n\n其中 `setStringValue:`\
  \ 和 `color:` 是参数名称（实际上也是方法名的一部分——稍后会详细说明），而 `@\"hello there\"` 和 `kBlueColor` 则是传入的参数。\n\
  \n这种语法与 C 语言不同。在 C 语言中，你调用函数时，函数名后面跟着所有参数，像这样：\n\n```c\nsetTextThingValueColor (textThing,\
  \ @\"hello there\", kBlueColor);\n```\n\n我们非常喜欢中缀表示法，尽管它初看起来有点奇怪。它让代码非常易读，并且能轻松地将参数与其作用对应起来。使用\
  \ C 和 C++ 代码时，函数有时会有四五个参数，如果不查阅文档，很难确切知道每个参数的作用。\n\n`setFillColor:` 声明以常见的短横线和括号内的返回类型开始：\n\
  \n```objc\n- (void)\n```\n\n与 `draw` 方法一样，短横线表示“这是一个新方法的声明”。`(void)` 表示此方法不返回任何内容。我们继续查看代码：\n\
  \n```objc\nsetFillColor:\n```\n\n方法的名称是 `setFillColor:`。后面的冒号是名称的一部分。它向编译器和人类提示，接下来将有一个参数。\n\
  \n```objc\n(ShapeColor) fillColor;\n```\n\n参数的类型在括号中指定，本例中是 `ShapeColor` 值之一（`kRedColor`、`kBlueColor`\
  \ 等）。紧随其后的 `fillColor` 是参数名称。你可以在方法体中使用这个名称来引用该参数。通过选择有意义的参数名称（而不是以宠物或最喜欢的超级英雄命名），可以让代码更易于阅读。\n\
  \n### 冒号大集合\n\n务必记住，冒号是方法名称中非常重要的一部分。方法：\n\n```objc\n- (void) scratchTheCat;\n```\n\
  \n与以下方法不同：\n\n```objc\n- (void) scratchTheCat: (CatType) critter;\n```\n\n许多初学 Objective-C\
  \ 的程序员经常犯的一个错误是在无参数的方法名称末尾随意添加冒号。遇到编译器错误时，你可能会忍不住多加一个冒号，希望它能解决问题。需要遵循的规则是：如果方法接受一个参数，它就有冒号；如果不接受参数，就没有冒号。\n\
  \n`setBounds:` 的声明与 `setFillColor:` 完全一样，只是参数类型是 `ShapeRect` 而不是 `ShapeColor`。\n\
  \n最后一行代码告诉编译器 `Circle` 类的声明已完成：\n\n```objc\n@end // Circle\n```\n\n尽管不是必须的，但我们建议在所有\
  \ `@end` 语句后添加注释注明类名。这样，当你滚动到文件末尾或查看长打印稿的最后一页时，就能轻松知道当前查看的是什么内容。\n\n以上就是 `Circle`\
  \ 类的完整接口。现在，任何阅读代码的人都知道，这个类有几个实例变量和三个方法。一个方法设置边界，一个方法设置颜色，第三个方法绘制图形。\n\n接口部分完成后，接下来该编写使这个类真正发挥作用的代码了。你不会以为我们已经完成了吧？\n\
  \n## `@implementation` 部分\n\n我们刚刚讨论的 `@interface` 部分定义了一个类的公共接口。这个接口通常被称为 API，是“应用程序编程接口”的三字母缩写（而\
  \ TLA 本身也是“三字母缩写”的三字母缩写）。让对象真正工作的实际代码位于 `@implementation` 部分。\n\n以下是 `Circle` 类的完整实现：\n\
  \n```objc\n@implementation Circle\n\n- (void) setFillColor: (ShapeColor) c\n{\n\
  \    fillColor = c;\n} // setFillColor\n\n- (void) setBounds: (ShapeRect) b\n{\n\
  \    bounds = b;\n} // setBounds\n```\n\n现在，我们以惯常的方式详细检查这段代码。`Circle` 的实现从这一行开始：\n\
  \n```objc\n@implementation Circle\n```\n\n`@implementation` 是一个编译器指令，表示你即将提供类的内部实现代码。类的名称出现在\
  \ `@implementation` 之后。这行末尾没有分号，因为 Objective-C 的编译器指令不需要分号。\n\n在开始声明一个新类之后，我们告诉编译器\
  \ Circle 对象需要的各种数据：\n\n```objc\n{\n    ShapeColor fillColor;\n    ShapeRect bounds;\n\
  }\n```\n\n花括号内的内容是一个模板，用于生成新的 `Circle` 对象。它表明当创建一个新的 `Circle` 对象时，该对象将由两个元素组成。第一个元素\
  \ `fillColor`（类型为 `ShapeColor`）是用于绘制 Circle 对象的颜色。第二个元素 `bounds` 是 Circle 对象的边界矩形，其类型为\
  \ `ShapeRect`。这个矩形决定了图形在屏幕上的绘制位置。再次强调，关键是矩形是图形数据的一部分；*如何*使用这些数据在此处并不重要。\n\n你在类声明中指定了\
  \ `fillColor` 和 `bounds`。每次创建 `Circle` 对象时，它都包含这两个元素。因此，每个 `Circle` 类的对象都有自己的 `fillColor`\
  \ 和 `bounds`。`fillColor` 和 `bounds` 值被称为 `Circle` 类对象的**实例变量**。\n\n右花括号告诉编译器，我们已经完成了\
  \ `Circle` 实例变量的声明。\n\n\n\n\n## 方法定义详解\n\n各个方法的定义将在下文逐一介绍。这些方法的出现顺序不必与`@interface`指令中的声明顺序保持一致。你甚至可以在`@implementation`中定义那些在`@interface`中没有对应声明的方法。你可以将这些方法视为私有方法，仅供类的实现内部使用。\n\
  \n**注意**：你可能会认为，仅在`@implementation`指令中定义方法就能使其在实现外部不可访问，但事实并非如此。Objective-C 实际上并没有真正的私有方法。没有任何办法能将方法标记为私有，并阻止其他代码调用它。这是\
  \ Objective-C 动态特性的一个副作用。\n\n`setFillColor:`是第一个被定义的方法：\n\n```objectivec\n- (void)\
  \ setFillColor: (ShapeColor) c\n{\n    fillColor = c;\n} // setFillColor\n```\n\n\
  `setFillColor:`方法定义的第一行看起来与`@interface`部分中的声明非常相似。主要区别在于，这里的定义末尾没有分号。你可能注意到我们将参数重命名为`c`。在`@interface`和`@implementation`中，参数名可以不同。在本例中，如果我们保留参数名为`fillColor`，它将隐藏`fillColor`实例变量，并导致编译器产生警告。\n\
  \n**注意**：为什么我们必须重命名`fillColor`？我们已经在类中定义了一个名为`fillColor`的实例变量。在这个方法中，我们可以引用该变量——它处于作用域内。因此，如果我们再定义一个同名的变量，编译器将切断我们对实例变量的访问。使用相同的变量名会隐藏原始变量。我们通过为参数使用新名称来避免这个问题。我们也可以将实例变量命名为其他名称，例如`myFillColor`，然后保留`fillColor`作为参数名。正如你将在第\
  \ 16 章中看到的，如果我们将实例变量命名为与方法名称相似的方式，Cocoa 可以施展一些魔法。\n\n在`@interface`部分，我们使用方法声明中的`fillColor`，因为它能准确告知读者参数的用途。而在实现中，我们必须区分参数名和实例变量名，最简单的做法就是直接重命名参数。\n\
  \n方法体只有一行代码：\n\n```objectivec\nfillColor = c;\n```\n\n如果你特别好奇，可能会想知道实例变量存储在哪里。在\
  \ Objective-C 中调用方法时，会有一个名为`self`的秘密隐藏参数被传递给接收对象，该参数指向接收对象本身。例如，在代码`[circle setFillColor:\
  \ kRedColor]`中，该方法将`circle`作为其`self`参数传递。由于`self`是秘密且自动传递的，你无需手动处理。在方法内部，引用实例变量的代码实际上是这样工作的：\n\
  \n```objectivec\nself->fillColor = c;\n```\n\n顺便提一下，传递隐藏参数又是间接性的一种体现（你以为我们已经讲完间接性了，是吧？）。因为\
  \ Objective-C 运行时可以将不同的对象作为隐藏的`self`参数传递，所以它可以改变哪些对象的实例变量被修改。\n\n**注意**：Objective-C\
  \ 运行时是一段支持应用程序（包括我们的应用）在用户运行时执行的代码。运行时执行重要的任务，比如向对象发送消息和传递参数。从第 9 章开始，你将在后续章节中了解更多关于运行时的内容。\n\
  \n第二个方法`setBounds:`与我们的`setFillColor:`方法类似：\n\n```objectivec\n- (void) setBounds:\
  \ (ShapeRect) b\n{\n    bounds = b;\n} // setBounds\n```\n\n这段代码将圆形对象的边界矩形设置为传入的矩形。\n\
  \n最后一个方法是我们的`draw`方法。注意，方法名末尾没有冒号，这表明它不接受任何参数：\n\n```objectivec\n- (void) draw\n\
  {\n    NSLog (@\"drawing a circle at (%d %d %d %d) in %@\",\n           bounds.x,\
  \ bounds.y,\n           bounds.width, bounds.height,\n```\n\n\n`colorName(fillColor)`);\n\
  \n} // draw\n\n`draw`方法使用隐藏的`self`参数来查找其实例变量的值，就像`setFillColor:`和`setBounds:`所做的那样。这个方法接着使用`NSLog()`来打印文本，供所有人查看。\n\
  \n其他类（`Rectangle`和`Egg`）的`@interface`和`@implementation`与`Circle`的几乎完全相同。\n\n## 实例化对象\n\
  \n现在，我们准备好进入`Shapes-Object`最后、也是最核心的部分了。在这里，我们将创建可爱的形状对象，例如红色的圆形和绿色的矩形。这个过程的高大上术语是**实例化**。当你实例化一个对象时，首先会分配内存，然后将该内存初始化为一些有用的默认值——也就是不同于刚分配的内存中那些随机值。当分配和初始化步骤完成后，我们就说一个新的**实例**已被创建。\n\
  \n**注意** 由于对象的局部变量特定于该对象的实例，我们称它们为实例变量，通常简称为“`ivars`”。\n\n要创建一个新对象，我们向感兴趣的类发送`new`消息。一旦类接收并处理了`new`消息，我们就有了一个新的对象实例可供使用。\n\
  \nObjective-C 的一个精巧特性是，你可以将类像对象一样对待并发送消息给它。这对于不绑定到特定对象、而是面向整个类的行为非常有用。此类消息的最佳示例就是分配一个新对象。当你想要一个新的圆形时，向`Circle`类请求该新对象是合适的，而不是向一个已有的圆形对象请求。\n\
  \n以下是`Shapes-Object`的`main()`函数，它创建了圆形、矩形和蛋形：\n\n```\nint main (int argc, const\
  \ char * argv[])\n{\n    id shapes[3];\n    ShapeRect rect0 = { 0, 0, 10, 30 };\n\
  \    shapes[0] = [Circle new];\n    [shapes[0] setBounds: rect0];\n    [shapes[0]\
  \ setFillColor: kRedColor];\n    ShapeRect rect1 = { 30, 40, 50, 60 };\n    shapes[1]\
  \ = [Rectangle new];\n    [shapes[1] setBounds: rect1];\n    [shapes[1] setFillColor:\
  \ kGreenColor];\n    ShapeRect rect2 = { 15, 19, 37, 29 };\n    shapes[2] = [Egg\
  \ new];\n    [shapes[2] setBounds: rect2];\n    [shapes[2] setFillColor: kBlueColor];\n\
  \    drawShapes (shapes, 3);\n    return (0);\n} // main\n```\n\n你可以看到，`Shapes-Object`的`main()`与`Shapes-Procedural`的非常相似。不过有几个区别。`Shapes-Object`没有使用形状数组，而是使用了一个`id`元素数组（你可能还记得，`id`是指向任何类型对象的指针）。你通过向要创建的对象的类发送`new`消息来创建单个对象：\n\
  \n```\nshapes[0] = [Circle new];\n...\nshapes[1] = [Rectangle new];\n...\nshapes[2]\
  \ = [Egg new];\n```\n\n另一个区别是，`Shapes-Procedural`通过直接赋值结构体成员来初始化对象。而`Shapes-Object`则不直接操作对象。相反，`Shapes-Object`使用消息来请求每个对象设置其边界矩形和填充颜色：\n\
  \n```\n[shapes[0] setBounds: rect0]; [shapes[0] setFillColor: kRedColor];\n[shapes[1]\
  \ setBounds: rect1]; [shapes[1] setFillColor: kGreenColor];\n[shapes[2] setBounds:\
  \ rect2]; [shapes[2] setFillColor: kBlueColor];\n```\n\n在这场初始化狂欢之后，形状通过我们之前看到的`drawShapes()`函数绘制，如下所示：\n\
  \n```\ndrawShapes (shapes, 3);\n```\n\n## 扩展 Shapes-Object\n\n还记得我们之前向`Shapes-Procedural`程序添加三角形的时候吗？让我们为`Shapes-Object`做同样的事情。这次的任务应该会整洁得多。你可以在*Learn\
  \ ObjC Projects*的*03.11 Shapes-Object-2*文件夹中找到该项目的代码。\n\n为了教`Shapes-Procedural-2`认识三角形，我们不得不做了很多事情：编辑`ShapeType`枚举、添加`drawTriangle()`函数、在形状列表中添加一个三角形、以及修改`drawShapes()`函数。其中一些工作是相当侵入性的，尤其是对`drawShapes()`进行的手术——我们不得不编辑控制所有形状绘制的循环，这潜在地引入了错误。\n\
  \n而对于`Shapes-Object-2`，我们只需要做两件事：创建一个新的`Triangle`类，然后在要绘制的对象列表中添加一个`Triangle`对象。\n\
  \n以下是`Triangle`类，它与`Circle`类完全一样，只是将所有出现的“`Circle`”改为了“`Triangle`”。（当然，我们只是打印文本而没有进行真正的绘制。如果我们真的在绘制，代码会更具辨识度。）\n\
  \n```\n@interface Triangle : NSObject\n{\n    ShapeColor fillColor;\n    ShapeRect\
  \ bounds;\n}\n- (void) setFillColor: (ShapeColor) fillColor;\n- (void) setBounds:\
  \ (ShapeRect) bounds;\n- (void) draw;\n@end // Triangle\n\n@implementation Triangle\n\
  - (void) setFillColor: (ShapeColor) c\n{\n    fillColor = c;\n} // setFillColor\n\
  \n- (void) setBounds: (ShapeRect) b\n{\n    bounds = b;\n} // setBounds\n\n- (void)\
  \ draw\n{\n    NSLog (@\"drawing a triangle at (%d %d %d %d) in %@\",\n        \
  \   bounds.x, bounds.y,\n           bounds.width, bounds.height,\n           colorName(fillColor));\n\
  } // draw\n@end // Triangle\n```\n\n**注意** 像我们的`Triangle`类这种复制粘贴式编程的一个缺点是，它往往会产生大量重复的代码，比如`setBounds:`和`setFillColor:`方法。我们将在下一章向你介绍继承，这是避免此类冗余代码的好方法。\n\
  \n接下来，我们需要编辑`main()`以便创建新的三角形。首先，将`shapes`数组的大小从 3 改为 4，以便有足够的空间来存储新对象：\n\n```\n\
  id shapes[4];\n```\n\n之后，添加一段代码来创建一个新的`Triangle`，就像我们创建新的`Rectangle`或`Circle`一样：\n\
  \n```\nShapeRect rect3 = { 47, 32, 80, 50 };\nshapes[3] = [Triangle new];\n[shapes[3]\
  \ setBounds: rect3];\n[shapes[3] setFillColor: kRedColor];\n```\n\n最后，使用`shapes`数组的新长度更新对`drawShapes()`的调用：\n\
  \n```\ndrawShapes (shapes, 4);\n```\n\n就这样。我们的程序现在认识三角形了：\n\n```\ndrawing a circle\
  \ at (0 0 10 30) in red\ndrawing a rectangle at (30 40 50 60) in green\ndrawing\
  \ an egg at (15 19 37 29) in blue\ndrawing a triangle at (47 32 80 50) in red\n\
  ```\n\n请注意，我们能够在不触碰`drawShapes()`函数或任何其他处理形状的函数的情况下添加这个新功能。这就是面向对象编程的威力所在。\n\n**注意** `Shapes-Object-2`中的代码体现了面向对象编程大师\
  \ Bertrand Meyer 的“开闭原则”（Open/Closed Principle），该原则指出软件实体应对扩展开放，对修改关闭。`drawShapes()`函数对扩展是开放的：只需在数组中添加一种新的形状对象即可绘制。`drawShapes()`对修改也是关闭的：我们可以在不修改它的情况下扩展它。遵循开闭原则的软件在面临变更时往往更加健壮，因为你不必编辑已经正确运行的代码。\n\
  \n## 总结\n\n这一章内容充实、烧脑——包含了许多概念和想法——而且篇幅也很长。我们讨论了间接性的强大概念，并展示了你在程序中已经使用过间接性，例如在处理变量和文件时。然后，我们讨论了过程式编程，并向你展示了其“函数优先，数据其次”世界观所带来的一些限制。\n\
  \n我们介绍了面向对象编程，它利用间接性将数据与操作数据的代码紧密关联。这允许一种“数据优先，函数其次”的编程风格。我们讨论了消息，消息被发送给对象。对象通过执行方法来处理这些消息，这些代码块让对象“唱歌跳舞”。你还了解到每个方法调用都包含一个名为`self`的隐藏参数，它就是对象本身。方法通过使用这个`self`参数来查找和操作对象的数据。方法的实现和对象数据的模板由对象的类定义。你通过向类发送`new`消息来创建一个新对象。\n\
  \n\n\n# 第 4 章：继承\n\n下一章我们将介绍继承，这项特性让你能够利用现有对象的行为，从而用更少的代码完成工作。嘿，听起来不错！我们到时候见！\n\n\
  ## 继承\n\n当你编写面向对象程序时（我们希望你会编写*大量*这类程序），你创建的类与对象之间会存在相互关系。它们协同工作，让程序实现其功能。\n\n在处理类与对象之间的关系时，面向对象编程有两个最重要的方面。第一个是**继承**，也就是本章的主题。当你创建一个新类时，通常可以根据它相对于另一个已有类的差异来定义这个新类。通过继承，你可以定义一个拥有父类所有能力的类：它*继承*了这些能力。\n\
  \n另一种与相关类配合使用的面向对象编程技术是**组合**，在这种技术中，对象包含对其他对象的引用。例如，赛车模拟器中的汽车对象可能拥有四个轮胎对象，供其游戏过程中使用。当你的对象持有对其他对象的引用时，你就可以利用其他对象提供的功能：这就是组合。我们将在下一章介绍组合。\n\
  \n## 为什么要使用继承？\n\n还记得上一章中我们那位老朋友 Shapes-Object 程序吗？它包含几个具有非常相似接口和实现的类。当然，它们之所以相似，是因为我们是通过复制粘贴来创建的。\n\
  \n我们将通过展示 `Circle` 和 `Rectangle` 类的接口来唤起你的记忆：\n\n```objc\n@interface Circle : NSObject\n\
  {\n@private\n    ShapeColor fillColor;\n    ShapeRect bounds;\n}\n- (void) setFillColor:(ShapeColor)fillColor;\n\
  - (void) setBounds:(ShapeRect)bounds;\n- (void) draw;\n@end // Circle\n\n@interface\
  \ Rectangle : NSObject\n{\n@private\n    ShapeColor fillColor;\n    ShapeRect bounds;\n\
  }\n- (void) setFillColor:(ShapeColor)fillColor;\n- (void) setBounds:(ShapeRect)bounds;\n\
  - (void) draw;\n@end // Rectangle\n```\n\n这些类的接口非常相似——非常，*非常*相似。事实上，除了类名之外，它们简直是双胞胎。\n\
  \n`Circle` 和 `Rectangle` 的实现也非常相似。回顾上一章，`setFillColor:` 和 `setBounds:` 在这两个类中是相同的：\n\
  \n```objc\n@implementation Circle\n- (void)setFillColor:(ShapeColor)c\n{\n    fillColor\
  \ = c;\n} // setFillColor\n\n- (void)setBounds:(ShapeRect)b\n{\n    bounds = b;\n\
  } // setBounds\n// …\n@end // Circle\n\n@implementation Rectangle\n- (void) setFillColor:\
  \ (ShapeColor) c\n{\n    fillColor = c; } // setFillColor\n\n- (void)setBounds:(ShapeRect)b\n\
  {\n    bounds = b;\n} // setBounds\n// …\n@end // Rectangle\n```\n\n这些方法完成的工作完全相同；它们设置\
  \ `fillColor` 和 `bounds` 实例变量。然而，`Circle` 和 `Rectangle` 的实现并不完全相同。例如，`draw` 方法的签名（即方法名和参数）在两个类中相同，但实现不同：\n\
  \n```objc\n@implementation Circle\n// …\n- (void) draw\n{\n    NSLog (@\"drawing\
  \ a circle at (%d %d %d %d) in %@\",\n           bounds.x, bounds.y,\n         \
  \  bounds.width, bounds.height,\n           colorName(fillColor));\n} // draw\n\
  @end // Circle\n\n@implementation Rectangle\n// …\n- (void) draw\n{\n    NSLog (@\"\
  drawing rect at (%d %d %d %d) in %@\",\n           bounds.x, bounds.y,\n       \
  \    bounds.width, bounds.height,\n           colorName(fillColor));\n} // draw\n\
  @end // Rectangle\n```\n\n显然，Shapes-Object 在 `Circle` 和 `Rectangle` 类之间重复了大量代码和行为。图\
  \ 4-1 是这些类的示意图。\n\n![9781430241881_Fig04-01.eps](img/9781430241881_Fig04-01_fmt.jpg)\n\
  \n图 4-1. 无继承的 Shapes-Object 架构\n\n**注意** 在图 4-1 中，类的名称位于每个框的顶部。中间部分给出实例变量，底部显示该类提供的方法。这种图由统一建模语言（UML）定义，是绘制类、其内容及其关系的常用方式。\n\
  \n\n\n\n图 4-1 中存在大量重复，这看起来效率极低。在编程中，这种重复往往意味着糟糕的架构。你需要维护两倍的代码量，修改代码时还需在两处（甚至更多）位置进行改动，这大大增加了引入错误的概率。若忘记在某个位置进行修改，就可能导致诡异的\
  \ Bug。\n\n如果所有重复内容能整合到一处，岂不美哉？而如果我们还能在需要的地方（比如绘制圆形和矩形时）保留自定义方法的能力，那就更棒了。我们需要一种机制，能告诉编译器：“`Circle`\
  \ 类就像另一个东西，只需稍微调整几处即可。”你可能已经猜到，恰好能满足这一需求的强大面向对象特性就是**继承**。\n\n图 4-2 展示了引入继承后的架构。我们创建了一个全新的类\
  \ `Shape`，用于存放通用实例变量并声明方法。类 `Shape` 包含了 `setFillColor:` 和 `setBounds:` 的实现。\n\n\
  ![9781430241881_Fig04-02.eps](img/9781430241881_Fig04-02_fmt.jpg)\n\n图 4-2 使用继承优化后的几何形状对象架构\n\
  \n**注** 如图 4-2 所示，末端带箭头的线条是 UML 中表示继承的方式。该线条展示了 `Circle` 与 `Shape` 之间，以及 `Rectangle`\
  \ 与 `Shape` 之间的继承关系。\n\n看看图 4-2 中我们焕然一新的 `Circle` 和 `Rectangle` 类。它们比以前精简了许多。所有通用元素都被提取到了\
  \ `Shape` 中。留在 `Circle` 和 `Rectangle` 中的，只剩下它们独特的元素，尤其是 `draw` 方法。现在我们说 `Circle`\
  \ 和 `Rectangle` *继承*自 `Shape`。\n\n就像你可能从亲生父母那里继承了发色、鼻形或使用 Mac 的偏好一样，面向对象编程中的继承意味着一个类从另一个类（其父类或**超类**）获取特性。`Circle`\
  \ 和 `Rectangle` 因继承自 `Shape`，而获得了 `Shape` 的两个实例变量。\n\n**注** 直接修改继承来的实例变量值被视为不良做法。请务必使用方法或属性来修改它们。\n\
  \n除了实例变量，继承也顺带提供了方法。每个 `Circle` 和 `Rectangle` 都知道如何响应 `setFillColor:` 和 `setBounds:`。它们从类\
  \ `Shape` 继承了这一能力。\n\n## 继承语法\n\n让我们看一下声明新类时使用的语法：`@interface Circle : NSObject`。\n\
  \n冒号后的标识符就是你要继承的类。在 Objective-C 中，你可以不继承任何类，但如果使用 Cocoa，你应该继承自 `NSObject`，因为它提供了许多有用的特性（当你继承自一个继承自\
  \ `NSObject` 的类时，你也能获得这些特性）。我们将在第 9 章讨论内存管理时详细介绍 `NSObject` 的特性。\n\n### 单一继承\n\n\
  某些语言（如 C++）包含一种称为**多重继承**的特性，即一个类可以直接继承自两个或多个类。Objective-C 不支持多重继承。如果你试图在 Objective-C\
  \ 中使用多重继承（可能类似下面的语句），编译器会非常不高兴：\n\n`@interface Circle : NSObject, PrintableObject`\n\
  \n你可以通过使用 Objective-C 的其他特性（如分类，见第 12 章；以及协议，见第 13 章）来获得多重继承的许多好处。\n\n既然你已经了解了继承，并且我们正在优化架构使类继承自\
  \ `Shape`，那么 `Circle` 和 `Rectangle` 的接口将变为如下所示（你可以在 *04.01 Shapes-Inheritance* 中找到此程序的代码）：\n\
  \n```  \n@interface Circle : Shape  \n\n@end // Circle  \n\n@interface Rectangle\
  \ : Shape  \n\n@end // Rectangle  \n```\n\n没有比这更简洁的了。当代码简洁时，Bug 就无处藏身。\n\n注意我们不再声明实例变量：它们作为继承的一部分来自\
  \ `Shape`。你可能会发现我们没有为缺失的实例变量包含花括号：如果没有实例变量，你可以省略花括号。我们也没有声明从 `Shape` 继承的方法（`setBounds:`\
  \ 和 `setFillColor:`）。\n\n现在，让我们看看使 `Shape` 生效的代码。以下是 `Shape` 的声明：\n\n```  \n@interface\
  \ Shape : NSObject {  \n\nShapeColor fillColor;  \n\nShapeRect bounds;  \n\n}  \n\
  \n- (void) setFillColor:(ShapeColor)fillColor;  \n\n- (void) setBounds:(ShapeRect)bounds;\
  \  \n\n- (void) draw;  \n\n@end // Shape  \n```\n\n可以看到，`Shape` 将所有之前在不同类中重复的内容整洁地打包在一起。\n\
  \n`Shape` 的实现简洁且意料之中：\n\n```  \n@implementation Shape  \n\n- (void)setFillColor:(ShapeColor)c\
  \  \n\n{  \n\nfillColor = c;  \n\n} // setFillColor  \n\n- (void)setBounds:(ShapeRect)b\
  \  \n\n{  \n\nbounds = b;  \n\n} // setBounds  \n\n- (void) draw  \n\n{  \n\n} //\
  \ draw  \n\n@end // Shape  \n```\n\n尽管 `draw` 方法没有做任何事情，我们仍然定义了它，以便 `Shape` 的所有子类都能实现自己的版本。方法定义中允许有空实现体，或返回一个虚拟值。\n\
  \n现在，让我们检查 `Circle` 的实现。你可能已经猜到，它现在简单多了：\n\n```  \n@implementation Circle  \n\n\
  - (void) draw  \n\n{  \n\nNSLog(@\"drawing a circle at (%d %d %d %d) in %@\", bounds.x,\
  \ bounds.y, bounds.width,  \n\nbounds.height, colorName(fillColor));  \n\n} // draw\
  \  \n\n@end // Circle  \n```\n\n以下是新的、简化的 `Rectangle` 实现：\n\n```  \n@implementation\
  \ Rectangle  \n\n- (void)draw  \n\n{  \n\nNSLog(@\"drawing rect at (%d %d %d %d)\
  \ in %@\",  \n\nbounds.x, bounds.y,  \n\nbounds.width, bounds.height,  \n\ncolorName(fillColor));\
  \  \n\n} // draw  \n\n@end // Rectangle  \n```\n\n`Triangle` 和 `Egg` 类也同样变得更加精简。详情请查看\
  \ *04.01 Shapes-Inheritance* 文件夹。\n\n现在你可以运行 `Shapes-Inheritance`，会发现它和之前运行得一模一样。注意一个有趣的事实：我们完全没有改动\
  \ `main()` 中设置和使用对象的代码。这是因为我们没有改变对象响应的方法，也没有修改它们的行为。\n\n**注** 这种移动和简化代码的方式称为**重构**，这是面向对象社区中非常流行的做法。重构时，你移动代码以改善架构（就像我们在这里消除重复代码一样），而不改变代码的行为或结果。典型的开发周期包括向代码添加一些功能，然后进行重构以消除重复。\n\
  \n你可能会惊讶地发现，面向对象程序在*添加*新功能后往往会变得更简单——这正是我们添加 `Shapes` 类时发生的情况。\n\n## 术语小憩\n\n没有新术语要学，还算什么新技术？以下是掌握继承概念所需的词汇：\n\
  \n\n\n\n- ![image](img/9781430241881_square_fmt.jpg)   **超类（superclass）** 是你继承的类。`Circle`\
  \ 的超类是 `Shape`。`Shape` 的超类是 `NSObject`。\n- ![image](img/9781430241881_square_fmt.jpg)\
  \  **父类（Parent class）** 是“超类”的另一种说法。例如，`Shape` 是 `Rectangle` 的父类。\n- ![image](img/9781430241881_square_fmt.jpg)\
  \  **子类（subclass）** 是执行继承的类。`Circle` 是 `Shape` 的子类，`Shape` 是 `NSObject` 的子类。\n-\
  \ ![image](img/9781430241881_square_fmt.jpg)  **子类（Child class）** 是“子类”的另一种说法。`Circle`\
  \ 是 `Shape` 的子类。你可以选择使用 `subclass`/`superclass` 或 `parent class`/`child class`。在现实中你可能会遇到这两对术语。在本书中，我们使用\
  \ superclass 和 subclass，大概是因为我们比“父母”更书呆子气。\n- ![image](img/9781430241881_square_fmt.jpg)\
  \  当你想要改变一个继承方法的实现时，你 **重写（override）** 它。`Circle` 有自己的 `draw` 方法，所以我们说它重写了 `draw`。当代码运行时，Objective-C\
  \ 会确保调用被重写方法的正确类的实现。\n\n## 继承如何工作\n\n我们对 `Shapes-Object` 进行了大手术，将 `Circle` 和 `Rectangle`\
  \ 中的所有代码取出并移入 `Shape`。很酷的是，程序的其余部分无需修改仍能工作。在 `main()` 中创建和初始化所有不同形状的代码没有改变，`drawShapes()`\
  \ 函数也是一样，但程序仍然能工作：\n\n```\ndrawing a circle at (0 0 10 30) in red\ndrawing a rect\
  \ at (30 40 50 60) in green\ndrawing an egg at (15 19 37 29) in blue\ndrawing a\
  \ triangle at (47 32 80 50) in red\n```\n\n在这里，你可以看到 OOP 力量的另一个方面：你可以对程序进行彻底的更改，如果足够小心，完成后一切仍能正常工作。当然，你也可以用过程式编程做到这一点，但使用\
  \ OOP 成功率通常更高。\n\n## 方法分发\n\n对象在接收消息时如何知道要运行哪个方法？例如，`setFillColor:` 的代码已经从 `Circle`\
  \ 和 `Rectangle` 类中移出，那么当你向一个 `Circle` 对象发送 `setFillColor:` 时，`Shape` 代码如何知道该做什么？秘密在于：当代码发送消息时，Objective-C\
  \ 方法分发器会在当前类中查找该方法。如果分发器在接收消息的对象所属的类中没有找到该方法，它就会去该对象的超类中查找。\n\nFigure 4-3 展示了在我们程序的旧版（`Shape`\
  \ 之前）中，代码向 `Circle` 对象发送 `setFillColor:` 消息时的方法分发过程。为了处理像 `[shape setFillColor:kRedColor]`\
  \ 这样的代码，Objective-C 方法分发器会查看接收消息的对象；在本例中，它是一个 `Circle` 类的对象。该对象有一个指向其类的指针，而该类有一个指向其代码的指针。分发器使用这些指针来找到要运行的正确代码。\n\
  \n![9781430241881_Fig04-03.eps](img/9781430241881_Fig04-03_fmt.jpg)\n\nFigure 4-3.\
  \ 没有继承的方法分发\n\n请看 Figure 4-4，它展示了我们时髦的、强化了继承的新结构。在这段代码中，`Circle` 类有一个指向其超类 `Shape`\
  \ 的引用。当消息到来时，Objective-C 方法分发器使用这个信息来找到方法的正确实现。\n\n![9781430241881_Fig04-04.eps](img/9781430241881_Fig04-04_fmt.jpg)\n\
  \nFigure 4-4. 继承和类代码\n\nFigure 4-5 展示了涉及继承时的方法分发过程。当你向 `Circle` 对象发送 `setFillColor:`\
  \ 消息时，分发器首先查询 `Circle` 类，看它是否能用自己代码响应 `setFillColor:`。在本例中，答案是否定的：分发器发现 `Circle`\
  \ 没有 `setFillColor:` 的定义，于是去超类 `Shape` 中查找。分发器然后在 `Shape` 中搜索并找到了 `setFillColor:`\
  \ 的定义，然后运行那段代码。\n\n![9781430241881_Fig04-05.eps](img/9781430241881_Fig04-05_fmt.jpg)\n\
  \nFigure 4-5. 带继承的方法分发\n\n这种“我在这里找不到，所以我去超类里找”的动作，会根据需要在继承链中的每个类上重复。如果在 `Circle`\
  \ 或 `Shape` 类中都找不到某个方法，分发器会检查 `NSObject` 类，因为它是链中的下一个超类。如果该方法在超类中最顶层的 `NSObject`\
  \ 中也不存在，你会得到一个运行时错误（并且你在编译时也会得到一个警告）。\n\n## 实例变量\n\n我们已经讨论了方法如何响应消息而被调用。现在，让我们看看\
  \ Objective-C 如何访问实例变量。`Circle` 的 `draw` 方法是如何找到在 `Shape` 中声明的 `bounds` 和 `fillColor`\
  \ 实例变量的呢？\n\n当你创建一个新类时，它的对象会从它的超类继承实例变量，然后（可选地）添加它们自己的实例变量。为了了解实例变量继承是如何工作的，让我们发明一个新的、添加了新实例变量的形状。这个新类\
  \ `RoundedRectangle` 需要一个变量来保存在绘制矩形圆角时使用的半径。类定义大致如下：\n\n```objectivec\n@interface\
  \ RoundedRectangle : Shape\n{\n@private\n    int radius;\n}\n@end // RoundedRectangle\n\
  ```\n\nFigure 4-6 展示了一个 `RoundedRectangle` 对象的内存布局。`NSObject` 声明了一个名为 `isa` 的实例变量，它持有指向对象类的指针。接下来是两个由\
  \ `Shape` 声明的实例变量：`fillColor` 和 `bounds`。最后是 `radius`，这是 `RoundedRectangle` 声明的实例变量。\n\
  \n![9781430241881_Fig04-06.eps](img/9781430241881_Fig04-06_fmt.jpg)\n\nFigure 4-6.\
  \ 对象实例变量布局\n\n**注意** `NSObject` 的实例变量被称为 `isa`，因为继承在子类和超类之间建立了一种“是一个”（is a）的关系；也就是说，`Rectangle`\
  \ *是一个* `Shape`，`Circle` *是一个* `Shape`。使用 `Shape` 的代码也可以使用 `Rectangle` 或 `Circle`\
  \ 来代替。\n\n使用更具体的对象类型（`Rectangle` 或 `Circle`）代替一般类型（`Shape`）的能力称为多态（polymorphism），这个词来自希腊语，意为“多种形态”，这很恰当。\n\
  \n请记住，每个方法调用都会获得一个隐藏的参数，称为 `self`，它是一个指向接收消息的对象的指针。方法使用 `self` 参数来找到它们使用的实例变量。\n\
  \nFigure 4-7 展示了 `self` 指向一个 `RoundedRectangle` 对象。`self` 指向继承链中第一个类的第一个实例变量。对于\
  \ `RoundedRectangle`，继承链从 `NSObject` 开始，然后是 `Shape`，最后以 `RoundedRectangle` 结束，所以\
  \ `self` 指向第一个实例变量 `isa`。Objective-C 编译器知道对象中实例变量的布局，因为它已经看到了这些类的 `@interface` 声明。有了这个重要的知识，编译器可以生成代码来找到任何实例变量。\n\
  \n![9781430241881_Fig04-07.eps](img/9781430241881_Fig04-07_fmt.jpg)\n\nFigure 4-7.\
  \ `self` 参数指向一个圆对象\n\n**警告：脆弱性！**\n\n\n\n编译器通过一种“基地址加偏移量”的机制施展其魔法。给定一个对象的基地址——即第一个实例变量首字节的内存位置——编译器可以通过向该地址添加一个偏移量来找到所有其他实例变量。\n\
  \n例如，如果圆角矩形对象的基地址是`0x1000`，那么`isa`实例变量位于`0x1000 + 0`，即`0x1000`。`isa`是一个 4 字节的值，因此下一个实例变量`fillColor`起始于偏移量\
  \ 4 处，即`0x1000 + 4`或`0x1004`。每个实例变量都有一个相对于对象基地址的偏移量。\n\n当你在方法中访问`fillColor`实例变量时，编译器会生成代码，获取`self`持有的值并加上偏移量（本例中为\
  \ 4），以指向该变量值存储的位置。\n\n这种做法随着时间的推移会带来问题。这些偏移量被硬编码到了编译器生成的程序中。即使苹果公司的工程师想要向`NSObject`添加另一个实例变量，他们也做不到，因为那会改变所有实例变量的偏移量。这被称为**脆弱的基类问题**。苹果公司已经通过随\
  \ Leopard 引入的新的 64 位 Objective-C 运行时解决了这个问题，该运行时使用间接方式来确定 ivar 的位置。\n\n## 方法重写\n\
  \n当你创建自己的全新子类时，你通常会添加自己的方法。有时，你会添加一个为你的类引入独特功能的新方法。其他时候，你会替换或增强由你新类的某个超类定义的现有方法。\n\
  \n例如，你可以从 Cocoa 的`NSTableView`类开始，该类显示一个可供用户点击的滚动列表，然后添加一个新行为，比如用语音合成器播报列表内容。你可能会添加一个名为`speakRows`的新方法，用于将表格内容馈送给语音合成器。\n\
  \n或者，与其添加一个全新的功能，不如创建一个子类，调整从某个超类继承的现有行为。在*Shapes-Inheritance*中，`Shape`已经完成了我们期望形状所做的大部分工作，比如设置形状的填充颜色和边界，但`Shape`不知道如何绘制任何东西。而且它也无法知道如何绘制：`Shape`是一个通用的抽象类，每个形状的绘制方式都不同。因此，当我们想要创建一个`Circle`类时，我们子类化`Shape`并编写一个知道如何绘制圆形的`draw`方法。\n\
  \n当我们创建`Shape`时，我们知道它的所有子类都必须进行绘制，尽管我们不知道它们具体会如何实现其绘制功能。因此，我们为`Shape`提供了一个`draw`方法，但将其设为空，以便每个子类都可以做自己的事情。当诸如`Circle`和`Rectangle`这样的类实现它们自己的`draw`方法时，我们说它们**重写**了`draw`方法。\n\
  \n当向一个圆形对象发送`draw`消息时，方法调度器会运行被重写的方法——即`Circle`对`draw`的实现。超类（如`Shape`）定义的任何`draw`实现都会被完全忽略。在这种情况中没问题——`Shape`在其`draw`实现中没有代码。但其他时候，你可能*不想*忽略超类版本的方法。更多内容请继续阅读。\n\
  \n## 我感觉超棒！\n\nObjective-C 提供了一种方法来重写一个方法，同时仍然调用超类的实现——当你希望让超类做它自己的事情，并在之前或之后执行一些额外的工作时，这非常有用。要调用继承的方法实现，你可以使用`super`作为方法调用的目标。\n\
  \n例如，假设我们刚了解到某些文化对红色圆形有忌讳，而我们想在这些国家销售我们的*Shapes-Inheritance*软件。我们不继续像之前那样绘制红色圆形，而是希望所有圆形都绘制成绿色。因为这个限制只影响圆形，一种实现方法是修改`Circle`，使所有圆形都绘制成绿色。其他用红色绘制的形状则没有问题，所以我们不需要消除它们。为什么不直接修改`Circle`的填充颜色方法呢？在这里，我们可以这样做。不过，你并不总是有这个便利；例如，你可能没有你想要修改的那个类的代码。\n\
  \n回想一下，`setFillColor:`是在`Shape`类中定义的。因此，我们可以在`Circle`类中重写`setFillColor:`，专门为圆形解决这个问题。我们将检查颜色参数，如果是红色，就将其改为绿色。然后，我们将使用`super`告诉超类（`Shape`）将这个改变后的颜色存储到`fillColor`实例变量中（该程序的完整代码清单在`04.02\
  \ Shapes-Green-Circles`中）。\n\n`Circle`的`@interface`部分没有变化，因为我们没有添加任何新方法或实例变量。我们只需要在`@implementation`部分添加代码：\n\
  \n```\n@implementation Circle\n\n- (void)setFillColor:(ShapeColor)c\n{\n  if (c\
  \ == kRedColor)\n  {\n    c = kGreenColor;\n  }\n  [super setFillColor: c];\n} //\
  \ setFillColor\n\n// Circle @implementation 的其余部分 // 保持不变\n\n@end // Circle\n```\n\
  \n在这个`setFillColor:`的新实现中，我们检查`ShapeColor`参数是否为红色。如果是，我们就将其改为绿色。接下来，我们请求超类通过代码`[super\
  \ setFillColor: c]`来完成将颜色放入实例变量的工作。\n\n`super`从何而来？它不是一个参数也不是一个实例变量，而是 Objective-C\
  \ 编译器提供的一点魔法。当你向`super`发送消息时，你是在要求 Objective-C 将消息发送给该类的超类。如果在超类中没有定义，Objective-C\
  \ 会像往常一样继续沿着继承链向上查找。\n\n图 4-8 展示了`Circle`的`setFillColor:`方法的执行流程。圆形对象被发送了`setFillColor:`消息。方法调度器找到了由`Circle`类实现的`setFillColor:`的自定义版本。\n\
  \n![9781430241881_Fig04-08.eps](img/9781430241881_Fig04-08_fmt.jpg)\n\n图 4-8. 调用超类方法\n\
  \n**注意**   当你重写一个方法时，调用超类方法几乎总是一个好主意，以防它正在执行比你意识到的更多的工作。在这种情况下，我们可以访问`Shape`的源代码，所以我们知道`Shape`在其`setFillColor:`方法中只做了一件事，就是将新颜色存入一个实例变量。但如果我们对`Shape`没有那么熟悉，我们就不会知道`Shape`是否在做其他事情。而且即使我们现在知道`Shape`做了什么，如果该类之后被更改或增强，我们可能也不了解了。通过调用继承的方法，我们确保获得了它实现的所有功能。\n\
  \n在`Circle`版本的`setFillColor:`完成对`kRedColor`的检查并在必要时更改颜色后，通过调用`[super setFillColor:\
  \ c]`来调用超类的方法。`super`调用会运行`Shape`版本的`setFillColor:`方法。\n\n## 总结\n\n继承是面向对象编程中的一个核心概念，因为面向对象编程的许多高级技术都涉及它。在本章中，你了解了继承，并看到了如何使用它来美化和简化*Shapes-Object*代码。我们讨论了如何从现有类创建新类，以及超类的实例变量如何出现在子类中。\n\
  \n我们讲解了 Objective-C 的方法调度机制，并注意到它如何沿着继承链向上查找，以寻找响应特定消息的方法。最后，我们介绍了`super`关键字，并展示了如何在重写的方法中利用它来利用超类的代码。\n\
  \n\n\n你将在下一章了解组合，这是另一种让不同对象协作完成工作的方式。它可能不像继承那样充满极客式的酷感，但非常重要，我们到时见。\n\n# 第 5 章\n\
  \n## 组合\n\n在上一章中，你接触了继承——一种在两个类之间建立关系、从而省去大量重复代码的方式。我们还（简要）提到，你也可以使用组合来建立关系，这正是本章的主题。你可以利用组合将对象结合起来，让它们协同工作。在典型的程序中，创建自己的类时会同时使用继承和组合，因此，熟练掌握这两个概念非常重要。\n\
  \n### 什么是组合？\n\n编程中的组合就像音乐中的作曲：你将各个独立的组成部分结合起来，让它们共同构建出更大的作品。在音乐中，你可能会将巴松管声部和双簧管声部结合起来创作一部交响曲。在软件中，你可能会将`pedal`（踏板）对象和`tire`（轮胎）对象组合起来，作为虚拟独轮车的一部分。\n\
  \n在 Objective-C 中，组合通过将指向对象的指针作为实例变量来实现。因此，我们的虚拟独轮车会有一个指向`Pedal`对象的指针和一个指向`Tire`对象的指针，看起来大致如下：\n\
  \n```\n@interface Unicycle : NSObject\n{\n    Pedal *pedal;\n    Tire *tire;\n}\n\
  @end // Unicycle\n```\n\n通过组合，一个`Unicycle`（独轮车）由`Pedal`（踏板）和`Tire`（轮胎）构成。\n\n**注意**\
  \ 在 Shapes-Object 程序中，你已经见过一种组合形式：`Shape`类使用了矩形（`struct`）和颜色（`enum`）。严格来说，只有对象才被称为组合。更原始的类型，如`int`、`float`、`enum`和`struct`，被视为仅是对象的一部分。\n\
  \n### 汽车讨论\n\n让我们暂时把 Shapes 程序放到一边（我们是否听到了如释重负的叹息？），来看看如何对汽车进行建模。在我们简化的模型中，一辆汽车有一个发动机和四个轮胎。我们不会深入实际的轮胎和发动机的物理建模，而是使用两个类，每个类只有一个方法用于打印它们代表哪个部件：轮胎对象会说它们是轮胎，发动机对象会说它是发动机。在实际程序中，轮胎会有气压、操控性能等属性，发动机则会有马力、油耗等变量。该程序的代码可以在*05.01\
  \ CarParts*中找到。\n\n与 Shapes 程序类似，CarParts 的所有代码都在其`mainCarParts.m`文件中。CarParts 首先导入\
  \ Foundation 框架头文件：\n\n```\n#import <Foundation/Foundation.h>\n```\n\n接下来是`Tire`类，除了一个`description`方法外，它几乎没什么内容：\n\
  \n```\n@interface Tire : NSObject\n@end // Tire\n\n@implementation Tire\n- (NSString\
  \ *) description {\n    return (@\"我是一条轮胎。我能用一阵子。\");\n} // description\n@end //\
  \ Tire\n```\n\n**注意** 如果你的类定义中没有实例变量，可以省略花括号。\n\n`Tire`中唯一的方法是`description`，而且它并没有在接口中声明。它从何而来？如果它没有包含在接口中，别人怎么会知道可以对`Tire`使用`description`方法呢？这借助了一点\
  \ Cocoa 的魔法。\n\n#### 为`NSLog()`进行自定义\n\n回想一下，`NSLog()`允许你使用`%@`格式说明符来打印对象。当`NSLog()`处理`%@`说明符时，它会要求参数列表中对应的对象提供其`description`。从技术上讲，`NSLog()`向该对象发送`description`消息，对象的`description`方法会构建一个`NSString`并返回它。然后`NSLog()`将该字符串包含在输出中。通过在类中提供`description`方法，你可以自定义`NSLog()`打印对象的方式。\n\
  \n在你的`description`方法中，你可以返回一个文字`NSString`，例如`@\"我是一个奶酪丹麦酥对象\"`，或者可以构建一个描述对象各种信息的字符串，例如奶酪丹麦酥的脂肪含量和卡路里。Cocoa\
  \ 的`NSArray`类（用于管理对象集合）的`description`方法会提供关于数组本身的信息，例如它包含的对象数量以及其中每个对象的描述。当然，这些描述是通过向数组中每个对象发送`description`消息而获得的。\n\
  \n回到 CarParts，让我们看看`Engine`类。与`Tire`一样，它只有一个`description`方法。在真实程序中，你的发动机会有诸如`start`和`accelerate`之类的方法，以及`RPMs`之类的实例变量。但这里我们只是为了展示一个简单的组合例子，所以只给`Engine`一个`description`方法：\n\
  \n```\n@interface Engine : NSObject\n@end // Engine\n\n@implementation Engine\n\
  - (NSString *) description\n{\n    return (@\"我是一个发动机。轰隆隆！\");\n} // description\n\
  @end // Engine\n```\n\n最后一部分是汽车本身，它有一个发动机和一个由四个轮胎组成的 C 语言数组。汽车使用组合来组装自己。`Car`还有一个名为`print`的方法，使用`NSLog()`打印轮胎和发动机：\n\
  \n```\n@interface Car : NSObject\n{\n    Engine *engine;\n    Tire *tires[4];\n\
  }\n- (void) print;\n@end // Car\n```\n\n`engine`和`tires`实例变量就是组合，因为`tires`和`engine`是`Car`的实例变量。你可以说`Car`由四个轮胎和一个发动机*组成*。当然，人们通常不会那样说话，所以你也可以说`Car`有四个轮胎和一个发动机。\n\
  \n每个汽车对象都为指向发动机和轮胎的*指针*分配内存。汽车内部并没有嵌入一个完整的发动机和四个轮胎，而是嵌入了指向内存中其他对象的引用。当一个新的`Car`被分配时，这些指针被初始化为`nil`（零值），表示该汽车没有发动机也没有轮胎。你可以想象它只是架在砖块上。\n\
  \n让我们来看看`Car`类的实现。首先是`init`方法，它初始化实例变量。`init`方法创建一个发动机和四个轮胎来装备汽车。当你用`new`创建一个新对象时，实际上在底层发生了两个步骤。首先，对象被分配，这意味着获得了一块用于存放实例变量的内存。然后自动调用`init`方法，使对象进入可用状态。\n\
  \n```\n@implementation Car\n\n- (id) init\n{\n    if (self = [super init]) {\n \
  \       engine = [Engine new];\n        tires[0] = [Tire new];\n        tires[1]\
  \ = [Tire new];\n        tires[2] = [Tire new];\n        tires[3] = [Tire new];\n\
  \    }\n    return (self);\n} // init\n```\n\n`Car`的`init`方法创建了四个新轮胎并将它们赋值给`tires`数组。然后`init`创建一个新发动机并将其赋值给`engine`实例变量。\n\
  \n接下来是`Car`的`print`方法：\n\n```\n- (void) print\n{\n    NSLog (@\"%@\", engine);\n\
  \    NSLog (@\"%@\", tires[0]);\n    NSLog (@\"%@\", tires[1]);\n    NSLog (@\"\
  %@\", tires[2]);\n    NSLog (@\"%@\", tires[3]);\n} // print\n@end // Car\n```\n\
  \n#### 关于那个`if`语句...\n\n`init`方法中的这行代码看起来有点奇怪：\n\n```\nif (self = [super init])\
  \ {\n```\n\n我们来解释一下这里发生了什么。你需要调用`[super init]`，以便父类（这里是`NSObject`）可以执行它需要做的任何一次性初始化工作。`init`方法返回一个值（类型为`id`，即通用对象指针），代表被初始化后的对象。\n\
  \n将`[super init]`的结果赋值回`self`是 Objective-C 的标准约定。我们这样做是因为父类在初始化过程中，可能会返回一个与最初创建的对象不同的对象。我们将在后面更详细地介绍`init`方法时深入探讨这一点，所以现在，请对着这行代码点头微笑，然后我们继续往下讲。\n\
  \n\n\n`print`方法使用`NSLog()`来打印实例变量。请记住，`%@`会调用每个对象的`description`方法，然后显示结果。在实际程序中，你会利用轮胎和引擎来判断汽车在路面上的抓地表现。\n\
  \n`CarParts.m`的最后一部分是程序的`main()`函数，即此程序的“驱动程序”（请原谅这个双关语）。`main()`创建一辆新车，通过调用`print`方法让汽车执行其任务，然后退出。\n\
  \n```\nint main (int argc, const char * argv[])\n{\n    Car *car;\n    car = [Car\
  \ new];\n    [car print];\n    return (0);\n} // main\n```\n\n构建并运行`CarParts`，你应该会看到类似如下的输出：\n\
  \n```\nI am an engine. Vrooom!\nI am a tire. I last a while.\nI am a tire. I last\
  \ a while.\nI am a tire. I last a while.\nI am a tire. I last a while.\nIt won’t\
  \ win any car awards, but it works!\n```\n\n## 访问器方法\n\n程序员很少对自己编写的程序感到满意，因为软件永远没有完工的时候。总会有更多的\
  \ bug 需要修复，更多的功能需要添加，或者更多的途径让程序变得更大、更强或更快。因此，`CarParts`尚未完美也就不足为奇了。我们可以通过使用访问器方法来改进它，使其代码更加灵活。这个新版本的代码位于`05.02\
  \ CarParts-Accessors`文件夹中。\n\n一位经验丰富的程序员看到`Car`的`init`方法时可能会问：“为什么汽车要自己创建轮胎和引擎？”如果能自定义汽车使用不同类型的轮胎（例如冬季使用的雪地胎）或各种类型的引擎（燃油喷射而非化油器式），程序会好得多。\n\
  \n如果我们能指示汽车使用特定的轮胎或引擎，那就太好了。这样我们就可以让用户混合搭配汽车部件来创建自定义的车辆。\n\n我们可以通过添加访问器方法来实现这一点。**访问器**方法是读取或更改对象特定属性的方法。例如，`Shapes-Object`中的`setFillColor:`就是一个访问器方法。如果我们在`Car`对象中添加一个更改引擎的新方法，那它也是一个访问器方法。这种特定类型的访问器方法被称为**设置器**方法，因为它会在对象上设置一个值。你可能还会听到术语**更改器**，用于描述更改对象状态的方法。\n\
  \n你可能已经猜到，另一种访问器方法是**获取器**。获取器方法为使用对象的代码提供了一种访问其属性的途径。在一款赛车游戏中，物理逻辑需要访问汽车轮胎的属性，来判断汽车在当前速度下是否会在湿滑路面上打滑。\n\
  \n**注意** 在操作另一个对象的属性时，应始终使用任何可用的访问器方法——切勿直接深入对象内部并直接更改值。例如，`main()`不应直接访问`Car`的引擎实例变量（使用`car->engine`）来更改其引擎。相反，你的代码应使用设置器方法来执行更改。\n\
  \n访问器方法又是间接性的一个例证。通过访问器方法间接访问汽车的引擎，你为汽车的实现提供了灵活性。\n\n让我们为`Car`添加一些设置器和获取器方法，这样使用它的代码就能控制所用的轮胎和引擎类型。以下是`Car`的新接口，新增内容以粗体显示：\n\
  \n```\n@interface Car : NSObject\n{\n    Engine *engine;\n    Tire *tires[4];\n\
  }\n\n- (Engine *) engine;\n- (void) setEngine: (Engine *) newEngine;\n- (Tire *)\
  \ tireAtIndex: (int) index;\n- (void) setTire: (Tire *) tire atIndex: (int) index;\n\
  - (void) print;\n@end // Car\n```\n\n实例变量的集合没有改变，但新增了两对方法：`engine`和`setEngine:`处理引擎属性，`tireAtIndex:`和`setTire:atIndex:`处理轮胎。访问器方法几乎总是成对出现，一个用于设置值，一个用于获取值。偶尔，只提供获取器（用于只读属性，如磁盘上文件的大小）或只提供设置器（如设置秘密密码）可能是有意义的，但大多数情况下，你需要同时编写设置器和获取器。\n\
  \nCocoa 对于命名访问器方法有约定。当你为自己的类编写访问器方法时，应遵循这些约定，以免你和阅读你代码的其他人产生混淆。\n\n设置器方法以其要更改的属性命名，并在前面加上`set`。以下是设置器方法名称的示例：`setEngine:`、`setStringValue:`、`setFont:`、`setFillColor:`和`setTextLineHeight:`。\n\
  \n获取器方法则直接以其返回的属性命名。与上述设置器对应的获取器应命名为`engine`、`stringValue`、`font`、`fillColor`和`textLineHeight`。不要在方法名称中使用`get`这个词。例如，命名为`getStringValue`和`getFont`的方法会违反约定。某些语言（如\
  \ Java）有不同的约定，会在访问器方法名称中使用`get`，但如果你在编写 Cocoa 代码，请不要使用它。\n\n**注意** 在 Cocoa 中，“`get`”这个词有特殊含义：在\
  \ Cocoa 方法名中，它表示该方法通过你作为参数传入的指针来返回值。例如，`NSData`（一个 Cocoa 类，用于存储任意字节序列的对象）有一个名为`getBytes:`的方法，该方法接受一个参数，该参数是用于存放字节的内存缓冲区的地址。`NSBezierPath`（用于绘图）有一个名为`getLineDash:count:phase:`的方法，该方法接受一个指向浮点数组的指针（用于线型模式）、一个指向整数的指针（用于模式中的元素数量）以及一个指向浮点的指针（用于开始绘制的模式位置）。\n\
  \n如果你在访问器方法名称中使用`get`，使用你代码的经验丰富的 Cocoa 程序员会期望向你的方法提供指针作为参数，然后当他们发现这只是一个简单的访问器时会感到困惑。最好不要让程序员感到困惑。\n\
  \n### 设置引擎\n\n第一对访问器方法影响引擎：\n\n```\n- (Engine *) engine;\n- (void) setEngine: (Engine\
  \ *) newEngine;\n```\n\n使用`Car`对象的代码调用`engine`来访问引擎，调用`setEngine:`来更改它。以下是这些方法实现的示例：\n\
  \n```\n- (Engine *) engine\n{\n    return (engine);\n} // engine\n\n- (void) setEngine:\
  \ (Engine *) newEngine\n{\n    engine = newEngine;\n} // setEngine\n```\n\n获取器方法`engine`返回`engine`实例变量的当前值。请记住，Objective-C\
  \ 中所有对象交互都通过指针进行，因此`engine`方法返回一个指向`Car`所包含引擎对象的指针。\n\n类似地，设置器方法`setEngine:`将`engine`实例变量的值设置为指向的值。实际的引擎本身不会被复制，只是复制了指向该引擎的指针的值。换句话说：在对一个汽车对象调用`setEngine:`之后，整个世界中只存在一个引擎，而不是两个。\n\
  \n**注意** 为了全面说明，我们需要指出，引擎的设置器和获取器在内存管理和对象所有权方面存在一些问题。在现在就把内存和对象生命周期管理抛给你，会让你感到困惑和沮丧，因此我们将推迟讨论编写绝对正确的访问器方法，直到第\
  \ 8 章。\n\n要实际使用这些访问器，你可以编写如下代码：\n\n```\nEngine *engine = [Engine new];\n[car setEngine:\
  \ engine];\nNSLog (@\"the car's engine is %@\", [car engine]);\n```\n\n### 设置轮胎\n\
  \n针对轮胎的访问器方法稍微复杂一些：\n\n\n\n#### 轮胎访问器\n\n- `(void) setTire: (Tire *) tire atIndex:\
  \ (int) index;`\n- `(Tire *) tireAtIndex: (int) index;`\n\n由于汽车有多个轮胎安装位置（车辆四个角落各一个），`Car`对象包含一个轮胎数组。为了不直接暴露轮胎数组，这里使用了索引访问器。当为汽车设置轮胎时，你需要告诉汽车使用哪个轮胎以及安装位置。同样，当访问轮胎时，你需要指定特定位置。\n\
  \n以下是轮胎访问器的实现：\n\n```objectivec\n- (void) setTire: (Tire *) tire atIndex: (int)\
  \ index\n{\n    if (index < 0 || index > 3) {\n        NSLog (@\"bad index (%d)\
  \ in setTire:atIndex:\", index);\n        exit (1);\n    }\n    tires[index] = tire;\n\
  } // setTire:atIndex:\n\n- (Tire *) tireAtIndex: (int) index\n{\n    if (index <\
  \ 0 || index > 3) {\n        NSLog (@\"bad index (%d) in tireAtIndex:\", index);\n\
  \        exit (1);\n    }\n    return (tires[index]);\n} // tireAtIndex:\n```\n\n\
  轮胎访问器包含一些通用代码，用于检查轮胎实例变量的数组索引是否有效。如果索引超出 0 到 3 的范围，程序会打印错误信息并退出。这种做法被称为**防御性编程**，这是一个好习惯。防御性编程能在开发早期捕获错误，例如使用了错误的轮胎位置索引。\n\
  \n由于`tires`是一个 C 风格数组，编译器在访问数组时不会对索引进行任何错误检查，因此我们必须检查索引的有效性。我们可以写出`tires[-5]`或`tires[23]`而不会收到编译器警告。当然，该数组只有四个元素，因此使用`-5`或`23`作为索引将访问随机内存，导致错误和程序崩溃。\n\
  \n索引检查完成后，`tires`数组会被操作，将新轮胎放入正确位置。使用这些访问器的代码如下：\n\n```objectivec\nTire *tire =\
  \ [Tire new];\n[car setTire: tire atIndex: 2];\nNSLog (@\"tire number two is %@\"\
  , [car tireAtIndex: 2]);\n```\n\n#### 跟踪对`Car`的修改\n\n在声明`CarParts-Accessors`完成之前，还有几个细节需要处理。\n\
  \n第一个细节是`Car`的`init`方法。由于`Car`现在有了发动机和轮胎的访问器，其`init`方法不再需要创建这些部件。创建汽车的代码负责配置发动机和轮胎。事实上，我们可以完全移除`init`方法，因为`Car`不再需要做这些工作。获取新车的人将得到一辆没有轮胎和发动机的车，但这些部件可以轻松制造（有时，软件世界比现实世界要容易得多）。\n\
  \n由于`Car`不再创建自己的活动部件，`main()`必须更新以创建它们。将`main()`函数修改为如下：\n\n```objectivec\nint main\
  \ (int argc, const char * argv[]) {\n    Car *car = [Car new];\n    Engine *engine\
  \ = [Engine new];\n    [car setEngine: engine];\n    for (int i = 0; i < 4; i++)\
  \ {\n        Tire *tire = [Tire new];\n        [car setTire: tire atIndex: i];\n\
  \    }\n    [car print];\n    return (0);\n} // main\n```\n\n`main()`创建了一辆新车，和之前版本一样。然后，创建一个新的`Engine`并将其放入汽车。接着，一个`for`循环执行四次。每次循环，创建一个新轮胎，并告诉汽车使用该轮胎。最后，打印汽车信息并退出程序。\n\
  \n从用户的角度看，程序没有任何变化：\n\n```\nI am an engine. Vrooom!\nI am a tire. I last a while.\n\
  I am a tire. I last a while.\nI am a tire. I last a while.\nI am a tire. I last\
  \ a while.\n```\n\n和`Shapes-Object`一样，我们重构了程序，改进了内部结构，但保持了外部行为不变。\n\n### 扩展`CarParts`\n\
  \n既然`Car`有了访问器，让我们利用它们。我们将使用标准发动机和轮胎的变体，而不是默认部件。我们将使用继承创建新的发动机和轮胎类型，然后通过`Car`的访问器（即组合）为汽车配备这些新部件。该程序的代码位于`05.03\
  \ CarParts-2`文件夹中。\n\n首先是新型发动机`Slant6`（如果你更喜欢 V8 或`ThreeFiftyOneWindsor`，也可以尝试）：\n\
  \n```objectivec\n@interface Slant6 : Engine\n@end // Slant6\n\n@implementation Slant6\n\
  - (NSString *) description\n{\n    return (@\"I am a slant- 6. VROOOM!\");\n} //\
  \ description\n@end // Slant6\n```\n\n`Slant6`是一种发动机，因此继承`Engine`是合理的。记住，继承建立了一种关系，允许我们在期望超类（`Engine`）的地方传递子类（`Slant6`）。由于`Car`的`setEngine:`方法接受类型为`Engine`的参数，我们可以安全地传递一个`Slant6`。\n\
  \n`Slant6`重写了`description`方法，使其打印新消息。由于`Slant6`没有调用超类的`description`方法（即不包含`[super\
  \ description]`），它完全替换了继承的`description`。\n\n实现新轮胎类`AllWeatherRadial`的步骤与`Slant6`类似。我们继承现有类（`Tire`）并提供新的`description`方法：\n\
  \n```objectivec\n@interface AllWeatherRadial : Tire\n@end // AllWeatherRadial\n\n\
  @implementation AllWeatherRadial\n- (NSString *) description\n{\n    return (@\"\
  I am a tire for rain or shine.\");\n} // description\n@end // AllWeatherRadial\n\
  ```\n\n最后，我们修改`main()`以使用新的发动机和轮胎类型（更改的代码已加粗）：\n\n```objectivec\nint main (int argc,\
  \ const char * argv[]) {\n    Car *car = [Car new];\n    for (int i = 0; i < 4;\
  \ i++) {\n        Tire *tire = [AllWeatherRadial new];\n        [car setTire: tire\
  \ atIndex: i];\n    }\n    Engine *engine = [Slant6 new];\n    [car setEngine: engine];\n\
  \    [car print];\n    return (0);\n} // main\n```\n\n我们添加了两个新类，并稍微修改了两行代码，完全没有改动`Car`本身。我们的`Car`愉快地使用你设计的任何发动机和轮胎，而无需更改`Car`自身。程序的行为现在发生了根本变化：\n\
  \n```\nI am a slant- 6. VROOOM!\nI am a tire for rain or shine.\nI am a tire for\
  \ rain or shine.\nI am a tire for rain or shine.\nI am a tire for rain or shine.\n\
  ```\n\n### 组合还是继承？\n\n`CarParts-2`同时使用了继承和组合，这是本章和上一章介绍的工具包中的两个新工具。一个很好的问题是：“什么时候使用继承，什么时候使用组合？”\n\
  \n继承建立了一种“是（is a）”关系。三角形*是一个*形状。`Slant6`*是一个*发动机。`AllWeatherRadial`*是一个*轮胎。当你能说“X\
  \ 是 Y”时，可以使用继承。\n\n相反，组合建立了一种“有（has a）”关系。形状*有*填充颜色。汽车*有*一个发动机，并且*有*轮胎。相比之下，汽车不是一个发动机，汽车也不是一个轮胎。当你能说“X\
  \ 有一个 Y”时，应该使用组合。\n\n初学面向对象编程的程序员经常犯的错误是试图对一切使用继承，例如让`Car`继承`Engine`。继承是一个有趣的新玩具，但并不适用于所有情况。你可以用这种结构创建一个可运行的程序，因为你可以在`Car`代码内部访问发动机工作所需的内容。但对于阅读代码的人来说，这没有意义。汽车是一个发动机？嗯？因此，只在合适的情况下使用继承。\n\
  \n下面是一个在设计数据结构时如何思考的例子：创建新对象时，花一些时间思考何时应使用继承，何时应使用组合。例如，在设计汽车相关对象时，你可能思考：“一辆汽车有轮胎、一个发动机和一个变速箱。”因此，你会使用组合，在`Car`类中为所有这些部件创建实例变量。\n\
  \n\n\n在其他情况下，你会使用继承。例如，你可能需要“持证车辆”的概念，即需要某种许可证才能合法使用的车辆。汽车、摩托车和牵引式挂车都属于持证车辆。汽车*是一种*持证车辆，摩托车*是一种*持证车辆——这听起来很适合用继承来实现。因此，你可能会创建一个`LicensedVehicle`类，其中包含像市政当局和许可证号码这样的信息（使用组合！），而`Automobile`、`MotorCycle`等类则会继承自`LicensedVehicle`。\n\
  \n## 总结\n\n组合，即创建包含对其他对象引用的对象的技术，是面向对象编程的一个基本概念。例如，汽车对象包含对发动机对象和四个轮胎对象的引用。在本章讨论组合的过程中，我们介绍了访问器方法，它提供了一种途径，让外部对象可以在保持实例变量封装的同时更改属性。\n\
  \n访问器方法和组合是相辅相成的，因为你通常需要为每个被组合的对象编写访问器方法。你还学习了两种类型的访问器方法：设置器方法告诉对象将属性更改为什么，获取器方法则向对象询问属性的值。\n\
  \n在本章中，你还了解了关于命名访问器方法的 Cocoa 规则。特别地，我们提醒你，不要在返回属性值的访问器方法名中使用“get”。\n\n在下一章中，我们将暂时从这些精彩的\
  \ OOP 理论中喘口气，以便研究如何将类拆分到多个源文件中，而不是把所有内容都塞进一个大文件里。\n\n# 第 6 章\n\n## 源文件组织\n\n到目前为止，我们讨论过的每个项目，其所有源代码都塞进了`main.m`文件里。`main()`函数以及我们所有类的`@interface`和`@implementation`部分都堆积在同一个文件中。这种结构对于小程序和快速实现来说还行，但它无法扩展到大型项目。随着程序的增大，你将不得不滚动浏览一个庞大的文件，这使得查找东西变得更加困难。\n\
  \n回想你的学生时代（假设你已经毕业了），你不会把所有学期论文都放在同一个文字处理文档里（假设你用过文字处理器）。你会把每篇论文放在各自的文档中，并配上描述性的文件名。类似地，将程序的源代码拆分成多个文件也是个好主意，你可以为每个文件起一个有益的名称。\n\
  \n将程序分割成较小的文件，可以让你更快地找到重要的代码片段，同时也有助于其他人在查看你的项目时快速了解概况。将代码放在多个文件中，还能让你更容易地将某个有趣的类的源码发送给朋友：你只需打包几个文件，而不是整个项目。在本章中，我们将讨论将程序的不同部分放在不同文件中的策略和思路。\n\
  \n### 拆分接口与实现\n\n正如你所见，Objective-C 类的源代码分为两部分。一部分是接口，它提供了类的公共视图。接口包含了某人使用该类所需的所有信息。通过向编译器展示`@interface`部分，你将能够使用该类的对象、调用类方法、将对象组合到另一个类中，以及创建子类。\n\
  \n类源代码的另一部分是实现。`@implementation`部分告诉 Objective-C 编译器如何让该类实际工作。这部分包含了实现接口中声明的方法的代码。\n\
  \n由于类的定义天然地分为接口和实现，类的代码也通常会沿着同样的界限拆分成两个文件。一个文件包含接口组件：类的`@interface`指令、任何公共结构体定义、枚举常量、`#define`宏、`extern`全局变量等。由于\
  \ Objective-C 继承自 C 语言，这些东西通常会放入一个头文件中，该头文件与类同名，并以`.h`结尾。例如，类`Engine`的头文件应命名为`Engine.h`，`Circle`的头文件则命名为`Circle.h`。\n\
  \n所有实现细节，例如类的`@implementation`指令、全局变量的定义、私有结构体等，都放入一个与类同名且以`.m`结尾的文件中（有时称为**点 m\
  \ 文件**）。`Engine.m`和`Circle.m`就是这些类的实现文件。\n\n**注意：** 如果你使用`.mm`作为文件扩展名，你是在告诉编译器你已经用\
  \ Objective-C++ 编写了代码，这允许你同时使用 C++ 和 Objective-C。\n\n### 在 Xcode 中创建新文件\n\n当你构建一个新类时，Xcode\
  \ 会自动为你创建`.h`和`.m`文件，让你的工作更轻松。当你在 Xcode 中选择 File ![image](img/9781430241881_arrow_fmt.jpg)\
  \ New ![image](img/9781430241881_arrow_fmt.jpg) New File 时，你会看到一个如图 6-1 所示的窗口，其中列出了\
  \ Xcode 知道如何创建的文件类型。\n\n![9781430241881_Fig06-01.tif](img/9781430241881_Fig06-01_fmt.jpg)\n\
  \n图 6-1。在 Xcode 中创建新文件\n\n选择“Objective-C class”，然后点击 Next。将会出现另一个窗口，要求你填写类的名称，如图\
  \ 6-2 所示。\n\n![9781430241881_Fig06-02.tif](img/9781430241881_Fig06-02_fmt.jpg)\n\
  \n图 6-2。命名新文件\n\n你还可以选择新类的父类。默认情况下，父类是`NSObject`。每个类都必须有一个父类（除了`NSObject`本身，它是所有类的父类）。你可以通过从弹出菜单中选取或直接输入类名来指定新类的父类。\n\
  \n当你点击 Next 时，Xcode 会询问你想将文件保存到哪里（见图 6-3）。选择你为此项目存放其他文件的目录。\n\n![9781430241881_Fig06-03.tif](img/9781430241881_Fig06-03_fmt.jpg)\n\
  \n图 6-3。选择目录\n\n你还可以在该窗口中看到一些其他有趣的东西。例如，你可以选择新文件应包含在哪个组中。我们现在不会讨论 Targets 部分，只需知道复杂的项目可以有多个目标，每个目标都有自己的源文件配置和构建规则。\n\
  \n创建新类后，Xcode 会将适当的文件添加到项目中，并在项目窗口中显示结果，如图 6-4 所示。\n\n![9781430241881_Fig06-04.tif](img/9781430241881_Fig06-04_fmt.jpg)\n\
  \n图 6-4。在 Xcode 项目窗口中显示的新文件\n\n\n\n## Xcode 项目文件组织与依赖管理\n\n`Xcode`创建一个以项目名称命名的组，然后将文件放入该组内的文件夹中。（你可以在项目导航面板中看到项目的结构。）这些文件夹（`Xcode`称之为*组*）提供了一种组织项目中源文件的方式。例如，你可以为用户界面类创建一个组，为数据处理类创建另一个组，从而使项目更易于导航。当你设置组时，`Xcode`实际上不会移动任何文件，也不会在硬盘上创建任何目录。组关系只是由`Xcode`维护的一个美好的幻象。如果你愿意，你可以设置一个组，使其指向文件系统中的特定位置。然后，`Xcode`会将新创建的文件放入该目录中。\n\
  \n创建文件后，你可以在列表中点击它们进行编辑。`Xcode`会贴心地包含一些标准的样板代码，即你在这些文件中始终需要的内容，例如`#import <Cocoa/Cocoa.h>`，以及空的`@interface`和`@implementation`部分，供你填充。\n\
  \n**注意**：到目前为止，在本书中，我们在程序中使用的是`#import <Foundation/Foundation.h>`，因为我们只使用了`Cocoa`的那一部分。但使用`#import\
  \ <Cocoa/Cocoa.h>`也是可以的。该语句为我们引入了`Foundation`框架头文件以及其他一些内容。\n\n### 拆分`Car`类\n\n\
  位于`06.01 CarParts-Split`项目文件夹中的`CarParts-Split`，将所有的类从`CarParts-Split.m`文件中取出，并移入它们自己的文件中。每个类位于自己独立的头文件（`.h`）和实现文件（`.m`）中。让我们看看自己创建这个项目需要做些什么。我们将从两个继承自`NSObject`的类开始：`Tire`和`Engine`。选择新建文件，然后选择`Objective-C\
  \ Class`，并输入名称`Tire`。对`Engine`执行相同操作。图 6-5 显示了项目列表中的四个新文件。\n\n![9781430241881_Fig06-05.tif](img/9781430241881_Fig06-05_fmt.jpg)\n\
  \n图 6-5. 向项目中添加`Tire`和`Engine`\n\n现在，将`Tire`的`@interface`从`CarParts-Split.m`中剪切出来，并粘贴到`Tire.h`中。文件应如下所示：\n\
  \n```objectivec\n#import <Cocoa/Cocoa.h>\n\n@interface Tire : NSObject\n\n@end //\
  \ Tire\n```\n\n接下来，我们将`Tire`的`@implementation`从`CarParts-Split.m`中剪切出来，并粘贴到`Tire.m`中。你还需要在顶部添加一个`#import\
  \ \"Tire.h\"`。`Tire.m`应如下所示：\n\n```objectivec\n#import \"Tire.h\"\n\n@implementation\
  \ Tire\n\n- (NSString *) description\n\n{\n\nreturn (@\"I am a tire. I last a while\"\
  );\n\n} // description\n\n@end // Tire\n```\n\n该文件的第一个`#import`值得注意。它并没有像之前那样导入`Cocoa.h`或`Foundation.h`头文件，而是导入了该类的头文件。这是标准做法，并且你在几乎创建的每个项目中都会这样做。编译器需要知道类中实例变量的布局，以便生成正确的代码，但它不会自动知道存在一个与该源文件对应的头文件。因此，我们需要通过添加`#import\
  \ \"Tire.h\"`语句来告知编译器。在编译时，如果遇到类似“找不到`Tire`的接口声明”的错误信息，通常意味着你忘记导入该类的头文件了。\n\n###\
  \ 导入中心\n\n请注意，导入有两种不同的方式：带引号的和带尖括号的。例如，有`#import <Cocoa/Cocoa.h>`和`#import \"Tire.h\"\
  `。带尖括号的版本用于导入系统头文件。带引号的版本表示项目本地的头文件。如果你看到头文件名在尖括号内，则表明它是项目只读的，因为它属于系统。当头文件名在引号中时，你知道你（或项目中的其他人）可以对其进行修改。\n\
  \n现在对`Engine`类执行相同的过程。将`Engine`的`@interface`从`CarParts-Split.m`中剪切出来，并粘贴到`Engine.h`中。`Engine.h`现在看起来像这样：\n\
  \n```objectivec\n#import <Cocoa/Cocoa.h>\n\n@interface Engine : NSObject\n\n@end\
  \ // Engine\n```\n\n接下来，将`Engine`的`@implementation`剪切出来，并粘贴到`Engine.m`中，现在应如下所示：\n\
  \n```objectivec\n#import \"Engine.h\"\n\n@implementation Engine\n\n- (NSString *)\
  \ description\n\n{\n\nreturn (@\"I am an engine. Vrooom!\");\n\n} // description\n\
  \n@end // Engine\n```\n\n如果你现在尝试编译程序，`CarParts-Split.m`会报错，因为缺少对`Tire`和`Engine`的声明。修复这些问题相当简单。只需在`CarParts-Split.m`的顶部，紧跟在`#import\
  \ <Foundation/Foundation.h>`语句之后，添加以下两行：\n\n```objectivec\n#import \"Tire.h\" \n\
  #import \"Engine.h\"\n```\n\n**注意**：请记住，`#import`类似于`#include`，是一个由`C`预处理器处理的命令。在这种情况下，`C`预处理器实际上只是进行剪切和粘贴操作，在继续处理之前将`Tire.h`和`Engine.h`的内容插入到`CarParts-Split.m`中。\n\
  \n现在你可以构建并运行`CarParts-Split`，你会发现它的行为与使用`AllWeatherRadials`和`Slant6`的原始版本没有变化：\n\
  \n```\nI am a slant-6\\. VROOOM!\nI am a tire for rain or shine\nI am a tire for\
  \ rain or shine\nI am a tire for rain or shine\nI am a tire for rain or shine\n\
  ```\n\n## 使用跨文件依赖关系\n\n**依赖关系**是两个实体之间的一种关系。在程序设计和开发过程中，依赖关系问题经常出现。依赖关系可以存在于两个类之间：例如，`Slant6`依赖于`Engine`，因为它们之间存在继承关系。如果`Engine`发生更改（例如添加一个新的实例变量），则需要重新编译`Slant6`以适应更改。\n\
  \n依赖关系可以存在于两个或多个文件之间。`CarParts-Split.m`依赖于`Tire.h`和`Engine.h`。如果这些文件中的任何一个发生更改，`CarParts-Split.m`将需要重新编译以获取更改。例如，`Tire.h`可能有一个名为`kDefaultTirePressure`的常量，其值为`30\
  \ psi`。编写`Tire.h`的程序员可能决定将头文件中的默认胎压更改为`40 psi`。现在需要重新编译`CarParts-Split.m`以使用新的值`40`，而不是旧的值`30`。\n\
  \n导入头文件会在头文件和进行导入操作的源文件之间建立强依赖关系。如果头文件发生更改，所有依赖于该头文件的其他文件都必须重新编译。这可能会导致需要重新编译的文件出现级联更改。假设你有\
  \ 100 个`.m`文件，它们都包含同一个头文件——我们称之为`UserInterfaceConstants.h`。如果你对`UserInterfaceConstants.h`进行了更改，那么所有\
  \ 100 个`.m`文件都将被重新构建，即使你拥有一堆性能强劲、多核`Mac Pro`集群，这也可能需要相当长的时间。\n\n由于依赖关系是可传递的，重新编译问题可能会变得更糟：头文件之间可能相互依赖。例如，如果`Thing1.h`导入了`Thing2.h`，而`Thing2.h`又导入了`Thing3.h`，那么对`Thing3.h`的任何更改都将导致导入了`Thing1.h`的文件被重新编译。尽管编译可能需要很长时间，但至少`Xcode`会为你跟踪所有依赖关系。\n\
  \n## 基于“需要知道”原则进行重新编译\n\n但好消息是：`Objective-C`提供了一种方法来限制由依赖关系引起的重新编译的影响。依赖关系问题之所以存在，是因为`Objective-C`编译器需要某些信息才能完成其工作。有时，编译器需要知道关于一个类的所有信息，例如其实例变量布局以及它最终继承自哪些类。但有时，编译器只需要知道类的名称，而不是其完整的定义。\n\
  \n\n\n例如，当对象被组合时（如前一章所见），组合使用指向对象的指针。这之所以可行，是因为所有 Objective-C 对象都使用动态分配的内存。编译器只需要知道某个特定项是一个类，然后它就知道该实例变量是一个指针的大小，在整个程序中这个大小始终相同。\n\
  \nObjective-C 引入了`@class`关键字，作为一种告诉编译器“这是一个类，因此我只通过指针来引用它”的方式。这能让编译器放心：它不需要了解更多关于这个类的信息，只需知道它是通过指针引用的东西即可。\n\
  \n在将`Car`类移入其自己的文件时，我们将使用`@class`。继续用 Xcode 创建`Car.h`和`Car.m`文件，就像你之前处理`Tire`和`Engine`一样。将`Car`的`@interface`复制并粘贴到`Car.h`中，现在它看起来像这样：\n\
  \n```\n#import <Cocoa/Cocoa.h>\n\n@interface Car : NSObject\n\n- (void) setEngine:\
  \ (Engine *) newEngine;\n\n- (Engine *) engine;\n\n- (void) setTire: (Tire *) tire\n\
  atIndex: (int) index;\n\n- (Tire *) tireAtIndex: (int) index;\n\n- (void) print;\n\
  \n@end // Car\n```\n\n如果现在尝试使用这个头文件，编译器会报错，指出它不理解`Tire`或`Engine`是什么。错误信息很可能是`error:\
  \ expected a type \"Tire\"`，这是编译器在说“我不明白这个。”\n\n我们有两种选择来修复这个错误。第一种是直接`#import \"\
  Tire.h\"`和`\"Engine.h\"`，这会给编译器提供关于这两个类的大量信息。\n\n但还有一种更好的方法。如果你仔细查看`Car`的接口，会发现它只通过指针引用`Tire`和`Engine`。这正是`@class`的用武之地。下面是添加了`@class`行之后的`Car.h`：\n\
  \n```\n#import <Cocoa/Cocoa.h>\n\n@class Tire;\n\n@class Engine;\n\n@interface Car\
  \ : NSObject\n\n- (void) setEngine: (Engine *) newEngine;\n\n- (Engine *) engine;\n\
  \n- (void) setTire: (Tire *) tire\natIndex: (int) index;\n\n- (Tire *) tireAtIndex:\
  \ (int) index;\n\n- (void) print;\n\n@end // Car\n```\n\n这些信息足以告诉编译器处理`Car`的`@interface`所需的一切。\n\
  \n**注意**：`@class`设置了一个前向引用。这是一种告诉编译器的方式：“相信我，你最终会了解这个类是什么，但现在，你只需要知道这些。”\n\n`@class`在存在循环依赖时也很有用。也就是说，类\
  \ A 使用类 B，并且类 B 也使用类 A。如果试图让每个类都`#import`另一个类，最终会出现编译错误。但如果在`A.h`中使用`@class B`，并在`B.h`中使用`@class\
  \ A`，那么这两个类可以愉快地相互引用。\n\n让`Car`跑起来\n\n这解决了`Car`的头文件问题。但`Car.m`需要关于`Tire`和`Engine`的更多信息。编译器必须看到`Tire`和`Engine`继承自哪些类，以便进行一些检查，确保这些对象能够响应发送给它们的消息。为此，我们将在`Car.m`中导入`Tire.h`和`Engine.h`。我们还需要将`Car`的`@implementation`从`CarParts-Split.m`中剪切出来。现在`Car.m`看起来像这样：\n\
  \n```\n#import \"Car.h\"\n\n#import \"Tire.h\"\n\n#import \"Engine.h\"\n\n@implementation\
  \ Car {\n    Tire *tires[4];\n    Engine *engine;\n}\n\n- (void) setEngine: (Engine\
  \ *) newEngine\n{\n    engine = newEngine;\n} // setEngine\n\n- (Engine *) engine\n\
  {\n    return (engine);\n} // engine\n\n- (void) setTire: (Tire *) tire\natIndex:\
  \ (int) index\n{\n    if (index < 0 || index > 3) {\n        NSLog (@\"bad index\
  \ (%d) in setTire:atIndex:\",\n               index);\n        exit (1);\n    }\n\
  \    tires[index] = tire;\n} // setTire:atIndex:\n\n- (Tire *) tireAtIndex: (int)\
  \ index\n{\n    if (index < 0 || index > 3) {\n        NSLog (@\"bad index (%d)\
  \ in setTire:atIndex:\",\n               index);\n        exit (1);\n    }\n   \
  \ return (tires[index]);\n} // tireAtIndex:\n\n- (void) print\n{\n    NSLog (@\"\
  %@\", tires[0]);\n    NSLog (@\"%@\", tires[1]);\n    NSLog (@\"%@\", tires[2]);\n\
  \    NSLog (@\"%@\", tires[3]);\n    NSLog (@\"%@\", engine);\n} // print\n\n@end\
  \ // Car\n```\n\n你可以再次构建并运行程序，得到与之前相同的输出。没错，我们又在重构了（嘘，别告诉任何人）。我们一直在改进程序的内部结构，同时保持其行为不变。\n\
  \n\n\n## 导入与继承\n\n我们需要从`CarParts-Split.m`中再解放两个类：`Slant6`和`AllWeatherRadial`。处理它们稍微有点棘手，因为它们继承了我们已经创建的类：`Slant6`继承自`Engine`，`AllWeatherRadial`继承自`Tire`。由于我们继承这些类，而不仅仅是使用指向类的指针，我们不能在它们的头文件中使用`@class`技巧。我们必须在`Slant6.h`中使用`#import\
  \ \"Engine.h\"`，并在`AllWeatherRadial.h`中使用`#import \"Tire.h\"`。\n\n那么，为什么我们在这里不能直接使用`@class`呢？因为编译器需要完全了解超类，才能成功编译其子类的`@interface`。编译器需要超类实例变量的布局（类型、大小和顺序）。回忆一下，当你在子类中添加实例变量时，它们会被附加到超类实例变量的末尾。编译器随后使用这些信息来确定实例变量在内存中的位置，从每个方法调用中隐藏的`self`指针开始。编译器需要查看类的全部内容才能正确计算实例变量的位置。\n\
  \n下一个要处理的是`Slant6`。在 Xcode 中创建`Slant6.m`和`Slant6.h`文件，然后将`Slant6`的`@interface`从`CarParts-Split.m`中剪切出来。如果你的切割和粘贴操作正确，`Slant6.h`现在应该如下所示：\n\
  \n```objc\n#import \"Engine.h\"\n\n@interface Slant6 : Engine\n\n@end // Slant6\n\
  ```\n\n该文件只导入了`Engine.h`，而没有导入`<Cocoa/Cocoa.h>`。为什么？我们知道`Engine.h`已经导入了`<Cocoa/Cocoa.h>`，所以我们在这里不必自己再做一次。不过，如果你想要在此文件中放入`#import\
  \ <Cocoa/Cocoa.h>`也是可以的，因为`#import`足够智能，不会多次包含同一个文件。\n\n`Slant6.m`只是从`CarParts-Split.m`中剪切并粘贴的`@implementation`部分，并惯例性地导入了`Slant6.h`头文件：\n\
  \n```objc\n#import \"Slant6.h\"\n\n@implementation Slant6\n\n- (NSString *) description\n\
  \n{\n\nreturn (@\"I am a slant-6. VROOOM!\");\n\n} // description\n\n@end // Slant6\n\
  ```\n\n执行相同的步骤将`AllWeatherRadial`移至它自己的文件对中。相信你此刻已经掌握了诀窍。下面是`AllWeatherRadial.h`的内容：\n\
  \n```objc\n#import \"Tire.h\"\n\n@interface AllWeatherRadial : Tire\n\n@end // AllWeatherRadial\n\
  ```\n\n以下是`AllWeatherRadial.m`：\n\n```objc\n#import \"AllWeatherRadial.h\"\n\n@implementation\
  \ AllWeatherRadial\n\n- (NSString *) description\n\n{\n\nreturn (@\"I am a tire\
  \ for rain or shine\");\n\n} // description\n\n@end // AllWeatherRadial\n```\n\n\
  可怜的`CarParts-Split.m`只剩下原来的一副空壳。它现在只是一堆`#import`指令和一个孤零零的函数，如下所示：\n\n```objc\n#import\
  \ <Foundation/Foundation.h>\n\n#import \"Tire.h\"\n\n#import \"Engine.h\"\n\n#import\
  \ \"Car.h\"\n\n#import \"Slant6.h\"\n\n#import \"AllWeatherRadial.h\"\n\nint main\
  \ (int argc, const char * argv[])\n\n{\n\nCar *car = [Car new];\n\nint i;\n\nfor\
  \ (i = 0; i < 4; i++) {\n\nTire *tire = [AllWeatherRadial new];\n\n[car setTire:\
  \ tire\n\natIndex: i];\n\n}\n\nEngine *engine = [Slant6 new];\n\n[car setEngine:\
  \ engine];\n\n[car print];\n\nreturn (0);\n\n} // main\n```\n\n如果我们现在构建并运行项目，我们将得到与之前将代码分散到各个文件时完全相同的输出。\n\
  \n## 总结\n\n在本章中，你学习了使用多个文件组织源代码的基本技能。通常，每个类对应两个文件：一个包含类`@interface`的头文件，以及一个包含`@implementation`的`.m`文件。类的使用者随后通过导入（使用`#import`）头文件来访问类的特性。\n\
  \n在这个过程中，我们遇到了跨文件依赖，即头文件或源文件需要来自另一个头文件的信息。混乱的导入网络可能会增加你的编译时间，并导致不必要的重新编译。明智地使用`@class`指令——它告诉编译器“请相信稍后你会看到一个以此命名的类”——可以减少需要导入的头文件数量，从而缩短编译时间。\n\
  \n接下来我们将参观一些有趣的 Xcode 特性。那里见。\n\n# 第 7 章 更多关于 Xcode 的内容\n\nMac 和 iOS 程序员大部分时间都在\
  \ Xcode 中编写代码。Xcode 是一个出色的工具，拥有许多强大的特性，但并非所有特性都显而易见。当你将长期使用一个强大的工具时，你会想尽可能多地了解它。在本章中，我们将向你介绍一些在编写和导航代码以及定位所需信息时很有用的\
  \ Xcode 技巧和窍门。我们还将提及 Xcode 帮助你调试代码的一些方式。\n\nXcode 是一个庞大的应用程序，并且极具可定制性，有时甚至到了荒谬的程度。（我们提到它很庞大了吗？）关于\
  \ Xcode 本身就可以（并且已经）写成整本书，因此我们将专注于亮点，让你快速上手。我们建议你在刚开始时使用 Xcode 的默认设置。当某些问题困扰你时，你会发现很可能有一个设置可以按照你的喜好进行调整。\n\
  \n面对像 Xcode 这样的大型工具，一个好的策略是快速浏览文档，直到你开始感到眼花缭乱为止。使用 Xcode 一段时间，然后再次快速浏览文档。每次阅读，你都会理解更多内容。反复进行，你就会拥有极好的体验。\n\
  \n我们将在本书中讨论 Xcode 4.3.2，即撰写本文时的当前版本。苹果公司喜欢在 Xcode 版本之间添加新功能并移动旧功能，所以如果你使用的是 Xcode\
  \ 42.0，屏幕截图可能已经过时。现在，开始我们的技巧之旅！\n\n## 一统天下的窗口\n\n作为 Xcode 程序员，你主要生活在 Xcode 主窗口中。让我们讨论这个窗口的各个部分，以确保我们了解所谈论的内容。\n\
  \n*   ![image](img/9781430241881_square_fmt.jpg) **工具栏**：这是窗口的最顶部，大部分控件都位于此处。\n\
  *   ![image](img/9781430241881_square_fmt.jpg) **导航面板**：这是左侧面板。该面板通常包含项目中的文件列表，但你也可以在那里看到其他视图：符号、搜索、问题、调试、断点和日志。你可以通过按\
  \ Command（![image](img/Rangoli1.jpg)）加上数字键（1 到 7）或单击面板顶部的图标来切换视图。\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ **编辑面板**：这个面板正好位于中间，你将在这里花费大部分时间，编写将改变世界并为你带来财富的精彩源代码。\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ **检查器面板**：在右侧，该区域显示上下文相关的信息以及可用于修改所选项目属性的控件。\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ **调试器面板**：这是底部中央的面板。当调试器运行时，堆栈和调试器控制台会出现在这里。\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ **库面板**：隐藏在窗口的右下角，此面板包含项目资产、对象、代码片段以及在项目中使用的其他好东西。\n\n现在你已经了解了基本布局。让我们立即开始我们的旅程。\n\
  \n![9781430241881_Fig07-01.tif](img/9781430241881_Fig07-01_fmt.jpg)\n\n**图 7-1.**\
  \ 如果你是 OS X 或 iOS 开发者，你整天盯着看的窗口\n\n## 更改公司名称\n\n你可能注意到的一件事是，当你创建一个新的 Objective-C\
  \ 源文件时，Xcode 为你生成的注释块：\n\n```objc\n//\n// Calculator\n// CKStoreManager.m\n//\n\
  // Created by Waqar Malik on 4/15/12.\n// Copyright 2012 __MyCompanyName__. All\
  \ rights reserved.\n//\n```\n\n\n\n## Xcode 包含文件名和项目名称\n\nXcode 包含文件名和项目名称，以及创建用户和时间，因为这些信息能让你一眼就知道正在查看的是哪个文件、由谁创建，并大致了解其创建时间。不过，默认的公司名称实在不太理想。上次我们注意到，`__MyCompanyName__`\
  \ 并没有在招聘 Mac 程序员，只招 TPS 报告创建者。\n\n![9781430241881_Fig07-02.tif](img/9781430241881_Fig07-02_fmt.jpg)\n\
  \n**图 7-2.** 更改公司名称\n\n更改公司名称是一个简单的过程。在导航窗格和编辑窗格中选择项目。查看右侧的检查器窗格。在“项目文档”下，你会看到“组织”字段。在此处输入你的公司名称。从此以后，项目将使用你的公司名称，而不是\
  \ `__MyCompanyName__`。\n\n## 使用编辑器技巧和窍门\n\nXcode 提供了几种组织项目和源代码编辑器的基本方法。到目前为止，我们展示了默认界面，它主要是一个多合一窗口，用于处理你每分钟的项目和编码任务。一个编辑窗格用于所有源文件，而编辑器的内容会根据你在窗口左侧导航窗格中选择的源文件而变化。\n\
  \n以下是关于你在导航窗格中看到内容的更多细节。文件列表显示了你项目的所有活动部分：你的源文件、你链接的框架，以及描述如何实际构建各个程序的 *Products*\
  \ 文件夹。你还会发现一些实用工具，例如用于访问源代码控制仓库（如果你与其他程序员合作，这很方便）、你项目的所有符号以及一些智能文件夹。\n\n当你选择一个文件时，你会在窗口顶部工具栏下方看到一个文件路径，显示该文件在你的项目中的位置。你可以使用导航窗格底部的搜索框来缩小显示的文件列表。图\
  \ 7-3 展示了在文件名中搜索“car”一词的结果。你可以将此过滤框用于任何导航器视图。\n\n![9781430241881_Fig07-03.tif](img/9781430241881_Fig07-03_fmt.jpg)\n\
  \n图 7-3. 缩小文件列表\n\n浏览器会显示名称中包含“car”的每个匹配源文件。你可以点击浏览器中的文件将其放入编辑器。由于较大的项目可能有超过一百个源文件，如果你有很多文件，浏览器是一种方便的导航方式。我们将在本章后面进一步讨论如何浏览源文件。\n\
  \n在处理代码时，你会希望隐藏浏览器以最大化利用屏幕空间。窗口最右侧的一个工具栏图标标记为 *View*。它有三个按钮；你可以将鼠标悬停在它们上方以查看其功能（但我们仍会在此处告诉你）。左侧按钮用于隐藏或显示导航窗格，或者你也可以使用快捷键\
  \ `![image](img/Rangoli1.jpg)0`。中间按钮用于切换调试器区域，右侧按钮用于检查器。\n\n将每个源文件放在其自己的窗口中可能很有用，尤其是在比较两个不同文件时。在导航窗格中双击源文件会在新窗口中打开该文件。你可以在两个窗口中打开同一个文件，但需要注意，有时这两个窗口可能会不同步（你可以点击每个窗口来同步）。\n\
  \n你可能更喜欢使用标签（就像在 Safari 中一样）而不是多个窗口——Xcode 能满足你。这感觉就像是 Xcode 团队认识 Safari 团队似的。要显示标签，请选择\
  \ View `![image](img/9781430241881_arrow_fmt.jpg)` Show Tab Bar（参见图 7-4）。要添加更多标签，请点击标签栏右侧的\
  \ +。\n\n![9781430241881_Fig07-04.tif](img/9781430241881_Fig07-04_fmt.jpg)\n\n图 7-4.\
  \ 在标签栏打开标签\n\n## 在 Xcode 的帮助下编写代码\n\n许多程序员整天编写代码。许多程序员也整夜编写代码。对于所有这些程序员，Xcode 提供了一些功能，使编写代码更轻松、更有趣。\n\
  \n### 缩进（漂亮打印）\n\n你可能已经注意到，本书中的所有代码都进行了良好的缩进，`if` 语句和 `for` 循环的主体都进行了偏移，使其缩进比周围代码更深。Objective-C\
  \ 不要求你缩进代码，但这样做是个好主意，因为它能让你一目了然地看清代码的结构。Xcode 会在你输入代码时自动进行缩进。\n\n有时，大量的编辑可能会使代码变得混乱。Xcode\
  \ 在这点上也能提供帮助。选中文本后，按住 Control 键并单击（或右键单击）以查看编辑器的上下文菜单，然后选择 Structure `![image](img/9781430241881_arrow_fmt.jpg)`\
  \ Re-Indent。Xcode 会遍历所选内容，将所有内容整理整齐。你也可以使用快捷键 `control-I` 来实现相同的功能。\n\n使用 Structure\
  \ 菜单，或按 `![image](img/Rangoli1.jpg)` 和 `![image]`，可以将选中的代码向左或向右移动。如果你刚刚在某个代码周围添加了一个\
  \ `if` 语句，这种重新格式化会非常方便。\n\n假设编辑器中有以下代码：\n\n```\nEngine *engine = [Slant6 new];\n\
  \n[car setEngine: engine];\n```\n\n后来，你决定仅当用户设置了偏好时才创建新引擎：\n\n```\nif (userWantsANewEngine)\
  \ {\n\nEngine *engine = [Slant6 new];\n\n[car setEngine: engine];\n\n}\n```\n\n\
  你可以选择中间两行代码，然后按 `![image](img/Rangoli1.jpg)]` 将它们向右移动。\n\n你可以无限调整 Xcode 的缩进引擎。你可能更喜欢用空格而不是制表符。你可能希望每个左大括号都放在新行上，而不是与\
  \ `if` 语句放在同一行。无论你想做什么，你都有可能定制 Xcode 以遵循你独特的代码格式化风格：大部分魔力都在 Xcode `![image](img/9781430241881_arrow_fmt.jpg)`\
  \ Preferences `![image](img/9781430241881_arrow_fmt.jpg)` Text Editing `![image](img/9781430241881_arrow_fmt.jpg)`\
  \ Indentation 中找到。这里有个小技巧：如果你想要快速轻松地在程序员之间引发一场激烈的网络讨论，那就开始谈论代码格式偏好吧。\n\n### 自动补全\n\
  \n你可能已经注意到，Xcode 有时会在你输入代码时提供建议。这是 Xcode 的“代码感知”功能，通常称为 **代码补全**。在编写程序时，Xcode 会建立大量内容的索引，包括项目和包含的框架中的变量和方法名称。它知道局部变量名称及其类型。它甚至可能知道你是否调皮或乖巧。在输入时，Xcode\
  \ 会不断地将你输入的内容与其符号索引进行比较。如果匹配，Xcode 会提供建议，如图 7-5 所示。\n\n![9781430241881_Fig07-05.tif](img/9781430241881_Fig07-05_fmt.jpg)\n\
  \n图 7-5. Xcode 代码补全\n\n在这里，我们开始输入 `All*`，Xcode 认为我们可能想要向 `AllWeatherRadial` 类发送消息（参见[图\
  \ 7-5 中 `AllW*` 后面的灰色文本）。Xcode 碰巧猜对了，所以我们可以按 Tab 键接受 `AllWeatherRadial` 作为补全。\n\n\
  “哎呀，”你说，“这太简单了！我们只有一个以‘All’开头的类！” 确实如此，但即使有很多可能性，Xcode 也会提供一个补全菜单（[图 7-6）。如果你想让菜单消失，只需按\
  \ Esc 键，或者再次按 Esc 键将其重新打开。\n\n![9781430241881_Fig07-06.tif](img/9781430241881_Fig07-06_fmt.jpg)\n\
  \n图 7-6. “all”的可能补全项\n\n\n\n你可以看到有很多以“all”开头的选项。Xcode 会识别出当前项目中有一个以“all”开头的符号，并默认将其作为首选。名称旁边的彩色方框标识了符号的类型：E\
  \ 代表枚举符号，f 代表函数，`#` 代表 `#define`，m 代表方法，C 代表类，等等。\n\n你可以输入 `control+.(句号)` 来逐个浏览选项，或者输入\
  \ `shift+control+.` 来向后翻页。如果在此过程中没能记住所有这些键盘快捷键，也不必担心。本章末尾提供了一份方便的速查表。\n\n你可以将补全菜单用作类的快速\
  \ API 参考。以 `NSDictionary` 为例，它有一个方法，允许你指定一个参数列表，这些参数代表构建字典的键和对象。是 `+dictionaryWithKeysAndObjects`\
  \ 还是 `+dictionaryWithObjectsAndKeys`？谁能记得住？一种简单的查找方法是开始对一个方法进行调用，输入 `NSDictionary`，然后输入一个空格表示你已完成类名的输入，再按下\
  \ escape 键。Xcode 会意识到你将要在此处放置方法名，并显示 `NSDictionary` 响应的所有方法。果然，在[图 7-7 的菜单底部附近显示了\
  \ `dictionaryWithObjectsAndKeys`。\n\n![9781430241881_Fig07-07.tif](img/9781430241881_Fig07-07_fmt.jpg)\n\
  \n图 7-7. 使用代码感知浏览类\n\n更棒的是，如果你将鼠标悬停在一个方法名称上，会看到每个方法在窗口右侧都有一个小的问号。点击任何方法的问号，就会弹出一个针对该方法的帮助窗口（参见图\
  \ 7-8）。\n\n![9781430241881_Fig07-08.tif](img/9781430241881_Fig07-08_fmt.jpg)\n\n\
  图 7-8. 在方法的帮助窗口中，文件名是链接；点击其中一个可在新窗口中打开\n\n有时，当你使用代码补全时，会在补全内容中看到一些奇怪的小方框，如图 7-9\
  \ 所示。这是怎么回事？\n\n![9781430241881_Fig07-09.tif](img/9781430241881_Fig07-09_fmt.jpg)\n\
  \n图 7-9. 代码补全占位符\n\n注意，Xcode 建议的是 `-setTire:atlndex:`，它接受两个参数。Xcode 的代码感知功能不仅仅是填写名称。这里显示的两个参数实际上是占位符。如果你再次按\
  \ tab 键，该方法会补全为 `setTire`，如图 7-10 所示。\n\n![9781430241881_Fig07-10.tif](img/9781430241881_Fig07-10_fmt.jpg)\n\
  \n图 7-10. 选择一个占位符\n\n第一个占位符被高亮显示。输入任何内容即可将其替换为实际参数。你也可以点击第二个占位符并替换它。你甚至不必将手从键盘上移开。只需再次按\
  \ tab 键即可移动到下一个占位符。\n\n## 亲吻括号\n\n在输入代码时，你可能会注意到，当你输入某些字符（例如 `)`、`]` 或 `}`）时，屏幕偶尔会轻微闪烁。发生这种情况时，Xcode\
  \ 会显示与你刚输入的闭合符号相对应的开放符号。在图 7-11 中，我们正在输入第二行末尾的右括号。当输入完成时，该行前部匹配的左括号会短暂闪烁，并带有彩色背景。\n\
  \n![9781430241881_Fig07-11.tif](img/9781430241881_Fig07-11_fmt.jpg)\n\n图 7-11. 亲吻括号\n\
  \n此功能有时被称为“亲吻括号”，当你闭合一组复杂的定界符时，它非常方便。确保你输入的每个闭合字符都与期望的开放字符匹配。如果你搞混了，比如在应该输入 `*)`\
  \ 时试图输入 `*]*`，Xcode 会发出提示音，并且不会显示这种“亲亲”效果。\n\n你也可以双击其中一个定界符，Xcode 将会选中该定界符与其成对匹配符号之间的所有代码。\n\
  \n## 批量编辑\n\n有时，你希望在一处代码更改在多个地方生效，但不想逐个编辑每个实例。手动进行大量类似的编辑充满了风险，因为人类通常不擅长枯燥重复的工作。幸运的是，计算机擅长枯燥重复的工作。\n\
  \n首先介绍的 Xcode 功能并非直接操作代码，而是设置一个安全网。选择 文件 ![image](img/9781430241881_arrow_fmt.jpg)\
  \ 创建快照...（或其便捷快捷键 ![image](img/Rangoli1.jpg)`+control+S`），Xcode 将会记住你项目的当前状态。你现在可以自由地编辑源文件，随心所欲地折叠、旋转和修改你的内容。如果之后你意识到犯了大错，可以使用快照窗口（通过文件\
  \ ![image](img/9781430241881_arrow_fmt.jpg) 恢复快照... 访问）从之前的快照中恢复。在进行任何过于冒险的操作前拍照是个好主意。\n\
  \n**注意** 快照存储在 `~/Library/Developer/Xcode/Snapshots/` 中。\n\n当然，Xcode 也具备查找和替换功能。编辑\
  \ ![image](img/9781430241881_arrow_fmt.jpg) 查找 子菜单包含几个方便的选择。选择在工作区中查找 (`command+shift+F`)，或选择导航器面板中的搜索选项。此功能让你可以在项目中的文件中进行搜索和替换。图\
  \ 7-12 展示了项目范围的查找和替换窗口。\n\n![9781430241881_Fig07-12.tif](img/9781430241881_Fig07-12_fmt.jpg)\n\
  \n图 7-12. 项目范围的查找和替换\n\n假设我们正在考虑将“car”改为“automobile”。在填写空白并点击*查找*后，你会看到存在对 `Car`\
  \ 类和 `car` 局部变量的引用。你可以点击全部替换以全局进行更改。\n\n然而，查找和替换功能是进行此类修改的一种生硬工具。如果你只是想重命名函数中的变量，它可能做得太多（因为它可能影响整个文件中的内容）；而如果你想重命名一个类，它又做得不够。具体来说，它不会重命名源文件。\n\
  \nXcode 有两个功能来填补这些空白。第一个功能有个优雅的名称“Scope 内全部编辑”。你可以选择一个符号，比如局部变量或参数，然后点击它，其旁边会出现一个下拉菜单箭头。点击箭头查看菜单，然后选择“Scope\
  \ 内全部编辑”。然后，在你输入时，该符号的所有出现位置会立即更新。这不仅是进行大量更改的快速方法，而且在操作过程中看起来也相当酷。\n\n图 7-13 展示了在\
  \ scope 内编辑“`car`”。注意每个 `car` 局部变量周围都有一个方框。一旦你开始输入“automobile”，所有方框都会改变，如图 7-14\
  \ 所示。\n\n![9781430241881_Fig07-13.tif](img/9781430241881_Fig07-13_fmt.jpg)\n\n图\
  \ 7-13. 开始通过将 `car` 更改为“automobile”进行 scope 内全部编辑\n\n![9781430241881_Fig07-14.tif](img/9781430241881_Fig07-14_fmt.jpg)\n\
  \n图 7-14. Scope 内全部编辑\n\n完成后，只需点击源编辑窗口中的其他位置，即可退出“Scope 内全部编辑”模式。\n\n有时，当你尝试进行此类修改时，会发现“Scope\
  \ 内全部编辑”菜单项是禁用的。此功能与 Xcode 中的语法着色密切相关，因此如果你关闭了该功能或对其进行了大量修改，“Scope 内全部编辑”可能无法工作。要解决此问题，请返回偏好设置并再次调整语法着色，直到它生效——这需要一点“玄学”操作。\n\
  \n\n\n还记得我们在前几章中使用\"重构\"这个术语吗？我们可不是为了显得高深而凭空编造这个词。Xcode 内置了一些重构工具。其中一个重构助手可以让你轻松重命名类。它不仅会重命名类，还会做一些精巧的事情，比如同步重命名源文件。如果你有\
  \ GUI 程序，它甚至能深入 nib 文件并修改其中的内容。（如果你现在完全看不懂最后这句话，别担心。这确实是一个非常酷的功能，我们会在后续章节中详细解释 nib\
  \ 文件。）\n\n让我们尝试将所有 `Car` 类改为 `Automobile`。在编辑器中打开 `Car.h`，将插入点放在 `Car` 这个单词中。选择\
  \ Edit ![image](img/9781430241881_arrow_fmt.jpg) Refactor ![image](img/9781430241881_arrow_fmt.jpg)\
  \ Rename . . . 。你会看到一个如图 7-15 所示的对话框，其中我们已输入 `Automobile` 作为\"Car\"的替换名称。\n\n![9781430241881_Fig07-15.tif](img/9781430241881_Fig07-15_fmt.jpg)\n\
  \n图 7-15. 开始重构\n\nXcode 会计算出你点击 Preview 后将要执行的操作，并将其呈现给你，如图 7-16 所示。\n\n![9781430241881_Fig07-16.tif](img/9781430241881_Fig07-16_fmt.jpg)\n\
  \n图 7-16. Xcode 告诉我们它在重构中打算做什么。\n\n你可以看到 Xcode 会将 `Car.h` 和 `Car.m` 重命名为对应的 Automobile\
  \ 风格名称。你可以点击某个源文件，在窗口底部的文件合并查看器中查看 Xcode 将要进行的更改。在那里，你会看到 Xcode 已经将 `#import` 中的\"\
  Car\"改成了\"Automobile\"，并且在适当的位置修改了类名。\n\n审查完更改后，点击 Save。如果这是你第一次在此项目中重构代码，Xcode\
  \ 会询问你是否要启用自动快照。选择\"是\"是个好主意，因为这样如果你做了一个大改动并认为它不够好，可以轻松回退到重构前的版本。\n\n遗憾的是，重构并不会重命名注释中的内容，因此类结束注释、Xcode\
  \ 生成的文件头注释，或者你可能编写的任何文档注释都需要手动修复。你可以使用搜索和替换来简化这个过程。\n\n## 在代码中导航\n\n大多数源文件都有一个相似的生命周期。它们被新建，然后快速添加大量代码以实现其神奇功能。接下来，它们进入一个添加和修改各占一半的模式，然后进入维护模式，在这种模式下，你必须在添加新代码或进行修改之前阅读大量文件。最后，在一个类成熟之后，你会浏览其代码以了解该类的工作原理，然后才能在程序的其他地方使用它。本节将探讨在代码生命周期中进行导航的各种方法。\n\
  \n### emacs 不是 Mac\n\n一个名为 `emacs` 的古老文本编辑器，发明于 1970 年代，在现代 Mac 上仍然可用。一些老派开发者（包括\
  \ Waqar Malik）每天都在使用它。我们这里不会过多讨论 `emacs`，只是描述它的一些键绑定——我们甚至会告诉你这意味着什么。\n\n短语\"emacs\
  \ 键绑定\"指的是那些可以让你在不将手从键盘主区域移开的情况下移动文本光标的按键组合。就像许多人更喜欢用方向键而不是伸手去够鼠标一样，emacs 用户更喜欢使用这些光标移动键，而不是伸手去够方向键。最关键的是：令人惊讶的是，这些相同的移动键在任何\
  \ Cocoa 文本字段中都有效，不仅限于 Xcode，还包括 TextEdit、Safari 的 URL 栏和文本字段、Pages 和 Keynote 的文本区域等等。具体如下：\n\
  \n*   ![image](img/9781430241881_square_fmt.jpg) `control-F`：向**前**移动，向右（与右箭头键相同）。\n\
  *   ![image](img/9781430241881_square_fmt.jpg) `control-B`：向**后**移动，向左（与左箭头键相同）。\n\
  *   ![image](img/9781430241881_square_fmt.jpg) `control-P`：移动到**上**一行（与上箭头键相同）。\n\
  *   ![image](img/9781430241881_square_fmt.jpg) `control-N`：移动到**下**一行（与下箭头键相同）。\n\
  *   ![image](img/9781430241881_square_fmt.jpg) `control-A`：移动到行**首**（与 Command-左箭头键相同）。\n\
  *   ![image](img/9781430241881_square_fmt.jpg) `control-E`：移动到行**末**（与 Command-右箭头键相同）。\n\
  *   ![image](img/9781430241881_square_fmt.jpg) `control-T`：**互换**（交换）光标两侧的字符。\n\
  *   ![image](img/9781430241881_square_fmt.jpg) `control-D`：**删除**光标右侧的字符。\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ `control-K`：**删除**（删除）该行剩余部分。如果你想重做一行代码的结尾，这很方便。\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ `control-L`：将插入点置于窗口中央。如果你找不到文本光标，或者想快速滚动窗口使插入点位于正中央，这个功能非常棒。\n\n如果你将这些按键组合熟记于心并熟练掌握，你就能更快速地完成小范围的光标移动和编辑操作——而且不仅仅是在\
  \ Xcode 中。\n\n### 芝麻开门！\n\n当你查看一个源文件时，会看到顶部的 `#import`。如果能快速打开那个头文件，而不必进行大量的鼠标操作，那该多好？你可以做到！只需选择文件名（甚至可以省略\
  \ `.h`），然后选择 File ![image](img/9781430241881_arrow_fmt.jpg) Open Quickly。Xcode 就会为你打开头文件。\n\
  \n如果你没有选中任何文本，选择 Open Quickly 会打开一个对话框，这是查找文件的另一种方式。你也可以通过快捷键 ![image](img/Rangoli1.jpg)![image](img/Uparrow.jpg)`O`\
  \ 来执行 Open Quickly 命令。Open Quickly 对话框是一个非常简单的窗口，只包含一个搜索字段和一个表格，但它是在项目中搜索内容的一种非常快速的方式。在搜索框中输入\
  \ `tire` 来查找与轮胎相关的内容，如图 7-17 所示。你也可以输入其他术语，比如 `NSArray` 来查看 `NSArray` 头文件。\n\n![9781430241881_Fig07-17.tif](img/9781430241881_Fig07-17_fmt.jpg)\n\
  \n图 7-17. Open Quickly 对话框\n\n如果你有幸拥有一个大显示器，可以使用助手编辑器（View ![image](img/9781430241881_arrow_fmt.jpg)\
  \ Assistant Editor ![image](img/9781430241881_arrow_fmt.jpg) Show Assistant Editor）并排显示窗口。默认情况下，你会在一个窗格中看到头文件，在另一个窗格中看到实现文件，但如果你愿意，可以更改此设置。点击工具栏中的\
  \ `Counterparts` 查看诸多选项。\n\n### 集中精力\n\n你可能注意到了源代码左侧的几个栏。左边较宽的栏称为**装订线**，我们稍后讨论调试时会重点介绍它。较窄的那个称为**聚焦条**，顾名思义，它可以帮助你将注意力集中在代码的不同部分。\n\
  \n注意聚焦条中的灰色阴影：代码嵌套得越深，它在聚焦条中对应的灰色就越深。这种颜色编码让你能一眼看出代码的复杂程度。你可以将鼠标悬停在聚焦条的不同灰色区域上，以高亮显示对应的代码块，如图\
  \ 7-18 所示。\n\n![9781430241881_Fig07-18.tif](img/9781430241881_Fig07-18_fmt.jpg)\n\
  \n\n\n## 代码折叠与聚焦功能\n\n图 7-18 展示了使用聚焦条（focus ribbon）高亮代码的效果。\n\n您可以点击聚焦条来折叠代码块。假设您确信\
  \ 图 7-18 中展示的 `if` 语句和 `for` 循环是正确的，并且不想再看它们，那么可以将注意力集中在函数中的其余代码上。点击 `if` 语句左侧，其代码体将会折叠，如\
  \ 图 7-19 所示。\n\n![9781430241881_Fig07-19.tif](img/9781430241881_Fig07-19_fmt.jpg)\n\
  \n图 7-19 展示了代码折叠效果。您以为我们会在这里放一个《沙丘》的梗，对吧？\n\n现在您可以看到，`if` 语句的代码体已被替换为一个带有省略号的方框。双击该方框即可将代码展开回原来的样子，或者点击聚焦条中的展开三角形。代码并未被删除，只是被隐藏了，因此您的文件即使在这种状态下也能正常编译和运行。**代码折叠**（Code\
  \ folding）是这类功能的另一种名称。请查看 Editor → ![image](img/9781430241881_arrow_fmt.jpg) Code\
  \ Folding 菜单，那里有许多额外的选项。\n\n## 导航栏已打开\n\n在代码编辑器的顶部有一个小小的控制条，如 图 7-20 所示，它被称为**导航栏**（navigation\
  \ bar）。其中的许多控件用于让您快速在项目中的源文件之间跳转。\n\n![9781430241881_Fig07-20.tif](img/9781430241881_Fig07-20_fmt.jpg)\n\
  \n图 7-20 展示了导航栏。\n\n最左侧是一个菜单按钮，它提供对编辑器最近历史记录以及其他一些高级功能的快速访问。接下来是后退和前进按钮，让您可以在本次编辑会话中打开过的文件历史记录中循环切换。它们的工作方式类似于\
  \ Safari 的后退和前进箭头。这些按钮旁边是一个路径，显示当前文件（`Car.m`）及其在项目中的位置，而非其目录路径。路径中的每一项都是一个按钮；点击任一按钮，就会弹出一个导航菜单。\n\
  \n导航栏中的最后一个项是函数菜单。它显示插入点当前位于方法 `-setTire:atIndex:` 中。点击该菜单即可查看所有感兴趣符号，如 图 7-21 所示。\n\
  \n![9781430241881_Fig07-21.tif](img/9781430241881_Fig07-21_fmt.jpg)\n\n图 7-21 展示了文件中的符号。\n\
  \n`-setTire:atIndex:` 被高亮显示，因为这是插入点所在位置。您可以看到它上方和下方的其他方法，按它们在文件中的出现顺序排序。您可以 ![image](img/Rangoli1.jpg)\
  \ 点击函数菜单以按字母顺序排序。\n\n除了方法名称之外，您还可以向此菜单添加自己的项。有几种不同的添加方式。一种方式是使用 `#pragma mark whatever`\
  \ 将字符串 `whatever` 放入菜单中。这对于添加人类可读的锚点非常有用，方便您和其他生物体查看和使用。`#pragma mark -`（减号）会在菜单中放入一条分隔线。Xcode\
  \ 还会查找以特定字符串 `MARK:`、`TODO:`、`FIXME:`、`!!!:` 和 `???：` 开头的注释。Xcode 也会将这些文本添加到函数菜单中。这些都是程序员留下的信号，意思是“在将此程序发布给毫无防备的公众之前，最好回来看看这个。”\n\
  \n**注意**：“Pragma”一词源自希腊语，意为“行动”。`#pragma` 是一种向编译器和代码编辑器传递信息或指令的方式，这些信息超出了 Objective-C\
  \ 代码的常规行。Pragma 通常被忽略，但它们可能对软件开发中使用的工具具有意义。如果某个工具不理解 pragma，该工具应该点头、微笑并忽略它，而不产生警告或错误。\n\
  \n## 获取信息\n\n在您自己的代码和 Cocoa 头文件之间跳转固然很好，但有时您需要从自身代码之外获取一些信息。幸运的是，Xcode 附带了一个包含文档和参考资料的知识宝库（解释什么是宝库超出了本书的范围）。\n\
  \n### 帮帮忙，谢谢\n\n检查器（inspector）顶部有两个图标。到目前为止，在我们探索中，第一个图标被选中，检查器显示的是当前文件的属性。另一个图标启用检查器中的快速帮助（Quick\
  \ Help）。要使用快速帮助，请点击代码中的某些内容，然后查看检查器中显示的内容。如果您点击源代码中的其他位置，快速帮助面板会自我更新。\n\n例如，假设您的插入点位于单词\
  \ `NSString` 内部。快速帮助将会显示如 图 7-22 所示的内容。\n\n![9781430241881_Fig07-22.tif](img/9781430241881_Fig07-22_fmt.jpg)\n\
  \n图 7-22 展示了快速帮助。\n\n这里有大量可用的信息。前两个项在文档窗口中打开 `NSString` 类参考文档。`NSString.h` 项在编辑器中打开头文件。\n\
  \n“Abstract”（摘要）部分描述了该类。如果您将光标放在方法调用的中间，此部分将描述该方法以及相关的调用。这里还有指向更高级别文档的链接，以及大量使用\
  \ `NSString` 的代码示例。蓝色文字是可以点击以获取更多信息的链接。您还可以通过按住 Option 键点击符号来从快速帮助中获取更多信息。如果这样做，您会看到类似\
  \ 图 7-23 的内容。如需更多信息，请点击右上角的书籍图标以打开该符号的文档。\n\n![9781430241881_Fig07-23.tif](img/9781430241881_Fig07-23_fmt.jpg)\n\
  \n图 7-23 展示了点击 `NSString` 后获得的更多信息，正如所承诺的那样。\n\n### 文档员在家吗？\n\n如果您想直接进入 Apple 官方\
  \ API 文档，一个非常快的方法是按住 Option 键并双击某个符号。这实际上是执行该符号文档搜索的一个快捷方式。\n\n假设您有一行代码如 `[someString\
  \ UTF8String]`，它将 `someString`（一个 `NSString`）转换为用 Unicode 表示的 C 风格字符串。如果您按住 Option\
  \ 键并双击 `UTF8String`，文档浏览器将会打开并搜索 `UTF8String`，如 图 7-24 所示。\n\n![9781430241881_Fig07-24.tif](img/9781430241881_Fig07-24_fmt.jpg)\n\
  \n图 7-24 展示了 Xcode 文档窗口。\n\n那个窗口非常繁忙，并塞满了大量信息。左上角是一个搜索框，其中已预先填入了 `UTF8String`。工具栏下方的按钮条允许您精确定制搜索哪些文档集。您可以查看所有文档，或仅查看\
  \ OS X 或 iOS 文档。\n\n按钮条下方是一个窗格（左侧），其中包含文档集和一组书签。您可以通过弹出菜单向特定的文档块添加书签。文档书签是全局的，不限于特定项目。\n\
  \n窗口顶部左侧窗格中是一个浏览器，显示所有搜索匹配项。在 图 7-24 中，它显示了三个方法和一个常量。最有趣的是最后一个 `UTF8`，这正是我们实际调用的方法。您还会注意到同一项列出了多个版本。这是因为您可能安装了多套文档：iOS、OS\
  \ X 或其他。请为您感兴趣的平台选择文档。请记住，某些方法可能并非在所有平台上都可用。\n\n该浏览器下方是一个显示文档的窗格。这个区域对于阅读文档来说有点小，但可以轻松地将文档打开到另一个\
  \ Xcode 窗口甚至网页浏览器中。\n\n## 调试\n\n\n\n## 调试：识别并修复程序错误\n\n错误在所难免。当你刚开始学习一门新语言和新平台时，程序中难免会出现错误。面对问题时，深呼吸，喝一口你最喜欢的饮料，然后系统地找出问题所在。这个找出程序错误的过程被称为**调试**（debugging）。\n\
  \n### 粗暴式调试\n\n最简单的调试方式是暴力破解，有时被称为**原始人调试**（caveman debugging），即插入`NSLog`等打印语句来显示程序的控制流以及一些数据值。你可能一直都在这样做，只是不知道它的名字。你可能会遇到一些看不起原始人调试的人，但它确实是一种有效的工具，尤其是在你刚开始学习新系统时。所以，忽略那些反对者吧。\n\
  \n### Xcode 的调试器\n\n除此之外，Xcode 还包含一个调试器。**调试器**是一个位于你的程序和操作系统之间的程序，它可以中断你的程序，使其停止运行，并允许你查看程序的数据，甚至修改内容。当你查看完毕后，可以恢复执行以观察结果。你还可以单步执行代码，将计算机的速度降低到人类可感知的速度，从而精确地查看代码对数据产生了什么影响。\n\
  \nXcode 还提供了一个调试器面板，可以一目了然地显示大量信息，以及一个调试控制台，你可以在其中直接向调试器输入命令。\n\n**注意**：Xcode 提供了两种调试器供你选择：`GDB`和`LLDB`。`GDB`是\
  \ GNU 项目的一部分，已在无数不同的平台上可用，并且已经存在多年。`LLDB`是炙手可热的新竞争者，是 LLVM 项目的一部分，该项目也是许多其他 Xcode\
  \ 工具的源代码。目前，这两种调试器之间的差异很微妙，且主要在于内部实现。\n\n我们将在 Xcode 文本编辑器中讨论调试。如果你想了解更多，一定要尝试一下其他调试模式。\n\
  \n### 微妙的符号化\n\n当你计划调试程序时，需要确保使用的是**调试**（Debug）构建配置。你可以在 Xcode 工具栏的 **Edit Scheme**\
  \ 弹出菜单项中检查此项。构建配置会告诉编译器发出额外的调试符号，调试器利用这些符号来确定程序中各元素的位置。\n\n### 开始调试！\n\n与之前使用的命令行程序相比，在\
  \ GUI 程序中使用调试器要稍微容易一些。GUI 程序习惯于等待用户操作，因此使用它让我们有充足的时间找到调试器按钮、中断程序并开始检查。而我们的命令行程序则来去匆匆，让你来不及进行太多调试。因此，让我们首先在\
  \ `main` 中设置一个断点。我们将使用 `07.01 CarParts-split`，它只是上一章中同一项目的一个副本。\n\n打开 `CarParts-Split.m`，然后点击装订线（如之前所见，这是焦点功能区左侧的宽条）。你会看到一个蓝色的箭头标记（是的，这是技术术语），表示你新的断点，如图\
  \ Figure 7-25 所示。你可以通过将断点拖出装订线来删除它，也可以通过点击它来禁用它。\n\n![9781430241881_Fig07-25.tif](img/9781430241881_Fig07-25_fmt.jpg)\n\
  \nFigure 7-25. 设置断点\n\n现在，选择 **Run** 来运行你的程序。你的程序应在断点处停止，如图 Figure 7-26 所示。注意指向一行代码的绿色箭头。这就像商场地图上的“你在这里”标志。\n\
  \n![9781430241881_Fig07-26.tif](img/9781430241881_Fig07-26_fmt.jpg)\n\nFigure 7-26.\
  \ 你在这里\n\n程序停止后，你会看到导航栏上方出现了一个新的控制条，如图 Figure 7-27 所示。\n\n![9781430241881_Fig07-27.tif](img/9781430241881_Fig07-27_fmt.jpg)\n\
  \nFigure 7-27. 调试器控件\n\n耶，又多了些按钮。它们是做什么的？从左到右，第一个按钮用于打开和关闭调试面板。\n\n接下来的四个按钮控制程序下一步做什么。第一个按钮看起来像\
  \ CD 播放器上的播放按钮（如果你不知道 CD 播放器是什么，去问问你的父母）。这是**继续**（continue）按钮。点击它后，程序会一直运行，直到遇到断点、结束或崩溃。\n\
  \n下一个控件看起来像一个圆点，上面有一个人跳过它，这是**单步跳过**（step over）按钮。它执行一行代码，然后将控制权返回给你。如果你点击**单步跳过**按钮三次，“你在这里”箭头将移动到\
  \ `-setTire:atIndex:` 调用处，如图 Figure 7-28 所示。\n\n![9781430241881_Fig07-28.tif](img/9781430241881_Fig07-28_fmt.jpg)\n\
  \nFigure 7-28. 单步执行三次后\n\n下一个按钮，箭头向下指向一个圆点，是**单步进入**（step into）按钮。如果你当前所在的函数或方法有源代码，Xcode\
  \ 将进入该函数，调出其代码，并将“你在这里”箭头设置在其开头，如图 Figure 7-29 所示。\n\n![9781430241881_Fig07-29.tif](img/9781430241881_Fig07-29_fmt.jpg)\n\
  \nFigure 7-29. 进入一个方法后（本例中为 `setTire`）\n\n最后一个按钮是**单步跳出**（step out），它让当前函数执行完毕，然后将控制权返回到调用函数的下一条语句。如果你在跟着操作，暂时不要使用这个按钮。稍后我们将查看此方法中的一些数据值。\n\
  \n最后一个控件是一个弹出菜单，让你选择要查看哪个线程。你暂时还不需要处理多线程编程，因此可以先忽略线程选择。\n\n在按钮的右侧，我们看到**调用堆栈**（call\
  \ stack），即当前活动的函数集合。如果 A 调用了 B，而 B 又调用了 C，那么 C 被认为在堆栈的顶部，B 和 A 在其下方。如果你现在点击打开调用堆栈菜单，它会显示\
  \ `-[Car setTire:atIndex:]`，然后是 `main`。这意味着 `main` 调用了 `-setTire:atIndex:`。对于更复杂的程序，这个调用堆栈（也称为**堆栈跟踪**（stack\
  \ trace））中可能包含数十个条目。有时，调试过程中解决的最佳问题是：“这段代码到底是怎么被调用的？”通过查看调用堆栈，你可以看到是谁调用了谁，才导致当前的（混乱）状态。\n\
  \n### 查看一下\n\n现在程序已经停止，下一步该做什么？通常，当你设置断点或单步执行到程序的某个特定部分时，你关心的是**程序状态**（program state）——即变量的值。\n\
  \nXcode 提供了**数据提示**（datatips），类似于当你悬停在按钮上时，工具提示会告诉你该按钮的功能。在 Xcode 编辑器中，你可以将鼠标悬停在一个变量或方法参数上，Xcode\
  \ 会弹出一个显示其值的小窗口，如图 Figure 7-30 所示。\n\n![9781430241881_Fig07-30.tif](img/9781430241881_Fig07-30_fmt.jpg)\n\
  \nFigure 7-30. Xcode 数据提示\n\nFigure 7-30 显示我们正悬停在 `index` 上。数据提示弹出并显示其值为零，正如我们所预期的。这真的很酷：我们可以通过点击该值并输入一个新值来修改它。例如，你可以输入\
  \ `37`，然后使用几次**单步跳过**命令，观察程序因索引越界而退出。\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n当你还在调试循环中时，将鼠标悬停在轮胎（tires）上，会看到一个数组。将鼠标向下滑动到箭头处悬停，直到它展开，显示所有四个轮胎。接着，向下移动到第一个轮胎上，Xcode\
  \ 会向你展示轮胎的内部结构。我们的轮胎中没有实例变量，所以看不到太多东西。但如果该类有实例变量，它们就会被显示出来并且可以编辑。你可以在图 7-31 中看到所有这些悬停和鼠标移动操作的结果。\n\
  \n![9781430241881_Fig07-31.tif](img/9781430241881_Fig07-31_fmt.jpg)\n\n图 7-31. 深入挖掘程序的数据\n\
  \n以上就是对 Xcode 调试器的快速概览。这些信息，加上你大量的时间投入，应该足以让你调试遇到的任何问题。祝调试愉快！\n\n### 速查表\n\n我们在本章中提到了很多键盘快捷键。如之前所承诺的，我们将它们都收集到了一个方便查阅的地方：表\
