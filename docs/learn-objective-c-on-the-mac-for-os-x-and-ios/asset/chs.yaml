  \n## 解构 Hello Objective-C\n\n以下是 `main.m` 的内容，再次列出：\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char *argv[])\n\n{\n\nNSLog (@\"Hello, Objective-C!\"\
  );\n\nreturn (0);\n\n} // main\n```\n\nXcode 使用 `.m` 扩展名来指示一个包含 Objective-C 代码的文件，并将由\
  \ Objective-C 编译器处理。以 `.c` 结尾的文件由 C 编译器处理，而 `.cpp` 文件则由 C++ 编译器处理。（在 Xcode 中，默认情况下所有编译都由\
  \ LLVM 编译器处理），这是一个能理解这三种语言变体的单一编译器。\n\n`main` 文件包含两行代码，如果您已经熟悉纯 C 语言，应该会对它们很熟悉：`main()`\
  \ 的声明和末尾的 `return (0)` 语句。请记住，Objective-C 本质上就是 C 语言，声明 `main()` 和返回值的语法与 C 语言相同。其余的代码看起来与常规\
  \ C 语言略有不同。例如，那个古怪的 `#import` 是什么？要了解，请继续阅读！\n\n**注意** 当 Objective-C 首次被引入时，`.m`\
  \ 扩展名最初代表“消息”（messages），指的是 Objective-C 的一个核心特性，我们将在后续章节中讨论。如今，我们只是称它们为“点-m 文件”。\n\
  \n### 那个古怪的 `#import` 玩意儿\n\n与 C 语言一样，Objective-C 也使用**头文件**来保存诸如结构体、符号常量和函数原型等元素的声明。在\
  \ C 语言中，您使用 `#include` 语句来告知编译器它应该查阅某个头文件以获取一些定义。您也可以在 Objective-C 程序中出于相同目的使用 `#include`，但您可能永远不会这样做。相反，您会使用\
  \ `#import`，像这样：\n\n```\n#import <Foundation/Foundation.h>\n```\n\n`#import` 是 Xcode\
  \ 使用的编译器提供的一个特性，当您编译 Objective-C、C 和 C++ 程序时，Xcode 都会使用它。`#import` 保证一个头文件只会被包含一次，无论该文件的\
  \ `#import` 指令被看到多少次。\n\n**注意** 在 C 语言中，程序员通常使用基于 `#ifdef` 指令的方案来避免一个文件包含第二个文件，然后第二个文件递归地又包含了第一个文件的情况。在\
  \ Objective-C 中，程序员使用 `#import` 来实现相同的效果。\n\n`#import <Foundation/Foundation.h>`\
  \ 语句告诉编译器查找 Foundation 框架中的 `Foundation.h` 头文件。\n\n### 框架简介\n\n什么是框架？很高兴您问到点上了。**框架**\
  \ 是一组部件的集合——头文件、库、图像、声音等等——被整合到一个单元中。Apple 将诸如 Cocoa、Carbon、QuickTime 和 OpenGL 等技术作为一组组的框架来提供。Cocoa\
  \ 由一对框架组成：Foundation 和 Application Kit（也称为 AppKit），以及一套辅助框架，包括 Core Animation 和\
  \ Core Image，这些框架为 Cocoa 添加了各种很酷的功能。\n\nFoundation 框架处理用户界面层之下的功能，例如数据结构和通信机制。本书中的所有程序都基于\
  \ Foundation 框架。\n\n**注意** 读完本书后，您成为 Cocoa 大师的下一步就是掌握 Cocoa 的 Application Kit，它包含了\
  \ Cocoa 的高级特性：用户界面元素、打印、颜色和声音管理、AppleScript 支持等等。要了解更多信息，请查阅 Jack Nutting、David\
  \ Mark 和 Jeff LaMarche 合著的 *Learn Cocoa on the Mac*（Apress 出版，2010 年）。\n\n\n\n每个框架都是一组重要的技术集合，通常包含数十甚至上百个头文件。每个框架都有一个主头文件，它包含了该框架的所有独立头文件。通过对主头文件使用\
  \ `#import`，你就能访问该框架的所有功能。\n\nFoundation 框架的头文件占用了近兆字节的磁盘存储空间，包含超过 14,000 行代码，分散在上百个文件中。当你使用\
  \ `#import <Foundation/Foundation.h>` 引入主头文件时，你就获得了整个庞大的集合。你可能会认为，为每个文件都遍历所有这些文本会耗费编译器大量时间，但\
  \ Xcode 非常智能：它通过使用**预编译头文件**来加快此任务——这是一种经过压缩和提炼的头文件格式，当你 `#import` 它时，能快速加载。\n\n\
  如果你好奇 Foundation 框架包含了哪些头文件，可以窥探其 *Headers* 目录（`/System/Library/Frameworks/Foundation.framework/Headers/`）。浏览其中的文件不会有任何破坏；只是不要移除或修改任何内容。\n\
  \n## `NSLog()` 与 `@\"strings\"`\n\n既然我们已经对 Foundation 框架的主头文件使用了 `#import`，现在就可以编写利用一些\
  \ Cocoa 特性的代码了。Hello Objective-C 中第一行（也是唯一）真正的代码使用了 `NSLog()` 函数，如下所示：\n\n`NSLog\
  \ (@\"Hello, Objective-C!\");`\n\n这行代码会在控制台打印 “Hello, Objective-C!”。如果你曾经使用过 C 语言，肯定在编程旅途中遇到过\
  \ `printf()`。`NSLog()` 是一个 Cocoa 函数，其工作方式与 `printf()` 非常相似。\n\n就像 `printf()` 一样，`NSLog()`\
  \ 将字符串作为其第一个参数。这个字符串可以包含格式说明符（例如 `%d`），并且该函数会接收与格式说明符匹配的额外参数。`printf()` 在打印前会将这些额外参数填入字符串中。\n\
  \n正如我们之前所说，Objective-C 就是在 C 语言基础上添加了一点“特色酱料”，所以如果你愿意，完全可以使用 `printf()` 来代替 `NSLog()`。但我们仍然推荐使用\
  \ `NSLog()`，因为它增加了诸如时间戳和日期戳等功能，并且会自动为你追加换行符（`'\\n'`）。\n\n## NS 前缀：防止名称冲突的良方\n\n\
  你可能会觉得 `NSLog()` 这个函数名有点奇怪。那个 “NS” 到底是怎么回事？原来，Cocoa 为其所有函数、常量和类型名称都加上了 “NS” 前缀。这个前缀告诉你该函数来自\
  \ Cocoa，而非其他工具包。\n\n该前缀有助于防止**名称冲突**——即当同一个标识符被用于两个不同的东西时产生的严重问题。如果 Cocoa 将此函数命名为\
  \ `Log()`，那么它很可能与某个无辜程序员创建的 `Log()` 函数发生名称冲突。当包含 `Log()` 的程序与 Cocoa 一起构建时，Xcode\
  \ 会报错说 `Log()` 被多次定义，从而带来麻烦。\n\n既然你明白了使用前缀是个好主意，你可能会对具体的选择产生疑问：例如，为什么是 “NS” 而不是\
  \ “Cocoa”？嗯，“NS” 前缀的历史可以追溯到该工具包被称为 NextSTEP、并作为 NeXT 软件公司（前身为 NeXT, Inc.）产品的时代，该公司于\
  \ 1996 年被 Apple 收购。为了不破坏已为 NextSTEP 编写的代码的兼容性，Apple 只是继续使用了 “NS” 前缀。现在这算是一个历史趣闻，就像你的阑尾一样。\n\
  \nCocoa 已经将 “NS” 前缀据为己有，因此显然，你不应该为你自己的任何变量或函数名添加 “NS” 前缀。如果这样做了，你会让你的代码阅读者感到困惑，让他们误以为你的东西属于\
  \ Cocoa。此外，如果将来 Apple 恰好向 Cocoa 添加了一个与你同名的函数，你的代码可能会出问题。目前没有一个集中式的前缀注册表，所以你可以选择自己的前缀。许多人会使用自己姓名首字母或公司名称作为前缀。为了让我们的例子更简单一些，本书中的代码将不会使用前缀。\n\
  \n## `NSString`：其中的 `@`\n\n让我们再看一下那个 `NSLog()` 语句：`NSLog (@\"Hello, Objective-C!\"\
  );`\n\n你注意到字符串前面的 at 符号 (`@`) 了吗？这可不是通过我们警惕的编辑之手的笔误。这个 at 符号是 Objective-C 在标准 C\
  \ 基础上添加的特性之一。在双引号前带有 at 符号的字符串，意味着该引号内的字符串应被视为一个 Cocoa `NSString` 元素。\n\n那么什么是 `NSString`\
  \ 元素呢？将名称上的 “NS” 前缀剥离，就会看到一个熟悉的术语：“String”。你已经知道字符串是一个字符序列，通常是人类可读的，因此你大概能猜到（并且猜对了）`NSString`\
  \ 就是 Cocoa 中的字符序列。\n\n`NSString` 元素中集成了大量功能，每当需要字符串时，Cocoa 都会使用它。以下是 `NSString`\
  \ 能做的几件事：\n\n*   告诉你它的长度\n*   与另一个字符串进行比较\n*   将其自身转换为整数或浮点数值\n\n这可比 C 风格字符串能做的事情多得多。我们将在第\
  \ 8 章中更多地使用和探索 `NSString` 元素。\n\n一个容易犯的错误是将 C 风格字符串传递给 `NSLog()`，而不是使用那些高级的 `NSString`\
  \ `@\"strings\"` 元素。如果你这样做，编译器会给你一个警告：\n\n```\nmain.m:46: warning: passing arg 1\
  \ of 'NSLog' from incompatible pointer type\n```\n\n如果你运行这个程序，它可能会崩溃。为了捕捉此类问题，你可以告诉\
  \ Xcode 始终将警告视为错误。要做到这一点，在项目导航器中选择项目文件，在 targets（目标）下选择 Hello Objective-C，然后选择 Build\
  \ Settings（构建设置）标签，在搜索框中输入 *error*，并勾选 Treat Warnings as Errors（将警告视为错误）复选框，如下图所示。同时确保顶部的\
  \ Configuration（配置）弹出菜单设置为 All（全部）。\n\n**注意这些字符串**\n\n关于 `NSString` 还有另一个很酷的事实：其名称本身就突显了\
  \ Cocoa 的一个优秀特性。大多数 Cocoa 元素的命名都非常直接，力求描述它们实现的功能。例如，`NSArray` 提供数组；`NSDateFormatter`\
  \ 帮助你以不同方式格式化日期；`NSThread` 为你提供多线程编程工具；而 `NSSpeechSynthesizer` 则让你能够听到语音。\n\n现在，我们将回到逐步解析小程序的过程中。程序的最后一行是返回语句，它结束了\
  \ `main()` 的执行并完成程序：\n\n`return (0);`\n\n返回的零值表示我们的程序成功完成。这正是 C 语言中 return 语句的工作方式。\n\
  \n再次恭喜！你刚刚完成了第一个 Objective-C 程序的编写、编译、运行和剖析。\n\n## 你是布尔类型吗？\n\n许多语言都有布尔类型，这当然是一个用于存储真（true）和假（false）值的变量的高级术语。Objective-C\
  \ 也不例外。\n\nC 语言有一个布尔数据类型 `bool`，它可以取值为 `true` 和 `false`。Objective-C 提供了一个类似的类型 `BOOL`，它可以取值为\
  \ `YES` 和 `NO`。顺便提一下，Objective-C 的 `BOOL` 类型比 C 语言的 `bool` 类型早了十多年。这两种不同的布尔类型可以在同一个程序中共存，但当你在编写\
  \ Cocoa 代码时，你将使用 `BOOL`。\n\n\n\n**注意**：Objective-C 中的 `BOOL` 实际上只是有符号字符类型（`signed\
  \ char`）的一个类型定义（`typedef`），占用 8 位存储空间。`YES` 被定义为 `1`，`NO` 被定义为 `0`（通过 `#define`\
  \ 实现）。\n\nObjective-C 并未将 `BOOL` 视为只能存储 `YES` 或 `NO` 值的真正布尔类型。编译器将 `BOOL` 视为一个 8\
  \ 位数，而 `YES` 和 `NO` 的值仅代表一种约定。这会导致一个微妙的陷阱：如果你不小心将一个超过 1 字节长度的整数值（例如 `short` 或 `int`\
  \ 类型值）赋给 `BOOL` 变量，那么只有最低字节会被用于 `BOOL` 的值。如果该字节恰好为零（例如 `8960`，其十六进制表示为 `0x2300`），则\
  \ `BOOL` 值将为零，即 `NO` 值。\n\n## 强大的 `BOOL` 实战演示\n\n为了展示强大的 `BOOL` 在实际中的应用，我们进入下一个项目\
  \ `02.02 - BOOL Party`，该项目通过比较整数对来判断它们是否不同。除了 `main()` 函数外，程序还定义了两个函数。第一个函数 `areIntsDifferent()`\
  \ 接收两个整数值并返回一个 `BOOL`：如果整数不同则返回 `YES`，相同则返回 `NO`。第二个函数 `boolString()` 接收一个 `BOOL`\
  \ 参数，如果参数是 `YES` 则返回字符串 `@\"YES\"`，如果是 `NO` 则返回 `@\"NO\"`。当需要打印人类可读的 `BOOL` 值表示时，这个函数非常方便。`main()`\
  \ 使用这两个函数来比较整数并打印结果。\n\n创建 `BOOL Party` 项目的过程与创建 `Hello Objective-C` 项目完全相同：\n\n\
  1.  如果 Xcode 尚未运行，请启动它。\n2.  选择 File ![image](img/9781430241881_arrow_fmt.jpg) New\
  \ ![image](img/9781430241881_arrow_fmt.jpg) New Project。\n3.  在左侧选择 *Application*，在右侧选择\
  \ *Command Line Tool*。\n4.  点击 *Next*。\n5.  将项目名称输入为 `BOOL Party`，然后点击 Next。\n6.\
  \  点击 *Create*。\n\n编辑 `main.m` 文件，使其内容如下：\n\n```\n#import <Foundation/Foundation.h>\n\
  \n// 如果两个整数具有相同的值则返回 NO，否则返回 YES\nBOOL areIntsDifferent (int thing1, int thing2)\n\
  {\n    if (thing1 == thing2) {\n        return (NO);\n    } else {\n        return\
  \ (YES);\n    }\n} // areIntsDifferent\n\n// 给定 NO 值，返回人类可读的字符串 \"NO\"，否则返回 \"YES\"\
  \nNSString *boolString (BOOL yesNo)\n{\n    if (yesNo == NO) {\n        return (@\"\
  NO\");\n    } else {\n        return (@\"YES\");\n    }\n} // boolString\n\nint\
  \ main (int argc, const char *argv[])\n{\n    BOOL areTheyDifferent;\n\n    areTheyDifferent\
  \ = areIntsDifferent (5, 5);\n    NSLog (@\"are %d and %d different? %@\",\n   \
  \        5, 5, boolString(areTheyDifferent));\n\n    areTheyDifferent = areIntsDifferent\
  \ (23, 42);\n    NSLog (@\"are %d and %d different? %@\",\n           23, 42, boolString(areTheyDifferent));\n\
  \n    return (0);\n} // main\n```\n\n构建并运行程序。你需要调出控制台来查看输出，可以通过选择 View ![image](img/9781430241881_arrow_fmt.jpg)\
  \ Debug Area ![image](img/9781430241881_arrow_fmt.jpg) Activate Console，或使用键盘快捷键\
  \ ![image](img/Rangoli.jpg)`R`。你应该会看到类似如下的输出：\n\n```\n2012-01-20 16:47:09.528 02\
  \ BOOL Party[16991:10b] are 5 and 5 different? NO\n2012-01-20 16:47:09.542 02 BOOL\
  \ Party[16991:10b] are 23 and 42 different? YES\n\nThe Debugger has exited with\
  \ status 0.\n```\n\n同样，让我们逐个函数地解析这个程序，看看具体发生了什么。\n\n### 第一个函数\n\n我们要分析的第一个函数是 `areIntsDifferent()`。\n\
  \n```\nBOOL areIntsDifferent (int thing1, int thing2)\n{\n    if (thing1 == thing2)\
  \ {\n        return (NO);\n    } else {\n        return (YES);\n    }\n} // arelntsDifferent\n\
  ```\n\n`areIntsDifferent()` 函数接收两个整数参数并返回一个 `BOOL` 值。这个语法你应该从 C 语言的经验中已经很熟悉了。这里，你可以看到\
  \ `thing1` 与 `thing2` 进行比较。如果它们相同，则返回 `NO`（因为它们没有不同）。如果它们不同，则返回 `YES`。这很直观，对吧？\n\
  \n### 不再上当\n\n有经验的 C 语言程序员可能会尝试将 `areIntsDifferent()` 函数写成单个语句：\n\n```\nBOOL areIntsDifferent_faulty\
  \ (int thing1, int thing2)\n{\n```\n\n\n```c\nreturn (thing1 - thing2);\n\n} //\
  \ areIntsDifferent_faulty\n```\n\n他们会在假设非零值等同于`YES`的前提下进行操作。但事实并非如此。没错，在 C 语言看来，这个函数返回的值确实是真或假，但调用返回`BOOL`类型函数的程序员会期望返回`YES`或`NO`。如果程序员像下面这样使用该函数，将会失败，因为\
  \ 23 减 5 等于 18：\n\n```c\nif (areIntsDifferent_faulty(23, 5) == YES) {\n  // ….\n\
  }\n```\n\n虽然上述函数在 C 语言中返回一个真值，但在 Objective-C 中它并不等于`YES`（即值为 1）。\n\n最佳实践是永远不要直接将`BOOL`值与`YES`比较，因为过于聪明的程序员有时会耍类似于`areIntsDifferent_faulty()`的花招。相反，应该像这样编写前面的`if`语句：\n\
  \n```c\nif (areIntsDifferent_faulty(5, 23)) {\n  // ….\n}\n```\n\n直接与`NO`比较始终是安全的，因为在\
  \ C 语言中，假值只有一个：零。\n\n## 第二个函数\n\n第二个函数`boolString()`将数字型`BOOL`值映射为人类可读的字符串：\n\n\
  ```objectivec\nNSString *boolString (BOOL yesNo)\n{\n  if (yesNo == NO) {\n    return\
  \ (@\"NO\");\n  } else {\n    return (@\"YES\");\n  }\n} // boolString\n```\n\n\
  函数中间的`if`语句并不意外。它只是将`yesNo`与常量`NO`进行比较，如果相等则返回`@\"NO\"`。否则，`yesNo`必须是一个真值，因此返回`@\"\
  YES\"`。\n\n请注意，`boolString()`的返回类型是指向`NSString`的指针。这意味着该函数返回一个你在初次接触`NSLog()`时见过的华丽的\
  \ Cocoa 字符串。如果你查看返回语句，会看到返回值前面有 at 符号，这清楚地表明它们是`NSString`类型的值。\n\n## `main()`函数\n\
  \n`main()`是最后一个函数。在声明了`main()`的返回类型和参数之后，有一个局部的`BOOL`变量：\n\n```objectivec\nint main\
  \ (int argc, const char *argv[])\n{\n  BOOL areTheyDifferent;\n```\n\n`areTheyDifferent`变量保存`areIntsDifferent()`返回的`YES`或`NO`值。我们当然可以直接在`if`语句中使用函数的`BOOL`返回值，但添加这样一个额外的变量来让代码更易读也无妨。深层嵌套的结构往往令人困惑且难以理解，并且是\
  \ Bug 容易隐藏的地方。\n\n### 比较本身\n\n接下来的两行代码使用`areIntsDifferent()`比较两个整数，并将返回值存入`areTheyDifferent`变量中。`NSLog()`打印出数值以及由`boolString()`返回的人类可读字符串：\n\
  \n```objectivec\nareTheyDifferent = areIntsDifferent (5, 5);\nNSLog (@\"are %d and\
  \ %d different? %@\",\n        5, 5, boolString(areTheyDifferent));\n```\n\n如你之前所见，`NSLog()`本质上是一个\
  \ Cocoa 风格的`printf()`函数，它接受一个格式字符串，并使用额外参数的值来替换格式说明符。你可以看到，两个 5 将替换我们调用`NSLog()`时的两个`%d`格式占位符。\n\
  \n在我们提供给`NSLog()`的字符串末尾，你会看到另一个 at 符号。这次是`%@`。这是怎么回事？`boolString()`返回一个`NSString`指针。`printf()`不知道如何处理`NSString`，因此没有我们可以使用的格式说明符。`NSLog()`的创建者添加了`%@`格式说明符，以指示`NSLog()`获取相应的参数，将其视为`NSString`，使用该字符串中的字符，并将其输出到控制台。\n\
  \n> **注意：** 我们还没有正式向你介绍对象，但这里先剧透一下：当你使用`NSLog()`打印任意对象的值时，你会使用`%@`格式说明符。当你使用这个说明符时，对象会通过一个名为`description`的方法提供其自身的`NSLog()`格式。`NSString`的`description`方法只是简单地打印字符串的字符。\n\
  \n接下来的两行与你刚才看到的非常相似：\n\n```objectivec\nareTheyDifferent = areIntsDifferent (23,\
  \ 42);\nNSLog (@\"are %d and %d different? %@\",\n        23, 42, boolString(areTheyDifferent));\n\
  ```\n\n该函数比较了值 23 和 42。这一次，由于它们不同，`areIntsDifferent()`返回`YES`，用户将看到文本表明 23 和 42\
  \ 是不同的值，这是一项重大发现。\n\n最后是返回语句，这将结束我们的 BOOL 派对：\n\n```objectivec\n  return (0);\n\
  } // main\n```\n\n在这个程序中，你看到了 Objective-C 的`BOOL`类型，以及用于指示真值和假值的常量`YES`和`NO`。你可以像使用`int`和`float`等类型一样使用`BOOL`：作为变量、函数参数和函数返回值。\n\
  \n## 总结\n\n在本章中，你编写了最初的两个 Objective-C 程序，这很有趣！你还了解了一些 Objective-C 对语言的扩展，例如`#import`，它告诉编译器引入头文件且仅引入一次。你学习了`NSString`字面量，即前面带有\
  \ at 符号的字符串，比如`@\"hello\"`。你使用了重要且多功能的`NSLog()`，这是 Cocoa 提供的用于向控制台写入文本的函数，以及`NSLog()`的特殊格式说明符`%@`，它允许你将`NSString`值插入到`NSLog()`的输出中。你还获得了一个秘密知识：当你在代码中看到\
  \ at 符号时，你就知道你在看 Objective-C 对 C 语言的扩展。最后，你学习了 Objective-C 的`BOOL`类型。\n\n敬请期待下一章，我们将进入面向对象编程的神秘世界。\n\
  \n---\n\n"
- "# 第 3 章：面向对象编程入门\n\n如果你已经使用和编程计算机一段时间，你可能不止一次听说过\"面向对象编程\"这个术语。**面向对象编程**，通常简称为\
  \ OOP，是一种最初为编写模拟程序而开发的编程技术。OOP 很快被其他类型软件的开发者所接受，例如涉及图形用户界面的软件。不久，\"OOP\"就成为了一个主要的行业流行语。它承诺成为神奇的银弹，让编程变得简单而愉快。\n\
  \n当然，没有什么能真正达到那种炒作的程度。像大多数追求一样，OOP 需要学习和练习才能熟练掌握，但它确实能让某些类型的编程任务变得更容易，在某些情况下甚至更有趣。在本书中，我们将大量讨论\
  \ OOP，主要是因为 Cocoa 基于 OOP 概念，而 Objective-C 是一种设计为面向对象的语言。\n\n那么什么是 OOP？OOP 是一种构建由对象组成的软件的方法。对象就像你计算机内部的小机器，彼此通信以完成工作。在本章中，我们将看一些基本的\
  \ OOP 概念。之后，我们将研究导致 OOP 的编程风格，描述一些 OOP 特性背后的动机。最后，我们将详细描述 OOP 的机制。\n\n> **注意：**\
  \ 像许多\"新\"技术一样，OOP 的根源可以追溯到远古时代。OOP 从 20 世纪 60 年代的 Simula、20 世纪 70 年代的 Smalltalk、20\
  \ 世纪 80 年代的 Clascal 以及其他相关语言演变而来。现代语言如 C++、Java、Python，当然还有 Objective-C，都从这些较古老的语言中汲取了灵感。\n\
  \n当我们深入 OOP 时，请在你的耳朵里放一条 Babel 鱼，并准备好沿途遇到一些奇怪的术语。OOP 带有许多听起来花哨的行话，这让它看起来比实际更神秘和困难。你甚至可能认为计算机科学家创造了冗长、听起来令人印象深刻的词语来向每个人展示他们有多聪明，但当然，并非所有科学家都这样做。好吧，别担心。我们会在遇到每个术语时对其进行解释。\n\
  \n在我们进入 OOP 本身之前，让我们先看看 OOP 的一个关键概念：间接性。\n\n### 一切都是间接性\n\n\n\n编程界有句老话说：“计算机科学中的任何问题，都可以通过增加一个间接层来解决。”**间接**（Indirection）是一个听起来高大上但含义简单的词——不要在你的代码中直接使用某个值，而是使用指向该值的指针。这里有一个现实世界的例子：你可能不知道最喜欢的披萨店的电话号码，但你知道可以在电话簿上找到它。像这样使用电话簿就是一种间接形式。\n\
  \n间接也可以指，你请另一个人去做某事，而不是自己动手。假设你有一箱书要还给住在镇另一边的朋友 Andrew。你知道你的邻居今晚正好要去拜访 Andrew。与其自己开车穿越小镇，放下书再开回来，不如请你的好邻居帮忙运送这箱书。这是另一种间接：你让别人替你完成工作，而不是你亲自去做。\n\
  \n在编程中，你可以将间接应用到多个层级，编写调用其他代码的代码，而其他代码又去访问另一层代码。你可能有过拨打技术支持热线的经历。你向支持人员解释问题，对方会将你转接到具体的职能部门。那里的工作人员再把你转接到具备相应技能的二线技术人员那里。如果你和我们一样，到了这一步，你可能会发现自己打错了号码，不得不被转接到其他部门寻求帮助。这种“踢皮球”就是一种间接形式。幸运的是，计算机有无限的耐心，可以承受被从一个地方转到另一个地方，去寻找答案。\n\
  \n## 变量与间接\n\n你可能会惊讶地发现，你已经在程序中使用过间接了。不起眼的变量就是间接的一个现实应用。考虑下面这个打印数字 1 到 5 的小程序。你可以在*Learn\
  \ ObjC Projects*文件夹中的*03.01 Count-1*目录下找到它：\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char *argv[])\n{\n    NSLog (@\"The numbers from 1 to\
  \ 5:\");\n    for (int i = 1; i <= 5; i++) {\n        NSLog (@\"%d\\n\", i);\n \
  \   }\n    return (0);\n} // main\n```\n\n`Count-1`有一个`for`循环，它运行五次，每次循环都使用`NSLog()`显示`i`的值。当你运行这个程序时，会看到类似如下的输出：\n\
  \n```\n2012-01-21 11:52:01.940 03.01 Count-1[26429:903] The numbers from 1 to 5:\n\
  2012-01-21 11:52:01.943 03.01 Count-1[26429:903] 1\n2012-01-21 11:52:01.944 03.01\
  \ Count-1[26429:903] 2\n2012-01-21 11:52:01.944 03.01 Count-1[26429:903] 3\n2012-01-21\
  \ 11:52:01.945 03.01 Count-1[26429:903] 4\n2012-01-21 11:52:01.947 03.01 Count-1[26429:903]\
  \ 5\n```\n\n现在，假设你想升级程序，让它打印数字 1 到 10。你需要修改代码中的两处地方（在下面的列表中已加粗显示），然后重建程序（此版本在*03.02\
  \ Count-2*文件夹中）：\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int argc,\
  \ const char * argv[])\n{\n    NSLog (@\"The numbers from 1 to 10:\");\n    for\
  \ (int i = 1; i <= 10; i++) {\n        NSLog (@\"%d\\n\", i);\n    }\n    return\
  \ (0);\n} // main\n```\n\n`Count-2`的输出如下：\n\n```\n2012-01-21 12:03:13.433 03.02\
  \ Count-2[26507:903] The numbers from 1 to 10:\n2012-01-21 12:03:13.435 03.02 Count-2[26507:903]\
  \ 1\n2012-01-21 12:03:13.436 03.02 Count-2[26507:903] 2\n2012-01-21 12:03:13.436\
  \ 03.02 Count-2[26507:903] 3\n2012-01-21 12:03:13.437 03.02 Count-2[26507:903] 4\n\
  2012-01-21 12:03:13.437 03.02 Count-2[26507:903] 5\n2012-01-21 12:03:13.438 03.02\
  \ Count-2[26507:903] 6\n2012-01-21 12:03:13.438 03.02 Count-2[26507:903] 7\n2012-01-21\
  \ 12:03:13.438 03.02 Count-2[26507:903] 8\n2012-01-21 12:03:13.439 03.02 Count-2[26507:903]\
  \ 9\n2012-01-21 12:03:13.439 03.02 Count-2[26507:903] 10\n```\n\n以这种方式修改程序显然不是什么棘手的改动：你可以通过简单的查找替换操作完成，而且只需要修改两处。然而，在由数万行代码组成的大型程序中执行类似的查找替换就会困难得多。我们必须非常小心地对待仅仅将\
  \ 5 替换为 10 的操作：毫无疑问，有些数字 5 的实例与此无关，因此不应该被改为 10。\n\n变量正是用来解决这个问题的。与其直接将循环上限值（5 或\
  \ 10）硬编码到代码中，我们可以通过把数字放入一个变量来解决问题，从而增加了一个间接层。当你添加变量后，你不再告诉程序“循环 5 次”，而是告诉它“去查看名为`count`的变量，它会说明要运行多少次循环”。现在，这个程序叫做`Count-3`，如下所示：\n\
  \n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
  {\n    int count = 5;\n    NSLog (@\"The numbers from 1 to %d:\", count);\n    for\
  \ (int i = 1; i <= count; i++) {\n        NSLog (@\"%d\\n\", i);\n    }\n    return\
  \ (0);\n} // main\n```\n\n程序的输出应该毫无意外：\n\n```\n2012-01-21 12:16:51.442 03.03 Count-3[26596:903]\
  \ The numbers from 1 to 5:\n2012-01-21 12:16:51.446 03.03 Count-3[26596:903] 1\n\
  2012-01-21 12:16:51.447 03.03 Count-3[26596:903] 2\n2012-01-21 12:16:51.448 03.03\
  \ Count-3[26596:903] 3\n2012-01-21 12:16:51.449 03.03 Count-3[26596:903] 4\n2012-01-21\
  \ 12:16:51.449 03.03 Count-3[26596:903] 5\n```\n\n**注意**  `NSLog()`的时间戳和其他信息占用了大量篇幅，为了清晰起见，我们将在后续的代码列表中省略这些信息。\n\
  \n如果你想打印数字 1 到 100，只需在代码中一个显而易见的地方做修改：\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n    int count = 100;\n    NSLog (@\"\
  The numbers from 1 to %d:\", count);\n    for (int i = 1; i <= count; i++) {\n \
  \       NSLog (@\"%d\\n\", i);\n    }\n    return (0);\n} // main\n```\n\n通过添加一个变量，我们的代码现在更加清晰，也更易于扩展，尤其是在其他程序员需要修改代码时。要更改循环的值，他们不必仔细检查每个用到数字\
  \ 5 的地方，以确定是否需要修改。相反，他们只需修改`count`变量即可得到想要的结果。\n\n## 通过文件名的间接\n\n文件提供了另一个间接的例子。考虑`Word-Length-1`，这是一个打印单词列表及其长度的程序；它位于*03.04\
  \ Word-Length-1*文件夹中。这个至关重要的程序是你新成立的 Web 2.0 创业公司 Length-o-words.com 的关键技术。以下是代码清单：\n\
  \n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
  {\n    const char *words[4] = { \"aardvark\", \"abacus\",\n                    \
  \         \"allude\", \"zygote\" };\n    int wordCount = 4;\n    for (int i = 0;\
  \ i < wordCount; i++) {\n        NSLog (@\"%s is %lu characters long\", words[i],\
  \ strlen(words[i]));\n    }\n    return (0);\n} // main\n```\n\n`for`循环决定在任何时候处理`words`数组中的哪个单词。循环内的`NSLog()`函数使用`%s`格式说明符打印出单词。我们使用`%s`，因为`words`是\
  \ C 字符串的数组，而不是`@\"NSString\"`对象的数组。`%lu`格式说明符接收`strlen()`函数的整数值，该函数计算字符串的长度，并将其与单词本身一起打印出来。\n\
  \n当你运行`Word-Length-1`时，会看到类似下面这样的信息输出：\n\n```\naardvark is 8 characters long\nabacus\
  \ is 6 characters long\nallude is 6 characters long\nzygote is 6 characters long\n\
  ```\n\n**注意**  再次强调，我们省略了`NSLog()`在`Word-Length-1`输出中添加的时间戳和进程 ID。\n\n现在，假设投资 Length-o-words.com\
  \ 的风险资本家希望你使用另一组不同的单词。他们仔细审查了你的商业计划，并得出结论，如果你使用乡村音乐明星的名字，你可以销售给更广阔的市场。\n\n\n\n"
- "# 排版后的文本\n\n由于我们将单词直接存储在了程序中，因此不得不编辑源码，用新名称替换原始单词列表。编辑时需特别注意标点符号，例如乔·鲍勃名字中的引号，以及条目间的逗号。以下是更新后的程序，位于`03.05\
  \ Word-Length-2`文件夹中：\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int\
  \ argc, const char * argv[])\n\n{\n\nconst char *words[4] = { \"Joe-Bob \\\"Handyman\\\
  \" Brown\",\n\n\"Jacksonville \\\"Sly\\\" Murphy\",\n\n\"Shinara Bain\",\n\n\"George\
  \ \\\"Guitar\\\" Books\" };\n\nint wordCount = 4;\n\nfor (int i = 0; i < wordCount;\
  \ i++) {\n\nNSLog (@\"%s is %lu characters long\", words[i], strlen(words[i]));\n\
  \n}\n\nreturn (0);\n\n} // main\n```\n\n由于我们修改时足够谨慎，程序仍能按预期运行（请注意空格和标点符号也算作字符）：\n\
  \n```\nJoe-Bob \"Handyman\" Brown is 24 characters long\nJacksonville \"Sly\" Murphy\
  \ is 25 characters long\nShinara Bain is 12 characters long\nGeorge \"Guitar\" Books\
  \ is 21 characters long\n```\n\n完成这一改动需要大量工作：我们必须编辑`Word-Length-2.m`，修正任何拼写错误，然后重新构建程序。如果程序运行在网站上，我们还需要重新测试并重新部署才能升级到`Word-Length-2`。\n\
  \n构建该程序的另一种方法，是将所有名称完全移出代码，放入一个文本文件中，每行一个名称。让我们一起说：这就是间接性。程序不再将名称直接写在源代码中，而是从其他地方查找名称。程序从文本文件中读取名称列表，然后逐个打印出来及其长度。这个新程序的项目文件位于`03.06\
  \ Word-Length-3`文件夹中，代码如下：\n\n```\n#import <Foundation/Foundation.h>\n\nint main\
  \ (int argc, const char * argv[])\n\n{\n\nFILE *wordFile = fopen (\"/tmp/words.txt\"\
  , \"r\");\n\nchar word[100];\n\nwhile (fgets(word, 100, wordFile))\n\n{\n\n// 移除末尾的换行符\
  \ \\n\n\nword[strlen(word) - 1] = '\\0';\n\nNSLog (@\"%s is %lu characters long\"\
  , word, strlen(word));\n\n}\n\nfclose (wordFile);\n\nreturn (0);\n\n} // main\n\
  ```\n\n我们来梳理一下`Word-Length-3`的运作方式。首先，`fopen()`以只读模式打开`words.txt`文件。接着，`fgets()`从文件中读取一行文本并放入`word`中。`fgets()`调用会保留分隔每行的换行符，但我们并不需要它：如果保留，它会被计入单词的字符数。为了解决这个问题，我们将换行符替换为表示字符串结束的零字符。最后，使用我们的老朋友`NSLog()`打印出单词及其长度。\n\
  \n**注意** 请查看我们与`fopen()`一起使用的路径名：`/tmp/words.txt`。这意味着`words.txt`是一个位于`/tmp`目录（Unix\
  \ 临时目录）中的文件，该目录在计算机重启时会被清空。您可以使用`/tmp`来存放想摆弄但无需保留的临时文件。对于真正的实际程序，您应该将文件放在更持久的位置，例如用户主目录。\n\
  \n在运行程序之前，请使用文本编辑器在`/tmp`目录中创建`words.txt`文件。将以下名称输入文件：\n\n```\nJoe-Bob \"Handyman\"\
  \ Brown\nJacksonville \"Sly\" Murphy\nShinara Bain\nGeorge \"Guitar\" Books\n```\n\
  \n要从文本编辑器将文件保存到`/tmp`目录，请输入文件文本，选择“保存”，按下斜杠键（`/`），输入`tmp`，然后按回车键。\n\n如果您愿意，也可以不从`03.06\
  \ Word-Length-3`目录中复制`words.txt`文件到`/tmp`，而是直接键入名称。要在访达中查看`/tmp`，请选择“前往”![image](img/9781430241881_arrow_fmt.jpg)\
  \ “前往文件夹”。\n\n**提示** 如果您使用的是我们预构建的`Word-Length-3`项目，我们已经施展了一点 Xcode 魔法，自动为您将`words.txt`文件复制到了`/tmp`。看看您能否发现我们是怎么做的。这里有一个提示：查看“组与文件”面板中的“目标”区域。\n\
  \n当您运行`Word-Length-3`时，程序输出看起来和之前一样：\n\n```\nJoe-Bob \"Handyman\" Brown is 24 characters\
  \ long\nJacksonville \"Sly\" Murphy is 25 characters long\nShinara Bain is 12 characters\
  \ long\nGeorge \"Guitar\" Books is 21 characters long\n```\n\n`Word-Length-3`是间接性的一个绝佳例子。您不再将单词直接编码到程序中，而是说：“去`/tmp/words.txt`查找单词。”通过这种方案，我们只需编辑这个文本文件，就可以随时更改单词集，而无需修改程序。请亲自动手试试：在您的`words.txt`文件中添加几个单词，然后重新运行程序。我们在这儿等着您。\n\
  \n这种方法更好，因为文本文件比源代码更容易编辑，也远不那么脆弱。您可以让非程序员朋友使用 TextEdit 来进行编辑。您的市场人员可以随时更新单词列表，这样您就能腾出手来处理更有趣的任务。\n\
  \n如您所知，人们总会提出升级或增强程序的新想法。也许您的投资者已经决定，计算烹饪术语的长度是新的盈利途径。现在，您的程序从文件中读取数据，您就可以随意更改单词集，而无需触及代码。\n\
  \n尽管在间接性方面取得了巨大进步，`Word-Length-3`仍然相当脆弱，因为它坚持使用单词文件的完整路径名。而且该文件本身的位置也不稳定：如果计算机重启，`/tmp/words.txt`就会消失。此外，如果其他人也在您的机器上使用该程序，并使用他们自己的`/tmp/words.txt`文件，他们可能会意外覆盖您的副本。您可以每次都编辑程序以使用不同的路径，但我们知道这毫无乐趣可言，所以让我们再添加一点间接性技巧，让生活更轻松。\n\
  \n我们将修改程序，不再从`/tmp/words.txt`获取单词，而是告诉它“去查看程序的第一个启动参数，以确定单词文件的位置。”以下是`Word-Length-4`程序（位于`03.07\
  \ Word-Length-4`文件夹中）。它使用命令行参数来指定文件名。我们对`Word-Length-3`所做的更改已高亮显示：\n\n```\n#import\
  \ <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\n{\n\n\
  if (argc == 1) {\n\nNSLog (@\"you need to provide a file name\");\n\nreturn (1);\n\
  \n}\n\nFILE *wordFile = fopen (argv[1], \"r\");\n\nchar word[100];\n\nwhile (fgets(word,\
  \ 100, wordFile))\n\n{\n\n// 移除末尾的换行符 \\n\n\nword[strlen(word) - 1] = '\\0';\n\n\
  NSLog (@\"%s is %lu characters long\", word, strlen(word));\n\n}\n\nfclose (wordFile);\n\
  \nreturn (0);\n\n} // main\n```\n\n处理文件的循环与`Word-Length-3`相同，但设置代码是全新改进的。`if`语句验证用户是否提供了作为启动参数的路径名。代码查阅传给`main()`的`argc`参数，该参数保存了启动参数的数量。由于程序名称总是作为启动参数传递，`argc`总是大于或等于\
  \ 1。如果用户没有传递文件路径，`argc`的值为 1，我们就没有文件可读，因此会打印一条错误信息并停止程序。\n\n如果用户考虑周到地提供了文件路径，`argc`就会大于\
  \ 1。然后我们查看`argv`数组，找出该文件路径。`argv[1]`包含了用户给我们的文件名。（如果您好奇，`argv[0]`参数保存的是程序名称。）\n\n\
  如果您在终端中运行程序，很容易在命令行指定文件名，如下所示：\n\n```\n$ ./Word-Length-4 /tmp/words.txt\nJoe-Bob\
