  \n## 总结\n\n本章信息量很大，而且我们实际上并没有太多地讨论 Objective-C。这是怎么回事？就像木匠需要了解的不仅仅是木头（例如，他们还需要了解所有关于工具的知识）一样，Objective-C\
  \ 程序员需要了解的不仅仅是这门语言本身。能够在 Xcode 中快速编写、导航和调试代码，意味着你可以花更少的时间与环境作斗争，而将更多的时间用于做有趣的事情。\n\
  \n接下来是对 Cocoa 中一些类的重要介绍。那应该会很有趣！\n\n# 第 8 章：Foundation Kit 快速浏览\n\n你已经看到 Objective-C\
  \ 是一门非常棒的语言，而我们甚至还没有探索完它提供的所有特性。现在，我们将快速绕道，看看 Cocoa 的 Foundation 框架。尽管严格来说是 Cocoa\
  \ 的一部分，而非内置于 Objective-C 中，但 Foundation 框架如此重要，以至于我们认为值得在本书中探讨。\n\n正如你在第 2 章中看到的，Cocoa\
  \ 实际上由许多不同的框架组成。其中，桌面（OS X）应用程序最常用的是 Foundation 和 Application Kit。Application Kit\
  \ 拥有所有的用户界面对象和高级类。你将在第 16 章中体验 AppKit（酷孩子们这么称呼它）。\n\n如果你将要开发 iOS 应用程序，那么你将使用 User\
  \ Interface Kit（`UIKit`）。我们将在第 15 章中对 `UIKit` 进行一个高屋建瓴的概述。`UIKit` 被认为是 iOS 平台上的\
  \ AppKit，它包含了 iOS 应用程序的所有界面对象。\n\n## 坚实的基础\n\nFoundation，顾名思义，是所有 UI 框架的基础。因为它没有\
  \ UI 对象，所以你可以为 iOS 和 OS X 应用程序使用相同的对象。\n\nFoundation 框架包含许多有用的、底层的、面向数据的类和类型。我们将访问其中一些，例如\
  \ `NSString`、`NSArray`、`NSEnumerator` 和 `NSNumber`。Foundation 有一百多个类，你可以通过查看 Xcode\
  \ 安装的文档来探索它们。你可以在 Xcode 的组织器窗口中选择工具栏中的“文档”项来阅读文档。\n\nFoundation 框架是构建在另一个名为 CoreFoundation\
  \ 的框架之上的。CoreFoundation 完全是用 C 语言编写的，如果你愿意，也可以使用它，但我们不会在本书中讨论它。在谈论两个可能名称相似的框架时，不要感到困惑。如果你遇到以“CF”开头的函数名或变量名，它们属于\
  \ CoreFoundation。其中大部分在 Foundation 框架中有对应的对象，并且有些可以轻松地相互转换。\n\n## 使用项目模板代码\n\n在继续之前，这里有一个关于本章及本书剩余部分项目的说明。我们仍将创建\
  \ Foundation 工具项目，但我们会保留模板代码，如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\n\
  int main (int argc, const char * argv[])\n\n{\n\n@autoreleasepool\n\n{\n\n// insert\
  \ code here…\n\nNSLog(@\"Hello, World!\");\n\n} return 0;\n\n}\n```\n\n仔细看看这段代码。`main()`\
  \ 以关键字 `@autoreleasepool` 开始，所有 Cocoa 代码都写在该关键字和 `return` 语句之间的大括号内。这是对 Cocoa 内存管理的一个预览，我们将在下一章讨论。现在，请点头微笑，并保留\
  \ `@autoreleasepool` 这部分代码。如果你把它删掉了，你不会伤到自己，但在运行程序时会得到一些非常奇怪的消息。\n\n## 一些有用的类型\n\
  \n在深入探讨真正的 Foundation 类之前，让我们先看看 Cocoa 为我们提供的一些结构体。\n\n### 范围（Range）概述\n\n第一个结构体是\
  \ `NSRange`：\n\n```\ntypedef struct _NSRange\n\n{\n\nunsigned int location;\n\n\
  unsigned int length;\n\n} NSRange;\n```\n\n这个结构体用于表示事物的范围，通常是字符串中的字符范围或数组中的元素范围。`location`\
  \ 字段保存范围的起始位置，`length` 是范围内的元素数量。对于字符串 “Objective-C is a cool language”，单词 “cool”\
  \ 可以用从位置 17 开始、长度为 4 的范围来描述。`location` 可以取值 `NSNotFound` 来表示该范围不指向任何东西，很可能是因为它未初始化。\n\
  \n你可以通过三种不同的方式创建一个新的 `NSRange`。首先，可以直接赋值给字段：\n\n```\nNSRange range;\n\nrange.location\
  \ = 17;\n\nrange.length = 4;\n```\n\n其次，可以使用 C 语言的聚合结构赋值机制（听起来是不是很厉害？）：\n\n```\n\
  NSRange range = { 17, 4 };\n```\n\n最后，Cocoa 提供了一个名为 `NSMakeRange()` 的便捷函数：\n\n```\n\
  NSRange range = NSMakeRange (17, 4);\n```\n\n`NSMakeRange()` 的好处在于，你可以在任何可以使用函数的地方使用它，例如作为方法调用的参数。\n\
  \n\n```objc\n[anObject flarbulateWithRange:NSMakeRange(13, 15)];\n```\n\n## 几何类型\n\
  \n你经常会见到以“CG”为前缀、处理几何数据的类型，例如 `CGPoint` 和 `CGSize`。这些类型来自 Core Graphics 框架，用于二维渲染。Core\
  \ Graphics 使用 C 语言编写，因此我们也用 C 类型与之交互。`CGPoint` 表示笛卡尔平面上的 (x, y) 坐标点：\n\n```c\nstruct\
  \ CGPoint\n{\n    float x;\n    float y;\n};\n```\n\n`CGSize` 包含宽度和高度：\n\n```c\n\
  struct CGSize\n{\n    float width;\n    float height;\n};\n```\n\n在 Shapes 系列程序中，我们可以使用\
  \ `CGPoint` 和 `CGSize` 替代自定义的矩形结构体，但当时我们希望尽可能保持简单。Cocoa 提供了矩形类型，它由点与尺寸组合而成：\n\n\
  ```c\nstruct CGRect\n{\n    CGPoint origin;\n    CGSize size;\n};\n```\n\nCocoa\
  \ 还为我们提供了便捷的构造函数：`CGPointMake()`、`CGSizeMake()` 和 `CGRectMake()`。\n\n**注：** 为什么这些类型是\
  \ C 结构体而不是完整的对象？这归根结底是性能问题。程序（尤其是 GUI 程序）在运行时需要大量临时点、尺寸和矩形。请记住，所有 Objective-C 对象都是动态分配的，而动态分配是相对昂贵的操作，会消耗不少时间。将这些结构体设计为第一类对象会带来巨大的使用开销。\n\
  \n## 字符串引导\n\n我们旅程中第一个真正的类是 `NSString`，即 Cocoa 的字符串处理类。字符串只是人类可读字符的序列。由于计算机需要定期与人类交互，拥有存储和操作可读文本的方式是个好主意。你之前已经见过\
  \ `NSString`，它使用特殊的 `NSString` 字面量（在双引号字符串前加 `@` 符号），例如 `@\"Hi!\"`。这些字面量字符串与编程方式创建的\
  \ `NSString` 完全一样。\n\n如果你曾在 C 语言中进行过字符串处理（例如 Dave Mark 所著《在 Mac 上学 C》中介绍的内容），就知道这相当痛苦。C\
  \ 语言将字符串实现为简单的字符数组，并以尾随的零字节标记结束。Cocoa 的 `NSString` 内置了许多方法，使字符串处理变得轻松许多。\n\n###\
  \ 构建字符串\n\n你已经见过 `printf()` 和 `NSLog()` 这类函数，它们接受格式字符串和参数并输出格式化内容。`NSString` 的 `stringWithFormat:`\
  \ 方法也能类似地根据格式和参数创建新的 `NSString`：\n\n```objc\n+ (id) stringWithFormat: (NSString\
  \ *) format, …;\n```\n\n你可以像这样创建新字符串：\n\n```objc\nNSString *height;\nheight = [NSString\
  \ stringWithFormat:@\"Your height is %d feet, %d inches\", 5, 11];\n```\n\n结果字符串是“Your\
  \ height is 5 feet, 11 inches”。\n\n## 类方法\n\n`stringWithFormat:` 的声明中有几个有趣的地方。首先是末尾的省略号\
  \ (`…`)，它向你（和编译器）表明该方法可以接受任意数量的额外参数，以逗号分隔列表形式指定，就像 `printf()` 和 `NSLog()` 一样。\n\n\
  关于 `stringWithFormat:` 的另一个奇特且更重要的点是声明中非常特殊的前导字符：加号。这跟谷歌的社交网络有关系吗？其实没有。当 Objective-C\
  \ 运行时构建一个类时，它会创建一个代表该类的**类对象**。类对象包含指向父类的指针、类名以及类的方法列表。类对象还包含一个 `long` 类型的值，用于指定该类新创建实例对象的大小（以字节为单位）。\n\
  \n当你使用加号声明方法时，你就将该方法标记为**类方法**。该方法属于类对象（而非类的实例对象），通常用于创建新实例。用于创建新对象的类方法称为**工厂方法**。\n\
  \n`stringWithFormat:` 就是一个工厂方法。它根据你提供的参数为你创建一个新对象。使用 `stringWithFormat:` 创建新字符串比从空字符串开始逐个构建所有组件要简单得多。\n\
  \n类方法也可用于访问全局数据。AppKit（用于 OS X）中的 `NSColor` 和 UIKit（用于 iOS）中的 `UIColor` 提供了一些以颜色命名的类方法，例如\
  \ `redColor` 和 `blueColor`。要获取用于绘制的蓝色对象，你可以这样写：\n\n```objc\nNSColor *haveTheBlues\
  \ = [NSColor blueColor];\n```\n\n或者\n\n```objc\nUIColor *blueMan = [UIColor blueColor];\n\
  ```\n\n你创建的方法绝大多数都是实例方法，并使用前导减号 (`-`) 声明。这些方法会在特定对象实例上操作，例如获取某个 `Circle` 的颜色或 `Tire`\
  \ 的气压。如果方法执行更通用的功能（例如创建实例对象或访问某些全局类数据），则很可能使用前导加号 (`+`) 将其声明为类方法。\n\n### 大小问题\n\n\
  另一个实用的 `NSString` 方法（实例方法）是 `length`，它返回字符串中的字符数：\n\n```objc\n- (NSUInteger) length;\n\
  ```\n\n你可以这样使用它：\n\n```objc\nNSUInteger length = [height length];\n```\n\n或者在表达式中这样使用：\n\
  \n```objc\nif ([height length] > 35)\n{\n    NSLog (@\"wow, you're really tall!\"\
  );\n}\n```\n\n**注：** `NSString` 的 `length` 方法在处理国际字符串（例如包含俄语、中文或日文字符的字符串）时能正确处理，其底层使用了\
  \ Unicode 国际字符标准。在纯 C 语言中处理这些国际字符串尤其痛苦，因为单个字符可能占用超过 1 个字节。这意味着像 `strlen()` 这样仅统计字节数的函数可能返回错误的值。\n\
  \n### 比较策略\n\n字符串的比较是一种常见操作。有时，你需要判断两个字符串是否相等（例如，`username` 是否等于 `'wmalik'`？）。有时，你需要了解两个字符串的排序顺序，以便对名称列表进行排序。`NSString`\
  \ 提供了多个比较函数来帮助你完成这些任务。\n\n`isEqualToString:` 将接收者（消息发送到的对象）与作为参数传入的字符串进行比较。`isEqualToString:`\
  \ 返回一个 `BOOL` 值（`YES` 或 `NO`），指示两个字符串的内容是否相同。其声明如下：\n\n```objc\n- (BOOL) isEqualToString:\
  \ (NSString *) aString;\n```\n\n使用方法如下：\n\n```objc\nNSString *thing1 = @\"hello\
  \ 5\";\nNSString *thing2 = [NSString stringWithFormat: @\"hello %d\", 5];\n\nif\
  \ ([thing1 isEqualToString: thing2])\n{\n    NSLog (@\"They are the same!\");\n\
  }\n```\n\n要比较字符串，请使用 `compare:` 方法，声明如下：\n\n```objc\n- (NSComparisonResult) compare:\
  \ (NSString *) aString;\n```\n\n`compare:` 会逐字符比较接收对象与传入的字符串。它返回一个 `NSComparisonResult`（实际上是一个\
  \ `enum`），表示比较结果：\n\n```objc\nenum\n{\n    NSOrderedAscending = -1,\n    NSOrderedSame,\n\
  \    NSOrderedDescending\n};\ntypedef NSInteger NSComparisonResult;\n```\n\n**比较字符串：正确做法**\n\
  \n在比较字符串是否相等时，应使用 `isEqualToString:` 而不是直接比较它们的指针值，例如：\n\n```objc\nif ([thing1 isEqualToString:\
  \ thing2])\n{\n    NSLog (@\"The strings are the same!\");\n}\n```\n\n与以下代码不同：\n\
  \n```objc\nif (thing1 == thing2)\n{\n    NSLog (@\"They are the same object!\");\n\
  }\n```\n\n这是因为 `==` 运算符只作用于 `thing1` 和 `thing2` *指针*本身的值，而非它们指向的内容。由于 `thing1` 和\
  \ `thing2` 是不同的字符串，第二种比较会认为它们不同。\n\n有时，你确实需要检查两个对象是否相同：`thing1` 是否就是 `thing2` 这个对象本身？此时应使用\
  \ `==` 运算符。如果你需要检查等价性（即这两个字符串是否表示相同的内容），则应使用 `isEqualToString:`。\n\n\n如果您曾经使用过 C\
  \ 语言的 `qsort()` 或 `bsearch()` 函数，可能会对此感到熟悉。如果 `compare:` 的结果是 `NSOrderedAscending`，则左侧的值小于右侧的值——也就是说，进行比较的对象在字母顺序上早于传入的字符串。例如，`[@\"\
  aardvark\" compare: @\"zygote\"]` 会返回 `NSOrderedAscending`。\n\n同样地，`[@\"zoinks\"\
  \ compare:@\"jinkies\"]` 会返回 `NSOrderedDescending`。而正如您所料，`[@\"fnord\" compare:\
  \ @\"fnord\"]` 会返回 `NSOrderedSame`。\n\n### 大小写不敏感性\n\n`compare:` 执行的是区分大小写的比较。换句话说，`@\"\
  Bork\"` 和 `@\"bork\"` 进行比较时，不会返回 `NSOrderedSame`。还有另一个方法 `compare:options:`，它赋予了您更多的控制权：\n\
  \n```\n- (NSComparisonResult) compare: (NSString *) aString\noptions: (NSStringCompareOptions)\
  \ mask;\n```\n\n`options` 参数是一个位掩码，这是一种利用每一位来表示某个选项是否开启的值。您可以使用按位或运算符（`|`）来组合多个选项标志。以下是一些常用的选项：\n\
  \n*   `NSCaseInsensitiveSearch`：大小写字符被视为相同。\n*   `NSLiteralSearch`：执行精确比较，包括大小写。\n\
  *   `NSNumericSearch`：字符串中的数字被当作数值进行比较，而不是作为字符值。如果没有这个选项，`“100”` 会排在 `“99”` 之前，这对于大多数非程序员来说相当奇怪，甚至被认为是错误的。\n\
  \n例如，如果您想执行一个忽略大小写但正确排序数字的比较，可以这样做：\n\n```\nif ([thing1 compare: thing2 options:\
  \ NSCaseInsensitiveSearch | NSNumericSearch]\n    == NSOrderedSame)\n{\n    NSLog\
  \ (@\"They match!\");\n}\n```\n\n### 是否包含在内？\n\n有时，您想查看一个字符串是否包含另一个字符串。例如，您可能想知道一个文件名是否以\
  \ `“.mov”` 结尾，以便在 QuickTime Player 中打开它，或者检查它是否以 `“draft”` 开头，以判断它是否是文档的草稿版本。这里有两个方法可以帮到您：第一个方法检查字符串是否以另一个字符串开头，第二个方法判断字符串是否以另一个字符串结尾：\n\
  \n```\n- (BOOL) hasPrefix: (NSString *) aString;\n- (BOOL) hasSuffix: (NSString\
  \ *) aString;\n```\n\n您可以像下面这样使用这些方法：\n\n```\nNSString *fileName = @\"draft-chapter.pages\"\
  ;\n\nif ([fileName hasPrefix: @\"draft\"])\n{\n    // this is a draft\n}\n\nif ([fileName\
  \ hasSuffix: @\".mov\"])\n{\n    // this is a movie\n}\n```\n\n因此，`draft-chapter.pages`\
  \ 会被识别为一个草稿版本（因为它以 `“draft”` 开头），但不会被识别为一个电影文件（其结尾是 `“.pages”` 而不是 `“.mov”`）。\n\n\
  如果您想查看一个字符串是否位于另一个字符串内部，请使用 `rangeOfString:`：\n\n```\n- (NSRange) rangeOfString:\
  \ (NSString *) aString;\n```\n\n当您向一个 `NSString` 对象发送 `rangeOfString:` 消息时，传入要查找的字符串。它会返回一个\
  \ `NSRange` 结构体，用于显示字符串中匹配部分的位置和大小。因此，下面的示例：\n\n```\nNSRange range = [fileName rangeOfString:\
  \ @\"chapter\"];\n```\n\n返回的 `range.location` 为 `6`，`range.length` 为 `7`。如果在接收者中未找到参数，`range.location`\
  \ 将等于 `NSNotFound`。\n\n### 可变性\n\n`NSString` 是**不可变**的。这不意味着您无法让它们保持安静；它指的是，一旦它们被创建，就无法改变它们。您可以对它们进行各种操作，比如用它们创建新字符串、查找字符以及与其他字符串进行比较，但您无法通过移除字符或添加新字符来改变它们。\n\
  \nCocoa 提供了一个名为 `NSMutableString` 的 `NSString` 子类。如果您想就地修改字符串，请使用它。\n\n> **注意**：来自\
  \ Java 的程序员应该对这个区别感到很熟悉。`NSString` 的行为类似于 Java 的 `String` 类，而 `NSMutableString`\
  \ 就像 Java 的 `StringBuffer` 类。\n\n您可以使用类方法 `stringWithCapacity:` 来创建一个新的 `NSMutableString`，其声明如下：\n\
  \n```\n+ (id) stringWithCapacity: (NSUInteger) capacity;\n```\n\n`capacity` 参数只是给\
  \ `NSMutableString` 的一个建议，就像您告诉一个青少年回家的时间一样。字符串并不受限于您提供的容量——它只是一种优化。例如，如果您知道您要构建一个\
  \ 40 兆字节大小的字符串，`NSMutableString` 可以预先分配一块内存来容纳它，从而使后续操作快得多。像这样创建一个新的可变字符串：\n\n```\n\
  NSMutableString *string = [NSMutableString stringWithCapacity:42];\n```\n\n一旦您有了一个可变字符串，您就可以对它执行各种奇妙的操作。一个常见的操作是使用\
  \ `appendString:` 或 `appendFormat:` 追加一个新字符串，如下所示：\n\n```\n- (void) appendString:\
  \ (NSString *) aString;\n- (void) appendFormat: (NSString *) format, …;\n```\n\n\
  `appendString:` 接受其 `aString` 参数，并将其复制到接收对象的末尾。`appendFormat:` 的工作方式类似于 `stringWithFormat:`，但它不是创建一个新的字符串对象，而是将格式化后的字符串追加到接收字符串的末尾，例如：\n\
  \n```\nNSMutableString *string = [NSMutableString stringWithCapacity:50];\n[string\
  \ appendString: @\"Hello there \"];\n[string appendFormat: @\"human %d!\", 39];\n\
  ```\n\n在这段代码执行完毕后，`string` 将拥有友好的值 `“Hello there human 39!”`。\n\n您可以使用 `deleteCharactersInRange:`\
  \ 方法从字符串中移除字符：\n\n```\n- (void) deleteCharactersInRange: (NSRange) aRange;\n```\n\
  \n您通常会结合使用 `deleteCharactersInRange:` 和 `rangeOfString:`。请记住，`NSMutableString` 是\
  \ `NSString` 的一个子类。通过面向对象编程的奇迹，您也可以在 `NSMutableString` 上使用 `NSString` 的所有特性，包括 `rangeOfString:`、比较方法以及所有其他方法。例如，假设您列出了所有的朋友，但后来您决定不再喜欢\
  \ Jack，并想把他从列表中移除：\n\n首先，创建朋友列表：\n\n```\nNSMutableString *friends = [NSMutableString\
  \ stringWithCapacity:50];\n[friends appendString: @\"James BethLynn Jack Evan\"\
  ];\n```\n\n接下来，找到 Jack 所在的范围：\n\n```\nNSRange jackRange = [friends rangeOfString:\
  \ @\"Jack\"];\njackRange.length++; // 吃掉后面的空格\n```\n\n在这个例子中，范围起始于 `15`，长度为 `5`。现在，我们可以将\
  \ Jack 从我们的圣诞贺卡名单中移除：\n\n```\n[friends deleteCharactersInRange: jackRange];\n```\n\
  \n这将使字符串变为 `“James BethLynn Evan”`。\n\n可变字符串对于实现 `description` 方法非常方便。您可以使用 `appendString`\
  \ 和 `appendFormat` 为您的对象创建一个漂亮的描述。\n\n因为 `NSMutableString` 是 `NSString` 的子类，我们免费获得了几种行为。第一个好处是，在任何使用\
  \ `NSString` 的地方，我们都可以用 `NSMutableString` 替代。任何接受 `NSString` 的方法也将接受 `NSMutableString`。字符串的使用者并不关心它是可变的还是不可变的。\n\
  \n另一个免费的行为来自于继承在类方法和实例方法上同样适用。因此，`NSString` 中方便的类方法 `stringWithFormat:` 也可用于创建新的\
  \ `NSMutableString`。您可以轻松地从一个格式字符串填充一个可变字符串：\n\n```\nNSMutableString *string = [NSMutableString\
  \ stringWithFormat: @\"jo%dy\", 2];\n```\n\n`string` 的初始值是 `“jo2y”`，但您可以执行其他操作，例如从给定范围删除字符或在特定位置插入字符。请查阅\
  \ `NSString` 和 `NSMutableString` 的文档，以了解这些类中提供的数十种方法的完整细节。\n\n### 集合代理\n\n单个对象四处浮动是挺不错的，但通常，您需要让东西变得井井有条。Cocoa\
  \ 提供了许多集合类，例如 `NSArray` 和 `NSDictionary`，它们的实例存在的目的就是为了容纳其他对象。\n\n### NSArray\n\n\
  \n\n您已经在 C 语言中使用过数组。实际上，在本书的前面部分，我们就曾使用数组为一辆汽车存放四个轮胎。你可能还记得那段代码带来了一些困难。例如，我们必须检查数组索引是否有效：它不能低于\
  \ 0 或超出数组末尾。另一个问题是：数组长度 4 被硬编码在`Car`类中，这意味着我们无法拥有超过四个轮胎的汽车。当然，这看起来不算太大的限制，但你永远不知道，我们一直被承诺的未来飞行喷气汽车是否会在平稳着陆时需要超过四个轮胎。\n\
  \n`NSArray`是一个 Cocoa 类，用于保存对象的有序列表。你可以在`NSArray`中放入任何类型的对象：`NSString`、`Car`、`Shape`、`Tire`，或者任何你想要的，甚至其他数组和字典。\n\
  \n一旦你有了一个包含对象的`NSArray`，你可以通过各种方式使用它，例如让对象的实例变量指向该数组，将数组作为参数传递给方法或函数，获取其中存储的对象数量，抓取特定索引处的对象，在数组中查找对象，遍历其内容，或者执行其他无数神奇的操作。\n\
  \n`NSArray`有两个限制。首先，它只能保存 Objective-C 对象。你不能在`NSArray`中存放基本 C 类型，比如`int`、`float`、`enum`、`struct`或随机指针。此外，你不能在`NSArray`中存放`nil`（对象的零值或\
  \ NULL 值）。有一些方法可以绕过这些限制，稍后你将看到。\n\n你可以使用类方法`arrayWithObjects:`创建一个新的`NSArray`。你需要给它一个逗号分隔的对象列表，末尾加上`nil`来表示列表结束（顺便说一句，这也是你不能在数组中存放`nil`的原因之一）：\n\
  \n`NSArray *array = [NSArray arrayWithObjects:@\"one\", @\"two\", @\"three\", nil];`\n\
  \n这会创建一个由`NSString`字面量对象组成的三个元素的数组。你也可以使用数组字面量格式创建数组，这与`NSString`字面量格式非常相似。不是使用引号，而是使用方括号，如下所示：\n\
  \n`NSArray *array2 = @[@\"one\", @\"two\", @\"three\"];`\n\n尽管`array`和`array2`是不同的对象，但它们的内容是相同的，而且第二种版本显然比第一种更容易输入。\n\
  \n**注意：** 当你使用字面量语法时，不需要在末尾包含`nil`。\n\n一旦你有了一个数组，你可以获取它所包含的对象数量：\n\n`- (NSUInteger)count;`\n\
  \n并且你可以获取特定索引处的对象：\n\n`- (id)objectAtIndex:(NSUInteger)index;`\n\n使用字面量语法访问数组中的对象就像在\
  \ C 语言中访问数组元素一样：\n\n`id *myObject = array1[1];`\n\n你可以结合计数和获取来打印数组的内容：\n\n```\n\
  for (NSInteger i = 0; i < [array count]; i++)\n{\n    NSLog (@\"index %d has %@.\"\
  ,i, [array objectAtIndex:i]);\n}\n```\n\n你也可以使用数组字面量语法编写前面的代码：\n\n```\nfor (NSInteger\
  \ i = 0; i < [array count]; i++)\n{\n    NSLog (@\"index %d has %@.\",i, array[i]);\n\
  }\n```\n\n两种情况的输出看起来相同：\n\n```\nindex 0 has one.\nindex 1 has two.\nindex 2 has\
  \ three.\n```\n\n如果你引用的索引大于数组中的对象数量，Cocoa 会在运行时打印一条报错信息。例如，运行以下代码：\n\n`[array objectAtIndex:208000];`\n\
  \n`array[208000];`\n\n你会看到：\n\n```\n*** Terminating app due to uncaught exception\
  \ 'NSRangeException',\nreason: '*** -[__NSArray objectAtIndex:]: index 208000 beyond\
  \ bounds [0 .. 2]'\n```\n\n就是这样。\n\n因为你可能在 Cocoa 编程生涯中时不时看到类似的消息，让我们花点时间仔细看看。在通过说“终止了你的程序”给你一个下马威之后，消息提到它这样做是因为一个“未捕获的异常”。异常是\
  \ Cocoa 表达“我不知道如何处理这个”的方式。有些方法可以在代码中捕获异常并自行处理，但当你刚开始时，你不需要这样做。这个特定的异常是`NSRangeException`，这意味着传递给方法的范围参数有问题。具体的方法是`NSArray`的`objectAtIndex:`。\n\
  \n异常消息中最后的信息片段是最有趣的。消息的这一部分说我们请求数组中索引 208000 处的某个东西，但哎呀，数组只有三个元素——差得*那么远*。利用这些信息，你可以回溯到有问题的代码并找到错误。\n\
  \n追踪异常的原因可能会令人沮丧。你在控制台窗口中只得到这条消息。对于 GUI 程序，程序会继续运行。有一种方法可以让 Xcode 在异常发生时进入调试器，这样会好一些。要这样做，请在工作区导航面板中选择断点标签。你会得到一个断点列表。现在，我们设置了一个断点，如图\
  \ Figure 8-1 所示。\n\n![9781430241881_Fig08-01.tif](img/9781430241881_Fig08-01_fmt.jpg)\n\
  \nFigure 8-1. Xcode 的断点窗口\n\n要添加另一个断点，只需点击面板左下角的 + 按钮，并从弹出菜单中选择“添加异常断点”项。你会看到另一个弹出窗口，如图\
  \ Figure 8-2 所示。\n\n![9781430241881_Fig08-02.tif](img/9781430241881_Fig08-02_fmt.jpg)\n\
  \nFigure 8-2. 添加异常断点\n\n在 Xcode 设置断点之前，它允许你自定义断点的行为。例如，你可以让它打印错误消息或停止并为你执行一些命令。现在，我们不打算做任何花哨的事情。我们只是让程序在抛出异常的地方停止。要完成，我们点击“完成”来添加断点。添加断点后，窗口看起来像\
  \ Figure 8-3。现在，当你运行程序并且抛出异常时，调试器将停止并指向包含断点的行，如图 Figure 8-4 所示。\n\n![9781430241881_Fig08-03.tif](img/9781430241881_Fig08-03_fmt.jpg)\n\
  \nFigure 8-3. XCode 调试器指向包含断点的行\n\n![9781430241881_Fig08-04.tif](img/9781430241881_Fig08-04_fmt.jpg)\n\
  \nFigure 8-4. 现在，程序在断点处停止\n\n你可能对 Cocoa 仅仅因为你的程序越过了数组边界就如此激烈地抱怨感到不满。但请相信我们：你会意识到这实际上是一件*很棒的事情*，因为它让你能够捕获那些否则可能未被检测到的错误。\n\
  \n像`NSString`一样，`NSArray`有很多特性。例如，你可以告诉数组返回特定对象的位置，基于当前数组中的一系列元素创建一个新数组，使用给定的分隔符将所有元素连接成一个字符串（这对于制作逗号分隔的列表很方便），或者创建一个已排序版本的新数组。\n\
  \n**拆分操作** 如果你使用过 Perl 或 Python 等脚本语言，你可能习惯于将字符串拆分成数组以及将数组元素连接成单个字符串。你也可以用`NSArray`做到这一点。\n\
  \n要拆分`NSArray`，请使用`-componentsSeparatedByString:`，如下所示：\n\n`NSString *string = @\"\
  oop:ack:bork:greeble:ponies\";`\n\n\n\n```objc\nNSArray *chunks = [string componentsSeparatedByString:\
  \ @\":\"];\n```\n\n要将一个 `NSArray` 连接起来并创建其内容的字符串，可以使用 `componentsJoinedByString:`：\n\
  ```objc\nstring = [chunks componentsJoinedByString: @\" :- ) \"];\n```\n上面这行代码会生成一个\
  \ `NSString`，其内容为 `\"oop :- ) ack :- ) bork :- ) greeble :- ) ponies\"`。\n\n## 可变数组\n\
  \n和 `NSString` 一样，`NSArray` 创建的是不可变对象。一旦你创建了一个包含特定数量对象的数组，该数组就固定了：你无法添加或移除任何成员。当然，数组中所包含的对象本身可以自由变化（比如一辆`Car`在安全检测不合格后换上一套新的`Tires`），但数组对象本身将永远保持不变。\n\
  \n作为 `NSArray` 的补充，`NSMutableArray` 允许我们随时添加和移除对象。它使用一个类方法 `arrayWithCapacity` 来创建新的可变数组：\n\
  ```objc\n+ (id) arrayWithCapacity: (NSUInteger) numItems;\n```\n就像 `NSMutableString`\
  \ 的 `stringWithCapacity:` 一样，数组的容量只是一个关于其最终大小的提示。该容量值的存在是为了让 Cocoa 能够在代码中执行一些优化。Cocoa\
  \ 不会预先用对象填充数组，也不会用容量值来限制数组。你可以这样创建一个新的可变数组：\n```objc\nNSMutableArray *array = [NSMutableArray\
  \ arrayWithCapacity: 17];\n```\n\n使用 `addObject:` 将对象添加到数组的末尾。\n```objc\n- (void)\
  \ addObject: (id) anObject;\n```\n你可以通过一个像这样的循环将四个轮胎添加到数组中：\n```objc\nfor (NSInteger\
  \ i = 0; i < 4; i++)\n{\n    Tire *tire = [Tire new];\n    [array addObject: tire];\n\
  }\n```\n\n你可以移除特定索引处的对象。例如，如果你不喜欢第二个轮胎，可以使用 `removeObjectAtIndex:` 将其删除。该方法的定义如下：\n\
  ```objc\n- (void) removeObjectAtIndex: (NSUInteger) index;\n```\n你可以这样使用它：\n```objc\n\
  [array removeObjectAtIndex:1];\n```\n注意第二个轮胎位于索引 1。`NSArray` 对象像 C 数组一样，是从零开始索引的。\n\
  \n现在还剩三个轮胎。移除对象后数组中不会留下空洞。被移除对象之后的所有数组元素都会向前移动来填补这个空缺。\n\n可变数组的其他方法还能实现很多很酷的功能，比如在特定索引处插入对象、替换对象、对数组进行排序，以及\
  \ `NSArray` 作为父类提供的所有好功能。\n\n**注意** 没有用于创建 `NSMutableArray` 对象的字面量语法。\n\n## 枚举天地\n\
  \n对数组的每个元素执行操作是 `NSArray` 的常见操作。例如，如果你非常喜欢绿色，你可以让数组中的所有形状将颜色改为绿色。或者，在构建你的匹兹堡驾驶模拟器时，为了使模拟更逼真，你可能想让车里的每个轮胎都漏气。你可以编写一个从\
  \ `0` 到 `[array count]` 的循环来获取索引处的对象，也可以使用 `NSEnumerator`，这是 Cocoa 描述这种集合迭代方式的方法。要使用\
  \ `NSEnumerator`，你需要通过 `objectEnumerator` 向数组请求枚举器：\n```objc\n- (NSEnumerator *)objectEnumerator;\n\
  ```\n你可以这样使用该方法：\n```objc\nNSEnumerator *enumerator = [array objectEnumerator];\n\
  ```\n此外还有一个 `reverseObjectEnumerator` 方法，如果你想从后往前遍历集合的话。\n\n获取枚举器后，你启动一个 `while`\
  \ 循环，每次循环时向枚举器请求其 `nextObject`：\n```objc\n- (id) nextObject;\n```\n当 `nextObject`\
  \ 返回 `nil` 时，循环结束。这也是你不能在数组中存储 `nil` 值的另一个原因：无法区分 `nil` 结果是数组中存储的值，还是表示循环结束的 `nil`。\n\
  \n整个循环如下所示：\n```objc\nNSEnumerator *enumerator = [array objectEnumerator];\nwhile\
  \ (id thingie = [enumerator nextObject])\n{\n    NSLog (@\"I found %@\", thingie);\n\
  }\n```\n若你在枚举一个可变数组，有一个陷阱：你不能修改这个容器，比如添加或移除对象。如果你这样做了，枚举器会变得混乱，你会得到未定义的结果。“未定义结果”可能意味着从“嘿，好像成功了！”到“哎呀，它让我的程序崩溃了”的任意情况。\n\
  \n## 快速枚举\n\n苹果在将 Objective-C 语言版本提升到 2.0 时，引入了一些小的改进。我们将看到的第一个改进叫做**快速枚举**，它使用了脚本语言用户熟悉的语法。它的样子如下：\n\
  ```objc\nfor (NSString *string in array)\n{\n    NSLog (@\"I found %@\", string);\n\
  }\n```\n循环体会为数组中的每个元素执行一次，变量 `string` 持有每个数组的值。这比枚举器语法简洁得多，速度也快得多。\n\n像所有 Objective-C\
  \ 2.0 的特性一样，这在运行非常旧系统软件（Mac OS X 10.5 Leopard 之前的版本）的 Mac 上不可用。如果你或你的用户需要在不支持 Objective-C\
  \ 2.0 或更高版本的系统上运行程序，你就不能使用这个新语法。真可惜——不过到了现在，这种情况也不太可能发生了。\n\n苹果编译器的最新版本（基于 Clang\
  \ 和 LLVM 项目）为基础 C 语言增加了一个叫做**块**的特性。我们将在第 14 章中详细讨论块。为了支持块特性，苹果在 `NSArray` 中添加了一个使用块来枚举对象的方法，如下所示：\n\
  ```objc\n- (void)enumerateObjectsUsingBlock:(void (^)(id obj, NSUInteger idx, BOOL\
  \ *stop))block\n```\n哇！这到底是什么鬼？你可能觉得你连怎么读它都不知道，更别提使用了。别担心，这比它看起来要简单得多。使用之前的数组，我们可以将前面的代码重写为：\n\
  ```objc\n[array enumerateObjectsUsingBlock:^(NSString *string, NSUInteger index,\
  \ BOOL *stop) {\n    NSLog (@\"I found %@\", string);\n}];\n```\n现在，问题是，“为什么我们要用它来代替快速枚举？”使用块的一个好处是，循环可以并行执行。而使用快速枚举时，执行是按顺序逐个元素进行的。\n\
  \n好了，现在我们有了四种遍历数组的方法：按索引、使用 `NSEnumerator`、使用快速枚举，以及使用块。你该用哪一种呢？\n\n如果你不必担心在古老的、10.5\
  \ 之前的系统上运行，那就使用快速枚举或块。它们更简洁，速度也快得多。此外，块只在苹果的 LLVM 编译器上可用。\n\n在不寻常的情况下，如果你需要支持 Mac\
  \ OS X 10.4 Tiger 或更早版本，那就采用 `NSEnumerator` 方式。Xcode 提供了一个重构功能，可以将代码转换为 Objective-C\
  \ 2.0，并且会自动将 `NSEnumerator` 循环转换为快速枚举。\n\n只有在你确实需要按索引访问元素时，才使用 `-objectAtIndex:`，比如你在数组中跳跃式访问（例如，访问每隔两个的元素）或者同时遍历多个数组的情况。\n\
  \n## NSDictionary\n\n毫无疑问你听说过字典。也许你偶尔还会用一下。在编程中，**字典**是关键词及其定义的集合。Cocoa 有一个名为 `NSDictionary`\
  \ 的集合类来执行这些任务。一个 `NSDictionary` 在给定的键（通常是 `NSString`）下存储一个值（可以是任意类型的 Objective-C\
  \ 对象）。然后你可以使用该键来查找对应的值。例如，如果你有一个 `NSDictionary` 存储了一个人的所有联系信息，你可以问这个字典：“把键 `home-address`\
  \ 对应的值给我。”或者“把键 `email-address` 对应的值给我。”\n\n\n\n**注意**：为什么不用数组然后查看数组里的值呢？字典（也称为哈希表或关联数组）使用一种针对键查找而优化的存储机制。字典不是扫描整个数组来寻找某个项目，而是能立即找到它要的数据。对于频繁的查找和大数据集，字典的速度可以比数组快几百倍。这，真的很快。\n\
  \n正如你可能猜到的，`NSDictionary` 和 `NSString`、`NSArray` 一样，是一个不可变对象。不过，`NSMutableDictionary`\
  \ 类允许你随意添加和删除内容。要创建一个新的 `NSDictionary`，你需要在创建时提供字典中所有的对象和键。\n\n使用字典最简便的方法是使用字典字面量语法，它类似于类方法\
  \ `dictionaryWithObjectsAndKeys:`。\n\n字面量语法定义为 `@{key:value,…};`。请注意，它使用的是花括号而不是方括号。还要注意，`dictionaryWithObjectsAndKeys:`\
  \ 使用对象后跟键，但字面量语法是相反的：键在前，值在后。每个键值对由冒号分隔，每个键值对之间由逗号分隔。\n\n```\n+ (id) dictionaryWithObjectsAndKeys:\
  \ (id) firstObject, …;\n```\n\n这个方法接受交替的对象和键序列，以 `nil` 值结束（正如你可能想到的，你不能在 `NSDictionary`\
  \ 中存储 `nil` 值，而且你可能也猜到了，使用字面量语法时不需要 `nil`）。假设我们想创建一个字典，用人类可读的标签而不是数组中任意的索引来存放我们汽车的轮胎。你可以像这样创建这样一个字典：\n\
  \n```\nTire *t1 = [Tire new];\nTire *t2 = [Tire new];\nTire *t3 = [Tire new];\n\
  Tire *t4 = [Tire new];\n\nNSDictionary *tires = [NSDictionary dictionaryWithObjectsAndKeys:\
  \ t1,\n    @\"front-left\", t2, @\"front-right\", t3, @\"back-left\", t4, @\"back-right\"\
  , nil];\n```\n\n或\n\n```\nNSDictionary *tires = @{@\"front-left\" : t1, @\"front-right\"\
  \ : t2, @\"back-left\" : t3,\n    @\"back-right\" : t4};\n```\n\n要访问字典中的值，请使用 `objectForKey:`\
  \ 方法，给它传入你之前存储值所用的键：\n\n```\n- (id) objectForKey: (id) aKey;\n```\n\n或\n\n```\n\
  tires[key];\n```\n\n因此，要找到右后轮胎，你可以这样做：\n\n```\nTire *tire = [tires objectForKey:@\"\
  back-right\"];\n```\n\n或\n\n```\nTire *tire = tires[@\"back-right\"];\n```\n\n如果字典里没有右后轮胎（比如它是一辆奇特的三轮车），字典会返回\
  \ `nil`。\n\n要创建一个新的 `NSMutableDictionary`，请向 `NSMutableDictionary` 类发送 `dictionary`\
  \ 消息。你也可以通过使用 `dictionaryWithCapacity:` 创建一个新的可变字典，并给 Cocoa 一个关于其最终大小的提示（你有没有开始注意到\
  \ Cocoa 有一个非常规则的命名系统？）。\n\n```\n+ (id) dictionaryWithCapacity: (NSUInteger) numItems;\n\
  ```\n\n正如我们之前对 `NSMutableString` 和 `NSMutableArray` 所说的，这个容量只是一个提示，而不是字典大小的限制。你可以使用\
  \ `setObject:forKey:` 向字典添加内容。\n\n```\n- (void)setObject:(id)anObject forKey:(id)aKey;\n\
  ```\n\n这是创建存放轮胎的字典的另一种方法：\n\n```\nNSMutableDictionary *tires = [NSMutableDictionary\
  \ dictionary];\n[tires setObject:t1 forKey:@\"front-left\"];\n[tires setObject:t2\
  \ forKey:@\"front-right\"];\n[tires setObject:t3 forKey:@\"back-left\"];\n[tires\
  \ setObject:t4 forKey:@\"back-right\"];\n```\n\n如果你对一个已经存在的键使用 `setObject:forKey:`，它会用新值替换旧值。如果你想从可变字典中删除一个键，请使用\
  \ `removeObjectForKey:` 方法：\n\n```\n- (void) removeObjectForKey: (id) aKey;\n```\n\
  \n所以，如果我们想模拟一个轮胎掉下来，我们可以直接移除它：\n\n```\n[tires removeObjectForKey:@\"back-left\"\
  ];\n```\n\n就像 `NSArray` 一样，`NSMutableDictionary` 没有字面量语法。\n\n**使用但不要扩展**\n\n因为你富有创造力，你可能会想创建\
  \ `NSString`、`NSArray` 或 `NSDictionary` 的子类。抵制住这种冲动。在某些语言中，你最终确实会通过子类化字符串和数组类来完成工作。但在\
  \ Cocoa 中，许多类实际上是作为**类集群**实现的，这是一系列隐藏在通用接口背后的特定于实现的类。当你创建一个 `NSString` 对象时，你最终得到的可能是一个\
  \ `NSLiteralString`、`NSCFString`、`NSSimpleCString`、`NSBallOfString` 或任何数量的未文档化的实现细节对象。\n\
  \n作为 `NSString` 或 `NSArray` 的用户，你不必关心底层使用的是哪个类。但是，尝试对类集群进行子类化是一件充满痛苦和挫败感的事情。与其子类化，通常你可以通过将\
  \ `NSString` 或 `NSArray` 组合到你的一个类中，或者使用类别（如第 12 章所述）来解决此类编程问题。\n\n**家族价值观**\n\n\
  `NSArray` 和 `NSDictionary` 只持有对象。它们不能直接包含任何原始类型，比如 `int`、`float` 或 `struct`。但是你可以使用嵌入了原始值的对象。例如，将一个\
  \ `int` 放入一个对象，然后将该对象放入 `NSArray` 或 `NSDictionary`。\n\n如果你想要为基本类型使用对象，你可以使用 `NSInteger`\
  \ 和 `NSUInteger`。这些类型也统一了 32 位和 64 位处理器的值。\n\n**NSNumber**\n\nCocoa 提供了一个名为 `NSNumber`\
  \ 的类，它**包装**（即，作为对象实现）原始数字类型。你可以使用这些类方法创建一个新的 `NSNumber`：\n\n```\n+ (NSNumber *)\
  \ numberWithChar: (char) value;\n+ (NSNumber *) numberWithInt: (int) value;\n+ (NSNumber\
  \ *) numberWithFloat: (float) value;\n+ (NSNumber *) numberWithBool: (BOOL) value;\n\
  ```\n\n还有更多这样的创建方法，包括无符号版本以及 `long` 和 `long long` 整数的变体，但这些是最常见的。\n\n你也可以使用字面量语法来创建这些对象：\n\
  \n```\nNSNumber *number;\nnumber = @'X';          // char\nnumber = @12345;    \
  \    // integer\nnumber = @12345ul;      // unsigned long\nnumber = @12345ll;  \
  \    // long long\nnumber = @123.45f;      // float\nnumber = @123.45;       //\
  \ double\nnumber = @YES;          // BOOL\n```\n\n创建 `NSNumber` 后，你可以将其放入字典或数组中：\n\
  \n```\nNSNumber *number = @42;\n[array addObject: number];\n[dictionary setObject:\
  \ number forKey: @\"Bork\"];\n```\n\n一旦你将原始类型包装在 `NSNumber` 中，你可以使用以下实例方法之一将其取出：\n\
  \n```\n- (char) charValue;\n- (int) intValue;\n- (float) floatValue;\n- (BOOL) boolValue;\n\
  - (NSString *)stringValue;\n```\n\n混合使用创建和提取方法完全没问题。例如，使用 `numberWithFloat:` 创建\
  \ `NSNumber` 并使用 `intValue` 获取值是可以的。`NSNumber` 会为你进行适当的转换。\n\n**注意**：将原始类型包装在对象中的过程通常称为装箱，而将原始类型取出称为拆箱。某些语言具有自动装箱功能，可以自动将原始类型转换为其对应的包装类型，反之亦然。Objective-C\
  \ 不支持自动装箱。\n\n**NSValue**\n\n`NSNumber` 实际上是 `NSValue` 的一个子类，后者包装任意值。你可以使用 `NSValue`\
  \ 将结构体放入 `NSArray` 和 `NSDictionary` 对象中。使用以下类方法创建一个新的 `NSValue`：\n\n```\n+ (NSValue\
  \ *) valueWithBytes: (const void *) value objCType: (const char *) type;\n```\n\n\
  你传入要包装的值的地址（例如 `NSSize` 或你自己的 `struct`）。通常，你获取你想保存的变量的地址（使用 C 语言的 `&` 运算符）。你还需要提供一个描述类型的字符串，通常是通过报告结构体中条目的类型和大小。你实际上不需要自己编写代码来构建这个字符串。有一个名为\
  \ `@encode` 的编译器指令，它接受一个类型名称并为你生成正确的魔法字符串。因此，要将 `NSRect` 放入 `NSArray`，你需要这样做：\n\n\
  ```\nNSRect rect = NSMakeRect (1, 2, 30, 40);\n```\n\n\n```objectivec\nNSValue *value\
  \ = [NSValue valueWithBytes:&rect objCType:@encode(NSRect)];\n[array addObject:value];\n\
  ```\n\n你可以使用 `getValue:` 来提取这个值：\n\n```objectivec\n- (void)getValue:(void *)buffer;\n\
  ```\n\n当你调用 `getValue:` 时，需要传入一个你希望用来保存该值的变量的地址：\n\n```objectivec\nvalue = [array\
  \ objectAtIndex: 0];\n[value getValue: &rect];\n```\n\n**注意：**在 `getValue:` 示例中，你可以看到方法名称中使用了\
  \ `get`，这表示我们提供了一个指针作为存储方法所生成值的位置。\n\n苹果提供了便捷方法用于将常用的 Cocoa 结构体放入 `NSValues` 中，我们在这里方便地列出了它们：\n\
  \n```objectivec\n+ (NSValue *)valueWithPoint:(NSPoint)aPoint;\n+ (NSValue *)valueWithSize:(NSSize)size;\n\
  + (NSValue *)valueWithRect:(NSRect)rect;\n- (NSPoint)pointValue;\n- (NSSize)sizeValue;\n\
  - (NSRect)rectValue;\n```\n\n要在 `NSArray` 中存储和检索一个 `NSRect`，你可以这样做：\n\n```objectivec\n\
  value = [NSValue valueWithRect:rect];\n[array addObject: value];\n…\nNSRect anotherRect\
  \ = [value rectValue];\n```\n\n## NSNull\n\n我们之前告诉过你，不能将 `nil` 放入集合中，因为 `nil` 对\
  \ `NSArray` 和 `NSDictionary` 有特殊含义。但有时，你确实需要存储一个表示“这里根本没有东西”的值。例如，假设你有一个字典用于存储某人的联系信息，并且你使用键\
  \ `@\"home fax machine\"` 来存储用户的家庭传真号码。如果该键保存了一个电话号码值，那么你就知道这个人有传真机。但是，如果字典中没有这个值，这意味着这个人没有家庭传真机，还是你不知道他是否有传真机呢？\n\
  \n通过使用 `NSNull`，你可以消除这种歧义。你可以决定，对于键 `@\"home fax machine\"`，如果其值为 `NSNull`，则表示此人肯定没有传真机；如果该键没有值，则表示你不知道这个人是否有传真机。\n\
  \n`NSNull` 可能是所有 Cocoa 类中最简单的。它只有一个方法：\n\n```objectivec\n+ (NSNull *) null;\n```\n\
  \n你可以像这样将它添加到集合中：\n\n```objectivec\n[contact setObject: [NSNull null]\n        \
  \    forKey: @\"home fax machine\"];\n```\n\n你可以像这样访问它：\n\n```objectivec\nid homefax\
  \ = [contact objectForKey: @\"home fax machine\"];\nif (homefax == [NSNull null])\n\
  {\n    // … 没有传真机，真遗憾。\n}\n```\n\n`[NSNull null]` 总是返回相同的值，因此你可以使用 `==` 将其与其他值进行比较。\n\
  \n## 示例：查找文件\n\n好了，理论性的闲扯到此为止。下面是一个实际可运行的程序，它使用了本章中介绍的一些类。`FileWalker`（位于 *08-01\
  \ FileWalker 项目* 文件夹中）将遍历你 Mac 的主目录，查找 `*.jpg*` 文件，并打印出找到的文件列表。我们承认，这并不十分令人兴奋，但它确实能干点实事。\n\
  \n`FileWalker` 使用了 `NSString`、`NSArray`、`NSEnumerator` 以及另外两个 Foundation 类来与文件系统交互。\n\
  \n我们的示例还使用了 `NSFileManager`。`NSFileManager` 类让你可以对文件系统进行操作，比如创建目录、删除文件、移动文件以及获取文件信息。在这个示例中，我们将请求\
  \ `NSFileManager` 为我们创建一个 `NSDirectoryEnumerator`，我们将用它来遍历文件层次结构。\n\n整个程序都位于 `main()`\
  \ 函数中，因为我们没有创建任何自己的类。以下是完整的 `main()` 函数：\n\n```objectivec\nint main (int argc, const\
  \ char * argv[])\n{\n    @autoreleasepool\n    {\n        NSFileManager *manager;\n\
  \        manager = [NSFileManager defaultManager];\n        \n        NSString *home;\n\
  \        home = [@\"~\" stringByExpandingTildeInPath];\n        \n        NSDirectoryEnumerator\
  \ *direnum;\n        direnum = [manager enumeratorAtPath:home];\n        \n    \
  \    NSMutableArray *files;\n        files = [NSMutableArray arrayWithCapacity:42];\n\
  \        \n        NSString *filename;\n        while (filename = [direnum nextObject])\n\
  \        {\n            if ([[filename pathExtension] isEqualTo: @\"jpg\"]) {\n\
  \                [files addObject: filename];\n            }\n        }\n      \
  \  \n        NSEnumerator *fileenum;\n        fileenum = [files objectEnumerator];\n\
  \        while (filename = [fileenum nextObject])\n        {\n            NSLog\
  \ (@\"%@\", filename);\n        }\n    }\n    return 0;\n} // main\n```\n\n现在，让我们逐段拆解这个程序。顶部是\
  \ `@autoreleasepool` 样板代码（详见第 9 章）。\n\n下一步是获取一个 `NSFileManager` 来使用。`NSFileManager`\
  \ 有一个名为 `defaultManager` 的类方法，它为我们提供了一个专属的 `NSFileManager` 对象：\n\n```objectivec\n\
  NSFileManager *manager = [NSFileManager defaultManager];\n```\n\n这是 Cocoa 中一种常见的惯用法。有许多类采用了**单例架构**：我们只需要一个实例。你确实只需要一个文件管理器、一个字体管理器或一个图形上下文。这些类提供一个类方法，让你可以访问一个单一的、共享的对象，然后你使用这个对象来完成工作。\n\
  \n在这个例子中，我们需要一个目录迭代器。但在我们向文件管理器请求一个目录迭代器之前，我们必须确定从文件系统的哪个位置开始查找文件。从硬盘的顶层开始查找可能会花费很长时间，所以让我们只查看你的主目录。\n\
  \n我们如何指定这个目录呢？我们可以使用绝对路径，比如 `/Users/wmalik/`，但这有一个限制：它只在你的主目录名为 `wmalik` 时有效。幸运的是，Unix（以及\
  \ OS X）有一个表示主目录的简写字符，即 `~`（也称为*波浪号*）。是的，即使你不是在输入西班牙语，这个字符也确实有用处。`~/Documents` 代表*文档*目录，而在\
  \ Waqar 的机器上，`~/junk/oopack.txt` 则对应 `/Users/wmalik/junk/oopack.txt`。`NSString`\
  \ 有一个方法可以接收波浪号并将其展开。该方法用在接下来的两行代码中：\n\n```objectivec\nNSString *home = [@\"~\" stringByExpandingTildeInPath];\n\
  ```\n\n`stringByExpandingTildeInPath` 将 `~` 替换为当前用户的主目录。在 Waqar 的机器上，`home` 的值为\
  \ `/Users/wmalik`。接下来，我们将这个路径字符串传递给文件管理器：\n\n```objectivec\nNSDirectoryEnumerator\
  \ *direnum = [manager enumeratorAtPath: home];\n```\n\n`enumeratorAtPath:` 返回一个\
  \ `NSDirectoryEnumerator`，它是 `NSEnumerator` 的子类。每次你在这个枚举器对象上调用 `nextObject`，它都会返回该目录中另一个文件的路径。这个方法也会深入到子目录中。当迭代循环结束时，你将获得主目录中每个文件的路径。`NSDirectoryEnumerator`\
  \ 还提供了一些额外的功能，例如获取每个文件的属性字典，但我们在这里不会用到这些。\n\n因为我们正在查找 `*.jpg*` 文件（即路径名以 `.jpg` 结尾的文件），并且我们要打印它们的名称，所以我们需要一个地方来存储这些名称。我们可以在枚举过程中直接用\
  \ `NSLog()` 记录它们，但将来，我们可能希望在程序的其他位置对所有文件执行某些操作。`NSMutableArray` 在这里是一个绝佳的选择。我们将创建一个可变数组，并将匹配的路径添加到其中：\n\
  \n```objectivec\nNSMutableArray *files = [NSMutableArray arrayWithCapacity:42];\n\
  ```\n\n我们不知道实际会找到多少个 `*.jpg*` 文件，所以我们随便选了 42 —— 嗯，你知道为什么的。而且因为容量并不是对数组大小的永久限制，所以无论如何我们都没问题。\n\
  \n最后，我们进入了程序的核心部分。其他所有内容都已设置好，现在是时候进入循环了：\n\n```objectivec\nNSString *filename;\n\
  while (filename = [direnum nextObject]) {\n```\n\n目录枚举器返回一个 `NSString`，其中包含它所指向文件的路径。并且，与\
  \ `NSEnumerator` 一样，当遍历完成时，它会返回 `nil`，这将在没有其他事情可做时停止循环。\n\n`NSString` 提供了许多用于处理路径名和文件名的便捷工具。例如，`pathExtension`\
  \ 方法会返回文件的扩展名（不包含前面的点）。因此，对名为 `oopack.txt` 的文件调用 `pathExtension` 将返回 `@\"txt\"`，而对\
  \ `VikkiCat.jpg` 调用 `pathExtension` 将返回 `@\"jpg\"`。\n\n\n我们通过嵌套方法调用来获取路径扩展名，并将该字符串发送`isEqualTo:`消息。如果该调用返回`YES`，则将文件名添加到文件数组中，如下所示：\n\
  \n```\nif ([[filename pathExtension] isEqualTo: @\"jpg\"])\n{\n    [files addObject:\
  \ filename];\n}\n```\n\n目录循环结束后，枚举`files`数组，并使用`NSLog()`打印其内容：\n\n```\nNSEnumerator\
  \ *fileenum = [files objectEnumerator];\nwhile (filename = [fileenum nextObject])\n\
  {\n    NSLog (@\"%@\", filename);\n}\n```\n\n接着，我们让`main()`返回`0`以表示成功退出：\n\n```\n\
  return (0);\n} // main\n```\n\n以下是在 Waqar 机器上示例运行的开头部分：\n\n```\ncocoaheads/DSCN0798.jpg\n\
  cocoaheads/DSCN0804.jpg\ncow.jpg\nDevelopment/Borkware/BorkSort/cant-open-file.jpg\n\
  Development/Borkware/BSL/BWLog/accident.jpg\n```\n\n它生效了！不过可能需花一些时间才能显示结果，因为它可能需要遍历成千上万张图片才能完成工作。\n\
  \n## 在“小心猎豹”警示牌背后\n\n`FileWalker`使用了经典的迭代风格。项目*08.02 FileWalkerPro*展示了如何使用快速枚举实现这些功能。快速枚举语法的一个绝妙特性是，你可以向其传入一个已存在的`NSEnumerator`或其子类。而`NSDirectoryEnumerator`恰好是`NSEnumerator`的子类，因此我们可以愉快地将`-enumeratorAtPath:`的结果传递给快速枚举：\n\
  \n```\nint main (int argc, const char * argv[])\n{\n    @autoreleasepool\n    {\n\
  \        NSFileManager *manager;\n        manager = [NSFileManager defaultManager];\n\
  \        NSString *home;\n        home = [@\"~\" stringByExpandingTildeInPath];\n\
  \        NSMutableArray *files;\n        files = [NSMutableArray arrayWithCapacity:\
  \ 42];\n        for(NSString *filename in [manager enumeratorAtPath:home])\n   \
  \     {\n            if([[filename pathExtension] isEqualTo:@\"jpg\"])\n       \
  \     {\n                [files addObject:filename];\n            }\n        }\n\
  \        for(NSString *filename in files)\n        {\n            NSLog (@\"%@\"\
  , filename);\n        }\n    }\n    return 0;\n} // main\n```\n\n如你所见，这个版本比之前的更简单：我们去掉了两个枚举器变量及其相关的支持代码。\n\
  \n## 本章小结\n\n本章我们涵盖了大量内容！我们介绍了三种新的语言特性：类方法（即由类本身而非特定实例处理的方法）、用于需要 C 类型描述的方法的`@encode()`指令，以及快速枚举。\n\
  \n我们研究了一些有用的 Cocoa 类，包括`NSString`、`NSArray`和`NSDictionary`。`NSString`用于存储人类可读的文本，而`NSArray`和`NSDictionary`则用于存储对象的集合。这些对象是不可变的：创建后不能改变。Cocoa\
  \ 还提供了这些类的可变版本，允许你随意修改其内容。\n\n尽管我们付出了诸多努力（也尽管本章篇幅很长），我们对 Cocoa 中数百个不同类的探讨仍只是触及皮毛。你可以通过深入研究并学习更多这些类来获得乐趣，并变得更聪明。\n\
  \n最后，我们运用所学的类遍历了我们的主目录，寻找酷炫的图片。\n\n在下一章中，我们将深入探讨内存管理的奥秘，并学习如何在进行某些“破坏”后清理善后。\n\n\
  # 第 9 章\n\n## 内存管理\n\n接下来我们要处理的是使用 Objective-C 和 Cocoa 进行内存管理（美味！）。内存管理是编程中一个更普遍问题的一部分，称为**资源管理**。每台计算机系统为程序提供的资源都是有限的，包括内存、打开的文件和网络连接。如果你使用了一个资源，比如打开了一个文件，就需要自己进行清理（这种情况下就是关闭文件）。如果你持续打开文件却从不关闭，最终会耗尽文件容量。想想你的公共图书馆。如果每个人都借书却从不归还，图书馆最终会因为无书可借而关门，大家都会很伤心。谁都不想这样。\n\
  \n当然，当程序结束时，操作系统会回收它使用的资源。但只要你程序在运行，它就会使用资源，如果你不保持清洁，某些资源最终会被耗尽，程序很可能会崩溃。而且随着操作系统的发展，“程序何时真正结束”这一概念变得越来越模糊。\n\
  \n并非所有程序都使用文件或网络连接，但所有程序都使用内存。与内存相关的错误是所有使用 C 风格语言的程序员的噩梦。我们那些使用 Java 和脚本语言的朋友们则轻松得多：内存管理对他们来说是自动进行的，就像父母替他们打扫房间一样。而我们，则必须确保在需要时分配内存，并在使用完毕后释放内存。如果只分配不释放，就会**内存泄漏**：程序的内存消耗会不断增长，直到内存耗尽，然后程序崩溃。我们同样需要小心，不要在释放内存后继续使用它。我们可能会用到过时的数据，这会导致各种错误，或者可能有其他东西占用了那块内存，进而破坏新数据。\n\
  \n> **注** 内存管理是一个难题。Cocoa 的解决方案相当优雅，但确实需要花些时间来理解。即使是拥有数十年经验的程序员，初次接触这些内容时也会遇到问题，所以如果它让你一时感到困惑，不必担心。\n\
  \n## 对象的生命周期\n\n就像现实世界中的鸟儿和蜜蜂一样，程序中的对象也有生命周期。它们出生（通过`alloc`或`new`）；存活（接收消息并执行操作）、结交朋友（通过组合和方法参数），最终在生命结束时消亡（被释放）。当消亡发生时，它们的原材料（内存）被回收，用于下一代。\n\
  \n## 引用计数\n\n现在，对象的诞生显而易见，我们也讨论了很多关于如何使用对象的问题，但我们如何知道一个对象的有用生命何时结束？Cocoa 使用一种称为**引用计数**的技术，有时也称为**保留计数**。每个对象都关联一个整数，称为其**引用计数**或**保留计数**。当某段代码对一个对象感兴趣时，该代码会增加对象的保留计数，表示“我对这个对象感兴趣”。当该代码使用完对象时，它会减少保留计数，表示它已对该对象失去兴趣。当保留计数变为\
  \ 0 时，没有人再关心这个对象了（可怜的对象！），因此它被销毁，其内存返回给系统以供重用。\n\n当对象通过`alloc`或`new`创建，或通过`copy`消息（复制接收对象）创建时，对象的保留计数被设为\
  \ 1。要增加其保留计数，可以向对象发送`retain`消息。要减少其保留计数，可以向对象发送`release`消息。\n\n当对象因其保留计数达到 0 而即将被销毁时，Objective-C\
  \ 会自动向对象发送`dealloc`消息。你可以在自己的对象中重写`dealloc`，以便释放你可能分配的任何相关资源。切勿直接调用`dealloc`。你可以相信\
  \ Objective-C 会在需要销毁对象时调用你的`dealloc`方法。\n\n要查找当前的保留计数，发送`retainCount`消息。以下是`retain`、`release`和`retainCount`的方法签名：\n\
  \n```\n- (id) retain;\n- (oneway void) release;\n- (NSUInteger) retainCount;\n```\n\
  \n`retain`调用返回一个`id`。这使你可以将`retain`调用与其他消息发送链接起来，先增加对象的保留计数，然后要求它执行一些工作。例如，`[[car\
  \ retain] setTire: tire atIndex: 2];`要求`car`提高其保留计数并执行`setTire:`动作。\n\n\n\n# RetainCount1\
  \ 项目详解\n\n本章的第一个项目是`RetainCount1`，位于*09.01 RetainCount-1*项目文件夹中。该程序创建了一个对象（`RetainTracker`），该对象在初始化时和释放时会调用`NSLog()`：\n\
  \n```objc\n@interface RetainTracker : NSObject\n\n@end // RetainTracker\n\n@implementation\
  \ RetainTracker\n\n- (id) init\n{\n    if (self = [super init]) {\n        NSLog\
  \ (@\"init: Retain count of %d.\", [self retainCount]);\n    }\n    return (self);\n\
  } // init\n\n- (void) dealloc\n{\n    NSLog (@\"dealloc called. Bye Bye.\");\n \
  \   [super dealloc];\n} // dealloc\n\n@end // RetainTracker\n```\n\n`init`方法遵循标准的\
  \ Cocoa 对象初始化习惯用法，我们将在下一章探讨。如前所述，当对象的引用计数达到 0 时，系统会自动发送`dealloc`消息（并因此调用`dealloc`方法）。我们的`init`和`dealloc`版本使用`NSLog()`来输出一条消息，表明它们已被调用。\n\
  \n在`main()`中创建了一个新的`RetainTracker`对象，并由该类定义的两个方法间接调用。当创建新的`RetainTracker`时，会发送`retain`和`release`消息来增加和减少引用计数，而我们通过`NSLog()`来观察这一过程：\n\
  \n```objc\nint main (int argc, const char *argv[])\n{\n    RetainTracker *tracker\
  \ = [RetainTracker new];\n    // count: 1\n\n    [tracker retain];    // count:\
  \ 2\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker retain];    //\
  \ count: 3\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker release];\
  \   // count: 2\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker release];\
  \   // count: 1\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker retain];\
  \    // count 2\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker release];\
  \   // count 1\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker release];\
  \   // count: 0, dealloc it\n    return (0);\n} // main\n```\n\n当然，在实际编程中，你不会像这样在单个函数中执行多次`retain`和`release`操作。在对象的生命周期中，可能会从程序的不同地方看到类似的`retain`和`release`模式。运行程序可查看引用计数：\n\
  \n```\ninit: Retain count of 1.\ndealloc called. Bye Bye.\n```\n\n因此，如果你对对象调用了`alloc`、`new`或`copy`，只需释放它即可使其消失并回收内存。\n\
  \n## 对象所有权\n\n“等等，”你可能会想，“你不是说这很难吗？这有什么大不了的？你创建一个对象，使用它，释放它，内存管理就万事大吉了。听起来并不复杂。”当你引入**对象所有权**的概念时，事情会变得更加复杂。当某物“拥有一个对象”时，该物负责确保该对象得到清理。\n\
  \n拥有指向其他对象的实例变量的对象被称为**拥有**那些其他对象。例如，在`CarParts`中，一辆汽车拥有它指向的引擎和轮胎。类似地，创建对象的函数被认为拥有该对象。在`CarParts`中，`main()`创建了一个新的汽车对象，因此`main()`被认为拥有该汽车。\n\
  \n当多个实体拥有同一个对象时，就会出现复杂情况，这就是引用计数可能大于 1 的原因。在`RetainCount1`程序中，`main()`拥有`RetainTracker`对象，因此`main()`负责清理该对象。\n\
  \n回顾`Car`的引擎设置方法：\n\n```objc\n- (void) setEngine: (Engine *) newEngine;\n```\n\n\
  以及它是如何从`main()`中调用的：\n\n```objc\nEngine *engine = [Engine new];\n[car setEngine:\
  \ engine];\n```\n\n现在谁拥有这个引擎？是`main()`还是`Car`？谁负责确保在引擎不再有用时向其发送`release`消息？不能是`main()`，因为`Car`正在使用引擎。也不能是`Car`，因为`main()`稍后可能还会使用引擎。\n\
  \n诀窍是让`Car`保留引擎，将其引用计数增加到 2。这很合理，因为两个实体（`Car`和`main()`）现在都在使用引擎。`Car`应该在`setEngine:`内部保留引擎，而`main()`应该释放引擎。然后`Car`在完成使用引擎时（在其`dealloc`方法中）释放引擎，引擎的资源就会被回收。\n\
  \n\n\n## 存取器中的保留与释放\n\n初次尝试编写一个具备内存管理意识的 `setEngine` 方法可能如下所示：\n\n```\n- (void)\
  \ setEngine: (Engine *) newEngine\n{\n    engine = [newEngine retain];\n    // 错误代码：请勿模仿。下方为修正版本。\n\
  } // setEngine\n```\n\n遗憾的是，这还远远不够。想象一下在 `main()` 中发生如下调用序列：\n\n```\nEngine *engine1\
  \ = [Engine new];       // 计数：1\n[car setEngine: engine1];             // 计数：2\n\
  [engine1 release];                    // 计数：1\nEngine *engine2 = [Engine new]; \
  \      // 计数：1\n[car setEngine: engine2];             // 计数：2\n```\n\n糟糕！现在 `engine1`\
  \ 出了问题：它的保留计数仍为 1。`main()` 已经释放了对 `engine1` 的引用，但 `Car` 从未释放它。此时我们泄露了 `engine1`，而泄露的引擎从来都不是好事。第一个引擎对象将闲置并消耗一块内存。\n\
  \n下面是编写 `setEngine:` 的另一种尝试：\n\n```\n- (void) setEngine: (Engine *) newEngine\n\
  {\n    [engine release];\n    engine = [newEngine retain];\n    // 更多错误代码：请勿模仿。下方为修正版本。\n\
  } // setEngine\n```\n\n这修复了之前你看到的 `engine1` 泄露问题。但当 `newEngine` 与旧引擎是同一个对象时，它就会崩溃。考虑这种情况：\n\
  \n```\nEngine *engine = [Engine new];        // 计数：1\nCar *car1 = [Car new];\nCar\
  \ *car2 = [Car new];\n[car1 setEngine: engine];             // 计数：2\n[engine release];\
  \                     // 计数：1\n[car2 setEngine: [car1 engine]];      // 糟糕！\n```\n\
  \n为什么这是个问题？下面是实际发生的事情。`[car1 engine]` 返回一个指向 `engine` 的指针，其保留计数为 1。`setEngine` 的第一行是\
  \ `[engine release]`，这使保留计数变为 0，对象被释放。现在，`newEngine` 和 `engine` 实例变量都指向已释放的内存，这很糟糕。以下是编写\
  \ `setEngine` 的更好方法：\n\n```\n- (void) setEngine: (Engine *) newEngine\n{\n    [newEngine\
  \ retain];\n    [engine release];\n    engine = newEngine;\n} // setEngine\n```\n\
  \n如果你先保留新引擎，且 `newEngine` 与 `engine` 是同一个对象，保留计数会增加并立即减少。但计数不会降到 0，引擎也不会意外销毁——而这正是糟糕的情况。在你的存取器中，如果你在释放旧对象之前保留新对象，就会是安全的。\n\
  \n**注意**：关于如何编写正确的存取器存在不同的学派，各种邮件列表上会定期爆发争论和口水战。“存取器中的保留与释放”部分展示的技术效果良好且（某种程度上）易于理解，但如果看到其他人的代码中使用不同的存取器管理技术，也无需惊讶。\n\
  \n## 自动释放\n\n正如我们在编写设置器方法时遇到的一些微妙之处所看到的，内存管理可能是一个棘手的问题。现在我们需要研究另一个难题。你知道对象在用完后需要被释放。在某些情况下，判断何时用完一个对象并不那么简单。考虑一个\
  \ `description` 方法，它返回一个描述对象的 `NSString`：\n\n```\n- (NSString *) description\n{\n\
  \    NSString *description;\n    description = [[NSString alloc]\n        initWithFormat:\
  \ @\"我今年 %d 岁\", 4];\n    return (description);\n} // description\n```\n\n这里我们使用\
  \ `alloc` 创建了一个新的字符串实例，其保留计数为 1，然后返回它。谁负责清理这个字符串对象？\n\n不可能是 `description` 方法本身。如果在返回描述字符串之前释放它，保留计数变为\
  \ 0，对象立即被销毁。\n\n使用该描述字符串的代码可以将字符串保存在一个变量中，然后在用完后释放它，但这会使描述的使用变得极其不便。本应是一行代码的事情变成了三行：\n\
  \n```\nNSString *desc = [someObject description];\nNSLog (@\"%@\", desc);\n[desc\
  \ release];\n```\n\n一定有更好的办法。幸运的是，确实有！\n\n### 都到池子里来！\n\nCocoa 具有**自动释放池**的概念。你可能已经见过\
  \ Xcode 生成的样板代码中的 `@autoreleasepool` 或 `NSAutoreleasePool`。现在来看看这究竟是怎么回事。\n\n名称提供了很好的线索。它是一个存放东西（应该是对象）的池子，并且会自动被释放。\n\
  \n`NSObject` 提供了一个名为 `autorelease` 的方法：\n\n```\n- (id) autorelease;\n```\n\n这个方法安排在未来某个时间发送一条\
  \ `release` 消息。返回值是接收该消息的对象；`retain` 使用相同的技术，这使得方法调用可以轻松地链式组合。当你向一个对象发送 `autorelease`\
  \ 时，该对象实际上被添加到一个自动释放池中。当该池被销毁时，池中的所有对象都会收到一条 `release` 消息。\n\n**注意**：自动释放的概念中并没有魔法。你可以使用\
  \ `NSMutableArray` 来持有对象，并在 `dealloc` 方法中向所有这些对象发送 `release` 消息来编写你自己的自动释放池。但没有必要重新发明轮子——苹果已经为你完成了这项艰巨的工作。\n\
  \n我们现在可以编写一个正确处理内存管理的 `description` 方法：\n\n```\n- (NSString *) description\n{\n\
  \    NSString *description;\n    description = [[NSString alloc]\n        initWithFormat:\
  \ @\"我今年 %d 岁\", 4];\n    return ([description autorelease]);\n} // description\n\
  ```\n\n这样你就可以编写如下代码：\n\n```\nNSLog (@\"%@\", [someObject description]);\n```\n\n\
  现在，内存管理运行得非常正确，因为 `description` 方法创建了一个新字符串，将其自动释放，并返回给 `NSLog()` 使用。由于该描述字符串被自动释放，它已被放入当前活动的自动释放池中，并且在稍后执行\
  \ `NSLog()` 的代码运行完毕后，该池将被销毁。\n\n### 毁灭前夕\n\n自动释放池何时会被销毁，以便向其中包含的所有对象发送 `release`\
  \ 消息？或者说，池子最初何时被创建？有两种方法可以创建自动释放池。\n\n- 使用 `@autoreleasepool` 语言关键字。\n- 使用 `NSAutoreleasePool`\
  \ 对象。\n\n在我们一直在使用的 Foundation 工具中，池的创建和销毁是通过语言关键字完成的。因此，当你使用 `@autoreleasepool {}`\
  \ 时，花括号之间的所有代码都被放入这个新池中。如果你的计算非常占用内存，你可以嵌套自动释放池。\n\n需要记住的一点是，在花括号内定义的任何变量在花括号外都是不可见的；与循环一样，遵循标准的\
  \ C 作用域规则。\n\n第二种更显式的方法是使用 `NSAutoreleasePool` 对象。当你这样做时，`new` 和 `release` 之间的代码将使用这个新池。\n\
  \n```\nNSAutoreleasePool *pool;\npool = [NSAutoreleasePool new];\n…\n[pool release];\n\
  ```\n\n当你创建一个自动释放池时，它会自动成为活动池。当你释放该池时，它的保留计数变为 0，因此它会被释放。在释放过程中，该池会释放其所有对象。\n\n\
  那么你应该使用哪种方法呢？使用关键字方法。它比对象方法更快，因为语言比我们更了解如何创建和销毁内存。\n\n当你使用 AppKit 时，Cocoa 会定期自动为你创建和销毁自动释放池。它会在程序处理完当前事件（如鼠标点击或按键）后执行此操作。你可以随意使用任意数量的自动释放对象，每当用户执行操作时，池就会自动为你清理它们。\n\
  \n\n\n**注意** 你可能会在 Xcode 自动生成的代码中看到另一种销毁自动释放池对象的方法：`-drain` 方法。该方法会清空池中的对象，但不会销毁池本身。`-drain`\
  \ 适用于 Mac OS X 10.4 (Tiger) 及更高版本。在我们自己编写的代码（非 Xcode 生成）中，我们将使用 `-release`，以此演示如何支持旧版\
  \ OS X。\n\n## 池的实际运作\n\n`RetainCount2` 展示了自动释放池的工作原理。该程序位于 `09-02 RetainCount-2`\
  \ 项目文件夹中。此程序使用了我们在 `RetainCount1` 中构建的同一个 `RetainTracker` 类，该类会在 `RetainTracker`\
  \ 对象被初始化及被释放时通过 `NSLog()` 输出信息。为完整起见，我们将同时演示 `NSAutoreleasePool` 对象和 `@autoreleasepool`\
  \ 关键字的使用。\n\n`RetainCount2` 的 `main()` 函数如下所示：\n\n```\nint main (int argc, const\
  \ char *argv[])\n{\n    NSAutoreleasePool *pool;\n    pool = [[NSAutoreleasePool\
  \ alloc] init];\n    RetainTracker *tracker;\n    tracker = [RetainTracker new];\
  \ // 计数: 1\n    [tracker retain]; // 计数: 2\n    [tracker autorelease]; // 计数: 仍为\
  \ 2\n    [tracker release]; // 计数: 1\n    NSLog (@\"释放池\");\n    [pool release];\n\
  \    // 池被销毁，并向 tracker 发送 release 消息\n    \n    @autoreleasepool\n    {\n     \
  \   RetainTracker *tracker2;\n        tracker2 = [RetainTracker new]; // 计数: 1\n\
  \        [tracker2 retain]; // 计数: 2\n        [tracker2 autorelease]; // 计数: 仍为\
  \ 2\n        [tracker2 release]; // 计数: 1\n        NSLog (@\"自动释放池\");\n    }\n\
  \    return (0);\n} // main\n```\n\n首先，我们创建自动释放池：\n\n```\nNSAutoreleasePool *pool;\n\
  pool = [[NSAutoreleasePool alloc] init];\n```\n\n现在，每当我们向一个对象发送 `autorelease` 消息时，该对象就会进入这个池中：\n\
  \n```\nRetainTracker *tracker;\ntracker = [RetainTracker new]; // 计数: 1\n```\n\n\
  这里创建了一个新的 tracker。由于它是通过 `new` 消息创建的，因此其保留计数为 1：\n\n```\n[tracker retain]; // 计数:\
  \ 2\n```\n\n接下来，为了演示和趣味性，对其执行 retain 操作。对象的保留计数增加到 2：\n\n```\n[tracker autorelease];\
  \ // 计数: 仍为 2\n```\n\n然后对象被自动释放。其保留计数未改变：仍为 2。需要注意的是，之前创建的池现在持有对该对象的引用。当池销毁时，tracker\
  \ 对象会收到一条 `release` 消息。\n\n```\n[tracker release]; // 计数: 1\n```\n\n接着，我们释放它，以抵消之前使用的\
  \ `retain` 调用。对象的保留计数仍大于 0，因此它仍然存在：\n\n```\nNSLog (@\"释放池\");\n[pool release];\n\
  // 池被销毁，并向 tracker 发送 release 消息\n```\n\n现在，我们释放池。`NSAutoreleasePool` 是一个普通对象，遵循与其他对象相同的内存管理规则。由于我们通过\
  \ `alloc` 创建了池，其保留计数为 1。release 操作将其保留计数减至 0，因此池被销毁，并调用其 `dealloc` 方法。\n\n最后，`main`\
  \ 返回 0，表示一切正常：\n\n```\nreturn (0);\n} // main\n```\n\n你能猜出输出会是什么样吗？哪个会先出现：是释放池之前的\
  \ `NSLog()`，还是 `RetainTracker` 的 `dealloc` 方法中的 `NSLog`？\n\n`@autoreleasepool` 方法执行相同的操作，但省去了分配和销毁对象的麻烦。\n\
  \n以下是运行 `RetainCount2` 的输出：\n\n```\ninit: Retain count of 1.\nreleasing pool\ndealloc\
  \ called. Bye Bye.\ninit: Retain count of 1.\nauto releasing pool\ndealloc called.\
  \ Bye Bye.\n```\n\n正如你可能猜到的，释放池之前的 `NSLog()` 发生在 `RetainTracker` 的 `NSLog()` 之前。\n\
  \n## Cocoa 内存管理规则\n\n现在你已经看到了全部内容：`retain`、`release` 和 `autorelease`。Cocoa 有许多内存管理约定。这些规则非常简单，并且在工具包中始终如一地应用。\n\
  \n**注意** 忘记 Cocoa 的内存管理规则是一个常见错误，试图把它们搞得太复杂同样如此。如果你发现自己漫无目的地随意添加 `retain` 和 `release`，希望修复某个\
  \ bug，那你很可能对规则并不清楚。这意味着是时候慢下来、深呼吸，或许去吃点零食，然后重新阅读它们。\n\n以下是规则：\n\n-   当你使用 `new`、`alloc`\
  \ 或 `copy` 创建对象时，该对象的保留计数为 1。你有责任在使用完对象后向其发送 `release` 或 `autorelease` 消息。这样，当它的生命周期结束时，它就会被清理。\n\
  -   当你通过任何其他机制获取对象时，假设其保留计数为 1，并且已经自动释放。你无需做进一步的工作来确保它被清理。如果你打算长时间持有该对象，请对其进行 `retain`，并确保在完成后对其进行\
  \ `release`。\n-   如果你对某个对象执行了 `retain`，你（最终）需要对其执行 `release` 或 `autorelease`。保持这些\
  \ `retain` 和 `release` 的平衡。\n\n就是这样——只有三条规则。\n\n如果你记住这句口诀：“如果我通过 `new`、`alloc` 或\
  \ `copy` 得到它，我就必须 `release` 或 `autorelease` 它”，就会安全无误。\n\n每当你获取一个对象时，你必须注意两点：你是如何获取它的，以及你计划持有它多长时间（参见表\
  \ 9-1）。\n\n表 9-1 内存管理规则\n\n| 获取方式… | 临时使用 | 长期持有（长时间使用） |\n| --- | --- | --- |\n\
  | `new`、`alloc` 或 `copy` | 使用完毕时释放 | 在 `dealloc` 中释放 |\n| 任何其他方式 | 无需做任何操作 | 获取时\
  \ retain，在 `dealloc` 中 release |\n\n在接下来的章节中，我们将讨论对象的临时使用与长期使用的具体细节。\n\n## 临时对象\n\
  \n让我们看看一些常见的内存管理生命周期场景。第一种场景是，你在某些代码中临时使用一个对象，但不会长时间保留它。如果你通过 `new`、`alloc` 或 `copy`\
  \ 获取该对象，你需要安排它的销毁，通常通过 `release`：\n\n```\nNSMutableArray *array;\narray = [[NSMutableArray\
  \ alloc] init]; // 计数: 1\n// 使用数组\n[array release]; // 计数: 0\n```\n\n如果你通过任何其他机制获取对象，例如\
  \ `arrayWithCapacity:`，则无需担心销毁它：\n\n```\nNSMutableArray *array;\narray = [NSMutableArray\
  \ arrayWithCapacity: 17];\n// 计数: 1，已自动释放\n// 使用数组\n```\n\n`arrayWithCapacity:`\
  \ 不是 `alloc`、`new` 或 `copy`，因此你可以假设返回的对象保留计数为 1，并且已经自动释放。当自动释放池销毁时，`array` 会收到 `release`\
  \ 消息；其保留计数变为 0，其内存被回收。\n\n以下是一段使用 `NSColor` 的代码：\n\n```\nNSColor *color;\ncolor\
  \ = [NSColor blueColor];\n// 使用颜色\n```\n\n`blueColor` 不是 `alloc`、`new` 或 `copy`，因此你可以假设其保留计数为\
  \ 1，并且已自动释放。`blueColor` 返回一个全局**单例**对象——一个所有需要它的程序共享的单一对象——并且实际上永远不会被销毁，但你无需担心这些实现细节。你只需要知道，你*不*需要显式地\
  \ `release` color。\n\n## 持有对象\n\n通常情况下，你会希望让一个对象存在超过几行代码的时间。通常，你会将这些对象放入其他对象的实例变量中，添加到像\
  \ `NSArray` 或 `NSDictionary` 这样的集合中，或者（更为少见地）将其作为全局变量保留。\n\n如果你通过 `init`、`new` 或\
  \ `copy` 获取一个对象，则无需执行任何特殊操作。该对象的保留计数将为 1，因此它会一直存在。只需确保在该持有对象的拥有者的 `dealloc` 方法中释放该对象即可：\n\
  \n```\n- (void) doStuff\n{\n    // flonkArray 是一个实例变量\n    flonkArray = [NSMutableArray\
  \ new]; // 计数: 1\n} // doStuff\n\n- (void) dealloc\n{\n    [flonkArray release];\
  \ // 计数: 0\n    [super dealloc];\n} // dealloc\n```\n\n\n\n如果你从 `init`、`new` 或 `copy`\
  \ 之外的方法获取一个对象，需要记得 `retain` 它。当你在编写 GUI 应用程序时，要以事件循环（event loop）来思考。你需要 `retain`\
  \ 那些会存活超过当前事件循环的自动释放（autoreleased）对象。\n\n什么是事件循环？典型的图形用户界面（GUI）应用程序会花费大量时间等待用户操作。程序无所事事地等待，直到控制它的非常缓慢的人类决定点击鼠标或触碰屏幕。当这些事件之一发生时，程序被唤醒并开始工作，执行响应事件所需的任何操作。事件处理完毕后，应用程序再次进入休眠状态，等待下一个事件。为了保持程序的内存占用较低，Cocoa\
  \ 在开始处理事件前会创建一个自动释放池（autorelease pool），并在事件处理完毕后销毁该池。这会将累积的临时对象数量保持在最低限度。\n\n当使用自动释放对象时，之前的方法可以这样编写：\n\
  \n```\n- (void) doStuff\n{\n    // flonkArray 是一个实例变量\n    flonkArray = [NSMutableArray\
  \ arrayWithCapacity: 17];\n    // count: 1, autoreleased\n    [flonkArray retain];\
  \ // count: 2, 1 autorelease\n} // doStuff\n\n- (void) dealloc\n{\n    [flonkArray\
  \ release]; // count: 0\n    [super dealloc];\n} // dealloc\n```\n\n在当前事件循环结束时（如果是\
  \ GUI 程序）或当自动释放池被销毁时，`flonkArray` 会收到一条 `release` 消息，使其 retain 计数从 2 降至 1。由于计数仍大于\
  \ 0，对象得以继续存在。我们仍然需要在 `dealloc` 中释放该对象，以便它能被清理。如果我们在 `doStuff` 中没有调用 `retain`，`flonkArray`\
  \ 将意外地被销毁。\n\n请记住，自动释放池会在明确定义的时机被清空：当你自己的代码显式销毁它时，或者在使用 AppKit 时的事件循环结束时。你不必担心有一个恶魔会随机地销毁自动释放池。你也不必\
  \ `retain` 你使用的每一个对象，因为池不会在函数执行过程中突然消失。\n\n**保持池的清洁**：有时自动释放池的清空频率不如你所愿。以下是 Cocoa\
  \ 邮件列表中经常出现的一个问题：“我对我使用的所有对象都进行了自动释放，但我的程序内存增长到了极其庞大的水平。”这个问题通常是由类似下面的代码引起的：\n\n\
  ```\nint i;\nfor (i = 0; i < 1000000; i++) {\n    id object = [someArray objectAtIndex:\
  \ i];\n    NSString *desc = [object description];\n    // 对 description 做一些处理\n\
  }\n```\n\n这个程序运行着一个循环，每次迭代都会产生一个（或两三个）自动释放的对象。请记住，自动释放池只在明确定义的时机被清空，而这个循环的中间并不符合那些时机。在这个循环内部，创建了一百万个\
  \ `description` 字符串，它们都被放入当前的自动释放池中，因此我们有一百万个字符串在内存中。一旦池被销毁，这一百万个字符串最终会被释放，但在此之前它们会一直存在。\n\
  \n解决这个问题的方法是在循环内部创建你自己的自动释放池。这样，每循环一千次，你就可以销毁旧池并创建一个新池（如下所示，新增代码以粗体显示）：\n\n```\n\
  NSAutoreleasePool *pool;\npool = [[NSAutoreleasePool alloc] init];\nint i;\nfor\
  \ (i = 0; i < 1000000; i++) {\n    id object = [someArray objectAtIndex: i];\n \
  \   NSString *desc = [object description];\n    // 对 description 做一些处理\n    if (i\
  \ % 1000 == 0) {\n        [pool release];\n        pool = [[NSAutoreleasePool alloc]\
  \ init];\n    }\n}\n[pool release];\n```\n\n每循环一千次，旧池就被销毁，并创建一个新池。这样，同一时刻最多只有一千个\
  \ `description` 字符串存在，程序也能更轻松地运行。自动释放池的分配和销毁是相当廉价的操作，你甚至可以在每次循环迭代中都创建一个新池。\n\n\n\
  \n## 自动释放池\n\n`Autorelease`池以栈的形式维护：当你创建一个新的`autorelease`池时，它会被添加到栈顶。一条`autorelease`消息会将接收者放入最顶层的池中。如果你将一个对象放入池中，然后创建新池并销毁它，被自动释放的对象仍然存在，因为持有该对象的池依然存在。\n\
  \n`keyword`方法在这里不起作用，因为它必须使用花括号来平衡。\n\n## 清理废纸与垃圾\n\nObjective-C 2.0 引入了自动内存管理，也称为垃圾回收。熟悉\
  \ Java 或 Python 等语言的程序员对垃圾回收的概念非常了解。你只需创建和使用对象，然后，令人惊讶地，可以完全忘记它们。系统会自动判断哪些对象仍在使用，哪些可以被回收。启用垃圾回收非常容易，但这是一种选择性加入（opt-in）功能。只需进入项目信息窗口的构建设置（Build\
  \ Settings），并选择`Required [-fobjc-gc-only]`，如图 Figure 9-1 所示。\n\n![9781430241881_Fig09-01.tif](img/9781430241881_Fig09-01_fmt.jpg)\n\
  \n图 9-1. 启用垃圾回收\n\n**注意**：`-fobjc-gc`适用于同时支持垃圾回收和`retain/release`的代码，例如可在两种环境中使用的库代码。\n\
  \n当你启用垃圾回收时，常规的内存管理调用都会变成空操作指令；这不过是一种花哨的说法，表示它们什么也不做。\n\nObjective-C 的垃圾回收器是一个分代垃圾回收器。新创建的对象比那些已存在一段时间的对象更可能变成垃圾。在常规时间点，垃圾回收器会开始检查你的变量和对象，并追踪它们之间的指针。任何它发现没有指针指向的对象都是垃圾，适合被丢弃。你能做的最糟糕的事，就是保留一个指向你已经用完的对象的指针。因此，如果你在一个实例变量中指向一个对象（回忆一下组合的概念），请务必给该实例变量赋值`nil`，这将移除你对这个对象的引用，并让垃圾回收器知道它可以被清除。\n\
  \n与`autorelease`池类似，垃圾回收会在事件循环结束时触发。如果你不在 GUI 程序中，也可以自行触发垃圾回收，但这超出了我们这里要讨论的范围。\n\
  \n有了垃圾回收，你无需过多担心内存管理。当使用从`malloc`函数或 Core Foundation 对象获得的内存时，存在一些微妙的细节，但这些细节较为生僻，我们就不涉及了。现在，你只需创建对象，而无需担心释放它们。我们将在后续内容中继续讨论垃圾回收。\n\
  \n请注意，垃圾回收仅适用于 OS X 编程；你不能在 iOS 应用中使用它。事实上，在 iOS 编程中，苹果建议你避免在自己的代码中使用`autorelease`，同时也避免使用那些会返回自动释放对象的便捷方法。\n\
  \n通常，便捷方法是返回新对象的类方法。例如，对于`NSString`，所有以`stringWith`开头的方法都是便捷方法。\n\n## 自动引用计数\n\n\
  为什么 iOS 没有垃圾回收？反对在 iOS 中使用垃圾回收的主要理由是，你无法确切知道垃圾回收器何时会出现。就像在现实生活中，你可能知道垃圾会在星期一被收走，但永远不确定具体时间。如果你正准备出门时，垃圾车恰好到了怎么办？垃圾回收对移动设备的可用性影响很大，移动设备比电脑更具私密性，且通常资源远不如电脑丰富。用户可不想在系统清理内存时，游戏中断或电话暂停。\n\
  \n苹果的解决方案叫做`自动引用计数 (ARC)`。顾名思义，`ARC`会跟踪你的对象，并决定哪些是你想保留的，哪些不是。这有点像在你的内存管理中配备了一位管家或私人助理。当你使用`ARC`时，你像往常一样分配和使用对象，编译器会为你插入保留（retain）和释放（release）操作——你无需自己编写这些代码。\n\
  \n`ARC`*不是*垃圾回收器。正如我们已讨论过的，垃圾回收是在运行时通过定期运行代码并检查对象来完成工作的。相比之下，`ARC`在编译时完成其工作。它插入适当的保留和释放操作，因此内存管理的方式与编写良好的手动管理代码完全一致。只不过，内存管理不再由你来做，而是由编译器替你完成。程序运行时，保留和释放操作会按预期发生。系统并不知道也不关心这些命令是你插入的还是编译器插入的。\n\
  \n`ARC`是一项选择性加入（opt-in）功能，这意味着你必须明确地启用或禁用它。\n\n以下是编写`ARC`代码所需的组件：\n\n- Xcode 4.2+\n\
  - ![image](img/9781430241881_square_fmt.jpg) Apple LLVM 3.0+ 编译器（随 Xcode 提供）\n-\
  \ OS X 10.7+\n\n以下是运行你的代码所需的条件：\n\n- ![image](img/9781430241881_square_fmt.jpg)\
  \ iOS 4.0+ 或 OS X 10.6+（配备 64 位运行时）\n- ![image](img/9781430241881_square_fmt.jpg)\
  \ 零弱引用（Zeroing weak references）（稍后详述）需要 iOS 5.0+ 或 OS X 10.7+\n\n**注意**：`ARC`仅适用于可保留对象指针（ROPs）。有三种可保留对象指针：\n\
  \n1. 块指针\n2. Objective-C 对象指针\n3. 使用`__attribute__((NSObject))`标记的 typedefs\n\n\
  我们将在本章稍后部分详细讨论 ROPs，尤其是在描述 Xcode 的`ARC`转换工具时。\n\n所有其他指针类型，例如`char *`和 CF 对象（如`CFStringRef`），均与\
  \ ARC 不兼容。\n\n如果你使用不由`ARC`处理的指针，你需要自己管理它们。这没问题，因为`ARC`可以与手动管理的内存互操作。\n\n如果你想在代码中使用`ARC`，必须满足三个要求：\n\
  \n- ![image](img/9781430241881_square_fmt.jpg) 必须能够可靠地识别哪些对象需要被管理。\n- ![image](img/9781430241881_square_fmt.jpg)\
  \ 必须能够指明如何管理一个对象。\n- ![image](img/9781430241881_square_fmt.jpg) 必须有一种可靠的方式来传递对象的所有权。\n\
  \n让我们逐一处理这些要求。第一个要求意味着，作为对象集合的根级对象必须知道如何管理其子对象。例如，假设你有一个使用`malloc`创建的字符串数组：\n\n\
  ```\nNSString **myString;\nmyString = malloc(10 * sizeof(NSString *));\n```\n\n\
  这段代码创建了一个指向十个字符串的 C 数组。因为 C 数组是不可保留的，你无法在此结构上使用`ARC`。\n\n这就引出了第二个要求。这个要求通常意味着你必须能够增加和减少对象的保留计数，这基本上意味着任何派生自`NSObject`的对象都是可行的。这个类别涵盖了你需要管理的大部分对象。\n\
  \n第三个要求指出，在传递对象时，你的程序需要能够在调用者和被调用者之间传递对象的所有权——更多内容稍后介绍。\n\n面对所有这些限制，你可能会问自己，我真的有必要费心使用`ARC`吗？答案是：是的，绝对有必要！我们保证从长远来看，它能让你少受罪，节省时间。\n\
  \n## 有时候弱引用是好事\n\n\n\n正如本章前面所讨论的，当拥有一个指向对象的指针时，你可以管理其内存（通过`retain/release`），也可以仅指向它而不参与其内存管理。如果管理了对象的内存，则称为对该对象具有`强引用`。如果不管理其内存，则拥有（你猜对了）`弱引用`。例如，当在属性中使用`assign`属性时，你就是在创建一个`弱引用`。\n\
  \n为什么需要弱引用？因为它们有助于我们处理`保留环`。我们稍后将讨论这一点。\n\n假设有一个对象`A`，它由其他对象创建，其保留计数为 1（图 9-2）。对象`A`创建了一个子对象`B`，对象`B`的保留计数为\
  \ 1（参见图 9-3）。对象`B`需要访问其父对象；这在`Objective-C`程序中是非常常见的模式。\n\n![9781430241881_Fig09-02.eps](img/9781430241881_Fig09-02_fmt.jpg)\n\
  \n图 9-2. 对象`A`的保留计数为 1\n\n![9781430241881_Fig09-03.eps](img/9781430241881_Fig09-03_fmt.png)\n\
  \n图 9-3. 对象`B`（对象`A`的子对象）的保留计数也为 1\n\n在此示例中，对象`A`对对象`B`持有强引用，因为对象`A`创建了对象`B`。现在，如果对象`B`对对象`A`持有了强引用，则对象`A`的保留计数增加到\
  \ 2（参见图 9-4）。\n\n![9781430241881_Fig09-04.eps](img/9781430241881_Fig09-04_fmt.jpg)\n\
  \n图 9-4. 对象`B`对`A`持有强引用，对象`A`的保留计数增加\n\n万物皆有始终，最终，对象`A`的所有者不再需要它。所有者对对象`A`调用`release`，将其保留计数减至\
  \ 1。\n\n但是，由对象`A`创建的对象`B`拥有这 1 个保留计数。由于两个对象的保留计数都不为零，因此两者都不会被释放。这是一个典型的内存泄漏：程序无法访问这些对象，但它们仍然占用着内存（参见图\
  \ 9-5）。\n\n![9781430241881_Fig09-05.eps](img/9781430241881_Fig09-05_fmt.jpg)\n\n\
  图 9-5. 一个典型的内存泄漏\n\n为了解决这个问题，我们使用`弱引用`。我们使用`assign`来获取对象`B`对对象`A`的引用。通过弱引用，保留计数不会增加。因此，当对象`A`的所有者释放它时，其保留计数变为零，它释放`B`，然后`A`和`B`都释放它们宝贵的内存（参见图\
  \ 9-6）。完美！对吧？\n\n![9781430241881_Fig09-06.eps](img/9781430241881_Fig09-06_fmt.jpg)\n\
  \n图 9-6. 对象`B`对对象`A`持有弱引用\n\n更好了，但还不够完美。当涉及三个对象时（将它们称为对象`A`、`B`和`C`），最终可能出现对象`A`拥有并对对象`B`持有强引用，而对象`C`对对象`B`持有弱引用（参见图\
  \ 9-7）。\n\n![9781430241881_Fig09-07.eps](img/9781430241881_Fig09-07_fmt.jpg)\n\n\
  图 9-7. 两个对象引用`B`：一个强引用，一个弱引用\n\n如果对象`A`随后释放了对象`B`，对象`C`仍然持有对它的弱引用，但该引用已不再有效，使用它很可能会导致崩溃，因为该位置不再存在有效的对象（参见图\
  \ 9-8）。\n\n![9781430241881_Fig09-08.eps](img/9781430241881_Fig09-08_fmt.jpg)\n\n\
  图 9-8. 对象`C`仍然持有一个指向已释放对象的引用。这很糟糕\n\n解决方案是：那些能自动清理其弱引用的对象。这些特殊的弱引用被称为`归零弱引用`，因为当它们所指向的对象被释放时，它们会被设置为零（`nil`），并且可以像处理任何其他`nil`指针一样处理它们（参见图\
  \ 9-9）。归零弱引用仅适用于`iOS 5`或更高版本以及`OS X 10.7`或更高版本。\n\n![9781430241881_Fig09-09.eps](img/9781430241881_Fig09-09_fmt.jpg)\n\
  \n图 9-9. 对象`C`有一个归零弱引用，当不再有效时，它会转换为`nil`\n\n要使用归零弱引用，必须显式声明它们。有两种声明归零弱引用的方法：在声明变量时使用`__weak`关键字，或者在属性上使用`weak`属性：\n\
  \n`__weak NSString *myString;`\n\n`@property(weak) NSString *myString;`\n\n如果想在归零弱引用不可用的较旧系统上使用`ARC`，该怎么办？`Apple`提供了`__unsafe_unretained`关键字和`unsafe_unretained`属性，两者都告知`ARC`指定的引用是弱引用。\n\
  \n使用`ARC`时，需要注意一些命名限制：\n\n*   不能有名称以“new”开头的属性。例如，`@property NSString *newString`是不允许的。\n\
  *   不能有没有内存管理属性的只读属性。没有`ARC`，可以使用`@property (readonly) NSString *title`。但在启用`ARC`后，必须指定谁来管理内存，因此一个简单的修复方法是使用`unsafe_unretained`，因为默认的`assign`属性。\n\
  \n为了保持正交性，还有一个`__strong`关键字和`strong`属性。请记住，内存管理关键字和属性是互斥的。\n\n好的！我们现在准备将`CarParts`转换为使用`ARC`。完成转换后，你会注意到代码甚至比以前更少了。我们的格言，也是所有程序员的格言，就是“少即是多。”\n\
  \n一个新颖的转换方案\n\n`Xcode`提供了一个便捷的过程来将现有项目转换为`ARC`。在开始之前，我们必须确保未启用垃圾回收；垃圾回收和`ARC`不能混用。如果在不关闭垃圾回收的情况下尝试转换项目，你将看到一条警告，如图\
  \ 9-10 所示。\n\n![9781430241881_Fig09-10.tif](img/9781430241881_Fig09-10_fmt.jpg)\n\
  \n图 9-10. 在转换项目之前，必须关闭垃圾回收\n\n让我们逐步了解为某个目标关闭垃圾回收的过程。第一步是选择要禁用垃圾回收的目标。打开你的项目（如果尚未打开），在导航器中选择项目。在编辑器窗格中，你将看到项目编辑器，顶部是你的项目，下方是目标（参见图\
  \ 9-11）。\n\n![9781430241881_Fig09-11.tif](img/9781430241881_Fig09-11_fmt.jpg)\n\n\
  图 9-11. 在`Xcode`中打开你的项目\n\n现在，选择应禁用垃圾回收的目标。然后，单击编辑器窗格顶部的“构建设置”选项卡。你会看到目标有大约一百万个设置，这可能会让人不知所措。你可以浏览选项查找“Objective-C\
  \ Garbage Collection”，但有更好的方法。\n\n`Apple`知道可能很难找到你想要的设置，因此，如果你在构建设置的正下方查看，会看到一个方便的搜索字段。输入文本`garbage\
  \ collection`。搜索字段会将选择范围缩小到与垃圾回收相关的设置。这样好多了！现在，你有两个项目需要查看。\n\n![9781430241881_Fig09-12.tif](img/9781430241881_Fig09-12_fmt.jpg)\n\
  \n图 9-12. 垃圾回收的设置\n\n当查看“Objective-C Garbage Collection”项时，一个弹出选项菜单会提供三个选择：\n\n\n\
  \n-   ![image](img/9781430241881_square_fmt.jpg)  *不支持*：当你的项目使用了 `ARC`，或者你出于某种原因不想启用垃圾回收时，必须选择此选项。\n\
  -   ![image](img/9781430241881_square_fmt.jpg)  *支持*：你的应用程序可以使用垃圾回收。\n-   ![image](img/9781430241881_square_fmt.jpg)\
  \  *必需*：你的应用程序*必须*使用垃圾回收。\n\n我们的选择是第一项：不支持（参见图 9-13）。这将关闭垃圾回收。\n\n![9781430241881_Fig09-13.tif](img/9781430241881_Fig09-13_fmt.jpg)\n\
  \n图 9-13. 选择“不支持”以关闭垃圾回收\n\n转换是一个两步过程。首先，你必须确保代码符合 `ARC` 的要求，然后执行实际的转换。\n\n**注意**\
  \  `ARC` 转换是一条单行道。一旦你转向 `ARC`，就无法回头了。\n\n要开始这个过程，请选择你要转换的目标，然后选择 `Edit` ![image](img/9781430241881_arrow_fmt.jpg)\
  \ `Refactor`\n![image](img/9781430241881_arrow_fmt.jpg) `Convert to Objective-C\
  \ ARC`（参见图 9-14）。\n\n![9781430241881_Fig09-14.tif](img/9781430241881_Fig09-14_fmt.jpg)\n\
  \n图 9-14. 使用 `Edit` 菜单选择 `ARC` 转换项\n\n因为 `ARC` 是在文件级别工作的，你可以在同一个目标中混用 `ARC` 和非 `ARC`\
  \ 文件。\n\n接下来，你会看到一个要转换的目标列表（参见图 9-15）。如果你的目标依赖于其他目标，你可以选择逐步进行这个过程。例如，你可以先从框架和库开始，等这些完成后，再处理使用它们的那些目标。\n\
  \n![9781430241881_Fig09-15.tif](img/9781430241881_Fig09-15_fmt.jpg)\n\n图 9-15. 选择你想要转换的文件\n\
  \n当你选择要转换的目标时，默认会选中所有实现文件。如果你有一些在不同项目间共享的文件，并且不想转换它们，你可以只选择你想要转换的文件。选择完文件后，点击 `Precheck`。预检查过程结束后，你可以进入下一步：实际转换（终于到这一步了），如图\
  \ 9-16 所示。\n\n![9781430241881_Fig09-16.tif](img/9781430241881_Fig09-16_fmt.jpg)\n\
  \n图 9-16. `ARC` 转换介绍界面\n\n阅读完有用的介绍信息并点击*下一步*后，转换步骤会处理你的项目并将其转换为使用 `ARC`。在这步中，`Xcode`\
  \ 会找到每个要用 `ARC` 编译的文件，并根据需要修改你的源代码。\n\n一旦过程完成，`Xcode` 会显示一个源代码比较视图，你可以在其中看到每个文件转换前后的情况，以便决定是否喜欢这些更改。\n\
  \n我们越来越接近了，但项目尚未完全转换完成。这些更改是对你的文件副本进行的，以便给你机会改变主意并退出该过程（我们有没有提到它是不可逆的？）。要完成转换，你将有另一次机会保存“转换前”文件的副本，然后就大功告成了。\n\
  \n这相当简单，但我们必须指出，这是最理想的情况，一切都能完美且自动进行。但现实生活并不总是那么简单。转换器只作用于源代码；它不查看注释，并且当前版本无法读取你的心思来确定你的意图。如果转换器发现任何歧义，它会被标记出来，你必须在转换继续之前解决这个问题。\n\
  \n## 所有权即特权\n\n我们之前讨论的一个要求是，`ARC` 代码中的指针必须是可保留对象指针（`ROP`）。这意味着，例如，你不能简单地将一个 `ROP`\
  \ 赋值给一个非 `ROP`，因为这会转移指针的所有权。考虑以下代码：\n\n```\nNSString *theString = @\"Learn Objective-C\"\
  ;\nCFStringRef cfString = (CFStringRef)theString;\n```\n\n如果你看过很多 `Objective-C`\
  \ 代码，你很可能见过这种模式。它在做什么？一个指针 `theString` 是 `ROP`，而另一个 `CFStringRef` 则不是。为了有一个愉快的 `ARC`\
  \ 体验，我们需要告诉编译器谁拥有这个指针。为此，我们可以使用一种称为**桥接转换**的 `C` 语言技术。这是一种标准的 `C` 类型转换，但带有额外的关键字：\n\
  `__bridge`, `__bridge_retained` 或 `__bridge_transfer`。术语“桥接”指的是为同一目的使用不同数据类型的能力，而不是指当你陷入一个棘手\
  \ `ARC` 转换时想要跳下去的那种东西。以下是三种桥接转换的说明：\n\n-   (`__bridge Type`) *operand*：这种转换会转移指针，但不会转移其所有权。在我们上面的例子中，操作数是\
  \ `theString`，`Type` 是 `CFStringRef`。使用此关键字时，一个指针是 `ROP`，另一个则不是。使用此转换时，指针的所有权仍归操作数所有。以下是我们示例使用这种情况的样子：\n\
  \n```\ncfString = (__bridge CFStringRef)theString;\n```\n\n`cfString` 获得了赋值，但所有权仍属于\
  \ `theString`。\n\n-   (`__bridge_retained Type`) *operand*：在这种类型中，所有权被转移到非 `ROP`\
  \ 上。一个指针是 `ROP`，另一个则不是。因为 `ARC` 只负责管理 `ROP`，所以你需要负责在使用完此对象后释放它。此转换会递增对象的保留计数，因此你必须递减它，就像传统的旧式内存管理一样。以下是我们示例的样子：\n\
  \n```\ncfString = (__bridge_retained CFStringRef)theString\n```\n\n在这种情况下，`cfString`\
  \ 字符串拥有该指针，并且其保留计数增加了。你需要用 `retain`/`release` 来管理它。\n\n-   ![image](img/9781430241881_square_fmt.jpg)\
  \  (`__bridge_transfer Type`) *operand*：此转换的作用与前一种相反；它将所有权转移到 `ROP` 上。在这种情况下，`ARC`\
  \ 拥有该对象，并确保它会像任何其他 `ARC` 对象一样被释放。\n\n另一个限制是 `structs` 和 `unions` 不能有 `ROP` 成员，因此类似下面的代码是不允许的：\n\
  \n```\n// 错误的代码。请勿窃取或销售。\nstruct {\n    int32_t foo;\n    char *bar;\n    NSString\
  \ *baz;\n} MyStruct;\n```\n\n你可以通过使用 `void *` 和桥接转换来绕过这个限制。为了赋值并取回字符串，我们的代码应该像这样：\n\
  \n```\nstruct {\n    int32_t foo;\n    char *bar;\n    void *baz;\n} MyStruct;\n\
  \nMyStruct.baz = (__bridge_retained void *)theString;\nNSString *myString = (__bridge_transfer\
  \ NSString *)MyStruct.baz;\n```\n\n如你所见，在边界情况下，编写 `ARC` 代码并非总是那么自动。这是一个相当深入的课题，值得深入研究。为了完成关于\
  \ `ARC` 的讨论，我们将列出你不应在 `ARC` 管理对象上调用的内存管理方法：\n\n-   `retain`\n-   ![image](img/9781430241881_square_fmt.jpg)\
  \  `retainCount`\n-   ![image](img/9781430241881_square_fmt.jpg)  `release`\n- \
  \  ![image](img/9781430241881_square_fmt.jpg)  `autorelease`\n-   `dealloc`\n\n\
  因为你有时需要释非 `ARC` 对象或执行其他清理工作，你仍然可以编写 `dealloc` 方法，但不能调用 `[super dealloc]`。\n\n还有一些方法不允许在\
  \ `ARC` 对象上重写：\n\n-   ![image](img/9781430241881_square_fmt.jpg)  `retain`\n-  \
  \ ![image](img/9781430241881_square_fmt.jpg)  `retainCount`\n-   ![image](img/9781430241881_square_fmt.jpg)\
  \  `release`\n-   ![image](img/9781430241881_square_fmt.jpg)  `autorelease`\n\n\
  ## 异常处理\n\n什么是异常？它是一个意外事件，例如数组越界，会中断程序流程，因为程序真的不知道该如何处理它。\n\n\n\n当这种情况发生时，程序会创建一个异常对象并将其交给运行时系统，运行时系统随后会决定接下来如何处理。Cocoa\
  \ 中的异常由 `NSException` 类表示。Cocoa 要求所有异常必须是 `NSException` 类型，因此即使你可以从其他对象抛出异常，Cocoa\
  \ 也无法处理这些异常。相反，你应该通过继承 `NSException` 来创建自己的异常。\n\n**注意** 异常处理机制实际上用于处理程序自身产生的错误。Cocoa\
  \ 框架通常通过退出程序来处理错误，这并非你所期望的结果。你应当在代码中抛出并捕获异常，而不是让它们逃逸到框架层面。\n\n要启用异常支持，请确保 `-fobj-exceptions`\
  \ 标志已开启。你可以在 Xcode 的 *Enable Objective-C* *Exceptions* 编译选项中启用此功能（如图 9-17 所示）。\n\
  \n![9781430241881_Fig09-17.tif](img/9781430241881_Fig09-17_fmt.jpg)\n\n**图 9-17.**\
  \ 启用异常\n\n创建异常并将其交给运行时系统的行为称为**抛出**异常，有时也称为**引发**异常。请注意，`NSException` 有几个以 `raise`\
  \ 开头的方法。其中一些是类方法，而 `raise` 本身是一个实例方法。\n\n**捕获**异常是指处理已抛出异常的行为。\n\n**注意** 当异常被抛出但未被捕获时，程序会在异常点停止并传播该异常。\n\
  \n## 异常的关键字\n\n所有异常关键字都以 `@` 开头。以下是每个关键字的作用：\n\n*    `@try`：定义一个代码块，该块将被测试以确定是否应抛出异常。\n\
  *    `@catch()`：定义一个用于处理已抛出异常的代码块。它接受一个参数，通常为 `NSException` 类型，但也可以是其他类型。\n*   \
  \ `@finally`：定义一个无论是否抛出异常都会执行的代码块。此代码将始终被执行。\n*    `@throw`：抛出异常。\n\n**注意** 前面我们提到，你可以从\
  \ `NSException` 实例以外的对象抛出异常，但应避免这样做。原因是并非每个 Cocoa 框架都能捕获由 `NSException` 以外的对象抛出的异常。为了确保\
  \ Cocoa 能正确处理你的异常，你只应抛出 `NSException` 对象。可以将此理解为老话所说的：你不需要用牙线清洁所有牙齿，只需清洁你想保留的那些即可。\n\
  \n你通常会结合使用 `@try`、`@catch` 和 `@finally` 来构建一个结构。它大致如下所示：\n\n```\n@try\n{\n   //\
  \ 你想要执行的代码，这些代码可能会抛出异常。\n}\n@catch (NSException *exception)\n{\n   // 用于处理异常的代码。\n\
  }\n@finally\n{\n   // 始终会被执行的代码。通常用于清理工作。\n}\n```\n\n## 捕获不同类型的异常\n\n你可以根据要处理的异常类型，使用多个\
  \ `@catch` 块。你的处理器应按从最具体到最不具体的顺序排列，并在所有其他处理器之后放置一个通用处理器。示例如下：\n\n```\n@try{\n} @catch\
  \ (MyCustomException *custom) {\n} @catch (NSException *exception) {\n} @catch (id\
  \ value) {\n} @finally {\n}\n```\n\n**注意** C 语言程序员经常在异常处理代码中使用 `setjmp` 和 `longjmp`。如果跳转的目标超出\
  \ `@try` 花括号的范围，则不能在 `@try` 块中使用 `setjmp` 和 `longjmp`。但是，你可以使用 `goto` 和 `return`\
  \ 来退出异常处理代码。\n\n## 抛出异常\n\n当程序检测到异常时，必须将该异常传播到处理它的代码块，该代码块被巧妙称为异常处理器。如前所述，传播异常的过程称为抛出或引发异常。\n\
  \n\n\n程序通过创建`NSException`实例并使用以下两种技术之一来抛出异常：\n\n*   `@throw exception;`\n*   向`NSException`对象发送`raise`消息\n\
  \n例如，我们将创建一个异常：\n\n```\nNSException *theException = [NSException exceptionWithName:\
  \ …];\n```\n\n然后我们可以通过以下任一方式抛出它：\n\n```\n@throw theException;\n```\n\n或\n\n```\n\
  [theException raise];\n```\n\n请使用其中一种技术，不要同时使用两者。两种技术的区别在于：`raise`只能用于`NSException`对象，而`@throw`也可以与其他对象一起使用。\n\
  \n你通常会在异常处理代码内部抛出异常。你的代码可以通过发送另一条`raise`消息或使用`@throw`关键字来传播异常。\n\n```\n@try\n{\n\
  \    NSException *e = …;\n    @throw e;\n}\n@catch (NSException *e) {\n    @throw;\
  \ // 重新抛出 e。\n}\n```\n\n**注意**：在`@catch`异常处理块中，你可以在不指定异常对象的情况下重新抛出异常。\n\n与本地`@catch`异常处理器关联的`@finally`块会在`@throw`导致调用下一个更高层级的异常处理器之前执行，因为`@finally`会在`@throw`发生之前被调用。\n\
  \nObjective-C 异常与 C++ 异常系统兼容。\n\n**注意**：Objective-C 中的异常是资源密集型的。你不应将异常用于常规流程控制或仅仅用于表示错误。使用`@try`设置异常没有成本，但捕获异常会消耗大量的程序资源和速度。\n\
  \n### 异常也需要内存管理\n\n当涉及异常时，内存管理可能变得棘手。让我们看看下面这段简单的代码：\n\n```\n- (void)mySimpleMethod\n\
  {\n    NSDictionary *dictionary = [[NSDictionary alloc] initWith….];\n    [self\
  \ processDictionary:dictionary];\n    [dictionary release];\n}\n```\n\n现在假设`processDictionary`抛出了一个异常。程序会跳出该方法并寻找异常处理器。但由于方法在此刻退出，`dictionary`对象没有被释放，从而导致内存泄漏。\n\
  \n一种简单的处理方法是使用`@try`和`@finally`，在`@finally`中执行清理工作，因为它总是会被执行（如前所述）。\n\n```\n- (void)mySimpleMethod\n\
  {\n    NSDictionary *dictionary = [[NSDictionary alloc] initWith….];\n    @try {\n\
  \        [self processDictionary:dictionary];\n    }\n    @finally {\n        [dictionary\
  \ release];\n    }\n}\n```\n\n这种模式也可以用于 C 风格的内存管理，例如`malloc`和`free`。\n\n### 异常与自动释放池\n\
  \n异常处理有时会遇到一个微妙的问题：异常对象会被自动释放。异常几乎总是作为自动释放对象创建的，因为你不知道它们何时需要被释放。当自动释放池被销毁时，池中的所有对象也会被销毁，包括异常。考虑以下代码，它看起来确实无害：\n\
  \n```\n- (void)myMethod\n{\n    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc]\
  \ init];\n    NSDictionary *myDictionary =\n        [[NSDictionary alloc] initWithObjectsAndKeys:@\"\
  asdfads\", nil];\n    @try {\n        [self processDictionary:myDictionary];\n \
  \   } @catch (NSException *e) {\n        @throw;\n    } @finally {\n        [pool\
  \ release];\n    }\n}\n```\n\n这段代码看起来没问题：我们创建了对象，也释放了它们，因为我们都是合格的开发者。但是等等！当我们考虑异常处理时，这里有一个问题。我们之前讨论过，可以在`@catch`块中重新抛出异常，这会导致`@finally`块在异常被重新抛出之前执行。这会导致本地池在异常被传递之前被释放，从而将其变成一个可怕的**僵尸异常**。幸运的是，我们有一个简单的修复方法：只需在池外部保留它。\n\
  \n修改后的方法如下：\n\n```\n- (void)myMethod\n{\n    id savedException = nil;\n    NSAutoreleasePool\
  \ *pool = [[NSAutoreleasePool alloc] init];\n    NSDictionary *myDictionary =\n\
  \        [[NSDictionary alloc] initWithObjectsAndKeys:@\"asdfads\", nil];\n    @try\
  \ {\n        [self processDictionary:myDictionary];\n    } @catch (NSException *e)\
  \ {\n```\n\n\n\n```objc\nsavedException = [e retain];\n\n@throw;\n\n} @finally {\n\
  \n[pool release];\n\n[savedException autorelease];\n\n}\n\n}\n```\n\n通过使用 `retain`，我们将异常保存在父池中。当我们的池被释放时，我们已保存了一个指针，而当父池被释放时，该异常也会随之释放。\n\
  \n## 总结\n\n在本章中，你学习了 Cocoa 的内存管理方法：`retain`、`release` 和 `autorelease`。我们还讨论了垃圾回收机制，并深入探讨了自动引用计数（ARC），即苹果最新的内存管理技术。\n\
  \n每个对象都维护着一个引用计数。对象在创建时引用计数为 1。当对象被 retain 时，其引用计数增加 1；当对象被 release 时，其引用计数减少 1。当引用计数降至\
  \ 0 时，对象被销毁。首先会调用对象的 `dealloc` 方法，然后其内存被回收，可供其他对象使用。\n\n当对象收到 `autorelease` 消息时，其引用计数不会立即改变；相反，该对象会被放入一个\
  \ `NSAutoreleasePool` 中。当这个池被销毁时，池中的所有对象都会被发送一条 `release` 消息。所有被自动释放的对象的引用计数随后都会减\
  \ 1。如果计数降至 0，对象即被销毁。当你使用 AppKit 或 UIKit 时，自动释放池会在明确定义的时机（如当前用户事件处理完毕时）为你创建和销毁。否则，你需要自行创建自动释放池。Foundation\
  \ 工具的模板中包含了相关代码。\n\nCocoa 关于对象及其引用计数有三条规则：\n\n*   如果你通过 `new`、`alloc` 或 `copy` 操作获得对象，则该对象的引用计数为\
  \ 1。\n*   如果你通过其他方式获得对象，则假定其引用计数为 1，并且已被自动释放。\n*   如果你 retain 了一个对象，则必须用一次 `release`\
  \ 来平衡每一次 `retain`。\n\n总的来说，ARC 通过在编译时插入这些调用来为你处理 `retain` 和 `release`。\n\n接下来，我们将讨论\
  \ `init` 方法：如何让你的对象从创建之初就高效运行。\n\n# 第 10 章：对象初始化\n\n到目前为止，我们以两种不同的方式创建新对象。第一种方式是\
  \ `[SomeClass new]`，第二种是 `[[SomeClass alloc] init]`。这两种技术是等价的，但 Cocoa 的常见约定是使用 `alloc`\
  \ 和 `init`，而不是 `new`。通常，Cocoa 程序员在使用 `new` 作为初学工具，直到他们积累足够背景知识，能够熟练使用 `alloc` 和\
  \ `init` 为止。现在是时候抛弃这些初学工具了。\n\n## 分配对象\n\n**分配** 是新对象诞生的过程。这是一个令人愉快的时刻，从操作系统中获取一块内存，并将其指定为存放对象实例变量的位置。向某个类发送\
  \ `alloc` 消息会使该类分配一块足够容纳其所有实例变量的内存。`alloc` 还会方便地将所有内存初始化为 0。这样，你就不会遇到未初始化内存导致各种随机错误（困扰许多语言的问题）。你所有的\
  \ `BOOL` 变量起始值为 `NO`；所有的 `int` 变量为 0；所有的 `float` 变量为 0.0；所有的指针为 `nil`；而所有你的基地都属于我们（抱歉，忍不住玩了个梗）。\n\
  \n一个新分配的对象还不能立即使用：你需要先对其进行初始化才能使用。某些语言（包括 C++ 和 Java）通过构造函数在单一操作中完成对象分配和初始化。Objective-C\
  \ 则将这两个操作分为显式的分配阶段和初始化阶段。初学者常犯的错误是只使用 `alloc` 操作，例如：\n\n```objc\nCar *car = [Car\
  \ alloc];\n```\n\n这样可能也能工作，但未经初始化，后续可能会出现一些奇怪的行为（也就是“bug”）。本章剩余部分将重点讨论初始化这一重要概念。\n\
  \n## 初始化对象\n\n分配的对立面是初始化。**初始化** 就是获取一块内存并将其准备好，使之成为程序中有用的成员。`init` 方法——即执行初始化操作的方法——几乎总是返回它们正在初始化的对象。你可以（并且应该）像这样链式调用\
  \ `alloc` 和初始化：\n\n```objc\nCar *car = [[Car alloc] init];\n```\n\n而不是这样：\n\n```objc\n\
  Car *car = [Car alloc]; [car init];\n```\n\n这种链式调用技术之所以重要，是因为初始化方法可能返回一个与已分配对象不同的对象。如果你觉得这很奇怪，那你的感觉没错。但这种情况确实可能发生。\n\
  \n为什么程序员会希望 `init` 方法返回一个不同的对象呢？回顾一下第 8 章末尾关于类簇的讨论，你会看到像 `NSString` 和 `NSArray`\
  \ 这类类实际上只是大量专用类的门面。`init` 方法可以接受参数，因此方法代码有机会检查参数，并决定另一个类的对象可能更合适。例如，假设要从一个非常长的字符串或一个阿拉伯字符字符串创建新字符串。基于此信息，字符串初始化器可能会决定创建一个更适合目标字符串需求的、属于不同类的对象，并返回该对象而非原始对象。\n\
  \n## 编写初始化方法\n\n之前，当我们展示初始化方法时，我们请大家忍受一些“点头微笑”的时刻，主要是因为它们看起来有点奇怪。以下是 CarParts 早期版本中的\
  \ `init` 方法：\n\n```objc\n- (id) init\n{\n    if (self = [super init])\n    {\n \
  \       engine = [Engine new];\n        tires[0] = [Tire new];\n        tires[1]\
  \ = [Tire new];\n        tires[2] = [Tire new];\n        tires[3] = [Tire new];\n\
  \    }\n    return (self);\n} // init\n```\n\n主要的奇怪之处在第一行就出现了：\n\n```objc\nif (self\
  \ = [super init]) {\n```\n\n这段代码暗示 `self` 可能会改变。在方法中间改变 `self`？我们疯了吗？好吧，或许，但这次没有。该语句中首先执行的代码是\
  \ `[super init]`。这段代码让超类完成其初始化工作。对于继承自 `NSObject` 的类，调用超类可以让 `NSObject` 执行它所需的处理，以便对象能够响应消息并处理引用计数。对于继承自其他类的类，这是它们执行自己版本的全新初始化的机会。\n\
  \n我们刚刚说过，像这样的 `init` 方法可能会返回完全不同的对象。请记住，实例变量位于距离隐藏参数 `self` 固定偏移量的内存位置。如果 `init`\
  \ 方法返回了一个新对象，我们需要更新 `self`，以便后续的实例变量引用能影响正确的内存位置。这就是我们需要 `self = [super init]` 赋值的原因。请记住，此赋值仅影响该方法内部的\
  \ `self` 值。它不会改变方法作用域之外的任何内容。\n\n如果初始化对象时出现问题，`init` 方法可能返回 `nil`。例如，你可能使用一个接受 URL\
  \ 的 `init` 方法，通过网站上的图像文件来初始化一个图像对象。如果网络断开，或者网站改版导致图片被移动，你将无法获得有用的图像对象。此时 `init`\
  \ 方法会返回 `nil`，表示对象无法被初始化。如果 `[super init]` 返回 `nil`，则 `if (self = [super init])`\
  \ 测试将不会执行方法体代码。像这样将赋值与检查非零值结合，是 Objective-C 中存续的经典 C 语言惯用法。\n\n\n\n## 代码排版与优化\n\n\
  启动并运行对象的代码位于`if`语句主体的花括号内。在原始的`Car init`方法中，`if`语句的主体创建了一个引擎和四个轮胎。从内存管理的角度来看，这段代码是正确的，因为通过`new`返回的对象其引用计数初始值被设置为\
  \ 1。\n\n最后，该方法的最后一行是`return (self);`。\n\n`init`方法返回刚刚初始化完成的对象。由于我们将`[super init]`的返回值赋值给了`self`，因此这正是我们应当返回的内容。\n\
  \n## 用初始化赢在起跑线\n\n有些程序员不喜欢将赋值操作与非零值检查合并在一起。相反，他们这样编写`init`方法：\n\n```\nself = [super\
  \ init];\nif (nil != self)\n{\n}\nreturn (self);\n```\n\n这样写也没问题。关键在于，你需要将返回值重新赋值给`self`，尤其是在访问任何实例变量时更是如此。无论你采用哪种方式，都要明白将赋值与检查合并是一种常见技巧，你会在其他人的代码中经常看到。\n\
  \n`self = [super init]`这种写法引发了一些争议。一派认为你应该始终这样做，以防父类在初始化过程中改变了某些东西。另一派则认为，这种对象变更的情况极其罕见且难以捉摸，不必费心——直接使用`[super\
  \ init]`即可。这一派指出，即使`init`改变了对象，这个新对象也可能无法容纳你新增的实例变量。\n\n这个问题在理论上确实棘手，但在实际开发中并不常见。我们建议始终使用`if\
  \ (self = [super init])`技巧，以确保安全并捕捉某些`init`方法返回`nil`的行为。但如果你选择直接使用`[super init]`，那也完全可以。只是如果你碰巧遇到那些极其罕见的边缘情况，就需要做好进行一些调试的准备。\n\
  \n## 初始化时该做什么\n\n你的`init`方法中应该放入什么内容？这里是进行“白板初始化”工作的地方。你需要为实例变量赋值，并创建对象运行所需的其他对象。在编写`init`方法时，你必须决定要在其中完成多少工作。`CarParts`程序在其演变过程中展示了两种不同的方法。\n\
  \n第一种方法使用`init`方法来创建引擎和所有四个轮胎。这使得`Car`对象开箱即用：调用`alloc`和`init`后，就可以直接把车开出去试驾了。在下一个版本中，我们改为在`init`方法中不创建任何东西。我们只为引擎和轮胎保留了空位置。然后，创建对象的代码必须自行创建引擎和轮胎，并通过存取方法来设置它们。\n\
  \n哪种方法适合你？这个决定归结为灵活性与性能之间的权衡，正如编程中许多其他取舍一样。最初的`Car init`方法非常方便。如果`Car`类的预期用途是创建一个基础汽车然后直接使用，那么这就是正确的设计。\n\
  \n另一方面，如果汽车经常需要用不同类型的轮胎和引擎进行定制，比如在赛车游戏中，那么我们创建引擎和轮胎只是为了随后丢弃它们。真是浪费！对象被创建出来，然后又被销毁，从未被使用过。\n\
  \n**注意** 即使你没有提供自定义对象属性的调用，你仍然可以等到调用方真正需要时才创建它们。这种技术被称为**懒加载**，如果你在`-init`中创建了可能实际并不会用到的复杂对象，懒加载可以提升性能。\n\
  \n## 这不是很方便吗？\n\n有些对象拥有多个以`init`开头的方法。事实上，重要的是要记住`init`方法并没有什么特别之处。它们只是遵循命名约定的普通方法。\n\
  \n许多类都提供了**便捷初始化方法**。这些`init`方法会做一些额外的工作，省去你自己动手的麻烦。为了让你更直观地理解，这里列举了一些`NSString`的`init`方法示例：\n\
  \n- `(id) init;`\n\n这个基本方法初始化了一个新的空字符串。对于不可变的`NSString`，这个方法并不是特别有用。但你可以分配并初始化一个新的`NSMutableString`，然后开始往里面添加字符。你可以这样使用它：\n\
  \n```\nNSString *emptyString = [[NSString alloc] init];\n```\n\n这段代码会给你一个空字符串。\n\
  \n- `(id) initWithFormat: (NSString *) format, …;`\n\n这个版本将新字符串初始化为格式化操作的结果，就像我们使用`NSLog()`以及你在第\
  \ 7 章看到的`stringWithFormat:`类方法一样。下面是一个使用此`init`方法的示例：\n\n```\nstring = [[NSString\
  \ alloc]\n          initWithFormat: @\"%d or %d\", 25, 624];\n```\n\n这会给你一个值为\"\
  25 or 624\"的字符串。\n\n- `(id) initWithContentsOfFile:(NSString *) path encoding:(NSStringEncoding)\
  \ enc error:(NSError **) error`\n\n`initWithContentsOfFile:encoding:error:`方法会打开指定路径的文本文件，读取其中所有内容，并用这些内容初始化一个字符串。以下代码读取了`/tmp/words.txt`文件：\n\
  \n```\nNSError *error = nil;\nNSString *string =\n    [[NSString alloc] initWithContentsOfFile:@\"\
  /tmp/words.txt\"\n                                    encoding:NSUTF8StringEncoding\n\
  \                                       error:&error];\n```\n\n`encoding`参数告诉 API\
  \ 文件中内容的编码类型。通常，你会使用`NSUTF8StringEncoding`，表示文件采用 UTF8 格式编码。\n\n如果无错误，第三个参数返回`nil`。如果出现错误，你可以使用`localizedDescription`方法查明具体情况。综合起来，代码如下：\n\
  \n```\nNSError *error = nil;\nNSStringEncoding encoding = NSUTF8StringEncoding;\n\
  NSString *string = [[NSString alloc] initWithContentsOfFile:@\"/tmp/words.txt\"\n\
  \                                               usedEncoding:&encoding\n       \
  \                                               error:&error];\nif(nil != error)\n\
  {\n    NSLog(@\"无法从文件读取数据，%@\", [error localizedDescription]);\n}\n```\n\n这是相当强大的功能。如果使用\
  \ C 语言，这将需要一大段代码（你需要打开文件，读取数据块，追加到字符串，确保末尾的零字节在正确位置，然后关闭文件）。而对于我们这些 Objective-C\
  \ 的忠实用户来说，这变成了一行代码。真不错。\n\n**注意** 关于不同初始化方法的一般规则是：如果你的对象必须依赖某些信息才能完成自身初始化，你应该将这些信息作为`init`方法的一部分提供。这通常适用于不可变对象。\n\
  \n## 更多零件\n\n让我们重新审视`CarParts`，上次在第 6 章中我们将其拆分为每个类一个独立的源文件。这一次，我们将为`Tire`类添加一些初始化的好处，并同时清理`Car`的内存管理。对于在家跟着操作的读者，本章完成后的项目目录是`10.01\
  \ CarPartsInit`。\n\n**注意** 正如我们在第 9 章中详细讨论的，苹果正从垃圾回收的内存管理方式迁移到一种名为自动引用计数（ARC）的新技术。对于\
  \ iOS 开发，你*必须*使用 ARC；不支持垃圾回收。我们在`10.01 CarPartsInit-ARC`目录中提供了本章程序的 ARC 版本。但由于垃圾回收仍然存在，我们也提供了一个使用垃圾回收的版本，名为`10.01\
  \ CarPartsInit-GC`。\n\n### 轮胎的初始化\n\n\n\n# 排版后的文档\n\n在现实世界中，轮胎远比我们在`CarParts`中模拟的要有趣得多。在真实的轮胎中，你需要跟踪胎压（不希望它变得太低）和胎纹深度（一旦低于几毫米，轮胎就不再安全了）。让我们扩展`Tire`类来跟踪胎压和胎纹深度。以下是添加了两个实例变量及相应访问器方法的类声明：\n\
  \n```\n#import <Cocoa/Cocoa.h>\n\n@interface Tire : NSObject\n{\n    float pressure;\n\
  \    float treadDepth;\n}\n\n- (void) setPressure: (float) pressure;\n- (float)\
  \ pressure;\n- (void) setTreadDepth: (float) treadDepth;\n- (float) treadDepth;\n\
  \n@end // Tire\n```\n\n以下是`Tire`的实现，相当直接明了：\n\n```\n#import \"Tire.h\"\n\n@implementation\
  \ Tire\n\n- (id) init\n{\n    if (self = [super init])\n    {\n        pressure\
  \ = 34.0;\n        treadDepth = 20.0;\n    }\n    return (self);\n} // init\n\n\
  - (void) setPressure: (float) p\n{\n    pressure = p;\n} // setPressure\n\n- (float)\
  \ pressure\n{\n    return (pressure);\n} // pressure\n\n- (void) setTreadDepth:\
  \ (float) td\n{\n    treadDepth = td;\n} // setTreadDepth\n\n- (float) treadDepth\n\
  {\n    return (treadDepth);\n} // treadDepth\n\n- (NSString *) description\n{\n\
  \    NSString *desc;\n    desc = [NSString stringWithFormat:\n            @\"Tire:\
  \ Pressure: %.1f TreadDepth: %.1f\", pressure, treadDepth];\n    return (desc);\n\
  } // description\n\n@end // Tire\n```\n\n访问器方法为轮胎的使用者提供了改变胎压和胎纹深度的方法。我们来快速看一下`init`方法：\n\
  \n```\n- (id) init\n{\n    if (self = [super init])\n    {\n        pressure = 34.0;\n\
  \        treadDepth = 20.0;\n    }\n    return (self);\n} // init\n```\n\n这里应该没有意外。父类（本例中为`NSObject`）被指示初始化自身，并且该调用的返回值被赋值给`self`。然后，实例变量被赋予有用的默认值。我们可以这样创建一个全新的轮胎：\n\
  \n```\nTire *tire = [[Tire alloc] init];\n```\n\n轮胎的胎压将为 34 psi，胎纹深度为 20 毫米。我们也应该修改`description`方法：\n\
  \n```\n- (NSString *) description\n{\n    NSString *desc;\n    desc = [NSString\
  \ stringWithFormat:\n            @\"Tire: Pressure: %.1f TreadDepth: %.1f\", pressure,\
  \ treadDepth];\n    return (desc);\n} // description\n```\n\n`description`方法现在使用`NSString`的`stringWithFormat:`类方法来创建一个包含胎压和胎纹深度的字符串。这个方法是否遵循了我们的良好内存管理行为规则？是的，它遵循了。因为该对象不是通过`alloc`、`copy`或`new`创建的，它的引用计数为\
  \ 1，我们可以认为它是自动释放的。所以，当自动释放池被销毁时，这个字符串会被清理。\n\n## 更新`main()`函数\n\n以下是`main.m`文件，它比之前稍微复杂了一些：\n\
  \n```\n#import \"Engine.h\"\n#import \"Car.h\"\n#import \"Slant6.h\"\n#import \"\
  AllWeatherRadial.h\"\n\nint main (int argc, const char * argv[])\n{\n    @autoreleasepool\n\
  \    {\n        Car *car = [[Car alloc] init];\n\n        for (int i = 0; i < 4;\
  \ i++)\n        {\n            Tire *tire;\n            tire = [[Tire alloc] init];\n\
  \            [tire setPressure: 23 + i];\n            [tire setTreadDepth: 33 -\
  \ i];\n            [car setTire: tire atIndex: i];\n            [tire release];\n\
  \        }\n\n        Engine *engine = [[Slant6 alloc] init];\n        [car setEngine:\
  \ engine];\n        [car print];\n        [car release];\n    }\n\n    return (0);\n\
  } // main\n```\n\n让我们逐部分分析`main()`函数。我们首先创建一个自动释放池，让自动释放的对象在其中游荡，等待池的销毁：\n\n```\n\
  @autoreleasepool {\n```\n\n然后，我们使用`alloc`和`init`创建一辆新车：\n\n```\nCar *car = [[Car\
  \ alloc] init];\n```\n\n之后，一个循环旋转四次（从 0 到 3）。这是制造新轮胎的地方：\n\n```\nfor (int i = 0;\
  \ i < 4; i++) {\n```\n\n每次循环中，都会创建一个新的轮胎并进行初始化：\n\n```\nTire *tire;\ntire = [[Tire\
  \ alloc] init];\n```\n\n每个轮胎开始时，其胎压和胎纹深度都设置在`Tire`的`init`方法中。但为了有趣，我们要自定义这些值。因为在现实世界中，没有两个轮胎是完全相同的，我们将使用访问器方法来调整胎压和胎纹深度：\n\
  \n```\n[tire setPressure: 23 + i];\n[tire setTreadDepth: 33 - i];\n```\n\n接着，我们将轮胎交给汽车：\n\
  \n```\n[car setTire: tire atIndex: i];\n```\n\n\n\n\n现在我们已经处理完轮胎，将其释放：\n\n```\n\
  [tire release];\n```\n\n这段代码假定`Car`正在正确地管理内存，安排保留该对象。请注意，第 6 章中展示的`Car`并没有遵守我们的内存管理指南——那时我们还太年轻天真——但我们稍后会向你展示如何修复这个问题。\n\
  \n轮胎组装完成后，和之前一样创建一个新发动机，并将其放入汽车中：\n\n```\nEngine *engine = [[Slant6 alloc] init];\n\
  [car setEngine: engine];\n[engine release];\n```\n\n与轮胎一样，发动机也被释放，因为我们不再使用它了。由`Car`负责确保发动机被释放。\n\
  \n最后，`Car`被要求打印自身，然后被释放，因为我们不再需要它：\n\n```\n[car print];\n[car release];\n```\n\n\
  现在，自动释放池被释放，这会导致其引用计数归零，释放池本身，并向池中的每个对象发送`release`消息。此时，`Tire`的`description`方法生成的`NSString`对象被清理，`main`函数最终结束。但在运行程序之前，我们需要修复`Car`类，使其正确进行内存管理。不过首先，这里是在垃圾回收环境下`main`函数的典型写法：\n\
  \n```\nint main (int argc, const char * argv[])\n{\n    Car *car = [[Car alloc]\
  \ init];\n    for (int i = 0; i < 4; i++)\n    {\n        Tire *tire;\n        tire\
  \ = [[Tire alloc] init];\n        [tire setPressure: 23 + i];\n        [tire setTreadDepth:\
  \ 33 - i];\n        [car setTire: tire atIndex: i];\n    }\n    Engine *engine =\
  \ [[Slant6 alloc] init];\n    [car setEngine: engine];\n    [car print];\n    return\
  \ (0);\n} // main\n```\n\n如你所见，没有额外的内存管理调用，代码简洁了许多。\n\n## 清理`Car`类\n\n与其在`Car`中使用普通的\
  \ C 数组，不如改用`NSMutableArray`。为什么？因为这样可以免费获得边界检查。为此，我们将`Car`类的`@interface`部分修改为使用可变数组（修改的行用粗体标注）：\n\
  \n```\n#import <Cocoa/Cocoa.h>\n@class Tire;\n@class Engine;\n\n@interface Car :\
  \ NSObject\n{\n    NSMutableArray *tires;\n    Engine *engine;\n}\n\n- (void) setEngine:\
  \ (Engine *) newEngine;\n- (Engine *) engine;\n- (void) setTire: (Tire *) tire atIndex:\
  \ (int) index;\n- (Tire *) tireAtIndex: (int) index;\n- (void) print;\n\n@end //\
  \ Car\n```\n\n我们升级了`Car`的几乎每个方法，使其遵循内存管理规则。先从`init`开始：\n\n```\n- (id) init\n{\n\
  \    if (self = [super init])\n    {\n        tires = [[NSMutableArray alloc] init];\n\
  \        for (int i = 0; i < 4; i++)\n        {\n            [tires addObject: [NSNull\
  \ null]];\n        }\n    }\n    return (self);\n} // init\n```\n\n你已经见过`self =\
  \ [super init]`无数次了；几乎背下来了。现在你应该知道，这只是确保父类正确初始化对象。\n\n接下来，我们创建一个`NSMutableArray`。`NSMutableArray`有一个方便的方法`replaceObjectAtIndex:withObject:`，非常适合实现`setTire:atIndex:`。要使用`replaceObjectAtIndex:withObject:`，我们需要在给定索引处有一个对象以供替换。全新的`NSMutableArray`没有任何内容，因此我们需要一个占位对象。`NSNull`非常适合这种场景。于是在数组中放入四个`NSNull`对象（你第一次见到它是在第\
  \ 8 章）。一般来说，你不需要用`NSNull`预填充`NSMutableArray`，但在本例中，这样做会让后续操作更简单。\n\n在`init`的末尾，我们返回`self`，因为这是我们刚刚初始化完成的对象。\n\
  \n接下来是发动机的存取器方法：`setEngine:`和`engine`。`setEngine:`使用了我们之前展示的“保留传入对象并释放当前对象”技术：\n\
  \n```\n- (void) setEngine: (Engine *) newEngine\n{\n    [newEngine retain];\n  \
  \  [engine release];\n    engine = newEngine;\n} // setEngine\n```\n\n而`engine`存取器方法直接返回当前的发动机：\n\
  \n```\n- (Engine *) engine\n{\n    return (engine);\n} // engine\n```\n\n现在来实现轮胎的存取器。首先是设置方法：\n\
  \n```\n- (void) setTire: (Tire *) tire atIndex: (int) index\n{\n\n\n\n```markdown\n\
  \n`[tires replaceObjectAtIndex: index withObject: tire];`\n\n`} // setTire:atIndex:`\n\
  \n此方法使用 `replaceObjectAtIndex:withObject:` 从集合中移除现有对象，并用新对象替换它。我们不需要对轮胎对象进行任何显式内存管理，因为\
  \ `NSMutableArray` 会自动保留新轮胎并释放索引处的对象，无论它是一个 `NSNull` 占位符还是之前存储的轮胎对象。当 `NSMutableArray`\
  \ 被销毁时，它会释放其所有对象，因此轮胎对象会被清理干净。\n\n`tireAtIndex:` 取值器使用 `NSArray` 提供的 `objectAtIndex:`\
  \ 方法从数组中获取轮胎：\n\n```\n- (Tire *) tireAtIndex: (int) index\n{\n    Tire *tire;\n\
  \    tire = [tires objectAtIndex: index];\n    return (tire);\n} // tireAtIndex:\n\
  ```\n\n**快速返回**：通过直接返回 `objectAtIndex:` 的结果值，将以下方法写成一行是完全合法的：\n\n```\n- (Tire *)\
  \ tireAtIndex: (int) index\n{\n    return ([tires objectAtIndex: index]);\n} //\
  \ tireAtIndex:\n```\n\n原始版本中的额外变量使代码稍微更易读（至少对我们如此），并且设置断点更容易，以便可以看到正在返回哪个对象。这种技术也使原始调试者更容易在\
  \ `objectAtIndex:` 调用和方法结束（返回轮胎对象时）之间插入一个 `NSLog()`。\n\n我们仍需确保汽车清理其持有的对象——具体来说是引擎和轮胎数组。`dealloc`\
  \ 方法是执行此操作的地方：\n\n```\n- (void) dealloc\n{\n    [tires release];\n    [engine release];\n\
  \    [super dealloc];\n} // dealloc\n```\n\n这足以确保当这辆车被送往废车场时所有内存都能被回收。请务必调用父类的 `dealloc`\
  \ 方法！忽略这一点是一个常见错误。同时，确保 `[super dealloc]` 是 `dealloc` 方法中的最后一条语句。\n\n最后，汽车的打印方法会打印出轮胎和引擎：\n\
  \n```\n- (void) print\n{\n    for (int i = 0; i < 4; i++)\n    {\n        NSLog\
  \ (@\"%@\", [self tireAtIndex: i]);\n    }\n    NSLog (@\"%@\", engine);\n} // print\n\
  ```\n\n`print` 方法遍历轮胎并记录每一个。有趣的是，循环使用了 `tireAtIndex:` 方法，而不是直接操作数组本身。如果你想直接访问数组，尽管去做。但是，如果你使用存取器（即使在类的实现内部），你将使该代码与任何更改隔离开。例如，如果将来轮胎存储机制再次发生变化（比如，改回\
  \ C 风格数组），你就不必修改 `print` 方法。\n\n现在（终于！），我们可以运行 `CarPartsInit` 了。结果如下：\n\n```\nTire:\
  \ Pressure: 23.0 TreadDepth: 33.0\nTire: Pressure: 24.0 TreadDepth: 32.0\nTire:\
  \ Pressure: 25.0 TreadDepth: 31.0\nTire: Pressure: 26.0 TreadDepth: 30.0\nI am a\
  \ slant-6. VROOOM!\n```\n\n## Car Cleaning, GC and ARC Style\n\n好了，那么垃圾回收呢？在这个世界中，这个类是什么样子？`setEngine`\
  \ 变得更加简洁。\n\n```\n- (void) setEngine: (Engine *) newEngine\n{\n    engine = newEngine;\n\
  } // setEngine\n```\n\n我们更改了 `engine` 实例变量。当 Cocoa 的垃圾回收机制运行时，它会意识到没有其他人指向旧引擎，因此垃圾回收器会清除那个引擎。另一方面，因为我们有一个指向\
  \ `newEngine` 的实例变量，它不会被回收；垃圾回收器知道有人在用它。\n\n`dealloc` 方法完全消失了：在垃圾回收的世界中不需要使用 `dealloc`。如果你需要在对象销毁时做一些工作，可以重写\
  \ `-finalize`，它在对象最终被回收时被调用，但与 `finalize` 相关有一些微妙之处。不过，对于你在 Cocoa 中进行的编程类型，无需担心\
  \ `finalize`。\n\nARC 版本与 GC 版本非常相似。我们唯一需要添加的是 `@autoreleasepool`，以告诉编译器我们希望它处理 `retain`\
  \ 和 `release` 周期。\n\n## Making a Convenience Initializer\n```\n\n\n没有代码是天生完美的。你总能做出改进。回想一下\
  \ `main()` 函数以及我们创建轮胎的方式：\n\n```\ntire = [[Tire alloc] init];\n[tire setPressure:\
  \ 23 + i];\n[tire setTreadDepth: 33 - i];\n```\n\n这涉及四次消息发送和三行代码。如果能一步完成就好了。让我们创建一个便捷初始化方法，它同时接受气压和胎面深度这两个参数。以下是添加了便捷初始化方法的\
  \ `Tire` 类（新增内容以粗体显示）：\n\n```\n@interface Tire : NSObject\n{\n    float pressure;\n\
  \    float treadDepth;\n}\n- (id) initWithPressure: (float) pressure\n         \
  \    treadDepth: (float) treadDepth;\n- (void) setPressure: (float) pressure;\n\
  - (float) pressure;\n- (void) setTreadDepth: (float) treadDepth;\n- (float) treadDepth;\n\
  @end // Tire\n```\n\n该方法的实现非常简单，没有任何意外之处：\n\n```\n- (id) initWithPressure: (float)\
  \ p treadDepth: (float) td\n{\n    if (self = [super init]) {\n        pressure\
  \ = p;\n        treadDepth = td;\n    }\n    return (self);\n} // initWithPressure:treadDepth:\n\
  ```\n\n现在，分配和初始化一个轮胎成为一步操作：\n\n```\nTire *tire;\ntire = [[Tire alloc]\n        initWithPressure:\
  \ 23 + i\n              treadDepth: 33 - i];\n```\n\n## 指定初始化方法\n\n不幸的是，初始化并非一切顺利。当我们开始添加便捷初始化方法时，会出现一些细微的问题。让我们为\
  \ `Tire` 再添加两个便捷初始化方法：\n\n```\n@interface Tire : NSObject\n{\n    float pressure;\n\
  \    float treadDepth;\n}\n- (id) initWithPressure: (float) pressure;\n- (id) initWithTreadDepth:\
  \ (float) treadDepth;\n- (id) initWithPressure: (float) pressure treadDepth: (float)\
  \ treadDepth;\n- (void) setPressure: (float) pressure;\n- (float) pressure;\n- (void)\
  \ setTreadDepth: (float) treadDepth;\n- (float) treadDepth;\n@end // Tire\n```\n\
  \n这两个新的初始化方法 `initWithPressure:` 和 `initWithTreadDepth:` 适用于那些知道他们想要特定气压或特定胎面深度的轮胎，但不太关心另一个属性值，并乐意接受默认值的人。以下是初始化的首次尝试（稍后我们会修正）：\n\
  \n```\n- (id) initWithPressure: (float) p\n{\n    if (self = [super init])\n   \
  \ {\n        pressure = p;\n        treadDepth = 20.0;\n    }\n    return (self);\n\
  } // initWithPressure\n\n- (id) initWithTreadDepth: (float) td\n{\n    if (self\
  \ = [super init])\n    {\n        pressure = 34.0;\n        treadDepth = td;\n \
  \   }\n    return (self);\n} // initWithTreadDepth\n```\n\n我们现在有四个初始化方法：`init`、`initWithPressure:`、`initWithTreadDepth:`\
  \ 和 `initWithPressure:treadDepth:`。每个方法都了解默认气压（34）、默认胎面深度（20），或者两者都了解。这能够正常工作，并且代码是正确的。\n\
  \n但当我们开始对 `Tire` 进行子类化时，问题就出现了。\n\n## 子类化的问题\n\n我们已经有 `Tire` 的一个子类 `AllWeatherRadial`。现在，假设\
  \ `AllWeatherRadial` 想要添加两个新的实例变量 `rainHandling` 和 `snowHandling`，它们是用于表示轮胎在湿滑路面和雪地路面上抓地表现的浮点值。我们需要确保在创建新的\
  \ `AllWeatherRadial` 时，这些值被设置为合理的数值。\n\n因此，以下是 `AllWeatherRadial` 的新接口，包含了新的实例变量和访问方法：\n\
  \n```\n@interface AllWeatherRadial : Tire\n{\n    float rainHandling;\n    float\
  \ snowHandling;\n}\n- (void) setRainHanding: (float) rainHanding;\n- (float) rainHandling;\n\
  - (void) setSnowHandling: (float) snowHandling;\n- (float) snowHandling;\n@end //\
  \ AllWeatherRadial\n```\n\n而访问方法则*非常*无聊：\n\n```\n- (void) setRainHandling: (float)\
  \ rh\n{\n    rainHandling = rh;\n} // setRainHandling\n\n- (float) rainHandling\n\
  {\n    return (rainHandling);\n} // rainHandling\n\n- (void) setSnowHandling: (float)\
  \ sh\n{\n    snowHandling = sh;\n} // setSnowHandling\n\n- (float) snowHandling\n\
  {\n    return (snowHandling);\n} // snowHandling\n```\n\n我们更新了描述方法，以显示各种轮胎参数：\n\n\
  ```\n- (NSString *) description\n{\n    NSString *desc;\n    desc = [[NSString alloc]\
  \ initWithFormat:\n            @\"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f\"\
  ,\n            [self pressure], [self treadDepth],\n            [self rainHandling],\n\
  \            [self snowHandling]];\n    return (desc);\n} // description\n```\n\n\
  以下是 `main()` 中的 for 循环，用于创建带有默认值的 `AllWeatherRadials` 对象：\n\n```\nfor (int i = 0;\
  \ i < 4; i++)\n{\n```\n\n\n```objectivec\nAllWeatherRadial *tire;\n\ntire = [[AllWeatherRadial\
  \ alloc] init];\n\n[car setTire: tire atIndex: i];\n\n[tire release];\n```\n\n但运行程序时却出了问题：\n\
  \n```\nAllWeatherRadial: 34.0 / 20.0 / 0.0 / 0.0\nAllWeatherRadial: 34.0 / 20.0\
  \ / 0.0 / 0.0\nAllWeatherRadial: 34.0 / 20.0 / 0.0 / 0.0\nAllWeatherRadial: 34.0\
  \ / 20.0 / 0.0 / 0.0\n```\n\nI am a slant-6. VROOOM!\n\n`AllWeatherRadial` 的属性没有被设为合理的默认值。这是怎么回事？我们需要在\
  \ `init` 方法中设置这些值，因此必须重写 `init`。但 `Tire` 还有 `initWithPressure:`、`initWithTreadDepth:`\
  \ 以及 `initWithPressure:treadDepth:` 这些初始化方法。难道我们也要重写它们吗？即使我们这么做了，如果 `Tire` 新增了一个初始化方法怎么办？`Tire`\
  \ 的改动导致 `AllWeatherRadial` 出现问题，这种后果可不妙。\n\n幸运的是，Cocoa 的设计者们早已预见到这个问题。他们提出了**指定初始化方法**的概念。一个类中的某个\
  \ `init` 方法就是指定初始化方法，类的所有初始化方法都会通过它来完成初始化工作。子类则通过父类的指定初始化方法来执行父类的初始化操作。通常，参数最多的\
  \ `init` 方法会成为指定初始化方法。如果你在使用他人编写的代码，请务必查阅文档，确认哪个方法是指定初始化方法。\n\n### 修复 Tire 的初始化方法\n\
  \n首先，我们需要确定 `Tire` 的哪个初始化方法应被指定为指定初始化方法。`initWithPressure:treadDepth:` 是个不错的选择，它参数最多，也是最灵活的初始化方法。\n\
  \n为了履行指定初始化方法的职责，其他所有初始化方法都应基于 `initWithPressure:treadDepth:` 来实现。代码示例如下：\n\n```objectivec\n\
  - (id) init\n{\n  if (self = [self initWithPressure: 34 treadDepth: 20])\n  {\n\
  \  }\n  return (self);\n} // init\n\n- (id) initWithPressure: (float) p\n{\n  if\
  \ (self = [self initWithPressure: p treadDepth: 20.0])\n  {\n  }\n  return (self);\n\
  } // initWithPressure\n\n- (id) initWithTreadDepth: (float) td\n{\n  if (self =\
  \ [self initWithPressure: 34.0 treadDepth: td])\n  {\n  }\n  return (self);\n} //\
  \ initWithTreadDepth\n```\n\n**注意** 你并不需要在 `initWithPressure:treadDepth:` 的 `if`\
  \ 语句中保留空方法体。我们之所以这样写，是为了让所有 `init` 方法保持一致的风格。\n\n### 添加 AllWeatherRadial 的初始化方法\n\
  \n现在，轮到为 `AllWeatherRadial` 添加初始化方法了。我们只需重写指定初始化方法：\n\n```objectivec\n- (id) initWithPressure:\
  \ (float) p\n  treadDepth: (float) td\n{\n  if (self = [super initWithPressure:\
  \ p treadDepth: td])\n  {\n    rainHandling = 23.7;\n    snowHandling = 42.5;\n\
  \  }\n  return (self);\n} // initWithPressure:treadDepth\n```\n\n现在再次运行程序时，默认值已经正确设置：\n\
  \n```\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial: 34.0 / 20.0\
  \ / 23.7 / 42.5\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial:\
  \ 34.0 / 20.0 / 23.7 / 42.5\n```\n\nI am a slant-6. VROOOM!\n\n确实好使！\n\n### 初始化方法规则\n\
  \n-   你并非一定要为类创建初始化方法。如果不需要设置任何状态，或者 `alloc` 将内存全部清零的默认行为已经足够，你可以选择不编写 `init` 方法。\n\
  -   如果确实要编写初始化方法，请确保在自己的指定初始化方法中调用了父类的指定初始化方法。\n-   如果包含多个初始化方法，请选定一个作为指定初始化方法。该方法将负责调用父类的指定初始化方法。如前所述，所有其他初始化方法都应基于你的指定初始化方法来实现。\n\
  \n## 总结\n\n本章介绍了关于对象分配与初始化的全部内容。在 Cocoa 中，这是两个独立的过程：`alloc`（来自 `NSObject` 的类方法）负责分配一块内存并将其清零；而\
  \ `init` 方法（实例方法）则负责将对象启动并运行起来。\n\n\n一个类可以有多个`init`方法。这些`init`方法通常是便捷方法，可以让你更方便地按照期望的方式配置对象。你需要选择其中一个`init`方法作为指定初始化器（`designated\
  \ initializer`）。所有其他的`init`方法都应基于该指定初始化器来编写。\n\n在你自己的`init`方法中，你需要调用你自己的指定初始化器或父类的指定初始化器。请务必将父类初始化器的返回值赋值给`self`，并从你的`init`方法中返回该值。父类有可能决定返回一个完全不同的对象。\n\
  \n接下来要介绍的是属性（`Properties`），这是一种快速便捷地创建访问器方法的方式。\n\n"
- "# 第 11 章 属性\n\n还记得在很久以前，我们为实例变量编写访问器方法的时候吗？我们编写了大量样板代码，既要创建`–setBlah`方法来设置对象的`blah`属性（显而易见），又要创建`–blah`方法来获取它。如果属性是一个对象，我们还需要保留新对象并释放旧对象。市面上有一些实用工具，可以将你的类定义转换为方法声明和定义，然后你可以将其粘贴到文件中。但即便如此，编写访问器方法仍然是一项大量令人麻木的工作，而这些精力本可以更好地用于实现你程序中独特而酷炫的功能。\n\
  \n在 Objective-C 2.0 中，Apple 引入了**属性**，它结合了新的编译器指令和新的属性访问语法。新的属性特性大大减少了你必须编写的无脑代码量。在本章中，我们将修改`10.01\
  \ CarPartsInit`项目以使用属性。本章的最终代码可以在`11.01 CarProperties`项目中找到。\n\n请记住，Objective-C\
  \ 2.0 的特性只能在 Mac OS X 10.5（Leopard）或更高版本上使用，所以如果你需要支持较老的系统，必须三思而后行。属性在 Cocoa 的新版本（特别是炫酷的\
  \ Core Animation 特性）中大量使用，在 iOS 开发中也频繁使用，因此非常值得熟悉。\n\n### 精简属性值\n\n首先，我们将转换一个相对简单的类`AllWeatherRadial`，使其使用属性。为了让讨论更有趣一点，我们将在`main`函数中添加一些调用，来改变我们创建的`AllWeatherRadial`对象的一些值。我们模拟某人从不同的商店购买了四个打折轮胎，因此四个轮胎的操控特性各不相同。\n\
  \n下面是更新后的`main`函数，新添加的行以粗体显示：\n\n```\nint main(int argc, const char * argv[])\n\
  {\n    @autoreleasepool\n    {\n        Car *car = [[Car alloc] init];\n       \
  \ for (int i = 0; i < 4; i++)\n        {\n            AllWeatherRadial *tire;\n\
  \            tire = [[AllWeatherRadial alloc] init];\n            [tire setRainHandling:20+i];\n\
  \            [tire setSnowHandling:28+i];\n            NSLog(@\"tire %d's handling\
  \ is %.f %.f\", i,\n                  [tire rainHandling], [tire snowHandling]);\n\
  \            [car setTire:tire atIndex:i];\n            [tire release];\n      \
  \  }\n        \n        Engine *engine = [[Slant6 alloc] init];\n        [car setEngine:engine];\n\
  \        [car print];\n        [car release];\n    }\n    return (0);\n}\n```\n\n\
  如果你现在运行程序，会得到以下输出，显示了我们新改变的轮胎操控值：\n\n```\ntire 0's handling is 20 28\ntire 1's handling\
  \ is 21 29\ntire 2's handling is 22 30\ntire 3's handling is 23 31\nAllWeatherRadial:\
  \ 34.0 / 20.0 / 20.0 / 28.0\nAllWeatherRadial: 34.0 / 20.0 / 21.0 / 29.0\nAllWeatherRadial:\
  \ 34.0 / 20.0 / 22.0 / 30.0\nAllWeatherRadial: 34.0 / 20.0 / 23.0 / 31.0\nI am a\
  \ slant-6. VROOOM!\n```\n\n### 精简接口\n\n现在让我们看看`AllWeatherRadial`的类接口：\n\n```objective-c\n\
  #import <Foundation/Foundation.h>\n#import \"Tire.h\"\n\n@interface AllWeatherRadial\
  \ : Tire\n{\n    float rainHandling;\n    float snowHandling;\n}\n- (void) setRainHandling:\
  \ (float) rainHanding;\n- (float) rainHandling;\n- (void) setSnowHandling: (float)\
  \ snowHandling;\n- (float) snowHandling;\n@end // AllWeatherRadial\n```\n\n现在你应该已经对此非常熟悉了。让我们用属性的方式来清理它：\n\
  \n```objective-c\n#import <Foundation/Foundation.h>\n#import \"Tire.h\"\n\n@interface\
  \ AllWeatherRadial : Tire\n{\n    float rainHandling;\n    float snowHandling;\n\
  }\n@property float rainHandling;\n@property float snowHandling;\n@end // AllWeatherRadial\n\
  ```\n\n是不是更简单了？不需要那四个方法定义了。注意，我们增加了一对以`@`符号开头的关键字。回忆一下，`@`符号是“Objective-C 的独特语法即将出现”的信号！`@property`是一个新的编译器特性，用于声明一个新的对象属性。\n\
  \n`@property float rainHandling;`表明`AllWeatherRadial`类的对象有一个`float`类型的属性，名为`rainHandling`。它还表明你可以通过调用`–setRainHanding:`来设置该属性，并通过调用`-rainHandling`来访问该属性。你现在就可以运行程序，其行为与之前完全一样。`@property`所做的仅仅是自动声明该属性的`setter`和`getter`方法。该属性实际上不必与实例变量的名称完全一致，但在大多数情况下是一致的。我们稍后会讨论这个问题。你还可以对属性进行一些额外的配置，我们稍后也会讨论，请耐心等待。\n\
  \n### 精简实现\n\n现在，让我们再次看看`AllWeatherRadial`的实现：\n\n```objective-c\n#import \"AllWeatherRadial.h\"\
  \n\n@implementation AllWeatherRadial\n- (id) initWithPressure: (float) p treadDepth:\
  \ (float) td\n{\n    if (self = [super initWithPressure: p treadDepth: td])\n  \
  \  {\n        rainHandling = 23.7;\n        snowHandling = 42.5;\n    }\n    return\
  \ (self);\n} // initWithPressure:treadDepth\n\n- (void) setRainHandling: (float)\
  \ rh\n{\n    rainHandling = rh;\n} // setRainHandling\n\n- (float) rainHandling\n\
  {\n    return (rainHandling);\n} // rainHandling\n\n- (void) setSnowHandling: (float)\
  \ sh\n{\n    snowHandling = sh;\n} // setSnowHandling\n\n- (float) snowHandling\n\
  {\n    return (snowHandling);\n} // snowHandling\n\n- (NSString *) description\n\
  {\n    NSString *desc;\n    desc = [[NSString alloc] initWithFormat:\n         \
  \   @\"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f\",\n            [self pressure],\
  \ [self treadDepth],\n            [self rainHandling],\n            [self snowHandling]];\n\
  \    return (desc);\n} // description\n@end // AllWeatherRadial\n```\n\n在上一章中，我们讨论了`init`方法、指定初始化器、所有的`setter`和`getter`方法，以及`description`方法。现在，我们将毫不留情地删除所有`setter`和`getter`方法，并用两行代码替换它们：\n\
  \n```objective-c\n#import \"AllWeatherRadial.h\"\n\n@implementation AllWeatherRadial\n\
  @synthesize rainHandling;\n@synthesize snowHandling;\n\n- (id) initWithPressure:\
  \ (float) p\n            treadDepth: (float) td\n{\n    if (self = [super initWithPressure:\
  \ p treadDepth: td])\n    {\n        rainHandling = 23.7;\n        snowHandling\
  \ = 42.5;\n    }\n    return (self);\n} // initWithPressure:treadDepth\n\n- (NSString\
  \ *) description\n{\n    NSString *desc;\n    desc = [[NSString alloc] initWithFormat:\n\
  \            @\"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f\", [self pressure],\
  \ [self treadDepth],\n            [self rainHandling], [self snowHandling]];\n \
  \   return (desc);\n} // description\n@end // AllWeatherRadial\n```\n\n`@synthesize`是一个编译器特性，意思是“为此属性创建访问器方法”。对于代码行`@synthesize\
  \ rainHandling;`，编译器会发出`–setRainHandling:`和`–rainHandling`的编译后代码。\n\n**注意** 你可能熟悉代码生成：Cocoa\
  \ 的访问器编写工具和其他平台上的 UI 构建器会生成源代码，然后进行编译。但`@synthesize`并非代码生成。你永远看不到实现`–setRainHandling:`和`–rainHandling`的源代码，但这些方法会存在并且可以被调用。这使\
  \ Apple 能够灵活地更改 Objective-C 中访问器的生成方式，从而实现更安全的实现或更好的性能。\n\n如果你在类中为属性提供了这些方法，编译器就不会再创建它们。编译器只创建缺失的方法。\n\
  \n如果你现在运行程序，会得到与修改前相同的结果。\n\n\n\n大多数属性都由一个变量支持，因此当你合成`getter`和`setter`时，编译器会自动创建一个与属性同名的实例变量。请注意，头文件中有两个变量，分别叫做`rainHandling`和`snowHandling`。`setter`和`getter`将使用这些变量。如果你没有声明这些变量，编译器会创建它们。我们可以在两个地方添加实例变量：头文件或实现文件。我们甚至可以混合使用，将一部分放在头文件中，另一部分放在实现文件中。\n\
  \n为什么我们要把它们放在一个地方而不是另一个地方呢？假设你有一个子类，并且想从子类中直接访问这些变量，而不是通过属性访问。在这种情况下，变量需要放在头文件中。如果变量仅用于你的类，你可以将它们移到`.m`文件中，从而清理公共接口。头文件将如下所示：\n\
  \n```objectivec\n@interface AllWeatherRadial : Tire\n\n@property float rainHandling;\n\
  \n@property float snowHandling;\n\n@end // AllWeatherRadial\n```\n\n实现文件将如下所示：\n\
  \n```objectivec\n@implementation AllWeatherRadial\n\n{\n    float rainHandling;\n\
  \    float snowHandling;\n}\n\n@synthesize rainHandling;\n@synthesize snowHandling;\n\
  \n- (id) initWithPressure: (float)p treadDepth: (float)td\n{\n    if (self = [super\
  \ initWithPressure: p treadDepth: td])\n    {\n        rainHandling = 23.7;\n  \
  \      snowHandling = 42.5;\n    }\n    return (self);\n} // initWithPressure:treadDepth\n\
  \n- (NSString *) description\n{\n    NSString *desc;\n    desc = [[NSString alloc]\
  \ initWithFormat:\n        @\"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f\",\n \
  \       [self pressure], [self treadDepth],\n        [self rainHandling],\n    \
  \    [self snowHandling]];\n    return (desc);\n} // description\n\n@end // AllWeatherRadial\n\
  ```\n\n正如你所看到的，头文件看起来更简洁，代码更少，这通常意味着它会给你带来更少的麻烦。\n\n我们可以更进一步：请记住，如果我们不指定实例变量，编译器会为我们创建它们。因此，我们可以删除这段代码而没有任何负面影响：\n\
  \n```objectivec\n{\n    float rainHandling;\n    float snowHandling;\n}\n```\n\n\
  （我们可以将整个代码块，包括花括号，都删除。）现在我们已经删除了大量代码，这很可能节省了我们输入和调试的时间。\n\n## 点符号的惊人之处\n\nObjective-C\
  \ 2.0 的属性引入了一种新的语法糖，使得访问对象属性变得更加容易。这些新特性也让 Objective-C 对习惯使用 C++ 和 Java 等语言的人来说更容易上手。\n\
  \n回顾一下我们添加到`main`函数中来改变轮胎操控值的两行新代码：\n\n```objectivec\n[tire setRainHandling: 20\
  \ + i];\n[tire setSnowHandling: 28 + i];\n```\n\n我们可以用以下代码替换它们：\n\n```objectivec\n\
  tire.rainHandling = 20 + i;\ntire.snowHandling = 28 + i;\n```\n\n如果你再次运行程序，你会看到相同的结果。我们使用`NSLog`来报告轮胎的操控值：\n\
  \n```objectivec\nNSLog(@\"tire %d's handling is %.f %.f\", i, [tire rainHandling],\
  \ [tire snowHandling]);\n```\n\n现在我们可以用以下代码替换它：\n\n```objectivec\nNSLog(@\"tire\
  \ %d's handling is %.f %.f\", i, tire.rainHandling, tire.snowHandling);\n```\n\n\
  点符号看起来很像 C 语言中的结构体访问和 Java 中的对象访问——这是有意为之。当你看到点号出现在等号左侧时，相应属性名的`setter`（即`-setRainHandling:`和`-setSnowHandling:`）将被调用。否则，如果你看到点号出现在对象变量旁边，相应属性名的`getter`（即`-rainHandling`和`snowHandling`）将会被调用。\n\
  \n**注意：** 点符号只是调用访问器方法的简写形式。在底层并没有发生任何额外的魔法。在第 18 章中，我们将讨论键值编码，它实际上会使用一些硬核的运行时魔法。属性点符号与键值编码在幕后所做的酷事情之间没有关联。\n\
  \n如果你在使用属性，并且遇到了关于访问非结构体内容的奇怪错误信息，请确保你已经包含了所使用类所需的所有头文件。\n\n\n\n关于属性所引入的内容，基本上就是这些了。当然，我们还需要讨论一些额外的场景，以确保正确处理对象属性，并避免同时暴露\
  \ setter 和 getter。接下来我们就来谈这些。\n\n## 反对使用属性\n\n到目前为止，我们关注的是标量类型（特别是 `float`）的属性，但同样的技术也适用于\
  \ `int`、`char`、`BOOL` 和 `struct`。例如，如果需要，你也可以声明一个 `NSRect` 属性。\n\n对象会带来一些额外的复杂性。回想一下，当对象在我们的存取方法中传递时，我们会对其进行\
  \ `retain` 和 `release`。对于某些对象值，特别是字符串值，你总是希望对其进行 `-copy` 操作。然而，对于其他对象值，比如委托（delegate），我们将在下一章讨论，你根本不想\
  \ retain 它们。\n\n**注意**：等等，稍等一下。这个拷贝和不 retain 是怎么回事？\n\n你希望对字符串参数进行拷贝。一个常见的错误是从用户界面（例如文本字段）获取一个字符串，并将其用作某个对象的名称。从文本字段中获取的字符串通常是可变字符串，当用户输入新内容时，它们会发生变化。拷贝该字符串可以防止其值意外改变。\n\
  \n那么，关于不 retain 对象呢？有一个特殊情况，称为 **retain 循环**，在这种情况下，引用计数机制会失效。如果你有一个所有者/被所有者关系，比如\
  \ `Car` 和 `Engine`，你希望 `Car` retain（拥有）`Engine`，但反之则不然。`Engine` 不应该 retain 它被安装到的那辆\
  \ `Car`。如果 `Car` retain 了 `Engine`，而 `Engine` 又 retain 了 `Car`，那么两者的引用计数都不会归零，两者也就永远不会被清理。`Car`\
  \ 的 `dealloc` 方法不会被调用，直到 `Engine` 在它自己的 `dealloc` 中释放了 `Car`；而 `Engine` 的 `dealloc`\
  \ 方法也不会被调用，直到 `Car` 的 `dealloc` 释放了 `Engine`。它们就这样僵持在那里，互相凝视，等待对方先眨眼。通用规则是：所有者对象\
  \ retain 被拥有的对象，而不是反过来。\n\n让我们给 `Car` 添加一个新功能，这样我们就可以尝试一些新的属性语法了。这会很令人兴奋！我们将给车一个名字。我们先采用老派的方式，使用传统的存取方法。首先是\
  \ `Car.h`，新内容以粗体显示：\n\n```objc\n@class Tire;\n\n@class Engine;\n\n@interface Car\
  \ : NSObject\n\n{\n    NSString *name;\n    NSMutableArray *tires;\n    Engine *engine;\n\
  }\n\n- (void)setName: (NSString *) newName;\n- (NSString *) name;\n- (void) setEngine:\
  \ (Engine *) newEngine;\n- (Engine *) engine;\n- (void) setTire: (Tire *) tire atIndex:\
  \ (int) index;\n- (Tire *) tireAtIndex: (int) index;\n- (void) print;\n\n@end //\
  \ Car\n```\n\n现在，我们添加存取方法的实现（注意我们正在拷贝 `name`），同时为车选择一个默认名称，并在 `description` 中显示它：\n\
  \n```objc\n#import \"Car.h\"\n\n@implementation Car\n\n- (id) init\n{\n    if (self\
  \ = [super init])\n    {\n        name = [[NSString alloc] initWithString:@\"Car\"\
  ];\n        tires = [[NSMutableArray alloc] init];\n        int i;\n        for\
  \ (i = 0; i < 4; i++) {\n            [tires addObject: [NSNull null]];\n       \
  \ }\n    }\n    return (self);\n} // init\n\n- (void) dealloc\n{\n    [name release];\n\
  \    [tires release];\n    [engine release];\n    [super dealloc];\n} // dealloc\n\
  \n- (void)setName: (NSString *)newName\n{\n    [name release];\n    name = [newName\
  \ copy];\n} // setName\n\n- (NSString *)name\n{\n    return (name);\n} // name\n\
  \n- (Engine *) engine\n{\n    return (engine);\n} // engine\n\n- (void) setEngine:\
  \ (Engine *) newEngine\n{\n    [newEngine retain];\n    [engine release];\n    engine\
  \ = newEngine;\n} // setEngine\n\n- (void) setTire: (Tire *) tire atIndex: (int)\
  \ index\n{\n    [tires replaceObjectAtIndex: index withObject: tire];\n} // setTire:atIndex:\n\
  \n- (Tire *) tireAtIndex: (int) index\n{\n    Tire *tire;\n    tire = [tires objectAtIndex:\
  \ index];\n    return (tire);\n} // tireAtlndex:\n\n- (void) print\n{\n    NSLog\
  \ (@\"%@ has:\", name);\n    for (int i = 0; i < 4; i++)\n    {\n        NSLog (@\"\
  %@\", [self tireAtIndex: i]);\n    }\n    NSLog (@\"%@\", engine);\n} // print\n\
  \n@end // Car\n```\n\n然后我们在 `main` 中设置名称：\n\n```objc\nCar *car = [[Car alloc] init];\n\
  [car setName: @\"Herbie\"];\n```\n\n\n\n运行程序，您会看到输出开头的汽车名称。好的，现在开始为`Car`添加属性。以下是完整的`Car.h`文件：\n\
  \n```objc\n@class Tire;\n\n@class Engine;\n\n@interface Car : NSObject\n\n{\n  \
  \  NSString *name;\n    NSMutableArray *tires;\n    Engine *engine;\n}\n\n@property\
  \ (copy) NSString *name;\n\n@property (retain) Engine *engine;\n\n- (void) setTire:\
  \ (Tire *) tire atIndex: (int) index;\n\n- (Tire *) tireAtIndex: (int) index;\n\n\
  - (void) print;\n\n@end // Car\n```\n\n您会注意到简单的访问器声明消失了，取而代之的是`@property`声明。您可以通过添加额外属性来装饰`@property`，以表达您对属性行为的精确意图。由于为`name`添加了`copy`，编译器和类的使用者都知道`name`将被复制。这可以简化使用该类的程序员的开发工作，因为他们知道自己无需复制从文本字段中获取的字符串。另一方面，`engine`仅通过`retain/release`来管理。如果您不提供任何一项，编译器将默认使用`assign`，这对于对象来说通常不是您想要的行为。\n\
  \n**注**：您可以使用其他装饰，例如`nonatomic`，它能在属性不会被用于多线程环境时使访问器更快。桌面机器速度很快，因此将属性设为`nonatomic`并不会带来真正的性能提升，但\
  \ iOS 开发者经常使用它来在资源受限的移动设备上榨取更多性能。如果您不希望属性对象被保留，也可以使用`assign`，以帮助避免保留循环。\n\n默认情况下，如果您没有为属性指定任何属性，它们会被赋予默认属性`nonatomic`和`assign`。您只能为可保留指针（即\
  \ Objective-C 对象）指定`retain`和`copy`属性。所有其他类型，例如 C 语言和非可保留指针，必须使用`assign`并手动管理内存。\n\
  \n如果您自己提供了`setter`或`getter`（或两者），则不能使用`atomic`属性；必须使用`nonatomic`。\n\n`Car.m`有两个主要变化。`name`和`engine`访问器被删除，并添加了两条`@synthesize`指令：\n\
  \n```objc\n@implementation Car\n\n@synthesize name;\n\n@synthesize engine;\n```\n\
  \n最后，`main`使用点符号来设置内容：\n\n```objc\nCar *car = [[Car alloc] init];\n\ncar.name =\
  \ @\"Herbie\";\n\n…\n\ncar.engine = [[Slant6 alloc] init];\n```\n\n### 命名别名（Appellation）\n\
  \n在本章的所有代码中，属性名称与支持该属性的实例变量名称相同。这种模式非常常见，很可能您大部分时间都会使用它。不过，有时您可能希望实例变量使用一个名称，而公开属性使用另一个名称。\n\
  \n假设我们想将`Car`中的`name`实例变量改名为其他名称，比如`appellation`。我们只需在`Car.h`中更改实例变量的名称：\n\n```objc\n\
  @interface Car : NSObject\n\n{\n    NSString *appellation;\n    NSMutableArray *tires;\n\
  \    Engine *engine;\n}\n\n@property (copy) NSString *name;\n\n@property (retain)\
  \ Engine *engine;\n```\n\n然后更改`@synthesize`指令：\n\n```objc\n@synthesize name = appellation;\n\
  ```\n\n编译器仍然会创建`-setName:`和`-name`，但会在其实现中使用`appellation`实例变量。\n\n但是当您编译时，会看到一些错误。您可能还记得，我们直接访问了`name`实例变量，而它已经被更改了。我们可以选择在代码中搜索并替换`name`，或者将直接访问实例变量改为使用访问器。在`init`中，将\n\
  \n```objc\nname = @\"Car\";\n```\n\n改为\n\n```objc\nself.name = @\"Car\";\n```\n\n\
  这个`self-dot-name`是什么意思？这是一种消除歧义的方式，用于让编译器知道我们想要通过访问器进行跳转。如果我们只使用裸的`name`，编译器会认为我们在直接修改实例变量。要使用访问器，我们可以写`[self\
  \ setName:@\"Car\"]`。请记住，点号只是进行完全相同调用的简写，因此`self.name = @\"Car\"`只是表达同一件事的另一种方式。\n\
  \n最后，我们需要修复第一个`NSLog`调用。\n\n\n\n`NSLog (@\"%@ has:\", self.name);`\n\n现在，我们可以将 `appellation`\
  \ 重命名为其他名称，比如 `nickname` 或 `moniker`。我们只需要修改实例变量名以及在 `@synthesize` 中使用的名称即可。\n\n\
  由于汽车的子类无需直接访问变量，我们将它们从头文件中移除。我们可以去掉 `name` 和 `engine` 变量，因为这些将由编译器自动创建。同时，我们可以将\
  \ `tires` 数组移到实现文件中。这样一来，我们的头文件就更加简洁了（简洁即更优）。\n\n修复完成后，让我们回到 `*AllWeatherRadial.m*`\
  \ 文件。细心的读者可能会注意到，在描述方法中，我们仍在使用方法来获取轮胎的属性。现在让我们全部改用点语法。调整后的描述方法如下：\n\n```\n- (NSString\
  \ *) description\n{\n    NSString *desc;\n    desc = [[NSString alloc] initWithFormat:\n\
  \            @\"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f\",\n            self.pressure,\
  \ self.treadDepth, self.rainHandling, self.snowHandling];\n    return (desc);\n\
  } // description\n```\n\n接下来，我们将修复 `Tire` 类以及 `pressure` 和 `treadDepth` 的属性，并移除\
  \ getter 和 setter 方法。我们在不丢失任何功能的前提下简化了 `Tire` 接口（及代码）。\n\n```\n@interface Tire :\
  \ NSObject\n@property float pressure;\n@property float treadDepth;\n- (id) initWithPressure:\
  \ (float) pressure;\n- (id) initWithTreadDepth: (float) treadDepth;\n- (id) initWithPressure:\
  \ (float) pressure\n             treadDepth: (float) treadDepth;\n@end // Tire\n\
  ```\n\n我们还从实现文件中移除了 setter 和 getter 方法。清理不必要的冗余代码，剔除可能潜藏错误的代码，这个过程真是令人愉悦。\n\n还有一点：你可能还记得，我们为\
  \ `Car` 添加了 `name` 属性，并为其设置了 `copy` 特性。这意味着，当我们赋值给 `name` 时，`Car` 会复制一份字符串并存储它。如果当时未使用\
  \ ARC，我们还需要在 `Car` 的 `dealloc` 方法中添加一个 `release`，就像这样：\n\n```\n[name release];\n\
  ```\n\n但由于我们使用了 ARC，就无需为此担心了；编译器会自动帮我们插入释放操作。真是 ARC 神助攻！\n\n## 只读属性\n\n你可能有一个对象，其属性是只读的。这个属性可能是一个动态计算的值（例如香蕉的表面积），也可能是一个你希望其他对象只能读取但不能修改的值（例如你的驾照号码）。你可以通过\
  \ `@property` 的更多特性来为这些场景编码。\n\n默认情况下，属性是可变的：你可以对其进行读写操作。属性有一个 `readwrite` 特性，你可以用它来明确指定这点。由于属性默认就是可变的，你通常不会用到它，但当你需要明确表达意图时，它就在那里。我们原本可以在\
  \ `*Car.h*` 中使用 `readwrite`：\n\n```\n@property (readwrite, copy) NSString *name;\n\
  @property (readwrite, retain) Engine *engine;\n```\n\n但我们并没有这样做，因为我们通常希望消除、废除并摆脱冗余和重复（以及一遍又一遍地说同样的话）。\n\
  \n回到只读属性的讨论，假设我们有一个属性，比如我们的驾照号码或鞋码，我们不希望任何人修改它。我们可以对 `@property` 使用 `readonly` 特性。示例如下：\n\
  \n```\n@interface Me : NSObject\n{\n    float shoeSize;\n    NSString *licenseNumber;\n\
  }\n@property (readonly) float shoeSize;\n@property (readonly) NSString *licenseNumber;\n\
  @end\n```\n\n当编译器看到 `@property` 被声明为 `readonly` 时，它会为该属性生成一个 getter 方法，但不会生成 setter\
  \ 方法。`Me` 的使用者可以调用 `–shoeSize` 和 `–licenseNumber`，但如果尝试调用 `-setShoeSize:`，编译器会报错。使用点语法时也会出现同样的情况。\n\
  \n## 我偏要亲力亲为\n\n我们之前提到，属性由变量支持，并且编译器会为你自动生成 getter 和 setter。但如果你不想这样呢？如果你不希望为自己的属性准备变量、getter\
  \ 和 setter 呢？\n\n对此，你也可以如愿以偿。你可以使用关键字 `@dynamic` 来告诉编译器不要为属性生成任何代码或创建变量。接着前面的例子，让我们为\
  \ `Me` 类添加一个 `bodyMassIndex` 属性。\n\n由于身体质量指数是根据一个人的身高和体重计算得出的，我们无法为其存储一个固定值。相反，我们希望创建一个访问器，在运行时动态计算该值。因此，我们使用\
  \ `@dynamic` 来声明属性，并告诉编译器无需操心创建变量或 getter——我们自己来处理。\n\n```\n@property (readonly)\
  \ float bodyMassIndex;\n@dynamic bodyMassIndex;\n\n- (float)bodyMassIndex\n{\n \
  \   ///计算并返回 bodyMassIndex\n}\n```\n\n如果你声明了一个动态属性，但尝试调用相应的 getter 或 setter 而未提供实现，则会收到错误提示。\n\
  \n## 我不喜欢这些方法名\n\n有时，你可能不喜欢默认生成的方法名。它们的形式通常是 `blah` 和 `setBlah:`。为了解决这个问题，你可以指定编译器生成的\
  \ getter 和 setter 的名称。使用 `getter=` 和 `setter=` 特性来定义你偏好的方法名。需要注意的是，如果你这样做，将会破坏键值编码约定（详见第\
  \ 19 章），因此你应该有充分的理由才使用这个特性。\n\n以下是一个适用于布尔类型属性的有用模式示例：\n\n```\n@property (getter=isHidden)\
  \ BOOL hidden;\n```\n\n这告诉编译器，为 getter 生成 `isHidden`，为 setter 生成 `setHidden:`。\n\
  \n## 可惜，属性并非万能\n\n你会注意到，我们没有将 `Car` 的轮胎方法转换为属性：\n\n```\n- (void) setTire: (Tire\
  \ *) tire atIndex: (int) index;\n- (Tire *) tireAtIndex: (int) index;\n```\n\n这是因为这些方法不符合属性所涵盖的相当狭窄的方法范围。属性只允许你替换\
  \ `–setBlah` 和 `–blah` 方法，但不适用于需要额外参数的方法（例如指定轮胎在汽车上的位置）。\n\n## 总结\n\n在本章中，我们讨论了属性，这是一种减少你在处理对象属性常见操作时需要编写（以及后续阅读）的代码量的方式。使用\
  \ `@property` 指令来告知外界：“嘿，这个对象拥有一个名为 xxx、类型为 yyy 的属性。”同时，使用该指令来传递属性的相关信息，如其可变性（`readonly`\
  \ 或 `readwrite`）。在幕后，编译器会自动为对象属性的 setter 和 getter 生成方法声明。\n\n使用 `@synthesize` 指令来告诉编译器为访问器生成实现代码。你可以控制生成的实现会影响哪一个实例变量。如果你不想使用默认行为，也可以自由编写自己的访问器代码。你可以使用\
  \ `@dynamic` 来告诉编译器不要生成变量或代码。\n\n点语法虽然通常在与属性相关的上下文中介绍，但它仅仅是调用对象的 setter 和 getter\
  \ 的简写形式。点语法减少了你的键盘敲击量，对来自其他语言的开发者来说也更为顺手。\n\n接下来将要介绍的是类别（Categories），这是一种 Objective-C\
  \ 特有的扩展现有类的方式，即使你没有它们的原始代码也能实现扩展！千万别错过。\n\n"
- "# 第 12 章\n\n### 类别\n\n在编写面向对象程序时，你常常需要为现有类添加一些新行为：你总是可以为对象创建新的“技能点”。例如，你设计了一种新型轮胎，因此你可以子类化\
  \ `Tire` 并添加炫酷的新功能。当你想为现有类添加行为时，通常的做法就是创建一个子类。\n\n\n\n但有时，子类化并不方便。例如，你可能想为 `NSString`\
  \ 添加一些新行为，但你知道 `NSString` 实际上是类簇的前端，这使得子类化变得困难。在其他情况下，你或许能够创建子类，但你使用的工具包或库可能无法处理新类的对象。例如，当你使用\
  \ `stringWithFormat:` 类方法创建新字符串时，你的 `NSString` 子类并不会被返回。\n\nObjective-C 采用的动态运行时派发机制允许你向现有类添加方法。嘿，听起来很不错！这些新方法在\
  \ Objective-C 中被称为**分类（Categories）**。\n\n## 创建分类\n\n分类是一种向现有类添加新方法的方式。想给某个类添加新方法？放手去做吧！你可以对任何类执行此操作，甚至包括你没有源代码的类。\n\
  \n例如，假设你正在编写一个填字游戏程序，它会接收一系列字符串，计算每个字符串的长度，并将这些长度放入 `NSArray` 或 `NSDictionary` 中。在将每个长度值添加到\
  \ `NSArray` 或 `NSDictionary` 之前，你需要先将其包装成 `NSNumber` 对象。\n\n你可以编写如下代码：\n\n```\n\
  NSNumber *number;\n\nnumber = [NSNumber numberWithUnsignedInt: [string length]];\n\
  \n// ……对 number 进行某些操作\n```\n\n但这很快就会变得繁琐。相反，你可以为 `NSString` 添加一个替你完成此任务的分类。事实上，我们现在就这么做。`LengthAsNSNumber`\
  \ 项目位于 *12.01 LengthAsNSNumber* 项目目录中，其中包含了向 `NSString` 添加此类分类的代码。\n\n程序员通常将分类放在单独的文件中，文件名通常遵循\
  \ *ClassName+CategoryName* 的格式。因此，在我们的例子中，文件名将是 *NSString+NumberConvenience*。这不是强制要求，但这是一个好习惯。\n\
  \n## 让我们来创建一个分类\n\nXcode 让添加分类变得非常简单。它甚至根据我们刚才描述的约定，自动为文件正确命名。\n\n要创建分类，请打开项目，转到导航器，选择希望文件出现的分组。然后，选择\
  \ File ![image](img/9781430241881_arrow_fmt.jpg) New ![image](img/9781430241881_arrow_fmt.jpg)\
  \ New File 或输入快捷键 ![image](img/Rangoli1.jpg) N。在“新建文件”窗口中，单击左侧窗格中的 Cocoa，然后在右侧选择\
  \ *Objective-C category*（参见图 12-1）。\n\n![9781430241881_Fig12-01.tif](img/9781430241881_Fig12-01_fmt.jpg)\n\
  \n图 12-1. 为分类创建一个新文件\n\n点击 Next，在下一个屏幕（参见图 12-2）中，在“Category”字段输入 *NumberConvenience*，在“Category\
  \ on”字段输入 *NSString*；`NSString` 是我们想要添加方法的类。点击 Next 继续。\n\n![9781430241881_Fig12-02.tif](img/9781430241881_Fig12-02_fmt.jpg)\n\
  \n图 12-2. 输入分类名称和关联的类\n\n下一个屏幕（如图 12-3 所示）会要求你选择文件保存位置以及将其添加到哪个目标和分组。通常，你可以接受 Xcode\
  \ 已经做出的选择。点击 Create，现在我们有了一个包含分类接口的头文件和一个可供我们添加方法的实现文件。\n\n![9781430241881_Fig12-03.tif](img/9781430241881_Fig12-03_fmt.jpg)\n\
  \n图 12-3. 指定文件位置、源分组和目标\n\n### `@interface`\n\n分类的声明看起来与类的声明非常相似：\n\n```\n@interface\
  \ NSString (NumberConvenience)\n\n- (NSNumber *) lengthAsNumber;\n\n@end // NumberConvenience\n\
  ```\n\n你应该会注意到这个声明中有几个有趣的地方。首先，提到了一个现有类，后面跟随着括号中的一个新名称。这意味着该分类叫做 `NumberConvenience`，并且它为\
  \ `NSString` 添加了方法。另一种说法是：“我们正在向 `NSString` 添加一个名为 `NumberConvenience` 的分类。”你可以为一个类添加任意多个分类，只要分类名称是唯一的即可。\n\
  \n你指定了要添加分类的类（`NSString`）和分类的名称（`NumberConvenience`），然后列出你要添加的方法，最后以 `@end` 结尾。你不能添加新的实例变量，因此这里没有像类声明中那样的实例变量部分。\n\
  \n你也可以向分类添加属性。由于不能添加实例变量，这些属性必须是 `@dynamic` 类型。添加属性的好处是可以使用点语法来访问 setter 和 getter\
  \ 方法。\n\n### `@implementation`\n\n毫不意外，`@interface` 部分有一个对应的 `@implementation` 部分。你将编写的方法放在\
  \ `@implementation` 中：\n\n```\n@implementation NSString (NumberConvenience)\n\n\
  - (NSNumber *) lengthAsNumber\n\n{\n\nNSUInteger length = [self length];\n\nreturn\
  \ ([NSNumber numberWithUnsignedInt:length]);\n\n} // lengthAsNumber\n\n@end // NumberConvenience\n\
  ```\n\n与分类的 `@interface` 类似，`@implementation` 也包含了类名和分类名，以及新方法的具体实现。\n\n`lengthAsNumber`\
  \ 方法通过调用 `[self length]` 获取字符串的长度。你将向该字符串发送 `lengthAsNumber` 消息。然后，使用该长度创建一个新的 `NSNumber`。\n\
  \n让我们花点时间讨论一下我们最喜欢的新话题之一：内存管理。这段代码正确吗？是的！`numberWithUnsignedInt` 不是 `alloc`、`copy`\
  \ 或 `new` 方法。因为它不属于这三者之一，所以它会返回一个我们可以假定其引用计数为 1 且已自动释放的对象。我们创建的 `NSNumber` 对象将在当前活跃的自动释放池被销毁时得到清理。\n\
  \n以下是这个新分类的实际应用。`main()` 创建了一个新的 `NSMutableDictionary`，添加了三个字符串作为键，并将这些字符串的长度作为值：\n\
  \n```\nint main(int argc, const char * argv[])\n\n{\n\n@autoreleasepool\n\n{\n\n\
  NSMutableDictionary *dict = [NSMutableDictionary dictionary];\n\n[dict setObject:[@\"\
  hello\" lengthAsNumber]\n\nforKey:@\"hello\"];\n\n[dict setObject:[@\"iLikeFish\"\
  \ lengthAsNumber]\n\nforKey:@\"iLikeFish\"];\n\n[dict setObject:[@\"Once upon a\
  \ time\" lengthAsNumber]\n\nforKey:@\"Once upon a time\"];\n\nNSLog (@\"%@\", dict);\n\
  \n}\n\nreturn 0;\n\n}\n```\n\n让我们按照老办法，一点一点地拆解这段代码。\n\n我们需要做的第一件事是将头文件导入到 `main()`\
  \ 中，以便我们知道 `NSString` 已经定义了此方法。在其他 `#import` 语句的末尾，我们添加如下内容：\n\n```\n#import \"\
  NSString+NumberConvenience.h\"\n```\n\n接下来，我们创建一个自动释放池，采用 ARC 友好的方式：\n\n```\n@autoreleasepool\
  \ {\n```\n\n不要忘记代码末尾的结束花括号。顺便提醒一下，这个池用于存放所有自动释放的对象。特别地，可变字典以及我们分类创建的所有 `NSNumber`\
  \ 对象最终都会在这个池中。\n\n创建完池之后，创建一个新的可变字典。回想一下，这个方便的 Cocoa 类允许我们存储键值对。\n\n```\nNSMutableDictionary\
  \ *dict = [NSMutableDictionary dictionary];\n```\n\n我们不能将像 int 这样的基本类型放入字典中，因此必须使用像\
  \ `NSNumber` 这样的包装类。幸运的是，我们闪亮的新分类使得将字符串长度嵌入到 `NSNumber` 中变得轻而易举。下面的代码将值 5 添加到字典中，使用了键\
  \ `@\"hello\"`：\n\n```\n[dict setObject: [@\"hello\" lengthAsNumber] forKey: @\"\
  hello\"];\n```\n\n\n\n那段代码看起来有点奇怪，但实际上它做的事情是正确的。请记住，`@\"string\"` 这种字符串实际上是完整的 `NSString`\
  \ 对象。它们像其他 `NSString` 对象一样响应消息。因为我们在 `NSString` 上添加了这个分类，所以任何字符串都会响应 `lengthAsNumber`，即使是像这样的字面量字符串。\n\
  \n这一点值得重复强调。这一点值得重复强调！**任何** `NSString` 都会响应 `lengthAsNumber`——这包括字面量字符串、来自 `description`\
  \ 方法的字符串、可变字符串、来自工具包其他部分的字符串、从文件加载的字符串、从广袤互联网获取的字符串等等。这种兼容性使得分类成为一个非常强大的概念。无需对 `NSString`\
  \ 进行子类化就能获得这种行为——它**就是行得通**。\n\n当你运行这个程序时，你会得到如下输出：\n\n```\n{\n    \"Once upon a\
  \ time\" = 16;\n    hello = 5;\n    iLikeFish = 9;\n}\n```\n\n### 糟糕的分类\n\n现在你已经对分类有些上瘾了，让我们稍微把你拉回现实。分类有两个限制。第一个是你不能向类添加新的实例变量。没有地方放置它们。\n\
  \n第二个限制涉及名称冲突，即你分类中的某个方法与现有方法同名。当名称冲突时，分类胜出。你的分类方法将完全替换原始方法，并且无法找回原始方法。有些程序员会给他们的分类方法添加前缀，以确保不会发生冲突。\n\
  \n**注意**：有一些技巧可以绕过无法添加新实例变量的限制。例如，你可以使用一个全局字典来存储对象与你想要关联的任何额外变量之间的映射。但如果你发现自己依赖于这些技巧，你可能需要考虑一下分类是否真的适合你当前的工作。\n\
  \n### 好的分类\n\n在 Cocoa 中，分类主要用于三个目的：将类的实现拆分到多个文件或多个框架中、为私有方法创建前向引用、以及为对象添加非正式协议。如果你不知道“非正式协议”是什么意思，不用担心。我们稍后会介绍。\n\
  \n### 克林特·伊斯特伍德会喜欢这个\n\n现在我们已经讨论了糟糕的和好的分类，让我们介绍一种特殊的分类，它有一个特殊的描述：**类扩展**。这个分类的特殊之处之一在于它没有名字。这意味着什么？嗯，我们刚刚经历了一个过程：为分类命名，并在定义\
  \ `@interface` 时使用那个名字。而这个特殊的类扩展分类是没有名字的。下面是关于类扩展分类的完整说明：\n\n*   就像我们指出的，它没有名字。\n\
  *   你可以将其用于你有源代码的类（也就是说，你自己的类）。\n*   你可以添加实例变量。\n*   你可以将变量的可变性从 `readonly` 改为 `readwrite`。\n\
  *   你可以拥有任意数量的类扩展。\n\n看看项目 *12.02 Class Extension*。我们创建了一个简单的类，叫做 `Things`，它看起来像这样：\n\
  \n```\n@interface Things : NSObject\n\n@property (assign) NSInteger thing1;\n\n\
  @property (readonly, assign) NSInteger thing2;\n\n- (void)resetAllValues;\n\n@end\n\
  ```\n\n这个类有两个属性和一个方法。我们将 `thing2` 属性标记为 `readonly`，这就是该类公共接口中可见的全部内容。但事情远不止于此，当我们窥探其实现时就会看到。首先，注意这段代码：\n\
  \n```\n@interface Things ()\n{\n    NSInteger thing4;\n}\n\n@property (readwrite,\
  \ assign) NSInteger thing2;\n@property (assign) NSInteger thing3;\n\n@end\n```\n\
  \n这看起来几乎就像我们在定义一个类，只是没有父类。我们实际上是在对 `Things` 类进行**扩展**，通过添加私有属性和方法。这就是为什么它被称为**类扩展**。\n\
  \n看看 `thing2` 属性，你可能会注意到我们已经在头文件中定义了这个属性。我们在这里对它在做什么？我们正在改变它的可变性，将其标记为 `readwrite`，这样编译器就会生成一个\
  \ setter，但对该类的访问保持私有。公共接口只有 getter。\n\n我们还添加了一个私有的 `thing3` 属性，只能在此类内部使用。我们还添加了一个名为\
  \ `thing4` 的实例变量，它也是私有的。\n\n那是什么警报声？是的，内存警察来了，想看看我们打算如何处理我们的新对象。因为我们使用的是 ARC，所以我们不需要释放对象，它们在自动释放池结束时会被自动释放。内存警察很满意。\n\
  \n那么，你为什么要做这样的事情呢？面向对象编程的一个特点是信息隐藏。你只想暴露用户需要看到的东西，而隐藏其他内容，比如实现细节。这些技术能帮你实现这一点。\n\
  \n我们将这个分类放在 `.m` 文件中，但我们也可以将其放在私有头文件（`ThingsPrivate.h`）中，并允许 `Things` 的子类或友类访问这些内容。\n\
  \n你可以有多个类扩展分类，这可能会导致难以发现的 bug，所以请明智地使用这个特性。\n\n现在运行程序会得到：\n\n```\n1    0    0\n\
  200  300  400\n```\n\n## 使用分类拆分实现\n\n正如你在第 6 章中看到的，你可以将类的接口放在头文件中，将实现放在 `.m` 文件中。但你无法将一个\
  \ `@implementation` 拆分到多个 `.m` 文件中。如果你有一个很大的类想要拆分到多个 `.m` 文件中，你可以使用分类来完成这个工作。\n\n\
  以 AppKit 提供的 `NSWindow` 类为例。如果你查看 `NSWindow` 的文档，你会发现成百上千个方法；`NSWindow` 文档打印出来超过\
  \ 60 页（别在家试这个）。\n\n将 `NSWindow` 的所有代码放在一个文件中会使其变得巨大且难以维护，这对 Cocoa 开发团队来说负担不小，更不用提我们这些可怜的开发者了。如果你查看头文件并搜索\
  \ `@interface`，你会看到官方的类接口：\n\n```\n@interface NSWindow : NSResponder\n```\n\n然后，还有一大堆分类，包括这些：\n\
  \n```\n@interface NSWindow(NSKeyboardUI)\n@interface NSWindow(NSToolbarSupport)\n\
  @interface NSWindow(NSDrag)\n@interface NSWindow(NSCarbonExtensions)\n```\n\n这种分类的用法允许所有键盘用户界面相关的东西放在一个源文件中，工具栏代码放在另一个文件中，拖放功能放在另一个文件中，等等。这些分类还将方法分成了逻辑组，让阅读头文件的人更容易理解。这正是我们将要尝试的，只不过规模小一些。\n\
  \n### 在我们的项目中使用分类\n\n`CategoryThing` 项目位于 *12.03 CategoryThing* 文件夹中，它有一个简单的类，分布在几个实现文件中。\n\
  \n首先是 `CategoryThing.h`，它包含了类声明和一些分类。这个文件以导入 Foundation 框架开头，然后是用三个整型实例变量声明的类：\n\
  \n```\n#import <Foundation/Foundation.h>\n\n@interface CategoryThing : NSObject\n\
  {\n    NSInteger thing1;\n    NSInteger thing2;\n    NSInteger thing3;\n}\n\n@end\
  \ // CategoryThing\n```\n\n在类声明之后，有三个分类，每个分类都有一个实例变量的访问器方法。我们将把这些方法的实现放到不同的文件中。\n\
  \n```\n@interface CategoryThing (Thing1)\n- (void)setThing1:(NSInteger)thing1;\n\
  - (NSInteger)thing1;\n@end // CategoryThing (Thing1)\n\n@interface CategoryThing(Thing2)\n\
  - (void)setThing2:(NSInteger)thing2;\n- (NSInteger)thing2;\n@end // CategoryThing\
  \ (Thing2)\n```\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n## CategoryThing\
  \ 与 Categories\n\n`@interface CategoryThing (Thing3)`\n\n- `- (void)setThing3:(NSInteger)thing3;`\n\
  - `- (NSInteger)thing3;`\n\n`@end // CategoryThing (Thing3)`\n\n*CategoryThing.h*\
  \ 的内容到此为止。\n\n*CategoryThing.m* 相当简单，包含一个我们可以在 `NSLog()` 中配合 `%d` 格式说明符使用的 `description`\
  \ 方法：\n\n```objc\n#import \"CategoryThing.h\"\n\n@implementation CategoryThing\n\
  \n- (NSString *) description\n{\n    NSString *desc;\n    desc = [NSString stringWithFormat:\
  \ @\"%d %d %d\", thing1, thing2, thing3];\n    return (desc);\n} // description\n\
  \n@end // CategoryThing\n```\n\n现在来做一个内存管理检查。`description` 方法的行为正确吗？是的，它是正确的。因为\
  \ `stringWithFormat` 并非 `alloc`、`copy` 或 `new` 方法，它返回的对象我们可以假定其保留计数为 1 并且已被自动释放，因此当当前的自动释放池消失时，它将被清理掉。\n\
  \n接下来是 categories。*Thing1.m* 包含了 Thing1 category 的实现：\n\n```objc\n#import \"CategoryThing.h\"\
  \n\n@implementation CategoryThing (Thing1)\n\n- (void)setThing1:(NSInteger)t1\n\
  {\n    thing1 = t1;\n} // setThing1\n\n- (NSInteger) thing1\n{\n    return (thing1);\n\
  } // thing1\n\n@end // CategoryThing\n```\n\n值得注意的一点是，category 可以访问它被添加到的那个类的实例变量。Category\
  \ 方法是一等公民。\n\n*Thing2.m* 的内容与 *Thing1.m* 非常相似：\n\n```objc\n#import \"CategoryThing.h\"\
  \n\n@implementation CategoryThing (Thing2)\n\n- (void)setThing2:(NSInteger) t2\n\
  {\n    thing2 = t2;\n} // setThing2\n\n- (NSInteger)thing2\n{\n    return (thing2);\n\
  } // thing2\n\n@end // CategoryThing\n```\n\n阅读到这里，您大概能猜到 *Thing3.m* 长什么样了（提示：剪切；粘贴；搜索；替换）。\n\
  \n*main.m* 文件包含了 `main()`，它实际使用了我们一直在构建的这些 categories。首先是 `#import` 语句：\n\n```objc\n\
  #import \"CategoryThing.h\"\n```\n\n我们需要导入 `CategoryThing` 的头文件，以便编译器能看到类定义和 categories。接着是\
  \ `main()`：\n\n```objc\nint main (int argc, const char *argv[])\n{\n    @autoreleasepool\
  \ {\n        CategoryThing *thing = [[CategoryThing alloc] init];\n        [thing\
  \ setThing1: 5];\n        [thing setThing2: 23];\n        [thing setThing3: 42];\n\
  \        NSLog (@\"Things are %@\", thing);\n    }\n    return (0);\n} // main\n\
  ```\n\n`main()` 的第一行包含了我们已经熟知且呃，“喜爱”的标准自动释放池代码。这个池最终会持有被 `NSLog()` 所使用的那个自动释放的 description\
  \ 字符串。\n\n接下来，分配并初始化了一个 `CategoryThing` 对象：\n\n```objc\nCategoryThing *thing = [[CategoryThing\
  \ alloc] init];\n```\n\n这是我们向内存管理巡逻队所做的例行报告：因为这是 `alloc`，它的保留计数为 1，并且不在自动释放池中。而且由于这个项目使用了\
  \ ARC，我们无需担心添加 `release`；我们的编译器朋友会为我们做正确的事情并添加一个。\n\n接下来，向该对象发送一些消息来设置 `thing1`、`thing2`\
  \ 和 `thing3` 的值：\n\n```objc\n[thing setThing1: 5];\n[thing setThing2: 23];\n[thing\
  \ setThing3: 42];\n```\n\n当你使用一个对象时，方法是在接口中、父类中还是 category 中声明的，这并不重要。\n\n在设置了 thing\
  \ 的值之后，`NSLog()` 打印出该对象。正如你在 `CategoryThing` 的 `description` 方法中所见，这会显示三个 thing\
  \ 实例变量的值：\n\n```objc\nNSLog (@\"Things are %@\", thing);\n```\n\n最后，自动释放池被释放，`main()`\
  \ 返回 0：\n\n```objc\n}\nreturn (0);\n} // main\n```\n\n我们的这个小程序就到此为止。运行程序会得到以下结果：\n\
  \n```\nThings are 5 23 42\n```\n\n你不仅可以将一个类的实现拆分到多个源文件中，还可以将其分散到多个框架中。`NSString`\
  \ 是一个位于 Foundation 框架中的类，该框架包含许多面向数据的类，例如字符串、数字和集合。所有视觉上的华丽功能（窗口、颜色、绘图等）都位于 AppKit\
  \ 和 UIKit 中。尽管 `NSString` 在 Foundation 中声明，但 AppKit 有一个名为 `NSStringDrawing` 的 `NSString`\
  \ category，它允许你向字符串对象发送绘制消息。当你绘制一个字符串时，该方法会在屏幕上渲染该字符串的文本。因为这属于花哨的图形处理，所以它是 AppKit\
  \ 的功能。但 `NSString` 是 Foundation 的对象。Cocoa 设计者使用 categories 将数据功能放入 Foundation，将绘图功能放入\
  \ AppKit。作为程序员，我们只需处理 `NSString`，通常不需要关心某个特定方法来自何处。\n\n## 使用 Categories 进行前向引用\n\
  \n正如我们之前提到的，Cocoa 没有任何真正的私有方法。如果你知道一个对象支持的方法名称，就可以调用它，即使该方法的声明没有出现在类的 `@interface`\
  \ 中。\n\n然而，编译器会尝试提供帮助。如果它看到你在一个对象上调用一个方法，但尚未看到该方法的声明或定义，它会像这样发出警告：`warning: 'CategoryThing'\
  \ may not respond to '–setThing4:'`。通常，这种抱怨是好的，因为它能帮助你捕捉到许多拼写错误。\n\n但是，如果你的实现中使用了没有在类的\
  \ `@interface` 部分列出的方法，编译器的警惕性可能会导致问题。有很多充分的理由说明你为什么不想在那里列出所有方法。这些方法可能纯粹是实现细节，或者你可能正在尝试不同的方法名称以决定要使用哪些。但是，如果你在使用方法之前不声明它们，就会收到编译器的警告。修复所有编译器警告是件好事，那么你能做些什么呢？\n\
  \n如果你能在使用某个方法之前安排好它的定义，编译器就会看到你的定义，就不会产生警告。但如果不方便这样做，或者你正在使用另一个类中未公开的方法，那么你就需要另寻他法。\n\
  \n### 用 Categories 来救场！\n\n在 category 中声明一个方法足以让编译器认为：“好的，这个方法存在。如果我看到程序员使用它，我不会抱怨。”\
  \ 即使你不想实现它，也无需实际去做。\n\n一种常见的技术是将一个 category 放在实现文件的顶部。假设 `Car` 有一个名为 `rotateTires`\
  \ 的方法。我们可以通过另一个名为 `moveTireFromPosition:toPosition:` 的方法来实现 `rotateTires`，以交换两个位置的轮胎。这第二个方法是一个实现细节，我们不希望把它放进汽车的公共接口中。通过在\
  \ category 中声明它，`rotateTires` 就可以使用 `moveTireFromPosition:toPosition:` 而不会产生任何编译器警告。这个\
  \ category 看起来像这样：\n\n```objc\n@interface Car (Private)\n\n- (void) moveTireFromPosition:\
  \ (int) pos1 toPosition: (int) pos2;\n\n@end // Private\n```\n\n当你实现这个方法时，它不必存在于一个\
  \ `@implementation Car (Private)` 块中，但如果不这样做，编译器会给你一个警告，所以一个好的做法是将它们放在 `@Implementations`\
  \ 中。另外，以后如果你需要查找这些方法，它们会集中在一个地方，易于查找。你可以把这个方法留在 `@implementation Car` 部分。这样，你就可以将你的方法按类别进行组织，作为文档和结构化的便利，同时仍然可以将所有方法存放在实现文件的一个大块中。\n\
  \n\n\n当你访问其他类的私有方法时，甚至不需要提供该方法的实现。只需在类别中声明它，就足以让编译器满意。顺便说一句，你真不应该访问其他类的私有方法，但有时为了规避\
  \ Cocoa 或其他人的代码中的漏洞，或者为了编写测试代码，你必须这么做。\n\n不过要小心。苹果对于接受 Mac 和 iOS App Store 中的应用有一些指导原则。其中一条是你的应用不能访问类的私有变量和方法。如果你的应用这么做了，苹果可能会拒绝它。\n\
  \n## 非正式协议与委托类别\n\n现在，是时候谈谈那些你在面向对象编程中经常遇到的“大词”和“大思想”了——你知道的，那些听起来比实际复杂得多的概念。\n\n\
  Cocoa 类经常使用一种涉及**委托**的技术，委托是被另一个对象请求执行某些工作的对象。例如，AppKit 类 `NSApplication` 会询问其委托是否应该在应用程序启动时打开一个无标题窗口。`NSWindow`\
  \ 对象会询问其委托是否应该允许关闭窗口。\n\n大多数情况下，你将是编写委托对象并将其提供给其他对象的一方，通常是 Cocoa 提供的某个对象。通过实现特定的方法，你可以控制\
  \ Cocoa 对象的行为方式。\n\nCocoa 中的滚动列表由 AppKit 类 `NSTableView` 处理。当 `NSTableView` 准备执行某些工作（例如选择用户刚刚点击的行）时，该对象会询问其委托是否可以选择该行。`NSTableView`\
  \ 向其委托发送一条消息：\n\n```\n- (BOOL) tableView: (NSTableView *) tableView shouldSelectRow:\
  \ (NSInteger) rowIndex;\n```\n\n委托方法可以查看 `tableView` 和行，以决定是否应选择该行。如果表格包含不应选择的行，委托可能会实现禁用行（即不可选择）的概念。\n\
  \n## `ITunesFinder` 项目\n\n让你通过 Bonjour（原名为 Rendezvous 的技术）查找网络服务的 Cocoa 类名为 `NSNetServiceBrowser`。你告诉网络服务浏览器你要查找的服务，并给它一个委托对象。然后，浏览器对象会在发现新服务时向委托对象发送消息。\n\
  \n`ITunesFinder` 位于 *12.04 ITunesFinder* 项目文件夹中，它使用 `NSNetServiceBrowser` 来列出它所能找到的所有共享\
  \ iTunes 音乐库。\n\n对于这个项目，我们从 `main()` 开始，它位于 *main.m* 中。委托对象是 `ITunesFinder` 类的一个实例，因此我们需要导入它的头文件：\n\
  \n```objc\n#import <Foundation/Foundation.h>\n#import \"ITunesFinder.h\"\n```\n\n\
  然后 `main()` 开始。我们设置自动释放池：\n\n```objc\nint main (int argc, const char *argv[]) {\n\
  \    @autoreleasepool {\n```\n\n接下来，一个新的 `NSNetServiceBrowser` 诞生了：\n\n```objc\n\
  NSNetServiceBrowser *browser = [[NSNetServiceBrowser alloc] init];\n```\n\n然后，创建一个新的\
  \ `ITunesFinder`：\n\n```objc\nITunesFinder *finder = [[ITunesFinder alloc] init];\n\
  ```\n\n因为我们使用 `alloc` 来创建它们，所以必须确保在使用完它们后它们会被释放。我们使用的是 ARC，所以不需要添加 `release`，但如果你不使用\
  \ ARC，则必须手动释放。\n\n接下来，我们告诉网络服务浏览器将 `ITunesFinder` 对象用作委托：\n\n```objc\n[browser setDelegate:\
  \ finder];\n```\n\n然后，我们告诉浏览器去查找 iTunes 共享：\n\n```objc\n[browser searchForServicesOfType:\
  \ @\"_daap._tcp\" inDomain: @\"local.\"];\n```\n\n字符串 `\"_daap._tcp\"` 告诉网络服务浏览器查找类型为\
  \ `daap`（“daap”是“Digital Audio Access Protocol”的缩写）的服务，并使用 TCP 网络协议。这种咒语可以找到由 iTunes\
  \ 发布的共享库。域名 `local.` 表示在本地网络上查找服务。互联网编号分配机构（IANA）维护着一个互联网协议族列表，这些协议族通常映射到 Bonjour\
  \ 服务名称。\n\n\n\n"
- "# 排版后的文档\n\n接下来，`main()` 会记录它已开始浏览并启动一个运行循环：\n\n```\nNSLog (@\"begun browsing\"\
  );\n\n[[NSRunLoop currentRunLoop] run];\n```\n\n运行循环是 Cocoa 的一种结构，它会阻塞（即不执行任何处理），直到发生有趣的事件为止。在此场景中，“有趣”意味着网络服务浏览器发现了一个新的\
  \ iTunes 共享。\n\n除了监听网络流量外，运行循环还处理其他事务，例如等待用户事件（如按键或鼠标点击）。`run` 方法实际上不会返回，它会一直运行下去，因此其后的代码永远不会被执行。不过，我们将其保留在此处，以便代码的阅读者了解我们注意到了正确的内存管理（我们可以构建一个仅运行特定时长的运行循环，但那样的代码更复杂，并且对我们讨论委托没有实质帮助）。因此，以下是实际上不会执行的清理代码：\n\
  \n```\n}\n\nreturn (0);\n\n} // main\n```\n\n现在，我们有了网络服务浏览器和一个运行循环。浏览器会发送网络数据包来寻找特定服务，然后这些数据包会带着“我在这里”的信息返回。当这些数据包返回时，运行循环会告诉网络服务浏览器：“这里有一些给你的数据包。”\
  \ 浏览器随后查看这些数据包，如果它们来自之前未发现的服务，就会向委托对象发送消息，告知其所发生的事情。\n\n现在，我们来审视委托 `ITunesFinder`\
  \ 的代码。`ITunesFinder` 类的接口非常简洁：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
  \ ITunesFinder : NSObject <NSNetServiceBrowserDelegate>\n\n@end // ITunesFinder\n\
  ```\n\n请记住，我们*不必*在 `@interface` 中声明方法。委托对象只需实现它感兴趣被调用的方法即可。\n\n注意，我们在 `NSObject`\
  \ 后面写了 `<NSNetServiceBrowserDelegate>`。这告诉编译器和其他对象，`ITunesFinder` 类实现了该名称的协议中的方法，或遵循了该协议（更多内容将在下一章讨论）。目前，我们添加它的目的仅仅是为了让编译器不产生警告。\n\
  \n该实现包含两个方法。首先是预备部分：\n\n```\n#import \"ITunesFinder.h\"\n\n@implementation ITunesFinder\n\
  ```\n\n然后是第一个委托方法：\n\n```\n- (void) netServiceBrowser: (NSNetServiceBrowser *) b\n\
  \         didFindService: (NSNetService *) service\n              moreComing: (BOOL)\
  \ moreComing {\n    [service resolveWithTimeout: 10];\n    NSLog (@\"found one!\
  \ Name is %@\",\n           [service name]);\n} // didFindService\n```\n\n当 `NSNetServiceBrowser`\
  \ 发现一个新服务时，它会向委托对象发送 `netServiceBrowser:didFindService:moreComing:` 消息。浏览器作为第一个参数传递（与\
  \ `main` 中 `browser` 变量的值相同）。如果你有多个服务浏览器同时进行搜索，检查此参数可以让你确定是哪一个发现了内容。\n\n第二个参数传递的\
  \ `NSNetService` 对象是描述所发现服务的对象，例如一个 iTunes 共享。最后一个参数 `moreComing` 用于指示一批通知是否已完成。为什么\
  \ Cocoa 的设计者要包含这个 `moreComing` 参数？如果你在一个拥有一百个 iTunes 共享的大型大学网络上运行此程序，那么该方法会被调用 99\
  \ 次，其中 `moreComing` 的值为 `YES`，然后最后一次调用时的值为 `NO`。在构建用户界面时，这个信息非常有用，因为它能让你知道何时刷新窗口。随着新的\
  \ iTunes 共享出现和消失，这个方法会被反复调用。\n\n`[service resolveWithTimeout: 10]` 告诉 Bonjour 系统去获取该服务的所有有趣属性。具体来说，我们需要共享的名称，比如“斯科特的酷炫旋律（Scott's\
  \ Groovy Tunes）”，这样我们才能将其打印出来。`[service name]` 可以获取共享的名称。\n\niTunes 共享可能会随时出现和消失，比如当人们将笔记本电脑置于睡眠状态或离开网络时。`ITunesFinder`\
  \ 类实现了第二个委托方法，当网络服务消失时，该方法会被调用：\n\n\n\n- (void) `netServiceBrowser:(NSNetServiceBrowser\
  \ *) b didRemoveService:(NSNetService *) service moreComing:(BOOL) moreComing` \
  \ \n{  \n    `[service resolveWithTimeout: 10]`;  \n    `NSLog (@\"lost one! Name\
  \ is %@\", [service name])`;  \n}  \n\n这段代码与`didFindService`方法完全相同，只是当某个服务不再可用时，它会记录日志。\n\
  \n现在运行程序，看看会发生什么。Waqar 的网络中有一台名为 `Waqar Malik’s Home Library` 的古老 Mac mini，它在家中共享\
  \ iTunes 音乐。这会生成以下输出：\n\n```  \nbegun browsing  \nfound one! Name is Waqar Malik’s\
  \ Home Library  \n```  \n\n我们在笔记本电脑上启动 iTunes，并以库名称 `indigo` 共享音乐：\n\n```  \nfound\
  \ one! Name is indigo  \n```  \n\n在笔记本电脑上退出 iTunes 后，`ITunesFinder` 会告诉我们：\n\n```\
  \  \nlost one! Name is indigo  \n```  \n\n## 委托与分类  \n\n那么，这个委托机制和分类有什么关系呢？委托凸显了分类的另一个用途：可以发送给委托的方法，被声明为\
  \ `NSObject` 上的一个分类。以下是 `NSNetService` 委托方法的部分声明：\n\n```  \n@interface NSObject\
  \ (NSNetServiceBrowserDelegateMethods)  \n\n- (void) `netServiceBrowserWillSearch:(NSNetServiceBrowser\
  \ *) browser`;  \n- (void) `netServiceBrowser:(NSNetServiceBrowser *) aNetServiceBrowser\
  \ didFindService:(NSNetService *) service moreComing:(BOOL) moreComing`;  \n- (void)\
  \ `netServiceBrowserDidStopSearch:(NSNetServiceBrowser *) browser`;  \n- (void)\
  \ `netServiceBrowser:(NSNetServiceBrowser *) browser didRemoveService:(NSNetService\
  \ *) service moreComing:(BOOL) moreComing`;  \n\n@end  \n```  \n\n通过将这些方法声明为 `NSObject`\
  \ 的一个分类，`NSNetServiceBrowser` 的实现可以将这些消息发送给*任意*对象，无论该对象实际属于哪个类。这也意味着，只要实现了相应的方法，任何类型的对象都可以成为委托。\n\
  \n**注意：** 像这样在 `NSObject` 上放置分类后，任何类型的对象都可以用作委托对象。无需继承自专门的 `serviceBrowserDelegate`\
  \ 类（就像在 C++ 中那样），也无需遵循特定的接口（就像在 Java 中那样）。\n\n在 `NSObject` 上放置分类被称为创建**非正式协议**。如你所知，计算机术语中的“协议”是一组管理通信的规则。非正式协议只是一种表达方式，相当于说：“这里有一些你可能想要实现的方法，这样你就可以用它们做一些酷炫的事情。”在\
  \ `NSNetServiceBrowserDelegateMethods` 非正式协议中声明的一些方法，我们并未在 `ITunesFinder` 中实现。这没问题。对于非正式协议，你可以只实现你想用的方法。\n\
  \n你可能已经猜到，还存在正式协议的概念。我们将在下一章中介绍。\n\n## 响应选择器  \n\n你可能会问自己：“`NSNetServiceBrowser`\
  \ 怎么知道它的委托能否处理发送给它的那些消息呢？”你可能遇到过当尝试发送一个对象无法理解的消息时，出现的 Objective-C 运行时错误：\n\n```\
  \  \n-[ITunesFinder addSnack:]: selector not recognized  \n```  \n\n那么 `NSNetServiceBrowser`\
  \ 是如何避免这个问题的呢？它并没有避开。`NSNetServiceBrowser` 会先向对象询问：“你能响应这个选择器吗？”如果可以，它才会发送这条消息。\n\
  \n什么是**选择器**？它只是方法的名称，但以一种特殊方式编码，供 Objective-C 运行时用于快速查找。你可以使用编译器指令 `@selector()`\
  \ 来指定一个选择器，并将方法名称放在括号内。例如，`Car` 的 `setEngine:` 方法的选择器是：\n\n```  \n@selector(setEngine:)\
  \  \n```  \n\n而 `Car` 的 `setTire:atIndex:` 方法的选择器则是：\n\n```  \n@selector(setTire:atIndex:)\
  \  \n```  \n\n`NSObject` 提供了一个名为 `respondsToSelector:` 的方法，用于查询对象是否能响应给定的消息。以下代码片段使用了\
  \ `respondsToSelector:`：\n\n```  \nCar *car = [[Car alloc] init];  \n```  \n\n\n\
  \n## 代码示例与选择器\n\n```\nif ([car respondsToSelector: @selector(setEngine:)])\n{\n\
  \    NSLog (@\"yowza!\");\n}\n```\n这段代码会打印“yowza!”，因为`Car`对象确实响应`setEngine:`消息。\n\
  \n现在来看另一段代码：\n```\nITunesFinder *finder = [[ITunesFinder alloc] init];\nif ([finder\
  \ respondsToSelector:@selector(setEngine:)])\n{\n    NSLog (@\"yowza!\");\n}\n```\n\
  这次不会出现“yowza!”。`ITunesFinder`没有`setEngine:`方法。\n\n为了获取所需信息，`NSNetServiceBrowser`会调用`respondsToSelector:@selector(netServiceBrowser:didFindService:moreComing:)`。如果委托能够响应这条消息，浏览器就会发送该消息；否则，浏览器暂时忽略该委托，继续正常运行。\n\
  \n## 选择器的其他用途\n\n选择器可以被传递，用作方法的参数，甚至存储为实例变量。这可以带来非常强大和灵活的构造。\n\nFoundation 框架中的`NSTimer`类可以重复向对象发送消息，这在游戏中非常有用——例如，当你希望怪物定期向玩家移动时。创建新的`NSTimer`对象时，你需要指定它要发送消息的目标对象，以及一个选择器来指明要调用的方法。例如，你可以让一个计时器调用游戏引擎的`moveMonsterTowardPlayer:`方法，或者让另一个计时器调用`animateOneFrame:`方法。\n\
  \n## 本章小结\n\n本章介绍了分类（categories）。分类提供了一种向现有类添加新方法的方式，即使你没有这些类的源代码。\n\n除了向现有类添加功能外，分类还允许将对象的实现分散到多个源文件甚至多个框架中。例如，回想一下`NSString`的数据处理方法：这些方法实现在\
  \ Foundation 框架中，与 UIKit 和 AppKit 中的绘图方法分离。\n\n分类允许你声明非正式协议（informal protocols）。非正式协议是`NSObject`上的一个分类，列出了对象可能能够响应的方法。非正式协议用于实现委托（delegation）——一种让你轻松定制对象行为的技术。在此过程中，你还学习了选择器（selectors），它们是在代码中指示特定\
  \ Objective-C 消息的一种方式。\n\n接下来是 Objective-C 的正式协议（formal protocols），它们是非正式协议的“升级版”。\n\
  \n---\n\n"
- "# 第 13 章 协议\n\n在上一章中，我们讨论了分类和非正式协议的神奇之处。使用非正式协议时，如第 12 章所示，你只需实现想要响应的方法。对于第 12\
  \ 章中的`NSNetServiceBrowser`委托，我们仅实现了在网络中添加或移除新服务时调用的两个方法，而不必实现`NSNetServiceBrowserDelegate`非正式协议中的其他六个方法。我们也没有在对象中声明任何内容来表明自己可以用作`NSNetServiceBrowser`的委托。一切都以最小的工作量正常运行。\n\
  \n你可能已经猜到，Objective-C 和 Cocoa 还包含了正式协议的概念。在本章中，我们将探讨其工作原理。\n\n## 正式协议\n\n**正式协议**（类似于非正式协议）是一个带名称的方法和属性列表。然而，正式协议要求你显式地采纳它。你通过在类的`@interface`声明中列出协议名称来**采纳**（adopt）该协议。完成这一操作后，你的类就被称为**遵循**（conform）该协议（你可能以为自己是非遵循者）。采纳协议意味着你承诺实现该协议的所有方法。如果你没有这样做，编译器会生成警告。\n\
  \n> **注意**：正式协议类似于 Java 接口。事实上，Objective-C 的协议是 Java 接口的灵感来源。\n\n为什么要创建或采纳正式协议？听起来需要实现每个方法，工作量很大。根据协议的不同，可能还涉及一些繁琐的工作。但通常情况下，协议只有少量方法需要实现，而且无论如何你都必须全部实现才能获得有用的功能集，因此正式协议的要求通常不会成为负担。Objective-C\
  \ 2.0 增加了一些很好的特性，使得使用协议远没有那么繁重，我们将在本章末尾讨论这些内容。\n\n## 声明协议\n\n让我们看看 Cocoa 声明的一个协议——`NSCopying`。如果你采纳了`NSCopying`，你的对象就知道如何复制自身：\n\
  \n```\n@protocol NSCopying\n- (id) copyWithZone: (NSZone *) zone;\n@end\n```\n\n\
  该语法看起来与声明类或分类的语法类似。这里使用`@protocol`而不是`@interface`来告诉编译器：“我将展示一个新正式协议的样子。”该语句后面跟着协议名称。协议名称必须是唯一的。\n\
  \n你也可以拥有父协议，类似于父类。要指定父协议，请在协议名称后的尖括号中声明它。\n\n```\n@protocol MySuperDuberProtocol\
  \ <MyParentProtocol>\n@end\n```\n\n上述代码表示`MySuperDuperProtocol`扩展了`MyParentProtocol`，因此你必须同时满足两个协议中所有必需方法的实现。你始终可以将`NSObject`用作根协议。不要将其与`NSObject`类混淆。`NSObject`类遵循`NSObject`协议，这意味着所有对象都遵循`NSObject`协议。建议将`NSObject`协议作为你正在定义的协议的父协议。\n\
  \n接下来是一个方法声明列表，每个协议采纳者都必须实现这些方法。协议声明以`@end`结束。协议不引入任何实例变量。\n\n让我们看另一个例子，这是来自 Cocoa\
  \ 的`NSCoding`协议：\n\n```\n@protocol NSCoding\n- (void) encodeWithCoder: (NSCoder\
  \ *) encoder;\n- (id) initWithCoder: (NSCoder *) decoder;\n@end\n```\n\n当一个类采纳`NSCoding`时，该类承诺实现这两个消息。`encodeWithCoder:`用于将对象的实例变量“冻干”到`NSCoder`对象中。`initWithCoder:`从`NSCoder`中提取冻干的实例变量，并用它们初始化一个新对象。这两个方法总是成对实现：如果你永远不会将编码的对象恢复为新对象，那么编码就没有意义；如果你从不编码对象，你就没有任何东西可以用来创建新对象。\n\
  \n## 采纳协议\n\n要采纳协议，你需要在类声明中用尖括号列出该协议。例如，如果`Car`采纳了`NSCopying`，声明如下：\n\n```\n@interface\
  \ Car : NSObject <NSCopying>\n{\n    // 实例变量\n}\n// 方法\n@end // Car\n```\n\n如果`Car`同时采纳了`NSCopying`和`NSCoding`，声明如下：\n\
  \n```\n@interface Car : NSObject <NSCopying, NSCoding>\n{\n    // 实例变量\n}\n// 方法\n\
  @end // Car\n```\n\n你可以按任意顺序列出协议，顺序无关紧要。\n\n当你采纳一个协议时，你是在向阅读类声明的程序员传达信息：该类的对象可以做两件非常重要的事情——它们可以编码/解码自身，也可以复制自身。\n\
  \n## 实现协议\n\n关于协议需要了解的内容大致就是这些（除了声明变量时的一些语法细节，我们稍后会讨论）。本章的大部分内容将用于实践，我们将通过练习为`CarParts`采纳`NSCopying`协议。\n\
  \n### Car-bon 副本\n\n\n\n让我们一同高呼内存管理的规则：“如果你从`alloc`、`copy`或`new`中获取一个对象，它的引用计数为\
  \ 1，你需要负责释放它。”我们已经介绍过`alloc`和`new`，但尚未讨论`copy`。`copy`方法的作用是创建对象的副本。`copy`消息会指示对象创建一个全新的对象，并使新对象与接收者相同。\n\
  \n接下来，我们将扩展`CarParts`，使其能够复制汽车（等到底特律听到这个消息吧）。相关代码位于`13.01 CarParts-Copy`项目文件夹中。在此过程中，我们将探讨实现副本创建代码时涉及的一些有趣的微妙之处。\n\
  \n## 制作副本\n\n实际上，有多种不同的方式可以制作副本。大多数对象都会引用——即指向——其他对象。当你创建**浅拷贝**时，不会复制被引用的对象；新的副本仅仅指向已经存在的被引用对象。`NSArray`的`copy`方法进行的就是浅拷贝。当你复制一个`NSArray`时，你的副本只会复制指向被引用对象的指针，而不会复制对象本身。如果你复制了一个包含五个`NSString`的`NSArray`，最终程序中仍然只有五个字符串，而不是十个。在这种情况下，每个对象都有一个指向每个字符串的指针。\n\
  \n另一方面，**深拷贝**会复制所有被引用的对象。如果`NSArray`的`copy`是深拷贝，那么在复制之后，你将拥有十个字符串在程序中运行。对于`CarParts`，我们将使用深拷贝。这样，当你复制一辆汽车时，你可以更改它引用的值（例如轮胎气压），而不会同时改变两辆汽车的气压。\n\
  \n你可以根据特定类的需求，自由地混合使用深拷贝和浅拷贝来复制组合对象。\n\n要复制汽车，我们还需要能够复制引擎和轮胎。程序员们，发动引擎吧！\n\n## 复制引擎\n\
  \n我们要处理的第一个类是`Engine`。为了能够复制引擎，该类需要遵循`NSCopying`协议。以下是`Engine`的新接口：\n\n```objectivec\n\
  @interface Engine : NSObject <NSCopying>\n\n@end // Engine\n```\n\n由于我们遵循了`NSCopying`协议，就必须实现`copyWithZone:`方法。Zone\
  \ 是`NSZone`，它是一个内存区域，你可以从中分配内存。当你向对象发送`copy`消息时，它在到达你的代码之前会转换为`copyWithZone:`。在过去，`NSZone`比现在重要得多，但我们仍然像带着一小件行李一样不得不处理它。\n\
  \n以下是`Engine`的`copyWithZone:`实现：\n\n```objectivec\n- (id) copyWithZone: (NSZone\
  \ *) zone\n{\n    Engine *engineCopy;\n    engineCopy = [[[self class] allocWithZone:\
  \ zone] init];\n    return (engineCopy);\n} // copyWithZone\n```\n\n`Engine`没有实例变量，所以我们只需要创建一个新的`Engine`对象。然而，这并不像听起来那么容易。看看`engineCopy`右侧那个复杂的语句。消息发送嵌套了三层！\n\
  \n这个方法首先获取`self`的类。然后，它向该类发送`allocWithZone:`消息以分配一些内存并创建一个该类的新对象。最后，向这个新对象发送`init`消息以对其进行初始化。让我们讨论一下为什么需要这个复杂的消息嵌套，特别是`[self\
  \ class]`的部分。\n\n回想一下，`alloc`是一个类方法。`allocWithZone:`也是一个类方法，你可以从其方法声明中的前导加号看出：\n\
  \n```objectivec\n+ (id) allocWithZone: (NSZone *) zone;\n```\n\n我们需要向一个类发送此消息，而不是向实例发送。我们应该向哪个类发送呢？我们的第一直觉是将`allocWithZone:`发送给`Engine`，像这样：\n\
  \n```objectivec\n[Engine allocWithZone: zone];\n```\n\n这对`Engine`有效，但对`Engine`的子类无效。为什么不行呢？想想`Slant6`，它是`Engine`的子类。如果你向一个`Slant6`对象发送`copy`消息，最终代码会进入`Engine`的`copyWithZone:`，因为我们最终使用来自`Engine`的复制逻辑。如果你直接将`allocWithZone:`发送给`Engine`类，则会创建一个新的`Engine`对象，而不是`Slant6`对象。如果`Slant6`添加了实例变量，事情可能会变得非常混乱。在这种情况下，`Engine`对象的空间可能不足以容纳额外的变量，从而导致内存溢出错误。\n\
  \n现在你可能明白我们为什么使用`[self class]`了。通过使用`[self class]`，`allocWithZone:`将被发送给接收`copy`消息的对象的类。如果`self`是一个`Slant6`对象，这里就会创建一个新的`Slant6`实例。如果将来程序中添加了某种全新的引擎（比如`MatterAntiMatterReactor`），这种新引擎也能被正确地复制。\n\
  \n方法的最后一行返回新创建的对象。\n\n让我们再次检查一下内存管理。复制操作应返回一个引用计数为 1 的对象（并且不是自动释放的）。我们通过`alloc`获取新对象，它总是返回一个引用计数为\
  \ 1 的对象，并且我们没有释放它，所以我们在内存管理方面没有问题。\n\n让`Engine`具备复制能力就这些了。我们无需改动`Slant6`。因为`Slant6`没有添加任何实例变量，所以在进行复制时不需要做任何额外工作。多亏了继承，以及在创建对象时使用`[self\
  \ class]`的技术，`Slant6`对象也可以被复制。\n\n## 复制轮胎\n\n复制轮胎比复制引擎更复杂。`Tire`有两个实例变量（`pressure`和`treadDepth`）需要复制到新的轮胎中，而`AllWeatherRadial`子类引入了两个额外的实例变量（`rainHandling`和`snowHandling`），这些也必须复制到一个新对象中。\n\
  \n首先是`Tire`。\n\n```objectivec\n@interface Tire : NSObject <NSCopying>\n\n@property\
  \ float pressure;\n@property float treadDepth;\n\n// … methods\n\n@end // Tire\n\
  ```\n\n现在是`copyWithZone:`的实现：\n\n```objectivec\n- (id) copyWithZone: (NSZone *)\
  \ zone\n{\n    Tire *tireCopy;\n    tireCopy = [[[self class] allocWithZone: zone]\
  \ initWithPressure:\n                pressure treadDepth: treadDepth];\n    return\
  \ (tireCopy);\n} // copyWithZone\n```\n\n你可以看到这里像`Engine`一样使用了`[[self class] allocWithZone:\
  \ zone]`模式。由于我们必须在创建对象时调用 init，所以可以方便地使用`Tire`的`initWithPressure:treadDepth:`将新轮胎的`pressure`和`treadDepth`设置为我们正在复制的轮胎的值。这个方法恰好是`Tire`的指定初始化器，但你不必为了复制而使用指定初始化器。如果你愿意，也可以使用普通的`init`以及存取器方法来更改属性。\n\
  \n**给您的实用提示** 你可以通过 C 指针运算符直接访问公共实例变量，如下所示：\n\n```objectivec\ntireCopy->pressure\
  \ = pressure;\ntireCopy->treadDepth = treadDepth;\n```\n\n通常情况下，我们倾向于使用 init 方法和存取器方法，以防设置属性涉及到额外的工作（尽管这种情况不太可能发生）。\n\
  \n现在，轮到`AllWeatherRadial`了。`AllWeatherRadial`的`@interface`没有变化：\n\n```objectivec\n\
  @interface AllWeatherRadial : Tire\n\n// … properties\n\n// … methods\n\n@end //\
  \ AllWeatherRadial\n```\n\n等等——`<NSCopying>`在哪里？你不需要它，你可能已经猜到了原因。当`AllWeatherRadial`继承自`Tire`时，它一并带来了`Tire`的所有“行李”，包括对`NSCopying`协议的遵循。\n\
  \n不过，我们仍需要实现`copyWithZone:`，因为必须确保`AllWeatherRadial`的雨雪处理实例变量被复制：\n\n```objectivec\n\
  - (id) copyWithZone: (NSZone *) zone\n{\n    AllWeatherRadial *tireCopy;\n    tireCopy\
  \ = [super copyWithZone: zone];\n    tireCopy.rainHandling = rainHandling;\n   \
  \ tireCopy.snowHandling = snowHandling;\n    return (tireCopy);\n} // copyWithZone\n\
  ```\n\n\n\n## 复制自定义对象\n\n### 复制 `AllWeatherRadial`\n\n由于 `AllWeatherRadial` 是可复制类的子类，它无需执行我们之前用到的\
  \ `allocWithZone:` 和 `[self class]` 这些操作。该类只需向父类请求一份副本，并期望父类在分配对象时正确处理，使用了 `[self\
  \ class]`。因为 `Tire` 的 `copyWithZone:` 方法使用 `[self class]` 来确定要创建的对象类型，所以它会创建一个新的\
  \ `AllWeatherRadial` 实例，这正是我们想要的。该代码还为我们处理了 `pressure` 和 `treadDepth` 值的复制。现在，是不是很方便？\n\
  \n剩下的工作就是设置处理雨雪路况的属性值。这些属性正是用来完成这项任务的。\n\n### 复制 `Car`\n\n既然我们现在可以复制发动机、轮胎及其子类，是时候让\
  \ `Car` 自身也变得可复制了。\n\n正如你所料，`Car` 需要遵循 `NSCopying` 协议：\n\n```objc\n@interface Car\
  \ : NSObject <NSCopying>\n\n// 属性\n\n// … 方法\n\n@end // Car\n```\n\n为了履行对 `NSCopying`\
  \ 协议的承诺，`Car` 必须实现我们的老朋友 `copyWithZone:`。以下是 `Car` 的 `copyWithZone:` 方法：\n\n```objc\n\
  - (id) copyWithZone: (NSZone *) zone\n{\n    Car *carCopy;\n    carCopy = [[[self\
  \ class] allocWithZone: zone] init];\n    carCopy.name = self.name;\n\n    Engine\
  \ *engineCopy;\n    engineCopy = [[engine copy] autorelease];\n    carCopy.engine\
  \ = engineCopy;\n\n    for (int i = 0; i < 4; i++)\n    {\n        Tire *tireCopy;\n\
  \        tireCopy = [[self tireAtIndex: i] copy];\n        [tireCopy autorelease];\n\
  \        [carCopy setTire: tireCopy atIndex: i];\n    }\n\n    return (carCopy);\n\
  } // copyWithZone\n```\n\n这段代码比我们之前写的稍多一些，但所有内容都与你已经见过的类似。\n\n首先，通过向接收此消息的对象的类发送\
  \ `allocWithZone:` 来分配一辆新车：\n\n```objc\nCar *carCopy;\ncarCopy = [[[self class]\
  \ allocWithZone: zone] init];\n```\n\n`CarParts-copy` 目前不包含 `Car` 的子类，但未来可能会有。你永远不知道何时会有人制造出那种能时间旅行的德罗宁汽车。我们可以像之前所做的那样，通过使用\
  \ `self` 的类来分配新对象，从而做到面向未来。\n\n我们需要复制汽车的名称：\n\n```objc\ncarCopy.name = self.name;\n\
  ```\n\n请记住，`name` 属性会复制其字符串，因此新车将拥有正确的名称。\n\n接下来，制作一份发动机的副本，并告知新车副本使用该副本作为其发动机：\n\
  \n```objc\nEngine *engineCopy;\nengineCopy = [[engine copy] autorelease];\ncarCopy.engine\
  \ = engineCopy;\n```\n\n看到那个 `autorelease` 了吗？它是必需的吗？让我们稍微思考一下内存管理。 `[engine copy]`\
  \ 会返回一个引用计数为 1 的对象。 `setEngine:` 会保留（retain）传入的发动机，使其引用计数变为 2。当新车副本最终被销毁时，`Car`\
  \ 的 `dealloc` 会释放（release）发动机，因此其引用计数会回到 1。到那时，这段代码早已执行完毕，所以没有代码会执行最后一次 release\
  \ 以使其被释放。在这种情况下，发动机对象就会泄漏。通过自动释放（autorelease），引用计数会在未来某个时刻自动释放池被清空时减一。\n\n我们是否可以用简单的\
  \ `[engineCopy release]` 来代替自动释放？可以。但你必须在调用 `setEngine:` 之后执行 release；否则，发动机副本会在被使用之前就被销毁。选择哪种内存管理方式取决于你的个人喜好。有些程序员喜欢在函数中将内存清理工作集中在一处，而另一些喜欢在创建对象时就自动释放，以免以后忘记释放。这两种方法都是有效的，但请注意，对于\
  \ iOS 应用，Apple 建议立即释放而不是使用 `autorelease`，因为你不知道自动释放何时会减少引用计数。\n\n在 `carCopy` 配备新发动机后，一个\
  \ `for` 循环会循环四次，复制每个轮胎并将副本安装到新车上：\n\n```objc\nfor (int i = 0; i < 4; i++)\n{\n \
  \   Tire *tireCopy;\n    tireCopy = [[self tireAtIndex: i] copy];\n    [tireCopy\
  \ autorelease];\n    [carCopy setTire: tireCopy atIndex: i];\n}\n```\n\n\n\n循环中的代码使用访问器方法依次获取位置\
  \ 0、位置 1 等位置的轮胎，并在每次循环时依次进行。每个获取到的轮胎会被复制并自动释放，以确保其内存得到妥善处理。接着，汽车副本被指示在相同位置使用这个新轮胎。由于我们精心构造了\
  \ `Tire` 和 `AllWeatherRadial` 中的 `copyWithZone:` 方法，这段代码能够与任何一种轮胎正常工作。你会注意到我们没有使用\
  \ `NSArray` 的 `copy` 方法，因为它执行的是浅拷贝，而我们需要的是深拷贝。\n\n最后，这里是完整的 `main()` 函数。其中大部分是你在前面章节中见过的旧代码；时髦的新代码以粗体显示：\n\
  \n```c\nint main (int argc, const char * argv[]) {\n    @autoreleasepool {\n   \
  \     Car *car = [[Car alloc] init];\n        car.name = @\"Herbie\";\n        \n\
  \        for (int i = 0; i < 4; i++) {\n            AllWeatherRadial *tire;\n  \
  \          tire = [[AllWeatherRadial alloc] init];\n            [car setTire: tire\
  \ atIndex: i];\n            [tire release];\n        }\n        \n        Slant6\
  \ *engine = [[Slant6 alloc] init];\n        car.engine = engine; [engine release];\n\
  \        \n        [car print];\n        \n        Car *carCopy = [car copy];\n\
  \        [carCopy print];\n        \n        [car release];\n        [carCopy release];\n\
  \    }\n    return (0);\n} // main\n```\n\n在原始汽车被打印输出后，创建了一份副本，并打印了该副本。因此，我们应该得到两组相同的输出。运行程序，你会看到类似这样的内容：\n\
  \n```\nHerbie has:\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial:\
  \ 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial:\
  \ 34.0 / 20.0 / 23.7 / 42.5\nI am a slant-6. VROOOM!\n\nHerbie has:\nAllWeatherRadial:\
  \ 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial:\
  \ 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\nI am a\
  \ slant-6. VROOOM!\n```\n\n## 协议与数据类型\n\n你可以在实例变量和方法参数所使用的数据类型中指定协议名称。通过这样做，你向 Objective-C\
  \ 编译器提供了更多信息，从而帮助它检查代码中的错误。\n\n回顾一下，`id`类型表示指向任意类型对象的指针；它是一种通用的对象类型。你可以将任何对象赋值给`id`变量，也可以将`id`变量赋值给任何类型的对象指针。如果在`id`后面跟上协议名称（用尖括号括起来），则是在告诉编译器（以及任何阅读代码的人）：你期望的是任意类型的对象，只要它遵循该协议即可。\n\
  \n例如，`NSControl`有一个名为`setObjectValue:`的方法，它需要一个遵循`NSCopying`协议的对象：\n\n```objectivec\n\
  - (void) setObjectValue: (id<NSCopying>) object;\n```\n\n编译这段代码时，编译器会检查参数的类型，并给出警告，例如“类\
  \ 'Triangle' 未实现 'NSCopying' 协议”。这非常方便！\n\n## Objective-C 2.0 新特性\n\n苹果公司永远不会满足于现状。Objective-C\
  \ 2.0 为协议新增了两个修饰符：`@optional` 和 `@required`。等等，我们刚才是不是说过，如果你遵循了一个协议，就必须实现该协议的所有方法？是的，没错，除非你指定了\
  \ `@optional` 关键字。因此，你可以编写像下面这样时髦的代码：\n\n```objectivec\n@protocol BaseballPlayer\n\
  - (void)drawHugeSalary;\n@optional\n- (void)slideHome;\n- (void)catchBall;\n- (void)throwBall;\n\
  @required\n- (void)swingBat;\n@end // BaseballPlayer\n```\n\n这段代码的意思是，采用`BaseballPlayer`协议的类必须实现`-drawHugeSalary`和`-swingBat`方法，但可以选择实现`slideHome`、`catchBall`或`throwBall`方法。\n\
  \n既然非正式协议似乎也能正常工作，为什么苹果还要添加这个特性呢？这是因为，在类声明和方法声明中明确表达我们意图的工具箱里，又多了一件利器。假设你在头文件中看到这样一行代码：\n\
  \n```objectivec\n@interface CalRipken : Person <BaseballPlayer>\n```\n\n你立刻就会知道，我们处理的是一个能赚大钱、能挥棒，并且可能会滑垒、接球或投球的人。如果使用非正式协议，就无法传达这些信息。同样地，你也可以用协议来修饰方法的参数：\n\
  \n```objectivec\n- (void)draft:(Person<BaseballPlayer>);\n```\n\n\n\n"
- "# 这段代码清楚地揭示了什么样的人会被征召去打棒球。如果你从事 iOS 开发，你会注意到 Cocoa 中那些非正式协议都变成了包含大量 `@optional`\
  \ 方法的正式协议。\n\n## 委托机制即将登场\n\n既然我们已经介绍了 Objective-C 中的协议，接下来我们来讨论**委托**，这是一种常与协议配合使用的特性。委托是一种设计模式，允许一个对象指定另一个对象来处理特定任务。\n\
  \n如果你看过大量 Objective-C 代码，很可能已经见过委托的实例。例如，`UITableView` 和 `NSTableView` 有一个由委托处理的\
  \ `dataSource` 属性。对象之所以知道委托能处理任务，是因为该委托遵循了处理该任务的协议。\n\n我们用一个现实世界的例子来说明。假设在你的编程工作中，有位负责创建\
  \ iOS 或 OS X 应用的上司。你的老板会亲自完成所有工作吗？不太可能。相反，老板会把项目拆分成小块，自己完成部分工作，然后根据其他程序员的专长，将剩余工作分配（委托）给他们。有些员工擅长某些任务，而另一些员工则更擅长其他任务。正因为老板明智，所以总能选对适合的人选来完成恰当的工作。\n\
  \n其实在上一章中你已经见过委托的例子。在 *12.04 iTunesFinder* 示例中，`ITunesFinder` 类就是 `NSNetServiceBrowser`\
  \ 的委托。\n\n`NSNetServiceBrowser` 如何信任该对象能执行所需的任务？我们来看看 `NSNetServiceBrowser` 的委托方法。\n\
  \n- `- (id <NSNetServiceBrowserDelegate>)delegate;`\n- `- (void)setDelegate:(id\
  \ <NSNetServiceBrowserDelegate>)delegate;`\n\n第一个方法返回当前设置的委托，如果未设置则返回 nil。第二个方法用于设置委托。参数\
  \ `delegate` 的类型告诉我们，只要对象遵循了预期的协议，我们就可以将其设为委托。\n\n如果你查看 `NSNetServices.h`，会看到该协议包含不少方法，而且所有方法都是可选的。我们可以实现这些可选方法的全部、部分或完全不实现。\n\
  \n我们定义 `ITunesFinder` 类时声明了它可以处理协议所要求的任务。\n\n```\n@interface ITunesFinder : NSObject\
  \ <NSNetServiceBrowserDelegate>\n\n@end // ITunesFinder\n```\n\n如果我们去掉 `<NSNetServiceBrowserDelegate>`\
  \ 部分，然后将该对象设为委托，会发生什么？编译器会抱怨“你无法处理这个方法！”并产生错误（好吧，也许它用的措辞稍有不同）：\n\n```\nSending 'ITunesFinder\
  \ *__strong' to parameter of incompatible type 'id<NSNetServiceBrowser\nDelegate>'\n\
  ```\n\n让我们看看 *13.02 委托* 中的示例。这里有三个对象：`Worker1`、`Worker2` 和 `Manager`。工人们有一些必须完成的强制工作，同时他们也可以选择做额外的工作来给老板留下好印象。另外请记住，这个项目使用了\
  \ ARC，所以我们在完成后不需要像在没有 ARC 时那样向对象发送 `release` 方法。\n\n```\nint main(int argc, const\
  \ char * argv[])\n{\n    @autoreleasepool\n    {\n        Manager *manager = [[Manager\
  \ alloc] init];\n        Worker1 *worker1 = [[Worker1 alloc] init];\n        manager.delegate\
  \ = worker1;\n        [manager doWork];\n\n        Worker2 *worker2 = [[Worker2\
  \ alloc] init];\n        manager.delegate = worker2;\n        [manager doWork];\n\
  \    }\n    return 0;\n}\n```\n\n运行这个程序时，我们会看到以下输出：\n\n```\nWorker1 doing required\
  \ work.\nI am a manager and I am working\nWorker2 doing required work.\nWorker doing\
  \ optional work.\nI am a manager and I am working\n```\n\n`Manager` 完成自己的工作，同时也要求工人们执行强制工作。如果工人们能够执行可选工作，他们也会照做。\n\
  \n```\n- (void)doWork\n{\n    [delegate doSomeRequiredWork];\n    if(YES == [delegate\n\
  \        respondsToSelector:@selector(doSomeOptionalWork)])\n    {\n        [delegate\
  \ doSomeOptionalWork];\n    }\n    [self myWork];\n}\n```\n\n`Manager` 通过委托让工人们完成他们的强制工作和可选工作。代码会先询问委托是否实现了对应方法，如果实现了，则让委托处理该方法。最后，`Manager`\
  \ 完成自己的工作。\n\n这段代码可能会给你一个启发：为什么不在调用每个方法之前先询问该对象是否拥有这个方法？这样一来，程序就不会因为调用不存在的方法而崩溃。这样做确实可行，但你会付出巨大的代价——程序运行速度会变得极慢。因此，最好只对委托执行这种检查。\n\
  \n## 总结\n\n在本章中，我们介绍了正式协议的概念。你可以在 `@protocol` 代码块中列出一组方法来定义正式协议。对象通过在 `@interface`\
  \ 语句中类名后的尖括号内列出协议名称来采用该正式协议。当对象采用正式协议时，它承诺实现协议中列出的所有必需方法。如果你没有实现协议中的所有方法，编译器会通过给出警告来帮助你信守承诺。\n\
  \n在此过程中，我们还探讨了面向对象编程中的一些细微差别，特别是在复制存在于类层次结构中的对象时出现的问题。\n\n现在，恭喜你！你已经掌握了 Objective-C\
  \ 语言的绝大部分内容，并深入探讨了面向对象编程中经常出现的许多主题。你已经为学习 Cocoa 编程或开展自己的项目打下了坚实的基础。在下一章中，我们将学习块（blocks），这是一个相对较新的\
  \ Objective-C 特性，能让你用函数实现更强大的功能。我们还将讨论并发，这能让你让计算机和移动设备同时处理多项任务。\n\n"
- "# 第十四章\n\n### 块与并发\n\n在本章中，我们将讨论**块**，这是一个增强函数功能的 Objective-C 特性。你可以在运行 iOS（4.0\
  \ 及更高版本）和 OS X（10.6 及更高版本）的应用中使用块。我们还将讨论并发，即如何利用能够同时执行多项任务的现代设备。\n\n### 活到老学到老，玩转块\n\
  \n块对象（通常简称为“块”）是 C 函数的扩展。除了函数通常包含的代码外，块还包含变量绑定。块也被称为**闭包**。\n\n块有两种绑定类型：自动绑定和管理绑定。**自动绑定**使用栈上的内存，而**管理绑定**则在堆上创建。\n\
  \n由于块实际上是在 C 语言层面实现的，因此它们可用于各种基于 C 的语言，包括 Objective-C、C++和 Objective-C++。\n\n块在\
  \ Xcode 的 GCC 和 Clang 工具中可用，但并非 ANSI C 标准的一部分。关于块的提案已提交给 C 编程语言标准组。\n\n### 块与函数指针\n\
  \n在深入探讨块之前，我们先花点时间谈谈传统的函数指针。为什么？因为块的语法借用了函数指针的语法。所以如果你知道如何声明函数指针，你就知道如何声明块。与函数指针一样，块具有以下特征：\n\
  \n*   返回类型可推断或显式声明\n*   类型参数列表\n*   名称\n\n让我们声明一个函数指针：\n\n```\nvoid (*my_func)(void);\n\
  ```\n\n这个非常基础的函数指针不接受任何参数，也不返回任何结果。要将其转换为块定义，我们只需将 `*`（星号）替换为 `^`（脱字符），像这样：\n\n\
  ```\nvoid (^my_block)(void);\n```\n\n你使用脱字符运算符来声明块变量，并标记块实现的开始。就像函数一样，块的主体包含在 `{}`（大括号）中。\n\
  \n\n\n“给我看代码，”你说？代码来了（你可以在 *14.01 Square* 中找到这段代码）：\n\n```\nint (^square_block)(int\
  \ number) =\n^(int number) {return (number * number);};\nint result = square_block(5);\n\
  printf(\"Result = %d\\n\", result);\n```\n\n这个特定的 block 接收一个整数并返回该数字的平方。等号前面部分是\
  \ block 定义，等号后面部分是实现。我们可以一般性地表述如下：\n\n```\n<returntype> (^blockname)(list of arguments)\
  \ = ^(arguments){ body; };\n```\n\n编译器会推断 block 字面量的返回类型，因此你可以省略它。如果 block 没有参数，你也可以省略它们。所以\
  \ block 通常可以非常紧凑简洁，就像下面这个来自 *14.02 Hello Blocks* 的例子：\n\n```\nvoid (^theBlock)()\
  \ = ^{ printf(\"Hello Blocks!\\n\"); };\n```\n\n## 使用 Block\n\n由于你将 block 声明为一个变量，你可以像使用函数一样使用它，正如你在\
  \ *14.01 Square* 中所见：\n\n```\nint result = square_block(5);\n```\n\n毫无疑问，你注意到这行代码中没有脱字符。这是因为只有在**定义**\
  \ block 时才使用脱字符，而不是在**调用**它时。\n\nBlock 还有一个很酷的特性，可能会让你愿意用它来代替函数：它们可以访问与 block 在同一（局部）作用域中声明的变量。这意味着，在\
  \ block 创建时可用的任何变量都可以被访问：\n\n```\nint value = 6;\nint (^multiply_block)(int number)\
  \ = ^(int number)\n{return (value * number);};\nint result = multiply_block(7);\n\
  printf(\"Result = %d\\n\", result);\n```\n\n## 直接使用 Block\n\n当你想要使用 block 时，大多数情况下你不需要创建\
  \ block 变量。相反，你通常直接在代码中内联创建一个 block 实例。通常，你需要一个将 block 作为参数的方法或函数（参见以下来自 *14.04\
  \ Sorting Array* 的代码）。\n\n```\nNSArray *array = [NSArray arrayWithObjects:\n@\"\
  Amir\", @\"Mishal\", @\"Irrum\", @\"Adam\", nil];\nNSLog(@\"Unsorted Array %@\"\
  , array);\nNSArray *sortedArray = [array sortedArrayUsingComparator:^(NSString\n\
  *object1, NSString *object2) {\n    return [object1 compare:object2];\n}];\nNSLog(@\"\
  Sorted Array %@\", sortedArray);\n```\n\n你只需创建一个 block，然后设置好它，之后就不用管了。\n\n## 使用\
  \ typedef\n\n正如你所见，那种冗长的定义变量语句可能有点令人生畏。输入其中一条时很容易出错。幸运的是，`typedef` 可以解救你（参见 *14.05\
  \ Typedefed Blocks*）。\n\n```\ntypedef double (^MKSampleMultiply2BlockRef)(double\
  \ c, double d);\n```\n\n这个语句定义了一个名为 `MKSampleMultiply2BlockRef` 的 block 变量，它接收两个\
  \ `double` 类型的参数并返回一个 `double` 类型的值。有了这个 `typedef`，你可以像这样使用这个变量：\n\n```\nMKSampleMultiply2BlockRef\
  \ multiply2 = ^(double c, double d)\n{ return c * d; };\nprintf(\"%f, %f\", multiply2(4,\
  \ 5), multiply2(5, 2));\n```\n\n如果你看看 *14.06 More Typedefs*，你会发现我们定义了好几种不同类型的 block\
  \ 变量。\n\n```\ntypedef void (^MKSampleVoidBlockRef)(void);\ntypedef void (^MKSampleStringBlockRef)(NSString\
  \ *);\ntypedef double (^MKSampleMultiplyBlockRef)(void);\n```\n\n## Block 与变量\n\n\
  当声明一个 block 时，它会捕获它在创建时刻的状态。Block 可以访问函数使用的标准类型的变量：\n\n* ![image](img/9781430241881_square_fmt.jpg)\
  \ 全局变量，包括包含作用域内的局部静态变量。\n* ![image](img/9781430241881_square_fmt.jpg) 全局函数（当然，不完全是变量）。\n\
  * ![image](img/9781430241881_square_fmt.jpg) 来自包含作用域的参数。\n* ![image](img/9781430241881_square_fmt.jpg)\
  \ 函数级别的 `__block` 变量（即与声明 block 相同的层级）。这些是可变的变量。\n* ![image](img/9781430241881_square_fmt.jpg)\
  \ 包含作用域内的非静态变量作为常量被捕获。\n* ![image](img/9781430241881_square_fmt.jpg) Objective-C\
  \ 实例变量。\n* ![image](img/9781430241881_square_fmt.jpg) Block 内部的局部变量。\n\n我们将更详细地探讨每种变量类型。\n\
  \n## 局部变量\n\n局部变量与 block 在同一作用域中声明。让我们看看这个例子，它来自 *14.06 More Typedefs*：\n\n```\n\
  typedef double (^MKSampleMultiplyBlockRef)(void);\ndouble a = 10, b = 20;\nMKSampleMultiplyBlockRef\
  \ multiply = ^(void){ return a * b; };\nNSLog(@\"%f\", multiply());\na = 20;\nb\
  \ = 50;\n// 你认为它会打印什么？\nNSLog(@\"%f\", multiply());\n```\n\n你认为第二个 `NSLog` 语句会打印什么？有人猜\
  \ 1000 吗？就像 Alex Trebek 会说的，“抱歉，不对。”为什么？因为这些变量是局部的，block 会复制它们并在 block 定义时保存它们的状态。所以在这个例子中，`NSLog`\
  \ 会打印 200。\n\n## 全局变量\n\n在前一节的局部变量例子中，我们说变量的作用域与 block 相同。你可以将这些变量标记为 `static`（全局）来让它们按照你可能期望的方式工作。\n\
  \n```\nstatic double a = 10, b = 20;\nMKSampleMultiplyBlockRef multiply = ^(void){\
  \ return a * b; };\nNSLog(@\"%f\", multiply());\na = 20;\nb = 50;\nNSLog(@\"%f\"\
  , multiply());\n```\n\n## 参数变量\n\nBlock 中的参数变量的行为方式与传递给函数的参数变量相同。\n\n```\ntypedef\
  \ double (^MKSampleMultiply2BlockRef)(double c, double d);\nMKSampleMultiply2BlockRef\
  \ multiply2 = ^(double c, double d) { return c * d; };\nNSLog(@\"%f, %f\", multiply2(4,\
  \ 5), multiply2(5, 2));\n```\n\n## `__block` 变量\n\n局部变量在 block 内作为常量被捕获。如果你想要能够修改它们的值，你必须将它们声明为可变的。因此，例如，以下代码将无法编译：\n\
  \n```\ndouble c = 3;\nMKSampleMultiplyBlockRef multiply = ^(double a, double b)\
  \ { c = a * b; };\n```\n\n编译器会对你报错，错误信息如下：\n\n```\nVariable is not assignable (missing\
  \ __block type specifier)\n```\n\n要修复编译错误，你需要将变量 `c` 标记为 `__block`，如上面那条友善的编译器消息所建议的那样（参见\
  \ *14.07 Mutable Variables*）：\n\n```\n__block double c = 3;\nMKSampleMultiplyBlockRef\
  \ multiply = ^(double a, double b)\n{ c = a * b; };\n```\n\n有些变量不能声明为 `__block`。这些限制适用：\n\
  \n* ![image](img/9781430241881_square_fmt.jpg) 不能是可变长度数组\n* ![image](img/9781430241881_square_fmt.jpg)\
  \ 不能是包含可变长度数组的结构体\n\n## Block 局部变量\n\n这些变量的行为方式与函数内部的局部变量相同。\n\n```\nvoid (^MKSampleBlockRef)(void)\
  \ = ^(void){\n    double a = 4;\n    double c = 2;\n    NSLog(@\"%f\", a * c);\n\
  };\nMKSampleBlockRef();\n```\n\n## Objective-C 对象\n\nBlock 在 Objective-C 中是第一等公民，这意味着你可以像对待任何其他对象一样对待它们。使用\
  \ block 时你会遇到的最大问题很可能是内存管理。正如我们刚刚讨论的，在 block 内部访问 Objective-C 对象时你必须小心。一如既往，有一些规则可以帮助你进行内存管理。\n\
  \n\n\n## 对象引用与内存管理\n\n- `![image](img/9781430241881_square_fmt.jpg)` 如果你引用一个 Objective-C\
  \ 对象，它会被保留。\n- `![image](img/9781430241881_square_fmt.jpg)` 如果你通过引用访问实例变量，`self`（执行该方法的对象）会被保留。\n\
  - `![image](img/9781430241881_square_fmt.jpg)` 如果你通过值访问实例变量，该变量会被保留。\n\n第一条规则很简单，但另两条之间存在细微差别。让我们查看\
  \ `14.08 Objective Blocks` 中的示例。在该项目中，找到 `ProcessStrings.m`。\n\n```\nNSString *string1\
  \ = ^{\n    return [_theString stringByAppendingString:_theString];\n};\n```\n\n\
  在这个示例中，`_theString` 是声明该 block 的类的一个实例变量。由于实例变量在 block 中被直接访问，因此容器对象（`self`）被保留。现在来看另一个示例：\n\
  \n```\nNSString *localObject = _theString;\nNSString *string2 = ^{\n    return [localObject\
  \ stringByAppendingString:localObject];\n};\n```\n\n在这个示例中，我们采用了间接方式：创建实例变量的本地引用，并在\
  \ block 体中使用该引用。这次被保留的是 `localObject`，而不是 `self`。\n\n由于 block 是对象，你可以向它们发送所有内存管理消息。在\
  \ C 层面，你必须使用 `Block_copy()` 和 `Block_release()` 函数来正确管理内存。`14.09 Block Copy` 将演示如何复制\
  \ block。\n\n```\nMKSampleVoidBlockRef block1 = ^{\n    NSLog(@\"Block1\");\n};\n\
  block1();\n\nMKSampleVoidBlockRef block2 = ^{\n    NSLog(@\"Block2\");\n};\nblock2();\n\
  \nBlock_release(block2);\nblock2 = Block_copy(block1);\nblock2();\n```\n\n## 并发，或保持同步\n\
  \n到目前为止，我们讨论的大部分代码都是按顺序一个接一个地执行。现在，我们讨论如何突破这一限制。\n\n你运行 Xcode 的 Mac 至少有两个处理器核心，甚至可能更多。即使是最新的\
  \ iOS 设备也拥有多核心。这意味着你可以同时处理多件事情。Apple 提供了多种 API 来利用多核心优势。同时执行多个任务的程序被称为**并发**程序。\n\
  \n利用并发的最基本技术是使用 POSIX 线程来处理程序中可以独立执行的不同部分。POSIX 线程同时提供 C 和 Objective-C API。编写并发应用程序需要创建多个线程，而编写多线程代码颇具挑战性。由于线程是底层\
  \ API，你必须手动管理它们。根据硬件和其他运行中软件的不同，所需线程数量的条件也会变化。处理所有这些情况相当棘手，一旦你评估了问题的范围，可能会认为自己不使用多线程代码反而更好。\n\
  \nApple 来拯救你了！为了减轻多核编程的负担，Apple 引入了 Grand Central Dispatch（简称 GCD）。这项技术为你承担了大部分线程管理的负担，让你可以专注于为任务编写代码。要使用\
  \ GCD，你只需提交 block 或函数作为线程运行。GCD 是一项系统级技术，因此你可以在代码的任何层面使用它。GCD 决定需要多少线程以及何时调度它们运行。由于它在系统层面运行，它可以平衡你的应用负载与所有其他运行中的程序，使计算机或设备运行更高效。\n\
  \n## 同步\n\n好吧，我们来打个比方。你在一条多车道高速公路上行驶，其他车辆经过你，而你正在超越一些较慢的车辆。想象一下，在你的计算机上，多条执行路径以同样的方式进行。就像交通一样，有些执行路径耗时很长，有些则很快。在高峰时段，当你想驶上高速公路时，你必须等待前方的车辆，一次只能有一辆车汇入车道。车道和交通信号控制着车流，使其尽可能平稳地运行。走出我们的汽车，进入计算机内部，当交通由进程组成时，我们如何管理？我们使用同步机制，例如标志或**互斥锁**来门控访问。\n\
  \n> **注意** “Mutex”是“**mut**ual **ex**clusion”（互斥）的缩写，指的是确保没有两个线程能同时进入其临界区的问题。\n\n\
  Objective-C 提供了一个语言级别的关键字 `@synchronized`。该关键字接受一个参数，通常是正在被修改的对象。\n\n```\n@synchronized(theObject)\n\
  {\n    // Critical section.\n}\n```\n\n这确保了临界代码段在不同线程间被串行访问。\n\n当你定义属性且没有指定 `nonatomic`\
  \ 关键字作为属性特性时，编译器会生成强制执行互斥的 getter 和 setter。如果你不在意，或者知道该属性的值不会被多个线程访问，你可以添加 `nonatomic`\
  \ 特性。为什么要这样做？原因是为了挤出一丝性能提升。这如何实现？编译器会生成 `@synchronize(mutex, atomic)` 来确保互斥。以这种方式设置代码和变量存在开销，这会使对这些属性的访问比直接访问慢得多。\n\
  \n## 选择性能\n\n如果你只是想让某些代码在后台执行，`NSObject` 提供了相应的方法。这些方法名称中都包含 `performSelector:`。最简单的是\
  \ `performSelectorInBackground:withObject:`，它在后台执行你的一个方法。它通过创建线程来运行你的方法。这些方法的定义有一些限制：\n\
  \n- `![image](img/9781430241881_square_fmt.jpg)` 由于这些方法在自己的线程上运行，你必须为 Cocoa 对象创建一个自动释放池。主自动释放池与主线程关联。\n\
  - `![image](img/9781430241881_square_fmt.jpg)` 这些方法不能返回值，并且要么不接受参数，要么接受一个对象作为参数。换句话说，这些方法必须具有以下签名之一：\n\
  \n```\n- (void)myMethod;\n- (void)myMethod:(id)myObject;\n```\n\n考虑到这些限制，我们的方法实现如下（`14.10\
  \ Selectors`）：\n\n```\n- (void)myBackgroundMethod\n{\n    @autoreleasepool\n   \
  \ {\n        NSLog(@\"My Background Method\");\n    }\n}\n```\n\n或\n\n```\n- (void)myOtherBackgroundMethod:(id)myObject\n\
  {\n    @autoreleasepool\n    {\n        NSLog(@\"My Background Method %@\", myObject);\n\
  \    }\n}\n```\n\n要在后台执行你的方法，只需调用 `performSelectorInBackground:withObject:`，如下所示：\n\
  \n```\n[self performSelectorInBackground:@selector(myBackgroundMethod)\n       \
  \               withObject:nil];\n[self performSelectorInBackground:@selector(myOtherBackgroundMethod:)\n\
  \                      withObject:arugmentObject];\n```\n\n就这样，完成了。方法执行完毕后，Objective-C\
  \ 运行时会负责清理并销毁线程。请注意，你不会收到方法执行完毕的通知：这是最基本、最精简的版本。如果你想做更复杂的事情，需要继续阅读，了解调度队列的精彩世界。\n\
  \n## 每天我都排队\n\nGCD 使用**调度队列**，这些队列类似于线程但使用起来简单得多。你只需编写代码，将其分配给队列，然后让系统执行它。你可以异步或同步执行任意代码。有三种类型的队列：\n\
  \n\n\n- ![image](img/9781430241881_square_fmt.jpg) *串行队列*：每个串行队列按照任务分配的顺序一次只执行一个任务。你可以创建任意数量的此类队列，它们会并行运行，每个队列一次执行一个任务。\n\
  - ![image](img/9781430241881_square_fmt.jpg) *并发队列*：每个并发队列同时执行一个或多个任务。任务按照分配到队列的顺序启动。你不能创建并发队列，而是使用系统提供的三个队列之一。\n\
  - ![image](img/9781430241881_square_fmt.jpg) *主队列*：这是应用程序可用的主队列。该队列在程序的主线程上执行任务。\n\
  \n接下来，我们将讨论这几种队列以及如何使用它们。\n\n## 一碗串行队列\n\n有时，你会遇到一系列需要按特定顺序执行的任务。此时可以使用串行队列。任务执行顺序是先进先出（FIFO）：只要任务是异步提交的，队列就能确保任务按可预测的顺序执行。这类队列永远不会发生死锁。\n\
  \n不是发型 **死锁（Deadlock）** 是一种令人不快的状态，两个或多个竞争任务互相等待对方完成。现实中，当汽车同时到达四向停车路口时，你就能观察到这种现象。\n\
  \n让我们快速创建一个串行队列：\n```\ndispatch_queue_t my_serial_queue;\n\nmy_serial_queue = dispatch_queue_create\n\
  \n(\"com.apress.MySerialQueue1\", NULL);\n```\n第一个参数是队列名称，第二个参数提供队列的属性（尽管当前未使用，且必须为\
  \ `NULL`）。队列创建后，我们就可以向其分配任务。队列是引用计数对象，因此在本节后续内容中，我们将不可避免地讨论内存管理问题。\n\n## 并发调度队列\n\
  \n并发调度队列非常适合可并行运行的任务。并发队列采用先进先出（FIFO）原则，一个任务可以在前一个任务完成之前就开始执行。同时运行的任务数量是不可预测的：它会根据系统当前运行的其他任务而变化。因此，每次运行程序时，并发任务的数量可能不同。\n\
  \n**注** 如果你需要确保每次都运行相同数量的任务，可以使用 `Threads` API 手动管理线程。\n\n每个应用程序可以获得三个并发队列：高优先级、默认优先级和低优先级。要获取这些队列的引用，需调用\
  \ `dispatch_get_global_queue`（参见 *14.11 Hello Queue*）。\n```\ndispatch_queue_t myQueue;\n\
  \nmyQueue = dispatch_get_global_queue\n\n(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\
  ```\n其他优先级选项包括 `DISPATCH_QUEUE_PRIORITY_HIGH`和 `DISPATCH_QUEUE_PRIORITY_LOW`。第二个参数当前始终为\
  \ `0`。由于这些是全局队列，你无需管理它们的内存。你不需要保留这些队列的引用——只需在需要时使用该函数获取访问权限即可。\n\n## 直下主街\n\n使用\
  \ `dispatch_get_main_queue` 来访问与应用程序主线程关联的串行队列。\n```\ndispatch_queue_t main_queue\
  \ = dispatch_get_current_queue(void);\n```\n由于此队列与主线程关联，你必须非常谨慎地调度该队列上的任务，因为它们会阻塞主应用程序。通常，你使用此队列进行同步：提交多个任务，并在所有任务完成后执行某些操作。\n\
  \n## 我是杰克的调度队列\n\n你可以通过调用 `dispatch_get_current_queue()` 来了解某个块在哪个队列上运行。如果在块对象外部调用此函数，它将返回主队列。\n\
  ```\ndispatch_queue_t myQueue = dispatch_get_current_queue();\n```\n\n## 队列也需要内存管理\n\
  \n调度队列是引用计数对象。你可以使用 `dispatch_retain()` 和 `dispatch_release()` 来修改队列的保留计数。你可能已经猜到，这些函数类似于常规对象的\
  \ `retain` 和 `release`。你只能对创建的队列使用这些函数，而不能用于全局调度队列。事实上，如果将这些消息发送给全局队列，它们会被忽略，所以不会造成任何损害。如果你正在编写使用垃圾收集的\
  \ OS X 应用程序，则必须手动管理这些队列。\n\n## 队列的上下文\n\n你可以为调度对象（包括调度队列）分配一个全局数据上下文。你可以将几乎任何类型的数据（如\
  \ Objective-C 对象或指针）分配给此上下文。系统只知道上下文包含与你的队列关联的数据。你必须自己管理上下文数据的内存。你需要在需要时分配内存，并在队列被释放前清理数据。一旦分配了上下文数据，就可以使用\
  \ `dispatch_set_context()` 和 `dispatch_get_context()` 函数。\n```\nNSMutableDictionary\
  \ *myContext =\n\n[[NSMutableDictionary alloc] initWithCapacity:5];\n\n[myContext\
  \ setObject:@\"My Context\" forKey:@\"title\"];\n\n[myContext setObject:[NSNumber\
  \ numberWithInt:0] forKey:@\"value\"];\n\ndispatch_set_context(_serial_queue,\n\n\
  (__bridge_retained void *)myContext);\n```\n在这个例子中，我们创建了一个字典作为上下文，但我们可以使用任何指针类型。我们甚至可以直接分配原始内存并加以利用。\n\
  \n在最后一行，我们需要声明队列必须跟踪此对象。我们使用 `__bridge_retained` 来增加 `myContext` 的保留计数。\n\n### 清理函数\n\
  \n设置好上下文对象的数据后，何时释放它？简单的答案是，你并不确切知道上下文对象何时消失。为了处理这种情况，你可以告诉对象在释放时调用一个函数，类似于类的 `dealloc`\
  \ 方法。函数的签名必须如下所示：\n```\nvoid function_name(void *context);\n```\n我们将创建一个示例函数，在上下文对象即将被释放时调用，通常称为**终结器**函数：\n\
  ```\nvoid myFinalizerFunction(void *context)\n\n{\n\nNSLog(@\"myFinalizerFunction\"\
  );\n\nNSMutableDictionary *theData = (__bridge_transfer\n\nNSMutableDictionary*)context;\n\
  \n[theData removeAllObjects];\n\n}\n```\n让我们稍微讨论一下 `__bridge_transfer` 关键字。此关键字将对象内存的管理权从全局池转移到我们的函数。当我们的函数终止时，ARC\
  \ 会减少其保留计数，当保留计数降至零时，对象将被释放。但如果对象未被释放，`myContext` 将一直存在，直到宇宙热寂（大致如此）。\n\n我们如何从块内部访问上下文？\n\
  ```\nNSMutableDictionary *myContext = (__bridge NSMutableDictionary *)\n\ndispatch_get_context(dispatch_get_current_queue());\n\
  ```\n为什么我们在这里添加了 `__bridge` 关键字？这是在告诉 ARC，我们不关心上下文的内存管理。我们希望系统继续管理它。\n\n## 添加任务\n\
  \n向队列添加任务有两种方式：\n- ![image](img/9781430241881_square_fmt.jpg) *同步添加*：队列会等待任务完成。\n\
  - ![image](img/9781430241881_square_fmt.jpg) *异步添加*：任务被添加后，函数立即返回，无需等待任务完成。这种技术更受青睐，因为它不会阻塞其他代码的运行。\n\
  \n你可以提交一个块或一个函数在队列上执行。共有四个调度函数：包括 `sync` 和 `async`，分别用于块或函数。我们将逐一查看每种类型的调度函数。\n\n\
  **注** 为避免死锁，你绝不应在同一个队列上运行的任务中调用 `dispatch_sync` 或 `dispatch_sync_f`。\n\n## 使用 Dispatch\
  \ 进行编程\n\n\n\n\n向队列中添加任务最简便的方式是通过代码块实现。该代码块必须为 `dispatch_block_t` 类型，其定义是不接受参数且不返回任何值：\n\
  \n```\ntypedef void (^dispatch_block_t)(void)\n```\n\n现在我们来添加异步代码块。这是一个函数，它接受两个参数：队列和代码块。\n\
  \n```\ndispatch_async(_serial_queue, ^{ NSLog(@\"Serial Task 1\"); });\n```\n\n\
  如果愿意，你也可以提前定义一个代码块，而不是内联定义。\n\n```\ndispatch_block_t myBlock = ^{ NSLog(@\"My Predfined\
  \ block\"); };\ndispatch_async(_serial_queue, myBlock);\n```\n\n若想同步添加函数，请使用 `dispatch_sync`。\n\
  \n正如我们之前所说，我们也可以将函数添加到队列中。函数的原型必须如下所示：\n\n```\nvoid function_name(void *argument)\n\
  ```\n\n以下是一个示例函数：\n\n```\nvoid myDispatchFuction(void *argument)\n{\n    NSLog(@\"\
  Serial Task %@\", (__bridge NSNumber *)argument);\n    NSMutableDictionary *context\
  \ = (__bridge NSMutableDictionary *)\n    dispatch_get_context(dispatch_get_current_queue());\n\
  \    NSNumber *value = [context objectForKey:@\"value\"];\n    NSLog(@\"value =\
  \ %@\", value);\n}\n```\n\n接下来，我们需要将这个函数添加到队列中。`dispatch` 函数接受三个参数：队列、需要传递的任何上下文，以及函数本身。如果你不需要向函数传递额外信息，可以直接传递\
  \ `NULL`。\n\n```\ndispatch_async_f(_serial_queue, (__bridge void *)[NSNumber numberWithInt:3],\n\
  \                 (dispatch_function_t)myDispatchFuction);\n```\n\n队列创建完成后，它便立即就绪并等待任务。当我们添加一个任务时，队列会对其进行调度。若要同步添加任务，请调用\
  \ `dispatch_sync_f`。\n\n如果出于任何原因想要暂停队列，可以调用 `dispatch_suspend()` 并传入该队列。\n\n```\n\
  dispatch_suspend(_serial_queue);\n```\n\n一旦暂停了队列，便可以通过调用 `dispatch_resume()` 来恢复它。你仿佛成为时间和空间的主宰者。\n\
  \n```\ndispatch_resume(_serial_queue);\n```\n\n## 操作队列\n\n你可能已经注意到，这些内容相当底层。你可能会问，Objective-C\
  \ 发生了什么？你最近不是刚读过一本关于这门语言的书吗？实际上，在 Objective-C 层面有一些称为操作的 API，它们能让使用队列变得更加简单。\n\n\
  要使用操作，首先需要创建一个操作对象；然后将其分配给操作队列，让队列执行它。创建操作有三种方式：\n\n- **`NSInvocationOperation`**：当你已经有一个执行任务的类，并希望它在队列中执行时，使用此方式。\n\
  - **`NSBlockOperation`**：这与使用代码块调用 `dispatch_async` 类似，用于执行代码块。\n- **自定义操作**：如果你需要对操作类型有更多灵活性，可以创建自己的自定义类型。你必须通过子类化\
  \ `NSOperation` 来定义你的操作。\n\n我们将花些时间和笔墨（对于电子书读者来说，可能是电子）来讨论每种技术。\n\n### 创建调用操作\n\n\
  `NSInvocationOperation` 会调用你类中的一个选择器来执行任务。如果你已经构建了一个带有选择器的类，这种方法会非常方便（参见 *14.12\
  \ 节 Objective 队列*）。\n\n```\n@implementation MyCustomClass\n- (NSOperation *)operationWithData:(id)data\n\
  {\n    return [[NSInvocationOperation alloc] initWithTarget:self\n             \
  \                                   selector:@selector(myWorkerMethod:) object:data];\n\
  }\n\n// 这是执行实际工作的方法\n- (void)myWorkerMethod:(id)data\n{\n    NSLog(@\"My Worker\
  \ Method %@\", data);\n}\n@end\n```\n\n一旦你将操作添加到队列中，并且该任务准备就绪可以执行时，类的 `myWorkerMethod:`\
  \ 方法就会被调用。\n\n### 创建块操作\n\n如果你有一段希望在队列上执行的代码块，可以创建此操作并让队列运行它。\n\n```\nNSBlockOperation\
  \ *blockOperation =\n[NSBlockOperation blockOperationWithBlock:^{\n    // 执行我的工作\n\
  }];\n```\n\n这些操作中的代码块与我们之前在调度队列中使用的类型相同。一旦你用第一个代码块创建了一个块操作，就可以使用 `addExecutionBlock:`\
  \ 方法添加更多代码块。根据队列类型（串行或并发），这些代码块将分别以串行或并行方式运行。\n\n```\n[blockOperation addExecutionBlock:^{\n\
  \    // 做一些额外的工作\n}];\n```\n\n### 将操作添加到队列\n\n创建操作后，需要将代码块添加到队列中。这次我们不使用前一节中的 `dispatch_queue_t`，而是使用\
  \ `NSOperationQueue`。`NSOperationQueue` 总是并发执行操作。它还会考虑依赖关系，因此如果一个操作依赖于另一个操作，它们将按顺序执行。\n\
  \n如果你想确保始终串行执行操作，可以将最大并发操作数设置为 1，任务将按先进先出顺序执行。在将操作添加到队列之前，需要一种方式来引用该队列。你可以创建一个队列，或者使用预定义的队列，例如当前队列：\n\
  \n```\nNSOperationQueue *currentQueue = [NSOperationQueue currentQueue];\n```\n\n\
  或者主队列：\n\n```\nNSOperationQueue *mainQueue = [NSOperationQueue mainQueue];\n```\n\
  \n以下是我们如何创建自己的队列：\n\n```\nNSOperationQueue *_operationQueue = [[NSOperationQueue\
  \ alloc] init];\n```\n\n现在我们有了一个队列，可以使用 `addOperation:` 来添加操作：\n\n```\n[theQueue\
  \ addOperation:blockOperation];\n```\n\n或者，我们可以直接添加一个要执行的代码块，而无需创建操作对象：\n\n```\n\
  [theQueue addOperationWithBlock:^{\n    NSLog(@\"My Block\");\n}];\n```\n\n一旦你将操作添加到队列中，它就会被调度并执行。\n\
  \n## 总结\n\n在本章中，我们介绍了代码块，这是 Objective-C 中相对较新的补充，它增强了函数的功能。代码块允许你将变量绑定到函数上，从而创建可在程序中使用的对象。代码块在实现并发方面尤其有用。\n\
  \n并发主题广泛且复杂。在本章中，我们描述了一些在 OS X 和 iOS 中可供程序使用的并发特性。\n\nApple 的 Grand Central Dispatch\
  \ (GCD) 特性为你的应用提供了一种利用并发的方式，而无需将所有时间都花在系统底层编程上。你应该尝试使用 GCD 和其他并发编程特性，来探索你的应用可能实现的功能以及你感到舒适的做法。\n\
  \n随着你技能的提升和 Apple 添加更多工具，你的应用将能并行执行更多任务，从而使其响应更快。然而，总会有一个收益递减点，此时为应用增加并行处理所付出的代价（在额外编码和调试时间上）超过了其带来的好处。\n\
  \n在你更多处理并发任务时，请注意防范创建死锁（相互依赖从而永远无法完成的任务）以及其他严重错误。这些可能是你不想发生的事情。\n\n"
- "# 第 15 章\n\n## UIKit 简介\n\n到目前为止，我们已经在学习为 Mac 操作系统 OS X 编写应用程序的过程中获得了不少乐趣。不过，关于\
  \ Mac 的内容我们先告一段落。是时候转换一下方向，看看如何为 iOS 编写应用程序了。就像 Mac 应用使用 AppKit 一样，iOS 应用则使用 UIKit。它包含了构成\
  \ iOS 应用的所有 UI 组件和精华。\n\niOS 没有命令行访问功能，因此我们无法像在 OS X 中那样创建命令行工具。相反，我们将从复制我们在第 14\
  \ 章中为 OS X 编写的 `CaseTool` 程序开始。你甚至不需要 iOS 设备来完成这个练习。你只需要安装了 iOS SDK 的 Xcode 即可，当你从\
  \ Mac App Store 获取 Xcode 时，默认就会安装。\n\n请记住 iOS 与 OS X 的几处不同：\n\n\n\n\n- 没有 shell\
  \ 或控制台。\n- 应用在 Mac 上的模拟器中运行。\n- 某些非 UI 的 API 不可用。\n- 大多数程序员认为开发 iOS 应用要容易得多。\n\n\
  我们的最终产品在 iPhone 上看起来会像图 15-1。与第 14 章中的`CaseTool`一样，这个应用会将你的字符串全部转换为大写或全部小写。\n\n\
  ![9781430241881_Fig15-01.tif](img/9781430241881_Fig15-01_fmt.jpg)\n\n图 15-1. iPhone\
  \ 上的`CaseTool`预览\n\n让我们通过启动`Xcode`（如果尚未运行的话）来开始冒险。我们需要做的第一件事是使用 iOS SDK 创建一个项目。选择**文件**\
  \ ![image](img/9781430241881_arrow_fmt.jpg) **新建** ![image](img/9781430241881_arrow_fmt.jpg)\
  \ **新建项目**或`⌘+Shift+N`，如图 15-2 所示。\n\n![9781430241881_Fig15-02.tif](img/9781430241881_Fig15-02_fmt.jpg)\n\
  \n图 15-2. 创建一个新项目\n\n这将弹出一个窗口来选择项目类型。我们从左侧列表中选择**iOS 应用程序**，然后会显示应用程序类型（见图 15-3）。\n\
  \n![9781430241881_Fig15-03.tif](img/9781430241881_Fig15-03_fmt.jpg)\n\n图 15-3. 选择应用程序类型\n\
  \n我们选择**单视图应用程序**。顾名思义，这个应用只显示一个视图。此类应用通常非常简单，不需要太多的用户界面。\n\n其他模板的用途如下：\n\n- **主从视图**使用导航控制器和表格视图来列出项目，并在选中时显示项目的详细信息。\n\
  - **OpenGL 游戏**用于制作超级棒的消磨时间的游戏。\n- **基于页面的**让你构建类似图书的应用，具有翻页动画（仅限`iPad`）。\n- **标签式**创建多视图应用，常见于底部有标签栏且每个标签对应一个视图的\
  \ iPhone 应用。\n- **实用工具应用**模板有一个主视图，类似于单视图应用，但增加了翻转视图。\n- **空应用程序**是一个高级选项，如果没有合适的模板，或者你确切地知道如何构建你的应用，可以使用此选项。\n\
  \n一旦你选择了**单视图应用程序**，点击**下一步**。你会看到要求为应用命名的对话框。我们将使用与 OS X 应用相同的名称：`CaseTool`。\n\n\
  在此屏幕上，确保**使用故事板**和**包含单元测试**未被选中，但一定要选中**使用自动引用计数**。对于设备系列，我们选择**通用**，这意味着我们的应用可以在`iPhone`、`iPod\
  \ touch`和`iPad`上运行。完成所有选择后，点击**下一步**进入下一个屏幕，在这里你可以选择保存项目的目录（见图 15-5）。\n\n![9781430241881_Fig15-04.tif](img/9781430241881_Fig15-04_fmt.jpg)\n\
  \n图 15-4\\. 是时候“命名应用”了\n\n![9781430241881_Fig15-05.tif](img/9781430241881_Fig15-05_fmt.jpg)\n\
  \n图 15-5. 为项目选择位置\n\n项目创建完成后，`Xcode`会打开并显示它（见图 15-6）。\n\n![9781430241881_Fig15-06.tif](img/9781430241881_Fig15-06_fmt.jpg)\n\
  \n图 15-6. 我们的新项目\n\n\n\n浏览文件列表，我们会看到应用委托（application delegate）的相关文件，此外还有一个类文件以及两个\
  \ nib 文件，分别对应 iPhone 和 iPad。（如果在创建项目时未选择*通用（Universal）*，则只会得到其中一种文件。）\n\n接下来深入研究应用委托的头文件。首先看到的是我们信赖的\
  \ `#import`，你可能还记得，早在第 14 章中我们就接触过它。iOS 的界面元素以 `UI` 为前缀，因为我们使用的是 `UIKit` 而非 `AppKit`。此外还有\
  \ `Foundation` 框架，它在 iOS 上的工作方式与在 OS X 上相同。因此，像 `NSString` 这样的类是可用的，并且其行为与在 OS X\
  \ 中一致。\n\n```objectivec\n#import <UIKit/UIKit.h>\n\n@class MSCViewController;\n\n\
  @interface MSCAppDelegate : UIResponder <UIApplicationDelegate>\n\n@property (strong,\
  \ nonatomic) UIWindow *window;\n\n@property (strong, nonatomic) MSCViewController\
  \ *viewController;\n\n@end\n```\n\n在代码中，你会看到我们有一个窗口对象和一个视图控制器对象。下面是具体的实现：\n\n```objectivec\n\
  - (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点。\n    if ([[UIDevice currentDevice]\
  \ userInterfaceIdiom] == UIUserInterfaceIdiomPhone) {\n        self.viewController\
  \ = [[MSCViewController alloc] initWithNibName:\n                              \
  \ @\"MSCViewController_iPhone\" bundle:nil];\n    } else {\n        self.viewController\
  \ = [[MSCViewController alloc] initWithNibName:\n                              \
  \ @\"MSCViewController_iPad\" bundle:nil];\n    }\n    self.window.rootViewController\
  \ = self.viewController;\n    [self.window makeKeyAndVisible];\n    return YES;\n\
  }\n```\n\n这段代码首先创建一个窗口对象。所有应用都在这个主窗口中运行。接着，我们创建视图控制器，其类型会根据运行代码的设备而有所不同。然后，我们请求视图控制器提供要添加到视图层次结构中的视图。这是几乎所有应用都会用到的样板代码。事实上，即使你基于其他模板创建应用，代码结构也会与此非常相似。\n\
  \n## 视图控制器\n\nCocoa 使用的主要模式是“模型-视图-控制器”（Model-View-Controller），正如我们在第 14 章中所讨论的。果然，在我们的应用中，有一个视图、一个控制器以及某种模型。\n\
  \n我们的视图来自一个 nib 文件。这样做很方便，因为从 nib 文件设计和加载视图比手动创建要快。\n\n`MSCViewController` 类是 `UIViewController`\
  \ 的子类。`UIViewController` 知道如何执行管理视图的典型任务，例如将视图放到屏幕上、调整大小、旋转等。由于我们在管理一个视图，因此将其作为我们子类的基类是合理的。\n\
  \n为什么不能直接使用 `UIViewController` 呢？因为我们需要向视图中添加一些元素，而 `UIViewController` 并不知道这些元素。所以我们创建子类，并教会子类如何处理我们添加的内容。\n\
  \n## 向 Nib 文件中添加元素\n\n选择 iPhone 专用的 nib 文件 `MSCViewControler_iPhone.xib`。你会看到应用视图以\
  \ iPhone 屏幕的大小显示。同时注意，对象窗格中显示的是 iOS 特有的项目（参见图 15-7）。\n\n![9781430241881_Fig15-07.tif](img/9781430241881_Fig15-07_fmt.jpg)\n\
  \n图 15-7. iPhone nib 文件\n\n我们来处理这个 nib 文件。从右下角的“对象”窗格中选择一个“文本字段”（Text Field）对象，并将其拖到视图中。调整其大小以适应屏幕宽度，同时注意调整大小时出现的参考线（参见图\
  \ 15-8）。\n\n![9781430241881_Fig15-08.tif](img/9781430241881_Fig15-08_fmt.jpg)\n\n\
  图 15-8. 添加一个文本字段\n\n接下来，拖拽一个“标签”（Label）对象并添加到视图中，然后调整其大小。结果如图 15-9 所示。\n\n![9781430241881_Fig15-09.tif](img/9781430241881_Fig15-09_fmt.jpg)\n\
  \n图 15-9. 在文本字段下方放置一个标签\n\n下一步是添加一个按钮。在“对象”窗格中选择“圆角矩形按钮”（Round Rect Button），并将其拖到视图中，放置在文本字段和标签的下方。按钮放置好后，调整其大小和布局，使其与文本字段的宽度匹配，如图\
  \ 15-10 所示。\n\n![9781430241881_Fig15-10.tif](img/9781430241881_Fig15-10_fmt.jpg)\n\
  \n图 15-10. 我们添加了一个宽大的圆角矩形按钮。圆角矩形的应用随处可见！\n\n现在双击圆角矩形按钮为其设置标题。我们将其命名为 `UpperCase`（参见图\
  \ 15-11）。\n\n![9781430241881_Fig15-11.tif](img/9781430241881_Fig15-11_fmt.jpg)\n\
  \n图 15-11. 为按钮命名\n\n我们有了一个用于将文本转换为大写的按钮。还需要一个用于相反功能的按钮。再拖拽一个圆角矩形按钮到视图中，并将其放在第一个按钮的下方。调整其大小使其与第一个按钮一致，并将其命名为\
  \ `LowerCase`，如图 15-12 所示。（这里有一个快捷提示：你也可以通过选中第一个按钮，然后选择“编辑 ![image](img/9781430241881_arrow_fmt.jpg)\
  \ 复制”，或直接按 ![image](img/Rangoli1.jpg) +D 来创建第二个按钮。）\n\n![9781430241881_Fig15-12.tif](img/9781430241881_Fig15-12_fmt.jpg)\n\
  \n图 15-12. 将第二个按钮放置到位\n\n当然，你不必完全按照我们的方式来布局视图。你可以根据自己的喜好随意调整对象的大小和位置。我们的完整视图布局如图\
  \ 15-13 所示。\n\n![9781430241881_Fig15-13.tif](img/9781430241881_Fig15-13_fmt.jpg)\n\
  \n图 15-13. 完全布局好的视图\n\n现在我们按照期望设置了视图，接下来就是连接输出口（outlet）和动作（action）的乐趣了。在工具栏右侧，点击“编辑器”（Editor）组中的中间按钮以打开助理编辑器，或者如果你更喜欢快捷键，可以在键盘上按\
  \ ![image](img/Rangoli1.jpg) +option+return。调整 nib 文件和头文件 `MCSViewController.h`\
  \ 的排列，以便于在它们之间拖拽和连接。还记得在第 14 章中我们使用 control-拖拽的乐趣吗？让我们再来一次。从视图中的文本字段向头文件进行 control-拖拽（参见图\
  \ 15-14）。\n\n![9781430241881_Fig15-14.tif](img/9781430241881_Fig15-14_fmt.jpg)\n\
  \n图 15-14. control-拖拽以建立第一个连接\n\n将拖拽的线条放置在头文件中 `@interface` 和 `@end` 之间（同样参见图 15-14）。Xcode\
  \ 会弹出一个漂亮的小窗口（参见图 15-15）。\n\n![9781430241881_Fig15-15.tif](img/9781430241881_Fig15-15_fmt.jpg)\n\
  \n图 15-15. 创建新连接时出现的窗口\n\n图 15-15 中的窗口要求你输入输出口的名称。但在操作之前，请注意“对象”（Object）旁边显示的是“文件所有者”（File's\
  \ Owner）。这是什么意思呢？当你加载一个 nib 文件时，它由一个控制器拥有。当模板创建了 nib 文件和控制器文件时，它让我们的控制器成为了该 nib\
  \ 文件的所有者。如果需要，你可以通过选择 nib 文件中的“文件所有者”并更改其类来修改 nib 文件的所有者。但就目前而言，我们保持现状。\n\n现在我们已经准备好为输出口命名了。输入\
  \ `textField`，然后点击“连接”（Connect）。\n\n\n\n通过执行此过程，我们刚刚添加了一个`outlet`（参见图 15-16）。如果你查看头文件，会发现添加了用于指定`outlet`的代码。注意此类名为`UITextField`。回想一下第\
  \ 14 章中关于 Mac 的示例，我们使用了`NSTextField`，它与`UITextField`相似，但并不完全相同。\n\n![9781430241881_Fig15-16.tif](img/9781430241881_Fig15-16_fmt.jpg)\n\
  \n图 15-16. 我们已添加了一个`outlet`\n\n![9781430241881_Fig15-17.tif](img/9781430241881_Fig15-17_fmt.jpg)\n\
  \n图 15-17. 为标签命名`outlet`\n\n现在，让我们连接标签以保存结果。从标签按住`Control`键拖动，直至`textField` `outlet`代码的下方。\n\
  \n输入`resultsField`作为名称，并点击`Connect`。现在，我们有两个`outlet`，如头文件所示（参见图 15-18）。\n\n![9781430241881_Fig15-18.tif](img/9781430241881_Fig15-18_fmt.jpg)\n\
  \n图 15-18. 我们有两个`outlet`\n\n现在是时候让按钮生效了。我们通过为按钮添加`action`来实现这一点。我们不需要为它们设置`outlet`，因为`outlet`用于更改它们的值，而目前我们不需要这样做。\n\
  \n要创建第一个按钮`action`，从`UpperCase`按钮按住`Control`键拖动，并放置到头文件中的`resultsField`下方，如图 15-19\
  \ 所示。\n\n![9781430241881_Fig15-19.tif](img/9781430241881_Fig15-19_fmt.jpg)\n\n图\
  \ 15-19. 按住`Control`键拖动以创建第一个按钮`action`\n\n这次我们要创建一个`action`，因此点击`Outlet`并将其更改为`Action`。这会改变对话框中可用的选项（参见图\
  \ 15-20）。\n\n![9781430241881_Fig15-20.tif](img/9781430241881_Fig15-20_fmt.jpg)\n\
  \n图 15-20. 用于设置`UpperCase`按钮的对话框\n\n以下是`Connection`对话框中每个选项的说明：\n\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ **名称**：此项包含我们正在创建的`action`的名称。\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ **类型**：这是`action`参数的类型名称。默认情况下，该值为`id`（通用类型），但你可以将其改为发送`action`的类。在我们的例子中，发送`action`的类是`UIButton`。\n\
  *   ![image](img/9781430241881_square_fmt.jpg) **事件**：此项在 OS X 和 iOS 之间差异很大。在 iOS\
  \ 中，由于触摸界面的原因，事件类型更多。在这种情况下，我们将使用`Touch Up Inside`事件。这意味着当用户的手指在按钮内部离开屏幕时，将调用按钮`action`。图\
  \ 15-21 展示了 iOS `action`可用的所有不同类型的事件。\n\n![9781430241881_Fig15-21.tif](img/9781430241881_Fig15-21_fmt.jpg)\n\
  \n图 15-21. 为`action`选择事件类型\n\n*   ![image](img/9781430241881_square_fmt.jpg) **参数**：在\
  \ OS X 应用程序中，我们没有参数选项，因为所有`action`都有一个参数。在愉快的 iOS 世界中，我们有三个选项：`None`、`Sender`（即\
  \ OS X 中的情况）和`Sender and Event`（其中包含一个`UIEvent`参数，你可以查询它来决定做什么）。对于我们的`action`，我们将选择`None`（参见图\
  \ 15-22）。\n\n![9781430241881_Fig15-22.tif](img/9781430241881_Fig15-22_fmt.jpg)\n\
  \n图 15-22. 选择`None`作为参数\n\n完成此步骤将为`action`生成代码，并将其添加到头文件中。\n\n接下来，我们为`LowerCase`按钮创建一个`action`。\n\
  \n界面连接完成后，我们来添加一些代码。（遗憾的是，编程仍然需要这一步。）一些样板代码已经存在，例如`synthesizing`属性和`action`的空实现。\n\
  \n![9781430241881_Fig15-23.tif](img/9781430241881_Fig15-23_fmt.jpg)\n\n图 15-23.\
  \ 已添加`UpperCase action`的代码\n\n![9781430241881_Fig15-24.tif](img/9781430241881_Fig15-24_fmt.jpg)\n\
  \n图 15-24. 为第二个按钮创建`action`\n\n回顾第 14 章，我们从应用程序委托中调用：\n\n```\n- (id)initWithNibName:(NSString\
  \ *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n```\n\n这个方法在我们的父类中，因此我们无需实现它。我们调用此方法来加载`nib`文件，如果想要访问`outlet`，就需要这样做。因此，我们将调用此方法：\n\
  \n```\n- (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n\
  {\n    self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];\n    if\
  \ (nil != self)\n    {\n        NSLog (@\"init: text %@ / results %@\", textField,\
  \ resultsField);\n    }\n    return self;\n}\n```\n\n同样在第 14 章中，我们讨论了`awakeFromNib`。`view\
  \ controller`在`nib`被加载且对象初始化后会调用`viewDidLoad`。早期的一些 iOS 版本也会调用`awakeFromNib`，但在\
  \ iOS 5 中则不会调用。\n\n让我们添加`awakeFromNib`：\n\n```\n- (void)awakeFromNib\n{\n    NSLog(@\"\
  awake: text %@ / results %@\", textField, resultsField);\n}\n```\n\n我们将添加一个`viewDidLoad`的最小实现。这通常是你修改`outlet`或设置其他`UI`元素的地方，因为在调用`viewDidLoad`时，可以保证`nib`文件已经加载。我们将用它为文本字段设置一些默认值。\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n    NSLog (@\"viewDidLoad:\
  \ text %@ / results %@\", textField, resultsField);\n\n    [textField setPlaceholder:@\"\
  Enter text here\"];\n    resultsField.text = @\"Results\";\n}\n```\n\n此代码为`textField`设置了`placeholder`，即用户在其中输入任何内容之前显示的灰色文本。我们还为标签设置了默认值，以便让用户知道在哪里可以看到结果。\n\
  \n接下来在代码中，你会看到`viewDidUnload`。当视图从视图层级结构中移除后，会调用此方法。我们为什么关心这个？答案是为了节省内存。\n\niOS\
  \ 不使用虚拟内存。应用程序受设备可用内存的限制。此外，如果我们使用过多内存，iOS 会以极大的报复和愤怒打击我们，杀死我们的应用程序。我们可以使用`viewDidUnload`来帮助清理资源。\n\
  \n在 iOS（尤其是 iPhone）应用程序中，大多数情况下，当一个视图消失时，屏幕上会被另一个视图替换。此时，前一个视图不再可见，因此我们不需要保留它。iOS\
  \ 会卸载视图以节省内存，因此`viewDidUnload`给了我们从视图中移除元素的机会，从而节省一些内存。在这种情况下，我们移除`textField`和`resultsField`。这两个方法在视图的整个生命周期中只会被调用一次。\n\
  \n还有另外四个方法（`viewWillAppear:`、`viewDidAppear:`、`viewWillDisappear:`和`viewDidDisappear:`），它们在视图将要消失或出现时被调用。这些方法会在每次适当时被调用，即使视图没有被卸载也会如此。\n\
  \n现在，让我们添加实际执行大小写转换的代码。\n\n```\n- (IBAction)uppercase\n{\n    NSString *original\
  \ = textField.text;\n    NSString *uppercase = [original uppercaseString];\n   \
  \ resultsField.text = uppercase;\n}\n\n- (IBAction)lowercase\n{\n    NSString *original\
  \ = textField.text;\n    NSString *lowercase = [original lowercaseString];\n   \
  \ resultsField.text = lowercase;\n}\n```\n\n\n\n对于 iOS 文本字段，我们要求字段使用`NSString`方法来转换其文本（就像我们在第\
  \ 14 章的 OS X 代码中所做的那样），然后设置标签的`text`属性为修改后的字符串。与 OS X 版本类似，我们将使用`stringValue`和`setStringValue:`来实现。\n\
  \n我们声称正在构建一个通用应用程序，一个可以在 iPhone 和 iPad 上运行的应用程序，但我们尚未处理 iPad 的 nib 文件。让我们来解决这个问题。\n\
  \n选择 iPad 版本的 nib 文件`ViewController_iPad.xib`。添加必要的 UI 元素，使其看起来像我们之前创建的 iPhone 版本。我们可以像为\
  \ iPhone 版本那样逐个创建元素，或者为了更快地操作，可以在 iPhone 视图中按住 Shift 键选择多个元素，复制它们，然后粘贴到 iPad 视图中。结果应类似于图\
  \ 15-25。\n\n![9781430241881_Fig15-25.tif](img/9781430241881_Fig15-25_fmt.jpg)\n\n\
  图 15-25. 创建 iPad 用户界面\n\n我们现在更接近了，但还没有完全完成。如果现在构建并运行应用程序，我们实际上可以在文本字段中输入文本并点击按钮，但它们不会执行任何操作。为了使其正常工作，我们必须连接输出口（outlets）和操作（actions）。\n\
  \n在 iPad nib 文件中，按住 Control 键从文件所有者拖动到文本字段（参见图 15-26）。\n\n![9781430241881_Fig15-26.tif](img/9781430241881_Fig15-26_fmt.jpg)\n\
  \n图 15-26. 从文件所有者按住 Control 键拖动到文本字段\n\n当出现小的弹出菜单时，选择`textField`（参见图 15-27）。\n\n\
  ![9781430241881_Fig15-27.tif](img/9781430241881_Fig15-27_fmt.jpg)\n\n图 15-27. 从弹出窗口中选择`textField`\n\
  \n对标签重复此过程：按住 Control 键从文件所有者拖动到标签（参见图 15-28），然后从弹出菜单中选择`resultsField`（参见图 15-29）。\n\
  \n![9781430241881_Fig15-28.tif](img/9781430241881_Fig15-28_fmt.jpg)\n\n图 15-28.\
  \ 将标签连接到文件所有者\n\n![9781430241881_Fig15-29.tif](img/9781430241881_Fig15-29_fmt.jpg)\n\
  \n图 15-29. 连接到`resultsField`输出口\n\n好了，让我们让它执行一些操作！我们准备连接操作。按住 Control 键从`UpperCase`按钮拖动到文件所有者（参见图\
  \ 15-30）。然后，从弹出菜单中选择`UpperCase`。\n\n![9781430241881_Fig15-30.tif](img/9781430241881_Fig15-30_fmt.jpg)\n\
  \n图 15-30. 将`upperCase`操作连接到其按钮\n\n对`LowerCase`按钮执行相同操作（参见图 15-31）。\n\n![9781430241881_Fig15-31.tif](img/9781430241881_Fig15-31_fmt.jpg)\n\
  \n图 15-31. 连接`LowerCase`按钮\n\n您可能会注意到弹出菜单中`upperCase`方法旁边有一个减号。这意味着已存在到此方法的连接。您可以将一个方法分配给多个操作。\n\
  \n最后，点击 Scheme 弹出菜单，选择 iPad。然后，点击工具栏左侧的 Run。这将启动 iPad 模拟器并运行我们的应用程序。哇哦！我们还可以查看其\
  \ iPhone 版本。在模拟器中，选择 Hardware ![image](img/9781430241881_arrow_fmt.jpg) Device ![image](img/9781430241881_arrow_fmt.jpg)\
  \ iPhone。\n\n**总结**\n\n呼！为了让一个简单的应用程序在模拟器中运行，我们了解了大量信息，尽管 Xcode 确实帮了我们很多忙。显然，我们只是触及了可用于开发\
  \ iOS 应用程序的庞大 API 集的皮毛。\n\n在本章中，我们向你展示了如何在 iOS 应用程序中使用视图控制器，以及 iOS 如何为视图管理内存。我们讨论了\
  \ iOS 特有的类。我们花时间探讨了 iOS 与 OS X 的相似之处和不同之处。\n\n如果你计划为 iOS 开发应用程序并想了解更多，请查阅 David\
  \ Mark、Jack Nutting 和 Jeff LaMarche 合著的《*Beginning iOS 5 Development*》（Apress，2011\
  \ 年）。\n\n"
- "# 第 16 章\n\n### 介绍 Application Kit\n\n到目前为止，本书中的所有程序都使用了 Foundation Kit，并通过向控制台发送文本输出这一历史悠久的传统方法与用户交流。这对于入门来说没问题，但当你看到包含可点击和可操作的元素的\
  \ Mac 风格界面时，真正的乐趣才开始。在本章中，我们将绕道而行，向你展示 Application Kit（或 AppKit）的一些亮点，这是 Cocoa 为\
  \ OS X 提供的用户界面宝库。\n\n我们将要在本章构建的程序叫做`CaseTool`，你可以在`16.01 CaseTool`项目文件夹中找到它。`CaseTool`会显示一个类似图\
  \ 16-1 截图的窗口。该窗口包含一个文本字段、一个标签和几个按钮。当你在字段中输入一些文本并点击一个按钮时，输入的文本会被转换为大写或小写。尽管这确实很酷，但在你以\
  \ 4.99 美元的价格将应用程序发布到 Mac App Store 之前，你无疑会想要添加更多有用的功能。\n\n![9781430241881_Fig16-01.tif](img/9781430241881_Fig16-01_fmt.jpg)\n\
  \n图 16-1. 最终产品\n\n### 创建项目\n\n你将使用 Xcode 来构建此项目，我们将逐步引导你完成整个过程。首先，需要创建项目文件。然后，我们将布局用户界面。最后，建立\
  \ UI 与代码之间的连接。\n\n让我们开始吧：启动 Xcode 并创建一个新的 Cocoa Application 项目。运行 Xcode。在启动屏幕上，点击\
  \ Create a New Xcode Project。（如果 Xcode 已在运行，请选择 File ![image](img/9781430241881_arrow_fmt.jpg)\
  \ New ![image](img/9781430241881_arrow_fmt.jpg) New Project。）在 Mac OS X 下的左侧表格中选择\
  \ Application（如果尚未选中）。选择 Cocoa Application（如图 16-2 所示），然后点击 Next 为我们的应用程序设置一些选项。\n\
  \n![9781430241881_Fig16-02.tif](img/9781430241881_Fig16-02_fmt.jpg)\n\n图 16-2. 创建一个新的\
  \ Cocoa Application\n\n查看图 16-3，了解设置选项的界面。第一个选项是 Product Name；我们将输入*CaseTool*。下一个字段是\
  \ Company Identifier，用于 App Store 区分你的应用程序与其他应用程序。公司标识符通常采用**反向域名**格式；也就是说，以*com*开头，后跟句点和公司名称。在我们的示例中，我们使用`com.MySuperCompany`。此字段区分大小写，因此选择时请记住这一点。\n\
  \n![9781430241881_Fig16-03.tif](img/9781430241881_Fig16-03_fmt.jpg)\n\n图 16-3. 命名新项目\n\
  \n下一个字段是 Class Prefix。习惯上，在此处输入三个或更多字符。此字符串会被添加到您创建的类名之前。我们将使用`MSC`，这当然代表“My Super\
  \ Company”。例如，如果您创建一个名为`Circle`的类，Xcode 实际上会将类命名为`MSCCircle`。为什么这样做？因为 Objective-C\
  \ 没有命名空间，这是一种伪命名空间，一种为你的应用程序保留一些名称的方式。这样，如果你使用第三方框架，并且它有一个名为`Circle`的类，这个名字就不会与你的冲突。\n\
  \n对于 App Store 类别，我们选择`Utilities`，因为这正确地描述了我们的应用程序。\n\n对于其他选项，请务必取消选中 Create Document-Based\
  \ Application、Use Core Data 和 Include Unit Tests。唯一应选中的复选框是`Use Automatic Reference\
  \ Counting`。\n\n\n\n最后，会弹出一个表单（见图 16-4），让你选择保存项目的目录。本书不讨论源代码控制，但如果你愿意，可以通过选择此表单中的“Source\
  \ Control”选项来创建一个 Git 仓库。Xcode 对使用 Subversion (SVN) 和 Git 的源代码控制提供了内置支持。\n\n![9781430241881_Fig16-04.tif](img/9781430241881_Fig16-04_fmt.jpg)\n\
  \n图 16-4. 指定你希望保存项目的位置\n\n就这样——你的新项目已创建完成。如果你展开 Xcode 窗口左侧的 `CaseTool` 组，会看到项目中已经包含了一些文件：`MSCAppDelegate.h`、`MSCAppDelegate.m`\
  \ 和 `MainMenu.xib`。\n\n`MSCAppDelegate` 是我们应用程序的控制对象。\n\n## 制作委托的 `@interface`\n\
  \n我们将使用 Xcode 中的 Interface Builder 编辑器来布局窗口内容，并在 `MSCAppDelegate` 和用户界面控件之间建立各种连接。Interface\
  \ Builder 也用于布局 iOS 应用程序，因此无论你最终为哪个平台编程，花在 Interface Builder 上的时间都是值得的。我们将向 `MSCAppDelegate`\
  \ 类添加一些内容，然后 Interface Builder 会注意到我们的添加，并让我们构建用户界面。\n\n首先，让我们看看委托的头文件：\n\n```\n\
  #import <Cocoa/Cocoa.h>\n\n@interface MSCAppDelegate : NSObject <NSApplicationDelegate>\n\
  \n@property (assign) IBOutlet NSWindow *window;\n\n@end\n```\n\n你会看到其中有一个叫做 `IBOutlet`\
  \ 的拟关键字。这实际上并不是一个 Objective-C 关键字，而是 Apple 保留供 Interface Builder 使用的。你还会注意到，在 `IBOutlet`\
  \ 这行左侧的边栏中有一个小点。点击该点可以直接跳转到 Interface Builder 中关联的对象。\n\n另一个我们会遇到的拟关键字是 `IBAction`。`IBAction`\
  \ 被定义为 `void`，这意味着声明的方法的返回类型将是 `void`（即不返回任何内容）。\n\n如果 `IBOutlet` 和 `IBAction` 不做任何事情，那它们为什么还存在呢？答案是，它们并非为编译器而存在：`IBOutlet`\
  \ 和 `IBAction` 实际上是给 Interface Builder 以及阅读代码的人看的标记。通过查找 `IBOutlet` 和 `IBAction`，Interface\
  \ Builder 了解到 `MSCDelegate` 对象有两个可以连接到其他对象的实例变量，并且 `MSCDelegate` 提供了可以作为按钮点击（及其他用户界面操作）目标的方法。稍后我们将讨论这是如何工作的。\n\
  \n## Interface Builder\n\n现在，是时候启动 Xcode 的 Interface Builder 编辑器了，它在朋友间被亲切地称为 IB。我们想要编辑项目自带的\
  \ `MainMenu.xib` 文件。这个文件配备了一个菜单栏，以及一个我们可以放入用户控件的窗口。\n\n在 Xcode 项目窗口中，找到并点击 `MainMenu.xib`（见图\
  \ 16-5）。\n\n![9781430241881_Fig16-05.tif](img/9781430241881_Fig16-05_fmt.jpg)\n\n\
  图 16-5. 打开 `MainMenu.xib` 并认识 Interface Builder 编辑器\n\n这会在 Xcode 中打开 Interface Builder\
  \ 编辑器并显示文件内容。尽管文件扩展名是 `*.xib*`，但我们称这些文件为 nib 文件。“Nib” 是 “NeXT Interface Builder”\
  \ 的首字母缩写，这是 Cocoa 作为名为 NeXT 的公司一部分所留下的遗产。Nib 文件是包含冻结干燥对象的二进制文件，而 `*.xib*` 文件是 XML\
  \ 格式的 nib 文件。它们在编译时会被编译成 nib 格式。\n\n看看编辑器区域的左侧。Interface Builder 工具栏中包含了代表 nib 文件内容的图标。你可能无法一眼看出这些是什么以及它们的作用，但别担心，你很快就会弄明白的。现在，我们可以展开工具栏以显示对象的名称。看到工具栏底部那个圆圈里带箭头（看起来像播放按钮）的东西了吗？就在它右边？点击它，工具栏中的项目就会显示它们的名称。\n\
  \n编辑器窗口顶部是我们正在构建的应用程序的菜单栏。你可以在那里添加和编辑菜单及菜单项。在这个项目中，我们不会去修改菜单。\n\n菜单栏下方是一个空窗口，我们将在此放置一些文本字段和按钮。这个真实、活生生的窗口对应于工具栏中那个微小的窗口形状图标。现在，我们将使用库面板，也就是之前在第\
  \ 7 章讨论过的右下角区域。在库面板中，点击从左数第三个图标，那个看起来像一个盒子的图标。面板会切换显示“对象库”（见图 16-6），其中包含大量你可以拖拽到窗口中的不同类型的对象——里面的东西可真不少。你可以在底部的搜索框中输入一些文本来缩小显示范围。为了方便你使用，每种可以操作的对象都提供了相应的描述。\n\
  \n![9781430241881_Fig16-06.tif](img/9781430241881_Fig16-06_fmt.jpg)\n\n图 16-6. 库面板中的对象库\n\
  \n## 布局用户界面\n\n现在，是时候布局用户界面了。在库中找到 `Text Field`，并将其拖入窗口，如图 16-7 所示。当你在窗口中拖动物体时，会看到蓝色的参考线出现。这些参考线可以帮助你按照\
  \ Apple 的用户界面规范来布局对象。\n\n![9781430241881_Fig16-07.tif](img/9781430241881_Fig16-07_fmt.jpg)\n\
  \n图 16-7. 拖出一个文本字段\n\n现在，我们拖出一个标签。从库中点击 `Label`，并将其拖入窗口，如图 16-8 所示。这里将显示大小写转换的结果。\n\
  \n![9781430241881_Fig16-08.tif](img/9781430241881_Fig16-08_fmt.jpg)\n\n图 16-8. 拖出一个标签\n\
  \n接下来，在库中找到一个“Push Button”并将其拖拽过来。将其放置在标签下方，如图 16-9 所示。这很有趣，不是吗？\n\n![9781430241881_Fig16-09.tif](img/9781430241881_Fig16-09_fmt.jpg)\n\
  \n图 16-9. 将一个按钮拖入窗口\n\n现在，双击新放置的按钮。标签变为可编辑状态。输入 `UpperCase`，然后按回车键确认编辑。图 16-10 显示了正在编辑的按钮。\n\
  \n![9781430241881_Fig16-10.tif](img/9781430241881_Fig16-10_fmt.jpg)\n\n图 16-10.\
  \ 编辑按钮的标签\n\n现在，从面板中再拖出一个按钮，并将其标签改为 `LowerCase`。图 16-11 显示了添加第二个按钮后的窗口。\n\n![9781430241881_Fig16-11.tif](img/9781430241881_Fig16-11_fmt.jpg)\n\
  \n图 16-11. 所有项目都已添加\n\n接下来，我们进行了一点内部装饰，调整了文本字段和窗口本身的大小，使其看起来更美观，如图 16-12 所示。我们还调整了标签的大小，使其跨越窗口的宽度（尽管在图中你看不到）。标签必须足够宽，以显示你输入到字段中的任何文本。现在，窗口看起来正是我们想要的样子。\n\
  \n![9781430241881_Fig16-12.tif](img/9781430241881_Fig16-12_fmt.jpg)\n\n图 16-12.\
  \ 窗口已清理完毕\n\n## 建立连接\n\n\n\n在本节中，我们将向你展示如何将代码连接至我们刚刚创建好的那些精美用户界面元素。\n\n## 连接输出口\n\
  \n现在，是时候建立一些连接了。首先，我们需要告诉对象，它的 `textField` 和 `resultsField` 实例变量应该指向哪个 `NSTextField`。我们将使用辅助编辑器，这个工具我们在第\
  \ 7 章中简要讨论过。在 Xcode 窗口的右上方，有一组三个按钮，上面标有“编辑器”。点击中间那个按钮，编辑器就会垂直分割成两部分；这就是辅助编辑器。如果你需要更多空间，请确保停靠栏处于最简版本，只显示图标。\n\
  \n接下来，按住 Control 键，从文本字段拖拽到头文件——没错，你正在跨越边界！——拖到 `@property` 这一行下方，直到出现“插入输出口或操作\
  \ (Action)”的提示（参见图 16-13）。松开指针后，会弹出一个如图 16-14 所示的对话框。在名称区域输入 `textField`，然后点击“连接”。这会在头文件中创建\
  \ `textField` 属性以及其他必需的关键字。到目前为止，我们还没有输入任何代码，但已经“编写”了一大堆代码。这非常酷。让我们对标签重复同样的连接过程，并将其命名为\
  \ `resultsField`。\n\n![9781430241881_Fig16-13.tif](img/9781430241881_Fig16-13_fmt.jpg)\n\
  \n图 16-13. 开始连接\n\n![9781430241881_Fig16-14.tif](img/9781430241881_Fig16-14_fmt.jpg)\n\
  \n图 16-14. 编辑连接\n\n在检查器的连接面板中仔细检查你的工作。要查看该面板，请选择“视图” ![image](img/9781430241881_arrow_fmt.jpg)\
  \ “实用工具” ![image](img/9781430241881_arrow_fmt.jpg) “显示连接检查器”，或者点击检查器上的“连接”按钮（看起来像一个指向右方的箭头）。你会在检查器顶部看到这些连接，如图\
  \ 16-15 所示。\n\n![9781430241881_Fig16-15.tif](img/9781430241881_Fig16-15_fmt.jpg)\n\
  \n图 16-15. 仔细检查连接\n\n## 连接操作 (Actions)\n\n现在，我们准备将按钮连接到操作 (Actions)，以便它们能触发我们的代码。我们将再次使用\
  \ Control-拖拽来建立我们心爱的连接，这次是从按钮拖到 `MSCAppDelegate`。\n\n**注意**：在使用 Interface Builder\
  \ 时，知道拖拽连接的方向是一个常见的困惑点。拖拽的方向是*从*需要知道某些信息的对象*到*它需要了解的那个对象。\n\n`MSCAppDelegate` 需要知道使用哪个\
  \ `NSTextField` 来接收用户的输入，所以拖拽是从 `MSCAppDelegate` 到文本字段。\n\n按钮需要知道告诉哪个对象：“嘿！有人按了我！”。所以，你需要从按钮拖拽到\
  \ `AppController`。\n\n按住 Control 键点击 UpperCase 按钮，然后拖拽一根连线到头文件中最后一个 `@property`\
  \ 的下方，如图 16-16 所示。连接框会再次弹出。这一次，将连接类型改为“操作 (Action)”。在名称字段中输入 `uppercase`，然后点击“连接”。这会在头文件中创建方法原型，并在\
  \ `.m` 文件中创建一个空的实现。\n\n![9781430241881_Fig16-16.tif](img/9781430241881_Fig16-16_fmt.jpg)\n\
  \n图 16-16. 连接 UpperCase 按钮\n\n现在，每当按钮被点击时，消息 `uppercase:` 就会被发送给 `MSCAppDelegate`\
  \ 实例，这正是我们一直想要的效果。然后，我们就可以在 `uppercase:` 方法中执行任何我们想要的操作了。\n\n最后，我们通过连接 LowerCase\
  \ 按钮来完成最后的连接。按住 Control 键从 LowerCase 按钮拖拽到头文件*，*并将类型改为“操作 (Action)”，名称改为 `lowercase`（见图\
  \ 16-17）。至此，我们在 Interface Builder 中的工作就完成了。\n\n\n\n## AppDelegate 实现\n\n现在，让我们回到编码环节。是时候实现\
  \ `MSCAppDelegate` 了——但首先，简单了解一下 `IBOutlet` 的工作原理。\n\n当加载 nib 文件时（应用启动时会自动加载 `MainMenu.xib`，你也可以自行创建并加载\
  \ nib 文件），所有存储在 nib 文件中的对象都会被重新创建。这意味着 `alloc` 和 `init` 会在后台自动完成。应用启动时，系统会分配并初始化一个\
  \ `MSCAppDelegate` 实例。在 `init` 方法执行期间，所有 `IBOutlet` 实例变量均为 `nil`。只有等到 nib 文件中*所有*对象（包括窗口、文本字段和按钮）都创建完成后，所有连接才会被建立。\n\
  \n一旦所有连接建立完成（这一过程仅涉及将 `NSTextField` 对象的地址存入 `MSCAppDelegate` 的实例变量），系统会向每个已创建的对象发送\
  \ `awakeFromNib` 消息。请注意，对象的创建顺序没有预定义，`awakeFromNib` 消息的发送顺序同样没有预定义。\n\n一个非常常见的错误是在\
  \ `init` 方法中尝试操作 `IBOutlet`。由于此时所有实例变量都为 `nil`，向它们发送的所有消息都不会生效，因此你在 `init` 中尝试执行的任何操作都会在静默中失败（这是\
  \ Cocoa 可能让你失望并耗费调试时间的地方之一）。如果你怀疑遇到了这种情况，并想知道为什么代码不工作，可以使用 `NSLog` 打印实例变量的值，检查它们是否全部为\
  \ `nil`。\n\n接下来我们继续实现 `MSCAppDelegate`。以下是必要的准备工作：\n\n```objc\n#import \"MSCAppDelegate.h\"\
  \n\n@implementation MSCAppDelegate\n```\n\n接下来是我们定义的属性。但这些代码从何而来？我们并没有添加它们。嗯，算是我们间接添加的：当我们将项目从\
  \ nib 文件拖拽到头文件时，Interface Builder 为我们添加了这些代码。\n\n接下来我们将添加一个 `init` 方法。我们并非真正需要它，只是想演示在\
  \ `init` 时输出口尚未赋值。\n\n```objc\n- (id) init\n{\n    if (nil != (self = [super init]))\n\
  \    {\n        NSLog (@\"init: text %@ / results %@\", _textField, _resultsField);\n\
  \    }\n    return self;\n}\n```\n\n为了获得更友好的用户界面，我们应该将文本字段设置为合理的默认值，而不是显示为 `Label`。诚然，这是准确的默认值，但实在没什么趣味。我们将在文本字段中填入\
  \ `Enter text here`，并将结果字段预设为 `Results`。`awakeFromNib` 是执行此操作的理想位置（尽管我们也可以在 Interface\
  \ Builder 中完成设置）。\n\n```objc\n- (void)awakeFromNib\n{\n    NSLog (@\"awake: text\
  \ %@ / results %@\", _textField, _resultsField);\n    [_textField setStringValue:@\"\
  Enter text here\"];\n    [_resultsField setStringValue:@\"Results\"];\n}\n```\n\n\
  `NSTextField` 有一个名为 `setStringValue:` 的方法，该方法接收一个 `NSString` 作为参数，并更改文本字段的内容以显示该字符串值。我们正是使用这个方法来让文本字段显示更吸引用户的内容。\n\
  \n现在来看操作方法——首先是 `uppercase`：\n\n```objc\n- (IBAction) uppercase: (id) sender\n{\n\
  \    NSString *original = [_textField stringValue];\n    NSString *uppercase = [original\
  \ uppercaseString];\n    [_resultsField setStringValue:uppercase];\n} // uppercase\n\
  ```\n\n我们通过向 `_textField` 发送 `stringValue` 消息获取原始字符串，然后创建其大写版本。`NSString` 为我们提供了便捷的\
  \ `uppercaseString` 方法，该方法会根据接收字符串的内容创建一个新字符串，并将每个字母转换为大写。最后将该字符串设置为 `_resultsField`\
  \ 的内容。\n\n\n\n现在我们例行检查内存管理：一切顺利吗？当然没问题。创建的两个新对象（原始字符串和大写字符串）都来自非 `alloc`、`copy`\
  \ 或 `new` 的方法，因此它们位于自动释放池中，会被自动清理。`setStringValue:` 方法负责复制或保留传入的字符串，至于它具体怎么做，那是它自己的事。我们只需确认自己的内存管理是正确的。\n\
  \n`lowercase:` 方法与 `uppercase:` 类似，只是用于转换为小写。\n\n```\n- (IBAction) lowercase: (id)\
  \ sender {\n\nNSString *original = [_textField stringValue];\n\nNSString *lowercase\
  \ = [original lowercaseString];\n\n[_resultsField setStringValue:lowercase];\n\n\
  } // lowercase\n```\n\n就是这样！运行程序时，你会看到窗口出现。输入一个字符串，然后切换其大小写，如图 16-18 所示。\n\n![9781430241881_Fig16-18.tif](img/9781430241881_Fig16-18_fmt.jpg)\n\
  \n图 16-18。完成的 `CaseTool` 程序正常运行。\n\n## 本章小结\n\n本章是一次旋风式的概览，仅触及了 Interface Builder\
  \ 和 Application Kit 的表面。我们只直接使用了一个 AppKit 类（`NSTextField`），并间接使用了两个类（用于驱动按钮的 `NSButton`，以及控制窗口的\
  \ `NSWindow`）。实际上，AppKit 中包含超过 100 个不同的类可供你探索，其中许多都会在 Interface Builder 中出现。\n\n\
  到目前为止，你已经完全具备深入学习 Cocoa 书籍或项目的能力。下一章，我们将继续探讨 Cocoa 中用于保存和加载文件的一些特性。\n\n---\n\n"
- "# 第 17 章\n\n## 文件加载与保存\n\n许多计算机程序最终都会创建某种用户工作的半永久性产物。可能是编辑过的照片，可能是小说的一个章节，也可能是你们乐队翻唱的《Free\
  \ Bird》。在这些情况下，用户最终都会得到一个保存的文件。\n\n标准 C 库提供了创建、读取和写入文件的函数调用，例如 `open()`、`read()`、`write()`、`fopen()`\
  \ 和 `fread()`。这些函数在其他地方已有详细文档，因此我们不再赘述。Cocoa 提供了 Core Data，它能在后台为你处理所有这些文件相关操作，我们也不会讨论这个。\n\
  \n那么，我们还能讨论什么呢？Cocoa 提供了两类通用的文件处理方式：**属性列表（Property Lists）**和**对象编码（Object Encoding）**，我们将在这里进行介绍。\n\
  \n### 属性列表\n\n在 Cocoa 中，有一类对象被称为**属性列表（property list）**对象，通常缩写为 **plist**。这些列表包含一组\
  \ Cocoa 已知如何操作的小型对象，特别是如何将它们保存到文件以及从文件中加载回来。属性列表的类包括 `NSArray`、`NSDictionary`、`NSString`、`NSNumber`、`NSDate`\
  \ 和 `NSData`，以及它们的可变版本（如果有的话）。\n\n前四个类你已经见过，但后两个尚未涉及。在开始进行文件操作之前，我们将先聊聊这些类。本章这一部分的全部代码可以在项目\
  \ *15.01 PropertyListing* 中找到。\n\n### NSDate\n\n时间和日期处理在程序中非常常见。`iPhoto` 知道你给狗拍照的日期，你的个人记账应用知道对账时的结账日期。`NSDate`\
  \ 是 Cocoa 日期和时间处理中的基础类。\n\n要获取当前日期和时间，请使用 `[NSDate date]`，它会返回一个自动释放的对象。因此，以下代码：\n\
  \n```\nNSDate *date = [NSDate date];\nNSLog (@\"today is %@\", date);\n```\n\n将打印出类似这样的内容：\n\
  \n```\ntoday is 2012-01-23 11:32:02 -0400\n```\n\n你可以使用一些方法比较两个日期，从而对列表进行排序。还有一些方法可以获取相对于当前时间的日期差值。例如，你可能想获取恰好\
  \ 24 小时前的日期：\n\n```\nNSDate *yesterday = [NSDate dateWithTimeIntervalSinceNow: -(24\
  \ * 60 * 60)];\nNSLog (@\"yesterday is %@\", yesterday);\n```\n\n上述代码打印出：\n\n```\n\
  yesterday is 2012-01-23 11:32:02 -0400\n```\n\n`+dateWithTimeIntervalSinceNow:`\
  \ 方法接受一个 `NSTimeInterval` 类型的参数，它是 `double` 类型的 `typedef`，表示以秒为单位的时间间隔。这允许你通过正的时间间隔指定未来的时间偏移，或像此处这样，通过负的时间间隔指定过去的时间偏移。\n\
  \n**注意**：如果你希望格式化日期的打印方式，Apple 提供了一个名为 `NSDateFormatter` 的类，它符合 Unicode 技术标准 #35。这为你提供了各种为用户格式化日期的方法。\n\
  \n### NSData\n\n在 C 语言中，一个常见的惯用做法是将数据缓冲区传递给函数。为此，你通常需要向函数传递缓冲区的指针和缓冲区的长度。此外，在 C\
  \ 中可能会出现内存管理问题。例如，如果缓冲区是动态分配的，那么当它不再有用时，谁负责清理它？\n\nCocoa 为我们提供了 `NSData` 类，它封装了一段字节数据。你可以获取数据的长度以及指向字节起始位置的指针。由于\
  \ `NSData` 是一个对象，常规的内存管理行为同样适用。因此，如果你需要将一段数据传递给某个函数或方法，你可以传递一个自动释放的 `NSData` 对象，而无需担心清理问题。下面是一个包含普通\
  \ C 字符串（本质上就是一个字节序列）的 `NSData` 对象，并打印出其数据：\n\n```\nconst char *string = \"Hi there,\
  \ this is a C string!\";\nNSData *data = [NSData dataWithBytes: length: strlen(string)\
  \ + 1];\nNSLog (@\"data is %@\", data);\n```\n\n结果如下：\n\n```\ndata is <48692074\
  \ 68657265 2c207468 69732069 73206120 43207374 72696e67 2100>\n```\n\n嗯，这看起来有点特别。但是，如果你手边有一张\
  \ ASCII 表（你可以通过终端输入命令 `man ascii` 来查找），你会发现这串十六进制数实际上就是我们的字符串。`0x48` 是“H”，`0x69`\
  \ 是“i”，依此类推。`-length` 方法返回字节数，而 `-bytes` 方法返回指向字符串开头的指针。注意到在 `+dataWithBytes:` 调用中使用了\
  \ `+ 1` 吗？这是为了包含 C 字符串所需的结尾零字节。另外，请注意 `NSLog` 输出结果末尾的 `00`。通过包含这个零字节，我们可以使用 `%s`\
  \ 格式说明符来打印字符串：\n\n```\nNSLog (@\"%d byte string is '%s'\", [data length], [data\
  \ bytes]);\n```\n\n这将产生以下输出：\n\n```\n30 byte string is 'Hi there, this is a C string!'\n\
  ```\n\n`NSData` 对象是不可变的。一旦创建，就确定下来。你可以使用它，但无法更改它。不过，`NSMutableData` 允许你向数据内容中添加或移除字节。\n\
  \n### 写入和读取属性列表\n\n现在你已经了解了所有的属性列表类，我们可以用它们做什么呢？集合属性列表类（`NSArray` 和 `NSDictionary`）有一个名为\
  \ `-writeToFile: atomically:` 的方法，用于将属性列表写入文件。`NSString` 和 `NSData` 也有一个 `writeToFile:atomically:`\
  \ 方法，但它只是写出字符串或数据块。\n\n因此，我们可以将一个包含字符串的数组加载起来，然后保存它：\n\n```\nNSArray *phrase;\n\
  phrase = [NSArray arrayWithObjects: @\"I\", @\"seem\", @\"to\", @\"be\", @\"a\"\
  , @\"verb\", nil];\n[phrase writeToFile: @\"/tmp/verbiage.txt\" atomically: YES];\n\
  ```\n\n现在，查看文件 `/tmp/verbiage.txt`，你应该会看到类似这样的内容：\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\"\n\
  \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"> <plist version=\"1.0\"> <array>\n\
  <string>I</string>\n<string>seem</string>\n<string>to</string>\n<string>be</string>\n\
  <string>a</string>\n<string>verb</string> </array> </plist>\n```\n\n\n\n这段代码虽然略显冗长，但正是我们想要存储的内容：一个字符串数组。这些属性列表文件可以极其复杂，其中包含字典数组，而字典里又可能嵌套着字符串、数字和日期等数组。Xcode\
  \ 也提供了一个属性列表编辑器，因此你可以浏览并修改 plist 文件。如果你查看操作系统内部，你会发现大量属性列表文件，例如你个人目录下 `Library/Preferences`\
  \ 中的所有偏好设置文件，以及 `/System/Library/LaunchDaemons` 等系统配置文件。\n\n**注意：** 某些属性列表文件（尤其是偏好设置文件）会以压缩的二进制格式存储。你可以使用\
  \ `plutil` 命令将这些文件转换为人类可读的格式：\n`plutil -convert xml1 filename.plist`\n\n现在，我们的 `verbiage.txt`\
  \ 文件已经存储在磁盘上，我们可以使用 `+arrayWithContentsOfFile:` 方法将其读入，代码如下：\n\n```\nNSArray *phrase2\
  \ = [NSArray arrayWithContentsOfFile: @\"/tmp/verbiage.txt\"];\nNSLog (@\"%@\",\
  \ phrase2);\n```\n\n而我们的输出结果与之前保存的内容完全一致：\n\n```\n(\nI,\nseem,\nto,\nbe,\na,\nverb\n\
  )\n```\n\n**注意：** 你是否注意到 `writeToFile:` 方法中的 `atomically`（原子性）参数？这个调用是否具有放射性？并没有。`atomically:`\
  \ 参数接受一个 `BOOL` 值，它告诉 Cocoa 是否先将文件内容保存到一个临时文件中，然后在保存成功后再用这个临时文件替换原文件。这个参数是一种安全机制——如果保存过程中出了问题，你不会破坏原始文件。但这种安全机制也有代价：在保存期间，由于原始文件依然存在，你会消耗双倍的磁盘空间。除非你要保存可能填满用户硬盘的巨大文件，否则建议使用原子性方式保存文件。\n\
  \n如果你能将数据简化为属性列表类型，就可以使用这些非常便捷的方法将数据保存到磁盘，并在以后读取回来。当你在尝试新想法或启动新项目时，可以利用这些便捷功能快速启动和运行程序。即使你只是想将一块数据保存到磁盘而不使用任何对象，也可以借助\
  \ `NSData` 来简化工作。只需将数据包装在 `NSData` 对象中，然后对该 `NSData` 对象调用 `writeToFile:atomically:`\
  \ 方法即可。\n\n这些函数的一个缺点是它们不返回任何错误信息。如果无法加载文件，你只会从方法中收到一个 `nil` 指针，而完全不知道问题出在哪里。\n\n\
  ## 修改对象\n\n请注意，当你使用集合类型从文件中读取数据时，无法修改这些数据。一种修改方法是使用蛮力，遍历 plist 并创建一个可变的并行结构。但你无需如此极端：还有另一种方法。事实上，如果在\
  \ Cocoa 中做某件事显得过于复杂，苹果通常已经慷慨地提供了更简单的解决方案。\n\n有一个名为 `NSPropertyListSerialization`\
  \ 的类（这个名字读起来有点拗口）。顾名思义，它可以根据你想要的选项来保存和加载属性列表。\n\n我们主要关注其 `propertyListFromData:mutabilityOption:format:errorDescription:`\
  \ 方法。该方法会返回你的 plist 数据，并且在出现问题时，你还会得到一个错误信息。\n\n以下是用于以二进制格式写入 plist 数据的代码：\n\n```\n\
  NSString *error = nil;\nNSData *encodedArray = [NSPropertyListSerialization dataFromPropertyList:capitols\n\
  format:NSPropertyListBinaryFormat_v1_0 errorDescription:&error];\n[encodedArray\
  \ writeToFile:@\"/tmp/capitols.txt\" atomically:YES];\n```\n\n如你所见，我们将数组数据转换成了 `NSData`\
  \ 并写入文件。\n\n将数据读回内存时，需要多执行一步，即指定文件格式。我们创建一个指针，这样如果格式与我们指定的不同，就可以利用指针使用原始格式，或将其转换为新格式。\n\
  \n```\nNSPropertyListFormat propertyListFormat = NSPropertyListXMLFormat_v1_0;\n\
  NSString *error = nil;\n```\n\n\n```objc\nNSMutableArray *capitols = [NSPropertyListSerialization\
  \ propertyListFromData:data\n                                                 mutabilityOption:NSPropertyListMutableContainersAndLeaves\n\
  \                                                 format:&propertyListFormat\n \
  \                                                errorDescription:&error];\n```\n\
  \n其中一个选项决定了我们如何读取数据：我们是否希望能够修改 plist？此外，我们是仅想修改列表的结构，还是连数据本身也要修改？\n\n## 编码对象\n\n\
  遗憾的是，你并不总能将对象的信息表示为属性列表类。如果我们能将所有内容都表达为数组的字典，那就无需自定义类了。幸运的是，Cocoa 提供了机制，让对象能将自身转换为可保存到磁盘的格式。对象可以将其实例变量和其他数据编码为一块数据，然后保存到磁盘。之后，这块数据可以被读回内存，并基于保存的数据创建新的对象。这个过程称为**编码与解码**，或者**序列化与反序列化**。\n\
  \n还记得上一章我们初次尝试 Interface Builder 时，从库中拖拽对象到窗口，然后这些内容就被保存到了 nib 文件中。换句话说，`NSWindow`\
  \ 和 `NSTextField` 对象被序列化并保存到了磁盘。当程序运行时，nib 文件被加载到内存，对象被反序列化，新的 `NSWindow` 和 `NSTextField`\
  \ 对象被创建并连接起来。\n\n你大概能猜到，通过采用 `NSCoding` 协议，你也可以对自己的对象做同样的事情。该协议定义如下：\n\n```objc\n\
  @protocol NSCoding\n\n- (void) encodeWithCoder: (NSCoder *) encoder;\n\n- (id) initWithCoder:\
  \ (NSCoder *) decoder;\n\n@end\n```\n\n采用此协议后，你需要实现这两个方法。当要求对象保存自身时，`-encodeWithCoder:`\
  \ 会被调用；当要求对象加载自身时，`-initWithCoder:` 会被调用。\n\n那么这个编码器是什么呢？`NSCoder` 是一个抽象类，定义了一系列有用的方法，用于将你的对象转换为\
  \ `NSData` 以及从 `NSData` 转换回来。你永远不会直接创建 `NSCoder` 实例，因为它本身并不做实质性的工作。但 `NSCoder` 有几个具体的子类，你可以用它们来编码和解码对象。我们将用到其中两个：`NSKeyedArchiver`\
  \ 和 `NSKeyedUnarchiver`。\n\n理解它们最简便的方法也许就是通过一个示例。你可以在项目 *15.02 SimpleEncoding* 中找到所有代码。\n\
  \n我们先从一个包含若干实例变量的简单类开始：\n\n```objc\n@interface Thingie : NSObject <NSCoding>\n{\n\
  \    NSString *name;\n    int magicNumber;\n    float shoeSize;\n    NSMutableArray\
  \ *subThingies;\n}\n\n@property (copy) NSString *name;\n@property int magicNumber;\n\
  @property float shoeSize;\n@property (retain) NSMutableArray *subThingies;\n\n-\
  \ (id)initWithName: (NSString *) n magicNumber: (int) mn shoeSize: (float) ss;\n\
  \n@end // Thingie\n```\n\n这应该相当熟悉了。我们有四个实例变量，包含对象类型和标量类型，其中还有一个集合。属性默认是 readwrite\
  \ 的，因此我们在属性定义中未作特别说明。每个变量都有公开的属性，以及一个便捷的一站式初始化方法，用于从头创建一个新的 `Thingie`。\n\n注意 `Thingie`\
  \ 采用了 `NSCoding` 协议。这意味着我们需要为 `encodeWithCoder:` 和 `initWithCoder:` 方法提供实现。目前，我们先让这两个方法为空。\n\
  \n```objc\n@implementation Thingie\n\n@synthesize name;\n@synthesize magicNumber;\n\
  @synthesize shoeSize;\n@synthesize subThingies;\n\n- (id)initWithName: (NSString\
  \ *) n magicNumber: (int) mn shoeSize: (float) ss\n{\n    if (self = [super init])\n\
  \    {\n        self.name = n;\n        self.magicNumber = mn;\n        self.shoeSize\
  \ = ss;\n        self.subThingies = [NSMutableArray array];\n    }\n    return (self);\n\
  }\n\n- (void) dealloc\n{\n    [name release];\n    [subThingies release];\n    [super\
  \ dealloc];\n} // dealloc\n\n- (void) encodeWithCoder: (NSCoder *) coder\n{\n  \
  \  // 空方法\n} // encodeWithCoder\n\n- (id) initWithCoder: (NSCoder *) decoder\n{\n\
  \    return (nil);\n} // initWithCoder\n\n- (NSString *) description\n{\n    NSString\
  \ *description =\n        [NSString stringWithFormat: @\"%@: %d/%.1f %@\", name,\n\
  ```\n\n（注意：原文在此处突然结束。末尾的代码块不完整。）\n\n\n```objc\nmagicNumber, shoeSize, subThingies];\n\
  \nreturn (description);\n\n} // description\n\n@end // Thingie\n```\n\n这段代码将初始化一个新对象，清理我们造成的任何混乱，创建存根方法使编译器满意我们采用`NSCoding`，并返回一个描述信息。\n\
  \n请注意，在`init`方法中，我们在赋值语句的左侧使用了`self.attribute`。记住，这实际上意味着我们在调用这些属性的访问器方法，而这些方法是由`@synthesize`创建的。我们并没有直接进行实例变量赋值。这种对象创建技术将使我们能够正确管理传入的`NSString`和我们创建的`NSMutableArray`的内存，因此我们不必显式地提供内存管理。\n\
  \n所以，在`main()`内部，创建一个`Thingie`对象并打印它：\n\n```objc\nThingie *thing1;\n\nthing1 = [[Thingie\
  \ alloc] initWithName: @\"thing1\" magicNumber: 42 shoeSize: 10.5];\n\nNSLog (@\"\
  some thing: %@\", thing1);\n```\n\n前面的代码将打印出如下内容：\n\n```\nsome thing: thing1: 42/10.5\
  \ ( )\n```\n\n这很有趣。现在，让我们对这个对象进行归档。像这样实现`Thingie`的`encodeWithCoder:`方法：\n\n```objc\n\
  - (void) encodeWithCoder: (NSCoder *) coder\n\n{\n\n[coder encodeObject: name forKey:\
  \ @\"name\"];\n\n[coder encodeInt: magicNumber forKey: @\"magicNumber\"];\n\n[coder\
  \ encodeFloat: shoeSize forKey: @\"shoeSize\"];\n\n[coder encodeObject: subThingies\
  \ forKey: @\"subThingies\"];\n\n} // encodeWithCoder\n```\n\n我们将使用`NSKeyedArchiver`来完成将对象归档到`NSData`中的所有工作。键控归档器，顾名思义，使用键/值对来保存对象的信息。`Thingie`的`-encodeWithCoder`方法将每个实例变量编码到与实例变量名称匹配的键下。你不必这样做。你可以将名称编码到键`flarblewhazzit`下，没有人会在意。保持键名与实例变量名相似，可以很容易地知道什么映射到什么。\n\
  \n你可以随意使用像这样的裸字符串作为编码键，或者你可以定义一个常量来防止拼写错误。你可以像这样`#define kSubthingiesKey @\"subThingies\"\
  `，或者在文件中设置一个局部变量，例如`static NSString *kSubthingiesKey = @\"subThingies\";`。\n\n请注意，每种类型都有不同的`encodeSomething:forKey:`方法。你需要确保使用正确的方法来编码你的类型。对于任何\
  \ Objective-C 对象类型，你使用`encodeObject:forKey:`。\n\n当你恢复一个对象时，你将使用`decodeSomethingForKey:`方法：\n\
  \n```objc\n- (id) initWithCoder: (NSCoder *) decoder\n\n{\n\nif (self = [super init])\
  \ {\n\nself.name = [decoder decodeObjectForKey: @\"name\"];\n\nself.magicNumber\
  \ = [decoder decodeIntForKey: @\"magicNumber\"];\n\nself.shoeSize = [decoder decodeFloatForKey:\
  \ @\"shoeSize\"];\n\nself.subThingies = [decoder decodeObjectForKey: @\"subThingies\"\
  ];\n\n}\n\nreturn (self);\n\n} // initWithCoder\n```\n\n`initWithCoder:` 就像其他任何`init`方法一样。你需要让父类先初始化，然后才能处理你自己的部分。有两种方法可以做到这一点，具体取决于你的父类是什么。如果你的父类采用了`NSCoding`，你应该调用`[super\
  \ initWithCoder: decoder]`。如果你的父类没有采用`NSCoding`，你只需调用`[super init]`。`NSObject`没有采用`NSCoding`，所以我们使用简单的`init`。\n\
  \n当你使用`decodeIntForKey:`时，你从解码器中取出一个`int`值。当你使用`decodeObjectForKey:`时，你从解码器中取出一个对象，并递归地对任何嵌入的对象使用`initWithCoder:`。内存管理的工作方式如你所预期：你从一个不是`alloc`、`copy`或`new`的方法中获取对象，因此你可以假定这些对象是自动释放的。我们的属性声明确保了所有内存管理都得到正确处理。\n\
  \n你会注意到，我们的编码和解码顺序与实例变量的顺序相同。你不必这样做；这只是确保你编码和解码了所有内容、没有遗漏什么的便捷习惯。这也是在调用中使用键的原因之一——你可以按任意顺序放入和取出它们。\n\
  \n\n\n现在，让我们实际使用这些内容。我们之前创建了 `thing1`，现在把它归档：\n\n```\nNSData *freezeDried;\n\nfreezeDried\
  \ = [NSKeyedArchiver archivedDataWithRootObject: thing1];\n```\n\n`+archivedDataWithRootObject:`\
  \ 这个类方法会对该对象进行编码。首先，它在底层创建一个 `NSKeyedArchiver` 实例；然后，将这个实例传递给对象 `thing1` 的 `-encodeWithCoder:`\
  \ 方法。当 `thing1` 编码其属性时，它会导致其他对象也被编码，比如字符串、数组，以及我们可能放入该数组的任何内容。一旦整堆对象完成了键和值的编码，键控归档器就会将所有内容扁平化为一个\
  \ `NSData` 并返回。\n\n如果需要，我们可以使用 `-writeToFile:atomically:` 方法将这个 `NSData` 保存到磁盘。这里，我们只是要释放\
  \ `thing1`，从冻结干燥的表示形式中重新创建它，并打印出来：\n\n```\n[thing1 release];\n\nthing1 = [NSKeyedUnarchiver\
  \ unarchiveObjectWithData: freezeDried];\n\nNSLog (@\"reconstituted thing: %@\"\
  , thing1);\n```\n\n它打印出和之前完全一样的内容：\n\n```\nreconstituted thing: thing1: 42/10.5\
  \ ( )\n```\n\n在契诃夫戏剧的第一幕中看到墙上挂着一把枪，会让你心生好奇；同样，你可能也在好奇那个叫做 `subThingies` 的可变数组。我们可以把对象放入数组，当数组被编码时，这些对象也会自动编码。`NSArray`\
  \ 对 `encodeWithCoder:` 的实现会调用所有对象的 `encodeWithCoder:`，最终导致所有内容都被编码。让我们给 `thing1`\
  \ 添加一些 `subThingies`：\n\n```\nThingie *anotherThing;\n\nanotherThing = [[[Thingie\
  \ alloc]\ninitWithName: @\"thing2\"\nmagicNumber: 23\nshoeSize: 13.0] autorelease];\n\
  \n[thing1.subThingies addObject: anotherThing];\n\nanotherThing = [[[Thingie alloc]\n\
  initWithName: @\"thing3\"\nmagicNumber: 17\nshoeSize: 9.0] autorelease];\n\n[thing1.subThingies\
  \ addObject: anotherThing];\n\nNSLog (@\"thing with things: %@\", thing1);\n```\n\
  \n这会打印出 `thing1` 及其子对象：\n\n```\nthing with things: thing1: 42/10.5 (\nthing2: 23/13.0\
  \ (\n),\nthing3: 17/9.0 (\n)\n)\n```\n\n编码和解码的工作方式完全相同：\n\n```\nfreezeDried = [NSKeyedArchiver\
  \ archivedDataWithRootObject: thing1];\n\nthing1 = [NSKeyedUnarchiver unarchiveObjectWithData:\
  \ freezeDried];\n\nNSLog (@\"reconstituted multithing: %@\", thing1);\n```\n\n并打印出之前看到的相同日志。\n\
  \n如果被编码的数据中存在循环引用，会发生什么？例如，如果 `thing1` 位于它自己的 `subThingies` 数组中呢？`thing1` 是否会编码数组，而数组又编码\
  \ `thing1`，然后 `thing1` 再次编码数组，如此循环往复？幸运的是，Cocoa 在归档器和解归档器的实现上非常巧妙，使得对象循环可以被保存和恢复。\n\
  \n要测试这一点，将 `thing1` 放入它自己的 `subThingies` 数组：`[thing1.subThingies addObject: thing1];`\n\
  \n不过，不要尝试对 `thing1` 使用 `NSLog`。`NSLog` 不够智能，无法检测到对象循环，所以它会陷入无限递归，试图构建日志字符串，最终让你掉进调试器，伴随着成千上万次的\
  \ `-description` 调用。\n\n但是，如果我们现在尝试对 `thing1` 进行编码和解码，它会完美地工作，不会陷入混乱：\n\n```\nfreezeDried\
  \ = [NSKeyedArchiver archivedDataWithRootObject: thing1];\n\nthing1 = [NSKeyedUnarchiver\
  \ unarchiveObjectWithData: freezeDried];\n```\n\n## 总结\n\n正如你在本章所看到的，Cocoa 提供了两种加载和保存文件的技术：属性列表（plist）和对象编码。属性列表数据类型是一组知道如何加载和保存自己的类的集合。如果你有一组全部是属性列表类型的对象，可以使用方便的便捷函数将它们保存到磁盘并读回。\n\
  \n如果像大多数 Cocoa 程序员一样，你拥有自己的非属性列表类型的对象，你可以采用 `NSCoding` 协议并实现编码和解码对象的方法：你可以将自己的一堆对象转换为\
  \ `NSData`，然后保存到磁盘，稍后再读回来。从这个 `NSData` 中，你可以重建这些对象。\n\n\n\n"
- '# 键值编码


  接下来要介绍的是键值编码（key-value coding），它让你能够在更高的抽象层面上与对象进行交互。


  '
- "# 第 18 章 键值编码\n\n我们反复提及的一个概念是间接性。许多编程技术都基于间接性，整个面向对象编程也不例外。在本章中，我们将探讨另一种间接机制。这不是\
  \ Objective-C 的语言特性，而是 Cocoa 提供的一种机制。\n\n到目前为止，我们一直在通过直接调用方法、使用属性的点语法或设置实例变量来直接改变对象的状态。而键值编码（朋友们亲切地称之为`KVC`）是一种通过使用字符串来描述要改变的对象状态片段，从而间接改变对象状态的方法。本章的全部内容就是关于键值编码的。\n\
  \n一些更高级的 Cocoa 特性，如 Core Data 和 Cocoa Bindings（本书中不会讨论），在其基础机制中使用了`KVC`作为关键组件。\n\
  \n## 一个入门项目\n\n我们将再次与老朋友`CarParts`合作。请查看名为`18.01 Car-Value-Coding`的项目以获取相关资源。为了启动项目，我们为`Car`类添加了一些属性，比如品牌和型号，以便进行实验。我们将`appellation`重命名为`name`，以使代码更加统一：\n\
  \n```objc\n@interface Car : NSObject <NSCopying>\n{\n    NSString *name;\n    NSMutableArray\
  \ *tires;\n    Engine *engine;\n    NSString *make;\n    NSString *model;\n    int\
  \ modelYear;\n    int numberOfDoors;\n    float mileage;\n}\n\n@property (readwrite,\
  \ copy) NSString *name;\n@property (readwrite, retain) Engine *engine;\n@property\
  \ (readwrite, copy) NSString *make;\n@property (readwrite, copy) NSString *model;\n\
  @property (readwrite) int modelYear;\n@property (readwrite) int numberOfDoors;\n\
  @property (readwrite) float mileage;\n\n…\n\n@end // Car\n```\n\n我们还添加了`@synthesize`指令，以便编译器自动生成\
  \ setter 和 getter 方法：\n\n```objc\n@implementation Car\n\n@synthesize name;\n@synthesize\
  \ engine;\n@synthesize make;\n@synthesize model;\n@synthesize modelYear;\n@synthesize\
  \ numberOfDoors;\n@synthesize mileage;\n```\n\n我们还更新了`-copyWithZone`方法，以复制新的属性：\n\
  \n```objc\n- (id) copyWithZone: (NSZone *) zone\n{\n    Car *carCopy;\n    carCopy\
  \ = [[[self class] allocWithZone: zone] init];\n    carCopy.name = name;\n    carCopy.make\
  \ = make;\n    carCopy.model = model;\n    carCopy.numberOfDoors = numberOfDoors;\n\
  \    carCopy.mileage = mileage;\n    \n    // 加上复制轮胎和引擎的代码，详见第 13 章。\n```\n\n我们还修改了`-description`方法，使其打印这些新属性，并且省略了`Engine`和`Tire`的打印：\n\
  \n```objc\n- (NSString *) description\n{\n    NSString *desc;\n    desc = [NSString\
  \ stringWithFormat:\n        @\"%@, a %d %@ %@, has %d doors, %.1f miles, and %d\
  \ tires.\",\n        name, modelYear, make, model, numberOfDoors, mileage, [tires\
  \ count]];\n    return desc;\n} // description\n```\n\n最后，在`main`函数中，我们将为汽车设置这些属性并打印出来。我们还使用了`autorelease`配合`alloc`和`init`，以便将所有内存管理集中在一处：\n\
  \n```objc\nint main (int argc, const char * argv[])\n{\n    @autoreleasepool\n \
  \   {\n        Car *car = [[[Car alloc] init] autorelease];\n        car.name =\
  \ @\"Herbie\";\n        car.make = @\"Honda\";\n        car.model = @\"CRX\";\n\
  \        car.numberOfDoors = 2;\n        car.modelYear = 1984;\n        car.mileage\
  \ = 110000;\n        \n        int i;\n        for (i = 0; i < 4; i++)\n       \
  \ {\n            AllWeatherRadial *tire;\n            tire = [[AllWeatherRadial\
  \ alloc] init];\n            [car setTire: tire atIndex: i];\n            [tire\
  \ release];\n        }\n        \n        Slant6 *engine = [[[Slant6 alloc] init]\
  \ autorelease];\n        car.engine = engine;\n        \n        NSLog (@\"Car is\
  \ %@\", car);\n    }\n    return (0);\n} // main\n```\n\n运行程序后，你会得到类似下面的一行输出：\n\n\
  ```\nCar is Herbie, a 1984 Honda CRX, has 2 doors, 110000.0 miles, and 4 tires.\n\
  ```\n\n## 引入 KVC\n\n键值编码中的基本调用是`-valueForKey:`和`-setValue:forKey:`。你向对象发送消息，并传入一个字符串作为感兴趣的属性键。\n\
  \n因此，我们可以这样获取汽车的名称：\n\n```objc\nNSString *name = [car valueForKey:@\"name\"];\n\
  NSLog (@\"%@\", name);\n```\n\n这会输出`Herbie`。同样地，我们可以获取品牌：\n\n```objc\nNSLog (@\"\
  make is %@\", [car valueForKey:@\"make\"]);\n```\n\n\n\n`valueForKey:` 施展了一点魔法，它会找出\
  \ `make` 属性的值并将其返回。\n\n`valueForKey:` 的工作方式是首先查找与键同名的 getter 方法：`-key` 或 `-isKey`。因此，对于这两个调用，`valueForKey:`\
  \ 会查找 `-name` 和 `-make` 方法。如果没有 getter 方法，它会在对象内部查找名为 `_key` 或 `key` 的实例变量。如果我们没有通过\
  \ `@synthesize` 提供访问器方法，`valueForKey:` 会查找实例变量 `_name` 和 `name`，或 `_make` 和 `make`。\n\
  \n最后一点非常重要：`-valueForKey:` 利用 Objective-C 运行时中的元数据来剖析对象，并在其内部寻找有用的信息。在 C 或 C++ 中，你很难做到这一点。通过使用\
  \ KVC，即使没有 getter 方法，你也可以获取值，而无需通过对象指针直接访问实例变量。\n\n同样的技术也适用于车型年份：\n\n```\nNSLog\
  \ (@\"model year is %@\", [car valueForKey: @\"modelYear\"]);\n```\n\n这将打印出 `model\
  \ year is 1984`。\n\n嘿，等一下！`NSLog` 中的 `%@` 用于打印对象，但 `modelYear` 是一个 `int`，而不是对象。这是怎么回事？对于\
  \ KVC，Cocoa 会自动对标量值进行装箱和拆箱。也就是说，当你使用 `valueForKey:` 时，它会自动将标量值（`int`、`float` 和一些\
  \ `struct`）放入 `NSNumber` 或 `NSValue` 中；当你使用 `-setValueForKey:` 时，它会自动从这些对象中取出标量值。只有\
  \ KVC 才能进行这种自动装箱。常规的方法调用和属性语法则不会。\n\n除了检索值，你还可以通过 `-setValue:forKey:` 按名称设置值。\n\n\
  ```\n[car setValue: @\"Harold\" forKey: @\"name\"];\n```\n\n这个方法的工作方式与 `-valueForKey:`\
  \ 相同。它首先查找 `name` 的 setter 方法，比如 `-setName`，并用参数 `@\"Harold\"` 调用它。如果没有 setter 方法，它会在类中查找名为\
  \ `name` 或 `_name` 的实例变量并为其赋值。\n\n**我们必须强调这条规则**：编译器和苹果都保留以下划线开头的实例变量名，并警告说，如果你试图使用它们，你和你（的狗）将面临严重后果。这条规则目前并未强制执行，但未来可能某天就会生效，因此请自行承担违规风险。\n\
  \n如果你要设置一个标量值，在调用 `-setValue:forKey:` 之前，需要先将其打包（装箱）：\n\n```\n[car setValue: [NSNumber\
  \ numberWithFloat: 25062.4] forKey: @\"mileage\"];\n```\n\n然后 `-setValue:forKey:`\
  \ 会在调用 `-setMileage:` 或修改 `mileage` 实例变量之前对该值进行拆箱。\n\n### 路径！路径！\n\n除了通过键设置值，键值编码还允许你指定键路径，它就像文件系统路径一样，让你能够沿着关系链进行追踪。\n\
  \n为了有点东西可挖，不如给我们的引擎加点马力？我们将向 `Engine` 添加一个新的实例变量：\n\n```\n@interface Engine : NSObject\
  \ <NSCopying>\n{\n    int horsepower;\n}\n@end // Engine\n```\n\n注意，我们没有添加任何访问器或属性。通常，你会希望为感兴趣的对象属性添加访问器或属性，但我们这里故意省略它们，是为了向你展示\
  \ KVC 可以直接深入对象内部。\n\n我们添加了一个 `init` 方法，以便引擎在初始化时马力不为零：\n\n```\n- (id) init\n{\n\
  \    if (self = [super init])\n    {\n        horsepower = 145;\n    }\n    return\
  \ (self);\n} // init\n```\n\n我们还在 `-copyWithZone:` 中添加了对 `horsepower` 实例变量的复制，以便复制体也能获取该值，并且将其添加到了\
  \ `-description` 方法中。这些现在都是老生常谈了，所以我们不再赘述。\n\n为了证明我们可以获取和设置该值，你可以将以下代码添加到 `18.01\
  \ Car-Value-Coding.m` 中：\n\n```\nNSLog (@\"horsepower is %@\", [engine valueForKey:\
  \ @\"horsepower\"]);\n[engine setValue: [NSNumber numberWithInt: 150] forKey: @\"\
  horsepower\"];\nNSLog (@\"horsepower is %@\", [engine valueForKey: @\"horsepower\"\
  ]);\n```\n\n这将打印出：\n\n```\nhorsepower is 145\nhorsepower is 150\n```\n\n那么那些键路径呢？你可以用点分隔来指定不同的属性名。通过向汽车询问其\
  \ `\"engine.horsepower\"`，你就能得到马力值。事实上，让我们尝试使用 `-valueForKeyPath:` 和 `-setValueForKeyPath:`\
  \ 方法来访问键路径。我们将向汽车而不是引擎发送这些消息：\n\n```\n[car setValue: [NSNumber numberWithInt: 155]\
  \ forKeyPath: @\"engine.horsepower\"];\nNSLog (@\"horsepower is %@\", [car valueForKeyPath:\
  \ @\"engine.horsepower\"]);\n```\n\n这些键路径的深度可以是任意的，具体取决于你对象图的复杂性（这其实就是对你相关对象集合的一种花哨说法）；你可以拥有像\
  \ `\"car.interior.airconditioner.fan.velocity\"` 这样的键路径。在某些方面，使用键路径深入对象内部比进行一系列嵌套的方法调用要简单得多。\n\
  \n### 聚合攻击\n\nKVC 的一个很酷的地方是，如果你向 `NSArray` 请求某个键的值，它实际上会询问数组中每个对象该键的值，然后将结果打包到另一个数组中返回给你。这对于通过键路径访问对象内部（还记得组合吗？）的数组也同样适用。\n\
  \n嵌入在其他对象中的 `NSArray`，在 KVC 术语中被称为具有**对多**关系。例如，一辆汽车与多个（嗯，四个）轮胎存在关系。因此我们可以说，`Car`\
  \ 与 `Tire` 之间存在对多关系。如果键路径包含一个数组属性，则键路径的剩余部分会被发送给数组中的每个对象。\n\n**众多之中，唯一**既然你现在了解了对多关系，你可能想知道什么是对一关系。普通的对象组合就是对一关系。例如，一辆汽车与其引擎之间存在对一关系。\n\
  \n回想一下，`Car` 有一个轮胎数组，每个轮胎都有自己的气压。我们可以通过一次调用来获取所有轮胎的气压：\n\n```\nNSArray *pressures\
  \ = [car valueForKeyPath: @\"tires.pressure\"];\n```\n\n在做出以下调用后：\n\n```\nNSLog\
  \ (@\"pressures %@\", pressures);\n```\n\n我们可以打印出这些结果：\n\n```\npressures (\n   \
  \ 34,\n    34,\n    34,\n    34\n)\n```\n\n除了我们很注意轮胎保养之外，这里到底发生了什么？`valueForKeyPath:`\
  \ 会分解你的路径并从左到右处理。首先，它向汽车询问其轮胎。一旦获得了轮胎，它就会使用键路径的剩余部分 `\"pressure\"`（这里指这个字符串）向 `tires`\
  \ 对象发送 `valueForKeyPath:` 消息。`NSArray` 通过遍历其内容并向每个对象发送消息来实现 `valueForKeyPath:`。因此，`NSArray`\
  \ 会向其内部的每个轮胎发送一个键路径为 `\"pressure\"` 的 `valueForKeyPath:` 消息，结果返回用 `NSNumber` 装箱的轮胎气压。非常方便！\n\
  \n不幸的是，你无法在键路径中对这些数组进行索引，比如使用 `\"tires[0].pressure\"` 来获取第一个轮胎。\n\n### 中途补给\n\n\
  在进入下一节键值的好东西之前，我们将添加一个新类，名为 `Garage`，它将存放一批经典汽车。你可以在此项目中找到所有相关内容：`16.02 Car-Value-Garaging`。以下是\
  \ `Garage` 的接口：\n\n```\n#import <Cocoa/Cocoa.h>\n\n@class Car;\n\n@interface Garage\
  \ : NSObject\n{\n    NSString *name;\n    NSMutableArray *cars;\n}\n\n@property\
  \ (readwrite, copy) NSString *name;\n- (void) addCar: (Car *) car;\n- (void) print;\n\
  \n@end // Garage\n```\n\n这里没有什么新内容。我们前向声明了 `Car`，因为我们只需要知道它是一个对象类型，可以用作 `-addCar:`\
  \ 方法的参数。`name` 是一个属性，`@property` 语句表示 `Garage` 的用户可以访问和修改 `name`。还有一个用于打印内容的方法。为了实现一个汽车集合，我们在后台使用了一个可变数组。\n\
  \n实现也同样简单明了：\n\n```\n#import \"Garage.h\"\n\n@implementation Garage\n\n@synthesize\
  \ name;\n\n- (void) addCar: (Car *) car\n{\n    if (cars == nil)\n    {\n      \
  \  cars = [[NSMutableArray alloc] init];\n    }\n    [cars addObject: car];\n} //\
  \ addCar\n\n- (void) dealloc\n{\n    [name release];\n    [cars release];\n    [super\
  \ dealloc];\n} // dealloc\n\n- (void) print\n{\n    NSLog (@\"%@:\", name);\n```\n\
  \n\n\n```objectivec\nfor (Car *car in cars)\n{\n    NSLog (@\" %@\", car);\n}\n\
  } // print\n@end // Car\n```\n\n我们像往常一样包含了`Garage.h`头文件，并使用`@synthesize`来合成名称访问器方法。\n\
  \n`-addCar:`是`cars`数组惰性初始化的一个示例；我们只在必要时才创建它。`-dealloc`清理名称和数组，而`-print`遍历数组并打印出所有汽车。\n\
  \n与之前版本的程序相比，我们还彻底改造了主源文件`Car-Value-Garaging.m`。这次，程序创建了一个汽车集合，并将它们放入车库中。\n\n首先，针对我们要使用的对象，引入必要的`#import`指令：\n\
  \n```objectivec\n#import <Foundation/Foundation.h>\n#import \"Car.h\"\n#import \"\
  Garage.h\"\n#import \"Slant6.h\"\n#import \"Tire.h\"\n```\n\n接下来，我们有一个函数，用于根据一系列属性创建一辆汽车。我们本可以在`Car`上创建一个类方法，或者创建某种工厂类，但\
  \ Objective-C 仍然是 C 语言，因此我们可以使用函数。在这里，我们使用函数，因为它将组装汽车的代码保留在实际使用它的位置附近。\n\n```objectivec\n\
  Car *makeCar (NSString *name, NSString *make, NSString *model, int modelYear, int\
  \ numberOfDoors, float mileage, int horsepower)\n{\n    Car *car = [[[Car alloc]\
  \ init] autorelease];\n\n    car.name = name;\n    car.make = make;\n    car.model\
  \ = model;\n    car.modelYear = modelYear;\n    car.numberOfDoors = numberOfDoors;\n\
  \    car.mileage = mileage;\n\n    Slant6 *engine = [[[Slant6 alloc] init] autorelease];\n\
  \    [engine setValue: [NSNumber numberWithInt: horsepower]\n              forKey:\
  \ @\"horsepower\"];\n\n    car.engine = engine;\n\n    // 制作一些轮胎。\n    for (int\
  \ i = 0; i < 4; i++)\n    {\n        Tire * tire= [[[Tire alloc] init] autorelease];\n\
  \        [car setTire: tire atIndex: i];\n    }\n\n    return (car);\n\n} // makeCar\n\
  ```\n\n到目前为止，大部分内容应该都很熟悉了。按照 Cocoa 的惯例，创建一辆新车并自动释放，因为从此函数获取汽车的调用者不会自己调用`new`、`copy`或`alloc`。然后，我们设置一些属性——注意，此技术与\
  \ KVC 不同，因为我们没有使用`setValue:forKey`。接下来，我们制作一个引擎，并使用 KVC 来设置马力，因为我们没有为它创建访问器。最后，我们制作一些轮胎并将其安装到汽车上。最后，返回这辆新车。\n\
  \n以下是`main()`函数的新版本：\n\n```objectivec\nint main (int argc, const char * argv[])\n\
  {\n    @autoreleasepool\n    {\n        Garage *garage = [[Garage alloc] init];\n\
  \n        garage.name = @\"Joe's Garage\";\n\n        Car *car;\n\n        car =\
  \ makeCar (@\"Herbie\", @\"Honda\", @\"CRX\", 1984, 2, 110000, 58);\n        [garage\
  \ addCar: car];\n\n        car = makeCar (@\"Badger\", @\"Acura\", @\"Integra\"\
  , 1987, 5, 217036.7, 130);\n        [garage addCar: car];\n\n        car = makeCar\
  \ (@\"Elvis\", @\"Acura\", @\"Legend\", 1989, 4, 28123.4, 151);\n        [garage\
  \ addCar: car];\n\n        car = makeCar (@\"Phoenix\", @\"Pontiac\", @\"Firebird\"\
  , 1969, 2, 85128.3, 345);\n        [garage addCar: car];\n\n        car = makeCar\
  \ (@\"Streaker\", @\"Pontiac\", @\"Silver Streak\", 1950, 2, 39100.0, 36);\n   \
  \     [garage addCar: car];\n\n        car = makeCar (@\"Judge\", @\"Pontiac\",\
  \ @\"GTO\", 1969, 2, 45132.2, 370);\n        [garage addCar: car];\n\n        car\
  \ = makeCar (@\"Paper Car\", @\"Plymouth\", @\"Valiant\", 1965, 2, 76800, 105);\n\
  \        [garage addCar: car];\n\n        [garage print];\n\n        [garage release];\n\
  \    };\n\n    return (0);\n\n} // main\n```\n\n`main()`执行一些簿记工作，创建一个车库，并构建一个小型车队存放在其中。最后，它打印出车库的内容，然后释放它。\n\
  \n运行程序会得到以下激动人心的输出：\n\n```\nJoe's Garage:\nHerbie, a 1984 Honda CRX, has 2 doors,\
  \ 110000.0 miles, 58 hp and 4 tires\nBadger, a 1987 Acura Integra, has 5 doors,\
  \ 217036.7 miles, 130 hp and 4 tires\nElvis, a 1989 Acura Legend, has 4 doors, 28123.4\
  \ miles, 151 hp and 4 tires\nPhoenix, a 1969 Pontiac Firebird, has 2 doors, 85128.3\
  \ miles, 345 hp and 4 tires\nStreaker, a 1950 Pontiac Silver Streak, has 2 doors,\
  \ 39100.0 miles, 36 hp and 4 tires\nJudge, a 1969 Pontiac GTO, has 2 doors, 45132.2\
  \ miles, 370 hp and 4 tires\nPaper Car, a 1965 Plymouth Valiant, has 2 doors, 76800.0\
  \ miles, 105 hp and 4 tires\n```\n\n现在，我们为接下来要介绍的键值便利特性奠定了基础。\n\n顺畅运行\n\n\n\n##\
  \ 关键路径与运算符\n\n关键路径不仅能引用对象值，还可以嵌入运算符来实现诸如获取数组平均值、返回最大值和最小值等操作。\n\n例如，下面展示了如何统计汽车数量：\n\
  \n```\nNSNumber *count;\ncount = [garage valueForKeyPath: @\"cars.@count\"];\nNSLog\
  \ (@\"我们有 %@ 辆车\", count);\n```\n\n运行后输出：\n\n```\n我们有 7 辆车\n```\n\n让我们拆解这个关键路径 `\"\
  cars.@count\"`。`cars` 表示从 `garage` 获取 `cars` 属性，我们知道它是一个 `NSArray`。当然，它实际上是 `NSMutableArray`，但如果不需要修改，我们可将其视为\
  \ `NSArray`。接下来的 `@count` 中，@符号预示着某种魔法即将发生。对编译器而言，`@\"blah\"` 是字符串，`@interface`\
  \ 是类的声明。在这里，`@count` 告诉 KVC 机制计算关键路径左侧部分的结果数量。\n\n我们还可以对特定值求和，比如车队行驶的总里程。以下代码：\n\
  \n```\nNSNumber *sum;\nsum = [garage valueForKeyPath: @\"cars.@sum.mileage\"];\n\
  NSLog (@\"总里程为 %@ 英里\", sum);\n```\n\n输出：\n\n```\n总里程为 601320.6 英里\n```\n\n这个距离足够从地球往返月球，还富余一些里程。\n\
  \n那么这是如何工作的？`@sum` 运算符将关键路径分为两部分。第一部分是通向某个对多关系的路径，此处为 `cars` 数组。第二部分则像中间包含对多关系的普通关键路径，会被应用于关系中的每个对象。因此\
  \ `mileage` 会被发送到 `cars` 描述的每个对象，并将结果值相加。当然，这些关键路径都可以是任意长度的。\n\n如果想计算每辆车的平均里程，可以用总和除以数量。但有个更简单的方法——以下代码：\n\
  \n```\nNSNumber *avgMileage;\navgMileage = [garage valueForKeyPath: @\"cars.@avg.mileage\"\
  ];\nNSLog (@\"平均里程为 %.2f\", [avgMileage floatValue]);\n```\n\n输出：\n\n```\n平均里程为\
  \ 85902.95\n```\n\n很简单吧？如果没有这些键值编码的便利功能，我们得写一个循环遍历汽车（假设能获取到 `garage` 的 `cars` 数组），向每辆车询问\
  \ `mileage`，累加求和，再除以车辆总数——虽然不难，但仍需编写一小段代码。\n\n这次使用的关键路径是 `\"cars.@avg.mileage\"\
  `。与 `@sum` 类似，`@avg` 运算符也将关键路径分为两部分：前面部分（此处为 `cars`）是到汽车对多关系的路径，`@avg` 后的部分是另一个关键路径，即\
  \ `mileage`。在底层，KVC 会愉快地执行循环、累加值、计数并完成除法运算。\n\n还有 `@min` 和 `@max` 运算符，它们的作用显而易见：\n\
  \n```\nNSNumber *min, *max;\nmin = [garage valueForKeyPath: @\"cars.@min.mileage\"\
  ];\nmax = [garage valueForKeyPath: @\"cars.@max.mileage\"];\nNSLog (@\"最小/最大里程:\
  \ %@ / %@\", min, max);\n```\n\n结果如下：\n\n```\n最小/最大里程: 28123.4 / 217036.7\n```\n\
  \n## KVC 并非免费午餐\n\nKVC 让集合操作变得非常简单。那么为什么不全面使用 KVC，而放弃访问器方法和手写代码呢？天下没有免费的午餐，除非你在某些激进的硅谷科技公司工作。KVC\
  \ 必然更慢，因为它需要解析字符串来确定你的需求。同时编译器也无法进行错误检查。如果你误写为 `karz.@avg.millage`，编译器无法识别这是个错误的关键路径，运行时才会报错。\n\
  \n有时你会遇到取值有限的属性，比如所有汽车的品牌。即使有百万辆车，品牌种类也很有限。通过关键路径 `\"cars.@distinctUnionOfObjects.make\"\
  ` 可以获取不重复的品牌列表：\n\n```\nNSArray *manufacturers;\nmanufacturers = [garage valueForKeyPath:\
  \ @\"cars.@distinctUnionOfObjects.make\"];\nNSLog (@\"制造商: %@\", manufacturers);\n\
  ```\n\n运行上述代码后输出：\n\n```\n制造商: (\n    Honda,\n    Plymouth,\n    Pontiac,\n    Acura\n\
  )\n```\n\n路径中那个名称骇人的运算符 `\"@distinctUnionOfObjects\"` 名副其实。它与其他运算符逻辑相同：获取左侧指定的集合，对集合中每个对象应用右侧的关键路径，然后将结果值组成新集合。名称中的\
  \ \"union\" 表示取多个对象的并集，\"distinct\" 表示去除重复项。还有几个类似运算符，留给读者自行探索。另外，你无法自定义运算符，这很遗憾。\n\
  \n## 批量处理人生\n\nKVC 提供两个调用方法支持批量修改对象。第一个是 `dictionaryWithValuesForKeys:`：传入字符串数组，该方法会使用\
  \ `valueForKey:` 获取每个键的值，并构建包含键字符串和对应值的字典。\n\n让我们从车库中选一辆车，获取其部分属性的字典：\n\n```\ncar\
  \ = [[garage valueForKeyPath: @\"cars\"] lastObject];\nNSArray *keys = [NSArray\
  \ arrayWithObjects: @\"make\", @\"model\",\n                 @\"modelYear\", nil];\n\
  NSDictionary *carValues = [car dictionaryWithValuesForKeys: keys];\nNSLog (@\"汽车属性:\
  \ %@\", carValues);\n```\n\n运行后输出 Paper Car 的信息：\n\n```\n汽车属性: {\n    make = Plymouth;\n\
  \    model = Valiant;\n    modelYear = 1965;\n}\n```\n\n我们可以修改这些值，将 Valiant 变成一辆（姑且认为）升级版新车——Chevy\
  \ Nova：\n\n```\nNSDictionary *newValues =\n    [NSDictionary dictionaryWithObjectsAndKeys:\n\
  \     @\"Chevy\", @\"make\",\n     @\"Nova\", @\"model\",\n     [NSNumber numberWithInt:1964],\
  \ @\"modelYear\",\n     nil];\n[car setValuesForKeysWithDictionary: newValues];\n\
  NSLog (@\"更新后的车辆信息: %@\", car);\n```\n\n执行这些代码后，我们看到它确实变成了一辆新车：\n\n```\n更新后的车辆信息:\
  \ Paper Car, 一辆 1964 年款 Chevy Nova, 有 2 个车门, 76800.0 英里里程, 4 个轮胎.\n```\n\n注意某些值已更改（`make`、`model`\
  \ 和年份），但其他值（如名称和里程）保持不变。\n\n这个工具在本程序中并非必不可少，但它能在用户界面代码中实现一些巧妙技巧。例如，你可以实现类似 Apple\
  \ Aperture 的\"吸取与盖印\"工具，允许将部分修改（而非全部）从一张图片应用到其他图片。你可以使用 `dictionaryWithValuesForKeys`\
  \ 提取所有属性，让字典内容驱动用户界面显示。用户可移除字典中的某些项，再使用 `setValuesForKeysWithDictionary` 将修改后的字典应用到其他图片。如果以正确方式设计用户界面类，同一个吸取/盖印面板就能适用于照片、汽车、菜谱等不同对象。\n\
  \n你可能会好奇 `nil` 值如何处理（比如没有名称的车辆），因为字典不能包含 `nil` 值。回想第 7 章，`[NSNull null]` 用于表示 `nil`\
  \ 值。这里也是如此。对于无名汽车，调用 `dictionaryWithValuesForKeys` 时，`@\"name\"` 对应的值将是 `[NSNull\
  \ null]`；反之，你也可以在 `setValuesForKeysWithDictionary` 中传入 `[NSNull null]` 实现相同效果。\n\
  \n## nil 值依然存在\n\n关于 `nil` 值的讨论引出了一个有趣的问题：对于标量值（如里程），\"nil\" 代表什么？是零？-1？π？Cocoa\
  \ 无法判断。你可以尝试如下操作：\n\n```\n[car setValue: nil forKey: @\"mileage\"];\n```\n\n但 Cocoa\
  \ 会给出警告：\n\n```\n'[<Car 0x105740> setNilValueForKey]: could not set nil as the value\
  \ for the key mileage.'\n```\n\n\n\n\n## 解决此问题\n\n要解决此问题，请重写`*18.01 Car-Value-Garaging.m*`中的`-setNilValueForKey:`方法，并提供合理的逻辑。我们将做出一个执行决策：`nil`里程数意味着将汽车里程数归零，而不是使用像`-1`这样的其他值：\n\
  \n```\n- (void) setNilValueForKey: (NSString *) key\n{\n    if ([key isEqualToString:\
  \ @\"mileage\"])\n    {\n        mileage = 0;\n    } else {\n        [super setNilValueForKey:\
  \ key];\n    }\n} // setNilValueForKey\n```\n\n请注意，如果我们遇到意外的键，我们会调用父类方法。这样，如果有人试图对我们不理解的键使用键值编码，调用者将收到适当的抱怨。通常，除非有罕见且充分的理由不这样做（例如故意避免某个特定操作），否则在重写时始终调用父类方法。\n\
  \n## 处理未处理的键\n\n我们键值之旅（三小时之旅？）的最后一站是处理未定义的键。如果你曾尝试过 KVC 并输错了键，你可能会看到这样的信息：\n\n```\n\
  '[<Car 0x105740> valueForUndefinedKey:]: this class is not key value coding-compliant\
  \ for the key garbanzo.'\n```\n\n这基本上是说 Cocoa 无法理解你使用该键的含义，因此它放弃了。\n\n如果你仔细观察错误消息，你会发现它提到了`valueForUndefinedKey:`方法。正如你可能猜到的，我们可以通过重写此方法来处理未定义的键。你还可以猜到，有一个对应的`setValue:forUndefinedKey:`方法，用于当你尝试使用未知键更改值时。\n\
  \n如果 KVC 机制无法找到执行其魔法的途径，它会回退并询问该类该怎么做。默认实现只是像你之前看到的那样“摊手”。不过，我们可以改变这种行为。让我们将`Garage`变成一个非常灵活的对象，允许我们设置和获取任何键。我们首先添加一个可变字典：\n\
  \n```\n@interface Garage : NSObject\n{\n    NSString *name;\n    NSMutableArray\
  \ *cars;\n    NSMutableDictionary *stuff;\n}\n… @end // Garage\n```\n\n接下来，我们添加`valueForUndefinedKey:`方法：\n\
  \n```\n- (void) setValue: (id) value forUndefinedKey: (NSString *) key\n{\n    if\
  \ (stuff == nil)\n    {\n        stuff = [[NSMutableDictionary alloc] init];\n \
  \   }\n    [stuff setValue: value forKey: key];\n} // setValueForUndefinedKey\n\n\
  - (id) valueForUndefinedKey:(NSString *)key\n{\n    id value = [stuff valueForKey:\
  \ key];\n    return (value);\n} // valueForUndefinedKey\n```\n\n并在`-dealloc`中释放字典。\n\
  \n现在，你可以通过向`*18.01 Car-Value-Garaging.m*`添加代码，在车库上设置任意值：\n\n```\n[garage setValue:\
  \ @\"bunny\" forKey: @\"fluffy\"];\n[garage setValue: @\"greeble\" forKey: @\"bork\"\
  ];\n[garage setValue: [NSNull null] forKey: @\"snorgle\"];\n[garage setValue: nil\
  \ forKey: @\"gronk\"];\n```\n\n并获取它们：\n\n```\nNSLog (@\"values are %@ %@ %@ and\
  \ %@\", [garage valueForKey: @\"fluffy\"], [garage valueForKey: @\"bork\"], [garage\
  \ valueForKey: @\"snorgle\"], [garage valueForKey: @\"gronk\"]);\n```\n\n这个`NSLog`会打印出：\n\
  \n```\nvalues are bunny greeble <null> and (null)\n```\n\n注意`<null>`和`(null)`之间的区别。`<null>`是一个`[NSNull\
  \ null]`对象，而`(null)`是一个真正的`nil`值，我们得到它是因为`\"gronk\"`不在字典中。还要注意，我们在使用`stuff`字典时使用了\
  \ KVC 方法`setValue:forKey:`。使用此方法允许调用者传入`nil`值，而无需我们在代码中检查它。`NSDictionary`的`setObject:forKey:`在传入`nil`时会报错，而`setValue:forKey:`在字典上使用`nil`值则会从字典中移除该键。\n\
  \n## 总结\n\n键值编码包含的内容远多于我们在本章所能覆盖的，但现在你应该有一个坚实的基础来探索 KVC 的其他方面。你已经看到了使用单个键设置和获取值的示例，其中\
  \ KVC 会查找 setter 和 getter 方法来完成你的请求。如果找不到任何方法，KVC 会直接深入对象内部并更改值。\n\n你还了解了键路径，它们是点分隔的键，指定了通过对象网络的路径。这些键路径可能看起来很像在访问属性，但实际上它们是截然不同的机制。你可以在键路径中插入各种运算符，让\
  \ KVC 为你执行额外的工作。最后，我们研究了几个你可以重写以自定义边界情况行为的方法。\n\n接下来，我们将了解 Xcode 的静态分析器。\n\n"
- "# 第 19 章 使用静态分析器\n\n当你构建应用程序时，大多数编译器可以检测看起来可疑的代码并发出警告，指示可能在运行时变成错误的代码。为了超越这种警告，几年前，Apple\
  \ 在 Xcode 3.2 版本中添加了一个**静态分析器**。静态分析器是一种在不实际运行代码的情况下逻辑检查代码的工具，寻找可能变成错误的缺陷。在本章中，我们将了解如何使用静态分析器来发现代码中的问题。\n\
  \n## 开始静态分析\n\n静态分析器是做什么的？它是如何工作的？静态分析器非常了解 Objective-C 程序应该如何工作，然后根据这些知识检查你的程序。它不仅仅查看你的源代码；它实际上会在应用程序中的代码路径中移动，寻找逻辑错误，然后将这些错误报告给你。你可以在构建和运行之前修复它们。\n\
  \n静态分析器可以发现各种类型的错误：\n\n*   ![image](img/9781430241881_square_fmt.jpg) 安全问题，例如内存泄漏和缓冲区溢出\n\
  *   ![image](img/9781430241881_square_fmt.jpg) 并发问题，例如竞态条件（当两个或多个任务可能因时序问题而失败时）\n\
  *   ![image](img/9781430241881_square_fmt.jpg) 逻辑问题，包括死代码和各种不良编码实践\n\n这太棒了！但是，除了好处之外，使用分析器也有一些缺点。\n\
  \n*   ![image](img/9781430241881_square_fmt.jpg) 它会减慢你的构建过程，因为执行分析需要时间。\n*   ![image](img/9781430241881_square_fmt.jpg)\
  \ 分析器有时会产生误报，告诉你存在的问题实际上并不是问题。\n*   ![image](img/9781430241881_square_fmt.jpg) 它会改变你熟悉的工作流程，因为你必须弄清楚如何将之融入。\n\
  \n## 进入分析\n\n好吧，即使有这些缺点，听起来也不是那么糟糕。让我们试一试。我们如何开始使用这个奇特的工具？\n\n实际上再简单不过了。首先打开一个项目；我们将使用`*19-01\
  \ CarParts Error*`。点击**Product**菜单并选择**Analyze**（见图 19-1），或按![image](img/Rangoli1.jpg)\
  \ + shift + B。就这样！你已被分析。但你还没有完成——这只是你与这个工具交互的开始。\n\n![9781430241881_Fig19-01_fmt.jpg](img/9781430241881_Fig19-01_fmt.jpg)\n\
  \n**图 19-1.** 从 **Product** 菜单中选择 **Analyze**\n\n当我们构建`*19.01 CarParts Error*`时，我们看到它编译没有错误，并且运行良好。经过静态分析步骤，你可能会注意到我们的程序编译时间稍长。\n\
  \n毫无疑问，你也注意到分析器有一些要报告的内容，由分支箭头图标指示。静态分析器为我们发现了四个我们之前不知道的问题。酷——让我们来看看。\n\n问题导航器（见图\
  \ 19-2）列出了分析器发现的问题。我们将逐一检查这些错误。\n\n![9781430241881_Fig19-02_fmt.jpg](img/9781430241881_Fig19-02_fmt.jpg)\n\
  \n**图 19-2.** 分析器发现了四个问题\n\n## 死存储不是吸血鬼买牛奶的地方\n\n\n\n第一个提示是“Dead store”。“Dead store”的描述意味着我们创建了一个对象（此处命名为`pool`），但从未在代码中直接访问它——我们从未向它发送方法调用，也未曾尝试修改它（请见图\
  \ 19-3）。\n\n![9781430241881_Fig19-03.tif](img/9781430241881_Fig19-03_fmt.jpg)\n\n\
  图 19-3. 导致分析器报告问题的代码\n\n尽管我们的程序在技术上正确，但分配和释放内存的过程需要时间，并且（显而易见地）会占用存储空间，这两点在 iOS\
  \ 中尤其重要。借助分析器，我们可以从应用中移除这个变量，使程序效率得到小幅提升。\n\n## 密封车库\n\n现在，我们来讨论第二个问题。该问题指出存在“对象潜在泄漏”，具体指\
  \ `garage` 对象。但这怎么可能呢？我们在 `main` 函数的末尾，释放 `pool` 之前刚刚释放了 `garage`。事情变得复杂了。\n\n为了查明原因，我们点击嵌入在代码行中的分析器气泡。点击后，出现了如图\
  \ 19-4 所示的神奇波浪线图示。\n\n![9781430241881_Fig19-04.tif](img/9781430241881_Fig19-04_fmt.jpg)\n\
  \n图 19-4. 分析器展示的代码执行路径\n\n图 19-4 向您展示了代码的执行路径，显而易见，该路径从未到达释放 `garage` 的那一行。再仔细看，我们发现第\
  \ 177 行有一个多余的 `return` 语句，它在清理内存之前就结束了函数。\n\n令人惊讶的是，这种错误非常普遍。它通常发生在您过早地从方法或函数返回，而没有释放已分配的对象时。\n\
  \n## 记住你的停车位\n\n解决了两个问题，还剩两个。下一个分析器问题指出，我们泄漏了一个存储到 `carsCopy` 中的对象。进一步查看发现，我们让 `carsCopy`\
  \ 成为了 `cars` 的一个 `mutableCopy`，但从未释放这个副本（请见图 19-5）。我们可以在 `main` 函数末尾释放 `carsCopy`\
  \ 来解决此问题。\n\n![9781430241881_Fig19-05.tif](img/9781430241881_Fig19-05_fmt.jpg)\n\
  \n图 19-5. 我们创建了 `carsCopy` 但从未释放\n\n## 生不带来，死不带去\n\n我们还剩一个分析器问题，即 `AllWeatherRadial`\
  \ 中的泄漏。查看此问题时，我们发现 `description` 方法分配了一个字符串 `desc`，但在返回前从未释放它（请见图 19-6）。\n\n这种情况下，我们可以通过编辑\
  \ `return` 语句，将其改为 `return [desc autorelease]`，来告诉池子在准备好的时候释放它。\n\n![9781430241881_Fig19-06.tif](img/9781430241881_Fig19-06_fmt.jpg)\n\
  \n图 19-6. 我们分配了 `desc` 但从未释放\n\n## 协助分析器\n\n静态分析器是一个强大的工具，但它并非完美无缺。为了给分析器提供一些线索以帮助其更好地工作，您可以在方法中使用一些关键字来避免误报。这些关键字可以让您告诉分析器：“我知道这看起来不太对劲，但我保证自己清楚在做什么，所以请不要对我大喊大叫。”\n\
  \n## 返回一个保留对象\n\n您可以使用 `NS_RETURNS_RETAINED` 来标记一个返回保留计数大于零的对象的方法。假设您有以下方法：\n\n\
  ```\n- (NSMutableArray *)superDuperArrayCreator\n{\n    NSMutableArray *myArray\
  \ = [[NSMutableArray alloc] init];\n    // … 处理 myArray\n    return myArray;\n}\n\
  ```\n\n您知道您希望此方法返回 `myArray`，并且您计划在获取数组后释放它。但分析器不知道这一点；它只知道，按照惯例，您必须在分配内存的地方清理它。\n\
  \n为了安抚分析器，您可以用 `NS_RETURNS_RETAINED` 来标记该方法。代码如下：\n\n```\n- (NSMutableArray *)superDuperArrayCreator\
  \ NS_RETURNS_RETAINED;\n```\n\n\n\n类似地，你可以对 C 对象使用 Core Foundation 版本。要返回此类对象，可以使用关键字\
  \ `CF_RETURNS_RETAINED`。例如，对于以下代码：\n\n```\n- (CFMutableArrayRef)superDuperArrayCreator\n\
  \n{\n\n    CFMutableArrayRef myArrayRef = CFArrayCreateMutable(kCFAllocatorNull,\
  \ 10, NULL);\n\n    // … 处理 myArray\n\n    return myArrayRef;\n\n}\n```\n\n你的方法将如下所示：\n\
  \n```\n- (CFMutableArrayRef)superDuperArrayCreator CF_RETURNS_RETAINED;\n```\n\n\
  ## 返回非保留对象\n\n你也可以将分析器指向相反的方向，让它在尝试返回*非保留*对象时发出警告。此处的关键字是 `NS_RETURNS_NOT_RETAINED`\
  \ 和 `CF_RETURNS_NOT_RETAINED`。\n\n给定以下定义：\n\n```\n- (NSMutableArray *)superDuperArrayCreator\
  \ NS_RETURNS_NOT_RETAINED;\n```\n\n如果我们返回一个已保留的对象，分析器将会提出一个问题。\n\n## 返回空值\n\n为了确保方法返回\
  \ `void`（空值），你可以在定义方法时使用关键字 `CLANG_ANALYZER_NORETURN`。在这种情况下，如果尝试返回一个值，分析器将会产生一个问题。\n\
  \n**那是什么声音？** 最后那个关键字中的 “CLANG” 前缀从何而来？Clang 是一个开源项目，它增强了 C 编译器，并为 Xcode 中的静态分析器提供了基础。有关\
  \ Clang 的更多信息，可以查阅 [`clang.llvm.org`](http://clang.llvm.org)。\n\n## 进一步分析\n\n静态分析器在我们的这个小程序中发现了四种不同的问题。在本节中，我们将描述静态分析器能够揭示的其他几种问题。\n\
  \n### 比较错误\n\nObjective-C 程序中的一种常见模式是在条件语句（如 `if` 和 `while`）中同时获取值并进行测试。\n\n```\n\
  if(myValue = [self getValue])\n\n{\n\n// 执行某些操作\n\n}\n```\n\n对于 `if` 语句有两种解读方式：\n\
  \n*   为 `myValue` 赋值，然后测试其是否为 `nil`。\n*   `myValue` 等于该方法返回的值。\n\n由于这里存在歧义，并且分析器（目前）无法读懂我们的想法，因此分析器会将其标记为一个问题。如果我们确实想要第一种含义，可以将其重写为\
  \ `if((myValue = [self getValue]))` 或 `if(nil != (myValue = [self getValue]))`。\n\
  \n如果我们想要第二种含义，那这确实是一个错误，我们需要通过正确比较这两个值来修复它：\n\n```\nif(myValue == [self getValue])\n\
  ```\n\n### 内存泄漏\n\n让我们看看这段代码：\n\n```\n- (void)myMethod\n\n{\n\n    NSString *string\
  \ = [[NSString alloc] initWithFormat:@\"%d, %d\", 1, 2];\n\n    if(nil == string)\n\
  \n    {\n\n        return;\n\n    }\n\n    NSArray *array = [[NSArray alloc] initWithObjects:string,\
  \ nil];\n\n    if(nil == array)\n\n    {\n\n        return;\n\n    }\n\n    // 执行一些操作\n\
  \n    // 很久以后\n\n    [array release];\n\n    [string release];\n\n}\n```\n\n乍一看，这段代码看起来非常不错。我们表现得像个好公民，分配了内存，然后在方法结束时释放了它们。一切都很完美，对吧？并非如此！分析器揭示了残酷的真相。\n\
  \n代码中的一条路径会导致内存泄漏。如果 `array` 的内存分配失败，方法无法继续执行，会立即返回。但在这一点上，我们已经分配了 `string`，而它不会被释放，因为我们从未到达方法末尾那个甜蜜的释放点。这指出了一条普遍的最佳实践：每当你退出一个方法时，应该思考哪些对象已经被分配但尚未释放。\n\
  \n为了解决这个问题，我们像下面这样修改第二个 `if` 语句：\n\n```\nif(nil == array)\n\n{\n\n    [string release];\n\
  \n    return;\n\n}\n```\n\n### 过度释放\n\n通常你会创建一个对象，使用它，然后最终发送一个 `autorelease` 消息，这样当方法结束时，对象就会被销毁。\n\
  \n```\nNSString *myString = [[[NSString alloc] initWithFormat:…] autorelease];\n\
  \n// 在同一个应用程序的后续位置\n\n[myString autorelease];\n```\n\n在这个例子中，`myString` 的初始 retain\
  \ 计数为 0，但我们却再次告诉编译器释放它，静态分析器会指出这个问题。要修复它，我们移除其中一个 `autorelease` 即可。\n\n### 对 nil\
  \ 进行同步\n\n\n\n"
- "# NSPredicate\n\n编写软件时一个相当常见的操作是获取一个对象集合，并根据某种已知条件对它们进行评估。你保留符合条件（即“真”）的对象，丢弃不符合的对象，最终得到一堆可以处理的有趣对象。\n\
  \n你在日常使用的软件（比如 iPhoto）中会经常看到这种情况。如果你告诉 iPhoto 只显示评级为三颗星或更高的照片，那么你指定的条件就是“照片的评级必须为三颗星或更高”。所有照片都会经过这个过滤器。评级达到三颗星或以上的照片通过筛选，其余则被隐藏。然后\
  \ iPhoto 会向你展示所有好照片。\n\n类似地，iTunes 也有搜索框。你寻找的条件可能是：歌手是玛丽莲·曼森或巴里·曼尼洛。于是，所有非重摇滚和非抒情歌曲都会被隐藏，让你能创建一份最奇特的混音歌单。\n\
  \nCocoa 提供了一个名为 `NSPredicate` 的类，让你能够指定这些条件过滤器。你可以创建 `NSPredicate` 对象，精确描述你认为的条件，然后让每个对象通过谓词进行匹配。\n\
  \n此处的“谓词”与你可能在英语语法课上学到的“谓语”不同。这里的“谓词”是数学和计算机科学意义上的用法：一个返回真或假值的函数。\n\n`NSPredicate`\
  \ 是 Cocoa 用于描述查询的方式，就像你在数据库中使用的那样。你可以将 `NSPredicate` 与 Core Data 和 Spotlight 等数据库风格的\
  \ API 结合使用，尽管我们在此不会深入介绍这些技术（但本章中的大部分内容同样可以应用于这两种技术以及你自己的对象）。你可以将 `NSPredicate` 视为另一种间接手段。你可以使用谓词对象来进行检查，而不是在代码中显式询问：“这些是我要找的机器人吗？”通过切换不同的谓词对象，你可以让通用代码过滤数据，而无需硬编码你要寻找的条件。这也是你在第\
  \ 3 章中遇到的“开闭原则”的另一个应用。\n\n## 创建谓词\n\n在将 `NSPredicate` 对象应用于你的对象之前，你需要创建它，有两种基本方式。一种涉及创建大量对象并进行组装。这需要大量代码，但在构建用于指定搜索的通用用户界面时会很方便。另一种方式则是在代码中使用查询字符串。在刚开始时，这种方式更容易处理，因此本书将重点介绍查询字符串。字符串型\
  \ API 的常见问题在此同样适用，尤其是编译器缺乏错误检查，以及偶尔出现的奇怪运行时错误。\n\n我们无法回避“汽车零件”的例子——本章的示例将基于第 18\
  \ 章中构建的车库。你可以在 *20.01 Car-Part-Predicate* 项目中找到所有内容。\n\n首先，我们只看一辆车：\n\n```objc\n\
  Car *car;\n\ncar = makeCar (@\"Herbie\", @\"Honda\", @\"CRX\", 1984, 2, 34000, 58);\n\
  \n[garage addCar: car];\n```\n\n回想一下，我们编写了 `makeCar` 函数来构建一辆汽车，并为其配备发动机和轮胎。在这个例子中，我们有一辆\
  \ Herbie，一辆 1984 年款双门本田 CRX，搭载 58 马力的发动机，里程数为 34000 英里。\n\n现在，我们来创建一个谓词：\n\n```objc\n\
  NSPredicate *predicate;\n\npredicate = [NSPredicate predicateWithFormat: @\"name\
  \ == 'Herbie'\"];\n```\n\n让我们分析一下。`predicate` 是我们常见的 Objective-C 对象指针，它将指向一个 `NSPredicate`\
  \ 对象。我们使用 `NSPredicate` 的类方法 `+predicateWithFormat:` 来实际创建谓词。我们给它一个字符串，`+predicateWithFormat:`\
  \ 会将该字符串在后台构建成一个用于评估谓词的对象树。\n\n`predicateWithFormat` 听起来很像 `NSString` 提供的 `stringWithFormat`，后者允许你使用\
  \ `printf` 风格的格式说明符插入内容。稍后你会看到，你也可以对 `predicateWithFormat` 做同样的事情。Cocoa 的命名方案具有一致性——这一点很友好。\n\
  \n这个谓词字符串看起来像一个标准的 C 表达式。左侧是一个键路径 `name`。接下来是相等运算符（`==`），右侧是一个带引号的字符串。如果谓词字符串中的一段文本未加引号，它会被视为键路径。如果加了引号，则被视为字符串字面量。你可以使用单引号或双引号（只要它们成对出现）。通常你会使用单引号；否则，你需要在字符串中对每个双引号进行转义。\n\
  \n## 评估谓词\n\n好了，现在我们有了一个谓词。接下来呢？我们针对一个对象来评估它！\n\n```objc\nBOOL match = [predicate\
  \ evaluateWithObject: car];\n\nNSLog (@\"%s\", (match) ? \"YES\" : \"NO\");\n```\n\
  \n`-evaluateWithObject:` 告诉接收对象（谓词）使用给定的对象对自身进行评估。在本例中，它获取汽车对象，使用 `name` 作为键路径调用\
  \ `valueForKeyPath:` 来获取名称。然后，它将名称与“Herbie”进行相等性比较。如果名称和“Herbie”相同，`-evaluateWithObject:`\
  \ 返回 `YES`；否则返回 `NO`。`NSLog` 使用三元运算符将数值型的 `BOOL` 转换为人类可读的字符串。\n\n这是另一个谓词：\n\n```objc\n\
  predicate = [NSPredicate predicateWithFormat:\n            @\"engine.horsepower\
  \ > 150\"];\n\nmatch = [predicate evaluateWithObject: car];\n```\n\n该谓词字符串的左侧是一个键路径。这个键路径深入汽车对象，找到发动机，然后找到发动机的马力值。接着，它将这个值与\
  \ 150 进行比较，看是否大于 150。\n\n在我们对 Herbie 进行此评估后，`match` 的值为 `NO`，因为小 Herbie 的马力（58）并不大于\
  \ 150。\n\n针对特定谓词的条件检查单个对象固然不错，但当你拥有对象集合时，事情会变得更有趣。假设我们想查看车库中哪些汽车马力最大。我们可以遍历所有汽车，并用这个谓词逐一测试：\n\
  \n```objc\nNSArray *cars = [garage cars];\n\nfor (Car *car in [garage cars])\n{\n\
  \    if ([predicate evaluateWithObject: car])\n    {\n        NSLog (@\"%@\", car.name);\n\
  \    }\n}\n```\n\n## 总结\n\n静态分析器在一个像这样的小程序中发现了四个问题。哇！想象一下，当你在一个庞大复杂的项目上运行分析器时，它会发现什么。你不必每次构建时都运行分析器，但在开发过程中将其纳入工作流程绝对是一个好习惯。\n\
  \n一个提醒：正如你在本章中所看到的，分析器有助于指出问题，但你仍然需要自己进行一些侦查才能准确找出问题所在。毫无疑问，总有一天分析器会精确定位你的错误，然后自动为你修复问题。但今天还不是那一天。\n\
  \n\n\n我们从车库里取出所有汽车，遍历它们，并根据谓词逐一评估每辆车。以下代码块会打印出马力最高的汽车：\n\nElvis\n\nPhoenix\n\nJudge\n\
  \n有道理吧？在继续之前，请确保你清楚其中涉及的所有语法要素。仔细看看`NSLog`中对汽车名称的调用。这里使用了 Objective-C 2.0 的点语法，等价于调用`[car\
  \ name]`。这里面没有什么魔法。这里的谓词字符串是`\"engine.horsepower > 150\"`。`engine.horsepower`是一个键路径，它可能在底层牵涉到各种魔法。\n\
  \n## 燃油滤清器\n\n程序员一个著名的美德/缺点是懒惰。如果不用写那个`for`循环和`if`语句，岂不美哉？虽然那只是几行代码，但零行代码当然更好。幸运的是，有几个分类为\
  \ Cocoa 的集合类添加了谓词过滤方法。\n\n`–filteredArrayUsingPredicate:`是`NSArray`上的一个分类方法，它会遍历数组的内容，根据谓词评估每个对象，并将评估结果为`YES`的对象累积到一个新数组中返回：\n\
  \n```objc\nNSArray *results;\nresults = [cars filteredArrayUsingPredicate: predicate];\n\
  NSLog (@\"%@\", results);\n```\n\n这会输出以下结果：\n\n```\n(\n    Elvis, a 1989 Acura Legend,\
  \ has 4 doors, 28123.4 miles, 151 hp and 4 tires,\n    Phoenix, a 1969 Pontiac Firebird,\
  \ has 2 doors, 85128.3 miles, 345 hp and 4 tires,\n    Judge, a 1969 Pontiac GTO,\
  \ has 2 doors, 45132.2 miles, 370 hp and 4 tires\n)\n```\n\n好的，这些结果与之前的结果并不完全一致。这是一个汽车对象的数组；而在之前的示例中，我们得到的是名字。我们可以使用键值编码（KVC）来提取名字，请记住：当`valueForKey:`发送给一个数组时，该键会被应用于数组中的所有元素：\n\
  \n```objc\nNSArray *names;\nnames = [results valueForKey:@\"name\"];\nNSLog (@\"\
  %@\", names);\n```\n\n如果我们打印出`names`，会看到：\n\n```\n(\n    Elvis,\n    Phoenix,\n\
  \    Judge\n)\n```\n\n假设你有一个可变数组，并且想要移除所有不符合条件的元素。`NSMutableArray`有一个`–filterUsingPredicate`方法，它正好能完成我们需要的移除工作：\n\
  \n```objc\nNSMutableArray *carsCopy = [cars mutableCopy];\n[carsCopy filterUsingPredicate:\
  \ predicate];\n```\n\n如果你打印出`carsCopy`，它将是之前我们看到的那三辆汽车的集合。\n\n你仍然可以对`NSMutableArray`使用`–filteredArrayUsingPredicate:`来创建一个新的（不可变）数组，因为`NSMutableArray`是`NSArray`的子类。`NSSet`也有类似的调用。\n\
  \n正如我们在 KVC 中提到的，使用谓词确实很方便，但它的运行速度并不比你亲自编写所有代码更快。因为无论如何都无法避免遍历所有汽车并对每辆车进行一些处理。在大多数情况下，如果你是在为\
  \ OS X 编写程序，这种遍历不是什么大问题，因为如今的电脑速度非常快。尽可能编写最方便的代码，然后如果遇到性能问题，再使用 Apple 的工具（如 Instruments）来测量性能。不过，iOS\
  \ 程序员应该始终密切关注程序的性能。\n\n## 格式说明符\n\n有经验的程序员知道，硬编码并非总是好主意。如果我们想知道哪些汽车的马力超过 200，之后又想了解哪些汽车的马力超过\
  \ 50，该怎么办？我们可以使用像`\"engine.horsepower > 200\"`和`\"engine.horsepower > 50\"`这样的谓词字符串，但这样我们就得重新编译程序，又回到我们在第\
  \ 3 章中摆脱的那个糟糕世界。\n\n我们可以通过两种方式将可变内容放入谓词格式字符串中：格式说明符和变量名。首先，我们来看看格式说明符。你可以像平时熟悉的那样，使用`%d`和`%f`来放入数值：\n\
  \n```objc\npredicate = [NSPredicate predicateWithFormat: @\"engine.horsepower >\
  \ %d\", 50];\n```\n\n当然，与其在代码中直接使用`50`，你可以让这个值来自用户界面或某些外部机制。\n\n\n\n除了常用的 `printf`\
  \ 格式说明符之外，你还可以使用 `%@` 来插入字符串值。`%@` 会被当作一个带引号的字符串来处理：\n\n```objectivec\npredicate\
  \ = [NSPredicate predicateWithFormat: @\"name == %@\", @\"Herbie\"];\n```\n\n请注意，在此格式字符串中，`%@`\
  \ 没有被引号括起来。如果你像这样给 `%@` 加上引号：`\"name == '%@'\"`，那么 `%` 和 `@` 这两个字符就会直接出现在谓词字符串中。\n\
  \n`NSPredicate` 字符串还允许你使用 `%K` 来指定一个键路径。下面的谓词与其他谓词相同，其真值条件为 `name == 'Herbie'`：\n\
  \n```objectivec\npredicate =\n[NSPredicate predicateWithFormat: @\"%K == %@\", @\"\
  name\", @\"Herbie\"];\n```\n\n使用格式说明符是构建灵活谓词的一种方式。另一种方式是在字符串中放入变量名，类似于环境变量的用法：\n\
  \n```objectivec\nNSPredicate *predicateTemplate =\n[NSPredicate predicateWithFormat:@\"\
  name == $NAME\"];\n```\n\n现在我们有了一个包含变量的谓词，可以使用 `predicateWithSubstitutionVariables`\
  \ 调用来创建新的特化谓词。你需要创建一个键值对字典，其中键是变量名（不带美元符号），值是要替换到谓词中的内容：\n\n```objectivec\nNSDictionary\
  \ *varDict;\nvarDict = [NSDictionary dictionaryWithObjectsAndKeys:\n           \
  \  @\"Herbie\", @\"NAME\", nil];\n```\n\n这会将字符串 `\"Herbie\"` 作为键 `\"NAME\"` 对应的值。接着，我们可以创建新谓词：\n\
  \n```objectivec\npredicate =\n[predicateTemplate predicateWithSubstitutionVariables:\
  \ varDict];\n```\n\n这个谓词的工作原理与其他你已经见过的谓词完全相同。\n\n你可以为变量值使用不同类型的对象，比如 `NSNumber`。以下谓词用于过滤发动机功率：\n\
  \n```objectivec\npredicateTemplate =\n[NSPredicate predicateWithFormat: @\"engine.horsepower\
  \ > $POWER\"];\n\nvarDict = [NSDictionary dictionaryWithObjectsAndKeys:\n      \
  \       [NSNumber numberWithInt: 150], @\"POWER\", nil];\n\npredicate =\n[predicateTemplate\
  \ predicateWithSubstitutionVariables: varDict];\n```\n\n这会创建一个真值条件为 `engine.horsepower\
  \ > 150` 的谓词。\n\n除了 `NSNumber` 和 `NSString`，你还可以使用 `[NSNull null]` 来表示 `nil` 值，甚至可以像本章稍后介绍的那样使用数组。请注意，你不能对键路径使用\
  \ `$VARIABLE`，它只适用于值。如果需要在程序运行时动态改变谓词格式字符串中的键路径，你需要使用 `%K` 格式说明符。\n\n谓词机制不会进行类型检查。你可能会不小心将一个字符串插入到期望为数字的位置，这可能会导致运行时错误提示，或产生令人困惑的行为。\n\
  \n## Hello Operator，给我数字 9\n\n`NSPredicate` 的格式字符串包含许多不同的运算符。我们将介绍其中大部分运算符，并为每个运算符提供一个简单的示例。其余运算符可以在苹果在线文档中找到，可通过\
  \ Xcode 访问。\n\n### 比较运算符与逻辑运算符\n\n谓词字符串语法支持你常用的 C 语言风格运算符，例如相等运算符 `==` 和 `=`。\n\n\
  不等运算符有多种形式，如表 20-1 所示。\n\n**表 20-1.** 不等运算符\n\n| 运算符 | 含义 |\n| --- | --- |\n| `>`\
  \ | 大于 |\n| `>=` 和 `=>` | 大于或等于 |\n| `<` | 小于 |\n| `<=` 和 `=<` | 小于或等于 |\n| `!=`\
  \ 和 `<>` | 不等于 |\n\n该语法还支持括号表达式（真的！），以及 `AND`、`OR`、`NOT` 逻辑运算符，或它们对应的 C 语言风格的 `&&`、`||`\
  \ 和 `!`。\n\n以下是一个示例。你可以过滤掉动力最强和最弱的汽车，只保留中档车型：\n\n```objectivec\npredicate = [NSPredicate\
  \ predicateWithFormat:\n               @\"(engine.horsepower > 50) AND\n       \
  \         (engine.horsepower < 200)\"];\n\nresults = [cars filteredArrayUsingPredicate:\
  \ predicate];\nNSLog (@\"oop %@\", results);\n```\n\n如果我们将其应用于我们的车队，会得到以下结果：\n\n\
  ```\nHerbie, a 1984 Honda CRX, has 2 doors, 34000.0 miles, 58 hp and 4 tires,\n\
  Badger, a 1987 Acura Integra, has 5 doors, 217036.7 miles, 130 hp and 4 tires,\n\
  Elvis, a 1989 Acura Legend, has 4 doors, 28123.4 miles, 151 hp and 4 tires,\n```\n\
  \n\n\n`Paper Car`，一辆 1965 年款普利茅斯 Valiant，有 2 个车门，里程 76800.0 英里，105 马力以及 4 个轮胎。\n\
  \n谓词字符串中的运算符不区分大小写。你可以随意使用 `AnD`、`ANd`、`AND` 或 `and`。此处我们将全部使用大写字母，但在实际代码中你无需如此。\n\
  \n不等关系同样适用于数值和字符串值。要查看按字母表顺序排列的所有汽车，请使用以下谓词：\n\n```\npredicate = [NSPredicate predicateWithFormat:\
  \ @\"name < 'Newton'\"];\nresults = [cars filteredArrayUsingPredicate: predicate];\n\
  NSLog (@\"%@\", [results valueForKey: @\"name\"]);\n```\n\n```\n(\n    Herbie,\n\
  \    Badger,\n    Elvis,\n    Judge\n)\n```\n\n## 数组运算符\n\n谓词字符串 `(engine.horsepower\
  \ > 50) OR (engine.horsepower < 200)` 是一种非常常见的模式。我们正在寻找马力值介于这两个数字之间的结果。如果我们能使用一个运算符来查看介于两个值之间的内容，那岂不是很酷？事实证明，我们可以这样做：\n\
  \n```\npredicate = [NSPredicate predicateWithFormat:\n@\"engine.horsepower BETWEEN\
  \ { 50, 200 }\"];\n```\n\n花括号表示一个数组，而 `BETWEEN` 将数组的第一个元素视为下限，第二个元素视为上限。\n\n你可以通过使用\
  \ `%@` 格式说明符来插入你自己的 `NSArray` 对象：\n\n```\nNSArray *betweens = [NSArray arrayWithObjects:\n\
  \    [NSNumber numberWithInt: 50],\n    [NSNumber numberWithInt: 200], nil];\npredicate\
  \ = [NSPredicate predicateWithFormat:\n    @\"engine.horsepower BETWEEN %@\", betweens];\n\
  ```\n\n你也可以使用变量：\n\n```\npredicateTemplate =\n    [NSPredicate predicateWithFormat:\
  \ @\"engine.horsepower BETWEEN $POWERS\"];\nvarDict =\n    [NSDictionary dictionaryWithObjectsAndKeys:\
  \ betweens, @\"POWERS\", nil];\npredicate = [predicateTemplate predicateWithSubstitutionVariables:\
  \ varDict];\n```\n\n数组的用途不仅限于指定区间的端点。你可以使用 `IN` 运算符来检查某个特定值是否包含在数组中。这对于有 SQL 经验的程序员来说应该很熟悉：\n\
  \n```\npredicate = [NSPredicate predicateWithFormat:\n    @\"name IN { 'Herbie',\
  \ 'Snugs', 'Badger', 'Flap' }\"];\n```\n\n我们有一些名为 Herbie 和 Badger 的汽车，因此它们会通过过滤：\n\
  \n```\nresults = [cars filteredArrayUsingPredicate: predicate];\nNSLog (@\"%@\"\
  , [results valueForKey: @\"name\"]);\n```\n\n果然，这只返回了两个结果：\n\n```\n(\n    Herbie,\n\
  \    Badger\n)\n```\n\n## 自引用（SELF）\n\n有时，你会对简单的值应用谓词，例如普通的字符串，而不是可以通过键路径操作的复杂对象。假设我们有一个汽车名称的数组，并且想要应用之前使用的相同过滤器。既然\
  \ `NSString` 在请求其 `name` 时表现不佳，那么我们应该用什么呢？\n\n`SELF` 可解此忧！`SELF` 指的是正在被谓词评估的对象。实际上，我们可以将所有键路径表达为相对于\
  \ `SELF` 的形式。以下谓词与上一个完全相同：\n\n```\npredicate = [NSPredicate predicateWithFormat:\n\
  \    @\"SELF.name IN { 'Herbie', 'Snugs', 'Badger', 'Flap' }\"];\n```\n\n现在，回到那个字符串数组。我们如何判断一个字符串是否也在那个名称数组中呢？让我们来看一下。\n\
  \n首先，你需要从某处获取仅包含名称的数组。由于我们已经深入涉及 `CarParts`，我们将通过使用针对数组的 `valueForKey:` 的 KVC 技巧来处理它们：\n\
  \n```\nnames = [cars valueForKey: @\"name\"];\n```\n\n这是一个包含我们拥有的所有汽车名称的字符串数组。接下来，创建一个谓词：\n\
  \n```\npredicate = [NSPredicate predicateWithFormat:\n    @\"SELF IN { 'Herbie',\
  \ 'Snugs', 'Badger', 'Flap' }\"];\n```\n\n然后，对其进行评估：\n\n```\nresults = [names filteredArrayUsingPredicate:\
  \ predicate];\n```\n\n如果你现在查看结果，它和我们之前看到的两个名称相同：`Herbie` 和 `Badger`。这是一个小测验。以下代码会产生什么输出？\n\
  \n```\nNSArray *names1 = [NSArray arrayWithObjects:\n    @\"Herbie\", @\"Badger\"\
  , @\"Judge\", @\"Elvis\", nil];\nNSArray *names2 = [NSArray arrayWithObjects:\n\
  \    @\"Judge\", @\"Paper Car\", @\"Badger\", @\"Phoenix\", nil];\npredicate = [NSPredicate\
  \ predicateWithFormat: @\"SELF IN %@\", names1];\nresults = [names2 filteredArrayUsingPredicate:\
  \ predicate];\nNSLog (@\"%@\", results);\n```\n\n以下是答案：\n\n```\n(\n    Judge,\n\
  \    Badger\n)\n```\n\n这是一种获取两个数组交集的好方法。好了，它是如何工作的呢？该谓词包含了第一个数组的内容，因此它看起来像这样：\n\n\
  `SELF IN {\"Herbie\", \"Badger\", \"Judge\", \"Elvis\"}`\n\n现在，第二个名称数组使用此谓词进行过滤。同时存在于两个数组中的字符串将位于\
  \ `names2` 中，并且会导致 `SELF IN` 子句返回真，因此该字符串将出现在结果数组中。仅在第二个数组中的对象将被丢弃，因为它们与谓词中的任何字符串都不匹配。仅在第一个数组中的字符串则会留在原地等待比较，但永远不会进入结果。\n\
  \n## 字符串操作\n\n你之前看到的关系运算符同样适用于字符串。还有一些特定于字符串的运算符，如表 20-2 所示。\n\n表 20-2. 字符串专用运算符\n\
  \n| 运算符 | 含义 |\n| --- | --- |\n| `BEGINSWITH` | 检查一个字符串是否以另一个字符串开头。 |\n| `ENDSWITH`\
  \ | 检查一个字符串是否以另一个字符串结尾。 |\n| `CONTAINS` | 检查一个字符串是否包含在另一个字符串内部某处。 |\n\n使用关系运算符可以让你实现一些技巧，例如使用\
  \ `name BEGINSWITH 'Bad'` 来匹配 `Badger`，使用 `name ENDSWITH 'vis'` 来匹配 `Elvis`，以及使用\
  \ `name CONTAINS 'udg'` 来匹配 `Judge`。\n\n如果你编写一个像 `name BEGINSWITH 'HERB'` 这样的谓词字符串会发生什么？这不会匹配\
  \ `Herbie` 或任何其他内容，因为这些匹配是区分大小写的。同样地，`name BEGINSWITH 'Hérb'` 也不会匹配，因为字母“e”带有重音符号。为了放宽名称匹配的规则，我们可以用\
  \ `[c]`、`[d]` 或 `[cd]` 来修饰这些运算符。其中 `c` 代表“不区分大小写”，`d` 代表“不区分变音符号”（即忽略重音符号），而 `[cd]`\
  \ 则两者兼具。通常，除非有充分理由需要区分大小写和重音，否则你会使用 `[cd]`。你永远不知道用户何时会粘住大写锁定键，最终以全大写字母与你的应用对话。\n\
  \n以下谓词字符串将匹配 `Herbie`：`name BEGINSWITH[cd] 'HERB'`\n\n## 像 (LIKE) 一样匹配，确实如此\n\n\
  有时，在字符串的开头、结尾或中间进行字符串匹配还不够强大。对于这些情况，谓词格式字符串包含了 `LIKE` 运算符。使用此运算符时，问号匹配一个字符，而星号匹配任意数量的字符。SQL\
  \ 和 Unix shell 程序员会识别出这种行为（有时称为“通配符匹配”）。\n\n谓词字符串 `name LIKE '*er*'` 将匹配任何名称中间包含“er”的字符串。这等价于\
  \ `CONTAINS`。\n\n谓词字符串 `name LIKE '???er*'` 将匹配 `Paper Car`，因为它有三个字符，后跟“er”，以及“er”后的任意数量字符。它不匹配\
  \ `Badger`，因为后者在“er”之前有四个字符。\n\n`LIKE` 也接受 `[cd]` 修饰符以实现大小写和变音符号的不敏感匹配。\n\n如果你对正则表达式感兴趣，可以使用\
  \ `MATCHES` 运算符。给它一个正则表达式，谓词就会对其进行评估。\n\n表达你自己：正则表达式是一种非常强大、非常紧凑地指定字符串匹配逻辑的方式。有时，正则表达式会变得复杂难懂，相关主题的书籍也层出不穷。`NSPredicate`\
  \ 的正则表达式使用国际组件 for Unicode (ICU) 语法，你可以通过你最喜欢的互联网搜索引擎来了解它。\n\n虽然正则表达式非常强大，但它们在计算上也可能很昂贵。如果你的谓语中有更简单的操作，例如基本字符串运算符和比较运算符，请在使用\
  \ `MATCHES` 之前先执行这些操作。这应该能给你带来速度上的提升。\n\n## 就这些，各位\n\n\n\n"
- "# 关于谓词的讨论为*学习 Objective-C*画上句号\n\n我们已经涉猎了诸多领域，从间接寻址和面向对象编程的基础，到键值编码和用`NSPredicate`过滤对象等复杂工具。恭喜你坚持读完整本书！你现在已正式准备好迈入\
  \ iOS 和 OS X 编程生涯的下一个阶段。感谢你的参与。\n\n## 附录 A：从其他语言过渡到 Objective-C\n\n许多程序员从其他语言来到\
  \ Objective-C 和 Cocoa 时，学习起来颇为困难，因为它的行为方式与大多数主流语言不同。新手 Objective-C 程序员常断言 Objective-C\
  \ 是一种糟糕的语言，因为它没有他们的最爱语言所具备的 X、Y、Z 特性。抛开功能清单不谈，让我们直面现实：在某些方面，Objective-C 确实有些古怪。\n\
  \n我们可以给 Objective-C 和 Cocoa 新手程序员（甚至那些在其他语言和平台上拥有多年经验的人）的建议是：暂时搁置你对事物*应该*如何运作的先入之见，先按\
  \ Objective-C、Cocoa 和 Xcode 自身的规则来接受它们。阅读几本书和教程。当你积累了一些 Objective-C 经验后，就能看出其他语言的哪些技术和方法适用于\
  \ Cocoa 和 Objective-C，哪些不适用。没有哪种语言适合所有情况，也没有哪个工具包能完美胜任所有工作。最好的做法是：充分学习，判断特定语言和工具包是否能满足你的需求，并了解其中涉及的各种权衡。\n\
  \n在本附录中，我们将提供一些信息，帮助你顺利从其他主流语言过渡到 Objective-C。\n\n### 从 C 语言过渡\n\nObjective-C 就是普通的\
  \ C 语言，外加一些用于处理面向对象特性的附加功能。本书大部分内容都在描述这些附加特性，因此我们在此不再赘述。但有几个有趣的话题值得讨论。\n\n请记住，Objective-C\
  \ 程序员可以访问 C 语言附带的所有好东西，比如标准 C 库。例如，你可以使用`malloc()`和`free()`来处理动态内存，或者使用`fopen()`和`fgets()`来处理文件。\n\
  \n偶尔，网上会有人问：“我调用了一个使用回调函数执行任务的 ANSI C 库。如何让它调用一个方法呢？”当你使用像 Core Foundation 和 Core\
  \ Graphics 这样的底层 Apple 框架时，也会遇到这个问题。\n\n简短的答案是：“你不能。”回调只能用于具有库所需签名的 C 函数。实现 Objective-C\
  \ 方法的函数首先需要`self`和`selector`参数，因此它们永远不会匹配所需的签名。\n\n大多数基于回调的库允许你提供一些用户数据或指针。你可以将其视为一个可以藏身的掩体。当你注册回调时，将某个有意义的指针提供给库，库在调用你的回调时会将这个指针返回给你。\n\
  \n所有 Objective-C 对象都是动态分配的，因此使用对象的地址作为上下文指针是安全的。你无需担心栈上分配的对象会突然消失。在回调内部，你将上下文指针强制转换为对象类型，然后开始向其发送消息。\n\
  \n例如，假设你使用一个虚构的 C API XML 解析库，并在解析 XML 文件时将数据提供给一个名为`TreeWalker`的类。创建一个新的`TreeWalker`：\n\
  \n```objc\nTreeWalker *walker = [[TreeWalker alloc] init];\n```\n\n然后，创建 XML 解析器：\n\
  \n```objc\nXMLParser parser;\nparser = XMLParserLoadFile (\"/tmp/badgers.xml\");\n\
  ```\n\n为解析器设置回调函数（一个 C 函数），并使用`TreeWalker`对象作为上下文：\n\n```objc\nXMLSetParserCallback\
  \ (parser, elementCallback, walker);\n```\n\n然后在解析 XML 文件时，回调函数被调用：\n\n```objc\n\
  void elementCallback (XMLParser *parser, XMLElement *element, userData *context)\n\
  {\n    TreeWalker *walker = (TreeWalker *) context;\n    [walker handleNewElement:\
  \ element inParser: parser];\n} // someElementCallback\n```\n\n你可以看到，上下文指针被强制转换为对象指针，然后向该对象发送消息。\n\
  \n### 从 C++过渡\n\nC++有很多 Objective-C 缺乏的特性：多重继承、命名空间、运算符重载、模板、类变量、抽象类、标准模板库（STL）等等。如果你怀念这些特性，Objective-C\
  \ 也有可以替代它们的功能和技术，或者至少可以模拟它们。\n\n例如，你可以使用类别和协议作为多重继承的一种形式，或者用于实现抽象基类。多重继承的一个常见用途是提供接口，以便其他代码可以调用你对象上的特定方法。类别和协议非常适合这种模式。你可以使用协议来提供纯抽象基类。\n\
  \n如果你使用多重继承是为了引入额外的实例变量（在 C++中称为**成员变量**），那么类别和协议就帮不上忙了。为此，你可以使用组合将一个对象包含在另一个对象中，然后使用存根方法将消息重定向到第二个对象（这是\
  \ Java 中常用的技术）。你还可以通过重写`forwardInvocation:`方法来模拟多重继承。当对象收到一条它不知道如何处理的消息时，就会调用此方法。通过检查`NSInvocation`对象，你可以判断这条消息是否应该转发给你的“多重继承”对象，然后在必要时发送出去。这种技术可以让你免于编写许多小存根方法。然而，它比真正的多重继承慢得多，并且设置起来可能很麻烦。\n\
  \n其他约定可以取代更多 C++特性，例如，对于不应实例化的抽象类，使用调用`abort`的存根方法，尽管某些特性有较弱的替代方案，例如用名称前缀代替命名空间。\n\
  \n#### C++ vtable 与 Objective-C 动态派发\n\nC++和 Objective-C 之间最大的区别之一在于方法（在 C++中称为**成员函数**）的派发机制。C++使用基于\
  \ vtable 的机制来确定虚函数要调用的代码。\n\n你可以把每个 C++对象想象成拥有一个指向函数指针数组的指针。当编译器看到代码想要调用一个虚函数时，它会计算从\
  \ vtable 起始位置的偏移量，生成机器代码来获取该偏移量处的函数指针，并将其作为要执行的代码块。这个过程要求编译器在编译时知道调用成员函数的对象类型，以便计算正确的\
  \ vtable 偏移量。这种派发非常快，只需几次指针操作和一次读取即可获得函数指针。\n\nObjective-C 的方式（第 3 章中有详细描述）则使用运行时函数在各种类结构中搜索要调用的代码。这种技术可能比\
  \ C++方式慢几倍。\n\nObjective-C 以牺牲速度和安全性为代价，换来了灵活性和便利性，这是一种典型的权衡。在 C++模型中，成员函数派发速度很快，而且非常安全，因为编译器和链接器确保所使用的对象能够处理该方法。但\
  \ C++方法也可能不够灵活，因为你无法改变你正在处理的对象类型。你必须使用继承来允许不同类的对象对同一条消息做出反应。\n\n\n\n关于 C++类的许多信息（例如继承链和组成它的成员）都不会被\
  \ C++编译器保留。在运行时，对对象进行泛型处理的能力是有限的。你最多能做的就是在运行时进行`dynamic_cast`，以判断一个对象是否是另一个对象的特定子类。\n\
  \nC++的继承层次结构不能在运行时更改。一旦程序编译并链接完成，它就几乎被固定下来。由于 C++名称修饰（一种利用原始 Unix 链接器执行类型安全链接的方式）的复杂性，动态加载\
  \ C++库通常会出现问题。\n\n在 Objective-C 中，一个对象只需要有方法的实现就可以被调用，这使得任意对象都能成为其他对象的*数据源*或*委托*。缺少多重继承可能带来不便，但由于能够向任何对象发送任何消息而无需担心其继承谱系，这一不便大大得到了缓解。\n\
  \n当然，这种向任何对象发送任何消息的能力使得 Objective-C 的类型安全性不如 C++。如果收到消息的对象无法处理该消息，你可能会遇到运行时错误。Cocoa\
  \ 中没有类型安全的容器。任何对象都可以被放入容器中。\n\nObjective-C 携带了大量关于类的元数据，因此你可以使用反射来检查一个对象是否响应特定的消息。这种做法对于拥有数据源或委托的对象非常常见。通过首先检查委托是否响应某条消息，你可以避免可能遇到的一些运行时错误。你还可以使用*类别（Category）*向其他类添加方法。\n\
  \n由于这些元数据的存在，逆向工程分析程序中所使用的类变得更加容易。你可以确定实例变量、它们在对象结构中的布局以及该类定义的方法。即使剥离可执行文件中的调试信息，也无法移除\
  \ Objective-C 的元数据。如果你有高度机密的算法，你可能希望用 C++实现它们，或者至少混淆它们的名称——例如，不要使用像`SerialNumberVerifier`这样的类名或方法名。\n\
  \n在 Objective-C 中，你可以向`nil`（零）对象发送消息。无需检查你的消息发送是否针对`NULL`。向`nil`发送消息是空操作。向`nil`发送消息的返回值取决于方法的返回类型。如果方法返回一个指针类型（例如对象指针），返回值将是`nil`，这意味着你可以安全地将消息链接到`nil`对象——`nil`只会继续传递下去。如果方法返回一个与指针大小相同或更小的`int`，它将返回零。如果它返回一个`float`或结构体，结果将是未定义的。因此，你可以使用`nil`对象模式来避免测试对象指针是否为`NULL`。另一方面，这种技术可能会掩盖错误，并导致难以追踪的\
  \ bug。\n\nObjective-C 中的所有对象都是动态分配的。没有基于栈的对象、临时对象的自动创建和销毁，也没有类类型之间的自动类型转换，因此 Objective-C\
  \ 对象比基于 C++栈的对象更重。这就是为什么像`NSPoint`和`NSRange`这样的小型轻量实体是结构体而非一等对象的原因之一。\n\n最后，Objective-C\
  \ 是一种非常松散的语言。C++拥有`public`、`protected`和`private`成员函数，而 Objective-C 完全支持`public`、`protected`和`private`实例变量，但对成员函数没有任何保护。任何知道方法名称的人都可以向该对象发送该消息。利用\
  \ Objective-C 的反射特性，你可以查看给定对象支持的所有方法。即使方法从未在头文件中出现，它们也是可调用的，并且你无法可靠地找出是哪个对象在调用该方法，因为消息发送可能来自\
  \ C 函数（如本附录前面所述）。\n\n如你所见，你无需在子类中重新声明你覆盖的方法，也无需将它们标记为`virtual`。任何方法都可以在子类或类别中被覆盖。关于这是否是一个好主意，存在两种学派。一派认为重新声明可以向读者提供关于该类对其父类做了哪些更改的信息，而另一派则认为这些只是实现细节，类的使用者无需理会，并且不值得因为覆盖了一个新方法而导致所有依赖类重新编译。\n\
  \nObjective-C 没有类变量。你可以通过使用文件作用域的全局变量并为它们提供访问器方法来模拟类变量。一个示例类声明可能如下所示（其中包含实例变量声明和方法声明等其他内容）：\n\
  \n```\n@interface Blarg : NSObject\n{\n\n}\n+ (int) classVar;\n+ (void) setClassVar:\
  \ (int) cv;\n\n@end // Blarg\n```\n\n然后实现如下所示：\n\n```\n#import \"Blarg.h\"\n\nstatic\
  \ int g_cvar;\n\n@implementation Blarg\n\n+ (int) classVar\n{\n    return (g_cvar);\n\
  } // classVar\n\n+ (void) setClassVar: (int) cv\n{\n    g_cvar = cv;\n} // setClassVar\n\
  \n@end // Blarg\n```\n\nCocoa 对象层次结构有一个共同的祖先类：`NSObject`。当你创建一个新类时，你几乎总是会继承`NSObject`或一个现有的\
  \ Cocoa 类。C++的对象层次结构通常是拥有不同根节点的多个树。\n\n### Objective-C++\n\n有一种方法可以兼得两者的优势。Xcode\
  \ 附带的 Clang 编译器支持一种称为 Objective-C++的混合语言。此编译器允许你自由混合使用 C++和 Objective-C 代码，只有少数几个小限制。当你需要时，可以获得类型安全和底层性能；在合适的情况下，可以利用\
  \ Objective-C 的动态特性以及 Cocoa 工具包。\n\n一个常见的开发场景是将应用程序的所有核心逻辑放入一个可移植的 C++库中（如果你正在构建跨平台应用），并使用平台的原生工具包编写用户界面。Objective-C++对这种开发风格大有裨益。你获得了\
  \ C++的性能和类型安全，而用户则获得了使用与其平台无缝集成的原生工具包创建的应用程序。\n\n要让编译器将你的代码视为 Objective-C++，请在源文件中使用`*.mm`文件扩展名。`*.M`扩展名也有效，但\
  \ Mac 的 HFS+文件系统不区分大小写但保留大小写，因此最好避免任何类型的大小写依赖。\n\n就像物质和反物质一样，Objective-C 和 C++的对象层次结构不能混合。因此，你不能拥有一个继承自`NSView`的\
  \ C++类，也不能拥有一个继承自`std::string`的 Objective-C 类。\n\n你可以将指向 Objective-C 对象的指针放入 C++对象中。由于所有\
  \ Objective-C 对象都是动态分配的，你不能在类中嵌入完整的对象，也不能在栈上声明它们。你需要在 C++的构造函数中（或任何方便的地方）对任何 Objective-C\
  \ 对象执行`alloc`和`init`，并在析构函数中（或其他地方）释放它们。因此，以下是一个有效的类声明：\n\n```\nclass ChessPiece\n\
  {\n    ChessPiece::PieceType type;\n    int row, column;\n    NSImage *pieceImage;\n\
  };\n```\n\n你也可以将 C++对象放入 Objective-C 对象中：\n\n```\n@interface SWChessBoard : NSView\n\
  {\n    ChessPiece *piece[32];\n}\n\n@end // SWChessBoard\n```\n\n\n\n## 内嵌于 Objective-C\
  \ 的 C++ 对象\n\nC++ 对象可以内嵌在 Objective-C 对象中，而非仅仅通过指针关联。当 Objective-C 对象被分配内存时，内嵌的\
  \ C++ 对象会调用其构造函数；当 Objective-C 对象被释放时，则会调用其析构函数。\n\n## 异常处理\n\n`NSExceptions` 和\
  \ C++ 异常是相互兼容的：你可以自由地抛出和捕获异常块。在异常展开过程中，C++ 析构函数和 `@finally` 块都会被正常执行。此外，`catch(\
  \ . . . )` 和 `@catch( . . . )` 可以捕获并重新抛出任何异常。\n\n## 如果你来自 Java 背景\n\n与 C++ 类似，Java\
  \ 拥有许多 Objective-C 不具备或实现方式不同的特性。例如，经典的 Objective-C 没有垃圾回收器，而是采用 `retain`/`release`\
  \ 机制以及基于 `ARC` 的自动释放池。如果你愿意，可以在 OS X 的 Objective-C 程序中启用垃圾回收。\n\nJava 的接口类似于 Objective-C\
  \ 的形式化协议；两者都要求实现一组方法。Java 有抽象类，但 Objective-C 没有。Java 有类变量，而在 Objective-C 中，你可以使用\
  \ `static` 文件作用域的全局变量，并通过访问器来操作它们，具体方法如“来自 C++ 背景”一节所示。Objective-C 对公有和私有方法的限制相当宽松。正如我们之前提到的，只要一个对象支持某个方法，它就可以被调用，即使该方法没有出现在任何外部形式（如头文件）中。Java\
  \ 允许你将类声明为 `final`，从而阻止任何子类的创建。Objective-C 则走向了另一个极端，它允许你在运行时向任何类添加方法。\n\n在 Objective-C\
  \ 中，类的实现通常分为两个文件：头文件和实现文件。不过，对于小型私有类，这种分离并非必需，正如你在本书的一些代码中所见。头文件（扩展名为 `*.h*`）包含与类相关的公有信息，例如任何新的枚举、类型、结构体以及将被使用该类的代码所引用的对象。其他代码通过预处理器（使用\
  \ `#import`）导入此文件。Java 没有 C 预处理器，后者是一种文本替换工具，会在 C、Objective-C 和 C++ 源代码被提交给编译器之前，自动对其进行处理。当你看到以\
  \ `#` 开头的指令时，就知道这一行是向预处理器发出的命令。实际上，C 预处理器对 C 语言家族一无所知；它只是进行盲目的文本替换。预处理器可以是一个非常强大——同时也非常危险——的工具。许多程序员认为\
  \ Java 缺少预处理器反而是一种优势。\n\n在 Java 中，几乎所有的错误都通过异常来处理。在 Objective-C 中，错误处理取决于你使用的 API。Unix\
  \ API 通常返回一个 `–1` 值，并设置全局错误号 (`errno`) 为特定的错误码。Cocoa API 通常仅在出现编程错误或无法进行清理的情况下抛出异常。Objective-C\
  \ 语言提供了类似于 Java 和 C++ 的异常处理特性：`@try`、`@catch` 和 `@finally`。\n\n在 Objective-C 中，空（零）对象被称为\
  \ `nil`。你可以向 `nil` 发送消息，而无需担心 `NullPointerException`。向 `nil` 发送消息是一个空操作，因此你无需检查消息发送是否指向了\
  \ `NULL`。关于向 `nil` 发送消息的更多讨论，请参见前面的“来自 C++ 背景”一节。\n\n在 Objective-C 中，你可以通过分类向现有类添加方法，从而在运行时改变类的行为。Objective-C\
  \ 中没有所谓的最终类；你可以子类化任何类，只要拥有该类的头文件即可，因为编译器需要知道父类定义的对象大小。\n\n在实践中，你在 Objective-C 中进行子类化的频率远低于\
  \ Java。通过分类和动态运行时（允许向任何对象发送任何消息）等机制，你可以将功能集成到更少的类中，也可以将功能放入最合理的类中。例如，你可以为 `NSString`\
  \ 添加一个分类，实现诸如反转字符串或去除所有空白字符的功能。然后，你就可以在任何 `NSString` 对象上调用该方法，无论该对象来自何处。你无需局限于自己的字符串子类来提供这些功能。\n\
  \n通常，在 Cocoa 中需要子类化的情况只有以下几种：创建一个全新的对象（位于对象层次结构顶端）、从根本上改变一个对象的行为，或者使用一个需要子类化的类（因为该类本身不提供任何有用的开箱即用功能）。例如，Cocoa\
  \ 中用于创建用户界面组件的 `NSView` 类，其 `drawRect:` 方法没有实现。你需要继承 `NSView` 并重写该方法，才能在视图中进行绘制。但对于许多其他对象，则会使用委托和数据源机制。由于\
  \ Objective-C 可以向任何对象发送任何消息，一个对象无需是特定的子类，也无需符合特定的接口，因此单个类可以同时作为多个不同对象的委托和数据源。\n\n\
  由于数据源和委托方法是在分类中声明的，你无需实现所有方法。在 Objective-C 的 Cocoa 编程中，很少有空的存根方法，或者为了避免编译器警告而仅仅为了适配形式化协议而调用内嵌对象中相同方法的方法。\n\
  \n当然，能力越大，责任也越大。使用 Objective-C 的手动 `retain`、`release` 和 `autorelease` 内存管理系统，你可能很容易不经意间制造出棘手的内存错误。为其他类添加分类是一个非常强大的机制，但如果滥用，会使你的代码难以理清，并且无法交给他人使用。此外，Objective-C\
  \ 基于 C 语言，因此你会继承 C 语言的所有历史包袱，以及在使用预处理器时带来的风险，包括可能出现的与指针相关的内存错误。\n\n## 如果你来自 BASIC\
  \ 背景\n\n许多程序员是从 Visual Basic 或 REALbasic 开始学习编程的，当他们转向 Cocoa 和 Objective-C 时，可能会感到困惑。\n\
  \nBASIC（Visual 和 REAL）环境提供了一个集成的开发环境，构成了完整的工作空间。Cocoa 则将你的开发工作分为两个环境：Interface Builder\
  \ 编辑器和文本编辑器，两者都集成在 Xcode 中。你使用 Interface Builder 创建用户界面，并告知用户界面在特定对象上调用哪些方法，然后将控制逻辑编写到在\
  \ Xcode 文本编辑器（或 TextMate、BBEdit、emacs，或你喜欢的任何文本编辑器）中编辑的源代码里。\n\n在 BASIC 中，用户界面元素及其相关的代码紧密集成。你将代码块放入按钮和文本字段中，使它们按你期望的方式工作。你可以将这些代码提取到一个公共类中，并让按钮中的代码与这个类通信，但在大多数情况下，BASIC\
  \ 编程涉及将代码直接写在用户界面元素上。如果不小心，这种风格可能会导致程序混乱，逻辑分散在许多不同的元素上。BASIC 编程通常通过修改对象的属性来使其按你期望的方式运行。\n\
  \n在 Cocoa 中，你会发现界面与界面背后的逻辑之间存在清晰的分离。你拥有一组相互通信的对象。你不再是设置对象的某个属性，而是要求对象去改变其自身的属性。这种区别很微妙但很重要。你在\
  \ Cocoa 中花费的大部分思考时间，是在琢磨需要发送什么消息，而不是需要设置什么属性。\n\n\n\n## BASIC 的生态与过渡\n\n`BASIC`在第三方控件和支持代码方面拥有非常丰富的市场。通常，你可以直接购买现成的组件并将其集成到你的代码库中，而不是自行构建。\n\
  \n## 从脚本语言转向 Objective-C\n\n从脚本语言（如`Perl`、`PHP`、`Python`和`Tcl`）转来的程序员，在过渡到`Objective-C`和`Cocoa`世界时，往往面临最艰难的转变。\n\
  \n脚本语言在程序员便利性方面表现出色，例如：非常强大的字符串处理能力、自动内存管理（无论是通过引用计数还是垃圾回收）、极快的开发迭代周期、灵活的类型系统（能轻松在数字、字符串和列表之间切换），以及大量可供下载和使用的包。脚本语言的运行时环境通常也非常灵活，允许你按需设计自己的对象类型和控制结构。\n\
  \n如果你来自脚本语言领域，`Objective-C`在许多方面会让你感觉像是倒退了一大步。与 20 世纪 90 年代发展起来的脚本语言相比，它是一门 80 年代的语言。字符串处理可能非常痛苦，因为内置的正则表达式功能缺失。使用`printf()`风格格式化字符串，差不多就是`Cocoa`能提供的最高级字符串操作了。尽管`Objective-C`已经引入了`ARC`和垃圾回收，但你在网上看到的大量现有代码仍然使用手动内存管理技术（通过`retain`和`release`）。开发过程包含编译和链接阶段，这导致从修改代码到看到结果之间存在延迟。你必须手动处理不同的类型，例如整数、字符数组和字符串对象。此外，你还得应对`C`语言带来的所有历史遗留问题，比如指针、位运算以及容易引发的内存错误。\n\
  \n为什么还要忍受这些痛苦去使用`Objective-C`？性能是一个原因：根据应用类型的不同，`Objective-C`的性能可能优于脚本语言。另一个重要优势是能够访问原生用户界面工具包（`Cocoa`）。大多数脚本语言支持最初为`Tcl`语言开发的`Tk`工具包。这个包虽然可用，但它不具备`Cocoa`所提供的用户界面功能的深度和广度。最重要的是，使用`Tk`构建的应用通常不具备\
  \ iOS 或 Mac 程序的外观和感觉。\n\n不过，你也可以通过使用脚本桥接，实现两全其美。存在`Objective-C`与`Python`（称为`PyObjC`）以及`Ruby`（`RubyObjC`）之间的桥接，因此这两种脚本语言可以成为一等公民。当你使用这些桥接时，可以在`Python`或`Ruby`中对`Cocoa`对象进行子类化，并访问`Cocoa`的所有功能。\n\
  \n## 总结\n\n`Objective-C`和`Cocoa`与任何其他编程语言和工具包都不同。`Objective-C`拥有一些源自其动态运行时分发特性的巧妙功能和特性。你可以在`Objective-C`中完成其他语言无法做到的事情。\n\
  \n与此同时，`Objective-C`缺少一些多年来其他语言已经添加的便利功能。特别是，强大的字符串处理、命名空间和元编程是这些其他语言具备、而`Objective-C`不具备的特性。\n\
  \n编程中的一切都归结于权衡取舍。你必须决定，相比于你当前选择的语言，在`Objective-C`中获得的收益是否值得你失去的东西。对我们来说，能够使用`Cocoa`构建应用，这本身就完全值得花时间和精力去熟悉`Objective-C`。\n\
