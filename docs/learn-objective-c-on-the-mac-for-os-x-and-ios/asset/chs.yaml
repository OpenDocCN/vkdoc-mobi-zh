  - ![image](img/9781430241881_square_fmt.jpg) 附录 A\n- 索引\n\n## 前言\n\n每当软件开发人员采用一个新平台时，他们都面临着艰巨的任务：需要熟悉新环境中的编程语言、开发工具、设计模式以及可用的标准软件库。\n\
  \n通常情况下，这必须与在压力下尽快交付代码的工作同步进行，而开发人员很容易退回到以往系统中熟悉的做法。这往往会导致代码与平台不匹配，可能重复实现已有的功能，并且日后会造成维护上的麻烦。\n\
  \n在理想情况下，新开发人员能得到已经熟悉该平台的同事的帮助，他们可以指导其入门并朝着正确的方向前进。不幸的是，iOS 平台本身的成功导致很多情况下根本无法实现这一点。\n\
  \n如果你身边没有导师，那么次优的选择是什么呢？\n\n\n\n"
- '# 本书作者均来自苹果开发者技术服务团队的资深成员，他们曾无数次解答初入苹果技术领域的软件工程师们的疑问。他们始终致力于帮助开发者培养良好习惯。正是这份经验汇聚成本书，它不仅能预判最常见的误解，更会细致讲解苹果开发平台不仅是"如何做"，还有"为何如此"。


  例如第 3 章《面向对象编程入门》提供的概念基础，能让你将后续内容串联成一幅清晰的图景，而非直接抛给你一堆陌生的类、方法和技巧，指望你通过实践自行消化。


  《学习 Mac 上的 Objective-C》是进入苹果 iOS 与 OS X 开发平台核心语言的优秀指南。


  约翰·C·伦道夫


  ## 关于作者


  | ![图片](img/9781430241881_Athor_1_fmt.jpg) | **斯科特·克纳斯特** 在苹果尚未成为潮流时就已入职。他早年帮助开发者编写
  Mac 软件，那时 Cocoa 还只是一个等待诞生的伟大构想。如今斯科特任职于谷歌开发者关系团队，并运营 Google Mac 博客。他住在硅谷，身边尽是技术宅同行。
  |


  | ![图片](img/9781430241881_Athor_2_fmt.jpg) | **瓦卡尔·马利克** 是位资深 UNIX 技术宅。他在 Mac OS
  X 早期就加入苹果，帮助开发者掌握 Cocoa 与 UNIX。如今他在圣地亚哥的 MeLLmo 公司开发出色的 iOS 软件。 |


  | ![图片](img/9781430241881_Athor_3_fmt.jpg) | **马克·达林普尔** 是资深 Mac 与 Unix 程序员，参与过跨平台工具包、互联网出版工具、高性能
  Web 服务器及桌面应用开发。他也是《高级 Mac OS X 编程》（Big Nerd Ranch 2005）的主要作者。业余时间他演奏长号、巴松管，还制作气球动物。
  |


  ## 关于技术审校


  ![图片](img/9781430241881_Athor_4_fmt.jpg)**尼克·韦尼克** 从事 IT 领域逾 13 年，涉足网络管理到 Web 开发。2008
  年 SDK 发布时他开始编写 iOS 应用，随后创立专注 iOS 开发的公司。业余时间他爱陪伴妻儿家人、打高尔夫。博客位于[nickwaynik.com](http://nickwaynik.com)，推特账号@n_dubbs。


