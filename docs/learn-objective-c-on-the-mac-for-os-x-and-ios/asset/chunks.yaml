    \ 会复制它们并在 block 定义时保存它们的状态。所以在这个例子中，`NSLog` 会打印 200。\n\n## 全局变量\n\n在前一节的局部变量例子中，我们说变量的作用域与\
    \ block 相同。你可以将这些变量标记为 `static`（全局）来让它们按照你可能期望的方式工作。\n\n```\nstatic double a =\
    \ 10, b = 20;\nMKSampleMultiplyBlockRef multiply = ^(void){ return a * b; };\n\
    NSLog(@\"%f\", multiply());\na = 20;\nb = 50;\nNSLog(@\"%f\", multiply());\n```\n\
    \n## 参数变量\n\nBlock 中的参数变量的行为方式与传递给函数的参数变量相同。\n\n```\ntypedef double (^MKSampleMultiply2BlockRef)(double\
    \ c, double d);\nMKSampleMultiply2BlockRef multiply2 = ^(double c, double d) {\
    \ return c * d; };\nNSLog(@\"%f, %f\", multiply2(4, 5), multiply2(5, 2));\n```\n\
    \n## `__block` 变量\n\n局部变量在 block 内作为常量被捕获。如果你想要能够修改它们的值，你必须将它们声明为可变的。因此，例如，以下代码将无法编译：\n\
