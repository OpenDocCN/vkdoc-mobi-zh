    \ A 使用类 B，并且类 B 也使用类 A。如果试图让每个类都`#import`另一个类，最终会出现编译错误。但如果在`A.h`中使用`@class B`，并在`B.h`中使用`@class\
    \ A`，那么这两个类可以愉快地相互引用。\n\n让`Car`跑起来\n\n这解决了`Car`的头文件问题。但`Car.m`需要关于`Tire`和`Engine`的更多信息。编译器必须看到`Tire`和`Engine`继承自哪些类，以便进行一些检查，确保这些对象能够响应发送给它们的消息。为此，我们将在`Car.m`中导入`Tire.h`和`Engine.h`。我们还需要将`Car`的`@implementation`从`CarParts-Split.m`中剪切出来。现在`Car.m`看起来像这样：\n\
    \n```\n#import \"Car.h\"\n\n#import \"Tire.h\"\n\n#import \"Engine.h\"\n\n@implementation\
    \ Car {\n    Tire *tires[4];\n    Engine *engine;\n}\n\n- (void) setEngine: (Engine\
    \ *) newEngine\n{\n    engine = newEngine;\n} // setEngine\n\n- (Engine *) engine\n\
    {\n    return (engine);\n} // engine\n\n- (void) setTire: (Tire *) tire\natIndex:\
    \ (int) index\n{\n    if (index < 0 || index > 3) {\n        NSLog (@\"bad index\
    \ (%d) in setTire:atIndex:\",\n               index);\n        exit (1);\n   \
    \ }\n    tires[index] = tire;\n} // setTire:atIndex:\n\n- (Tire *) tireAtIndex:\
    \ (int) index\n{\n    if (index < 0 || index > 3) {\n        NSLog (@\"bad index\
    \ (%d) in setTire:atIndex:\",\n               index);\n        exit (1);\n   \
    \ }\n    return (tires[index]);\n} // tireAtIndex:\n\n- (void) print\n{\n    NSLog\
    \ (@\"%@\", tires[0]);\n    NSLog (@\"%@\", tires[1]);\n    NSLog (@\"%@\", tires[2]);\n\
    \    NSLog (@\"%@\", tires[3]);\n    NSLog (@\"%@\", engine);\n} // print\n\n\
    @end // Car\n```\n\n你可以再次构建并运行程序，得到与之前相同的输出。没错，我们又在重构了（嘘，别告诉任何人）。我们一直在改进程序的内部结构，同时保持其行为不变。\n"
- fmt: '# 导入与继承


    我们需要从`CarParts-Split.m`中再解放两个类：`Slant6`和`AllWeatherRadial`。处理它们稍微有点棘手，因为它们继承了我们已经创建的类：`Slant6`继承自`Engine`，`AllWeatherRadial`继承自`Tire`。由于我们继承这些类，而不仅仅是使用指向类的指针，我们不能在它们的头文件中使用`@class`技巧。我们必须在`Slant6.h`中使用`#import
    "Engine.h"`，并在`AllWeatherRadial.h`中使用`#import "Tire.h"`。


    那么，为什么我们在这里不能直接使用`@class`呢？因为编译器需要完全了解超类，才能成功编译其子类的`@interface`。编译器需要超类实例变量的布局（类型、大小和顺序）。回忆一下，当你在子类中添加实例变量时，它们会被附加到超类实例变量的末尾。编译器随后使用这些信息来确定实例变量在内存中的位置，从每个方法调用中隐藏的`self`指针开始。编译器需要查看类的全部内容才能正确计算实例变量的位置。


    下一个要处理的是`Slant6`。在Xcode中创建`Slant6.m`和`Slant6.h`文件，然后将`Slant6`的`@interface`从`CarParts-Split.m`中剪切出来。如果你的切割和粘贴操作正确，`Slant6.h`现在应该如下所示：


    ```objc

    #import "Engine.h"


    @interface Slant6 : Engine


    @end // Slant6

    ```


    该文件只导入了`Engine.h`，而没有导入`<Cocoa/Cocoa.h>`。为什么？我们知道`Engine.h`已经导入了`<Cocoa/Cocoa.h>`，所以我们在这里不必自己再做一次。不过，如果你想要在此文件中放入`#import
    <Cocoa/Cocoa.h>`也是可以的，因为`#import`足够智能，不会多次包含同一个文件。


    `Slant6.m`只是从`CarParts-Split.m`中剪切并粘贴的`@implementation`部分，并惯例性地导入了`Slant6.h`头文件：


    ```objc

    #import "Slant6.h"


    @implementation Slant6


    - (NSString *) description


    {


    return (@"I am a slant-6. VROOOM!");


    } // description


    @end // Slant6

    ```


    执行相同的步骤将`AllWeatherRadial`移至它自己的文件对中。相信你此刻已经掌握了诀窍。下面是`AllWeatherRadial.h`的内容：


    ```objc

    #import "Tire.h"


    @interface AllWeatherRadial : Tire


    @end // AllWeatherRadial

    ```


    以下是`AllWeatherRadial.m`：


    ```objc

    #import "AllWeatherRadial.h"


    @implementation AllWeatherRadial


    - (NSString *) description


    {


    return (@"I am a tire for rain or shine");


    } // description


    @end // AllWeatherRadial

    ```


    可怜的`CarParts-Split.m`只剩下原来的一副空壳。它现在只是一堆`#import`指令和一个孤零零的函数，如下所示：


    ```objc

    #import <Foundation/Foundation.h>


    #import "Tire.h"


    #import "Engine.h"


    #import "Car.h"


    #import "Slant6.h"


    #import "AllWeatherRadial.h"


    int main (int argc, const char * argv[])


    {


    Car *car = [Car new];


    int i;


    for (i = 0; i < 4; i++) {


    Tire *tire = [AllWeatherRadial new];


    [car setTire: tire


    atIndex: i];


    }


    Engine *engine = [Slant6 new];


    [car setEngine: engine];


    [car print];


    return (0);


    } // main

    ```


    如果我们现在构建并运行项目，我们将得到与之前将代码分散到各个文件时完全相同的输出。


    ## 总结


    在本章中，你学习了使用多个文件组织源代码的基本技能。通常，每个类对应两个文件：一个包含类`@interface`的头文件，以及一个包含`@implementation`的`.m`文件。类的使用者随后通过导入（使用`#import`）头文件来访问类的特性。


    在这个过程中，我们遇到了跨文件依赖，即头文件或源文件需要来自另一个头文件的信息。混乱的导入网络可能会增加你的编译时间，并导致不必要的重新编译。明智地使用`@class`指令——它告诉编译器“请相信稍后你会看到一个以此命名的类”——可以减少需要导入的头文件数量，从而缩短编译时间。


    接下来我们将参观一些有趣的Xcode特性。那里见。


    # 第7章 更多关于Xcode的内容


    Mac和iOS程序员大部分时间都在Xcode中编写代码。Xcode是一个出色的工具，拥有许多强大的特性，但并非所有特性都显而易见。当你将长期使用一个强大的工具时，你会想尽可能多地了解它。在本章中，我们将向你介绍一些在编写和导航代码以及定位所需信息时很有用的Xcode技巧和窍门。我们还将提及Xcode帮助你调试代码的一些方式。


    Xcode是一个庞大的应用程序，并且极具可定制性，有时甚至到了荒谬的程度。（我们提到它很庞大了吗？）关于Xcode本身就可以（并且已经）写成整本书，因此我们将专注于亮点，让你快速上手。我们建议你在刚开始时使用Xcode的默认设置。当某些问题困扰你时，你会发现很可能有一个设置可以按照你的喜好进行调整。


    面对像Xcode这样的大型工具，一个好的策略是快速浏览文档，直到你开始感到眼花缭乱为止。使用Xcode一段时间，然后再次快速浏览文档。每次阅读，你都会理解更多内容。反复进行，你就会拥有极好的体验。


    我们将在本书中讨论Xcode 4.3.2，即撰写本文时的当前版本。苹果公司喜欢在Xcode版本之间添加新功能并移动旧功能，所以如果你使用的是Xcode 42.0，屏幕截图可能已经过时。现在，开始我们的技巧之旅！


    ## 一统天下的窗口


    作为Xcode程序员，你主要生活在Xcode主窗口中。让我们讨论这个窗口的各个部分，以确保我们了解所谈论的内容。


    *   ![image](images/9781430241881_square_fmt.jpg) **工具栏**：这是窗口的最顶部，大部分控件都位于此处。

    *   ![image](images/9781430241881_square_fmt.jpg) **导航面板**：这是左侧面板。该面板通常包含项目中的文件列表，但你也可以在那里看到其他视图：符号、搜索、问题、调试、断点和日志。你可以通过按Command（![image](images/Rangoli1.jpg)）加上数字键（1到7）或单击面板顶部的图标来切换视图。

    *   ![image](images/9781430241881_square_fmt.jpg) **编辑面板**：这个面板正好位于中间，你将在这里花费大部分时间，编写将改变世界并为你带来财富的精彩源代码。

    *   ![image](images/9781430241881_square_fmt.jpg) **检查器面板**：在右侧，该区域显示上下文相关的信息以及可用于修改所选项目属性的控件。

    *   ![image](images/9781430241881_square_fmt.jpg) **调试器面板**：这是底部中央的面板。当调试器运行时，堆栈和调试器控制台会出现在这里。

    *   ![image](images/9781430241881_square_fmt.jpg) **库面板**：隐藏在窗口的右下角，此面板包含项目资产、对象、代码片段以及在项目中使用的其他好东西。


    现在你已经了解了基本布局。让我们立即开始我们的旅程。


