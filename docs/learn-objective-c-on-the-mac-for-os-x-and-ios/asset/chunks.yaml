    like the name and mileage.


    This tool isn’t terribly useful for this program, but it allows you to do some
    nifty tricks in user interface code. For example, you could have something like
    Apple’s Aperture Lift and Stamp tool, which lets you move some, but not all, alterations
    you made to a picture onto other pictures. You could lift all of the attributes
