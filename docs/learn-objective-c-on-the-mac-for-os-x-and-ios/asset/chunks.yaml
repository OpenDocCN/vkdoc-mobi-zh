  raw: 'Objective-C is a superset of C: it begins with C and then adds a couple of
    small but significant additions to the language. If you’ve ever looked at C++
    or Java, you may be surprised at how small Objective-C really is. We’ll cover
    Objective-C’s additions to C in detail in this book’s chapters:


    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 2](#9781430241881_Ch2.xhtml),
    “Extensions to C,” focuses on the basic features that Objective-C introduces.

    *   ![image](images/9781430241881_square_fmt.jpg)   In [Chapter 3](#9781430241881_Ch3.xhtml),
    “An Introduction to Object-Oriented Programming,” we kick off the learning by
    showing you the basics of object-oriented programming.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 4](#9781430241881_Ch4.xhtml),
    “Inheritance,” describes how to create classes that gain the features of their
    parent classes.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 5](#9781430241881_Ch5.xhtml),
    “Composition,” discusses techniques for combining objects so they can work together.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 6](#9781430241881_Ch6.xhtml),
    “Source File Organization and Using Xcode 4,” presents real-world strategies for
    creating your program’s sources.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 7](#9781430241881_Ch7.xhtml),
    “More about Xcode,” shows you some shortcuts and power-user features to help you
    get the most out of your programming day.

    *   ![image](images/9781430241881_square_fmt.jpg)   We take a brief respite from
    Objective-C in [Chapter 8](#9781430241881_Ch8.xhtml), “A Quick Tour of the Foundation
    Kit,” to impress you with some of Cocoa’s cool features using one of its primary
    frameworks.

    *   ![image](images/9781430241881_square_fmt.jpg)   You’ll spend a lot of time
    in your Cocoa applications dealing with [Chapter 9](#9781430241881_Ch9.xhtml)’s
    topic, “Memory Management and ARC”.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 10](#9781430241881_Ch10.xhtml),
    “Object Initialization,” is all about what happens at that magical time when objects
    are born.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 11](#9781430241881_Ch11.xhtml),
    “Properties,” gives you the lowdown on Objective-C’s dot notation and an easier
    way to make object accessors.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 12](#9781430241881_Ch12.xhtml),
    “Categories,” describes the super cool Objective-C feature that lets you add your
    own methods to existing classes—even those you didn’t write.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 13](#9781430241881_Ch13.xhtml),
    “Protocols,” tells about a form of inheritance in Objective-C that allows classes
    to implement packaged sets of features.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 14](#9781430241881_Ch14.xhtml),
    “Blocks and Concurrency” shows you how to use a new Objective-C feature that enhances
    functions into blocks that can include data as well as code.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 15](#9781430241881_Ch15.xhtml),
    “Introduction to UIKit” gives you a taste of the gorgeous applications you can
    develop for iOS using its primary framework.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 16](#9781430241881_Ch16.xhtml),
    “Introduction to AppKit,” is similar to [Chapter 15](#9781430241881_Ch15.xhtml)
    except that it introduces the basic framework for OS X applications.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 17](#9781430241881_Ch17.xhtml),
    “File Loading and Saving,” shows you how to save and retrieve your data.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 18](#9781430241881_Ch18.xhtml),
    “Key-Value Coding,” gives you ways to deal with your data indirectly.

    *   ![image](images/9781430241881_square_fmt.jpg)   [Chapter 19](#9781430241881_Ch19.xhtml),
    “Using the Static Analyzer” shows you how to use a powerful Xcode tool to find
    common mistakes programmers make.

    *   ![image](images/9781430241881_square_fmt.jpg)  And finally, in [Chapter 20](#9781430241881_Ch20.xhtml),
    “NSPredicate,” we show you how to slice and dice your data.'
