    \n@end // Car\n```\n\n您会注意到简单的访问器声明消失了，取而代之的是`@property`声明。您可以通过添加额外属性来装饰`@property`，以表达您对属性行为的精确意图。由于为`name`添加了`copy`，编译器和类的使用者都知道`name`将被复制。这可以简化使用该类的程序员的开发工作，因为他们知道自己无需复制从文本字段中获取的字符串。另一方面，`engine`仅通过`retain/release`来管理。如果您不提供任何一项，编译器将默认使用`assign`，这对于对象来说通常不是您想要的行为。\n\
    \n**注**：您可以使用其他装饰，例如`nonatomic`，它能在属性不会被用于多线程环境时使访问器更快。桌面机器速度很快，因此将属性设为`nonatomic`并不会带来真正的性能提升，但\
    \ iOS 开发者经常使用它来在资源受限的移动设备上榨取更多性能。如果您不希望属性对象被保留，也可以使用`assign`，以帮助避免保留循环。\n\n默认情况下，如果您没有为属性指定任何属性，它们会被赋予默认属性`nonatomic`和`assign`。您只能为可保留指针（即\
    \ Objective-C 对象）指定`retain`和`copy`属性。所有其他类型，例如 C 语言和非可保留指针，必须使用`assign`并手动管理内存。\n\
    \n如果您自己提供了`setter`或`getter`（或两者），则不能使用`atomic`属性；必须使用`nonatomic`。\n\n`Car.m`有两个主要变化。`name`和`engine`访问器被删除，并添加了两条`@synthesize`指令：\n\
    \n```objc\n@implementation Car\n\n@synthesize name;\n\n@synthesize engine;\n```\n\
    \n最后，`main`使用点符号来设置内容：\n\n```objc\nCar *car = [[Car alloc] init];\n\ncar.name\
    \ = @\"Herbie\";\n\n…\n\ncar.engine = [[Slant6 alloc] init];\n```\n\n### 命名别名（Appellation）\n\
    \n在本章的所有代码中，属性名称与支持该属性的实例变量名称相同。这种模式非常常见，很可能您大部分时间都会使用它。不过，有时您可能希望实例变量使用一个名称，而公开属性使用另一个名称。\n\
    \n假设我们想将`Car`中的`name`实例变量改名为其他名称，比如`appellation`。我们只需在`Car.h`中更改实例变量的名称：\n\n```objc\n\
    @interface Car : NSObject\n\n{\n    NSString *appellation;\n    NSMutableArray\
    \ *tires;\n    Engine *engine;\n}\n\n@property (copy) NSString *name;\n\n@property\
    \ (retain) Engine *engine;\n```\n\n然后更改`@synthesize`指令：\n\n```objc\n@synthesize\
    \ name = appellation;\n```\n\n编译器仍然会创建`-setName:`和`-name`，但会在其实现中使用`appellation`实例变量。\n\
    \n但是当您编译时，会看到一些错误。您可能还记得，我们直接访问了`name`实例变量，而它已经被更改了。我们可以选择在代码中搜索并替换`name`，或者将直接访问实例变量改为使用访问器。在`init`中，将\n\
    \n```objc\nname = @\"Car\";\n```\n\n改为\n\n```objc\nself.name = @\"Car\";\n```\n\
    \n这个`self-dot-name`是什么意思？这是一种消除歧义的方式，用于让编译器知道我们想要通过访问器进行跳转。如果我们只使用裸的`name`，编译器会认为我们在直接修改实例变量。要使用访问器，我们可以写`[self\
    \ setName:@\"Car\"]`。请记住，点号只是进行完全相同调用的简写，因此`self.name = @\"Car\"`只是表达同一件事的另一种方式。\n\
    \n最后，我们需要修复第一个`NSLog`调用。\n"
- fmt: "`NSLog (@\"%@ has:\", self.name);`\n\nNow, we can rename `appellation` to\
    \ something else, like `nickname` or `moniker`. We just need to change the instance\
    \ variable name and the name used in `@synthesize`.\n\nBecause subclasses of the\
    \ car do not need to access variables directly, let’s kick them out of the header\
    \ file. We can eliminate the `name` and the `engine` variable, as they will be\
    \ created by the compiler. And we can move the `tires` array into the implementation\
    \ file. This makes our header file even simpler (which makes it better).\n\nNow\
    \ that we have fixed this, let’s go back to the `*AllWeatherRadial.m*` file. Notice,\
    \ attentive reader, that in the description method, we’re still using methods\
    \ to get the attributes of the tire. Let’s change all of those to use dot syntax.\
    \ Our description method now looks like this:\n\n```\n- (NSString *) description\n\
    {\n    NSString *desc;\n    desc = [[NSString alloc] initWithFormat:\n       \
    \     @\"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f\",\n            self.pressure,\
    \ self.treadDepth, self.rainHandling, self.snowHandling];\n    return (desc);\n\
    } // description\n```\n\nNext we’ll fix the `Tire` class and properties for `pressure`\
    \ and `treadDepth`, and we’ll get rid of the getters and setters. We have simplified\
    \ the `Tire` interface (and code) without losing any functionality.\n\n```\n@interface\
    \ Tire : NSObject\n@property float pressure;\n@property float treadDepth;\n- (id)\
    \ initWithPressure: (float) pressure;\n- (id) initWithTreadDepth: (float) treadDepth;\n\
    - (id) initWithPressure: (float) pressure\n             treadDepth: (float) treadDepth;\n\
    @end // Tire\n```\n\nWe also got rid of the setters and getters from the implementation\
    \ file. We’re having a great time getting rid of unnecessary clutter and ripping\
    \ out code where bugs could hide.\n\nOne more thing: you might remember that we\
    \ added the `name` property to `Car`, which had the `copy` attribute. That means\
    \ that when we assign the `name`, `Car` makes a copy of the string and stores\
    \ it. If we weren’t using ARC, we would need to add a `release` to the `dealloc`\
    \ method of `Car`, like so:\n\n```\n[name release];\n```\n\nBut because we are\
    \ using ARC, we don’t need to worry about that; the compiler will insert it there\
    \ for us. It’s ARC-tastic!\n\n## Read-Only About It\n\nYou might have an object\
    \ with an attribute that is read-only. This attribute might be a value that’s\
    \ computed on the fly, like the surface area of a banana, or might be one that\
    \ you want other objects to read but not change, like your driver’s license number.\
    \ You can code for these situations with more attributes on `@property`.\n\nBy\
    \ default, properties are mutable: you can read and write them. Properties have\
    \ a `readwrite` attribute you can use for specifying this. Since properties are\
    \ mutable by default, you won’t usually use it, but it’s there if you need it\
    \ and you want to make your intentions clear. We could have used `readwrite` in\
    \ `*Car.h*`:\n\n```\n@property (readwrite, copy) NSString *name;\n@property (readwrite,\
    \ retain) Engine *engine;\n```\n\nBut we didn’t, because we generally want to\
    \ stamp out and abolish and get rid of redundancy and repetition and saying the\
    \ same thing over again.\n\nReturning to our read-only property discussion, let’s\
    \ say we have a property, such as our license number or shoe size, that we don’t\
    \ want to be changed by anybody. We can use the `readonly` attribute on `@property`\
    \ for this. An example class would be something like this:\n\n```\n@interface\
    \ Me : NSObject\n{\n    float shoeSize;\n    NSString *licenseNumber;\n}\n@property\
    \ (readonly) float shoeSize;\n@property (readonly) NSString *licenseNumber;\n\
    @end\n```\n\nWhen the compiler sees that `@property` is `readonly`, it generates\
    \ a getter but not a setter for that attribute. Users of `Me` can call `–shoeSize`\
    \ and `–licenseNumber`, but if you try to call `-setShoeSize:`, the compiler will\
    \ complain. You’ll get the same behavior when using dot notation.\n\n## I’d Rather\
    \ Do It Myself\n\nWe mentioned that properties are backed by variables, and that\
    \ the compiler creates getters and setters for you. But what if you don’t want\
    \ any of that? What if you’d rather not have a variable, getter, and setter for\
    \ your property?\n\nIn that case, you’re covered. You can use the keyword `@dynamic`\
    \ to tell the compiler not to generate any code or create a variable for the property.\
    \ Continuing from the previous examples, let’s add the `bodyMassIndex` property\
    \ to the `Me` class.\n\nBecause body mass index is calculated from a person’s\
    \ height and weight, we can’t store the value for it. Instead, we want to create\
    \ an accessor to compute the value at runtime. So we use `@dynamic` to specify\
    \ a property and tell the compiler not to worry about creating a variable or a\
    \ getter—we’ll take care of it.\n\n```\n@property (readonly) float bodyMassIndex;\n\
    @dynamic bodyMassIndex;\n\n- (float)bodyMassIndex\n{\n    ///compute and return\
    \ bodyMassIndex\n}\n```\n\nIf you declare a dynamic property and you try to call\
    \ a getter or setter without providing one, you’ll get an error.\n\n## I Don’t\
    \ Like the Method Names\n\nSometimes, you might not like the names of the methods\
    \ that are generated by default. They’re in the form of `blah` and `setBlah:`.\
    \ To overcome this, you can specify the names of the getter and setter that the\
    \ compiler generates. Use the attributes `getter=` and `setter=` to define the\
    \ preferred names of your methods. If you do this, note that you’ll break the\
    \ key-value coding convention (described in detail in [Chapter 19](#9781430241881_Ch19.xhtml)),\
    \ so you should have a good reason for using this feature.\n\nHere’s an example\
    \ of a pattern that’s useful for properties of Boolean types:\n\n```\n@property\
    \ (getter=isHidden) BOOL hidden;\n```\n\nThis tells the compiler to generate `isHidden`\
    \ for the getter and `setHidden:` for the setter.\n\n## Alas, Properties Don’t\
    \ Do Everything\n\nYou’ll notice we didn’t convert `Car`’s tire methods to properties:\n\
    \n```\n- (void) setTire: (Tire *) tire atIndex: (int) index;\n- (Tire *) tireAtIndex:\
    \ (int) index;\n```\n\nThat’s because these methods don’t fit into the fairly\
    \ narrow range of methods that properties cover. Properties will let you replace\
    \ only `–setBlah` and `–blah` methods, but not methods that take extra arguments,\
    \ like the tire’s position on the car.\n\n## Summary\n\nIn this chapter, we discussed\
    \ properties, which are a way to reduce the amount of code you have to write (and\
    \ read later) when doing common operations with object attributes. Use the `@property`\
    \ directive to tell the world, “Hey, this object has this attribute of this name\
    \ of this type.” Also use the directive to pass on some information about the\
    \ property, like its mutability (`readonly` or `readwrite`). Behind the scenes,\
    \ the compiler automatically generates the method declarations for the setter\
    \ and getter for the object’s attribute.\n\nUse the `@synthesize` directive to\
    \ tell the compiler to generate the implementation for the accessors. You can\
    \ control which instance variable is affected by the generated implementation.\
    \ If you don’t want to use the default behavior, you’re free to write your own\
    \ code for the accessors. You can use `@dynamic` to tell the compiler not to generate\
    \ a variable or code.\n\nDot notation, although usually presented in the context\
    \ of properties, is just shorthand for calling the setter and getter for objects.\
    \ Dot notation reduces the amount of typing you have to do and is a little more\
    \ comfortable for folks coming from other languages.\n\nComing up next are categories,\
    \ Objective-C’s way of letting you extend existing classes, even if you don’t\
    \ have the code for them! Don’t miss that.\n\n## Chapter 12\n\n### Categories\n\
    \nWhen you write object-oriented programs, you’ll often want to add some new behavior\
    \ to an existing class: you can always create new hoops for objects to jump through.\
    \ For example, you might have designed a new kind of tire, so you’d subclass `Tire`\
    \ and add the new cool stuff. When you want to add behavior to an existing class,\
    \ you’ll often create a subclass."
