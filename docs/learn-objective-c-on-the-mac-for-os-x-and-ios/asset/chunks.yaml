- fmt: "绘制一个矩形`(30 40 50 60)`，颜色为绿色\n\n绘制一个椭圆`(15 18 37 29)`，颜色为蓝色\n\n这一切看起来都非常简单直接，对吧？当你使用过程式编程时，你会花时间将数据与专门处理该类型数据的函数连接起来。你必须小心地为每种数据类型使用正确的函数：例如，你必须调用`drawRectangle()`来处理类型为`kRectangle`的形状。将一个矩形传递给一个本该处理圆形的函数是过于容易发生的。\n\
    \n像这样的编码还有另一个问题，即它会使得程序的扩展和维护变得困难。为了说明这一点，让我们增强`Shapes-Procedural`，添加一种新的形状：三角形。你可以在*03.09\
    \ Shapes-Procedural-2*项目中找到修改后的程序。为了完成这个任务，我们至少需要在四个不同的地方修改程序。\n\n首先，我们将在`ShapeType`枚举中添加一个`kTriangle`常量：\n\
    \n```c\ntypedef enum {\n   kCircle,\n   kRectangle,\n   kEgg,\n   kTriangle\n\
    } ShapeType;\n```\n\n然后，我们将实现一个`drawTriangle()`函数，它看起来与它的同类函数完全相同：\n\n```c\nvoid\
    \ drawTriangle (ShapeRect bounds,\n                   ShapeColor fillColor)\n\
    {\n   NSLog (@\"drawing triangle at (%d %d %d %d) in %@\",\n          bounds.x,\
    \ bounds.y,\n          bounds.width, bounds.height,\n          colorName(fillColor));\n\
    } // drawTriangle\n```\n\n接下来，我们将在`drawShapes()`的`switch`语句中添加一个新的`case`分支。这将检查`kTriangle`并在适当的情况下调用`drawTriangle()`：\n\
    \n```c\nvoid drawShapes (Shape shapes[], int count)\n{\n   for (int i = 0; i <\
    \ count; i++) {\n      switch (shapes[i].type) {\n         case kCircle:\n   \
    \         drawCircle (shapes[i].bounds, shapes[i].fillColor);\n            break;\n\
    \         case kRectangle:\n            drawRectangle (shapes[i].bounds, shapes[i].fillColor);\n\
    \            break;\n         case kEgg:\n            drawEgg (shapes[i].bounds,\
    \ shapes[i].fillColor);\n            break;\n         case kTriangle:\n      \
    \      drawTriangle (shapes[i].bounds, shapes[i].fillColor);\n            break;\n\
    \      }\n   }\n} // drawShapes\n```\n\n最后，我们将在`shapes`数组中添加一个三角形。别忘了增加`shapes`数组中的形状数量：\n\
    \n```c\nint main (int argc, const char * argv[])\n{\n   Shape shapes[4];\n   ShapeRect\
    \ rect0 = { 0, 0, 10, 30 };\n   shapes[0].type = kCircle;\n   shapes[0].fillColor\
    \ = kRedColor;\n   shapes[0].bounds = rect0;\n   ShapeRect rect1 = { 30, 40, 50,\
    \ 60 };\n   shapes[1].type = kRectangle;\n   shapes[1].fillColor = kGreenColor;\n\
    \   shapes[1].bounds = rect1;\n   ShapeRect rect2 = { 15, 18, 37, 29 };\n   shapes[2].type\
    \ = kEgg;\n   shapes[2].fillColor = kBlueColor;\n   shapes[2].bounds = rect2;\n\
    \   ShapeRect rect3 = { 47, 32, 80, 50 };\n   shapes[3].type = kTriangle;\n  \
    \ shapes[3].fillColor = kRedColor;\n   shapes[3].bounds = rect3;\n   drawShapes\
    \ (shapes, 4);\n   return (0);\n} // main\n```\n\n好了，让我们看看`Shapes-Procedural-2`的实际运行效果：\n\
    \n绘制一个圆形`(0 0 10 30)`，颜色为红色\n\n绘制一个矩形`(30 40 50 60)`，颜色为绿色\n\n绘制一个椭圆`(15 18 37\
    \ 29)`，颜色为蓝色\n\n绘制一个三角形`(47 32 80 50)`，颜色为红色\n\n添加对三角形的支持并不算太糟，但我们的小程序只做一种操作——绘制形状（或者至少是打印关于绘制形状的文本）。程序越复杂，扩展起来就越棘手。例如，假设程序对形状做了更多的处理；假设它计算它们的面积并判断鼠标指针是否位于它们内部。在这种情况下，你必须修改所有对形状执行操作的函数，接触那些一直运行良好的代码，并可能引入错误。\n\
    \n另一个充满风险的情景是：添加一个需要更多信息来描述的新形状。例如，圆角矩形需要其他形状都不需要的信息：其圆角的半径。为了支持圆角矩形，你可以向`Shape`结构体添加一个`radius`字段，但这会浪费空间，因为该字段不会被其他形状使用；或者你可以使用C语言的联合体在同一结构体中叠加不同的数据布局，这会使所有形状都需要深入到联合体中才能获取它们感兴趣的数据，从而让事情变得复杂。\n\
    \n面向对象编程（OOP）优雅地解决了这些问题。当我们教我们的程序使用OOP时，我们将看到OOP如何处理第一个问题，即修改已经运行的代码以添加新的形状种类。\n\
    \n## 实现面向对象\n\n过程式程序基于函数。数据围绕着函数转。面向对象则反转了这一观点，将程序的数据置于中心，让函数围绕着数据转。与其关注程序中的函数，不如将注意力集中在数据上。\n\
    \n这听起来很有趣，但它如何工作呢？在OOP中，数据通过间接寻址包含了对操作它的代码的引用。与其告诉`drawRectangle()`函数“使用这个形状结构体去绘制一个矩形”，不如要求一个矩形“去绘制你自己”（天哪，这听起来很粗鲁，但确实如此）。通过间接寻址的神奇魔力，矩形的数据知道如何找到执行绘制的函数。\n\
    \n那么对象到底是什么？它不过是一个花哨的C语言结构体，能够找到与之关联的代码，通常是通过一个函数指针。 [图3-4](#_FIG4) 展示了四个`Shape`对象：两个矩形、一个圆形和一个椭圆。每个对象都能够找到一个函数来执行其绘制。\n\
    \n![9781430241881_Fig03-04.eps](images/9781430241881_Fig03-04_fmt.jpg)\n\n[图3-4](#FIG4).\
    \ 基本形状对象\n\n每个对象都有自己的`draw()`函数，该函数知道如何“绘制”其特定的形状。例如，一个圆形对象的`draw()`知道如何绘制圆形。一个矩形的`draw()`知道如何绘制矩形。\n\
    \n`Shapes-Object`程序（位于*03.10 -Shapes-Object*）执行与`Shapes-Procedural`相同的功能，但使用了Objective-C的面向对象特性来实现。这是来自`Shapes-Object`的`drawShapes()`：\n\
    \n```objc\nvoid drawShapes (id shapes[], int count)\n{\n   for (int i = 0; i <\
    \ count; i++) {\n      id shape = shapes[i];\n      [shape draw];\n   }\n} //\
    \ drawShapes\n```\n\n这个函数包含一个循环，遍历数组中的每个形状。在循环中，程序告诉形状绘制自身。\n\n注意这个版本的`drawShapes()`与原始版本之间的差异。首先，这个版本短得多！代码不必询问每个单独的形状它是什么类型。\n\
    \n另一个变化是`shapes[]`，函数的第一个参数：它现在是一个`id`对象的数组。什么是`id`？它是一个心理学术语，指代心灵中先天本能冲动和初级过程得以显现的那部分吗？在这个上下文中并非如此：它代表**identifier**（标识符），发音为“eye\
    \ dee”。`id`是一种通用类型，用于指代任何类型的对象。回想一下，对象只是一个带有一些附加代码的C结构体，所以`id`实际上是指向这些结构体之一的指针；在这种情况下，这些结构体构成了各种形状。\n\
    \n`drawShapes()`的第三个变化是循环体：\n\n```objc\nid shape = shapes[i];\n[shape draw];\n\
    ```\n\n第一行看起来像普通的C代码。代码从`shapes`数组中获取`id`——即指向对象的指针——并将其存入名为`shape`的变量中，该变量的类型是`id`。这只是一个指针赋值：它实际上并没有复制形状的全部内容。看看\
    \ [图3-5](#_FIG5) ，了解`Shapes-Object`中可用的各种形状。`shapes[0]`是指向红色圆形的指针；`shapes[1]`是指向绿色矩形的指针；`shapes[2]`是指向蓝色椭圆的指针。\n\
    \n![9781430241881_Fig03-05.eps](images/9781430241881_Fig03-05_fmt.jpg)\n\n[图3-5](#FIG5).\
    \ `shapes`数组\n\n现在我们来到了函数中的最后一行代码：\n\n```objc\n[shape draw];\n```"
