- fmt: '如果你来自其他语言（如 Java 或 C++），或来自其他平台（如 Windows 或 Linux），你可能想查阅本书附录《从其他语言过渡到 Objective-C》，其中指出了你在拥抱
    Objective-C 时需要跨越的一些思维障碍。


    ## 准备工作


    `Xcode` 是 Apple 提供的用于创建 iOS 和 OS X 应用程序的开发环境。Mac 并未预装 `Xcode`，但下载并安装它既简单又免费。你只需要一台运行
    OS X 10.7 Lion 或更高版本的 Mac。


    踏上漫长而精彩的 OS X 或 iOS 编程之路的第一步是获取一份 `Xcode` 副本。如果你还没有，可以从 Mac App Store 下载。要到达那里，请点击
    Dock 中的 App Store 图标（参见 [图 1-1](#9781430241881_Ch1.xhtml#_FIG1)），或者在 *Applications*
    文件夹中找到 App Store。


    ![9781430241881_Fig01-01.tif](images/9781430241881_Fig01-01_fmt.jpg)


    [图 1-1](#9781430241881_Ch1.xhtml#FIG1). Dock 中的 App Store 图标


    在 Mac App Store 中，点击右上角的搜索框，搜索 `Xcode`（参见 [图 1-2](#9781430241881_Ch1.xhtml#_FIG2)）。


    ![9781430241881_Fig01-02.tif](images/9781430241881_Fig01-02_fmt.jpg)


    [图 1-2](#9781430241881_Ch1.xhtml#FIG2). 在 Mac App Store 中搜索 `Xcode`


    或者，点击 *Categories*，然后点击 *Developer Tools*，你会在左上角（参见 [图 1-3](#9781430241881_Ch1.xhtml#_FIG3)）或附近看到
    `Xcode`。点击 *Xcode* 查看其下载页面（参见 [图 1-4](#9781430241881_Ch1.xhtml#_FIG4)）。


    ![9781430241881_Fig01-03.tif](images/9781430241881_Fig01-03_fmt.jpg)


    [图 1-3](#9781430241881_Ch1.xhtml#FIG3). Developer Tools 应用


    ![9781430241881_Fig01-04.tif](images/9781430241881_Fig01-04_fmt.jpg)


    [图 1-4](#9781430241881_Ch1.xhtml#FIG4). Mac App Store 中的 `Xcode` 下载页面


    点击 *Free*，然后点击 *Install App*。App Store 会将 `Xcode` 安装到你的 Applications 文件夹中。


    现在，你已准备好开始你的旅程。祝你好运！至少在旅途的第一部分，我们会陪你同行。


    ## 总结


    OS X 和 iOS 程序使用 Objective-C 编写，这项技术起源于上世纪 80 年代，现已发展为一套强大的工具。在本书中，我们假设你具备一定的 C
    语言或其它通用编程语言知识，并以此为基础展开。


    我们希望你喜欢这次冒险！


    # 第 2 章


    ## C 语言的扩展


    Objective-C 无非是 C 语言加上一些额外的特性——它非常棒！在本章中，我们将带你构建你的第一个 Objective-C 程序（以及第二个），并在此过程中介绍一些关键的扩展特性。


    ## 最简单的 Objective-C 程序


    你可能见过经典 C 语言版本的 Hello World 程序，它会输出 “Hello, world!” 或类似的精辟语句。Hello World 通常是 C
    语言新手学习的第一个程序。我们不想打破传统，所以我们将编写一个类似的程序，名为 Hello Objective-C。


    ### 构建 Hello Objective-C


    在阅读本书的过程中，我们假设你已经安装了 Apple 的 `Xcode` 工具。如果你还没有 `Xcode`，或者以前从未使用过它，Dave Mark 的
    *Learn C on the Mac*（Apress 2008）一书的 [第 2 章](#9781430241881_Ch2.xhtml) 中有一个精彩章节，会引导你完成使用
    `Xcode` 获取、安装和创建程序的步骤。


    在本节中，我们将逐步介绍使用 `Xcode` 创建你的第一个 Objective-C 项目的过程。如果你已经熟悉 `Xcode`，请随意跳过；我们不会介意。但在继续之前，请确保解压本书归档文件中的
    Learn ObjC Projects 归档（你可以从 Apress 网站的 Source Code/Download 页面下载）。该项目位于 `02.01
    - Hello Objective-C` 文件夹中。


    要创建项目，请首先启动 `Xcode`。你可以在 `/Developer/Applications` 中找到 `Xcode` 应用程序。我们将 `Xcode`
    图标放在 Dock 中以便快速访问。你可能也想这样做。'
  raw: 'If you’re coming from another language like Java or C++, or from another platform
    like Windows or Linux, you may want to check out this book’s Appendix, “Coming
    to Objective-C from Other Languages,” which points out some of the mental hurdles
    you’ll need to jump to embrace Objective-C.


    Getting Ready


    Xcode is the development environment provided by Apple for creating iOS and OS
    X applications. Macs don’t come with Xcode preinstalled, but downloading and installing
    it is easy and free. All you need is a Mac running OS X 10.7 Lion or later.


    The first step on the long and awesome road to programming for OS X or iOS is
    acquiring a copy of Xcode. If you don’t have it already, you can download it from
    the Mac App Store. To get there, click the App Store icon in the dock (see [Figure
    1-1](#9781430241881_Ch1.xhtml#_FIG1)), or find the App Store in the *Applications*
    folder.


    ![9781430241881_Fig01-01.tif](images/9781430241881_Fig01-01_fmt.jpg)


    [Figure 1-1](#9781430241881_Ch1.xhtml#FIG1). App Store icon in the dock


    In the Mac App Store, click in the search box in the upper right, and search for
    Xcode (see [Figure 1-2](#9781430241881_Ch1.xhtml#_FIG2)).


    ![9781430241881_Fig01-02.tif](images/9781430241881_Fig01-02_fmt.jpg)


    [Figure 1-2](#9781430241881_Ch1.xhtml#FIG2). Search for Xcode in the Mac App Store


    Or, click *Categories* and then *Developer Tools*, and you’ll see Xcode on the
    top left (see [Figure 1-3](#9781430241881_Ch1.xhtml#_FIG3)) or somewhere nearby.
    Click *Xcode* to see its download page (see [Figure 1-4](#9781430241881_Ch1.xhtml#_FIG4)).


    ![9781430241881_Fig01-03.tif](images/9781430241881_Fig01-03_fmt.jpg)


    [Figure 1-3](#9781430241881_Ch1.xhtml#FIG3). Developer Tools Apps


    ![9781430241881_Fig01-04.tif](images/9781430241881_Fig01-04_fmt.jpg)


    [Figure 1-4](#9781430241881_Ch1.xhtml#FIG4). Xcode download page in Mac App Store


    Click *Free* and then *Install App*. The App Store installs Xcode in your Applications
    folder.


    Now, you’re ready to start your journey. Good luck! We’ll be there with you for
    at least the first part of your trip.


    Summary


    OS X and iOS programs are written in Objective-C, using technology from way back
    in the 1980s that has matured into a powerful set of tools. In this book, we’ll
    start by assuming you know something about C programming or another general-purpose
    programming language and go from there.


    We hope you enjoy your adventure!


    Chapter 2


    Extensions to C


    Objective-C is nothing more than the C language with some extra features drizzled
    on top—it’s delicious! In this chapter, we’ll cover some of those key extras as
    we take you through building your first Objective-C program—and your second one
    too.


    The Simplest Objective-C Program


    You’ve probably seen the C version of the classic Hello World program, which prints
    out the text “Hello, world!” or a similar pithy remark. Hello World is usually
    the first program that neophyte C programmers learn. We don’t want to buck tradition,
    so we’re going to write a similar program here called Hello Objective-C.


    Building Hello Objective-C


    As you work through this book, we’re assuming you have Apple’s Xcode tools installed.
    If you don’t already have Xcode, or if you’ve never used it before, an excellent
    section in [Chapter 2](#9781430241881_Ch2.xhtml) of Dave Mark’s *Learn C on the
    Mac* (Apress 2008) walks you through the steps of acquiring, installing, and creating
    programs with Xcode.


    In this section, we’ll step through the process of using Xcode to create your
    first Objective-C project. If you are already familiar with Xcode, feel free to
    skip ahead; you won’t hurt our feelings. Before you go, be sure to expand the
    Learn ObjC Projects archive from this book’s archive (which you can download from
    the Source Code/Download page of the Apress web site). This project is located
    in the 02.01 - Hello Objective-C folder.


    To create the project, start by launching Xcode. You can find the Xcode application
    in

    /Developer/Applications. We put the Xcode icon in the Dock for easy access. You
    might want to do that too.'
  trans: '

    如果你来自其他语言（如 Java 或 C++），或来自其他平台（如 Windows 或 Linux），你可能想查阅本书附录《从其他语言过渡到 Objective-C》，其中指出了你在拥抱
    Objective-C 时需要跨越的一些思维障碍。


    ## 准备工作


    `Xcode` 是 Apple 提供的用于创建 iOS 和 OS X 应用程序的开发环境。Mac 并未预装 `Xcode`，但下载并安装它既简单又免费。你只需要一台运行
    OS X 10.7 Lion 或更高版本的 Mac。


    踏上漫长而精彩的 OS X 或 iOS 编程之路的第一步是获取一份 `Xcode` 副本。如果你还没有，可以从 Mac App Store 下载。要到达那里，请点击
    Dock 中的 App Store 图标（参见 图 1-1），或者在 *Applications* 文件夹中找到 App Store。


    ![9781430241881_Fig01-01.tif](img/9781430241881_Fig01-01_fmt.jpg)


    图 1-1. Dock 中的 App Store 图标


    在 Mac App Store 中，点击右上角的搜索框，搜索 `Xcode`（参见 图 1-2）。


    ![9781430241881_Fig01-02.tif](img/9781430241881_Fig01-02_fmt.jpg)


    图 1-2. 在 Mac App Store 中搜索 `Xcode`


    或者，点击 *Categories*，然后点击 *Developer Tools*，你会在左上角（参见 图 1-3）或附近看到 `Xcode`。点击 *Xcode*
    查看其下载页面（参见 图 1-4）。


    ![9781430241881_Fig01-03.tif](img/9781430241881_Fig01-03_fmt.jpg)


    图 1-3. Developer Tools 应用


    ![9781430241881_Fig01-04.tif](img/9781430241881_Fig01-04_fmt.jpg)


    图 1-4. Mac App Store 中的 `Xcode` 下载页面


    点击 *Free*，然后点击 *Install App*。App Store 会将 `Xcode` 安装到你的 Applications 文件夹中。


    现在，你已准备好开始你的旅程。祝你好运！至少在旅途的第一部分，我们会陪你同行。


    ## 总结


    OS X 和 iOS 程序使用 Objective-C 编写，这项技术起源于上世纪 80 年代，现已发展为一套强大的工具。在本书中，我们假设你具备一定的 C
    语言或其它通用编程语言知识，并以此为基础展开。


    我们希望你喜欢这次冒险！


    # 第 2 章


    ## C 语言的扩展


    Objective-C 无非是 C 语言加上一些额外的特性——它非常棒！在本章中，我们将带你构建你的第一个 Objective-C 程序（以及第二个），并在此过程中介绍一些关键的扩展特性。


    ## 最简单的 Objective-C 程序


    你可能见过经典 C 语言版本的 Hello World 程序，它会输出 “Hello, world!” 或类似的精辟语句。Hello World 通常是 C
    语言新手学习的第一个程序。我们不想打破传统，所以我们将编写一个类似的程序，名为 Hello Objective-C。


    ### 构建 Hello Objective-C


    在阅读本书的过程中，我们假设你已经安装了 Apple 的 `Xcode` 工具。如果你还没有 `Xcode`，或者以前从未使用过它，Dave Mark 的
    *Learn C on the Mac*（Apress 2008）一书的 第 2 章 中有一个精彩章节，会引导你完成使用 `Xcode` 获取、安装和创建程序的步骤。


    在本节中，我们将逐步介绍使用 `Xcode` 创建你的第一个 Objective-C 项目的过程。如果你已经熟悉 `Xcode`，请随意跳过；我们不会介意。但在继续之前，请确保解压本书归档文件中的
    Learn ObjC Projects 归档（你可以从 Apress 网站的 Source Code/Download 页面下载）。该项目位于 `02.01
    - Hello Objective-C` 文件夹中。


    要创建项目，请首先启动 `Xcode`。你可以在 `/Developer/Applications` 中找到 `Xcode` 应用程序。我们将 `Xcode`
    图标放在 Dock 中以便快速访问。你可能也想这样做。

    '
- fmt: 'Once Xcode finishes launching, you’ll see the Welcome screen, as shown in
    [Figure 2-1](#9781430241881_Ch2.xhtml#_FIG1). On the left side, you can select
    the next thing you want to do. Or, you can choose to open a recent project from
    the list on the right. (If you’re brand new with Xcode, you won’t see any recent
    projects.) If you don’t see the Welcome screen, you can always show it by selecting
    “Welcome to Xcode” on the Window menu or by typing ![image](images/Rangoli1.jpg)1.


    ![9781430241881_Fig02-01.tif](images/9781430241881_Fig02-01_fmt.jpg)


    [Figure 2-1](#9781430241881_Ch2.xhtml#FIG1). Xcode Welcome screen


    On the Welcome screen, click “Create a new Xcode project” (see [Figure 2-1](#9781430241881_Ch2.xhtml#_FIG1)),
    or just choose File ![image](images/9781430241881_arrow_fmt.jpg) New ![image](images/9781430241881_arrow_fmt.jpg)
    New Project. Xcode shows you a list of the various kinds of projects it can create.
    Use your focus to ignore most of the intriguing project types there, and choose
    Application on the left-hand side of the window and Command Line Tool on the right-hand
    side, as shown in [Figure 2-2](#9781430241881_Ch2.xhtml#_FIG2). Click Next.


    ![9781430241881_Fig02-02.tif](images/9781430241881_Fig02-02_fmt.jpg)


    [Figure 2-2](#9781430241881_Ch2.xhtml#FIG2). Making a new command line tool


    On the next screen ([Figure 2-3](#9781430241881_Ch2.xhtml#_FIG3)), you’ll select
    options for your new project. For Product Name, enter the timeless classic “Hello
    Objective-C”. For Company Identifier, you’ll typically enter a reverse DNS version
    of your company or website name, such as `com.mywebsite`; for now, you can just
    enter `com.thinkofsomethingclever`.


    ![9781430241881_Fig02-03.tif](images/9781430241881_Fig02-03_fmt.jpg)


    [Figure 2-3](#9781430241881_Ch2.xhtml#FIG3). Set your project’s options


    This screen saves the best for last, as the most important option is the type
    of command line tool you want to create: be sure to choose Foundation. Once you’re
    done, your screen should look a lot like [Figure 2-3](#9781430241881_Ch2.xhtml#_FIG3).
    After you’ve done this, click Next.


    Xcode drops a sheet and asks you where to save your project (see [Figure 2-4](#9781430241881_Ch2.xhtml#_FIG4)).
    We’re putting it into one of our Projects directories here to keep things organized,
    but you can put it anywhere you want.


    ![9781430241881_Fig02-04.tif](images/9781430241881_Fig02-04_fmt.jpg)


    [Figure 2-4](#9781430241881_Ch2.xhtml#FIG4). Name the new foundation tool


    After you click Save*,* Xcode shows you its main window, called the project window
    (see [Figure 2-5](#9781430241881_Ch2.xhtml#_FIG5)). This window displays the pieces
    that compose your project along with an editing pane. `main.m` is the source file
    that contains the code for Hello Objective-C.


    ![9781430241881_Fig02-05.tif](images/9781430241881_Fig02-05_fmt.jpg)


    [Figure 2-5](#9781430241881_Ch2.xhtml#FIG5). XCode’s main window


    `main.m` contains boilerplate code, kindly provided by Xcode for each new project.
    We can make our Hello Objective-C application a little simpler than the sample
    Xcode supplies. Delete everything in `main.m` and replace it with this code:


    ```

    #import <Foundation/Foundation.h>


    int main (int argc, const char *argv[])


    {


    NSLog (@"Hello, Objective-C!");


    return (0);


    } // main

    ```


    If you don’t understand all the code right now, don’t worry about it. We’ll go
    through this program in excruciating, line-by-line detail soon.


    Source code is no fun if you can’t turn it into a running program. Build and run
    the program by clicking the Run button or pressing ![image](images/Rangoli1.jpg)
    **R**. If there aren’t any nasty syntax errors, Xcode compiles and links your
    program and then runs it. Open the Xcode console window (by selecting View ![image](images/9781430241881_arrow_fmt.jpg)
    Debug Area ![image](images/9781430241881_arrow_fmt.jpg) Activate Console or pressing
    ![image](images/Rangoli1.jpg)**C**), which displays your program’s output, as
    shown in [Figure 2-6](#9781430241881_Ch2.xhtml#_FIG6).


    ![9781430241881_Fig02-06.tif](images/9781430241881_Fig02-06_fmt.jpg)


    [Figure 2-6](#9781430241881_Ch2.xhtml#FIG6). Running Hello Objective-C


    And there you have it: your first working Objective-C program. Congratulations!
    Let’s pull it apart and see how it works.


    ## Deconstructing Hello Objective-C


    Here, again, are the contents of `main.m`:


    ```

    #import <Foundation/Foundation.h>


    int main (int argc, const char *argv[])


    {


    NSLog (@"Hello, Objective-C!");


    return (0);


    } // main

    ```


    Xcode uses the `.m` extension to indicate a file that holds Objective-C code and
    will be processed by the Objective-C compiler. File names ending in `.c` are handled
    by the C compiler, and `.cpp` files are the province of the C++ compiler. (In
    Xcode, all this compiling is handled by the LLVM compiler by default), a single
    compiler that understands all three variations of the language.)


    The `main` file contains two lines of code that should be familiar to you already
    if you know plain C: the declaration of `main()` and the `return (0)` statement
    at the end. Remember that Objective-C really is C at heart, and the syntax for
    declaring `main()` and returning a value is the same as in C. The rest of the
    code looks slightly different from regular C. For example, what is that wacky
    `#import` thing? To find out, read on!


    **Note** The `.m` extension originally stood for “messages” when Objective-C was
    first introduced, referring to a central feature of Objective-C that we’ll talk
    about in future chapters. Nowadays, we just call them “dot-m files.”


    ### That Wacky `#import` Thing


    Just like C, Objective-C uses **header files** to hold the declarations of elements
    such as structs, symbolic constants, and function prototypes. In C, you use the
    `#include` statement to inform the compiler that it should consult a header file
    for some definitions. You can use `#include` in Objective-C programs for the same
    purpose, but you probably never will. Instead, you’ll use `#import`, like this:


    ```

    #import <Foundation/Foundation.h>

    ```


    `#import` is a feature provided by the compiler that Xcode uses, which is what
    Xcode uses when you’re compiling Objective-C, C, and C++ programs. `#import` guarantees
    that a header file will be included only once, no matter how many times the `#import`
    directive is actually seen for that file.


    **Note** In C, programmers typically use a scheme based on the `#ifdef` directive
    to avoid the situation where one file includes a second file, which then, recursively,
    includes the first. In Objective-C, programmers use `#import` to accomplish the
    same thing.


    The `#import <Foundation/Foundation.h>` statement tells the compiler to look at
    the `Foundation.h` header file in the Foundation framework.


    ### Introducing Frameworks


    What’s a framework? We’re glad you asked. A **framework** is a collection of parts—header
    files, libraries, images, sounds, and more—collected together into a single unit.
    Apple ships technologies such as Cocoa, Carbon, QuickTime, and OpenGL as sets
    of frameworks. Cocoa consists of a pair of frameworks, Foundation and Application
    Kit (also known as AppKit), along with a suite of supporting frameworks, including
    Core Animation and Core Image, which add all sorts of cool stuff to Cocoa.


    The Foundation framework handles features found in the layers beneath the user
    interface, such as data structures and communication mechanisms. All the programs
    in this book are based on the Foundation framework.


    **Note** Once you finish this book, your next step along the road to becoming
    a Cocoa guru is to master Cocoa’s Application Kit, which contains Cocoa’s high-level
    features: user interface elements, printing, color and sound management, AppleScript
    support, and so on. To find out more, check out *Learn Cocoa on the Mac* by Jack
    Nutting, David Mark, and Jeff LaMarche (Apress 2010).'
