  raw: 'After the obligatory inclusion of the foundation headers is an enumeration
    that specifies the different kinds of shapes that can be drawn: circle, rectangle,
    and an egg-shaped solid:


    #import <Foundation/Foundation.h>


    typedef enum {


    kCircle,


    kRectangle,


    kEgg } ShapeType;


    Next is an enum that defines the colors that can be used to draw the shape:


    typedef enum {


    kRedColor,


    kGreenColor,


    kBlueColor } ShapeColor;


    After that, we have a structure that describes a rectangle, which specifies the
    area on the

    screen where the shape will be drawn. For this chapter’s examples, we’re not worrying

    about exactly how this rectangle will be used to place each shape, just that it
    will happen somehow.


    typedef struct {


    int x, y, width, height;


    } ShapeRect;


    Finally, we have a structure that pulls all these things together to describe
    a shape:


    typedef struct {


    ShapeType type;


    ShapeColor fillColor;


    ShapeRect bounds;


    } Shape;


    The Part That Does the Work


    Next up in our example, main() declares an array of shapes we’re going to draw.
    After declaring the array, each shape structure in the array is initialized by
    assigning its fields. The following code gives us a red circle, a green rectangle,
    and a blue egg, at various random locations:


    int main (int argc, const char * argv[])


    {


    Shape shapes[3];


    ShapeRect rect0 = { 0, 0, 10, 30 };


    shapes[0].type = kCircle;


    shapes[0].fillColor = kRedColor;


    shapes[0].bounds = rect0;


    ShapeRect rect1 = { 30, 40, 50, 60 };


    shapes[1].type = kRectangle;


    shapes[1].fillColor = kGreenColor;


    shapes[1].bounds = rect1;


    ShapeRect rect2 = { 15, 18, 37, 29 };


    shapes[2].type = kEgg;


    shapes[2].fillColor = kBlueColor;


    shapes[2].bounds = rect2;


    drawShapes (shapes, 3);


    return (0);


    } // main


    A Handy c Shortcut


    The rectangles in the Shapes-Procedural program’s main() method are declared using
    a handy little C trick: when you declare a variable that’s a structure, you can
    initialize all the elements of that structure at once.


    ShapeRect rect0 = { 0, 0, 10, 30 };


    The structure elements get values in the order they’re declared. Recall that ShapeRect
    is declared like this:


    typedef struct {


    int x, y, width, height; } ShapeRect;


    The preceding assignment to rect0 means that rect0.x and rect0.y will both have
    the value 0; rect0.width will be 10; and rect0.height will be 30.


    This technique lets you reduce the amount of typing in your program without sacrificing
    readability.


    After initializing the shapes array, main() calls the drawShapes() function to
    draw the shapes.


    drawShapes() has a loop that inspects each Shape structure in the array. A switch
    statement looks at the type field of the structure and chooses a function that
    draws the shape. The program calls the appropriate drawing function, passing parameters
    for the screen area and color to use for drawing. Check it out:


    void drawShapes (Shape shapes[], int count)


    {


    for (int i = 0; i < count; i++) {


    switch (shapes[i].type) {


    case kCircle:


    drawCircle (shapes[i].bounds,


    shapes[i].fillColor);


    break;


    case kRectangle:


    drawRectangle (shapes[i].bounds,


    shapes[i].fillColor);


    break;


    case kEgg:


    drawEgg (shapes[i].bounds,


    shapes[i].fillColor);


    break;


    }


    }


    } // drawShapes


    Here is the code for drawCircle(), which just prints out the bounding rectangle
    and the color passed to it:


    void drawCircle (ShapeRect bounds, ShapeColor fillColor)


    {


    NSLog (@"drawing a circle at (%d %d %d %d) in %@",


    bounds.x, bounds.y,


    bounds.width, bounds.height,


    colorName(fillColor));


    } // drawCircle


    The colorName() function called inside NSLog() simply does a switch on the passed-in
    color value and returns a literal NSString such as @"red" or @"blue":


    NSString *colorName (ShapeColor colorName)


    {


    switch (colorName) {


    case kRedColor:


    return @"red";


    break;


    case kGreenColor:


    return @"green";


    break;


    case kBlueColor:


    return @"blue";


    break;


    }


    return @"no clue";


    } // colorName


    The other draw functions are almost identical to drawCircle, except that they
    draw a rectangle and an egg.


    Here is the output of Shapes-Procedural (minus the time stamp and other information
    added by NSLog()):


    drawing a circle at (0 0 10 30) in red'
