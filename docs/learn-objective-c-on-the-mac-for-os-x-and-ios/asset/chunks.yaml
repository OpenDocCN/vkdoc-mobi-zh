    plus another class and two nib files, one for iPhone and one for iPad. (If you
    don’t choose *Universal* when you create the project, you only get one of those
    files.)


    Let’s delve into our application delegate header file. First is our trusty #import,
    which you probably remember from all the way back in [Chapter 14](#9781430241881_Ch14.xhtml).
    Interface elements for iOS start with the prefix UI, because we’re using UIKit
    instead of AppKit. We also have the Foundation framework, which works on iOS just
    as for OS X. So classes like NSString are available, and they work like they do
    in OS X.


    #import <UIKit/UIKit.h>


    @class MSCViewController;


    @interface MSCAppDelegate : UIResponder <UIApplicationDelegate>


    @property (strong, nonatomic) UIWindow *window;


    @property (strong, nonatomic) MSCViewController *viewController;


    @end


    In the code, you’ll see that we have a window object and a view controller object.
    Here’s the implementation:


    - (BOOL)application:(UIApplication *)application


    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions


    {


    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];


    // Override point for customization after application launch.


    if ([[UIDevice currentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPhone)
    {


    self.viewController = [[MSCViewController alloc] initWithNibName:


    @"MSCViewController_iPhone" bundle:nil];


    } else {


    self.viewController = [[MSCViewController alloc] initWithNibName:


    @"MSCViewController_iPad" bundle:nil];


    }


    self.window.rootViewController = self.viewController;


    [self.window makeKeyAndVisible];


    return YES;


    }


