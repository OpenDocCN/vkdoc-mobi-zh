- fmt: "# Chapter 4: Inheritance\n\nComing up in our next chapter is inheritance,\
    \ a feature that lets you leverage the behavior of existing objects so you can\
    \ write less code to do your work. Hey, that sounds great! We’ll see you there!\n\
    \n## Inheritance\n\nWhen you write an object-oriented program—and we hope you’re\
    \ going to write *a lot* of them—the classes and objects you create have relationships\
    \ with each other. They work together to make your program do its thing.\n\nTwo\
    \ aspects of OOP are most important when dealing with relationships between classes\
    \ and objects. The first is **inheritance**, the subject of this chapter. When\
    \ you create a new class, it’s often useful to define the new class in terms of\
    \ its differences from another, already existing class. Using inheritance, you\
    \ can define a class that has all the capabilities of a parent class: it *inherits*\
    \ those capabilities.\n\nThe other OOP technique used with related classes is\
    \ **composition**, in which objects contain references to other objects. For example,\
    \ a car object in a racing simulator might have four tire objects that it uses\
    \ during game play. When your object keeps references to others, you can take\
    \ advantage of features offered by the others: that’s composition. We’ll cover\
    \ composition in the next chapter.\n\n## Why Use Inheritance?\n\nRemember our\
    \ old friend the Shapes-Object program from the previous chapter? It contained\
    \ several classes that had very similar interfaces and implementations. And, of\
    \ course, they’re similar because we created them by cutting and pasting.\n\n\
    We’ll jog your memory by presenting the interfaces for the `Circle` and `Rectangle`\
    \ classes:\n\n```objc\n@interface Circle : NSObject\n{\n@private\n    ShapeColor\
    \ fillColor;\n    ShapeRect bounds;\n}\n- (void) setFillColor:(ShapeColor)fillColor;\n\
    - (void) setBounds:(ShapeRect)bounds;\n- (void) draw;\n@end // Circle\n\n@interface\
    \ Rectangle : NSObject\n{\n@private\n    ShapeColor fillColor;\n    ShapeRect\
    \ bounds;\n}\n- (void) setFillColor:(ShapeColor)fillColor;\n- (void) setBounds:(ShapeRect)bounds;\n\
    - (void) draw;\n@end // Rectangle\n```\n\nThe interfaces for these classes are\
    \ much alike—very, *very* much alike. In fact, except for the class names, they’re\
    \ identical twins.\n\nThe implementations of `Circle` and `Rectangle` are also\
    \ very similar. Recall from the previous chapter that `setFillColor:` and `setBounds:`\
    \ are identical in the two classes:\n\n```objc\n@implementation Circle\n- (void)setFillColor:(ShapeColor)c\n\
    {\n    fillColor = c;\n} // setFillColor\n\n- (void)setBounds:(ShapeRect)b\n{\n\
