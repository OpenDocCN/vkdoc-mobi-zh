    are correct and you don’t want to look at them anymore, so you can concentrate
    (focus your attention, as it were) on the rest of the code in the function. Click
    to the left of the if statement, and its body will collapse as shown in [Figure
    7-19](#9781430241881_Ch7.xhtml#_FIG19).


    ![9781430241881_Fig07-19.tif](images/9781430241881_Fig07-19_fmt.jpg)


    [Figure 7-19](#9781430241881_Ch7.xhtml#FIG19). Folding code. You thought we were
    going to put a *Dune* reference here, didn’t you?


    You can see now that the body of the if statement has been replaced by a box with
    an ellipsis in it. Double-click the box to expand the code back the way it was,
    or click the disclosure triangle in the focus ribbon. The code isn’t gone; it’s
