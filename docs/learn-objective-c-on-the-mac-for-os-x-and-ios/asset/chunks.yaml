    architecture**: only one of them is needed. You really need only one file manager,
    or one font manager, or one graphics context. These classes provide a class method
    to give you access to a single, shared object, which you then use to get your
    work done.


    In this case, we need a directory iterator. But before we can ask the file manager
    for a directory iterator, we must figure out where in the file system to start
    looking at files. Starting from the top level of your hard drive could take a
    long time, so let’s just look in your home directory.


    How do we specify this directory? We could start with an absolute path, like */Users/wmalik/*,
    but that has the limitation that it only works if your home directory is named
    *wmalik*. Luckily, Unix (and OS X) has a shorthand character for the home directory,
    which is ~ (also known as the *tilde*). Yes, there really is a use for that character
    even when you’re not typing in *Español*).

    *~/Documents* is the *Documents* directory, and *~/junk/oopack.txt* would be found
