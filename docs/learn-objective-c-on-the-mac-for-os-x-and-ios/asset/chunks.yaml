  trans: "\n类似地，你可以对 C 对象使用 Core Foundation 版本。要返回此类对象，可以使用关键字 `CF_RETURNS_RETAINED`。例如，对于以下代码：\n\
    \n```\n- (CFMutableArrayRef)superDuperArrayCreator\n\n{\n\n    CFMutableArrayRef\
    \ myArrayRef = CFArrayCreateMutable(kCFAllocatorNull, 10, NULL);\n\n    // … 处理\
    \ myArray\n\n    return myArrayRef;\n\n}\n```\n\n你的方法将如下所示：\n\n```\n- (CFMutableArrayRef)superDuperArrayCreator\
    \ CF_RETURNS_RETAINED;\n```\n\n## 返回非保留对象\n\n你也可以将分析器指向相反的方向，让它在尝试返回*非保留*对象时发出警告。此处的关键字是\
    \ `NS_RETURNS_NOT_RETAINED` 和 `CF_RETURNS_NOT_RETAINED`。\n\n给定以下定义：\n\n```\n-\
    \ (NSMutableArray *)superDuperArrayCreator NS_RETURNS_NOT_RETAINED;\n```\n\n如果我们返回一个已保留的对象，分析器将会提出一个问题。\n\
    \n## 返回空值\n\n为了确保方法返回 `void`（空值），你可以在定义方法时使用关键字 `CLANG_ANALYZER_NORETURN`。在这种情况下，如果尝试返回一个值，分析器将会产生一个问题。\n\
    \n**那是什么声音？** 最后那个关键字中的 “CLANG” 前缀从何而来？Clang 是一个开源项目，它增强了 C 编译器，并为 Xcode 中的静态分析器提供了基础。有关\
    \ Clang 的更多信息，可以查阅 [`clang.llvm.org`](http://clang.llvm.org)。\n\n## 进一步分析\n\n\
    静态分析器在我们的这个小程序中发现了四种不同的问题。在本节中，我们将描述静态分析器能够揭示的其他几种问题。\n\n### 比较错误\n\nObjective-C\
    \ 程序中的一种常见模式是在条件语句（如 `if` 和 `while`）中同时获取值并进行测试。\n\n```\nif(myValue = [self getValue])\n\
    \n{\n\n// 执行某些操作\n\n}\n```\n\n对于 `if` 语句有两种解读方式：\n\n*   为 `myValue` 赋值，然后测试其是否为\
    \ `nil`。\n*   `myValue` 等于该方法返回的值。\n\n由于这里存在歧义，并且分析器（目前）无法读懂我们的想法，因此分析器会将其标记为一个问题。如果我们确实想要第一种含义，可以将其重写为\
    \ `if((myValue = [self getValue]))` 或 `if(nil != (myValue = [self getValue]))`。\n\
    \n如果我们想要第二种含义，那这确实是一个错误，我们需要通过正确比较这两个值来修复它：\n\n```\nif(myValue == [self getValue])\n\
    ```\n\n### 内存泄漏\n\n让我们看看这段代码：\n\n```\n- (void)myMethod\n\n{\n\n    NSString *string\
    \ = [[NSString alloc] initWithFormat:@\"%d, %d\", 1, 2];\n\n    if(nil == string)\n\
    \n    {\n\n        return;\n\n    }\n\n    NSArray *array = [[NSArray alloc] initWithObjects:string,\
    \ nil];\n\n    if(nil == array)\n\n    {\n\n        return;\n\n    }\n\n    //\
    \ 执行一些操作\n\n    // 很久以后\n\n    [array release];\n\n    [string release];\n\n}\n\
    ```\n\n乍一看，这段代码看起来非常不错。我们表现得像个好公民，分配了内存，然后在方法结束时释放了它们。一切都很完美，对吧？并非如此！分析器揭示了残酷的真相。\n\
    \n代码中的一条路径会导致内存泄漏。如果 `array` 的内存分配失败，方法无法继续执行，会立即返回。但在这一点上，我们已经分配了 `string`，而它不会被释放，因为我们从未到达方法末尾那个甜蜜的释放点。这指出了一条普遍的最佳实践：每当你退出一个方法时，应该思考哪些对象已经被分配但尚未释放。\n\
    \n为了解决这个问题，我们像下面这样修改第二个 `if` 语句：\n\n```\nif(nil == array)\n\n{\n\n    [string\
    \ release];\n\n    return;\n\n}\n```\n\n### 过度释放\n\n通常你会创建一个对象，使用它，然后最终发送一个 `autorelease`\
    \ 消息，这样当方法结束时，对象就会被销毁。\n\n```\nNSString *myString = [[[NSString alloc] initWithFormat:…]\
    \ autorelease];\n\n// 在同一个应用程序的后续位置\n\n[myString autorelease];\n```\n\n在这个例子中，`myString`\
    \ 的初始 retain 计数为 0，但我们却再次告诉编译器释放它，静态分析器会指出这个问题。要修复它，我们移除其中一个 `autorelease` 即可。\n\
    \n### 对 nil 进行同步\n"
- fmt: "# NSPredicate\n\nA fairly common operation when writing software is to take\
    \ a collection of objects and evaluate them against some kind of known truth.\
    \ You hang on to objects that conform to the truth and throw out objects that\
    \ don’t, leaving you with a pile of interesting objects to play with.\n\nYou see\
    \ this all the time with software you use, like iPhoto. If you tell iPhoto to\
    \ show you only pictures with a rating of three stars or better, the truth you’ve\
    \ specified is “photo must have a rating of three stars or better.” All of your\
    \ photos are run through this filter. Those that have a rating of three or more\
    \ stars pass through it, and the rest don’t. iPhoto then shows you all your good\
    \ pictures.\n\nSimilarly, iTunes has its search box. The truth you’re seeking\
    \ might be that the artist is Marilyn Manson or Barry Manilow. So all of your\
    \ non-head-banging and noncrooning music will be hidden, allowing you to create\
    \ one of the strangest dance mixes around.\n\nCocoa provides a class called `NSPredicate`\
    \ that lets you specify these truth filters. You can create `NSPredicate` objects\
    \ that describe exactly what you think is the truth and run each of your objects\
    \ through the predicate to see if they match.\n\n“Predicate” in this sense is\
    \ different than the “predicate” you might have learned about in an English grammar\
    \ class. “Predicate” here is used in the mathematical and computer science sense:\
    \ a function that evaluates to a true or false value.\n\n`NSPredicate` is Cocoa’s\
    \ means of describing queries, like you might use with a database. You can use\
    \ `NSPredicate` with database-style APIs like Core Data and Spotlight, although\
    \ we won’t be covering either of those here (but you can apply much of what’s\
    \ in this chapter to those two technologies as well as to your own objects). You\
    \ can think of `NSPredicate` as yet another means of indirection. You can use\
    \ a predicate object that does your checking, rather than asking explicitly in\
    \ code, “Are these the droids I’m looking for?” By swapping predicate objects\
    \ around, you can have common code sift through your data without hard-coding\
    \ the conditions you’re looking for. This is another application of the Open/Closed\
    \ Principle that you encountered back in [Chapter 3](#9781430241881_Ch3.xhtml).\n\
    \n## Creating a Predicate\n\nBefore you can use an `NSPredicate` object against\
    \ one of your objects, you need to create it, which you can do in two fundamental\
    \ ways. One involves creating a lot of objects and assembling them. This requires\
    \ a lot of code and is handy if you’re building a general user interface for specifying\
    \ searches. The other way involves query strings you put into your code. These\
    \ are much easier to deal with when just getting started, so we’ll concentrate\
    \ on query strings in this book. The usual caveats with string-oriented APIs apply\
    \ here, especially lack of error checking by the compiler and, sometimes, curious\
    \ runtime errors.\n\nThere is no escape from CarParts—we’ll be basing this chapter’s\
    \ examples on the garage of cars built in [Chapter 18](#9781430241881_Ch18.xhtml).\
    \ You can find everything in the *20.01 Car-Part-Predicate* project.\n\nTo start,\
    \ we’ll look at just one car:\n\n```objc\nCar *car;\n\ncar = makeCar (@\"Herbie\"\
    , @\"Honda\", @\"CRX\", 1984, 2, 34000, 58);\n\n[garage addCar: car];\n```\n\n\
    Recall that we wrote the `makeCar` function to build up a car and give it an engine\
    \ and some tires. In this case, we have Herbie, a two-door 1984 Honda CRX with\
    \ a 58-horsepower engine with 34,000 miles on it.\n\nNow, let’s make a predicate:\n\
    \n```objc\nNSPredicate *predicate;\n\npredicate = [NSPredicate predicateWithFormat:\
    \ @\"name == 'Herbie'\"];\n```\n\nLet’s pull this apart. `predicate` is one of\
    \ our usual Objective-C object pointers, which will point to an `NSPredicate`\
    \ object. We use the `NSPredicate` class method `+predicateWithFormat:` to actually\
    \ create the predicate. We give it a string, and `+predicateWithFormat:` takes\
    \ that string and builds a tree of objects behind the scenes that will be used\
    \ to evaluate the predicate.\n\n`predicateWithFormat` sounds a lot like `stringWithFormat`,\
    \ provided by `NSString`, which lets you plug in stuff using `printf`-style format\
    \ specifiers. As you’ll see later, you will be able to do the same thing with\
    \ `predicateWithFormat`. Cocoa has consistent naming schemes — it’s nice like\
    \ that.\n\nThis predicate string looks like a standard C expression. On the left-hand\
    \ side is a key path, `name`. Next come an operator for equality (`==`) and a\
    \ quoted string on the right-hand side. If a chunk of text in the predicate string\
    \ is not quoted, it is treated as a key path. If it’s quoted, it’s treated as\
    \ a literal string. You can use single quotes or double quotes (as long as they’re\
    \ balanced). Usually, you’ll use single quotes; otherwise, you’ll have to escape\
    \ each double quote in the string.\n\n## Evaluate the Predicate\n\nOK, so we’ve\
    \ got a predicate. What now? We evaluate it against an object!\n\n```objc\nBOOL\
    \ match = [predicate evaluateWithObject: car];\n\nNSLog (@\"%s\", (match) ? \"\
    YES\" : \"NO\");\n```\n\n`-evaluateWithObject:` tells the receiving object (the\
    \ predicate) to evaluate itself with the given object. In this case, it takes\
    \ the car, applies `valueForKeyPath:` using `name` as the key path to get the\
    \ name. Then, it compares it for equality to “Herbie.” If the name and “Herbie”\
    \ are the same, `-evaluateWithObject:` returns `YES`; otherwise, `NO`. The `NSLog`\
    \ uses the ternary operator to convert the numerical `BOOL` to a human-readable\
    \ string.\n\nHere’s another predicate:\n\n```objc\npredicate = [NSPredicate predicateWithFormat:\n\
    \            @\"engine.horsepower > 150\"];\n\nmatch = [predicate evaluateWithObject:\
    \ car];\n```\n\nThe predicate string has a key path on the left-hand side. This\
    \ key path digs into the car, finds the engine, and then finds the horsepower\
    \ of the engine. Next, it compares that value with 150 to see if it’s larger.\n\
    \nAfter we evaluate this against Herbie, `match` has the value of `NO`, because\
    \ little Herbie’s horsepower (58) is not greater than 150.\n\nChecking an object\
    \ against a particular predicate’s truth is all well and good, but things get\
    \ more interesting when you have collections of objects. Say we wanted to see\
    \ which cars in our garage are the most powerful. We can loop through the cars\
    \ and test each one with this predicate:\n\n```objc\nNSArray *cars = [garage cars];\n\
    \nfor (Car *car in [garage cars])\n{\n    if ([predicate evaluateWithObject: car])\n\
    \    {\n        NSLog (@\"%@\", car.name);\n    }\n}\n```\n\n## Summary\n\nThe\
    \ static analyzer found four issues in a small program like this one. Wow! Imagine\
    \ what the analyzer will find when you turn it loose on a big, complicated project.\
    \ You don’t have to run the analyzer every time you build, but including it in\
    \ your workflow as you develop is definitely good practice.\n\nA word of caution:\
    \ as you’ve seen in this chapter, the analyzer helps point you at problems, but\
    \ you still need to do a bit of your own sleuthing to figure out exactly what’s\
    \ wrong. No doubt, one day the analyzer will pinpoint exactly what you’ve done\
    \ wrong and will then fix the problem for you. But today is not that day."
  raw: 'In this pattern, we need to modify an object, but we want to make sure no
    one else can access it while it is being modified. We know we can use @synchronized(object)
    so that when we’re finished modifying the value, it’s valid and generally accessible.


    But wait! If the object is nil, the static analyzer will notice, and @synchronized
    won’t have any effect. To fix this, we have to make sure the object isn’t nil.


    The Static Analyzer Is Not a Concern Troll


    The static analyzer will report these and many other kinds of potential problems
    in your code, and it’s getting smarter with each release. You don’t have to heed
    everything it says, and sometimes, its messages will mystify you, but spending
    some time figuring out just what it’s telling you is a good idea. Think of the
    static analyzer as your well-meaning, slightly annoying friend who is very often
    right.


    On the other hand, don’t get too dependent on the static analyzer to catch every
    memory leak and poor coding practice. You’re still in charge of your code!


    Summary


    The static analyzer found four issues in a small program like this one. Wow! Imagine
    what the analyzer will find when you turn it loose on a big, complicated project.
    You don’t have to run the analyzer every time you build, but including it in your
    workflow as you develop is definitely good practice.


    A word of caution: as you’ve seen in this chapter, the analyzer helps point you
    at problems, but you still need to do a bit of your own sleuthing to figure out
    exactly what’s wrong. No doubt, one day the analyzer will pinpoint exactly what
    you’ve done wrong and will then fix the problem for you. But today is not that
    day.


    Chapter 20


    NSPredicate


    A fairly common operation when writing software is to take a collection of objects
    and evaluate them against some kind of known truth. You hang on to objects that
    conform to the truth and throw out objects that don’t, leaving you with a pile
    of interesting objects to play with.


    You see this all the time with software you use, like iPhoto. If you tell iPhoto
    to show you only pictures with a rating of three stars or better, the truth you’ve
    specified is “photo must have a rating of three stars or better.” All of your
    photos are run through this filter. Those that have a rating of three or more
    stars pass through it, and the rest don’t. iPhoto then shows you all your good
    pictures.


    Similarly, iTunes has its search box. The truth you’re seeking might be that the
    artist is Marilyn Manson or Barry Manilow. So all of your non-head-banging and
    noncrooning music will be hidden, allowing you to create one of the strangest
    dance mixes around.


    Cocoa provides a class called NSPredicate that lets you specify these truth filters.
    You can create NSPredicate objects that describe exactly what you think is the
    truth and run each of your objects through the predicate to see if they match.


    “Predicate” in this sense is different than the “predicate” you might have learned
    about in an English grammar class. “Predicate” here is used in the mathematical
    and computer science sense: a function that evaluates to a true or false value.


    NSPredicate is Cocoa’s means of describing queries, like you might use with a
    database. You can use NSPredicates with database-style APIs like Core Data and
    Spotlight, although we won’t be covering either of those here (but you can apply
    much of what’s in this chapter to those two technologies as well as to your own
    objects). You can think of NSPredicate as yet another means of indirection. You
    can use a predicate object that does your checking, rather than asking explicitly
    in code, “Are these the droids I’m looking for?” By swapping predicate objects
    around, you can have common code sift through your data without hard-coding the
    conditions you’re looking for. This is another application of the Open/Closed
    Principle that you encountered back in [Chapter 3](#9781430241881_Ch3.xhtml).


    Creating a Predicate


    Before you can use an NSPredicate object against one of your objects, you need
    to create it, which you can do in two fundamental ways. One involves creating
    a lot of objects and assembling them. This requires a lot of code and is handy
    if you’re building a general user interface for specifying searches. The other
    way involves query strings you put into your code. These are much easier to deal
    with when just getting started, so we’ll concentrate on query strings in this
    book. The usual caveats with string-oriented APIs apply here, especially lack
    of error checking by the compiler and, sometimes, curious runtime errors.


    There is no escape from CarParts—we’ll be basing this chapter’s examples on the
    garage of cars built in [Chapter 18](#9781430241881_Ch18.xhtml). You can find
    everything in the *20.01 Car-Part-Predicate* project.


    To start, we’ll look at just one car:


    Car *car;


    car = makeCar (@"Herbie", @"Honda", @"CRX", 1984, 2, 34000, 58);


    [garage addCar: car];


    Recall that we wrote the makeCar function to build up a car and give it an engine
    and some tires. In this case, we have Herbie, a two-door 1984 Honda CRX with a
    58-horsepower engine with 34,000 miles on it.


    Now, let’s make a predicate:


    NSPredicate *predicate;


    predicate = [NSPredicate predicateWithFormat: @"name == ''Herbie''"];


    Let’s pull this apart. predicate is one of our usual Objective-C object pointers,
    which will point to an NSPredicate object. We use the NSPredicate class method
    +predicateWithFormat: to actually create the predicate. We give it a string, and
    +predicateWithFormat: takes that string and builds a tree of objects behind the
    scenes that will be used to evaluate the predicate.


    predicateWithFormat sounds a lot like stringWithFormat, provided by NSString,
    which lets you plug in stuff using printf-style format specifiers. As you’ll see
    later, you will be able to do the same thing with predicateWithFormat. Cocoa has
    consistent naming schemes — it’s nice like that.


    This predicate string looks like a standard C expression. On the left-hand side
    is a key path, name. Next come an operator for equality (==) and a quoted string
    on the right-hand side. If a chunk of text in the predicate string is not quoted,
    it is treated as a key path. If it’s quoted, it’s treated as a literal string.
    You can use single quotes or double quotes (as long as they’re balanced). Usually,
    you’ll use single quotes; otherwise, you’ll have to escape each double quote in
    the string.


    Evaluate the Predicate


    OK, so we’ve got a predicate. What now? We evaluate it against an object!


    BOOL match = [predicate evaluateWithObject: car];


    NSLog (@"%s", (match) ? "YES" : "NO");


    –evaluateWithObject: tells the receiving object (the predicate) to evaluate itself
    with the given object. In this case, it takes the car, applies valueForKeyPath:
    using name as the key path to get the name. Then, it compares it for equality
    to “Herbie.” If the name and “Herbie” are the same, –evaluateWithObject: returns
    YES; otherwise, NO. The NSLog uses the ternary operator to convert the numerical
    BOOL to a human-readable string.


    Here’s another predicate:


    predicate = [NSPredicate predicateWithFormat:


    @"engine.horsepower > 150"];


    match = [predicate evaluateWithObject: car];


    The predicate string has a key path on the left-hand side. This key path digs
    into the car, finds the engine, and then finds the horsepower of the engine. Next,
    it compares that value with 150 to see if it’s larger.


    After we evaluate this against Herbie, match has the value of NO, because little
    Herbie’s horsepower (58) is not greater than 150.


    Checking an object against a particular predicate’s truth is all well and good,
    but things get more interesting when you have collections of objects. Say we wanted
    to see which cars in our garage are the most powerful. We can loop through the
    cars and test each one with this predicate:


    NSArray *cars = [garage cars];


    for (Car *car in [garage cars])


    {


    if ([predicate evaluateWithObject: car])


    {


    NSLog (@"%@", car.name);


    }


    }'
  trans: "\n# NSPredicate\n\n编写软件时一个相当常见的操作是获取一个对象集合，并根据某种已知条件对它们进行评估。你保留符合条件（即“真”）的对象，丢弃不符合的对象，最终得到一堆可以处理的有趣对象。\n\
    \n你在日常使用的软件（比如 iPhoto）中会经常看到这种情况。如果你告诉 iPhoto 只显示评级为三颗星或更高的照片，那么你指定的条件就是“照片的评级必须为三颗星或更高”。所有照片都会经过这个过滤器。评级达到三颗星或以上的照片通过筛选，其余则被隐藏。然后\
    \ iPhoto 会向你展示所有好照片。\n\n类似地，iTunes 也有搜索框。你寻找的条件可能是：歌手是玛丽莲·曼森或巴里·曼尼洛。于是，所有非重摇滚和非抒情歌曲都会被隐藏，让你能创建一份最奇特的混音歌单。\n\
    \nCocoa 提供了一个名为 `NSPredicate` 的类，让你能够指定这些条件过滤器。你可以创建 `NSPredicate` 对象，精确描述你认为的条件，然后让每个对象通过谓词进行匹配。\n\
    \n此处的“谓词”与你可能在英语语法课上学到的“谓语”不同。这里的“谓词”是数学和计算机科学意义上的用法：一个返回真或假值的函数。\n\n`NSPredicate`\
    \ 是 Cocoa 用于描述查询的方式，就像你在数据库中使用的那样。你可以将 `NSPredicate` 与 Core Data 和 Spotlight 等数据库风格的\
    \ API 结合使用，尽管我们在此不会深入介绍这些技术（但本章中的大部分内容同样可以应用于这两种技术以及你自己的对象）。你可以将 `NSPredicate`\
    \ 视为另一种间接手段。你可以使用谓词对象来进行检查，而不是在代码中显式询问：“这些是我要找的机器人吗？”通过切换不同的谓词对象，你可以让通用代码过滤数据，而无需硬编码你要寻找的条件。这也是你在第\
    \ 3 章中遇到的“开闭原则”的另一个应用。\n\n## 创建谓词\n\n在将 `NSPredicate` 对象应用于你的对象之前，你需要创建它，有两种基本方式。一种涉及创建大量对象并进行组装。这需要大量代码，但在构建用于指定搜索的通用用户界面时会很方便。另一种方式则是在代码中使用查询字符串。在刚开始时，这种方式更容易处理，因此本书将重点介绍查询字符串。字符串型\
    \ API 的常见问题在此同样适用，尤其是编译器缺乏错误检查，以及偶尔出现的奇怪运行时错误。\n\n我们无法回避“汽车零件”的例子——本章的示例将基于第 18\
    \ 章中构建的车库。你可以在 *20.01 Car-Part-Predicate* 项目中找到所有内容。\n\n首先，我们只看一辆车：\n\n```objc\n\
    Car *car;\n\ncar = makeCar (@\"Herbie\", @\"Honda\", @\"CRX\", 1984, 2, 34000,\
    \ 58);\n\n[garage addCar: car];\n```\n\n回想一下，我们编写了 `makeCar` 函数来构建一辆汽车，并为其配备发动机和轮胎。在这个例子中，我们有一辆\
    \ Herbie，一辆 1984 年款双门本田 CRX，搭载 58 马力的发动机，里程数为 34000 英里。\n\n现在，我们来创建一个谓词：\n\n```objc\n\
    NSPredicate *predicate;\n\npredicate = [NSPredicate predicateWithFormat: @\"name\
    \ == 'Herbie'\"];\n```\n\n让我们分析一下。`predicate` 是我们常见的 Objective-C 对象指针，它将指向一个 `NSPredicate`\
    \ 对象。我们使用 `NSPredicate` 的类方法 `+predicateWithFormat:` 来实际创建谓词。我们给它一个字符串，`+predicateWithFormat:`\
    \ 会将该字符串在后台构建成一个用于评估谓词的对象树。\n\n`predicateWithFormat` 听起来很像 `NSString` 提供的 `stringWithFormat`，后者允许你使用\
    \ `printf` 风格的格式说明符插入内容。稍后你会看到，你也可以对 `predicateWithFormat` 做同样的事情。Cocoa 的命名方案具有一致性——这一点很友好。\n\
    \n这个谓词字符串看起来像一个标准的 C 表达式。左侧是一个键路径 `name`。接下来是相等运算符（`==`），右侧是一个带引号的字符串。如果谓词字符串中的一段文本未加引号，它会被视为键路径。如果加了引号，则被视为字符串字面量。你可以使用单引号或双引号（只要它们成对出现）。通常你会使用单引号；否则，你需要在字符串中对每个双引号进行转义。\n\
    \n## 评估谓词\n\n好了，现在我们有了一个谓词。接下来呢？我们针对一个对象来评估它！\n\n```objc\nBOOL match = [predicate\
    \ evaluateWithObject: car];\n\nNSLog (@\"%s\", (match) ? \"YES\" : \"NO\");\n\
    ```\n\n`-evaluateWithObject:` 告诉接收对象（谓词）使用给定的对象对自身进行评估。在本例中，它获取汽车对象，使用 `name`\
    \ 作为键路径调用 `valueForKeyPath:` 来获取名称。然后，它将名称与“Herbie”进行相等性比较。如果名称和“Herbie”相同，`-evaluateWithObject:`\
    \ 返回 `YES`；否则返回 `NO`。`NSLog` 使用三元运算符将数值型的 `BOOL` 转换为人类可读的字符串。\n\n这是另一个谓词：\n\n\
    ```objc\npredicate = [NSPredicate predicateWithFormat:\n            @\"engine.horsepower\
    \ > 150\"];\n\nmatch = [predicate evaluateWithObject: car];\n```\n\n该谓词字符串的左侧是一个键路径。这个键路径深入汽车对象，找到发动机，然后找到发动机的马力值。接着，它将这个值与\
    \ 150 进行比较，看是否大于 150。\n\n在我们对 Herbie 进行此评估后，`match` 的值为 `NO`，因为小 Herbie 的马力（58）并不大于\
    \ 150。\n\n针对特定谓词的条件检查单个对象固然不错，但当你拥有对象集合时，事情会变得更有趣。假设我们想查看车库中哪些汽车马力最大。我们可以遍历所有汽车，并用这个谓词逐一测试：\n\
    \n```objc\nNSArray *cars = [garage cars];\n\nfor (Car *car in [garage cars])\n\
    {\n    if ([predicate evaluateWithObject: car])\n    {\n        NSLog (@\"%@\"\
    , car.name);\n    }\n}\n```\n\n## 总结\n\n静态分析器在一个像这样的小程序中发现了四个问题。哇！想象一下，当你在一个庞大复杂的项目上运行分析器时，它会发现什么。你不必每次构建时都运行分析器，但在开发过程中将其纳入工作流程绝对是一个好习惯。\n\
    \n一个提醒：正如你在本章中所看到的，分析器有助于指出问题，但你仍然需要自己进行一些侦查才能准确找出问题所在。毫无疑问，总有一天分析器会精确定位你的错误，然后自动为你修复问题。但今天还不是那一天。\n"
- fmt: "我们从车库里取出所有汽车，遍历它们，并根据谓词逐一评估每辆车。以下代码块会打印出马力最高的汽车：\n\nElvis\n\nPhoenix\n\nJudge\n\
    \n有道理吧？在继续之前，请确保你清楚其中涉及的所有语法要素。仔细看看`NSLog`中对汽车名称的调用。这里使用了 Objective-C 2.0 的点语法，等价于调用`[car\
    \ name]`。这里面没有什么魔法。这里的谓词字符串是`\"engine.horsepower > 150\"`。`engine.horsepower`是一个键路径，它可能在底层牵涉到各种魔法。\n\
    \n## 燃油滤清器\n\n程序员一个著名的美德/缺点是懒惰。如果不用写那个`for`循环和`if`语句，岂不美哉？虽然那只是几行代码，但零行代码当然更好。幸运的是，有几个分类为\
    \ Cocoa 的集合类添加了谓词过滤方法。\n\n`–filteredArrayUsingPredicate:`是`NSArray`上的一个分类方法，它会遍历数组的内容，根据谓词评估每个对象，并将评估结果为`YES`的对象累积到一个新数组中返回：\n\
    \n```objc\nNSArray *results;\nresults = [cars filteredArrayUsingPredicate: predicate];\n\
    NSLog (@\"%@\", results);\n```\n\n这会输出以下结果：\n\n```\n(\n    Elvis, a 1989 Acura\
    \ Legend, has 4 doors, 28123.4 miles, 151 hp and 4 tires,\n    Phoenix, a 1969\
    \ Pontiac Firebird, has 2 doors, 85128.3 miles, 345 hp and 4 tires,\n    Judge,\
    \ a 1969 Pontiac GTO, has 2 doors, 45132.2 miles, 370 hp and 4 tires\n)\n```\n\
    \n好的，这些结果与之前的结果并不完全一致。这是一个汽车对象的数组；而在之前的示例中，我们得到的是名字。我们可以使用键值编码（KVC）来提取名字，请记住：当`valueForKey:`发送给一个数组时，该键会被应用于数组中的所有元素：\n\
    \n```objc\nNSArray *names;\nnames = [results valueForKey:@\"name\"];\nNSLog (@\"\
    %@\", names);\n```\n\n如果我们打印出`names`，会看到：\n\n```\n(\n    Elvis,\n    Phoenix,\n\
    \    Judge\n)\n```\n\n假设你有一个可变数组，并且想要移除所有不符合条件的元素。`NSMutableArray`有一个`–filterUsingPredicate`方法，它正好能完成我们需要的移除工作：\n\
    \n```objc\nNSMutableArray *carsCopy = [cars mutableCopy];\n[carsCopy filterUsingPredicate:\
    \ predicate];\n```\n\n如果你打印出`carsCopy`，它将是之前我们看到的那三辆汽车的集合。\n\n你仍然可以对`NSMutableArray`使用`–filteredArrayUsingPredicate:`来创建一个新的（不可变）数组，因为`NSMutableArray`是`NSArray`的子类。`NSSet`也有类似的调用。\n\
    \n正如我们在 KVC 中提到的，使用谓词确实很方便，但它的运行速度并不比你亲自编写所有代码更快。因为无论如何都无法避免遍历所有汽车并对每辆车进行一些处理。在大多数情况下，如果你是在为\
    \ OS X 编写程序，这种遍历不是什么大问题，因为如今的电脑速度非常快。尽可能编写最方便的代码，然后如果遇到性能问题，再使用 Apple 的工具（如 Instruments）来测量性能。不过，iOS\
    \ 程序员应该始终密切关注程序的性能。\n\n## 格式说明符\n\n有经验的程序员知道，硬编码并非总是好主意。如果我们想知道哪些汽车的马力超过 200，之后又想了解哪些汽车的马力超过\
    \ 50，该怎么办？我们可以使用像`\"engine.horsepower > 200\"`和`\"engine.horsepower > 50\"`这样的谓词字符串，但这样我们就得重新编译程序，又回到我们在[第\
    \ 3 章](#9781430241881_Ch3.xhtml)中摆脱的那个糟糕世界。\n\n我们可以通过两种方式将可变内容放入谓词格式字符串中：格式说明符和变量名。首先，我们来看看格式说明符。你可以像平时熟悉的那样，使用`%d`和`%f`来放入数值：\n\
    \n```objc\npredicate = [NSPredicate predicateWithFormat: @\"engine.horsepower\
    \ > %d\", 50];\n```\n\n当然，与其在代码中直接使用`50`，你可以让这个值来自用户界面或某些外部机制。"
  raw: 'We get the cars from the garage, loop over them all, and evaluate each one
    against the predicate. This chunk of code prints the cars with highest horsepower:


    Elvis


    Phoenix


    Judge


    Makes sense, no? Before we go on, let’s make sure you’re clear about all the pieces
    of syntax involved. Take a good look at the car’s name call in NSLog. That’s using
    the Objective-C 2.0 dot syntax and is the equivalent of call [car name];. There’s
    no magic involved. The predicate string here is "engine.horsepower > 150". engine.horsepower
    is a key path, which might involve all sorts of magic under the hood.


    Fuel Filters


    One famous virtue/vice of programmers is laziness. Wouldn’t it be nice if we didn’t
    have to write that for loop and if statement? It’s only a couple of lines of code,
    but zero lines of code would be even better. Luckily, a couple of categories add
    predicate filtering methods to Cocoa’s collection classes.


    –filteredArrayUsingPredicate: is a category method on NSArray that will spin through
    the contents of the array, evaluate each object against a predicate, and accumulate
    objects that evaluate to YES into a new array that is returned:


    NSArray *results;


    results = [cars filteredArrayUsingPredicate: predicate];


    NSLog (@"%@", results);


    This produces the following results:


    (


    Elvis, a 1989 Acura Legend, has 4 doors, 28123.4 miles, 151 hp and 4 tires,


    Phoenix, a 1969 Pontiac Firebird, has 2 doors, 85128.3 miles, 345 hp and 4 tires,


    Judge, a 1969 Pontiac GTO, has 2 doors, 45132.2 miles, 370 hp and 4 tires


    )


    OK, so these results are not identical to the previous ones. This is an array
    of cars; in the previous example, we had names. We can use key-value coding (KVC)
    to extract the names, remembering that when valueForKey: is sent to an array,
    the key is applied to all elements of the array:


    NSArray *names;


    names = [results valueForKey:@"name"];


    NSLog (@"%@", names);


    If we print out names, we’ll see this:


    (


    Elvis,


    Phoenix,


    Judge


    )


    Let’s say you have a mutable array, and you want to yank out all the items that
    don’t belong. NSMutableArray has a method –filterUsingPredicate, which, handily
    enough, will do just the yanking we’re looking for:


    NSMutableArray *carsCopy = [cars mutableCopy];


    [carsCopy filterUsingPredicate: predicate];


    If you print out carsCopy, it will be the set of three cars we saw earlier.


    You can still use –filteredArrayUsingPredicate: with an NSMutableArray to make
    a new (nonmutable) array, because NSMutableArray is a subclass of NSArray. NSSets
    have similar calls, too.


    As we mentioned with KVC, using predicates is really convenient, but it runs no
    faster than writing all the code yourself. That’s because there’s no way to avoid
    looping over all the cars and doing some work with each of them. For the most
    part, this looping is no big deal if you’re writing for OS X, because computers
    are very fast these days. Go ahead and write the most convenient code possible
    and then measure your performance using one of Apple’s tools like Instruments
    if you run into speed problems. iOS programmers, though, should pay very close
    attention to program performance at all times.


    Format Specifiers


    Experienced programmers know that hard-coding isn’t necessarily a good idea. What
    if we wanted to know which cars have over 200 horsepower and then later which
    cars have over 50 horsepower? We could have predicate strings like "engine.horsepower
    > 200" and "engine.horsepower > 50", but we’d have to recompile the program and
    get back to the bad world we escaped in [Chapter 3](#9781430241881_Ch3.xhtml).


    We can put varying stuff into our predicate format strings in two ways: format
    specifiers and variable names. First, we’ll take a look at format specifiers.
    You can put in numerical values with %d and %f like you’re familiar with:


    predicate = [NSPredicate predicateWithFormat: @"engine.horsepower > %d", 50];


    Of course, rather than using 50 right there in your code, you could have that
    value driven by the user interface or some external mechanism.'
