    This chapter was pretty information-dense, and we really didn’t talk about Objective-C
    all that much. What’s the deal? Just like woodworkers needs to know more than
    just wood (for example, they need to know all that stuff about tools), an Objective-C
    programmer needs to know more than just the language. Being able to quickly write,
    navigate, and debug your code in Xcode means that you spend less time wrestling
    with the environment and spend more time doing the fun stuff.


    Next up is a meaty introduction to some of the classes in Cocoa. That should be
