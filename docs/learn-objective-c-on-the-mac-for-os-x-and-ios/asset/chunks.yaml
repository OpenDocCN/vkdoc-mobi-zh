    organization, and they have each answered countless questions from software engineers
    who are new to Apple''s technology. They have been responsible for instilling
    good habits in those they''ve helped. That experience results in a book that anticipates
    the most common misunderstandings and takes care to explain not only the how,
    but also the why of Apple''s development platform.


    For example, the conceptual basis provided in [Chapter 3](#9781430241881_Ch3.xhtml),
    "Introduction to Object-Oriented Programming," gives you the means to place the
    material that follows it into a coherent picture, instead of just tossing you
    into the midst of a flurry of unfamiliar classes, methods, and techniques and
    hoping that you''ll somehow sort it all out with practice.


    *Learn Objective-C on the Mac* is a fine guide to the language at the heart of
    Apple’s iOS and OS X development platform.


    John C. Randolph


