    \ using a `void *` and a bridged cast. To assign and get the string back, our\
    \ code would look like this:\n\n```\nstruct {\n    int32_t foo;\n    char *bar;\n\
    \    void *baz;\n} MyStruct;\n\nMyStruct.baz = (__bridge_retained void *)theString;\n\
    NSString *myString = (__bridge_transfer NSString *)MyStruct.baz;\n```\n\nAs you\
    \ can see, at the edges, `ARC` code is not always so automatic to write. It’s\
    \ a pretty deep topic that deserves plenty of study. To complete this conversation\
    \ about `ARC`, we’ll list memory management methods that you shouldn’t call on\
    \ `ARC`-managed objects:\n\n-   `retain`\n-   ![image](images/9781430241881_square_fmt.jpg)\
