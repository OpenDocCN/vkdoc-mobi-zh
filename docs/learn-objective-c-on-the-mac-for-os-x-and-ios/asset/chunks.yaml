    FileWalker project* folder) will paw through your Mac’s home directory looking
    for *.jpg* files and print a list of what it finds. It’s not terribly exciting,
    we admit, but it actually does something.


    FileWalker uses NSString, NSArray, NSEnumerator, and two other Foundation classes
    to interact with the file system.


    Our example also uses NSFileManager. The NSFileManager class lets you do stuff
    with the file system, like create directories, remove files, move files around,
    and get information about files. In this example, we’re going to ask NSFileManager
    to make an NSDirectoryEnumerator for us, which we’ll use to chug through a hierarchy
    of files.


    This entire program resides in the main() function, because we’re not making any
    of our own classes. Here is main() in its entirety:


