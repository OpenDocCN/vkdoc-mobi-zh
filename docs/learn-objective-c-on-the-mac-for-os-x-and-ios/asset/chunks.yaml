    \ And if you do any iOS development, you’ll notice the things that are informal\
    \ protocols in Cocoa become formal protocols with a lot of `@optional` methods.\n\
    \n## The Delegation Will Come to Order\n\nNow that we’ve covered protocols in\
    \ Objective-C, let’s discuss **delegation**, a feature that’s often used with\
    \ protocols. Delegation is a design pattern that allows an object to designate\
    \ another object to handle a particular task.\n\nIf you’ve looked at much Objective-C\
    \ code, you’ve probably seen examples of delegation. For example, `UITableView`\
    \ and `NSTableView` have a `dataSource` property that is handled by a delegate.\
    \ An object knows that a delegate can handle a task because the delegate conforms\
    \ to a protocol for the task.\n\nWe’ll use a real-world example to illustrate\
    \ this. Let’s say that at your programming job you have a boss whose task is to\
    \ create an iOS or OS X application. Does your boss do all the work? Not likely.\
    \ Instead, your boss breaks up the project into small chunks, does some of the\
    \ work, and assigns (delegates) the rest to other programmers depending on their\
    \ expertise. Some employees are better at doing some tasks than others. Because\
    \ the boss is smart, the right programmers are chosen for the right tasks.\n\n\
    You have actually already seen an example of delegation in the previous chapter.\
    \ In the *12.04 iTunesFinder* sample, the `ITunesFinder` class is a delegate for\
    \ the `NSNetServiceBrowser`.\n\nHow can `NSNetServiceBrowser` trust that the object\
    \ will perform the task it needs? Let’s take a look at the delegate methods for\
    \ `NSNetServiceBrowser`.\n\n- `- (id <NSNetServiceBrowserDelegate>)delegate;`\n\
    - `- (void)setDelegate:(id <NSNetServiceBrowserDelegate>)delegate;`\n\nThe first\
    \ method returns the current delegate if it is set, or nil otherwise. The second\
    \ one sets the delegate. The type of the argument `delegate` tells us that we\
    \ can set any object as a delegate as long as it conforms to the expected protocol.\n\
    \nIf you look at `NSNetServices.h`, you’ll see that the protocol has quite a few\
    \ methods, and all of them are optional. We can implement all, some, or none of\
    \ these optional methods.\n\nWe defined the `ITunesFinder` class to say that we\
    \ can handle the tasks that are required by the protocol.\n\n```\n@interface ITunesFinder\
    \ : NSObject <NSNetServiceBrowserDelegate>\n\n@end // ITunesFinder\n```\n\nWhat\
    \ if we took out the `<NSNetServiceBrowserDelegate>` part and then assigned the\
    \ object as a delegate? The compiler will complain “You can’t handle the method!”\
    \ and will produce an error (OK, maybe it uses slightly different language):\n\
    \n```\nSending 'ITunesFinder *__strong' to parameter of incompatible type 'id<NSNetServiceBrowser\n\
    Delegate>'\n```\n\nLet’s look at the example in *13.02 Delegation*. We have three\
    \ objects: `Worker1`, `Worker2`, and `Manager`. Workers have some work that they’re\
    \ required to do, and they have the option to do extra work to impress the boss.\
    \ Also, keep in mind that this project uses ARC, so we don’t send the `release`\
    \ methods to objects once we’re done as we would if we were ARCless.\n\n```\n\
    int main(int argc, const char * argv[])\n{\n    @autoreleasepool\n    {\n    \
    \    Manager *manager = [[Manager alloc] init];\n        Worker1 *worker1 = [[Worker1\
    \ alloc] init];\n        manager.delegate = worker1;\n        [manager doWork];\n\
    \n        Worker2 *worker2 = [[Worker2 alloc] init];\n        manager.delegate\
    \ = worker2;\n        [manager doWork];\n    }\n    return 0;\n}\n```\n\nWhen\
    \ we run this program, we see the following output:\n\n```\nWorker1 doing required\
    \ work.\nI am a manager and I am working\nWorker2 doing required work.\nWorker\
    \ doing optional work.\nI am a manager and I am working\n```\n\nThe `Manager`\
    \ does its own work and also asks the Workers to perform required work. If the\
    \ Workers can perform optional work, they do that too.\n\n```\n- (void)doWork\n\
    {\n    [delegate doSomeRequiredWork];\n    if(YES == [delegate\n        respondsToSelector:@selector(doSomeOptionalWork)])\n\
    \    {\n        [delegate doSomeOptionalWork];\n    }\n    [self myWork];\n}\n\
    ```\n\nThe `Manager` uses a delegate to get the Workers to do their required and\
    \ optional work. The code asks the delegate if it has implemented the method,\
    \ and if so, it asks the delegate to handle the method. Finally, the `Manager`\
    \ does its own work.\n\nThis code might give you an idea: why not ask every object\
    \ whether it has a method before calling that method? That way, the program would\
    \ never crash by calling a nonexistent method. This would work, but you’d pay\
    \ a huge price in slowing down your program extremely. So it’s a good idea to\
    \ only do this for delegates.\n\n## Summary\n\nIn this chapter, we introduced\
    \ the concept of a formal protocol. You define a formal protocol by listing a\
    \ set of methods inside a `@protocol` block. Objects adopt this formal protocol\
    \ by listing the protocol name in angle brackets after the class name in an `@interface`\
    \ statement. When an object adopts a formal protocol, it promises to implement\
    \ every required method that’s listed in the protocol. The compiler helps you\
    \ keep your promise by giving you a warning if you don’t implement all the protocol’s\
    \ methods.\n\nAlong the way, we explored some of the nuances that occur with object-oriented\
    \ programming, particularly the issues that crop up when making copies of objects\
    \ that live in a hierarchy of classes.\n\nAnd now, congratulations! You’ve covered\
    \ a great majority of the Objective-C language and have delved deeply into a number\
    \ of topics that come up often in OOP. You have a good foundation for moving on\
    \ to Cocoa programming or jumping into your own projects. In the next chapter,\
    \ we’ll study blocks, a relatively new Objective-C feature that enables you to\
    \ do more powerful things with functions. We’ll also discuss concurrency, which\
    \ is how you can keep your computers and mobile devices busy doing several things\
    \ at once.\n\n## Chapter 14\n\n### Blocks and Concurrency\n\nIn this chapter,\
    \ we’ll discuss **blocks**, an Objective-C feature that enhances what you can\
    \ do with functions. You can use blocks in applications that run on iOS (version\
    \ 4.0 and later) and OS X (10.6 and later). We’ll also talk about concurrency,\
    \ or how to take advantage of modern devices that can do more than one thing at\
    \ a time.\n\n### You’re Never Too Old to Play with Blocks\n\nBlock objects (usually\
    \ called simply “blocks”) are extensions to C functions. In addition to the code\
    \ that’s normally part of a function, blocks include variable bindings as well.\
    \ Blocks are also known as **closures**.\n\nBlocks have two types of bindings:\
    \ automatic and managed. **Automatic bindings** use memory on the stack, and **managed\
    \ bindings** are created on the heap.\n\nBecause blocks are actually implemented\
    \ at the C language level, they’re available in various C-based languages, including\
    \ Objective-C, C++, and Objective-C++.\n\nBlocks are available in Xcode’s GCC\
    \ and Clang tools, but are not part of the ANSI C standard. A proposal for blocks\
    \ has been submitted to the C programming language standards group.\n\n### Blocks\
    \ and Function Pointers\n\nBefore we get into blocks, let’s first spend a moment\
    \ talking about good old-fashioned function pointers. Why, pray tell? Because\
    \ the syntax for blocks is borrowed from the syntax of function pointers. So if\
    \ you know how to declare a function pointer, you know how to declare a block.\
    \ Like function pointers, blocks have the following characteristics:\n\n*   Return\
    \ type can be inferred or declared\n*   Type argument list\n*   Name\n\nLet’s\
    \ declare a function pointer:\n\n```\nvoid (*my_func)(void);\n```\n\nThis very\
    \ basic function pointer takes no arguments and returns no results. To convert\
    \ this to a block definition we just replace `*` (the asterisk) with `^` (a caret),\
    \ like so:\n\n```\nvoid (^my_block)(void);\n```\n\nYou use the caret operator\
    \ to declare a block variable and to mark the start of the block’s implementation.\
    \ Just as in functions, the body of the block is contained in `{}` (brackets)."
  raw: 'This code makes it obvious what kind of person can get drafted to play baseball.
    And if you do any iOS development, you’ll notice the things that are informal
    protocols in Cocoa become formal protocols with a lot of @optional methods.


    The Delegation Will Come to Order


    Now that we’ve covered protocols in Objective-C, let’s discuss **delegation**,
    a feature that’s often used with protocols. Delegation is a design pattern that
    allows an object to designate another object to handle a particular task.


    If you’ve looked at much Objective-C code, you’ve probably seen examples of delegation.
    For example, UITableView and NSTableView have a dataSource property that is handled
    by a delegate. An object knows that a delegate can handle a task because the delegate
    conforms to a protocol for the task.


    We’ll use a real-world example to illustrate this. Let’s say that at your programming
    job you have a boss whose task is to create an iOS or OS X application. Does your
    boss do all the work? Not likely. Instead, your boss breaks up the project into
    small chunks, does some of the work, and assigns (delegates) the rest to other
    programmers depending on their expertise. Some employees are better at doing some
    tasks than others. Because the boss is smart, the right programmers are chosen
    for the right tasks.


    You have actually already seen an example of delegation in the previous chapter.
    In the *12.04 iTunesFinder* sample, the ITunesFinder class is a delegate for the
    NSNetServiceBrowser.


    How can NSNetServiceBrowser trust that the object will perform the task it needs?
    Let’s take a look at the delegate methods for NSNetServiceBrowser.


    - (id <NSNetServiceBrowserDelegate>)delegate;


    - (void)setDelegate:(id <NSNetServiceBrowserDelegate>)delegate;


    The first method returns the current delegate if it is set, or nil otherwise.
    The second one sets the delegate. The type of the argument delegate tells us that
    we can set any object as a delegate as long as it conforms to the expected protocol.


    If you look at NSNetServices.h, you’ll see that the protocol has quite a few methods,
    and all of them are optional. We can implement all, some, or none of these optional
    methods.


    We defined the ITunesFinder class to say that we can handle the tasks that are
    required by the protocol.


    @interface ITunesFinder : NSObject <NSNetServiceBrowserDelegate>


    @end // ITunesFinder


    What if we took out the <NSNetServiceBrowserDelegate> part and then assigned the
    object as a delegate? The compiler will complain “You can’t handle the method!”
    and will produce an error (OK, maybe it uses slightly different language):


    Sending ''ITunesFinder *__strong'' to parameter of incompatible type ''id<NSNetServiceBrowser

    Delegate>''


    Let’s look at the example in *13.02 Delegation*. We have three objects: Worker1,
    Worker2, and Manager. Workers have some work that they’re required to do, and
    they have the option to do extra work to impress the boss. Also, keep in mind
    that this project uses ARC, so we don’t send the release methods to objects once
    we’re done as we would if we were ARCless.


    int main(int argc, const char * argv[])


    {


    @autoreleasepool


    {


    Manager *manager = [[Manager alloc] init];


    Worker1 *worker1 = [[Worker1 alloc] init];


    manager.delegate = worker1;


    [manager doWork];


    Worker2 *worker2 = [[Worker2 alloc] init];


    manager.delegate = worker2;


    [manager doWork];


    }


    return 0;


    }


    When we run this program, we see the following output:


    Worker1 doing required work.


    I am a manager and I am working


    Worker2 doing required work.


    Worker doing optional work.


    I am a manager and I am working


    The Manager does its own work and also asks the Workers to perform required work.
    If the Workers can perform optional work, they do that too.


    - (void)doWork


    {


    [delegate doSomeRequiredWork];


    if(YES == [delegate


    respondsToSelector:@selector(doSomeOptionalWork)])


    {


    [delegate doSomeOptionalWork];


    }


    [self myWork];


    }


    The Manager uses a delegate to get the Workers to do their required and optional
    work. The code asks the delegate if it has implemented the method, and if so,
    it asks the delegate to handle the method. Finally, the Manager does its own work.


    This code might give you an idea: why not ask every object whether it has a method
    before calling that method? That way, the program would never crash by calling
    a nonexistent method. This would work, but you’d pay a huge price in slowing down
    your program extremely. So it’s a good idea to only do this for delegates.


    Summary


    In this chapter, we introduced the concept of a formal protocol. You define a
    formal protocol by listing a set of methods inside a @protocol block. Objects
    adopt this formal protocol by listing the protocol name in angle brackets after
    the class name in an @interface statement. When an object adopts a formal protocol,
    it promises to implement every required method that’s listed in the protocol.
    The compiler helps you keep your promise by giving you a warning if you don’t
    implement all the protocol’s methods.


    Along the way, we explored some of the nuances that occur with object-oriented
    programming, particularly the issues that crop up when making copies of objects
    that live in a hierarchy of classes.


    And now, congratulations! You’ve covered a great majority of the Objective-C language
    and have delved deeply into a number of topics that come up often in OOP. You
    have a good foundation for moving on to Cocoa programming or jumping into your
    own projects. In the next chapter, we’ll study blocks, a relatively new Objective-C
    feature that enables you to do more powerful things with functions. We’ll also
    discuss concurrency, which is how you can keep your computers and mobile devices
    busy doing several things at once.


    Chapter 14


    Blocks and Concurrency


    In this chapter, we’ll discuss **blocks**, an Objective-C feature that enhances
    what you can do with functions. You can use blocks in applications that run on
    iOS (version 4.0 and later) and OS X (10.6 and later). We’ll also talk about concurrency,
    or how to take advantage of modern devices that can do more than one thing at
    a time.


    You’re Never Too Old to Play with Blocks


    Block objects (usually called simply “blocks”) are extensions to C functions.
    In addition to the code that’s normally part of a function, blocks include variable
    bindings as well. Blocks are also known as **closures**.


    Blocks have two types of bindings: automatic and managed. **Automatic bindings**
    use memory on the stack, and **managed bindings** are created on the heap.


    Because blocks are actually implemented at the C language level, they’re available
    in various C-based languages, including Objective-C, C++, and Objective-C++


    Blocks are available in Xcode’s GCC and Clang tools, but are not part of the ANSI
    C standard.

    A proposal for blocks has been submitted to the C programming language standards
    group.


    Blocks and Function Pointers


    Before we get into blocks, let’s first spend a moment talking about good old-fashioned
    function pointers. Why, pray tell? Because the syntax for blocks is borrowed from
    the syntax of function pointers. So if you know how to declare a function pointer,
    you know how to declare a block. Like function pointers, blocks have the following
    characteristics:


    *   ![image](images/9781430241881_square_fmt.jpg)  Return type can be inferred
    or declared

    *   ![image](images/9781430241881_square_fmt.jpg)  Type argument list

    *   ![image](images/9781430241881_square_fmt.jpg)  Name


    Let’s declare a function pointer:


    void (*my_func)(void);


    This very basic function pointer takes no arguments and returns no results. To
    convert this to a block definition we just replace * (the asterisk) with ^ (a
    caret), like so:


    void (^my_block)(void);


    You use the caret operator to declare a block variable and to mark the start of
    the block’s implementation. Just as in functions, the body of the block is contained
    in {} (brackets)'
  trans: "\n# 这段代码清楚地揭示了什么样的人会被征召去打棒球。如果你从事 iOS 开发，你会注意到 Cocoa 中那些非正式协议都变成了包含大量 `@optional`\
    \ 方法的正式协议。\n\n## 委托机制即将登场\n\n既然我们已经介绍了 Objective-C 中的协议，接下来我们来讨论**委托**，这是一种常与协议配合使用的特性。委托是一种设计模式，允许一个对象指定另一个对象来处理特定任务。\n\
    \n如果你看过大量 Objective-C 代码，很可能已经见过委托的实例。例如，`UITableView` 和 `NSTableView` 有一个由委托处理的\
    \ `dataSource` 属性。对象之所以知道委托能处理任务，是因为该委托遵循了处理该任务的协议。\n\n我们用一个现实世界的例子来说明。假设在你的编程工作中，有位负责创建\
    \ iOS 或 OS X 应用的上司。你的老板会亲自完成所有工作吗？不太可能。相反，老板会把项目拆分成小块，自己完成部分工作，然后根据其他程序员的专长，将剩余工作分配（委托）给他们。有些员工擅长某些任务，而另一些员工则更擅长其他任务。正因为老板明智，所以总能选对适合的人选来完成恰当的工作。\n\
    \n其实在上一章中你已经见过委托的例子。在 *12.04 iTunesFinder* 示例中，`ITunesFinder` 类就是 `NSNetServiceBrowser`\
    \ 的委托。\n\n`NSNetServiceBrowser` 如何信任该对象能执行所需的任务？我们来看看 `NSNetServiceBrowser` 的委托方法。\n\
    \n- `- (id <NSNetServiceBrowserDelegate>)delegate;`\n- `- (void)setDelegate:(id\
    \ <NSNetServiceBrowserDelegate>)delegate;`\n\n第一个方法返回当前设置的委托，如果未设置则返回 nil。第二个方法用于设置委托。参数\
    \ `delegate` 的类型告诉我们，只要对象遵循了预期的协议，我们就可以将其设为委托。\n\n如果你查看 `NSNetServices.h`，会看到该协议包含不少方法，而且所有方法都是可选的。我们可以实现这些可选方法的全部、部分或完全不实现。\n\
    \n我们定义 `ITunesFinder` 类时声明了它可以处理协议所要求的任务。\n\n```\n@interface ITunesFinder : NSObject\
    \ <NSNetServiceBrowserDelegate>\n\n@end // ITunesFinder\n```\n\n如果我们去掉 `<NSNetServiceBrowserDelegate>`\
    \ 部分，然后将该对象设为委托，会发生什么？编译器会抱怨“你无法处理这个方法！”并产生错误（好吧，也许它用的措辞稍有不同）：\n\n```\nSending\
    \ 'ITunesFinder *__strong' to parameter of incompatible type 'id<NSNetServiceBrowser\n\
    Delegate>'\n```\n\n让我们看看 *13.02 委托* 中的示例。这里有三个对象：`Worker1`、`Worker2` 和 `Manager`。工人们有一些必须完成的强制工作，同时他们也可以选择做额外的工作来给老板留下好印象。另外请记住，这个项目使用了\
    \ ARC，所以我们在完成后不需要像在没有 ARC 时那样向对象发送 `release` 方法。\n\n```\nint main(int argc, const\
    \ char * argv[])\n{\n    @autoreleasepool\n    {\n        Manager *manager = [[Manager\
    \ alloc] init];\n        Worker1 *worker1 = [[Worker1 alloc] init];\n        manager.delegate\
    \ = worker1;\n        [manager doWork];\n\n        Worker2 *worker2 = [[Worker2\
    \ alloc] init];\n        manager.delegate = worker2;\n        [manager doWork];\n\
    \    }\n    return 0;\n}\n```\n\n运行这个程序时，我们会看到以下输出：\n\n```\nWorker1 doing required\
    \ work.\nI am a manager and I am working\nWorker2 doing required work.\nWorker\
    \ doing optional work.\nI am a manager and I am working\n```\n\n`Manager` 完成自己的工作，同时也要求工人们执行强制工作。如果工人们能够执行可选工作，他们也会照做。\n\
    \n```\n- (void)doWork\n{\n    [delegate doSomeRequiredWork];\n    if(YES == [delegate\n\
    \        respondsToSelector:@selector(doSomeOptionalWork)])\n    {\n        [delegate\
    \ doSomeOptionalWork];\n    }\n    [self myWork];\n}\n```\n\n`Manager` 通过委托让工人们完成他们的强制工作和可选工作。代码会先询问委托是否实现了对应方法，如果实现了，则让委托处理该方法。最后，`Manager`\
    \ 完成自己的工作。\n\n这段代码可能会给你一个启发：为什么不在调用每个方法之前先询问该对象是否拥有这个方法？这样一来，程序就不会因为调用不存在的方法而崩溃。这样做确实可行，但你会付出巨大的代价——程序运行速度会变得极慢。因此，最好只对委托执行这种检查。\n\
    \n## 总结\n\n在本章中，我们介绍了正式协议的概念。你可以在 `@protocol` 代码块中列出一组方法来定义正式协议。对象通过在 `@interface`\
    \ 语句中类名后的尖括号内列出协议名称来采用该正式协议。当对象采用正式协议时，它承诺实现协议中列出的所有必需方法。如果你没有实现协议中的所有方法，编译器会通过给出警告来帮助你信守承诺。\n\
    \n在此过程中，我们还探讨了面向对象编程中的一些细微差别，特别是在复制存在于类层次结构中的对象时出现的问题。\n\n现在，恭喜你！你已经掌握了 Objective-C\
    \ 语言的绝大部分内容，并深入探讨了面向对象编程中经常出现的许多主题。你已经为学习 Cocoa 编程或开展自己的项目打下了坚实的基础。在下一章中，我们将学习块（blocks），这是一个相对较新的\
    \ Objective-C 特性，能让你用函数实现更强大的功能。我们还将讨论并发，这能让你让计算机和移动设备同时处理多项任务。\n\n## 第十四章\n\n\
    ### 块与并发\n\n在本章中，我们将讨论**块**，这是一个增强函数功能的 Objective-C 特性。你可以在运行 iOS（4.0 及更高版本）和\
    \ OS X（10.6 及更高版本）的应用中使用块。我们还将讨论并发，即如何利用能够同时执行多项任务的现代设备。\n\n### 活到老学到老，玩转块\n\n\
    块对象（通常简称为“块”）是 C 函数的扩展。除了函数通常包含的代码外，块还包含变量绑定。块也被称为**闭包**。\n\n块有两种绑定类型：自动绑定和管理绑定。**自动绑定**使用栈上的内存，而**管理绑定**则在堆上创建。\n\
    \n由于块实际上是在 C 语言层面实现的，因此它们可用于各种基于 C 的语言，包括 Objective-C、C++和 Objective-C++。\n\n\
    块在 Xcode 的 GCC 和 Clang 工具中可用，但并非 ANSI C 标准的一部分。关于块的提案已提交给 C 编程语言标准组。\n\n### 块与函数指针\n\
    \n在深入探讨块之前，我们先花点时间谈谈传统的函数指针。为什么？因为块的语法借用了函数指针的语法。所以如果你知道如何声明函数指针，你就知道如何声明块。与函数指针一样，块具有以下特征：\n\
    \n*   返回类型可推断或显式声明\n*   类型参数列表\n*   名称\n\n让我们声明一个函数指针：\n\n```\nvoid (*my_func)(void);\n\
    ```\n\n这个非常基础的函数指针不接受任何参数，也不返回任何结果。要将其转换为块定义，我们只需将 `*`（星号）替换为 `^`（脱字符），像这样：\n\n\
    ```\nvoid (^my_block)(void);\n```\n\n你使用脱字符运算符来声明块变量，并标记块实现的开始。就像函数一样，块的主体包含在\
    \ `{}`（大括号）中。\n"
- fmt: "“Show me the code，” you say？ Here you go （you‘ll find this code in *14.01\
    \ Square*）：\n\n```\nint (^square_block)(int number) =\n^(int number) {return (number\
    \ * number);};\nint result = square_block(5);\nprintf(\"Result = %d\\n\", result);\n\
    ```\n\nThis particular block takes an integer and returns the square of that number.\
    \ The part before the equals sign is the block definition, and the part after\
    \ the equals sign is the implementation. We can state this in general terms:\n\
    \n```\n<returntype> (^blockname)(list of arguments) = ^(arguments){ body; };\n\
    ```\n\nThe compiler infers the return type of the block literal, so you can omit\
    \ it. If the block has no arguments, you can omit those too. So blocks can often\
    \ be very compact and concise, like this one from *14.02 Hello Blocks*：\n\n```\n\
    void (^theBlock)() = ^{ printf(\"Hello Blocks!\\n\"); };\n```\n\n## Using a Block\n\
    \nBecause you declared the block as a variable, you can use it just as you would\
    \ a function， as you can see in *14.01 Square*：\n\n```\nint result = square_block(5);\n\
    ```\n\nNo doubt， you noticed there’s no caret symbol in this line of code. That‘s\
    \ because you only use a caret when you *define* a block， not when you *invoke*\
    \ it.\n\nBlocks have another cool property that might make you want to use them\
    \ instead of functions: they have access to variables that are declared in the\
    \ same （local） scope as the block. This means that any variables that are available\
    \ at the time of the block’s creation can be accessed:\n\n```\nint value = 6;\n\
    int (^multiply_block)(int number) = ^(int number)\n{return (value * number);};\n\
    int result = multiply_block(7);\nprintf(\"Result = %d\\n\", result);\n```\n\n\
    ## Using a Block Directly\n\nWhen you want to use a block， most of the time you\
    \ won‘t need to create a block variable. Instead， you typically just create a\
    \ block instance inline with your code. Usually， you’ll need a method or function\
    \ that takes a block as an argument （see the following code from *14.04 Sorting\
    \ Array*）。\n\n```\nNSArray *array = [NSArray arrayWithObjects:\n@\"Amir\", @\"\
    Mishal\", @\"Irrum\", @\"Adam\", nil];\nNSLog(@\"Unsorted Array %@\", array);\n\
    NSArray *sortedArray = [array sortedArrayUsingComparator:^(NSString\n*object1,\
    \ NSString *object2) {\n    return [object1 compare:object2];\n}];\nNSLog(@\"\
    Sorted Array %@\", sortedArray);\n```\n\nYou simply create a block， then set it\
    \ and forget it.\n\n## Use the typedef\n\nAs you can see， that long defining variable\
    \ statement can be a bit daunting. It’s easy to make a mistake when typing one\
    \ of those. Luckily， `typedef` comes to the rescue （see *14.05 Typedefed Blocks*）。\n\
    \n```\ntypedef double (^MKSampleMultiply2BlockRef)(double c, double d);\n```\n\
    \nThis statement defines a block variable named `MKSampleMultiply2BlockRef` that\
    \ takes two `double` numbers as arguments and returns a `double` number. With\
    \ this `typedef` in place， you can use this variable like so：\n\n```\nMKSampleMultiply2BlockRef\
    \ multiply2 = ^(double c, double d)\n{ return c * d; };\nprintf(\"%f, %f\", multiply2(4,\
    \ 5), multiply2(5, 2));\n```\n\nIf you look at *14.06 More Typedefs*， you‘ll notice\
    \ we have defined quite a few different type of block variables.\n\n```\ntypedef\
    \ void (^MKSampleVoidBlockRef)(void);\ntypedef void (^MKSampleStringBlockRef)(NSString\
    \ *);\ntypedef double (^MKSampleMultiplyBlockRef)(void);\n```\n\n## Blocks and\
    \ Variables\n\nWhen a block is declared， it captures its state at the point of\
    \ creation. Blocks can access the standard kinds of variables that functions use:\n\
    \n* ![image](images/9781430241881_square_fmt.jpg) Global variables， including\
    \ local static variables within the enclosing scope.\n* ![image](images/9781430241881_square_fmt.jpg)\
    \ Global functions （not really variables， of course）.\n* ![image](images/9781430241881_square_fmt.jpg)\
    \ Parameters from an enclosing scope.\n* ![image](images/9781430241881_square_fmt.jpg)\
    \ `__block` variables at the function level （that is， the same level as the block\
    \ is declared.） These are mutable variables.\n* ![image](images/9781430241881_square_fmt.jpg)\
    \ Nonstatic variables at the enclosing scope are captured as constants.\n* ![image](images/9781430241881_square_fmt.jpg)\
    \ Objective-C instance variables.\n* ![image](images/9781430241881_square_fmt.jpg)\
    \ Local variables within the block.\n\nWe’ll delve into each of these variable\
    \ types in greater detail.\n\n## Local Variables\n\nLocal variables are declared\
    \ in the same scope as the block. Let‘s take a look at this example， which is\
    \ part of *14.06 More Typedefs*：\n\n```\ntypedef double (^MKSampleMultiplyBlockRef)(void);\n\
    double a = 10, b = 20;\nMKSampleMultiplyBlockRef multiply = ^(void){ return a\
    \ * b; };\nNSLog(@\"%f\", multiply());\na = 20;\nb = 50;\n// what do you think\
    \ it will print?\nNSLog(@\"%f\", multiply());\n```\n\nWhat do you think the second\
    \ `NSLog` statement will print？ Anyone guess 1000？ As Alex Trebek would say， “Sorry，\
    \ no.” Why？ Because the variables are local， the block will copy them and save\
    \ their states at the time of the block’s definition. So in this case， the `NSLog`\
    \ will print 200.\n\n## Global Variables\n\nIn our local variables example in\
    \ the preceding section， we said that the variables had the same scope as the\
    \ block. You can mark the variables as `static` （global） to get them to behave\
    \ the way you probably expected them to.\n\n```\nstatic double a = 10, b = 20;\n\
    MKSampleMultiplyBlockRef multiply = ^(void){ return a * b; };\nNSLog(@\"%f\",\
    \ multiply());\na = 20;\nb = 50;\nNSLog(@\"%f\", multiply());\n```\n\n## Parameter\
    \ Variables\n\nParameter variables in a block act just like parameter variables\
    \ passed to a function.\n\n```\ntypedef double (^MKSampleMultiply2BlockRef)(double\
    \ c, double d);\nMKSampleMultiply2BlockRef multiply2 = ^(double c, double d) {\
    \ return c * d; };\nNSLog(@\"%f, %f\", multiply2(4, 5), multiply2(5, 2));\n```\n\
    \n## `__block` Variables\n\nLocal variables are captured as constants within blocks.\
    \ If you want to be able to modify their values， you must declare them as mutable.\
    \ So， for example， the following code will fail to compile：\n\n```\ndouble c =\
    \ 3;\nMKSampleMultiplyBlockRef multiply = ^(double a, double b) { c = a * b; };\n\
    ```\n\nThe compiler will yell at you with this error：\n\n```\nVariable is not\
    \ assignable (missing __block type specifier)\n```\n\nTo fix the compilation error，\
    \ you need to mark variable `c` as `__block`， as suggested by that friendly compiler\
    \ message above （see *14.07 Mutable Variables*）：\n\n```\n__block double c = 3;\n\
    MKSampleMultiplyBlockRef multiply = ^(double a, double b)\n{ c = a * b; };\n```\n\
    \nSome variables can‘t be declared as `__block`. These restrictions apply:\n\n\
    * ![image](images/9781430241881_square_fmt.jpg) No variable-length arrays\n* ![image](images/9781430241881_square_fmt.jpg)\
    \ No structures that contain variable-length arrays\n\n## Block Local Variables\n\
    \nThese variables act the same as local variables within functions.\n\n```\nvoid\
    \ (^MKSampleBlockRef)(void) = ^(void){\n    double a = 4;\n    double c = 2;\n\
    \    NSLog(@\"%f\", a * c);\n};\nMKSampleBlockRef();\n```\n\n## Objective-C Objects\n\
    \nBlocks are first-class citizens in Objective-C， which means you can treat them\
    \ like you would any other objects. The biggest issue you will run into when using\
    \ blocks is likely to be memory management. As we just discussed， you have to\
    \ be careful when accessing Objective-C objects from within blocks. As always，\
    \ there are rules to help you with memory management."
  raw: '“Show me the code,” you say? Here you go (you’ll find this code in *14.01
    Square*):


    int (^square_block)(int number) =


    ^(int number) {return (number * number);};


    int result = square_block(5);


    printf("Result = %d\n", result);


    This particular block takes an integer and returns the square of that number.
    The part before

    the equals sign is the block definition, and the part after the equals sign is
    the implementation. We can state this in general terms:


    <returntype> (^blockname)(list of arguments) = ^(arguments){ body; };


    The compiler infers the return type of the block literal, so you can omit it.
    If the block has no arguments, you can omit those too. So blocks can often be
    very compact and concise, like this one from *14.02 Hello Blocks*:


    void (^theBlock)() = ^{ printf("Hello Blocks!\n"); };


    Using a Block


    Because you declared the block as a variable, you can use it just as you would
    a function, as you can see in *14.01 Square*:


    int result = square_block(5);


    No doubt, you noticed there’s no caret symbol in this line of code. That’s because
    you only use a caret when you *define* a block, not when you *invoke* it.


    Blocks have another cool property that might make you want to use them instead
    of functions: they have access to variables that are declared in the same (local)
    scope as the block. This means that any variables that are available at the time
    of the block’s creation can be accessed:


    int value = 6;


    int (^multiply_block)(int number) = ^(int number)


    {return (value * number);};


    int result = multiply_block(7);


    printf("Result = %d\n", result);


    Using a Block Directly


    When you want to use a block, most of the time you won’t need to create a block
    variable. Instead, you typically just create a block instance inline with your
    code. Usually, you’ll need a method or function that takes a block as an argument
    (see the following code from *14.04 Sorting Array*).


    NSArray *array = [NSArray arrayWithObjects:


    @"Amir", @"Mishal", @"Irrum", @"Adam", nil];


    NSLog(@"Unsorted Array %@", array);


    NSArray *sortedArray = [array sortedArrayUsingComparator:^(NSString


    *object1, NSString *object2) {


    return [object1 compare:object2];


    }];


    NSLog(@"Sorted Array %@", sortedArray);


    You simply create a block, then set it and forget it.


    Use the typedef


    As you can see, that long defining variable statement can be a bit daunting. It’s
    easy to make a mistake when typing one of those. Luckily, typedef comes to the
    rescue (see *14.05 Typedefed Blocks)*.


    typedef double (^MKSampleMultiply2BlockRef)(double c, double d);


    This statement defines a block variable named MKSampleMultiply2BlockRef that takes
    two double numbers as arguments and returns a double number. With this typedef
    in place, you can use this variable like so:


    MKSampleMultiply2BlockRef multiply2 = ^(double c, double d)


    { return c * d; };


    printf("%f, %f", multiply2(4, 5), multiply2(5, 2));


    If you look at *14.06 More Typedefs*, you’ll notice we have defined quite a few
    different type of block variables.


    typedef void (^MKSampleVoidBlockRef)(void);


    typedef void (^MKSampleStringBlockRef)(NSString *);


    typedef double (^MKSampleMultiplyBlockRef)(void);


    Blocks and Variables


    When a block is declared, it captures its state at the point of creation. Blocks
    can access the standard kinds of variables that functions use:


    *   ![image](images/9781430241881_square_fmt.jpg)  Global variables, including
    local static variables within the enclosing scope.

    *   ![image](images/9781430241881_square_fmt.jpg)  Global functions (not really
    variables, of course).

    *   ![image](images/9781430241881_square_fmt.jpg)  Parameters from an enclosing
    scope.

    *   ![image](images/9781430241881_square_fmt.jpg)  __block variables at the function
    level (that is, the same level as the block is declared.) These are mutable variables.

    *   ![image](images/9781430241881_square_fmt.jpg)  Nonstatic variables at the
    enclosing scope are captured as constants.

    *   ![image](images/9781430241881_square_fmt.jpg)  Objective-C instance variables.

    *   ![image](images/9781430241881_square_fmt.jpg)  Local variables within the
    block.


    We’ll delve into each of these variable types in greater detail.


    Local Variables


    Local variables are declared in the same scope as the block. Let’s take a look
    at this example, which is part of *14.06 More Typedefs*:


    typedef double (^MKSampleMultiplyBlockRef)(void);


    double a = 10, b = 20;


    MKSampleMultiplyBlockRef multiply = ^(void){ return a * b; };


    NSLog(@"%f", multiply());


    a = 20;


    b = 50;


    // what do you think it will print?


    NSLog(@"%f", multiply());


    What do you think the second NSLog statement will print? Anyone guess 1000? As
    Alex Trebek would say, “Sorry, no.” Why? Because the variables are local, the
    block will copy them and save their states at the time of the block’s definition.
    So in this case, the NSLog will print 200.


    Global Variables


    In our local variables example in the preceding section, we said that the variables
    had the same scope as the block. You can mark the variables as static (global)
    to get them to behave the way you probably expected them to.


    static double a = 10, b = 20;


    MKSampleMultiplyBlockRef multiply = ^(void){ return a * b; };


    NSLog(@"%f", multiply());


    a = 20;


    b = 50;


    NSLog(@"%f", multiply());


    Parameter Variables


    Parameter variables in a block act just like parameter variables passed to a function.


    typedef double (^MKSampleMultiply2BlockRef)(double c, double d);


    MKSampleMultiply2BlockRef multiply2 = ^(double c, double d) { return c * d; };


    NSLog(@"%f, %f", multiply2(4, 5), multiply2(5, 2));


    *__block* Variables


    Local variables are captured as constants within blocks. If you want to be able
    to modify their values, you must declare them as mutable. So, for example, the
    following code will fail to compile:


    double c = 3;


    MKSampleMultiplyBlockRef multiply = ^(double a, double b) { c = a * b; };


    The compiler will yell at you with this error:


    Variable is not assignable (missing __block type specifier)


    To fix the compilation error, you need to mark variable c as __block, as suggested
    by that friendly compiler message above (see *14.07 Mutable Variables*):


    __block double c = 3;


    MKSampleMultiplyBlockRef multiply = ^(double a, double b)


    { c = a * b; };


    Some variables can’t be declared as __block. These restrictions apply:


    *   ![image](images/9781430241881_square_fmt.jpg)  No variable-length arrays

    *   ![image](images/9781430241881_square_fmt.jpg)  No structures that contain
    variable-length arrays


    Block Local Variables


    These variables act the same as local variables within functions.


    void (^MKSampleBlockRef)(void) = ^(void){


    double a = 4;


    double c = 2;


    NSLog(@"%f", a * c);


    };


    MKSampleBlockRef();


    Objective-C Objects


    Blocks are first-class citizens in Objective-C, which means you can treat them
    like you would any other objects. The biggest issue you will run into when using
    blocks is likely to be memory management. As we just discussed, you have to be
    careful when accessing Objective-C objects from within blocks. As always, there
    are rules to help you with memory management:'
  trans: "\n“给我看代码，”你说？代码来了（你可以在 *14.01 Square* 中找到这段代码）：\n\n```\nint (^square_block)(int\
    \ number) =\n^(int number) {return (number * number);};\nint result = square_block(5);\n\
    printf(\"Result = %d\\n\", result);\n```\n\n这个特定的 block 接收一个整数并返回该数字的平方。等号前面部分是\
    \ block 定义，等号后面部分是实现。我们可以一般性地表述如下：\n\n```\n<returntype> (^blockname)(list of arguments)\
    \ = ^(arguments){ body; };\n```\n\n编译器会推断 block 字面量的返回类型，因此你可以省略它。如果 block 没有参数，你也可以省略它们。所以\
    \ block 通常可以非常紧凑简洁，就像下面这个来自 *14.02 Hello Blocks* 的例子：\n\n```\nvoid (^theBlock)()\
    \ = ^{ printf(\"Hello Blocks!\\n\"); };\n```\n\n## 使用 Block\n\n由于你将 block 声明为一个变量，你可以像使用函数一样使用它，正如你在\
    \ *14.01 Square* 中所见：\n\n```\nint result = square_block(5);\n```\n\n毫无疑问，你注意到这行代码中没有脱字符。这是因为只有在**定义**\
    \ block 时才使用脱字符，而不是在**调用**它时。\n\nBlock 还有一个很酷的特性，可能会让你愿意用它来代替函数：它们可以访问与 block\
    \ 在同一（局部）作用域中声明的变量。这意味着，在 block 创建时可用的任何变量都可以被访问：\n\n```\nint value = 6;\nint\
    \ (^multiply_block)(int number) = ^(int number)\n{return (value * number);};\n\
    int result = multiply_block(7);\nprintf(\"Result = %d\\n\", result);\n```\n\n\
    ## 直接使用 Block\n\n当你想要使用 block 时，大多数情况下你不需要创建 block 变量。相反，你通常直接在代码中内联创建一个 block\
    \ 实例。通常，你需要一个将 block 作为参数的方法或函数（参见以下来自 *14.04 Sorting Array* 的代码）。\n\n```\nNSArray\
    \ *array = [NSArray arrayWithObjects:\n@\"Amir\", @\"Mishal\", @\"Irrum\", @\"\
