  raw: 'Coming next is key-value coding, which lets you interact with your objects
    on a higher plane of abstraction.


    Chapter 18


    Key-Value Coding


    One idea we keep coming back to is indirection. Many programming techniques are
    based on indirection, including this whole object-oriented programming business.
    In this chapter, we’ll look at another indirection mechanism. This is not an Objective-C
    language feature, but one provided by Cocoa.


    So far, we’ve been changing an object’s state directly by calling methods directly
    or via a property’s dot-notation or by setting instance variables. Key-value coding,
    affectionately known as KVC to its friends, is a way of changing an object’s state
    indirectly, by using strings to describe what piece of object state to change.
    This chapter is all about key-value coding.


    Some of the more advanced Cocoa features, like Core Data and Cocoa Bindings (which
    we’ll not talk about in this book), use KVC as cogs in their fundamental machinery.


    A Starter Project


    We’ll be working with our old friend CarParts again. Check out the project called
    *18.01

    Car-Value-Coding* for the goodies. To get things rolling, we’ve added some attributes
    to the Car class, like the make and model, to play around with. We renamed appellation
    back to name to make things more uniform:


    @interface Car : NSObject <NSCopying>


    {


    NSString *name;


    NSMutableArray *tires;


    Engine *engine;


    NSString *make;


    NSString *model;


    int modelYear;


    int numberOfDoors;


    float mileage;


    }


    @property (readwrite, copy) NSString *name;


    @property (readwrite, retain) Engine *engine;


    @property (readwrite, copy) NSString *make;


    @property (readwrite, copy) NSString *model;


    @property (readwrite) int modelYear;


    @property (readwrite) int numberOfDoors;


    @property (readwrite) float mileage;


    …


    @end // Car


    And we’ve added the @synthesize directives so that the compiler will automatically
    generate the setter and getter methods:


    @implementation Car


    @synthesize name;


    @synthesize engine;


    @synthesize make;


    @synthesize model;


    @synthesize modelYear;


    @synthesize numberOfDoors;


    @synthesize mileage;


    We’ve also updated the -copyWithZone method to move the new attributes over:


    - (id) copyWithZone: (NSZone *) zone


    {


    Car *carCopy;


    carCopy = [[[self class]allocWithZone: zone] init];


    carCopy.name = name;


    carCopy.make = make;


    carCopy.model = model;


    carCopy.numberOfDoors = numberOfDoors;


    carCopy.mileage = mileage;


    // plus copying tires and engine, code in [Chapter 13](#9781430241881_Ch13.xhtml).


    And we changed the -description to print out these new attributes and to leave
    out the Engine and Tire printing:


    - (NSString *) description


    {


    NSString *desc;


    desc = [NSString stringWithFormat:


    @"%@, a %d %@ %@, has %d doors, %.1f miles, and %d tires.", name, modelYear, make,
    model, numberOfDoors, mileage, [tires count]];


    return desc;


    } // description


    Finally, in main, we’ll set these properties for the car and print them out. We’ve
    also used autorelease along with the alloc and init so that all memory management
    is kept in one place.


    int main (int argc, const char * argv[])


    {


    @autoreleasepool


    {


    Car *car = [[[Car alloc] init] autorelease];


    car.name = @"Herbie";


    car.make = @"Honda";


    car.model = @"CRX";


    car.numberOfDoors = 2;


    car.modelYear = 1984;


    car.mileage = 110000;


    int i;


    for (i = 0; i < 4; i++)


    {


    AllWeatherRadial *tire;


    tire = [[AllWeatherRadial alloc] init];


    [car setTire: tire atIndex: i];


    [tire release];


    }


    Slant6 *engine = [[[Slant6 alloc] init] autorelease];


    car.engine = engine;


    NSLog (@"Car is %@", car);


    }


    return (0);


    } // main


    After running the program, you get a line like this:


    Car is Herbie, a 1984 Honda CRX, has 2 doors, 110000.0 miles, and 4 tires.


    Introducing KVC


    The fundamental calls in key-value coding are -valueForKey: and -setValue:forKey:.
    You send the message to an object and pass in a string, which is the key for the
    attribute of interest.


    So, we can ask for the name of the car:


    NSString *name = [car valueForKey:@"name"];


    NSLog (@"%@", name);


    This gives us Herbie. Likewise, we can get the make:


    NSLog (@"make is %@", [car valueForKey:@"make"]);'
