    drawing an egg at (15 18 37 29) in blue


    This all seems pretty simple and straightforward, right? When you use procedural
    programming, you spend your time connecting data with the functions designed to
    deal with that type of data. You have to be careful to use the right function
    for each data type: for example, you must call drawRectangle() for a shape of
    type kRectangle. It’s disappointingly easy to pass a rectangle to a function meant
    to work with circles.


    Another problem with coding like this is that it can make extending and maintaining
    the program difficult. To illustrate, let’s enhance Shapes-Procedural to add a
    new kind of shape: a triangle. You can find the modified program in the *03.09
    Shapes-Procedural-2* project. We have to modify the program in at least four different
    places to accomplish this task.


    First, we’ll add a kTriangle constant to the ShapeType enum:


    typedef enum {


    kCircle,


    kRectangle,


    kEgg,


    kTriangle


    } ShapeType;


    Then, we’ll implement a drawTriangle() function that looks just like its siblings:


    void drawTriangle (ShapeRect bounds,


    ShapeColor fillColor)


    {


    NSLog (@"drawing triangle at (%d %d %d %d) in %@",


    bounds.x, bounds.y,


    bounds.width, bounds.height,


    colorName(fillColor));


    } // drawTriangle


    Next, we’ll add a new case to the switch statement in drawShapes(). This will
    test for kTriangle and will call drawTriangle() if appropriate:


    void drawShapes (Shape shapes[], int count)


    {


    for (int i = 0; i < count; i++) {


    switch (shapes[i].type) {


    case kCircle:


    drawCircle (shapes[i].bounds, shapes[i].fillColor);


    break;


    case kRectangle:


    drawRectangle (shapes[i].bounds, shapes[i].fillColor);


    break;


    case kEgg:


    drawEgg (shapes[i].bounds, shapes[i].fillColor);


    break;


    case kTriangle:


    drawTriangle (shapes[i].bounds, shapes[i].fillColor);


    break;


    }


    }


    } // drawShapes


    Finally, we’ll add a triangle to the shapes array. Don’t forget to increase the
    number of shapes in the shapes array:


    int main (int argc, const char * argv[])


    {


    Shape shapes[4];


    ShapeRect rect0 = { 0, 0, 10, 30 };


    shapes[0].type = kCircle;


    shapes[0].fillColor = kRedColor;


    shapes[0].bounds = rect0;


    ShapeRect rect1 = { 30, 40, 50, 60 };


    shapes[1].type = kRectangle;


    shapes[1].fillColor = kGreenColor;


    shapes[1].bounds = rect1;


    ShapeRect rect2 = { 15, 18, 37, 29 };


    shapes[2].type = kEgg;


    shapes[2].fillColor = kBlueColor;


    shapes[2].bounds = rect2;


    ShapeRect rect3 = { 47, 32, 80, 50 };


    shapes[3].type = kTriangle;


    shapes[3].fillColor = kRedColor;


    shapes[3].bounds = rect3;


    drawShapes (shapes, 4);


    return (0);


    } // main


    OK, let’s take a look at Shapes-Procedural-2 in action:


    drawing a circle at (0 0 10 30) in red


    drawing a rectangle at (30 40 50 60) in green


    drawing an egg at (15 18 37 29) in blue


    drawing a triangle at (47 32 80 50) in red


    Adding support for triangles wasn’t too bad, but our little program only does
    one kind of action—drawing shapes (or at least, printing out text about drawing
    shapes). The more complex the program, the trickier it is to extend. For example,
    let’s say the program does more messing around with shapes; suppose it computes
    their areas and determines if the mouse pointer lies within them. In that case,
    you’ll have to modify every function that performs an action on shapes, touching
    code that has been working perfectly and possibly introducing errors.


    Here’s another scenario that’s fraught with peril: adding a new shape that needs
    more information to describe it. For example, a rounded rectangle needs information
    none of our other shapes has needed: the radius of its rounded corners. To support
    rounded rectangles, you could add a radius field to the Shape structure, which
    is a waste of space, because the field won’t be used by other shapes, or you could
    use a C union to overlay different data layouts in the same structure, which complicates
    things by making all shapes dig into the union to get to their interesting data.


    OOP addresses these problems elegantly. As we teach our program to use OOP, we’ll
    see how OOP handles the first problem, modifying already-working code to add new
    kinds of shapes.


    Implementing Object Orientation


    Procedural programs are based on functions. The data orbits around the functions.
    Object orientation reverses this point of view, placing a program’s data at the
    center, with the functions orbiting around the data. Instead of focusing on functions
    in your programs, you concentrate on the data.


    That sounds interesting, but how does it work? In OOP, data contains references
    to the code that operates on it, using indirection. Rather than telling the drawRectangle()
    function to “go draw a rectangle using this shape structure,” you instead ask
    a rectangle to “go draw yourself” (gosh, that sounds rude, but it’s really not).
    Through the magic of indirection, the rectangle’s data knows how to find the function
    that will perform the drawing.


    So what exactly is an object? It’s nothing more than a fancy C struct that has
    the ability to find code it’s associated with, usually via a function pointer.
    [Figure 3-4](#9781430241881_Ch3.xhtml#_FIG4) shows four Shape objects: two rectangles,
    a circle, and an egg. Each object is able to find a function to do its drawing.


    ![9781430241881_Fig03-04.eps](images/9781430241881_Fig03-04_fmt.jpg)


    [Figure 3-4](#9781430241881_Ch3.xhtml#FIG4). Basic Shape objects


    Each object has its own draw() function that knows how to “draw” its specific
    shape. For example, a Circle object’s draw() knows to draw a circle. A Rectangle’s
    draw() knows to draw a rectangle.


    The Shapes-Object program (available at *03.10 -Shapes-Object*) does the same
    stuff as Shapes-Procedural but uses Objective-C’s object-oriented features to
    do it. Here’s drawShapes() from Shapes-Object:


    void drawShapes (id shapes[], int count)


    {


    for (int i = 0; i < count; i++) {


    id shape = shapes[i];


    [shape draw];


    }


    } // drawShapes


    This function contains a loop that looks at each shape in the array. In the loop,
    the program tells the shape to draw itself.


    Notice the differences between this version of drawShapes() and the original.
    For one thing, this one is a lot shorter! The code doesn’t have to ask each individual
    shape what kind it is.


    Another change is shapes[], the first argument to the function: it’s now an array
    of id objects. What is an id? Is it a psychological term referring to the part
    of the mind in which innate instinctive impulses and primary processes are manifest?
    Not in this case: it stands for **identifier**, and it’s pronounced “eye dee.”
    An id is a generic type that’s used to refer to any kind of object. Recall that
    an object is just a C struct with some code attached, so an id is actually a pointer
    to one of these structures; in this case, the structures make various kinds of
    shapes.


    The third change to drawShapes() is the body of the loop:


    id shape = shapes[i];


    [shape draw];


    The first line looks like ordinary C. The code gets the id—that is, a pointer
    to an object— from the shapes array and sticks it into the variable named shape,
    which has the type id. This is

    just a pointer assignment: it doesn’t actually copy the entire contents of the
    shape. Take a

    look at [Figure 3-5](#9781430241881_Ch3.xhtml#_FIG5) to see the various shapes
    available in Shapes-Object. shapes[0] is a pointer to the red circle; shapes[1]
    is a pointer to a green rectangle; and shapes[2] is a pointer to a

    blue egg.


    ![9781430241881_Fig03-05.eps](images/9781430241881_Fig03-05_fmt.jpg)


    [Figure 3-5](#9781430241881_Ch3.xhtml#FIG5). The shapes array


    Now we’ve come to the last line of code in the function:


    [shape draw];'
