    NSEnumerator *enumerator = [array objectEnumerator];


    There’s also a reverseObjectEnumerator method if you want to walk the collection
    from back to front. !looC


    After you get an enumerator, you crank up a while loop that asks the enumerator
    for its nextObject every time through the loop:


    - (id) nextObject;


    When nextObject returns nil, the loop is done. This is another reason why you
    can’t store nil values in the array: there’s no way to tell whether a nil result
    was a value stored in the array or the nil that signals the end of the loop.


    The whole loop then looks like this:


    NSEnumerator *enumerator = [array objectEnumerator];


    while (id thingie = [enumerator nextObject])


    {


    NSLog (@"I found %@", thingie);


    }


    There’s one gotcha if you’re enumerating over a mutable array: you can’t change
    the container, such as by adding or removing objects. If you do, the enumerator
    will become confused, and you’ll get undefined results. “Undefined results” can
    mean anything from “Hey, it seems to have worked!” to “Oops, it crashed my program.”


    Fast Enumeration


    Apple introduced a number of small tweaks to Objective-C as it boosted the language
    version to 2.0\. The first of these tweaks we’ll examine is called **fast enumeration**,
    and it uses syntax familiar to users of scripting languages. Here’s what it looks
    like:


    for (NSString *string in array)


    {


    NSLog (@"I found %@", string);


    }


    The body of the loop will spin for each element in the array, with the variable
    string holding each array value. It’s much more concise than the enumerator syntax
    and much faster.


    Like all the Objective-C 2.0 features, this is not available on Macs running very
    old system software (pre-Mac OS X 10.5 Leopard). If you or your users need to
    run your programs on a system that does not support Objective-C 2.0 or later,
    you can’t use this new syntax. Bummer – but at this point, very unlikely too.


    The latest release of the Apple compiler (based on the Clang and LLVM projects)
    adds a feature called **blocks** to the base C language. We will discuss blocks
    at length in [Chapter 14](#9781430241881_Ch14.xhtml). To support the blocks feature,
    Apple has added a method to enumerate objects in NSArray using blocks, and it
    looks like this.


    - (void)enumerateObjectsUsingBlock:(void (^)(id obj, NSUInteger idx, BOOL *stop))block


    Whoa! What the heck is that? You’re probably thinking you don’t even know how
    to read it, let alone use it. Well, don’t worry. It’s much simpler than it looks.
    Using the previous array, we can rewrite the preceding code as:


    [array enumerateObjectsUsingBlock:^(NSString *string, NSUInteger index, BOOL *stop)
    {


    NSLog (@"I found %@", string);


    }];


    Now, the question is, “Why would we use this instead of fast enumeration?” With
    blocks, one of the options is that the loop can execute in parallel. With fast
    enumeration, execution proceeds through the items linearly.


    OK, so now we have four ways to iterate through an array: by index, with NSEnumerator,
    with fast enumeration, and now with blocks. Which one do you use?


    If you don’t have to worry about running on ancient, pre-10.5 systems, use fast
    enumeration or blocks. They are more succinct and much faster. What’s more, blocks
    are only available with the Apple LLVM compiler.


    In the unlikely event that you need to support Mac OS X 10.4 Tiger or earlier,
    go the NSEnumerator way. Xcode includes a refactoring to convert code to Objective-C
    2.0 and will automatically convert NSEnumerator loops into fast enumeration.


    Only use -objectAtIndex if you really need to access things by index, like if
    you’re skipping around the array (for example, accessing every third object in
    it) or if you are iterating through multiple arrays at the same time.


    NSDictionary


    No doubt you’ve heard of dictionaries. Maybe you even use one occasionally. In
    programming, a **dictionary** is a collection of keywords and their definitions.
    Cocoa has a collection class called NSDictionary that performs these duties. An
    NSDictionary stores a value (which can be any kind of Objective-C object) under
    a given key (usually an NSString). You can then use that key to look up the corresponding
    value. So, for example, if you have an NSDictionary that stores all the contact
    information for a person, you can ask that dictionary “Give me the value for the
    key home-address.” Or say, “Give me the value for the key email-address.”'
  trans: "\n```objc\nNSArray *chunks = [string componentsSeparatedByString: @\":\"\
    ];\n```\n\n要将一个 `NSArray` 连接起来并创建其内容的字符串，可以使用 `componentsJoinedByString:`：\n```objc\n\
    string = [chunks componentsJoinedByString: @\" :- ) \"];\n```\n上面这行代码会生成一个 `NSString`，其内容为\
    \ `\"oop :- ) ack :- ) bork :- ) greeble :- ) ponies\"`。\n\n## 可变数组\n\n和 `NSString`\
    \ 一样，`NSArray` 创建的是不可变对象。一旦你创建了一个包含特定数量对象的数组，该数组就固定了：你无法添加或移除任何成员。当然，数组中所包含的对象本身可以自由变化（比如一辆`Car`在安全检测不合格后换上一套新的`Tires`），但数组对象本身将永远保持不变。\n\
    \n作为 `NSArray` 的补充，`NSMutableArray` 允许我们随时添加和移除对象。它使用一个类方法 `arrayWithCapacity`\
    \ 来创建新的可变数组：\n```objc\n+ (id) arrayWithCapacity: (NSUInteger) numItems;\n```\n\
    就像 `NSMutableString` 的 `stringWithCapacity:` 一样，数组的容量只是一个关于其最终大小的提示。该容量值的存在是为了让\
    \ Cocoa 能够在代码中执行一些优化。Cocoa 不会预先用对象填充数组，也不会用容量值来限制数组。你可以这样创建一个新的可变数组：\n```objc\n\
    NSMutableArray *array = [NSMutableArray arrayWithCapacity: 17];\n```\n\n使用 `addObject:`\
    \ 将对象添加到数组的末尾。\n```objc\n- (void) addObject: (id) anObject;\n```\n你可以通过一个像这样的循环将四个轮胎添加到数组中：\n\
    ```objc\nfor (NSInteger i = 0; i < 4; i++)\n{\n    Tire *tire = [Tire new];\n\
    \    [array addObject: tire];\n}\n```\n\n你可以移除特定索引处的对象。例如，如果你不喜欢第二个轮胎，可以使用 `removeObjectAtIndex:`\
    \ 将其删除。该方法的定义如下：\n```objc\n- (void) removeObjectAtIndex: (NSUInteger) index;\n\
    ```\n你可以这样使用它：\n```objc\n[array removeObjectAtIndex:1];\n```\n注意第二个轮胎位于索引 1。`NSArray`\
    \ 对象像 C 数组一样，是从零开始索引的。\n\n现在还剩三个轮胎。移除对象后数组中不会留下空洞。被移除对象之后的所有数组元素都会向前移动来填补这个空缺。\n\
    \n可变数组的其他方法还能实现很多很酷的功能，比如在特定索引处插入对象、替换对象、对数组进行排序，以及 `NSArray` 作为父类提供的所有好功能。\n\n\
    **注意** 没有用于创建 `NSMutableArray` 对象的字面量语法。\n\n## 枚举天地\n\n对数组的每个元素执行操作是 `NSArray`\
    \ 的常见操作。例如，如果你非常喜欢绿色，你可以让数组中的所有形状将颜色改为绿色。或者，在构建你的匹兹堡驾驶模拟器时，为了使模拟更逼真，你可能想让车里的每个轮胎都漏气。你可以编写一个从\
    \ `0` 到 `[array count]` 的循环来获取索引处的对象，也可以使用 `NSEnumerator`，这是 Cocoa 描述这种集合迭代方式的方法。要使用\
    \ `NSEnumerator`，你需要通过 `objectEnumerator` 向数组请求枚举器：\n```objc\n- (NSEnumerator\
    \ *)objectEnumerator;\n```\n你可以这样使用该方法：\n```objc\nNSEnumerator *enumerator = [array\
    \ objectEnumerator];\n```\n此外还有一个 `reverseObjectEnumerator` 方法，如果你想从后往前遍历集合的话。\n\
    \n获取枚举器后，你启动一个 `while` 循环，每次循环时向枚举器请求其 `nextObject`：\n```objc\n- (id) nextObject;\n\
    ```\n当 `nextObject` 返回 `nil` 时，循环结束。这也是你不能在数组中存储 `nil` 值的另一个原因：无法区分 `nil` 结果是数组中存储的值，还是表示循环结束的\
    \ `nil`。\n\n整个循环如下所示：\n```objc\nNSEnumerator *enumerator = [array objectEnumerator];\n\
    while (id thingie = [enumerator nextObject])\n{\n    NSLog (@\"I found %@\", thingie);\n\
    }\n```\n若你在枚举一个可变数组，有一个陷阱：你不能修改这个容器，比如添加或移除对象。如果你这样做了，枚举器会变得混乱，你会得到未定义的结果。“未定义结果”可能意味着从“嘿，好像成功了！”到“哎呀，它让我的程序崩溃了”的任意情况。\n\
    \n## 快速枚举\n\n苹果在将 Objective-C 语言版本提升到 2.0 时，引入了一些小的改进。我们将看到的第一个改进叫做**快速枚举**，它使用了脚本语言用户熟悉的语法。它的样子如下：\n\
    ```objc\nfor (NSString *string in array)\n{\n    NSLog (@\"I found %@\", string);\n\
    }\n```\n循环体会为数组中的每个元素执行一次，变量 `string` 持有每个数组的值。这比枚举器语法简洁得多，速度也快得多。\n\n像所有 Objective-C\
    \ 2.0 的特性一样，这在运行非常旧系统软件（Mac OS X 10.5 Leopard 之前的版本）的 Mac 上不可用。如果你或你的用户需要在不支持\
    \ Objective-C 2.0 或更高版本的系统上运行程序，你就不能使用这个新语法。真可惜——不过到了现在，这种情况也不太可能发生了。\n\n苹果编译器的最新版本（基于\
    \ Clang 和 LLVM 项目）为基础 C 语言增加了一个叫做**块**的特性。我们将在第 14 章中详细讨论块。为了支持块特性，苹果在 `NSArray`\
    \ 中添加了一个使用块来枚举对象的方法，如下所示：\n```objc\n- (void)enumerateObjectsUsingBlock:(void (^)(id\
    \ obj, NSUInteger idx, BOOL *stop))block\n```\n哇！这到底是什么鬼？你可能觉得你连怎么读它都不知道，更别提使用了。别担心，这比它看起来要简单得多。使用之前的数组，我们可以将前面的代码重写为：\n\
    ```objc\n[array enumerateObjectsUsingBlock:^(NSString *string, NSUInteger index,\
    \ BOOL *stop) {\n    NSLog (@\"I found %@\", string);\n}];\n```\n现在，问题是，“为什么我们要用它来代替快速枚举？”使用块的一个好处是，循环可以并行执行。而使用快速枚举时，执行是按顺序逐个元素进行的。\n\
    \n好了，现在我们有了四种遍历数组的方法：按索引、使用 `NSEnumerator`、使用快速枚举，以及使用块。你该用哪一种呢？\n\n如果你不必担心在古老的、10.5\
    \ 之前的系统上运行，那就使用快速枚举或块。它们更简洁，速度也快得多。此外，块只在苹果的 LLVM 编译器上可用。\n\n在不寻常的情况下，如果你需要支持\
    \ Mac OS X 10.4 Tiger 或更早版本，那就采用 `NSEnumerator` 方式。Xcode 提供了一个重构功能，可以将代码转换为 Objective-C\
    \ 2.0，并且会自动将 `NSEnumerator` 循环转换为快速枚举。\n\n只有在你确实需要按索引访问元素时，才使用 `-objectAtIndex:`，比如你在数组中跳跃式访问（例如，访问每隔两个的元素）或者同时遍历多个数组的情况。\n\
    \n## NSDictionary\n\n毫无疑问你听说过字典。也许你偶尔还会用一下。在编程中，**字典**是关键词及其定义的集合。Cocoa 有一个名为\
    \ `NSDictionary` 的集合类来执行这些任务。一个 `NSDictionary` 在给定的键（通常是 `NSString`）下存储一个值（可以是任意类型的\
    \ Objective-C 对象）。然后你可以使用该键来查找对应的值。例如，如果你有一个 `NSDictionary` 存储了一个人的所有联系信息，你可以问这个字典：“把键\
    \ `home-address` 对应的值给我。”或者“把键 `email-address` 对应的值给我。”\n"
- fmt: "**Note**：为什么不用数组然后查看数组里的值呢？字典（也称为哈希表或关联数组）使用一种针对键查找而优化的存储机制。字典不是扫描整个数组来寻找某个项目，而是能立即找到它要的数据。对于频繁的查找和大数据集，字典的速度可以比数组快几百倍。这，真的很快。\n\
    \n正如你可能猜到的，`NSDictionary` 和 `NSString`、`NSArray` 一样，是一个不可变对象。不过，`NSMutableDictionary`\
    \ 类允许你随意添加和删除内容。要创建一个新的 `NSDictionary`，你需要在创建时提供字典中所有的对象和键。\n\n使用字典最简便的方法是使用字典字面量语法，它类似于类方法\
    \ `dictionaryWithObjectsAndKeys:`。\n\n字面量语法定义为 `@{key:value,…};`。请注意，它使用的是花括号而不是方括号。还要注意，`dictionaryWithObjectsAndKeys:`\
    \ 使用对象后跟键，但字面量语法是相反的：键在前，值在后。每个键值对由冒号分隔，每个键值对之间由逗号分隔。\n\n```\n+ (id) dictionaryWithObjectsAndKeys:\
    \ (id) firstObject, …;\n```\n\n这个方法接受交替的对象和键序列，以 `nil` 值结束（正如你可能想到的，你不能在 `NSDictionary`\
    \ 中存储 `nil` 值，而且你可能也猜到了，使用字面量语法时不需要 `nil`）。假设我们想创建一个字典，用人类可读的标签而不是数组中任意的索引来存放我们汽车的轮胎。你可以像这样创建这样一个字典：\n\
    \n```\nTire *t1 = [Tire new];\nTire *t2 = [Tire new];\nTire *t3 = [Tire new];\n\
    Tire *t4 = [Tire new];\n\nNSDictionary *tires = [NSDictionary dictionaryWithObjectsAndKeys:\
    \ t1,\n    @\"front-left\", t2, @\"front-right\", t3, @\"back-left\", t4, @\"\
    back-right\", nil];\n```\n\n或\n\n```\nNSDictionary *tires = @{@\"front-left\"\
    \ : t1, @\"front-right\" : t2, @\"back-left\" : t3,\n    @\"back-right\" : t4};\n\
    ```\n\n要访问字典中的值，请使用 `objectForKey:` 方法，给它传入你之前存储值所用的键：\n\n```\n- (id) objectForKey:\
    \ (id) aKey;\n```\n\n或\n\n```\ntires[key];\n```\n\n因此，要找到右后轮胎，你可以这样做：\n\n```\n\
    Tire *tire = [tires objectForKey:@\"back-right\"];\n```\n\n或\n\n```\nTire *tire\
    \ = tires[@\"back-right\"];\n```\n\n如果字典里没有右后轮胎（比如它是一辆奇特的三轮车），字典会返回 `nil`。\n\n\
    要创建一个新的 `NSMutableDictionary`，请向 `NSMutableDictionary` 类发送 `dictionary` 消息。你也可以通过使用\
    \ `dictionaryWithCapacity:` 创建一个新的可变字典，并给 Cocoa 一个关于其最终大小的提示（你有没有开始注意到 Cocoa 有一个非常规则的命名系统？）。\n\
    \n```\n+ (id) dictionaryWithCapacity: (NSUInteger) numItems;\n```\n\n正如我们之前对 `NSMutableString`\
    \ 和 `NSMutableArray` 所说的，这个容量只是一个提示，而不是字典大小的限制。你可以使用 `setObject:forKey:` 向字典添加内容。\n\
    \n```\n- (void)setObject:(id)anObject forKey:(id)aKey;\n```\n\n这是创建存放轮胎的字典的另一种方法：\n\
    \n```\nNSMutableDictionary *tires = [NSMutableDictionary dictionary];\n[tires\
    \ setObject:t1 forKey:@\"front-left\"];\n[tires setObject:t2 forKey:@\"front-right\"\
    ];\n[tires setObject:t3 forKey:@\"back-left\"];\n[tires setObject:t4 forKey:@\"\
    back-right\"];\n```\n\n如果你对一个已经存在的键使用 `setObject:forKey:`，它会用新值替换旧值。如果你想从可变字典中删除一个键，请使用\
    \ `removeObjectForKey:` 方法：\n\n```\n- (void) removeObjectForKey: (id) aKey;\n\
    ```\n\n所以，如果我们想模拟一个轮胎掉下来，我们可以直接移除它：\n\n```\n[tires removeObjectForKey:@\"back-left\"\
    ];\n```\n\n就像 `NSArray` 一样，`NSMutableDictionary` 没有字面量语法。\n\n**使用但不要扩展**\n\n因为你富有创造力，你可能会想创建\
    \ `NSString`、`NSArray` 或 `NSDictionary` 的子类。抵制住这种冲动。在某些语言中，你最终确实会通过子类化字符串和数组类来完成工作。但在\
    \ Cocoa 中，许多类实际上是作为**类集群**实现的，这是一系列隐藏在通用接口背后的特定于实现的类。当你创建一个 `NSString` 对象时，你最终得到的可能是一个\
    \ `NSLiteralString`、`NSCFString`、`NSSimpleCString`、`NSBallOfString` 或任何数量的未文档化的实现细节对象。\n\
    \n作为 `NSString` 或 `NSArray` 的用户，你不必关心底层使用的是哪个类。但是，尝试对类集群进行子类化是一件充满痛苦和挫败感的事情。与其子类化，通常你可以通过将\
    \ `NSString` 或 `NSArray` 组合到你的一个类中，或者使用类别（如[第12章](#9781430241881_Ch12.xhtml)所述）来解决此类编程问题。\n\
    \n**家族价值观**\n\n`NSArray` 和 `NSDictionary` 只持有对象。它们不能直接包含任何原始类型，比如 `int`、`float`\
    \ 或 `struct`。但是你可以使用嵌入了原始值的对象。例如，将一个 `int` 放入一个对象，然后将该对象放入 `NSArray` 或 `NSDictionary`。\n\
    \n如果你想要为基本类型使用对象，你可以使用 `NSInteger` 和 `NSUInteger`。这些类型也统一了 32 位和 64 位处理器的值。\n\n\
    **NSNumber**\n\nCocoa 提供了一个名为 `NSNumber` 的类，它**包装**（即，作为对象实现）原始数字类型。你可以使用这些类方法创建一个新的\
    \ `NSNumber`：\n\n```\n+ (NSNumber *) numberWithChar: (char) value;\n+ (NSNumber\
    \ *) numberWithInt: (int) value;\n+ (NSNumber *) numberWithFloat: (float) value;\n\
    + (NSNumber *) numberWithBool: (BOOL) value;\n```\n\n还有更多这样的创建方法，包括无符号版本以及 `long`\
    \ 和 `long long` 整数的变体，但这些是最常见的。\n\n你也可以使用字面量语法来创建这些对象：\n\n```\nNSNumber *number;\n\
    number = @'X';          // char\nnumber = @12345;        // integer\nnumber =\
    \ @12345ul;      // unsigned long\nnumber = @12345ll;      // long long\nnumber\
    \ = @123.45f;      // float\nnumber = @123.45;       // double\nnumber = @YES;\
    \          // BOOL\n```\n\n创建 `NSNumber` 后，你可以将其放入字典或数组中：\n\n```\nNSNumber *number\
    \ = @42;\n[array addObject: number];\n[dictionary setObject: number forKey: @\"\
    Bork\"];\n```\n\n一旦你将原始类型包装在 `NSNumber` 中，你可以使用以下实例方法之一将其取出：\n\n```\n- (char)\
    \ charValue;\n- (int) intValue;\n- (float) floatValue;\n- (BOOL) boolValue;\n\
    - (NSString *)stringValue;\n```\n\n混合使用创建和提取方法完全没问题。例如，使用 `numberWithFloat:` 创建\
    \ `NSNumber` 并使用 `intValue` 获取值是可以的。`NSNumber` 会为你进行适当的转换。\n\n**Note**：将原始类型包装在对象中的过程通常称为装箱，而将原始类型取出称为拆箱。某些语言具有自动装箱功能，可以自动将原始类型转换为其对应的包装类型，反之亦然。Objective-C\
    \ 不支持自动装箱。\n\n**NSValue**\n\n`NSNumber` 实际上是 `NSValue` 的一个子类，后者包装任意值。你可以使用 `NSValue`\
    \ 将结构体放入 `NSArray` 和 `NSDictionary` 对象中。使用以下类方法创建一个新的 `NSValue`：\n\n```\n+ (NSValue\
    \ *) valueWithBytes: (const void *) value objCType: (const char *) type;\n```\n\
    \n你传入要包装的值的地址（例如 `NSSize` 或你自己的 `struct`）。通常，你获取你想保存的变量的地址（使用 C 语言的 `&` 运算符）。你还需要提供一个描述类型的字符串，通常是通过报告结构体中条目的类型和大小。你实际上不需要自己编写代码来构建这个字符串。有一个名为\
    \ `@encode` 的编译器指令，它接受一个类型名称并为你生成正确的魔法字符串。因此，要将 `NSRect` 放入 `NSArray`，你需要这样做：\n\
    \n```\nNSRect rect = NSMakeRect (1, 2, 30, 40);\n```"
  raw: '**Note** Why not just have an array and look at the values inside it? A dictionary
    (which is also known as a hash table or an associative array) uses a storage mechanism
    that’s optimized for key lookups. Rather than scanning an entire array looking
    for an item, the dictionary can immediately put its electronic hands on the data
    it’s after. For frequent lookups and for large data sets, a dictionary can be
    hundreds of times faster than an array. That’s, like, really fast.


    As you can probably guess, NSDictionary, like NSString and NSArray, is an immutable
    object. However, the NSMutableDictionary class lets you add and remove stuff at
    will. To make a new NSDictionary, you supply all the objects and keys that live
    in the dictionary at creation time.


    The easiest way to get started with a dictionary is to use the dictionary literal
    syntax, which is similar to the class method dictionaryWithObjectsAndKeys:.


    The literal syntax is defined as @{key:value,…};. Notice that it uses curly braces
    instead of square brackets. Also note that dictionaryWithObjectsAndKeys: uses
    objects followed by the key, but the literal syntax is reversed: key first, value
    second. Each key value is separated by a colon and each pair is separated by a
    comma.


    + (id) dictionaryWithObjectsAndKeys: (id) firstObject, …;


    This method takes an alternating sequence of objects and keys, terminated by a
    nil value (as you’re probably thinking, you can’t store a nil value in an NSDictionary,
    and you likely guessed that nil is not required when using the literal syntax).
    Let’s say we want to make a dictionary to hold the tires of our car using human-readable
    labels rather than arbitrary indexes in an array. You can create such a dictionary
    like this:


    Tire *t1 = [Tire new];


    Tire *t2 = [Tire new];


    Tire *t3 = [Tire new];


    Tire *t4 = [Tire new];


    NSDictionary *tires = [NSDictionary dictionaryWithObjectsAndKeys: t1,


    @"front-left", t2, @"front-right", t3, @"back-left", t4, @"back-right", nil];


    or


    NSDictionary *tires = @{@"front-left" : ti, @"front-right" : t2, @"back-left"
    : t3,


    @"back-right" : t4};


    To access a value in the dictionary, use the objectForKey: method, giving it the
    key you previously stored the value under:


    - (id) objectForKey: (id) aKey;


    or


    tires[key];


    So, to find the back-right tire, you can do this:


    Tire *tire = [tires objectForKey:@"back-right"];


    or


    Tire *tire = tires[@"back-right"];


    If there’s no back-right tire in the dictionary (if it’s a funky three-wheeler),
    the dictionary returns nil.


    To make a new NSMutableDictionary, send the dictionary message to the NSMutableDictionary
    class. You can also create a new mutable dictionary and give Cocoa a hint of its
    eventual size by using dictionaryWithCapacity: (have you started to notice that
    Cocoa has a very regular naming system?).


    + (id) dictionaryWithCapacity: (NSUInteger) numItems;


    As we mentioned earlier with NSMutableString and NSMutableArray, the capacity
    is just a hint, not a limit to the size of the dictionary. You can add things
    to the dictionary using setObject:forKey:.


    - (void)setObject:(id)anObject forKey:(id)aKey;


    Here’s another way to make the dictionary that holds the tires:


    NSMutableDictionary *tires = [NSMutableDictionary dictionary];


    [tires setObject:tl forKey:@"front-left"];


    [tires setObject:t2 forKey:@"front-right"];


    [tires setObject:t3 forKey:@"back-left"];


    [tires setObject:t4 forKey:@"back-right"];


    If you use setObject:forKey: on a key that’s already there, it replaces the old
    value with the new one. If you want to take a key out of a mutable dictionary,
    use the removeObjectForKey: method:


    - (void) removeObjectForKey: (id) aKey;


    So, if we want to model one of our tires falling off, we can just remove it:


    [tires removeObjectForKey:@"back-left"];


    Just as with NSArrays, there is no literal syntax for NSMutableDictionary.


    Use but Don’t Extend


    Because you’re inventive, you might be tempted to create subclasses of NSString,
    NSArray, or NSDictionary. Resist the urge. In some languages, you do end up subclassing
    string and array classes to get work done. But in Cocoa, many classes are actually
    implemented as **class clusters**, which are a bunch of implementation-specific
    classes hidden behind a common interface. When you make an NSString object, you
    might actually end up getting an NSLiteralString, NSCFString, NSSimpleCString,
    NSBallOfString, or any number of undocumented implementation-detail objects.


    As a user of NSString or NSArray, you don’t have to care which class is being
    used under the hood. But trying to subclass a class cluster is an exercise in
    pain and frustration. Instead of subclassing, you can usually solve such programming
    problems by composing an NSString or NSArray into one of your classes or by using
    categories (described in [Chapter 12](#9781430241881_Ch12.xhtml)).


    Family Values


    NSArrays and NSDictionarys hold only objects. They can’t directly contain any
    primitive types, like int, float, or struct. But you can use objects that embed
    a primitive value. For example, stick an int into an object, and you can then
    put that object into an NSArray or NSDictionary.


    If you want to use objects for basic types, you can use NSInteger and NSUInteger.
    These types also unify values for 32-bit and 64-bit processors.


    NSNumber


    Cocoa provides a class called NSNumber that **wraps** (that is, implements as
    objects) the primitive numeric types. You can create a new NSNumber using these
    class methods:


    + (NSNumber *) numberWithChar: (char) value;


    + (NSNumber *) numberWithInt: (int) value;


    + (NSNumber *) numberWithFloat: (float) value;


    + (NSNumber *) numberWithBool: (BOOL) value;


    There are many more of these creation methods, including unsigned versions and
    varieties for long and long long integers, but these are the most common ones.


    You can also use the literal syntax to create these objects:


    NSNumber *number;


    number = @''X''; // char


    number = @12345; // integer


    number = @12345ul; // unsigned long


    number = @12345ll; // long long


    number = @123.45f; // float


    number = @123.45; // double


    number = @YES; // BOOL


    After you create an NSNumber, you can put it into a dictionary or an array:


    NSNumber *number = @42;


    [array addObject number];


    [dictionary setObject: number forKey: @"Bork"];


    Once you have a primitive type wrapped in an NSNumber, you can get it back out
    using one of these instance methods:


    - (char) charValue;


    - (int) intValue;


    - (float) floatValue;


    - (BOOL) boolValue;


    - (NSString *)stringValue;


    It’s perfectly OK to mix and match the creation and extraction methods. For example,
    it’s all right to create an NSNumber with numberWithFloat: and get the value back
    with intValue. NSNumber will do the proper conversions for you.


    **Note** The wrapping of a primitive type in an object is often called boxing,
    and taking the primitive type out is unboxing. Some languages have an autoboxing
    feature that automatically converts a primitive to its corresponding wrapped type
    and back. Objective-C does not support autoboxing.


    NSValue


    NSNumber is actually a subclass of NSValue, which wraps arbitrary values. You
    can use NSValue to put structures into NSArrays and NSDictionary objects. Create
    a new NSValue using this class method:


    + (NSValue *) valueWithBytes: (const void *) value objCType: (const char *) type;


    You pass the address of the value you want to wrap (such as an NSSize or your
    own struct). Usually, you take the address (using the & operator in C) of the
    variable you want to save. You also supply a string describing the type, usually
    by reporting the types and sizes of the entries in the struct. You don’t actually
    have to write code to build this string yourself. There’s a compiler directive
    called @encode that takes a type name and generates the proper magic for you.
    So, to put an NSRect into an NSArray, you do something like this:


    NSRect rect = NSMakeRect (1, 2, 30, 40);'
