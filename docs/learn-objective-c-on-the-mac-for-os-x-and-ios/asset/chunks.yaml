    这相当奇怪。到底是怎么回事？我们知道 `C` 语言使用方括号来引用数组元素，但这里似乎并未涉及数组操作。在 Objective-C 中，方括号还有另一层含义：它们用于向对象发送指令。方括号内的第一个条目是对象，其余部分是你希望该对象执行的操作。在这个例子中，我们让名为
    `shape` 的对象执行 `draw` 操作。如果 `shape` 是一个圆形，那么一个圆形就会被“绘制”。如果 `shape` 是一个矩形，我们就会得到一个矩形。


    在 Objective-C 中，让对象执行某个操作被称为**发送消息**（尽管有些人也称之为“调用方法”）。代码 `[shape draw]` 将消息 `draw`
    发送给对象 `shape`。`[shape draw]` 的一种读法是“向 shape 发送 draw”。`shape` 具体如何执行绘制操作，取决于 `shape`
    自身的实现。


    当你向对象发送消息时，所需的代码是如何被调用的？这需要在幕后辅助角色（称为**类**）的协助下完成。


    请看一下图 3-6。图的左侧显示，这是 `shapes` 数组中索引为零的圆形对象，它最后一次出现在图 3-2 中。该对象包含一个指向其类的指针。类是一种结构，它描述了如何成为该类的一个对象。在图
    3-3 中，`Circle` 类包含一个指向绘制圆形代码、计算圆形面积代码以及其他必要代码的指针，以便成为一个合格的 `Circle` 对象。


    ![9781430241881_Fig03-06.eps](img/9781430241881_Fig03-06_fmt.jpg)


    图 3-6。圆形及其类


    拥有类对象的意义何在？让每个对象直接指向其代码岂不是更简单？确实，这会更简单，一些面向对象编程系统正是这样做的。但拥有类对象有一个巨大优势：如果你在运行时修改了类，该类的所有对象都会自动应用这些更改（我们将在后续章节中详细讨论这一点）。


    图 3-7 展示了 `draw` 消息如何最终为圆形对象调用正确的函数。


    ![9781430241881_Fig03-07.eps](img/9781430241881_Fig03-07_fmt.jpg)


    图 3-7。圆形找到其绘制代码。


    以下是图 3-4 中所展示的步骤：


    1.  首先检查作为消息目标的对象（此处为红色圆形），找出它属于哪个类。

    2.  该类在其代码中查找 `draw` 函数的位置。

    3.  找到后，执行用于绘制圆形的函数。


    图 3-8 展示了当你对数组中的第二个形状（即绿色矩形）调用 `[shape draw]` 时会发生什么。


    ![9781430241881_Fig03-08.eps](img/9781430241881_Fig03-08_fmt.jpg)


    图 3-8。矩形找到其绘制代码。


    图 3-5 中使用的步骤与上图几乎相同：


    1.  首先检查消息的目标对象（绿色矩形），找出它属于哪个类。

    2.  矩形类在其代码库中查找，获取 `draw` 函数的地址。

    3.  Objective-C 运行用于绘制矩形的代码。


    这个程序展示了非常酷的间接操作！在程序的函数式版本中，我们必须编写代码来决定调用哪个函数。而现在，这个决策由 Objective-C 在幕后做出，它通过询问对象属于哪个类来完成。这降低了调用错误函数的可能性，并使我们的代码更易于维护。


    ## 术语小憩


    在我们深入研究 `Shapes-Object` 程序的其余部分之前，让我们花点时间回顾一些面向对象编程的术语。我们已经讨论过其中一些术语；其他术语则是全新的。


    *   ![image](img/9781430241881_square_fmt.jpg) `类` — **类**是一种表示对象类型的结构。对象通过引用其类来获取关于自身的各种信息，特别是处理每个操作时要运行的代码。简单的程序可能只有少数几个类；中等复杂度的程序可能有几十个类。Objective-C
    的风格建议开发者将类名首字母大写。

    *   ![image](img/9781430241881_square_fmt.jpg) `对象` — **对象**是一种包含值以及指向其类的隐藏指针的结构。运行中的程序通常有成百上千个对象。引用对象的
    Objective-C 变量通常首字母不大写。

    *   ![image](img/9781430241881_square_fmt.jpg) `实例` — **实例**是“对象”的另一种说法。例如，一个圆形对象也可以被称为
    `Circle` 类的一个实例。

    *   ![image](img/9781430241881_square_fmt.jpg) `消息` — **消息**是对象可以执行的一个操作。你通过向对象发送消息来指示它执行某个动作。在
    `[shape draw]` 代码中，`draw` 消息被发送给 `shape` 对象，告诉它绘制自身。当一个对象收到消息时，会查询其类以找到要运行的适当代码。

    *   ![image](img/9781430241881_square_fmt.jpg) `方法` — **方法**是针对消息而运行的代码。同一个消息（例如
    `draw`）可以根据对象的类不同而调用不同的方法。

    *   ![image](img/9781430241881_square_fmt.jpg) `方法调度器` — **方法调度器**是 Objective-C
    用于判断针对特定消息将执行哪个方法的机制。我们将在下一章中深入挖掘 Objective-C 的方法调度机制。


    这些是你阅读本书后续内容所需的关键面向对象编程术语。此外，还有一些通用的编程术语很快就会变得非常重要：


    *   ![image](img/9781430241881_square_fmt.jpg) `接口` — **接口**是对某类对象所提供功能的描述。例如，`Circle`
    类的接口声明了圆形对象可以接受 `draw` 消息。


    **注** 接口的概念并不仅限于面向对象编程。例如，在 `C` 语言中，头文件为标准 I/O 库（通过 `#include <stdio.h>` 获得）和数学库（`#include
    <math.h>`）等库提供了接口。接口不提供实现细节，通常的理念是你无需关心它们。


    *   ![image](img/9781430241881_square_fmt.jpg) `实现` — **实现**是使接口生效的代码。在我们的示例中，圆形对象的实现包含了在屏幕上绘制圆形的代码。当你向圆形对象发送
    `draw` 消息时，你不需要知道也不关心该函数是如何工作的，只需要知道它能在屏幕上绘制一个圆形即可。


    ## Objective-C 中的面向对象编程


    如果你的大脑现在开始感到吃力，这很正常。我们一直在往里面灌输大量新知识，消化所有这些术语和技术需要一些时间。在你的潜意识默默消化前几节内容的同时，让我们来看看
    `Shapes-Object` 程序的其余代码，其中包括一些用于声明类的新语法。


    ### `@interface` 部分


    在创建特定类的对象之前，Objective-C 编译器需要了解该类的一些信息。具体来说，它必须知道对象的数据成员（即该对象的 `C struct` 长什么样）以及它提供了哪些功能。你使用
    `@interface` 指令将这些信息提供给编译器。


    **注** 在 `Shapes-Object` 中，我们把所有内容都放在了它的 *Shapes-Object.m* 文件中。在更大的程序中，你会使用多个文件，为每个类提供自己的一组文件。我们将在第
    6 章探讨组织类和文件的方法。


    以下是 `Circle` 类的接口：


    ```

    @interface Circle : NSObject


    {

    @private

    ShapeColor fillColor;

    ShapeRect bounds;

    }


    - (void) setFillColor: (ShapeColor) fillColor;

    ```

