    你可以看到有很多以“all”开头的选项。Xcode 会识别出当前项目中有一个以“all”开头的符号，并默认将其作为首选。名称旁边的彩色方框标识了符号的类型：E
    代表枚举符号，f 代表函数，`#` 代表 `#define`，m 代表方法，C 代表类，等等。


    你可以输入 `control+.(句号)` 来逐个浏览选项，或者输入 `shift+control+.` 来向后翻页。如果在此过程中没能记住所有这些键盘快捷键，也不必担心。本章末尾提供了一份方便的速查表。


    你可以将补全菜单用作类的快速 API 参考。以 `NSDictionary` 为例，它有一个方法，允许你指定一个参数列表，这些参数代表构建字典的键和对象。是
    `+dictionaryWithKeysAndObjects` 还是 `+dictionaryWithObjectsAndKeys`？谁能记得住？一种简单的查找方法是开始对一个方法进行调用，输入
    `NSDictionary`，然后输入一个空格表示你已完成类名的输入，再按下 escape 键。Xcode 会意识到你将要在此处放置方法名，并显示 `NSDictionary`
    响应的所有方法。果然，在[图 7-7 的菜单底部附近显示了 `dictionaryWithObjectsAndKeys`。


    ![9781430241881_Fig07-07.tif](img/9781430241881_Fig07-07_fmt.jpg)


    图 7-7. 使用代码感知浏览类


    更棒的是，如果你将鼠标悬停在一个方法名称上，会看到每个方法在窗口右侧都有一个小的问号。点击任何方法的问号，就会弹出一个针对该方法的帮助窗口（参见图 7-8）。


    ![9781430241881_Fig07-08.tif](img/9781430241881_Fig07-08_fmt.jpg)


    图 7-8. 在方法的帮助窗口中，文件名是链接；点击其中一个可在新窗口中打开


    有时，当你使用代码补全时，会在补全内容中看到一些奇怪的小方框，如图 7-9 所示。这是怎么回事？


    ![9781430241881_Fig07-09.tif](img/9781430241881_Fig07-09_fmt.jpg)


    图 7-9. 代码补全占位符


    注意，Xcode 建议的是 `-setTire:atlndex:`，它接受两个参数。Xcode 的代码感知功能不仅仅是填写名称。这里显示的两个参数实际上是占位符。如果你再次按
    tab 键，该方法会补全为 `setTire`，如图 7-10 所示。


    ![9781430241881_Fig07-10.tif](img/9781430241881_Fig07-10_fmt.jpg)


    图 7-10. 选择一个占位符


    第一个占位符被高亮显示。输入任何内容即可将其替换为实际参数。你也可以点击第二个占位符并替换它。你甚至不必将手从键盘上移开。只需再次按 tab 键即可移动到下一个占位符。


    ## 亲吻括号


    在输入代码时，你可能会注意到，当你输入某些字符（例如 `)`、`]` 或 `}`）时，屏幕偶尔会轻微闪烁。发生这种情况时，Xcode 会显示与你刚输入的闭合符号相对应的开放符号。在图
    7-11 中，我们正在输入第二行末尾的右括号。当输入完成时，该行前部匹配的左括号会短暂闪烁，并带有彩色背景。


    ![9781430241881_Fig07-11.tif](img/9781430241881_Fig07-11_fmt.jpg)


    图 7-11. 亲吻括号


    此功能有时被称为“亲吻括号”，当你闭合一组复杂的定界符时，它非常方便。确保你输入的每个闭合字符都与期望的开放字符匹配。如果你搞混了，比如在应该输入 `*)`
    时试图输入 `*]*`，Xcode 会发出提示音，并且不会显示这种“亲亲”效果。


    你也可以双击其中一个定界符，Xcode 将会选中该定界符与其成对匹配符号之间的所有代码。


    ## 批量编辑


    有时，你希望在一处代码更改在多个地方生效，但不想逐个编辑每个实例。手动进行大量类似的编辑充满了风险，因为人类通常不擅长枯燥重复的工作。幸运的是，计算机擅长枯燥重复的工作。


    首先介绍的 Xcode 功能并非直接操作代码，而是设置一个安全网。选择 文件 ![image](img/9781430241881_arrow_fmt.jpg)
    创建快照...（或其便捷快捷键 ![image](img/Rangoli1.jpg)`+control+S`），Xcode 将会记住你项目的当前状态。你现在可以自由地编辑源文件，随心所欲地折叠、旋转和修改你的内容。如果之后你意识到犯了大错，可以使用快照窗口（通过文件
    ![image](img/9781430241881_arrow_fmt.jpg) 恢复快照... 访问）从之前的快照中恢复。在进行任何过于冒险的操作前拍照是个好主意。


    **注意** 快照存储在 `~/Library/Developer/Xcode/Snapshots/` 中。


    当然，Xcode 也具备查找和替换功能。编辑 ![image](img/9781430241881_arrow_fmt.jpg) 查找 子菜单包含几个方便的选择。选择在工作区中查找
    (`command+shift+F`)，或选择导航器面板中的搜索选项。此功能让你可以在项目中的文件中进行搜索和替换。图 7-12 展示了项目范围的查找和替换窗口。


    ![9781430241881_Fig07-12.tif](img/9781430241881_Fig07-12_fmt.jpg)


    图 7-12. 项目范围的查找和替换


    假设我们正在考虑将“car”改为“automobile”。在填写空白并点击*查找*后，你会看到存在对 `Car` 类和 `car` 局部变量的引用。你可以点击全部替换以全局进行更改。


    然而，查找和替换功能是进行此类修改的一种生硬工具。如果你只是想重命名函数中的变量，它可能做得太多（因为它可能影响整个文件中的内容）；而如果你想重命名一个类，它又做得不够。具体来说，它不会重命名源文件。


    Xcode 有两个功能来填补这些空白。第一个功能有个优雅的名称“Scope 内全部编辑”。你可以选择一个符号，比如局部变量或参数，然后点击它，其旁边会出现一个下拉菜单箭头。点击箭头查看菜单，然后选择“Scope
    内全部编辑”。然后，在你输入时，该符号的所有出现位置会立即更新。这不仅是进行大量更改的快速方法，而且在操作过程中看起来也相当酷。


    图 7-13 展示了在 scope 内编辑“`car`”。注意每个 `car` 局部变量周围都有一个方框。一旦你开始输入“automobile”，所有方框都会改变，如图
    7-14 所示。


    ![9781430241881_Fig07-13.tif](img/9781430241881_Fig07-13_fmt.jpg)


    图 7-13. 开始通过将 `car` 更改为“automobile”进行 scope 内全部编辑


    ![9781430241881_Fig07-14.tif](img/9781430241881_Fig07-14_fmt.jpg)


    图 7-14. Scope 内全部编辑


    完成后，只需点击源编辑窗口中的其他位置，即可退出“Scope 内全部编辑”模式。


    有时，当你尝试进行此类修改时，会发现“Scope 内全部编辑”菜单项是禁用的。此功能与 Xcode 中的语法着色密切相关，因此如果你关闭了该功能或对其进行了大量修改，“Scope
    内全部编辑”可能无法工作。要解决此问题，请返回偏好设置并再次调整语法着色，直到它生效——这需要一点“玄学”操作。

