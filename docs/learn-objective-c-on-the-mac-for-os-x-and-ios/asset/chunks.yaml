    \ What is it doing? One pointer, `theString`, is an `ROP`, while the other, `CFStringRef`,\
    \ is not. For a happy `ARC` experience, we need to tell the compiler who owns\
    \ the pointer. To do this, we can use a `C` technique called a **bridged cast**.\
    \ This is a standard `C` type cast, but with extra keywords:\n`__bridge`, `__bridge_retained`,\
    \ or `__bridge_transfer`. The term “bridge” refers to the ability to use different\
    \ data types for the same purpose, and not to the thing you feel like jumping\
    \ off of when you’re stuck in a really tricky `ARC` conversion. Here’s a description\
    \ of each of the three types of bridged casts:\n\n-   (`__bridge Type`) *operand*:\
    \ This type of cast transfers a pointer but does not transfer its ownership. In\
    \ our example above, the operand is `theString`, and `Type` is `CFStringRef`.\
    \ When using this keyword, one pointer is an `ROP`, and the other is not. With\
    \ this cast, ownership of the pointer stays with the operand. Here’s how our example\
    \ would look with this case:\n\n```\ncfString = (__bridge CFStringRef)theString;\n\
    ```\n\n`cfString` gets the assignment, but ownership stays with `theString`.\n\
    \n-   (`__bridge_retained Type`) *operand*: In this type, ownership is transferred\
    \ to the non-`ROP`. One pointer is an `ROP`, and the other is not. Because `ARC`\
    \ only takes care of `ROP`, you are responsible for releasing this object when\
    \ you’re done with it. This cast increments the object’s retain count, so you\
    \ have to decrement it, just as with standard old-fashioned memory management.\
    \ Here’s how our example would look:\n\n```\ncfString = (__bridge_retained CFStringRef)theString\n\
    ```\n\nIn this case, `cfString` string owns the pointer and its retain count is\
    \ incremented. You’re responsible for managing it with `retain`/`release`.\n\n\
    -   ![image](images/9781430241881_square_fmt.jpg)  (`__bridge_transfer Type`)\
    \ *operand*: This cast does the opposite of the previous kind; it transfers ownership\
    \ to the `ROP`. In this case, `ARC` owns the object and will ensure it’s released\
    \ like any other `ARC` object.\n\nAnother restriction is that `structs` and `unions`\
    \ can’t have `ROPs` as members, so code like this is not allowed:\n\n```\n// Bad\
    \ code. Do not steal or sell.\nstruct {\n    int32_t foo;\n    char *bar;\n  \
