    Summary


    Key-value coding includes a lot more than we can cover in this chapter, but you
    should now have a solid foundation for exploring other aspects of KVC. You’ve
    seen examples of setting and getting of values with a single key, where KVC looks
    for setter and getter methods to accomplish what you ask. If it can’t find any
    methods, KVC digs directly into an object and changes values.


    You’ve also seen key paths, which are dot-separated keys that specify a path through
    a network of objects. These key paths may look a lot like they’re accessing properties,
    but they are actually very different mechanisms. You can stick various operators
    in a key path to have KVC do extra work on your behalf. Last, we looked at several
    methods you can override to customize corner-case behavior.


    Next up, we''ll have a look at Xcode’s static analyzer.


    Chapter 19


    Using the Static Analyzer


    When you build applications, most compilers can detect code that looks fishy and
    issue a warning, indicating code that might turn into a bug at runtime. In an
    effort to move beyond this kind of warning, a few years ago, Apple added a **static
    analyzer** to Xcode version 3.2\. The static analyzer is a tool that logically
    examines your code without actually running it, looking for errors that can turn
    into bugs. In this chapter, we’ll take a look at how you can use the static analyzer
    to find problems in your code.


    Getting Some Static


    What does the static analyzer do? How does it work? The static analyzer knows
    a lot about how Objective-C programs are supposed to work, then checks your program
    against that knowledge. It doesn’t simply look at your source; it actually moves
    through code paths in your application looking for logical errors and then reports
    those errors to you. You can fix them before you even build and run.


    The static analyzer can spot various kinds of errors:


    *   ![image](images/9781430241881_square_fmt.jpg)  Security problems, such as
    memory leaks and buffer overflows

    *   ![image](images/9781430241881_square_fmt.jpg)  Concurrency issues, such as
    race conditions (when two or more tasks can fail depending on timing)

    *   ![image](images/9781430241881_square_fmt.jpg)  Logic problems, including dead
    code and various poor coding practices


    This is great! But along with the goodness, there are some negatives to using
    the analyzer.


    *   ![image](images/9781430241881_square_fmt.jpg)  It slows down your build process,
    because it takes time to perform the analysis.

    *   ![image](images/9781430241881_square_fmt.jpg)  The analyzer sometimes generates
    false positives, telling you about problems that aren’t really problems.

    *   ![image](images/9781430241881_square_fmt.jpg)  It changes your familiar workflow,
    because you have to figure out how it fits in.


    Going Into Analysis


    OK, even with the negatives, that really doesn’t sound so bad. Let’s give it a
    try. How do we get started using this fancy tool?


    It really couldn’t be easier. Start by opening a project; we’ll use *19-01 CarParts
    Error*. Click the *Product* menu and choose *Analyze* (see [Figure 19-1](#9781430241881_Ch19.xhtml#_FIG1)),
    or press ![image](images/Rangoli1.jpg) +shift+B. That’s it! You’ve been analyzed.
    But you’re not finished—that’s just the beginning of how you interact with this
    tool.


    ![9781430241881_Fig19-01.tif](images/9781430241881_Fig19-01_fmt.jpg)


