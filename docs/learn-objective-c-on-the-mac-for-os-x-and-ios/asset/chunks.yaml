    \ `NSOperation` 来定义你的操作。\n\n我们将花些时间和笔墨（对于电子书读者来说，可能是电子）来讨论每种技术。\n\n### 创建调用操作\n\
    \n`NSInvocationOperation` 会调用你类中的一个选择器来执行任务。如果你已经构建了一个带有选择器的类，这种方法会非常方便（参见 *14.12\
