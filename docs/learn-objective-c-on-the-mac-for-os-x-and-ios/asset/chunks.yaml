    Encoding Objects


    Unfortunately, you can’t always express your objects’ information as property
    list classes. If we could express everything as dictionaries of arrays, we wouldn’t
    need our own classes. Luckily, Cocoa has machinery for letting objects convert
    themselves into a format that can be saved to disk. Objects can encode their instance
    variables and other data into a chunk of data, which can be saved to disk. That
    chunk of data can be read back into memory later, and new objects can be created
    based on the saved data. This process is called **encoding and decoding**, or
    **serialization and deserialization**.


    If you remember our foray into Interface Builder in the last chapter, we dragged
    objects out of the library and into the window, and things were saved to the nib
    file. In other words, the NSWindow and NSTextField objects were serialized and
    saved to disk. When the nib file was loaded into memory when the program ran,
    the objects were deserialized, and new NSWindow and NSTextField objects were created
    and hooked together.


    As you can probably guess, you can do the same thing with your own objects by
    adopting the NSCoding protocol. The protocol looks like this:


    @protocol NSCoding


    - (void) encodeWithCoder: (NSCoder *) encoder;


    - (id) initWithCoder: (NSCoder *) decoder;


    @end


