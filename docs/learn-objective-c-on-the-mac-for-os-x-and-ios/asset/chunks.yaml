- fmt: '# C++ Objects Embedded in Objective-C


    C++ objects embedded in Objective-C objects, rather than having a pointer relationship,
    have their constructors called when the Objective-C object is allocated and have
    their destructors called when the Objective-C object is deallocated.


    ## Exceptions


    `NSExceptions` and C++ exceptions are interoperable: you can freely throw and
    catch blocks. C++ destructors and `@finally` blocks are honored when the exception
    unwinds. Also, `catch( . . . )` and `@catch( . . . )` can catch and rethrow any
    exceptions.


    ## Coming from Java


    Like C++, Java has numerous features that Objective-C does not have or implements
    in different ways. For instance, classic Objective-C has no garbage collector
    but has `retain`/`release` and the autorelease pool with `ARC`. You can turn on
    garbage collection in your OS X Objective-C programs if you want.


    Java interfaces are like Objective-C formal protocols; both require the implementation
    of a set of methods. Java has abstract classes, but Objective-C does not. Java
    has class variables, and in Objective-C, you use `static` file-scoped global variables
    and provide accessors to them, as shown in the “Coming from C++” section. Objective-C
    is pretty loose with public and private methods. As we''ve noted, any method that
    an object supports can be invoked, even if it doesn''t appear in any external
    form, such as a header file. Java lets you declare classes `final`, preventing
    any subclasses from being made. Objective-C goes to the other extreme by letting
    you add methods to any class at runtime.


    Class implementations in Objective-C are usually split into two files: the header
    file and the implementation itself. This separation isn''t required, though, for
    small private classes, as you''ve seen with some of the code in this book. The
    header file (with a `*.h*` extension) holds the public information related to
    the class, such as any new enums, types, structures, and objects that will be
    used by the code that uses this class. Other bodies of code import this file with
    the preprocessor (using `#import`). Java lacks the C preprocessor, which is a
    textual substitution tool that automatically processes C, Objective-C, and C++
    source code before it is given to the compiler. When you see directives that start
    with `#`, you know that line is a command to the preprocessor. The C preprocessor
    actually knows nothing about the C family of languages; it just does blind text
    substitutions. The preprocessor can be a very powerful—and dangerous—tool. Many
    programmers consider the lack of the preprocessor in Java to be a feature.


    In Java, almost every error is handled with exceptions. In Objective-C, error
    handling depends on the API you''re using. The Unix API typically returns a `–1`
    value, and a global error number (`errno`) is set to a specific error. The Cocoa
    APIs typically throw exceptions only on programmer errors or situations where
    cleanup is not possible. The Objective-C language provides exception handling
    features similar to Java and C++: `@try`, `@catch`, and `@finally`.


    In Objective-C, the null (zero) object is termed `nil`. You can send messages
    to `nil` and not have to worry about a `NullPointerException`. Messages to `nil`
    are no-ops, so there is no need to check your message sends against `NULL`. Messages
    to `nil` are discussed earlier in the “Coming from C++” section.


    In Objective-C, you can change a class''s behavior at runtime by adding methods
    to existing classes using categories. There are no such things as final classes
    in Objective-C; you can subclass anything, as long as you have a header file for
    it, because the compiler needs to know how big an object the superclass defines.


    In practice, you end up doing a lot less subclassing in Objective-C than in Java.
    Through mechanisms like categories and the dynamic runtime, which allows sending
    any message to any object, you can put functionality into fewer classes, and you
    can also put the functionality into the class that makes the most sense. For instance,
    you can put a category on `NSString` to add a feature, such as reversing a string
    or removing all white space. Then, you can invoke that method on any `NSString`,
    no matter where it comes from. You''re not restricted to your own string subclass
    to provide those features.


    Generally, the only times you need to subclass in Cocoa are when you are creating
    a brand new object (at the top of an object hierarchy), fundamentally changing
    the behavior of an object, or working with a class that requires a subclass because
    it doesn''t do anything useful out of the box. For instance, the `NSView` class
    used by Cocoa for making user interface components has no implementation for its
    `drawRect:` method. You need to subclass `NSView` and override that method to
    draw in the view. But for many other objects, delegation and data sources are
    used. Because Objective-C can send any message to any object, an object does not
    need to be of a particular subclass or to conform to a particular interface, so
    a single class can be a delegate and data source to any number of different objects.


    Because data source and delegate methods are declared in categories, you don''t
    have to implement all of them. Cocoa programming in Objective-C has few empty
    stub methods, or methods that turn around and invoke the same method on an embedded
    object just to keep the compiler quiet when adopting a formal protocol.


    With power comes responsibility, of course. With Objective-C''s manual `retain`,
    `release`, and `autorelease` memory management system, you can easily create tricky
    memory errors inadvertently. Placing categories on other classes can be a very
    powerful mechanism, but if abused, doing so can make your code difficult to untangle
    and impossible to give to someone else. Plus, Objective-C is based on C, so you
    get all of C''s baggage, along with its dangers when using the preprocessor, including
    the possibility of pointer-related memory errors.


    ## Coming from BASIC


    Many programmers learned how to program using Visual Basic or REALbasic, and their
    transition to Cocoa and Objective-C can be a confusing one.


    BASIC (Visual and REAL) environments provide an integrated development environment
    that makes up the complete workspace. Cocoa splits your development into two environments:
    the Interface Builder editor and the text editor, both in Xcode. You use Interface
    Builder to create the user interface and to tell the user interface the name of
    the methods to invoke on a particular object, and then you put your control logic
    into source code edited in Xcode''s text editor (or TextMate, BBEdit, emacs, or
    whichever text editor is your favorite).


    In BASIC, the user interface items and the code they work with are tightly integrated.
    You put chunks of code into the buttons and text fields to make them behave the
    way you want. You can factor this code into a common class and have the code in
    the buttons talk to that class, but for the most part, BASIC programming involves
    putting code on user interface items. If you''re not careful, this style can lead
    to messy programs with the logic scattered across a lot of different items. BASIC
    programming typically involves changing properties of objects to get them to behave
    the way you want.


    In Cocoa, you find a clear separation between the interface and the logic that
    goes on behind that interface. You have a collection of objects that talk to each
    other. Rather than setting a property on an object, you ask the object to change
    its property. This distinction is subtle but important. The bulk of the think-time
    you spend in Cocoa is figuring out what message you need to send rather than what
    property you need to set.'
  raw: 'C++ objects embedded in Objective-C objects, rather than having a pointer
    relationship, have their constructors called when the Objective-C object is allocated
    and have their destructors called when the Objective-C object is deallocated.


    Exceptions


    NSExceptions and C++ exceptions are interoperable: you can freely throw and catch
    blocks. C++ destructors and @finally blocks are honored when the exception unwinds.
    Also, catch( . . . ) and @catch( . . . ) can catch and rethrow any exceptions.


    Coming from Java


    Like C++, Java has numerous features that Objective-C does not have or implements
    in different ways. For instance, classic Objective-C has no garbage collector
    but has retain/release and the autorelease pool with ARC. You can turn on garbage
    collection in your OS X Objective-C programs if you want.


    Java interfaces are like Objective-C formal protocols; both require the implementation
    of a set of methods. Java has abstract classes, but Objective-C does not. Java
    has class variables, and in Objective-C, you use static file-scoped global variables
    and provide accessors to them, as shown in the “Coming from C++” section. Objective-C
    is pretty loose with public and private methods. As we''ve noted, any method that
    an object supports can be invoked, even if it doesn''t appear in any external
    form, such as a header file. Java lets you declare classes final, preventing any
    subclasses from being made. Objective-C goes to the other extreme by letting you
    add methods to any class at runtime.


    Class implementations in Objective-C are usually split into two files: the header
    file and the implementation itself. This separation isn''t required, though, for
    small private classes, as

    you''ve seen with some of the code in this book. The header file (with a *.h*
    extension) holds the public information related to the class, such as any new
    enums, types, structures, and objects that will be used by the code that uses
    this class. Other bodies of code import this file with the preprocessor (using
    #import). Java lacks the C preprocessor, which is a textual

    substitution tool that automatically processes C, Objective-C, and C++ source
    code before it is given to the compiler. When you see directives that start with
    #, you know that line is a command to the preprocessor. The C preprocessor actually
    knows nothing about the C family

    of languages; it just does blind text substitutions. The preprocessor can be a
    very powerful—and dangerous—tool. Many programmers consider the lack of the preprocessor
    in Java to be

    a feature.


    In Java, almost every error is handled with exceptions. In Objective-C, error
    handling depends on the API you''re using. The Unix API typically returns a –1
    value, and a global error number (errno) is set to a specific error. The Cocoa
    APIs typically throw exceptions only on programmer errors or situations where
    cleanup is not possible. The Objective-C language provides exception handling
    features similar to Java and C++: @try, @catch, and @finally.


    In Objective-C, the null (zero) object is termed *nil*. You can send messages
    to nil and not have to worry about a NullPointerException. Messages to nil are
    no-ops, so there is no need to check your message sends against NULL. Messages
    to nil are discussed earlier in the “Coming from C++” section.


    In Objective-C, you can change a class''s behavior at runtime by adding methods
    to existing classes using categories. There are no such things as final classes
    in Objective-C; you can subclass anything, as long as you have a header file for
    it, because the compiler needs to know how big an object the superclass defines.


    In practice, you end up doing a lot less subclassing in Objective-C than in Java.
    Through mechanisms like categories and the dynamic runtime, which allows sending
    any message to any object, you can put functionality into fewer classes, and you
    can also put the functionality into the class that makes the most sense. For instance,
    you can put a category on NSString to add a feature, such as reversing a string
    or removing all white space. Then, you can invoke that method on any NSString,
    no matter where it comes from. You''re not restricted to your own string subclass
    to provide those features.


    Generally, the only times you need to subclass in Cocoa are when you are creating
    a brand new object (at the top of an object hierarchy), fundamentally changing
    the behavior of an object, or working with a class that requires a subclass because
    it doesn''t do anything useful out of the box. For instance, the NSView class
    used by Cocoa for making user interface components has no implementation for its
    drawRect: method. You need to subclass NSView and override that method to draw
    in the view. But for many other objects, delegation and data sources are used.
    Because Objective-C can send any message to any object, an object does not need
    to be of a particular subclass or to conform to a particular interface, so a single
    class can be a delegate and data source to any number of different objects.


    Because data source and delegate methods are declared in categories, you don''t
    have to implement all of them. Cocoa programming in Objective-C has few empty
    stub methods, or methods that turn around and invoke the same method on an embedded
    object just to keep the compiler quiet when adopting a formal protocol.


    With power comes responsibility, of course. With Objective-C''s manual retain,
    release, and autorelease memory management system, you can easily create tricky
    memory errors inadvertently. Placing categories on other classes can be a very
    powerful mechanism, but if abused, doing so can make your code difficult to untangle
    and impossible to give to someone else. Plus, Objective-C is based on C, so you
    get all of C''s baggage, along with its dangers when using the preprocessor, including
    the possibility of pointer-related memory errors.


    Coming from BASIC


    Many programmers learned how to program using Visual Basic or REALbasic, and their
    transition to Cocoa and Objective-C can be a confusing one.


    BASIC (Visual and REAL) environments provide an integrated development environment
    that makes up the complete workspace. Cocoa splits your development into two environments:
    the Interface Builder editor and the text editor, both in Xcode. You use Interface
    Builder to create the user interface and to tell the user interface the name of
    the methods to invoke on a particular object, and then you put your control logic
    into source code edited in Xcode''s text editor

    (or TextMate, BBEdit, emacs, or whichever text editor is your favorite).


    In BASIC, the user interface items and the code they work with are tightly integrated.
    You put chunks of code into the buttons and text fields to make them behave the
    way you want. You can factor this code into a common class and have the code in
    the buttons talk to that class, but for the most part, BASIC programming involves
    putting code on user interface items. If you''re not careful, this style can lead
    to messy programs with the logic scattered across a lot of different items. BASIC
    programming typically involves changing properties of objects to get them to behave
    the way you want.


    In Cocoa, you find a clear separation between the interface and the logic that
    goes on behind that interface. You have a collection of objects that talk to each
    other. Rather than setting a property on an object, you ask the object to change
    its property. This distinction is subtle but important. The bulk of the think-time
    you spend in Cocoa is figuring out what message you need to send rather than what
    property you need to set.'
  trans: '

    # 内嵌于 Objective-C 的 C++ 对象


    C++ 对象可以内嵌在 Objective-C 对象中，而非仅仅通过指针关联。当 Objective-C 对象被分配内存时，内嵌的 C++ 对象会调用其构造函数；当
    Objective-C 对象被释放时，则会调用其析构函数。


    ## 异常处理


    `NSExceptions` 和 C++ 异常是相互兼容的：你可以自由地抛出和捕获异常块。在异常展开过程中，C++ 析构函数和 `@finally` 块都会被正常执行。此外，`catch(
    . . . )` 和 `@catch( . . . )` 可以捕获并重新抛出任何异常。


    ## 如果你来自 Java 背景


    与 C++ 类似，Java 拥有许多 Objective-C 不具备或实现方式不同的特性。例如，经典的 Objective-C 没有垃圾回收器，而是采用 `retain`/`release`
    机制以及基于 `ARC` 的自动释放池。如果你愿意，可以在 OS X 的 Objective-C 程序中启用垃圾回收。


    Java 的接口类似于 Objective-C 的形式化协议；两者都要求实现一组方法。Java 有抽象类，但 Objective-C 没有。Java 有类变量，而在
    Objective-C 中，你可以使用 `static` 文件作用域的全局变量，并通过访问器来操作它们，具体方法如“来自 C++ 背景”一节所示。Objective-C
    对公有和私有方法的限制相当宽松。正如我们之前提到的，只要一个对象支持某个方法，它就可以被调用，即使该方法没有出现在任何外部形式（如头文件）中。Java 允许你将类声明为
    `final`，从而阻止任何子类的创建。Objective-C 则走向了另一个极端，它允许你在运行时向任何类添加方法。


    在 Objective-C 中，类的实现通常分为两个文件：头文件和实现文件。不过，对于小型私有类，这种分离并非必需，正如你在本书的一些代码中所见。头文件（扩展名为
    `*.h*`）包含与类相关的公有信息，例如任何新的枚举、类型、结构体以及将被使用该类的代码所引用的对象。其他代码通过预处理器（使用 `#import`）导入此文件。Java
    没有 C 预处理器，后者是一种文本替换工具，会在 C、Objective-C 和 C++ 源代码被提交给编译器之前，自动对其进行处理。当你看到以 `#` 开头的指令时，就知道这一行是向预处理器发出的命令。实际上，C
    预处理器对 C 语言家族一无所知；它只是进行盲目的文本替换。预处理器可以是一个非常强大——同时也非常危险——的工具。许多程序员认为 Java 缺少预处理器反而是一种优势。


    在 Java 中，几乎所有的错误都通过异常来处理。在 Objective-C 中，错误处理取决于你使用的 API。Unix API 通常返回一个 `–1`
    值，并设置全局错误号 (`errno`) 为特定的错误码。Cocoa API 通常仅在出现编程错误或无法进行清理的情况下抛出异常。Objective-C 语言提供了类似于
    Java 和 C++ 的异常处理特性：`@try`、`@catch` 和 `@finally`。


    在 Objective-C 中，空（零）对象被称为 `nil`。你可以向 `nil` 发送消息，而无需担心 `NullPointerException`。向
    `nil` 发送消息是一个空操作，因此你无需检查消息发送是否指向了 `NULL`。关于向 `nil` 发送消息的更多讨论，请参见前面的“来自 C++ 背景”一节。


    在 Objective-C 中，你可以通过分类向现有类添加方法，从而在运行时改变类的行为。Objective-C 中没有所谓的最终类；你可以子类化任何类，只要拥有该类的头文件即可，因为编译器需要知道父类定义的对象大小。


    在实践中，你在 Objective-C 中进行子类化的频率远低于 Java。通过分类和动态运行时（允许向任何对象发送任何消息）等机制，你可以将功能集成到更少的类中，也可以将功能放入最合理的类中。例如，你可以为
    `NSString` 添加一个分类，实现诸如反转字符串或去除所有空白字符的功能。然后，你就可以在任何 `NSString` 对象上调用该方法，无论该对象来自何处。你无需局限于自己的字符串子类来提供这些功能。


    通常，在 Cocoa 中需要子类化的情况只有以下几种：创建一个全新的对象（位于对象层次结构顶端）、从根本上改变一个对象的行为，或者使用一个需要子类化的类（因为该类本身不提供任何有用的开箱即用功能）。例如，Cocoa
    中用于创建用户界面组件的 `NSView` 类，其 `drawRect:` 方法没有实现。你需要继承 `NSView` 并重写该方法，才能在视图中进行绘制。但对于许多其他对象，则会使用委托和数据源机制。由于
    Objective-C 可以向任何对象发送任何消息，一个对象无需是特定的子类，也无需符合特定的接口，因此单个类可以同时作为多个不同对象的委托和数据源。


    由于数据源和委托方法是在分类中声明的，你无需实现所有方法。在 Objective-C 的 Cocoa 编程中，很少有空的存根方法，或者为了避免编译器警告而仅仅为了适配形式化协议而调用内嵌对象中相同方法的方法。


    当然，能力越大，责任也越大。使用 Objective-C 的手动 `retain`、`release` 和 `autorelease` 内存管理系统，你可能很容易不经意间制造出棘手的内存错误。为其他类添加分类是一个非常强大的机制，但如果滥用，会使你的代码难以理清，并且无法交给他人使用。此外，Objective-C
    基于 C 语言，因此你会继承 C 语言的所有历史包袱，以及在使用预处理器时带来的风险，包括可能出现的与指针相关的内存错误。


    ## 如果你来自 BASIC 背景


    许多程序员是从 Visual Basic 或 REALbasic 开始学习编程的，当他们转向 Cocoa 和 Objective-C 时，可能会感到困惑。


    BASIC（Visual 和 REAL）环境提供了一个集成的开发环境，构成了完整的工作空间。Cocoa 则将你的开发工作分为两个环境：Interface Builder
    编辑器和文本编辑器，两者都集成在 Xcode 中。你使用 Interface Builder 创建用户界面，并告知用户界面在特定对象上调用哪些方法，然后将控制逻辑编写到在
    Xcode 文本编辑器（或 TextMate、BBEdit、emacs，或你喜欢的任何文本编辑器）中编辑的源代码里。


    在 BASIC 中，用户界面元素及其相关的代码紧密集成。你将代码块放入按钮和文本字段中，使它们按你期望的方式工作。你可以将这些代码提取到一个公共类中，并让按钮中的代码与这个类通信，但在大多数情况下，BASIC
    编程涉及将代码直接写在用户界面元素上。如果不小心，这种风格可能会导致程序混乱，逻辑分散在许多不同的元素上。BASIC 编程通常通过修改对象的属性来使其按你期望的方式运行。


    在 Cocoa 中，你会发现界面与界面背后的逻辑之间存在清晰的分离。你拥有一组相互通信的对象。你不再是设置对象的某个属性，而是要求对象去改变其自身的属性。这种区别很微妙但很重要。你在
    Cocoa 中花费的大部分思考时间，是在琢磨需要发送什么消息，而不是需要设置什么属性。

    '
- fmt: '# BASIC 的生态与过渡


    `BASIC`在第三方控件和支持代码方面拥有非常丰富的市场。通常，你可以直接购买现成的组件并将其集成到你的代码库中，而不是自行构建。


    ## 从脚本语言转向 Objective-C


    从脚本语言（如`Perl`、`PHP`、`Python`和`Tcl`）转来的程序员，在过渡到`Objective-C`和`Cocoa`世界时，往往面临最艰难的转变。


    脚本语言在程序员便利性方面表现出色，例如：非常强大的字符串处理能力、自动内存管理（无论是通过引用计数还是垃圾回收）、极快的开发迭代周期、灵活的类型系统（能轻松在数字、字符串和列表之间切换），以及大量可供下载和使用的包。脚本语言的运行时环境通常也非常灵活，允许你按需设计自己的对象类型和控制结构。


    如果你来自脚本语言领域，`Objective-C`在许多方面会让你感觉像是倒退了一大步。与20世纪90年代发展起来的脚本语言相比，它是一门80年代的语言。字符串处理可能非常痛苦，因为内置的正则表达式功能缺失。使用`printf()`风格格式化字符串，差不多就是`Cocoa`能提供的最高级字符串操作了。尽管`Objective-C`已经引入了`ARC`和垃圾回收，但你在网上看到的大量现有代码仍然使用手动内存管理技术（通过`retain`和`release`）。开发过程包含编译和链接阶段，这导致从修改代码到看到结果之间存在延迟。你必须手动处理不同的类型，例如整数、字符数组和字符串对象。此外，你还得应对`C`语言带来的所有历史遗留问题，比如指针、位运算以及容易引发的内存错误。


    为什么还要忍受这些痛苦去使用`Objective-C`？性能是一个原因：根据应用类型的不同，`Objective-C`的性能可能优于脚本语言。另一个重要优势是能够访问原生用户界面工具包（`Cocoa`）。大多数脚本语言支持最初为`Tcl`语言开发的`Tk`工具包。这个包虽然可用，但它不具备`Cocoa`所提供的用户界面功能的深度和广度。最重要的是，使用`Tk`构建的应用通常不具备iOS或Mac程序的外观和感觉。


    不过，你也可以通过使用脚本桥接，实现两全其美。存在`Objective-C`与`Python`（称为`PyObjC`）以及`Ruby`（`RubyObjC`）之间的桥接，因此这两种脚本语言可以成为一等公民。当你使用这些桥接时，可以在`Python`或`Ruby`中对`Cocoa`对象进行子类化，并访问`Cocoa`的所有功能。


    ## 总结


    `Objective-C`和`Cocoa`与任何其他编程语言和工具包都不同。`Objective-C`拥有一些源自其动态运行时分发特性的巧妙功能和特性。你可以在`Objective-C`中完成其他语言无法做到的事情。


    与此同时，`Objective-C`缺少一些多年来其他语言已经添加的便利功能。特别是，强大的字符串处理、命名空间和元编程是这些其他语言具备、而`Objective-C`不具备的特性。


    编程中的一切都归结于权衡取舍。你必须决定，相比于你当前选择的语言，在`Objective-C`中获得的收益是否值得你失去的东西。对我们来说，能够使用`Cocoa`构建应用，这本身就完全值得花时间和精力去熟悉`Objective-C`。


