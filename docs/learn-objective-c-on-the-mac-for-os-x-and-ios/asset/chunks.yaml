  trans: "\n# 解决此问题\n\n要解决此问题，请重写`*18.01 Car-Value-Garaging.m*`中的`-setNilValueForKey:`方法，并提供合理的逻辑。我们将做出一个执行决策：`nil`里程数意味着将汽车里程数归零，而不是使用像`-1`这样的其他值：\n\
    \n```\n- (void) setNilValueForKey: (NSString *) key\n{\n    if ([key isEqualToString:\
    \ @\"mileage\"])\n    {\n        mileage = 0;\n    } else {\n        [super setNilValueForKey:\
    \ key];\n    }\n} // setNilValueForKey\n```\n\n请注意，如果我们遇到意外的键，我们会调用父类方法。这样，如果有人试图对我们不理解的键使用键值编码，调用者将收到适当的抱怨。通常，除非有罕见且充分的理由不这样做（例如故意避免某个特定操作），否则在重写时始终调用父类方法。\n\
    \n# 处理未处理的键\n\n我们键值之旅（三小时之旅？）的最后一站是处理未定义的键。如果你曾尝试过 KVC 并输错了键，你可能会看到这样的信息：\n\n\
    ```\n'[<Car 0x105740> valueForUndefinedKey:]: this class is not key value coding-compliant\
    \ for the key garbanzo.'\n```\n\n这基本上是说 Cocoa 无法理解你使用该键的含义，因此它放弃了。\n\n如果你仔细观察错误消息，你会发现它提到了`valueForUndefinedKey:`方法。正如你可能猜到的，我们可以通过重写此方法来处理未定义的键。你还可以猜到，有一个对应的`setValue:forUndefinedKey:`方法，用于当你尝试使用未知键更改值时。\n\
    \n如果 KVC 机制无法找到执行其魔法的途径，它会回退并询问该类该怎么做。默认实现只是像你之前看到的那样“摊手”。不过，我们可以改变这种行为。让我们将`Garage`变成一个非常灵活的对象，允许我们设置和获取任何键。我们首先添加一个可变字典：\n\
    \n```\n@interface Garage : NSObject\n{\n    NSString *name;\n    NSMutableArray\
    \ *cars;\n    NSMutableDictionary *stuff;\n}\n… @end // Garage\n```\n\n接下来，我们添加`valueForUndefinedKey:`方法：\n\
    \n```\n- (void) setValue: (id) value forUndefinedKey: (NSString *) key\n{\n  \
    \  if (stuff == nil)\n    {\n        stuff = [[NSMutableDictionary alloc] init];\n\
    \    }\n    [stuff setValue: value forKey: key];\n} // setValueForUndefinedKey\n\
    \n- (id) valueForUndefinedKey:(NSString *)key\n{\n    id value = [stuff valueForKey:\
    \ key];\n    return (value);\n} // valueForUndefinedKey\n```\n\n并在`-dealloc`中释放字典。\n\
    \n现在，你可以通过向`*18.01 Car-Value-Garaging.m*`添加代码，在车库上设置任意值：\n\n```\n[garage setValue:\
    \ @\"bunny\" forKey: @\"fluffy\"];\n[garage setValue: @\"greeble\" forKey: @\"\
    bork\"];\n[garage setValue: [NSNull null] forKey: @\"snorgle\"];\n[garage setValue:\
    \ nil forKey: @\"gronk\"];\n```\n\n并获取它们：\n\n```\nNSLog (@\"values are %@ %@ %@\
    \ and %@\", [garage valueForKey: @\"fluffy\"], [garage valueForKey: @\"bork\"\
    ], [garage valueForKey: @\"snorgle\"], [garage valueForKey: @\"gronk\"]);\n```\n\
    \n这个`NSLog`会打印出：\n\n```\nvalues are bunny greeble <null> and (null)\n```\n\n注意`<null>`和`(null)`之间的区别。`<null>`是一个`[NSNull\
    \ null]`对象，而`(null)`是一个真正的`nil`值，我们得到它是因为`\"gronk\"`不在字典中。还要注意，我们在使用`stuff`字典时使用了\
    \ KVC 方法`setValue:forKey:`。使用此方法允许调用者传入`nil`值，而无需我们在代码中检查它。`NSDictionary`的`setObject:forKey:`在传入`nil`时会报错，而`setValue:forKey:`在字典上使用`nil`值则会从字典中移除该键。\n\
    \n# 总结\n\n键值编码包含的内容远多于我们在本章所能覆盖的，但现在你应该有一个坚实的基础来探索 KVC 的其他方面。你已经看到了使用单个键设置和获取值的示例，其中\
    \ KVC 会查找 setter 和 getter 方法来完成你的请求。如果找不到任何方法，KVC 会直接深入对象内部并更改值。\n\n你还了解了键路径，它们是点分隔的键，指定了通过对象网络的路径。这些键路径可能看起来很像在访问属性，但实际上它们是截然不同的机制。你可以在键路径中插入各种运算符，让\
    \ KVC 为你执行额外的工作。最后，我们研究了几个你可以重写以自定义边界情况行为的方法。\n\n接下来，我们将了解 Xcode 的静态分析器。\n\n#\
    \ 第 19 章 使用静态分析器\n\n当你构建应用程序时，大多数编译器可以检测看起来可疑的代码并发出警告，指示可能在运行时变成错误的代码。为了超越这种警告，几年前，Apple\
    \ 在 Xcode 3.2 版本中添加了一个**静态分析器**。静态分析器是一种在不实际运行代码的情况下逻辑检查代码的工具，寻找可能变成错误的缺陷。在本章中，我们将了解如何使用静态分析器来发现代码中的问题。\n\
    \n## 开始静态分析\n\n静态分析器是做什么的？它是如何工作的？静态分析器非常了解 Objective-C 程序应该如何工作，然后根据这些知识检查你的程序。它不仅仅查看你的源代码；它实际上会在应用程序中的代码路径中移动，寻找逻辑错误，然后将这些错误报告给你。你可以在构建和运行之前修复它们。\n\
    \n静态分析器可以发现各种类型的错误：\n\n*   ![image](img/9781430241881_square_fmt.jpg) 安全问题，例如内存泄漏和缓冲区溢出\n\
    *   ![image](img/9781430241881_square_fmt.jpg) 并发问题，例如竞态条件（当两个或多个任务可能因时序问题而失败时）\n\
    *   ![image](img/9781430241881_square_fmt.jpg) 逻辑问题，包括死代码和各种不良编码实践\n\n这太棒了！但是，除了好处之外，使用分析器也有一些缺点。\n\
    \n*   ![image](img/9781430241881_square_fmt.jpg) 它会减慢你的构建过程，因为执行分析需要时间。\n*   ![image](img/9781430241881_square_fmt.jpg)\
    \ 分析器有时会产生误报，告诉你存在的问题实际上并不是问题。\n*   ![image](img/9781430241881_square_fmt.jpg)\
    \ 它会改变你熟悉的工作流程，因为你必须弄清楚如何将之融入。\n\n## 进入分析\n\n好吧，即使有这些缺点，听起来也不是那么糟糕。让我们试一试。我们如何开始使用这个奇特的工具？\n\
    \n实际上再简单不过了。首先打开一个项目；我们将使用`*19-01 CarParts Error*`。点击**Product**菜单并选择**Analyze**（见图\
    \ 19-1），或按![image](img/Rangoli1.jpg) + shift + B。就这样！你已被分析。但你还没有完成——这只是你与这个工具交互的开始。\n\
    \n![9781430241881_Fig19-01_fmt.jpg](img/9781430241881_Fig19-01_fmt.jpg)\n\n**图\
    \ 19-1.** 从 **Product** 菜单中选择 **Analyze**\n\n当我们构建`*19.01 CarParts Error*`时，我们看到它编译没有错误，并且运行良好。经过静态分析步骤，你可能会注意到我们的程序编译时间稍长。\n\
    \n毫无疑问，你也注意到分析器有一些要报告的内容，由分支箭头图标指示。静态分析器为我们发现了四个我们之前不知道的问题。酷——让我们来看看。\n\n问题导航器（见图\
    \ 19-2）列出了分析器发现的问题。我们将逐一检查这些错误。\n\n![9781430241881_Fig19-02_fmt.jpg](img/9781430241881_Fig19-02_fmt.jpg)\n\
    \n**图 19-2.** 分析器发现了四个问题\n\n## 死存储不是吸血鬼买牛奶的地方\n"
- fmt: "The first one says “Dead store.” The description “Dead store” means we created\
    \ an object (in this case, it’s named `pool`), but we never actually accessed\
    \ it in our code directly—we never sent it method calls or tried to modify it\
    \ (see [Figure 19-3](#9781430241881_Ch19.xhtml#_FIG3)).\n\n![9781430241881_Fig19-03.tif](images/9781430241881_Fig19-03_fmt.jpg)\n\
    \n[Figure 19-3](#9781430241881_Ch19.xhtml#FIG3). The code that caused the analyzer\
    \ to report an issue\n\nEven though our program is technically correct, the process\
    \ of allocating and releasing memory takes time and (obviously) uses storage,\
    \ both of which are especially important in iOS. Thanks to the analyzer, we can\
    \ remove this variable from our application, making our program a little more\
    \ efficient.\n\n## Airtight Garage\n\nNow, we’ll move on to the second issue.\
    \ This one claims we have a “potential leak of an object,” specifically the `garage`\
    \ object. But how can that be? We release `garage` at the end of `main`, just\
    \ before we release `pool`. The plot thickens.\n\nTo find out more, we click the\
    \ analyzer bubble that appears inline with the code. When we do, we get the amazing\
    \ squiggly drawing shown in [Figure 19-4](#9781430241881_Ch19.xhtml#_FIG4).\n\n\
    ![9781430241881_Fig19-04.tif](images/9781430241881_Fig19-04_fmt.jpg)\n\n[Figure\
    \ 19-4](#9781430241881_Ch19.xhtml#FIG4). Analyzer shows the path through the code\n\
    \n[Figure 19-4](#9781430241881_Ch19.xhtml#_FIG4) shows you the path through the\
    \ code, which, tellingly, never reaches the line where `garage` is released. Looking\
    \ more closely, we see there’s a stray `return` statement at line 177 that ends\
    \ the function before we can clean up memory.\n\nSurprisingly, this mistake is\
    \ very common. It typically happens when you return too early from a method or\
    \ function without releasing allocated objects.\n\n## Remember Where You Park\n\
    \nTwo issues down, two to go. The next analyzer issue says that we’re leaking\
    \ an object stored into `carsCopy`. A closer look shows that we made `carsCopy`\
    \ a `mutableCopy` of `cars`, but we never released the copy (see [Figure 19-5](#9781430241881_Ch19.xhtml#_FIG5)).\
    \ We can fix this by releasing `carsCopy` at the end of `main`.\n\n![9781430241881_Fig19-05.tif](images/9781430241881_Fig19-05_fmt.jpg)\n\
    \n[Figure 19-5](#9781430241881_Ch19.xhtml#FIG5). We created `carsCopy` but never\
    \ released it\n\n## You Can’t Take It with You\n\nWe have one analyzer issue left,\
    \ a leak in `AllWeatherRadial`. When we look at this one, we see that `description`\
    \ allocated a string `desc` but never released it before returning (see [Figure\
    \ 19-6](#9781430241881_Ch19.xhtml#_FIG6)).\n\nIn this case, we can tell the pool\
    \ to get rid of it when ready, by editing the `return` statement to say `return\
    \ [desc autorelease]`.\n\n![9781430241881_Fig19-06.tif](images/9781430241881_Fig19-06_fmt.jpg)\n\
    \n[Figure 19-6](#9781430241881_Ch19.xhtml#FIG6). We allocated `desc` but never\
    \ released it\n\n## Assisting the Analyzer\n\nThe static analyzer is a great tool,\
    \ but it’s not perfect. To help give the analyzer some hints to do its job better,\
    \ you can use keywords in your methods to avoid getting false positives. These\
    \ keywords let you tell the analyzer, “I know this doesn’t look good, but I promise\
    \ I know what I’m doing here, so please don’t yell at me.”\n\n## Returning a Retained\
    \ Object\n\nYou can use `NS_RETURNS_RETAINED` to mark a method that returns an\
    \ object with a retain count greater than zero. Assume you have the following\
    \ method:\n\n```\n- (NSMutableArray *)superDuperArrayCreator\n{\n    NSMutableArray\
    \ *myArray = [[NSMutableArray alloc] init];\n    // … process the myArray\n  \
    \  return myArray;\n}\n```\n\nYou know that you want this method to return `myArray`,\
    \ and you plan to release the array after you get it back. But the analyzer doesn’t\
    \ know that; it only knows that, by convention, you must clean up the memory in\
    \ the place where it was allocated.\n\nTo placate the analyzer, you can mark the\
    \ method `NS_RETURNS_RETAINED`. It looks like this:\n\n```\n- (NSMutableArray\
    \ *)superDuperArrayCreator NS_RETURNS_RETAINED;\n```"
  raw: 'The first one says “Dead store.” The description “Dead store” means we created
    an object (in this case, it’s named pool), but we never actually accessed it in
    our code directly—we never sent it method calls or tried to modify it (see [Figure
    19-3](#9781430241881_Ch19.xhtml#_FIG3)).


    ![9781430241881_Fig19-03.tif](images/9781430241881_Fig19-03_fmt.jpg)


    [Figure 19-3](#9781430241881_Ch19.xhtml#FIG3). The code that caused the analyzer
    to report an issue


    Even though our program is technically correct, the process of allocating and
    releasing memory takes time and (obviously) uses storage, both of which are especially
    important in iOS. Thanks to the analyzer, we can remove this variable from our
    application, making our program a little more efficient.


    Airtight Garage


    Now, we’ll move on to the second issue. This one claims we have a “potential leak
    of an object,” specifically the garage object. But how can that be? We release
    garage at the end of main, just before we release pool. The plot thickens.


    To find out more, we click the analyzer bubble that appears inline with the code.
    When we do, we get the amazing squiggly drawing shown in [Figure 19-4](#9781430241881_Ch19.xhtml#_FIG4).


    ![9781430241881_Fig19-04.tif](images/9781430241881_Fig19-04_fmt.jpg)


    [Figure 19-4](#9781430241881_Ch19.xhtml#FIG4). Analyzer shows the path through
    the code


    [Figure 19-4](#9781430241881_Ch19.xhtml#_FIG4) shows you the path through the
    code, which, tellingly, never reaches the line where garage is released. Looking
    more closely, we see there’s a stray return statement at line 177 that ends the
    function before we can clean up memory.


    Surprisingly, this mistake is very common. It typically happens when you return
    too early from a method or function without releasing allocated objects.


    Remember Where You Park


    Two issues down, two to go. The next analyzer issue says that we’re leaking an
    object stored into carsCopy. A closer look shows that we made carsCopy a mutableCopy
    of cars, but we never released the copy (see [Figure 19-5](#9781430241881_Ch19.xhtml#_FIG5)).
    We can fix this by releasing carsCopy at the end of main.


    ![9781430241881_Fig19-05.tif](images/9781430241881_Fig19-05_fmt.jpg)


    [Figure 19-5](#9781430241881_Ch19.xhtml#FIG5). We created carsCopy but never released
    it


    You Can’t Take It with You


    We have one analyzer issue left, a leak in AllWeatherRadial. When we look at this
    one, we see that description allocated a string desc but never released it before
    returning (see [Figure 19-6](#9781430241881_Ch19.xhtml#_FIG6)).

    In this case, we can tell the pool to get rid of it when ready, by editing the
    return statement to say return [desc autorelease].


    ![9781430241881_Fig19-06.tif](images/9781430241881_Fig19-06_fmt.jpg)


    [Figure 19-6](#9781430241881_Ch19.xhtml#FIG6). We allocated desc but never released
    it


    Assisting the Analyzer


    The static analyzer is a great tool, but it’s not perfect. To help give the analyzer
    some hints to do its job better, you can use keywords in your methods to avoid
    getting false positives. These keywords let you tell the analyzer, “I know this
    doesn’t look good, but I promise I know what I’m doing here, so please don’t yell
    at me.”


    Returning a Retained Object


    You can use NS_RETURNS_RETAINED to mark a method that returns an object with a
    retain count greater than zero. Assume you have the following method:


    - (NSMutableArray *)superDuperArrayCreator


    {


    NSMutableArray *myArray = [[NSMutableArray alloc] init];


    // … process the myArray


    return myArray;


    }


    You know that you want this method to return myArray, and you plan to release
    the array after you get it back. But the analyzer doesn’t know that; it only knows
    that, by convention, you must clean up the memory in the place where it was allocated.


    To placate the analyzer, you can mark the method NS_RETURNS_RETAINED. It looks
    like this:


    - (NSMutableArray *)superDuperArrayCreator NS_RETURNS_RETAINED;'
  trans: "\n第一个提示是“Dead store”。“Dead store”的描述意味着我们创建了一个对象（此处命名为`pool`），但从未在代码中直接访问它——我们从未向它发送方法调用，也未曾尝试修改它（请见图\
    \ 19-3）。\n\n![9781430241881_Fig19-03.tif](img/9781430241881_Fig19-03_fmt.jpg)\n\
    \n图 19-3. 导致分析器报告问题的代码\n\n尽管我们的程序在技术上正确，但分配和释放内存的过程需要时间，并且（显而易见地）会占用存储空间，这两点在\
    \ iOS 中尤其重要。借助分析器，我们可以从应用中移除这个变量，使程序效率得到小幅提升。\n\n## 密封车库\n\n现在，我们来讨论第二个问题。该问题指出存在“对象潜在泄漏”，具体指\
    \ `garage` 对象。但这怎么可能呢？我们在 `main` 函数的末尾，释放 `pool` 之前刚刚释放了 `garage`。事情变得复杂了。\n\n\
    为了查明原因，我们点击嵌入在代码行中的分析器气泡。点击后，出现了如图 19-4 所示的神奇波浪线图示。\n\n![9781430241881_Fig19-04.tif](img/9781430241881_Fig19-04_fmt.jpg)\n\
    \n图 19-4. 分析器展示的代码执行路径\n\n图 19-4 向您展示了代码的执行路径，显而易见，该路径从未到达释放 `garage` 的那一行。再仔细看，我们发现第\
    \ 177 行有一个多余的 `return` 语句，它在清理内存之前就结束了函数。\n\n令人惊讶的是，这种错误非常普遍。它通常发生在您过早地从方法或函数返回，而没有释放已分配的对象时。\n\
    \n## 记住你的停车位\n\n解决了两个问题，还剩两个。下一个分析器问题指出，我们泄漏了一个存储到 `carsCopy` 中的对象。进一步查看发现，我们让\
    \ `carsCopy` 成为了 `cars` 的一个 `mutableCopy`，但从未释放这个副本（请见图 19-5）。我们可以在 `main` 函数末尾释放\
    \ `carsCopy` 来解决此问题。\n\n![9781430241881_Fig19-05.tif](img/9781430241881_Fig19-05_fmt.jpg)\n\
    \n图 19-5. 我们创建了 `carsCopy` 但从未释放\n\n## 生不带来，死不带去\n\n我们还剩一个分析器问题，即 `AllWeatherRadial`\
    \ 中的泄漏。查看此问题时，我们发现 `description` 方法分配了一个字符串 `desc`，但在返回前从未释放它（请见图 19-6）。\n\n这种情况下，我们可以通过编辑\
    \ `return` 语句，将其改为 `return [desc autorelease]`，来告诉池子在准备好的时候释放它。\n\n![9781430241881_Fig19-06.tif](img/9781430241881_Fig19-06_fmt.jpg)\n\
    \n图 19-6. 我们分配了 `desc` 但从未释放\n\n## 协助分析器\n\n静态分析器是一个强大的工具，但它并非完美无缺。为了给分析器提供一些线索以帮助其更好地工作，您可以在方法中使用一些关键字来避免误报。这些关键字可以让您告诉分析器：“我知道这看起来不太对劲，但我保证自己清楚在做什么，所以请不要对我大喊大叫。”\n\
    \n## 返回一个保留对象\n\n您可以使用 `NS_RETURNS_RETAINED` 来标记一个返回保留计数大于零的对象的方法。假设您有以下方法：\n\n\
    ```\n- (NSMutableArray *)superDuperArrayCreator\n{\n    NSMutableArray *myArray\
    \ = [[NSMutableArray alloc] init];\n    // … 处理 myArray\n    return myArray;\n\
    }\n```\n\n您知道您希望此方法返回 `myArray`，并且您计划在获取数组后释放它。但分析器不知道这一点；它只知道，按照惯例，您必须在分配内存的地方清理它。\n\
    \n为了安抚分析器，您可以用 `NS_RETURNS_RETAINED` 来标记该方法。代码如下：\n\n```\n- (NSMutableArray *)superDuperArrayCreator\
    \ NS_RETURNS_RETAINED;\n```\n"
- fmt: "Similarly, you can use the Core Foundation version for C objects. To return\
    \ one of those, you can use the keyword `CF_RETURNS_RETAINED`. So for the following\
    \ code:\n\n```\n- (CFMutableArrayRef)superDuperArrayCreator\n\n{\n\n    CFMutableArrayRef\
    \ myArrayRef = CFArrayCreateMutable(kCFAllocatorNull, 10, NULL);\n\n    // … process\
    \ the myArray\n\n    return myArrayRef;\n\n}\n```\n\nYour method will look like\
    \ this:\n\n```\n- (CFMutableArrayRef)superDuperArrayCreator CF_RETURNS_RETAINED;\n\
    ```\n\n## Returning a Nonretained Object\n\nYou can also point the analyzer in\
    \ the opposite direction, telling it to complain when you try to return a *nonretained*\
    \ object. The keywords for this are `NS_RETURNS_NOT_RETAINED` and `CF_RETURNS_NOT_RETAINED`.\n\
    \nGiven this definition:\n\n```\n- (NSMutableArray *)superDuperArrayCreator NS_RETURNS_NOT_RETAINED;\n\
    ```\n\nthe analyzer will raise an issue if we return an object that is retained.\n\
    \n## Returning Nothing\n\nTo make sure a method returns `void` (nothing), you\
    \ can use the keyword `CLANG_ANALYZER_NORETURN` when you define the method. In\
    \ this case, an analyzer issue will appear if you try to return a value.\n\n**What’s\
    \ That Sound?** Where did the “CLANG” prefix come from on that last keyword? Clang\
    \ is an open-source project that enhances C compilers and provides the foundation\
    \ of the static analyzer in Xcode. For more information on Clang, you can check\
    \ out [http://clang.llvm.org](http://clang.llvm.org).\n\n## On Further Analysis\n\
    \nThe static analyzer found four problems of various kinds in our little program.\
