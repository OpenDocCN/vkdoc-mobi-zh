- fmt: 'In this section, we’ll show you how to wire up your code to the lovely user
    interface elements we just finished creating.


    ## Hooking Up the Outlets


    Now, it’s time to hook up some connections. First, we need to tell the object
    which `NSTextField` its `textField` and `resultsField` instance variables should
    point to. We’re going to use the Assistant Editor, which we discussed briefly
    in [Chapter 7](#9781430241881_Ch7.xhtml). At the top right of the Xcode window
    is a set of three buttons labeled Editor. Click the middle button, and you’ll
    split the editor in two vertically; that’s the Assistant Editor. If you need more
    room, make sure you have the dock in its minimal version, with just the icons
    showing.


    Next, hold down the Control key, and drag from the text field over to the header
    file—yes, you’re crossing the streams!—and under the `@property` line, until the
    message “Insert Outlet or Action” appears (see [Figure 16-13](#9781430241881_Ch16.xhtml#_FIG13)).
    Once you let go of the pointer, you will get a pop-up dialog like the one shown
    in [Figure 16-14](#9781430241881_Ch16.xhtml#_FIG14). Enter `textField` in the
    name area, and click Connect. This creates the `textField` property in the header
    file and other required keywords. So far, we haven’t typed in any code, but we’ve
    already “written” a bunch of it. That’s very cool. Let’s repeat the connection
    process for the label and name that one `resultsField`.


    ![9781430241881_Fig16-13.tif](images/9781430241881_Fig16-13_fmt.jpg)


    [Figure 16-13](#9781430241881_Ch16.xhtml#FIG13). Starting the connection


    ![9781430241881_Fig16-14.tif](images/9781430241881_Fig16-14_fmt.jpg)


    [Figure 16-14](#9781430241881_Ch16.xhtml#FIG14). Editing the connection


    Double-check your work in the Connections panel of the Inspector. To see that
    panel, choose View ![image](images/9781430241881_arrow_fmt.jpg) Utilities ![image](images/9781430241881_arrow_fmt.jpg)
    Show Connection Inspector, or click the Connections button (the one that looks
    like a right-facing arrow) on the Inspector. You’ll see the connections at the
    top of the Inspector, as shown in [Figure 16-15](#9781430241881_Ch16.xhtml#_FIG15).


    ![9781430241881_Fig16-15.tif](images/9781430241881_Fig16-15_fmt.jpg)


    [Figure 16-15](#9781430241881_Ch16.xhtml#FIG15). Double-checking the connections


    ## Hooking Up the Actions


    Now, we’re ready to wire the buttons to actions so they’ll trigger our code. We’ll
    control-drag again to make our love connections, this time from the button to
    the `MSCAppDelegate`.


    **Note**: Knowing which way to drag a connection is a common source of confusion
    when using Interface Builder. The direction of the drag is *from* the object that
    needs to know something *to* the object it needs to know about.


    `MSCAppDelegate` needs to know which `NSTextField` to use for the user’s input,
    so the drag is from `MSCAppDelegate` to the text field.


    The button needs to know which object to tell, “Hey! Someone pushed me!” So you
    drag from the button to `AppController`.


    Control-click the UpperCase button, and drag a wire below the last `@property`
    in the header file, as shown in [Figure 16-16](#9781430241881_Ch16.xhtml#_FIG16).
    The connection box pops up again. This time, change the connection type to Action.
    Enter `uppercase` in the name field, and click Connect. This creates the method
    prototype in the header file and a dummy (empty) implementation in the `.m` file.


    ![9781430241881_Fig16-16.tif](images/9781430241881_Fig16-16_fmt.jpg)


    [Figure 16-16](#9781430241881_Ch16.xhtml#FIG16). Connecting the UpperCase button


    Now, whenever the button is clicked, the `uppercase:` message will be sent to
    the `MSCAppDelegate` instance, just like we always wanted. We can then take whatever
    action we want in our `uppercase:` method.


    Finally, we make the last connection by hooking up the LowerCase button. Control-drag
    from the LowerCase button to the header file*,* and change the type to Action
    and name to `lowercase` (see [Figure 16-17](#9781430241881_Ch16.xhtml#_FIG17)).
    And now we’re done in Interface Builder.'
