    (well, four) tires. So we can say that Car has a to-many relationship with Tire.
    If a key path includes an array attribute, the remaining part of the key path
    is sent to every object in the array.


    Out of Many, One Since you now know about to-many relationships, you’re probably
    wondering what a to-one relationship is. Ordinary object composition is a to-one
    relationship. A car has a to-one relationship with its engine, for instance.


    Remember that Car has an array of tires, and each tire has its air pressure. We
    can get all of the tire pressures in one call:


    NSArray *pressures = [car valueForKeyPath: @"tires.pressure"];


    After making the following call


    NSLog (@"pressures %@", pressures);


    we can print out these results:


    pressures (


    34,


    34,


    34,


    34 )


    What’s happening here exactly, aside from us being vigilant about our tire maintenance?
    valueForKeyPath: breaks apart your path and processes it from left to right. First,
    it asks the car for its tires. Once it has the tires in hand, it asks the tires
    object for its valueForKeyPath: with the rest of the key path, "pressure" in this
    case. NSArray implements valueForKeyPath: by looping over its contents and sending
    each object the message. So the NSArray sends each tire it has inside itself a
    valueForKeyPath: using "pressure" for the key path, which results in the tire
    pressure being returned, boxed up in an NSNumber. Pretty handy!


    Unfortunately, you can’t index these arrays in the key path, such as by using
    "tires[0]. pressure" to get to the first tire.


    Pit Stop


    Before we head to the next bit of key-value goodness, we’ll be adding a new class,
    called Garage, which will hold a bunch of classic cars. You can find all this
    stuff in the project named *16.02 Car-Value-Garaging*. Here’s Garage’s interface:


    #import <Cocoa/Cocoa.h>


    @class Car;


    @interface Garage : NSObject


    {


    NSString *name;


    NSMutableArray *cars;


    }


    @property (readwrite, copy) NSString *name;


    - (void) addCar: (Car *) car;


    - (void) print;


    @end // Garage


    Nothing’s new here. We’re forward-declaring Car, because all we need to know is
    that it’s an object type to use as an argument to the -addCar: method. The name
    is a property, and the @property statement says that users of Garage can access
    and change the name. And there’s a method to print out the contents. To implement
    a collection of cars, we’ve got a mutable array behind the scenes.


    The implementation is similarly straightforward:


    #import "Garage.h"


    @implementation Garage


    @synthesize name;


    - (void) addCar: (Car *) car


    {


    if (cars == nil)


    {


    cars = [[NSMutableArray alloc] init];


    }


    [cars addObject: car];


    } // addCar


    - (void) dealloc


    {


    [name release];


    [cars release];


    [super dealloc];


    } // dealloc


    - (void) print


    {


    NSLog (@"%@:", name);'
  trans: "\n`valueForKey:` 施展了一点魔法，它会找出 `make` 属性的值并将其返回。\n\n`valueForKey:` 的工作方式是首先查找与键同名的\
    \ getter 方法：`-key` 或 `-isKey`。因此，对于这两个调用，`valueForKey:` 会查找 `-name` 和 `-make`\
    \ 方法。如果没有 getter 方法，它会在对象内部查找名为 `_key` 或 `key` 的实例变量。如果我们没有通过 `@synthesize` 提供访问器方法，`valueForKey:`\
    \ 会查找实例变量 `_name` 和 `name`，或 `_make` 和 `make`。\n\n最后一点非常重要：`-valueForKey:` 利用\
    \ Objective-C 运行时中的元数据来剖析对象，并在其内部寻找有用的信息。在 C 或 C++ 中，你很难做到这一点。通过使用 KVC，即使没有 getter\
    \ 方法，你也可以获取值，而无需通过对象指针直接访问实例变量。\n\n同样的技术也适用于车型年份：\n\n```\nNSLog (@\"model year\
    \ is %@\", [car valueForKey: @\"modelYear\"]);\n```\n\n这将打印出 `model year is 1984`。\n\
    \n嘿，等一下！`NSLog` 中的 `%@` 用于打印对象，但 `modelYear` 是一个 `int`，而不是对象。这是怎么回事？对于 KVC，Cocoa\
    \ 会自动对标量值进行装箱和拆箱。也就是说，当你使用 `valueForKey:` 时，它会自动将标量值（`int`、`float` 和一些 `struct`）放入\
    \ `NSNumber` 或 `NSValue` 中；当你使用 `-setValueForKey:` 时，它会自动从这些对象中取出标量值。只有 KVC 才能进行这种自动装箱。常规的方法调用和属性语法则不会。\n\
    \n除了检索值，你还可以通过 `-setValue:forKey:` 按名称设置值。\n\n```\n[car setValue: @\"Harold\"\
    \ forKey: @\"name\"];\n```\n\n这个方法的工作方式与 `-valueForKey:` 相同。它首先查找 `name` 的 setter\
    \ 方法，比如 `-setName`，并用参数 `@\"Harold\"` 调用它。如果没有 setter 方法，它会在类中查找名为 `name` 或 `_name`\
    \ 的实例变量并为其赋值。\n\n**我们必须强调这条规则**：编译器和苹果都保留以下划线开头的实例变量名，并警告说，如果你试图使用它们，你和你（的狗）将面临严重后果。这条规则目前并未强制执行，但未来可能某天就会生效，因此请自行承担违规风险。\n\
    \n如果你要设置一个标量值，在调用 `-setValue:forKey:` 之前，需要先将其打包（装箱）：\n\n```\n[car setValue: [NSNumber\
    \ numberWithFloat: 25062.4] forKey: @\"mileage\"];\n```\n\n然后 `-setValue:forKey:`\
    \ 会在调用 `-setMileage:` 或修改 `mileage` 实例变量之前对该值进行拆箱。\n\n### 路径！路径！\n\n除了通过键设置值，键值编码还允许你指定键路径，它就像文件系统路径一样，让你能够沿着关系链进行追踪。\n\
    \n为了有点东西可挖，不如给我们的引擎加点马力？我们将向 `Engine` 添加一个新的实例变量：\n\n```\n@interface Engine :\
    \ NSObject <NSCopying>\n{\n    int horsepower;\n}\n@end // Engine\n```\n\n注意，我们没有添加任何访问器或属性。通常，你会希望为感兴趣的对象属性添加访问器或属性，但我们这里故意省略它们，是为了向你展示\
    \ KVC 可以直接深入对象内部。\n\n我们添加了一个 `init` 方法，以便引擎在初始化时马力不为零：\n\n```\n- (id) init\n{\n\
    \    if (self = [super init])\n    {\n        horsepower = 145;\n    }\n    return\
    \ (self);\n} // init\n```\n\n我们还在 `-copyWithZone:` 中添加了对 `horsepower` 实例变量的复制，以便复制体也能获取该值，并且将其添加到了\
    \ `-description` 方法中。这些现在都是老生常谈了，所以我们不再赘述。\n\n为了证明我们可以获取和设置该值，你可以将以下代码添加到 `18.01\
    \ Car-Value-Coding.m` 中：\n\n```\nNSLog (@\"horsepower is %@\", [engine valueForKey:\
    \ @\"horsepower\"]);\n[engine setValue: [NSNumber numberWithInt: 150] forKey:\
    \ @\"horsepower\"];\nNSLog (@\"horsepower is %@\", [engine valueForKey: @\"horsepower\"\
    ]);\n```\n\n这将打印出：\n\n```\nhorsepower is 145\nhorsepower is 150\n```\n\n那么那些键路径呢？你可以用点分隔来指定不同的属性名。通过向汽车询问其\
    \ `\"engine.horsepower\"`，你就能得到马力值。事实上，让我们尝试使用 `-valueForKeyPath:` 和 `-setValueForKeyPath:`\
    \ 方法来访问键路径。我们将向汽车而不是引擎发送这些消息：\n\n```\n[car setValue: [NSNumber numberWithInt:\
    \ 155] forKeyPath: @\"engine.horsepower\"];\nNSLog (@\"horsepower is %@\", [car\
    \ valueForKeyPath: @\"engine.horsepower\"]);\n```\n\n这些键路径的深度可以是任意的，具体取决于你对象图的复杂性（这其实就是对你相关对象集合的一种花哨说法）；你可以拥有像\
    \ `\"car.interior.airconditioner.fan.velocity\"` 这样的键路径。在某些方面，使用键路径深入对象内部比进行一系列嵌套的方法调用要简单得多。\n\
    \n### 聚合攻击\n\nKVC 的一个很酷的地方是，如果你向 `NSArray` 请求某个键的值，它实际上会询问数组中每个对象该键的值，然后将结果打包到另一个数组中返回给你。这对于通过键路径访问对象内部（还记得组合吗？）的数组也同样适用。\n\
    \n嵌入在其他对象中的 `NSArray`，在 KVC 术语中被称为具有**对多**关系。例如，一辆汽车与多个（嗯，四个）轮胎存在关系。因此我们可以说，`Car`\
    \ 与 `Tire` 之间存在对多关系。如果键路径包含一个数组属性，则键路径的剩余部分会被发送给数组中的每个对象。\n\n**众多之中，唯一**既然你现在了解了对多关系，你可能想知道什么是对一关系。普通的对象组合就是对一关系。例如，一辆汽车与其引擎之间存在对一关系。\n\
    \n回想一下，`Car` 有一个轮胎数组，每个轮胎都有自己的气压。我们可以通过一次调用来获取所有轮胎的气压：\n\n```\nNSArray *pressures\
    \ = [car valueForKeyPath: @\"tires.pressure\"];\n```\n\n在做出以下调用后：\n\n```\nNSLog\
    \ (@\"pressures %@\", pressures);\n```\n\n我们可以打印出这些结果：\n\n```\npressures (\n \
    \   34,\n    34,\n    34,\n    34\n)\n```\n\n除了我们很注意轮胎保养之外，这里到底发生了什么？`valueForKeyPath:`\
    \ 会分解你的路径并从左到右处理。首先，它向汽车询问其轮胎。一旦获得了轮胎，它就会使用键路径的剩余部分 `\"pressure\"`（这里指这个字符串）向\
    \ `tires` 对象发送 `valueForKeyPath:` 消息。`NSArray` 通过遍历其内容并向每个对象发送消息来实现 `valueForKeyPath:`。因此，`NSArray`\
    \ 会向其内部的每个轮胎发送一个键路径为 `\"pressure\"` 的 `valueForKeyPath:` 消息，结果返回用 `NSNumber` 装箱的轮胎气压。非常方便！\n\
    \n不幸的是，你无法在键路径中对这些数组进行索引，比如使用 `\"tires[0].pressure\"` 来获取第一个轮胎。\n\n### 中途补给\n\n\
    在进入下一节键值的好东西之前，我们将添加一个新类，名为 `Garage`，它将存放一批经典汽车。你可以在此项目中找到所有相关内容：`16.02 Car-Value-Garaging`。以下是\
    \ `Garage` 的接口：\n\n```\n#import <Cocoa/Cocoa.h>\n\n@class Car;\n\n@interface Garage\
    \ : NSObject\n{\n    NSString *name;\n    NSMutableArray *cars;\n}\n\n@property\
    \ (readwrite, copy) NSString *name;\n- (void) addCar: (Car *) car;\n- (void) print;\n\
    \n@end // Garage\n```\n\n这里没有什么新内容。我们前向声明了 `Car`，因为我们只需要知道它是一个对象类型，可以用作 `-addCar:`\
    \ 方法的参数。`name` 是一个属性，`@property` 语句表示 `Garage` 的用户可以访问和修改 `name`。还有一个用于打印内容的方法。为了实现一个汽车集合，我们在后台使用了一个可变数组。\n\
    \n实现也同样简单明了：\n\n```\n#import \"Garage.h\"\n\n@implementation Garage\n\n@synthesize\
    \ name;\n\n- (void) addCar: (Car *) car\n{\n    if (cars == nil)\n    {\n    \
    \    cars = [[NSMutableArray alloc] init];\n    }\n    [cars addObject: car];\n\
    } // addCar\n\n- (void) dealloc\n{\n    [name release];\n    [cars release];\n\
    \    [super dealloc];\n} // dealloc\n\n- (void) print\n{\n    NSLog (@\"%@:\"\
    , name);\n```\n"
