    \ fix the issue before the conversion can proceed.\n\n## Ownership Has Its Privileges\n\
    \nOne of the requirements we discussed earlier is that pointers in `ARC` code\
    \ must be retainable object pointers (`ROPs`). This means, for example, that you\
    \ can’t simply assign an `ROP` to a non-`ROP`, because that transfers ownership\
    \ of the pointer. Consider the following code:\n\n```\nNSString *theString = @\"\
