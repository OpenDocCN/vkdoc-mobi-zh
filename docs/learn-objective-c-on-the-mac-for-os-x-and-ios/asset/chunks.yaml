    folding** is another name for this kind of feature. Check out the Editor

    ![image](images/9781430241881_arrow_fmt.jpg) Code Folding menu for a lot of additional
    options.


    The Navigation Bar Is Open


    At the top of the code editor is a little ribbon of controls, shown in [Figure
    7-20](#9781430241881_Ch7.xhtml#_FIG20), known as the **navigation bar**. Many
    of its controls are there to let you quickly bounce around your source files in
    the project.


    ![9781430241881_Fig07-20.tif](images/9781430241881_Fig07-20_fmt.jpg)


    [Figure 7-20](#9781430241881_Ch7.xhtml#FIG20). The navigation bar


    At the far left, you have a menu button, which provides quick access to recent
    history for the editor and some other advanced goodies. Next are backward and
    forward buttons that let you cycle through the history of files you’ve had open
    during this editing session. They work like Safari’s back and forward arrows.
    Next to those buttons is a path that shows the current file (*Car.m*) and its
    position in the project, rather than its directory path. Each entry in the path
    is a button; click one, and you get a pop-up menu for navigation.


    The last item in the navigation bar is the function menu. It shows that the insertion
    point is currently in the method -setTire:atlndex:. Click the menu to see all
    the interesting symbols, as shown in [Figure 7-21](#9781430241881_Ch7.xhtml#_FIG21).


    ![9781430241881_Fig07-21.tif](images/9781430241881_Fig07-21_fmt.jpg)


    [Figure 7-21](#9781430241881_Ch7.xhtml#FIG21). Symbols in the file


    -setTire:atIndex: is highlighted, because that’s where the insertion point is.
    You can see the other methods above and below it, sorted by their order of appearance
    in the file. You can ![image](images/Rangoli1.jpg)-click the function menu to
    see it sorted alphabetically.


    In addition to method names, you can add your own items to this menu. There are
    a couple of different ways to add items One way is to use #pragma mark whatever
    to put the string *whatever* into the menu. This is handy for adding human-readable
    anchors for you and other biological life forms to see and use. #pragma mark -
    (minus sign) puts a separator line into the menu. Xcode also looks in comments
    that begin with the specific strings MARK:, TODO:, FIXME:, !!!:, and ???:. Xcode
    adds this text to the function menu too. These are all programmer signals for
    “better come back and look at this before you inflict this program on an unsuspecting
    public.”


    **Note**  “Pragma” comes from a Greek word meaning “action.” #pragma is a way
    to pass on information or instructions to compilers and code editors that are
    outside of the usual lines of Objective-C code. Pragmas are usually ignored, but
    they may have meaning to tools used in software development. If a tool does not
    understand a pragma, the tool should nod, smile, and ignore it, without generating
    a warning or an error.


    Getting Information


    Bouncing around your code and the Cocoa header files is all fine and dandy, but
    sometimes, you need to get some information from outside your own code. Luckily,
    Xcode comes with a treasure trove of documentation and reference material (explaining
    what a trove is beyond the scope of this book).


    A Little Help, Please


    The inspector has two icons at the top. So far in our explorations, the first
    one has been selected, and the inspector has been showing attributes about the
    current file. The other icon enables Quick Help in the inspector. To use Quick
    Help, click something in your code and see what appears in the inspector. If you
    click somewhere else in the source, the quick help panel updates itself.


    For instance, say you have your insertion point inside of the word *NSString*.
    Quick Help will look like [Figure 7-22](#9781430241881_Ch7.xhtml#_FIG22).


    ![9781430241881_Fig07-22.tif](images/9781430241881_Fig07-22_fmt.jpg)


    [Figure 7-22](#9781430241881_Ch7.xhtml#FIG22). Quick Help


    There’s a huge amount of information available. The first two items bring up the
    NSString class reference documentation in the documentation window. The *NSString.h*
    item brings up the header file in the editor.


    The Abstract section describes the class. If you had your cursor in the middle
    of a method call, this section would describe the method, along with related calls.
    There are pointers to higher level documentation and some code samples that use
    NSString a lot. Words in blue are links you can click to get more information.
    You can also get more from Quick Help by option-clicking the symbol. If you do,
    you’ll see something like [Figure 7-23](#9781430241881_Ch7.xhtml#_FIG23). For
    still more, click the book icon in the upper-right corner to open the documentation
    for that symbol.


    ![9781430241881_Fig07-23.tif](images/9781430241881_Fig07-23_fmt.jpg)


    [Figure 7-23](#9781430241881_Ch7.xhtml#FIG23). We clicked NSString and got more
    info about it, as promised


    Is There a Documentor in the House?


    If you want to go directly to Apple’s official documentation for an API, a very
    fast way to do that is to option–double-click a symbol. This is simply a shortcut
    for doing a documentation search for that symbol.


    Say you had a line of code like [someString UTF8String], which converts someString
    (an NSString) into a C-style string expressed in Unicode. If you option–double-click
    UTF8String, the documentation browser opens and searches for UTF8String, as shown
    in [Figure 7-24](#9781430241881_Ch7.xhtml#_FIG24).


    ![9781430241881_Fig07-24.tif](images/9781430241881_Fig07-24_fmt.jpg)


    [Figure 7-24](#9781430241881_Ch7.xhtml#FIG24). The Xcode documentation window


    That window is mighty busy, and it packs in a lot of information. In the upper-left
    corner is a search box, which comes prepopulated with UTF8String. The ribbon of
    buttons underneath the toolbar lets you refine which documentation sets are searched.
    You can look at all documentation, or just OS X or iOS documentation.


    Below the button ribbon is a pane (on the left) that contains documentation sets
    and a set of bookmarks. You can add bookmarks to specific chunks of documentation
    by using the pop-up menu. Documentation bookmarks are global to Xcode and are
    not limited to a specific project.


    On the left pane of the window at the top is a browser showing all the search
    matches. In [Figure 7-24](#9781430241881_Ch7.xhtml#_FIG24), it shows three methods
    and a constant. The most interesting is the last one, UTF8, which is the call
    we’re actually making here. You will also notice that there are multiple version
    of the same item listed. This is because you might have multiple sets of documents
    installed: iOS, OS X, or other. Pick the documents for the platform you’re interested
    in. Keep in mind that some methods may not be available on all platforms.


    Below that is a browser that shows the documents. It’s kind of a small area for
    reading documentation, but it’s easy to open the documentation into another Xcode
    window or even into a web browser.


