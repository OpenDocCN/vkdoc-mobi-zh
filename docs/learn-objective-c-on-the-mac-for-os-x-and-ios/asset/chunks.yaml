- fmt: "`Paper Car`，一辆 1965 年款普利茅斯 Valiant，有 2 个车门，里程 76800.0 英里，105 马力以及 4 个轮胎。\n\
    \n谓词字符串中的运算符不区分大小写。你可以随意使用 `AnD`、`ANd`、`AND` 或 `and`。此处我们将全部使用大写字母，但在实际代码中你无需如此。\n\
    \n不等关系同样适用于数值和字符串值。要查看按字母表顺序排列的所有汽车，请使用以下谓词：\n\n```\npredicate = [NSPredicate\
    \ predicateWithFormat: @\"name < 'Newton'\"];\nresults = [cars filteredArrayUsingPredicate:\
    \ predicate];\nNSLog (@\"%@\", [results valueForKey: @\"name\"]);\n```\n\n```\n\
    (\n    Herbie,\n    Badger,\n    Elvis,\n    Judge\n)\n```\n\n## 数组运算符\n\n谓词字符串\
    \ `(engine.horsepower > 50) OR (engine.horsepower < 200)` 是一种非常常见的模式。我们正在寻找马力值介于这两个数字之间的结果。如果我们能使用一个运算符来查看介于两个值之间的内容，那岂不是很酷？事实证明，我们可以这样做：\n\
    \n```\npredicate = [NSPredicate predicateWithFormat:\n@\"engine.horsepower BETWEEN\
    \ { 50, 200 }\"];\n```\n\n花括号表示一个数组，而 `BETWEEN` 将数组的第一个元素视为下限，第二个元素视为上限。\n\n你可以通过使用\
    \ `%@` 格式说明符来插入你自己的 `NSArray` 对象：\n\n```\nNSArray *betweens = [NSArray arrayWithObjects:\n\
    \    [NSNumber numberWithInt: 50],\n    [NSNumber numberWithInt: 200], nil];\n\
    predicate = [NSPredicate predicateWithFormat:\n    @\"engine.horsepower BETWEEN\
    \ %@\", betweens];\n```\n\n你也可以使用变量：\n\n```\npredicateTemplate =\n    [NSPredicate\
    \ predicateWithFormat: @\"engine.horsepower BETWEEN $POWERS\"];\nvarDict =\n \
    \   [NSDictionary dictionaryWithObjectsAndKeys: betweens, @\"POWERS\", nil];\n\
    predicate = [predicateTemplate predicateWithSubstitutionVariables: varDict];\n\
    ```\n\n数组的用途不仅限于指定区间的端点。你可以使用 `IN` 运算符来检查某个特定值是否包含在数组中。这对于有 SQL 经验的程序员来说应该很熟悉：\n\
    \n```\npredicate = [NSPredicate predicateWithFormat:\n    @\"name IN { 'Herbie',\
    \ 'Snugs', 'Badger', 'Flap' }\"];\n```\n\n我们有一些名为 Herbie 和 Badger 的汽车，因此它们会通过过滤：\n\
    \n```\nresults = [cars filteredArrayUsingPredicate: predicate];\nNSLog (@\"%@\"\
    , [results valueForKey: @\"name\"]);\n```\n\n果然，这只返回了两个结果：\n\n```\n(\n    Herbie,\n\
    \    Badger\n)\n```\n\n## 自引用（SELF）\n\n有时，你会对简单的值应用谓词，例如普通的字符串，而不是可以通过键路径操作的复杂对象。假设我们有一个汽车名称的数组，并且想要应用之前使用的相同过滤器。既然\
    \ `NSString` 在请求其 `name` 时表现不佳，那么我们应该用什么呢？\n\n`SELF` 可解此忧！`SELF` 指的是正在被谓词评估的对象。实际上，我们可以将所有键路径表达为相对于\
    \ `SELF` 的形式。以下谓词与上一个完全相同：\n\n```\npredicate = [NSPredicate predicateWithFormat:\n\
    \    @\"SELF.name IN { 'Herbie', 'Snugs', 'Badger', 'Flap' }\"];\n```\n\n现在，回到那个字符串数组。我们如何判断一个字符串是否也在那个名称数组中呢？让我们来看一下。\n\
    \n首先，你需要从某处获取仅包含名称的数组。由于我们已经深入涉及 `CarParts`，我们将通过使用针对数组的 `valueForKey:` 的 KVC\
    \ 技巧来处理它们：\n\n```\nnames = [cars valueForKey: @\"name\"];\n```\n\n这是一个包含我们拥有的所有汽车名称的字符串数组。接下来，创建一个谓词：\n\
    \n```\npredicate = [NSPredicate predicateWithFormat:\n    @\"SELF IN { 'Herbie',\
    \ 'Snugs', 'Badger', 'Flap' }\"];\n```\n\n然后，对其进行评估：\n\n```\nresults = [names\
    \ filteredArrayUsingPredicate: predicate];\n```\n\n如果你现在查看结果，它和我们之前看到的两个名称相同：`Herbie`\
    \ 和 `Badger`。这是一个小测验。以下代码会产生什么输出？\n\n```\nNSArray *names1 = [NSArray arrayWithObjects:\n\
    \    @\"Herbie\", @\"Badger\", @\"Judge\", @\"Elvis\", nil];\nNSArray *names2\
    \ = [NSArray arrayWithObjects:\n    @\"Judge\", @\"Paper Car\", @\"Badger\", @\"\
    Phoenix\", nil];\npredicate = [NSPredicate predicateWithFormat: @\"SELF IN %@\"\
    , names1];\nresults = [names2 filteredArrayUsingPredicate: predicate];\nNSLog\
    \ (@\"%@\", results);\n```\n\n以下是答案：\n\n```\n(\n    Judge,\n    Badger\n)\n```\n\
    \n这是一种获取两个数组交集的好方法。好了，它是如何工作的呢？该谓词包含了第一个数组的内容，因此它看起来像这样：\n\n`SELF IN {\"Herbie\"\
    , \"Badger\", \"Judge\", \"Elvis\"}`\n\n现在，第二个名称数组使用此谓词进行过滤。同时存在于两个数组中的字符串将位于\
    \ `names2` 中，并且会导致 `SELF IN` 子句返回真，因此该字符串将出现在结果数组中。仅在第二个数组中的对象将被丢弃，因为它们与谓词中的任何字符串都不匹配。仅在第一个数组中的字符串则会留在原地等待比较，但永远不会进入结果。\n\
    \n## 字符串操作\n\n你之前看到的关系运算符同样适用于字符串。还有一些特定于字符串的运算符，如[表 20-2](#9781430241881_Ch20.xhtml#tb2)\
    \ 所示。\n\n[表 20-2](#9781430241881_Ch20.xhtml#tab2). 字符串专用运算符\n\n| 运算符 | 含义 |\n\
    | --- | --- |\n| `BEGINSWITH` | 检查一个字符串是否以另一个字符串开头。 |\n| `ENDSWITH` | 检查一个字符串是否以另一个字符串结尾。\
    \ |\n| `CONTAINS` | 检查一个字符串是否包含在另一个字符串内部某处。 |\n\n使用关系运算符可以让你实现一些技巧，例如使用 `name\
    \ BEGINSWITH 'Bad'` 来匹配 `Badger`，使用 `name ENDSWITH 'vis'` 来匹配 `Elvis`，以及使用 `name\
    \ CONTAINS 'udg'` 来匹配 `Judge`。\n\n如果你编写一个像 `name BEGINSWITH 'HERB'` 这样的谓词字符串会发生什么？这不会匹配\
    \ `Herbie` 或任何其他内容，因为这些匹配是区分大小写的。同样地，`name BEGINSWITH 'Hérb'` 也不会匹配，因为字母“e”带有重音符号。为了放宽名称匹配的规则，我们可以用\
    \ `[c]`、`[d]` 或 `[cd]` 来修饰这些运算符。其中 `c` 代表“不区分大小写”，`d` 代表“不区分变音符号”（即忽略重音符号），而 `[cd]`\
    \ 则两者兼具。通常，除非有充分理由需要区分大小写和重音，否则你会使用 `[cd]`。你永远不知道用户何时会粘住大写锁定键，最终以全大写字母与你的应用对话。\n\
    \n以下谓词字符串将匹配 `Herbie`：`name BEGINSWITH[cd] 'HERB'`\n\n## 像 (LIKE) 一样匹配，确实如此\n\n\
    有时，在字符串的开头、结尾或中间进行字符串匹配还不够强大。对于这些情况，谓词格式字符串包含了 `LIKE` 运算符。使用此运算符时，问号匹配一个字符，而星号匹配任意数量的字符。SQL\
    \ 和 Unix shell 程序员会识别出这种行为（有时称为“通配符匹配”）。\n\n谓词字符串 `name LIKE '*er*'` 将匹配任何名称中间包含“er”的字符串。这等价于\
    \ `CONTAINS`。\n\n谓词字符串 `name LIKE '???er*'` 将匹配 `Paper Car`，因为它有三个字符，后跟“er”，以及“er”后的任意数量字符。它不匹配\
    \ `Badger`，因为后者在“er”之前有四个字符。\n\n`LIKE` 也接受 `[cd]` 修饰符以实现大小写和变音符号的不敏感匹配。\n\n如果你对正则表达式感兴趣，可以使用\
    \ `MATCHES` 运算符。给它一个正则表达式，谓词就会对其进行评估。\n\n表达你自己：正则表达式是一种非常强大、非常紧凑地指定字符串匹配逻辑的方式。有时，正则表达式会变得复杂难懂，相关主题的书籍也层出不穷。`NSPredicate`\
    \ 的正则表达式使用国际组件 for Unicode (ICU) 语法，你可以通过你最喜欢的互联网搜索引擎来了解它。\n\n虽然正则表达式非常强大，但它们在计算上也可能很昂贵。如果你的谓语中有更简单的操作，例如基本字符串运算符和比较运算符，请在使用\
    \ `MATCHES` 之前先执行这些操作。这应该能给你带来速度上的提升。\n\n## 就这些，各位"
  raw: 'Paper Car, a 1965 Plymouth Valiant, has 2 doors, 76800.0 miles, 105 hp and
    4 tires


    Operators in predicate strings are case insensitive. You can use AnD, ANd, AND,
    or and at your whim. We’ll be using all capitals here, but you don’t have to in
    real code.


    The inequalities work with numeric values and string values as well. To see all
    the cars from the beginning of the alphabet, use this predicate:


    predicate = [NSPredicate predicateWithFormat: @"name < ''Newton''"];


    results = [cars filteredArrayUsingPredicate: predicate];


    NSLog (@"%@", [results valueForKey: @"name"]);


    (


    Herbie,


    Badger,


    Elvis,


    Judge


    )


    Array Operators


    The predicate string "(engine.horsepower > 50) OR (engine.horsepower < 200)" is
    a pretty common pattern. We’re looking for horsepower values between these two
    numbers. Wouldn’t it be cool if we could use an operator to see what’s BETWEEN
    two values? Turns out we can:


    predicate = [NSPredicate predicateWithFormat:


    @"engine.horsepower BETWEEN { 50, 200 }"];


    The curly braces denote an array, and BETWEEN treats the first element of the
    array is the lower bound and the second element as the upper bound.


    You can plug in your own NSArrays by using the %@ format specifier:


    NSArray *betweens = [NSArray arrayWithObjects:


    [NSNumber numberWithInt: 50],


    [NSNumber numberWithInt: 200], nil];


    predicate = [NSPredicate predicateWithFormat:


    @"engine.horsepower BETWEEN %@", betweens];


    You can use variables too:


    predicateTemplate =


    [NSPredicate predicateWithFormat: @"engine.horsepower BETWEEN $POWERS"];


    varDict =


    [NSDictionary dictionaryWithObjectsAndKeys: betweens, @"POWERS", nil];


    predicate = [predicateTemplate predicateWithSubstitutionVariables: varDict];


    Arrays have more uses than just specifying the endpoints of an interval. You can
    use the IN operator to see if a particular value is contained in an array. This
    should be familiar to programmers with SQL experience:


    predicate = [NSPredicate predicateWithFormat:


    @"name IN { ''Herbie'', ''Snugs'', ''Badger'', ''Flap'' }"];


    We have cars named Herbie and Badger, so those will survive a filtering:


    results = [cars filteredArrayUsingPredicate: predicate];


    NSLog (@"%@", [results valueForKey: @"name"]);


    Sure enough, this only returns two:


    (


    Herbie,


    Badger


    )


    SELF Sufficient


    Sometimes, you’ll be applying predicates to simple values, like plain old string
    strings, rather than fancy objects that can be manipulated with key paths. Say
    we have an array of the car names, and we want to apply the same filter we used
    previously. What would we use in place of name, since NSString does not react
    well when you ask it for a name?


    SELF to the rescue! SELF refers to the object being evaluated by the predicate.
    In fact, we can express all of our key paths in the predicates as being relative
    to SELF. This predicate is exactly the same as the previous one:


    predicate = [NSPredicate predicateWithFormat:


    @"SELF.name IN { ''Herbie'', ''Snugs'', ''Badger'', ''Flap'' }"];


    Now, back to that array of strings. How do we tell if a string is also in that
    array of names? Let’s take a look.


    First, you’ll need that array of just the names from somewhere. Since we’re already
    hip-deep in CarParts, we’ll deal with those, using the KVC trick of getting the
    valueForKey: against an array:


    names = [cars valueForKey: @"name"];


    This is an array of strings containing all the names of the cars we own. Next,
    make a predicate:


    predicate = [NSPredicate predicateWithFormat:


    @"SELF IN { ''Herbie'', ''Snugs'', ''Badger'', ''Flap'' }"];


    And then, evaluate it:


    results = [names filteredArrayUsingPredicate: predicate];


    If you look at results now, it’s the same two names we’ve seen before: Herbie
    and Badger. Here’s a quiz. What output is produced by the following?


    NSArray *names1 = [NSArray arrayWithObjects:


    @"Herbie", @"Badger", @"Judge", @"Elvis", nil];


    NSArray *names2 = [NSArray arrayWithObjects:


    @"Judge", @"Paper Car", @"Badger", @"Phoenix", nil];


    predicate = [NSPredicate predicateWithFormat: @"SELF IN %@", names1];


    results = [names2 filteredArrayUsingPredicate: predicate];


    NSLog (@"%@", results);


    Here’s the answer:


    (


    Judge,


    Badger


    )


    This is a clever way of taking the intersection of two arrays. OK, so how does
    it work? The predicate includes the contents of the first array, so it looks something
    like


    SELF IN {"Herbie", "Badger", "Judge", "Elvis"}


    Now, the second name array is filtered with this predicate. Strings that are in
    both arrays will be in names2 and will cause the SELF IN clause to say it’s true,
    so the string will be in the results array. Objects only in the second array will
    get dropped on the floor, since they won’t match any of the strings in the predicate.
    Strings only in the first array will just sit there, waiting to be compared against
    and will never make it into the results.


    String Operations


    The relational operators you saw before work with strings. There are also some
    that are string-specific, as shown in [Table 20-2](#9781430241881_Ch20.xhtml#tb2).


    [Table 20-2](#9781430241881_Ch20.xhtml#tab2). String-Specific Operators


    | Operator | Meaning |

    | --- | --- |

    | BEGINSWITH | Check whether a string begins with another string. |

    | ENDSWITH | Check whether a string ends with another string. |

    | CONTAINS | Check whether a string lives somewhere inside another string. |


    Using relational operators lets you do tricks like using "name BEGINSWITH ''Bad''"
    to match "Badger", "name ENDSWITH ''vis''" to match "Elvis", and "name CONTAINS
    udg" to match "Judge".


    What happens if you write a predicate string like "name BEGINSWITH ''HERB''"?
    This won’t match "Herbie" or anything else, because these matches are case sensitive.
    Likewise, "name BEGINSWITH ''Hérb''" won’t match, because the “e” has an accent
    mark. To relax the rules for name matching here, we can decorate these operators
    with [c], [d], or [cd]. The c stands for “case insensitive,” the d for “diacritic
    insensitive” (that is, ignoring accent marks), and [cd] for both. Usually, you’ll
    use [cd] unless there’s a good reason to be case and accent sensitive. You never
    know when a user will have a sticky caps lock key and end up talking to your application
    IN ALL CAPS.


    This predicate string will match Herbie: "name BEGINSWITH[cd] ''HERB''"


    Like, Fer Sure


    Sometimes, doing string matches at the beginning or end (or middle) of a string
    isn’t powerful enough. For these situations, the predicate format string includes
    the LIKE operator. With this operator, a question mark matches one character,
    and an asterisk matches any number of characters. SQL and Unix shell programmers
    will recognize this behavior (sometimes called “globbing”).


    The predicate string "name LIKE ''*er*''" will match any name that has “er” in
    the middle of it. This is equivalent to CONTAINS.


    The predicate string "name LIKE ''???er*''" will match “Paper Car”, because it
    has three characters, an “er”, and any number of characters after the “er”. It
    does not match “Badger” because that has four characters before the “er”.


    LIKE also accepts the [cd] decoration for case and diacritic insensitivity.


    If you’re into regular expressions, you can use the MATCHES operator. Give it
    a regular expression, and the predicate will evaluate it.


    Express Yourself Regular expressions are a very powerful, very compact way of
    specifying string-matching logic. Sometimes, regular expressions can become dense
    and obscure, and entire books have been written on the subject. The NSPredicate
    regular expressions use the International Components for Unicode (ICU) syntax,
    which you can learn about with the help of your favorite Internet search engine.


    While regular expressions are powerful, they also can be computationally expensive.
    If you have simpler operations in your predicate, such as the basic string operators
    and comparison operators, perform those first before using MATCHES. That should
    give you a speed boost.


    That’s All, Folks'
  trans: "\n`Paper Car`，一辆 1965 年款普利茅斯 Valiant，有 2 个车门，里程 76800.0 英里，105 马力以及 4 个轮胎。\n\
    \n谓词字符串中的运算符不区分大小写。你可以随意使用 `AnD`、`ANd`、`AND` 或 `and`。此处我们将全部使用大写字母，但在实际代码中你无需如此。\n\
    \n不等关系同样适用于数值和字符串值。要查看按字母表顺序排列的所有汽车，请使用以下谓词：\n\n```\npredicate = [NSPredicate\
    \ predicateWithFormat: @\"name < 'Newton'\"];\nresults = [cars filteredArrayUsingPredicate:\
    \ predicate];\nNSLog (@\"%@\", [results valueForKey: @\"name\"]);\n```\n\n```\n\
    (\n    Herbie,\n    Badger,\n    Elvis,\n    Judge\n)\n```\n\n## 数组运算符\n\n谓词字符串\
    \ `(engine.horsepower > 50) OR (engine.horsepower < 200)` 是一种非常常见的模式。我们正在寻找马力值介于这两个数字之间的结果。如果我们能使用一个运算符来查看介于两个值之间的内容，那岂不是很酷？事实证明，我们可以这样做：\n\
    \n```\npredicate = [NSPredicate predicateWithFormat:\n@\"engine.horsepower BETWEEN\
    \ { 50, 200 }\"];\n```\n\n花括号表示一个数组，而 `BETWEEN` 将数组的第一个元素视为下限，第二个元素视为上限。\n\n你可以通过使用\
    \ `%@` 格式说明符来插入你自己的 `NSArray` 对象：\n\n```\nNSArray *betweens = [NSArray arrayWithObjects:\n\
    \    [NSNumber numberWithInt: 50],\n    [NSNumber numberWithInt: 200], nil];\n\
    predicate = [NSPredicate predicateWithFormat:\n    @\"engine.horsepower BETWEEN\
    \ %@\", betweens];\n```\n\n你也可以使用变量：\n\n```\npredicateTemplate =\n    [NSPredicate\
    \ predicateWithFormat: @\"engine.horsepower BETWEEN $POWERS\"];\nvarDict =\n \
    \   [NSDictionary dictionaryWithObjectsAndKeys: betweens, @\"POWERS\", nil];\n\
    predicate = [predicateTemplate predicateWithSubstitutionVariables: varDict];\n\
    ```\n\n数组的用途不仅限于指定区间的端点。你可以使用 `IN` 运算符来检查某个特定值是否包含在数组中。这对于有 SQL 经验的程序员来说应该很熟悉：\n\
    \n```\npredicate = [NSPredicate predicateWithFormat:\n    @\"name IN { 'Herbie',\
    \ 'Snugs', 'Badger', 'Flap' }\"];\n```\n\n我们有一些名为 Herbie 和 Badger 的汽车，因此它们会通过过滤：\n\
    \n```\nresults = [cars filteredArrayUsingPredicate: predicate];\nNSLog (@\"%@\"\
    , [results valueForKey: @\"name\"]);\n```\n\n果然，这只返回了两个结果：\n\n```\n(\n    Herbie,\n\
    \    Badger\n)\n```\n\n## 自引用（SELF）\n\n有时，你会对简单的值应用谓词，例如普通的字符串，而不是可以通过键路径操作的复杂对象。假设我们有一个汽车名称的数组，并且想要应用之前使用的相同过滤器。既然\
    \ `NSString` 在请求其 `name` 时表现不佳，那么我们应该用什么呢？\n\n`SELF` 可解此忧！`SELF` 指的是正在被谓词评估的对象。实际上，我们可以将所有键路径表达为相对于\
    \ `SELF` 的形式。以下谓词与上一个完全相同：\n\n```\npredicate = [NSPredicate predicateWithFormat:\n\
    \    @\"SELF.name IN { 'Herbie', 'Snugs', 'Badger', 'Flap' }\"];\n```\n\n现在，回到那个字符串数组。我们如何判断一个字符串是否也在那个名称数组中呢？让我们来看一下。\n\
    \n首先，你需要从某处获取仅包含名称的数组。由于我们已经深入涉及 `CarParts`，我们将通过使用针对数组的 `valueForKey:` 的 KVC\
    \ 技巧来处理它们：\n\n```\nnames = [cars valueForKey: @\"name\"];\n```\n\n这是一个包含我们拥有的所有汽车名称的字符串数组。接下来，创建一个谓词：\n\
    \n```\npredicate = [NSPredicate predicateWithFormat:\n    @\"SELF IN { 'Herbie',\
    \ 'Snugs', 'Badger', 'Flap' }\"];\n```\n\n然后，对其进行评估：\n\n```\nresults = [names\
    \ filteredArrayUsingPredicate: predicate];\n```\n\n如果你现在查看结果，它和我们之前看到的两个名称相同：`Herbie`\
    \ 和 `Badger`。这是一个小测验。以下代码会产生什么输出？\n\n```\nNSArray *names1 = [NSArray arrayWithObjects:\n\
    \    @\"Herbie\", @\"Badger\", @\"Judge\", @\"Elvis\", nil];\nNSArray *names2\
    \ = [NSArray arrayWithObjects:\n    @\"Judge\", @\"Paper Car\", @\"Badger\", @\"\
    Phoenix\", nil];\npredicate = [NSPredicate predicateWithFormat: @\"SELF IN %@\"\
    , names1];\nresults = [names2 filteredArrayUsingPredicate: predicate];\nNSLog\
    \ (@\"%@\", results);\n```\n\n以下是答案：\n\n```\n(\n    Judge,\n    Badger\n)\n```\n\
    \n这是一种获取两个数组交集的好方法。好了，它是如何工作的呢？该谓词包含了第一个数组的内容，因此它看起来像这样：\n\n`SELF IN {\"Herbie\"\
    , \"Badger\", \"Judge\", \"Elvis\"}`\n\n现在，第二个名称数组使用此谓词进行过滤。同时存在于两个数组中的字符串将位于\
    \ `names2` 中，并且会导致 `SELF IN` 子句返回真，因此该字符串将出现在结果数组中。仅在第二个数组中的对象将被丢弃，因为它们与谓词中的任何字符串都不匹配。仅在第一个数组中的字符串则会留在原地等待比较，但永远不会进入结果。\n\
    \n## 字符串操作\n\n你之前看到的关系运算符同样适用于字符串。还有一些特定于字符串的运算符，如表 20-2 所示。\n\n表 20-2. 字符串专用运算符\n\
    \n| 运算符 | 含义 |\n| --- | --- |\n| `BEGINSWITH` | 检查一个字符串是否以另一个字符串开头。 |\n| `ENDSWITH`\
    \ | 检查一个字符串是否以另一个字符串结尾。 |\n| `CONTAINS` | 检查一个字符串是否包含在另一个字符串内部某处。 |\n\n使用关系运算符可以让你实现一些技巧，例如使用\
    \ `name BEGINSWITH 'Bad'` 来匹配 `Badger`，使用 `name ENDSWITH 'vis'` 来匹配 `Elvis`，以及使用\
    \ `name CONTAINS 'udg'` 来匹配 `Judge`。\n\n如果你编写一个像 `name BEGINSWITH 'HERB'` 这样的谓词字符串会发生什么？这不会匹配\
    \ `Herbie` 或任何其他内容，因为这些匹配是区分大小写的。同样地，`name BEGINSWITH 'Hérb'` 也不会匹配，因为字母“e”带有重音符号。为了放宽名称匹配的规则，我们可以用\
    \ `[c]`、`[d]` 或 `[cd]` 来修饰这些运算符。其中 `c` 代表“不区分大小写”，`d` 代表“不区分变音符号”（即忽略重音符号），而 `[cd]`\
    \ 则两者兼具。通常，除非有充分理由需要区分大小写和重音，否则你会使用 `[cd]`。你永远不知道用户何时会粘住大写锁定键，最终以全大写字母与你的应用对话。\n\
    \n以下谓词字符串将匹配 `Herbie`：`name BEGINSWITH[cd] 'HERB'`\n\n## 像 (LIKE) 一样匹配，确实如此\n\n\
    有时，在字符串的开头、结尾或中间进行字符串匹配还不够强大。对于这些情况，谓词格式字符串包含了 `LIKE` 运算符。使用此运算符时，问号匹配一个字符，而星号匹配任意数量的字符。SQL\
    \ 和 Unix shell 程序员会识别出这种行为（有时称为“通配符匹配”）。\n\n谓词字符串 `name LIKE '*er*'` 将匹配任何名称中间包含“er”的字符串。这等价于\
    \ `CONTAINS`。\n\n谓词字符串 `name LIKE '???er*'` 将匹配 `Paper Car`，因为它有三个字符，后跟“er”，以及“er”后的任意数量字符。它不匹配\
    \ `Badger`，因为后者在“er”之前有四个字符。\n\n`LIKE` 也接受 `[cd]` 修饰符以实现大小写和变音符号的不敏感匹配。\n\n如果你对正则表达式感兴趣，可以使用\
    \ `MATCHES` 运算符。给它一个正则表达式，谓词就会对其进行评估。\n\n表达你自己：正则表达式是一种非常强大、非常紧凑地指定字符串匹配逻辑的方式。有时，正则表达式会变得复杂难懂，相关主题的书籍也层出不穷。`NSPredicate`\
    \ 的正则表达式使用国际组件 for Unicode (ICU) 语法，你可以通过你最喜欢的互联网搜索引擎来了解它。\n\n虽然正则表达式非常强大，但它们在计算上也可能很昂贵。如果你的谓语中有更简单的操作，例如基本字符串运算符和比较运算符，请在使用\
    \ `MATCHES` 之前先执行这些操作。这应该能给你带来速度上的提升。\n\n## 就这些，各位\n"
- fmt: "# This discussion of predicates wraps up *Learn Objective-C*\n\nWe’ve covered\
    \ a lot of ground, from indirection and the basics of object-oriented programming,\
    \ all the way through sophisticated tools like key-value coding and filtering\
    \ objects with `NSPredicate`. Congratulations on surviving this entire book! You\
    \ are now officially ready to tackle the next stage of your iOS and OS X programming\
    \ career. Thank you for joining us.\n\n## Appendix A: Coming to Objective-C from\
    \ Other Languages\n\nMany programmers come to Objective-C and Cocoa from other\
    \ languages and have a hard time learning Objective-C because it behaves differently\
    \ from most other popular languages. New Objective-C programmers often assert\
    \ that Objective-C is a bad language because it does not have behaviors X, Y,\
    \ Z, which TheirFavoriteLanguage has. And feature checklists aside, let's face\
    \ it: in some respects, Objective-C is just plain weird.\n\nThe advice we can\
    \ offer new Objective-C and Cocoa programmers—even those with years of experience\
    \ in other languages and other platforms—is to set aside any preconceived notions\
    \ of how things are *supposed to* work and accept Objective-C, Cocoa, and Xcode\
    \ on their own terms for a while. Work through a few books and tutorials. Once\
    \ you have some Objective-C experience under your belt, you can see which techniques\
    \ and approaches from other languages apply to Cocoa and Objective-C and which\
    \ ones don't. No language is ideal for all circumstances, and no toolkit is perfect\
    \ for every job. The best things to do are to learn enough to decide if a particular\
    \ language and toolkit will do what you need and be aware of the tradeoffs involved.\n\
    \nIn this appendix, we'll present some information that should help smooth your\
    \ transition from other popular languages to Objective-C.\n\n### Coming from C\n\
    \nObjective-C is just plain old C with a few additional features for handling\
    \ object orientation. The bulk of this book describes these extra features, so\
    \ we won't repeat everything here. But a couple of interesting topics are worth\
    \ covering.\n\nRemember that Objective-C programmers get access to all the goodies\
    \ that come with C, such as the standard C library. For example, you are welcome\
    \ to use `malloc()` and `free()` to deal with dynamic memory or `fopen()` and\
    \ `fgets()` for handling files.\n\nOccasionally, someone on the Internet asks,\
    \ “I'm calling an ANSI C library that uses callbacks to do its work. How can I\
    \ have it call a method instead?” This question also comes up when you're using\
    \ low-level Apple frameworks like Core Foundation and Core Graphics.\n\nThe short\
    \ answer is, “You can't.” The callbacks work only for C functions that have the\
    \ signature required by the library. The functions that implement Objective-C\
    \ methods need to have the `self` and `selector` arguments first, so they'll never\
    \ match the required signatures.\n\nMost callback-oriented libraries let you supply\
    \ some user data or a pointer. You can think of this as a rock under which you\
    \ can hide. You give the library some meaningful pointer when you register your\
    \ callback, and the library gives you back your pointer when it calls your callback.\n\
    \nAll Objective-C objects are dynamically allocated, so it's safe to use the address\
    \ of an object as this context pointer. You don't need to worry about some stack-allocated\
    \ object disappearing underneath you. Inside the callback, you cast the context\
    \ pointer into your object type and then start sending it messages.\n\nFor example,\
    \ let's say you're using an imaginary C API XML parsing library, and you feed\
    \ data to a class called `TreeWalker` as the XML file is parsed. Make a new `TreeWalker`:\n\
    \n```objc\nTreeWalker *walker = [[TreeWalker alloc] init];\n```\n\nThen, make\
    \ the XML parser:\n\n```objc\nXMLParser parser;\nparser = XMLParserLoadFile (\"\
    /tmp/badgers.xml\");\n```\n\nSet the callback function (a C function) for the\
    \ parser, and use the `TreeWalker` object as the context:\n\n```objc\nXMLSetParserCallback\
    \ (parser, elementCallback, walker);\n```\n\nThen, as the XML file is parsed,\
    \ the callback is called:\n\n```objc\nvoid elementCallback (XMLParser *parser,\
    \ XMLElement *element, userData *context)\n{\n    TreeWalker *walker = (TreeWalker\
    \ *) context;\n    [walker handleNewElement: element inParser: parser];\n} //\
    \ someElementCallback\n```\n\nYou can see that the context pointer is cast to\
    \ an object pointer, and messages are sent to that object.\n\n### Coming from\
    \ C++\n\nC++ has a lot of features that Objective-C lacks: multiple inheritance,\
    \ namespaces, operator overloading, templates, class variables, abstract classes,\
    \ the Standard Template Library (STL), and so on. If you miss these, Objective-C\
    \ has features and techniques that can replace them, or at least simulate them.\n\
    \nFor example, you can use categories and protocols as a form of multiple inheritance\
    \ or for implementing abstract base classes. One common use for multiple inheritance\
    \ is to provide an interface so that other code can invoke particular methods\
    \ on your object. Categories and protocols are perfect for this pattern. You can\
    \ use protocols to provide pure abstract base classes.\n\nCategories and protocols\
    \ won't help you if you're using multiple inheritance to bring in extra instance\
    \ variables (called **member variables** in C++). To do this, you can use composition\
    \ to include an object in another object and then use stub methods to redirect\
    \ messages to the second object (which is a common technique in Java). You can\
    \ also simulate multiple inheritance by overriding the `forwardInvocation:` method.\
    \ This method gets called if a message is received that the object doesn't know\
    \ how to handle. By examining the `NSInvocation` object, you can see if it should\
    \ be forwarded on to your “multiply inherited” object and then send it if necessary.\
    \ This technique saves you from having to write a lot of little stub methods.\
    \ However, it's much slower than real multiple inheritance and can be a pain to\
    \ set up.\n\nOther conventions can replace still more C++ features, such as stub\
    \ methods that call `abort` for abstract classes that shouldn't be instantiated,\
    \ though some features have weak replacements, such as name prefixes instead of\
    \ namespaces.\n\n#### C++ vtable vs. Objective-C Dynamic Dispatch\n\nOne of the\
    \ biggest differences between C++ and Objective-C is the mechanism of dispatching\
    \ methods (or **member functions**, as they're known in C++). C++ uses a vtable-based\
    \ mechanism for determining what code to invoke for virtual functions.\n\nYou\
    \ can think of each C++ object as having a pointer to an array of function pointers.\
    \ When the compiler sees that the code wants to invoke a virtual function, it\
    \ calculates an offset from the start of the vtable, emits machine code to take\
    \ the function pointer at that offset from the start of the vtable, and uses that\
    \ as the chunk of code to execute. This process requires the compiler to know,\
    \ at compile time, the type of the object that is calling the member function\
    \ so that it can calculate the correct offset into the vtable. This kind of dispatch\
    \ is very fast, requiring just a couple of pointer operations and one read to\
    \ get the function pointer.\n\nThe Objective-C way, described in detail in [Chapter\
    \ 3](#9781430241881_Ch3.xhtml), uses a runtime function to poke around in the\
    \ various class structures searching for the code to invoke. This technique can\
    \ be several times slower than the C++ route.\n\nObjective-C adds flexibility\
    \ and convenience at the expense of speed and safety, which is a classic trade-off.\
    \ With the C++ model, the member function dispatch is fast. It is also very safe,\
    \ because the compiler and linker make sure that the object being used can handle\
    \ that method. But the C++ method can also be inflexible, because you can't change\
    \ the kind of object you're dealing with. You have to use inheritance to allow\
    \ different classes of objects to react to the same message."
  raw: 'This discussion of predicates wraps up *Learn Objective-C*. We’ve covered
    a lot of ground, from indirection and the basics of object-oriented programming,
    all the way through sophisticated tools like key-value coding and filtering objects
    with NSPredicate. Congratulations on surviving this entire book! You are now officially
    ready to tackle the next stage of your iOS and OS X programming career. Thank
    you for joining us.


    Appendix A


    Coming to Objective-C

    from Other Languages


    Many programmers come to Objective-C and Cocoa from other languages and have a
    hard time learning Objective-C because it behaves differently from most other
    popular languages. New Objective-C programmers often assert that Objective-C is
    a bad language because it does not have behaviors X, Y, Z, which TheirFavoriteLanguage
    has. And feature checklists aside, let''s face it: in some respects, Objective-C
    is just plain weird.


    The advice we can offer new Objective-C and Cocoa programmers—even those with
    years of experience in other languages and other platforms—is to set aside any
    preconceived notions of how things are *supposed to* work and accept Objective-C,
    Cocoa, and Xcode on their own terms for a while. Work through a few books and
    tutorials. Once you have some Objective-C experience under your belt, you can
    see which techniques and approaches from other languages apply to Cocoa and Objective-C
    and which ones don''t. No language is ideal for all circumstances, and no toolkit
    is perfect for every job. The best things to do are to learn enough to decide
    if a particular language and toolkit will do what you need and be aware of the
    tradeoffs involved.


    In this appendix, we''ll present some information that should help smooth your
    transition from other popular languages to Objective-C.


    Coming from C


    Objective-C is just plain old C with a few additional features for handling object
    orientation. The bulk of this book describes these extra features, so we won''t
    repeat everything here. But a couple of interesting topics are worth covering.


    Remember that Objective-C programmers get access to all the goodies that come
    with C, such as the standard C library. For example, you are welcome to use malloc()
    and free() to deal with dynamic memory or fopen() and fgets() for handling files.


    Occasionally, someone on the Internet asks, “I''m calling an ANSI C library that
    uses callbacks to do its work. How can I have it call a method instead?” This
    question also comes up when you''re using low-level Apple frameworks like Core
    Foundation and Core Graphics.


    The short answer is, “You can''t.” The callbacks work only for C functions that
    have the signature required by the library. The functions that implement Objective-C
    methods need to have the self and selector arguments first, so they''ll never
    match the required signatures.


    Most callback-oriented libraries let you supply some user data or a pointer. You
    can think of this as a rock under which you can hide. You give the library some
    meaningful pointer when you register your callback, and the library gives you
    back your pointer when it calls your callback.


    All Objective-C objects are dynamically allocated, so it''s safe to use the address
    of an object as this context pointer. You don''t need to worry about some stack-allocated
    object disappearing underneath you. Inside the callback, you cast the context
    pointer into your object type and then start sending it messages.


    For example, let''s say you''re using an imaginary C API XML parsing library,
    and you feed data to a class called TreeWalker as the XML file is parsed. Make
    a new TreeWalker:


    TreeWalker *walker = [[TreeWalker alloc] init];


    Then, make the XML parser:


    XMLParser parser;


    parser = XMLParserLoadFile ("/tmp/badgers.xml");


    Set the callback function (a C function) for the parser, and use the TreeWalker
    object as the context:


    XMLSetParserCallback (parser, elementCallback, walker);


    Then, as the XML file is parsed, the callback is called:


    void elementCallback (XMLParser *parser, XMLElement *element, userData *context)


    {


    TreeWalker *walker = (TreeWalker *) context;


    [walker handleNewElement: element inParser: parser];


    } // someElementCallback


    You can see that the context pointer is cast to an object pointer, and messages
    are sent to that object.


    Coming from C++


    C++ has a lot of features that Objective-C lacks: multiple inheritance, namespaces,
    operator overloading, templates, class variables, abstract classes, the Standard
    Template Library (STL), and so on. If you miss these, Objective-C has features
    and techniques that can replace them, or at least simulate them.


    For example, you can use categories and protocols as a form of multiple inheritance
    or for implementing abstract base classes. One common use for multiple inheritance
    is to provide an interface so that other code can invoke particular methods on
    your object. Categories and protocols are perfect for this pattern. You can use
    protocols to provide pure abstract base classes.


    Categories and protocols won''t help you if you''re using multiple inheritance
    to bring in extra instance variables (called **member variables** in C++). To
    do this, you can use composition to include an object in another object and then
    use stub methods to redirect messages to the second object (which is a common
    technique in Java). You can also simulate multiple inheritance by overriding the
    forwardInvocation: method. This method gets called if a message is received that
    the object doesn''t know how to handle. By examining the NSInvocation object,
    you can see if it should be forwarded on to your “multiply inherited” object and
    then send it if necessary. This technique saves you from having to write a lot
    of little stub methods. However, it''s much slower than real multiple inheritance
    and can be a pain to set up.


    Other conventions can replace still more C++ features, such as stub methods that
    call abort for abstract classes that shouldn''t be instantiated, though some features
    have weak replacements, such as name prefixes instead of namespaces.


    C++ vtable vs. Objective-C Dynamic Dispatch


    One of the biggest differences between C++ and Objective-C is the mechanism of
    dispatching methods (or **member functions**, as they''re known in C++). C++ uses
    a vtable-based mechanism for determining what code to invoke for virtual functions.


    You can think of each C++ object as having a pointer to an array of function pointers.
    When the compiler sees that the code wants to invoke a virtual function, it calculates
    an offset from the start of the vtable, emits machine code to take the function
    pointer at that offset from the start of the vtable, and uses that as the chunk
    of code to execute. This process requires the compiler to know, at compile time,
    the type of the object that is calling the member function so that it can calculate
    the correct offset into the vtable. This kind of dispatch is very fast, requiring
    just a couple of pointer operations and one read to get the function pointer.


    The Objective-C way, described in detail in [Chapter 3](#9781430241881_Ch3.xhtml),
    uses a runtime function to poke around in the various class structures searching
    for the code to invoke. This technique can be several times slower than the C++
    route.


    Objective-C adds flexibility and convenience at the expense of speed and safety,
    which is a classic trade-off. With the C++ model, the member function dispatch
    is fast. It is also very safe, because the compiler and linker make sure that
    the object being used can handle that method. But the C++ method can also be inflexible,
    because you can''t change the kind of object you''re dealing with. You have to
    use inheritance to allow different classes of objects to react to the same message.'
  trans: "\n# 关于谓词的讨论为*学习 Objective-C*画上句号\n\n我们已经涉猎了诸多领域，从间接寻址和面向对象编程的基础，到键值编码和用`NSPredicate`过滤对象等复杂工具。恭喜你坚持读完整本书！你现在已正式准备好迈入\
    \ iOS 和 OS X 编程生涯的下一个阶段。感谢你的参与。\n\n## 附录 A：从其他语言过渡到 Objective-C\n\n许多程序员从其他语言来到\
    \ Objective-C 和 Cocoa 时，学习起来颇为困难，因为它的行为方式与大多数主流语言不同。新手 Objective-C 程序员常断言 Objective-C\
    \ 是一种糟糕的语言，因为它没有他们的最爱语言所具备的 X、Y、Z 特性。抛开功能清单不谈，让我们直面现实：在某些方面，Objective-C 确实有些古怪。\n\
    \n我们可以给 Objective-C 和 Cocoa 新手程序员（甚至那些在其他语言和平台上拥有多年经验的人）的建议是：暂时搁置你对事物*应该*如何运作的先入之见，先按\
    \ Objective-C、Cocoa 和 Xcode 自身的规则来接受它们。阅读几本书和教程。当你积累了一些 Objective-C 经验后，就能看出其他语言的哪些技术和方法适用于\
    \ Cocoa 和 Objective-C，哪些不适用。没有哪种语言适合所有情况，也没有哪个工具包能完美胜任所有工作。最好的做法是：充分学习，判断特定语言和工具包是否能满足你的需求，并了解其中涉及的各种权衡。\n\
    \n在本附录中，我们将提供一些信息，帮助你顺利从其他主流语言过渡到 Objective-C。\n\n### 从 C 语言过渡\n\nObjective-C\
    \ 就是普通的 C 语言，外加一些用于处理面向对象特性的附加功能。本书大部分内容都在描述这些附加特性，因此我们在此不再赘述。但有几个有趣的话题值得讨论。\n\
    \n请记住，Objective-C 程序员可以访问 C 语言附带的所有好东西，比如标准 C 库。例如，你可以使用`malloc()`和`free()`来处理动态内存，或者使用`fopen()`和`fgets()`来处理文件。\n\
    \n偶尔，网上会有人问：“我调用了一个使用回调函数执行任务的 ANSI C 库。如何让它调用一个方法呢？”当你使用像 Core Foundation 和 Core\
    \ Graphics 这样的底层 Apple 框架时，也会遇到这个问题。\n\n简短的答案是：“你不能。”回调只能用于具有库所需签名的 C 函数。实现 Objective-C\
    \ 方法的函数首先需要`self`和`selector`参数，因此它们永远不会匹配所需的签名。\n\n大多数基于回调的库允许你提供一些用户数据或指针。你可以将其视为一个可以藏身的掩体。当你注册回调时，将某个有意义的指针提供给库，库在调用你的回调时会将这个指针返回给你。\n\
    \n所有 Objective-C 对象都是动态分配的，因此使用对象的地址作为上下文指针是安全的。你无需担心栈上分配的对象会突然消失。在回调内部，你将上下文指针强制转换为对象类型，然后开始向其发送消息。\n\
    \n例如，假设你使用一个虚构的 C API XML 解析库，并在解析 XML 文件时将数据提供给一个名为`TreeWalker`的类。创建一个新的`TreeWalker`：\n\
    \n```objc\nTreeWalker *walker = [[TreeWalker alloc] init];\n```\n\n然后，创建 XML 解析器：\n\
    \n```objc\nXMLParser parser;\nparser = XMLParserLoadFile (\"/tmp/badgers.xml\"\
    );\n```\n\n为解析器设置回调函数（一个 C 函数），并使用`TreeWalker`对象作为上下文：\n\n```objc\nXMLSetParserCallback\
    \ (parser, elementCallback, walker);\n```\n\n然后在解析 XML 文件时，回调函数被调用：\n\n```objc\n\
    void elementCallback (XMLParser *parser, XMLElement *element, userData *context)\n\
    {\n    TreeWalker *walker = (TreeWalker *) context;\n    [walker handleNewElement:\
    \ element inParser: parser];\n} // someElementCallback\n```\n\n你可以看到，上下文指针被强制转换为对象指针，然后向该对象发送消息。\n\
    \n### 从 C++过渡\n\nC++有很多 Objective-C 缺乏的特性：多重继承、命名空间、运算符重载、模板、类变量、抽象类、标准模板库（STL）等等。如果你怀念这些特性，Objective-C\
    \ 也有可以替代它们的功能和技术，或者至少可以模拟它们。\n\n例如，你可以使用类别和协议作为多重继承的一种形式，或者用于实现抽象基类。多重继承的一个常见用途是提供接口，以便其他代码可以调用你对象上的特定方法。类别和协议非常适合这种模式。你可以使用协议来提供纯抽象基类。\n\
    \n如果你使用多重继承是为了引入额外的实例变量（在 C++中称为**成员变量**），那么类别和协议就帮不上忙了。为此，你可以使用组合将一个对象包含在另一个对象中，然后使用存根方法将消息重定向到第二个对象（这是\
    \ Java 中常用的技术）。你还可以通过重写`forwardInvocation:`方法来模拟多重继承。当对象收到一条它不知道如何处理的消息时，就会调用此方法。通过检查`NSInvocation`对象，你可以判断这条消息是否应该转发给你的“多重继承”对象，然后在必要时发送出去。这种技术可以让你免于编写许多小存根方法。然而，它比真正的多重继承慢得多，并且设置起来可能很麻烦。\n\
    \n其他约定可以取代更多 C++特性，例如，对于不应实例化的抽象类，使用调用`abort`的存根方法，尽管某些特性有较弱的替代方案，例如用名称前缀代替命名空间。\n\
    \n#### C++ vtable 与 Objective-C 动态派发\n\nC++和 Objective-C 之间最大的区别之一在于方法（在 C++中称为**成员函数**）的派发机制。C++使用基于\
    \ vtable 的机制来确定虚函数要调用的代码。\n\n你可以把每个 C++对象想象成拥有一个指向函数指针数组的指针。当编译器看到代码想要调用一个虚函数时，它会计算从\
    \ vtable 起始位置的偏移量，生成机器代码来获取该偏移量处的函数指针，并将其作为要执行的代码块。这个过程要求编译器在编译时知道调用成员函数的对象类型，以便计算正确的\
    \ vtable 偏移量。这种派发非常快，只需几次指针操作和一次读取即可获得函数指针。\n\nObjective-C 的方式（第 3 章中有详细描述）则使用运行时函数在各种类结构中搜索要调用的代码。这种技术可能比\
    \ C++方式慢几倍。\n\nObjective-C 以牺牲速度和安全性为代价，换来了灵活性和便利性，这是一种典型的权衡。在 C++模型中，成员函数派发速度很快，而且非常安全，因为编译器和链接器确保所使用的对象能够处理该方法。但\
    \ C++方法也可能不够灵活，因为你无法改变你正在处理的对象类型。你必须使用继承来允许不同类的对象对同一条消息做出反应。\n"
- fmt: "关于C++类的许多信息（例如继承链和组成它的成员）都不会被C++编译器保留。在运行时，对对象进行泛型处理的能力是有限的。你最多能做的就是在运行时进行`dynamic_cast`，以判断一个对象是否是另一个对象的特定子类。\n\
    \nC++的继承层次结构不能在运行时更改。一旦程序编译并链接完成，它就几乎被固定下来。由于C++名称修饰（一种利用原始Unix链接器执行类型安全链接的方式）的复杂性，动态加载C++库通常会出现问题。\n\
    \n在Objective-C中，一个对象只需要有方法的实现就可以被调用，这使得任意对象都能成为其他对象的*数据源*或*委托*。缺少多重继承可能带来不便，但由于能够向任何对象发送任何消息而无需担心其继承谱系，这一不便大大得到了缓解。\n\
    \n当然，这种向任何对象发送任何消息的能力使得Objective-C的类型安全性不如C++。如果收到消息的对象无法处理该消息，你可能会遇到运行时错误。Cocoa中没有类型安全的容器。任何对象都可以被放入容器中。\n\
    \nObjective-C携带了大量关于类的元数据，因此你可以使用反射来检查一个对象是否响应特定的消息。这种做法对于拥有数据源或委托的对象非常常见。通过首先检查委托是否响应某条消息，你可以避免可能遇到的一些运行时错误。你还可以使用*类别（Category）*向其他类添加方法。\n\
    \n由于这些元数据的存在，逆向工程分析程序中所使用的类变得更加容易。你可以确定实例变量、它们在对象结构中的布局以及该类定义的方法。即使剥离可执行文件中的调试信息，也无法移除Objective-C的元数据。如果你有高度机密的算法，你可能希望用C++实现它们，或者至少混淆它们的名称——例如，不要使用像`SerialNumberVerifier`这样的类名或方法名。\n\
    \n在Objective-C中，你可以向`nil`（零）对象发送消息。无需检查你的消息发送是否针对`NULL`。向`nil`发送消息是空操作。向`nil`发送消息的返回值取决于方法的返回类型。如果方法返回一个指针类型（例如对象指针），返回值将是`nil`，这意味着你可以安全地将消息链接到`nil`对象——`nil`只会继续传递下去。如果方法返回一个与指针大小相同或更小的`int`，它将返回零。如果它返回一个`float`或结构体，结果将是未定义的。因此，你可以使用`nil`对象模式来避免测试对象指针是否为`NULL`。另一方面，这种技术可能会掩盖错误，并导致难以追踪的bug。\n\
    \nObjective-C中的所有对象都是动态分配的。没有基于栈的对象、临时对象的自动创建和销毁，也没有类类型之间的自动类型转换，因此Objective-C对象比基于C++栈的对象更重。这就是为什么像`NSPoint`和`NSRange`这样的小型轻量实体是结构体而非一等对象的原因之一。\n\
    \n最后，Objective-C是一种非常松散的语言。C++拥有`public`、`protected`和`private`成员函数，而Objective-C完全支持`public`、`protected`和`private`实例变量，但对成员函数没有任何保护。任何知道方法名称的人都可以向该对象发送该消息。利用Objective-C的反射特性，你可以查看给定对象支持的所有方法。即使方法从未在头文件中出现，它们也是可调用的，并且你无法可靠地找出是哪个对象在调用该方法，因为消息发送可能来自C函数（如本附录前面所述）。\n\
    \n如你所见，你无需在子类中重新声明你覆盖的方法，也无需将它们标记为`virtual`。任何方法都可以在子类或类别中被覆盖。关于这是否是一个好主意，存在两种学派。一派认为重新声明可以向读者提供关于该类对其父类做了哪些更改的信息，而另一派则认为这些只是实现细节，类的使用者无需理会，并且不值得因为覆盖了一个新方法而导致所有依赖类重新编译。\n\
    \nObjective-C没有类变量。你可以通过使用文件作用域的全局变量并为它们提供访问器方法来模拟类变量。一个示例类声明可能如下所示（其中包含实例变量声明和方法声明等其他内容）：\n\
    \n```\n@interface Blarg : NSObject\n{\n\n}\n+ (int) classVar;\n+ (void) setClassVar:\
    \ (int) cv;\n\n@end // Blarg\n```\n\n然后实现如下所示：\n\n```\n#import \"Blarg.h\"\n\n\
    static int g_cvar;\n\n@implementation Blarg\n\n+ (int) classVar\n{\n    return\
    \ (g_cvar);\n} // classVar\n\n+ (void) setClassVar: (int) cv\n{\n    g_cvar =\
    \ cv;\n} // setClassVar\n\n@end // Blarg\n```\n\nCocoa对象层次结构有一个共同的祖先类：`NSObject`。当你创建一个新类时，你几乎总是会继承`NSObject`或一个现有的Cocoa类。C++的对象层次结构通常是拥有不同根节点的多个树。\n\
    \n### Objective-C++\n\n有一种方法可以兼得两者的优势。Xcode附带的Clang编译器支持一种称为Objective-C++的混合语言。此编译器允许你自由混合使用C++和Objective-C代码，只有少数几个小限制。当你需要时，可以获得类型安全和底层性能；在合适的情况下，可以利用Objective-C的动态特性以及Cocoa工具包。\n\
    \n一个常见的开发场景是将应用程序的所有核心逻辑放入一个可移植的C++库中（如果你正在构建跨平台应用），并使用平台的原生工具包编写用户界面。Objective-C++对这种开发风格大有裨益。你获得了C++的性能和类型安全，而用户则获得了使用与其平台无缝集成的原生工具包创建的应用程序。\n\
    \n要让编译器将你的代码视为Objective-C++，请在源文件中使用`*.mm*`文件扩展名。`*.M*`扩展名也有效，但Mac的HFS+文件系统不区分大小写但保留大小写，因此最好避免任何类型的大小写依赖。\n\
    \n就像物质和反物质一样，Objective-C和C++的对象层次结构不能混合。因此，你不能拥有一个继承自`NSView`的C++类，也不能拥有一个继承自`std::string`的Objective-C类。\n\
    \n你可以将指向Objective-C对象的指针放入C++对象中。由于所有Objective-C对象都是动态分配的，你不能在类中嵌入完整的对象，也不能在栈上声明它们。你需要在C++的构造函数中（或任何方便的地方）对任何Objective-C对象执行`alloc`和`init`，并在析构函数中（或其他地方）释放它们。因此，以下是一个有效的类声明：\n\
    \n```\nclass ChessPiece\n{\n    ChessPiece::PieceType type;\n    int row, column;\n\
    \    NSImage *pieceImage;\n};\n```\n\n你也可以将C++对象放入Objective-C对象中：\n\n```\n@interface\
    \ SWChessBoard : NSView\n{\n    ChessPiece *piece[32];\n}\n\n@end // SWChessBoard\n\
    ```"
  raw: 'A lot of information about a class is not retained by the C++ compiler, such
    as its inheritance chain and the members that compose it. At runtime, the ability
    to treat objects generically is limited. The most you can do at runtime is a dynamic
    cast, which tells you if an object is a specific kind of subclass of another object.


    The C++ inheritance hierarchy can''t be changed at runtime. Once the program has
    been compiled and linked, it''s pretty much set in stone. Dynamic loading of C++
    libraries is frequently problematic, due in part to the complexities of C++ name
    mangling—the way it performs type-safe linking using the primitive Unix linkers
    it has to work with.


    In Objective-C, an object needs only a method implementation for it to be callable,
    which allows arbitrary objects to become data sources and/or delegates for other
    objects. The lack of multiple inheritance can be an inconvenience, but one that
    is greatly eased by the ability to send any message to any object without having
    to worry about its inheritance pedigree.


    Of course, this ability to send any message to any object makes Objective-C less
    type safe than C++. You can get runtime errors if the object being sent a message
    can''t handle it. There are no type-safe containers in Cocoa. Any object can be
    put into a container.


    Objective-C carries around a lot of metadata about a class, so you can use reflection
    to see if an object responds to a particular message. This practice is very common
    for objects that have data sources or delegates. By first checking to see if the
    delegate responds to a message, you can avoid some of the runtime errors you might
    get. You can also use categories to add methods to other classes.


    Because of this metadata, it''s easier to reverse engineer the classes used in
    a program. You can determine the instance variables, their layout in the object
    structure, and the methods defined by the class. Even stripping the executable
    of its debugging information doesn''t remove the Objective-C metadata. If you
    have highly confidential algorithms, you may want to implement them in C++ or
    at least obfuscate their names—don''t use class or method names like SerialNumberVerifier,
    for example.


    In Objective-C, you can send messages to the nil (zero) object. There is no need
    to check your message sends against NULL. Messages to nil are no-ops. The return
    values from messages sent to nil depend on the return type of the method. If the
    method returns a pointer type (such as an object pointer), the return value will
    be nil, meaning you can safely chain messages to a nil object—the nil will just
    propagate. If the method returns an int the same size of a pointer or smaller,
    it will return zero. If it returns a float or a structure, you will have an undefined
    result. Because of this, you can use a nil object pattern to keep you from having
    to test object pointers against NULL. On the other hand, this technique can mask
    errors and cause bugs that are difficult to track down.


    All objects in Objective-C are dynamically allocated. There are no stack-based
    objects, automatic creation and destruction of temporary objects, or automatic
    type conversion between class types, so Objective-C objects are more heavyweight
    than C++ stack-based objects. That''s one of the reasons why small lightweight
    entities (like NSPoint and NSRange) are structures instead of first-class objects.


    Finally, Objective-C is a very loose language. Where C++ has public, protected,
    and private member functions, Objective-C has full support for public, protected,
    and private instance variables, but no protection at all for member functions.
    Anyone who knows the name of a method can send that message to the object. Using
    the Objective-C reflection features, you can see all the methods supported by
    a given object. Methods are callable even if they never appear in a header file,
    and you have no reliable way to figure out which object is calling the method,
    because message sends can come from C functions (as discussed earlier in this
    appendix).


    As you''ve seen, you don''t have to redeclare methods you override in subclasses
    or mark them as virtual. Any method can be overridden in a subclass or category.
    There are two schools of thought on whether this is a good idea. One camp says
    that redeclaring provides information to the reader about which changes the class
    makes to its superclasses, while the other faction says that these are just implementation
    details that class users don''t have to be bothered with and are not worth causing
    recompilations of all dependent classes when a new method is overridden.


    Objective-C has no class variables. You can simulate them by using file-scoped
    global variables and providing accessors for them. An example class declaration
    might look like this (other stuff, like declarations for instance variables and
    method declarations, is included):


    @interface Blarg : NSObject


    {


    }


    + (int) classVar;


    + (void) setClassVar: (int) cv;


    @end // Blarg


    And then the implementation would look like this:


    #import "Blarg.h"


    static int g_cvar;


    @implementation Blarg


    + (int) classVar


    {


    return (g_cvar);


    } // classVar


    + (void) setClassVar: (int) cv


    {


    g_cvar = cv;


    } // setClassVar


    @end // Blarg


    The Cocoa object hierarchy has a common ancestor class: NSObject. When you create
    a new class, you''ll almost always subclass NSObject or an existing Cocoa class.
    C++ object hierarchies tend to be several trees with distinct roots.


    Objective-C++


    There is a way to have the best of both worlds. The Clang compiler that comes
    with Xcode supports a hybrid language called Objective-C++. This compiler lets
    you freely mix C++ and Objective-C code, with a couple of small restrictions.
    You can get type safety and low-level performance when you need them, and you
    can use Objective-C''s dynamic nature and the Cocoa toolkit where it makes sense.


    A common development scenario is to put all of the application''s core logic into
    a portable C++ library (if you''re building a cross-platform application) and
    write the user interface in the platform''s native toolkit. Objective-C++ is a
    great boon to this style of development. You get the performance and type safety
    of C++, and the users get applications created with the native toolkit that fits
    in seamlessly with their platform.


    To have the compiler treat your code as Objective-C++, use the *.mm* file extension
    on your source. The *.M* extension also works, but the Mac''s HFS+ file system
    is case insensitive but case preserving, so it''s best to avoid any kind of case
    dependency.


    Like matter and antimatter, the Objective-C and C++ object hierarchies cannot
    mix. So you can''t have a C++ class that inherits from NSView, and you can''t
    have an Objective-C class inheriting from std::string.


    You can put pointers to Objective-C objects into C++ objects. Since all Objective-C
    objects are dynamically allocated, you can''t have complete objects embedded in
    a class or declared on a stack. You''ll need to alloc and init any Objective-C
    objects in your C++ constructors (or wherever it''s convenient) and release them
    in your destructors (or somewhere else). So this would be a valid class declaration:


    class ChessPiece


    {


    ChessPiece::PieceType type;


    int row, column;


    NSImage *pieceImage;


    };


    You can put C++ objects into Objective-C objects:


    @interface SWChessBoard : NSView


    {


    ChessPiece *piece[32];


    }


    @end // SWChessBoard'
  trans: "\n关于 C++类的许多信息（例如继承链和组成它的成员）都不会被 C++编译器保留。在运行时，对对象进行泛型处理的能力是有限的。你最多能做的就是在运行时进行`dynamic_cast`，以判断一个对象是否是另一个对象的特定子类。\n\
    \nC++的继承层次结构不能在运行时更改。一旦程序编译并链接完成，它就几乎被固定下来。由于 C++名称修饰（一种利用原始 Unix 链接器执行类型安全链接的方式）的复杂性，动态加载\
    \ C++库通常会出现问题。\n\n在 Objective-C 中，一个对象只需要有方法的实现就可以被调用，这使得任意对象都能成为其他对象的*数据源*或*委托*。缺少多重继承可能带来不便，但由于能够向任何对象发送任何消息而无需担心其继承谱系，这一不便大大得到了缓解。\n\
    \n当然，这种向任何对象发送任何消息的能力使得 Objective-C 的类型安全性不如 C++。如果收到消息的对象无法处理该消息，你可能会遇到运行时错误。Cocoa\
    \ 中没有类型安全的容器。任何对象都可以被放入容器中。\n\nObjective-C 携带了大量关于类的元数据，因此你可以使用反射来检查一个对象是否响应特定的消息。这种做法对于拥有数据源或委托的对象非常常见。通过首先检查委托是否响应某条消息，你可以避免可能遇到的一些运行时错误。你还可以使用*类别（Category）*向其他类添加方法。\n\
    \n由于这些元数据的存在，逆向工程分析程序中所使用的类变得更加容易。你可以确定实例变量、它们在对象结构中的布局以及该类定义的方法。即使剥离可执行文件中的调试信息，也无法移除\
    \ Objective-C 的元数据。如果你有高度机密的算法，你可能希望用 C++实现它们，或者至少混淆它们的名称——例如，不要使用像`SerialNumberVerifier`这样的类名或方法名。\n\
    \n在 Objective-C 中，你可以向`nil`（零）对象发送消息。无需检查你的消息发送是否针对`NULL`。向`nil`发送消息是空操作。向`nil`发送消息的返回值取决于方法的返回类型。如果方法返回一个指针类型（例如对象指针），返回值将是`nil`，这意味着你可以安全地将消息链接到`nil`对象——`nil`只会继续传递下去。如果方法返回一个与指针大小相同或更小的`int`，它将返回零。如果它返回一个`float`或结构体，结果将是未定义的。因此，你可以使用`nil`对象模式来避免测试对象指针是否为`NULL`。另一方面，这种技术可能会掩盖错误，并导致难以追踪的\
    \ bug。\n\nObjective-C 中的所有对象都是动态分配的。没有基于栈的对象、临时对象的自动创建和销毁，也没有类类型之间的自动类型转换，因此 Objective-C\
    \ 对象比基于 C++栈的对象更重。这就是为什么像`NSPoint`和`NSRange`这样的小型轻量实体是结构体而非一等对象的原因之一。\n\n最后，Objective-C\
    \ 是一种非常松散的语言。C++拥有`public`、`protected`和`private`成员函数，而 Objective-C 完全支持`public`、`protected`和`private`实例变量，但对成员函数没有任何保护。任何知道方法名称的人都可以向该对象发送该消息。利用\
    \ Objective-C 的反射特性，你可以查看给定对象支持的所有方法。即使方法从未在头文件中出现，它们也是可调用的，并且你无法可靠地找出是哪个对象在调用该方法，因为消息发送可能来自\
    \ C 函数（如本附录前面所述）。\n\n如你所见，你无需在子类中重新声明你覆盖的方法，也无需将它们标记为`virtual`。任何方法都可以在子类或类别中被覆盖。关于这是否是一个好主意，存在两种学派。一派认为重新声明可以向读者提供关于该类对其父类做了哪些更改的信息，而另一派则认为这些只是实现细节，类的使用者无需理会，并且不值得因为覆盖了一个新方法而导致所有依赖类重新编译。\n\
