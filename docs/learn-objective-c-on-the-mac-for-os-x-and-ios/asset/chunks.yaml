    \ retain 它们。\n\n**注意**：等等，稍等一下。这个拷贝和不 retain 是怎么回事？\n\n你希望对字符串参数进行拷贝。一个常见的错误是从用户界面（例如文本字段）获取一个字符串，并将其用作某个对象的名称。从文本字段中获取的字符串通常是可变字符串，当用户输入新内容时，它们会发生变化。拷贝该字符串可以防止其值意外改变。\n\
    \n那么，关于不 retain 对象呢？有一个特殊情况，称为 **retain 循环**，在这种情况下，引用计数机制会失效。如果你有一个所有者/被所有者关系，比如\
    \ `Car` 和 `Engine`，你希望 `Car` retain（拥有）`Engine`，但反之则不然。`Engine` 不应该 retain 它被安装到的那辆\
    \ `Car`。如果 `Car` retain 了 `Engine`，而 `Engine` 又 retain 了 `Car`，那么两者的引用计数都不会归零，两者也就永远不会被清理。`Car`\
    \ 的 `dealloc` 方法不会被调用，直到 `Engine` 在它自己的 `dealloc` 中释放了 `Car`；而 `Engine` 的 `dealloc`\
    \ 方法也不会被调用，直到 `Car` 的 `dealloc` 释放了 `Engine`。它们就这样僵持在那里，互相凝视，等待对方先眨眼。通用规则是：所有者对象\
    \ retain 被拥有的对象，而不是反过来。\n\n让我们给 `Car` 添加一个新功能，这样我们就可以尝试一些新的属性语法了。这会很令人兴奋！我们将给车一个名字。我们先采用老派的方式，使用传统的存取方法。首先是\
    \ `Car.h`，新内容以粗体显示：\n\n```objc\n@class Tire;\n\n@class Engine;\n\n@interface Car\
    \ : NSObject\n\n{\n    NSString *name;\n    NSMutableArray *tires;\n    Engine\
    \ *engine;\n}\n\n- (void)setName: (NSString *) newName;\n- (NSString *) name;\n\
    - (void) setEngine: (Engine *) newEngine;\n- (Engine *) engine;\n- (void) setTire:\
    \ (Tire *) tire atIndex: (int) index;\n- (Tire *) tireAtIndex: (int) index;\n\
    - (void) print;\n\n@end // Car\n```\n\n现在，我们添加存取方法的实现（注意我们正在拷贝 `name`），同时为车选择一个默认名称，并在\
    \ `description` 中显示它：\n\n```objc\n#import \"Car.h\"\n\n@implementation Car\n\n\
    - (id) init\n{\n    if (self = [super init])\n    {\n        name = [[NSString\
    \ alloc] initWithString:@\"Car\"];\n        tires = [[NSMutableArray alloc] init];\n\
    \        int i;\n        for (i = 0; i < 4; i++) {\n            [tires addObject:\
    \ [NSNull null]];\n        }\n    }\n    return (self);\n} // init\n\n- (void)\
    \ dealloc\n{\n    [name release];\n    [tires release];\n    [engine release];\n\
    \    [super dealloc];\n} // dealloc\n\n- (void)setName: (NSString *)newName\n\
    {\n    [name release];\n    name = [newName copy];\n} // setName\n\n- (NSString\
    \ *)name\n{\n    return (name);\n} // name\n\n- (Engine *) engine\n{\n    return\
    \ (engine);\n} // engine\n\n- (void) setEngine: (Engine *) newEngine\n{\n    [newEngine\
    \ retain];\n    [engine release];\n    engine = newEngine;\n} // setEngine\n\n\
    - (void) setTire: (Tire *) tire atIndex: (int) index\n{\n    [tires replaceObjectAtIndex:\
    \ index withObject: tire];\n} // setTire:atIndex:\n\n- (Tire *) tireAtIndex: (int)\
    \ index\n{\n    Tire *tire;\n    tire = [tires objectAtIndex: index];\n    return\
    \ (tire);\n} // tireAtlndex:\n\n- (void) print\n{\n    NSLog (@\"%@ has:\", name);\n\
    \    for (int i = 0; i < 4; i++)\n    {\n        NSLog (@\"%@\", [self tireAtIndex:\
