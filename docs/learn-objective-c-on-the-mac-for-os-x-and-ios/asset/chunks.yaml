    ```objc\nCar *car = [Car alloc]; [car init];\n```\n\n这种链式调用技术之所以重要，是因为初始化方法可能返回一个与已分配对象不同的对象。如果你觉得这很奇怪，那你的感觉没错。但这种情况确实可能发生。\n\
    \n为什么程序员会希望 `init` 方法返回一个不同的对象呢？回顾一下第 8 章末尾关于类簇的讨论，你会看到像 `NSString` 和 `NSArray`\
    \ 这类类实际上只是大量专用类的门面。`init` 方法可以接受参数，因此方法代码有机会检查参数，并决定另一个类的对象可能更合适。例如，假设要从一个非常长的字符串或一个阿拉伯字符字符串创建新字符串。基于此信息，字符串初始化器可能会决定创建一个更适合目标字符串需求的、属于不同类的对象，并返回该对象而非原始对象。\n\
    \n## 编写初始化方法\n\n之前，当我们展示初始化方法时，我们请大家忍受一些“点头微笑”的时刻，主要是因为它们看起来有点奇怪。以下是 CarParts\
    \ 早期版本中的 `init` 方法：\n\n```objc\n- (id) init\n{\n    if (self = [super init])\n\
    \    {\n        engine = [Engine new];\n        tires[0] = [Tire new];\n     \
    \   tires[1] = [Tire new];\n        tires[2] = [Tire new];\n        tires[3] =\
    \ [Tire new];\n    }\n    return (self);\n} // init\n```\n\n主要的奇怪之处在第一行就出现了：\n\
    \n```objc\nif (self = [super init]) {\n```\n\n这段代码暗示 `self` 可能会改变。在方法中间改变 `self`？我们疯了吗？好吧，或许，但这次没有。该语句中首先执行的代码是\
    \ `[super init]`。这段代码让超类完成其初始化工作。对于继承自 `NSObject` 的类，调用超类可以让 `NSObject` 执行它所需的处理，以便对象能够响应消息并处理引用计数。对于继承自其他类的类，这是它们执行自己版本的全新初始化的机会。\n\
    \n我们刚刚说过，像这样的 `init` 方法可能会返回完全不同的对象。请记住，实例变量位于距离隐藏参数 `self` 固定偏移量的内存位置。如果 `init`\
    \ 方法返回了一个新对象，我们需要更新 `self`，以便后续的实例变量引用能影响正确的内存位置。这就是我们需要 `self = [super init]`\
    \ 赋值的原因。请记住，此赋值仅影响该方法内部的 `self` 值。它不会改变方法作用域之外的任何内容。\n\n如果初始化对象时出现问题，`init` 方法可能返回\
    \ `nil`。例如，你可能使用一个接受 URL 的 `init` 方法，通过网站上的图像文件来初始化一个图像对象。如果网络断开，或者网站改版导致图片被移动，你将无法获得有用的图像对象。此时\
    \ `init` 方法会返回 `nil`，表示对象无法被初始化。如果 `[super init]` 返回 `nil`，则 `if (self = [super\
    \ init])` 测试将不会执行方法体代码。像这样将赋值与检查非零值结合，是 Objective-C 中存续的经典 C 语言惯用法。\n"
- fmt: "# 代码排版与优化\n\nThe code to get the object up and running is in the braces of\
    \ the `if` statement’s body. In the original `Car init` method, the body of the\
    \ `if` statement creates an engine and four tires. From a memory management perspective,\
    \ this code does the right thing, because objects returned via `new` start out\
    \ with their reference counts set to 1.\n\nFinally, the last line of the method\
    \ is `return (self);`.\n\nAn `init` method returns the object that was just initialized.\
    \ Since we assigned the return value of `[super init]` to `self`, that’s what\
    \ we should return.\n\n## Init to Win it\n\nSome programmers don’t like the combined\
    \ assignment and test for a nonzero value. Instead, they write their `init` methods\
    \ like this:\n\n```\nself = [super init];\nif (nil != self)\n{\n}\nreturn (self);\n\
    ```\n\nAnd that’s fine. The key is that you assign back to `self`, especially\
    \ if you’re accessing any instance variables. No matter which way you do it, be\
    \ aware that combining the assignment and test is a common technique, and you’ll\
    \ see it a lot in other people’s code.\n\nThe `self = [super init]` style is the\
    \ source of some controversy. One faction says you should always do this, just\
    \ in case the superclass changes something in the initialization. The other camp\
    \ says that this object changing is so rare and obscure that you need not bother—just\
    \ use a plain `[super init]`. Those in this camp point out that if even if the\
    \ `init` changes the object, that new object probably doesn’t take any new instance\
    \ variables you have added.\n\nThis problem is truly thorny in the abstract, but\
    \ in the real world, it doesn’t happen very often. We recommend always using the\
    \ `if (self = [super init])` technique just to be safe and to catch the \"init\
    \ returning nil\" behavior of some `init` methods. But if you choose to use a\
    \ plain `[super init]`, that’s fine too. Just be prepared to do a little debugging\
    \ if you happen to catch one of the obscure corner cases.\n\n## What to Do When\
    \ You’re Initializing\n\nWhat should you put in your `init` methods? This is the\
    \ place to do your clean-slate initialization work. You assign values to instance\
    \ variables and create the other objects that your object needs to do its work.\
    \ When you write your `init` methods, you must decide how much work you want to\
    \ do there. The `CarParts` programs showed two different approaches over the course\
    \ of its evolution.\n\nThe first way used the `init` method to create the engine\
    \ and all four tires. This made the `Car` immediately useful out of the box: call\
    \ `alloc` and `init`, and take the car out for a test drive. We changed the next\
    \ version to create nothing at all in the `init` method. We just left empty spaces\
    \ for the engine and tires. The code that created the object would then have to\
    \ create an engine and tires and set them using accessor methods.\n\nWhich way\
    \ is right for you? The decision comes down to flexibility over performance, as\
    \ do many tradeoffs in programming. The original `Car init` method is very convenient.\
    \ If the intended use of the `Car` class is to create a basic car and then use\
    \ it, that’s the right design.\n\nOn the other hand, if the car will often be\
    \ customized with different kinds of tires and engines, as in a racing game, we’ll\
    \ be creating the engine and tires just to have them thrown away. Such a waste!\
    \ Objects would be created and then destroyed without ever being used.\n\n**Note**\
    \ Even if you don’t provide calls to customize your object’s attributes, you can\
    \ still wait to create them until a caller asks for them. This is a technique\
    \ known as **lazy evaluation**, and it can give you a performance boost if you’re\
    \ creating complex objects in your `-init` that might not actually be used.\n\n\
    ## Isn’t That Convenient?\n\nSome objects have more than one method that starts\
    \ with the word `init`. In fact, it’s important to remember that `init` methods\
    \ are nothing special. They’re just ordinary methods that follow a naming convention.\n\
    \nMany classes have **convenience initializers**. These are `init` methods that\
    \ do some extra work, saving you the trouble of doing it yourself. To give you\
    \ an idea of what we’re talking about, here’s a sampling of some of `NSString`’s\
    \ `init` methods:\n\n- `(id) init;`\n\nThis basic method initializes a new, empty\
    \ string. For immutable `NSString`s, this method isn’t terribly useful. But you\
    \ can allocate and initialize a new `NSMutableString` and start throwing characters\
    \ into it. You’d use it like this:\n\n```\nNSString *emptyString = [[NSString\
    \ alloc] init];\n```\n\nThat code gives you an empty string.\n\n- `(id) initWithFormat:\
    \ (NSString *) format, …;`\n\nThis version initializes a new string to the result\
    \ of a formatting operation, just like we did with `NSLog()` and with the `stringWithFormat:`\
    \ class method you saw in [Chapter 7](#9781430241881_Ch7.xhtml). Here’s an example\
    \ that gives the flavor of using this `init` method:\n\n```\nstring = [[NSString\
    \ alloc]\n          initWithFormat: @\"%d or %d\", 25, 624];\n```\n\nThis gives\
    \ you a string with the value of \"25 or 624\".\n\n- `(id) initWithContentsOfFile:(NSString\
    \ *) path encoding:(NSStringEncoding) enc error:(NSError **) error`\n\nThe `initWithContentsOfFile:encoding:error:`\
    \ method opens the text file at the given path, reads everything there, and initializes\
    \ a string with the contents. The following code reads the file `/tmp/words.txt`:\n\
    \n```\nNSError *error = nil;\nNSString *string =\n    [[NSString alloc] initWithContentsOfFile:@\"\
    /tmp/words.txt\"\n                                    encoding:NSUTF8StringEncoding\n\
    \                                       error:&error];\n```\n\nThe `encoding`\
    \ argument tells the API what type of contents are in the file. Typically, you’ll\
    \ want `NSUTF8StringEncoding`, indicating the file is encoded using the UTF8 format.\n\
    \nThe third argument is returned `nil` if there is no error. If there is an error,\
    \ you can find out what happened using the `localizedDescription` method. Putting\
    \ everything together, we have\n\n```\nNSError *error = nil;\nNSStringEncoding\
    \ encoding = NSUTF8StringEncoding;\nNSString *string = [[NSString alloc] initWithContentsOfFile:@\"\
    /tmp/words.txt\"\n                                               usedEncoding:&encoding\n\
    \                                                      error:&error];\nif(nil\
    \ != error)\n{\n    NSLog(@\"Unable to read data from file, %@\", [error localizedDescription]);\n\
    }\n```\n\nThat’s some pretty powerful stuff. This would take a whole bunch of\
    \ code in C (you would have to open the file, read blocks of data, append to a\
    \ string, make sure the trailing zero-byte is in the right place, and close the\
    \ file). For us Objective-C devotees, it becomes a single line of code. Nice.\n\
    \n**Note** The general rule for different initializers is that if your object\
    \ must have some information to initialize itself, you should provide that information\
    \ as part of the `init` method. These are typically immutable objects.\n\n## More\
    \ Parts Is Parts\n\nLet’s revisit `CarParts`, last seen in [Chapter 6](#9781430241881_Ch6.xhtml)\
    \ when we broke out each class into its own source file. This time, we’ll add\
    \ some initialization goodness to the `Tire` class and clean up `Car`’s memory\
    \ management along the way. For those of you following along at home, the project\
    \ directory that has the finished program for this chapter is `10.01 CarPartsInit`.\n\
    \n**Note** As we discussed in detail in [Chapter 9](#9781430241881_Ch9.xhtml),\
    \ Apple is moving from garbage collection in memory management to a newer technology\
    \ called Automatic Reference Counting (ARC). For iOS development, you *must* use\
    \ ARC; garbage collection isn’t supported. We have an ARC version of this chapter’s\
    \ program in `10.01 CarPartsInit-ARC`. But because garbage collection is still\
    \ around, we’ve also included a version that uses garbage collection as well.\
    \ That one is named `10.01 CarPartsInit-GC`.\n\n### Init for Tires"
  raw: 'The code to get the object up and running is in the braces of the if statement’s
    body. In the original Car init method, the body of the if statement creates an
    engine and four tires. From a memory management perspective, this code does the
    right thing, because objects returned via new start out with their reference counts
    set to 1.


    Finally, the last line of the method is return (self);.


    An init method returns the object that was just initialized. Since we assigned
    the return value of [super init] to self, that’s what we should return.


    Init to Win it  Some programmers don’t like the combined assignment and test for
    a nonzero value. Instead, they write their init methods like this:


    self = [super init];


    if (nil != self)


    {


    }


    return (self);


    And that’s fine. The key is that you assign back to self, especially if you’re
    accessing any instance variables. No matter which way you do it, be aware that
    combining the assignment and test is a common technique, and you’ll see it a lot
    in other people’s code.


    The self = [super init] style is the source of some controversy. One faction says
    you should always do this, just in case the superclass changes something in the
    initialization. The other camp says that this object changing is so rare and obscure
    that you need not bother—just use a plain [super init]. Those in this camp point
    out that if even if the init changes the object, that new object probably doesn’t
    take any new instance variables you have added.


    This problem is truly thorny in the abstract, but in the real world, it doesn’t
    happen very often. We recommend always using the if (self = [super init]) technique
    just to be safe and to catch the “init returning nil” behavior of some init methods.
    But if you choose to use a plain [super init], that’s fine too. Just be prepared
    to do a little debugging if you happen to catch one of the obscure corner cases.


    What to Do When You’re Initializing


    What should you put in your init methods? This is the place to do your clean-slate
    initialization work. You assign values to instance variables and create the other
    objects that your object needs to do its work. When you write your init methods,
    you must decide how much work you want to do there. The CarParts programs showed
    two different approaches over the course of its evolution.


    The first way used the init method to create the engine and all four tires. This
    made the Car immediately useful out of the box: call alloc and init, and take
    the car out for a test drive. We changed the next version to create nothing at
    all in the init method. We just left empty spaces for the engine and tires. The
    code that created the object would then have to create an engine and tires and
    set them using accessor methods.


    Which way is right for you? The decision comes down to flexibility over performance,
    as do many tradeoffs in programming. The original Car init method is very convenient.
    If the intended use of the Car class is to create a basic car and then use it,
    that’s the right design.


    On the other hand, if the car will often be customized with different kinds of
    tires and engines, as in a racing game, we’ll be creating the engine and tires
    just to have them thrown away. Such a waste! Objects would be created and then
    destroyed without ever being used.


    **Note**  Even if you don’t provide calls to customize your object’s attributes,
    you can still wait to create them until a caller asks for them. This is a technique
    known as **lazy evaluation**, and it can give you a performance boost if you’re
    creating complex objects in your -init that might not actually be used.


    Isn’t That Convenient?


    Some objects have more than one method that starts with the word init. In fact,
    it’s important to remember that init methods are nothing special. They’re just
    ordinary methods that follow a naming convention.


    Many classes have **convenience initializers**. These are init methods that do
    some extra work, saving you the trouble of doing it yourself. To give you an idea
    of what we’re talking about, here’s a sampling of some of NSString’s init methods:


    - (id) init;


    This basic method initializes a new, empty string. For immutable NSStrings, this
    method isn’t terribly useful. But you can allocate and initialize a new NSMutableString
    and start throwing characters into it. You’d use it like this:


    NSString *emptyString = [[NSString alloc] init];


    That code gives you an empty string.


    - (id) initWithFormat: (NSString *) format, …;


    This version initializes a new string to the result of a formatting operation,
    just like we did with NSLog() and with the stringWithFormat: class method you
    saw in [Chapter 7](#9781430241881_Ch7.xhtml). Here’s an example that gives the
    flavor of using this init method:


    string = [[NSString alloc]


    initWithFormat: @"%d or %d", 25, 624];


    This gives you a string with the value of "25 or 624".


    - (id) initWithContentsOfFile:(NSString *) path encoding:(NSStringEncoding) enc
    error:(NSError **) error


    The initWithContentsOfFile:encoding:error: method opens the text file at the given
    path, reads everything there, and initializes a string with the contents. The
    following code reads the file /tmp/words.txt:


    NSError *error = nil;


    NSString *string =


    [[NSString alloc] initWithContentsOfFile:@"/tmp/words.txt"


    encoding:NSUTF8StringEncoding


    error:&error];


    The encoding argument tells the API what type of contents are in the file. Typically,
    you’ll want NSUTF8StringEncoding, indicating the file is encoded using the UTF8
    format.


    The third argument is returned nil if there is no error. If there is an error,
    you can find out what happened using the localizedDescription method. Putting
    everything together, we have


    NSError *error = nil;


    NSStringEncoding encoding = NSUTF8StringEncoding;


    NSString *string = [[NSString alloc] initWithContentsOfFile:@"/tmp/words.txt"


    usedEncoding:&encoding


    error:&error];


    if(nil != error)


    {


    NSLog(@"Unable to read data from file, %@", [error localizedDescription]);


    }


    That’s some pretty powerful stuff. This would take a whole bunch of code in C
    (you would have to open the file, read blocks of data, append to a string, make
    sure the trailing zero-byte is in the right place, and close the file). For us
    Objective-C devotees, it becomes a single line of code. Nice.


    **Note**  The general rule for different initializers is that if your object must
    have some information to initialize itself, you should provide that information
    as part of the init method. These are typically immutable objects.


    More Parts Is Parts


    Let’s revisit CarParts, last seen in [Chapter 6](#9781430241881_Ch6.xhtml) when
    we broke out each class into its own source file. This time, we’ll add some initialization
    goodness to the Tire class and clean up Car’s memory management along the way.
    For those of you following along at home, the project directory that has the finished
    program for this chapter is *10.01 CarPartsInit.*


    **Note**  As we discussed in detail in [Chapter 9](#9781430241881_Ch9.xhtml),
    Apple is moving from garbage collection in memory management to a newer technology
    called Automatic Reference Counting (ARC). For iOS development, you *must* use
    ARC; garbage collection isn’t supported. We have an ARC version of this chapter’s
    program in *10.01 CarPartsInit-ARC.* But because garbage collection is still around,
    we’ve also included a version that uses garbage collection as well. That one is
    named *10.01 CarPartsInit-GC*.


    Init for Tires'
  trans: "\n# 代码排版与优化\n\n启动并运行对象的代码位于`if`语句主体的花括号内。在原始的`Car init`方法中，`if`语句的主体创建了一个引擎和四个轮胎。从内存管理的角度来看，这段代码是正确的，因为通过`new`返回的对象其引用计数初始值被设置为\
    \ 1。\n\n最后，该方法的最后一行是`return (self);`。\n\n`init`方法返回刚刚初始化完成的对象。由于我们将`[super init]`的返回值赋值给了`self`，因此这正是我们应当返回的内容。\n\
    \n## 用初始化赢在起跑线\n\n有些程序员不喜欢将赋值操作与非零值检查合并在一起。相反，他们这样编写`init`方法：\n\n```\nself = [super\
    \ init];\nif (nil != self)\n{\n}\nreturn (self);\n```\n\n这样写也没问题。关键在于，你需要将返回值重新赋值给`self`，尤其是在访问任何实例变量时更是如此。无论你采用哪种方式，都要明白将赋值与检查合并是一种常见技巧，你会在其他人的代码中经常看到。\n\
    \n`self = [super init]`这种写法引发了一些争议。一派认为你应该始终这样做，以防父类在初始化过程中改变了某些东西。另一派则认为，这种对象变更的情况极其罕见且难以捉摸，不必费心——直接使用`[super\
    \ init]`即可。这一派指出，即使`init`改变了对象，这个新对象也可能无法容纳你新增的实例变量。\n\n这个问题在理论上确实棘手，但在实际开发中并不常见。我们建议始终使用`if\
    \ (self = [super init])`技巧，以确保安全并捕捉某些`init`方法返回`nil`的行为。但如果你选择直接使用`[super init]`，那也完全可以。只是如果你碰巧遇到那些极其罕见的边缘情况，就需要做好进行一些调试的准备。\n\
    \n## 初始化时该做什么\n\n你的`init`方法中应该放入什么内容？这里是进行“白板初始化”工作的地方。你需要为实例变量赋值，并创建对象运行所需的其他对象。在编写`init`方法时，你必须决定要在其中完成多少工作。`CarParts`程序在其演变过程中展示了两种不同的方法。\n\
    \n第一种方法使用`init`方法来创建引擎和所有四个轮胎。这使得`Car`对象开箱即用：调用`alloc`和`init`后，就可以直接把车开出去试驾了。在下一个版本中，我们改为在`init`方法中不创建任何东西。我们只为引擎和轮胎保留了空位置。然后，创建对象的代码必须自行创建引擎和轮胎，并通过存取方法来设置它们。\n\
    \n哪种方法适合你？这个决定归结为灵活性与性能之间的权衡，正如编程中许多其他取舍一样。最初的`Car init`方法非常方便。如果`Car`类的预期用途是创建一个基础汽车然后直接使用，那么这就是正确的设计。\n\
    \n另一方面，如果汽车经常需要用不同类型的轮胎和引擎进行定制，比如在赛车游戏中，那么我们创建引擎和轮胎只是为了随后丢弃它们。真是浪费！对象被创建出来，然后又被销毁，从未被使用过。\n\
    \n**注意** 即使你没有提供自定义对象属性的调用，你仍然可以等到调用方真正需要时才创建它们。这种技术被称为**懒加载**，如果你在`-init`中创建了可能实际并不会用到的复杂对象，懒加载可以提升性能。\n\
    \n## 这不是很方便吗？\n\n有些对象拥有多个以`init`开头的方法。事实上，重要的是要记住`init`方法并没有什么特别之处。它们只是遵循命名约定的普通方法。\n\
    \n许多类都提供了**便捷初始化方法**。这些`init`方法会做一些额外的工作，省去你自己动手的麻烦。为了让你更直观地理解，这里列举了一些`NSString`的`init`方法示例：\n\
    \n- `(id) init;`\n\n这个基本方法初始化了一个新的空字符串。对于不可变的`NSString`，这个方法并不是特别有用。但你可以分配并初始化一个新的`NSMutableString`，然后开始往里面添加字符。你可以这样使用它：\n\
    \n```\nNSString *emptyString = [[NSString alloc] init];\n```\n\n这段代码会给你一个空字符串。\n\
    \n- `(id) initWithFormat: (NSString *) format, …;`\n\n这个版本将新字符串初始化为格式化操作的结果，就像我们使用`NSLog()`以及你在第\
    \ 7 章看到的`stringWithFormat:`类方法一样。下面是一个使用此`init`方法的示例：\n\n```\nstring = [[NSString\
    \ alloc]\n          initWithFormat: @\"%d or %d\", 25, 624];\n```\n\n这会给你一个值为\"\
    25 or 624\"的字符串。\n\n- `(id) initWithContentsOfFile:(NSString *) path encoding:(NSStringEncoding)\
    \ enc error:(NSError **) error`\n\n`initWithContentsOfFile:encoding:error:`方法会打开指定路径的文本文件，读取其中所有内容，并用这些内容初始化一个字符串。以下代码读取了`/tmp/words.txt`文件：\n\
    \n```\nNSError *error = nil;\nNSString *string =\n    [[NSString alloc] initWithContentsOfFile:@\"\
    /tmp/words.txt\"\n                                    encoding:NSUTF8StringEncoding\n\
    \                                       error:&error];\n```\n\n`encoding`参数告诉\
    \ API 文件中内容的编码类型。通常，你会使用`NSUTF8StringEncoding`，表示文件采用 UTF8 格式编码。\n\n如果无错误，第三个参数返回`nil`。如果出现错误，你可以使用`localizedDescription`方法查明具体情况。综合起来，代码如下：\n\
    \n```\nNSError *error = nil;\nNSStringEncoding encoding = NSUTF8StringEncoding;\n\
    NSString *string = [[NSString alloc] initWithContentsOfFile:@\"/tmp/words.txt\"\
    \n                                               usedEncoding:&encoding\n    \
    \                                                  error:&error];\nif(nil != error)\n\
    {\n    NSLog(@\"无法从文件读取数据，%@\", [error localizedDescription]);\n}\n```\n\n这是相当强大的功能。如果使用\
    \ C 语言，这将需要一大段代码（你需要打开文件，读取数据块，追加到字符串，确保末尾的零字节在正确位置，然后关闭文件）。而对于我们这些 Objective-C\
    \ 的忠实用户来说，这变成了一行代码。真不错。\n\n**注意** 关于不同初始化方法的一般规则是：如果你的对象必须依赖某些信息才能完成自身初始化，你应该将这些信息作为`init`方法的一部分提供。这通常适用于不可变对象。\n\
    \n## 更多零件\n\n让我们重新审视`CarParts`，上次在第 6 章中我们将其拆分为每个类一个独立的源文件。这一次，我们将为`Tire`类添加一些初始化的好处，并同时清理`Car`的内存管理。对于在家跟着操作的读者，本章完成后的项目目录是`10.01\
    \ CarPartsInit`。\n\n**注意** 正如我们在第 9 章中详细讨论的，苹果正从垃圾回收的内存管理方式迁移到一种名为自动引用计数（ARC）的新技术。对于\
    \ iOS 开发，你*必须*使用 ARC；不支持垃圾回收。我们在`10.01 CarPartsInit-ARC`目录中提供了本章程序的 ARC 版本。但由于垃圾回收仍然存在，我们也提供了一个使用垃圾回收的版本，名为`10.01\
    \ CarPartsInit-GC`。\n\n### 轮胎的初始化\n"
- fmt: "# 排版后的文档\n\n在现实世界中，轮胎远比我们在`CarParts`中模拟的要有趣得多。在真实的轮胎中，你需要跟踪胎压（不希望它变得太低）和胎纹深度（一旦低于几毫米，轮胎就不再安全了）。让我们扩展`Tire`类来跟踪胎压和胎纹深度。以下是添加了两个实例变量及相应访问器方法的类声明：\n\
    \n```\n#import <Cocoa/Cocoa.h>\n\n@interface Tire : NSObject\n{\n    float pressure;\n\
    \    float treadDepth;\n}\n\n- (void) setPressure: (float) pressure;\n- (float)\
    \ pressure;\n- (void) setTreadDepth: (float) treadDepth;\n- (float) treadDepth;\n\
    \n@end // Tire\n```\n\n以下是`Tire`的实现，相当直接明了：\n\n```\n#import \"Tire.h\"\n\n@implementation\
    \ Tire\n\n- (id) init\n{\n    if (self = [super init])\n    {\n        pressure\
    \ = 34.0;\n        treadDepth = 20.0;\n    }\n    return (self);\n} // init\n\n\
    - (void) setPressure: (float) p\n{\n    pressure = p;\n} // setPressure\n\n- (float)\
    \ pressure\n{\n    return (pressure);\n} // pressure\n\n- (void) setTreadDepth:\
    \ (float) td\n{\n    treadDepth = td;\n} // setTreadDepth\n\n- (float) treadDepth\n\
    {\n    return (treadDepth);\n} // treadDepth\n\n- (NSString *) description\n{\n\
    \    NSString *desc;\n    desc = [NSString stringWithFormat:\n            @\"\
    Tire: Pressure: %.1f TreadDepth: %.1f\", pressure, treadDepth];\n    return (desc);\n\
    } // description\n\n@end // Tire\n```\n\n访问器方法为轮胎的使用者提供了改变胎压和胎纹深度的方法。我们来快速看一下`init`方法：\n\
    \n```\n- (id) init\n{\n    if (self = [super init])\n    {\n        pressure =\
    \ 34.0;\n        treadDepth = 20.0;\n    }\n    return (self);\n} // init\n```\n\
    \n这里应该没有意外。父类（本例中为`NSObject`）被指示初始化自身，并且该调用的返回值被赋值给`self`。然后，实例变量被赋予有用的默认值。我们可以这样创建一个全新的轮胎：\n\
    \n```\nTire *tire = [[Tire alloc] init];\n```\n\n轮胎的胎压将为34 psi，胎纹深度为20毫米。我们也应该修改`description`方法：\n\
    \n```\n- (NSString *) description\n{\n    NSString *desc;\n    desc = [NSString\
    \ stringWithFormat:\n            @\"Tire: Pressure: %.1f TreadDepth: %.1f\", pressure,\
    \ treadDepth];\n    return (desc);\n} // description\n```\n\n`description`方法现在使用`NSString`的`stringWithFormat:`类方法来创建一个包含胎压和胎纹深度的字符串。这个方法是否遵循了我们的良好内存管理行为规则？是的，它遵循了。因为该对象不是通过`alloc`、`copy`或`new`创建的，它的引用计数为1，我们可以认为它是自动释放的。所以，当自动释放池被销毁时，这个字符串会被清理。\n\
    \n## 更新`main()`函数\n\n以下是`main.m`文件，它比之前稍微复杂了一些：\n\n```\n#import \"Engine.h\"\n\
    #import \"Car.h\"\n#import \"Slant6.h\"\n#import \"AllWeatherRadial.h\"\n\nint\
    \ main (int argc, const char * argv[])\n{\n    @autoreleasepool\n    {\n     \
    \   Car *car = [[Car alloc] init];\n\n        for (int i = 0; i < 4; i++)\n  \
    \      {\n            Tire *tire;\n            tire = [[Tire alloc] init];\n \
    \           [tire setPressure: 23 + i];\n            [tire setTreadDepth: 33 -\
    \ i];\n            [car setTire: tire atIndex: i];\n            [tire release];\n\
    \        }\n\n        Engine *engine = [[Slant6 alloc] init];\n        [car setEngine:\
    \ engine];\n        [car print];\n        [car release];\n    }\n\n    return\
    \ (0);\n} // main\n```\n\n让我们逐部分分析`main()`函数。我们首先创建一个自动释放池，让自动释放的对象在其中游荡，等待池的销毁：\n\
    \n```\n@autoreleasepool {\n```\n\n然后，我们使用`alloc`和`init`创建一辆新车：\n\n```\nCar *car\
    \ = [[Car alloc] init];\n```\n\n之后，一个循环旋转四次（从0到3）。这是制造新轮胎的地方：\n\n```\nfor (int\
    \ i = 0; i < 4; i++) {\n```\n\n每次循环中，都会创建一个新的轮胎并进行初始化：\n\n```\nTire *tire;\ntire\
    \ = [[Tire alloc] init];\n```\n\n每个轮胎开始时，其胎压和胎纹深度都设置在`Tire`的`init`方法中。但为了有趣，我们要自定义这些值。因为在现实世界中，没有两个轮胎是完全相同的，我们将使用访问器方法来调整胎压和胎纹深度：\n\
    \n```\n[tire setPressure: 23 + i];\n[tire setTreadDepth: 33 - i];\n```\n\n接着，我们将轮胎交给汽车：\n\
    \n```\n[car setTire: tire atIndex: i];\n```"
  raw: 'Tires in the real world are more interesting creatures than the ones we’ve
    simulated in CarParts so far. In your real tires, you have to keep track of the
    tire pressure (don’t want it to get too low) and the tread depth (once it goes
    below a couple of millimeters, the tires aren’t safe anymore). Let’s extend Tire
    to keep track of the pressure and tread depth. Here’s the class declaration that
    adds two instance variables and the corresponding accessor methods:


    #import <Cocoa/Cocoa.h>


    @interface Tire : NSObject


    {


    float pressure;


    float treadDepth;


    }


    -(void) setPressure: (float) pressure;


    -(float) pressure;


    -(void) setTreadDepth: (float) treadDepth;


    -(float) treadDepth;


    @end // Tire


    And here’s the implementation of Tire, which is pretty straightforward:


    #import "Tire.h"


    @implementation Tire


    - (id) init


    {


    if (self = [super init])


    {


    pressure = 34.0; treadDepth = 20.0;


    }


    return (self);


    } // init


    - (void) setPressure: (float) p


    {


    pressure = p;


    } // setPressure


    - (float) pressure


    {


    return (pressure);


    } // pressure


    - (void) setTreadDepth: (float) td


    {


    treadDepth = td;


    } // setTreadDepth


    - (float) treadDepth


    {


    return (treadDepth);


    } // treadDepth


    - (NSString *) description


    {


    NSString *desc;


    desc = [NSString stringWithFormat:


    @"Tire: Pressure: %.1f TreadDepth: %.1f", pressure, treadDepth];


    return (desc);


    } // description


    @end // Tire


    The accessor methods provide a way for users of the tire to change the pressure
    and the tread depth. Let’s take a quick look at the init method:


    - (id) init


    {


    if (self = [super init])


    {


    pressure = 34.0;


    treadDepth = 20.0;


    }


    return (self);


    } // init


    There should be no surprises here. The superclass (NSObject, in this case) is
    told to initialize itself, and the return value from that call is assigned to
    self. Then, the instance variables are assigned to useful default values. Let’s
    make a brand new tire like this:


    Tire *tire = [[Tire alloc] init];


    The tire’s pressure will be 34 psi, and its tread depth will be 20 mm. We should
    change the description method too:


    - (NSString *) description


    {


    NSString *desc;


    desc = [NSString stringWithFormat:


    @"Tire: Pressure: %.1f TreadDepth: %.1f", pressure, treadDepth];


    return (desc);


    } // description


    The description method now uses NSString’s stringWithFormat: class method to make
    a string that includes the tire pressure and tread depth. Does this method follow
    our rules of good memory management behavior? Yes, it does. Because the object
    was not created by an alloc, copy, or new, it has a retain count of 1, and we
    can consider it to be autoreleased. So, this string will get cleaned up when the
    autorelease pool is destroyed.


    Updating main()


    Here is the main.m file, which is a hair more complicated than it was before:


    #import "Engine.h"


    #import "Car.h"


    #import "Slant6.h"


    #import "AllWeatherRadial.h"


    int main (int argc, const char * argv[])


    {


    @autoreleasepool


    {


    Car *car = [[Car alloc] init];


    for (int i = 0; i < 4; i++)


    {


    Tire *tire;


    tire = [[Tire alloc] init];


    [tire setPressure: 23 + i]; [tire setTreadDepth: 33 - i];


    [car setTire: tire atIndex: i];


    [tire release];


    }


    Engine *engine = [[Slant6 alloc] init];


    [car setEngine: engine];


    [car print];


    [car release];


    }


    return (0);


    } // main


    Let’s pull main() apart, piece by piece. We start by making an autorelease pool
    for autoreleased objects to swim around in while they await the pool’s destruction:


    @autoreleasepool {


    Then, we create a new car using alloc and init:


    Car *car = [[Car alloc] init];


    After that, a loop spins around four times (from 0 to 3). This is where the new
    tires are made:


    for (int i = 0; i < 4; i++) {


    Each time through the loop, a new tire is created and initialized:


    Tire *tire;


    tire = [[Tire alloc] init];


    Each tire starts out with its pressure and tread depth set in Tire’s init method.
    But we’re going to customize the values, just for fun. Because no two tires are
    identical in the real world, we’re going to tweak the pressure and tread depths
    using the accessor methods:


    [tire setPressure: 23 + i];


    [tire setTreadDepth: 33 - i];


    Next, we’ll give the tire to the car:


    [car setTire: tire atIndex: i];'
