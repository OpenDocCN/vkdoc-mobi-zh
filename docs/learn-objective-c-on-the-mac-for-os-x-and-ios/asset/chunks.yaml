    } // main\n```\n\n我们的这个小程序就到此为止。运行程序会得到以下结果：\n\n```\nThings are 5 23 42\n```\n\
    \n你不仅可以将一个类的实现拆分到多个源文件中，还可以将其分散到多个框架中。`NSString` 是一个位于 Foundation 框架中的类，该框架包含许多面向数据的类，例如字符串、数字和集合。所有视觉上的华丽功能（窗口、颜色、绘图等）都位于\
    \ AppKit 和 UIKit 中。尽管 `NSString` 在 Foundation 中声明，但 AppKit 有一个名为 `NSStringDrawing`\
    \ 的 `NSString` category，它允许你向字符串对象发送绘制消息。当你绘制一个字符串时，该方法会在屏幕上渲染该字符串的文本。因为这属于花哨的图形处理，所以它是\
    \ AppKit 的功能。但 `NSString` 是 Foundation 的对象。Cocoa 设计者使用 categories 将数据功能放入 Foundation，将绘图功能放入\
    \ AppKit。作为程序员，我们只需处理 `NSString`，通常不需要关心某个特定方法来自何处。\n\n## 使用 Categories 进行前向引用\n\
    \n正如我们之前提到的，Cocoa 没有任何真正的私有方法。如果你知道一个对象支持的方法名称，就可以调用它，即使该方法的声明没有出现在类的 `@interface`\
    \ 中。\n\n然而，编译器会尝试提供帮助。如果它看到你在一个对象上调用一个方法，但尚未看到该方法的声明或定义，它会像这样发出警告：`warning: 'CategoryThing'\
    \ may not respond to '–setThing4:'`。通常，这种抱怨是好的，因为它能帮助你捕捉到许多拼写错误。\n\n但是，如果你的实现中使用了没有在类的\
    \ `@interface` 部分列出的方法，编译器的警惕性可能会导致问题。有很多充分的理由说明你为什么不想在那里列出所有方法。这些方法可能纯粹是实现细节，或者你可能正在尝试不同的方法名称以决定要使用哪些。但是，如果你在使用方法之前不声明它们，就会收到编译器的警告。修复所有编译器警告是件好事，那么你能做些什么呢？\n\
    \n如果你能在使用某个方法之前安排好它的定义，编译器就会看到你的定义，就不会产生警告。但如果不方便这样做，或者你正在使用另一个类中未公开的方法，那么你就需要另寻他法。\n\
    \n### 用 Categories 来救场！\n\n在 category 中声明一个方法足以让编译器认为：“好的，这个方法存在。如果我看到程序员使用它，我不会抱怨。”\
    \ 即使你不想实现它，也无需实际去做。\n\n一种常见的技术是将一个 category 放在实现文件的顶部。假设 `Car` 有一个名为 `rotateTires`\
    \ 的方法。我们可以通过另一个名为 `moveTireFromPosition:toPosition:` 的方法来实现 `rotateTires`，以交换两个位置的轮胎。这第二个方法是一个实现细节，我们不希望把它放进汽车的公共接口中。通过在\
    \ category 中声明它，`rotateTires` 就可以使用 `moveTireFromPosition:toPosition:` 而不会产生任何编译器警告。这个\
    \ category 看起来像这样：\n\n```objc\n@interface Car (Private)\n\n- (void) moveTireFromPosition:\
    \ (int) pos1 toPosition: (int) pos2;\n\n@end // Private\n```\n\n当你实现这个方法时，它不必存在于一个\
    \ `@implementation Car (Private)` 块中，但如果不这样做，编译器会给你一个警告，所以一个好的做法是将它们放在 `@Implementations`\
    \ 中。另外，以后如果你需要查找这些方法，它们会集中在一个地方，易于查找。你可以把这个方法留在 `@implementation Car` 部分。这样，你就可以将你的方法按类别进行组织，作为文档和结构化的便利，同时仍然可以将所有方法存放在实现文件的一个大块中。\n"
- fmt: "当你访问其他类的私有方法时，甚至不需要提供该方法的实现。只需在类别中声明它，就足以让编译器满意。顺便说一句，你真不应该访问其他类的私有方法，但有时为了规避\
    \ Cocoa 或其他人的代码中的漏洞，或者为了编写测试代码，你必须这么做。\n\n不过要小心。苹果对于接受 Mac 和 iOS App Store 中的应用有一些指导原则。其中一条是你的应用不能访问类的私有变量和方法。如果你的应用这么做了，苹果可能会拒绝它。\n\
    \n## 非正式协议与委托类别\n\n现在，是时候谈谈那些你在面向对象编程中经常遇到的“大词”和“大思想”了——你知道的，那些听起来比实际复杂得多的概念。\n\
    \nCocoa 类经常使用一种涉及**委托**的技术，委托是被另一个对象请求执行某些工作的对象。例如，AppKit 类`NSApplication`会询问其委托是否应该在应用程序启动时打开一个无标题窗口。`NSWindow`对象会询问其委托是否应该允许关闭窗口。\n\
    \n大多数情况下，你将是编写委托对象并将其提供给其他对象的一方，通常是 Cocoa 提供的某个对象。通过实现特定的方法，你可以控制 Cocoa 对象的行为方式。\n\
    \nCocoa 中的滚动列表由 AppKit 类`NSTableView`处理。当`NSTableView`准备执行某些工作（例如选择用户刚刚点击的行）时，该对象会询问其委托是否可以选择该行。`NSTableView`向其委托发送一条消息：\n\
    \n```\n- (BOOL) tableView: (NSTableView *) tableView shouldSelectRow: (NSInteger)\
    \ rowIndex;\n```\n\n委托方法可以查看`tableView`和行，以决定是否应选择该行。如果表格包含不应选择的行，委托可能会实现禁用行（即不可选择）的概念。\n\
    \n## `ITunesFinder` 项目\n\n让你通过 Bonjour（原名为 Rendezvous 的技术）查找网络服务的 Cocoa 类名为`NSNetServiceBrowser`。你告诉网络服务浏览器你要查找的服务，并给它一个委托对象。然后，浏览器对象会在发现新服务时向委托对象发送消息。\n\
    \n`ITunesFinder`位于 *12.04 ITunesFinder* 项目文件夹中，它使用`NSNetServiceBrowser`来列出它所能找到的所有共享\
    \ iTunes 音乐库。\n\n对于这个项目，我们从`main()`开始，它位于 *main.m* 中。委托对象是`ITunesFinder`类的一个实例，因此我们需要导入它的头文件：\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import \"ITunesFinder.h\"\n```\n\
    \n然后`main()`开始。我们设置自动释放池：\n\n```objc\nint main (int argc, const char *argv[])\
    \ {\n    @autoreleasepool {\n```\n\n接下来，一个新的`NSNetServiceBrowser`诞生了：\n\n```objc\n\
    NSNetServiceBrowser *browser = [[NSNetServiceBrowser alloc] init];\n```\n\n然后，创建一个新的`ITunesFinder`：\n\
    \n```objc\nITunesFinder *finder = [[ITunesFinder alloc] init];\n```\n\n因为我们使用`alloc`来创建它们，所以必须确保在使用完它们后它们会被释放。我们使用的是\
    \ ARC，所以不需要添加`release`，但如果你不使用 ARC，则必须手动释放。\n\n接下来，我们告诉网络服务浏览器将`ITunesFinder`对象用作委托：\n\
    \n```objc\n[browser setDelegate: finder];\n```\n\n然后，我们告诉浏览器去查找 iTunes 共享：\n\n\
    ```objc\n[browser searchForServicesOfType: @\"_daap._tcp\" inDomain: @\"local.\"\
    ];\n```\n\n字符串`\"_daap._tcp\"`告诉网络服务浏览器查找类型为`daap`（“daap”是“Digital Audio Access\
    \ Protocol”的缩写）的服务，并使用 TCP 网络协议。这种咒语可以找到由 iTunes 发布的共享库。域名`local.`表示在本地网络上查找服务。互联网编号分配机构（IANA）维护着一个互联网协议族列表，这些协议族通常映射到\
    \ Bonjour 服务名称。"
  raw: 'When you’re accessing private methods of other classes, you don’t even have
    to supply an implementation of the method. Just having it declared in a category
    is enough to keep the compiler happy. By the way, you really shouldn’t access
    private methods of other classes, but sometimes, you must do so to work around
    bugs in Cocoa or other people’s code, or to write test code.


    Be careful, though. Apple has guidelines for accepting applications into the Mac
    and iOS App Stores. One guideline is that your app can’t access private variables
    and methods of classes. If your app does so, Apple may reject it.


    Informal Protocols and Delegation Categories


    Now, it’s time for more of those Big Words and Big Ideas that you often find in
    object-oriented programming—you know, the ones that sound more complicated than
    they actually are.


    Cocoa classes often use a technique that involves a **delegate**, which is an
    object asked by another object to do some of its work. For example, the AppKit
    class NSApplication asks its delegate if it should open an Untitled window when
    the application launches. NSWindow objects ask their delegates if they should
    allow a window to be closed.


    Most often, you will be the one writing the delegate object and giving it to some
    other object, typically something provided by Cocoa. By implementing specific
    methods, you can exert control over how the Cocoa object behaves.


    Scrolling lists in Cocoa are handled by the AppKit class NSTableView. When the
    tableView is ready to do some work, such as selecting the row the user just clicked,
    the object asks its delegate if it can select the row. The tableView sends a message
    to its delegate:


    - (BOOL) tableView: (NSTableView *) tableView shouldSelectRow: (NSInteger) rowIndex;


    The delegate method can look at the tableView and the row to decide whether the
    row should be selected. If the table includes rows that shouldn’t be selected,
    the delegate might implement the concept of disabled rows that are not selectable.


    The ITunesFinder Project


    The Cocoa class that lets you find network services published by Bonjour (the
    technology formerly called Rendezvous) is named NSNetServiceBrowser. You tell
    the net service browser what service you’re looking for and give it a delegate
    object. The browser object then sends messages to the delegate object telling
    it when it sees new services.


    ITunesFinder, which lives in the *12.04 ITunesFinder* project folder, uses NSNetServiceBrowser
    to list all the shared iTunes music libraries that it can find.


    For this project, we’ll start out with main(), which lives in *main.m*. The delegate
    object is an instance of the class ITunesFinder, so we need to import its header
    file:


    #import <Foundation/Foundation.h>


    #import "ITunesFinder.h"


    And then main() starts. We set up the autorelease pool:


    int main (int argc, const char *argv[]) {


    @autoreleasepool {


    Next, a new NSNetServiceBrowser is born:


    NSNetServiceBrowser *browser = [[NSNetServiceBrowser alloc] init];


    And then a new ITunesFinder is created:


    ITunesFinder *finder = [[ITunesFinder alloc] init];


    Because we’re using alloc to create these, we must take responsibility for making
    sure they’ll be released when we’re finished with them. We’re using ARC, so we
    don’t have to add a release, but if you’re not using ARC, you have to do this
    manually.


    Next, we tell the net service browser to use the ITunesFinder object as a delegate:


    [browser setDelegate: finder];


    Then, we tell the browser to go look for iTunes shares:


    [browser searchForServicesOfType: @"_daap._tcp" inDomain: @"local."];


    The "_daap._tcp" string tells the net service browser to look for services of
    type daap (“daap” is short for “Digital Audio Access Protocol”) using the TCP
    networking protocol. This incantation finds libraries published by iTunes. The
    domain local. means to look for the services on the local network. The Internet
    Assigned Numbers Authority (IANA) maintains a list of Internet protocol families,
    which usually map to the Bonjour service name.'
