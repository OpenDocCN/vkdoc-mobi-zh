- fmt: 'Each framework is a significant collection of technology, often containing
    dozens or even hundreds of header files. Each framework has a master header file
    that includes all the framework’s individual header files. By using `#import`
    on the master header file, you have access to all the framework’s features.


    The header files for the Foundation framework take up nearly a megabyte of disk
    storage and contain more than 14,000 lines of code, spread across over a hundred
    files. When you include the master header file with `#import <Foundation/Foundation.h>`,
    you get that whole vast collection. You might think wading through all that text
    for every file would take the compiler a lot of time, but Xcode is smart: it speeds
    up the task by using precompiled headers, a compressed and digested form of the
    header that’s loaded quickly when you `#import` it.


    If you’re curious about which headers are included with the Foundation framework,
    you can peek inside its *Headers* directory (`/System/Library/Frameworks/Foundation.framework/Headers/`).
    You won’t break anything if you browse the files in there; just don’t remove or
    change anything.


    ## `NSLog()` and `@"strings"`


    Now that we have used `#import` on the master header file for the Foundation framework,
    you’re ready to write code that takes advantage of some Cocoa features. The first
    (and only) real line of code in Hello Objective-C uses the `NSLog()` function,
    like so:


    `NSLog (@"Hello, Objective-C!");`


    This prints “Hello, Objective-C!” to the console. If you’ve used C at all, you
    have undoubtedly encountered `printf()` in your travels. `NSLog()` is a Cocoa
    function that works very much like `printf()`.


    Just like `printf()`, `NSLog()` takes a string as its first argument. This string
    can contain format specifiers (such as `%d`), and the function takes additional
    parameters that match the format specifiers. `printf()` plugs these extra parameters
    into the string before it gets printed.


    As we’ve said before, Objective-C is just C with a little bit of special sauce,
    so you’re welcome to use `printf()` instead of `NSLog()` if you want. We recommend
    `NSLog()`, however, because it adds features such as time and date stamps, as
    well as automatically appending the newline (`''\n''`) character for you.


    ## The NS Prefix: A Prescription Against Name Collisions


    You might be thinking that `NSLog()` is kind of a strange name for a function.
    What is that “NS” doing there? It turns out that Cocoa prefixes all its function,
    constant, and type names with “NS”. This prefix tells you the function comes from
    Cocoa instead of some other toolkit.


    The prefix helps prevent **name collisions**, big problems that result when the
    same identifier is used for two different things. If Cocoa had named this function
    `Log()`, there’s a good chance the name would clash with a `Log()` function created
    by some innocent programmer somewhere. When a program containing `Log()` is built
    with Cocoa included, Xcode complains that `Log()` is defined multiple times, and
    sadness results.


    Now that you have an idea why a prefix is a good idea, you might wonder about
    the specific choice: why “NS” instead of “Cocoa,” for example? Well, the “NS”
    prefix dates back from the time when the toolkit was called NextSTEP and was the
    product of NeXT Software (formerly NeXT, Inc.), which was acquired by Apple in
    1996. Rather than break compatibility with code already written for NextSTEP,
    Apple just continued to use the “NS” prefix. It’s a historical curiosity now,
    like your appendix.


    Cocoa has staked its claim on the “NS” prefix, so obviously, you should not prefix
    any of your own variables or function names with “NS”. If you do, you will confuse
    the readers of your code, making them think your stuff actually belongs to Cocoa.
    Also, your code might break in the future if Apple happens to add a function to
    Cocoa with the same name as yours. There is no centralized prefix registry, so
    you can pick your own prefix. Many people prefix names with their initials or
    company names. To make our examples a little simpler, we won’t use a prefix for
    the code in this book.


    ## `NSString`: Where it’s `@`


    Let’s take another look at that `NSLog()` statement: `NSLog (@"Hello, Objective-C!");`


    Did you notice the at sign before the string? It’s not a typo that made it past
    our vigilant editors. The at sign is one of the features that Objective-C adds
    to standard C. A string in double quotes preceded by an at sign means that the
    quoted string should be treated as a Cocoa `NSString` element.


    So what’s an `NSString` element? Peel the “NS” prefix off the name and you see
    a familiar term: “String.” You already know that a string is a sequence of characters,
    usually human-readable, so you can probably guess (correctly) that an `NSString`
    is a sequence of characters in Cocoa.


    `NSString` elements have a huge number of features packed into them and are used
    by Cocoa any time a string is needed. Here are just a few of the things an `NSString`
    can do:


    *   Tell you its length

    *   Compare itself to another string

    *   Convert itself to an integer or floating-point value


    That’s a whole lot more than you can do with C-style strings. We’ll be using and
    exploring `NSString` elements much more in [Chapter 8](#9781430241881_Ch8.xhtml).


    One mistake that’s easy to make is to pass a C-style string to `NSLog()` instead
    of one of the fancy `NSString` `@"strings"` elements. If you do this, the compiler
    will give you a warning:


    ```

    main.m:46: warning: passing arg 1 of ''NSLog'' from incompatible pointer type

    ```


    If you run this program, it might crash. To catch problems like this, you can
    tell Xcode to always treat warnings as errors. To do that, select the Project
    file in the Project Navigator, Hello Objective-C under targets, then the Build
    Settings tab, type *error* into the search field, and check the Treat Warnings
    as Errors checkbox, as shown in the following image. Also make sure that the Configuration
    pop-up menu at the top says All.


    **Watch Those Strings**


    Here’s another cool fact about `NSString`: the name itself highlights one of the
    nice features of Cocoa. Most Cocoa elements are named in a very straightforward
    manner, striving to describe the features they implement. For instance, `NSArray`
    provides arrays; `NSDateFormatter` helps you format dates in different ways; `NSThread`
    gives you tools for multithreaded programming; and `NSSpeechSynthesizer` lets
    you hear speech.


    Now, we’ll get back to stepping through our little program. The last line of the
    program is the return statement that ends the execution of `main()` and finishes
    the program:


    `return (0);`


    The zero value returned says that our program completed successfully. This is
    just the way return statements work in C.


    Congratulations, again! You’ve just written, compiled, run, and dissected your
    first Objective-C program.


    ## Are You the Boolean Type?


    Many languages have a Boolean type, which is, of course, a fancy term for variables
    that store true and false values. Objective-C is no exception.


    C has a Boolean data type, `bool`, which can take on the values `true` and `false`.
    Objective-C provides a similar type, `BOOL`, which can have the values `YES` and
    `NO`. Objective-C’s `BOOL` type, incidentally, predates C’s `bool` type by over
    a decade. The two different Boolean types can coexist in the same program, but
    when you’re writing Cocoa code, you’ll be using `BOOL`.'
