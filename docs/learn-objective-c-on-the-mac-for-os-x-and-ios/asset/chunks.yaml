    *kSubthingiesKey = @"subThingies";.


    Notice that there’s a different encodeSomething:forKey: method for each type.
    You need to make sure you use the proper method to encode your types. For any
    Objective-C object type, you use encodeObject:forKey:


    When you’re restoring an object, you’ll use decodeSomethingForKey: methods:


    - (id) initWithCoder: (NSCoder *) decoder


    {


    if (self = [super init]) {


    self.name = [decoder decodeObjectForKey: @"name"];


    self.magicNumber = [decoder decodeIntForKey: @"magicNumber"];


    self.shoeSize = [decoder decodeFloatForKey: @"shoeSize"];


    self.subThingies = [decoder decodeObjectForKey: @"subThingies"];


    }


    return (self);


    } // initWithCoder


    initWithCoder: is like any other init method. You need to have your superclass
    initialize things before you can do your stuff. You have two ways to do this,
    depending on what your parent class is. If your parent class adopts NSCoding,
    you should call [super initWithCoder: decoder]. If your parent class does not
    adopt NSCoding, you just call [super init]. NSObject does not adopt NSCoding,
    so we do the simple init.


    When you use decodeIntForKey:, you pull an int value out of the decoder. When
    you use decodeObjectForKey:, you pull an object out of the decoder, recursively
    using initWithCoder: on any embedded objects. Memory management works the way
    you would expect: you’re getting objects back from a method that’s not called
    alloc, copy, or new, so you can assume the objects are autoreleased. Our property
    declarations make sure that all memory management is handled correctly.


    You’ll notice that we have the encoding and decoding in the same order as the
    instance variables. You don’t have to do that; it’s just a handy habit to make
    sure that you’re encoding and decoding everything and haven’t skipped something.
    That’s one of the reasons for using keys with the call—you can put them in and
    pull them out in any order.'
  trans: '

    ```objc

    magicNumber, shoeSize, subThingies];


    return (description);


    } // description


    @end // Thingie

    ```


    这段代码将初始化一个新对象，清理我们造成的任何混乱，创建存根方法使编译器满意我们采用`NSCoding`，并返回一个描述信息。


    请注意，在`init`方法中，我们在赋值语句的左侧使用了`self.attribute`。记住，这实际上意味着我们在调用这些属性的访问器方法，而这些方法是由`@synthesize`创建的。我们并没有直接进行实例变量赋值。这种对象创建技术将使我们能够正确管理传入的`NSString`和我们创建的`NSMutableArray`的内存，因此我们不必显式地提供内存管理。


    所以，在`main()`内部，创建一个`Thingie`对象并打印它：


    ```objc

    Thingie *thing1;


    thing1 = [[Thingie alloc] initWithName: @"thing1" magicNumber: 42 shoeSize: 10.5];


    NSLog (@"some thing: %@", thing1);

    ```


    前面的代码将打印出如下内容：


    ```

    some thing: thing1: 42/10.5 ( )

    ```


    这很有趣。现在，让我们对这个对象进行归档。像这样实现`Thingie`的`encodeWithCoder:`方法：


    ```objc

    - (void) encodeWithCoder: (NSCoder *) coder


    {


    [coder encodeObject: name forKey: @"name"];


    [coder encodeInt: magicNumber forKey: @"magicNumber"];


    [coder encodeFloat: shoeSize forKey: @"shoeSize"];


    [coder encodeObject: subThingies forKey: @"subThingies"];


    } // encodeWithCoder

    ```


    我们将使用`NSKeyedArchiver`来完成将对象归档到`NSData`中的所有工作。键控归档器，顾名思义，使用键/值对来保存对象的信息。`Thingie`的`-encodeWithCoder`方法将每个实例变量编码到与实例变量名称匹配的键下。你不必这样做。你可以将名称编码到键`flarblewhazzit`下，没有人会在意。保持键名与实例变量名相似，可以很容易地知道什么映射到什么。


    你可以随意使用像这样的裸字符串作为编码键，或者你可以定义一个常量来防止拼写错误。你可以像这样`#define kSubthingiesKey @"subThingies"`，或者在文件中设置一个局部变量，例如`static
    NSString *kSubthingiesKey = @"subThingies";`。


    请注意，每种类型都有不同的`encodeSomething:forKey:`方法。你需要确保使用正确的方法来编码你的类型。对于任何 Objective-C
    对象类型，你使用`encodeObject:forKey:`。


    当你恢复一个对象时，你将使用`decodeSomethingForKey:`方法：


    ```objc

    - (id) initWithCoder: (NSCoder *) decoder


    {


    if (self = [super init]) {


    self.name = [decoder decodeObjectForKey: @"name"];


    self.magicNumber = [decoder decodeIntForKey: @"magicNumber"];


    self.shoeSize = [decoder decodeFloatForKey: @"shoeSize"];


    self.subThingies = [decoder decodeObjectForKey: @"subThingies"];


    }


    return (self);


    } // initWithCoder

    ```


    `initWithCoder:` 就像其他任何`init`方法一样。你需要让父类先初始化，然后才能处理你自己的部分。有两种方法可以做到这一点，具体取决于你的父类是什么。如果你的父类采用了`NSCoding`，你应该调用`[super
    initWithCoder: decoder]`。如果你的父类没有采用`NSCoding`，你只需调用`[super init]`。`NSObject`没有采用`NSCoding`，所以我们使用简单的`init`。


    当你使用`decodeIntForKey:`时，你从解码器中取出一个`int`值。当你使用`decodeObjectForKey:`时，你从解码器中取出一个对象，并递归地对任何嵌入的对象使用`initWithCoder:`。内存管理的工作方式如你所预期：你从一个不是`alloc`、`copy`或`new`的方法中获取对象，因此你可以假定这些对象是自动释放的。我们的属性声明确保了所有内存管理都得到正确处理。


    你会注意到，我们的编码和解码顺序与实例变量的顺序相同。你不必这样做；这只是确保你编码和解码了所有内容、没有遗漏什么的便捷习惯。这也是在调用中使用键的原因之一——你可以按任意顺序放入和取出它们。

    '
- fmt: 'Now, let’s actually use this stuff. We have `thing1` we created earlier. Let’s
    archive it:


    ```

    NSData *freezeDried;


    freezeDried = [NSKeyedArchiver archivedDataWithRootObject: thing1];

    ```


    The `+archivedDataWithRootObject:` class method encodes that object. First, it
    creates an `NSKeyedArchiver` instance under the hood; it then passes it to the
    `-encodeWithCoder:` method of the object `thing1`. As `thing1` encodes its attributes,
    it can cause other objects to be encoded, like the string, the array, and any
    contents we might put in that array. Once the entire pile of objects has finished
    encoding keys and values, the keyed archiver flattens everything into an `NSData`
    and returns it.


    We can save this `NSData` to disk if we want by using the `-writeToFile:atomically:`
    method. Here, we’re just going to dispose of `thing1`, re-create it from the freeze-dried
    representation, and print it out:


    ```

    [thing1 release];


    thing1 = [NSKeyedUnarchiver unarchiveObjectWithData: freezeDried];


    NSLog (@"reconstituted thing: %@", thing1);

    ```


    It prints out the exact same thing we saw earlier:


    ```

    reconstituted thing: thing1: 42/10.5 ( )

    ```


    Seeing a gun on the wall in the first act of a Chekhov play makes you wonder,
    and, similarly, you’re probably wondering about that mutable array called `subThingies`.
    We can put objects into the array, and they will get encoded automatically when
    the array gets encoded. `NSArray`’s implementation of `encodeWithCoder:` invokes
    `encodeWithCoder:` on all of the objects, eventually leading to everything being
    encoded. Let’s add some `subThingies` to `thing1`:


    ```

    Thingie *anotherThing;


    anotherThing = [[[Thingie alloc]

    initWithName: @"thing2"

    magicNumber: 23

    shoeSize: 13.0] autorelease];


    [thing1.subThingies addObject: anotherThing];


    anotherThing = [[[Thingie alloc]

    initWithName: @"thing3"

    magicNumber: 17

    shoeSize: 9.0] autorelease];


    [thing1.subThingies addObject: anotherThing];


    NSLog (@"thing with things: %@", thing1);

    ```


    And this prints out `thing1` and the subthings:


    ```

    thing with things: thing1: 42/10.5 (

    thing2: 23/13.0 (

    ),

    thing3: 17/9.0 (

    )

    )

    ```


    Encoding and decoding works exactly the same:


    ```

    freezeDried = [NSKeyedArchiver archivedDataWithRootObject: thing1];


    thing1 = [NSKeyedUnarchiver unarchiveObjectWithData: freezeDried];


    NSLog (@"reconstituted multithing: %@", thing1);

    ```


    and prints out the same logging seen previously.


    What happens if there are cycles in the data being encoded? For example, what
    if `thing1` is in its own `subThingies` array? Would `thing1` encode the array,
    which encodes `thing1`, which encodes the array, which encodes `thing1` again,
    over and over again? Luckily, Cocoa is clever in its implementation of the archivers
    and unarchivers so that object cycles can be saved and restored.


    To test this out, put `thing1` into its own `subThingies` array: `[thing1.subThingies
    addObject: thing1];`


    Don’t try using `NSLog` on `thing1`, though. `NSLog` isn’t smart enough to detect
    object cycles, so it’s going to go off into an infinite recursion trying to construct
    the log string, eventually dropping you into the debugger with thousands upon
    thousands of `-description` calls.


    But, if we try encoding and decoding `thing1` now, it works perfectly fine, without
    running off into the weeds:


    ```

    freezeDried = [NSKeyedArchiver archivedDataWithRootObject: thing1];


    thing1 = [NSKeyedUnarchiver unarchiveObjectWithData: freezeDried];

    ```


    ## Summary


    As you saw in this chapter, Cocoa provides two techniques for loading and saving
    files: property lists (plists) and object encoding. Property list data types are
    a collection of classes that know how to load and save themselves. If you have
    a collection of objects that are all property list types, you can use handy convenience
    functions for saving them to disk and reading them back in.


    If, like most Cocoa programmers, you have your own objects that aren’t property
    list types, you can adopt the `NSCoding` protocol and implement methods to encode
    and decode the objects: You can turn your own pile of objects into an `NSData`,
    which you can then save to disk and read back in later. From this `NSData`, you
    can reconstruct the objects.'
