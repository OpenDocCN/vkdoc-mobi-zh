    of useful methods for converting your objects into NSData and back. You never
    create a new NSCoder instance because it doesn’t actually do much. But there are
    a couple of concrete subclasses of NSCoder that you actually use to encode and
    decode your objects. We’ll be using two of them, NSKeyedArchiver and NSKeyedUnarchiver.


