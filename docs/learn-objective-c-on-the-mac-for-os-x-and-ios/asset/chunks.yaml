- fmt: "那段代码看起来有点奇怪，但实际上它做的事情是正确的。请记住，`@\"string\"`这种字符串实际上是完整的`NSString`对象。它们像其他`NSString`对象一样响应消息。因为我们在`NSString`上添加了这个分类，所以任何字符串都会响应`lengthAsNumber`，即使是像这样的字面量字符串。\n\
    \n这一点值得重复强调。这一点值得重复强调！**任何** `NSString` 都会响应 `lengthAsNumber`——这包括字面量字符串、来自 `description`\
    \ 方法的字符串、可变字符串、来自工具包其他部分的字符串、从文件加载的字符串、从广袤互联网获取的字符串等等。这种兼容性使得分类成为一个非常强大的概念。无需对\
    \ `NSString` 进行子类化就能获得这种行为——它**就是行得通**。\n\n当你运行这个程序时，你会得到如下输出：\n\n```\n{\n   \
    \ \"Once upon a time\" = 16;\n    hello = 5;\n    iLikeFish = 9;\n}\n```\n\n###\
    \ 糟糕的分类\n\n现在你已经对分类有些上瘾了，让我们稍微把你拉回现实。分类有两个限制。第一个是你不能向类添加新的实例变量。没有地方放置它们。\n\n第二个限制涉及名称冲突，即你分类中的某个方法与现有方法同名。当名称冲突时，分类胜出。你的分类方法将完全替换原始方法，并且无法找回原始方法。有些程序员会给他们的分类方法添加前缀，以确保不会发生冲突。\n\
    \n**注意**：有一些技巧可以绕过无法添加新实例变量的限制。例如，你可以使用一个全局字典来存储对象与你想要关联的任何额外变量之间的映射。但如果你发现自己依赖于这些技巧，你可能需要考虑一下分类是否真的适合你当前的工作。\n\
    \n### 好的分类\n\n在 Cocoa 中，分类主要用于三个目的：将类的实现拆分到多个文件或多个框架中、为私有方法创建前向引用、以及为对象添加非正式协议。如果你不知道“非正式协议”是什么意思，不用担心。我们稍后会介绍。\n\
    \n### 克林特·伊斯特伍德会喜欢这个\n\n现在我们已经讨论了糟糕的和好的分类，让我们介绍一种特殊的分类，它有一个特殊的描述：**类扩展**。这个分类的特殊之处之一在于它没有名字。这意味着什么？嗯，我们刚刚经历了一个过程：为分类命名，并在定义\
    \ `@interface` 时使用那个名字。而这个特殊的类扩展分类是没有名字的。下面是关于类扩展分类的完整说明：\n\n*   就像我们指出的，它没有名字。\n\
    *   你可以将其用于你有源代码的类（也就是说，你自己的类）。\n*   你可以添加实例变量。\n*   你可以将变量的可变性从 `readonly` 改为\
    \ `readwrite`。\n*   你可以拥有任意数量的类扩展。\n\n看看项目 *12.02 Class Extension*。我们创建了一个简单的类，叫做\
    \ `Things`，它看起来像这样：\n\n```\n@interface Things : NSObject\n\n@property (assign)\
    \ NSInteger thing1;\n\n@property (readonly, assign) NSInteger thing2;\n\n- (void)resetAllValues;\n\
    \n@end\n```\n\n这个类有两个属性和一个方法。我们将 `thing2` 属性标记为 `readonly`，这就是该类公共接口中可见的全部内容。但事情远不止于此，当我们窥探其实现时就会看到。首先，注意这段代码：\n\
    \n```\n@interface Things ()\n{\n    NSInteger thing4;\n}\n\n@property (readwrite,\
    \ assign) NSInteger thing2;\n@property (assign) NSInteger thing3;\n\n@end\n```\n\
    \n这看起来几乎就像我们在定义一个类，只是没有父类。我们实际上是在对 `Things` 类进行**扩展**，通过添加私有属性和方法。这就是为什么它被称为**类扩展**。\n\
    \n看看 `thing2` 属性，你可能会注意到我们已经在头文件中定义了这个属性。我们在这里对它在做什么？我们正在改变它的可变性，将其标记为 `readwrite`，这样编译器就会生成一个\
    \ setter，但对该类的访问保持私有。公共接口只有 getter。\n\n我们还添加了一个私有的 `thing3` 属性，只能在此类内部使用。我们还添加了一个名为\
    \ `thing4` 的实例变量，它也是私有的。\n\n那是什么警报声？是的，内存警察来了，想看看我们打算如何处理我们的新对象。因为我们使用的是 ARC，所以我们不需要释放对象，它们在自动释放池结束时会被自动释放。内存警察很满意。\n\
    \n那么，你为什么要做这样的事情呢？面向对象编程的一个特点是信息隐藏。你只想暴露用户需要看到的东西，而隐藏其他内容，比如实现细节。这些技术能帮你实现这一点。\n\
    \n我们将这个分类放在 `.m` 文件中，但我们也可以将其放在私有头文件（`ThingsPrivate.h`）中，并允许 `Things` 的子类或友类访问这些内容。\n\
    \n你可以有多个类扩展分类，这可能会导致难以发现的 bug，所以请明智地使用这个特性。\n\n现在运行程序会得到：\n\n```\n1    0    0\n\
    200  300  400\n```\n\n### 使用分类拆分实现\n\n正如你在[第6章](#9781430241881_Ch6.xhtml)中看到的，你可以将类的接口放在头文件中，将实现放在\
    \ `.m` 文件中。但你无法将一个 `@implementation` 拆分到多个 `.m` 文件中。如果你有一个很大的类想要拆分到多个 `.m` 文件中，你可以使用分类来完成这个工作。\n\
    \n以 AppKit 提供的 `NSWindow` 类为例。如果你查看 `NSWindow` 的文档，你会发现成百上千个方法；`NSWindow` 文档打印出来超过\
    \ 60 页（别在家试这个）。\n\n将 `NSWindow` 的所有代码放在一个文件中会使其变得巨大且难以维护，这对 Cocoa 开发团队来说负担不小，更不用提我们这些可怜的开发者了。如果你查看头文件并搜索\
    \ `@interface`，你会看到官方的类接口：\n\n```\n@interface NSWindow : NSResponder\n```\n\n\
    然后，还有一大堆分类，包括这些：\n\n```\n@interface NSWindow(NSKeyboardUI)\n@interface NSWindow(NSToolbarSupport)\n\
    @interface NSWindow(NSDrag)\n@interface NSWindow(NSCarbonExtensions)\n```\n\n\
    这种分类的用法允许所有键盘用户界面相关的东西放在一个源文件中，工具栏代码放在另一个文件中，拖放功能放在另一个文件中，等等。这些分类还将方法分成了逻辑组，让阅读头文件的人更容易理解。这正是我们将要尝试的，只不过规模小一些。\n\
    \n### 在我们的项目中使用分类\n\n`CategoryThing` 项目位于 *12.03 CategoryThing* 文件夹中，它有一个简单的类，分布在几个实现文件中。\n\
    \n首先是 `CategoryThing.h`，它包含了类声明和一些分类。这个文件以导入 Foundation 框架开头，然后是用三个整型实例变量声明的类：\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface CategoryThing : NSObject\n\
    {\n    NSInteger thing1;\n    NSInteger thing2;\n    NSInteger thing3;\n}\n\n\
    @end // CategoryThing\n```\n\n在类声明之后，有三个分类，每个分类都有一个实例变量的访问器方法。我们将把这些方法的实现放到不同的文件中。\n\
    \n```\n@interface CategoryThing (Thing1)\n- (void)setThing1:(NSInteger)thing1;\n\
    - (NSInteger)thing1;\n@end // CategoryThing (Thing1)\n\n@interface CategoryThing(Thing2)\n\
    - (void)setThing2:(NSInteger)thing2;\n- (NSInteger)thing2;\n@end // CategoryThing\
    \ (Thing2)\n```"
  raw: 'That code looks weird, but it’s actually doing the right thing. Remember that
    the @"string" kind of strings are actually full-blown NSString objects. They react
    to messages just like any other NSString object. Because we now have this category
    on NSString, any string will react to lengthAsNumber, even literal strings like
    these.


    This bears repeating. This bears repeating! *Any* NSString will respond to lengthAsNumber—that
    includes literal strings, strings from description methods, mutable strings, strings
    from other parts of the toolkit, strings loaded from files, strings fetched from
    across the vast reaches of the Internet, and so on. This compatibility is what
    makes categories a hugely powerful idea. There is no need to subclass NSString
    to get this behavior—it *just works*.


    When you run the program, you’ll get output like this:


    {


    "Once upon a time" = 16;


    hello = 5;


    iLikeFish = 9;


    }


    Bad Categories


    Now that you’re all high on categories, let’s bring you back to earth a bit. Categories
    have two limitations. The first is that you can’t add new instance variables to
    a class. There’s nowhere to put them.


    The second limitation concerns name collisions, in which one of your category
    methods has the same name as an existing method. When names collide, the category
    wins. Your category method will completely replace the original method, with no
    way of getting the original back. Some programmers add a prefix to their category
    methods to make sure there won’t be a conflict.


    **Note** There are techniques for getting around the inability to add new instance
    variables. For example, you can use a global dictionary to store a mapping between
    objects and any extra variables you want to associate with them. But if you find
    yourself relying on these tricks, you may want to consider if a category is really
    the best choice for what you’re doing.


    Good Categories


    In Cocoa, categories are used mainly for three purposes: splitting a class’s implementation
    across multiple files or multiple frameworks, creating forward references for
    private methods, and adding informal protocols to an object. Don’t worry if you
    have no idea what “informal protocol” means. We’ll cover that in a little bit.


    Clint Eastwood Would Love This


    Now that we’ve talked about bad and good categories, let’s introduce one special
    category, with a special description: **class extension**. One of this category’s
    special qualities is that it has no name. What does that mean? Well, we just went
    through the process of naming a category and using that name when defining the
    @interface. This special class extension category is not named. Here’s a complete
    rundown on the class extension category:


    *   ![image](images/9781430241881_square_fmt.jpg)  As we’ve pointed out, it doesn’t
    have a name.

    *   ![image](images/9781430241881_square_fmt.jpg)  You can use it for classes
    you have the source for (that is, your own classes).

    *   ![image](images/9781430241881_square_fmt.jpg)  You can add instance variables.

    *   ![image](images/9781430241881_square_fmt.jpg)  You can change the mutability
    of variables from readonly to readwrite.

    *   ![image](images/9781430241881_square_fmt.jpg)  You can have any number of
    them.


    Take a look at the project *12.02 Class Extension*. We have created a simple class
    called Things, and it looks like this:


    @interface Things : NSObject


    @property (assign) NSInteger thing1;


    @property (readonly, assign) NSInteger thing2;


    - (void)resetAllValues;


    @end


    The class has two properties and a method. We have marked the thing2 property
    as readonly, and that’s all that’s vsisible in the class’s public interface. But
    there’s more to it than that, as we’ll see when we take a peek at the implementation.
    First, notice this code:


    @interface Things ()


    {


    NSInteger thing4;


    }


    @property (readwrite, assign) NSInteger thing2;


    @property (assign) NSInteger thing3;


    @end


    This looks almost like we’re defining a class, except that there’s no parent class.
    What we’re doing is basically taking the class Things and *extending* it by adding
    private properties and methods. That’s why it’s called *class extension*.


    Looking at the thing2 property, you might notice that we already defined this
    property in the header file. What are we doing with it here? We’re changing its
    mutability, marking it readwrite so that the compiler will generate a setter but
    keep access private to this class. The public interface has only a getter.


    We have also added a private things3 property that can be only used by this class
    internally. And we added an instance variable named thing4, which is also private.


    What’s that siren? Yep, here come the memory police to find out what we’re doing
    about our new objects. Because we’re using ARC, we don’t have to release the objects,
    as they will released for us at the end of the autorelease pool. The memory police
    are satisfied.


    So why would you want to do something like this? One of the characteristics of
    object-oriented programming is information hiding. You want to expose only things
    that users need to see, and nothing else, such as implementation details. These
    techniques help you accomplish that.


    We put this category in the *.m* file, but we could put it in the private header
    (*ThingsPrivate.h*) and allow Things subclasses or friend classes to have access
    to these items.


    You can have multiple class extension categories, which can lead to bugs that
    are hard to find, so please use this feature wisely.


    Running the program now gives us


    1    0    0


    200  300  400


    Splitting an Implementation with Categories


    As you saw in [Chapter 6](#9781430241881_Ch6.xhtml), you can put a class’s interface
    into a header file and the implementation into a *.m* file. But you can’t split
    an @implementation across multiple *.m* files. If you have a single large class
    you want to split across multiple *.m* files, you can use categories to do the
    job.


    Take, for instance, the NSWindow class provided by the AppKit. If you look at
    the documentation for NSWindow, you’ll find hundreds of methods; the NSWindow
    documentation is over 60 pages long when printed (don’t try this at home).


    Putting all the code for NSWindow into one file would make it huge and unwieldy
    for the Cocoa development team, not to mention us poor developers. If you look
    at the header file and search for “@interface,” you’ll see the official class
    interface:


    @interface NSWindow : NSResponder


    Then, there are a whole bunch of categories, including these:


    @interface NSWindow(NSKeyboardUI)


    @interface NSWindow(NSToolbarSupport)


    @interface NSWindow(NSDrag)


    @interface NSWindow(NSCarbonExtensions)


    This use of categories allows all the keyboard user interface stuff to live in
    one source file, the toolbar code in another file, drag-and-drop features in yet
    another, and so on. These categories also break the methods into logical groups,
    making life easier for folks who are reading the header file. That’s what we’re
    going to try but on a smaller scale.


    Using Categories in our Project


    The CategoryThing project, found in the *12.03 CategoryThing* folder, has a simple
    class that’s spread across a couple of implementation files.


    First is *CategoryThing.h*, which has the class declaration and some categories.
    This file starts with the #import of the Foundation framework and the class declaration
    with three integer instance variables:


    #import <Foundation/Foundation.h>


    @interface CategoryThing : NSObject


    {


    NSInteger thing1;


    NSInteger thing2;


    NSInteger thing3;


    }


    @end // CategoryThing


    After the class declaration come three categories, and each category has accessor
    methods for one instance variable. We’ll put the implementation of these into
    separate files.


    @interface CategoryThing (Thing1)


    - (void)setThing1:(NSInteger)thing1;


    - (NSInteger)thing1;


    @end // CategoryThing (Thing1)


    @interface CategoryThing(Thing2)


    - (void)setThing2:(NSInteger)thing2;


    - (NSInteger)thing2;


    @end // CategoryThing (Thing2)'
