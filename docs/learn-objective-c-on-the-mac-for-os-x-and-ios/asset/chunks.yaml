- fmt: '# Xcode Includes the File Name and the Project Name


    Xcode includes the file name and the project name, as well as the creation user
    and time, because this information lets you know at a glance which file you’re
    looking at and who was responsible for its creation, as well as giving you a clue
    as to its general vintage. The default company name, though, is unfortunate. Last
    time we checked, `__MyCompanyName__` wasn’t hiring Mac programmers, only TPS report
    creators.


    ![9781430241881_Fig07-02.tif](images/9781430241881_Fig07-02_fmt.jpg)


    **Figure 7-2.** Changing the company name


    Changing the company name is a simple process. Select the project in the navigator
    pane and in the editor pane. Look at the inspector pane on the right. Under Project
    Document, you’ll see the Organization field. Type your company name there. From
    now on, the project will use your company name instead of `__MyCompanyName__`.


    ## Using Editor Tips and Tricks


    Xcode provides you with a couple of basic ways of organizing the project and source
    code editors. So far, we’ve shown the default interface, which is mostly an all-in-one
    window for your minute-by-minute project and coding tasks. A single editing pane
    is used for all source files, and the contents of the editor change based on which
    source file is selected in the navigator pane at the left side of the window.


    Here’s a little more detail about what you see in the navigator pane. The files
    list shows you all the moving parts of your project: your source files, the frameworks
    you link to, and the *Products* folder that describe how to actually build your
    individual programs. You’ll also find some utilities, for example, to access to
    source code control repositories (handy if you’re collaborating with other programmers);
    all your project symbols; and some smart folders.


    When you select a file, you’ll see a file path at the top of the window under
    the toolbar showing where the file is located in your project. You can use the
    search box at the bottom of the navigator pane to narrow down the list of files
    shown. [Figure 7-3](#9781430241881_Ch7.xhtml#_FIG3) shows a search for the word
    “car” in file names. You can use this filter box with any navigator view.


    ![9781430241881_Fig07-03.tif](images/9781430241881_Fig07-03_fmt.jpg)


    [Figure 7-3](#9781430241881_Ch7.xhtml#FIG3). Narrowing down the list of files


    The browser shows each of the matching source files with “car” in its name. You
    can click files in the browser to put them into the editor. Because larger projects
    may have over a hundred source files, the browser is a handy way to navigate around
    if you have lots of files. We’ll talk a bit more about navigating through your
    source files later in this chapter.


    When you’re working on code, you’ll want to hide the browser to maximize the use
    of your screen real estate. One of the toolbar icons on the far right side of
    the window is labeled *View*. It has three buttons; you can hover over them to
    see what they do (but we’ll tell you here anyway). The left one hides or shows
    the navigator pane, or you can use `![image](images/Rangoli1.jpg)0` as a shortcut.
    The middle button toggles the debugger area, and the right button is for the inspector.


    Having each source file in its own window can be useful, especially if you’re
    comparing two different files. Double-clicking a source file in the navigator
    pane opens the file in a new window. You can have the same file open in two windows,
    but be warned that sometimes the two windows can get out of sync (you can click
    each of them to sync).


    You might prefer to use tabs (just like in Safari) instead of multiple windows—Xcode
    has you covered. It’s almost as if the Xcode people know the Safari people or
    something. To make tabs appear, choose View `![image](images/9781430241881_arrow_fmt.jpg)`
    Show Tab Bar (see [Figure 7-4](#9781430241881_Ch7.xhtml#_FIG4)). To add more tabs,
    click the + on the right side of the tab bar.


    ![9781430241881_Fig07-04.tif](images/9781430241881_Fig07-04_fmt.jpg)


    [Figure 7-4](#9781430241881_Ch7.xhtml#FIG4). Running a tab at the bar


    ## Writing Your Code with a Little Help from Xcode


    Many programmers write code all day. Many programmers write code all night, too.
    For all of those programmers, Xcode has some features that make writing code easier
    and more fun.


    ### Indentation (Pretty Printing)


    You’ve probably noticed that all the code in this book is nicely indented, with
    bodies of `if` statements and `for` loops shifted over so they’re indented farther
    than surrounding code. Objective-C does not require you to indent your code, but
    doing so is a good idea because it makes seeing the structure of your code easier
    at a glance. Xcode automatically indents your code as you type it.


    Sometimes, heavy editing can leave the code in a messy state. Xcode can help here,
    too. With text selected, control-click (or right-click) to see the editor’s contextual
    menu, and then choose Structure `![image](images/9781430241881_arrow_fmt.jpg)`
    Re-Indent. Xcode will go through the selection, tidying everything up. You can
    use the shortcut `control-I` for the same feature.


    Use the Structure menu, or press `![image](images/Rangoli1.jpg)[` and `![image](images/Rangoli1.jpg)]`,
    to shift the selected code left or right. This bit of reformatting is handy if
    you just put an `if` statement around some code.


    Let’s say you have this in the editor:


    ```

    Engine *engine = [Slant6 new];


    [car setEngine: engine];

    ```


    Later, you decide you want to create a new engine only if the user set a preference:


    ```

    if (userWantsANewEngine) {


    Engine *engine = [Slant6 new];


    [car setEngine: engine];


    }

    ```


    You can select the two middle lines of code and press `![image](images/Rangoli1.jpg)]`
    to shift them over.


    You can infinitely tweak Xcode’s indentation engine. You might prefer spaces to
    tabs. You might like each of your opening braces to be put on a new line instead
    of up on the same lines with the `if` statement. Whatever you want to do, chances
    are you can tailor Xcode to abide by your One True Code formatting style: much
    of the magic is found in Xcode `![image](images/9781430241881_arrow_fmt.jpg)`
    Preferences `![image](images/9781430241881_arrow_fmt.jpg)` Text Editing `![image](images/9781430241881_arrow_fmt.jpg)`
    Indentation. Here’s a handy tip: if you want to quickly and easily start a heated
    Internet discussion among programmers, begin talking about code formatting preferences.


    ### You Complete Me


    You might have noticed that Xcode sometimes offers suggestions while you’re typing
    code. This is Xcode’s Code Sense feature, often just called **code completion**.
    As you’re writing your program, Xcode builds an index of a whole lot of stuff,
    including names of variables and methods in your projects and the frameworks you
    include. It knows about local variable names and their types. It probably even
    knows if you’ve been naughty or nice. As you’re typing, Xcode is constantly comparing
    what you’re typing with its index of symbols. If there’s a match, Xcode will offer
    a suggestion, as shown in [Figure 7-5](#9781430241881_Ch7.xhtml#_FIG5).


    ![9781430241881_Fig07-05.tif](images/9781430241881_Fig07-05_fmt.jpg)


    [Figure 7-5](#9781430241881_Ch7.xhtml#FIG5). Xcode code completion


    Here, we’ve started typing `[All*`, and Xcode thinks we might be wanting to send
    a message to the `AllWeatherRadial` class (see the gray text following `[AllW*`
    in [Figure 7-5](#9781430241881_Ch7.xhtml#_FIG5)). Xcode happened to guess correctly,
    so we can press tab to accept `AllWeatherRadial` as the completion.


    “Aww,” you say, “that’s too easy! We only have one class that starts with ‘All’!”
    That’s true, but Xcode offers a completion menu ([Figure 7-6](#9781430241881_Ch7.xhtml#_FIG6))
    even if there are many possibilities. If you want the menu to go away, just press
    escape, or press escape again to bring it back.


    ![9781430241881_Fig07-06.tif](images/9781430241881_Fig07-06_fmt.jpg)


    [Figure 7-6](#9781430241881_Ch7.xhtml#FIG6). Possible completions for “all”'
