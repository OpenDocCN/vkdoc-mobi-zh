    of memory and gets it ready to become a productive member of society. init methods—that
    is, methods that do initialization—almost always return the object they’re initializing.
    You can (and should) chain your allocs and initializations like this:


    Car *car = [[Car alloc] init];


    and not like this:


    Car *car = [Car alloc]; [car init];


    This chaining technique is important because an initialization method might return
    an object that’s not the same as the one that was allocated. If you think that’s
    pretty odd, you’re right. But it can happen.


