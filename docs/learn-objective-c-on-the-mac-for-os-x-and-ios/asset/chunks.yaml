    \n要使用操作，首先需要创建一个操作对象；然后将其分配给操作队列，让队列执行它。创建操作有三种方式：\n\n- **`NSInvocationOperation`**：当你已经有一个执行任务的类，并希望它在队列中执行时，使用此方式。\n\
