    **总结**


    呼！为了让一个简单的应用程序在模拟器中运行，我们了解了大量信息，尽管Xcode确实帮了我们很多忙。显然，我们只是触及了可用于开发iOS应用程序的庞大API集的皮毛。


    在本章中，我们向你展示了如何在iOS应用程序中使用视图控制器，以及iOS如何为视图管理内存。我们讨论了iOS特有的类。我们花时间探讨了iOS与OS X的相似之处和不同之处。


    如果你计划为iOS开发应用程序并想了解更多，请查阅David Mark、Jack Nutting和Jeff LaMarche合著的《*Beginning iOS
    5 Development*》（Apress，2011年）。


    ## 第16章


    ### 介绍Application Kit


    到目前为止，本书中的所有程序都使用了Foundation Kit，并通过向控制台发送文本输出这一历史悠久的传统方法与用户交流。这对于入门来说没问题，但当你看到包含可点击和可操作的元素的Mac风格界面时，真正的乐趣才开始。在本章中，我们将绕道而行，向你展示Application
    Kit（或AppKit）的一些亮点，这是Cocoa为OS X提供的用户界面宝库。


    我们将要在本章构建的程序叫做`CaseTool`，你可以在`16.01 CaseTool`项目文件夹中找到它。`CaseTool`会显示一个类似[图16-1](#9781430241881_Ch16.xhtml#_FIG1)截图的窗口。该窗口包含一个文本字段、一个标签和几个按钮。当你在字段中输入一些文本并点击一个按钮时，输入的文本会被转换为大写或小写。尽管这确实很酷，但在你以4.99美元的价格将应用程序发布到Mac
    App Store之前，你无疑会想要添加更多有用的功能。


    ![9781430241881_Fig16-01.tif](images/9781430241881_Fig16-01_fmt.jpg)


    [图16-1](#9781430241881_Ch16.xhtml#FIG1). 最终产品


    ### 创建项目


    你将使用Xcode来构建此项目，我们将逐步引导你完成整个过程。首先，需要创建项目文件。然后，我们将布局用户界面。最后，建立UI与代码之间的连接。


    让我们开始吧：启动Xcode并创建一个新的Cocoa Application项目。运行Xcode。在启动屏幕上，点击Create a New Xcode Project。（如果Xcode已在运行，请选择File
    ![image](images/9781430241881_arrow_fmt.jpg) New ![image](images/9781430241881_arrow_fmt.jpg)
    New Project。）在Mac OS X下的左侧表格中选择Application（如果尚未选中）。选择Cocoa Application（如[图16-2](#9781430241881_Ch16.xhtml#_FIG2)所示），然后点击Next为我们的应用程序设置一些选项。


    ![9781430241881_Fig16-02.tif](images/9781430241881_Fig16-02_fmt.jpg)


    [图16-2](#9781430241881_Ch16.xhtml#FIG2). 创建一个新的Cocoa Application


    查看[图16-3](#9781430241881_Ch16.xhtml#_FIG3)，了解设置选项的界面。第一个选项是Product Name；我们将输入*CaseTool*。下一个字段是Company
    Identifier，用于App Store区分你的应用程序与其他应用程序。公司标识符通常采用**反向域名**格式；也就是说，以*com*开头，后跟句点和公司名称。在我们的示例中，我们使用`com.MySuperCompany`。此字段区分大小写，因此选择时请记住这一点。


    ![9781430241881_Fig16-03.tif](images/9781430241881_Fig16-03_fmt.jpg)


    [图16-3](#9781430241881_Ch16.xhtml#FIG3). 命名新项目


    下一个字段是Class Prefix。习惯上，在此处输入三个或更多字符。此字符串会被添加到您创建的类名之前。我们将使用`MSC`，这当然代表“My Super
