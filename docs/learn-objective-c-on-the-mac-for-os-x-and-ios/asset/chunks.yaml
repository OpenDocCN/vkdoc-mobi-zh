- fmt: "# AppDelegate Implementation\n\nNow, let’s get back to coding. It’s time to\
    \ implement `MSCAppDelegate`—but first, a little bit on how an `IBOutlet` works.\n\
    \nWhen a nib file is loaded (`MainMenu.xib` is loaded automatically when the application\
    \ starts, and you can create your own nib files and load them yourself), any objects\
    \ that were stored in the nib file are re-created. This means that `alloc` and\
    \ `init` both take place under the hood. When the application starts, an `MSCAppDelegate`\
    \ instance is allocated and initialized. During the `init` method, all the `IBOutlet`\
    \ instance variables are `nil`. Only after *all* the objects in the nib file are\
    \ created (including the window and text fields and buttons) will all the connections\
    \ be set up.\n\nOnce all the connections are made (which simply involves putting\
    \ the address of the `NSTextField` objects into the `MSCAppDelegate`’s instance\
    \ variables), the message `awakeFromNib` is sent to every object that was created.\
    \ Note that there is no predefined order in which the objects are created, and\
    \ no predefined order in which `awakeFromNib` messages are sent.\n\nA very, very\
    \ common error is to try to do some work with `IBOutlet`s in the `init` method.\
    \ Because all the instance variables are `nil`, all messages to them are no-ops,\
    \ so any work you try to do in `init` will silently fail (this is one of the places\
    \ where Cocoa can let you down and cost you some debugging time). If you think\
    \ this is happening and you’re wondering why your code isn’t working, use `NSLog`\
    \ to print the values of your instance variables and see if they’re all `nil`.\n\
    \nLet’s get on with `MSCAppDelegate`’s implementation. Here are the necessary\
    \ preliminaries:\n\n```objc\n#import \"MSCAppDelegate.h\"\n\n@implementation MSCAppDelegate\n\
    ```\n\nNext are the properties that we defined. But where did that code come from?\
    \ We didn’t add it. Well, we sort of did: when we dragged items from the nib file\
    \ to the header, Interface Builder added this code for us.\n\nNext we’ll add an\
    \ `init` method. We don’t really need this, but we want to show that outlets have\
    \ no values at `init` time.\n\n```objc\n- (id) init\n{\n    if (nil != (self =\
    \ [super init]))\n    {\n        NSLog (@\"init: text %@ / results %@\", _textField,\
    \ _resultsField);\n    }\n    return self;\n}\n```\n\nTo have a nicer user interface,\
    \ we should set the text fields to some reasonable default value, rather than\
    \ `Label`. True, it’s an accurate default value, but it’s not terribly interesting.\
    \ We’ll put `Enter text here` into the text field, and the results field will\
    \ be preset to `Results`. `awakeFromNib` is the ideal place for this (although\
    \ we could have also set this up in Interface Builder).\n\n```objc\n- (void)awakeFromNib\n\
    {\n    NSLog (@\"awake: text %@ / results %@\", _textField, _resultsField);\n\
    \    [_textField setStringValue:@\"Enter text here\"];\n    [_resultsField setStringValue:@\"\
    Results\"];\n}\n```\n\n`NSTextField` has a method called `setStringValue:`, which\
    \ takes an `NSString` as its parameter and changes the contents of the text field\
    \ to reflect that string value. That’s the method we’re using to change the text\
    \ fields to something more interesting for users to look at.\n\nNow, for the action\
    \ methods—first is `uppercase`:\n\n```objc\n- (IBAction) uppercase: (id) sender\n\
    {\n    NSString *original = [_textField stringValue];\n    NSString *uppercase\
    \ = [original uppercaseString];\n    [_resultsField setStringValue:uppercase];\n\
    } // uppercase\n```\n\nWe get the original string from the `_textField` using\
    \ the `stringValue` message, and we make an uppercase version. `NSString` provides\
    \ us with the handy `uppercaseString` method, which creates a new string built\
    \ from the contents of the receiving string, but with every letter kicked to uppercase.\
    \ That string is then set as the contents of the `_resultsField`."
  raw: '![9781430241881_Fig16-17.tif](images/9781430241881_Fig16-17_fmt.jpg)


    [Figure 16-17](#9781430241881_Ch16.xhtml#FIG17). Make the connection (again)


    Chances are you moved along fairly slowly laying out the objects and making the
    connections. That’s OK. With practice, you’ll get a lot faster. An experienced
    IB jockey can zip through all these steps in less than a minute.


    AppDelegate Implementation


    Now, let’s get back to coding. It’s time to implement MSCAppDelegate—but first,
    a little bit on how an IBOutlet works.


    When a nib file is loaded (*MainMenu.xib* is loaded automatically when the application
    starts, and you can create your own nib files and load them yourself), any objects
    that were stored in the nib file are re-created. This means that alloc and init
    both take place under the hood. When the application starts, an MSCAppDelegate
    instance is allocated and initialized. During the init method, all the IBOutlet
    instance variables are nil. Only after *all* the objects in the nib file are created
    (including the window and text fields and buttons) will all the connections be
    set up.


    Once all the connections are made (which simply involves putting the address of
    the NSTextField objects into the MSCAppDelegate’s instance variables), the message
    awakeFromNib is sent to every object that was created. Note that there is no predefined
    order in which the objects are created, and no predefined order in which awakeFromNib
    messages are sent.


    A very, very common error is to try to do some work with IBOutlets in the init
    method. Because all the instance variables are nil, all messages to them are no-ops,
    so any work you try to do in init will silently fail (this is one of the places
    where Cocoa can let you down and cost you some debugging time). If you think this
    is happening and you’re wondering why your code isn’t working, use NSLog to print
    the values of your instance variables and see if they’re all nil.


    Let’s get on with MSCAppDelegate’s implementation. Here are the necessary preliminaries:


    #import "MSCAppDelegate.h"


    @implementation MSCAppDelegate


    Next are the properties that we defined. But where did that code come from? We
    didn’t add it. Well, we sort of did: when we dragged items from the nib file to
    the header, Interface Builder added this code for us.


    Next we’ll add an init method. We don’t really need this, but we want to show
    that outlets have no values at init time.


    - (id) init


    {


    if (nil != (self = [super init]))


    {


    NSLog (@"init: text %@ / results %@", _textField, _resultsField);


    }


    return self;


    }


    To have a nicer user interface, we should set the text fields to some reasonable
    default value, rather than Label. True, it’s an accurate default value, but it’s
    not terribly interesting. We’ll put Enter text here into the text field, and the
    results field will be preset to Results. awakeFromNib is the ideal place for this
    (although we could have also set this up in Interface Builder).


    - (void)awakeFromNib


    {


    NSLog (@"awake: text %@ / results %@", _textField, _resultsField);


    [_textField setStringValue:@"Enter text here"];


    [_resultsField setStringValue:@"Results"];


    }


    NSTextField has a method called setStringValue:, which takes an NSString as its
    parameter and changes the contents of the text field to reflect that string value.
    That’s the method we’re using to change the text fields to something more interesting
    for users to look at.


    Now, for the action methods—first is uppercase:


    - (IBAction) uppercase: (id) sender


    {


    NSString *original = [_textField stringValue];


    NSString *uppercase = [original uppercaseString];


    [_resultsField setStringValue:uppercase];


    } // uppercase


    We get the original string from the _textField using the stringValue message,
    and we make an uppercase version. NSString provides us with the handy uppercaseString
    method, which creates a new string built from the contents of the receiving string,
    but with every letter kicked to uppercase. That string is then set as the contents
    of the _resultsField.'
