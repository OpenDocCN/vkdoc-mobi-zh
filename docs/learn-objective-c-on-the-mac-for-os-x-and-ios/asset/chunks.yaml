    \ 2];\n\n    if(nil == string)\n\n    {\n\n        return;\n\n    }\n\n    NSArray\
    \ *array = [[NSArray alloc] initWithObjects:string, nil];\n\n    if(nil == array)\n\
    \n    {\n\n        return;\n\n    }\n\n    // do some stuff\n\n    // Much later\n\
    \n    [array release];\n\n    [string release];\n\n}\n```\n\nAt first glance,\
    \ this code looks very nice. We’re being good citizens by allocating memory and\
    \ then releasing it when the method finishes. All is well and good, right? Not\
    \ really! The analyzer reveals the sordid truth.\n\nOne path in the code will\
    \ result in a memory leak. If the memory allocation for `array` fails, the method\
    \ can’t proceed, and the method returns immediately. But at this point, we have\
