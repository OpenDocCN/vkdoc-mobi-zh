    \    }\n    }\n} // drawShapes\n```\n\n以下是 `drawCircle()` 的代码，它仅打印出传入的边界矩形和颜色：\n\
    \n```objc\nvoid drawCircle (ShapeRect bounds, ShapeColor fillColor)\n{\n    NSLog\
    \ (@\"drawing a circle at (%d %d %d %d) in %@\",\n           bounds.x, bounds.y,\n\
    \           bounds.width, bounds.height,\n           colorName(fillColor));\n\
    } // drawCircle\n```\n\n在 `NSLog()` 内部调用的 `colorName()` 函数，只是对传入的颜色值执行一个 `switch`\
    \ 判断，并返回一个如 `@\"red\"` 或 `@\"blue\"` 之类的字面量 `NSString`：\n\n```objc\nNSString *colorName\
    \ (ShapeColor colorName)\n{\n    switch (colorName) {\n        case kRedColor:\n\
    \            return @\"red\";\n            break;\n        case kGreenColor:\n\
    \            return @\"green\";\n            break;\n        case kBlueColor:\n\
    \            return @\"blue\";\n            break;\n    }\n    return @\"no clue\"\
    ;\n} // colorName\n```\n\n其他绘图函数与 `drawCircle` 几乎相同，区别在于它们分别绘制矩形和蛋形。\n\n以下是 `Shapes-Procedural`\
