    \ CarPartsInit`项目以使用属性。本章的最终代码可以在`11.01 CarProperties`项目中找到。\n\n请记住，Objective-C\
    \ 2.0 的特性只能在 Mac OS X 10.5（Leopard）或更高版本上使用，所以如果你需要支持较老的系统，必须三思而后行。属性在 Cocoa 的新版本（特别是炫酷的\
    \ Core Animation 特性）中大量使用，在 iOS 开发中也频繁使用，因此非常值得熟悉。\n\n### 精简属性值\n\n首先，我们将转换一个相对简单的类`AllWeatherRadial`，使其使用属性。为了让讨论更有趣一点，我们将在`main`函数中添加一些调用，来改变我们创建的`AllWeatherRadial`对象的一些值。我们模拟某人从不同的商店购买了四个打折轮胎，因此四个轮胎的操控特性各不相同。\n\
    \n下面是更新后的`main`函数，新添加的行以粗体显示：\n\n```\nint main(int argc, const char * argv[])\n\
    {\n    @autoreleasepool\n    {\n        Car *car = [[Car alloc] init];\n     \
    \   for (int i = 0; i < 4; i++)\n        {\n            AllWeatherRadial *tire;\n\
    \            tire = [[AllWeatherRadial alloc] init];\n            [tire setRainHandling:20+i];\n\
    \            [tire setSnowHandling:28+i];\n            NSLog(@\"tire %d's handling\
    \ is %.f %.f\", i,\n                  [tire rainHandling], [tire snowHandling]);\n\
    \            [car setTire:tire atIndex:i];\n            [tire release];\n    \
    \    }\n        \n        Engine *engine = [[Slant6 alloc] init];\n        [car\
    \ setEngine:engine];\n        [car print];\n        [car release];\n    }\n  \
    \  return (0);\n}\n```\n\n如果你现在运行程序，会得到以下输出，显示了我们新改变的轮胎操控值：\n\n```\ntire 0's handling\
    \ is 20 28\ntire 1's handling is 21 29\ntire 2's handling is 22 30\ntire 3's handling\
    \ is 23 31\nAllWeatherRadial: 34.0 / 20.0 / 20.0 / 28.0\nAllWeatherRadial: 34.0\
    \ / 20.0 / 21.0 / 29.0\nAllWeatherRadial: 34.0 / 20.0 / 22.0 / 30.0\nAllWeatherRadial:\
    \ 34.0 / 20.0 / 23.0 / 31.0\nI am a slant-6. VROOOM!\n```\n\n### 精简接口\n\n现在让我们看看`AllWeatherRadial`的类接口：\n\
    \n```objective-c\n#import <Foundation/Foundation.h>\n#import \"Tire.h\"\n\n@interface\
    \ AllWeatherRadial : Tire\n{\n    float rainHandling;\n    float snowHandling;\n\
    }\n- (void) setRainHandling: (float) rainHanding;\n- (float) rainHandling;\n-\
    \ (void) setSnowHandling: (float) snowHandling;\n- (float) snowHandling;\n@end\
    \ // AllWeatherRadial\n```\n\n现在你应该已经对此非常熟悉了。让我们用属性的方式来清理它：\n\n```objective-c\n\
    #import <Foundation/Foundation.h>\n#import \"Tire.h\"\n\n@interface AllWeatherRadial\
    \ : Tire\n{\n    float rainHandling;\n    float snowHandling;\n}\n@property float\
    \ rainHandling;\n@property float snowHandling;\n@end // AllWeatherRadial\n```\n\
    \n是不是更简单了？不需要那四个方法定义了。注意，我们增加了一对以`@`符号开头的关键字。回忆一下，`@`符号是“Objective-C 的独特语法即将出现”的信号！`@property`是一个新的编译器特性，用于声明一个新的对象属性。\n\
    \n`@property float rainHandling;`表明`AllWeatherRadial`类的对象有一个`float`类型的属性，名为`rainHandling`。它还表明你可以通过调用`–setRainHanding:`来设置该属性，并通过调用`-rainHandling`来访问该属性。你现在就可以运行程序，其行为与之前完全一样。`@property`所做的仅仅是自动声明该属性的`setter`和`getter`方法。该属性实际上不必与实例变量的名称完全一致，但在大多数情况下是一致的。我们稍后会讨论这个问题。你还可以对属性进行一些额外的配置，我们稍后也会讨论，请耐心等待。\n\
    \n### 精简实现\n\n现在，让我们再次看看`AllWeatherRadial`的实现：\n\n```objective-c\n#import \"AllWeatherRadial.h\"\
    \n\n@implementation AllWeatherRadial\n- (id) initWithPressure: (float) p treadDepth:\
    \ (float) td\n{\n    if (self = [super initWithPressure: p treadDepth: td])\n\
    \    {\n        rainHandling = 23.7;\n        snowHandling = 42.5;\n    }\n  \
    \  return (self);\n} // initWithPressure:treadDepth\n\n- (void) setRainHandling:\
    \ (float) rh\n{\n    rainHandling = rh;\n} // setRainHandling\n\n- (float) rainHandling\n\
    {\n    return (rainHandling);\n} // rainHandling\n\n- (void) setSnowHandling:\
    \ (float) sh\n{\n    snowHandling = sh;\n} // setSnowHandling\n\n- (float) snowHandling\n\
    {\n    return (snowHandling);\n} // snowHandling\n\n- (NSString *) description\n\
    {\n    NSString *desc;\n    desc = [[NSString alloc] initWithFormat:\n       \
    \     @\"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f\",\n            [self pressure],\
    \ [self treadDepth],\n            [self rainHandling],\n            [self snowHandling]];\n\
    \    return (desc);\n} // description\n@end // AllWeatherRadial\n```\n\n在上一章中，我们讨论了`init`方法、指定初始化器、所有的`setter`和`getter`方法，以及`description`方法。现在，我们将毫不留情地删除所有`setter`和`getter`方法，并用两行代码替换它们：\n\
    \n```objective-c\n#import \"AllWeatherRadial.h\"\n\n@implementation AllWeatherRadial\n\
    @synthesize rainHandling;\n@synthesize snowHandling;\n\n- (id) initWithPressure:\
    \ (float) p\n            treadDepth: (float) td\n{\n    if (self = [super initWithPressure:\
    \ p treadDepth: td])\n    {\n        rainHandling = 23.7;\n        snowHandling\
    \ = 42.5;\n    }\n    return (self);\n} // initWithPressure:treadDepth\n\n- (NSString\
    \ *) description\n{\n    NSString *desc;\n    desc = [[NSString alloc] initWithFormat:\n\
    \            @\"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f\", [self pressure],\
    \ [self treadDepth],\n            [self rainHandling], [self snowHandling]];\n\
    \    return (desc);\n} // description\n@end // AllWeatherRadial\n```\n\n`@synthesize`是一个编译器特性，意思是“为此属性创建访问器方法”。对于代码行`@synthesize\
    \ rainHandling;`，编译器会发出`–setRainHandling:`和`–rainHandling`的编译后代码。\n\n**注意** 你可能熟悉代码生成：Cocoa\
    \ 的访问器编写工具和其他平台上的 UI 构建器会生成源代码，然后进行编译。但`@synthesize`并非代码生成。你永远看不到实现`–setRainHandling:`和`–rainHandling`的源代码，但这些方法会存在并且可以被调用。这使\
    \ Apple 能够灵活地更改 Objective-C 中访问器的生成方式，从而实现更安全的实现或更好的性能。\n\n如果你在类中为属性提供了这些方法，编译器就不会再创建它们。编译器只创建缺失的方法。\n\
    \n如果你现在运行程序，会得到与修改前相同的结果。\n"
- fmt: "大多数属性都由一个变量支持，因此当你合成`getter`和`setter`时，编译器会自动创建一个与属性同名的实例变量。请注意，头文件中有两个变量，分别叫做`rainHandling`和`snowHandling`。`setter`和`getter`将使用这些变量。如果你没有声明这些变量，编译器会创建它们。我们可以在两个地方添加实例变量：头文件或实现文件。我们甚至可以混合使用，将一部分放在头文件中，另一部分放在实现文件中。\n\
    \n为什么我们要把它们放在一个地方而不是另一个地方呢？假设你有一个子类，并且想从子类中直接访问这些变量，而不是通过属性访问。在这种情况下，变量需要放在头文件中。如果变量仅用于你的类，你可以将它们移到`.m`文件中，从而清理公共接口。头文件将如下所示：\n\
    \n```objectivec\n@interface AllWeatherRadial : Tire\n\n@property float rainHandling;\n\
    \n@property float snowHandling;\n\n@end // AllWeatherRadial\n```\n\n实现文件将如下所示：\n\
    \n```objectivec\n@implementation AllWeatherRadial\n\n{\n    float rainHandling;\n\
    \    float snowHandling;\n}\n\n@synthesize rainHandling;\n@synthesize snowHandling;\n\
    \n- (id) initWithPressure: (float)p treadDepth: (float)td\n{\n    if (self = [super\
    \ initWithPressure: p treadDepth: td])\n    {\n        rainHandling = 23.7;\n\
    \        snowHandling = 42.5;\n    }\n    return (self);\n} // initWithPressure:treadDepth\n\
    \n- (NSString *) description\n{\n    NSString *desc;\n    desc = [[NSString alloc]\
    \ initWithFormat:\n        @\"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f\",\n\
    \        [self pressure], [self treadDepth],\n        [self rainHandling],\n \
    \       [self snowHandling]];\n    return (desc);\n} // description\n\n@end //\
    \ AllWeatherRadial\n```\n\n正如你所看到的，头文件看起来更简洁，代码更少，这通常意味着它会给你带来更少的麻烦。\n\n我们可以更进一步：请记住，如果我们不指定实例变量，编译器会为我们创建它们。因此，我们可以删除这段代码而没有任何负面影响：\n\
    \n```objectivec\n{\n    float rainHandling;\n    float snowHandling;\n}\n```\n\
    \n（我们可以将整个代码块，包括花括号，都删除。）现在我们已经删除了大量代码，这很可能节省了我们输入和调试的时间。\n\n## 点符号的惊人之处\n\nObjective-C\
    \ 2.0 的属性引入了一种新的语法糖，使得访问对象属性变得更加容易。这些新特性也让 Objective-C 对习惯使用 C++ 和 Java 等语言的人来说更容易上手。\n\
    \n回顾一下我们添加到`main`函数中来改变轮胎操控值的两行新代码：\n\n```objectivec\n[tire setRainHandling: 20\
    \ + i];\n[tire setSnowHandling: 28 + i];\n```\n\n我们可以用以下代码替换它们：\n\n```objectivec\n\
    tire.rainHandling = 20 + i;\ntire.snowHandling = 28 + i;\n```\n\n如果你再次运行程序，你会看到相同的结果。我们使用`NSLog`来报告轮胎的操控值：\n\
    \n```objectivec\nNSLog(@\"tire %d's handling is %.f %.f\", i, [tire rainHandling],\
    \ [tire snowHandling]);\n```\n\n现在我们可以用以下代码替换它：\n\n```objectivec\nNSLog(@\"tire\
    \ %d's handling is %.f %.f\", i, tire.rainHandling, tire.snowHandling);\n```\n\
    \n点符号看起来很像 C 语言中的结构体访问和 Java 中的对象访问——这是有意为之。当你看到点号出现在等号左侧时，相应属性名的`setter`（即`-setRainHandling:`和`-setSnowHandling:`）将被调用。否则，如果你看到点号出现在对象变量旁边，相应属性名的`getter`（即`-rainHandling`和`snowHandling`）将会被调用。\n\
    \n**注意：** 点符号只是调用访问器方法的简写形式。在底层并没有发生任何额外的魔法。在[第 18 章](#9781430241881_Ch18.xhtml)中，我们将讨论键值编码，它实际上会使用一些硬核的运行时魔法。属性点符号与键值编码在幕后所做的酷事情之间没有关联。\n\
    \n如果你在使用属性，并且遇到了关于访问非结构体内容的奇怪错误信息，请确保你已经包含了所使用类所需的所有头文件。"
  raw: 'Most properties are backed by a variable, so when you synthesize the getter
    and setter, the compiler automatically creates an instance variable with the same
    name as the property. Notice that the header file has two variables called rainHandling
    and snowHandling. The setter and getter will use these variables. If you don’t
    declare those variables, the compiler creates them. There are two places where
    we can add the instance variables: the header file or the implementation file.
    We can even mix the two, with some in the header and some in the implementation.


    Why would we want to put them in one place instead of another? Let’s say you have
    a subclass, and from the subclass, you want to access the variables directly instead
    of via properties. In this case, the variables need to be in the header file.
    If the variables are only for your class, you can move them into the *.m* file
    and clean up the public interface. The header file will look like this:


    @interface AllWeatherRadial : Tire


    @property float rainHandling;


    @property float snowHandling;


    @end // AllWeatherRadial


    and the implementation file will look like this:


    @implementation AllWeatherRadial


    {


    float rainHandling;


    float snowHandling;


    }


    @synthesize rainHandling;


    @synthesize snowHandling;


    - (id) initWithPressure: (float)p treadDepth: (float)td


    {


    if (self = [super initWithPressure: p treadDepth: td])


    {


    rainHandling = 23.7;


    snowHandling = 42.5;


    }


    return (self);


    } // initWithPressure:treadDepth


    - (NSString *) description


    {


    NSString *desc;


    desc = [[NSString alloc] initWithFormat:


    @"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f",


    [self pressure], [self treadDepth],


    [self rainHandling],


    [self snowHandling]];


    return (desc);


    } // description


    @end // AllWeatherRadial


    As you can see, the header file looks much cleaner and has less code, which usually
    means it will cause you less trouble.


    We can go a step further: remember that if we don’t specify the instance variables,
    the compiler creates them for us. So we can eliminate this code without any negative
    consequences:


    {


    float rainHandling;


    float snowHandling;


    }


    (We can remove the whole thing, including the braces.) Now we have deleted lots
    of code, which is likely to save us time typing and debugging.


    Dots Incredible


    Objective-C 2.0 properties introduce a new bit of syntactic sugar that makes accessing
    object attributes easier. These new features also make Objective-C a bit more
    approachable for folks who are used to languages like C++ and Java.


    Recall the two new lines we added to main to change the tire’s handling values:


    [tire setRainHandling: 20 + i];


    [tire setSnowHandling: 28 + i];


    We can replace that code with this:


    tire.rainHandling = 20 + i;


    tire.snowHandling = 28 + i;


    If you run the program again, you’ll see the same results. We use NSLog to report
    the handling values of the tires:


    NSLog(@"tire %d''s handling is %.f %.f", i, [tire rainHandling], [tire snowHandling]);


    We can now replace that code with this:


    NSLog(@"tire %d''s handling is %.f %.f", i, tire.rainHandling, tire.snowHandling);


    The dot notation looks a lot like structure access in C and object access in Java—on
    purpose. When you see a dot on the left-hand side of an equal sign, the setter
    for that attribute name (–setRainHandling: and –setSnowHandling:) will be called.
    Otherwise, if you see a dot next to an object variable, the getter for that attribute
    name (–rainHandling and –snowHandling) is called.


    **Note** Dot notation is just shorthand for calling accessor methods. No additional
    magic is happening under the hood. In [Chapter 18](#9781430241881_Ch18.xhtml),
    we’ll talk about key-value coding, which actually uses some hard-core runtime
    magic. There is no connection between the property dot notation and the cool stuff
    key-value coding does behind the scenes.


    If you’re using properties, and you get strange error messages about accessing
    something that is not a struct, make sure you’ve included all the necessary header
    files for the classes you’re using.'
