  raw: 'That’s pretty much it for the stuff that properties introduce. Of course,
    we have some additional cases to discuss for the proper handling of object attributes
    and for avoiding the exposure of both setters and getters. Let’s talk about those
    next.


    Objecting to Properties


    So far, we’ve looked at properties for scalar types—float in particular—but the
    same techniques apply for int, char, BOOL, and struct. For example, you can have
    an NSRect property if you want.


    Objects bring some added complications. Recall that we retain and release objects
    as they flow through our accessors. For some object values, particularly string
    values, you want to always -copy them. Yet for other object values, like delegates
    (which we’ll talk about in the next chapter), you don’t want to retain them at
    all.


    **Note** Whoa, wait a minute. What’s with that copying and not retaining?


    You want to make copies of string arguments. A common error is to get a string
    from the user interface, like a text field, and use that as something’s name.
    The strings you get from text fields are typically mutable strings and will change
    when the user types something new. Making a copy of the string prevents the value
    from changing unexpectedly.


    Now, what about not retaining objects? There is a special case, called a **retain
    cycle**, in which reference counting breaks down. If you have an owner/owned relationship,
    as between Car and Engine, you want the car to retain (own) the engine but not
    the other way around. The engine should not retain the car it has been installed
    in. If the car retains the engine, and the engine retains the car, neither reference
    count will go to zero, and neither will ever be cleaned up. Car’ s dealloc won’t
    get called until the engine releases the car in its dealloc, and the engine’s
    dealloc won’t get called until car’s dealloc releases the Engine. They just sit
    there, staring at each other, waiting for the other to blink. The general rule
    is that the owner object retains the owned object, and not the other way around.


    Let’s add a new feature to Car so that we can play with some new property syntax.
    That’s gonna be exciting! We’ll give the car a name. We’ll start out old school
    and use traditional accessor methods. First is *Car.h*, with the new goodies in
    bold:


    @class Tire;


    @class Engine;


    @interface Car : NSObject


    {


    NSString *name;


    NSMutableArray *tires;


    Engine *engine;


    }


    - (void)setName: (NSString *) newName;


    - (NSString *) name;


    - (void) setEngine: (Engine *) newEngine;


    - (Engine *) engine;


    -(void) setTire: (Tire *) tire atIndex: (int) index;


    - (Tire *) tireAtIndex: (int) index;


    - (void) print;


    @end // Car


    Now, we add the implementation of the accessors (notice that we’re copying the
    name), along with choosing a default name for the car and displaying it in the
    description:


    #import "Car.h"


    @implementation Car


    - (id) init


    {


    if (self = [super init])


    {


    name = [[NSString alloc] initWithString:@"Car"];


    tires = [[NSMutableArray alloc] init];


    int i;


    for (i = 0; i < 4; i++) {


    [tires addObject: [NSNull null]];


    }


    }


    return (self);


    } // init


    - (void) dealloc


    {


    [name release];


    [tires release];


    [engine release];


    [super dealloc];


    } // dealloc


    - (void)setName: (NSString *)newName


    {


    [name release];


    name = [newName copy];


    } // setName


    - (NSString *)name


    {


    return (name);


    } // name


    - (Engine *) engine


    {


    return (engine);


    } // engine


    - (void) setEngine: (Engine *) newEngine


    {


    [newEngine retain];


    [engine release];


    engine = newEngine;


    } // setEngine


    - (void) setTire: (Tire *) tire atIndex: (int) index


    {


    [tires replaceObjectAtIndex: index withObject: tire];


    } // setTire:atIndex:


    - (Tire *) tireAtIndex: (int) index


    {


    Tire *tire;


    tire = [tires objectAtIndex: index];


    return (tire);


    } // tireAtlndex:


    - (void) print


    {


    NSLog (@"%@ has:", name);


    for (int i = 0; i < 4; i++)


    {


    NSLog (@"%@", [self tireAtIndex: i]);


    }


    NSLog (@"%@", engine);


    } // print


    @end // Car


    And we’ll set the name in main:


    Car *car = [[Car alloc] init];


    [car setName: @"Herbie"];'
  trans: "\n关于属性所引入的内容，基本上就是这些了。当然，我们还需要讨论一些额外的场景，以确保正确处理对象属性，并避免同时暴露 setter 和 getter。接下来我们就来谈这些。\n\
    \n## 反对使用属性\n\n到目前为止，我们关注的是标量类型（特别是 `float`）的属性，但同样的技术也适用于 `int`、`char`、`BOOL`\
    \ 和 `struct`。例如，如果需要，你也可以声明一个 `NSRect` 属性。\n\n对象会带来一些额外的复杂性。回想一下，当对象在我们的存取方法中传递时，我们会对其进行\
