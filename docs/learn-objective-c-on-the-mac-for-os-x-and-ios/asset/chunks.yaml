  raw: 'If you’re editing the program along with us in Xcode, supplying a file path
    as you run it is a little more complicated. **Launch arguments**, also called
    **command-line parameters**, are a little trickier to control from Xcode than
    from Terminal. Here’s what you need to do to change the launch arguments:


    First, in Xcode, choose Product ![image](images/9781430241881_arrow_fmt.jpg) Edit
    Scheme and then click the Arguments tab.


    ![9781430241881_Fig03-01.tif](images/9781430241881_Fig03-01_fmt.jpg)


    Figure 3-1\. Arguments tab


    Next, as shown in the following screen shot, click the plus sign in the Arguments
    Passed On Launch section, and type the launch argument—in this case, the path
    to the *words.txt* file:


    ![9781430241881_Fig03-02.tif](images/9781430241881_Fig03-02_fmt.jpg)


    [Figure 3-2](#9781430241881_Ch3.xhtml#FIG2). Arguments Passed On Launch


    Now, when you run the program, Xcode passes your launch argument into Word-Length-4’s
    argv array. Here’s what you’ll see when you run the program:


    ![9781430241881_Fig03-03.tif](images/9781430241881_Fig03-03_fmt.jpg)


    [Figure 3-3](#9781430241881_Ch3.xhtml#FIG3). argv array output


    Just for fun, run your program with */usr/share/dict/words*, which has over 230,000
    words in it. Your program can handle huge amounts of data! When you get tired
    of watching words whiz by in the Xcode console window, click the Stop button to
    make the program stop.


    Because you’re supplying arguments at runtime, everybody can use your program
    to get the length of *any* set of words they want to, even absurdly large sets
    of words. Users can change the data without changing the code, just as nature
    intended. This is the essence of indirection: it’s telling us where to get the
    data we need.


    Using Indirection in Object-Oriented Programming


    Object-oriented programming is all about indirection. OOP uses indirection for
    accessing data, just as we did in the previous examples by employing variables,
    files, and arguments. The real revolution of OOP is that it uses indirection for
    calling *code*. Rather than calling a function directly, you end up calling it
    indirectly.


    Now that you know that, you’re an expert in OOP. Everything else is a side effect
    of this indirection.


    Procedural Programming


    To complete your appreciation of the flexibility of OOP, we’ll take a quick look
    at

    procedural programming, so you can get an idea of the kinds of problems that OOP
    was created to solve. Procedural programming has been around a long, long time,
    since just after the invention of dirt. Procedural programming is the kind typically
    taught in introductory programming books and classes. Most programming in languages
    like BASIC, C, Tcl, and

    Perl is procedural.


    In procedural programs, data is typically kept in simple structures, such as C
    struct elements. There are also more complex data structures, such as linked lists
    and trees. When you call a function, you pass the data to the function, and it
    manipulates the data. Functions are the center of the procedural programming experience:
    you decide which functions you want to use, and then you call those functions,
    passing in the data they need.


    The Shape of Things to Draw


    Consider a program that draws a bunch of geometric shapes on the screen. Thanks
    to the magic of computers, you can do more than consider it—you’ll find the source
    code to this program in the *03.08 Shapes-Procedural* folder. For simplicity’s
    sake, the Shapes-Procedural program doesn’t actually draw shapes on the screen,
    it just quaintly prints out some shape-related text. We left out the code that
    actually draws shapes because that would add complexity and remove our desired
    focus, which is to write a program that processes several kinds of elements in
    similar ways.


    Shapes-Procedural uses plain C and the procedural programming style. The code
    starts out by defining some constants and a structure.'
