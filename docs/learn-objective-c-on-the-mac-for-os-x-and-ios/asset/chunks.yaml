    // count: 1


    [tracker retain]; // count: 2


    NSLog (@"%d", [tracker retainCount]);


    [tracker retain]; // count: 3


    NSLog (@"%d", [tracker retainCount]);


    [tracker release]; // count: 2


    NSLog (@"%d", [tracker retainCount]);


    [tracker release]; // count: 1


    NSLog (@"%d", [tracker retainCount]);


    [tracker retain]; // count 2


    NSLog (@"%d", [tracker retainCount]);


    [tracker release]; // count 1


    NSLog (@"%d", [tracker retainCount]);


    [tracker release]; // count: 0, dealloc it


    return (0);


    } // main


    In real life, of course, you wouldn’t be doing multiple retains and releases in
    a single function like this. Over its lifetime, an object might see patterns of
    retains and releases like this from a bunch of different places in your program
    over time. Running the program lets us see the retain counts:


    init: Retain count of 1.


    dealloc called. Bye Bye.


    So, if you call alloc, new, or copy on an object, you just need to release it
    to make it go away and let the memory get reclaimed.


    Object Ownership


    “Wait,” you’re thinking, “didn’t you say this was hard? What’s the big deal? You
    create an object, use it, release it, and memory management is happy. That doesn’t
    sound terribly complicated.” It gets more complex when you factor in the concept
    of **object ownership**. When something is said to “own an object,” that something
    is responsible for making sure the object gets cleaned up.


    An object with instance variables that point to other objects is said to **own**
    those other objects. For example, in CarParts, a car owns the engine and tires
    that it points to. Similarly, a function that creates an object is said to own
    that object. In CarParts, main() creates a new car object, so main() is said to
    own the car.


    A complication arises when more than one entity owns a particular object, which
    is why the retain count can be larger than 1\. In the case of the RetainCount1
    program, main() owned the RetainTracker object, so main() is responsible for cleaning
    up the object.


    Recall the engine setter method for Car:


    - (void) setEngine: (Engine *) newEngine;


    and how it was called from main():


    Engine *engine = [Engine new];


    [car setEngine: engine];


    Who owns the engine now? Does main() own it or does Car? Who is responsible for
    making sure Engine gets a release message when it is no longer useful? It can’t
    be main(), because Car is using the engine. It can’t be Car, because main() might
    use the engine later.


    The trick is to have Car retain the engine, increasing its retain count to 2\.
    That makes sense, since two entities, Car and main(), are now using the engine.
    Car should retain the engine inside setEngine:, and main() should release the
    engine. Then Car releases the engine when it’s finished (in its dealloc method),
    and the engine’s resources are reclaimed.'
  trans: "\n# RetainCount1 项目详解\n\n本章的第一个项目是`RetainCount1`，位于*09.01 RetainCount-1*项目文件夹中。该程序创建了一个对象（`RetainTracker`），该对象在初始化时和释放时会调用`NSLog()`：\n\
    \n```objc\n@interface RetainTracker : NSObject\n\n@end // RetainTracker\n\n@implementation\
    \ RetainTracker\n\n- (id) init\n{\n    if (self = [super init]) {\n        NSLog\
    \ (@\"init: Retain count of %d.\", [self retainCount]);\n    }\n    return (self);\n\
    } // init\n\n- (void) dealloc\n{\n    NSLog (@\"dealloc called. Bye Bye.\");\n\
    \    [super dealloc];\n} // dealloc\n\n@end // RetainTracker\n```\n\n`init`方法遵循标准的\
    \ Cocoa 对象初始化习惯用法，我们将在下一章探讨。如前所述，当对象的引用计数达到 0 时，系统会自动发送`dealloc`消息（并因此调用`dealloc`方法）。我们的`init`和`dealloc`版本使用`NSLog()`来输出一条消息，表明它们已被调用。\n\
    \n在`main()`中创建了一个新的`RetainTracker`对象，并由该类定义的两个方法间接调用。当创建新的`RetainTracker`时，会发送`retain`和`release`消息来增加和减少引用计数，而我们通过`NSLog()`来观察这一过程：\n\
    \n```objc\nint main (int argc, const char *argv[])\n{\n    RetainTracker *tracker\
    \ = [RetainTracker new];\n    // count: 1\n\n    [tracker retain];    // count:\
    \ 2\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker retain];    //\
    \ count: 3\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker release];\
    \   // count: 2\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker release];\
    \   // count: 1\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker retain];\
    \    // count 2\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker release];\
    \   // count 1\n    NSLog (@\"%d\", [tracker retainCount]);\n\n    [tracker release];\
    \   // count: 0, dealloc it\n    return (0);\n} // main\n```\n\n当然，在实际编程中，你不会像这样在单个函数中执行多次`retain`和`release`操作。在对象的生命周期中，可能会从程序的不同地方看到类似的`retain`和`release`模式。运行程序可查看引用计数：\n\
    \n```\ninit: Retain count of 1.\ndealloc called. Bye Bye.\n```\n\n因此，如果你对对象调用了`alloc`、`new`或`copy`，只需释放它即可使其消失并回收内存。\n\
    \n## 对象所有权\n\n“等等，”你可能会想，“你不是说这很难吗？这有什么大不了的？你创建一个对象，使用它，释放它，内存管理就万事大吉了。听起来并不复杂。”当你引入**对象所有权**的概念时，事情会变得更加复杂。当某物“拥有一个对象”时，该物负责确保该对象得到清理。\n\
    \n拥有指向其他对象的实例变量的对象被称为**拥有**那些其他对象。例如，在`CarParts`中，一辆汽车拥有它指向的引擎和轮胎。类似地，创建对象的函数被认为拥有该对象。在`CarParts`中，`main()`创建了一个新的汽车对象，因此`main()`被认为拥有该汽车。\n\
    \n当多个实体拥有同一个对象时，就会出现复杂情况，这就是引用计数可能大于 1 的原因。在`RetainCount1`程序中，`main()`拥有`RetainTracker`对象，因此`main()`负责清理该对象。\n\
    \n回顾`Car`的引擎设置方法：\n\n```objc\n- (void) setEngine: (Engine *) newEngine;\n```\n\
    \n以及它是如何从`main()`中调用的：\n\n```objc\nEngine *engine = [Engine new];\n[car setEngine:\
    \ engine];\n```\n\n现在谁拥有这个引擎？是`main()`还是`Car`？谁负责确保在引擎不再有用时向其发送`release`消息？不能是`main()`，因为`Car`正在使用引擎。也不能是`Car`，因为`main()`稍后可能还会使用引擎。\n\
    \n诀窍是让`Car`保留引擎，将其引用计数增加到 2。这很合理，因为两个实体（`Car`和`main()`）现在都在使用引擎。`Car`应该在`setEngine:`内部保留引擎，而`main()`应该释放引擎。然后`Car`在完成使用引擎时（在其`dealloc`方法中）释放引擎，引擎的资源就会被回收。\n"
- fmt: "# Retaining and Releasing in Accessors\n\nA first crack at writing a memory-management-savvy\
    \ version of `setEngine` might look like this:\n\n```\n- (void) setEngine: (Engine\
    \ *) newEngine\n{\n    engine = [newEngine retain];\n    // BAD CODE: do not steal.\
    \ See fixed version below.\n} // setEngine\n```\n\nUnfortunately, that’s not quite\
    \ enough. Imagine this sequence of calls in `main()`:\n\n```\nEngine *engine1\
    \ = [Engine new];       // count: 1\n[car setEngine: engine1];             //\
    \ count: 2\n[engine1 release];                    // count: 1\nEngine *engine2\
    \ = [Engine new];       // count: 1\n[car setEngine: engine2];             //\
    \ count: 2\n```\n\nOops! We have a problem with `engine1` now: its retain count\
    \ is still 1. `main()` has already released its reference to `engine1`, but `Car`\
    \ never did. We have now leaked `engine1`, and leaky engines are never good. That\
    \ first engine object will sit around idling and consuming a chunk of memory.\n\
    \nHere’s another attempt at writing `setEngine:`.\n\n```\n- (void) setEngine:\
    \ (Engine *) newEngine\n{\n    [engine release];\n    engine = [newEngine retain];\n\
    \    // More BAD CODE: do not steal. Fixed version below.\n} // setEngine\n```\n\
    \nThat fixes the case of the leaked `engine1` that you saw previously. But it\
    \ breaks when `newEngine` and the old engine are the same object. Ponder this\
    \ case:\n\n```\nEngine *engine = [Engine new];        // count: 1\nCar *car1 =\
    \ [Car new];\nCar *car2 = [Car new];\n[car1 setEngine: engine];             //\
    \ count: 2\n[engine release];                     // count 1\n[car2 setEngine:\
    \ [car1 engine]];      // oops!\n```\n\nWhy is this a problem? Here’s what’s happening.\
    \ `[car1 engine]` returns a pointer to `engine`, which has a retain count of 1.\
    \ The first line of `setEngine` is `[engine release]`, which makes the retain\
    \ count 0, and the object gets deallocated. Now, both `newEngine` and the `engine`\
    \ instance variable are pointing to freed memory, which is bad. Here’s a better\
    \ way to write `setEngine`:\n\n```\n- (void) setEngine: (Engine *) newEngine\n\
    {\n    [newEngine retain];\n    [engine release];\n    engine = newEngine;\n}\
    \ // setEngine\n```\n\nIf you retain the new engine first, and `newEngine` is\
    \ the same object as `engine`, the retain count will be increased and immediately\
    \ decreased. But the count won’t go to 0, and the engine won’t be destroyed unexpectedly,\
    \ which would be bad. In your accessors, if you retain the new object before you\
    \ release the old object, you’ll be safe.\n\n**Note**: There are different schools\
    \ of thought on how proper accessors should be written, and arguments and flame\
    \ wars erupt on various mailing lists on a semiregular basis. The technique shown\
    \ in the “Retaining and Releasing in Accessors” section works well and is (somewhat)\
    \ easy to understand, but don’t be surprised if you see different accessor management\
    \ techniques when you look at other people’s code.\n\n## Autorelease\n\nMemory\
    \ management can be a tough problem, as you’ve seen so far when we encountered\
    \ some of the subtleties of writing setter methods. And now it’s time to examine\
    \ yet another wrinkle. You know that objects need to be released when you’re finished\
    \ with them. In some cases, knowing when you’re done with an object is not so\
    \ easy. Consider the case of a `description` method, which returns an `NSString`\
    \ that describes an object:\n\n```\n- (NSString *) description\n{\n    NSString\
    \ *description;\n    description = [[NSString alloc]\n        initWithFormat:\
    \ @\"I am %d years old\", 4];\n    return (description);\n} // description\n```\n\
    \nHere we’re making a new string instance with `alloc`, which gives it a retain\
    \ count of 1, and then we return it. Who is responsible for cleaning up this string\
    \ object?\n\nIt can’t be the `description` method. If you release the description\
    \ string before returning it, the retain count goes to 0, and the object is obliterated\
    \ immediately.\n\nThe code that uses the description could hang onto the string\
    \ in a variable and then release it when finished, but that makes using the descriptions\
    \ extremely inconvenient. What should be just one line of code turns into three:\n\
    \n```\nNSString *desc = [someObject description];\nNSLog (@\"%@\", desc);\n[desc\
    \ release];\n```\n\nThere has got to be a better way. And luckily, there is!\n\
    \n### Everyone into the Pool!\n\nCocoa has the concept of the **autorelease pool**.\
    \ You’ve probably seen `@autoreleasepool` or `NSAutoreleasePool` in the boilerplate\
    \ code generated by Xcode. Now it’s time to see what that’s all about.\n\nThe\
    \ name provides a good clue. It’s a pool (collection) of stuff, presumably objects,\
    \ that _auto_matically gets _released_.\n\n`NSObject` provides a method called\
    \ `autorelease`:\n\n```\n- (id) autorelease;\n```\n\nThis method schedules a `release`\
    \ message to be sent at some time in the future. The return value is the object\
    \ that receives the message; `retain` uses this same technique, which makes chaining\
    \ together calls easy. When you send `autorelease` to an object, that object is\
    \ actually added to an autorelease pool. When that pool is destroyed, all the\
    \ objects in the pool are sent a `release` message.\n\n**Note**: There’s no magic\
    \ in the autorelease concept. You could write your own autorelease pool by using\
    \ an `NSMutableArray` to hold the objects and sending all those objects a `release`\
    \ message in the `dealloc` method. But there’s no need for reinvention—Apple has\
    \ done the hard work for you.\n\nWe can now write a `description` method that\
    \ does a good job with memory management:\n\n```\n- (NSString *) description\n\
    {\n    NSString *description;\n    description = [[NSString alloc]\n        initWithFormat:\
    \ @\"I am %d years old\", 4];\n    return ([description autorelease]);\n} // description\n\
    ```\n\nSo you can write code like this:\n\n```\nNSLog (@\"%@\", [someObject description]);\n\
    ```\n\nNow, memory management works just right, because the `description` method\
    \ creates a new string, autoreleases it, and returns it for the `NSLog()` to use.\
    \ Because that description string was autoreleased, it’s been put into the currently\
    \ active autorelease pool, and, sometime later, after the code doing the `NSLog()`\
    \ has finished running, the pool will be destroyed.\n\n### The Eve of Our Destruction\n\
    \nWhen does the autorelease pool get destroyed so that it can send a `release`\
    \ message to all the objects it contains? For that matter, when does a pool get\
    \ created in the first place? There are two ways you can create an autorelease\
    \ pool.\n\n- Using the `@autoreleasepool` language keyword.\n- Using the `NSAutoreleasePool`\
    \ object.\n\nIn the Foundation tools we’ve been using, the creation and destruction\
    \ of the pool has been done by using the language keyword. So when you use `@autoreleasepool\
    \ {}`, all the code between the curly braces is put into this new pool. If your\
    \ calculations are very memory intensive, you can nest autorelease pools.\n\n\
    One thing to keep in mind is that any variables that are defined within the curly\
    \ braces are not visible outside of them; standard C scope applies, just like\
    \ in loops.\n\nThe second, and more explicit, method is to use the `NSAutoreleasePool`\
    \ object. When you do this, the code between `new` and `release` gets to use the\
    \ new pool.\n\n```\nNSAutoreleasePool *pool;\npool = [NSAutoreleasePool new];\n\
    …\n[pool release];\n```\n\nWhen you create an autorelease pool, it automatically\
    \ becomes the active pool. When you release that pool, its retain count goes to\
    \ 0, so it gets deallocated. During the deallocation, the pool releases all its\
    \ objects.\n\nSo which method should you use? Use the keyword method. It’s faster\
    \ than the object method, because the language knows how to create and destroy\
    \ memory better than we do.\n\nWhen you’re using the AppKit, Cocoa automatically\
    \ creates and destroys an autorelease pool for you on a regular basis. It does\
    \ so after the program handles the current event (such as a mouse click or key\
    \ press). You’re free to use as many autoreleased objects as you like, and the\
    \ pool will clean them up for you automatically whenever the user does something."
  raw: 'Retaining and Releasing in Accessors


    A first crack at writing a memory-management-savvy version of setEngine might
    look like this:


    - (void) setEngine: (Engine *) newEngine


    {


    engine = [newEngine retain];


    // BAD CODE: do not steal. See fixed version below.


    } // setEngine


    Unfortunately, that’s not quite enough. Imagine this sequence of calls in main():


    Engine *engine1 = [Engine new]; // count: 1


    [car setEngine: engine1]; // count: 2


    [engine1 release]; // count: 1


    Engine *engine2 = [Engine new]; // count: 1


    [car setEngine: engine2]; // count: 2


    Oops! We have a problem with engine1 now: its retain count is still 1\. main()
    has already released its reference to engine1, but Car never did. We have now
    leaked engine1, and leaky engines are never good. That first engine object will
    sit around idling and consuming a chunk of memory.


    Here’s another attempt at writing setEngine:.


    - (void) setEngine: (Engine *) newEngine


    {


    [engine release];


    engine = [newEngine retain];


    // More BAD CODE: do not steal. Fixed version below.


    } // setEngine


    That fixes the case of the leaked engine1 that you saw previously. But it breaks
    when newEngine and the old engine are the same object. Ponder this case:


    Engine *engine = [Engine new]; // count: 1


    Car *car1 = [Car new];


    Car *car2 = [Car new];


    [car1 setEngine: engine]; // count: 2


    [engine release]; // count 1


    [car2 setEngine: [car1 engine]]; // oops!


    Why is this a problem? Here’s what’s happening. [car1 engine] returns a pointer
    to engine, which has a retain count of 1\. The first line of setEngine is [engine
    release], which makes the retain count 0, and the object gets deallocated. Now,
    both newEngine and the engine instance variable are pointing to freed memory,
    which is bad. Here’s a better way to write setEngine:


    - (void) setEngine: (Engine *) newEngine


    {


    [newEngine retain];


    [engine release];


    engine = newEngine;


    } // setEngine


    If you retain the new engine first, and newEngine is the same object as engine,
    the retain count will be increased and immediately decreased. But the count won’t
    go to 0, and the engine won’t be destroyed unexpectedly, which would be bad. In
    your accessors, if you retain the new object before you release the old object,
    you’ll be safe.


    **Note**  There are different schools of thought on how proper accessors should
    be written, and arguments and flame wars erupt on various mailing lists on a semiregular
    basis. The technique shown in the “Retaining and Releasing in Accessors” section
    works well and is (somewhat) easy to understand, but don’t be surprised if you
    see different accessor management techniques when you look at other people’s code.


    Autorelease


    Memory management can be a tough problem, as you’ve seen so far when we encountered
    some of the subtleties of writing setter methods. And now it’s time to examine
    yet another wrinkle. You know that objects need to be released when you’re finished
    with them. In some cases, knowing when you’re done with an object is not so easy.
    Consider the case of a description method, which returns an NSString that describes
    an object:


    - (NSString *) description


    {


    NSString *description;


    description = [[NSString alloc]


    initWithFormat: @"I am %d years old", 4];


    return (description);


    } // description


    Here we’re making a new string instance with alloc, which gives it a retain count
    of 1, and then we return it. Who is responsible for cleaning up this string object?


    It can’t be the description method. If you release the description string before
    returning it, the retain count goes to 0, and the object is obliterated immediately.


    The code that uses the description could hang onto the string in a variable and
    then release it when finished, but that makes using the descriptions extremely
    inconvenient. What should be just one line of code turns into three:


    NSString *desc = [someObject description];


    NSLog (@"%@", desc);


    [desc release];


    There has got to be a better way. And luckily, there is!


    Everyone into the Pool!


    Cocoa has the concept of the **autorelease pool**. You’ve probably seen @autoreleasepool
    or NSAutoreleasePool in the boilerplate code generated by Xcode. Now it’s time
    to see what that’s all about.


    The name provides a good clue. It’s a pool (collection) of stuff, presumably objects,
    that *auto*matically gets *released*.


    NSObject provides a method called autorelease:


    - (id) autorelease;


    This method schedules a release message to be sent at some time in the future.
    The return value is the object that receives the message; retain uses this same
    technique, which makes chaining together calls easy. When you send autorelease
    to an object, that object is actually added to an autorelease pool. When that
    pool is destroyed, all the objects in the pool are sent a release message.


    **Note**  There’s no magic in the autorelease concept. You could write your own
    autorelease pool by using an NSMutableArray to hold the objects and sending all
    those objects a release message in the dealloc method. But there’s no need for
    reinvention—Apple has done the hard work for you.


    We can now write a description method that does a good job with memory management:


    - (NSString *) description


    {


    NSString *description;


    description = [[NSString alloc]


    initWithFormat: @"I am %d years old", 4];


    return ([description autorelease]);


    } // description


    So you can write code like this:


    NSLog (@"%@", [someObject description]);


    Now, memory management works just right, because the description method creates
    a new string, autoreleases it, and returns it for the NSLog() to use. Because
    that description string was autoreleased, it’s been put into the currently active
    autorelease pool, and, sometime later, after the code doing the NSLog() has finished
    running, the pool will be destroyed.


    The Eve of Our Destruction


    When does the autorelease pool get destroyed so that it can send a release message
    to all the objects it contains? For that matter, when does a pool get created
    in the first place? There are two ways you can create an autorelease pool.


    *   ![image](images/9781430241881_square_fmt.jpg)  Using the @autoreleasepool
    language keyword.

    *   ![image](images/9781430241881_square_fmt.jpg)  Using the NSAutoreleasePool
    object.


    In the Foundation tools we’ve been using, the creation and destruction of the
    pool has been done by using the language keyword. So when you use @autoreleasepool{},
    all the code between the curly braces is put into this new pool. If your calculations
    are very memory intensive, you can nest autorelease pools.


    One thing to keep in mind is that any variables that are defined within the curly
    braces are not visible outside of them; standard C scope applies, just like in
    loops.


    The second, and more explicit, method is to use the NSAutoreleasePool object.
    When you do this, the code between new and release gets to use the new pool.


    NSAutoreleasePool *pool;


    pool = [NSAutoreleasePool new];


    …


    [pool release];


    When you create an autorelease pool, it automatically becomes the active pool.
    When you release that pool, its retain count goes to 0, so it gets deallocated.
    During the deallocation, the pool releases all its objects.


    So which method should you use? Use the keyword method. It’s faster than the object
    method, because the language knows how to create and destroy memory better than
    we do.


    When you’re using the AppKit, Cocoa automatically creates and destroys an autorelease
    pool for you on a regular basis. It does so after the program handles the current
    event (such as a mouse click or key press). You’re free to use as many autoreleased
    objects as you like, and the pool will clean them up for you automatically whenever
    the user does something.'
  trans: "\n# 存取器中的保留与释放\n\n初次尝试编写一个具备内存管理意识的 `setEngine` 方法可能如下所示：\n\n```\n- (void)\
    \ setEngine: (Engine *) newEngine\n{\n    engine = [newEngine retain];\n    //\
    \ 错误代码：请勿模仿。下方为修正版本。\n} // setEngine\n```\n\n遗憾的是，这还远远不够。想象一下在 `main()` 中发生如下调用序列：\n\
    \n```\nEngine *engine1 = [Engine new];       // 计数：1\n[car setEngine: engine1];\
    \             // 计数：2\n[engine1 release];                    // 计数：1\nEngine *engine2\
    \ = [Engine new];       // 计数：1\n[car setEngine: engine2];             // 计数：2\n\
    ```\n\n糟糕！现在 `engine1` 出了问题：它的保留计数仍为 1。`main()` 已经释放了对 `engine1` 的引用，但 `Car` 从未释放它。此时我们泄露了\
    \ `engine1`，而泄露的引擎从来都不是好事。第一个引擎对象将闲置并消耗一块内存。\n\n下面是编写 `setEngine:` 的另一种尝试：\n\n\
    ```\n- (void) setEngine: (Engine *) newEngine\n{\n    [engine release];\n    engine\
    \ = [newEngine retain];\n    // 更多错误代码：请勿模仿。下方为修正版本。\n} // setEngine\n```\n\n\
    这修复了之前你看到的 `engine1` 泄露问题。但当 `newEngine` 与旧引擎是同一个对象时，它就会崩溃。考虑这种情况：\n\n```\nEngine\
    \ *engine = [Engine new];        // 计数：1\nCar *car1 = [Car new];\nCar *car2 =\
    \ [Car new];\n[car1 setEngine: engine];             // 计数：2\n[engine release];\
    \                     // 计数：1\n[car2 setEngine: [car1 engine]];      // 糟糕！\n\
    ```\n\n为什么这是个问题？下面是实际发生的事情。`[car1 engine]` 返回一个指向 `engine` 的指针，其保留计数为 1。`setEngine`\
    \ 的第一行是 `[engine release]`，这使保留计数变为 0，对象被释放。现在，`newEngine` 和 `engine` 实例变量都指向已释放的内存，这很糟糕。以下是编写\
    \ `setEngine` 的更好方法：\n\n```\n- (void) setEngine: (Engine *) newEngine\n{\n   \
    \ [newEngine retain];\n    [engine release];\n    engine = newEngine;\n} // setEngine\n\
    ```\n\n如果你先保留新引擎，且 `newEngine` 与 `engine` 是同一个对象，保留计数会增加并立即减少。但计数不会降到 0，引擎也不会意外销毁——而这正是糟糕的情况。在你的存取器中，如果你在释放旧对象之前保留新对象，就会是安全的。\n\
    \n**注意**：关于如何编写正确的存取器存在不同的学派，各种邮件列表上会定期爆发争论和口水战。“存取器中的保留与释放”部分展示的技术效果良好且（某种程度上）易于理解，但如果看到其他人的代码中使用不同的存取器管理技术，也无需惊讶。\n\
    \n## 自动释放\n\n正如我们在编写设置器方法时遇到的一些微妙之处所看到的，内存管理可能是一个棘手的问题。现在我们需要研究另一个难题。你知道对象在用完后需要被释放。在某些情况下，判断何时用完一个对象并不那么简单。考虑一个\
    \ `description` 方法，它返回一个描述对象的 `NSString`：\n\n```\n- (NSString *) description\n\
    {\n    NSString *description;\n    description = [[NSString alloc]\n        initWithFormat:\
    \ @\"我今年 %d 岁\", 4];\n    return (description);\n} // description\n```\n\n这里我们使用\
    \ `alloc` 创建了一个新的字符串实例，其保留计数为 1，然后返回它。谁负责清理这个字符串对象？\n\n不可能是 `description` 方法本身。如果在返回描述字符串之前释放它，保留计数变为\
    \ 0，对象立即被销毁。\n\n使用该描述字符串的代码可以将字符串保存在一个变量中，然后在用完后释放它，但这会使描述的使用变得极其不便。本应是一行代码的事情变成了三行：\n\
    \n```\nNSString *desc = [someObject description];\nNSLog (@\"%@\", desc);\n[desc\
    \ release];\n```\n\n一定有更好的办法。幸运的是，确实有！\n\n### 都到池子里来！\n\nCocoa 具有**自动释放池**的概念。你可能已经见过\
    \ Xcode 生成的样板代码中的 `@autoreleasepool` 或 `NSAutoreleasePool`。现在来看看这究竟是怎么回事。\n\n\
    名称提供了很好的线索。它是一个存放东西（应该是对象）的池子，并且会自动被释放。\n\n`NSObject` 提供了一个名为 `autorelease` 的方法：\n\
    \n```\n- (id) autorelease;\n```\n\n这个方法安排在未来某个时间发送一条 `release` 消息。返回值是接收该消息的对象；`retain`\
    \ 使用相同的技术，这使得方法调用可以轻松地链式组合。当你向一个对象发送 `autorelease` 时，该对象实际上被添加到一个自动释放池中。当该池被销毁时，池中的所有对象都会收到一条\
    \ `release` 消息。\n\n**注意**：自动释放的概念中并没有魔法。你可以使用 `NSMutableArray` 来持有对象，并在 `dealloc`\
    \ 方法中向所有这些对象发送 `release` 消息来编写你自己的自动释放池。但没有必要重新发明轮子——苹果已经为你完成了这项艰巨的工作。\n\n我们现在可以编写一个正确处理内存管理的\
    \ `description` 方法：\n\n```\n- (NSString *) description\n{\n    NSString *description;\n\
    \    description = [[NSString alloc]\n        initWithFormat: @\"我今年 %d 岁\", 4];\n\
    \    return ([description autorelease]);\n} // description\n```\n\n这样你就可以编写如下代码：\n\
    \n```\nNSLog (@\"%@\", [someObject description]);\n```\n\n现在，内存管理运行得非常正确，因为 `description`\
    \ 方法创建了一个新字符串，将其自动释放，并返回给 `NSLog()` 使用。由于该描述字符串被自动释放，它已被放入当前活动的自动释放池中，并且在稍后执行\
    \ `NSLog()` 的代码运行完毕后，该池将被销毁。\n\n### 毁灭前夕\n\n自动释放池何时会被销毁，以便向其中包含的所有对象发送 `release`\
    \ 消息？或者说，池子最初何时被创建？有两种方法可以创建自动释放池。\n\n- 使用 `@autoreleasepool` 语言关键字。\n- 使用 `NSAutoreleasePool`\
    \ 对象。\n\n在我们一直在使用的 Foundation 工具中，池的创建和销毁是通过语言关键字完成的。因此，当你使用 `@autoreleasepool\
    \ {}` 时，花括号之间的所有代码都被放入这个新池中。如果你的计算非常占用内存，你可以嵌套自动释放池。\n\n需要记住的一点是，在花括号内定义的任何变量在花括号外都是不可见的；与循环一样，遵循标准的\
    \ C 作用域规则。\n\n第二种更显式的方法是使用 `NSAutoreleasePool` 对象。当你这样做时，`new` 和 `release` 之间的代码将使用这个新池。\n\
    \n```\nNSAutoreleasePool *pool;\npool = [NSAutoreleasePool new];\n…\n[pool release];\n\
    ```\n\n当你创建一个自动释放池时，它会自动成为活动池。当你释放该池时，它的保留计数变为 0，因此它会被释放。在释放过程中，该池会释放其所有对象。\n\n\
    那么你应该使用哪种方法呢？使用关键字方法。它比对象方法更快，因为语言比我们更了解如何创建和销毁内存。\n\n当你使用 AppKit 时，Cocoa 会定期自动为你创建和销毁自动释放池。它会在程序处理完当前事件（如鼠标点击或按键）后执行此操作。你可以随意使用任意数量的自动释放对象，每当用户执行操作时，池就会自动为你清理它们。\n"
- fmt: "**Note** You may have seen in Xcode’s autogenerated code an alternate way\
    \ of destroying an autorelease pool’s objects: the `-drain` method. This method\
    \ empties out the pool without destroying it. `-drain` is available in Mac OS\
    \ X 10.4 (Tiger) and later. In our own code (not generated by Xcode), we’ll be\
    \ using `-release`, just to demonstrate how to support ancient versions of OS\
    \ X.\n\n## Pools in Action\n\n`RetainCount2` shows the autorelease pool doing\
    \ its thing. It’s found in the `09-02 RetainCount-2` project folder. This program\
    \ uses the same `RetainTracker` class we built in `RetainCount1`, which `NSLog()`s\
    \ when a `RetainTracker` object is initialized and when it’s released. For completeness,\
    \ we’ll demonstrate the use of both an `NSAutoreleasePool` object and the `@autoreleasepool`\
    \ keyword.\n\n`RetainCount2`’s `main()` looks like this:\n\n```\nint main (int\
    \ argc, const char *argv[])\n{\n    NSAutoreleasePool *pool;\n    pool = [[NSAutoreleasePool\
    \ alloc] init];\n    RetainTracker *tracker;\n    tracker = [RetainTracker new];\
    \ // count: 1\n    [tracker retain]; // count: 2\n    [tracker autorelease]; //\
    \ count: still 2\n    [tracker release]; // count: 1\n    NSLog (@\"releasing\
    \ pool\");\n    [pool release];\n    // gets nuked, sends release to tracker\n\
    \    \n    @autoreleasepool\n    {\n        RetainTracker *tracker2;\n       \
    \ tracker2 = [RetainTracker new]; // count: 1\n        [tracker2 retain]; // count:\
    \ 2\n        [tracker2 autorelease]; // count: still 2\n        [tracker2 release];\
    \ // count: 1\n        NSLog (@\"auto releasing pool\");\n    }\n    return (0);\n\
    } // main\n```\n\nTo start, we create the autorelease pool:\n\n```\nNSAutoreleasePool\
    \ *pool;\npool = [[NSAutoreleasePool alloc] init];\n```\n\nNow, any time we send\
    \ the `autorelease` message to an object, it jumps into this pool:\n\n```\nRetainTracker\
    \ *tracker;\ntracker = [RetainTracker new]; // count: 1\n```\n\nHere, a new tracker\
    \ is created. Because it’s being made with a `new` message, it has a retain count\
    \ of 1:\n\n```\n[tracker retain]; // count: 2\n```\n\nNext, it gets retained,\
    \ just for fun and demonstration purposes. The object’s retain count goes to 2:\n\
    \n```\n[tracker autorelease]; // count: still 2\n```\n\nThen the object gets autoreleased.\
    \ Its retain count is unchanged: it’s still 2. The important thing to note is\
    \ that the pool that was created earlier now has a reference to this object. When\
    \ pool goes away, the tracker object will be sent a `release` message.\n\n```\n\
    [tracker release]; // count: 1\n```\n\nNext, we release it to counteract the `retain`\
    \ call that we used earlier. The object’s retain count is still greater than 0,\
    \ so it’s still alive:\n\n```\nNSLog (@\"releasing pool\");\n[pool release];\n\
    // gets nuked, sends release to tracker\n```\n\nNow, we release the pool. An `NSAutoreleasePool`\
    \ is an ordinary object, subject to the same rules of memory management as any\
    \ other. Because we made the pool with an `alloc`, it has a retain count of 1.\
    \ The release decreases its retain count to 0, so the pool is destroyed and its\
    \ `dealloc` method called.\n\nFinally, `main` returns 0 to indicate that everything\
    \ was successful:\n\n```\nreturn (0);\n} // main\n```\n\nCan you guess what the\
    \ output is going to look like? Which will come first, the `NSLog()` before we\
    \ release the pool or the `NSLog` from `RetainTracker`’s `dealloc` method?\n\n\
    The `@autoreleasepool` method does the same thing but without the hassle of allocating\
    \ an object and destroying.\n\nHere’s the output from a run of `RetainCount2`:\n\
    \n```\ninit: Retain count of 1.\nreleasing pool\ndealloc called. Bye Bye.\ninit:\
    \ Retain count of 1.\nauto releasing pool\ndealloc called. Bye Bye.\n```\n\nAs\
    \ you probably guessed, the `NSLog()` before releasing the pool happens prior\
    \ to the `NSLog()` from `RetainTracker`.\n\n## The Rules of Cocoa Memory Management\n\
    \nNow you’ve seen it all: `retain`, `release`, and `autorelease`. Cocoa has a\
    \ number of memory management conventions. They’re pretty simple rules, and they’re\
    \ applied consistently throughout the toolkit.\n\n**Note** Forgetting Cocoa’s\
    \ memory management rules is a common mistake, as is trying to make them too complicated.\
    \ If you find yourself scattering `retain`s and `release`s around aimlessly, hoping\
    \ to fix some bug, you’re probably not clear on the rules. That means it’s time\
    \ to slow down, take a deep breath, maybe go get a snack, and read them again.\n\
    \nHere are the rules:\n\n- When you create an object using `new`, `alloc`, or\
    \ `copy`, the object has a retain count of 1. You are responsible for sending\
    \ the object a `release` or `autorelease` message when you’re finished with it.\
    \ That way, it gets cleaned up when its useful life is over.\n- When you get hold\
    \ of an object via any other mechanism, assume it has a retain count of 1 and\
    \ that it has already been autoreleased. You don’t need to do any further work\
    \ to make sure it gets cleaned up. If you’re going to hang on to the object for\
    \ any length of time, `retain` it and make sure to `release` it when you’re finished.\n\
    - If you `retain` an object, you need to (eventually) `release` or `autorelease`\
    \ it. Balance these `retain`s and `release`s.\n\nThat’s it—just three rules.\n\
    \nYou’ll be safe if you remember the mantra, “If I get it from `new`, `alloc`,\
    \ or `copy`, I have to `release` or `autorelease` it.”\n\nWhenever you get hold\
    \ of an object, you must be aware of two things: how you got it and how long you\
    \ plan on hanging on to it (see [Table 9-1](#9781430241881_Ch9.xhtml#tbl1)).\n\
    \n[Table 9-1](#9781430241881_Ch9.xhtml#tab1) Memory Management Rules\n\n| Obtained\
    \ Via… | Transient Use | Hang On (Longer Use) |\n| --- | --- | --- |\n| `new`,\
    \ `alloc`, or `copy` | Release when finished | Release in `dealloc` |\n| Any other\
    \ way | Don’t need to do anything | Retain when acquired, release in `dealloc`\
    \ |\n\nIn the next sections we’ll discuss the particulars of transient use of\
    \ objects versus longer-term use.\n\n## Transient Objects\n\nLet’s take a look\
    \ at some common memory-management life cycle scenarios. In the first, you’re\
    \ using an object, temporarily, in the course of some code, but you’re not going\
    \ to be keeping it around for very long. If you get the object from `new`, `alloc`,\
    \ or `copy`, you need to arrange its demise, usually with a `release`:\n\n```\n\
    NSMutableArray *array;\narray = [[NSMutableArray alloc] init]; // count: 1\n//\
    \ use the array\n[array release]; // count: 0\n```\n\nIf you get the object from\
    \ any other mechanism, such as `arrayWithCapacity:`, you don’t have to worry about\
    \ destroying it:\n\n```\nNSMutableArray *array;\narray = [NSMutableArray arrayWithCapacity:\
    \ 17];\n// count: 1, autoreleased\n// use the array\n```\n\n`arrayWithCapacity:`\
    \ is not `alloc`, `new`, or `copy`, so you can assume that the object being returned\
    \ has a retain count of 1 and has already been autoreleased. When the autorelease\
    \ pool goes away, `array` is sent the `release` message; its retain count goes\
    \ to 0, and its memory is recycled.\n\nHere’s some code that uses an `NSColor`:\n\
    \n```\nNSColor *color;\ncolor = [NSColor blueColor];\n// use the color\n```\n\n\
    `blueColor` is not `alloc`, `new`, or `copy`, so you can assume it has a retain\
    \ count of 1 and is autoreleased. `blueColor` returns a global **singleton** object—a\
    \ single object that’s shared by every program that needs it—and won’t actually\
    \ ever get destroyed, but you don’t need to worry about those implementation details.\
    \ All you need to know is that you do *not* need to explicitly `release` color.\n\
    \n## Hanging on to Objects\n\nFrequently, you’ll want to keep an object around\
    \ for more than a couple of lines of code. Typically, you’ll put these objects\
    \ into instance variables of other objects, add them to a collection like `NSArray`\
    \ or `NSDictionary`, or more rarely, keep them as global variables.\n\nIf you’re\
    \ getting an object from `init`, `new`, or `copy`, you don’t need to do anything\
    \ special. The object’s retain count will be 1, so it will stick around. Just\
    \ be sure to release the object in the `dealloc` method of the owner-object that’s\
    \ hanging on to it:\n\n```\n- (void) doStuff\n{\n    // flonkArray is an instance\
    \ variable\n    flonkArray = [NSMutableArray new]; // count: 1\n} // doStuff\n\
    \n- (void) dealloc\n{\n    [flonkArray release]; // count: 0\n    [super dealloc];\n\
    } // dealloc\n```"
  raw: '**Note**  You may have seen in Xcode’s autogenerated code an alternate way
    of destroying an autorelease pool’s objects: the -drain method. This method empties
    out the pool without destroying it. -drain is available in Mac OS X 10.4 (Tiger)
    and later. In our own code (not generated by Xcode), we’ll be using -release,
    just to demonstrate how to support ancient versions of OS X.


    Pools in Action


    RetainCount2 shows the autorelease pool doing its thing. It’s found in the *09-02
    RetainCount-2* project folder. This program uses the same RetainTracker class
    we built in RetainCount1, which NSLog()s when a RetainTracker object is initialized
    and when it’s released. For completeness, we’ll demonstrate the use of both an
    NSAutoreleasePool object and the @autoreleasepool keyword.


    RetainCount2’s main() looks like this:


    int main (int argc, const char *argv[])


    {


    NSAutoreleasePool *pool;


    pool = [[NSAutoreleasePool alloc] init];


    RetainTracker *tracker;


    tracker = [RetainTracker new]; // count: 1


    [tracker retain]; // count: 2


    [tracker autorelease]; // count: still 2


    [tracker release]; // count: 1


    NSLog (@"releasing pool");


    [pool release];


    // gets nuked, sends release to tracker


    @autoreleasepool


    {


    RetainTracker *tracker2;


    tracker2 = [RetainTracker new]; // count: 1


    [tracker2 retain]; // count: 2


    [tracker2 autorelease]; // count: still 2


    [tracker2 release]; // count: 1


    NSLog (@"auto releasing pool");


    }


    return (0);


    } // main


    To start, we create the autorelease pool:


    NSAutoreleasePool *pool;


    pool = [[NSAutoreleasePool alloc] init];


    Now, any time we send the autorelease message to an object, it jumps into this
    pool:


    RetainTracker *tracker;


    tracker = [RetainTracker new]; // count: 1


    Here, a new tracker is created. Because it’s being made with a new message, it
    has a retain count of 1:


    [tracker retain]; // count: 2


    Next, it gets retained, just for fun and demonstration purposes. The object’s
    retain count goes to 2:


    [tracker autorelease]; // count: still 2


    Then the object gets autoreleased. Its retain count is unchanged: it’s still 2\.
    The important thing to note is that the pool that was created earlier now has
    a reference to this object. When pool goes away, the tracker object will be sent
    a release message.


    [tracker release]; // count: 1


    Next, we release it to counteract the retain call that we used earlier. The object’s
    retain count is still greater than 0, so it’s still alive:


    NSLog (@"releasing pool");


    [pool release];


    // gets nuked, sends release to tracker


    Now, we release the pool. An NSAutoreleasePool is an ordinary object, subject
    to the same rules of memory management as any other. Because we made the pool
    with an alloc, it has a retain count of 1\. The release decreases its retain count
    to 0, so the pool is destroyed and its dealloc method called.


    Finally, main returns 0 to indicate that everything was successful:


    return (0);


    } // main


    Can you guess what the output is going to look like? Which will come first, the
    NSLog() before we release the pool or the NSLog from RetainTracker’s dealloc method?


    The @autoreleasepool method does the same thing but without the hassle of allocating
    an object and destroying.


    Here’s the output from a run of RetainCount2:


    init: Retain count of 1.


    releasing pool


    dealloc called. Bye Bye.


    init: Retain count of 1.


    auto releasing pool


    dealloc called. Bye Bye.


    As you probably guessed, the NSLog() before releasing the pool happens prior to
    the NSLog() from RetainTracker.


    The Rules of Cocoa Memory Management


    Now you’ve seen it all: retain, release, and autorelease. Cocoa has a number of
    memory management conventions. They’re pretty simple rules, and they’re applied
    consistently throughout the toolkit.


    **Note**  Forgetting Cocoa’s memory management rules is a common mistake, as is
    trying to make them too complicated. If you find yourself scattering retains and
    releases around aimlessly, hoping to fix some bug, you’re probably not clear on
    the rules. That means it’s time to slow down, take a deep breath, maybe go get
    a snack, and read them again.


    Here are the rules:


    *   ![image](images/9781430241881_square_fmt.jpg)  When you create an object using
    new, alloc, or copy, the object has a retain count of 1\. You are responsible
    for sending the object a release or autorelease message when you’re finished with
    it. That way, it gets cleaned up when its useful life is over.

    *   ![image](images/9781430241881_square_fmt.jpg)  When you get hold of an object
    via any other mechanism, assume it has a retain count of 1 and that it has already
    been autoreleased. You don’t need to do any further work to make sure it gets
    cleaned up. If you’re going to hang on to the object for any length of time, retain
    it and make sure to release it when you’re finished.

    *   ![image](images/9781430241881_square_fmt.jpg)  If you retain an object, you
    need to (eventually) release or autorelease it. Balance these retains and releases.


    That’s it—just three rules.


    You’ll be safe if you remember the mantra, “If I get it from new, alloc, or copy,
    I have to release or autorelease it.”


    Whenever you get hold of an object, you must be aware of two things: how you got
    it and how long you plan on hanging on to it (see [Table 9-1](#9781430241881_Ch9.xhtml#tbl1)).


    [Table 9-1.](#9781430241881_Ch9.xhtml#tab1) Memory Management Rules


    | Obtained Via… | Transient Use | Hang On (Longer Use) |

    | --- | --- | --- |

    | new, alloc, or copy | Release when finished | Release in dealloc |

    | Any other way | Don’t need to do anything | Retain when acquired, release in
    dealloc |


    In the next sections we’ll discuss the particulars of transient use of objects
    versus longer-term use.


    Transient Objects


    Let’s take a look at some common memory-management life cycle scenarios. In the
    first, you’re using an object, temporarily, in the course of some code, but you’re
    not going to be keeping it around for very long. If you get the object from new,
    alloc, or copy, you need to arrange its demise, usually with a release:


    NSMutableArray *array;


    array = [[NSMutableArray alloc] init]; // count: 1


    // use the array


    [array release]; // count: 0


    If you get the object from any other mechanism, such as arrayWithCapacity:, you
    don’t have to worry about destroying it:


    NSMutableArray *array;


    array = [NSMutableArray arrayWithCapacity: 17];


    // count: 1, autoreleased


    // use the array


    arrayWithCapacity: is not alloc, new, or copy, so you can assume that the object
    being returned has a retain count of 1 and has already been autoreleased. When
    the autorelease pool goes away, array is sent the release message; its retain
    count goes to 0, and its memory is recycled.


    Here’s some code that uses an NSColor:


    NSColor *color;


    color = [NSColor blueColor];


    // use the color


    blueColor is not alloc, new, or copy, so you can assume it has a retain count
    of 1 and is autoreleased. blueColor returns a global **singleton** object—a single
    object that’s shared by every program that needs it—and won’t actually ever get
    destroyed, but you don’t need to worry about those implementation details. All
    you need to know is that you do *not* need to explicitly release color.


    Hanging on to Objects


    Frequently, you’ll want to keep an object around for more than a couple of lines
    of code. Typically, you’ll put these objects into instance variables of other
    objects, add them to a collection like NSArray or NSDictionary, or more rarely,
    keep them as global variables.


    If you’re getting an object from init, new, or copy, you don’t need to do anything
    special. The object’s retain count will be 1, so it will stick around. Just be
    sure to release the object in the dealloc method of the owner-object that’s hanging
    on to it:


    - (void) doStuff


    {


    // flonkArray is an instance variable


    flonkArray = [NSMutableArray new]; // count: 1


    } // doStuff


    - (void) dealloc


    {


    [flonkArray release]; // count: 0


    [super dealloc];


    } // dealloc'
  trans: "\n**注意** 你可能会在 Xcode 自动生成的代码中看到另一种销毁自动释放池对象的方法：`-drain` 方法。该方法会清空池中的对象，但不会销毁池本身。`-drain`\
    \ 适用于 Mac OS X 10.4 (Tiger) 及更高版本。在我们自己编写的代码（非 Xcode 生成）中，我们将使用 `-release`，以此演示如何支持旧版\
    \ OS X。\n\n## 池的实际运作\n\n`RetainCount2` 展示了自动释放池的工作原理。该程序位于 `09-02 RetainCount-2`\
    \ 项目文件夹中。此程序使用了我们在 `RetainCount1` 中构建的同一个 `RetainTracker` 类，该类会在 `RetainTracker`\
    \ 对象被初始化及被释放时通过 `NSLog()` 输出信息。为完整起见，我们将同时演示 `NSAutoreleasePool` 对象和 `@autoreleasepool`\
    \ 关键字的使用。\n\n`RetainCount2` 的 `main()` 函数如下所示：\n\n```\nint main (int argc, const\
    \ char *argv[])\n{\n    NSAutoreleasePool *pool;\n    pool = [[NSAutoreleasePool\
    \ alloc] init];\n    RetainTracker *tracker;\n    tracker = [RetainTracker new];\
    \ // 计数: 1\n    [tracker retain]; // 计数: 2\n    [tracker autorelease]; // 计数:\
    \ 仍为 2\n    [tracker release]; // 计数: 1\n    NSLog (@\"释放池\");\n    [pool release];\n\
    \    // 池被销毁，并向 tracker 发送 release 消息\n    \n    @autoreleasepool\n    {\n   \
    \     RetainTracker *tracker2;\n        tracker2 = [RetainTracker new]; // 计数:\
    \ 1\n        [tracker2 retain]; // 计数: 2\n        [tracker2 autorelease]; // 计数:\
    \ 仍为 2\n        [tracker2 release]; // 计数: 1\n        NSLog (@\"自动释放池\");\n  \
    \  }\n    return (0);\n} // main\n```\n\n首先，我们创建自动释放池：\n\n```\nNSAutoreleasePool\
    \ *pool;\npool = [[NSAutoreleasePool alloc] init];\n```\n\n现在，每当我们向一个对象发送 `autorelease`\
    \ 消息时，该对象就会进入这个池中：\n\n```\nRetainTracker *tracker;\ntracker = [RetainTracker new];\
    \ // 计数: 1\n```\n\n这里创建了一个新的 tracker。由于它是通过 `new` 消息创建的，因此其保留计数为 1：\n\n```\n[tracker\
    \ retain]; // 计数: 2\n```\n\n接下来，为了演示和趣味性，对其执行 retain 操作。对象的保留计数增加到 2：\n\n```\n\
    [tracker autorelease]; // 计数: 仍为 2\n```\n\n然后对象被自动释放。其保留计数未改变：仍为 2。需要注意的是，之前创建的池现在持有对该对象的引用。当池销毁时，tracker\
    \ 对象会收到一条 `release` 消息。\n\n```\n[tracker release]; // 计数: 1\n```\n\n接着，我们释放它，以抵消之前使用的\
    \ `retain` 调用。对象的保留计数仍大于 0，因此它仍然存在：\n\n```\nNSLog (@\"释放池\");\n[pool release];\n\
    // 池被销毁，并向 tracker 发送 release 消息\n```\n\n现在，我们释放池。`NSAutoreleasePool` 是一个普通对象，遵循与其他对象相同的内存管理规则。由于我们通过\
    \ `alloc` 创建了池，其保留计数为 1。release 操作将其保留计数减至 0，因此池被销毁，并调用其 `dealloc` 方法。\n\n最后，`main`\
    \ 返回 0，表示一切正常：\n\n```\nreturn (0);\n} // main\n```\n\n你能猜出输出会是什么样吗？哪个会先出现：是释放池之前的\
    \ `NSLog()`，还是 `RetainTracker` 的 `dealloc` 方法中的 `NSLog`？\n\n`@autoreleasepool`\
    \ 方法执行相同的操作，但省去了分配和销毁对象的麻烦。\n\n以下是运行 `RetainCount2` 的输出：\n\n```\ninit: Retain\
    \ count of 1.\nreleasing pool\ndealloc called. Bye Bye.\ninit: Retain count of\
    \ 1.\nauto releasing pool\ndealloc called. Bye Bye.\n```\n\n正如你可能猜到的，释放池之前的 `NSLog()`\
    \ 发生在 `RetainTracker` 的 `NSLog()` 之前。\n\n## Cocoa 内存管理规则\n\n现在你已经看到了全部内容：`retain`、`release`\
    \ 和 `autorelease`。Cocoa 有许多内存管理约定。这些规则非常简单，并且在工具包中始终如一地应用。\n\n**注意** 忘记 Cocoa\
    \ 的内存管理规则是一个常见错误，试图把它们搞得太复杂同样如此。如果你发现自己漫无目的地随意添加 `retain` 和 `release`，希望修复某个 bug，那你很可能对规则并不清楚。这意味着是时候慢下来、深呼吸，或许去吃点零食，然后重新阅读它们。\n\
    \n以下是规则：\n\n-   当你使用 `new`、`alloc` 或 `copy` 创建对象时，该对象的保留计数为 1。你有责任在使用完对象后向其发送\
    \ `release` 或 `autorelease` 消息。这样，当它的生命周期结束时，它就会被清理。\n-   当你通过任何其他机制获取对象时，假设其保留计数为\
    \ 1，并且已经自动释放。你无需做进一步的工作来确保它被清理。如果你打算长时间持有该对象，请对其进行 `retain`，并确保在完成后对其进行 `release`。\n\
    -   如果你对某个对象执行了 `retain`，你（最终）需要对其执行 `release` 或 `autorelease`。保持这些 `retain` 和\
    \ `release` 的平衡。\n\n就是这样——只有三条规则。\n\n如果你记住这句口诀：“如果我通过 `new`、`alloc` 或 `copy` 得到它，我就必须\
    \ `release` 或 `autorelease` 它”，就会安全无误。\n\n每当你获取一个对象时，你必须注意两点：你是如何获取它的，以及你计划持有它多长时间（参见表\
    \ 9-1）。\n\n表 9-1 内存管理规则\n\n| 获取方式… | 临时使用 | 长期持有（长时间使用） |\n| --- | --- | --- |\n\
    | `new`、`alloc` 或 `copy` | 使用完毕时释放 | 在 `dealloc` 中释放 |\n| 任何其他方式 | 无需做任何操作 | 获取时\
    \ retain，在 `dealloc` 中 release |\n\n在接下来的章节中，我们将讨论对象的临时使用与长期使用的具体细节。\n\n## 临时对象\n\
    \n让我们看看一些常见的内存管理生命周期场景。第一种场景是，你在某些代码中临时使用一个对象，但不会长时间保留它。如果你通过 `new`、`alloc` 或\
    \ `copy` 获取该对象，你需要安排它的销毁，通常通过 `release`：\n\n```\nNSMutableArray *array;\narray\
    \ = [[NSMutableArray alloc] init]; // 计数: 1\n// 使用数组\n[array release]; // 计数:\
    \ 0\n```\n\n如果你通过任何其他机制获取对象，例如 `arrayWithCapacity:`，则无需担心销毁它：\n\n```\nNSMutableArray\
    \ *array;\narray = [NSMutableArray arrayWithCapacity: 17];\n// 计数: 1，已自动释放\n//\
    \ 使用数组\n```\n\n`arrayWithCapacity:` 不是 `alloc`、`new` 或 `copy`，因此你可以假设返回的对象保留计数为\
    \ 1，并且已经自动释放。当自动释放池销毁时，`array` 会收到 `release` 消息；其保留计数变为 0，其内存被回收。\n\n以下是一段使用 `NSColor`\
    \ 的代码：\n\n```\nNSColor *color;\ncolor = [NSColor blueColor];\n// 使用颜色\n```\n\n\
    `blueColor` 不是 `alloc`、`new` 或 `copy`，因此你可以假设其保留计数为 1，并且已自动释放。`blueColor` 返回一个全局**单例**对象——一个所有需要它的程序共享的单一对象——并且实际上永远不会被销毁，但你无需担心这些实现细节。你只需要知道，你*不*需要显式地\
    \ `release` color。\n\n## 持有对象\n\n通常情况下，你会希望让一个对象存在超过几行代码的时间。通常，你会将这些对象放入其他对象的实例变量中，添加到像\
    \ `NSArray` 或 `NSDictionary` 这样的集合中，或者（更为少见地）将其作为全局变量保留。\n\n如果你通过 `init`、`new`\
    \ 或 `copy` 获取一个对象，则无需执行任何特殊操作。该对象的保留计数将为 1，因此它会一直存在。只需确保在该持有对象的拥有者的 `dealloc`\
    \ 方法中释放该对象即可：\n\n```\n- (void) doStuff\n{\n    // flonkArray 是一个实例变量\n    flonkArray\
    \ = [NSMutableArray new]; // 计数: 1\n} // doStuff\n\n- (void) dealloc\n{\n    [flonkArray\
    \ release]; // 计数: 0\n    [super dealloc];\n} // dealloc\n```\n"
- fmt: "如果你从 `init`、`new` 或 `copy` 之外的方法获取一个对象，需要记得 `retain` 它。当你在编写 GUI 应用程序时，要以事件循环（event\
    \ loop）来思考。你需要 `retain` 那些会存活超过当前事件循环的自动释放（autoreleased）对象。\n\n什么是事件循环？典型的图形用户界面（GUI）应用程序会花费大量时间等待用户操作。程序无所事事地等待，直到控制它的非常缓慢的人类决定点击鼠标或触碰屏幕。当这些事件之一发生时，程序被唤醒并开始工作，执行响应事件所需的任何操作。事件处理完毕后，应用程序再次进入休眠状态，等待下一个事件。为了保持程序的内存占用较低，Cocoa\
    \ 在开始处理事件前会创建一个自动释放池（autorelease pool），并在事件处理完毕后销毁该池。这会将累积的临时对象数量保持在最低限度。\n\n\
    当使用自动释放对象时，之前的方法可以这样编写：\n\n```\n- (void) doStuff\n{\n    // flonkArray 是一个实例变量\n\
    \    flonkArray = [NSMutableArray arrayWithCapacity: 17];\n    // count: 1, autoreleased\n\
    \    [flonkArray retain]; // count: 2, 1 autorelease\n} // doStuff\n\n- (void)\
    \ dealloc\n{\n    [flonkArray release]; // count: 0\n    [super dealloc];\n} //\
    \ dealloc\n```\n\n在当前事件循环结束时（如果是 GUI 程序）或当自动释放池被销毁时，`flonkArray` 会收到一条 `release`\
    \ 消息，使其 retain 计数从 2 降至 1。由于计数仍大于 0，对象得以继续存在。我们仍然需要在 `dealloc` 中释放该对象，以便它能被清理。如果我们在\
    \ `doStuff` 中没有调用 `retain`，`flonkArray` 将意外地被销毁。\n\n请记住，自动释放池会在明确定义的时机被清空：当你自己的代码显式销毁它时，或者在使用\
    \ AppKit 时的事件循环结束时。你不必担心有一个恶魔会随机地销毁自动释放池。你也不必 `retain` 你使用的每一个对象，因为池不会在函数执行过程中突然消失。\n\
    \n**保持池的清洁**：有时自动释放池的清空频率不如你所愿。以下是 Cocoa 邮件列表中经常出现的一个问题：“我对我使用的所有对象都进行了自动释放，但我的程序内存增长到了极其庞大的水平。”这个问题通常是由类似下面的代码引起的：\n\
    \n```\nint i;\nfor (i = 0; i < 1000000; i++) {\n    id object = [someArray objectAtIndex:\
    \ i];\n    NSString *desc = [object description];\n    // 对 description 做一些处理\n\
    }\n```\n\n这个程序运行着一个循环，每次迭代都会产生一个（或两三个）自动释放的对象。请记住，自动释放池只在明确定义的时机被清空，而这个循环的中间并不符合那些时机。在这个循环内部，创建了一百万个\
    \ `description` 字符串，它们都被放入当前的自动释放池中，因此我们有一百万个字符串在内存中。一旦池被销毁，这一百万个字符串最终会被释放，但在此之前它们会一直存在。\n\
    \n解决这个问题的方法是在循环内部创建你自己的自动释放池。这样，每循环一千次，你就可以销毁旧池并创建一个新池（如下所示，新增代码以粗体显示）：\n\n```\n\
    NSAutoreleasePool *pool;\npool = [[NSAutoreleasePool alloc] init];\nint i;\nfor\
    \ (i = 0; i < 1000000; i++) {\n    id object = [someArray objectAtIndex: i];\n\
    \    NSString *desc = [object description];\n    // 对 description 做一些处理\n    if\
    \ (i % 1000 == 0) {\n        [pool release];\n        pool = [[NSAutoreleasePool\
    \ alloc] init];\n    }\n}\n[pool release];\n```\n\n每循环一千次，旧池就被销毁，并创建一个新池。这样，同一时刻最多只有一千个\
    \ `description` 字符串存在，程序也能更轻松地运行。自动释放池的分配和销毁是相当廉价的操作，你甚至可以在每次循环迭代中都创建一个新池。"
  raw: 'If you get an object from something other than init, new, or copy, you need
    to remember to retain it. When you’re writing a GUI application, think in event
    loops. You want to retain autoreleased objects that will survive for longer than
    the current event loop.


    What’s an event loop? A typical graphical user interface (GUI) application spends
    a lot of time waiting on the user to do something. The program sits twiddling
    its thumbs until the very slow human at the controls decides to click the mouse
    or tap the screen. When one of these events happens, the program wakes up and
    gets to work doing whatever is necessary to respond to the event. After the event
    is handled, the application goes back to sleep waiting for the next event. To
    keep your program’s memory footprint low, Cocoa creates an autorelease pool before
    it starts handling the event and destroys the pool after the event is handled.
    This keeps the amount of accumulated temporary objects to a minimum.


    The previous methods would be written as follows when using autoreleased objects:


    - (void) doStuff


    {


    // flonkArray is an instance variable


    flonkArray = [NSMutableArray arrayWithCapacity: 17];


    // count: 1, autoreleased


    [flonkArray retain]; // count: 2, 1 autorelease


    } // doStuff


    - (void) dealloc


    {


    [flonkArray release]; // count: 0


    [super dealloc];


    } // dealloc


    At the end of the current event loop (if it’s a GUI program) or when the autorelease
    pool gets destroyed, flonkArray is sent a release message, which lowers its retain
    count from 2 to 1\. Because the count is greater than 0, the object lives on.
    We still need to release the object in our dealloc so that it gets cleaned up.
    If we didn’t have retain in doStuff, flonkArray would get destroyed unexpectedly.


    Remember that the autorelease pool is purged at well-defined times: when it’s
    explicitly destroyed in your own code or at the end of the event loop when using
    the AppKit. You don’t have to worry about a demon that goes around destroying
    autorelease pools at random. You also don’t have to retain each and every object
    you use, because the pool won’t go away in the middle of a function.


    Keeping The Pool Clean  Sometimes autorelease pools don’t get cleaned out as often
    as you would like. Here’s a common question that comes up on Cocoa mailing lists:
    “I’m autoreleasing all the objects I use, but my program’s memory is growing to
    absolutely huge levels.” That problem is usually caused by something like this:


    int i;


    for (i = 0; i < 1000000; i++) {


    id object = [someArray objectAtIndex: i];


    NSString *desc = [object description];


    // and do something with the description


    }


    This program is running a loop that generates an autoreleased object (or two or
    ten) every time through a whole bunch of iterations. Remember that the autorelease
    pool is only purged at well-defined times, and the middle of this loop is not
    one of those times. Inside this loop, a million description strings are being
    created, and all of them are put into the current autorelease pool, so we have
    a million strings sitting around. Once the pool gets destroyed, the million strings
    will finally go away, but it won’t happen before then.


    The way to work around this is to create your own autorelease pool inside the
    loop. This way, every thousand times through the loop, you can nuke the pool and
    make a new one (as follows, with added code in bold):


    NSAutoreleasePool *pool;


    pool = [[NSAutoreleasePool alloc] init];


    int i;


    for (i = 0; i < 1000000; i++) {


    id object = [someArray objectAtIndex: i];


    NSString *desc = [object descrption];


    // and do something with the description


    if (i % 1000 == 0) {


    [pool release];


    pool = [[NSAutoreleasePool alloc] init];


    }


    }


    [pool release];


    Every thousand times through the loop, the new pool is destroyed and a newer one
    is created. Now, no more than a thousand description strings will be in existence
    at one time, and the program can breathe easier. Autorelease pool allocation and
    destruction are pretty cheap operations, so you could even make a new pool in
    every iteration of the loop.'
