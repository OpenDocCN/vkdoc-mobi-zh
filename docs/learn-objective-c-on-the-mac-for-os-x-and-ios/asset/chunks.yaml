    | ![image](images/9781430241881_Athor_3_fmt.jpg) | **Mark Dalrymple** is a longtime
    Mac and Unix programmer who has worked on cross-platform toolkits, Internet publishing
    tools, high-performance web servers, and end-user desktop applications. He’s also
    the principal author of *Advanced Mac OS X Programming* (Big Nerd Ranch 2005).
    In his spare time, he plays trombone and bassoon and makes balloon animals. |


    ## About the Technical Reviewer


    ![image](images/9781430241881_Athor_4_fmt.jpg)**Nick Waynik** has been working
    in the IT field for over 13 years and has done everything from network administration
    to web development. He started writing iOS apps at the beginning of 2008 when
    the SDK was released. Since then, he has gone on to start his own business focusing
