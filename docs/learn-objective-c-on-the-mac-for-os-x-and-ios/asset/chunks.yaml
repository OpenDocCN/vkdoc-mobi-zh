    Ownership Has Its Privileges


    One of the requirements we discussed earlier is that pointers in ARC code must
    be retainable object pointers (ROPs). This means, for example, that you can’t
    simply assign an ROP to a non-ROP, because that transfers ownership of the pointer.
    Consider the following code:


    NSString *theString = @"Learn Objective-C";


    CFStringRef cfString = (CFStringRef)theString;


    If you’ve looked at much Objective-C code, you’ve probably seen this pattern.
    What is it doing? One pointer, theString, is an ROP, while the other, CFStringRef,
    is not. For a happy ARC experience, we need to tell the compiler who owns the
    pointer. To do this, we can use a C technique called a **bridged cast**. This
    is a standard C type cast, but with extra keywords:

    __bridge, __bridge_retained, or __bridge_transfer. The term “bridge” refers to
    the ability to use different data types for the same purpose, and not to the thing
    you feel like jumping off of when you’re stuck in a really tricky ARC conversion.
    Here’s a description of each of the three types of bridged casts:


    *   (__bridge Type) *operand*: This type of cast transfers a pointer but does
    not transfer its ownership. In our example above, the operand is theString, and
    Type is CFStringRef. When using this keyword, one pointer is a ROP, and the other
    is not. With this cast, ownership of the pointer stays with the operand. Here’s
    how our example would look with this case:


    cfString = (__bridge CFStringRef)theString;


    cfString gets the assignment, but ownership stays with theString.


    *   (__bridge_retained Type) *operand*: In this type, ownership is transferred
    to the non-ROP. One pointer is an ROP, and the other is not. Because ARC only
    takes care of ROP, you are responsible for releasing this object when you’re done
    with it. This cast increments the object’s retain count, so you have to decrement
    it, just as with standard old-fashioned memory management. Here’s how our example
    would look:


    cfString = (__bridge_retained CFStringRef)theString


    In this case, cfString string owns the pointer and its retain count is incremented.
    You’re responsible for managing it with retain/release.


    *   ![image](images/9781430241881_square_fmt.jpg)  (__bridge_transfer Type) *operand*:
    This cast does the opposite of the previous kind; it transfers ownership to the
    ROP. In this case, ARC owns the object and will ensure it’s released like any
    other ARC object.


    Another restriction is that structs and unions can’t have ROPs as members, so
    code like this is not allowed:


    // Bad code. Do not steal or sell.


    struct {


    int32_t foo;


    char *bar;


    NSString *baz;


    } MyStruct;


    You can get around this requirement by using a void * and a bridged cast. To assign
    and get the string back, our code would look like this:


    struct {


    int32_t foo;


    char *bar;


    void *baz;


    } MyStruct;


    MyStruct.baz = (__bridge_retained void *)theString;


    NSString *myString = (__bridge_transfer NSString *)MyStruct.baz;


    As you can see, at the edges, ARC code is not always so automatic to write. It’s
    a pretty deep topic that deserves plenty of study. To complete this conversation
    about ARC, we’ll list memory management methods that you shouldn’t call on ARC-managed
    objects:


    *   retain

    *   ![image](images/9781430241881_square_fmt.jpg)  retainCount

    *   ![image](images/9781430241881_square_fmt.jpg)  release

    *   ![image](images/9781430241881_square_fmt.jpg)  autorelease

    *   dealloc


    Because you sometimes need to free non-ARC objects or perform other cleanup, you
    can still write dealloc methods, but you can’t call [super dealloc].


    There are also methods you’re not permitted to override on ARC objects:


    *   ![image](images/9781430241881_square_fmt.jpg)  retain

    *   ![image](images/9781430241881_square_fmt.jpg)  retainCount

