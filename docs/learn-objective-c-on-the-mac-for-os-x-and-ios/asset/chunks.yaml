    \n![9781430241881_Fig09-10.tif](images/9781430241881_Fig09-10_fmt.jpg)\n\n[Figure\
    \ 9-10](#9781430241881_Ch9.xhtml#FIG10). You must turn off garbage collection\
    \ before converting a project\n\nLet’s walk through the process of turning off\
