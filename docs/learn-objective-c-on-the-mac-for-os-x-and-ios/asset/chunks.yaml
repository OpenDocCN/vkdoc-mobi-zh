    **Foreword**


    Whenever software developers adopt a new platform, they are faced with the daunting
    task of familiarizing themselves with the programming language, development tools,
    design patterns, and standard software libraries available in the new environment.


    Typically, this must be done simultaneously with writing code under pressure to
    deliver it as quickly as possible, and developers are tempted to fall back on
    approaches they know from previous systems. This often results in code that doesn''t
    really fit the platform, that may duplicate functionality that already existed,
    and can cause maintenance headaches down the road.


    In an ideal world, new developers would have the benefit of colleagues who are
    already familiar with the platform, who can offer their guidance to get them started
    and moving in the right direction. Unfortunately, the very success of the iOS
    platform has made for many cases where this just isn''t possible.


    If you don''t have a mentor handy, what''s the next best thing?'
