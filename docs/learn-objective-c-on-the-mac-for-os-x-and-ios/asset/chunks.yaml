    );\n} // description\n@end // Slant6\n```\n\n`Slant6`是一种发动机，因此继承`Engine`是合理的。记住，继承建立了一种关系，允许我们在期望超类（`Engine`）的地方传递子类（`Slant6`）。由于`Car`的`setEngine:`方法接受类型为`Engine`的参数，我们可以安全地传递一个`Slant6`。\n\
    \n`Slant6`重写了`description`方法，使其打印新消息。由于`Slant6`没有调用超类的`description`方法（即不包含`[super\
    \ description]`），它完全替换了继承的`description`。\n\n实现新轮胎类`AllWeatherRadial`的步骤与`Slant6`类似。我们继承现有类（`Tire`）并提供新的`description`方法：\n\
    \n```objectivec\n@interface AllWeatherRadial : Tire\n@end // AllWeatherRadial\n\
    \n@implementation AllWeatherRadial\n- (NSString *) description\n{\n    return\
    \ (@\"I am a tire for rain or shine.\");\n} // description\n@end // AllWeatherRadial\n\
    ```\n\n最后，我们修改`main()`以使用新的发动机和轮胎类型（更改的代码已加粗）：\n\n```objectivec\nint main (int\
    \ argc, const char * argv[]) {\n    Car *car = [Car new];\n    for (int i = 0;\
    \ i < 4; i++) {\n        Tire *tire = [AllWeatherRadial new];\n        [car setTire:\
    \ tire atIndex: i];\n    }\n    Engine *engine = [Slant6 new];\n    [car setEngine:\
    \ engine];\n    [car print];\n    return (0);\n} // main\n```\n\n我们添加了两个新类，并稍微修改了两行代码，完全没有改动`Car`本身。我们的`Car`愉快地使用你设计的任何发动机和轮胎，而无需更改`Car`自身。程序的行为现在发生了根本变化：\n\
    \n```\nI am a slant- 6. VROOOM!\nI am a tire for rain or shine.\nI am a tire for\
    \ rain or shine.\nI am a tire for rain or shine.\nI am a tire for rain or shine.\n\
    ```\n\n### 组合还是继承？\n\n`CarParts-2`同时使用了继承和组合，这是本章和上一章介绍的工具包中的两个新工具。一个很好的问题是：“什么时候使用继承，什么时候使用组合？”\n\
    \n继承建立了一种“是（is a）”关系。三角形*是一个*形状。`Slant6`*是一个*发动机。`AllWeatherRadial`*是一个*轮胎。当你能说“X\
    \ 是 Y”时，可以使用继承。\n\n相反，组合建立了一种“有（has a）”关系。形状*有*填充颜色。汽车*有*一个发动机，并且*有*轮胎。相比之下，汽车不是一个发动机，汽车也不是一个轮胎。当你能说“X\
    \ 有一个 Y”时，应该使用组合。\n\n初学面向对象编程的程序员经常犯的错误是试图对一切使用继承，例如让`Car`继承`Engine`。继承是一个有趣的新玩具，但并不适用于所有情况。你可以用这种结构创建一个可运行的程序，因为你可以在`Car`代码内部访问发动机工作所需的内容。但对于阅读代码的人来说，这没有意义。汽车是一个发动机？嗯？因此，只在合适的情况下使用继承。\n\
    \n下面是一个在设计数据结构时如何思考的例子：创建新对象时，花一些时间思考何时应使用继承，何时应使用组合。例如，在设计汽车相关对象时，你可能思考：“一辆汽车有轮胎、一个发动机和一个变速箱。”因此，你会使用组合，在`Car`类中为所有这些部件创建实例变量。\n"
- fmt: 'In other circumstances, you would use inheritance. For instance, you might
    need the idea of a licensed vehicle, that is, one requires some kind of license
    before it is legal to use. An automobile, motorcycle, and tractor-trailer rig
    would all be licensed vehicles. An automobile *is a* licensed vehicle, and a motorcycle
    *is a* licensed vehicle—sounds like a good job for inheritance. So you’d probably
    have a `LicensedVehicle` class that holds things like the municipality and license
    number (using composition!), and `Automobile`, `MotorCycle`, and so on would inherit
    from `LicensedVehicle`.


    ## Summary


    Composition, the technique of creating objects that have references to other objects,
    is a fundamental concept of OOP. For instance, a car object has references to
    the engine object and four tire objects. During this chapter’s discussion of composition,
    we introduced accessor methods, which provide a way for outside objects to change
    attributes while keeping the instance variables shielded.


    Accessor methods and composition go hand in hand, because you usually write accessor
    methods for each object that’s being composed. You also learned about two types
    of accessor methods: setter methods tell an object what to change an attribute
    to, and getter methods ask an object for the value of an attribute.


    In this chapter, you also heard about Cocoa rules for naming accessor methods.
    In particular, we cautioned you to not use “get” in the name of accessor methods
    that return an attribute value.


    In the next chapter, we’ll take a breather from all this fabulous OOP theory so
    we can look at how to split classes among multiple source files, rather than keeping
    everything in one big file.


    # Chapter 6


    ## Source File Organization


    So far, every project we’ve talked about has had all its source code crammed into
    its `main.m` file. The `main()` function and all the `@interface` and `@implementation`
    sections for our classes are piled into the same file. That structure’s fine for
    small programs and quick hacks, but it doesn’t scale to larger projects. As your
    program gets bigger, you’ll have a ponderous file to scroll through, making finding
    stuff harder.


    Back in your school days (assuming you’re finished with them), you didn’t put
    every term paper into the same word processing document (assuming you had word
    processors). You kept each paper in its own document, with a descriptive name.
    Likewise, it’s a good idea to split your program’s source code into multiple files,
    and you can give each one a helpful name.


    Compartmentalizing your program into smaller files gives you a chance to find
    important bits of code more quickly, and it helps others get a quick overview
    when they look at your project. Putting your code in multiple files also makes
    sending the source for an interesting class to a friend easier: you just pack
    up a couple of files rather than your entire project. In this chapter, we’ll discuss
    strategies and ideas for keeping various bits of your program in separate files.


    ### Split Interface and Implementation


    As you’ve seen, the source code for Objective-C classes is divided into two parts.
    One part is the interface, which provides the public view of the class. The interface
    contains all the information necessary for someone to use the class. By showing
    the compiler the `@interface` section, you’ll be able to use objects of that class,
    call class methods, compose objects into another class, and make subclasses.


    The other part of a class’s source is the implementation. The `@implementation`
    section tells the Objective-C compiler how to make the class actually work. This
    section contains the code that implements the methods declared in the interface.


    Because of the natural split in the definition of a class into interface and implementation,
    a class’s code is often split into two files along the same lines. One part holds
    the interface components: the `@interface` directive for the class, any public
    struct definitions, enum constants, `#define`s, `extern` global variables, and
    so on. Because of Objective-C’s C heritage, this stuff typically goes into a header
    file, which has the same name as the class with a `.h` at the end. For example,
    class `Engine`’s header file would be called `Engine.h`, and `Circle`’s header
    file would be `Circle.h`.


    All the implementation details, such as the `@implementation` directive for the
    class, definitions of global variables, private structs, and so on, go into a
    file with the same name as the class and a `.m` at the end (sometimes called a
    **dot-m file**). `Engine.m` and `Circle.m` would be the implementation files for
    those classes.


    **Note:** If you use `.mm` for the file extension, you’re telling the compiler
    you’ve written your code in Objective-C++, which lets you use C++ and Objective-C
    together.


    ### Making New Files in Xcode


    When you build a new class, Xcode makes your life easier by automatically creating
    the `.h` and `.m` files for you. When you choose File ![image](images/9781430241881_arrow_fmt.jpg)
    New ![image](images/9781430241881_arrow_fmt.jpg) New File in Xcode, you get a
    window like the one shown in [Figure 6-1](#9781430241881_Ch6.xhtml#_FIG1), which
    presents you with a list of the kinds of files that Xcode knows how to create.


    ![9781430241881_Fig06-01.tif](images/9781430241881_Fig06-01_fmt.jpg)


    [Figure 6-1](#9781430241881_Ch6.xhtml#FIG1). Creating a new file in Xcode


    Select “Objective-C class”, and click Next. You’ll get another window asking you
    to fill in the name of the class, as shown in [Figure 6-2](#9781430241881_Ch6.xhtml#_FIG2).


    ![9781430241881_Fig06-02.tif](images/9781430241881_Fig06-02_fmt.jpg)


    [Figure 6-2](#9781430241881_Ch6.xhtml#FIG2). Naming the new files


    You also get to choose the parent class of your new class. By default, this is
    `NSObject`. Every class must have a parent class (except `NSObject` itself, which
    is the parent to every class). You can specify the parent for your new class by
    selecting from the pop-up menu or just typing the name of the class if you don’t
    see it listed in the pop-up.


    When you click Next, Xcode asks where you want to save the file (see [Figure 6-3](#9781430241881_Ch6.xhtml#_FIG3)).
    Choose the directory where you keep other files for this project.


    ![9781430241881_Fig06-03.tif](images/9781430241881_Fig06-03_fmt.jpg)


    [Figure 6-3](#9781430241881_Ch6.xhtml#FIG3). Choosing a directory


    You can see a few other interesting things in that window. For example, you can
    choose which group should contain the new files. We won’t discuss the Targets
    section right now, except to say that complex projects can have multiple targets,
    each with its own configuration of source files and build rules.


    Once you create the new class, Xcode adds the appropriate files to the project
    and displays the results in the project window, as shown in [Figure 6-4](#9781430241881_Ch6.xhtml#_FIG4).


    ![9781430241881_Fig06-04.tif](images/9781430241881_Fig06-04_fmt.jpg)


    [Figure 6-4](#9781430241881_Ch6.xhtml#FIG4). The new files displayed in the Xcode
    project window'
