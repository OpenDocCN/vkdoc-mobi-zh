    \ *14.07 Mutable Variables*）：\n\n```\n__block double c = 3;\nMKSampleMultiplyBlockRef\
    \ multiply = ^(double a, double b)\n{ c = a * b; };\n```\n\n有些变量不能声明为 `__block`。这些限制适用：\n\
    \n* ![image](img/9781430241881_square_fmt.jpg) 不能是可变长度数组\n* ![image](img/9781430241881_square_fmt.jpg)\
    \ 不能是包含可变长度数组的结构体\n\n## Block 局部变量\n\n这些变量的行为方式与函数内部的局部变量相同。\n\n```\nvoid (^MKSampleBlockRef)(void)\
    \ = ^(void){\n    double a = 4;\n    double c = 2;\n    NSLog(@\"%f\", a * c);\n\
    };\nMKSampleBlockRef();\n```\n\n## Objective-C 对象\n\nBlock 在 Objective-C 中是第一等公民，这意味着你可以像对待任何其他对象一样对待它们。使用\
    \ block 时你会遇到的最大问题很可能是内存管理。正如我们刚刚讨论的，在 block 内部访问 Objective-C 对象时你必须小心。一如既往，有一些规则可以帮助你进行内存管理。\n"
- fmt: "# 对象引用与内存管理\n\n- `![image](images/9781430241881_square_fmt.jpg)` 如果你引用一个 Objective-C\
    \ 对象，它会被保留。\n- `![image](images/9781430241881_square_fmt.jpg)` 如果你通过引用访问实例变量，`self`（执行该方法的对象）会被保留。\n\
    - `![image](images/9781430241881_square_fmt.jpg)` 如果你通过值访问实例变量，该变量会被保留。\n\n第一条规则很简单，但另两条之间存在细微差别。让我们查看\
    \ `14.08 Objective Blocks` 中的示例。在该项目中，找到 `ProcessStrings.m`。\n\n```\nNSString\
    \ *string1 = ^{\n    return [_theString stringByAppendingString:_theString];\n\
    };\n```\n\n在这个示例中，`_theString` 是声明该 block 的类的一个实例变量。由于实例变量在 block 中被直接访问，因此容器对象（`self`）被保留。现在来看另一个示例：\n\
    \n```\nNSString *localObject = _theString;\nNSString *string2 = ^{\n    return\
    \ [localObject stringByAppendingString:localObject];\n};\n```\n\n在这个示例中，我们采用了间接方式：创建实例变量的本地引用，并在\
    \ block 体中使用该引用。这次被保留的是 `localObject`，而不是 `self`。\n\n由于 block 是对象，你可以向它们发送所有内存管理消息。在\
    \ C 层面，你必须使用 `Block_copy()` 和 `Block_release()` 函数来正确管理内存。`14.09 Block Copy` 将演示如何复制\
    \ block。\n\n```\nMKSampleVoidBlockRef block1 = ^{\n    NSLog(@\"Block1\");\n};\n\
    block1();\n\nMKSampleVoidBlockRef block2 = ^{\n    NSLog(@\"Block2\");\n};\nblock2();\n\
    \nBlock_release(block2);\nblock2 = Block_copy(block1);\nblock2();\n```\n\n# 并发，或保持同步\n\
    \n到目前为止，我们讨论的大部分代码都是按顺序一个接一个地执行。现在，我们讨论如何突破这一限制。\n\n你运行 Xcode 的 Mac 至少有两个处理器核心，甚至可能更多。即使是最新的\
    \ iOS 设备也拥有多核心。这意味着你可以同时处理多件事情。Apple 提供了多种 API 来利用多核心优势。同时执行多个任务的程序被称为**并发**程序。\n\
    \n利用并发的最基本技术是使用 POSIX 线程来处理程序中可以独立执行的不同部分。POSIX 线程同时提供 C 和 Objective-C API。编写并发应用程序需要创建多个线程，而编写多线程代码颇具挑战性。由于线程是底层\
    \ API，你必须手动管理它们。根据硬件和其他运行中软件的不同，所需线程数量的条件也会变化。处理所有这些情况相当棘手，一旦你评估了问题的范围，可能会认为自己不使用多线程代码反而更好。\n\
    \nApple 来拯救你了！为了减轻多核编程的负担，Apple 引入了 Grand Central Dispatch（简称 GCD）。这项技术为你承担了大部分线程管理的负担，让你可以专注于为任务编写代码。要使用\
    \ GCD，你只需提交 block 或函数作为线程运行。GCD 是一项系统级技术，因此你可以在代码的任何层面使用它。GCD 决定需要多少线程以及何时调度它们运行。由于它在系统层面运行，它可以平衡你的应用负载与所有其他运行中的程序，使计算机或设备运行更高效。\n\
    \n## 同步\n\n好吧，我们来打个比方。你在一条多车道高速公路上行驶，其他车辆经过你，而你正在超越一些较慢的车辆。想象一下，在你的计算机上，多条执行路径以同样的方式进行。就像交通一样，有些执行路径耗时很长，有些则很快。在高峰时段，当你想驶上高速公路时，你必须等待前方的车辆，一次只能有一辆车汇入车道。车道和交通信号控制着车流，使其尽可能平稳地运行。走出我们的汽车，进入计算机内部，当交通由进程组成时，我们如何管理？我们使用同步机制，例如标志或**互斥锁**来门控访问。\n\
    \n> **注意** “Mutex”是“**mut**ual **ex**clusion”（互斥）的缩写，指的是确保没有两个线程能同时进入其临界区的问题。\n\
    \nObjective-C 提供了一个语言级别的关键字 `@synchronized`。该关键字接受一个参数，通常是正在被修改的对象。\n\n```\n@synchronized(theObject)\n\
    {\n    // Critical section.\n}\n```\n\n这确保了临界代码段在不同线程间被串行访问。\n\n当你定义属性且没有指定 `nonatomic`\
    \ 关键字作为属性特性时，编译器会生成强制执行互斥的 getter 和 setter。如果你不在意，或者知道该属性的值不会被多个线程访问，你可以添加 `nonatomic`\
    \ 特性。为什么要这样做？原因是为了挤出一丝性能提升。这如何实现？编译器会生成 `@synchronize(mutex, atomic)` 来确保互斥。以这种方式设置代码和变量存在开销，这会使对这些属性的访问比直接访问慢得多。\n\
    \n# 选择性能\n\n如果你只是想让某些代码在后台执行，`NSObject` 提供了相应的方法。这些方法名称中都包含 `performSelector:`。最简单的是\
    \ `performSelectorInBackground:withObject:`，它在后台执行你的一个方法。它通过创建线程来运行你的方法。这些方法的定义有一些限制：\n\
    \n- `![image](images/9781430241881_square_fmt.jpg)` 由于这些方法在自己的线程上运行，你必须为 Cocoa\
    \ 对象创建一个自动释放池。主自动释放池与主线程关联。\n- `![image](images/9781430241881_square_fmt.jpg)`\
    \ 这些方法不能返回值，并且要么不接受参数，要么接受一个对象作为参数。换句话说，这些方法必须具有以下签名之一：\n\n```\n- (void)myMethod;\n\
    - (void)myMethod:(id)myObject;\n```\n\n考虑到这些限制，我们的方法实现如下（`14.10 Selectors`）：\n\
    \n```\n- (void)myBackgroundMethod\n{\n    @autoreleasepool\n    {\n        NSLog(@\"\
    My Background Method\");\n    }\n}\n```\n\n或\n\n```\n- (void)myOtherBackgroundMethod:(id)myObject\n\
    {\n    @autoreleasepool\n    {\n        NSLog(@\"My Background Method %@\", myObject);\n\
    \    }\n}\n```\n\n要在后台执行你的方法，只需调用 `performSelectorInBackground:withObject:`，如下所示：\n\
    \n```\n[self performSelectorInBackground:@selector(myBackgroundMethod)\n     \
    \                 withObject:nil];\n[self performSelectorInBackground:@selector(myOtherBackgroundMethod:)\n\
    \                      withObject:arugmentObject];\n```\n\n就这样，完成了。方法执行完毕后，Objective-C\
    \ 运行时会负责清理并销毁线程。请注意，你不会收到方法执行完毕的通知：这是最基本、最精简的版本。如果你想做更复杂的事情，需要继续阅读，了解调度队列的精彩世界。\n\
    \n# 每天我都排队\n\nGCD 使用**调度队列**，这些队列类似于线程但使用起来简单得多。你只需编写代码，将其分配给队列，然后让系统执行它。你可以异步或同步执行任意代码。有三种类型的队列："
  raw: '*   ![image](images/9781430241881_square_fmt.jpg)  If you reference an Objective-C
    object, it is retained.

    *   ![image](images/9781430241881_square_fmt.jpg)  If you access an instance variable
    by reference, self (the object performing the method) is retained.

    *   ![image](images/9781430241881_square_fmt.jpg)  If you access an instance variable
    by value, the variable is retained.


    The first one is pretty simple, but there’s a subtle difference between the other
    two. Let’s take a look at an example from *14.08 Objective Blocks*. In that project,
    look at *ProcessStrings.m*.


    NSString *string1 = ^{


    return [_theString stringByAppendingString:_theString];


    };


    ;


    In this example, __theString is an instance variable for a class where this block
    is declared. Because the instance variable is accessed directly in the block,
    the containing object (self) is retained. Now, here’s another example:


    NSString *localObject = _theString;


    NSString *string2 = ^{


    return [localObject stringByAppendingString:localObject];


    };


    In this one, we have indirection: we make a local reference to the instance variable
    and use that in the body of the block. This time, the localObject, and not self,
    is retained.


    Because blocks are objects, you can send all the memory management messages to
    them. At the C level, you have to use the Block_copy() and Block_release() functions
    to properly manage memory. *14.09 Block Copy* shows you how to copy blocks.


    MKSampleVoidBlockRef block1 = ^{


    NSLog(@"Block1");


    };


    block1();


    MKSampleVoidBlockRef block2 = ^{


    NSLog(@"Block2");


    };


    block2();


    Block_release(block2);


    block2 = Block_copy(block1);


    block2();


    Concurrency, or Keeping Up with Yourself


    Up to this point, most of the code we’ve discussed makes things happen one after
    the other, in sequential order. Now, we’ll talk about moving past that limitation.


    Your Mac that runs Xcode has at least two processor cores, and maybe a lot more.
    Even the latest iOS devices have multiple cores. This means you can have more
    than one thing happening at the same time. Apple provides various APIs to take
    advantage of multiple cores. Programs that have more than one thing executing
    at the same time are said to be **concurrent**.


    The most basic technique for taking advantage of concurrency is using POSIX threads
    to handle different parts of your program that can execute independently. POSIX
    threads have both a C and an Objective-C API. To write concurrent applications
    requires creating multiple threads, and writing threaded code is challenging.
    Because threads are a low-level API, you have to manage them manually. Depending
    on the hardware and other software running, the conditions for the number of threads
    required can change. Handling all this is tricky, and once you’ve scoped out the
    problem, you might decide you’re actually better off without threaded code.


    Apple to the rescue! To reduce the burden of programming for multiple cores, Apple
    introduced Grand Central Dispatch, affectionately known as GCD. This technology
    takes much of the burden of thread management from you so you can concentrate
    on just writing code for your task. To use GCD, you submit blocks or functions
    to be run as threads. GCD is a system-level technology, so you can use it at any
    level of your code. GCD decides how many threads are needed and when to schedule
    them to run. Because it runs at the system level, it can balance your application’s
    load along with everything else running, making the computer or device perform
    more efficiently.


    Synchronize


    OK, kids, it’s analogy time. You’re driving along a multilane highway, and other
    cars are going by you, while you’re passing some slower cars. Imagine multiple
    paths of execution happening the same way on your computer. Just like in traffic,
    some execution paths take a long time, and some are quick. During rush hour, when
    you want to get on the freeway, you have to wait for cars in front of you as one
    car at a time joins the road. Lanes and traffic signals control the flow to keep
    the traffic moving as smoothly as possible. Stepping out of our cars and inside
    our computers, how do we manage traffic when it consists of processes? We use
    a synchronization device such as a flag or a **mutex** to gate access.


    **Note** “Mutex” is short for “**mut**ual **ex**clusion,” which refers to the
    problem of ensuring that no two threads can be in their critical section at the
    same time.


    Objective-C provides a language-level keyword called @synchronized. This keyword
    takes an argument, typically the object that is being modified.


    @synchronized(theObject)


    {


    // Critical section.


    }


    This ensures that the critical code section is accessed serially from different
    threads.


    When you define a property and you don’t specify the keyword nonatomic as an attribute
    of the property, the compiler generates getters and setters that enforce mutual
    exclusion. If you don’t care, or you know that the values for the property will
    not be accessed from multiple threads, you can add the nonatomic attribute. Why
    would you want to do that? The reason is to squeeze out a bit more performance.
    How does that work? The compiler generates @synchronize (mutex, atomic) to ensure
    mutual exclusion. There’s overhead involved in setting up code and variables to
    work that way, which can make access to them much slower than direct access.


    Select Performance


    If you simply want to have some code execute in the background, NSObject provides
    methods that allow you to do just that. These methods all have performSelector:
    in their names. The simplest of these is performSelectorInBackground:withObject:,
    which executes one of your methods in the background. It works by creating a thread
    to run your method. There are some restrictions (surprise!) on how those methods
    must be defined:


    *   ![image](images/9781430241881_square_fmt.jpg)  Because these methods are running
    on their own threads, you must create an autorelease pool for Cocoa objects. The
    main autorelease pool is associated with the main thread.

    *   ![image](images/9781430241881_square_fmt.jpg)  The methods must not return
    any values and must either take no arguments or have one object as an argument.
    In other words, the methods must have one of the following signatures:


    - (void)myMethod;


    - (void)myMethod:(id)myObject;


    With those restrictions in mind, our method implementation looks like this (*14.10
    Selectors*):


    - (void)myBackgroundMethod


    {


    @autoreleasepool


    {


    NSLog(@"My Background Method");


    }


    }


    or


    - (void)myOtherBackgroundMethod:(id)myObject


    {


    @autoreleasepool


    {


    NSLog(@"My Background Method %@", myObject);


    }


    }


    To execute your method in the background, just call performSelectorInBackground:withObject:,
    like so:


    [self performSelectorInBackground:@selector(myBackgroundMethod)


    withObject:nil];


    [self performSelectorInBackground:@selector(myOtherBackgroundMethod:)


    withObject:arugmentObject];


    That’s it. You’re done. Once the method is finished executing, the Objective-C
    runtime takes care of cleaning up and getting rid of the thread. Note that you
    won’t be notified when the method finishes executing: this is the bare bones,
    low-rent version. If you want to do anything more complicated, you need to read
    on to discover the exciting world of dispatch queues.


    Every Day I Get in the Queue


    GCD uses **dispatch queues**, which are similar to threads but much simpler to
    use. You just write your code, assign it a queue, and then have the system execute
    it. You can execute arbitrary code asynchronously or synchronously. There are
    three types of queues:'
