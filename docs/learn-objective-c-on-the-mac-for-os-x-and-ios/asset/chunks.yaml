- fmt: "`valueForKey:` performs a little bit of magic and figures out what the value\
    \ of the make is and returns it.\n\n`valueForKey:` works by first looking for\
    \ a getter named after the key: `-key` or `-isKey`. So for these two calls, `valueForKey:`\
    \ looks for `-name` and `-make`. If there is no getter method, it looks inside\
    \ the object for an instance variable named `_key` or `key`. If we had not supplied\
    \ accessor methods via `@synthesize`, `valueForKey:` would look for the instance\
    \ variables `_name` and `name` or `_make` and `make`.\n\nThat last bit is huge:\
    \ `-valueForKey:` uses the metadata in the Objective-C runtime to crack open objects\
    \ and poke inside them looking for interesting information. You can’t really do\
    \ this kind of stuff in C or C++. By using KVC, you can get values where there\
    \ are no getter methods and without having to access an instance variable directly\
    \ via an object pointer.\n\nThe same technique works for the model year:\n\n```\n\
    NSLog (@\"model year is %@\", [car valueForKey: @\"modelYear\"]);\n```\n\nwhich\
    \ would print out `model year is 1984`.\n\nHey, wait a minute! `%@` in `NSLog`\
    \ prints out an object, but `modelYear` is an `int`, not an object. What’s the\
    \ deal? For KVC, Cocoa automatically boxes and unboxes scalar values. That is,\
    \ it automatically puts scalar values (`int`s, `float`s, and some `struct`s) into\
    \ `NSNumber`s or `NSValue`s when you use `valueForKey:`, and it automatically\
    \ takes scalar values out of these objects when you use `-setValueForKey:`. Only\
    \ KVC does this autoboxing. Regular method calls and property syntax don’t do\
    \ this.\n\nIn addition to retrieving values, you can set values by name by using\
    \ `-setValue:forKey:`.\n\n```\n[car setValue: @\"Harold\" forKey: @\"name\"];\n\
    ```\n\nThis method works the same way as `-valueForKey:`. It first looks for a\
    \ setter for `name`, like `-setName` and calls it with the argument `@\"Harold\"\
    `. If there is no setter, it looks in the class for an instance variable called\
    \ `name` or `_name` and then assigns it.\n\n**We Must Underscore this Rule** Both\
    \ the compiler and Apple reserve instance variable names that begin with an underscore,\
    \ promising dire consequences to you and your dog if you try to use one. There’s\
    \ no actual enforcement of this rule, but there might be someday, so disobey at\
    \ your own risk.\n\nIf you’re setting a scalar value, before calling `-setValue:forKey:`,\
    \ you need to wrap it up (box it):\n\n```\n[car setValue: [NSNumber numberWithFloat:\
    \ 25062.4] forKey: @\"mileage\"];\n```\n\nAnd `-setValue:forKey:` will unbox the\
    \ value before it calls `-setMileage:` or changes the `mileage` instance variable.\n\
    \n### A Path! A Path!\n\nIn addition to setting values by key, key-value coding\
    \ allows you to specify a key path, which, like a file system path, lets you follow\
    \ a chain of relationships.\n\nTo give us something to dig into, how about we\
    \ add some horsepower to our engines? We’ll add a new instance variable to `Engine`:\n\
    \n```\n@interface Engine : NSObject <NSCopying>\n{\n    int horsepower;\n}\n@end\
    \ // Engine\n```\n\nNotice that we’re not adding any accessors or properties.\
    \ Usually, you’ll want to have accessors or properties for interesting object\
    \ attributes, but we’ll avoid them here to really show you that KVC digs into\
    \ objects directly.\n\nWe’re adding an `init` method so that the engine starts\
    \ off with a nonzero horsepower:\n\n```\n- (id) init\n{\n    if (self = [super\
    \ init])\n    {\n        horsepower = 145;\n    }\n    return (self);\n} // init\n\
    ```\n\nWe also added copying of the `horsepower` instance variable in `-copyWithZone:`\
    \ so that copies will get the value, and we added it to the `-description`, which\
    \ is pretty old hat by now, so we’ll leave out further explanation.\n\nJust to\
    \ prove we can get and set the value, you can add the following code to `18.01\
    \ Car-Value-Coding.m`:\n\n```\nNSLog (@\"horsepower is %@\", [engine valueForKey:\
    \ @\"horsepower\"]);\n[engine setValue: [NSNumber numberWithInt: 150] forKey:\
    \ @\"horsepower\"];\nNSLog (@\"horsepower is %@\", [engine valueForKey: @\"horsepower\"\
    ]);\n```\n\nThis prints out:\n\n```\nhorsepower is 145\nhorsepower is 150\n```\n\
    \nWhat about those key paths? You specify different attribute names separated\
    \ by dots. By asking a car for its `\"engine.horsepower\"`, you get the horsepower\
    \ value. In fact, let’s try accessing key paths using the `-valueForKeyPath:`\
    \ and `-setValueForKeyPath:` methods. We’ll send these messages to the car instead\
    \ of the engine:\n\n```\n[car setValue: [NSNumber numberWithInt: 155] forKeyPath:\
    \ @\"engine.horsepower\"];\nNSLog (@\"horsepower is %@\", [car valueForKeyPath:\
    \ @\"engine.horsepower\"]);\n```\n\nThese key paths can be arbitrarily deep, depending\
    \ on the complexity of your object graph (which is just a fancy way of saying\
    \ your collection of related objects); you can have key paths like `\"car.interior.airconditioner.fan.velocity\"\
    `. In some ways, digging into your objects can be easier with a key path than\
    \ doing a series of nested method calls.\n\n### Aggregated Assault\n\nOne cool\
    \ thing about KVC is that if you ask an `NSArray` for a value for a key, it will\
    \ actually ask every object in the array for the value for that key and then pack\
    \ things up in another array, which it gives back to you. The same works for arrays\
    \ that are inside of an object (recall composition?) that you access by key path.\n\
    \n`NSArray`s that are embedded in other objects are known in the KVC vernacular\
    \ as having a **to-many** relationship. For instance, a car has a relationship\
    \ with many (well, four) tires. So we can say that `Car` has a to-many relationship\
    \ with `Tire`. If a key path includes an array attribute, the remaining part of\
    \ the key path is sent to every object in the array.\n\n**Out of Many, One** Since\
    \ you now know about to-many relationships, you’re probably wondering what a to-one\
    \ relationship is. Ordinary object composition is a to-one relationship. A car\
    \ has a to-one relationship with its engine, for instance.\n\nRemember that `Car`\
    \ has an array of tires, and each tire has its air pressure. We can get all of\
    \ the tire pressures in one call:\n\n```\nNSArray *pressures = [car valueForKeyPath:\
    \ @\"tires.pressure\"];\n```\n\nAfter making the following call\n\n```\nNSLog\
    \ (@\"pressures %@\", pressures);\n```\n\nwe can print out these results:\n\n\
    ```\npressures (\n    34,\n    34,\n    34,\n    34\n)\n```\n\nWhat’s happening\
    \ here exactly, aside from us being vigilant about our tire maintenance? `valueForKeyPath:`\
    \ breaks apart your path and processes it from left to right. First, it asks the\
    \ car for its tires. Once it has the tires in hand, it asks the `tires` object\
    \ for its `valueForKeyPath:` with the rest of the key path, `\"pressure\"` in\
    \ this case. `NSArray` implements `valueForKeyPath:` by looping over its contents\
    \ and sending each object the message. So the `NSArray` sends each tire it has\
    \ inside itself a `valueForKeyPath:` using `\"pressure\"` for the key path, which\
    \ results in the tire pressure being returned, boxed up in an `NSNumber`. Pretty\
    \ handy!\n\nUnfortunately, you can’t index these arrays in the key path, such\
    \ as by using `\"tires[0].pressure\"` to get to the first tire.\n\n### Pit Stop\n\
    \nBefore we head to the next bit of key-value goodness, we’ll be adding a new\
    \ class, called `Garage`, which will hold a bunch of classic cars. You can find\
    \ all this stuff in the project named `16.02 Car-Value-Garaging`. Here’s `Garage`’s\
    \ interface:\n\n```\n#import <Cocoa/Cocoa.h>\n\n@class Car;\n\n@interface Garage\
    \ : NSObject\n{\n    NSString *name;\n    NSMutableArray *cars;\n}\n\n@property\
    \ (readwrite, copy) NSString *name;\n- (void) addCar: (Car *) car;\n- (void) print;\n\
    \n@end // Garage\n```\n\nNothing’s new here. We’re forward-declaring `Car`, because\
    \ all we need to know is that it’s an object type to use as an argument to the\
    \ `-addCar:` method. The `name` is a property, and the `@property` statement says\
    \ that users of `Garage` can access and change the `name`. And there’s a method\
    \ to print out the contents. To implement a collection of cars, we’ve got a mutable\
    \ array behind the scenes.\n\nThe implementation is similarly straightforward:\n\
    \n```\n#import \"Garage.h\"\n\n@implementation Garage\n\n@synthesize name;\n\n\
    - (void) addCar: (Car *) car\n{\n    if (cars == nil)\n    {\n        cars = [[NSMutableArray\
    \ alloc] init];\n    }\n    [cars addObject: car];\n} // addCar\n\n- (void) dealloc\n\
    {\n    [name release];\n    [cars release];\n    [super dealloc];\n} // dealloc\n\
    \n- (void) print\n{\n    NSLog (@\"%@:\", name);\n```"
