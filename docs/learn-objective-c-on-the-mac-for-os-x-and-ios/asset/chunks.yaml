    构建该程序的另一种方法，是将所有名称完全移出代码，放入一个文本文件中，每行一个名称。让我们一起说：这就是间接性。程序不再将名称直接写在源代码中，而是从其他地方查找名称。程序从文本文件中读取名称列表，然后逐个打印出来及其长度。这个新程序的项目文件位于`03.06
    Word-Length-3`文件夹中，代码如下：


    ```

    #import <Foundation/Foundation.h>


    int main (int argc, const char * argv[])


    {


