    **提示** 如果您使用的是我们预构建的`Word-Length-3`项目，我们已经施展了一点 Xcode 魔法，自动为您将`words.txt`文件复制到了`/tmp`。看看您能否发现我们是怎么做的。这里有一个提示：查看“组与文件”面板中的“目标”区域。


    当您运行`Word-Length-3`时，程序输出看起来和之前一样：


