    Let’s try changing all of our `Car` classes to `Automobile` ones. Open `Car.h`
    in the editor, and put your insertion point in the word `Car`. Choose Edit ![image](images/9781430241881_arrow_fmt.jpg)
    Refactor ![image](images/9781430241881_arrow_fmt.jpg) Rename . . . . You’ll see
    a dialog like the one shown in [Figure 7-15](#9781430241881_Ch7.xhtml#_FIG15),
    where we’ve entered `Automobile` as the replacement for “Car.”


    ![9781430241881_Fig07-15.tif](images/9781430241881_Fig07-15_fmt.jpg)


    [Figure 7-15](#9781430241881_Ch7.xhtml#FIG15). Starting to refactor


    Xcode figures out what it will do after you click Preview and presents it to you
    as shown in [Figure 7-16](#9781430241881_Ch7.xhtml#_FIG16).


    ![9781430241881_Fig07-16.tif](images/9781430241881_Fig07-16_fmt.jpg)


    [Figure 7-16](#9781430241881_Ch7.xhtml#FIG16). Xcode telling us what it wants
    to do in the refactoring.


    You can see that Xcode will rename `Car.h` and `Car.m` to the corresponding Automobile-style
    names. You can click a source file to see what changes Xcode will make in the
    file merge viewer at the bottom of the window. Looking there, you’ll see that
    Xcode has changed “Car” to “Automobile” in the `#import`, as well as the class
    name in the proper places.


    After you review the changes, click Save. If this is the first time you have refactored
    code in this project, Xcode asks if you want to enable automatic snapshots. Saying
    yes is a good idea, because then if you make a big change and decide it’s less
    than awesome, falling back to your pre-refactoring version is easy.


    Sadly, refactoring does not rename things in comments, so end-of-class comments,
