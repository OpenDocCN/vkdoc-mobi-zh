- fmt: "\n现在我们已经处理完轮胎，将其释放：\n\n```\n[tire release];\n```\n\n这段代码假定`Car`正在正确地管理内存，安排保留该对象。请注意，[第6章](#9781430241881_Ch6.xhtml)中展示的`Car`并没有遵守我们的内存管理指南——那时我们还太年轻天真——但我们稍后会向你展示如何修复这个问题。\n\
    \n轮胎组装完成后，和之前一样创建一个新发动机，并将其放入汽车中：\n\n```\nEngine *engine = [[Slant6 alloc] init];\n\
    [car setEngine: engine];\n[engine release];\n```\n\n与轮胎一样，发动机也被释放，因为我们不再使用它了。由`Car`负责确保发动机被释放。\n\
    \n最后，`Car`被要求打印自身，然后被释放，因为我们不再需要它：\n\n```\n[car print];\n[car release];\n```\n\
    \n现在，自动释放池被释放，这会导致其引用计数归零，释放池本身，并向池中的每个对象发送`release`消息。此时，`Tire`的`description`方法生成的`NSString`对象被清理，`main`函数最终结束。但在运行程序之前，我们需要修复`Car`类，使其正确进行内存管理。不过首先，这里是在垃圾回收环境下`main`函数的典型写法：\n\
    \n```\nint main (int argc, const char * argv[])\n{\n    Car *car = [[Car alloc]\
    \ init];\n    for (int i = 0; i < 4; i++)\n    {\n        Tire *tire;\n      \
    \  tire = [[Tire alloc] init];\n        [tire setPressure: 23 + i];\n        [tire\
    \ setTreadDepth: 33 - i];\n        [car setTire: tire atIndex: i];\n    }\n  \
    \  Engine *engine = [[Slant6 alloc] init];\n    [car setEngine: engine];\n   \
    \ [car print];\n    return (0);\n} // main\n```\n\n如你所见，没有额外的内存管理调用，代码简洁了许多。\n\
    \n## 清理`Car`类\n\n与其在`Car`中使用普通的C数组，不如改用`NSMutableArray`。为什么？因为这样可以免费获得边界检查。为此，我们将`Car`类的`@interface`部分修改为使用可变数组（修改的行用粗体标注）：\n\
    \n```\n#import <Cocoa/Cocoa.h>\n@class Tire;\n@class Engine;\n\n@interface Car\
    \ : NSObject\n{\n    NSMutableArray *tires;\n    Engine *engine;\n}\n\n- (void)\
    \ setEngine: (Engine *) newEngine;\n- (Engine *) engine;\n- (void) setTire: (Tire\
    \ *) tire atIndex: (int) index;\n- (Tire *) tireAtIndex: (int) index;\n- (void)\
    \ print;\n\n@end // Car\n```\n\n我们升级了`Car`的几乎每个方法，使其遵循内存管理规则。先从`init`开始：\n\n```\n\
    - (id) init\n{\n    if (self = [super init])\n    {\n        tires = [[NSMutableArray\
    \ alloc] init];\n        for (int i = 0; i < 4; i++)\n        {\n            [tires\
    \ addObject: [NSNull null]];\n        }\n    }\n    return (self);\n} // init\n\
    ```\n\n你已经见过`self = [super init]`无数次了；几乎背下来了。现在你应该知道，这只是确保父类正确初始化对象。\n\n接下来，我们创建一个`NSMutableArray`。`NSMutableArray`有一个方便的方法`replaceObjectAtIndex:withObject:`，非常适合实现`setTire:atIndex:`。要使用`replaceObjectAtIndex:withObject:`，我们需要在给定索引处有一个对象以供替换。全新的`NSMutableArray`没有任何内容，因此我们需要一个占位对象。`NSNull`非常适合这种场景。于是在数组中放入四个`NSNull`对象（你第一次见到它是在[第8章](#9781430241881_Ch8.xhtml)）。一般来说，你不需要用`NSNull`预填充`NSMutableArray`，但在本例中，这样做会让后续操作更简单。\n\
    \n在`init`的末尾，我们返回`self`，因为这是我们刚刚初始化完成的对象。\n\n接下来是发动机的存取器方法：`setEngine:`和`engine`。`setEngine:`使用了我们之前展示的“保留传入对象并释放当前对象”技术：\n\
    \n```\n- (void) setEngine: (Engine *) newEngine\n{\n    [newEngine retain];\n\
    \    [engine release];\n    engine = newEngine;\n} // setEngine\n```\n\n而`engine`存取器方法直接返回当前的发动机：\n\
    \n```\n- (Engine *) engine\n{\n    return (engine);\n} // engine\n```\n\n现在来实现轮胎的存取器。首先是设置方法：\n\
    \n```\n- (void) setTire: (Tire *) tire atIndex: (int) index\n{\n"
  raw: 'Now that we’re done with the tire, we release it:


    [tire release];


    This code assumes that Car is doing the right memory management thing, arranging
    to retain the object. Note that the Car as shown in [Chapter 6](#9781430241881_Ch6.xhtml)
    doesn’t follow our memory management guidelines—we were so young and naive then—but
    we’ll show you how to fix that in a little while.


    After the tires are assembled, a new engine is created, just as before, and the
    engine is placed in the car:


    Engine *engine = [[Slant6 alloc] init];


    [car setEngine: engine];


    [engine release];


    As with the tires, the engine is released, because we’re done using it. It’s up
    to the Car to make sure the engine gets deallocated.


    Finally, the Car is told to print itself out, and the Car is released because
    we’re done with it:


    [car print];


    [car release];


    Now the autorelease pool gets released, which causes its retain count to go to
    0, deallocates the pool, and sends the release message to every object in the
    pool. When this happens, the NSStrings generated by the Tire description method
    get cleaned up, and then main ends, at last. But before we can run the program,
    we need to fix up the Car class so that it handles its memory management correctly.
    But first, here’s what main would look like in a garbage-collected world:


    int main (int argc, const char * argv[])


    {


    Car *car = [[Car alloc] init];


    for (int i = 0; i < 4; i++)


    {


    Tire *tire;


    tire = [[Tire alloc] init];


    [tire setPressure: 23 + i];


    [tire setTreadDepth: 33 - i];


    [car setTire: tire atIndex: i]; }


    Engine *engine = [[Slant6 alloc] init];


    [car setEngine: engine];


    [car print];


    return (0);


    } // main


    As you can see, it’s a fair bit shorter and simpler without the extra memory management
    calls.


    Cleaning Up the Car


    Instead of using a regular C array in Car, let’s use an NSMutableArray. Why? Because
    that will give us bounds checking for free. To do this, we’ll change the @interface
    section of the Car class to use a mutable array (the changed line of code is in
    bold):


    #import <Cocoa/Cocoa.h>


    @class Tire;


    @class Engine;


    @interface Car : NSObject


    {


    NSMutableArray *tires;


    Engine *engine;


    }


    - (void) setEngine: (Engine *) newEngine;


    - (Engine *) engine;


    - (void) setTire: (Tire *) tire


    atIndex: (int) index;


    - (Tire *) tireAtIndex: (int) index;


    - (void) print;


    @end // Car


    We’ve upgraded pretty much every method of Car to follow the memory management
    rules. Let’s start with init:


    - (id) init


    {


    if (self = [super init])


    {


    tires = [[NSMutableArray alloc] init];


    for (int i = 0; i < 4; i++)


    {


    [tires addObject: [NSNull null]];


    }


    }


    return (self);


    } // init


    You’ve seen self = [super init] a bajillion times already; you’ve practically
    memorized it. As you know by now, it just makes sure that the superclass gets
    the object up and running.


    Next, we create an NSMutableArray. There’s a handy NSMutableArray method called
    replaceObjectAtIndex:withObject: that’s perfect for implementing setTire:atIndex:.
    To use replaceObjectAtIndex:withObject:, we need to have an object at the given
    index so it can be replaced. A fresh NSMutableArray doesn’t have any contents,
    so we need some object as a placeholder. NSNull is great for that kind of thing.
    So, we put four NSNull objects (which you first saw in [Chapter 8](#9781430241881_Ch8.xhtml))
    into the array. In general, you don’t have to prepack your NSMutableArrays with
    NSNulls, but in this case, doing so makes things a little easier later on.


    At the end of init, we return self, because that’s the object we just finished
    initializing.


    Next come the accessor methods for the engine. These are setEngine: and engine.
    setEngine: uses the “retain the object passed in and release the current object”
    technique that we showed earlier:


    - (void) setEngine: (Engine *) newEngine


    {


    [newEngine retain];


    [engine release];


    engine = newEngine;


    } // setEngine


    And the engine accessor method simply returns the current engine:


    - (Engine *) engine


    {


    return (engine);


    } // engine


    Now let’s do the tire accessors. First comes the setter:


    - (void) setTire: (Tire *) tire


    atIndex: (int) index


