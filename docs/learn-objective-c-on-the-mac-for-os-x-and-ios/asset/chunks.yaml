- fmt: 'Time for our obligatory memory management check: is everything groovy? You
    betcha. Both of the new objects that are created (the original and uppercase strings)
    come from methods that are not `alloc`, `copy`, or `new`, so they’re in the autorelease
    pool and will get cleaned up. It’s the responsibility of `setStringValue:` to
    either copy or retain the incoming string. What `setStringValue:` does is its
    own business. But we know our memory management is correct.


    `lowercase:` is just like `uppercase:`, but on the down-low.


    ```

    - (IBAction) lowercase: (id) sender {


    NSString *original = [_textField stringValue];


    NSString *lowercase = [original lowercaseString];


    [_resultsField setStringValue:lowercase];


    } // lowercase

    ```


    And that’s it! When you run the program, you’ll see the window appear. Type a
    string, and change its case, just like in [Figure 16-18](#9781430241881_Ch16.xhtml#_FIG18).


