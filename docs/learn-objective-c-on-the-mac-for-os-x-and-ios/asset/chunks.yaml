  raw: 'The easiest way to add a task to a queue is via a block. The block must be
    of type dispatch_block_t, which is defined as taking no arguments and returning
    no results:


    typedef void (^dispatch_block_t)(void)


    Let’s add our async block. It’s a function that takes two arguments, the queue
    and the block, respectively.


    dispatch_async(_serial_queue, ^{ NSLog(@"Serial Task 1"); });


    If you prefer, you can define a block ahead of time, instead of inline.


    dispatch_block_t myBlock = ^{ NSLog(@"My Predfined block"); };


    dispatch_async(_serial_queue, myBlock);


    To add the function synchronously instead, use dispatch_sync.


    As we said earlier, we can also add a function to the queue. The prototype for
    the function must be as follows:


    void function_name(void *argument)


    Here’s an example function:


    void myDispatchFuction(void *argument)


    {


    NSLog(@"Serial Task %@", (__bridge NSNumber *)argument);


    NSMutableDictionary *context = (__bridge NSMutableDictionary *)


    dispatch_get_context(dispatch_get_current_queue());


    NSNumber *value = [context objectForKey:@"value"];


    NSLog(@"value = %@", value);


    }


    Next, we need to add this function to the queue. The dispatch function takes three
    arguments: the queue, any context you need to pass, and the function. If you don’t
    need to send extra information to the function, you can just pass NULL.


    dispatch_async_f(_serial_queue, (__bridge void *)[NSNumber numberWithInt:3],


    (dispatch_function_t)myDispatchFuction);


    As soon as the queue is created, it’s ready and waiting for tasks. When we add
    a task, the queue schedules it. To add to the queue synchronously instead, call
    dispatch_sync_f.


    If you want to stop the queue for any reason, call dispatch_suspend() and pass
    the queue.


    dispatch_suspend(_serial_queue);


    Once you have suspended the queue, you can resume it by calling dispatch_resume().
    You are the master of time and space.


    dispatch_resume(_serial_queue);


    Operation Queues


    You probably noticed that this stuff is pretty low level. Whatever happened to
    Objective-C, you might ask? Weren’t you recently reading a book about that language?
    In fact, there are APIs, called **operations**, at the Objective-C level that
    make working with queues somewhat easier.


    To use operations, you first create an operation object; then, you assign it to
    the operation queue, and let the queue execute it. There are three ways to create
    operations:


    *   ![image](images/9781430241881_square_fmt.jpg)  NSInvocationOperation: Use
    this when you already have a class that does your work, and you want to perform
    it on a queue.

    *   ![image](images/9781430241881_square_fmt.jpg)  NSBlockOperation: This is just
    like calling dispatch_async with a block of code to execute.

    *   ![image](images/9781430241881_square_fmt.jpg)  *Your custom operation*: If
    you need more flexibility in operation types, you can get fancy and create your
    own custom type. You must define your operation by subclassing NSOperation.


    We’ll spend some time and ink (or electrons, for you eBook readers) discussing
    each of these techniques.


    Creating an Invocation Operation


    NSInvocationOperation invokes a selector for your class that performs your work.
    That’s why this is handy if you already have a class built with selectors (see
    *14.12 Objective Queue*).


    @implementation MyCustomClass


    - (NSOperation *)operationWithData:(id)data


    {


    return [[NSInvocationOperation alloc] initWithTarget:self


    selector:@selector(myWorkerMethod:) object:data];


    }


    // This is the method that does the actual work


    - (void)myWorkerMethod:(id)data


    {


    NSLog(@"My Worker Method %@", data);


    }


    @end


    Once you add the operation to the queue and the task is ready to be executed,
    the myWorkerMethod: method of the class will be called.


    Creating a Block Operation


    If you have block of code that you want to execute on the queue, you can create
    this operation and have the queue run it.


    NSBlockOperation *blockOperation =


    [NSBlockOperation blockOperationWithBlock:^{


    // Do my work


    }];


    The blocks for these operations are of the same type that we used in dispatch
    queues.

    Once you have created a block operation with your first block, you can add more
    blocks

    using the addExecutionBlock: method. Depending on the queue type (serial or concurrent)

    the blocks will run in serial or parallel, respectively.


    [blockOperation addExecutionBlock:^{


    // do some more work


    }];


    **Adding Operations to the Queue**


    Once you have created an operation, you need to add blocks to the queue. Instead
    of using dispatch_queue_t as in the previous section, this time, we’ll use NSOperationQueue.
    NSOperationQueue always executes operations concurrently. It also takes dependencies
    into account, so if one operation depends on the another, they will execute accordingly.


    If you want to make sure you always execute your operation serially, you can set
    the maximum concurrent operations to 1 and tasks will execute in FIFO order. Before
    you can add an operation to a queue, you need a way to refer to that queue. You
    can create a queue or use one of the predefined queues, such as the current queue:


    NSOperationQueue *currentQueue = [NSOperationQueue currentQueue];


    or the main queue:


    NSOperationQueue *mainQueue = [NSOperationQueue mainQueue];


    Here’s how we create a queue of our very own:


    NSOperationQueue *_operationQueue = [[NSOperationQueue alloc] init];


    Now that we have a queue, we can use addOperation: to add an operation:


    [theQueue addOperation:blockOperation];


    Or we can add a block to execute instead of creating an operation object:


    [theQueue addOperationWithBlock:^{


    NSLog(@"My Block");


    }];


    Once you add the operation to the queue, it will be scheduled and executed.


    Summary


    In this chapter, we presented blocks, a relatively recent addition to Objective-C
    that enhances what you can do with functions. Blocks let you bind variables to
    functions to create objects you can use in your programs. Blocks are especially
    useful for implementing concurrency.


    The topic of concurrency is vast and complicated. In this chapter, we described
    some of the concurrency features available to your programs in OS X and iOS.


    Apple’s Grand Central Dispatch (GCD) feature provides a way for your apps to use
    concurrency without having to spend all your time programming at the low levels
    of the system. You should experiment with GCD and other concurrent programming
    features to find out what’s possible for your apps and what you’re comfortable
    doing.


    As your skills evolve and as Apple adds more tools, your apps will be able to
    do more tasks in parallel, which will make them more responsive. However, there’s
    always a point of diminishing returns at which the cost (in extra time spent coding
    and debugging) of adding parallel processing to your apps outweighs the benefits.


    As you work more with concurrent tasks, heed warnings about creating deadlocks
    (tasks that depend on each other and so can never finish) and other bad bugs.
    These are things that you probably don’t want to happen.


    Chapter 15


    Introduction to UIKit


    So far, we have had a lot of fun learning about writing apps for OS X, the Mac
    operating system. But enough of that Mac stuff for a while. It’s time to switch
    gears and take a look at how to write an app for iOS. Just as Mac apps use AppKit,
    iOS apps use UIKit. It has all the UI components and goodness that make iOS apps
    what they are.


    iOS doesn’t have command-line access, so we can’t create a command-line tool as
    we did for OS X. Instead, we’ll start by duplicating the CaseTool program we wrote
    for OS X in [Chapter 14](#9781430241881_Ch14.xhtml). You don’t even need an iOS
    device to do this exercise. All you need is Xcode with the iOS SDK, which installs
    by default when you get Xcode from the Mac App Store.


