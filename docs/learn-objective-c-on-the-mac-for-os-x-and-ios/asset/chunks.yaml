    \ Activate Console, or by using the keyboard shortcut ![image](images/Rangoli.jpg)`R`.\
    \ You should see output like the following:\n\n```\n2012-01-20 16:47:09.528 02\
    \ BOOL Party[16991:10b] are 5 and 5 different? NO\n2012-01-20 16:47:09.542 02\
    \ BOOL Party[16991:10b] are 23 and 42 different? YES\n\nThe Debugger has exited\
