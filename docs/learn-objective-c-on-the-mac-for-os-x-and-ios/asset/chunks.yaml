    and drag one to the view under the text field and label. Once the button is there,
    adjust its size and layout to match the text field’s width, as in [Figure 15-10](#9781430241881_Ch15.xhtml#_FIG10).


    ![9781430241881_Fig15-10.tif](images/9781430241881_Fig15-10_fmt.jpg)


    [Figure 15-10](#9781430241881_Ch15.xhtml#FIG10). We’ve added a wide round rect
    button. Round rects are everywhere!


    Now double-click the round rect button to give it a title. We shall call it UpperCase
    (see [Figure 15-11](#9781430241881_Ch15.xhtml#_FIG11)).


    ![9781430241881_Fig15-11.tif](images/9781430241881_Fig15-11_fmt.jpg)


