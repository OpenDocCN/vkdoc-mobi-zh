- fmt: '# Autorelease Pools


    `Autorelease` pools are kept as a stack: if you make a new `autorelease` pool,
    it gets added to the top of the stack. An `autorelease` message puts the receiver
    into the topmost pool. If you put an object into a pool, and then make a new pool
    and destroy it, the autoreleased object will still be around, because the pool
    holding that object is still in existence.


    The `keyword` method will not work here, because it has to be balanced using braces.


    # Take Out Those Papers and the Trash


    Objective-C 2.0 introduced automatic memory management, also called garbage collection.
    Programmers used to languages like Java or Python are well acquainted with the
    concept of garbage collection. You just create and use objects and then, shockingly,
    forget about them. The system automatically figures out what’s still being used
    and what can be recycled. Turning on garbage collection is very easy, but it’s
    an opt-in feature. Just go to the Build Settings of the project information window,
    and choose `Required [-fobjc-gc-only]`, as shown in [Figure 9-1](#9781430241881_Ch9.xhtml#_FIG1).


    ![9781430241881_Fig09-01.tif](images/9781430241881_Fig09-01_fmt.jpg)


    [Figure 9-1](#9781430241881_Ch9.xhtml#FIG1). Enabling garbage collection


    **Note**: `-fobjc-gc` is for code that supports both garbage collection and `retain/release`,
    such as library code that can be used in both environments.


    When you enable garbage collection, the usual memory management calls all turn
    into no-op instructions; that’s a fancy way of saying they don’t do anything.


    The Objective-C garbage collector is a generational garbage collector. Newly created
    objects are much more likely to turn into garbage than objects that have been
    hanging around for a while. At regular times, the garbage collector starts looking
    at your variables and objects and follows the pointers between them. Any object
    it discovers without anything pointing to it is garbage, which is fit to be thrown
    away. The worst thing you can do is keep a pointer to an object that you’re finished
    with. So if you point to an object in an instance variable (recall composition),
    be sure to assign `nil` to your instance variable, which removes your reference
    to this object and lets the garbage collector know it can be purged.


    Like the `autorelease` pool, garbage collection is triggered at the end of an
    event loop. You can also trigger garbage collection yourself if you’re not in
    a GUI program, but that’s beyond the scope of what we want to talk about here.


    With garbage collection, you don’t need to worry too much about memory management.
    There are some subtle nuances when using memory received from the `malloc` function
    or with Core Foundation objects, but they’re obscure enough that we won’t be covering
    them. For now, you can just create objects and not worry about releasing them.
    We’ll be discussing garbage collection as we go along.


    Note that garbage collection is only for OS X programming; you can’t use it for
    iOS apps. In fact, in iOS programming, Apple recommends you avoid using `autorelease`
    in your own code and that you also avoid convenience methods that give you autoreleased
    objects.


    Typically, convenience methods are class methods that return a new object. For
    example, for `NSString`, all the methods that start with `stringWith` are convenience
    methods.


    # Automatic Reference Counting


    What’s the deal with no garbage collection in iOS? The main argument against garbage
    collection in iOS is that you don’t know exactly when the garbage collector is
    going to show up. Just like in real life, you might know that your garbage will
    be picked up on Monday, but you’re never sure of the exact time. What if you’re
    trying to leave your house right when the garbage truck shows up? Garbage collection
    can have a big impact on the usability of a mobile device, which is more personal
    than a computer and typically has far more modest resources than a computer. Users
    don’t want to have a game or phone call pause while the system cleans up memory.


    Apple’s solution is called `automatic reference counting (ARC)`. As the name suggests,
    `ARC` keeps track of your objects and decides which ones you meant to keep and
    which ones you didn’t. It’s a little like having a butler or personal assistant
    in your memory management. When you use `ARC`, you allocate and use objects as
    you would normally, and the compiler inserts the retains and releases for you
    – you don’t put them in yourself.


    `ARC` is *not* a garbage collector. As we’ve already discussed, garbage collection
    does its work at runtime, via code that runs and checks your objects periodically.
    In contrast, `ARC` does its thing at compile time. It inserts the proper retains
    and releases, so memory management happens as it would in well-written manually
    managed code. But instead of you having to do the memory management, the compiler
    does it for you. When the program runs, retains and releases happen as they should.
    The system doesn’t know or care whether these commands were inserted by you or
    by the compiler.


    `ARC` is an opt-in feature, which means you must explicitly enable or disable
    it.


    Here are the pieces you need for writing `ARC` code:


    - Xcode 4.2+

    - ![image](images/9781430241881_square_fmt.jpg) Apple LLVM 3.0+ compiler (which
    comes with Xcode)

    - OS X 10.7+


    And here’s what you need to run your code:


    - ![image](images/9781430241881_square_fmt.jpg) iOS 4.0+ or OS X 10.6+ with 64-bit
    runtime

    - ![image](images/9781430241881_square_fmt.jpg) Zeroing weak references (more
    on this later) requires iOS 5.0+ or OS X 10.7+


    **Note**: `ARC` only works with retainable object pointers (ROPs). There are three
    kinds of retainable object pointers:


    1. Block pointers

    2. Objective-C object pointers

    3. Typedefs marked with `__attribute__((NSObject))`


    We’ll talk a lot more about ROPs later in this chapter, especially while describing
    Xcode’s `ARC` conversion tool.


    All other pointer types, such as `char *` and CF objects such as `CFStringRef`,
    are not ARC compatible.


    If you use pointers that aren’t handled by `ARC`, you’ll have to manage them yourself.
    That’s OK, because `ARC` interoperates with manually managed memory.


    If you want to use `ARC` in your code, you must meet three requirements:


    - ![image](images/9781430241881_square_fmt.jpg) You must be able to reliably identify
    which objects are to be managed.

    - ![image](images/9781430241881_square_fmt.jpg) You must be able to indicate how
    to manage an object.

    - ![image](images/9781430241881_square_fmt.jpg) You must have a reliable way of
    passing ownership of an object.


    Let’s deal with these one at a time. The first requirement means that a root-level
    object of collections of objects must know how to manage its child objects. For
    example, let’s say you have an array of strings created with `malloc`:


    ```

    NSString **myString;

    myString = malloc(10 * sizeof(NSString *));

    ```


    This code creates a C array that points to ten strings. Because C arrays are not
    retainable, you can’t use `ARC` on this structure.


    This leads to the second requirement. This requirement usually means you must
    be able to increment and decrement the retain count on an object, which pretty
    much means anything that is derived from `NSObject` is cool. This category includes
    most of the objects you’ll need to manage.


    The third requirement states that when passing around an object, your program
    needs to be able to pass ownership of the object between the caller and the callee—more
    about that later.


    With all of those restrictions, you might be asking yourself, do I really need
    to bother with using `ARC`? The answer is yes, absolutely! We guarantee it will
    save you aggravation and time in the long run.


    # Sometimes Weak Is Good'
