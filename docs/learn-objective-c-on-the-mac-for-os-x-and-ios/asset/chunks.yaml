    the dictionary and then use this modified dictionary to change the other pictures
    using setValuesForKeysWithDictionary. If you design your user interface classes
    the right way, you can use the same lift and stamp panel with disparate things
    like photos, cars, and recipes.


    You might wonder what happens with nil values, such as a car with no name, because
    dictionaries can’t contain nil values. Think back to [Chapter 7](#9781430241881_Ch7.xhtml),
    where [NSNull null] is used to represent nil values. The same thing happens here.
    For a no-name car, [NSNull null] will be returned under the @"name" when you call
    dictionaryWithValuesForKeys, and you can supply [NSNull null] for a setValuesForKeysWithDictionary
    to do the same, but in reverse.


    The Nils Are Alive


    This discussion of nil values brings up an interesting question. What does “nil”
    mean for a scalar value, like for mileage. Is it zero? Is it –1? Is it pi? There’s
    no way for Cocoa to know. You can try like this:


    [car setValue: nil forKey: @"mileage"];


    But Cocoa gives you the smack-down:


    ''[<Car 0x105740> setNilValueForKey]: could not set nil as the value for the key
    mileage.'''
  trans: "\n# 关键路径与运算符\n\n关键路径不仅能引用对象值，还可以嵌入运算符来实现诸如获取数组平均值、返回最大值和最小值等操作。\n\n例如，下面展示了如何统计汽车数量：\n\
    \n```\nNSNumber *count;\ncount = [garage valueForKeyPath: @\"cars.@count\"];\n\
    NSLog (@\"我们有 %@ 辆车\", count);\n```\n\n运行后输出：\n\n```\n我们有 7 辆车\n```\n\n让我们拆解这个关键路径\
    \ `\"cars.@count\"`。`cars` 表示从 `garage` 获取 `cars` 属性，我们知道它是一个 `NSArray`。当然，它实际上是\
    \ `NSMutableArray`，但如果不需要修改，我们可将其视为 `NSArray`。接下来的 `@count` 中，@符号预示着某种魔法即将发生。对编译器而言，`@\"\
    blah\"` 是字符串，`@interface` 是类的声明。在这里，`@count` 告诉 KVC 机制计算关键路径左侧部分的结果数量。\n\n我们还可以对特定值求和，比如车队行驶的总里程。以下代码：\n\
    \n```\nNSNumber *sum;\nsum = [garage valueForKeyPath: @\"cars.@sum.mileage\"];\n\
    NSLog (@\"总里程为 %@ 英里\", sum);\n```\n\n输出：\n\n```\n总里程为 601320.6 英里\n```\n\n这个距离足够从地球往返月球，还富余一些里程。\n\
    \n那么这是如何工作的？`@sum` 运算符将关键路径分为两部分。第一部分是通向某个对多关系的路径，此处为 `cars` 数组。第二部分则像中间包含对多关系的普通关键路径，会被应用于关系中的每个对象。因此\
    \ `mileage` 会被发送到 `cars` 描述的每个对象，并将结果值相加。当然，这些关键路径都可以是任意长度的。\n\n如果想计算每辆车的平均里程，可以用总和除以数量。但有个更简单的方法——以下代码：\n\
    \n```\nNSNumber *avgMileage;\navgMileage = [garage valueForKeyPath: @\"cars.@avg.mileage\"\
    ];\nNSLog (@\"平均里程为 %.2f\", [avgMileage floatValue]);\n```\n\n输出：\n\n```\n平均里程为\
    \ 85902.95\n```\n\n很简单吧？如果没有这些键值编码的便利功能，我们得写一个循环遍历汽车（假设能获取到 `garage` 的 `cars`\
    \ 数组），向每辆车询问 `mileage`，累加求和，再除以车辆总数——虽然不难，但仍需编写一小段代码。\n\n这次使用的关键路径是 `\"cars.@avg.mileage\"\
    `。与 `@sum` 类似，`@avg` 运算符也将关键路径分为两部分：前面部分（此处为 `cars`）是到汽车对多关系的路径，`@avg` 后的部分是另一个关键路径，即\
    \ `mileage`。在底层，KVC 会愉快地执行循环、累加值、计数并完成除法运算。\n\n还有 `@min` 和 `@max` 运算符，它们的作用显而易见：\n\
    \n```\nNSNumber *min, *max;\nmin = [garage valueForKeyPath: @\"cars.@min.mileage\"\
    ];\nmax = [garage valueForKeyPath: @\"cars.@max.mileage\"];\nNSLog (@\"最小/最大里程:\
    \ %@ / %@\", min, max);\n```\n\n结果如下：\n\n```\n最小/最大里程: 28123.4 / 217036.7\n```\n\
    \n## KVC 并非免费午餐\n\nKVC 让集合操作变得非常简单。那么为什么不全面使用 KVC，而放弃访问器方法和手写代码呢？天下没有免费的午餐，除非你在某些激进的硅谷科技公司工作。KVC\
    \ 必然更慢，因为它需要解析字符串来确定你的需求。同时编译器也无法进行错误检查。如果你误写为 `karz.@avg.millage`，编译器无法识别这是个错误的关键路径，运行时才会报错。\n\
    \n有时你会遇到取值有限的属性，比如所有汽车的品牌。即使有百万辆车，品牌种类也很有限。通过关键路径 `\"cars.@distinctUnionOfObjects.make\"\
    ` 可以获取不重复的品牌列表：\n\n```\nNSArray *manufacturers;\nmanufacturers = [garage valueForKeyPath:\
    \ @\"cars.@distinctUnionOfObjects.make\"];\nNSLog (@\"制造商: %@\", manufacturers);\n\
    ```\n\n运行上述代码后输出：\n\n```\n制造商: (\n    Honda,\n    Plymouth,\n    Pontiac,\n  \
    \  Acura\n)\n```\n\n路径中那个名称骇人的运算符 `\"@distinctUnionOfObjects\"` 名副其实。它与其他运算符逻辑相同：获取左侧指定的集合，对集合中每个对象应用右侧的关键路径，然后将结果值组成新集合。名称中的\
    \ \"union\" 表示取多个对象的并集，\"distinct\" 表示去除重复项。还有几个类似运算符，留给读者自行探索。另外，你无法自定义运算符，这很遗憾。\n\
    \n## 批量处理人生\n\nKVC 提供两个调用方法支持批量修改对象。第一个是 `dictionaryWithValuesForKeys:`：传入字符串数组，该方法会使用\
    \ `valueForKey:` 获取每个键的值，并构建包含键字符串和对应值的字典。\n\n让我们从车库中选一辆车，获取其部分属性的字典：\n\n```\n\
    car = [[garage valueForKeyPath: @\"cars\"] lastObject];\nNSArray *keys = [NSArray\
    \ arrayWithObjects: @\"make\", @\"model\",\n                 @\"modelYear\", nil];\n\
    NSDictionary *carValues = [car dictionaryWithValuesForKeys: keys];\nNSLog (@\"\
    汽车属性: %@\", carValues);\n```\n\n运行后输出 Paper Car 的信息：\n\n```\n汽车属性: {\n    make\
    \ = Plymouth;\n    model = Valiant;\n    modelYear = 1965;\n}\n```\n\n我们可以修改这些值，将\
    \ Valiant 变成一辆（姑且认为）升级版新车——Chevy Nova：\n\n```\nNSDictionary *newValues =\n   \
    \ [NSDictionary dictionaryWithObjectsAndKeys:\n     @\"Chevy\", @\"make\",\n \
    \    @\"Nova\", @\"model\",\n     [NSNumber numberWithInt:1964], @\"modelYear\"\
    ,\n     nil];\n[car setValuesForKeysWithDictionary: newValues];\nNSLog (@\"更新后的车辆信息:\
    \ %@\", car);\n```\n\n执行这些代码后，我们看到它确实变成了一辆新车：\n\n```\n更新后的车辆信息: Paper Car, 一辆\
    \ 1964 年款 Chevy Nova, 有 2 个车门, 76800.0 英里里程, 4 个轮胎.\n```\n\n注意某些值已更改（`make`、`model`\
    \ 和年份），但其他值（如名称和里程）保持不变。\n\n这个工具在本程序中并非必不可少，但它能在用户界面代码中实现一些巧妙技巧。例如，你可以实现类似 Apple\
    \ Aperture 的\"吸取与盖印\"工具，允许将部分修改（而非全部）从一张图片应用到其他图片。你可以使用 `dictionaryWithValuesForKeys`\
    \ 提取所有属性，让字典内容驱动用户界面显示。用户可移除字典中的某些项，再使用 `setValuesForKeysWithDictionary` 将修改后的字典应用到其他图片。如果以正确方式设计用户界面类，同一个吸取/盖印面板就能适用于照片、汽车、菜谱等不同对象。\n\
    \n你可能会好奇 `nil` 值如何处理（比如没有名称的车辆），因为字典不能包含 `nil` 值。回想第 7 章，`[NSNull null]` 用于表示\
    \ `nil` 值。这里也是如此。对于无名汽车，调用 `dictionaryWithValuesForKeys` 时，`@\"name\"` 对应的值将是\
    \ `[NSNull null]`；反之，你也可以在 `setValuesForKeysWithDictionary` 中传入 `[NSNull null]`\
    \ 实现相同效果。\n\n## nil 值依然存在\n\n关于 `nil` 值的讨论引出了一个有趣的问题：对于标量值（如里程），\"nil\" 代表什么？是零？-1？π？Cocoa\
    \ 无法判断。你可以尝试如下操作：\n\n```\n[car setValue: nil forKey: @\"mileage\"];\n```\n\n但\
    \ Cocoa 会给出警告：\n\n```\n'[<Car 0x105740> setNilValueForKey]: could not set nil\
    \ as the value for the key mileage.'\n```\n\n"
- fmt: "# 解决此问题\n\n要解决此问题，请重写`*18.01 Car-Value-Garaging.m*`中的`-setNilValueForKey:`方法，并提供合理的逻辑。我们将做出一个执行决策：`nil`里程数意味着将汽车里程数归零，而不是使用像`-1`这样的其他值：\n\
    \n```\n- (void) setNilValueForKey: (NSString *) key\n{\n    if ([key isEqualToString:\
    \ @\"mileage\"])\n    {\n        mileage = 0;\n    } else {\n        [super setNilValueForKey:\
    \ key];\n    }\n} // setNilValueForKey\n```\n\n请注意，如果我们遇到意外的键，我们会调用父类方法。这样，如果有人试图对我们不理解的键使用键值编码，调用者将收到适当的抱怨。通常，除非有罕见且充分的理由不这样做（例如故意避免某个特定操作），否则在重写时始终调用父类方法。\n\
    \n# 处理未处理的键\n\n我们键值之旅（三小时之旅？）的最后一站是处理未定义的键。如果你曾尝试过KVC并输错了键，你可能会看到这样的信息：\n\n```\n\
    '[<Car 0x105740> valueForUndefinedKey:]: this class is not key value coding-compliant\
    \ for the key garbanzo.'\n```\n\n这基本上是说Cocoa无法理解你使用该键的含义，因此它放弃了。\n\n如果你仔细观察错误消息，你会发现它提到了`valueForUndefinedKey:`方法。正如你可能猜到的，我们可以通过重写此方法来处理未定义的键。你还可以猜到，有一个对应的`setValue:forUndefinedKey:`方法，用于当你尝试使用未知键更改值时。\n\
    \n如果KVC机制无法找到执行其魔法的途径，它会回退并询问该类该怎么做。默认实现只是像你之前看到的那样“摊手”。不过，我们可以改变这种行为。让我们将`Garage`变成一个非常灵活的对象，允许我们设置和获取任何键。我们首先添加一个可变字典：\n\
    \n```\n@interface Garage : NSObject\n{\n    NSString *name;\n    NSMutableArray\
    \ *cars;\n    NSMutableDictionary *stuff;\n}\n… @end // Garage\n```\n\n接下来，我们添加`valueForUndefinedKey:`方法：\n\
    \n```\n- (void) setValue: (id) value forUndefinedKey: (NSString *) key\n{\n  \
    \  if (stuff == nil)\n    {\n        stuff = [[NSMutableDictionary alloc] init];\n\
    \    }\n    [stuff setValue: value forKey: key];\n} // setValueForUndefinedKey\n\
    \n- (id) valueForUndefinedKey:(NSString *)key\n{\n    id value = [stuff valueForKey:\
    \ key];\n    return (value);\n} // valueForUndefinedKey\n```\n\n并在`-dealloc`中释放字典。\n\
    \n现在，你可以通过向`*18.01 Car-Value-Garaging.m*`添加代码，在车库上设置任意值：\n\n```\n[garage setValue:\
    \ @\"bunny\" forKey: @\"fluffy\"];\n[garage setValue: @\"greeble\" forKey: @\"\
    bork\"];\n[garage setValue: [NSNull null] forKey: @\"snorgle\"];\n[garage setValue:\
    \ nil forKey: @\"gronk\"];\n```\n\n并获取它们：\n\n```\nNSLog (@\"values are %@ %@ %@\
    \ and %@\", [garage valueForKey: @\"fluffy\"], [garage valueForKey: @\"bork\"\
    ], [garage valueForKey: @\"snorgle\"], [garage valueForKey: @\"gronk\"]);\n```\n\
    \n这个`NSLog`会打印出：\n\n```\nvalues are bunny greeble <null> and (null)\n```\n\n注意`<null>`和`(null)`之间的区别。`<null>`是一个`[NSNull\
    \ null]`对象，而`(null)`是一个真正的`nil`值，我们得到它是因为`\"gronk\"`不在字典中。还要注意，我们在使用`stuff`字典时使用了KVC方法`setValue:forKey:`。使用此方法允许调用者传入`nil`值，而无需我们在代码中检查它。`NSDictionary`的`setObject:forKey:`在传入`nil`时会报错，而`setValue:forKey:`在字典上使用`nil`值则会从字典中移除该键。\n\
    \n# 总结\n\n键值编码包含的内容远多于我们在本章所能覆盖的，但现在你应该有一个坚实的基础来探索KVC的其他方面。你已经看到了使用单个键设置和获取值的示例，其中KVC会查找setter和getter方法来完成你的请求。如果找不到任何方法，KVC会直接深入对象内部并更改值。\n\
    \n你还了解了键路径，它们是点分隔的键，指定了通过对象网络的路径。这些键路径可能看起来很像在访问属性，但实际上它们是截然不同的机制。你可以在键路径中插入各种运算符，让KVC为你执行额外的工作。最后，我们研究了几个你可以重写以自定义边界情况行为的方法。\n\
    \n接下来，我们将了解Xcode的静态分析器。\n\n# 第19章 使用静态分析器\n\n当你构建应用程序时，大多数编译器可以检测看起来可疑的代码并发出警告，指示可能在运行时变成错误的代码。为了超越这种警告，几年前，Apple在Xcode\
    \ 3.2版本中添加了一个**静态分析器**。静态分析器是一种在不实际运行代码的情况下逻辑检查代码的工具，寻找可能变成错误的缺陷。在本章中，我们将了解如何使用静态分析器来发现代码中的问题。\n\
    \n## 开始静态分析\n\n静态分析器是做什么的？它是如何工作的？静态分析器非常了解Objective-C程序应该如何工作，然后根据这些知识检查你的程序。它不仅仅查看你的源代码；它实际上会在应用程序中的代码路径中移动，寻找逻辑错误，然后将这些错误报告给你。你可以在构建和运行之前修复它们。\n\
    \n静态分析器可以发现各种类型的错误：\n\n*   ![image](images/9781430241881_square_fmt.jpg) 安全问题，例如内存泄漏和缓冲区溢出\n\
    *   ![image](images/9781430241881_square_fmt.jpg) 并发问题，例如竞态条件（当两个或多个任务可能因时序问题而失败时）\n\
    *   ![image](images/9781430241881_square_fmt.jpg) 逻辑问题，包括死代码和各种不良编码实践\n\n这太棒了！但是，除了好处之外，使用分析器也有一些缺点。\n\
    \n*   ![image](images/9781430241881_square_fmt.jpg) 它会减慢你的构建过程，因为执行分析需要时间。\n*\
    \   ![image](images/9781430241881_square_fmt.jpg) 分析器有时会产生误报，告诉你存在的问题实际上并不是问题。\n\
    *   ![image](images/9781430241881_square_fmt.jpg) 它会改变你熟悉的工作流程，因为你必须弄清楚如何将之融入。\n\
    \n## 进入分析\n\n好吧，即使有这些缺点，听起来也不是那么糟糕。让我们试一试。我们如何开始使用这个奇特的工具？\n\n实际上再简单不过了。首先打开一个项目；我们将使用`*19-01\
    \ CarParts Error*`。点击**Product**菜单并选择**Analyze**（见图19-1），或按![image](images/Rangoli1.jpg)\
    \ + shift + B。就这样！你已被分析。但你还没有完成——这只是你与这个工具交互的开始。\n\n![9781430241881_Fig19-01_fmt.jpg](images/9781430241881_Fig19-01_fmt.jpg)\n\
    \n**图19-1.** 从**Product**菜单中选择**Analyze**\n\n当我们构建`*19.01 CarParts Error*`时，我们看到它编译没有错误，并且运行良好。经过静态分析步骤，你可能会注意到我们的程序编译时间稍长。\n\
    \n毫无疑问，你也注意到分析器有一些要报告的内容，由分支箭头图标指示。静态分析器为我们发现了四个我们之前不知道的问题。酷——让我们来看看。\n\n问题导航器（见图19-2）列出了分析器发现的问题。我们将逐一检查这些错误。\n\
    \n![9781430241881_Fig19-02_fmt.jpg](images/9781430241881_Fig19-02_fmt.jpg)\n\n\
    **图19-2.** 分析器发现了四个问题\n\n## 死存储不是吸血鬼买牛奶的地方"
