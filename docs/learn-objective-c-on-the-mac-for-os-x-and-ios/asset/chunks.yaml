    Geometric Types


    You’ll often see types that deal with geometry and have the prefix “CG,” such
    as CGPoint and CGSize. These types are provided by the Core Graphics framework,
    used for 2D rendering. Core Graphics is written in C, so we use C types to code
    with it. CGPoint represents an (x, y) point in the Cartesian plane:


    struct CGPoint


    {


    float x;


    float y;


    };


    CGSize holds a width and a height:


    struct CGSize


    {


    float width;


    float height;


    };


    In the Shapes family of programs, we could have used a CGPoint and a CGSize instead
    of our custom rectangle struct, but we wanted to keep things as simple as possible
    at the time. Cocoa provides a rectangle type, which is a composition of a point
    and a size:


    struct CGRect


    {


    CGPoint origin;


    CGSize size;


    };


    Cocoa gives us convenience functions for making these bad boys too: CGPointMake(),
    CGSizeMake(), and CGRectMake().


    **Note** Why are these things C structs instead of full-blown objects? It comes
    down to performance. A program, especially a GUI program, uses a lot of temporary
    points, sizes, and rectangles to do its work. Remember that all Objective-C objects
    are dynamically allocated, and dynamic allocation is a relatively expensive operation,
    consuming a nontrivial amount of time. Making these structures first-class objects
    would impose a lot of overhead in their use.


    Stringing Us Along


    The first real live class on our tour is NSString, Cocoa’s string handling class.
    A string is just a sequence of human-readable characters. Since computers tend
    to interact with humans on a regular basis, having a way to store and manipulate
    human-readable text is a fine idea. You’ve met NSStrings before, with the special
    NSString literal, indicated by an at (@) sign before a double-quoted string, as
    in @"Hi!". These literal strings are as much NSStrings as the ones you create
    programmatically.


    If you’ve ever done any string processing in C, such as the stuff covered in *Learn
    C on the Mac* by Dave Mark (Apress 2009), you know it’s pretty painful. C implements
    strings as simple arrays of characters that mark their end with a trailing zero-byte.
    Cocoa’s NSString has a bunch of built-in methods that make string handling much
    easier.


    Build That String


    You’ve seen functions like printf() and NSLog() that take a format string and
    some arguments and emit formatted output. NSString’s stringWithFormat: method
    creates a new NSString just like that, with a format and arguments:


    + (id) stringWithFormat: (NSString *) format, …;


    And you make a new string like this:


    NSString *height;


    height = [NSString stringWithFormat:@"Your height is %d feet, %d inches", 5, 11];


    The resulting string is “Your height is 5 feet, 11 inches”.


    Class Methods


    A couple of interesting things are going on in stringWithFormat:’s declaration.
    The first is the ellipses (…) at the end, which tells you (and the compiler) that
    this method will take any number of additional arguments, specified in a comma-separated
    list, just like printf() and NSLog().


    Another wacky and even more important fact about stringWithFormat: is the very
    special leading character in the declaration: a plus sign. Does this have anything
    to do with that social network from Google? Well, no. When the Objective-C runtime
    builds a class, it creates a **class object** that represents the class. The class
    object contains pointers to the superclass, class name, and the list of the class’s
    methods. The class object also contains a long that specifies the size, in bytes,
    for newly created instance objects of that class.


    When you declare a method with the plus sign, you’ve marked the method as a **class
    method**. This method belongs to the class object (as opposed to an instance object
    of the class) and is typically used to create new instances. Class methods used
    to create new objects are called **factory methods**.


    stringWithFormat: is a factory method. It creates a new object for you based on
    the arguments you give it. Using stringWithFormat: to make a new string is a whole
    lot easier than starting off with an empty string and building all the individual
    components.


    Class methods can also be used to access global data. AppKit’s NSColor for OS
    X and UIKit’s UIColor for iOS have some class methods named after various colors,
    such as redColor and blueColor. To get hold of a blue color to draw with, you
    write something like this:


    NSColor *haveTheBlues = [NSColor blueColor];


    or


    UIColor *blueMan = [UIColor blueColor];


    The vast majority of methods you create will be instance methods and will be declared
    with a leading minus sign (-). These methods will operate on a specific object
    instance, such as getting a Circle’s color or a Tire’s air pressure. If the method
    performs a more general-purpose function, such as creating an instance object
    or accessing some global class data, you’ll likely declare the method as a class
    method using the leading plus sign (+).


    Size Matters


    Another handy NSString method (an instance method) is length, which returns the
    number of characters in the string:


    - (NSUInteger) length;


    You’d use it like this:


    NSUInteger length = [height length];


    or in expressions like so:


    if ([height length] > 35)


    {


    NSLog (@"wow, you''re really tall!");


    }


    **Note** NSString’s length method does the right thing when dealing with international
    strings, such as those containing Russian, Chinese, or Japanese characters, and
    using the Unicode international character standard under the hood. Dealing with
    these international strings in straight C is especially painful, because an individual
    character might take more than 1 byte. This means that functions like strlen(),
    which just counts bytes, can return the wrong value.


    Comparative Politics


    Comparison is a frequent operation with strings. Sometimes, you want to see if
    two strings are equal (for example, is username equal to ''wmalik''?). Other times,
    you want to see how two strings would be ordered against each other, so you can
    sort a list of names. NSString provides several comparison functions to help you
    out.


    isEqualToString: compares the receiver (the object that the message is being sent
    to) with a string that’s passed in as an argument. isEqualToString: returns a
    BOOL (YES or NO) indicating if the two strings have the same contents. It’s declared
    like this:


    - (BOOL) isEqualToString: (NSString *) aString;


    And this is how you use it:


    NSString *thing1 = @"hello 5";


    NSString *thing2 = [NSString stringWithFormat: @"hello %d", 5];


    if ([thing1 isEqualToString: thing2])


    {


    NSLog (@"They are the same!");


    }


    To compare strings, use the compare: method, which is declared as follows:


    - (NSComparisonResult) compare: (NSString *) aString;


    compare: does a character-by-character comparison of the receiving object against
    the passed-in string. It returns an NSComparisonResult (which is just an enum)
    that shows the result of the comparison:


    enum


    {


    NSOrderedAscending = -1,


    NSOrderedSame,


    NSOrderedDescending


    };


    typedef NSInteger NSComparisonResult;


    Comparing Strings: Do It Right When comparing strings for equality, you want to
    use isEqualToString: rather than just comparing their pointer values, for instance:


    if ([thing1 isEqualToString: thing2])


    {


    NSLog (@"The strings are the same!");


    }


    is different from


    if (thing1 == thing2)


    {


    NSLog (@"They are the same object!");


    }


    That’s because the == operator works on only the values of the thing1 and thing2
    *pointers*, not what they point to. Because thing1 and thing2 are different strings,
    the second comparison will think they’re different.


    Sometimes, you do want to check for identity between two objects: is thing1 exactly
    the same object as thing2? That’s the time to use the == operator. If you want
    to check for equivalence (that is, do these two strings represent the same thing?),
    use isEqualToString:.'
  trans: "```objc\n[anObject flarbulateWithRange:NSMakeRange(13, 15)];\n```\n\n##\
    \ 几何类型\n\n你经常会见到以“CG”为前缀、处理几何数据的类型，例如 `CGPoint` 和 `CGSize`。这些类型来自 Core Graphics\
    \ 框架，用于二维渲染。Core Graphics 使用 C 语言编写，因此我们也用 C 类型与之交互。`CGPoint` 表示笛卡尔平面上的 (x, y)\
    \ 坐标点：\n\n```c\nstruct CGPoint\n{\n    float x;\n    float y;\n};\n```\n\n`CGSize`\
    \ 包含宽度和高度：\n\n```c\nstruct CGSize\n{\n    float width;\n    float height;\n};\n\
    ```\n\n在 Shapes 系列程序中，我们可以使用 `CGPoint` 和 `CGSize` 替代自定义的矩形结构体，但当时我们希望尽可能保持简单。Cocoa\
    \ 提供了矩形类型，它由点与尺寸组合而成：\n\n```c\nstruct CGRect\n{\n    CGPoint origin;\n    CGSize\
    \ size;\n};\n```\n\nCocoa 还为我们提供了便捷的构造函数：`CGPointMake()`、`CGSizeMake()` 和 `CGRectMake()`。\n\
    \n**注：** 为什么这些类型是 C 结构体而不是完整的对象？这归根结底是性能问题。程序（尤其是 GUI 程序）在运行时需要大量临时点、尺寸和矩形。请记住，所有\
    \ Objective-C 对象都是动态分配的，而动态分配是相对昂贵的操作，会消耗不少时间。将这些结构体设计为第一类对象会带来巨大的使用开销。\n\n##\
    \ 字符串引导\n\n我们旅程中第一个真正的类是 `NSString`，即 Cocoa 的字符串处理类。字符串只是人类可读字符的序列。由于计算机需要定期与人类交互，拥有存储和操作可读文本的方式是个好主意。你之前已经见过\
    \ `NSString`，它使用特殊的 `NSString` 字面量（在双引号字符串前加 `@` 符号），例如 `@\"Hi!\"`。这些字面量字符串与编程方式创建的\
    \ `NSString` 完全一样。\n\n如果你曾在 C 语言中进行过字符串处理（例如 Dave Mark 所著《在 Mac 上学 C》中介绍的内容），就知道这相当痛苦。C\
    \ 语言将字符串实现为简单的字符数组，并以尾随的零字节标记结束。Cocoa 的 `NSString` 内置了许多方法，使字符串处理变得轻松许多。\n\n###\
    \ 构建字符串\n\n你已经见过 `printf()` 和 `NSLog()` 这类函数，它们接受格式字符串和参数并输出格式化内容。`NSString` 的\
    \ `stringWithFormat:` 方法也能类似地根据格式和参数创建新的 `NSString`：\n\n```objc\n+ (id) stringWithFormat:\
    \ (NSString *) format, …;\n```\n\n你可以像这样创建新字符串：\n\n```objc\nNSString *height;\n\
    height = [NSString stringWithFormat:@\"Your height is %d feet, %d inches\", 5,\
    \ 11];\n```\n\n结果字符串是“Your height is 5 feet, 11 inches”。\n\n## 类方法\n\n`stringWithFormat:`\
    \ 的声明中有几个有趣的地方。首先是末尾的省略号 (`…`)，它向你（和编译器）表明该方法可以接受任意数量的额外参数，以逗号分隔列表形式指定，就像 `printf()`\
    \ 和 `NSLog()` 一样。\n\n关于 `stringWithFormat:` 的另一个奇特且更重要的点是声明中非常特殊的前导字符：加号。这跟谷歌的社交网络有关系吗？其实没有。当\
    \ Objective-C 运行时构建一个类时，它会创建一个代表该类的**类对象**。类对象包含指向父类的指针、类名以及类的方法列表。类对象还包含一个 `long`\
    \ 类型的值，用于指定该类新创建实例对象的大小（以字节为单位）。\n\n当你使用加号声明方法时，你就将该方法标记为**类方法**。该方法属于类对象（而非类的实例对象），通常用于创建新实例。用于创建新对象的类方法称为**工厂方法**。\n\
    \n`stringWithFormat:` 就是一个工厂方法。它根据你提供的参数为你创建一个新对象。使用 `stringWithFormat:` 创建新字符串比从空字符串开始逐个构建所有组件要简单得多。\n\
    \n类方法也可用于访问全局数据。AppKit（用于 OS X）中的 `NSColor` 和 UIKit（用于 iOS）中的 `UIColor` 提供了一些以颜色命名的类方法，例如\
    \ `redColor` 和 `blueColor`。要获取用于绘制的蓝色对象，你可以这样写：\n\n```objc\nNSColor *haveTheBlues\
    \ = [NSColor blueColor];\n```\n\n或者\n\n```objc\nUIColor *blueMan = [UIColor blueColor];\n\
    ```\n\n你创建的方法绝大多数都是实例方法，并使用前导减号 (`-`) 声明。这些方法会在特定对象实例上操作，例如获取某个 `Circle` 的颜色或\
    \ `Tire` 的气压。如果方法执行更通用的功能（例如创建实例对象或访问某些全局类数据），则很可能使用前导加号 (`+`) 将其声明为类方法。\n\n###\
    \ 大小问题\n\n另一个实用的 `NSString` 方法（实例方法）是 `length`，它返回字符串中的字符数：\n\n```objc\n- (NSUInteger)\
    \ length;\n```\n\n你可以这样使用它：\n\n```objc\nNSUInteger length = [height length];\n\
    ```\n\n或者在表达式中这样使用：\n\n```objc\nif ([height length] > 35)\n{\n    NSLog (@\"wow,\
    \ you're really tall!\");\n}\n```\n\n**注：** `NSString` 的 `length` 方法在处理国际字符串（例如包含俄语、中文或日文字符的字符串）时能正确处理，其底层使用了\
    \ Unicode 国际字符标准。在纯 C 语言中处理这些国际字符串尤其痛苦，因为单个字符可能占用超过 1 个字节。这意味着像 `strlen()` 这样仅统计字节数的函数可能返回错误的值。\n\
    \n### 比较策略\n\n字符串的比较是一种常见操作。有时，你需要判断两个字符串是否相等（例如，`username` 是否等于 `'wmalik'`？）。有时，你需要了解两个字符串的排序顺序，以便对名称列表进行排序。`NSString`\
    \ 提供了多个比较函数来帮助你完成这些任务。\n\n`isEqualToString:` 将接收者（消息发送到的对象）与作为参数传入的字符串进行比较。`isEqualToString:`\
    \ 返回一个 `BOOL` 值（`YES` 或 `NO`），指示两个字符串的内容是否相同。其声明如下：\n\n```objc\n- (BOOL) isEqualToString:\
    \ (NSString *) aString;\n```\n\n使用方法如下：\n\n```objc\nNSString *thing1 = @\"hello\
    \ 5\";\nNSString *thing2 = [NSString stringWithFormat: @\"hello %d\", 5];\n\n\
    if ([thing1 isEqualToString: thing2])\n{\n    NSLog (@\"They are the same!\");\n\
    }\n```\n\n要比较字符串，请使用 `compare:` 方法，声明如下：\n\n```objc\n- (NSComparisonResult) compare:\
    \ (NSString *) aString;\n```\n\n`compare:` 会逐字符比较接收对象与传入的字符串。它返回一个 `NSComparisonResult`（实际上是一个\
    \ `enum`），表示比较结果：\n\n```objc\nenum\n{\n    NSOrderedAscending = -1,\n    NSOrderedSame,\n\
    \    NSOrderedDescending\n};\ntypedef NSInteger NSComparisonResult;\n```\n\n**比较字符串：正确做法**\n\
    \n在比较字符串是否相等时，应使用 `isEqualToString:` 而不是直接比较它们的指针值，例如：\n\n```objc\nif ([thing1\
    \ isEqualToString: thing2])\n{\n    NSLog (@\"The strings are the same!\");\n\
    }\n```\n\n与以下代码不同：\n\n```objc\nif (thing1 == thing2)\n{\n    NSLog (@\"They are\
    \ the same object!\");\n}\n```\n\n这是因为 `==` 运算符只作用于 `thing1` 和 `thing2` *指针*本身的值，而非它们指向的内容。由于\
    \ `thing1` 和 `thing2` 是不同的字符串，第二种比较会认为它们不同。\n\n有时，你确实需要检查两个对象是否相同：`thing1` 是否就是\
    \ `thing2` 这个对象本身？此时应使用 `==` 运算符。如果你需要检查等价性（即这两个字符串是否表示相同的内容），则应使用 `isEqualToString:`。"
- fmt: "如果您曾经使用过 C 语言的 `qsort()` 或 `bsearch()` 函数，可能会对此感到熟悉。如果 `compare:` 的结果是 `NSOrderedAscending`，则左侧的值小于右侧的值——也就是说，进行比较的对象在字母顺序上早于传入的字符串。例如，`[@\"\
    aardvark\" compare: @\"zygote\"]` 会返回 `NSOrderedAscending`。\n\n同样地，`[@\"zoinks\"\
    \ compare:@\"jinkies\"]` 会返回 `NSOrderedDescending`。而正如您所料，`[@\"fnord\" compare:\
    \ @\"fnord\"]` 会返回 `NSOrderedSame`。\n\n### 大小写不敏感性\n\n`compare:` 执行的是区分大小写的比较。换句话说，`@\"\
    Bork\"` 和 `@\"bork\"` 进行比较时，不会返回 `NSOrderedSame`。还有另一个方法 `compare:options:`，它赋予了您更多的控制权：\n\
    \n```\n- (NSComparisonResult) compare: (NSString *) aString\noptions: (NSStringCompareOptions)\
    \ mask;\n```\n\n`options` 参数是一个位掩码，这是一种利用每一位来表示某个选项是否开启的值。您可以使用按位或运算符（`|`）来组合多个选项标志。以下是一些常用的选项：\n\
    \n*   `NSCaseInsensitiveSearch`：大小写字符被视为相同。\n*   `NSLiteralSearch`：执行精确比较，包括大小写。\n\
    *   `NSNumericSearch`：字符串中的数字被当作数值进行比较，而不是作为字符值。如果没有这个选项，`“100”` 会排在 `“99”` 之前，这对于大多数非程序员来说相当奇怪，甚至被认为是错误的。\n\
    \n例如，如果您想执行一个忽略大小写但正确排序数字的比较，可以这样做：\n\n```\nif ([thing1 compare: thing2 options:\
    \ NSCaseInsensitiveSearch | NSNumericSearch]\n    == NSOrderedSame)\n{\n    NSLog\
    \ (@\"They match!\");\n}\n```\n\n### 是否包含在内？\n\n有时，您想查看一个字符串是否包含另一个字符串。例如，您可能想知道一个文件名是否以\
    \ `“.mov”` 结尾，以便在 QuickTime Player 中打开它，或者检查它是否以 `“draft”` 开头，以判断它是否是文档的草稿版本。这里有两个方法可以帮到您：第一个方法检查字符串是否以另一个字符串开头，第二个方法判断字符串是否以另一个字符串结尾：\n\
    \n```\n- (BOOL) hasPrefix: (NSString *) aString;\n- (BOOL) hasSuffix: (NSString\
    \ *) aString;\n```\n\n您可以像下面这样使用这些方法：\n\n```\nNSString *fileName = @\"draft-chapter.pages\"\
    ;\n\nif ([fileName hasPrefix: @\"draft\"])\n{\n    // this is a draft\n}\n\nif\
    \ ([fileName hasSuffix: @\".mov\"])\n{\n    // this is a movie\n}\n```\n\n因此，`draft-chapter.pages`\
    \ 会被识别为一个草稿版本（因为它以 `“draft”` 开头），但不会被识别为一个电影文件（其结尾是 `“.pages”` 而不是 `“.mov”`）。\n\
    \n如果您想查看一个字符串是否位于另一个字符串内部，请使用 `rangeOfString:`：\n\n```\n- (NSRange) rangeOfString:\
    \ (NSString *) aString;\n```\n\n当您向一个 `NSString` 对象发送 `rangeOfString:` 消息时，传入要查找的字符串。它会返回一个\
    \ `NSRange` 结构体，用于显示字符串中匹配部分的位置和大小。因此，下面的示例：\n\n```\nNSRange range = [fileName\
    \ rangeOfString: @\"chapter\"];\n```\n\n返回的 `range.location` 为 `6`，`range.length`\
    \ 为 `7`。如果在接收者中未找到参数，`range.location` 将等于 `NSNotFound`。\n\n### 可变性\n\n`NSString`\
    \ 是**不可变**的。这不意味着您无法让它们保持安静；它指的是，一旦它们被创建，就无法改变它们。您可以对它们进行各种操作，比如用它们创建新字符串、查找字符以及与其他字符串进行比较，但您无法通过移除字符或添加新字符来改变它们。\n\
    \nCocoa 提供了一个名为 `NSMutableString` 的 `NSString` 子类。如果您想就地修改字符串，请使用它。\n\n> **注意**：来自\
    \ Java 的程序员应该对这个区别感到很熟悉。`NSString` 的行为类似于 Java 的 `String` 类，而 `NSMutableString`\
    \ 就像 Java 的 `StringBuffer` 类。\n\n您可以使用类方法 `stringWithCapacity:` 来创建一个新的 `NSMutableString`，其声明如下：\n\
    \n```\n+ (id) stringWithCapacity: (NSUInteger) capacity;\n```\n\n`capacity` 参数只是给\
    \ `NSMutableString` 的一个建议，就像您告诉一个青少年回家的时间一样。字符串并不受限于您提供的容量——它只是一种优化。例如，如果您知道您要构建一个\
    \ 40 兆字节大小的字符串，`NSMutableString` 可以预先分配一块内存来容纳它，从而使后续操作快得多。像这样创建一个新的可变字符串：\n\n\
    ```\nNSMutableString *string = [NSMutableString stringWithCapacity:42];\n```\n\
    \n一旦您有了一个可变字符串，您就可以对它执行各种奇妙的操作。一个常见的操作是使用 `appendString:` 或 `appendFormat:` 追加一个新字符串，如下所示：\n\
    \n```\n- (void) appendString: (NSString *) aString;\n- (void) appendFormat: (NSString\
    \ *) format, …;\n```\n\n`appendString:` 接受其 `aString` 参数，并将其复制到接收对象的末尾。`appendFormat:`\
    \ 的工作方式类似于 `stringWithFormat:`，但它不是创建一个新的字符串对象，而是将格式化后的字符串追加到接收字符串的末尾，例如：\n\n\
    ```\nNSMutableString *string = [NSMutableString stringWithCapacity:50];\n[string\
    \ appendString: @\"Hello there \"];\n[string appendFormat: @\"human %d!\", 39];\n\
    ```\n\n在这段代码执行完毕后，`string` 将拥有友好的值 `“Hello there human 39!”`。\n\n您可以使用 `deleteCharactersInRange:`\
    \ 方法从字符串中移除字符：\n\n```\n- (void) deleteCharactersInRange: (NSRange) aRange;\n```\n\
    \n您通常会结合使用 `deleteCharactersInRange:` 和 `rangeOfString:`。请记住，`NSMutableString`\
    \ 是 `NSString` 的一个子类。通过面向对象编程的奇迹，您也可以在 `NSMutableString` 上使用 `NSString` 的所有特性，包括\
    \ `rangeOfString:`、比较方法以及所有其他方法。例如，假设您列出了所有的朋友，但后来您决定不再喜欢 Jack，并想把他从列表中移除：\n\n\
    首先，创建朋友列表：\n\n```\nNSMutableString *friends = [NSMutableString stringWithCapacity:50];\n\
    [friends appendString: @\"James BethLynn Jack Evan\"];\n```\n\n接下来，找到 Jack 所在的范围：\n\
    \n```\nNSRange jackRange = [friends rangeOfString: @\"Jack\"];\njackRange.length++;\
    \ // 吃掉后面的空格\n```\n\n在这个例子中，范围起始于 `15`，长度为 `5`。现在，我们可以将 Jack 从我们的圣诞贺卡名单中移除：\n\n\
    ```\n[friends deleteCharactersInRange: jackRange];\n```\n\n这将使字符串变为 `“James BethLynn\
    \ Evan”`。\n\n可变字符串对于实现 `description` 方法非常方便。您可以使用 `appendString` 和 `appendFormat`\
    \ 为您的对象创建一个漂亮的描述。\n\n因为 `NSMutableString` 是 `NSString` 的子类，我们免费获得了几种行为。第一个好处是，在任何使用\
    \ `NSString` 的地方，我们都可以用 `NSMutableString` 替代。任何接受 `NSString` 的方法也将接受 `NSMutableString`。字符串的使用者并不关心它是可变的还是不可变的。\n\
    \n另一个免费的行为来自于继承在类方法和实例方法上同样适用。因此，`NSString` 中方便的类方法 `stringWithFormat:` 也可用于创建新的\
    \ `NSMutableString`。您可以轻松地从一个格式字符串填充一个可变字符串：\n\n```\nNSMutableString *string =\
    \ [NSMutableString stringWithFormat: @\"jo%dy\", 2];\n```\n\n`string` 的初始值是 `“jo2y”`，但您可以执行其他操作，例如从给定范围删除字符或在特定位置插入字符。请查阅\
    \ `NSString` 和 `NSMutableString` 的文档，以了解这些类中提供的数十种方法的完整细节。\n\n### 集合代理\n\n单个对象四处浮动是挺不错的，但通常，您需要让东西变得井井有条。Cocoa\
    \ 提供了许多集合类，例如 `NSArray` 和 `NSDictionary`，它们的实例存在的目的就是为了容纳其他对象。\n\n### NSArray"
  raw: 'If you’ve ever used the C functions qsort() or bsearch(), this might look
    familiar. If the result from compare: is NSOrderedAscending, the left-hand value
    is smaller than the right-hand one—that is, the target of compare sorts earlier
    in the alphabet than the string that’s been passed in. For instance, [@"aardvark"
    compare: @"zygote"] would return NSOrderedAscending.


    Similarly, [@"zoinks" compare:@"jinkies"] would return NSOrderedDescending. And,
    as you’d expect, [@"fnord" compare: @"fnord"] would return NSOrderedSame.


    Insensitivity Training


    compare: does a case-sensitive comparison. In other words, @"Bork" and @"bork",
    when compared, won’t return NSOrderedSame. There’s another method, compare:options:,
    that gives you more control:


    - (NSComparisonResult) compare: (NSString *) aString


    options: (NSStringCompareOptions) mask;


    The options parameter is a bit mask, which is a value that uses each bit to indicate
    whether an option is on or off. You can use the bitwise OR operator (|) to add
    option flags together. Some common options follow:


    *   ![image](images/9781430241881_square_fmt.jpg)  NSCaseInsensitiveSearch: Uppercase
    and lowercase characters are considered the same.

    *   ![image](images/9781430241881_square_fmt.jpg)  NSLiteralSearch: Perform an
    exact comparison, including case.

    *   ![image](images/9781430241881_square_fmt.jpg)  NSNumericSearch: Numbers in
    strings are compared as numbers, rather than their character values. Without this,
    “100” would sort before “99,” which strikes most nonprogrammers as rather bizarre,
    or even wrong.


    For example, if you want to perform a comparison ignoring case but ordering numbers
    correctly, you would do this:


    if ([thing1 compare: thing2 options: NSCaseInsensitiveSearch | NSNumericSearch]


    == NSOrderedSame)


    {


    NSLog (@"They match!");


    }


    Is It Inside?


    Sometimes, you want to see if a string has another string inside it. For example,
    you might want to know if a file name has “.mov” at the end so you can open it
    in QuickTime Player, or you could check whether it starts with “draft” to see
    if it’s a draft version of a document. Here are two methods that help: the first
    checks whether a string starts with another string, and the second determines
    if a string ends with another string:


    - (BOOL) hasPrefix: (NSString *) aString;


    - (BOOL) hasSuffix: (NSString *) aString;


    And you’d use these methods as follows:


    NSString *fileName = @"draft-chapter.pages";


    if ([fileName hasPrefix: @"draft"])


    {


    // this is a draft


    }


    if ([fileName hasSuffix: @".mov"])


    {


    // this is a movie


    }


    So draft-chapters.pages would be recognized as a draft version (because it starts
    with “draft”), but would not be recognized as a movie (it has “.pages” at the
    end rather than “.mov”).


    If you want to see if a string is somewhere inside another string, use rangeOfString:


    - (NSRange) rangeOfString: (NSString *) aString;


    When you send rangeOfString: to an NSString object, you pass it the string to
    look for. It then returns an NSRange struct to show you where the matching part
    of the string is and how large the match is. So the following example


    NSRange range = [fileName rangeOfString: @"chapter"];


    comes back with range.location at 6 and range.length set to 7\. If the argument
    isn’t found in the receiver, range.location will be equal to NSNotFound.


    Mutability


    NSStrings are **immutable**. That doesn’t mean you can’t keep them quiet; it refers
    to the fact that once they’re created, you can’t change them. You can do all sorts
    of stuff with them, like make new strings with them, find characters in them,
    and compare them to other strings, but you can’t change them by taking off characters
    or by adding new ones.


    Cocoa provides a subclass of NSString called NSMutableString. Use that if you
    want to slice and dice a string in place.


    **Note** Programmers coming from Java should feel at home with this distinction.
    NSString behaves like the java String class, and NSMutableString is like Java’s
    StringBuffer class.


    You can create a new NSMutableString by using the class method stringWithCapacity:,
    which is declared like so:


    + (id) stringWithCapacity: (NSUInteger) capacity;


    The capacity is just a suggestion to NSMutableString, like when you tell a teenager
    what time to be home. The string is not limited to the capacity you supply—it’s
    just an optimization. For example, if you know you’re building a string that’s
    40 megabytes in size, NSMutableString can preallocate a chunk of memory to hold
    it, making subsequent operations much faster. Create a new mutable string like
    this:


    NSMutableString *string = [NSMutableString stringWithCapacity:42];


    Once you have a mutable string, you can do all sorts of wacky tricks with it.
    A common operation is to append a new string, using appendString: or appendFormat:,
    like this:


    - (void) appendString: (NSString *) aString;


    - (void) appendFormat: (NSString *) format, …;


    appendString: takes its aString parameter and copies it to the end of the receiving
    object. appendFormat: works like stringWithFormat:, but instead of creating a
    new string object, it appends the formatted string to the end of the receiving
    string, for example:


    NSMutableString *string = [NSMutableString stringWithCapacity:50];


    [string appendString: @"Hello there "];


    [string appendFormat: @"human %d!", 39];


    At the end of this code, string will have the friendly value “Hello there human
    39!”.


    You can remove characters from the string with the deleteCharactersInRange: method:


    - (void) deleteCharactersInRange: (NSRange) aRange;


    You’ll often use deleteCharactersInRange: coupled with rangeOfString:. Remember
    that NSMutableString is a subclass of NSString. Through the miracle of object-oriented
    programming, you also can use all the features of NSString with NSMutableStrings,
    including rangeOfString:, the comparison methods, and everything else. For example,
    let’s say you list all your friends, but then you decide you don’t like Jack anymore
    and you want to remove him from the list:


    First, make the list of friends:


    NSMutableString *friends = [NSMutableString stringWithCapacity:50];


    [friends appendString: @"James BethLynn Jack Evan"];


    Next, find the range of characters where Jack lives:


    NSRange jackRange = [friends rangeOfString: @"Jack"];


    jackRange.length++; // eat the space that follows


    In this case, the range starts at 15 and has a length of 5\. Now, we can remove
    Jack from our Christmas card list:


    [friends deleteCharactersInRange: jackRange];


    This leaves the string as “James BethLynn Evan”.


    Mutable strings are very handy for implementing description methods. You can use
    appendString and appendFormat to create a nice description for your object.


    We get a couple of behaviors for free because NSMutableString is a subclass of
    NSString. The first freebie is that anywhere an NSString is used, we can substitute
    an NSMutableString. Any methods that take an NSString will also take an NSMutableString.
    The user of the string really doesn’t care if it’s mutable or not.


    The other free behavior comes from the fact that inheritance works just as well
    with class methods as it does with instance methods. So, the handy stringWithFormat:
    class method in NSString works for making new NSMutableStrings. You can easily
    populate a mutable string from a format:


    NSMutableString *string = [NSMutableString stringWithFormat: @"jo%dy", 2];


    string starts out with the value “jo2y”, but you can perform other operations,
    such as deleting characters from a given range or inserting characters at a particular
    position. Check out the documentation for NSString and NSMutableString to learn
    full details on the dozens of methods available in these classes.


    Collection Agency


    Individual objects floating around is nifty, but frequently, you’ll want to get
    things organized. Cocoa provides a number of collection classes such as NSArray
    and NSDictionary whose instances exist just to hold onto other objects.


    NSArray'
  trans: "\n如果您曾经使用过 C 语言的 `qsort()` 或 `bsearch()` 函数，可能会对此感到熟悉。如果 `compare:` 的结果是\
    \ `NSOrderedAscending`，则左侧的值小于右侧的值——也就是说，进行比较的对象在字母顺序上早于传入的字符串。例如，`[@\"aardvark\"\
    \ compare: @\"zygote\"]` 会返回 `NSOrderedAscending`。\n\n同样地，`[@\"zoinks\" compare:@\"\
    jinkies\"]` 会返回 `NSOrderedDescending`。而正如您所料，`[@\"fnord\" compare: @\"fnord\"\
    ]` 会返回 `NSOrderedSame`。\n\n### 大小写不敏感性\n\n`compare:` 执行的是区分大小写的比较。换句话说，`@\"Bork\"\
    ` 和 `@\"bork\"` 进行比较时，不会返回 `NSOrderedSame`。还有另一个方法 `compare:options:`，它赋予了您更多的控制权：\n\
    \n```\n- (NSComparisonResult) compare: (NSString *) aString\noptions: (NSStringCompareOptions)\
    \ mask;\n```\n\n`options` 参数是一个位掩码，这是一种利用每一位来表示某个选项是否开启的值。您可以使用按位或运算符（`|`）来组合多个选项标志。以下是一些常用的选项：\n\
    \n*   `NSCaseInsensitiveSearch`：大小写字符被视为相同。\n*   `NSLiteralSearch`：执行精确比较，包括大小写。\n\
    *   `NSNumericSearch`：字符串中的数字被当作数值进行比较，而不是作为字符值。如果没有这个选项，`“100”` 会排在 `“99”` 之前，这对于大多数非程序员来说相当奇怪，甚至被认为是错误的。\n\
    \n例如，如果您想执行一个忽略大小写但正确排序数字的比较，可以这样做：\n\n```\nif ([thing1 compare: thing2 options:\
    \ NSCaseInsensitiveSearch | NSNumericSearch]\n    == NSOrderedSame)\n{\n    NSLog\
    \ (@\"They match!\");\n}\n```\n\n### 是否包含在内？\n\n有时，您想查看一个字符串是否包含另一个字符串。例如，您可能想知道一个文件名是否以\
    \ `“.mov”` 结尾，以便在 QuickTime Player 中打开它，或者检查它是否以 `“draft”` 开头，以判断它是否是文档的草稿版本。这里有两个方法可以帮到您：第一个方法检查字符串是否以另一个字符串开头，第二个方法判断字符串是否以另一个字符串结尾：\n\
    \n```\n- (BOOL) hasPrefix: (NSString *) aString;\n- (BOOL) hasSuffix: (NSString\
    \ *) aString;\n```\n\n您可以像下面这样使用这些方法：\n\n```\nNSString *fileName = @\"draft-chapter.pages\"\
    ;\n\nif ([fileName hasPrefix: @\"draft\"])\n{\n    // this is a draft\n}\n\nif\
    \ ([fileName hasSuffix: @\".mov\"])\n{\n    // this is a movie\n}\n```\n\n因此，`draft-chapter.pages`\
    \ 会被识别为一个草稿版本（因为它以 `“draft”` 开头），但不会被识别为一个电影文件（其结尾是 `“.pages”` 而不是 `“.mov”`）。\n\
    \n如果您想查看一个字符串是否位于另一个字符串内部，请使用 `rangeOfString:`：\n\n```\n- (NSRange) rangeOfString:\
    \ (NSString *) aString;\n```\n\n当您向一个 `NSString` 对象发送 `rangeOfString:` 消息时，传入要查找的字符串。它会返回一个\
    \ `NSRange` 结构体，用于显示字符串中匹配部分的位置和大小。因此，下面的示例：\n\n```\nNSRange range = [fileName\
    \ rangeOfString: @\"chapter\"];\n```\n\n返回的 `range.location` 为 `6`，`range.length`\
    \ 为 `7`。如果在接收者中未找到参数，`range.location` 将等于 `NSNotFound`。\n\n### 可变性\n\n`NSString`\
    \ 是**不可变**的。这不意味着您无法让它们保持安静；它指的是，一旦它们被创建，就无法改变它们。您可以对它们进行各种操作，比如用它们创建新字符串、查找字符以及与其他字符串进行比较，但您无法通过移除字符或添加新字符来改变它们。\n\
    \nCocoa 提供了一个名为 `NSMutableString` 的 `NSString` 子类。如果您想就地修改字符串，请使用它。\n\n> **注意**：来自\
    \ Java 的程序员应该对这个区别感到很熟悉。`NSString` 的行为类似于 Java 的 `String` 类，而 `NSMutableString`\
    \ 就像 Java 的 `StringBuffer` 类。\n\n您可以使用类方法 `stringWithCapacity:` 来创建一个新的 `NSMutableString`，其声明如下：\n\
    \n```\n+ (id) stringWithCapacity: (NSUInteger) capacity;\n```\n\n`capacity` 参数只是给\
    \ `NSMutableString` 的一个建议，就像您告诉一个青少年回家的时间一样。字符串并不受限于您提供的容量——它只是一种优化。例如，如果您知道您要构建一个\
    \ 40 兆字节大小的字符串，`NSMutableString` 可以预先分配一块内存来容纳它，从而使后续操作快得多。像这样创建一个新的可变字符串：\n\n\
    ```\nNSMutableString *string = [NSMutableString stringWithCapacity:42];\n```\n\
    \n一旦您有了一个可变字符串，您就可以对它执行各种奇妙的操作。一个常见的操作是使用 `appendString:` 或 `appendFormat:` 追加一个新字符串，如下所示：\n\
    \n```\n- (void) appendString: (NSString *) aString;\n- (void) appendFormat: (NSString\
    \ *) format, …;\n```\n\n`appendString:` 接受其 `aString` 参数，并将其复制到接收对象的末尾。`appendFormat:`\
    \ 的工作方式类似于 `stringWithFormat:`，但它不是创建一个新的字符串对象，而是将格式化后的字符串追加到接收字符串的末尾，例如：\n\n\
    ```\nNSMutableString *string = [NSMutableString stringWithCapacity:50];\n[string\
    \ appendString: @\"Hello there \"];\n[string appendFormat: @\"human %d!\", 39];\n\
    ```\n\n在这段代码执行完毕后，`string` 将拥有友好的值 `“Hello there human 39!”`。\n\n您可以使用 `deleteCharactersInRange:`\
    \ 方法从字符串中移除字符：\n\n```\n- (void) deleteCharactersInRange: (NSRange) aRange;\n```\n\
    \n您通常会结合使用 `deleteCharactersInRange:` 和 `rangeOfString:`。请记住，`NSMutableString`\
    \ 是 `NSString` 的一个子类。通过面向对象编程的奇迹，您也可以在 `NSMutableString` 上使用 `NSString` 的所有特性，包括\
    \ `rangeOfString:`、比较方法以及所有其他方法。例如，假设您列出了所有的朋友，但后来您决定不再喜欢 Jack，并想把他从列表中移除：\n\n\
    首先，创建朋友列表：\n\n```\nNSMutableString *friends = [NSMutableString stringWithCapacity:50];\n\
    [friends appendString: @\"James BethLynn Jack Evan\"];\n```\n\n接下来，找到 Jack 所在的范围：\n\
    \n```\nNSRange jackRange = [friends rangeOfString: @\"Jack\"];\njackRange.length++;\
    \ // 吃掉后面的空格\n```\n\n在这个例子中，范围起始于 `15`，长度为 `5`。现在，我们可以将 Jack 从我们的圣诞贺卡名单中移除：\n\n\
    ```\n[friends deleteCharactersInRange: jackRange];\n```\n\n这将使字符串变为 `“James BethLynn\
    \ Evan”`。\n\n可变字符串对于实现 `description` 方法非常方便。您可以使用 `appendString` 和 `appendFormat`\
    \ 为您的对象创建一个漂亮的描述。\n\n因为 `NSMutableString` 是 `NSString` 的子类，我们免费获得了几种行为。第一个好处是，在任何使用\
    \ `NSString` 的地方，我们都可以用 `NSMutableString` 替代。任何接受 `NSString` 的方法也将接受 `NSMutableString`。字符串的使用者并不关心它是可变的还是不可变的。\n\
    \n另一个免费的行为来自于继承在类方法和实例方法上同样适用。因此，`NSString` 中方便的类方法 `stringWithFormat:` 也可用于创建新的\
    \ `NSMutableString`。您可以轻松地从一个格式字符串填充一个可变字符串：\n\n```\nNSMutableString *string =\
    \ [NSMutableString stringWithFormat: @\"jo%dy\", 2];\n```\n\n`string` 的初始值是 `“jo2y”`，但您可以执行其他操作，例如从给定范围删除字符或在特定位置插入字符。请查阅\
    \ `NSString` 和 `NSMutableString` 的文档，以了解这些类中提供的数十种方法的完整细节。\n\n### 集合代理\n\n单个对象四处浮动是挺不错的，但通常，您需要让东西变得井井有条。Cocoa\
    \ 提供了许多集合类，例如 `NSArray` 和 `NSDictionary`，它们的实例存在的目的就是为了容纳其他对象。\n\n### NSArray\n"
- fmt: "您已经在 C 语言中使用过数组。实际上，在本书的前面部分，我们就曾使用数组为一辆汽车存放四个轮胎。你可能还记得那段代码带来了一些困难。例如，我们必须检查数组索引是否有效：它不能低于\
    \ 0 或超出数组末尾。另一个问题是：数组长度 4 被硬编码在`Car`类中，这意味着我们无法拥有超过四个轮胎的汽车。当然，这看起来不算太大的限制，但你永远不知道，我们一直被承诺的未来飞行喷气汽车是否会在平稳着陆时需要超过四个轮胎。\n\
    \n`NSArray`是一个 Cocoa 类，用于保存对象的有序列表。你可以在`NSArray`中放入任何类型的对象：`NSString`、`Car`、`Shape`、`Tire`，或者任何你想要的，甚至其他数组和字典。\n\
    \n一旦你有了一个包含对象的`NSArray`，你可以通过各种方式使用它，例如让对象的实例变量指向该数组，将数组作为参数传递给方法或函数，获取其中存储的对象数量，抓取特定索引处的对象，在数组中查找对象，遍历其内容，或者执行其他无数神奇的操作。\n\
    \n`NSArray`有两个限制。首先，它只能保存 Objective-C 对象。你不能在`NSArray`中存放基本 C 类型，比如`int`、`float`、`enum`、`struct`或随机指针。此外，你不能在`NSArray`中存放`nil`（对象的零值或\
    \ NULL 值）。有一些方法可以绕过这些限制，稍后你将看到。\n\n你可以使用类方法`arrayWithObjects:`创建一个新的`NSArray`。你需要给它一个逗号分隔的对象列表，末尾加上`nil`来表示列表结束（顺便说一句，这也是你不能在数组中存放`nil`的原因之一）：\n\
    \n`NSArray *array = [NSArray arrayWithObjects:@\"one\", @\"two\", @\"three\",\
    \ nil];`\n\n这会创建一个由`NSString`字面量对象组成的三个元素的数组。你也可以使用数组字面量格式创建数组，这与`NSString`字面量格式非常相似。不是使用引号，而是使用方括号，如下所示：\n\
    \n`NSArray *array2 = @[@\"one\", @\"two\", @\"three\"];`\n\n尽管`array`和`array2`是不同的对象，但它们的内容是相同的，而且第二种版本显然比第一种更容易输入。\n\
    \n**注意：** 当你使用字面量语法时，不需要在末尾包含`nil`。\n\n一旦你有了一个数组，你可以获取它所包含的对象数量：\n\n`- (NSUInteger)count;`\n\
    \n并且你可以获取特定索引处的对象：\n\n`- (id)objectAtIndex:(NSUInteger)index;`\n\n使用字面量语法访问数组中的对象就像在\
    \ C 语言中访问数组元素一样：\n\n`id *myObject = array1[1];`\n\n你可以结合计数和获取来打印数组的内容：\n\n```\n\
    for (NSInteger i = 0; i < [array count]; i++)\n{\n    NSLog (@\"index %d has %@.\"\
    ,i, [array objectAtIndex:i]);\n}\n```\n\n你也可以使用数组字面量语法编写前面的代码：\n\n```\nfor (NSInteger\
    \ i = 0; i < [array count]; i++)\n{\n    NSLog (@\"index %d has %@.\",i, array[i]);\n\
    }\n```\n\n两种情况的输出看起来相同：\n\n```\nindex 0 has one.\nindex 1 has two.\nindex 2 has\
    \ three.\n```\n\n如果你引用的索引大于数组中的对象数量，Cocoa 会在运行时打印一条报错信息。例如，运行以下代码：\n\n`[array\
    \ objectAtIndex:208000];`\n\n`array[208000];`\n\n你会看到：\n\n```\n*** Terminating\
    \ app due to uncaught exception 'NSRangeException',\nreason: '*** -[__NSArray\
    \ objectAtIndex:]: index 208000 beyond bounds [0 .. 2]'\n```\n\n就是这样。\n\n因为你可能在\
    \ Cocoa 编程生涯中时不时看到类似的消息，让我们花点时间仔细看看。在通过说“终止了你的程序”给你一个下马威之后，消息提到它这样做是因为一个“未捕获的异常”。异常是\
    \ Cocoa 表达“我不知道如何处理这个”的方式。有些方法可以在代码中捕获异常并自行处理，但当你刚开始时，你不需要这样做。这个特定的异常是`NSRangeException`，这意味着传递给方法的范围参数有问题。具体的方法是`NSArray`的`objectAtIndex:`。\n\
    \n异常消息中最后的信息片段是最有趣的。消息的这一部分说我们请求数组中索引 208000 处的某个东西，但哎呀，数组只有三个元素——差得*那么远*。利用这些信息，你可以回溯到有问题的代码并找到错误。\n\
    \n追踪异常的原因可能会令人沮丧。你在控制台窗口中只得到这条消息。对于 GUI 程序，程序会继续运行。有一种方法可以让 Xcode 在异常发生时进入调试器，这样会好一些。要这样做，请在工作区导航面板中选择断点标签。你会得到一个断点列表。现在，我们设置了一个断点，如图\
    \ [Figure 8-1](#9781430241881_Ch8.xhtml#_FIG1) 所示。\n\n![9781430241881_Fig08-01.tif](images/9781430241881_Fig08-01_fmt.jpg)\n\
    \n[Figure 8-1](#9781430241881_Ch8.xhtml#FIG1). Xcode 的断点窗口\n\n要添加另一个断点，只需点击面板左下角的\
    \ + 按钮，并从弹出菜单中选择“添加异常断点”项。你会看到另一个弹出窗口，如图 [Figure 8-2](#9781430241881_Ch8.xhtml#_FIG2)\
    \ 所示。\n\n![9781430241881_Fig08-02.tif](images/9781430241881_Fig08-02_fmt.jpg)\n\
    \n[Figure 8-2](#9781430241881_Ch8.xhtml#FIG2). 添加异常断点\n\n在 Xcode 设置断点之前，它允许你自定义断点的行为。例如，你可以让它打印错误消息或停止并为你执行一些命令。现在，我们不打算做任何花哨的事情。我们只是让程序在抛出异常的地方停止。要完成，我们点击“完成”来添加断点。添加断点后，窗口看起来像\
    \ [Figure 8-3](#9781430241881_Ch8.xhtml#_FIG3)。现在，当你运行程序并且抛出异常时，调试器将停止并指向包含断点的行，如图\
    \ [Figure 8-4](#9781430241881_Ch8.xhtml#_FIG4) 所示。\n\n![9781430241881_Fig08-03.tif](images/9781430241881_Fig08-03_fmt.jpg)\n\
    \n[Figure 8-3](#9781430241881_Ch8.xhtml#FIG3). XCode 调试器指向包含断点的行\n\n![9781430241881_Fig08-04.tif](images/9781430241881_Fig08-04_fmt.jpg)\n\
    \n[Figure 8-4](#9781430241881_Ch8.xhtml#FIG4). 现在，程序在断点处停止\n\n你可能对 Cocoa 仅仅因为你的程序越过了数组边界就如此激烈地抱怨感到不满。但请相信我们：你会意识到这实际上是一件*很棒的事情*，因为它让你能够捕获那些否则可能未被检测到的错误。\n\
    \n像`NSString`一样，`NSArray`有很多特性。例如，你可以告诉数组返回特定对象的位置，基于当前数组中的一系列元素创建一个新数组，使用给定的分隔符将所有元素连接成一个字符串（这对于制作逗号分隔的列表很方便），或者创建一个已排序版本的新数组。\n\
    \n**拆分操作** 如果你使用过 Perl 或 Python 等脚本语言，你可能习惯于将字符串拆分成数组以及将数组元素连接成单个字符串。你也可以用`NSArray`做到这一点。\n\
    \n要拆分`NSArray`，请使用`-componentsSeparatedByString:`，如下所示：\n\n`NSString *string =\
    \ @\"oop:ack:bork:greeble:ponies\";`"
  raw: 'You’ve used arrays in C. In fact, earlier in this very book, we used an array
    to hold four tires for a car. You might remember that we ran into some difficulties
    with that code. For instance, we had to check to make sure the index into the
    array was valid: it couldn’t go below 0 or beyond the end of the array. Another
    problem: the array length of 4 was hard-coded into the Car class, meaning we couldn’t
    have a car with more than four tires. Sure, that doesn’t seem like much of a limitation,
    but you never know if the Flying Rocket Cars of the Future that we’ve all been
    promised will need more than four tires for a smooth landing.


    NSArray is a Cocoa class that holds an ordered list of objects. You can put any
    kind of objects in an NSArray: NSString, Car, Shape, Tire, or whatever else you
    want, even other arrays and dictionaries.


    Once you have an NSArray of objects, you can work with it in various ways, such
    as by having an object’s instance variable point to the array, passing the array
    as an argument to a method or function, getting a count of the number of objects
    stored inside it, grabbing an object at a particular index, finding an object
    in the array, looping over the contents, or a zillion other magic tricks.


    NSArray has two limitations. First, it holds only Objective-C objects. You can’t
    have primitive C types, like int, float, enum, struct, or random pointers in an
    NSArray. Also, you can’t store nil (the zero or NULL value for objects) in an
    NSArray. There are ways of working around these limitations, as you’ll see in
    a little while.


    You can create a new NSArray using the class method arrayWithObjects:. You give
    it a comma-separated list of objects, with nil at the end to signal the end of
    the list (which, by the way, is one of the reasons you can’t store nil in an array):


    NSArray *array = [NSArray arrayWithObjects:@"one", @"two", @"three", nil];


    This makes a three-element array composed of literal NSString objects. You can
    also create an array using the array literal format, which is very similar to
    the NSString literal format. Instead of quotes, you use square brackets, like
    so:


    NSArray *array2 = @[@"one", @"two", @"three"];


    Even though array and array2 are different objects, their contents are the same,
    and the second version is obviously much easier to type than the first.


    **Note** You don’t have to include nil at the end when you use the literal syntax.


    Once you have an array, you can get a count of the number of objects it contains:


    - (NSUInteger)count;


    And you can fetch an object at a particular index:


    - (id)objectAtIndex:(NSUInteger)index;


    Accessing objects in the array using the literal syntax is just like accessing
    an array item in C.


    id *myObject = array1[1];


    You can combine counting and fetching to print out the contents of the array:


    for (NSInteger i = 0; i < [array count]; i++)


    {


    NSLog (@"index %d has %@.",i, [array objectAtIndex:i]);


    }


    You can also write the preceding code using the array literal syntax:


    for (NSInteger i = 0; i < [array count]; i++)


    {


    NSLog (@"index %d has %@.",i, array[i]);


    }


    The output looks the same in both cases:


    index 0 has one.


    index 1 has two.


    index 2 has three.


    If you refer to an index that’s greater than the number of objects in the array,
    Cocoa prints a complaint at runtime. For example, run this code:


    [array objectAtIndex:208000];


    array[208000];


    You’ll see this:


    *** Terminating app due to uncaught exception ''NSRangeException'',


    reason: ''*** -[__NSArray objectAtIndex:]: index 208000 beyond bounds [0 .. 2]''


    So there.


    Because you’ll probably see messages like this from time to time in your Cocoa
    programming career, let’s spend a moment taking a closer look. After giving you
    the smackdown by saying that it terminated your program, the message mentions
    that it did so because of an “uncaught exception.” An **exception** is Cocoa’s
    way of saying “I don’t know how to deal with this.” There are ways to catch exceptions
    in code and handle them yourself, but you don’t need to do that when you’re just
    starting out. This particular exception is an NSRangeException, which means there’s
    something wrong with a range parameter being passed to a method. The method in
    particular is NSArray objectAtIndex:.


    The last bits of information in the exception message are the most interesting.
    This part of the message says we’re asking for something at index 208000 in an
    array, but oops, the array only has three items—missed it by *that much*. Using
    this information, you can trace back to the offending code and find the error.


    Tracking down the cause of an exception can be frustrating. All you get is this
    message in the Console window. With a GUI program, the program keeps running.
    There’s a way to get Xcode to break into the debugger when an exception happens,
    which is a bit better. To make this happen, choose the breakpoints tab in the
    navigator panel in the workspace. You’ll get a list of breakpoints. Right now,
    we have one breakpoint set, as shown in [Figure 8-1](#9781430241881_Ch8.xhtml#_FIG1).


    ![9781430241881_Fig08-01.tif](images/9781430241881_Fig08-01_fmt.jpg)


    [Figure 8-1](#9781430241881_Ch8.xhtml#FIG1). Xcode’s breakpoints window


    To add another breakpoint, just click the + button on the bottom left of the panel,
    and select the Add Exception Breakpoint… item from the pop-up. You’ll see another
    pop-up, shown in [Figure 8-2](#9781430241881_Ch8.xhtml#_FIG2).


    ![9781430241881_Fig08-02.tif](images/9781430241881_Fig08-02_fmt.jpg)


    [Figure 8-2](#9781430241881_Ch8.xhtml#FIG2). Adding an exception breakpoint


    Before Xcode sets the breakpoint, it allows you to customize the breakpoint’s
    behavior. For instance, you can have it print an error message or stop and execute
    some commands for you. For now, we’re not going to do anything fancy. We’ll just
    let the program stop where the exception is thrown. To finish, we click Done to
    add the breakpoint. After the breakpoint has been added, the window looks something
    like [Figure 8-3](#9781430241881_Ch8.xhtml#_FIG3). Now, when you run the program
    and an exception is thrown, the debugger will stop and point to the line containing
    the breakpoint, as shown in [Figure 8-4](#9781430241881_Ch8.xhtml#_FIG4).


    ![9781430241881_Fig08-03.tif](images/9781430241881_Fig08-03_fmt.jpg)


    [Figure 8-3](#9781430241881_Ch8.xhtml#FIG3). The XCode debugger pointing to the
    line containing the breakpoint


    ![9781430241881_Fig08-04.tif](images/9781430241881_Fig08-04_fmt.jpg)


    [Figure 8-4](#9781430241881_Ch8.xhtml#FIG4). Now, the program stops at the breakpoint


    You might not be happy that Cocoa complains so vehemently if your program merely
    transgresses the bounds of an array. But trust us: you’ll come to realize it’s
    actually a *great thing*, because it allows you to catch errors that otherwise
    might go undetected.


    Like NSString, NSArray has a lot of features. For example, you can tell an array
    to give you the location of a particular object, make a new array based on a range
    of elements in the current array, join all the elements into a string with a given
    separator (that one is handy for making comma-separated lists), or make a new
    array that’s a sorted version of the array you already have.


    Doing the Splits If you’ve used scripting languages like Perl or Python, you’re
    probably used to splitting a string into an array and joining an array’s elements
    into a single string. You can do that with NSArray too.


    To split an NSArray, use -componentsSeparatedByString:, like this:


    NSString *string = @"oop:ack:bork:greeble:ponies";'
