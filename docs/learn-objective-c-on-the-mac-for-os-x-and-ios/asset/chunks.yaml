    | ![image](images/9781430241881_Athor_1_fmt.jpg) | **Scott Knaster** was at Apple
    when Apple wasn’t cool. Scott worked at Apple helping developers write Mac software
    in the earliest days of the platform, when Cocoa was just a great idea waiting
    to be born. Scott now works on Google’s Developer Relations team and runs the
