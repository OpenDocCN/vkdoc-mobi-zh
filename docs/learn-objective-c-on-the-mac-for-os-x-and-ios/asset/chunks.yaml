    \n```objectivec\n+ (NSValue *)valueWithPoint:(NSPoint)aPoint;\n+ (NSValue *)valueWithSize:(NSSize)size;\n\
    + (NSValue *)valueWithRect:(NSRect)rect;\n- (NSPoint)pointValue;\n- (NSSize)sizeValue;\n\
    - (NSRect)rectValue;\n```\n\nTo store and retrieve an `NSRect` in an `NSArray`,\
    \ you do this:\n\n```objectivec\nvalue = [NSValue valueWithRect:rect];\n[array\
    \ addObject: value];\n…\nNSRect anotherRect = [value rectValue];\n```\n\n## NSNull\n\
    \nWe've told you that you can't put `nil` into a collection, because `nil` has\
    \ special meaning to `NSArray` and `NSDictionary`. But sometimes, you really need\
    \ to store a value that means \"there's nothing here at all.\" For example, let's\
    \ say you have a dictionary that holds a person's contact information, and under\
    \ the key `@\"home fax machine\"`, you store the user's home fax number. If that\
    \ key holds a phone number value, you know that person has a fax machine. But\
    \ if there's no value in the dictionary, does it mean that person has no home\
    \ fax machine or that you don't know if they have one?\n\nBy using `NSNull`, you\
    \ can eliminate the ambiguity. You can decide that a value of `NSNull` for the\
    \ key `@\"home fax machine\"` means the person definitely does not have a fax\
    \ machine, and no value for the key means that you don't know if the person has\
    \ one or not.\n\n`NSNull` is probably the simplest of all Cocoa classes. It has\
    \ but a single method:\n\n```objectivec\n+ (NSNull *) null;\n```\n\nAnd you add\
    \ it to a collection like this:\n\n```objectivec\n[contact setObject: [NSNull\
    \ null]\n            forKey: @\"home fax machine\"];\n```\n\nYou access it as\
    \ follows:\n\n```objectivec\nid homefax = [contact objectForKey: @\"home fax machine\"\
    ];\nif (homefax == [NSNull null])\n{\n    // … no fax machine. rats.\n}\n```\n\
    \n`[NSNull null]` always returns the same value, so you can use `==` to compare\
    \ it with other values.\n\n## Example: Looking for Files\n\nOK, enough with the\
    \ theoretical blah blah. Here's an actual working program that uses some of the\
    \ classes found in this chapter. `FileWalker` (found in the *08-01 FileWalker\
    \ project* folder) will paw through your Mac's home directory looking for `*.jpg*`\
    \ files and print a list of what it finds. It's not terribly exciting, we admit,\
    \ but it actually does something.\n\n`FileWalker` uses `NSString`, `NSArray`,\
    \ `NSEnumerator`, and two other Foundation classes to interact with the file system.\n\
    \nOur example also uses `NSFileManager`. The `NSFileManager` class lets you do\
    \ stuff with the file system, like create directories, remove files, move files\
    \ around, and get information about files. In this example, we're going to ask\
    \ `NSFileManager` to make an `NSDirectoryEnumerator` for us, which we'll use to\
    \ chug through a hierarchy of files.\n\nThis entire program resides in the `main()`\
    \ function, because we're not making any of our own classes. Here is `main()`\
    \ in its entirety:\n\n```objectivec\nint main (int argc, const char * argv[])\n\
    {\n    @autoreleasepool\n    {\n        NSFileManager *manager;\n        manager\
    \ = [NSFileManager defaultManager];\n        \n        NSString *home;\n     \
    \   home = [@\"~\" stringByExpandingTildeInPath];\n        \n        NSDirectoryEnumerator\
    \ *direnum;\n        direnum = [manager enumeratorAtPath:home];\n        \n  \
    \      NSMutableArray *files;\n        files = [NSMutableArray arrayWithCapacity:42];\n\
    \        \n        NSString *filename;\n        while (filename = [direnum nextObject])\n\
    \        {\n            if ([[filename pathExtension] isEqualTo: @\"jpg\"]) {\n\
    \                [files addObject: filename];\n            }\n        }\n    \
    \    \n        NSEnumerator *fileenum;\n        fileenum = [files objectEnumerator];\n\
    \        while (filename = [fileenum nextObject])\n        {\n            NSLog\
    \ (@\"%@\", filename);\n        }\n    }\n    return 0;\n} // main\n```\n\nNow,\
    \ let's deconstruct this program bit by bit. At the top is the `@autoreleasepool`\
    \ boilerplate code ([Chapter 9](#9781430241881_Ch9.xhtml) covers this in detail,\
    \ as you'll see).\n\nOur next step is to get hold of an `NSFileManager` to play\
    \ with. `NSFileManager` has a class method named `defaultManager` that gives us\
    \ an `NSFileManager` object of our very own:\n\n```objectivec\nNSFileManager *manager\
    \ = [NSFileManager defaultManager];\n```\n\nThis is a common idiom in Cocoa. There\
    \ are a number of classes that have a **singleton architecture**: only one of\
    \ them is needed. You really need only one file manager, or one font manager,\
    \ or one graphics context. These classes provide a class method to give you access\
    \ to a single, shared object, which you then use to get your work done.\n\nIn\
    \ this case, we need a directory iterator. But before we can ask the file manager\
    \ for a directory iterator, we must figure out where in the file system to start\
    \ looking at files. Starting from the top level of your hard drive could take\
    \ a long time, so let's just look in your home directory.\n\nHow do we specify\
    \ this directory? We could start with an absolute path, like `/Users/wmalik/`,\
    \ but that has the limitation that it only works if your home directory is named\
    \ `wmalik`. Luckily, Unix (and OS X) has a shorthand character for the home directory,\
    \ which is `~` (also known as the *tilde*). Yes, there really is a use for that\
    \ character even when you're not typing in *Español*). `~/Documents` is the *Documents*\
    \ directory, and `~/junk/oopack.txt` would be found at `/Users/wmalik/junk/oopack.txt`\
    \ on Waqar's machine. `NSString` has a method that takes the tilde and expands\
    \ it. That method is used in the next two lines of code:\n\n```objectivec\nNSString\
    \ *home = [@\"~\" stringByExpandingTildeInPath];\n```\n\n`stringByExpandingTildeInPath`\
    \ replaces `~` with the current user's home directory. On Waqar's machine, `home`\
    \ is `/Users/wmalik`. Next, we feed this path string to the file manager:\n\n\
    ```objectivec\nNSDirectoryEnumerator *direnum = [manager enumeratorAtPath: home];\n\
    ```\n\n`enumeratorAtPath:` returns an `NSDirectoryEnumerator`, which is a subclass\
    \ of `NSEnumerator`. Each time you call `nextObject` on this enumerator object,\
    \ it returns another path to a file in that directory. This method goes down into\
    \ subdirectories too. By the time the iteration loop ends, you have the path for\
    \ every single file in your home directory. Some extra features are provided by\
    \ `NSDirectoryEnumerator`, such as getting a dictionary of attributes for every\
    \ file, but we won't use those here.\n\nBecause we're looking for `*.jpg*` files\
    \ (that is, path names that end in `.jpg`), and we're going to print their names,\
    \ we need a place to store those names. We could just log them with `NSLog()`\
    \ as we come across them in the enumeration, but in the future, we might want\
    \ to do some operation on all the files at a different spot in the program. An\
    \ `NSMutableArray` is a dandy choice here. We'll make a mutable array and add\
    \ matching paths to it:\n\n```objectivec\nNSMutableArray *files = [NSMutableArray\
    \ arrayWithCapacity:42];\n```\n\nWe have no idea how many `*.jpg*` files will\
    \ actually be found, so we just picked 42 because — well, you know why. And because\
    \ the capacity isn't a permanent limitation on the size of the array, we'll be\
    \ fine in any case.\n\nFinally, we get to the real meat of the program. Everything\
