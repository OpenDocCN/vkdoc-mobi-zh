    ## 总结


    本章信息量很大，而且我们实际上并没有太多地讨论 Objective-C。这是怎么回事？就像木匠需要了解的不仅仅是木头（例如，他们还需要了解所有关于工具的知识）一样，Objective-C
    程序员需要了解的不仅仅是这门语言本身。能够在 Xcode 中快速编写、导航和调试代码，意味着你可以花更少的时间与环境作斗争，而将更多的时间用于做有趣的事情。


    接下来是对 Cocoa 中一些类的重要介绍。那应该会很有趣！


    # 第 8 章：Foundation Kit 快速浏览


    你已经看到 Objective-C 是一门非常棒的语言，而我们甚至还没有探索完它提供的所有特性。现在，我们将快速绕道，看看 Cocoa 的 Foundation
    框架。尽管严格来说是 Cocoa 的一部分，而非内置于 Objective-C 中，但 Foundation 框架如此重要，以至于我们认为值得在本书中探讨。


    正如你在第 2 章中看到的，Cocoa 实际上由许多不同的框架组成。其中，桌面（OS X）应用程序最常用的是 Foundation 和 Application
    Kit。Application Kit 拥有所有的用户界面对象和高级类。你将在第 16 章中体验 AppKit（酷孩子们这么称呼它）。


    如果你将要开发 iOS 应用程序，那么你将使用 User Interface Kit（`UIKit`）。我们将在第 15 章中对 `UIKit` 进行一个高屋建瓴的概述。`UIKit`
    被认为是 iOS 平台上的 AppKit，它包含了 iOS 应用程序的所有界面对象。


    ## 坚实的基础


    Foundation，顾名思义，是所有 UI 框架的基础。因为它没有 UI 对象，所以你可以为 iOS 和 OS X 应用程序使用相同的对象。


    Foundation 框架包含许多有用的、底层的、面向数据的类和类型。我们将访问其中一些，例如 `NSString`、`NSArray`、`NSEnumerator`
    和 `NSNumber`。Foundation 有一百多个类，你可以通过查看 Xcode 安装的文档来探索它们。你可以在 Xcode 的组织器窗口中选择工具栏中的“文档”项来阅读文档。


    Foundation 框架是构建在另一个名为 CoreFoundation 的框架之上的。CoreFoundation 完全是用 C 语言编写的，如果你愿意，也可以使用它，但我们不会在本书中讨论它。在谈论两个可能名称相似的框架时，不要感到困惑。如果你遇到以“CF”开头的函数名或变量名，它们属于
    CoreFoundation。其中大部分在 Foundation 框架中有对应的对象，并且有些可以轻松地相互转换。


    ## 使用项目模板代码


    在继续之前，这里有一个关于本章及本书剩余部分项目的说明。我们仍将创建 Foundation 工具项目，但我们会保留模板代码，如下所示：


    ```

    #import <Foundation/Foundation.h>


    int main (int argc, const char * argv[])


    {


    @autoreleasepool


    {


    // insert code here…


    NSLog(@"Hello, World!");


    } return 0;


    }

    ```


    仔细看看这段代码。`main()` 以关键字 `@autoreleasepool` 开始，所有 Cocoa 代码都写在该关键字和 `return` 语句之间的大括号内。这是对
    Cocoa 内存管理的一个预览，我们将在下一章讨论。现在，请点头微笑，并保留 `@autoreleasepool` 这部分代码。如果你把它删掉了，你不会伤到自己，但在运行程序时会得到一些非常奇怪的消息。


    ## 一些有用的类型


    在深入探讨真正的 Foundation 类之前，让我们先看看 Cocoa 为我们提供的一些结构体。


    ### 范围（Range）概述


    第一个结构体是 `NSRange`：


    ```

    typedef struct _NSRange


    {


    unsigned int location;


    unsigned int length;


    } NSRange;

    ```


    这个结构体用于表示事物的范围，通常是字符串中的字符范围或数组中的元素范围。`location` 字段保存范围的起始位置，`length` 是范围内的元素数量。对于字符串
    “Objective-C is a cool language”，单词 “cool” 可以用从位置 17 开始、长度为 4 的范围来描述。`location`
    可以取值 `NSNotFound` 来表示该范围不指向任何东西，很可能是因为它未初始化。


    你可以通过三种不同的方式创建一个新的 `NSRange`。首先，可以直接赋值给字段：


    ```

    NSRange range;


    range.location = 17;


    range.length = 4;

    ```


    其次，可以使用 C 语言的聚合结构赋值机制（听起来是不是很厉害？）：


    ```

    NSRange range = { 17, 4 };

    ```


    最后，Cocoa 提供了一个名为 `NSMakeRange()` 的便捷函数：


    ```

    NSRange range = NSMakeRange (17, 4);

    ```


    `NSMakeRange()` 的好处在于，你可以在任何可以使用函数的地方使用它，例如作为方法调用的参数。

