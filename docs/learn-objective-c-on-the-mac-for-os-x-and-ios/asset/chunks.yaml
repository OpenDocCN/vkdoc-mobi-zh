    ![9781430241881_Fig07-20.tif](img/9781430241881_Fig07-20_fmt.jpg)


    图 7-20 展示了导航栏。


    最左侧是一个菜单按钮，它提供对编辑器最近历史记录以及其他一些高级功能的快速访问。接下来是后退和前进按钮，让您可以在本次编辑会话中打开过的文件历史记录中循环切换。它们的工作方式类似于
    Safari 的后退和前进箭头。这些按钮旁边是一个路径，显示当前文件（`Car.m`）及其在项目中的位置，而非其目录路径。路径中的每一项都是一个按钮；点击任一按钮，就会弹出一个导航菜单。


    导航栏中的最后一个项是函数菜单。它显示插入点当前位于方法 `-setTire:atIndex:` 中。点击该菜单即可查看所有感兴趣符号，如 图 7-21 所示。


    ![9781430241881_Fig07-21.tif](img/9781430241881_Fig07-21_fmt.jpg)


    图 7-21 展示了文件中的符号。


    `-setTire:atIndex:` 被高亮显示，因为这是插入点所在位置。您可以看到它上方和下方的其他方法，按它们在文件中的出现顺序排序。您可以 ![image](img/Rangoli1.jpg)
    点击函数菜单以按字母顺序排序。


    除了方法名称之外，您还可以向此菜单添加自己的项。有几种不同的添加方式。一种方式是使用 `#pragma mark whatever` 将字符串 `whatever`
    放入菜单中。这对于添加人类可读的锚点非常有用，方便您和其他生物体查看和使用。`#pragma mark -`（减号）会在菜单中放入一条分隔线。Xcode 还会查找以特定字符串
    `MARK:`、`TODO:`、`FIXME:`、`!!!:` 和 `???：` 开头的注释。Xcode 也会将这些文本添加到函数菜单中。这些都是程序员留下的信号，意思是“在将此程序发布给毫无防备的公众之前，最好回来看看这个。”


    **注意**：“Pragma”一词源自希腊语，意为“行动”。`#pragma` 是一种向编译器和代码编辑器传递信息或指令的方式，这些信息超出了 Objective-C
    代码的常规行。Pragma 通常被忽略，但它们可能对软件开发中使用的工具具有意义。如果某个工具不理解 pragma，该工具应该点头、微笑并忽略它，而不产生警告或错误。


    ## 获取信息


    在您自己的代码和 Cocoa 头文件之间跳转固然很好，但有时您需要从自身代码之外获取一些信息。幸运的是，Xcode 附带了一个包含文档和参考资料的知识宝库（解释什么是宝库超出了本书的范围）。


    ### 帮帮忙，谢谢


    检查器（inspector）顶部有两个图标。到目前为止，在我们探索中，第一个图标被选中，检查器显示的是当前文件的属性。另一个图标启用检查器中的快速帮助（Quick
    Help）。要使用快速帮助，请点击代码中的某些内容，然后查看检查器中显示的内容。如果您点击源代码中的其他位置，快速帮助面板会自我更新。


    例如，假设您的插入点位于单词 `NSString` 内部。快速帮助将会显示如 图 7-22 所示的内容。


    ![9781430241881_Fig07-22.tif](img/9781430241881_Fig07-22_fmt.jpg)


    图 7-22 展示了快速帮助。


    这里有大量可用的信息。前两个项在文档窗口中打开 `NSString` 类参考文档。`NSString.h` 项在编辑器中打开头文件。


    “Abstract”（摘要）部分描述了该类。如果您将光标放在方法调用的中间，此部分将描述该方法以及相关的调用。这里还有指向更高级别文档的链接，以及大量使用
    `NSString` 的代码示例。蓝色文字是可以点击以获取更多信息的链接。您还可以通过按住 Option 键点击符号来从快速帮助中获取更多信息。如果这样做，您会看到类似
    图 7-23 的内容。如需更多信息，请点击右上角的书籍图标以打开该符号的文档。


    ![9781430241881_Fig07-23.tif](img/9781430241881_Fig07-23_fmt.jpg)


    图 7-23 展示了点击 `NSString` 后获得的更多信息，正如所承诺的那样。


    ### 文档员在家吗？


    如果您想直接进入 Apple 官方 API 文档，一个非常快的方法是按住 Option 键并双击某个符号。这实际上是执行该符号文档搜索的一个快捷方式。


    假设您有一行代码如 `[someString UTF8String]`，它将 `someString`（一个 `NSString`）转换为用 Unicode
    表示的 C 风格字符串。如果您按住 Option 键并双击 `UTF8String`，文档浏览器将会打开并搜索 `UTF8String`，如 图 7-24
    所示。


    ![9781430241881_Fig07-24.tif](img/9781430241881_Fig07-24_fmt.jpg)


    图 7-24 展示了 Xcode 文档窗口。


    那个窗口非常繁忙，并塞满了大量信息。左上角是一个搜索框，其中已预先填入了 `UTF8String`。工具栏下方的按钮条允许您精确定制搜索哪些文档集。您可以查看所有文档，或仅查看
    OS X 或 iOS 文档。


    按钮条下方是一个窗格（左侧），其中包含文档集和一组书签。您可以通过弹出菜单向特定的文档块添加书签。文档书签是全局的，不限于特定项目。


    窗口顶部左侧窗格中是一个浏览器，显示所有搜索匹配项。在 图 7-24 中，它显示了三个方法和一个常量。最有趣的是最后一个 `UTF8`，这正是我们实际调用的方法。您还会注意到同一项列出了多个版本。这是因为您可能安装了多套文档：iOS、OS
    X 或其他。请为您感兴趣的平台选择文档。请记住，某些方法可能并非在所有平台上都可用。


    该浏览器下方是一个显示文档的窗格。这个区域对于阅读文档来说有点小，但可以轻松地将文档打开到另一个 Xcode 窗口甚至网页浏览器中。


    ## 调试

    '
- fmt: '# 调试：识别并修复程序错误


    错误在所难免。当你刚开始学习一门新语言和新平台时，程序中难免会出现错误。面对问题时，深呼吸，喝一口你最喜欢的饮料，然后系统地找出问题所在。这个找出程序错误的过程被称为**调试**（debugging）。


    ## 粗暴式调试


    最简单的调试方式是暴力破解，有时被称为**原始人调试**（caveman debugging），即插入`NSLog`等打印语句来显示程序的控制流以及一些数据值。你可能一直都在这样做，只是不知道它的名字。你可能会遇到一些看不起原始人调试的人，但它确实是一种有效的工具，尤其是在你刚开始学习新系统时。所以，忽略那些反对者吧。


    ## Xcode 的调试器


    除此之外，Xcode 还包含一个调试器。**调试器**是一个位于你的程序和操作系统之间的程序，它可以中断你的程序，使其停止运行，并允许你查看程序的数据，甚至修改内容。当你查看完毕后，可以恢复执行以观察结果。你还可以单步执行代码，将计算机的速度降低到人类可感知的速度，从而精确地查看代码对数据产生了什么影响。


    Xcode 还提供了一个调试器面板，可以一目了然地显示大量信息，以及一个调试控制台，你可以在其中直接向调试器输入命令。


    **注意**：Xcode 提供了两种调试器供你选择：`GDB`和`LLDB`。`GDB`是 GNU 项目的一部分，已在无数不同的平台上可用，并且已经存在多年。`LLDB`是炙手可热的新竞争者，是
    LLVM 项目的一部分，该项目也是许多其他 Xcode 工具的源代码。目前，这两种调试器之间的差异很微妙，且主要在于内部实现。


    我们将在 Xcode 文本编辑器中讨论调试。如果你想了解更多，一定要尝试一下其他调试模式。


    ## 微妙的符号化


    当你计划调试程序时，需要确保使用的是**调试**（Debug）构建配置。你可以在 Xcode 工具栏的 **Edit Scheme** 弹出菜单项中检查此项。构建配置会告诉编译器发出额外的调试符号，调试器利用这些符号来确定程序中各元素的位置。


    ## 开始调试！


    与之前使用的命令行程序相比，在 GUI 程序中使用调试器要稍微容易一些。GUI 程序习惯于等待用户操作，因此使用它让我们有充足的时间找到调试器按钮、中断程序并开始检查。而我们的命令行程序则来去匆匆，让你来不及进行太多调试。因此，让我们首先在
    `main` 中设置一个断点。我们将使用 `07.01 CarParts-split`，它只是上一章中同一项目的一个副本。


    打开 `CarParts-Split.m`，然后点击装订线（如之前所见，这是焦点功能区左侧的宽条）。你会看到一个蓝色的箭头标记（是的，这是技术术语），表示你新的断点，如图
    [Figure 7-25](#9781430241881_Ch7.xhtml#_FIG25) 所示。你可以通过将断点拖出装订线来删除它，也可以通过点击它来禁用它。


    ![9781430241881_Fig07-25.tif](images/9781430241881_Fig07-25_fmt.jpg)


    [Figure 7-25](#9781430241881_Ch7.xhtml#FIG25). 设置断点


    现在，选择 **Run** 来运行你的程序。你的程序应在断点处停止，如图 [Figure 7-26](#9781430241881_Ch7.xhtml#_FIG26)
    所示。注意指向一行代码的绿色箭头。这就像商场地图上的“你在这里”标志。


    ![9781430241881_Fig07-26.tif](images/9781430241881_Fig07-26_fmt.jpg)


    [Figure 7-26](#9781430241881_Ch7.xhtml#FIG26). 你在这里


    程序停止后，你会看到导航栏上方出现了一个新的控制条，如图 [Figure 7-27](#9781430241881_Ch7.xhtml#_FIG27) 所示。


    ![9781430241881_Fig07-27.tif](images/9781430241881_Fig07-27_fmt.jpg)


    [Figure 7-27](#9781430241881_Ch7.xhtml#FIG27). 调试器控件


    耶，又多了些按钮。它们是做什么的？从左到右，第一个按钮用于打开和关闭调试面板。


    接下来的四个按钮控制程序下一步做什么。第一个按钮看起来像 CD 播放器上的播放按钮（如果你不知道 CD 播放器是什么，去问问你的父母）。这是**继续**（continue）按钮。点击它后，程序会一直运行，直到遇到断点、结束或崩溃。


    下一个控件看起来像一个圆点，上面有一个人跳过它，这是**单步跳过**（step over）按钮。它执行一行代码，然后将控制权返回给你。如果你点击**单步跳过**按钮三次，“你在这里”箭头将移动到
    `-setTire:atIndex:` 调用处，如图 [Figure 7-28](#9781430241881_Ch7.xhtml#_FIG28) 所示。


    ![9781430241881_Fig07-28.tif](images/9781430241881_Fig07-28_fmt.jpg)


    [Figure 7-28](#9781430241881_Ch7.xhtml#FIG28). 单步执行三次后


    下一个按钮，箭头向下指向一个圆点，是**单步进入**（step into）按钮。如果你当前所在的函数或方法有源代码，Xcode 将进入该函数，调出其代码，并将“你在这里”箭头设置在其开头，如图
    [Figure 7-29](#9781430241881_Ch7.xhtml#_FIG29) 所示。


    ![9781430241881_Fig07-29.tif](images/9781430241881_Fig07-29_fmt.jpg)


    [Figure 7-29](#9781430241881_Ch7.xhtml#FIG29). 进入一个方法后（本例中为 `setTire`）


    最后一个按钮是**单步跳出**（step out），它让当前函数执行完毕，然后将控制权返回到调用函数的下一条语句。如果你在跟着操作，暂时不要使用这个按钮。稍后我们将查看此方法中的一些数据值。


    最后一个控件是一个弹出菜单，让你选择要查看哪个线程。你暂时还不需要处理多线程编程，因此可以先忽略线程选择。


    在按钮的右侧，我们看到**调用堆栈**（call stack），即当前活动的函数集合。如果 A 调用了 B，而 B 又调用了 C，那么 C 被认为在堆栈的顶部，B
    和 A 在其下方。如果你现在点击打开调用堆栈菜单，它会显示 `-[Car setTire:atIndex:]`，然后是 `main`。这意味着 `main`
    调用了 `-setTire:atIndex:`。对于更复杂的程序，这个调用堆栈（也称为**堆栈跟踪**（stack trace））中可能包含数十个条目。有时，调试过程中解决的最佳问题是：“这段代码到底是怎么被调用的？”通过查看调用堆栈，你可以看到是谁调用了谁，才导致当前的（混乱）状态。


    ## 查看一下


    现在程序已经停止，下一步该做什么？通常，当你设置断点或单步执行到程序的某个特定部分时，你关心的是**程序状态**（program state）——即变量的值。


    Xcode 提供了**数据提示**（datatips），类似于当你悬停在按钮上时，工具提示会告诉你该按钮的功能。在 Xcode 编辑器中，你可以将鼠标悬停在一个变量或方法参数上，Xcode
    会弹出一个显示其值的小窗口，如图 [Figure 7-30](#9781430241881_Ch7.xhtml#_FIG30) 所示。


    ![9781430241881_Fig07-30.tif](images/9781430241881_Fig07-30_fmt.jpg)


    [Figure 7-30](#9781430241881_Ch7.xhtml#FIG30). Xcode 数据提示


    [Figure 7-30](#9781430241881_Ch7.xhtml#_FIG30) 显示我们正悬停在 `index` 上。数据提示弹出并显示其值为零，正如我们所预期的。这真的很酷：我们可以通过点击该值并输入一个新值来修改它。例如，你可以输入
    `37`，然后使用几次**单步跳过**命令，观察程序因索引越界而退出。'
  raw: 'Bugs happen. It’s a fact of life that errors creep into your programs, especially
    when you’re just starting out with a new language and a new platform. When faced
    with problems, take a deep breath, take a sip of you favorite beverage, and systematically
    try to figure out what’s gone wrong. This process of figuring out program errors
    is called **debugging**.


    Crush Puny Bugs


    The easiest kind of debugging is brute force, sometimes called **caveman debugging**,
    in which you put in print statements (like NSLog) to show the flow of control
    of your program, along with some data values. You’ve probably been doing this
    all along without knowing its name. You may run into some folks who look down
    on caveman debugging, but it can be an effective tool, especially if you’re just
    learning a new system. So ignore those naysayers.


    Xcode’s Debugger


    In addition to everything else, Xcode includes a debugger. A **debugger** is a
    program that sits between your program and the operating system and can interrupt
    your program, making it stop in its tracks and allowing you to poke around the
    program’s data and even change things. When you finish looking around, you can
    resume execution to see what happens. You can also single-step through code, slowing
    the computer down to human speed to see precisely what effect the code is having
    on your data.


    Xcode also has a debugger pane that provides a lot of information at a glance
    and a debugging console where you can type commands directly to the debugger.


    **Note**  Xcode gives you a choice of two debuggers: GDB and LLDB. GDB, part of
    the GNU project, is available on a zillion different platforms and has been around
    for many years. LLDB is the hot new contender, part of the LLVM project that is
    the source of many other Xcode tools. For now the differences between the debuggers
    is subtle and mainly internal.


    We’ll discuss debugging inside the Xcode text editor. You should definitely play
    around with the other debugging modes if you want to learn more.


    Subtle Symbolism


    When you’re planning on debugging a program, you need to make sure you’re using
    a Debug build configuration. You can check this in the **Edit Scheme** pop-up
    menu item in the Xcode toolbar. The Build configuration tells the compiler to
    emit extra debugging symbols, which the debugger uses to figure out what’s where
    in your program.


    Let’s Debug!


    Getting started with the debugger is a bit easier with a GUI program than with
    the command-line programs we’ve been using so far. A GUI program is accustomed
    to sitting around waiting for the user to do something, so using it gives us lots
    of time to find the debugger buttons, interrupt the program, and start poking
    around it. Our command-line programs, on the other hand, come and go so fast you
    can’t do much debugging on them. So let’s start by setting a breakpoint in main.
    We’ll be using *07.01 CarParts-split*, which is simply a copy of the same project
    from the previous chapter.


    Open *CarParts-Split*.m, and click in the gutter, which, as you saw earlier, is
    the wide bar to the left of the focus ribbon. You should get a blue arrow thingy
    (yes, that’s a technical term) indicating your new breakpoint, as shown in [Figure
    7-25](#9781430241881_Ch7.xhtml#_FIG25). You can delete a breakpoint by dragging
    it out of the gutter, and you can disable it by clicking it.


    ![9781430241881_Fig07-25.tif](images/9781430241881_Fig07-25_fmt.jpg)


    [Figure 7-25](#9781430241881_Ch7.xhtml#FIG25). Setting a breakpoint


    Now, select Run to run your program. Your program should stop at the breakpoint,
    as shown in [Figure 7-26](#9781430241881_Ch7.xhtml#_FIG26). Notice the green arrow
    pointing at a line of code. This is like the “you are here” sign on the map at
    the mall.


    ![9781430241881_Fig07-26.tif](images/9781430241881_Fig07-26_fmt.jpg)


    [Figure 7-26](#9781430241881_Ch7.xhtml#FIG26). You are here


    Once your program has stopped, you’ll see you’ve grown a new control strip above
    the navigation bar, shown in [Figure 7-27](#9781430241881_Ch7.xhtml#_FIG27).


    ![9781430241881_Fig07-27.tif](images/9781430241881_Fig07-27_fmt.jpg)


    [Figure 7-27](#9781430241881_Ch7.xhtml#FIG27). Debugger controls


    Yay, more buttons. What do they do? Starting from the left, the first button opens
    and closes the debug pane.


    The next four buttons control what your program does next. The first looks like
    the play button from a CD player (if you don’t know what a CD player is, ask your
    parents). This is the continue button. After you click it, the program runs until
    it hits a breakpoint, finishes, or crashes.


    The next control, which looks like a dot with someone jumping over it, is the
    step over button. This one executes one line of code and then returns control
    back to you. If you click the step over button three times, the “you are here”
    arrow will move to the -setTire:atlndex call, as shown in [Figure 7-28](#9781430241881_Ch7.xhtml#_FIG28).


    ![9781430241881_Fig07-28.tif](images/9781430241881_Fig07-28_fmt.jpg)


    [Figure 7-28](#9781430241881_Ch7.xhtml#FIG28). After single stepping three times


    The next button, the arrow pointing down into a dot, is the step into button.
    If you have the source code for the function or method you’re currently sitting
    on, Xcode will step into that function, bring up its code, and set the “you are
    here” arrow at the beginning of it, as shown in [Figure 7-29](#9781430241881_Ch7.xhtml#_FIG29).


    ![9781430241881_Fig07-29.tif](images/9781430241881_Fig07-29_fmt.jpg)


    [Figure 7-29](#9781430241881_Ch7.xhtml#FIG29). After stepping into a method (in
    this case, setTire)


    The last button is step out, which lets the current function finish and then returns
    control to you on the next line of the calling function. If you’re following along,
    don’t use this one just yet. We’ll be looking at some data values in this method
    in a little bit.


    The last control is a pop-up that lets you select which thread you want to look
    at. You won’t need to bother with threaded programming for a while, so you can
    ignore the thread selection for now.


    To the right of the buttons, we see the **call stack**, which is the current set
    of active functions. If A calls B, and B calls C, C is considered to be at the
    top of the stack, with B and A below it. If you click to open the call stack menu
    now, it has -[Car setTire:atIndex:], followed by main. That means that main called
    -setTire:atIndex:. With more complex programs, this call stack, also called a
    **stack trace**, can have dozens of entries in it. Sometimes, the best question
    answered during a debugging session is, “How the heck did *this* code get called?”
    By looking at the call stack, you can see who called whom to get to the current
    state (of confusion).


    Taking a Look-See


    Now that you’re stopped, what should you do next? Usually, when you set a breakpoint
    or single-step to a particular part of your program, you’re interested in the
    **program state**—the values of variables.


    Xcode has **datatips**, similar to the tooltips that tell you what a button does
    when you hover over it. In the Xcode editor, you can hover over a variable, or
    a method argument, and Xcode pops open a little window that shows the value, as
    shown in [Figure 7-30](#9781430241881_Ch7.xhtml#_FIG30).


    ![9781430241881_Fig07-30.tif](images/9781430241881_Fig07-30_fmt.jpg)


    [Figure 7-30](#9781430241881_Ch7.xhtml#FIG30). Xcode datatip


    [Figure 7-30](#9781430241881_Ch7.xhtml#_FIG30) shows us hovering over index. The
    datatip pops up and shows us the value is zero, as we expect. Now this is really
    cool: we can change the value by clicking the zero and typing in a new value.
    For example, you can type *37*, and then use a couple of step over commands to
