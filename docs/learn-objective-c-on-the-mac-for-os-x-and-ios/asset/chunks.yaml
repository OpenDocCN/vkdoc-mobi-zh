    The Triangle and Egg classes are similarly skinnier. Take a look at the *04.01
    Shapes-Inheritance* folder for details.


    You can now run Shapes-Inheritance and see that it works exactly as it did before.
    Notice this fascinating fact: we didn’t have to touch any of the code in main()
    that sets up and uses the objects. That’s because we didn’t change which methods
    the objects respond to, and we didn’t modify their behavior.


    **Note**  Moving and simplifying code this way is called **refactoring**, a subject
    that is quite trendy in the OOP community. When you refactor, you move code around
    to improve the architecture, as we did here to eliminate duplicate code, without
    changing the code’s behavior or results. A typical development cycle involves
    adding some features to your code and then refactoring to take out any duplication.


    You might be surprised to learn that object-oriented programs often become simpler
    after new features are *added*, which is exactly what happened when we added the
    Shapes class.


