    \ get to the end of the method where the sweet release happens. This points out\
    \ a general good practice: whenever you exit a method, you should think about\
    \ what’s been allocated and not released.\n\nTo fix this, we modify the second\
    \ `if` statement as follows:\n\n```\nif(nil == array)\n\n{\n\n    [string release];\n\
