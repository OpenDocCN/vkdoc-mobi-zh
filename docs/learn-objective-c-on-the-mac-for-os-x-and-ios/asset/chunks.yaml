    \n由于身体质量指数是根据一个人的身高和体重计算得出的，我们无法为其存储一个固定值。相反，我们希望创建一个访问器，在运行时动态计算该值。因此，我们使用 `@dynamic`\
    \ 来声明属性，并告诉编译器无需操心创建变量或 getter——我们自己来处理。\n\n```\n@property (readonly) float bodyMassIndex;\n\
    @dynamic bodyMassIndex;\n\n- (float)bodyMassIndex\n{\n    ///计算并返回 bodyMassIndex\n\
    }\n```\n\n如果你声明了一个动态属性，但尝试调用相应的 getter 或 setter 而未提供实现，则会收到错误提示。\n\n## 我不喜欢这些方法名\n\
    \n有时，你可能不喜欢默认生成的方法名。它们的形式通常是 `blah` 和 `setBlah:`。为了解决这个问题，你可以指定编译器生成的 getter 和\
    \ setter 的名称。使用 `getter=` 和 `setter=` 特性来定义你偏好的方法名。需要注意的是，如果你这样做，将会破坏键值编码约定（详见第\
    \ 19 章），因此你应该有充分的理由才使用这个特性。\n\n以下是一个适用于布尔类型属性的有用模式示例：\n\n```\n@property (getter=isHidden)\
    \ BOOL hidden;\n```\n\n这告诉编译器，为 getter 生成 `isHidden`，为 setter 生成 `setHidden:`。\n\
    \n## 可惜，属性并非万能\n\n你会注意到，我们没有将 `Car` 的轮胎方法转换为属性：\n\n```\n- (void) setTire: (Tire\
    \ *) tire atIndex: (int) index;\n- (Tire *) tireAtIndex: (int) index;\n```\n\n\
    这是因为这些方法不符合属性所涵盖的相当狭窄的方法范围。属性只允许你替换 `–setBlah` 和 `–blah` 方法，但不适用于需要额外参数的方法（例如指定轮胎在汽车上的位置）。\n\
    \n## 总结\n\n在本章中，我们讨论了属性，这是一种减少你在处理对象属性常见操作时需要编写（以及后续阅读）的代码量的方式。使用 `@property`\
    \ 指令来告知外界：“嘿，这个对象拥有一个名为 xxx、类型为 yyy 的属性。”同时，使用该指令来传递属性的相关信息，如其可变性（`readonly` 或\
    \ `readwrite`）。在幕后，编译器会自动为对象属性的 setter 和 getter 生成方法声明。\n\n使用 `@synthesize` 指令来告诉编译器为访问器生成实现代码。你可以控制生成的实现会影响哪一个实例变量。如果你不想使用默认行为，也可以自由编写自己的访问器代码。你可以使用\
    \ `@dynamic` 来告诉编译器不要生成变量或代码。\n\n点语法虽然通常在与属性相关的上下文中介绍，但它仅仅是调用对象的 setter 和 getter\
    \ 的简写形式。点语法减少了你的键盘敲击量，对来自其他语言的开发者来说也更为顺手。\n\n接下来将要介绍的是类别（Categories），这是一种 Objective-C\
    \ 特有的扩展现有类的方式，即使你没有它们的原始代码也能实现扩展！千万别错过。\n\n## 第 12 章\n\n### 类别\n\n在编写面向对象程序时，你常常需要为现有类添加一些新行为：你总是可以为对象创建新的“技能点”。例如，你设计了一种新型轮胎，因此你可以子类化\
    \ `Tire` 并添加炫酷的新功能。当你想为现有类添加行为时，通常的做法就是创建一个子类。\n"
- fmt: 'But sometimes, subclassing isn’t convenient. For example, you might want to
    add some new behavior to `NSString`, but you remember that `NSString` is really
    the front end for a class cluster, which makes it difficult to subclass. In other
    cases, you might be able to make a subclass, but you’re using a toolkit or library
    that won’t be able to handle objects of the new class. For example, your new subclass
    of `NSString` won’t be returned when you make a new string with the `stringWithFormat:`
    class method.


    The dynamic runtime dispatch mechanism employed by Objective-C lets you add methods
    to existing classes. Hey, that sounds pretty cool! The Objective-C term for these
    new methods is categories.


    ## Creating a Category


    A category is a way to add new methods to existing classes. Want to add a new
    method to a class? Go right ahead! You can do this to any class, even classes
    you don’t have the source code for.


    For example, let’s say you are writing a crossword puzzle program that takes a
    series of strings, determines the length of each string, and puts those lengths
    into an `NSArray` or `NSDictionary`. You’ll need to wrap each length in an `NSNumber`
    object before adding it into the `NSArray` or `NSDictionary`.


    You could write this code:


    ```

    NSNumber *number;


    number = [NSNumber numberWithUnsignedInt: [string length]];


    // … do something with number

    ```


    But that would soon get tedious. Instead, you could add a category to `NSString`
    that does this work for you. In fact, let’s do that. The `LengthAsNSNumber` project
    is located in the *12.01 LengthAsNSNumber* project directory and contains the
    code that adds such a category to `NSString`.


    Programmers often put categories in their own files, typically named *ClassName+CategoryName*.
    So, in our case, this would be *NSString+NumberConvenience*. This isn’t a requirement,
    but it’s a good practice.


    ## Let’s Create a Category


    Xcode makes adding categories very easy. It even names the files correctly according
    to the convention we just described.


    To create a category, open the project, go to the Navigator, and select the group
    where you want the files to show up. Next, select File ![image](images/9781430241881_arrow_fmt.jpg)
    New ![image](images/9781430241881_arrow_fmt.jpg) New File or type ![image](images/Rangoli1.jpg)
    N. In the New File window, click Cocoa in the left pane and *Objective-C category*
    on the right (see [Figure 12-1](#9781430241881_Ch12.xhtml#_FIG1)).


    ![9781430241881_Fig12-01.tif](images/9781430241881_Fig12-01_fmt.jpg)


    [Figure 12-1](#9781430241881_Ch12.xhtml#FIG1). Create a new file for the category


    Click Next, and on the next screen (see [Figure 12-2](#9781430241881_Ch12.xhtml#_FIG2)),
    type *NumberConvenience* for the category and *NSString* in the Category on field;
    `NSString` is the class we want to add methods to. Click Next to go on.


    ![9781430241881_Fig12-02.tif](images/9781430241881_Fig12-02_fmt.jpg)


    [Figure 12-2](#9781430241881_Ch12.xhtml#FIG2). Enter the category name and the
    associated class


    The next screen (shown in [Figure 12-3](#9781430241881_Ch12.xhtml#_FIG3)) asks
    where to save the files and which target and group to add them to. Usually, you’ll
    accept the selections Xcode has made. Click Create, and now, we have a header
    file with category interface and an implementation file ready for us to add methods.


    ![9781430241881_Fig12-03.tif](images/9781430241881_Fig12-03_fmt.jpg)


    [Figure 12-3](#9781430241881_Ch12.xhtml#FIG3). Specify the file location and source
    group and targets


    ### `@interface`


    The declaration of a category looks a lot like the declaration for a class:


    ```

    @interface NSString (NumberConvenience)


    - (NSNumber *) lengthAsNumber;


    @end // NumberConvenience

    ```


    You should notice a couple of interesting things about this declaration. First,
    an existing class is mentioned, followed by a new name in parentheses. This means
    that the category is called `NumberConvenience`, and it adds methods to `NSString`.
    Another way to say this is, “We’re adding a category onto `NSString` called `NumberConvenience`.”
    You can add as many categories to a class as you want, as long as the category
    names are unique.


    You indicate the class you’re putting the category onto (`NSString`) and the name
    of the category (`NumberConvenience`), and you list the methods you’re adding,
    followed by `@end`. You can’t add new instance variables, so there is no instance
    variable section as there is with a class declaration.


    You can also add properties to categories. Because you can’t add instance variables,
    the properties must be of `@dynamic` type. The benefit of adding properties is
    that you can use dot notation to access the setters and getters.


    ### `@implementation`


    It comes as no surprise that the `@interface` section has an `@implementation`
    companion. You put the methods you’re writing in `@implementation`:


    ```

    @implementation NSString (NumberConvenience)


    - (NSNumber *) lengthAsNumber


    {


    NSUInteger length = [self length];


    return ([NSNumber numberWithUnsignedInt:length]);


    } // lengthAsNumber


    @end // NumberConvenience

    ```


    Like `@interface` for the category, `@implementation` has the names of the class
    and the category, along with the bodies of the new methods.


    The `lengthAsNumber` method gets the length of the string by calling `[self length]`.
    You will send the `lengthAsNumber` message to this string. Then, a new `NSNumber`
    is created with the length.


    Let’s take a quick time-out for one of our new favorite topics: memory management.
    Is this code correct? Yes! `numberWithUnsignedInt` is not an `alloc`, `copy`,
    or `new` method. Because it’s not one of those three, it will return an object
    that we can assume has a retain count of 1 and has been autoreleased. The `NSNumber`
    object we create will get cleaned up when the currently active autorelease pool
    is destroyed.


    And here is the new category in action. `main()` creates a new `NSMutableDictionary`,
    adds three strings as the keys and the length of the strings as the values:


    ```

    int main(int argc, const char * argv[])


    {


    @autoreleasepool


    {


    NSMutableDictionary *dict = [NSMutableDictionary dictionary];


    [dict setObject:[@"hello" lengthAsNumber]


    forKey:@"hello"];


    [dict setObject:[@"iLikeFish" lengthAsNumber]


    forKey:@"iLikeFish"];


    [dict setObject:[@"Once upon a time" lengthAsNumber]


    forKey:@"Once upon a time"];


    NSLog (@"%@", dict);


    }


    return 0;


    }

    ```


    Let’s pull this apart, piece by piece, in our usual fashion.


    The first thing we need to do is import the header file into `main()` so we know
    that we have this method defined for `NSString`. At the end of the other `#import`
    statements, we add the following:


    ```

    #import "NSString+NumberConvenience.h"

    ```


    Next, we create an autorelease pool, the ARC-tastic way:


    ```

    @autoreleasepool {

    ```


    Don’t forget the closing brace at the end of your code. Just as a reminder, this
    pool is where all the autoreleased objects go. In particular, the mutable dictionary
    will end up in here, as will all of the `NSNumber`s our category creates.


    After the pool is made, a new mutable dictionary is created. Recall that this
    handy Cocoa class lets us store pairs of keys and objects.


    ```

    NSMutableDictionary *dict = [NSMutableDictionary dictionary];

    ```


    We can’t put primitive types like ints into a dictionary, so we have to use a
    wrapper class like `NSNumber`. Luckily, our shiny new category makes it easy to
    embed our string length into an `NSNumber`. Here is the code that adds the value
    5 to the dictionary, using the key `@"hello"`:


    ```

    [dict setObject: [@"hello" lengthAsNumber] forKey: @"hello"];

    ```'
