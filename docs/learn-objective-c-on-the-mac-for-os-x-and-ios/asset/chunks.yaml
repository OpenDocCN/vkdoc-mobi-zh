    \ for the signed character type (`signed char`), which uses 8 bits of storage.\
    \ `YES` is defined as `1` and `NO` as `0` (using `#define`).\n\nObjective-C doesn’t\
    \ treat `BOOL` as a true Boolean type that can hold only `YES` or `NO` values.\
    \ The compiler considers `BOOL` to be an 8-bit number, and the values of `YES`\
    \ and `NO` are just a convention. This causes a subtle gotcha: if you inadvertently\
    \ assign an integer value that’s more than 1 byte long, such as a `short` or an\
    \ `int` value, to a `BOOL` variable, only the lowest byte is used for the value\
    \ of the `BOOL`. If that byte happens to be zero (as with `8960`, which in hexadecimal\
    \ is `0x2300`), the `BOOL` value will be zero, the `NO` value.\n\n## Mighty `BOOL`\
    \ in Action\n\nTo show mighty `BOOL` in action, we move on to our next project,\
    \ `02.02 - BOOL Party`, which compares pairs of integers to see if they’re different.\
    \ Aside from `main()`, the program defines two functions. The first, `areIntsDifferent()`,\
    \ takes two integer values and returns a `BOOL`: `YES` if the integers are different\
    \ and `NO` if they are the same. A second function, `boolString()`, takes a `BOOL`\
    \ parameter and returns the string `@\"YES\"` if the parameter is `YES` and `@\"\
    NO\"` if the parameter is `NO`. This function is handy to have around when you\
    \ want to print out a human-readable representation of `BOOL` values. `main()`\
    \ uses these two functions to compare integers and print out the results.\n\n\
    Creating the project for `BOOL Party` is exactly the same process as making the\
    \ project for `Hello Objective-C`:\n\n1.  Launch Xcode, if it’s not already running.\n\
    2.  Select File ![image](images/9781430241881_arrow_fmt.jpg) New ![image](images/9781430241881_arrow_fmt.jpg)\
    \ New Project.\n3.  Choose *Application* on the left and *Command Line Tool* on\
    \ the right.\n4.  Click *Next*.\n5.  Type `BOOL Party` as the Project Name, and\
    \ click Next.\n6.  Click *Create*.\n\nEdit `main.m` to make it look like this:\n\
    \n```\n#import <Foundation/Foundation.h>\n\n// returns NO if the two integers\
