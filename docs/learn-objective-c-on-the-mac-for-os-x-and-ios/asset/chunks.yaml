    Now, we can rename appellation to something else, like nickname or moniker. We
    just need to change the instance variable name and the name used in @synthesize.


    Because subclasses of the car do not need to access variables directly, let’s
    kick them out of the header file. We can eliminate the name and the engine variable,
    as they will be created by the compiler. And we can move the tires array into
    the implementation file. This makes our header file even simpler (which makes
    it better).


    Now that we have fixed this, let’s go back to the *AllWeatherRadial.m* file. Notice,
    attentive reader, that in the description method, we’re still using methods to
    get the attributes of the tire. Let’s change all of those to use dot syntax. Our
    description method now looks like this:


    - (NSString *) description


    {


    NSString *desc;


    desc = [[NSString alloc] initWithFormat:


    @"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f",


    self.pressure, self.treadDepth, self.rainHandling, self.snowHandling];


    return (desc);


    } // description


    Next we’ll fix the Tire class and properties for pressure and treadDepth, and
    we’ll get rid of the getters and setters. We have simplified the Tire interface
    (and code) without losing any functionality.


    @interface Tire : NSObject


    @property float pressure;


    @property float treadDepth;


    - (id) initWithPressure: (float) pressure;


    - (id) initWithTreadDepth: (float) treadDepth;


    - (id) initWithPressure: (float) pressure


    treadDepth: (float) treadDepth;


    @end // Tire


    We also got rid of the setters and getters from the implementation file. We’re
    having a great time getting rid of unnecessary clutter and ripping out code where
    bugs could hide.


    One more thing: you might remember that we added the name property to Car, which
    had the copy attribute. That means that when we assign the name, Car makes a copy
    of the string and stores it. If we weren’t using ARC, we would need to add a release
    to the dealloc method of Car, like so:


    [name release];


    But because we are using ARC, we don’t need to worry about that; the compiler
    will insert it there for us. It’s ARC-tastic!


    Read-Only About It


    You might have an object with an attribute that is read-only. This attribute might
    be a value that’s computed on the fly, like the surface area of a banana, or might
    be one that you want other objects to read but not change, like your driver’s
    license number. You can code for these situations with more attributes on @property.


    By default, properties are mutable: you can read and write them. Properties have
    a readwrite attribute you can use for specifying this. Since properties are mutable
    by default, you won’t usually use it, but it’s there if you need it and you want
    to make your intentions clear. We could have used readwrite in *Car.h*:


    @property (readwrite, copy) NSString *name;


    @property (readwrite, retain) Engine *engine;


    But we didn’t, because we generally want to stamp out and abolish and get rid
    of redundancy and repetition and saying the same thing over again.


    Returning to our read-only property discussion, let’s say we have a property,
    such as our license number or shoe size, that we don’t want to be changed by anybody.
    We can use the readonly attribute on @property for this. An example class would
    be something like this:


    @interface Me : NSObject


    {


    float shoeSize;


    NSString *licenseNumber;


    }


    @property (readonly) float shoeSize;


    @property (readonly) NSString *licenseNumber;


    @end


    When the compiler sees that @property is readonly, it generates a getter but not
    a setter for that attribute. Users of Me can call –shoeSize and –licenseNumber,
    but if you try to call -setShoeSize:, the compiler will complain. You’ll get the
    same behavior when using dot notation.


    I’d Rather Do It Myself


    We mentioned that properties are backed by variables, and that the compiler creates
    getters and setters for you. But what if you don’t want any of that? What if you’d
    rather not have a variable, getter, and setter for your property?


    In that case, you’re covered. You can use the keyword @dynamic to tell the compiler
    not to generate any code or create a variable for the property. Continuing from
    the previous examples, let’s add the bodyMassIndex property to the Me class.


    Because body mass index is calculated from a person’s height and weight, we can’t
    store the value for it. Instead, we want to create an accessor to compute the
    value at runtime. So we use @dynamic to specify a property and tell the compiler
    not to worry about creating a variable or a getter—we’ll take care of it.


    @property (readonly) float bodyMassIndex;


    @dynamic bodyMassIndex;


    - (float)bodyMassIndex


    {


    ///compute and return bodyMassIndex


    }


    If you declare a dynamic property and you try to call a getter or setter without
    providing one, you’ll get an error.


    I Don’t Like the Method Names


    Sometimes, you might not like the names of the methods that are generated by default.
    They’re in the form of blah and setBlah:. To overcome this, you can specify the
    names of the getter and setter that the compiler generates. Use the attributes
    getter= and setter= to define the preferred names of your methods. If you do this,
    note that you’ll break the key-value coding convention (described in detail in
    [Chapter 19](#9781430241881_Ch19.xhtml)), so you should have a good reason for
    using this feature.


    Here’s an example of a pattern that’s useful for properties of Boolean types:


    @property (getter=isHidden) BOOL hidden;


    This tells the compiler to generate isHidden for the getter and setHidden: for
    the setter.


    Alas, Properties Don’t Do Everything


    You’ll notice we didn’t convert Car’s tire methods to properties:


    - (void) setTire: (Tire *) tire atIndex: (int) index;


    - (Tire *) tireAtIndex: (int) index;


    That’s because these methods don’t fit into the fairly narrow range of methods
    that properties cover. Properties will let you replace only –setBlah and –blah
    methods, but not methods that take extra arguments, like the tire’s position on
    the car.


    Summary


    In this chapter, we discussed properties, which are a way to reduce the amount
    of code you have to write (and read later) when doing common operations with object
    attributes. Use the @property directive to tell the world, “Hey, this object has
    this attribute of this name of this type.” Also use the directive to pass on some
    information about the property, like its mutability (readonly or readwrite). Behind
    the scenes, the compiler automatically generates the method declarations for the
    setter and getter for the object’s attribute.


    Use the @synthesize directive to tell the compiler to generate the implementation
    for the accessors. You can control which instance variable is affected by the
    generated implementation. If you don’t want to use the default behavior, you’re
    free to write your own code for the accessors. You can use @dynamic to tell the
    compiler not to generate a variable or code.


    Dot notation, although usually presented in the context of properties, is just
    shorthand for calling the setter and getter for objects. Dot notation reduces
    the amount of typing you have to do and is a little more comfortable for folks
    coming from other languages.


    Coming up next are categories, Objective-C’s way of letting you extend existing
    classes, even if you don’t have the code for them! Don’t miss that.


    Chapter 12


    Categories


    When you write object-oriented programs, you’ll often want to add some new behavior
    to an existing class: you can always create new hoops for objects to jump through.
    For example, you might have designed a new kind of tire, so you’d subclass Tire
    and add the new cool stuff. When you want to add behavior to an existing class,
    you’ll often create a subclass.'
