    \ `init` 方法就是指定初始化方法，类的所有初始化方法都会通过它来完成初始化工作。子类则通过父类的指定初始化方法来执行父类的初始化操作。通常，参数最多的\
    \ `init` 方法会成为指定初始化方法。如果你在使用他人编写的代码，请务必查阅文档，确认哪个方法是指定初始化方法。\n\n### 修复 Tire 的初始化方法\n\
    \n首先，我们需要确定 `Tire` 的哪个初始化方法应被指定为指定初始化方法。`initWithPressure:treadDepth:` 是个不错的选择，它参数最多，也是最灵活的初始化方法。\n\
    \n为了履行指定初始化方法的职责，其他所有初始化方法都应基于 `initWithPressure:treadDepth:` 来实现。代码示例如下：\n\n\
    ```objectivec\n- (id) init\n{\n  if (self = [self initWithPressure: 34 treadDepth:\
    \ 20])\n  {\n  }\n  return (self);\n} // init\n\n- (id) initWithPressure: (float)\
    \ p\n{\n  if (self = [self initWithPressure: p treadDepth: 20.0])\n  {\n  }\n\
    \  return (self);\n} // initWithPressure\n\n- (id) initWithTreadDepth: (float)\
    \ td\n{\n  if (self = [self initWithPressure: 34.0 treadDepth: td])\n  {\n  }\n\
    \  return (self);\n} // initWithTreadDepth\n```\n\n**注意** 你并不需要在 `initWithPressure:treadDepth:`\
    \ 的 `if` 语句中保留空方法体。我们之所以这样写，是为了让所有 `init` 方法保持一致的风格。\n\n### 添加 AllWeatherRadial\
    \ 的初始化方法\n\n现在，轮到为 `AllWeatherRadial` 添加初始化方法了。我们只需重写指定初始化方法：\n\n```objectivec\n\
    - (id) initWithPressure: (float) p\n  treadDepth: (float) td\n{\n  if (self =\
    \ [super initWithPressure: p treadDepth: td])\n  {\n    rainHandling = 23.7;\n\
    \    snowHandling = 42.5;\n  }\n  return (self);\n} // initWithPressure:treadDepth\n\
    ```\n\n现在再次运行程序时，默认值已经正确设置：\n\n```\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\n\
    AllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial: 34.0 / 20.0 / 23.7\
    \ / 42.5\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\n```\n\nI am a slant-6.\
    \ VROOOM!\n\n确实好使！\n\n### 初始化方法规则\n\n-   你并非一定要为类创建初始化方法。如果不需要设置任何状态，或者 `alloc`\
    \ 将内存全部清零的默认行为已经足够，你可以选择不编写 `init` 方法。\n-   如果确实要编写初始化方法，请确保在自己的指定初始化方法中调用了父类的指定初始化方法。\n\
    -   如果包含多个初始化方法，请选定一个作为指定初始化方法。该方法将负责调用父类的指定初始化方法。如前所述，所有其他初始化方法都应基于你的指定初始化方法来实现。\n\
    \n### 总结\n\n本章介绍了关于对象分配与初始化的全部内容。在 Cocoa 中，这是两个独立的过程：`alloc`（来自 `NSObject` 的类方法）负责分配一块内存并将其清零；而\
    \ `init` 方法（实例方法）则负责将对象启动并运行起来。"
- fmt: "一个类可以有多个`init`方法。这些`init`方法通常是便捷方法，可以让你更方便地按照期望的方式配置对象。你需要选择其中一个`init`方法作为指定初始化器（`designated\
    \ initializer`）。所有其他的`init`方法都应基于该指定初始化器来编写。\n\n在你自己的`init`方法中，你需要调用你自己的指定初始化器或父类的指定初始化器。请务必将父类初始化器的返回值赋值给`self`，并从你的`init`方法中返回该值。父类有可能决定返回一个完全不同的对象。\n\
    \n接下来要介绍的是属性（`Properties`），这是一种快速便捷地创建访问器方法的方式。\n\n## 第11章 属性\n\n还记得在很久以前，我们为实例变量编写访问器方法的时候吗？我们编写了大量样板代码，既要创建`–setBlah`方法来设置对象的`blah`属性（显而易见），又要创建`–blah`方法来获取它。如果属性是一个对象，我们还需要保留新对象并释放旧对象。市面上有一些实用工具，可以将你的类定义转换为方法声明和定义，然后你可以将其粘贴到文件中。但即便如此，编写访问器方法仍然是一项大量令人麻木的工作，而这些精力本可以更好地用于实现你程序中独特而酷炫的功能。\n\
    \n在Objective-C 2.0中，Apple引入了**属性**，它结合了新的编译器指令和新的属性访问语法。新的属性特性大大减少了你必须编写的无脑代码量。在本章中，我们将修改`10.01\
    \ CarPartsInit`项目以使用属性。本章的最终代码可以在`11.01 CarProperties`项目中找到。\n\n请记住，Objective-C\
    \ 2.0的特性只能在Mac OS X 10.5（Leopard）或更高版本上使用，所以如果你需要支持较老的系统，必须三思而后行。属性在Cocoa的新版本（特别是炫酷的Core\
    \ Animation特性）中大量使用，在iOS开发中也频繁使用，因此非常值得熟悉。\n\n### 精简属性值\n\n首先，我们将转换一个相对简单的类`AllWeatherRadial`，使其使用属性。为了让讨论更有趣一点，我们将在`main`函数中添加一些调用，来改变我们创建的`AllWeatherRadial`对象的一些值。我们模拟某人从不同的商店购买了四个打折轮胎，因此四个轮胎的操控特性各不相同。\n\
    \n下面是更新后的`main`函数，新添加的行以粗体显示：\n\n```\nint main(int argc, const char * argv[])\n\
    {\n    @autoreleasepool\n    {\n        Car *car = [[Car alloc] init];\n     \
    \   for (int i = 0; i < 4; i++)\n        {\n            AllWeatherRadial *tire;\n\
    \            tire = [[AllWeatherRadial alloc] init];\n            [tire setRainHandling:20+i];\n\
    \            [tire setSnowHandling:28+i];\n            NSLog(@\"tire %d's handling\
    \ is %.f %.f\", i,\n                  [tire rainHandling], [tire snowHandling]);\n\
    \            [car setTire:tire atIndex:i];\n            [tire release];\n    \
    \    }\n        \n        Engine *engine = [[Slant6 alloc] init];\n        [car\
    \ setEngine:engine];\n        [car print];\n        [car release];\n    }\n  \
    \  return (0);\n}\n```\n\n如果你现在运行程序，会得到以下输出，显示了我们新改变的轮胎操控值：\n\n```\ntire 0's handling\
    \ is 20 28\ntire 1's handling is 21 29\ntire 2's handling is 22 30\ntire 3's handling\
    \ is 23 31\nAllWeatherRadial: 34.0 / 20.0 / 20.0 / 28.0\nAllWeatherRadial: 34.0\
    \ / 20.0 / 21.0 / 29.0\nAllWeatherRadial: 34.0 / 20.0 / 22.0 / 30.0\nAllWeatherRadial:\
    \ 34.0 / 20.0 / 23.0 / 31.0\nI am a slant-6. VROOOM!\n```\n\n### 精简接口\n\n现在让我们看看`AllWeatherRadial`的类接口：\n\
    \n```objective-c\n#import <Foundation/Foundation.h>\n#import \"Tire.h\"\n\n@interface\
    \ AllWeatherRadial : Tire\n{\n    float rainHandling;\n    float snowHandling;\n\
    }\n- (void) setRainHandling: (float) rainHanding;\n- (float) rainHandling;\n-\
    \ (void) setSnowHandling: (float) snowHandling;\n- (float) snowHandling;\n@end\
    \ // AllWeatherRadial\n```\n\n现在你应该已经对此非常熟悉了。让我们用属性的方式来清理它：\n\n```objective-c\n\
    #import <Foundation/Foundation.h>\n#import \"Tire.h\"\n\n@interface AllWeatherRadial\
    \ : Tire\n{\n    float rainHandling;\n    float snowHandling;\n}\n@property float\
    \ rainHandling;\n@property float snowHandling;\n@end // AllWeatherRadial\n```\n\
    \n是不是更简单了？不需要那四个方法定义了。注意，我们增加了一对以`@`符号开头的关键字。回忆一下，`@`符号是“Objective-C的独特语法即将出现”的信号！`@property`是一个新的编译器特性，用于声明一个新的对象属性。\n\
    \n`@property float rainHandling;`表明`AllWeatherRadial`类的对象有一个`float`类型的属性，名为`rainHandling`。它还表明你可以通过调用`–setRainHanding:`来设置该属性，并通过调用`-rainHandling`来访问该属性。你现在就可以运行程序，其行为与之前完全一样。`@property`所做的仅仅是自动声明该属性的`setter`和`getter`方法。该属性实际上不必与实例变量的名称完全一致，但在大多数情况下是一致的。我们稍后会讨论这个问题。你还可以对属性进行一些额外的配置，我们稍后也会讨论，请耐心等待。\n\
    \n### 精简实现\n\n现在，让我们再次看看`AllWeatherRadial`的实现：\n\n```objective-c\n#import \"AllWeatherRadial.h\"\
    \n\n@implementation AllWeatherRadial\n- (id) initWithPressure: (float) p treadDepth:\
    \ (float) td\n{\n    if (self = [super initWithPressure: p treadDepth: td])\n\
    \    {\n        rainHandling = 23.7;\n        snowHandling = 42.5;\n    }\n  \
    \  return (self);\n} // initWithPressure:treadDepth\n\n- (void) setRainHandling:\
    \ (float) rh\n{\n    rainHandling = rh;\n} // setRainHandling\n\n- (float) rainHandling\n\
    {\n    return (rainHandling);\n} // rainHandling\n\n- (void) setSnowHandling:\
    \ (float) sh\n{\n    snowHandling = sh;\n} // setSnowHandling\n\n- (float) snowHandling\n\
    {\n    return (snowHandling);\n} // snowHandling\n\n- (NSString *) description\n\
    {\n    NSString *desc;\n    desc = [[NSString alloc] initWithFormat:\n       \
    \     @\"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f\",\n            [self pressure],\
    \ [self treadDepth],\n            [self rainHandling],\n            [self snowHandling]];\n\
    \    return (desc);\n} // description\n@end // AllWeatherRadial\n```\n\n在上一章中，我们讨论了`init`方法、指定初始化器、所有的`setter`和`getter`方法，以及`description`方法。现在，我们将毫不留情地删除所有`setter`和`getter`方法，并用两行代码替换它们：\n\
    \n```objective-c\n#import \"AllWeatherRadial.h\"\n\n@implementation AllWeatherRadial\n\
    @synthesize rainHandling;\n@synthesize snowHandling;\n\n- (id) initWithPressure:\
    \ (float) p\n            treadDepth: (float) td\n{\n    if (self = [super initWithPressure:\
    \ p treadDepth: td])\n    {\n        rainHandling = 23.7;\n        snowHandling\
    \ = 42.5;\n    }\n    return (self);\n} // initWithPressure:treadDepth\n\n- (NSString\
    \ *) description\n{\n    NSString *desc;\n    desc = [[NSString alloc] initWithFormat:\n\
    \            @\"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f\", [self pressure],\
    \ [self treadDepth],\n            [self rainHandling], [self snowHandling]];\n\
    \    return (desc);\n} // description\n@end // AllWeatherRadial\n```\n\n`@synthesize`是一个编译器特性，意思是“为此属性创建访问器方法”。对于代码行`@synthesize\
    \ rainHandling;`，编译器会发出`–setRainHandling:`和`–rainHandling`的编译后代码。\n\n**注意** 你可能熟悉代码生成：Cocoa的访问器编写工具和其他平台上的UI构建器会生成源代码，然后进行编译。但`@synthesize`并非代码生成。你永远看不到实现`–setRainHandling:`和`–rainHandling`的源代码，但这些方法会存在并且可以被调用。这使Apple能够灵活地更改Objective-C中访问器的生成方式，从而实现更安全的实现或更好的性能。\n\
    \n如果你在类中为属性提供了这些方法，编译器就不会再创建它们。编译器只创建缺失的方法。\n\n如果你现在运行程序，会得到与修改前相同的结果。"
  raw: 'A class can have more than one init method. These init methods are usually
    convenience methods that make it easier to get the object configured the way you
    want. You’ll choose one of these init methods to be the designated initializer.
    All other init methods are coded in terms of the designated initializer.


    In your own init methods, you need to call either your own designated initializer
    or the superclass’s designated initializer. Be sure to assign the value of the
    superclass’s initializer to self and return that value from your init method.
    It’s possible for a superclass to decide to return an entirely different object.


    Coming next are properties, a quick and easy way to make your accessor methods.


    Chapter 11


    Properties


    Remember back in the mists at the dawn of time when we wrote accessor methods
    for our instance variables? We wrote a lot of boilerplate code, creating both
    a –setBlah method to set the object’s blah attribute (obviously) and a –blah method
    to retrieve it. If the attribute is an object, we needed to retain the new one
    and release the old one. Utilities are out there that will turn your class definition
    into method declarations and definitions that you can paste into your files. But
    still, writing accessor methods is a lot of mind-numbing work that can better
    be applied to doing the cool stuff that’s unique to your program.


    In Objective-C 2.0, Apple introduced **properties**, a combination of new compiler
    directives and a new attribute accessor syntax. The new properties feature greatly
    reduces the amount of mindless code you have to write. Throughout this chapter,
    we’ll be modifying *10.01 CarPartsInit* to use properties. The final code for
    this chapter can be found in the *11.01 CarProperties* project.


    Remember that Objective-C 2.0 features can only be used on Mac OS X 10.5 (Leopard)
    or later, so if you must support ancient systems, you have to think twice. Properties
    are used heavily in newer parts of Cocoa (especially the snazzy Core Animation
    features) and are also used a lot in iOS development, so they’re worth getting
    familiar with.


    Shrinking Property Values


    First off, we’re going to convert one of the simpler classes, AllWeatherRadial,
    to use properties. To make the discussion a little more interesting, we’ll add
    a couple of calls in main to change some values on the AllWeatherRadials we create.
    We’re simulating someone buying four tires on sale from different stores, so all
    four have different handling characteristics.


    Here is main again, with the new lines in bold:


    int main(int argc, const char * argv[])


    {


    @autoreleasepool


    {


    Car *car = [[Car alloc] init];


    for (int i = 0; i < 4; i++)


    {


    AllWeatherRadial *tire;


    tire = [[AllWeatherRadial alloc] init];


    [tire setRainHandling:20+i];


    [tire setSnowHandling:28+i];


    NSLog(@"tire %d''s handling is %.f %.f", i,


    [tire rainHandling], [tire snowHandling]);


    [car setTire:tire atIndex:i];


    [tire release];


    }


    Engine *engine = [[Slant6 alloc] init];


    [car setEngine:engine];


    [car print];


    [car release];


    }


    return (0);


    }


    If you run the program now, you’ll get this output, showing our newly changed
    tire handling values:


    tire 0''s handling is 20 28


    tire 1''s handling is 21 29


    tire 2''s handling is 22 30


    tire 3''s handling is 23 31


    AllWeatherRadial: 34.0 / 20.0 / 20.0 / 28.0


    AllWeatherRadial: 34.0 / 20.0 / 21.0 / 29.0


    AllWeatherRadial: 34.0 / 20.0 / 22.0 / 30.0


    AllWeatherRadial: 34.0 / 20.0 / 23.0 / 31.0


    I am a slant-6\. VROOOM!


    Shrinking the Interface


    Now let’s look at AllWeatherRadial’s class interface:


    #import <Foundation/Foundation.h>


    #import "Tire.h"


    @interface AllWeatherRadial : Tire


    {


    float rainHandling;


    float snowHandling;


    }


    - (void) setRainHandling: (float) rainHanding;


    - (float) rainHandling;


    - (void) setSnowHandling: (float) snowHandling;


    - (float) snowHandling;


    @end // AllWeatherRadial


    This should be old hat for you by now. Let’s clean it up, property-style:


    #import <Foundation/Foundation.h>


    #import "Tire.h"


    @interface AllWeatherRadial : Tire


    {


    float rainHandling;


    float snowHandling;


    }


    @property float rainHandling;


    @property float snowHandling;


    @end // AllWeatherRadial


    A bit simpler, isn’t it? No need for the four method definitions. Notice that
    we’ve grown two keywords preceded by at signs. Recall that the at sign is a signal
    for “Objective-C weirdness coming your way”! @property is a new compiler feature
    that says a new object attribute is being declared.


    @property float rainHandling; says that objects of the class AllWeatherRadial
    have an attribute, of type float, called rainHandling. It also says that you can
    set the property by calling –setRainHanding: and that you can access the attribute
    by calling -rainHandling. You can run the program now, and it behaves just as
    it did before. All @property is doing is automatically declaring the setter and
    getter methods for the attribute. The attribute doesn’t actually have to match
    the name of the instance variable, but it will in most cases. We’ll talk about
    this a bit later. There are also some additional knobs you can turn on the properties;
    we’ll talk about them later too, so please hang on.


    Shrinking the Implementation


    Now, let’s look at the AllWeatherRadial implementation again:


    #import "AllWeatherRadial.h"


    @implementation AllWeatherRadial


    - (id) initWithPressure: (float) p treadDepth: (float) td


    {


    if (self = [super initWithPressure: p treadDepth: td])


    {


    rainHandling = 23.7;


    snowHandling = 42.5;


    }


    return (self);


    } // initWithPressure:treadDepth


    - (void) setRainHandling: (float) rh


    {


    rainHandling = rh;


    } // setRainHandling


    - (float) rainHandling


    {


    return (rainHandling);


    } // rainHandling


    - (void) setSnowHandling: (float) sh


    {


    snowHandling = sh;


    } // setSnowHandling


    - (float) snowHandling


    {


    return (snowHandling);


    } // snowHandling


    - (NSString *) description


    {


    NSString *desc;


    desc = [[NSString alloc] initWithFormat:


    @"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f",


    [self pressure], [self treadDepth],


    [self rainHandling],


    [self snowHandling]];


    return (desc);


    } // description


    @end // AllWeatherRadial


    In the previous chapter, we discussed the init method, the designated initializer,
    all the setter and getter methods, and the description. We’re now going to ruthlessly
    eliminate all the setter and getter methods and replace them with two lines of
    code:


    #import "AllWeatherRadial.h"


    @implementation AllWeatherRadial


    @synthesize rainHandling;


    @synthesize snowHandling;


    - (id) initWithPressure: (float) p


    treadDepth: (float) td


    {


    if (self = [super initWithPressure: p treadDepth: td])


    {


    rainHandling = 23.7;


    snowHandling = 42.5;


    }


    return (self);


    } // initWithPressure:treadDepth


    - (NSString *) description


    {


    NSString *desc;


    desc = [[NSString alloc] initWithFormat:


    @"AllWeatherRadial: %.1f / %.1f / %.1f / %.1f", [self pressure], [self treadDepth],


    [self rainHandling], [self snowHandling]];


    return (desc);


    } // description


    @end // AllWeatherRadial


    @synthesize is a compiler feature that says “create the accessors for this attribute.”
    For the line of code @synthesize rainHandling;, the compiler emits the compiled
    code for –setRainHandling: and –rainHandling.


    **Note** You may be familiar with code generation: Cocoa accessor-writing utilities
    and UI builders on other platforms generate source code, which is then compiled.
    But @synthesize is not code generation. You won’t ever see the code that implements
    –setRainHandling: and –rainHandling, but these methods will exist and will be
    callable. This gives Apple the flexibility of changing the way accessors are generated
    in Objective-C, possibly leading to safer implementations or better performance.


    If you provide the methods in your class for the property, the compiler doesn’t
    create them. The compiler only creates methods that are missing.


    If you run the program now, you’ll get the same results as before the changes.'
  trans: "\n一个类可以有多个`init`方法。这些`init`方法通常是便捷方法，可以让你更方便地按照期望的方式配置对象。你需要选择其中一个`init`方法作为指定初始化器（`designated\
    \ initializer`）。所有其他的`init`方法都应基于该指定初始化器来编写。\n\n在你自己的`init`方法中，你需要调用你自己的指定初始化器或父类的指定初始化器。请务必将父类初始化器的返回值赋值给`self`，并从你的`init`方法中返回该值。父类有可能决定返回一个完全不同的对象。\n\
