    ## 本章小结


    本章是一次旋风式的概览，仅触及了 Interface Builder 和 Application Kit 的表面。我们只直接使用了一个 AppKit 类（`NSTextField`），并间接使用了两个类（用于驱动按钮的
    `NSButton`，以及控制窗口的 `NSWindow`）。实际上，AppKit 中包含超过 100 个不同的类可供你探索，其中许多都会在 Interface
    Builder 中出现。


    到目前为止，你已经完全具备深入学习 Cocoa 书籍或项目的能力。下一章，我们将继续探讨 Cocoa 中用于保存和加载文件的一些特性。


    ---


    # 第 17 章


    ## 文件加载与保存


    许多计算机程序最终都会创建某种用户工作的半永久性产物。可能是编辑过的照片，可能是小说的一个章节，也可能是你们乐队翻唱的《Free Bird》。在这些情况下，用户最终都会得到一个保存的文件。


    标准 C 库提供了创建、读取和写入文件的函数调用，例如 `open()`、`read()`、`write()`、`fopen()` 和 `fread()`。这些函数在其他地方已有详细文档，因此我们不再赘述。Cocoa
    提供了 Core Data，它能在后台为你处理所有这些文件相关操作，我们也不会讨论这个。


    那么，我们还能讨论什么呢？Cocoa 提供了两类通用的文件处理方式：**属性列表（Property Lists）**和**对象编码（Object Encoding）**，我们将在这里进行介绍。


    ### 属性列表


    在 Cocoa 中，有一类对象被称为**属性列表（property list）**对象，通常缩写为 **plist**。这些列表包含一组 Cocoa 已知如何操作的小型对象，特别是如何将它们保存到文件以及从文件中加载回来。属性列表的类包括
    `NSArray`、`NSDictionary`、`NSString`、`NSNumber`、`NSDate` 和 `NSData`，以及它们的可变版本（如果有的话）。


    前四个类你已经见过，但后两个尚未涉及。在开始进行文件操作之前，我们将先聊聊这些类。本章这一部分的全部代码可以在项目 *15.01 PropertyListing*
    中找到。


    ### NSDate


    时间和日期处理在程序中非常常见。`iPhoto` 知道你给狗拍照的日期，你的个人记账应用知道对账时的结账日期。`NSDate` 是 Cocoa 日期和时间处理中的基础类。


    要获取当前日期和时间，请使用 `[NSDate date]`，它会返回一个自动释放的对象。因此，以下代码：


    ```

    NSDate *date = [NSDate date];

    NSLog (@"today is %@", date);

    ```


    将打印出类似这样的内容：


    ```

    today is 2012-01-23 11:32:02 -0400

    ```


    你可以使用一些方法比较两个日期，从而对列表进行排序。还有一些方法可以获取相对于当前时间的日期差值。例如，你可能想获取恰好 24 小时前的日期：


    ```

    NSDate *yesterday = [NSDate dateWithTimeIntervalSinceNow: -(24 * 60 * 60)];

    NSLog (@"yesterday is %@", yesterday);

    ```


    上述代码打印出：


    ```

    yesterday is 2012-01-23 11:32:02 -0400

    ```


    `+dateWithTimeIntervalSinceNow:` 方法接受一个 `NSTimeInterval` 类型的参数，它是 `double` 类型的
    `typedef`，表示以秒为单位的时间间隔。这允许你通过正的时间间隔指定未来的时间偏移，或像此处这样，通过负的时间间隔指定过去的时间偏移。


    **注意**：如果你希望格式化日期的打印方式，Apple 提供了一个名为 `NSDateFormatter` 的类，它符合 Unicode 技术标准 #35。这为你提供了各种为用户格式化日期的方法。


    ### NSData


    在 C 语言中，一个常见的惯用做法是将数据缓冲区传递给函数。为此，你通常需要向函数传递缓冲区的指针和缓冲区的长度。此外，在 C 中可能会出现内存管理问题。例如，如果缓冲区是动态分配的，那么当它不再有用时，谁负责清理它？


    Cocoa 为我们提供了 `NSData` 类，它封装了一段字节数据。你可以获取数据的长度以及指向字节起始位置的指针。由于 `NSData` 是一个对象，常规的内存管理行为同样适用。因此，如果你需要将一段数据传递给某个函数或方法，你可以传递一个自动释放的
    `NSData` 对象，而无需担心清理问题。下面是一个包含普通 C 字符串（本质上就是一个字节序列）的 `NSData` 对象，并打印出其数据：


    ```

    const char *string = "Hi there, this is a C string!";

    NSData *data = [NSData dataWithBytes: length: strlen(string) + 1];

    NSLog (@"data is %@", data);

    ```


    结果如下：


    ```

    data is <48692074 68657265 2c207468 69732069 73206120 43207374 72696e67 2100>

    ```


    嗯，这看起来有点特别。但是，如果你手边有一张 ASCII 表（你可以通过终端输入命令 `man ascii` 来查找），你会发现这串十六进制数实际上就是我们的字符串。`0x48`
    是“H”，`0x69` 是“i”，依此类推。`-length` 方法返回字节数，而 `-bytes` 方法返回指向字符串开头的指针。注意到在 `+dataWithBytes:`
    调用中使用了 `+ 1` 吗？这是为了包含 C 字符串所需的结尾零字节。另外，请注意 `NSLog` 输出结果末尾的 `00`。通过包含这个零字节，我们可以使用
    `%s` 格式说明符来打印字符串：


    ```

    NSLog (@"%d byte string is ''%s''", [data length], [data bytes]);

    ```


    这将产生以下输出：


    ```

    30 byte string is ''Hi there, this is a C string!''

    ```


    `NSData` 对象是不可变的。一旦创建，就确定下来。你可以使用它，但无法更改它。不过，`NSMutableData` 允许你向数据内容中添加或移除字节。


    ### 写入和读取属性列表


    现在你已经了解了所有的属性列表类，我们可以用它们做什么呢？集合属性列表类（`NSArray` 和 `NSDictionary`）有一个名为 `-writeToFile:
    atomically:` 的方法，用于将属性列表写入文件。`NSString` 和 `NSData` 也有一个 `writeToFile:atomically:`
    方法，但它只是写出字符串或数据块。


    因此，我们可以将一个包含字符串的数组加载起来，然后保存它：


    ```

    NSArray *phrase;

    phrase = [NSArray arrayWithObjects: @"I", @"seem", @"to", @"be", @"a", @"verb",
    nil];

    [phrase writeToFile: @"/tmp/verbiage.txt" atomically: YES];

    ```


    现在，查看文件 `/tmp/verbiage.txt`，你应该会看到类似这样的内容：


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"

    "http://www.apple.com/DTDs/PropertyList-1.0.dtd"> <plist version="1.0"> <array>

    <string>I</string>

    <string>seem</string>

    <string>to</string>

    <string>be</string>

    <string>a</string>

    <string>verb</string> </array> </plist>

    ```

