    \n\n@implementation CategoryThing (Thing2)\n\n- (void)setThing2:(NSInteger) t2\n\
    {\n    thing2 = t2;\n} // setThing2\n\n- (NSInteger)thing2\n{\n    return (thing2);\n\
    } // thing2\n\n@end // CategoryThing\n```\n\n阅读到这里，您大概能猜到 *Thing3.m* 长什么样了（提示：剪切；粘贴；搜索；替换）。\n\
