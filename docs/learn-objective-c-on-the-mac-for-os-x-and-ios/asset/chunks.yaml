    \ 程序员应该始终密切关注程序的性能。\n\n## 格式说明符\n\n有经验的程序员知道，硬编码并非总是好主意。如果我们想知道哪些汽车的马力超过 200，之后又想了解哪些汽车的马力超过\
    \ 50，该怎么办？我们可以使用像`\"engine.horsepower > 200\"`和`\"engine.horsepower > 50\"`这样的谓词字符串，但这样我们就得重新编译程序，又回到我们在第\
    \ 3 章中摆脱的那个糟糕世界。\n\n我们可以通过两种方式将可变内容放入谓词格式字符串中：格式说明符和变量名。首先，我们来看看格式说明符。你可以像平时熟悉的那样，使用`%d`和`%f`来放入数值：\n\
    \n```objc\npredicate = [NSPredicate predicateWithFormat: @\"engine.horsepower\
    \ > %d\", 50];\n```\n\n当然，与其在代码中直接使用`50`，你可以让这个值来自用户界面或某些外部机制。\n"
- fmt: "除了常用的 `printf` 格式说明符之外，你还可以使用 `%@` 来插入字符串值。`%@` 会被当作一个带引号的字符串来处理：\n\n```objectivec\n\
    predicate = [NSPredicate predicateWithFormat: @\"name == %@\", @\"Herbie\"];\n\
    ```\n\n请注意，在此格式字符串中，`%@` 没有被引号括起来。如果你像这样给 `%@` 加上引号：`\"name == '%@'\"`，那么 `%`\
    \ 和 `@` 这两个字符就会直接出现在谓词字符串中。\n\n`NSPredicate` 字符串还允许你使用 `%K` 来指定一个键路径。下面的谓词与其他谓词相同，其真值条件为\
    \ `name == 'Herbie'`：\n\n```objectivec\npredicate =\n[NSPredicate predicateWithFormat:\
    \ @\"%K == %@\", @\"name\", @\"Herbie\"];\n```\n\n使用格式说明符是构建灵活谓词的一种方式。另一种方式是在字符串中放入变量名，类似于环境变量的用法：\n\
    \n```objectivec\nNSPredicate *predicateTemplate =\n[NSPredicate predicateWithFormat:@\"\
    name == $NAME\"];\n```\n\n现在我们有了一个包含变量的谓词，可以使用 `predicateWithSubstitutionVariables`\
    \ 调用来创建新的特化谓词。你需要创建一个键值对字典，其中键是变量名（不带美元符号），值是要替换到谓词中的内容：\n\n```objectivec\nNSDictionary\
    \ *varDict;\nvarDict = [NSDictionary dictionaryWithObjectsAndKeys:\n         \
    \    @\"Herbie\", @\"NAME\", nil];\n```\n\n这会将字符串 `\"Herbie\"` 作为键 `\"NAME\"`\
    \ 对应的值。接着，我们可以创建新谓词：\n\n```objectivec\npredicate =\n[predicateTemplate predicateWithSubstitutionVariables:\
    \ varDict];\n```\n\n这个谓词的工作原理与其他你已经见过的谓词完全相同。\n\n你可以为变量值使用不同类型的对象，比如 `NSNumber`。以下谓词用于过滤发动机功率：\n\
    \n```objectivec\npredicateTemplate =\n[NSPredicate predicateWithFormat: @\"engine.horsepower\
    \ > $POWER\"];\n\nvarDict = [NSDictionary dictionaryWithObjectsAndKeys:\n    \
    \         [NSNumber numberWithInt: 150], @\"POWER\", nil];\n\npredicate =\n[predicateTemplate\
    \ predicateWithSubstitutionVariables: varDict];\n```\n\n这会创建一个真值条件为 `engine.horsepower\
    \ > 150` 的谓词。\n\n除了 `NSNumber` 和 `NSString`，你还可以使用 `[NSNull null]` 来表示 `nil` 值，甚至可以像本章稍后介绍的那样使用数组。请注意，你不能对键路径使用\
    \ `$VARIABLE`，它只适用于值。如果需要在程序运行时动态改变谓词格式字符串中的键路径，你需要使用 `%K` 格式说明符。\n\n谓词机制不会进行类型检查。你可能会不小心将一个字符串插入到期望为数字的位置，这可能会导致运行时错误提示，或产生令人困惑的行为。\n\
    \n## Hello Operator，给我数字 9\n\n`NSPredicate` 的格式字符串包含许多不同的运算符。我们将介绍其中大部分运算符，并为每个运算符提供一个简单的示例。其余运算符可以在苹果在线文档中找到，可通过\
    \ Xcode 访问。\n\n### 比较运算符与逻辑运算符\n\n谓词字符串语法支持你常用的 C 语言风格运算符，例如相等运算符 `==` 和 `=`。\n\
    \n不等运算符有多种形式，如表 20-1 所示。\n\n**表 20-1.** 不等运算符\n\n| 运算符 | 含义 |\n| --- | --- |\n\
    | `>` | 大于 |\n| `>=` 和 `=>` | 大于或等于 |\n| `<` | 小于 |\n| `<=` 和 `=<` | 小于或等于 |\n\
    | `!=` 和 `<>` | 不等于 |\n\n该语法还支持括号表达式（真的！），以及 `AND`、`OR`、`NOT` 逻辑运算符，或它们对应的 C 语言风格的\
    \ `&&`、`||` 和 `!`。\n\n以下是一个示例。你可以过滤掉动力最强和最弱的汽车，只保留中档车型：\n\n```objectivec\npredicate\
    \ = [NSPredicate predicateWithFormat:\n               @\"(engine.horsepower >\
    \ 50) AND\n                (engine.horsepower < 200)\"];\n\nresults = [cars filteredArrayUsingPredicate:\
    \ predicate];\nNSLog (@\"oop %@\", results);\n```\n\n如果我们将其应用于我们的车队，会得到以下结果：\n\
    \n```\nHerbie, a 1984 Honda CRX, has 2 doors, 34000.0 miles, 58 hp and 4 tires,\n\
    Badger, a 1987 Acura Integra, has 5 doors, 217036.7 miles, 130 hp and 4 tires,\n\
    Elvis, a 1989 Acura Legend, has 4 doors, 28123.4 miles, 151 hp and 4 tires,\n\
    ```"
  raw: 'In addition to the usual printf specifiers, you can also use %@ to insert
    a string value. %@ is treated just like a quoted string:


    predicate = [NSPredicate predicateWithFormat: @"name == %@", @"Herbie"];


    Notice that the %@ is not quoted in the format string here. If you quoted %@,
    like with "name == ''%@''", the characters % and @ would be in the predicate string.


    NSPredicate strings also let you use %K to specify a key path. This predicate
    is the same as the others, using name == ''Herbie'' as the truth:


    predicate =


    [NSPredicate predicateWithFormat: @"%K == %@", @"name", @"Herbie"];


    Using format specifiers is one way to have flexible predicates. The other involves
    putting variable names into the string, similar to environment variables:


    NSPredicate *predicateTemplate =


    [NSPredicate predicateWithFormat:@"name == $NAME"];


    Now that we have a predicate with a variable in it, we can make new specialized
    predicates using the predicateWithSubstitutionVariables call. You create a dictionary
    of key-value pairs, in which the key is the variable name (without the dollar
    sign), and the value is what should be plugged into the predicate:


    NSDictionary *varDict;


    varDict = [NSDictionary dictionaryWithObjectsAndKeys:


    @"Herbie", @"NAME", nil];


    This uses the string "Herbie" for the value under the key "NAME". So make this
    the new predicate:


    predicate =


    [predicateTemplate predicateWithSubstitutionVariables: varDict];


    This predicate works exactly like the other ones you’ve seen.


    You can use different kinds of objects for the variable values, like NSNumbers,
    with this predicate that filters for engine power:


    predicateTemplate =


    [NSPredicate predicateWithFormat: @"engine.horsepower > $POWER"];


    varDict = [NSDictionary dictionaryWithObjectsAndKeys:


    [NSNumber numberWithInt: 150], @"POWER", nil];


    predicate =


    [predicateTemplate predicateWithSubstitutionVariables: varDict];


    This creates a predicate whose truth is an engine horsepower that’s more than
    150.


    In addition to NSNumbers and NSStrings, you can use [NSNull null] for nil values,
    and you can even use arrays, as you’ll see a little later in this chapter. Note
    that you can’t use $VARIABLE for key paths, only values. If you want to vary key
    paths programmatically when using predicate format strings, you’ll need to use
    the %K format specifier.


    No type checking is done by the predicate machinery. You can accidentally plug
    in a string where a number was expected, which might end up as an error message
    complaint at runtime or just a baffling behavior.


    Hello Operator, Give Me Number 9


    NSPredicate’s format string includes a lot of different operators you can use.
    We’ll touch on most of the operators and give a quick example of each one. The
    rest can be found in Apple’s online documentation, available from Xcode.


    Comparison and Logical Operators


    The predicate string syntax supports some of your favorite operators from C, such
    as the equality operators == and =.


    The inequality operators come in various flavors, as shown in [Table 20-1](#9781430241881_Ch20.xhtml#tb1).


    [Table 20-1](#9781430241881_Ch20.xhtml#tab1). Inequality operators


    | Operator | Meaning |

    | --- | --- |

    | > | Greater than |

    | >= and => | Greater than or equal to |

    | < | Less than |

    | <= and =< | Less than or equal to |

    | != and <> | Not equal to |


    The syntax also supports parenthetical expressions (really!) and the AND, OR,
    and NOT logical operators, or their C-looking equivalents &&, ||, and !.


    Here’s an example. You can filter out the most and least powerful cars, leaving
    the midrange ones:


    predicate = [NSPredicate predicateWithFormat:


    @"(engine.horsepower > 50) AND


    (engine.horsepower < 200)"];


    results = [cars filteredArrayUsingPredicate: predicate];


    NSLog (@"oop %@", results);


    And if we actually apply this to our fleet, we get the following results:


    Herbie, a 1984 Honda CRX, has 2 doors, 34000.0 miles, 58 hp and 4 tires,


    Badger, a 1987 Acura Integra, has 5 doors, 217036.7 miles, 130 hp and 4 tires,


    Elvis, a 1989 Acura Legend, has 4 doors, 28123.4 miles, 151 hp and 4 tires,'
