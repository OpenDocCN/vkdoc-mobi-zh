    \ thing2)\n{\n    if (thing1 == thing2) {\n        return (NO);\n    } else {\n\
    \        return (YES);\n    }\n} // areIntsDifferent\n\n// given a NO value, return\
    \ the human-readable\n// string \"NO\". Otherwise return \"YES\"\nNSString *boolString\
    \ (BOOL yesNo)\n{\n    if (yesNo == NO) {\n        return (@\"NO\");\n    } else\
    \ {\n        return (@\"YES\");\n    }\n} // boolString\n\nint main (int argc,\
    \ const char *argv[])\n{\n    BOOL areTheyDifferent;\n\n    areTheyDifferent =\
    \ areIntsDifferent (5, 5);\n    NSLog (@\"are %d and %d different? %@\",\n   \
    \        5, 5, boolString(areTheyDifferent));\n\n    areTheyDifferent = areIntsDifferent\
