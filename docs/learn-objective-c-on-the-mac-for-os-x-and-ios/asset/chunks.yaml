  trans: '

    在本节中，我们将向你展示如何将代码连接至我们刚刚创建好的那些精美用户界面元素。


    ## 连接输出口


    现在，是时候建立一些连接了。首先，我们需要告诉对象，它的 `textField` 和 `resultsField` 实例变量应该指向哪个 `NSTextField`。我们将使用辅助编辑器，这个工具我们在第
    7 章中简要讨论过。在 Xcode 窗口的右上方，有一组三个按钮，上面标有“编辑器”。点击中间那个按钮，编辑器就会垂直分割成两部分；这就是辅助编辑器。如果你需要更多空间，请确保停靠栏处于最简版本，只显示图标。


    接下来，按住 Control 键，从文本字段拖拽到头文件——没错，你正在跨越边界！——拖到 `@property` 这一行下方，直到出现“插入输出口或操作
    (Action)”的提示（参见图 16-13）。松开指针后，会弹出一个如图 16-14 所示的对话框。在名称区域输入 `textField`，然后点击“连接”。这会在头文件中创建
    `textField` 属性以及其他必需的关键字。到目前为止，我们还没有输入任何代码，但已经“编写”了一大堆代码。这非常酷。让我们对标签重复同样的连接过程，并将其命名为
    `resultsField`。


    ![9781430241881_Fig16-13.tif](img/9781430241881_Fig16-13_fmt.jpg)


    图 16-13. 开始连接


    ![9781430241881_Fig16-14.tif](img/9781430241881_Fig16-14_fmt.jpg)


    图 16-14. 编辑连接


    在检查器的连接面板中仔细检查你的工作。要查看该面板，请选择“视图” ![image](img/9781430241881_arrow_fmt.jpg) “实用工具”
    ![image](img/9781430241881_arrow_fmt.jpg) “显示连接检查器”，或者点击检查器上的“连接”按钮（看起来像一个指向右方的箭头）。你会在检查器顶部看到这些连接，如图
    16-15 所示。


    ![9781430241881_Fig16-15.tif](img/9781430241881_Fig16-15_fmt.jpg)


    图 16-15. 仔细检查连接


    ## 连接操作 (Actions)


    现在，我们准备将按钮连接到操作 (Actions)，以便它们能触发我们的代码。我们将再次使用 Control-拖拽来建立我们心爱的连接，这次是从按钮拖到 `MSCAppDelegate`。


    **注意**：在使用 Interface Builder 时，知道拖拽连接的方向是一个常见的困惑点。拖拽的方向是*从*需要知道某些信息的对象*到*它需要了解的那个对象。


    `MSCAppDelegate` 需要知道使用哪个 `NSTextField` 来接收用户的输入，所以拖拽是从 `MSCAppDelegate` 到文本字段。


    按钮需要知道告诉哪个对象：“嘿！有人按了我！”。所以，你需要从按钮拖拽到 `AppController`。


    按住 Control 键点击 UpperCase 按钮，然后拖拽一根连线到头文件中最后一个 `@property` 的下方，如图 16-16 所示。连接框会再次弹出。这一次，将连接类型改为“操作
    (Action)”。在名称字段中输入 `uppercase`，然后点击“连接”。这会在头文件中创建方法原型，并在 `.m` 文件中创建一个空的实现。


    ![9781430241881_Fig16-16.tif](img/9781430241881_Fig16-16_fmt.jpg)


    图 16-16. 连接 UpperCase 按钮


    现在，每当按钮被点击时，消息 `uppercase:` 就会被发送给 `MSCAppDelegate` 实例，这正是我们一直想要的效果。然后，我们就可以在
    `uppercase:` 方法中执行任何我们想要的操作了。


    最后，我们通过连接 LowerCase 按钮来完成最后的连接。按住 Control 键从 LowerCase 按钮拖拽到头文件*，*并将类型改为“操作 (Action)”，名称改为
    `lowercase`（见图 16-17）。至此，我们在 Interface Builder 中的工作就完成了。

