    Summary


    Whew! That was a lot of information just to get a simple app to run in the simulator,
    although Xcode did help us a lot. Obviously, we have only scratched the surface
    of the vast set of APIs you can use to develop iOS apps.


    In this chapter, we showed you how to use a view controller in your iOS app and
    how iOS manages memory for views. We discussed classes that are specific to iOS.
    We spent time on the ways in which iOS is both similar to and different from OS
    X.


    If you plan on developing application for iOS and you want to know more, check
    out the book *Beginning iOS 5 Development* by David Mark, Jack Nutting, and Jeff
    LaMarche (Apress, 2011).


    Chapter 16


    Introduction to the Application Kit


    So far in this book, all our programs have used the Foundation Kit and have communicated
    with us through the time-honored method of sending text output to the console.
    That’s fine for getting your feet wet, but the real fun begins when you see a
    Mac-like interface that includes things you can click and play with. We’ll take
    a detour in this chapter to show you some highlights of the Application Kit (or
    AppKit), Cocoa’s user-interface treasure trove for OS X.


    The program we’ll construct in this chapter is called CaseTool, and you can find
    it in the *16.01 CaseTool* project folder. CaseTool puts up a window that looks
    like the screenshot shown in [Figure 16-1](#9781430241881_Ch16.xhtml#_FIG1). The
    window has a text field, a label, and a couple of buttons. When you type some
    text into the field and click a button, the text you entered is converted to uppercase
    or lowercase. Although that’s very cool indeed, you’ll no doubt want to add additional
    useful features before you post your application on the Mac App Store with a $4.99
    price tag.


    ![9781430241881_Fig16-01.tif](images/9781430241881_Fig16-01_fmt.jpg)


    [Figure 16-1](#9781430241881_Ch16.xhtml#FIG1). The finished product


    Making the Project


    You’ll be using Xcode to build this project, and we’ll lead you step-by-step through
    the process of doing so. The first thing is to create the project files. Then,
    we’ll lay out the user interface, and finally, we’ll make the connections between
    the UI and the code.


    Let’s get started by going to Xcode and making a new Cocoa Application project.
    Run Xcode. On the startup screen, click Create a New Xcode Project. (If Xcode
    is already running, choose File ![image](images/9781430241881_arrow_fmt.jpg) New
    ![image](images/9781430241881_arrow_fmt.jpg) New Project.) Select Application
    from the table on the left under Mac OS X, if it is not already selected. Select
    Cocoa Application (as shown in [Figure 16-2](#9781430241881_Ch16.xhtml#_FIG2)),
    and then click Next to set some options for our app.


    ![9781430241881_Fig16-02.tif](images/9781430241881_Fig16-02_fmt.jpg)


    [Figure 16-2](#9781430241881_Ch16.xhtml#FIG2). Make a new Cocoa Application


    Take a look at [Figure 16-3](#9781430241881_Ch16.xhtml#_FIG3) to see the screen
    where we set options. The first item is Product Name; we’re going to enter *CaseTool*.
    The next field, Company Identifier, is used by the App Store to differentiate
    your app from others. Company Identifiers usually are in **reverse-domain-name**
    format; that is, they start with *com*, then a period and the company name. In
    our example, we use com.MySuperCompany. This field is case-sensitive, so keep
    that in mind when you choose yours.


    ![9781430241881_Fig16-03.tif](images/9781430241881_Fig16-03_fmt.jpg)


    [Figure 16-3](#9781430241881_Ch16.xhtml#FIG3). Name the new project


    The next field is Class Prefix. It’s customary to enter three or more characters
    here. This string

    is prepended to the names of classes you create. We’ll use MSC, which of course
    stands for “My Super Company.” For example, if you create a class named Circle,
    Xcode will actually name the class MSCCircle. Why do this? Because Objective-C
    doesn’t have namespaces, this is a kind of pseudo-namespace, a way to reserve
    some names for your application. This way, if you’re using a third-party framework,
    and it has a class named Circle, that name won’t collide with yours.


    For App Store category, we select Utilities, because that correctly describes
    our app.


    For other options, make sure to deselect Create Document-Based Application, Use
    Core Data, and Include Unit Tests. The only checkbox that should be selected is
    Use Automatic Reference Counting.'
