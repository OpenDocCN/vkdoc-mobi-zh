    in. One of the refactoring helpers lets you easily rename a class. Not only does
    it rename the class but it does fancy things like renaming the source files to
    match. And if you have a GUI program, it even digs into the nib files and changes
    things there. (Don’t worry if that last sentence is total gibberish to you right
    now. It’s a really cool feature, and we’ll explain more about nib files in later
