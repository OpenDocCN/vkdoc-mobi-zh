  raw: 'Importation and Inheritance


    We need to liberate two more classes from *CarParts-Split*.m: Slant6 and AllWeatherRadial.
    These are a little trickier to handle because they inherit from classes we’ve
    created: Slant6 inherits from Engine, and AllWeatherRadial inherits from Tire.
    Because we’re inheriting from these classes rather than just using pointers to
    the classes, we can’t use the @class trick in their header files. We’ll have to
    use #import "Engine.h" in *Slant6.h* and #import "Tire.h" in *AllWeatherRadial.h*.


    So why, exactly, can’t we just use @class here? Because the compiler needs to
    know all about a superclass before it can successfully compile the @interface
    for its subclass. The compiler needs the layout (types, sizes, and ordering) of
    the instance variables of the superclass. Recall that when you add instance variables
    in a subclass, they get tacked onto the end of the superclass’s instance variables.
    The compiler then uses that information to figure out where in memory to find
    instance variables, starting with the hidden self pointer that comes with each
    method call. The compiler needs to see the entire contents of the class to correctly
    calculate the location of the instance variables.


    Next on the operating table is Slant6\. Create the *Slant6.m* and *Slant6.h* files
    in Xcode, and then cut Slant6’s @interface out of *CarParts-Split*.m. If you’ve
    done your carving and gluing properly, *Slant6.h* should look like this now:


    #import "Engine.h"


    @interface Slant6 : Engine


    @end // Slant6


    The file only imports *Engine.h* and not <Cocoa/Cocoa.h>. Why? We know that *Engine.h*
    already imports <Cocoa/Cocoa.h>, so we don’t have to do it ourselves here. However,
    it’s OK if you want to put #import <Cocoa/Cocoa.h> in this file, because #import
    is smart enough not to include any file more than once.


    *Slant6.m* is just a cut-and-paste version of the @implementation section from
    *CarParts-Split.m*, with the customary #import of the *Slant6.h* header file:


    #import "Slant6.h"


    @implementation Slant6


    - (NSString *) description


    {


    return (@"I am a slant-6\. VROOOM!");


    } // description


    @end // Slant6


    Do the same steps to move AllWeatherRadial to its own pair of files. No doubt
    you’ve got the hang of this by now. Here’s a look at *AllWeatherRadial.h*:


    #import "Tire.h"


    @interface AllWeatherRadial : Tire


    @end // AllWeatherRadial


    And here’s *AllWeatherRadial.m*:


    #import "AllWeatherRadial.h"


    @implementation AllWeatherRadial


    - (NSString *) description


    {


    return (@"I am a tire for rain or shine");


    } // description


    @end // AllWeatherRadial


    Poor *CarParts-Split.m* is just a shell of its former self. It’s now a bunch of
    #imports and one lonely function, like so:


    #import <Foundation/Foundation.h>


    #import "Tire.h"


    #import "Engine.h"


    #import "Car.h"


    #import "Slant6.h"


    #import "AllWeatherRadial.h"


    int main (int argc, const char * argv[])


    {


    Car *car = [Car new];


    int i;


    for (i = 0; i < 4; i++) {


    Tire *tire = [AllWeatherRadial new];


    [car setTire: tire


    atIndex: i];


    }


    Engine *engine = [Slant6 new];


    [car setEngine: engine];


    [car print];


    return (0);


    } // main


    If we build and run the project now, we’ll get exactly the same output as before
    we started spreading stuff around into various files.


    Summary


    In this chapter, you learned the essential skill of using multiple files to organize
    your source code. Typically, each class gets two files: a header file that contains
    the @interface for the class and a dot-m file that holds the @implementation.
    Users of the class then import (using #import) the header file to gain access
    to the class’s features.


    Along the way we encountered cross-file dependencies, in which a header file or
    source file needs information from another header file. A tangled web of imports
    can increase your compile times and can cause unnecessary recompilations. Judicious
    use of the @class directive, in which you tell the compiler “trust that you’ll
    see a class by this name eventually,” can reduce compile time by cutting down
    on the number of header files you have to import.


    Next up is a tour of some interesting Xcode features. See you there.


    Chapter 7


    More About Xcode


    Mac and iOS programmers spend most of their time writing code inside Xcode. Xcode
    is an excellent tool with a lot of wonderful features, not all of which are obvious.
    When you’re going to be living inside a powerful tool for a long time, you’ll
    want to learn as much about it as you can. In this chapter, we’ll introduce you
    to some Xcode tips and tricks that are useful when you’re writing and navigating
    your code and locating information you need. We’ll also touch on some ways Xcode
    can help you debug your code.


    Xcode is a huge application, and it is extremely customizable, sometimes ridiculously
    so. (Did we mention that it’s huge?) Entire books can be (and have been) written
    about just Xcode, so we’ll stick to the highlights to get you productive quickly.
    We recommend using the Xcode defaults when you’re starting out. When something
    bugs you, though, you’ll find there’s probably a setting that can be tweaked to
    your liking.


    When faced with a big tool like Xcode, a good strategy is to skim through the
    documentation until just about the point when your eyes glaze over. Use Xcode
    for a while, and then skim the documents again. Each time you read, more will
    make sense. Lather, rinse, repeat, and you’ll have terrific hair.


    We’ll be talking about Xcode 4.3.2, the current version at the time of this writing.
    Apple loves adding new things and moving old things around between Xcode versions,
    so if you’re using Xcode 42.0, the screen shots are probably out of date. Now,
    on to the tips!


    One Window to Rule Them All


    As an Xcode programmer, you live in the main Xcode window. Let’s discuss the various
    parts of this window, just to make sure we know what we’re talking about.


    *   ![image](images/9781430241881_square_fmt.jpg)  *Toolbar*: This is the topmost
    part of the window, where most of the controls live.

    *   ![image](images/9781430241881_square_fmt.jpg)  *Navigator pane*: This is the
    left pane. This pane usually contains lists of files in your project, but you
    can see other views there as well: Symbol, Search, Issue, Debug, Breakpoints,
    and Logs. You can switch between views by pressing command (![image](images/Rangoli1.jpg))
    plus a number key (1 through 7) or clicking the icons at the top of the pane.

    *   ![image](images/9781430241881_square_fmt.jpg)  *Editor pane*: This pane, right
    smack in the middle, is where you’ll spend most of your time as you write your
    amazing source code that will change the world and earn you a fortune.

    *   ![image](images/9781430241881_square_fmt.jpg)  *Inspector pane*: At the right,
    this area displays context-sensitive information and controls you can use to modify
    the attributes of selected items.

    *   ![image](images/9781430241881_square_fmt.jpg)  *Debugger pane*: This is the
    bottom-center pane. When the debugger is running, the stack and debugger console
    appear here.

    *   ![image](images/9781430241881_square_fmt.jpg)  *Library pane*: Stashed away
    in the lower right corner of the window, this pane is where you’ll find the project
    assets, the objects, code snippets, and other goodies you’ll use in your projects.


    Now you have the basic layout. Let’s jump right in and start our tour.


    ![9781430241881_Fig07-01.tif](images/9781430241881_Fig07-01_fmt.jpg)


    Figure 7-1\. The window you stare at all day if you’re an OS X or iOS developer


    Changing the Company Name


    One thing you might have noticed when you create a new Objective-C source file
    is the comment block that Xcode generates for you:


    //


    // Calculator


    // CKStoreManager.m


    //


    // Created by Waqar Malik on 4/15/12.


    // Copyright 2012 __MyCompanyName__. All rights reserved.


    //'
