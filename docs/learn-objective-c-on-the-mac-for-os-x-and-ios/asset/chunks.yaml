    # Xcode 包含文件名和项目名称


    Xcode 包含文件名和项目名称，以及创建用户和时间，因为这些信息能让你一眼就知道正在查看的是哪个文件、由谁创建，并大致了解其创建时间。不过，默认的公司名称实在不太理想。上次我们注意到，`__MyCompanyName__`
    并没有在招聘 Mac 程序员，只招 TPS 报告创建者。


    ![9781430241881_Fig07-02.tif](img/9781430241881_Fig07-02_fmt.jpg)


    **图 7-2.** 更改公司名称


    更改公司名称是一个简单的过程。在导航窗格和编辑窗格中选择项目。查看右侧的检查器窗格。在“项目文档”下，你会看到“组织”字段。在此处输入你的公司名称。从此以后，项目将使用你的公司名称，而不是
    `__MyCompanyName__`。


    ## 使用编辑器技巧和窍门


    Xcode 提供了几种组织项目和源代码编辑器的基本方法。到目前为止，我们展示了默认界面，它主要是一个多合一窗口，用于处理你每分钟的项目和编码任务。一个编辑窗格用于所有源文件，而编辑器的内容会根据你在窗口左侧导航窗格中选择的源文件而变化。


    以下是关于你在导航窗格中看到内容的更多细节。文件列表显示了你项目的所有活动部分：你的源文件、你链接的框架，以及描述如何实际构建各个程序的 *Products*
    文件夹。你还会发现一些实用工具，例如用于访问源代码控制仓库（如果你与其他程序员合作，这很方便）、你项目的所有符号以及一些智能文件夹。


    当你选择一个文件时，你会在窗口顶部工具栏下方看到一个文件路径，显示该文件在你的项目中的位置。你可以使用导航窗格底部的搜索框来缩小显示的文件列表。图 7-3
    展示了在文件名中搜索“car”一词的结果。你可以将此过滤框用于任何导航器视图。


    ![9781430241881_Fig07-03.tif](img/9781430241881_Fig07-03_fmt.jpg)


    图 7-3. 缩小文件列表


    浏览器会显示名称中包含“car”的每个匹配源文件。你可以点击浏览器中的文件将其放入编辑器。由于较大的项目可能有超过一百个源文件，如果你有很多文件，浏览器是一种方便的导航方式。我们将在本章后面进一步讨论如何浏览源文件。


    在处理代码时，你会希望隐藏浏览器以最大化利用屏幕空间。窗口最右侧的一个工具栏图标标记为 *View*。它有三个按钮；你可以将鼠标悬停在它们上方以查看其功能（但我们仍会在此处告诉你）。左侧按钮用于隐藏或显示导航窗格，或者你也可以使用快捷键
    `![image](img/Rangoli1.jpg)0`。中间按钮用于切换调试器区域，右侧按钮用于检查器。


    将每个源文件放在其自己的窗口中可能很有用，尤其是在比较两个不同文件时。在导航窗格中双击源文件会在新窗口中打开该文件。你可以在两个窗口中打开同一个文件，但需要注意，有时这两个窗口可能会不同步（你可以点击每个窗口来同步）。


    你可能更喜欢使用标签（就像在 Safari 中一样）而不是多个窗口——Xcode 能满足你。这感觉就像是 Xcode 团队认识 Safari 团队似的。要显示标签，请选择
    View `![image](img/9781430241881_arrow_fmt.jpg)` Show Tab Bar（参见图 7-4）。要添加更多标签，请点击标签栏右侧的
    +。


    ![9781430241881_Fig07-04.tif](img/9781430241881_Fig07-04_fmt.jpg)


    图 7-4. 在标签栏打开标签


    ## 在 Xcode 的帮助下编写代码


    许多程序员整天编写代码。许多程序员也整夜编写代码。对于所有这些程序员，Xcode 提供了一些功能，使编写代码更轻松、更有趣。


    ### 缩进（漂亮打印）


    你可能已经注意到，本书中的所有代码都进行了良好的缩进，`if` 语句和 `for` 循环的主体都进行了偏移，使其缩进比周围代码更深。Objective-C
    不要求你缩进代码，但这样做是个好主意，因为它能让你一目了然地看清代码的结构。Xcode 会在你输入代码时自动进行缩进。


    有时，大量的编辑可能会使代码变得混乱。Xcode 在这点上也能提供帮助。选中文本后，按住 Control 键并单击（或右键单击）以查看编辑器的上下文菜单，然后选择
    Structure `![image](img/9781430241881_arrow_fmt.jpg)` Re-Indent。Xcode 会遍历所选内容，将所有内容整理整齐。你也可以使用快捷键
    `control-I` 来实现相同的功能。


    使用 Structure 菜单，或按 `![image](img/Rangoli1.jpg)` 和 `![image]`，可以将选中的代码向左或向右移动。如果你刚刚在某个代码周围添加了一个
    `if` 语句，这种重新格式化会非常方便。


    假设编辑器中有以下代码：


    ```

    Engine *engine = [Slant6 new];


    [car setEngine: engine];

    ```


    后来，你决定仅当用户设置了偏好时才创建新引擎：


    ```

    if (userWantsANewEngine) {


    Engine *engine = [Slant6 new];


    [car setEngine: engine];


    }

    ```


    你可以选择中间两行代码，然后按 `![image](img/Rangoli1.jpg)]` 将它们向右移动。


    你可以无限调整 Xcode 的缩进引擎。你可能更喜欢用空格而不是制表符。你可能希望每个左大括号都放在新行上，而不是与 `if` 语句放在同一行。无论你想做什么，你都有可能定制
    Xcode 以遵循你独特的代码格式化风格：大部分魔力都在 Xcode `![image](img/9781430241881_arrow_fmt.jpg)`
    Preferences `![image](img/9781430241881_arrow_fmt.jpg)` Text Editing `![image](img/9781430241881_arrow_fmt.jpg)`
    Indentation 中找到。这里有个小技巧：如果你想要快速轻松地在程序员之间引发一场激烈的网络讨论，那就开始谈论代码格式偏好吧。


    ### 自动补全


    你可能已经注意到，Xcode 有时会在你输入代码时提供建议。这是 Xcode 的“代码感知”功能，通常称为 **代码补全**。在编写程序时，Xcode 会建立大量内容的索引，包括项目和包含的框架中的变量和方法名称。它知道局部变量名称及其类型。它甚至可能知道你是否调皮或乖巧。在输入时，Xcode
    会不断地将你输入的内容与其符号索引进行比较。如果匹配，Xcode 会提供建议，如图 7-5 所示。


    ![9781430241881_Fig07-05.tif](img/9781430241881_Fig07-05_fmt.jpg)


    图 7-5. Xcode 代码补全


    在这里，我们开始输入 `All*`，Xcode 认为我们可能想要向 `AllWeatherRadial` 类发送消息（参见[图 7-5 中 `AllW*`
    后面的灰色文本）。Xcode 碰巧猜对了，所以我们可以按 Tab 键接受 `AllWeatherRadial` 作为补全。


    “哎呀，”你说，“这太简单了！我们只有一个以‘All’开头的类！” 确实如此，但即使有很多可能性，Xcode 也会提供一个补全菜单（[图 7-6）。如果你想让菜单消失，只需按
    Esc 键，或者再次按 Esc 键将其重新打开。


    ![9781430241881_Fig07-06.tif](img/9781430241881_Fig07-06_fmt.jpg)


    图 7-6. “all”的可能补全项

