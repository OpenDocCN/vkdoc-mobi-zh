  trans: '

    现在，让我们实际使用这些内容。我们之前创建了 `thing1`，现在把它归档：


    ```

    NSData *freezeDried;


    freezeDried = [NSKeyedArchiver archivedDataWithRootObject: thing1];

    ```


    `+archivedDataWithRootObject:` 这个类方法会对该对象进行编码。首先，它在底层创建一个 `NSKeyedArchiver` 实例；然后，将这个实例传递给对象
    `thing1` 的 `-encodeWithCoder:` 方法。当 `thing1` 编码其属性时，它会导致其他对象也被编码，比如字符串、数组，以及我们可能放入该数组的任何内容。一旦整堆对象完成了键和值的编码，键控归档器就会将所有内容扁平化为一个
    `NSData` 并返回。


    如果需要，我们可以使用 `-writeToFile:atomically:` 方法将这个 `NSData` 保存到磁盘。这里，我们只是要释放 `thing1`，从冻结干燥的表示形式中重新创建它，并打印出来：


    ```

    [thing1 release];


    thing1 = [NSKeyedUnarchiver unarchiveObjectWithData: freezeDried];


    NSLog (@"reconstituted thing: %@", thing1);

    ```


    它打印出和之前完全一样的内容：


    ```

    reconstituted thing: thing1: 42/10.5 ( )

    ```


    在契诃夫戏剧的第一幕中看到墙上挂着一把枪，会让你心生好奇；同样，你可能也在好奇那个叫做 `subThingies` 的可变数组。我们可以把对象放入数组，当数组被编码时，这些对象也会自动编码。`NSArray`
    对 `encodeWithCoder:` 的实现会调用所有对象的 `encodeWithCoder:`，最终导致所有内容都被编码。让我们给 `thing1`
    添加一些 `subThingies`：


    ```

    Thingie *anotherThing;


    anotherThing = [[[Thingie alloc]

    initWithName: @"thing2"

    magicNumber: 23

    shoeSize: 13.0] autorelease];


    [thing1.subThingies addObject: anotherThing];


    anotherThing = [[[Thingie alloc]

    initWithName: @"thing3"

    magicNumber: 17

    shoeSize: 9.0] autorelease];


    [thing1.subThingies addObject: anotherThing];


    NSLog (@"thing with things: %@", thing1);

    ```


    这会打印出 `thing1` 及其子对象：


    ```

    thing with things: thing1: 42/10.5 (

    thing2: 23/13.0 (

    ),

    thing3: 17/9.0 (

    )

    )

    ```


    编码和解码的工作方式完全相同：


    ```

    freezeDried = [NSKeyedArchiver archivedDataWithRootObject: thing1];


    thing1 = [NSKeyedUnarchiver unarchiveObjectWithData: freezeDried];


    NSLog (@"reconstituted multithing: %@", thing1);

    ```


    并打印出之前看到的相同日志。


    如果被编码的数据中存在循环引用，会发生什么？例如，如果 `thing1` 位于它自己的 `subThingies` 数组中呢？`thing1` 是否会编码数组，而数组又编码
    `thing1`，然后 `thing1` 再次编码数组，如此循环往复？幸运的是，Cocoa 在归档器和解归档器的实现上非常巧妙，使得对象循环可以被保存和恢复。


    要测试这一点，将 `thing1` 放入它自己的 `subThingies` 数组：`[thing1.subThingies addObject: thing1];`


    不过，不要尝试对 `thing1` 使用 `NSLog`。`NSLog` 不够智能，无法检测到对象循环，所以它会陷入无限递归，试图构建日志字符串，最终让你掉进调试器，伴随着成千上万次的
    `-description` 调用。


    但是，如果我们现在尝试对 `thing1` 进行编码和解码，它会完美地工作，不会陷入混乱：


    ```

    freezeDried = [NSKeyedArchiver archivedDataWithRootObject: thing1];


    thing1 = [NSKeyedUnarchiver unarchiveObjectWithData: freezeDried];

    ```


    ## 总结


    正如你在本章所看到的，Cocoa 提供了两种加载和保存文件的技术：属性列表（plist）和对象编码。属性列表数据类型是一组知道如何加载和保存自己的类的集合。如果你有一组全部是属性列表类型的对象，可以使用方便的便捷函数将它们保存到磁盘并读回。


    如果像大多数 Cocoa 程序员一样，你拥有自己的非属性列表类型的对象，你可以采用 `NSCoding` 协议并实现编码和解码对象的方法：你可以将自己的一堆对象转换为
    `NSData`，然后保存到磁盘，稍后再读回来。从这个 `NSData` 中，你可以重建这些对象。

    '
- fmt: "# 键值编码\n\n接下来要介绍的是键值编码（key-value coding），它让你能够在更高的抽象层面上与对象进行交互。\n\n## 第18章\
    \ 键值编码\n\n我们反复提及的一个概念是间接性。许多编程技术都基于间接性，整个面向对象编程也不例外。在本章中，我们将探讨另一种间接机制。这不是 Objective-C\
    \ 的语言特性，而是 Cocoa 提供的一种机制。\n\n到目前为止，我们一直在通过直接调用方法、使用属性的点语法或设置实例变量来直接改变对象的状态。而键值编码（朋友们亲切地称之为`KVC`）是一种通过使用字符串来描述要改变的对象状态片段，从而间接改变对象状态的方法。本章的全部内容就是关于键值编码的。\n\
    \n一些更高级的 Cocoa 特性，如 Core Data 和 Cocoa Bindings（本书中不会讨论），在其基础机制中使用了`KVC`作为关键组件。\n\
    \n## 一个入门项目\n\n我们将再次与老朋友`CarParts`合作。请查看名为`18.01 Car-Value-Coding`的项目以获取相关资源。为了启动项目，我们为`Car`类添加了一些属性，比如品牌和型号，以便进行实验。我们将`appellation`重命名为`name`，以使代码更加统一：\n\
    \n```objc\n@interface Car : NSObject <NSCopying>\n{\n    NSString *name;\n   \
    \ NSMutableArray *tires;\n    Engine *engine;\n    NSString *make;\n    NSString\
    \ *model;\n    int modelYear;\n    int numberOfDoors;\n    float mileage;\n}\n\
    \n@property (readwrite, copy) NSString *name;\n@property (readwrite, retain) Engine\
    \ *engine;\n@property (readwrite, copy) NSString *make;\n@property (readwrite,\
    \ copy) NSString *model;\n@property (readwrite) int modelYear;\n@property (readwrite)\
    \ int numberOfDoors;\n@property (readwrite) float mileage;\n\n…\n\n@end // Car\n\
    ```\n\n我们还添加了`@synthesize`指令，以便编译器自动生成 setter 和 getter 方法：\n\n```objc\n@implementation\
    \ Car\n\n@synthesize name;\n@synthesize engine;\n@synthesize make;\n@synthesize\
    \ model;\n@synthesize modelYear;\n@synthesize numberOfDoors;\n@synthesize mileage;\n\
    ```\n\n我们还更新了`-copyWithZone`方法，以复制新的属性：\n\n```objc\n- (id) copyWithZone: (NSZone\
    \ *) zone\n{\n    Car *carCopy;\n    carCopy = [[[self class] allocWithZone: zone]\
    \ init];\n    carCopy.name = name;\n    carCopy.make = make;\n    carCopy.model\
    \ = model;\n    carCopy.numberOfDoors = numberOfDoors;\n    carCopy.mileage =\
    \ mileage;\n    \n    // 加上复制轮胎和引擎的代码，详见[第13章](#9781430241881_Ch13.xhtml)。\n```\n\
    \n我们还修改了`-description`方法，使其打印这些新属性，并且省略了`Engine`和`Tire`的打印：\n\n```objc\n- (NSString\
    \ *) description\n{\n    NSString *desc;\n    desc = [NSString stringWithFormat:\n\
    \        @\"%@, a %d %@ %@, has %d doors, %.1f miles, and %d tires.\",\n     \
    \   name, modelYear, make, model, numberOfDoors, mileage, [tires count]];\n  \
    \  return desc;\n} // description\n```\n\n最后，在`main`函数中，我们将为汽车设置这些属性并打印出来。我们还使用了`autorelease`配合`alloc`和`init`，以便将所有内存管理集中在一处：\n\
    \n```objc\nint main (int argc, const char * argv[])\n{\n    @autoreleasepool\n\
    \    {\n        Car *car = [[[Car alloc] init] autorelease];\n        car.name\
    \ = @\"Herbie\";\n        car.make = @\"Honda\";\n        car.model = @\"CRX\"\
    ;\n        car.numberOfDoors = 2;\n        car.modelYear = 1984;\n        car.mileage\
    \ = 110000;\n        \n        int i;\n        for (i = 0; i < 4; i++)\n     \
    \   {\n            AllWeatherRadial *tire;\n            tire = [[AllWeatherRadial\
    \ alloc] init];\n            [car setTire: tire atIndex: i];\n            [tire\
    \ release];\n        }\n        \n        Slant6 *engine = [[[Slant6 alloc] init]\
    \ autorelease];\n        car.engine = engine;\n        \n        NSLog (@\"Car\
    \ is %@\", car);\n    }\n    return (0);\n} // main\n```\n\n运行程序后，你会得到类似下面的一行输出：\n\
