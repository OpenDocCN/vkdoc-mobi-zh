    \n异常消息中最后的信息片段是最有趣的。消息的这一部分说我们请求数组中索引 208000 处的某个东西，但哎呀，数组只有三个元素——差得*那么远*。利用这些信息，你可以回溯到有问题的代码并找到错误。\n\
    \n追踪异常的原因可能会令人沮丧。你在控制台窗口中只得到这条消息。对于 GUI 程序，程序会继续运行。有一种方法可以让 Xcode 在异常发生时进入调试器，这样会好一些。要这样做，请在工作区导航面板中选择断点标签。你会得到一个断点列表。现在，我们设置了一个断点，如图\
