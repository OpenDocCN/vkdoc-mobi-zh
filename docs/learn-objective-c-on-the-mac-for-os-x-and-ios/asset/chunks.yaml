    \n那么，你为什么要做这样的事情呢？面向对象编程的一个特点是信息隐藏。你只想暴露用户需要看到的东西，而隐藏其他内容，比如实现细节。这些技术能帮你实现这一点。\n\
    \n我们将这个分类放在 `.m` 文件中，但我们也可以将其放在私有头文件（`ThingsPrivate.h`）中，并允许 `Things` 的子类或友类访问这些内容。\n\
    \n你可以有多个类扩展分类，这可能会导致难以发现的 bug，所以请明智地使用这个特性。\n\n现在运行程序会得到：\n\n```\n1    0    0\n\
    200  300  400\n```\n\n### 使用分类拆分实现\n\n正如你在第 6 章中看到的，你可以将类的接口放在头文件中，将实现放在 `.m`\
    \ 文件中。但你无法将一个 `@implementation` 拆分到多个 `.m` 文件中。如果你有一个很大的类想要拆分到多个 `.m` 文件中，你可以使用分类来完成这个工作。\n\
    \n以 AppKit 提供的 `NSWindow` 类为例。如果你查看 `NSWindow` 的文档，你会发现成百上千个方法；`NSWindow` 文档打印出来超过\
    \ 60 页（别在家试这个）。\n\n将 `NSWindow` 的所有代码放在一个文件中会使其变得巨大且难以维护，这对 Cocoa 开发团队来说负担不小，更不用提我们这些可怜的开发者了。如果你查看头文件并搜索\
    \ `@interface`，你会看到官方的类接口：\n\n```\n@interface NSWindow : NSResponder\n```\n\n\
    然后，还有一大堆分类，包括这些：\n\n```\n@interface NSWindow(NSKeyboardUI)\n@interface NSWindow(NSToolbarSupport)\n\
    @interface NSWindow(NSDrag)\n@interface NSWindow(NSCarbonExtensions)\n```\n\n\
    这种分类的用法允许所有键盘用户界面相关的东西放在一个源文件中，工具栏代码放在另一个文件中，拖放功能放在另一个文件中，等等。这些分类还将方法分成了逻辑组，让阅读头文件的人更容易理解。这正是我们将要尝试的，只不过规模小一些。\n\
    \n### 在我们的项目中使用分类\n\n`CategoryThing` 项目位于 *12.03 CategoryThing* 文件夹中，它有一个简单的类，分布在几个实现文件中。\n\
    \n首先是 `CategoryThing.h`，它包含了类声明和一些分类。这个文件以导入 Foundation 框架开头，然后是用三个整型实例变量声明的类：\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface CategoryThing : NSObject\n\
    {\n    NSInteger thing1;\n    NSInteger thing2;\n    NSInteger thing3;\n}\n\n\
    @end // CategoryThing\n```\n\n在类声明之后，有三个分类，每个分类都有一个实例变量的访问器方法。我们将把这些方法的实现放到不同的文件中。\n\
    \n```\n@interface CategoryThing (Thing1)\n- (void)setThing1:(NSInteger)thing1;\n\
    - (NSInteger)thing1;\n@end // CategoryThing (Thing1)\n\n@interface CategoryThing(Thing2)\n\
    - (void)setThing2:(NSInteger)thing2;\n- (NSInteger)thing2;\n@end // CategoryThing\
    \ (Thing2)\n```\n"
- fmt: "# CategoryThing 与 Categories\n\n`@interface CategoryThing (Thing3)`\n\n- `-\
    \ (void)setThing3:(NSInteger)thing3;`\n- `- (NSInteger)thing3;`\n\n`@end // CategoryThing\
    \ (Thing3)`\n\nAnd that’s it for *CategoryThing.h*.\n\n*CategoryThing.m* is pretty\
    \ simple, containing a description method we can use with the `%d` format specifier\
    \ in `NSLog()`:\n\n```objc\n#import \"CategoryThing.h\"\n\n@implementation CategoryThing\n\
    \n- (NSString *) description\n{\n    NSString *desc;\n    desc = [NSString stringWithFormat:\
    \ @\"%d %d %d\", thing1, thing2, thing3];\n    return (desc);\n} // description\n\
    \n@end // CategoryThing\n```\n\nTime for a memory management check. Is `description`\
    \ doing the right thing? Yes, it is. Because `stringWithFormat` is not an `alloc`,\
    \ `copy`, or `new`, it returns an object we can assume has a retain count of 1\
    \ and has been autoreleased, so it will be cleaned up when the current autorelease\
    \ pool goes away.\n\nNow for the categories. *Thing1.m* has the implementation\
    \ for the Thing1 category:\n\n```objc\n#import \"CategoryThing.h\"\n\n@implementation\
    \ CategoryThing (Thing1)\n\n- (void)setThing1:(NSInteger)t1\n{\n    thing1 = t1;\n\
    } // setThing1\n\n- (NSInteger) thing1\n{\n    return (thing1);\n} // thing1\n\
    \n@end // CategoryThing\n```\n\nThe interesting point to note is that a category\
    \ can access the instance variables of the class it has been put onto. Category\
    \ methods are first-class citizens.\n\nThe contents of *Thing2.m* are very similar\
    \ to those of *Thing1.m*:\n\n```objc\n#import \"CategoryThing.h\"\n\n@implementation\
    \ CategoryThing (Thing2)\n\n- (void)setThing2:(NSInteger) t2\n{\n    thing2 =\
    \ t2;\n} // setThing2\n\n- (NSInteger)thing2\n{\n    return (thing2);\n} // thing2\n\
    \n@end // CategoryThing\n```\n\nAfter reading this far, you can probably figure\
    \ out what *Thing3.m* looks like (hint: cut; paste; search; replace).\n\nThe *main.m*\
    \ file contains `main()`, which actually uses these categories we’ve been constructing.\
    \ First comes the `#import` statement:\n\n```objc\n#import \"CategoryThing.h\"\
    \n```\n\nWe need to import the header for `CategoryThing` so that the compiler\
    \ can see the class definition and the categories. After that comes `main()`:\n\
    \n```objc\nint main (int argc, const char *argv[])\n{\n    @autoreleasepool {\n\
    \        CategoryThing *thing = [[CategoryThing alloc] init];\n        [thing\
    \ setThing1: 5];\n        [thing setThing2: 23];\n        [thing setThing3: 42];\n\
    \        NSLog (@\"Things are %@\", thing);\n    }\n    return (0);\n} // main\n\
    ```\n\nThe first line of `main()` contains the standard autorelease pool code\
    \ we’ve come to know and, uh, love. This pool will end up holding the autoreleased\
    \ description string that’s used by `NSLog()`.\n\nNext, a `CategoryThing` object\
    \ is allocated and initialized:\n\n```objc\nCategoryThing *thing = [[CategoryThing\
    \ alloc] init];\n```\n\nHere’s our obligatory report to the memory management\
    \ patrol: Because this is an `alloc`, its retain count is 1, and it’s not in the\
    \ autorelease pool. And because this project uses ARC, we don’t need to worry\
    \ about adding a `release`; our friend the compiler will do the correct thing\
    \ and add one for us.\n\nNext, some messages are sent to the object to set the\
    \ values of `thing1`, `thing2`, and `thing3`:\n\n```objc\n[thing setThing1: 5];\n\
    [thing setThing2: 23];\n[thing setThing3: 42];\n```\n\nWhen you’re using an object,\
    \ whether the methods are declared in the interface, in a superclass, or in a\
    \ category doesn’t matter.\n\nAfter the thing values have been set, `NSLog()`\
    \ prints out the object. As you saw in the `description` method for `CategoryThing`,\
    \ this displays the values of the three thing instance variables:\n\n```objc\n\
    NSLog (@\"Things are %@\", thing);\n```\n\nFinally, the autorelease pool is released,\
    \ and `main()` returns 0:\n\n```objc\n}\nreturn (0);\n} // main\n```\n\nThat’s\
    \ it for our little program. Running the program gives these results:\n\n```\n\
    Things are 5 23 42\n```\n\nNot only can you split a class’s implementation across\
    \ multiple source files, you can divide it among multiple frameworks as well.\
    \ `NSString` is a class that lives in the Foundation framework, which has a lot\
    \ of data-oriented classes, such as strings, numbers, and collections. All the\
    \ eye candy (windows, colors, drawing, and the like) lives in the AppKit and UIKit.\
    \ Even though `NSString` is declared in Foundation, the AppKit has a category\
    \ on `NSString` called `NSStringDrawing`, which lets you send draw messages to\
    \ string objects. When you draw a string, the method renders the string’s text\
    \ on the screen. Because this is fancy graphics stuff, it’s an AppKit feature.\
    \ But `NSString`s are Foundation objects. The Cocoa designers used categories\
    \ to put the data functionality into Foundation and the drawing functionality\
    \ into AppKit. We, as programmers, just deal with `NSString`s, and we generally\
    \ won’t care where a particular method comes from.\n\n## Making Forward References\
    \ with Categories\n\nAs we’ve mentioned before, Cocoa doesn’t have any truly private\
    \ methods. If you know the name of a method an object supports, you can call it,\
    \ even if there is no declaration for that method in a class’s `@interface`.\n\
    \nThe compiler, though, tries to be helpful. If it sees you calling a method on\
    \ an object, and it hasn’t seen a declaration or definition for that method yet,\
    \ it complains like this: `warning: 'CategoryThing' may not respond to '–setThing4:'`.\
    \ Generally, this kind of complaint is good, because it will help you catch a\
    \ lot of your typos.\n\nBut the compiler’s vigilance can cause problems if your\
    \ implementation uses methods that aren’t listed in the `@interface` section of\
    \ your class. There are a lot of good reasons why you don’t want to list all your\
    \ methods there. The methods might be pure implementation details, or you might\
    \ be playing around with method names to decide which ones you want to use. But\
    \ if you don’t declare your methods before using them, you’ll get warnings from\
    \ the compiler. Fixing all compiler warnings is a good thing, so what can you\
    \ do?\n\nIf you can arrange to define a method before you use it, the compiler\
    \ will see your definition, and it won’t produce a warning. But if that’s not\
    \ convenient to do, or if you’re using a unpublished method in another class,\
    \ you’ll need to do something else.\n\n### Categories to the Rescue!\n\nDeclaring\
    \ a method in a category is enough for the compiler to say, “OK, this method exists.\
    \ I’m not going to complain if I see the programmer using it.” You don’t actually\
    \ have to implement it if you don’t want to.\n\nOne common technique is to place\
    \ a category at the top of the implementation file. Say that `Car` has a method\
    \ called `rotateTires`. We could implement `rotateTires` in terms of another method\
    \ called `moveTireFromPosition:toPosition:` to swap the tires at two locations.\
    \ This second method is an implementation detail and not something we want to\
    \ put into the public interface of the car. By declaring it in a category, `rotateTires`\
    \ can use `moveTireFromPosition:toPosition:` without generating any warnings from\
    \ the compiler. The category would look like this:\n\n```objc\n@interface Car\
    \ (Private)\n\n- (void) moveTireFromPosition: (int) pos1 toPosition: (int) pos2;\n\
    \n@end // Private\n```\n\nWhen you implement this method, it doesn’t have to exist\
    \ in an `@implementation Car (Private)` block, but if it doesn’t, the compiler\
    \ will give you a warning, so it’s good practice to put these in `@Implementations`.\
    \ Plus, later on, if you need to look for those methods, they’ll be all in one\
    \ place and easy to find. You can leave this method in the `@implementation Car`\
    \ section. This lets you separate your methods into categories as an organizational\
    \ and documentation convenience, while still allowing you to keep all your methods\
    \ in one big pile in the implementation file."
