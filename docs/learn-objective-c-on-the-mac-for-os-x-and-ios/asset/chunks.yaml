    # Chapter 1


    ## Hello


    Welcome to *Learn Objective-C on the Mac*! This book is designed to teach you
    the basics of the Objective-C language. Objective-C is a superset of C and is
    the language used by many (if not most) applications that have a true OS X or
    iOS look and feel.


    In addition to presenting Objective-C, this book introduces you to its companion,
    Apple’s Cocoa (for OS X) and Cocoa Touch (for iOS) toolkits. Cocoa and Cocoa Touch
    are written in Objective-C and contain all the elements of the OS X and iOS user
    interfaces, plus a whole lot more. Once you learn Objective-C, you’ll be ready
    to dive into Cocoa with a full-blown project or another book such as *Learn Cocoa
    on the Mac* (Apress 2010) or *Beginning iOS 5 Development* (Apress 2011).


    In this chapter, we’ll let you know the basic information you need before you
    get started with Objective-C itself. We’ll also serve up a bit of history about
    Objective-C and give you a thumbnail sketch of what’s to come in future chapters.


    ### Before You Start


    Before you read this book, you should have some experience with a C-like programming
    language such as C++, Java, or venerable C itself. Whatever the language, you
    should feel comfortable with its basic principles. You should know what variables,
    methods, and functions are and understand how to control your program’s flow using
    conditionals and loops. Our focus is the features Objective-C adds to its base
    language, C, along with some goodies chosen from Apple’s Cocoa toolkits.


    Are you coming to Objective-C from a non-C language? You’ll still be able to follow
    along, but you might want to take a look at this book’s Appendix or check out
    *Learn C on the Mac* (Apress 2009).


    ### Where the Future Was Made Yesterday


    Cocoa and Objective-C are at the heart of Apple’s OS X and iOS operating systems.
    Although OS X and especially iOS are relatively new, Objective-C and Cocoa are
    much older. Brad Cox invented Objective-C in the early 1980s to meld the popular
    and portable C language with the elegant Smalltalk language. In 1985, Steve Jobs
    founded NeXT, Inc., to create powerful, affordable workstations. NeXT chose Unix
    as its operating system and created NextSTEP, a powerful user interface toolkit
    developed in Objective-C. Despite its features and a small, loyal following, NextSTEP
    achieved little commercial success.


    When Apple acquired NeXT in 1996 (or was it the other way around?), NextSTEP was
    renamed Cocoa and brought to the wider audience of Macintosh programmers. Apple
    gives away its development tools—including Cocoa—for free, so any programmer can
    take advantage of them. All you need is a bit of programming experience, basic
    knowledge of Objective-C, and the desire to dig in and learn stuff.


    You might wonder, "If Objective-C and Cocoa were invented in the ’80s—in the days
    of *Alf* and *The A-Team*, not to mention stuffy old Unix—aren’t they old and
    moldy by now?" Absolutely not! Objective-C and Cocoa are the result of years of
    effort by a team of excellent programmers, and they have been continually updated
    and enhanced. Over time, Objective-C and Cocoa have evolved into an incredibly
    elegant and powerful set of tools. Over the past few years, iOS has become the
    hottest development platform in computing, and Objective-C is the key to writing
    great iOS applications. So now, twenty-some years after NeXT adopted Objective-C,
    all the cool kids are using it.


