  trans: "\n# 代码示例与选择器\n\n```\nif ([car respondsToSelector: @selector(setEngine:)])\n\
    {\n    NSLog (@\"yowza!\");\n}\n```\n这段代码会打印“yowza!”，因为`Car`对象确实响应`setEngine:`消息。\n\
    \n现在来看另一段代码：\n```\nITunesFinder *finder = [[ITunesFinder alloc] init];\nif ([finder\
    \ respondsToSelector:@selector(setEngine:)])\n{\n    NSLog (@\"yowza!\");\n}\n\
    ```\n这次不会出现“yowza!”。`ITunesFinder`没有`setEngine:`方法。\n\n为了获取所需信息，`NSNetServiceBrowser`会调用`respondsToSelector:@selector(netServiceBrowser:didFindService:moreComing:)`。如果委托能够响应这条消息，浏览器就会发送该消息；否则，浏览器暂时忽略该委托，继续正常运行。\n\
    \n## 选择器的其他用途\n\n选择器可以被传递，用作方法的参数，甚至存储为实例变量。这可以带来非常强大和灵活的构造。\n\nFoundation 框架中的`NSTimer`类可以重复向对象发送消息，这在游戏中非常有用——例如，当你希望怪物定期向玩家移动时。创建新的`NSTimer`对象时，你需要指定它要发送消息的目标对象，以及一个选择器来指明要调用的方法。例如，你可以让一个计时器调用游戏引擎的`moveMonsterTowardPlayer:`方法，或者让另一个计时器调用`animateOneFrame:`方法。\n\
    \n## 本章小结\n\n本章介绍了分类（categories）。分类提供了一种向现有类添加新方法的方式，即使你没有这些类的源代码。\n\n除了向现有类添加功能外，分类还允许将对象的实现分散到多个源文件甚至多个框架中。例如，回想一下`NSString`的数据处理方法：这些方法实现在\
    \ Foundation 框架中，与 UIKit 和 AppKit 中的绘图方法分离。\n\n分类允许你声明非正式协议（informal protocols）。非正式协议是`NSObject`上的一个分类，列出了对象可能能够响应的方法。非正式协议用于实现委托（delegation）——一种让你轻松定制对象行为的技术。在此过程中，你还学习了选择器（selectors），它们是在代码中指示特定\
    \ Objective-C 消息的一种方式。\n\n接下来是 Objective-C 的正式协议（formal protocols），它们是非正式协议的“升级版”。\n\
    \n---\n\n# 第 13 章 协议\n\n在上一章中，我们讨论了分类和非正式协议的神奇之处。使用非正式协议时，如第 12 章所示，你只需实现想要响应的方法。对于第\
    \ 12 章中的`NSNetServiceBrowser`委托，我们仅实现了在网络中添加或移除新服务时调用的两个方法，而不必实现`NSNetServiceBrowserDelegate`非正式协议中的其他六个方法。我们也没有在对象中声明任何内容来表明自己可以用作`NSNetServiceBrowser`的委托。一切都以最小的工作量正常运行。\n\
    \n你可能已经猜到，Objective-C 和 Cocoa 还包含了正式协议的概念。在本章中，我们将探讨其工作原理。\n\n## 正式协议\n\n**正式协议**（类似于非正式协议）是一个带名称的方法和属性列表。然而，正式协议要求你显式地采纳它。你通过在类的`@interface`声明中列出协议名称来**采纳**（adopt）该协议。完成这一操作后，你的类就被称为**遵循**（conform）该协议（你可能以为自己是非遵循者）。采纳协议意味着你承诺实现该协议的所有方法。如果你没有这样做，编译器会生成警告。\n\
    \n> **注意**：正式协议类似于 Java 接口。事实上，Objective-C 的协议是 Java 接口的灵感来源。\n\n为什么要创建或采纳正式协议？听起来需要实现每个方法，工作量很大。根据协议的不同，可能还涉及一些繁琐的工作。但通常情况下，协议只有少量方法需要实现，而且无论如何你都必须全部实现才能获得有用的功能集，因此正式协议的要求通常不会成为负担。Objective-C\
    \ 2.0 增加了一些很好的特性，使得使用协议远没有那么繁重，我们将在本章末尾讨论这些内容。\n\n## 声明协议\n\n让我们看看 Cocoa 声明的一个协议——`NSCopying`。如果你采纳了`NSCopying`，你的对象就知道如何复制自身：\n\
    \n```\n@protocol NSCopying\n- (id) copyWithZone: (NSZone *) zone;\n@end\n```\n\
    \n该语法看起来与声明类或分类的语法类似。这里使用`@protocol`而不是`@interface`来告诉编译器：“我将展示一个新正式协议的样子。”该语句后面跟着协议名称。协议名称必须是唯一的。\n\
    \n你也可以拥有父协议，类似于父类。要指定父协议，请在协议名称后的尖括号中声明它。\n\n```\n@protocol MySuperDuberProtocol\
    \ <MyParentProtocol>\n@end\n```\n\n上述代码表示`MySuperDuperProtocol`扩展了`MyParentProtocol`，因此你必须同时满足两个协议中所有必需方法的实现。你始终可以将`NSObject`用作根协议。不要将其与`NSObject`类混淆。`NSObject`类遵循`NSObject`协议，这意味着所有对象都遵循`NSObject`协议。建议将`NSObject`协议作为你正在定义的协议的父协议。\n\
    \n接下来是一个方法声明列表，每个协议采纳者都必须实现这些方法。协议声明以`@end`结束。协议不引入任何实例变量。\n\n让我们看另一个例子，这是来自 Cocoa\
    \ 的`NSCoding`协议：\n\n```\n@protocol NSCoding\n- (void) encodeWithCoder: (NSCoder\
    \ *) encoder;\n- (id) initWithCoder: (NSCoder *) decoder;\n@end\n```\n\n当一个类采纳`NSCoding`时，该类承诺实现这两个消息。`encodeWithCoder:`用于将对象的实例变量“冻干”到`NSCoder`对象中。`initWithCoder:`从`NSCoder`中提取冻干的实例变量，并用它们初始化一个新对象。这两个方法总是成对实现：如果你永远不会将编码的对象恢复为新对象，那么编码就没有意义；如果你从不编码对象，你就没有任何东西可以用来创建新对象。\n\
    \n## 采纳协议\n\n要采纳协议，你需要在类声明中用尖括号列出该协议。例如，如果`Car`采纳了`NSCopying`，声明如下：\n\n```\n@interface\
    \ Car : NSObject <NSCopying>\n{\n    // 实例变量\n}\n// 方法\n@end // Car\n```\n\n如果`Car`同时采纳了`NSCopying`和`NSCoding`，声明如下：\n\
    \n```\n@interface Car : NSObject <NSCopying, NSCoding>\n{\n    // 实例变量\n}\n//\
    \ 方法\n@end // Car\n```\n\n你可以按任意顺序列出协议，顺序无关紧要。\n\n当你采纳一个协议时，你是在向阅读类声明的程序员传达信息：该类的对象可以做两件非常重要的事情——它们可以编码/解码自身，也可以复制自身。\n\
    \n## 实现协议\n\n关于协议需要了解的内容大致就是这些（除了声明变量时的一些语法细节，我们稍后会讨论）。本章的大部分内容将用于实践，我们将通过练习为`CarParts`采纳`NSCopying`协议。\n\
    \n### Car-bon 副本\n"
- fmt: "Let’s all chant together the rule of memory management, “If you get an object\
    \ from an `alloc`, `copy`, or `new`, it has a retain count of 1, and you’re responsible\
    \ for releasing it.” We’ve covered `alloc` and `new` already, but we really haven’t\
    \ discussed `copy` yet. The `copy` method, of course, makes a copy of an object.\
    \ The `copy` message tells an object to create a brand new object and to make\
    \ the new object the same as the receiver.\n\nNow, we’ll be extending `CarParts`\
    \ so that you can make a copy of a car (wait until Detroit hears about this).\
    \ The code for this lives in the `13.01 CarParts-Copy` project folder. Along the\
    \ way, we’ll touch on some interesting subtleties involved in implementing the\
    \ copy-making code.\n\n## Makin’ Copies\n\nActually, you can make copies in a\
    \ bunch of different ways. Most objects refer to—that is, point at—other objects.\
    \ When you create a shallow copy, you don’t duplicate the referred objects; your\
    \ new copy simply points at the referred objects that already exist. `NSArray`’s\
    \ `copy` method makes shallow copies. When you make a copy of an `NSArray`, your\
    \ copy only duplicates the pointers to the referred objects, not the objects themselves.\
    \ If you copy an `NSArray` that holds five `NSStrings`, you still end up with\
    \ five strings running around your program, not ten. In that case, each object\
    \ ends up with a pointer to each string.\n\nA deep copy, on the other hand, makes\
    \ duplicates of all the referred objects. If `NSArray`’s `copy` was a deep copy,\
    \ you’d have ten strings floating around after the copy was made. For `CarParts`,\
    \ we’re going to use a deep copy. This way, when you make a copy of a car, you\
    \ can change a value it refers to, such as a tire’s pressure, without changing\
    \ the pressure for both cars.\n\nYou are free to mix and match deep and shallow\
    \ copies of your composed objects, depending on the needs of your particular class.\n\
    \nTo copy a car, we’ll need to be able to make copies of engines and tires too.\
    \ Programmers, start (with) your engines!\n\n## Copying Engines\n\nThe first class\
    \ we’ll mess with is `Engine`. To be able to make a copy of an engine, the class\
    \ needs to adopt the `NSCopying` protocol. Here is the new interface for `Engine`:\n\
    \n```objectivec\n@interface Engine : NSObject <NSCopying>\n\n@end // Engine\n\
    ```\n\nBecause we’ve adopted the `NSCopying` protocol, we have to implement the\
    \ `copyWithZone:` method. A zone is an `NSZone`, which is a region of memory from\
    \ which you can allocate memory. When you send a `copy` message to an object,\
    \ it gets turned into `copyWithZone:` before reaching your code. Back in days\
    \ of yore, `NSZones` were more important than they are now, but we’re still stuck\
    \ with them like a small piece of baggage.\n\nHere’s `Engine`’s `copyWithZone:`\
    \ implementation:\n\n```objectivec\n- (id) copyWithZone: (NSZone *) zone\n{\n\
    \    Engine *engineCopy;\n    engineCopy = [[[self class] allocWithZone: zone]\
    \ init];\n    return (engineCopy);\n} // copyWithZone\n```\n\n`Engine` has no\
    \ instance variables, so all we have to do is make a new `Engine` object. However,\
    \ that’s not quite as easy as it sounds. Look at that complex statement on the\
    \ right side of `engineCopy`. The message sends are nested three levels deep!\n\
    \nThe first thing this method does is get the class for `self`. Then, it sends\
    \ that class an `allocWithZone:` message to allocate some memory and create a\
    \ new object of that class. Finally, the `init` message is sent to this new object\
    \ to get it initialized. Let’s discuss why we need that complicated nest of messages,\
    \ especially the `[self class]` business.\n\nRecall that `alloc` is a class method.\
    \ `allocWithZone:` is a class method too, which you can tell by the leading plus\
    \ sign in its method declaration:\n\n```objectivec\n+ (id) allocWithZone: (NSZone\
    \ *) zone;\n```\n\nWe’ll need to send this message to a class, rather than an\
    \ instance. What class do we send it to? Our first instinct is to send `allocWithZone:`\
    \ to `Engine`, like this:\n\n```objectivec\n[Engine allocWithZone: zone];\n```\n\
    \nThat will work for `Engine`, but not for an `Engine` subclass. Why not? Ponder\
    \ `Slant6`, which is a subclass of `Engine`. If you send a `Slant6` object the\
    \ `copy` message, eventually the code will end up in `Engine`’s `copyWithZone:`,\
    \ because we ultimately use the copying logic from `Engine`. And if you send `allocWithZone:`\
    \ directly to the `Engine` class, a new `Engine` object will be created, not a\
    \ `Slant6` object. Things can really get confusing if `Slant6` adds instance variables.\
    \ In that case, an `Engine` object won’t be big enough to hold the additional\
    \ variables, so you may end up with memory overrun errors.\n\nNow you probably\
    \ see why we used `[self class]`. By using `[self class]`, the `allocWithZone:`\
    \ will be sent to the class of the object that is receiving the `copy` message.\
    \ If `self` is a `Slant6` object, a new `Slant6` instance is created here. If\
    \ some brand new kind of engine is added to our program in the future (like a\
    \ `MatterAntiMatterReactor`), that new kind of engine will be properly copied\
    \ too.\n\nThe last line of the method returns the newly created object.\n\nLet’s\
    \ double-check memory management. A copy operation should return an object with\
    \ a retain count of one (and not be autoreleased). We get hold of the new object\
    \ via an `alloc`, which always returns an object with a retain count of one, and\
    \ we’re not releasing it, so we’re A-OK in the memory management department.\n\
    \nThat’s it for making `Engine` copy-capable. We don’t have to touch `Slant6`.\
    \ Because `Slant6` doesn’t add any instance variables, it doesn’t have to do any\
    \ extra work when making a copy. Thanks to inheritance, and the technique of using\
    \ `[self class]` when creating the object, `Slant6` objects can be copied too.\n\
    \n## Copying Tires\n\nTires are trickier to copy than engines. `Tire` has two\
    \ instance variables (`pressure` and `treadDepth`) that need to be copied into\
    \ new Tires, and the `AllWeatherRadial` subclass introduces two additional instance\
    \ variables (`rainHandling` and `snowHandling`) that also must be copied into\
    \ a new object.\n\nFirst up is `Tire`.\n\n```objectivec\n@interface Tire : NSObject\
    \ <NSCopying>\n\n@property float pressure;\n@property float treadDepth;\n\n//\
    \ … methods\n\n@end // Tire\n```\n\nAnd now the implementation of `copyWithZone:`:\n\
    \n```objectivec\n- (id) copyWithZone: (NSZone *) zone\n{\n    Tire *tireCopy;\n\
    \    tireCopy = [[[self class] allocWithZone: zone] initWithPressure:\n      \
    \          pressure treadDepth: treadDepth];\n    return (tireCopy);\n} // copyWithZone\n\
    ```\n\nYou can see the `[[self class] allocWithZone: zone]` pattern here, like\
    \ in `Engine`. Since we have to call init when we create the object, we can easily\
    \ use `Tire`’s `initWithPressure:treadDepth:` to set the `pressure` and `treadDepth`\
    \ of the new tire to be the values of the tire we’re copying. This method happens\
    \ to be `Tire`’s designated initializer, but you don’t have to use the designated\
    \ initializer for copying. If you want, you can use a plain `init` along with\
    \ accessor methods to change attributes.\n\n**A Handy Pointer for You** You can\
    \ access public instance variables directly via the C pointer operator, like this:\n\
    \n```objectivec\ntireCopy->pressure = pressure;\ntireCopy->treadDepth = treadDepth;\n\
    ```\n\nGenerally, we try to use init methods and accessor methods in the unlikely\
    \ event that setting an attribute involves extra work.\n\nNow, it’s time for `AllWeatherRadial`.\
    \ The `@interface` for `AllWeatherRadial` is unchanged:\n\n```objectivec\n@interface\
    \ AllWeatherRadial : Tire\n\n// … properties\n\n// … methods\n\n@end // AllWeatherRadial\n\
    ```\n\nWait—where’s the `<NSCopying>`? You don’t need it, and you can probably\
    \ guess why. When `AllWeatherRadial` inherits from `Tire`, it pulls along all\
    \ of `Tire`’s baggage, including the conformance to the `NSCopying` protocol.\n\
    \nWe’ll need to implement `copyWithZone:` though, because we have to make sure\
    \ `AllWeatherRadial`’s rain- and snow-handling instance variables are copied:\n\
    \n```objectivec\n- (id) copyWithZone: (NSZone *) zone\n{\n    AllWeatherRadial\
    \ *tireCopy;\n    tireCopy = [super copyWithZone: zone];\n    tireCopy.rainHandling\
    \ = rainHandling;\n    tireCopy.snowHandling = snowHandling;\n    return (tireCopy);\n\
    } // copyWithZone\n```"
  raw: 'Let’s all chant together the rule of memory management, “If you get an object
    from an alloc, copy, or new, it has a retain count of 1, and you’re responsible
    for releasing it.” We’ve covered alloc and new already, but we really haven’t
    discussed copy yet. The copy method, of course, makes a copy of an object. The
    copy message tells an object to create a brand new object and to make the new
    object the same as the receiver.


    Now, we’ll be extending CarParts so that you can make a copy of a car (wait until
    Detroit hears about this). The code for this lives in the *13.01 CarParts-Copy*
    project folder. Along the way, we’ll touch on some interesting subtleties involved
    in implementing the copy-making code.


    Makin’ Copies Actually, you can make copies in a bunch of different ways. Most
    objects refer to—that is, point at—other objects. When you create a shallow copy,
    you don’t duplicate the referred objects; your new copy simply points at the referred
    objects that already exist. NSArray’s copy method makes shallow copies. When you
    make a copy of an NSArray, your copy only duplicates the pointers to the referred
    objects, not the objects themselves. If you copy an NSArray that holds five NSStrings,
    you still end up with five strings running around your program, not ten. In that
    case, each object ends up with a pointer to each string.


    A **deep** copy, on the other hand, makes duplicates of all the referred objects.
    If NSArray’s copy was a deep copy, you’d have ten strings floating around after
    the copy was made. For CarParts, we’re going to use a deep copy. This way, when
    you make a copy of a car, you can change a value it refers to, such as a tire’s
    pressure, without changing the pressure for both cars.


    You are free to mix and match deep and shallow copies of your composed objects,
    depending on the needs of your particular class.


    To copy a car, we’ll need to be able to make copies of engines and tires too.
    Programmers, start (with) your engines!


    Copying Engines


    The first class we’ll mess with is Engine. To be able to make a copy of an engine,
    the class needs to adopt the NSCopying protocol. Here is the new interface for
    Engine:


    @interface Engine : NSObject <NSCopying>


    @end // Engine


    Because we’ve adopted the NSCopying protocol, we have to implement the copyWithZone:
    method. A **zone** is an NSZone, which is a region of memory from which you can
    allocate memory. When you send a copy message to an object, it gets turned into
    copyWithZone: before reaching your code. Back in days of yore, NSZones were more
    important than they are now, but we’re still stuck with them like a small piece
    of baggage.


    Here’s Engine’s copyWithZone:


    implementation:


    - (id) copyWithZone: (NSZone *) zone


    {


    Engine *engineCopy;


    engineCopy = [[[self class]


    allocWithZone: zone] init];


    return (engineCopy);


    } // copyWithZone


    Engine has no instance variables, so all we have to do is make a new engine object.
    However, that’s not quite as easy as it sounds. Look at that complex statement
    on the right side of engineCopy. The message sends are nested three levels deep!


    The first thing this method does is get the class for self. Then, it sends that
    class an allocWithZone: message to allocate some memory and create a new object
    of that class. Finally, the init message is sent to this new object to get it
    initialized. Let’s discuss why we need that complicated nest of messages, especially
    the [self class] business.


    Recall that alloc is a class method. allocWithZone: is a class method too, which
    you can tell by the leading plus sign in its method declaration:


    + (id) allocWithZone: (NSZone *) zone;


    We’ll need to send this message to a class, rather than an instance. What class
    do we send it to? Our first instinct is to send allocWithZone: to Engine, like
    this:


    [Engine allocWithZone: zone];


    That will work for Engine, but not for an Engine subclass. Why not? Ponder Slant6,
    which is a subclass of Engine. If you send a Slant6 object the copy message, eventually
    the code will end up in Engine’s copyWithZone:, because we ultimately use the
    copying logic from Engine. And if you send allocWithZone: directly to the Engine
    class, a new Engine object will be created, not a Slant6 object. Things can really
    get confusing if Slant6 adds instance variables. In that case, an Engine object
    won’t be big enough to hold the additional variables, so you may end up with memory
    overrun errors.


    Now you probably see why we used [self class]. By using [self class], the allocWithZone:
    will be sent to the class of the object that is receiving the copy message. If
    self is a Slant6 object, a new Slant6 instance is created here. If some brand
    new kind of engine is added to our program in the future (like a MatterAntiMatterReactor),
    that new kind of engine will be properly copied too.


    The last line of the method returns the newly created object.


    Let’s double-check memory management. A copy operation should return an object
    with a retain count of one (and not be autoreleased). We get hold of the new object
    via an alloc, which always returns an object with a retain count of one, and we’re
    not releasing it, so we’re A-OK in the memory management department.


    That’s it for making Engine copy-capable. We don’t have to touch Slant6\. Because
    Slant6 doesn’t add any instance variables, it doesn’t have to do any extra work
    when making a copy. Thanks to inheritance, and the technique of using [self class]
    when creating the object, Slant6 objects can be copied too.


    Copying Tires


    Tires are trickier to copy than engines. Tire has two instance variables (pressure
    and treadDepth) that need to be copied into new Tires, and the AllWeatherRadial
    subclass introduces two additional instance variables (rainHandling and snowHandling)
    that also must be copied into a new object.


    First up is Tire.


    @interface Tire : NSObject <NSCopying>


    @property float pressure;


    @property float treadDepth;


    // … methods


    @end // Tire


    and now the implementation of copyWithZone::


    - (id) copyWithZone: (NSZone *) zone


    {


    Tire *tireCopy;


    tireCopy = [[[self class] allocWithZone: zone] initWithPressure:


    pressure treadDepth: treadDepth];


    return (tireCopy);


    } // copyWithZone


    You can see the [[self class] allocWithZone: zone] pattern here, like in Engine.
    Since we have to call init when we create the object, we can easily use Tire’s
    initWithPressure:treadDepth: to set the pressure and treadDepth of the new tire
    to be the values of the tire we’re copying. This method happens to be Tire’s designated
    initializer, but you don’t have to use the designated initializer for copying.
    If you want, you can use a plain init along with accessor methods to change attributes.


    A Handy Pointer for You You can access public instance variables directly via
    the C pointer operator, like this:


    tireCopy->pressure = pressure;


    tireCopy->treadDepth = treadDepth;


    Generally, we try to use init methods and accessor methods in the unlikely event
    that setting an attribute involves extra work.


    Now, it’s time for AllWeatherRadial. The @interface for AllWeatherRadial is unchanged:


    @interface AllWeatherRadial : Tire


    // … properties


    // … methods


    @end // AllWeatherRadial


    Wait—where’s the <NSCopying>? You don’t need it, and you can probably guess why.
    When AllWeatherRadial inherits from Tire, it pulls along all of Tire’s baggage,
    including the conformance to the NSCopying protocol.


    We’ll need to implement copyWithZone: though, because we have to make sure AllWeatherRadial’s
    rain- and snow-handling instance variables are copied:


    - (id) copyWithZone: (NSZone *) zone


    {


    AllWeatherRadial *tireCopy;


    tireCopy = [super copyWithZone: zone];


    tireCopy.rainHandling = rainHandling;


    tireCopy.snowHandling = snowHandling;


    return (tireCopy);


    } // copyWithZone'
  trans: "\n让我们一同高呼内存管理的规则：“如果你从`alloc`、`copy`或`new`中获取一个对象，它的引用计数为 1，你需要负责释放它。”我们已经介绍过`alloc`和`new`，但尚未讨论`copy`。`copy`方法的作用是创建对象的副本。`copy`消息会指示对象创建一个全新的对象，并使新对象与接收者相同。\n\
    \n接下来，我们将扩展`CarParts`，使其能够复制汽车（等到底特律听到这个消息吧）。相关代码位于`13.01 CarParts-Copy`项目文件夹中。在此过程中，我们将探讨实现副本创建代码时涉及的一些有趣的微妙之处。\n\
    \n## 制作副本\n\n实际上，有多种不同的方式可以制作副本。大多数对象都会引用——即指向——其他对象。当你创建**浅拷贝**时，不会复制被引用的对象；新的副本仅仅指向已经存在的被引用对象。`NSArray`的`copy`方法进行的就是浅拷贝。当你复制一个`NSArray`时，你的副本只会复制指向被引用对象的指针，而不会复制对象本身。如果你复制了一个包含五个`NSString`的`NSArray`，最终程序中仍然只有五个字符串，而不是十个。在这种情况下，每个对象都有一个指向每个字符串的指针。\n\
    \n另一方面，**深拷贝**会复制所有被引用的对象。如果`NSArray`的`copy`是深拷贝，那么在复制之后，你将拥有十个字符串在程序中运行。对于`CarParts`，我们将使用深拷贝。这样，当你复制一辆汽车时，你可以更改它引用的值（例如轮胎气压），而不会同时改变两辆汽车的气压。\n\
    \n你可以根据特定类的需求，自由地混合使用深拷贝和浅拷贝来复制组合对象。\n\n要复制汽车，我们还需要能够复制引擎和轮胎。程序员们，发动引擎吧！\n\n##\
    \ 复制引擎\n\n我们要处理的第一个类是`Engine`。为了能够复制引擎，该类需要遵循`NSCopying`协议。以下是`Engine`的新接口：\n\n\
    ```objectivec\n@interface Engine : NSObject <NSCopying>\n\n@end // Engine\n```\n\
    \n由于我们遵循了`NSCopying`协议，就必须实现`copyWithZone:`方法。Zone 是`NSZone`，它是一个内存区域，你可以从中分配内存。当你向对象发送`copy`消息时，它在到达你的代码之前会转换为`copyWithZone:`。在过去，`NSZone`比现在重要得多，但我们仍然像带着一小件行李一样不得不处理它。\n\
    \n以下是`Engine`的`copyWithZone:`实现：\n\n```objectivec\n- (id) copyWithZone: (NSZone\
    \ *) zone\n{\n    Engine *engineCopy;\n    engineCopy = [[[self class] allocWithZone:\
    \ zone] init];\n    return (engineCopy);\n} // copyWithZone\n```\n\n`Engine`没有实例变量，所以我们只需要创建一个新的`Engine`对象。然而，这并不像听起来那么容易。看看`engineCopy`右侧那个复杂的语句。消息发送嵌套了三层！\n\
    \n这个方法首先获取`self`的类。然后，它向该类发送`allocWithZone:`消息以分配一些内存并创建一个该类的新对象。最后，向这个新对象发送`init`消息以对其进行初始化。让我们讨论一下为什么需要这个复杂的消息嵌套，特别是`[self\
    \ class]`的部分。\n\n回想一下，`alloc`是一个类方法。`allocWithZone:`也是一个类方法，你可以从其方法声明中的前导加号看出：\n\
    \n```objectivec\n+ (id) allocWithZone: (NSZone *) zone;\n```\n\n我们需要向一个类发送此消息，而不是向实例发送。我们应该向哪个类发送呢？我们的第一直觉是将`allocWithZone:`发送给`Engine`，像这样：\n\
    \n```objectivec\n[Engine allocWithZone: zone];\n```\n\n这对`Engine`有效，但对`Engine`的子类无效。为什么不行呢？想想`Slant6`，它是`Engine`的子类。如果你向一个`Slant6`对象发送`copy`消息，最终代码会进入`Engine`的`copyWithZone:`，因为我们最终使用来自`Engine`的复制逻辑。如果你直接将`allocWithZone:`发送给`Engine`类，则会创建一个新的`Engine`对象，而不是`Slant6`对象。如果`Slant6`添加了实例变量，事情可能会变得非常混乱。在这种情况下，`Engine`对象的空间可能不足以容纳额外的变量，从而导致内存溢出错误。\n\
    \n现在你可能明白我们为什么使用`[self class]`了。通过使用`[self class]`，`allocWithZone:`将被发送给接收`copy`消息的对象的类。如果`self`是一个`Slant6`对象，这里就会创建一个新的`Slant6`实例。如果将来程序中添加了某种全新的引擎（比如`MatterAntiMatterReactor`），这种新引擎也能被正确地复制。\n\
    \n方法的最后一行返回新创建的对象。\n\n让我们再次检查一下内存管理。复制操作应返回一个引用计数为 1 的对象（并且不是自动释放的）。我们通过`alloc`获取新对象，它总是返回一个引用计数为\
    \ 1 的对象，并且我们没有释放它，所以我们在内存管理方面没有问题。\n\n让`Engine`具备复制能力就这些了。我们无需改动`Slant6`。因为`Slant6`没有添加任何实例变量，所以在进行复制时不需要做任何额外工作。多亏了继承，以及在创建对象时使用`[self\
    \ class]`的技术，`Slant6`对象也可以被复制。\n\n## 复制轮胎\n\n复制轮胎比复制引擎更复杂。`Tire`有两个实例变量（`pressure`和`treadDepth`）需要复制到新的轮胎中，而`AllWeatherRadial`子类引入了两个额外的实例变量（`rainHandling`和`snowHandling`），这些也必须复制到一个新对象中。\n\
    \n首先是`Tire`。\n\n```objectivec\n@interface Tire : NSObject <NSCopying>\n\n@property\
    \ float pressure;\n@property float treadDepth;\n\n// … methods\n\n@end // Tire\n\
    ```\n\n现在是`copyWithZone:`的实现：\n\n```objectivec\n- (id) copyWithZone: (NSZone *)\
    \ zone\n{\n    Tire *tireCopy;\n    tireCopy = [[[self class] allocWithZone: zone]\
    \ initWithPressure:\n                pressure treadDepth: treadDepth];\n    return\
    \ (tireCopy);\n} // copyWithZone\n```\n\n你可以看到这里像`Engine`一样使用了`[[self class] allocWithZone:\
    \ zone]`模式。由于我们必须在创建对象时调用 init，所以可以方便地使用`Tire`的`initWithPressure:treadDepth:`将新轮胎的`pressure`和`treadDepth`设置为我们正在复制的轮胎的值。这个方法恰好是`Tire`的指定初始化器，但你不必为了复制而使用指定初始化器。如果你愿意，也可以使用普通的`init`以及存取器方法来更改属性。\n\
    \n**给您的实用提示** 你可以通过 C 指针运算符直接访问公共实例变量，如下所示：\n\n```objectivec\ntireCopy->pressure\
    \ = pressure;\ntireCopy->treadDepth = treadDepth;\n```\n\n通常情况下，我们倾向于使用 init 方法和存取器方法，以防设置属性涉及到额外的工作（尽管这种情况不太可能发生）。\n\
    \n现在，轮到`AllWeatherRadial`了。`AllWeatherRadial`的`@interface`没有变化：\n\n```objectivec\n\
    @interface AllWeatherRadial : Tire\n\n// … properties\n\n// … methods\n\n@end\
    \ // AllWeatherRadial\n```\n\n等等——`<NSCopying>`在哪里？你不需要它，你可能已经猜到了原因。当`AllWeatherRadial`继承自`Tire`时，它一并带来了`Tire`的所有“行李”，包括对`NSCopying`协议的遵循。\n\
    \n不过，我们仍需要实现`copyWithZone:`，因为必须确保`AllWeatherRadial`的雨雪处理实例变量被复制：\n\n```objectivec\n\
    - (id) copyWithZone: (NSZone *) zone\n{\n    AllWeatherRadial *tireCopy;\n   \
    \ tireCopy = [super copyWithZone: zone];\n    tireCopy.rainHandling = rainHandling;\n\
    \    tireCopy.snowHandling = snowHandling;\n    return (tireCopy);\n} // copyWithZone\n\
    ```\n"
- fmt: "# Copying Custom Objects\n\n## Copying `AllWeatherRadial`\n\nBecause `AllWeatherRadial`\
    \ is a subclass of a class that can be copied, it doesn’t need to do the `allocWithZone:`\
    \ and `[self class]` jazz we used earlier. This class just asks its superclass\
    \ for a copy and hopes that the superclass does the right thing and uses `[self\
    \ class]` when allocating the object. Because `Tire`’s `copyWithZone:` uses `[self\
    \ class]` to determine the kind of object to make, it will create a new `AllWeatherRadial`\
    \ instance, which is just what we want. That code also handles copying the `pressure`\
    \ and `treadDepth` values for us. Now, isn’t that convenient?\n\nThe rest of the\
    \ work is to set the rain- and snow-handling values. The properties are good for\
    \ doing that.\n\n## Copying the `Car`\n\nNow that we can make copies of engines\
    \ and tires and their subclasses, it’s time to make the `Car` itself copyable.\n\
    \nAs you’d expect, `Car` needs to adopt the `NSCopying` protocol:\n\n```objc\n\
    @interface Car : NSObject <NSCopying>\n\n// properties\n\n// … methods\n\n@end\
    \ // Car\n```\n\nAnd to fulfill its promise to `NSCopying`, `Car` must implement\
    \ our old friend `copyWithZone:`. Here is `Car`’s `copyWithZone:` method:\n\n\
    ```objc\n- (id) copyWithZone: (NSZone *) zone\n{\n    Car *carCopy;\n    carCopy\
    \ = [[[self class] allocWithZone: zone] init];\n    carCopy.name = self.name;\n\
    \n    Engine *engineCopy;\n    engineCopy = [[engine copy] autorelease];\n   \
    \ carCopy.engine = engineCopy;\n\n    for (int i = 0; i < 4; i++)\n    {\n   \
    \     Tire *tireCopy;\n        tireCopy = [[self tireAtIndex: i] copy];\n    \
    \    [tireCopy autorelease];\n        [carCopy setTire: tireCopy atIndex: i];\n\
    \    }\n\n    return (carCopy);\n} // copyWithZone\n```\n\nThat’s a little more\
    \ code than we’ve been writing, but all of it is similar to what you’ve seen already.\n\
    \nFirst, a new car is allocated by sending `allocWithZone:` to the class of the\
    \ object that’s receiving this message:\n\n```objc\nCar *carCopy;\ncarCopy = [[[self\
    \ class] allocWithZone: zone] init];\n```\n\n`CarParts-copy` contains no subclasses\
    \ of `Car`, but it might someday. You never know when someone will make one of\
    \ those time-traveling DeLoreans. We can future-proof ourselves by allocating\
    \ the new object using `self`’s class, as we’ve done so far.\n\nWe need to copy\
    \ over the car’s appellation:\n\n```objc\ncarCopy.name = self.name;\n```\n\nRemember\
    \ that the `name` property will copy its string, so the new car will have the\
    \ proper name.\n\nNext, a copy of the engine is made, and the car copy is told\
    \ to use that for its engine:\n\n```objc\nEngine *engineCopy;\nengineCopy = [[engine\
    \ copy] autorelease];\ncarCopy.engine = engineCopy;\n```\n\nSee that `autorelease`?\
    \ Is it necessary? Let’s think through our memory management for a second. `[engine\
    \ copy]` will return an object with a retain count of 1. `setEngine:` will retain\
    \ the engine that’s given to it, making the retain count 2. When the car copy\
    \ is (eventually) destroyed, the engine will be released by `Car`’s `dealloc`,\
    \ so its retain count goes back to 1. By the time that happens, this code will\
    \ be long gone, so nobody will be around to give it that last release to cause\
    \ it to be deallocated. In that case, the engine object would leak. By autoreleasing\
    \ it, the reference count will be decremented sometime in the future when the\
    \ autorelease pool gets drained.\n\nCould we have done a simple `[engineCopy release]`\
    \ instead of autoreleasing? Yes. You’d have to do the release after the `setEngine:`\
    \ call; otherwise, the engine copy would be destroyed before being used. Which\
    \ way you choose to manage the memory is up to your own tastes. Some programmers\
    \ like to keep their memory cleanup in one place in their functions, and others\
    \ like to autorelease the objects at the point of creation so they don’t forget\
    \ to release them later on. Either approach is valid, but note that for iOS apps,\
    \ Apple recommends you release right away and not use `autorelease`, because you\
    \ don’t know when the autorelease will decrement the retain count.\n\nAfter `carCopy`\
    \ is outfitted with a new engine, a `for` loop spins around four times, copying\
    \ each tire and installing the copies on the new car:\n\n```objc\nfor (int i =\
    \ 0; i < 4; i++)\n{\n    Tire *tireCopy;\n    tireCopy = [[self tireAtIndex: i]\
    \ copy];\n    [tireCopy autorelease];\n    [carCopy setTire: tireCopy atIndex:\
    \ i];\n}\n```"
  raw: 'Because AllWeatherRadial is a subclass of a class that can be copied, it doesn’t
    need to do the allocWithZone: and [self class] jazz we used earlier. This class
    just asks its superclass for a copy and hopes that the superclass does the right
    thing and uses [self class] when allocating the object. Because Tire’s copyWithZone:
    uses [self class] to determine the kind of object to make, it will create a new
    AllWeatherRadial instance, which is just what we want. That code also handles
    copying the pressure and treadDepth values for us. Now, isn’t that convenient?


    The rest of the work is to set the rain- and snow-handling values. The properties
    are good for doing that.


    Copying the Car


    Now that we can make copies of engines and tires and their subclasses, it’s time
    to make the Car itself copyable.


    As you’d expect, Car needs to adopt the NSCopying protocol:


    @interface Car : NSObject <NSCopying>


    // properties


    // … methods


    @end // Car


    And to fulfill its promise to NSCopying, Car must implement our old friend copyWithZone:.
    Here is Car’s copyWithZone: method:


    - (id) copyWithZone: (NSZone *) zone


    {


    Car *carCopy;


    carCopy = [[[self class] allocWithZone: zone] init];


    carCopy.name = self.name;


    Engine *engineCopy;


    engineCopy = [[engine copy] autorelease];


    carCopy.engine = engineCopy;


    for (int i = 0; i < 4; i++)


    {


    Tire *tireCopy;


    tireCopy = [[self tireAtIndex: i] copy];


    [tireCopy autorelease];


    [carCopy setTire: tireCopy atIndex: i];


    }


    return (carCopy);


    } // copyWithZone


    That’s a little more code than we’ve been writing, but all of it is similar to
    what you’ve seen already.


    First, a new car is allocated by sending allocWithZone: to the class of the object
    that’s receiving this message:


    Car *carCopy;


    carCopy = [[[self class] allocWithZone: zone] init];


    CarParts-copy contains no subclasses of Car, but it might someday. You never know
    when someone will make one of those time-traveling DeLoreans. We can future-proof
    ourselves by allocating the new object using self’s class, as we’ve done so far.


    We need to copy over the car’s appellation:


    carCopy.name = self.name;


    Remember that the name property will copy its string, so the new car will have
    the proper name.


    Next, a copy of the engine is made, and the car copy is told to use that for its
    engine:


    Engine *engineCopy;


    engineCopy = [[engine copy] autorelease];


    carCopy.engine = engineCopy;


    See that autorelease? Is it necessary? Let’s think through our memory management
    for a second. [engine copy] will return an object with a retain count of 1. setEngine:
    will retain the engine that’s given to it, making the retain count 2\. When the
    car copy is (eventually) destroyed, the engine will be released by Car’s dealloc,
    so its retain count goes back to 1\. By the time that happens, this code will
    be long gone, so nobody will be around to give it that last release to cause it
    to be deallocated. In that case, the engine object would leak. By autoreleasing
    it, the reference count will be decremented sometime in the future when the autorelease
    pool gets drained.


    Could we have done a simple [engineCopy release] instead of autoreleasing? Yes.
    You’d have to do the release after the setEngine: call; otherwise, the engine
    copy would be destroyed before being used. Which way you choose to manage the
    memory is up to your own tastes. Some programmers like to keep their memory cleanup
    in one place in their functions, and others like to autorelease the objects at
    the point of creation so they don’t forget to release them later on. Either approach
    is valid, but note that for iOS apps, Apple recommends you release right away
    and not use autorelease, because you don’t know when the autorelease will decrement
    the retain count.


    After carCopy is outfitted with a new engine, a for loop spins around four times,
    copying each tire and installing the copies on the new car:


    for (int i = 0; i < 4; i++)


    {


    Tire *tireCopy;


    tireCopy = [[self tireAtIndex: i] copy];


    [tireCopy autorelease];


    [carCopy setTire: tireCopy atIndex: i];


    }'
  trans: "\n# 复制自定义对象\n\n## 复制 `AllWeatherRadial`\n\n由于 `AllWeatherRadial` 是可复制类的子类，它无需执行我们之前用到的\
    \ `allocWithZone:` 和 `[self class]` 这些操作。该类只需向父类请求一份副本，并期望父类在分配对象时正确处理，使用了 `[self\
    \ class]`。因为 `Tire` 的 `copyWithZone:` 方法使用 `[self class]` 来确定要创建的对象类型，所以它会创建一个新的\
    \ `AllWeatherRadial` 实例，这正是我们想要的。该代码还为我们处理了 `pressure` 和 `treadDepth` 值的复制。现在，是不是很方便？\n\
    \n剩下的工作就是设置处理雨雪路况的属性值。这些属性正是用来完成这项任务的。\n\n## 复制 `Car`\n\n既然我们现在可以复制发动机、轮胎及其子类，是时候让\
    \ `Car` 自身也变得可复制了。\n\n正如你所料，`Car` 需要遵循 `NSCopying` 协议：\n\n```objc\n@interface\
    \ Car : NSObject <NSCopying>\n\n// 属性\n\n// … 方法\n\n@end // Car\n```\n\n为了履行对\
    \ `NSCopying` 协议的承诺，`Car` 必须实现我们的老朋友 `copyWithZone:`。以下是 `Car` 的 `copyWithZone:`\
    \ 方法：\n\n```objc\n- (id) copyWithZone: (NSZone *) zone\n{\n    Car *carCopy;\n\
    \    carCopy = [[[self class] allocWithZone: zone] init];\n    carCopy.name =\
    \ self.name;\n\n    Engine *engineCopy;\n    engineCopy = [[engine copy] autorelease];\n\
    \    carCopy.engine = engineCopy;\n\n    for (int i = 0; i < 4; i++)\n    {\n\
    \        Tire *tireCopy;\n        tireCopy = [[self tireAtIndex: i] copy];\n \
    \       [tireCopy autorelease];\n        [carCopy setTire: tireCopy atIndex: i];\n\
    \    }\n\n    return (carCopy);\n} // copyWithZone\n```\n\n这段代码比我们之前写的稍多一些，但所有内容都与你已经见过的类似。\n\
    \n首先，通过向接收此消息的对象的类发送 `allocWithZone:` 来分配一辆新车：\n\n```objc\nCar *carCopy;\ncarCopy\
    \ = [[[self class] allocWithZone: zone] init];\n```\n\n`CarParts-copy` 目前不包含 `Car`\
    \ 的子类，但未来可能会有。你永远不知道何时会有人制造出那种能时间旅行的德罗宁汽车。我们可以像之前所做的那样，通过使用 `self` 的类来分配新对象，从而做到面向未来。\n\
    \n我们需要复制汽车的名称：\n\n```objc\ncarCopy.name = self.name;\n```\n\n请记住，`name` 属性会复制其字符串，因此新车将拥有正确的名称。\n\
    \n接下来，制作一份发动机的副本，并告知新车副本使用该副本作为其发动机：\n\n```objc\nEngine *engineCopy;\nengineCopy\
    \ = [[engine copy] autorelease];\ncarCopy.engine = engineCopy;\n```\n\n看到那个 `autorelease`\
    \ 了吗？它是必需的吗？让我们稍微思考一下内存管理。 `[engine copy]` 会返回一个引用计数为 1 的对象。 `setEngine:` 会保留（retain）传入的发动机，使其引用计数变为\
    \ 2。当新车副本最终被销毁时，`Car` 的 `dealloc` 会释放（release）发动机，因此其引用计数会回到 1。到那时，这段代码早已执行完毕，所以没有代码会执行最后一次\
    \ release 以使其被释放。在这种情况下，发动机对象就会泄漏。通过自动释放（autorelease），引用计数会在未来某个时刻自动释放池被清空时减一。\n\
    \n我们是否可以用简单的 `[engineCopy release]` 来代替自动释放？可以。但你必须在调用 `setEngine:` 之后执行 release；否则，发动机副本会在被使用之前就被销毁。选择哪种内存管理方式取决于你的个人喜好。有些程序员喜欢在函数中将内存清理工作集中在一处，而另一些喜欢在创建对象时就自动释放，以免以后忘记释放。这两种方法都是有效的，但请注意，对于\
    \ iOS 应用，Apple 建议立即释放而不是使用 `autorelease`，因为你不知道自动释放何时会减少引用计数。\n\n在 `carCopy` 配备新发动机后，一个\
    \ `for` 循环会循环四次，复制每个轮胎并将副本安装到新车上：\n\n```objc\nfor (int i = 0; i < 4; i++)\n{\n\
    \    Tire *tireCopy;\n    tireCopy = [[self tireAtIndex: i] copy];\n    [tireCopy\
    \ autorelease];\n    [carCopy setTire: tireCopy atIndex: i];\n}\n```\n"
- fmt: "循环中的代码使用访问器方法依次获取位置 0、位置 1 等位置的轮胎，并在每次循环时依次进行。每个获取到的轮胎会被复制并自动释放，以确保其内存得到妥善处理。接着，汽车副本被指示在相同位置使用这个新轮胎。由于我们精心构造了\
    \ `Tire` 和 `AllWeatherRadial` 中的 `copyWithZone:` 方法，这段代码能够与任何一种轮胎正常工作。你会注意到我们没有使用\
    \ `NSArray` 的 `copy` 方法，因为它执行的是浅拷贝，而我们需要的是深拷贝。\n\n最后，这里是完整的 `main()` 函数。其中大部分是你在前面章节中见过的旧代码；时髦的新代码以粗体显示：\n\
    \n```c\nint main (int argc, const char * argv[]) {\n    @autoreleasepool {\n \
    \       Car *car = [[Car alloc] init];\n        car.name = @\"Herbie\";\n    \
    \    \n        for (int i = 0; i < 4; i++) {\n            AllWeatherRadial *tire;\n\
    \            tire = [[AllWeatherRadial alloc] init];\n            [car setTire:\
    \ tire atIndex: i];\n            [tire release];\n        }\n        \n      \
    \  Slant6 *engine = [[Slant6 alloc] init];\n        car.engine = engine; [engine\
    \ release];\n        \n        [car print];\n        \n        Car *carCopy =\
    \ [car copy];\n        [carCopy print];\n        \n        [car release];\n  \
    \      [carCopy release];\n    }\n    return (0);\n} // main\n```\n\n在原始汽车被打印输出后，创建了一份副本，并打印了该副本。因此，我们应该得到两组相同的输出。运行程序，你会看到类似这样的内容：\n\
    \n```\nHerbie has:\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial:\
    \ 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial:\
    \ 34.0 / 20.0 / 23.7 / 42.5\nI am a slant-6. VROOOM!\n\nHerbie has:\nAllWeatherRadial:\
    \ 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial:\
    \ 34.0 / 20.0 / 23.7 / 42.5\nAllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5\nI am\
    \ a slant-6. VROOOM!\n```\n\n## 协议与数据类型\n\n你可以在实例变量和方法参数所使用的数据类型中指定协议名称。通过这样做，你向Objective-C编译器提供了更多信息，从而帮助它检查代码中的错误。\n\
    \n回顾一下，`id`类型表示指向任意类型对象的指针；它是一种通用的对象类型。你可以将任何对象赋值给`id`变量，也可以将`id`变量赋值给任何类型的对象指针。如果在`id`后面跟上协议名称（用尖括号括起来），则是在告诉编译器（以及任何阅读代码的人）：你期望的是任意类型的对象，只要它遵循该协议即可。\n\
    \n例如，`NSControl`有一个名为`setObjectValue:`的方法，它需要一个遵循`NSCopying`协议的对象：\n\n```objectivec\n\
    - (void) setObjectValue: (id<NSCopying>) object;\n```\n\n编译这段代码时，编译器会检查参数的类型，并给出警告，例如“类\
    \ 'Triangle' 未实现 'NSCopying' 协议”。这非常方便！\n\n## Objective-C 2.0 新特性\n\n苹果公司永远不会满足于现状。Objective-C\
    \ 2.0 为协议新增了两个修饰符：`@optional` 和 `@required`。等等，我们刚才是不是说过，如果你遵循了一个协议，就必须实现该协议的所有方法？是的，没错，除非你指定了\
    \ `@optional` 关键字。因此，你可以编写像下面这样时髦的代码：\n\n```objectivec\n@protocol BaseballPlayer\n\
    - (void)drawHugeSalary;\n@optional\n- (void)slideHome;\n- (void)catchBall;\n-\
    \ (void)throwBall;\n@required\n- (void)swingBat;\n@end // BaseballPlayer\n```\n\
    \n这段代码的意思是，采用`BaseballPlayer`协议的类必须实现`-drawHugeSalary`和`-swingBat`方法，但可以选择实现`slideHome`、`catchBall`或`throwBall`方法。\n\
    \n既然非正式协议似乎也能正常工作，为什么苹果还要添加这个特性呢？这是因为，在类声明和方法声明中明确表达我们意图的工具箱里，又多了一件利器。假设你在头文件中看到这样一行代码：\n\
    \n```objectivec\n@interface CalRipken : Person <BaseballPlayer>\n```\n\n你立刻就会知道，我们处理的是一个能赚大钱、能挥棒，并且可能会滑垒、接球或投球的人。如果使用非正式协议，就无法传达这些信息。同样地，你也可以用协议来修饰方法的参数：\n\
    \n```objectivec\n- (void)draft:(Person<BaseballPlayer>);\n```"
  raw: 'The code in the loop uses an accessor method to get the tire at position 0,
    then position 1, and so on each time through the loop. That tire is then copied
    and autoreleased so that its memory is handled properly. Next, the car copy is
    told to use this new tire at the same position. Because we constructed the copyWithZone:
    methods in Tire and AllWeatherRadial carefully, this code will work correctly
    with either kind of tire. You will notice that we did not use the NSArray’s copy
    method, because it makes a shallow copy and we want a deep copy.


    Finally, here’s main() in its entirety. Most of it is old code you’ve seen in
    previous chapters; the groovy new code appears in bold:


    int main (int argc, const char * argv[]) {


    @autoreleasepool


    {


    Car *car = [[Car alloc] init];


    car.name = @"Herbie";


    for (int i = 0; i < 4; i++)


    {


    AllWeatherRadial *tire;


    tire = [[AllWeatherRadial alloc] init];


    [car setTire: tire atIndex: i];


    [tire release];


    }


    Slant6 *engine = [[Slant6 alloc] init];


    car.engine = engine; [engine release];


    [car print];


    Car *carCopy = [car copy];


    [carCopy print];


    [car release];


    [carCopy release];


    }


    return (0);


    } // main


    After the original car is printed out, a copy is made, and that one is printed
    out. We should, therefore, get two sets of identical output. Run the program,,
    and you’ll see something like this:


    Herbie has:


    AllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5


    AllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5


    AllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5


    AllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5


    I am a slant-6\. VROOOM!


    Herbie has:


    AllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5


    AllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5


    AllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5


    AllWeatherRadial: 34.0 / 20.0 / 23.7 / 42.5


    I am a slant-6\. VROOOM!


    Protocols and Data Types


    You can specify protocol names in the data types you use for instance variables
    and method arguments. By doing this, you give the Objective-C compiler a little
    more information so it can help error-check your code.


    Recall that the id type represents a pointer to any kind of object; it’s the generic
    object type. You can assign any object to an id variable, and you can assign an
    id variable to any kind of object pointer. If you follow id with a protocol name,
    complete with angle brackets, you’re telling the compiler (and any humans reading
    the code) that you are expecting any kind of object, as long as it conforms to
    that protocol.


    For example, NSControl has a method called setObjectValue:, which requires an
    object that conforms to NSCopying:


    - (void) setObjectValue: (id<NSCopying>) object;


    When you compile this, the compiler checks the type of the argument and gives
    you a warning, like “class ''Triangle'' does not implement the ''NSCopying'' protocol.”
    Handy!


    Objective-C 2.0 Goodies


    Apple never leaves well enough alone. Objective-C 2.0 added two new modifiers
    for protocols:

    @optional and @required. Wait a minute. Did we just say that if you conform to
    a protocol, you’re required to implement all of the protocol’s methods? Yes, that’s
    true, unless you specify the

    @optional keyword. So you can do groovy stuff like this:


    @protocol BaseballPlayer


    - (void)drawHugeSalary;


    @optional


    - (void)slideHome;


    - (void)catchBall;


    - (void)throwBall;


    @required


    - (void)swingBat;


    @end // BaseballPlayer


    This code says a class that adopts the BaseballPlayer protocol is required to
    implement -drawHugeSalary and -swingBat but has the option of sliding home, catching
    the ball, or throwing the ball.


    Why would Apple add this feature, when informal protocols seem to work OK? It’s
    one more tool in our arsenal to explicitly express our intent in class declarations
    and our method declarations. Say you saw this in a header file:


    @interface CalRipken : Person <BaseballPlayer>


    You know immediately that we’re dealing with someone who gets paid a lot and can
    swing a bat and who might slide home or catch or throw the ball. With an informal
    protocol, there’s no way to say this. Likewise, you can decorate arguments to
    methods with a protocol:


    -(void)draft:(Person<BaseballPlayer>);'
