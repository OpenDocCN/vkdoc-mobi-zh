    \n## Summary\n\nWe’ve covered a lot of stuff in this chapter! We introduced three\
    \ new language features: class methods (which are methods that are handled by\
    \ the class itself instead of a particular instance), the `@encode()` directive\
    \ used for methods that need a description of a C type to do their work, and fast\
    \ enumeration.\n\nWe looked at a number of useful Cocoa classes, including `NSString`,\
    \ `NSArray`, and `NSDictionary`. `NSString` holds human-readable text, while `NSArray`\
    \ and `NSDictionary` hold collections of objects. These objects are immutable:\
    \ they can’t change after you create them. Cocoa provides mutable versions of\
    \ these classes, which let you change their contents at will.\n\nDespite all our\
    \ efforts (and despite the length of this chapter), we’ve just barely scratched\
    \ the surface of the hundreds of different classes in Cocoa. You can have fun\
    \ and get smarter by digging around and learning about more of these classes.\n\
    \nFinally, we used the classes we learned about to spin through our home directory\
    \ looking for groovy pictures.\n\nIn the next chapter, we dive into the mysteries\
    \ of memory management, and you’ll learn how you can clean up after yourself if\
    \ you make any messes.\n\n## Chapter 9\n\n## Memory Management\n\nNext on our\
    \ plate is memory management using Objective-C and Cocoa (yum!). Memory management\
    \ is part of a more general problem in programming called **resource management**.\
    \ Every computer system has finite resources for your program to use. These include\
    \ memory, open files, and network connections. If you use a resource, such as\
    \ by opening a file, you need to clean up after yourself (in this case, by closing\
    \ the file). If you keep on opening files but never close them, you’ll eventually\
    \ run out of file capacity. Think about your public library. If everyone borrowed\
    \ books but never returned them, eventually the library would close because it\
    \ would have no more books, and everybody would be sad. Nobody wants that.\n\n\
    Of course, when your program ends, the operating system reclaims the resources\
    \ it used. But as long as your program is running, it uses resources, and if you\
    \ don’t practice cleanliness, some resource will eventually be used up, and your\
    \ program will probably crash. And as operating systems evolve, the notion of\
    \ when a program actually ends is becoming more fuzzy.\n\nNot every program uses\
    \ files or network connections, but every program uses memory. Memory-related\
    \ errors are the bane of every programmer who uses a C-style language. Our friends\
    \ in the Java and scripting worlds have it easy: memory management happens automatically\
    \ for them, like having their parents clean up their rooms. We, on the other hand,\
    \ have to make sure to allocate memory when we need it and free that memory when\
    \ we’re finished with it. If we allocate without freeing, we’ll **leak memory**:\
    \ our program’s memory consumption will grow and grow until we run out of memory,\
    \ and then, the program will crash. We need to be equally careful not to use any\
    \ memory after we free it. We might be using stale data, which can cause all sorts\
    \ of errors, or something else might have moved into that memory, and then we\
    \ end up corrupting the new stuff.\n\n> **Note**  Memory management is a hard\
    \ problem. Cocoa’s solutions are rather elegant but do take some time to wrap\
    \ your mind around. Even programmers with decades of experience have problems\
    \ when first encountering this material, so don’t worry if it leaves your head\
    \ spinning for a while.\n\n## Object Life Cycle\n\nJust like the birds and the\
    \ bees out here in the real world, objects inside a program have a life cycle.\
    \ They’re born (via `alloc` or `new`); they live (receive messages and do stuff),\
    \ make friends (via composition and arguments to methods), and eventually die\
    \ (get freed) when their lives are over. When that happens, their raw materials\
    \ (memory) are recycled and used for the next generation.\n\n## Reference Counting\n\
    \nNow, it’s pretty obvious when an object is born, and we’ve talked a lot about\
    \ how to use an object, but how do we know when an object’s useful life is over?\
    \ Cocoa uses a technique known as **reference counting**, also sometimes called\
