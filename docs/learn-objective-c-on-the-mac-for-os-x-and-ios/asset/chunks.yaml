    family and play golf. He blogs at [nickwaynik.com](http://nickwaynik.com) and
    can be found on Twitter as @n_dubbs.


    ## Acknowledgments


    This book didn’t write itself, you know. And we, the authors, didn’t do all the
    work either—not even close. Sure, we typed a bunch of words and code, but without
    our amazing book team, what would we have? A really long blog post, maybe.


    Enormous thanks go to Brent Dubi, who held everything together with relentlessly
