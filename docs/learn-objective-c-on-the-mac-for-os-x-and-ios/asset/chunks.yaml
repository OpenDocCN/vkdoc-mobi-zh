    ### `@interface`


    分类的声明看起来与类的声明非常相似：


    ```

    @interface NSString (NumberConvenience)


    - (NSNumber *) lengthAsNumber;


    @end // NumberConvenience

    ```


    你应该会注意到这个声明中有几个有趣的地方。首先，提到了一个现有类，后面跟随着括号中的一个新名称。这意味着该分类叫做 `NumberConvenience`，并且它为
    `NSString` 添加了方法。另一种说法是：“我们正在向 `NSString` 添加一个名为 `NumberConvenience` 的分类。”你可以为一个类添加任意多个分类，只要分类名称是唯一的即可。


    你指定了要添加分类的类（`NSString`）和分类的名称（`NumberConvenience`），然后列出你要添加的方法，最后以 `@end` 结尾。你不能添加新的实例变量，因此这里没有像类声明中那样的实例变量部分。


    你也可以向分类添加属性。由于不能添加实例变量，这些属性必须是 `@dynamic` 类型。添加属性的好处是可以使用点语法来访问 setter 和 getter
    方法。


    ### `@implementation`


    毫不意外，`@interface` 部分有一个对应的 `@implementation` 部分。你将编写的方法放在 `@implementation` 中：


    ```

    @implementation NSString (NumberConvenience)


    - (NSNumber *) lengthAsNumber


    {


    NSUInteger length = [self length];


    return ([NSNumber numberWithUnsignedInt:length]);


    } // lengthAsNumber


    @end // NumberConvenience

    ```


    与分类的 `@interface` 类似，`@implementation` 也包含了类名和分类名，以及新方法的具体实现。


    `lengthAsNumber` 方法通过调用 `[self length]` 获取字符串的长度。你将向该字符串发送 `lengthAsNumber` 消息。然后，使用该长度创建一个新的
    `NSNumber`。


    让我们花点时间讨论一下我们最喜欢的新话题之一：内存管理。这段代码正确吗？是的！`numberWithUnsignedInt` 不是 `alloc`、`copy`
    或 `new` 方法。因为它不属于这三者之一，所以它会返回一个我们可以假定其引用计数为 1 且已自动释放的对象。我们创建的 `NSNumber` 对象将在当前活跃的自动释放池被销毁时得到清理。


    以下是这个新分类的实际应用。`main()` 创建了一个新的 `NSMutableDictionary`，添加了三个字符串作为键，并将这些字符串的长度作为值：


    ```

    int main(int argc, const char * argv[])


    {


    @autoreleasepool


    {


    NSMutableDictionary *dict = [NSMutableDictionary dictionary];


    [dict setObject:[@"hello" lengthAsNumber]


    forKey:@"hello"];


    [dict setObject:[@"iLikeFish" lengthAsNumber]


    forKey:@"iLikeFish"];


    [dict setObject:[@"Once upon a time" lengthAsNumber]


    forKey:@"Once upon a time"];


    NSLog (@"%@", dict);


    }


    return 0;


    }

    ```


    让我们按照老办法，一点一点地拆解这段代码。


    我们需要做的第一件事是将头文件导入到 `main()` 中，以便我们知道 `NSString` 已经定义了此方法。在其他 `#import` 语句的末尾，我们添加如下内容：


    ```

    #import "NSString+NumberConvenience.h"

    ```


    接下来，我们创建一个自动释放池，采用 ARC 友好的方式：


    ```

    @autoreleasepool {

    ```


    不要忘记代码末尾的结束花括号。顺便提醒一下，这个池用于存放所有自动释放的对象。特别地，可变字典以及我们分类创建的所有 `NSNumber` 对象最终都会在这个池中。


    创建完池之后，创建一个新的可变字典。回想一下，这个方便的 Cocoa 类允许我们存储键值对。


    ```

    NSMutableDictionary *dict = [NSMutableDictionary dictionary];

    ```


    我们不能将像 int 这样的基本类型放入字典中，因此必须使用像 `NSNumber` 这样的包装类。幸运的是，我们闪亮的新分类使得将字符串长度嵌入到 `NSNumber`
    中变得轻而易举。下面的代码将值 5 添加到字典中，使用了键 `@"hello"`：


    ```

    [dict setObject: [@"hello" lengthAsNumber] forKey: @"hello"];

    ```

