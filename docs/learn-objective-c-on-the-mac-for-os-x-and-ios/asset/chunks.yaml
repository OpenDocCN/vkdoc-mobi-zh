  raw: 'BASIC has a very rich market in third-party controls and support code. Frequently,
    you can buy something off the shelf and integrate it into your codebase rather
    than build it yourself.


    Coming from Scripting Languages


    Programmers coming from scripting languages, such as Perl, PHP, Python, and Tcl,
    probably have the hardest transition to the Objective-C and Cocoa world.


    Scripting languages excel in programmer conveniences, such as very robust string
    handling and processing, automatic memory management (whether by reference counting
    or garbage collection under the hood), very quick turnaround in development, flexible
    typing (being able to move between numbers, strings, and lists with ease), and
    a plethora of packages you can download and use. The runtime environment is often
    very flexible in scripting languages too, letting you design your own object types
    and control structures at will.


    If you''re coming from a scripting language, in many ways Objective-C will seem
    like a big step backward in time. It is a language of the ''80s, compared to scripting
    languages that evolved in the ''90s. String handling can be painful, since there
    is no built-in regular expression capability. Making strings with printf() style
    formats is about as fancy as Cocoa gets. Even though Objective-C has added ARC
    and garbage collection, a lot of existing code you''ll see on the Internet uses
    the manual memory management techniques with retain and release. Development includes
    a compile and link phase, causing a delay between making a code change and seeing
    the result. You have to manually deal with distinct types, such as integers, character
    arrays, and string objects. Plus, you have all the baggage C brings along, such
    as pointers, bitwise operations, and easy-to-make memory errors.


    Why go through this pain to use Objective-C? Performance is one reason: depending
    on the kind of application, Objective-C can perform better than a scripting language.
    Access to the native user interface toolkit (Cocoa) is another important advantage.
    Most scripting languages support the Tk toolkit originally developed for the Tcl
    language. This package is workable, but it doesn''t have the depth and breadth
    of user interface features that you get with Cocoa. And, most importantly, applications
    built with Tk typically don''t look and feel like iOS or Mac programs.


    You can have the best of both worlds, though, by using scripting bridges. There
    are bridges between Objective-C and Python (called PyObjC) and Ruby (RubyObjC),
    so both of those scripting languages can be first-class citizens. When you use
    these bridges, you can subclass Cocoa objects in Python or Ruby and have access
    to all of Cocoa''s features.


    Summary


    Objective-C and Cocoa aren''t like any other programming languages and toolkits.
    Objective-C has some neat features and behaviors that derive from its dynamic
    runtime dispatch qualities. You can do things in Objective-C that you can''t do
    in other languages.


    Objective-C lacks some niceties that have been added to other languages over the
    years. In particular, robust string handling, name spaces, and metaprogramming
    are features in these other languages that you don''t have in Objective-C.


    Everything in programming comes down to trade-offs. You have to decide whether
    what you would gain in Objective-C compared to your current language of choice
    is worth what you would lose. For us, being able to use Cocoa for building applications
    more than pays for the time and effort it took to get familiar with Objective-C.


