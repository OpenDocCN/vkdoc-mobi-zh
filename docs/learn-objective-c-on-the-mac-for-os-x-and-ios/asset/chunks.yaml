    \        NSLog (@\"Things are %@\", thing);\n    }\n    return (0);\n} // main\n\
    ```\n\n`main()` 的第一行包含了我们已经熟知且呃，“喜爱”的标准自动释放池代码。这个池最终会持有被 `NSLog()` 所使用的那个自动释放的\
