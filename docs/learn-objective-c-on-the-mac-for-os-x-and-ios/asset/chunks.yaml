  trans: '

    # 本书作者均来自苹果开发者技术服务团队的资深成员，他们曾无数次解答初入苹果技术领域的软件工程师们的疑问。他们始终致力于帮助开发者培养良好习惯。正是这份经验汇聚成本书，它不仅能预判最常见的误解，更会细致讲解苹果开发平台不仅是"如何做"，还有"为何如此"。


    例如第 3 章《面向对象编程入门》提供的概念基础，能让你将后续内容串联成一幅清晰的图景，而非直接抛给你一堆陌生的类、方法和技巧，指望你通过实践自行消化。


    《学习 Mac 上的 Objective-C》是进入苹果 iOS 与 OS X 开发平台核心语言的优秀指南。


    约翰·C·伦道夫


    ## 关于作者


    | ![图片](img/9781430241881_Athor_1_fmt.jpg) | **斯科特·克纳斯特** 在苹果尚未成为潮流时就已入职。他早年帮助开发者编写
    Mac 软件，那时 Cocoa 还只是一个等待诞生的伟大构想。如今斯科特任职于谷歌开发者关系团队，并运营 Google Mac 博客。他住在硅谷，身边尽是技术宅同行。
    |


    | ![图片](img/9781430241881_Athor_2_fmt.jpg) | **瓦卡尔·马利克** 是位资深 UNIX 技术宅。他在 Mac
    OS X 早期就加入苹果，帮助开发者掌握 Cocoa 与 UNIX。如今他在圣地亚哥的 MeLLmo 公司开发出色的 iOS 软件。 |


    | ![图片](img/9781430241881_Athor_3_fmt.jpg) | **马克·达林普尔** 是资深 Mac 与 Unix 程序员，参与过跨平台工具包、互联网出版工具、高性能
    Web 服务器及桌面应用开发。他也是《高级 Mac OS X 编程》（Big Nerd Ranch 2005）的主要作者。业余时间他演奏长号、巴松管，还制作气球动物。
    |


    ## 关于技术审校


    ![图片](img/9781430241881_Athor_4_fmt.jpg)**尼克·韦尼克** 从事 IT 领域逾 13 年，涉足网络管理到 Web
    开发。2008 年 SDK 发布时他开始编写 iOS 应用，随后创立专注 iOS 开发的公司。业余时间他爱陪伴妻儿家人、打高尔夫。博客位于[nickwaynik.com](http://nickwaynik.com)，推特账号@n_dubbs。


    ## 致谢


    这本书当然不会自己写成。而我们作者也绝非独自完成——甚至远远不够。没错，我们敲了许多文字和代码，但若非我们出色的书籍团队，这些会变成什么？可能只是一篇冗长的博客帖子。


    特别感谢布伦特·杜比，他用永不疲倦的乐观邮件和专注的电话协调着全球虚拟团队。感谢尼克·韦尼克在技术上保持我们的严谨性——鉴于苹果如今在 Xcode 和 Cocoa
    中注入的强大与复杂，这绝非易事。感谢格温南·斯佩林，她仔细审阅了每段文字（连蹩脚的双关语都不放过），确保内容尽可能清晰简洁。还要感谢第一版的优秀文字编辑希瑟·朗，她再次回归，允许我们游走在语法与风格的边缘，只为再开一个技术宅《星球大战》的玩笑。每一位都让这本书获益匪浅，使我们展现出最佳状态。


    瓦卡尔还要感谢他可爱的子女亚当和米沙勒，以及美丽的妻子伊卢姆，感谢他们给予他足够的时间完成本书。


    ## 如何使用本书


    如需下载源代码或报告错误，请访问本书在 Apress 网站的页面：

    [www.apress.com/9781430241881](http://www.apress.com/9781430241881)。


    使用本书时，最好让电脑保持在手边。备好喜爱的饮品也不错，但请远离电脑——液体损坏的维修费用足以毁掉你一整天。


    最重要的是，在学习过程中保持乐趣！


    # 第 1 章


    ## 你好


    欢迎阅读《学习 Mac 上的 Objective-C》！本书旨在教授 Objective-C 语言的基础知识。Objective-C 是 C 语言的超集，是许多（甚至绝大多数）具有纯正
    OS X 或 iOS 外观的应用所使用的语言。


    除了介绍 Objective-C，本书还将引导你认识它的搭档——苹果的 Cocoa（适用于 OS X）和 Cocoa Touch（适用于 iOS）工具包。Cocoa
    和 Cocoa Touch 用 Objective-C 编写，包含了 OS X 和 iOS 用户界面的所有元素，以及更多内容。学会 Objective-C
    后，你就能通过完整项目或另一本书（如《学习 Mac 上的 Cocoa》（Apress 2010）或《iOS 5 开发入门》（Apress 2011））深入探索
    Cocoa。


    本章将介绍学习 Objective-C 前所需的基础知识。我们还会简要回顾 Objective-C 的历史，并预览后续章节的内容。


    ### 开始之前


    阅读本书前，你应具备类似 C 的编程语言经验，例如 C++、Java 或 C 语言本身。无论哪种语言，你应熟悉其基本原则：了解变量、方法和函数的概念，理解如何使用条件语句和循环控制程序流程。本书将重点介绍
    Objective-C 在其基础语言 C 上添加的特性，以及从苹果 Cocoa 工具包中精选的实用功能。


    如果你是从非 C 语言转向 Objective-C？依然可以跟上节奏，但建议先阅读本书附录，或参考《学习 Mac 上的 C 语言》（Apress 2009）。


    ### 未来诞生于昨日


    Cocoa 和 Objective-C 是苹果 OS X 与 iOS 操作系统的核心。尽管 OS X（尤其是 iOS）相对年轻，但 Objective-C
    和 Cocoa 的历史要悠久得多。布拉德·考克斯在 20 世纪 80 年代初发明了 Objective-C，旨在融合流行且便携的 C 语言与优雅的 Smalltalk
    语言。1985 年，史蒂夫·乔布斯创立 NeXT 公司，致力于打造强大且实惠的工作站。NeXT 选择 Unix 作为操作系统，并创建了用 Objective-C
    开发的强大用户界面工具包 NextSTEP。尽管功能出众且拥有忠实的小众追随者，NextSTEP 在商业上并未获得成功。


    1996 年苹果收购 NeXT（亦或相反？）后，NextSTEP 更名为 Cocoa，并推广至更广泛的 Macintosh 程序员群体。苹果免费提供包括 Cocoa
    在内的开发工具，任何程序员都可使用。你只需一点编程经验、Objective-C 基础知识，以及深入学习的渴望。


    你可能会想："如果 Objective-C 和 Cocoa 诞生于 80 年代——那个《家有阿福》《天龙特攻队》盛行，还有陈旧的 Unix 时代——它们现在岂不是又老又过时？"绝非如此！Objective-C
    和 Cocoa 是优秀程序员团队多年努力的结晶，并不断更新与增强。随着时间的推移，它们已演变为极其优雅而强大的工具集。过去几年间，iOS 已成为计算领域最热门的开发平台，而
    Objective-C 正是编写优秀 iOS 应用的关键。因此，在 NeXT 采用 Objective-C 二十多年后的今天，所有潮人都在使用它。


    ### 后续内容

