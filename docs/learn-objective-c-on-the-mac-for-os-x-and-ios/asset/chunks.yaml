    have written will need to be fixed manually. You can search and replace to make
    this a bit easier.


    ## Navigating Around in Your Code


    Most source files have a familiar life cycle. They’re created new and get a lot
    of code added to them quickly to make them do their magic. Next, they go into
    a mode where additions and modifications are about fifty-fifty and then into a
    maintenance mode, in which you have to read a lot of the file before you add new
    code or make changes. Finally, after a class has matured, you end up browsing
    its code to figure out how the class works before using it elsewhere in your program.
    This section explores various ways of navigating around your code as it lives
    its life.


    ### emacs is Not a Mac


    An ancient text editor called `emacs`, invented in the 1970s, is available on
    modern Macs. Some throwbacks (including Waqar Malik) use it on a daily basis.
    We won’t talk about `emacs` much here, except to describe some of its key bindings—and
    we’ll even tell you what that means.


    The phrase “emacs key bindings” describes keystrokes that let you move the text
    cursor without taking your hand off the main part of the keyboard. Just as many
    folks prefer arrow keys over reaching for the mouse, emacs users prefer to use
    these cursor movement keys instead of reaching for the arrow keys. And here’s
    the punch line: amazingly enough, these same movement keys work in any Cocoa text
    field, including not just Xcode but also TextEdit, Safari’s URL bar and text fields,
    Pages and Keynote text areas, and many more. Here they are:


    *   ![image](images/9781430241881_square_fmt.jpg) `control-F`: Move **f**orward,
    to the right (same as the right arrow).

    *   ![image](images/9781430241881_square_fmt.jpg) `control-B`: Move **b**ackward,
    to the left (same as the left arrow).

    *   ![image](images/9781430241881_square_fmt.jpg) `control-P`: Move to the **p**revious
    line (same as the up arrow).

    *   ![image](images/9781430241881_square_fmt.jpg) `control-N`: Move to the **n**ext
    line (same as the down arrow).

    *   ![image](images/9781430241881_square_fmt.jpg) `control-A`: Move to the beginning
    of a line (same as the as command-left arrow).

    *   ![image](images/9781430241881_square_fmt.jpg) `control-E`: Move to the **e**nd
    of a line (same as the as command-right arrow).

    *   ![image](images/9781430241881_square_fmt.jpg) `control-T`: **T**ranspose (swap)
    the characters on either side of the cursor.

    *   ![image](images/9781430241881_square_fmt.jpg) `control-D`: **D**elete the
    character to the right of the cursor.

    *   ![image](images/9781430241881_square_fmt.jpg) `control-K`: **K**ill (delete)
    the rest of the line. This is handy if you want to redo the end of a line of code.

    *   ![image](images/9781430241881_square_fmt.jpg) `control-L`: Center the insertion
    point in the window. This is great if you’ve lost your text cursor or want to
    quickly scroll the window so the insertion point is front and center.


    If you get these keystrokes into your head and under your fingers, you can make
    small cursor movements and editing operations much faster—and not just in Xcode.


    ### Open Sesame Seed!


    You’re looking at one of your source files, and you see `#import` at the top.
    Wouldn’t it be great if you could open that header file quickly without having
    to do a lot of mousing around? You can! Just select the file name (you can even
    leave off the `.h`), and choose File ![image](images/9781430241881_arrow_fmt.jpg)
    Open Quickly. Xcode opens the header file for you.


    If you don’t have any text selected, choosing Open Quickly opens a dialog box,
    which is another way of finding a file to look at. You can also perform the Open
    Quickly command by typing the shortcut ![image](images/Rangoli1.jpg)![image](images/Uparrow.jpg)`O`.
    The Open Quickly dialog is a very simple window containing just a search field
    and a table, but it is a very quick way to do searches across the contents of
    your project. Type `tire` in the search box to look for things tire-related, as
    shown in [Figure 7-17](#9781430241881_Ch7.xhtml#_FIG17). You can also put in other
    terms, like `NSArray` to see the `NSArray` header files.


    ![9781430241881_Fig07-17.tif](images/9781430241881_Fig07-17_fmt.jpg)


    [Figure 7-17](#9781430241881_Ch7.xhtml#FIG17). The Open Quickly dialog


    If you’re lucky enough to have a large monitor, you can see windows side by side
    using the assistant editor (View ![image](images/9781430241881_arrow_fmt.jpg)
    Assistant Editor ![image](images/9781430241881_arrow_fmt.jpg) Show Assistant Editor).
    By default, you’ll see the header file in one pane and the implementation in the
    other, but you can change that if you like. Click `Counterparts` in the toolbar
    to see your many options.


    ### Focus Your Energy


    You may have noticed the columns immediately to the left of your source code.
    The wider column to the left is known as the **gutter**, and we’ll have our minds
    there later when we discuss debugging. The narrower one is known as the **focus
    ribbon**, and as its name implies, it allows you to focus your attention on different
    parts of your code.


    Notice the shades of gray in the focus ribbon: the more deeply nested a bit of
    code is, the darker the gray next to it in the ribbon. This color-coding gives
    you a hint of the complexity of your code at a glance. You can hover over different
    gray regions of the focus bar to highlight the corresponding hunk of code, as
    shown in [Figure 7-18](#9781430241881_Ch7.xhtml#_FIG18).


    ![9781430241881_Fig07-18.tif](images/9781430241881_Fig07-18_fmt.jpg)'
