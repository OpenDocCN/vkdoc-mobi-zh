- fmt: 'Finally, a sheet drops down (see [Figure 16-4](#9781430241881_Ch16.xhtml#_FIG4))
    to let you select the directory for saving the project. We won’t be discussing
    source code control in this book, but if you want, you can create a Git repository
    by selecting the Source Control option on this sheet. Xcode has built-in support
    for source control with Subversion (SVN) and Git.


    ![9781430241881_Fig16-04.tif](images/9781430241881_Fig16-04_fmt.jpg)


    [Figure 16-4](#9781430241881_Ch16.xhtml#FIG4). Specify where you want to save
    your project


    That’s it—your new project has been created. If you open the `CaseTool` group
    on the left side of the Xcode window, you’ll see that there are already some files
    in the project: `MSCAppDelegate.h`, `MSCAppDelegate.m`, and `MainMenu.xib`.


    `MSCAppDelegate` is the controlling object for our application.


    ## Making the Delegate `@interface`


    We’ll use the Interface Builder editor in Xcode to lay out the window’s contents
    and hook up various connections between `MSCAppDelegate` and the user interface
    controls. Interface Builder is also used to lay out iOS applications, so time
    in Interface Builder is well spent no matter which platform you’ll end up programming
    for. We’ll add stuff to the `MSCAppDelegate` class, and then Interface Builder
    will notice our additions and let us build the user interface.


    First, let’s take a look at the header file for the delegate:


    ```

    #import <Cocoa/Cocoa.h>


    @interface MSCAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;


    @end

    ```


    You will see a quasi-keyword in there called `IBOutlet`. This isn’t really an
    Objective-C keyword, but it’s reserved by Apple for use by Interface Builder.
    You will also notice that there is a little dot in the gutter to the left of the
    `IBOutlet` line. You can click that dot to jump directly to the associated object
    in Interface Builder.


    Another quasi-keyword we’ll encounter is `IBAction`. `IBAction` is defined to
    be `void`, which means the return type of the methods declared will be `void`
    (that is, returning nothing).


    If `IBOutlet` and `IBAction` don’t do anything, why are they even there? The answer
    is that they’re not there for the compiler: `IBOutlet` and `IBAction` are actually
    flags to Interface Builder, as well as the humans who read the code. By looking
    for `IBOutlet` and `IBAction`, Interface Builder learns that `MSCDelegate` objects
    have two instance variables that can be connected to stuff, and `MSCDelegate`
    provides methods that can be the target of button clicks (and other user interface
    actions). We’ll talk about how this works in a little bit.


    ## Interface Builder


    Now, it’s time to crank up Xcode’s Interface Builder editor, affectionately known
    as IB to its friends. We want to edit the `MainMenu.xib` file that comes along
    with the project. This file is outfitted with a menu bar, along with a window
    we can put user controls into.


    In the Xcode project window, find and click `MainMenu.xib` (see [Figure 16-5](#9781430241881_Ch16.xhtml#_FIG5)).


    ![9781430241881_Fig16-05.tif](images/9781430241881_Fig16-05_fmt.jpg)


    [Figure 16-5](#9781430241881_Ch16.xhtml#FIG5). Open `MainMenu.xib` and meet the
    Interface Builder editor


    This opens the Interface Builder editor in Xcode and displays the contents of
    the file. Even though the file extension is `*.xib*`, we call these nib files.
    “Nib” is an acronym for “NeXT Interface Builder,” an artifact of Cocoa’s heritage
    as part of a company called NeXT. Nib files are binary files that contain freeze-dried
    objects, and `*.xib*` files are nib files in XML format. They get compiled into
    nib format at compile time.


    Look at the left side of the editor area. The Interface Builder dock holds icons
    that represent the contents of the nib file. You might not be able to tell at
    a glance what these are and what they do, but don’t worry, you’ll get there before
    long. For now, we can expand the dock to show the names of the objects. See the
    arrow in a circle (looks like a Play button) at the bottom of the dock, just to
    its right? Click it, and the dock items will reveal their names.


    At the top of the editor window is the menu bar for the application we’re building.
    You can add and edit menus and menu items there. We won’t be messing with menus
    in this project.


    Below the menu bar is an empty window where we’ll put some text fields and buttons.
    This real, live window corresponds to the miniature window-shaped icon over in
    the dock. Now, we’re going to use the library pane, the area in the lower-right
    corner that we talked about back in [Chapter 7](#9781430241881_Ch7.xhtml). In
    the library pane, click the third icon from the left, the one that looks like
    a box. The pane switches to show the Object Library (see [Figure 16-6](#9781430241881_Ch16.xhtml#_FIG6)),
    which contains a whole bunch of different kinds of objects you can drag out into
    your window—there’s a lot of stuff in there. You can type some text in the search
    box at the bottom to narrow down what you see. For your convenience, a description
    is provided for each kind of object you can play with.


    ![9781430241881_Fig16-06.tif](images/9781430241881_Fig16-06_fmt.jpg)


    [Figure 16-6](#9781430241881_Ch16.xhtml#FIG6). Object Library in the library pane


    ## Laying Out the User Interface


    Now, it’s time to lay out the user interface. Find `Text Field` in the library,
    and drag it into the window, as shown in [Figure 16-7](#9781430241881_Ch16.xhtml#_FIG7).
    As you drag things around in the window, you’ll see blue guidelines appear. These
    help you lay out your objects according to Apple user interface specifications.


    ![9781430241881_Fig16-07.tif](images/9781430241881_Fig16-07_fmt.jpg)


    [Figure 16-7](#9781430241881_Ch16.xhtml#FIG7). Drag out a text field


    Now, we’ll drag out a label. Click `Label` from the library, and drag it into
    the window, as shown in [Figure 16-8](#9781430241881_Ch16.xhtml#_FIG8). This is
    where the uppercase and lowercase results will go.


    ![9781430241881_Fig16-08.tif](images/9781430241881_Fig16-08_fmt.jpg)


    [Figure 16-8](#9781430241881_Ch16.xhtml#FIG8). Drag out a label


    Next, find a push button in the library, and drag that over. Position it under
    the label as shown in [Figure 16-9](#9781430241881_Ch16.xhtml#_FIG9). This is
    fun, isn’t it?


    ![9781430241881_Fig16-09.tif](images/9781430241881_Fig16-09_fmt.jpg)


    [Figure 16-9](#9781430241881_Ch16.xhtml#FIG9). Drag a button into the window


    Now, double-click the newly deposited button. The label becomes editable. Type
    `UpperCase`, and press return to accept the edit. [Figure 16-10](#9781430241881_Ch16.xhtml#_FIG10)
    shows the button being edited.


    ![9781430241881_Fig16-10.tif](images/9781430241881_Fig16-10_fmt.jpg)


    [Figure 16-10](#9781430241881_Ch16.xhtml#FIG10). Edit the button’s label


    Now, drag another button from the palette and change its label to `LowerCase`.
    [Figure 16-11](#9781430241881_Ch16.xhtml#_FIG11) shows the window after the second
    button has been added.


    ![9781430241881_Fig16-11.tif](images/9781430241881_Fig16-11_fmt.jpg)


    [Figure 16-11](#9781430241881_Ch16.xhtml#FIG11). All the items have been added


    Next, we did a little interior decorating, resizing the text fields and the window
    itself to make it a little nicer, as shown in [Figure 16-12](#9781430241881_Ch16.xhtml#_FIG12).
    We also resized the label to span the width of the window (although you can’t
    see that in the figure). The label must be wide enough to display whatever text
    you type into the field. Now, the window looks just the way we want it.


    ![9781430241881_Fig16-12.tif](images/9781430241881_Fig16-12_fmt.jpg)


    [Figure 16-12](#9781430241881_Ch16.xhtml#FIG12). The window is cleaned up


    ## Making Connections'
  raw: 'Finally, a sheet drops down (see [Figure 16-4](#9781430241881_Ch16.xhtml#_FIG4))
    to let you select the directory for saving the project. We won’t be discussing
    source code control in this book, but if you want, you can create a Git repository
    by selecting the Source Control option on this sheet. Xcode has built-in support
    for source control with Subversion (SVN) and Git.


    ![9781430241881_Fig16-04.tif](images/9781430241881_Fig16-04_fmt.jpg)


    [Figure 16-4](#9781430241881_Ch16.xhtml#FIG4). Specify where you want to save
    your project


    That’s it—your new project has been created. If you open the CaseTool group on
    the left side of the Xcode window, you’ll see that there are already some files
    in the project: *MSCAppDelegate.h*, *MSCAppDelegate.m*, and *MainMenu.xib*.


    MSCAppDelegate is the controlling object for our application.


    Making the Delegate @interface


    We’ll use the Interface Builder editor in Xcode to lay out the window’s contents
    and hook up various connections between MSCAppDelegate and the user interface
    controls. Interface Builder is also used to lay out iOS applications, so time
    in Interface Builder is well spent no matter which platform you’ll end up programming
    for. We’ll add stuff to the MSCAppDelegate class, and then Interface Builder will
    notice our additions and let us build the user interface.


    First, let’s take a look at the header file for the delegate:


    #import <Cocoa/Cocoa.h>


    @interface MSCAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;


    @end


    You will see a quasi-keyword in there called IBOutlet. This isn’t really an Objective-C
    keyword, but it’s reserved by Apple for use by Interface Builder. You will also
    notice that there is a little dot in the gutter to the left of the IBOutlet line.
    You can click that dot to jump directly to the associated object in Interface
    Builder.


    Another quasi-keyword we’ll encounter is IBAction. IBAction is defined to be void,
    which means the return type of the methods declared will be void (that is, returning
    nothing).


    If IBOutlet and IBAction don’t do anything, why are they even there? The answer
    is that they’re not there for the compiler: IBOutlet and IBAction are actually
    flags to Interface Builder, as well as the humans who read the code. By looking
    for IBOutlet and IBAction, Interface Builder learns that MSCDelegate objects have
    two instance variables that can be connected to stuff, and MSCDelegate provides
    methods that can be the target of button clicks (and other user interface actions).
    We’ll talk about how this works in a little bit.


    Interface Builder


    Now, it’s time to crank up Xcode’s Interface Builder editor, affectionately known
    as IB to its friends. We want to edit the *MainMenu.xib* file that comes along
    with the project. This file is outfitted with a menu bar, along with a window
    we can put user controls into.


    In the Xcode project window, find and click *MainMenu.xib* (see [Figure 16-5](#9781430241881_Ch16.xhtml#_FIG5)).


    ![9781430241881_Fig16-05.tif](images/9781430241881_Fig16-05_fmt.jpg)


    [Figure 16-5](#9781430241881_Ch16.xhtml#FIG5). Open MainMenu.xib and meet the
    Interface Builder editor


    This opens the Interface Builder editor in Xcode and displays the contents of
    the file. Even though the file extension is *.xib*, we call these **nib files**.
    “Nib” is an acronym for “NeXT Interface Builder,” an artifact of Cocoa’s heritage
    as part of a company called NeXT. Nib files are binary files that contain freeze-dried
    objects, and *.xib* files are nib files in XML format. They get compiled into
    nib format at compile time.


    Look at the left side of the editor area. The Interface Builder dock holds icons
    that represent the contents of the nib file. You might not be able to tell at
    a glance what these are and what they do, but don’t worry, you’ll get there before
    long. For now, we can expand the dock to show the names of the objects. See the
    arrow in a circle (looks like a Play button) at the bottom of the dock, just to
    its right? Click it, and the dock items will reveal their names.


    At the top of the editor window is the menu bar for the application we’re building.
    You can add and edit menus and menu items there. We won’t be messing with menus
    in this project.


    Below the menu bar is an empty window where we’ll put some text fields and buttons.
    This real, live window corresponds to the miniature window-shaped icon over in
    the dock. Now, we’re going to use the library pane, the area in the lower-right
    corner that we talked about back in [Chapter 7](#9781430241881_Ch7.xhtml). In
    the library pane, click the third icon from the left, the one that looks like
    a box. The pane switches to show the Object Library (see [Figure 16-6](#9781430241881_Ch16.xhtml#_FIG6)),
    which contains a whole bunch of different kinds of objects you can drag out into
    your window—there’s a lot of stuff in there. You can type some text in the search
    box at the bottom to narrow down what you see. For your convenience, a description
    is provided for each kind of object you can play with.


    ![9781430241881_Fig16-06.tif](images/9781430241881_Fig16-06_fmt.jpg)


    [Figure 16-6](#9781430241881_Ch16.xhtml#FIG6). Object Library in the library pane


    Laying Out the User Interface


    Now, it’s time to lay out the user interface. Find Text Field in the library,
    and drag it into the window, as shown in [Figure 16-7](#9781430241881_Ch16.xhtml#_FIG7).
    As you drag things around in the window, you’ll see blue guidelines appear. These
    help you lay out your objects according to Apple user interface specifications.


    ![9781430241881_Fig16-07.tif](images/9781430241881_Fig16-07_fmt.jpg)


    [Figure 16-7](#9781430241881_Ch16.xhtml#FIG7). Drag out a text field


    Now, we’ll drag out a label*.* Click Label from the library, and drag it into
    the window, as shown in [Figure 16-8](#9781430241881_Ch16.xhtml#_FIG8). This is
    where the uppercase and lowercase results will go.


    ![9781430241881_Fig16-08.tif](images/9781430241881_Fig16-08_fmt.jpg)


    [Figure 16-8](#9781430241881_Ch16.xhtml#FIG8). Drag out a label


    Next, find a push button in the library, and drag that over. Position it under
    the label as shown in [Figure 16-9](#9781430241881_Ch16.xhtml#_FIG9). This is
    fun, isn’t it?


    ![9781430241881_Fig16-09.tif](images/9781430241881_Fig16-09_fmt.jpg)


    [Figure 16-9](#9781430241881_Ch16.xhtml#FIG9). Drag a button into the window


    Now, double-click the newly deposited button. The label becomes editable. Type
    *UpperCase,* and press return to accept the edit. [Figure 16-10](#9781430241881_Ch16.xhtml#_FIG10)
    shows the button being edited.


    ![9781430241881_Fig16-10.tif](images/9781430241881_Fig16-10_fmt.jpg)


    [Figure 16-10](#9781430241881_Ch16.xhtml#FIG10). Edit the button’s label


    Now, drag another button from the palette and change its label to *LowerCase*.
    [Figure 16-11](#9781430241881_Ch16.xhtml#_FIG11) shows the window after the second
    button has been added.


    ![9781430241881_Fig16-11.tif](images/9781430241881_Fig16-11_fmt.jpg)


    [Figure 16-11](#9781430241881_Ch16.xhtml#FIG11). All the items have been added


    Next, we did a little interior decorating, resizing the text fields and the window
    itself to make it a little nicer, as shown in [Figure 16-12](#9781430241881_Ch16.xhtml#_FIG12).
    We also resized the label to span the width of the window (although you can’t
    see that in the figure). The label must be wide enough to display whatever text
    you type into the field. Now, the window looks just the way we want it.


    ![9781430241881_Fig16-12.tif](images/9781430241881_Fig16-12_fmt.jpg)


    [Figure 16-12](#9781430241881_Ch16.xhtml#FIG12). The window is cleaned up


    Making Connections'
  trans: '

    最后，会弹出一个表单（见图 16-4），让你选择保存项目的目录。本书不讨论源代码控制，但如果你愿意，可以通过选择此表单中的“Source Control”选项来创建一个
    Git 仓库。Xcode 对使用 Subversion (SVN) 和 Git 的源代码控制提供了内置支持。


    ![9781430241881_Fig16-04.tif](img/9781430241881_Fig16-04_fmt.jpg)


    图 16-4. 指定你希望保存项目的位置


    就这样——你的新项目已创建完成。如果你展开 Xcode 窗口左侧的 `CaseTool` 组，会看到项目中已经包含了一些文件：`MSCAppDelegate.h`、`MSCAppDelegate.m`
    和 `MainMenu.xib`。


    `MSCAppDelegate` 是我们应用程序的控制对象。


    ## 制作委托的 `@interface`


    我们将使用 Xcode 中的 Interface Builder 编辑器来布局窗口内容，并在 `MSCAppDelegate` 和用户界面控件之间建立各种连接。Interface
    Builder 也用于布局 iOS 应用程序，因此无论你最终为哪个平台编程，花在 Interface Builder 上的时间都是值得的。我们将向 `MSCAppDelegate`
    类添加一些内容，然后 Interface Builder 会注意到我们的添加，并让我们构建用户界面。


    首先，让我们看看委托的头文件：


    ```

    #import <Cocoa/Cocoa.h>


    @interface MSCAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;


    @end

    ```


    你会看到其中有一个叫做 `IBOutlet` 的拟关键字。这实际上并不是一个 Objective-C 关键字，而是 Apple 保留供 Interface
    Builder 使用的。你还会注意到，在 `IBOutlet` 这行左侧的边栏中有一个小点。点击该点可以直接跳转到 Interface Builder 中关联的对象。


    另一个我们会遇到的拟关键字是 `IBAction`。`IBAction` 被定义为 `void`，这意味着声明的方法的返回类型将是 `void`（即不返回任何内容）。


    如果 `IBOutlet` 和 `IBAction` 不做任何事情，那它们为什么还存在呢？答案是，它们并非为编译器而存在：`IBOutlet` 和 `IBAction`
    实际上是给 Interface Builder 以及阅读代码的人看的标记。通过查找 `IBOutlet` 和 `IBAction`，Interface Builder
    了解到 `MSCDelegate` 对象有两个可以连接到其他对象的实例变量，并且 `MSCDelegate` 提供了可以作为按钮点击（及其他用户界面操作）目标的方法。稍后我们将讨论这是如何工作的。


    ## Interface Builder


    现在，是时候启动 Xcode 的 Interface Builder 编辑器了，它在朋友间被亲切地称为 IB。我们想要编辑项目自带的 `MainMenu.xib`
    文件。这个文件配备了一个菜单栏，以及一个我们可以放入用户控件的窗口。


    在 Xcode 项目窗口中，找到并点击 `MainMenu.xib`（见图 16-5）。


    ![9781430241881_Fig16-05.tif](img/9781430241881_Fig16-05_fmt.jpg)


    图 16-5. 打开 `MainMenu.xib` 并认识 Interface Builder 编辑器


    这会在 Xcode 中打开 Interface Builder 编辑器并显示文件内容。尽管文件扩展名是 `*.xib*`，但我们称这些文件为 nib 文件。“Nib”
    是 “NeXT Interface Builder” 的首字母缩写，这是 Cocoa 作为名为 NeXT 的公司一部分所留下的遗产。Nib 文件是包含冻结干燥对象的二进制文件，而
    `*.xib*` 文件是 XML 格式的 nib 文件。它们在编译时会被编译成 nib 格式。


    看看编辑器区域的左侧。Interface Builder 工具栏中包含了代表 nib 文件内容的图标。你可能无法一眼看出这些是什么以及它们的作用，但别担心，你很快就会弄明白的。现在，我们可以展开工具栏以显示对象的名称。看到工具栏底部那个圆圈里带箭头（看起来像播放按钮）的东西了吗？就在它右边？点击它，工具栏中的项目就会显示它们的名称。


    编辑器窗口顶部是我们正在构建的应用程序的菜单栏。你可以在那里添加和编辑菜单及菜单项。在这个项目中，我们不会去修改菜单。


    菜单栏下方是一个空窗口，我们将在此放置一些文本字段和按钮。这个真实、活生生的窗口对应于工具栏中那个微小的窗口形状图标。现在，我们将使用库面板，也就是之前在第
    7 章讨论过的右下角区域。在库面板中，点击从左数第三个图标，那个看起来像一个盒子的图标。面板会切换显示“对象库”（见图 16-6），其中包含大量你可以拖拽到窗口中的不同类型的对象——里面的东西可真不少。你可以在底部的搜索框中输入一些文本来缩小显示范围。为了方便你使用，每种可以操作的对象都提供了相应的描述。


    ![9781430241881_Fig16-06.tif](img/9781430241881_Fig16-06_fmt.jpg)


    图 16-6. 库面板中的对象库


    ## 布局用户界面


    现在，是时候布局用户界面了。在库中找到 `Text Field`，并将其拖入窗口，如图 16-7 所示。当你在窗口中拖动物体时，会看到蓝色的参考线出现。这些参考线可以帮助你按照
    Apple 的用户界面规范来布局对象。


    ![9781430241881_Fig16-07.tif](img/9781430241881_Fig16-07_fmt.jpg)


    图 16-7. 拖出一个文本字段


    现在，我们拖出一个标签。从库中点击 `Label`，并将其拖入窗口，如图 16-8 所示。这里将显示大小写转换的结果。


    ![9781430241881_Fig16-08.tif](img/9781430241881_Fig16-08_fmt.jpg)


    图 16-8. 拖出一个标签


    接下来，在库中找到一个“Push Button”并将其拖拽过来。将其放置在标签下方，如图 16-9 所示。这很有趣，不是吗？


    ![9781430241881_Fig16-09.tif](img/9781430241881_Fig16-09_fmt.jpg)


    图 16-9. 将一个按钮拖入窗口


    现在，双击新放置的按钮。标签变为可编辑状态。输入 `UpperCase`，然后按回车键确认编辑。图 16-10 显示了正在编辑的按钮。


    ![9781430241881_Fig16-10.tif](img/9781430241881_Fig16-10_fmt.jpg)


    图 16-10. 编辑按钮的标签


    现在，从面板中再拖出一个按钮，并将其标签改为 `LowerCase`。图 16-11 显示了添加第二个按钮后的窗口。


    ![9781430241881_Fig16-11.tif](img/9781430241881_Fig16-11_fmt.jpg)


    图 16-11. 所有项目都已添加


    接下来，我们进行了一点内部装饰，调整了文本字段和窗口本身的大小，使其看起来更美观，如图 16-12 所示。我们还调整了标签的大小，使其跨越窗口的宽度（尽管在图中你看不到）。标签必须足够宽，以显示你输入到字段中的任何文本。现在，窗口看起来正是我们想要的样子。


    ![9781430241881_Fig16-12.tif](img/9781430241881_Fig16-12_fmt.jpg)


    图 16-12. 窗口已清理完毕


    ## 建立连接

