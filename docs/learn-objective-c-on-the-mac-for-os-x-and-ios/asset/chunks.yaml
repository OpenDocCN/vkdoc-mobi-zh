    然后我们在 `main` 中设置名称：\n\n```objc\nCar *car = [[Car alloc] init];\n[car setName:\
    \ @\"Herbie\"];\n```\n"
- fmt: "运行程序，您会看到输出开头的汽车名称。好的，现在开始为`Car`添加属性。以下是完整的`Car.h`文件：\n\n```objc\n@class Tire;\n\
    \n@class Engine;\n\n@interface Car : NSObject\n\n{\n    NSString *name;\n    NSMutableArray\
    \ *tires;\n    Engine *engine;\n}\n\n@property (copy) NSString *name;\n\n@property\
    \ (retain) Engine *engine;\n\n- (void) setTire: (Tire *) tire atIndex: (int) index;\n\
    \n- (Tire *) tireAtIndex: (int) index;\n\n- (void) print;\n\n@end // Car\n```\n\
    \n您会注意到简单的访问器声明消失了，取而代之的是`@property`声明。您可以通过添加额外属性来装饰`@property`，以表达您对属性行为的精确意图。由于为`name`添加了`copy`，编译器和类的使用者都知道`name`将被复制。这可以简化使用该类的程序员的开发工作，因为他们知道自己无需复制从文本字段中获取的字符串。另一方面，`engine`仅通过`retain/release`来管理。如果您不提供任何一项，编译器将默认使用`assign`，这对于对象来说通常不是您想要的行为。\n\
    \n**注**：您可以使用其他装饰，例如`nonatomic`，它能在属性不会被用于多线程环境时使访问器更快。桌面机器速度很快，因此将属性设为`nonatomic`并不会带来真正的性能提升，但iOS开发者经常使用它来在资源受限的移动设备上榨取更多性能。如果您不希望属性对象被保留，也可以使用`assign`，以帮助避免保留循环。\n\
    \n默认情况下，如果您没有为属性指定任何属性，它们会被赋予默认属性`nonatomic`和`assign`。您只能为可保留指针（即Objective-C对象）指定`retain`和`copy`属性。所有其他类型，例如C语言和非可保留指针，必须使用`assign`并手动管理内存。\n\
    \n如果您自己提供了`setter`或`getter`（或两者），则不能使用`atomic`属性；必须使用`nonatomic`。\n\n`Car.m`有两个主要变化。`name`和`engine`访问器被删除，并添加了两条`@synthesize`指令：\n\
    \n```objc\n@implementation Car\n\n@synthesize name;\n\n@synthesize engine;\n```\n\
    \n最后，`main`使用点符号来设置内容：\n\n```objc\nCar *car = [[Car alloc] init];\n\ncar.name\
    \ = @\"Herbie\";\n\n…\n\ncar.engine = [[Slant6 alloc] init];\n```\n\n### 命名别名（Appellation）\n\
    \n在本章的所有代码中，属性名称与支持该属性的实例变量名称相同。这种模式非常常见，很可能您大部分时间都会使用它。不过，有时您可能希望实例变量使用一个名称，而公开属性使用另一个名称。\n\
    \n假设我们想将`Car`中的`name`实例变量改名为其他名称，比如`appellation`。我们只需在`Car.h`中更改实例变量的名称：\n\n```objc\n\
    @interface Car : NSObject\n\n{\n    NSString *appellation;\n    NSMutableArray\
    \ *tires;\n    Engine *engine;\n}\n\n@property (copy) NSString *name;\n\n@property\
    \ (retain) Engine *engine;\n```\n\n然后更改`@synthesize`指令：\n\n```objc\n@synthesize\
    \ name = appellation;\n```\n\n编译器仍然会创建`-setName:`和`-name`，但会在其实现中使用`appellation`实例变量。\n\
    \n但是当您编译时，会看到一些错误。您可能还记得，我们直接访问了`name`实例变量，而它已经被更改了。我们可以选择在代码中搜索并替换`name`，或者将直接访问实例变量改为使用访问器。在`init`中，将\n\
    \n```objc\nname = @\"Car\";\n```\n\n改为\n\n```objc\nself.name = @\"Car\";\n```\n\
    \n这个`self-dot-name`是什么意思？这是一种消除歧义的方式，用于让编译器知道我们想要通过访问器进行跳转。如果我们只使用裸的`name`，编译器会认为我们在直接修改实例变量。要使用访问器，我们可以写`[self\
    \ setName:@\"Car\"]`。请记住，点号只是进行完全相同调用的简写，因此`self.name = @\"Car\"`只是表达同一件事的另一种方式。\n\
    \n最后，我们需要修复第一个`NSLog`调用。"
  raw: 'Run the program, and you’ll see the car’s name at the beginning of the output.
    OK, let’s start adding properties to Car. Here is *Car.h* in all its glory:


    @class Tire;


    @class Engine;


    @interface Car : NSObject


    {


    NSString *name;


    NSMutableArray *tires;


    Engine *engine;


    }


    @property (copy) NSString *name;


    @property (retain) Engine *engine;


    - (void) setTire: (Tire *) tire atIndex: (int) index;


    - (Tire *) tireAtIndex: (int) index;


    - (void) print;


    @end // Car


    You’ll notice the declarations of the simple accessors are gone, and they have
    been replaced by @property declarations. You can decorate @property with additional
    attributes to express your exact intentions on how the property is to behave.
    Because copy is added to name, the compiler and users of the class know that name
    is going to be copied. This can simplify the life of programmers using this class,
    because programmers know they won’t need to make a copy of strings they get out
    of text fields. On the other hand, engine is managed just by retain/release. If
    you don’t supply either one, the compiler will default to assign, which is generally
    not what you want with objects.


    **Note** You can use some other decorations, like nonatomic, which makes accessors
    a bit faster if they won’t be used in a multithreaded environment. Desktop machines
    are so fast that there is no real performance gain by making a property nonatomic,
    but iOS developers frequently use it to eke out more performance on resource-constrained
    mobile devices. You can also use assign if you don’t want the attribute object
    to be retained, to help avoid retain cycles.


    By default, if you don’t specify any attributes for properties, they are given
    the default attributes of nonatomic, and assign. You can only specify retain and
    copy attributes for retainable pointers (i.e. Objective-C objects). All other
    types, such as C and nonretainable pointers, must use assign and manage memory
    manually.


    If you provide either or both the setter and getter yourself, you cannot use atomic
    attribute; you must use nonatomic.


    *Car.m* has two major changes. The name and engine accessors are deleted and two

    @synthesize directives are added:


    @implementation Car


    @synthesize name;


    @synthesize engine;


    And finally, main uses dot notation to set stuff:


    Car *car = [[Car alloc] init];


    car.name = @"Herbie";


    …


    car.engine = [[Slant6 alloc] init];


    Appellation Spring


    In all the code in this chapter, the name of the property has been the same as
    the name of an instance variable that backs that property. This pattern is very
    common and probably one you’ll use most of the time. Sometimes, though, you may
    want one name for the instance variable and another for the public attribute name.


    Let’s say we want to call the name instance variable in Car something else, like
    appellation. We just change the name of the instance variable in *Car.h*:


    @interface Car : NSObject


    {


    NSString *appellation;


    NSMutableArray *tires;


    Engine *engine;


    }


    @property (copy) NSString *name;


    @property (retain) Engine *engine;


    and then change the synthesize directive:


    @synthesize name = appellation;


    The compiler will still create –setName: and –name but will use the appellation
    instance variable inside of their implementations.


    But when you compile, you see a couple of errors. You may recall that we directly
    accessed the name instance variable, which has been changed. We can choose to
    do a search and replace on the “name”, or we can change direct ivar access to
    use accessors instead. In init, change


    name = @"Car";


    to


    self.name = @"Car";


    What’s that self-dot-name business? It’s a bit of disambiguation to let the compiler
    know that we want to vector through the accessors. If we just use a naked name,
    the compiler assumes that we’re directly modifying an instance variable. To go
    through the accessors, we can write [self setName:@"Car"]. Remember that the dot
    is just shorthand for making this exact same call, so self.name = @"Car" is just
    another way of saying the same thing.


    Finally, we have to fix the first NSLog call:'
