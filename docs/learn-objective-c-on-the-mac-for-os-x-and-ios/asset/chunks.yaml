    ```\n\n你只需创建一个 block，然后设置好它，之后就不用管了。\n\n## 使用 typedef\n\n正如你所见，那种冗长的定义变量语句可能有点令人生畏。输入其中一条时很容易出错。幸运的是，`typedef`\
    \ 可以解救你（参见 *14.05 Typedefed Blocks*）。\n\n```\ntypedef double (^MKSampleMultiply2BlockRef)(double\
    \ c, double d);\n```\n\n这个语句定义了一个名为 `MKSampleMultiply2BlockRef` 的 block 变量，它接收两个\
    \ `double` 类型的参数并返回一个 `double` 类型的值。有了这个 `typedef`，你可以像这样使用这个变量：\n\n```\nMKSampleMultiply2BlockRef\
    \ multiply2 = ^(double c, double d)\n{ return c * d; };\nprintf(\"%f, %f\", multiply2(4,\
    \ 5), multiply2(5, 2));\n```\n\n如果你看看 *14.06 More Typedefs*，你会发现我们定义了好几种不同类型的\
