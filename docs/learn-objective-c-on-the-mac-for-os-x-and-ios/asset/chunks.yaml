- fmt: "`colorName(fillColor)`);\n\n} // draw\n\n`draw`方法使用隐藏的`self`参数来查找其实例变量的值，就像`setFillColor:`和`setBounds:`所做的那样。这个方法接着使用`NSLog()`来打印文本，供所有人查看。\n\
    \n其他类（`Rectangle`和`Egg`）的`@interface`和`@implementation`与`Circle`的几乎完全相同。\n\n##\
    \ 实例化对象\n\n现在，我们准备好进入`Shapes-Object`最后、也是最核心的部分了。在这里，我们将创建可爱的形状对象，例如红色的圆形和绿色的矩形。这个过程的高大上术语是**实例化**。当你实例化一个对象时，首先会分配内存，然后将该内存初始化为一些有用的默认值——也就是不同于刚分配的内存中那些随机值。当分配和初始化步骤完成后，我们就说一个新的**实例**已被创建。\n\
    \n**注意** 由于对象的局部变量特定于该对象的实例，我们称它们为实例变量，通常简称为“`ivars`”。\n\n要创建一个新对象，我们向感兴趣的类发送`new`消息。一旦类接收并处理了`new`消息，我们就有了一个新的对象实例可供使用。\n\
    \nObjective-C 的一个精巧特性是，你可以将类像对象一样对待并发送消息给它。这对于不绑定到特定对象、而是面向整个类的行为非常有用。此类消息的最佳示例就是分配一个新对象。当你想要一个新的圆形时，向`Circle`类请求该新对象是合适的，而不是向一个已有的圆形对象请求。\n\
    \n以下是`Shapes-Object`的`main()`函数，它创建了圆形、矩形和蛋形：\n\n```\nint main (int argc, const\
    \ char * argv[])\n{\n    id shapes[3];\n    ShapeRect rect0 = { 0, 0, 10, 30 };\n\
    \    shapes[0] = [Circle new];\n    [shapes[0] setBounds: rect0];\n    [shapes[0]\
    \ setFillColor: kRedColor];\n    ShapeRect rect1 = { 30, 40, 50, 60 };\n    shapes[1]\
    \ = [Rectangle new];\n    [shapes[1] setBounds: rect1];\n    [shapes[1] setFillColor:\
    \ kGreenColor];\n    ShapeRect rect2 = { 15, 19, 37, 29 };\n    shapes[2] = [Egg\
    \ new];\n    [shapes[2] setBounds: rect2];\n    [shapes[2] setFillColor: kBlueColor];\n\
    \    drawShapes (shapes, 3);\n    return (0);\n} // main\n```\n\n你可以看到，`Shapes-Object`的`main()`与`Shapes-Procedural`的非常相似。不过有几个区别。`Shapes-Object`没有使用形状数组，而是使用了一个`id`元素数组（你可能还记得，`id`是指向任何类型对象的指针）。你通过向要创建的对象的类发送`new`消息来创建单个对象：\n\
    \n```\nshapes[0] = [Circle new];\n...\nshapes[1] = [Rectangle new];\n...\nshapes[2]\
    \ = [Egg new];\n```\n\n另一个区别是，`Shapes-Procedural`通过直接赋值结构体成员来初始化对象。而`Shapes-Object`则不直接操作对象。相反，`Shapes-Object`使用消息来请求每个对象设置其边界矩形和填充颜色：\n\
    \n```\n[shapes[0] setBounds: rectO]; [shapes[0] setFilIColor: kRedColor];\n[shapes[1]\
    \ setBounds: recti]; [shapes[l] setFilIColor: kCreenColor];\n[shapes[2] setBounds:\
    \ rect2]; [shapes[2] setFilIColor: kBlueColor];\n```\n\n在这场初始化狂欢之后，形状通过我们之前看到的`drawShapes()`函数绘制，如下所示：\n\
    \n```\ndrawShapes (shapes, 3);\n```\n\n## 扩展 Shapes-Object\n\n还记得我们之前向`Shapes-Procedural`程序添加三角形的时候吗？让我们为`Shapes-Object`做同样的事情。这次的任务应该会整洁得多。你可以在*Learn\
    \ ObjC Projects*的*03.11 Shapes-Object-2*文件夹中找到该项目的代码。\n\n为了教`Shapes-Procedural-2`认识三角形，我们不得不做了很多事情：编辑`ShapeType`枚举、添加`drawTriangle()`函数、在形状列表中添加一个三角形、以及修改`drawShapes()`函数。其中一些工作是相当侵入性的，尤其是对`drawShapes()`进行的手术——我们不得不编辑控制所有形状绘制的循环，这潜在地引入了错误。\n\
    \n而对于`Shapes-Object-2`，我们只需要做两件事：创建一个新的`Triangle`类，然后在要绘制的对象列表中添加一个`Triangle`对象。\n\
    \n以下是`Triangle`类，它与`Circle`类完全一样，只是将所有出现的“`Circle`”改为了“`Triangle`”。（当然，我们只是打印文本而没有进行真正的绘制。如果我们真的在绘制，代码会更具辨识度。）\n\
    \n```\n@interface Triangle : NSObject\n{\n    ShapeColor fillColor;\n    ShapeRect\
    \ bounds;\n}\n- (void) setFillColor: (ShapeColor) fillColor;\n- (void) setBounds:\
    \ (ShapeRect) bounds;\n- (void) draw;\n@end // Triangle\n\n@implementation Triangle\n\
    - (void) setFillColor: (ShapeColor) c\n{\n    fillColor = c;\n} // setFillColor\n\
    \n- (void) setBounds: (ShapeRect) b\n{\n    bounds = b;\n} // setBounds\n\n- (void)\
    \ draw\n{\n    NSLog (@\"drawing a triangle at (%d %d %d %d) in %@\",\n      \
    \     bounds.x, bounds.y,\n           bounds.width, bounds.height,\n         \
    \  colorName(fillColor));\n} // draw\n@end // Triangle\n```\n\n**注意** 像我们的`Triangle`类这种复制粘贴式编程的一个缺点是，它往往会产生大量重复的代码，比如`setBounds:`和`setFillColor:`方法。我们将在下一章向你介绍继承，这是避免此类冗余代码的好方法。\n\
    \n接下来，我们需要编辑`main()`以便创建新的三角形。首先，将`shapes`数组的大小从3改为4，以便有足够的空间来存储新对象：\n\n```\n\
    id shapes[4];\n```\n\n之后，添加一段代码来创建一个新的`Triangle`，就像我们创建新的`Rectangle`或`Circle`一样：\n\
    \n```\nShapeRect rect3 = { 47, 32, 80, 50 };\nshapes[3] = [Triangle new];\n[shapes[3]\
    \ setBounds: rect3];\n[shapes[3] setFillColor: kRedColor];\n```\n\n最后，使用`shapes`数组的新长度更新对`drawShapes()`的调用：\n\
    \n```\ndrawShapes (shapes, 4);\n```\n\n就这样。我们的程序现在认识三角形了：\n\n```\ndrawing a circle\
    \ at (0 0 10 30) in red\ndrawing a rectangle at (30 40 50 60) in green\ndrawing\
    \ an egg at (15 19 37 29) in blue\ndrawing a triangle at (47 32 80 50) in red\n\
    ```\n\n请注意，我们能够在不触碰`drawShapes()`函数或任何其他处理形状的函数的情况下添加这个新功能。这就是面向对象编程的威力所在。\n\n\
    **注意** `Shapes-Object-2`中的代码体现了面向对象编程大师 Bertrand Meyer 的“开闭原则”（Open/Closed Principle），该原则指出软件实体应对扩展开放，对修改关闭。`drawShapes()`函数对扩展是开放的：只需在数组中添加一种新的形状对象即可绘制。`drawShapes()`对修改也是关闭的：我们可以在不修改它的情况下扩展它。遵循开闭原则的软件在面临变更时往往更加健壮，因为你不必编辑已经正确运行的代码。\n\
    \n## 总结\n\n这一章内容充实、烧脑——包含了许多概念和想法——而且篇幅也很长。我们讨论了间接性的强大概念，并展示了你在程序中已经使用过间接性，例如在处理变量和文件时。然后，我们讨论了过程式编程，并向你展示了其“函数优先，数据其次”世界观所带来的一些限制。\n\
    \n我们介绍了面向对象编程，它利用间接性将数据与操作数据的代码紧密关联。这允许一种“数据优先，函数其次”的编程风格。我们讨论了消息，消息被发送给对象。对象通过执行方法来处理这些消息，这些代码块让对象“唱歌跳舞”。你还了解到每个方法调用都包含一个名为`self`的隐藏参数，它就是对象本身。方法通过使用这个`self`参数来查找和操作对象的数据。方法的实现和对象数据的模板由对象的类定义。你通过向类发送`new`消息来创建一个新对象。"
  raw: 'colorName(fillColor));


    } // draw


    The draw method uses the hidden self parameter to find the values of its instance
    variables, just as setFillColor: and setBounds: did. This method then uses NSLog()
    to print out the text for all the world to see.


    The @interface and @implementation for the other classes (Rectangle and Egg) are
    nearly identical to those for Circle.


    Instantiating Objects


    Now, we’re ready for the final, meaty part of Shapes-Object, in which we create
    lovely shape objects, such as red circles and green rectangles. The big-money
    word for this process is **instantiation**. When you instantiate an object, memory
    is allocated, and then that memory is initialized to some useful default values—that
    is, something other than the random values you get with freshly allocated memory.
    When the allocation and initialization steps are done, we say that a new **instance**
    has been created.


    **Note**  Because an object’s local variables are specific to that instance of
    the object, we call them instance variables, often shortened to “ivars.”


    To create a new object, we send the new message to the class we’re interested
    in. Once the class receives and handles the new message, we’ll have a new object
    instance to play with.


    One of the nifty features of Objective-C is that you can treat a class just like
    an object and send it messages. This is handy for behavior that isn’t tied to
    one particular object but is global to the class. The best example of this kind
    of message is allocating a new object. When you want a new circle, it’s appropriate
    to ask the Circle class for that new object, rather than asking an existing circle.


    Here is Shapes-Object’s main() function, which creates the circle, rectangle,
    and egg:


    int main (int argc, const char * argv[])


    {


    id shapes[3];


    ShapeRect rect0 = { 0, 0, 10, 30 };


    shapes[0] = [Circle new];


    [shapes[0] setBounds: rect0];


    [shapes[0] setFillColor: kRedColor];


    ShapeRect rect1 = { 30, 40, 50, 60 };


    shapes[1] = [Rectangle new];


    [shapes[1] setBounds: rect1];


    [shapes[1] setFillColor: kGreenColor];


    ShapeRect rect2 = { 15, 19, 37, 29 };


    shapes[2] = [Egg new];


    [shapes[2] setBounds: rect2];


    [shapes[2] setFillColor: kBlueColor];


    drawShapes (shapes, 3);


    return (0);


    } // main


    You can see that Shapes-Object’s main() is very similar to Shapes-Procedural’s.
    There are a couple of differences, though. Instead of an array of shapes, Shapes-Object
    has an array of id elements (which you probably remember are pointers to any kind
    of object). You create individual objects by sending the new message to the class
    of object you want to create:


    shapes[0] = [Circle new];


    …


    shapes[1] = [Rectangle new];


    …


    shapes[2] = [Egg new];


    Another difference is that Shapes-Procedural initializes objects by assigning
    struct members directly. Shapes-Object, on the other hand, doesn’t muck with the
    object directly. Instead, Shapes-Object uses messages to ask each object to set
    its bounding rectangle and fill color:


    [shapes[0] setBounds: rectO]; [shapes[0] setFilIColor: kRedColor];


    [shapes[1] setBounds: recti]; [shapes[l] setFilIColor: kCreenColor];


    [shapes[2] setBounds: rect2]; [shapes[2] setFilIColor: kBlueColor];


    After this initialization frenzy, the shapes are drawn using the drawShapes()
    function we looked at earlier, like so:


    drawShapes (shapes, 3);


    Extending Shapes-Object


    Remember when we added triangles to the Shapes-Procedural program? Let’s do the
    same for Shapes-Object. The task should be a lot neater this time. You can find
    the project for this in the *03.11 Shapes-Object-2* folder of *Learn ObjC Projects*.


    We had to do a lot of stuff to teach Shapes-Procedural-2 about triangles: edit
    the ShapeType enum, add a drawTriangle() function, add a triangle to the list
    of shapes, and modify the drawShapes() function. Some of the work was pretty invasive,
    especially the surgery done to drawShapes(), in which we had to edit the loop
    that controls the drawing of all shapes, potentially introducing errors.


    With Shapes-Object-2, we only have to do two things: create a new Triangle class,
    and then add a Triangle object to the list of objects to draw.


    Here is the Triangle class, which happens to be exactly the same as the Circle
    class with all occurrences of “Circle” changed to “Triangle”. (Of course, we’re
    just printing text instead of doing real drawing. If we were actually drawing,
    the code would be more distinctive.)


    @interface Triangle : NSObject


    {


    ShapeColor fillColor;


    ShapeRect bounds;


    }


    - (void) setFillColor: (ShapeColor) fillColor;


    - (void) setBounds: (ShapeRect) bounds;


    - (void) draw;


    @end // Triangle


    @implementation Triangle


    - (void) setFillColor: (ShapeColor) c


    {


    fillColor = c;


    } // setFillColor


    - (void) setBounds: (ShapeRect) b


    {


    bounds = b;


    } // setBounds


    - (void) draw


    {


    NSLog (@"drawing a triangle at (%d %d %d %d) in %@",


    bounds.x, bounds.y,


    bounds.width, bounds.height,


    colorName(fillColor));


    } // draw


    @end // Triangle


    **Note**  One drawback to cut and paste programming, like our Triangle class,
    is that it tends to create a lot of duplicated code, like the setBounds: and setFillColor:
    methods. We’ll introduce you to inheritance in the next chapter, which is a fine
    way to avoid redundant code like this.


    Next, we need to edit main() so it will create the new triangle. First, change
    the size of the shapes array from 3 to 4 so it will have enough room to store
    the new object:


    id shapes[4];


    After that, add a block of code that creates a new Triangle, just like we create
    a new Rectangle or Circle:


    ShapeRect rect3 = { 47, 32, 80, 50 };


    shapes[3] = [Triangle new];


    [shapes[3] setBounds: rect3];


    [shapes[3] setFillColor: kRedColor];


    And finally, update the call to drawShapes()with the new length of the shapes
    array:


    drawShapes (shapes, 4);


    And that’s it. Our program now understands triangles:


    drawing a circle at (0 0 10 30) in red


    drawing a rectangle at (30 40 50 60) in green


    drawing an egg at (15 19 37 29) in blue


    drawing a triangle at (47 32 80 50) in red


    Note that we were able to add this new functionality without touching the drawShapes()
    function or any other functions that deal with shapes. That’s the power of object-oriented
    programming at work.


    **Note**  The code in Shapes-Object-2 provides an example of object-oriented programming
    guru Bertrand Meyer’s Open/Closed Principle, which says that software entities
    should be open for extension but closed for modification. The drawShapes() function
    is open to extension: just add a new kind of shape object to the array to draw.
    drawShapes() is also closed to modification: we can extend it without modifying
    it. Software that adheres to the Open/Closed Principle tends to be more robust
    in the face of change, because you don’t have to edit code that’s already working
    correctly.


    Summary


    This is a big, head-space chapter—one with lots of concepts and ideas—and it’s
    a long chapter, too. We talked about the powerful concept of indirection and showed
    that you’ve already been using indirection in your programs, such as when you
    deal with variables and files. Then, we discussed procedural programming and showed
    you some of the limitations caused by its “functions first, data second” view
    of the world.


    We introduced object-oriented programming, which uses indirection to tightly associate
    data with code that operates on it. This permits a “data first, functions second”
    style of programming. We talked about messages, which are sent to objects. The
    objects handle these messages by executing methods, the chunks of code that make
    the object sing and dance. You also learned that every method call includes a
    hidden parameter named self, which is the object itself. By using this self parameter,
    methods find and manipulate the object’s data. The implementation for the methods
    and a template for the object’s data are defined by the object’s class. You create
    a new object by sending the new message to the class.'
