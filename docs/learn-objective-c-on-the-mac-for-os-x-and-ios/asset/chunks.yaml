    } // setTire:atIndex:


    This method uses replaceObjectAtIndex:withObject: to remove the existing object
    from the collection and replace it with the new object. We don’t have to do any
    explicit memory management with the tire, because NSMutableArray will automatically
    retain the new tire and release the object that lives at the index, whether it’s
    an NSNull placeholder or a previously stored tire object. NSMutableArray will
    release all of its objects when it gets destroyed, so the tire will get cleaned
    up.


    The tireAtIndex: getter uses the objectAtIndex: method provided by NSArray to
    get the tire from the array:


    - (Tire *) tireAtIndex: (int) index


    {


    Tire *tire;


    tire = [tires objectAtIndex: index];


    return (tire);


    } // tireAtIndex:


    Rapid Return  It’s perfectly legal to make the following method a one-liner by
    directly returning the result value of objectAtIndex:


    (Tire *) tireAtIndex: (int) index


    {


    return ([tires objectAtIndex: index]);


    } // tireAtIndex:


    The extra variable in the original makes the code a little easier to read (at
    least, to us) and setting a breakpoint easier, so we can see which object is being
    returned. This technique also makes it easier for the caveman debuggers to stick
    an NSLog() between the objectAtIndex: call and the end of the method when we return
    the tire object.


    We still need to make sure the car cleans up after the objects it’s hanging onto—specifically,
    the engine and the tires array. The dealloc method is the place to do this:


    - (void) dealloc


    {


    [tires release];


    [engine release];


    [super dealloc];


    } // dealloc


    That’s enough to make sure all memory is reclaimed when this car gets sent to
    the junkyard. Be sure to call the superclass’s dealloc method! Leaving that out
    is a common mistake. Also, make sure that [super dealloc] is the last statement
    in your dealloc method.


    Finally, there’s the print method for the car, which prints out the tires and
    the engine:


    - (void) print


    {


    for (int i = 0; i < 4; i++)


    {


    NSLog (@"%@", [self tireAtIndex: i]);


    }


    NSLog (@"%@", engine);


    } // print


    The print method loops through the tires and logs each one. It’s interesting that
    the loop uses the tireAtIndex: method rather than poking at the array itself.
    If you want to touch the array directly, you’re welcome to do so. However, if
    you use the accessors, even in the implementation of a class, you’ll insulate
    that code from any changes. For example, if the tire storage mechanism changes
    again in the future (say, back to a C-style array), you won’t have to change the
    print method.


    Now (finally!), we can run CarPartsInit. The results look like this:


    Tire: Pressure: 23.0 TreadDepth: 33.0


    Tire: Pressure: 24.0 TreadDepth: 32.0


    Tire: Pressure: 25.0 TreadDepth: 31.0


    Tire: Pressure: 26.0 TreadDepth: 30.0


    I am a slant- 6\. VROOOM!


    Car Cleaning, GC and ARC Style


    OK, so what about garbage collection? What does this class look like in that world?
    setEngine gets simpler.


    - (void) setEngine: (Engine *) newEngine


    {


    engine = newEngine;


    } // setEngine


    We change the engine instance variable. When Cocoa’s garbage collection machinery
    runs, it realizes nobody else is pointing to the old engine, so the garbage collector
    makes that engine go away. On the other hand, because we have an instance variable
    pointing to the newEngine, it won’t be collected; the garbage collector knows
    somebody is using it.


    The dealloc method goes away completely: there is no use for dealloc in the garbage-collected
    world. If you need to do some work when an object goes away, you can override
    -finalize, which is called when the object is finally collected, but there are
    some subtleties associated with finalize. But for the kind of programming you’ll
    be doing in Cocoa, you won’t need to worry about finalize.


    The ARC version is very similar to the GC version. The only thing we need to add
    is

    @autoreleasepool to tell the compiler we want it to handle the retain and release
    cycle.


