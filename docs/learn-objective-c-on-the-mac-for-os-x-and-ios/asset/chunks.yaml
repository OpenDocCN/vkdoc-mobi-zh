    \  \n\n## Delegates and Categories  \n\nOK, so what does all this delegate stuff\
    \ have to do with categories? Delegates highlight another use of categories: the\
    \ methods that can be sent to a delegate are declared as a category on `NSObject`.\
    \ Here is part of the declaration of the `NSNetService` delegate methods:  \n\n\
    ```  \n@interface NSObject (NSNetServiceBrowserDelegateMethods)  \n\n- (void)\
    \ `netServiceBrowserWillSearch:(NSNetServiceBrowser *) browser`;  \n- (void) `netServiceBrowser:(NSNetServiceBrowser\
    \ *) aNetServiceBrowser didFindService:(NSNetService *) service moreComing:(BOOL)\
    \ moreComing`;  \n- (void) `netServiceBrowserDidStopSearch:(NSNetServiceBrowser\
    \ *) browser`;  \n- (void) `netServiceBrowser:(NSNetServiceBrowser *) browser\
    \ didRemoveService:(NSNetService *) service moreComing:(BOOL) moreComing`;  \n\
    \n@end  \n```  \n\nBy declaring these methods as a category on `NSObject`, the\
    \ implementation of `NSNetServiceBrowser` can send one of these messages to *any*\
    \ object, no matter what class it actually is. This also means that any kind of\
    \ object can be a delegate, as long as it implements the method.  \n\n**Note:**\
    \ By putting a category on `NSObject` like this, any kind of object can be used\
    \ as a delegate object. There is no need to inherit from a specialized `serviceBrowserDelegate`\
    \ class (like you do in C++) or to conform to a specific interface (as in Java).\
    \  \n\nPutting a category on `NSObject` is called creating an **informal protocol**.\
    \ As you know, a \"protocol\" in computer-speak is a set of rules that govern\
    \ communication. An informal protocol is simply a way to say, \"Here are some\
    \ methods you might want to implement so you can do cool stuff with them.\" There\
    \ are methods declared in the `NSNetServiceBrowserDelegateMethods` informal protocol\
    \ that we haven’t implemented in `ITunesFinder`. That’s OK. With informal protocols,\
    \ you implement only what you want.  \n\nAs you might guess, there’s also the\
    \ concept of a formal protocol. We’ll cover that in the next chapter.  \n\n##\
    \ Responds to Selectors  \n\nYou might be asking yourself, \"How does `NSNetServiceBrowser`\
    \ know if its delegate can handle those messages that are being sent to it?\"\
    \ You’ve probably encountered the Objective-C runtime error that appears when\
    \ you try sending a message that an object doesn’t understand:  \n\n```  \n-[ITunesFinder\
    \ addSnack:]: selector not recognized  \n```  \n\nSo how does `NSNetServiceBrowser`\
    \ get away with it? It doesn’t. `NSNetServiceBrowser` first checks with the object\
    \ by asking it, \"Can you respond to this selector?\" If it can, `NSNetServiceBrowser`\
    \ sends the message.  \n\nWhat is a **selector**? It’s just the name of a method,\
    \ but it’s encoded in a special way that’s used by the Objective-C runtime for\
    \ quick lookups. You indicate a selector by using the `@selector()` compiler directive,\
    \ with the name of the method nestled in the parentheses. So, the selector for\
    \ the `Car` method `setEngine:` would be:  \n\n```  \n@selector(setEngine:)  \n\
    ```  \n\nAnd this would be the selector for the `setTire:atIndex:` Car method:\
    \  \n\n```  \n@selector(setTire:atIndex:)  \n```  \n\n`NSObject` provides a method\
    \ called `respondsToSelector:` that queries an object to see if it will respond\
    \ to a given message. The following chunk of code uses `respondsToSelector:`:\
    \  \n\n```  \nCar *car = [[Car alloc] init];  \n```"
