- fmt: 'You can see there are quite a few possibilities that start with “all.” Xcode
    realizes that the current project contains one symbol that starts with “all” and
    assumes that’s the logical first choice. The colored boxes next to the name indicate
    what the symbol is: E for an enumerated symbol, f for a function, # for a `#define`,
    m for a method, C for a class, and so on.


    You can type `control+.(period)` to page through the options or `shift+control+.`
    to page backward. And don’t worry if you don’t catch all these keyboard shortcuts
    as we go along. There’s a handy cheat sheet at the end of this chapter.


    You can use the completion menu as a quick API reference for a class. Consider
    `NSDictionary`, which has a method that lets you specify a list of arguments representing
    the keys and objects used to build a dictionary. Is it `+dictionaryWithKeysAndObjects`,
    or is it `+dictionaryWithObjectsAndKeys`? Who can remember? One easy way to find
    out is to start a method call to `[NSDictionary`, type a space to indicate you’ve
    finished typing the class name, and press escape. Xcode will realize that you’re
    going to be putting the name of a method there and will display all the methods
    that `NSDictionary` responds to. Sure enough, there’s `dictionaryWithObjectsAndKeys`,
    shown near the bottom of the menu in [Figure 7-7](#9781430241881_Ch7.xhtml#_FIG7).


    ![9781430241881_Fig07-07.tif](images/9781430241881_Fig07-07_fmt.jpg)


    [Figure 7-7](#9781430241881_Ch7.xhtml#FIG7). Exploring a class with Code Sense


    It gets even better. If you hover over a method name, you’ll see that each one
    has a little question mark on the right side of the window. Click any method’s
    question mark, and you’ll get a small help window for the method (see [Figure
    7-8](#9781430241881_Ch7.xhtml#_FIG8)).


    ![9781430241881_Fig07-08.tif](images/9781430241881_Fig07-08_fmt.jpg)


    [Figure 7-8](#9781430241881_Ch7.xhtml#FIG8). In the Help window for a method,
    the file names are links; click one to open it in a new window


    Sometimes, when you use code completion, you’ll get strange little boxes in among
    your completion, as illustrated in [Figure 7-9](#9781430241881_Ch7.xhtml#_FIG9).
    What’s going on there?


    ![9781430241881_Fig07-09.tif](images/9781430241881_Fig07-09_fmt.jpg)


    [Figure 7-9](#9781430241881_Ch7.xhtml#FIG9). Code completion placeholders


    Notice that Xcode is suggesting `-setTire:atlndex:`, which takes two parameters.
    Xcode’s Code Sense goes further than just filling out names. The two parameters
    shown there are actually placeholders. If you press tab again, the method completes
    to `setTire`, as shown in [Figure 7-10](#9781430241881_Ch7.xhtml#_FIG10).


    ![9781430241881_Fig07-10.tif](images/9781430241881_Fig07-10_fmt.jpg)


    [Figure 7-10](#9781430241881_Ch7.xhtml#FIG10). Selecting a placeholder


    The first placeholder is highlighted. Type anything to replace it with a real
    argument. You can click the second placeholder and replace it too. You don’t even
    have to take your hands off the keyboard. You can move to the next placeholder
    by pressing tab again.


    ## Kissing Parentheses


    As you type your code, you might sometimes notice the screen flash a little when
    you type certain characters, such as `)`, `]`, or `}`. When this happens, Xcode
    is showing you the opening symbol that matches the closing symbol you just typed.
    In [Figure 7-11](#9781430241881_Ch7.xhtml#_FIG11), we’re just now typing the right
    parenthesis at the end of the second line. As we do, the matching left parenthesis
    earlier in that line flashes briefly with a colored background.


    ![9781430241881_Fig07-11.tif](images/9781430241881_Fig07-11_fmt.jpg)


    [Figure 7-11](#9781430241881_Ch7.xhtml#FIG11). Kissing the parentheses


    This feature is sometimes called “kissing the parentheses” and can be really handy
    when you’re closing up a complex set of delimiters. Make sure that every closing
    character you type matches with the opening character you expect. If you cross
    the streams, like trying to type `*]*` when should really type `*)*`, Xcode will
    beep at you and won’t show the kissy-kissy stuff.


    You can also double-click one of those delimiters, and Xcode will select all the
    code between it and its mate.


    ## Mass Edits


    Sometimes, you have a code change that you want to make in a couple of places,
    but you don’t want to edit every instance individually. Making a lot of similar
    edits manually is fraught with peril, since humans aren’t typically very good
    at boring repetitive work. Luckily for us, computers thrive on boring and repetitive
    work.


    The first Xcode feature to help us here doesn’t actually manipulate code but installs
    a safety net. Choose File ![image](images/9781430241881_arrow_fmt.jpg) Create
    Snapshot . . . (or its handy shortcut, ![image](images/Rangoli1.jpg)`+control+S`),
    and Xcode will remember the state of your project. You’re now free to edit source
    files and fold, spindle, and mutilate your stuff all you want. If you later realize
    you’ve made a terrible mistake, you can use the snapshots window, which you can
    access from File ![image](images/9781430241881_arrow_fmt.jpg) Restore Snapshot
    . . ., to recover from a previous snapshot. It’s a good idea to take a snapshot
    before doing anything too adventurous.


    **Note** The snapshots are stored in `~/Library/Developer/Xcode/Snapshots/`.


    Of course, Xcode has search-and-replace functionality. The Edit ![image](images/9781430241881_arrow_fmt.jpg)
    Find submenu contains several handy choices. Select Find in Workspace (`command+shift+F`),
    or select the search option in the navigator pane. This feature lets you search
    and replace across the files in your project. [Figure 7-12](#9781430241881_Ch7.xhtml#_FIG12)
    shows the projectwide search and replace window.


    ![9781430241881_Fig07-12.tif](images/9781430241881_Fig07-12_fmt.jpg)


    [Figure 7-12](#9781430241881_Ch7.xhtml#FIG12). Projectwide search and replace


    Let’s say we’re thinking of changing “car” to “automobile.” After filling in the
    blanks and clicking *Find*, you can see that there are references to the `Car`
    class and `car` local variable. You can click *Replace All* to make the change
    globally.


    Search and replace functionality is a blunt instrument for doing this kind of
    surgery, however. It does too much if you’re just trying to rename a variable
    in a function (because it might clobber stuff in the whole file), and it doesn’t
    do enough if you’re trying to rename a class. Specifically, it doesn’t rename
    the source file.


    Xcode has two features to fill those gaps. The first has the svelte moniker of
    “Edit all in Scope.” You can choose a symbol, like a local variable or a parameter,
    and click it to make a drop-down menu arrow appear next to it. Click the arrow
    to see the menu, and select “Edit all in Scope.” Then, as you type, all the occurrences
    of that symbol are instantly updated. Not only is this a fast way to make a lot
    of changes, it looks really cool while you’re doing it.


    [Figure 7-13](#9781430241881_Ch7.xhtml#_FIG13) shows “`car`” being edited in scope.
    Notice that each `car` local variable has box around it. Once you start typing
    “automobile”, all the boxes change, like in [Figure 7-14](#9781430241881_Ch7.xhtml#_FIG14).


    ![9781430241881_Fig07-13.tif](images/9781430241881_Fig07-13_fmt.jpg)


    [Figure 7-13](#9781430241881_Ch7.xhtml#FIG13). Starting to edit all in scope by
    changing the `car` to an “automobile”


    ![9781430241881_Fig07-14.tif](images/9781430241881_Fig07-14_fmt.jpg)


    [Figure 7-14](#9781430241881_Ch7.xhtml#FIG14). Editing all in scope


    When you’re finished, just click elsewhere in the source editing window, and you’ll
    get out of “Edit all in Scope” mode.


    Sometimes, you’ll go to make a change like this and find the “Edit all in Scope”
    menu item disabled. This feature is tied closely to the syntax coloring in Xcode,
    so if you have that feature turned off or have fiddled with it a lot, “Edit all
    in Scope” may refuse to work. To fix it, go back to the preferences and mess around
    with syntax coloring again until it works–there’s a bit of voodoo involved.'
