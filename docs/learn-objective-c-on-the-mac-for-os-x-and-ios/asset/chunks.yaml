- fmt: "Take a look in the file list. We have files for the application delegate,\
    \ plus another class and two nib files, one for iPhone and one for iPad. (If you\
    \ don’t choose *Universal* when you create the project, you only get one of those\
    \ files.)\n\nLet’s delve into our application delegate header file. First is our\
    \ trusty `#import`, which you probably remember from all the way back in [Chapter\
    \ 14](#9781430241881_Ch14.xhtml). Interface elements for iOS start with the prefix\
    \ `UI`, because we’re using `UIKit` instead of `AppKit`. We also have the `Foundation`\
    \ framework, which works on iOS just as for OS X. So classes like `NSString` are\
    \ available, and they work like they do in OS X.\n\n```objectivec\n#import <UIKit/UIKit.h>\n\
    \n@class MSCViewController;\n\n@interface MSCAppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@property (strong, nonatomic)\
    \ MSCViewController *viewController;\n\n@end\n```\n\nIn the code, you’ll see that\
    \ we have a window object and a view controller object. Here’s the implementation:\n\
    \n```objectivec\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // Override point for customization after application\
    \ launch.\n    if ([[UIDevice currentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPhone)\
    \ {\n        self.viewController = [[MSCViewController alloc] initWithNibName:\n\
    \                               @\"MSCViewController_iPhone\" bundle:nil];\n \
    \   } else {\n        self.viewController = [[MSCViewController alloc] initWithNibName:\n\
    \                               @\"MSCViewController_iPad\" bundle:nil];\n   \
    \ }\n    self.window.rootViewController = self.viewController;\n    [self.window\
    \ makeKeyAndVisible];\n    return YES;\n}\n```\n\nThis code kicks off by creating\
    \ a window object. All applications run in this main window. Next, we create our\
    \ view controller, which varies depending on the device that’s running the code.\
    \ Then, we ask the view controller for the view to add to your hierarchy. This\
    \ is boilerplate code that pretty much every app uses. In fact, even if you create\
    \ your application based on other templates, it will look very similar to this.\n\
    \n## View Controllers\n\nThe main pattern Cocoa uses is Model-View-Controller,\
    \ as we discussed in [Chapter 14](#9781430241881_Ch14.xhtml). Sure enough, in\
    \ our application we have a view, a controller, and a kind of model.\n\nOur view\
    \ comes from a nib file. This is handy because it’s faster to design and load\
    \ a view from a nib file than to create one by hand.\n\nOur class `MSCViewController`\
    \ is a subclass of `UIViewController`. `UIViewController` knows how to do the\
    \ typical tasks of managing a view, such as putting it on the screen, resizing,\
    \ rotating, and so on. Since we are managing a view, it makes sense to subclass\
    \ our class from it.\n\nWhy can’t we just use `UIViewController`? We need to add\
    \ few items to the view, and the `UIViewController` doesn’t know about those.\
    \ So we subclass it and teach the subclass to deal with the things we add.\n\n\
    ## Adding Items to the Nib File\n\nSelect the iPhone-specific nib file `MSCViewControler_iPhone.xib`.\
    \ You’ll see the app’s view at the size of an iPhone screen. You’ll also notice\
    \ that the object pane displays items that are specific to iOS (see [Figure 15-7](#9781430241881_Ch15.xhtml#_FIG7)).\n\
    \n![9781430241881_Fig15-07.tif](images/9781430241881_Fig15-07_fmt.jpg)\n\n[Figure\
    \ 15-7](#9781430241881_Ch15.xhtml#FIG7). The iPhone nib file\n\nLet’s work on\
    \ the nib file. Select a Text Field object from the Objects pane at the lower\
    \ right and drag it to the view. Adjust the size to fit inside the width of the\
    \ screen, paying attention to the guides when you adjust the size (see [Figure\
    \ 15-8](#9781430241881_Ch15.xhtml#_FIG8)).\n\n![9781430241881_Fig15-08.tif](images/9781430241881_Fig15-08_fmt.jpg)\n\
    \n[Figure 15-8](#9781430241881_Ch15.xhtml#FIG8). Add a text field\n\nNext, we’re\
    \ going to drag a label object and add it to the view, then adjust its size. The\
    \ result is in [Figure 15-9](#9781430241881_Ch15.xhtml#_FIG9).\n\n![9781430241881_Fig15-09.tif](images/9781430241881_Fig15-09_fmt.jpg)\n\
    \n[Figure 15-9](#9781430241881_Ch15.xhtml#FIG9). Put a label under the text field\n\
    \nThe next step is to add a button. In the Objects pane, select Round Rect Button,\
    \ and drag one to the view under the text field and label. Once the button is\
    \ there, adjust its size and layout to match the text field’s width, as in [Figure\
    \ 15-10](#9781430241881_Ch15.xhtml#_FIG10).\n\n![9781430241881_Fig15-10.tif](images/9781430241881_Fig15-10_fmt.jpg)\n\
    \n[Figure 15-10](#9781430241881_Ch15.xhtml#FIG10). We’ve added a wide round rect\
    \ button. Round rects are everywhere!\n\nNow double-click the round rect button\
    \ to give it a title. We shall call it `UpperCase` (see [Figure 15-11](#9781430241881_Ch15.xhtml#_FIG11)).\n\
    \n![9781430241881_Fig15-11.tif](images/9781430241881_Fig15-11_fmt.jpg)\n\n[Figure\
    \ 15-11](#9781430241881_Ch15.xhtml#FIG11). Naming the button\n\nWe have a button\
    \ for changing text to uppercase. We also need one for the opposite function.\
    \ Drag another round rectangular button to the view, and put it under the first\
    \ one. Adjust its size so it looks like its fellow button, and name it `LowerCase`,\
    \ as shown in [Figure 15-12](#9781430241881_Ch15.xhtml#_FIG12). (Here’s a shortcut\
    \ tip: you can also create the second button by selecting the first one and then\
    \ choosing Edit ![image](images/9781430241881_arrow_fmt.jpg) Duplicate, or just\
    \ pressing ![image](images/Rangoli1.jpg) +D.)\n\n![9781430241881_Fig15-12.tif](images/9781430241881_Fig15-12_fmt.jpg)\n\
    \n[Figure 15-12](#9781430241881_Ch15.xhtml#FIG12). Putting the second button into\
    \ place\n\nOf course, you don’t have to lay out your view the way we have. You\
    \ can adjust the size and position of the objects however you want, so feel free\
    \ to go crazy. Our complete view layout looks like [Figure 15-13](#9781430241881_Ch15.xhtml#_FIG13).\n\
    \n![9781430241881_Fig15-13.tif](images/9781430241881_Fig15-13_fmt.jpg)\n\n[Figure\
    \ 15-13](#9781430241881_Ch15.xhtml#FIG13). The view, fully laid out\n\nNow that\
    \ we have the view just as we want it, it’s time for the fun of connecting outlets\
    \ and actions. On the right side of the toolbar, click the middle button of the\
    \ Editor group to open the assistant, or press ![image](images/Rangoli1.jpg) +option+return\
    \ on the keyboard if you prefer shortcuts. Arrange the nib file and the header\
    \ file `MCSViewController.h` so it’s easy to drag and connect between them. Remember\
    \ the control-drag fun we had back in [Chapter 14](#9781430241881_Ch14.xhtml)?\
    \ Let’s do that again. Control-drag from the text field in the view and toward\
    \ the header file (see [Figure 15-14](#9781430241881_Ch15.xhtml#_FIG14)).\n\n\
    ![9781430241881_Fig15-14.tif](images/9781430241881_Fig15-14_fmt.jpg)\n\n[Figure\
    \ 15-14](#9781430241881_Ch15.xhtml#FIG14). Control-drag to make the first connection\n\
    \nDrop the line you’re dragging between the `@interface` and `@end` in the header\
    \ file (also in [Figure 15-14](#9781430241881_Ch15.xhtml#_FIG14)). Xcode pops\
    \ up a groovy little window (see [Figure 15-15](#9781430241881_Ch15.xhtml#_FIG15)).\n\
    \n![9781430241881_Fig15-15.tif](images/9781430241881_Fig15-15_fmt.jpg)\n\n[Figure\
    \ 15-15](#9781430241881_Ch15.xhtml#FIG15). This appears when you create a new\
    \ connection\n\nThe window in [Figure 15-15](#9781430241881_Ch15.xhtml#_FIG15)\
    \ asks you to enter the name of the outlet. But before we do that, notice that\
    \ next to Object are the words “File’s Owner.” What is that? Well, when you load\
    \ a nib file, it’s owned by a controller. When the template created the nib file\
    \ and the controller file, it made our controller the nib file’s owner. If you\
    \ need to, you can change the nib file’s owner by selecting File’s Owner from\
    \ the nib file and changing its class. But for now, we’ll leave it as it is.\n\
    \nNow we’re ready to name the outlet. Type `textField`, and click Connect."
