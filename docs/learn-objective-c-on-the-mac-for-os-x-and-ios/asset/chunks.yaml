    \n图 9-14. 使用 `Edit` 菜单选择 `ARC` 转换项\n\n因为 `ARC` 是在文件级别工作的，你可以在同一个目标中混用 `ARC` 和非\
    \ `ARC` 文件。\n\n接下来，你会看到一个要转换的目标列表（参见图 9-15）。如果你的目标依赖于其他目标，你可以选择逐步进行这个过程。例如，你可以先从框架和库开始，等这些完成后，再处理使用它们的那些目标。\n\
    \n![9781430241881_Fig09-15.tif](img/9781430241881_Fig09-15_fmt.jpg)\n\n图 9-15.\
    \ 选择你想要转换的文件\n\n当你选择要转换的目标时，默认会选中所有实现文件。如果你有一些在不同项目间共享的文件，并且不想转换它们，你可以只选择你想要转换的文件。选择完文件后，点击\
    \ `Precheck`。预检查过程结束后，你可以进入下一步：实际转换（终于到这一步了），如图 9-16 所示。\n\n![9781430241881_Fig09-16.tif](img/9781430241881_Fig09-16_fmt.jpg)\n\
    \n图 9-16. `ARC` 转换介绍界面\n\n阅读完有用的介绍信息并点击*下一步*后，转换步骤会处理你的项目并将其转换为使用 `ARC`。在这步中，`Xcode`\
    \ 会找到每个要用 `ARC` 编译的文件，并根据需要修改你的源代码。\n\n一旦过程完成，`Xcode` 会显示一个源代码比较视图，你可以在其中看到每个文件转换前后的情况，以便决定是否喜欢这些更改。\n\
    \n我们越来越接近了，但项目尚未完全转换完成。这些更改是对你的文件副本进行的，以便给你机会改变主意并退出该过程（我们有没有提到它是不可逆的？）。要完成转换，你将有另一次机会保存“转换前”文件的副本，然后就大功告成了。\n\
    \n这相当简单，但我们必须指出，这是最理想的情况，一切都能完美且自动进行。但现实生活并不总是那么简单。转换器只作用于源代码；它不查看注释，并且当前版本无法读取你的心思来确定你的意图。如果转换器发现任何歧义，它会被标记出来，你必须在转换继续之前解决这个问题。\n\
    \n## 所有权即特权\n\n我们之前讨论的一个要求是，`ARC` 代码中的指针必须是可保留对象指针（`ROP`）。这意味着，例如，你不能简单地将一个 `ROP`\
    \ 赋值给一个非 `ROP`，因为这会转移指针的所有权。考虑以下代码：\n\n```\nNSString *theString = @\"Learn Objective-C\"\
    ;\nCFStringRef cfString = (CFStringRef)theString;\n```\n\n如果你看过很多 `Objective-C`\
    \ 代码，你很可能见过这种模式。它在做什么？一个指针 `theString` 是 `ROP`，而另一个 `CFStringRef` 则不是。为了有一个愉快的\
    \ `ARC` 体验，我们需要告诉编译器谁拥有这个指针。为此，我们可以使用一种称为**桥接转换**的 `C` 语言技术。这是一种标准的 `C` 类型转换，但带有额外的关键字：\n\
    `__bridge`, `__bridge_retained` 或 `__bridge_transfer`。术语“桥接”指的是为同一目的使用不同数据类型的能力，而不是指当你陷入一个棘手\
    \ `ARC` 转换时想要跳下去的那种东西。以下是三种桥接转换的说明：\n\n-   (`__bridge Type`) *operand*：这种转换会转移指针，但不会转移其所有权。在我们上面的例子中，操作数是\
    \ `theString`，`Type` 是 `CFStringRef`。使用此关键字时，一个指针是 `ROP`，另一个则不是。使用此转换时，指针的所有权仍归操作数所有。以下是我们示例使用这种情况的样子：\n\
    \n```\ncfString = (__bridge CFStringRef)theString;\n```\n\n`cfString` 获得了赋值，但所有权仍属于\
    \ `theString`。\n\n-   (`__bridge_retained Type`) *operand*：在这种类型中，所有权被转移到非 `ROP`\
    \ 上。一个指针是 `ROP`，另一个则不是。因为 `ARC` 只负责管理 `ROP`，所以你需要负责在使用完此对象后释放它。此转换会递增对象的保留计数，因此你必须递减它，就像传统的旧式内存管理一样。以下是我们示例的样子：\n\
    \n```\ncfString = (__bridge_retained CFStringRef)theString\n```\n\n在这种情况下，`cfString`\
    \ 字符串拥有该指针，并且其保留计数增加了。你需要用 `retain`/`release` 来管理它。\n\n-   ![image](img/9781430241881_square_fmt.jpg)\
    \  (`__bridge_transfer Type`) *operand*：此转换的作用与前一种相反；它将所有权转移到 `ROP` 上。在这种情况下，`ARC`\
    \ 拥有该对象，并确保它会像任何其他 `ARC` 对象一样被释放。\n\n另一个限制是 `structs` 和 `unions` 不能有 `ROP` 成员，因此类似下面的代码是不允许的：\n\
    \n```\n// 错误的代码。请勿窃取或销售。\nstruct {\n    int32_t foo;\n    char *bar;\n    NSString\
    \ *baz;\n} MyStruct;\n```\n\n你可以通过使用 `void *` 和桥接转换来绕过这个限制。为了赋值并取回字符串，我们的代码应该像这样：\n\
    \n```\nstruct {\n    int32_t foo;\n    char *bar;\n    void *baz;\n} MyStruct;\n\
    \nMyStruct.baz = (__bridge_retained void *)theString;\nNSString *myString = (__bridge_transfer\
    \ NSString *)MyStruct.baz;\n```\n\n如你所见，在边界情况下，编写 `ARC` 代码并非总是那么自动。这是一个相当深入的课题，值得深入研究。为了完成关于\
    \ `ARC` 的讨论，我们将列出你不应在 `ARC` 管理对象上调用的内存管理方法：\n\n-   `retain`\n-   ![image](img/9781430241881_square_fmt.jpg)\
    \  `retainCount`\n-   ![image](img/9781430241881_square_fmt.jpg)  `release`\n\
    -   ![image](img/9781430241881_square_fmt.jpg)  `autorelease`\n-   `dealloc`\n\
    \n因为你有时需要释非 `ARC` 对象或执行其他清理工作，你仍然可以编写 `dealloc` 方法，但不能调用 `[super dealloc]`。\n\n\
    还有一些方法不允许在 `ARC` 对象上重写：\n\n-   ![image](img/9781430241881_square_fmt.jpg)  `retain`\n\
    -   ![image](img/9781430241881_square_fmt.jpg)  `retainCount`\n-   ![image](img/9781430241881_square_fmt.jpg)\
    \  `release`\n-   ![image](img/9781430241881_square_fmt.jpg)  `autorelease`\n\n\
    ## 异常处理\n\n什么是异常？它是一个意外事件，例如数组越界，会中断程序流程，因为程序真的不知道该如何处理它。\n"
- fmt: "When this happens, the program can create an exception object and hand it\
    \ to the runtime system, which then figures out what to do next. Exceptions in\
    \ Cocoa are represented by the `NSException` class. Cocoa requires that all exceptions\
    \ must be of type `NSException`, so even though you can throw an exception from\
    \ other objects, Cocoa isn’t set up to deal with those. Instead, you should subclass\
    \ `NSException` to create your own exceptions.\n\n**Note** Exception handling\
    \ is really intended for errors that are generated by your programs. Cocoa frameworks\
    \ usually handle errors by exiting the program, which is not what you want. You\
    \ should throw and catch exceptions in your code, instead of letting them escape\
    \ to the framework level.\n\nTo enable support for exceptions, make sure the `-fobj-exceptions`\
    \ flag is turned on. You can enable this with the *Enable Objective-C* *Exceptions*\
    \ build option in Xcode (Figure 9-17).\n\n![9781430241881_Fig09-17.tif](images/9781430241881_Fig09-17_fmt.jpg)\n\
    \n**Figure 9-17.** Enabling exceptions\n\nThe act of creating an exception and\
    \ handing it to the runtime system is known as **throwing** an exception, or sometimes\
    \ **raising** an exception. Notice that `NSException` has a few methods that start\
    \ with `raise`. Some of these are class methods, and `raise` itself is an instance\
    \ method.\n\n**Catching** an exception is the act of handling an exception that\
    \ has been thrown.\n\n**Note** When an exception is thrown and is not caught,\
    \ the program stops at the exception point and propagates the exception.\n\n##\
    \ Keywords for Exceptions\n\nAll the keywords for exceptions start with `@`. Here’s\
    \ what each one does:\n\n*    `@try`: Defines a block of code that will be tested\
    \ to determine if an exception should be thrown.\n*    `@catch()`: Defines a block\
    \ of code for handling a thrown exception. Takes an argument, typically of type\
    \ `NSException`, but can be of other types.\n*    `@finally`: Defines a block\
    \ of code that gets executed whether an exception is thrown or not. This code\
    \ will always be executed.\n*    `@throw`: Throws an exception.\n\n**Note** Earlier,\
    \ we mentioned that you can throw exceptions from objects other than `NSException`\
    \ instances, but that you should avoid doing so. The reason is that not every\
    \ Cocoa framework catches exceptions thrown by objects other than `NSException`.\
    \ To ensure that Cocoa works right with your exceptions, you should throw `NSException`\
    \ objects only. Think of it like the old saying that you don’t have to floss all\
    \ your teeth, just the ones you want to keep.\n\nYou’ll typically use `@try`,\
    \ `@catch`, and `@finally` together in one structure. It goes a little something\
    \ like this:\n\n```\n@try\n{\n   // code you want to execute that might throw\
    \ an exception.\n}\n@catch (NSException *exception)\n{\n   // code to execute\
    \ that handles exception\n}\n@finally\n{\n   // code that will always be executed.\
    \ Typically for cleanup.\n}\n```\n\n## Catching Different Types of Exceptions\n\
    \nYou can have multiple `@catch` blocks depending on which type of exception you\
    \ want to handle. Your handlers should go in order from most to least specific,\
    \ with a general handler after all the others. Here’s an example:\n\n```\n@try{\n\
    } @catch (MyCustomException *custom) {\n} @catch (NSException *exception) {\n\
    } @catch (id value) {\n} @finally {\n}\n```\n\n**Note** C programmers often use\
    \ `setjmp` and `longjmp` in exception handling code. You can’t use `setjmp` and\
    \ `longjmp` within a `@try` block if the jump goes outside the `@try` braces.\
    \ However, you can use `goto` and `return` to exit exception-handling code.\n\n\
    ## Throwing Exceptions\n\nWhen the program detects an exception, it must propagate\
    \ the exception to a block of code that handles it, cleverly called an exception\
    \ handler. As we noted earlier, the process of propagating an exception is called\
    \ throwing, or raising, an exception."
  raw: 'When this happens, the program can create an exception object and hand it
    to the runtime system, which then figures out what to do next. Exceptions in Cocoa
    are represented by the NSException class. Cocoa requires that all exceptions must
    be of type NSException, so even though you can throw an exception from other objects,
    Cocoa isn’t set up to deal with those. Instead, you should subclass NSException
    to create your own exceptions.


    **Note**  Exception handling is really intended for errors that are generated
    by your programs. Cocoa frameworks usually handle errors by exiting the program,
    which is not what you want. You should throw and catch exceptions in your code,
    instead of letting them escape to the framework level.


    To enable support for exceptions, make sure the -fobj-exceptions flag is turned
    on. You can enable this with the *Enable Objective-C* *Exceptions* build option
    in Xcode ([Figure 9-17](#9781430241881_Ch9.xhtml#_FIG17)).


    ![9781430241881_Fig09-17.tif](images/9781430241881_Fig09-17_fmt.jpg)


    [Figure 9-17](#9781430241881_Ch9.xhtml#FIG17). Enabling exceptions


    The act of creating an exception and handing it to the runtime system is known
    as **throwing** an exception, or sometimes **raising** an exception. Notice that
    NSException has a few methods that start with raise. Some of these are class methods,
    and raise itself is an instance method.


    **Catching** an exception is the act of handling an exception that has been thrown.


    **Note**  When an exception is thrown and is not caught, the program stops at
    the exception point and propagates the exception.


    Keywords for Exceptions


    All the keywords for exceptions start with @. Here’s what each one does:


    *   ![image](images/9781430241881_square_fmt.jpg)  @try: Defines a block of code
    that will be tested to determine if an exception should be thrown.

    *   ![image](images/9781430241881_square_fmt.jpg)  @catch(): Defines a block of
    code for handling a thrown exception. Takes an argument, typically of type NSException,
    but can be of other types.

    *   ![image](images/9781430241881_square_fmt.jpg)  @finally: Defines a block of
    code that gets executed whether an exception is thrown or not. This code will
    always be executed.

    *   ![image](images/9781430241881_square_fmt.jpg)  @throw: Throws an exception.


    **Note**  Earlier, we mentioned that you can throw exceptions from objects other
    than NSException instances, but that you should avoid doing so. The reason is
    that not every Cocoa framework catches exceptions thrown by objects other than
    NSException. To ensure that Cocoa works right with your exceptions, you should
    throw NSException objects only. Think of it like the old saying that you don’t
    have to floss all your teeth, just the ones you want to keep.


    You’ll typically use @try, @catch, and @finally together in one structure. It
    goes a little something like this:


    @try


    {


    // code you want to execute that might throw an exception.


    }


    @catch (NSException *exception)


    {


    // code to execute that handles exception


    }


    @finally


    {


    // code that will always be executed. Typically for cleanup.


    }


    Catching Different Types of Exceptions


    You can have multiple @catch blocks depending on which type of exception you want
    to handle. Your handlers should go in order from most to least specific, with
    a general handler after all the others. Here’s an example:


    @try{


    } @catch (MyCustomException *custom) {


    } @catch (NSException *exception) {


    } @catch (id value) {


    } @finally {


    }


    **Note**  C programmers often use setjmp and longjmp in exception handling code.
    You can’t use setjmp and longjmp within a @try block if the jump goes outside
    the @try braces. However, you can use goto and return to exit exception-handling
    code.


    Throwing Exceptions


    When the program detects an exception, it must propagate the exception to a block
    of code that handles it, cleverly called an exception handler. As we noted earlier,
    the process of propagating an exception is called throwing, or raising, an exception.'
  trans: "\n当这种情况发生时，程序会创建一个异常对象并将其交给运行时系统，运行时系统随后会决定接下来如何处理。Cocoa 中的异常由 `NSException`\
    \ 类表示。Cocoa 要求所有异常必须是 `NSException` 类型，因此即使你可以从其他对象抛出异常，Cocoa 也无法处理这些异常。相反，你应该通过继承\
    \ `NSException` 来创建自己的异常。\n\n**注意** 异常处理机制实际上用于处理程序自身产生的错误。Cocoa 框架通常通过退出程序来处理错误，这并非你所期望的结果。你应当在代码中抛出并捕获异常，而不是让它们逃逸到框架层面。\n\
    \n要启用异常支持，请确保 `-fobj-exceptions` 标志已开启。你可以在 Xcode 的 *Enable Objective-C* *Exceptions*\
    \ 编译选项中启用此功能（如图 9-17 所示）。\n\n![9781430241881_Fig09-17.tif](img/9781430241881_Fig09-17_fmt.jpg)\n\
    \n**图 9-17.** 启用异常\n\n创建异常并将其交给运行时系统的行为称为**抛出**异常，有时也称为**引发**异常。请注意，`NSException`\
    \ 有几个以 `raise` 开头的方法。其中一些是类方法，而 `raise` 本身是一个实例方法。\n\n**捕获**异常是指处理已抛出异常的行为。\n\n\
    **注意** 当异常被抛出但未被捕获时，程序会在异常点停止并传播该异常。\n\n## 异常的关键字\n\n所有异常关键字都以 `@` 开头。以下是每个关键字的作用：\n\
    \n*    `@try`：定义一个代码块，该块将被测试以确定是否应抛出异常。\n*    `@catch()`：定义一个用于处理已抛出异常的代码块。它接受一个参数，通常为\
    \ `NSException` 类型，但也可以是其他类型。\n*    `@finally`：定义一个无论是否抛出异常都会执行的代码块。此代码将始终被执行。\n\
    *    `@throw`：抛出异常。\n\n**注意** 前面我们提到，你可以从 `NSException` 实例以外的对象抛出异常，但应避免这样做。原因是并非每个\
    \ Cocoa 框架都能捕获由 `NSException` 以外的对象抛出的异常。为了确保 Cocoa 能正确处理你的异常，你只应抛出 `NSException`\
    \ 对象。可以将此理解为老话所说的：你不需要用牙线清洁所有牙齿，只需清洁你想保留的那些即可。\n\n你通常会结合使用 `@try`、`@catch` 和 `@finally`\
    \ 来构建一个结构。它大致如下所示：\n\n```\n@try\n{\n   // 你想要执行的代码，这些代码可能会抛出异常。\n}\n@catch (NSException\
    \ *exception)\n{\n   // 用于处理异常的代码。\n}\n@finally\n{\n   // 始终会被执行的代码。通常用于清理工作。\n\
    }\n```\n\n## 捕获不同类型的异常\n\n你可以根据要处理的异常类型，使用多个 `@catch` 块。你的处理器应按从最具体到最不具体的顺序排列，并在所有其他处理器之后放置一个通用处理器。示例如下：\n\
    \n```\n@try{\n} @catch (MyCustomException *custom) {\n} @catch (NSException *exception)\
    \ {\n} @catch (id value) {\n} @finally {\n}\n```\n\n**注意** C 语言程序员经常在异常处理代码中使用\
    \ `setjmp` 和 `longjmp`。如果跳转的目标超出 `@try` 花括号的范围，则不能在 `@try` 块中使用 `setjmp` 和 `longjmp`。但是，你可以使用\
    \ `goto` 和 `return` 来退出异常处理代码。\n\n## 抛出异常\n\n当程序检测到异常时，必须将该异常传播到处理它的代码块，该代码块被巧妙称为异常处理器。如前所述，传播异常的过程称为抛出或引发异常。\n"
- fmt: "程序通过创建`NSException`实例并使用以下两种技术之一来抛出异常：\n\n*   `@throw exception;`\n*   向`NSException`对象发送`raise`消息\n\
    \n例如，我们将创建一个异常：\n\n```\nNSException *theException = [NSException exceptionWithName:\
    \ …];\n```\n\n然后我们可以通过以下任一方式抛出它：\n\n```\n@throw theException;\n```\n\n或\n\n```\n\
    [theException raise];\n```\n\n请使用其中一种技术，不要同时使用两者。两种技术的区别在于：`raise`只能用于`NSException`对象，而`@throw`也可以与其他对象一起使用。\n\
    \n你通常会在异常处理代码内部抛出异常。你的代码可以通过发送另一条`raise`消息或使用`@throw`关键字来传播异常。\n\n```\n@try\n\
    {\n    NSException *e = …;\n    @throw e;\n}\n@catch (NSException *e) {\n    @throw;\
    \ // 重新抛出 e。\n}\n```\n\n**注意**：在`@catch`异常处理块中，你可以在不指定异常对象的情况下重新抛出异常。\n\n与本地`@catch`异常处理器关联的`@finally`块会在`@throw`导致调用下一个更高层级的异常处理器之前执行，因为`@finally`会在`@throw`发生之前被调用。\n\
    \nObjective-C 异常与 C++ 异常系统兼容。\n\n**注意**：Objective-C 中的异常是资源密集型的。你不应将异常用于常规流程控制或仅仅用于表示错误。使用`@try`设置异常没有成本，但捕获异常会消耗大量的程序资源和速度。\n\
    \n### 异常也需要内存管理\n\n当涉及异常时，内存管理可能变得棘手。让我们看看下面这段简单的代码：\n\n```\n- (void)mySimpleMethod\n\
    {\n    NSDictionary *dictionary = [[NSDictionary alloc] initWith….];\n    [self\
    \ processDictionary:dictionary];\n    [dictionary release];\n}\n```\n\n现在假设`processDictionary`抛出了一个异常。程序会跳出该方法并寻找异常处理器。但由于方法在此刻退出，`dictionary`对象没有被释放，从而导致内存泄漏。\n\
    \n一种简单的处理方法是使用`@try`和`@finally`，在`@finally`中执行清理工作，因为它总是会被执行（如前所述）。\n\n```\n-\
    \ (void)mySimpleMethod\n{\n    NSDictionary *dictionary = [[NSDictionary alloc]\
    \ initWith….];\n    @try {\n        [self processDictionary:dictionary];\n   \
    \ }\n    @finally {\n        [dictionary release];\n    }\n}\n```\n\n这种模式也可以用于\
    \ C 风格的内存管理，例如`malloc`和`free`。\n\n### 异常与自动释放池\n\n异常处理有时会遇到一个微妙的问题：异常对象会被自动释放。异常几乎总是作为自动释放对象创建的，因为你不知道它们何时需要被释放。当自动释放池被销毁时，池中的所有对象也会被销毁，包括异常。考虑以下代码，它看起来确实无害：\n\
    \n```\n- (void)myMethod\n{\n    NSAutoreleasePool *pool = [[NSAutoreleasePool\
    \ alloc] init];\n    NSDictionary *myDictionary =\n        [[NSDictionary alloc]\
    \ initWithObjectsAndKeys:@\"asdfads\", nil];\n    @try {\n        [self processDictionary:myDictionary];\n\
    \    } @catch (NSException *e) {\n        @throw;\n    } @finally {\n        [pool\
    \ release];\n    }\n}\n```\n\n这段代码看起来没问题：我们创建了对象，也释放了它们，因为我们都是合格的开发者。但是等等！当我们考虑异常处理时，这里有一个问题。我们之前讨论过，可以在`@catch`块中重新抛出异常，这会导致`@finally`块在异常被重新抛出之前执行。这会导致本地池在异常被传递之前被释放，从而将其变成一个可怕的**僵尸异常**。幸运的是，我们有一个简单的修复方法：只需在池外部保留它。\n\
    \n修改后的方法如下：\n\n```\n- (void)myMethod\n{\n    id savedException = nil;\n    NSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n    NSDictionary *myDictionary =\n\
    \        [[NSDictionary alloc] initWithObjectsAndKeys:@\"asdfads\", nil];\n  \
    \  @try {\n        [self processDictionary:myDictionary];\n    } @catch (NSException\
    \ *e) {\n```"
  raw: 'A program throws an exception by creating an instance of NSException and using
    one of two techniques:


    *   ![image](images/9781430241881_square_fmt.jpg)  Using @throw exception;

    *   ![image](images/9781430241881_square_fmt.jpg)  Sending a raise message to
    an NSException object


    For example, we’ll create an exception:


    NSException *theException = [NSException exceptionWithName: …];


    We can then throw with either


    @throw theException;


    or


    [theException raise];


    Use one technique or the other, but not both. The difference between the techniques
    is that raise can only be used with NSException objects, while @throw works with
    other objects as well.


    You’ll usually throw exceptions from inside the exception handling code. Your
    code can propagate the exception by sending another raise message or @throw keyword.


    @try


    {


    NSException *e = …;


    @throw e;


    }


    @catch (NSException *e) {


    @throw; // rethrows e.


    }


    **Note**  In a @catch exception handling block, you can rethrow the exception
    without specifying the exception object.


    The @finally block that is associated with a local @catch exception handler is
    executed before

    @throw causes the next higher exception handler to be called, because @finally
    is called before the @throw happens.


    Objective-C exceptions are compatible with the C++ exception system.


    **Note**  Exceptions in Objective-C are resource intensive. You should not use
    exceptions for general flow control or simply to signify errors. Setting up an
    exception with @try has zero cost, but catching an exception has a substantial
    cost in program resources and speed.


    Exceptions Need Memory Management Too


    Memory management can be tricky when exceptions are involved. Let’s take a look
    at this simple code:


    - (void)mySimpleMethod


    {


    NSDictionary *dictionary = [[NSDictionary alloc] initWith….];


    [self processDictionary:dictionary];


    [dictionary release];


    }


    Now let’s imagine that processDictionary throws an exception. The program jumps
    out of this method and looks for an exception handler. But because the method
    exits at this point, the dictionary object is not released, and we have a memory
    leak.


    One simple way to handle this is to use @try and @finally, doing some cleanup
    in @finally because it’s always executed (as we said earlier).


    - (void)mySimpleMethod


    {


    NSDictionary *dictionary = [[NSDictionary alloc] initWith….];


    @try {


    [self processDictionary:dictionary];


    }


    @finally {


    [dictionary release];


    }


    }


    This pattern can be used with C-style memory management as well, such as malloc
    and free.


    Exceptions and Autorelease Pools


    Exception handling can sometimes suffer from a subtle problem of automatically
    releasing an exception object. Exceptions are almost always created as autoreleased
    objects because you don’t know when they will need to be released. When the autorelease
    pool is destroyed, all objects in that pool are destroyed also, including the
    exception. Consider the following code, which sure looks innocent enough:


    - (void)myMethod


    {


    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];


    NSDictionary *myDictionary =


    [[NSDictionary alloc] initWithObjectsAndKeys:@"asdfads", nil];


    @try {


    [self processDictionary:myDictionary];


    } @catch (NSException *e) {


    @throw;


    } @finally {


    [pool release];


    }


    }


    This looks like fine code: we create objects, and we release them, because we
    are good citizens. But wait! There’s a problem when we think about exception handling.
    We discussed earlier that we can rethrow exceptions in the @catch block, which
    causes the @finally block to execute before the exception is rethrown. This will
    cause the local pool to be released before the exception can be delivered, thus
    turning it into a dreaded **zombie exception**. Luckily, we have a simple fix
    for this: we simply retain it outside our pool.


    Our new method looks like this:


    - (void)myMethod


    {


    id savedException = nil;


    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];


    NSDictionary *myDictionary =


    [[NSDictionary alloc] initWithObjectsAndKeys:@"asdfads", nil];


    @try {


    [self processDictionary:myDictionary];


    } @catch (NSException *e) {'
