    \ 和 `color:` 是参数名称（实际上也是方法名的一部分——稍后会详细说明），而 `@\"hello there\"` 和 `kBlueColor`\
    \ 则是传入的参数。\n\n这种语法与 C 语言不同。在 C 语言中，你调用函数时，函数名后面跟着所有参数，像这样：\n\n```c\nsetTextThingValueColor\
    \ (textThing, @\"hello there\", kBlueColor);\n```\n\n我们非常喜欢中缀表示法，尽管它初看起来有点奇怪。它让代码非常易读，并且能轻松地将参数与其作用对应起来。使用\
    \ C 和 C++ 代码时，函数有时会有四五个参数，如果不查阅文档，很难确切知道每个参数的作用。\n\n`setFillColor:` 声明以常见的短横线和括号内的返回类型开始：\n\
    \n```objc\n- (void)\n```\n\n与 `draw` 方法一样，短横线表示“这是一个新方法的声明”。`(void)` 表示此方法不返回任何内容。我们继续查看代码：\n\
    \n```objc\nsetFillColor:\n```\n\n方法的名称是 `setFillColor:`。后面的冒号是名称的一部分。它向编译器和人类提示，接下来将有一个参数。\n\
    \n```objc\n(ShapeColor) fillColor;\n```\n\n参数的类型在括号中指定，本例中是 `ShapeColor` 值之一（`kRedColor`、`kBlueColor`\
    \ 等）。紧随其后的 `fillColor` 是参数名称。你可以在方法体中使用这个名称来引用该参数。通过选择有意义的参数名称（而不是以宠物或最喜欢的超级英雄命名），可以让代码更易于阅读。\n\
    \n### 冒号大集合\n\n务必记住，冒号是方法名称中非常重要的一部分。方法：\n\n```objc\n- (void) scratchTheCat;\n\
    ```\n\n与以下方法不同：\n\n```objc\n- (void) scratchTheCat: (CatType) critter;\n```\n\n\
    许多初学 Objective-C 的程序员经常犯的一个错误是在无参数的方法名称末尾随意添加冒号。遇到编译器错误时，你可能会忍不住多加一个冒号，希望它能解决问题。需要遵循的规则是：如果方法接受一个参数，它就有冒号；如果不接受参数，就没有冒号。\n\
    \n`setBounds:` 的声明与 `setFillColor:` 完全一样，只是参数类型是 `ShapeRect` 而不是 `ShapeColor`。\n\
    \n最后一行代码告诉编译器 `Circle` 类的声明已完成：\n\n```objc\n@end // Circle\n```\n\n尽管不是必须的，但我们建议在所有\
    \ `@end` 语句后添加注释注明类名。这样，当你滚动到文件末尾或查看长打印稿的最后一页时，就能轻松知道当前查看的是什么内容。\n\n以上就是 `Circle`\
    \ 类的完整接口。现在，任何阅读代码的人都知道，这个类有几个实例变量和三个方法。一个方法设置边界，一个方法设置颜色，第三个方法绘制图形。\n\n接口部分完成后，接下来该编写使这个类真正发挥作用的代码了。你不会以为我们已经完成了吧？\n\
    \n## `@implementation` 部分\n\n我们刚刚讨论的 `@interface` 部分定义了一个类的公共接口。这个接口通常被称为 API，是“应用程序编程接口”的三字母缩写（而\
    \ TLA 本身也是“三字母缩写”的三字母缩写）。让对象真正工作的实际代码位于 `@implementation` 部分。\n\n以下是 `Circle`\
    \ 类的完整实现：\n\n```objc\n@implementation Circle\n\n- (void) setFillColor: (ShapeColor)\
    \ c\n{\n    fillColor = c;\n} // setFillColor\n\n- (void) setBounds: (ShapeRect)\
    \ b\n{\n    bounds = b;\n} // setBounds\n```\n\n现在，我们以惯常的方式详细检查这段代码。`Circle` 的实现从这一行开始：\n\
    \n```objc\n@implementation Circle\n```\n\n`@implementation` 是一个编译器指令，表示你即将提供类的内部实现代码。类的名称出现在\
    \ `@implementation` 之后。这行末尾没有分号，因为 Objective-C 的编译器指令不需要分号。\n\n在开始声明一个新类之后，我们告诉编译器\
    \ Circle 对象需要的各种数据：\n\n```objc\n{\n    ShapeColor fillColor;\n    ShapeRect bounds;\n\
    }\n```\n\n花括号内的内容是一个模板，用于生成新的 `Circle` 对象。它表明当创建一个新的 `Circle` 对象时，该对象将由两个元素组成。第一个元素\
    \ `fillColor`（类型为 `ShapeColor`）是用于绘制 Circle 对象的颜色。第二个元素 `bounds` 是 Circle 对象的边界矩形，其类型为\
    \ `ShapeRect`。这个矩形决定了图形在屏幕上的绘制位置。再次强调，关键是矩形是图形数据的一部分；*如何*使用这些数据在此处并不重要。\n\n你在类声明中指定了\
    \ `fillColor` 和 `bounds`。每次创建 `Circle` 对象时，它都包含这两个元素。因此，每个 `Circle` 类的对象都有自己的\
    \ `fillColor` 和 `bounds`。`fillColor` 和 `bounds` 值被称为 `Circle` 类对象的**实例变量**。\n\n\
    右花括号告诉编译器，我们已经完成了 `Circle` 实例变量的声明。\n"
- fmt: "# 方法定义详解\n\n各个方法的定义将在下文逐一介绍。这些方法的出现顺序不必与`@interface`指令中的声明顺序保持一致。你甚至可以在`@implementation`中定义那些在`@interface`中没有对应声明的方法。你可以将这些方法视为私有方法，仅供类的实现内部使用。\n\
    \n**注意**：你可能会认为，仅在`@implementation`指令中定义方法就能使其在实现外部不可访问，但事实并非如此。Objective-C 实际上并没有真正的私有方法。没有任何办法能将方法标记为私有，并阻止其他代码调用它。这是\
    \ Objective-C 动态特性的一个副作用。\n\n`setFillColor:`是第一个被定义的方法：\n\n```objectivec\n- (void)\
    \ setFillColor: (ShapeColor) c\n{\n    fillColor = c;\n} // setFillColor\n```\n\
    \n`setFillColor:`方法定义的第一行看起来与`@interface`部分中的声明非常相似。主要区别在于，这里的定义末尾没有分号。你可能注意到我们将参数重命名为`c`。在`@interface`和`@implementation`中，参数名可以不同。在本例中，如果我们保留参数名为`fillColor`，它将隐藏`fillColor`实例变量，并导致编译器产生警告。\n\
    \n**注意**：为什么我们必须重命名`fillColor`？我们已经在类中定义了一个名为`fillColor`的实例变量。在这个方法中，我们可以引用该变量——它处于作用域内。因此，如果我们再定义一个同名的变量，编译器将切断我们对实例变量的访问。使用相同的变量名会隐藏原始变量。我们通过为参数使用新名称来避免这个问题。我们也可以将实例变量命名为其他名称，例如`myFillColor`，然后保留`fillColor`作为参数名。正如你将在[第16章](#9781430241881_Ch16.xhtml)中看到的，如果我们将实例变量命名为与方法名称相似的方式，Cocoa\
    \ 可以施展一些魔法。\n\n在`@interface`部分，我们使用方法声明中的`fillColor`，因为它能准确告知读者参数的用途。而在实现中，我们必须区分参数名和实例变量名，最简单的做法就是直接重命名参数。\n\
    \n方法体只有一行代码：\n\n```objectivec\nfillColor = c;\n```\n\n如果你特别好奇，可能会想知道实例变量存储在哪里。在\
    \ Objective-C 中调用方法时，会有一个名为`self`的秘密隐藏参数被传递给接收对象，该参数指向接收对象本身。例如，在代码`[circle setFillColor:\
    \ kRedColor]`中，该方法将`circle`作为其`self`参数传递。由于`self`是秘密且自动传递的，你无需手动处理。在方法内部，引用实例变量的代码实际上是这样工作的：\n\
    \n```objectivec\nself->fillColor = c;\n```\n\n顺便提一下，传递隐藏参数又是间接性的一种体现（你以为我们已经讲完间接性了，是吧？）。因为\
    \ Objective-C 运行时可以将不同的对象作为隐藏的`self`参数传递，所以它可以改变哪些对象的实例变量被修改。\n\n**注意**：Objective-C\
    \ 运行时是一段支持应用程序（包括我们的应用）在用户运行时执行的代码。运行时执行重要的任务，比如向对象发送消息和传递参数。从[第9章](#9781430241881_Ch9.xhtml)开始，你将在后续章节中了解更多关于运行时的内容。\n\
    \n第二个方法`setBounds:`与我们的`setFillColor:`方法类似：\n\n```objectivec\n- (void) setBounds:\
    \ (ShapeRect) b\n{\n    bounds = b;\n} // setBounds\n```\n\n这段代码将圆形对象的边界矩形设置为传入的矩形。\n\
    \n最后一个方法是我们的`draw`方法。注意，方法名末尾没有冒号，这表明它不接受任何参数：\n\n```objectivec\n- (void) draw\n\
    {\n    NSLog (@\"drawing a circle at (%d %d %d %d) in %@\",\n           bounds.x,\
    \ bounds.y,\n           bounds.width, bounds.height,\n```"
  raw: 'The definitions of the individual methods are next. They don’t have to appear
    in the same order as they do in the @interface directive. You can even define
    methods in an @implementation that don’t have a corresponding declaration in the
    @interface. You can think of these as private methods, used just in the implementation
    of the class.


    **Note**  You might think that defining a method solely in the @implementation
    directive makes it inaccessible from outside the implementation, but that’s not
    the case. Objective-C doesn’t really have private methods. There is no way to
    mark a method as being private and preventing other code from calling it. This
    is a side effect of Objective-C’s dynamic nature.


    setFillColor: is the first method defined:


    - (void) setFillColor: (ShapeColor) c


    {


    fillColor = c;


    } // setFillColor


    The first line of the definition of setFillColor: looks a lot like the declaration
    in the @interface section. The main difference is that this one doesn’t have a
    semicolon at the end. You may notice that we renamed the parameter to simply c.
    It’s OK for the parameter names to differ between the @interface and the @implementation.
    In this case, if we had left the parameter name as fillColor, it would have hidden
    the fillColor instance variable and generated a warning from the compiler.


    **Note**  Why exactly do we have to rename fillColor? We already have an instance
    variable named fillColor defined by the class. We can refer to that variable in
    this method—it’s in scope. So, if we define another variable with the same name,
    the compiler will cut off our access from the instance variable. Using the same
    variable name hides the original variable. We avoid this problem by using a new
    name for the parameter. We could have named the instance variable something else,
    like myFillColor, and then we could have kept fillColor as the parameter name.
    As you’ll see later in [Chapter 16](#9781430241881_Ch16.xhtml), Cocoa can do some
    magic if we name our instance variable similarly to how we name our methods.


    In the @interface section, we used the name fillColor in the method declaration
    because it tells the reader exactly what the argument is for. In the implementation,
    we have to distinguish between the parameter name and the instance variable name,
    and it’s easiest to simply rename the parameter.


    The body of the method is one line:


    fillColor = c;


    If you’re extra curious, you might wonder where the instance variables are stored.
    When you call a method in Objective-C, a secret hidden parameter called self is
    passed to the receiving object that refers to the receiving object. For example,
    in the code [circle setFillColor: kRedColor], the method passes circle as its
    self parameter. Because self is passed secretly and automatically, you don’t have
    to do it yourself. Code inside a method that refers to instance variables works
    like this:


    self->fillColor = c;


    By the way, passing hidden arguments is yet another example of indirection in
    action (bet you thought we were all finished talking about indirection, huh?).
    Because the Objective-C runtime can pass different objects as the hidden self
    parameter, it can change which objects get their instance variables changed.


    **Note**  The Objective-C runtime is the chunk of code that supports applications,
    including ours, when users are running them. The runtime performs important tasks
    like sending messages to objects and passing parameters. You’ll learn more about
    the runtime in future chapters, starting with [Chapter 9](#9781430241881_Ch9.xhtml).


    The second method, setBounds:, is just like our setFillColor: method:


    - (void) setBounds: (ShapeRect) b


    {


    bounds = b;


    } // setBounds


    This code sets a circle object’s bounding rectangle to be the rectangle that’s
    passed in.


    The last method is our draw method. Note that there’s not a colon at the end of
    the method’s name, which tells us that it doesn’t take any arguments:


    - (void) draw


    {


    NSLog (@"drawing a circle at (%d %d %d %d) in %@",


    bounds.x, bounds.y,


    bounds.width, bounds.height,'
  trans: "\n\n# 方法定义详解\n\n各个方法的定义将在下文逐一介绍。这些方法的出现顺序不必与`@interface`指令中的声明顺序保持一致。你甚至可以在`@implementation`中定义那些在`@interface`中没有对应声明的方法。你可以将这些方法视为私有方法，仅供类的实现内部使用。\n\
