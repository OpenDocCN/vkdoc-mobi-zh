    NSNull


    We’ve told you that you can’t put nil into a collection, because nil has special
    meaning to NSArray and NSDictionary. But sometimes, you really need to store a
    value that means “there’s nothing here at all.” For example, let’s say you have
    a dictionary that holds a person’s contact information, and under the key @"home
    fax machine", you store the user’s home fax number. If that key holds a phone
    number value, you know that person has a fax machine. But if there’s no value
    in the dictionary, does it mean that person has no home fax machine or that you
    don’t know if they have one?


    By using NSNull, you can eliminate the ambiguity. You can decide that a value
    of NSNull for the key @"home fax machine" means the person definitely does not
    have a fax machine, and no value for the key means that you don’t know if the
    person has one or not.


    NSNull is probably the simplest of all Cocoa classes. It has but a single method:


    + (NSNull *) null;


    And you add it to a collection like this:


    [contact setObject: [NSNull null]


    forKey: @"home fax machine"];


    You access it as follows:


    id homefax = [contact objectForKey: @"home fax machine"];


    if (homefax == [NSNull null])


    {


    // … no fax machine. rats.


    }


    [NSNull null] always returns the same value, so you can use == to compare it with
    other values.


