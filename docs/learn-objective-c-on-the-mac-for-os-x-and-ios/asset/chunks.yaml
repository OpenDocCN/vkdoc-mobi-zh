- fmt: "# Xcode 项目文件组织与依赖管理\n\n`Xcode`创建一个以项目名称命名的组，然后将文件放入该组内的文件夹中。（你可以在项目导航面板中看到项目的结构。）这些文件夹（`Xcode`称之为*组*）提供了一种组织项目中源文件的方式。例如，你可以为用户界面类创建一个组，为数据处理类创建另一个组，从而使项目更易于导航。当你设置组时，`Xcode`实际上不会移动任何文件，也不会在硬盘上创建任何目录。组关系只是由`Xcode`维护的一个美好的幻象。如果你愿意，你可以设置一个组，使其指向文件系统中的特定位置。然后，`Xcode`会将新创建的文件放入该目录中。\n\
    \n创建文件后，你可以在列表中点击它们进行编辑。`Xcode`会贴心地包含一些标准的样板代码，即你在这些文件中始终需要的内容，例如`#import <Cocoa/Cocoa.h>`，以及空的`@interface`和`@implementation`部分，供你填充。\n\
    \n**注意**：到目前为止，在本书中，我们在程序中使用的是`#import <Foundation/Foundation.h>`，因为我们只使用了`Cocoa`的那一部分。但使用`#import\
    \ <Cocoa/Cocoa.h>`也是可以的。该语句为我们引入了`Foundation`框架头文件以及其他一些内容。\n\n## 拆分`Car`类\n\n\
    位于`06.01 CarParts-Split`项目文件夹中的`CarParts-Split`，将所有的类从`CarParts-Split.m`文件中取出，并移入它们自己的文件中。每个类位于自己独立的头文件（`.h`）和实现文件（`.m`）中。让我们看看自己创建这个项目需要做些什么。我们将从两个继承自`NSObject`的类开始：`Tire`和`Engine`。选择新建文件，然后选择`Objective-C\
    \ Class`，并输入名称`Tire`。对`Engine`执行相同操作。[图6-5](#9781430241881_Ch6.xhtml#_FIG5)显示了项目列表中的四个新文件。\n\
    \n![9781430241881_Fig06-05.tif](images/9781430241881_Fig06-05_fmt.jpg)\n\n[图6-5](#9781430241881_Ch6.xhtml#FIG5).\
    \ 向项目中添加`Tire`和`Engine`\n\n现在，将`Tire`的`@interface`从`CarParts-Split.m`中剪切出来，并粘贴到`Tire.h`中。文件应如下所示：\n\
    \n```objectivec\n#import <Cocoa/Cocoa.h>\n\n@interface Tire : NSObject\n\n@end\
    \ // Tire\n```\n\n接下来，我们将`Tire`的`@implementation`从`CarParts-Split.m`中剪切出来，并粘贴到`Tire.m`中。你还需要在顶部添加一个`#import\
    \ \"Tire.h\"`。`Tire.m`应如下所示：\n\n```objectivec\n#import \"Tire.h\"\n\n@implementation\
    \ Tire\n\n- (NSString *) description\n\n{\n\nreturn (@\"I am a tire. I last a\
    \ while\");\n\n} // description\n\n@end // Tire\n```\n\n该文件的第一个`#import`值得注意。它并没有像之前那样导入`Cocoa.h`或`Foundation.h`头文件，而是导入了该类的头文件。这是标准做法，并且你在几乎创建的每个项目中都会这样做。编译器需要知道类中实例变量的布局，以便生成正确的代码，但它不会自动知道存在一个与该源文件对应的头文件。因此，我们需要通过添加`#import\
    \ \"Tire.h\"`语句来告知编译器。在编译时，如果遇到类似“找不到`Tire`的接口声明”的错误信息，通常意味着你忘记导入该类的头文件了。\n\n\
    ### 导入中心\n\n请注意，导入有两种不同的方式：带引号的和带尖括号的。例如，有`#import <Cocoa/Cocoa.h>`和`#import \"\
    Tire.h\"`。带尖括号的版本用于导入系统头文件。带引号的版本表示项目本地的头文件。如果你看到头文件名在尖括号内，则表明它是项目只读的，因为它属于系统。当头文件名在引号中时，你知道你（或项目中的其他人）可以对其进行修改。\n\
    \n现在对`Engine`类执行相同的过程。将`Engine`的`@interface`从`CarParts-Split.m`中剪切出来，并粘贴到`Engine.h`中。`Engine.h`现在看起来像这样：\n\
    \n```objectivec\n#import <Cocoa/Cocoa.h>\n\n@interface Engine : NSObject\n\n@end\
    \ // Engine\n```\n\n接下来，将`Engine`的`@implementation`剪切出来，并粘贴到`Engine.m`中，现在应如下所示：\n\
    \n```objectivec\n#import \"Engine.h\"\n\n@implementation Engine\n\n- (NSString\
    \ *) description\n\n{\n\nreturn (@\"I am an engine. Vrooom!\");\n\n} // description\n\
    \n@end // Engine\n```\n\n如果你现在尝试编译程序，`CarParts-Split.m`会报错，因为缺少对`Tire`和`Engine`的声明。修复这些问题相当简单。只需在`CarParts-Split.m`的顶部，紧跟在`#import\
    \ <Foundation/Foundation.h>`语句之后，添加以下两行：\n\n```objectivec\n#import \"Tire.h\"\
    \ \n#import \"Engine.h\"\n```\n\n**注意**：请记住，`#import`类似于`#include`，是一个由`C`预处理器处理的命令。在这种情况下，`C`预处理器实际上只是进行剪切和粘贴操作，在继续处理之前将`Tire.h`和`Engine.h`的内容插入到`CarParts-Split.m`中。\n\
    \n现在你可以构建并运行`CarParts-Split`，你会发现它的行为与使用`AllWeatherRadials`和`Slant6`的原始版本没有变化：\n\
    \n```\nI am a slant-6\\. VROOOM!\nI am a tire for rain or shine\nI am a tire for\
    \ rain or shine\nI am a tire for rain or shine\nI am a tire for rain or shine\n\
    ```\n\n## 使用跨文件依赖关系\n\n**依赖关系**是两个实体之间的一种关系。在程序设计和开发过程中，依赖关系问题经常出现。依赖关系可以存在于两个类之间：例如，`Slant6`依赖于`Engine`，因为它们之间存在继承关系。如果`Engine`发生更改（例如添加一个新的实例变量），则需要重新编译`Slant6`以适应更改。\n\
    \n依赖关系可以存在于两个或多个文件之间。`CarParts-Split.m`依赖于`Tire.h`和`Engine.h`。如果这些文件中的任何一个发生更改，`CarParts-Split.m`将需要重新编译以获取更改。例如，`Tire.h`可能有一个名为`kDefaultTirePressure`的常量，其值为`30\
    \ psi`。编写`Tire.h`的程序员可能决定将头文件中的默认胎压更改为`40 psi`。现在需要重新编译`CarParts-Split.m`以使用新的值`40`，而不是旧的值`30`。\n\
    \n导入头文件会在头文件和进行导入操作的源文件之间建立强依赖关系。如果头文件发生更改，所有依赖于该头文件的其他文件都必须重新编译。这可能会导致需要重新编译的文件出现级联更改。假设你有100个`.m`文件，它们都包含同一个头文件——我们称之为`UserInterfaceConstants.h`。如果你对`UserInterfaceConstants.h`进行了更改，那么所有100个`.m`文件都将被重新构建，即使你拥有一堆性能强劲、多核`Mac\
    \ Pro`集群，这也可能需要相当长的时间。\n\n由于依赖关系是可传递的，重新编译问题可能会变得更糟：头文件之间可能相互依赖。例如，如果`Thing1.h`导入了`Thing2.h`，而`Thing2.h`又导入了`Thing3.h`，那么对`Thing3.h`的任何更改都将导致导入了`Thing1.h`的文件被重新编译。尽管编译可能需要很长时间，但至少`Xcode`会为你跟踪所有依赖关系。\n\
    \n## 基于“需要知道”原则进行重新编译\n\n但好消息是：`Objective-C`提供了一种方法来限制由依赖关系引起的重新编译的影响。依赖关系问题之所以存在，是因为`Objective-C`编译器需要某些信息才能完成其工作。有时，编译器需要知道关于一个类的所有信息，例如其实例变量布局以及它最终继承自哪些类。但有时，编译器只需要知道类的名称，而不是其完整的定义。"
  raw: 'Xcode creates a new group with the project name and then puts the files into
    folders within that group. (You can see the project’s structure in the Project
    Navigator pane.) These folders (called *groups* by Xcode) provide a way to organize
    the source files in your project. For example, you can make one group for your
    user interface classes and another for your data-manipulation classes to make
    your project easier to navigate. When you set up groups, Xcode doesn’t actually
    move any files or create any directories on your hard drive. The group relationship
    is just a lovely fantasy maintained by Xcode. If you want, you can set up a group
    so that it points to a particular place in the file system. Xcode will then put
    newly created files into that directory for you.


    Once you’ve created the files, you can click them in the list to edit them. Xcode
    helpfully includes some of the standard boilerplate code, stuff you’ll always
    need to have in these files, such as #import <Cocoa/Cocoa.h>, as well as empty
    @interface and @implementation sections for you to fill in.


    **Note**  So far in this book, we’ve had #import <Foundation/Foundation.h> in
    our programs because we’re using only that part of Cocoa. But it’s OK to use #import
    <Cocoa/Cocoa.h> instead. That statement brings in the Foundation framework headers
    for us, along with some other stuff.


    Breaking Apart the Car


    CarParts-Split, found in the *06.01 CarParts-Split* project folder, takes all
    the classes out of the *CarParts-Split.m* file and moves them into their own files.
    Each class lives in its own header (*.h*) and implementation (*.m*) files. Let’s
    see what it takes to create this project ourselves. We’ll start with two classes
    that inherit from NSObject: Tire and Engine. Choose New File, and then pick Objective-C
    Class, and enter the name *Tire*. Do the same with *Engine*. [Figure 6-5](#9781430241881_Ch6.xhtml#_FIG5)
    shows the four new files in the project list.


    ![9781430241881_Fig06-05.tif](images/9781430241881_Fig06-05_fmt.jpg)


    [Figure 6-5](#9781430241881_Ch6.xhtml#FIG5). Tire and Engine added to the project


    Now, cut Tire’s @interface from *CarParts-Split.m*, and paste it into *Tire.h*.
    The file should look like this:


    #import <Cocoa/Cocoa.h>


    @interface Tire : NSObject


    @end // Tire


    Next, we’ll cut the Tire @implementation from *CarParts-Split.m* and paste it
    into *Tire.m*. You’ll also need to add an #import "Tire.h" at the top. This is
    what *Tire.m* should look like:


    #import "Tire.h"


    @implementation Tire


    - (NSString *) description


    {


    return (@"I am a tire. I last a while");


    } // description


    @end // Tire


    The first #import of the file is interesting. It’s not importing the *Cocoa.h*
    or *Foundation.h* header files, as we’ve done before. Instead, it imports the
    header file for the class. This is standard procedure, and you’ll end up doing
    this in virtually every project you create. The compiler needs the layout of instance
    variables in the class so it can generate the proper code, but it doesn’t automatically
    know there is a header file to go along with this source file. So, we need to
    inform the compiler by adding the #import "Tire.h" statement. When compiling,
    if you encounter an error message like “Cannot find interface declaration for
    Tire,” that usually means you forgot to #import the class’s header file.


    Import Center  Notice that there are two different ways of doing imports: with
    quotation marks and with angle brackets. For example, there’s #import <Cocoa/Cocoa.h>
    and #import "Tire.h". The version with angle brackets is used for importing system
    header files. The quoted version indicates a header file that’s local to the project.
    If you see a header file name in angle brackets, it’s read only for your project,
    because it’s owned by the system. When a header file name is in quotes, you know
    that you (or someone else on the project) can make changes to it.


    Now do the same procedure for class Engine. Cut the Engine @interface out of *CarParts-Split*.*m*,
    and paste it into *Engine.h*. *Engine.h* now looks like this:


    #import <Cocoa/Cocoa.h>


    @interface Engine : NSObject


    @end // Engine


    Next, cut the @implementation from Engine, and paste it into *Engine.m*, which
    should now look like the following:


    #import "Engine.h"


    @implementation Engine


    - (NSString *) description


    {


    return (@"I am an engine. Vrooom!");


    } // description


    @end // Engine


    If you try to compile the program now, *CarParts-Split.m* will report errors because
    of the missing declarations of Tire and Engine. Those are pretty easy to fix.
    Just add the following two lines to the top of *CarParts-Split*.m, just after
    the #import <Foundation/Foundation.h> statement:


    #import "Tire.h" #import "Engine.h"


    **Note**  Remember that #import is like #include, a command that’s handled by
    the C preprocessor. In this case, the C preprocessor is essentially just doing
    cut and paste, sticking the contents of *Tire.h* and *Engine.h* into *CarParts-Split.m*
    before continuing.


    You can build and run CarParts-Split now, and you’ll find its behavior unchanged
    from the original version, which is the one that uses AllWeatherRadials and Slant6:


    I am a slant-6\. VROOOM!


    I am a tire for rain or shine


    I am a tire for rain or shine


    I am a tire for rain or shine


    I am a tire for rain or shine


    Using Cross-File Dependencies


    A **dependency** is a relationship between two entities. Issues with dependencies
    pop up frequently during program design and development. Dependencies can exist
    between two classes: for example, Slant6 depends on Engine because of their inheritance
    relationship. If Engine changes, such as by adding a new instance variable, Slant6
    will need to be recompiled to adapt to the change.


    Dependencies can exist between two or more files. *CarParts-Split.m* is dependent
    on *Tire.h* and *Engine.h*. If either of those files change, *CarParts-Split.m*
    will need to be recompiled to pick up the changes. For instance, *Tire.h* might
    have a constant called kDefaultTirePressure with a value of 30 psi. The programmer
    who wrote *Tire.h* might decide that the default tire pressure should be changed
    to 40 psi in the header file. *CarParts-Split.m* now needs to be recompiled to
    use the new value of 40 rather than the old value of 30.


    Importing a header file sets up a strong dependency relationship between the header
    file and the source file that does the importing. If the header file changes,
    all the files dependent on that header file must be recompiled. This can lead
    to a cascade of changes in the files that need to be recompiled. Imagine you have
    a hundred *.m* files, all of which include the same header file—let’s call it
    *UserInterfaceConstants.h*. If you make a change to *UserInterfaceConstants.h*,
    all 100 of the *.m* files will be rebuilt, which can take a significant amount
    of time, even with a cluster of souped-up, zillion-core Mac Pros at your disposal.


    The recompilation issue can get even worse, because dependencies are transitive:
    header files can be dependent on each other. For example, if *Thing1.h* imports
    *Thing2.h*, which in turn imports *Thing3.h*, any change to *Thing3.h* will cause
    files that import *Thing1.h* to be recompiled. Although compilation can take a
    long time, at least Xcode keeps track of all dependencies for you.


    Recompiling on a Need-to-Know Basis


    But there’s good news: Objective-C provides a way to limit the effects of dependency-caused
    recompilations. Dependency issues exist because the Objective-C compiler needs
    certain pieces of information to be able to do its work. Sometimes, the compiler
    needs to know everything about a class, such as its instance variable layout and
    which classes it ultimately inherits from. But sometimes, the compiler needs to
    know only the name of the class, rather than its entire definition.'
  trans: "\n# Xcode 项目文件组织与依赖管理\n\n`Xcode`创建一个以项目名称命名的组，然后将文件放入该组内的文件夹中。（你可以在项目导航面板中看到项目的结构。）这些文件夹（`Xcode`称之为*组*）提供了一种组织项目中源文件的方式。例如，你可以为用户界面类创建一个组，为数据处理类创建另一个组，从而使项目更易于导航。当你设置组时，`Xcode`实际上不会移动任何文件，也不会在硬盘上创建任何目录。组关系只是由`Xcode`维护的一个美好的幻象。如果你愿意，你可以设置一个组，使其指向文件系统中的特定位置。然后，`Xcode`会将新创建的文件放入该目录中。\n\
    \n创建文件后，你可以在列表中点击它们进行编辑。`Xcode`会贴心地包含一些标准的样板代码，即你在这些文件中始终需要的内容，例如`#import <Cocoa/Cocoa.h>`，以及空的`@interface`和`@implementation`部分，供你填充。\n\
    \n**注意**：到目前为止，在本书中，我们在程序中使用的是`#import <Foundation/Foundation.h>`，因为我们只使用了`Cocoa`的那一部分。但使用`#import\
    \ <Cocoa/Cocoa.h>`也是可以的。该语句为我们引入了`Foundation`框架头文件以及其他一些内容。\n\n## 拆分`Car`类\n\n\
    位于`06.01 CarParts-Split`项目文件夹中的`CarParts-Split`，将所有的类从`CarParts-Split.m`文件中取出，并移入它们自己的文件中。每个类位于自己独立的头文件（`.h`）和实现文件（`.m`）中。让我们看看自己创建这个项目需要做些什么。我们将从两个继承自`NSObject`的类开始：`Tire`和`Engine`。选择新建文件，然后选择`Objective-C\
    \ Class`，并输入名称`Tire`。对`Engine`执行相同操作。图 6-5 显示了项目列表中的四个新文件。\n\n![9781430241881_Fig06-05.tif](img/9781430241881_Fig06-05_fmt.jpg)\n\
    \n图 6-5. 向项目中添加`Tire`和`Engine`\n\n现在，将`Tire`的`@interface`从`CarParts-Split.m`中剪切出来，并粘贴到`Tire.h`中。文件应如下所示：\n\
    \n```objectivec\n#import <Cocoa/Cocoa.h>\n\n@interface Tire : NSObject\n\n@end\
    \ // Tire\n```\n\n接下来，我们将`Tire`的`@implementation`从`CarParts-Split.m`中剪切出来，并粘贴到`Tire.m`中。你还需要在顶部添加一个`#import\
    \ \"Tire.h\"`。`Tire.m`应如下所示：\n\n```objectivec\n#import \"Tire.h\"\n\n@implementation\
    \ Tire\n\n- (NSString *) description\n\n{\n\nreturn (@\"I am a tire. I last a\
    \ while\");\n\n} // description\n\n@end // Tire\n```\n\n该文件的第一个`#import`值得注意。它并没有像之前那样导入`Cocoa.h`或`Foundation.h`头文件，而是导入了该类的头文件。这是标准做法，并且你在几乎创建的每个项目中都会这样做。编译器需要知道类中实例变量的布局，以便生成正确的代码，但它不会自动知道存在一个与该源文件对应的头文件。因此，我们需要通过添加`#import\
    \ \"Tire.h\"`语句来告知编译器。在编译时，如果遇到类似“找不到`Tire`的接口声明”的错误信息，通常意味着你忘记导入该类的头文件了。\n\n\
    ### 导入中心\n\n请注意，导入有两种不同的方式：带引号的和带尖括号的。例如，有`#import <Cocoa/Cocoa.h>`和`#import \"\
    Tire.h\"`。带尖括号的版本用于导入系统头文件。带引号的版本表示项目本地的头文件。如果你看到头文件名在尖括号内，则表明它是项目只读的，因为它属于系统。当头文件名在引号中时，你知道你（或项目中的其他人）可以对其进行修改。\n\
    \n现在对`Engine`类执行相同的过程。将`Engine`的`@interface`从`CarParts-Split.m`中剪切出来，并粘贴到`Engine.h`中。`Engine.h`现在看起来像这样：\n\
    \n```objectivec\n#import <Cocoa/Cocoa.h>\n\n@interface Engine : NSObject\n\n@end\
    \ // Engine\n```\n\n接下来，将`Engine`的`@implementation`剪切出来，并粘贴到`Engine.m`中，现在应如下所示：\n\
    \n```objectivec\n#import \"Engine.h\"\n\n@implementation Engine\n\n- (NSString\
    \ *) description\n\n{\n\nreturn (@\"I am an engine. Vrooom!\");\n\n} // description\n\
    \n@end // Engine\n```\n\n如果你现在尝试编译程序，`CarParts-Split.m`会报错，因为缺少对`Tire`和`Engine`的声明。修复这些问题相当简单。只需在`CarParts-Split.m`的顶部，紧跟在`#import\
    \ <Foundation/Foundation.h>`语句之后，添加以下两行：\n\n```objectivec\n#import \"Tire.h\"\
    \ \n#import \"Engine.h\"\n```\n\n**注意**：请记住，`#import`类似于`#include`，是一个由`C`预处理器处理的命令。在这种情况下，`C`预处理器实际上只是进行剪切和粘贴操作，在继续处理之前将`Tire.h`和`Engine.h`的内容插入到`CarParts-Split.m`中。\n\
    \n现在你可以构建并运行`CarParts-Split`，你会发现它的行为与使用`AllWeatherRadials`和`Slant6`的原始版本没有变化：\n\
    \n```\nI am a slant-6\\. VROOOM!\nI am a tire for rain or shine\nI am a tire for\
    \ rain or shine\nI am a tire for rain or shine\nI am a tire for rain or shine\n\
    ```\n\n## 使用跨文件依赖关系\n\n**依赖关系**是两个实体之间的一种关系。在程序设计和开发过程中，依赖关系问题经常出现。依赖关系可以存在于两个类之间：例如，`Slant6`依赖于`Engine`，因为它们之间存在继承关系。如果`Engine`发生更改（例如添加一个新的实例变量），则需要重新编译`Slant6`以适应更改。\n\
    \n依赖关系可以存在于两个或多个文件之间。`CarParts-Split.m`依赖于`Tire.h`和`Engine.h`。如果这些文件中的任何一个发生更改，`CarParts-Split.m`将需要重新编译以获取更改。例如，`Tire.h`可能有一个名为`kDefaultTirePressure`的常量，其值为`30\
    \ psi`。编写`Tire.h`的程序员可能决定将头文件中的默认胎压更改为`40 psi`。现在需要重新编译`CarParts-Split.m`以使用新的值`40`，而不是旧的值`30`。\n\
    \n导入头文件会在头文件和进行导入操作的源文件之间建立强依赖关系。如果头文件发生更改，所有依赖于该头文件的其他文件都必须重新编译。这可能会导致需要重新编译的文件出现级联更改。假设你有\
    \ 100 个`.m`文件，它们都包含同一个头文件——我们称之为`UserInterfaceConstants.h`。如果你对`UserInterfaceConstants.h`进行了更改，那么所有\
    \ 100 个`.m`文件都将被重新构建，即使你拥有一堆性能强劲、多核`Mac Pro`集群，这也可能需要相当长的时间。\n\n由于依赖关系是可传递的，重新编译问题可能会变得更糟：头文件之间可能相互依赖。例如，如果`Thing1.h`导入了`Thing2.h`，而`Thing2.h`又导入了`Thing3.h`，那么对`Thing3.h`的任何更改都将导致导入了`Thing1.h`的文件被重新编译。尽管编译可能需要很长时间，但至少`Xcode`会为你跟踪所有依赖关系。\n\
    \n## 基于“需要知道”原则进行重新编译\n\n但好消息是：`Objective-C`提供了一种方法来限制由依赖关系引起的重新编译的影响。依赖关系问题之所以存在，是因为`Objective-C`编译器需要某些信息才能完成其工作。有时，编译器需要知道关于一个类的所有信息，例如其实例变量布局以及它最终继承自哪些类。但有时，编译器只需要知道类的名称，而不是其完整的定义。\n"
- fmt: "例如，当对象被组合时（如前一章所见），组合使用指向对象的指针。这之所以可行，是因为所有 Objective-C 对象都使用动态分配的内存。编译器只需要知道某个特定项是一个类，然后它就知道该实例变量是一个指针的大小，在整个程序中这个大小始终相同。\n\
    \nObjective-C 引入了`@class`关键字，作为一种告诉编译器“这是一个类，因此我只通过指针来引用它”的方式。这能让编译器放心：它不需要了解更多关于这个类的信息，只需知道它是通过指针引用的东西即可。\n\
    \n在将`Car`类移入其自己的文件时，我们将使用`@class`。继续用 Xcode 创建`Car.h`和`Car.m`文件，就像你之前处理`Tire`和`Engine`一样。将`Car`的`@interface`复制并粘贴到`Car.h`中，现在它看起来像这样：\n\
    \n```\n#import <Cocoa/Cocoa.h>\n\n@interface Car : NSObject\n\n- (void) setEngine:\
    \ (Engine *) newEngine;\n\n- (Engine *) engine;\n\n- (void) setTire: (Tire *)\
    \ tire\natIndex: (int) index;\n\n- (Tire *) tireAtIndex: (int) index;\n\n- (void)\
    \ print;\n\n@end // Car\n```\n\n如果现在尝试使用这个头文件，编译器会报错，指出它不理解`Tire`或`Engine`是什么。错误信息很可能是`error:\
    \ expected a type \"Tire\"`，这是编译器在说“我不明白这个。”\n\n我们有两种选择来修复这个错误。第一种是直接`#import\
    \ \"Tire.h\"`和`\"Engine.h\"`，这会给编译器提供关于这两个类的大量信息。\n\n但还有一种更好的方法。如果你仔细查看`Car`的接口，会发现它只通过指针引用`Tire`和`Engine`。这正是`@class`的用武之地。下面是添加了`@class`行之后的`Car.h`：\n\
    \n```\n#import <Cocoa/Cocoa.h>\n\n@class Tire;\n\n@class Engine;\n\n@interface\
    \ Car : NSObject\n\n- (void) setEngine: (Engine *) newEngine;\n\n- (Engine *)\
    \ engine;\n\n- (void) setTire: (Tire *) tire\natIndex: (int) index;\n\n- (Tire\
    \ *) tireAtIndex: (int) index;\n\n- (void) print;\n\n@end // Car\n```\n\n这些信息足以告诉编译器处理`Car`的`@interface`所需的一切。\n\
    \n**注意**：`@class`设置了一个前向引用。这是一种告诉编译器的方式：“相信我，你最终会了解这个类是什么，但现在，你只需要知道这些。”\n\n`@class`在存在循环依赖时也很有用。也就是说，类\
    \ A 使用类 B，并且类 B 也使用类 A。如果试图让每个类都`#import`另一个类，最终会出现编译错误。但如果在`A.h`中使用`@class B`，并在`B.h`中使用`@class\
    \ A`，那么这两个类可以愉快地相互引用。\n\n让`Car`跑起来\n\n这解决了`Car`的头文件问题。但`Car.m`需要关于`Tire`和`Engine`的更多信息。编译器必须看到`Tire`和`Engine`继承自哪些类，以便进行一些检查，确保这些对象能够响应发送给它们的消息。为此，我们将在`Car.m`中导入`Tire.h`和`Engine.h`。我们还需要将`Car`的`@implementation`从`CarParts-Split.m`中剪切出来。现在`Car.m`看起来像这样：\n\
    \n```\n#import \"Car.h\"\n\n#import \"Tire.h\"\n\n#import \"Engine.h\"\n\n@implementation\
    \ Car {\n    Tire *tires[4];\n    Engine *engine;\n}\n\n- (void) setEngine: (Engine\
    \ *) newEngine\n{\n    engine = newEngine;\n} // setEngine\n\n- (Engine *) engine\n\
    {\n    return (engine);\n} // engine\n\n- (void) setTire: (Tire *) tire\natIndex:\
    \ (int) index\n{\n    if (index < 0 || index > 3) {\n        NSLog (@\"bad index\
    \ (%d) in setTire:atIndex:\",\n               index);\n        exit (1);\n   \
    \ }\n    tires[index] = tire;\n} // setTire:atIndex:\n\n- (Tire *) tireAtIndex:\
    \ (int) index\n{\n    if (index < 0 || index > 3) {\n        NSLog (@\"bad index\
    \ (%d) in setTire:atIndex:\",\n               index);\n        exit (1);\n   \
    \ }\n    return (tires[index]);\n} // tireAtIndex:\n\n- (void) print\n{\n    NSLog\
    \ (@\"%@\", tires[0]);\n    NSLog (@\"%@\", tires[1]);\n    NSLog (@\"%@\", tires[2]);\n\
    \    NSLog (@\"%@\", tires[3]);\n    NSLog (@\"%@\", engine);\n} // print\n\n\
    @end // Car\n```\n\n你可以再次构建并运行程序，得到与之前相同的输出。没错，我们又在重构了（嘘，别告诉任何人）。我们一直在改进程序的内部结构，同时保持其行为不变。"
  raw: 'For example, when objects are composed (as you saw in the preceding chapter),
    the composition uses pointers to objects. This works because all Objective-C objects
    use dynamically allocated memory. The compiler needs to know only that a particular
    item is a class. It then knows that the instance variable is the size of a pointer,
    which is always the same for the whole program.


    Objective-C introduces the @class keyword as a way to tell the compiler, “This
    thing is a class, and therefore I’m only going to refer to it via a pointer.”
    This calms the compiler down: it doesn’t need to know more about the class, just
    that it’s something referred to by a pointer.


    We’ll use @class while moving class Car into its own file. Go ahead and make the
    *Car.h* and *Car.m* files with Xcode, just as you did with Tire and Engine. Copy
    and paste the @interface for Car into *Car.h*, which now looks like this:


    #import <Cocoa/Cocoa.h>


    @interface Car : NSObject


    - (void) setEngine: (Engine *) newEngine;


    - (Engine *) engine;


    - (void) setTire: (Tire *) tire


    atIndex: (int) index;


    - (Tire *) tireAtIndex: (int) index;


    - (void) print;


    @end // Car


    If we now try using this header file, we’ll get errors from the compiler stating
    that it doesn’t understand what Tire or Engine is. The message will most likely
    be error: expected a type "Tire", which is compiler-speak for “I don’t understand
    this.”


    We have two choices for how to fix this error. The first is to just #import *Tire.h*
    and *Engine.h*, which will give the compiler oodles of information about these
    two classes.


    But there’s a better way. If you look carefully at the interface for Car, you’ll
    see that it only refers to Tire and Engine by pointer. This is a job for @class.
    Here is what *Car.h* looks like with the

    @class lines added:


    #import <Cocoa/Cocoa.h>


    @class Tire;


    @class Engine;


    @interface Car : NSObject


    - (void) setEngine: (Engine *) newEngine;


    - (Engine *) engine;


    - (void) setTire: (Tire *) tire


    atIndex: (int) index;


    - (Tire *) tireAtIndex: (int) index;


    - (void) print;


    @end // Car


    That’s enough information to tell the compiler everything it needs to know to
    handle the @interface for Car.


    **Note**  @class sets up a forward reference. This is a way to tell the compiler,
    “Trust me; you’ll learn eventually what this class is, but for now, this is all
    you need to know.”


    @class is also useful if you have a circular dependency. That is, class A uses
    class B, and class B uses class A. If you try having each class #import the other,
    you’ll end up with compilation errors. But if you use @class B in *A.h* and @class
    A in *B.h*, the two classes can refer to each other happily.


    Making the Car Go


    That takes care of Car’s header file. But *Car.m* needs more information about
    Tires and Engines. The compiler has to see which classes Tire and Engine inherit
    from, so it can do some checking to make sure the objects can respond to messages
    sent to them. To do this, we’ll import *Tire.h* and *Engine.h* in *Car.m*. We
    also need to cut the @implementation for Car out of *CarParts-Split.m*. *Car.m*
    now looks like this:


    #import "Car.h"


    #import "Tire.h"


    #import "Engine.h"


    @implementation Car {


    Tire *tires[4];


    Engine *engine;


    }


    - (void) setEngine: (Engine *) newEngine


    {


    engine = newEngine;


    } // setEngine


    - (Engine *) engine


    {


    return (engine);


    } // engine


    - (void) setTire: (Tire *) tire


    atIndex: (int) index


    {


    if (index < 0 || index > 3) {


    NSLog (@"bad index (%d) in setTire:atIndex:",


    index);


    exit (1);


    }


    tires[index] = tire;


    } // setTire:atIndex:


    - (Tire *) tireAtIndex: (int) index


    {


    if (index < 0 || index > 3) {


    NSLog (@"bad index (%d) in setTire:atIndex:",


    index);


    exit (1);


    }


    return (tires[index]);


    } // tireAtIndex:


    - (void) print


    {


    NSLog (@"%@", tires[0]);


    NSLog (@"%@", tires[1]);


    NSLog (@"%@", tires[2]);


    NSLog (@"%@", tires[3]);


    NSLog (@"%@", engine);


    } // print


    @end // Car


    You can build and run the program again and get the same output as before. Yep,
    we’re refactoring again (shh, don’t tell anybody). We’ve been improving the internal
    structure of our program while keeping its behavior the same.'
