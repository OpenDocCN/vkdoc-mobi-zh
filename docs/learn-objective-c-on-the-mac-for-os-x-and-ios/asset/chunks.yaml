    Object Initialization


    So far, we’ve created new objects in two different ways. The first way is [SomeClass
    new], and the second is [[SomeClass alloc] init]. These two techniques are equivalent,
    but the common Cocoa convention is to use alloc and init rather than new. Typically,
    Cocoa programmers use new as training wheels until they have enough background
    to be comfortable with alloc and init. It’s time for your training wheels to come
    off.


    Allocating Objects


    **Allocation** is the process by which a new object is born. It’s the happy time
    when a chunk of memory is obtained from the operating system and designated as
    the location that will hold the object’s instance variables. Sending the alloc
    message to a class causes that class to allocate a chunk of memory large enough
    to hold all its instance variables. alloc also conveniently initializes all the
    memory to 0\. That way, you don’t have the problem of uninitialized memory causing
    all sorts of random bugs that afflicts many languages. All your BOOLs start out
    as NO; all your ints are 0; all your floats become 0.0; all your pointers are
    nil; and all your base are belong to us (sorry, couldn’t resist).


    A newly allocated object isn’t ready to be used right away: you need to initialize
    it before you can work with it. Some languages, including C++ and Java, perform
    object allocation and initialization in a single operation using a constructor.
    Objective-C splits the two operations into explicit allocation and initialization
    stages. A common beginner’s error is to use only the alloc operation, like this:


    Car *car = [Car alloc];


    This might work, but without the initialization, you can get some strange behavior
    (also known as “bugs”) later on. The rest of this chapter is all about the vital
    concept of initialization.


    Initializing Objects


