    \ *) service moreComing:(BOOL) moreComing`  \n{  \n    `[service resolveWithTimeout:\
    \ 10]`;  \n    `NSLog (@\"lost one! Name is %@\", [service name])`;  \n}  \n\n\
    这段代码与`didFindService`方法完全相同，只是当某个服务不再可用时，它会记录日志。\n\n现在运行程序，看看会发生什么。Waqar 的网络中有一台名为\
    \ `Waqar Malik’s Home Library` 的古老 Mac mini，它在家中共享 iTunes 音乐。这会生成以下输出：\n\n```\
    \  \nbegun browsing  \nfound one! Name is Waqar Malik’s Home Library  \n```  \n\
    \n我们在笔记本电脑上启动 iTunes，并以库名称 `indigo` 共享音乐：\n\n```  \nfound one! Name is indigo\
    \  \n```  \n\n在笔记本电脑上退出 iTunes 后，`ITunesFinder` 会告诉我们：\n\n```  \nlost one! Name\
    \ is indigo  \n```  \n\n## 委托与分类  \n\n那么，这个委托机制和分类有什么关系呢？委托凸显了分类的另一个用途：可以发送给委托的方法，被声明为\
    \ `NSObject` 上的一个分类。以下是 `NSNetService` 委托方法的部分声明：\n\n```  \n@interface NSObject\
    \ (NSNetServiceBrowserDelegateMethods)  \n\n- (void) `netServiceBrowserWillSearch:(NSNetServiceBrowser\
    \ *) browser`;  \n- (void) `netServiceBrowser:(NSNetServiceBrowser *) aNetServiceBrowser\
    \ didFindService:(NSNetService *) service moreComing:(BOOL) moreComing`;  \n-\
    \ (void) `netServiceBrowserDidStopSearch:(NSNetServiceBrowser *) browser`;  \n\
    - (void) `netServiceBrowser:(NSNetServiceBrowser *) browser didRemoveService:(NSNetService\
    \ *) service moreComing:(BOOL) moreComing`;  \n\n@end  \n```  \n\n通过将这些方法声明为 `NSObject`\
    \ 的一个分类，`NSNetServiceBrowser` 的实现可以将这些消息发送给*任意*对象，无论该对象实际属于哪个类。这也意味着，只要实现了相应的方法，任何类型的对象都可以成为委托。\n\
    \n**注意：** 像这样在 `NSObject` 上放置分类后，任何类型的对象都可以用作委托对象。无需继承自专门的 `serviceBrowserDelegate`\
    \ 类（就像在 C++ 中那样），也无需遵循特定的接口（就像在 Java 中那样）。\n\n在 `NSObject` 上放置分类被称为创建**非正式协议**。如你所知，计算机术语中的“协议”是一组管理通信的规则。非正式协议只是一种表达方式，相当于说：“这里有一些你可能想要实现的方法，这样你就可以用它们做一些酷炫的事情。”在\
    \ `NSNetServiceBrowserDelegateMethods` 非正式协议中声明的一些方法，我们并未在 `ITunesFinder` 中实现。这没问题。对于非正式协议，你可以只实现你想用的方法。\n\
    \n你可能已经猜到，还存在正式协议的概念。我们将在下一章中介绍。\n\n## 响应选择器  \n\n你可能会问自己：“`NSNetServiceBrowser`\
    \ 怎么知道它的委托能否处理发送给它的那些消息呢？”你可能遇到过当尝试发送一个对象无法理解的消息时，出现的 Objective-C 运行时错误：\n\n```\
    \  \n-[ITunesFinder addSnack:]: selector not recognized  \n```  \n\n那么 `NSNetServiceBrowser`\
    \ 是如何避免这个问题的呢？它并没有避开。`NSNetServiceBrowser` 会先向对象询问：“你能响应这个选择器吗？”如果可以，它才会发送这条消息。\n\
    \n什么是**选择器**？它只是方法的名称，但以一种特殊方式编码，供 Objective-C 运行时用于快速查找。你可以使用编译器指令 `@selector()`\
    \ 来指定一个选择器，并将方法名称放在括号内。例如，`Car` 的 `setEngine:` 方法的选择器是：\n\n```  \n@selector(setEngine:)\
    \  \n```  \n\n而 `Car` 的 `setTire:atIndex:` 方法的选择器则是：\n\n```  \n@selector(setTire:atIndex:)\
    \  \n```  \n\n`NSObject` 提供了一个名为 `respondsToSelector:` 的方法，用于查询对象是否能响应给定的消息。以下代码片段使用了\
    \ `respondsToSelector:`：\n\n```  \nCar *car = [[Car alloc] init];  \n```  \n"
- fmt: "# 代码示例与选择器\n\n```\nif ([car respondsToSelector: @selector(setEngine:)])\n\
    {\n    NSLog (@\"yowza!\");\n}\n```\n这段代码会打印“yowza!”，因为`Car`对象确实响应`setEngine:`消息。\n\
    \n现在来看另一段代码：\n```\nITunesFinder *finder = [[ITunesFinder alloc] init];\nif ([finder\
    \ respondsToSelector:@selector(setEngine:)])\n{\n    NSLog (@\"yowza!\");\n}\n\
    ```\n这次不会出现“yowza!”。`ITunesFinder`没有`setEngine:`方法。\n\n为了获取所需信息，`NSNetServiceBrowser`会调用`respondsToSelector:@selector(netServiceBrowser:didFindService:moreComing:)`。如果委托能够响应这条消息，浏览器就会发送该消息；否则，浏览器暂时忽略该委托，继续正常运行。\n\
    \n## 选择器的其他用途\n\n选择器可以被传递，用作方法的参数，甚至存储为实例变量。这可以带来非常强大和灵活的构造。\n\nFoundation框架中的`NSTimer`类可以重复向对象发送消息，这在游戏中非常有用——例如，当你希望怪物定期向玩家移动时。创建新的`NSTimer`对象时，你需要指定它要发送消息的目标对象，以及一个选择器来指明要调用的方法。例如，你可以让一个计时器调用游戏引擎的`moveMonsterTowardPlayer:`方法，或者让另一个计时器调用`animateOneFrame:`方法。\n\
    \n## 本章小结\n\n本章介绍了分类（categories）。分类提供了一种向现有类添加新方法的方式，即使你没有这些类的源代码。\n\n除了向现有类添加功能外，分类还允许将对象的实现分散到多个源文件甚至多个框架中。例如，回想一下`NSString`的数据处理方法：这些方法实现在Foundation框架中，与UIKit和AppKit中的绘图方法分离。\n\
    \n分类允许你声明非正式协议（informal protocols）。非正式协议是`NSObject`上的一个分类，列出了对象可能能够响应的方法。非正式协议用于实现委托（delegation）——一种让你轻松定制对象行为的技术。在此过程中，你还学习了选择器（selectors），它们是在代码中指示特定Objective-C消息的一种方式。\n\
    \n接下来是Objective-C的正式协议（formal protocols），它们是非正式协议的“升级版”。\n\n---\n\n# 第13章 协议\n\
    \n在上一章中，我们讨论了分类和非正式协议的神奇之处。使用非正式协议时，如[第12章](#9781430241881_Ch12.xhtml)所示，你只需实现想要响应的方法。对于[第12章](#9781430241881_Ch12.xhtml)中的`NSNetServiceBrowser`委托，我们仅实现了在网络中添加或移除新服务时调用的两个方法，而不必实现`NSNetServiceBrowserDelegate`非正式协议中的其他六个方法。我们也没有在对象中声明任何内容来表明自己可以用作`NSNetServiceBrowser`的委托。一切都以最小的工作量正常运行。\n\
    \n你可能已经猜到，Objective-C和Cocoa还包含了正式协议的概念。在本章中，我们将探讨其工作原理。\n\n## 正式协议\n\n**正式协议**（类似于非正式协议）是一个带名称的方法和属性列表。然而，正式协议要求你显式地采纳它。你通过在类的`@interface`声明中列出协议名称来**采纳**（adopt）该协议。完成这一操作后，你的类就被称为**遵循**（conform）该协议（你可能以为自己是非遵循者）。采纳协议意味着你承诺实现该协议的所有方法。如果你没有这样做，编译器会生成警告。\n\
    \n> **注意**：正式协议类似于Java接口。事实上，Objective-C的协议是Java接口的灵感来源。\n\n为什么要创建或采纳正式协议？听起来需要实现每个方法，工作量很大。根据协议的不同，可能还涉及一些繁琐的工作。但通常情况下，协议只有少量方法需要实现，而且无论如何你都必须全部实现才能获得有用的功能集，因此正式协议的要求通常不会成为负担。Objective-C\
    \ 2.0增加了一些很好的特性，使得使用协议远没有那么繁重，我们将在本章末尾讨论这些内容。\n\n## 声明协议\n\n让我们看看Cocoa声明的一个协议——`NSCopying`。如果你采纳了`NSCopying`，你的对象就知道如何复制自身：\n\
    \n```\n@protocol NSCopying\n- (id) copyWithZone: (NSZone *) zone;\n@end\n```\n\
    \n该语法看起来与声明类或分类的语法类似。这里使用`@protocol`而不是`@interface`来告诉编译器：“我将展示一个新正式协议的样子。”该语句后面跟着协议名称。协议名称必须是唯一的。\n\
    \n你也可以拥有父协议，类似于父类。要指定父协议，请在协议名称后的尖括号中声明它。\n\n```\n@protocol MySuperDuberProtocol\
    \ <MyParentProtocol>\n@end\n```\n\n上述代码表示`MySuperDuperProtocol`扩展了`MyParentProtocol`，因此你必须同时满足两个协议中所有必需方法的实现。你始终可以将`NSObject`用作根协议。不要将其与`NSObject`类混淆。`NSObject`类遵循`NSObject`协议，这意味着所有对象都遵循`NSObject`协议。建议将`NSObject`协议作为你正在定义的协议的父协议。\n\
    \n接下来是一个方法声明列表，每个协议采纳者都必须实现这些方法。协议声明以`@end`结束。协议不引入任何实例变量。\n\n让我们看另一个例子，这是来自Cocoa的`NSCoding`协议：\n\
    \n```\n@protocol NSCoding\n- (void) encodeWithCoder: (NSCoder *) encoder;\n- (id)\
    \ initWithCoder: (NSCoder *) decoder;\n@end\n```\n\n当一个类采纳`NSCoding`时，该类承诺实现这两个消息。`encodeWithCoder:`用于将对象的实例变量“冻干”到`NSCoder`对象中。`initWithCoder:`从`NSCoder`中提取冻干的实例变量，并用它们初始化一个新对象。这两个方法总是成对实现：如果你永远不会将编码的对象恢复为新对象，那么编码就没有意义；如果你从不编码对象，你就没有任何东西可以用来创建新对象。\n\
    \n## 采纳协议\n\n要采纳协议，你需要在类声明中用尖括号列出该协议。例如，如果`Car`采纳了`NSCopying`，声明如下：\n\n```\n@interface\
    \ Car : NSObject <NSCopying>\n{\n    // 实例变量\n}\n// 方法\n@end // Car\n```\n\n如果`Car`同时采纳了`NSCopying`和`NSCoding`，声明如下：\n\
    \n```\n@interface Car : NSObject <NSCopying, NSCoding>\n{\n    // 实例变量\n}\n//\
    \ 方法\n@end // Car\n```\n\n你可以按任意顺序列出协议，顺序无关紧要。\n\n当你采纳一个协议时，你是在向阅读类声明的程序员传达信息：该类的对象可以做两件非常重要的事情——它们可以编码/解码自身，也可以复制自身。\n\
    \n## 实现协议\n\n关于协议需要了解的内容大致就是这些（除了声明变量时的一些语法细节，我们稍后会讨论）。本章的大部分内容将用于实践，我们将通过练习为`CarParts`采纳`NSCopying`协议。\n\
    \n### Car-bon 副本"
  raw: 'if ([car respondsToSelector: @selector(setEngine:)])


    {


    NSLog (@"yowza!");


    }


    This code prints “yowza!”, because a Car object does indeed respond to the setEngine:
    message.


    Now, check out this block of code:


    ITunesFinder *finder = [[ITunesFinder alloc] init];


    if ([finder respondsToSelector:@selector(setEngine:)])


    {


    NSLog (@"yowza!");


    }


    There will be no “yowza!” this time. ITunesFinder does not have a setEngine: method.


    To find out what it needs to know, NSNetServiceBrowser would call respondsToSelector:@selector(netServiceBrowser:didFindService:moreComing:).
    If the delegate can respond to that message, the browser will send the message.
    Otherwise, the browser ignores that delegate for now and just goes on its merry
    way.


    Other Uses for Selectors


    Selectors can be passed around and used as arguments to methods and even stored
    as instance variables. This can lead to some very powerful and flexible constructs.


    One of the classes in the Foundation framework is called NSTimer; it can send
    a message to an object repeatedly, which is very handy in games when you want
    to move a monster toward the player on a regular basis. When you make a new NSTimer
    object, you give it the object you want it to send a message to and a selector
    saying which method you want it to call. For example, you could have a timer call
    the moveMonsterTowardPlayer: method of your game engine. Or, you could have another
    timer call an animateOneFrame: method.


    Summary


    We introduced you to categories in this chapter. Categories provide a way to add
    new methods to existing classes, even if you don’t have the source code for those
    classes.


    In addition to adding functionality to existing classes, categories provide a
    way to split an object’s implementation across multiple source files or even across
    multiple frameworks. For example, think back to NSString’s data-handling methods,
    which are implemented in the Foundation framework, separate from its drawing methods
    in UIKit and AppKit.


    Categories let you declare informal protocols. An informal protocol is a category
    on NSObject that lists methods that objects might be able to respond to. Informal
    protocols are used to implement delegation, a technique that allows you to easily
    customize the behavior of an object. Along the way, you also learned about selectors,
    which are a way to indicate a particular Objective-C message in your code.


    Coming up next are Objective-C protocols, the formal protocols that are the dressed-up
    cousins of informal protocols.


    Chapter 13


    Protocols


    In the previous chapter, we talked about the magic of categories and informal
    protocols. When you use an informal protocol, as you saw in [Chapter 12](#9781430241881_Ch12.xhtml),
    you implement only the methods you want to respond to. For the NSNetServiceBrowser
    delegate in [Chapter 12](#9781430241881_Ch12.xhtml), we implemented only the two
    methods that are called when a new service is added to or removed from the network:
    we didn’t have to implement the six other methods in the NSNetServiceBrowserDelegate
    informal protocol. We also didn’t have to declare anything in our object saying
    that we’re usable as an NSNetServiceBrowser delegate. It all just worked with
    a minimum of fuss.


    As you might guess, Objective-C and Cocoa also include the concept of a formal
    protocol, and in this chapter, we’ll take a look at how those work.


    Formal Protocols


    A **formal protocol** (like an informal protocol) is a named list of methods and
    properties. However, a formal protocol requires that you explicitly adopt it.
    You **adopt** a protocol by listing the protocol’s name in your class’s @interface
    declaration. When you do this, your class is said to **conform** to the protocol
    (and you thought you were a nonconformist). Adopting a protocol means that you
    promise to implement all the methods of that protocol. If you don’t, the compiler
    yells at you by generating a warning.


    **Note**  Formal protocols are just like Java interfaces. In fact, Objective-C
    protocols were the inspiration for Java’s interfaces.


    Why would you want to create or adopt a formal protocol? It sounds like a lot
    of work is required to implement every method. Depending on the protocol, some
    busywork may even be involved. But, more often than not, a protocol has only a
    small number of methods to implement, and you have to implement them all to gain
    a useful set of functionality anyway, so the formal protocol requirements are
    generally not a burden. Objective-C 2.0 has added some nice features that make
    using protocols much less onerous, which we’ll talk about at the end of this chapter.


    Declaring Protocols


    Let’s take a look at a protocol declared by Cocoa, NSCopying. If you adopt NSCopying,
    your object knows how to make copies of itself:


    @protocol NSCopying


    - (id) copyWithZone: (NSZone *) zone;


    @end


    The syntax looks kind of the same as the syntax for declaring a class or a category.
    Rather than using @interface, you use @protocol to tell the compiler, “I’m about
    to show you what a new formal protocol will look like.” That statement is followed
    by the protocol name. Protocol names must be unique.


    You can also can have parent protocols, similar to parent classes. To specify
    the parent protocol, declare it in angle brackets after the name of the protocol.


    @protocol MySuperDuberProtocol <MyParentProtocol>


    @end


    The preceding lines mean that MySuperDuperProtocol extends MyParentProtocol, so
    you have to satisfy the method implementation of all the required methods in both
    protocols. You can always use NSObject as the root protocol. Don’t confuse that
    with the NSObject class. The NSObject class conforms to NSObject protocol, which
    means that all objects conform to the NSObject protocol. It’s a good idea to have
    the NSObject protocol as the parent of the protocol you’re defining.


    Next is a list of method declarations, which every protocol adopter must implement.
    The protocol declaration finishes with @end. No instance variables are introduced
    with a protocol.


    Let’s look at another example. Here’s the NSCoding protocol from Cocoa:


    @protocol NSCoding


    - (void) encodeWithCoder: (NSCoder *) encoder;


    - (id) initWithCoder: (NSCoder *) decoder;


    @end


    When a class adopts NSCoding, that class promises to implement both of these messages.
    encodeWithCoder: is used to take an object’s instance variables and freeze-dry
    them into an NSCoder object. initWithCoder: extracts freeze-dried instance variables
    from an NSCoder and uses them to initialize a new object. These are always implemented
    as a pair; there’s no point in encoding an object if you’ll never revive it into
    a new one, and if you never encode an object, you won’t have anything to use to
    create a new one.


    Adopting a Protocol


    To adopt a protocol, you list the protocol in the class declaration, surrounded
    by angle brackets. For example, if Car adopts NSCopying, the declaration looks
    like this:


    @interface Car : NSObject <NSCopying>


    {


    // instance variables


    }


    // methods


    @end // Car


    And if Car adopts both NSCopying and NSCoding, the declaration goes like this:


    @interface Car : NSObject <NSCopying, NSCoding>


    {


    // instance variables


    }


    // methods


    @end // Car


    You can list the protocols in any order; it makes no difference.


    When you adopt a protocol, you’re sending a message to programmers reading the
    class declaration, saying that objects of this class can do two very important
    things: they can encode/decode themselves and copy themselves.


    Implementing a Protocol


    That’s about all there is to know regarding protocols (save a little syntactic
    detail when declaring variables that we’ll discuss later). We’ll spend the bulk
    of this chapter going through the exercise of adopting the NSCopying protocol
    for CarParts.


