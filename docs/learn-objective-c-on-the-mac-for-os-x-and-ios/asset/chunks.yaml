    We have a button for changing text to uppercase. We also need one for the opposite
    function. Drag another round rectangular button to the view, and put it under
    the first one. Adjust its size so it looks like its fellow button, and name it
    LowerCase, as shown in [Figure 15-12](#9781430241881_Ch15.xhtml#_FIG12). (Here’s
    a shortcut tip: you can also create the second button by selecting the first one
    and then choosing Edit ![image](images/9781430241881_arrow_fmt.jpg) Duplicate,
    or just pressing ![image](images/Rangoli1.jpg) +D.)


    ![9781430241881_Fig15-12.tif](images/9781430241881_Fig15-12_fmt.jpg)


    [Figure 15-12](#9781430241881_Ch15.xhtml#FIG12). Putting the second button into
    place


    Of course, you don’t have to lay out your view the way we have. You can adjust
    the size and position of the objects however you want, so feel free to go crazy.
    Our complete view layout looks like [Figure 15-13](#9781430241881_Ch15.xhtml#_FIG13).


    ![9781430241881_Fig15-13.tif](images/9781430241881_Fig15-13_fmt.jpg)


    [Figure 15-13](#9781430241881_Ch15.xhtml#FIG13). The view, fully laid out


    Now that we have the view just as we want it, it’s time for the fun of connecting
    outlets and actions. On the right side of the toolbar, click the middle button
    of the Editor group to open the assistant, or press ![image](images/Rangoli1.jpg) +option+return
    on the keyboard if you prefer shortcuts. Arrange the nib file and the header file
    MCSViewController.h so it’s easy to drag and connect between them. Remember the
    control-drag fun we had back in [Chapter 14](#9781430241881_Ch14.xhtml)? Let’s
    do that again. Control-drag from the text field in the view and toward the header
    file (see [Figure 15-14](#9781430241881_Ch15.xhtml#_FIG14)).


    ![9781430241881_Fig15-14.tif](images/9781430241881_Fig15-14_fmt.jpg)


    [Figure 15-14](#9781430241881_Ch15.xhtml#FIG14). Control-drag to make the first
    connection


    Drop the line you’re dragging between the @interface and @end in the header file
    (also in [Figure 15-14](#9781430241881_Ch15.xhtml#_FIG14)). Xcode pops up a groovy
    little window (see [Figure 15-15](#9781430241881_Ch15.xhtml#_FIG15)).


    ![9781430241881_Fig15-15.tif](images/9781430241881_Fig15-15_fmt.jpg)


    [Figure 15-15](#9781430241881_Ch15.xhtml#FIG15). This appears when you create
    a new connection


    The window in [Figure 15-15](#9781430241881_Ch15.xhtml#_FIG15) asks you to enter
    the name of the outlet. But before we do that, notice that next to Object are
    the words “File’s Owner.” What is that? Well, when you load a nib file, it’s owned
    by a controller. When the template created the nib file and the controller file,
    it made our controller the nib file’s owner. If you need to, you can change the
    nib file’s owner by selecting File’s Owner from the nib file and changing its
    class. But for now, we’ll leave it as it is.


    Now we’re ready to name the outlet. Type **textField***,* and click Connect.'
  trans: "\n浏览文件列表，我们会看到应用委托（application delegate）的相关文件，此外还有一个类文件以及两个 nib 文件，分别对应\
    \ iPhone 和 iPad。（如果在创建项目时未选择*通用（Universal）*，则只会得到其中一种文件。）\n\n接下来深入研究应用委托的头文件。首先看到的是我们信赖的\
    \ `#import`，你可能还记得，早在第 14 章中我们就接触过它。iOS 的界面元素以 `UI` 为前缀，因为我们使用的是 `UIKit` 而非 `AppKit`。此外还有\
    \ `Foundation` 框架，它在 iOS 上的工作方式与在 OS X 上相同。因此，像 `NSString` 这样的类是可用的，并且其行为与在 OS\
    \ X 中一致。\n\n```objectivec\n#import <UIKit/UIKit.h>\n\n@class MSCViewController;\n\
    \n@interface MSCAppDelegate : UIResponder <UIApplicationDelegate>\n\n@property\
    \ (strong, nonatomic) UIWindow *window;\n\n@property (strong, nonatomic) MSCViewController\
    \ *viewController;\n\n@end\n```\n\n在代码中，你会看到我们有一个窗口对象和一个视图控制器对象。下面是具体的实现：\n\n\
    ```objectivec\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点。\n    if ([[UIDevice currentDevice]\
    \ userInterfaceIdiom] == UIUserInterfaceIdiomPhone) {\n        self.viewController\
    \ = [[MSCViewController alloc] initWithNibName:\n                            \
    \   @\"MSCViewController_iPhone\" bundle:nil];\n    } else {\n        self.viewController\
    \ = [[MSCViewController alloc] initWithNibName:\n                            \
    \   @\"MSCViewController_iPad\" bundle:nil];\n    }\n    self.window.rootViewController\
    \ = self.viewController;\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n```\n\n这段代码首先创建一个窗口对象。所有应用都在这个主窗口中运行。接着，我们创建视图控制器，其类型会根据运行代码的设备而有所不同。然后，我们请求视图控制器提供要添加到视图层次结构中的视图。这是几乎所有应用都会用到的样板代码。事实上，即使你基于其他模板创建应用，代码结构也会与此非常相似。\n\
    \n## 视图控制器\n\nCocoa 使用的主要模式是“模型-视图-控制器”（Model-View-Controller），正如我们在第 14 章中所讨论的。果然，在我们的应用中，有一个视图、一个控制器以及某种模型。\n\
    \n我们的视图来自一个 nib 文件。这样做很方便，因为从 nib 文件设计和加载视图比手动创建要快。\n\n`MSCViewController` 类是\
    \ `UIViewController` 的子类。`UIViewController` 知道如何执行管理视图的典型任务，例如将视图放到屏幕上、调整大小、旋转等。由于我们在管理一个视图，因此将其作为我们子类的基类是合理的。\n\
    \n为什么不能直接使用 `UIViewController` 呢？因为我们需要向视图中添加一些元素，而 `UIViewController` 并不知道这些元素。所以我们创建子类，并教会子类如何处理我们添加的内容。\n\
    \n## 向 Nib 文件中添加元素\n\n选择 iPhone 专用的 nib 文件 `MSCViewControler_iPhone.xib`。你会看到应用视图以\
    \ iPhone 屏幕的大小显示。同时注意，对象窗格中显示的是 iOS 特有的项目（参见图 15-7）。\n\n![9781430241881_Fig15-07.tif](img/9781430241881_Fig15-07_fmt.jpg)\n\
    \n图 15-7. iPhone nib 文件\n\n我们来处理这个 nib 文件。从右下角的“对象”窗格中选择一个“文本字段”（Text Field）对象，并将其拖到视图中。调整其大小以适应屏幕宽度，同时注意调整大小时出现的参考线（参见图\
    \ 15-8）。\n\n![9781430241881_Fig15-08.tif](img/9781430241881_Fig15-08_fmt.jpg)\n\
    \n图 15-8. 添加一个文本字段\n\n接下来，拖拽一个“标签”（Label）对象并添加到视图中，然后调整其大小。结果如图 15-9 所示。\n\n![9781430241881_Fig15-09.tif](img/9781430241881_Fig15-09_fmt.jpg)\n\
    \n图 15-9. 在文本字段下方放置一个标签\n\n下一步是添加一个按钮。在“对象”窗格中选择“圆角矩形按钮”（Round Rect Button），并将其拖到视图中，放置在文本字段和标签的下方。按钮放置好后，调整其大小和布局，使其与文本字段的宽度匹配，如图\
    \ 15-10 所示。\n\n![9781430241881_Fig15-10.tif](img/9781430241881_Fig15-10_fmt.jpg)\n\
    \n图 15-10. 我们添加了一个宽大的圆角矩形按钮。圆角矩形的应用随处可见！\n\n现在双击圆角矩形按钮为其设置标题。我们将其命名为 `UpperCase`（参见图\
    \ 15-11）。\n\n![9781430241881_Fig15-11.tif](img/9781430241881_Fig15-11_fmt.jpg)\n\
    \n图 15-11. 为按钮命名\n\n我们有了一个用于将文本转换为大写的按钮。还需要一个用于相反功能的按钮。再拖拽一个圆角矩形按钮到视图中，并将其放在第一个按钮的下方。调整其大小使其与第一个按钮一致，并将其命名为\
    \ `LowerCase`，如图 15-12 所示。（这里有一个快捷提示：你也可以通过选中第一个按钮，然后选择“编辑 ![image](img/9781430241881_arrow_fmt.jpg)\
    \ 复制”，或直接按 ![image](img/Rangoli1.jpg) +D 来创建第二个按钮。）\n\n![9781430241881_Fig15-12.tif](img/9781430241881_Fig15-12_fmt.jpg)\n\
    \n图 15-12. 将第二个按钮放置到位\n\n当然，你不必完全按照我们的方式来布局视图。你可以根据自己的喜好随意调整对象的大小和位置。我们的完整视图布局如图\
    \ 15-13 所示。\n\n![9781430241881_Fig15-13.tif](img/9781430241881_Fig15-13_fmt.jpg)\n\
    \n图 15-13. 完全布局好的视图\n\n现在我们按照期望设置了视图，接下来就是连接输出口（outlet）和动作（action）的乐趣了。在工具栏右侧，点击“编辑器”（Editor）组中的中间按钮以打开助理编辑器，或者如果你更喜欢快捷键，可以在键盘上按\
    \ ![image](img/Rangoli1.jpg) +option+return。调整 nib 文件和头文件 `MCSViewController.h`\
    \ 的排列，以便于在它们之间拖拽和连接。还记得在第 14 章中我们使用 control-拖拽的乐趣吗？让我们再来一次。从视图中的文本字段向头文件进行 control-拖拽（参见图\
    \ 15-14）。\n\n![9781430241881_Fig15-14.tif](img/9781430241881_Fig15-14_fmt.jpg)\n\
    \n图 15-14. control-拖拽以建立第一个连接\n\n将拖拽的线条放置在头文件中 `@interface` 和 `@end` 之间（同样参见图\
    \ 15-14）。Xcode 会弹出一个漂亮的小窗口（参见图 15-15）。\n\n![9781430241881_Fig15-15.tif](img/9781430241881_Fig15-15_fmt.jpg)\n\
    \n图 15-15. 创建新连接时出现的窗口\n\n图 15-15 中的窗口要求你输入输出口的名称。但在操作之前，请注意“对象”（Object）旁边显示的是“文件所有者”（File's\
    \ Owner）。这是什么意思呢？当你加载一个 nib 文件时，它由一个控制器拥有。当模板创建了 nib 文件和控制器文件时，它让我们的控制器成为了该 nib\
    \ 文件的所有者。如果需要，你可以通过选择 nib 文件中的“文件所有者”并更改其类来修改 nib 文件的所有者。但就目前而言，我们保持现状。\n\n现在我们已经准备好为输出口命名了。输入\
    \ `textField`，然后点击“连接”（Connect）。\n"
- fmt: "通过执行此过程，我们刚刚添加了一个`outlet`（参见[图15-16](#9781430241881_Ch15.xhtml#_FIG16)）。如果你查看头文件，会发现添加了用于指定`outlet`的代码。注意此类名为`UITextField`。回想一下[第14章](#9781430241881_Ch14.xhtml)中关于Mac的示例，我们使用了`NSTextField`，它与`UITextField`相似，但并不完全相同。\n\
    \n![9781430241881_Fig15-16.tif](images/9781430241881_Fig15-16_fmt.jpg)\n\n[图15-16](#9781430241881_Ch15.xhtml#FIG16).\
    \ 我们已添加了一个`outlet`\n\n![9781430241881_Fig15-17.tif](images/9781430241881_Fig15-17_fmt.jpg)\n\
    \n图15-17. 为标签命名`outlet`\n\n现在，让我们连接标签以保存结果。从标签按住`Control`键拖动，直至`textField` `outlet`代码的下方。\n\
    \n输入`resultsField`作为名称，并点击`Connect`。现在，我们有两个`outlet`，如头文件所示（参见[图15-18](#9781430241881_Ch15.xhtml#_FIG18)）。\n\
    \n![9781430241881_Fig15-18.tif](images/9781430241881_Fig15-18_fmt.jpg)\n\n[图15-18](#9781430241881_Ch15.xhtml#FIG18).\
    \ 我们有两个`outlet`\n\n现在是时候让按钮生效了。我们通过为按钮添加`action`来实现这一点。我们不需要为它们设置`outlet`，因为`outlet`用于更改它们的值，而目前我们不需要这样做。\n\
    \n要创建第一个按钮`action`，从`UpperCase`按钮按住`Control`键拖动，并放置到头文件中的`resultsField`下方，如[图15-19](#9781430241881_Ch15.xhtml#_FIG19)所示。\n\
    \n![9781430241881_Fig15-19.tif](images/9781430241881_Fig15-19_fmt.jpg)\n\n[图15-19](#9781430241881_Ch15.xhtml#FIG19).\
    \ 按住`Control`键拖动以创建第一个按钮`action`\n\n这次我们要创建一个`action`，因此点击`Outlet`并将其更改为`Action`。这会改变对话框中可用的选项（参见[图15-20](#9781430241881_Ch15.xhtml#_FIG20)）。\n\
    \n![9781430241881_Fig15-20.tif](images/9781430241881_Fig15-20_fmt.jpg)\n\n[图15-20](#9781430241881_Ch15.xhtml#FIG20).\
    \ 用于设置`UpperCase`按钮的对话框\n\n以下是`Connection`对话框中每个选项的说明：\n\n*   ![image](images/9781430241881_square_fmt.jpg)\
    \ **Name**：此项包含我们正在创建的`action`的名称。\n*   ![image](images/9781430241881_square_fmt.jpg)\
    \ **Type**：这是`action`参数的类型名称。默认情况下，该值为`id`（通用类型），但你可以将其改为发送`action`的类。在我们的例子中，发送`action`的类是`UIButton`。\n\
    *   ![image](images/9781430241881_square_fmt.jpg) **Event**：此项在OS X和iOS之间差异很大。在iOS中，由于触摸界面的原因，事件类型更多。在这种情况下，我们将使用`Touch\
    \ Up Inside`事件。这意味着当用户的手指在按钮内部离开屏幕时，将调用按钮`action`。[图15-21](#9781430241881_Ch15.xhtml#_FIG21)展示了iOS\
    \ `action`可用的所有不同类型的事件。\n\n![9781430241881_Fig15-21.tif](images/9781430241881_Fig15-21_fmt.jpg)\n\
    \n[图15-21](#9781430241881_Ch15.xhtml#FIG21). 为`action`选择事件类型\n\n*   ![image](images/9781430241881_square_fmt.jpg)\
    \ **Arguments**：在OS X应用程序中，我们没有参数选项，因为所有`action`都有一个参数。在愉快的iOS世界中，我们有三个选项：`None`、`Sender`（即OS\
    \ X中的情况）和`Sender and Event`（其中包含一个`UIEvent`参数，你可以查询它来决定做什么）。对于我们的`action`，我们将选择`None`（参见[图15-22](#9781430241881_Ch15.xhtml#_FIG22)）。\n\
    \n![9781430241881_Fig15-22.tif](images/9781430241881_Fig15-22_fmt.jpg)\n\n[图15-22](#9781430241881_Ch15.xhtml#FIG22).\
    \ 选择`None`作为参数\n\n完成此步骤将为`action`生成代码，并将其添加到头文件中。\n\n接下来，我们为`LowerCase`按钮创建一个`action`。\n\
    \n界面连接完成后，我们来添加一些代码。（遗憾的是，编程仍然需要这一步。）一些样板代码已经存在，例如`synthesizing`属性和`action`的空实现。\n\
    \n![9781430241881_Fig15-23.tif](images/9781430241881_Fig15-23_fmt.jpg)\n\n图15-23.\
    \ 已添加`UpperCase action`的代码\n\n![9781430241881_Fig15-24.tif](images/9781430241881_Fig15-24_fmt.jpg)\n\
    \n图15-24. 为第二个按钮创建`action`\n\n回顾[第14章](#9781430241881_Ch14.xhtml)，我们从应用程序委托中调用：\n\
    \n```\n- (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n\
    ```\n\n这个方法在我们的父类中，因此我们无需实现它。我们调用此方法来加载`nib`文件，如果想要访问`outlet`，就需要这样做。因此，我们将调用此方法：\n\
    \n```\n- (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n\
    {\n    self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];\n  \
    \  if (nil != self)\n    {\n        NSLog (@\"init: text %@ / results %@\", textField,\
    \ resultsField);\n    }\n    return self;\n}\n```\n\n同样在[第14章](#9781430241881_Ch14.xhtml)中，我们讨论了`awakeFromNib`。`view\
    \ controller`在`nib`被加载且对象初始化后会调用`viewDidLoad`。早期的一些iOS版本也会调用`awakeFromNib`，但在iOS\
    \ 5中则不会调用。\n\n让我们添加`awakeFromNib`：\n\n```\n- (void)awakeFromNib\n{\n    NSLog(@\"\
    awake: text %@ / results %@\", textField, resultsField);\n}\n```\n\n我们将添加一个`viewDidLoad`的最小实现。这通常是你修改`outlet`或设置其他`UI`元素的地方，因为在调用`viewDidLoad`时，可以保证`nib`文件已经加载。我们将用它为文本字段设置一些默认值。\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    NSLog (@\"viewDidLoad:\
    \ text %@ / results %@\", textField, resultsField);\n\n    [textField setPlaceholder:@\"\
    Enter text here\"];\n    resultsField.text = @\"Results\";\n}\n```\n\n此代码为`textField`设置了`placeholder`，即用户在其中输入任何内容之前显示的灰色文本。我们还为标签设置了默认值，以便让用户知道在哪里可以看到结果。\n\
    \n接下来在代码中，你会看到`viewDidUnload`。当视图从视图层级结构中移除后，会调用此方法。我们为什么关心这个？答案是为了节省内存。\n\niOS不使用虚拟内存。应用程序受设备可用内存的限制。此外，如果我们使用过多内存，iOS会以极大的报复和愤怒打击我们，杀死我们的应用程序。我们可以使用`viewDidUnload`来帮助清理资源。\n\
    \n在iOS（尤其是iPhone）应用程序中，大多数情况下，当一个视图消失时，屏幕上会被另一个视图替换。此时，前一个视图不再可见，因此我们不需要保留它。iOS会卸载视图以节省内存，因此`viewDidUnload`给了我们从视图中移除元素的机会，从而节省一些内存。在这种情况下，我们移除`textField`和`resultsField`。这两个方法在视图的整个生命周期中只会被调用一次。\n\
    \n还有另外四个方法（`viewWillAppear:`、`viewDidAppear:`、`viewWillDisappear:`和`viewDidDisappear:`），它们在视图将要消失或出现时被调用。这些方法会在每次适当时被调用，即使视图没有被卸载也会如此。\n\
    \n现在，让我们添加实际执行大小写转换的代码。\n\n```\n- (IBAction)uppercase\n{\n    NSString *original\
    \ = textField.text;\n    NSString *uppercase = [original uppercaseString];\n \
    \   resultsField.text = uppercase;\n}\n\n- (IBAction)lowercase\n{\n    NSString\
    \ *original = textField.text;\n    NSString *lowercase = [original lowercaseString];\n\
    \    resultsField.text = lowercase;\n}\n```"
  raw: 'By performing this procedure, we just added an outlet (see [Figure 15-16](#9781430241881_Ch15.xhtml#_FIG16)).
    If you look at the header file, you’ll see that code has been added to specify
    the outlet. Note that the name of the class is UITextField. If you remember back
    in [Chapter 14](#9781430241881_Ch14.xhtml) with our Mac example, we used NSTextField,
    which is similar to UITextField but not exactly the same.


    ![9781430241881_Fig15-16.tif](images/9781430241881_Fig15-16_fmt.jpg)


    [Figure 15-16](#9781430241881_Ch15.xhtml#FIG16). We have added an outlet


    ![9781430241881_Fig15-17.tif](images/9781430241881_Fig15-17_fmt.jpg)


    Figure 15-17\. Name the outlet for the label


    Now, let’s connect the label to hold the result. Control-drag from the label to
    just below the code for the textField outlet.


    Enter resultsField for the name, and click Connect. Now, we have two outlets,
    as shown in the header file (see [Figure 15-18](#9781430241881_Ch15.xhtml#_FIG18)).


    ![9781430241881_Fig15-18.tif](images/9781430241881_Fig15-18_fmt.jpg)


    [Figure 15-18](#9781430241881_Ch15.xhtml#FIG18). We have two outlets


    Now it’s time to make our buttons work. We do this by adding actions for the buttons.
    We don’t need outlets for them, because outlets would be used to change their
    values, which we don’t need to do.


    To create the first button action, control-drag from the UpperCase button, and
    drop it below resultsField in the header, as shown in [Figure 15-19](#9781430241881_Ch15.xhtml#_FIG19).


    ![9781430241881_Fig15-19.tif](images/9781430241881_Fig15-19_fmt.jpg)


    [Figure 15-19](#9781430241881_Ch15.xhtml#FIG19). Control-drag to create the first
    button action


    This time we want to create an action, so click Outlet, and change it to Action.
    This changes the options available in the box (see [Figure 15-20](#9781430241881_Ch15.xhtml#_FIG20)).


    ![9781430241881_Fig15-20.tif](images/9781430241881_Fig15-20_fmt.jpg)


    [Figure 15-20](#9781430241881_Ch15.xhtml#FIG20). Dialog box for setting up the
    UpperCase button


    Here’s some information about each item in the Connection dialog:


    *   ![image](images/9781430241881_square_fmt.jpg)  *Name*: This item contains
    the name of the action we’re creating.

    *   ![image](images/9781430241881_square_fmt.jpg)  *Type*: This is the class name
    for the action’s argument. By default, this value is id (the generic class), but
    you can change that to whichever class is sending the action. In our case, the
    class sending the action is UIButton.

    *   ![image](images/9781430241881_square_fmt.jpg)  *Event*: This differs greatly
    between OS X and iOS. In iOS, there are many more event types, due to the touch
    interface. In this case, we’re going to use the Touch Up Inside event. This means
    that the button action will be called when the user’s finger stops touching the
    screen while still inside the button. [Figure 15-21](#9781430241881_Ch15.xhtml#_FIG21)
    shows all the different kinds of events available for iOS actions.


    ![9781430241881_Fig15-21.tif](images/9781430241881_Fig15-21_fmt.jpg)


    [Figure 15-21](#9781430241881_Ch15.xhtml#FIG21). Choose the event kind for the
    action


    *   ![image](images/9781430241881_square_fmt.jpg)  *Arguments*: In OS X applications,
    we don’t get an option for arguments, because all actions have one argument. In
    the happy world of iOS, we have three options: *None*, *Sender* (which is what
    happens in OS X), and *Sender and Event* (which includes a UIEvent argument that
    you can query to decide what to do). We’re going to choose *None* for our action
    (see [Figure 15-22](#9781430241881_Ch15.xhtml#_FIG22)).


    ![9781430241881_Fig15-22.tif](images/9781430241881_Fig15-22_fmt.jpg)


    [Figure 15-22](#9781430241881_Ch15.xhtml#FIG22). Choose None for the arguments


    Completing this step creates the code for the action, and the code is added to
    the header file.


    Next, we create an action for the LowerCase button.


    Now that we’re done with the interface connections, let’s add some code. (Sadly,
    programming still requires this.) Some of the boilerplate code is already there,
    such as synthesizing properties and empty implementations of actions.


    ![9781430241881_Fig15-23.tif](images/9781430241881_Fig15-23_fmt.jpg)


    Figure 15-23\. Code for the UpperCase action has been added


    ![9781430241881_Fig15-24.tif](images/9781430241881_Fig15-24_fmt.jpg)


    Figure 15-24\. Create the action for the second button


    Recall from [Chapter 14](#9781430241881_Ch14.xhtml) that from our application
    delegate we call


    - (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil


    This method is in our parent class, so we don’t need to implement it. We call
    this method to load the nib file, which we’ll need if we want access to outlets.
    So we’ll call the method:


    - (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil


    {


    self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];


    if(nil != self)


    {


    NSLog (@"init: text %@ / results %@", textField, resultsField);


    }


    return self;


    }


    Also in [Chapter 14](#9781430241881_Ch14.xhtml), we talked about awakeFromNib.
    The view controller calls viewDidLoad after the nib has been loaded and objects
    have been initialized. Some previous versions of iOS also called awakeFromNib,
    but in iOS 5, it does not get called.


    Let’s add awakeFromNib:


    - (void)awakeFromNib


    {


    NSLog(@"awake: text %@ / results %@", textField, resultsField);


    }


    We’ll add a minimal implementation of viewDidLoad. This is typically where you’ll
    modify your outlets or set up other UI items, as you’re guaranteed to have your
    nib file loaded when viewDidLoad is called. We’ll use it to set some of the defaults
    for our text fields.


    - (void)viewDidLoad


    {


    [super viewDidLoad];


    // Do any additional setup after loading the view, typically from a nib.


    NSLog (@"viewDidLoad: text %@ / results %@", textField, resultsField);


    [textField setPlaceholder:@"Enter text here"];


    resultsField.text = @"Results";


    }


    This code sets the placeholder for textField, which is the gray text displayed
    before the user enters anything in the field. We also set the defaults for the
    label to let the user know where to expect to see the results.


    Next in the code, you’ll see viewDidUnload. This method is called after the view
    is removed from the view hierarchy. Why do we care about that? The answer is memory
    conservation.


    iOS does not use virtual memory. Apps are constrained by available memory in the
    device. Plus, if we use too much memory, iOS will strike down **upon us** with
    great vengeance and furious anger, killing our app. We can use viewDidUnload to
    help clean up after ourselves.


    In iOS (particularly iPhone) apps, most of the time when a view goes away, it’s
    replaced on the screen by another one. When this happens, the previous view is
    no longer visible, so we don’t need to keep it around. iOS unloads the view to
    save memory, so viewDidUnload gives us a chance to remove items from the view
    so we can save some memory. In this case, we remove textField and resultsField.
    These two methods are called once for the lifetime of the view.


    There are four other methods (viewWillAppear:, viewDidAppear:, viewWillDisappear:,
    and viewDidDisappear:) that get called when a view is going away or appearing.
    These get called every time it’s appropriate, even if the view does not get unloaded.


    Now, let’s add the code that actually does the uppercasing and lowercasing.


    - (IBAction)uppercase


    {


    NSString *original = textField.text;


    NSString *uppercase = [original uppercaseString];


    resultsField.text = uppercase;


    }


    - (IBAction)lowercase


    {


    NSString *original = textField.text;


    NSString *lowercase = [original lowercaseString];


    resultsField.text = lowercase;


    }'
  trans: "\n通过执行此过程，我们刚刚添加了一个`outlet`（参见图 15-16）。如果你查看头文件，会发现添加了用于指定`outlet`的代码。注意此类名为`UITextField`。回想一下第\
    \ 14 章中关于 Mac 的示例，我们使用了`NSTextField`，它与`UITextField`相似，但并不完全相同。\n\n![9781430241881_Fig15-16.tif](img/9781430241881_Fig15-16_fmt.jpg)\n\
    \n图 15-16. 我们已添加了一个`outlet`\n\n![9781430241881_Fig15-17.tif](img/9781430241881_Fig15-17_fmt.jpg)\n\
    \n图 15-17. 为标签命名`outlet`\n\n现在，让我们连接标签以保存结果。从标签按住`Control`键拖动，直至`textField` `outlet`代码的下方。\n\
    \n输入`resultsField`作为名称，并点击`Connect`。现在，我们有两个`outlet`，如头文件所示（参见图 15-18）。\n\n![9781430241881_Fig15-18.tif](img/9781430241881_Fig15-18_fmt.jpg)\n\
    \n图 15-18. 我们有两个`outlet`\n\n现在是时候让按钮生效了。我们通过为按钮添加`action`来实现这一点。我们不需要为它们设置`outlet`，因为`outlet`用于更改它们的值，而目前我们不需要这样做。\n\
    \n要创建第一个按钮`action`，从`UpperCase`按钮按住`Control`键拖动，并放置到头文件中的`resultsField`下方，如图 15-19\
    \ 所示。\n\n![9781430241881_Fig15-19.tif](img/9781430241881_Fig15-19_fmt.jpg)\n\n\
    图 15-19. 按住`Control`键拖动以创建第一个按钮`action`\n\n这次我们要创建一个`action`，因此点击`Outlet`并将其更改为`Action`。这会改变对话框中可用的选项（参见图\
    \ 15-20）。\n\n![9781430241881_Fig15-20.tif](img/9781430241881_Fig15-20_fmt.jpg)\n\
    \n图 15-20. 用于设置`UpperCase`按钮的对话框\n\n以下是`Connection`对话框中每个选项的说明：\n\n*   ![image](img/9781430241881_square_fmt.jpg)\
    \ **名称**：此项包含我们正在创建的`action`的名称。\n*   ![image](img/9781430241881_square_fmt.jpg)\
    \ **类型**：这是`action`参数的类型名称。默认情况下，该值为`id`（通用类型），但你可以将其改为发送`action`的类。在我们的例子中，发送`action`的类是`UIButton`。\n\
    *   ![image](img/9781430241881_square_fmt.jpg) **事件**：此项在 OS X 和 iOS 之间差异很大。在\
    \ iOS 中，由于触摸界面的原因，事件类型更多。在这种情况下，我们将使用`Touch Up Inside`事件。这意味着当用户的手指在按钮内部离开屏幕时，将调用按钮`action`。图\
    \ 15-21 展示了 iOS `action`可用的所有不同类型的事件。\n\n![9781430241881_Fig15-21.tif](img/9781430241881_Fig15-21_fmt.jpg)\n\
    \n图 15-21. 为`action`选择事件类型\n\n*   ![image](img/9781430241881_square_fmt.jpg) **参数**：在\
    \ OS X 应用程序中，我们没有参数选项，因为所有`action`都有一个参数。在愉快的 iOS 世界中，我们有三个选项：`None`、`Sender`（即\
    \ OS X 中的情况）和`Sender and Event`（其中包含一个`UIEvent`参数，你可以查询它来决定做什么）。对于我们的`action`，我们将选择`None`（参见图\
    \ 15-22）。\n\n![9781430241881_Fig15-22.tif](img/9781430241881_Fig15-22_fmt.jpg)\n\
    \n图 15-22. 选择`None`作为参数\n\n完成此步骤将为`action`生成代码，并将其添加到头文件中。\n\n接下来，我们为`LowerCase`按钮创建一个`action`。\n\
    \n界面连接完成后，我们来添加一些代码。（遗憾的是，编程仍然需要这一步。）一些样板代码已经存在，例如`synthesizing`属性和`action`的空实现。\n\
    \n![9781430241881_Fig15-23.tif](img/9781430241881_Fig15-23_fmt.jpg)\n\n图 15-23.\
    \ 已添加`UpperCase action`的代码\n\n![9781430241881_Fig15-24.tif](img/9781430241881_Fig15-24_fmt.jpg)\n\
    \n图 15-24. 为第二个按钮创建`action`\n\n回顾第 14 章，我们从应用程序委托中调用：\n\n```\n- (id)initWithNibName:(NSString\
    \ *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n```\n\n这个方法在我们的父类中，因此我们无需实现它。我们调用此方法来加载`nib`文件，如果想要访问`outlet`，就需要这样做。因此，我们将调用此方法：\n\
    \n```\n- (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n\
    {\n    self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];\n  \
    \  if (nil != self)\n    {\n        NSLog (@\"init: text %@ / results %@\", textField,\
    \ resultsField);\n    }\n    return self;\n}\n```\n\n同样在第 14 章中，我们讨论了`awakeFromNib`。`view\
    \ controller`在`nib`被加载且对象初始化后会调用`viewDidLoad`。早期的一些 iOS 版本也会调用`awakeFromNib`，但在\
    \ iOS 5 中则不会调用。\n\n让我们添加`awakeFromNib`：\n\n```\n- (void)awakeFromNib\n{\n    NSLog(@\"\
    awake: text %@ / results %@\", textField, resultsField);\n}\n```\n\n我们将添加一个`viewDidLoad`的最小实现。这通常是你修改`outlet`或设置其他`UI`元素的地方，因为在调用`viewDidLoad`时，可以保证`nib`文件已经加载。我们将用它为文本字段设置一些默认值。\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    NSLog (@\"viewDidLoad:\
    \ text %@ / results %@\", textField, resultsField);\n\n    [textField setPlaceholder:@\"\
    Enter text here\"];\n    resultsField.text = @\"Results\";\n}\n```\n\n此代码为`textField`设置了`placeholder`，即用户在其中输入任何内容之前显示的灰色文本。我们还为标签设置了默认值，以便让用户知道在哪里可以看到结果。\n\
    \n接下来在代码中，你会看到`viewDidUnload`。当视图从视图层级结构中移除后，会调用此方法。我们为什么关心这个？答案是为了节省内存。\n\niOS\
    \ 不使用虚拟内存。应用程序受设备可用内存的限制。此外，如果我们使用过多内存，iOS 会以极大的报复和愤怒打击我们，杀死我们的应用程序。我们可以使用`viewDidUnload`来帮助清理资源。\n\
    \n在 iOS（尤其是 iPhone）应用程序中，大多数情况下，当一个视图消失时，屏幕上会被另一个视图替换。此时，前一个视图不再可见，因此我们不需要保留它。iOS\
    \ 会卸载视图以节省内存，因此`viewDidUnload`给了我们从视图中移除元素的机会，从而节省一些内存。在这种情况下，我们移除`textField`和`resultsField`。这两个方法在视图的整个生命周期中只会被调用一次。\n\
    \n还有另外四个方法（`viewWillAppear:`、`viewDidAppear:`、`viewWillDisappear:`和`viewDidDisappear:`），它们在视图将要消失或出现时被调用。这些方法会在每次适当时被调用，即使视图没有被卸载也会如此。\n\
    \n现在，让我们添加实际执行大小写转换的代码。\n\n```\n- (IBAction)uppercase\n{\n    NSString *original\
    \ = textField.text;\n    NSString *uppercase = [original uppercaseString];\n \
    \   resultsField.text = uppercase;\n}\n\n- (IBAction)lowercase\n{\n    NSString\
    \ *original = textField.text;\n    NSString *lowercase = [original lowercaseString];\n\
    \    resultsField.text = lowercase;\n}\n```\n"
- fmt: '对于 iOS 文本字段，我们要求字段使用`NSString`方法来转换其文本（就像我们在[第14章](#9781430241881_Ch14.xhtml)的
    OS X 代码中所做的那样），然后设置标签的`text`属性为修改后的字符串。与 OS X 版本类似，我们将使用`stringValue`和`setStringValue:`来实现。


    我们声称正在构建一个通用应用程序，一个可以在 iPhone 和 iPad 上运行的应用程序，但我们尚未处理 iPad 的 nib 文件。让我们来解决这个问题。


    选择 iPad 版本的 nib 文件`ViewController_iPad.xib`。添加必要的 UI 元素，使其看起来像我们之前创建的 iPhone 版本。我们可以像为
    iPhone 版本那样逐个创建元素，或者为了更快地操作，可以在 iPhone 视图中按住 Shift 键选择多个元素，复制它们，然后粘贴到 iPad 视图中。结果应类似于[图15-25](#9781430241881_Ch15.xhtml#_FIG25)。


    ![9781430241881_Fig15-25.tif](images/9781430241881_Fig15-25_fmt.jpg)


    [图15-25](#9781430241881_Ch15.xhtml#FIG25). 创建 iPad 用户界面


    我们现在更接近了，但还没有完全完成。如果现在构建并运行应用程序，我们实际上可以在文本字段中输入文本并点击按钮，但它们不会执行任何操作。为了使其正常工作，我们必须连接输出口（outlets）和操作（actions）。


    在 iPad nib 文件中，按住 Control 键从文件所有者拖动到文本字段（参见[图15-26](#9781430241881_Ch15.xhtml#_FIG26)）。


