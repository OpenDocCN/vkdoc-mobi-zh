    to have when constructing the user interface, so you know when to update your
    window. As new iTunes shares come and go, this method is called again and again.


    [service resolveWithTimeout: 10] tells the Bonjour system to go fetch all the
    interesting properties about the service. In particular, we want the name of the
    share, like Scott’s Groovy Tunes, so we can print it out. [service name] gets
