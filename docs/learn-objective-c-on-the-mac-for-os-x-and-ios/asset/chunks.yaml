  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。



    Xcode 启动完成后，您会看到欢迎界面，如图 2-1 所示。在左侧，您可以选择接下来要执行的操作。或者，您也可以从右侧的列表中选择打开一个最近的项目。（如果您是
    Xcode 新手，则不会看到任何最近的项目。）如果您没有看到欢迎界面，您始终可以通过选择“窗口”菜单上的“欢迎使用 Xcode”或键入 ![image](img/Rangoli1.jpg)1
    来显示它。


    ![9781430241881_Fig02-01.tif](img/9781430241881_Fig02-01_fmt.jpg)


    图 2-1. Xcode 欢迎界面


    在欢迎界面上，点击“创建一个新的 Xcode 项目”（参见图 2-1），或者直接选择“文件”![image](img/9781430241881_arrow_fmt.jpg)“新建”![image](img/9781430241881_arrow_fmt.jpg)“新建项目”。Xcode
    会显示一个列表，列出它可以创建的各种项目类型。请集中注意力，忽略其中大多数引人入胜的项目类型，然后在窗口的左侧选择“应用程序”，在右侧选择“命令行工具”，如图
    2-2 所示。点击“下一步”。


    ![9781430241881_Fig02-02.tif](img/9781430241881_Fig02-02_fmt.jpg)


    图 2-2. 创建一个新的命令行工具


    在下一个界面（图 2-3）上，您将为新项目选择选项。对于“产品名称”，请输入经典的“Hello Objective-C”。对于“公司标识符”，您通常会输入公司或网站名称的逆向
    DNS 版本，例如 `com.mywebsite`；目前，您可以只输入 `com.thinkofsomethingclever`。


    ![9781430241881_Fig02-03.tif](img/9781430241881_Fig02-03_fmt.jpg)


    图 2-3. 设置您的项目选项


    此界面将最重要的选项留到了最后：即您要创建的命令行工具的类型：请确保选择“Foundation”。完成后，您的界面应该与图 2-3 非常相似。完成此操作后，点击“下一步”。


    Xcode 会弹出一个表单，询问您保存项目的位置（参见图 2-4）。为了保持条理清晰，我们将它保存在我们的一个项目目录中，但您可以将其保存在任何您想要的地方。


    ![9781430241881_Fig02-04.tif](img/9781430241881_Fig02-04_fmt.jpg)


    图 2-4. 为新的 Foundation 工具命名


    点击“保存”后，Xcode 会显示其主窗口，称为项目窗口（参见图 2-5）。此窗口显示组成项目的各个部分以及一个编辑窗格。`main.m` 是包含 Hello
    Objective-C 代码的源文件。


    ![9781430241881_Fig02-05.tif](img/9781430241881_Fig02-05_fmt.jpg)


    图 2-5. Xcode 的主窗口


    `main.m` 包含样板代码，由 Xcode 为每个新项目友好地提供。我们可以使我们的 Hello Objective-C 应用程序比 Xcode 提供的示例更简单一些。删除
    `main.m` 中的所有内容，并将其替换为以下代码：


    ```

    #import <Foundation/Foundation.h>


    int main (int argc, const char *argv[])


    {


    NSLog (@"Hello, Objective-C!");


    return (0);


    } // main

    ```


    如果您现在还看不懂所有这些代码，请不要担心。我们很快就会逐行详细地讲解这个程序。


    如果无法将源代码变成可运行的程序，那就没什么乐趣了。通过点击“运行”按钮或按下 ![image](img/Rangoli1.jpg) **R** 来构建并运行程序。如果没有令人头疼的语法错误，Xcode
    会编译、链接您的程序，然后运行它。打开 Xcode 控制台窗口（通过选择“视图”![image](img/9781430241881_arrow_fmt.jpg)“调试区域”![image](img/9781430241881_arrow_fmt.jpg)“激活控制台”或按下
    ![image](img/Rangoli1.jpg)**C**），它会显示程序的输出，如图 2-6 所示。


    ![9781430241881_Fig02-06.tif](img/9781430241881_Fig02-06_fmt.jpg)


    图 2-6. 运行 Hello Objective-C


    好了，您已经完成了：您的第一个可运行的 Objective-C 程序。恭喜！让我们来剖析它，看看它是如何工作的。


    ## 解构 Hello Objective-C


    以下是 `main.m` 的内容，再次列出：


    ```

    #import <Foundation/Foundation.h>


    int main (int argc, const char *argv[])


    {


    NSLog (@"Hello, Objective-C!");


    return (0);


    } // main

    ```


    Xcode 使用 `.m` 扩展名来指示一个包含 Objective-C 代码的文件，并将由 Objective-C 编译器处理。以 `.c` 结尾的文件由
    C 编译器处理，而 `.cpp` 文件则由 C++ 编译器处理。（在 Xcode 中，默认情况下所有编译都由 LLVM 编译器处理），这是一个能理解这三种语言变体的单一编译器。


    `main` 文件包含两行代码，如果您已经熟悉纯 C 语言，应该会对它们很熟悉：`main()` 的声明和末尾的 `return (0)` 语句。请记住，Objective-C
    本质上就是 C 语言，声明 `main()` 和返回值的语法与 C 语言相同。其余的代码看起来与常规 C 语言略有不同。例如，那个古怪的 `#import`
    是什么？要了解，请继续阅读！


    **注意** 当 Objective-C 首次被引入时，`.m` 扩展名最初代表“消息”（messages），指的是 Objective-C 的一个核心特性，我们将在后续章节中讨论。如今，我们只是称它们为“点-m
    文件”。


    ### 那个古怪的 `#import` 玩意儿


    与 C 语言一样，Objective-C 也使用**头文件**来保存诸如结构体、符号常量和函数原型等元素的声明。在 C 语言中，您使用 `#include`
    语句来告知编译器它应该查阅某个头文件以获取一些定义。您也可以在 Objective-C 程序中出于相同目的使用 `#include`，但您可能永远不会这样做。相反，您会使用
    `#import`，像这样：


    ```

    #import <Foundation/Foundation.h>

    ```


    `#import` 是 Xcode 使用的编译器提供的一个特性，当您编译 Objective-C、C 和 C++ 程序时，Xcode 都会使用它。`#import`
    保证一个头文件只会被包含一次，无论该文件的 `#import` 指令被看到多少次。


    **注意** 在 C 语言中，程序员通常使用基于 `#ifdef` 指令的方案来避免一个文件包含第二个文件，然后第二个文件递归地又包含了第一个文件的情况。在
    Objective-C 中，程序员使用 `#import` 来实现相同的效果。


    `#import <Foundation/Foundation.h>` 语句告诉编译器查找 Foundation 框架中的 `Foundation.h` 头文件。


    ### 框架简介


    什么是框架？很高兴您问到点上了。**框架** 是一组部件的集合——头文件、库、图像、声音等等——被整合到一个单元中。Apple 将诸如 Cocoa、Carbon、QuickTime
    和 OpenGL 等技术作为一组组的框架来提供。Cocoa 由一对框架组成：Foundation 和 Application Kit（也称为 AppKit），以及一套辅助框架，包括
    Core Animation 和 Core Image，这些框架为 Cocoa 添加了各种很酷的功能。


    Foundation 框架处理用户界面层之下的功能，例如数据结构和通信机制。本书中的所有程序都基于 Foundation 框架。


    **注意** 读完本书后，您成为 Cocoa 大师的下一步就是掌握 Cocoa 的 Application Kit，它包含了 Cocoa 的高级特性：用户界面元素、打印、颜色和声音管理、AppleScript
    支持等等。要了解更多信息，请查阅 Jack Nutting、David Mark 和 Jeff LaMarche 合著的 *Learn Cocoa on the
    Mac*（Apress 出版，2010 年）。

