    by the branching arrows icon. The static analyzer found four issues for us that
    we didn’t know we had. Cool—let’s take a look.


    The Issue Navigator (see [Figure 19-2](#9781430241881_Ch19.xhtml#_FIG2)) lists
    the issues the analyzer found. We’ll examine the errors one by one.


