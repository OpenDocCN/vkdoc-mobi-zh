    \ @\"oop:ack:bork:greeble:ponies\";`\n"
- fmt: "```objc\nNSArray *chunks = [string componentsSeparatedByString: @\":\"];\n\
    ```\n\nAnd to join an `NSArray` and create a string of its contents, use `componentsJoinedByString:`:\n\
    ```objc\nstring = [chunks componentsJoinedByString: @\" :- ) \"];\n```\nThe preceding\
    \ line produces an `NSString` with the contents `\"oop :- ) ack :- ) bork :- )\
    \ greeble :- ) ponies\"`.\n\n## Mutable Arrays\n\n`NSArray` creates immutable\
    \ objects, just as `NSString` does. Once you create an array with a certain number\
    \ of objects, that’s it for that array: you can’t add or remove any members. The\
    \ objects contained in the array are free to change, of course (like a `Car` getting\
    \ a new set of `Tires` after it fails a safety inspection), but the array object\
    \ itself will stay the same forever.\n\nTo complement `NSArray`, `NSMutableArray`\
    \ exists so that we can add and remove objects whenever we want. It uses a class\
    \ method, `arrayWithCapacity`, to make a new mutable array:\n```objc\n+ (id) arrayWithCapacity:\
    \ (NSUInteger) numItems;\n```\nLike `NSMutableString`’s `stringWithCapacity:`,\
    \ the array’s capacity is just a hint about its eventual size. The capacity value\
    \ exists so that Cocoa can perform some optimizations on the code. Cocoa doesn’t\
    \ prepopulate the array with objects, and it doesn’t use the capacity value to\
    \ limit the array. You create a new mutable array like this:\n```objc\nNSMutableArray\
    \ *array = [NSMutableArray arrayWithCapacity: 17];\n```\n\nAdd objects to the\
    \ end of the array by using `addObject:`.\n```objc\n- (void) addObject: (id) anObject;\n\
    ```\nYou can add four tires to an array with a loop like this:\n```objc\nfor (NSInteger\
    \ i = 0; i < 4; i++)\n{\n    Tire *tire = [Tire new];\n    [array addObject: tire];\n\
    }\n```\n\nYou can remove an object at a particular index. For example, if you\
    \ don’t like the second tire, you can use `removeObjectAtIndex:` to get rid of\
    \ it. Here’s how the method is defined:\n```objc\n- (void) removeObjectAtIndex:\
    \ (NSUInteger) index;\n```\nYou use it like this:\n```objc\n[array removeObjectAtIndex:1];\n\
    ```\nNote that the second tire lives at index 1. `NSArray` objects are zero-indexed,\
    \ like C arrays.\n\nThere are now three tires left. No hole is created in the\
    \ array after you remove an object. The objects in the array that follow the removed\
    \ object all get shifted down to fill the gap.\n\nThere are a bunch of cool things\
    \ you can do with other methods of mutable arrays, like inserting an object at\
    \ a particular index, replacing an object, sorting the array, plus all the goodies\
    \ that `NSArray` provides as an ancestor.\n\n**Note** There is no literal syntax\
    \ for creating `NSMutableArray` objects.\n\n## Enumeration Nation\n\nPerforming\
    \ an operation on each element of the array is a common `NSArray` operation. For\
    \ example, you might tell all the shapes in the array to change their color to\
    \ green, if you really liked green that much. Or you might want every tire in\
    \ the car to go flat on the driver, for realism in constructing your Pittsburgh-area\
    \ driving simulator. You can write a loop to index from `0` to `[array count]`\
    \ and get the object at the index, or you can use an `NSEnumerator`, which is\
    \ Cocoa’s way of describing this kind of iteration over a collection. To use `NSEnumerator`,\
    \ you ask the array for the enumerator using `objectEnumerator`:\n```objc\n- (NSEnumerator\
    \ *)objectEnumerator;\n```\nYou use the method like this:\n```objc\nNSEnumerator\
    \ *enumerator = [array objectEnumerator];\n```\nThere’s also a `reverseObjectEnumerator`\
    \ method if you want to walk the collection from back to front.\n\nAfter you get\
    \ an enumerator, you crank up a `while` loop that asks the enumerator for its\
    \ `nextObject` every time through the loop:\n```objc\n- (id) nextObject;\n```\n\
    When `nextObject` returns `nil`, the loop is done. This is another reason why\
    \ you can’t store `nil` values in the array: there’s no way to tell whether a\
    \ `nil` result was a value stored in the array or the `nil` that signals the end\
    \ of the loop.\n\nThe whole loop then looks like this:\n```objc\nNSEnumerator\
    \ *enumerator = [array objectEnumerator];\nwhile (id thingie = [enumerator nextObject])\n\
    {\n    NSLog (@\"I found %@\", thingie);\n}\n```\nThere’s one gotcha if you’re\
    \ enumerating over a mutable array: you can’t change the container, such as by\
    \ adding or removing objects. If you do, the enumerator will become confused,\
    \ and you’ll get undefined results. “Undefined results” can mean anything from\
    \ “Hey, it seems to have worked!” to “Oops, it crashed my program.”\n\n## Fast\
    \ Enumeration\n\nApple introduced a number of small tweaks to Objective-C as it\
    \ boosted the language version to 2.0. The first of these tweaks we’ll examine\
    \ is called **fast enumeration**, and it uses syntax familiar to users of scripting\
    \ languages. Here’s what it looks like:\n```objc\nfor (NSString *string in array)\n\
    {\n    NSLog (@\"I found %@\", string);\n}\n```\nThe body of the loop will spin\
    \ for each element in the array, with the variable `string` holding each array\
    \ value. It’s much more concise than the enumerator syntax and much faster.\n\n\
    Like all the Objective-C 2.0 features, this is not available on Macs running very\
    \ old system software (pre-Mac OS X 10.5 Leopard). If you or your users need to\
    \ run your programs on a system that does not support Objective-C 2.0 or later,\
    \ you can’t use this new syntax. Bummer – but at this point, very unlikely too.\n\
    \nThe latest release of the Apple compiler (based on the Clang and LLVM projects)\
    \ adds a feature called **blocks** to the base C language. We will discuss blocks\
    \ at length in [Chapter 14](#9781430241881_Ch14.xhtml). To support the blocks\
    \ feature, Apple has added a method to enumerate objects in `NSArray` using blocks,\
    \ and it looks like this:\n```objc\n- (void)enumerateObjectsUsingBlock:(void (^)(id\
    \ obj, NSUInteger idx, BOOL *stop))block\n```\nWhoa! What the heck is that? You’re\
    \ probably thinking you don’t even know how to read it, let alone use it. Well,\
    \ don’t worry. It’s much simpler than it looks. Using the previous array, we can\
    \ rewrite the preceding code as:\n```objc\n[array enumerateObjectsUsingBlock:^(NSString\
    \ *string, NSUInteger index, BOOL *stop) {\n    NSLog (@\"I found %@\", string);\n\
    }];\n```\nNow, the question is, “Why would we use this instead of fast enumeration?”\
    \ With blocks, one of the options is that the loop can execute in parallel. With\
    \ fast enumeration, execution proceeds through the items linearly.\n\nOK, so now\
    \ we have four ways to iterate through an array: by index, with `NSEnumerator`,\
    \ with fast enumeration, and now with blocks. Which one do you use?\n\nIf you\
    \ don’t have to worry about running on ancient, pre-10.5 systems, use fast enumeration\
    \ or blocks. They are more succinct and much faster. What’s more, blocks are only\
    \ available with the Apple LLVM compiler.\n\nIn the unlikely event that you need\
    \ to support Mac OS X 10.4 Tiger or earlier, go the `NSEnumerator` way. Xcode\
    \ includes a refactoring to convert code to Objective-C 2.0 and will automatically\
    \ convert `NSEnumerator` loops into fast enumeration.\n\nOnly use `-objectAtIndex:`\
    \ if you really need to access things by index, like if you’re skipping around\
    \ the array (for example, accessing every third object in it) or if you are iterating\
    \ through multiple arrays at the same time.\n\n## NSDictionary\n\nNo doubt you’ve\
    \ heard of dictionaries. Maybe you even use one occasionally. In programming,\
    \ a **dictionary** is a collection of keywords and their definitions. Cocoa has\
    \ a collection class called `NSDictionary` that performs these duties. An `NSDictionary`\
    \ stores a value (which can be any kind of Objective-C object) under a given key\
    \ (usually an `NSString`). You can then use that key to look up the corresponding\
    \ value. So, for example, if you have an `NSDictionary` that stores all the contact\
    \ information for a person, you can ask that dictionary “Give me the value for\
    \ the key `home-address`.” Or say, “Give me the value for the key `email-address`.”"
