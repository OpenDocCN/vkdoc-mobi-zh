  raw: 'Coming up in our next chapter is inheritance, a feature that lets you leverage
    the behavior of existing objects so you can write less code to do your work. Hey,
    that sounds great! We’ll see you there!


    Chapter 4


    Inheritance


    When you write an object-oriented program—and we hope you’re going to write *a
    lot* of them—the classes and objects you create have relationships with each other.
    They work together to make your program do its thing.


    Two aspects of OOP are most important when dealing with relationships between
    classes and objects. The first is **inheritance**, the subject of this chapter.
    When you create a new class, it’s often useful to define the new class in terms
    of its differences from another, already existing class. Using inheritance, you
    can define a class that has all the capabilities of a parent class: it *inherits*
    those capabilities.


    The other OOP technique used with related classes is **composition**, in which
    objects contain references to other objects. For example, a car object in a racing
    simulator might have four tire objects that it uses during game play. When your
    object keeps references to others, you can take advantage of features offered
    by the others: that’s composition. We’ll cover composition in the next chapter.


    Why Use Inheritance?


    Remember our old friend the Shapes-Object program from the previous chapter? It
    contained several classes that had very similar interfaces and implementations.
    And, of course, they’re similar because we created them by cutting and pasting.


    We’ll jog your memory by presenting the interfaces for the Circle and Rectangle
    classes:


    @interface Circle : NSObject


    {


    @private


    ShapeColor fillColor;


    ShapeRect bounds;


    }


    - (void) setFillColor:(ShapeColor)fillColor;


    - (void) setBounds:(ShapeRect)bounds;


    - (void) draw;


    @end // Circle


    @interface Rectangle : NSObject


    {


    @private


    ShapeColor fillColor;


    ShapeRect bounds;


    }


    - (void) setFillColor:(ShapeColor)fillColor;


    - (void) setBounds:(ShapeRect)bounds;


    - (void) draw;


    @end // Rectangle


    The interfaces for these classes are much alike—very, *very* much alike. In fact,
    except for the class names, they’re identical twins.


    The implementations of Circle and Rectangle are also very similar. Recall from
    the previous chapter that setFillColor: and setBounds: are identical in the two
    classes:


    @implementation Circle


    - (void)setFillColor:(ShapeColor)c


    {


    fillColor = c;


    } // setFillColor


    - (void)setBounds:(ShapeRect)b


    {


    bounds = b;


    } // setBounds


    // …


    @end // Circle


    @implementation Rectangle


    - (void) setFillColor: (ShapeColor) c


    {


    fillColor = c; } // setFillColor


    - (void)setBounds:(ShapeRect)b


    {


    bounds = b;


    } // setBounds


    // …


    @end // Rectangle


    These methods do exactly the same job; they set the fillColor and bounds instance
    variables. However, the implementations of Circle and Rectangle are not identical.
    For example, the draw method’s signature, that is, the method’s name and parameters,
    is the same in both classes, but the implementations differ:


    @implementation Circle // …


    - (void) draw


    {


    NSLog (@"drawing a circle at (%d %d %d %d) in %@",


    bounds.x, bounds.y,


    bounds.width, bounds.height,


    colorName(fillColor));


    } // draw @end // Circle


    @implementation Rectangle


    // …


    - (void) draw


    {


    NSLog (@"drawing rect at (%d %d %d %d) in %@",


    bounds.x, bounds.y,


    bounds.width, bounds.height,


    colorName(fillColor));


    } // draw @end // Rectangle


    Shapes-Object clearly duplicates a lot of code and behavior between the Circle
    and Rectangle classes. [Figure 4-1](#9781430241881_Ch4.xhtml#_FIG1) is a diagram
    of the classes.


    ![9781430241881_Fig04-01.eps](images/9781430241881_Fig04-01_fmt.jpg)


    [Figure 4-1](#9781430241881_Ch4.xhtml#FIG1). Shapes-Object architecture without
    inheritance


    **Note**  In [Figure 4-1](#9781430241881_Ch4.xhtml#_FIG1), the name of the class
    is at the top of each box. The middle section gives the instance variables, and
    the bottom shows the methods provided by the class. This kind of diagram is defined
    by the Unified Modeling Language (UML), which is a common way to diagram classes,
    their contents, and their relationships.'
  trans: "\n# 第 4 章：继承\n\n下一章我们将介绍继承，这项特性让你能够利用现有对象的行为，从而用更少的代码完成工作。嘿，听起来不错！我们到时候见！\n\
    \n## 继承\n\n当你编写面向对象程序时（我们希望你会编写*大量*这类程序），你创建的类与对象之间会存在相互关系。它们协同工作，让程序实现其功能。\n\n\
    在处理类与对象之间的关系时，面向对象编程有两个最重要的方面。第一个是**继承**，也就是本章的主题。当你创建一个新类时，通常可以根据它相对于另一个已有类的差异来定义这个新类。通过继承，你可以定义一个拥有父类所有能力的类：它*继承*了这些能力。\n\
    \n另一种与相关类配合使用的面向对象编程技术是**组合**，在这种技术中，对象包含对其他对象的引用。例如，赛车模拟器中的汽车对象可能拥有四个轮胎对象，供其游戏过程中使用。当你的对象持有对其他对象的引用时，你就可以利用其他对象提供的功能：这就是组合。我们将在下一章介绍组合。\n\
    \n## 为什么要使用继承？\n\n还记得上一章中我们那位老朋友 Shapes-Object 程序吗？它包含几个具有非常相似接口和实现的类。当然，它们之所以相似，是因为我们是通过复制粘贴来创建的。\n\
    \n我们将通过展示 `Circle` 和 `Rectangle` 类的接口来唤起你的记忆：\n\n```objc\n@interface Circle :\
    \ NSObject\n{\n@private\n    ShapeColor fillColor;\n    ShapeRect bounds;\n}\n\
    - (void) setFillColor:(ShapeColor)fillColor;\n- (void) setBounds:(ShapeRect)bounds;\n\
    - (void) draw;\n@end // Circle\n\n@interface Rectangle : NSObject\n{\n@private\n\
    \    ShapeColor fillColor;\n    ShapeRect bounds;\n}\n- (void) setFillColor:(ShapeColor)fillColor;\n\
    - (void) setBounds:(ShapeRect)bounds;\n- (void) draw;\n@end // Rectangle\n```\n\
    \n这些类的接口非常相似——非常，*非常*相似。事实上，除了类名之外，它们简直是双胞胎。\n\n`Circle` 和 `Rectangle` 的实现也非常相似。回顾上一章，`setFillColor:`\
    \ 和 `setBounds:` 在这两个类中是相同的：\n\n```objc\n@implementation Circle\n- (void)setFillColor:(ShapeColor)c\n\
    {\n    fillColor = c;\n} // setFillColor\n\n- (void)setBounds:(ShapeRect)b\n{\n\
    \    bounds = b;\n} // setBounds\n// …\n@end // Circle\n\n@implementation Rectangle\n\
    - (void) setFillColor: (ShapeColor) c\n{\n    fillColor = c; } // setFillColor\n\
    \n- (void)setBounds:(ShapeRect)b\n{\n    bounds = b;\n} // setBounds\n// …\n@end\
    \ // Rectangle\n```\n\n这些方法完成的工作完全相同；它们设置 `fillColor` 和 `bounds` 实例变量。然而，`Circle`\
    \ 和 `Rectangle` 的实现并不完全相同。例如，`draw` 方法的签名（即方法名和参数）在两个类中相同，但实现不同：\n\n```objc\n\
    @implementation Circle\n// …\n- (void) draw\n{\n    NSLog (@\"drawing a circle\
    \ at (%d %d %d %d) in %@\",\n           bounds.x, bounds.y,\n           bounds.width,\
    \ bounds.height,\n           colorName(fillColor));\n} // draw\n@end // Circle\n\
    \n@implementation Rectangle\n// …\n- (void) draw\n{\n    NSLog (@\"drawing rect\
    \ at (%d %d %d %d) in %@\",\n           bounds.x, bounds.y,\n           bounds.width,\
    \ bounds.height,\n           colorName(fillColor));\n} // draw\n@end // Rectangle\n\
    ```\n\n显然，Shapes-Object 在 `Circle` 和 `Rectangle` 类之间重复了大量代码和行为。图 4-1 是这些类的示意图。\n\
    \n![9781430241881_Fig04-01.eps](img/9781430241881_Fig04-01_fmt.jpg)\n\n图 4-1.\
    \ 无继承的 Shapes-Object 架构\n\n**注意** 在图 4-1 中，类的名称位于每个框的顶部。中间部分给出实例变量，底部显示该类提供的方法。这种图由统一建模语言（UML）定义，是绘制类、其内容及其关系的常用方式。\n"
- fmt: "  \nThere’s a lot of duplication in [Figure 4-1](#9781430241881_Ch4.xhtml#_FIG1),\
    \ and that just smells like inefficiency. When you’re programming, duplication\
    \ like this suggests bad architecture. You have twice as much code to maintain,\
    \ and you have to make changes in two (or more) places when you modify code, which\
    \ greatly increases your chances of introducing errors. If you forget to make\
    \ a change in one of these places, weird bugs can occur.  \n\nWouldn’t it be nice\
    \ if all this duplicated stuff could be consolidated in one place? And it would\
    \ be nicer still if we could maintain the ability to have custom methods where\
    \ we need them, such as when we have to draw circles and rectangles. We need a\
    \ system that allows us to tell the compiler, “The `Circle` class is just like\
    \ this other thing, with a couple of tweaks here and there.” Well, you probably\
    \ already figured out that the powerful OOP feature for exactly this is inheritance.\
    \  \n\n[Figure 4-2](#9781430241881_Ch4.xhtml#_FIG2) shows how our architecture\
    \ looks after we sprinkle in some inheritance. We have created `Shape`, a brand\
    \ new class, to hold the common instance variables and declare the methods. Class\
    \ `Shape` holds the implementation of `setFillColor:` and `setBounds:`.  \n\n\
    ![9781430241881_Fig04-02.eps](images/9781430241881_Fig04-02_fmt.jpg)  \n\n[Figure\
    \ 4-2](#9781430241881_Ch4.xhtml#FIG2). Improved Shapes-Object architecture using\
    \ inheritance  \n\n**Note**  A line with an arrow on the end, as shown in [Figure\
    \ 4-2](#9781430241881_Ch4.xhtml#_FIG2), is the UML way to indicate inheritance.\
    \ This line shows the inheritance relationship between `Circle` and `Shape` and\
    \ between `Rectangle` and `Shape`.  \n\nTake a look (in [Figure 4-2](#9781430241881_Ch4.xhtml#_FIG2))\
    \ at our spiffy new `Circle` and `Rectangle` classes. They’re a lot smaller than\
    \ they were before. All the common elements got pulled up into `Shape`. The only\
    \ things left in `Circle` and `Rectangle` are elements that make them unique,\
    \ the `draw` method in particular. We now say that `Circle` and `Rectangle` *inherit*\
    \ from `Shape`.  \n\nJust as you might have inherited features like your hair\
    \ color, shape of your nose, or your desire to use a Mac from your biological\
    \ parents, inheritance in OOP means that a class acquires features from another\
    \ class, its parent or **superclass**. `Circle` and `Rectangle`, because they\
    \ inherit from `Shape`, pick up `Shape`’s two instance variables.  \n\n**Note**\
    \  Directly changing the value of inherited instance variables is considered bad\
    \ form. Be sure to use methods or properties to change them.  \n\nIn addition\
    \ to instance variables, inheritance also brings methods along for the ride. Every\
    \ `Circle` and every `Rectangle` knows how to respond to `setFillColor:` and `setBounds:`.\
    \ They inherit that ability from class `Shape`.  \n\n## Inheritance Syntax  \n\
    \nLet’s take a look at the syntax we’ve been using to declare a new class: `@interface\
    \ Circle : NSObject`.  \n\nThe identifier following the colon is the class you’re\
    \ inheriting from. You can inherit from no class in Objective-C, but if you’re\
    \ using Cocoa, you’ll want to inherit from `NSObject`, because it provides a lot\
    \ of useful features (you also get those features when you inherit from a class\
    \ that inherits from `NSObject`). We’ll cover more of `NSObject`’s features when\
    \ we talk about memory management in [Chapter 9](#9781430241881_Ch9.xhtml).  \n\
    \n### Inherit the One  \n\nSome languages, such as C++, include a feature called\
    \ *multiple inheritance*, in which a class can inherit directly from two or more\
    \ classes. Objective-C does not support multiple inheritance. If you tried to\
    \ use multiple inheritance in Objective-C, which might look something like the\
    \ following statement, you would make the compiler very unhappy:  \n\n`@interface\
    \ Circle : NSObject, PrintableObject`  \n\nYou can get many of the benefits of\
    \ multiple inheritance by using other features of Objective-C, such as categories\
    \ (see [Chapter 12](#9781430241881_Ch12.xhtml)) and protocols (see [Chapter 13](#9781430241881_Ch13.xhtml)).\
    \  \n\nNow that you’ve discovered inheritance and we’re fixing up our architecture\
    \ so that our classes inherit from `Shape`, the interfaces for `Circle` and `Rectangle`\
    \ change to look like the following listing (you can find the code for this program\
    \ in *04.01 Shapes-Inheritance*):  \n\n```  \n@interface Circle : Shape  \n\n\
    @end // Circle  \n\n@interface Rectangle : Shape  \n\n@end // Rectangle  \n```\
    \  \n\nYou can’t get much simpler than that. When code is simple, bugs have no\
    \ place to hide.  \n\nNotice that we don’t declare the instance variables anymore:\
    \ we get them from `Shape` as part of our inheritance. You’ll notice we didn’t\
    \ include the curly braces for the missing instance variables: if you don’t have\
    \ any ivars, you can omit the braces. We also don’t declare the methods we get\
    \ from `Shape` (`setBounds:` and `setFillColor:`).  \n\nNow, let’s look at the\
    \ code that makes `Shape` do its thing. Here’s the declaration of `Shape`:  \n\
    \n```  \n@interface Shape : NSObject {  \n\nShapeColor fillColor;  \n\nShapeRect\
    \ bounds;  \n\n}  \n\n- (void) setFillColor:(ShapeColor)fillColor;  \n\n- (void)\
    \ setBounds:(ShapeRect)bounds;  \n\n- (void) draw;  \n\n@end // Shape  \n``` \
    \ \n\nYou can see that `Shape` ties up in one neat package all the stuff that\
    \ was duplicated in different classes before.  \n\nThe implementation of `Shape`\
    \ is lovely and unsurprising:  \n\n```  \n@implementation Shape  \n\n- (void)setFillColor:(ShapeColor)c\
    \  \n\n{  \n\nfillColor = c;  \n\n} // setFillColor  \n\n- (void)setBounds:(ShapeRect)b\
    \  \n\n{  \n\nbounds = b;  \n\n} // setBounds  \n\n- (void) draw  \n\n{  \n\n\
    } // draw  \n\n@end // Shape  \n```  \n\nAlthough the `draw` method doesn’t do\
    \ anything, we define it anyway so that all of `Shape`’s subclasses can implement\
    \ their versions. It’s OK to have an empty body, or one that returns a dummy value,\
    \ for a method definition.  \n\nNow, let’s examine the implementation of `Circle`.\
    \ As you probably figured out, it’s a lot simpler now:  \n\n```  \n@implementation\
    \ Circle  \n\n- (void) draw  \n\n{  \n\nNSLog(@\"drawing a circle at (%d %d %d\
    \ %d) in %@\", bounds.x, bounds.y, bounds.width,  \n\nbounds.height, colorName(fillColor));\
    \  \n\n} // draw  \n\n@end // Circle  \n```  \n\nHere’s the new, simplified `Rectangle`\
    \ implementation:  \n\n```  \n@implementation Rectangle  \n\n- (void)draw  \n\n\
    {  \n\nNSLog(@\"drawing rect at (%d %d %d %d) in %@\",  \n\nbounds.x, bounds.y,\
    \  \n\nbounds.width, bounds.height,  \n\ncolorName(fillColor));  \n\n} // draw\
    \  \n\n@end // Rectangle  \n```  \n\nThe `Triangle` and `Egg` classes are similarly\
    \ skinnier. Take a look at the *04.01 Shapes-Inheritance* folder for details.\
    \  \n\nYou can now run `Shapes-Inheritance` and see that it works exactly as it\
    \ did before. Notice this fascinating fact: we didn’t have to touch any of the\
    \ code in `main()` that sets up and uses the objects. That’s because we didn’t\
    \ change which methods the objects respond to, and we didn’t modify their behavior.\
    \  \n\n**Note**  Moving and simplifying code this way is called **refactoring**,\
    \ a subject that is quite trendy in the OOP community. When you refactor, you\
    \ move code around to improve the architecture, as we did here to eliminate duplicate\
    \ code, without changing the code’s behavior or results. A typical development\
    \ cycle involves adding some features to your code and then refactoring to take\
    \ out any duplication.  \n\nYou might be surprised to learn that object-oriented\
    \ programs often become simpler after new features are *added*, which is exactly\
    \ what happened when we added the `Shapes` class.  \n\n## Time Out for Terminology\
    \  \n\nWhat would new technology be without new terms to learn? Here are the words\
    \ you’ll need to be fully inheritance literate:  \n"
