    首先，针对我们要使用的对象，引入必要的`#import`指令：\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    #import \"Car.h\"\n#import \"Garage.h\"\n#import \"Slant6.h\"\n#import \"Tire.h\"\
    \n```\n\n接下来，我们有一个函数，用于根据一系列属性创建一辆汽车。我们本可以在`Car`上创建一个类方法，或者创建某种工厂类，但 Objective-C\
    \ 仍然是 C 语言，因此我们可以使用函数。在这里，我们使用函数，因为它将组装汽车的代码保留在实际使用它的位置附近。\n\n```objectivec\n\
    Car *makeCar (NSString *name, NSString *make, NSString *model, int modelYear,\
    \ int numberOfDoors, float mileage, int horsepower)\n{\n    Car *car = [[[Car\
    \ alloc] init] autorelease];\n\n    car.name = name;\n    car.make = make;\n \
    \   car.model = model;\n    car.modelYear = modelYear;\n    car.numberOfDoors\
    \ = numberOfDoors;\n    car.mileage = mileage;\n\n    Slant6 *engine = [[[Slant6\
    \ alloc] init] autorelease];\n    [engine setValue: [NSNumber numberWithInt: horsepower]\n\
    \              forKey: @\"horsepower\"];\n\n    car.engine = engine;\n\n    //\
    \ 制作一些轮胎。\n    for (int i = 0; i < 4; i++)\n    {\n        Tire * tire= [[[Tire\
    \ alloc] init] autorelease];\n        [car setTire: tire atIndex: i];\n    }\n\
    \n    return (car);\n\n} // makeCar\n```\n\n到目前为止，大部分内容应该都很熟悉了。按照 Cocoa 的惯例，创建一辆新车并自动释放，因为从此函数获取汽车的调用者不会自己调用`new`、`copy`或`alloc`。然后，我们设置一些属性——注意，此技术与\
    \ KVC 不同，因为我们没有使用`setValue:forKey`。接下来，我们制作一个引擎，并使用 KVC 来设置马力，因为我们没有为它创建访问器。最后，我们制作一些轮胎并将其安装到汽车上。最后，返回这辆新车。\n\
    \n以下是`main()`函数的新版本：\n\n```objectivec\nint main (int argc, const char * argv[])\n\
    {\n    @autoreleasepool\n    {\n        Garage *garage = [[Garage alloc] init];\n\
    \n        garage.name = @\"Joe's Garage\";\n\n        Car *car;\n\n        car\
    \ = makeCar (@\"Herbie\", @\"Honda\", @\"CRX\", 1984, 2, 110000, 58);\n      \
    \  [garage addCar: car];\n\n        car = makeCar (@\"Badger\", @\"Acura\", @\"\
    Integra\", 1987, 5, 217036.7, 130);\n        [garage addCar: car];\n\n       \
    \ car = makeCar (@\"Elvis\", @\"Acura\", @\"Legend\", 1989, 4, 28123.4, 151);\n\
    \        [garage addCar: car];\n\n        car = makeCar (@\"Phoenix\", @\"Pontiac\"\
    , @\"Firebird\", 1969, 2, 85128.3, 345);\n        [garage addCar: car];\n\n  \
    \      car = makeCar (@\"Streaker\", @\"Pontiac\", @\"Silver Streak\", 1950, 2,\
    \ 39100.0, 36);\n        [garage addCar: car];\n\n        car = makeCar (@\"Judge\"\
    , @\"Pontiac\", @\"GTO\", 1969, 2, 45132.2, 370);\n        [garage addCar: car];\n\
    \n        car = makeCar (@\"Paper Car\", @\"Plymouth\", @\"Valiant\", 1965, 2,\
    \ 76800, 105);\n        [garage addCar: car];\n\n        [garage print];\n\n \
    \       [garage release];\n    };\n\n    return (0);\n\n} // main\n```\n\n`main()`执行一些簿记工作，创建一个车库，并构建一个小型车队存放在其中。最后，它打印出车库的内容，然后释放它。\n\
    \n运行程序会得到以下激动人心的输出：\n\n```\nJoe's Garage:\nHerbie, a 1984 Honda CRX, has 2 doors,\
    \ 110000.0 miles, 58 hp and 4 tires\nBadger, a 1987 Acura Integra, has 5 doors,\
    \ 217036.7 miles, 130 hp and 4 tires\nElvis, a 1989 Acura Legend, has 4 doors,\
    \ 28123.4 miles, 151 hp and 4 tires\nPhoenix, a 1969 Pontiac Firebird, has 2 doors,\
    \ 85128.3 miles, 345 hp and 4 tires\nStreaker, a 1950 Pontiac Silver Streak, has\
    \ 2 doors, 39100.0 miles, 36 hp and 4 tires\nJudge, a 1969 Pontiac GTO, has 2\
    \ doors, 45132.2 miles, 370 hp and 4 tires\nPaper Car, a 1965 Plymouth Valiant,\
    \ has 2 doors, 76800.0 miles, 105 hp and 4 tires\n```\n\n现在，我们为接下来要介绍的键值便利特性奠定了基础。\n\
    \n顺畅运行\n"
- fmt: "# Key Paths and Operators\n\nKey paths can refer to more than object values.\
    \ A handful of operators can be stuck into the key paths to do things like getting\
    \ the average of an array of values or returning the minimum and maximum of those\
    \ values.\n\nFor example, here’s how we count the number of cars:\n\n```\nNSNumber\
    \ *count;\ncount = [garage valueForKeyPath: @\"cars.@count\"];\nNSLog (@\"We have\
    \ %@ cars\", count);\n```\n\nWhen we run this, it prints out:\n\n```\nWe have\
    \ 7 cars\n```\n\nLet’s pull apart this key path, `\"cars.@count\"`. `cars` says\
    \ to get the `cars` property, which we know is an `NSArray`, from `garage`. Well,\
    \ OK, we know it’s an `NSMutableArray`, but we can consider it just to be an `NSArray`\
    \ if we’re not planning on changing anything. The next thing is `@count`. The\
    \ at sign, as you know, is a signal that there’s some magic coming up. For the\
    \ compiler, `@\"blah\"` is a string, and `@interface` is the introduction for\
    \ a class. Here, `@count` tells the KVC machinery to take the count of the result\
    \ of the left-hand part of the key path.\n\nWe can also get the sum of a particular\
    \ value, like the total number of miles our fleet has covered. The following snippet:\n\
    \n```\nNSNumber *sum;\nsum = [garage valueForKeyPath: @\"cars.@sum.mileage\"];\n\
    NSLog (@\"We have a grand total of %@ miles\", sum);\n```\n\nprints out:\n\n```\n\
    We have a grand total of 601320.6 miles\n```\n\nwhich gets us from the Earth to\
    \ the moon and back, with some spare change.\n\nSo how does this work? The `@sum`\
    \ operator breaks the key path into two parts. The first part is treated as a\
    \ key path to some to-many relationship, the `cars` array in this case. The other\
    \ part is treated like any key path that has a to-many relationship in the middle.\
    \ It is treated as a key path used against each object in the relationship. So\
    \ `mileage` is sent to every object in the relationship described by `cars`, and\
    \ the resulting values are added up. Of course, each of these key paths can be\
    \ of arbitrary length.\n\nIf we wanted to find out the average mileage per car,\
    \ we can divide this sum by the count. But there’s an easier way—the following\
    \ lines:\n\n```\nNSNumber *avgMileage;\navgMileage = [garage valueForKeyPath:\
    \ @\"cars.@avg.mileage\"];\nNSLog (@\"average is %.2f\", [avgMileage floatValue]);\n\
    ```\n\nprint out:\n\n```\naverage is 85902.95\n```\n\nPretty simple, huh? Without\
    \ all this key-value goodness, we’d have to write a loop over the cars (assuming\
    \ we could even get hold of the `cars` array from the `garage`), ask each car\
    \ for its `mileage`, accumulate that into a sum, and then divide by the count\
    \ of cars—not hard stuff but still a small pile of code.\n\nLet’s pull apart the\
    \ key path we used this time: `\"cars.@avg.mileage\"`. Like `@sum`, the `@avg`\
    \ operator splits the key path into two parts: the part that comes before it (`cars`\
    \ in this case) is a key path to the to-many relation for cars. The part after\
    \ `@sum` is another key path, which is just the `mileage`. Under the hood, KVC\
    \ happily spins a loop, adds up the values, keeps a count, and does the division.\n\
    \nThere are also `@min` and `@max` operators, which do the obvious things:\n\n\
    ```\nNSNumber *min, *max;\nmin = [garage valueForKeyPath: @\"cars.@min.mileage\"\
    ];\nmax = [garage valueForKeyPath: @\"cars.@max.mileage\"];\nNSLog (@\"minimax:\
    \ %@ / %@\", min, max);\n```\n\nwith the result of:\n\n```\nminimax: 28123.4 /\
    \ 217036.7\n```\n\n## KVC Is Not for Free\n\nKVC makes digging around in collections\
    \ pretty easy. So why not use KVC for everything, then, and forget about accessor\
    \ methods and writing code? There’s never a free lunch, unless you work at some\
    \ of the wilder Silicon Valley technology companies. KVC is necessarily slower,\
    \ because it needs to parse strings to figure out what it is you want. There is\
    \ also no error checking by the compiler. You might ask for `karz.@avg.millage`:\
    \ the compiler has no idea that’s a bad key path, and you’ll get a runtime error\
    \ when you try to use it.\n\nSometimes, you have an attribute that can take on\
    \ only a small set of values, like the make of all of the cars. Even if we had\
    \ a million cars, we would have a small number of unique makes. You can get just\
    \ the makes from your collection with the key path `\"cars.@distinctUnionOfObjects.make\"\
    `:\n\n```\nNSArray *manufacturers;\nmanufacturers = [garage valueForKeyPath: @\"\
    cars.@distinctUnionOfObjects.make\"];\nNSLog (@\"makers: %@\", manufacturers);\n\
    ```\n\nWhen the preceding code is run, you get this:\n\n```\nmakers: (\n    Honda,\n\
    \    Plymouth,\n    Pontiac,\n    Acura\n)\n```\n\nThe operator there in the middle\
    \ of this key path, with the distinctly scary name of `\"@distinctUnionOfObjects\"\
    `, does just what it says. It applies the same logic as the other operators: it\
    \ takes the collection specified on the left and uses the key path on the right\
    \ against each object of that collection, then turns the resulting values into\
    \ a collection. The “union” part of the name refers to taking the union of a bunch\
    \ of objects. The “distinct” part of the name weeds out all of the duplicates.\
    \ There are a couple other operators along the lines of this one, but we’ll leave\
    \ them for you to discover. Also, you can’t add your own operators. Bummer.\n\n\
    ## Life’s a Batch\n\nKVC has a pair of calls that let you make batch changes to\
    \ objects. The first is `dictionaryWithValuesForKeys:`. You give it an array of\
    \ strings. The call takes the keys, uses `valueForKey:` with each of the keys,\
    \ and builds a dictionary with the key strings and the values it just got.\n\n\
    Let’s pick a car from the garage and get a dictionary of some of its attributes:\n\
    \n```\ncar = [[garage valueForKeyPath: @\"cars\"] lastObject];\nNSArray *keys\
    \ = [NSArray arrayWithObjects: @\"make\", @\"model\",\n                 @\"modelYear\"\
    , nil];\nNSDictionary *carValues = [car dictionaryWithValuesForKeys: keys];\n\
    NSLog (@\"Car values : %@\", carValues);\n```\n\nRunning this gives us some information\
    \ from Paper Car:\n\n```\nCar values : {\n    make = Plymouth;\n    model = Valiant;\n\
    \    modelYear = 1965;\n}\n```\n\nAnd we can change these values turning our Valiant\
    \ into something new and (arguably) improved—a Chevy Nova:\n\n```\nNSDictionary\
    \ *newValues =\n    [NSDictionary dictionaryWithObjectsAndKeys:\n     @\"Chevy\"\
    , @\"make\",\n     @\"Nova\", @\"model\",\n     [NSNumber numberWithInt:1964],\
    \ @\"modelYear\",\n     nil];\n[car setValuesForKeysWithDictionary: newValues];\n\
    NSLog (@\"car with new values is %@\", car);\n```\n\nAnd after we run these lines\
    \ of code, we see it’s actually a new car:\n\n```\ncar with new values is Paper\
    \ Car, a 1964 Chevy Nova, has 2 doors, 76800.0 miles, and 4 tires.\n```\n\nNotice\
    \ that some values have changed (`make`, `model`, and year), but others haven’t,\
    \ like the name and mileage.\n\nThis tool isn’t terribly useful for this program,\
    \ but it allows you to do some nifty tricks in user interface code. For example,\
    \ you could have something like Apple’s Aperture Lift and Stamp tool, which lets\
    \ you move some, but not all, alterations you made to a picture onto other pictures.\
    \ You could lift all of the attributes using `dictionaryWithValuesForKeys` and\
    \ let the contents of the dictionary drive all the stuff displayed in the user\
    \ interface. The user can take stuff out of the dictionary and then use this modified\
    \ dictionary to change the other pictures using `setValuesForKeysWithDictionary`.\
    \ If you design your user interface classes the right way, you can use the same\
    \ lift and stamp panel with disparate things like photos, cars, and recipes.\n\
    \nYou might wonder what happens with `nil` values, such as a car with no name,\
    \ because dictionaries can’t contain `nil` values. Think back to [Chapter 7](#9781430241881_Ch7.xhtml),\
    \ where `[NSNull null]` is used to represent `nil` values. The same thing happens\
    \ here. For a no-name car, `[NSNull null]` will be returned under the `@\"name\"\
    ` when you call `dictionaryWithValuesForKeys`, and you can supply `[NSNull null]`\
    \ for a `setValuesForKeysWithDictionary` to do the same, but in reverse.\n\n##\
    \ The Nils Are Alive\n\nThis discussion of `nil` values brings up an interesting\
    \ question. What does “nil” mean for a scalar value, like for mileage. Is it zero?\
    \ Is it –1? Is it pi? There’s no way for Cocoa to know. You can try like this:\n\
    \n```\n[car setValue: nil forKey: @\"mileage\"];\n```\n\nBut Cocoa gives you the\
    \ smack-down:\n\n```\n'[<Car 0x105740> setNilValueForKey]: could not set nil as\
    \ the value for the key mileage.'\n```"
