    但有时，子类化并不方便。例如，你可能想为 `NSString` 添加一些新行为，但你知道 `NSString` 实际上是类簇的前端，这使得子类化变得困难。在其他情况下，你或许能够创建子类，但你使用的工具包或库可能无法处理新类的对象。例如，当你使用
    `stringWithFormat:` 类方法创建新字符串时，你的 `NSString` 子类并不会被返回。


    Objective-C 采用的动态运行时派发机制允许你向现有类添加方法。嘿，听起来很不错！这些新方法在 Objective-C 中被称为**分类（Categories）**。


    ## 创建分类


    分类是一种向现有类添加新方法的方式。想给某个类添加新方法？放手去做吧！你可以对任何类执行此操作，甚至包括你没有源代码的类。


    例如，假设你正在编写一个填字游戏程序，它会接收一系列字符串，计算每个字符串的长度，并将这些长度放入 `NSArray` 或 `NSDictionary` 中。在将每个长度值添加到
    `NSArray` 或 `NSDictionary` 之前，你需要先将其包装成 `NSNumber` 对象。


    你可以编写如下代码：


    ```

    NSNumber *number;


    number = [NSNumber numberWithUnsignedInt: [string length]];


    // ……对 number 进行某些操作

    ```


    但这很快就会变得繁琐。相反，你可以为 `NSString` 添加一个替你完成此任务的分类。事实上，我们现在就这么做。`LengthAsNSNumber` 项目位于
    *12.01 LengthAsNSNumber* 项目目录中，其中包含了向 `NSString` 添加此类分类的代码。


    程序员通常将分类放在单独的文件中，文件名通常遵循 *ClassName+CategoryName* 的格式。因此，在我们的例子中，文件名将是 *NSString+NumberConvenience*。这不是强制要求，但这是一个好习惯。


    ## 让我们来创建一个分类


    Xcode 让添加分类变得非常简单。它甚至根据我们刚才描述的约定，自动为文件正确命名。


