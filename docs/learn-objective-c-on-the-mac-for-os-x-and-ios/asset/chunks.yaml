    \ Count-3[26596:903] 1\n2012-01-21 12:16:51.447 03.03 Count-3[26596:903] 2\n2012-01-21\
    \ 12:16:51.448 03.03 Count-3[26596:903] 3\n2012-01-21 12:16:51.449 03.03 Count-3[26596:903]\
    \ 4\n2012-01-21 12:16:51.449 03.03 Count-3[26596:903] 5\n```\n\n**注意**  `NSLog()`的时间戳和其他信息占用了大量篇幅，为了清晰起见，我们将在后续的代码列表中省略这些信息。\n\
    \n如果你想打印数字1到100，只需在代码中一个显而易见的地方做修改：\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n    int count = 100;\n    NSLog\
    \ (@\"The numbers from 1 to %d:\", count);\n    for (int i = 1; i <= count; i++)\
    \ {\n        NSLog (@\"%d\\n\", i);\n    }\n    return (0);\n} // main\n```\n\n\
    通过添加一个变量，我们的代码现在更加清晰，也更易于扩展，尤其是在其他程序员需要修改代码时。要更改循环的值，他们不必仔细检查每个用到数字5的地方，以确定是否需要修改。相反，他们只需修改`count`变量即可得到想要的结果。\n\
    \n## 通过文件名的间接\n\n文件提供了另一个间接的例子。考虑`Word-Length-1`，这是一个打印单词列表及其长度的程序；它位于*03.04 Word-Length-1*文件夹中。这个至关重要的程序是你新成立的Web\
    \ 2.0创业公司Length-o-words.com的关键技术。以下是代码清单：\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n    const char *words[4] = { \"\
    aardvark\", \"abacus\",\n                             \"allude\", \"zygote\" };\n\
    \    int wordCount = 4;\n    for (int i = 0; i < wordCount; i++) {\n        NSLog\
    \ (@\"%s is %lu characters long\", words[i], strlen(words[i]));\n    }\n    return\
    \ (0);\n} // main\n```\n\n`for`循环决定在任何时候处理`words`数组中的哪个单词。循环内的`NSLog()`函数使用`%s`格式说明符打印出单词。我们使用`%s`，因为`words`是C字符串的数组，而不是`@\"\
    NSString\"`对象的数组。`%lu`格式说明符接收`strlen()`函数的整数值，该函数计算字符串的长度，并将其与单词本身一起打印出来。\n\n\
    当你运行`Word-Length-1`时，会看到类似下面这样的信息输出：\n\n```\naardvark is 8 characters long\nabacus\
    \ is 6 characters long\nallude is 6 characters long\nzygote is 6 characters long\n\
    ```\n\n**注意**  再次强调，我们省略了`NSLog()`在`Word-Length-1`输出中添加的时间戳和进程ID。\n\n现在，假设投资Length-o-words.com的风险资本家希望你使用另一组不同的单词。他们仔细审查了你的商业计划，并得出结论，如果你使用乡村音乐明星的名字，你可以销售给更广阔的市场。"
  raw: 'An old saying in programming goes something like this, “There is no problem
    in computer science that can’t be solved by adding another level of indirection.”
    **Indirection** is a fancy word with a simple meaning—instead of using a value
    directly in your code, use a pointer to the value. Here’s a real-world example:
    you might not know the phone number of your favorite pizza place, but you know
    that you can look in the phone book to find it. Using the phone book like this
    is a form of indirection.


    Indirection can also mean that you ask another person to do something rather than
    doing it yourself. Let’s say you have a box of books to return to your friend
    Andrew who lives across town. You know that your next-door neighbor is going to
    visit Andrew tonight. Rather than driving across town, dropping off the books,
    and driving back, you ask your friendly neighbor to deliver the box. This is another
    kind of indirection: you have someone else do the work instead of doing it yourself.


    In programming, you can take indirection to multiple levels, writing code that
    consults other code, which accesses yet another level of code. You’ve probably
    had the experience of calling a technical support line. You explain your problem
    to the support person, who then directs you to the specific department that can
    handle your problem. The person there then directs you to the second-level technician
    with the skills to help you out. And if you’re like us, at this point, you find
    out you called the wrong number, and you have to be transferred to some other
    department for help. This runaround is a form of indirection. Luckily, computers
    have infinite patience and can handle being sent from place to place to place
    looking for an answer.


    Variables and Indirection


    You might be surprised to find out that you have already used indirection in your
    programs. The humble variable is a real-world use of indirection. Consider this
    small program that prints the numbers from one to five. You can find this program
    in the *Learn ObjC Projects* folder, in *03.01 Count-1*:


    #import <Foundation/Foundation.h>


    int main (int argc, const char *argv[])


    {


    NSLog (@"The numbers from 1 to 5:");


    for (int i = 1; i <= 5; i++) {


    NSLog (@"%d\n", i);


    }


    return (0);


    } // main


    Count-1 has a for loop that runs five times, using NSLog() to display the value
    of i each time around. When you run this program, you see output like this:


    2012-01-21 11:52:01.940 03.01 Count-1[26429:903] The numbers from 1 to 5:


    2012-01-21 11:52:01.943 03.01 Count-1[26429:903] 1


    2012-01-21 11:52:01.944 03.01 Count-1[26429:903] 2


    2012-01-21 11:52:01.944 03.01 Count-1[26429:903] 3


    2012-01-21 11:52:01.945 03.01 Count-1[26429:903] 4


    2012-01-21 11:52:01.947 03.01 Count-1[26429:903] 5


    Now, suppose you want to upgrade your program to print the numbers from one to
    ten. You have to edit your code in two places, which are highlighted in bold in
    the following listing, and then rebuild the program (this version is in the folder
    *03.02 Count-2*):


    #import <Foundation/Foundation.h>


    int main (int argc, const char * argv[])


    {


    NSLog (@"The numbers from 1 to 10:");


    for (int i = 1; i <= 10; i++) {


    NSLog (@"%d\n", i);


    }


    return (0);


    } // main


    Count-2 produces this output:


    2012-01-21 12:03:13.433 03.02 Count-2[26507:903] The numbers from 1 to 10:


    2012-01-21 12:03:13.435 03.02 Count-2[26507:903] 1


    2012-01-21 12:03:13.436 03.02 Count-2[26507:903] 2


    2012-01-21 12:03:13.436 03.02 Count-2[26507:903] 3


    2012-01-21 12:03:13.437 03.02 Count-2[26507:903] 4


    2012-01-21 12:03:13.437 03.02 Count-2[26507:903] 5


    2012-01-21 12:03:13.438 03.02 Count-2[26507:903] 6


    2012-01-21 12:03:13.438 03.02 Count-2[26507:903] 7


    2012-01-21 12:03:13.438 03.02 Count-2[26507:903] 8


    2012-01-21 12:03:13.439 03.02 Count-2[26507:903] 9


    2012-01-21 12:03:13.439 03.02 Count-2[26507:903] 10


    Modifying the program in this way is obviously not a very tricky change to make:
    you can do it with a simple search-and-replace action, and only two places need
    to be changed. However, doing a similar search and replace in a larger program,
    consisting of, say, tens of thousands of lines of code would be a lot trickier.
    We would have to be careful about simply replacing 5 with 10: no doubt, there
    would be some instances of the number five that aren’t related to this and so
    shouldn’t be changed to ten.


    Solving this problem is what variables are for. Rather than sticking the upper
    loop value (five or ten) directly in the code, we can solve this problem by putting
    the number in a variable, thus adding a layer of indirection. When you add the
    variable, instead of telling the program to “go through the loop five times,”
    you’re telling it to “go look in this variable named count, which will say how
    many times to run the loop.” Now, the program is called Count-3 and looks like
    this:


    #import <Foundation/Foundation.h>


    int main (int argc, const char * argv[])


    {


    int count = 5;


    NSLog (@"The numbers from 1 to %d:", count);


    for (int i = 1; i <= count; i++) {


    NSLog (@"%d\n", i);


    }


    return (0);


    } // main


    The program’s output should be unsurprising:


    2012-01-21 12:16:51.442 03.03 Count-3[26596:903] The numbers from 1 to 5:


    2012-01-21 12:16:51.446 03.03 Count-3[26596:903] 1


    2012-01-21 12:16:51.447 03.03 Count-3[26596:903] 2


    2012-01-21 12:16:51.448 03.03 Count-3[26596:903] 3


    2012-01-21 12:16:51.449 03.03 Count-3[26596:903] 4


    2012-01-21 12:16:51.449 03.03 Count-3[26596:903] 5


    **Note**  The NSLog() time stamp and other information take up a lot of space,
    so for clarity, we’ll leave that information out of future listings.


    If you want to print the numbers from 1 to 100, you just have to touch the code
    in one obvious place:


    #import <Foundation/Foundation.h>


    int main (int argc, const char * argv[])


    {


    int count = 100;


    NSLog (@"The numbers from 1 to %d:", count);


    for (int i = 1; i <= count; i++) {


    NSLog (@"%d\n", i);


    }


    return (0);


    } // main


    By adding a variable, our code is now much cleaner and easier to extend, especially
    when other programmers need to change the code. To change the loop values, they
    won’t have to scrutinize every use of the number five to see if they need to modify
    it. Instead, they can just change the count variable to get the result they want.


    Indirection Through Filenames


    Files provide another example of indirection. Consider Word-Length-1, a program
    that prints a list of words along with their lengths; it is in the *03.04 Word-Length-1*
    folder. This vital program is the key technology for your new Web 2.0 start-up,
    Length-o-words.com. Here’s the listing:


    #import <Foundation/Foundation.h>


    int main (int argc, const char * argv[])


    {


    const char *words[4] = { "aardvark", "abacus",


    "allude", "zygote" };


    int wordCount = 4;


    for (int i = 0; i < wordCount; i++) {


    NSLog (@"%s is %lu characters long", words[i], strlen(words[i]));


    }


    return (0);


    } // main


    The for loop determines which word in the words array is being processed at any
    time. The NSLog() function inside the loop prints out the word using the %s format
    specifier. We use %s, because words is an array of C strings rather than of @"NSString"
    objects. The %lu format specifier takes the integer value of the strlen() function,
    which calculates the length of the string, and prints it out along with the word
    itself.


    When you run Word-Length-1, you see informative output like this:


    aardvark is 8 characters long


    abacus is 6 characters long


    allude is 6 characters long


    zygote is 6 characters long


    **Note**  Once again, we’re leaving out the time stamp and process ID that NSLog()
    adds to the output of Word-Length-1.


    Now, suppose the venture capitalists investing in Length-o-words.com want you
    to use a different set of words. They’ve scrutinized your business plan and have
    concluded that you can sell to a broader market if you use the names of country
    music stars.'
  trans: "\n编程界有句老话说：“计算机科学中的任何问题，都可以通过增加一个间接层来解决。”**间接**（Indirection）是一个听起来高大上但含义简单的词——不要在你的代码中直接使用某个值，而是使用指向该值的指针。这里有一个现实世界的例子：你可能不知道最喜欢的披萨店的电话号码，但你知道可以在电话簿上找到它。像这样使用电话簿就是一种间接形式。\n\
    \n间接也可以指，你请另一个人去做某事，而不是自己动手。假设你有一箱书要还给住在镇另一边的朋友 Andrew。你知道你的邻居今晚正好要去拜访 Andrew。与其自己开车穿越小镇，放下书再开回来，不如请你的好邻居帮忙运送这箱书。这是另一种间接：你让别人替你完成工作，而不是你亲自去做。\n\
    \n在编程中，你可以将间接应用到多个层级，编写调用其他代码的代码，而其他代码又去访问另一层代码。你可能有过拨打技术支持热线的经历。你向支持人员解释问题，对方会将你转接到具体的职能部门。那里的工作人员再把你转接到具备相应技能的二线技术人员那里。如果你和我们一样，到了这一步，你可能会发现自己打错了号码，不得不被转接到其他部门寻求帮助。这种“踢皮球”就是一种间接形式。幸运的是，计算机有无限的耐心，可以承受被从一个地方转到另一个地方，去寻找答案。\n\
    \n## 变量与间接\n\n你可能会惊讶地发现，你已经在程序中使用过间接了。不起眼的变量就是间接的一个现实应用。考虑下面这个打印数字 1 到 5 的小程序。你可以在*Learn\
    \ ObjC Projects*文件夹中的*03.01 Count-1*目录下找到它：\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char *argv[])\n{\n    NSLog (@\"The numbers from 1\
    \ to 5:\");\n    for (int i = 1; i <= 5; i++) {\n        NSLog (@\"%d\\n\", i);\n\
    \    }\n    return (0);\n} // main\n```\n\n`Count-1`有一个`for`循环，它运行五次，每次循环都使用`NSLog()`显示`i`的值。当你运行这个程序时，会看到类似如下的输出：\n\
    \n```\n2012-01-21 11:52:01.940 03.01 Count-1[26429:903] The numbers from 1 to\
    \ 5:\n2012-01-21 11:52:01.943 03.01 Count-1[26429:903] 1\n2012-01-21 11:52:01.944\
    \ 03.01 Count-1[26429:903] 2\n2012-01-21 11:52:01.944 03.01 Count-1[26429:903]\
    \ 3\n2012-01-21 11:52:01.945 03.01 Count-1[26429:903] 4\n2012-01-21 11:52:01.947\
    \ 03.01 Count-1[26429:903] 5\n```\n\n现在，假设你想升级程序，让它打印数字 1 到 10。你需要修改代码中的两处地方（在下面的列表中已加粗显示），然后重建程序（此版本在*03.02\
    \ Count-2*文件夹中）：\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int argc,\
    \ const char * argv[])\n{\n    NSLog (@\"The numbers from 1 to 10:\");\n    for\
    \ (int i = 1; i <= 10; i++) {\n        NSLog (@\"%d\\n\", i);\n    }\n    return\
    \ (0);\n} // main\n```\n\n`Count-2`的输出如下：\n\n```\n2012-01-21 12:03:13.433 03.02\
    \ Count-2[26507:903] The numbers from 1 to 10:\n2012-01-21 12:03:13.435 03.02\
    \ Count-2[26507:903] 1\n2012-01-21 12:03:13.436 03.02 Count-2[26507:903] 2\n2012-01-21\
    \ 12:03:13.436 03.02 Count-2[26507:903] 3\n2012-01-21 12:03:13.437 03.02 Count-2[26507:903]\
    \ 4\n2012-01-21 12:03:13.437 03.02 Count-2[26507:903] 5\n2012-01-21 12:03:13.438\
    \ 03.02 Count-2[26507:903] 6\n2012-01-21 12:03:13.438 03.02 Count-2[26507:903]\
    \ 7\n2012-01-21 12:03:13.438 03.02 Count-2[26507:903] 8\n2012-01-21 12:03:13.439\
    \ 03.02 Count-2[26507:903] 9\n2012-01-21 12:03:13.439 03.02 Count-2[26507:903]\
    \ 10\n```\n\n以这种方式修改程序显然不是什么棘手的改动：你可以通过简单的查找替换操作完成，而且只需要修改两处。然而，在由数万行代码组成的大型程序中执行类似的查找替换就会困难得多。我们必须非常小心地对待仅仅将\
    \ 5 替换为 10 的操作：毫无疑问，有些数字 5 的实例与此无关，因此不应该被改为 10。\n\n变量正是用来解决这个问题的。与其直接将循环上限值（5\
    \ 或 10）硬编码到代码中，我们可以通过把数字放入一个变量来解决问题，从而增加了一个间接层。当你添加变量后，你不再告诉程序“循环 5 次”，而是告诉它“去查看名为`count`的变量，它会说明要运行多少次循环”。现在，这个程序叫做`Count-3`，如下所示：\n\
    \n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
    {\n    int count = 5;\n    NSLog (@\"The numbers from 1 to %d:\", count);\n  \
    \  for (int i = 1; i <= count; i++) {\n        NSLog (@\"%d\\n\", i);\n    }\n\
    \    return (0);\n} // main\n```\n\n程序的输出应该毫无意外：\n\n```\n2012-01-21 12:16:51.442\
    \ 03.03 Count-3[26596:903] The numbers from 1 to 5:\n2012-01-21 12:16:51.446 03.03\
    \ Count-3[26596:903] 1\n2012-01-21 12:16:51.447 03.03 Count-3[26596:903] 2\n2012-01-21\
    \ 12:16:51.448 03.03 Count-3[26596:903] 3\n2012-01-21 12:16:51.449 03.03 Count-3[26596:903]\
    \ 4\n2012-01-21 12:16:51.449 03.03 Count-3[26596:903] 5\n```\n\n**注意**  `NSLog()`的时间戳和其他信息占用了大量篇幅，为了清晰起见，我们将在后续的代码列表中省略这些信息。\n\
    \n如果你想打印数字 1 到 100，只需在代码中一个显而易见的地方做修改：\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n    int count = 100;\n    NSLog\
    \ (@\"The numbers from 1 to %d:\", count);\n    for (int i = 1; i <= count; i++)\
    \ {\n        NSLog (@\"%d\\n\", i);\n    }\n    return (0);\n} // main\n```\n\n\
    通过添加一个变量，我们的代码现在更加清晰，也更易于扩展，尤其是在其他程序员需要修改代码时。要更改循环的值，他们不必仔细检查每个用到数字 5 的地方，以确定是否需要修改。相反，他们只需修改`count`变量即可得到想要的结果。\n\
    \n## 通过文件名的间接\n\n文件提供了另一个间接的例子。考虑`Word-Length-1`，这是一个打印单词列表及其长度的程序；它位于*03.04 Word-Length-1*文件夹中。这个至关重要的程序是你新成立的\
    \ Web 2.0 创业公司 Length-o-words.com 的关键技术。以下是代码清单：\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n    const char *words[4] = { \"\
    aardvark\", \"abacus\",\n                             \"allude\", \"zygote\" };\n\
    \    int wordCount = 4;\n    for (int i = 0; i < wordCount; i++) {\n        NSLog\
    \ (@\"%s is %lu characters long\", words[i], strlen(words[i]));\n    }\n    return\
    \ (0);\n} // main\n```\n\n`for`循环决定在任何时候处理`words`数组中的哪个单词。循环内的`NSLog()`函数使用`%s`格式说明符打印出单词。我们使用`%s`，因为`words`是\
    \ C 字符串的数组，而不是`@\"NSString\"`对象的数组。`%lu`格式说明符接收`strlen()`函数的整数值，该函数计算字符串的长度，并将其与单词本身一起打印出来。\n\
    \n当你运行`Word-Length-1`时，会看到类似下面这样的信息输出：\n\n```\naardvark is 8 characters long\n\
    abacus is 6 characters long\nallude is 6 characters long\nzygote is 6 characters\
    \ long\n```\n\n**注意**  再次强调，我们省略了`NSLog()`在`Word-Length-1`输出中添加的时间戳和进程 ID。\n\n\
    现在，假设投资 Length-o-words.com 的风险资本家希望你使用另一组不同的单词。他们仔细审查了你的商业计划，并得出结论，如果你使用乡村音乐明星的名字，你可以销售给更广阔的市场。\n"
- fmt: '# 排版后的文本


    Because we stored the words directly in the program, we have to edit the source,
    replacing the original word list with the new names. When we edit, we have to
    be careful with the punctuation, such as the quotes in Joe Bob’s name and the
    commas between entries. Here is the updated program, which can be found in the
    `03.05 Word-Length-2` folder:


    ```

    #import <Foundation/Foundation.h>


    int main (int argc, const char * argv[])


    {


    const char *words[4] = { "Joe-Bob \"Handyman\" Brown",


    "Jacksonville \"Sly\" Murphy",


    "Shinara Bain",


    "George \"Guitar\" Books" };


    int wordCount = 4;


    for (int i = 0; i < wordCount; i++) {


    NSLog (@"%s is %lu characters long", words[i], strlen(words[i]));


    }


    return (0);


    } // main

    ```


    Because we were careful with the surgery, the program still works as we expect
    (note that spaces and punctuation count as characters):


    ```

    Joe-Bob "Handyman" Brown is 24 characters long

    Jacksonville "Sly" Murphy is 25 characters long

    Shinara Bain is 12 characters long

    George "Guitar" Books is 21 characters long

    ```


    Making this change required entirely too much work: we had to edit `Word-Length-2.m`,
    fix any typos, and then rebuild the program. If the program runs on a web site,
    we then have to retest and redeploy the program to upgrade to `Word-Length-2`.


    Another way to construct this program is to move the names completely out of the
    code and put them all into a text file, one name on each line. Let’s all say it
    together: this is indirection. Rather than putting the names directly in the source
    code, the program looks for the names elsewhere. The program reads a list of names
    from a text file and proceeds to print them out, along with their lengths. The
    project files for this new program live in the `03.06 Word-Length-3` folder, and
    the code looks like this:


    ```

    #import <Foundation/Foundation.h>


    int main (int argc, const char * argv[])


    {


    FILE *wordFile = fopen ("/tmp/words.txt", "r");


    char word[100];


    while (fgets(word, 100, wordFile))


    {


    // strip off the trailing \n


    word[strlen(word) - 1] = ''\0'';


    NSLog (@"%s is %lu characters long", word, strlen(word));


    }


    fclose (wordFile);


    return (0);


    } // main

    ```


    Let’s stroll through `Word-Length-3` and see what it’s doing. First, `fopen()`
    opens the `words.txt` file for reading. Next, `fgets()` reads a line of text from
    the file and places it into `word`. The `fgets()` call preserves the newline character
    that separates each line, but we really don’t want it: if we leave it, it will
    be counted as a character in the word. To fix this, we replace the newline character
    with a zero, which indicates the end of the string. Finally, we use our old friend
    `NSLog()` to print out the word and its length.


    **Note** Take a look at the path name we used with `fopen()`. It’s `/tmp/words.txt`.
    This means that `words.txt` is a file that lives in the `/tmp` directory, the
    Unix temporary directory, which gets emptied when the computer reboots. You can
    use `/tmp` to store scratch files that you want to mess around with but really
    don’t care about keeping. For a real, live program, you’d put your file in a more
    permanent location, such as the home directory.


    Before you run the program, use your text editor to create the file `words.txt`
    in the `/tmp` directory. Type the following names into the file:


    ```

    Joe-Bob "Handyman" Brown

    Jacksonville "Sly" Murphy

