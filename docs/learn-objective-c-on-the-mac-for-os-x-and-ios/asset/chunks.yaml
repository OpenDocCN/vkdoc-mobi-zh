- fmt: "No code is created perfect. You can always make improvements. Think back to\
    \ the `main()` function and how we created the tires:\n\n```\ntire = [[Tire alloc]\
    \ init];\n[tire setPressure: 23 + i];\n[tire setTreadDepth: 33 - i];\n```\n\n\
    That’s four message sends and three lines of code. Doing that in one operation\
    \ would be nice. Let’s make a convenience initializer that takes both the pressure\
    \ and tread depth at the same time. Here’s `Tire` with a convenience initializer\
    \ added (in bold):\n\n```\n@interface Tire : NSObject\n{\n    float pressure;\n\
    \    float treadDepth;\n}\n- (id) initWithPressure: (float) pressure\n       \
    \      treadDepth: (float) treadDepth;\n- (void) setPressure: (float) pressure;\n\
    - (float) pressure;\n- (void) setTreadDepth: (float) treadDepth;\n- (float) treadDepth;\n\
    @end // Tire\n```\n\nThe implementation of that method is pretty plain, with no\
    \ new surprises:\n\n```\n- (id) initWithPressure: (float) p treadDepth: (float)\
    \ td\n{\n    if (self = [super init]) {\n        pressure = p;\n        treadDepth\
    \ = td;\n    }\n    return (self);\n} // initWithPressure:treadDepth:\n```\n\n\
    Now, allocating and initializing a tire is a single-step operation:\n\n```\nTire\
    \ *tire;\ntire = [[Tire alloc]\n        initWithPressure: 23 + i\n           \
    \   treadDepth: 33 - i];\n```\n\n## The Designated Initializer\n\nUnfortunately,\
    \ not all is well in initialization land. A couple of subtleties crop up when\
    \ we start adding convenience initializers. Let’s add two more convenience initializers\
    \ to `Tire`:\n\n```\n@interface Tire : NSObject\n{\n    float pressure;\n    float\
    \ treadDepth;\n}\n- (id) initWithPressure: (float) pressure;\n- (id) initWithTreadDepth:\
    \ (float) treadDepth;\n- (id) initWithPressure: (float) pressure treadDepth: (float)\
