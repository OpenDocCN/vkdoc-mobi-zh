- fmt: '- ![image](images/9781430241881_square_fmt.jpg) *Serial*: Each serial queue
    executes tasks one at time in the order they were assigned. You can create as
    many of these queues you want, and they will operate in parallel, with one task
    executing per queue.

    - ![image](images/9781430241881_square_fmt.jpg) *Concurrent*: Each concurrent
    queue executes one or more tasks concurrently. Tasks are started in the order
    they were assigned to the queue. You can''t create concurrent queues. Instead,
    you use one of three queues provided by the system.

    - ![image](images/9781430241881_square_fmt.jpg) *Main*: This is the main queue
    that is available for your application. This queue executes tasks on the main
    thread of your program.


    Next, we’ll discuss these various kinds of queues and how you might use them.


    ## A Bowl of Serial


    Sometimes, you have a series of tasks that need to happen in a given order. You
    can use a serial queue for that. Task execution order is first in, first out (FIFO):
    the queue ensures that the tasks are executed in predictable order, as long as
    the tasks are submitted asynchronously. These queues can never deadlock.


    Not the hairstyle **Deadlock** is an unhappy condition in which two or more competing
    tasks are each waiting on the other to finish. You can observe this in real life
    when cars arrive simultaneously at a four-way stop.


    Let’s whip up a serial queue:

    ```

    dispatch_queue_t my_serial_queue;


    my_serial_queue = dispatch_queue_create


    ("com.apress.MySerialQueue1", NULL);

    ```

    The first argument is the name of the queue, and the second provides attributes
    for the queue (although it’s not used now and must be `NULL`). Once the queue
    is created, we can assign tasks to it. Queues are reference-counted objects, so
    we’ll have the inevitable memory management discussion later in this section.


    ## Concurrent Dispatch Queues


    Concurrent dispatch queues are good for tasks that can run in parallel. Concurrent
    queues are first in, first out (FIFO), and a task can start before the previous
    one is finished. The number of tasks that can run at once is not predictable:
    it varies over time depending on what else is running. So every time you run the
    program, the number of concurrent tasks might be different.


    **Note** If you need to be sure that you run same number of tasks every time,
    you can manage threads manually with the `Threads` API.


    Each application gets three concurrent queues to use: high, default, and low priority.
    To get a reference to any of these, you call `dispatch_get_global_queue` (see
    *14.11 Hello Queue*).

    ```

    dispatch_queue_t myQueue;


    myQueue = dispatch_get_global_queue


    (DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);

    ```

    The other options for priority are `DISPATCH_QUEUE_PRIORITY_HIGH` and `DISPATCH_QUEUE_PRIORITY_LOW`.
    The second argument is always `0` for now. Because these are global, you don’t
    have to manage memory for them. You don’t need to keep a reference to these queues—just
    use the function to get access when you need it.


    ## Right Down Main Street


    Use `dispatch_get_main_queue` to access the serial queue associated with the application’s
    main thread.

    ```

    dispatch_queue_t main_queue = dispatch_get_current_queue(void);

    ```

    Because this queue is associated with the main thread, you must be very careful
    about scheduling tasks on this queue, as they will block your main application.
    You typically use this queue for synchronization, submitting multiple tasks and
    performing some action when they are all complete.


    ## I Am Jack’s Dispatch Queue


    You can find out which queue a block is running on by calling `dispatch_get_current_queue()`.
    If you call this function outside of a block object, it returns the main queue.

    ```

    dispatch_queue_t myQueue = dispatch_get_current_queue();

    ```


    ## Memory Management Is for Queues Too


    Dispatch queues are reference-counted objects. You use `dispatch_retain()` and
    `dispatch_release()` to modify the retain count for queues. As you might guess,
    these are similar to `retain` and `release` for conventional objects. You can
    use these functions only with queues you create, and not the global dispatch queues.
    In fact, if you send these messages to global queues, they’ll simply be ignored,
    so no harm done. If you’re writing an OS X application that uses garbage collection,
    you must manage these queues manually.


    ## Context for Queues


    You can assign a global data context to your dispatch objects, including dispatch
    queues. You can assign just about any kind of data, such as Objective-C objects
    or pointers, to this context. The system only knows that the context contains
    data associated with your queue. You must manage the memory for the context data.
    You have to allocate memory when you need it and clean up the data before the
    queue is deallocated. Once you have allocated your context data, you can use the
    `dispatch_set_context()` and `dispatch_get_context()` functions.

    ```

    NSMutableDictionary *myContext =


    [[NSMutableDictionary alloc] initWithCapacity:5];


    [myContext setObject:@"My Context" forKey:@"title"];


    [myContext setObject:[NSNumber numberWithInt:0] forKey:@"value"];


    dispatch_set_context(_serial_queue,


    (__bridge_retained void *)myContext);

    ```

    In this example, we created the context as a dictionary, but we can use any pointer
    type. We could even allocate raw memory and use that.


    In the last line, we need to say that the queue must keep track of this object.
    We use `__bridge_retained` to increment the retain count on `myContext`.


    ### Cleanup Function


    Once you have set up the data for the context object, when do you get rid of it?
    The easy answer is that you don’t really know when and where the context object
    will go away. To handle this situation, you can tell the object to call a function
    when it’s going away, similar to the `dealloc` method for classes. The signature
    of the function must be as follows:

    ```

    void function_name(void *context);

    ```

    We’ll create an example function to be called when the context object is going
    away, typically called a **finalizer** function:

    ```

    void myFinalizerFunction(void *context)


    {


    NSLog(@"myFinalizerFunction");


    NSMutableDictionary *theData = (__bridge_transfer


    NSMutableDictionary*)context;


    [theData removeAllObjects];


    }

    ```

    Let’s talk a little about the `__bridge_transfer` keyword. This keyword transfers
    the management of the object’s memory from the global pool to our function. When
    our function terminates, ARC will decrement its retain count, and when the retain
    count reaches zero, the object will be released. But if the object is not released,
    `myContext` will hang around until the heat death of the universe (approximately).


    How do we access the context from inside of our block?

    ```

    NSMutableDictionary *myContext = (__bridge NSMutableDictionary *)


    dispatch_get_context(dispatch_get_current_queue());

    ```

    Why did we add the `__bridge` keyword here? We’re telling ARC that we’re not interested
    in managing the memory for the context. We want the system to keep managing it.


    ## Adding Tasks


    There are two ways to add tasks to the queue:

    - ![image](images/9781430241881_square_fmt.jpg) *Synchronously*: The queue waits
    until the task is finished.

    - ![image](images/9781430241881_square_fmt.jpg) *Asynchronously*: The task is
    added, and the function returns immediately, without waiting for the task to finish.
    This technique is preferred because it doesn’t block other code from running.


    You can submit either a block or a function to execute on the queue. There are
    four dispatch functions: each of `sync` and `async`, for a block or for a function.
    We’ll take a look at each type of dispatch function.


    **Note** To avoid deadlock, you should never call `dispatch_sync` or `dispatch_sync_f`
    from a task that is running on the same queue.


