    ## 第 16 章


    ### 介绍 Application Kit


    到目前为止，本书中的所有程序都使用了 Foundation Kit，并通过向控制台发送文本输出这一历史悠久的传统方法与用户交流。这对于入门来说没问题，但当你看到包含可点击和可操作的元素的
    Mac 风格界面时，真正的乐趣才开始。在本章中，我们将绕道而行，向你展示 Application Kit（或 AppKit）的一些亮点，这是 Cocoa 为
    OS X 提供的用户界面宝库。


    我们将要在本章构建的程序叫做`CaseTool`，你可以在`16.01 CaseTool`项目文件夹中找到它。`CaseTool`会显示一个类似图 16-1
    截图的窗口。该窗口包含一个文本字段、一个标签和几个按钮。当你在字段中输入一些文本并点击一个按钮时，输入的文本会被转换为大写或小写。尽管这确实很酷，但在你以
    4.99 美元的价格将应用程序发布到 Mac App Store 之前，你无疑会想要添加更多有用的功能。


    ![9781430241881_Fig16-01.tif](img/9781430241881_Fig16-01_fmt.jpg)


    图 16-1. 最终产品


    ### 创建项目


    你将使用 Xcode 来构建此项目，我们将逐步引导你完成整个过程。首先，需要创建项目文件。然后，我们将布局用户界面。最后，建立 UI 与代码之间的连接。


    让我们开始吧：启动 Xcode 并创建一个新的 Cocoa Application 项目。运行 Xcode。在启动屏幕上，点击 Create a New Xcode
    Project。（如果 Xcode 已在运行，请选择 File ![image](img/9781430241881_arrow_fmt.jpg) New
    ![image](img/9781430241881_arrow_fmt.jpg) New Project。）在 Mac OS X 下的左侧表格中选择 Application（如果尚未选中）。选择
    Cocoa Application（如图 16-2 所示），然后点击 Next 为我们的应用程序设置一些选项。


    ![9781430241881_Fig16-02.tif](img/9781430241881_Fig16-02_fmt.jpg)


    图 16-2. 创建一个新的 Cocoa Application


    查看图 16-3，了解设置选项的界面。第一个选项是 Product Name；我们将输入*CaseTool*。下一个字段是 Company Identifier，用于
    App Store 区分你的应用程序与其他应用程序。公司标识符通常采用**反向域名**格式；也就是说，以*com*开头，后跟句点和公司名称。在我们的示例中，我们使用`com.MySuperCompany`。此字段区分大小写，因此选择时请记住这一点。


    ![9781430241881_Fig16-03.tif](img/9781430241881_Fig16-03_fmt.jpg)


    图 16-3. 命名新项目


    下一个字段是 Class Prefix。习惯上，在此处输入三个或更多字符。此字符串会被添加到您创建的类名之前。我们将使用`MSC`，这当然代表“My Super
    Company”。例如，如果您创建一个名为`Circle`的类，Xcode 实际上会将类命名为`MSCCircle`。为什么这样做？因为 Objective-C
    没有命名空间，这是一种伪命名空间，一种为你的应用程序保留一些名称的方式。这样，如果你使用第三方框架，并且它有一个名为`Circle`的类，这个名字就不会与你的冲突。


    对于 App Store 类别，我们选择`Utilities`，因为这正确地描述了我们的应用程序。


    对于其他选项，请务必取消选中 Create Document-Based Application、Use Core Data 和 Include Unit
    Tests。唯一应选中的复选框是`Use Automatic Reference Counting`。

