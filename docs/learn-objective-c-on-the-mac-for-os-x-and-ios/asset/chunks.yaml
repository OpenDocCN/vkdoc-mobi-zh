    valueForKey: @"bork"], [garage valueForKey: @"snorgle"], [garage valueForKey:
    @"gronk"]);


    This NSLog prints out


    values are bunny greeble <null> and (null)


    Notice the difference between <null> and (null). <null> is an [NSNull null] object,
    and (null) is a real live nil value that we got back because “gronk” was not in
