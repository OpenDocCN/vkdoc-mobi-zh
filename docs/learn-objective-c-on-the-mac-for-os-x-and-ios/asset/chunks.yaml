    ## 在代码中导航


    大多数源文件都有一个相似的生命周期。它们被新建，然后快速添加大量代码以实现其神奇功能。接下来，它们进入一个添加和修改各占一半的模式，然后进入维护模式，在这种模式下，你必须在添加新代码或进行修改之前阅读大量文件。最后，在一个类成熟之后，你会浏览其代码以了解该类的工作原理，然后才能在程序的其他地方使用它。本节将探讨在代码生命周期中进行导航的各种方法。


    ### emacs 不是 Mac


    一个名为 `emacs` 的古老文本编辑器，发明于 1970 年代，在现代 Mac 上仍然可用。一些老派开发者（包括 Waqar Malik）每天都在使用它。我们这里不会过多讨论
    `emacs`，只是描述它的一些键绑定——我们甚至会告诉你这意味着什么。


    短语"emacs 键绑定"指的是那些可以让你在不将手从键盘主区域移开的情况下移动文本光标的按键组合。就像许多人更喜欢用方向键而不是伸手去够鼠标一样，emacs
    用户更喜欢使用这些光标移动键，而不是伸手去够方向键。最关键的是：令人惊讶的是，这些相同的移动键在任何 Cocoa 文本字段中都有效，不仅限于 Xcode，还包括
    TextEdit、Safari 的 URL 栏和文本字段、Pages 和 Keynote 的文本区域等等。具体如下：


    *   ![image](img/9781430241881_square_fmt.jpg) `control-F`：向**前**移动，向右（与右箭头键相同）。

    *   ![image](img/9781430241881_square_fmt.jpg) `control-B`：向**后**移动，向左（与左箭头键相同）。

    *   ![image](img/9781430241881_square_fmt.jpg) `control-P`：移动到**上**一行（与上箭头键相同）。

    *   ![image](img/9781430241881_square_fmt.jpg) `control-N`：移动到**下**一行（与下箭头键相同）。

    *   ![image](img/9781430241881_square_fmt.jpg) `control-A`：移动到行**首**（与 Command-左箭头键相同）。

    *   ![image](img/9781430241881_square_fmt.jpg) `control-E`：移动到行**末**（与 Command-右箭头键相同）。

    *   ![image](img/9781430241881_square_fmt.jpg) `control-T`：**互换**（交换）光标两侧的字符。

    *   ![image](img/9781430241881_square_fmt.jpg) `control-D`：**删除**光标右侧的字符。

    *   ![image](img/9781430241881_square_fmt.jpg) `control-K`：**删除**（删除）该行剩余部分。如果你想重做一行代码的结尾，这很方便。

    *   ![image](img/9781430241881_square_fmt.jpg) `control-L`：将插入点置于窗口中央。如果你找不到文本光标，或者想快速滚动窗口使插入点位于正中央，这个功能非常棒。


    如果你将这些按键组合熟记于心并熟练掌握，你就能更快速地完成小范围的光标移动和编辑操作——而且不仅仅是在 Xcode 中。


    ### 芝麻开门！


    当你查看一个源文件时，会看到顶部的 `#import`。如果能快速打开那个头文件，而不必进行大量的鼠标操作，那该多好？你可以做到！只需选择文件名（甚至可以省略
    `.h`），然后选择 File ![image](img/9781430241881_arrow_fmt.jpg) Open Quickly。Xcode 就会为你打开头文件。


    如果你没有选中任何文本，选择 Open Quickly 会打开一个对话框，这是查找文件的另一种方式。你也可以通过快捷键 ![image](img/Rangoli1.jpg)![image](img/Uparrow.jpg)`O`
    来执行 Open Quickly 命令。Open Quickly 对话框是一个非常简单的窗口，只包含一个搜索字段和一个表格，但它是在项目中搜索内容的一种非常快速的方式。在搜索框中输入
    `tire` 来查找与轮胎相关的内容，如图 7-17 所示。你也可以输入其他术语，比如 `NSArray` 来查看 `NSArray` 头文件。


    ![9781430241881_Fig07-17.tif](img/9781430241881_Fig07-17_fmt.jpg)


    图 7-17. Open Quickly 对话框


    如果你有幸拥有一个大显示器，可以使用助手编辑器（View ![image](img/9781430241881_arrow_fmt.jpg) Assistant
    Editor ![image](img/9781430241881_arrow_fmt.jpg) Show Assistant Editor）并排显示窗口。默认情况下，你会在一个窗格中看到头文件，在另一个窗格中看到实现文件，但如果你愿意，可以更改此设置。点击工具栏中的
    `Counterparts` 查看诸多选项。


    ### 集中精力


    你可能注意到了源代码左侧的几个栏。左边较宽的栏称为**装订线**，我们稍后讨论调试时会重点介绍它。较窄的那个称为**聚焦条**，顾名思义，它可以帮助你将注意力集中在代码的不同部分。


    注意聚焦条中的灰色阴影：代码嵌套得越深，它在聚焦条中对应的灰色就越深。这种颜色编码让你能一眼看出代码的复杂程度。你可以将鼠标悬停在聚焦条的不同灰色区域上，以高亮显示对应的代码块，如图
    7-18 所示。


    ![9781430241881_Fig07-18.tif](img/9781430241881_Fig07-18_fmt.jpg)

    '
- fmt: '# 代码折叠与聚焦功能


    [Figure 7-18](#9781430241881_Ch7.xhtml#FIG18) 展示了使用聚焦条（focus ribbon）高亮代码的效果。


    您可以点击聚焦条来折叠代码块。假设您确信 [Figure 7-18](#9781430241881_Ch7.xhtml#_FIG18) 中展示的 `if`
    语句和 `for` 循环是正确的，并且不想再看它们，那么可以将注意力集中在函数中的其余代码上。点击 `if` 语句左侧，其代码体将会折叠，如 [Figure
    7-19](#9781430241881_Ch7.xhtml#_FIG19) 所示。


    ![9781430241881_Fig07-19.tif](images/9781430241881_Fig07-19_fmt.jpg)


    [Figure 7-19](#9781430241881_Ch7.xhtml#FIG19) 展示了代码折叠效果。您以为我们会在这里放一个《沙丘》的梗，对吧？


    现在您可以看到，`if` 语句的代码体已被替换为一个带有省略号的方框。双击该方框即可将代码展开回原来的样子，或者点击聚焦条中的展开三角形。代码并未被删除，只是被隐藏了，因此您的文件即使在这种状态下也能正常编译和运行。**代码折叠**（Code
    folding）是这类功能的另一种名称。请查看 Editor → ![image](images/9781430241881_arrow_fmt.jpg)
    Code Folding 菜单，那里有许多额外的选项。


    ## 导航栏已打开


    在代码编辑器的顶部有一个小小的控制条，如 [Figure 7-20](#9781430241881_Ch7.xhtml#_FIG20) 所示，它被称为**导航栏**（navigation
    bar）。其中的许多控件用于让您快速在项目中的源文件之间跳转。


    ![9781430241881_Fig07-20.tif](images/9781430241881_Fig07-20_fmt.jpg)


    [Figure 7-20](#9781430241881_Ch7.xhtml#FIG20) 展示了导航栏。


    最左侧是一个菜单按钮，它提供对编辑器最近历史记录以及其他一些高级功能的快速访问。接下来是后退和前进按钮，让您可以在本次编辑会话中打开过的文件历史记录中循环切换。它们的工作方式类似于
    Safari 的后退和前进箭头。这些按钮旁边是一个路径，显示当前文件（`Car.m`）及其在项目中的位置，而非其目录路径。路径中的每一项都是一个按钮；点击任一按钮，就会弹出一个导航菜单。


    导航栏中的最后一个项是函数菜单。它显示插入点当前位于方法 `-setTire:atIndex:` 中。点击该菜单即可查看所有感兴趣符号，如 [Figure
    7-21](#9781430241881_Ch7.xhtml#_FIG21) 所示。


    ![9781430241881_Fig07-21.tif](images/9781430241881_Fig07-21_fmt.jpg)


    [Figure 7-21](#9781430241881_Ch7.xhtml#FIG21) 展示了文件中的符号。


    `-setTire:atIndex:` 被高亮显示，因为这是插入点所在位置。您可以看到它上方和下方的其他方法，按它们在文件中的出现顺序排序。您可以 ![image](images/Rangoli1.jpg)
    点击函数菜单以按字母顺序排序。


    除了方法名称之外，您还可以向此菜单添加自己的项。有几种不同的添加方式。一种方式是使用 `#pragma mark whatever` 将字符串 `whatever`
    放入菜单中。这对于添加人类可读的锚点非常有用，方便您和其他生物体查看和使用。`#pragma mark -`（减号）会在菜单中放入一条分隔线。Xcode 还会查找以特定字符串
    `MARK:`、`TODO:`、`FIXME:`、`!!!:` 和 `???：` 开头的注释。Xcode 也会将这些文本添加到函数菜单中。这些都是程序员留下的信号，意思是“在将此程序发布给毫无防备的公众之前，最好回来看看这个。”


    **注意**：“Pragma”一词源自希腊语，意为“行动”。`#pragma` 是一种向编译器和代码编辑器传递信息或指令的方式，这些信息超出了 Objective-C
    代码的常规行。Pragma 通常被忽略，但它们可能对软件开发中使用的工具具有意义。如果某个工具不理解 pragma，该工具应该点头、微笑并忽略它，而不产生警告或错误。


    ## 获取信息


    在您自己的代码和 Cocoa 头文件之间跳转固然很好，但有时您需要从自身代码之外获取一些信息。幸运的是，Xcode 附带了一个包含文档和参考资料的知识宝库（解释什么是宝库超出了本书的范围）。


    ### 帮帮忙，谢谢


    检查器（inspector）顶部有两个图标。到目前为止，在我们探索中，第一个图标被选中，检查器显示的是当前文件的属性。另一个图标启用检查器中的快速帮助（Quick
    Help）。要使用快速帮助，请点击代码中的某些内容，然后查看检查器中显示的内容。如果您点击源代码中的其他位置，快速帮助面板会自我更新。


    例如，假设您的插入点位于单词 `NSString` 内部。快速帮助将会显示如 [Figure 7-22](#9781430241881_Ch7.xhtml#_FIG22)
    所示的内容。


    ![9781430241881_Fig07-22.tif](images/9781430241881_Fig07-22_fmt.jpg)


    [Figure 7-22](#9781430241881_Ch7.xhtml#FIG22) 展示了快速帮助。


    这里有大量可用的信息。前两个项在文档窗口中打开 `NSString` 类参考文档。`NSString.h` 项在编辑器中打开头文件。


    “Abstract”（摘要）部分描述了该类。如果您将光标放在方法调用的中间，此部分将描述该方法以及相关的调用。这里还有指向更高级别文档的链接，以及大量使用
    `NSString` 的代码示例。蓝色文字是可以点击以获取更多信息的链接。您还可以通过按住 Option 键点击符号来从快速帮助中获取更多信息。如果这样做，您会看到类似
    [Figure 7-23](#9781430241881_Ch7.xhtml#_FIG23) 的内容。如需更多信息，请点击右上角的书籍图标以打开该符号的文档。


    ![9781430241881_Fig07-23.tif](images/9781430241881_Fig07-23_fmt.jpg)


    [Figure 7-23](#9781430241881_Ch7.xhtml#FIG23) 展示了点击 `NSString` 后获得的更多信息，正如所承诺的那样。


    ### 文档员在家吗？


    如果您想直接进入 Apple 官方 API 文档，一个非常快的方法是按住 Option 键并双击某个符号。这实际上是执行该符号文档搜索的一个快捷方式。


    假设您有一行代码如 `[someString UTF8String]`，它将 `someString`（一个 `NSString`）转换为用 Unicode
    表示的 C 风格字符串。如果您按住 Option 键并双击 `UTF8String`，文档浏览器将会打开并搜索 `UTF8String`，如 [Figure
    7-24](#9781430241881_Ch7.xhtml#_FIG24) 所示。


    ![9781430241881_Fig07-24.tif](images/9781430241881_Fig07-24_fmt.jpg)


    [Figure 7-24](#9781430241881_Ch7.xhtml#FIG24) 展示了 Xcode 文档窗口。


    那个窗口非常繁忙，并塞满了大量信息。左上角是一个搜索框，其中已预先填入了 `UTF8String`。工具栏下方的按钮条允许您精确定制搜索哪些文档集。您可以查看所有文档，或仅查看
    OS X 或 iOS 文档。


    按钮条下方是一个窗格（左侧），其中包含文档集和一组书签。您可以通过弹出菜单向特定的文档块添加书签。文档书签是全局的，不限于特定项目。


    窗口顶部左侧窗格中是一个浏览器，显示所有搜索匹配项。在 [Figure 7-24](#9781430241881_Ch7.xhtml#_FIG24) 中，它显示了三个方法和一个常量。最有趣的是最后一个
    `UTF8`，这正是我们实际调用的方法。您还会注意到同一项列出了多个版本。这是因为您可能安装了多套文档：iOS、OS X 或其他。请为您感兴趣的平台选择文档。请记住，某些方法可能并非在所有平台上都可用。


    该浏览器下方是一个显示文档的窗格。这个区域对于阅读文档来说有点小，但可以轻松地将文档打开到另一个 Xcode 窗口甚至网页浏览器中。


