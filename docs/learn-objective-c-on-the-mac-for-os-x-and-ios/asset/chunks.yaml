    \ C 语言的联合体在同一结构体中叠加不同的数据布局，这会使所有形状都需要深入到联合体中才能获取它们感兴趣的数据，从而让事情变得复杂。\n\n面向对象编程（OOP）优雅地解决了这些问题。当我们教我们的程序使用\
    \ OOP 时，我们将看到 OOP 如何处理第一个问题，即修改已经运行的代码以添加新的形状种类。\n\n## 实现面向对象\n\n过程式程序基于函数。数据围绕着函数转。面向对象则反转了这一观点，将程序的数据置于中心，让函数围绕着数据转。与其关注程序中的函数，不如将注意力集中在数据上。\n\
    \n这听起来很有趣，但它如何工作呢？在 OOP 中，数据通过间接寻址包含了对操作它的代码的引用。与其告诉`drawRectangle()`函数“使用这个形状结构体去绘制一个矩形”，不如要求一个矩形“去绘制你自己”（天哪，这听起来很粗鲁，但确实如此）。通过间接寻址的神奇魔力，矩形的数据知道如何找到执行绘制的函数。\n\
    \n那么对象到底是什么？它不过是一个花哨的 C 语言结构体，能够找到与之关联的代码，通常是通过一个函数指针。 图 3-4 展示了四个`Shape`对象：两个矩形、一个圆形和一个椭圆。每个对象都能够找到一个函数来执行其绘制。\n\
    \n![9781430241881_Fig03-04.eps](img/9781430241881_Fig03-04_fmt.jpg)\n\n图 3-4.\
    \ 基本形状对象\n\n每个对象都有自己的`draw()`函数，该函数知道如何“绘制”其特定的形状。例如，一个圆形对象的`draw()`知道如何绘制圆形。一个矩形的`draw()`知道如何绘制矩形。\n\
    \n`Shapes-Object`程序（位于*03.10 -Shapes-Object*）执行与`Shapes-Procedural`相同的功能，但使用了\
    \ Objective-C 的面向对象特性来实现。这是来自`Shapes-Object`的`drawShapes()`：\n\n```objc\nvoid\
    \ drawShapes (id shapes[], int count)\n{\n   for (int i = 0; i < count; i++) {\n\
    \      id shape = shapes[i];\n      [shape draw];\n   }\n} // drawShapes\n```\n\
    \n这个函数包含一个循环，遍历数组中的每个形状。在循环中，程序告诉形状绘制自身。\n\n注意这个版本的`drawShapes()`与原始版本之间的差异。首先，这个版本短得多！代码不必询问每个单独的形状它是什么类型。\n\
    \n另一个变化是`shapes[]`，函数的第一个参数：它现在是一个`id`对象的数组。什么是`id`？它是一个心理学术语，指代心灵中先天本能冲动和初级过程得以显现的那部分吗？在这个上下文中并非如此：它代表**identifier**（标识符），发音为“eye\
    \ dee”。`id`是一种通用类型，用于指代任何类型的对象。回想一下，对象只是一个带有一些附加代码的 C 结构体，所以`id`实际上是指向这些结构体之一的指针；在这种情况下，这些结构体构成了各种形状。\n\
    \n`drawShapes()`的第三个变化是循环体：\n\n```objc\nid shape = shapes[i];\n[shape draw];\n\
    ```\n\n第一行看起来像普通的 C 代码。代码从`shapes`数组中获取`id`——即指向对象的指针——并将其存入名为`shape`的变量中，该变量的类型是`id`。这只是一个指针赋值：它实际上并没有复制形状的全部内容。看看\
    \ 图 3-5 ，了解`Shapes-Object`中可用的各种形状。`shapes[0]`是指向红色圆形的指针；`shapes[1]`是指向绿色矩形的指针；`shapes[2]`是指向蓝色椭圆的指针。\n\
    \n![9781430241881_Fig03-05.eps](img/9781430241881_Fig03-05_fmt.jpg)\n\n图 3-5.\
    \ `shapes`数组\n\n现在我们来到了函数中的最后一行代码：\n\n```objc\n[shape draw];\n```\n"
- fmt: 'This is seriously weird. What’s going on? We know that `C` uses square brackets
    to refer to array elements, but we don’t seem to be doing anything with arrays
    here. In Objective-C, square brackets have an additional meaning: they’re used
    to tell an object what to do. Inside the square brackets, the first item is an
    object, and the rest is an action that you want the object to perform. In this
    case, we’re telling an object named `shape` to perform the action `draw`. If `shape`
    is a circle, a circle is “drawn.” If `shape` is a rectangle, we’ll get a rectangle.


    In Objective-C, telling an object to do an action is called **sending a message**
    (although some folks also say “calling a method”). The code `[shape draw]` sends
    the message `draw` to the object `shape`. One way to pronounce `[shape draw]`
    is “send draw to shape.” How the `shape` actually does the drawing is up to the
    `shape`’s implementation.


    When you send a message to an object, how does the necessary code get called?
    This happens with the assistance of behind-the-scenes helpers called **classes**.


    Take a look at [Figure 3-6](#9781430241881_Ch3.xhtml#_FIG6) please. The left side
    of the figure shows that this is the circle object at index zero of the `shapes`
    array, last seen in [Figure 3-2](#9781430241881_Ch3.xhtml#_FIG2). The object has
    a pointer to its class. The class is a structure that tells how to be an object
    of its kind. In [Figure 3-3](#9781430241881_Ch3.xhtml#_FIG3), the `Circle` class
    has a pointer to code for drawing circles, for calculating the area of circles,
    and other stuff required in order to be a good `Circle` citizen.


    ![9781430241881_Fig03-06.eps](images/9781430241881_Fig03-06_fmt.jpg)


    [Figure 3-6](#9781430241881_Ch3.xhtml#FIG6). A circle and its class


    What’s the point of having class objects? Wouldn’t it be simpler just to have
    each object point directly to its code? Indeed, it would be simpler, and some
    OOP systems do just that. But having class objects is a great advantage: if you
    change the class at runtime, all objects of that class automatically pick up the
    changes (we’ll discuss this more in later chapters).


    [Figure 3-7](#9781430241881_Ch3.xhtml#_FIG7) shows how the `draw` message ends
    up calling the right function for the circle object.


    ![9781430241881_Fig03-07.eps](images/9781430241881_Fig03-07_fmt.jpg)


    [Figure 3-7](#9781430241881_Ch3.xhtml#FIG7). A circle finds its draw code.


    Here are the steps illustrated in [Figure 3-4](#9781430241881_Ch3.xhtml#_FIG4):


    1.  The object that is the target of the message (the red circle in this case)
    is consulted to see what its class is.

    2.  The class looks through its code and finds out where the `draw` function is.

    3.  Once it’s found, the function that draws circles is executed.


    [Figure 3-8](#9781430241881_Ch3.xhtml#_FIG8) shows what happens when you call
    `[shape draw]` on the second shape in the array, which is the green rectangle.


    ![9781430241881_Fig03-08.eps](images/9781430241881_Fig03-08_fmt.jpg)


    [Figure 3-8](#9781430241881_Ch3.xhtml#FIG8). A rectangle finds its draw code.


    The steps used in [Figure 3-5](#9781430241881_Ch3.xhtml#_FIG5) are nearly identical
    those in the previous image:


    1.  The target object of the message (the green rectangle) is consulted to see
    what its class is.

    2.  The rectangle class checks its pile of code and gets the address of the `draw`
    function.

    3.  Objective-C runs the code that draws a rectangle.


    This program shows some very cool indirection in action! In the procedural version
    of the program, we had to write code that determined which function to call. Now,
    that decision is made behind the scenes by Objective-C, as it asks the objects
    which class they belong to. This reduces the chance of calling the wrong function
    and makes our code easier to maintain.


    ## Time Out for Terminology


    Before we dig into the rest of the `Shapes-Object` program, let’s take a moment
    to go over some object-oriented terminology. We’ve already talked about some of
    these terms; others are brand new.


    *   ![image](images/9781430241881_square_fmt.jpg) `class` — A **class** is a structure
    that represents an object’s type. An object refers to its class to get various
    information about itself, particularly what code to run to handle each action.
    Simple programs might have a handful of classes; moderately complex ones will
    have a couple of dozen. Objective-C style encourages developers to capitalize
    class names.

    *   ![image](images/9781430241881_square_fmt.jpg) `object` — An **object** is
    a structure containing values and a hidden pointer to its class. Running programs
    typically have hundreds or thousands of objects. Objective-C variables that refer
    to objects are typically not capitalized.

    *   ![image](images/9781430241881_square_fmt.jpg) `instance` — **Instance** is
    another word for “object.” For example, a circle object can also be called an
    instance of class `Circle`.

    *   ![image](images/9781430241881_square_fmt.jpg) `message` — A **message** is
    an action that an object can perform. This is what you send to an object to tell
    it to do something. In the `[shape draw]` code, the `draw` message is sent to
    the `shape` object to tell it to draw itself. When an object receives a message,
    its class is consulted to find the proper code to run.

    *   ![image](images/9781430241881_square_fmt.jpg) `method` — A **method** is code
    that runs in response to a message. A message, such as `draw`, can invoke different
    methods depending on the class of the object.

    *   ![image](images/9781430241881_square_fmt.jpg) `method dispatcher` — The **method
    dispatcher** is the mechanism used by Objective-C to divine which method will
    be executed in response to a particular message. We’ll get out our shovels and
    dig a lot more into the Objective-C method dispatch mechanism in the next chapter.


    Those are the key OOP terms you’ll need for the rest of this book. In addition,
    there are a couple of generic programming terms that will soon become very important:


    *   ![image](images/9781430241881_square_fmt.jpg) `interface` — The **interface**
    is the description of the features provided by a class of objects. For example,
    the interface for class `Circle` declares that circles can accept the `draw` message.


    **Note** The concept of interfaces is not limited to OOP. For example, header
    files in `C` provide interfaces for libraries such as the standard I/O library
    (which you get when you `#include <stdio.h>`), and the math library (`#include
    <math.h>`). Interfaces do not provide implementation details, and the general
    idea is that you shouldn’t care about them.


    *   ![image](images/9781430241881_square_fmt.jpg) `implementation` — The **implementation**
    is the code that makes the interface work. In our examples, the implementation
    for the circle object holds the code for drawing a circle on the screen. When
    you send the `draw` message to a circle object, you don’t know or care how the
    function works, just that it draws a circle on the screen.


    ## OOP in Objective-C


    If your brain is starting to hurt now, that’s OK. We’ve been filling it up with
    a lot of new stuff, and assimilating all the terms and technology will take awhile.
    While your subconscious is chewing on the previous couple of sections, let’s take
    a look at the rest of the code for `Shapes-Object`, including some new syntax
    for declaring classes.


    ### The `@interface` Section


    Before you can create objects of a particular class, the Objective-C compiler
    needs some information about that class. Specifically, it has to know about the
    data members of the object (that is, what the `C struct` for the object looks
    like) and which features it provides. You use the `@interface` directive to give
    this information to the compiler.


    **Note** In `Shapes-Object`, we put everything into its *Shapes-Object.m* file.
    In larger programs, you’ll use multiple files, giving each class its own set of
    files. We’ll explore ways of organizing classes and files in [Chapter 6](#9781430241881_Ch6.xhtml).


    Here is the interface for the `Circle` class:


    ```

    @interface Circle : NSObject


    {

    @private

    ShapeColor fillColor;

    ShapeRect bounds;

    }


    - (void) setFillColor: (ShapeColor) fillColor;

    ```'
