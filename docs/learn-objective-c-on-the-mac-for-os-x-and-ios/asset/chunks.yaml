- fmt: "```c\nreturn (thing1 - thing2);\n\n} // areIntsDifferent_faulty\n```\n\nThey’d\
    \ do so operating under the assumption that a nonzero value is the same as `YES`.\
    \ But that’s not the case. Yes, this function returns a value, as far as C is\
    \ concerned, that is true or false, but callers of functions returning `BOOL`\
    \ will expect either `YES` or `NO` to be returned. If a programmer tries to use\
    \ this function as follows, it will fail, since 23 minus 5 is 18:\n\n```c\nif\
    \ (areIntsDifferent_faulty(23, 5) == YES) {\n  // ….\n}\n```\n\nWhile the preceding\
    \ function may be a true value in C, it is not equal to `YES` (a value of 1) in\
    \ Objective-C.\n\nIt’s a good idea never to compare a `BOOL` value directly to\
    \ `YES`, because too-clever programmers sometimes pull stunts similar to `areIntsDifferent_faulty()`.\
    \ Instead, write the preceding `if` statement like this:\n\n```c\nif (areIntsDifferent_faulty(5,\
    \ 23)) {\n  // ….\n}\n```\n\nComparing directly to `NO` is always safe, since\
    \ falsehood in C has a single value: zero.\n\n## The Second Function\n\nThe second\
    \ function, `boolString()`, maps a numeric `BOOL` value to a string that’s readable\
    \ by mere humans:\n\n```objectivec\nNSString *boolString (BOOL yesNo)\n{\n  if\
    \ (yesNo == NO) {\n    return (@\"NO\");\n  } else {\n    return (@\"YES\");\n\
    \  }\n} // boolString\n```\n\nThe `if` statement in the middle of the function\
    \ should come as no surprise. It just compares `yesNo` to the constant `NO`, and\
    \ returns `@\"NO\"` if they match. Otherwise, `yesNo` must be a true value, so\
    \ it returns `@\"YES\"`.\n\nNotice that the return type of `boolString()` is a\
    \ pointer to an `NSString`. This means the function returns one of the fancy Cocoa\
    \ strings that you saw earlier when you first met `NSLog()`. If you look at the\
    \ return statements, you’ll see the at sign in front of the returned values, a\
    \ dead giveaway that they’re `NSString` values.\n\n## The `main()` Function\n\n\
    `main()` is the final function. After the preliminaries of declaring the return\
    \ type and arguments for `main()`, there is a local `BOOL` variable:\n\n```objectivec\n\
    int main (int argc, const char *argv[])\n{\n  BOOL areTheyDifferent;\n```\n\n\
    The `areTheyDifferent` variable holds onto the `YES` or `NO` value returned by\
    \ `areIntsDifferent()`. We could simply use the function’s `BOOL` return value\
    \ directly in an `if` statement, but there’s no harm in adding an extra variable\
    \ like this to make the code easier to read. Deeply nested constructs are often\
    \ confusing and hard to understand, and they’re a good place for bugs to hide.\n\
    \n### The Comparison Itself\n\nThe next two lines of code compare a couple of\
    \ integers with `areIntsDifferent()` and store the return value into the `areTheyDifferent`\
    \ variable. `NSLog()` prints out the numeric values and the human-readable string\
    \ returned by `boolString()`:\n\n```objectivec\nareTheyDifferent = areIntsDifferent\
    \ (5, 5);\nNSLog (@\"are %d and %d different? %@\",\n        5, 5, boolString(areTheyDifferent));\n\
    ```\n\nAs you saw earlier, `NSLog()` is basically a Cocoa-flavored `printf()`\
    \ function that takes a format string and uses the additional parameters for values\
    \ to plug in the format specifiers. You can see that the two fives will replace\
    \ the two `%d` format placeholders in our call to `NSLog()`.\n\nAt the end of\
    \ the string we’re giving to `NSLog()`, you see another at sign. This time, it’s\
    \ `%@`. What’s that all about? `boolString()` returns an `NSString` pointer. `printf()`\
    \ has no idea how to work with an `NSString`, so there is no a format specifier\
    \ we can use. The makers of `NSLog()` added the `%@` format specifier to instruct\
    \ `NSLog()` to take the appropriate argument, treat it as an `NSString`, use the\
    \ characters from that string, and send it out to the console.\n\n> **Note:**\
    \ We haven’t officially introduced you to objects yet, but here’s a sneak preview:\
    \ when you print the values of arbitrary objects with `NSLog()`, you’ll use the\
    \ `%@` format specification. When you use this specifier, the object supplies\
    \ its own `NSLog()` format via a method named `description`. The `description`\
    \ method for `NSString` simply prints the string’s characters.\n\nThe next two\
    \ lines are very similar to those you just saw:\n\n```objectivec\nareTheyDifferent\
    \ = areIntsDifferent (23, 42);\nNSLog (@\"are %d and %d different? %@\",\n   \
    \     23, 42, boolString(areTheyDifferent));\n```\n\nThe function compares the\
    \ values 23 and 42. This time, because they’re different, `areIntsDifferent()`\
    \ returns `YES`, and the user sees text stating the monumental fact that 23 and\
    \ 42 are different values.\n\nHere’s the final return statement, which wraps up\
    \ our BOOL Party:\n\n```objectivec\n  return (0);\n} // main\n```\n\nIn this program,\
    \ you saw Objective-C’s `BOOL` type, and the constants `YES` and `NO` for indicating\
    \ true and false values. You can use `BOOL` in the same way you use types such\
    \ as `int` and `float`: as variables, parameters to functions, and return values\
    \ from functions.\n\n## Summary\n\nIn this chapter, you wrote your first two Objective-C\
    \ programs, and it was fun! You also met some of Objective-C’s extensions to the\
    \ language, such as `#import`, which tells the compiler to bring in header files\
    \ and to do so only once. You learned about `NSString` literals, those strings\
    \ preceded by an at sign, such as `@\"hello\"`. You used the important and versatile\
    \ `NSLog()`, a function Cocoa provides for writing text to the console, and the\
    \ `NSLog()` special format specifier, `%@`, that lets you plug `NSString` values\
    \ into `NSLog()` output. You also gained the secret knowledge that when you see\
    \ an at sign in code, you know you’re looking at an Objective-C extension to the\
    \ C language. Finally, you learned about Objective-C’s `BOOL` type.\n\nStay tuned\
    \ for our next chapter, in which we’ll enter the mysterious world of object-oriented\
    \ programming.\n\n---\n\n# Chapter 3: Introduction to Object-Oriented Programming\n\
    \nIf you’ve been using and programming computers for any length of time, you’ve\
    \ probably heard the term “object-oriented programming” more than once. **Object-oriented\
    \ programming**, frequently shortened to its initials, OOP, is a programming technique\
    \ originally developed for writing simulation programs. OOP soon caught on with\
    \ developers of other kinds of software, such as those involving graphical user\
    \ interfaces. Before long, “OOP” became a major industry buzzword. It promised\
    \ to be the magical silver bullet that would make programming simple and joyous.\n\
    \nOf course, nothing can live up to that kind of hype. Like most pursuits, OOP\
    \ requires study and practice to gain proficiency, but it truly does make some\
    \ kinds of programming tasks easier and, in some cases, even fun. In this book,\
    \ we’ll be talking about OOP a lot, mainly because Cocoa is based on OOP concepts,\
    \ and Objective-C is a language that is designed to be object oriented.\n\nSo\
    \ what is OOP? OOP is a way of constructing software composed of objects. Objects\
    \ are like little machines living inside your computer and talking to each other\
    \ to get work done. In this chapter, we’ll look at some basic OOP concepts. After\
    \ that, we’ll examine the style of programming that leads to OOP, describing the\
    \ motivation behind some OOP features. We’ll wrap up with a thorough description\
    \ of the mechanics of OOP.\n\n> **Note:** Like many “new” technologies, the roots\
    \ of OOP stretch way back into the mists of time. OOP evolved from Simula in the\
    \ 1960s, Smalltalk in the 1970s, Clascal in the 1980s, and other related languages.\
    \ Modern languages such as C++, Java, Python, and of course, Objective-C draw\
    \ inspiration from these older languages.\n\nAs we dive into OOP, stick a Babel\
    \ fish in your ear, and be prepared to encounter some strange terminology along\
    \ the way. OOP comes with a lot of fancy-sounding lingo that makes it seem more\
    \ mysterious and difficult than it actually is. You might even think that computer\
    \ scientists create long, impressive-sounding words to show everyone how smart\
    \ they are, but of course, they don’t all do that. Well, don’t worry. We’ll explain\
    \ each term as we encounter it.\n\nBefore we get into OOP itself, let’s take a\
