  raw: '*   ![image](images/9781430241881_square_fmt.jpg)  The **superclass** is the
    class you’re inheriting from. The superclass of Circle is Shape. The superclass
    of Shape is NSObject.

    *   ![image](images/9781430241881_square_fmt.jpg)  **Parent class** is another
    word for “superclass.” For example, Shape is the parent class of Rectangle.

    *   ![image](images/9781430241881_square_fmt.jpg)  The **subclass** is the class
    doing the inheriting. Circle is a subclass of Shape, and Shape is a subclass of
    NSObject.

    *   ![image](images/9781430241881_square_fmt.jpg)  **Child class** is another
    word for “subclass.” Circle is a child class of Shape. It’s your choice whether
    to use subclass/superclass or parent class/child class. You’ll come across both
    pairs in the real world. In this book, we use superclass and subclass, possibly
    because we’re more nerdy than parental.

    *   ![image](images/9781430241881_square_fmt.jpg)  You **override** an inherited
    method when you want to change its implementation. Circle has its own draw method,
    so we say it overrides draw. Objective-C makes sure that the appropriate class’s
    implementation of an overridden method is called when the code runs.


    How Inheritance Works


    We did major surgery to Shapes-Object, taking all that code out of Circle and
    Rectangle and moving it into Shape. It’s very cool that the rest of the program
    still works, without modification. Creating and initializing all the different
    shapes in main() didn’t change, and the drawShapes() function is the same, yet
    the program still works:


    drawing a circle at (0 0 10 30) in red


    drawing a rect at (30 40 50 60) in green


    drawing an egg at (15 19 37 29) in blue


    drawing a triangle at (47 32 80 50) in red


    Here, you can see another aspect of the power of OOP: you can make radical changes
    to a program, and if you’re careful, things will still work when you’re done.
    Of course, you can do that with procedural programming, but your chances of success
    are usually higher with OOP.


    Method Dispatching


    How do objects know which methods to run when they receive messages? For example,
    setFillColor:’s code has been moved out of the Circle and Rectangle classes, so
    how does the Shape code know what to do when you send setFillColor: to a Circle
    object? Here’s the secret: When code sends a message, the Objective-C method dispatcher
    searches for the method in the current class. If the dispatcher doesn’t find the
    method in the class of the object receiving the message, it looks at the object’s
    superclasses.


    [Figure 4-3](#9781430241881_Ch4.xhtml#_FIG3) shows how method dispatching works
    for code sending the setFillColor: message to a Circle object, using the old,
    pre-Shape version of our program. To handle code like [shape setFillColor:kRedColor],
    the Objective-C method dispatcher looks at the object receiving the message; in
    this case, it’s an object of class Circle. The object has a pointer to its class,
    and the class has a pointer to its code. The dispatcher uses these pointers to
    find the right code to run.


    ![9781430241881_Fig04-03.eps](images/9781430241881_Fig04-03_fmt.jpg)


    [Figure 4-3](#9781430241881_Ch4.xhtml#FIG3). Method dispatch without inheritance


    Check out [Figure 4-4](#9781430241881_Ch4.xhtml#_FIG4), which shows our snazzy
    new inheritance-enhanced structure. In this code, class Circle has a reference
    to its superclass, Shape. The Objective-C method dispatcher uses this information
    to find the right implementation of a method when a message comes in.


    ![9781430241881_Fig04-04.eps](images/9781430241881_Fig04-04_fmt.jpg)


    [Figure 4-4](#9781430241881_Ch4.xhtml#FIG4). Inheritance and class code


    [Figure 4-5](#9781430241881_Ch4.xhtml#_FIG5) shows the method dispatch process
    when inheritance is involved. When you send the setFillColor: message to the Circle
    object, the dispatcher first consults the Circle class to see if it can respond
    to setFillColor: with its own code. In this case, the answer is no: the dispatcher
    discovers that Circle has no definition for setFillColor:, so it’s time to look
    in the superclass, Shape. The dispatcher then roots around in Shape and finds
    the definition of setFillColor:, and it runs that code.


    ![9781430241881_Fig04-05.eps](images/9781430241881_Fig04-05_fmt.jpg)


    [Figure 4-5](#9781430241881_Ch4.xhtml#FIG5). Method dispatch with inheritance


    This action of saying, “I can’t find it here, so I’ll go look in the superclass,”
    is repeated for every class in the inheritance chain, as necessary. If a method
    can’t be found in either the Circle or Shape class, the dispatcher checks class
    NSObject, because it’s the next superclass in the chain. If the method doesn’t
    exist in NSObject, the most super of the superclasses, you’ll get a runtime error
    (and you would also have gotten a compile-time warning).


    Instance Variables


    We’ve spent time discussing how methods are called in response to messages. Now,
    let’s look at how Objective-C accesses instance variables. How does Circle’s draw
    method find the bounds and fillColor instance variables declared in Shape?


    When you create a new class, its objects inherit the instance variables from its
    superclasses and then (optionally) add their own instance variables. To see how
    instance variable inheritance works, let’s invent a new shape that adds a new
    instance variable. This new class, RoundedRectangle, needs a variable to hold
    the radius to use when drawing the corners of the rectangle. The class definition
    goes a little something like this:


    @interface RoundedRectangle : Shape


    {


    @private


    int radius;


    }


    @end // RoundedRectangle


    [Figure 4-6](#9781430241881_Ch4.xhtml#_FIG6) shows the memory layout of a rounded
    rectangle object. NSObject declares one instance variable, called isa, which holds
    the pointer to the object’s class. Next come two instance variables declared by
    Shape: fillColor and bounds. Finally, there’s radius, the instance variable that
    RoundedRectangle declares.


    ![9781430241881_Fig04-06.eps](images/9781430241881_Fig04-06_fmt.jpg)


    [Figure 4-6](#9781430241881_Ch4.xhtml#FIG6). Object instance variable layout


    **Note** The NSObject instance variable is called isa because inheritance sets
    up an “is a” relationship between the subclass and the superclass; that is, a
    Rectangle *is a* Shape, and a Circle*is a* Shape. Code that uses a Shape can also
    use a Rectangle or Circle instead.


    The ability to use a more specific kind of object (a Rectangle or Circle) instead
    of a general type (Shape) is called polymorphism, a Greek word meaning “many shapes,”
    appropriately enough.


    Remember that every method call gets a hidden parameter, called self, which is
    a pointer to the object that receives the message. Methods use the self parameter
    to find the instance variables they use.


    [Figure 4-7](#9781430241881_Ch4.xhtml#_FIG7) shows self pointing to a rounded
    rectangle object. self points to the first instance variable of the first class
    in the chain of inheritance. For RoundedRectangle, the inheritance chain starts
    with NSObject, then continues with Shape, and finally ends with RoundedRectangle,
    so self points to isa, the first instance variable. The Objective-C compiler knows
    the layout of the instance variables in an object because it has seen the @interface
    declarations for each of these classes. With this important knowledge, the compiler
    can generate code to find any instance variable.


    ![9781430241881_Fig04-07.eps](images/9781430241881_Fig04-07_fmt.jpg)


    [Figure 4-7](#9781430241881_Ch4.xhtml#FIG7). The self parameter pointing to a
    circle object


    Caution Fragile!'
  trans: "\n- ![image](img/9781430241881_square_fmt.jpg)   **超类（superclass）** 是你继承的类。`Circle`\
    \ 的超类是 `Shape`。`Shape` 的超类是 `NSObject`。\n- ![image](img/9781430241881_square_fmt.jpg)\
    \  **父类（Parent class）** 是“超类”的另一种说法。例如，`Shape` 是 `Rectangle` 的父类。\n- ![image](img/9781430241881_square_fmt.jpg)\
    \  **子类（subclass）** 是执行继承的类。`Circle` 是 `Shape` 的子类，`Shape` 是 `NSObject` 的子类。\n\
    - ![image](img/9781430241881_square_fmt.jpg)  **子类（Child class）** 是“子类”的另一种说法。`Circle`\
    \ 是 `Shape` 的子类。你可以选择使用 `subclass`/`superclass` 或 `parent class`/`child class`。在现实中你可能会遇到这两对术语。在本书中，我们使用\
    \ superclass 和 subclass，大概是因为我们比“父母”更书呆子气。\n- ![image](img/9781430241881_square_fmt.jpg)\
    \  当你想要改变一个继承方法的实现时，你 **重写（override）** 它。`Circle` 有自己的 `draw` 方法，所以我们说它重写了 `draw`。当代码运行时，Objective-C\
    \ 会确保调用被重写方法的正确类的实现。\n\n## 继承如何工作\n\n我们对 `Shapes-Object` 进行了大手术，将 `Circle` 和 `Rectangle`\
    \ 中的所有代码取出并移入 `Shape`。很酷的是，程序的其余部分无需修改仍能工作。在 `main()` 中创建和初始化所有不同形状的代码没有改变，`drawShapes()`\
    \ 函数也是一样，但程序仍然能工作：\n\n```\ndrawing a circle at (0 0 10 30) in red\ndrawing a rect\
    \ at (30 40 50 60) in green\ndrawing an egg at (15 19 37 29) in blue\ndrawing\
    \ a triangle at (47 32 80 50) in red\n```\n\n在这里，你可以看到 OOP 力量的另一个方面：你可以对程序进行彻底的更改，如果足够小心，完成后一切仍能正常工作。当然，你也可以用过程式编程做到这一点，但使用\
    \ OOP 成功率通常更高。\n\n## 方法分发\n\n对象在接收消息时如何知道要运行哪个方法？例如，`setFillColor:` 的代码已经从 `Circle`\
    \ 和 `Rectangle` 类中移出，那么当你向一个 `Circle` 对象发送 `setFillColor:` 时，`Shape` 代码如何知道该做什么？秘密在于：当代码发送消息时，Objective-C\
    \ 方法分发器会在当前类中查找该方法。如果分发器在接收消息的对象所属的类中没有找到该方法，它就会去该对象的超类中查找。\n\nFigure 4-3 展示了在我们程序的旧版（`Shape`\
    \ 之前）中，代码向 `Circle` 对象发送 `setFillColor:` 消息时的方法分发过程。为了处理像 `[shape setFillColor:kRedColor]`\
    \ 这样的代码，Objective-C 方法分发器会查看接收消息的对象；在本例中，它是一个 `Circle` 类的对象。该对象有一个指向其类的指针，而该类有一个指向其代码的指针。分发器使用这些指针来找到要运行的正确代码。\n\
    \n![9781430241881_Fig04-03.eps](img/9781430241881_Fig04-03_fmt.jpg)\n\nFigure\
    \ 4-3. 没有继承的方法分发\n\n请看 Figure 4-4，它展示了我们时髦的、强化了继承的新结构。在这段代码中，`Circle` 类有一个指向其超类\
    \ `Shape` 的引用。当消息到来时，Objective-C 方法分发器使用这个信息来找到方法的正确实现。\n\n![9781430241881_Fig04-04.eps](img/9781430241881_Fig04-04_fmt.jpg)\n\
    \nFigure 4-4. 继承和类代码\n\nFigure 4-5 展示了涉及继承时的方法分发过程。当你向 `Circle` 对象发送 `setFillColor:`\
    \ 消息时，分发器首先查询 `Circle` 类，看它是否能用自己代码响应 `setFillColor:`。在本例中，答案是否定的：分发器发现 `Circle`\
    \ 没有 `setFillColor:` 的定义，于是去超类 `Shape` 中查找。分发器然后在 `Shape` 中搜索并找到了 `setFillColor:`\
    \ 的定义，然后运行那段代码。\n\n![9781430241881_Fig04-05.eps](img/9781430241881_Fig04-05_fmt.jpg)\n\
    \nFigure 4-5. 带继承的方法分发\n\n这种“我在这里找不到，所以我去超类里找”的动作，会根据需要在继承链中的每个类上重复。如果在 `Circle`\
    \ 或 `Shape` 类中都找不到某个方法，分发器会检查 `NSObject` 类，因为它是链中的下一个超类。如果该方法在超类中最顶层的 `NSObject`\
    \ 中也不存在，你会得到一个运行时错误（并且你在编译时也会得到一个警告）。\n\n## 实例变量\n\n我们已经讨论了方法如何响应消息而被调用。现在，让我们看看\
    \ Objective-C 如何访问实例变量。`Circle` 的 `draw` 方法是如何找到在 `Shape` 中声明的 `bounds` 和 `fillColor`\
    \ 实例变量的呢？\n\n当你创建一个新类时，它的对象会从它的超类继承实例变量，然后（可选地）添加它们自己的实例变量。为了了解实例变量继承是如何工作的，让我们发明一个新的、添加了新实例变量的形状。这个新类\
    \ `RoundedRectangle` 需要一个变量来保存在绘制矩形圆角时使用的半径。类定义大致如下：\n\n```objectivec\n@interface\
    \ RoundedRectangle : Shape\n{\n@private\n    int radius;\n}\n@end // RoundedRectangle\n\
    ```\n\nFigure 4-6 展示了一个 `RoundedRectangle` 对象的内存布局。`NSObject` 声明了一个名为 `isa` 的实例变量，它持有指向对象类的指针。接下来是两个由\
    \ `Shape` 声明的实例变量：`fillColor` 和 `bounds`。最后是 `radius`，这是 `RoundedRectangle` 声明的实例变量。\n\
    \n![9781430241881_Fig04-06.eps](img/9781430241881_Fig04-06_fmt.jpg)\n\nFigure\
    \ 4-6. 对象实例变量布局\n\n**注意** `NSObject` 的实例变量被称为 `isa`，因为继承在子类和超类之间建立了一种“是一个”（is\
    \ a）的关系；也就是说，`Rectangle` *是一个* `Shape`，`Circle` *是一个* `Shape`。使用 `Shape` 的代码也可以使用\
    \ `Rectangle` 或 `Circle` 来代替。\n\n使用更具体的对象类型（`Rectangle` 或 `Circle`）代替一般类型（`Shape`）的能力称为多态（polymorphism），这个词来自希腊语，意为“多种形态”，这很恰当。\n\
    \n请记住，每个方法调用都会获得一个隐藏的参数，称为 `self`，它是一个指向接收消息的对象的指针。方法使用 `self` 参数来找到它们使用的实例变量。\n\
    \nFigure 4-7 展示了 `self` 指向一个 `RoundedRectangle` 对象。`self` 指向继承链中第一个类的第一个实例变量。对于\
    \ `RoundedRectangle`，继承链从 `NSObject` 开始，然后是 `Shape`，最后以 `RoundedRectangle` 结束，所以\
    \ `self` 指向第一个实例变量 `isa`。Objective-C 编译器知道对象中实例变量的布局，因为它已经看到了这些类的 `@interface`\
    \ 声明。有了这个重要的知识，编译器可以生成代码来找到任何实例变量。\n\n![9781430241881_Fig04-07.eps](img/9781430241881_Fig04-07_fmt.jpg)\n\
    \nFigure 4-7. `self` 参数指向一个圆对象\n\n**警告：脆弱性！**\n"
- fmt: "编译器通过一种“基地址加偏移量”的机制施展其魔法。给定一个对象的基地址——即第一个实例变量首字节的内存位置——编译器可以通过向该地址添加一个偏移量来找到所有其他实例变量。\n\
    \n例如，如果圆角矩形对象的基地址是`0x1000`，那么`isa`实例变量位于`0x1000 + 0`，即`0x1000`。`isa`是一个4字节的值，因此下一个实例变量`fillColor`起始于偏移量4处，即`0x1000\
    \ + 4`或`0x1004`。每个实例变量都有一个相对于对象基地址的偏移量。\n\n当你在方法中访问`fillColor`实例变量时，编译器会生成代码，获取`self`持有的值并加上偏移量（本例中为4），以指向该变量值存储的位置。\n\
    \n这种做法随着时间的推移会带来问题。这些偏移量被硬编码到了编译器生成的程序中。即使苹果公司的工程师想要向`NSObject`添加另一个实例变量，他们也做不到，因为那会改变所有实例变量的偏移量。这被称为**脆弱的基类问题**。苹果公司已经通过随Leopard引入的新的64位Objective-C运行时解决了这个问题，该运行时使用间接方式来确定ivar的位置。\n\
    \n## 方法重写\n\n当你创建自己的全新子类时，你通常会添加自己的方法。有时，你会添加一个为你的类引入独特功能的新方法。其他时候，你会替换或增强由你新类的某个超类定义的现有方法。\n\
    \n例如，你可以从Cocoa的`NSTableView`类开始，该类显示一个可供用户点击的滚动列表，然后添加一个新行为，比如用语音合成器播报列表内容。你可能会添加一个名为`speakRows`的新方法，用于将表格内容馈送给语音合成器。\n\
    \n或者，与其添加一个全新的功能，不如创建一个子类，调整从某个超类继承的现有行为。在*Shapes-Inheritance*中，`Shape`已经完成了我们期望形状所做的大部分工作，比如设置形状的填充颜色和边界，但`Shape`不知道如何绘制任何东西。而且它也无法知道如何绘制：`Shape`是一个通用的抽象类，每个形状的绘制方式都不同。因此，当我们想要创建一个`Circle`类时，我们子类化`Shape`并编写一个知道如何绘制圆形的`draw`方法。\n\
    \n当我们创建`Shape`时，我们知道它的所有子类都必须进行绘制，尽管我们不知道它们具体会如何实现其绘制功能。因此，我们为`Shape`提供了一个`draw`方法，但将其设为空，以便每个子类都可以做自己的事情。当诸如`Circle`和`Rectangle`这样的类实现它们自己的`draw`方法时，我们说它们**重写**了`draw`方法。\n\
    \n当向一个圆形对象发送`draw`消息时，方法调度器会运行被重写的方法——即`Circle`对`draw`的实现。超类（如`Shape`）定义的任何`draw`实现都会被完全忽略。在这种情况中没问题——`Shape`在其`draw`实现中没有代码。但其他时候，你可能*不想*忽略超类版本的方法。更多内容请继续阅读。\n\
    \n## 我感觉超棒！\n\nObjective-C提供了一种方法来重写一个方法，同时仍然调用超类的实现——当你希望让超类做它自己的事情，并在之前或之后执行一些额外的工作时，这非常有用。要调用继承的方法实现，你可以使用`super`作为方法调用的目标。\n\
    \n例如，假设我们刚了解到某些文化对红色圆形有忌讳，而我们想在这些国家销售我们的*Shapes-Inheritance*软件。我们不继续像之前那样绘制红色圆形，而是希望所有圆形都绘制成绿色。因为这个限制只影响圆形，一种实现方法是修改`Circle`，使所有圆形都绘制成绿色。其他用红色绘制的形状则没有问题，所以我们不需要消除它们。为什么不直接修改`Circle`的填充颜色方法呢？在这里，我们可以这样做。不过，你并不总是有这个便利；例如，你可能没有你想要修改的那个类的代码。\n\
    \n回想一下，`setFillColor:`是在`Shape`类中定义的。因此，我们可以在`Circle`类中重写`setFillColor:`，专门为圆形解决这个问题。我们将检查颜色参数，如果是红色，就将其改为绿色。然后，我们将使用`super`告诉超类（`Shape`）将这个改变后的颜色存储到`fillColor`实例变量中（该程序的完整代码清单在`04.02\
    \ Shapes-Green-Circles`中）。\n\n`Circle`的`@interface`部分没有变化，因为我们没有添加任何新方法或实例变量。我们只需要在`@implementation`部分添加代码：\n\
    \n```\n@implementation Circle\n\n- (void)setFillColor:(ShapeColor)c\n{\n  if (c\
    \ == kRedColor)\n  {\n    c = kGreenColor;\n  }\n  [super setFillColor: c];\n\
    } // setFillColor\n\n// Circle @implementation 的其余部分 // 保持不变\n\n@end // Circle\n\
    ```\n\n在这个`setFillColor:`的新实现中，我们检查`ShapeColor`参数是否为红色。如果是，我们就将其改为绿色。接下来，我们请求超类通过代码`[super\
    \ setFillColor: c]`来完成将颜色放入实例变量的工作。\n\n`super`从何而来？它不是一个参数也不是一个实例变量，而是Objective-C编译器提供的一点魔法。当你向`super`发送消息时，你是在要求Objective-C将消息发送给该类的超类。如果在超类中没有定义，Objective-C会像往常一样继续沿着继承链向上查找。\n\
    \n[图4-8](#9781430241881_Ch4.xhtml#_FIG8)展示了`Circle`的`setFillColor:`方法的执行流程。圆形对象被发送了`setFillColor:`消息。方法调度器找到了由`Circle`类实现的`setFillColor:`的自定义版本。\n\
    \n![9781430241881_Fig04-08.eps](images/9781430241881_Fig04-08_fmt.jpg)\n\n[图4-8](#9781430241881_Ch4.xhtml#FIG8).\
    \ 调用超类方法\n\n**注意**   当你重写一个方法时，调用超类方法几乎总是一个好主意，以防它正在执行比你意识到的更多的工作。在这种情况下，我们可以访问`Shape`的源代码，所以我们知道`Shape`在其`setFillColor:`方法中只做了一件事，就是将新颜色存入一个实例变量。但如果我们对`Shape`没有那么熟悉，我们就不会知道`Shape`是否在做其他事情。而且即使我们现在知道`Shape`做了什么，如果该类之后被更改或增强，我们可能也不了解了。通过调用继承的方法，我们确保获得了它实现的所有功能。\n\
    \n在`Circle`版本的`setFillColor:`完成对`kRedColor`的检查并在必要时更改颜色后，通过调用`[super setFillColor:\
    \ c]`来调用超类的方法。`super`调用会运行`Shape`版本的`setFillColor:`方法。\n\n## 总结\n\n继承是面向对象编程中的一个核心概念，因为面向对象编程的许多高级技术都涉及它。在本章中，你了解了继承，并看到了如何使用它来美化和简化*Shapes-Object*代码。我们讨论了如何从现有类创建新类，以及超类的实例变量如何出现在子类中。\n\
    \n我们讲解了Objective-C的方法调度机制，并注意到它如何沿着继承链向上查找，以寻找响应特定消息的方法。最后，我们介绍了`super`关键字，并展示了如何在重写的方法中利用它来利用超类的代码。"
  raw: 'The compiler works its magic by using a “base plus offset” mechanism. Given
    the base address of an object—that is, the memory location of the first byte of
    the first instance variable—the compiler can find all other instance variables
    by adding an offset to that address.


    For example, if the base address of the rounded rectangle object is 0x1000, the
    isa instance variable is at 0x1000 + 0, which is 0x1000\. isa is a 4-byte value,
    so the next instance variable, fillColor, starts at an offset of four, at 0x1000
    + 4, or 0x1004\. Every instance variable has an offset from the object’s base.


    When you access the fillColor instance variable in a method, the compiler generates
    code to take the value that self holds and add the value of the offset (4, in
    this case) to point to the location where the variable’s value is stored.


    This does lead to problems over time. These offsets are now hard-coded into the
    program generated by the compiler. Even if Apple’s engineers wanted to add another
    instance variable to NSObject, they couldn’t, because that would change all of
    the instance variable offsets. This is called the **fragile base class problem**.
    Apple has fixed this problem with the new 64-bit Objective-C runtime introduced
    with Leopard, which uses indirection for determining ivar locations.


    Overriding Methods


    When you’re making your own fresh subclasses, you often add your own methods.
    Sometimes, you’ll add a new method that introduces a unique feature to your class.
    Other times, you’ll replace or enhance an existing method defined by one of your
    new class’s superclasses.


    For instance, you could start with the Cocoa NSTableView class, which shows a
    scrolling list of stuff for users to click, and add a new behavior, such as announcing
    the contents of the list with a speech synthesizer. You might add a new method
    called speakRows that feeds the contents of the table to the speech synthesizer.


    Or, instead of adding an entirely new feature, you might create a subclass that
    tweaks an existing behavior inherited from one of its superclasses. In Shapes-Inheritance,
    Shape already does most of what we want a shape to do by setting the fill color
    and bounds of the shape, but Shape doesn’t know how to draw anything. And it can’t
    know how to draw: Shape is a generic, abstract class, and every shape is drawn
    differently. So when we want to make a Circle class, we subclass Shape and write
    a draw method that knows how to draw a circle.


    When we created Shape, we knew that all its subclasses would have to draw, even
    though we didn’t know exactly what they would do to implement their drawing. So
    we gave Shape a draw method but made it empty so that every subclass could do
    its own thing. When classes such as Circle and Rectangle implement their own draw
    methods, we say that they have **overridden** the draw method.


    When a draw message is sent to a circle object, the method dispatcher runs the
    overridden method—Circle’s implementation of draw. Any implementation of draw
    defined by a superclass, such as Shape, is completely ignored. That’s fine in
    this case—Shape has no code in its implementation of draw. But other times, you
    might *not* want to ignore the superclass’s version of a method. For more on this,
    read on.


    I Feel Super!


    Objective-C provides a way to override a method and still call the superclass’s
    implementation—useful when you want to let the superclass do its thing and perform
    some additional work before or after. To call the inherited method implementation,
    you use super as the target for a method call.


    For example, let’s suppose we just learned that some cultures are offended by
    red circles, and we want to sell our Shapes-Inheritance software in those countries.
    Instead of drawing red circles, as we’ve been doing all along, we want all the
    circles to be drawn in green. Because this limitation affects only circles, one
    way to do this is to modify Circle so that all circles are drawn green. Other
    shapes drawn in red aren’t a problem, so we don’t need to eliminate them. Why
    not just bash Circle’s fill color methods directly? Here, we could. You don’t
    always have this luxury, though; for example, you don’t have the code for the
    class you want to modify.


    Remember that setFillColor: is defined in class Shape. We can therefore fix the
    problem for circles only by overriding setFillColor: in the Circle class. We’ll
    look at the color parameter, and if it’s red, we’ll change it to green. We’ll
    then use super to tell the superclass (Shape) to store this changed color into
    the fillColor instance variable (the complete code listing for this program is
    in *04.02 Shapes-Green-Circles*).


    The @interface section of Circle doesn’t change, because we’re not adding any
    new methods or instance variables. We only need to add code to the @implementation
    section:


    @implementation Circle


    - (void)setFillColor:(ShapeColor)c


    {


    if (c == kRedColor)


    {


    c = kGreenColor;


    }


    [super setFillColor: c];


    } // setFillColor


    // and the rest of the Circle @implementation // is unchanged


    @end // Circle


    In this new implementation of setFillColor:, we examine the ShapeColor parameter
    to see if it’s red. If so, we change it to green. Next, we ask the superclass
    to do the work of putting the color in the instance variable with the code [super
    setFillColor: c].


    Where does super come from? It’s not a parameter or an instance variable, but
    instead a bit of magic provided by the Objective-C compiler. When you send a message
    to super, you’re asking Objective-C to send the message to the class’s superclass.
    If it’s not defined there, Objective-C continues looking up the inheritance chain
    in the usual fashion.


    [Figure 4-8](#9781430241881_Ch4.xhtml#_FIG8) shows the flow of execution for Circle’s
    setFillColor: method. The circle object is sent the setFillColor: message. The
    method dispatcher finds the custom version of setFillColor: that’s implemented
    by class Circle.


    ![9781430241881_Fig04-08.eps](images/9781430241881_Fig04-08_fmt.jpg)


    [Figure 4-8](#9781430241881_Ch4.xhtml#FIG8). Calling the superclass method


    **Note**  When you override a method, invoking the superclass method is almost
    always a good idea, in case it’s doing more work than you’re aware of. In this
    case, we have access to the source for Shape, so we know that all Shape does in
    its setFillColor: method is stick the new color into an instance variable. But
    if we weren’t so well versed in Shape, we wouldn’t know if Shape was doing something
    else. And even though we know what Shape does now, we might not if the class is
    changed or enhanced later. By calling the inherited method, we make sure we get all
    the features it implements.


    After Circle’s version of setFillColor: does its check for kRedColor and changes
    the color if needed, the superclass’s method is invoked by calling [super setFillColor:
    c]. The super call runs Shape’s version of the setFillColor: method.


    Summary


    Inheritance is a vital concept in object-oriented programming, because many advanced
    techniques of OOP involve it. In this chapter, you met inheritance and saw how
    it was used to beautify and simplify the Shapes-Object code. We discussed how
    new classes can be made from existing classes, and you saw how instance variables
    of a superclass appear in subclasses.


    We went over the Objective-C method dispatch machinery and noted how it crawls
    up the inheritance chain looking for the method to run in response to a particular
    message. Finally, we introduced the super keyword and showed how you can use it
    to take advantage of a superclass’s code in an overridden method.'
  trans: "\n编译器通过一种“基地址加偏移量”的机制施展其魔法。给定一个对象的基地址——即第一个实例变量首字节的内存位置——编译器可以通过向该地址添加一个偏移量来找到所有其他实例变量。\n\
    \n例如，如果圆角矩形对象的基地址是`0x1000`，那么`isa`实例变量位于`0x1000 + 0`，即`0x1000`。`isa`是一个 4 字节的值，因此下一个实例变量`fillColor`起始于偏移量\
    \ 4 处，即`0x1000 + 4`或`0x1004`。每个实例变量都有一个相对于对象基地址的偏移量。\n\n当你在方法中访问`fillColor`实例变量时，编译器会生成代码，获取`self`持有的值并加上偏移量（本例中为\
    \ 4），以指向该变量值存储的位置。\n\n这种做法随着时间的推移会带来问题。这些偏移量被硬编码到了编译器生成的程序中。即使苹果公司的工程师想要向`NSObject`添加另一个实例变量，他们也做不到，因为那会改变所有实例变量的偏移量。这被称为**脆弱的基类问题**。苹果公司已经通过随\
    \ Leopard 引入的新的 64 位 Objective-C 运行时解决了这个问题，该运行时使用间接方式来确定 ivar 的位置。\n\n## 方法重写\n\
    \n当你创建自己的全新子类时，你通常会添加自己的方法。有时，你会添加一个为你的类引入独特功能的新方法。其他时候，你会替换或增强由你新类的某个超类定义的现有方法。\n\
    \n例如，你可以从 Cocoa 的`NSTableView`类开始，该类显示一个可供用户点击的滚动列表，然后添加一个新行为，比如用语音合成器播报列表内容。你可能会添加一个名为`speakRows`的新方法，用于将表格内容馈送给语音合成器。\n\
    \n或者，与其添加一个全新的功能，不如创建一个子类，调整从某个超类继承的现有行为。在*Shapes-Inheritance*中，`Shape`已经完成了我们期望形状所做的大部分工作，比如设置形状的填充颜色和边界，但`Shape`不知道如何绘制任何东西。而且它也无法知道如何绘制：`Shape`是一个通用的抽象类，每个形状的绘制方式都不同。因此，当我们想要创建一个`Circle`类时，我们子类化`Shape`并编写一个知道如何绘制圆形的`draw`方法。\n\
    \n当我们创建`Shape`时，我们知道它的所有子类都必须进行绘制，尽管我们不知道它们具体会如何实现其绘制功能。因此，我们为`Shape`提供了一个`draw`方法，但将其设为空，以便每个子类都可以做自己的事情。当诸如`Circle`和`Rectangle`这样的类实现它们自己的`draw`方法时，我们说它们**重写**了`draw`方法。\n\
    \n当向一个圆形对象发送`draw`消息时，方法调度器会运行被重写的方法——即`Circle`对`draw`的实现。超类（如`Shape`）定义的任何`draw`实现都会被完全忽略。在这种情况中没问题——`Shape`在其`draw`实现中没有代码。但其他时候，你可能*不想*忽略超类版本的方法。更多内容请继续阅读。\n\
    \n## 我感觉超棒！\n\nObjective-C 提供了一种方法来重写一个方法，同时仍然调用超类的实现——当你希望让超类做它自己的事情，并在之前或之后执行一些额外的工作时，这非常有用。要调用继承的方法实现，你可以使用`super`作为方法调用的目标。\n\
    \n例如，假设我们刚了解到某些文化对红色圆形有忌讳，而我们想在这些国家销售我们的*Shapes-Inheritance*软件。我们不继续像之前那样绘制红色圆形，而是希望所有圆形都绘制成绿色。因为这个限制只影响圆形，一种实现方法是修改`Circle`，使所有圆形都绘制成绿色。其他用红色绘制的形状则没有问题，所以我们不需要消除它们。为什么不直接修改`Circle`的填充颜色方法呢？在这里，我们可以这样做。不过，你并不总是有这个便利；例如，你可能没有你想要修改的那个类的代码。\n\
    \n回想一下，`setFillColor:`是在`Shape`类中定义的。因此，我们可以在`Circle`类中重写`setFillColor:`，专门为圆形解决这个问题。我们将检查颜色参数，如果是红色，就将其改为绿色。然后，我们将使用`super`告诉超类（`Shape`）将这个改变后的颜色存储到`fillColor`实例变量中（该程序的完整代码清单在`04.02\
    \ Shapes-Green-Circles`中）。\n\n`Circle`的`@interface`部分没有变化，因为我们没有添加任何新方法或实例变量。我们只需要在`@implementation`部分添加代码：\n\
    \n```\n@implementation Circle\n\n- (void)setFillColor:(ShapeColor)c\n{\n  if (c\
    \ == kRedColor)\n  {\n    c = kGreenColor;\n  }\n  [super setFillColor: c];\n\
    } // setFillColor\n\n// Circle @implementation 的其余部分 // 保持不变\n\n@end // Circle\n\
    ```\n\n在这个`setFillColor:`的新实现中，我们检查`ShapeColor`参数是否为红色。如果是，我们就将其改为绿色。接下来，我们请求超类通过代码`[super\
    \ setFillColor: c]`来完成将颜色放入实例变量的工作。\n\n`super`从何而来？它不是一个参数也不是一个实例变量，而是 Objective-C\
    \ 编译器提供的一点魔法。当你向`super`发送消息时，你是在要求 Objective-C 将消息发送给该类的超类。如果在超类中没有定义，Objective-C\
    \ 会像往常一样继续沿着继承链向上查找。\n\n图 4-8 展示了`Circle`的`setFillColor:`方法的执行流程。圆形对象被发送了`setFillColor:`消息。方法调度器找到了由`Circle`类实现的`setFillColor:`的自定义版本。\n\
    \n![9781430241881_Fig04-08.eps](img/9781430241881_Fig04-08_fmt.jpg)\n\n图 4-8.\
    \ 调用超类方法\n\n**注意**   当你重写一个方法时，调用超类方法几乎总是一个好主意，以防它正在执行比你意识到的更多的工作。在这种情况下，我们可以访问`Shape`的源代码，所以我们知道`Shape`在其`setFillColor:`方法中只做了一件事，就是将新颜色存入一个实例变量。但如果我们对`Shape`没有那么熟悉，我们就不会知道`Shape`是否在做其他事情。而且即使我们现在知道`Shape`做了什么，如果该类之后被更改或增强，我们可能也不了解了。通过调用继承的方法，我们确保获得了它实现的所有功能。\n\
    \n在`Circle`版本的`setFillColor:`完成对`kRedColor`的检查并在必要时更改颜色后，通过调用`[super setFillColor:\
    \ c]`来调用超类的方法。`super`调用会运行`Shape`版本的`setFillColor:`方法。\n\n## 总结\n\n继承是面向对象编程中的一个核心概念，因为面向对象编程的许多高级技术都涉及它。在本章中，你了解了继承，并看到了如何使用它来美化和简化*Shapes-Object*代码。我们讨论了如何从现有类创建新类，以及超类的实例变量如何出现在子类中。\n\
    \n我们讲解了 Objective-C 的方法调度机制，并注意到它如何沿着继承链向上查找，以寻找响应特定消息的方法。最后，我们介绍了`super`关键字，并展示了如何在重写的方法中利用它来利用超类的代码。\n"
- fmt: "You’ll get to know composition in the next chapter, which is another way of\
    \ having different objects collaborate to get work done. It might not be quite\
    \ as geeky-cool as inheritance, but it’s very important, so we’ll see you there.\n\
    \n# Chapter 5\n\n## Composition\n\nIn the previous chapter, you got hip to inheritance,\
    \ a way to set up a relationship between two classes that removes the need for\
    \ a lot of duplicated code. And we (briefly) mentioned that you can also set up\
    \ relationships using composition, which is the subject of this chapter. You can\
    \ use composition to combine objects so they can work together. In a typical program,\
    \ you’ll use both inheritance and composition when creating your own classes,\
    \ so it’s important to have a good handle on both concepts.\n\n### What Is Composition?\n\
    \nComposition in programming is like composition in music: you’re bringing individual\
    \ components together and making them work to build something bigger. In music,\
    \ you might bring together a bassoon part and an oboe part in creating a symphony.\
    \ In software, you might bring together a `pedal` object and a `tire` object as\
    \ part of a virtual unicycle.\n\nIn Objective-C, you compose by including pointers\
    \ to objects as instance variables. So, our virtual unicycle would have a pointer\
    \ to a `Pedal` object and a pointer to a `Tire` object and would look something\
    \ like this:\n\n```\n@interface Unicycle : NSObject\n{\n    Pedal *pedal;\n  \
    \  Tire *tire;\n}\n@end // Unicycle\n```\n\nThrough composition, a `Unicycle`\
    \ consists of a `Pedal` and a `Tire`.\n\n**Note** You’ve already seen a form of\
    \ composition in the Shapes-Object program: the `Shape` class makes use of rectangles\
    \ (a `struct`) and colors (an `enum`). Strictly speaking, only objects are said\
    \ to be composed. More primitive types like `int`, `float`, `enum`, and `struct`\
    \ are considered to just be part of the object.\n\n### Car Talk\n\nLet’s put the\
    \ Shapes program aside for awhile (are those sighs of relief we hear?) and take\
    \ a look at modeling an automobile. A car, in our simplified model, has an engine\
    \ and four tires. Rather than wading through the physics modeling of actual tires\
    \ and engines, we’ll use a couple of classes that have only a method to print\
    \ out which part they represent: tire objects will say that they’re tires, and\
    \ the engine object will say that it’s an engine. In a real program, the tires\
    \ would have attributes like air pressure and handling ability, and the engine\
    \ would have variables like horsepower and gas mileage. The code for this program\
    \ can be found in *05.01 CarParts*.\n\nLike the Shapes program, CarParts has everything\
    \ in its `mainCarParts.m`. CarParts starts out by importing the Foundation framework\
    \ header:\n\n```\n#import <Foundation/Foundation.h>\n```\n\nThe `Tire` class follows;\
    \ there’s not much to it except a `description` method:\n\n```\n@interface Tire\
    \ : NSObject\n@end // Tire\n\n@implementation Tire\n- (NSString *) description\
    \ {\n    return (@\"I am a tire. I last a while.\");\n} // description\n@end //\
    \ Tire\n```\n\n**Note** You can leave out the curly braces in your class definitions\
    \ if you don’t have any instance variables.\n\nThe only method in `Tire` is `description`,\
    \ and it wasn’t declared in the interface. Where did it come from? How can anybody\
    \ know to use `description` with a `Tire` if it’s not included in the interface?\
    \ It happens with the help of a little Cocoa magic.\n\n#### Customizing for `NSLog()`\n\
    \nRemember that `NSLog()` lets you use the `%@` format specifier to print objects.\
    \ When `NSLog()` processes the `%@` specifier, it asks the corresponding object\
    \ in the parameter list for its `description`. Speaking technically, `NSLog()`\
    \ sends the `description` message to the object, and the object’s `description`\
    \ method builds an `NSString` and returns it. `NSLog()` then includes that string\
    \ in its output. By supplying a `description` method in your class, you can customize\
    \ how your objects are printed by `NSLog()`.\n\nIn your `description` methods,\
    \ you can return a literal `NSString`, such as `@\"I am a cheese Danish object\"\
    `, or you can construct a string that describes all sorts of information about\
    \ the object, such as the fat content and calories for the cheese Danish. The\
    \ `description` method for Cocoa’s `NSArray` class, which manages a collection\
    \ of objects, provides information about the array itself, such as the number\
    \ of objects it contains and descriptions of each object it contains. These descriptions,\
    \ naturally, are acquired by sending the `description` message to each of the\
    \ objects the array contains.\n\nGetting back to CarParts, let’s have a look at\
    \ the `Engine` class. Like `Tire`, it has just a `description` method. In a real\
    \ program, your engine would have methods such as `start` and `accelerate` and\
    \ instance variables like `RPMs`. But we’re here to see a simple example of composition\
    \ at work, so we’ve given `Engine` just a `description`:\n\n```\n@interface Engine\
    \ : NSObject\n@end // Engine\n\n@implementation Engine\n- (NSString *) description\n\
    {\n    return (@\"I am an engine. Vrooom!\");\n} // description\n@end // Engine\n\
    ```\n\nThe last part is the car itself, which has an engine and a C array of four\
    \ tires. The car uses composition to assemble itself. `Car` also has a method\
    \ called `print` that uses `NSLog()` to print out the tires and engine:\n\n```\n\
    @interface Car : NSObject\n{\n    Engine *engine;\n    Tire *tires[4];\n}\n- (void)\
    \ print;\n@end // Car\n```\n\nThe `engine` and `tires` instance variables are\
    \ the composition, because `tires` and `engine` are instance variables of `Car`.\
    \ You can say that `Car` is *composed* of four tires and an engine. Of course,\
    \ people don’t usually talk like that, so you can also say that `Car` has four\
    \ tires and an engine.\n\nEach car object allocates memory for *pointers* to the\
    \ engine and tires. An entire engine and four tires aren’t embedded into the car,\
    \ just references to other objects floating around in memory. When a new `Car`\
    \ is allocated, these pointers are initialized to `nil` (a zero value) indicating\
    \ that the car does not have an engine or any tires. You can picture it just sitting\
    \ up on blocks.\n\nLet’s take a look at the implementation of the `Car` class.\
    \ First is an `init` method, which initializes the instance variables. The `init`\
    \ method creates an engine and four tires to outfit the car. When you create a\
    \ new object with `new`, two steps actually happen under the hood. First, the\
    \ object is allocated, meaning that a chunk of memory is obtained that will hold\
    \ your instance variables. The `init` method is then called automatically to get\
    \ the object into a workable state.\n\n```\n@implementation Car\n\n- (id) init\n\
    {\n    if (self = [super init]) {\n        engine = [Engine new];\n        tires[0]\
    \ = [Tire new];\n        tires[1] = [Tire new];\n        tires[2] = [Tire new];\n\
    \        tires[3] = [Tire new];\n    }\n    return (self);\n} // init\n```\n\n\
    The `init` method for `Car` creates four new tires and assigns them to the `tires`\
    \ array. `init` then makes a new engine and assigns it to the `engine` instance\
    \ variable.\n\nNext comes `Car`’s `print` method:\n\n```\n- (void) print\n{\n\
    \    NSLog (@\"%@\", engine);\n    NSLog (@\"%@\", tires[0]);\n    NSLog (@\"\
    %@\", tires[1]);\n    NSLog (@\"%@\", tires[2]);\n    NSLog (@\"%@\", tires[3]);\n\
    } // print\n@end // Car\n```\n\n#### About That `if` Statement...\n\nThis line\
    \ of code in the `init` method looks a little odd:\n\n```\nif (self = [super init])\
    \ {\n```\n\nWe’ll explain what’s happening here. You need to call `[super init]`\
    \ so that the superclass (`NSObject`, in this case) can do any one-time initialization\
    \ that it needs to do. The `init` method returns a value (of type `id`, a generic\
    \ object pointer) representing the object that was initialized.\n\nAssigning the\
    \ result of `[super init]` back to `self` is a standard Objective-C convention.\
    \ We do this in case the superclass, as part of its initialization work, returns\
    \ a different object than the one originally created. We’ll explore this in depth\
    \ in a later chapter when we cover `init` methods in more detail, so for now,\
    \ please just nod and smile over this line of code, and we’ll move on."
  raw: 'You’ll get to know composition in the next chapter, which is another way of
    having different objects collaborate to get work done. It might not be quite as
    geeky-cool as inheritance, but it’s very important, so we’ll see you there.


    Chapter 5


    Composition


    In the previous chapter, you got hip to inheritance, a way to set up a relationship
    between two classes that removes the need for a lot of duplicated code. And we
    (briefly) mentioned that you can also set up relationships using composition,
    which is the subject of this chapter. You can use composition to combine objects
    so they can work together. In a typical program, you’ll use both inheritance and
    composition when creating your own classes, so it’s important to have a good handle
    on both concepts.


    What Is Composition?


    Composition in programming is like composition in music: you’re bringing individual
    components together and making them work to build something bigger. In music,
    you might bring together a bassoon part and an oboe part in creating a symphony.
    In software, you might bring together a pedal object and a tire object as part
    of a virtual unicycle.


    In Objective-C, you compose by including pointers to objects as instance variables.
    So, our virtual unicycle would have a pointer to a Pedal object and a pointer
    to a Tire object and would look something like this:


    @interface Unicycle : NSObject


    {


    Pedal *pedal;


    Tire *tire;


    }


    @end // Unicycle


    Through composition, a Unicycle consists of a Pedal and a Tire.


    **Note**  You’ve already seen a form of composition in the Shapes-Object program:
    the Shape class makes use of rectangles (a struct) and colors (an enum). Strictly
    speaking, only objects are said to be composed. More primitive types like int,
    float, enum, and struct are considered to just be part of the object.


    Car Talk


    Let’s put the Shapes program aside for awhile (are those sighs of relief we hear?)
    and take a look at modeling an automobile. A car, in our simplified model, has
    an engine and four tires. Rather than wading through the physics modeling of actual
    tires and engines, we’ll use a couple of classes that have only a method to print
    out which part they represent: tire objects will say that they’re tires, and the
    engine object will say that it’s an engine. In a real program, the tires would
    have attributes like air pressure and handling ability, and the engine would have
    variables like horsepower and gas mileage. The code for this program can be found
    in *05.01 CarParts*.


    Like the Shapes program, CarParts has everything in its *mainCarParts.m*. CarParts
    starts out by importing the Foundation framework header:


    #import <Foundation/Foundation.h>


    The Tire class follows; there’s not much to it except a description method:


    @interface Tire : NSObject


    @end // Tire


    @implementation Tire


    - (NSString *) description {


    return (@"I am a tire. I last a while.");


    } // description


    @end // Tire


    **Note**  You can leave out the curly braces in your class definitions if you
    don’t have any instance variables.


    The only method in Tire is description, and it wasn’t declared in the interface.
    Where did it come from? How can anybody know to use description with a Tire if
    it’s not included in the interface? It happens with the help of a little Cocoa
    magic.


    Customizing for NSLog()


    Remember that NSLog() lets you use the %@ format specifier to print objects. When
    NSLog() processes the %@ specifier, it asks the corresponding object in the parameter
    list for its description. Speaking technically, NSLog() sends the description
    message to the object, and the object’s description method builds an NSString
    and returns it. NSLog() then includes that string in its output. By supplying
    a description method in your class, you can customize how your objects are printed
    by NSLog().


    In your description methods, you can return a literal NSString, such as @"I am
    a cheese Danish object", or you can construct a string that describes all sorts
    of information about the object, such as the fat content and calories for the
    cheese Danish. The description method for Cocoa’s NSArray class, which manages
    a collection of objects, provides information about the array itself, such as
    the number of objects it contains and descriptions of each object it contains.
    These descriptions, naturally, are acquired by sending the description message
    to each of the objects the array contains.


    Getting back to CarParts, let’s have a look at the Engine class. Like Tire, it
    has just a description method. In a real program, your engine would have methods
    such as start and accelerate and instance variables like RPMs. But we’re here
    to see a simple example of composition at work, so we’ve given Engine just a description:


    @interface Engine : NSObject


    @end // Engine


    @implementation Engine


    - (NSString *) description


    {


    return (@"I am an engine. Vrooom!");


    } // description


    @end // Engine


    The last part is the car itself, which has an engine and a C array of four tires.
    The car uses composition to assemble itself. Car also has a method called print
    that uses NSLog() to print out the tires and engine:


    @interface Car : NSObject


    {


    Engine *engine;


    Tire *tires[4];


    }


    - (void) print;


    @end // Car


    The engine and tires instance variables are the composition, because tires and
    engine are instance variables of Car. You can say that Car is *composed* of four
    tires and an engine. Of course, people don’t usually talk like that, so you can
    also say that Car has four tires and an engine.


    Each car object allocates memory for *pointers* to the engine and tires. An entire
    engine and four tires aren’t embedded into the car, just references to other objects
    floating around in memory. When a new Car is allocated, these pointers are initialized
    to nil (a zero value) indicating that the car does not have an engine or any tires.
    You can picture it just sitting up on blocks.


    Let’s take a look at the implementation of the Car class. First is an init method,
    which initializes the instance variables. The init method creates an engine and
    four tires to outfit the car. When you create a new object with new, two steps
    actually happen under the hood. First, the object is allocated, meaning that a
    chunk of memory is obtained that will hold your instance variables. The init method
    is then called automatically to get the object into a workable state.


    @implementation Car


    - (id) init


    {


    if (self = [super init]) {


    engine = [Engine new];


    tires[0] = [Tire new];


    tires[1] = [Tire new];


    tires[2] = [Tire new];


    tires[3] = [Tire new];


    }


    return (self);


    } // init


    The init method for Car creates four new tires and assigns them to the tires array.
    init then makes a new engine and assigns it to the engine instance variable.


    Next comes Car’s print method:


    - (void) print


    {


    NSLog (@"%@", engine);


    NSLog (@"%@", tires[0]);


    NSLog (@"%@", tires[1]);


    NSLog (@"%@", tires[2]);


    NSLog (@"%@", tires[3]);


    } // print


    @end // Car


    About That If Statement...  This line of code in the init method looks a little
    odd:


    if (self = [super init]) {


    We’ll explain what’s happening here. You need to call [super init] so that the
    superclass (NSObject, in this case) can do any one-time initialization that it
    needs to do. The init method returns a value (of type id, a generic object pointer)
    representing the object that was initialized.


    Assigning the result of [super init] back to self is a standard Objective-C convention.
    We do this in case the superclass, as part of its initialization work, returns
    a different object than the one originally created. We’ll explore this in depth
    in a later chapter when we cover init methods in more detail, so for now, please
    just nod and smile over this line of code, and we’ll move on.'
  trans: "\n你将在下一章了解组合，这是另一种让不同对象协作完成工作的方式。它可能不像继承那样充满极客式的酷感，但非常重要，我们到时见。\n\n# 第 5\
    \ 章\n\n## 组合\n\n在上一章中，你接触了继承——一种在两个类之间建立关系、从而省去大量重复代码的方式。我们还（简要）提到，你也可以使用组合来建立关系，这正是本章的主题。你可以利用组合将对象结合起来，让它们协同工作。在典型的程序中，创建自己的类时会同时使用继承和组合，因此，熟练掌握这两个概念非常重要。\n\
    \n### 什么是组合？\n\n编程中的组合就像音乐中的作曲：你将各个独立的组成部分结合起来，让它们共同构建出更大的作品。在音乐中，你可能会将巴松管声部和双簧管声部结合起来创作一部交响曲。在软件中，你可能会将`pedal`（踏板）对象和`tire`（轮胎）对象组合起来，作为虚拟独轮车的一部分。\n\
    \n在 Objective-C 中，组合通过将指向对象的指针作为实例变量来实现。因此，我们的虚拟独轮车会有一个指向`Pedal`对象的指针和一个指向`Tire`对象的指针，看起来大致如下：\n\
    \n```\n@interface Unicycle : NSObject\n{\n    Pedal *pedal;\n    Tire *tire;\n\
    }\n@end // Unicycle\n```\n\n通过组合，一个`Unicycle`（独轮车）由`Pedal`（踏板）和`Tire`（轮胎）构成。\n\
    \n**注意** 在 Shapes-Object 程序中，你已经见过一种组合形式：`Shape`类使用了矩形（`struct`）和颜色（`enum`）。严格来说，只有对象才被称为组合。更原始的类型，如`int`、`float`、`enum`和`struct`，被视为仅是对象的一部分。\n\
    \n### 汽车讨论\n\n让我们暂时把 Shapes 程序放到一边（我们是否听到了如释重负的叹息？），来看看如何对汽车进行建模。在我们简化的模型中，一辆汽车有一个发动机和四个轮胎。我们不会深入实际的轮胎和发动机的物理建模，而是使用两个类，每个类只有一个方法用于打印它们代表哪个部件：轮胎对象会说它们是轮胎，发动机对象会说它是发动机。在实际程序中，轮胎会有气压、操控性能等属性，发动机则会有马力、油耗等变量。该程序的代码可以在*05.01\
    \ CarParts*中找到。\n\n与 Shapes 程序类似，CarParts 的所有代码都在其`mainCarParts.m`文件中。CarParts\
    \ 首先导入 Foundation 框架头文件：\n\n```\n#import <Foundation/Foundation.h>\n```\n\n接下来是`Tire`类，除了一个`description`方法外，它几乎没什么内容：\n\
    \n```\n@interface Tire : NSObject\n@end // Tire\n\n@implementation Tire\n- (NSString\
    \ *) description {\n    return (@\"我是一条轮胎。我能用一阵子。\");\n} // description\n@end\
    \ // Tire\n```\n\n**注意** 如果你的类定义中没有实例变量，可以省略花括号。\n\n`Tire`中唯一的方法是`description`，而且它并没有在接口中声明。它从何而来？如果它没有包含在接口中，别人怎么会知道可以对`Tire`使用`description`方法呢？这借助了一点\
    \ Cocoa 的魔法。\n\n#### 为`NSLog()`进行自定义\n\n回想一下，`NSLog()`允许你使用`%@`格式说明符来打印对象。当`NSLog()`处理`%@`说明符时，它会要求参数列表中对应的对象提供其`description`。从技术上讲，`NSLog()`向该对象发送`description`消息，对象的`description`方法会构建一个`NSString`并返回它。然后`NSLog()`将该字符串包含在输出中。通过在类中提供`description`方法，你可以自定义`NSLog()`打印对象的方式。\n\
    \n在你的`description`方法中，你可以返回一个文字`NSString`，例如`@\"我是一个奶酪丹麦酥对象\"`，或者可以构建一个描述对象各种信息的字符串，例如奶酪丹麦酥的脂肪含量和卡路里。Cocoa\
    \ 的`NSArray`类（用于管理对象集合）的`description`方法会提供关于数组本身的信息，例如它包含的对象数量以及其中每个对象的描述。当然，这些描述是通过向数组中每个对象发送`description`消息而获得的。\n\
    \n回到 CarParts，让我们看看`Engine`类。与`Tire`一样，它只有一个`description`方法。在真实程序中，你的发动机会有诸如`start`和`accelerate`之类的方法，以及`RPMs`之类的实例变量。但这里我们只是为了展示一个简单的组合例子，所以只给`Engine`一个`description`方法：\n\
    \n```\n@interface Engine : NSObject\n@end // Engine\n\n@implementation Engine\n\
    - (NSString *) description\n{\n    return (@\"我是一个发动机。轰隆隆！\");\n} // description\n\
    @end // Engine\n```\n\n最后一部分是汽车本身，它有一个发动机和一个由四个轮胎组成的 C 语言数组。汽车使用组合来组装自己。`Car`还有一个名为`print`的方法，使用`NSLog()`打印轮胎和发动机：\n\
    \n```\n@interface Car : NSObject\n{\n    Engine *engine;\n    Tire *tires[4];\n\
    }\n- (void) print;\n@end // Car\n```\n\n`engine`和`tires`实例变量就是组合，因为`tires`和`engine`是`Car`的实例变量。你可以说`Car`由四个轮胎和一个发动机*组成*。当然，人们通常不会那样说话，所以你也可以说`Car`有四个轮胎和一个发动机。\n\
    \n每个汽车对象都为指向发动机和轮胎的*指针*分配内存。汽车内部并没有嵌入一个完整的发动机和四个轮胎，而是嵌入了指向内存中其他对象的引用。当一个新的`Car`被分配时，这些指针被初始化为`nil`（零值），表示该汽车没有发动机也没有轮胎。你可以想象它只是架在砖块上。\n\
    \n让我们来看看`Car`类的实现。首先是`init`方法，它初始化实例变量。`init`方法创建一个发动机和四个轮胎来装备汽车。当你用`new`创建一个新对象时，实际上在底层发生了两个步骤。首先，对象被分配，这意味着获得了一块用于存放实例变量的内存。然后自动调用`init`方法，使对象进入可用状态。\n\
    \n```\n@implementation Car\n\n- (id) init\n{\n    if (self = [super init]) {\n\
    \        engine = [Engine new];\n        tires[0] = [Tire new];\n        tires[1]\
    \ = [Tire new];\n        tires[2] = [Tire new];\n        tires[3] = [Tire new];\n\
    \    }\n    return (self);\n} // init\n```\n\n`Car`的`init`方法创建了四个新轮胎并将它们赋值给`tires`数组。然后`init`创建一个新发动机并将其赋值给`engine`实例变量。\n\
    \n接下来是`Car`的`print`方法：\n\n```\n- (void) print\n{\n    NSLog (@\"%@\", engine);\n\
    \    NSLog (@\"%@\", tires[0]);\n    NSLog (@\"%@\", tires[1]);\n    NSLog (@\"\
    %@\", tires[2]);\n    NSLog (@\"%@\", tires[3]);\n} // print\n@end // Car\n```\n\
    \n#### 关于那个`if`语句...\n\n`init`方法中的这行代码看起来有点奇怪：\n\n```\nif (self = [super init])\
    \ {\n```\n\n我们来解释一下这里发生了什么。你需要调用`[super init]`，以便父类（这里是`NSObject`）可以执行它需要做的任何一次性初始化工作。`init`方法返回一个值（类型为`id`，即通用对象指针），代表被初始化后的对象。\n\
    \n将`[super init]`的结果赋值回`self`是 Objective-C 的标准约定。我们这样做是因为父类在初始化过程中，可能会返回一个与最初创建的对象不同的对象。我们将在后面更详细地介绍`init`方法时深入探讨这一点，所以现在，请对着这行代码点头微笑，然后我们继续往下讲。\n"
- fmt: "`print`方法使用`NSLog()`来打印实例变量。请记住，`%@`会调用每个对象的`description`方法，然后显示结果。在实际程序中，你会利用轮胎和引擎来判断汽车在路面上的抓地表现。\n\
    \n`CarParts.m`的最后一部分是程序的`main()`函数，即此程序的“驱动程序”（请原谅这个双关语）。`main()`创建一辆新车，通过调用`print`方法让汽车执行其任务，然后退出。\n\
    \n```\nint main (int argc, const char * argv[])\n{\n    Car *car;\n    car = [Car\
    \ new];\n    [car print];\n    return (0);\n} // main\n```\n\n构建并运行`CarParts`，你应该会看到类似如下的输出：\n\
    \n```\nI am an engine. Vrooom!\nI am a tire. I last a while.\nI am a tire. I last\
    \ a while.\nI am a tire. I last a while.\nI am a tire. I last a while.\nIt won’t\
    \ win any car awards, but it works!\n```\n\n# 访问器方法\n\n程序员很少对自己编写的程序感到满意，因为软件永远没有完工的时候。总会有更多的\
    \ bug 需要修复，更多的功能需要添加，或者更多的途径让程序变得更大、更强或更快。因此，`CarParts`尚未完美也就不足为奇了。我们可以通过使用访问器方法来改进它，使其代码更加灵活。这个新版本的代码位于`05.02\
    \ CarParts-Accessors`文件夹中。\n\n一位经验丰富的程序员看到`Car`的`init`方法时可能会问：“为什么汽车要自己创建轮胎和引擎？”如果能自定义汽车使用不同类型的轮胎（例如冬季使用的雪地胎）或各种类型的引擎（燃油喷射而非化油器式），程序会好得多。\n\
    \n如果我们能指示汽车使用特定的轮胎或引擎，那就太好了。这样我们就可以让用户混合搭配汽车部件来创建自定义的车辆。\n\n我们可以通过添加访问器方法来实现这一点。**访问器**方法是读取或更改对象特定属性的方法。例如，`Shapes-Object`中的`setFillColor:`就是一个访问器方法。如果我们在`Car`对象中添加一个更改引擎的新方法，那它也是一个访问器方法。这种特定类型的访问器方法被称为**设置器**方法，因为它会在对象上设置一个值。你可能还会听到术语**更改器**，用于描述更改对象状态的方法。\n\
    \n你可能已经猜到，另一种访问器方法是**获取器**。获取器方法为使用对象的代码提供了一种访问其属性的途径。在一款赛车游戏中，物理逻辑需要访问汽车轮胎的属性，来判断汽车在当前速度下是否会在湿滑路面上打滑。\n\
    \n**注意** 在操作另一个对象的属性时，应始终使用任何可用的访问器方法——切勿直接深入对象内部并直接更改值。例如，`main()`不应直接访问`Car`的引擎实例变量（使用`car->engine`）来更改其引擎。相反，你的代码应使用设置器方法来执行更改。\n\
    \n访问器方法又是间接性的一个例证。通过访问器方法间接访问汽车的引擎，你为汽车的实现提供了灵活性。\n\n让我们为`Car`添加一些设置器和获取器方法，这样使用它的代码就能控制所用的轮胎和引擎类型。以下是`Car`的新接口，新增内容以粗体显示：\n\
    \n```\n@interface Car : NSObject\n{\n    Engine *engine;\n    Tire *tires[4];\n\
    }\n\n- (Engine *) engine;\n- (void) setEngine: (Engine *) newEngine;\n- (Tire\
    \ *) tireAtIndex: (int) index;\n- (void) setTire: (Tire *) tire atIndex: (int)\
    \ index;\n- (void) print;\n@end // Car\n```\n\n实例变量的集合没有改变，但新增了两对方法：`engine`和`setEngine:`处理引擎属性，`tireAtIndex:`和`setTire:atIndex:`处理轮胎。访问器方法几乎总是成对出现，一个用于设置值，一个用于获取值。偶尔，只提供获取器（用于只读属性，如磁盘上文件的大小）或只提供设置器（如设置秘密密码）可能是有意义的，但大多数情况下，你需要同时编写设置器和获取器。\n\
    \nCocoa 对于命名访问器方法有约定。当你为自己的类编写访问器方法时，应遵循这些约定，以免你和阅读你代码的其他人产生混淆。\n\n设置器方法以其要更改的属性命名，并在前面加上`set`。以下是设置器方法名称的示例：`setEngine:`、`setStringValue:`、`setFont:`、`setFillColor:`和`setTextLineHeight:`。\n\
    \n获取器方法则直接以其返回的属性命名。与上述设置器对应的获取器应命名为`engine`、`stringValue`、`font`、`fillColor`和`textLineHeight`。不要在方法名称中使用`get`这个词。例如，命名为`getStringValue`和`getFont`的方法会违反约定。某些语言（如Java）有不同的约定，会在访问器方法名称中使用`get`，但如果你在编写Cocoa代码，请不要使用它。\n\
    \n**注意** 在Cocoa中，“`get`”这个词有特殊含义：在Cocoa方法名中，它表示该方法通过你作为参数传入的指针来返回值。例如，`NSData`（一个Cocoa类，用于存储任意字节序列的对象）有一个名为`getBytes:`的方法，该方法接受一个参数，该参数是用于存放字节的内存缓冲区的地址。`NSBezierPath`（用于绘图）有一个名为`getLineDash:count:phase:`的方法，该方法接受一个指向浮点数组的指针（用于线型模式）、一个指向整数的指针（用于模式中的元素数量）以及一个指向浮点的指针（用于开始绘制的模式位置）。\n\
    \n如果你在访问器方法名称中使用`get`，使用你代码的经验丰富的Cocoa程序员会期望向你的方法提供指针作为参数，然后当他们发现这只是一个简单的访问器时会感到困惑。最好不要让程序员感到困惑。\n\
    \n## 设置引擎\n\n第一对访问器方法影响引擎：\n\n```\n- (Engine *) engine;\n- (void) setEngine: (Engine\
    \ *) newEngine;\n```\n\n使用`Car`对象的代码调用`engine`来访问引擎，调用`setEngine:`来更改它。以下是这些方法实现的示例：\n\
    \n```\n- (Engine *) engine\n{\n    return (engine);\n} // engine\n\n- (void) setEngine:\
    \ (Engine *) newEngine\n{\n    engine = newEngine;\n} // setEngine\n```\n\n获取器方法`engine`返回`engine`实例变量的当前值。请记住，Objective-C\
    \ 中所有对象交互都通过指针进行，因此`engine`方法返回一个指向`Car`所包含引擎对象的指针。\n\n类似地，设置器方法`setEngine:`将`engine`实例变量的值设置为指向的值。实际的引擎本身不会被复制，只是复制了指向该引擎的指针的值。换句话说：在对一个汽车对象调用`setEngine:`之后，整个世界中只存在一个引擎，而不是两个。\n\
    \n**注意** 为了全面说明，我们需要指出，引擎的设置器和获取器在内存管理和对象所有权方面存在一些问题。在现在就把内存和对象生命周期管理抛给你，会让你感到困惑和沮丧，因此我们将推迟讨论编写绝对正确的访问器方法，直到[第8章](#9781430241881_Ch8.xhtml)。\n\
    \n要实际使用这些访问器，你可以编写如下代码：\n\n```\nEngine *engine = [Engine new];\n[car setEngine:\
    \ engine];\nNSLog (@\"the car's engine is %@\", [car engine]);\n```\n\n## 设置轮胎\n\
    \n针对轮胎的访问器方法稍微复杂一些："
  raw: 'The print method uses NSLog() to print out the instance variables. Remember
    that %@ simply calls the description method of each object, and the results are
    displayed. In a real program, you would use the tires and the engine to figure
    out how well the car was holding the road.


    The last part of *CarParts.m* is the main() function, the *driver* of this program.
    (Sorry about that.) main() creates a new car, tells it to do its thing by asking
    the car to print itself, and then exits.


    int main (int argc, const char * argv[])


    {


    Car *car;


    car = [Car new];


    [car print];


    return (0);


    } // main


    Build and run CarParts, and you should see output similar to this:


    I am an engine. Vrooom!


    I am a tire. I last a while.


    I am a tire. I last a while.


    I am a tire. I last a while.


    I am a tire. I last a while.


    It won’t win any car awards, but it works!


    Accessor Methods


    Programmers are rarely satisfied with the programs they write, because software
    is never finished. There’s always one more bug to fix, one more feature to add,
    or one more way to make the program bigger, stronger, or faster. So it’s no surprise
    that CarParts isn’t perfect yet. We can improve it and make its code more flexible
    by using accessor methods. The code for this new version can be found in the *05.02
    CarParts-Accessors* folder.


    An experienced programmer looking at Car’s init method might say, “Why is the
    car creating its own tires and engine?” The program would be much better if you
    could customize the car to use different kinds of tires (such as snow tires for
    the winter months) or various types of engines (fuel injected rather than carbureted).


    It would be nice if we could instruct the car to use a particular tire or engine.
    We could then let users mix and match car parts to create custom vehicles.


    We can make this happen by adding accessor methods. An **accessor** method is
    one that reads or changes a specific attribute for an object. For instance, setFillColor:
    in Shapes-Object is an accessor method. If we added a new method to change the
    engine in a Car object, it would be an accessor method. This particular kind of
    accessor method is called a **setter** method, because it sets a value on an object.
    You might hear the term **mutator** used for a method that changes an object state.


    You’ve probably already guessed that another kind of accessor method is a **getter**.
    A getter method provides a way for code that uses an object to access its attributes.
    In a racing game, the physics logic would want to access attributes of the car’s
    tires to figure out if the car will skid on wet pavement at its current speed.


    **Note**  You should always use any provided accessor methods when manipulating
    another object’s attributes—never reach into an object and change values directly.
    For example, main() should not directly access the Car’s engine instance variable
    (using car->engine) to change its engine. Instead, your code should use a setter
    method to make the change.


    Accessor methods are yet another example of indirection at work. By accessing
    the car’s engine indirectly via an accessor method, you’re allowing for flexibility
    in the car’s implementation.


    Let’s add some setter and getter methods to Car so the code that uses it has control
    over the kinds of tires and engine used. Here is the new interface for Car, with
    the new items in bold:


    @interface Car : NSObject


    {


    Engine *engine;


    Tire *tires[4];


    }


    - (Engine *) engine;


    - (void) setEngine: (Engine *) newEngine;


    - (Tire *) tireAtIndex: (int) index;


    - (void) setTire: (Tire *) tire atIndex: (int) index;


    - (void) print;


    @end // Car


    The set of instance variables hasn’t changed, but there are two new pairs of methods:
    engine and setEngine: deal with the engine attributes, and tireAtIndex: and setTire:atIndex:
    work with the tires. Accessor methods almost always come in pairs, one to set
    the value and one to get it. Occasionally, having only a getter (for a read-only
    attribute, like the size of a file on disk) or only a setter (like setting a secret
    password) might make sense, but most often, you’ll be writing both setters and
    getters.


    Cocoa has conventions for naming accessor methods. When you’re writing accessor
    methods for your own classes, you should follow these conventions so that you
    and other people reading your code won’t get confused.


    Setter methods are named after the attribute they change, preceded by the word
    “set.” Here are examples of names of setter methods: setEngine:, setStringValue:,
    setFont:, setFillColor:, and setTextLineHeight:.


    Getter methods are simply named after the attribute they return. The getters corresponding
    to the preceding setters would be named engine, stringValue, font, fillColor,
    and textLineHeight. Don’t use the word “get” in the name of the method. For example,
    methods named getStringValue and getFont would violate the convention. Some languages,
    such as Java, have different conventions that use “get” in the name of accessor
    methods, but if you’re writing Cocoa code, don’t use it.


    **Note**  The word “get” has a special meaning in Cocoa: in a Cocoa method name,
    it means the method returns a value via a pointer that you pass in as a parameter.
    For example, NSData (a Cocoa class for objects that store an arbitrary sequence
    of bytes) has a method called getBytes:, which takes a parameter that is the address
    of a memory buffer for holding the bytes. NSBezierPath (used for drawing) has
    a method called getLineDash:count:phase:, which takes a pointer to a float array
    for the line dash pattern, a pointer to an integer for the number of elements
    in the dash pattern, and a pointer to a float for the place in the pattern to
    start drawing.


    If you use “get” in your accessor method names, experienced Cocoa programmers
    using your code will expect to provide pointers as arguments to your method and
    will then be confused when they discover that it’s just a simple accessor. It’s
    best not to confuse the programmers.


    Setting the Engine


    The first pair of accessor methods affect the engine:


    - (Engine *) engine;


    - (void) setEngine: (Engine *) newEngine;


    Code that uses Car objects calls engine to access the engine and setEngine: to
    change it. Here is what the implementation of these methods look like:


    - (Engine *) engine


    {


    return (engine);


    } // engine


    - (void) setEngine: (Engine *) newEngine


    {


    engine = newEngine;


    } // setEngine


    The getter method engine returns the current value of the engine instance variable.
    Remember that all object interaction in Objective-C happens via pointers, so the
    engine method returns a pointer to the engine object that the Car contains.


    Similarly, the setter method setEngine: sets the value of the engine instance
    variable to the value that’s pointed in. The actual engine itself is not copied,
    just the value of the pointer that points to the engine. Here’s another way to
    say this: after you call setEngine: on a car object, only one engine exists in
    the world, not two engines.


    **Note**  In the interests of full disclosure, we’ll state that there are a couple
    of problems with the Engine getter and setter in the areas of memory management
    and object ownership. Throwing memory and object life cycle management at you
    right now would be both confusing and frustrating, so we’ll defer the discussion
    of the absolutely correct way to write accessor methods until [Chapter 8](#9781430241881_Ch8.xhtml).


    To actually use these accessors, you write code like this:


    Engine *engine = [Engine new];


    [car setEngine: engine];


    NSLog (@"the car’s engine is %@", [car engine]);


    Setting the Tires


    The accessor methods for the tires are a little more sophisticated:'
  trans: "\n`print`方法使用`NSLog()`来打印实例变量。请记住，`%@`会调用每个对象的`description`方法，然后显示结果。在实际程序中，你会利用轮胎和引擎来判断汽车在路面上的抓地表现。\n\
    \n`CarParts.m`的最后一部分是程序的`main()`函数，即此程序的“驱动程序”（请原谅这个双关语）。`main()`创建一辆新车，通过调用`print`方法让汽车执行其任务，然后退出。\n\
    \n```\nint main (int argc, const char * argv[])\n{\n    Car *car;\n    car = [Car\
    \ new];\n    [car print];\n    return (0);\n} // main\n```\n\n构建并运行`CarParts`，你应该会看到类似如下的输出：\n\
    \n```\nI am an engine. Vrooom!\nI am a tire. I last a while.\nI am a tire. I last\
    \ a while.\nI am a tire. I last a while.\nI am a tire. I last a while.\nIt won’t\
    \ win any car awards, but it works!\n```\n\n# 访问器方法\n\n程序员很少对自己编写的程序感到满意，因为软件永远没有完工的时候。总会有更多的\
    \ bug 需要修复，更多的功能需要添加，或者更多的途径让程序变得更大、更强或更快。因此，`CarParts`尚未完美也就不足为奇了。我们可以通过使用访问器方法来改进它，使其代码更加灵活。这个新版本的代码位于`05.02\
    \ CarParts-Accessors`文件夹中。\n\n一位经验丰富的程序员看到`Car`的`init`方法时可能会问：“为什么汽车要自己创建轮胎和引擎？”如果能自定义汽车使用不同类型的轮胎（例如冬季使用的雪地胎）或各种类型的引擎（燃油喷射而非化油器式），程序会好得多。\n\
    \n如果我们能指示汽车使用特定的轮胎或引擎，那就太好了。这样我们就可以让用户混合搭配汽车部件来创建自定义的车辆。\n\n我们可以通过添加访问器方法来实现这一点。**访问器**方法是读取或更改对象特定属性的方法。例如，`Shapes-Object`中的`setFillColor:`就是一个访问器方法。如果我们在`Car`对象中添加一个更改引擎的新方法，那它也是一个访问器方法。这种特定类型的访问器方法被称为**设置器**方法，因为它会在对象上设置一个值。你可能还会听到术语**更改器**，用于描述更改对象状态的方法。\n\
    \n你可能已经猜到，另一种访问器方法是**获取器**。获取器方法为使用对象的代码提供了一种访问其属性的途径。在一款赛车游戏中，物理逻辑需要访问汽车轮胎的属性，来判断汽车在当前速度下是否会在湿滑路面上打滑。\n\
    \n**注意** 在操作另一个对象的属性时，应始终使用任何可用的访问器方法——切勿直接深入对象内部并直接更改值。例如，`main()`不应直接访问`Car`的引擎实例变量（使用`car->engine`）来更改其引擎。相反，你的代码应使用设置器方法来执行更改。\n\
    \n访问器方法又是间接性的一个例证。通过访问器方法间接访问汽车的引擎，你为汽车的实现提供了灵活性。\n\n让我们为`Car`添加一些设置器和获取器方法，这样使用它的代码就能控制所用的轮胎和引擎类型。以下是`Car`的新接口，新增内容以粗体显示：\n\
    \n```\n@interface Car : NSObject\n{\n    Engine *engine;\n    Tire *tires[4];\n\
    }\n\n- (Engine *) engine;\n- (void) setEngine: (Engine *) newEngine;\n- (Tire\
    \ *) tireAtIndex: (int) index;\n- (void) setTire: (Tire *) tire atIndex: (int)\
    \ index;\n- (void) print;\n@end // Car\n```\n\n实例变量的集合没有改变，但新增了两对方法：`engine`和`setEngine:`处理引擎属性，`tireAtIndex:`和`setTire:atIndex:`处理轮胎。访问器方法几乎总是成对出现，一个用于设置值，一个用于获取值。偶尔，只提供获取器（用于只读属性，如磁盘上文件的大小）或只提供设置器（如设置秘密密码）可能是有意义的，但大多数情况下，你需要同时编写设置器和获取器。\n\
    \nCocoa 对于命名访问器方法有约定。当你为自己的类编写访问器方法时，应遵循这些约定，以免你和阅读你代码的其他人产生混淆。\n\n设置器方法以其要更改的属性命名，并在前面加上`set`。以下是设置器方法名称的示例：`setEngine:`、`setStringValue:`、`setFont:`、`setFillColor:`和`setTextLineHeight:`。\n\
    \n获取器方法则直接以其返回的属性命名。与上述设置器对应的获取器应命名为`engine`、`stringValue`、`font`、`fillColor`和`textLineHeight`。不要在方法名称中使用`get`这个词。例如，命名为`getStringValue`和`getFont`的方法会违反约定。某些语言（如\
    \ Java）有不同的约定，会在访问器方法名称中使用`get`，但如果你在编写 Cocoa 代码，请不要使用它。\n\n**注意** 在 Cocoa 中，“`get`”这个词有特殊含义：在\
    \ Cocoa 方法名中，它表示该方法通过你作为参数传入的指针来返回值。例如，`NSData`（一个 Cocoa 类，用于存储任意字节序列的对象）有一个名为`getBytes:`的方法，该方法接受一个参数，该参数是用于存放字节的内存缓冲区的地址。`NSBezierPath`（用于绘图）有一个名为`getLineDash:count:phase:`的方法，该方法接受一个指向浮点数组的指针（用于线型模式）、一个指向整数的指针（用于模式中的元素数量）以及一个指向浮点的指针（用于开始绘制的模式位置）。\n\
    \n如果你在访问器方法名称中使用`get`，使用你代码的经验丰富的 Cocoa 程序员会期望向你的方法提供指针作为参数，然后当他们发现这只是一个简单的访问器时会感到困惑。最好不要让程序员感到困惑。\n\
    \n## 设置引擎\n\n第一对访问器方法影响引擎：\n\n```\n- (Engine *) engine;\n- (void) setEngine: (Engine\
    \ *) newEngine;\n```\n\n使用`Car`对象的代码调用`engine`来访问引擎，调用`setEngine:`来更改它。以下是这些方法实现的示例：\n\
    \n```\n- (Engine *) engine\n{\n    return (engine);\n} // engine\n\n- (void) setEngine:\
    \ (Engine *) newEngine\n{\n    engine = newEngine;\n} // setEngine\n```\n\n获取器方法`engine`返回`engine`实例变量的当前值。请记住，Objective-C\
    \ 中所有对象交互都通过指针进行，因此`engine`方法返回一个指向`Car`所包含引擎对象的指针。\n\n类似地，设置器方法`setEngine:`将`engine`实例变量的值设置为指向的值。实际的引擎本身不会被复制，只是复制了指向该引擎的指针的值。换句话说：在对一个汽车对象调用`setEngine:`之后，整个世界中只存在一个引擎，而不是两个。\n\
    \n**注意** 为了全面说明，我们需要指出，引擎的设置器和获取器在内存管理和对象所有权方面存在一些问题。在现在就把内存和对象生命周期管理抛给你，会让你感到困惑和沮丧，因此我们将推迟讨论编写绝对正确的访问器方法，直到第\
    \ 8 章。\n\n要实际使用这些访问器，你可以编写如下代码：\n\n```\nEngine *engine = [Engine new];\n[car setEngine:\
    \ engine];\nNSLog (@\"the car's engine is %@\", [car engine]);\n```\n\n## 设置轮胎\n\
    \n针对轮胎的访问器方法稍微复杂一些：\n"
- fmt: "### 轮胎访问器\n\n- `(void) setTire: (Tire *) tire atIndex: (int) index;`\n- `(Tire\
    \ *) tireAtIndex: (int) index;`\n\n由于汽车有多个轮胎安装位置（车辆四个角落各一个），`Car`对象包含一个轮胎数组。为了不直接暴露轮胎数组，这里使用了索引访问器。当为汽车设置轮胎时，你需要告诉汽车使用哪个轮胎以及安装位置。同样，当访问轮胎时，你需要指定特定位置。\n\
    \n以下是轮胎访问器的实现：\n\n```objectivec\n- (void) setTire: (Tire *) tire atIndex: (int)\
    \ index\n{\n    if (index < 0 || index > 3) {\n        NSLog (@\"bad index (%d)\
    \ in setTire:atIndex:\", index);\n        exit (1);\n    }\n    tires[index] =\
    \ tire;\n} // setTire:atIndex:\n\n- (Tire *) tireAtIndex: (int) index\n{\n   \
    \ if (index < 0 || index > 3) {\n        NSLog (@\"bad index (%d) in tireAtIndex:\"\
    , index);\n        exit (1);\n    }\n    return (tires[index]);\n} // tireAtIndex:\n\
    ```\n\n轮胎访问器包含一些通用代码，用于检查轮胎实例变量的数组索引是否有效。如果索引超出0到3的范围，程序会打印错误信息并退出。这种做法被称为**防御性编程**，这是一个好习惯。防御性编程能在开发早期捕获错误，例如使用了错误的轮胎位置索引。\n\
    \n由于`tires`是一个C风格数组，编译器在访问数组时不会对索引进行任何错误检查，因此我们必须检查索引的有效性。我们可以写出`tires[-5]`或`tires[23]`而不会收到编译器警告。当然，该数组只有四个元素，因此使用`-5`或`23`作为索引将访问随机内存，导致错误和程序崩溃。\n\
    \n索引检查完成后，`tires`数组会被操作，将新轮胎放入正确位置。使用这些访问器的代码如下：\n\n```objectivec\nTire *tire\
    \ = [Tire new];\n[car setTire: tire atIndex: 2];\nNSLog (@\"tire number two is\
    \ %@\", [car tireAtIndex: 2]);\n```\n\n### 跟踪对`Car`的修改\n\n在声明`CarParts-Accessors`完成之前，还有几个细节需要处理。\n\
    \n第一个细节是`Car`的`init`方法。由于`Car`现在有了发动机和轮胎的访问器，其`init`方法不再需要创建这些部件。创建汽车的代码负责配置发动机和轮胎。事实上，我们可以完全移除`init`方法，因为`Car`不再需要做这些工作。获取新车的人将得到一辆没有轮胎和发动机的车，但这些部件可以轻松制造（有时，软件世界比现实世界要容易得多）。\n\
    \n由于`Car`不再创建自己的活动部件，`main()`必须更新以创建它们。将`main()`函数修改为如下：\n\n```objectivec\nint\
    \ main (int argc, const char * argv[]) {\n    Car *car = [Car new];\n    Engine\
    \ *engine = [Engine new];\n    [car setEngine: engine];\n    for (int i = 0; i\
    \ < 4; i++) {\n        Tire *tire = [Tire new];\n        [car setTire: tire atIndex:\
    \ i];\n    }\n    [car print];\n    return (0);\n} // main\n```\n\n`main()`创建了一辆新车，和之前版本一样。然后，创建一个新的`Engine`并将其放入汽车。接着，一个`for`循环执行四次。每次循环，创建一个新轮胎，并告诉汽车使用该轮胎。最后，打印汽车信息并退出程序。\n\
    \n从用户的角度看，程序没有任何变化：\n\n```\nI am an engine. Vrooom!\nI am a tire. I last a while.\n\
    I am a tire. I last a while.\nI am a tire. I last a while.\nI am a tire. I last\
    \ a while.\n```\n\n和`Shapes-Object`一样，我们重构了程序，改进了内部结构，但保持了外部行为不变。\n\n### 扩展`CarParts`\n\
    \n既然`Car`有了访问器，让我们利用它们。我们将使用标准发动机和轮胎的变体，而不是默认部件。我们将使用继承创建新的发动机和轮胎类型，然后通过`Car`的访问器（即组合）为汽车配备这些新部件。该程序的代码位于`05.03\
    \ CarParts-2`文件夹中。\n\n首先是新型发动机`Slant6`（如果你更喜欢V8或`ThreeFiftyOneWindsor`，也可以尝试）：\n\
    \n```objectivec\n@interface Slant6 : Engine\n@end // Slant6\n\n@implementation\
    \ Slant6\n- (NSString *) description\n{\n    return (@\"I am a slant- 6. VROOOM!\"\
    );\n} // description\n@end // Slant6\n```\n\n`Slant6`是一种发动机，因此继承`Engine`是合理的。记住，继承建立了一种关系，允许我们在期望超类（`Engine`）的地方传递子类（`Slant6`）。由于`Car`的`setEngine:`方法接受类型为`Engine`的参数，我们可以安全地传递一个`Slant6`。\n\
    \n`Slant6`重写了`description`方法，使其打印新消息。由于`Slant6`没有调用超类的`description`方法（即不包含`[super\
    \ description]`），它完全替换了继承的`description`。\n\n实现新轮胎类`AllWeatherRadial`的步骤与`Slant6`类似。我们继承现有类（`Tire`）并提供新的`description`方法：\n\
    \n```objectivec\n@interface AllWeatherRadial : Tire\n@end // AllWeatherRadial\n\
    \n@implementation AllWeatherRadial\n- (NSString *) description\n{\n    return\
    \ (@\"I am a tire for rain or shine.\");\n} // description\n@end // AllWeatherRadial\n\
    ```\n\n最后，我们修改`main()`以使用新的发动机和轮胎类型（更改的代码已加粗）：\n\n```objectivec\nint main (int\
    \ argc, const char * argv[]) {\n    Car *car = [Car new];\n    for (int i = 0;\
    \ i < 4; i++) {\n        Tire *tire = [AllWeatherRadial new];\n        [car setTire:\
    \ tire atIndex: i];\n    }\n    Engine *engine = [Slant6 new];\n    [car setEngine:\
    \ engine];\n    [car print];\n    return (0);\n} // main\n```\n\n我们添加了两个新类，并稍微修改了两行代码，完全没有改动`Car`本身。我们的`Car`愉快地使用你设计的任何发动机和轮胎，而无需更改`Car`自身。程序的行为现在发生了根本变化：\n\
    \n```\nI am a slant- 6. VROOOM!\nI am a tire for rain or shine.\nI am a tire for\
    \ rain or shine.\nI am a tire for rain or shine.\nI am a tire for rain or shine.\n\
    ```\n\n### 组合还是继承？\n\n`CarParts-2`同时使用了继承和组合，这是本章和上一章介绍的工具包中的两个新工具。一个很好的问题是：“什么时候使用继承，什么时候使用组合？”\n\
    \n继承建立了一种“是（is a）”关系。三角形*是一个*形状。`Slant6`*是一个*发动机。`AllWeatherRadial`*是一个*轮胎。当你能说“X是Y”时，可以使用继承。\n\
    \n相反，组合建立了一种“有（has a）”关系。形状*有*填充颜色。汽车*有*一个发动机，并且*有*轮胎。相比之下，汽车不是一个发动机，汽车也不是一个轮胎。当你能说“X有一个Y”时，应该使用组合。\n\
    \n初学面向对象编程的程序员经常犯的错误是试图对一切使用继承，例如让`Car`继承`Engine`。继承是一个有趣的新玩具，但并不适用于所有情况。你可以用这种结构创建一个可运行的程序，因为你可以在`Car`代码内部访问发动机工作所需的内容。但对于阅读代码的人来说，这没有意义。汽车是一个发动机？嗯？因此，只在合适的情况下使用继承。\n\
    \n下面是一个在设计数据结构时如何思考的例子：创建新对象时，花一些时间思考何时应使用继承，何时应使用组合。例如，在设计汽车相关对象时，你可能思考：“一辆汽车有轮胎、一个发动机和一个变速箱。”因此，你会使用组合，在`Car`类中为所有这些部件创建实例变量。"
  raw: '- (void) setTire: (Tire *) tire atIndex: (int) index;


    - (Tire *) tireAtIndex: (int) index;


    Because a car has multiple spots for tires (one on each of the four corners of
    the vehicle), Car objects contain an array of tires. Rather than exposing the
    tires array to the world, an indexed accessor is used. When setting a tire for
    a car, you tell the car not only which tire to use but also which position on
    the car to use for each tire. Likewise, when accessing a tire for a car, you ask
    for the tire in a particular location.


    Here is the implementation of tire accessors:


    - (void) setTire: (Tire *) tire atIndex: (int) index


    {


    if (index < 0 || index > 3) {


    NSLog (@"bad index (%d) in setTire:atIndex:",index);


    exit (1);


    }


    tires[index] = tire;


    } // setTire:atIndex:


    - (Tire *) tireAtIndex: (int) index


    {


    if (index < 0 || index > 3) {


    NSLog (@"bad index (%d) in "tireAtIndex:", index);


    exit (1);


    }


    return (tires[index]);


    } // tireAtIndex:


    The tire accessors have some common code that checks to make sure the array index
    for the tires instance variable is a valid value. If it’s outside of the range
    of 0 through 3, the program prints a complaint and exits. This code is what’s
    known as **defensive programming**, and it’s a good idea. Defensive programming
    catches errors, such as using a bad index for a tire location, early in the development
    cycle.


    We have to check the validity of the array index because tires is a C-style array,
    and the compiler doesn’t do any error checking on the index used when accessing
    the array. We could write tires[-5] or tires[23] without a compiler complaint.
    Of course, the array has only four elements, so using –5 or 23 for the index will
    access random memory and lead to bugs and program crashes.


    After the index check, the tires array is manipulated to put the new tire in its
    proper place. Code that uses these accessors looks like this:


    Tire *tire = [Tire new];


    [car setTire: tire atIndex: 2];


    NSLog (@"tire number two is %@", [car tireAtIndex: 2]);


    Tracking Changes to Car


    There are a couple of details left to clean up before we can declare CarParts-Accessors
    to be done.


    The first detail is Car’s init method. Because Car now has accessors for its engine
    and tires, its init method doesn’t need to create any. The code that creates the
    car is responsible for outfitting the engine and tires. In fact, we can remove
    the init method entirely, since there’s no need to do that work in Car any more.
    People who get a new car will get one without tires or an engine, but these can
    easily be made (sometimes, life in software is so much easier than it is out here
    in the real world).


    Because Car no longer creates its own moving parts, main() must be updated to
    create them. Change your main() function to look like this:


    int main (int argc, const char * argv[]) {


    Car *car = [Car new];


    Engine *engine = [Engine new];


    [car setEngine: engine];


    for (int i = 0; i < 4; i++) {


    Tire *tire = [Tire new];


    [car setTire: tire atIndex: i];


    }


    [car print];


    return (0);


    } // main


    main() creates a new car, as it did in its previous in*car*nation. Then, a new
    Engine is made and placed in the car. Then a for loop spins around four times.
    Each time through the loop, a new tire is created, and the car is told to use
    the new tire. Finally, the car is printed and the program exits.


    From the user’s point of view, the program hasn’t changed at all:


    I am an engine. Vrooom!


    I am a tire. I last a while.


    I am a tire. I last a while.


    I am a tire. I last a while.


    I am a tire. I last a while.


    As with Shapes-Object, we’ve refactored the program, improving the internal structure
    but leaving the external behavior the same.


    Extending CarParts


    Now that Car has accessors, let’s take advantage of them. Instead of the stock
    engine and tires, we’ll implement variations on these parts. We’ll use inheritance
    to make the new kinds of engines and tires and then use Car’s accessors (that’s
    composition) to give the car its new moving pieces. The code for this program
    can be found in the *05.03 CarParts-2* folder.


    First is a new kind of engine, a Slant6 (if you prefer a V8 or a ThreeFiftyOneWindsor,
    go for it).


    @interface Slant6 : Engine


    @end // Slant6


    @implementation Slant6


    - (NSString *) description


    {


    return (@"I am a slant- 6\. VROOOM!");


    } // description


    @end // Slant6


    A Slant6 is a kind of engine, so it makes sense for us to subclass Engine. Remember
    that inheritance sets up a relationship that allows us to pass subclasses (Slant6)
    where the superclass (Engine) is expected. Because Car takes an argument of type
    Engine for the setEngine: method, we can safely pass in a Slant6.


    Slant6 overrides description to make it print a new message. Because Slant6 does
    not invoke the superclass’s description method (that is, it doesn’t include [super
    description]), it completely replaces its inherited description.


    The steps for implementing a new class of tires, called AllWeatherRadial, are
    a lot like the ones we used for Slant6\. We subclass an existing class (Tire)
    and provide a new description method:


    @interface AllWeatherRadial : Tire


    @end // AllWeatherRadial


    @implementation AllWeatherRadial


    - (NSString *) description


    {


    return (@"I am a tire for rain or shine.");


    } // description


    @end // AllWeatherRadial


    And finally, we tweak main() to use the new engine and tire types (the changed
    code is in bold):


    int main (int argc, const char * argv[]) {


    Car *car = [Car new];


    for (int i = 0; i < 4; i++) {


    Tire *tire = [AllWeatherRadial new];


    [car setTire: tire atIndex: i];


    }


    Engine *engine = [Slant6 new];


    [car setEngine: engine];


    [car print];


    return (0);


    } // main


    We added two new classes and slightly changed two lines of code. We didn’t touch
    Car at all. Our Car happily uses whatever kind of engine and tires you devise
    without having to change Car itself. The behavior of the program is now radically
    different:


    I am a slant- 6\. VROOOM!


    I am a tire for rain or shine.


    I am a tire for rain or shine.


    I am a tire for rain or shine.


    I am a tire for rain or shine.


    Composition or Inheritance?


    CarParts-2 uses both inheritance and composition, the two new tools in your utility
    belt introduced here and in the previous chapter. A good question—no, a great
    question—to ask is, “When do I use inheritance, and when do I use composition?”


    Inheritance sets up an “is a” relationship. A triangle *is a* shape. Slant6 *is
    an* engine. AllWeatherRadial *is a* tire. When you can say, “X is a Y,” you can
    use inheritance.


    Composition, on the other hand, sets up a “has a” relationship. A shape *has a*
    fill color. A car *has an* engine, and it *has a* tire. In contrast, a car is
    not an engine, and a car is not a tire. When you can say, “X has a Y,” you should
    use composition.


    Programmers new to object-oriented programming often make the mistake of trying
    to use inheritance for everything, such as having Car inherit from Engine. Inheritance
    is a fun new toy, but it’s not appropriate for every situation. You can create
    a working program with such a structure, because you can access stuff that makes
    an engine work from inside the Car code. But it doesn’t make sense to people reading
    the code. A car is an engine? Huh? So, use inheritance only when it’s appropriate.


    Here’s an example of how your thinking might go when designing your data structures:
    when creating new objects, take some thinking time to out when inheritance should
    be used and when composition should be used. For instance, in designing car stuff,
    you might think, “A car has tires, and an engine, and a transmission.” So you’d
    use composition and make instance variables in your Car class for all of those.'
