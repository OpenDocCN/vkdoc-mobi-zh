- fmt: "# 排版后的文档\n\nNext, `main()` logs the fact that it has begun browsing and starts\
    \ a run loop:\n\n```\nNSLog (@\"begun browsing\");\n\n[[NSRunLoop currentRunLoop]\
    \ run];\n```\n\nA run loop is a Cocoa construct that blocks (that is, doesn’t\
    \ do any processing) until something interesting happens. In this case, “interesting”\
    \ means that the net service browser discovers a new iTunes share.\n\nIn addition\
    \ to listening for network traffic, run loops handle other things like waiting\
    \ for user events, such as key presses or mouse clicks. The `run` method actually\
    \ will not return; it will keep running forever, so the code that follows it won’t\
    \ ever execute. However, we’ve left it in to let readers of the code know that\
    \ we’re aware of proper memory management (we could construct a run loop that\
    \ runs only for a specific amount of time, but that code is more complicated and\
    \ doesn’t really contribute to our discussion of delegates). So here’s the clean-up\
    \ code that won’t actually get run:\n\n```\n}\n\nreturn (0);\n\n} // main\n```\n\
    \nNow, we have the net service browser and a run loop. The browser sends out network\
    \ packets looking for particular services, and packets come back saying, “Here\
    \ I am.” When these packets come back, the run loop tells the net service browser,\
    \ “Here are some packets for you.” The browser then looks at the packets, and\
    \ if they’re from a service it hasn’t seen before, it sends messages to the delegate\
    \ object telling it what happened.\n\nNow it’s time to look at the code for our\
    \ delegate, `ITunesFinder`. The interface for the `ITunesFinder` class is minimal:\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface ITunesFinder : NSObject\
    \ <NSNetServiceBrowserDelegate>\n\n@end // ITunesFinder\n```\n\nRemember that\
    \ we don’t *have* to declare methods in the `@interface`. A delegate object only\
    \ has to implement the methods it’s interested in having called.\n\nNotice that\
    \ we have `<NSNetServiceBrowserDelegate>` after `NSObject`. That tells the compiler\
    \ and other objects that the `ITunesFinder` class implements methods or conforms\
    \ to the protocol with that name (more on that in the next chapter). For now,\
    \ we simply add this so the compiler won’t complain.\n\nThe implementation has\
    \ two methods. First come the preliminaries:\n\n```\n#import \"ITunesFinder.h\"\
    \n\n@implementation ITunesFinder\n```\n\nand then the first delegate method:\n\
    \n```\n- (void) netServiceBrowser: (NSNetServiceBrowser *) b\n         didFindService:\
    \ (NSNetService *) service\n              moreComing: (BOOL) moreComing {\n  \
    \  [service resolveWithTimeout: 10];\n    NSLog (@\"found one! Name is %@\",\n\
    \           [service name]);\n} // didFindService\n```\n\nWhen an `NSNetServiceBrowser`\
    \ finds a new service, it sends the `netServiceBrowser:didFindService:moreComing:`\
    \ message to the delegate object. The browser is passed as the first argument\
    \ (which would be the same as the value of the `browser` variable in `main`).\
    \ If you have multiple service browsers doing searches at the same time, examining\
    \ this parameter lets you figure out which one has found something.\n\nThe `NSNetService`\
    \ object passed in the second argument is an object that describes the service\
    \ that was found, such as an iTunes share. The last argument, `moreComing`, is\
    \ used to signal when a batch of notifications is done. Why did the Cocoa designers\
    \ include this `moreComing` parameter? If you ran this program on a big college\
    \ network with a hundred iTunes shares, this method would get called 99 times\
    \ with `moreComing` having the value `YES` and then once with a value of `NO`.\
    \ This information is handy to have when constructing the user interface, so you\
    \ know when to update your window. As new iTunes shares come and go, this method\
    \ is called again and again.\n\n`[service resolveWithTimeout: 10]` tells the Bonjour\
    \ system to go fetch all the interesting properties about the service. In particular,\
    \ we want the name of the share, like `Scott’s Groovy Tunes`, so we can print\
    \ it out. `[service name]` gets us the name of the share.\n\niTunes shares can\
    \ come and go, as people put their laptops to sleep or move off the network. The\
    \ `ITunesFinder` class implements a second delegate method that gets called when\
    \ a network service vanishes:"
