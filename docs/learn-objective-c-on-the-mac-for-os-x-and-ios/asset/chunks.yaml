  trans: '

    每个框架都是一组重要的技术集合，通常包含数十甚至上百个头文件。每个框架都有一个主头文件，它包含了该框架的所有独立头文件。通过对主头文件使用 `#import`，你就能访问该框架的所有功能。


    Foundation 框架的头文件占用了近兆字节的磁盘存储空间，包含超过 14,000 行代码，分散在上百个文件中。当你使用 `#import <Foundation/Foundation.h>`
    引入主头文件时，你就获得了整个庞大的集合。你可能会认为，为每个文件都遍历所有这些文本会耗费编译器大量时间，但 Xcode 非常智能：它通过使用**预编译头文件**来加快此任务——这是一种经过压缩和提炼的头文件格式，当你
    `#import` 它时，能快速加载。


    如果你好奇 Foundation 框架包含了哪些头文件，可以窥探其 *Headers* 目录（`/System/Library/Frameworks/Foundation.framework/Headers/`）。浏览其中的文件不会有任何破坏；只是不要移除或修改任何内容。


    ## `NSLog()` 与 `@"strings"`


    既然我们已经对 Foundation 框架的主头文件使用了 `#import`，现在就可以编写利用一些 Cocoa 特性的代码了。Hello Objective-C
    中第一行（也是唯一）真正的代码使用了 `NSLog()` 函数，如下所示：


    `NSLog (@"Hello, Objective-C!");`


    这行代码会在控制台打印 “Hello, Objective-C!”。如果你曾经使用过 C 语言，肯定在编程旅途中遇到过 `printf()`。`NSLog()`
    是一个 Cocoa 函数，其工作方式与 `printf()` 非常相似。


    就像 `printf()` 一样，`NSLog()` 将字符串作为其第一个参数。这个字符串可以包含格式说明符（例如 `%d`），并且该函数会接收与格式说明符匹配的额外参数。`printf()`
    在打印前会将这些额外参数填入字符串中。


    正如我们之前所说，Objective-C 就是在 C 语言基础上添加了一点“特色酱料”，所以如果你愿意，完全可以使用 `printf()` 来代替 `NSLog()`。但我们仍然推荐使用
    `NSLog()`，因为它增加了诸如时间戳和日期戳等功能，并且会自动为你追加换行符（`''\n''`）。


    ## NS 前缀：防止名称冲突的良方


    你可能会觉得 `NSLog()` 这个函数名有点奇怪。那个 “NS” 到底是怎么回事？原来，Cocoa 为其所有函数、常量和类型名称都加上了 “NS” 前缀。这个前缀告诉你该函数来自
    Cocoa，而非其他工具包。


    该前缀有助于防止**名称冲突**——即当同一个标识符被用于两个不同的东西时产生的严重问题。如果 Cocoa 将此函数命名为 `Log()`，那么它很可能与某个无辜程序员创建的
    `Log()` 函数发生名称冲突。当包含 `Log()` 的程序与 Cocoa 一起构建时，Xcode 会报错说 `Log()` 被多次定义，从而带来麻烦。


    既然你明白了使用前缀是个好主意，你可能会对具体的选择产生疑问：例如，为什么是 “NS” 而不是 “Cocoa”？嗯，“NS” 前缀的历史可以追溯到该工具包被称为
    NextSTEP、并作为 NeXT 软件公司（前身为 NeXT, Inc.）产品的时代，该公司于 1996 年被 Apple 收购。为了不破坏已为 NextSTEP
    编写的代码的兼容性，Apple 只是继续使用了 “NS” 前缀。现在这算是一个历史趣闻，就像你的阑尾一样。


    Cocoa 已经将 “NS” 前缀据为己有，因此显然，你不应该为你自己的任何变量或函数名添加 “NS” 前缀。如果这样做了，你会让你的代码阅读者感到困惑，让他们误以为你的东西属于
    Cocoa。此外，如果将来 Apple 恰好向 Cocoa 添加了一个与你同名的函数，你的代码可能会出问题。目前没有一个集中式的前缀注册表，所以你可以选择自己的前缀。许多人会使用自己姓名首字母或公司名称作为前缀。为了让我们的例子更简单一些，本书中的代码将不会使用前缀。


    ## `NSString`：其中的 `@`


    让我们再看一下那个 `NSLog()` 语句：`NSLog (@"Hello, Objective-C!");`


    你注意到字符串前面的 at 符号 (`@`) 了吗？这可不是通过我们警惕的编辑之手的笔误。这个 at 符号是 Objective-C 在标准 C 基础上添加的特性之一。在双引号前带有
    at 符号的字符串，意味着该引号内的字符串应被视为一个 Cocoa `NSString` 元素。


    那么什么是 `NSString` 元素呢？将名称上的 “NS” 前缀剥离，就会看到一个熟悉的术语：“String”。你已经知道字符串是一个字符序列，通常是人类可读的，因此你大概能猜到（并且猜对了）`NSString`
    就是 Cocoa 中的字符序列。


    `NSString` 元素中集成了大量功能，每当需要字符串时，Cocoa 都会使用它。以下是 `NSString` 能做的几件事：


    *   告诉你它的长度

    *   与另一个字符串进行比较

    *   将其自身转换为整数或浮点数值


    这可比 C 风格字符串能做的事情多得多。我们将在第 8 章中更多地使用和探索 `NSString` 元素。


    一个容易犯的错误是将 C 风格字符串传递给 `NSLog()`，而不是使用那些高级的 `NSString` `@"strings"` 元素。如果你这样做，编译器会给你一个警告：


    ```

    main.m:46: warning: passing arg 1 of ''NSLog'' from incompatible pointer type

    ```


    如果你运行这个程序，它可能会崩溃。为了捕捉此类问题，你可以告诉 Xcode 始终将警告视为错误。要做到这一点，在项目导航器中选择项目文件，在 targets（目标）下选择
    Hello Objective-C，然后选择 Build Settings（构建设置）标签，在搜索框中输入 *error*，并勾选 Treat Warnings
    as Errors（将警告视为错误）复选框，如下图所示。同时确保顶部的 Configuration（配置）弹出菜单设置为 All（全部）。


    **注意这些字符串**


    关于 `NSString` 还有另一个很酷的事实：其名称本身就突显了 Cocoa 的一个优秀特性。大多数 Cocoa 元素的命名都非常直接，力求描述它们实现的功能。例如，`NSArray`
    提供数组；`NSDateFormatter` 帮助你以不同方式格式化日期；`NSThread` 为你提供多线程编程工具；而 `NSSpeechSynthesizer`
    则让你能够听到语音。


    现在，我们将回到逐步解析小程序的过程中。程序的最后一行是返回语句，它结束了 `main()` 的执行并完成程序：


    `return (0);`


    返回的零值表示我们的程序成功完成。这正是 C 语言中 return 语句的工作方式。


    再次恭喜！你刚刚完成了第一个 Objective-C 程序的编写、编译、运行和剖析。


    ## 你是布尔类型吗？


    许多语言都有布尔类型，这当然是一个用于存储真（true）和假（false）值的变量的高级术语。Objective-C 也不例外。


    C 语言有一个布尔数据类型 `bool`，它可以取值为 `true` 和 `false`。Objective-C 提供了一个类似的类型 `BOOL`，它可以取值为
    `YES` 和 `NO`。顺便提一下，Objective-C 的 `BOOL` 类型比 C 语言的 `bool` 类型早了十多年。这两种不同的布尔类型可以在同一个程序中共存，但当你在编写
    Cocoa 代码时，你将使用 `BOOL`。

