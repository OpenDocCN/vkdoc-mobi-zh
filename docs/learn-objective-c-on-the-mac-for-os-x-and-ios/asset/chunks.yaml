    copy or retain the incoming string. What setStringValue: does is its own business.
    But we know our memory management is correct.


    lowercase: is just like uppercase:, but on the down-low.


    - (IBAction) lowercase: (id) sender {


    NSString *original = [_textField stringValue];


    NSString *lowercase = [original lowercaseString];


    [_resultsField setStringValue:lowercase];


    } // lowercase


    And that’s it! When you run the program, you’ll see the window appear. Type a
    string, and change its case, just like in [Figure 16-18](#9781430241881_Ch16.xhtml#_FIG18).


    ![9781430241881_Fig16-18.tif](images/9781430241881_Fig16-18_fmt.jpg)


    [Figure 16-18](#9781430241881_Ch16.xhtml#FIG18). The finished CaseTool program
    does what it does


    Summary


    This chapter has been a whirlwind tour that just touched the surface of Interface
    Builder and the Application Kit. We used only one AppKit class directly (NSTextField)
    and a couple of classes indirectly (NSButton, which powers the buttons, and NSWindow,
    which is the object controlling the window). There are over 100 different classes
    in the AppKit for you to play with, many of which appear in Interface Builder.


    At this point, you’re fully qualified to dive into a Cocoa book or project. We’ll
    continue in the next chapter with an exploration of some of Cocoa’s features for
    saving and loading files.


    Chapter 17


    File Loading and Saving


    Many computer programs (applications) end up creating some kind of semi-permanent
    artifact of the user’s work. Maybe it’s an edited photo. Maybe it’s a chapter
    of a novel. Maybe it’s your band’s cover of “Free Bird.” In each of these cases,
    the user ends up with a saved file.


    The standard C library provides function calls to create, read, and write files,
    such as open(), read(), write(), fopen(), and fread(). These functions are well
    documented elsewhere, so we won’t talk about them. Cocoa provides Core Data, which
    handles all this file stuff behind the scenes for you. We won’t be talking about
    this either.


    So what does that leave us to discuss? Cocoa provides two general classes of file
    handling: property lists and object encoding, which we’ll talk about here.


    Property Lists


    In Cocoa, there is a class of objects known as **property list** objects, frequently
    abbreviated as **plist**. These lists contain a small set of objects that Cocoa
    knows how to do stuff with, in particular, how to save them to files and load
    them back. The property list classes are NSArray, NSDictionary, NSString, NSNumber,
    NSDate, and NSData, along with their mutable counterparts if they have any.


    You’ve seen the first four before but not the last two. We’ll chat about those
    before we start filing things away. You can find all the code for this part of
    the chapter in the project *15.01 PropertyListing*.


    NSDate


    Time and date handling are pretty common in programs. iPhoto knows the date when
    you took that picture of your dog, and your personal accounting application knows
    the closing date when reconciling your bank statement. NSDate is the fundamental
    class in Cocoa’s date and time handling.


    To get the current date and time, use [NSDate date], which gives you an autoreleased
    object.

    So this code


    NSDate *date = [NSDate date];


    NSLog (@"today is %@", date);


    would print something like this:


    today is 2012-01-23 11:32:02 -0400


    There are methods you can use to compare two dates, so you can sort lists. There
    are also methods to get a date as a delta from the current time. For instance,
    you might want the date for exactly 24 hours ago:


    NSDate *yesterday = [NSDate dateWithTimeIntervalSinceNow: -(24 * 60 * 60)];


    NSLog (@"yesterday is %@", yesterday);


    The preceding code prints out:


    yesterday is 2012-01-23 11:32:02 -0400


    +dateWithTimeIntervalSinceNow: takes an argument of an NSTimeInterval, which is
    a typedef of a double representing some interval of seconds. This lets you specify
    a time displacement in the future with a positive time interval or in the past
    with a negative time interval, as we’re doing here.


    **Note** If you would like to format how the date is printed, Apple provides a
    class called NSDateFormatter, it conforms to Unicode Technical Standard #35\.
    This gives you various ways to format the date for the user.


    NSData


    A common idiom in C is passing buffers of data around to functions. To do this,
    you usually pass to a function the pointer to the buffer and the length of the
    buffer. Plus, memory management issues may arise in C. For example, if the buffer
    has been dynamically allocated, who is responsible for cleaning it up when it’s
    no longer useful?


    Cocoa provides us the NSData class that wraps a hunk of bytes. You can get the
    length of the data and a pointer to the start of the bytes. Because NSData is
    an object, the usual memory management behaviors apply. So, if you’re passing
    a hunk of data to a function or method, you can pass an autoreleased NSData instead
    without worrying about cleaning it up. Here is an NSData object that will hold
    an ordinary C string, which is just a sequence of bytes, and print out the data:


    const char *string = "Hi there, this is a C string!";


    NSData *data = [NSData dataWithBytes: length: strlen(string) + 1];


    NSLog (@"data is %@", data);


    Here are the results:


    data is <48692074 68657265 2c207468 69732069 73206120 43207374 72696e67 2100>


    That’s, uh, special. But, if you have an ASCII chart handy (you can find one by
    firing up the terminal and typing the command man ascii), you can see that this
    chunk of hexadecimal is actually our string. 0x48 is “H”, 0x69 is “i”, and so
    on. The -length method gives us the number of bytes, and the -bytes method gives
    us a pointer to the beginning of the string. Notice the + 1 in the +dataWithBytes:
    call? That’s to include the trailing zero-byte that C strings need. Also notice
    the 00 at the end of the results of the NSLog. By including the zero-byte, we
    can use the %s format specifier to print the string:


    NSLog (@"%d byte string is ''%s''", [data length], [data bytes]);


    which results in the following output:


    30 byte string is ''Hi there, this is a C string!''


    NSData objects are immutable. Once you create them, that’s it. You can use them,
    but you can’t change them. NSMutableData, though, lets you add and remove bytes
    from the data’s contents.


    Writing and Reading Property Lists


    Now that you have seen all of the property list classes, what can we do with them?
    The collection property list classes (NSArray and NSDictionary) have a method
    called -writeToFile: atomically:, which writes the property lists to files. NSString
    and NSData also have a writeToFile:atomically: method, but it just writes out
    strings or blobs of data.


    So, we could load up an array with strings and then save it:


    NSArray *phrase;


    phrase = [NSArray arrayWithObjects: @"I", @"seem", @"to", @"be", @"a", @"verb",
    nil];


    [phrase writeToFile: @"/tmp/verbiage.txt" atomically: YES];


    Now, look at the file */tmp/verbiage.txt*, and you should see something like this:


    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"


    "http://www.apple.com/DTDs/PropertyList-1.0.dtd"> <plist version="1.0"> <array>


    <string>I</string>


    <string>seem</string>


    <string>to</string>


    <string>be</string>


    <string>a</string>


    <string>verb</string> </array> </plist>'
