    while (filename = [fileenum nextObject])


    {


    NSLog (@"%@", filename);


    }


    Next, we tell main() to return 0 to indicate a successful exit:


    return (0);


    } // main


    Here’s the start of a sample run on Waqar’s machine:


    cocoaheads/DSCN0798.jpg


    cocoaheads/DSCN0804.jpg


    cow.jpg


    Development/Borkware/BorkSort/cant-open-file.jpg


    Development/Borkware/BSL/BWLog/accident.jpg


    It works! It might take a while to show results though, because it may have to
    dig through many thousands of images to do its thing.


    Behind the Sign That Says “Beware of the Leopard”


    FileWalker uses the classic style of iteration. The project *08.02 FileWalkerPro*
    shows how to do this stuff with fast enumeration. One nifty feature of the fast
    enumeration syntax is that you can feed it an already existing NSEnumerator or
    subclass. And it just so happens that NSDirectoryEnumerator is a subclass of NSEnumerator,
    so we can happily send the results of -enumeratorAtPath: to fast enumeration:


    int main (int argc, const char * argv[])


    {


    @autoreleasepool


    {


    NSFileManager *manager;


    manager = [NSFileManager defaultManager];


    NSString *home;


    home = [@"~" stringByExpandingTildeInPath];


    NSMutableArray *files;


    files = [NSMutableArray arrayWithCapacity: 42];


    for(NSString *filename in [manager enumeratorAtPath:home])


    {


    if([[filename pathExtension] isEqualTo:@"jpg"])


    {


    [files addObject:filename];


    }


    }


    for(NSString *filename in files)


    {


    NSLog (@"%@", filename);


    }


    }


    return 0;


    } // main


    As you can see, this version is simpler than the previous one: we’ve jettisoned
    two enumerator variables and the supporting code for them.


    Summary


    We’ve covered a lot of stuff in this chapter! We introduced three new language
    features: class methods (which are methods that are handled by the class itself
    instead of a particular instance), the @encode() directive used for methods that
    need a description of a C type to do their work, and fast enumeration.


    We looked at a number of useful Cocoa classes, including NSString, NSArray, and
    NSDictionary. NSString holds human-readable text, while NSArray and NSDictionary
    hold collections of objects. These objects are immutable: they can’t change after
    you create them. Cocoa provides mutable versions of these classes, which let you
    change their contents at will.


    Despite all our efforts (and despite the length of this chapter), we’ve just barely
    scratched the surface of the hundreds of different classes in Cocoa. You can have
    fun and get smarter by digging around and learning about more of these classes.


    Finally, we used the classes we learned about to spin through our home directory
    looking for groovy pictures.


    In the next chapter, we dive into the mysteries of memory management, and you’ll
    learn how you can clean up after yourself if you make any messes.


    Chapter 9


    Memory Management


    Next on our plate is memory management using Objective-C and Cocoa (yum!). Memory
    management is part of a more general problem in programming called **resource
    management**. Every computer system has finite resources for your program to use.
    These include memory, open files, and network connections. If you use a resource,
    such as by opening a file, you need to clean up after yourself (in this case,
    by closing the file). If you keep on opening files but never close them, you’ll
    eventually run out of file capacity. Think about your public library. If everyone
    borrowed books but never returned them, eventually the library would close because
    it would have no more books, and everybody would be sad. Nobody wants that.


    Of course, when your program ends, the operating system reclaims the resources
    it used. But as long as your program is running, it uses resources, and if you
    don’t practice cleanliness, some resource will eventually be used up, and your
    program will probably crash. And as operating systems evolve, the notion of when
    a program actually ends is becoming more fuzzy.


    Not every program uses files or network connections, but every program uses memory.
    Memory-related errors are the bane of every programmer who uses a C-style language.
    Our friends in the Java and scripting worlds have it easy: memory management happens
    automatically for them, like having their parents clean up their rooms. We, on
    the other hand, have to make sure to allocate memory when we need it and free
    that memory when we’re finished with it. If we allocate without freeing, we’ll
    **leak memory**: our program’s memory consumption will grow and grow until we
    run out of memory, and then, the program will crash. We need to be equally careful
    not to use any memory after we free it. We might be using stale data, which can
    cause all sorts of errors, or something else might have moved into that memory,
    and then we end up corrupting the new stuff.


    **Note**  Memory management is a hard problem. Cocoa’s solutions are rather elegant
    but do take some time to wrap your mind around. Even programmers with decades
    of experience have problems when first encountering this material, so don’t worry
    if it leaves your head spinning for a while.


    Object Life Cycle


    Just like the birds and the bees out here in the real world, objects inside a
    program have a life cycle. They’re born (via alloc or new); they live (receive
    messages and do stuff), make friends (via composition and arguments to methods),
    and eventually die (get freed) when their lives are over. When that happens, their
    raw materials (memory) are recycled and used for the next generation.


    Reference Counting


    Now, it’s pretty obvious when an object is born, and we’ve talked a lot about
    how to use an object, but how do we know when an object’s useful life is over?
    Cocoa uses a technique known as **reference counting**, also sometimes called
    **retain counting**. Every object has an integer associated with it, known as
    its **reference count** or **retain count**. When some chunk of code is interested
    in an object, the code increases the object’s retain count, saying, “I am interested
    in this object.” When that code is done with the object, it decreases the retain
    count, indicating that it has lost interest in that object. When the retain count
    goes to 0, nobody cares about the object anymore (poor object!), so it is destroyed
    and its memory is returned to the system for reuse.


    When an object is created via alloc or new, or via a copy message (which makes
    a copy of the receiving object), the object’s retain count is set to 1\. To increase
    its retain count, you send the object a retain message. To decrease its retain
    count, you send the object a release message.


    When an object is about to be destroyed because its retain count has reached 0,
    Objective-C automatically sends the object a dealloc message. You can override
    dealloc in your objects. Do this to release any related resources you might have
    allocated. Don’t ever call dealloc directly. You can rely on Objective-C to invoke
    your dealloc method when it’s time to kill your object.


    To find out the current retain count, send the retainCount message. Here are the
    signatures for retain, release and retainCount:


    - (id) retain;


    - (oneway void) release;


    - (NSUInteger) retainCount;


    A retain call returns an id. This enables you to chain a retain call with other
    message sends, incrementing the object’s retain count and then asking it to do
    some work. For instance, [[car retain] setTire: tire atIndex: 2]; asks car to
    bump up its retain count and perform the setTire action.'
