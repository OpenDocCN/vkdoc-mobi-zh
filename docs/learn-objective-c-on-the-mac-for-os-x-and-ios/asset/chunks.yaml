  trans: '

    # 自动释放池


    `Autorelease`池以栈的形式维护：当你创建一个新的`autorelease`池时，它会被添加到栈顶。一条`autorelease`消息会将接收者放入最顶层的池中。如果你将一个对象放入池中，然后创建新池并销毁它，被自动释放的对象仍然存在，因为持有该对象的池依然存在。


    `keyword`方法在这里不起作用，因为它必须使用花括号来平衡。


    # 清理废纸与垃圾


    Objective-C 2.0 引入了自动内存管理，也称为垃圾回收。熟悉 Java 或 Python 等语言的程序员对垃圾回收的概念非常了解。你只需创建和使用对象，然后，令人惊讶地，可以完全忘记它们。系统会自动判断哪些对象仍在使用，哪些可以被回收。启用垃圾回收非常容易，但这是一种选择性加入（opt-in）功能。只需进入项目信息窗口的构建设置（Build
    Settings），并选择`Required [-fobjc-gc-only]`，如图 Figure 9-1 所示。


    ![9781430241881_Fig09-01.tif](img/9781430241881_Fig09-01_fmt.jpg)


    图 9-1. 启用垃圾回收


    **注意**：`-fobjc-gc`适用于同时支持垃圾回收和`retain/release`的代码，例如可在两种环境中使用的库代码。


    当你启用垃圾回收时，常规的内存管理调用都会变成空操作指令；这不过是一种花哨的说法，表示它们什么也不做。


    Objective-C 的垃圾回收器是一个分代垃圾回收器。新创建的对象比那些已存在一段时间的对象更可能变成垃圾。在常规时间点，垃圾回收器会开始检查你的变量和对象，并追踪它们之间的指针。任何它发现没有指针指向的对象都是垃圾，适合被丢弃。你能做的最糟糕的事，就是保留一个指向你已经用完的对象的指针。因此，如果你在一个实例变量中指向一个对象（回忆一下组合的概念），请务必给该实例变量赋值`nil`，这将移除你对这个对象的引用，并让垃圾回收器知道它可以被清除。


    与`autorelease`池类似，垃圾回收会在事件循环结束时触发。如果你不在 GUI 程序中，也可以自行触发垃圾回收，但这超出了我们这里要讨论的范围。


    有了垃圾回收，你无需过多担心内存管理。当使用从`malloc`函数或 Core Foundation 对象获得的内存时，存在一些微妙的细节，但这些细节较为生僻，我们就不涉及了。现在，你只需创建对象，而无需担心释放它们。我们将在后续内容中继续讨论垃圾回收。


    请注意，垃圾回收仅适用于 OS X 编程；你不能在 iOS 应用中使用它。事实上，在 iOS 编程中，苹果建议你避免在自己的代码中使用`autorelease`，同时也避免使用那些会返回自动释放对象的便捷方法。


    通常，便捷方法是返回新对象的类方法。例如，对于`NSString`，所有以`stringWith`开头的方法都是便捷方法。


    # 自动引用计数


    为什么 iOS 没有垃圾回收？反对在 iOS 中使用垃圾回收的主要理由是，你无法确切知道垃圾回收器何时会出现。就像在现实生活中，你可能知道垃圾会在星期一被收走，但永远不确定具体时间。如果你正准备出门时，垃圾车恰好到了怎么办？垃圾回收对移动设备的可用性影响很大，移动设备比电脑更具私密性，且通常资源远不如电脑丰富。用户可不想在系统清理内存时，游戏中断或电话暂停。


    苹果的解决方案叫做`自动引用计数 (ARC)`。顾名思义，`ARC`会跟踪你的对象，并决定哪些是你想保留的，哪些不是。这有点像在你的内存管理中配备了一位管家或私人助理。当你使用`ARC`时，你像往常一样分配和使用对象，编译器会为你插入保留（retain）和释放（release）操作——你无需自己编写这些代码。


    `ARC`*不是*垃圾回收器。正如我们已讨论过的，垃圾回收是在运行时通过定期运行代码并检查对象来完成工作的。相比之下，`ARC`在编译时完成其工作。它插入适当的保留和释放操作，因此内存管理的方式与编写良好的手动管理代码完全一致。只不过，内存管理不再由你来做，而是由编译器替你完成。程序运行时，保留和释放操作会按预期发生。系统并不知道也不关心这些命令是你插入的还是编译器插入的。


    `ARC`是一项选择性加入（opt-in）功能，这意味着你必须明确地启用或禁用它。


    以下是编写`ARC`代码所需的组件：


    - Xcode 4.2+

    - ![image](img/9781430241881_square_fmt.jpg) Apple LLVM 3.0+ 编译器（随 Xcode 提供）

    - OS X 10.7+


    以下是运行你的代码所需的条件：


    - ![image](img/9781430241881_square_fmt.jpg) iOS 4.0+ 或 OS X 10.6+（配备 64 位运行时）

    - ![image](img/9781430241881_square_fmt.jpg) 零弱引用（Zeroing weak references）（稍后详述）需要
    iOS 5.0+ 或 OS X 10.7+


    **注意**：`ARC`仅适用于可保留对象指针（ROPs）。有三种可保留对象指针：


    1. 块指针

    2. Objective-C 对象指针

    3. 使用`__attribute__((NSObject))`标记的 typedefs


    我们将在本章稍后部分详细讨论 ROPs，尤其是在描述 Xcode 的`ARC`转换工具时。


    所有其他指针类型，例如`char *`和 CF 对象（如`CFStringRef`），均与 ARC 不兼容。


    如果你使用不由`ARC`处理的指针，你需要自己管理它们。这没问题，因为`ARC`可以与手动管理的内存互操作。


    如果你想在代码中使用`ARC`，必须满足三个要求：


    - ![image](img/9781430241881_square_fmt.jpg) 必须能够可靠地识别哪些对象需要被管理。

    - ![image](img/9781430241881_square_fmt.jpg) 必须能够指明如何管理一个对象。

    - ![image](img/9781430241881_square_fmt.jpg) 必须有一种可靠的方式来传递对象的所有权。


    让我们逐一处理这些要求。第一个要求意味着，作为对象集合的根级对象必须知道如何管理其子对象。例如，假设你有一个使用`malloc`创建的字符串数组：


    ```

    NSString **myString;

    myString = malloc(10 * sizeof(NSString *));

    ```


    这段代码创建了一个指向十个字符串的 C 数组。因为 C 数组是不可保留的，你无法在此结构上使用`ARC`。


    这就引出了第二个要求。这个要求通常意味着你必须能够增加和减少对象的保留计数，这基本上意味着任何派生自`NSObject`的对象都是可行的。这个类别涵盖了你需要管理的大部分对象。


    第三个要求指出，在传递对象时，你的程序需要能够在调用者和被调用者之间传递对象的所有权——更多内容稍后介绍。


    面对所有这些限制，你可能会问自己，我真的有必要费心使用`ARC`吗？答案是：是的，绝对有必要！我们保证从长远来看，它能让你少受罪，节省时间。


    # 有时候弱引用是好事

    '
- fmt: '正如本章前面所讨论的，当拥有一个指向对象的指针时，你可以管理其内存（通过`retain/release`），也可以仅指向它而不参与其内存管理。如果管理了对象的内存，则称为对该对象具有`强引用`。如果不管理其内存，则拥有（你猜对了）`弱引用`。例如，当在属性中使用`assign`属性时，你就是在创建一个`弱引用`。


    为什么需要弱引用？因为它们有助于我们处理`保留环`。我们稍后将讨论这一点。


    假设有一个对象`A`，它由其他对象创建，其保留计数为1（[图9-2](#9781430241881_Ch9.xhtml#_FIG2)）。对象`A`创建了一个子对象`B`，对象`B`的保留计数为1（参见[图9-3](#9781430241881_Ch9.xhtml#_FIG3)）。对象`B`需要访问其父对象；这在`Objective-C`程序中是非常常见的模式。


    ![9781430241881_Fig09-02.eps](images/9781430241881_Fig09-02_fmt.jpg)


    [图9-2](#9781430241881_Ch9.xhtml#FIG2). 对象`A`的保留计数为1


    ![9781430241881_Fig09-03.eps](images/9781430241881_Fig09-03_fmt.png)


    [图9-3](#9781430241881_Ch9.xhtml#FIG3). 对象`B`（对象`A`的子对象）的保留计数也为1


    在此示例中，对象`A`对对象`B`持有强引用，因为对象`A`创建了对象`B`。现在，如果对象`B`对对象`A`持有了强引用，则对象`A`的保留计数增加到2（参见[图9-4](#9781430241881_Ch9.xhtml#_FIG4)）。


    ![9781430241881_Fig09-04.eps](images/9781430241881_Fig09-04_fmt.jpg)


    [图9-4](#9781430241881_Ch9.xhtml#FIG4). 对象`B`对`A`持有强引用，对象`A`的保留计数增加


    万物皆有始终，最终，对象`A`的所有者不再需要它。所有者对对象`A`调用`release`，将其保留计数减至1。


    但是，由对象`A`创建的对象`B`拥有这1个保留计数。由于两个对象的保留计数都不为零，因此两者都不会被释放。这是一个典型的内存泄漏：程序无法访问这些对象，但它们仍然占用着内存（参见[图9-5](#9781430241881_Ch9.xhtml#_FIG5)）。


    ![9781430241881_Fig09-05.eps](images/9781430241881_Fig09-05_fmt.jpg)


    [图9-5](#9781430241881_Ch9.xhtml#FIG5). 一个典型的内存泄漏


    为了解决这个问题，我们使用`弱引用`。我们使用`assign`来获取对象`B`对对象`A`的引用。通过弱引用，保留计数不会增加。因此，当对象`A`的所有者释放它时，其保留计数变为零，它释放`B`，然后`A`和`B`都释放它们宝贵的内存（参见[图9-6](#9781430241881_Ch9.xhtml#_FIG6)）。完美！对吧？


    ![9781430241881_Fig09-06.eps](images/9781430241881_Fig09-06_fmt.jpg)


    [图9-6](#9781430241881_Ch9.xhtml#FIG6). 对象`B`对对象`A`持有弱引用


    更好了，但还不够完美。当涉及三个对象时（将它们称为对象`A`、`B`和`C`），最终可能出现对象`A`拥有并对对象`B`持有强引用，而对象`C`对对象`B`持有弱引用（参见[图9-7](#9781430241881_Ch9.xhtml#_FIG7)）。


    ![9781430241881_Fig09-07.eps](images/9781430241881_Fig09-07_fmt.jpg)


    [图9-7](#9781430241881_Ch9.xhtml#FIG7). 两个对象引用`B`：一个强引用，一个弱引用


    如果对象`A`随后释放了对象`B`，对象`C`仍然持有对它的弱引用，但该引用已不再有效，使用它很可能会导致崩溃，因为该位置不再存在有效的对象（参见[图9-8](#9781430241881_Ch9.xhtml#_FIG8)）。


    ![9781430241881_Fig09-08.eps](images/9781430241881_Fig09-08_fmt.jpg)


    [图9-8](#9781430241881_Ch9.xhtml#FIG8). 对象`C`仍然持有一个指向已释放对象的引用。这很糟糕


    解决方案是：那些能自动清理其弱引用的对象。这些特殊的弱引用被称为`归零弱引用`，因为当它们所指向的对象被释放时，它们会被设置为零（`nil`），并且可以像处理任何其他`nil`指针一样处理它们（参见[图9-9](#9781430241881_Ch9.xhtml#_FIG9)）。归零弱引用仅适用于`iOS
    5`或更高版本以及`OS X 10.7`或更高版本。


    ![9781430241881_Fig09-09.eps](images/9781430241881_Fig09-09_fmt.jpg)


    [图9-9](#9781430241881_Ch9.xhtml#FIG9). 对象`C`有一个归零弱引用，当不再有效时，它会转换为`nil`


    要使用归零弱引用，必须显式声明它们。有两种声明归零弱引用的方法：在声明变量时使用`__weak`关键字，或者在属性上使用`weak`属性：


    `__weak NSString *myString;`


    `@property(weak) NSString *myString;`


    如果想在归零弱引用不可用的较旧系统上使用`ARC`，该怎么办？`Apple`提供了`__unsafe_unretained`关键字和`unsafe_unretained`属性，两者都告知`ARC`指定的引用是弱引用。


    使用`ARC`时，需要注意一些命名限制：


    *   不能有名称以“new”开头的属性。例如，`@property NSString *newString`是不允许的。

    *   不能有没有内存管理属性的只读属性。没有`ARC`，可以使用`@property (readonly) NSString *title`。但在启用`ARC`后，必须指定谁来管理内存，因此一个简单的修复方法是使用`unsafe_unretained`，因为默认的`assign`属性。


    为了保持正交性，还有一个`__strong`关键字和`strong`属性。请记住，内存管理关键字和属性是互斥的。


    好的！我们现在准备将`CarParts`转换为使用`ARC`。完成转换后，你会注意到代码甚至比以前更少了。我们的格言，也是所有程序员的格言，就是“少即是多。”


    一个新颖的转换方案


    `Xcode`提供了一个便捷的过程来将现有项目转换为`ARC`。在开始之前，我们必须确保未启用垃圾回收；垃圾回收和`ARC`不能混用。如果在不关闭垃圾回收的情况下尝试转换项目，你将看到一条警告，如[图9-10](#9781430241881_Ch9.xhtml#_FIG10)所示。


    ![9781430241881_Fig09-10.tif](images/9781430241881_Fig09-10_fmt.jpg)


    [图9-10](#9781430241881_Ch9.xhtml#FIG10). 在转换项目之前，必须关闭垃圾回收


    让我们逐步了解为某个目标关闭垃圾回收的过程。第一步是选择要禁用垃圾回收的目标。打开你的项目（如果尚未打开），在导航器中选择项目。在编辑器窗格中，你将看到项目编辑器，顶部是你的项目，下方是目标（参见[图9-11](#9781430241881_Ch9.xhtml#_FIG11)）。


    ![9781430241881_Fig09-11.tif](images/9781430241881_Fig09-11_fmt.jpg)


    [图9-11](#9781430241881_Ch9.xhtml#FIG11). 在`Xcode`中打开你的项目


    现在，选择应禁用垃圾回收的目标。然后，单击编辑器窗格顶部的“构建设置”选项卡。你会看到目标有大约一百万个设置，这可能会让人不知所措。你可以浏览选项查找“Objective-C
    Garbage Collection”，但有更好的方法。


    `Apple`知道可能很难找到你想要的设置，因此，如果你在构建设置的正下方查看，会看到一个方便的搜索字段。输入文本`garbage collection`。搜索字段会将选择范围缩小到与垃圾回收相关的设置。这样好多了！现在，你有两个项目需要查看。


    ![9781430241881_Fig09-12.tif](images/9781430241881_Fig09-12_fmt.jpg)


    图9-12. 垃圾回收的设置


    当查看“Objective-C Garbage Collection”项时，一个弹出选项菜单会提供三个选择：'
  raw: "As we discussed earlier in this chapter, when you have a pointer to an object,\
    \ you can either manage its memory (with retain/release) or just point to it without\
    \ participating in its memory management. If you manage the memory of an object,\
    \ you’re said to have a **strong reference** to the object. If you are not managing\
    \ its memory, you have (you guessed it) a weak reference. For example, when you\
    \ use the assign attribute with a property, you’re making a **weak reference**.\n\
    \nWhy do we have weak references? Because they help us deal with retain cycles.\
    \ We’ll discuss that.\n\nLet’s say you have an object A that was created by some\
    \ other object and has a retain count of 1 ([Figure 9-2](#9781430241881_Ch9.xhtml#_FIG2)).\
    \ Object A creates an object B as its child, and object B has a retain count of\
    \ 1 (see [Figure 9-3](#9781430241881_Ch9.xhtml#_FIG3)). Object B needs to have\
    \ access to its parent; this turns out to be a very common pattern in Objective-C\
    \ programs).\n\n![9781430241881_Fig09-02.eps](images/9781430241881_Fig09-02_fmt.jpg)\n\
    \n[Figure 9-2](#9781430241881_Ch9.xhtml#FIG2). Object A has a retain count of\
    \ 1\n\n![9781430241881_Fig09-03.eps](images/9781430241881_Fig09-03_fmt.png)\n\n\
    [Figure 9-3](#9781430241881_Ch9.xhtml#FIG3). Object B, a child of object A, also\
    \ has a retain count of 1\n\nIn this example, object A has a strong reference\
    \ to Object B, because object A created object B. Now, if object B gets a strong\
    \ reference to object A, the retain count on Object A increases to 2 (see [Figure\
    \ 9-4](#9781430241881_Ch9.xhtml#_FIG4)).\n\n![9781430241881_Fig09-04.eps](images/9781430241881_Fig09-04_fmt.jpg)\n\
    \n[Figure 9-4](#9781430241881_Ch9.xhtml#FIG4). Object B has a strong reference\
    \ to A, and Object A’s retain count increases\n\nAll things must end, and eventually,\
    \ the owner of object A no longer needs it. The owner calls release on Object\
    \ A, which decrements its retain count to 1.\n\nBut object B, which was created\
    \ by object A, owns that 1 retain count. Because both objects have nonzero retain\
    \ counts, neither of them is released. This is a classic memory leak: the program\
    \ has no access to the objects, but they’re still using memory (see [Figure 9-5](#9781430241881_Ch9.xhtml#_FIG5)).\n\
    \n![9781430241881_Fig09-05.eps](images/9781430241881_Fig09-05_fmt.jpg)\n\n[Figure\
    \ 9-5](#9781430241881_Ch9.xhtml#FIG5). A classic memory leak\n\nTo solve this\
    \ problem, we use a weak reference. We use assign to get object B’s reference\
    \ to object A. With the weak reference, the retain count doesn’t increase. So\
    \ when object A’s owner releases it, its retain count goes to zero, it releases\
    \ B, and both A and B relinquish their precious memory (see [Figure 9-6](#9781430241881_Ch9.xhtml#_FIG6)).\
    \ Perfect! Right?\n\n![9781430241881_Fig09-06.eps](images/9781430241881_Fig09-06_fmt.jpg)\n\
    \n[Figure 9-6](#9781430241881_Ch9.xhtml#FIG6). Object B has a weak reference to\
    \ Object A\n\nBetter, but not quite perfect yet. When you have three objects involved\
    \ (let’s call them objects A, B, and C), you can end up with object A owning and\
    \ having a strong reference to object B, while object C has a weak reference to\
    \ object B (see [Figure 9-7](#9781430241881_Ch9.xhtml#_FIG7)).\n\n![9781430241881_Fig09-07.eps](images/9781430241881_Fig09-07_fmt.jpg)\n\
    \n[Figure 9-7](#9781430241881_Ch9.xhtml#FIG7). Two objects refer to B: one strongly,\
    \ one weakly\n\nIf object A then releases object B, object C still has a weak\
    \ reference to it, but that reference is no longer valid, and using it is likely\
    \ to cause a crash, because there is no valid object at that location (see [Figure\
    \ 9-8](#9781430241881_Ch9.xhtml#_FIG8)).\n\n![9781430241881_Fig09-08.eps](images/9781430241881_Fig09-08_fmt.jpg)\n\
    \n[Figure 9-8](#9781430241881_Ch9.xhtml#FIG8). Object C still has a reference\
    \ to a released object. This is bad\n\nHere’s the solution: objects that automagically\
    \ clean up their weak references. These special weak references are called **zeroing\
    \ weak references**, because when the object they point to is released, they are\
    \ set to zero (nil) and can be handled like any other nil pointer (see [Figure\
    \ 9-9](#9781430241881_Ch9.xhtml#_FIG9)). Zeroing weak references are only available\
    \ on iOS 5 or later and OS X 10.7 or later.\n\n![9781430241881_Fig09-09.eps](images/9781430241881_Fig09-09_fmt.jpg)\n\
    \n[Figure 9-9](#9781430241881_Ch9.xhtml#FIG9). Object C has a zeroing weak reference,\
    \ which converts to nil when no longer valid\n\nTo use zeroing weak references,\
    \ you have to explicitly declare them. There are two ways to declare zeroing weak\
    \ references: by using the __weak keyword when declaring a variable, or by using\
    \ the weak attribute on properties:\n\n__weak NSString *myString;\n\n@property(weak)\
    \ NSString *myString;\n\nWhat do you do if you want to use ARC on older systems\
    \ where zeroing weak references are not available? Apple provides the __unsafe_unretained\
    \ keyword and unsafe_unretained attribute, both of which tell ARC that the specified\
    \ reference is weak.\n\nThere are a couple of naming restrictions to watch out\
