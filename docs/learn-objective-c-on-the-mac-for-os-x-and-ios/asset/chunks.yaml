    \n图 9-13. 选择“不支持”以关闭垃圾回收\n\n转换是一个两步过程。首先，你必须确保代码符合 `ARC` 的要求，然后执行实际的转换。\n\n**注意**\
    \  `ARC` 转换是一条单行道。一旦你转向 `ARC`，就无法回头了。\n\n要开始这个过程，请选择你要转换的目标，然后选择 `Edit` ![image](img/9781430241881_arrow_fmt.jpg)\
