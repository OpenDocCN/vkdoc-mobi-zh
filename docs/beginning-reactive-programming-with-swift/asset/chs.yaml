  ### 查看 Facebook iOS SDK 的组件


  在图 5-4 中，你可以查看 Facebook/iOS 的主要 SDK。你可以在图 5-5 中看到它们。


  ![../images/459488_1_En_5_Chapter/459488_1_En_5_Fig5_HTML.jpg](img/459488_1_En_5_Fig5_HTML.jpg)


