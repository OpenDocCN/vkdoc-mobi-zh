  ### 总结


  本章概述了 iOS 应用与 Facebook 应用之间的双向连接。不要为了改动而随意改动。不止一位开发者曾决定在某个时候“清理”包标识符，使其符合内部标准或出于其他原因。很可能，这种“清理”会让你花费数小时（甚至数天）的工作时间。


  至此，你应该准备好实际尝试将 iOS 应用与 Facebook 一起运行了。


  ## 7. 向 iOS 应用添加 Facebook 登录


  拥有 Facebook 开发者账户，你可以向 iOS 应用添加 Facebook 功能（如登录）。本章将引导你完成此过程。这对于你可能想要与 iOS 应用集成的许多
  Facebook 工具都很有用。此外，集成 Facebook 工具的步骤在某些方面与你集成其他工具（例如 Amazon Web Services (AWS)）的步骤相似，而
  AWS 是本书下一部分的主题。


  同样重要的是，要注意有多种方式可以处理这种集成。CocoaPods（在第 2 章中描述）是一种非常常见的处理集成的方式。如果你研究一下 CocoaPods，你会发现你拥有的是一种自动化工具，用于管理你的
  Xcode 项目文件，并通过 CocoaPods 从 GitHub 自动下载版本。


  集成的核心是 Xcode、其文件及其框架。尽管 Facebook 接口提供了 CocoaPods 接口，但本章将展示源代码/Xcode 层面的实际情况。请记住，无论你使用哪种集成技术，都需要执行相同的基本结构（更新和集成你的
  Xcode 项目）。


  不过，首先，先介绍 Facebook 登录。


