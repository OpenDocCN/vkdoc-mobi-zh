  请注意，你添加的不仅仅是一个按钮图像：你实际上添加了登录按钮的功能。因此，当你运行应用时，系统会请求权限，如图 7-15 所示。


  ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig15_HTML.jpg](img/459488_1_En_7_Fig15_HTML.jpg)


