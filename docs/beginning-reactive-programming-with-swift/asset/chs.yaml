- "# 第五部分 使用 RxSwift\n\n## 11. 进入代码\n\n世界上有两种类型的开发者：一种是想先接触代码，然后再了解其工作原理；另一种是想先了解事物如何运作，然后再接触代码。有趣的是，同一位开发者可能会根据需要或为了寻求变化，在两种模式之间切换。\n\
  \n如果您想从背景信息开始，请先阅读第 12 章“响应式思维”，然后再回到本章。或者，您可以继续阅读本章，先了解一些非常基础的 RxSwift 代码，然后再阅读第\
  \ 12 章。\n\n在本章中，您将了解使用 RxSwift 的基础知识：\n\n*   **入门** 将向您介绍硬件和软件方面的要求。\n*   **从 GitHub\
  \ 安装 RxSwift** 将指导您完成下载和安装过程。\n*   **使用 RxSwift Playground** 将向您展示如何在 Swift Playgrounds\
  \ 中编写您的第一个 RxSwift 代码。\n\n#### 提示\n\n如果您之前没有使用过 Swift Playgrounds，本书提供的基础知识足以让您上手。不过，您可以在\
  \ *Learn Computer Science with Swift: Computation Concepts, Programming Paradigms,\
  \ Data Management, and Modern Component Architectures with Swift and Playgrounds*\
  \ 和 *Exploring Swift Playgrounds: The Fastest and Most Effective Way to Learn to\
  \ Code and to Teach Others to Use Your Code* 这两本书中学到更多。这两本书均由 Jesse Feiler 编写，并由\
  \ Apress 出版。\n\n### 入门\n\n需要了解的最基本的入门知识是：\n\n*   RxSwift 本身是 Swift 响应式编程库的一个开源实现。您可以从\
  \ GitHub 免费下载（本章将介绍具体步骤）。\n*   响应式编程让您可以轻松处理异步操作。\n*   为了实现这种范式，响应式编程使用了一些基本术语：\n\
  \    *   *可观察序列 (Observables)* 是可以被观察的项目。当它们发生变化时，这些变化对于*订阅 (subscribe)* 了该可观察序列的组件来说是可见的。\n\
  \    *   *观察者 (Observers)* 负责观察可观察序列。\n\n这些术语和概念将在本书的第 12 章及后续章节中进一步探讨。\n\n另一件需要从一开始就知道的事情是，响应式编程范式通常被称为\
  \ *Rx*。\n\n有了这些基础知识，您现在已具备开始使用 RxSwift 的足够认知。您需要具备以下条件：\n\n*   一台运行 Xcode 9 或更高版本的\
  \ Mac。Xcode 9 是用于在 iOS 和 macOS 上开发应用的集成开发环境（IDE）。它也是 Apple 工程师用来构建 iOS 和 macOS 自身的工具。Xcode\
  \ 可以从 Mac App Store 免费下载。请查看 Xcode 的系统要求：这些也是您使用 RxSwift 所需满足的要求。\n*   一个互联网连接，以便您登录\
  \ GitHub。如果没有，您可以先在便携式电脑或驱动器上从 GitHub 完成下载，然后将下载的文件复制到您的 Mac 上。\n\n\n\n### 从 GitHub\
  \ 安装 RxSwift\n\nGitHub 是当今大多数代码的默认代码仓库，包括许多协作和开源项目。你可以注册一个私有 GitHub 账户（许多公司和个人都这样做），但私有\
  \ GitHub 账户拥有与公共账户几乎相同的功能。\n\n#### 提示\n\nGitHub 上的项目以源代码*仓库*（通常称为 *repos*）的形式存在。\n\
  \n在 Xcode 9 中，GitHub 和源代码控制功能整体上比以往任何时候都更紧密地集成到了 Xcode 中。因此，如果你有早于 Xcode 9 的 RxSwift\
  \ 下载说明，可能会被引导使用比实际需要更复杂的流程。本书使用 Xcode 9 的集成功能，向你展示一种将 RxSwift 集成到 Xcode 项目中的非常简单的方法。\n\
  \n登录 `github.com`，并使用窗口顶部的搜索字段搜索 `RxSwift`，如图 11-1 所示。请记住，GitHub 是一个动态更新的存档，因此你下载的文件可能会随着时间而变化。整个\
  \ GitHub 站点会定期更新，但功能保持不变。\n\n![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig1_HTML.jpg](img/459488_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1\n\n从 GitHub 下载 RxSwift\n\n如果你已安装 Xcode，右侧的“Clone or download”（克隆或下载）按钮将提供选项，让你将其下载并打开到桌面，或作为\
  \ ZIP 文件下载。Xcode 9 新增了“在 Xcode 中打开”的选项（但要使用此选项，你必须在 Xcode ➤ 偏好设置 ➤ 帐户中输入你的 GitHub\
  \ 账户凭据）。请选择 Xcode 选项。（如果你没有看到该选项，请确保 Xcode 已安装并正在运行，并且你已在 Xcode 偏好设置中输入了凭据。）\n\n\
  当你选择在 Xcode 中打开代码仓库时，系统会请求你的权限，如图 11-2 所示。\n\n![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig2_HTML.jpg](img/459488_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2\n\n同意让 Xcode 打开仓库\n\nRxSwift Playground 是下载内容的一部分。你从它开始，因为当你首次运行它时，在你遵循本书下一节中的说明时，你下载的文件将会被构建。在你下载的文件中，会包含\
  \ `Rx.xcworkspace`。一个工作区可以包含多个 Xcode 项目，这里正是这种情况。请确保你打开的是 `Rx.xcworkspace`（工作区），而不是其中包含的项目（`Rx.xcodeproj`）。\n\
  \nRxSwift 遵循 MIT 许可证。下载按钮正上方的 MIT 图标详细显示了该许可证，如图 11-3 所示。与所有此类许可证一样，请查看其条款，但请注意，你拥有很大的自由来使用\
  \ RxSwift。\n\n![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig3_HTML.jpg](img/459488_1_En_11_Fig3_HTML.jpg)\n\
