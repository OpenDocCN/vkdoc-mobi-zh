  接下来，在你的应用中添加一个 Facebook 登录按钮。如果你按照之前构建 `SwitchUserSample` 示例的步骤操作，那么该应用中已经包含了 Facebook
  登录框架，你可以直接将其拖拽到新应用中。或者，你也可以通过修改某个应用（如图 7-10 中“我的应用”所示），从图 7-11 展示的产品中添加 Facebook
  登录功能。


  一旦将 Facebook 登录添加到应用中，添加按钮的代码就很简单了。将其添加到应用的 `viewDidLoad` 方法中即可。（如果应用是基于本章描述的 `SingleViewController`
  模板构建的，那么它会有一个名为 `ViewController` 的视图控制器。）


  代码如图 7-13 及代码清单 7-1 所示。


