  与 AWS 的情况一样，iOS 版 Facebook 的许多 SDK 都致力于管理广告和用户交互。五个主要的 SDK 如下所示：


  - **分析功能 (Analytics)。** 你可以查看谁在使用你的 Facebook 应用的相关信息。这些信息是匿名的，除非用户特别允许，否则你无法看到个人具体信息；但你可以看到关于用户的聚合或匿名数据。对于
  Facebook 来说，这基本上就是主页所有者可以在 Insights 中看到的信息。

  - **登录功能 (Login)。** 这些工具供用户用来登录你的 Facebook 应用。

  - **分享功能 (Share)。** 此 SDK 管理分享、点赞和消息。（这是许多 Facebook 应用开发者首先考虑的 SDK，尽管其实现也需要处理其他
  SDK。）

  - **应用事件 (App Events)。** 此 SDK 让你可以查看用户在应用中的事件和操作。

  - **广告功能 (Ads)。** 对于许多开发者来说，这是关键的 SDK。分享和应用事件可能对用户最重要，但广告通常对业务管理者最重要。


