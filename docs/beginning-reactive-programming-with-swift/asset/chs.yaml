- "# 第四部分：在 Amazon Web Services 中存储数据\n\n## 8. 使用 Amazon Web Services 和 Cocoa\n\n\
  在本书的第三至第五部分中，你将看到如何将第三方组件与 Cocoa 及其框架结合使用。这些组件可以是概念、标准或开源工具（如 `JSON`），也可以是特定工具，例如第三部分中描述的基于\
  \ Facebook 的登录功能。\n\n本部分将介绍一个更为通用的工具：Amazon Web Services。（第五部分将介绍 `RxSwift`。）你将了解如何为你的应用创建一个\
  \ AWS 账户，安装来自 AWS 的相应下载内容，以及如何将其与你的应用集成。AWS 集成的重点是数据管理，但你也可以将 AWS 用于其他目的。\n\n###\
  \ 组件对比\n\n`JSON` 是一种用于以简单方式读写结构化文本的工具。如今它非常普遍，许多语言、框架和环境（包括 Cocoa 和 Cocoa Touch）都支持使用\
  \ `JSON` 进行读写。\n\nFacebook 登录工具（第三部分中描述）与 `JSON` 不同，它专为单一简单的目的而设计：验证用户凭据。与 `JSON`\
  \ 和 Cocoa 及 Cocoa Touch 的紧密集成不同，Facebook 登录在 Cocoa 或 Cocoa Touch 一侧并没有集成：你只需将 Facebook\
  \ 的一些方法、类或框架添加到应用中，然后 Facebook 提供的类就会去验证凭据，并返回“是”或“否”来决定是否允许访问。（这只是一个简化的过程描述。）\n\
  \nAmazon Web Services（AWS）是另一种不同类型的工具，具有不同的集成方式。它没有与 Cocoa 和 Cocoa Touch 显式集成。AWS\
  \ 的功能对大多数应用至关重要，并且可以通过多种不同的方式提供。这些功能可以通过你为应用编写的代码提供；通过 GitHub 或其他地方提供的众多框架或库中的代码提供；或者作为\
  \ Cocoa 和 Cocoa Touch 一部分的代码和框架提供。AWS 成为应用的数据管理器，你需要在应用运行时与其持续交互（当然，这取决于应用的具体设计）。\n\
  \n##### 注意\n\n在本章的其余部分，除非需要区分，否则 *Cocoa* 将用来指代 Cocoa 和 Cocoa Touch 两者。\n\n### 将\
  \ AWS 与 Cocoa 结合使用\n\n如前所述，将 AWS 与 Cocoa 和 Cocoa Touch 集成有多种方式。最简单的方式是，你可以像使用 Facebook\
  \ 登录工具或像使用开源工具、框架或 `JSON` 这样的标准一样使用 AWS（更具体地说，是使用 AWS 的一个或多个组件）。在这些情况下，你需要考虑一个集成了\
  \ AWS 的 iOS 或 macOS 应用。\n\n在另一个极端，你可以将 AWS（更具体地说，是一个、多个或许多组件）作为应用的核心。\n\n在这两种情况下，用户界面都被设想为使用\
  \ Cocoa 或 Cocoa Touch 构建。问题在于，应用基本功能的实现是在哪里完成的——是在 AWS 中还是在 Cocoa 中？\n\n##### 注意\n\
  \n你可以将应用的一部分功能放在 Cocoa 侧，而将其他部分功能放在 AWS 中。根据你的环境，将功能集中在一侧或另一侧可能是可取的，但这仅是个人观察，并非建议。\n\
  \n本章的概述可能有助于你思考应用的可能性。有四个要点值得考虑：\n\n*   与他人共享数据\n*   跨平台使用数据\n*   发挥自身优势\n*   迎合用户期望\n\
  \n以下各节将讨论这些要点。\n\n\n\n#### 与他人共享数据\n\n当您与他人讨论应用时，人们通常会想到在手机上输入数据，并让其他人（或用户本人在其他时间）在另一台设备上查看和修改这些数据——甚至可能是在位于地球另一端桌面上的个人电脑上操作。\n\
  \n这个我们都很熟悉的常见场景实现起来却颇为复杂。通常，数据需要存储在某个位置，而这个\"某处\"不能仅仅局限于原始手机，因为当手机超出范围甚至关机时，数据仍需能被他人看到。\n\
  \n存储这些持久化数据最常见的方式之一，是使用基于云的服务，例如 `AWS`、`Box`、`Azure`、`Dropbox` 或 `FileMaker`（版本\
  \ 17 或更高）。您也可以使用网页（尤其是通过 HTML5）来存储数据，但必须将其存放在可达的位置。\n\n#### 跨平台使用数据\n\n存储需要共享的数据有多种方法。从事过各类数据项目的人普遍认为，改变数据管理策略并非易事，而且随着数据量的增加（就像老系统的情况一样），管理会变得更加复杂。人们常常忽略了他们对数据自动处理的\"\
  魔法\"期待。\n\n除了那些不存储任何数据（并且永远不存储）的项目之外，思考如何共享数据是值得的。以下是关于如何处理数据管理问题的一些基本考虑因素和建议。为将来才会实施的数据管理策略做规划，远好过听天由命（或依赖\"\
  魔法\"）。换句话说，你不必一开始就实施，但至少要有一个未来管理数据的计划，即使这个计划只是将来再重新审视这个问题。确保这是对数据管理理念的\"再次审视\"，而非\"\
  初次接触\"。\n\n#### 备注\n\n本节重点讨论数据，但如今也可以将应用的部分或全部处理过程迁移到云端。事实上，在许多情况下，数据和处理之间的界限很难界定，因为两者往往可以相互转换。\n\
  \n基本的数据场景及可能的解决方案如下：\n\n- **无数据**。不存储任何数据，且永远不会存储。\n\n- **单用户/单设备**。数据仅为单个用户和单个设备存储。这通常是临时数据的特殊情况。例如，一个能记住上次计算总数的计算器应用（就像普通计算器那样）。你可以使用\
  \ Cocoa 的 `UserDefaults.standard` 在设备上存储相对少量的数据。\n\n  \"相对少量\"这个标准随时间推移已有所增加，但 Apple\
  \ 文档指出这取决于设备本身。这很合理，因为设备存储空间会越来越大。网络讨论中曾出现存储量达到 4 GB 的案例。\n\n  这些数据可能会随设备的常规备份一起备份（如果用户开启了备份功能）。\n\
  \n- **单用户/多台 iOS 设备**。此场景使用用户的 Apple ID 和 iCloud 实现最为简便。可用空间大小受限于用户订阅的 iCloud 数据套餐以及已存储的其他数据量。\n\
  \n  作为 iCloud 服务的一部分，iCloud 数据会自动备份。然而，如果其中一台设备无法连接，其数据可能无法及时上传到 iCloud，并且除非应用妥善处理了\
  \ iCloud 冲突（例如由用户解决冲突），否则数据可能并非您和用户所预期的内容。\n\n- **多用户/多台 iOS 设备**。`CloudKit` 是处理这种情况的理想工具。由于它依赖于\
  \ iCloud，备份会自动完成。\n\n- **多用户/多台设备（或仅拥有非 iOS 设备的单用户）**。这种情况通常最适合使用按需云服务，例如 `AWS`、`Box`、`Dropbox`、`Google\
  \ Drive`、`OneDrive` 或类似服务。备份属于服务的一部分。\n\n  并非所有应用都需要按需存储，但这是此处提到的大多数服务都具备的功能。\n\n\
  #### 发挥自身优势\n\n有了基于云计算和数据的能力，您可以选择各自的存放位置。上一节中给出了一些关于数据的建议，但对于任何项目，明智的做法不仅是基于技术层面做出选择，还要考虑您开发团队的技能和优势——无论团队是有\
  \ 50 人还是只有您自己。\n\n#### 迎合用户期望\n\n谈到用户对共享数据的期望，用\"过度使用\"来形容不切实际的期望并不为过。但还有另一种同样危险的期望：期望共享数据能够采用大型机时代（有时甚至是穿孔卡片时代）最新、最棒的技术来构建和共享。数据结构的生命周期非常长。部分原因是所谓的\"\
  既有基础的拖累\"——即尽管时代和能力已变，仍需维持系统运行。\n\n使用诸如 `AWS` 之类的共享数据工具的一个好处是，您和您的用户可能会面对对所有人而言都很陌生的技术和界面。\n\
  \n\n### 探索 AWS\n\n在考虑了共享计算和共享数据的问题之后，现在是时候对 AWS 进行一个高级概览了。本节将提供这一概览。在下一章“在 Cocoa\
  \ 中管理 AWS”中，你将更深入地了解 AWS 以及如何将其与你的应用集成。请记住，AWS 是一个非常丰富的工具集，其内容远非这几章所能涵盖。这里的目的是让你了解有哪些可用服务，以便你至少能够决定是否要为你的项目进一步深入探索\
  \ AWS。\n\n##### 注意\n\nAWS 是一种基于 Web 的技术，这同样适用于其网站和技术。本章中你看到的截图和执行的步骤可能会有所不同；但总体流程可能是一致的。可以合理地假设，本章中介绍的部分\
  \ AWS 组件可能会得到增强，可能会新增一些组件，也可能会有一些被弃用。\n\n#### AWS 入门\n\n起点是 `aws.amazon.com`，如图\
  \ 8-1 所示（随着时间的推移可能会有所调整）。\n\n![../images/459488_1_En_8_Chapter/459488_1_En_8_Fig1_HTML.jpg](img/459488_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\n开始使用 AWS\n\n作为开发者，你通过使用右上角的按钮在控制台中进行与 AWS 的交互。在整个 AWS 网站中，你还会找到其他指向控制台的链接。你可以不登录控制台就浏览网站，但要实际进行操作，你需要一个账户。你将在第\
  \ 10 章“管理 AWS 登录”中了解如何设置你的账户。\n\n现在，请探索左上角的菜单，如图 8-2 所示。\n\n![../images/459488_1_En_8_Chapter/459488_1_En_8_Fig2_HTML.jpg](img/459488_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n\n浏览 AWS 上的开发者资源\n\n图 8-2 提供了可供开发者使用的资源的高级概览。即使 AWS 发生变化，`Developers` 菜单也基本保持不变。\n\
  \n`Products` 菜单，如图 8-3 所示，会随着 AWS 添加更多产品和功能而发生变化。浏览此菜单以了解可以集成到你应用中的工具和产品是值得的。\n\n\
  ![../images/459488_1_En_8_Chapter/459488_1_En_8_Fig3_HTML.jpg](img/459488_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\nAWS 产品\n\n#### 比较用于数据管理的 Cocoa 和 AWS 产品\n\n你可以使用这些 AWS 产品构建一个完整的应用（这当然就是\
  \ AWS 的理念）。唯一缺失的就是用户界面。你可以使用基于 Web 的工具（如 HTML5）来提供界面。然而，对于最强大、最灵活的界面，我们更倾向于使用 `Cocoa`\
  \ 和 `Cocoa Touch` 这些工具。\n\n如果你查看产品列表，你会发现它们是应用后端的基石。在 `Cocoa` 和 AWS 之间最常见的集成形式之一是数据管理，这也是本书这一部分探讨的主题。`Cocoa`\
  \ 中可用的数据管理工具主要面向个人，因此共享数据管理需要（至少在现阶段）使用 `Cocoa` 之外的工具来实现。\n\n`SQLite` 已内置于 `Cocoa`\
  \ 中，但它是一个个人数据管理库；它不管理数据共享。`iCloud` 是苹果处理数据共享的技术，但它主要侧重于在同一个 `AppleID` 内进行共享。（`CloudKit`\
  \ 确实提供了一些更广泛的数据共享功能。）\n\n`Core Data` 是 `Cocoa` 中一个强大的数据持久化工具。它不是一个数据管理器；相反，它被设计为任何符合\
  \ `Core Data` 结构的数据管理工具的前端。多年来，在苹果产品的各种形态中，多种数据管理工具已经与 `Core Data` 集成。\n\n### 总结\n\
  \n本章介绍了 Amazon Web Services (`AWS`) 的高级视图，以及其工具如何与 `Cocoa` 配合使用。`AWS` 可用于构建整个应用，但通常\
  \ `AWS` 提供后端，而 `Cocoa` 提供前端界面和功能。\n\n在下一章中，你将了解如何登录并开始将 `AWS` 与一个应用集成。\n\n"
- '# 9. 管理 AWS 登录


  在第 8 章中，你了解了 `AWS` 提供的各种服务（参见图 8-3 的产品列表）。当使用那些触及应用诸多方面以及用户生活细节的产品时，安全性至关重要。（这同样适用于你自己的应用、苹果的应用和框架，以及像
  `AWS` 这样的第三方产品。）


  登录 `AWS` 被设计成一个安全的过程，它将对 `AWS` 的不同部分以及你应用的不同部分进行隔离。这是通过本章第一部分概述的登录结构来实现的。


  在本章后面的部分，你将找到关于如何使用 `Xcode` 将 `AWS` 集成到应用中的更多细节。由于每个人使用 `AWS` 的方式各不相同，你会遇到许多对你来说重要的选项和功能，而其他一些则可以暂时（或永远）搁置。在开始将
  `AWS` 集成到应用时，你可能需要回顾以下在各菜单中找到的项目，它们可能很重要：


  * 登录（图 9-2）

  * Mobile Hub（图 9-9）




  ### 关于 AWS 账户与根用户


  您可以通过 `aws.amazon.com` 访问 AWS。您可以浏览第 8 章所述的某些功能和文档，但要执行更多操作（例如在应用中使用 AWS），您需要登录。


  **注意：** 本章所述的登录是开发者登录，用于构建您的 AWS 资源。一旦这些资源构建完成并与您的应用一起部署，用户将自行登录您的应用，或者在多数情况下，您的应用会在无需用户干预的情况下自动登录。


  您可以从 `aws.amazon.com` 的许多位置创建新的 AWS 账户——只需查找“创建新 AWS 账户”链接即可（措辞可能会随时间变化）。如图 9-1
  所示的页面将会出现。


  ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig1_HTML.jpg](img/459488_1_En_9_Fig1_HTML.jpg)


  **图 9-1** 创建新 AWS 账户


  创建新账户的过程相当直接。正如“AWS 账户名称”字段旁边的小信息按钮所示，您可以现在选择一个账户名称，稍后也可以更改。您的 AWS 账户标识符通常不可见——您的电子邮件地址与其关联，并且与密码一样，电子邮件地址也是可以更改的。


  一旦您拥有账户，就可以按照图 9-2 所示进行登录。


  ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig2_HTML.jpg](img/459488_1_En_9_Fig2_HTML.jpg)


  **图 9-2** 以根用户身份登录


  根用户就是账户的根用户。您将看到，您可以拥有与账户关联的其他用户。您可以通过以根用户身份登录，然后设置其他访问账户来实现这一点。这使您可以在整个账户中拥有多个账户，而不会危及安全性。


  **注意：** 与所有根用户或超级用户一样，不要将该登录信息用于真正的根用户或超级用户操作之外的任何目的，例如添加或删除其他用户。


  如图 9-3 所示，一旦您的账户部分设置完成，您就可以立即访问。请使用“我的账户”下拉菜单进行此操作。


  ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig3_HTML.jpg](img/459488_1_En_9_Fig3_HTML.jpg)


  **图 9-3** 使用根用户登录访问您的账户


  如果您尚未完成注册，选择“我的账户”中的任何项目都会要求您使用图 9-3 所示的页面进行登录。


  如果您选择了与 AWS 身份与访问管理 (IAM) 相关的项目，您将看到如图 9-4 所示的指引，将您导向 IAM。


  ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig4_HTML.jpg](img/459488_1_En_9_Fig4_HTML.jpg)


  **图 9-4** 系统会警告您正在使用 AWS 账户


  如果您继续前往诸如账户安全凭证之类的区域（而非 IAM 用户的设置），系统会允许您这样做，如图 9-5 所示。


  ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig5_HTML.jpg](img/459488_1_En_9_Fig5_HTML.jpg)


  **图 9-5** 使用根用户登录配置账户设置


  ### 创建组织


  您可以创建一个 AWS 账户（所有 AWS 账户），该账户拥有根登录权限。然后您可以向其中添加个人。您还可以创建一个组织，该组织由多个 AWS 账户组成。从右上角的账户菜单执行此操作，菜单中会显示您的账户名称。您在图
  9-5 的右上角以及图 9-6 中再次看到了账户名称 (champlainarts)。


  ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig6_HTML.jpg](img/459488_1_En_9_Fig6_HTML.jpg)


  **图 9-6** 从您的账户菜单创建组织


  ### 使用 IAM


  由于最佳实践是不使用根用户登录，您可能会好奇如何操作 AWS。答案是使用内置的身份与访问管理 (IAM) 工具。当您完全登录后，您会在视图左上角看到一个“服务”菜单，如图
  9-7 所示。


  ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig7_HTML.jpg](img/459488_1_En_9_Fig7_HTML.jpg)


  **图 9-7** 浏览服务


  **注意：** 浏览“服务”中的各种链接以查找选项和您历史记录。您将看到的项目包括最近查看过的项目，因此您会看到不同的菜单及其项目序列。除了基本的单一登录流程之外，没有固定的“先做这个后做那个”的序列。本章提供一个概述，但您可以根据需要尝试使用菜单。


  如果您选择 IAM，您将能够检查其设置，如图 9-8 所示。


  ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig8_HTML.jpg](img/459488_1_En_9_Fig8_HTML.jpg)


  **图 9-8** 配置 IAM


  要开始使用代码，请从“服务”（或“历史记录”，如果您已经查看过）中选择 Mobile Hub 服务，如图 9-9 所示。


  ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig9_HTML.jpg](img/459488_1_En_9_Fig9_HTML.jpg)


  **图 9-9** 选择 Mobile Hub


  ### 将 AWS 与 Xcode 集成


  AWS Mobile Hub 是您处理代码的地方。如果您有一个项目，您可以将 AWS 添加到其中，如图 9-10 所示。


  ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig10_HTML.jpg](img/459488_1_En_9_Fig10_HTML.jpg)


  **图 9-10** AWS Mobile Hub


  除了创建您自己的 Xcode 项目，您还可以从 AWS 入门套件开始，如图 9-11 所示。


  ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig11_HTML.jpg](img/459488_1_En_9_Fig11_HTML.jpg)


  **图 9-11** AWS 入门套件和教程


  ### 本章小结


  本章总结了当您开始将 AWS 集成到您的应用时，对您而言至关重要的部分。这需要进行设置（例如设置 AWS 账户），并且需要您有一个准备添加 AWS 的项目。您现在应该明白了如何在
  Mobile Hub 中开始管理此类项目。下一章将向您展示如何为 AWS 设置一个项目。完成此操作后，您就可以构建您的应用了。


