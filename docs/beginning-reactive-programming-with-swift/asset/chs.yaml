  ## 5. 在 iOS 上设置 Facebook 账户


  在本书的这一部分及后续部分中，你将处理 iOS 项目与外部项目（如来自 Facebook、Amazon Web Services 或 RxSwift 的项目）的集成。这类集成与前面章节讨论的集成最大的区别在于，现在的集成更为复杂。这不再是应用之间共享数据、消息或数据结构的问题；而是要让两个组件的部分协同工作。本章将探讨
  Facebook 的使用，从某些方面来说，这是最简单的应用集成形式。


  ##### 注意


  至少简要地阅读后续章节中关于 AWS、Facebook 和 RxSwift 的集成内容可能会很有帮助。有些技术在其他环境中也会用到。此外，能够查看不同环境中执行相同功能的代码，有助于你理解所涉及的主要问题。


  ### 开始探索 Facebook iOS SDK


  本书讨论的 API 会不时发生变化。2018 年，由于欧盟采纳了《通用数据保护条例》（GDPR），以及包括 Yahoo!（30 亿用户账户遭泄露）、eBay（1.45
  亿用户受影响）、Equifax（1.43 亿用户面临风险）和 Target 商店（1.1 亿用户的信用卡数据被盗）在内的多家社交媒体公司发生多起重大隐私泄露事件，许多
  API 都发生了变化。要非常小心地依赖旧技术和旧代码，尤其要谨慎依赖 2018 年中期及更早的代码。这些代码可能没有反映近年来实施的变化。


  与本书中提到的其他 API 一样，一个好的起点是 Facebook 的开发者子站点——`developers.facebook.com`，如图 5-1 所示。API
  本身随时可能发生变化；此外，欢迎屏幕上会显示新闻和更新，如图所示。新闻和更新会频繁变动。


