- fmt: '# Providing Basic iOS/Facebook Integration


    As you can see in Figure [6-4](#459488_1_En_6_Chapter.xhtml#Fig4), you continue
    on with the Facebook for iOS SDK.


    ![../images/459488_1_En_6_Chapter/459488_1_En_6_Fig4_HTML.jpg](images/459488_1_En_6_Chapter/459488_1_En_6_Fig4_HTML.jpg)


    Figure 6-4 Integrate the Facebook SDK for iOS


    The downloaded SDK that you have created, as shown in Figure [6-4](#459488_1_En_6_Chapter.xhtml#Fig4),
    integrates your new Facebook app ID into the property list for your app. Note
    the code toward the end of section 2 of the `info.plist`, as shown in Figure [6-5](#459488_1_En_6_Chapter.xhtml#Fig5).


    ![../images/459488_1_En_6_Chapter/459488_1_En_6_Fig5_HTML.jpg](images/459488_1_En_6_Chapter/459488_1_En_6_Fig5_HTML.jpg)


    Figure 6-5 Your Facebook ID is integrated into the `info.plist` file you download


    The code shown in Listing [6-1](#459488_1_En_6_Chapter.xhtml#PC1) is standard
    code for any iOS app.


    ```

    CFBundleURLTypes

    CFBundleURLSchemes

    FacebookAppID

    FacebookDisplayName

    JFTest

    ```


    Listing 6-1 Facebook Integration with Your App’s Property List


    The Facebook ID is used internally; the app display name is visible to the user.
    Remember this if you need to change the name at some point: most likely you need
    to leave the `FacebookAppID`. However, if you are modifying an existing Facebook
    app to get started quickly, you will need to change both `FacebookAppID` and `FacebookDisplayName`.


    ### Note


    It is often easier to use the quickstart Download SDK button shown previously
    in Figure [6-4](#459488_1_En_6_Chapter.xhtml#Fig4) rather than tweaking an existing
    plist.


    # Connecting the iOS App to Your Facebook App


    The plist you download has the Facebook name inserted into it so that the iOS
    app can use it appropriately. You now need to manually provide the iOS app bundle
    identifier (which uniquely identifies every iOS app) to Facebook.


    Beneath the code shown in Figure [6-5](#459488_1_En_6_Chapter.xhtml#Fig5) and
    Listing [6-1](#459488_1_En_6_Chapter.xhtml#PC1), you’ll see a form, shown in Figure
    [6-6](#459488_1_En_6_Chapter.xhtml#Fig6), where you can enter your bundle identifier.


    ![../images/459488_1_En_6_Chapter/459488_1_En_6_Fig6_HTML.jpg](images/459488_1_En_6_Chapter/459488_1_En_6_Fig6_HTML.jpg)


    Figure 6-6 Provide your bundle identifier from iOS to Facebook


    As a reminder, the bundle identifier is shown in your iOS app’s general settings
    at the top (in the Identity section; see Figure [6-7](#459488_1_En_6_Chapter.xhtml#Fig7)).


    ![../images/459488_1_En_6_Chapter/459488_1_En_6_Fig7_HTML.jpg](images/459488_1_En_6_Chapter/459488_1_En_6_Fig7_HTML.jpg)


    Figure 6-7 Use the iOS bundle identifier for your Facebook app


    ### Note


    Always be careful about changing the bundle identifier. It is used in many places
    to keep the parts of your iOS app together.


    # Summary


    This chapter has provided an overview of the connections from an iOS app to a
    Facebook app and vice versa. Be careful about making changes for their own sake.
    More than one developer has decided to "clean up" a bundle identifier at some
    point so that it adheres to an in-house standard or for some other reason. Chances
    are, that "clean-up" will cost you hours (or days) of work.


    At this point, you should be ready to actually try running your iOS app together
    with Facebook.


    # 7. Adding a Facebook Login to an iOS App


    With a Facebook developer account, you can add Facebook features (such as logins)
    to your iOS app. This chapter will walk you through that process. It is useful
    for many of the Facebook tools that you may want to integrate with an iOS app.
    Furthermore, the steps used to integrate Facebook tools are similar in some ways
    to the steps you would use to integrate other tools, such as Amazon Web Services
    (AWS), which is the topic of the next part of this book.


    Also, it''s important to note that there are a number of ways to handle this integration.
    CocoaPods (described in Chapter [2](#459488_1_En_2_Chapter.xhtml)) are a very
    common way of handling integration. If you look into CocoaPods, you''ll see that
    what you have is an automated tool for managing your Xcode project files along
    with having versions automatically downloaded from GitHub by CocoaPods.


    The heart of the integration is Xcode, its files, and its frameworks. Although
    a CocoaPods interface is available for the Facebook interface, this chapter will
    show you what happens on the source code/Xcode side of things. Remember that regardless
    of the integration technique that you use, the same basic structure (updating
    and integrating your Xcode project) is what has to happen.


    First, though, it''s the Facebook login.


    ## Starting to Integrate the Facebook SDK with an iOS app


    There are two components you need to get started:


    - You need a Facebook developer account (see the previous chapter).

    - You need Xcode and a basic familiarity with it.


    Although you can work offline with Xcode as you develop an app, you cannot work
    offline to create apps for Facebook or iOS, because you need to interact with
    the Facebook and iOS environments. If you have anything other than an ordinary
    Internet connection (for example, if you are behind a firewall that limits the
    sites you can visit), check out the basic steps to get started to make certain
    that you don''t need permission from another part of the organization.


    ### Note


    Both the Facebook and iOS developer sites change from time to time, so you may
    have to search around to find sections that have moved.


    Start by creating an Xcode project to use for testing. In this chapter, the Single
    View sample app that is part of Xcode will be used. Figure [7-1](#459488_1_En_7_Chapter.xhtml#Fig1)
    shows how you can create it.


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig1_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig1_HTML.jpg)


    Figure 7-1 Create a single-view app to test with Facebook


    Make a note of the app bundle identifier that is created based on the data you
    enter for the app. As you can see in Figure [7-2](#459488_1_En_7_Chapter.xhtml#Fig2),
    the bundle identifier for this app is `com.champlainarts.MySingleViewApp`.


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig2_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig2_HTML.jpg)


    Figure 7-2 Make a note of the bundle identifier


    As always when you create a new app from a template in Xcode, run the app either
    on a device or on a simulator to make certain that it works properly. Figure [7-3](#459488_1_En_7_Chapter.xhtml#Fig3)
    shows what you should see if you run it on the simulator for iPhone 8.


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig3_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig3_HTML.jpg)


    Figure 7-3 Test the app


    Yes, a successful implementation of the single-view app shows nothing. As you
    will see later in this chapter, you can easily add a label. All you should be
    concerned with at this point is that the app doesn''t fail or crash when you run
    it on Xcode.'
