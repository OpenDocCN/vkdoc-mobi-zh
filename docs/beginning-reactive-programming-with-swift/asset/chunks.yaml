    \n# Introduction\n\nAs technologies change, we see how basic patterns recur over\
    \ time. In many ways, there aren’t that many new things to learn — just new variations\
    \ and combinations of existing technologies and concepts. (See my book “Learn\
    \ Computer Science with Swift” for more on the patterns that recur).\n\nAs always,\
    \ there are many people to thank for helping on this book. Most important are\
    \ the people who have contributed to the technologies. When it comes to the many\
    \ open source technologies (including ReactiveX and its projects), there are more\
    \ and more people working on the technologies, and that makes it easier for everyone.\n\
    \nCloser to home, Aaron Crabtree has provided very helpful and watchful comments\
    \ on the manuscript. And, as always, Carole Jelen at Waterside Productions has\
    \ helped make this book possible.\n\n### About the Author and About the Technical\
    \ Reviewer\n\n### About the Author\n\n### About the Technical Reviewer\n\n# Part\
    \ I Building Composite Apps with Swift\n\n# 1. Building Blocks: Projects, Workspaces,\
    \ Extensions, Delegates, and Frameworks\n\nBuilding apps today isn’t really about\
    \ writing code. You may have learned how to write code in school or at a bootcamp\
    \ intensive workshop, and those experiences are valuable ways to learn about the\
    \ principles of coding. However, when you start your first coding job, you may\
    \ find that you’re asked to correct a typo in the title of a report that an existing\
    \ app produces. It’s a simple job that you can divide into two parts.\n\nFirst,\
    \ find where the typo is (a basic app can easily have many thousands of lines\
    \ of code—`Windows` is estimated to have 50 million lines). It might not take\
    \ long to find a typo in a single line of code, but how long does it take to find\
    \ the line of code in the first place?\n\nSecond, fix the typo.\n\nA month later,\
    \ after you have finished the task of changing the title typo, you may find yourself\
    \ actually building an app. That job, too, can be divided into several component\
    \ parts.\n\nFirst, implement a user authentication process. You can do this using\
    \ the `Facebook API` or using some open source code from a trusted web source.\
    \ You just have to find the code or API and then put it into your app.\n\nSecond,\
    \ you need to implement your app’s functionality that comes into play after the\
    \ authentication process is complete. Depending on what the app is, you may have\
    \ to write it from scratch, but chances are that you’ll find yourself revising\
    \ existing code from a similar project.\n\nThird, you may take your new app and\
    \ port it to a different platform.\n\nCoding today is often about reading and\
    \ understanding existing code and then reusing it in new apps and new combinations.\
    \ Yes, there is a lot of from-scratch coding going on, but there’s also a lot\
    \ of reuse of existing code happening in the development world.\n\nA number of\
    \ factors have come together to create and support this world of reusable and\
    \ repurposed code, which, after all, represents many, many hours of effort by\
    \ many, many people. Reusing analysis and code is just as important as reusing\
    \ and recycling natural resources. In the case of code, reuse means not reinventing\
    \ the wheel. By not starting from scratch each time an app is created, the entire\
    \ world of software development can move forward.\n\nThis chapter will provide\
    \ an overview of how this world of reusable code functions—particularly from the\
    \ vantage point of iOS, tvOS, macOS, and watchOS. You will find an overview of\
    \ the reusable code building blocks, along with an overview of how you can put\
    \ them together using `Xcode` and other tools that are part of the Apple developer’s\
    \ standard toolkit. There are three parts to the chapter:\n\n*   **Component Architecture\
    \ Overview** gives you an idea of what it’s like to build apps from components.\n\
    \n*   **Looking at the iOS and macOS Building Blocks** provides an overview of\
    \ what those blocks are.\n\n*   **Building with the Building Blocks** provides\
    \ an overview of how to put them together.\n\n## Component Architecture Overview\n\
    \nSince the beginning of the computer age in the 1940s, there has been a development\
    \ backlog of projects waiting to be done. (A companion backlog accompanied the\
    \ rise of the web.) The need for software seemed unstoppable. Various strategies\
    \ emerged, and **components** were a key part of many of them, both for the web\
    \ and for software in general.\n\nThe idea was that building complete websites,\
    \ programs, and apps from scratch was an unsustainable model. There had to be\
    \ some way of speeding things up by reusing code that had already been written\
    \ and debugged. The problem with this simple idea was that it wasn’t possible\
    \ to easily reuse code—changes always needed to be made.\n\nOne way of reusing\
    \ code to speed up the development process was to take existing code and extract\
    \ its key functions and features. These elements could be reused more easily than\
    \ an entire code base. This was the beginning of component software development.\n\
    \nAs time passed, these reusable extracts began to be used in two different ways:\n\
    \n*   **Use a framework or shell.** In this model, there is a framework into which\
    \ you can plug components.\n\n    The framework model was popular in the 1990s;\
    \ IBM’s `SOM` (Software Object Model) was one of the first. Microsoft entered\
    \ the component software world with `OLE` (Object Linking and Embedding) and `COM`\
    \ (Component Object Model). A consortium of Apple, IBM, and WordPerfect worked\
    \ on `OpenDoc`. All of these were frameworks into which you could plug specialized\
    \ components (from the user’s point of view, most were documents into which you\
    \ could plug components).\n\n*   **Build a product from components.** In this\
    \ model, you combine a number of reusable components (off-the-shelf or written\
    \ specifically for the project) to make a single product. There usually isn’t\
    \ a framework or container as a shell; in some projects, there is indeed such\
    \ an overarching container or shell, but it may be created specially for each\
    \ project.\n\nRegardless of the component model you’re working with, there is\
    \ a critical issue that crops up as soon as you start thinking about components:\
    \ What language will you use? In today’s world, the languages for iOS (and macOS)\
    \ are `Swift` and `Objective-C`. However, one of the features of component architecture\
    \ is that in some cases you can mix different languages, as you will see in the\
    \ “Command-Line Integration” section later in this chapter."
