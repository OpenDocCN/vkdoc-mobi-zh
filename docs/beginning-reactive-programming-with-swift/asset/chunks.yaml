    ## 在 Swift 中使用 JSON 集成工具


    到目前为止，你已经了解了如何在 playground 内部创建文件以及如何读取其内容。无论文件是位于 playground 中还是其他位置——甚至可能是通过网络传输——读取过程都是相同的。


    更常见的情况是从文件中读取数据并将其内容作为 JSON 数据而非字符串来处理。这就是本节将要介绍的内容。


    ### 集成 Swift 数组


    首先，准备一些 JSON 代码，你可以在 BBEdit 或 Xcode（甚至 TextEdit）等编辑器中创建这些代码。


    你可以从一个 JSON 数组开始，例如：


    ```

    [3, 69, 8, 66]

    ```


    请注意，数组的元素之间用逗号分隔，并且数组用方括号括起来。你可以创建一个 playground，然后在“Resources”部分添加一个新文件。图 4-8
    展示了本章中接下来会发生的情况。


    ![../images/459488_1_En_4_Chapter/459488_1_En_4_Fig8_HTML.jpg](img/459488_1_En_4_Fig8_HTML.jpg)


    **图 4-8**

    在 playground 包内的文件中创建一个 JSON 数组


    接下来，像本章之前看到的那样，指定文件的 URL。


    ```

    let url = Bundle.main.url(forResource: "ArrayTest", with Extension: "json"

    ```


    然后，不是将文件中的数据提取为字符串，而是使用 FoundationKit 内置的 `JSONSerialization.json` 文件将其作为 JSON
    对象检索。请注意，这应该始终在能够捕获失败的 `do` 代码块内完成，如图 4-9 所示。


    ![../images/459488_1_En_4_Chapter/459488_1_En_4_Fig9_HTML.jpg](img/459488_1_En_4_Fig9_HTML.jpg)


    **图 4-9**

    捕获失败


    一旦创建为 JSON 对象，你就可以使用 Swift 打印它。图 4-9 中的代码最重要的一点是，在 JSON 对象创建之后，它可以像往常一样在 Swift
    中被修改。例如，你可以使用以下代码将数组（从 JSON 意义上）转换为 Swift 整数数组：


    ```

    let test = jsonObject as! [Int]

    ```


    你可以在图 4-9 的第 10 行看到这一点。（在实践中，你会使用 `as?` 来捕获转换中的错误。）


    图中还显示了几行其他测试和调试代码，但或许最重要的是第 13 行：


    ```

    print (test[2])

    ```


    第 13 行使用类型化数组创建了 `test` 变量，如前所述。第 13 行之所以如此重要，是因为最初可能被指定为输入字符串的 JSON 代码现在被转换为一个真实对象，并且你可以使用下标
    `[2]` 来访问数据——就像任何其他 Swift 数据一样。


    ### 集成 Swift 字典


    如果你想在 Swift 中使用 JSON 数组，其基本步骤是相同的。如图 4-10 所示，你在 playground 的包中创建文件。


    ![../images/459488_1_En_4_Chapter/459488_1_En_4_Fig10_HTML.jpg](img/459488_1_En_4_Fig10_HTML.jpg)


    **图 4-10**

    在 Swift 和 JSON 中使用字典


