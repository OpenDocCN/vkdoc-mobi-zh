  trans: '

    # 设置 iOS 项目


    首先，通过 `aws.amazon.com` 右上角的按钮或“我的账户”下拉菜单（位于控制台登录按钮旁）中的“AWS 管理控制台”选项，登录控制台。这两种方式均如图
    10-1 所示。


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig1_HTML.jpg](img/459488_1_En_10_Fig1_HTML.jpg)


    图 10-1


    开始管理你的 AWS 账户


    像往常一样，你需要登录你的 AWS 账户，如图 10-2 所示。


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig2_HTML.jpg](img/459488_1_En_10_Fig2_HTML.jpg)


    图 10-2


    登录你的 AWS 账户


    请记住，虽然你可以以根用户身份登录账户，但你应该使用已创建的其他账户之一，如第 9 章所述。如果你可以选择登录根账户，并且你已有特定账户，则请登录其他账户，如图
    10-2 所示。


    登录后，你可以进入 Mobile Hub，这就是你的目标位置。如果它是较新的服务，可能很容易找到，如图 10-3 顶部所示。否则，在服务选择主页面第三列服务的顶部“移动服务”下查找它。


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig3_HTML.jpg](img/459488_1_En_10_Fig3_HTML.jpg)


    图 10-3


    从“移动服务”或“最近访问的服务”中选择 Mobile Hub


    ### 注意


    请记住，随着 AWS 的发展，可用服务会不时变化。你也可以使用视图顶部的最近黑色工具栏，如图 10-4 所示。


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig4_HTML.jpg](img/459488_1_En_10_Fig4_HTML.jpg)


    图 10-4


    在 AWS Mobile Hub 中查看你的项目


    如果你选择 Mobile Hub，你将看到项目列表（如果已创建），如图 10-4 所示。你也可以使用入门套件或教程开始操作。


    ## 探索文档


    云计算的理念已经存在很长时间了。它最早在 1993 年兴起的“瘦客户端”计算时代被提及，有些人认为这是自 20 世纪 50 年代以来分布式大型机系统中使用的“哑”终端的演变。


    尽管基本架构并非新事物，但它与 Web 及其他现代技术的集成为当今应用程序执行的大量数据共享提供了一个平台。AWS 完美契合了这种模式，但你需要了解其实现的具体细节，才能将
    AWS 与自己的应用程序集成。


    本章剩余部分将帮助你继续实现这种集成。实施中需要考虑的第一步是，你可以在哪里找到帮助和信息。AWS 的开发人员文档可通过 `aws.amazon.com`
    获取。你可以在许多 AWS 页面的右上角找到文档 PDF 版本的链接。文档及其链接可能会不时更改，但如果你从图 10-3 所示的服务中选择 Mobile Hub，你就能看到你的项目，如图
    10-4 所示。


    请注意，当你看到项目时，还会看到指向“支持”的链接，如图 10-4 右上角所示。选择“文档”将带你进入文档页面，如图 10-5 所示。


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig5_HTML.jpg](img/459488_1_En_10_Fig5_HTML.jpg)


    图 10-5


    你可以下载 PDF 格式的文档


    右上角有一个按钮，允许你将文档下载为 PDF 文件。在撰写本文时，该 PDF 文档超过 400 页，因此许多开发人员选择使用各种在线版本。文档分为四个基本部分：


    -   *入门*（如图 10-5 所示）正是如此——你需要采取的入门步骤。本节对其进行了总结。

    -   *教程* 让你通过构建应用或应用的一部分来探索 AWS。如图 10-5 所示，它们适用于 iOS 和 Android。

    -   *操作方法* 文档让你学习如何完成特定任务。

    -   *参考* 是了解教程和操作方法文档背后信息的来源。


    所有这些内容都可能随时间变化。如果你刚开始接触 AWS，遵循其中一个教程可能会取得最佳效果。如果你期望仅实现某个特定功能而中途跳入某个教程，那么在你对 AWS
    更加熟悉之前，可能不会那么成功。


    ## 创建项目


    从图 10-5 所示的“入门”页面，你可以开始构建一个集成了 AWS 和 iOS 的简单应用。以下是需要采取的步骤。


    ### 注意


    在 AWS 文档中，你会在多个地方找到这些启动信息，包括“操作方法”、“入门”、“教程”和“参考”。在你对本章描述的整个流程感到熟悉之前，你可能希望尝试使用其中某一个序列进行操作，因为这些序列之间存在细微差异，切换起来可能会让人感到困惑。


    首先，选择 iOS 平台，如图 10-5 所示。如果你尚未创建项目（如图 10-4 所示），请立即创建并选择其平台。

    '
- fmt: "### Setting Up the Back End\n\nThe next step is to set up your back end, which\
    \ manages the integration between iOS and AWS. If you clicked Add on the screen\
    \ shown in Figure [10-5](#459488_1_En_10_Chapter.xhtml#Fig5) you should be ready\
    \ to set up your back end, as seen in Figure [10-6](#459488_1_En_10_Chapter.xhtml#Fig6).\n\
    \n![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig6_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig6_HTML.jpg)\n\
    \nFigure 10-6\n\nSet up your back end\n\nSet up your back end by downloading Cloud\
    \ Config as shown in Figure [10-6](#459488_1_En_10_Chapter.xhtml#Fig6) to configure\
    \ the cloud connection. Then, click Next.\n\nFigure [10-7](#459488_1_En_10_Chapter.xhtml#Fig7)\
    \ shows a basic iOS Xcode app after the back end has been downloaded—either one\
    \ you have created or a starter kit or tutorial. (The files should be in your\
    \ `Downloads` folder.) The files in the project should be familiar to you. (By\
    \ default, starter kits may be named something like `aws-mobile-ios-notes-tutorial-master`.)\n\
    \n![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig7_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7\n\nDownload the configuration file\n\nLook in your `Downloads` location\
    \ for a downloaded file called `awsconfiguration.json`. From the Xcode project\
    \ navigator, choose your app and then click Add File, as you can see in Figure\
    \ [10-8](#459488_1_En_10_Chapter.xhtml#Fig8), to add the downloaded file.\n\n\
    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig8_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig8_HTML.jpg)\n\
    \nFigure 10-8\n\nAdd the downloaded back end to your project\n\nYour project should\
    \ now look like Figure [10-9](#459488_1_En_10_Chapter.xhtml#Fig9), with the `awsconfiguration.json`\
    \ file added. (It is easier to use the Xcode Add File command than the Finder\
    \ to make sure your project files are in the right place.)\n\n![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig9_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig9_HTML.jpg)\n\
    \nFigure 10-9\n\nUse Xcode to add the configuration file to your project\n\n###\
    \ Add the Pods\n\nYou now need to install CocoaPods if you haven’t already done\
    \ so for this or another project. To do so, use Terminal and input the following\
    \ command:\n\n```\nsudo gem install cocoapods\n```\n\nYou don’t need to use a\
    \ specific directory for this command.\n\nChange the directory for Terminal to\
    \ your app’s folder. The simplest way to do this is to launch Terminal, type `cd`,\
    \ and drag the `aws-mobile-ios-notes-tutorial-master` folder to complete the `cd`\
    \ (change directory) command.\n\nWith the directory changed, type the following\
    \ command to Terminal:\n\n```\npod init\n```\n\nYour podfile will be created with\
    \ the appropriate pods. Whenever you modify your podfile, install it with the\
    \ following Terminal command:\n\n```\npod install -- repo-update\n```\n\nThis\
    \ will move the project into an Xcode workspace as described in Chapter [3](#459488_1_En_3_Chapter.xhtml).\n\
    \nWhile you are in Xcode, check the General settings for your app, as shown in\
    \ Figure [10-10](#459488_1_En_10_Chapter.xhtml#Fig10). You will probably see errors\
    \ related to the signing and provisioning profile settings. Change the bundle\
    \ identifier and team to your own settings.\n\n![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig10_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig10_HTML.jpg)\n\
    \nFigure 10-10\n\nChange the settings for your app\n\nYou should be able to build\
    \ and run your app now. As you can see in Figure [10-11](#459488_1_En_10_Chapter.xhtml#Fig11),\
    \ the pods will download necessary components. The download and build may take\
    \ a few minutes, so be patient.\n\n![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig11_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig11_HTML.jpg)\n\
    \nFigure 10-11\n\nInstall CocoaPods for AWS\n\n### Note\n\nWhile the app is building,\
    \ you may notice some error messages. Wait until the build is finished because\
    \ they may disappear as further components are downloaded.\n\n## Summary\n\nThis\
    \ chapter has showed you how to begin putting your AWS/iOS app together. In the\
    \ next chapter, you’ll start to actually use the integrated app.\n\n# Part V Using\
    \ RxSwift\n\n# 11. Getting Into Code\n\nThere are two types of developers in the\
    \ world: those who want to get into the code first and then learn how it’s working,\
    \ and those who want to learn how things will work before they get into the code.\
    \ Just to make things interesting, an individual developer may work in one mode\
    \ or the other, switching back and forth for a sense of variety or depending on\
    \ what issues need attention.\n\nIf you feel like starting with the background\
    \ information, start with Chapter [12](#459488_1_En_12_Chapter.xhtml), “Thinking\
    \ Reactively,” and then come back to this chapter. Alternatively, keep reading\
    \ this chapter to get yourself started with some very basic RxSwift code and then\
    \ follow on with Chapter [12](#459488_1_En_12_Chapter.xhtml).\n\nIn this chapter,\
    \ you’ll find the basics of working with RxSwift:\n\n* **Getting Started** will\
    \ show you what you need on the hardware and software side of things.\n* **Installing\
    \ RxSwift from GitHub** will walk you through the download and installation process.\n\
    * **Using the RxSwift Playground** will show you how to write your first RxSwift\
    \ code in Swift Playgrounds.\n\n### Tip\n\nIf you haven’t used Swift Playgrounds\
    \ before, you’ll find enough of the basics to use it in this book. However, you’ll\
    \ find out much more in *Learn Computer Science with Swift: Computation Concepts,\
    \ Programming Paradigms, Data Management, and Modern Component Architectures with\
    \ Swift and Playgrounds* and in *Exploring Swift Playgrounds: The Fastest and\
    \ Most Effective Way to Learn to Code and to Teach Others to Use Your Code*. Both\
    \ are by Jesse Feiler and are published by Apress.\n\n## Getting Started\n\nThe\
    \ minimal getting-started things to know are:\n\n* RxSwift itself is an open source\
    \ implementation of the reactive programming library for Swift. You can download\
    \ it freely from GitHub (the steps to do so are described in this chapter).\n\
    * Reactive programming lets you handle asynchronous processing easily.\n* To implement\
    \ the paradigm, reactive programming uses basic terms:\n  * *Observables* are\
    \ items that can be observed. When they change, those changes are visible to components\
    \ that *subscribe* to the observable in question.\n  * *Observers* observe observables.\n\
    \nThese terms and concepts will be explored further in Chapter [12](#459488_1_En_12_Chapter.xhtml)\
    \ and subsequent chapters of this book.\n\nOne other point to know from the start\
    \ is that the reactive programming paradigm is often referred to as *Rx*.\n\n\
    With those basics, you now know enough to get started with RxSwift. You will need\
    \ the following:\n\n* A Mac running Xcode 9 or later. Xcode 9 is the integrated\
    \ development environment (IDE) for developing apps on iOS and macOS. It also\
    \ is the tool that Apple engineers use to build iOS and macOS themselves. Xcode\
    \ is a free download from the Mac App Store. Check the system requirements for\
    \ Xcode: those are the requirements you’ll need to work with RxSwift.\n* An Internet\
    \ connection so that you can log on to GitHub. If you don’t have one, you can\
    \ do the download from GitHub onto a portable computer or drive and then copy\
    \ the downloaded files onto your Mac."
