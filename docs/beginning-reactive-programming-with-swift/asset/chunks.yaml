- fmt: '# Download the Facebook SDK for Swift


    Log in to your developer account on `developers.facebook.com`. You’ll see choices
    to download the Facebook SDK for iOS, Android, and PHP, as well as for other platforms.
    As of this writing, the basic iOS SDK is still written in Objective-C, but you
    can download the Swift version if you want (you’ll see how to do that in this
    section).


    The Swift version of the iOS SDK is under documentation. Once you’ve logged in,
    use the Docs menu item in the top navigation bar to get to the Documentation page,
    as shown in Figure [7-4](#459488_1_En_7_Chapter.xhtml#Fig4).


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig4_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Look in Documentation for the Facebook SDK for iOS/Swift


    You may have to scroll down, as you can see in Figure [7-5](#459488_1_En_7_Chapter.xhtml#Fig5),
    to find the Swift SDK.


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig5_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    The Facebook Swift SDK is available with all of the others


    Once you have located the “SDK for Swift” link, open it, as you can see in Figure
    [7-6](#459488_1_En_7_Chapter.xhtml#Fig6).


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig6_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Download the Facebook SDK for Swift


    The frameworks shown in Figure [7-6](#459488_1_En_7_Chapter.xhtml#Fig6) are the
    heart of the Facebook SDK for Swift. All frameworks for iOS were originally written
    in Objective-C. Today, some of the new frameworks are written in Swift, but when
    you build a Swift-based app, it is not a problem that some (or all) of the frameworks
    are written in Swift. Thus, when you download the SDK for Swift, you’ll wind up
    with frameworks that are often written in Objective-C, and that doesn’t matter.
    When you download the SDK for Swift, as shown in Figure [7-6](#459488_1_En_7_Chapter.xhtml#Fig6),
    some of the frameworks have enhancements specifically for Swift, so keep these
    files safe and just add them as needed to your app.


    The download link in Figure [7-6](#459488_1_En_7_Chapter.xhtml#Fig6) takes you
    to GitHub, as you can see in Figure [7-7](#459488_1_En_7_Chapter.xhtml#Fig7).
    You can download the source code as `.zip` or `tar.gz`.


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig7_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Download the latest Facebook SDK for Swift


    The files downloaded from GitHub will vary over time both in content and in name.
    The downloaded files at the time of this book’s writing look like Figure [7-8](#459488_1_En_7_Chapter.xhtml#Fig8).


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig8_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Downloaded Facebook files from GitHub


    ## Adding Frameworks and Functionality to Your Facebook App


    You can work around the issue of what file is where by using CocoaPods, but if
    you prefer to work with the actual files themselves, one technique that works
    for many people on many projects is to look for a sample file or app. In this
    case, there’s a `Samples` folder containing a SwiftCatalog app. Many times (but
    not always!) the sample app will be updated for any given project before the documentation
    is updated. If that is the case, build the app. If you look at the project navigator,
    as you can see in Figure [7-9](#459488_1_En_7_Chapter.xhtml#Fig9), you’ll note
    intermediate files such as the frameworks are all built in the sample app.


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig9_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Build a sample to get frameworks


    If you drag the needed frameworks into your own app, Xcode will put them in the
    right place in your project.


    You can add new frameworks and functionality to your Facebook app either at the
    beginning or at any time as you work with the app. The My Apps menu in the navigator
    at the top of the screen (seen in Figure [7-10](#459488_1_En_7_Chapter.xhtml#Fig10))
    lets you both add and reconfigure your app’s components.


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig10_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Add and modify your Facebook app frameworks and features


    From your app dashboard (Figure [7-10](#459488_1_En_7_Chapter.xhtml#Fig10)) you
    can choose new products (features), as shown in Figure [7-11](#459488_1_En_7_Chapter.xhtml#Fig11).
    This display shows you available products and links to specific documentation
    so you can decide what you want to work on.


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig11_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Add products to your Facebook app'
