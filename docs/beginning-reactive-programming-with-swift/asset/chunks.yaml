    In the next chapter, you’ll see how to log in and begin to integrate AWS with
    an app.


    # 9. Managing AWS Logins


    In Chapter [8](#459488_1_En_8_Chapter.xhtml), you saw the wide variety of services
    that AWS offers (refer to Figure [8-3](#459488_1_En_8_Chapter.xhtml#Fig3) for
    a list of products). When you use products that touch so many aspects of an app
    and parts of users’ lives, security is critical. (This applies to your own apps,
    Apple’s apps and frameworks, and third-party products such as AWS.)


    Logging in to AWS is designed to be a secure process that compartmentalizes the
    different parts of AWS as well as the different parts of your apps. This is done
    with the login structure outlined in the first part of this chapter.


    Later in the chapter, you’ll find more details on how to integrate AWS into an
    app with Xcode. Because everyone works through AWS in their own way, you’ll encounter
    many options and features that will matter to you and others that you can put
    aside for later (or never). You may want to refer back to the following items,
    found in the various menus, that may be important as you start to integrate AWS
    into an app:


    *   Login (Figure [9-2](#459488_1_En_9_Chapter.xhtml#Fig2))


    *   Mobile Hub (Figure [9-9](#459488_1_En_9_Chapter.xhtml#Fig9))'
  trans: '

    # 探索 AWS


    在考虑了共享计算和共享数据的问题之后，现在是时候对 AWS 进行一个高级概览了。本节将提供这一概览。在下一章“在 Cocoa 中管理 AWS”中，你将更深入地了解
    AWS 以及如何将其与你的应用集成。请记住，AWS 是一个非常丰富的工具集，其内容远非这几章所能涵盖。这里的目的是让你了解有哪些可用服务，以便你至少能够决定是否要为你的项目进一步深入探索
    AWS。


    ### 注意


    AWS 是一种基于 Web 的技术，这同样适用于其网站和技术。本章中你看到的截图和执行的步骤可能会有所不同；但总体流程可能是一致的。可以合理地假设，本章中介绍的部分
    AWS 组件可能会得到增强，可能会新增一些组件，也可能会有一些被弃用。


    ### AWS 入门


    起点是 `aws.amazon.com`，如图 8-1 所示（随着时间的推移可能会有所调整）。


    ![../images/459488_1_En_8_Chapter/459488_1_En_8_Fig1_HTML.jpg](img/459488_1_En_8_Fig1_HTML.jpg)


    图 8-1


    开始使用 AWS


    作为开发者，你通过使用右上角的按钮在控制台中进行与 AWS 的交互。在整个 AWS 网站中，你还会找到其他指向控制台的链接。你可以不登录控制台就浏览网站，但要实际进行操作，你需要一个账户。你将在第
    10 章“管理 AWS 登录”中了解如何设置你的账户。


    现在，请探索左上角的菜单，如图 8-2 所示。


    ![../images/459488_1_En_8_Chapter/459488_1_En_8_Fig2_HTML.jpg](img/459488_1_En_8_Fig2_HTML.jpg)


    图 8-2


    浏览 AWS 上的开发者资源


    图 8-2 提供了可供开发者使用的资源的高级概览。即使 AWS 发生变化，`Developers` 菜单也基本保持不变。


    `Products` 菜单，如图 8-3 所示，会随着 AWS 添加更多产品和功能而发生变化。浏览此菜单以了解可以集成到你应用中的工具和产品是值得的。


    ![../images/459488_1_En_8_Chapter/459488_1_En_8_Fig3_HTML.jpg](img/459488_1_En_8_Fig3_HTML.jpg)


    图 8-3


    AWS 产品


    ### 比较用于数据管理的 Cocoa 和 AWS 产品


    你可以使用这些 AWS 产品构建一个完整的应用（这当然就是 AWS 的理念）。唯一缺失的就是用户界面。你可以使用基于 Web 的工具（如 HTML5）来提供界面。然而，对于最强大、最灵活的界面，我们更倾向于使用
    `Cocoa` 和 `Cocoa Touch` 这些工具。


    如果你查看产品列表，你会发现它们是应用后端的基石。在 `Cocoa` 和 AWS 之间最常见的集成形式之一是数据管理，这也是本书这一部分探讨的主题。`Cocoa`
    中可用的数据管理工具主要面向个人，因此共享数据管理需要（至少在现阶段）使用 `Cocoa` 之外的工具来实现。


    `SQLite` 已内置于 `Cocoa` 中，但它是一个个人数据管理库；它不管理数据共享。`iCloud` 是苹果处理数据共享的技术，但它主要侧重于在同一个
    `AppleID` 内进行共享。（`CloudKit` 确实提供了一些更广泛的数据共享功能。）


    `Core Data` 是 `Cocoa` 中一个强大的数据持久化工具。它不是一个数据管理器；相反，它被设计为任何符合 `Core Data` 结构的数据管理工具的前端。多年来，在苹果产品的各种形态中，多种数据管理工具已经与
    `Core Data` 集成。


    ## 总结


    本章介绍了 Amazon Web Services (`AWS`) 的高级视图，以及其工具如何与 `Cocoa` 配合使用。`AWS` 可用于构建整个应用，但通常
    `AWS` 提供后端，而 `Cocoa` 提供前端界面和功能。


    在下一章中，你将了解如何登录并开始将 `AWS` 与一个应用集成。


    # 9. 管理 AWS 登录


    在第 8 章中，你了解了 `AWS` 提供的各种服务（参见图 8-3 的产品列表）。当使用那些触及应用诸多方面以及用户生活细节的产品时，安全性至关重要。（这同样适用于你自己的应用、苹果的应用和框架，以及像
    `AWS` 这样的第三方产品。）


    登录 `AWS` 被设计成一个安全的过程，它将对 `AWS` 的不同部分以及你应用的不同部分进行隔离。这是通过本章第一部分概述的登录结构来实现的。


    在本章后面的部分，你将找到关于如何使用 `Xcode` 将 `AWS` 集成到应用中的更多细节。由于每个人使用 `AWS` 的方式各不相同，你会遇到许多对你来说重要的选项和功能，而其他一些则可以暂时（或永远）搁置。在开始将
    `AWS` 集成到应用时，你可能需要回顾以下在各菜单中找到的项目，它们可能很重要：


    * 登录（图 9-2）

    * Mobile Hub（图 9-9）

