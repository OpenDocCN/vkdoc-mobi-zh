  trans: '

    ### 提示


    无论是否显示标记，你都可以在 Playground 中添加代码。


    在 Playground 窗口底部，你可以看到*调试区*，它会显示 Playground 的输出。（如果看不到，请选择“显示” ➤ “调试区” ➤ “显示调试区”。）在你输入时，Playground
    会追踪你的按键以识别错误。在图 11-10 中，你可以看到输入时可能出现的错误消息。这类错误消息会随着你的输入和 Playground 分析代码（及可能的错误）而出现和消失。


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig10_HTML.jpg](img/459488_1_En_11_Fig10_HTML.jpg)


    图 11-10


    Playground 会监视错误


    你可以尝试添加更多代码，如图 11-11 所示。


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig12_HTML.jpg](img/459488_1_En_11_Fig12_HTML.jpg)


    图 11-12


    用你自己的代码探索 Playground


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig11_HTML.jpg](img/459488_1_En_11_Fig11_HTML.jpg)


    图 11-11


    Playground 可以快速捕获错误


    如果你移除所有添加的代码，应该会回到原始的 Playground，如图 11-13 所示。


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig13_HTML.jpg](img/459488_1_En_11_Fig13_HTML.jpg)


    图 11-13


    恢复为原始的 Playground


    ## 总结


    现在，你已经成功在 Xcode 中安装了 RxSwift。你可以从 Playground 或应用中的常规 Swift 代码中引用它。当你想将 RxSwift
    添加到另一个 Playground 或 Xcode 项目时，只需按照你在这里看到的相同步骤操作即可。


    你将在本书后面看到它的实际应用，但首先，是时候了解 RxSwift 背后的运行机制了。


    # 12. 响应式思考


    本章将帮助你理解响应式编程的概念，并将其置于其他编程风格、模式和范式的背景中。用最简单的非专业术语描述，响应式编程是一种编程方式，它使得轻松处理现代软件项目和应用程序成为可能，这些项目和应用通常涉及多个用户同时处理相同的数据。


    半个世纪前，人们可以按照“Hello World”（许多人在课堂上学习的第一程序）的风格来思考编程。在“Hello World”中，你键入几行代码（一到三行，取决于格式），然后程序显示或打印文本“Hello
    World”。


    更复杂的此类程序允许用户通过键入一个单词或短语来与“Hello World”程序交互，程序会对此进行处理。因此，一个复杂版本“Hello World”的交互记录可能如下所示：


    ```

    早上好。你叫什么名字？

    Jesse

    早上好，Jesse

    ```


    该程序的复杂之处不仅在于用户可以与它交互，还在于程序可以判断是向用户问候“早上好”还是“下午好”。


    如今，我们面对的是更加复杂的系统，这些系统涉及多个用户，他们期望能够实时更新，以便看到并参与朋友和同事的活动。当我们认为“早上好”（而非“下午好”）就很不错时使用的那些工具，在处理这些更复杂的系统时已显得力不从心。


    本章将概述我们今天需要使用的工具（特别是 RxSwift 中涉及的工具），以及用于描述这些工具和我们正在创建的产品的术语。


    ## 我们在开发什么？


    在计算机发展的早期，给计算机的指令被称为*程序*。程序组通常被组合成*系统*，在这些系统中，个别程序有时会相互交互，而在其他情况下，它们会处理与程序中涉及的数据相关的问题。


    最早的程序由计算机操作员和调度员运行。在 20 世纪 70 年代，随着分时系统和网络的普及，一台大型主机可以同时运行多个程序。在这种环境下，程序的运行权下放给了用户，他们开始使用*应用程序*，这些程序设计为无需调度员和程序员的技术帮助即可运行。（早期应用程序的例子包括
    VisiCalc 等电子表格软件以及第一批文字处理程序。）


    为普通用户而非计算机专家设计的应用程序逐渐被称为*应用*，以区别于运行计算机本身的程序，后者通常被称为*系统程序*。


    随着智能手机的出现，应用程序的名称进一步简化：*App*。在一段短暂的时间内，一些人试图区分应用程序（用于个人电脑）和 App（用于移动设备），但这种区分从未流行起来（幸运的是！）。


    ### 提示


    关于早期程序的更多信息，请参阅由 Richard L. Wexelblat 编辑、Academic Press 出版的《编程语言历史》（ISBN 978-0127450407），该书涵盖了截至
    1980 年（即 C 语言之前）的编程语言。第二卷《编程语言历史 II》由 Thomas J. Bergin 和 Richard G. Gibson 编辑，由
    Addison-Wesley Professional 出版（ISBN 978-0201895025）。该书涵盖了 1980 年之后的编程语言，包括 C、Smalltalk、ALGOL
    和 C++。


    如今，我们看到应用程序的功能正以新的方式打包，例如 Cocoa 和 Cocoa Touch 中的扩展。技术和用户界面正在迅速发展，但在本书中，开发的最终产品通常被称为
    app 或程序，即使它可能是一个扩展。


    创建 app 或程序的过程被称为*编码*（源自计算机早期，现在重新流行的原始术语）或*编程*。*开发*这个术语通常用于描述创建 app 或程序及其文档、推广或营销材料、培训及维护工具的全过程。


    ## 编程方法


    如今，有多种相互重叠的方式来描述和分类开发活动。本节将为你快速概述一些与 RxSwift 相关的关键概念和术语。你可以利用许多书籍和其他资源进行进一步研究。现在重要的是，你需要了解并使用这些概念。'
- fmt: "### Tip\n\nWikipedia is a great resource for more information on these topics\
    \ because its community of updaters has a lot of members of the technology world\
    \ who make it their business to keep the articles current.\n\nThe reasons for\
    \ such a variety of frequently overlapping terminologies and concepts are beyond\
    \ the scope of this book. Suffice it to say that a combination of fast-moving\
    \ development projects along with the need to provide detailed technical descriptions\
    \ and marketing promotions of tools as well as end products have helped to provide\
    \ what sometimes seems like an endless smorgasbord of jargon.\n\nThe terms and\
    \ concepts can be divided into three groups, each of which is described more fully\
    \ later in this chapter:\n\n- **Programming paradigms** describe programming languages.\
    \ When a user runs a program or app, it is unlikely that he or she will know what\
    \ programming language it is written with, much less which paradigm(s) in that\
    \ language are used. A specific language may use several programming paradigms.\n\
    - **Design patterns** are ways in which recurring tasks needed in object-oriented\
    \ programming can be implemented. They may be visible to the user in the performance\
    \ of the app, but they also may be strictly internal. Because they are designed\
    \ to be used in object-oriented programming, they can be implemented in any language\
    \ that supports the object-oriented paradigm. A given app or program may use multiple\
    \ design patterns (or none at all).\n- **Processing configurations** are the ways\
    \ in which computers and their major components, such as processors and memory,\
    \ are organized and connected. Although processing configurations are determined\
    \ by the hardware on which an app runs, operating systems often provide features\
    \ that minimize the differences so that a single configuration may at different\
    \ times behave in different ways. (Look at the `Grand Central Dispatch` documentation\
    \ in Cocoa and Cocoa Touch for an example of how this can work.)\n\n### Programming\
    \ Paradigms\n\nThe main programming paradigms that matter to you if you are going\
    \ to use `RxSwift` (and many other modern tools) are three that describe the program’s\
    \ structure and another three that describe how a program or app operates. (These\
    \ are just the most common programming paradigms that are important for you in\
    \ the `RxSwift` context.)\n\n#### Structural Paradigms\n\nThe issue of programming\
    \ paradigms began to be discussed in the late 1950s and 1960s when most of today’s\
    \ most commonly used languages were developed. It was necessary to describe them,\
    \ and so these paradigms were identified and named. The main structural paradigms\
    \ were reactions to the spaghetti-code programs that were frequently written.\
    \ These programs consisted of line after line of code in one continuous program.\
    \ Control could be transferred from one line to another because most lines were\
    \ identified with a name or number. The term *spaghetti-code* was used to refer\
    \ to the jumble of lines of code that were executed in complex and often unpredictable\
    \ sequences.\n\nTo get rid of the spaghetti-code issues, these three concepts\
    \ evolved:\n\n- **Structured programming** uses subprograms (logical collections\
    \ of statements) to provide a structure for the program. Depending on the language,\
    \ these subprograms are called methods, functions, or procedures. When control\
    \ is transferred, it is transferred from one subprogram to another rather than\
    \ to a specific line of code.\n- **Procedural** programming uses subprograms.\
    \ They often take input data in the form of *parameters* and may return result\
    \ values. At run time, the parameters of a subprogram are replaced by actual values—*arguments*.\n\
    - **Object-oriented (OOP)** programming lets you describe objects that can encapsulate\
    \ both data and functionality (or both or neither). Objects can contain subprograms\
    \ such as functions or methods. Often, objects correspond to real-world concepts\
    \ such as a customer, a place, or an idea.\n\n#### Operational Paradigms\n\nThese\
    \ paradigms describe how the commands are written.\n\n- **Imperative** programs\
    \ consist of instructions to the computer to carry out specific tasks in a specific\
    \ order. *Conditional statements* such as `if` let you modify that order, but\
    \ the essence of imperative programs is the imperative instructions. (This term\
    \ is used in the same way that it is used in language.) Tools such as `Reactive\
    \ Extensions` (`ReactiveX`) help imperative languages work with sequences of data\
    \ that may be either synchronous or asynchronous, thus somewhat bridging the distinctions\
    \ between the two techniques.\n- **Declarative** programs declare what the results\
    \ of operations should be. Whereas imperative programs specify what is done as\
    \ well as how it should be done, declarative program paradigms specify only what\
    \ is done: the program or operating system is tasked with doing it in the most\
    \ appropriate manner. Declarative programming languages include instructions designed\
    \ to make it clear what these end results should be.\n- **Functional** programs\
    \ are a subset of declarative programs. They require that the program components\
    \ be the sole determinants of the results of an operation such as a procedure\
    \ or function. In other words, global variables and environmental settings are\
    \ not used within the functions of a functional programming paradigm.\n\nYou can\
    \ find a comparison of common programming paradigms on Wikipedia: [`https://en.wikipedia.org/wiki/Comparison_of_programming_paradigms`](https://en.wikipedia.org/wiki/Comparison_of_programming_paradigms).\n\
    \n### Design Patterns\n\nDesign patterns are patterns or routines that can be\
    \ used in similar situations. You can find them in many places, including a pattern\
    \ in a house for how doors and locks are configured as well as in software. When\
    \ used in the context that includes `RxSwift`, the term refers to a book that\
    \ was published in 1994 and refers to design patterns in object-oriented software.\n\
    \n### Tip\n\n*Design Patterns: Elements of Reusable Object-Oriented Software*\
    \ by Erich Gamma, Richard Helm, Ralph Johnson, and John Vlissides with a foreword\
    \ by Grady Booch is published by Addison-Wesley Professional (ISBN-13 978-0201633610).\
    \ The authors are often referred to as *the gang of four*.\n\nThe design patterns\
    \ are divided into three categories:\n\n- **Creational** design patterns are used\
    \ to create objects.\n- **Structural** design patterns are used for purposes such\
    \ as connecting two objects.\n- **Behavioral** design patterns are used to manage\
    \ behavior and processing. `ReactiveX` uses the iterator and observer design patterns:\n\
    \    - **Iterator**. This pattern lets you traverse some structure to get the\
    \ next element (the pattern lets you specify what the sequence is).\n    - **Observer**.\
    \ With this pattern, you define a one-to-many relationship between an observer\
    \ (one) and observed elements (many or none). It is a key feature that the observed\
    \ element(s) doesn’t know anything about the observer. An observed element *publishes*\
    \ a change, and any observers receive a notification, but the observed element\
    \ doesn’t need to directly notify any observers."
