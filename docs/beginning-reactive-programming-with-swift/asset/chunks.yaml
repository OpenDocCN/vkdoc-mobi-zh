- fmt: '# Enhancing Your App


    If you have followed along with this chapter, you have produced the app shown
    previously in Figure [7-3](#459488_1_En_7_Chapter.xhtml#Fig3). It runs and displays
    its storyboard, which happens to be blank. In order to move forward, it makes
    sense to add something to your storyboard.


    Go to `main.storyboard` in your app and add a label to it, as you can see in Figure
    [7-12](#459488_1_En_7_Chapter.xhtml#Fig12).


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig12_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    Add a label to your app


    Next, add a Facebook login button to your app. If you have followed the sequence
    shown previously in which you built the `SwitchUserSample` example, you have the
    Facebook Login framework in that app and you can drag it into your new app. Alternatively,
    add Facebook Login from the products shown in Figure [7-11](#459488_1_En_7_Chapter.xhtml#Fig11)
    by modifying one of your apps (shown in My Apps in Figure [7-10](#459488_1_En_7_Chapter.xhtml#Fig10)).


    Once Facebook Login is added to your app, the code to add the button is simple.
    Add it to the `viewDidLoad` method of your app. (If it’s built on the `SingleViewController`
    template as described in this chapter, the app has one view controller called
    `ViewController`.)


    The code is shown in Figure [7-13](#459488_1_En_7_Chapter.xhtml#Fig13) and in
    Listing [7-1](#459488_1_En_7_Chapter.xhtml#Par32).


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig13_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    Add the Facebook login button code to `viewDidLoad`


    ### Note


    The basic `viewDidLoad` method with a stub is already part of the `SingleViewApp`
    template.


    ```

    import UIKit

    import FBSDKLoginKit

    class ViewController: UIViewController {

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view,

    // typically from a nib.

    let loginButton = FBSDKLoginButton()

    loginButton.center = view.center

    view.addSubview(loginButton)

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    // Dispose of any resources that can be recreated.

    }

    }

    Listing 7-1

    Add the Facebook Login Button

    ```


    Rebuild your app (clean the build files first to make certain that you don’t have
    some experiments lying around). Now, when you run it, you should see your label
    and the button, as shown in Figure [7-14](#459488_1_En_7_Chapter.xhtml#Fig14).


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig14_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig14_HTML.jpg)


    Figure 7-14


    Try your app with the label and login button


    Remember that you didn’t just add the image of a button: you added the functionality
    of the login button, so when you run your app you’ll be asked for permission,
    as you can see in Figure [7-15](#459488_1_En_7_Chapter.xhtml#Fig15).


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig15_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig15_HTML.jpg)


    Figure 7-15


    Test Facebook login integration


    The login button should work now. Try it, as shown in Figure [7-16](#459488_1_En_7_Chapter.xhtml#Fig16).


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig16_HTML.jpg](images/459488_1_En_7_Chapter/459488_1_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Test the Facebook login button


    You can also test with your own Facebook account. In addition, you can search
    `developers.facebook.com` to get test accounts you can use so that you don’t create
    fake accounts or interfere with your own account.


    ### Note


    Some developers test logging in with their own account but use the Facebook test
    accounts for adding information.


    ## Summary


    This has been an overview of integrating Facebook and iOS. The details may change
    from time to time, but the overview remains basically the same. And, in fact,
    it’s the same for all components of Facebook and other frameworks that you may
    want to integrate with your app.


    # Part IV: Storing Data in Amazon Web Services


    # 8. Working with Amazon Web Services and Cocoa


    In Parts III – V of this book you see how to put third-party components together
    with Cocoa and its frameworks. These components can be concepts, standards, or
    open source tools such as JSON, or they can be specific tools, such as the login
    using Facebook that is described in Part III.


    In this part, a more general tool will be introduced: Amazon Web Services. (Coming
    up in Part V is `RxSwift`.) You will see an overview of how to create an AWS account
    for your app to use, install the appropriate downloads from AWS, and provide integration
    with your app. The focus of AWS integration is data management, but you can use
    AWS for other purposes as well.


    ## Comparing Components


    `JSON` is a tool for reading and writing structured text in a simple way. It is
    so common these days that many languages, frameworks, and environments (including
    Cocoa and Cocoa Touch) support the use of `JSON` for both reading and writing.


    The Facebook Login tool (described in Part III) differs from `JSON` in that it
    is designed for a single simple purpose: checking someone’s credentials. Rather
    than the tight integration that `JSON` has with Cocoa and Cocoa Touch, Facebook
    Login has no integration from the Cocoa or Cocoa Touch side: You simply add some
    methods, classes, or frameworks from Facebook to your app, and then a Facebook-provided
    class goes off to check the credentials and pass back a yes or no for access.
    (This is a simplification of the process.)


    Amazon Web Services (AWS) is a different type of tool with a different type of
    integration. It is not explicitly integrated with Cocoa and Cocoa Touch. AWS functionalities
    are critical to most apps, and they are provided in a number of different ways.
    They can be provided with code that you write for your app; code found in one
    of the many frameworks or libraries available on GitHub and elsewhere; or code
    and frameworks that are part of Cocoa and Cocoa Touch. AWS becomes the data manager
    for your app, and you interact with it constantly as your app runs (depending,
    of course, on the specific design of your app).


    ### Note


    For the remainder of this chapter, unless a distinction needs to be made, *Cocoa*
    is used to refer to both Cocoa and Cocoa Touch.


    ## Using AWS with Cocoa


    As noted, there are many ways in which you can integrate AWS with Cocoa and Cocoa
    Touch. In the simplest way, you use AWS (more specifically, one or more components
    of AWS) just as you would use the Facebook Login tool or even as you would use
    an open source tool, framework, or standard like `JSON`. In those cases, think
    about an iOS or macOS app that incorporates AWS.


    At the other extreme, you can use AWS (more specifically, one, more, or many components)
    as the heart of your app.


    In both of these scenarios, the user interface is envisioned as being built with
    Cocoa or Cocoa Touch. The question is, where does the implementation of the basic
    functionality of the app take place—is it in AWS or is it in Cocoa?


    ### Note


    It is possible to place some of your app’s functionality on the Cocoa side of
    things and other parts of the functionality in AWS. Depending on your environment,
    it may be advisable to consolidate the functionality on one side or the other,
    but that is a personal observation and not a suggestion.


    The overview found in this chapter may help you consider the possibilities for
    your app. Four points are worth considering:


    *   Sharing data with others

    *   Using data across platforms

    *   Playing to your strengths

    *   Playing to your users’ expectations


    Each of these points will be discussed in the following sections.'
