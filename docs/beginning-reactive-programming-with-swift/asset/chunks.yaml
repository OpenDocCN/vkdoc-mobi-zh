  trans: "\n### 与他人共享数据\n\n当您与他人讨论应用时，人们通常会想到在手机上输入数据，并让其他人（或用户本人在其他时间）在另一台设备上查看和修改这些数据——甚至可能是在位于地球另一端桌面上的个人电脑上操作。\n\
    \n这个我们都很熟悉的常见场景实现起来却颇为复杂。通常，数据需要存储在某个位置，而这个\"某处\"不能仅仅局限于原始手机，因为当手机超出范围甚至关机时，数据仍需能被他人看到。\n\
    \n存储这些持久化数据最常见的方式之一，是使用基于云的服务，例如 `AWS`、`Box`、`Azure`、`Dropbox` 或 `FileMaker`（版本\
    \ 17 或更高）。您也可以使用网页（尤其是通过 HTML5）来存储数据，但必须将其存放在可达的位置。\n\n### 跨平台使用数据\n\n存储需要共享的数据有多种方法。从事过各类数据项目的人普遍认为，改变数据管理策略并非易事，而且随着数据量的增加（就像老系统的情况一样），管理会变得更加复杂。人们常常忽略了他们对数据自动处理的\"\
    魔法\"期待。\n\n除了那些不存储任何数据（并且永远不存储）的项目之外，思考如何共享数据是值得的。以下是关于如何处理数据管理问题的一些基本考虑因素和建议。为将来才会实施的数据管理策略做规划，远好过听天由命（或依赖\"\
    魔法\"）。换句话说，你不必一开始就实施，但至少要有一个未来管理数据的计划，即使这个计划只是将来再重新审视这个问题。确保这是对数据管理理念的\"再次审视\"\
    ，而非\"初次接触\"。\n\n### 备注\n\n本节重点讨论数据，但如今也可以将应用的部分或全部处理过程迁移到云端。事实上，在许多情况下，数据和处理之间的界限很难界定，因为两者往往可以相互转换。\n\
    \n基本的数据场景及可能的解决方案如下：\n\n- **无数据**。不存储任何数据，且永远不会存储。\n\n- **单用户/单设备**。数据仅为单个用户和单个设备存储。这通常是临时数据的特殊情况。例如，一个能记住上次计算总数的计算器应用（就像普通计算器那样）。你可以使用\
    \ Cocoa 的 `UserDefaults.standard` 在设备上存储相对少量的数据。\n\n  \"相对少量\"这个标准随时间推移已有所增加，但\
    \ Apple 文档指出这取决于设备本身。这很合理，因为设备存储空间会越来越大。网络讨论中曾出现存储量达到 4 GB 的案例。\n\n  这些数据可能会随设备的常规备份一起备份（如果用户开启了备份功能）。\n\
    \n- **单用户/多台 iOS 设备**。此场景使用用户的 Apple ID 和 iCloud 实现最为简便。可用空间大小受限于用户订阅的 iCloud\
    \ 数据套餐以及已存储的其他数据量。\n\n  作为 iCloud 服务的一部分，iCloud 数据会自动备份。然而，如果其中一台设备无法连接，其数据可能无法及时上传到\
    \ iCloud，并且除非应用妥善处理了 iCloud 冲突（例如由用户解决冲突），否则数据可能并非您和用户所预期的内容。\n\n- **多用户/多台 iOS\
    \ 设备**。`CloudKit` 是处理这种情况的理想工具。由于它依赖于 iCloud，备份会自动完成。\n\n- **多用户/多台设备（或仅拥有非 iOS\
    \ 设备的单用户）**。这种情况通常最适合使用按需云服务，例如 `AWS`、`Box`、`Dropbox`、`Google Drive`、`OneDrive`\
    \ 或类似服务。备份属于服务的一部分。\n\n  并非所有应用都需要按需存储，但这是此处提到的大多数服务都具备的功能。\n\n### 发挥自身优势\n\n\
    有了基于云计算和数据的能力，您可以选择各自的存放位置。上一节中给出了一些关于数据的建议，但对于任何项目，明智的做法不仅是基于技术层面做出选择，还要考虑您开发团队的技能和优势——无论团队是有\
    \ 50 人还是只有您自己。\n\n### 迎合用户期望\n\n谈到用户对共享数据的期望，用\"过度使用\"来形容不切实际的期望并不为过。但还有另一种同样危险的期望：期望共享数据能够采用大型机时代（有时甚至是穿孔卡片时代）最新、最棒的技术来构建和共享。数据结构的生命周期非常长。部分原因是所谓的\"\
    既有基础的拖累\"——即尽管时代和能力已变，仍需维持系统运行。\n\n使用诸如 `AWS` 之类的共享数据工具的一个好处是，您和您的用户可能会面对对所有人而言都很陌生的技术和界面。"
- fmt: '# Exploring AWS


    After considering the issues of shared computing and shared data, it is time for
    a high-level overview of AWS. This section will provide that overview. In the
    next chapter, “Managing AWS in Cocoa,” you’ll drill down a bit more into AWS and
    how to integrate it with your apps. Remember that AWS is a very rich set of tools
    and that there is much more to find out than can fit in these chapters. The goal
    here is to give you an idea of what is available so you can at least make the
    decision of whether or not to delve further into AWS for your project.


    ### Note


    AWS is a web-based technology, and that applies to its website as well as its
    technology. The screenshots you will see and the steps you will take in this chapter
    may differ; however, the general process will probably be the same. It’s fair
    to assume that some of the AWS components illustrated in this chapter may be enhanced,
    new ones may be added, and some may be deprecated.


    ### Getting Started with AWS


    The place to start is `aws.amazon.com`, as you can see (subject to modifications
    over time) in Figure [8-1](#459488_1_En_8_Chapter.xhtml#Fig1).


    ![../images/459488_1_En_8_Chapter/459488_1_En_8_Fig1_HTML.jpg](images/459488_1_En_8_Chapter/459488_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Begin to work with AWS


    As a developer, your interactions with AWS are done through the console using
    the button at the top right. You’ll find other links to the console throughout
    the AWS site. You are able to browse the site without logging in to the console,
    but to actually do anything, you will need an account. You’ll see how to set up
    your account in Chapter [10](#459488_1_En_10_Chapter.xhtml), “Managing AWS Logins.”


    For now, explore the menu at the top left, as shown in Figure [8-2](#459488_1_En_8_Chapter.xhtml#Fig2).


    ![../images/459488_1_En_8_Chapter/459488_1_En_8_Fig2_HTML.jpg](images/459488_1_En_8_Chapter/459488_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Browse developer resources on AWS


    Figure [8-2](#459488_1_En_8_Chapter.xhtml#Fig2) gives you a high-level overview
    of resources available for developers. The `Developers` menu remains pretty constant
    even as AWS changes.


    The `Products` menu, shown in Figure [8-3](#459488_1_En_8_Chapter.xhtml#Fig3),
    changes as AWS adds more products and features. It’s worth exploring this menu
    to see the tools and products that you can integrate into your app.


    ![../images/459488_1_En_8_Chapter/459488_1_En_8_Fig3_HTML.jpg](images/459488_1_En_8_Chapter/459488_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    AWS products


    ### Comparing Cocoa and AWS Products for Data Management


    You can build a complete app from these AWS products (that’s the idea of AWS of
    course). The only thing that’s missing is the user interface. You can provide
    that with web-based tools like HTML5. However, for the most powerful and flexible
    interface, `Cocoa` and `Cocoa Touch` are the tools we prefer.


    If you look at the list of products, you’ll see that they are basic building blocks
    for the back end of apps. One of the most common forms of integration between
    AWS and `Cocoa` is data management, which is the topic explored in this part of
    the book. The tools available for data management in `Cocoa` are focused on individuals,
    so shared data management needs to be implemented (at least at this point) with
    tools found outside of `Cocoa`.


    `SQLite` is built into `Cocoa`, but it is a personal data-management library;
    it doesn’t manage sharing. `iCloud` is the Apple technology that handles data
    sharing, but that is primarily focused on sharing within one `AppleID`. (`CloudKit`
    does provide some broader data sharing.)


    `Core Data` is a powerful data-persistence tool that is part of `Cocoa`. It is
    not a data manager; rather, it was designed as a front end to any data-management
    tool that conforms to the `Core Data` structure. Over the years, a variety of
    data-management tools have been integrated with `Core Data` in various forms of
    Apple products.


    ## Summary


    This chapter has introduced a high-level view of Amazon Web Services (`AWS`) and
    how its tools can work with `Cocoa`. `AWS` can be used to build an entire app,
    but commonly `AWS` provides a back end and `Cocoa` provides the front-end interface
    and functionality.


    In the next chapter, you’ll see how to log in and begin to integrate `AWS` with
    an app.


    # 9. Managing AWS Logins


    In Chapter [8](#459488_1_En_8_Chapter.xhtml), you saw the wide variety of services
    that `AWS` offers (refer to Figure [8-3](#459488_1_En_8_Chapter.xhtml#Fig3) for
    a list of products). When you use products that touch so many aspects of an app
    and parts of users’ lives, security is critical. (This applies to your own apps,
    Apple’s apps and frameworks, and third-party products such as `AWS`.)


    Logging in to `AWS` is designed to be a secure process that compartmentalizes
    the different parts of `AWS` as well as the different parts of your apps. This
    is done with the login structure outlined in the first part of this chapter.


    Later in the chapter, you’ll find more details on how to integrate `AWS` into
    an app with `Xcode`. Because everyone works through `AWS` in their own way, you’ll
    encounter many options and features that will matter to you and others that you
    can put aside for later (or never). You may want to refer back to the following
    items, found in the various menus, that may be important as you start to integrate
    `AWS` into an app:


    * Login (Figure [9-2](#459488_1_En_9_Chapter.xhtml#Fig2))

    * Mobile Hub (Figure [9-9](#459488_1_En_9_Chapter.xhtml#Fig9))'
