    \n# 引言\n\n随着技术不断变迁，我们观察到基本模式会反复再现。从很多方面来看，真正需要学习的新东西并不多——不过是现有技术与概念的新变体与组合而已。（关于反复出现的模式，可参阅我的著作《用\
    \ Swift 学习计算机科学》。）\n\n一如既往，有许多人要感谢，他们为本书提供了帮助。最重要的是那些为这些技术做出贡献的人。谈到众多开源技术（包括 ReactiveX\
    \ 及其项目），有越来越多的人投入其中，这让所有人都能更轻松地使用它们。\n\n就近而言，Aaron Crabtree 对手稿提供了非常有益且细致的审阅意见。同样一如既往，Waterside\
    \ Productions 的 Carole Jelen 为本书的出版提供了重要支持。\n\n### 关于作者与技术审校\n\n### 关于作者\n\n###\
    \ 关于技术审校\n\n# 第一部分 用 Swift 构建复合型应用\n\n# 1. 构建模块：项目、工作区、扩展、委托与框架\n\n如今构建应用，核心并非编写代码。你可能在学校或速成训练营学过如何写代码，这些经历对于学习编程原理非常有价值。然而，当你开始第一份编程工作时，可能会发现，你的任务只是修正某个现有应用生成的报告中标题的拼写错误。这项简单工作可以拆分为两部分。\n\
    \n首先，找到拼写错误的位置（一个基础应用很容易就有数千行代码——`Windows` 据估计有 5000 万行）。在一行代码中找到拼写错误可能用不了多久，但首先找到那行代码需要多长时间？\n\
    \n其次，修正拼写错误。\n\n一个月后，当你完成了修改标题拼写错误的任务，你可能会发现自己实际上在构建一个应用。这项工作同样可以分解为几个组成部分。\n\n\
    首先，实现用户身份验证流程。你可以使用 `Facebook API` 或来自可信网络来源的开源代码来完成。你只需要找到代码或 API，然后将其集成到你的应用中。\n\
    \n其次，你需要实现认证完成后应用的核心功能。根据应用的具体情况，你可能需要从头编写，但更可能的情况是，你会在类似项目的现有代码基础上进行修改。\n\n第三，你可能需要将新应用移植到不同的平台。\n\
    \n如今的编码工作，常常涉及阅读、理解现有代码，然后将其复用到新的应用和新的组合中。是的，确实有大量从零开始的编码工作，但在开发领域，对现有代码的重用也同样普遍。\n\
    \n多种因素共同作用，创造并支撑了这样一个可重用和可改造代码的世界，而这背后凝聚了无数人无数小时的辛勤努力。重用分析与代码，与重用和回收自然资源同样重要。就代码而言，重用意味着不重复发明轮子。每次创建应用时，如果不必从零开始，整个软件开发世界就能向前迈进。\n\
    \n本章将概述这个可重用代码世界如何运作——尤其是从 iOS、tvOS、macOS 和 watchOS 的角度。你将了解可重用代码构建模块的概览，以及如何使用\
    \ `Xcode` 和 Apple 开发者标准工具包中的其他工具将它们组合在一起。本章分为三个部分：\n\n*   **组件架构概述**：让你了解如何从组件构建应用。\n\
    *   **iOS 与 macOS 构建模块概览**：提供这些模块的总体介绍。\n*   **用构建模块进行构建**：概述如何将它们组合起来。\n\n##\
    \ 组件架构概述\n\n自 20 世纪 40 年代计算机时代开始以来，就一直存在等待完成的项目积压。（随着互联网的兴起，也出现了相应的积压。）对软件的需求似乎永无止境。各种策略应运而生，而**组件**是其中许多策略的关键部分，无论是对于\
    \ Web 还是通用软件而言。\n\n其核心理念是，完全从零开始构建网站、程序和应用是一种不可持续的模式。必须找到某种方式来加速开发——通过重用已经编写并调试过的代码。但这个简单想法的问题在于，代码很难被轻松重用——总是需要修改。\n\
    \n为了加速开发进程而重用代码的一种方法是，提取现有代码的关键函数和特性。这些元素比整个代码库更容易重用。这就是组件化软件开发的起点。\n\n随着时间的推移，这些可重用提取物开始以两种不同的方式被使用：\n\
    \n*   **使用框架或外壳**：在这种模型中，有一个框架，你可以将组件插入其中。\n\n    框架模式在 20 世纪 90 年代非常流行；IBM 的\
    \ `SOM`（软件对象模型）是首批框架之一。微软通过 `OLE`（对象链接与嵌入）和 `COM`（组件对象模型）进入了组件软件领域。由 Apple、IBM\
    \ 和 WordPerfect 组成的联盟则致力于 `OpenDoc`。所有这些框架都允许你将专用组件插入其中（从用户角度看，大多数是你可以插入组件的文档）。\n\
    \n*   **用组件构建产品**：在这种模型中，你将多个可重用组件（现成的或为项目专门编写的）组合成单一产品。通常没有作为外壳的框架或容器；在某些项目中确实存在这样的顶层容器或外壳，但它可能是为每个项目专门创建的。\n\
    \n无论你采用哪种组件模型，一旦开始考虑组件，就会出现一个关键问题：你将使用什么语言？在当今世界，iOS（和 macOS）的语言是 `Swift` 和 `Objective-C`。然而，组件架构的一个特点是，在某些情况下你可以混合使用不同的语言，正如你将在本章稍后的“命令行集成”部分看到的那样。\n"
- fmt: '# Looking at the iOS and macOS Building Blocks


    The building blocks in this section are all built in the Swift and Objective-C
    languages for iOS and macOS, and with APIs such as `UIKit` for iOS and `AppKit`
    for macOS, as well as their companions. This section will provide a brief overview
    of the building blocks; for more information, look on `developer.apple.com`.


    ## Extensions


    Extensions in Swift let you add functionality to an existing class, structure,
    enumeration, or protocol type. You can find an example in the *Adopting Drag and
    Drop in a Custom View* sample code on `developer.apple.com`. The drag-and-drop
    functionality is defined in protocols (see the following section for more on protocols
    and delegates) and implemented in extensions.


    In Figure [1-1](#459488_1_En_1_Chapter.xhtml#Fig1), you can see an app that uses
    the code from the *Adopting Drag and Drop in a Custom View* sample. In this case,
    the basic class is a custom view controller (`PersonnelViewController`). There
    is an extension defined as follows:


    ```

    extension PersonnelViewController: UIDragInteractionDelegate {

    ```


    Each extension is in a file that references the base class (the class that is
    to be extended). As you can see in Figure [1-1](#459488_1_En_1_Chapter.xhtml#Fig1),
    the names of those files are


    ![../images/459488_1_En_1_Chapter/459488_1_En_1_Fig1_HTML.jpg](images/459488_1_En_1_Chapter/459488_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Using extensions in a Swift class


    ```

    PersonnelViewController+Drag

    PersonnelViewController+Drop

    ```


    At runtime, you can reference the functions and other members of the extension
    just as you would reference elements of the class.


    Extensions can be added to base classes and other structures for which you only
    have the API and not the source code.


    ## Delegates and Protocols


    Delegates and protocols work together. In the declaration of a class or other
    structure, you see the superclass (if any) in the declaration, as in the following
    declaration for a subclass of `UIDocument` in iOS:


    ```

    class MyDocument: UIDocument {

    ```


    A protocol can define functions that will be implemented in any class that conforms
    to the protocol. Whereas with an extension the extensions are added to the base
    class, with a protocol the protocol defines the code that *you* will add to the
    base class.


    Delegates often work together with protocols so that the implementation of the
    protocol code is not placed into the base class; rather, it is placed in a separate
    file called a *delegate*. The specific file that implements the protocol is typically
    assigned to a field called *delegate* in the base class.


    ## Frameworks


    If you work with iOS or macOS a lot, you are probably familiar with the basic
    frameworks, such as `AppKit` (macOS) and `UIKit` (iOS), along with smaller frameworks
    such as `AddressBook`. Frameworks can contain functions and properties. You add
    them to a Swift project with an `import` statement; with Objective-C, you can
    use an `#import` or `#include` statement. (In Objective-C, the `#import` directive
    imports the framework once; `#include` may import it several times.)


    # Building with the Building Blocks


    You can use delegates and protocols, extensions, and frameworks within an Xcode
    project. You can use a workspace to combine several projects, and you can use
    other tools to combine multiple components. Both workspaces and the combinations
    of building blocks will be described in this section.


    ## Using a Workspace


    With a workspace, Xcode takes care of managing the building of whichever target
    within the workspace you want to build. Targets may share elements from the workspace
    and will use them as needed to build various targets (such as for iOS and watchOS
    with the same workspace).


    ## Building with Combinations of Building Blocks


    The building blocks from Apple (frameworks, protocols, and delegates, as well
    as extensions) often provide a neat and elegant way to extend and expand your
    code. However, there are cases in which a single feature requires the use of multiple
    building blocks—for example, a feature might need one very big framework to be
    installed, along with a dozen or more smaller (but related) frameworks. Protocols
    and delegates are now commonplace in many structures, and extensions, likewise,
    may be added to the mix. Thus, implementing a new feature using shared code may
    require many additions to your code base.


    Situations in which multiple building blocks need to be added to an app are common,
    and they can be difficult to manage. There are several tools available to help
    you manage such combinations. These tools use a structure that organizes the changes
    to your app so that a script or other tool can apply the changes in the right
    places and in the right order. One of the most widely used of those tools is `CocoaPods`,
    which is the topic of Chapter [2](#459488_1_En_2_Chapter.xhtml).


    GitHub has become the most widely used code-sharing tool and site today, and it
    is integrated with most package managers. Thus, the download of the latest GitHub
    version of the complex building blocks is done for you automatically as you run
    the package manager.


    Package managers like `CocoaPods` use their own code and scripts to perform the
    integration. To do so, they—and you—must use some command-line code. If you are
    used to macOS and the Finder, you may not use the command line very often. Don’t
    worry—the products hide most of that syntax from you. However, for the cases in
    which you do need to access a file or folder from the command line, the following
    section will provide some tips.'
