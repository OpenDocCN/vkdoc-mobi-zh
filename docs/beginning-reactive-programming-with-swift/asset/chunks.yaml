    \ is transferred, it is transferred from one subprogram to another rather than\
    \ to a specific line of code.\n\n*   **Procedural** programming uses subprograms.\
    \ They often take input data in the form of *parameters* and may return result\
    \ values. At run time, the parameters of a subprogram are replaced by actual values—*arguments*.\n\
    \n*   **Object-oriented (OOP)** programming lets you describe objects that can\
    \ encapsulate both data and functionality (or both or neither). Objects can contain\
    \ subprograms such as functions or methods. Often, objects correspond to real-world\
    \ concepts such as a customer, a place, or an idea.\n\n#### Operational Paradigms\n\
    \nThese paradigms describe how the commands are written.\n\n*   **Imperative**\
    \ programs consist of instructions to the computer to carry out specific tasks\
    \ in a specific order. *Conditional statements* such as *if* let you modify that\
    \ order, but the essence of imperative programs is the imperative instructions.\
    \ (This term is used in the same way that it is used in language.) Tools such\
    \ as Reactive Extensions (ReactiveX) help imperative languages work with sequences\
    \ of data that may be either synchronous or asynchronous, thus somewhat bridging\
    \ the distinctions between the two techniques.\n\n*   **Declarative** programs\
    \ declare what the results of operations should be. Whereas imperative programs\
    \ specify what is done as well as how it should be done, declarative program paradigms\
    \ specify only what is done: the program or operating system is tasked with doing\
    \ it in the most appropriate manner. Declarative programming languages include\
    \ instructions designed to make it clear what these end results should be.\n\n\
    *   **Functional** programs are a subset of declarative programs. They require\
    \ that the program components be the sole determinants of the results of an operation\
    \ such as a procedure or function. In other words, global variables and environmental\
    \ settings are not used within the functions of a functional programming paradigm.\n\
    \nYou can find a comparison of common programming paradigms on Wikipedia: [`https://en.wikipedia.org/wiki/Comparison_of_programming_paradigms`](https://en.wikipedia.org/wiki/Comparison_of_programming_paradigms)\
    \ .\n\n### Design Patterns\n\nDesign patterns are patterns or routines that can\
    \ be used in similar situations. You can find them in many places, including a\
    \ pattern in a house for how doors and locks are configured as well as in software.\
    \ When used in the context that includes RxSwift, the term refers to a book that\
    \ was published in 1994 and refers to design patterns in object-oriented software.\n\
    \n### Tip\n\n*Design Patterns: Elements of Reusable Object-Oriented Software*\
    \ by Erich Gamma, Richard Helm, Ralph Johnson, and John Vlissides with a foreword\
    \ by Grady Booch is published by Addison-Wesley Professional (ISBN-13 978-0201633610).\
    \ The authors are often referred to as *the gang of four.*\n\nThe design patterns\
    \ are divided into three categories:\n\n*   **Creational** design patterns are\
    \ used to create objects.\n\n*   **Structural** design patterns are used for purposes\
    \ such as connecting two objects.\n\n*   **Behavioral** design patterns are used\
    \ to manage behavior and processing. ReactiveX uses the iterator and observer\
    \ design patterns:\n    *   **Iterator**. This pattern lets you traverse some\
    \ structure to get the next element (the pattern lets you specify what the sequence\
    \ is).\n\n    *   **Observer**. With this pattern, you define a one-to-many relationship\
    \ between an observer (one) and observed elements (many or none). It is a key\
    \ feature that the observed element(s) doesn’t know anything about the observer.\
    \ An observed element *publishes* a change, and any observers receive a notification,\
    \ but the observed element doesn’t need to directly notify any observers."
  trans: "\n### 提示\n\n维基百科是获取这些主题更多信息的绝佳资源，因为其更新者社区中拥有大量科技界成员，他们以保持文章时效性为己任。\n\n如此繁多且经常重叠的术语和概念，其成因已超出本书的讨论范围。简而言之，快速发展的开发项目，加上需要对工具和最终产品提供详细技术描述与市场营销推广，共同造就了这看起来永无止境的术语大杂烩。\n\
    \n这些术语和概念可分为三组，每组将在本章后续部分进行更详细的描述：\n\n- **编程范式**描述了编程语言。当用户运行一个程序或应用时，他或她不太可能知道它是用什么编程语言编写的，更不用说该语言使用了哪种（些）范式了。一种特定的语言可能使用多种编程范式。\n\
    - **设计模式**是在面向对象编程中实现重复性任务的可行方式。它们可能在应用性能上对用户可见，但也可能严格存在于内部。由于它们是为面向对象编程而设计的，因此可以在任何支持面向对象范式的语言中实现。一个给定的应用或程序可能使用多种设计模式（或完全不使用）。\n\
    - **处理配置**是计算机及其主要组件（如处理器和内存）被组织和连接的方式。尽管处理配置由应用运行的硬件决定，但操作系统通常提供能最小化差异的特性，使得同一配置在不同时间可能表现出不同行为。（可以查看\
    \ Cocoa 和 Cocoa Touch 中的 `Grand Central Dispatch` 文档，了解其工作原理的示例。）\n\n### 编程范式\n\
    \n如果你将要使用 `RxSwift`（以及许多其他现代工具），那么对你来说重要的主要编程范式有三类描述程序结构的，和另外三类描述程序或应用如何运行的。（这些只是在\
    \ `RxSwift` 背景下对你重要的最常见的编程范式。）\n\n#### 结构范式\n\n关于编程范式的讨论始于 20 世纪 50 年代末和 60 年代，当时当今最常用的语言大多被开发出来。由于有必要描述它们，于是这些范式被识别并命名。主要的结构范式是对当时经常编写的意大利面条式代码程序的反应。这些程序由连续程序中的一行行代码组成。控制权可以从一行转移到另一行，因为大多数行都有名称或数字标识。术语*意大利面条式代码*被用来指代那些以复杂且通常不可预测的顺序执行的、混乱的代码行。\n\
    \n为了摆脱意大利面条式代码的问题，以下三个概念应运而生：\n\n- **结构化编程**使用子程序（语句的逻辑集合）来为程序提供结构。根据语言的不同，这些子程序被称为方法、函数或过程。当控制权转移时，是从一个子程序转移到另一个子程序，而不是转移到特定的代码行。\n\
    - **过程式**编程使用子程序。它们通常以*参数*的形式接收输入数据，并可能返回结果值。在运行时，子程序的参数会被实际值——*实参*——所替代。\n- **面向对象**编程让你能够描述可以封装数据和功能（或两者兼有，或两者皆无）的对象。对象可以包含子程序，如函数或方法。通常，对象对应于现实世界的概念，例如客户、地点或想法。\n\
    \n#### 操作范式\n\n这些范式描述了命令的编写方式。\n\n- **命令式**程序由指示计算机按特定顺序执行特定任务的指令组成。像 `if` 这样的*条件语句*允许你修改该顺序，但命令式程序的本质在于命令式指令。（该术语的用法与语言中的用法相同。）像\
    \ `Reactive Extensions`（`ReactiveX`）这样的工具有助于命令式语言处理同步或异步的数据序列，从而在一定程度上弥合了这两种技术之间的区别。\n\
    - **声明式**程序声明操作的结果应该是什么。命令式程序指定了做什么以及如何做，而声明式编程范式仅指定做什么：程序或操作系统的任务是选择最合适的方式来完成它。声明式编程语言包含旨在明确最终结果应为何物的指令。\n\
    - **函数式**程序是声明式程序的一个子集。它们要求程序组件是操作（如过程或函数）结果的唯一决定因素。换句话说，在函数式编程范式的函数内部，不使用全局变量和环境设置。\n\
    \n你可以在维基百科上找到常见编程范式的比较：[`https://en.wikipedia.org/wiki/Comparison_of_programming_paradigms`](https://en.wikipedia.org/wiki/Comparison_of_programming_paradigms)。\n\
    \n### 设计模式\n\n设计模式是可在类似情况下使用的模式或例程。你可以在许多地方找到它们，包括房屋中门和锁的配置模式，以及软件中。在包含 `RxSwift`\
    \ 的语境中使用时，该术语指的是 1994 年出版的一本书，该书涉及面向对象软件中的设计模式。\n\n### 提示\n\n由 Erich Gamma、Richard\
    \ Helm、Ralph Johnson 和 John Vlissides 合著、Grady Booch 作序的《设计模式：可复用面向对象软件的基础》由 Addison-Wesley\
    \ Professional 出版（ISBN-13 978-0201633610）。这四位作者常被称为*四人帮*。\n\n设计模式分为三类：\n\n- **创建型**设计模式用于创建对象。\n\
    - **结构型**设计模式用于连接两个对象等目的。\n- **行为型**设计模式用于管理行为和流程。`ReactiveX` 使用了迭代器和观察者设计模式：\n\
    \    - **迭代器**。此模式允许你遍历某个结构以获取下一个元素（该模式允许你指定序列是什么）。\n    - **观察者**。通过此模式，你可以在一个观察者（一个）和被观察元素（多个或零个）之间定义一对多的关系。被观察元素对观察者一无所知，这是一个关键特性。被观察元素*发布*一个变化，任何观察者都会收到通知，但被观察元素不需要直接通知任何观察者。\n"
- fmt: '### Processing Configurations


    The third collection of terms and concepts, processing configurations, is one
    that many developers skip over. What happens inside the processors is something
    that we take for granted. Simple apps such as Hello World are no longer good models
    for the code that we need to write, and the idea of a computer as a single device
    is also outdated. Almost every smartphone today runs with multiple cores—that
    is, multiple processors. Operating systems designed to run on such multi-core
    devices can perform several tasks at the same time.


    What follows is a very high-level conceptual overview of multiprocessing. The
    operating systems allow a task to run on whatever core is available, and it can
    run as if there’s only one core. To work around slow devices (printers, networks,
    and so forth), a task can be quickly stopped and packaged with its code and resources;
    that stopped task can then be put aside while something else executes.


    The ability to pick up a task and move it aside is generalized beyond just waiting
    for a slow device. If a task can run independently of other tasks, it can run
    on one core while some other task runs on the first core.


    With such use of multiple cores, the operating system and, to a lesser extent,
    the task software must be able to be split into independent tasks that can be
    run on separate cores. To get the most out of the available cores, it is important
    to keep track of what memory is required for each task as well as to provide a
    mechanism for synchronizing the tasks at points where they can (or cannot) share
    memory.


    In thinking about this in terms of ReactiveX, it’s necessary to distinguish between
    tasks or parts of tasks that can run independently (*asynchronously*) and those
    that must run in coordination (*synchronously*).


    The goal of system software designers is to make multiprocessing possible with
    as little intervention by the app developer as possible. It should just happen
    in an ideal world. With the introduction of Grand Central Dispatch (GCD) in OS
    X 10.6 (2009) and iOS 4 (2010), existing concurrency code in the operating systems
    was rewritten to make the use of multi-core devices possible with little difficulty
    to developers. What is key to the successful use of GCD is the use of queues of
    tasks. You add tasks to queues, and GCD takes over.


    It is important to remember that the efficient use of multiple cores relies on
    developers’ using queues properly. Fortunately, ReactiveX incorporates most of
    the core manipulation into its `RxSwift` objects.


    For now, just remember that asynchronous processing is built into `RxSwift`.


    ### Introducing Reactive Programming


    There’s a commonly repeated description of reactive programming on Wikipedia:
    “reactive programming is an asynchronous programming paradigm concerned with data
    streams and the propagation of change.” That is true, but it requires a substantial
    understanding of the background terms, such as *asynchronous programming paradigm*,
    *data stream*, and *propagation of change*. You have an overview of asynchronous
    programming in the previous section. For now, consider a data stream to be just
    that—a flow of data that can be on its way to a printer, communication device,
    or other part of the app. *Propagation of change* refers to the ability of an
    app to respond to a change in its environment and pass that change on appropriately.
    (That’s exactly the meaning in English of the words—it’s not specifically a technical
    concept.)


    ### Focusing on ReactiveX


    The basic description of `ReactiveX` is concise in its documentation: “The Observer
    pattern done right.” That, too, requires some background knowledge, but the focus
    is just on one thing rather than the three in the previous description: the observer
    pattern. The fuller description is “`ReactiveX` is a combination of the best ideas
    from the Observer pattern, the Iterator pattern, and functional programming.”
    The website is at [`http://reactivex.io`](http://reactivex.io) . A further clarification
    is, “`ReactiveX` is more than an API; it’s an idea and a breakthrough in programming.”


    #### Note


    Observer and iterator patterns as well as functional programming are discussed
    in the previous section.


    The heart of `RxSwift` (and many other reactive programming projects such as `RxJava`,
    `RxJS`, `Rx.Net`, `RxScala`, and `RxClojure`) is the `ReactiveX` library. `ReactiveX`
    itself is a collection of open source projects. The `ReactiveX` project is also
    open source, licensed under the Creative Commons Attribution license. Code samples
    are licensed under the BSD license.


    ### Summary


    This chapter has provided an overview of the technologies on which `RxSwift` relies.
    Nothing is new here or specific to `RxSwift`. In the chapters that follow, you
    will see code that implements these design patterns in `RxSwift`, and you will
    find real-life examples of their use.


    At this point, you’ve seen how to download `RxSwift` from GitHub and how to build
    it in Xcode. It’s time to look at the basics of the code you will use.


    # 13. Exploring the Basic RxCode


    Having explored the basics of `RxSwift` in a playground (Chapter 11) and learned
    the underpinnings of the technology (Chapter 12), it’s time to look at `RxSwift`
    at work in an app. This chapter will show you how to take code that you can download
    from GitHub and turn it into an app.


    `RxSwift` implements reactive programming, and that’s what the app in this chapter
    will demonstrate. It starts very basically: The app reacts to events that the
    user generates. That type of app can be created easily using notifications within
    the app because the app generates both the event/stimulus and the reaction/response.


    This very simple structure is useful for exploring the structure and syntax of
    `RxSwift`. Once you have the basics implemented, you can move onto the kind of
    reaction that most people think of when they think of reactive programming—reaction
    to external events from outside the app.


    This chapter will show you how to put one of the sample apps built in Xcode into
    the downloaded `RxSwift` Xcode files. Having done that, you’ll have the two components
    you need: `RxSwift` and Xcode working together.


    #### Note


    You need Xcode installed to continue.'
  raw: '### Processing Configurations


    The third collection of terms and concepts, processing configurations, is one
    that many developers skip over. What happens inside the processors is something
    that we take for granted. Simple apps such as Hello World are no longer good models
    for the code that we need to write, and the idea of a computer as a single device
    is also outdated. Almost every smartphone today runs with multiple cores—that
    is, multiple processors. Operating systems designed to run on such multi-core
    devices can perform several tasks at the same time.


    What follows is a very high-level conceptual overview of multiprocessing. The
    operating systems allow a task to run on whatever core is available, and it can
    run as if there’s only one core. To work around slow devices (printers, networks,
    and so forth), a task can be quickly stopped and packaged with its code and resources;
    that stopped task can then be put aside while something else executes.


    The ability to pick up a task and move it aside is generalized beyond just waiting
    for a slow device. If a task can run independently of other tasks, it can run
    on one core while some other task runs on the first core.


    With such use of multiple cores, the operating system and, to a lesser extent,
    the task software must be able to be split into independent tasks that can be
    run on separate cores. To get the most out of the available cores, it is important
    to keep track of what memory is required for each task as well as to provide a
    mechanism for synchronizing the tasks at points where they can (or cannot) share
    memory.


    In thinking about this in terms of ReactiveX, it’s necessary to distinguish between
    tasks or parts of tasks that can run independently (*asynchronously*) and those
    that must run in coordination (*synchronously*).


    The goal of system software designers is to make multiprocessing possible with
    as little intervention by the app developer as possible. It should just happen
    . . . in an ideal world. With the introduction of Grand Central Dispatch (GCD)
    in OS X 10.6 (2009) and iOS 4 (2010), existing concurrency code in the operating
    systems was rewritten to make the use of multi-core devices possible with little
    difficulty to developers. What is key to the successful use of GCD is the use
    of queues of tasks. You add tasks to queues, and GCD takes over.


    It is important to remember that the efficient use of multiple cores relies on
    developers’ using queues properly. Fortunately, ReactiveX incorporates most of
    the core manipulation into its RxSwift objects.


    For now, just remember that asynchronous processing is built into RxSwift.


    ## Introducing Reactive Programming


    There’s a commonly repeated description of reactive programming on Wikipedia:
    “reactive programming is an asynchronous programming paradigm concerned with data
    streams and the propagation of change.” That is true, but it requires a substantial
    understanding of the background terms, such as *asynchronous programming paradigm*,
    *data stream*, and *propagation of change*. You have an overview of asynchronous
    programming in the previous section. For now, consider a data stream to be just
    that—a flow of data that can be on its way to a printer, communication device,
    or other part of the app. *Propagation of change* refers to the ability of an
    app to respond to a change in its environment and pass that change on appropriately.
    (That’s exactly the meaning in English of the words—it’s not specifically a technical
    concept.)


    ## Focusing on ReactiveX


    The basic description of ReactiveX is concise in its documentation: “The Observer
    pattern done right.” That, too, requires some background knowledge, but the focus
    is just on one thing rather than the three in the previous description: the observer
    pattern. The fuller description is “ReactiveX is a combination of the best ideas
    from the Observer pattern, the Iterator pattern, and functional programming.”
    The website is at [`http://reactivex.io`](http://reactivex.io) . A further clarification
    is, “ReactiveX is more than an API; it’s an idea and a breakthrough in programming.”


    ### Note


    Observer and iterator patterns as well as functional programming are discussed
    in the previous section.


    The heart of RxSwift (and many other reactive programming projects such as RxJava,
    RxJS, Rx.Net, RxScala, and RxClojure) is the ReactiveX library. ReactiveX itself
    is a collection of open source projects. The ReactiveX project is also open source,
    licensed under the Creative Commons Attribution license. Code samples are licensed
    under the BSD license.


    ## Summary


    This chapter has provided an overview of the technologies on which RxSwift relies.
    Nothing is new here or specific to RxSwift. In the chapters that follow, you will
    see code that implements these design patterns in RxSwift, and you will find real-life
    examples of their use.


    At this point, you’ve seen how to download RxSwift from GitHub and how to build
    it in Xcode. It’s time to look at the basics of the code you will use.


    # 13. Exploring the Basic RxCode


    Having explored the basics of RxSwift in a playground (Chapter [11](#459488_1_En_11_Chapter.xhtml))
    and learned the underpinnings of the technology (Chapter [12](#459488_1_En_12_Chapter.xhtml)),
    it’s time to look at RxSwift at work in an app. This chapter will show you how
    to take code that you can download from GitHub and turn it into an app.


    RxSwift implements reactive programming, and that’s what the app in this chapter
    will demonstrate. It starts very basically: The app reacts to events that the
    user generates. That type of app can be created easily using notifications within
    the app because the app generates both the event/stimulus and the reaction/response.


    This very simple structure is useful for exploring the structure and syntax of
    RxSwift. Once you have the basics implemented, you can move onto the kind of reaction
    that most people think of when they think of reactive programming—reaction to
    external events from outside the app.


    This chapter will show you how to put one of the sample apps built in Xcode into
    the downloaded RxSwift Xcode files. Having done that, you’ll have the two components
    you need: RxSwift and Xcode working together.


    ### Note


    You need Xcode installed to continue.'
  trans: '

    ### 处理配置


    术语与概念的第三个集合——处理配置，是许多开发者会跳过的内容。处理器内部发生的工作机制，我们往往视为理所当然。像“Hello World”这样简单的应用已不再是编写代码的良好范本，而将计算机视为单一设备的观念也已过时。如今几乎每部智能手机都搭载了多核——也就是多个处理器。专为这类多核设备设计的操作系统，能够同时执行多项任务。


    以下是对多处理机制的一个非常高层级的概念性概述。操作系统允许某个任务在任意可用的核心上运行，且运行方式就像只有一个核心一样。为了处理慢速设备（如打印机、网络等）的问题，一个任务可以被快速暂停，并将其代码和资源打包；暂停后的任务可以被搁置一旁，同时执行其他任务。


    这种暂停并移开任务的能力，其应用范围远不止于等待慢速设备。如果一个任务可以独立于其他任务运行，它就可以在一个核心上运行，同时让另一个任务在第一个核心上运行。


    通过这种多核利用方式，操作系统以及（在较小程度上）任务软件必须能够被拆分成可以在不同核心上独立运行的任务。为了充分利用可用核心，重要的是要跟踪每个任务所需的内存，并提供一个机制，用于在任务可以（或不能）共享内存的节点上进行同步。


    从 ReactiveX 的角度思考这个问题，有必要区分可以独立运行（*异步*）的任务或任务部分，以及必须协调运行（*同步*）的任务。


    系统软件设计者的目标是，尽可能少地需要应用开发者干预就能实现多处理。在理想世界中，这应该自动发生。随着 OS X 10.6 (2009) 和 iOS 4 (2010)
    中引入 Grand Central Dispatch (GCD)，操作系统中的现有并发代码被重写，使得开发者能够轻松地利用多核设备。成功使用 GCD 的关键在于任务队列的使用。你将任务添加到队列，GCD
    便会接管后续工作。


    需要记住的是，高效利用多核依赖于开发者正确使用队列。幸运的是，ReactiveX 将其大部分核心操作整合到了它的 `RxSwift` 对象中。


    目前，你只需记住异步处理是内置于 `RxSwift` 中的。


    ### 介绍响应式编程


    维基百科上有一个广为流传的响应式编程描述：“响应式编程是一种关注数据流和变化传播的异步编程范式。” 这是事实，但它要求对背景术语有相当深入的理解，例如*异步编程范式*、*数据流*和*变化传播*。你在前一节中已经对异步编程有了一个概述。现在，将数据流简单地理解为——数据流向打印机、通信设备或应用的其他部分。*变化传播*指的是应用响应其环境变化并恰当地传递该变化的能力。（这正是这些词汇的英文原意——并非特定技术概念。）


    ### 聚焦 ReactiveX


    `ReactiveX` 的基本描述在其文档中非常简洁：“正确实现的观察者模式。” 这同样需要一些背景知识，但它的焦点只放在一件事上，即观察者模式，而不是前述描述中的三点。更完整的描述是：“`ReactiveX`
    是观察者模式、迭代器模式和函数式编程最佳理念的结合。” 其网站位于 [`http://reactivex.io`](http://reactivex.io)
    。进一步的说明是：“`ReactiveX` 不止是一个 API；它是一种编程理念和突破。”


    #### 注


    观察者模式、迭代器模式以及函数式编程已在上一节中讨论过。


    `RxSwift`（以及许多其他响应式编程项目，如 `RxJava`、`RxJS`、`Rx.Net`、`RxScala` 和 `RxClojure`）的核心是
    `ReactiveX` 库。`ReactiveX` 本身是一个开源项目集。`ReactiveX` 项目本身也是开源的，采用知识共享署名许可协议进行许可。代码示例采用
    BSD 许可协议。


    ### 总结


    本章概述了 `RxSwift` 所依赖的技术。这里没有任何新技术或 `RxSwift` 特有的内容。在接下来的章节中，你将看到在 `RxSwift` 中实现这些设计模式的代码，并找到它们在实际应用中的用例。


    至此，你已经了解了如何从 GitHub 下载 `RxSwift`，以及如何在 Xcode 中构建它。现在，是时候看看你将使用的基础代码了。


    # 13. 探索 Rx 基础代码


    在 playground 中（第 11 章）探索了 `RxSwift` 的基础知识，并学习了其技术基础（第 12 章）之后，现在是时候看看 `RxSwift`
    在应用中的实际运用了。本章将向你展示如何将从 GitHub 下载的代码转变为真正的应用。


    `RxSwift` 实现了响应式编程，这也是本章应用将要演示的内容。它从一个非常基础的点出发：应用对用户生成的事件做出反应。这类应用可以轻松地通过应用内的通知来创建，因为应用既生成了事件/刺激，也生成了反应/响应。


    这种非常简单的结构对于探索 `RxSwift` 的结构和语法非常有用。一旦你掌握了基础知识，就可以转向大多数人想到响应式编程时联想到的那种反应——对外部事件（源自应用之外）的反应。


    本章将向你展示如何将一个在 Xcode 中构建的示例应用放入已下载的 `RxSwift` Xcode 文件中。完成此操作后，你将拥有所需的两个组件：`RxSwift`
    和 Xcode，它们将协同工作。


    #### 注


    你需要安装 Xcode 才能继续。'
- fmt: '# Overview of ReactiveX/RxSwift–Xcode Integration


    There are several ways to integrate Xcode and ReactiveX/RxSwift. Which method
    you use depends on your experience and preferences. The type of app that you’re
    building is less important than your preferences. The starting point is the GitHub
    repository for ReactiveX/RxSwift. Chapter [11](#459488_1_En_11_Chapter.xhtml)
    showed you how to download it and use the Swift playground that’s part of it.
    You need part of that repo to integrate with your own app. One of the benefits
    of using GitHub is that it changes as people use and modify the archives. As a
    result, the GitHub version you see may differ from the version described in this
    chapter.


    There are a number of techniques available in the GitHub repo for integration
    with your own app. As of this writing (in 2018), the integration methods are the
    following:


    - `CocoaPods` is available at [http://cocoapods.org/](http://cocoapods.org/).
    It is designed for managing the distribution and dependencies of source code for
    Xcode projects.

    - `Carthage`, available at [https://github.com/Carthage/Carthage/releases](https://github.com/Carthage/Carthage/releases),
    is more closely integrated with Xcode and Swift than `CocoaPods`, and many people
    find it somewhat simpler to use.

    - Swift Package Manager (`SPM`) is part of the Swift project and is available
    at [https://swift.org/package-manager/](https://swift.org/package-manager/). Its
    integration with Swift is more thorough than that of `CocoaPods` or `Carthage`,
    but it is not yet as widely used as `CocoaPods`.


    In this chapter, the process of integrating the files from GitHub will be described
    based simply on the archive files and without the use of `CocoaPods`, `Carthage`,
    or `SPM`. This can be a simpler path for beginners.


    ## Start from the RxSwift Download


    Begin by downloading the current version of `RxSwift` from GitHub, as described
    in Chapter [1](#459488_1_En_1_Chapter.xhtml). The critical step is the download
    from GitHub into Xcode. Figure [13-1](#459488_1_En_13_Chapter.xhtml#Fig1) reminds
    you of this step. It is easiest to download it into a new folder. Later on, you
    can rearrange files, but to make certain that what you have downloaded will build
    and run on your Mac and your version of Xcode, keep the installation simple.


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig1_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig1_HTML.jpg)


    Figure 13-1 — Download the GitHub `RxSwift` code directly into Xcode


    The files you have downloaded will look somewhat like the files you see in Figure
    [13-2](#459488_1_En_13_Chapter.xhtml#Fig2). Remember that this archive is growing
    and changing all the time, but the basic structure is constant. Make certain that
    you have `Rs.xcodeproj` and `Rx.xcworkspace`. If you don’t, you have the wrong
    archive.


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig2_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig2_HTML.jpg)


    Figure 13-2 — Download the `RxSwift` repository


    ## Explore the Workspace and Playground


    Now, open the workspace (`Rx.xcworkspace`) with Xcode, as shown in Figure [13-3](#459488_1_En_13_Chapter.xhtml#Fig3).
    You may have to do some rearranging and opening or closing of groups. What you
    normally see is shown in Figure [13-3](#459488_1_En_13_Chapter.xhtml#Fig3): It’s
    the `Rx.playground`. Look particularly at the project navigator at the left side
    of the window.


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig3_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig3_HTML.jpg)


    Figure 13-3 — Open the `Rx.workspace` and then `Rx.playground`


    Close the playground groups so that the first item you see in `Package.swift`
    as you see in Figure [13-4](#459488_1_En_13_Chapter.xhtml#Fig4).


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig4_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig4_HTML.jpg)


    Figure 13-4 — Close the playground


    ## Adding a Project to the RxSwift Download


    Now, add a project to the workspace. To keep things organized, it’s easiest at
    this point to click in the blank area at the bottom of the project navigator so
    that your new project will go there. (You can rearrange it later.)


    Create the project by choosing **New** ➤ **Project** to select your template,
    as shown in Figure [13-5](#459488_1_En_13_Chapter.xhtml#Fig5). For this basic
    example, the **Single View App** in the **iOS** tab is perfect.


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig5_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig5_HTML.jpg)


    Figure 13-5 — Choose a new project template


    As is always the case, when you click **Next** you need to name your project and
    locate it on disk. For simplicity, place it in the same folder that you used to
    download the `RxSwift` repository. Name it `Basic` to match the screenshots in
    this book. The project navigator should now look like it does in Figure [13-6](#459488_1_En_13_Chapter.xhtml#Fig6).


    Do not use **Core Data**, **Unit Tests**, or **UI Tests** when you create the
    project (there are checkboxes for them at the bottom of the options sheet, as
    shown in Figure [13-6](#459488_1_En_13_Chapter.xhtml#Fig6)).


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig6_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig6_HTML.jpg)


    Figure 13-6 — Set the name and options for your project


    When prompted for a location to store the new project, place it in the `Rx` workspace
    and in whatever group you want, as you can see in Figure [13-7](#459488_1_En_13_Chapter.xhtml#Fig7).


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig7_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig7_HTML.jpg)


    Figure 13-7 — Place the new project into the `Rx` workspace and whatever group
    you want


    Drag the new project (`Basic`, in this example) to the top—or bottom—of the project
    navigator so it’s easy to spot.


    > **Tip:** If you want to create a new empty group folder for it before you add
    it, you’ll save yourself a step, but for many people that seems to be out of sequence.


    Figure [13-8](#459488_1_En_13_Chapter.xhtml#Fig8) shows the project now.


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig8_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig8_HTML.jpg)


    Figure 13-8 — Your new project is now part of the workspace


    If you look at the files on disk, you’ll see that your project is in the right
    place, as you can see in Figure [13-9](#459488_1_En_13_Chapter.xhtml#Fig9).


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig9_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig9_HTML.jpg)


    Figure 13-9 — Check that your new project files are in the right place


    > **Note:** Make certain that the files are in the right place. If they’re not
    in the folder for your project, things will work perfectly well as long as you
    don’t move the project. When you move the project elsewhere (such as to a MacBook)
    the project may break. You can move the new project files separately as long as
    you remember to do so, but it’s easier to keep the whole project together.


    ## Building Your RxSwift-enhanced Project


    Before moving on, make certain that your project builds and runs. (This is always
    a good idea when creating a project from a template.) As you can see in Figure
    [13-8](#459488_1_En_13_Chapter.xhtml#Fig8), at the top of the window, you can
    build and run the project for any installed simulator or for a device. When you
    run it on a simulator, you should see the result shown in Figure [13-10](#459488_1_En_13_Chapter.xhtml#Fig10).
    (Yes, Figure [13-10](#459488_1_En_13_Chapter.xhtml#Fig10) is what you should see:
    no error messages and nothing else. In the next section, you’ll see how to add
    a label to confirm that your app is truly running.)


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig10_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig10_HTML.jpg)


    Figure 13-10 — Your project should run now'
