- fmt: '### Adding the `UITableView` Code and Delegate


    If you are following along, all you need to do now is to implement `ViewController`.
    No changes in the template are needed for `AppDelegate`, `Assets.xcassets`, `Info.plist`,
    or `LaunchScreen.storyboard`. The template itself makes some entries, but you
    don’t change them.


    You need to implement a `DataSource` for your table view. (A `Delegate` may need
    to be implemented later on.) The `DataSource` provides the data to the view controller.
    The two key methods for the data source are the same as you use in any `UITableView`.


    Create two arrays in `ViewController`. `items` will be all possible items to be
    shown in the list, and `itemsToShow` will be the items from `items` that are shown.
    The declarations should look like this:


    ```

    var itemsToShow = [String]()

    let items = ["Saranac River", "Fort Moreau", "Oval", "Fort Brown",

    "Water Pollution Control Plant", "Fort Scott"]

    ```


    (The strings in `items` are up to you.)


    You also will need a declaration of a `DisposeBag` to manage your observer. This
    will automatically collect disposables generated in this object (`ViewController`),
    and when the object is deallocated and its `deinit` method is called, the disposables
    will be released.


    ```

    let disposeBag = DisposeBag()

    ```


    You will need to implement `viewDidLoad` as follows:


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    }

    ```


    Two standard `UITableView` functions let you specify the number of items to be
    shown and what they are.


    To specify the number of items to be shown, use `numberOfRowsInSection`. Return
    the count of `itemsToShow` so that the function looks like this:


    ```

    func tableView (_ tableView: UITableView, numberOfRowsInSection section: Int)
    -> Int {

    return itemsToShow.count

    }

    ```


    You format and return the cell to be displayed. You use the identifier for the
    prototype cell you want to use, and you set its `textLabel` to the relevant string
    from `itemsToShow`:


    ```

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->

    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: "prototypeCell",

    for: indexPath)

    cell.textLabel?.text = itemsToShow[indexPath.row]

    return cell

    }

    ```


    Finally, specify that `ViewController` conforms to the `UITableViewDataSource`
    protocol by changing the declaration as follows:


    ```

    class ViewController: UIViewController, UITableViewDataSource {

    ```


    In Interface Builder, connect the table view to the data source.


    ### Implementing the ReactiveX Search Bar


    The final section of code implements the search bar in `viewDidLoad`. What matters
    most are the following:


    - An `items` array (it doesn’t matter what the array types are as long as they
    are strings)

    - An `itemsToShow` array (it starts as an empty `String` array)

    - A `tableView` called `tableView`


    This is one of features of functional programming: you don’t need to worry about
    the specific data you’re working with in many cases.


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    searchBar

    .rx.text

    .orEmpty

    .subscribe(onNext: { [unowned self] query in

    self.itemsToShow = self.items.filter {

    $0.hasPrefix(query)

    }

    self.tableView.reloadData()

    })

    }

    ```


    #### Note


    You may get a warning that `subscribe` is not used at this point: that is a warning,
    and you can continue for now.


    ### Reviewing the Code


    All told, your code is complete now. It should look like Listing [14-1](#459488_1_En_14_Chapter.xhtml#PC9).


    ```

    import UIKit

    import RxSwift

    import RxCocoa

    class ViewController: UIViewController, UITableViewDataSource {

    @IBOutlet weak var searchBar: UISearchBar!

    @IBOutlet weak var tableView: UITableView!

    var itemsToShow = [String]()

    let items = ["Saranac River", "Fort Moreau", "Oval", "Fort Brown",

    "Water Pollution Control Plant", "Fort Scott"]

    let disposeBag = DisposeBag()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    searchBar

    .rx.text

    .orEmpty

