    # 修改项目


    本节的目的是确保你能够修改、构建并运行已创建的 RxSwift 增强项目。在项目中找到 `main.storyboard`（位于图 13-8 顶部）。像在
    Interface Builder 中对任何项目所做的那样，向窗口添加一个标签。添加标签后的故事板如图 13-11 所示。


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig11_HTML.jpg](img/459488_1_En_13_Fig11_HTML.jpg)


    图 13-11


    向故事板添加标签


    再次运行项目，你应该会在界面中看到所添加的标签，如图 13-12 所示。


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig12_HTML.jpg](img/459488_1_En_13_Fig12_HTML.jpg)


    图 13-12


    运行项目中的标签显示


    # 总结


    至此，你应该能够从 GitHub 下载 RxSwift 并将自己的项目添加其中。与大多数将要创建的项目一样，你很可能从一个内置的 Xcode 模板开始，本文正是这样操作的。


    现在，是时候转向一个更复杂的项目了——一个可作为许多 RxSwift 项目起点的项目。


    # 构建 ReactiveX/RxSwift 应用


    在最后三章中，你已经了解了 RxSwift 和响应式编程的基础知识，以及如何使用 GitHub 上的 ReactiveX/RxSwift 仓库创建一个非常基础的应用。本章将进一步推进，使你能够构建一个使用基本响应式功能的小型应用。


    你将构建一个简单的应用，允许你从列表中选择一个项目，如图 14-1 所示。这是一个典型的入门级 ReactiveX 应用，你会在互联网上找到许多不同的变体。你所看到的是一个
    `UISearchBar` 和一个 `UITableView`。该表格视图在应用中预置了六个项目。你可以在搜索栏中输入内容以选择一个或多个项目。应用会监视你的操作：如果你输入
    F，你会看到三个以 F 开头的名称；如果你输入 O，你会看到 Oval；如果你输入 G，你不会看到任何结果，因为没有名称以 G 开头。这个应用将命名为 DemoList。


    即使不借助 RxSwift，你也可以通过向搜索栏添加委托来跟踪输入内容来实现此功能，但使用 RxSwift 能使实现过程更加直接。此外，如果你决定转向更复杂的应用，其中表格视图会根据外部条件自动填充选择项，那么你将准备好实现这些功能。


    ### 注意


    列表中的项目代表纽约州普拉茨堡的地点。


    需要特别注意的一点是，图 14-1 显示 DemoList 运行在真实设备上（从状态栏可以看出是 iPod Touch）。


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig1_HTML.jpg](img/459488_1_En_14_Fig1_HTML.jpg)


    图 14-1


    构建 DemoList


    当你在 iOS 模拟器上运行应用时，状态栏会显示一个通用的运营商，如图 14-2 所示。


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig2_HTML.jpg](img/459488_1_En_14_Fig2_HTML.jpg)


    图 14-2


    在 iOS 模拟器上运行


    模拟器已更新以支持多个版本的 iOS，但某些 iOS 特性在设备上运行与在模拟器上运行时并不完全相同。例如，在模拟器上，iCloud 同步是通过菜单命令（Debug
    ➤ Trigger iCloud Sync）触发的，并且操作系统的其他各种方面在模拟器上的运行方式与实际设备不同。特性如此，由多个文件构建的项目也是如此。当它们在
    Xcode 这样的环境中构建时，必要的文件和框架可能可用，但当应用迁移到实际设备时，这些文件和框架可能不可用。避免部署意外最安全的方法是，在开发过程中频繁使用设备进行测试。（此类测试常用的设备是
    iPod Touch 和 iPhone SE。）


    ## 项目设置


    在第 13 章中，你已经了解了如何将应用添加到下载的仓库中的基础知识。本章将提供一个更完整的版本，你可以将其重复用于其他应用。最重要的是，它开始使用 RxSwift
    的特性和语法。


    如果你按照步骤下载 GitHub 仓库，你将获得最新版本。文件可能会发生变化，结构也可能随之改变，因此，如果你查看磁盘上的文件列表，它可能会与本书图中显示的文件略有不同。图
    14-3 显示了在 Xcode 中下载的 GitHub 仓库。


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig3_HTML.jpg](img/459488_1_En_14_Fig3_HTML.jpg)


    图 14-3


    在 Xcode 中下载的 ReactiveXRxSwift 仓库


    你可能需要打开或关闭一些三角展开符号才能看到文件。此处最重要的是注意 playground 文件。它们可能位于列表顶部的 Rx 项目中（或者可能已被移动）。图
    14-3 向您展示了需要执行的四个步骤：


    1.  打开 `Rx.xcworkspace`

    2.  构建 `RxSwift-macOS` 方案（Product ➤ Build）。

    3.  在项目导航器中打开 `Rx` playground

    4.  显示调试区域（View ➤ Debug Area ➤ Show Debug Area）。


    如果你无法按照四个步骤所述进行构建，则说明下载可能存在问题。


    ### 注意


    playground 的构建过程可能需要几分钟才能完成。注意观察窗口顶部的状态栏，了解索引状态，这通常会花费一些时间。索引状态消息显示在图 14-3 中。


    构建 playground 后，你可以删除这些文件，但最好将完整的下载归档文件保存在安全位置。删除 playground 文件后，你的项目可能如图 14-4
    所示，其中所有 playground 文件均已移除。这可能是 RxSwift 的一个版本，你可以将其用作不需要 playground 文件的各种项目的起点。


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig4_HTML.jpg](img/459488_1_En_14_Fig4_HTML.jpg)


    图 14-4


    不含 playground 项目的 GitHub 仓库


    仓库靠下方的 `Rx` 项目是主项目，而不是此时已删除的 playground。如果你选择 `Rx` 项目并查看目标，如图 14-4 所示，你将看到 ReactiveX
    的组件。


    对于 ReactiveX 的基本工作，你需要为运行项目的设备编译 `RxCocoa` 和 `RxSwift`。你可以从窗口左上角的模式（图 14-4 所示）中执行此操作。

