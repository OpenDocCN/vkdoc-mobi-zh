    # 命令行集成


    `终端`是 macOS 系统自动安装的应用程序，它为您提供了访问命令行的途径。启动后，您将看到图 1-2 所示的基本界面。


    ![../images/459488_1_En_1_Chapter/459488_1_En_1_Fig2_HTML.jpg](img/459488_1_En_1_Fig2_HTML.jpg)


    图 1-2


    使用`终端`访问命令行。


    第一行显示上次登录的日期和时间。第二行可以看到您正在使用的电脑名称。随后会显示当前运行的用户标识符，并以`$`等符号标记自动生成文本的结尾。您可以在该符号之后输入命令。


    ### 注意


    您可以自定义`终端`中文本行的格式。


    在图 1-3 中，可以看到输入到`终端`的第一个命令。它是列表命令（代码为`ls`）。


    ![../images/459488_1_En_1_Chapter/459488_1_En_1_Fig3_HTML.jpg](img/459488_1_En_1_Fig3_HTML.jpg)


    图 1-3


    输入`ls`命令。


    在命令行界面中，您每次只能处理一行。无法复制或粘贴到之前的代码行，但可以在正在编辑的行中使用退格键。以回车键结束该行后，命令即会被执行。


    `ls`命令的结果会显示在`终端`窗口中，如图 1-4 所示。


    ![../images/459488_1_En_1_Chapter/459488_1_En_1_Fig4_HTML.jpg](img/459488_1_En_1_Fig4_HTML.jpg)


    图 1-4


    `终端`中`ls`命令的执行结果。


    如果您在访达中查看同一目录，会看到如图 1-5 所示的数据。文件的排列顺序可能不同，但这无关紧要。同样需要注意的是，某些在访达中通常不可见的文件可能会在`终端`中显示出来。


    ![../images/459488_1_En_1_Chapter/459488_1_En_1_Fig5_HTML.jpg](img/459488_1_En_1_Fig5_HTML.jpg)


    图 1-5


    访达中的文件。


    在使用`终端`时，您可能还需要用到另一个命令：输入`cd`可以切换当前所在的目录。然后您可以输入要进入的目录名称，也可以从访达中拖拽一个目录放到您已输入`cd`的`终端`命令行上。该目录的文本形式路径会被填入`终端`代码行中。按下回车键后，目录即会切换。


    ## 总结


    Xcode 提供了多种工具（可与 Objective-C 和 Swift 配合使用），帮助您通过可重用代码构建复杂应用，从而节省开发和调试时间。本章为入门提供了简要概述。


    如需更多信息，请使用标准的在线资源以及`developer.apple.com`上的讨论板。现在，我们开始介绍包管理器。


    # 使用 CocoaPods


    CocoaPods 是一个用于管理 Xcode 项目中多个组件的工具。基本流程是：您照常创建 Xcode 项目，然后运行 CocoaPods 将您的 Xcode
    项目放入它创建的新工作区中。在工作区中，您的项目旁边会排列着各种您希望安装的更新版 CocoaPods。


    CocoaPods 可以从 GitHub 仓库按需下载更新，因此您无需自己操心。CocoaPods 工具会为您维护这些公共更新的版本，但如果您不需要或不想共享，也可以创建自己的私有仓库。


    您需要负责管理一个`podfile`，该文件指明了要安装的更新内容。`podfile`是您的原始项目与您安装的更新（CocoaPods 可按需重新安装这些更新）之间的纽带。


    本章将快速概述 CocoaPods 的流程，并配有大量分步图解。更多信息请访问 CocoaPods 网站及文档 [`cocoapods.org`](http://cocoapods.org)。如需更具体的信息，请参阅本书中的
    Facebook 和 RxSwift 章节；Facebook 和 RxSwift 都是通过 CocoaPods 安装的。


    ## 安装 CocoaPods


    这是一项在开发电脑上只需执行一次的任务。启动`终端`进入命令行。使用以下命令安装 CocoaPods：


    ```

    sudo gem install cocoapods

    ```


    您需要提供系统密码。网站上提供了其他安装 CocoaPods 的方法，但这是对大多数人来说最直接的方式。


    在命令行中输入以下命令完成设置：


    ```

    pod setup

    ```


    您将看到一些状态信息，最终显示：


    ```

    Setup completed

    ```


    现在即可继续后续操作。

    '
- fmt: '# Create a Simple App (Single-View App)


    There will be three parts to your CocoaPods project:


    -   You create an initial Xcode project as you usually do.

    -   You create a podfile to manage the updates and link them to your project.

    -   You update the podfile to install updates and new features in your project.


    Figure [2-1](#459488_1_En_2_Chapter.xhtml#Fig1) shows the creation of one of the
    simplest built-in projects in Xcode: a single-view app.


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig1_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig1_HTML.jpg)


    Figure 2-1

    Create a new project


    When it comes time to generate the project files, you will need to identify the
    folder for them. You can create a new folder, as you see in Figure [2-2](#459488_1_En_2_Chapter.xhtml#Fig2).


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig2_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig2_HTML.jpg)


    Figure 2-2

    Place it in a folder


    When any new project is created from a template, test that it builds properly
    in Xcode with a device or a simulator, as you see in Figure [2-3](#459488_1_En_2_Chapter.xhtml#Fig3).
    You can use Product ➤ Build or the arrow at the top left of the window. (There
    are other techniques described in the Xcode documentation and help.)


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig3_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig3_HTML.jpg)


    Figure 2-3

    Review the project


    Check the result on a device or simulator, as you see in Figure [2-4](#459488_1_En_2_Chapter.xhtml#Fig4).


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig4_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig4_HTML.jpg)


    Figure 2-4

    Run the app


    Using the command line in Terminal, change the directory to the folder you identified
    or created in Figure [2-2](#459488_1_En_2_Chapter.xhtml#Fig2). (Remember you can
    type `cd` and a trailing space and then drag the folder into the Terminal window
    instead of typing the full path name.) Figure [2-5](#459488_1_En_2_Chapter.xhtml#Fig5)
    shows a `cd` command that is generated in that way.


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig5_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig5_HTML.jpg)


    Figure 2-5

    Change the command line to the project directory


    Using the list (`ls`) command, check that the folder you have changed to does
    in fact contain the `xcodeproj` file and the folder of source code created in
    the Xcode template, as you see in Figure [2-6](#459488_1_En_2_Chapter.xhtml#Fig6).


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig6_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig6_HTML.jpg)


    Figure 2-6

    Check the directory


    Enter the `pod init` command on the command line in the directory you see in Figure
    [2-6](#459488_1_En_2_Chapter.xhtml#Fig6). This will add a podfile to your directory,
    as you can see in Figure [2-7](#459488_1_En_2_Chapter.xhtml#Fig7).


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig7_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig7_HTML.jpg)


    Figure 2-7

    Add the podfile


    You can now look at the podfile, as shown in Figure [2-8](#459488_1_En_2_Chapter.xhtml#Fig8).
    If you double-click it in the Finder, TextEdit will open automatically. You can
    also use a tool such as BBEdit.


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig8_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig8_HTML.jpg)


    Figure 2-8

    Review the podfile


    Run the `podInstall` command from the directory shown in Figure [2-5](#459488_1_En_2_Chapter.xhtml#Fig5).


    You should not need to make changes to the file now, but as your development continues,
    you will update the podfile for new components you may want to add. Whenever you
    change the podfile, you must then run the `pod install` command.


    As you can see in the messages in Figure [2-9](#459488_1_En_2_Chapter.xhtml#Fig9),
    there are no dependencies to install yet. But what is important is that from now
    on you should open the workspace that has just been created rather than the project
    itself. Close Xcode and look at the folder for your project. The file structure
    now shows a workspace and a new project for pods, as you can see in Figure [2-10](#459488_1_En_2_Chapter.xhtml#Fig10).


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig10_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig10_HTML.jpg)


    Figure 2-10

    Your workspace window with pods is created


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig9_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig9_HTML.jpg)


    Figure 2-9

    Install and init


    If you are used to seeing files in the column view, you can change that in the
    Finder, in which case you should see files such as those shown in Figure [2-11](#459488_1_En_2_Chapter.xhtml#Fig11).


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig11_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig11_HTML.jpg)


    Figure 2-11

    Review the workspace files in column view


    Build your project again, and you’ll see the pod code and your original code combined,
    as you can see in Figure [2-12](#459488_1_En_2_Chapter.xhtml#Fig12).


    ![../images/459488_1_En_2_Chapter/459488_1_En_2_Fig12_HTML.jpg](images/459488_1_En_2_Chapter/459488_1_En_2_Fig12_HTML.jpg)


    Figure 2-12

    Build the project with the podfiles added


    # Summary


    CocoaPods is a tool that is used for distributing many components and sets of
    components that are stored publicly on GitHub. This chapter has provided an overview
    of using this tool. Now, it is time to move on to another component that you will
    use frequently: JSON formats for files.


    # Part II Using Codable Data with Swift and iOS


    # 3. Reading and Writing JSON Data


    The building blocks discussed in this book almost all provide ways of sharing
    *functionality* across apps and often across platforms, as is the case with Facebook,
    Amazon Web Services, and reactive programming. This part of the book is different
    because it focuses on components and building blocks that let you share *data*
    across apps and often across platforms.


    This chapter will focus on the specifics of JSON, which is one of the most widely
    used techniques for sharing data across apps and platforms.'
