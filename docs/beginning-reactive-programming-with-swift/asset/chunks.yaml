- fmt: '# Looking at JSON


    In today’s world, JSON is a common way to share data. Its elements are simple
    and are represented using characters. JSON represents data as objects. A JSON
    object is delimited by brackets: `{` and `}`. Within an object, spaces and return
    characters don’t matter except for the special case in which they appear within
    quotes.


    Within the `{` and `}` delimiters of a JSON object, comma-separated name–value
    pairs define the elements of the JSON object. The name and value are both enclosed
    in quotes and are separated by a colon. When the value is a number, it is not
    quoted.


    ```

    {

    "name": "Claude Debussy"

    }

    ```


    The value can be an array. In that case, the elements of the array are enclosed
    in square brackets and are separated by commas, as in the following:


    ```

    {

    "name": "Claude Debussy",

    "works": ["La Mer", "Pélleas et Mélisande", "Images"]

    }

    ```


    Objects can be nested, as in the following:


    ```

    {

    "French Composers":  [

    {

    "name": "Claude Debussy",

    "works": ["La Mer", "Pélleas et Mélisande", "Images"]

    },

    {

    "name": "Maurice Ravel",

    "works":["Boléro", "La Valse"]

    }

    ]

    }

    ```


    JSON is readable, particularly in small sections. Because of its simplicity, it
    has no document-based structure or syntax checking. It is easy to generate from
    data structures, which is the way much (perhaps all) of the JSON code you will
    deal with is created. (Chapter [5](#459488_1_En_5_Chapter.xhtml) will show you
    how to use the Swift `Codable` protocol to read and write JSON code.)


    Because JSON is so commonly used, you can read it and write it with many common
    tools. Some JSON code used for a navigation app is shown in Figure [3-1](#459488_1_En_3_Chapter.xhtml#Fig1)
    as it appears when opened in TextEdit. The spacing is whatever has been typed
    in.


    ![../images/459488_1_En_3_Chapter/459488_1_En_3_Fig1_HTML.jpg](images/459488_1_En_3_Chapter/459488_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    JSON in TextEdit


    The same JSON file is showed in Figure [3-2](#459488_1_En_3_Chapter.xhtml#Fig2)
    as opened in BBEdit. The text is automatically colored by BBEdit.


    ![../images/459488_1_En_3_Chapter/459488_1_En_3_Fig2_HTML.jpg](images/459488_1_En_3_Chapter/459488_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    JSON in BBEdit


    In Figure [3-3](#459488_1_En_3_Chapter.xhtml#Fig3), you can see the same file
    opened in Excel. Note that the content is the same, but the spacing within the
    spreadsheet is done by Excel.


    ![../images/459488_1_En_3_Chapter/459488_1_En_3_Fig3_HTML.jpg](images/459488_1_En_3_Chapter/459488_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    JSON in Excel


    Finally, in Figure [3-4](#459488_1_En_3_Chapter.xhtml#Fig4) you can see the same
    JSON file opened in Xcode, which applies its own spacing and coloring.


    ![../images/459488_1_En_3_Chapter/459488_1_En_3_Fig4_HTML.jpg](images/459488_1_En_3_Chapter/459488_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    JSON in Xcode


    # Using JSON—The Basics


    Despite the different appearance of the same JSON code in the different apps,
    the structure of the underlying code is the same, and it is easy to take the raw
    JSON code, which is based only on characters, and transfer it across any communications
    channel.


    If you are creating the JSON code yourself, it’s easy to misplace a quotation
    mark, comma, bracket, or parenthesis. Because JSON is so straightforward and is
    so widely available, you can find a multitude of JSON checkers and validators
    on the web—just use your favorite search engine.


    The components of JSON should be familiar to you if you are already familiar with
    Cocoa or Swift. The comma-separated lists or key–value pairs are the heart of
    the dictionaries that are used so widely in the operating systems.


    Built into Swift you will find code that easily converts dictionaries to JSON
    and vice versa. The next chapter will give you examples of that code. Furthermore,
    you’ll see how to use the built-in encoders and decoders (in Swift 4 and later)
    that perform these operations for you without your needing to write any additional
    code.


    # Summary


    Sharing data from one app to another, one device to another, or across time barriers
    is made possible by your using sharable code and standards such as JSON. The power
    of JSON is derived from its simplicity: it doesn’t encode a document as a whole
    but rather lets you encode and decode basic structures such as objects (of any
    kind—not necessarily object-oriented objects), numbers, strings, and arrays. These
    processes are very fast and easy to use.


    The next chapter will explore the built-in tools you use with JSON.


    # 4. Using JSON Data with Swift


    In this chapter, you will see the basics of JSON syntax. You can use it with many
    modern languages, and Swift is no exception. In fact, Swift’s integration with
    JSON is strong, powerful, and easy to use. If you add in Swift Playgrounds which
    is available on iPad and in Xcode on your Mac, you get a powerful cross-platform
    data exchange format that also is easy to test with a playground (so that you
    don’t have to write an app—even a stripped-down app—to explore the data, syntax,
    and code).


    In this chapter, you will see how to explore JSON with Swift Playgrounds as well
    as how to explore the iOS/Swift interfaces that are available.


    > **Note:** These features are shown using Xcode 9 and Swift 4. These include
    significant changes from previous versions of Xcode and Swift.


    ## Getting Started with a JSON Swift Playground


    The Swift Playgrounds app is the perfect tool to use to get acclimated to JSON.
    In this chapter, you will see how to use a playground for experimentation. To
    begin with, you can create a playground and add JSON text, such as the examples
