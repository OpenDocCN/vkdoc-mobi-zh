    # 理解 JSON


    在当今世界，JSON 是共享数据的一种常见方式。其元素简单，并通过字符来表示。JSON 将数据表示为对象。一个 JSON 对象由大括号 `{` 和 `}`
    界定。在对象内部，空格和换行符无关紧要，除非它们出现在引号内这种特殊情况中。


    在 JSON 对象的 `{` 和 `}` 界定符内，以逗号分隔的“名称–值”对定义了 JSON 对象的元素。名称和值都用引号括起来，并用冒号分隔。当值为数字时，则不需要加引号。


    ```

    {

    "name": "Claude Debussy"

    }

    ```


    值可以是一个数组。在这种情况下，数组的元素用方括号括起来，并用逗号分隔，如下所示：


    ```

    {

    "name": "Claude Debussy",

    "works": ["La Mer", "Pélleas et Mélisande", "Images"]

    }

    ```


    对象可以嵌套，如下所示：


    ```

    {

    "French Composers":  [

    {

    "name": "Claude Debussy",

    "works": ["La Mer", "Pélleas et Mélisande", "Images"]

    },

    {

    "name": "Maurice Ravel",

    "works":["Boléro", "La Valse"]

    }

    ]

    }

    ```


    JSON 是可读的，尤其在处理小片段时。由于其简单性，它没有基于文档的结构或语法检查。它很容易从数据结构生成，你所接触的大部分（或许是全部）JSON 代码都是通过这种方式创建的。（第
    5 章将向你展示如何使用 Swift 的 `Codable` 协议来读写 JSON 代码。）


    由于 JSON 使用非常普遍，你可以使用许多常用工具来读写它。图 3-1 显示了用于导航应用的部分 JSON 代码在 TextEdit 中打开时的样子。其中的间距是原样输入的。


    ![../images/459488_1_En_3_Chapter/459488_1_En_3_Fig1_HTML.jpg](img/459488_1_En_3_Fig1_HTML.jpg)


    图 3-1


    TextEdit 中的 JSON


    相同的 JSON 文件在 BBEdit 中打开时如图 3-2 所示。文本由 BBEdit 自动着色。


    ![../images/459488_1_En_3_Chapter/459488_1_En_3_Fig2_HTML.jpg](img/459488_1_En_3_Fig2_HTML.jpg)


    图 3-2


    BBEdit 中的 JSON


    在图 3-3 中，你可以看到同一个文件在 Excel 中打开的样子。注意内容相同，但电子表格内的间距由 Excel 处理。


    ![../images/459488_1_En_3_Chapter/459488_1_En_3_Fig3_HTML.jpg](img/459488_1_En_3_Fig3_HTML.jpg)


    图 3-3


    Excel 中的 JSON


    最后，在图 3-4 中，你可以看到同一个 JSON 文件在 Xcode 中打开的样子，Xcode 会应用其自身的间距和着色。


    ![../images/459488_1_En_3_Chapter/459488_1_En_3_Fig4_HTML.jpg](img/459488_1_En_3_Fig4_HTML.jpg)


    图 3-4


    Xcode 中的 JSON


    # JSON 基础使用


    尽管相同的 JSON 代码在不同应用中显示效果不同，但底层代码的结构是相同的，并且很容易将仅基于字符的原始 JSON 代码通过任何通信渠道进行传输。


    如果你自己创建 JSON 代码，很容易放错引号、逗号、大括号或圆括号。由于 JSON 如此直接且应用广泛，你可以在网络上找到大量的 JSON 检查器和验证器——只需使用你喜欢的搜索引擎即可。


    如果你已经熟悉 Cocoa 或 Swift，那么你应该对 JSON 的组成部分不陌生。以逗号分隔的列表或键值对是在操作系统中广泛使用的字典的核心。


    在 Swift 中内置了可以轻松地将字典转换为 JSON，以及将 JSON 转换为字典的代码。下一章将提供该代码的示例。此外，你将看到如何使用内置的编码器和解码器（在
    Swift 4 及更高版本中），它们无需你编写任何额外代码即可执行这些操作。


    # 总结


    通过使用可共享的代码和标准（如 JSON），可以在不同应用之间、不同设备之间或跨越时间障碍共享数据。JSON 的强大之处在于其简单性：它不对整个文档进行编码，而是让你对基本结构进行编码和解码，例如对象（任何类型，不一定是面向对象编程中的对象）、数字、字符串和数组。这些过程非常快速且易于使用。


    下一章将探讨你与 JSON 配合使用的内置工具。


    # 4. 在 Swift 中使用 JSON 数据


    在本章中，你将了解 JSON 语法的基础知识。你可以将其与许多现代语言一起使用，Swift 也不例外。事实上，Swift 与 JSON 的集成强大、功能丰富且易于使用。如果再加上
    iPad 和 Mac 上 Xcode 中均可使用的 Swift Playgrounds，你将获得一个强大的跨平台数据交换格式，并且可以轻松地使用 playground
    进行测试（这样你就不必编写一个应用——哪怕是精简版的应用——来探索数据、语法和代码）。


    在本章中，你将了解如何通过 Swift Playgrounds 探索 JSON，以及如何探索可用的 iOS/Swift 接口。


    > **注意：** 这些功能在 Xcode 9 和 Swift 4 中展示。这些版本相比之前的 Xcode 和 Swift 版本有显著变化。


    ## 开始使用 JSON Swift Playground


    Swift Playgrounds 应用是熟悉 JSON 的完美工具。在本章中，你将看到如何使用 playground 进行实验。首先，你可以创建一个 playground
    并向其中添加 JSON 文本，例如第 3 章中展示的例子。使用 Swift Playgrounds，创建一个新的 playground，如图 4-1 所示。


    ![../images/459488_1_En_4_Chapter/459488_1_En_4_Fig1_HTML.jpg](img/459488_1_En_4_Fig1_HTML.jpg)


    图 4-1


    创建一个 Swift playground


    > **注意：** 本章中的示例使用 macOS 上 Xcode 中的 Playgrounds 展示。Xcode 是你编写代码的工具，像这样的项目在 macOS
    上操作可能比在 iOS 上更方便，但你可以使用任意一种平台。


    通过点击窗口右上角的图标，或使用菜单栏的“显示” > “导航器” > “显示项目导航器”命令，打开窗口左侧的项目导航器。打开项目导航器后，你将看到项目内的文件，如图
    4-2 所示。


    ![../images/459488_1_En_4_Chapter/459488_1_En_4_Fig2_HTML.jpg](img/459488_1_En_4_Fig2_HTML.jpg)


    图 4-2


    打开 Xcode 窗口左侧的项目导航器

