- fmt: '### Tip


    To save time, you can build `RxSwift` and `RxCocoa` for a generic iOS device,
    as shown in Figure [14-4](#459488_1_En_14_Chapter.xhtml#Fig4). These are needed
    to support your app.


    Once you have built `RxCocoa` and `RxSwift`, you can create your new app. This
    example (shown previously in Figure [14-1](#459488_1_En_14_Chapter.xhtml#Fig1))
    can be called `DemoList`. Choose File ➤ New ➤ Project and then select Single View
    App, as shown in Figure [14-5](#459488_1_En_14_Chapter.xhtml#Fig5).


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig5_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig5_HTML.jpg)


    Figure 14-5 – Create a new Single View App project


    Set the project options and name, as shown in Figure [14-6](#459488_1_En_14_Chapter.xhtml#Fig6).


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig6_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig6_HTML.jpg)


    Figure 14-6 – Name the new project and set its options


    When it comes time to save your new project, you have the option of adding it
    to your existing project, as you can see in Figure [14-7](#459488_1_En_14_Chapter.xhtml#Fig7).


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig7_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig7_HTML.jpg)


    Figure 14-7 – Save your new project


    Choose the option to add it to your existing project or workspace, as shown in
    Figure [14-8](#459488_1_En_14_Chapter.xhtml#Fig8).


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig8_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig8_HTML.jpg)


    Figure 14-8 – Add your new project to the existing project or workspace


    As always when you create a new project, try to build and run it. Bearing in mind
    the issues of devices versus simulator, a good test at this point is to run it
    both on a device and in a simulator before you enter any code. (If you do run
    it, remember that the storyboard is blank, so seeing a blank screen is the expected
    behavior. You can add a label or image as described previously to verify your
    app.)


    ## Add ReactiveX


    So far, this is basically the process you’ve seen before for adding onto the downloaded
    repository. Now, it’s time to add `ReactiveX`.


    ## Build RxCocoa and RxSwift


    You will need `RxCocoa` and `RxSwift` to be built before you start. If you haven’t
    done so already, build them as shown in Figure [14-4](#459488_1_En_14_Chapter.xhtml#Fig4).
    Remember that you can use a generic iOS device for these builds. After the builds,
    they will be listed in the `Products` group, as you can see in Figure [14-9](#459488_1_En_14_Chapter.xhtml#Fig9).
    All of the available products will be listed. The ones that have been built will
    show in black rather than red.


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig9_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig9_HTML.jpg)


    Figure 14-9 – Verify you have built `RxSwift` and `RxCocoa`


    ## Add RxSwift and RxCocoa to Your Project


    Now, drag `RxSwift` and `RxCocoa` into the `Embedded Binaries` section on the
    `General` tab of `DemoList`. If you drag them to `Embedded Binaries`, they will
    also automatically be added to `Linked Frameworks and Libraries`.


    ## Verify the Syntax


    The acid test will be if you can reference the `ReactiveX` features in your source
    code, and then if you can run your app and use them. They will be needed in `ViewController`
    in the app template, so add `import` statements at the top of the code, as shown
    in Figure [14-10](#459488_1_En_14_Chapter.xhtml#Fig10).


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig10_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig10_HTML.jpg)


    Figure 14-10 – Add import statements


    If something has gone wrong, you’ll not be able to build your app. You may even
    get a syntax error as you type the `import` statements. If you do get errors,
    double-check the steps you have taken and keep an eye on the status bar at the
    top of the window to make certain that your indexing has completed. Be aware that
    as you are moving these files around and building the `ReactiveX` components,
    you may see errors that will go away as the project is fully indexed and built.
    Don’t react to syntax errors too quickly.


    ## Building the Storyboard


    With your template-based project under way, you can start to build the storyboard.
    In short, you need to create a view controller with a search bar and a table (refer
    back to Figure [10-1](#459488_1_En_10_Chapter.xhtml#Fig1) to see the result).


    The steps for this process are the same basic Xcode and Interface Builder steps
    that you use in any project. Begin by opening the storyboard with your single
    view controller in it. Select the view controller and choose a translucent navigation
    bar for the top, as shown in Figure [14-11](#459488_1_En_14_Chapter.xhtml#Fig11).


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig11_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig11_HTML.jpg)


    Figure 14-11 – Use a translucent navigation bar at the top of the view controller


    Add a `UITableView` to the view. With the table view selected, choose “Dynamic
    Prototypes” for the table view and specify one prototype, as you can see in Figure
    [14-12](#459488_1_En_14_Chapter.xhtml#Fig12).


    In `ViewController`, add references to the search bar and table view so that they
    are visible to your code at the top of `ViewController`:


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig12_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig12_HTML.jpg)


    Figure 14-12 – Use dynamic prototype cells


    ```

    @IBOutlet weak var searchBar: UISearchBar!

    @IBOutlet weak var tableView: UITableView!

    ```


    As is always the case with dynamic prototype cells in `UITableView`, one will
    be created for as many prototypes as you set in the table view. For each one,
    you need to provide an identifier that will be used to retrieve it. In Figure
    [14-12](#459488_1_En_14_Chapter.xhtml#Fig12) you see `prototypeCell` used as the
    name of the prototype cell in the structure view at the left of the layout.'
