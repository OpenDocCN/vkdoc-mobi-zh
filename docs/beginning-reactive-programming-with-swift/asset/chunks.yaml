    # 关于 AWS 账户与根用户


    您可以通过 `aws.amazon.com` 访问 AWS。您可以浏览第 8 章所述的某些功能和文档，但要执行更多操作（例如在应用中使用 AWS），您需要登录。


    **注意：** 本章所述的登录是开发者登录，用于构建您的 AWS 资源。一旦这些资源构建完成并与您的应用一起部署，用户将自行登录您的应用，或者在多数情况下，您的应用会在无需用户干预的情况下自动登录。


    您可以从 `aws.amazon.com` 的许多位置创建新的 AWS 账户——只需查找“创建新 AWS 账户”链接即可（措辞可能会随时间变化）。如图 9-1
    所示的页面将会出现。


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig1_HTML.jpg](img/459488_1_En_9_Fig1_HTML.jpg)


    **图 9-1** 创建新 AWS 账户


    创建新账户的过程相当直接。正如“AWS 账户名称”字段旁边的小信息按钮所示，您可以现在选择一个账户名称，稍后也可以更改。您的 AWS 账户标识符通常不可见——您的电子邮件地址与其关联，并且与密码一样，电子邮件地址也是可以更改的。


    一旦您拥有账户，就可以按照图 9-2 所示进行登录。


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig2_HTML.jpg](img/459488_1_En_9_Fig2_HTML.jpg)


    **图 9-2** 以根用户身份登录


    根用户就是账户的根用户。您将看到，您可以拥有与账户关联的其他用户。您可以通过以根用户身份登录，然后设置其他访问账户来实现这一点。这使您可以在整个账户中拥有多个账户，而不会危及安全性。


    **注意：** 与所有根用户或超级用户一样，不要将该登录信息用于真正的根用户或超级用户操作之外的任何目的，例如添加或删除其他用户。


    如图 9-3 所示，一旦您的账户部分设置完成，您就可以立即访问。请使用“我的账户”下拉菜单进行此操作。


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig3_HTML.jpg](img/459488_1_En_9_Fig3_HTML.jpg)


    **图 9-3** 使用根用户登录访问您的账户


    如果您尚未完成注册，选择“我的账户”中的任何项目都会要求您使用图 9-3 所示的页面进行登录。


    如果您选择了与 AWS 身份与访问管理 (IAM) 相关的项目，您将看到如图 9-4 所示的指引，将您导向 IAM。


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig4_HTML.jpg](img/459488_1_En_9_Fig4_HTML.jpg)


    **图 9-4** 系统会警告您正在使用 AWS 账户


    如果您继续前往诸如账户安全凭证之类的区域（而非 IAM 用户的设置），系统会允许您这样做，如图 9-5 所示。


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig5_HTML.jpg](img/459488_1_En_9_Fig5_HTML.jpg)


    **图 9-5** 使用根用户登录配置账户设置


    # 创建组织


    您可以创建一个 AWS 账户（所有 AWS 账户），该账户拥有根登录权限。然后您可以向其中添加个人。您还可以创建一个组织，该组织由多个 AWS 账户组成。从右上角的账户菜单执行此操作，菜单中会显示您的账户名称。您在图
    9-5 的右上角以及图 9-6 中再次看到了账户名称 (champlainarts)。


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig6_HTML.jpg](img/459488_1_En_9_Fig6_HTML.jpg)


    **图 9-6** 从您的账户菜单创建组织


    # 使用 IAM


    由于最佳实践是不使用根用户登录，您可能会好奇如何操作 AWS。答案是使用内置的身份与访问管理 (IAM) 工具。当您完全登录后，您会在视图左上角看到一个“服务”菜单，如图
    9-7 所示。


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig7_HTML.jpg](img/459488_1_En_9_Fig7_HTML.jpg)


    **图 9-7** 浏览服务


    **注意：** 浏览“服务”中的各种链接以查找选项和您历史记录。您将看到的项目包括最近查看过的项目，因此您会看到不同的菜单及其项目序列。除了基本的单一登录流程之外，没有固定的“先做这个后做那个”的序列。本章提供一个概述，但您可以根据需要尝试使用菜单。


    如果您选择 IAM，您将能够检查其设置，如图 9-8 所示。


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig8_HTML.jpg](img/459488_1_En_9_Fig8_HTML.jpg)


    **图 9-8** 配置 IAM


    要开始使用代码，请从“服务”（或“历史记录”，如果您已经查看过）中选择 Mobile Hub 服务，如图 9-9 所示。


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig9_HTML.jpg](img/459488_1_En_9_Fig9_HTML.jpg)


    **图 9-9** 选择 Mobile Hub


    # 将 AWS 与 Xcode 集成


    AWS Mobile Hub 是您处理代码的地方。如果您有一个项目，您可以将 AWS 添加到其中，如图 9-10 所示。


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig10_HTML.jpg](img/459488_1_En_9_Fig10_HTML.jpg)


    **图 9-10** AWS Mobile Hub


    除了创建您自己的 Xcode 项目，您还可以从 AWS 入门套件开始，如图 9-11 所示。


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig11_HTML.jpg](img/459488_1_En_9_Fig11_HTML.jpg)


    **图 9-11** AWS 入门套件和教程


    # 本章小结


    本章总结了当您开始将 AWS 集成到您的应用时，对您而言至关重要的部分。这需要进行设置（例如设置 AWS 账户），并且需要您有一个准备添加 AWS 的项目。您现在应该明白了如何在
    Mobile Hub 中开始管理此类项目。下一章将向您展示如何为 AWS 设置一个项目。完成此操作后，您就可以构建您的应用了。


    # 开始一个 AWS 项目


    使用 Amazon Web Services (AWS) 最常见（也是最简单）的方式之一就是用于数据存储。如果您已按照上一章所述创建了一个 AWS 账户，您可以按照本章中的指南和教程来构建一个与
    AWS 集成的 iOS 应用。


    首先，您将了解如何设置将与 AWS 集成的 iOS 应用和 iOS 项目。之后，您将了解要执行的具体细节。您可以在 iOS 应用和 AWS 项目之间来回切换。


    ## 设置 iOS 应用


    由于本书建立在您对 iOS 的了解之上，并假设 AWS 对您来说相当陌生，因此重点将放在 iOS 项目上。您可以构建一个使用 AWS 的 iOS 项目来轻松入门；这将为您创建一个新的
    iOS 应用。


    该步骤如图 10-1 所示，因此这是快速入门的好方法。一旦您构建了第一个 iOS/AWS 项目，您就可以轻松地从 AWS 端开始，然后添加 iOS 组件。


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig1_HTML.jpg](img/459488_1_En_10_Fig1_HTML.jpg)

    '
- fmt: '# Setting Up the iOS Project


    Begin by signing in to the Console with the top right button on `aws.amazon.com`
    or with the “AWS Management Console” choice from the My Account drop-down (next
    to the Sign in to the Console button). Both are shown in Figure [10-1](#459488_1_En_10_Chapter.xhtml#Fig1).


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig1_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Begin to manage your AWS account


    As always, you’ll need to sign in to your AWS account, as you can see in Figure
    [10-2](#459488_1_En_10_Chapter.xhtml#Fig2).


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig2_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Sign in to your AWS account


    Remember that although you can sign in to the account as the root user, you should
    use one of the other accounts you have created, as covered in Chapter [9](#459488_1_En_9_Chapter.xhtml).
    If you are given the option to sign in to the root account and you have specific
    accounts, sign in to a different account, as shown in Figure [10-2](#459488_1_En_10_Chapter.xhtml#Fig2).


    Once logged in, you can sign in to Mobile Hub, which is where you want to be.
    It may be readily available if it is a recent service, as you can see at the top
    of Figure [10-3](#459488_1_En_10_Chapter.xhtml#Fig3). Otherwise, look for it under
    Mobile Services at the top of the third column of services in the main body of
    the service choices.


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig3_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Choose Mobile Hub from Mobile Services or Recently visited services


    ### Note


    Remember that the available services will change from time to time as AWS evolves.
    You also can use the recents black bar at the top of the view, as shown in Figure
    [10-4](#459488_1_En_10_Chapter.xhtml#Fig4).


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig4_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    See your projects in AWS Mobile Hub


    If you choose Mobile Hub, you’ll see your projects listed (if you have created
    any), as shown in Figure [10-4](#459488_1_En_10_Chapter.xhtml#Fig4). You can also
    work with a starter kit or tutorial.


    ## Exploring the Documentation


    The concept of cloud computing has been around for a long time. It was first referred
    to in the heyday of “thin client” computing, which emerged in 1993 and which some
    people considered to be an evolution of the “dumb” terminals that had been used
    in distributed mainframe computer systems since the 1950s.


    Although the basic architecture isn’t new, its integration with web and other
    modern technologies has provided a platform that powers much of the data-sharing
    that apps do today. AWS fits into this model very nicely, but there are specifics
    of the implementation that you need to understand in order to integrate AWS with
    your own apps.


    The balance of this chapter helps you move forward to implement that integration.
    The first step to consider in your implementation is where you can find help and
    information. The developer documentation for AWS is available through `aws.amazon.com`.
    You can find a link to the PDF version of the documentation at the top right of
    many of the AWS pages. The documentation and its links may change from time to
    time, but if you choose Mobile Hub from the services shown in Figure [10-3](#459488_1_En_10_Chapter.xhtml#Fig3),
    you can see your projects, as shown in Figure [10-4](#459488_1_En_10_Chapter.xhtml#Fig4).


    Note that when you see your projects, you will also see links to Support, as you
    can see at the top right of Figure [10-4](#459488_1_En_10_Chapter.xhtml#Fig4).
    Selecting “Documentation” will take you to the documentation, as shown in Figure
    [10-5](#459488_1_En_10_Chapter.xhtml#Fig5).


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig5_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    You can download the PDF documentation


    At the top right is a button to let you download the documentation as a PDF file.
    As of this writing, the PDF document is over 400 pages long, so many developers
    choose to use the various online versions. The documentation is organized into
    four basic sections:


    - *Get Started* (shown in Figure [10-5](#459488_1_En_10_Chapter.xhtml#Fig5)) is
    just that—the steps you need to take to get started. They are summarized in this
    section.

    - *Tutorials* let you build apps or parts of apps to explore AWS. As you can see
    in Figure [10-5](#459488_1_En_10_Chapter.xhtml#Fig5), they are available for iOS
    and Android.

    - *How To* documents let you learn how to accomplish specific tasks.

    - *Reference* is the source for information about what’s behind the tutorials
    and how-to documents.


    All of these may change over time. If you are just getting started with AWS, you
    may have the most success if you follow one of the tutorials. If you jump into
    the middle of a tutorial in the hope of implementing just one specific feature,
    you may be less than successful until you are more comfortable with AWS.


    ## Creating a Project


    From the Get Started page shown in Figure [10-5](#459488_1_En_10_Chapter.xhtml#Fig5),
    you can start to build a simple app that integrates AWS and iOS. These are the
    steps to take.


    ### Note


    In the AWS documentation, you will find this startup information in several places,
    including How To, Get Started, Tutorials, and Reference. Until you are comfortable
    with the entire process as described in this chapter, you may want to try working
    with one of the sequences, as there are subtle differences in the sequences that
    can make it confusing to switch from one to the other.


    To begin with, choose the iOS platform as shown in Figure [10-5](#459488_1_En_10_Chapter.xhtml#Fig5).
    If you have not created a project (as shown in Figure [10-4](#459488_1_En_10_Chapter.xhtml#Fig4)),
    do so now and choose its platform.'
