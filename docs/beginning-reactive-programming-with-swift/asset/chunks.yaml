  trans: '

    # ReactiveX/RxSwift 与 Xcode 集成概览


    有多种方式可以将 Xcode 与 ReactiveX/RxSwift 集成。具体使用哪种方法取决于你的经验和偏好。你正在构建的应用类型并不如个人偏好重要。起点是
    ReactiveX/RxSwift 的 GitHub 仓库。第 11 章向你展示了如何下载它并使用其中的 Swift playground。你需要该仓库的一部分来与你自己的应用集成。使用
    GitHub 的好处之一是，它会随着人们的使用和修改而不断变化。因此，你看到的 GitHub 版本可能与本章描述的版本有所不同。


    GitHub 仓库中提供了多种用于与你自己的应用集成的技术。在撰写本书时（2018 年），可用的集成方法如下：


    -   `CocoaPods`，可在 [`cocoapods.org/`](http://cocoapods.org/) 获得。它旨在管理 Xcode 项目的源代码分发和依赖关系。

    -   `Carthage`，可在 [`github.com/Carthage/Carthage/releases`](https://github.com/Carthage/Carthage/releases)
    获得，它比 `CocoaPods` 与 Xcode 和 Swift 的集成更紧密，许多人认为它使用起来更简单一些。

    -   Swift Package Manager (`SPM`) 是 Swift 项目的一部分，可在 [`swift.org/package-manager/`](https://swift.org/package-manager/)
    获得。它与 Swift 的集成比 `CocoaPods` 或 `Carthage` 更彻底，但尚未像 `CocoaPods` 那样被广泛使用。


    在本章中，将基于存档文件，在不使用 `CocoaPods`、`Carthage` 或 `SPM` 的情况下，描述集成 GitHub 文件的过程。这对于初学者来说可能是一条更简单的路径。


    ## 从 RxSwift 下载开始


    如第 1 章所述，首先从 GitHub 下载当前版本的 `RxSwift`。关键步骤是从 GitHub 下载到 Xcode。图 13-1 提醒你这一步骤。将其下载到一个新文件夹中是最简单的。之后，你可以重新排列文件，但为确保你下载的内容能在你的
    Mac 和 Xcode 版本上构建和运行，请保持安装过程简单。


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig1_HTML.jpg](img/459488_1_En_13_Fig1_HTML.jpg)


    图 13-1 — 直接将 GitHub 的 `RxSwift` 代码下载到 Xcode


    你下载的文件看起来会有点像你在图 13-2 中看到的文件。请记住，这个存档在不断增长和变化，但基本结构是固定的。确保你拥有 `Rs.xcodeproj` 和
    `Rx.xcworkspace`。如果没有，说明你下载的存档不对。


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig2_HTML.jpg](img/459488_1_En_13_Fig2_HTML.jpg)


    图 13-2 — 下载 `RxSwift` 仓库


    ## 探索工作区和 Playground


    现在，用 Xcode 打开工作区（`Rx.xcworkspace`），如图 13-3 所示。你可能需要进行一些重新排列，并打开或关闭某些组。你通常会看到如图
    13-3 所示的内容：它是 `Rx.playground`。请特别注意窗口左侧的项目导航器。


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig3_HTML.jpg](img/459488_1_En_13_Fig3_HTML.jpg)


    图 13-3 — 打开 `Rx.workspace`，然后打开 `Rx.playground`


    关闭 playground 组，这样你在 `Package.swift` 中看到的第一个项目如图 13-4 所示。


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig4_HTML.jpg](img/459488_1_En_13_Fig4_HTML.jpg)


    图 13-4 — 关闭 playground


    ## 向 RxSwift 下载添加项目


    现在，向工作区添加一个项目。为了保持井井有条，最简单的方法是点击项目导航器底部的空白区域，这样你的新项目就会放在那里。（你以后可以重新排列它。）


    通过选择 **New（新建）** ➤ **Project（项目）** 来创建项目并选择模板，如图 13-5 所示。对于这个基本示例，**iOS** 选项卡中的
    **Single View App（单视图应用）** 是完美的。


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig5_HTML.jpg](img/459488_1_En_13_Fig5_HTML.jpg)


    图 13-5 — 选择新的项目模板


    与往常一样，当你点击 **Next（下一步）** 时，你需要为项目命名并将其定位到磁盘上。为简单起见，将其放在你下载 `RxSwift` 仓库时使用的同一文件夹中。将其命名为
    `Basic`，以匹配本书中的截图。项目导航器现在应该看起来像图 13-6 所示。


    创建项目时，**不要**使用 **Core Data**、**Unit Tests（单元测试）** 或 **UI Tests（UI 测试）**（在选项表底部有它们的复选框，如图
    13-6 所示）。


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig6_HTML.jpg](img/459488_1_En_13_Fig6_HTML.jpg)


    图 13-6 — 设置项目的名称和选项


    当提示选择存储新项目的位置时，将其放入 `Rx` 工作区和你想要的任何组中，如图 13-7 所示。


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig7_HTML.jpg](img/459488_1_En_13_Fig7_HTML.jpg)


    图 13-7 — 将新项目放入 `Rx` 工作区和任意组中


    将新项目（本例中为 `Basic`）拖到项目导航器的顶部或底部，以便于查找。


    > **提示：** 如果你想在添加项目之前为它创建一个新的空组文件夹，可以省去一个步骤，但对许多人来说，这似乎打乱了顺序。


    图 13-8 展示了现在的项目。


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig8_HTML.jpg](img/459488_1_En_13_Fig8_HTML.jpg)


    图 13-8 — 你现在的新项目已成为工作区的一部分


    如果你查看磁盘上的文件，你会看到你的项目在正确的位置，如图 13-9 所示。


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig9_HTML.jpg](img/459488_1_En_13_Fig9_HTML.jpg)


    图 13-9 — 检查新项目文件是否在正确的位置


    > **注意：** 确保文件在正确的位置。如果它们不在你的项目文件夹中，只要你不移动项目，一切都会运行得很好。当你将项目移动到其他地方（例如 MacBook）时，项目可能会损坏。只要记得，你可以单独移动新项目文件，但将整个项目保持在一起更容易。


    ## 构建你的 RxSwift 增强版项目


    在继续之前，确保你的项目能够构建和运行。（从模板创建项目时，这始终是一个好主意。）如图 13-8 所示，在窗口顶部，你可以为任何已安装的模拟器或设备构建和运行项目。当你在模拟器上运行时，你应该会看到如图
    13-10 所示的结果。（是的，图 13-10 就是你应该看到的：没有错误消息，也没有其他内容。在下一节中，你将看到如何添加一个标签来确认你的应用正在实际运行。）


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig10_HTML.jpg](img/459488_1_En_13_Fig10_HTML.jpg)


    图 13-10 — 此时你的项目应该可以运行了

