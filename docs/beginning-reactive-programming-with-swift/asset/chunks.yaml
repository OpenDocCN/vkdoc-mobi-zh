    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig15_HTML.jpg](img/459488_1_En_7_Fig15_HTML.jpg)


    图 7-15


    测试 Facebook 登录集成


    登录按钮现在应该可以工作了。尝试使用它，如图 7-16 所示。


    ![../images/459488_1_En_7_Chapter/459488_1_En_7_Fig16_HTML.jpg](img/459488_1_En_7_Fig16_HTML.jpg)


    图 7-16


    测试 Facebook 登录按钮


    你也可以用自己的 Facebook 账户进行测试。此外，你可以搜索 `developers.facebook.com` 来获取可用的测试账户，从而避免创建虚假账户或影响你自己的账户。


    ### 注意


    一些开发者会使用自己的账户测试登录，但使用 Facebook 测试账户来添加信息。


    ## 总结


    本章概述了如何集成 Facebook 和 iOS。具体细节可能时常变化，但总体思路基本保持不变。实际上，对于你可能想要集成到应用中的 Facebook 及其他框架的所有组件来说，情况都是如此。


    # 第四部分：在 Amazon Web Services 中存储数据


    # 8. 使用 Amazon Web Services 和 Cocoa


    在本书的第三至第五部分中，你将看到如何将第三方组件与 Cocoa 及其框架结合使用。这些组件可以是概念、标准或开源工具（如 `JSON`），也可以是特定工具，例如第三部分中描述的基于
    Facebook 的登录功能。


    本部分将介绍一个更为通用的工具：Amazon Web Services。（第五部分将介绍 `RxSwift`。）你将了解如何为你的应用创建一个 AWS 账户，安装来自
    AWS 的相应下载内容，以及如何将其与你的应用集成。AWS 集成的重点是数据管理，但你也可以将 AWS 用于其他目的。


    ## 组件对比


    `JSON` 是一种用于以简单方式读写结构化文本的工具。如今它非常普遍，许多语言、框架和环境（包括 Cocoa 和 Cocoa Touch）都支持使用 `JSON`
    进行读写。


    Facebook 登录工具（第三部分中描述）与 `JSON` 不同，它专为单一简单的目的而设计：验证用户凭据。与 `JSON` 和 Cocoa 及 Cocoa
    Touch 的紧密集成不同，Facebook 登录在 Cocoa 或 Cocoa Touch 一侧并没有集成：你只需将 Facebook 的一些方法、类或框架添加到应用中，然后
    Facebook 提供的类就会去验证凭据，并返回“是”或“否”来决定是否允许访问。（这只是一个简化的过程描述。）


    Amazon Web Services（AWS）是另一种不同类型的工具，具有不同的集成方式。它没有与 Cocoa 和 Cocoa Touch 显式集成。AWS
    的功能对大多数应用至关重要，并且可以通过多种不同的方式提供。这些功能可以通过你为应用编写的代码提供；通过 GitHub 或其他地方提供的众多框架或库中的代码提供；或者作为
    Cocoa 和 Cocoa Touch 一部分的代码和框架提供。AWS 成为应用的数据管理器，你需要在应用运行时与其持续交互（当然，这取决于应用的具体设计）。


    ### 注意


    在本章的其余部分，除非需要区分，否则 *Cocoa* 将用来指代 Cocoa 和 Cocoa Touch 两者。


    ## 将 AWS 与 Cocoa 结合使用


    如前所述，将 AWS 与 Cocoa 和 Cocoa Touch 集成有多种方式。最简单的方式是，你可以像使用 Facebook 登录工具或像使用开源工具、框架或
    `JSON` 这样的标准一样使用 AWS（更具体地说，是使用 AWS 的一个或多个组件）。在这些情况下，你需要考虑一个集成了 AWS 的 iOS 或 macOS
    应用。


    在另一个极端，你可以将 AWS（更具体地说，是一个、多个或许多组件）作为应用的核心。


    在这两种情况下，用户界面都被设想为使用 Cocoa 或 Cocoa Touch 构建。问题在于，应用基本功能的实现是在哪里完成的——是在 AWS 中还是在
    Cocoa 中？


    ### 注意


    你可以将应用的一部分功能放在 Cocoa 侧，而将其他部分功能放在 AWS 中。根据你的环境，将功能集中在一侧或另一侧可能是可取的，但这仅是个人观察，并非建议。


    本章的概述可能有助于你思考应用的可能性。有四个要点值得考虑：


    *   与他人共享数据

    *   跨平台使用数据

    *   发挥自身优势

    *   迎合用户期望


    以下各节将讨论这些要点。

    '
- fmt: "### Sharing Data with Others\n\nWhen you talk to people about apps, they commonly\
    \ think and talk about entering data on their phone and letting other people (or\
    \ themselves at other times) view and modify the data on another device—maybe\
    \ even on a PC sitting on a desktop half a world away.\n\nThat common scenario\
    \ that we all recognize is complicated to implement. Typically, the data is going\
    \ to be stored somewhere, and that \"somewhere\" cannot be solely on the phone\
    \ from which it originated, because it needs to be visible to people when the\
    \ phone is out of range or even powered off.\n\nOne of the most common ways of\
    \ storing this persistent data is in one of the cloud-based services, such as\
    \ `AWS`, `Box`, `Azure`, `Dropbox`, or `FileMaker` (version 17 or greater). You\
    \ can also use the web (particularly with HTML5) to store the data, but it must\
    \ be somewhere that is reachable.\n\n### Using Data Across Platforms\n\nThere\
    \ are many ways to store data that needs to be shared. People who have worked\
    \ with data of all kinds and on all types of projects commonly agree that changing\
    \ a data-management strategy is not easy, and it gets more complicated as more\
    \ and more data becomes involved, as is the case with an old system. Too often,\
    \ people skip over the \"magic\" that they expect to happen automatically to the\
    \ data.\n\nWith the exception of a project that does not store any data—and never\
    \ will—it's worth thinking about how data will be shared. Here are some of the\
    \ basic considerations and suggestions for how you might approach the data-management\
    \ issue. Planning for data-management strategies that will only be implemented\
    \ in the future is far, far better than leaving it to chance (or \"magic\"). In\
    \ other words, you don't have to do it at the start, but you have to have at least\
    \ one plan for managing data in the future, even if that plan is to revisit the\
    \ issue in the future. Just make certain it's a revisit and not a first visit\
    \ to the idea of data management.\n\n### Note\n\nThis section focuses on data,\
    \ but it is now possible to move some or more of an app's processing to the cloud.\
    \ In fact, the distinction between data and processing is hard to define in many\
    \ cases because one can frequently be converted to the other.\n\nThe basic data\
    \ scenarios and possible solutions are as follows:\n\n- **None**. No data is stored\
    \ and never will be.\n\n- **One user/device**. Data is stored only for one user\
    \ and one device. This is generally a special case for temporary data. It would\
    \ apply to a calculator app that remembers its last total (just as calculators\
    \ do). You can use the Cocoa `UserDefaults.standard` to store relatively small\
    \ amounts of data on the device.\n\n  \"Relatively small amounts\" has grown over\
    \ time, but Apple's documentation indicates that it depends on the device. This\
    \ makes sense because devices get more and more storage over time. Reports of\
    \ 4 GB being stored are found in web discussions.\n\n  The data may be backed\
    \ up with normal backups of the device (if they are turned on by the user).\n\n\
    - **One user/multiple iOS devices**. This scenario is easiest to implement with\
    \ the user's Apple ID and iCloud. There is a limit to the amount of space available,\
    \ which depends on what iCloud data plan the user subscribes to and how much other\
    \ data is being stored.\n\n  The iCloud data is backed up automatically as part\
    \ of the iCloud service. Nevertheless, if one of the devices is not reachable,\
    \ its data may not be uploaded to iCloud in a timely manner, and, unless the app\
    \ properly handles iCloud conflicts (as with user resolution of conflicts), the\
    \ data may not be what you and the user think it should be.\n\n- **Multiple users/multiple\
    \ iOS devices**. `CloudKit` is a good tool for handling this situation. Because\
    \ it relies on iCloud, backups are done automatically.\n\n- **Multiple users/multiple\
    \ devices (or one user with only a non-iOS device)**. This case is usually best\
    \ served with an on-demand cloud service such as `AWS`, `Box`, `Dropbox`, `Google\
    \ Drive`, `OneDrive`, or similar. Backups are part of the service.\n\n  Not all\
    \ apps need on-demand storage, but that is a feature available from most of the\
    \ services mentioned here.\n\n### Playing to Your Strengths\n\nWith the availability\
    \ of cloud-based computing as well as data, you can choose where to put each one.\
    \ In the previous section, there were some suggestions with regard to data, but\
    \ with any project it makes sense to make your choices not just on technical grounds,\
    \ but also with consideration given to the skills and strengths of your developers,\
    \ whether it is a team of 50 or just yourself.\n\n### Playing to Your Users' Expectations\n\
    \nWhen it comes to users' expectations of shared data, the word \"overused\" is\
    \ not far from the mark for unrealistic expectations. But there's another expectation\
    \ that is just as dangerous: an expectation that shared data will be structured\
    \ and shared using the latest and greatest technology from the age of mainframe\
    \ computers and sometimes even from the age of punched cards. Data structures\
    \ have a very long life span. In part, that is the result of what is sometimes\
    \ called \"the drag of the installed base\"—the need to keep things running even\
    \ though times and capabilities have changed.\n\nOne benefit of using shared-data\
    \ tools such as `AWS` is that you and your users may be confronted with technologies\
    \ and interfaces that may be new to you all."
