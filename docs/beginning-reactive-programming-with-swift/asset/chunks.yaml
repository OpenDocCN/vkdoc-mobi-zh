  trans: '

    # 从 GitHub 安装 RxSwift


    GitHub 是当今大多数代码的默认代码仓库，包括许多协作和开源项目。你可以注册一个私有 GitHub 账户（许多公司和个人都这样做），但私有 GitHub
    账户拥有与公共账户几乎相同的功能。


    ## 提示


    GitHub 上的项目以源代码*仓库*（通常称为 *repos*）的形式存在。


    在 Xcode 9 中，GitHub 和源代码控制功能整体上比以往任何时候都更紧密地集成到了 Xcode 中。因此，如果你有早于 Xcode 9 的 RxSwift
    下载说明，可能会被引导使用比实际需要更复杂的流程。本书使用 Xcode 9 的集成功能，向你展示一种将 RxSwift 集成到 Xcode 项目中的非常简单的方法。


    登录 `github.com`，并使用窗口顶部的搜索字段搜索 `RxSwift`，如图 11-1 所示。请记住，GitHub 是一个动态更新的存档，因此你下载的文件可能会随着时间而变化。整个
    GitHub 站点会定期更新，但功能保持不变。


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig1_HTML.jpg](img/459488_1_En_11_Fig1_HTML.jpg)


    图 11-1


    从 GitHub 下载 RxSwift


    如果你已安装 Xcode，右侧的“Clone or download”（克隆或下载）按钮将提供选项，让你将其下载并打开到桌面，或作为 ZIP 文件下载。Xcode
    9 新增了“在 Xcode 中打开”的选项（但要使用此选项，你必须在 Xcode ➤ 偏好设置 ➤ 帐户中输入你的 GitHub 账户凭据）。请选择 Xcode
    选项。（如果你没有看到该选项，请确保 Xcode 已安装并正在运行，并且你已在 Xcode 偏好设置中输入了凭据。）


    当你选择在 Xcode 中打开代码仓库时，系统会请求你的权限，如图 11-2 所示。


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig2_HTML.jpg](img/459488_1_En_11_Fig2_HTML.jpg)


    图 11-2


    同意让 Xcode 打开仓库


    RxSwift Playground 是下载内容的一部分。你从它开始，因为当你首次运行它时，在你遵循本书下一节中的说明时，你下载的文件将会被构建。在你下载的文件中，会包含
    `Rx.xcworkspace`。一个工作区可以包含多个 Xcode 项目，这里正是这种情况。请确保你打开的是 `Rx.xcworkspace`（工作区），而不是其中包含的项目（`Rx.xcodeproj`）。


    RxSwift 遵循 MIT 许可证。下载按钮正上方的 MIT 图标详细显示了该许可证，如图 11-3 所示。与所有此类许可证一样，请查看其条款，但请注意，你拥有很大的自由来使用
    RxSwift。


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig3_HTML.jpg](img/459488_1_En_11_Fig3_HTML.jpg)


    图 11-3


    查看 MIT 许可证


    ## 使用 RxSwift Playground


    下载完成后，显示项目导航器，如图 11-4 所示。你可能需要打开 `Rx` 文件夹及其中的 `Rx.playground` 文件夹。选择 `Table_of_Contents`，如图
    11-4 所示。


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig4_HTML.jpg](img/459488_1_En_11_Fig4_HTML.jpg)


    图 11-4


    使用 `Rx.Playground`


    从 `Rx.playground` 文件夹中选择 `RxSwift-macOS`，并按图 11-4 所述进行构建。然后你就可以继续了。（请注意，步骤 2 允许你使用
    `RxSwift-macOS` 方案构建 playground。更多信息请参见后续页面。）


    ### 查看格式化的 Playground


    Playground 支持标记代码，现在是快速探索它的好时机。默认情况下，你会看到文件中的标记（如图 11-5 和 11-6 所示）。


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig6_HTML.jpg](img/459488_1_En_11_Fig6_HTML.jpg)


    图 11-6


    在原始代码和标记之间切换


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig5_HTML.jpg](img/459488_1_En_11_Fig5_HTML.jpg)


    图 11-5


    默认情况下，你会看到 playground 标记


    如果你想查看原始代码，可以使用“编辑器”➤“显示原始标记”，如图 11-5 所示。执行此操作后，你将看到原始代码，如图 11-6 所示。比较这两张图片以查看差异。


    不用担心这一点。当你构建自己的 playground 时，使用标记会很有用，但并非必须如此。如果你想探索 playground 的标记，可以在[`https://developer.apple.com/library/content/documentation/Xcode/Reference/xcode_markup_formatting_ref/index.html#//apple_ref/doc/uid/TP40016497`](https://developer.apple.com/library/content/documentation/Xcode/Reference/xcode_markup_formatting_ref/index.html#//apple_ref/doc/uid/TP40016497)
    的 Markup Formatting Reference 中找到更多信息。请注意，该文档涵盖了 Quick Help 和 Swift Playgrounds
    的标记，因此某些格式化仅适用于其中之一。


    按照图 11-4 所示的说明进行操作。如图 11-7 所示打开 Rx 项目。


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig7_HTML.jpg](img/459488_1_En_11_Fig7_HTML.jpg)


    图 11-7


    打开 Rx 目标


    使用工作区窗口顶部的方案菜单选择一个 `RxSwift-macOS` 目标，如图 11-8 所示。


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig8_HTML.jpg](img/459488_1_En_11_Fig8_HTML.jpg)


    图 11-8


    选择方案


    Playground 让你可以用实时代码进行实验。暂时不要担心语法的作用；只需添加一个 `print` 语句，如图 11-9 所示。当你向 playground
    添加新行（甚至是空行）时，它们会被自动编号。


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig9_HTML.jpg](img/459488_1_En_11_Fig9_HTML.jpg)


    图 11-9


    向 Introduction playground 添加代码

    '
- fmt: '### Tip


    You can add code to a playground whether or not markup is shown.


    At the bottom of the playground window you can see the *debug area*, which displays
    output from the playground. (If you don’t see it, choose View ➤ Debug Area ➤ Show
    Debug Area.) As you type, the playground will track your key strokes to identify
    errors. In Figure [11-10](#459488_1_En_11_Chapter.xhtml#Fig10) you can see an
    error message that may appear as you are typing. Error messages like this will
    appear and disappear as you type and the playground analyzes your code (and possible
    errors).


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig10_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig10_HTML.jpg)


    Figure 11-10


    The playground watches for errors


    You can experiment with additional code, as shown in Figure [11-11](#459488_1_En_11_Chapter.xhtml#Fig11).


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig12_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig12_HTML.jpg)


    Figure 11-12


    Explore the playground with your own code


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig11_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig11_HTML.jpg)


    Figure 11-11


    The playground can catch errors quickly


    If you remove any code you have added, you should be back to the original playground,
    as shown in Figure [11-13](#459488_1_En_11_Chapter.xhtml#Fig13).


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig13_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig13_HTML.jpg)


    Figure 11-13


    Revert to the original playground


    ## Summary


    You should now have RxSwift installed in Xcode. You can reference it from a playground
    or from regular Swift code in your app. When you want to add RxSwift to another
    playground or Xcode project, just follow the same steps you have seen here.


    You’ll see this in action later in the book, but first it’s time to look at what’s
    happening behind the scenes in RxSwift.


    # 12. Thinking Reactively


    This chapter will help you put the concept of reactive programming in context
    with other programming styles, patterns, and paradigms. In the simplest non-jargon
    description, reactive programming is programming that makes it possible to easily
    handle modern software projects and apps that are likely to involve multiple users
    working at the same time with the same data.


    Half a century ago it was possible to think of programming in the style of Hello
    World (the first program many people learned in classes). In Hello World, you
    type in a few lines of code (one to three, depending on formatting), and the program
    displays or prints the text, “Hello World.”


    More sophisticated programs in this vein allow users to interact with a Hello
    World program by typing in a word or phrase that the program will work with. Thus,
    the transcript of a sophisticated version of Hello World might look like this:


    ```

    Good Morning. What is your name?

    Jesse

    Good Morning, Jesse

    ```


    The sophistication of the program lies not only in the fact that the user can
