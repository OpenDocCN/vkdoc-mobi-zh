  trans: "\n### 设置后端\n\n下一步是设置后端，它将负责管理 iOS 与 AWS 之间的集成。如果你在图 10-5 所示的界面上点击了“添加”，那么你应该已经准备好设置后端了，如图\
    \ 10-6 所示。\n\n![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig6_HTML.jpg](img/459488_1_En_10_Fig6_HTML.jpg)\n\
    \n图 10-6\n\n设置你的后端\n\n按图 10-6 所示，通过下载 Cloud Config 来设置后端，以配置云连接。然后，点击“下一步”。\n\n\
    图 10-7 展示了一个在下载后端之后的基本 iOS Xcode 应用——它可以是您自己创建的应用，也可以是一个入门套件或教程应用。（相关文件应在您的 `Downloads`\
    \ 文件夹中。）项目中的文件应该对您来说很熟悉。（默认情况下，入门套件可能命名为类似 `aws-mobile-ios-notes-tutorial-master`\
    \ 的名字。）\n\n![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig7_HTML.jpg](img/459488_1_En_10_Fig7_HTML.jpg)\n\
    \n图 10-7\n\n下载配置文件\n\n在您的 `Downloads` 目录中查找一个名为 `awsconfiguration.json` 的已下载文件。从\
    \ Xcode 的项目导航器中，选择您的应用，然后点击“添加文件”，如图 10-8 所示，以添加已下载的文件。\n\n![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig8_HTML.jpg](img/459488_1_En_10_Fig8_HTML.jpg)\n\
    \n图 10-8\n\n将下载的后端添加到您的项目中\n\n您的项目现在应该如图 10-9 所示，其中已添加了 `awsconfiguration.json`\
    \ 文件。（使用 Xcode 的“添加文件”命令比使用访达更容易确保您的项目文件放置在正确的位置。）\n\n![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig9_HTML.jpg](img/459488_1_En_10_Fig9_HTML.jpg)\n\
    \n图 10-9\n\n使用 Xcode 将配置文件添加到您的项目中\n\n### 添加 Pods\n\n如果您尚未为当前项目或其他项目安装 CocoaPods，那么现在需要安装它。为此，请使用终端并输入以下命令：\n\
    \n```\nsudo gem install cocoapods\n```\n\n无需为此命令指定特定的目录。\n\n将终端的目录切换到您应用的文件夹。最简单的方法是启动终端，输入\
    \ `cd`，然后将 `aws-mobile-ios-notes-tutorial-master` 文件夹拖入终端以完成 `cd`（更改目录）命令。\n\n\
    更改目录后，在终端中输入以下命令：\n\n```\npod init\n```\n\n您的 Podfile 将使用相应的 pods 创建。每当您修改 Podfile\
    \ 时，请使用以下终端命令进行安装：\n\n```\npod install -- repo-update\n```\n\n这将把项目移入一个 Xcode\
    \ 工作区，如第 3 章所述。\n\n在 Xcode 中时，请检查您应用的“通用”设置，如图 10-10 所示。您可能会看到与签名和配置文件设置相关的错误。请将包标识符和团队更改为您自己的设置。\n\
    \n![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig10_HTML.jpg](img/459488_1_En_10_Fig10_HTML.jpg)\n\
    \n图 10-10\n\n更改您应用的设置\n\n现在您应该能够构建并运行您的应用了。如图 10-11 所示，pods 将下载必要的组件。下载和构建可能需要几分钟时间，请耐心等待。\n\
    \n![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig11_HTML.jpg](img/459488_1_En_10_Fig11_HTML.jpg)\n\
    \n图 10-11\n\n为 AWS 安装 CocoaPods\n\n### 注意\n\n在应用构建过程中，您可能会注意到一些错误消息。请等待构建完成，因为这些错误可能会在后续组件下载完成后消失。\n\
    \n## 总结\n\n本章向您展示了如何开始组合您的 AWS/iOS 应用。在下一章中，您将开始实际使用集成后的应用。\n\n# 第五部分 使用 RxSwift\n\
    \n# 11. 进入代码\n\n世界上有两种类型的开发者：一种是想先接触代码，然后再了解其工作原理；另一种是想先了解事物如何运作，然后再接触代码。有趣的是，同一位开发者可能会根据需要或为了寻求变化，在两种模式之间切换。\n\
    \n如果您想从背景信息开始，请先阅读第 12 章“响应式思维”，然后再回到本章。或者，您可以继续阅读本章，先了解一些非常基础的 RxSwift 代码，然后再阅读第\
    \ 12 章。\n\n在本章中，您将了解使用 RxSwift 的基础知识：\n\n*   **入门** 将向您介绍硬件和软件方面的要求。\n*   **从\
    \ GitHub 安装 RxSwift** 将指导您完成下载和安装过程。\n*   **使用 RxSwift Playground** 将向您展示如何在 Swift\
    \ Playgrounds 中编写您的第一个 RxSwift 代码。\n\n### 提示\n\n如果您之前没有使用过 Swift Playgrounds，本书提供的基础知识足以让您上手。不过，您可以在\
    \ *Learn Computer Science with Swift: Computation Concepts, Programming Paradigms,\
    \ Data Management, and Modern Component Architectures with Swift and Playgrounds*\
    \ 和 *Exploring Swift Playgrounds: The Fastest and Most Effective Way to Learn\
    \ to Code and to Teach Others to Use Your Code* 这两本书中学到更多。这两本书均由 Jesse Feiler\
    \ 编写，并由 Apress 出版。\n\n## 入门\n\n需要了解的最基本的入门知识是：\n\n*   RxSwift 本身是 Swift 响应式编程库的一个开源实现。您可以从\
    \ GitHub 免费下载（本章将介绍具体步骤）。\n*   响应式编程让您可以轻松处理异步操作。\n*   为了实现这种范式，响应式编程使用了一些基本术语：\n\
    \    *   *可观察序列 (Observables)* 是可以被观察的项目。当它们发生变化时，这些变化对于*订阅 (subscribe)* 了该可观察序列的组件来说是可见的。\n\
    \    *   *观察者 (Observers)* 负责观察可观察序列。\n\n这些术语和概念将在本书的第 12 章及后续章节中进一步探讨。\n\n另一件需要从一开始就知道的事情是，响应式编程范式通常被称为\
    \ *Rx*。\n\n有了这些基础知识，您现在已具备开始使用 RxSwift 的足够认知。您需要具备以下条件：\n\n*   一台运行 Xcode 9 或更高版本的\
    \ Mac。Xcode 9 是用于在 iOS 和 macOS 上开发应用的集成开发环境（IDE）。它也是 Apple 工程师用来构建 iOS 和 macOS\
    \ 自身的工具。Xcode 可以从 Mac App Store 免费下载。请查看 Xcode 的系统要求：这些也是您使用 RxSwift 所需满足的要求。\n\
    *   一个互联网连接，以便您登录 GitHub。如果没有，您可以先在便携式电脑或驱动器上从 GitHub 完成下载，然后将下载的文件复制到您的 Mac 上。\n"
- fmt: '# Installing RxSwift from GitHub


    GitHub is the default repository for most code today, including many collaborative
    and open source projects. You can register for a GitHub account that is private
    (many companies and individuals do this), but a private GitHub account has most
    of the same features as a public one.


    ## Tip


    Projects on GitHub are in source code *repositories* (often referred to as *repos*).


    With Xcode 9, GitHub and source control in general are integrated more tightly
    with Xcode than ever before. As a result, if you have download instructions for
    RxSwift that pre-date Xcode 9, you may be directed to use a more complicated process
    than is necessary. This book uses the Xcode 9 integration and shows you a very
    simple way of integrating RxSwift with your Xcode projects.


    Log on to `github.com` and search for `RxSwift` using the search field at the
    top of the window, shown in Figure [11-1](#459488_1_En_11_Chapter.xhtml#Fig1).
    Remember that GitHub is a dynamically updated archive, so the files you download
    may differ over time. Periodically, the entire GitHub site is updated, but the
    functionality remains the same.


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig1_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Download RxSwift from GitHub


    If you have Xcode installed, the Clone or download button at the right will give
    you the options to download and open it either on your desktop or as a ZIP file.
    New in Xcode 9 is the option to open it in Xcode (but to use this option, you
    must enter your GitHub account credentials in Xcode ➤ Preferences ➤ Accounts).
    Choose the Xcode option. (If you don’t see it, make sure that Xcode is installed
    and running and that you have entered your credentials in Xcode preferences.)


    When you choose to open the code repository in Xcode, you’ll be asked for permission,
    as you can see in Figure [11-2](#459488_1_En_11_Chapter.xhtml#Fig2).


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig2_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Agree to let Xcode open the repository


    The RxSwift playground is part of the download. You start with it because the
    first time you run it, your downloaded files will be built as you follow the instructions
    in the following section of this book. Among the files that you have downloaded
    will be `Rx.xcworkspace`. A workspace can contain multiple Xcode projects, which
    is the case with this one. Make sure you open `Rx.xcworkspace` (the workspace)
    and not the project contained within it (`Rx.xcodeproj`).


    RxSwift is covered by the MIT license. The MIT icon just above the download buttons
    shows you that license in detail, as you can see in Figure [11-3](#459488_1_En_11_Chapter.xhtml#Fig3).
    As with all such licenses, review it to see what the terms are, but know that
    you have a great deal of freedom to use RxSwift.


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig3_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Review the MIT license


    ## Using the RxSwift Playground


    With the download completed, show the project navigator, as you can see in Figure
    [11-4](#459488_1_En_11_Chapter.xhtml#Fig4). You may have to open the `Rx` folder
    and the `Rx.playground` folder within it. Select `Table_of_Contents`, as shown
    in Figure [11-4](#459488_1_En_11_Chapter.xhtml#Fig4).


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig4_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Use `Rx.Playground`


    Select `RxSwift-macOS` from the `Rx.playground` folder and build it as described
    in Figure [11-4](#459488_1_En_11_Chapter.xhtml#Fig4). You’re ready to go on. (Note
    that step 2 lets you build the playground using the `RxSwift-macOS` scheme. There
    is more information on this in the following pages.)


    ### Looking at a Formatted Playground


    Playgrounds support markup code, and now is a good time to quickly explore that.
    By default, you will see the markup in the file (as shown in Figures [11-5](#459488_1_En_11_Chapter.xhtml#Fig5)
    and [11-6](#459488_1_En_11_Chapter.xhtml#Fig6)).


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig6_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    Switch between raw code and markup


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig5_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    By default, you see the playground markup


    If you want to look at the raw code, you can use Editor ➤ Show Raw Markup, as
    illustrated in Figure [11-5](#459488_1_En_11_Chapter.xhtml#Fig5). After you do
    that, you’ll see the raw code, which is shown in Figure [11-6](#459488_1_En_11_Chapter.xhtml#Fig6).
    Compare the two images to see the difference.


    Don’t worry about this. When you’re building your own playgrounds it’s useful
    to use markup, but you don’t have to do so. If you do want to explore markup for
    playgrounds, there is more information in the Markup Formatting Reference at [`https://developer.apple.com/library/content/documentation/Xcode/Reference/xcode_markup_formatting_ref/index.html#//apple_ref/doc/uid/TP40016497`](https://developer.apple.com/library/content/documentation/Xcode/Reference/xcode_markup_formatting_ref/index.html#//apple_ref/doc/uid/TP40016497).
    Note that the document covers markup for Quick Help as well as for Swift Playgrounds,
    so some formatting is only available to one or the other.


    Follow the instructions shown in Figure [11-4](#459488_1_En_11_Chapter.xhtml#Fig4).
    Open the Rx project as shown in Figure [11-7](#459488_1_En_11_Chapter.xhtml#Fig7).


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig7_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Open the Rx targets


    Use the scheme menu at the top of the workspace window to select an `RxSwift-macOS`
    destination, as you can see in Figure [11-8](#459488_1_En_11_Chapter.xhtml#Fig8).


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig8_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig8_HTML.jpg)


    Figure 11-8


    Select the scheme


    The playground lets you experiment with live code. Don’t worry for now about what
    the syntax does; just add a `print` statement, as shown in Figure [11-9](#459488_1_En_11_Chapter.xhtml#Fig9).
    As you add new lines (even blank lines) to the playground, they will be numbered
    automatically.


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig9_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig9_HTML.jpg)


    Figure 11-9


    Add code to the Introduction playground'
