    # 审视 iOS 与 macOS 的构建模块


    本部分介绍的构建模块均采用 Swift 和 Objective-C 语言为 iOS 与 macOS 构建，并使用了诸如 iOS 的 `UIKit` 和 macOS
    的 `AppKit` 及其配套 API。本节将对这些构建模块进行简要概述；更多信息请查阅 `developer.apple.com`。


    ## 扩展


    Swift 中的扩展让你能为现有类、结构体、枚举或协议类型添加功能。你可以在 `developer.apple.com` 上的 *在自定义视图中采用拖放*
    示例代码中找到一个例子。拖放功能在协议中定义（关于协议和委托的更多信息，请参见下一节），并在扩展中实现。


    在图 1-1 中，你可以看到一个使用了 *在自定义视图中采用拖放* 示例代码的应用。在这个例子中，基类是一个自定义视图控制器（`PersonnelViewController`）。定义了一个扩展如下：


    ```

    extension PersonnelViewController: UIDragInteractionDelegate {

    ```


    每个扩展都位于一个引用基类（即要被扩展的类）的文件中。如图 1-1 所示，这些文件的名称是：


    ![../images/459488_1_En_1_Chapter/459488_1_En_1_Fig1_HTML.jpg](img/459488_1_En_1_Fig1_HTML.jpg)


    图 1-1

    在 Swift 类中使用扩展


    ```

    PersonnelViewController+Drag

    PersonnelViewController+Drop

    ```


    在运行时，你可以像引用类的元素一样来引用扩展中的函数和其他成员。


    扩展可以添加到那些你仅有 API 而无源码的基类和其他结构体中。


    ## 委托与协议


    委托和协议协同工作。在类或其他结构体的声明中，你会看到声明中的超类（如果有的话），如下面这个 iOS 中 `UIDocument` 子类的声明所示：


    ```

    class MyDocument: UIDocument {

    ```


    协议可以定义一系列函数，这些函数将在任何遵循该协议的类中实现。与扩展添加到基类不同，协议定义了*你*将要添加到基类中的代码。


    委托通常与协议配合使用，使得协议代码的实现不被放置到基类中；相反，它被放置在一个名为*委托*的单独文件中。实现该协议的具体文件通常被分配给基类中一个名为 *delegate*
    的字段。


    ## 框架


    如果你经常使用 iOS 或 macOS，你很可能已经熟悉了基本框架，例如 `AppKit`（macOS）和 `UIKit`（iOS），以及一些较小的框架如
    `AddressBook`。框架可以包含函数和属性。你可以通过 `import` 语句将它们添加到 Swift 项目中；在使用 Objective-C 时，你可以使用
    `#import` 或 `#include` 语句。（在 Objective-C 中，`#import` 指令会导入框架一次；而 `#include` 可能会导入多次。）


    # 利用构建模块进行开发


    你可以在 Xcode 项目中使用委托、协议、扩展和框架。你可以通过工作区来组合多个项目，也可以使用其他工具来组合多个组件。本节将同时介绍工作区以及构建模块的组合方式。


    ## 使用工作区


    通过工作区，Xcode 会负责管理构建你希望构建的工作区内的任意目标。各个目标可以共享工作区中的元素，并根据需要将它们用于构建不同的目标（例如，使用同一个工作区构建
    iOS 和 watchOS 的目标）。


    ## 组合使用构建模块进行开发


    来自 Apple 的构建模块（框架、协议、委托以及扩展）通常提供了一种简洁而优雅的方式来扩展和深化你的代码。然而，在某些情况下，单个功能需要同时使用多个构建模块——例如，某个功能可能需要安装一个非常庞大的框架，以及十几个较小的（但相关的）框架。协议和委托如今在许多结构中已司空见惯，而扩展也同样可能被加入到组合中。因此，使用共享代码来实现新功能可能需要在你的代码库中进行大量添加。


    需要向应用添加多个构建模块的情况很常见，而且可能难以管理。有几种工具可以帮助你管理此类组合。这些工具使用一种结构来组织对应用的修改，以便脚本或其他工具能够在正确的位置和正确的顺序下应用这些修改。其中最广泛使用的工具之一是
    `CocoaPods`，这是第 2 章的主题。


    如今，GitHub 已成为使用最广泛的代码共享工具和网站，并且它与大多数包管理器集成在一起。因此，当你运行包管理器时，系统会自动为你下载复杂构建模块的最新
    GitHub 版本。


    像 `CocoaPods` 这样的包管理器会使用自己的代码和脚本来执行集成。为此，它们——以及你——必须使用一些命令行代码。如果你习惯了 macOS 和 Finder，你可能不经常使用命令行。别担心——这些产品隐藏了大部分语法细节。不过，对于确实需要从命令行访问文件或文件夹的情况，以下部分将提供一些技巧。'
- fmt: '# Command-Line Integration


    `Terminal`, which is automatically installed as part of macOS, is the app that
    gives you access to the command line. When you launch it, you will see the basic
    screen shown in Figure 1-2.


    ![../images/459488_1_En_1_Chapter/459488_1_En_1_Fig2_HTML.jpg](images/459488_1_En_1_Chapter/459488_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Use `Terminal` to access the command line.


    The first line shows you the date and time of the last login. On the second line,
    you can see the name of the computer you are using. You then see the identifier
    of the user you are running, and a symbol such as `$` marks the end of the automatically
    generated text. You type your command after that.


    ### Note


    You can customize the formatting of lines in `Terminal`.


    In Figure 1-3, you can see the first command entered into `Terminal`. It is the
    list command (the code is `ls`).


    ![../images/459488_1_En_1_Chapter/459488_1_En_1_Fig3_HTML.jpg](images/459488_1_En_1_Chapter/459488_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Enter the `ls` command.


    In a command-line interface, you deal with only one line at a time. You cannot
    copy or paste into previous lines of code, but you can backspace on the line you’re
    editing. You end the line with a Return character, and the command is executed.


    The results of the `ls` command are shown in the `Terminal` window, as you can
    see in Figure 1-4.


    ![../images/459488_1_En_1_Chapter/459488_1_En_1_Fig4_HTML.jpg](images/459488_1_En_1_Chapter/459488_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Results of the `ls` command in `Terminal`.


    If you look at the same directory in the Finder, you’ll see the data as shown
    in Figure 1-5. The fact that the files may be in a different order doesn’t matter.
    Note, too, that some files that are normally invisible in the Finder may show
    up in `Terminal`.


    ![../images/459488_1_En_1_Chapter/459488_1_En_1_Fig5_HTML.jpg](images/459488_1_En_1_Chapter/459488_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Files in Finder.


    There’s one other command that you may need to use when you’re working with `Terminal`:
    You can change which directory you are in by typing `cd`. You can then type in
    the name of the directory you want to use, or you can drag and drop a directory
    from the Finder onto the line in `Terminal` that you have started by typing `cd`.
    The text representation of that directory will be placed into the line of `Terminal`
    code. As soon as you press Return, the directory will be changed.


    ## Summary


    Xcode has a variety of tools that you can use (along with Objective-C and Swift)
    to build complex apps with reusable code, saving you development and debugging
    time. This chapter has provided a brief overview to get you started.


    For more information, use your standard online resources as well as the discussion
    boards on `developer.apple.com`. For now, it’s time to move on to the package
    managers.


    # Using CocoaPods


    CocoaPods is a tool for managing multiple components in an Xcode project. The
    basic overview is that you create your Xcode project as usual. You then run CocoaPods
    to place your Xcode project into a new workspace that it creates. Next to your
    project in your workspace are various CocoaPods with the updates you want to install.


    CocoaPods can download the updates as needed from a GitHub repository, so you
    don’t need to worry about doing that yourself. The CocoaPods tool keeps the versions
    of these public updates for you, but you can also create your own private repository
    if you don’t need or want to share it.


    You are responsible for managing a `podfile`, which identifies the updates to
    be installed. The `podfile` is the link between your original project and the
    updates that you install (and which CocoaPods can reinstall as needed).


    This chapter will provide a quick overview of the CocoaPods process, with plenty
    of step-by-step illustrations. For more information, check out the CocoaPods site
    and documentation at [`cocoapods.org`](http://cocoapods.org). For even more specific
    information, check out the Facebook and RxSwift chapters in this book; both Facebook
    and RxSwift are installed with CocoaPods.


    ## Install CocoaPods


    This is a one-time task for you to do on your development computer. Launch `Terminal`
    to get to the command line. Install CocoaPods with this line:


    ```

    sudo gem install cocoapods

    ```


    You’ll need to provide your system password. There are alternative ways of installing
    CocoaPods that you can find on the website, but this is the most straightforward
    for most people.


    Finish setup on the command line by entering:


    ```

    pod setup

    ```


    You will see some status information that ends with:


    ```

    Setup completed

    ```


    You’re ready to continue.'
