- fmt: '# Looking at AWS Accounts and the Root User


    You get to AWS at `aws.amazon.com`. You can browse some of the features and documentation
    as described in Chapter 8, but to do anything more (such as using AWS in an app),
    you need to log in.


    **Note:** The logins described in this chapter are developer logins that let you
    build your AWS assets. Once they are built and deployed with your app, users log
    in to your app on their own, or—in many cases—your app logs in without a user’s
    intervention.


    You can create a new AWS account from many locations on `aws.amazon.com`—just
    look for the "Create a new AWS account" link (wording, of course, may change over
    time). The portal shown in Figure 9-1 appears.


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig1_HTML.jpg](images/459488_1_En_9_Chapter/459488_1_En_9_Fig1_HTML.jpg)


    **Figure 9-1** Create a new AWS account


    The process of creating a new account is pretty straightforward. As the little
    info button next to the "AWS account name" field will tell you, you can select
    an account name now and change it later. The identifier for your AWS account is
    not normally visible—your email address is linked to it, and that is changeable,
    as is the password.


    Once you have an account, you can log in as shown in Figure 9-2.


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig2_HTML.jpg](images/459488_1_En_9_Chapter/459488_1_En_9_Fig2_HTML.jpg)


    **Figure 9-2** Log in as root user


    The root user is just that—the root user for the account. As you will see, you
    can have other users associated with your account. You do that by logging in as
    root and then setting up additional access accounts. This allows you to have multiple
    accounts within your overall account without jeopardizing security.


    **Note:** As is always the case with a root user or superuser, do not use that
    login for anything other than true root or superuser actions, such as adding or
    deleting other users.


    As you can see in Figure 9-3, you can access your account as soon as it is even
    partially set up. Use the "My Account" drop-down menu to do so.


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig3_HTML.jpg](images/459488_1_En_9_Chapter/459488_1_En_9_Fig3_HTML.jpg)


    **Figure 9-3** Access your account with the root login


    If you have not yet completed your signup, selecting any of the items in My Account
    will ask you to sign in using the portal shown in Figure 9-3.


    If you select an item that relates to AWS Identity and Access Management (IAM),
    you will see the guidance in Figure 9-4 directing you to IAM.


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig4_HTML.jpg](images/459488_1_En_9_Chapter/459488_1_En_9_Fig4_HTML.jpg)


    **Figure 9-4** You are warned about using the AWS account


    If you continue to an area such as Security Credentials for the account (rather
    than settings for an IAM user), you are allowed to do so, as you can see in Figure
    9-5.


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig5_HTML.jpg](images/459488_1_En_9_Chapter/459488_1_En_9_Fig5_HTML.jpg)


    **Figure 9-5** Configure settings for the account with the root login


    # Creating Organizations


    You can create an AWS account, which has a root login (as do all AWS accounts).
    You can then add individuals to it. You can also create an organization, which
    consists of several AWS accounts. Do this from the account menu at the top right.
    It will have your account name. You have seen the account name (champlainarts)
    at the top right of Figure 9-5 and again in Figure 9-6.


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig6_HTML.jpg](images/459488_1_En_9_Chapter/459488_1_En_9_Fig6_HTML.jpg)


    **Figure 9-6** Create an organization from your account menu


    # Working with IAM


    Because it is a best practice to not use the root user login, you may wonder how
    you use AWS. The answer is to use the built-in Identity and Access Management
    (IAM) tools. When you are fully logged in, you''ll see a Services menu at the
    top left of the view, as shown in Figure 9-7.


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig7_HTML.jpg](images/459488_1_En_9_Chapter/459488_1_En_9_Fig7_HTML.jpg)


    **Figure 9-7** Browse Services


    **Note:** Explore the various links in Services to find the options and your history.
    The items you will see include recently viewed items, so you will see different
    sequences of menus and their items. There is no single sequence of do-this/do-that
    that works beyond the single basic login routine. This chapter provides an overview,
    but experiment with the menus as you see fit.


    If you select IAM, you''ll be able to check its settings, as you can see in Figure
    9-8.


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig8_HTML.jpg](images/459488_1_En_9_Chapter/459488_1_En_9_Fig8_HTML.jpg)


    **Figure 9-8** Configure IAM


    To start working with code, choose the Mobile Hub service from Services (or History,
    if you''ve already checked it out, as you can see in Figure 9-9).


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig9_HTML.jpg](images/459488_1_En_9_Chapter/459488_1_En_9_Fig9_HTML.jpg)


    **Figure 9-9** Choose Mobile Hub


    # Integrating AWS with Xcode


    AWS Mobile Hub is where you work with your code. If you have a project, you can
    add AWS to it, as you can see in Figure 9-10.


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig10_HTML.jpg](images/459488_1_En_9_Chapter/459488_1_En_9_Fig10_HTML.jpg)


    **Figure 9-10** AWS Mobile Hub


    Instead of creating your own Xcode project, you can start from an AWS Starter
    Kit, as shown in Figure 9-11.


    ![../images/459488_1_En_9_Chapter/459488_1_En_9_Fig11_HTML.jpg](images/459488_1_En_9_Chapter/459488_1_En_9_Fig11_HTML.jpg)


    **Figure 9-11** AWS Starter Kits and Tutorials


    # Summary


    This chapter has provided a summary of the parts of AWS that matter to you as
    you start to integrate it into your app. It requires setup (such as in setting
    up an AWS account), and it requires that you have a project ready to have AWS
    added to it. You should now see how you can start to manage such a project in
    the Mobile Hub. The next chapter will show you how to set up a project for AWS.
    Once you have done that, you''re ready to build out your app.


    # Beginning an AWS Project


    One of the most common (yet simplest) ways of using Amazon Web Services (AWS)
    is for data storage. If you have created an AWS account as described in the previous
    chapter, you can follow the guidelines and tutorials found in this chapter to
    build an iOS app that is integrated with AWS.


    To start with, you''ll see how to set up the iOS app and the iOS project that
    will be integrated with AWS. After that, you''ll see the details of what to do.
    You can jump back and forth between the iOS app and the AWS project.


    ## Setting Up the iOS App


    Because this book builds on your knowledge of iOS and assumes that AWS is fairly
    new to you, the focus will be on the iOS project. You can build a project for
    iOS that uses AWS to easily get started; that will create a new iOS app for you.


    That step is shown in Figure 10-1, so that''s a good way to get started quickly.
    Once you have built your first iOS/AWS projects, you can easily start from the
    AWS side and then add the iOS component.


    ![../images/459488_1_En_10_Chapter/459488_1_En_10_Fig1_HTML.jpg](images/459488_1_En_10_Chapter/459488_1_En_10_Fig1_HTML.jpg)'
