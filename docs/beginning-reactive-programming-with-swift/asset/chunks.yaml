  raw: '### Tip


    You can add code to a playground whether or not markup is shown.


    At the bottom of the playground window you can see the *debug area*, which displays
    output from the playground. (If you don’t see it, choose View ➤ Debug Area ➤ Show
    Debug Area.) As you type, the playground will track your key strokes to identify
    errors. In Figure [11-10](#459488_1_En_11_Chapter.xhtml#Fig10) you can see an
    error message that may appear as you are typing. Error messages like this will
    appear and disappear as you type and the playground analyzes your code (and possible
    errors).


    ![../images/459488_1_En_11_Chapter/459488_1_En_11_Fig10_HTML.jpg](images/459488_1_En_11_Chapter/459488_1_En_11_Fig10_HTML.jpg)


