    As is the case with the other APIs mentioned in this book, a good place to start
    is at the developer subsite for Facebook—`developers.facebook.com`, as you can
    see in Figure [5-1](#459488_1_En_5_Chapter.xhtml#Fig1). The API itself is always
    subject to change; furthermore, news and updates are shown on the welcome screen,
    as you can see in the figure. News and updates frequently change.


    ![../images/459488_1_En_5_Chapter/459488_1_En_5_Fig1_HTML.jpg](images/459488_1_En_5_Chapter/459488_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Start to use the Facebook developer API


    Although the developer site for Facebook changes, its basic structure is fairly
    constant. Look at the black navigation bar at the top of Figure [5-2](#459488_1_En_5_Chapter.xhtml#Fig2)
    to get an idea of how the site is organized.


    ![../images/459488_1_En_5_Chapter/459488_1_En_5_Fig2_HTML.jpg](images/459488_1_En_5_Chapter/459488_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Navigate through the Facebook developer site


    If you want to start working with Facebook iOS integration, look for the Facebook
    iOS SDK. You’ll find it in the Docs menu of the navigation bar, as you can see
    in Figures [5-2](#459488_1_En_5_Chapter.xhtml#Fig2) and [5-3](#459488_1_En_5_Chapter.xhtml#Fig3).


    ![../images/459488_1_En_5_Chapter/459488_1_En_5_Fig3_HTML.jpg](images/459488_1_En_5_Chapter/459488_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Drill down to get to the Facebook SDK for iOS


    What you’re looking for is shown in Figure [5-4](#459488_1_En_5_Chapter.xhtml#Fig4).


    ![../images/459488_1_En_5_Chapter/459488_1_En_5_Fig4_HTML.jpg](images/459488_1_En_5_Chapter/459488_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Explore the Facebook SDKs for iOS


    ## Looking at the Components of the Facebook iOS SDK


    In Figure [5-4](#459488_1_En_5_Chapter.xhtml#Fig4) you can view the major SDKs
    for Facebook/iOS. You can see them in Figure [5-5](#459488_1_En_5_Chapter.xhtml#Fig5).


    ![../images/459488_1_En_5_Chapter/459488_1_En_5_Fig5_HTML.jpg](images/459488_1_En_5_Chapter/459488_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Review the basic iOS SDK components


    As is the case with AWS , a lot of the iOS SDKs for Facebook are devoted to managing
    advertising and user interaction. The five primary SDKs are as follows:


    *   **Analytics.** You can see information about who is using your Facebook app
    . This information is anonymized so that you don’t see individual information
    unless the user has specifically allowed that; however, you can see aggregated
    or anonymized data about your users. With Facebook, this is basically the information
    a Page owner can see in Insights.


    *   **Login.** These are the tools that people will use to log in to your Facebook
    app .


    *   **Share.** This SDK manages sharing, liking, and messages. (This is the SDK
    that many Facebook app developers start thinking about even though its implementation
    will require dealing with other SDKs as well.)


    *   **App Events.** This SDK lets you see the events and actions taken by users
    in your app.


    *   **Ads.** For many developers, this is the critical SDK. Share and App Events
    are what may be most important to the users, but Ads are often most important
    to the business manager.


    As you drill down deeper into the iOS Facebook SDK, you can find related SDKs,
    as you can see in Figure [5-6](#459488_1_En_5_Chapter.xhtml#Fig6).


    ![../images/459488_1_En_5_Chapter/459488_1_En_5_Fig6_HTML.jpg](images/459488_1_En_5_Chapter/459488_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    See additional resources and get started


    The last stop on your overview may be the resources shown in Figure [5-6](#459488_1_En_5_Chapter.xhtml#Fig6).


    ## Summary


    Integrating Facebook APIs with iOS requires persistent and complex tools so that
    Facebook itself, your Facebook app, and your iOS app function seamlessly together.
    In order to move forward, you’ll use the steps outlined in the following chapter.


    # 6. Managing Facebook Logins


    The first login procedure you need to worry about is the login for yourself as
    a Facebook developer for a specific app. This chapter will help you navigate that
    login protocol. Remember that there are many sequences of steps you can take to
    achieve your desired result—access to the Facebook iOS API.


    ## Beginning the Facebook SDK Login Process


    Start by logging in to your Facebook developer account. If you are proceeding
    from the previous chapter, you can now use the Quick Start for iOS button shown
    in Figure [6-1](#459488_1_En_6_Chapter.xhtml#Fig1).


    ![../images/459488_1_En_6_Chapter/459488_1_En_6_Fig1_HTML.jpg](images/459488_1_En_6_Chapter/459488_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Start by creating a new Facebook App ID


    You need to provide your app’s name and your contact email address. (Remember
    that to get to this dialog you need to have logged in to your Facebook developer
    account, so that information is already part of the app that’s being created.)
    Figure [6-2](#459488_1_En_6_Chapter.xhtml#Fig2) shows the app creation step.


    ![../images/459488_1_En_6_Chapter/459488_1_En_6_Fig2_HTML.jpg](images/459488_1_En_6_Chapter/459488_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Name your new Facebook app and provide a contact email address


    The process of creating an app has several layers of security, as you can see
    in Figure [6-3](#459488_1_En_6_Chapter.xhtml#Fig3). Remember that your iOS app
    (or any non-native app) will have access to significant Facebook and personal
    resources, so security is tight and has been increased significantly since some
    issues arose in 2017 and early 2018.


    ![../images/459488_1_En_6_Chapter/459488_1_En_6_Fig3_HTML.jpg](images/459488_1_En_6_Chapter/459488_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Pass through the Facebook security process'
