- fmt: '# Modify the Project


    The purpose of this section is to make certain that you can modify, build, and
    run the RxSwift-enhanced project you have created. Locate `main.storyboard` in
    the project (it’s at the top of Figure [13-8](#459488_1_En_13_Chapter.xhtml#Fig8)).
    Add a label to the window just as you would do with any project in Interface Builder.
    The storyboard with the label is shown in Figure [13-11](#459488_1_En_13_Chapter.xhtml#Fig11).


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig11_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig11_HTML.jpg)


    Figure 13-11


    Add a label to the storyboard


    Run the project again, and you should see your label in the interface, as shown
    in Figure [13-12](#459488_1_En_13_Chapter.xhtml#Fig12).


    ![../images/459488_1_En_13_Chapter/459488_1_En_13_Fig12_HTML.jpg](images/459488_1_En_13_Chapter/459488_1_En_13_Fig12_HTML.jpg)


    Figure 13-12


    The label is shown in the running project


    # Summary


    At this point, you should be able to download RxSwift from GitHub and add your
    own project to it. As with most projects you will create, you will probably start
    from one of the built-in Xcode templates, and that is what has been done.


    Now, it’s time to move on to a more complex project—one that you can use as a
    starting point for many of your own RxSwift projects.


    # Build a ReactiveX/RxSwift App


    In the last three chapters, you have seen the basics of RxSwift and reactive programming
    as well as how to create a very basic app using the ReactiveX/RxSwift repository
    from GitHub. This chapter will move further so that you can build a small app
    that uses basic reactive features.


    You will build a simple app that lets you choose an item from a list, as you can
    see in Figure [14-1](#459488_1_En_14_Chapter.xhtml#Fig1). This is a typical beginning
    ReactiveX app that you will find in many variations across the Internet. What
    you are looking at is a `UISearchBar` and a `UITableView`. The table view is seeded
    with six items in the app. You can type into the search bar to select one or more
    of the items. The app is watching you; if you type F, you’ll see the three forts.
    If you type O, you’ll see Oval, and if you type G, you won’t see anything, because
    none of the names starts with G. The app will be called DemoList.


    You can implement this without RxSwift by adding a delegate to the search bar
    so that you can keep track of what is being typed, but using RxSwift can be a
    more straightforward way of implementing the process. Furthermore, if you decide
    to move on to a more complex app in which the table view is automatically populated
    with choices that depend on external conditions, you’ll be ready to implement
    those features.


    ### Note


    The items in the list represent places in Plattsburgh, New York.


    An important point to note is that Figure [14-1](#459488_1_En_14_Chapter.xhtml#Fig1)
    shows DemoList running on an actual device (an iPod Touch, as you can see from
    the status bar).


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig1_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig1_HTML.jpg)


    Figure 14-1


    Build DemoList


    When you run an app on the iOS simulator, the status bar will show a generic carrier,
    as you can see in Figure [14-2](#459488_1_En_14_Chapter.xhtml#Fig2).


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig2_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig2_HTML.jpg)


    Figure 14-2


    Running on the iOS simulator


    The simulator is updated to be able to support many versions of iOS, but there
    remain certain features of iOS that are not identical when running on a device
    or the simulator. For example, on the simulator, iCloud synchronization is triggered
    by a menu command (Debug ➤ Trigger iCloud Sync), and various other aspects of
    the operating system function differently on the simulator than they do on actual
    devices. That is true of features and also of projects that are built from multiple
    files. When they are built in one environment such as Xcode, files and frameworks
    that are necessary may be available, but then are not available when they app
    is moved to an actual device. The safest way to avoid deployment surprises is
    to use a device for testing frequently during development. (Popular devices for
    this kind of testing are iPod Touch and iPhone SE.)


    ## Setting Up the Project


    In Chapter [13](#459488_1_En_13_Chapter.xhtml), you saw the basics of how to add
    an app to the downloaded repository. This chapter will present a more complete
    version that you can use repeatedly for other apps. Most important, it begins
    to use RxSwift features and syntax.


    If you follow the steps to download the GitHub repository, you’ll have the most
    current version. The files may change, and the structure may change as well, so
    if you look at the list of files on disk, it may be slightly different than the
    files you see in the figures of this book. Figure [14-3](#459488_1_En_14_Chapter.xhtml#Fig3)
    shows the GitHub repository downloaded in Xcode.


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig3_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig3_HTML.jpg)


    Figure 14-3


    Downloaded ReactiveXRxSwift repository in Xcode


    You may have to open or close some of the disclosure triangles to see the files
    . What is most important to notice here is the playground files. They may be in
    an Rx project at the top of the list (or they may have moved). Figure [14-3](#459488_1_En_14_Chapter.xhtml#Fig3)
    shows you the four steps to take:


    1.  Open `Rx.xcworkspace`

    2.  Build the `RxSwift-macOS` scheme (Product ➤ Build).

    3.  Open `Rx` playground in the Project navigator

    4.  Show the Debug area (View ➤ Debug Area ➤ Show Debug Area).


    If you can’t build it as described in the four steps, there is probably something
    wrong with your download.


    ### Note


    The build process for the playground can take several minutes to complete. Watch
    the status bar at the top of the window to see the status of indexing, which is
    what will often take a while. The indexing status message is shown in Figure [14-3](#459488_1_En_14_Chapter.xhtml#Fig3).


    Once you have built the playground, you can delete the files, but it’s a good
    idea to keep the full downloaded archive in a safe place. After you have deleted
    the playground files, your project may look like Figure [14-4](#459488_1_En_14_Chapter.xhtml#Fig4),
    in which all of the playground files are removed. This may be a version of RxSwift
    that you use as a starting place for various projects that don’t need the playground
    files.


    ![../images/459488_1_En_14_Chapter/459488_1_En_14_Fig4_HTML.jpg](images/459488_1_En_14_Chapter/459488_1_En_14_Fig4_HTML.jpg)


    Figure 14-4


    GitHub repo without playground project


    The `Rx` project toward the bottom of the repo is the main project, rather than
    the playground that you have deleted at this point. If you select the `Rx` project
    and look at the targets, as shown in Figure [14-4](#459488_1_En_14_Chapter.xhtml#Fig4),
    you’ll see the components of ReactiveX.


    For basic work with ReactiveX, you need to compile `RxCocoa` and `RxSwift` for
    the device on which you want to run the project. You can do that from the schema
    at the top left of the window, shown in Figure [14-4](#459488_1_En_14_Chapter.xhtml#Fig4).'
