  访问者模式通过将作用于集合的算法分离到独立的对象中，并确保该对象定义了能处理每种集合类型的方法，从而解决了这个问题。这使得算法可以在运行时被选择，这意味着无需修改或子类化维护集合的类型即可定义新的行为，这遵循了我在第\
  \ 23 章中描述的开闭原则。\n\n确保算法对象拥有处理每种集合类型的方法，可以避免使用条件类型转换代码，并依靠 Swift 的内置类型管理特性来选择处理集合对象的正确方法。图\
  \ 25-1 展示了访问者模式。\n\n![A978-1-4842-0394-1_25_Fig1_HTML.jpg](img/A978-1-4842-0394-1_25_Fig1_HTML.jpg)\n\
  \n图 25-1. 访问者模式\n\n访问者是一个定义了名为 `visit` 方法的类，这些方法接收由上下文类管理的集合中的每一种类型。调用组件将访问者提供给上下文类，上下文类再将其传递给集合中每个对象定义的\
  \ `accept` 方法。每个对象在收到访问者后，调用 `visit` 方法，并依靠 Swift 来选择该方法的正确版本；这是一种称为双重分派的技术。如果这种双重方法调用让你感到困惑，不必担心；当你看到下一节中的实现代码时，它会变得更加清晰，我将在“理解双重分派”边栏中解释双重分派有效的原因。\n\
  \n## 实现访问者模式\n\n实现访问者模式的起点是创建定义访问者的协议，并确保集合中的对象实现一个 `accept` 方法。清单 25-5 展示了我添加到示例项目中的\
  \ `Visitor.swift` 文件的内容。\n\n**清单 25-5.** `Visitor.swift` 文件的内容\n\n```\nimport Foundation;\n\
  \nprotocol Shape {\n\n    func accept(visitor:Visitor);\n\n}\n\nprotocol Visitor\
  \ {\n\n    func visit(shape:Circle);\n\n    func visit(shape:Square);\n\n    func\
  \ visit(shape:Rectangle);\n\n}\n```\n\n`Shape` 协议定义了 `accept` 方法，`Visitor` 协议定义了接受应用程序中每种形状类型的\
  \ `visit` 方法，这对于双重分派的实现至关重要。\n\n### 理解双重分派\n\n双重分派是访问者模式的基础，它依靠 Swift 根据参数类型选择方法。考虑以下协议和类：\n\
  \n```\n...\n\nprotocol MyProtocol {\n\n    func dispatch(handler:Handler);\n\n}\n\
  \nclass FirstClass : MyProtocol {\n\n    func dispatch(handler: Handler) {\n\n \
  \       handler.handle(self);\n\n    }\n\n}\n\nclass SecondClass : MyProtocol {\n\
  \n    func dispatch(handler: Handler) {\n\n        handler.handle(self)\n\n    }\n\
  \n}\n\n...\n```\n\n`FirstClass` 和 `SecondClass` 都遵循 `MyProtocol` 协议。由协议定义并由这些类实现的\
  \ `dispatch` 方法是双重分派技术的关键，尽管理解双重分派的最佳方式是看看没有它会发生什么。以下是 `dispatch` 方法接受的 `Handler`\
  \ 类的定义：\n\n```\n...\n\nclass Handler {\n\n    func handle(arg:MyProtocol) {\n\n\
  \        println(\"Protocol\");\n\n    }\n\n    func handle(arg:FirstClass) {\n\n\
  \        println(\"First Class\");\n\n    }\n\n    func handle(arg:SecondClass)\
  \ {\n\n        println(\"Second Class\");\n\n    }\n\n}\n\n...\n```\n\n考虑当我创建一个包含\
  \ `FirstClass` 和 `SecondClass` 对象的数组，并将它们传递给一个 `Handler` 对象时会发生什么，就像这样：\n\n```\n\
  ...\n\nlet objects:[MyProtocol] = [FirstClass(), SecondClass()];\n\nlet handler\
  \ = Handler();\n\nfor object in objects {\n\n    handler.handle(object);\n\n}\n\n\
  ...\n```\n\n这是常规的单重分派，我只是针对数组中的每个对象调用 `Handler` 对象的方法。为了能够将 `FirstClass` 对象和 `SecondClass`\
  \ 对象存储在同一个数组中，我必须将其类型指定为 `MyProtocol`，这会影响 Swift 在 `for` 循环中选择的 `handle` 方法版本，并产生以下结果：\n\
  \n```\nProtocol\nProtocol\n```\n\n两个对象都使用数组的类型进行处理。为了启用双重分派，我必须更改 `for` 循环中的方法调用，如下所示：\n\
  \n```\n...\n\nfor object in objects {\n\n    object.dispatch(handler);\n\n}\n\n\
  ...\n```\n\n`dispatch` 方法的实现导致从类内部调用 `Handler.handle` 方法，但参数是 `self`。其效果是调用了具有最具体类型的\
  \ `handle` 方法版本，并产生以下结果：\n\n```\nFirst Class\nSecond Class\n```\n\n从对象方法内部调用 `handle`\
  \ 方法的效果是，无需执行任何类型转换，就能调用具有最具体参数类型的方法版本，这是访问者模式的核心技术。\n\n### 遵循 Shape 协议\n\n下一步是更新形状类，使它们遵循\
  \ `Shape` 协议。如清单 25-6 所示，每个形状类对 `accept` 方法都有相同的实现。\n\n**清单 25-6.** 在 `Shapes.swift`\
  \ 文件中遵循 `Shape` 协议\n\n```\nimport Foundation;\n\nclass Circle : Shape {\n\n    let\
  \ radius:Float;\n\n    init(radius:Float) {\n\n        self.radius = radius;\n\n\
  \    }\n\n    func accept(visitor: Visitor) {\n\n        visitor.visit(self);\n\n\
  \    }\n\n}\n\nclass Square : Shape {\n\n    let length:Float;\n\n    init(length:Float)\
  \ {\n\n        self.length = length;\n\n    }\n\n    func accept(visitor: Visitor)\
  \ {\n\n        visitor.visit(self);\n\n    }\n\n}\n\nclass Rectangle : Shape {\n\
  \n    let xLen:Float;\n\n    let yLen:Float;\n\n    init(x:Float, y:Float) {\n\n\
  \        self.xLen = x;\n\n        self.yLen = y;\n\n    }\n\n    func accept(visitor:\
  \ Visitor) {\n\n        visitor.visit(self);\n\n    }\n\n}\n\nclass ShapeCollection\
  \ {\n\n    let shapes:[Shape];\n\n    init() {\n\n        shapes = [\n\n       \
  \     Circle(radius: 2.5), Square(length: 4), Rectangle(x: 10, y: 2)\n\n       \
  \ ];\n\n    }\n\n    func accept(visitor: Visitor) {\n\n        for shape in shapes\
  \ {\n\n            shape.accept(visitor);\n\n        }\n\n    }\n\n}\n```\n\n**提示：**\
  \ 我直接修改了集合类以遵循协议，但别忘了你可以使用 Swift 扩展来为类添加协议遵循，而无需修改它们。\n\n我还为 `ShapeCollection` 类添加了一个\
  \ `accept` 方法，该方法接收一个 `Visitor` 对象，并调用集合中每个对象的 `accept` 方法，我已将集合改为 `Shape` 数组。\n\
  \n### 创建访问者\n\n有了基本的基础设施，我就可以创建操作形状对象集合的访问者类了，如清单 25-7 所示。\n\n**清单 25-7.** 在 `Visitor.swift`\
  \ 文件中定义访问者\n\n```\nimport Foundation;\n\nprotocol Shape {\n\n    func accept(visitor:Visitor);\n\
  \n}\n\nprotocol Visitor {\n\n    func visit(shape:Circle);\n\n    func visit(shape:Square);\n\
  \n    func visit(shape:Rectangle);\n\n}\n\nclass AreaVisitor : Visitor {\n\n   \
  \ var totalArea:Float = 0;\n\n    func visit(shape: Circle) {\n\n        totalArea\
  \ += (3.14 * powf(shape.radius, 2));\n\n    }\n\n    func visit(shape: Square) {\n\
  \n        totalArea += powf(shape.length, 2);\n\n    }\n\n    func visit(shape:\
  \ Rectangle) {\n\n        totalArea += (shape.xLen * shape.yLen);\n\n    }\n\n}\n\
  \nclass EdgesVisitor : Visitor {\n\n    var totalEdges = 0;\n\n    func visit(shape:\
  \ Circle) {\n\n        totalEdges += 1;\n\n    }\n\n    func visit(shape: Square)\
  \ {\n\n        totalEdges += 4;\n\n    }\n\n    func visit(shape: Rectangle) {\n\
  \n        totalEdges += 4;\n\n    }\n\n}\n```\n\n使用双重分派意味着将为集合中的每个对象调用相应版本的 `visit`\
  \ 方法。这意味着我可以访问形状类定义的特定于类型的属性，而无需从一种类型转换到另一种类型。\n\n\n\n### 应用访问者模式\n\n最后一步是更新调用组件，创建并使用\
  \ `Visitor` 对象对集合进行操作。清单 25-8 展示了我对 `main.swift` 文件所做的更改。\n\n**清单 25-8.** 在 `main.swift`\
  \ 文件中使用访问者模式\n\n```\nlet shapes = ShapeCollection();\n\nlet areaVisitor = AreaVisitor();\n\
  \nshapes.accept(areaVisitor);\n\nprintln(\"Area: \\(areaVisitor.totalArea)\");\n\
  \nprintln(\"---\");\n\nlet edgeVisitor = EdgesVisitor();\n\nshapes.accept(edgeVisitor);\n\
  \nprintln(\"Edges: \\(edgeVisitor.totalEdges)\");\n```\n\n运行应用程序将产生以下结果：\n\n```\n\
  Area: 55.625\n\n---\n\nEdges: 9\n```\n\n通过创建新的访问者并将其传递给 `accept` 方法，可以定义新的算法。这样一来，无需修改集合类或其子类，即可创建新的行为和功能。\n\
  \n## 访问者模式的变体\n\n访问者模式没有常见的变体。\n\n## 理解访问者模式的陷阱\n\n实现访问者模式时，唯一的陷阱是试图绕过双重分发。虽然这种技术看起来有些笨拙，但如果不使用它，就无法实现访问者模式。\n\
  \n## Cocoa 中的访问者模式示例\n\nCocoa 框架中没有包含访问者模式的示例。\n\n## 将模式应用于 SportsStore 应用\n\nSportsStore\
  \ 应用中没有适合应用访问者模式的异构集合。\n\n## 总结\n\n我在本章中描述了访问者模式，并解释了如何使用它来扩展异构集合的行为，而无需修改集合类或其子类。在第\
  \ 26 章中，我将描述模板方法模式，该模式允许有选择地替换算法中的步骤。\n\n"
- "# 26. 模板方法模式\n\n模板方法模式允许更改算法中的各个步骤，当你在编写具有默认行为的类并希望允许其他开发人员更改这些行为时，此模式非常有用。这个模式易于理解和实现，但被广泛使用，可在大多数公共框架中找到，包括\
  \ Apple 提供的框架。表 26-1 将模板方法模式置于上下文中。\n\n**表 26-1.** 将模板方法模式置于上下文中\n\n| 问题 | 答案 |\n\
  | --- | --- |\n| 它是什么？ | 模板方法模式允许通过第三方提供的实现来替换算法中的特定步骤，这些实现可以通过将函数指定为闭包或通过创建子类来实现。\
  \ |\n| 它有什么好处？ | 当你在编写希望允许其他开发人员扩展和自定义的框架时，此模式非常有用。 |\n| 何时应使用此模式？ | 当你希望在不修改原始类的情况下，有选择地允许更改算法中的任何步骤时，使用此模式。\
  \ |\n| 何时应避免此模式？ | 如果整个算法都可以更改，则不要使用此模式。请参阅本书这部分中的其他模式以获取替代方案。 |\n| 如何知道是否正确实现了该模式？\
  \ | 当算法中的选定步骤可以在不修改定义算法的类的情况下被更改时，即正确实现了此模式。 |\n| 是否有常见的陷阱？ | 没有。 |\n| 是否有相关模式？\
  \ | 此模式与我之前在第 24 章和第 25 章中描述的策略模式和访问者模式具有相似的目标。 |\n\n## 准备示例项目\n\n在本章中，我创建了一个名为\
  \ `TemplateMethod` 的 Xcode OS X 命令行工具项目。我创建了一个名为 `Donors.swift` 的文件，其内容如清单 26-1\
  \ 所示。\n\n**清单 26-1.** `Donors.swift` 文件的内容\n\n```\nstruct Donor {\n\n    let title:String;\n\
  \n    let firstName:String;\n\n    let familyName:String;\n\n    let lastDonation:Float;\n\
  \n    init (_ title:String, _ first:String, _ family:String, _ last:Float) {\n\n\
  \        self.title = title;\n\n        self.firstName = first;\n\n        self.familyName\
  \ = family;\n\n        self.lastDonation = last;\n\n    }\n\n}\n\nclass DonorDatabase\
  \ {\n\n    private var donors:[Donor];\n\n    init() {\n\n        donors = [\n\n\
  \            Donor(\"Ms\", \"Anne\", \"Jones\", 0),\n\n            Donor(\"Mr\"\
  , \"Bob\", \"Smith\", 100),\n\n            Donor(\"Dr\", \"Alice\", \"Doe\", 200),\n\
  \n            Donor(\"Prof\", \"Joe\", \"Davis\", 320)];\n\n    }\n\n    func generateGalaInvitations(maxNumber:Int)\
  \ -> [String] {\n\n        // 步骤 1 - 过滤掉非捐赠者\n\n        var targetDonors:[Donor]\
  \ = donors.filter({$0.lastDonation > 0});\n\n        // 步骤 2 - 按最近捐赠金额对捐赠者排序\n\n\
  \        targetDonors.sort({ $0.lastDonation > $1.lastDonation});\n\n        //\
  \ 步骤 3 - 限制受邀者人数\n\n        if (targetDonors.count > maxNumber) {\n\n          \
  \  targetDonors = Array(targetDonors[0..<maxNumber]);\n\n        }\n\n        //\
  \ 步骤 4 - 生成邀请函\n\n        return targetDonors.map({ donor in\n\n            return\
  \ \"Dear \\(donor.title). \\(donor.familyName)\";\n\n        })\n\n    }\n\n}\n\
  ```\n\n本章的示例基于一个虚构的慈善机构，该机构向捐赠者募集捐款。每个捐赠者由一个 `Donor` 对象表示，一组对象由 `DonorDatabase`\
  \ 类收集。\n\n`DonorDatabase` 类定义了一个 `generateGalaInvitations` 方法，该方法处理 `Donor` 对象以生成盛大音乐会的邀请函称谓。清单\
  \ 26-2 展示了我添加到 `main.swift` 文件中用于生成称谓集合的代码。\n\n**清单 26-2.** `main.swift` 文件的内容\n\
  \n```\nlet donorDb = DonorDatabase();\n\nlet galaInvitations = donorDb.generateGalaInvitations(2);\n\
  \nfor invite in galaInvitations {\n\n    println(invite);\n\n}\n```\n\n运行示例会在 Xcode\
  \ 控制台中产生以下输出：\n\n```\nDear Prof. Davis\n\nDear Dr. Doe\n```\n\n## 理解模式解决的问题\n\n\
  生成盛大活动问候语的算法有四个不同的阶段：\n\n- 过滤掉那些未进行捐赠的捐赠者\n- 按最近的捐赠金额对捐赠者进行排序\n- 选择有邀请函的捐赠者人数\n\
  - 生成邀请函的称谓\n\n这些是慈善机构在生成与捐赠者进行任何沟通的问候语时需要执行的四个相同的基本步骤：过滤、排序、选择和生成。模板方法模式解决的问题是我在第\
  \ 24 章和第 25 章中描述的策略模式和访问者模式所解决问题的变体：如何在不修改类的情况下扩展类的行为。\n\n在这种情况下，该问题应用于具有明确定义步骤的算法，这些步骤可以更改以产生不同的结果，例如\
  \ `DonorDatabase` 类中用于生成称谓的算法。然而，与其他模式不同，当你需要确保算法的某些部分可以更改而其他部分保持不变时，模板方法模式非常有用，例如，确保排序和选择总是以相同的方式处理，但过滤和生成步骤可以更改，从而为不同类型的捐赠者沟通创建新的结果。\n\
  \n## 理解模板方法模式\n\n模板方法依赖于一个算法的实现，该实现仅定义要保持不变的部分。算法的其余部分由调用组件提供，以完成算法并生成所需的结果，如图 26-1\
  \ 所示。\n\n![A978-1-4842-0394-1_26_Fig1_HTML.jpg](img/A978-1-4842-0394-1_26_Fig1_HTML.jpg)\n\
  \n**图 26-1.** 模板方法模式\n\n\n\n## 实现模板方法模式\n\n在其他语言中，模板模式通过定义一个类来实现，该类要求子类完成算法并提供缺失的步骤。Swift\
  \ 不支持抽象类，但它允许将函数视为对象来处理，这使得无论如何都能创建该模式的实现。\n\n第一步是泛化包含算法的类，使其仅定义算法的固定部分，而将可变部分指定为可通过属性设置的函数。清单\
  \ 26-3 显示了对 `Donors.swift` 文件所做的修改。\n\n**清单 26-3.** 在 `Donors.swift` 文件中重新定义算法\n\
  \n```\nstruct Donor {\n    let title:String;\n    let firstName:String;\n    let\
  \ familyName:String;\n    let lastDonation:Float;\n\n    init (_ title:String, _\
  \ first:String, _ family:String, _ last:Float) {\n        self.title = title;\n\
  \        self.firstName = first;\n        self.familyName = family;\n        self.lastDonation\
  \ = last;\n    }\n}\n\nclass DonorDatabase {\n    private var donors:[Donor];\n\
  \    var filter: ([Donor] -> [Donor])?;\n    var generate: ([Donor] -> [String])?;\n\
  \n    init() {\n        donors = [\n            Donor(\"Ms\", \"Anne\", \"Jones\"\
  , 0),\n            Donor(\"Mr\", \"Bob\", \"Smith\", 100),\n            Donor(\"\
  Dr\", \"Alice\", \"Doe\", 200),\n            Donor(\"Prof\", \"Joe\", \"Davis\"\
  , 320)];\n    }\n\n    func generate(maxNumber:Int) -> [String] {\n        // 第\
  \ 1 步 - 过滤掉非捐赠者\n        var targetDonors:[Donor] = filter?(donors)\n          \
  \  ?? donors.filter({$0.lastDonation > 0});\n        // 第 2 步 - 按最近捐赠额排序\n     \
  \   targetDonors.sort({ $0.lastDonation > $1.lastDonation});\n        // 第 3 步 -\
  \ 限制受邀人数\n        if (targetDonors.count > maxNumber) {\n            targetDonors\
  \ = Array(targetDonors[0..<maxNumber]);\n        }\n        // 第 4 步 - 生成邀请函\n \
  \       return generate?(targetDonors) ?? targetDonors.map({ donor in\n        \
  \    return \"Dear \\(donor.title). \\(donor.familyName)\";\n        })\n    }\n\
  }\n```\n\n我定义了 `filter` 和 `generate` 属性，它们可用于覆盖算法中过滤和生成步骤的默认行为。我将算法方法的名称修改为 `generate`，如果未设置新属性，则会回退到默认步骤。\n\
  \n清单 26-4 显示了对 `main.swift` 文件所做的修改，以使用修改后的 `DonorDatabase` 类并定义新的算法。\n\n**清单 26-4.** 在\
  \ `main.swift` 文件中使用模板方法模式\n\n```\nlet donorDb = DonorDatabase();\nlet galaInvitations\
  \ = donorDb.generate(2);\nfor invite in galaInvitations {\n    println(invite);\n\
  }\n\ndonorDb.filter = { $0.filter({$0.lastDonation == 0})};\ndonorDb.generate =\
  \ { $0.map({ \"Hi \\($0.firstName)\"})};\nlet newDonors = donorDb.generate(Int.max);\n\
  for invite in newDonors {\n    println(invite);\n}\n```\n\n我先运行算法的标准版本，然后使用闭包定义了\
  \ `filter` 和 `generate` 属性的新函数，选择尚未捐款的捐赠者，并生成更随意的问候语。运行应用程序将产生以下输出：\n\n```\nDear\
  \ Prof. Davis\nDear Dr. Doe\nHi Anne\n```\n\n## 模板方法模式的变体\n\n你可以通过将算法的每一步都实现为一个方法，并允许子类覆盖这些方法，来创建模板方法模式的更传统实现，如清单\
  \ 26-5 所示。\n\n**清单 26-5.** 在 `Donors.swift` 文件中使用方法定义算法步骤\n\n```\n...\nclass DonorDatabase\
  \ {\n    private var donors:[Donor];\n\n    init() {\n        donors = [\n     \
  \       Donor(\"Ms\", \"Anne\", \"Jones\", 0),\n            Donor(\"Mr\", \"Bob\"\
  , \"Smith\", 100),\n            Donor(\"Dr\", \"Alice\", \"Doe\", 200),\n      \
