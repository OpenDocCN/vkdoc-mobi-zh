  \n### 更新产品数据存储\n\n`ProductDataStore`类为应用其他部分提供产品数据，这是集成代理的自然切入点，用以替代当前直接访问`NetworkConnection`和`NetworkPool`类的方式。清单\
  \ 18-15 展示了如何更新`ProductDataStore`类，使其从代理获取初始库存数据。\n\n**清单 18-15.** 在`ProductDataStore.swift`文件中集成代理\n\
  \n```\nimport Foundation\n\nfinal class ProductDataStore {\n    var callback: ((Product)\
  \ -> Void)?;\n    private var networkQ: dispatch_queue_t\n    private var uiQ: dispatch_queue_t;\n\
  \    lazy var products: [Product] = self.loadData();\n\n    init() {\n        networkQ\
  \ = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);\n        uiQ\
  \ = dispatch_get_main_queue();\n    }\n\n    private func loadData() -> [Product]\
  \ {\n        var products = [Product]();\n        for product in productData {\n\
  \            var p: Product = LowStockIncreaseDecorator(product: product);\n   \
  \         if (p.category == \"Soccer\") {\n                p = SoccerDecreaseDecorator(product:\
  \ p);\n            }\n            dispatch_async(self.networkQ, {() in\n       \
  \         StockServerFactory.getStockServer().getStockLevel(p.name,\n          \
  \          callback: { name, stockLevel in\n                        p.stockLevel\
  \ = stockLevel;\n                        dispatch_async(self.uiQ, {() in\n     \
  \                       if (self.callback != nil) {\n                          \
  \      self.callback!(p);\n                            }\n                     \
  \   })\n                });\n            });\n            products.append(p);\n\
  \        }\n        return products;\n    }\n\n    private var productData: [Product]\
  \ = [\n        ProductComposite(name: \"Running Pack\",\n            description:\
  \ \"Complete Running Outfit\", category: \"Running\",\n            stockLevel: 10,\
  \ products:\n            // ... 为简洁起见省略语句...\n    ]\n}\n```\n\n`loadData`方法的变更使用代理对象获取数据值，清单\
  \ 18-16 展示了我如何更新代理的`getStockLevel`方法，使其通过`NetworkPool`和`NetworkConnection`类获取库存数据。\n\
