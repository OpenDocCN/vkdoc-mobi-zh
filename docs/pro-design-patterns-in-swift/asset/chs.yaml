  \n**代码清单 3-3.** 在 `ViewController.swift` 文件中显示总库存\n\n```\nimport UIKit\n\nclass\
  \ ViewController: UIViewController {\n\n    @IBOutlet weak var totalStockLabel:\
  \ UILabel!\n\n    var products = [\n        (\"Kayak\", \"A boat for one person\"\
