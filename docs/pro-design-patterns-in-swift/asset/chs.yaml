  \n只要你记住，用于创建对象的默认值应该定义在建造者类中，而不是调用组件中，那么这种模式就没有任何陷阱。\n\n## Cocoa 中建造者模式的示例\n\n建造者模式最常用的例子可以在\
  \ `Foundation` 框架的 `NSDateComponents` 类中找到。`NSDateComponents` 类是一个建造者，它允许调用组件指定设置，用于生成代表日历日期的\
  \ `NSDate` 对象。清单 11-13 展示了我创建的一个名为 `DateBuilder.playground` 的 Xcode playground 文件内容。\n\
  \n**清单 11-13.** `DateBuilder.playground` 文件的内容\n\n```\nimport Foundation;\n\nvar\
  \ builder = NSDateComponents();\n\nbuilder.hour     = 10;\nbuilder.day      = 6;\n\
  builder.month    = 9;\nbuilder.year     = 1940;\nbuilder.calendar = NSCalendar(calendarIdentifier:\
  \ NSGregorianCalendar);\n\nvar date         = builder.date;\nprintln(date!);\n```\n\
  \n我通过实例化 `NSDateComponents` 类来创建建造者，并通过设置其定义的属性来配置将要生成的对象。我为 `hour`、`day`、`month`、`year`\
  \ 和 `calendar` 属性设置了值，以替换建造者定义的默认值。\n\n为了创建对象，我读取了 `date` 属性的值，并收到一个已根据我提供的值配置好的\
  \ `NSDate` 对象。我将该值写入控制台，在 playground 控制台中显示以下输出：\n\n```\n1940-09-06 09:00:00 +0000\n\
  ```\n\n我没有为建造者提供构成日期的所有组件的值，因此建造者对其分钟、秒和时区组件使用了默认值，这就是这些部分被设置为零的原因。\n\n通过实现建造者模式，`NSDateComponents`\
  \ 类允许我以适合我的顺序指定有限数量的值来配置一个日期。建造者直到读取 `date` 属性时才会创建 `NSDate` 对象，这允许我在数据可用时提供它们。\n\
  \n## 将模式应用于 SportsStore 应用程序\n\n在本节中，我将演示建造者模式的一个常见用途：生成对象的序列化表示。我还将向您展示如何使用属性而非方法来创建建造者。\n\
  \n### 准备示例应用程序\n\n我将从第 10 章离开的地方继续处理 SportsStore 应用程序。我将实现建造者模式来创建产品数据更改的序列化表示。我向\
  \ SportsStore 项目添加了一个名为 `ChangeRecord.swift` 的新文件，并用它定义了清单 11-14 所示的类。\n\n**清单 11-14.**\
  \ `ChangeRecord.swift` 文件的内容\n\n```\nclass ChangeRecord : Printable {\n    private\
  \ let outerTag:String;\n    private let productName:String;\n    private let catName:String;\n\
  \    private let innerTag:String;\n    private let value:String;\n\n    private\
  \ init(outer:String, name:String, category:String,\n        inner:String, value:String)\
  \ {\n        self.outerTag    = outer;\n        self.productName = name;\n     \
  \   self.catName     = category;\n        self.innerTag    = inner;\n        self.value\
  \       = value;\n    }\n\n    var description : String {\n        return \"<\\\
  (outerTag)><\\(innerTag) name=\\\"\\(productName)\\\"\" +\n            \" category=\\\
  \"\\(catName)\\\">\\(value)</\\(innerTag)></\\(outerTag)>\"\n    }\n}\n```\n\n`ChangeRecord`\
  \ 类用于创建一个表示更改的 XML 风格字符串。该类定义了一组用于配置该字符串的属性。`ChangeRecord` 类实现了 `Printable` 协议，这意味着当该类的实例被传递给\
  \ `println` 函数时，将使用其 `description` 属性。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n### 定义构建器类\n\n为了实现构建器模式，我创建了一个名为 `ChangeRecordBuilder` 的新类，如代码清单 11-15 所示。\n\
  \n**代码清单 11-15.** 在 `ChangeRecord.swift` 文件中定义了一个构建器类\n\n```swift\nclass ChangeRecord\
  \ : Printable {\n    // ...语句已省略以保持简洁...\n}\n\nclass ChangeRecordBuilder {\n   \
  \ var outerTag:String;\n    var innerTag:String;\n    var productName:String?;\n\
  \    var category:String?;\n    var value:String?;\n\n    init() {\n        outerTag\
  \ = \"change\";\n        innerTag = \"product\";\n    }\n\n    var changeRecord:ChangeRecord?\
  \ {\n        get {\n            if (productName != nil && category != nil && value\
  \ != nil) {\n                return ChangeRecord(outer: outerTag, name: productName!,\n\
  \                    category: category!, inner: innerTag, value: value!);\n   \
  \         } else {\n                return nil;\n            }\n        }\n    }\n\
  }\n```\n\n我在 `ChangeRecordBuilder` 类中使用了属性来实现该模式，这与使用方法的方式不同。`ChangeRecordBuilder`\
  \ 为 `outerTag` 和 `innerTag` 属性提供了默认值，但要求调用方为 `productName`、`category` 和 `value`\
  \ 属性提供值。\n\n`changeRecord` 属性在创建 `ChangeRecord` 对象之前，必须检查是否提供了所需的值，但 `ChangeRecordBuilder`\
  \ 类没有办法指示何时缺少必需的值。我能做的最好的事情是，当缺少某个值时，从 `changeRecord` 属性返回一个可选类型。（正因如此，我更喜欢使用方法来实现构建器模式。）\n\
  \n### 使用构建器类\n\n为了使用构建器，我更新了 `Logger` 类，以便默认回调使用 `ChangeRecord` 对象将消息写入控制台，如代码清单\
  \ 11-16 所示。\n\n**代码清单 11-16.** 在 `Logger.swift` 文件中使用了构建器类\n\n```swift\nimport Foundation;\n\
  \nlet productLogger = Logger<Product>(callback: {p in\n    var builder         =\
  \ ChangeRecordBuilder();\n    builder.productName = p.name;\n    builder.category\
  \    = p.category;\n    builder.value       = String(p.stockLevel);\n    builder.outerTag\
  \    = \"stockChange\";\n    var changeRecord = builder.changeRecord;\n    if (changeRecord\
  \ != nil) {\n        println(builder.changeRecord!);\n    }\n});\n\nfinal class\
  \ Logger<T where T:NSObject, T:NSCopying> {\n    // ...语句已省略以保持简洁...\n}\n```\n\n\
  你可以通过启动应用并更改某个产品的库存量来查看更改的效果。调试控制台将显示类似如下的消息（我已对其格式化，以便阅读）：\n\n```xml\n<stockChange>\n\
  <product name=\"Lifejacket\" category=\"Watersports\">15</product>\n</stockChange>\n\
  ```\n\n## 本章小结\n\n在本章中，我描述了构建器模式，并向你展示了当直接实例化会导致调用方需要了解对象的默认配置值，以及当配置数据是逐步获取时，如何使用它来控制对象的创建。\n\
  \n构建器模式是创建型模式中的最后一个，在第三部分中，我将描述一种不同类型的模式：结构型模式。\n\n"
- "# 第三部分：结构型模式\n\n## 12. 适配器模式\n\n在本章中，我将介绍第一个结构型模式：适配器模式。该模式允许两个提供相关功能的对象即使拥有不兼容的\
  \ API 也能协同工作。表 12-1 将适配器模式置于上下文中。\n\n**表 12-1.** 将适配器模式置于情境中\n\n| 问题 | 答案 |\n| ---\
  \ | --- |\n| 它是什么？ | 适配器模式通过引入一个从一个组件映射到另一个组件的适配器，使得拥有不兼容 API 的两个组件能够协同工作。 |\n|\
  \ 有什么好处？ | 该模式允许你将无法修改其源码的组件集成到你的应用程序中。当你使用第三方框架或消费另一个项目的输出时，这是一个常见问题。 |\n| 何时应该使用此模式？\
  \ | 当你需要集成一个提供与应用程序中其他组件类似功能，但使用不兼容 API 的组件时，请使用此模式。 |\n| 何时应该避免此模式？ | 当你能够修改要集成的组件源代码时，或者当可以将其提供的数据直接迁移到你的应用程序时，请不要使用此模式。\
  \ |\n| 如何知道是否正确实现了该模式？ | 当适配器允许在不修改应用程序或组件的情况下将该组件集成到应用程序中时，该模式就被正确实现了。 |\n| 是否有常见的陷阱？\
  \ | 唯一的陷阱是，若试图扩展该模式，强行集成一个未能提供适配目标 API 所期望功能的组件。 |\n| 是否有相关的模式？ | 许多结构型模式具有相似的实现但意图不同。请确保你从我本书本部分描述的模式中选择了正确的模式。\
  \ |\n\n## 准备示例项目\n\n针对本章，我创建了一个名为 `Adapter` 的新 OS X 命令行工具项目。我向该项目添加了一个名为 `Employees.swift`\
  \ 的新文件，并使用它来定义代码清单 12-1 中所示的类型。\n\n**代码清单 12-1.** `Employees.swift` 文件的内容\n\n```swift\n\
  struct Employee {\n    var name:String;\n    var title:String;\n}\n\nprotocol EmployeeDataSource\
  \ {\n    var employees:[Employee] { get };\n    func searchByName(name:String) ->\
  \ [Employee];\n    func searchByTitle(title:String) -> [Employee];\n}\n```\n\n本章的示例将是一个简单的员工目录，`Employee`\
  \ 结构体将用于表示单个员工。提供员工数据的类需要实现 `EmployeeDataSource` 协议。\n\n#### 创建数据源\n\n我向项目添加了一个名为\
  \ `DataSources.swift` 的文件，并使用它来定义代码清单 12-2 中所示的类。\n\n**代码清单 12-2.** `DataSources.swift`\
  \ 文件的内容\n\n```swift\nimport Foundation\n\nclass DataSourceBase : EmployeeDataSource\
  \ {\n    var employees = [Employee]();\n\n    func searchByName(name: String) ->\
  \ [Employee] {\n        return search({e -> Bool in\n            return e.name.rangeOfString(name)\
  \ != nil;\n        });\n    }\n\n    func searchByTitle(title: String) -> [Employee]\
  \ {\n        return search({e -> Bool in\n            return e.title.rangeOfString(title)\
  \ != nil;\n        })\n    }\n\n    private func search(selector:(Employee -> Bool))\
  \ -> [Employee] {\n        var results = [Employee]();\n        for e in employees\
  \ {\n            if (selector(e)) {\n                results.append(e);\n      \
  \      }\n        }\n        return results;\n    }\n}\n\nclass SalesDataSource\
  \ : DataSourceBase {\n    override init() {\n        super.init();\n        employees.append(Employee(name:\
  \ \"Alice\", title: \"VP of Sales\"));\n        employees.append(Employee(name:\
  \ \"Bob\", title: \"Account Exec\"));\n    }\n}\n\nclass DevelopmentDataSource :\
  \ DataSourceBase {\n    override init() {\n        super.init();\n        employees.append(Employee(name:\
  \ \"Joe\", title: \"VP of Development\"));\n        employees.append(Employee(name:\
  \ \"Pepe\", title: \"Developer\"));\n    }\n}\n```\n\n`DataSourceBase` 类遵循 `EmployeeDataSource`\
  \ 协议，并提供了数据源功能的实现，我可以轻松地派生该类以向应用程序添加新数据。我创建了两个数据源类——`SalesDataSource` 和 `DevelopmentDataSource`——它们为两个部门提供员工信息。\n\
  \n\n\n### 定义应用程序\n\n为了消费数据源，我在项目中添加了一个名为 `EmployeeSearch.swift` 的文件，并用它来定义清单 12-3\
  \ 中所示的类。\n\n**清单 12-3.** `EmployeeSearch.swift` 文件的内容\n\n```\nclass SearchTool {\n\
  \    enum SearchType {\n        case NAME; case TITLE;\n    }\n    private let sources:[EmployeeDataSource];\n\
  \    init(dataSources: EmployeeDataSource...) {\n        self.sources = dataSources;\n\
  \    }\n    var employees:[Employee] {\n        var results = [Employee]();\n  \
  \      for source in sources {\n            results += source.employees;\n     \
  \   }\n        return results;\n    }\n    func search(text:String, type:SearchType)\
  \ -> [Employee] {\n        var results = [Employee]();\n        for source in sources\
  \ {\n            results += type == SearchType.NAME ? source.searchByName(text)\n\
  \                : source.searchByTitle(text);\n        }\n        return results;\n\
  \    }\n}\n```\n\n`SearchTool` 类作用于一个数据源集合，它整合这些数据源的内容及其搜索能力，以提供对员工数据的统一访问。清单 12-4\
  \ 展示了我添加到 `main.swift` 文件中用于测试该功能的代码。\n\n**清单 12-4.** 在 `main.swift` 文件中测试示例应用\n\
  \n```\nlet search = SearchTool(dataSources: SalesDataSource(), DevelopmentDataSource());\n\
  println(\"--List--\");\nfor e in search.employees {\n    println(\"Name: \\(e.name)\"\
  );\n}\nprintln(\"--Search--\");\nfor e in search.search(\"VP\", type: SearchTool.SearchType.TITLE)\
  \ {\n    println(\"Name: \\(e.name), Title: \\(e.title)\");\n}\n```\n\n运行该应用程序会在调试控制台中产生以下输出：\n\
  \n```\n--List--\nName: Alice\nName: Bob\nName: Joe\nName: Pepe\n--Search--\nName:\
  \ Alice, Title: VP of Sales\nName: Joe, Title: VP of Development\n```\n\n## 理解该模式解决的问题\n\
  \n适配器模式要解决的问题在于，当一个现有系统需要集成一个功能相似但未提供通用接口且无法修改的新组件时。该示例应用代表了现有系统——一个员工目录，它依赖符合 `EmployeeDataSource`\
  \ 协议的类来提供搜索功能。当需要将一个新的数据源集成到目录中，而该数据源又不符合此协议时，问题便出现了。\n\n有很多原因会导致不兼容的代码被引入到应用程序中。在员工目录的例子中，收购或合并可能需要集成另一家公司的系统。在较小的规模上，当使用第三方组件，或者当你依赖另一个相关项目开发团队编写的代码时，不兼容的代码也可能被引入到项目中。\n\
  \n为了说明这个问题，假设我示例中的公司收购了一家竞争对手，并希望扩展目录以包含新公司的员工。好消息是，新公司已经有了一个完善的员工目录，但坏消息是，它没有使用母公司所需的类型。为了呈现这个问题，我在项目中添加了一个名为\
  \ `NewCo.swift` 的文件，并用它来定义清单 12-5 中所示的简单目录类型。\n\n**清单 12-5.** `NewCo.swift` 文件的内容\n\
  \n```\nclass NewCoStaffMember {\n    private var name:String;\n    private var role:String;\n\
  \    init(name:String, role:String) {\n        self.name = name; self.role = role;\n\
  \    }\n    func getName() -> String {\n        return name;\n    }\n    func getJob()\
  \ -> String {\n        return role;\n    }\n}\nclass NewCoDirectory {\n    private\
  \ var staff:[String: NewCoStaffMember];\n    init() {\n        staff = [\"Hans\"\
  : NewCoStaffMember(name: \"Hans\", role: \"Corp Counsel\"),\n            \"Greta\"\
  : NewCoStaffMember(name: \"Greta\", role: \"VP, Legal\")];\n    }\n    func getStaff()\
  \ -> [String: NewCoStaffMember] {\n        return staff;\n    }\n}\n```\n\n`NewCoDirectory`\
  \ 类提供了一个 `NewCoStaffMember` 对象的字典，这些对象以员工姓名作为键。它没有搜索功能，并且与本章开头创建的目录没有通用类型。我面临的问题是将\
  \ `NewCoDirectory` 类集成到现有的员工目录中。\n\n**为什么不仅仅是修改代码？**\n\n我可以通过修改 `NewCoDirectory`\
  \ 类来解决这个问题，但这在现实世界中并不总是可行的，这也是适配器模式如此有用的原因。代码无法修改的主要原因是，当组件是从第三方购买时，你甚至可能看不到源代码，只能看到它暴露的\
  \ API。当你是他们销售的数千名客户之一时，组件开发者不太可能采用你私有的 API。\n\n你还会在大型公司工作时遇到无法更改的代码。常见的原因包括处理遗留产品（“我们不知道它如何工作，也不敢碰它”）、处理资源不足的项目（“我们大约需要\
  \ 2 年时间才能实现你的 API”），以及处理政治问题（“你应该实现我的 API”）。\n\n无论原因是什么，结果都一样：一个提供了你所需功能但不以你想要的方式提供的\
  \ API。出于本章的目的，假设我没有 `NewCoDirectory` 类的源代码（也许因为它是一个现成的产品），并且我需要在无法进行任何更改的情况下，找到一种方法来集成它提供的员工数据。\n\
  \n我可以通过修改 `SearchTool` 应用程序来解决这个问题，使其知道如何查询新的数据源。这意味着，对于我集成的每一个组件，以及需要查询数据源的每一个应用程序部分，我都必须重复这个修改过程。结果是，每次添加新的数据源或更改现有数据源时，都需要进行一系列复杂的更改——而这正是设计模式旨在避免的情况。\n\
  \n## 理解适配器模式\n\n适配器模式允许两个不兼容的类协同工作，它通过适配其中一个类所呈现的 API，将应用程序期望的 API 映射到组件提供的 API，如图\
  \ 12-1 所示。在示例应用程序中，我需要适配 `NewCoDirectory` 类定义的 API，以便 `SearchTool` 类能够使用它。\n\n![A978-1-4842-0394-1_12_Fig1_HTML.jpg](img/A978-1-4842-0394-1_12_Fig1_HTML.jpg)\n\
  \n**图 12-1.** 适配器模式\n\n适配器模式中有五个操作。第一个操作是应用程序使用它期望的 API 向适配器发起一个请求。在第二个操作中，适配器利用它对两个\
  \ API 的了解，选择一个能够处理该请求的组件方法或属性。\n\n在第三个操作中，组件接收来自适配器的请求，执行其工作，并将结果返回给适配器。\n\n在第四个操作中，适配器利用它对两个\
  \ API 的了解，将客户端提供的结果转换为应用程序期望的结果，并在最后一个操作中返回该结果。\n\n应用程序和组件彼此不知道对方的存在。适配器向应用程序呈现一个它已知的\
  \ API，并隐藏了该 API 如何映射到组件所提供的 API 的细节。\n\n\n\n## 实现适配器模式\n\n最优雅地实现适配器模式的方式是使用 Swift\
  \ 扩展。扩展允许你为无法修改的类添加功能。这些功能包括添加对某个协议的遵循，这非常适合实现适配器模式。代码清单 12-6 展示了 `Adapter.swift`\
  \ 文件的内容，该文件已添加到示例文件中，我使用它来通过扩展实现该模式。\n\n**代码清单 12-6. Adapter.swift 文件的内容**\n\n```\n\
  import Foundation\n\nextension NewCoDirectory : EmployeeDataSource {\n\n    var\
  \ employees:[Employee] {\n        return map(getStaff().values, { sv -> Employee\
  \ in\n            return Employee(name: sv.getName(), title: sv.getJob());\n   \
  \     });\n    }\n\n    func searchByName(name:String) -> [Employee] {\n       \
  \ return createEmployees(filter: {(sv:NewCoStaffMember) -> Bool in\n           \
  \ return sv.getName().rangeOfString(name) != nil;\n        });\n    }\n\n    func\
  \ searchByTitle(title:String) -> [Employee] {\n        return createEmployees(filter:\
  \ {(sv:NewCoStaffMember) -> Bool in\n            return sv.getJob().rangeOfString(title)\
  \ != nil;\n        });\n    }\n\n    private func createEmployees(filter filterClosure:(NewCoStaffMember\
  \ -> Bool))\n        -> [Employee] {\n            return map(filter(getStaff().values,\
  \ filterClosure), {entry -> Employee in\n                return Employee(name: entry.getName(),\
  \ title: entry.getJob());\n            });\n    }\n\n}\n```\n\n我定义了一个扩展，使 `NewCoDirectory`\
  \ 类遵循 `EmployeeDataSource` 协议。适配 API 的过程通常比仅仅在方法和属性之间进行映射要复杂，通常需要在适配器中加入一些逻辑来处理类型转换，并填补功能上的微小缺口。在代码清单\
  \ 12-6 中，你可以看到我必须添加按姓名和标题搜索的功能，以及将 `NewCoDirectory` 类产生的 `NewCoStaffMember` 对象转换为\
  \ `EmployeeDataSource` 协议所期望的 `Employee` 对象。\n\n**提示**\n\n扩展只能操作被扩展类中可访问的属性和方法。这就是为什么我通过\
  \ `NewCoDirectory` 类定义的 `getStaff` 方法来获取员工详细信息，而不是通过一个名为 `staff` 的 `private` 属性。\n\
  \n使用扩展意味着 `NewCoDirectory` 类的实例可以传递给 `SearchTool` 初始化器，并像任何其他数据源一样被处理，如代码清单 12-7\
  \ 所示。扩展定义的属性和方法——以及它所遵循的任何协议——会自动应用于该扩展的类，即使该类本身没有被修改。\n\n**代码清单 12-7. 在 main.swift\
  \ 文件中使用适配器**\n\n```\nlet search = SearchTool(dataSources: SalesDataSource(),\n \
  \   DevelopmentDataSource(), NewCoDirectory());\nprintln(\"--List--\");\nfor e in\
  \ search.employees {\n    println(\"Name: \\(e.name)\");\n}\nprintln(\"--Search--\"\
  );\nfor e in search.search(\"VP\", type: SearchTool.SearchType.TITLE) {\n    println(\"\
  Name: \\(e.name), Title: \\(e.title)\");\n}\n```\n\n不需要对 `SearchTool` 类进行任何修改，通过运行应用程序，你可以看到目录如何包含\
  \ `NewCo` 的员工。\n\n```\n--List--\nName: Alice\nName: Bob\nName: Joe\nName: Pepe\n\
  Name: Greta\nName: Hans\n--Search--\nName: Alice, Title: VP of Sales\nName: Joe,\
  \ Title: VP of Development\nName: Greta, Title: VP, Legal\n```\n\n### 为什么不直接迁移数据？\n\
  \n在我的示例中，另一种方法是将数据从被收购公司的系统迁移到母公司的系统中。当然，这并不总是一个解决方案，而且在尝试将第三方代码集成到你的应用程序中时，这种方法也无济于事。\n\
  \n从长远来看，数据迁移有很多吸引人的地方，但很难快速实现，尤其是对于像员工目录这样与复杂业务流程和遗留应用程序深度绑定的应用程序。将所有数据迁移到一个单一平台，最终会通过淘汰其中一个系统来降低成本——这在并购中非常重要——但这需要大量的努力，并且对关键员工提出了要求，而这些员工很可能正专注于其他问题。像适配器这样的模式可以帮助减少在交易完成后的日子里启动的复杂项目数量，并争取一些时间来看看其他业务流程将如何变化。\n\
  \n实现一个长期的战略解决方案总是可取的，但通过使用适配器来获得一些短期利益，往往更务实，也更有可能成功。\n\n## 适配器模式的变体\n\n在实现适配器模式时，有两种有用的变体，我将在下面的章节中进行描述。\n\
  \n### 将适配器定义为包装类\n\n如果你不喜欢使用扩展，那么你可以将适配器实现为一个包装组件的类。代码清单 12-8 展示了如何用类替换扩展适配器。\n\n\
  **代码清单 12-8. 在 Adapter.swift 文件中将适配器实现为包装类**\n\n```\nclass NewCoDirectoryAdapter\
  \ : EmployeeDataSource {\n    private let directory:NewCoDirectory;\n\n    init()\
  \ {\n        directory = NewCoDirectory();\n    }\n\n    var employees:[Employee]\
  \ {\n        return map(directory.getStaff().values, { sv -> Employee in\n     \
  \       return Employee(name: sv.getName(), title: sv.getJob());\n        });\n\
  \    }\n\n    func searchByName(name:String) -> [Employee] {\n        return createEmployees(filter:\
  \ {(sv:NewCoStaffMember) -> Bool in\n            return sv.getName().rangeOfString(name)\
  \ != nil;\n        });\n    }\n\n    func searchByTitle(title:String) -> [Employee]\
  \ {\n        return createEmployees(filter: {(sv:NewCoStaffMember) -> Bool in\n\
  \            return sv.getJob().rangeOfString(title) != nil;\n        });\n    }\n\
  \n    private func createEmployees(filter filterClosure:(NewCoStaffMember -> Bool))\n\
  \        -> [Employee] {\n            return map(filter(directory.getStaff().values,\
  \ filterClosure),\n                {entry -> Employee in\n                    return\
  \ Employee(name: entry.getName(), title: entry.getJob());\n            });\n   \
  \ }\n\n}\n```\n\n**提示**\n\n使用包装类并没有什么优势，但有一些高级适配无法通过扩展实现，我将在下一节中进行描述。\n\n适配器中包含的逻辑与基于扩展的实现相同，只是适配器的编写方式发生了变化。我仍然需要实现执行搜索的支持，并且仍然需要在结果类型之间进行映射。\n\
  \n这种方法要求适配器类被实例化并使用，而不是使用（扩展后的）组件本身，如代码清单 12-9 所示。\n\n**代码清单 12-9. 在 main.swift\
  \ 文件中使用适配器包装类**\n\n```\nlet search = SearchTool(dataSources: SalesDataSource(),\n\
  \    DevelopmentDataSource(), NewCoDirectoryAdapter());\nprintln(\"--List--\");\n\
  for e in search.employees {\n    println(\"Name: \\(e.name)\");\n}\nprintln(\"--Search--\"\
  );\nfor e in search.search(\"VP\", type: SearchTool.SearchType.TITLE) {\n    println(\"\
  Name: \\(e.name), Title: \\(e.title)\");\n}\n```\n\n\n\n### 创建双向适配器\n\n适配器模式的标准实现假设方法和属性调用的流向是单向的：从应用程序到组件。通常情况下确实如此，尤其是在处理像\
  \ UI 控件这样的第三方组件时。但有时组件也会期望发起自己的操作，通常是查询应用程序的状态或通知应用程序其自身状态或所提供的服务发生了变化。为了演示这个问题，我创建了一个名为`TwoWayAdapter.playground`的\
  \ playground，并用它来定义清单 12-10 中所示的类和协议。（我之所以使用 playground，是因为在示例应用程序中演示这个问题需要列出大量代码来处理一些微小的改动。）\n\
  \n**清单 12-10.** TwoWayAdapter.playground 文件的内容\n\n```\n// application\nprotocol\
  \ ShapeDrawer {\n    func drawShape();\n}\n\nclass DrawingApp {\n    let drawer:ShapeDrawer;\n\
  \    var cornerRadius:Int = 0;\n\n    init(drawer:ShapeDrawer) {\n        self.drawer\
  \ = drawer;\n    }\n\n    func makePicture() {\n        drawer.drawShape();\n  \
  \  }\n}\n\n// component library\nprotocol AppSettings {\n    var sketchRoundedShapes:Bool\
  \ { get };\n}\n\nclass SketchComponent {\n    private let settings:AppSettings;\n\
  \n    init(settings:AppSettings) {\n        self.settings = settings;\n    }\n\n\
  \    func sketchShape() {\n        if (settings.sketchRoundedShapes) {\n       \
  \     println(\"Sketch Circle\");\n        } else {\n            println(\"Sketch\
  \ Square\");\n        }\n    }\n}\n```\n\n我将代码分成了两部分——一部分用于应用程序，另一部分用于需要集成的组件。在应用程序端，`DrawingApp`类依赖`ShapeDrawer`协议在`makePicture`方法中执行其工作。在组件端，`SketchComponent`类依赖`AppSettings`协议来确定它应该绘制什么类型的形状。\n\
  \n目标是创建一个适配器，让`DrawingApp`对象能够使用`SketchComponent`对象来创建形状，同时，作为回报，让`SketchComponent`能够通过`AppSettings`协议查询应用程序。\n\
  \n单向使用适配器很容易，但让对象通过适配器进行双向通信则困难得多——尤其是因为我创建的类具有冲突的初始化器。除非我有一个符合`ShapeDrawer`协议的对象作为初始化参数，否则我无法创建`DrawingApp`的实例。同样，除非我能给`SketchComponent`的初始化器传递一个符合`AppSettings`协议的对象，否则我也无法创建`SketchComponent`对象。清单\
  \ 12-11 展示了我为解决这个问题并使这些类相互集成而创建的适配器。\n\n**清单 12-11.** 在 TwoWayAdapter.playground\
  \ 文件中创建适配器\n\n```\n// application\nprotocol ShapeDrawer {\n    func drawShape();\n\
  }\n\nclass DrawingApp {\n    // ...为简洁起见，省略了语句...\n}\n\n// component library\nprotocol\
  \ AppSettings {\n    var sketchRoundedShapes:Bool { get };\n}\n\nclass SketchComponent\
  \ {\n    // ...为简洁起见，省略了语句...\n}\n\nclass TwoWayAdapter : ShapeDrawer, AppSettings\
  \ {\n    var app:DrawingApp?;\n    var component:SketchComponent?\n\n    func drawShape()\
  \ {\n        component?.sketchShape();\n    }\n\n    var sketchRoundedShapes: Bool\
  \ {\n        return app?.cornerRadius > 0;\n    }\n}\n```\n\n这个名为`TwoWayAdapter`的适配器类符合`ShapeDrawer`和`AppSettings`协议，并使用`DrawingApp`和`SketchComponent`类的可选实例来实现协议方法。这是绕过初始化器冲突需求的关键，如清单\
  \ 12-12 所示。\n\n**清单 12-12.** 在 TwoWayAdapter.playground 文件中使用适配器\n\n```\nprotocol\
  \ ShapeDrawer {\n    func drawShape();\n}\n\nclass DrawingApp {\n    // ...为简洁起见，省略了语句...\n\
  }\n\n// component library\nprotocol AppSettings {\n    var sketchRoundedShapes:Bool\
  \ { get };\n}\n\nclass SketchComponent {\n    // ...为简洁起见，省略了语句...\n}\n\nclass TwoWayAdapter\
  \ : ShapeDrawer, AppSettings {\n    // ...为简洁起见，省略了语句...\n}\n\nlet adapter = TwoWayAdapter();\n\
  let component = SketchComponent(settings: adapter);\nlet app = DrawingApp(drawer:\
  \ adapter);\nadapter.app = app;\nadapter.component = component;\napp.makePicture();\n\
  ```\n\n> **注意**：这是一个无法使用 Swift 扩展创建的适配器，因为它需要操作两个不同的类。\n\n我先创建了一个适配器实例，该实例符合创建`SketchComponent`和`DrawingApp`对象所需的协议。然后我设置了适配器的`app`和`component`属性，这样适配器就有了其方法所需的对象。结果是两个对象都可以通过适配器互相调用，你可以在\
  \ playground 的调试控制台中看到输出。\n\n```\nSketch Square\n```\n\n## 理解适配器模式的陷阱\n\n适配器模式仅在集成具有相似功能的组件时才有用，这意味着尽管类的\
  \ API 不同，但它们提供的功能是兼容的。\n\n在示例应用程序中，有一个消费员工数据的组件（`SearchTool`类）和一个提供员工数据的组件（`NewCoDirectory`类）。这些类的功能是兼容的，但我不能将`NewCoDirectory`类用作数据源，因为它没有实现`SearchTool`类所需的协议。\n\
  \n当组件提供的功能不同时，适配器模式就无济于事了。例如，适配器模式不能用于集成提供员工停车位详细信息的数据库，因为应用程序中不支持这些数据，无论对 API 进行多少适配都无法改变这一点。为了有效使用适配器模式，请纯粹关注\
  \ API，并尽可能保持适配方案简单。\n\n## Cocoa 中适配器模式的示例\n\nCocoa 并没有直接暴露适配器模式，因为其组件为标准行为设定了规范。如果你想将一个组件集成到\
  \ Cocoa 中，那么就需要实现一个协议。一个很好的例子是第 5 章中我用来实现原型模式的`NSCopying`协议：如果你想将一个类集成到 Cocoa 的对象拷贝支持中，那么即使它已经有自己的克隆创建方法，你也需要让它符合`NSCopying`协议。这就是任何平台上的核心\
  \ API 的立场；如果需要适配器，那么你有责任在你的代码中定义它。\n\n## 将模式应用于 SportsStore 应用\n\n并非所有适配器都通过映射单一类型来将组件集成到应用程序中。为了演示这一点，我将创建一个适配器，它实现抽象工厂模式，并遵循实现协议来完成其工作。\n\
  \n### 准备示例应用程序\n\n我在示例项目中添加了一个名为`Euro.swift`的文件，并用它来定义清单 12-13 中所示的类。\n\n**清单 12-13.**\
  \ Euro.swift 文件的内容\n\n```\nclass EuroHandler {\n    func getDisplayString(amount:Double)\
  \ -> String {\n        let formatted = Utils.currencyStringFromNumber(amount);\n\
  \        return \"€\\(dropFirst(formatted))\";\n    }\n\n    func getCurrencyAmount(amount:Double)\
  \ -> Double {\n        return 0.76164 * amount;\n    }\n}\n```\n\n`EuroHandler`类将美元金额转换为欧元，并创建格式化的货币字符串。这与我在第\
  \ 10 章中添加到 SportsStore 应用以演示抽象工厂模式的功能类型相同，但是`EuroHandler`类并不完全符合应用程序期望的模型，因此需要一个适配器。\n\
  \n\n\n### 定义适配器类\n\n为了将 `EuroHandler` 类适配到 SportsStore 应用程序中，我需要定义一个具体的工厂类，用于生成\
  \ `StockValueConverter` 和 `StockValueFormatter` 对象。清单 12-14 展示了我对 `StockValueFactories.swift`\
  \ 文件所做的修改。\n\n**清单 12-14.** 在 `StockValueFactories.swift` 文件中定义适配器\n\n```\nimport\
  \ Foundation\n\nclass StockTotalFactory {\n\n    enum Currency {\n        case USD\n\
  \        case GBP\n        case EUR\n    }\n\n    private(set) var formatter:StockValueFormatter?;\n\
  \    private(set) var converter:StockValueConverter?;\n\n    class func getFactory(curr:Currency)\
  \ -> StockTotalFactory {\n        if (curr == Currency.USD) {\n            return\
  \ DollarStockTotalFactory.sharedInstance;\n        } else if (curr == Currency.GBP){\n\
  \            return PoundStockTotalFactory.sharedInstance;\n        } else {\n \
  \           return EuroHandlerAdapter.sharedInstance;\n        }\n    }\n}\n\n//\
  \ ...为简洁起见，省略了其他工厂...\n\nclass EuroHandlerAdapter : StockTotalFactory,\n    StockValueConverter,\
  \ StockValueFormatter {\n    private let handler:EuroHandler;\n\n    override init()\
  \ {\n        self.handler = EuroHandler();\n        super.init();\n        super.formatter\
  \ = self;\n        super.converter = self;\n    }\n\n    func formatTotal(total:Double)\
  \ -> String {\n        return handler.getDisplayString(total);\n    }\n\n    func\
  \ convertTotal(total:Double) -> Double {\n        return handler.getCurrencyAmount(total);\n\
  \    }\n\n    class var sharedInstance:EuroHandlerAdapter {\n        get {\n   \
  \         struct SingletonWrapper {\n                static let singleton = EuroHandlerAdapter();\n\
  \            }\n            return SingletonWrapper.singleton;\n        }\n    }\n\
  }\n```\n\n**提示** 我必须将工厂类定义在 `StockValueFactories.swift` 文件中，因为需要为 `StockTotalFactory`\
  \ 类中的 `private` 属性设置值，这意味着要将适配器放在同一个文件中。\n\n我已经更新了 `StockTotalFactory` 类，添加了对欧元处理的支持，并定义了一个名为\
  \ `EuroHandlerAdapter` 的适配器。该适配器派生自 `StockTotalFactory` 类，并同时遵循 `StockValueConverter`\
  \ 和 `StockValueFormatter` 协议。它通过创建 `EuroHandler` 实例并将其提供的功能映射到协议指定的方法，从而适配了 `EuroHandler`\
  \ 类。我也可以通过定义扩展来处理协议，但我更倾向于在可能的情况下将适配器保持为单一类型。\n\n### 使用适配后的功能\n\n在清单 12-15 中，你可以看到我如何更新了\
  \ `ViewController` 类的 `displayStockTotal` 方法，以便欧元成为选定的货币。\n\n**清单 12-15.** 在 `ViewController.swift`\
  \ 文件中使用适配器\n\n```\n...\n\nfunc displayStockTotal() {\n    let finalTotals:(Int,\
  \ Double) = productStore.products.reduce((0, 0.0),\n        {(totals, product) ->\
  \ (Int, Double) in\n            return (\n                totals.0 + product.stockLevel,\n\
  \                totals.1 + product.stockValue\n            );\n    });\n\n    var\
  \ factory = StockTotalFactory.getFactory(StockTotalFactory.Currency.EUR);\n    var\
  \ totalAmount = factory.converter?.convertTotal(finalTotals.1);\n    var formatted\
  \ = factory.formatter?.formatTotal(totalAmount!);\n    totalStockLabel.text = \"\
  \\(finalTotals.0) Products in Stock. \"\n        + \"Total Value: \\(formatted!)\"\
  ;\n}\n\n...\n```\n\n结果是库存总价值将被转换为欧元并显示在应用程序布局的底部，如图 12-2 所示。\n\n![A978-1-4842-0394-1_12_Fig2_HTML.jpg](img/A978-1-4842-0394-1_12_Fig2_HTML.jpg)\n\
  \n**图 12-2.** 欧元适配器的效果\n\n## 本章小结\n\n在本章中，我解释了如何使用适配器模式使两个接口不兼容的类协同工作。我演示了如何通过使用扩展以及创建一个包装被适配对象的类来定义适配器。在下一章中，我将描述桥接模式。\n\
  \n"
- "# 13. 桥接模式\n\n桥接模式可能令人困惑。它看起来类似于我在第 12 章中描述的适配器模式，但其用途可能看起来有违直觉。在本章中，我将重点介绍桥接模式最常用于解决的问题，并解释为什么桥接模式和适配器模式最大的区别在于意图而非实现。表\
  \ 13-1 展示了桥接模式的上下文。\n\n**表 13-1.** 桥接模式上下文\n\n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？\
  \ | 桥接模式将抽象与其实现分离，以便两者可以独立更改，而无需相互对应地修改。更常见的是，桥接模式用于解决称为“爆炸式类层次结构”的问题，该问题通常源于重复但欠考虑的代码重构，并导致需要不断增加类来为应用程序添加新功能。\
  \ |\n| 有什么好处？ | 当桥接模式应用于爆炸式类层次结构问题时，其好处是添加新功能到应用程序只需要一个类。更广泛地说，该模式在抽象或其实现发生变化时，能隔离变更的影响。\
  \ |\n| 何时使用此模式？ | 使用此模式来解决爆炸式类层次结构问题，或在两个 API 之间建立桥梁。 |\n| 何时应避免此模式？ | 在尝试集成第三方组件时不要使用此模式；请改用我在第\
  \ 12 章中描述的适配器模式。 |\n| 如何知道是否正确实现了该模式？ | 针对爆炸式类层次结构问题，当添加新功能或添加对新平台的支持只需一个类即可完成时，即表示正确实现了该模式。更广泛地说，当你能够更改抽象（例如协议或闭包签名）而无需相应地更改其实现时，即表示正确实现了该模式。\
  \ |\n| 是否有常见的陷阱？ | 如果通用代码未能与平台特定代码分离，爆炸式类层次结构将无法解决。 |\n| 是否有相关的模式？ | 许多结构型模式具有相似的实现但意图不同。请确保从我在本书这部分描述的模式中选择正确的模式。\
  \ |\n\n\n\n## 准备示例项目\n\n本章我创建了一个新的 OS X 命令行工具项目，命名为 `Bridge`。为此项目的准备工作，我添加了一个名为\
  \ `Comms.swift` 的文件，并在其中定义了清单 13-1 所示的类型。\n\n清单 13-1. `Comms.swift` 文件的内容\n\n```\n\
  protocol ClearMessageChannel {\n    func send(message:String);\n}\n\nprotocol SecureMessageChannel\
  \ {\n    func sendEncryptedMessage(encryptedText:String);\n}\n\nclass Communicator\
  \ {\n    private let clearChannel:ClearMessageChannel;\n    private let secureChannel:SecureMessageChannel;\n\
  \n    init (clearChannel:ClearMessageChannel, secureChannel:SecureMessageChannel)\
  \ {\n        self.clearChannel = clearChannel;\n        self.secureChannel = secureChannel;\n\
  \    }\n\n    func sendCleartextMessage(message:String) {\n        self.clearChannel.send(message);\n\
  \    }\n\n    func sendSecureMessage(message:String) {\n        self.secureChannel.sendEncryptedMessage(message);\n\
  \    }\n}\n```\n\n`Communicator` 类提供了一些方法，用于发送普通消息和安全消息。处理这些消息的机制由 `ClearMessageChannel`\
  \ 和 `SecureMessageChannel` 协议定义，这两个协议各自规定了处理一种通信类型所需的方法。\n\n我打算支持两种不同的网络传输机制：有线网络和无线网络。我创建了一个名为\
  \ `Channels.swift` 的文件，并在其中创建了清单 13-2 所示的类。\n\n清单 13-2. `Channels.swift` 文件的内容\n\
  \n```\nclass Landline : ClearMessageChannel {\n    func send(message: String) {\n\
  \        println(\"Landline: \\(message)\");\n    }\n}\n\nclass SecureLandLine :\
  \ SecureMessageChannel {\n    func sendEncryptedMessage(message: String) {\n   \
  \     println(\"Secure Landline: \\(message)\");\n    }\n}\n\nclass Wireless : ClearMessageChannel\
  \ {\n    func send(message: String) {\n        println(\"Wireless: \\(message)\"\
  );\n    }\n}\n\nclass SecureWireless : SecureMessageChannel {\n    func sendEncryptedMessage(message:\
  \ String) {\n        println(\"Secure Wireless: \\(message)\");\n    }\n}\n```\n\
  \n为了完成准备工作，我在 `main.swift` 文件中添加了代码，该代码创建了发送消息所需的通道，并使用这些通道创建了一个 `Communicator`\
  \ 对象，如清单 13-3 所示。\n\n清单 13-3. `main.swift` 文件的内容\n\n```\nvar clearChannel = Landline();\n\
  var secureChannel = SecureLandLine();\nvar comms = Communicator(clearChannel: clearChannel,\
  \ secureChannel: secureChannel);\ncomms.sendCleartextMessage(\"Hello!\");\ncomms.sendSecureMessage(\"\
  This is a secret\");\n```\n\n运行该项目会在 Xcode 调试控制台中输出以下内容：\n\n```\nLandline: Hello!\n\
  Secure Landline: This is a secret\n```\n\n## 理解该模式要解决的问题\n\n如果觉得我添加到示例应用程序中的代码考虑不周，那是因为我一次性添加了所有类。桥接模式解决的问题，通常是在向应用程序添加功能并重构代码时逐渐显现出来的。\n\
  \n最终我得到了两个特性（普通消息和安全消息）以及实现这些特性的两个平台（有线网络和无线网络）。没有人会一开始就计划创建这种层次结构，它通常是在良好的初衷下逐渐形成的。一个应用程序通常从一个特性和一个平台开始，如图\
  \ 13-1 所示。\n\n![图 13-1](img/A978-1-4842-0394-1_13_Fig1_HTML.jpg)\n\n图 13-1. 应用程序的简单起点\n\
  \n在某个时候，需要添加另一个平台，并且该平台的选择将根据应用程序的配置方式而改变。一些明智的重构添加了一个协议，该协议标识了平台需要做什么，并创建了处理平台细节的实现类，如图\
  \ 13-2 所示。\n\n![图 13-2](img/A978-1-4842-0394-1_13_Fig2_HTML.jpg)\n\n图 13-2. 处理多个平台\n\
  \n之后，需要添加一个新特性——安全消息——因此又添加了一个协议，并创建了实现对象，如图 13-3 所示。这就是我在上一节中创建的应用程序状态。\n\n![图\
  \ 13-3](img/A978-1-4842-0394-1_13_Fig3_HTML.jpg)\n\n图 13-3. 处理多个特性\n\n问题在于，每当我添加一个新特性或一个新平台时，实现类的数量就会急剧增加。事实上，实现类的总数是特性数量与平台数量的乘积，这意味着如果我向应用程序添加第三个特性，实现类的数量将是六个（3\
  \ 和 2 的乘积）。再增加一个平台将需要九个实现类（3 和 3 的乘积）。\n\n这被称为类层次结构爆炸问题，它会产生一大堆难以跟踪、更难以维护的协议和实现类。类层次结构爆炸通常并非有意为之，但在时间紧迫、需要添加新特性并推动项目前进时，却很容易产生。\n\
  \n\n\n## 理解桥接模式\n\n桥接模式将抽象与其实现分离，使得二者可以独立地发生变化。这听起来可能有悖常理，但桥接模式通过创建两个独立的层级结构，将各平台特有的功能与跨平台共用的功能分离开，从而解决了类层级结构爆炸的问题。并由此创建了一个能将两个层级结构关联起来的桥接类。\n\
  \n**提示**\n\n将通用功能与平台特有功能分离是桥接模式最常用且最有效的应用方式，但它也可以用于分离任意抽象与其实现。参见“将模式应用于 SportsStore\
  \ 应用”章节以获取更通用的示例。\n\n在示例应用中，各平台特有的功能是通过特定类型网络传输消息。通用功能则是消息的准备工作。第一步是定义描述各领域（消息发送与传输）的协议，然后为其创建实现类。图\
  \ 13-4 展示了新的层级结构以及将它们关联起来的桥接类。\n\n**提示**\n\n如果抽象描述难以立即理解，不必担心。桥接模式确实可能难以解析。如果你正在努力理解其原理，可先阅读后续章节了解模式的具体实现，再回头重读本描述。\n\
  \n![A978-1-4842-0394-1_13_Fig4_HTML.jpg](img/A978-1-4842-0394-1_13_Fig4_HTML.jpg)\n\
  \n*图 13-4. 桥接模式*\n\n桥接类负责组合`Channel`和`Message`协议，利用`Communicator`类依赖的协议，提供其所需的功能。\n\
  \n**注意**\n\n请注意我并未修改`Communicator`类。桥接类支持`Communicator`类所期望的 API，并将该 API 映射（更准确说是桥接）到新的消息和通道层级结构。`Communicator`类保持原样，因为实现桥接模式的默认前提是应用中还有其他多个类期望相同的协议。参见\"\
  折叠桥接\"章节以了解替代方案。\n\n### 桥接模式难道不就是适配器模式吗？\n\n桥接模式与我在第 12 章描述的适配器模式非常相似。毕竟，桥接类不就是在为依赖`ClearChannel`和`SecureChannel`协议的`Communicator`类适配`Channel`和`Message`协议吗？\n\
  \n桥接模式和适配器模式确实相似，但它们应用于不同场景。当需要集成无法修改代码的组件（如第三方控件）时，使用适配器模式。你添加适配器使第三方组件能通过应用期望的\
  \ API 使用，但无法改变组件的工作方式（因为只有运行时组件，或修改会被组件开发团队的下一版本覆盖）。\n\n当可以修改源代码、能改变组件工作方式时，使用桥接模式，适用于混合了通用功能与平台特有功能的类层级结构。应用桥接模式不仅涉及创建桥接类，还需要重构组件以分离通用代码和平台特有代码。\n\
  \n## 实现桥接模式\n\n描述桥接模式固然有用，但代码示例更能演示其运作方式。在后续章节中，我将重构示例应用以应用桥接模式，防止类层级结构爆炸。\n\n###\
  \ 处理消息\n\n第一步是处理与网络类型无关的通用功能，即消息的创建和准备工作。列表 13-4 展示了添加到示例项目中的`Messages.swift`文件内容。\n\
  \n**列表 13-4.** Messages.swift 文件内容\n\n```\nprotocol Message {\n    init (message:String);\n\
  \    func prepareMessage();\n    var contentToSend:String { get };\n}\n\nclass ClearMessage\
  \ : Message {\n    private var message:String;\n    required init(message:String)\
  \ {\n        self.message = message;\n    }\n    func prepareMessage() {\n     \
  \   // 无需操作\n    }\n    var contentToSend:String {\n        return message;\n  \
  \  }\n}\n\nclass EncryptedMessage : Message {\n    private var clearText:String;\n\
  \    private var cipherText:String?;\n    required init(message:String) {\n    \
  \    self.clearText = message;\n    }\n    func prepareMessage() {\n        cipherText\
  \ = String(reverse(clearText));\n    }\n    var contentToSend:String {\n       \
  \ return cipherText!;\n    }\n}\n```\n\n我定义了一个名为`Message`的协议。该协议定义了一个接受消息文本的必需初始化器，并定义了一个`prepareMessage`方法，该方法将被调用以便符合协议的各类的实例有机会处理消息文本。只读属性`contentToSend`将用于获取需要通过网络传输的文本内容。\n\
  \n我定义了两个符合该协议的类。第一个类是`ClearMessage`，用于表示不需要加密的消息。第二个类是`EncryptedMessage`，用于需要加密的消息（此处的加密仅将字符串字符反转——虽然不足以用于实际项目，但对示例应用已足够）。\n\
  \n### 处理通道\n\n下一步是定义各网络特有的功能，即消息传输。列表 13-5 展示了我对`Channels.swift`文件所做的修改。\n\n**列表\
  \ 13-5.** 修订 Channels.swift 文件内容\n\n```\nprotocol Channel {\n    func sendMessage(msg:Message);\n\
  }\n\nclass LandlineChannel : Channel {\n    func sendMessage(msg: Message) {\n \
  \       println(\"Landline: \\(msg.contentToSend)\");\n    }\n}\n\nclass WirelessChannel\
  \ : Channel {\n    func sendMessage(msg: Message) {\n        println(\"Wireless:\
  \ \\(msg.contentToSend)\");\n    }\n}\n```\n\n我定义了一个名为`Channel`的协议，其中包含一个`sendMessage`方法。与原始版本不同，通道不再负责处理不同类型的消息。`sendMessage`方法将被传入一个`Message`对象，其`contentToSend`属性返回需要传输的内容。通道无需知道它们正在发送何种类型的消息，只需专注于传输处理。\n\
  \n我定义了两个符合`Channel`协议的类，分别对应有线网络和无线网络。两个类的`sendMessage`方法实现都会向调试控制台输出一条消息，指示所使用的通道和传输内容。\n\
  \n\n\n### 创建桥接器\n\n最后，我需要创建一个类，作为 `Communicator` 类与新的 `Message` 和 `Channel` 协议之间的桥接器。清单\
  \ 13-6 展示了 `Bridge.swift` 文件的内容，我已将其添加到示例项目中。\n\n**清单 13-6.** `Bridge.swift` 文件的内容\n\
  \n```\nclass CommunicatorBridge : ClearMessageChannel, SecureMessageChannel {\n\
  \    private var channel:Channel;\n    init(channel:Channel) {\n        self.channel\
  \ = channel;\n    }\n    func send(message: String) {\n        let msg = ClearMessage(message:\
  \ message);\n        sendMessage(msg);\n    }\n    func sendEncryptedMessage(encryptedText:\
  \ String) {\n        let msg = EncryptedMessage(message: encryptedText);\n     \
  \   sendMessage(msg);\n    }\n    private func sendMessage(msg:Message) {\n    \
  \    msg.prepareMessage();\n        channel.sendMessage(msg);\n    }\n}\n```\n\n\
  `CommunicatorBridge` 类实现了 `Communicator` 类所依赖的 `ClearMessageChannel` 和 `SecureMessageChannel`\
  \ 协议。它利用新的 `Message` 和 `Channel` 协议来实现这些协议。`CommunicatorBridge` 类会根据其被调用的方法选择适当的\
  \ `Message` 实现类，并将创建的 `Message` 对象传递给其初始化器给定的 `Channel` 对象。\n\n清单 13-7 展示了如何更新 `main.swift`\
  \ 文件，以使用 `CommunicatorBridge` 类来配置 `Communicator` 对象。\n\n**清单 13-7.** 在 `main.swift`\
  \ 文件中使用 `CommunicatorBridge` 类\n\n```\nvar bridge = CommunicatorBridge(channel:\
  \ LandlineChannel());\nvar comms = Communicator(clearChannel: bridge, secureChannel:\
  \ bridge);\ncomms.sendCleartextMessage(\"Hello!\");\ncomms.sendSecureMessage(\"\
  This is a secret\");\n```\n\n运行应用程序会产生以下输出：\n\n```\nLandline: Hello!\nLandline:\
  \ terces a si sihT\n```\n\n### 添加新的消息类型和通道\n\n为了演示桥接模式的效果，我将为应用程序添加一种新的消息类型和一个新的通道。新消息用于高优先级通信，新通道用于卫星网络。首先，我在\
  \ `Communicator` 类中添加了对优先级消息的支持，如清单 13-8 所示。无论是否应用了桥接模式，这些修改都是必须进行的。\n\n**清单 13-8.** 在\
  \ `Comms.swift` 文件中添加对新消息类型的支持\n\n```\nprotocol ClearMessageChannel {\n    func\
  \ send(message:String);\n}\nprotocol SecureMessageChannel {\n    func sendEncryptedMessage(message:String);\n\
  }\nprotocol PriorityMessageChannel {\n    func sendPriority(message:String);\n}\n\
  class Communicator {\n    private let clearChannel:ClearMessageChannel;\n    private\
  \ let secureChannel:SecureMessageChannel;\n    private let priorityChannel:PriorityMessageChannel;\n\
  \    init (clearChannel:ClearMessageChannel, secureChannel:SecureMessageChannel,\n\
  \          priorityChannel:PriorityMessageChannel) {\n        self.clearChannel\
  \ = clearChannel;\n        self.secureChannel = secureChannel;\n        self.priorityChannel\
  \ = priorityChannel;\n    }\n    func sendCleartextMessage(message:String) {\n \
  \       self.clearChannel.send(message);\n    }\n    func sendSecureMessage(message:String)\
  \ {\n        self.secureChannel.sendEncryptedMessage(message);\n    }\n    func\
  \ sendPriorityMessage(message:String) {\n        self.priorityChannel.sendPriority(message);\n\
  \    }\n}\n```\n\n在原始的类层次结构下（没有桥接模式），添加一种新消息和一个新通道需要创建五个新类，如图 13-5 所示。\n\n![A978-1-4842-0394-1_13_Fig5_HTML.jpg](img/A978-1-4842-0394-1_13_Fig5_HTML.jpg)\n\
  \n**图 13-5.** 在没有桥接模式的情况下为应用程序添加新特性\n\n这是问题的核心所在。没有桥接模式，当我在应用程序中添加新特性时，必须创建更多的类。在应用桥接模式后，添加相同的消息类型和通道只需要两个新类——一个用于消息类型，一个用于通道，如图\
  \ 13-6 所示。\n\n![A978-1-4842-0394-1_13_Fig6_HTML.jpg](img/A978-1-4842-0394-1_13_Fig6_HTML.jpg)\n\
  \n**图 13-6.** 使用桥接模式为应用程序添加新特性\n\n该图看起来更复杂，但这是因为桥接模式为应用程序增加了更多结构（毕竟桥接模式是一种结构性模式）。就新特性所需的工作量而言，所需付出的努力要少得多。清单\
  \ 13-9 展示了 `NewFeatures.swift` 文件的内容，我将其添加到示例项目中，以实现新的消息类型和通道。\n\n**清单 13-9.** `NewFeatures.swift`\
  \ 文件的内容\n\n```\nclass SatelliteChannel : Channel {\n    func sendMessage(msg: Message)\
  \ {\n        println(\"Satellite: \\(msg.contentToSend)\");\n    }\n}\nclass PriorityMessage\
  \ : ClearMessage {\n    override var contentToSend:String {\n        return \"Important:\
  \ \\(super.contentToSend)\";\n    }\n}\n```\n\n定义了新类之后，我必须更新桥接器，使其能够接受来自 `Communicator`\
  \ 类的新消息类型，如清单 13-10 所示。\n\n**清单 13-10.** 在 `Bridge.swift` 文件中添加对新消息类型的支持\n\n```\n\
  class CommunicatorBridge : ClearMessageChannel,\n    SecureMessageChannel, PriorityMessageChannel\
  \ {\n    private var channel:Channel;\n    init(channel:Channel) {\n        self.channel\
  \ = channel;\n    }\n    func send(message: String) {\n        let msg = ClearMessage(message:\
  \ message);\n        sendMessage(msg);\n    }\n    func sendEncryptedMessage(encryptedText:\
  \ String) {\n        let msg = EncryptedMessage(message: encryptedText);\n     \
  \   sendMessage(msg);\n    }\n    func sendPriority(message: String) {\n       \
  \ sendMessage(PriorityMessage(message: message));\n    }\n    private func sendMessage(msg:Message)\
  \ {\n        msg.prepareMessage();\n        channel.sendMessage(msg);\n    }\n}\n\
  ```\n\n现在我可以更改 `main.swift` 文件中的代码来测试新功能，如清单 13-11 所示。\n\n**清单 13-11.** 在 `main.swift`\
  \ 文件中测试新消息类型\n\n```\nvar bridge = CommunicatorBridge(channel: SatelliteChannel());\n\
  var comms = Communicator(clearChannel: bridge, secureChannel: bridge,\n        \
  \                 priorityChannel: bridge);\ncomms.sendCleartextMessage(\"Hello!\"\
  );\ncomms.sendSecureMessage(\"This is a secret\");\ncomms.sendPriorityMessage(\"\
  This is important\");\n```\n\n运行应用程序会产生以下输出，这展示了新的消息类型和通道：\n\n```\nSatellite: Hello!\n\
  Satellite: terces a si sihT\nSatellite: Important: This is important\n```\n\n\n\n\
  ## 桥接模式的变体\n\n平台是在运行时选择的，通常通过配置文件或某些外部设置来指定。在示例应用程序中，平台是消息发送的通道，而平台的选择取决于可用的网络硬件。在实践中，我会像这样显式选择平台：\n\
  \n```\n...\nvar bridge = CommunicatorBridge(channel: SatelliteChannel());\n...\n\
  ```\n\n这种做法并不现实，因为平台特定的实现是在编译时选择的，我必须更改代码并重新编译才能切换平台。我之所以这样做，是因为我不想为了演示桥接模式的用法而去创建配置系统或检测不同类型的网络。\n\
  \n最简单的变体方式是应用工厂方法模式，这样平台特定实现的选择对桥接类以及应用程序的其他部分都是隐藏的。清单 13-12 展示了我在示例应用程序中如何实现工厂方法模式——该方法已在第\
  \ 9 章中描述。\n\n**清单 13-12.** 在`Channels.swift`文件中应用工厂方法模式\n\n```\nclass Channel {\n\
  \    enum Channels {\n        case Landline;\n        case Wireless;\n        case\
  \ Satellite;\n    }\n\n    class func getChannel(channelType:Channels) -> Channel\
  \ {\n        switch channelType {\n            case .Landline:\n               \
  \ return LandlineChannel();\n            case .Wireless:\n                return\
  \ WirelessChannel();\n            case .Satellite:\n                return SatelliteChannel();\n\
  \        }\n    }\n\n    func sendMessage(msg:Message) {\n        fatalError(\"\
  Not implemented\");\n    }\n}\n\nclass LandlineChannel : Channel {\n    override\
  \ func sendMessage(msg: Message) {\n        println(\"Landline: \\(msg.contentToSend)\"\
  );\n    }\n}\n\nclass WirelessChannel : Channel {\n    override func sendMessage(msg:\
  \ Message) {\n        println(\"Wireless: \\(msg.contentToSend)\");\n    }\n}\n\
  ```\n\n我将`Channel`类型的定义从协议改为了类，并定义了一个名为`Channels`的嵌套枚举，用于列举可用的平台集合：有线（Landline）、无线（Wireless）和卫星（Satellite）。我还定义了一个类方法`getChannel`，它接受一个`Channels`值，并实例化表示该平台的类。\n\
  \n我必须对`LandlineChannel`和`WirelessChannel`类中定义的`sendMessage`方法使用`override`关键字，因为`Channel`已从协议变为类。清单\
  \ 13-13 展示了卫星实现类的相应更改。\n\n**清单 13-13.** 在`NewFeatures.swift`文件中修改方法声明\n\n```\nclass\
  \ SatelliteChannel : Channel {\n    override func sendMessage(msg: Message) {\n\
  \        println(\"Satellite: \\(msg.contentToSend)\");\n    }\n}\n\nclass PriorityMessage\
  \ : ClearMessage {\n    override var contentToSend:String {\n        return \"Important:\
  \ \\(super.contentToSend)\";\n    }\n}\n```\n\n清单 13-14 展示了`CommunicatorBridge`类的更改，初始化方法现在接受枚举值，而不是实现类的实例。\n\
  \n**清单 13-14.** 在`Bridge.swift`文件中更改初始化方法\n\n```\nclass CommunicatorBridge : ClearMessageChannel,\
  \ SecureMessageChannel,\n    PriorityMessageChannel {\n    private var channel:Channel;\n\
  \n    init(channel:Channel.Channels) {\n        self.channel = Channel.getChannel(channel);\n\
  \    }\n\n    func send(message: String) {\n        let msg = ClearMessage(message:\
  \ message);\n        sendMessage(msg);\n    }\n\n    func sendEncryptedMessage(encryptedText:\
  \ String) {\n        let msg = EncryptedMessage(message: encryptedText);\n     \
  \   sendMessage(msg);\n    }\n\n    func sendPriority(message: String) {\n     \
  \   sendMessage(PriorityMessage(message: message));\n    }\n\n    private func sendMessage(msg:Message)\
  \ {\n        msg.prepareMessage();\n        channel.sendMessage(msg);\n    }\n}\n\
  ```\n\n最后，我需要更新`main.swift`文件中平台选择的代码，如清单 13-15 所示。\n\n**清单 13-15.** 更新`main.swift`文件\n\
  \n```\nvar bridge = CommunicatorBridge(channel: Channel.Channels.Satellite);\nvar\
  \ comms = Communicator(clearChannel: bridge,\n    secureChannel: bridge, priorityChannel:\
  \ bridge);\ncomms.sendCleartextMessage(\"Hello!\");\ncomms.sendSecureMessage(\"\
  This is a secret\");\ncomms.sendPriorityMessage(\"This is important\");\n```\n\n\
  ### 折叠桥接\n\n应用桥接模式时，通常假设被桥接的协议会在应用程序的其他地方使用。在示例中，这意味着会有其他类似于`Communicator`的类依赖于`ClearMessageChannel`、`SecureMessageChannel`和`PriorityMessageChannel`协议，这也是我保留这些协议以及`Communicator`类，并在它们之上应用桥接的原因。\n\
  \n在某些应用程序中，可能只有一个类依赖于这些协议，这样就可以将这个类与桥接合并，并移除多余的协议。\n\n第一步是从项目中移除`Bridge.swift`文件。其中包含的`CommunicatorBridge`类将不再需要，并且它会阻止\
  \ Xcode 构建项目，因为它依赖于我将要移除的协议。下一步是将桥接功能添加到`Communicator`类中，如清单 13-16 所示。\n\n**清单 13-16.**\
  \ 在`Comms.swift`文件中添加桥接功能\n\n```\n//protocol ClearMessageChannel {\n//    func send(message:String);\n\
  //}\n//\n//protocol SecureMessageChannel {\n//    func sendEncryptedMessage(message:String);\n\
  //}\n//\n//protocol PriorityMessageChannel {\n//    func sendPriority(message:String);\n\
  //}\n\nclass Communicator {\n    private let channnel:Channel;\n\n    init (channel:Channel.Channels)\
  \ {\n        self.channnel = Channel.getChannel(channel);\n    }\n\n    private\
  \ func sendMessage(msg:Message) {\n        msg.prepareMessage();\n        channnel.sendMessage(msg);\n\
  \    }\n\n    func sendCleartextMessage(message:String) {\n        self.sendMessage(ClearMessage(message:\
  \ message));\n    }\n\n    func sendSecureMessage(message:String) {\n        self.sendMessage(EncryptedMessage(message:\
  \ message));\n    }\n\n    func sendPriorityMessage(message:String) {\n        self.sendMessage(PriorityMessage(message:\
  \ message));\n    }\n}\n```\n\n我注释掉了旧的协议，并更改了`Communicator`类，使其直接操作`Message`和`Channel`协议，不再依赖单独的桥接类。\n\
  \n**注意**\n\n这种变体仅当单个类使用桥接时才有用。如果你发现需要对多个类进行类似清单 13-16 的更改，那么说明你错误地应用了该模式。结果可能仍是对之前应用程序结构的改进，但你并未应用桥接模式，也无法享受到将通用与平台特定功能的实现与应用程序其他部分隔离所带来的好处。\n\
  \n我还必须更新`main.swift`文件中用于选择平台和发送消息的代码，如清单 13-17 所示。\n\n**清单 13-17.** 在`main.swift`文件中使用折叠后的桥接\n\
  \n```\nvar comms = Communicator(channel: Channel.Channels.Satellite);\ncomms.sendCleartextMessage(\"\
  Hello!\");\ncomms.sendSecureMessage(\"This is a secret\");\ncomms.sendPriorityMessage(\"\
  This is important\");\n```\n\n**注意**\n\n如果你没有移除`Bridge.swift`文件或至少注释掉其内容，你将无法构建该项目。\n\
  \n\n\n## 理解桥接模式的陷阱\n\n唯一的陷阱在于未能识别哪些功能是所有平台共有的，哪些是特定于平台的。成功实现桥接模式需要将通用功能和特定功能分离到不同的层级中，而正确识别这种划分可能相当困难。\n\
  \n根据经验法则，如果在每个平台类中都看到重复的语句组，它们就属于候选的通用功能。同样，处理不同平台的控制流语句则是特定于平台的。这看似显而易见的建议，但在一个经过多次糟糕重构、充斥着复制粘贴语句、hack\
  \ 和变通方案的复杂类型层级中，要理清头绪往往非常困难。\n\n## Cocoa 中的桥接模式示例\n\n桥接模式将实现细节隐藏在公共 API 之后，因此无法确定\
  \ Cocoa 框架中是否使用了该模式。\n\n## 将模式应用于 SportsStore 应用\n\n虽然桥接模式通常用于整理不断膨胀的类层级，但它也可以用于将任何抽象与其实现分离。在本节中，我将利用该模式的这种更广泛的应用来创建一个桥接，使\
  \ API 的目的更加明确。\n\n### 准备示例应用\n\n本章无需进行任何准备工作，我将直接从第 12 章的项目开始。请记住，你可以从 [`Apress.com`](https://Apress.com)\
  \ 下载 SportsStore 应用以及本书中的所有其他示例。\n\n### 理解问题\n\n在第 8 章中，我添加了一个模拟从远程服务器获取产品初始库存水平的功能。该过程为每个产品返回的数据在产品详情显示在应用布局中之后才可用，这促使我在\
  \ `ProductDataStore` 类中定义了一个用于发出更新信号的回调。以下是该回调的签名：\n\n```\n...\nvar callback:((Product)\
  \ -> Void)?;\n...\n```\n\n这个定义很简单：将具有库存水平值的 `Product` 对象传递给回调，回调无需定义返回结果。\n\n这是一种定义通知回调的常见方式，它反映了许多开发者关注问题的方式：在编写新功能时，它被认为是应用中最重要的功能。遗憾的是，这种回调风格没有考虑到通知的接收者可能已经注册了其他事件源，而每个事件源也定义了以自我为中心的回调。这样一来，如果不为每个事件源定义单独的闭包来处理，就很难准确判断变更通知的目的，这意味着通知源在隐式地引导接收者的实现逻辑。\n\
  \n桥接模式可以帮助解决这个问题，它可以在事件源所需的回调与一个更有用的 API 之间建立桥梁，从而为通知的接收者提供额外的上下文信息。\n\n### 定义桥接类\n\
  \n我所需的桥接类很简单，它只需要使用上一节中我展示签名的回调来接收事件，并将其映射到一个更有用的回调上，该回调为通知的最终接收者提供更多上下文信息。代码清单\
  \ 13-18 显示了我添加到 SportsStore 项目中的 `EventBridge.swift` 文件的内容。\n\n**代码清单 13-18.** EventBridge.swift\
  \ 文件的内容\n\n```\nclass EventBridge {\n\n    private let outputCallback:(String, Int)\
  \ -> Void;\n\n    init(callback:(String,Int) -> Void) {\n        self.outputCallback\
  \ = callback;\n    }\n\n    var inputCallback:(Product) -> Void {\n        return\
  \ { p in self.outputCallback(p.name, p.stockLevel); }\n    }\n\n}\n```\n\n`EventBridge`\
  \ 类很简单，但它将事件源与目标分离开来，并提供了一种方式，使得两者中的任何一个都可以在不修改另一个的情况下进行更改。关键在于，传入通知中的 `Product`\
  \ 对象不会随传出通知一起传递——相反，只传递产品名称和新的库存水平。这种更简单的通知更适合 `ViewController` 类，它实际上并不关心 `Product`\
  \ 对象，而更专注于更新显示给客户端的数值。代码清单 13-19 显示了我如何使用 `EventBridge` 类来简化 `ViewController` 代码。\n\
  \n**代码清单 13-19.** 在 ViewController.swift 文件中应用桥接\n\n```\nimport UIKit\n\n// ...为简洁起见，省略了\
  \ ProductTableCell 类...\n\nclass ViewController: UIViewController, UITableViewDataSource\
  \ {\n\n    @IBOutlet weak var totalStockLabel: UILabel!\n    @IBOutlet weak var\
  \ tableView: UITableView!\n\n    var productStore = ProductDataStore();\n\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad();\n        displayStockTotal();\n\
  \        let bridge = EventBridge(callback: updateStockLevel);\n        productStore.callback\
  \ = bridge.inputCallback;\n    }\n\n    func updateStockLevel(name:String, level:Int)\
  \ {\n        for cell in self.tableView.visibleCells() {\n            if let pcell\
  \ = cell as? ProductTableCell {\n                if pcell.product?.name == name\
  \ {\n                    pcell.stockStepper.value = Double(level);\n           \
  \         pcell.stockField.text = String(level);\n                }\n          \
  \  }\n        }\n        self.displayStockTotal();\n    }\n\n    override func didReceiveMemoryWarning()\
  \ {\n        super.didReceiveMemoryWarning();\n    }\n\n    // ...为简洁起见，省略了其他方法...\n\
  }\n```\n\n这看起来可能不是一个实质性的变化，但它意味着我可以定义一个单一的方法——`updateStockLevel`——来捕获所有库存水平的更新，无论它们在应用中的哪个位置产生。我可能需要使用一个桥接来转换原始事件，以便能够调用\
  \ `updateStockLevel`，但我不再需要为每个只向我发送 `Product` 对象的单个事件源定义闭包。\n\n## 总结\n\n在本章中，我描述了桥接模式，并解释了如何通过分离通用代码和特定于平台的代码来处理不断膨胀的类层级。我还解释了桥接模式具有更通用的作用，即将抽象与其实现分离，并演示了如何利用这一点来更改用于接收事件的\
  \ API。在下一章中，我将描述装饰器模式。\n\n\n\n"
- "# 14. 装饰器模式\n\n在本章中，我将介绍装饰器模式，它允许在运行时选择性地修改对象的行为。这种模式有多种用途，但在处理无法修改的类时效果最为显著。选择性修改意味着你可以选择哪些对象被更改，哪些保留其原始功能。表\
  \ 14-1 将装饰器模式置于具体语境中。\n\n表 14-1. 装饰器模式语境说明\n\n| 问题 | 答案 |\n| --- | --- |\n| 这是什么？\
  \ | 装饰器模式允许改变单个对象的行为，而无需修改用于创建这些对象的类或使用它们的组件。 |\n| 优点是什么？ | 用装饰器模式定义的行为变化可以组合起来，产生复杂的效果，而无需创建大量子类。\
  \ |\n| 何时使用此模式？ | 当你需要改变对象的行为，但又不改变创建它们的类或使用它们的组件时，可使用此模式。 |\n| 何时应避免此模式？ | 当你能够修改创建所需对象的类时，不应使用此模式。直接修改类通常更简单、更容易。\
  \ |\n| 如何判断是否正确实现了该模式？ | 当你能够选择某个类创建的部分对象进行修改，而不影响所有对象，且无需修改该类时，就说明正确实现了该模式。 |\n\
  | 有哪些常见陷阱？ | 主要陷阱是实现该模式时影响了某个类创建的所有对象，而不是允许选择性应用更改。一个不太常见的陷阱是，实现该模式时引入了与修改对象原始目的无关的隐藏副作用。\
  \ |\n| 是否有相关模式？ | 许多结构型模式有相似的实现，但意图不同。请确保从本书这一部分描述的模式中选出正确的一个。 |\n\n## 准备示例项目\n\n\
  按照我在前面章节中使用的方法，我创建了一个名为 `Decorator` 的新 OS X 命令行工具项目。我在项目中添加了一个名为 `Purchase.swift`\
  \ 的文件，其内容如代码清单 14-1 所示。\n\n代码清单 14-1. `Purchase.swift` 文件的内容\n\n```\nclass Purchase\
  \ : Printable {\n    private let product:String;\n    private let price:Float;\n\
  \    init(product:String, price:Float) {\n        self.product = product;\n    \
  \    self.price = price;\n    }\n    var description:String {\n        return product;\n\
  \    }\n    var totalPrice:Float {\n        return price;\n    }\n}\n```\n\n`Purchase`\
  \ 类表示顾客在商店中选择的商品。该类定义了存储产品名称的属性，并通过计算属性 `description` 和 `totalPrice` 将其公开。接下来，我在示例项目中添加了一个名为\
  \ `CustomerAccount.swift` 的文件，并用它定义了代码清单 14-2 中所示的类。\n\n代码清单 14-2. `CustomerAccount.swift`\
  \ 文件的内容\n\n```\nimport Foundation\n\nclass CustomerAccount {\n    let customerName:String;\n\
  \    var purchases = [Purchase]();\n    init(name:String) {\n        self.customerName\
  \ = name;\n    }\n    func addPurchase(purchase:Purchase) {\n        self.purchases.append(purchase);\n\
  \    }\n    func printAccount() {\n        var total:Float = 0;\n        for p in\
  \ purchases {\n            total += p.totalPrice;\n            println(\"Purchase\
  \ \\(p), Price \\(formatCurrencyString(p.totalPrice))\");\n        }\n        println(\"\
  Total due: \\(formatCurrencyString(total))\");\n    }\n    func formatCurrencyString(number:Float)\
  \ -> String {\n        let formatter = NSNumberFormatter();\n        formatter.numberStyle\
  \ = NSNumberFormatterStyle.CurrencyStyle;\n        return formatter.stringFromNumber(number)\
  \ ?? \"\";\n    }\n}\n```\n\n`CustomerAccount` 类维护一个 `Purchase` 对象的集合，用于表示顾客的购买记录。新的购买记录通过\
  \ `addPurchase` 方法添加到账户中，`printAccount` 方法会将账户摘要输出到 Xcode 调试控制台。代码清单 14-3 展示了我在\
  \ `main.swift` 文件中添加的语句，用于使用 `Purchase` 和 `CustomerAccount` 类。\n\n代码清单 14-3. `main.swift`\
  \ 文件的内容\n\n```\nlet account = CustomerAccount(name:\"Joe\");\naccount.addPurchase(Purchase(product:\
  \ \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product: \"Scarf\", price:\
  \ 20));\naccount.printAccount();\n```\n\n`Purchase` 类遵循 `Printable` 协议，这意味着当对象被传递给\
  \ `println` 方法时，会使用 `description` 属性的值。运行示例应用程序将产生以下输出：\n\n```\nPurchase Red Hat,\
  \ Price $10.00\nPurchase Scarf, Price $20.00\nTotal due: $30.00\n```\n\n\n\n## 理解该模式所解决的问题\n\
  \n假设我想为客户添加一些礼品选项，但又不能修改上一节中定义的 `Purchase` 或 `CustomerAccount` 类。导致类无法被修改的原因有很多，但最常见的情况是，这些类是第三方提供的框架的一部分。在我这个示例应用中，`Purchase`\
  \ 和 `CustomerAccount` 类可能属于一个现成的销售管理系统。\n\n客户可以自由组合搭配这些礼品选项，每个选项价格不同，且可独立应用。表 14-2\
  \ 列出了这些选项及其成本。\n\n表 14-2. 购买时的礼品选项\n\n| 礼品选项 | 成本 |\n| --- | --- |\n| 礼品包装 | $2\
  \ |\n| 丝带 | $1 |\n| 礼品配送 | $5 |\n\n为礼品选项添加支持最直接的方式是创建 `Purchase` 类的子类，这样我就可以在不修改\
  \ `Purchase` 类或原本期望操作 `Purchase` 对象的 `CustomerAccount` 类的情况下，定义新的行为。\n\n代码清单 14-4\
  \ 展示了我添加到示例项目中、用于为礼品选项定义子类的 `Options.swift` 文件的内容。\n\n代码清单 14-4. `Options.swift`\
  \ 文件的内容\n\n```swift\nclass PurchaseWithGiftWrap : Purchase {\n    override var description:String\
  \ { return \"\\(super.description) + giftwrap\"; }\n    override var totalPrice:Float\
  \ { return super.totalPrice + 2;}\n}\n\nclass PurchaseWithRibbon : Purchase {\n\
  \    override var description:String { return \"\\(super.description) + ribbon\"\
  ; }\n    override var totalPrice:Float { return super.totalPrice + 1; }\n}\n\nclass\
  \ PurchaseWithDelivery : Purchase {\n    override var description:String { return\
  \ \"\\(super.description) + delivery\"; }\n    override var totalPrice:Float { return\
  \ super.totalPrice + 5; }\n}\n```\n\n我定义的这三个类分别代表表 14-2 中的一个选项，并重写了 `description`\
  \ 和 `totalPrice` 属性。代码清单 14-5 展示了如何通过使用这些子类而非 `Purchase` 基类来指定一个选项。\n\n代码清单 14-5.\
  \ 在 `main.swift` 文件中使用 `Purchase` 子类\n\n```swift\nlet account = CustomerAccount(name:\"\
  Joe\");\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
  \ \"Scarf\", price: 20));\naccount.addPurchase(PurchaseWithGiftWrap(product: \"\
  Sunglasses\", price: 25));\naccount.printAccount();\n```\n\n运行该应用会在调试控制台产生以下输出：\n\
  \n```\nPurchase Red Hat, Price $10.00\nPurchase Scarf, Price $20.00\nPurchase Sunglasses\
  \ + giftwrap, Price $27.00\nTotal due: $57.00\n```\n\n这些子类虽然能用，但无法满足我的业务需求：客户不能自由组合搭配选项。每个子类仅代表单个选项，我无法表示客户既要礼品包装又要配送的购买情况。显然，我需要为这种组合创建另一个子类，如代码清单\
  \ 14-6 所示。\n\n代码清单 14-6. 在 `Options.swift` 文件中为礼品选项组合添加子类\n\n```swift\nclass PurchaseWithGiftWrap\
  \ : Purchase {\n    override var description:String { return \"\\(super.description)\
  \ + giftwrap\"; }\n    override var totalPrice:Float { return super.totalPrice +\
  \ 2;}\n}\n\nclass PurchaseWithRibbon : Purchase {\n    override var description:String\
  \ { return \"\\(super.description) + ribbon\"; }\n    override var totalPrice:Float\
  \ { return super.totalPrice + 1; }\n}\n\nclass PurchaseWithDelivery : Purchase {\n\
  \    override var description:String { return \"\\(super.description) + delivery\"\
  ; }\n    override var totalPrice:Float { return super.totalPrice + 5; }\n}\n\nclass\
  \ PurchaseWithGiftWrapAndDelivery : Purchase {\n    override var description:String\
  \ {\n        return \"\\(super.description) + giftwrap + delivery\"; }\n    override\
  \ var totalPrice:Float { return super.totalPrice + 5 + 2; }\n}\n```\n\n这只是其中一种可能的组合。为了让客户有完整的选择范围，我需要为以下所有组合创建子类：\n\
  \n- 礼品包装\n- 丝带\n- 配送\n- 礼品包装 + 丝带\n- 礼品包装 + 配送\n- 丝带 + 配送\n- 礼品包装 + 丝带 + 配送\n\n\
  随着我添加更多选项，类的数量会不断增加，因为我必须处理所有可能的排列组合。大量的类增加了出错风险，也使维护变得困难。例如，更改某个选项的价格可能会导致大规模的修改，并且很容易遗漏一个或多个本应更新的类。\n\
  \n## 理解装饰器模式\n\n装饰器通过创建装饰器类来解决排列组合问题。装饰器是原始类的包装器，可以改变其行为。装饰器提供与被包装类相同的 API，并且装饰器可以包裹其他装饰器，从而创建各种排列组合。图\
  \ 14-1 说明了装饰器模式。\n\n![A978-1-4842-0394-1_14_Fig1_HTML.jpg](img/A978-1-4842-0394-1_14_Fig1_HTML.jpg)\n\
  \n图 14-1. 装饰器模式\n\n装饰器提供与原始类相同的方法和属性，因此它们可以作为替代品使用，无需修改调用组件。如图所示，装饰器通常会调用其包装对象的方法和属性。由于所有涉及的对象都具有相同的方法和属性，装饰器并不知道它包装的对象是原始类的实例，还是另一个装饰器。\n\
  \n\n\n## 实现装饰器模式\n\n装饰器模式通过继承无法修改的类来实现，以创建一个定义相同属性和方法、并可作为透明替代品的类。装饰器类定义一个`private`属性来存储被包装的对象，并利用该对象提供待装饰的基础功能。清单\
  \ 14-7 展示了如何在`Options.swift`文件中用装饰器替代前一节的独立类。\n\n**清单 14-7.** 在 Options.swift 文件中定义装饰器类\n\
  \n```\nclass BasePurchaseDecorator : Purchase {\n    private let wrappedPurchase:Purchase;\n\
  \    init(purchase:Purchase) {\n        wrappedPurchase = purchase;\n        super.init(product:\
  \ purchase.description, price: purchase.totalPrice);\n    }\n}\n\nclass PurchaseWithGiftWrap\
  \ : BasePurchaseDecorator {\n    override var description:String { return \"\\(super.description)\
  \ + giftwrap\"; }\n    override var totalPrice:Float { return super.totalPrice +\
  \ 2;}\n}\n\nclass PurchaseWithRibbon : BasePurchaseDecorator {\n    override var\
  \ description:String { return \"\\(super.description) + ribbon\"; }\n    override\
  \ var totalPrice:Float { return super.totalPrice + 1; }\n}\n\nclass PurchaseWithDelivery\
  \ : BasePurchaseDecorator {\n    override var description:String { return \"\\(super.description)\
  \ + delivery\"; }\n    override var totalPrice:Float { return super.totalPrice +\
  \ 5; }\n}\n```\n\n为减少重复，我定义了一个`BasePurchaseDecorator`类，它继承自`Purchase`，并定义一个接收`Purchase`对象的初始化器，将其赋值给一个私有存储变量。\n\
  \n各个装饰器继承了`Purchase`变量及初始化器，并重写了`description`和`totalPrice`属性。每个装饰器属性都会调用被包装`Purchase`对象的对应属性，对结果进行处理，然后将其返回给调用者。例如，在`totalPrice`属性中，每个装饰器都从被包装对象获取价格，再加上自身所代表选项的成本。\n\
  \n> **提示：** 某些需要装饰的对象可能由协议定义，且实现类不会暴露给开发者。但这并不改变装饰器的实现方式。装饰器应遵循该协议，并包装一个同样遵循该协议的对象。\n\
  \n这些装饰器继承自`Purchase`类，并定义了接收`Purchase`对象的初始化器，这意味着它们可以组合起来创建多种对象排列组合，如清单 14-8 所示。\n\
  \n**清单 14-8.** 在 main.swift 文件中使用装饰器类\n\n```\nlet account = CustomerAccount(name:\"\
  Joe\");\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
  \ \"Scarf\", price: 20));\naccount.addPurchase(PurchaseWithDelivery(purchase:\n\
  \    PurchaseWithGiftWrap(purchase:\n        Purchase(product: \"Sunglasses\", price:25))));\n\
  account.printAccount();\n```\n\n我创建了一个`Purchase`对象代表太阳镜的购买，并将其传递给`PurchaseWithGiftWrap`装饰器的初始化器。接着将这个装饰器对象传递给`PurchaseWithDelivery`的初始化器以添加第二个装饰器，并将经过两次装饰的购买项添加到客户账户中。我没有对`Purchase`或`CustomerAccount`类做任何修改，但运行应用产生的输出表明，装饰器类已成功实现礼品选项的定义：\n\
  \n```\nPurchase Red Hat, Price $10.00\nPurchase Scarf, Price $20.00\nPurchase Sunglasses\
  \ + giftwrap + delivery, Price $32.00\nTotal due: $62.00\n```\n\n购买项的描述中包含了已选选项，且这些选项的成本已反映在价格中。\n\
  \n## 装饰器模式的变体\n\n装饰器模式有两种变体，我将在后续章节中介绍。\n\n### 创建具有新功能的装饰器\n\n我在前面章节中定义的装饰器，其 API\
  \ 与被装饰对象相同。这意味着装饰器对使用装饰后对象的类而言基本透明，让应用程序无需修改即可获得额外功能（本例中为礼品选项）。\n\n第一种模式变体是创建在原始对象定义之外，增加额外方法或属性的装饰器。这为装饰器可实现的功能增强类型提供了更大灵活性，但代价是降低了这些增强功能应用的灵活性。为演示这一点，我在示例项目中添加了一个名为`Discounts.swift`的新文件，并用其定义了清单\
  \ 14-9 所示的装饰器。\n\n**清单 14-9.** Discounts.swift 文件的内容\n\n```\nclass DiscountDecorator:\
  \ Purchase {\n    private let wrappedPurchase:Purchase;\n    init(purchase:Purchase)\
  \ {\n        self.wrappedPurchase = purchase;\n        super.init(product: purchase.description,\
  \ price: purchase.totalPrice);\n    }\n    override var description:String {\n \
  \       return super.description;\n    }\n    var discountAmount:Float {\n     \
  \   return 0;\n    }\n    func countDiscounts() -> Int {\n        var total = 1;\n\
  \        if let discounter = wrappedPurchase as? DiscountDecorator {\n         \
  \   total += discounter.countDiscounts();\n        }\n        return total;\n  \
  \  }\n}\n\nclass BlackFridayDecorator : DiscountDecorator {\n    override var totalPrice:Float\
  \ {\n        return super.totalPrice - discountAmount;\n    }\n    override var\
  \ discountAmount:Float {\n        return super.totalPrice * 0.20;\n    }\n}\n\n\
  class EndOfLineDecorator : DiscountDecorator {\n    override var totalPrice:Float\
  \ {\n        return super.totalPrice - discountAmount;\n    }\n    override var\
  \ discountAmount:Float {\n        return super.totalPrice * 0.70;\n    }\n}\n```\n\
  \n我定义了`DiscountDecorator`，它包装一个`Purchase`对象，并暴露其`description`和`totalPrice`属性。该装饰器还定义了`discountAmount`属性，用于返回商品在促销时的折扣金额。`totalPrice`属性的实现利用`discountAmount`值来降低购买价格。`countDiscounts`方法通过检查包装对象是否为打折装饰器，并沿着包装链追溯，从而计算出该购买项已应用了多少个折扣。\n\
  \n我从`DiscountDecorator`派生出了两个装饰器类，分别代表不同的促销条件。清单 14-10 展示了如何将这些装饰器应用于购买项。\n\n**清单\
  \ 14-10.** 在 swift.main 文件中应用折扣装饰器\n\n```\nlet account = CustomerAccount(name:\"\
  Joe\");\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
  \ \"Scarf\", price: 20));\naccount.addPurchase(EndOfLineDecorator(purchase:\n  \
  \  BlackFridayDecorator(purchase: PurchaseWithDelivery(purchase:\n        PurchaseWithGiftWrap(purchase:Purchase(product:\
  \ \"Sunglasses\", price:25))))));\naccount.printAccount();\n```\n\n我同时使用了`EndOfLineDecorator`和`BlackFridayDecorator`来对太阳镜购买项组合应用折扣。运行应用程序会产生以下结果：\n\
  \n```\nPurchase Red Hat, Price $10.00\nPurchase Scarf, Price $20.00\nPurchase Sunglasses\
  \ + giftwrap + delivery, Price $7.68\nTotal due: $37.68\n```\n\n新的装饰器并未修改产品的描述，但将价格从\
  \ 32 美元降低到了 25.60 美元。\n\n\n\n#### 使用新功能\n\n新的装饰器所提供的 `countDiscounts` 方法让我能够获取已应用于购买商品上的折扣数量信息，如代码清单\
  \ 14-11 所示。\n\n**代码清单 14-11.** 在 `main.swift` 文件中显示折扣数量\n\n```\nlet account = CustomerAccount(name:\"\
  Joe\");\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
  \ \"Scarf\", price: 20));\naccount.addPurchase(EndOfLineDecorator(purchase:\n  \
  \  BlackFridayDecorator(purchase: PurchaseWithDelivery(purchase:\n        PurchaseWithGiftWrap(purchase:Purchase(product:\
  \ \"Sunglasses\", price:25))))));\naccount.printAccount();\nfor p in account.purchases\
  \ {\n    if let d = p as? DiscountDecorator {\n        println(\"\\(p) has \\(d.countDiscounts())\
  \ discounts\");\n    } else {\n        println(\"\\(p) has no discounts\");\n  \
  \  }\n}\n```\n\n我检查了 `CustomerAccount` 对象存储的每个 `Purchase` 对象是否为 `DiscountDecorator`\
  \ 类的实例，如果是，则调用 `countDiscounts` 方法。运行该应用程序会产生以下输出：\n\n```\nPurchase Red Hat, Price\
  \ $10.00\nPurchase Scarf, Price $20.00\nPurchase Sunglasses + giftwrap + delivery,\
  \ Price $7.68\nTotal due: $37.68\nRed Hat has no discounts\nScarf has no discounts\n\
  Sunglasses + giftwrap + delivery has 2 discounts\n```\n\n#### 理解具有新功能的装饰器的局限性\n\n\
  实现新功能的装饰器对装饰的应用方式施加了限制。为了暴露新功能，装饰器类的每个实例都需要至少另一个组件能够找到它——要么是调用组件，要么是在嵌套装饰器情况下作为包装器的装饰器。\n\
  \n我定义的折扣装饰器对它们的应用顺序很敏感。在代码清单 14-11 中，两个折扣都应用于购买的总成本，包括已选择的礼品选项，如下所示：\n\n```\naccount.addPurchase(EndOfLineDecorator(purchase:\n\
  \    BlackFridayDecorator(purchase: PurchaseWithDelivery(purchase:\n        PurchaseWithGiftWrap(purchase:Purchase(product:\
  \ \"Sunglasses\", price:25))))));\n```\n\n代码清单 14-12 展示了如果我想要其中一个折扣仅适用于商品价格而不包括选项，该语句将如何变化。\n\
  \n**代码清单 14-12.** 在 `main.swift` 文件中更改折扣的应用\n\n```\nlet account = CustomerAccount(name:\"\
  Joe\");\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
  \ \"Scarf\", price: 20));\naccount.addPurchase(EndOfLineDecorator(purchase:\n  \
  \  PurchaseWithDelivery(purchase:PurchaseWithGiftWrap(purchase:\n        BlackFridayDecorator(purchase:\n\
  \            Purchase(product: \"Sunglasses\", price:25))))));\naccount.printAccount();\n\
  for p in account.purchases {\n    if let d = p as? DiscountDecorator {\n       \
  \ println(\"\\(p) has \\(d.countDiscounts()) discounts\");\n    } else {\n     \
  \   println(\"\\(p) has no discounts\");\n    }\n}\n```\n\n`BlackFridayDecorator`\
  \ 仅降低了太阳镜的价格，并不影响礼品选项的价格。以下是运行该应用程序的输出：\n\n```\nPurchase Scarf, Price $20.00\nPurchase\
  \ Sunglasses + giftwrap + delivery, Price $8.10\nTotal due: $38.10\nRed Hat has\
  \ no discounts\nScarf has no discounts\nSunglasses + giftwrap + delivery has 1 discounts\n\
  ```\n\n价格计算正确，但请注意，摘要中仅显示了一个折扣。发生这种情况是因为礼品选项装饰器不了解折扣装饰器及其提供的附加功能。\n\n这种不灵活性并不意味着你应该避免使用装饰器定义新功能，但你应该谨慎行事，并考虑它对应用程序其余部分的影响，尤其是在已经使用了其他装饰器的情况下。\n\
  \n### 创建合并型装饰器\n\n到目前为止，我定义了简单的装饰器类，因为我希望强调该模式的工作原理，并展示如何选择和应用装饰器，而无需修改它们所装饰的类或依赖这些类的类。\n\
  \n装饰器不必如此简单，该模式允许对原始类定义的方法和属性进行任何实现。一种常见的变体是创建合并型装饰器，它将多个更改应用于一个对象。代码清单 14-13 展示了我是如何将礼品选项装饰器合并到一个类中的。\n\
  \n**警告**\n\n装饰器可以自由创建自己的方法和属性实现，但你应该只使用它们来执行与原始类实现相同的任务。一个好的装饰器实现可能会在示例应用程序中对 `totalPrice`\
  \ 属性应用销售税，但一个糟糕的实现会返回库存中的商品数量。装饰器应增强或扩展原始类的功能，而不是将新功能偷偷塞入现有 API。\n\n**代码清单 14-13.** 在\
  \ `Options.swift` 文件中为多个购买选项创建单个装饰器\n\n```\nclass GiftOptionDecorator : Purchase\
  \ {\n    private let wrappedPurchase:Purchase;\n    private let options:[OPTION];\n\
  \    enum OPTION {\n        case GIFTWRAP;\n        case RIBBON;\n        case DELIVERY;\n\
  \    }\n    init(purchase:Purchase, options:OPTION...) {\n        self.wrappedPurchase\
  \ = purchase;\n        self.options = options;\n        super.init(product: purchase.description,\
  \ price: purchase.totalPrice);\n    }\n    override var description:String {\n \
  \       var result = wrappedPurchase.description;\n        for option in options\
  \ {\n            switch (option) {\n            case .GIFTWRAP:\n              \
  \  result = \"\\(result) + giftwrap\";\n            case .RIBBON:\n            \
  \    result = \"\\(result) + ribbon\";\n            case .DELIVERY:\n          \
  \      result = \"\\(result) + delivery\";\n            }\n        }\n        return\
  \ result;\n    }\n    override var totalPrice:Float {\n        var result = wrappedPurchase.totalPrice;\n\
  \        for option in options {\n            switch (option) {\n            case\
  \ .GIFTWRAP:\n                result += 2;\n            case .RIBBON:\n        \
  \        result += 1;\n            case .DELIVERY:\n                result += 5;\n\
  \            }\n        }\n        return result;\n    }\n}\n```\n\n这仍然是一个装饰器；它允许我选择性地修改\
  \ `Purchase` 对象的行为，并允许我创建礼品选项的组合。不同之处在于，它合并了这些选项，因此它们可以应用于单个对象。代码清单 14-14 展示了我如何更新创建购买的代码以使用这个新的装饰器。\n\
  \n**提示**\n\n对于小型项目，我更倾向于使用单独的装饰器类。我发现它们更优雅，使用起来也更愉快。然而，它们更难维护，对于更复杂的项目，我会切换到将相关增强功能组合在一起的合并型装饰器。我发现合并型装饰器不那么优雅，但更易于管理。\n\
  \n**代码清单 14-14.** 在 `main.swift` 文件中使用合并型装饰器\n\n```\nlet account = CustomerAccount(name:\"\
  Joe\");\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
  \ \"Scarf\", price: 20));\naccount.addPurchase(EndOfLineDecorator(purchase: BlackFridayDecorator(purchase:\n\
  \    GiftOptionDecorator(purchase: Purchase(product: \"Sunglasses\", price:25),\n\
  \        options: GiftOptionDecorator.OPTION.GIFTWRAP,\n        GiftOptionDecorator.OPTION.DELIVERY))));\n\
  account.printAccount();\nfor p in account.purchases {\n    if let d = p as? DiscountDecorator\
  \ {\n        println(\"\\(p) has \\(d.countDiscounts()) discounts\");\n    } else\
  \ {\n        println(\"\\(p) has no discounts\");\n    }\n}\n```\n\n由于需要调整格式以适合页面，这段代码看起来有点丑陋，但结果与我之前在上一节中应用两个单独装饰器类时完全相同。\n\
  \n\n\n## 理解装饰器模式的陷阱\n\n实现装饰器模式时需避免两个陷阱。第一个陷阱是尝试使用 Swift 扩展来装饰对象。装饰器模式的主要特性之一是装饰可以被有选择性地应用于单个对象，而扩展则会更改指定类型的所有对象。\n\
  \n### 副作用陷阱\n\n第二个陷阱出现在编写装饰器时——你可能会发现可以用它来执行超出装饰对象方法和属性范围的操作。这种想法颇具吸引力。例如，我可以修改用于指示配送选项的装饰器，使其自动安排配送时间。\n\
  \n这会产生副作用，因为它并非被装饰对象原本用途的一部分。副作用通常带来的问题比解决的问题更多，这也正是与装饰器模式相关的第二个陷阱。\n\n副作用装饰器难以维护，尤其是在团队开发环境中。另一位看到你的\
  \ `DeliveryDecorator` 类名的程序员，不太可能意识到它除了装饰对象之外还做了其他事情。当这个类被随意修改或在应用的其他地方重用时，配送问题就会开始出现。\n\
  \n请为你的装饰器类保持专注的职责范围，并使用独立的类处理诸如配送之类的相关活动。\n\n## Cocoa 中装饰器模式的示例\n\nCocoa 中最著名的装饰器模式应用是处理滚动窗口。Cocoa\
  \ 并没有为每个可展示给用户的 UI 组件定义滚动条和滚动机制，而是使用 `NSClipView` 装饰对象，再通过 `NSScrollView` 对 `NSClipView`\
  \ 进行装饰。`NSScrollView` 显示滚动条、处理用户交互，并管理 `NSClipView` 以确定 UI 组件的哪一部分对用户可见。\n\n## 将模式应用于\
  \ SportsStore 应用\n\n为了将装饰器模式放在更广泛的背景下，我将把它应用于 SportsStore 应用中的 `Product` 类，以降低所有\
  \ `Soccer` 类别产品的价格，并提高库存量不超过四件的任何商品的价格。\n\n### 准备示例应用\n\n本章无需任何准备工作，我将直接沿用第 13 章结束时的\
  \ SportsStore 项目。\n\n提示\n\n请记住，本书中的所有示例均可从 [`Apress.com`](https://Apress.com) 免费下载。\n\
  \n### 创建装饰器\n\n一旦理解了装饰器模式的工作原理，创建装饰器类就是一个简单的过程。清单 14-15 展示了 `ProductDecorators.swift`\
  \ 文件的内容，我已将其添加到 SportsStore 项目中。\n\n清单 14-15. `ProductDecorators.swift` 文件的内容\n\n\
  ```\nclass PriceDecorator : Product {\n    private let wrappedProduct:Product;\n\
  \    required init(name:String, description:String, category:String,\n         \
  \         price:Double, stockLevel:Int) {\n        fatalError(\"Not supported\"\
  );\n    }\n    init(product:Product) {\n        self.wrappedProduct = product;\n\
  \        super.init(name: product.name, description: product.productDescription,\n\
  \                   category: product.category, price: product.price,\n        \
  \           stockLevel: product.stockLevel);\n    }\n}\n\nclass LowStockIncreaseDecorator\
  \ : PriceDecorator {\n    override var price:Double {\n        var price = wrappedProduct.price;\n\
  \        if (stockLevel <= 4) {\n            price = price * 1.5;\n        }\n \
  \       return price;\n    }\n}\n\nclass SoccerDecreaseDecorator : PriceDecorator\
  \ {\n    override var price:Double {\n        return super.wrappedProduct.price\
  \ * 0.5;\n    }\n}\n```\n\n`PriceDecorator` 类是我的装饰器基类，它是 `Product` 类的子类。`Product`\
  \ 类定义了一个 `required` 初始化器，我必须将其添加到 `PriceDecorator` 中，但不想使用它。我使用了 `fatalError` 函数，这样就不必实现\
  \ `required` 初始化器，并定义了一个新的初始化器，该初始化器接受一个将被装饰的 `Product` 对象。\n\n`LowStockIncreaseDecorator`\
  \ 和 `SoccerDecreaseDecorator` 类是装饰器类，它们重写了 `price` 属性以更改产品的价格。\n\n### 应用装饰器\n\n\
  我希望在产品创建时就将装饰器应用于 `Product` 对象。清单 14-16 展示了我是如何更改 `ProductDataStore` 类中 `loadData`\
  \ 方法的。\n\n清单 14-16. 在 `ProductDataStore.swift` 文件中应用装饰器\n\n```\n...\nprivate func\
  \ loadData() -> [Product] {\n    var products = [Product]();\n    for product in\
  \ productData {\n        var p:Product = LowStockIncreaseDecorator(product: product);\n\
  \        if (p.category == \"Soccer\") {\n            p = SoccerDecreaseDecorator(product:\
  \ p);\n        }\n        dispatch_async(self.networkQ, {() in\n            let\
  \ stockConn = NetworkPool.getConnection();\n            let level = stockConn.getStockLevel(p.name);\n\
  \            if (level != nil) {\n                p.stockLevel = level!;\n     \
  \           dispatch_async(self.uiQ, {() in\n                    if (self.callback\
  \ != nil) {\n                        self.callback!(p);\n                    }\n\
  \                })\n            }\n            NetworkPool.returnConnecton(stockConn);\n\
  \        });\n        products.append(p);\n    }\n    return products;\n}\n...\n\
  ```\n\n我用 `LowStockIncreaseDecorator` 类装饰所有 `Product` 对象，但仅将 `SoccerDecreaseDecorator`\
  \ 应用于 `Soccer` 类别中的 `Product` 对象。效果是：所有足球产品的价格被永久降低，而库存量降至五件以下的产品价格将上涨。\n\n## 总结\n\
  \n在本章中，我描述了装饰器模式，并解释了如何用它来在运行时改变对象的行为。装饰器模式在处理无法修改的类时尤其有用，即使在处理第三方或遗留框架时，也能轻松增强应用功能。在下一章中，我将介绍组合模式，该模式允许将单个实例和对象集合进行一致处理。\n\
  \n"
- "# 15. 组合模式\n\n组合模式并不像我在本书中描述的其他一些设计模式那样具有广泛的适用性，但由于它为包含不同类型对象的数据结构提供了一致性，因此它仍然是一个重要的模式。表\
  \ 15-1 将组合模式置于具体背景中。\n\n**表 15-1.** 组合模式背景概述\n\n| 问题 | 答案 |\n| --- | --- |\n| 这是什么？\
  \ | 组合模式允许将单个对象和对象集合构成的树结构进行一致处理。 |\n| 有什么好处？ | 组合模式带来的一致性意味着，操作树结构的组件更简单，且无需了解所涉及的不同对象类型。\
  \ |\n| 何时应使用此模式？ | 当树结构包含叶子节点和对象集合时，应使用此模式。 |\n| 何时应避免此模式？ | 此模式仅适用于树形数据结构。 |\n\
  | 如何判断是否正确实现了该模式？ | 当使用树结构的组件能够通过相同类型或协议处理其中包含的所有对象时，该模式即正确实现。 |\n| 有哪些常见陷阱？ | 此模式最适合创建后不再修改的树结构。添加对树结构修改的支持会削弱该模式的优势。\
  \ |\n| 是否有相关模式？ | 许多结构性模式的实现方式相似但意图不同。请确保从我在这部分书中描述的模式中选择正确的模式。 |\n\n\n\n## 准备示例项目\n\
  \n沿用前几章的方法，我创建了一个名为 `Composite` 的全新 OS X 命令行工具项目。我在项目中添加了一个名为 `CarParts.swift` 的文件，其内容如代码清单\
  \ 15-1 所示。\n\n代码清单 15-1. `CarParts.swift` 文件的内容\n\n```\nclass Part {\n    let name:String;\n\
  \    let price:Float;\n    init(name:String, price:Float) {\n        self.name =\
  \ name; self.price = price;\n    }\n}\n\nclass CompositePart {\n    let name:String;\n\
  \    let parts:[Part];\n    init(name:String, parts:Part...) {\n        self.name\
  \ = name; self.parts = parts;\n    }\n}\n```\n\n我定义了两个类来表示用于维修汽车的零部件。`Part` 类代表单个独立的零件，例如火花塞或轮胎。`CompositePart`\
  \ 类代表由其他零件组成且通常整体采购的部件，比如一个车轮，它通常包括轮胎、轮毂和一些固定螺母。`CompositePart` 类使用 `Part` 数组来表示其组成元素。我还添加了一个名为\
  \ `Orders.swift` 的文件，其内容如代码清单 15-2 所示。\n\n代码清单 15-2. `Orders.swift` 文件的内容\n\n```\n\
  import Foundation\n\nclass CustomerOrder {\n    let customer:String;\n    let parts:[Part];\n\
  \    let compositeParts:[CompositePart];\n    init(customer:String, parts:[Part],\
  \ composites:[CompositePart]) {\n        self.customer = customer;\n        self.parts\
  \ = parts;\n        self.compositeParts = composites;\n    }\n    var totalPrice:Float\
  \ {\n        let partReducer = {(subtotal:Float, part:Part) -> Float in\n      \
  \      return subtotal + part.price};\n        var total = reduce(parts, 0, partReducer);\n\
  \        return reduce(compositeParts, total, {(subtotal, cpart) -> Float in\n \
  \           return reduce(cpart.parts, subtotal, partReducer);\n        });\n  \
  \  }\n    func printDetails() {\n        println(\"Order for \\(customer): Cost:\
  \ \\(formatCurrencyString(totalPrice))\");\n    }\n    func formatCurrencyString(number:Float)\
  \ -> String {\n        let formatter = NSNumberFormatter();\n        formatter.numberStyle\
  \ = NSNumberFormatterStyle.CurrencyStyle;\n        return formatter.stringFromNumber(number)\
  \ ?? \"\";\n    }\n}\n```\n\n`CustomerOrder` 类代表一个由 `Part` 和 `CompositePart` 对象组成的订单。`printDetails`\
  \ 方法输出客户名称和订单总价，总价从 `totalPrice` 属性获取。代码清单 15-3 展示了我添加到 `main.swift` 文件中的代码，用于创建和填充包含\
  \ `Part` 和 `CompositePart` 对象的 `CustomerOrder` 对象。\n\n代码清单 15-3. `main.swift` 文件的内容\n\
  \n```\nlet doorWindow = CompositePart(name: \"DoorWindow\", parts:\n    Part(name:\
  \ \"Window\", price: 100.50),\n    Part(name: \"Window Switch\", price: 12));\n\
  let door = CompositePart(name: \"Door\", parts:\n    Part(name: \"Window\", price:\
  \ 100.50),\n    Part(name: \"Door Loom\", price: 80),\n    Part(name: \"Window Switch\"\
  , price: 12),\n    Part(name: \"Door Handles\", price: 43.40));\nlet hood = Part(name:\
  \ \"Hood\", price: 320);\nlet order = CustomerOrder(customer: \"Bob\", parts: [hood],\n\
  \    composites: [door, doorWindow]);\norder.printDetails();\n```\n\n客户是 `Bob`，他的订单包含一扇完整的车门、一个车门车窗和一个引擎盖。运行该应用程序将输出以下内容：\n\
  \n```\nOrder for Bob: Cost: $668.40\n```\n\n## 理解该模式要解决的问题\n\n示例应用程序中的类存在两个不同的问题，这两个问题都源于在订单中使用了不同类型的对象来表示汽车零部件。\n\
  \n第一个问题是，我只能使用简单的层次结构来表示零部件。当我在代码清单 15-3 中创建 `CompositePart` 对象来表示一个车门时，我必须为 `Window`（车窗）创建一个\
  \ `Part` 对象，再为 `Window Switch`（车窗开关）创建另一个 `Part` 对象。尽管车门已经包含了一个车窗，但我还是得为车门车窗创建相同的\
  \ `Part` 对象。这种限制意味着我需要维护两个零件列表并保持它们同步，即使其中一个列表是另一个列表的超集。\n\n第二个问题是，操作零部件对象的类需要了解\
  \ `CompositePart` 和 `Part` 对象的细节以及它们之间的关联方式。你可以在 `CustomerAccount` 类中看到这个问题的一个例子，该类中相当大一部分代码用于计算所有已订购\
  \ `Part` 对象的总成本。\n\n```\n...\nvar totalPrice:Float {\n    let partReducer = {(subtotal:Float,\
  \ part:Part) -> Float in\n        return subtotal + part.price};\n    var total\
  \ = reduce(parts, 0, partReducer);\n    return reduce(compositeParts, total, {(subtotal,\
  \ cpart) -> Float in\n        return reduce(cpart.parts, subtotal, partReducer);\n\
  \    });\n}\n...\n```\n\n由于操作零部件对象的组件需要理解 `Part` 和 `CompositePart` 类之间的关系，这意味着我必须在每个这样的组件中重复编写这类代码。\n\
  \n## 理解组合模式\n\n组合模式解决了上述问题，它通过将对象排列成树形层次结构，并定义一个协议，使得单个对象和组合对象能够被一致地处理。该协议提供给操作对象的组件，这些组件无需知道哪些对象是单个对象，哪些是集合。\n\
  \n该协议也在组合对象内部使用，从而使它们能够无缝地聚合代表单个对象和其他集合的对象。图 15-1 展示了使用组合模式来排列对象的方式，但这是一个通过实际实现最容易理解的模式；详情请参见下一节。\n\
  \n![A978-1-4842-0394-1_15_Fig1_HTML.jpg](img/A978-1-4842-0394-1_15_Fig1_HTML.jpg)\n\
  \n图 15-1.\n\n组合模式\n\n## 实现组合模式\n\n用于表示单个对象的对象在树形数据结构中被称为叶节点。用于表示集合的对象被称为组合节点。叶节点和组合节点都实现相同的协议，该协议隐藏了消费这些集合的组件所需的集合构成细节。\n\
  \n实现的第一步是定义协议，这是该模式的核心。代码清单 15-4 显示了示例应用程序中协议的定义，以及使 `Part` 和 `CompositePart` 类符合该协议所需的更改。\n\
  \n代码清单 15-4. 在 `CarParts.swift` 文件中定义并应用协议\n\n```\nprotocol CarPart {\n    var name:String\
  \ { get };\n    var price:Float { get };\n}\n\nclass Part : CarPart {\n    let name:String;\n\
  \    let price:Float;\n    init(name:String, price:Float) {\n        self.name =\
  \ name; self.price = price;\n    }\n}\n\nclass CompositePart : CarPart {\n    let\
  \ name:String;\n    let parts:[CarPart];\n    init(name:String, parts:CarPart...)\
  \ {\n        self.name = name; self.parts = parts;\n    }\n    var price:Float {\n\
  \        return reduce(parts, 0, {subtotal, part in\n            return subtotal\
  \ + part.price;\n        });\n    }\n}\n```\n\n`CarPart` 协议定义了 `name` 和 `price`\
  \ 属性，这与 `Part` 类已经定义的属性相对应。这意味着对于 `Part` 类，唯一的改动就是声明遵守该协议。\n\n对于 `CompositePart`\
  \ 类的改动更为深远。重要的是，组合节点对象应操作协议本身，而不是操作遵守该协议的具体类，这意味着我移除了对 `Part` 类的引用，并将其替换为对 `CarPart`\
  \ 协议的引用。此外，我还实现了协议要求的 `price` 属性，其实现使用全局 `reduce` 函数来汇总它所聚合的所有 `CarPart` 对象 `price`\
  \ 属性的值。\n\n\n\n### 应用模式\n\n下一步是更新那些操作叶节点和组合对象的类，使其依赖于协议而非其实现类。清单 15-5 展示了我对 `CustomerOrder`\
  \ 类所做的更改。\n\n**清单 15-5.** 在 `Orders.swift` 文件中应用协议\n\n```\nimport Foundation\n\n\
  class CustomerOrder {\n    let customer:String;\n    let parts:[CarPart];\n    init(customer:String,\
  \ parts:[CarPart]) {\n        self.customer = customer;\n        self.parts = parts;\n\
  \    }\n    var totalPrice:Float {\n        return reduce(parts, 0, {subtotal, part\
  \ in\n            return subtotal + part.price});\n    }\n    func printDetails()\
  \ {\n        println(\"Order for \\(customer): Cost: \\(formatCurrencyString(totalPrice))\"\
  );\n    }\n    func formatCurrencyString(number:Float) -> String {\n        let\
  \ formatter = NSNumberFormatter();\n        formatter.numberStyle = NSNumberFormatterStyle.CurrencyStyle;\n\
  \        return formatter.stringFromNumber(number) ?? \"\";\n    }\n}\n```\n\n`CustomerOrder`\
  \ 类不再需要了解叶节点类和组合类，它只与 `CartPart` 协议打交道。主要影响体现在 `totalPrice` 属性上，现在只需汇总 `CarPart`\
  \ 对象的 `price` 属性即可得到订单总价。\n\n最后一步是更改 `main.swift` 文件中的代码，以便能够创建和复用组合对象，如清单 15-6\
  \ 所示。\n\n**清单 15-6.** 在 `main.swift` 文件中复用组合对象\n\n```\nlet doorWindow = CompositePart(name:\
  \ \"DoorWindow\", parts:\n    Part(name: \"Window\", price: 100.50),\n    Part(name:\
  \ \"Window Switch\", price: 12));\nlet door = CompositePart(name: \"Door\", parts:\n\
  \    doorWindow,\n    Part(name: \"Door Loom\", price: 80),\n    Part(name: \"Door\
  \ Handles\", price: 43.40));\nlet hood = Part(name: \"Hood\", price: 320);\nlet\
  \ order = CustomerOrder(customer: \"Bob\", parts: [hood, door, doorWindow]);\norder.printDetails();\n\
  ```\n\n> **注意：** 创建数据结构的代码（在本示例中位于 `main.swift` 文件中）仍然需要理解叶节点和组合对象之间的区别，以便构建树结构。组合模式影响的是使用树结构的组件，这些组件不再依赖于能够区分不同类型的对象。\n\
  \n无需重复定义车门窗所需的部件，我可以直接创建一个组合对象，并将其作为参数传递给另一个对象的初始化器。这意味着我可以在一个地方修改组成车门窗的部件集合。运行应用程序会产生与实现组合模式之前相同的输出。\n\
  \n```\nOrder for Bob: Cost: $668.40\n```\n\n## 理解组合模式的陷阱\n\n当创建的树结构是固定不变时，组合模式的效果最佳。组合模式的主要陷阱在于，当需要在创建后改变结构时就会出现问题。清单\
  \ 15-7 展示了我对 `CompositePart` 类所做的更改，以支持结构变化。\n\n**清单 15-7.** 在 `CarParts.swift`\
  \ 文件中添加对组合集合变化的支持\n\n```\n...\nclass CompositePart : CarPart {\n    let name:String;\n\
  \    private var parts:[CarPart];\n\n    init(name:String, parts:CarPart...) {\n\
  \        self.name = name; self.parts = parts;\n    }\n    var price:Float {\n \
  \       return reduce(parts, 0, {subtotal, part in\n            return subtotal\
  \ + part.price;\n        });\n    }\n    func addPart(part:CarPart) {\n        parts.append(part);\n\
  \    }\n    func removePart(part:CarPart) {\n        for index in 0 ..< parts.count\
  \ {\n            if (parts[index].name == part.name) {\n                parts.removeAtIndex(index);\n\
  \                break;\n            }\n        }\n    }\n}\n...\n```\n\n这些更改非常简单。我将常量\
  \ `CarPart` 数组重新定义为变量，并添加了 `addPart` 和 `removePart` 方法。然而，这些更改意味着，修改数据结构的组件需要知道\
  \ `CompositePart` 类定义了 `addPart` 和 `removePart` 方法，并且需要理解 `CompositePart` 和 `Part`\
  \ 类之间的区别，才能添加和删除部件。\n\n清单 15-7 中的更改削弱了组合模式的优势。解决此问题的一个常见尝试是将这些方法包含在协议中，以统一叶节点和组合对象实现的\
  \ API，如清单 15-8 所示。\n\n**清单 15-8.** 尝试在 `CarParts.swift` 文件中统一 API\n\n```\nprotocol\
  \ CarPart {\n    var name:String { get };\n    var price:Float { get };\n    func\
  \ addPart(part:CarPart) -> Void;\n    func removePart(part:CarPart) -> Void;\n}\n\
  \nclass Part : CarPart {\n    let name:String;\n    let price:Float;\n    init(name:String,\
  \ price:Float) {\n        self.name = name; self.price = price;\n    }\n    func\
  \ addPart(part: CarPart) {\n        // 不执行任何操作\n    }\n    func removePart(part:\
  \ CarPart) {\n        // 不执行任何操作\n    }\n}\n\nclass CompositePart : CarPart {\n\
  \    // ...为了简洁起见，省略了语句...\n}\n```\n\n这并不是解决问题的办法，因为 `Part` 类无法实现 `addPart` 和 `removePart`\
  \ 方法。调用这些方法的组件会期望数据结构被修改，但事实上什么也不会发生，其结果要么是数据丢失，要么是出现错误。\n\n## Cocoa 中组合模式的示例\n\n\
  在 Cocoa 框架中，组合模式最重要的应用是 `UIView` 类，它定义了应用布局中所有元素的通用行为。视图层次结构中的各个视图对象可以是叶节点（如标签），也可以是包含其他视图集合的组合对象（如表视图控制器）。\n\
  \n## 将模式应用于 SportsStore 应用\n\n为了将组合模式应用于 SportsStore 应用，我将创建由单个产品组成、并以单一单位销售的产品套装。\n\
  \n### 准备示例应用\n\n为了准备组合模式，我将简化 `Product` 类，并移除前面章节中添加的一些特性。清单 15-9 展示了我所做的更改。\n\n\
  **清单 15-9.** 在 `Product.swift` 文件中简化 `Product` 类\n\n```\nimport Foundation\n\nclass\
  \ Product : NSObject, NSCopying {\n    private(set) var name:String;\n    private(set)\
  \ var productDescription:String;\n    private(set) var category:String;\n    private\
  \ var stockLevelBackingValue:Int = 0;\n    private var priceBackingValue:Double\
  \ = 0;\n\n    required init(name:String, description:String, category:String, price:Double,\n\
  \        stockLevel:Int) {\n        self.name = name;\n        self.productDescription\
  \ = description;\n        self.category = category;\n        super.init();\n   \
  \     self.price = price;\n        self.stockLevel = stockLevel;\n    }\n    var\
  \ stockLevel:Int {\n        get { return stockLevelBackingValue;}\n        set {\
  \ stockLevelBackingValue = max(0, newValue);}\n    }\n    private(set) var price:Double\
  \ {\n        get { return priceBackingValue;}\n        set { priceBackingValue =\
  \ max(1, newValue);}\n    }\n    var stockValue:Double {\n        get {\n      \
  \      return price * Double(stockLevel);\n        }\n    }\n    func copyWithZone(zone:\
  \ NSZone) -> AnyObject {\n        return Product(name: self.name, description: self.description,\n\
  \            category: self.category, price: self.price,\n            stockLevel:\
  \ self.stockLevel);\n    }\n    class func createProduct(name:String, description:String,\
  \ category:String,\n        price:Double, stockLevel:Int) -> Product {\n       \
  \ return Product(name:name, description: description, category: category,\n    \
  \        price: price, stockLevel: stockLevel);\n    }\n}\n```\n\n我已从 `Product.swift`\
  \ 文件中移除了特定于类别的子类，并简化了 `Product` 类本身，使其不再处理销售税或追加销售机会（这些是由子类提供的特殊功能）。\n\n\n\n###\
  \ 定义组合类\n\n当将组合模式应用于现有应用程序时，通常无法创建一个让叶节点和组合对象都遵循的协议。在这种情况下，我将现有类既视为通用功能定义，又视为叶节点的模板。这使我能够将组合类定义为一个子类，如代码清单\
  \ 15-10 所示。\n\n**代码清单 15-10.** 在`Product.swift`文件中定义组合类\n\n```\nimport Foundation\n\
  \nclass Product : NSObject, NSCopying {\n    // ...为简洁起见，省略了语句...\n}\n\nclass ProductComposite\
  \ : Product {\n    private let products:[Product];\n\n    required init(name:String,\
  \ description:String, category:String,\n                  price:Double, stockLevel:Int)\
  \ {\n        fatalError(\"Not implemented\");\n    }\n\n    init(name:String, description:String,\
  \ category:String, stockLevel:Int,\n         products:Product...) {\n        self.products\
  \ = products;\n        super.init(name: name, description: description, category:\
  \ category,\n                   price: 0, stockLevel: stockLevel);\n    }\n\n  \
  \  override var price:Double {\n        get { return reduce(products, 0, {total,\
  \ p in return total + p.price}); }\n        set { /* do nothing */ }\n    }\n}\n\
  ```\n\n这种方法不如使用单独的协议那样优雅，但它最大程度地减少了实现该模式所需的更改次数。`ProductComposite` 类继承自 `Product`，并维护了一个不可变的\
  \ `Product` 对象数组。`price` 属性被重写，以便从收集到的 `Product` 对象计算返回值。\n\n### 应用模式\n\n最后一步是向\
