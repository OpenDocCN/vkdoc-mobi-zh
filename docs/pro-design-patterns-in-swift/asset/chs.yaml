  \ 类\n\n迁移至使用 `Product` 类非常简单。在准备代码清单 4-14 时，我首先在 `products` 数据数组中使用该类，然后修复所有编译器错误，直到所有对元组的引用都被替换。这是一个枯燥且容易出错的过程，因此，如果可能的话，最好从一开始就使用类和结构体来启动项目（遗憾的是，在接手现有代码时这并不总是可行）。\n\
  \n## 确保视图与模型分离\n\n关于代码清单 4-14 中的代码，有几点需要注意。首先，`ViewController.swift` 文件定义了一个名为 `ProductTableCell`\
  \ 的类，我用它来包含对应用布局中代表产品的 UI 组件的引用，并在用户更改库存水平时定位产品。在代码清单 4-14 中，我将一个引用 `products` 数组中元组索引位置的变量替换为了对\
  \ `Product` 对象的引用，如下所示：\n\n```\nclass ProductTableCell : UITableViewCell {\n   \
  \ @IBOutlet weak var nameLabel: UILabel!\n    @IBOutlet weak var descriptionLabel:\
  \ UILabel!\n    @IBOutlet weak var stockStepper: UIStepper!\n    @IBOutlet weak\
  \ var stockField: UITextField!\n    var product:Product?;\n}\n```\n\n你可能想知道为什么我没有将\
  \ `ProductTableCell` 与 `Product` 类合并，形成一个代表产品及其显示 UI 组件的单一实体。我将在第 5 部分描述模型/视图/控制器（MVC）模式时详细解释原因，但简而言之，将应用中的数据与其呈现给用户的方式分开是一种好的实践（用\
  \ MVC 的说法，就是将模型与视图分离）。强制执行这种分离使得相同的数据可以更容易地以不同方式显示。我可能需要为应用添加第二个视图，以网格形式展示产品，如果没有模型和视图之间的分离，合并后的类将需要包含两个视图中所有\
  \ UI 组件的引用，这会很快变得笨拙，并使应用修改变得棘手且容易出错。\n\n## 扩展摘要显示\n\n在本章中，我一直对元组持批评态度，但当它们以自包含的方式使用时，而不是用来表示应用全局数据时，它们可以是一种有用的语言特性。\n\
  \n在代码清单 4-15 中，你可以看到一个我喜欢使用元组的例子。我更改了 `ViewController` 类的 `displayStockTotal` 方法的实现，以便通过一次对全局\
  \ `reduce` 函数的调用来计算库存中的商品数量和库存总价值（我使用在代码清单 4-12 中定义的 `currencyStringFromNumber`\
  \ 方法对其进行了格式化）。\n\n**代码清单 4-15.** 在 ViewController.swift 文件中使用元组\n\n```\nfunc displayStockTotal()\
  \ {\n    let finalTotals:(Int, Double) = products.reduce((0, 0.0),\n        {(totals,\
  \ product) -> (Int, Double) in\n            return (\n                totals.0 +\
  \ product.stockLevel,\n                totals.1 + product.stockValue\n         \
  \   );\n        });\n    totalStockLabel.text = \"\\(finalTotals.0) Products in\
  \ Stock. \"\n        + \"Total Value: \\(Utils.currencyStringFromNumber(finalTotals.1))\"\
  ;\n}\n```\n\n元组允许我为每次 `reduce` 函数迭代生成两个总值（一个用于库存中的商品数量，一个用于库存价值）。我本可以通过其他方式实现这一点——例如定义一个具有两个属性的结构体，或者使用\
  \ `for` 循环枚举数组并更新两个局部变量——但使用元组能很好地配合 Swift 闭包，并生成简单易读的代码。这种用法（即创建一个类或结构体显得大材小用，因为数据不会在方法外部导出）发挥了元组的优势，并且不会导致在应用内部更广泛地传递元组时出现的紧耦合和维护问题。\n\
  \n你可以通过启动应用来查看我计算的额外总值的效果。布局底部的标签将显示库存中的商品数量和总值，如图 4-7 所示。\n\n![A978-1-4842-0394-1_4_Fig7_HTML.jpg](img/A978-1-4842-0394-1_4_Fig7_HTML.jpg)\n\
  \n**图 4-7.** 向 SportsStore 应用的信息摘要添加内容\n\n## 本章小结\n\n在本章中，我描述了一个位于 Swift 开发核心的模式：定义一个用于创建对象的模板。这种模式的好处是它提供了基本工具，可用于拆分紧密耦合的组件，允许向对象的消费者呈现公共\
  \ API，并隐藏私有实现。在下一章中，我将介绍一种不同的对象创建方式：使用原型。\n\n"
- "# 5. 原型模式\n\n在本章中，我将介绍原型模式，该模式通过复制一个现有对象（称为原型）来创建新对象。原型本身是使用模板创建的（如第 4 章所述），但后续实例都是克隆体。表\
  \ 5-1 将原型模式置于上下文中。\n\n**表 5-1.** 将原型模式置于上下文中\n\n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？\
  \ | 原型模式通过复制一个现有对象（称为原型）来创建新对象。 |\n| 有什么好处？ | 主要好处是向使用对象的组件隐藏创建对象的代码；这意味着组件不需要知道创建新对象需要哪个类或结构体，不需要知道初始化器的细节，并且在创建和实例化子类时也不需要更改。此模式还可用于避免每次创建特定类型的新对象时重复昂贵的初始化。\
  \ |\n| 何时应该使用此模式？ | 当你编写一个需要创建对象新实例，但又不想依赖类初始化器的组件时，此模式非常有用。 |\n| 何时应该避免此模式？ | 使用此模式没有缺点，但你应该了解本书本部分中的其他模式，以确保为你的应用选择最合适的模式。\
  \ |\n| 如何知道你是否正确实现了该模式？ | 要测试此模式的有效实现，请更改用于原型对象的类或结构体的初始化器，并检查在创建克隆的组件中是否需要相应的更改。作为第二个测试，为原型类创建一个子类，并确保组件可以克隆它而无需任何更改。请参阅“实现原型模式”一节。\
  \ |\n| 有哪些常见陷阱？ | 主要陷阱是在克隆原型对象时选择了错误的复制方式。有两种可用的复制方式——浅复制和深复制——为你的应用选择正确的类型非常重要。有关详细信息，请参阅“理解浅复制和深复制”一节。\
  \ |\n| 是否有任何相关模式？ | 最相关的模式是我在第 4 章中描述的对象模板模式。另请参阅单例模式，它提供了一种共享单个对象的方法，以避免需要创建额外的实例。\
  \ |\n\n## 理解该模式解决的问题\n\n在第 4 章中，我解释了如何使用模板创建对象，但这种方法也有其自身的缺点，我将在以下部分中描述。\n\n\n\n\
  ### 承担高昂的初始化成本\n\n某些类或结构体模板的使用成本很高，这意味着初始化对象的新实例可能需要消耗大量内存或计算资源，才能让该对象准备好被使用。为了演示这类问题，我创建了\
  \ `Initialization.playground` 文件，其内容如代码清单 5-1 所示。\n\n**代码清单 5-1.** `Initialization.playground`\
  \ 文件的内容\n\n```\nclass Sum {\n    let resultsCache: [[Int]];\n    var firstValue:Int;\n\
  \    var secondValue:Int;\n    init(first:Int, second:Int) {\n        resultsCache\
  \ = [[Int]](count: 10, repeatedValue:\n            Int);\n        for i in 0..<10\
  \ {\n            for j in 0..<10 {\n                resultsCache[i][j] = i + j;\n\
  \            }\n        }\n        self.firstValue = first;\n        self.secondValue\
  \ = second;\n    }\n    var Result:Int {\n        get {\n            return firstValue\
  \ < resultsCache.count\n                && secondValue < resultsCache[firstValue].count\n\
  \                ? resultsCache[firstValue][secondValue]\n                : firstValue\
  \ + secondValue;\n        }\n    }\n}\nvar calc1 = Sum(first:0, second: 9).Result;\n\
  var calc2 = Sum(first:3, second: 8).Result;\nprintln(\"Calc1: \\(calc1) Calc2: \\\
  (calc2)\");\n```\n\n我定义了一个名为 `Sum` 的类，它负责计算传入其初始化器的两个整数值之和。作为一种优化手段，`Sum` 类的初始化器创建了一个二维\
  \ `Int` 数组，并用预计算的值填充它，旨在用初始化期间的时间开销来换取后续更快速的计算。\n\n定义好 `Sum` 类之后，我创建了两个实例并使用它们进行计算。每次创建新的\
  \ `Sum` 对象时，我都需要承担创建并填充那个二维数组的开销——这种开销既体现在存储计算值所需的内存上，也体现在计算资源上。最后，我将两个计算结果输出到控制台，得到如下输出：\n\
  \n```\nCalc1: 9 Calc2: 11\n```\n\n这看起来可能是一个不切实际的例子，但这种编码风格却出奇地常见，通常是过早优化的结果——程序员在编写代码时试图推测性地提升性能，而不是基于后续的性能测试——这通常会导致性能更差且代码可读性更低。不过，这个例子中有两个方面不太现实。第一，`Sum`\
  \ 类执行的工作非常简单，即使是最热衷于优化的程序员也不太可能认为缓存两个整数相加的开销是值得的。第二，playground 将 `Sum` 类以及创建其实例的两条语句放在了同一个文件中。在真实项目中，初始化代码埋藏在深层的类继承层级中，而使用该类的语句则位于应用程序完全不同的部分。\n\
  \n### 创建模板依赖关系\n\n若想根据模板创建新对象，组件必须掌握三条信息：\n\n- 与该对象关联的模板\n- 必须调用的初始化器\n- 初始化器参数的名称和类型\n\
  \n这些信息会在整个应用中散布开来，只要某处需要创建对象的新实例，就会用到它们。这带来的问题是，它会形成对模板的依赖：一旦模板发生变化，所有使用该模板创建对象的组件都必须更新，以反映这种变化。你可以在代码清单\
  \ 5-2 中看到这一点，我在其中重新定义了 `Sum` 类，为其新增了一个初始化器参数。\n\n**代码清单 5-2.** 在 `Initialization.playground`\
  \ 文件中添加一个初始化器\n\n```\nclass Sum {\n    let resultsCache: [[Int]];\n    var firstValue:Int;\n\
  \    var secondValue:Int;\n    init(first:Int, second:Int, cacheSize:Int) {\n  \
  \      resultsCache = [[Int]](count: cacheSize, repeatedValue:\n            Int);\n\
  \        for i in 0 ..< cacheSize {\n            for j in 0 ..< cacheSize {\n  \
  \              resultsCache[i][j] = i + j;\n            }\n        }\n        self.firstValue\
  \ = first;\n        self.secondValue = second;\n    }\n    var Result:Int {\n  \
  \      get {\n            return firstValue < resultsCache.count\n             \
  \   && secondValue < resultsCache[firstValue].count\n                ? resultsCache[firstValue][secondValue]\n\
  \                : firstValue + secondValue;\n        }\n    }\n}\nvar calc1 = Sum(first:0,\
  \ second: 9, cacheSize:100).Result;\nvar calc2 = Sum(first:3, second: 8, cacheSize:20).Result;\n\
  println(\"Calc1: \\(calc1) Calc2: \\(calc2)\");\n```\n\n这个初始化器参数用于控制生成的缓存结果数量。如清单所示，我必须更新创建\
  \ `Sum` 对象的语句，以使用修改后的初始化器。当创建 `Sum` 对象的仅有两条语句彼此紧挨着时，修改微不足道；但在真实项目中，这些构造语句可能分散在各处，每处语句都需对\
  \ `Sum` 类的实现有足够了解，才能为 `cacheSize` 初始化器参数提供一个合理的值。\n\n> **提示**  \n> 本章的目标是介绍原型模式，但解决这类问题还有其他方式。例如，我可以定义一个便利初始化器，它调用指定的初始化器，并为\
  \ `cacheSize` 参数提供一个默认值。正如我在第 1 章中解释的，模式并不总是问题的唯一解决方案。\n\n## 理解原型模式\n\n原型模式使用**现有对象**（而非类或结构体）来创建新对象。这通常被称为**克隆**，因为新对象是现有对象的完全副本，包括对象自创建以来对其存储属性所做的任何修改。图\
  \ 5-1 展示了原型模式的工作原理。\n\n![A978-1-4842-0394-1_5_Fig1_HTML.jpg](img/A978-1-4842-0394-1_5_Fig1_HTML.jpg)\n\
  \n**图 5-1.** 原型模式\n\n原型模式包含三个操作。首先，需要对象的组件调用原始对象（称为**原型**）复制自身。第二个操作是复制过程，在此过程中创建一个新对象（称为**克隆体**）。在最后一个操作中，原型将克隆体交给调用组件，完成复制过程。\n\
  \n\n\n## 实现原型模式\n\n当你将值类型赋值给新变量时，Swift 会自动应用原型模式。值类型通过`structs`（结构体）定义，所有 Swift\
  \ 内置类型在底层都是以`structs`形式实现的。这意味着只需将字符串、布尔值、集合、枚举、元组和数值类型赋值给新变量，就能完成克隆。Swift 会复制该原型（prototype）的值，并以此创建一个克隆。清单\
  \ 5-3 展示了`ValueTypes.playground`文件的内容，我创建此文件是为了演示值类型如何被克隆。\n\n## 清单 5-3. `ValueTypes.playground`文件的内容\n\
  \n```\nstruct Appointment {\n    var name:String;\n    var day:String;\n    var\
  \ place:String;\n    func printDetails(label:String) {\n        println(\"\\(label)\
  \ with \\(name) on \\(day) at \\(place)\");\n    }\n}\n\nvar beerMeeting = Appointment(name:\
  \ \"Bob\", day: \"Mon\", place: \"Joe's Bar\");\nvar workMeeting = beerMeeting;\n\
  workMeeting.name = \"Alice\";\nworkMeeting.day = \"Fri\";\nworkMeeting.place = \"\
  Conference Rm 2\";\nbeerMeeting.printDetails(\"Social\");\nworkMeeting.printDetails(\"\
  Work\");\n```\n\n我定义了一个名为`Appointment`的结构体，它拥有存储属性`name`、`day`、`place`，以及一个将属性值输出到控制台的`printDetails`方法。首先，我将该结构体作为模板来创建一个新对象，如下所示：\n\
  \n```\nvar beerMeeting = Appointment(name: \"Bob\", day: \"Mon\", place: \"Joe's\
  \ Bar\");\n```\n\n原型模式显然需要一个原型对象，该对象通常从模板创建而来。这看似有悖直觉，但你总得先获得原型。一旦有了原型，我通过将其赋值给一个新变量来创建副本，如下所示：\n\
  \n```\nvar workMeeting = beerMeeting;\n```\n\n此时，我有两个独立的`Appointment`对象，分别赋值给了`beerMeeting`和`workMeeting`变量。两个对象的`name`、`day`和`place`属性拥有相同的值，如图\
  \ 5-2 所示。\n\n![A978-1-4842-0394-1_5_Fig2_HTML.jpg](img/A978-1-4842-0394-1_5_Fig2_HTML.jpg)\n\
  \n**图 5-2.** 克隆结构体原型的效果\n\n创建克隆后，我为其`name`、`day`和`place`属性赋予新值，将其配置为代表与原型不同的另一项预约，如图\
  \ 5-3 所示。\n\n![A978-1-4842-0394-1_5_Fig3_HTML.jpg](img/A978-1-4842-0394-1_5_Fig3_HTML.jpg)\n\
  \n**图 5-3.** 配置克隆对象\n\n最后，我在两个`Appointment`对象上分别调用`printDetails`方法，得到如下输出：\n\n```\n\
  Social with Bob on Mon at Joe's Bar\nWork with Alice on Fri at Conference Rm 2\n\
  ```\n\n一旦创建了原型，我就可以根据需求创建和配置任意数量的克隆，而无需承担使用结构体模板带来的额外开销。\n\n### 克隆引用类型\n\n使用类创建的对象是引用类型。当你将引用类型赋值给新变量时，Swift\
  \ 不会复制这些对象，而是会创建该对象的一个新引用，使得两个变量指向同一个对象。清单 5-4 展示了`ReferenceTypes.playground`文件的内容。在该文件中，我重写了上一章的`Appointment`示例，使用类而非结构体作为模板。\n\
  \n## 清单 5-4. `ReferenceTypes.playground`文件的内容\n\n```\nclass Appointment {\n    var\
  \ name:String;\n    var day:String;\n    var place:String;\n    init(name:String,\
  \ day:String, place:String) {\n        self.name = name; self.day = day; self.place\
  \ = place;\n    }\n    func printDetails(label:String) {\n        println(\"\\(label)\
  \ with \\(name) on \\(day) at \\(place)\");\n    }\n}\n\nvar beerMeeting = Appointment(name:\
  \ \"Bob\", day: \"Mon\", place: \"Joe's Bar\");\nvar workMeeting = beerMeeting;\n\
  workMeeting.name = \"Alice\";\nworkMeeting.day = \"Fri\";\nworkMeeting.place = \"\
  Conference Rm 2\";\nbeerMeeting.printDetails(\"Social\");\nworkMeeting.printDetails(\"\
  Work\");\n```\n\n除了使用`class`关键字外，我还为`Appointment`类添加了一个初始化器。Swift 会为结构体创建默认初始化器，但不会为类创建。除了使用类来定义`Appointment`类型外，此示例的代码与清单\
  \ 5-3 完全相同。然而，控制台显示的结果却不同。\n\n```\nSocial with Alice on Fri at Conference Rm 2\n\
  Work with Alice on Fri at Conference Rm 2\n```\n\n问题在于只有一个`Appointment`对象，而`workMeeting`和`beerMeeting`变量都指向它，如图\
  \ 5-4 所示。\n\n![A978-1-4842-0394-1_5_Fig4_HTML.jpg](img/A978-1-4842-0394-1_5_Fig4_HTML.jpg)\n\
  \n**图 5-4.** 将引用对象赋值给新变量\n\n由于只有一个`Appointment`对象，我通过`workMeeting`变量对存储属性所做的更改，在通过`beerMeeting`变量访问这些属性时也会被读取到，这就是为什么控制台输出了意料之外且无用的结果。\n\
  \n### 实现`NSCopying`协议\n\n为现有对象分配新引用是面向对象编程的重要组成部分，但这对于原型模式并无帮助。为了支持克隆，`Foundation`框架定义了`NSCopying`协议，它允许你指定对象应如何被克隆。清单\
  \ 5-5 展示了我如何更新`Appointment`类以实现`NSCopying`协议。\n\n## 清单 5-5. 在`ReferenceTypes.playground`文件中实现`NSCopying`协议\n\
  \n```\nimport Foundation\n\nclass Appointment : NSObject, NSCopying {\n    var name:String;\n\
  \    var day:String;\n    var place:String;\n    init(name:String, day:String, place:String)\
  \ {\n        self.name = name; self.day = day; self.place = place;\n    }\n    func\
  \ printDetails(label:String) {\n        println(\"\\(label) with \\(name) on \\\
  (day) at \\(place)\");\n    }\n    func copyWithZone(zone: NSZone) -> AnyObject\
  \ {\n        return Appointment(name:self.name, day:self.day, place:self.place);\n\
  \    }\n}\n\nvar beerMeeting = Appointment(name: \"Bob\", day: \"Mon\", place: \"\
  Joe's Bar\");\nvar workMeeting = beerMeeting.copy() as Appointment;\nworkMeeting.name\
  \ = \"Alice\";\nworkMeeting.day = \"Fri\";\nworkMeeting.place = \"Conference Rm\
  \ 2\";\nbeerMeeting.printDetails(\"Social\");\nworkMeeting.printDetails(\"Work\"\
  );\n```\n\n**提示：** 你只能在类上实现`NSCopying`协议，而不能在结构体上实现。结构体始终只进行浅拷贝。\n\n`NSCopying`协议定义了`copyWithZone`方法，该方法在对象被复制时调用。复制对象所使用的机制留给类来实现。在此例中，我使用当前对象的存储属性值创建了一个`Appointment`类的新实例。\n\
  \n**提示：** 在实现`copyWithZone`方法时，可以忽略`NSZone`参数。\n\n为了利用`NSCopying`协议，我必须修改`Appointment`类，使其继承自定义了`copy`方法的`NSObject`。要复制一个`Appointment`对象，我需要在原型上调用`copy`方法（而不是`copyWithZone`），如下所示：\n\
  \n```\nvar workMeeting = beerMeeting.copy() as Appointment;\n```\n\n`copyWithZone`方法返回`AnyObject`，这意味着我必须使用`as`关键字将`copy`方法创建的对象向下转型，以便`workMeeting`变量具有正确的类型。\n\
  \n**注意：** 实现`NSCopying`协议并不会将引用类型转变为值类型。你必须调用`copy`方法来克隆原型。如果只是简单地将原型赋值给一个新变量，你得到的将是指向原型的另一个引用，而不是一个新对象。\n\
  \n\n### 理解浅拷贝与深拷贝\n\n原型模式的一个重要方面是对象是通过深拷贝还是浅拷贝来克隆的，这涉及到如何处理指向其他引用类型的存储属性。在代码清单 5-6\
  \ 中，我在 `ReferenceTypes`  playground 中定义了一个新类，并为 `Appointment` 类添加了一个新属性，该属性指向该类的一个实例。\n\
  \n**代码清单 5-6.** 在 `ReferenceTypes.playground` 文件中添加引用类型属性\n\n```\nimport Foundation\n\
  \nclass Location {\n    var name:String;\n    var address:String;\n\n    init(name:String,\
  \ address:String) {\n        self.name = name; self.address = address;\n    }\n\
  }\n\nclass Appointment : NSObject, NSCopying {\n    var name:String;\n    var day:String;\n\
  \    var place:Location;\n\n    init(name:String, day:String, place:Location) {\n\
  \        self.name = name; self.day = day; self.place = place;\n    }\n\n    func\
  \ printDetails(label:String) {\n        println(\"\\(label) with \\(name) on \\\
  (day) at \\(place.name), \"\n            + \"\\(place.address)\");\n    }\n\n  \
  \  func copyWithZone(zone: NSZone) -> AnyObject {\n        return Appointment(name:self.name,\
  \ day:self.day,\n            place:self.place);\n    }\n}\n\nvar beerMeeting = Appointment(name:\
  \ \"Bob\", day: \"Mon\",\n    place: Location(name:\"Joe's Bar\", address: \"123\
  \ Main St\"));\nvar workMeeting = beerMeeting.copy() as Appointment;\nworkMeeting.name\
  \ = \"Alice\";\nworkMeeting.day = \"Fri\";\nworkMeeting.place.name = \"Conference\
  \ Rm 2\";\nworkMeeting.place.address = \"Company HQ\";\nbeerMeeting.printDetails(\"\
  Social\");\nworkMeeting.printDetails(\"Work\");\n```\n\n我创建了一个简单的 `Location` 类，并将其用于\
  \ `Appointment` 对象的 `place` 属性。以下是控制台显示的输出：\n\n```\nSocial with Bob on Mon at Conference\
  \ Rm 2, Company HQ\nWork with Alice on Fri at Conference Rm 2, Company HQ\n```\n\
  \n同样，我通过 `workMeeting` 变量所做的更改，也影响了通过 `beerMeeting` 变量可以访问的存储值。这是因为我将 `place` 属性的类型从值类型（`String`）更改为引用类型（`Location`），并且我的\
  \ `NSCopying` 协议实现为原型的 `Location` 对象创建了一个新的引用，如图 5-5 所示。\n\n![A978-1-4842-0394-1_5_Fig5_HTML.jpg](img/A978-1-4842-0394-1_5_Fig5_HTML.jpg)\n\
  \n**图 5-5.** 克隆原型时拷贝引用所产生的影响\n\n这被称为浅拷贝，即拷贝的是对象的引用，而非对象本身。如图 5-5 所示，存在两个 `Appointment`\
  \ 对象，但它们的 `place` 属性指向的是同一个 `Location` 对象。这就是为什么我通过 `workMeeting.place` 属性所做的更改会影响到通过\
  \ `beerMeeting.place` 属性获取的值。\n\n> **提示：** 与 `NSCopying` 协议相关的是 `@NSCopying` 属性特性，它可以应用于存储属性。`@NSCopying`\
  \ 特性会自动调用分配给该注解属性的对象的 `copyWithZone` 方法，我将在本章后面的“Cocoa 中原型模式的示例”一节中演示其用法。\n\n####\
  \ 实现深拷贝\n\n深拷贝会创建原型所有引用对象的副本，在本例中，这将确保每个 `Appointment` 对象通过其 `place` 属性指向不同的 `Location`\
  \ 对象。代码清单 5-7 展示了如何在 `ReferenceTypes` playground 中实现深拷贝。\n\n**代码清单 5-7.** 在 `ReferenceTypes.playground`\
  \ 文件中实现深拷贝\n\n```\nimport Foundation\n\nclass Location : NSObject, NSCopying {\n\
  \    var name:String;\n    var address:String;\n\n    init(name:String, address:String)\
  \ {\n        self.name = name; self.address = address;\n    }\n\n    func copyWithZone(zone:\
  \ NSZone) -> AnyObject {\n        return Location(name: self.name, address:self.address);\n\
  \    }\n}\n\nclass Appointment : NSObject, NSCopying {\n    var name:String;\n \
  \   var day:String;\n    var place:Location;\n\n    init(name:String, day:String,\
  \ place:Location) {\n        self.name = name; self.day = day; self.place = place;\n\
  \    }\n\n    func printDetails(label:String) {\n        println(\"\\(label) with\
  \ \\(name) on \\(day) at \\(place.name), \"\n            + \"\\(place.address)\"\
  );\n    }\n\n    func copyWithZone(zone: NSZone) -> AnyObject {\n        return\
  \ Appointment(name:self.name, day:self.day,\n            place:self.place.copy()\
  \ as Location);\n    }\n}\n\nvar beerMeeting = Appointment(name: \"Bob\", day: \"\
  Mon\",\n    place: Location(name:\"Joe's Bar\", address: \"123 Main St\"));\nvar\
  \ workMeeting = beerMeeting.copy() as Appointment;\nworkMeeting.name = \"Alice\"\
  ;\nworkMeeting.day = \"Fri\";\nworkMeeting.place.name = \"Conference Rm 2\";\nworkMeeting.place.address\
  \ = \"Company HQ\";\nbeerMeeting.printDetails(\"Social\");\nworkMeeting.printDetails(\"\
  Work\");\n```\n\n为了创建深拷贝，我必须在 `Location` 类上实现 `NSCopying` 协议，将基类改为 `NSObject`，并定义\
  \ `copyWithZone` 方法。你想要深拷贝的所有引用类型都必须实现 `NSCopying` 协议，因此你必须在原型所引用的所有类中重复此过程，包括那些通过其他引用间接引用的类。\n\
  \n#### 选择浅拷贝还是深拷贝\n\n在浅拷贝和深拷贝之间进行选择并没有硬性规定，必须根据具体的类逐个做出决定。你应该考虑三个因素：拷贝一个对象所需的工作量、存储副本所需的内存量，以及拷贝对象的使用方式。\n\
  \n最后一个因素——拷贝对象将如何使用——是最重要的。以代码清单 5-7 中的 `Location` 类为例，在 `Appointment` 对象之间共享对象是毫无意义的，因为对一个预约地点所做的更改不太可能适用于引用同一个\
  \ `Location` 对象的其他预约，尤其是在社交预约和工作预约混在一起的情况下。\n\n可能存在一组相关的预约，它们共享一个地点会带来好处。例如，设想一整天的系列会议都在同一个会议室举行——你的应用程序可能会从优化相关会议的\
  \ `Location` 对象创建中受益。在这种情况下，你应该权衡创建和存储新对象所需的计算量和内存，与管理共享对象引用的复杂性之间的利弊。在 `Appointment`/`Location`\
  \ 示例中，`Location` 对象非常容易创建，并且需要的存储空间极小（仅两个 `String` 值），因此，为了确定何时可以共享 `Location` 对象以及何时不能而付出的开销和复杂性是完全不合理的。\n\
  \n我能给出的最佳建议是，仔细思考对象的用途，并弄清楚哪些对象是打算在你从原型创建的所有副本中通用的。如果你不确定，那么先从浅拷贝开始，因为它是最简单的实现方式——它并不总是正确的技术，但它能让你在不需在整个应用程序中实现\
  \ `NSCopying` 协议的情况下测试更改带来的影响。\n\n\n\n如前所述，实现`NSCopying`协议并不会将引用类型转换为值类型，因此我必须调用`copy`方法来创建`Appointment`原型的`Location`对象的克隆，这正是我在`Appointment`类定义的`copyWithZone`方法中所做的。\n\
  \n```\nfunc copyWithZone(zone: NSZone) -> AnyObject {\n    return Appointment(name:self.name,\
  \ day:self.day,\n        place:self.place.copy() as Location);\n}\n```\n\n这些改动意味着`Appointment`原型及其`Location`对象都被克隆了，如图\
  \ 5-6 所示。\n\n![A978-1-4842-0394-1_5_Fig6_HTML.jpg](img/A978-1-4842-0394-1_5_Fig6_HTML.jpg)\n\
  \n图 5-6. 深拷贝的效果\n\n你可以通过查看示例代码的控制台输出来观察深拷贝的效果，如下所示：\n\n```\nSocial with Bob on Mon\
  \ at Joe's Bar, 123 Main St\nWork with Alice on Fri at Conference Rm 2, Company\
  \ HQ\n```\n\n由于`Appointment`对象拥有各自的`Location`对象，因此通过`workMeeting`变量应用的更改不会影响到通过`beerMeeting`变量访问的对象。\n\
  \n### 拷贝数组\n\nSwift 数组被实现为结构体，这使其成为值类型。当你将数组赋值给一个新变量时，数组本身以及其中包含的任何值类型都会被拷贝。数组中包含的引用类型会被浅拷贝，因此原型数组和克隆数组都将包含对相同对象的引用。清单\
  \ 5-8 展示了`ArrayCopy.playground`文件的内容，我创建该文件用于演示。\n\n**清单 5-8.** `ArrayCopy.playground`文件的内容\n\
  \n```\nimport Foundation\n\nclass Person : NSObject, NSCopying {\n    var name:String;\n\
  \    var country:String;\n    init(name:String, country:String) {\n        self.name\
  \ = name; self.country = country;\n    }\n    func copyWithZone(zone: NSZone) ->\
  \ AnyObject {\n        return Person(name: self.name, country: self.country);\n\
  \    }\n}\n\nvar people = [Person(name:\"Joe\", country:\"France\"),\n    Person(name:\"\
  Bob\", country:\"USA\")];\nvar otherpeople = people;\npeople[0].country = \"UK\"\
  ;\nprintln(\"Country: \\(otherpeople[0].country)\");\n```\n\n> **提示：** 作为一种性能优化，Swift\
  \ 数组只有在被修改时才会被拷贝，这被称为**惰性拷贝**。在日常使用中你无需担心这一点，因为它在后台无缝进行，但这意味着如果你只是读取数组内容，克隆数组的行为就像引用类型；一旦你进行修改，它就会表现得像值类型。\n\
  \n我创建了一个名为`people`的数组，其中包含两个`Person`对象。我将该数组赋值给一个名为`otherpeople`的变量，然后修改`people`数组中的第一个对象。以下是控制台输出，显示数组内容是浅拷贝的，尽管数组本身是一个结构体：\n\
  \n```\nCountry: UK\n```\n\n要深拷贝一个数组，你必须检查数组中的每个元素，查找其类派生自`NSObject`并实现了`NSCopying`协议的对象，如清单\
  \ 5-9 所示。\n\n**清单 5-9.** 在`ArrayCopy.playground`文件中深拷贝数组\n\n```\nimport Foundation\n\
  \nclass Person : NSObject, NSCopying {\n    var name:String;\n    var country:String;\n\
  \    init(name:String, country:String) {\n        self.name = name; self.country\
  \ = country;\n    }\n    func copyWithZone(zone: NSZone) -> AnyObject {\n      \
  \  return Person(name: self.name, country: self.country);\n    }\n}\n\nfunc deepCopy(data:[AnyObject])\
  \ -> [AnyObject] {\n    return data.map({item -> AnyObject in\n        if (item\
  \ is NSCopying && item is NSObject) {\n            return (item as NSObject).copy();\n\
  \        } else {\n            return item;\n        }\n    })\n}\n\nvar people\
  \ = [Person(name:\"Joe\", country:\"France\"),\n    Person(name:\"Bob\", country:\"\
  USA\")];\nvar otherpeople = deepCopy(people) as [Person];\npeople[0].country = \"\
  UK\";\nprintln(\"Country: \\(otherpeople[0].country)\");\n```\n\n> **提示：** 在“Cocoa\
  \ 中原型模式的示例”一节中，我将解释如何拷贝由`NSArray`和`NSMutableArray`类实现的 Cocoa 数组。这些类的行为与我在此节描述的内置\
  \ Swift 数组不同，理解其工作原理在处理 Objective-C 代码时会很有用。\n\n我定义了一个名为`deepCopy`的函数，它接受一个数组并使用`map`方法来拷贝数组。我传递给`map`方法的闭包会检查对象是否可以被深拷贝，如果可以，则调用`copy`方法。其他对象则不加修改地添加到结果数组中。如下控制台输出所示，深拷贝后的数组不再包含对相同对象的引用：\n\
  \n```\nCountry: France\n```\n\n## 理解原型模式的优点\n\n在以下小节中，我将描述原型模式提供的优点。其中一些优点解决了我在本章开头指出的问题，但还有一些额外的优点源于通过`NSCopying`协议拷贝对象的方式。\n\
  \n\n\n### 避免昂贵的初始化操作\n\n使用`NSCopying`协议可以让对象自行负责复制，这意味着克隆可以避免昂贵的初始化操作。在本章开头，我使用了`Initialization.playground`文件定义了一个`Sum`类，该类在其初始化器中生成了一个缓存结果数组，如代码清单\
  \ 5-10 所示。\n\n**代码清单 5-10.** `Initialization.playground`文件的内容\n\n```swift\nclass\
  \ Sum {\n    let resultsCache: [[Int]];\n    var firstValue:Int;\n    var secondValue:Int;\n\
  \    init(first:Int, second:Int) {\n        resultsCache = [[Int]](count: 10, repeatedValue:\n\
  \            Int);\n        for i in 0..<10 {\n            for j in 0..<10 {\n \
  \               resultsCache[i][j] = i + j;\n            }\n        }\n        self.firstValue\
  \ = first;\n        self.secondValue = second;\n    }\n    var Result:Int {\n  \
  \      get {\n            return firstValue < resultsCache.count\n             \
  \   && secondValue < resultsCache[firstValue].count\n                ? resultsCache[firstValue][secondValue]\n\
  \                : firstValue + secondValue;\n        }\n    }\n}\nvar calc1 = Sum(first:0,\
  \ second: 9).Result;\nvar calc2 = Sum(first:3, second: 8).Result;\nprintln(\"Calc1:\
  \ \\(calc1) Calc2: \\(calc2)\");\n```\n\n每次创建`Sum`对象时，都需要承担分配和填充二维数组`resultsCache`的开销。通过实现`NSCopying`协议，我可以应用原型模式，并在`copyWithZone`方法中选择性地克隆对象，如代码清单\
  \ 5-11 所示。\n\n**代码清单 5-11.** 在`Initialization.playground`文件中应用原型模式\n\n```swift\n\
  import Foundation\n\nclass Sum : NSObject, NSCopying {\n    let resultsCache: [[Int]];\n\
  \    var firstValue:Int;\n    var secondValue:Int;\n    init(first:Int, second:Int)\
  \ {\n        resultsCache = [[Int]](count: 10, repeatedValue:\n            Int);\n\
  \        for i in 0..<10 {\n            for j in 0..<10 {\n                resultsCache[i][j]\
  \ = i + j;\n            }\n        }\n        self.firstValue = first;\n       \
  \ self.secondValue = second;\n    }\n    private init(first:Int, second:Int, cache:[[Int]])\
  \ {\n        self.firstValue = first;\n        self.secondValue = second;\n    \
  \    resultsCache = cache;\n    }\n    var Result:Int {\n        get {\n       \
  \     return firstValue < resultsCache.count\n                && secondValue < resultsCache[firstValue].count\n\
  \                ? resultsCache[firstValue][secondValue]\n                : firstValue\
  \ + secondValue;\n        }\n    }\n    func copyWithZone(zone: NSZone) -> AnyObject\
  \ {\n        return Sum(first:self.firstValue,\n            second: self.secondValue,\n\
  \            cache: self.resultsCache);\n    }\n}\n\nvar prototype = Sum(first:0,\
  \ second:9);\nvar calc1 = prototype.Result;\nvar clone = prototype.copy() as Sum;\n\
  clone.firstValue = 3; clone.secondValue = 8;\nvar calc2 = clone.Result;\nprintln(\"\
  Calc1: \\(calc1) Calc2: \\(calc2)\");\n```\n\n我修改了类声明，使基类变为`NSObject`（它提供了`copy`方法），并实现了`NSCopying`协议。为了支持克隆，我添加了一个新的初始化器，它接受缓存数据作为参数，而不是自行生成数据。我用`private`关键字标注了这个初始化器，这样我就能在`copyWithZone`函数中使用它，通过原型生成的缓存数据克隆对象，同时防止其他组件提供自己的结果数据。\n\
  \n### 分离对象的创建与使用\n\n正如我在本章前面解释的那样，从模板创建对象需要掌握三方面的知识：\n\n- 与对象关联的模板\n- 必须调用的初始化器\n\
  - 初始化器参数的名称和类型\n\n原型模式允许组件从原型创建新对象，而无需了解模板的任何信息，这意味着你可以更改类或结构体，而无需修改需要创建其实例的组件。换句话说，你可以通过将对象的创建方式与使用方式分离，来最小化对已定义模板的依赖数量。遵循原型模式的组件无需知道它们所克隆的原型对象的类型，这使得在需要创建新对象的组件中，可以限制对子类的了解程度。这是一个容易引起混淆的好处，因此我将分阶段构建示例。代码清单\
  \ 5-12 展示了`Hiding.playground`文件的内容，我是为此示例创建的。\n\n**代码清单 5-12.** `Hiding.playground`文件的内容\n\
  \n```swift\nimport Foundation\n\nclass Message {\n    var to:String;\n    var subject:String;\n\
  \    init(to:String, subject:String) {\n        self.to = to; self.subject = subject;\n\
  \    }\n}\n\nclass MessageLogger {\n    var messages:[Message] = [];\n    func logMessage(msg:Message)\
  \ {\n        messages.append(msg);\n    }\n    func processMessages(callback:Message\
  \ -> Void) {\n        for msg in messages {\n            callback(msg);\n      \
  \  }\n    }\n}\n\nvar logger = MessageLogger();\nvar message = Message(to: \"Joe\"\
  , subject: \"Hello\");\nlogger.logMessage(message);\nmessage.to = \"Bob\";\nmessage.subject\
  \ = \"Free for dinner?\";\nlogger.logMessage(message);\nlogger.processMessages({msg\
  \ -> Void in\n    println(\"Message - To: \\(msg.to) Subject: \\(msg.subject)\"\
  );\n});\n```\n\n我定义了一个`Message`类，它拥有`to`和`subject`存储属性，以及一个`MessageLogger`类，它存储传递给其`logMessage`方法的`Message`对象，并通过传递给`processMessages`方法的闭包处理存储的对象。\n\
  \n本例中的问题始于一个事实：我重复使用了`Message`对象，这是一种常见的优化——尽管是针对更复杂的类型。（请暂时忽略重复使用对象的好处；这是一种通常几乎不加思索就会应用的优化，即使创建对象的成本微不足道。）\n\
  \n```\n...\nmessage.to = \"Bob\";\nmessage.subject = \"Free for dinner?\";\nlogger.logMessage(message);\n\
  ...\n```\n\n重复使用`Message`对象带来的影响是，`MessageLogger`类定义的数组中填满了对同一对象的引用。你可以在控制台输出中看到这个问题的效果，该输出由我传递给`processMessages`方法的闭包生成。\n\
  \n```\nMessage - To: Bob Subject: Free for dinner?\nMessage - To: Bob Subject: Free\
  \ for dinner?\n```\n\n## （并非真正）解决问题\n\n如果你不熟悉原型模式，或者不喜欢`NSCopying`协议的工作方式，你可能会倾向于修改`MessageLogger`类，使其使用类初始化器创建自己的`Message`对象，如代码清单\
  \ 5-13 所示。\n\n**代码清单 5-13.** 在`Hiding.playground`文件中修改`MessageLogger`类\n\n```swift\n\
  ...\nclass MessageLogger {\n    var messages:[Message] = [];\n    func logMessage(msg:Message)\
  \ {\n        messages.append(Message(to: msg.to, subject: msg.subject));\n    }\n\
  \    func processMessages(callback:Message -> Void) {\n        for msg in messages\
  \ {\n            callback(msg);\n        }\n    }\n}\n...\n```\n\n**提示**\n\n我无法仅通过存储数据值来解决此问题，因为传递给`process`方法的闭包期望处理的是`Message`对象。而且，正如你稍后将了解的那样，还有一个更严重的潜在问题需要解决，而提取数据值是无法解决的。\n\
  \n这种方法解决了问题，如下面的控制台输出所示：\n\n```\nMessage - To: Joe Subject: Hello\nMessage - To:\
  \ Bob Subject: Free for dinner?\n```\n\n\n\n## 揭示根本问题\n\n直接问题已经得到解决，但我只是为将来埋下了隐患，因为\
  \ `MessageLogger` 类现在依赖于能够通过调用 `Message` 类的初始化器来创建 `Message` 对象。当我将 `Message` 子类化以创建更专业的类时，我的方案就失效了，如代码清单\
  \ 5-14 所示。\n\n**代码清单 5-14.** 在 `Hiding.playground` 文件中添加一个子类\n\n```\nimport Foundation\n\
  \nclass Message {\n    var to:String;\n    var subject:String;\n\n    init(to:String,\
  \ subject:String) {\n        self.to = to; self.subject = subject;\n    }\n}\n\n\
  class DetailedMessage : Message {\n    var from:String;\n\n    init(to: String,\
  \ subject: String, from:String) {\n        self.from = from;\n        super.init(to:\
  \ to, subject: subject);\n    }\n}\n\nclass MessageLogger {\n    var messages:[Message]\
  \ = [];\n\n    func logMessage(msg:Message) {\n        messages.append(Message(to:\
  \ msg.to, subject: msg.subject));\n    }\n\n    func processMessages(callback:Message\
  \ -> Void) {\n        for msg in messages {\n            callback(msg);\n      \
  \  }\n    }\n}\n\nvar logger = MessageLogger();\nvar message = Message(to: \"Joe\"\
  , subject: \"Hello\");\nlogger.logMessage(message);\nmessage.to = \"Bob\";\nmessage.subject\
  \ = \"Free for dinner?\";\nlogger.logMessage(message);\nlogger.logMessage(DetailedMessage(to:\
  \ \"Alice\", subject: \"Hi!\", from: \"Joe\"));\nlogger.processMessages({msg ->\
  \ Void in\n    if let detailed = msg as? DetailedMessage {\n        println(\"Detailed\
  \ Message - To: \\(detailed.to) From: \\(detailed.from)\"\n        + \" Subject:\
  \ \\(detailed.subject)\");\n    } else {\n        println(\"Message - To: \\(msg.to)\
  \ Subject: \\(msg.subject)\");\n    }\n});\n```\n\n我对 `Message` 进行了子类化，定义了 `DetailedMessage`\
  \ 类，并创建了该子类的一个实例，以便将其传递给 `MessageLogger` 定义的 `logMessage` 方法。我还修订了传递给 `processMessages`\
  \ 方法的闭包，使其能输出 `DetailedMessage` 对象存储的额外属性。\n\n问题在于，`MessageLogger` 类接收到了 `Message`\
  \ 和 `DetailedMessage` 对象，但它只向自身的存储数组添加了 `Message` 对象。当调用 `processMessage` 方法时，只会显示\
  \ `to` 和 `subject` 属性，而 `from` 属性中包含的额外细节则永久丢失了。下面是代码清单 5-14 的控制台输出：\n\n```\nMessage\
  \ - To: Joe Subject: Hello\nMessage - To: Bob Subject: Free for dinner?\nMessage\
  \ - To: Alice Subject: Hi!\n```\n\n## （并非真正）解决问题\n\n如果不使用原型模式，解决第二个问题的明显方法是让 `MessageLogger`\
  \ 类知晓存在 `Message` 和 `DetailedMessage` 类，以及如何分别创建它们，如代码清单 5-15 所示。\n\n**代码清单 5-15.**\
  \ 在 `Hiding.playground` 文件中修改 `MessageLogger` 类\n\n```\n...\nclass MessageLogger\
  \ {\n    var messages:[Message] = [];\n\n    func logMessage(msg:Message) {\n  \
  \      if let detailed = msg as? DetailedMessage {\n            messages.append(DetailedMessage(to:\
  \ detailed.to,\n                subject: detailed.subject, from: detailed.from));\n\
  \        } else {\n            messages.append(Message(to: msg.to, subject: msg.subject));\n\
  \        }\n    }\n\n    func processMessages(callback:Message -> Void) {\n    \
  \    for msg in messages {\n            callback(msg);\n        }\n    }\n}\n...\n\
  ```\n\n这通过增加 `MessageLogger` 类对 `Message` 类及其子类的了解程度，解决了当前问题。但每当我创建一个新的子类或更改任何初始化器时，都需要更新\
  \ `logMessage` 方法，这导致代码维护工作量的增加，是我们不希望看到的。\n\n### 应用原型模式\n\n我可以通过实现 `NSCopying`\
  \ 协议并使用原型模式来克隆 `MessageLogger` 类所处理的对象，从而创建一种更好的方法，如代码清单 5-16 所示。\n\n**代码清单 5-16.**\
  \ 在 `Hiding.playground` 文件中应用原型模式\n\n```\nimport Foundation\n\nclass Message : NSObject,\
  \ NSCopying {\n    var to:String;\n    var subject:String;\n\n    init(to:String,\
  \ subject:String) {\n        self.to = to; self.subject = subject;\n    }\n\n  \
  \  func copyWithZone(zone: NSZone) -> AnyObject {\n        return Message(to: self.to,\
  \ subject: self.subject);\n    }\n}\n\nclass DetailedMessage : Message {\n    var\
  \ from:String;\n\n    init(to: String, subject: String, from:String) {\n       \
  \ self.from = from;\n        super.init(to: to, subject: subject);\n    }\n\n  \
  \  override func copyWithZone(zone: NSZone) -> AnyObject {\n        return DetailedMessage(to:\
  \ self.to,\n            subject: self.subject, from: self.from);\n    }\n}\n\nclass\
  \ MessageLogger {\n    var messages:[Message] = [];\n\n    func logMessage(msg:Message)\
  \ {\n        messages.append(msg.copy() as Message);\n    }\n\n    func processMessages(callback:Message\
  \ -> Void) {\n        for msg in messages {\n            callback(msg);\n      \
  \  }\n    }\n}\n\nvar logger = MessageLogger();\nvar message = Message(to: \"Joe\"\
  , subject: \"Hello\");\nlogger.logMessage(message);\nmessage.to = \"Bob\";\nmessage.subject\
  \ = \"Free for dinner?\";\nlogger.logMessage(message);\nlogger.logMessage(DetailedMessage(to:\
  \ \"Alice\", subject: \"Hi!\", from: \"Joe\"));\nlogger.processMessages({msg ->\
  \ Void in\n    if let detailed = msg as? DetailedMessage {\n        println(\"Detailed\
  \ Message - To: \\(detailed.to) From: \\(detailed.from)\"\n        + \" Subject:\
  \ \\(detailed.subject)\");\n    } else {\n        println(\"Message - To: \\(msg.to)\
  \ Subject: \\(msg.subject)\");\n    }\n});\n```\n\n我将 `Message` 类的基类型更改为 `NSObject`，并在\
  \ `Message` 和 `DetailedMessage` 类中实现了 `copyWithZone` 方法。这使得我能够克隆传递给 `logMessage`\
  \ 方法的对象，而无需担心子类或初始化器的问题。\n\n**提示**\n\n请注意，我不需要在 `DetailedMessage` 类中实现 `NSCopying`\
  \ 协议，因为它继承自 `Message` 类。我所需要做的只是重写 `copyWithZone` 方法。\n\n控制台中显示的输出表明，应用原型模式确保了由\
  \ `DetailedMessage` 类定义的额外属性不会丢失。\n\n```\nMessage - To: Joe Subject: Hello\nMessage\
  \ - To: Bob Subject: Free for dinner?\nDetailed Message - To: Alice From: Joe Subject:\
  \ Hi!\n```\n\n应用原型模式的优点是，只要对象最初是从 `Message` 类或其某个子类创建的，就可以被克隆；创建新的子类或修改类的初始化器不需要对\
  \ `MessageLogger` 类进行任何更改，这使得代码更加灵活且易于维护。\n\n**提示**\n\n只需多付出一点努力，我就可以完全打破对 `Message`\
  \ 类的依赖，创建一个可以克隆对象的通用类。有关详细信息，请参见“将模式应用于 SportsStore 应用程序”一节。\n\n## 理解原型模式的陷阱\n\n\
  在使用原型模式时，有几个陷阱需要避免，我将在以下各节中进行描述。\n\n### 理解深拷贝与浅拷贝的陷阱\n\n第一个要避免的陷阱是，在需要深拷贝时却执行了浅拷贝。在克隆对象时，仔细考虑是需要创建一个完全独立的副本，还是简单的引用就足够了。创建引用比执行深拷贝更快更简单，但这确实意味着两个或更多引用将指向同一个对象。\n\
  \n此外，请不要忘记，需要考虑正在克隆的整个对象层级结构，而不仅仅是调用 `copy` 方法的那个对象。对于每个指向引用类型的变量，都必须做出浅拷贝与深拷贝的决策。有关详细信息和示例，请参见本章前面的“实现深拷贝”一节。\n\
  \n\n\n### 理解“暴露原型陷阱”\n\n一个常见的陷阱是强制要求存在一个用于创建所有克隆对象的单一原型对象。这会导致扭曲的代码结构，使得原型为了防范复制需求而暴露给应用中的每一个组件。不要害怕在你的应用的每个逻辑部分中拥有多个原型，也不要忘记你可以从克隆体创建副本。\n\
  \n**提示：** 原型模式的一些拥护者认为，你不应该使用原型对象异常来创建克隆。我不同意这种限制，并且认为克隆任何支持原型模式的对象都没有害处，包括正在用于执行工作的对象和克隆对象本身。\n\
  \n### 理解“非标准协议陷阱”\n\n实现原型模式的 iOS 标准方式是实现 `NSCopying` 协议，并确保原型的基类是 `NSObject`。这个\
  \ `NSCopying` 协议对 Swift 并不特别友好，因此你可能会倾向于通过定义自己的协议或定义复制构造器（即接受类实例并克隆它的初始化器）来创建更优雅的解决方案。\n\
  \n这两种方法都可行，但 `NSCopying` 的好处之一是它在 iOS 框架中被广泛理解和应用。偏离标准协议会将原型模式的应用范围限制在你的自定义类中，并且会使与期望采用\
  \ `NSCopying` 协议的第三方代码协作变得困难。我的建议是坚持使用 `NSObject` 和 `NSCopying`。它们可能有些笨拙，但它们是有效的，并且被广泛使用。\n\
  \n## Cocoa 中原型模式的例子\n\n原型模式在 Cocoa 中随处可见，尤其是在 `Foundation` 框架中，你会发现许多类都实现了 `NSCopying`。我在下一节中描述一个有用的实例，并解释如何通过使用属性特性使\
  \ `NSCopying` 协议更符合 Swift 风格。\n\n### 使用 Cocoa 数组\n\n特别值得注意的是 `NSArray` 类及其子类 `NSMutableArray`。你经常会从\
  \ Objective-C 模块中使用这些类接收数据，它们遵循与内置 Swift 数组不同的路径。清单 5-17 展示了 `NSArray.playground`\
  \ 文件的内容，我创建该文件用于演示。\n\n**清单 5-17.** NSArray.playground 文件的内容\n\n```\nimport Foundation\n\
  \nclass Person : NSObject, NSCopying {\n    var name:String\n    var country: String\n\
  \n    init(name:String, country:String) {\n        self.name = name; self.country\
  \ = country;\n    }\n\n    func copyWithZone(zone: NSZone) -> AnyObject {\n    \
  \    return Person(name: self.name, country: self.country);\n    }\n}\n\nvar data\
  \ = NSMutableArray(objects: 10, \"iOS\", Person(name:\"Joe\", country:\"USA\"));\n\
  var copiedData = data;\ndata[0] = 20;\ndata[1] = \"MacOS\";\n(data[2] as Person).name\
  \ = \"Alice\"\n\nprintln(\"Identity: \\(data === copiedData)\");\nprintln(\"0: \\\
  (copiedData[0]) 1: \\(copiedData[1]) 2: \\(copiedData[2].name)\");\n```\n\n**提示：**\
  \ `NSArray` 类创建一个不可变数组，该数组无法修改。`NSMutableArray` 是 `NSArray` 的子类，它允许修改。我使用了 `NSMutableArray`\
  \ 类，因为我想演示数组及其内容是如何被复制的。\n\n我创建了一个包含一个 `Int`、一个 `String` 和一个 `Person` 对象的 `NSMutableArray`\
  \ 对象，其中 `Person` 对象来自我在 playground 中定义的 `Person` 类，该类实现了 `NSCopying` 协议。（`NSArray`\
  \ 和 `NSMutableArray` 不是强类型的，这与 Swift 内置数组不同。）\n\n我将该数组赋值给一个名为 `copiedData` 的新变量，然后修改\
  \ `data` 数组中的每个值。为了完成这个示例，我使用 Swift 恒等运算符来检查 `data` 和 `copiedData` 变量是否引用同一个对象，并打印出\
  \ `copiedData` 数组中的项目。以下是 playground 产生的控制台输出：\n\n```\nIdentity: true\n0: 20 1:\
  \ MacOS 2: Alice\n```\n\nSwift 数组是作为结构体实现的，这意味着将一个 Swift 数组赋值给一个新变量会创建一个新数组并复制其值对象。但这里的情况并非如此。相反，`data`\
  \ 和 `copiedData` 变量都引用同一个 `NSMutableArray` 对象，并且修改其中一个变量中的值会影响通过两者获取的数据。`NSArray`\
  \ 和 `NSMutableArray` 都是引用类型，这产生了与使用内置 Swift 数组时不同的行为。\n\n#### 对 Cocoa 数组进行浅拷贝\n\n\
  我可以应用原型模式来复制该数组，这将执行浅拷贝。除了我一直在本章中使用的 `copy` 方法外，在处理 `Foundation` 类时，还有另一个与原型的相关的方法需要考虑：`mutableCopy`。表\
  \ 5-2 描述了这些方法。\n\n**表 5-2.** NSArray 和 NSMutableArray 类定义的原型方法\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| `copy()` | 返回一个 `NSArray` 实例，该实例不可修改 |\n| `mutableCopy()` | 返回一个\
  \ `NSMutableArray` 实例，该实例允许修改 |\n\n这些方法代表了 Swift 处理可变和不可变数组的方式（通过使用 `let` 和 `var`\
  \ 关键字来处理）与 Cocoa 和 Objective-C 所采取的方法之间的冲突。清单 5-18 展示了如何通过调用 `mutableCopy` 方法来创建\
  \ `NSMutableArray` 对象的克隆，从而生成另一个 `NSMutableArray` 作为克隆体。\n\n**清单 5-18.** 在 NSArray.playground\
  \ 文件中克隆一个 Cocoa 数组\n\n```\n...\nvar data = NSMutableArray(objects: 10, \"iOS\",\
  \ Person(name:\"Joe\", country:\"USA\"));\nvar copiedData = data.mutableCopy() as\
  \ NSArray;\n...\n```\n\n克隆操作的效果是，我得到了两个独立的 `NSMutableArray` 对象。数组的内容被浅拷贝，这意味着值类型被复制，但两个数组都引用同一个\
  \ `Person` 对象，这可以从控制台输出中看到。\n\n```\nIdentity: false\n0: 10 1: iOS 2: Alice\n```\n\
  \n\n\n### 创建 Cocoa 数组的深拷贝\n\n`NSArray` 和 `NSMutableArray` 类定义了复制构造器，用于复制数组，并可选地对原型数组的内容执行深拷贝。尽管我在描述原型模式潜在陷阱时建议不要使用复制构造器，但它们是\
  \ Objective-C 的常见技术，你会在关键的 Cocoa 类中找到它们。`代码清单 5-19` 展示了如何在 `NSArray.playground`\
  \ 文件中对数据数组执行深拷贝。\n\n**代码清单 5-19.** 在 `NSArray.playground` 文件中执行深拷贝\n\n```\nvar data\
  \ = NSMutableArray(objects: 10, \"iOS\", Person(name:\"Joe\", country:\"USA\"));\n\
  var copiedData = NSMutableArray(array: data, copyItems: true);\n```\n\n复制构造器的参数包括原型数组和一个\
  \ `Bool` 值，该值指定是否克隆实现了 `NSCopyable` 协议的对象。我将 `copyItems` 参数指定为 `true`，这确保每个数组最终都包含一个独立的\
  \ `Person` 对象，控制台输出已证实了这一点。\n\n`Identity: false`\n\n`0: 10 1: iOS 2: Joe`\n\n##\
  \ 单层深拷贝与 `NSCoding` 协议\n\n我在表 5-2 中描述的 `copy` 和 `mutableCopy` 方法执行的是顶层深拷贝，这意味着数组类只负责克隆其包含的对象，而不处理嵌套对象。一些程序员并不认为这是真正的深拷贝，因为它不会克隆数组可能引用的任何对象。作为一种替代方案，你有时会看到推荐使用\
  \ `NSCoding` 协议，该协议确实能强制进行完整的深拷贝。\n\n这里有两个陷阱。首先，`NSCoding` 协议负责对象的序列化和反序列化，用它来实现原型模式是一种开销很大的操作——原型需要被渲染成序列化形式，然后恢复并赋值给一个新变量。对于具有大量嵌套引用的大型复杂对象来说，这是一项繁重的工作。\n\
  \n更严重的问题是，使用 `NSCoding` 假定执行深拷贝的程序员比编写原始类的程序员更了解对象的结构、用途和实现。强制深拷贝通常是一个坏主意，因为被序列化的对象的私有实现可能依赖于共享引用，当创建独立的实例时，这可能会导致奇怪且意想不到的缺陷。\n\
  \n我的建议是，相信你所克隆对象的 `copyWithZone` 方法的实现，将其作为关于对象应如何克隆的权威知识来源，并避免在没有充分理由和大量测试的情况下强加自己的观点。\n\
  \n## 使用 `NSCopying` 属性特性\n\nSwift 支持通过用特性修饰属性来改变其行为。其中一种特性是 `@NSCopying`，它可以应用于任何存储属性，以合成一个设置器，该设置器会为派生自\
  \ `NSObject` 并实现了 `NSCopying` 协议的对象调用 `copy` 方法。用于调用属性设置器的值被视为原型，并被克隆以获得要存储的值。`代码清单\
  \ 5-20` 显示了 `NSCopyingAttribute.playground` 文件的内容，我创建该文件是为了进行演示。\n\n**代码清单 5-20.**\
  \ `NSCopyingAttribute.playground` 文件的内容\n\n```\nimport Foundation\n\nclass LogItem\
  \ {\n\n    var from:String?;\n    @NSCopying var data:NSArray?\n}\n\nvar dataArray\
  \ = NSMutableArray(array: [1, 2, 3, 4]);\nvar logitem = LogItem()\nlogitem.from\
  \ = \"Alice\";\nlogitem.data = dataArray;\ndataArray[1] = 10;\nprintln(\"Value:\
  \ \\(logitem.data![1])\");\n```\n\n在这个示例中，我定义了一个名为 `LogItem` 的类，它包含可选的 `from` 和\
  \ `data` 变量。我对 `data` 变量应用了 `@NSCopying` 特性，这样当设置属性时，数组值会被浅拷贝。\n\n为了演示设置属性时数组被拷贝，我创建了一个\
  \ `NSMutableArray` 对象，用它来设置 `LogItem` 对象的 `data` 属性。然后我修改了数组中的一个元素，并打印出赋给 `LogItem`\
  \ 对象 `data` 属性的数组中对应的值。Playground 产生以下控制台输出，证实已应用原型模式且数组已被拷贝：\n\n`Value: 2`\n\n\
  `@NSCopying` 特性存在一些限制。首先，在初始化期间设置的值不会被克隆，这就是为什么我将 `LogItem` 类的 `data` 属性定义为可选类型，这样就不必在初始化器中为它们设置值。\n\
  \n另一个限制是，即使对象支持 `mutableCopy` 方法，`@NSCopying` 特性也会调用 `copy` 方法。这意味着当我将 `NSMutableArray`\
  \ 对象赋给 `LogItem` 方法的 `data` 属性时，它被转换成了不可变的 `NSArray` 对象，从而阻止我执行进一步的修改。\n\n## 将模式应用于\
  \ SportsStore 应用\n\n在本节中，我将把原型模式应用于 SportsStore 应用，以便将模式置于更广泛的上下文中。我将对我之前介绍的其中一个类进行变体设计，用于记录对\
  \ `Product` 对象的更改，方法是在调试控制台写入一条消息。\n\n### 准备示例应用\n\n本章无需任何准备，我将直接接着 第 4 章 结束的地方继续讲解\
  \ SportsStore 应用。\n\n> **提示**  \n> 你可以从 [`Apress.com`](https://Apress.com) 下载 SportsStore\
  \ 项目，以及本书的所有源代码。\n\n\n\n### 在 Product 类中实现 NSCopying\n\n第一步是更新我在第 4 章中创建的 `Product`\
  \ 类，使其能够被克隆。为此，我必须将基类设置为 `NSObject` 并实现 `NSCopying` 协议，但有一些棘手的问题需要处理，如代码清单 5-21\
  \ 所示。\n\n**代码清单 5-21.** 在 `Product.swift` 文件中实现 `NSCopying` 协议\n\n```\nimport Foundation\n\
  \nclass Product : NSObject, NSCopying {\n\n    private(set) var name:String;\n \
  \   private(set) var productDescription:String;\n    private(set) var category:String;\n\
  \    private var stockLevelBackingValue:Int = 0;\n    private var priceBackingValue:Double\
  \ = 0;\n\n    init(name:String, description:String, category:String, price:Double,\n\
  \        stockLevel:Int) {\n        self.name = name;\n        self.productDescription\
  \ = description;\n        self.category = category;\n        super.init();\n   \
  \     self.price = price;\n        self.stockLevel = stockLevel;\n    }\n\n    var\
  \ stockLevel:Int {\n        get { return stockLevelBackingValue;}\n        set {\
  \ stockLevelBackingValue = max(0, newValue);}\n    }\n\n    private(set) var price:Double\
  \ {\n        get { return priceBackingValue;}\n        set { priceBackingValue =\
  \ max(1, newValue);}\n    }\n\n    var stockValue:Double {\n        get {\n    \
  \        return price * Double(stockLevel);\n        }\n    }\n\n    func copyWithZone(zone:\
  \ NSZone) -> AnyObject {\n        return Product(name: self.name, description: self.description,\n\
  \            category: self.category, price: self.price,\n            stockLevel:\
  \ self.stockLevel);\n    }\n}\n```\n\n代码清单 5-21 中的修改凸显了当对现有类回溯性地添加克隆支持时，会出现的两个常见问题。第一个问题是，我不得不更改描述产品的存储属性名称，因为\
  \ `NSObject` 类定义了一个名为 `description` 的方法。我按如下方式更改了属性名称：\n\n```\n...\nprivate(set)\
  \ var productDescription :String;\n...\n```\n\n我在应用中尚未使用过这个属性，因此无需额外修改。在实际应用中，则需要进行一些明智的重构。这并非世界末日，但最好在开发过程中尽早应用原型模式，以避免此类问题。\n\
  \n第二个问题也是由基类改为 `NSObject` 引起的。子类的初始化器会调用其父类的初始化器，但这必须在存储属性设置完成之后、计算属性使用之前进行。正是出于这个原因，我在\
  \ `Product` 类的初始化器中间调用了 `super.init`。\n\n### 创建 Logger 类\n\n我需要一种方法来跟踪应用中对 `Product`\
  \ 对象所做的更改。我添加了一个名为 `Logger.swift` 的文件到项目中，其内容如代码清单 5-22 所示。\n\n**代码清单 5-22.** `Logger.swift`\
  \ 文件的内容\n\n```\nimport Foundation\n\nclass Logger<T where T:NSObject, T:NSCopying>\
  \ {\n    var dataItems:[T] = [];\n    var callback:(T) -> Void;\n\n    init(callback:T\
  \ -> Void) {\n        self.callback = callback;\n    }\n\n    func logItem(item:T)\
  \ {\n        dataItems.append(item.copy() as T);\n        callback(item);\n    }\n\
  \n    func processItems(callback:T -> Void) {\n        for item in dataItems {\n\
  \            callback(item);\n        }\n    }\n}\n```\n\n这是我在“实现原型模式”一节中使用的类的泛型版本。我对泛型类型参数施加了一个约束，确保\
  \ `Logger` 类只能用于存储那些继承自 `NSObject` 并实现了 `NSCopying` 协议的对象。`Logger` 类定义了一个初始化器，它接受一个回调函数，当新项目被记录时，该函数会接收这些新项目。这让我能够以一种简单直接的方式分发新项目的详细信息，但在第\
  \ 22 章介绍观察者模式时，我将演示一种更好的方法。\n\n### 在视图控制器中记录更改\n\n现在，我可以通过创建 `Logger` 类的实例，并在用户指定不同的库存水平时用它来存储\
  \ `Product` 对象，从而记录更改。由于我仍在使用一个结构松散的应用，这些更改将进入 `ViewController.swift` 文件，如代码清单 5-23\
  \ 所示（为了简洁起见，我从清单中省略了该文件的大量内容，因为更改虽小，但散布在整个文件中）。我作为 `Logger` 初始化器参数提供的回调函数，会输出发生更改的产品的名称和库存水平。\n\
  \n**代码清单 5-23.** 在 `ViewController.swift` 文件中记录产品更改\n\n```\nimport UIKit\n\n// ...为简洁起见，省略了\
  \ ProductTableCell 类...\n\nvar handler = { (p:Product) in\n    println(\"Change:\
  \ \\(p.name) \\(p.stockLevel) items in stock\");\n};\n\nclass ViewController: UIViewController,\
  \ UITableViewDataSource {\n    @IBOutlet weak var totalStockLabel: UILabel!\n  \
  \  @IBOutlet weak var tableView: UITableView!\n    let logger = Logger<Product>(callback:\
  \ handler);\n\n    var products = [\n        Product(name:\"Kayak\", description:\"\
  A boat for one person\",\n            category:\"Watersports\", price:275.0, stockLevel:10),\n\
  \        // ...为简洁起见，省略了其他产品...\n        Product(name:\"Bling-Bling King\",\n  \
  \          description:\"Gold-plated, diamond-studded King\",\n            category:\"\
  Chess\", price:1200.0, stockLevel:4)];\n\n    // ...为简洁起见，省略了方法...\n\n    func tableView(tableView:\
  \ UITableView,\n        cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell\
  \ {\n        let product = products[indexPath.row];\n        let cell = tableView.dequeueReusableCellWithIdentifier(\"\
  ProductCell\")\n            as ProductTableCell;\n        cell.product = products[indexPath.row];\n\
  \        cell.nameLabel.text = product.name;\n        cell.descriptionLabel.text\
  \ = product.productDescription;\n        cell.stockStepper.value = Double(product.stockLevel);\n\
  \        cell.stockField.text = String(product.stockLevel);\n        return cell;\n\
  \    }\n\n    @IBAction func stockLevelDidChange(sender: AnyObject) {\n        if\
  \ var currentCell = sender as? UIView {\n            while (true) {\n          \
  \      currentCell = currentCell.superview!;\n                if let cell = currentCell\
  \ as? ProductTableCell {\n                    if let product = cell.product? {\n\
  \                        if let stepper = sender as? UIStepper {\n             \
  \               product.stockLevel = Int(stepper.value);\n                     \
  \   } else if let textfield = sender as? UITextField {\n                       \
  \     if let newValue = textfield.text.toInt()? {\n                            \
  \    product.stockLevel = newValue;\n                            }\n           \
  \             }\n                        cell.stockStepper.value = Double(product.stockLevel);\n\
  \                        cell.stockField.text = String(product.stockLevel);\n  \
  \                      logger.logItem(product);\n                    }\n       \
  \             break;\n                }\n            }\n            displayStockTotal();\n\
  \        }\n    }\n}\n// ...为简洁起见，省略了方法...\n```\n\n> **注意**\n>\n> 在代码清单 5-23 中，我将回调闭包定义在了\
  \ `ViewController` 类之外。在我撰写本文时，Swift 编译器存在一个错误，不允许以内联方式定义这种闭包。\n\n\n\n#### 测试更改\n\
  \n剩下的工作就是测试这些更改。启动应用，并对显示的商品库存数量进行修改。每次修改后，你都会在 Xcode 调试控制台中看到类似如下的消息：\n\n`Change:\
  \ Kayak 11 items in stock`\n\n`Change: Lifejacket 15 items in stock`\n\n`Change:\
  \ Soccer Ball 31 items in stock`\n\n`Change: Corner Flags 2 items in stock`\n\n\
  值得花点时间思考一下我所做的更改带来的影响。创建通用 `Logger` 类的挑战在于，它接收的对象将来可能会发生变化，但通过实现原型模式，`Logger` 类能够在不了解对象本质（除了它们的基类以及——隐含地——它们对\
  \ `NSCopying` 协议的实现）的情况下创建克隆。\n\n**提示**：如果控制台不可见，请从 Xcode 的 **View** 菜单中选择 **Debug\
  \ Area ➤ Activate Console**。\n\n将对象的复制操作与其定义类解耦，意味着我可以修改 `Product` 的初始化器，或者创建并使用其子类，而无需在\
  \ `Logger` 类中进行相应的更改。总体效果是简化了应用中的代码，并使其更易于扩展和长期维护。\n\n## 总结\n\n在本章中，我描述了原型模式，并演示了如何利用它在不了解对象定义类的情况下创建新对象。我解释了对象如何进行深拷贝和浅拷贝，并阐述了与此过程相关的最常见陷阱。在下一章中，我将描述单例模式，该模式确保应用中仅存在给定类型的单个对象。\n\
  \n"
- "# 6. 单例模式\n\n本章我将介绍单例模式，该模式确保应用中仅存在给定类型的单个对象。这是最常用的设计模式之一，因为它能解决经常出现的问题——要么是需要一个对象来表示真实世界的资源，要么是希望确保所有特定类型的活动（例如日志记录）都以一致的方式处理。表\
  \ 6-1 将单例模式置于上下文中。\n\n**表 6-1. 单例模式上下文**\n\n| 问题 | 答案 |\n| --- | --- |\n| 这是什么？\
  \ | 单例模式确保应用中仅存在给定类型的单个对象。 |\n| 有什么好处？ | 单例模式可用于管理表示真实世界资源的对象，或封装共享资源。 |\n| 何时应使用此模式？\
  \ | 当创建更多对象并不会增加可用的真实世界资源数量，或者当您希望整合某项活动（如日志记录）时，应使用单例模式。 |\n| 何时应避免此模式？ | 如果没有多个组件需要访问共享资源，或者应用中没有表示真实世界资源的对象，则单例模式用处不大。\
  \ |\n| 如何判断是否正确实现了该模式？ | 当给定类型只有一个实例，并且该实例不能被复制和克隆，也无法创建更多实例时，就表明正确实现了该模式。 |\n|\
  \ 是否存在常见陷阱？ | 主要陷阱是使用了引用类型（可被复制）或实现了 `NSCopying` 协议（可被克隆）的类。单例模式通常需要针对并发使用采取一些保护措施，这是问题的常见来源。\
  \ |\n| 是否有相关模式？ | 对象池模式（我将在第 7 章中描述）管理固定数量的对象，而不是单例模式处理的单个对象。 |\n\n## 准备示例项目\n\n\
  我为本章创建了一个名为 `Singleton` 的 OS X 命令行工具项目，遵循了我在第 2 章中描述的相同流程。无需进一步准备。\n\n## 理解模式解决的问题\n\
  \n单例模式确保给定类型仅存在一个对象，并且所有依赖该对象的组件都使用同一个实例。这与我在第 5 章中描述的原型模式不同，该模式使得复制对象变得容易。相比之下，单例模式只允许存在一个对象，并阻止其被复制。\n\
  \n单例模式解决的问题出现在您拥有一个不希望在整个应用中被复制的对象时，要么因为它代表真实世界的资源（如打印机或服务器），要么因为您希望将一组相关活动整合到一处。对于真实世界的资源来说，能够创建新的代表打印机或服务器的对象是毫无意义的，因为创建对象并不能神奇地添加新的硬件设备。\n\
  \n即使对于更抽象的表达，能够创建多个对象也可能成为问题。清单 6-1 显示了 `BackupServer.swift` 文件的内容，我已将其添加到 `Singleton`\
  \ 项目中。\n\n**清单 6-1. BackupServer.swift 文件的内容**\n\n```\nimport Foundation\n\nclass\
  \ DataItem {\n\n    enum ItemType : String {\n        case Email = \"Email Address\"\
  ;\n        case Phone = \"Telephone Number\";\n        case Card = \"Credit Card\
  \ Number\";\n    }\n\n    var type:ItemType;\n    var data:String;\n\n    init(type:ItemType,\
  \ data:String) {\n        self.type = type; self.data = data;\n    }\n}\n\nclass\
  \ BackupServer {\n    let name:String;\n    private var data = [DataItem]();\n\n\
  \    init(name:String) {\n        self.name = name;\n    }\n\n    func backup(item:DataItem)\
  \ {\n        data.append(item);\n    }\n\n    func getData() -> [DataItem]{\n  \
  \      return data;\n    }\n}\n```\n\n我定义了一个 `BackupServer` 类，用于表示归档数据项的服务器，数据项由\
  \ `DataItem` 类的实例表示。我无需深入探讨创建归档的细节来演示单例模式，因此 `BackupServer` 类定义的 `backup` 方法只是将其\
  \ `DataItem` 对象追加到一个名为 `data` 的存储实例属性中，该属性稍后可以通过 `getData` 方法访问。在清单 6-2 中，您可以看到我如何修改\
  \ `main.swift` 文件以使用 `BackupServer` 类。\n\n**清单 6-2. 在 main.swift 文件中使用 BackupServer\
  \ 类**\n\n```\nvar server = BackupServer(name:\"Server#1\");\nserver.backup(DataItem(type:\
  \ DataItem.ItemType.Email, data: \"joe@example.com\"));\nserver.backup(DataItem(type:\
  \ DataItem.ItemType.Phone, data: \"555-123-1133\"));\nvar otherServer = BackupServer(name:\"\
  Server#2\");\notherServer.backup(DataItem(type: DataItem.ItemType.Email, data: \"\
  bob@example.com\"));\n```\n\n项目中的代码可以编译并执行，但这在实际中没有任何意义。如果 `BackupServer` 对象的目的是代表一个真实的备份服务器，那么任何人都可以创建一个新对象并开始调用\
  \ `backup` 方法，这又意味着什么呢？真实服务器不会仅仅因为程序员创建了一个新对象就被配置好（尽管我承认我喜欢这种说法），因此结果是清单 6-2 中备份的部分数据不会到达真实的服务器，也就不会被备份。即使在云服务器的世界里，创建一个新的服务器实例通常也需要比实例化一个新的\
  \ Swift 对象更多的工作。\n\n换句话说，清单 6-2 中的代码没有意义，因为代表真实世界服务器的对象只有在与一个已存在并预先配置好的服务器关联时才能工作——这意味着需要仔细控制与真实服务器对应对象的创建，并防止创建任何其他实例。\n\
  \n**提示**：目前示例项目没有产生任何输出。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，对给定的英文文本进行翻译。\n\
  \n\n## 理解共享资源封装问题\n\n并非所有能从单例模式中获益的对象都代表现实世界中的实体。有时，您会希望创建一个能够被应用程序中所有组件以简单一致的方式使用的对象。为了演示这一点，清单\
  \ 6-3 展示了`Logger.swift`文件的内容，我已将该文件添加到示例项目中。\n\n**清单 6-3.** `Logger.swift` 文件的内容\n\
  \n```\nclass Logger {\n\n    private var data = [String]()\n\n    func log(msg:String)\
  \ {\n        data.append(msg);\n    }\n\n    func printLog() {\n        for msg\
  \ in data {\n            println(\"Log: \\(msg)\");\n        }\n    }\n}\n```\n\n\
  这是一个简单的日志类，我常用它来调试自己项目中的问题。我喜欢像 Xcode 自带的现代调试器，但我也常常回归到这类传统技巧，因为仅通过观察消息在控制台中出现的顺序就能学到很多东西。\n\
  \n`Logger` 类定义了一个 `log(msg:)` 方法，该方法接收 `String` 类型的消息参数并将其追加到一个数组中。调用 `printLog()`\
  \ 方法来显示这些消息，该方法通过调用全局函数 `println()` 来实现。清单 6-4 展示了我是如何更新 `main.swift` 文件，以记录我所备份的数据项的详细信息。\n\
  \n**清单 6-4.** 在 `main.swift` 文件中使用 `Logger` 类\n\n```\nlet logger = Logger();\nvar\
  \ server = BackupServer(name:\"Server#1\");\nserver.backup(DataItem(type: DataItem.ItemType.Email,\
  \ data: \"joe@example.com\"));\nserver.backup(DataItem(type: DataItem.ItemType.Phone,\
  \ data: \"555-123-1133\"));\nlogger.log(\"Backed up 2 items to \\(server.name)\"\
  );\nvar otherServer = BackupServer(name:\"Server#2\");\notherServer.backup(DataItem(type:\
  \ DataItem.ItemType.Email, data: \"bob@example.com\"));\nlogger.log(\"Backed up\
  \ 1 item to \\(otherServer.name)\");\nlogger.printLog();\n```\n\n如果您运行该应用程序，您将在控制台中看到以下输出：\n\
  \n```\nLog: Backed up 2 items to Server#1\nLog: Backed up 1 item to Server#2\n```\n\
  \n一切都按预期工作：我使用 `Logger` 类的本地实例记录了一些调试消息，并在备份完所有数据后调用 `printLog()` 方法来输出这些消息。当我想在\
  \ `BackupServer` 类中也记录一些调试消息时，问题就出现了，如清单 6-5 所示。\n\n**清单 6-5.** 在 `BackupServer.swift`\
  \ 文件中添加日志记录\n\n```\n...\nclass BackupServer {\n    let name:String;\n    private\
  \ var data = [DataItem]();\n    let logger = Logger();\n\n    init(name:String)\
  \ {\n        self.name = name;\n        logger.log(\"Created new server \\(name)\"\
  );\n    }\n\n    func backup(item:DataItem) {\n        data.append(item);\n    \
  \    logger.log(\"\\(name) backed up item of type \\(item.type.rawValue)\");\n \
  \   }\n\n    func getData() -> [DataItem]{\n        return data;\n    }\n}\n...\n\
  ```\n\n现在有两个 `Logger` 对象，每个对象都维护着一组消息。在 `main.swift` 文件中，我调用 `Logger` 对象的 `printLog()`\
  \ 方法时，并不会打印出记录在 `BackupServer` 类中的消息。我需要的是一个单一的 `Logger` 对象，用于捕获应用程序中所有的调试消息，并且需要一种方法让应用程序组件能够定位到这个\
  \ `Logger` 对象，而无需创建紧密耦合——这就是所谓的封装共享资源。\n\n## 理解单例模式\n\n单例模式通过确保应用程序中一个类只有一个实例，来解决现实世界对象和共享资源封装这两个问题。这个对象（称为单例）在其所有需要其功能的组件之间共享，如图\
  \ 6-1 所示。\n\n![A978-1-4842-0394-1_6_Fig1_HTML.jpg](img/A978-1-4842-0394-1_6_Fig1_HTML.jpg)\n\
  \n**图 6-1.** 单例模式\n\n这个图看起来很简单，但单例模式很特别，因为它的实现与所使用的编程语言紧密相关。Swift 不具备某些用于在 C# 和\
  \ Java 等语言中实现该模式的功能，因此需要一些巧思。\n\n## 实现单例模式\n\n在实现单例模式时，需要遵循一些重要的规则：\n\n-   单例必须是其类型的唯一存在实例。\n\
  -   单例不能被其他对象替换，即使是相同类型的对象也不行。\n-   需要使用单例的组件必须能够定位到它。\n\n单例永远不能有多个实例，这要么是因为该对象代表了现实世界的资源，要么是因为您希望将所有活动（例如日志记录）都通过同一个对象来集中处理。在接下来的章节中，我将描述如何在\
  \ Swift 中实现单例模式。\n\n**注意**\n\n单例模式仅适用于引用类型，这意味着只有类才支持。结构体和其他值类型无效，因为它们在赋值给新变量时会被复制。复制引用类型的唯一方法是通过其初始化器创建新实例，或者依赖它实现\
  \ `NSCopying` 协议。详情请参见第 5 章。\n\n\n\n### 快速单例实现\n\n实现单例最快捷的方式是使用 Swift 全局常量。全局常量具备一些有用的特性，这些特性为遵循我在上一节中列出的规则奠定了基础。代码清单\
  \ 6-6 展示了如何在 `Logger.swift` 文件中基于全局常量来实现单例模式。\n\n**代码清单 6-6.** 在 `Logger.swift`\
  \ 文件中实现单例模式\n\n```\nlet globalLogger = Logger();\n\nfinal class Logger {\n    private\
  \ var data = [String]()\n\n    private init() {\n        // 什么也不做——用于阻止其他文件中的代码创建实例\n\
  \    }\n\n    func log(msg:String) {\n        data.append(msg);\n    }\n\n    func\
  \ printLog() {\n        for msg in data {\n            println(\"Log: \\(msg)\"\
  );\n        }\n    }\n}\n```\n\n我做的第一个改动是定义了一个名为 `globalLogger` 的全局常量。这看起来可能没什么大不了的，但\
  \ Swift 语言对全局常量和变量做出了两项保证：它们会被**延迟初始化**，并且这种延迟初始化是**线程安全**的。这些保证意味着，单例对象只有在首次读取\
  \ `globalLogger` 常量的值时才被创建，并且在读取时，即使另一个线程在单例初始化期间尝试读取该值，也只会实例化出 `Logger` 类的单个实例。\n\
  \n我在代码清单 6-6 中做的其他改动是针对 `Logger` 类的。我将该类标记为 `final` ，以防止定义子类，并将初始化器标记为 `private`\
  \ ，这样就不能从 `Logger.swift` 文件外部创建实例了。定义好单例并保护其类以防止创建其他实例之后，我就可以更新 `BackupServer` 类了，如代码清单\
  \ 6-7 所示。\n\n**代码清单 6-7.** 在 `BackupServer.swift` 文件中使用单例\n\n```\n...\nclass BackupServer\
  \ {\n    let name:String;\n    private var data = [DataItem]();\n\n    init(name:String)\
  \ {\n        self.name = name;\n        globalLogger.log(\"Created new server \\\
  (name)\");\n    }\n\n    func backup(item:DataItem) {\n        data.append(item);\n\
  \        globalLogger.log(\"\\(name) backed up item of type \\(item.type.rawValue)\"\
  );\n    }\n\n    func getData() -> [DataItem]{\n        return data;\n    }\n}\n\
  ...\n```\n\n我移除了本地的 `Logger` 对象，并添加了对单例的 `log` 方法的调用。我在上一节中列出的最后一条规则是，组件应该能够定位到单例，而正如你所见，使用全局常量使得这一过程变得非常简单。\n\
  \n> **提示：** 这种实现方式也遵循了其他规则。私有初始化器和延迟初始化确保了 `Logger` 类只有一个实例，而使用常量意味着 `globalLogger`\
  \ 所引用的对象**不能被**更改。\n\n我还需要对 `main.swift` 文件进行修改，如代码清单 6-8 所示。\n\n**代码清单 6-8.** 在\
  \ `main.swift` 文件中使用单例\n\n```\nvar server = BackupServer(name:\"Server#1\");\nserver.backup(DataItem(type:\
  \ DataItem.ItemType.Email, data: \"joe@example.com\"));\nserver.backup(DataItem(type:\
  \ DataItem.ItemType.Phone, data: \"555-123-1133\"));\nglobalLogger.log(\"Backed\
  \ up 2 items to \\(server.name)\");\n\nvar otherServer = BackupServer(name:\"Server#2\"\
  );\notherServer.backup(DataItem(type: DataItem.ItemType.Email, data: \"bob@example.com\"\
  ));\nglobalLogger.log(\"Backed up 1 item to \\(otherServer.name)\");\n\nglobalLogger.printLog();\n\
  ```\n\n如果你运行该应用程序，你会看到单例模式让我能够收集所有的日志消息并将它们写入控制台。\n\n```\nLog: Created new server\
  \ Server#1\nLog: Server#1 backed up item of type Email Address\nLog: Server#1 backed\
  \ up item of type Telephone Number\nLog: Backed up 2 items to Server#1\nLog: Created\
  \ new server Server#2\nLog: Server#2 backed up item of type Email Address\nLog:\
  \ Backed up 1 item to Server#2\n```\n\n### 创建传统的单例实现\n\n使用全局变量效果很好，但如果你是从 C# 或 Java\
  \ 转到 Swift，你可能会习惯于通过其类来访问单例的约定。问题在于 Swift 不支持类型存储属性，因此需要一些巧思才能以传统方式应用单例模式。代码清单 6-9\
  \ 展示了如何使用带有静态属性的结构体来解决这个问题。\n\n**代码清单 6-9.** 在 `BackupServer.swift` 文件中实现单例模式\n\n\
  ```\n...\nfinal class BackupServer {\n    let name:String;\n    private var data\
  \ = [DataItem]();\n\n    private init(name:String) {\n        self.name = name;\n\
  \        globalLogger.log(\"Created new server \\(name)\");\n    }\n\n    func backup(item:DataItem)\
  \ {\n        data.append(item);\n        globalLogger.log(\"\\(name) backed up item\
  \ of type \\(item.type.rawValue)\");\n    }\n\n    func getData() -> [DataItem]{\n\
  \        return data;\n    }\n\n    class var server:BackupServer {\n        struct\
  \ SingletonWrapper {\n            static let singleton = BackupServer(name:\"MainServer\"\
  );\n        }\n        return SingletonWrapper.singleton;\n    }\n}\n...\n```\n\n\
  > **注意：** 在全局常量和嵌套结构体之间做选择是个人喜好问题。我喜欢全局变量的简洁性，但多年的 Java 和 C# 开发经验让我对嵌套结构体感觉更舒适。如果你确实使用全局常量，那么请确保在整个应用程序中使用明确且一致的命名约定。\n\
  \n在计算类型属性 `server` 内部，我定义了一个名为 `SingletonWrapper` 的结构体，它有一个名为 `singleton` 的静态存储属性。我创建了单例\
  \ `BackupServer` 对象并将其赋值给 `singleton` 属性。最后，我返回 `singleton` 属性的值作为 `server` 属性的值。\n\
  \n如果你一时没看懂上一句话，别担心。这项技术依赖于 Swift 处理 `struct` 定义和静态存储属性的方式，以确保只创建 `BackupServer`\
  \ 类的一个实例，尽管这段代码有点烧脑。\n\n要访问该单例，我读取了 `BackupServer.server` 属性的值，如代码清单 6-10 所示。\n\n\
  **代码清单 6-10.** 在 `main.swift` 文件中使用单例\n\n```\nvar server = BackupServer.server;\n\
  server.backup(DataItem(type: DataItem.ItemType.Email, data: \"joe@example.com\"\
  ));\nserver.backup(DataItem(type: DataItem.ItemType.Phone, data: \"555-123-1133\"\
  ));\nglobalLogger.log(\"Backed up 2 items to \\(server.name)\");\n\nvar otherServer\
  \ = BackupServer.server;\notherServer.backup(DataItem(type: DataItem.ItemType.Email,\
  \ data: \"bob@example.com\"));\nglobalLogger.log(\"Backed up 1 item to \\(otherServer.name)\"\
  );\n\nglobalLogger.printLog();\n```\n\n代码清单中的 `server` 和 `otherServer` 变量都引用同一个单例，这意味着所有的\
  \ `DataItem` 对象都被发送到了同一台服务器。\n\n\n\n### 处理并发问题\n\n如果在多线程应用中使用单例，就需要仔细思考不同组件同时对单例执行操作会带来什么后果，并确保能防范任何潜在问题。\n\
  \n**警告**  \n高效的并发编程需要深思熟虑和丰富的经验。人们往往怀着美好的初衷开始，最终却得到一个运行缓慢甚至卡死的应用。在着手多线程项目之前，请花时间学习并发编程的基础概念，并给自己留出足够的开发时间来编写正确代码并进行全面测试。\n\
  \n潜在的并发问题很常见，就连我简单的 `Logger` 和 `BackupServer` 类也存在这些问题，因为 Swift 的数组并非线程安全。这意味着两个或更多线程可能同时调用数组的\
  \ `append` 方法，从而破坏数据结构。为了演示该问题，我对 `main.swift` 文件做了一些修改，如代码清单 6-11 所示。\n\n**代码清单\
  \ 6-11.** 在 `main.swift` 文件中执行并发请求\n\n```\nimport Foundation\n\nvar server = BackupServer.server;\n\
  \nlet queue = dispatch_queue_create(\"workQueue\", DISPATCH_QUEUE_CONCURRENT);\n\
  \nlet group = dispatch_group_create();\n\nfor count in 0 ..< 100 {\n\n    dispatch_group_async(group,\
  \ queue, {() in\n\n        BackupServer.server.backup(DataItem(type: DataItem.ItemType.Email,\n\
  \n            data: \"bob@example.com\"))\n\n    });\n\n}\n\ndispatch_group_wait(group,\
  \ DISPATCH_TIME_FOREVER);\n\nprintln(\"\\(server.getData().count) items were backed\
  \ up\");\n```\n\n此代码清单使用 Grand Central Dispatch (GCD) 异步调用 `BackupServer` 单例的 `backup`\
  \ 方法 100 次。如果你不熟悉 GCD，可参阅“理解 Grand Central Dispatch”边栏，其中简要解释了本清单及后续清单中的代码。本章中有多处\
  \ GCD 边栏，我在本书中大量使用 GCD 来实现在多种模式。我会解释我所用的每个功能的工作原理，但不会深入细节，因为并发编程（包括 GCD）超出了本书的讨论范围。GCD\
  \ 的完整细节请参见 [`developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html`](https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html)。\n\
  \n**理解 GRAND CENTRAL DISPATCH：第 1 部分**\n\nCocoa 并发编程有多种技术可用，但我在本书中使用的是 Grand Central\
  \ Dispatch，我认为它是最容易使用的。并发编程是一个高级主题，我不会详细描述 GCD，但会简要说明我在本章示例中如何使用 GCD。有关 GCD 的更多信息，请参见\
  \ [`developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html`](https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html)。\n\
  \nGCD 是 `Foundation` 框架的标准组成部分，其核心思想是块队列，每个块执行一些工作。你选择或创建一个队列，然后创建表示并发任务的块（以 Swift\
  \ 闭包形式表示）。GCD 是一个 C API，语法并不特别像 Swift，但一旦掌握其要领，使用起来就很简单。在代码清单 6-11 中，我像这样创建了一个新队列：\n\
  \n```\nlet queue = dispatch_queue_create(\"workQueue\", DISPATCH_QUEUE_CONCURRENT);\n\
  ```\n\n`dispatch_queue_create` 函数接受两个参数，用于设置队列的名称和类型。我将队列命名为 `workQueue`，并使用 `DISPATCH_QUEUE_CONCURRENT`\
  \ 常量指定队列中的块应由多个线程并发处理。我将表示队列的对象赋值给一个名为 `queue` 的常量。（队列类型是 `dispatch_queue_t`，你会在本章后面以及第\
  \ 7 章的示例中看到我使用它。）\n\n我可以将多个块分组，以便在所有块执行完毕时收到通知。使用 `dispatch_group_create` 函数创建组，如下所示：\n\
  \n```\nlet group = dispatch_group_create();\n```\n\n为了提交要异步执行的工作，我使用 `dispatch_group_async`\
  \ 函数将块添加到队列中，如下所示：\n\n```\ndispatch_group_async(group, queue, {() in\n\n    BackupServer.server.backup(DataItem(type:\
  \ DataItem.ItemType.Email,\n\n        data: \"bob@example.com\"))\n\n});\n```\n\n\
  第一个参数是该块关联的组，第二个参数是将要添加块的队列，最后一个参数是块本身，以闭包形式表示。该闭包不接受参数，也不返回结果。GCD 会从队列中取出每个工作块并异步执行——不过，正如你将了解到的，队列也可用于序列化工作。\n\
  \n最后一步是等待所有 100 个块完成，我像这样操作：\n\n```\ndispatch_group_wait(group, DISPATCH_TIME_FOREVER);\n\
  ```\n\n`dispatch_group_wait` 函数会阻塞当前线程，直到指定组中的所有块完成。第一个参数是要监听的组，第二个参数是等待的持续时间。通过使用\
  \ `DISPATCH_TIME_FOREVER` 值，我指定要无限期等待组中的块完成。\n\n要观察问题，只需启动应用程序。并发问题都与时机有关，需要两个或更多线程同时执行冲突操作。运行应用时你也许运气好，不会发生这样的冲突——但更可能的情况是，两次调用\
  \ `backup` 方法重叠，导致两个线程同时尝试通过 `append` 方法向数组添加数据，从而引发错误。发生这种情况时，调试器会在 `backup` 方法处中断，如图\
  \ 6-2 所示。\n\n**提示**  \n如果你幸运地没有遇到错误，请再次运行应用程序。许多因素会影响并发问题，但示例中的代码大多数时候都会失败。\n\n\
  ![A978-1-4842-0394-1_6_Fig2_HTML.jpg](img/A978-1-4842-0394-1_6_Fig2_HTML.jpg)\n\n\
  **图 6-2.** 并发问题\n\n调试器报告的具体错误可能不同，但问题是一样的：操作 Swift 数组的内容并非线程安全操作，使用数组的单例需要添加并发保护机制。\n\
  \n\n\n#### 序列化访问\n\n为了解决这个问题，我需要确保在同一时间只有一个代码块被允许调用数组的 `append` 方法。列表 6-12 展示了如何使用\
  \ GCD 来解决该问题。（我在第二个边栏“理解 Grand Central Dispatch：第二部分”中解释了我所使用的 GCD 特性。）\n\n**列表\
  \ 6-12.** 在 `BackupServer.swift` 文件中序列化对数组的访问\n\n```\nimport Foundation\n\nclass\
  \ DataItem {\n    enum ItemType : String {\n        case Email = \"Email Address\"\
  ;\n        case Phone = \"Telephone Number\";\n        case Card = \"Credit Card\
  \ Number\";\n    }\n    var type:ItemType;\n    var data:String;\n    init(type:ItemType,\
  \ data:String) {\n        self.type = type; self.data = data;\n    }\n}\n\nfinal\
  \ class BackupServer {\n    let name:String;\n    private var data = [DataItem]();\n\
  \    private let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
  \    private init(name:String) {\n        self.name = name;\n        globalLogger.log(\"\
  Created new server \\(name)\");\n    }\n    func backup(item:DataItem) {\n     \
  \   dispatch_sync(arrayQ, {() in\n            self.data.append(item);\n        \
  \    globalLogger.log(\n                \"\\(self.name) backed up item of type \\\
  (item.type.rawValue)\");\n        })\n    }\n    func getData() -> [DataItem]{\n\
  \        return data;\n    }\n    class var server:BackupServer {\n        struct\
  \ SingletonWrapper {\n            static let singleton = BackupServer(name:\"MainServer\"\
  );\n        }\n        return SingletonWrapper.singleton;\n    }\n}\n```\n\n在这个列表中，我执行了与列表\
  \ 6-11 相反的操作：我获取了一组异步块，并强制它们按顺序串行执行，以确保在任何时候只有一个块调用数组的 `append` 方法。\n\n这看起来可能有些自相矛盾，但在实际应用中，多个组件会创建这些块，而不是单个\
  \ `for` 循环。这些组件无法协调它们的活动，通常也不了解彼此，因此，单例模式就需要承担起保护其所依赖资源的责任。\n\n## 理解 Grand Central\
  \ Dispatch——第二部分\n\n在列表 6-12 中，我使用 `dispatch_queue_create` 函数创建了一个队列，如下所示：\n\n```\n\
  ...\nprivate let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
  ...\n```\n\n第一个参数是队列的名称，第二个参数——`DISPATCH_QUEUE_SERIAL` 值——指定了将从队列中取出块并逐一执行，也就是说，在前一个块完成之前，不会开始执行下一个块。\n\
  \n在 `backup` 方法中，我使用 `dispatch_sync` 函数将块添加到队列中。\n\n```\n...\ndispatch_sync(arrayQ,\
  \ {() in\n    self.data.append(item);\n    globalLogger.log(\n        \"\\(self.name)\
  \ backed up item of type \\(item.type.toRaw())\");\n})\n...\n```\n\n`dispatch_sync`\
  \ 函数与我在列表 6-11 中使用的 `dispatch_group_async` 函数一样，都会将工作添加到队列中，但它会等待块执行完毕后才返回，而 `dispatch_group_async`\
  \ 函数则会立即返回，将块留待将来某个时刻到达队列前端时再执行。（它也不指定组。`dispatch_sync` 的异步等价物是 `dispatch_async`。）\n\
  \n用于将块添加到方法中的函数并不影响块的执行方式——影响的只是函数在将块添加到队列后是立即返回，还是阻塞直到块被处理完毕。\n\n我所创造的效果是：调用 `backup`\
  \ 方法是一个同步操作，它只有在数据被添加到数组后才会返回，并且由于我指定了一个串行队列，这意味着该方法必须等到队列中所有排在前面的备份任务都处理完毕后才会返回。\n\
  \n我在列表 6-12 中所做的更改确保了 `BackupServer` 单例中使用的数组受到保护，但 `backup` 方法使用了 `Logger` 类，这同样带来了类似的问题。尽管对\
  \ `log` 方法的调用在 `BackupServer` 类内部是串行化的，但其他组件仍可能同时使用该单例并调用 `log` 方法，这将导致我之前描述的那类数据损坏。为了完整性，我使用\
  \ GCD 保护了 `Logger` 类中的数据数组，如列表 6-13 所示。\n\n**列表 6-13.** 在 `Logger.swift` 文件中添加并发保护\n\
  \n```\nimport Foundation;\n\nlet globalLogger = Logger();\n\nfinal class Logger\
  \ {\n    private var data = [String]()\n    private let arrayQ = dispatch_queue_create(\"\
  arrayQ\", DISPATCH_QUEUE_SERIAL);\n    private init() {\n        // do nothing -\
  \ required to stop instances being\n        // created by code in other files\n\
  \    }\n    func log(msg:String) {\n        dispatch_sync(arrayQ, {() in\n     \
  \       self.data.append(msg);\n        });\n    }\n    func printLog() {\n    \
  \    for msg in data {\n            println(\"Log: \\(msg)\");\n        }\n    }\n\
  }\n```\n\n`Logger` 类通过全局常量技术暴露其单例，但保护数据数组免遭损坏的技术是相同的——我创建了一个串行 GCD 队列，并使用 `dispatch_sync`\
  \ 方法确保数组修改操作一次只执行一个。如果你运行该应用程序，将不会出现数据损坏，控制台窗口会显示以下输出：\n\n```\n100 items were backed\
  \ up\n```\n\n## 理解单例模式的陷阱\n\n在实现单例模式时，有几个需要避免的陷阱，仔细考量你的实现以确保遵循本章前面描述的规则至关重要。在接下来的小节中，我将指出最常见的问题。\n\
  \n### 理解泄露陷阱\n\n实现单例时最常见的问题是产生一个可被复制的对象，这要么是因为它是由结构体（或内置引用类型之一）创建的，要么是因为它是由实现了 `NSCopying`\
  \ 协议（我在第 5 章中描述过）的类创建的。\n\n结构体不能作为单例工作，因为每当它们被赋给一个新变量或常量，或作为参数传递时，它们都会被复制。但你可能倾向于使用一个实现了\
  \ `NSCopying` 协议的类，因为你相信使用该单例的组件不会进行复制。我建议谨慎行事：其他开发者可能没有意识到不复制单例的重要性，你应该采取措施创建一个严格的模式实现。允许其他组件复制或克隆该原型会打破单例三条规则中的第一条。\n\
  \n> **提示：** 如果你无法控制需要作为单例的对象的类定义，可以使用装饰模式来防止对象被当作原型对待。详见第 14 章。\n\n### 理解共享代码文件陷阱\n\
  \nSwift 的访问保护关键字是在文件级别生效的，这意味着将 `private` 关键字应用于初始化器只影响包含该单例的文件之外的代码。你应该始终将单例和全局常量（如果你使用了的话）定义在它们自己的文件中，这样其他组件就无法创建单例类的自己的实例，这打破了单例的第一条规则。\n\
  \n### 理解并发陷阱\n\n单例模式中最棘手的问题与并发相关，即使对于经验丰富的程序员来说，这也可能是一个困难的主题。在接下来的小节中，我将描述最常见的问题。\n\
  \n\n\n#### 未应用并发保护\n\n第一个问题是在需要时未应用并发保护。并非每个单例都会面临并发问题，但这是你需要认真考虑的事情。如果你依赖于共享数据结构（如数组）或全局函数（如\
  \ `println`），那么就需要确保单例的代码不会被多个线程同时访问。如有疑问，应假定存在潜在问题，因为对共享资源的访问进行序列化所带来的开销，总比应用部署到客户手中后发生崩溃要小得多。\n\
  \n#### 一致地应用并发保护\n\n并发保护必须贯穿整个单例，这样所有操作公共资源（如数组）的代码才能以相同的方式被序列化。只要有一个方法或代码块在访问数组时未进行序列化，就可能面临两个线程冲突并破坏数据的风险。如果你发现很难追踪所有修改共享资源的代码，那么就应该重新考虑代码的设计，将资源以及操作它的代码提取到单独的类中，以便更集中地应用并发保护。\n\
  \n#### 错误的优化\n\n有一种普遍看法认为，像 GCD 这样的并发机制性能不佳，因此并发保护应该采用底层方式并尽量少用。我认为这种观点毫无道理。确实有些应用场景中每个\
  \ CPU 周期都至关重要，但这样的场景少之又少，而在现代操作系统上，应用任何并发机制（即使是像 GCD 这样的高级抽象）带来的实际开销都是微乎其微的。\n\n\
  对性能问题的感知，通常源于并发保护暴露了糟糕的代码设计。如果你有 200 个线程排队访问同一个数组，那么你应该考虑的是线程数量以及线程与数组的比例是否合理，而不是开始折腾底层的操作系统锁。（有助于改善这种比例的一种模式是对象池模式，我将在第\
  \ 7 章和第 8 章中介绍。）\n\n我的建议是使用 GCD，因为它相对易于理解、使用方便，并且能很好地利用 Swift 闭包。如果你确实遇到了性能问题，那么应该思考问题出现的原因，并考虑应用本书中描述的模式是否能最大程度地减少应用中的争用点。\n\
  \n## Cocoa 中的单例模式示例\n\nCocoa 框架中使用了多个单例，它们通常用于表示应用中的顶层组件。最常见的示例是 `UIApplication`\
  \ 类，它提供了控制应用整体行为并与 iOS 功能集成的特性。通过类型方法 `sharedApplication` 可以访问 `UIApplication` 单例。\n\
  \n## 将模式应用于 SportsStore 应用\n\n在本节中，我将把单例模式应用于 SportsStore 应用，以便将该模式置于更广泛的上下文中。应用中只有一个区域适合应用单例模式，那就是我在第\
  \ 5 章中为演示原型模式而创建的 `Logger` 类，它与我本章中用来演示使用单例模式解决共享资源封装问题的同名类相似。清单 6-14 展示了 SportsStore\
  \ 项目中 `Logger` 类的现有定义。\n\n**清单 6-14.** SportsStore 项目中 Logger.swift 文件的内容\n\n```\n\
  import Foundation\n\nclass Logger<T where T:NSObject, T:NSCopying> {\n\n    var\
  \ dataItems:[T] = [];\n\n    var callback:(T) -> Void;\n\n    init(callback:T ->\
  \ Void) {\n        self.callback = callback;\n    }\n\n    func logItem(item:T)\
  \ {\n        dataItems.append(item.copy() as T);\n        callback(item);\n    }\n\
  \n    func processItems(callback:T -> Void) {\n        for item in dataItems {\n\
  \            callback(item);\n        }\n    }\n}\n```\n\n提示\n\n你可以从 [`Apress.com`](https://Apress.com)\
  \ 下载 SportsStore 项目以及本章所有清单的源代码。\n\n我将从并发问题入手来应用单例模式，然后创建单例。SportsStore 的 `Logger`\
  \ 类存在两个潜在的并发问题。第一个问题是 `dataItems` 数组在 `logItem` 和 `processItems` 方法中都被使用，有可能多个线程试图在\
  \ `logItem` 方法中向数组添加新项，甚至可能在其他线程试图在 `processItems` 方法中读取数组内容时发生。\n\n#### 保护数据数组\n\
  \n我将使用 GCD 来保护数组，但我会对前面示例中使用的方法进行一些变化，以便区分读取数组内容的线程和写入数组内容的线程。允许多个线程同时读取数组内容不会带来任何并发风险，只要没有线程同时修改数组即可。你可以在清单\
  \ 6-15 中看到我是如何解决这个问题的。\n\n**清单 6-15.** 在 Logger.swift 文件中应用并发保护\n\n```\nimport Foundation\n\
  \nclass Logger<T where T:NSObject, T:NSCopying> {\n\n    var dataItems:[T] = [];\n\
  \n    var callback:(T) -> Void;\n\n    var arrayQ = dispatch_queue_create(\"arrayQ\"\
  , DISPATCH_QUEUE_CONCURRENT);\n\n    init(callback:T -> Void) {\n        self.callback\
  \ = callback;\n    }\n\n    func logItem(item:T) {\n        dispatch_barrier_async(arrayQ,\
  \ {() in\n            self.dataItems.append(item.copy() as T);\n            self.callback(item);\n\
  \        });\n    }\n\n    func processItems(callback:T -> Void) {\n        dispatch_sync(arrayQ,\
  \ {() in\n            for item in self.dataItems {\n                callback(item);\n\
  \            }\n        });\n    }\n}\n```\n\n我在 `processItems` 方法中使用 `dispatch_sync`\
  \ 函数添加一个枚举数组的工作块，并等待该块完成后再让方法返回。不同之处在于，我在 `logItem` 方法中使用了 `dispatch_barrier_async`\
  \ 函数来创建一个向数组添加项的工作块。`dispatch_barrier_async` 函数会向队列中添加一个特殊的块，从而改变队列的行为。队列会等待其之前的所有块都完成后，才会开始执行这个屏障块；并且在该屏障块完成之前，不会处理后续的任何块。\n\
  \n**理解 Grand Central Dispatch：第 3 部分**\n\n在 `Logger` 类的上下文中，读取操作包含在普通块中，写入操作则包含在屏障块中。当屏障块到达队列头部时，GCD\
  \ 会等待所有仍在进行中的读取操作完成。一旦它们全部完成，GCD 就会执行屏障块（它会修改数组），并且在该屏障块完成之前不会处理任何后续块。屏障块完成后，队列中的后续项将像往常一样被并行处理，直到遇到下一个屏障块。\n\
  \n换句话说，使用屏障可以将并发队列临时转换为串行队列，其持续时间就是处理屏障块所需的时间，之后队列又会变回并发队列。无论你更喜欢哪种理解方式，使用 GCD 屏障都可以轻松创建读写锁。\n\
  \n\n\n### 保护回调函数\n\n第二个问题需要更深入的思考。我通过使用屏障来允许多个读取者，这意味着通过初始化器设置的回调函数可能会被并发调用。这就出现了一个常见的并发难题。\n\
  \n我有几个选择。第一个选择是不做任何处理——也就是当前代码的状态——并假设提供回调的代码已经意识到了并发风险，并采取了必要的预防措施。从`Logger`类的角度来看，这是最简单的选择，因为它将负担转移到了别处。这并非完全不可取，因为`Logger`类无法了解回调的实现方式，最终可能会在`Logger`类和定义回调的组件中都加入并发保护。冗余的并发保护可能导致应用程序所写不当时发生死锁。另一个问题是，我可能最终完全没有保护，从而面临数据损坏的风险。这是最简单的选择，但也是最不确定的。\n\
  \n第二个选择是由`Logger`类承担起责任。这是一种安全的选择，但同样可能产生冗余保护；不过，这确实意味着数据损坏可以避免。\n\n第三个选择——也是我将在本例中遵循的做法——是让组件在选择何时提供回调。你可以从代码清单\
  \ 6-16 中看到我是如何修改`Logger`类以支持此功能的。\n\n**代码清单 6-16.** 在 Logger.swift 文件中添加可选的并发保护\n\
  \n```swift\nimport Foundation\n\nclass Logger<T where T:NSObject, T:NSCopying> {\n\
  \n    var dataItems:[T] = [];\n    var callback:(T) -> Void;\n    var arrayQ = dispatch_queue_create(\"\
  arrayQ\", DISPATCH_QUEUE_CONCURRENT);\n    var callbackQ = dispatch_queue_create(\"\
  callbackQ\", DISPATCH_QUEUE_SERIAL);\n\n    init(callback:T -> Void, protect:Bool\
  \ = true) {\n        self.callback = callback;\n        if (protect) {\n       \
  \     self.callback = {(item:T) in\n                dispatch_sync(self.callbackQ,\
  \ {() in\n                    callback(item);\n                });\n           \
  \ };\n        }\n    }\n\n    func logItem(item:T) {\n        dispatch_barrier_async(arrayQ,\
  \ {() in\n            self.dataItems.append(item.copy() as T);\n            self.callback(item);\n\
  \        });\n    }\n\n    func processItems(callback:T -> Void) {\n        dispatch_sync(arrayQ,\
  \ {() in\n            for item in self.dataItems {\n                callback(item);\n\
  \            }\n        });\n    }\n}\n```\n\n我定义了一个单独的队列，并添加了一个带有默认值的初始化器参数，这样我就可以在不修改应用程序其他部分代码的情况下应用这些保护措施。如果需要保护——或者调用者省略了新参数——那么我就将回调包装在一个闭包中，该闭包会向新队列添加一个代码块。\n\
  \n### 定义单例\n\n现在我已经解决了并发问题，接下来我将定义单例对象，并保护`Logger`类，使其无法在应用程序的其他地方被实例化。代码清单 6-17\
  \ 显示了我所做的修改。\n\n**代码清单 6-17.** 在 Logger.swift 文件中创建单例\n\n```swift\nimport Foundation\n\
  \nlet productLogger = Logger<Product>(callback: {p in\n    println(\"Change: \\\
  (p.name) \\(p.stockLevel) items in stock\");\n});\n\nfinal class Logger<T where\
  \ T:NSObject, T:NSCopying> {\n\n    var dataItems:[T] = [];\n    var callback:(T)\
  \ -> Void;\n    var arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_CONCURRENT);\n\
  \    var callbackQ = dispatch_queue_create(\"callbackQ\", DISPATCH_QUEUE_SERIAL);\n\
  \n    private init(callback:T -> Void, protect:Bool = true) {\n        self.callback\
  \ = callback;\n        if (protect) {\n            self.callback = {(item:T) in\n\
  \                dispatch_sync(self.callbackQ, {() in\n                    callback(item);\n\
  \                });\n            };\n        }\n    }\n\n    func logItem(item:T)\
  \ {\n        dispatch_barrier_async(arrayQ, {() in\n            self.dataItems.append(item.copy()\
  \ as T);\n            self.callback(item);\n        });\n    }\n\n    func processItems(callback:T\
  \ -> Void) {\n        dispatch_sync(arrayQ, {() in\n            for item in self.dataItems\
  \ {\n                callback(item);\n            }\n        });\n    }\n}\n```\n\
  \n对于泛型类型，无法使用结构体来创建单例，因此我不得不定义一个全局常量，以`Product`类型实例化`Logger`类。我更喜欢结构体的做法，但我也很喜欢能够将泛型类与多种类型结合使用，并且在这种情况下我很乐意使用全局常量方法。剩下的修改是更新应用程序中唯一使用`Logger`类的组件，如代码清单\
  \ 6-18 所示。\n\n**代码清单 6-18.** 在 ViewController.swift 文件中使用单例\n\n```swift\nimport\
  \ UIKit\n\nclass ProductTableCell: UITableViewCell {\n    @IBOutlet weak var nameLabel:\
  \ UILabel!\n    @IBOutlet weak var descriptionLabel: UILabel!\n    @IBOutlet weak\
  \ var stockStepper: UIStepper!\n    @IBOutlet weak var stockField: UITextField!\n\
  \    var product: Product?;\n}\n\nclass ViewController: UIViewController, UITableViewDataSource\
  \ {\n    @IBOutlet weak var totalStockLabel: UILabel!\n    @IBOutlet weak var tableView:\
  \ UITableView!\n\n    //let logger = Logger<Product>(callback: handler);\n\n   \
  \ var products = [\n        Product(name:\"Kayak\", description:\"A boat for one\
  \ person\",\n                category:\"Watersports\", price:275.0, stockLevel:10),\n\
  \        // ...为简洁起见，省略部分代码...\n    ]\n\n    @IBAction func stockLevelDidChange(sender:\
  \ AnyObject) {\n        if var currentCell = sender as? UIView {\n            while\
  \ (true) {\n                currentCell = currentCell.superview!;\n            \
  \    if let cell = currentCell as? ProductTableCell {\n                    if let\
  \ product = cell.product? {\n                        if let stepper = sender as?\
  \ UIStepper {\n                            product.stockLevel = Int(stepper.value);\n\
  \                        } else if let textfield = sender as? UITextField {\n  \
  \                          if let newValue = textfield.text.toInt()? {\n       \
  \                         product.stockLevel = newValue;\n                     \
  \       }\n                        }\n                        cell.stockStepper.value\
  \ = Double(product.stockLevel);\n                        cell.stockField.text =\
  \ String(product.stockLevel);\n                        productLogger.logItem(product);\n\
  \                    }\n                    break;\n                }\n        \
  \    }\n        }\n        displayStockTotal();\n    }\n\n    // ...为简洁起见，省略部分代码...\n\
  }\n```\n\n## 本章小结\n\n在本章中，我描述了单例模式，并解释了如何使用它来确保应用程序中只有一个特定类型的对象。单例模式易于理解，但需要仔细关注才能正确实现，尤其是在确保代码对并发使用安全方面。在下一章中，我将描述对象池模式，它与单例模式共享一些共同思想，但作用于同一类型的多个对象。\n\
  \n\n\n"
- "# 7. 对象池模式\n\n对象池模式是单例模式的一种变体，它提供对多个相同对象的访问，而非单个实例。当你拥有代表一组可互换资源的对象，且每个资源在任意时刻只能被一个组件使用时，该模式会非常有用。在本章中，我将描述基本的对象池模式，并在第\
  \ 8 章中向你展示一些有用的变体，使对象池能够适应不同的场景。表 7-1 将对象池模式置于上下文中进行了说明。\n\n**表 7-1.** 将对象池模式置于上下文中\n\
  \n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？ | 对象池模式管理一组可重用的对象，这些对象被提供给调用组件。一个组件从池中获取一个对象，用它来执行工作，然后将其返还给池，以便它可以被重新分配以满足未来的请求。已分配给调用者的对象在返回到池之前，其他组件无法使用。\
  \ |\n| 有什么好处？ | 对象池模式向使用对象的组件隐藏了对象的构造过程，并允许通过重复使用对象来分摊昂贵的初始化成本。 |\n| 何时应使用此模式？ |\
  \ 当你拥有许多相同的对象，且需要管理它们的创建时，应使用对象池模式。这种情况可能是因为这些对象代表了现实世界中的资源，或者创建新实例的成本很高。 |\n| 何时应避免此模式？\
  \ | 如果在任何时刻只能存在一个对象（应使用单例模式），或者对可存在的对象数量没有限制（应允许调用组件创建自己的实例，或使用本书中描述的其他模式，如工厂方法模式），则不应使用此模式。\
  \ |\n| 如何判断是否正确实现了此模式？ | 当对象被分配给调用组件而无需创建新实例，并且当返还给池的对象被用于满足后续请求时，就说明该模式已正确实现。 |\n\
  | 有哪些常见陷阱？ | 主要陷阱是实现并发保护，以确保对象被正确分配，并且不会损坏用于实现该模式的数据结构。 |\n| 有哪些相关模式？ | 单例模式与对象池模式有一些共同思路，但它管理的是单个对象。\
  \ |\n\n## 准备示例项目\n\n对于本章，我创建了一个名为 `ObjectPool` 的 OS X 命令行工具项目。无需进一步准备。\n\n## 理解该模式解决的问题\n\
  \n在许多项目中，会有一些对象其实例数量必须受到限制，但又不至于仅仅只有一个实例。为了帮助将此问题置于现实世界的背景下，我将创建一个示例，代表图书馆用来追踪书籍的系统。清单\
  \ 7-1 显示了我添加到示例项目中的名为 `Book.swift` 的文件内容。\n\n**清单 7-1.** `Book.swift` 文件的内容\n\n\
  ```\nclass Book {\n\nlet author:String;\n\nlet title:String;\n\nlet stockNumber:Int;\n\
  \nvar reader:String?\n\nvar checkoutCount = 0;\n\ninit(author:String, title:String,\
  \ stock:Int) {\n\nself.author = author;\n\nself.title = title;\n\nself.stockNumber\
  \ = stock;\n\n}\n\n}\n```\n\n在追踪图书馆书籍的系统中，创建或克隆 `Book` 对象并不会神奇地创建出图书馆中的实体书，但同样地，使用单例模式来管理\
  \ `Book` 也没有意义，因为图书馆对大多数书籍都会拥有不止一份副本，而且其中任何一本都可以满足某人的阅读愿望。\n\n图书馆中的每本书一次只能由一位读者借出，并且在归还之前不能再次使用。读者可以在书籍有库存时立即借阅，但一旦库存耗尽，任何想借阅的人都需要等到有书被归还或图书馆增加馆藏。\n\
  \n我面临的问题是需要一种模式来管理大量相同且可互换的对象，并提供一种让它们能够被公平和合理地使用的模型。\n\n**提示：** 图书馆书籍是可重用和可互换对象组的现实世界例子，但在软件开发中，你也会遇到一些抽象的例子。最常见的例子包括线程和网络连接，但这是一个会以多种方式频繁出现的问题。\n\
  \n## 理解对象池模式\n\n对象池模式管理一组可互换的对象，称为对象池——或者简称为池。需要对象的组件从池中借用一个对象，用它来执行一些工作，然后在工作完成后将其返还给池。返还的对象随后将用于满足后续的请求，这些请求可能来自同一个组件或另一个组件。\n\
  \n对象池模式可用于管理代表现实世界资源的对象，也可用于通过重用对象来满足多个组件的请求，从而分摊昂贵的初始化过程。\n\n对象池有四个重要操作，如图 7-1\
  \ 所示。第一个操作是初始化，为准备待管理的对象集合。\n\n第二个操作是借出，需要对象的组件从池中借用一个对象。\n\n第三个操作是组件使用该对象执行某种工作。这不需要池进行任何操作，但这确实意味着池所管理的对象会在一段时间内处于使用中，并且不能借给其他组件。\n\
  \n第四个也是最后一个操作是归还，组件将对象返还给池，以便它可以用来满足未来的借用请求。\n\n![A978-1-4842-0394-1_7_Fig1_HTML.jpg](img/A978-1-4842-0394-1_7_Fig1_HTML.jpg)\n\
  \n**图 7-1.** 对象池的基本操作\n\n在多线程应用程序中，第二、第三和第四个操作可能同时发生。在多个组件之间共享对象会带来潜在的并发问题。两个或多个组件可能同时请求借出或归还对象，对象池必须确保每次借用请求在借出时都能获得不同的对象，并且确保归还时对象不会丢失。\n\
  \n有时也会出现请求无法立即被满足的情况，因为池中的所有对象都已被借出并使用中。池必须能够处理这些请求，要么向组件指示没有可用对象，要么允许组件等待直到有对象被归还。\n\
  \n## 实现对象池模式\n\n在本章中，我将创建该模式的一个基本实现，以演示不同操作是如何实现的。一个基本的对象池管理一组固定的对象，并依赖于从池中借出对象的组件在完成后将其归还。这是一个很好的起点，因为它让我能够解决基本的并发技术，而这些技术是该模式健壮实现的核心。在第\
  \ 8 章中，我将向你展示该模式的一些变体，你可以使用它们将基本池调整为你自己的项目。\n\n\n\n### 定义池类\n\n第一步是创建一个通用的 `Pool`\
  \ 类，用于管理指定类型的对象集合。这并非必须是一个泛型类，但管理对象池是一种常见需求，而泛型类可以轻松地在不同项目中复用代码。我给示例项目添加了一个名为 `Pool.swift`\
  \ 的文件，其内容如代码清单 7-2 所示。\n\n**代码清单 7-2.** `Pool.swift` 文件的内容\n\n```\nimport Foundation\n\
  \nclass Pool<T> {\n\n    private var data = [T]();\n\n    init(items:[T]) {\n  \
  \      data.reserveCapacity(data.count);\n        for item in items {\n        \
  \    data.append(item);\n        }\n    }\n\n    func getFromPool() -> T? {\n  \
  \      var result:T?;\n        if (data.count > 0) {\n            result = self.data.removeAtIndex(0);\n\
  \        }\n        return result;\n    }\n\n    func returnToPool(item:T) {\n \
  \       self.data.append(item);\n    }\n\n}\n```\n\n`Pool` 类——更准确地说是 `Pool<T>`——在初始化时接收它要管理的对象集合。初始化器将这些项目复制到一个本地\
  \ `data` 数组中，我将其用作一个简单的队列集合，其中包含可供使用的对象。当调用 `getFromPool` 方法时，我通过调用 `removeAtIndex`\
  \ 方法返回数组头部的对象。当之前获取的对象使用完毕后，会调用 `returnToPool` 方法，我使用 `append` 方法将其添加到 `data` 数组中，以便后续调用\
  \ `getFromPool` 方法时可以再次使用。\n\n#### 保护数据数组\n\n在对象池模式中，处理并发请求非常重要，我需要解决两个问题。第一个问题与我在处理单例模式时遇到的一样：`getFromPool`\
  \ 和 `returnToPool` 方法中包含修改 `data` 数组的语句，我需要确保没有两个线程同时使用这些方法。代码清单 7-3 展示了如何添加一个 Grand\
  \ Central Dispatch (GCD) 队列，并应用 `dispatch_sync` 函数来保护数组免受并发修改的影响。\n\n**代码清单 7-3.**\
  \ 在 `Pool.swift` 文件中保护数组免受并发修改\n\n```\nimport Foundation\n\nclass Pool<T> {\n\n\
  \    private var data = [T]();\n    private let arrayQ = dispatch_queue_create(\"\
  arrayQ\", DISPATCH_QUEUE_SERIAL);\n\n    init(items:[T]) {\n        data.reserveCapacity(data.count);\n\
  \        for item in items {\n            data.append(item);\n        }\n    }\n\
  \n    func getFromPool() -> T? {\n        var result:T?;\n        if (data.count\
  \ > 0) {\n            dispatch_sync(arrayQ, {() in\n                result = self.data.removeAtIndex(0);\n\
  \            })\n        }\n        return result;\n    }\n\n    func returnToPool(item:T)\
  \ {\n        dispatch_async(arrayQ, {() in\n            self.data.append(item);\n\
  \        });\n    }\n\n}\n```\n\n> **提示**  \n> 你可以在不添加并发保护的情况下实现对象池模式，但前提是确保你的应用程序只会使用单个线程来访问池中的对象。不过要小心：应用程序随着复杂度增加往往需要处理并发，届时未受保护的对象池会引发问题。我的建议是，即使你预计不需要，也始终添加并发保护。\n\
  \n我使用了 `dispatch_sync` 和 `dispatch_async` 函数，通过闭包创建了包含数组操作代码的代码块。我将这些代码块添加到一个由 `dispatch_queue_create`\
  \ 函数创建的队列中，并将该队列配置为 `DISPATCH_QUEUE_SERIAL` 值，这样一次只执行一个代码块。这通过确保同一时间只有一个线程能修改数组来保护其免受损坏。\n\
  \n#### 确保对象可被取出\n\n`Pool` 类中还存在着第二个并发问题，这意味着代码仍可能遇到麻烦。在 `getFromPool` 方法中，我在向队列添加获取对象的代码块之前，会检查\
  \ `data` 数组中是否有空闲对象，如下所示：\n\n```\n...\nfunc getFromPool() -> T? {\n    var result:T?;\n\
  \    if (data.count > 0) {\n        dispatch_sync(arrayQ, {() in\n            result\
  \ = self.data.removeAtIndex(0);\n        })\n    }\n    return result;\n}\n...\n\
  ```\n\n这是一个经典的并发问题。假设 `data` 数组中有一个空闲对象，并且两个线程在相差几毫秒的时间内调用了 `getFromPool` 方法。第一个线程检查\
  \ `data.count` 值，发现有一个空闲对象，于是使用 `dispatch_sync` 方法将一个会从数组中移除该对象以便使用的代码块排入队列。\n\n\
  随后不久，第二个线程也执行了同样的操作。它同样认为数组中有一个空闲对象，因为第一个线程创建的代码块尚未执行。第二个线程将自身的代码块排入队列，期望也能获取该对象。第一个线程的代码块执行并成功移除了空闲对象。接着第二个线程的代码块被执行，但由于数组此时已为空，导致出现错误。\n\
  \n为了解决这个问题，我需要确保调用 `getFromPool` 方法的线程在无法保证获取到对象时，不会调度代码块去获取空闲对象。代码清单 7-4 展示了如何使用\
  \ GCD 的信号量特性解决此问题。\n\n**代码清单 7-4.** 在 `Pool.swift` 文件中应用信号量\n\n```\nimport Foundation\n\
  \nclass Pool<T> {\n\n    private var data = [T]();\n    private let arrayQ = dispatch_queue_create(\"\
  arrayQ\", DISPATCH_QUEUE_SERIAL);\n    private let semaphore:dispatch_semaphore_t;\n\
  \n    init(items:[T]) {\n        data.reserveCapacity(data.count);\n        for\
  \ item in items {\n            data.append(item);\n        }\n        semaphore\
  \ = dispatch_semaphore_create(items.count);\n    }\n\n    func getFromPool() ->\
  \ T? {\n        var result:T?;\n        if (dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER)\
  \ == 0) {\n            dispatch_sync(arrayQ, {() in\n                result = self.data.removeAtIndex(0);\n\
  \            })\n        }\n        return result;\n    }\n\n    func returnToPool(item:T)\
  \ {\n        dispatch_async(arrayQ, {() in\n            self.data.append(item);\n\
  \            dispatch_semaphore_signal(self.semaphore);\n        });\n    }\n\n\
  }\n```\n\n信号量的核心是一个计数器，你可以在下面用于创建信号量的语句中看到这一点：\n\n```\n...\nsemaphore = dispatch_semaphore_create(items.count);\n\
  ...\n```\n\n`dispatch_semaphore_create` 函数接受一个 `Int` 值，用于设置计数器的初始值。每次调用 `dispatch_semaphore_wait`\
  \ 函数时，计数器都会递减，如下所示：\n\n```\n...\nif (dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER)\
  \ == 0) {\n    dispatch_sync(arrayQ, {() in\n        result = self.data.removeAtIndex(0);\n\
  \    });\n}\n...\n```\n\n当计数器归零时，对 `dispatch_semaphore_wait` 函数的调用将会阻塞。通过在 `getFromPool`\
  \ 方法中调用 `dispatch_semaphore_wait` 函数，每次从 `data` 数组中移除一个对象时，计数器就会递减，并且当数组中没有更多可分配的对象时，对该方法的调用将会阻塞。\n\
  \n计数器通过调用 `dispatch_semaphore_signal` 函数递增，我在 `returnToPool` 方法中将对象添加到 `data` 数组后执行此操作。\n\
  \n```\n...\ndispatch_async(arrayQ, {() in\n    self.data.append(item);\n    dispatch_semaphore_signal(self.semaphore);\n\
  });\n...\n```\n\n这会增加计数器，允许一个阻塞在 `dispatch_semaphore_wait` 函数上的线程继续执行。对信号量函数的调用平衡了获取和归还池对象的请求数量，并且除非在代码块执行时确实有对象在等待，否则可以防止\
  \ `getFromPool` 方法向队列添加代码块。\n\n\n\n### 消费池类\n\n既然已经创建了一个通用的池类，我就可以通过将其应用于管理一个`Book`对象集合，来完成对象池模式的应用。清单\
  \ 7-5 展示了我在名为`Library.swift`的新文件中定义的`Library`类的定义。\n\n**清单 7-5.** 在`Library.swift`文件中消费池类\n\
  \n```\nimport Foundation\n\nfinal class Library {\n\n    private let books:[Book];\n\
  \    private let pool:Pool<Book>;\n\n    private init(stockLevel:Int) {\n      \
  \  books = [Book]();\n        for count in 1 ... stockLevel {\n            books.append(Book(author:\
  \ \"Dickens, Charles\", title: \"Hard Times\",\n                stock: count))\n\
  \        }\n        pool = Pool<Book>(items:books);\n    }\n\n    private class\
  \ var singleton:Library {\n        struct SingletonWrapper {\n            static\
  \ let singleton = Library(stockLevel:2);\n        }\n        return SingletonWrapper.singleton;\n\
  \    }\n\n    class func checkoutBook(reader:String) -> Book? {\n        var book\
  \ = singleton.pool.getFromPool();\n        book?.reader = reader;\n        book?.checkoutCount++;\n\
  \        return book;\n    }\n\n    class func returnBook(book:Book) {\n       \
  \ book.reader = nil;\n        singleton.pool.returnToPool(book);\n    }\n\n    class\
  \ func printReport() {\n        for book in singleton.books {\n            println(\"\
  ...Book#\\(book.stockNumber)...\");\n            println(\"Checked out \\(book.checkoutCount)\
  \ times\");\n            if (book.reader != nil) {\n                println(\"Checked\
  \ out to \\(book.reader!)\");\n            } else {\n                println(\"\
  In stock\");\n            }\n        }\n    }\n}\n```\n\n`Library`类通过将我在清单 7-4 中定义的`Pool`类与我在第\
  \ 6 章中描述的单例模式相结合，实现了对象池模式。我需要使用单例，因为在这个例子中应该只有一个`Library`，尽管`Library`本身可以有多个池，每个池管理单个书名下的多个副本。清单\
  \ 7-5 中的代码描绘了一个相当萧条的图书馆，其全部馆藏仅为查尔斯·狄更斯小说的两本副本。\n\n当你访问一个真实的图书馆时，如果有可用的书，你可以借阅所需副本；如果没有，你可以排队等候其他读者归还。图书馆提供了这些服务，但并不会让你了解其背后流程的运作方式。例如，你无需找到其他正在等待该书副本的人，并弄清楚归还的副本应如何分配。\n\
  \n### 宽松的对象创建策略\n\n请注意，我在不同的文件中定义了`Library`和`Book`类，并且没有阻止`Book`类在`Library`外部被实例化。在实现单例模式时，我使用了`private`构造函数并定义了访问类，因为我希望展示如何完全控制单例的创建。在本章中，我采取了更宽松的方法，因为我正在建模一个可能存在多个`Book`对象来源的环境，这代表了现实世界中书籍的多种来源（例如，出版商、图书批发商和在线商店都可以为图书馆提供书籍）。我不会在示例中构建所有可能的来源，但我想说明你可以使用此模式来管理对象，而无需限制其供应。只要与`Library`对象关联的`Book`对象未经其同意就不能被修改，我的模型就与现实世界保持一致。\n\
  \n现实世界中的图书馆如何管理其书籍的细节是隐藏的，这也是我在实现`Library`类时所采用的方法。我没有通过单例暴露`Pool<Book>`对象，而是定义了名为`checkoutBook`和`returnBook`的类型方法，这些方法代表调用者与池进行交互。这些方法还允许我在书籍被借出时对其进行预处理：我设置了`reader`属性的值，并递增了`checkoutCount`属性。当书籍被归还时，我会清除`reader`属性。\n\
  \n`checkoutCount`和`reader`属性都由`printReport`方法使用，该方法详细列出了`Library`创建的每个`Book`对象，记录了这本书被借出的次数以及它当前是否在池中。这是一个诊断方法，允许我在测试期间查看池所管理的书籍状态。清单\
  \ 7-6 展示了我在`main.swift`文件中用于测试`Library`类及其对`Pool`类使用的代码。\n\n**清单 7-6.** 在`main.swift`文件中测试\
  \ Library 和 Pool\n\n```\nimport Foundation\n\nvar queue = dispatch_queue_create(\"\
  workQ\", DISPATCH_QUEUE_CONCURRENT);\nvar group = dispatch_group_create();\n\nprintln(\"\
  Starting...\");\n\nfor i in 1 ... 20 {\n    dispatch_group_async(group, queue, {()\
  \ in\n        var book = Library.checkoutBook(\"reader#\\(i)\");\n        if (book\
  \ != nil) {\n            NSThread.sleepForTimeInterval(Double(rand() % 2));\n  \
  \          Library.returnBook(book!);\n        }\n    });\n}\n\ndispatch_group_wait(group,\
  \ DISPATCH_TIME_FOREVER);\n\nprintln(\"All blocks complete\");\n\nLibrary.printReport();\n\
  ```\n\n这段代码使用一个`for`循环创建异步 GCD 块，这些块从`Library`借出并归还`Book`对象。为了使示例更逼真一些，我在获取到`Book`之后、归还它之前添加了一个延迟，如下所示：\n\
  \n```\n...\nNSThread.sleepForTimeInterval(Double(rand() % 2));\n...\n```\n\n`NSThread.sleepForTimeInterval`会暂停执行该语句的线程。我控制了休眠的持续时间，使其随机生成并强制为零秒或一秒，这意味着某些块会立即归还图书，而其他块则会在等待一秒钟后才归还图书。我这样做是因为我希望池中对象的使用能够重叠。如果没有延迟，这些对象将严格轮换地被借出和归还，这并非真实项目（当然，也非现实世界）中使用池对象的方式。\n\
  \n启动应用程序以查看结果。运行需要几秒钟，请耐心等待。当`main.swift`文件中生成的所有块都执行完毕后，你将看到类似于下面的输出：\n\n```\n\
  Starting...\nAll blocks complete\n...Book#1...\nChecked out 13 times\nIn stock\n\
  ...Book#2...\nChecked out 7 times\nIn stock\n```\n\n你的结果可能不同，因为我添加的延迟的随机性质会改变对象从池中取出和归还的顺序。\n\
  \n虽然你的结果可能不同，但书籍被借出的总次数应为`20`，这与`main.swift`文件中创建的 GCD 块数量相同。在我的例子中，一个`Book`对象被借出了\
  \ 13 次，另一个被借出了 7 次。这种差异是由我添加的延迟引起的，这导致第一个`Book`对象在池中循环了多次，而速度较慢的读者则持有了另一个对象。\n\n\
  ## 理解对象池模式的陷阱\n\n实现对象池模式时需要小心，因为很容易创建一个不起作用或不适合其所用应用程序的池。很容易被创建完美池的想法冲昏头脑，尤其是在考虑到我在第\
  \ 8 章中描述的变体时。结果可能是代码难以维护，以及一个部署后行为不可预测的不稳定对象池。\n\n在保护对象池免受并发访问时也需要小心，以避免创建一个会意外锁死的池，即使它在你的开发测试期间能正常运行。要保守一点，优先考虑安全性而非性能——最重要的是，尽可能用多种不同的使用场景测试你的代码。我建议尽可能保持对象池的简单，专注于产生一个能够工作且易于测试的东西。\n\
  \n\n\n## Cocoa 中对象池模式的示例\n\nCocoa 框架在其公开 API 中并未暴露对象池，唯有一个常见的例外：表格单元格对象。你可以在 SportsStore\
  \ 应用中看到相关示例，其中使用 `UITableViewCell` 对象来显示表格视图中的行。清单 7-7 展示了 SportsStore 项目中 `ViewController.swift`\
  \ 文件里 `tableView` 方法的实现。\n\n清单 7-7 在 `ViewController.swift` 文件中获取（潜在）池化的 `UITableViewCell`\n\
  \n```\n...\n\nfunc tableView(tableView: UITableView,\ncellForRowAtIndexPath indexPath:\
  \ NSIndexPath) -> UITableViewCell {\n    let product = products[indexPath.row];\n\
  \    let cell = tableView.dequeueReusableCellWithIdentifier(\"ProductCell\")\n \
  \       as ProductTableCell;\n    cell.product = products[indexPath.row];\n    cell.nameLabel.text\
  \ = product.name;\n    cell.descriptionLabel.text = product.productDescription;\n\
  \    cell.stockStepper.value = Double(product.stockLevel);\n    cell.stockField.text\
  \ = String(product.stockLevel);\n    return cell;\n}\n\n...\n```\n\n这是为显示而获取 `UITableViewCell`\
  \ 对象时调用的方法。高亮语句显示，我通过调用 `UITableView` 类定义的 `dequeueReusableCellWithIdentifier` 方法来获取\
  \ `UITableView` 对象。`UIKit` 框架管理着 `UITableViewCell` 对象的创建和分配，以便它们可以被复用。苹果并未公开 `UIKit`\
  \ 框架的源代码，因此无法查看池的具体实现，但这正是一个通过复用对象来抵消昂贵初始化的池化示例。\n\n提示\n\n`dequeueReusableCellWithIdentifier`\
  \ 方法结合了对象池和工厂方法模式。我在第 9 章中描述了工厂方法模式，简而言之，表格可以通过不同类型的表格单元格来填充，而方法参数（此处为 `ProductCell`）用于区分它们。\n\
  \n## 将模式应用于 SportsStore 应用\n\n我打算将对象池模式应用于 SportsStore 应用，以管理网络请求对象池。目前，SportsStore\
  \ 应用有一个静态的 `Product` 对象数组展示给用户，我将用一系列网络调用来替换它，这些调用会获取产品详情，并在库存水平变化时更新服务器。\n\n###\
  \ 准备示例应用\n\n我将从第 6 章结束时的 SportsStore 项目继续，本章无需任何前期准备。\n\n提示\n\n请记住，你可以从 [`Apress.com`](https://Apress.com)\
  \ 下载 SportsStore 项目每个阶段以及本书所有其他示例的源代码。\n\n### 创建（虚拟）服务器\n\n我不想深入探讨创建和设置服务器的细节，因此我将模拟请求和响应，但这不会影响创建和应用池的演示。我在\
  \ SportsStore 项目中添加了一个名为 `NetworkConnection.swift` 的文件，并用它来定义清单 7-8 所示的类。\n\n清单\
  \ 7-8 `NetworkConnection.swift` 文件的内容\n\n```\nimport Foundation\n\nclass NetworkConnection\
  \ {\n    private let stockData: [String: Int] = [\n        \"Kayak\" : 10, \"Lifejacket\"\
  : 14, \"Soccer Ball\": 32,\"Corner Flags\": 1,\n        \"Stadium\": 4, \"Thinking\
  \ Cap\": 8, \"Unsteady Chair\": 3,\n        \"Human Chess Board\": 2, \"Bling-Bling\
  \ King\":4\n    ];\n\n    func getStockLevel(name:String) -> Int? {\n        NSThread.sleepForTimeInterval(Double(rand()\
  \ % 2));\n        return stockData[name];\n    }\n}\n```\n\n`NetworkConnection`\
  \ 类是我在对象池中管理的对象的模板。它有一个私有的 `stockData` 属性，该属性被设置为包含 SportsStore 产品初始库存水平的字典，并以产品名称作为索引。`getStockLevel`\
  \ 方法在字典中查找产品并返回库存水平值。我使用了 `NSThread.sleepForTimeInterval` 方法为某些请求添加了一秒的随机延迟。\n\n\
  ### 创建对象池\n\n我在前面示例中演示的对象池都是泛型类，这使得在不同的项目中复用类变得容易。为了增加多样性，我为 SportsStore 实现了一个针对特定类型（`NetworkConnection`\
  \ 类）的对象池。清单 7-9 显示了我添加到 SportsStore 项目中的 `NetworkPool.swift` 文件的内容。\n\n清单 7-9 `NetworkPool.swift`\
  \ 文件的内容\n\n```\nimport Foundation\n\nfinal class NetworkPool {\n    private let\
  \ connectionCount = 3;\n    private var connections = [NetworkConnection]();\n \
  \   private var semaphore:dispatch_semaphore_t;\n    private var queue:dispatch_queue_t;\n\
  \n    private init() {\n        for _ in 0 ..< connectionCount {\n            connections.append(NetworkConnection());\n\
  \        }\n        semaphore = dispatch_semaphore_create(connectionCount);\n  \
  \      queue = dispatch_queue_create(\"networkpoolQ\", DISPATCH_QUEUE_SERIAL);\n\
  \    }\n\n    private func doGetConnection() -> NetworkConnection {\n        dispatch_semaphore_wait(semaphore,\
  \ DISPATCH_TIME_FOREVER);\n        var result:NetworkConnection? = nil;\n      \
  \  dispatch_sync(queue, {() in\n            result = self.connections.removeAtIndex(0);\n\
  \        });\n        return result!;\n    }\n\n    private func doReturnConnection(conn:NetworkConnection)\
  \ {\n        dispatch_async(queue, {() in\n            self.connections.append(conn);\n\
  \            dispatch_semaphore_signal(self.semaphore);\n        });\n    }\n\n\
  \    class func getConnection() -> NetworkConnection {\n        return sharedInstance.doGetConnection();\n\
  \    }\n\n    class func returnConnecton(conn:NetworkConnection) {\n        sharedInstance.doReturnConnection(conn);\n\
  \    }\n\n    private class var sharedInstance:NetworkPool {\n        get {\n  \
  \          struct SingletonWrapper {\n                static let singleton = NetworkPool();\n\
  \            }\n            return SingletonWrapper.singleton;\n        }\n    }\n\
  }\n```\n\n这是一个管理 `NetworkConnection` 对象集合的池，遵循我在本章前面创建的基本模式。`NetworkPool` 类实现了对象池模式，但它也使用了第\
  \ 6 章中的单例模式，以便应用中的其他组件能够轻松定位到此池。\n\n\n\n### 应用对象池\n\n为了应用对象池，我创建了一个名为 `ProductDataStore`\
  \ 的类，并将静态定义的产品数据移入其中——尽管没有库存水平信息。清单 7-10 展示了 `ProductDataStore.swift` 文件的内容，我已将其添加到\
  \ SportsStore 项目中。\n\n**清单 7-10.** `ProductDataStore.swift` 文件的内容\n\n```swift\n\
  import Foundation\n\nfinal class ProductDataStore {\n\n    var callback:((Product)\
  \ -> Void)?;\n\n    private var networkQ:dispatch_queue_t\n\n    private var uiQ:dispatch_queue_t;\n\
  \n    lazy var products:[Product] = self.loadData();\n\n    init() {\n        networkQ\
  \ = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);\n        uiQ\
  \ = dispatch_get_main_queue();\n    }\n\n    private func loadData() -> [Product]\
  \ {\n        for p in productData {\n            dispatch_async(self.networkQ, {()\
  \ in\n                let stockConn = NetworkPool.getConnection();\n           \
  \     let level = stockConn.getStockLevel(p.name);\n                if (level !=\
  \ nil) {\n                    p.stockLevel = level!;\n                    dispatch_async(self.uiQ,\
  \ {() in\n                        if (self.callback != nil) {\n                \
  \            self.callback!(p);\n                        }\n                   \
  \ })\n                }\n                NetworkPool.returnConnecton(stockConn);\n\
  \            });\n        }\n        return productData;\n    }\n\n    private var\
  \ productData:[Product] = [\n        Product(name:\"Kayak\", description:\"A boat\
  \ for one person\",\n            category:\"Watersports\", price:275.0, stockLevel:0),\n\
  \        Product(name:\"Lifejacket\", description:\"Protective and fashionable\"\
  ,\n            category:\"Watersports\", price:48.95, stockLevel:0),\n        Product(name:\"\
  Soccer Ball\", description:\"FIFA-approved size and weight\",\n            category:\"\
  Soccer\", price:19.5, stockLevel:0),\n        Product(name:\"Corner Flags\",\n \
  \           description:\"Give your playing field a professional touch\",\n    \
  \        category:\"Soccer\", price:34.95, stockLevel:0),\n        Product(name:\"\
  Stadium\", description:\"Flat-packed 35,000-seat stadium\",\n            category:\"\
  Soccer\", price:79500.0, stockLevel:0),\n        Product(name:\"Thinking Cap\",\
  \ description:\"Improve your brain efficiency\",\n            category:\"Chess\"\
  , price:16.0, stockLevel:0),\n        Product(name:\"Unsteady Chair\",\n       \
  \     description:\"Secretly give your opponent a disadvantage\",\n            category:\
  \ \"Chess\", price: 29.95, stockLevel:0),\n        Product(name:\"Human Chess Board\"\
  , description:\"A fun game for the family\",\n            category:\"Chess\", price:75.0,\
  \ stockLevel:0),\n        Product(name:\"Bling-Bling King\",\n            description:\"\
  Gold-plated, diamond-studded King\",\n            category:\"Chess\", price:1200.0,\
  \ stockLevel:0)];\n}\n```\n\n`ProductDataStore` 已成为 SportsStore 应用中 `Product` 对象的权威来源。通过\
  \ `products` 属性获取 `Product` 对象，该属性返回一个私有数组的内容。`Product` 对象定义时 `stockLevel` 值为零，但\
  \ `products` 属性是惰性计算的，并使用 `NetworkPool` 类请求每个产品的当前库存水平。请求完成后，`Product` 对象会被更新，并调用一个可选回调函数以通知新信息的到来。\n\
  \n**提示**  \n在实际项目中，通过单个请求获取所有库存水平会更合理，但为了本章的目的，我希望通过比池中对象更多的请求来测试对象池。\n\n注意，我在此类中使用了两个\
  \ GCD 队列。我获取了一个全局队列（由 GCD 自动创建），并设置后台优先级，以执行模拟的网络请求。使用后台优先级意味着获取库存信息的延迟不会阻止更重要任务的执行，例如响应用户交互。在处理回调时，我使用主应用队列以确保更新立即执行，而不会推迟到后台任务完成。\n\
  \n清单 7-11 展示了我对 `ViewController.swift` 文件所做的更改，以使用 `ProductDataStore` 类，而不是在本地定义数据。\n\
  \n**清单 7-11.** 在 `ViewController.swift` 文件中使用 `ProductDataSource` 类\n\n```swift\n\
  import UIKit\n\nclass ProductTableCell: UITableViewCell {\n    // ...为简洁起见省略语句...\n\
  }\n\nclass ViewController: UIViewController, UITableViewDataSource {\n    @IBOutlet\
  \ weak var totalStockLabel: UILabel!\n    @IBOutlet weak var tableView: UITableView!\n\
