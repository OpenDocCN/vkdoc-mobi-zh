  ;\n    }\n}\n```\n\n我定义了一个 `productStore` 属性，该属性被分配了一个 `ProductDataStore` 对象，并从中获取\
  \ `Product` 对象以供显示。我还定义了回调闭包，用于定位用于显示 `Product` 的表格单元格（如果可见），并更新其显示的库存水平。\n\n运行应用时你看到的效果是：库存值最初显示为零，然后随着对象从池中取出并用于发起（模拟的）网络请求而逐步更新。我在\
  \ `NetworkConnection` 类中添加的随机延迟意味着更新将逐渐到来，因为对象池限制了并发请求的数量。\n\n## 总结\n\n在本章中，我解释了如何应用基本对象池模式来管理对象的集合。在下一章中，我将向你展示如何改变对象池的工作方式，以管理具有不同使用模式的对象。\n\
  \n\n好的，作为高级文档工程师和翻译员，我已经根据您提供的注意事项和示例，将给定的英文文本翻译成了中文。\n\n---\n\n\n"
- "# 8. 对象池变体\n\n在本章中，我将解释如何对 第 7 章 中描述的对象池模式的基本实现进行变体，以管理具有不同特征的对象。每种技术都应用了一种策略来处理池实现的某个方面，以应对需要池对象的调用组件。表\
  \ 8-1 将这些变体置于上下文之中。\n\n**表 8-1.** 将对象池模式变体置于上下文\n\n| 问题 | 答案 |\n| --- | --- |\n\
  | 它们是什么？ | 对象池模式的变体允许您更改对象池的工作方式，以便在不同情况下运行。 |\n| 有什么好处？ | 这些变体改变了池的行为，使其能够为具有不同期望和需求的调用组件提供服务，并管理具有一系列特征和生命周期的对象。\
  \ |\n| 何时应使用这些变体？ | 当我在第 7 章中描述的模式的基本实现无法满足您的需求时，您应该使用这些变体。 |\n| 何时应避免这些变体？ | 这些变体需要高级并发技术，除非您能对其进行彻底测试并对\
  \ Cocoa 并发有深入理解，否则应避免使用。 |\n| 如何判断您是否已正确实现了这些变体？ | 确保您已正确实现这些变体的唯一方法是通过彻底的测试。 |\n\
  | 是否有常见的陷阱？ | 这些是高级技术，很容易误用并发保护来创建一个无法工作或性能低下的池。 |\n| 是否有任何相关模式？ | 不适用。 |\n\n##\
  \ 准备示例项目\n\n我继续使用在 第 7 章 中创建的 `ObjectPool` 项目。准备本章无需进行任何更改。\n\n## 理解对象池模式变体\n\n\
  对象池的实现由四个策略组成，它们共同构成了分配对象的行为：\n\n*   对象创建策略\n*   对象重用策略\n*   空池策略\n*   分配策略\n\n\
  通过更改这些策略，您可以调整对象池模式的实现，以适应您需要管理的对象类型。我将在以下各节中解释每个策略，并演示如何实现它们。\n\n### 理解对象创建策略\n\
  \n对象创建策略决定了池所管理的对象是如何创建的。在上一章中，我实现了一个积极的策略，这意味着对象在使用之前就被创建了。实际上，我在 `Library` 类中创建了\
  \ `Book` 对象，并将它们作为一个数组传递给 `Pool` 初始化器，如下所示：\n\n```\n...\nprivate init(stockLevel:Int)\
  \ {\n    books = [Book]();\n    for count in 1 ... stockLevel {\n        books.append(Book(author:\
  \ \"Dickens, Charles\", title: \"Hard Times\",\n            stock: count))\n   \
  \ }\n    pool = Pool<Book>(items:books);\n}\n...\n```\n\n这是我处理代表真实世界资源的对象时采用的策略，因为将要管理的对象数量通常事先已知（我的图书馆购买了两本《艰难时世》），并且需要某种程度的配置（分配唯一的库存编号）。\n\
  \n这种方法的缺点是，在产生任何需求之前，创建和配置对象的所有成本都已经发生。我创建了两个 `Book` 对象来代表我的查尔斯·狄更斯系列收藏，但可能很少有读者需求甚至没有，创建和准备\
  \ `Book` 对象的开销将永远不会通过请求得到回报。\n\n这对于代表真实世界对象的对象来说通常是可接受的，因为池的状态反映了真实世界的情况：图书馆预见到读者需求而购买了两本《艰难时世》。但是，如果您使用对象池来避免承担与实际世界无关的对象的昂贵初始化成本，那么这种策略就没有帮助，例如我在\
  \ 第 5 章 中用于演示原型模式的 `Sum` 对象。\n\n另一种选择是使用**懒惰的**创建策略，这意味着对象只有在需要时才会被创建。出于我 `Library`\
  \ 示例的目的，我将创建一个 `BookSeller` 类，从中可以获取 `Book` 对象。我示例中的图书馆将能够在第一次需要时从销售商那里获得所需的书籍。清单\
  \ 8-1 显示了 `BookSources.swift` 文件的内容，我已将其添加到项目中。\n\n**清单 8-1.** `BookSources.swift`\
  \ 文件的内容\n\n```\nimport Foundation\n\nclass BookSeller {\n    class func buyBook(author:String,\
  \ title:String, stockNumber:Int) -> Book {\n        return Book(author: author,\
  \ title: title, stock: stockNumber);\n    }\n}\n```\n\n`BookSeller` 类定义了一个创建 `Book`\
  \ 对象的类型方法。`BookSeller` 类的实现对于示例来说并不重要——重要的是有一个 `Book` 对象的来源，它将被调用以提供池中的项目。清单 8-2\
  \ 显示了我对 `Pool` 类所做的更改，以支持延迟创建项目，直到它们被需要为止。\n\n**清单 8-2.** 在 `Pool.swift` 文件中实现懒惰对象创建\n\
  \n```\nimport Foundation\n\nclass Pool<T> {\n    private var data = [T]();\n   \
  \ private let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
  \    private let semaphore:dispatch_semaphore_t;\n    private var itemCount = 0;\n\
  \    private let maxItemCount:Int;\n    private let itemFactory: () -> T;\n\n  \
  \  init(maxItemCount:Int, factory:() -> T) {\n        self.itemFactory = factory;\n\
  \        self.maxItemCount = maxItemCount;\n        semaphore = dispatch_semaphore_create(maxItemCount);\n\
  \    }\n\n    func getFromPool() -> T? {\n        var result:T?;\n        if (dispatch_semaphore_wait(semaphore,\
  \ DISPATCH_TIME_FOREVER) == 0) {\n            dispatch_sync(arrayQ, {() in\n   \
  \             if (self.data.count == 0 && self.itemCount < self.maxItemCount) {\n\
  \                    result = self.itemFactory();\n                    self.itemCount++;\n\
  \                } else {\n                    result = self.data.removeAtIndex(0);\n\
  \                }\n            })\n        }\n        return result;\n    }\n\n\
  \    func returnToPool(item:T) {\n        dispatch_async(arrayQ, {() in\n      \
  \      self.data.append(item);\n            dispatch_semaphore_signal(self.semaphore);\n\
  \        });\n    }\n\n    func processPoolItems(callback:[T] -> Void) {\n     \
  \   dispatch_barrier_sync(arrayQ, {() in\n            callback(self.data);\n   \
  \     });\n    }\n}\n```\n\n\n我已根据您的要求，对提供的文本进行了排版处理。以下是处理后的 Markdown 格式内容。\n\n\
  ---\n\n我已修改了 `Pool` 的初始化器，使其接收一个闭包，该闭包可用于为对象池创建新元素，并接收一个 `Int` 参数，用于指定闭包可被调用的最大次数。我将\
  \ Grand Central Dispatch 信号量的初始计数值设为最大元素数量，并在 `getFromPool` 方法中对对象池的状态进行了更复杂的检查，具体如下：\n\
  \n```\nif (self.data.count == 0 && self.itemCount < self.maxItemCount) {\n    result\
  \ = self.itemFactory();\n    self.itemCount++;\n} else {\n    result = self.data.removeAtIndex(0);\n\
  }\n```\n\n要执行到方法中的这一步，线程必须已通过信号量，这意味着要么 `data` 数组中存在一个等待使用的对象，要么我需要调用工厂闭包创建一个新对象。这使我能够将对象池中元素的创建延迟到有实际需求时再进行。\n\
  \n对 `Pool` 类的另一处修改是实现了一个名为 `processPoolItems` 的类型方法。在原始实现中，对象池中对象的创建职责归属于 `Library`\
  \ 类，该类会保留所有由它负责的 `Book` 对象的引用，并能够利用这些本地引用生成报告。而在当前实现中，创建对象的职责归属于 `Pool` 类，`Library`\
  \ 类根本不持有任何对象引用——因此我添加了 `processPoolItems` 方法，该方法接收一个回调闭包，并在同步 GCD 屏障代码块中将 `data`\
  \ 数组传递给它。\n\n> **提示**  \n> 你可以在代码清单 8-3 中看到我是如何实现 `Book` 工厂闭包的。我本可以在对象创建时保留对它们的引用，但\
  \ Swift 处理初始化器中定义的闭包的方式使得这一过程较为困难。因此，我让 `Pool` 类成为示例应用中 `Book` 对象详细信息的权威来源。\n\n\
  代码清单 8-3 展示了 `Library` 类相应的改动，以完成懒加载创建策略的实现。\n\n**代码清单 8-3. 在 Library.swift 文件中实现懒加载对象创建**\n\
  \n```\nimport Foundation\n\nfinal class Library {\n    private let pool:Pool<Book>;\n\
  \    private init(stockLevel:Int) {\n        var stockId = 1;\n        pool = Pool<Book>(maxItemCount:\
  \ stockLevel, factory: {() in\n            return BookSeller.buyBook(\"Dickens,\
  \ Charles\",\n                title: \"Hard Times\", stockNumber: stockId++)\n \
  \       });\n    }\n\n    private class var singleton:Library {\n        struct\
  \ SingletonWrapper {\n            static let singleton = Library(stockLevel:200);\n\
  \        }\n        return SingletonWrapper.singleton;\n    }\n\n    class func\
  \ checkoutBook(reader:String) -> Book? {\n        var book = singleton.pool.getFromPool();\n\
  \        book?.reader = reader;\n        book?.checkoutCount++;\n        return\
  \ book;\n    }\n\n    class func returnBook(book:Book) {\n        book.reader =\
  \ nil;\n        singleton.pool.returnToPool(book);\n    }\n\n    class func printReport()\
  \ {\n        singleton.pool.processPoolItems({(books) in\n            for book in\
  \ books {\n                println(\"...Book#\\(book.stockNumber)...\");\n     \
  \           println(\"Checked out \\(book.checkoutCount) times\");\n           \
  \     if (book.reader != nil) {\n                    println(\"Checked out to \\\
  (book.reader!)\");\n                } else {\n                    println(\"In stock\"\
  );\n                }\n            }\n            println(\"There are \\(books.count)\
  \ books in the pool\");\n        });\n    }\n}\n```\n\n改动幅度较小。我定义了将通过 `BookSeller`\
  \ 类用于创建 `Book` 对象的闭包，并更新了 `printReport` 方法，使其从对象池中获取数据项。此外，我将对象池中书籍的最大数量增加到了 200\
  \ 本，这远高于 `main.swift` 文件中的代码所产生的需求。\n\n> **注意**  \n> 这模拟了现实世界中图书馆与书商约定信用额度，并按需调用的场景。图书馆最初没有任何库存，但每当有借书请求且库存中没有书籍时，书商就会应要求送来一本，直到达到预设上限——在本例中是\
  \ 200 本。然而，只有在库存中没有书时才会要求送来新书——如果已有副本可用，图书馆会重新借出现有副本。\n\n通过运行应用程序，你可以看到懒加载策略的效果。在所有请求处理完毕后（可能需要\
  \ 15 到 20 秒），生成的报告结尾会声明对象池中有多少 `Book` 对象。\n\n```\n...\nThere are 14 books in the\
  \ pool\n```\n\n每次运行应用程序时，具体的书籍数量都会有所不同，因为我会随机给部分请求添加延迟，这会影响对象池对 `Book` 对象的复用频率。\n\
  \n最坏情况下会创建 20 本书，这意味着图书馆愿意购买的 200 本书是一个严重的高估。如果采用积极策略，全部 200 本副本都会被购买；而采用懒加载策略，我能够更贴近实际需求。\n\
  \n\n### 理解对象复用策略\n\n对象池模式的本质意味着由池管理的对象会被重复分配给使用者，这带来了对象以不良状态返回的风险。以现实世界的图书馆为例，这可能意味着书页被撕毁或缺失。在软件中，这意味着对象的状态不一致，或遇到了无法恢复的错误。\n\
  \n最简单的方法是信任策略，即你信任对象会以可复用的状态返回池中。这并不总是一个坏主意，因为并非所有对象都需要处理这类问题。目前由池管理的 `Book` 对象就是很好的例子，因为它们几乎不暴露可变公共状态。\n\
  \n另一种方法是怀疑策略，即在对象返回池中之前对其进行检查，以确保它们能被再次使用。无法复用的对象将从池中被剔除。\n\n**注意**\n\n怀疑策略应仅用于有能力替换被剔除对象的池。如果没有替换对象的能力，池可能会耗尽条目，应用程序也可能陷入停滞。详情请参见“理解空池策略”一节。\n\
  \n我将改变 `Book` 对象的使用方式，使它们只能从池中被借出特定次数，这反映了书籍会磨损并最终达到无法阅读状态的事实。我不想在通用的 `Pool` 类中构建任何关于\
  \ `Book` 类的知识，因此在一个名为 `PoolItem.swift` 的新文件中定义了一个名为 `PoolItem` 的协议，其内容如代码清单 8-4\
  \ 所示。\n\n**代码清单 8-4. `PoolItem.swift` 文件的内容**\n\n```\n@objc protocol PoolItem {\n\
  \    var canReuse:Bool {get}\n}\n```\n\n这个 `PoolItem` 协议定义了一个名为 `canReuse` 的只读属性。当条目被返回到池中时，我将读取此属性，并丢弃任何返回\
  \ `false` 的对象。代码清单 8-5 展示了 `Pool` 类中的相应更改。\n\n**提示**\n\n请注意，我已将 `@objc` 属性应用于此协议。这将允许我将对象向下转型为协议类型，以便在池类中读取\
  \ `canReuse` 属性。\n\n**代码清单 8-5. 在 `Pool.swift` 文件中添加对 `PoolItem` 协议的支持**\n\n```\n\
  import Foundation\n\nclass Pool<T:AnyObject> {\n    private var data = [T]();\n\
  \    private let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
  \    private let semaphore:dispatch_semaphore_t;\n    private var itemCount = 0;\n\
  \    private let maxItemCount:Int;\n    private let itemFactory: () -> T;\n\n  \
  \  init(maxItemCount:Int, factory:() -> T) {\n        self.itemFactory = factory;\n\
  \        self.maxItemCount = maxItemCount;\n        semaphore = dispatch_semaphore_create(maxItemCount);\n\
  \    }\n\n    func getFromPool() -> T? {\n        var result:T?;\n        if (dispatch_semaphore_wait(semaphore,\
  \ DISPATCH_TIME_FOREVER) == 0) {\n            dispatch_sync(arrayQ, {() in\n   \
  \             if (self.data.count == 0 && self.itemCount < self.maxItemCount) {\n\
  \                    result = self.itemFactory();\n                    self.itemCount++;\n\
  \                } else {\n                    result = self.data.removeAtIndex(0);\n\
  \                }\n            })\n        }\n        return result;\n    }\n\n\
  \    func returnToPool(item:T) {\n        dispatch_async(arrayQ, {() in\n      \
  \      let pitem = item as AnyObject as? PoolItem;\n            if (pitem == nil\
  \ || pitem!.canReuse) {\n                self.data.append(item);\n             \
  \   dispatch_semaphore_signal(self.semaphore);\n            }\n        });\n   \
  \ }\n\n    func processPoolItems(callback:[T] -> Void) {\n        dispatch_barrier_sync(arrayQ,\
  \ {() in\n            callback(self.data);\n        });\n    }\n}\n```\n\n我不想限制池可以处理的对象范围，因此仅当实现了\
  \ `PoolItem` 协议时，我才会检查可复用性。检查协议一致性只能在对协议应用 `@objc` 属性时进行，而应用该属性意味着它只能由类而非结构体实现。为了给\
  \ Swift 提供检查一致性所需的类型信息，我限制了 `Pool` 的泛型参数。\n\n```\n...\nclass Pool<T:AnyObject> {\n\
  ...\n```\n\n`AnyObject` 协议意味着 `Pool` 只能处理基于类的对象，这并非重大限制，因为对值类型进行池化毫无意义，毕竟在赋值给变量时它们会被复制。要检查对\
  \ `PoolItem` 协议的一致性，我需要给 Swift 一点帮助。\n\n```\n...\nlet pitem = item as AnyObject\
  \ as? PoolItem;\nif (pitem == nil || pitem!.canReuse) {\n    self.data.append(item);\n\
  \    dispatch_semaphore_signal(self.semaphore);\n}\n...\n```\n\n如果我将 `as?` 运算符直接用于\
  \ item 对象（其类型为 `T`——即 `Pool` 类中的泛型类型），则编译器会生成错误。我需要先将其转换为 `AnyObject`（这可以保证成功，因为类型\
  \ `T` 被限制为实现 `AnyObject` 协议的类），然后使用 `as?` 运算符来查看 `PoolItem` 协议是否已实现。\n\n其效果是，如果未实现\
  \ `PoolItem` 协议，或者实现了且 `canReuse` 属性的值为 `true`，则条目会返回池中。\n\n#### 应用协议\n\n下一步是应用\
  \ `PoolItem` 协议，以便 `Book` 对象在被从池中剔除之前可以被借出固定次数。代码清单 8-6 展示了我如何修改 `Book` 类以实现该协议。\n\
  \n**提示**\n\n请注意，我已将 `@objc` 属性添加到 `Book` 类。这是为了在 `Pool` 类中支持对 `PoolItem` 协议的一致性。\n\
  \n**代码清单 8-6. 在 `Book.swift` 文件中实现协议**\n\n```\nimport Foundation;\n\n@objc class\
  \ Book : PoolItem {\n    let author:String;\n    let title:String;\n    let stockNumber:Int;\n\
  \    var reader:String?\n    var checkoutCount = 0;\n\n    init(author:String, title:String,\
  \ stock:Int) {\n        self.author = author;\n        self.title = title;\n   \
  \     self.stockNumber = stock;\n    }\n\n    var canReuse:Bool {\n        get {\n\
  \            let reusable = checkoutCount < 5\n            if (!reusable) {\n  \
