  \n## 本章小结\n\n在本章中，我解释了如何使用 Xcode 创建 Playground 和命令行工具项目，这是我在本书中介绍设计模式的主要方式。在下一章中，我将介绍创建一个名为\
  \ SportsStore 的 iOS 应用程序的过程，为了提供尽可能多的示例并将模式置于更真实的场景中，我会将本书中的每种模式都应用到这个应用程序中。\n\n"
- "# 3. 创建 SportsStore 应用\n\n在上一章中，我向你展示了如何使用 Xcode 创建 Playground 和命令行工具，这是我在后续章节中介绍每种设计模式的方式。\n\
  \n我喜欢在我的书中提供尽可能多的代码示例，因此在本章中，我将创建一个名为 SportsStore 的 iOS 应用。我创建的这个应用完全是结构松散的，这意味着我只是尽可能直接地将代码和\
  \ UI 拼凑在一起，完全没有考虑其长期后果。当然，这与设计模式背道而驰，但这却是一种出奇常见的开发风格。在本书中，我将设计模式应用于这个结构松散的应用，以提供更多使用它们的上下文。\n\
  \n\n## 创建无结构的 iOS 应用项目\n\n在本节中，我将创建一个简单的 iOS 应用，允许用户从名为 **SportsStore** 的零售商处购买产品。为了创建一个无需复杂视觉布局、且能让我专注于代码结构的易懂示例，我将只实现购物流程中的部分功能。\n\
  \n这对我来说很幸运，因为我是世界上最差的界面设计师之一。当你看到我创建的 iOS 布局时，你就会感受到我审美上的匮乏——我们就称之为 **极简时尚** 并继续前进吧。（在我自己的项目中，我会与专业设计师合作，如果你也面临类似的审美挑战，我鼓励你这样做）。\n\
  \n我在本节中使用的开发风格被称为 **单类应用**，这种风格没有结构或设计。这是一种常见的开发风格，尤其对于面向对象语言经验较少的程序员来说更是如此。\n\n\
  这是我提出设计模式价值的 **”之前“** 状态，而在我向你介绍每种模式时，我会展示 **”之后“** 的状态。因此，我构建了这个应用，以便强调我所描述的设计模式的影响，但这种开发风格非常普遍，你几乎在任何项目中都能看到类似的代码，尤其是那些刚从面向对象语言转型的开发者的作品。我相信，如果你回想一下你认识的程序员，你至少能想到一个写出类似代码的人。\n\
  \n**提示：** 我一步一步描述创建应用的过程，因为许多读者是 Xcode 和 Swift 世界的新手。如果你是一位经验丰富的 Xcode 用户，那么你可以直接跳到\
  \ 第 4 章 并从 Apress.com 下载该项目。\n\n我将创建的应用是一个简单的库存管理工具，面向一家名为 **SportsStore** 的虚构体育器材零售商。我在我的大部分书籍中都使用了某种形式的\
  \ **SportsStore**，它让我能够突出展示如何使用不同的语言、平台和模式来解决常见问题。图 3-1 展示了我将为 **SportsStore** 应用创建的初始界面的模型。\n\
  \n![A978-1-4842-0394-1_3_Fig1_HTML.jpg](img/A978-1-4842-0394-1_3_Fig1_HTML.jpg)\n\
  \n**图 3-1.** SportsStore 示例应用的模型\n\n用户将看到一个以表格形式显示的产品列表。每个产品将显示其名称、描述以及当前库存数量。用户可以通过文本字段直接编辑库存水平，或使用步进器来增加或减少数值。\n\
  \n**示例应用的价值**\n\n我绝不想假装 **SportsStore** 应用本身很有用——但这并非示例的目的。示例的目标是提供一个框架，使我能够在比 playground\
  \ 或命令行工具中的代码片段更广泛的上下文中演示不同的模式。\n\n**SportsStore** 示例的复杂度恰到好处，足以让我演示如何应用各种模式，同时又无需处理诸如数据持久化、安全性、数据验证以及真实项目中必须考虑的所有其他棘手问题。\n\
  \n创建一个更真实的应用的问题在于，书中过多的篇幅将被用于编写与手头主题不直接相关的代码。这不是我想写的书，希望也不是你想读的那种书。\n\n### 创建项目\n\
  \n要创建一个新项目，请从 Xcode 的 **File** 菜单中选择 **New** ➤ **Project**。你将看到 Xcode 支持的项目类型列表。从\
  \ **iOS** ➤ **Application** 部分选择 **Single View Application**，如图 3-2 所示。\n\n![A978-1-4842-0394-1_3_Fig2_HTML.jpg](img/A978-1-4842-0394-1_3_Fig2_HTML.jpg)\n\
  \n**图 3-2.** 选择 Xcode 项目类型\n\n点击 **Next** 按钮，系统将要求你为新项目选择选项。将 **Product Name** 设置为\
  \ `SportsStore`，并分别将 **Organization Name** 和 **Identifier** 设置为 `Apress` 和 `com.apress`。确保\
  \ **Language** 选择了 `Swift`，**Devices** 选项选择了 `iPad`，并且 **Use Core Data** 选项未被勾选，如图\
  \ 3-3 所示。\n\n![A978-1-4842-0394-1_3_Fig3_HTML.jpg](img/A978-1-4842-0394-1_3_Fig3_HTML.jpg)\n\
  \n**图 3-3.** 为新 Xcode 项目选择选项\n\n点击 **Next** 按钮，系统将提示你选择项目文件的保存位置。选择一个方便的位置并点击 **Create**\
  \ 按钮以生成项目的初始内容。\n\n### 了解 Xcode 布局\n\nXcode 将创建项目，你会看到项目的默认视图，如图 3-4 所示。其布局及包含的面板与\
  \ 第 2 章 中描述的相同。\n\n![A978-1-4842-0394-1_3_Fig4_HTML.jpg](img/A978-1-4842-0394-1_3_Fig4_HTML.jpg)\n\
  \n**图 3-4.** Xcode 项目布局\n\n\n\n### 定义数据\n\n为了保持示例应用的简洁，我将静态定义产品数据。在真实应用中，这种做法并不实用，因为用户所做的更改无法持久保存，但对于本书来说已经足够了——我希望能专注于设计模式，而非搭建数据服务。\n\
  \n我将把所有代码定义在 Xcode 创建项目时生成的 `ViewController.swift` 文件中。在导航面板中找到该文件并点击。Xcode 将切换到代码编辑器。清单\
  \ 3-1 展示了 `ViewController.swift` 文件的内容，以及我为定义数据所做的修改。\n\n**清单 3-1.** 向 `ViewController.swift`\
  \ 文件添加数据\n\n```\nimport UIKit\n\nclass ViewController: UIViewController {\n\n  \
  \  var products = [\n        (\"Kayak\", \"A boat for one person\", \"Watersports\"\
  , 275.0, 10),\n        (\"Lifejacket\", \"Protective and fashionable\", \"Watersports\"\
  , 48.95, 14),\n        (\"Soccer Ball\", \"FIFA-approved size and weight\", \"Soccer\"\
  , 19.5, 32),\n        (\"Corner Flags\", \"Give your playing field a professional\
  \ touch\",\n            \"Soccer\", 34.95, 1),\n        (\"Stadium\", \"Flat-packed\
  \ 35,000-seat stadium\", \"Soccer\", 79500.0, 4),\n        (\"Thinking Cap\", \"\
  Improve your brain efficiency by 75%\", \"Chess\", 16.0, 8),\n        (\"Unsteady\
  \ Chair\", \"Secretly give your opponent a disadvantage\",\n            \"Chess\"\
  , 29.95, 3),\n        (\"Human Chess Board\", \"A fun game for the family\", \"\
  Chess\", 75.0, 2),\n        (\"Bling-Bling King\", \"Gold-plated, diamond-studded\
  \ King\",\n            \"Chess\", 1200.0, 4)];\n\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n    }\n\n    override func didReceiveMemoryWarning()\
  \ {\n        super.didReceiveMemoryWarning()\n    }\n\n}\n```\n\n> **提示**  \n> **视图控制器**这个术语涉及\
  \ Swift/Cocoa 开发中最重要的模式之一，即*模型/视图/控制器（MVC）*。该模式贯穿于 iOS 开发始终，我将在第 5 部分深入介绍。本章中，我将暂时忽略\
  \ MVC 模式，将所需的大部分代码集中到一个类中。\n\n我创建了一个名为 `products` 的变量，并为其赋值一个由元组组成的数组，每个元组代表一个产品。元组可以轻松地将多个值组合在一起。有关元组如何定义和使用的快速说明，请参阅“使用元组”边栏。\n\
  \n> **提示**  \n> Swift 在赋值字面浮点值（如 `19.5`）时，会使用 `Double` 类型，即使本可以使用更小的 `Float` 类型。我本可以通过显式指定类型来强制使用\
  \ `Float` 值——即 `Float(19.5)`——但为了保持示例的简洁，我将接受使用 `Double` 值。\n\n---\n\n### 使用元组\n\
  \n为了演示元组的使用，我创建了一个名为 `Tuples.playground` 的新 playground。我已将该 playground 包含在本书附带的免费源代码下载中。它包含以下代码：\n\
  \n```\nimport Foundation;\n\nvar myProduct = (\"Kayak\", \"A boat for one person\"\
  , \"Watersports\", 275.0, 10);\n\nfunc writeProductDetails(product: (String, String,\
  \ String, Double, Int)) {\n    println(\"Name: \\(product.0)\");\n    println(\"\
  Description: \\(product.1)\");\n    println(\"Category: \\(product.2)\");\n    let\
  \ formattedPrice = NSString(format: \"$%.2lf\", product.3);\n    println(\"Price:\
  \ \\(formattedPrice)\");\n}\n\nwriteProductDetails(myProduct);\n```\n\n该 playground\
  \ 中的代码定义了一个元组和一个函数，该函数将其各个值的详细信息打印到控制台。请注意，要在函数中将元组作为参数接受，我需要将各个值的类型指定为逗号分隔的列表，这与创建元组的方式类似，如下所示：\n\
  \n```\n...\nfunc writeProductDetails(product: (String, String, String, Double, Int))\
  \ {\n...\n```\n\n在元组中使用字面数值时必须小心，因为 Swift 会自动为值选择类型。这就是为什么我在 playground 中将产品价格指定为\
  \ `275.0`。如果我省略了小数部分，Swift 会创建一个 `(String, String, String, Int, Int)` 元组，该元组将无法被\
  \ `writeProductDetails` 函数接受为参数。\n\n在函数内部，我通过引用索引来访问元组中的值，如下所示：\n\n```\n...\nprintln(\"\
  Description: \\(product.1)\");\n...\n```\n\n表达式 `product.1` 引用作为参数传递给 `writeProductDetails`\
  \ 函数的元组中索引 1 处的值。元组索引从零开始，这意味着此表达式的计算结果为 `A boat for one person`。\n\n我在 playground\
  \ 中使用了 `NSString` 类来格式化产品价格。Swift 使得与不同的 Cocoa 框架（包括提供字符串格式化等核心功能的 `Foundation`\
  \ 框架）协同工作变得非常容易。\n\n要查看 playground 中代码的效果，请从“视图”菜单中选择**助理编辑器 ➤ 显示助理编辑器**。控制台输出将如下所示：\n\
  \n```\nName: Kayak\nDescription: A boat for one person\nCategory: Watersports\n\
  Price: $275.00\n```\n\n元组是定义数据类型的一种便捷方式，但它们也有局限性，我将在第 4 章中解释。\n\n---\n\n## 创建基本布局\n\
