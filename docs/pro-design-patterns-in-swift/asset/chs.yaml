  \ 中定义的任何变量的值历史，但数值类型的数据展示效果最好。\n\n### 关于编码风格的一点说明\n\n你会注意到，我在整本书中都使用分号来结束语句，尽管 Swift\
  \ 并不要求在语句后使用分号，除非你需要在一行中分隔多个语句。\n\n虽然这不是 Swift 的要求，但我几十年来一直使用需要分号的语言编写代码，而且——尽管我尝试过——我无法改掉这个习惯。对我来说，未结束的语句看起来总是不对劲，我会自动按下分号键。我曾考虑过通读每一章并删除分号，但那会导致示例出错，而我努力在书中避免这种情况。因此，带着歉意，我决定让我的偏好自然体现，在列表中使用分号。不过，你不必遵循我的风格：Swift\
  \ 的优点之一是其对代码风格宽松的处理方式，你完全可以自由地表达自己的偏好和习惯（如果你愿意，也可以添加不必要的分号）。\n\n### 使用值时间线\n\n在“值历史”面板的底部有一个滑块，你可以用它来查看变量值在代码执行期间的变化情况。当有多个变量需要查看时，这个滑块的效果更容易体现。在列表\
  \ 2-3 中，我向 playground 添加了一些额外的语句。\n\n列表 2-3. 向 `MyFirstPlayground.playground` 文件中添加额外语句\n\
  \n```\nimport UIKit\nvar str = \"Hello, playground\"\nvar counter = 0;\nvar secondCounter\
  \ = 0;\nfor (var i = 0; i < 10; i++) {\n    counter += i;\n    println(\"Counter:\
  \ \\(counter)\");\n    for j in 1...10 {\n        secondCounter += j;\n    }\n}\n\
  ```\n\n通过点击 `for` 循环中语句右侧的圆形按钮，显示 `counter` 和 `secondCounter` 变量的值历史。你将看到两个独立的图表，通过左右拖动播放头（面板底部的红色竖条）可以移动到代码执行的不同时间点，从而查看变量值之间的关系，如图\
  \ 2-7 所示。\n\n![A978-1-4842-0394-1_2_Fig7_HTML.jpg](img/A978-1-4842-0394-1_2_Fig7_HTML.jpg)\n\
  \n图 2-7. 在 playground 中查看变量值时间线\n\n### 在 Playground 中显示 UI 组件\n\nPlayground 还可用于显示\
  \ UI 组件，我依靠它来演示 Cocoa 如何实现一些模式。列表 2-4 展示了我如何修改 playground 以显示一个文本字段。\n\n列表 2-4. 向\
  \ `MyFirstPlayground.playground` 文件中添加 UI 组件\n\n```\nimport UIKit\nvar str = \"\
  Hello, playground\"\nvar counter = 0;\nvar secondCounter = 0;\nfor (var i = 0; i\
  \ < 10; i++) {\n    counter += i;\n    println(\"Counter: \\(counter)\");\n    for\
  \ j in 1...10 {\n        secondCounter += j;\n    }\n}\nlet textField = UITextField(frame:\
  \ CGRectMake(0, 0, 200, 50));\ntextField.text = \"Hello\";\ntextField.borderStyle\
  \ = UITextBorderStyle.Bezel;\ntextField;\n```\n\n在 playground 中使用 UI 组件与常规 Xcode\
  \ 项目有两个重要区别。第一个区别是你必须使用带有 `frame` 参数的初始化器，并使用 `CGRectMake` 函数生成一个包含该组件的框架，如下所示：\n\
  \n```\n...\nlet textField = UITextField(frame: CGRectMake(0, 0, 200, 50));\n...\n\
  ```\n\n`CGRectMake` 函数的参数是包含组件的框架边界，其中第三和第四个值定义了宽度和高度。我指定了一个宽 200 像素、高 50 像素的框架，这对于一个文本字段来说足够了。\n\
  \n第二个区别是 playground 中的最后一条语句，它只包含了我为其分配 UI 组件的变量名。\n\n```\n...\ntextField;\n...\n\
  ```\n\n这是必需的，以便 Xcode 会在语句右侧提供加号图标；点击该图标会在辅助编辑器中显示该组件，如图 2-8 所示。辅助编辑器面板显示语句的结果，因此需要一个返回已配置\
  \ UI 组件对象的语句。\n\n![A978-1-4842-0394-1_2_Fig8_HTML.jpg](img/A978-1-4842-0394-1_2_Fig8_HTML.jpg)\n\
  \n图 2-8. 在 playground 中显示 UI 组件\n\n## 使用 OS X 命令行工具项目\n\nOS X 命令行工具项目非常适合演示 Swift\
