  \n图 3-7.\n\n添加基本布局组件\n\n### 配置自动布局\n\n下一步是指定组件在设备屏幕上的定位方式。布局在故事板编辑器中看起来不错，但 iOS\
  \ 设备支持多种分辨率，并且应用程序可能以纵向或横向模式显示。自动布局是一项允许指定组件相对于其容器或其他组件的大小和位置的功能。在本节中，我将为表格定义布局。\n\
  \n自动布局通过指定约束来工作，这些约束固定了组件相对于其容器或其他组件的位置和大小。您可以使用代码语句来指定约束，但使用 UI Builder 提供的拖放支持更简单。\n\
  \n设置约束最可靠的方法是使用控件层级，因为这样可以轻松确保为正确的组件定义约束。要创建第一个约束，请按住 Control 键并从 `Table View` 拖拽到层级中的\
  \ `View` 项。释放鼠标按钮时，将出现一个弹出菜单，如图 3-8 所示，该图显示了故事板中视图左侧立即显示的对象层级。\n\n![A978-1-4842-0394-1_3_Fig8_HTML.jpg](img/A978-1-4842-0394-1_3_Fig8_HTML.jpg)\n\
  \n图 3-8.\n\n使用组件层级应用约束\n\n按住 Shift 键并选择以下项目：\n\n*   领先间距到容器边距\n*   尾部间距到容器边距\n*\
  \   顶部间距到顶部布局参考线\n\n选择了所有三个菜单项后，点击弹出菜单外部将其关闭。组件层级中会出现一个新的 `Constraints` 项来包含这些约束，这些约束的作用是确保表格视图的顶部、左侧和右侧边缘始终与容器的边缘接触，无论布局大小如何。\n\
  \n表 3-2 显示了所需的其余约束，所有约束都使用相同的技术创建。\n\n提示\n\n对于表中的最后一个约束，请按住 Control 键拖拽并释放，使线的两端都位于控件层级中\
  \ `Label` 项的边界内。\n\n表 3-2.\n\n基本布局所需的约束\n\n| 拖拽自 | 拖拽至 | 约束 |\n| --- | --- | ---\
  \ |\n| `Label` | `View` | `领先间距到容器边距` `尾部间距到容器边距` `底部间距到底部布局参考线` |\n| `Table View`\
  \ | `Label` | `垂直间距` |\n| `Label` | `Label` | `高度` |\n\n### 测试基本布局\n\n在进一步操作之前，我想检查布局及其约束是否正确设置。要构建并测试应用程序，请点击\
