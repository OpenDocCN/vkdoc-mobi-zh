  \n\n\n### 创建引用\n\n我在上一节中使用 Interface Builder 编辑的故事板文件是一个 XML 文件。这个文件定义了用户界面组件的布局和配置，但还需要一个额外的步骤，才能从应用程序代码中访问那些在运行时创建的组件实例（例如标签）。\n\
  \n> **提示：** 您可以通过在导航器面板中右键单击或按住 Control 键单击该文件，然后从弹出菜单中选择 **打开方式 ➤ 源代码** 来查看 XML\
  \ 内容。\n\nXcode 有一个名为“助理编辑器”的功能，它会显示与主编辑器区域中显示的文件在逻辑上相关的内容。从“视图”菜单中选择 **助理编辑器 ➤ 显示助理编辑器**，Xcode\
  \ 会向布局中添加一个新的窗格，该窗格将显示 `ViewController.swift` 文件的内容。\n\n> **提示：** Xcode 会自动选择要在助理编辑器中显示的文件，但它并不总是能显示您想要的文件。您可以通过\
  \ Option 键单击导航器面板中的某个文件，来明确选择要在助理编辑器窗格中显示的文件。\n\n按住 Control 键单击视图控制器场景组件层次结构中的 `Label`，并将其拖拽到助理编辑器中。将鼠标指针定位到\
  \ `class` 定义和 `product` 变量下方，然后松开鼠标。会弹出一个窗口，允许您配置一个输出口，该输出口是应用程序布局所创建的标签实例与 `UIViewController`\
  \ 类之间的关联，如图 3-11 所示。\n\n![A978-1-4842-0394-1_3_Fig11_HTML.jpg](img/A978-1-4842-0394-1_3_Fig11_HTML.jpg)\n\
  \n**图 3-11.** 为标签创建输出口\n\n将 `名称` 字段设置为 `totalStockLabel`，然后点击 **连接** 按钮。Xcode 将会向\
  \ `ViewController` 类添加一个新变量，如代码清单 3-2 所示。（您无法手动添加此代码语句，因为 Xcode 会在幕后对项目进行其他更改）。\n\
