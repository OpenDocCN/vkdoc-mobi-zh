  \      }\n        });\n    }\n}\n...\n```\n\n新方法名为 `countEdges`，它计算集合中形状的边总数。清单\
  \ 25-4 展示了我在 `main.swift` 文件中添加的用于测试新方法的语句。\n\n**清单 25-4.** 在 `main.swift` 文件中使用新方法\n\
  \n```\nlet shapes = ShapeCollection();\nlet area = shapes.calculateAreas();\nprintln(\"\
