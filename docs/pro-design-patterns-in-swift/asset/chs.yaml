  \ 1304\n```\n\n使用享元模式可以让每个 `Spreadsheet` 对象复用相同的外在数据，并且其影响会随着 `Spreadsheet` 对象数量的增加而增大。\n\
  \n\n\n## 享元模式的变体\n\n写时复制技术是享元模式的一种变体，它依赖一个外部对象，直到调用组件想要修改该对象。此时，该外部对象会被复制并随后修改，享元不再使用该外部数据。根据应用程序的需求，可以复制外部数据的一部分或全部内容。写时复制技术将享元模式与我在第\
  \ 5 章中描述的原型模式结合了起来。清单 17-9 显示了`CopyOnWrite.playground`文件的内容，我创建此文件作为演示。\n\n```\n\
  import Foundation;\n\nclass Owner : NSObject, NSCopying {\n\n    var name:String;\n\
  \    var city:String;\n\n    init(name:String, city:String) {\n        self.name\
  \ = name; self.city = city;\n    }\n\n    func copyWithZone(zone: NSZone) -> AnyObject\
  \ {\n        println(\"Copy\");\n        return Owner(name: self.name, city: self.city);\n\
  \    }\n}\n\nclass FlyweightFactory {\n\n    class func createFlyweight() -> Flyweight\
  \ {\n        return Flyweight(owner: ownerSingleton);\n    }\n\n    private class\
  \ var ownerSingleton:Owner {\n        get {\n            struct singletonWrapper\
  \ {\n                static let singleon = Owner(name: \"Anonymous\", city: \"Anywhere\"\
  );\n            }\n            return singletonWrapper.singleon;\n        }\n  \
  \  }\n}\n\nclass Flyweight {\n\n    private let extrinsicOwner:Owner;\n    private\
  \ var intrinsicOwner:Owner?;\n\n    init(owner:Owner) {\n        self.extrinsicOwner\
  \ = owner;\n    }\n\n    var name:String {\n        get {\n            return intrinsicOwner?.name\
  \ ?? extrinsicOwner.name;\n        }\n        set (value) {\n            decoupleFromExtrinsic();\n\
  \            intrinsicOwner?.name = value;\n        }\n    }\n\n    var city:String\
  \ {\n        get {\n            return intrinsicOwner?.city ?? extrinsicOwner.city;\n\
  \        }\n        set (value) {\n            decoupleFromExtrinsic();\n      \
  \      intrinsicOwner?.city = value;\n        }\n    }\n\n    private func decoupleFromExtrinsic()\
  \ {\n        if (intrinsicOwner == nil) {\n            intrinsicOwner = extrinsicOwner.copyWithZone(nil)\
  \ as? Owner;\n        }\n    }\n}\n```\n\n`FlyweightFactory`类使用单例模式来定义外部的`Owner`对象，该对象会被传递给新的`Flyweight`对象。`Flyweight`类使用外部的`Owner`对象来提供其`name`和`city`属性的值，直到这两个属性中的设置器被使用。此时，会应用原型模式来复制外部对象，以创建一个内部克隆，然后将设置器的值应用于该克隆。一旦属性设置器被使用，`Flyweight`对象就不再使用外部对象。\n\
  \n## 理解享元模式的陷阱\n\n在实现享元模式时，有几个陷阱需要避免。享元模式并**不特别复杂**，尤其与我在第 7 章中描述的对象池等模式相比，但很容易创建出一种引发更多问题而非解决问题的实现。\n\
  \n### 理解外部数据重复陷阱\n\n最容易掉入的陷阱是创建了超出预期的*过多*外部数据，从而破坏了享元模式的效率。在 Swift 中，这通常是因为创建类变量的困难以及使用结构体实现类变量的局限性所导致的。你必须确保外部数据作为单例初始化的一部分被创建，并且数据是以线程安全的方式创建的。正是出于这个原因，我为`Dictionary`类定义了一个扩展，允许我指定一个闭包，用于在示例应用中填充外部数据集合。\n\
  \n### 理解可变外部数据陷阱\n\n如果你允许调用组件修改外部数据，将会产生两个不同的问题：并发访问破坏数据的风险，以及享元获取到不一致的数据。享元使用的外部数据必须是不可变的，允许其被修改是一个常见的陷阱，会导致奇怪的行为和运行时错误。\n\
  \n### 理解并发访问陷阱\n\n正如本章前面所述，享元模式并未对享元对象的使用方式施加任何限制，因此，在调用组件允许享元被多个线程使用的情况下，保护内部数据免受并发访问*至关重要*。你不必使用我应用于示例享元类的那种基于屏障的方法，甚至不必使用\
  \ GCD，但你必须添加某种形式的保护，因为许多单线程应用程序在某个时候会转变为多线程应用程序。\n\n> **提示**  \n> 你无需为外部数据添加保护，这些数据应该是不可变的。外部数据出现并发问题是你的享元实现存在缺陷的一个迹象。\n\
  \n### 理解过度优化陷阱\n\n很容易在优化对象创建的过程中迷失方向，以至于最终得到的实现使得修改外部数据变得困难。这种陷阱最常见的形式是，当外部对象所代表的值是由一个可预测的算法生成时。在示例应用中，我将每个`Cell`对象的值设置为行的索引，这意味着我可以在享元工厂类的实现中更进一步，仅按需创建`Cell`对象，利用行号即时生成该对象。\n\
  \n这种方法有几个问题。首先是缺乏*灵活性*。用于生成值的算法很少像我的例子中那样简单，而且生成值的过程可能非常复杂，以至于当实现不同算法时，生成的代码很难更改。\n\
  \n第二个问题是，享元类和调用组件必须能够在不知晓对象是按需创建的情况下执行业务。以我的示例应用为例，这意味着要允许享元类能够获取`Cell`对象的总数以及`value`属性的总和，而无需创建这些任务通常所需的所有对象。享元工厂只有在对外部数据有深入洞察的情况下才能提供这些信息，这进一步增加了代码的复杂性和*不*灵活性。\n\
  \n我的建议是，接受一组共享的外部对象已经是足够大的优化，而*进一*步优化收效甚微，但会*增加*大量复杂性和维护风险。\n\n### 理解误用陷阱\n\n最后一个陷阱是*在不需要*时应用享元模式。为了使额外的开发时间和测试物有所值，享元只应应用于大量相似对象依赖一组庞大公共数据集的情况。如果外部数据不大，或者创建它不需要太多工作，那么实现享元模式所需的工作可能是不值得的。\n\
  \n\n\n## Cocoa 中享元模式的示例\n\nCocoa 框架中有几个享元模式的实现。我觉得最有趣的是 `NSNumber` 类，它用于表示数值。通过管理两个使用相同值创建的\
  \ `NSNumber` 对象，该值成为了一个外在数据项——这可能会让粗心的人出错。清单 17-10 展示了我创建的用于演示的 `Numbers.playground`\
  \ 文件的内容。\n\n**清单 17-10. `Numbers.playground` 文件的内容**\n\n```\nimport Foundation;\n\
  \nlet num1 = NSNumber(int: 10);\n\nlet num2 = NSNumber(int: 10);\n\nprintln(\"Comparison:\
  \ \\(num1 == num2)\");\n\nprintln(\"Identity:   \\(num1 === num2)\");\n```\n\n我创建了两个\
  \ `NSNumber` 对象，它们都存储了整数值 `10`。然后我打印出了使用比较运算符和身份运算符的结果。调试控制台显示以下输出：\n\n```\nComparison:\
  \ true\n\nIdentity: true\n```\n\n比较运算符的结果合乎情理，但身份运算符的结果可能会让你感到惊讶。Cocoa 通过共享 `NSNumber`\
  \ 对象来最小化其所需的内存。这是一种许多语言应用于字符串值的技巧，使用一个称为字符串驻留（string interning）的进程，该进程能减少用于存储字符串的内存，并加快字符串比较的速度。Cocoa\
  \ 确实为 `NSString` 类实现了字符串驻留，但在 Swift 中使用比较困难，而 `NSNumber` 类则提供了一个更简单的示例。\n\n## 将模式应用于\
  \ SportsStore 应用程序\n\nSportsStore 应用程序包含 `NetworkConnection` 类，我用它来模拟对库存水平数据的网络查询。每个\
  \ `NetworkConnection` 实例都包含一个库存值的字典，用于满足数据请求。以下是 `NetworkConnection` 类的定义：\n\n```\n\
  ...\n\nclass NetworkConnection {\n\n    private let stockData: [String: Int] = [\n\
  \n        \"Kayak\" : 10, \"Lifejacket\": 14, \"Soccer Ball\": 32,\"Corner Flags\"\
  : 1,\n\n        \"Stadium\": 4, \"Thinking Cap\": 8, \"Unsteady Chair\": 3,\n\n\
  \        \"Human Chess Board\": 2, \"Bling-Bling King\":4\n\n    ];\n\n    func\
  \ getStockLevel(name:String) -> Int? {\n\n        NSThread.sleepForTimeInterval(Double(rand()\
  \ % 2));\n\n        return stockData[name];\n\n    }\n\n}\n\n...\n```\n\n在本节中，我将应用享元模式，以便所有\
  \ `NetworkConnection` 对象都共享同一个字典对象。我要共享的字典创建起来并不复杂，也不占用太多内存，但它仍然为享元模式的应用提供了一个基础。\n\
  \n### 准备示例应用程序\n\n本章不需要做任何准备，我将直接从第 16 章结束的地方开始，继续处理 SportsStore 项目。\n\n### 创建享元协议和实现类\n\
  \n在实现享元模式时，我总是遵循相同的流程：先定义调用组件将要使用的协议，然后是享元实现类。这使我能够专注于协议中将被公开使用的 API，并在实现类中区分内在数据和外在数据。清单\
  \ 17-11 展示了 `NetworkConnectionFlyweight.swift` 文件的内容，我将其添加到 SportsStore 项目中以实现享元模式。\n\
  \n**清单 17-11. `NetworkConnectionFlyweight.swift` 文件的内容**\n\n```\nprotocol NetConnFlyweight\
  \ {\n\n    func getStockLevel(name:String) -> Int?;\n\n}\n\nclass NetConnFlyweightImpl\
  \ : NetConnFlyweight {\n\n    private let extrinsicData:[String: Int];\n\n    private\
  \ init(data:[String: Int]) {\n\n        self.extrinsicData = data;\n\n    }\n\n\
  \    func getStockLevel(name: String) -> Int? {\n\n        return extrinsicData[name];\n\
  \n    }\n\n}\n```\n\n这种模式的实现很简单，但我选择通过一个方法来暴露数据值，而不是提供一个允许访问字典的属性。我这样做是因为，这意味着我可以更改数据的存储方式，而无需更新协议（以及使用它的组件），并且这有助于确保我不会无意中允许修改外在数据（当你允许直接访问外在数据结构时，很容易发生这种情况）。\n\
  \n### 创建享元工厂\n\n定义了协议和实现类之后，我通过定义工厂及其管理的外在数据来完成享元模式。清单 17-12 展示了工厂类的定义。\n\n**清单\
  \ 17-12. 在 `NetworkConnectionFlyweight.swift` 文件中定义享元工厂类**\n\n```\nprotocol NetConnFlyweight\
  \ {\n\n    func getStockLevel(name:String) -> Int?;\n\n}\n\nclass NetConnFlyweightImpl\
  \ : NetConnFlyweight {\n\n    // ...为简洁起见省略了语句...\n\n}\n\nclass NetConnFlyweightFactory\
  \ {\n\n    class func createFlyweight() -> NetConnFlyweight {\n\n        return\
  \ NetConnFlyweightImpl(data: stockData);\n\n    }\n\n    private class var stockData:[String:\
  \ Int] {\n\n        get {\n\n            struct singletonWrapper {\n\n         \
  \       static let singleton = [\"Kayak\" : 10, \"Lifejacket\": 14,\n\n        \
  \            \"Soccer Ball\": 32,\"Corner Flags\": 1, \"Stadium\": 4,\n\n      \
  \              \"Thinking Cap\": 8, \"Unsteady Chair\": 3,\n\n                 \
  \   \"Human Chess Board\": 2, \"Bling-Bling King\":4\n\n                ];\n\n \
  \           }\n\n            return singletonWrapper.singleton;\n\n        }\n\n\
  \    }\n\n}\n```\n\n`NetConnFlyweightFactory` 类使用单例模式来确保外在数据只被创建一次，并定义了一个 `createFlyweight`\
  \ 方法，该方法使用外在数据来创建实现类的实例。\n\n### 应用享元\n\n最后一步是更新 `NetworkConnection` 类，使其使用享元并共享一个不可变的单一外部库存数据数组，如清单\
  \ 17-13 所示。\n\n**清单 17-13. 在 `NetworkConnection.swift` 文件中使用享元**\n\n```\nimport\
  \ Foundation\n\nclass NetworkConnection {\n\n    private let flyweight:NetConnFlyweight;\n\
  \n    init() {\n\n        self.flyweight = NetConnFlyweightFactory.createFlyweight();\n\
  \n    }\n\n    func getStockLevel(name:String) -> Int? {\n\n        NSThread.sleepForTimeInterval(Double(rand()\
  \ % 2));\n\n        return self.flyweight.getStockLevel(name);\n\n    }\n\n}\n```\n\
  \n我移除了本地的数据数组，并修改了 `getStockLevel` 方法的实现，使其使用享元来获取数据值。\n\n## 总结\n\n在本章中，我解释了如何使用享元模式在对象之间共享外在数据，以减少应用程序的内存占用以及生成相同数据对象集所需的工作量。在下一章中，我将描述代理模式，当一个对象需要作为某个资源或另一个对象的代表时，会使用该模式。\n\
  \n\n\n"
- "# 18. 代理模式\n\n本章将介绍代理模式。当需要一个对象作为另一个对象或资源的接口时，通常会使用该模式。代理模式主要有三种应用方式，我将分别对它们进行阐述，并演示其实现方法。表\
  \ 18-1 对代理模式进行了概述。\n\n**表 18-1.** 代理模式概述\n\n| 问题 | 答案 |\n| --- | --- |\n| 什么是代理模式？\
  \ | 代理模式定义了一个对象——即代理——该对象代表其他某些资源，例如另一个对象或远程服务。调用组件对代理进行操作，而代理则负责对底层资源进行操作。 |\n\
  | 优点是什么？ | 代理能够精确控制访问底层资源的方式，这在需要拦截或调整操作时非常有用。 |\n| 何时使用该模式？ | 代理主要用于三种情况：为远程资源（如网页或\
  \ RESTful 服务）定义接口；管理耗时操作的执行；限制其他对象的方法和属性的访问权限。 |\n| 何时应避免使用该模式？ | 当问题不属于本章所述三种情况时，请勿使用此模式。应改用其他结构型模式。\
  \ |\n| 如何判断模式实现是否正确？ | 当代理对象能够用于对其所代表的资源执行操作时，即表示实现正确。 |\n| 常见陷阱有哪些？ | 唯一陷阱是，在使用代理限制对象访问时，仍允许实例化底层类的实例。\
  \ |\n| 是否有相关模式？ | 许多结构型模式具有相似的实现但意图不同。请确保从本书本部分描述的多种模式中，选择正确的模式。 |\n\n## 准备示例项目\n\
  \n本章中，我创建了一个名为 `Proxy` 的 Xcode OS X 命令行工具项目。代码清单 18-1 展示了我添加到 `main.swift` 文件中为本节准备的代码。\n\
  \n**代码清单 18-1.** `main.swift` 文件内容\n\n```\nimport Foundation;\n\nfunc getHeader(header:String)\
  \ {\n\nlet url = NSURL(string: \"http://www.apress.com\");\n\nlet request = NSURLRequest(URL:\
  \ url!);\n\nNSURLSession.sharedSession().dataTaskWithRequest(request,\n\ncompletionHandler:\
  \ {data, response, error in\n\nif let httpResponse = response as? NSHTTPURLResponse\
  \ {\n\nif let headerValue\n\n= httpResponse.allHeaderFields[header] as? NSString\
  \ {\n\nprintln(\"\\(header): \\(headerValue)\");\n\n}\n\n}\n\n}).resume();\n\n}\n\
  \nlet headers = [\"Content-Length\", \"Content-Encoding\"];\n\nfor header in headers\
  \ {\n\ngetHeader(header);\n\n}\n\nNSFileHandle.fileHandleWithStandardInput().availableData;\n\
  ```\n\n`main.swift` 文件中的代码向 Apress 主页发起 HTTP 请求，并将 `Content-Length` 和 `Content-Encoding`\
  \ 标头的值打印到调试控制台。运行该应用程序将产生以下输出：\n\n```\nContent-Encoding: gzip\nContent-Length: 13960\n\
  ```\n\n你可能看到 `Content-Length` 标头先显示。这是因为执行 HTTP 请求的 `Foundation` 框架类是非异步的，并且请求是并发执行的，这意味着任一请求都可能先完成并将结果写入控制台。当你运行示例应用程序时，几乎肯定会看到不同的标头值，因为\
  \ Apress 经常更改其网站主页上的内容。\n\n## 理解该模式解决的问题\n\n代理模式用于解决三种不同的问题，我将在后续小节中逐一解释。\n\n###\
  \ 理解远程对象问题\n\n当你处理通过网络访问的资源（例如网页或 RESTful Web 服务）时，就会出现远程对象问题。`main.swift` 文件中的代码访问了一个网页，但它并未将其提供的功能（获取\
  \ HTTP 响应标头）与用于发起请求的机制（`NSURL`、`NSURLRequest` 和 `NSURLSession` 类）分离开来。这段代码中没有抽象或封装，更改实现将影响功能被使用的方式——如果这类代码被复制到任何需要读取\
  \ HTTP 标头的组件中，情况会更糟。\n\n### 理解耗时操作问题\n\n诸如发起 HTTP 请求之类的任务被视为耗时操作。“耗时”一词用于指代操作中任何应尽量减少的方面，例如所需计算量、所需内存、设备电池负载、消耗的带宽以及用户必须等待的耗时。\n\
  \n对于 HTTP 请求，主要的开销是耗时、带宽以及服务器为生成响应必须执行的工作。`main.swift` 文件中的代码并未尝试优化 HTTP 请求的执行方式来最小化操作成本，也未考虑这对用户、网络或接收请求的服务器产生的影响。\n\
  \n### 理解访问受限问题\n\n当将单用户框架集成到多用户应用程序时，通常会出现需要限制对象访问的情况。你无法更改需要保护的对象的定义，因为你无法访问其源代码，或者因为应用程序中其他位置已存在对该类型的依赖，但同样，你不能让任何用户执行该对象封装的操作。\n\
  \n## 理解代理模式\n\n每当需要一个对象来表示其他某种资源时，就可以使用代理模式。如你所见，该资源可以是抽象的事物（如一个网页），也可以是应用程序本地的资源（如另一个对象）。图\
  \ 18-1 展示了代理模式的一般形式。\n\n![A978-1-4842-0394-1_18_Fig1_HTML.jpg](img/A978-1-4842-0394-1_18_Fig1_HTML.jpg)\n\
  \n**图 18-1.** 代理模式\n\n代理模式的一般形式缺乏特异性，但这正是因为它可用于多种不同的情况。为了具体说明该模式，在接下来的小节中，我将解释如何使用该模式来解决本章前面描述的三种常见问题。\n\
  \n\n\n### 解决远程对象问题\n\n使用代理模式来表示远程对象和资源，其根源可追溯到如 CORBA 这样的分布式系统，该系统提供了一个本地对象，该对象公开了与服务器上相应远程对象相同的方法。这个本地对象就是代理，调用其某个方法会导致在远程对象上调用相应的方法。CORBA\
  \ 负责将代理对象映射到远程对象，并处理参数和结果。\n\nCORBA 已不再广泛使用，但随着 HTTP 成为首选传输协议，RESTful 服务日益流行，代理模式重新变得重要。代理模式可用于简化对远程资源的操作，并隐藏远程资源所提供功能背后的实现细节。这正是设计模式尤其擅长解决的问题：抽象功能，使得可以在不改变功能使用方式的前提下更改实现机制；封装功能，使得实现不会在应用程序中重复。图\
  \ 18-2 展示了如何使用代理来表示远程资源。\n\n![A978-1-4842-0394-1_18_Fig2_HTML.jpg](img/A978-1-4842-0394-1_18_Fig2_HTML.jpg)\n\
  图 18-2. 使用代理模式表示远程资源\n\n代理对象隐藏了访问远程资源的细节，仅呈现其数据，在示例应用程序中，这些数据就是 HTTP 标头的值。使用代理将远程请求的机制整合到应用程序中的单个类中，并允许在不更改使用代理的组件的情况下更改实现——例如，使用其他\
  \ Cocoa 类。\n\n### 解决高开销操作问题\n\n代理可以通过将操作与其使用解耦，来最大程度地降低高开销操作的成本。就示例应用程序而言，我可以将多个标头值的请求合并为单个请求，如图\
  \ 18-3 所示。\n\n![A978-1-4842-0394-1_18_Fig3_HTML.jpg](img/A978-1-4842-0394-1_18_Fig3_HTML.jpg)\n\
  图 18-3. 使用代理合并操作\n\n显然，我占了选择适配模式的示例的便宜，但高开销操作通常可以合并，或者至少可以延迟到执行成本较低时再进行。\n\n###\
  \ 解决访问受限问题\n\n代理可以用作对象的包装器，添加额外的逻辑以强制执行某种使用限制，如图 18-4 所示。\n\n![A978-1-4842-0394-1_18_Fig4_HTML.jpg](img/A978-1-4842-0394-1_18_Fig4_HTML.jpg)\n\
  图 18-4. 使用代理限制访问\n\n代理通常遵循与被包装对象共享的公共协议，这意味着可以无缝地使用代理对象进行替换，而无需修改调用组件。代理拦截对底层对象属性和方法的访问请求，并且仅在满足访问控制策略时才将这些请求传递下去。\n\
  \n## 实现代理模式\n\n代理模式的实现因要解决的问题类型而异。在接下来的章节中，我将向您展示如何针对本章前面描述的三个问题分别实现该模式。\n\n###\
  \ 实现远程对象代理\n\n实现代理模式以访问远程对象或资源的关键在于，将对调用组件提供的服务或功能与执行远程操作的机制分离开来。\n\n对于某些应用程序，这意味着要向调用组件隐藏网络传输和协议的细节。对于表示\
  \ RESTful 服务的代理对象，代理对象可能会隐藏 HTTP 传输的细节，以及用于对远程数据对象执行操作的一组 URL。\n\n我选择在本章的示例中读取 HTTP\
  \ 标头值，因为这呈现了一种不同的情况：HTTP 传输的使用无法隐藏，因为其使用是既定事实。相反，代理对象隐藏了如何使用`Foundation`框架中的类来执行\
  \ HTTP 请求并获取标头值。\n\n#### 定义代理协议\n\n在实现远程对象的代理模式时，您不必非要定义一个协议，但我发现这会迫使我更清晰地思考如何向调用组件公开功能（当然，如果需要，它还可以让我创建替代实现）。清单\
  \ 18-2 显示了我定义的用于表示 Web 请求的协议，该协议定义在我添加到示例项目的一个名为`Proxy.swift`的文件中。\n\n**清单 18-2.**\
  \ `Proxy.swift` 文件的内容\n\n```swift\nprotocol HttpHeaderRequest {\n    func getHeader(url:String,\
  \ header:String) -> String?;\n}\n```\n\n`HttpHeaderRequest`协议定义了一个`getHeader`方法，该方法接受目标\
  \ URL 以及所需标头值的名称。请注意，`HttpHeaderRequest`方法返回同步结果，而不是依赖回调。远程代理对象在如何呈现其功能方面拥有广泛的自由度，我将定义一个代理对象，它隐藏了我正在使用的`Foundation`框架类是异步执行请求这一事实。\n\
  \n#### 定义代理实现类\n\n下一步是定义遵循该协议并实现访问远程对象机制的类。清单 18-3 显示了我定义的用于发出 HTTP 请求以获取响应标头值的代理类。\n\
  \n**清单 18-3.** 在 `Proxy.swift` 文件中定义实现类\n\n```swift\nimport Foundation;\n\nprotocol\
  \ HttpHeaderRequest {\n    func getHeader(url:String, header:String) -> String?;\n\
  }\n\nclass HttpHeaderRequestProxy : HttpHeaderRequest {\n    private let semaphore\
  \ = dispatch_semaphore_create(0);\n\n    func getHeader(url: String, header: String)\
  \ -> String? {\n        var headerValue:String?;\n        let nsUrl = NSURL(string:\
  \ url);\n        let request = NSURLRequest(URL: nsUrl!);\n        NSURLSession.sharedSession().dataTaskWithRequest(request,\n\
  \            completionHandler: {data, response, error in\n                if let\
  \ httpResponse = response as? NSHTTPURLResponse {\n                    headerValue\
  \ = httpResponse.allHeaderFields[header] as? NSString;\n                }\n    \
  \            dispatch_semaphore_signal(self.semaphore);\n        }).resume();\n\
  \        dispatch_semaphore_wait(self.semaphore, DISPATCH_TIME_FOREVER);\n     \
  \   return headerValue;\n    }\n}\n```\n\n`HttpHeaderRequestProxy`类遵循`HttpHeaderRequest`协议，并且是进行请求的代理。`getHeader`方法的实现使用了本章开头我曾依赖的相同的`Foundation`类，但增加了一个（现在很常见的）GCD\
  \ 信号量，这使我能够向调用组件隐藏 Cocoa 类的异步特性。\n\n**提示** 我不主张在实际项目中将异步操作隐藏在同步方法中，尤其是因为 Swift 闭包使得编写处理异步响应的代码很容易。我在此清单中这样做的目的是为了演示，代理可以根据自己的选择，暴露实现细节的多少。\n\
  \n\n\n#### 使用远程对象代理\n\n剩下的工作就是更新 `main.swift` 文件中的代码，使其使用代理对象而非直接发起 HTTP 请求，如列表\
  \ 18-4 所示。\n\n**列表 18-4 在 `main.swift` 文件中使用代理对象**\n\n```\nimport Foundation;\n\n\
  let url = \"http://www.apress.com\";\n\nlet headers = [\"Content-Length\", \"Content-Encoding\"\
  ];\n\nlet proxy = HttpHeaderRequestProxy();\n\nfor header in headers {\n\nif let\
  \ val = proxy.getHeader(url, header:header) {\n\nprintln(\"\\(header): \\(val)\"\
  );\n\n}\n\n}\n\nNSFileHandle.fileHandleWithStandardInput().availableData;\n```\n\
  \n示例应用仍然执行相同数量的 HTTP 请求，并依然使用相同的 `Foundation` 类来发起这些请求。但通过将逻辑封装到代理中，意味着我可以在整个应用中发起类似的请求，而无需重复实现逻辑——并且，正如你现在所期望的那样，这允许我在不修改依赖代理的组件的情况下，改变发起\
  \ HTTP 请求的方式。\n\n### 实现高开销操作代理\n\n优化高开销资源的使用并最小化高开销操作的执行次数，有许多策略。常见的例子包括缓存、懒加载，以及使用其他模式，比如我在第\
  \ 17 章描述过的享元模式。\n\n示例应用中的高开销操作是 HTTP 请求。减少应用发起的 HTTP 请求数量将产生显著影响：应用对用户的响应速度会更快，消耗更少的带宽（如果设备使用蜂窝网络，这一点尤为重要），并降低服务器端的请求吞吐量。\n\
  \n优化示例应用最直接的方法是为多个头信息的需求发起单个请求。这是一个故意简化的示例，但实现它所需的变化集与进行任何优化时相同。列表 18-5 展示了我对代理协议及其实现类所做的更改。\n\
  \n**列表 18-5 在 `Proxy.swift` 文件中优化 HTTP 请求**\n\n```\nimport Foundation;\n\nprotocol\
  \ HttpHeaderRequest {\n\nfunc getHeader(url:String, header:String) -> String?;\n\
  \n}\n\nclass HttpHeaderRequestProxy : HttpHeaderRequest {\n\nprivate let queue =\
  \ dispatch_queue_create(\"httpQ\", DISPATCH_QUEUE_SERIAL);\n\nprivate let semaphore\
  \ = dispatch_semaphore_create(0);\n\nprivate var cachedHeaders = [String:String]();\n\
  \nfunc getHeader(url: String, header: String) -> String? {\n\nvar headerValue:String?;\n\
  \ndispatch_sync(self.queue, {() in\n\nif let cachedValue = self.cachedHeaders[header]\
  \ {\n\nheaderValue = \"\\(cachedValue) (cached)\";\n\n} else {\n\nlet nsUrl = NSURL(string:\
  \ url);\n\nlet request = NSURLRequest(URL: nsUrl!);\n\nNSURLSession.sharedSession().dataTaskWithRequest(request,\n\
  \ncompletionHandler: {data, response, error in\n\nif let httpResponse = response\
  \ as? NSHTTPURLResponse {\n\nlet headers\n\n= httpResponse.allHeaderFields as [String:\
  \ String];\n\nfor (name, value) in headers {\n\nself.cachedHeaders[name] = value;\n\
  \n}\n\nheaderValue\n\n= httpResponse.allHeaderFields[header] as? NSString;\n\n}\n\
  \ndispatch_semaphore_signal(self.semaphore);\n\n}).resume();\n\ndispatch_semaphore_wait(self.semaphore,\
  \ DISPATCH_TIME_FOREVER);\n\n}\n\n});\n\nreturn headerValue;\n\n}\n\n}\n```\n\n\
  `getHeader` 方法创建了一个响应头部值的缓存，用于满足后续请求，提供了一种减少 HTTP 请求数量的机制。运行应用可以看到，其中一个头部是从缓存获取的值中得到的：\n\
  \n```\nContent-Length: 13960\nContent-Encoding: gzip (cached)\n```\n\n对 `HttpHeaderRequestProxy`\
  \ 类的更改依赖一个 GCD 队列，以确保当一个回调尝试读取缓存数据的字典时，另一个回调正在更新它。\n\n#### 延迟执行操作\n\n另一种常见的实现方式是尽可能推迟高开销操作的执行，通常是寄希望于用户可能会取消任务，从而使得该操作不再需要执行。\n\
  \n这种方法的好处是可能避免执行高开销操作，但缺点是需要修改 API，以便调用组件能够指示操作应该开始。列表 18-6 展示了我对代理及其协议所做的更改，以实现\
  \ HTTP 请求的延迟执行。\n\n**列表 18-6 在 `Proxy.swift` 文件中延迟 HTTP 请求**\n\n```\nimport Foundation;\n\
  \nprotocol HttpHeaderRequest {\n\ninit(url:String);\n\nfunc getHeader(header:String,\
  \ callback:(String, String?) -> Void );\n\nfunc execute();\n\n}\n\nclass HttpHeaderRequestProxy\
  \ : HttpHeaderRequest {\n\nlet url:String;\n\nvar headersRequired:[String: (String,\
  \ String?) -> Void];\n\nrequired init(url: String) {\n\nself.url = url;\n\nself.headersRequired\
  \ = Dictionary<String, (String, String?) -> Void>();\n\n}\n\nfunc getHeader(header:\
  \ String, callback: (String, String?) -> Void) {\n\nself.headersRequired[header]\
  \ = callback;\n\n}\n\nfunc execute() {\n\nlet nsUrl = NSURL(string: url);\n\nlet\
  \ request = NSURLRequest(URL: nsUrl!);\n\nNSURLSession.sharedSession().dataTaskWithRequest(request,\n\
  \ncompletionHandler: {data, response, error in\n\nif let httpResponse = response\
  \ as? NSHTTPURLResponse {\n\nlet headers = httpResponse.allHeaderFields as [String:\
  \ String];\n\nfor (header, callback) in self.headersRequired {\n\ncallback(header,\
  \ headers[header]);\n\n}\n\n}\n\n}).resume();\n\n}\n\n}\n```\n\n我改变了代理的使用方式，使得调用组件为每个所需的头部调用\
  \ `getHeader` 方法，并为每个头部提供一个回调。我暴露了底层发起 HTTP 请求的类的异步特性，因为这很好地契合了对请求本身执行延迟操作的想法。\n\
  \n当所有头部及其回调都已注册后，调用 `execute` 方法来执行请求并触发回调。如果在调用 `execute` 方法之前用户取消了流程，则不会执行 HTTP\
  \ 请求，也就不会产生该操作的开销。`HttpHeaderRequest` 协议的更改迫使调用组件也进行相应的修改，如列表 18-7 所示。\n\n**列表 18-7 在\
  \ `main.swift` 文件中使用修改后的协议**\n\n```\nimport Foundation;\n\nlet url = \"http://www.apress.com\"\
  ;\n\nlet headers = [\"Content-Length\", \"Content-Encoding\"];\n\nlet proxy = HttpHeaderRequestProxy(url:\
  \ url);\n\nfor header in headers {\n\nproxy.getHeader(header, callback: {header,\
  \ val in\n\nif (val != nil) {\n\nprintln(\"\\(header): \\(val!)\");\n\n}\n\n});\n\
  \n}\n\nproxy.execute();\n\nNSFileHandle.fileHandleWithStandardInput().availableData;\n\
  ```\n\n运行应用会产生以下输出：\n\n```\nContent-Encoding: gzip\nContent-Length: 13960\n```\n\
  \n### 实现访问限制代理\n\n限制对对象访问的代理被定义为该对象的包装器，这提供了一条与其他代理类型不同的实现路径。\n\n\n\n### 创建授权源\n\
  \n第一步是定义一个用于检查访问权限的授权源。将授权检查与代理分离，使得代理能够采用其所包装对象的 API，这意味着可以在无需将授权策略的细节传播到整个应用程序的情况下限制访问。代码清单\
  \ 18-8 展示了我添加到示例项目中的`Auth.swift`文件的内容。\n\n**代码清单 18-8.** `Auth.swift`文件的内容\n\n```swift\n\
  class UserAuthentication {\n\n    var user:String?;\n\n    var authenticated:Bool\
  \ = false;\n\n    private init() {\n        // 不执行任何操作 - 阻止实例被创建\n    }\n\n    func\
  \ authenticate(user:String, pass:String) {\n        if (pass == \"secret\") {\n\
  \            self.user = user;\n            self.authenticated = true;\n       \
  \ } else {\n            self.user = nil;\n            self.authenticated = false;\n\
  \        }\n    }\n\n    class var sharedInstance:UserAuthentication {\n       \
  \ get {\n            struct singletonWrapper {\n                static let singleton\
  \ = UserAuthentication();\n            }\n            return singletonWrapper.singleton;\n\
  \        }\n    }\n}\n```\n\n`UserAuthentication`类使用单例模式提供了一种简单的用户认证机制——事实上，如此简单以至于任何密码为`simple`的用户都将通过认证。在实际项目中，认证通常由远程服务处理，而该服务本身可能也有自己的代理。在本示例中，任何通过认证的用户都被授权发送\
  \ HTTP 请求。\n\n### 创建代理对象\n\n下一步是定义代理对象，使其可以作为所包装对象的无缝替代品，同时强制实施授权策略，如代码清单 18-9 所示。\n\
  \n**代码清单 18-9.** 在`Proxy.swift`文件中定义访问限制代理类\n\n```swift\nimport Foundation;\n\n\
  protocol HttpHeaderRequest {\n    init(url:String);\n    func getHeader(header:String,\
  \ callback:(String, String?) -> Void );\n    func execute();\n}\n\nclass AccessControlProxy\
  \ : HttpHeaderRequest {\n    private let wrappedObject: HttpHeaderRequest;\n\n \
  \   required init(url:String) {\n        wrappedObject = HttpHeaderRequestProxy(url:\
  \ url);\n    }\n\n    func getHeader(header: String, callback: (String, String?)\
  \ -> Void) {\n        wrappedObject.getHeader(header, callback: callback);\n   \
  \ }\n\n    func execute() {\n        if (UserAuthentication.sharedInstance.authenticated)\
  \ {\n            wrappedObject.execute();\n        } else {\n            fatalError(\"\
  Unauthorized\");\n        }\n    }\n}\n\nprivate class HttpHeaderRequestProxy :\
  \ HttpHeaderRequest {\n    let url:String;\n    var headersRequired:[String: (String,\
  \ String?) -> Void];\n    // ...为简洁起见省略了方法...\n}\n```\n\n`AccessControlProxy`类遵循`HttpHeaderRequest`协议，并包装了`HttpHeaderRequestProxy`类的一个实例（代理可以被用作其他代理对象的替代品，这并不违反规定）。`AccessControlProxy`对`execute`方法的实现调用了`UserAuthentication`类以判断是否提供了有效的凭据。如果用户已通过认证，则调用被包装对象的`execute`方法；否则调用`fatalException`方法。\n\
  \n> **提示**  \n> 请注意我对`HttpHeaderRequestProxy`类应用了`private`关键字。如果可以通过创建底层类的实例来绕过代理，那么实施访问限制就毫无意义。\n\
  \n### 应用代理\n\n最后一步是更新调用组件，使其使用新的代理类。在实际项目中，我通常会提供一个工厂方法来向调用组件隐藏代理类的细节（如第 9 章所述），但在本例中，我将直接实例化代理，如代码清单\
  \ 18-10 所示。\n\n**代码清单 18-10.** 在`main.swift`文件中使用访问限制代理\n\n```swift\nimport Foundation;\n\
  \nlet url = \"http://www.apress.com\";\nlet headers = [\"Content-Length\", \"Content-Encoding\"\
  ];\n\nlet proxy = AccessControlProxy(url: url);\n\nfor header in headers {\n   \
  \ proxy.getHeader(header, callback: {header, val in\n        if (val != nil) {\n\
  \            println(\"\\(header): \\(val!)\");\n        }\n    });\n}\n\nUserAuthentication.sharedInstance.authenticate(\"\
  bob\", pass: \"secret\");\nproxy.execute();\n\nNSFileHandle.fileHandleWithStandardInput().availableData;\n\
  ```\n\n请注意，我是在调用`execute`方法之前提供用户凭据的。在实际项目中，凭据通常是在应用程序首次启动时由用户提供，而执行受限操作的组件并不知晓认证/授权状态。\n\
  \n\n\n## 代理模式的变体\n\n代理类可用于实现引用计数，当资源需要主动管理，且需要在引用数达到特定值（通常为零）时执行某种操作时，这种技术非常有用。为了演示这种代理，我创建了另一个名为\
  \ `ReferenceCounting` 的 Xcode OS X 命令行项目。我在项目中添加了一个名为 `NetworkRequest.swift` 的文件，并用它定义清单\
  \ 18-11 中展示的类型。\n\n**清单 18-11.** `NetworkRequest.swift` 文件的内容\n\n```\nimport Foundation;\n\
  \nprotocol NetworkConnection {\n\nfunc connect();\n\nfunc disconnect();\n\nfunc\
  \ sendCommand(command:String);\n\n}\n\nclass NetworkConnectionFactory {\n\nclass\
  \ func createNetworkConnection() -> NetworkConnection {\n\nreturn NetworkConnectionImplementation();\n\
  \n}\n\n}\n\nprivate class NetworkConnectionImplementation : NetworkConnection {\n\
  \ntypealias me = NetworkConnectionImplementation;\n\nfunc connect() { me.writeMessage(\"\
  Connect\"); }\n\nfunc disconnect() { me.writeMessage(\"Disconnect\"); }\n\nfunc\
  \ sendCommand(command:String) {\n\nme.writeMessage(\"Command: \\(command)\");\n\n\
  NSThread.sleepForTimeInterval(1);\n\nme.writeMessage(\"Command completed: \\(command)\"\
  );\n\n}\n\nprivate class func writeMessage(msg:String) {\n\ndispatch_async(self.queue,\
  \ {() in\n\nprintln(msg);\n\n});\n\n}\n\nprivate class var queue:dispatch_queue_t\
  \ {\n\nget {\n\nstruct singletonWrapper {\n\nstatic let singleton = dispatch_queue_create(\"\
  writeQ\",\n\nDISPATCH_QUEUE_SERIAL);\n\n}\n\nreturn singletonWrapper.singleton;\n\
  \n}\n\n}\n\n}\n```\n\n`NetworkConnection` 协议定义了用于对一个假设的服务器的网络连接进行操作的方法。`connect`\
  \ 方法用于建立连接，`sendCommand` 方法用于向服务器发送任务，`disconnect` 方法用于在工作完成后关闭连接。\n\n`NetworkConnectionImplementation`\
  \ 类遵循该协议，并通过向调试控制台写入消息来实现这些方法。我使用了单例模式来定义一个 GCD 队列，该队列在该类的所有实例之间共享，这样当两个对象同时写入时，写入控制台的消息就不会被破坏。`sendCommand`\
  \ 方法的实现会引入一秒的延迟，以模拟服务器执行已发送的命令。\n\n我使用工厂方法模式来提供对 `NetworkConnectionImplementation`\
  \ 类实例的访问，该类使用 `private` 关键字标注，在其定义文件之外无法访问。清单 18-12 展示了我添加到 `main.swift` 文件中的语句，用于创建多个并发网络请求。\n\
  \n**清单 18-12.** `main.swift` 文件的内容\n\n```\nimport Foundation;\n\nlet queue = dispatch_queue_create(\"\
  requestQ\", DISPATCH_QUEUE_CONCURRENT);\n\nfor count in 0 ..< 3 {\n\nlet connection\
  \ = NetworkConnectionFactory.createNetworkConnection();\n\ndispatch_async(queue,\
  \ {() in\n\nconnection.connect();\n\nconnection.sendCommand(\"Command: \\(count)\"\
  );\n\nconnection.disconnect();\n\n});\n\n}\n\nNSFileHandle.fileHandleWithStandardInput().availableData;\n\
  ```\n\n我创建了三个网络请求，对每个请求我都调用 `connect` 方法来建立连接，调用 `sendCommand` 方法向服务器发送任务，然后调用 `disconnect`\
  \ 方法。运行该应用程序会产生类似于下面的结果：\n\n```\nConnect\nConnect\nConnect\nCommand: Command: 0\n\
  Command: Command: 1\nCommand: Command: 2\nCommand completed: Command: 0\nCommand\
  \ completed: Command: 1\nCommand completed: Command: 2\nDisconnect\nDisconnect\n\
  Disconnect\n```\n\n你可能会看到略有不同的结果，因为连接的处理顺序可能不同。从输出中需要注意的重要一点是，网络连接是重叠的，并且发送给服务器的每个命令都使用了单独的连接。\n\
  \n### 实现引用计数代理\n\n在这种情况下，可以使用引用计数代理来管理网络连接的生命周期，以便它能够服务于多个请求。清单 18-13 展示了代理类的定义。\n\
  \n**清单 18-13.** 在 `NetworkRequest.swift` 文件中定义引用计数代理\n\n```\nimport Foundation;\n\
  \nprotocol NetworkConnection {\n\nfunc connect();\n\nfunc disconnect();\n\nfunc\
  \ sendCommand(command:String);\n\n}\n\nclass NetworkConnectionFactory {\n\nclass\
  \ func createNetworkConnection() -> NetworkConnection {\n\nreturn connectionProxy;\n\
  \n}\n\nprivate class var connectionProxy:NetworkConnection {\n\nget {\n\nstruct\
  \ singletonWrapper {\n\nstatic let singleton = NetworkRequestProxy();\n\n}\n\nreturn\
  \ singletonWrapper.singleton;\n\n}\n\n}\n\n}\n\nprivate class NetworkConnectionImplementation\
  \ : NetworkConnection {\n\ntypealias me = NetworkConnectionImplementation;\n\n//\
  \ ...为简洁起见，方法已省略...\n\n}\n\nclass NetworkRequestProxy : NetworkConnection {\n\n\
  private let wrappedRequest:NetworkConnection;\n\nprivate let queue = dispatch_queue_create(\"\
  commandQ\", DISPATCH_QUEUE_SERIAL);\n\nprivate var referenceCount:Int = 0;\n\nprivate\
  \ var connected = false;\n\ninit() {\n\nwrappedRequest = NetworkConnectionImplementation();\n\
  \n}\n\nfunc connect() { /* 什么也不做 */ }\n\nfunc disconnect() { /* 什么也不做 */ }\n\nfunc\
  \ sendCommand(command: String) {\n\nself.referenceCount++;\n\ndispatch_sync(self.queue,\
  \ {() in\n\nif (!self.connected && self.referenceCount > 0) {\n\nself.wrappedRequest.connect();\n\
  \nself.connected = true;\n\n}\n\nself.wrappedRequest.sendCommand(command);\n\nself.referenceCount--;\n\
  \nif (self.connected && self.referenceCount == 0) {\n\nself.wrappedRequest.disconnect();\n\
  \nself.connected = false;\n\n}\n\n});\n\n}\n\n}\n```\n\n我修改了工厂方法类，使其使用单例模式返回一个 `NetworkRequestProxy`\
  \ 类的共享实例。`NetworkRequestProxy` 类遵循 `NetworkRequest` 协议，并且是 `NetworkConnectionImplementation`\
  \ 对象的一个包装器。\n\n这种引用计数代理的目标是将 `connect` 和 `disconnect` 方法的控制权从调用组件手中接管过来，并在有待发送命令时保持连接打开。我使用了一个串行\
  \ GCD 队列来确保一次只处理一个命令，并确保引用计数不受多个并发访问的影响。运行该应用程序会产生类似于下面的输出：\n\n```\nConnect\nCommand:\
  \ Command: 0\nCommand completed: Command: 0\nCommand: Command: 1\nCommand completed:\
  \ Command: 1\nCommand: Command: 2\nCommand completed: Command: 2\nDisconnect\n```\n\
  \n现在，命令通过单个连接串行处理，这体现为存在一条 `Connect` 消息和一条 `Disconnect` 消息。这种代理用一种昂贵的操作换取了另一种。没有代理时，代价是并发请求的数量，以及这给客户端、网络和服务器带来的压力。代理降低了请求的并发性，但它将发送给服务器的命令串行化了，这意味着总工作负载需要更长时间才能完成。总体效果是用带宽和服务器容量换取了用户的时间。\n\
  \n\n\n## 理解代理模式的陷阱\n\n代理模式的相关陷阱取决于其实现方式，但共同原则是不允许将实现细节从代理类泄露到调用组件中。对于远程对象代理，这意味着确保不会暴露访问远程对象所用机制的任何不必要细节。对于用于管理昂贵操作的代理，应尽可能避免暴露操作成本如何被降低的细节。对于访问限制代理，应注意不让调用组件绕过代理直接访问底层对象。\n\
  \n如果使用代理模式实现引用计数变体，有两个特定陷阱。首先，不要使用代理管理对象的生命周期。将此任务留给 Swift 内置的自动引用计数（ARC）支持，它能确保对象在不再需要时被销毁。\n\
  \n其次，不要使用代理实现锁和信号量等并发保护。如果你使用的语言没有并发特性，这样做是合理的，但 Swift 提供了对 Grand Central Dispatch\
  \ 的高级并发控制访问权限；如果你不喜欢 GCD，还可以访问一系列更底层的并发机制。编写自己的并发代码是愚蠢、危险且几乎不可能正确的。如果你认为自己需要创建自定义并发保护，那么要么是你误解了内置特性，要么是误解了项目中面临的问题。\n\
  \n## Cocoa 中的代理模式示例\n\n框架通过`NSProxy`类为代理模式提供了出色支持，但它仅适用于 Objective-C 程序员，不能在 Swift\
  \ 中使用。\n\n在 Objective-C 代码中，你不调用方法，而是向对象发送消息。在大多数情况下，这种区别并无实际意义，许多 Objective-C 程序员甚至不知道其中的差异。`NSProxy`类用于创建接收消息并将其转发给代理所代表的资源或对象的类，这提供了一种可以在运行时动态更改或重定向消息的绝佳机制。\n\
  \n遗憾的是，Swift 程序员无法使用这些功能，尝试从`NSProxy`派生 Swift 类会生成编译器错误，因为无法从派生类调用`super.init`（因为`NSProxy`未定义初始化器）。\n\
  \n## 将模式应用于 SportsStore 应用\n\n为了演示代理模式在 SportsStore 应用中的使用，我将创建一个表示远程服务器上产品数据的代理对象，然后使用该代理发送库存水平更新，并整合应用启动时获取初始库存数据的代码。\n\
  \n### 准备示例应用\n\n本章无需准备，我将从第 17 章结束时的 SportsStore 应用继续。别忘了你可以从`Apress.com`下载本书所有代码示例，包括每个章节对应\
  \ SportsStore 应用版本的项目。\n\n### 定义协议、工厂方法和代理类\n\n如前所述，创建代理时并不需要定义协议，但我通常会这样做。这既是习惯使然，更主要的原因是它让我能清晰地将暴露给调用组件的功能与代理类的实现分隔开。清单\
