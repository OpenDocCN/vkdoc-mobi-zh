  \           return reusable;\n        }\n    }\n}\n```\n\n如果某个 `Book` 对象被从池中借出超过五次，我会从\
  \ `canReuse` 属性返回 `false`，并且为了能看到条目何时被剔除，我会在控制台写一条消息。\n\n#### 测试该策略\n\n为了测试从池中剔除条目的策略，我需要平衡池中将包含的最大条目数与\
  \ `main.swift` 文件中代码将发出的请求数量。我需要有足够的书籍来允许其中一些被剔除，同时在系统中留出足够的余量来处理所有请求。在“理解空池策略”一节中，我将通过形式化一种策略来展示如何正确处理这个问题，但当前我会将池中的最大条目数设置为\
  \ `5`（这是通过反复试验确定的）。代码清单 8-7 展示了我在 `Library` 类中更改限制的方法。\n\n**代码清单 8-7. 在 `Library.swift`\
  \ 文件中更改池中的最大条目数**\n\n```\n...\nprivate class var singleton:Library {\n    struct\
  \ SingletonWrapper {\n        static let singleton = Library(stockLevel:5);\n  \
  \  }\n    return SingletonWrapper.singleton;\n}\n...\n```\n\n运行该应用程序将产生类似于以下内容的输出：\n\
  \n```\nStarting...\nEject: Book#1\nEject: Book#2\nAll blocks complete\n...Book#3...\n\
  Checked out 3 times\nIn stock\n...Book#4...\nChecked out 4 times\nIn stock\n...Book#5...\n\
  Checked out 3 times\nIn stock\nThere are 3 books in the pool\nProgram ended with\
  \ exit code: 0\n```\n\n由于条目返回池前的随机延迟，你可能会得到不同的结果，但基本结果应该相同：部分 `Book` 对象被借出的次数多于其他对象，当它们被借出五次时，会被从池中剔除，并由池创建的新对象替换。\n\
  \n\n\n### 理解空池策略\n\n顾名思义，空池策略规定了当池中没有可用对象来服务于新对象请求时的应对方式。最简单的策略就是我的示例池所使用的阻塞策略，该策略强制调用线程等待，直到有对象被归还到池中。\n\
  \n阻塞策略虽然简单，但如果池中对象的数量与对这些对象的需求水平不匹配，可能会导致应用程序性能下降。如果阻塞策略与我在上一节中描述的不信任语句管理策略结合使用，还可能导致应用程序锁死。\n\
  \n在前面的示例中，我通过试错法确定了池可以创建的 `Books` 对象的最大数量。这只需片刻时间，因为我能够多次运行应用程序，从而了解来自 `main.swift`\
  \ 文件的对象请求如何影响对象从池中被弹出的速率。在实际应用中，你只能猜测需求，并且必须为突发的高需求时期留出余量，这会给池对象带来额外压力。为了查看可能出现的这种问题，我增加了从池中请求对象的次数，如代码清单\
  \ 8-8 所示。\n\n**代码清单 8-8.** 在 `main.swift` 文件中增加请求次数\n\n```\n...\nfor i in 1 ...\
  \ 35 {\n    dispatch_group_async(group, queue, {() in\n        var book = Library.checkoutBook(\"\
  reader#\\(i)\");\n        if (book != nil) {\n            NSThread.sleepForTimeInterval(Double(rand()\
  \ % 2));\n            Library.returnBook(book!);\n        }\n    });\n}\n...\n```\n\
  \n我将请求次数增加到了 35 次，因为这会超过池中对象可被使用的次数。池最多允许创建五个对象，每个对象最多可使用五次。这意味着从第 26 次请求开始，后续所有请求都将无法获得可用对象。运行应用程序即可看到效果，输出如下：\n\
  \n```\nStarting...\nEject: Book#4\nEject: Book#5\nEject: Book#1\nEject: Book#3\n\
  Eject: Book#2\n```\n\n请注意，这里没有每本书的状态摘要。这是因为所有五本书都已被弹出了池，而尝试获取对象的 GCD 块无法通过 `getFromPool`\
  \ 方法中的信号量。应用程序已陷入死锁：在池发出信号量指示有空闲对象之前，GCD 块不会被执行，但池已达到其可创建对象数量的上限。\n\n#### 实现请求失败策略\n\
  \n请求失败策略通过将责任转移给请求对象的组件来处理空池情况。该组件必须指定在请求失败之前，它愿意等待对象变为可用的最长时间。请求失败意味着组件必须为无法获取所需对象的情况做好准备，并制定继续操作或报告错误的计划。代码清单\
  \ 8-9 展示了如何修改 `Pool` 类中 `getFromPool` 方法的实现来实施此策略。\n\n**代码清单 8-9.** 在 `Pool.swift`\
  \ 文件中实现该策略\n\n```\n...\nfunc getFromPool(maxWaitSeconds:Int = 5) -> T? {\n    var\
  \ result:T?;\n    let waitTime = (maxWaitSeconds == -1)\n        ? DISPATCH_TIME_FOREVER\n\
  \        : dispatch_time(DISPATCH_TIME_NOW,\n            (Int64(maxWaitSeconds)\
  \ * Int64(NSEC_PER_SEC)));\n    if (dispatch_semaphore_wait(semaphore, waitTime)\
  \ == 0) {\n        dispatch_sync(arrayQ, {() in\n            if (self.data.count\
  \ == 0 && self.itemCount < self.maxItemCount) {\n                result = self.itemFactory();\n\
  \                self.itemCount++;\n            } else {\n                result\
  \ = self.data.removeAtIndex(0);\n            }\n        })\n    }\n    return result;\n\
  }\n...\n```\n\n> **警告**\n> 此策略应谨慎使用，因为从池中消费对象的组件必须编写相应代码来处理失败的请求。我有时会看到组件将对对象的请求包裹在循环中，以便不断请求直到获取到对象。这等同于发出一个永远等待的请求，应用程序仍然会锁死——只是换了一种不同且更耗费\
  \ CPU 的方式而已。\n\n我为 `getFromPool` 方法添加了一个名为 `maxWaitSeconds` 的参数，并设置了默认值，允许调用者指定他们愿意等待对象变为可用的秒数。我将值\
  \ `-1` 解释为永远等待，并将任何其他值解释为从当前时间起算的秒数。\n\nGCD 定义了 `DISPATCH_TIME_FOREVER` 常量来表示无限期等待，而对于任何其他时长，我使用\
  \ `dispatch_time` 函数来创建相应值，该函数的参数是一个初始时间和要增加纳秒数：\n\n```\n...\nlet waitTime = (maxWaitSeconds\
  \ == -1)\n    ? DISPATCH_TIME_FOREVER\n    : dispatch_time(DISPATCH_TIME_NOW,\n\
  \        (Int64(maxWaitSeconds) * Int64(NSEC_PER_SEC)));\n...\n```\n\n我使用 `DISPATCH_TIME_NOW`\
  \ 常量作为第一个参数，以指定我希望时间相对于当前时刻，然后将调用者指定的秒数乘以 `NSEC_PER_SEC` 常量（该常量定义了一秒中有多少纳秒）来获得纳秒数。\n\
  \n> **警告**\n> `DISPATCH_TIME_NOW` 常量只能用作 `dispatch_time` 函数的参数。如果在函数外部使用它，它将返回零值。\n\
  \n我将 `waitTime` 值作为第二个参数传递给 `dispatch_semaphore_wait` 函数。\n\n```\n...\nif (dispatch_semaphore_wait(semaphore,\
  \ waitTime) == 0) {\n...\n```\n\n`dispatch_semaphore_wait` 函数将阻塞，直到 `returnToPool`\
  \ 方法中发出信号量信号，或者达到指定时间。如果使用 `DISPATCH_TIME_FOREVER` 值，那么信号量将永久阻塞，这是我在前面章节中所依赖的行为。对于其他\
  \ `waitTime` 值，`dispatch_semaphore_wait` 函数将在指定时间段过后允许线程继续执行。\n\n\n\n我需要知道信号量为何允许线程继续执行。如果是因为池中有可用对象，那么我想获取该对象并将其返回给调用者；如果是因为时间已到，那么我希望方法不向可选的`result`变量赋值就返回。通过检查`dispatch_semaphore_wait`函数返回的结果，我可以判断发生了什么情况。返回值为`0`表示信号量已被触发，非零值表示时间已到。\n\
  \n`getFromPool`方法的签名已经返回一个可选的`Book`对象，这意味着`Library`类已经准备好处理对`checkoutBook`方法的调用，即使该方法无法从池中获取`Book`对象。\n\
  \n```\nclass func checkoutBook(reader:String) -> Book? {\n    var book = singleton.pool.getFromPool();\n\
  \    book?.reader = reader;\n    book?.checkoutCount++;\n    return book;\n}\n```\n\
  \n`checkoutBook`方法的返回结果也是一个可选的`Book`对象，这使得在`main.swift`文件中检测超时请求变得容易，如清单 8-10 所示。\n\
  \n**清单 8-10. 在 main.swift 文件中处理过期请求**\n\n```\nimport Foundation\n\nvar queue = dispatch_queue_create(\"\
  workQ\", DISPATCH_QUEUE_CONCURRENT);\nvar group = dispatch_group_create();\nprintln(\"\
  Starting...\");\nfor i in 1 ... 35 {\n    dispatch_group_async(group, queue, {()\
  \ in\n        var book = Library.checkoutBook(\"reader#\\(i)\");\n        if (book\
  \ != nil) {\n            NSThread.sleepForTimeInterval(Double(rand() % 2));\n  \
  \          Library.returnBook(book!);\n        } else {\n            dispatch_barrier_async(queue,\
  \ {() in\n                println(\"Request \\(i) failed\");\n            });\n\
  \        }\n    });\n}\ndispatch_group_wait(group, DISPATCH_TIME_FOREVER);\ndispatch_barrier_sync(queue,\
  \ {() in\n    println(\"All blocks complete\");\n    Library.printReport();\n});\n\
  ```\n\n如果我没有从`Library`类接收到`Book`对象，那么我会向控制台写入一条消息，指示请求失败。`println`函数用于将消息写入控制台，但它不是并发安全的，因此我将该函数调用封装在一个\
  \ GCD 块中。我使用了 barrier，因为队列是并发的，我不希望两个失败的请求导致同时调用`println`函数，这会产生混乱的输出。\n\n> **提示**\n\
  > \n> 请注意，我也将对`Library.printReport`方法的调用封装在了 GCD 块中。该方法使用`println`函数将报告写入调试控制台，因此我使用了相同的\
  \ GCD 队列来确保生成报告时不会与正在写入的失败请求消息同时调用`println`函数。\n\n如果你运行该应用程序，将会看到类似如下的输出：\n\n```\n\
  Starting...\nEject: Book#4\nEject: Book#1\nEject: Book#5\nEject: Book#2\nEject:\
  \ Book#3\nAll blocks complete\nRequest 26 failed\nRequest 30 failed\nRequest 28\
  \ failed\nRequest 31 failed\nRequest 29 failed\nRequest 27 failed\nRequest 32 failed\n\
  Request 33 failed\nRequest 34 failed\nRequest 35 failed\nThere are 0 books in the\
  \ pool\n```\n\n这次应用程序运行完成，无法获取对象的请求会失败。应用程序不再死锁，但这意味着`Library`类的使用者必须被编写成能够处理`Book`对象可能不可用的情况，并知道如何应对。\n\
  \n#### 处理池资源耗尽\n\n我在上一节中实施的策略存在一个问题：即使池已耗尽，它也会要求调用者等待。此处的“耗尽”是指所有对象都已被弹出，并且由于已达到初始化时设置的限制，池无法再创建更多对象。这远非理想情况，因为即使池永久性耗尽，那些希望等到对象可用的调用仍然被允许继续等待。清单\
  \ 8-11 展示了如何增强`Pool`类，使其在池耗尽时拒绝请求。\n\n**清单 8-11. 在 Pool.swift 文件中处理池枯竭**\n\n```\n\
  import Foundation\n\nclass Pool<T:AnyObject> {\n    private var data = [T]();\n\
  \    private let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
  \    private let semaphore:dispatch_semaphore_t;\n    private var itemCount = 0;\n\
  \    private let maxItemCount:Int;\n    private let itemFactory: () -> T;\n    private\
  \ var ejectedItems = 0;\n    private var poolExhausted = false;\n\n    init(maxItemCount:Int,\
  \ factory:() -> T) {\n        self.itemFactory = factory;\n        self.maxItemCount\
  \ = maxItemCount;\n        semaphore = dispatch_semaphore_create(maxItemCount);\n\
  \    }\n\n    func getFromPool(maxWaitSeconds:Int = -1) -> T? {\n        var result:T?;\n\
  \        let waitTime = (maxWaitSeconds == -1)\n            ? DISPATCH_TIME_FOREVER\n\
  \            : dispatch_time(DISPATCH_TIME_NOW,\n                (Int64(maxWaitSeconds)\
  \ * Int64(NSEC_PER_SEC)));\n        if (!poolExhausted) {\n            if (dispatch_semaphore_wait(semaphore,\
  \ waitTime) == 0) {\n                if (!poolExhausted) {\n                   \
  \ dispatch_sync(arrayQ, {() in\n                        if (self.data.count == 0\n\
  \                            && self.itemCount < self.maxItemCount) {\n        \
  \                    result = self.itemFactory();\n                            self.itemCount++;\n\
  \                        } else {\n                            result = self.data.removeAtIndex(0);\n\
  \                        }\n                    })\n                }\n        \
  \    }\n        }\n        return result;\n    }\n\n    func returnToPool(item:T)\
  \ {\n        dispatch_async(arrayQ, {() in\n            if let pitem = item as AnyObject\
  \ as? PoolItem {\n                if (pitem.canReuse) {\n                    self.data.append(item);\n\
  \                    dispatch_semaphore_signal(self.semaphore);\n              \
  \  } else {\n                    self.ejectedItems++;\n                    if (self.ejectedItems\
  \ == self.maxItemCount) {\n                        self.poolExhausted = true;\n\
  \                        self.flushQueue();\n                    }\n           \
  \     }\n            } else {\n                self.data.append(item);\n       \
  \     }\n        });\n    }\n\n    private func flushQueue() {\n        var dQueue\
  \ = dispatch_queue_create(\"drainer\", DISPATCH_QUEUE_CONCURRENT);\n        var\
  \ backlogCleared = false;\n        dispatch_async(dQueue, {() in\n            dispatch_semaphore_wait(self.semaphore,\
  \ DISPATCH_TIME_FOREVER);\n            backlogCleared = true;\n        });\n   \
  \     dispatch_async(dQueue, {() in\n            while (!backlogCleared) {\n   \
  \             dispatch_semaphore_signal(self.semaphore);\n            }\n      \
  \  });\n    }\n\n    func processPoolItems(callback:[T] -> Void) {\n        dispatch_barrier_sync(arrayQ,\
  \ {() in\n            callback(self.data);\n        });\n    }\n}\n```\n\n清单中的更改解决了两个问题：识别池何时耗尽以及拒绝所有待处理的请求。为了识别池何时耗尽，我在`returnToPool`方法中跟踪从池中被拒绝的对象数量，当池能够创建的所有对象都已被弹出时，我将一个名为`poolExhausted`的实例变量设置为`true`，并调用一个名为`flushQueue`的新方法。\n\
  \n> **提示**\n> \n> 我必须重写`returnToPool`方法以处理三种可能的情况。第一种是对象实现了`PoolItem`协议并且可以重用。第二种是对象实现了`PoolItem`协议但无法重用——并且可能是最后一个被弹出的对象。最后一种情况是该对象未实现`PoolItem`协议，这种情况下弹出和耗尽无关紧要，该对象可以直接加回池中。\n\
  \n我修改了`getFromPool`方法，使得请求在等待信号量之前会检查`poolExhausted`属性的值，这意味着池耗尽之后到达的任何新请求都会立即返回。\n\
  \n\n\n第二个问题涉及处理对象池耗尽前到达的未完成请求。发起请求的线程将等待 GCD 信号量，并在收到信号前持续等待。不幸的是，GCD 信号量没有提供唤醒所有等待线程的方法，因此我在实现`flushQueue`方法时不得不采用间接方式。\n\
  \n我创建了一个独立的 GCD 队列，并向其中添加了两个块。第一个块等待信号量，当信号量允许其通过时，将名为`backlogCleared`的局部变量设置为`true`。\n\
  \n```\ndispatch_async(dQueue, {() in\n    dispatch_semaphore_wait(self.semaphore,\
  \ DISPATCH_TIME_FOREVER);\n    backlogCleared = true;\n});\n```\n\nGCD 信号量允许线程按先进先出顺序通过，这意味着在对象池耗尽前到达的所有等待请求都被允许通过之前，这个块将无法通过信号量。\n\
  \n第二个块重复发送信号量，直到`backlogCleared`属性的值发生变化。\n\n```\ndispatch_async(dQueue, {() in\n\
  \    while (!backlogCleared) {\n        dispatch_semaphore_signal(self.semaphore);\n\
  \    }\n});\n```\n\n我添加这些块的队列是并发的，信号量将持续发送直到积压清除。我希望防止正在等待信号量的调用向数组修改队列添加块，这就是为什么在`getFromPool`方法中等待信号量前后检查`poolExhausted`属性的值。\n\
  \n```\nif (!poolExhausted) {\n    if (dispatch_semaphore_wait(semaphore, waitTime)\
  \ == 0) {\n        if (!poolExhausted) {\n            ...\n```\n\n为了更轻松地测试新功能，我将`getFromPool`方法中`maxWaitSeconds`参数的默认值改为`-1`；仅在对象池耗尽时请求才会被拒绝。运行应用程序，你会看到与之前示例类似的输出——但这种实现方式防止了愿意等待对象的调用者在对象池耗尽时被锁定。\n\
  \n#### 创建弹性对象池\n\n如果对象池能够根据需要创建所需数量的对象，则不必拒绝请求。这被称为弹性对象池，它适用于有首选数量和单独最大数量的场景。\n\n\
  在软件开发方面，弹性对象池可用于任何通过创建额外对象来应对需求增长的场景。一个常见例子是网络连接，在正常操作时有首选连接数，在高峰期有一定余量。\n\n从现实图书馆的角度看，热门书籍的高峰需求可以通过从附近分馆借书来满足。这并非理想方案，因为它会降低图书馆网络其他地方的可用性，但意味着在特殊情况下无需长时间等待就能满足借书请求。为了将这个场景映射到我的示例中，我在`BookSources.swift`文件中添加了一个名为`LibraryNetwork`的类，如代码清单\
  \ 8-12 所示。\n\n**代码清单 8-12. BookSources.swift 文件内容**\n\n```swift\nimport Foundation\n\
  \nclass BookSeller {\n    class func buyBook(author:String, title:String, stockNumber:Int)\
  \ -> Book {\n        return Book(author: author, title: title, stock: stockNumber);\n\
  \    }\n}\n\nclass LibraryNetwork {\n    class func borrowBook(author:String, title:String,\
  \ stockNumber:Int) -> Book {\n        return Book(author: author, title: title,\
  \ stock: stockNumber);\n    }\n    class func returnBook(book:Book) {\n        //\
  \ do nothing\n    }\n}\n```\n\n`LibraryNetwork`类是一个占位符，用于演示临时获取额外书籍。我不会在这个类中实现任何逻辑，因为我的重点是对象池。代码清单\
  \ 8-13 展示了如何在`Pool`类中实现弹性。\n\n**代码清单 8-13. 在 Pool.swift 文件中添加对象弹性**\n\n```swift\n\
  import Foundation\n\nclass Pool<T:AnyObject> {\n    private var data = [T]();\n\
  \    private let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
  \    private let semaphore:dispatch_semaphore_t;\n    private let itemFactory: ()\
  \ -> T;\n    private let peakFactory: () -> T;\n    private let peakReaper:(T) ->\
  \ Void;\n    private var createdCount:Int = 0;\n    private let normalCount:Int;\n\
  \    private let peakCount:Int;\n    private let returnCount:Int;\n    private let\
  \ waitTime:Int;\n    \n    init(itemCount:Int, peakCount:Int, returnCount: Int,\
  \ waitTime:Int = 2,\n        itemFactory:() -> T, peakFactory:() -> T, reaper:(T)\
  \ -> Void) {\n        self.normalCount = itemCount; self.peakCount = peakCount;\n\
  \        self.waitTime   = waitTime; self.returnCount = returnCount;\n        self.itemFactory\
  \ = itemFactory; self.peakFactory = peakFactory;\n        self.peakReaper  = reaper;\n\
  \        self.semaphore   = dispatch_semaphore_create(itemCount);\n    }\n    \n\
  \    func getFromPool() -> T? {\n        var result:T?;\n        let expiryTime\
  \ = dispatch_time(DISPATCH_TIME_NOW,\n            (Int64(waitTime) * Int64(NSEC_PER_SEC)));\n\
  \        if (dispatch_semaphore_wait(semaphore, expiryTime) == 0) {\n          \
  \  dispatch_sync(arrayQ, {() in\n                if (self.data.count == 0) {\n \
  \                   result = self.itemFactory();\n                    self.createdCount++;\n\
  \                } else {\n                    result = self.data.removeAtIndex(0);\n\
  \                }\n            })\n        } else {\n            dispatch_sync(arrayQ,\
  \ {() in\n                result = self.peakFactory();\n                self.createdCount++;\n\
  \            });\n        }\n        return result;\n    }\n    \n    func returnToPool(item:T)\
  \ {\n        dispatch_async(arrayQ, {() in\n            if (self.data.count > self.returnCount\n\
  \                && self.createdCount > self.normalCount) {\n                self.peakReaper(item);\n\
  \                self.createdCount--;\n            } else {\n                self.data.append(item);\n\
  \                dispatch_semaphore_signal(self.semaphore);\n            }\n   \
  \     });\n    }\n    \n    func processPoolItems(callback:[T] -> Void) {\n    \
  \    dispatch_barrier_sync(arrayQ, {() in\n            callback(self.data);\n  \
  \      });\n    }\n}\n```\n\n> **注意**：我已移除处理对象池耗尽和剔除对象的代码，以简化示例，并且这些功能通常不与弹性一起使用（因为代码会变得复杂且难以维护）。\n\
  \n\n\n该对象池使用 GCD 信号量等待一段指定时间内有对象可用，默认等待时间为三秒。如果在有对象可用之前，`semaphore` 的 `wait` 操作超时，则会使用一个工厂闭包创建临时对象来满足需求。（这里有两个工厂闭包——一个用于常规的惰性对象创建，另一个用于创建临时峰值对象）。\n\
  \n弹性对象池的核心特征在于对临时对象的处理方式。你可以将它们永久保留在池中，也可以释放引用使其被删除，或者——就像我在此处所做的——定义一个回收器，用于在不再需要这些对象时进行处置。在本例中，我接受将回收器作为初始化参数传入，并在对对象的需求下降时调用它。\n\
  \n> **提示**\n>\n> 你可以制定复杂的策略来决定何时不再需要临时对象，但我建议尽可能保持简单。复杂的方案在开发期间效果良好，但面对难以提前预测的实际使用模式时，往往容易崩溃。\n\
  \n要使用弹性对象池，我需要修改 `Library` 类中的初始化器，以提供额外的闭包和对象数量，如代码清单 8-14 所示。\n\n**代码清单 8-14.** 在\
  \ `Library.swift` 文件中更新 Library 初始化器\n\n```\n...\nprivate init(stockLevel:Int) {\n\
  \    var stockId = 1;\n    pool = Pool<Book>(\n        itemCount:stockLevel,\n \
  \       peakCount: stockLevel * 2,\n        returnCount: stockLevel / 2,\n     \
  \   itemFactory: {() in\n            return BookSeller.buyBook(\"Dickens, Charles\"\
  ,\n                title: \"Hard Times\", stockNumber: stockId++)},\n        peakFactory:\
  \ {() in\n            return LibraryNetwork.borrowBook(\"Dickens, Charles\",\n \
  \               title: \"Hard Times\", stockNumber: stockId++)},\n        reaper:\
  \ LibraryNetwork.returnBook\n    );\n}\n...\n```\n\n常规对象池中的对象是从 `BookSeller` 类获取的\
  \ `Book` 对象。当需求达到正常水平的两倍时，会通过 `LibraryNetwork.borrowBook` 方法获取额外的 `Book` 对象；当对象数量降至正常水平的\
  \ 50% 时，这些额外对象将由 `LibraryNetwork.returnBook` 方法回收。\n\n运行应用程序可以看到对象弹性特性的效果，其输出如下：\n\
  \n```\n...Starting...\nAll blocks complete\n...Book#2...\nChecked out 4 times\n\
  In stock\n...Book#15...\nChecked out 1 times\nIn stock\n...Book#19...\nChecked out\
  \ 1 times\nIn stock\n...Book#17...\nChecked out 1 times\nIn stock\n...Book#18...\n\
  Checked out 1 times\nIn stock\nThere are 5 books in the pool\n...\n```\n\n此示例借用了\
  \ `Book` 对象来满足需求，这体现在输出中显示的书籍被从对象池中借出的次数。`main.swift` 文件中的代码请求了 35 个 `Book` 对象，但报告仅显示\
  \ 8 次借出。其余请求是通过从 `LibraryNetwork` 类获取对象来满足的，后续这些对象又被归还给了该类。\n\n## 理解分配策略\n\n分配策略决定了如何选择一个可用对象来服务请求。本章到目前为止使用的策略是先进先出，其原理是将数组当作队列来处理。这种方法的优点是实现简单，但缺点是可能导致对象分配不均，使得某些对象被借出的次数远多于其他对象。\n\
  \n对于大多数应用来说，FIFO 分配策略是合适的，但某些应用需要不同的对象分配方法。以我的示例应用为例，我打算分配使用次数最少的可用书籍，但——正如你将看到的——当对对象的需求很高时，这种策略的影响是有限的。代码清单\
  \ 8-15 展示了如何在 `Pool` 类中添加对自定义分配策略的支持。\n\n**代码清单 8-15.** 在 `Pool.swift` 文件中添加对分配策略的支持\n\
  \n```\nimport Foundation\n\nclass Pool<T:AnyObject> {\n    private var data = [T]();\n\
  \    private let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
  \    private let semaphore:dispatch_semaphore_t;\n    private let itemFactory: ()\
  \ -> T;\n    private let itemAllocator:[T] -> Int;\n    private let maxItemCount:Int;\n\
  \    private var createdCount:Int = 0;\n    \n    init(itemCount:Int, itemFactory:()\
  \ -> T, itemAllocator:([T] -> Int)) {\n        self.maxItemCount = itemCount;\n\
  \        self.itemFactory = itemFactory;\n        self.itemAllocator = itemAllocator;\n\
  \        self.semaphore = dispatch_semaphore_create(itemCount);\n    }\n    \n \
  \   func getFromPool() -> T? {\n        var result:T?;\n        if (dispatch_semaphore_wait(semaphore,\
  \ DISPATCH_TIME_FOREVER) == 0) {\n            dispatch_sync(arrayQ, {() in\n   \
  \             if (self.data.count == 0) {\n                    result = self.itemFactory();\n\
  \                    self.createdCount++;\n                } else {\n          \
  \          result = self.data.removeAtIndex(self.itemAllocator(self.data));\n  \
  \              }\n            })\n        }\n        return result;\n    }\n   \
  \ \n    func returnToPool(item:T) {\n        dispatch_async(arrayQ, {() in\n   \
  \         self.data.append(item);\n            dispatch_semaphore_signal(self.semaphore);\n\
  \        });\n    }\n    \n    func processPoolItems(callback:[T] -> Void) {\n \
  \       dispatch_barrier_sync(arrayQ, {() in\n            callback(self.data);\n\
  \        });\n    }\n}\n```\n\n这是一个固定大小的对象池，采用惰性创建对象的方式。我定义了一个名为 `itemAllocator`\
  \ 的初始化参数，它是一个闭包，会接收可用对象的数组。该闭包返回数组中应被分配用于服务请求的对象所在位置。代码清单 8-16 展示了如何更新 `Library`\
  \ 类的初始化器来实现分配策略。\n\n**代码清单 8-16.** 在 `Library.swift` 文件中添加分配策略\n\n```\n...\nprivate\
  \ init(stockLevel:Int) {\n    var stockId = 1;\n    pool = Pool<Book>(\n       \
  \ itemCount:stockLevel,\n        itemFactory: {() in\n            return BookSeller.buyBook(\"\
  Dickens, Charles\",\n                title: \"Hard Times\", stockNumber: stockId++)},\n\
  \        itemAllocator: {(var books) in return 0; }\n    );\n}\n...\n```\n\n我从 FIFO\
  \ 策略开始，该闭包选择数组中的第一个对象。我建议你从该策略入手，以便衡量任何替代方案的影响。根据向对象池发出的请求模式，你很可能会发现 FIFO 分配策略能带来接近你目标的效果。以下是使用\
  \ FIFO 运行应用程序时输出的格式化版本：\n\n```\n...\n...Book#4...Checked out 10 times\n...Book#3...Checked\
  \ out 6 times\n...Book#2...Checked out 5 times\n...Book#1...Checked out 5 times\n\
  ...Book#5...Checked out 9 times\n...\n```\n\n各个对象的使用次数存在一些差异，但幅度不大。在实际项目中，根据这些结果，我会考虑坚持使用\
  \ FIFO 策略（不过我也会观察生产环境中的差异，以确保我的测试符合实际情况）。\n\n\n\n### 清单 8-17 展示了一种最少使用策略。该策略会选择可用的对象中使用次数最少的那个。可能存在一些已被借出但使用次数更少的对象。将所有对象都考虑在内的策略被称为完美分配策略，但这种策略几乎没什么用，因为它意味着你需要阻塞一个请求，直到绝对最少使用的对象变得可用，而这可能在相当长一段时间内都不会发生。\n\
  \n## 清单 8-17 在`Library.swift`文件中实现不同的分配策略\n\n```\n...\nprivate init(stockLevel:Int)\
  \ {\n    var stockId = 1;\n    pool = Pool<Book>(\n        itemCount:stockLevel,\n\
  \        itemFactory: {() in\n            return BookSeller.buyBook(\"Dickens, Charles\"\
  ,\n                title: \"Hard Times\", stockNumber: stockId++)},\n        itemAllocator:\
  \ {(var books) in\n            var selected = 0;\n            for index in 1 ..<\
  \ books.count {\n                if (books[index].checkoutCount < books[selected].checkoutCount)\
  \ {\n                    selected = index;\n                }\n            }\n \
  \           return selected;\n        }\n    );\n}\n...\n```\n\n在新的闭包中，我检查了每个可用的对象，并选择了`checkoutCount`属性值最低的那个。以下是使用此策略后的输出结果：\n\
  \n```\n...\n...Book#2...Checked out 8 times\n...Book#3...Checked out 5 times\n...Book#5...Checked\
  \ out 8 times\n...Book#4...Checked out 8 times\n...Book#1...Checked out 6 times\n\
  ...\n```\n\n由于`main.swift`代码中的随机性，具体结果会有所不同，但总体效果是更均匀地分配对象。这是一种更均衡的分配策略，但每次分配对象时需要做更多工作，并且（至少对于我的测试代码而言）影响相对较小。这并不意味着你应该始终使用\
  \ FIFO 分配策略，但你应该确保额外的工作是值得的。\n\n## 理解模式变种的陷阱\n\n这些变种带来的主要风险是复杂性，这可能会表现为并发问题，以及代码更难阅读和维护。除了这些问题之外，这些策略还可能导致一些特定的陷阱，如下文所述。\n\
  \n### 理解预期差距陷阱\n\n正如本章所展示的，可以创建在表面上看相似，但在幕后实现不同策略的对象池。你必须确保这些策略的外部影响对调用组件是显而易见的，否则你会发现对象池的有效性会受到损害。\n\
  \n例如，你可能会选择通过拒绝对象请求来处理空池。如果你这样做，请确保池对象的`checkout`方法的返回类型是可选类型，例如`Book?`，而不仅仅是`Book`。使用可选结果可以清楚地表明，对该方法的调用可能无法获得对象。\n\
  \n并非所有行为都能用语言特性来表达，我建议你提供 API 文档，详细描述池的工作方式。例如，你需要记录这样一个事实：当池耗尽时，你通过拒绝请求来处理，以避免调用组件使用`for`循环直到获得对象——这种行为可能导致应用程序死锁。\n\
  \n### 理解过度使用与使用不足陷阱\n\n一旦你开始实现对象池模式，就很容易在情感上投入过多精力，去选择和创建你需要的策略，并让它们完美配合。一个编写良好的对象池模式实现堪称艺术品，但你必须时刻关注池在测试和部署期间的表现，因为很容易创建一个实现完美但会损害应用程序性能或消耗过多资源的池。\n\
  \n过度使用的池是一个性能隐患，因为它大部分时间都处于空池状态，并且有一长串调用组件在等待对象。使用不足的池是一个资源隐患，因为它管理着一组很少被使用的对象。平衡对象池的大小和行为与其工作负载需要一些反复试验——以及用于测试的真实使用数据。此外，你必须准备好根据应用程序的需求改变池的大小和行为，即使这意味着要放弃一个你特别引以为傲的策略。\n\
  \n## Cocoa 中模式变种的示例\n\n在 Cocoa 框架中，没有明显的这些模式变种的使用实例，不过很难确定，因为苹果没有发布源代码。\n\n## 将模式变种应用于\
  \ SportsStore\n\n作为本章的结尾，我将更改第 7 章中添加到 SportsStore 应用程序的池的对象创建策略。目前，`NetworkPool`类会急切地创建其对象。\n\
  \n```\n...\nprivate init() {\n    for _ in 0 ..< connectionCount {\n        connections.append(NetworkConnection());\n\
  \    }\n    semaphore = dispatch_semaphore_create(connectionCount);\n    queue =\
  \ dispatch_queue_create(\"networkpoolQ\", DISPATCH_QUEUE_SERIAL);\n}\n...\n```\n\
  \n我将切换为延迟创建策略。在本章前面部分，我对通用池类使用了闭包来实现这一点，因为我不想让池直接了解其管理的对象是如何创建的。相比之下，SportsStore\
  \ 的`NetworkPool`类已经知道`NetworkConnection`类及其创建方式，这简化了策略的实现。清单 8-18 展示了为实现新策略所做的更改。\n\
  \n## 清单 8-18 在`NetworkPool.swift`文件中更改对象创建策略\n\n```\nimport Foundation\n\nfinal\
  \ class NetworkPool {\n    private let connectionCount = 3;\n    private var connections\
  \ = [NetworkConnection]();\n    private var semaphore:dispatch_semaphore_t;\n  \
  \  private var queue:dispatch_queue_t;\n    private var itemsCreated = 0;\n\n  \
  \  private init() {\n        semaphore = dispatch_semaphore_create(connectionCount);\n\
  \        queue = dispatch_queue_create(\"networkpoolQ\", DISPATCH_QUEUE_SERIAL);\n\
  \    }\n\n    private func doGetConnection() -> NetworkConnection {\n        dispatch_semaphore_wait(semaphore,\
  \ DISPATCH_TIME_FOREVER);\n        var result:NetworkConnection? = nil;\n      \
  \  dispatch_sync(queue, {() in\n            if (self.connections.count > 0) {\n\
  \                result = self.connections.removeAtIndex(0);\n            } else\
  \ if (self.itemsCreated < self.connectionCount) {\n                result = NetworkConnection();\n\
  \                self.itemsCreated++;\n            }\n        });\n        return\
  \ result!;\n    }\n\n    private func doReturnConnection(conn:NetworkConnection)\
  \ {\n        dispatch_async(queue, {() in\n            self.connections.append(conn);\n\
  \            dispatch_semaphore_signal(self.semaphore);\n        });\n    }\n\n\
  \    class func getConnection() -> NetworkConnection {\n        return sharedInstance.doGetConnection();\n\
  \    }\n\n    class func returnConnecton(conn:NetworkConnection) {\n        sharedInstance.doReturnConnection(conn);\n\
  \    }\n\n    private class var sharedInstance:NetworkPool {\n        get {\n  \
  \          struct SingletonWrapper {\n                static let singleton = NetworkPool();\n\
  \            }\n            return SingletonWrapper.singleton;\n        }\n    }\n\
  }\n```\n\n这些改动很简单。我移除了初始化器中急切创建`NetworkConnection`对象的代码，并添加了在`doGetConnection`方法中延迟创建它们的代码。操作一个管理特定类型的池类总是更容易，但我仍然更喜欢使用通用池类，因为这意味着我总能获得一致的池实现（因为我从一个项目到另一个项目复制代码），对我来说，这值得增加额外的复杂性。\n\
  \n## 本章小结\n\n在本章中，我向你展示了如何更改定义对象池工作方式的四个策略，以便你可以使用模式的不同实现来处理各种对象。很少有模式像对象池模式那样需要如此多的细节，我将在下一章回到更简单的领域，描述工厂方法模式。\n\
  \n\n\n"
- "# 9. 工厂方法模式\n\n工厂方法模式用于在多个实现同一协议或共享同一基类的类之间进行选择。该模式允许实现子类提供特化功能，而依赖这些子类的组件无需了解这些类的任何细节以及它们之间的关联方式。表\
  \ 9-1 将工厂方法模式置于上下文中。\n\n**注意**\n\n工厂方法模式与抽象工厂模式密切相关。有关抽象工厂模式的详细信息以及如何在两者之间做出选择，请参阅第\
  \ 10 章。\n\n**表 9-1.** 将工厂方法模式置于上下文中\n\n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？ | 工厂方法模式选择一个实现类来满足调用组件的请求，而无需该组件了解实现类或其相互关联方式的任何信息。\
  \ |\n| 有什么好处？ | 该模式整合了决定选择哪个实现类的逻辑，并防止该逻辑分散在整个应用程序中。这也意味着调用组件仅依赖于顶层协议或基类，无需了解实现类或选择它们的过程的任何信息。\
  \ |\n| 何时使用此模式？ | 当你有多个实现同一协议或派生自同一基类的类时，使用此模式。 |\n| 何时应避免此模式？ | 当没有公共协议或共享基类时，不要使用此模式，因为此模式的工作原理是让调用组件仅依赖于单一类型。\
  \ |\n| 如何知道是否正确实现了此模式？ | 当适当的类被实例化，而调用组件不知道使用了哪个类或如何选择它时，就正确实现了此模式。 |\n| 有哪些常见陷阱？\
  \ | 没有。工厂方法模式实现简单。 |\n| 有哪些相关模式？ | 工厂方法模式通常与单例模式和对象池模式结合使用。 |\n\n## 准备示例项目\n\n在本章中，我创建了一个名为\
  \ `FactoryMethod` 的 OS X 命令行工具项目。我向项目添加了一个名为 `RentalCar.swift` 的文件，其内容如代码清单 9-1\
  \ 所示。\n\n**代码清单 9-1.**`RentalCar.swift` 文件的内容\n\n```\nprotocol RentalCar {\n   \
  \ var name:String { get };\n    var passengers:Int { get };\n    var pricePerDay:Float\
  \ { get };\n}\n\nclass Compact : RentalCar {\n    var name = \"VW Golf\";\n    var\
  \ passengers = 3;\n    var pricePerDay:Float = 20;\n}\n\nclass Sports : RentalCar\
  \ {\n    var name = \"Porsche Boxter\";\n    var passengers = 1;\n    var pricePerDay:Float\
  \ = 100;\n}\n\nclass SUV : RentalCar {\n    var name = \"Cadillac Escalade\";\n\
  \    var passengers = 8;\n    var pricePerDay:Float = 75;\n}\n```\n\n该文件包含一个名为 `RentalCar`\
  \ 的协议以及三个遵循该协议的类：`Compact`、`Sports` 和 `SUV`。代码清单 9-2 展示了 `CarSelector.swift` 文件的内容，我将其添加到项目中，该文件定义了一个依赖于\
  \ `RentalCar` 协议及其实现的类。\n\n**代码清单 9-2.**`CarSelector.swift` 文件的内容\n\n```\nclass\
  \ CarSelector {\n    class func selectCar(passengers:Int) -> String? {\n       \
  \ var car:RentalCar?;\n        switch (passengers) {\n        case 0...1:\n    \
  \        car = Sports();\n        case 2...3:\n            car = Compact();\n  \
  \      case 4...8:\n            car = SUV();\n        default:\n            car\
  \ = nil;\n        }\n        return car?.name;\n    }\n}\n```\n\n`CarSelector` 类定义了一个名为\
  \ `selectCar` 的类型方法，该方法实例化一个 `RentalCar` 协议的实现，该实现能够容纳由 `passengers` 参数指定的乘客数量（不包括驾驶员）。`selectCar`\
  \ 方法的结果是被选中并实例化的 `RentalCar` 实现类的 `name` 属性的值。我还将代码清单 9-3 中所示的语句添加到了 `main.swift`\
  \ 文件中。\n\n**代码清单 9-3.**`main.swift` 文件的内容\n\n```\nimport Foundation\n\nlet passengers\
  \ = [1, 3, 5];\n\nfor p in passengers {\n    println(\"\\(p) passengers: \\(CarSelector.selectCar(p)!)\"\
  );\n}\n```\n\n`main.swift` 文件中的代码针对不同的乘客数量调用了 `CarSelector.selectCar` 方法，并将结果写入调试控制台。运行应用程序时，你将看到以下输出：\n\
  \n```\n1 passengers: Porsche Boxter\n3 passengers: VW Golf\n5 passengers: Cadillac\
  \ Escalade\n```\n\n\n\n## 理解该模式要解决的问题\n\n工厂方法模式解决了一个常见问题：当存在多个遵循同一协议的类，且需要选择实例化哪一个时。你可以在代码清单\
  \ 9-2 中看到具体应用，其中`CarSelector.selectCar`方法根据`passengers`参数的值，从遵循`RentalCar`协议的类中选择并实例化一个。\n\
  \n这种方法存在两个相关问题。第一个问题是，由于需要实例化具体实现类，`CarSelector`类并未从`RentalCar`协议提供的抽象中受益。事实上，`RentalCar`协议并未带来任何实际好处——当添加新的实现类时就能看出这一点，如代码清单\
  \ 9-4 所示。\n\n**代码清单 9-4.** 在`RentalCar.swift`文件中添加新实现类\n\n```\nprotocol RentalCar\
  \ {\n    var name:String { get };\n    var passengers:Int { get };\n    var pricePerDay:Float\
  \ { get };\n}\n\n// ...为简洁起见，省略其他实现类...\n\nclass Minivan : RentalCar {\n    var\
  \ name = \"Chevrolet Express\";\n    var passengers = 14;\n    var pricePerDay:Float\
  \ = 40;\n}\n```\n\n该清单展示了`Minivan`类的添加，代码清单 9-5 则显示了它对`CarSelector`类的影响。\n\n**代码清单\
  \ 9-5.** 在`CarSelector.swift`文件中添加对新实现类的支持\n\n```\nclass CarSelector {\n    class\
  \ func selectCar(passengers:Int) -> String? {\n        var car:RentalCar?;\n   \
  \     switch (passengers) {\n        case 0...1:\n            car = Sports();\n\
  \        case 2...3:\n            car = Compact();\n        case 4...8:\n      \
  \      car = SUV();\n        case 9...14:\n            car = Minivan();\n      \
  \  default:\n            car = nil;\n        }\n        return car?.name;\n    }\n\
  }\n```\n\n`CarSelector`类必须了解它想使用的每一个`RentalCar`协议实现，并知道何时创建它们。这不同于紧耦合，因为`CarSelector`类不依赖于所使用类的实现细节，但问题依然存在——它依赖于对实现协议类的了解。新增实现类需要更新`CarSelector`类；同样，当某个具体实现类的适用条件发生变化时，也需要更新。例如，如果我将`Sports`类使用的车型改为四座，就必须更新`CarSelector`类，使其知道该车型可用于\
  \ 1 到 3 名乘客。\n\n第二个问题是，随着我添加需要选择`RentalCar`协议实现的组件，关于如何选择实现类的知识会分散到整个应用程序中。在代码清单\
  \ 9-6 中，你可以看到添加到项目中的`PriceCalculator.swift`文件的内容。\n\n**代码清单 9-6.** `PriceCalculator.swift`文件的内容\n\
  \n```\nclass PriceCalculator {\n    class func calculatePrice(passengers:Int, days:Int)\
  \ -> Float? {\n        var car:RentalCar?;\n        switch (passengers) {\n    \
  \    case 0...1:\n            car = Sports();\n        case 2...3:\n           \
  \ car = Compact();\n        case 4...8:\n            car = SUV();\n        case\
  \ 9...14:\n            car = Minivan();\n        default:\n            car = nil;\n\
  \        }\n        return car == nil ? nil : car!.pricePerDay * Float(days);\n\
  \    }\n}\n```\n\n`PriceCalculator`类定义了一个名为`calculatePrice`的类型方法，用于计算给定乘客数和天数下的租车费用。选择`RentalCar`实现类的代码与`CarSelector`类完全相同，并且同样依赖于对这些类之间关系的理解。\n\
  \n> **注意**：在如此简单的示例中，这样重复代码显然不合理；但在一个多开发者的复杂项目中，由于没有其他方式获取实现类的实例，这种情况很容易出现。\n\n\
  这两个问题都是创建健壮且易于维护的软件的障碍。对类之间关系的分散依赖意味着，每当需要调整关系时，都会在整个应用程序中引发连锁变更，而且很容易遗漏某个必要的修改，从而产生难以测试的\
  \ bug。\n\n## 理解工厂方法模式\n\n工厂方法模式将选择实现类所需的逻辑封装在一个单一方法中，供调用组件访问。工厂方法仅向调用者暴露协议或基类，而不透露实现类的细节或它们之间的关系。工厂方法模式包含三个操作，如图\
  \ 9-1 所示。\n\n![A978-1-4842-0394-1_9_Fig1_HTML.jpg](img/A978-1-4842-0394-1_9_Fig1_HTML.jpg)\n\
  \n**图 9-1.** 工厂方法模式\n\n第一个操作发生在调用组件调用工厂方法时，它向工厂方法提供用于决定实例化哪个实现类的参数。\n\n在第二个操作中，工厂方法将决策逻辑应用于调用组件提供的参数，以决定实例化哪个实现类。最终操作会创建实现类的一个实例，并将其返回给调用组件，完成整个过程，为调用者提供其工作所需的对象。\n\
  \n调用组件无需理解实现类之间的关系。事实上，它甚至不需要知道这些实现类的存在，因为工厂方法的返回类型是协议或基类型，而不是已创建的具体实现（你将在下一节中看到具体工作原理）。\n\
  \n### 实现工厂方法模式\n\n工厂方法模式的核心——顾名思义——是一个方法。该方法封装了选择实现类的决策逻辑，定义了执行逻辑所需的参数，并返回其所操作协议的一个实现。\n\
  \n在 Java 和 C# 等语言中，实现工厂方法的标准机制是抽象类——一种定义了具体功能但必须通过子类化才能实例化的类型。在 Swift 中，实现工厂方法有两种基本方式，但略显不够优雅，我将在后续章节中演示。\n\
  \n\n## 定义全局工厂方法\n\n实现该模式最简单的方法是定义一个全局函数。全局函数在整个应用程序中都可使用，这使得调用组件能够轻松地找到并调用它们，如代码清单\
  \ 9-7 所示。\n\n**代码清单 9-7.** 在 `RentalCar.swift` 文件中实现工厂方法模式\n\n```\nfunc createRentalCar(passengers:Int)\
  \ -> RentalCar? {\n    var car:RentalCar?;\n    switch (passengers) {\n        case\
  \ 0...1:\n            car = Sports();\n        case 2...3:\n            car = Compact();\n\
  \        case 4...8:\n            car = SUV();\n        case 9...14:\n         \
  \   car = Minivan();\n        default:\n            car = nil;\n    }\n    return\
  \ car;\n}\n\nprotocol RentalCar {\n    var name:String { get };\n    var passengers:Int\
  \ { get };\n    var pricePerDay:Float { get };\n}\n\nclass Compact : RentalCar {\n\
  \    var name = \"VW Golf\";\n    var passengers = 3;\n    var pricePerDay:Float\
  \ = 20;\n}\n\n// ...为简洁起见，省略了实现类...\n```\n\n这看起来可能只是一个小改动，因为名为 `createRentalCar`\
  \ 的全局函数包含了与 `CarSelector` 和 `PriceCalculator` 类相同的决策逻辑。即便如此，它对调用组件产生的影响是深远的。代码清单\
  \ 9-8 展示了 `CarSelector` 类为使用该全局函数所做的更改。\n\n**代码清单 9-8.** 在 `CarSelector.swift` 文件中调用全局函数\n\
  \n```\nclass CarSelector {\n    class func selectCar(passengers:Int) -> String?\
  \ {\n        return createRentalCar(passengers)?.name;\n    }\n}\n```\n\n不仅代码量大大减少，而且\
  \ `CarSelector` 类只依赖于全局工厂函数和 `RentalCar` 协议。它不再了解任何关于实现类及其之间关系的信息——它只知道调用全局函数 `createRentalCar`\
  \ 会生成一个符合该协议的对象。代码清单 9-9 展示了 `PriceCalculator` 类相应的更改。\n\n**代码清单 9-9.** 在 `PriceCalculator.swift`\
  \ 文件中调用全局函数\n\n```\nclass PriceCalculator {\n    class func calculatePrice(passengers:Int,\
  \ days:Int) -> Float? {\n        var car = createRentalCar(passengers);\n      \
  \  return car == nil ? nil : car!.pricePerDay * Float(days);\n    }\n}\n```\n\n\
  每个类所提供的附加价值都保持不变，而且不会将决策逻辑和实现类扩散到整个应用程序中。\n\n## 使用基类\n\n全局函数的方法是可行的，但可能会感觉与它操作的协议和类有些脱节。另一种方法是用一个定义了工厂函数的基类来替代协议。代码清单\
  \ 9-10 展示了实现此方法所需的更改。（为了简化示例并为将来的改动做准备，我还减少了实现类的数量。）\n\n**代码清单 9-10.** 在 `RentalCar.swift`\
  \ 文件中使用基类实现模式\n\n```\nclass RentalCar {\n    private var nameBV:String;\n    private\
  \ var passengersBV:Int;\n    private var priceBV:Float;\n\n    private init(name:String,\
  \ passengers:Int, price:Float) {\n        self.nameBV = name;\n        self.passengersBV\
  \ = passengers;\n        self.priceBV = price;\n    }\n\n    final var name:String\
  \ {\n        get { return nameBV; }\n    }\n\n    final var passengers:Int {\n \
  \       get { return passengersBV; }\n    };\n\n    final var pricePerDay:Float\
  \ {\n        get { return priceBV; }\n    };\n\n    class func createRentalCar(passengers:Int)\
  \ -> RentalCar? {\n        var car:RentalCar?;\n        switch (passengers) {\n\
  \            case 0...3:\n                car = Compact();\n            case 4...8:\n\
  \                car = SUV();\n            default:\n                car = nil;\n\
  \        }\n        return car;\n    }\n}\n\nclass Compact : RentalCar {\n    private\
  \ init() {\n        super.init(name: \"VW Golf\", passengers: 3, price: 20);\n \
  \   }\n    // 紧凑型汽车特有的功能在此处实现\n}\n\nclass SUV : RentalCar {\n    private init()\
  \ {\n        super.init(name: \"Cadillac Escalade\", passengers: 8, price: 75);\n\
  \    }\n    // SUV 特有的功能在此处实现\n}\n```\n\n**提示**\n\n这只是实现风格上的差异。我更喜欢这种方式，因为我习惯于在其他语言中使用抽象类，而这在\
  \ Swift 中是能最接近该方法的做法。你可以选择最适合自己编码风格的方法。\n\n我已经用 `RentalCar` 类替代了 `RentalCar` 协议。我想用这个类来捕获协议对其实现施加的实现契约，因此我定义了\
  \ `final` 计算属性来暴露名称、乘客数量和价格，并定义了由 `private` 构造函数设置的私有后备存储属性。子类必须调用 `RentalCar` 的初始化器，这需要提供计算属性所使用的后备存储值，从而产生类似于使用协议的效果。\n\
  \n`RentalCar` 类定义了一个名为 `createRentalCar` 的类型方法，该方法包含决策逻辑，并负责创建返回给调用组件的对象。代码清单 9-11\
  \ 展示了如何更新 `CarSelector` 类以使用新的实现。\n\n**代码清单 9-11.** 在 `CarSelector.swift` 文件中消费基类\n\
  \n```\nclass CarSelector {\n    class func selectCar(passengers:Int) -> String?\
  \ {\n        return RentalCar.createRentalCar(passengers)?.name;\n    }\n}\n```\n\
  \n代码清单 9-12 展示了 `PriceCalculator` 类相应的更改。\n\n**代码清单 9-12.** 在 `PriceCalculator.swift`\
  \ 文件中消费基类\n\n```\nclass PriceCalculator {\n    class func calculatePrice(passengers:Int,\
  \ days:Int) -> Float? {\n        var car = RentalCar.createRentalCar(passengers);\n\
  \        return car == nil ? nil : car!.pricePerDay * Float(days);\n    }\n}\n```\n\
  \n\n\n### 为深层类层次结构委派决策\n\n如果你正在处理一个深度嵌套的实现类层次结构，那么将部分决策逻辑委派给类本身会非常有用，如代码清单 9-13\
  \ 所示。\n\n**代码清单 9-13.** 在 `RentalCar.swift` 文件中委派决策逻辑\n\n```\nclass RentalCar {\n\
  \    private var nameBV:String;\n    private var passengersBV:Int;\n    private\
  \ var priceBV:Float;\n    \n    private init(name:String, passengers:Int, price:Float)\
  \ {\n        self.nameBV = name;\n        self.passengersBV = passengers;\n    \
  \    self.priceBV = price;\n    }\n    \n    final var name:String { get { return\
  \ nameBV; }}\n    final var passengers:Int { get { return passengersBV; }};\n  \
  \  final var pricePerDay:Float { get { return priceBV; }};\n    \n    class func\
  \ createRentalCar(passengers:Int) -> RentalCar? {\n        var carImpl:RentalCar.Type?;\n\
  \        switch (passengers) {\n        case 0...3:\n            carImpl = Compact.self;\n\
  \        case 4...8:\n            carImpl = SUV.self\n        default:\n       \
  \     carImpl = nil;\n        }\n        return carImpl?.createRentalCar(passengers);\n\
  \    }\n}\n\nclass Compact : RentalCar {\n    private convenience init() {\n   \
  \     self.init(name: \"VW Golf\", passengers: 3, price: 20);\n    }\n    \n   \
  \ private override init(name: String, passengers: Int, price: Float) {\n       \
  \ super.init(name: name, passengers: passengers, price: price);\n    }\n    \n \
  \   override class func createRentalCar(passengers:Int) -> RentalCar? {\n      \
  \  if (passengers < 2) {\n            return Compact();\n        } else {\n    \
  \        return SmallCompact();\n        }\n    }\n}\n\nclass SmallCompact : Compact\
  \ {\n    private init() {\n        super.init(name: \"Ford Fiesta\", passengers:\
  \ 3, price: 15);\n    }\n}\n\nclass SUV : RentalCar {\n    private init() {\n  \
  \      super.init(name: \"Cadillac Escalade\", passengers: 8, price: 75);\n    }\n\
  \    \n    override class func createRentalCar(passengers:Int) -> RentalCar? {\n\
  \        return SUV();\n    }\n}\n```\n\n> **注意**  \n> 有些人认为将对象创建委派给实现类是工厂方法模式的核心部分。我持有更宽松的观点，通常只在处理复杂的类层次结构时才使用委派。对于更简单的情况，我倾向于将决策逻辑集中在一个地方，就像我在上一节中所做的那样，因为我觉得这样更容易测试和维护。\n\
  \n我通过继承 `Compact` 类来创建 `SmallCompact` 类，从而扩展了可用的租车范围。我本可以将选择 `Compact` 或 `SmallCompact`\
  \ 的决策逻辑放在 `RentalCar` 类中，但对于深层嵌套的类层次结构（远比我这里使用的两个类要深），这种方法会变得难以维护。\n\n另一种方法是将决策下推到实现类中，例如，基于这样的原则：`Compact`\
  \ 类最适合判断何时应该使用它自身，以及何时使用 `SmallCompact` 类更合适，如图 9-2 所示。\n\n![A978-1-4842-0394-1_9_Fig2_HTML.jpg](img/A978-1-4842-0394-1_9_Fig2_HTML.jpg)\n\
  \n**图 9-2.** 将决策委派给子类\n\n在委派决策时，工厂方法必须将之前合并在一起的工作拆分为两个独立操作。第一个操作是确定将实例化哪个类型来满足请求，如下所示：\n\
  \n```\n...\nvar carImpl:RentalCar.Type?;\nswitch (passengers) {\ncase 0...3:\n \
  \   carImpl = Compact.self;\ncase 4...8:\n    carImpl = SUV.self\ndefault:\n   \
  \ carImpl = nil;\n}\n...\n```\n\n`carImpl` 变量被定义为一个可选的 `RentalCar.Type` 类型。`Type`\
  \ 后缀表明该变量将是一个元类型而非对象（即指实现类本身，而非其实例）。`RentalCar` 工厂方法中的逻辑会选择一个顶层实现类，然后调用其 `createRentalCar`\
  \ 方法来创建结果并返回给调用者。\n\n```\n...\nreturn carImpl?.createRentalCar(passengers);\n...\n\
  ```\n\n部分而言，将决策逻辑放在何处是个人偏好的问题。我通常会先将决策逻辑集中在工厂方法中，只有当条件语句难以管理，或者用于验证决策的单元测试变得笨拙时，才开始进行委派——到那时，我才会开始将决策下推到类本身中。但请记住，将所有逻辑放在工厂方法中会创建对所有实现类及其子类的依赖，当处理复杂的类层次结构时，这可能会削弱应用该模式所带来的好处。\n\
  \n\n## 工厂方法模式的变体\n\n工厂方法模式可以与其他模式结合，通过整合决策逻辑来为更复杂的应用程序增加结构。最常见的组合是使用工厂方法模式选择不同的单例对象，这些对象要么实现同一个通用协议，要么都派生自同一个基类。在代码清单\
  \ 9-14 中，你可以看到我如何将示例项目中的实现类修改为单例。\n\n代码清单 9-14. 在 `RentalCar.swift` 文件中结合单例模式与工厂方法模式\n\
  \n```\nclass RentalCar {\n    private var nameBV:String;\n    private var passengersBV:Int;\n\
  \    private var priceBV:Float;\n    \n    private init(name:String, passengers:Int,\
  \ price:Float) {\n        self.nameBV = name;\n        self.passengersBV = passengers;\n\
  \        self.priceBV = price;\n    }\n    \n    final var name:String { get { return\
  \ nameBV; }}\n    final var passengers:Int { get { return passengersBV; }};\n  \
  \  final var pricePerDay:Float { get { return priceBV; }};\n    \n    class func\
  \ createRentalCar(passengers:Int) -> RentalCar? {\n        var carImpl:RentalCar.Type?;\n\
  \        switch (passengers) {\n        case 0...3:\n            carImpl = Compact.self;\n\
  \        case 4...8:\n            carImpl = SUV.self\n        default:\n       \
  \     carImpl = nil;\n        }\n        return carImpl?.createRentalCar(passengers);\n\
  \    }\n}\n\nclass Compact : RentalCar {\n    private convenience init() {\n   \
  \     self.init(name: \"VW Golf\", passengers: 3, price: 20);\n    }\n    \n   \
  \ private override init(name: String, passengers: Int, price: Float) {\n       \
  \ super.init(name: name, passengers: passengers, price: price);\n    }\n    \n \
  \   override class func createRentalCar(passengers:Int) -> RentalCar? {\n      \
  \  if (passengers < 2) {\n            return sharedInstance;\n        } else {\n\
  \            return SmallCompact.sharedInstance;\n        }\n    }\n    \n    class\
  \ var sharedInstance:RentalCar {\n        get {\n            struct SingletonWrapper\
  \ {\n                static let singleton = Compact();\n            }\n        \
  \    return SingletonWrapper.singleton;\n        }\n    }\n}\n\nclass SmallCompact\
  \ : Compact {\n    private init() {\n        super.init(name: \"Ford Fiesta\", passengers:\
  \ 3, price: 15);\n    }\n    \n    override class var sharedInstance:RentalCar {\n\
  \        get {\n            struct SingletonWrapper {\n                static let\
  \ singleton = SmallCompact();\n            }\n            return SingletonWrapper.singleton;\n\
  \        }\n    }\n}\n\nclass SUV : RentalCar {\n    private init() {\n        super.init(name:\
  \ \"Cadillac Escalade\", passengers: 8, price: 75);\n    }\n    \n    override class\
  \ func createRentalCar(passengers:Int) -> RentalCar? {\n        return SUV();\n\
  \    }\n}\n```\n\n我修改了 `Compact` 和 `Subcompact` 类，使它们使用第 6 章中描述的结构体技术来定义单例。这些单例被应用于\
  \ `Compact.createRentalCar` 方法的修改实现中，该方法返回共享实例，而不是创建新实例。\n\n结合单例模式与工厂方法模式的结果是，关于单例的知识被紧密封装在实现类内部。工厂方法的调用组件不知道——也不关心——它接收到的是新实例还是单例，工厂方法本身也同样不关心。你还可以将单例与新实例混合使用。`SUV`\
  \ 类就说明了这一点，它没有使用单例，其 `createRentalCar` 方法的实现每次被调用时都会创建一个新实例。\n\n**提示** 你还可以使用工厂方法来管理对一组相关对象池的访问。如果这样做，请记住为每个实现对象类创建一个对象池。如果对所有对象使用单个对象池，调用者将收到错误的实现类型。\n\
  \n## 理解该模式的陷阱\n\n该模式没有严重的陷阱，只需确保工厂方法不会透露任何关于选择了哪个实现类来满足请求的细节。\n\n## Cocoa 中的工厂方法模式示例\n\
  \nObjective-C 的 Cocoa 类广泛使用了工厂方法模式，将实现该模式的类称为类簇。类簇通过工厂方法进行管理，但这些方法在 Swift 中被映射为便捷初始化器，从而隐藏了底层细节。\n\
  \n例如，`Foundation` 框架中的 `NSNumber` 类定义了一个名为 `numberWithBool` 的 Objective-C 工厂方法，它接受一个\
  \ `BOOL` 值并返回一个表示该值的 `NSNumber` 对象（数值为 `0` 或 `1`）。\n\n这个 `numberWithBool` 方法在 Swift\
  \ 中表现为一个接受 `Bool` 值的便捷初始化器，如下所示：\n\n```\nvar number = NSNumber(bool: true);\n```\n\
  \n调用此初始化器的结果是创建了一个 `NSBoolNumber` 对象，但这对调用者来说是隐藏的，并以 `NSNumber` 对象的形式呈现。\n\n**注意**\
  \ 无法使用 Swift 的初始化器为你自己的类实现工厂方法模式。只有 Objective-C 的工厂方法才会以这种方式处理。\n\n## 将模式应用于 SportsStore\
  \ 应用程序\n\n为了完成本章，我将把工厂方法模式应用于 SportsStore 应用程序，以创建 `Product` 类的变体。\n\n**提示** 请记住，你可以从\
  \ [`Apress.com`](https://Apress.com) 下载本书所有项目的源代码——包括不同阶段的 SportsStore 应用程序。\n\n\
  \n\n### 准备示例应用\n\n为了准备演示该模式，我需要创建代表不同类型产品的实现类。列表 9-15 展示了我创建的附加类。\n\n**列表 9-15.**\
  \ 在 `Product.swift` 文件中定义子类\n\n```\nimport Foundation\n\nclass Product : NSObject,\
  \ NSCopying {\n\n    private(set) var name:String;\n    private(set) var productDescription:String;\n\
  \    private(set) var category:String;\n    private var stockLevelBackingValue:Int\
  \ = 0;\n    private var priceBackingValue:Double = 0;\n    private var salesTaxRate:Double\
  \ = 0.2;\n\n    required init(name:String, description:String, category:String,\
  \ price:Double,\n        stockLevel:Int) {\n        self.name = name;\n        self.productDescription\
  \ = description;\n        self.category = category;\n        super.init();\n   \
  \     self.price = price;\n        self.stockLevel = stockLevel;\n    }\n\n    var\
  \ stockLevel:Int {\n        get { return stockLevelBackingValue;}\n        set {\
  \ stockLevelBackingValue = max(0, newValue);}\n    }\n\n    private(set) var price:Double\
  \ {\n        get { return priceBackingValue;}\n        set { priceBackingValue =\
  \ max(1, newValue);}\n    }\n\n    var stockValue:Double {\n        get {\n    \
  \        return (price * (1 + salesTaxRate)) * Double(stockLevel);\n        }\n\
  \    }\n\n    func copyWithZone(zone: NSZone) -> AnyObject {\n        return Product(name:\
  \ self.name, description: self.description,\n            category: self.category,\
  \ price: self.price,\n            stockLevel: self.stockLevel);\n    }\n\n    var\
  \ upsells:[UpsellOpportunities] {\n        get {\n            return Array();\n\
  \        }\n    }\n}\n\nenum UpsellOpportunities {\n    case SwimmingLessons;\n\
  \    case MapOfLakes;\n    case SoccerVideos;\n}\n\nclass WatersportsProduct : Product\
  \ {\n    required init(name: String, description: String, category: String,\n  \
  \      price: Double, stockLevel: Int) {\n        super.init(name: name, description:\
  \ description, category: category,\n            price: price, stockLevel: stockLevel);\n\
  \        salesTaxRate = 0.10;\n    }\n    override var upsells:[UpsellOpportunities]\
  \ {\n        return [UpsellOpportunities.SwimmingLessons, UpsellOpportunities.MapOfLakes];\n\
  \    }\n}\n\nclass SoccerProduct: Product {\n    required init(name: String, description:\
  \ String, category: String,\n        price: Double, stockLevel: Int) {\n       \
  \ super.init(name: name, description: description, category: category,\n       \
  \     price: price, stockLevel: stockLevel);\n        salesTaxRate = 0.25;\n   \
  \ }\n    override var upsells:[UpsellOpportunities] {\n        return [UpsellOpportunities.SoccerVideos];\n\
  \    }\n}\n```\n\n我增强了 `Product` 类，增加了一个用于计算库存价值的税率。我还定义了一个名为 `UpsellOpportunities`\
  \ 的枚举，用于列出可能引起客户兴趣的附加产品。\n\n我创建了两个派生自 `Product` 的子类：`WatersportsProduct` 和 `SoccerProduct`。在实现工厂方法模式时，我定义的决策逻辑将根据产品类别选择相应的子类。普通的\
  \ `Product` 对象将代表那些没有专门子类的产品。\n\n### 实现工厂方法模式\n\n为了实现该模式，我在 `Pattern` 类上定义了一个类型方法，其中包含了所有的决策逻辑。SportsStore\
  \ 应用的对象层级结构过于简单，无需将决策逻辑委托出去。列表 9-16 展示了工厂方法。\n\n**列表 9-16.** 在 `Product.swift` 文件中实现工厂方法模式\n\
  \n```\n...\nclass Product : NSObject, NSCopying {\n    private(set) var name:String;\n\
  \    private(set) var productDescription:String;\n    private(set) var category:String;\n\
  \    private var stockLevelBackingValue:Int = 0;\n    private var priceBackingValue:Double\
  \ = 0;\n    private var salesTaxRate:Double = 0.2;\n\n    required init(name:String,\
  \ description:String, category:String, price:Double,\n        stockLevel:Int) {\n\
  \        self.name = name;\n        self.productDescription = description;\n   \
  \     self.category = category;\n        super.init();\n        self.price = price;\n\
  \        self.stockLevel = stockLevel;\n    }\n    // ...为简洁起见，省略了属性和方法...\n\n \
  \   class func createProduct(name:String, description:String, category:String,\n\
