  \ Label` | `Font` | `System 25` |\n| `Text Field` | `Font` | `System 30` |\n\n###\
  \ 设置表格单元格布局约束\n\n使用组件层级结构设置表 3-5 中所示的布局约束。这些约束确保无论用于显示应用的设备和方向如何，表格单元格的内容都将保持可见。\n\
  \n**表 3-5.** 自定义表格单元格组件所需的约束\n\n| 拖拽自 | 拖拽至 | 约束 |\n| --- | --- | --- |\n| `Text\
  \ Field` | `Content View` | `尾部空间到容器边距` `顶部空间到容器边距` |\n| `Text Field` | `Text Field`\
  \ | `宽度` |\n| `Stepper` | `Content View` | `顶部空间到容器边距` |\n| `Stepper` | `Text Field`\
  \ | `水平间距` |\n| `Name Label` | `Content View` | `前导空间到容器边距` `顶部空间到容器边距` |\n| `Name\
  \ Label` | `Stepper` | `水平间距` |\n| `Name Label` | `Name Label` | `高度` |\n| `Description\
  \ Label` | `Content View` | `前导空间到容器边距` `尾部空间到容器边距` `底部空间到容器边距` |\n\n### 创建表格单元格类与出口\n\
  \n为了能够在表格单元格中显示每个产品的详细信息，我需要能够引用上一节添加到布局中的组件。为此，我创建了带有 `IBOutlet` 属性的变量，就像我为显示库存总件数的\
  \ `UILabel` 组件所做的那样。但这里有个小问题：我需要定义一个用于实例化表格中每个单元格的类，然后将其用作出口的容器。我无法在 `ViewController`\
  \ 类中处理这个问题，因为自定义数据单元格类必须派生自 `UITableViewCell`，而 Swift 不支持多重类继承。代码清单 3-4 显示了在 `ViewController.swift`\
  \ 文件中添加一个新类的操作。\n\n**代码清单 3-4.** 在 `ViewController.swift` 文件中添加表格单元格类\n\n```\nimport\
  \ UIKit\n\nclass ProductTableCell : UITableViewCell {\n\n}\n\nclass ViewController:\
  \ UIViewController {\n    // ...为简洁起见，省略了语句...\n}\n```\n\n我定义了一个名为 `ProductTableCell`\
  \ 的新类，它将用于实例化表格中的单元格。要应用此类，请在组件层级结构中选择 `Table View Cell` 项，然后使用身份检查器将 `Class` 属性的值更改为\
  \ `ProductTableCell`，并将 `Module` 属性的值更改为 `SportsStore`。\n\n接下来，切换到属性检查器，并将 `Identifier`\
  \ 属性设置为 `ProductCell`。\n\n> **提示：** 更改 `Class` 属性会告诉 iOS 在需要表格单元格时使用 `ProductTableCell`\
  \ 类。设置 `Identifier` 将允许我请求自动创建 `ProductTableCell` 对象，我将在下一节中执行此操作。\n\n按住 Control\
  \ 键，依次将上一节添加的四个组件——两个标签、一个文本字段和一个步进器——拖拽到代码编辑器中的新 `ProductTableCell` 类中，以创建新的出口属性；你可以从组件层级结构或故事板中拖拽这些项目。表\
  \ 3-6 显示了组件名称与我为出口使用的名称之间的映射关系。\n\n> **提示：** 如果在创建出口时看到错误，提示没有 `ProductTableCell`\
  \ 类的可用信息，请重启 Xcode。\n\n**表 3-6.** `ProductTableCell` 类中组件名称到出口属性名称的映射\n\n| 名称 |\
  \ 描述 |\n| --- | --- |\n| `Name Label` | `nameLabel` |\n| `Description Label` | `descriptionLabel`\
  \ |\n| `Stepper` | `stockStepper` |\n| `Text Field` | `stockField` |\n\n当你创建完所有四个出口后，`ProductTableCell`\
  \ 类应与代码清单 3-5 一致。\n\n**代码清单 3-5.** 在 `ViewController.swift` 文件的 `ProductTableCell`\
  \ 类中添加出口属性\n\n```\n...\n\nclass ProductTableCell : UITableViewCell {\n\n    @IBOutlet\
