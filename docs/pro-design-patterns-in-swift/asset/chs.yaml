  \              return results;\n                    }\n                );\n    \
  \        }\n            return singletonWrapper.singletonData;\n        }\n    }\n\
  }\n\nclass FlyweightImplementation : Flyweight  {\n    // ...为简洁起见，省略了语句...\n}\n\
  ```\n\n`FlyweightFactory` 类定义了一个名为 `createFlyweight` 的类方法，该方法返回一个符合 `Flyweight`\
  \ 协议的对象。`createFlyweight` 的实现创建了一个 `FlyweightImplementation` 对象，并将外在数据作为初始化参数传递给它。我使用第\
  \ 6 章中描述的单例模式创建外在数据。这确保了外在数据以懒加载和线程安全的方式创建。\n\n为了填充字典集合，我定义了一个扩展，该扩展提供了一个接受函数作为参数的初始化器。调用该函数生成一个键值元组数组，然后我将其添加到字典中。这种方法绕过了\
  \ Swift 对类变量支持的局限性，并确保我可以在单例初始化过程中用外在数据填充字典。\n\n### 应用享元\n\n最后一步是修改 `Spreadsheet`\
