  \    @IBOutlet weak var stockStepper: UIStepper!\n    @IBOutlet weak var stockField:\
  \ UITextField!\n}\n\n...\n```\n\n只要定义了所有四个属性，并且它们与表中所示的组件对应，属性的顺序无关紧要。\n\n\n\n###\
  \ 实现数据源协议\n\n为了提供带数据的表格，我需要实现`UITableViewDataSource`协议中的两个方法，这样我就能告诉表格有多少行并生成每个单元格。在此之前，我需要创建一个输出口属性，以便能够从`ViewController`类中引用表格视图。\n\
  \n从组件层级中按住 Control 键拖动`Table View`元素到`ViewController`类，松开鼠标，以便 Xcode 在`totalStockOutlet`属性下方创建该属性。将属性名称设为`tableView`。结果应添加清单\
  \ 3-6 中所示的属性。\n\n**清单 3-6.** 在 ViewController.swift 文件中为表格视图添加输出口属性\n\n```\nimport\
  \ UIKit\n\nclass ProductTableCell : UITableViewCell {\n    // ...为简洁起见省略了语句...\n\
  }\n\nclass ViewController: UIViewController {\n    @IBOutlet weak var totalStockLabel:\
  \ UILabel!\n    @IBOutlet weak var tableView: UITableView!\n    // ...为简洁起见省略了语句...\n\
  }\n```\n\n现在我可以将协议添加到`UIViewController`类中，并实现`UITableViewDataSource`协议中的两个方法，如清单\
  \ 3-7 所示。\n\n**清单 3-7.** 在 ViewController.swift 文件中实现数据源协议方法\n\n```\nimport UIKit\n\
  \nclass ProductTableCell: UITableViewCell {\n    @IBOutlet weak var nameLabel: UILabel!\n\
  \    @IBOutlet weak var descriptionLabel: UILabel!\n    @IBOutlet weak var stockStepper:\
  \ UIStepper!\n    @IBOutlet weak var stockField: UITextField!\n}\n\nclass ViewController:\
  \ UIViewController, UITableViewDataSource {\n    @IBOutlet weak var totalStockLabel:\
  \ UILabel!\n    @IBOutlet weak var tableView: UITableView!\n    var products = [\n\
  \        (\"Kayak\", \"A boat for one person\", \"Watersports\", 275.0, 10),\n \
  \       (\"Lifejacket\", \"Protective and fashionable\", \"Watersports\", 48.95,\
  \ 14),\n        (\"Soccer Ball\", \"FIFA-approved size and weight\", \"Soccer\"\
  , 19.5, 32),\n        (\"Corner Flags\", \"Give your playing field a professional\
  \ touch\",\n            \"Soccer\", 34.95, 1),\n        (\"Stadium\", \"Flat-packed\
  \ 35,000-seat stadium\", \"Soccer\", 79500.0, 4),\n        (\"Thinking Cap\", \"\
  Improve your brain efficiency by 75%\", \"Chess\", 16.0, 8),\n        (\"Unsteady\
  \ Chair\", \"Secretly give your opponent a disadvantage\",\n            \"Chess\"\
  , 29.95, 3),\n        (\"Human Chess Board\", \"A fun game for the family\", \"\
  Chess\", 75.0, 2),\n        (\"Bling-Bling King\", \"Gold-plated, diamond-studded\
  \ King\",\n            \"Chess\", 1200.0, 4)];\n\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad();\n        displayStockTotal();\n    }\n\n    override\
  \ func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning();\n \
  \   }\n\n    func tableView(tableView: UITableView,\n        numberOfRowsInSection\
  \ section: Int) -> Int {\n            return products.count;\n    }\n\n    func\
  \ tableView(tableView: UITableView,\n        cellForRowAtIndexPath indexPath: NSIndexPath)\
  \ -> UITableViewCell {\n            let product = products[indexPath.row];\n   \
  \         let cell = tableView.dequeueReusableCellWithIdentifier(\"ProductCell\"\
  )\n                as ProductTableCell;\n            cell.nameLabel.text = product.0;\n\
  \            cell.descriptionLabel.text = product.1;\n            cell.stockStepper.value\
  \ = Double(product.4);\n            cell.stockField.text = String(product.4);\n\
  \            return cell;\n    }\n\n    func displayStockTotal() {\n        let\
  \ stockTotal = products.reduce(0,\n            {(total, product) -> Int in return\
  \ total + product.4});\n        totalStockLabel.text = \"\\(stockTotal) Products\
  \ in Stock\";\n    }\n}\n```\n\n`UITableDataViewDataSource`协议中的方法都叫做`tableView`，通过它们定义的参数来区分。定义`numberOfRowsInSection`参数的`tableView`方法版本用于确定表格中会有多少行，我通过返回`product`数组中元组的数量来实现。\n\
  \n`tableView`方法的另一个版本创建`UITableViewCell`类的实例，该类代表表格中的一行。通过`indexPath`参数的`row`属性可以访问该行的信息。我为表格视图添加输出口属性的原因在于，这样可以调用`dequeueReusableCellWithIdentifier`方法，该方法会复用那些已创建但用于显示不再可见内容的单元格。`dequeueReusableCellWithIdentifier`方法的参数是我用来为自定义表格单元格设置`Identifier`属性的值，这样表格就知道如何创建`ProductTableCell`类的实例。\n\
  \n### 注册数据源\n\n显示数据的最后一步是将视图控制器类注册为表格的数据源。按住 Control 键从组件层级中的`Table View`元素拖动到`View\
  \ Controller`元素。松开鼠标时，会弹出一个菜单——选择`dataSource`项以链接`ViewController`和表格，如图 3-15 所示。\n\
  \n![A978-1-4842-0394-1_3_Fig15_HTML.jpg](img/A978-1-4842-0394-1_3_Fig15_HTML.jpg)\n\
  \n**图 3-15.** 为表格视图设置数据源\n\n### 测试数据源\n\n为了测试由`ViewController`类提供的数据，点击 Xcode 工具栏上的\
  \ Play 按钮，这将构建项目并将应用发送到 iOS 模拟器，如图 3-16 所示。\n\n![A978-1-4842-0394-1_3_Fig16_HTML.jpg](img/A978-1-4842-0394-1_3_Fig16_HTML.jpg)\n\
  \n**图 3-16.** 测试 SportsStore 应用\n\n## 处理编辑操作\n\n在本节中，我将通过连接`Stepper`和`Text Field`组件来完善\
  \ SportsStore 应用，以便用户能够更改产品的库存量。为了直观地确认更改，我将更新屏幕底部`Label`组件显示的文本。\n\n切换到连接检查器，然后点击组件层级中的`Text\
  \ Field`元素。检查器会显示支持的事件列表。从`Editing Changed`事件右侧的圆形（即连接井）拖动到助理编辑器中的`ViewController`类，并将线条定位在`displayStockTotal`方法定义的上方。松开鼠标，会出现一个弹出菜单，如图\
  \ 3-17 所示。\n\n![A978-1-4842-0394-1_3_Fig17_HTML.jpg](img/A978-1-4842-0394-1_3_Fig17_HTML.jpg)\n\
  \n**图 3-17.** 创建操作方法\n\n将`Name`设置为`stockLevelDidChange`，然后点击 Connect 按钮。Xcode 会将清单\
  \ 3-8 所示的方法添加到`ViewController`类中。\n\n**清单 3-8.** 在 ViewController.swift 文件中添加操作方法\n\
  \n```\n...\n@IBAction func stockLevelDidChange(sender: AnyObject) {\n}\n...\n```\n\
  \n`IBAction`属性表明这是一个将在布局组件发生更改时被调用的方法——本例中，是在文本字段被编辑时触发。\n\n我希望当步进器的值发生变化时也能调用相同的方法，因此点击组件层级中的`Stepper`元素，转到连接检查器，然后从`Value\
  \ Changed`连接井处拖动。\n\n将指针定位到`stockLevelDidChange`方法上，直到该方法高亮显示，并且文本气泡从`Insert Action`变为`Connection\
  \ Action`，然后松开鼠标按钮。\n\n**提示：** Xcode 在连接到现有事件时可能不可靠。如果你没有看到方法高亮显示，那么只需创建一个新的操作方法，并将其名称设置为`stockLevelDidChange`，就像对文本字段所做的那样。这会在代码文件中创建两个同名的方法。删除其中一个方法——删除哪个都无所谓。组件和方法之间的关系是通过方法名来处理的，因此这种替代方法可以用来绕开\
  \ Xcode 的一个限制。\n\n\n\n### 处理事件\n\n当用户与`Stepper`或`Text Field`组件交互时，会调用`stockLevelDidChange`方法，从而让我能够相应地更新库存水平。清单\
  \ 3-9 展示了我对`ViewController`类所做的修改，以便处理这些事件。\n\n**清单 3-9. 在 ViewController.swift\
  \ 文件中处理事件**\n\n```swift\nimport UIKit\n\nclass ProductTableCell : UITableViewCell\
  \ {\n\n@IBOutlet weak var nameLabel: UILabel!\n@IBOutlet weak var descriptionLabel:\
  \ UILabel!\n@IBOutlet weak var stockStepper: UIStepper!\n@IBOutlet weak var stockField:\
  \ UITextField!\n\nvar productId:Int?;\n\n}\n\nclass ViewController: UIViewController,\
  \ UITableViewDataSource {\n\n@IBOutlet weak var totalStockLabel: UILabel!\n@IBOutlet\
  \ weak var tableView: UITableView!\n\nvar products = [\n(\"Kayak\", \"A boat for\
  \ one person\", \"Watersports\", 275.0, 10),\n(\"Lifejacket\", \"Protective and\
  \ fashionable\", \"Watersports\", 48.95, 14),\n(\"Soccer Ball\", \"FIFA-approved\
  \ size and weight\", \"Soccer\", 19.5, 32),\n(\"Corner Flags\", \"Give your playing\
  \ field a professional touch\",\n\"Soccer\", 34.95, 1),\n(\"Stadium\", \"Flat-packed\
  \ 35,000-seat stadium\", \"Soccer\", 79500.0, 4),\n(\"Thinking Cap\", \"Improve\
  \ your brain efficiency by 75%\", \"Chess\", 16.0, 8),\n(\"Unsteady Chair\", \"\
  Secretly give your opponent a disadvantage\",\n\"Chess\", 29.95, 3),\n(\"Human Chess\
  \ Board\", \"A fun game for the family\", \"Chess\", 75.0, 2),\n(\"Bling-Bling King\"\
  , \"Gold-plated, diamond-studded King\",\n\"Chess\", 1200.0, 4)];\n\noverride func\
  \ viewDidLoad() {\nsuper.viewDidLoad()\ndisplayStockTotal();\n}\n\noverride func\
  \ didReceiveMemoryWarning() {\nsuper.didReceiveMemoryWarning()\n}\n\nfunc tableView(tableView:\
  \ UITableView,\nnumberOfRowsInSection section: Int) -> Int {\nreturn products.count;\n\
  }\n\nfunc tableView(tableView: UITableView,\ncellForRowAtIndexPath indexPath: NSIndexPath)\
  \ -> UITableViewCell {\nlet product = products[indexPath.row];\nlet cell = tableView.dequeueReusableCellWithIdentifier(\"\
  ProductCell\")\nas ProductTableCell;\ncell.productId = indexPath.row;\ncell.nameLabel.text\
  \ = product.0;\ncell.descriptionLabel.text = product.1;\ncell.stockStepper.value\
  \ = Double(product.4);\ncell.stockField.text = String(product.4);\nreturn cell;\n\
  }\n\n@IBAction func stockLevelDidChange(sender: AnyObject) {\nif var currentCell\
  \ = sender as? UIView {\nwhile (true) {\ncurrentCell = currentCell.superview!;\n\
  if let cell = currentCell as? ProductTableCell {\nif let id = cell.productId? {\n\
  var newStockLevel:Int?;\nif let stepper = sender as? UIStepper {\nnewStockLevel\
  \ = Int(stepper.value);\n} else if let textfield = sender as? UITextField {\nif\
  \ let newValue = textfield.text.toInt()? {\nnewStockLevel = newValue;\n}\n}\nif\
  \ let level = newStockLevel {\nproducts[id].4 = level;\ncell.stockStepper.value\
  \ = Double(level);\ncell.stockField.text = String(level);\n}\n}\nbreak;\n}\n}\n\
  displayStockTotal();\n}\n}\n\nfunc displayStockTotal() {\nlet stockTotal = products.reduce(0,\n\
  {(total, product) -> Int in return total + product.4});\ntotalStockLabel.text =\
  \ \"\\(stockTotal) Products in Stock\";\n}\n}\n```\n\n我做的第一个修改是向`ProductTableCell`类添加了一个`productId`属性，并在创建表格单元格的`tableView`方法中对其进行了设置。在`stockLevelDidChange`方法中，我使用这个属性来建立调用该方法的组件与需要更改库存水平的产品之间的映射关系。`setLevelDidChange`方法的参数是触发事件的组件，我利用它来确定如何获取新的库存水平并更新给用户显示的内容。在`stockLevelDidChange`方法的末尾，我调用了`displayStockTotal`，以便在视觉上向用户强调该变化。\n\
  \n## 测试 SportsStore 应用\n\n无结构的 SportsStore 应用现在已完成。要查看最终结果，请点击 Xcode 工具栏上的“Play”按钮。图\
  \ 3-18 展示了该应用在横向模式下的外观。\n\n![A978-1-4842-0394-1_3_Fig18_HTML.jpg](img/A978-1-4842-0394-1_3_Fig18_HTML.jpg)\n\
  \n*图 3-18. 完成后的无结构 SportsStore 应用*\n\n用户会看到一个产品列表，并可以使用`Stepper`和`Text Field`组件来更改每个产品的库存水平。库存总数显示在屏幕底部。\n\
  \n这个应用毫无疑问是基础性的，但它让我能够展示本书所需的 Xcode 技术，并提供了一个示例，我可以在其中应用不同的模式，同时向你展示代码片段。\n\n##\
  \ 总结\n\nXcode 是一款特性鲜明的开发工具，起初可能令人困惑，但它确实拥有一些创建应用的好工具。在本章中，我创建了一个尽可能少结构的 iOS 应用。我依靠这个应用在更广泛的背景下演示设计模式，以便为它们的使用提供更真实的场景。\n\
