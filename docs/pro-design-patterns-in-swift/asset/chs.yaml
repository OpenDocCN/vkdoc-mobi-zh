- "# 10. 抽象工厂模式\n\n在本章中，我将介绍抽象工厂模式。该模式与我在第 9 章中描述的工厂方法模式类似，但它允许调用组件获取一族或一组相关对象，而无需知道具体使用了哪些类来创建它们。表\
  \ 10-1 将抽象工厂模式置于上下文中进行说明。\n\n表 10-1. 将抽象工厂模式置于上下文中\n\n| 问题 | 答案 |\n| --- | --- |\n\
  | 是什么？ | 抽象工厂模式允许调用组件创建一组相关对象。该模式隐藏了用于创建对象的类以及从调用组件中选择这些原因的全部细节。此模式与我之前在第 9 章描述的工厂方法模式类似，但它向调用组件提供一组对象。\
  \ |\n| 有什么好处？ | 调用组件无需知道用于创建对象的类或选择它们的原因，这使得在不更改使用这些对象的组件的情况下，可以更改所使用的类。 |\n| 何时使用此模式？\
  \ | 当需要确保调用组件使用多个兼容对象，而该组件无需知道哪些对象能够协同工作时，使用此模式。 |\n| 何时应避免使用此模式？ | 不要使用此模式来创建单个对象；工厂方法模式是更简单的替代方案，应优先使用。\
  \ |\n| 如何判断是否已正确实现该模式？ | 当调用组件接收到一组对象，却不知道用于实例化它们的类是哪些时，即视为正确实现了此模式。调用组件应仅能通过对象实现的协议或其派生自的基类来访问对象的功能。\
  \ |\n| 有哪些常见陷阱？ | 主要的陷阱是将所用类的细节泄露给调用组件，这要么会创建对选择类的决策过程的依赖，要么会创建对特定类的依赖。 |\n| 有哪些相关模式？\
  \ | 当仅需要单个对象时，工厂方法模式（第 9 章）是一种更简单的模式。抽象工厂方法通常与单例模式和原型模式结合使用（参见“抽象工厂模式的变体”部分）。 |\n\
  \n## 准备示例项目\n\n对于本章，我创建了一个名为`AbstractFactory`的新 OS X 命令行工具项目。本章的示例基于为不同车型创建所需的零件。首先，我添加了一个名为`Floorplans.swift`的文件，其内容如代码清单\
  \ 10-1 所示。\n\n代码清单 10-1. `Floorplans.swift`文件的内容\n\n```\nprotocol Floorplan {\n\
  \    var seats:Int { get }\n    var enginePosition:EngineOption { get }\n}\n\nenum\
  \ EngineOption : String {\n    case FRONT = \"Front\"\n    case MID = \"Mid\"\n\
  }\n\nclass ShortFloorplan: Floorplan {\n    var seats = 2\n    var enginePosition\
  \ = EngineOption.MID\n}\n\nclass StandardFloorplan: Floorplan {\n    var seats =\
  \ 4\n    var enginePosition = EngineOption.FRONT\n}\n\nclass LongFloorplan: Floorplan\
  \ {\n    var seats = 8\n    var enginePosition = EngineOption.FRONT\n}\n```\n\n\
  我定义了一个名为`Floorplan`的协议，它代表汽车的基础结构。它包含一个由`Int`类型属性`seats`表示的车座数量，以及一个安装在由`EngineOption`枚举值表示的特定位置的发动机，该位置由`enginePosition`属性表示。我定义了三个遵循该协议的类，每个类代表一种不同的地板布局配置：`ShortFloorplan`、`StandardFloorplan`和`LongFloorplan`。\n\
  \n我用另一个名为`Suspension.swift`的文件重复了此过程，其内容如代码清单 10-2 所示。\n\n代码清单 10-2. `Suspension.swift`文件的内容\n\
  \n```\nprotocol Suspension {\n    var suspensionType:SuspensionOption { get }\n\
  }\n\nenum SuspensionOption : String {\n    case STANDARD = \"Standard\"\n    case\
  \ SPORTS = \"Firm\"\n    case SOFT = \"Soft\"\n}\n\nclass RoadSuspension : Suspension\
  \ {\n    var suspensionType = SuspensionOption.STANDARD\n}\n\nclass OffRoadSuspension\
  \ : Suspension {\n    var suspensionType = SuspensionOption.SOFT\n}\n\nclass RaceSuspension\
  \ : Suspension {\n    var suspensionType = SuspensionOption.SPORTS\n}\n```\n\n此处的协议称为`Suspension`，它定义了一个名为`suspensionType`的属性，该属性被设置为`SuspensionOption`中的一个值。与之前类似，我创建了三个遵循该协议的类，以代表三种不同的悬挂产品。\n\
  \n我为最后一组产品创建了一个名为`Drivetrains.swift`的文件，如代码清单 10-3 所示。\n\n代码清单 10-3. `Drivetrains.swift`文件的内容\n\
  \n```\nprotocol Drivetrain {\n    var driveType:DriveOption { get }\n}\n\nenum DriveOption\
  \ : String {\n    case FRONT = \"Front\"\n    case REAR = \"Rear\"\n    case ALL\
  \ = \"4WD\"\n}\n\nclass FrontWheelDrive : Drivetrain {\n    var driveType = DriveOption.FRONT\n\
  }\n\nclass RearWheelDrive : Drivetrain {\n    var driveType = DriveOption.REAR\n\
  }\n\nclass AllWheelDrive : Drivetrain {\n    var driveType = DriveOption.ALL\n}\n\
  ```\n\n该协议代表一个驱动系统，并定义了一个属性，该属性接受`DriveOption`枚举中的一个值。实现类代表了可用于汽车生产的三种不同类型的驱动系统。\n\
  \n为了完成准备工作，我添加了一个名为`CarsParts.swift`的文件，其内容如代码清单 10-4 所示。\n\n代码清单 10-4. `CarsParts.swift`文件的内容\n\
  \n```\nenum Cars: String {\n    case COMPACT = \"VW Golf\"\n    case SPORTS = \"\
  Porsche Boxter\"\n    case SUV = \"Cadillac Escalade\"\n}\n\nstruct Car {\n    var\
  \ carType:Cars\n    var floor:Floorplan\n    var suspension:Suspension\n    var\
  \ drive:Drivetrain\n\n    func printDetails() {\n        println(\"Car type: \\\
  (carType.rawValue)\")\n        println(\"Seats: \\(floor.seats)\")\n        println(\"\
  Engine: \\(floor.enginePosition.rawValue)\")\n        println(\"Suspension: \\(suspension.suspensionType.rawValue)\"\
  )\n        println(\"Drive: \\(drive.driveType.rawValue)\")\n    }\n}\n```\n\n我定义了一个名为`Cars`的枚举，它为我要创建的每种车型设置了值，以及一个名为`Car`的结构体，它代表一辆完整的汽车，其属性对应示例中的每种产品。`printDetails`函数将汽车设置的详细信息输出到调试控制台。\n\
  \n提示\n\n请注意，我将`String`用作此项目中所有枚举的基类型。在实际项目中你不会这样做，但在示例中它很有帮助，因为它允许我通过将原始值写入调试控制台来轻松指示选择了哪些值。\n\
  \n\n\n## 理解该模式解决的问题\n\n在第 9 章中，我展示了如何使用工厂方法模式，让调用组件无需知道具体选择或选择原因，即可获取实现类的实例。\n\n\
  本章面临的问题与之类似，但适用于那些不共享通用协议或基类的相关对象组。在上一节中，我定义了三个汽车部件的协议，并从中创建了三个实现类。对于`Cars`枚举中的每个值，我都希望从每个类别中选择合适的产品，如表\
  \ 10-2 所示。\n\n**表 10-2.** 车型与产品映射关系\n\n| 车型 | 底盘布局 | 悬挂系统 | 驱动系统 |\n| --- | ---\
  \ | --- | --- |\n| `COMPACT` | `StandardFloorplan` | `RoadSuspension` | `FrontWheelDrive`\
  \ |\n| `SPORTS` | `ShortFloorplan` | `RaceSuspension` | `RearWheelDrive` |\n| `SUV`\
  \ | `LongFloorplan` | `OffRoadSuspension` | `AllWheelDrive` |\n\n目前，组件要创建一辆汽车的唯一途径是必须至少了解表中部分内容，才能实例化所需的类。代码清单\
  \ 10-5 展示了如何在`main.swift`文件中创建实现对象，并用它们设置`Car`结构的属性。\n\n**代码清单 10-5.** `main.swift`文件的内容\n\
  \n```\nvar car = Car(carType: Cars.SPORTS,\n              floor: ShortFloorplan(),\n\
  \              suspension: RaceSuspension(),\n              drive: RearWheelDrive());\n\
  car.printDetails();\n```\n\n运行应用程序时，你将在调试控制台中看到以下输出：\n\n```\nCar type: Porsche Boxter\n\
  Seats: 2\nEngine: Mid\nSuspension: Firm\nDrive: Rear\n```\n\n这种方法带来的问题与我在第 9 章中面临的问题相同：选择实现类的决策逻辑将在整个应用程序中分散和重复，并且会形成对单个实现类存在的依赖。如果表\
  \ 10-2 中的产品映射发生变化，那么所有需要操作这些产品的组件都需要进行相应的修改。这类修改既繁琐、易出错，又难以测试。\n\n## 理解抽象工厂模式\n\n\
  抽象工厂模式与工厂方法模式有着共同的目的，但它是用于创建那些关系无法通过通用协议或基类表达的对象组。在示例应用程序中，需要三个对象来填充`Car`结构，而每个对象将实现不同的协议：`Floorplan`、`Suspension`和`Drivetrain`协议。\n\
  \n## 工厂方法与抽象工厂模式\n\n关于工厂方法模式和抽象工厂模式之间的区别，以及各自的使用时机，存在着无休止的争论。由于不同语言的特性改变了实现方式，并强调或隐藏了细微差别，使得这场争论更加复杂。\n\
  \n我的建议是关注意图而非实现。如果你有一个像表 10-2 这样的产品矩阵，并且需要确保不会出现例如跑车的悬挂系统与 SUV 的底盘布局混用的情况，那么就使用抽象工厂模式。抽象工厂模式将对象组中的具体对象细节隐藏在具体工厂类中，而具体工厂类又对调用组件隐藏。这种额外的复杂性使得很容易向产品矩阵中添加新行（通过创建新的具体工厂）或更改现有行中的产品（通过修改具体工厂）。\n\
  \n工厂方法模式则简单得多，因为它只处理单个对象，并且只需隐藏选择了哪个实现类。正如你将看到的，我通过将多个工厂方法组合到一个类中来实现抽象工厂模式。\n\n\
  简而言之，忽略语义上的争论，专注于目标。使用工厂方法模式来创建单个对象；如果你试图管理一组对象，则使用抽象工厂模式。\n\n抽象工厂模式通过将决策逻辑集中在一个地方来解决其分散化的问题。该模式通过只向调用组件提供协议访问权限（而非符合协议的具体类）来解决对特定实现类的依赖问题。抽象工厂模式包含四个操作，如图\
  \ 10-1 所示。\n\n![A978-1-4842-0394-1_10_Fig1_HTML.jpg](img/A978-1-4842-0394-1_10_Fig1_HTML.jpg)\n\
  \n**图 10-1.** 抽象工厂模式\n\n该模式需要使用一个抽象工厂类，该类定义了一个方法，该方法将返回一个协议或基类的实现。模式中的第一个操作发生在调用组件调用抽象工厂方法获取对象时。\n\
  \n对于第二个操作，抽象工厂方法会检查调用组件的请求，并选择一个具体工厂类，即实现了工厂方法模式的类（如第 9 章所述）。创建具体工厂类的实例并将其返回给调用者。\n\
  \n在第三个操作中，调用组件调用由具体工厂类定义的工厂方法。这引出了第四个也是最后一个操作，在此操作中，实例化实现类，以向调用组件提供其所需的对象。\n\n在尝试理解此模式时，重点关注其他类的知识在整个模式中如何分布会有所帮助。具体工厂知道哪些实现类属于同一组，并且它的方法会创建同一组内的对象，即使这些类实现了不同的协议或源于不同的基类。\n\
  \n抽象工厂不知道将使用哪些实现类，但它确实知道如何为任何给定请求选择合适的工厂类。\n\n调用组件只知道工厂以及实现类使用的协议或基类，而不直接了解实现类。它依赖抽象工厂来提供合适的工厂类，并依赖具体工厂来选择合适的实现类。\n\
  \n## 实现抽象工厂模式\n\n在接下来的几节中，我将向你展示如何实现抽象工厂模式，以创建代表本章开头定义的汽车产品的对象。\n\n\n\n### 创建抽象工厂\n\
  \n我将从创建抽象工厂类开始。这个类是模式的核心，因为它被用作具体工厂的基类。清单 10-6 展示了我添加到示例项目中的 `Abstract.swift` 文件的内容。\n\
  \n**清单 10-6.** `Abstract.swift` 文件的内容\n\n```\nclass CarFactory {\n\n    func createFloorplan()\
  \ -> Floorplan {\n        fatalError(\"Not implemented\");\n    }\n\n    func createSuspension()\
  \ -> Suspension {\n        fatalError(\"Not implemented\");\n    }\n\n    func createDrivetrain()\
  \ -> Drivetrain {\n        fatalError(\"Not implemented\");\n    }\n\n}\n```\n\n\
  这个抽象工厂名为 `CarFactory`，它定义了 `createFloorplan`、`createSuspension` 和 `createDrivetrain`\
  \ 方法，这些方法返回实现了三种产品协议（`Floorplan`、`Suspension` 和 `Drivetrain`）的对象。该类仅包含足以作为具体工厂类（将在下一节定义）基类的功能。一旦定义了具体工厂类，我将回到这个类并完善它，使其能够选择和调用具体工厂。\n\
  \n### 创建具体工厂\n\n下一步是创建具体工厂类，这些类负责创建一组可以协同使用的产品对象。我向项目中添加了一个名为 `Concrete.swift` 的文件，并用它定义了清单\
  \ 10-7 中所示的类。\n\n**清单 10-7.** `Concrete.swift` 文件的内容\n\n```\nclass CompactCarFactory\
  \ : CarFactory {\n\n    override func createFloorplan() -> Floorplan {\n       \
  \ return StandardFloorplan();\n    }\n\n    override func createSuspension() ->\
  \ Suspension {\n        return RoadSuspension();\n    }\n\n    override func createDrivetrain()\
  \ -> Drivetrain {\n        return FrontWheelDrive();\n    }\n\n}\n\nclass SportsCarFactory\
  \ : CarFactory {\n\n    override func createFloorplan() -> Floorplan {\n       \
  \ return ShortFloorplan();\n    }\n\n    override func createSuspension() -> Suspension\
  \ {\n        return RaceSuspension();\n    }\n\n    override func createDrivetrain()\
  \ -> Drivetrain {\n        return RearWheelDrive();\n    }\n\n}\n\nclass SUVCarFactory\
  \ : CarFactory {\n\n    override func createFloorplan() -> Floorplan {\n       \
  \ return LongFloorplan();\n    }\n\n    override func createSuspension() -> Suspension\
  \ {\n        return OffRoadSuspension();\n    }\n\n    override func createDrivetrain()\
  \ -> Drivetrain {\n        return AllWheelDrive();\n    }\n\n}\n```\n\n每个具体工厂类都派生自\
  \ `CarFactory` 类，并重写其方法以创建表 10-2 中所示的产品组之一。\n\n### 完善抽象工厂\n\n现在我可以回到抽象工厂类并完成模式的实现。清单\
  \ 10-8 展示了选择具体工厂的变化，以便为调用方提供获取具体工厂的途径。\n\n**清单 10-8.** 在 `Abstract.swift` 文件中完成模式实现\n\
  \n```\nclass CarFactory {\n\n    func createFloorplan() -> Floorplan {\n       \
  \ fatalError(\"Not implemented\");\n    }\n\n    func createSuspension() -> Suspension\
  \ {\n        fatalError(\"Not implemented\");\n    }\n\n    func createDrivetrain()\
  \ -> Drivetrain {\n        fatalError(\"Not implemented\");\n    }\n\n    final\
  \ class func getFactory(car:Cars) -> CarFactory? {\n        var factory:CarFactory?\n\
  \        switch (car) {\n            case .COMPACT:\n                factory = CompactCarFactory();\n\
  \            case .SPORTS:\n                factory = SportsCarFactory();\n    \
  \        case .SUV:\n                factory = SUVCarFactory();\n        }\n   \
  \     return factory;\n    }\n\n}\n```\n\n我添加了一个名为 `getFactory` 的类型方法，它接受一个来自 `Cars`\
  \ 枚举的值，选择一个具体工厂，并将其实例返回给调用方。被选中的工厂以 `CarFactory` 对象的形式呈现给调用方，而关于哪个具体工厂被选中及其原因等细节则保持私有。\n\
  \n### 使用抽象工厂模式\n\n最后一步是更新创建 `Car` 对象的代码，使其通过抽象工厂获取产品。清单 10-9 展示了我在 `main.swift`\
  \ 文件中所做的更改。\n\n**清单 10-9.** 在 `main.swift` 文件中使用抽象工厂模式\n\n```\nlet factory = CarFactory.getFactory(Cars.SPORTS);\n\
  if (factory != nil) {\n    let car = Car(carType: Cars.SPORTS,\n        floor: factory!.createFloorplan(),\n\
  \        suspension: factory!.createSuspension(),\n        drive: factory!.createDrivetrain());\n\
  \    car.printDetails();\n}\n```\n\n我没有直接实例化实现对象，而是使用抽象工厂类来获取所需车型的具体工厂，然后调用 `create`\
  \ 方法来获取实现对象。如果运行应用程序，你将看到以下输出：\n\n```\nCar type: Porsche Boxter\nSeats: 2\nEngine:\
  \ Mid\nSuspension: Firm\nDrive: Rear\n```\n\n如清单 10-9 所示，`main.swift` 文件中的代码与各个产品类之间没有依赖关系。这意味着，如果表\
  \ 10-2 中所示的矩阵发生变化，我可以更新相应的具体工厂类，而无需在使用这些工厂的组件中进行相应的更改。在清单 10-10 中，你可以看到我如何更改了跑车的驱动系统选项。\n\
  \n**清单 10-10.** 在 `Concrete.swift` 文件中更改实现类\n\n```\n...\nclass SportsCarFactory\
  \ : CarFactory {\n\n    override func createFloorplan() -> Floorplan {\n       \
  \ return ShortFloorplan();\n    }\n\n    override func createSuspension() -> Suspension\
  \ {\n        return RaceSuspension();\n    }\n\n    override func createDrivetrain()\
  \ -> Drivetrain {\n        return AllWheelDrive();\n    }\n\n}\n...\n```\n\n运行应用程序产生的输出显示了更改的效果。\n\
  \n```\nCar type: Porsche Boxter\nSeats: 2\nEngine: Mid\nSuspension: Firm\nDrive:\
  \ 4WD\n```\n\n通过将哪些产品组应归属于一起的决策集中起来，具体工厂降低了变更对应用程序的影响，这使得决策逻辑更易于测试和维护。抽象工厂则集中了选择具体工厂的决策逻辑，进一步将调用组件与实现类组如何相互关联的细节隔离开来。\n\
  \n## 抽象工厂模式的变体\n\n有一些常见的变体可用于调整抽象工厂的实现方式。正如我在以下章节中解释的，基本机制保持不变，但实现方式会有所改动，以控制对象的创建方式。\n\
  \n\n\n### 隐藏抽象工厂类\n\n第一种变体也是最常见的，是将抽象工厂模式的实现隐藏在调用组件用于存储实现对象的类或结构体中。在示例应用程序中，即指 `Car`\
  \ 结构体。清单 10-11 展示了我如何修改它以直接处理抽象和具体工厂类。\n\n清单 10-11. 在 `CarParts.swift` 文件中隐藏模式\n\
  \n```\nenum Cars: String {\n    case COMPACT = \"VW Golf\";\n    case SPORTS = \"\
  Porsche Boxter\";\n    case SUV = \"Cadillac Escalade\";\n}\n\nstruct Car {\n  \
  \  var carType:Cars;\n    var floor:Floorplan;\n    var suspension:Suspension;\n\
  \    var drive:Drivetrain;\n\n    init(carType:Cars) {\n        let concreteFactory\
  \ = CarFactory.getFactory(carType);\n        self.floor = concreteFactory!.createFloorplan();\n\
  \        self.suspension = concreteFactory!.createSuspension();\n        self.drive\
  \ = concreteFactory!.createDrivetrain();\n        self.carType = carType;\n    }\n\
  \n    func printDetails() {\n        println(\"Car type: \\(carType.rawValue)\"\
  );\n        println(\"Seats: \\(floor.seats)\");\n        println(\"Engine: \\(floor.enginePosition.rawValue)\"\
  );\n        println(\"Suspension: \\(suspension.suspensionType.rawValue)\");\n \
  \       println(\"Drive: \\(drive.driveType.rawValue)\");\n    }\n}\n```\n\n我添加了一个初始化器，它接受以\
  \ `Cars` 值表示的所需汽车类型，并用它来请求抽象工厂生成具体工厂。随后，该具体工厂被用于获取初始化对象所需的 `Floorplan`、`Suspension`\
  \ 和 `Drivetrain` 对象。此更改的影响是显著简化了 `main.swift` 文件中的代码，如清单 10-12 所示。\n\n清单 10-12. 在\
  \ `main.swift` 文件中隐藏工厂的效果\n\n```\nlet car = Car(carType: Cars.SPORTS);\ncar.printDetails();\n\
  ```\n\n**警告**\n\n这种方法对调用组件的目标做了两个假设。它假设调用组件想创建一个 `Car` 对象，并且需要所有三个对象。如果你确实采用这种变体，请确保调用组件仍然可以访问抽象工厂，以便它能为其所需目的创建所需的对象。\n\
  \n### 对具体工厂应用单例模式\n\n另一种常见的变体是对具体工厂应用单例模式。具体工厂非常适合作为单例，因为它们仅包含从实现类创建对象所需的逻辑。应用单例模式的第一步是更新抽象工厂类，即具体工厂的基类。清单\
  \ 10-13 展示了我所做的更改。\n\n清单 10-13. 在 `Abstract.swift` 文件中为单例模式做准备\n\n```\nclass CarFactory\
  \ {\n    required init() {\n        // do nothing\n    }\n\n    func createFloorplan()\
  \ -> Floorplan {\n        fatalError(\"Not implemented\");\n    }\n\n    func createSuspension()\
  \ -> Suspension {\n        fatalError(\"Not implemented\");\n    }\n\n    func createDrivetrain()\
  \ -> Drivetrain {\n        fatalError(\"Not implemented\");\n    }\n\n    final\
  \ class func getFactory(car:Cars) -> CarFactory? {\n        var factoryType:CarFactory.Type;\n\
  \        switch (car) {\n        case .COMPACT:\n            factoryType = CompactCarFactory.self;\n\
  \        case .SPORTS:\n            factoryType = SportsCarFactory.self;\n     \
  \   case .SUV:\n            factoryType = SUVCarFactory.self;\n        }\n\n   \
  \     var factory = factoryType.sharedInstance;\n        if (factory == nil) {\n\
  \            factory = factoryType();\n        }\n        return factory;\n    }\n\
  \n    class var sharedInstance:CarFactory? {\n        get {\n            return\
  \ nil;\n        }\n    }\n}\n```\n\n我添加了一个 `sharedInstance` 计算类型属性，具体工厂如果希望被视为单例，可以重写该属性。我修改了\
  \ `getfactory` 方法的实现，使其读取 `sharedInstance` 属性的值，如果有结果则将其返回给调用者。没有重写 `sharedInstance`\
  \ 属性的具体类将继承默认实现，我通过创建一个新的工厂实例来处理请求。清单 10-14 展示了我如何更新其中一个具体工厂，使其被当作单例处理。\n\n清单 10-14. 在\
  \ `Concrete.swift` 文件中应用单例模式\n\n```\n...\nclass SportsCarFactory : CarFactory {\n\
  \    override func createFloorplan() -> Floorplan {\n        return ShortFloorplan();\n\
  \    }\n\n    override func createSuspension() -> Suspension {\n        return RaceSuspension();\n\
  \    }\n\n    override func createDrivetrain() -> Drivetrain {\n        return AllWheelDrive();\n\
  \    }\n\n    override class var sharedInstance:CarFactory? {\n        get {\n \
  \           struct SingletonWrapper {\n                static let singleton = SportsCarFactory();\n\
  \            }\n            return SingletonWrapper.singleton;\n        }\n    }\n\
  }\n...\n```\n\n我重写了 `SportsCarFactory` 类的 `sharedInstance` 属性以实现单例模式，如第 6 章所述。我未对另外两个具体工厂类进行修改，这意味着每次它们被选中处理来自调用组件的请求时，都会创建新的实例。相比之下，`SportsCarFactory`\
  \ 类将只有一个实例，用于处理抽象工厂选择它的所有请求。\n\n### 对实现类应用原型模式\n\n你也可以对实现类应用单例模式，但这意味着所有组件将操作同一组对象，这仅适用于可变状态极少或没有，或者已设置并发保护的情况。\n\
  \n一种更常见的变体是使用原型模式，通过克隆来创建实现对象。在接下来的章节中，我将准备应用程序以使用原型模式，并向你展示如何实现它。\n\n\n\n### 准备示例应用程序\n\
  \n第一步是更新实现类，使其能够被克隆。这项工作比预期的更复杂，因为用于实现原型模式的 `NSCopying` 协议无法在 Swift 枚举上运行。这意味着我必须创建一个\
  \ Objective-C 枚举，并将其导入到 Swift 中，以获得所需的行为。\n\n首先，在项目导航器中右键点击 `AbstractFactory` 项，然后从弹出菜单中选择“新建文件”。从列表中选择\
  \ Objective-C 文件模板，如图 10-2 所示。\n\n![A978-1-4842-0394-1_10_Fig2_HTML.jpg](img/A978-1-4842-0394-1_10_Fig2_HTML.jpg)\n\
  \n图 10-2. 向项目添加 Objective-C 文件\n\n点击“下一步”按钮，将文件名设置为 `SuspensionOption`，如图 10-3 所示。\n\
  \n![A978-1-4842-0394-1_10_Fig3_HTML.jpg](img/A978-1-4842-0394-1_10_Fig3_HTML.jpg)\n\
  \n图 10-3. 设置 Objective-C 文件的名称\n\n点击“下一步”按钮，将文件保存到项目中已有的 Swift 文件旁。保存文件时，Xcode 会提示你创建一个桥接头文件，如图\
  \ 10-4 所示。\n\n![A978-1-4842-0394-1_10_Fig4_HTML.jpg](img/A978-1-4842-0394-1_10_Fig4_HTML.jpg)\n\
  \n图 10-4. Xcode 提示创建桥接头文件\n\n点击“是”按钮创建该文件，这是将我要编写的 Objective-C 枚举导入到 Swift 中所必需的。Xcode\
  \ 会创建两个文件。第一个是 `SuspensionOption.m`，即 Objective-C 文件。我无需对此文件做任何修改；创建它只是为了引导 Xcode\
  \ 设置桥接头文件——也就是 Xcode 创建的另一个文件。桥接头文件名为 `AbstractFactory-Bridging-Header.h`，清单 10-15\
  \ 展示了我为准备要定义的枚举所进行的添加操作。\n\n**清单 10-15.** `AbstractFactory-Bridging-Header.h` 文件的内容\n\
  \n```\n#import \"SuspensionOption.h\"\n```\n\n向项目添加另一个文件，但这次添加一个名为 `SuspensionOption.h`\
  \ 的头文件。编辑该文件，使其包含清单 10-16 所示的代码。\n\n**清单 10-16.** `SuspensionOption.h` 文件的内容\n\n\
  ```\n#import <Foundation/Foundation.h>\n\ntypedef NS_ENUM(NSInteger, SuspensionOption)\
  \ {\n\nSuspensionOptionSTANDARD,\n\nSuspensionOptionSPORTS,\n\nSuspensionOptionSOFT\n\
  \n};\n```\n\n这个枚举将被导入到 Swift 中，作为我在 `Suspension.swift` 文件中定义的枚举的兼容替代品。清单 10-17 展示了我是如何移除\
  \ Swift 枚举并为原型模式做准备的。\n\n**清单 10-17.** 在 `Suspension.swift` 文件中为原型模式做准备\n\n```\n\
  import Foundation\n\n@objc protocol Suspension {\n\nvar suspensionType:SuspensionOption\
  \ { get };\n\n}\n\n//enum SuspensionOption : String {\n\n//    case STANDARD = \"\
  Standard\"; case SPORTS = \"Firm\"; case SOFT = \"Soft\";\n\n//}\n\nclass RoadSuspension\
  \ : Suspension {\n\nvar suspensionType = SuspensionOption.STANDARD;\n\n}\n\nclass\
  \ OffRoadSuspension : Suspension {\n\nvar suspensionType = SuspensionOption.SOFT;\n\
  \n}\n\nclass RaceSuspension : NSObject, NSCopying, Suspension {\n\nvar suspensionType\
  \ = SuspensionOption.SPORTS;\n\nfunc copyWithZone(zone: NSZone) -> AnyObject {\n\
  \nreturn RaceSuspension();\n\n}\n\n}\n```\n\n我为 `Suspension` 协议添加了 `@objc` 属性，以便稍后在具体工厂类中实现原型模式时能够进行类型转换。我注释掉了\
  \ Swift 的 `SuspensionOption` 枚举，避免与 Objective-C 的对应枚举冲突。最后，我修改了 `RaceSuspension`\
  \ 类，使其实现 `NSCopying` 协议，从而允许将其视为原型。\n\n**提示**  \n对实现类应用原型模式的效果微乎其微，因为它们非常简单。有关该模式产生更大影响的详细信息，请参阅第\
  \ 5 章。\n\n如果运行该应用程序，你将看到以下输出：\n\n```\nCar type: Porsche Boxter\nSeats: 2\nEngine:\
  \ Mid\nSuspension: 1\nDrive: 4WD\n```\n\n请注意，`Suspension` 的值是一个数字。Objective-C 不允许将字符串作为枚举的底层类型，因此我在清单\
  \ 10-16 中定义 `SuspensionOption` 枚举时使用了整数。因此，输出不再显示悬架的描述性字符串。\n\n\n\n### 应用原型模式\n\n\
  将原型模式应用于实现类而非具体工厂非常重要。这有两个原因：第一，除非所有具体工厂都是单例，否则最终可能会产生多个原型，这会削弱应用该模式的效果。第二，关于哪些实现类被视为原型、哪些应被实例化的知识将在各个工厂中重复，这意味着更改一个实现类的行为将需要所有使用它的具体工厂类进行相应的更改。如果忘记进行所有这些更改，将导致某个实现类的处理方式不一致。\n\
  \n清单 10-18 展示了如何通过在 `Suspension` 协议中定义一个工厂用来获取符合协议对象的方法来规避这些问题，并允许每个实现类自行决定如何创建该对象。\n\
  \n**清单 10-18.** 在 `Suspension.swift` 文件中应用原型模式\n\n```\nimport Foundation\n\n@objc\
  \ protocol Suspension {\n    var suspensionType:SuspensionOption { get };\n    class\
  \ func getInstance() -> Suspension;\n}\n\nclass RoadSuspension : Suspension {\n\
  \    var suspensionType = SuspensionOption.STANDARD;\n    private init() {};\n \
  \   class func getInstance() -> Suspension {\n        return RoadSuspension();\n\
  \    }\n}\n\nclass OffRoadSuspension : Suspension {\n    var suspensionType = SuspensionOption.SOFT;\n\
  \    private init() {};\n    class func getInstance() -> Suspension {\n        return\
  \ OffRoadSuspension();\n    }\n}\n\nclass RaceSuspension : NSObject, NSCopying,\
  \ Suspension {\n    var suspensionType = SuspensionOption.SPORTS;\n    private override\
  \ init() {};\n    func copyWithZone(zone: NSZone) -> AnyObject {\n        return\
  \ RaceSuspension();\n    }\n    private class var prototype:RaceSuspension {\n \
  \       get {\n            struct SingletonWrapper {\n                static let\
  \ singleton = RaceSuspension();\n            }\n            return SingletonWrapper.singleton;\n\
  \        }\n    }\n    class func getInstance() -> Suspension {\n        return\
  \ prototype.copy() as Suspension;\n    }\n}\n```\n\n**提示**\n\n在实际项目中，你会将模式应用于所有实现类，但此处我只更改悬挂类以避免重复类似的改动。\n\
  \n我在 `Suspension` 协议中增加了一个名为 `getInstance` 的方法。每个实现类都需要定义此方法，其中 `RoadSuspension`\
  \ 和 `OffRoadSuspension` 只是简单地创建新对象。`RaceSuspension` 类则将原型定义为单例，并在每次调用 `getInstance`\
  \ 方法时复制它。\n\n**提示**\n\n我为实现类定义了空的 `private` 初始化方法，这样它们就不能被直接实例化。请注意，我针对 `RaceSuspension`\
  \ 类使用了 `override` 关键字，因为它从 `NSObject` 类继承了一个空的初始化方法，而 `NSObject` 是 `NSCopying` 协议所需的基类。详见第\
  \ 5 章。\n\n在清单 10-19 中，你可以看到我如何更新具体工厂类以反映悬挂类的变化。\n\n**清单 10-19.** 在 `Concrete.swift`\
  \ 文件中修订悬挂类的消费方式\n\n```\nclass CompactCarFactory : CarFactory {\n    override func\
  \ createFloorplan() -> Floorplan {\n        return StandardFloorplan();\n    }\n\
  \    override func createSuspension() -> Suspension {\n        return RoadSuspension.getInstance();\n\
  \    }\n    override func createDrivetrain() -> Drivetrain {\n        return FrontWheelDrive();\n\
  \    }\n}\n\nclass SportsCarFactory : CarFactory {\n    override func createFloorplan()\
  \ -> Floorplan {\n        return ShortFloorplan();\n    }\n    override func createSuspension()\
  \ -> Suspension {\n        return RaceSuspension.getInstance();\n    }\n    override\
  \ func createDrivetrain() -> Drivetrain {\n        return AllWheelDrive();\n   \
  \ }\n    override class var sharedInstance:CarFactory? {\n        get {\n      \
  \      struct SingletonWrapper {\n                static let singleton = SportsCarFactory();\n\
  \            }\n            return SingletonWrapper.singleton;\n        }\n    }\n\
  }\n\nclass SUVCarFactory : CarFactory {\n    override func createFloorplan() ->\
  \ Floorplan {\n        return LongFloorplan();\n    }\n    override func createSuspension()\
  \ -> Suspension {\n        return OffRoadSuspension.getInstance();\n    }\n    override\
  \ func createDrivetrain() -> Drivetrain {\n        return AllWheelDrive();\n   \
  \ }\n}\n```\n\n完成这些改动后，`RaceSuspension` 类的实例通过原型模式创建。这一事实对具体工厂类是隐藏的，这使得更改单个实现类的行为变得容易，而无需进一步更改具体工厂。\n\
  \n## 理解该模式的陷阱\n\n此模式的主要陷阱是模糊了不同组件之间的界限。具体来说，抽象工厂类应仅包含选择具体工厂的决策逻辑，而不应包含实现类的逻辑。同样，具体工厂应包含选择实现类的逻辑，而不应提供产品协议定义的任何功能。\n\
  \n唯一需要避免的另一个陷阱出现在将此模式与第 7 章中描述的对象池模式结合使用时。如果你试图为每个实现类管理独立的池，并让调用组件等待一组对象变得可用，这将是一种灾难性的组合。当所有组件都需要相同类型的对象时，对象池的效果最佳；而试图排队访问重叠的对象集，通常会在两个组件各自获取了对方所需的空闲对象时导致死锁。如果你确实尝试结合这些模式，请确保你的调用组件始终以相同的顺序从池中获取对象，并特别注意避免死锁。\n\
  \n## Cocoa 中该模式的示例\n\n当你创建一个 Cocoa 对象时，无法判断是使用了工厂方法模式还是抽象工厂模式。作为对象的接收者，你根本不知道你收到的是一个具体工厂，还是一个基于你的请求选择了其类的普通对象。苹果在其文档中混淆了工厂方法模式和抽象工厂模式，这无济于事，这就是为什么你经常会听到类簇被描述为这两种模式的实现。\n\
  \n这正应该是这样的，因为这两种模式都是关于向调用组件隐藏决策和实现的，而判断使用了哪种模式的唯一方法是查看源代码。如果你能通过其他方式判断，那么这两种模式的实现都是有缺陷的。\n\
  \n## 将模式应用于 SportsStore 应用程序\n\n为了演示如何应用抽象工厂模式，我将更改 SportsStore 库存总价值的生成方式，以便可以选择不同的货币和汇率。在接下来的小节中，我将逐步介绍定义协议和实现类的过程，这些协议和类将转换库存价值并准备显示，以及通过抽象工厂和具体工厂提供这些类的过程。\n\
  \n### 准备示例应用程序\n\n本章无需准备工作；我将继续使用第 9 章结束时的项目。\n\n**提示**\n\n如果你不想手动重新创建 SportsStore\
  \ 项目，请不要忘记你可以从 [`Apress.com`](https://Apress.com) 下载每一章的源代码。\n\n\n\n### 定义实现协议与类\n\
  \n第一步是创建一个文件，其中包含实现类的定义以及用于表达其功能的协议。清单 10-20 展示了我添加到 SportsStore 项目中的`StockValueImplementations.swift`文件的内容。\n\
  \n**清单 10-20.** `StockValueImplementations.swift`文件的内容\n\n```swift\nimport Foundation\n\
  \nprotocol StockValueFormatter {\n    func formatTotal(total: Double) -> String;\n\
  }\n\nclass DollarStockValueFormatter: StockValueFormatter {\n    func formatTotal(total:\
  \ Double) -> String {\n        let formatted = Utils.currencyStringFromNumber(total);\n\
  \        return \"\\(formatted)\";\n    }\n}\n\nclass PoundStockValueFormatter:\
  \ StockValueFormatter {\n    func formatTotal(total: Double) -> String {\n     \
  \   let formatted = Utils.currencyStringFromNumber(total);\n        return \"£\\\
  (dropFirst(formatted))\";\n    }\n}\n\nprotocol StockValueConverter {\n    func\
  \ convertTotal(total: Double) -> Double;\n}\n\nclass DollarStockValueConverter:\
  \ StockValueConverter {\n    func convertTotal(total: Double) -> Double {\n    \
  \    return total;\n    }\n}\n\nclass PoundStockValueConverter: StockValueConverter\
  \ {\n    func convertTotal(total: Double) -> Double {\n        return 0.60338 *\
  \ total;\n    }\n}\n```\n\n我定义了两个协议和两组实现类。这两个协议分别称为`StockValueFormatter`和`StockValueConverter`。`StockValueConverter`协议负责将货币金额从美元进行转换，而`StockValueFormatter`协议则负责准备货币金额的格式。我创建了两组实现类，一组直接传递美元金额而不做任何修改，另一组则将金额转换为英镑。\n\
  \n### 定义抽象工厂与具体工厂类\n\n我在一个名为`StockValueFactories.swift`的新文件中定义了抽象工厂和具体工厂类，其内容如清单\
  \ 10-21 所示。\n\n**清单 10-21.** `StockValueFactories.swift`文件的内容\n\n```swift\nimport\
  \ Foundation\n\nclass StockTotalFactory {\n    enum Currency {\n        case USD\n\
  \        case GBP\n    }\n\n    private(set) var formatter: StockValueFormatter?;\n\
  \    private(set) var converter: StockValueConverter?;\n\n    class func getFactory(curr:\
  \ Currency) -> StockTotalFactory {\n        if (curr == Currency.USD) {\n      \
  \      return DollarStockTotalFactory.sharedInstance;\n        } else {\n      \
  \      return PoundStockTotalFactory.sharedInstance;\n        }\n    }\n}\n\nprivate\
  \ class DollarStockTotalFactory: StockTotalFactory {\n    private override init()\
  \ {\n        super.init();\n        formatter = DollarStockValueFormatter();\n \
  \       converter = DollarStockValueConverter();\n    }\n\n    class var sharedInstance:\
  \ StockTotalFactory {\n        get {\n            struct SingletonWrapper {\n  \
  \              static let singleton = DollarStockTotalFactory();\n            }\n\
  \            return SingletonWrapper.singleton;\n        }\n    }\n}\n\nprivate\
  \ class PoundStockTotalFactory: StockTotalFactory {\n    private override init()\
  \ {\n        super.init();\n        formatter = PoundStockValueFormatter();\n  \
  \      converter = PoundStockValueConverter();\n    }\n\n    class var sharedInstance:\
  \ StockTotalFactory {\n        get {\n            struct SingletonWrapper {\n  \
  \              static let singleton = PoundStockTotalFactory();\n            }\n\
  \            return SingletonWrapper.singleton;\n        }\n    }\n}\n```\n\n`StockTotalFactory`类是抽象工厂，它根据传递给`getFactory`方法的`Currency`枚举值，在具体类`DollarStockTotalFactory`和`PoundStockTotalFactory`之间进行选择。其效果如表\
  \ 10-3 所示的矩阵。\n\n**表 10-3.** 货币与格式化器/转换器的映射关系\n\n| 货币 | StockValueFormatter | StockValueConverter\
  \ |\n|----------|----------------------|----------------------|\n| `USD`    | `DollarStockValueFormatter`\
  \ | `DollarStockValueConverter` |\n| `GBP`    | `PoundStockValueFormatter` | `PoundStockValueConverter`\
  \ |\n\n### 使用工厂与实现类\n\n最后一步是使用抽象工厂来转换和格式化库存的价值。清单 10-22 展示了我对`ViewController.swift`文件所做的更改。\n\
  \n**清单 10-22.** 在`ViewController.swift`文件中使用抽象工厂模式\n\n```swift\n...\n\nfunc displayStockTotal()\
  \ {\n    let finalTotals: (Int, Double) = productStore.products.reduce((0, 0.0),\n\
  \        {(totals, product) -> (Int, Double) in\n            return (\n        \
  \        totals.0 + product.stockLevel,\n                totals.1 + product.stockValue\n\
  \            );\n        });\n\n    var factory = StockTotalFactory.getFactory(StockTotalFactory.Currency.GBP);\n\
  \    var totalAmount = factory.converter?.convertTotal(finalTotals.1);\n    var\
  \ formatted = factory.formatter?.formatTotal(totalAmount!);\n    totalStockLabel.text\
  \ = \"\\(finalTotals.0) Products in Stock. \"\n        + \"Total Value: \\(formatted!)\"\
  ;\n}\n\n...\n```\n\n我指定了 GBP 货币，这将选择负责处理英镑的实现类组。当你运行应用程序时，库存总价值将从美元转换为英镑并显示在应用程序中，如图\
  \ 10-5 所示。\n\n![A978-1-4842-0394-1_10_Fig5_HTML.jpg](img/A978-1-4842-0394-1_10_Fig5_HTML.jpg)\n\
  \n**图 10-5.** 转换并格式化库存价值\n\n`ViewController`类能够格式化库存价值，而无需了解所选择的具体类及其提供的实现类的任何细节。\n\
  \n## 本章小结\n\n在本章中，我解释了如何使用抽象工厂模式来创建属于某个组或系列的对象，但这些对象并不遵循通用协议，也不共享公共基类。在下一章中，我将描述建造者模式。\n\
  \n"
- "# 11. 建造者模式\n\n建造者模式用于将对象的配置与其创建过程分离。调用组件拥有配置数据，并将其传递给一个中介——建造者——由后者负责代表该组件创建对象。这种分离可以减少调用组件对其所用对象的了解程度，并将默认配置值集中到建造者类中，而不是要求每个创建对象的组件都拥有这些配置值。表\
  \ 11-1 展示了建造者模式的背景信息。\n\n**表 11-1.** 建造者模式的背景信息\n\n| 问题 | 答案 |\n|----------|--------|\n\
  | 它是什么？ | 建造者模式将创建对象所需的逻辑和默认配置值放入一个建造者类中。这使得调用组件能够以最少的配置数据创建对象，并且无需了解创建对象时将使用的默认值。\
  \ |\n| 有什么好处？ | 此模式使得更改创建对象所使用的默认配置值，以及更改实例化对象所用的类变得更加容易。 |\n| 何时应使用此模式？ | 当创建对象需要复杂的配置过程，并且你不想让默认配置值分散在整个应用程序中时，使用此模式。\
  \ |\n| 何时应避免使用此模式？ | 当创建每个对象所需的每个数据值都各不相同，即无法使用默认值时，不要使用此模式。 |\n| 如何判断实现正确？ | 调用组件只需提供那些没有默认值的数据值（虽然也可以提供值来覆盖部分或全部默认值）即可创建对象。\
  \ |\n| 有常见的陷阱吗？ | 没有。 |\n| 有相关的模式吗？ | 此模式可以与工厂方法模式或抽象工厂模式结合使用，以根据调用组件提供的配置数据更改用于创建对象的实现类。\
  \ |\n\n\n\n## 准备示例项目\n\n本章中，我创建了一个名为`Builder`的全新 OS X 命令行工具项目，并在项目中添加了一个名为`Food.swift`的文件，用于定义清单\
  \ 11-1 中所示的类。\n\n**清单 11-1.** `Food.swift` 文件的内容\n\n```\nclass Burger {\n\n    let\
  \ customerName:String;\n    let veggieProduct:Bool;\n    let patties:Int;\n    let\
  \ pickles:Bool;\n    let mayo:Bool;\n    let ketchup:Bool;\n    let lettuce:Bool;\n\
  \    let cook:Cooked;\n\n    enum Cooked : String {\n        case RARE = \"Rare\"\
  ;\n        case NORMAL = \"Normal\";\n        case WELLDONE = \"Well Done\";\n \
  \   }\n\n    init(name:String, veggie:Bool, patties:Int, pickles:Bool, mayo:Bool,\n\
  \        ketchup:Bool, lettuce:Bool, cook:Cooked) {\n        self.customerName =\
  \ name;\n        self.veggieProduct = veggie;\n        self.patties = patties;\n\
  \        self.pickles = pickles;\n        self.mayo = mayo;\n        self.ketchup\
  \ = ketchup;\n        self.lettuce = lettuce;\n        self.cook = cook;\n    }\n\
  \n    func printDescription() {\n        println(\"Name \\(self.customerName)\"\
  );\n        println(\"Veggie: \\(self.veggieProduct)\");\n        println(\"Patties:\
  \ \\(self.patties)\");\n        println(\"Pickles: \\(self.pickles)\");\n      \
  \  println(\"Mayo: \\(self.mayo)\");\n        println(\"Ketchup: \\(self.ketchup)\"\
  );\n        println(\"Lettuce: \\(self.lettuce)\");\n        println(\"Cook: \\\
  (self.cook.rawValue)\");\n    }\n}\n```\n\n`Burger`类代表餐厅中的一份订单，并为通过构造函数设置的订单不同方面定义了常量值。`printDescription`方法将这些常量的值输出到调试控制台。清单\
  \ 11-2 展示了我如何编辑`main.swift`文件来创建一个`Burger`对象并调用`printDescription`方法。\n\n**清单 11-2.**\
  \ `main.swift` 文件的内容\n\n```\nlet order = Burger(name: \"Joe\", veggie: false, patties:\
  \ 2, pickles: true,\n    mayo: true, ketchup: true, lettuce: true, cook: Burger.Cooked.NORMAL);\n\
  order.printDescription();\n```\n\n运行该应用会产生以下输出：\n\n```\nName Joe\nVeggie: false\n\
  Patties: 2\nPickles: true\nMayo: true\nKetchup: true\nLettuce: true\nCook: Normal\n\
  ```\n\n## 理解模式解决的问题\n\n当对象需要大量配置数据值，而调用组件并非对这些值都有值时，就会出现生成器模式所要解决的问题。以`Burger`类为例，其初始化器要求为其所代表的汉堡的每个方面提供值。以下是我虚构餐厅中的点餐流程：\n\
  \n- 服务员询问顾客姓名。\n- 服务员询问顾客是否需要素食餐。\n- 服务员询问顾客是否要定制汉堡。\n- 服务员询问顾客是否要升级并额外购买一个肉饼。\n\
  \n这个过程虽然只有四个步骤，却引发了一些问题。清单 11-3 展示了如何在`main.swift`文件中模拟此过程，从而改变我创建`Burger`对象的方式。\n\
  \n**清单 11-3.** 在 `main.swift` 文件中实现点餐流程\n\n```\n// 第 1 步 - 询问姓名\nlet name = \"Joe\"\
  ;\n\n// 第 2 步 - 是否需要素食？\nlet veggie = false;\n\n// 第 3 步 - 定制汉堡？\nlet pickles =\
  \ true;\nlet mayo = false;\nlet ketchup = true;\nlet lettuce = true;\nlet cooked\
  \ = Burger.Cooked.NORMAL;\n\n// 第 4 步 - 购买额外肉饼？\nlet patties = 2;\n\nlet order =\
  \ Burger( name: name, veggie: veggie, patties: patties, pickles: pickles,\n    mayo:\
  \ mayo, ketchup: ketchup, lettuce: lettuce, cook: cooked );\norder.printDescription();\n\
  ```\n\n`Burger`的初始化器要求调用组件在客户不想更改默认值时了解这些默认配置值——例如，要知道标准汉堡包含两个肉饼并加有番茄酱。每个需要`Burger`对象的组件都必须具备这一知识，其结果是默认值的任何更改都必须在每个调用组件中实现。\n\
  \n### 理解伸缩初始化器反模式\n\n在其他语言中，生成器模式被用作伸缩初始化器或伸缩构造函数反模式的替代方案。反模式是那些无法解决预期问题或以困难或危险方式解决问题的常用技术。在某些语言中，伸缩构造函数模式是一种常用技术，旨在简化使用定义大量初始化器参数的类。考虑以下类：\n\
  \n```\nclass Milkshake {\n    enum Size { case SMALL; case MEDIUM; case LARGE };\n\
  \    enum Flavor { case CHOCOLATE; case STRAWBERRY; case VANILLA };\n    let count:Int;\n\
  \    let size:Size;\n    let flavor:Flavor;\n\n    init(flavor:Flavor, size:Size,\
  \ count:Int) {\n        self.count = count;\n        self.size = size;\n       \
  \ self.flavor = flavor;\n    }\n}\n```\n\n`Milkshake`类定义了一个包含三个参数的初始化器。这要求调用组件了解这些参数的默认值，并且即使在需要默认值时也要提供值，如下所示：\n\
  \n```\nvar shake = Milkshake(\n    flavor: Milkshake.Flavor.CHOCOLATE,\n    size:\
  \ Milkshake.Size.MEDIUM,\n    count: 1\n);\n```\n\n大多数顾客只想要一份中杯奶昔，只需指定口味即可。伸缩初始化器反模式试图通过提供提供默认值的便捷初始化器来改善这种情况，如下所示：\n\
  \n```\nclass Milkshake {\n    enum Size { case SMALL; case MEDIUM; case LARGE };\n\
  \    enum Flavor { case CHOCOLATE; case STRAWBERRY; case VANILLA };\n    let count:Int;\n\
  \    let size:Size;\n    let flavor:Flavor;\n\n    init(flavor:Flavor, size:Size,\
  \ count:Int) {\n        self.count = count;\n        self.size = size;\n       \
  \ self.flavor = flavor;\n    }\n\n    convenience init(flavor:Flavor, size:Size)\
  \ {\n        self.init(flavor:flavor, size:size, count:1);\n    }\n\n    convenience\
  \ init(flavor:Flavor) {\n        self.init(flavor:flavor, size:Size.MEDIUM);\n \
  \   }\n}\n```\n\n每个便捷初始化器省略一个附加参数，并调用前一个初始化器并传入一个默认值。这样可以在调用组件不知道未提供的参数的默认值的情况下创建对象，如下所示：\n\
  \n```\nvar shake = Milkshake(flavor: Milkshake.Flavor.CHOCOLATE);\n```\n\n伸缩初始化器被认为是一种反模式，因为它们会导致大量难以阅读和维护的初始化器。在\
  \ Swift 中，你可以通过使用默认参数值来避免伸缩初始化器，如下所示：\n\n```\nclass Milkshake {\n    enum Size {\
  \ case SMALL; case MEDIUM; case LARGE };\n    enum Flavor { case CHOCOLATE; case\
  \ STRAWBERRY; case VANILLA };\n    let count:Int;\n    let size:Size;\n    let flavor:Flavor;\n\
  \n    init(flavor:Flavor, size:Size = Size.MEDIUM, count:Int = 1) {\n        self.count\
  \ = count;\n        self.size = size;\n        self.flavor = flavor;\n    }\n}\n\
  ```\n\n当想要创建`Milkshake`对象的组件省略了`size`和`count`参数时，就会使用它们的默认值。这样做的好处是，默认值在`Milkshake`类内部定义，无需定义初始化器的各种排列组合。\n\
  \n\n\n## 理解建造者模式\n\n建造者模式通过在组件及其需要操作的对象之间引入一个中介——称为建造者——来解决问题。如图 11-1 所示，建造者模式包含三个操作。\n\
  \n![A978-1-4842-0394-1_11_Fig1_HTML.jpg](img/A978-1-4842-0394-1_11_Fig1_HTML.jpg)\n\
  \n图 11-1. 建造者模式\n\n在第一个操作中，调用组件向建造者提供一条数据，用于替换创建对象时使用的某个默认值。每次调用组件从其所遵循的流程中获取新值时，该操作都会重复执行。以我的点餐流程为例，调用组件能够在序列的每个阶段之后向建造者提供新的数据。\n\
  \n在第二个操作中，调用组件要求建造者创建一个对象。这向建造者表明，将不会再有新数据，并且应该使用它已接收到的数据值以及调用组件未指定的数据项的默认值来创建一个对象。\n\
  \n在第三个操作中，建造者创建一个对象，并将其作为对象返回给调用组件。\n\n调用组件知道需要什么——例如，一个不加番茄酱的汉堡——但它不知道如何创建它。建造者类知道如何创建汉堡，也知道默认配置，但它不知道顾客在任何特定订单中的需求。建造者模式将“需要什么”和“如何创建”结合在一起，同时避免调用组件与其所需对象之间产生紧密耦合。\n\
  \n## 实现建造者模式\n\n在接下来的章节中，我将演示如何将建造者模式应用到示例项目中，以便将 `Burger` 类的创建过程与使用 `Burger` 对象的组件解耦。\n\
  \n### 定义建造者类\n\n第一步是定义建造者类，其中包含 `Burger` 初始化器参数的默认值，并提供了允许调用组件更改这些值的方法。代码清单 11-4\
  \ 展示了我添加到示例项目中的 `Builder.swift` 文件的内容。\n\n代码清单 11-4. `Builder.swift` 文件的内容\n\n```\n\
  class BurgerBuilder {\n\nprivate var veggie  = false;\nprivate var pickles = true;\n\
  private var mayo    = true;\nprivate var ketchup = true;\nprivate var lettuce =\
  \ true;\nprivate var cooked  = Burger.Cooked.NORMAL;\nprivate var patties = 2;\n\
  \nfunc setVeggie(choice: Bool)  { self.veggie  = choice; }\nfunc setPickles(choice:\
  \ Bool) { self.pickles = choice; }\nfunc setMayo(choice: Bool)    { self.mayo  \
  \  = choice; }\nfunc setKetchup(choice: Bool) { self.ketchup = choice; }\nfunc setLettuce(choice:\
  \ Bool) { self.lettuce = choice; }\nfunc setCooked(choice: Burger.Cooked) { self.cooked\
  \ = choice; }\nfunc addPatty(choice: Bool)   { self.patties = choice ? 3 : 2; }\n\
  \nfunc buildObject(name: String) -> Burger {\nreturn Burger(name: name, veggie:\
  \ veggie, patties: patties,\npickles: pickles, mayo: mayo, ketchup: ketchup,\nlettuce:\
  \ lettuce, cook: cooked);\n}\n\n}\n```\n\n`BurgerBuilder` 类定义了用于更改创建 `Burger` 对象时所使用的数据值的方法。`Burger`\
  \ 初始化器中只有 `name` 参数没有默认值，因此 `buildObject` 方法接受一个 `name` 参数。该类通过使用 `name` 值、通过其他方法提供的值以及默认值创建一个\
  \ `Burger` 对象来响应 `buildObject` 方法的调用。\n\n**提示**\n\n我本来可以在类中使用属性，但我更倾向于使用方法，因为通过在\
  \ `buildObject` 方法上定义参数，我可以清楚地指出那些没有默认值的参数。在本章稍后部分将建造者模式应用于 SportsStore 应用时，我将演示如何使用属性来创建建造者。\n\
  \n该类定义的所有方法几乎都与底层属性直接对应。唯一例外的是 `addPatty` 方法，它允许调用组件指定肉饼的数量——只需指定是否需要额外添加一个即可。这种方法使我能够处理额外肉饼的情况，而无需让调用组件了解默认数量是多少。\n\
  \n### 消费建造者\n\n下一步是使用建造者来创建一个对象。代码清单 11-5 展示了我对 `main.swift` 文件所做的更改。\n\n代码清单 11-5. 在\
  \ `main.swift` 文件中消费建造者模式\n\n```\nvar builder = BurgerBuilder();\n\n// 第 1 步 - 询问姓名\n\
  let name = \"Joe\";\n\n// 第 2 步 - 是否需要素食餐？\nbuilder.setVeggie(false);\n\n// 第 3\
  \ 步 - 定制汉堡？\nbuilder.setMayo(false);\nbuilder.setCooked(Burger.Cooked.WELLDONE);\n\
  \n// 第 4 步 - 购买额外肉饼？\nbuilder.addPatty(false);\n\nlet order = builder.buildObject(name);\n\
  order.printDescription();\n```\n\n这看起来可能与我之前不使用建造者模式创建 `Burger` 对象的方式相似，但使用建造者作为中介，通过隔离变化的影响，提高了灵活性。\n\
  \n### 理解模式的影响\n\n第一个改进是，可以在不修改调用组件或 `Burger` 类的情况下更改建造者中的默认值。如果大多数顾客选择不要酸黄瓜——大概是因为它们古怪、可怕，并且破坏了美味的汉堡——那么餐厅可以更新菜单，制作不添加酸黄瓜的汉堡。代码清单\
  \ 11-6 展示了对建造者类的更改。\n\n代码清单 11-6. 在 `Builder.swift` 文件中禁用酸黄瓜\n\n```\nclass BurgerBuilder\
  \ {\n\nprivate var veggie  = false;\nprivate var pickles = false;\nprivate var mayo\
  \    = true;\nprivate var ketchup = true;\nprivate var lettuce = true;\nprivate\
  \ var cooked  = Burger.Cooked.NORMAL;\nprivate var patties = 2;\n\nfunc setVeggie(choice:\
  \ Bool)  { self.veggie  = choice; }\nfunc setPickles(choice: Bool) { self.pickles\
  \ = choice; }\nfunc setMayo(choice: Bool)    { self.mayo    = choice; }\nfunc setKetchup(choice:\
  \ Bool) { self.ketchup = choice; }\nfunc setLettuce(choice: Bool) { self.lettuce\
  \ = choice; }\nfunc setCooked(choice: Burger.Cooked) { self.cooked = choice; }\n\
  func addPatty(choice: Bool)   { self.patties = choice ? 3 : 2; }\n\nfunc buildObject(name:\
  \ String) -> Burger {\nreturn Burger(name: name, veggie: veggie, patties: patties,\n\
  pickles: pickles, mayo: mayo, ketchup: ketchup,\nlettuce: lettuce, cook: cooked);\n\
  }\n\n}\n```\n\n调用组件不知道默认值已经更改，`Burger` 类也不知道，但现在除非顾客明确要求，否则创建的 `Burger` 对象将不包含酸黄瓜。你可以从运行应用程序产生的输出中看到效果。\n\
  \n```\nName Joe\nVeggie: false\nPatties: 2\nPickles: false\nMayo: false\nKetchup:\
  \ true\nLettuce: true\nCook: Well Done\n```\n\n\n\n### 改变流程\n\n第二个改进之处在于，我可以在不修改生成器或\
