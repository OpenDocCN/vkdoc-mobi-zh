  \ 将创建项目文件并打开主项目窗口。\n\n\n\n### 理解 Xcode 布局\n\n当 Xcode 显示项目时，你会看到与图 2-11 类似的布局。你看到的布局可能略有不同，但我会解释如何打开每个面板。\n\
