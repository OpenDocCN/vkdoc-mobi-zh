  \n亚当·弗里曼是一位经验丰富的 IT 专业人士，曾在多家公司担任高级职位，最近担任一家全球银行的首席技术官和首席运营官。现已退休，他致力于写作和跑步。\n\n\
  ## 关于技术审校\n\nFabio Claudio Ferracchiati 是一位高级顾问、高级分析师/开发人员，精通 Microsoft 技术。他在 BluArancio\
  \ SpA（[`www.bluarancio.com`](http://www.bluarancio.com/)）担任高级分析师/开发人员和 Microsoft\
  \ Dynamics CRM 专家。他是 Microsoft .NET 认证解决方案开发专家、Microsoft .NET 认证应用程序开发专家、Microsoft\
  \ 认证专家，同时也是一位多产的作家和技术审校。在过去十年中，他为意大利和国际杂志撰写文章，并合著了十多本涵盖各种计算机主题的书籍。\n\n\n\n目录\n\n\
