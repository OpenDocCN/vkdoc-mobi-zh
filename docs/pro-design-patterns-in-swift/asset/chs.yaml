- "# 19. 责任链模式\n\n当有多个对象可以处理请求，但你不想向调用组件暴露这些对象的细节时，责任链模式非常有用。表 19-1 将责任链模式置于上下文中。\n\
  \n**表 19-1.** 责任链模式上下文\n\n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？ | 责任链模式将一组可能处理调用组件请求的对象按顺序组织起来。这组对象被称为“链”，链中的每个对象会被请求是否要处理该请求。请求沿着链依次传递，直到某个对象处理了请求，或者到达链的末端。\
  \ |\n| 有什么好处？ | 责任链模式允许将能够处理请求的对象按照优先顺序排列，该顺序可以重新排列、扩展或缩减，而不会对调用组件产生任何影响，因为调用组件并不了解构成链的对象。\
  \ |\n| 何时使用此模式？ | 当有多个对象可以处理某个请求，且仅应使用其中一个时，使用此模式。 |\n| 何时应避免此模式？ | 当只有一个对象可以处理请求，或者调用组件需要选择对象时，不要使用此模式。\
  \ |\n| 如何判断是否正确实现了该模式？ | 当能够处理请求的一组对象按顺序排列，并且每个对象都依次获得处理请求的机会时，该模式就正确实现了。链中的各个对象彼此之间互不了解（除了链中的下一个链接）。\
  \ |\n| 是否有常见的陷阱？ | 陷阱在于泄露链中对象的细节，无论是泄露给彼此还是泄露给调用组件。 |\n| 是否有相关模式？ | 责任链模式与第 20 章中描述的命令模式有一些共同概念。\
  \ |\n\n\n\n## 准备示例项目\n\n本章我创建了一个名为 `ChainOfResp` 的 Xcode 命令行工具项目。我在项目中添加了一个名为 `Message.swift`\
  \ 的文件，并用它来定义清单 19-1 中展示的代码。\n\n**清单 19-1.** `Message.swift` 文件的内容\n\n```\nstruct\
  \ Message {\n    let from:String;\n    let to:String;\n    let subject:String;\n\
  }\n```\n\n我定义了一个名为 `Message` 的结构体，它包含代表通用消息不同属性的常量：消息的发件人、收件人以及主题。我没有为消息正文定义常量，因为演示职责链模式不需要它。清单\
  \ 19-2 展示了 `Transmitters.swift` 文件的内容，其中我定义了一对类，它们能够处理 `Message` 对象以便将其传输到其他地方。\n\
  \n**清单 19-2.** `Transmitters.swift` 文件的内容\n\n```\nclass LocalTransmitter {\n   \
  \ func sendMessage(message: Message) {\n        println(\"Message to \\(message.to)\
  \ sent locally\");\n    }\n}\n\nclass RemoteTransmitter {\n    func sendMessage(message:\
  \ Message) {\n        println(\"Message to \\(message.to) sent remotely\");\n  \
  \  }\n}\n```\n\n这些类代表了消息发送的机制，可以是公司内部本地发送，也可以远程发送到更广阔的世界。每个发射器类都定义了一个 `sendMessage`\
  \ 方法，用于处理 `Message` 对象。我无需实现消息路由来演示职责链模式，因此 `sendMessage` 方法向 Xcode 调试控制台输出一条消息。清单\
  \ 19-3 展示了我添加到 `main.swift` 文件中以使用示例类的代码。\n\n**清单 19-3.** `main.swift` 文件的内容\n\n\
  ```\nlet messages = [\n    Message(from: \"bob@example.com\", to: \"joe@example.com\"\
  ,\n        subject: \"Free for lunch?\"),\n    Message(from: \"joe@example.com\"\
  , to: \"alice@acme.com\",\n        subject: \"New Contracts\"),\n    Message(from:\
  \ \"pete@example.com\", to: \"all@example.com\",\n        subject: \"Priority: All-Hands\
  \ Meeting\"),\n];\n\nlet localT = LocalTransmitter();\nlet remoteT = RemoteTransmitter();\n\
  \nfor msg in messages {\n    if let index = find(msg.from, \"@\") {\n        if\
  \ (msg.to.hasSuffix(msg.from[Range<String.Index>(start:\n            index, end:\
  \ msg.from.endIndex)])) {\n            localT.sendMessage(msg);\n        } else\
  \ {\n            remoteT.sendMessage(msg);\n        }\n    } else {\n        println(\"\
  Error: cannot send message to \\(msg.from)\");\n    }\n}\n```\n\n我定义了一个 `Message`\
  \ 对象数组，并使用 `for` 循环检查每个对象，根据 `to` 和 `from` 地址是否共享相同的后缀，在 `LocalTransmitter` 对象和\
  \ `RemoteTransmitter` 对象之间进行选择。运行示例应用会得到以下结果：\n\n```\nMessage to joe@example.com\
  \ sent locally\nMessage to alice@acme.com sent remotely\nMessage to all@example.com\
  \ sent locally\n```\n\n## 理解模式要解决的问题\n\n示例应用中的问题在于，使用发射器类处理 `Message` 对象的组件必须了解这些类，并理解何时应该使用它们。这使得添加新的消息处理程序、更改现有处理程序之间的关系以及整体测试和维护代码变得困难。为了演示这个问题，我定义了一个新的发射器类，如清单\
  \ 19-4 所示。\n\n**清单 19-4.** 在 `Transmitters.swift` 文件中定义一个新的发射器类\n\n```\nclass LocalTransmitter\
  \ {\n    func sendMessage(message: Message) {\n        println(\"Message to \\(message.to)\
  \ sent locally\");\n    }\n}\n\nclass RemoteTransmitter {\n    func sendMessage(message:\
  \ Message) {\n        println(\"Message to \\(message.to) sent remotely\");\n  \
  \  }\n}\n\nclass PriorityTransmitter {\n    func sendMessage(message: Message) {\n\
  \        println(\"Message to \\(message.to) sent as priority\");\n    }\n}\n```\n\
  \n为了正确处理 `Message` 对象，需要更新组件以反映新的 `PriorityTransmitter` 类，并了解何时使用它。清单 19-5 展示了 `main.swift`\
  \ 文件中所需的更改，但在实际项目中，这些更改会在整个应用中重复出现。\n\n**清单 19-5.** 在 `main.swift` 文件中反映新发射器类的定义\n\
  \n```\nlet messages = [\n    Message(from: \"bob@example.com\", to: \"joe@example.com\"\
  ,\n        subject: \"Free for lunch?\"),\n    Message(from: \"joe@example.com\"\
  , to: \"alice@acme.com\",\n        subject: \"New Contracts\"),\n    Message(from:\
  \ \"pete@example.com\", to: \"all@example.com\",\n        subject: \"Priority: All-Hands\
  \ Meeting\"),\n];\n\nlet localT = LocalTransmitter();\nlet remoteT = RemoteTransmitter();\n\
  let priorityT = PriorityTransmitter();\n\nfor msg in messages {\n    if (msg.subject.hasPrefix(\"\
  Priority\")) {\n        priorityT.sendMessage(msg);\n    } else if let index = find(msg.from,\
  \ \"@\") {\n        if (msg.to.hasSuffix(msg.from[Range<String.Index>(start:\n \
  \           index, end: msg.from.endIndex)])) {\n            localT.sendMessage(msg);\n\
  \        } else {\n            remoteT.sendMessage(msg);\n        }\n    } else\
  \ {\n        println(\"Error: cannot send message to \\(msg.from)\");\n    }\n}\n\
  ```\n\n更改本身很简单，但调用组件需要深入了解发射器类之间的关系以及何时使用它们，这本身就是一个问题。\n\n## 理解职责链模式\n\n职责链模式通过将发射器排列成一个链（这也是其名称的由来）来解决这些问题。每个发射器是链中的一个环节，能够检查\
  \ `Message` 对象以确定是否可以承担对该请求的责任。如果链中的某个环节能够处理 `Message` 请求，则进行处理。如果不能，则将请求传递给链中的下一个环节，重复此过程，直到请求被处理或到达链中的最后一个环节。图\
  \ 19-1 展示了职责链模式。\n\n![A978-1-4842-0394-1_19_Fig1_HTML.jpg](img/A978-1-4842-0394-1_19_Fig1_HTML.jpg)\n\
  \n**图 19-1.** 职责链模式\n\n调用组件只与链中的第一个环节交互，对后续环节以及每个环节如何决定是否承担请求的依据一无所知。在图中，我展示了一个包含三个环节的链，其中第二个环节承担了请求的责任。在这种情况下，链中的第三个环节不参与此过程，也不知道来自调用组件的请求。\n\
  \n\n\n## 实现责任链模式\n\n责任链模式的实现依赖于向调用组件隐藏构成链条的各个独立环节的细节——最简便的方式是通过定义协议或基类来实现。我通常倾向于使用基类，因为我想通过可选属性来处理链条中的下一个环节，而协议定义的属性无法被赋予新值。清单\
  \ 19-6 展示了我定义并应用于发送器类的基类。\n\n**清单 19-6.** 在`Transmitters.swift`文件中定义并实现基类\n\n```\n\
  class Transmitter {\n    var nextLink:Transmitter?;\n    required init() {}\n  \
  \  func sendMessage(message:Message) {\n        if (nextLink != nil) {\n       \
  \     nextLink!.sendMessage(message);\n        } else {\n            println(\"\
  End of chain reached. Message not sent\");\n        }\n    }\n    private class\
  \ func matchEmailSuffix(message:Message) -> Bool {\n        if let index = find(message.from,\
  \ \"@\") {\n            return message.to.hasSuffix(message.from[Range<String.Index>(start:\n\
  \                index, end: message.from.endIndex)]);\n        }\n        return\
  \ false;\n    }\n}\n\nclass LocalTransmitter : Transmitter {\n    override func\
  \ sendMessage(message: Message) {\n        if (Transmitter.matchEmailSuffix(message))\
  \ {\n            println(\"Message to \\(message.to) sent locally\");\n        }\
  \ else {\n            super.sendMessage(message);\n        }\n    }\n}\n\nclass\
  \ RemoteTransmitter : Transmitter {\n    override func sendMessage(message: Message)\
  \ {\n        if (!Transmitter.matchEmailSuffix(message)) {\n            println(\"\
  Message to \\(message.to) sent remotely\");\n        } else {\n            super.sendMessage(message);\n\
  \        }\n    }\n}\n\nclass PriorityTransmitter : Transmitter {\n    override\
  \ func sendMessage(message: Message) {\n        if (message.subject.hasPrefix(\"\
  Priority\")) {\n            println(\"Message to \\(message.to) sent as priority\"\
  );\n        } else {\n            super.sendMessage(message);\n        }\n    }\n\
  }\n```\n\n`Transmitter`类定义了发送器的基本行为，包括将请求转发至链条中的下一个环节。我将检查电子邮件后缀的代码也定义在这个类中。（`required`初始化器的作用是让我能够根据发送器的类型创建其实例，这一点将在下一节中展示。）\n\
  \n每个独立的发送器类都继承自`Transmitter`，并重写了`sendMessage`方法。每个实现都会检查该发送器是否能承担对`Message`请求的责任。如果发送器无法承担责任，它会调用基类实现，从而将请求传递给链条中的下一个环节；若没有更多环节，则报告错误。\n\
  \n### 创建并提供责任链\n\n下一步是创建责任链，实例化所需的对象，并按它们将被询问承担`Message`责任的顺序排列。你可以使用本书第二部分描述的多种设计模式来创建链条，但我会保持示例简洁，实现一个每次调用时创建新链条的类方法。清单\
  \ 19-7 展示了我为创建链条而对`Transmitter`类所做的修改。\n\n**清单 19-7.** 在`Transmitters.swift`文件中创建链条\n\
  \n```\n...\nclass Transmitter {\n    var nextLink:Transmitter?;\n    required init()\
  \ {}\n\n    func sendMessage(message:Message) {\n        if (nextLink != nil) {\n\
  \            nextLink!.sendMessage(message);\n        } else {\n            println(\"\
  End of chain reached. Message not sent\");\n        }\n    }\n\n    class func createChain()\
  \ -> Transmitter? {\n        let transmitterClasses:[Transmitter.Type] = [\n   \
  \         PriorityTransmitter.self,\n            LocalTransmitter.self,\n      \
  \      RemoteTransmitter.self\n        ];\n        var link:Transmitter?;\n    \
  \    for tClass in transmitterClasses.reverse() {\n            let existingLink\
  \ = link;\n            link = tClass();\n            link?.nextLink = existingLink;\n\
  \        }\n        return link;\n    }\n\n    private class func matchEmailSuffix(message:Message)\
  \ -> Bool {\n        if let index = find(message.from, \"@\") {\n            return\
  \ message.to.hasSuffix(message.from[Range<String.Index>(start:\n               \
  \ index, end: message.from.endIndex)]);\n        }\n        return false;\n    }\n\
  }\n...\n```\n\n我定义了一个`Transmitter`类型的数组，以便轻松添加新的发送器或改变它们在链条中的顺序。创建链条时，我从最后一个环节开始，逆向遍历类数组，依次创建每个环节并建立它们之间的关联关系。\n\
  \n> **提示** 你不需要使用元类型来创建链条中的对象。我认为这是表达链条中类型集合最清晰的方式，但也可以直接创建对象并显式设置`nextLink`属性值。\n\
  \n### 应用责任链模式\n\n最后一步是使用责任链来处理`Message`对象。清单 19-8 展示了我在`main.swift`文件中所做的修改。\n\n\
  **清单 19-8.** 在`main.swift`文件中使用责任链\n\n```\nlet messages = [\n    Message(from: \"\
  bob@example.com\", to: \"joe@example.com\",\n        subject: \"Free for lunch?\"\
  ),\n    Message(from: \"joe@example.com\", to: \"alice@acme.com\",\n        subject:\
  \ \"New Contracts\"),\n    Message(from: \"pete@example.com\", to: \"all@example.com\"\
  ,\n        subject: \"Priority: All-Hands Meeting\"),\n];\n\nif let chain = Transmitter.createChain()\
  \ {\n    for msg in messages {\n        chain.sendMessage(msg);\n    }\n}\n```\n\
  \n应用该模式简化了调用组件中的代码，并隐藏了哪些对象将被询问承担`Message`责任的细节。当需要向应用程序添加新的发送器时，只需修改`Transmitter`类的`createChain`方法即可，调用组件无需任何改动。运行示例应用程序将产生以下输出：\n\
  \n```\nMessage to joe@example.com sent locally\nMessage to alice@acme.com sent remotely\n\
  Message to all@example.com sent as priority\n```\n\n## 责任链模式的变体\n\n责任链模式存在几种常见的变体，我将在以下各节中逐一描述。\n\
  \n\n  \n### 应用工厂方法模式\n\n目前，所有对 `Transmitters.createChain` 方法的调用都会获得一条包含相同链接对象集合的责任链。然而，我可以将责任链模式与工厂方法或抽象工厂模式（在第\
  \ 9 章和第 10 章中描述）结合使用，以针对不同请求改变链中的链接。代码清单 19-9 展示了我对 `Transmitter` 类所做的更改，以支持不同的链配置。\n\
  \n**代码清单 19-9.** 在 `Transmitters.swift` 文件中改变责任链\n\n```\n...\nclass func createChain(\
  \ localOnly:Bool ) -> Transmitter? {\n    let transmitterClasses:[Transmitter.Type]\n\
  \        = localOnly ? [PriorityTransmitter.self, LocalTransmitter.self]\n     \
  \   : [PriorityTransmitter.self, LocalTransmitter.self, RemoteTransmitter.self];\n\
  \    var link:Transmitter?;\n    for tClass in transmitterClasses.reverse() {\n\
  \        let existingLink = link;\n        link = tClass();\n        link?.nextLink\
  \ = existingLink;\n    }\n    return link;\n}\n...\n```\n\n改变链中链接的方法有很多，但我最终决定为\
  \ `createChain` 方法添加一个参数，允许调用者指定该链是否仅配置为处理本地消息。该参数的作用是决定链中是否包含 `RemoteTransmitter`，不过这一差异对调用组件是透明的。代码清单\
  \ 19-10 展示了我在 `main.swift` 文件中如何使用这个 `localOnly` 参数。\n\n**代码清单 19-10.** 在 `main.swift`\
  \ 文件中指定责任链的配置\n\n```\nlet messages = [\n    Message(from: \"bob@example.com\", to:\
  \ \"joe@example.com\",\n        subject: \"Free for lunch?\"),\n    Message(from:\
  \ \"joe@example.com\", to: \"alice@acme.com\",\n        subject: \"New Contracts\"\
  ),\n    Message(from: \"pete@example.com\", to: \"all@example.com\",\n        subject:\
  \ \"Priority: All-Hands Meeting\"),\n];\n\nif let chain = Transmitter.createChain(true)\
  \ {\n    for msg in messages {\n        chain.sendMessage(msg);\n    }\n}\n```\n\
  \n我调用 `createChain` 方法时传入了 `localOnly` 值为 `true`，这意味着我创建的 `Message` 对象之一将不会被处理。你可以通过运行应用程序看到效果，输出如下：\n\
  \n```\nMessage to joe@example.com sent locally\nEnd of chain reached. Message not\
  \ sent\nMessage to all@example.com sent as priority\n```\n\n### 指示是否已处理请求\n\n目前，调用组件无法了解责任链是否处理了某个请求。一种常见的变体是向调用组件提供反馈，这样责任链就不会成为一个“黑洞”。代码清单\
  \ 19-11 展示了我为向调用组件提供结果所做的更改。\n\n**代码清单 19-11.** 在 `Transmitters.swift` 文件中指示是否已处理请求\n\
  \n```\nclass Transmitter {\n    var nextLink:Transmitter?;\n    required init()\
  \ {}\n\n    func sendMessage(message:Message) -> Bool {\n        if (nextLink !=\
  \ nil) {\n            return nextLink!.sendMessage(message);\n        } else {\n\
  \            println(\"End of chain reached. Message not sent\");\n            return\
  \ false;\n        }\n    }\n    // ...为简洁起见，省略了方法...\n}\n\nclass LocalTransmitter\
  \ : Transmitter {\n    override func sendMessage(message: Message) -> Bool {\n \
  \       if (Transmitter.matchEmailSuffix(message)) {\n            println(\"Message\
  \ to \\(message.to) sent locally\");\n            return true;\n        } else {\n\
  \            return super.sendMessage(message);\n        }\n    }\n}\n\nclass RemoteTransmitter\
  \ : Transmitter {\n    override func sendMessage(message: Message) -> Bool {\n \
  \       if (!Transmitter.matchEmailSuffix(message)) {\n            println(\"Message\
  \ to \\(message.to) sent remotely\");\n            return true;\n        } else\
  \ {\n            return super.sendMessage(message);\n        }\n    }\n}\n\nclass\
  \ PriorityTransmitter : Transmitter {\n    override func sendMessage(message: Message)\
  \ -> Bool {\n        if (message.subject.hasPrefix(\"Priority\")) {\n          \
  \  println(\"Message to \\(message.to) sent as priority\");\n            return\
  \ true;\n        } else {\n            return super.sendMessage(message);\n    \
  \    }\n    }\n}\n```\n\n链中的每个链接只知道它自己能否处理该消息，对其他链接的能力一无所知。这种隔离带来的效果是，要得出一个确定的 `false`\
  \ 结果（表示没有任何链接处理该请求），需要征询链中的所有链接。而一旦某个链接接手并处理了 `Message` 对象，则会立即生成一个确定的 `true` 结果。代码清单\
  \ 19-12 展示了我在 `main.swift` 文件中如何使用 `sendMessage` 方法返回的结果。\n\n**代码清单 19-12.** 在 `main.swift`\
  \ 文件中接收来自责任链的响应\n\n```\nlet messages = [\n    Message(from: \"bob@example.com\"\
  , to: \"joe@example.com\",\n        subject: \"Free for lunch?\"),\n    Message(from:\
  \ \"joe@example.com\", to: \"alice@acme.com\",\n        subject: \"New Contracts\"\
  ),\n    Message(from: \"pete@example.com\", to: \"all@example.com\",\n        subject:\
  \ \"Priority: All-Hands Meeting\"),\n];\n\nif let chain = Transmitter.createChain(true)\
  \ {\n    for msg in messages {\n        let handled = chain.sendMessage(msg);\n\
  \        println(\"Message sent: \\(handled)\");\n    }\n}\n```\n\n运行该应用程序会产生以下输出，展示了向调用组件提供响应的效果：\n\
  \n```\nMessage to joe@example.com sent locally\nMessage sent: true\nEnd of chain\
  \ reached. Message not sent\nMessage sent: false\nMessage to all@example.com sent\
  \ as priority\nMessage sent: true\n```\n\n\n### 通知链中的所有节点\n\n在责任链模式的标准实现中，链中的节点只有在其中一个节点承担请求责任时才会被查询。承担责任节点之后的链中节点并不知晓该请求。\n\
  \n标准实现的一种变体是，通知链中所有节点某个请求的相关信息，即使这些节点位于接受该请求的节点之后。这是一种我很少使用但很有用的变体，当链中的节点需要知道自己是否被抢占时尤为实用。代码清单\
  \ 19-13 展示了我对 `Transmitter` 及其子类所做修改的实现方式。\n\n**代码清单 19-13.** 在 `Transmitters.swift`\
  \ 文件中通知链中所有节点\n\n```\nclass Transmitter {\n    var nextLink:Transmitter?;\n    required\
  \ init() {}\n    func sendMessage(message:Message, handled: Bool = false) -> Bool\
  \ {\n        if (nextLink != nil) {\n            return nextLink!.sendMessage(message,\
  \ handled: handled);\n        } else if (!handled) {\n            println(\"End\
  \ of chain reached. Message not sent\");\n        }\n        return handled;\n \
  \   }\n    // ...为简洁起见省略方法...\n}\n\nclass LocalTransmitter : Transmitter {\n   \
  \ override func sendMessage(message: Message, var handled:Bool) -> Bool {\n    \
  \    if (!handled && Transmitter.matchEmailSuffix(message)) {\n            println(\"\
  Message to \\(message.to) sent locally\");\n            handled = true;\n      \
  \  }\n        return super.sendMessage(message, handled: handled);\n    }\n}\n\n\
  class RemoteTransmitter : Transmitter {\n    override func sendMessage(message:\
  \ Message, var handled: Bool) -> Bool {\n        if (!handled && !Transmitter.matchEmailSuffix(message))\
  \ {\n            println(\"Message to \\(message.to) sent remotely\");\n       \
  \     handled = true;\n        }\n        return super.sendMessage(message, handled:\
  \ handled);\n    }\n}\n\nclass PriorityTransmitter : Transmitter {\n    var totalMessages\
  \ = 0;\n    var handledMessages = 0;\n    override func sendMessage(message: Message,\
  \ var handled:Bool) -> Bool {\n        totalMessages++;\n        if (!handled &&\
  \ message.subject.hasPrefix(\"Priority\")) {\n            handledMessages++;\n \
  \           println(\"Message to \\(message.to) sent as priority\");\n         \
  \   println(\"Stats: Handled \\(handledMessages) of \\(totalMessages)\");\n    \
  \        handled = true;\n        }\n        return super.sendMessage(message, handled:\
  \ handled);\n    }\n}\n```\n\n我修改了 `sendMessage` 方法的签名，定义了一个 `handled` 参数，用于指示链中某个节点是被要求承担请求责任，还是因其他节点已承担该请求责任而被通知。我还修改了\
  \ `PriorityTransmitter` 类，使其能跟踪自己处理的请求数量以及处理的总请求数。运行应用程序会产生以下输出：\n\n```\nMessage\
  \ to joe@example.com sent locally\nMessage sent: true\nEnd of chain reached. Message\
  \ not sent\nMessage sent: false\nMessage to all@example.com sent as priority\nStats:\
  \ Handled 1 of 3\nMessage sent: true\n```\n\n### 理解该模式的潜在缺陷\n\n实现该模式时唯一的缺陷是，将链中对象的详细信息泄露给调用组件或链中其他节点。该模式通过将链的创建方式封装在单个方法或类中来工作，而泄露实现细节会导致对特定链配置产生依赖，从而使后续修改链变得困难。请确保向调用组件提供基类或协议，并在设置链中节点的\
  \ `nextLink` 属性时使用相同的基类或协议。\n\n如果你实现了向调用组件返回结果的变体，则必须确保不会无意中在结果中泄露链的相关信息。责任链模式最适合使用简单的结果类型（例如我示例中使用的\
  \ `Bool`），但如果你使用更复杂的类型，则一定不要包含对已承担请求责任的链中节点的引用。\n\n### Cocoa 中的模式示例\n\nCocoa 依靠责任链模式来处理用户界面事件。所有\
  \ UI 组件都派生自 `UIResponder` 类（对于 OS X 应用则对应 `NSResponder` 类）。链中的节点是独立的 UI 组件，其排列方式反映了界面组件的层级结构，顶层视图作为链中的最后一个节点。\n\
  \n当用户与某个组件交互时（例如点击鼠标），Cocoa 会将交互事件发送到代表被点击组件的链中节点。该组件有机会承担处理事件的责任，事件会沿着链传递，直到找到能够处理该事件的组件，或到达链末尾（这意味着应用程序不希望或不需要处理该事件，因此可以忽略）。\n\
  \n## 将模式应用于 SportsStore 应用程序\n\n为了演示责任链模式的使用，我将定义一组类，用于格式化 SportsStore 应用中显示产品的表格单元格的背景颜色。\n\
  \n### 准备示例应用\n\n我接续第 18 章中 SportsStore 项目的进度，本章无需其他准备。\n\n\n\n### 定义责任链及其链节\n\n\
  我的责任链将由一组对象组成，这些对象将根据其所显示的产品类别，负责格式化表格单元格。清单 19-14 显示了我添加到 SportsStore 项目中并用于实现该模式的\
  \ `FormatterChain.swift` 文件的内容。\n\n**清单 19-14.** `FormatterChain.swift` 文件的内容\n\n\
  ```\nimport UIKit;\n\nclass CellFormatter {\n    var nextLink:CellFormatter?;\n\n\
  \    func formatCell(cell: ProductTableCell) {\n        nextLink?.formatCell(cell);\n\
  \    }\n\n    class func createChain() -> CellFormatter {\n        let formatter\
  \ = ChessFormatter();\n        formatter.nextLink = WatersportsFormatter();\n  \
  \      formatter.nextLink?.nextLink = DefaultFormatter();\n        return formatter;\n\
  \    }\n}\n\nclass ChessFormatter : CellFormatter {\n    override func formatCell(cell:\
  \ ProductTableCell) {\n        if (cell.product?.category == \"Chess\") {\n    \
  \        cell.backgroundColor = UIColor.lightGrayColor();\n        } else {\n  \
  \          super.formatCell(cell);\n        }\n    }\n}\n\nclass WatersportsFormatter\
  \ : CellFormatter {\n    override func formatCell(cell: ProductTableCell) {\n  \
  \      if (cell.product?.category == \"Watersports\") {\n            cell.backgroundColor\
  \ = UIColor.greenColor();\n        } else {\n            super.formatCell(cell);\n\
  \        }\n    }\n}\n\nclass DefaultFormatter : CellFormatter {\n    override func\
  \ formatCell(cell: ProductTableCell) {\n        cell.backgroundColor = UIColor.yellowColor();\n\
  \    }\n}\n```\n\n该模式的所有实现看起来都很相似，上述清单展示了与前一个示例共有的公共基础。我定义了一个基类（`CellFormatter`），它提供了一个用于创建责任链的类方法，并提供了遍历责任链的默认行为。责任链中的链节派生自\
  \ `CellFormatter` 类，并根据产品类别承担责任。它们执行的格式化操作是更改单元格的背景颜色。`DefaultFormatter` 类始终将单元格背景设置为黄色，并且必须用于创建责任链中的最后一个链节。清单\
  \ 19-15 展示了如何在 `ViewController` 类中使用责任链模式。\n\n**清单 19-15.** 在 `ViewController.swift`\
  \ 文件中使用责任链模式\n\n```\n...\nfunc tableView(tableView: UITableView,\n    cellForRowAtIndexPath\
  \ indexPath: NSIndexPath) -> UITableViewCell {\n    let product = productStore.products[indexPath.row];\n\
  \    let cell = tableView.dequeueReusableCellWithIdentifier(\"ProductCell\")\n \
  \       as ProductTableCell;\n    cell.product = productStore.products[indexPath.row];\n\
  \    cell.nameLabel.text = product.name;\n    cell.descriptionLabel.text = product.productDescription;\n\
  \    cell.stockStepper.value = Double(product.stockLevel);\n    cell.stockField.text\
  \ = String(product.stockLevel);\n    CellFormatter.createChain().formatCell(cell);\n\
  \    return cell;\n}\n...\n```\n\n您可以通过运行应用程序来查看应用格式化责任链的效果。效果虽然俗气，但清晰地显示了责任链中的哪个链节接受了每个表格单元格的责任，如图\
  \ 19-2 所示。\n\n![A978-1-4842-0394-1_19_Fig2_HTML.jpg](img/A978-1-4842-0394-1_19_Fig2_HTML.jpg)\n\
  \n**图 19-2.** 格式化表格单元格\n\n## 本章小结\n\n在本章中，我描述了责任链模式，并解释了如何使用它来找到一个愿意为请求承担责任的对象，同时隐藏了选择哪个对象以及选择方式的细节。在下一章中，我将介绍命令模式，该模式用于封装执行方法所需的细节。\n\
  \n"
- "# 20. 命令模式\n\n命令模式提供了一种机制，通过该机制可以封装如何调用方法的细节，以便稍后或由不同的组件调用该方法。表 20-1 将命令模式置于上下文中。\n\
  \n**表 20-1.** 将命令模式置于上下文中\n\n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？ | 命令模式用于封装在对象上调用方法的细节，其方式允许在不同时间或由不同组件调用该方法。\
  \ |\n| 有哪些好处？ | 有很多情况下使用命令是有用的，但最常见的是支持撤销操作和创建宏。 |\n| 何时应该使用此模式？ | 当你希望允许那些对将要使用的对象、将要调用的方法或将要提供的参数一无所知的组件调用方法时，请使用此模式。\
  \ |\n| 何时应避免使用此模式？ | 不要将此模式用于常规的方法调用。 |\n| 如何知道正确实现了该模式？ | 当组件可以使用命令在对象上调用方法，而无需了解该对象或方法本身的细节时，就说明该模式被正确实现了。\
  \ |\n| 有哪些常见的陷阱？ | 主要的陷阱是要求执行命令的组件了解将要使用的方法或对象。 |\n| 有哪些相关的模式？ | 备忘录模式提供了一种模型，可以用对象整个状态的快照来代替单个操作。\
  \ |\n\n## 准备示例项目\n\n为了演示命令模式，我创建了一个名为 Command 的 Xcode OS X 命令行工具项目。我添加了一个名为 `Calculator.swift`\
  \ 的文件，其内容如清单 20-1 所示。\n\n**清单 20-1.** `Calculator.swift` 文件的内容\n\n```\nclass Calculator\
  \ {\n    private(set) var total = 0;\n\n    func add(amount:Int) {\n        total\
  \ += amount;\n    }\n\n    func subtract(amount:Int) {\n        total -= amount;\n\
  \    }\n\n    func multiply(amount:Int) {\n        total = total * amount;\n   \
  \ }\n\n    func divide(amount:Int) {\n        total = total / amount;\n    }\n}\n\
  ```\n\n`Calculator` 类定义了一个名为 `total` 的存储型 `Int` 属性，其值通过调用 `add`、`subtract`、`multiply`\
  \ 和 `divide` 方法来更改。清单 20-2 显示了我添加到 `main.swift` 文件中的代码，该代码使用 `Calculator` 类来确定多个运算产生的值。\n\
  \n**清单 20-2.** `main.swift` 文件的内容\n\n```\nlet calc = Calculator();\ncalc.add(10);\n\
  calc.multiply(4);\ncalc.subtract(2);\nprintln(\"Total: \\(calc.total)\");\n```\n\
  \n运行应用程序会产生以下输出：\n\n```\nTotal: 38\n```\n\n\n\n## 理解该模式所解决的问题\n\n当需要将方法调用封装成对象，以便能够在日后执行或由其他组件执行，且无需该组件了解被调用方法及其所属对象的细节时，就会产生命令模式所要解决的问题。\n\
  \n假设你正在构建一个应用程序，其中两个组件对同一个对象执行操作，比如我在示例应用中定义的 `Calculator` 类实例。图 20-1 展示了该应用的基本结构，其中每个组件都调用更新\
  \ `Calculator` 总值的方法。\n\n![A978-1-4842-0394-1_20_Fig1_HTML.jpg](img/A978-1-4842-0394-1_20_Fig1_HTML.jpg)\n\
  \n图 20-1. 两个组件对同一个公共对象执行操作\n\n现在假设你需要实现撤销先前操作的功能。一种实现方法是让每个组件跟踪自己已执行的操作，以便将来能够撤销。问题在于，每个组件并不知道另一个组件执行了哪些操作，而在缺少这一信息的情况下执行撤销操作，可能会破坏共享对象的状态，因为操作会以错误的顺序被撤销。\n\
  \n我本可以让这些组件相互协调，但这只会造成组件间的耦合，并使应用程序的设计复杂化。我需要的是：一种独立于执行操作的组件来表达撤销操作的方式，以便能够以可控的方式调用它们，逐步回滚共享对象的状态。而这，正是命令模式可以发挥作用的地方。\n\
  \n## 理解命令模式\n\n命令模式将方法调用表示为一个对象，从而可以用来解决撤销问题以及我在“命令模式的变体”一节中描述的一系列相关问题。图 20-2 展示了命令模式。\n\
  \n![A978-1-4842-0394-1_20_Fig2_HTML.jpg](img/A978-1-4842-0394-1_20_Fig2_HTML.jpg)\n\
  \n图 20-2. 命令模式\n\n命令模式的核心是命令对象，通常简称为命令。在它的内部实现中，命令持有对接收者对象的引用，以及关于如何在接收者上调用方法的指令。在示例应用的上下文中，接收者对象就是\
  \ `Calculator` 类的一个实例，而方法调用指令则包含应调用哪个 `Calculator` 方法（`add`、`subtract`、`multiply`\
  \ 或 `divide`）以及方法参数的值的详细信息。\n\n接收者和调用指令是私有的，使用命令的组件无法访问它们。命令对象唯一公开的方面是一个执行方法，当需要对接收者对象执行方法调用指令时（即，使用指定的参数值调用指定的方法），调用组件会调用该方法。用命令模式的术语来说，调用组件被称为调用者，因为它会调用执行方法。\n\
  \n如果这看起来过于抽象，不必担心。命令模式应用场景非常广泛，只有在具体情境中才能真正理解它。需要牢记的重要一点是：在调用者调用执行方法之前，方法调用指令并不会在接收者对象上执行。如果你记住了这一点，那么在看到该模式如何实现时，其他一切就都水到渠成了。\n\
  \n## 实现命令模式\n\n对大多数人来说，理解命令模式最简单的方法就是用它来解决一个具体问题。在接下来的几节中，我将应用该模式为我的示例应用创建一个撤销功能。你可能需要阅读实现步骤好几次才能理解模式是如何组合在一起的，但请坚持下去，因为命令模式值得花时间去理解。\n\
  \n### 定义命令协议\n\n命令模式的起点是定义一个协议，该协议为调用者提供一个执行方法。清单 20-3 展示了 `Commands.swift` 文件的内容，我已将其添加到示例项目中。\n\
  \n清单 20-3. Commands.swift 文件的内容\n\n```\nprotocol Command {\n\n    func execute();\n\
  \n}\n```\n\n命令允许调用者执行它，但不能看到接收者对象或调用方法的指令的细节。为此，清单中定义的 `Command` 协议定义了一个 `execute`\
  \ 方法，但没有透露任何其他细节。\n\n> **提示：** 通常约定使用 `execute` 作为执行方法的名称，但你可以使用任何你喜欢的名称。\n\n###\
  \ 定义命令实现类\n\n命令模式的实现类在 Swift 中很容易实现，因为执行接收者方法的指令可以表示为一个闭包。清单 20-4 展示了我为示例项目定义的实现类。\n\
  \n清单 20-4. 在 Commands.swift 文件中定义命令实现类\n\n```\nprotocol Command {\n\n    func execute();\n\
  \n}\n\nclass GenericCommand<T> : Command {\n\n    private var receiver: T;\n   \
  \ private var instructions: T -> Void;\n\n    init(receiver:T, instructions: T ->\
  \ Void) {\n        self.receiver = receiver; self.instructions = instructions;\n\
  \    }\n\n    func execute() {\n        instructions(receiver);\n    }\n\n    class\
  \ func createCommand(receiver:T, instuctions: T -> Void) -> Command {\n        return\
  \ GenericCommand(receiver: receiver, instructions: instuctions);\n    }\n\n}\n```\n\
  \n我定义了一个名为 `GenericCommand` 的泛型实现类，该类定义了存储接收者对象和调用指令的私有属性。该类遵循 `Command` 协议，`execute`\
  \ 方法在接收者对象上执行调用指令。我还定义了一个名为 `createCommand` 的类方法（仅作为便利方法），用于创建 `GenericCommand`\
  \ 的实例。\n\n\n\n### 应用命令模式\n\n为了应用命令模式，我扩展了 `Calculator` 类，使其能生成一个由 `Command` 对象组成的数组，这些对象构成了过去撤消操作的序列。代码清单\
  \ 20-5 显示了我所做的修改。\n\n**代码清单 20-5.** 在 `Calculator.swift` 文件中添加撤消支持\n\n```swift\n\
  class Calculator {\n    private(set) var total = 0;\n    private var history = [Command]();\n\
  \n    func add(amount:Int) {\n        addUndoCommand(Calculator.subtract, amount:\
  \ amount);\n        total += amount;\n    }\n\n    func subtract(amount:Int) {\n\
  \        addUndoCommand(Calculator.add, amount: amount);\n        total -= amount;\n\
  \    }\n\n    func multiply(amount:Int) {\n        addUndoCommand(Calculator.divide,\
  \ amount: amount);\n        total = total * amount;\n    }\n\n    func divide(amount:Int)\
  \ {\n        addUndoCommand(Calculator.multiply, amount: amount);\n        total\
  \ = total / amount;\n    }\n\n    private func addUndoCommand(method:Calculator\
  \ -> Int -> Void, amount:Int) {\n        self.history.append(GenericCommand<Calculator>.createCommand(self,\n\
  \            instuctions: {calc in\n                method(calc)(amount);\n    \
  \        }));\n    }\n\n    func undo() {\n        if self.history.count > 0 {\n\
  \            self.history.removeLast().execute();\n            // 临时措施 - 执行命令会添加到历史记录中\n\
  \            self.history.removeLast();\n        }\n    }\n}\n```\n\n> **提示**  \n\
  > 在此示例中，接收者对自己执行命令。这并不是命令模式的要求，我将在“命令模式的变体”一节中演示这一点。\n\n四个操作方法（`add`、`subtract`\
  \ 等）中的每一个都调用了 `addUndoCommand` 方法，传入了用于撤消该操作的方法以及应作为参数传递给该方法的数值。`addUndoCommand`\
  \ 方法会创建 `Command` 对象，并将其添加到一个名为 `history` 的数组中。我还定义了一个 `undo` 方法，该方法从 `history`\
  \ 数组中移除最近的 `Command` 并执行它，从而使 `Calculator` 对象恢复到较早的状态。执行撤消 `Command` 会导致一个新的 `Command`\
  \ 被添加到历史记录中，这不是我想要的效果。因此，在 `undo` 方法中执行 `Command` 之后，我会移除并丢弃 `history` 数组中的最后一项。这是一个临时措施，我将在下一节中移除它。\n\
  \n### 使用方法引用\n\n在代码清单 20-5 中，我将方法引用作为参数传递给 `addUndoCommand` 方法，如下所示：\n\n```\n...\n\
  addUndoCommand(Calculator.add, amount: amount);\n...\n```\n\n第一个参数是对 `Calculator`\
  \ 类定义的 `add` 方法的引用。为了接收这个引用，我这样定义了 `addUndoCommand` 的签名：\n\n```\n...\nprivate func\
  \ addUndoCommand(method:Calculator -> Int -> Void, amount:Int) {\n...\n```\n\n名为\
  \ `method` 的参数被定义为一个函数，该函数接受一个 `Calculator` 对象并返回另一个函数。第二个函数接受一个 `Int` 并且不返回结果。这可能会令人困惑，但这是由\
  \ Swift 实例方法在幕后实现的方式决定的。考虑以下代码：\n\n```swift\nclass Printer {\n    func printMessage(message:String)\
  \ {\n        println(message);\n    }\n}\n\nlet printerObject = Printer();\nprinterObject.printMessage(\"\
  Hello\");\n```\n\n我定义了一个名为 `Printer` 的类，它有一个 `printMessage` 方法。要使用 `Printer` 类，我需要创建一个新实例，然后用这个实例来调用方法。最后一条语句的结构如下：\n\
  \n```\n<对象引用>.<实例方法名>(<参数值>)\n```\n\n这是调用方法的常规方式，但还有一种替代方式：\n\n```\n...\nPrinter.printMessage(printerObject)(\"\
  Hello\");\n...\n```\n\n这与通过对象引用调用方法的效果相同。这种技术结构如下：\n\n```\n<类>.<实例方法名>(<对象引用>)(<参数值>)\n\
  ```\n\n柯里化（Currying）是创建一个函数的过程，该函数固定传递给另一个函数的一个或多个参数。在这种情况下，第一个函数返回一个柯里化函数，该函数在指定对象上调用实例方法。这种方法的好处是对象引用作为参数传递给第一个函数，这意味着我可以动态地为我的命令选择接收者，并将方法引用作为对象传递——当你想要更改命令所针对的接收者时，这一点变得很重要（参见“命令模式的变体”一节中的示例）。\n\
  \n### 应用并发保护\n\n我在本章开头描述的问题包括多个组件操作单个 `Calculator` 对象，现在我在 `Calculator` 类中有了一个数组，我需要添加并发保护以避免数据损坏。代码清单\
  \ 20-6 展示了如何使用 Grand Central Dispatch 序列化对 `history` 数组的访问。\n\n**代码清单 20-6.** 在\
  \ `Calculator.swift` 文件中应用并发保护\n\n```swift\nimport Foundation;\n\nclass Calculator\
  \ {\n    private(set) var total = 0;\n    private var history = [Command]();\n \
  \   private var queue = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
  \    private var performingUndo = false;\n\n    func add(amount:Int) {\n       \
  \ addUndoCommand(Calculator.subtract, amount: amount);\n        total += amount;\n\
  \    }\n\n    func subtract(amount:Int) {\n        addUndoCommand(Calculator.add,\
  \ amount: amount);\n        total -= amount;\n    }\n\n    func multiply(amount:Int)\
  \ {\n        addUndoCommand(Calculator.divide, amount: amount);\n        total =\
  \ total * amount;\n    }\n\n    func divide(amount:Int) {\n        addUndoCommand(Calculator.multiply,\
  \ amount: amount);\n        total = total / amount;\n    }\n\n    private func addUndoCommand(method:Calculator\
  \ -> Int -> Void, amount:Int) {\n        if (!performingUndo) {\n            dispatch_sync(self.queue,\
  \ {() in\n                self.history.append(GenericCommand<Calculator>.createCommand(self,\n\
  \                    instuctions: {calc in\n                        method(calc)(amount);\n\
  \                    }));\n            });\n        }\n    }\n\n    func undo()\
  \ {\n        dispatch_sync(self.queue, {() in\n            if self.history.count\
  \ > 0 {\n                self.performingUndo = true;\n                self.history.removeLast().execute();\n\
  \                self.performingUndo = false;\n            }\n        });\n    }\n\
  }\n```\n\n> **注意**  \n> 在实现命令模式时，你不必添加并发保护，但我建议你至少考虑一下。随着应用程序的成熟，对接收者执行命令的组件数量可能会增加，从而增加并发访问和数据损坏的几率。\n\
  \n我创建了一个串行队列，并在 `addUndoCommand` 和 `undo` 方法中使用 `dispatch_sync` 方法，以确保 `history`\
  \ 数组不会被并发修改。我定义了一个名为 `performingUndo` 的变量，在执行撤消 `Command` 时设置该变量，以防止 `addUndoCommand`\
  \ 方法在从某个操作方法中调用时向 `history` 数组添加另一个命令。\n\n> **提示**  \n> 使用变量来标识我是否正在执行撤消命令，可以防止应用程序锁死。Grand\
  \ Central Dispatch 不支持递归锁，这意味着如果我从一个也已通过 `dispatch_sync` 函数放入队列的块内部调用某个使用了 `dispatch_sync`\
  \ 函数的方法，应用程序就会冻结。第二次对 `dispatch_async` 的调用会一直阻塞，直到第一次调用完成，而第一次调用由于等待第二次调用而无法完成，这是一个经典的并发错误。\n\
  \n\n\n### 使用撤销功能\n\n最后一步是演示我添加到`Calculator`类中的撤销功能，如代码清单 20-7 所示。\n\n代码清单 20-7. 在`main.swift`文件中使用撤销功能\n\
  \n```\nlet calc = Calculator();\ncalc.add(10);\ncalc.multiply(4);\ncalc.subtract(2);\n\
  println(\"Total: \\(calc.total)\");\nfor _ in 0 ..< 3 {\n    calc.undo();\n    println(\"\
  Undo called. Total: \\(calc.total)\");\n}\n```\n\n我使用一个`for`循环对`Calculator`对象调用三次`undo`方法，并将`total`属性的新值写入调试控制台。运行应用程序会产生以下输出：\n\
  \n```\nTotal: 38\nUndo called. Total: 40\nUndo called. Total: 10\nUndo called. Total:\
  \ 0\n```\n\n## 命令模式的变体\n\n命令模式可以广泛应用于各种场景，但你会遇到该模式的三种主要变体，我将在以下各节中逐一描述。\n\n### 创建复合命令\n\
  \n我在`Calculator`对象中创建的命令仅能撤销单一操作，但利用`Command`协议的不透明性，可以轻松创建通过包装两个或更多其他命令来执行多项操作的命令。代码清单\
  \ 20-8 展示了如何定义一个遵循`Command`协议、作为其他命令包装器的类。\n\n代码清单 20-8. 在`Commands.swift`文件中定义命令包装器\n\
  \n```\nprotocol Command {\n    func execute();\n}\n\nclass CommandWrapper : Command\
  \ {\n    private let commands:[Command];\n    init(commands:[Command]) {\n     \
  \   self.commands = commands;\n    }\n    func execute() {\n        for command\
  \ in commands {\n            command.execute();\n        }\n    }\n}\n\nclass GenericCommand<T>\
  \ : Command {\n    private var receiver: T;\n    private var instructions: T ->\
  \ Void;\n    init(receiver:T, instructions: T -> Void) {\n        self.receiver\
  \ = receiver; self.instructions = instructions;\n    }\n    func execute() {\n \
  \       instructions(receiver);\n    }\n    class func createCommand(receiver:T,\
  \ instuctions: T -> Void) -> Command {\n        return GenericCommand(receiver:\
  \ receiver, instructions: instuctions);\n    }\n}\n```\n\n`CommandWrapper`类定义了一个由`Command`对象组成的常量数组，这些对象会按顺序执行。代码清单\
  \ 20-9 展示了如何在`Calculator`类中使用`CommandWrapper`来提供撤销命令的快照。\n\n代码清单 20-9. 在`Calculator.swift`文件中创建复合命令\n\
  \n```\nimport Foundation;\n\nclass Calculator {\n    // ...为简洁起见省略属性和方法...\n   \
  \ func getHistorySnaphot() -> Command? {\n        var command:Command?;\n      \
  \  dispatch_sync(queue, {() in\n            command = CommandWrapper(commands: self.history.reverse());\n\
  \        });\n        return command;\n    }\n}\n```\n\n`getHistorySnapshot`方法返回一个`Command`对象，该对象将撤销所有按时间顺序执行的操作。该方法的实现创建了一个`CommandWrapper`类的实例，该实例复制了撤销命令的本地数组。（关于\
  \ Swift 和 Cocoa 数组如何复制的详细信息，请参阅第 5 章。）\n\n提示\n\n请注意，我将传递给`CommandWrapper`初始化器的命令数组进行了反转。这是因为`Calculator`类以尾优先的顺序处理其数组，而`CommandWrapper`类则使用头优先的顺序。反转数组顺序意味着撤销命令将按照与通过`undo`方法单独执行时相同的序列进行应用。\n\
  \n代码清单 20-10 展示了我对`main.swift`文件所做的更改，以获取并执行复合命令。\n\n代码清单 20-10. 在`main.swift`文件中使用复合命令\n\
  \n```\nlet calc = Calculator();\ncalc.add(10);\ncalc.multiply(4);\ncalc.subtract(2);\n\
  let snapshot = calc.getHistorySnaphot();\nprintln(\"Pre-Snapshot Total: \\(calc.total)\"\
  );\nsnapshot?.execute();\nprintln(\"Post-Snapshot Total: \\(calc.total)\");\n```\n\
  \n运行示例应用程序会产生以下输出，这证明了每个单独的撤销命令都已通过复合命令执行：\n\n```\nPre-Snapshot Total: 38\nPost-Snapshot\
  \ Total: 0\n```\n\n\n\n### 将命令用作宏\n\n命令常用于创建宏，这样就能对不同的接收对象执行同一组操作。要将命令用作对象，接收者必须传递给\
  \ `execute` 方法，而不是命令对象的初始化器。代码清单 20-11 展示了我所做的修改，使接收者可以作为一个参数指定。\n\n**代码清单 20-11.**\
  \ 在 `Commands.swift` 文件中修改命令协议和实现类\n\n```\nprotocol Command {\n    func execute(receiver:Any);\n\
  }\n\nclass CommandWrapper : Command {\n    private let commands:[Command];\n   \
  \ init(commands:[Command]) {\n        self.commands = commands;\n    }\n    func\
  \ execute(receiver:Any) {\n        for command in commands {\n            command.execute(receiver);\n\
  \        }\n    }\n}\n\nclass GenericCommand<T> : Command {\n    private var instructions:\
  \ T -> Void;\n    init(instructions: T -> Void) {\n        self.instructions = instructions;\n\
  \    }\n    func execute(receiver:Any) {\n        if let safeReceiver = receiver\
  \ as? T {\n            instructions(safeReceiver);\n        } else {\n         \
  \   fatalError(\"Receiver is not expected type\");\n        }\n    }\n    class\
  \ func createCommand(instuctions: T -> Void) -> Command {\n        return GenericCommand(instructions:\
  \ instuctions);\n    }\n}\n```\n\n我在 `Command` 协议定义的 `execute` 方法中添加了一个 `Any` 参数。如果传递给\
  \ `execute` 方法的对象与泛型类型参数不匹配，我会在 `GenericCommand` 类的 execute 方法中通过调用全局 `fatalError`\
  \ 函数来强制进行类型一致性检查。这并不理想，因为错误将在运行时而非编译时报告，但 Swift 很难创建和应用泛型协议。\n\n在代码清单 20-12 中，你可以看到我如何修改\
  \ `Calculator` 类以移除撤销功能，并替换为支持生成宏命令，该宏命令将应用已执行的操作。\n\n**代码清单 20-12.** 在 `Calculator.swift`\
  \ 文件中添加宏支持\n\n```\nimport Foundation;\n\nclass Calculator {\n    private(set) var\
  \ total = 0;\n    private var history = [Command]();\n    private var queue = dispatch_queue_create(\"\
  arrayQ\", DISPATCH_QUEUE_SERIAL);\n    func add(amount:Int) {\n        addMacro(Calculator.add,\
  \ amount: amount);\n        total += amount;\n    }\n    func subtract(amount:Int)\
  \ {\n        addMacro(Calculator.subtract, amount: amount);\n        total -= amount;\n\
  \    }\n    func multiply(amount:Int) {\n        addMacro(Calculator.multiply, amount:\
  \ amount);\n        total = total * amount;\n    }\n    func divide(amount:Int)\
  \ {\n        addMacro(Calculator.divide, amount: amount);\n        total = total\
  \ / amount;\n    }\n    private func addMacro(method:Calculator -> Int -> Void,\
  \ amount:Int) {\n        dispatch_sync(self.queue, {() in\n            self.history.append(GenericCommand<Calculator>.createCommand(\n\
  \                { calc in method(calc)(amount); }\n            ));\n        });\n\
  \    }\n    func getMacroCommand() -> Command? {\n        var command:Command?;\n\
  \        dispatch_sync(queue, {() in\n            command = CommandWrapper(commands:\
  \ self.history);\n        });\n        return command;\n    }\n}\n```\n\n每个操作方法现在都调用\
  \ `addMacro` 方法，该方法构建了在 `Calculator` 实例上执行过的操作历史（而不是撤销功能所需的逆向操作）。重要的区别在于，`Calculator`\
  \ 对象本身并未包含在创建并由 `getMacroCommand` 方法随后打包的 `Command` 对象中。相反，每个命令包含了将被调用的操作方法的详细信息以及将传递给它的参数，而指定将成为命令接收者的\
  \ `Calculator` 对象是调用组件的职责。代码清单 20-13 展示了我在 `main.swift` 文件中如何使用宏功能。\n\n**代码清单 20-13.**\
  \ 在 `main.swift` 文件中创建和应用宏\n\n```\nlet calc = Calculator();\ncalc.add(10);\ncalc.multiply(4);\n\
  calc.subtract(2);\nprintln(\"Calc 1 Total: \\(calc.total)\");\n\nlet macro = calc.getMacroCommand();\n\
  let calc2 = Calculator();\nmacro?.execute(calc2);\nprintln(\"Calc 2 Total: \\(calc2.total)\"\
  );\n```\n\n我对一个 `Calculator` 对象应用一系列操作，然后将这些命令作为宏，用于对另一个不同的 `Calculator` 对象执行相同的操作。运行示例应用程序会产生以下结果：\n\
  \n```\nCalc 1 Total: 38\nCalc 2 Total: 38\n```\n\n### 使用闭包作为命令\n\n命令模式指定使用命令对象，这也是我在本章目前所有实现中所采用的方式。然而，命令只是一个容器，用于存储要调用的方法的详细信息、其参数值，以及（可选）目标接收者。所有这些细节都可以封装在\
  \ Swift 闭包中，而无需定义和使用 `Command` 协议及其实现。\n\n我更喜欢使用 `Command` 对象。我发现这能更清晰地体现模式的目的，并生成更易于阅读和维护的代码。不过，你可能会有不同的看法。在代码清单\
  \ 20-14 中，你可以看到我如何修改 `Calculator` 类，使其使用闭包来表达命令，并且不再依赖 `Command` 协议和 `GenericCommand`\
  \ 类。\n\n**代码清单 20-14.** 在 `Calculator.swift` 文件中使用闭包作为命令\n\n```\nimport Foundation;\n\
  \nclass Calculator {\n    private(set) var total = 0;\n    typealias CommandClosure\
  \ = (Calculator -> Void);\n    private var history = [CommandClosure]();\n    private\
  \ var queue = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n    func\
  \ add(amount:Int) {\n        addMacro(Calculator.add, amount: amount);\n       \
  \ total += amount;\n    }\n    func subtract(amount:Int) {\n        addMacro(Calculator.subtract,\
  \ amount: amount);\n        total -= amount;\n    }\n    func multiply(amount:Int)\
  \ {\n        addMacro(Calculator.multiply, amount: amount);\n        total = total\
  \ * amount;\n    }\n    func divide(amount:Int) {\n        addMacro(Calculator.divide,\
  \ amount: amount);\n        total = total / amount;\n    }\n    private func addMacro(method:Calculator\
  \ -> Int -> Void, amount:Int) {\n        dispatch_sync(self.queue, {() in\n    \
  \        self.history.append({ calc in method(calc)(amount)});\n        });\n  \
  \  }\n    func getMacroCommand() -> (Calculator -> Void) {\n        var commands\
  \ = [CommandClosure]();\n        dispatch_sync(queue, {() in\n            commands\
  \ = self.history\n        });\n        return { calc in\n            if (commands.count\
  \ > 0) {\n                for index in 0 ..< commands.count {\n                \
  \    commandsindex;\n                }\n            }\n        };\n    }\n}\n```\n\
  \n此清单中的更改可能看起来不大，但编写这类代码非常烧脑，因为你需要在想要闭包的变量和不想要的变量之间进行梳理，并弄清楚是否需要从 `Calculator ->\
  \ Int -> Void` 柯里化到 `Calculator -> Void` 或 `Int -> Void`。\n\n如果你坚持使用这种命令风格，那么请注意我使用了\
  \ `typealias` 关键字为数组中的使用定义了一个别名，如下所示：\n\n```\n...\ntypealias CommandClosure = (Calculator\
  \ -> Void);\nprivate var history = [CommandClosure]();\n...\n```\n\nSwift 编译器不喜欢将闭包签名作为数组的数据类型，但可以通过别名来安抚它。代码清单\
  \ 20-15 展示了在 `main.swift` 文件中的更改，以使用基于闭包的 `Calculator` 类。\n\n**代码清单 20-15.** 在 `main.swift`\
  \ 文件中使用基于闭包的 Calculator 类\n\n```\nlet calc = Calculator();\ncalc.add(10);\ncalc.multiply(4);\n\
  calc.subtract(2);\nprintln(\"Calc 1 Total: \\(calc.total)\");\n\nlet macro = calc.getMacroCommand();\n\
  let calc2 = Calculator();\nmacro(calc2);\nprintln(\"Calc 2 Total: \\(calc2.total)\"\
  );\n```\n\n唯一的更改是直接调用 `getMacroCommand` 方法返回的闭包，而不是调用由 `Command` 对象定义的 execute 方法。运行应用程序会产生以下输出，表明闭包的工作方式与单独的命令对象完全相同：\n\
  \n```\nCalc 1 Total: 38\nCalc 2 Total: 38\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将以下英文文本翻译成中文。\n\
  \n\n## 理解命令模式的陷阱\n\n只要不将接收者对象或方法调用指令的细节暴露给调用组件，命令模式的实现就相对简单。在实现细节方面，如果命令可能被多个组件使用，请确保添加并发保护，并确保你的闭包在你期望的对象上运行，而不是错误地关闭了错误的接收者对象。\n\
  \n## Cocoa 中命令模式的示例\n\n`Foundation` 框架包含了 `NSInvocation` 类，它用于在 Objective-C 中实现命令模式。然而，由于\
  \ Swift 和 Objective-C 调用其方法的方式不同，`NSInvocation` 类无法在 Swift 代码中使用。命令模式的一个更具体的实现可以通过\
  \ `NSUndoManager` 类获得，我将在下一节中使用它。\n\n## 将模式应用于 SportsStore 应用程序\n\n我将把命令模式应用于 SportsStore\
  \ 应用程序，以实现库存水平变化的撤销功能。iOS 包含一个内置的易于使用的撤销管理框架，该框架使用了命令模式。\n\n### 准备示例应用程序\n\n触发 iOS\
  \ 撤销操作的标准机制是摇晃设备。为了准备使用命令模式，我将添加支持，以便在识别到摇晃动作时接收通知。代码清单 20-16 显示了我对 `ViewController`\
  \ 类所做的更改。\n\n**代码清单 20-16.** 在 ViewController.swift 文件中添加摇晃动作支持\n\n```\nclass ViewController:\
  \ UIViewController, UITableViewDataSource {\n\n@IBOutlet weak var totalStockLabel:\
  \ UILabel!\n\n@IBOutlet weak var tableView: UITableView!\n\nlet productStore = ProductDataStore();\n\
  \noverride func viewDidLoad() {\n\nsuper.viewDidLoad()\n\ndisplayStockTotal();\n\
  \nlet bridge = EventBridge(callback: updateStockLevel);\n\nproductStore.callback\
  \ = bridge.inputCallback;\n\n}\n\noverride func motionEnded(motion: UIEventSubtype,\
  \ withEvent event: UIEvent) {\n\nif (event.subtype == UIEventSubtype.MotionShake)\
  \ {\n\nprintln(\"Shake motion detected\");\n\n}\n\n}\n\n// ...methods omitted for\
  \ brevity...\n\n}\n```\n\n我重写了 `motionEnded` 方法，以便检查检测到的运动类型，如果运动是摇晃，则在 Xcode 调试控制台中打印出一条消息。要测试此更改，请启动\
  \ SportsStore 应用程序，然后从 iOS 模拟器的硬件菜单中选择摇晃手势。你将在 Xcode 控制台中看到以下信息：\n\n```\nShake motion\
  \ detected\n```\n\n### 实现撤销功能\n\n实现命令模式最直接的方式是使用 `NSUndoManager` 类。`NSUndoManager`\
  \ 类通过 UI 组件类遵循 `NSResponder` 协议的 `undoManager` 属性自动管理，这意味着为你处理了 `NSUndoManager`\
  \ 实例的创建。使用撤销管理器有两个阶段，第一个是注册当用户请求撤销操作时将调用的命令。代码清单 20-17 显示了我对 `ViewController` 类所做的更改。\n\
  \n**代码清单 20-17.** 在 ViewController.swift 文件中注册撤销命令\n\n```\n...\n\n@IBAction func\
  \ stockLevelDidChange(sender: AnyObject) {\n\nif var currentCell = sender as? UIView\
  \ {\n\nwhile (true) {\n\ncurrentCell = currentCell.superview!;\n\nif let cell =\
  \ currentCell as? ProductTableCell {\n\nif let product = cell.product? {\n\nlet\
  \ dict = NSDictionary(objects: [product.stockLevel],\n\nforKeys: [product.name]);\n\
  \nundoManager?.registerUndoWithTarget(self,\n\nselector: \"undoStockLevel:\",\n\n\
  object: dict);\n\nif let stepper = sender as? UIStepper {\n\nproduct.stockLevel\
  \ = Int(stepper.value);\n\n} else if let textfield = sender as? UITextField {\n\n\
  if let newValue = textfield.text.toInt()? {\n\nproduct.stockLevel = newValue;\n\n\
  }\n\n}\n\ncell.stockStepper.value = Double(product.stockLevel);\n\ncell.stockField.text\
  \ = String(product.stockLevel);\n\nproductLogger.logItem(product);\n\nStockServerFactory.getStockServer()\n\
  \n.setStockLevel(product.name,\n\nstockLevel: product.stockLevel);\n\n}\n\nbreak;\n\
  \n}\n\n}\n\ndisplayStockTotal();\n\n}\n\n}\n\nfunc undoStockLevel(data:[String:Int])\
  \ {\n\nlet productName = data.keys.first;\n\nif (productName != nil) {\n\nlet stockLevel\
  \ = data[productName!];\n\nif (stockLevel != nil) {\n\nfor nproduct in productStore.products\
  \ {\n\nif nproduct.name == productName! {\n\nnproduct.stockLevel = stockLevel!;\n\
  \n}\n\n}\n\nupdateStockLevel(productName!, level: stockLevel!);\n\n}\n\n}\n\n}\n\
  \n...\n```\n\n`undoManager` 属性是可选的，命令通过 `registerUndoWithTarget` 方法注册。此方法的参数是命令的接收者、将被调用的方法以及将传递给该参数的对象。\n\
  \n```\n...\n\nundoManager?.registerUndoWithTarget(self, selector: \"undoStockLevel:\"\
  , object: dict);\n\n...\n```\n\n我将视图控制器指定为接收者，并指定了一个名为 `undoStockLevel` 的新方法。对于方法参数，我创建了一个\
  \ `NSDictionary`，其中包含了被修改的产品名称和旧的库存水平。\n\n`NSUndoManager` 暴露了它的一些 Objective-C 根源。首先，当我指定要调用方法的名称时，我需要在名称后面跟一个冒号，像这样：\n\
  \n```\n...\n\nundoManager?.registerUndoWithTarget(self, selector: \" undoStockLevel:\
  \ \", object: dict);\n\n...\n```\n\n这与在 Objective-C 代码中选择方法的方式有关，省略冒号将在执行命令时导致异常。另一个需要注意的问题是，我必须使用\
  \ `NSDictionary` 作为传递给方法的参数，因为 Swift 内置的字典不受支持。我必须定义 `undoStockLevel` 方法，因为撤销命令只能提供一个对象。我解包字典中的数据，并用它来更新存储库中的产品对象，并调用\
  \ `updateStockLevel` 方法，该方法接受两个参数，因此不能被撤销管理器直接调用。\n\n#### 触发撤销命令\n\n调用 `registerUndoWithTarget`\
  \ 方法的结果是在后台创建了一个命令，等待用户在摇晃设备时执行。代码清单 20-18 显示了我对 `ViewController` 类的 `motionEnded`\
  \ 方法所做的更改。\n\n**代码清单 20-18.** 在 ViewController.swift 文件中触发撤销命令\n\n```\n...\n\noverride\
  \ func motionEnded(motion: UIEventSubtype, withEvent event: UIEvent) {\n\nif (event.subtype\
  \ == UIEventSubtype.MotionShake) {\n\nprintln(\"Shake motion detected\");\n\nundoManager?.undo();\n\
  \n}\n\n}\n\n...\n```\n\n`NSUndoManager` 类定义的 `undo` 方法会触发由 `registerUndoWithTarget`\
  \ 方法创建的最新的撤销命令。要测试这些更改，请启动应用程序，更改其中一个产品的值，然后从 iOS 模拟器的硬件菜单中选择摇晃手势。你所做的更改将被撤销，如图\
  \ 20-3 所示。\n\n![A978-1-4842-0394-1_20_Fig3_HTML.jpg](img/A978-1-4842-0394-1_20_Fig3_HTML.jpg)\n\
  \n**图 20-3.** 撤销库存水平变更\n\n## 小结\n\n在本章中，我描述了命令模式，它用于封装方法调用，以便稍后或由另一个组件执行。我演示了如何使用命令模式来实现撤销操作，并创建了充当宏的调用序列。在下一章中，我将描述中介者模式，它用于管理对等对象组之间的通信。\n\
  \n\n\n"
- "# 21. 中介者模式\n\n中介者模式用于简化和优化对象组之间的通信。这是最不为人知的设计模式之一，但它解决了一个常见问题，并能显著简化应用程序的设计。表\
  \ 21-1 将中介者模式置于上下文中。\n\n**表 21-1.** 中介者模式上下文\n\n| 问题 | 答案 |\n| --- | --- |\n| 是什么？\
  \ | 中介者模式通过引入一个作为对象间通信代理的中介者对象，来简化对象之间的点对点通信。 |\n| 有哪些优点？ | 对象只需与中介者打交道，而无需单独跟踪并与其所有对等方通信。\
  \ |\n| 何时应使用此模式？ | 当处理一组需要彼此自由通信的对象时，请使用此模式。 |\n| 何时应避免此模式？ | 如果你有一个对象需要向一系列不同的对象发送通知，则不要使用此模式；应改用第\
  \ 22 章中描述的观察者模式。 |\n| 如何判断是否正确实现了该模式？ | 当每个对象只与中介者打交道，并且对其对等方没有直接认知时，中介者模式就正确实现了。\
  \ |\n| 有哪些常见陷阱？ | 中介者绝不能为对等方提供互相访问的权限，这一点非常重要，否则它们可能会变得相互依赖。 |\n| 是否有相关模式？ | 该模式与我在第\
  \ 22 章中描述的观察者模式密切相关，并且经常与之结合使用。 |\n\n## 准备示例项目\n\n在本章中，我创建了一个名为 `Mediator` 的 Xcode\
  \ 命令行工具项目，并向其中添加了一个名为 `Airplane.swift` 的文件，其内容如列表 21-1 所示。\n\n**列表 21-1.** `Airplane.swift`\
  \ 文件的内容\n\n```\nstruct Position {\n    var distanceFromRunway:Int;\n    var height:Int;\n\
  }\n\nfunc == (lhs:Airplane, rhs:Airplane) -> Bool {\n    return lhs.name == rhs.name;\n\
  }\n\nclass Airplane : Equatable {\n    var name:String;\n    var currentPosition:Position;\n\
  \    private var otherPlanes:[Airplane];\n\n    init(name:String, initialPos:Position)\
  \ {\n        self.name = name;\n        self.currentPosition = initialPos;\n   \
  \     self.otherPlanes = [Airplane]();\n    }\n\n    func addPlanesInArea(planes:Airplane...)\
  \ {\n        for plane in planes {\n            otherPlanes.append(plane);\n   \
  \     }\n    }\n\n    func otherPlaneDidLand(plane:Airplane) {\n        if let index\
  \ = find(otherPlanes, plane) {\n            otherPlanes.removeAtIndex(index);\n\
  \        }\n    }\n\n    func otherPlaneDidChangePosition(plane:Airplane) -> Bool\
  \ {\n        return plane.currentPosition.distanceFromRunway\n            == self.currentPosition.distanceFromRunway\n\
  \            && abs(plane.currentPosition.height\n                - self.currentPosition.height)\
  \ < 1000;\n    }\n\n    func changePosition(newPosition:Position) {\n        self.currentPosition\
  \ = newPosition;\n        for plane in otherPlanes {\n            if (plane.otherPlaneDidChangePosition(self))\
  \ {\n                println(\"\\(name): Too close! Abort!\");\n               \
  \ return;\n            }\n        }\n        println(\"\\(name): Position changed\"\
  );\n    }\n\n    func land() {\n        self.currentPosition = Position(distanceFromRunway:\
  \ 0, height: 0);\n        for plane in otherPlanes {\n            plane.otherPlaneDidLand(self);\n\
  \        }\n        println(\"\\(name): Landed\");\n    }\n}\n```\n\n`Airplane`\
  \ 类表示飞机接近机场时的状态，并使用 `Position` 结构体跟踪其当前位置。可能还有其他飞机正在接近机场，因此每个 `Airplane` 对象都会跟踪其周围的飞机，并确保其移动不会离另一架飞机太近。列表\
  \ 21-2 显示了我添加到 `main.swift` 文件中的语句，用于创建和操作 `Airplane` 类的一个实例。\n\n**列表 21-2.** `main.swift`\
  \ 文件的内容\n\n```\n// initial setup\nlet british = Airplane(name: \"BA706\", initialPos:\
  \ Position(distanceFromRunway: 11, height: 21000));\n\n// plane approaches airport\n\
  british.changePosition(Position(distanceFromRunway: 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway:\
  \ 2, height: 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height:\
  \ 1000));\n\n// plane lands\nbritish.land();\n```\n\n我创建了一个 `Airplane` 对象来表示英国航空公司的航班，然后多次调用\
  \ `changePosition` 方法来反映其向机场的进近过程，最后调用 `land` 方法。运行示例应用程序会产生以下输出：\n\n```\nBA706:\
  \ Position changed\nBA706: Position changed\nBA706: Position changed\nBA706: Landed\n\
  ```\n\n## 理解该模式要解决的问题\n\n当使用多个 `Airplane` 对象来表示机场进近时，示例应用程序的问题就变得明显了。列表 21-3 显示了我对\
  \ `main.swift` 文件所做的更改，以添加两个额外的 `Airplane` 对象。\n\n**列表 21-3.** 在 `main.swift` 文件中使用额外的\
  \ `Airplane` 对象\n\n```\n// initial setup\nlet british = Airplane(name: \"BA706\"\
  , initialPos:\n    Position(distanceFromRunway: 11, height: 21000));\n\n// new plane\
  \ arrives\nlet american = Airplane(name: \"AA101\", initialPos: Position(distanceFromRunway:\
  \ 12, height: 22000));\nbritish.addPlanesInArea(american);\namerican.addPlanesInArea(british);\n\
  \n// plane approaches airport\nbritish.changePosition(Position(distanceFromRunway:\
  \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2, height:\
  \ 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height: 1000));\n\
  \n// new plane arrives\nlet cathay = Airplane(name: \"CX200\", initialPos: Position(distanceFromRunway:\
  \ 13, height: 22000));\nbritish.addPlanesInArea(cathay);\namerican.addPlanesInArea(cathay);\n\
  cathay.addPlanesInArea(british, american);\n\n// plane lands\nbritish.land();\n\n\
  // plane moves too close\ncathay.changePosition(Position(distanceFromRunway: 12,\
  \ height: 22000));\n```\n\n运行应用程序会产生以下输出：\n\n```\nBA706: Position changed\nBA706:\
  \ Position changed\nBA706: Position changed\nBA706: Landed\nCX200: Too close! Abort!\n\
  ```\n\n这里只有三个 `Airplane` 对象，但 `main.swift` 文件中代码的复杂性却急剧增加，因为每个 `Airplane` 都必须跟踪其他所有\
  \ `Airplane`。考虑到在 `Airplane` 对象内部跟踪其他飞机所需的代码量，应用程序的很大一部分都被用于管理 `Airplane` 对象之间的通信。这导致了一组\
  \ `Airplane` 对象相互了解，并通过直接调用彼此的方法进行通信，如图 21-1 所示。\n\n![A978-1-4842-0394-1_21_Fig1_HTML.jpg](img/A978-1-4842-0394-1_21_Fig1_HTML.jpg)\n\
  \n**图 21-1.** 对等通信问题\n\n随着对象数量的增加，这个问题会变得更糟，因为每个 `Airplane` 对象都必须知晓所有其他实例，从而创建出日益复杂的依赖关系，在这种关系下很容易忘记建立新的连接，如图\
  \ 21-2 所示。\n\n![A978-1-4842-0394-1_21_Fig2_HTML.jpg](img/A978-1-4842-0394-1_21_Fig2_HTML.jpg)\n\
  \n**图 21-2.** 忘记建立新连接的影响\n\n这种遗漏非常讨厌，因为当某个功能依赖于缺失的连接时，它就会表现为一个问题。在本例中，除非澳洲航空的航班试图进入美国航空航班占据的空间，否则\
  \ `changePosition` 方法中的防撞代码将始终有效。如果发生这种情况，美国航空航班的位置将不会被检查，防撞措施就会失败。\n\n\n\n## 理解中介者模式\n\
  \n中介者模式通过引入一个中介者对象来解决这个问题，该对象用于简化两个或多个对等对象（通常称为同事）之间的通信。中介者负责跟踪对等对象并促进它们之间的通信，以打破对象间的依赖关系，避免因疏忽关系而引发的问题，并简化整个应用程序。图\
  \ 21-3 展示了中介者模式如何转换`Airplane`问题。\n\n![A978-1-4842-0394-1_21_Fig3_HTML.jpg](img/A978-1-4842-0394-1_21_Fig3_HTML.jpg)\n\
  \n图 21-3.\n\n中介者模式\n\n每个`Airplane`都与中介者建立关系，而不是与其对等对象建立关系。它将消息发送给中介者，中介者负责跟踪其他`Airplane`对象，并将消息转发给它们。中介者减少了应用程序中的依赖数量，并确保所有消息都能发送给所有对等对象，从而避免了连接遗漏的问题。\n\
  \n## 实现中介者模式\n\n中介者模式的核心是一对协议：一个定义对等对象提供的功能，另一个定义中介者的功能。你可以在清单 21-4 中看到我如何定义这些协议，该清单显示了我添加到示例项目中的`Mediator.swift`文件的内容。\n\
  \n清单 21-4. Mediator.swift 文件的内容\n\n```\nprotocol Peer {\n    var name:String {get};\n\
  \    func otherPlaneDidChangePosition(position:Position) -> Bool;\n}\nprotocol Mediator\
  \ {\n    func registerPeer(peer:Peer);\n    func unregisterPeer(peer:Peer);\n  \
  \  func changePosition(peer:Peer, pos:Position) -> Bool;\n}\n```\n\n`Peer`协议定义了一个用于标识的`name`属性，以及一个`otherPlaneDidChangePosition`方法，该方法被调用以检查另一架飞机移动是否安全。`Mediator`协议定义了`registerPeer`和`unregisterPeer`方法，用于在其中介的对象集合中添加和移除对象，并定义了一个`changePosition`方法，该方法将调用其中介的所有对等对象的`otherPlaneDidChangePosition`方法。\n\
  \n### 定义中介者类\n\n下一步是定义一个符合`Mediator`协议的类，该类可用于中介一组`Peer`对象之间的通信。清单 21-5 显示了我定义的类。\n\
  \n清单 21-5. 在 Mediator.swift 文件中定义中介者实现\n\n```\nprotocol Peer {\n    var name:String\
  \ {get};\n    func otherPlaneDidChangePosition(position:Position) -> Bool;\n}\n\
  protocol Mediator {\n    func registerPeer(peer:Peer);\n    func unregisterPeer(peer:Peer);\n\
  \    func changePosition(peer:Peer, pos:Position) -> Bool;\n}\nclass AirplaneMediator\
  \ : Mediator {\n    private var peers:[String:Peer];\n    init() {\n        peers\
  \ = [String:Peer]();\n    }\n    func registerPeer(peer: Peer) {\n        self.peers[peer.name]\
  \ = peer;\n    }\n    func unregisterPeer(peer: Peer) {\n        self.peers.removeValueForKey(peer.name);\n\
  \    }\n    func changePosition(peer:Peer, pos:Position) -> Bool {\n        for\
  \ storedPeer in peers.values {\n            if (peer.name != storedPeer.name\n \
  \               && storedPeer.otherPlaneDidChangePosition(pos)) {\n            \
  \    return true;\n            }\n        }\n        return false;\n    }\n}\n```\n\
  \n`AirplaneMediator`类的实现很简单。我使用字典存储`Peer`对象的集合，这简化了`changePosition`方法的实现，该方法必须确保方法的调用者不会因为自身位置变化而被调用其`otherPlaneDidChangePosition`方法。\n\
  \n### 符合 Peer 协议\n\n下一步是更新`Airplane`类，使其符合`Peer`协议，并且不再管理其对等对象的列表。清单 21-6 显示了我所做的更改。\n\
  \n清单 21-6. 在 Airplane.swift 文件中符合 Peer 协议\n\n```\nstruct Position {\n    var distanceFromRunway:Int;\n\
  \    var height:Int;\n}\nclass Airplane : Peer {\n    var name:String;\n    var\
  \ currentPosition:Position;\n    var mediator:Mediator;\n    init(name:String, initialPos:Position,\
  \ mediator: Mediator) {\n        self.name = name;\n        self.currentPosition\
  \ = initialPos;\n        self.mediator = mediator;\n        mediator.registerPeer(self);\n\
  \    }\n    func otherPlaneDidChangePosition(position:Position) -> Bool {\n    \
  \    return position.distanceFromRunway\n            == self.currentPosition.distanceFromRunway\n\
  \            && abs(position.height - self.currentPosition.height) < 1000;\n   \
  \ }\n    func changePosition(newPosition:Position) {\n        self.currentPosition\
  \ = newPosition;\n        if (mediator.changePosition(self, pos: self.currentPosition)\
  \ == true) {\n            println(\"\\(name): Too close! Abort!\");\n          \
  \  return;\n        }\n        println(\"\\(name): Position changed\");\n    }\n\
  \    func land() {\n        self.currentPosition = Position(distanceFromRunway:\
  \ 0, height: 0);\n        mediator.unregisterPeer(self);\n        println(\"\\(name):\
  \ Landed\");\n    }\n}\n```\n\n总体效果是让类专注于自身状态，并依赖中介者来管理其与其他对等对象的关系。清单 21-7 显示了我如何更新`main.swift`文件中的代码以使用中介者。\n\
  \n清单 21-7. 在 main.swift 文件中使用中介者\n\n```\nlet mediator:Mediator = AirplaneMediator();\n\
  // initial setup\nlet british = Airplane(name: \"BA706\", initialPos:\n    Position(distanceFromRunway:\
  \ 11, height: 21000), mediator:mediator);\n// new plane arrives\nlet american =\
  \ Airplane(name: \"AA101\", initialPos: Position(distanceFromRunway: 12, height:\
  \ 22000), mediator:mediator);\n// plane approaches airport\nbritish.changePosition(Position(distanceFromRunway:\
  \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2, height:\
  \ 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height: 1000));\n\
  // new plane arrives\nlet cathay = Airplane(name: \"CX200\", initialPos: Position(distanceFromRunway:\
  \ 13, height: 22000), mediator:mediator);\n// plane lands\nbritish.land();\n// plane\
  \ moves too close\ncathay.changePosition(Position(distanceFromRunway: 12, height:\
  \ 22000));\n```\n\n创建另一个`Airplane`实例时，我不再需要通知每一个`Airplane`，因为中介者会自动为我跟踪，并确保我不会忘记在应用中介者之前创建所有必需的连接。运行该应用程序会生成以下输出：\n\
  \n```\nBA706: Position changed\nBA706: Position changed\nBA706: Position changed\n\
  BA706: Landed\nCX200: Too close! Abort!\n```\n\n### 实现并发保护\n\n与我在这本书中描述的许多模式一样，实现中介者模式意味着需要考虑对等对象是否需要并发地相互通信，或者是否需要同时注册或注销对等对象。并非所有应用程序都会出现这种情况，但如果可能存在并发使用的情况，则需要并发保护，如下面几节所述。\n\
  \n\n\n#### 在调解器中实现并发保护\n\n调解器中的并发保护确保对同伴集合的操作不会导致数据损坏，并且调解器方法返回的结果保持一致。代码清单 21-8\
  \ 展示了如何使用 Grand Central Dispatch (GCD) 来保护调解器类。\n\n**代码清单 21-8. 在 Mediator.swift\
  \ 文件中实现并发保护**\n\n```\nimport Foundation;\n\nprotocol Peer {\n\nvar name:String {get};\n\
  \nfunc otherPlaneDidChangePosition(position:Position) -> Bool;\n\n}\n\nprotocol\
  \ Mediator {\n\nfunc registerPeer(peer:Peer);\n\nfunc unregisterPeer(peer:Peer);\n\
  \nfunc changePosition(peer:Peer, pos:Position) -> Bool;\n\n}\n\nclass AirplaneMediator\
  \ : Mediator {\n\nprivate var peers:[String:Peer];\n\nprivate let queue = dispatch_queue_create(\"\
  dictQ\", DISPATCH_QUEUE_CONCURRENT);\n\ninit() {\n\npeers = [String:Peer]();\n\n\
  }\n\nfunc registerPeer(peer: Peer) {\n\ndispatch_barrier_sync(self.queue, { () in\n\
  \nself.peers[peer.name] = peer;\n\n});\n\n}\n\nfunc unregisterPeer(peer: Peer) {\n\
  \ndispatch_barrier_sync(self.queue, { () in\n\nlet removed = self.peers.removeValueForKey(peer.name);\n\
  \n});\n\n}\n\nfunc changePosition(peer:Peer, pos:Position) -> Bool {\n\nvar result\
  \ = false;\n\ndispatch_sync(self.queue, { () in\n\nfor storedPeer in self.peers.values\
  \ {\n\nif (peer.name != storedPeer.name\n\n&& storedPeer.otherPlaneDidChangePosition(pos))\
  \ {\n\nresult = true;\n\n}\n\n}\n\n});\n\nreturn result;\n\n}\n\n}\n```\n\n我希望在不对\
  \ `peers` 字典进行修改时，允许多个操作同时读取其中的数据。为此，我使用了一个并发 GCD 队列：对于读取操作，调用 `dispatch_sync` 函数；在\
  \ `registerPeer` 和 `unregisterPeer` 方法中，则调用 `dispatch_barrier_sync` 函数，以获得对字典进行修改的独占访问权限。\n\
  \n> **提示**  \n> 请注意，在 `unregisterPeer` 方法的实现中，我将 `removeValueForKey` 方法的调用结果赋值给了一个常量。Swift\
  \ 会试图提供帮助，它将字典方法调用的返回结果视为闭包的返回结果——但这是一个问题，因为用作 GCD 块的闭包不能返回结果。将结果赋值给一个常量可以捕获该值，并防止它被当作闭包的返回结果。\n\
  \n#### 在同伴中实现并发保护\n\n我为调解器添加的并发保护并未对同伴对象的实现作出任何假设，并允许多个同时调用 `otherPlanDidChangePosition`\
  \ 方法。这意味着我需要修改 `Airplane` 类，以保护其内部状态数据的完整性，如代码清单 21-9 所示。\n\n**代码清单 21-9. 在 Airplane.swift\
  \ 文件中添加并发保护**\n\n```\nimport Foundation\n\nstruct Position {\n\nvar distanceFromRunway:Int;\n\
  \nvar height:Int;\n\n}\n\nclass Airplane : Peer {\n\nvar name:String;\n\nvar currentPosition:Position;\n\
  \nvar mediator:Mediator;\n\nlet queue = dispatch_queue_create(\"posQ\", DISPATCH_QUEUE_CONCURRENT);\n\
  \ninit(name:String, initialPos:Position, mediator: Mediator) {\n\nself.name = name;\n\
  \nself.currentPosition = initialPos;\n\nself.mediator = mediator;\n\nmediator.registerPeer(self);\n\
  \n}\n\nfunc otherPlaneDidChangePosition(position:Position) -> Bool {\n\nvar result\
  \ = false;\n\ndispatch_sync(self.queue, {() in\n\nresult = position.distanceFromRunway\n\
  \n== self.currentPosition.distanceFromRunway\n\n&& abs(position.height - self.currentPosition.height)\
  \ < 1000;\n\n});\n\nreturn result;\n\n}\n\nfunc changePosition(newPosition:Position)\
  \ {\n\ndispatch_barrier_sync(self.queue, {() in\n\nself.currentPosition = newPosition;\n\
  \nif (self.mediator.changePosition(self, pos:\n\nself.currentPosition) == true)\
  \ {\n\nprintln(\"\\(self.name): Too close! Abort!\");\n\nreturn;\n\n}\n\nprintln(\"\
  \\(self.name): Position changed\");\n\n});\n\n}\n\nfunc land() {\n\ndispatch_barrier_sync(self.queue,\
  \ { () in\n\nself.currentPosition = Position(distanceFromRunway: 0, height: 0);\n\
  \nself.mediator.unregisterPeer(self);\n\nprintln(\"\\(self.name): Landed\");\n\n\
  });\n\n}\n\n}\n```\n\n我为该类添加的并发保护允许多个同时调用 `otherPlaneDidChangePosition` 方法，但对 `changePosition`\
  \ 和 `land` 方法的调用则使用屏障，以确保它们拥有进行修改的独占访问权限。\n\n## 调解器模式的变体\n\n调解器模式的标准实现侧重于管理与同伴的关系，但常见的变体扩展了调解器的角色，如下所述。\n\
  \n### 将更多逻辑放入调解器\n\n第一种变体是将逻辑添加到调解器实现类中，以更积极地管理同伴之间的消息流，或提供额外的功能。为了演示这种变体，我将在调解器的\
  \ `changePosition` 方法中添加一些基本逻辑，用于过滤掉那些比要改变位置的飞机距离机场更远的同伴对象（前提是所有飞机都试图降落并朝同一方向移动）。第一步是扩展\
  \ `Peer` 协议所暴露的信息，使调解器能够访问其位置数据，如代码清单 21-10 所示。\n\n**代码清单 21-10. 在 Mediator.swift\
  \ 文件中暴露额外信息**\n\n```\n...\n\nprotocol Peer {\n\nvar name:String {get};\n\nvar currentPosition:Position\
  \ {get};\n\nfunc otherPlaneDidChangePosition(position:Position) -> Bool;\n\n}\n\n\
  ...\n```\n\n暴露 `currentPosition` 属性使得调解器可以更有选择性地调用同伴的方法，如代码清单 21-11 所示。\n\n**代码清单\
  \ 21-11. 在 Mediator.swift 文件中选择性定位同伴**\n\n```\n...\n\nfunc changePosition(peer:Peer,\
  \ pos:Position) -> Bool {\n\nvar result = false;\n\ndispatch_sync(self.queue, {\
  \ () in\n\nlet closerPeers = self.peers.values.filter({p in\n\nreturn p.currentPosition.distanceFromRunway\n\
  \n<= pos.distanceFromRunway;\n\n});\n\nfor storedPeer in closerPeers {\n\nif (peer.name\
  \ != storedPeer.name\n\n&& storedPeer.otherPlaneDidChangePosition(pos)) {\n\nresult\
  \ = true;\n\n}\n\n}\n\n});\n\nreturn result;\n\n}\n\n...\n```\n\n我使用 `filter` 方法剔除那些距离较远的飞机，然后对剩余的对象调用\
  \ `otherPlaneDidChangePosition` 方法。运行应用程序会产生以下输出，与之前的示例相同：\n\n```\nBA706: Position\
  \ changed\nBA706: Position changed\nBA706: Position changed\nBA706: Landed\nCX200:\
  \ Too close! Abort!\n```\n\n这种变体的好处是减少了对同伴对象的调用次数，从而希望加快飞机改变位置的过程。这种方法的缺点在于，我现在将一种行为固化到了调解器中，如果应用程序扩展到包含从机场起飞的飞机（而不仅仅是降落的飞机），则需要更改该行为。\n\
  \n### 泛化调解器-同伴关系\n\n调解器模式的标准实现意味着调解器需要了解同伴定义的方法，以便在需要时调用这些方法。这使得将调解器类重用于不同的同伴集变得困难。\n\
  \n如果你预计在应用程序中需要多个调解器，一种常见的变体是泛化模式的实现，创建一个不要求了解其使用同伴的任何信息的调解器类。解决这个问题有两种主要方法，不过，如下所述，它们都有各自的局限性。\n\
  \n\n\n## 用命令模式泛化中介者\n\n一种方法是将中介者模式与命令模式结合，让中介者扮演我在第 20 章中描述的调用者角色。代码清单 21-12 展示了如何在`CommandMediator.swift`文件中定义一个泛化的基于命令的**中介者**类，我已将其添加到示例项目中。\n\
  \n**代码清单 21-12. 在`CommandMediator.swift`文件中定义泛化中介者类**\n\n```swift\nprotocol CommandPeer\
  \ {\n    var name:String { get };\n}\n\nclass Command {\n    let function:CommandPeer\
  \ -> Any;\n    init(function:CommandPeer -> Any) {\n        self.function = function;\n\
  \    }\n    func execute(peer:CommandPeer) -> Any {\n        return function(peer);\n\
  \    }\n}\n\nclass CommandMediator {\n    private var peers = [String:CommandPeer]();\n\
  \    func registerPeer(peer:CommandPeer) {\n        peers[peer.name] = peer;\n \
  \   }\n    func unregisterPeer(peer:CommandPeer) {\n        peers.removeValueForKey(peer.name);\n\
  \    }\n    func dispatchCommand(caller:CommandPeer, command:Command) -> [Any] {\n\
  \        var results = [Any]();\n        for peer in peers.values {\n          \
  \  if (peer.name != caller.name) {\n                results.append(command.execute(peer));\n\
  \            }\n        }\n        return results;\n    }\n}\n```\n\n`Peer`必须遵循`CommandPeer`协议，这既是为了辅助`Command`类的实现，也是为了能够使用`name`属性防止中介者在创建它的对象上执行命令。\n\
  \n> **注意**\n> \n> 为简单起见，我实现的`CommandMediator`类没有包含并发保护。使用命令模式并不能保护`peers`集合，如果可能发生并发使用，你应该对所有中介者应用保护。详情请参阅“实现并发保护”一节。\n\
  \n`Command`类表示每个`Peer`将被要求执行的命令。如你在第 20 章中所见，有不同方式来安排命令的定义和执行。我选择的这种方式意味着**中介者**将调用该命令，将每个`Peer`传递给`Command`对象的`execute`方法。我这样做是因为我想捕获执行命令的结果值，并将这些结果的数组呈现给调用方`Peer`。\n\
  \n`CommandMediator`类是我在标准模式实现中所用中介者的变体，它提供了一个`dispatchCommand`方法，该方法接受一个`Command`对象，并将每个`CommandPeer`传递给它对应的函数。在每个`Peer`上执行命令的结果被收集到一个数组中，并作为结果返回给调用方`Peer`。\n\
  \n代码清单 21-13 展示了如何更新`Airplane`类以使用基于命令的中介者。\n\n**代码清单 21-13. 在`Airplane.swift`文件中使用`CommandMediator`**\n\
  \n```swift\nimport Foundation\n\nstruct Position {\n    var distanceFromRunway:Int;\n\
  \    var height:Int;\n}\n\nclass Airplane : CommandPeer {\n    var name:String;\n\
  \    var currentPosition:Position;\n    var mediator:CommandMediator;\n    let queue\
  \ = dispatch_queue_create(\"posQ\", DISPATCH_QUEUE_CONCURRENT);\n\n    init(name:String,\
  \ initialPos:Position, mediator: CommandMediator) {\n        self.name = name;\n\
  \        self.currentPosition = initialPos;\n        self.mediator = mediator;\n\
  \        mediator.registerPeer(self);\n    }\n\n    func otherPlaneDidChangePosition(position:Position)\
  \ -> Bool {\n        var result = false;\n        dispatch_sync(self.queue, {()\
  \ in\n            result = position.distanceFromRunway\n                == self.currentPosition.distanceFromRunway\n\
  \                && abs(position.height - self.currentPosition.height) < 1000;\n\
  \        });\n        return result;\n    }\n\n    func changePosition(newPosition:Position)\
  \ {\n        dispatch_barrier_sync(self.queue, {() in\n            self.currentPosition\
  \ = newPosition;\n            let c = Command(function: {peer in\n             \
  \   if let plane = peer as? Airplane {\n                    return plane.otherPlaneDidChangePosition\
  \ (self.currentPosition);\n                } else {\n                    fatalError(\"\
  Type mismatch\");\n                }\n            });\n            let allResults\
  \ = self.mediator.dispatchCommand(self, command: c);\n            for result in\
  \ allResults {\n                if result as? Bool == true {\n                 \
  \   println(\"\\(self.name): Too close! Abort!\");\n                    return;\n\
  \                }\n            }\n            println(\"\\(self.name): Position\
  \ changed\");\n        });\n    }\n\n    func land() {\n        dispatch_barrier_sync(self.queue,\
  \ { () in\n            self.currentPosition = Position(distanceFromRunway: 0, height:\
  \ 0);\n            self.mediator.unregisterPeer(self);\n            println(\"\\\
  (self.name): Landed\");\n        });\n    }\n}\n```\n\n这种方法创建了一个**中介者**，它可以处理任何实例化自遵循`CommandPeer`协议的类的对象组，但需要谨慎，因为`Peer`创建的`Command`对象必须假设命令将对其执行的`Peer`类型。由于任何`Peer`都可以发送命令，这意味着所有`Peer`必须派生自同一个基类，并且你不能使用`CommandMediator`类来调解不同类型的对象，即使它们都是实例化自遵循`CommandPeer`协议的类。\n\
  \n`Airplane`类中`changePosition`方法的实现创建了一个命令，该命令将`Peer`对象转换为`Airplane`类型并调用`otherPlaneDidChangePosition`方法。如果`Peer`无法转换为`Airplane`，我会调用全局的`fatalError`函数，因为在这种情况下中介者的行为是未定义的。\n\
  \n最后的更改在`main.swift`文件中，我必须创建一个`CommandMediator`类的实例，如代码清单 21-14 所示。\n\n**代码清单 21-14. 在`main.swift`文件中使用`CommandMediator`类**\n\
  \n```swift\nlet mediator = CommandMediator();\n\n// initial setup\nlet british =\
  \ Airplane(name: \"BA706\", initialPos:\n    Position(distanceFromRunway: 11, height:\
  \ 21000), mediator:mediator);\n\n// new plane arrives\nlet american = Airplane(name:\
  \ \"AA101\", initialPos:\n    Position(distanceFromRunway: 12, height: 22000), mediator:mediator);\n\
  \n// plane approaches airport\nbritish.changePosition(Position(distanceFromRunway:\
  \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2, height:\
  \ 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height: 1000));\n\
  \n// new plane arrives\nlet cathay = Airplane(name: \"CX200\", initialPos:\n   \
  \ Position(distanceFromRunway: 13, height: 22000), mediator:mediator);\n\n// plane\
  \ lands\nbritish.land();\n\n// plane moves too close\ncathay.changePosition(Position(distanceFromRunway:\
  \ 12, height: 22000));\n```\n\n你可以运行应用程序以测试更改是否影响输出，输出如下：\n\n```\nBA706: Position\
  \ changed\nBA706: Position changed\nBA706: Position changed\nBA706: Landed\nCX200:\
  \ Too close! Abort!\n```\n\n\n\n### 使用消息泛化中介者\n\n另一种方法是对等对象中的单个方法，并提供足够的信息，让对等对象能确定需要何种响应。这避免了对等对象类型的假设，允许将不同类型的对等对象与同一个中介者配合使用，但这意味着所有对等对象都需要对将要发送的消息范围有相同的理解，这本身也会带来问题。清单\
  \ 21-15 展示了如何在一个新文件 `MessageMediator.swift`（已添加到示例项目）中定义基于消息的中介者所需的协议和实现类。\n\n**清单\
  \ 21-15.** `MessageMediator.swift` 文件的内容\n\n```\nprotocol MessagePeer {\n    var\
  \ name:String { get };\n    func handleMessage(messageType:String, data:Any?) ->\
  \ Any?;\n}\n\nclass MessageMediator {\n    private var peers = [String:MessagePeer]();\n\
  \    \n    func registerPeer(peer:MessagePeer) {\n        peers[peer.name] = peer;\n\
  \    }\n    \n    func unregisterPeer(peer:MessagePeer) {\n        peers.removeValueForKey(peer.name);\n\
  \    }\n    \n    func sendMessage(caller:MessagePeer, messageType:String, data:Any)\
  \ -> [Any?] {\n        var results = [Any?]();\n        for peer in peers.values\
  \ {\n            if (peer.name != caller.name) {\n                results.append(peer.handleMessage(messageType,\
  \ data: data));\n            }\n        }\n        return results;\n    }\n}\n```\n\
  \n`MessagePeer` 协议定义了一个 `name` 属性，以便中介者能够识别消息的发送者，并定义了一个 `handleMessage` 方法，该方法接收一个描述消息类型的字符串和一个可选的\
  \ `Any` 类型数据值，用于向对等对象提供消息相关的数据。`MessageMediator` 类负责跟踪对等对象，还定义了一个 `sendMessage`\
  \ 方法，对等对象可以调用此方法向其他对等对象发送消息。中介者收集来自各对等对象的结果集，并以数组形式返回给调用者。清单 21-16 展示了如何修改 `Airplane`\
  \ 类的实现，以使用基于消息的中介者。\n\n**清单 21-16.** 在 `Airplane.swift` 文件中使用基于消息的中介者\n\n```\nimport\
  \ Foundation\n\nstruct Position {\n    var distanceFromRunway:Int;\n    var height:Int;\n\
  }\n\nclass Airplane : MessagePeer {\n    var name:String;\n    var currentPosition:Position;\n\
  \    var mediator:MessageMediator;\n    let queue = dispatch_queue_create(\"posQ\"\
  , DISPATCH_QUEUE_CONCURRENT);\n    \n    init(name:String, initialPos:Position,\
  \ mediator: MessageMediator) {\n        self.name = name;\n        self.currentPosition\
  \ = initialPos;\n        self.mediator = mediator;\n        mediator.registerPeer(self);\n\
  \    }\n    \n    func handleMessage(messageType: String, data: Any?) -> Any? {\n\
  \        var result:Any?;\n        switch (messageType) {\n            case \"changePos\"\
  :\n            if let pos = data as? Position {\n                result = otherPlaneDidChangePosition(pos);\n\
  \            }\n            default:\n            fatalError(\"Unknown message type\"\
  );\n        }\n        return result;\n    }\n    \n    func otherPlaneDidChangePosition(position:Position)\
  \ -> Bool {\n        var result = false;\n        dispatch_sync(self.queue, {()\
  \ in\n            result = position.distanceFromRunway\n            == self.currentPosition.distanceFromRunway\n\
  \            && abs(position.height - self.currentPosition.height) < 1000;\n   \
  \     });\n        return result;\n    }\n    \n    func changePosition(newPosition:Position)\
  \ {\n        dispatch_barrier_sync(self.queue, {() in\n            self.currentPosition\
  \ = newPosition;\n            let allResults = self.mediator.sendMessage(self,\n\
  \                messageType: \"changePos\", data: newPosition);\n            for\
  \ result in allResults {\n                if result as? Bool == true {\n       \
  \             println(\"\\(self.name): Too close! Abort!\");\n                 \
  \   return;\n                }\n            }\n            println(\"\\(self.name):\
  \ Position changed\");\n        });\n    }\n    \n    func land() {\n        dispatch_barrier_sync(self.queue,\
  \ { () in\n            self.currentPosition = Position(distanceFromRunway: 0, height:\
  \ 0);\n            self.mediator.unregisterPeer(self);\n            println(\"\\\
  (self.name): Landed\");\n        });\n    }\n}\n```\n\n这种方法的优势在于 `Airplane` 类无需对其他对等对象做出任何假设——但代价是需要确保所有对等对象都了解同一套消息类型，并能以一致且有用的方式对消息做出响应。在复杂应用中，这比听起来要困难得多，而且随着应用变得复杂，很容易出现多个对等类型的消息处理方式相互偏离的情况。为了完成这个实现，我需要在\
  \ `main.swift` 文件中使用 `MessageMediator` 类，如清单 21-17 所示。\n\n**清单 21-17.** 在 `main.swift`\
  \ 文件中使用 `MessageMediator` 类\n\n```\nlet mediator = MessageMediator();\n\n// 初始设置\n\
  let british = Airplane(name: \"BA706\", initialPos:\n    Position(distanceFromRunway:\
  \ 11, height: 21000), mediator:mediator);\n\n// 新飞机到达\nlet american = Airplane(name:\
  \ \"AA101\", initialPos:\n    Position(distanceFromRunway: 12, height: 22000), mediator:mediator);\n\
  \n// 飞机接近机场\nbritish.changePosition(Position(distanceFromRunway: 8, height: 10000));\n\
  british.changePosition(Position(distanceFromRunway: 2, height: 5000));\nbritish.changePosition(Position(distanceFromRunway:\
  \ 1, height: 1000));\n\n// 新飞机到达\nlet cathay = Airplane(name: \"CX200\", initialPos:\n\
  \    Position(distanceFromRunway: 13, height: 22000), mediator:mediator);\n\n//\
  \ 飞机着陆\nbritish.land();\n\n// 飞机移动得过近\ncathay.changePosition(Position(distanceFromRunway:\
  \ 12, height: 22000));\n```\n\n## 理解中介者模式的陷阱\n\n最重要的陷阱是避免向一个对等对象暴露另一个对等对象的细节。中介者应保持其对等对象集合的私有性，除通过中介者间接交互外，不允许对等对象定位或依赖彼此。例如，如果你正在实现返回结果的方法，则必须确保对等对象不会将\
  \ `self` 作为结果返回，或者如果它们这样做了，中介者不会将该引用传回给调用方对等对象。程序员喜欢走捷径，允许直接的对等对象间联系，会让懒惰的程序员绕过中介者，从而破坏模式的实现。\n\
  \n### 单一协议陷阱\n\n一个常见的陷阱是让对等对象和中介者都遵循同一个通用协议，这样对等对象就不会意识到使用了中介者，而误以为它们是在与一个单一的对等对象通信。这看似是个巧妙的主意，但最终会导致代码混乱且难以理解，因为中介者提供的方法与对等对象必须暴露的方法之间，很少存在一对一的映射关系。我的建议是为对等对象和中介者使用独立的协议，这可以确保实现类不必实现虚假的方法，也不必在方法之间创建扭曲的映射关系。\n\
  \n\n\n## Cocoa 中中介者模式的示例\n\n`Foundation` 框架包含一个名为 `NSNotificationCenter` 的现成中介者，可用于在对象之间发送通知。`NSNotificationCenter`\
  \ 类是一个基于消息的中介者；该类允许对等体指定它们想要接收的消息类型，并限制消息来源的对等体——但不支持接收来自对等体的响应。消息仅单向流动。我创建了一个名为\
  \ `Notfications.playground` 的 Xcode playground，用于演示 `NSNotificationCenter` 类的使用，如代码清单\
  \ 21-18 所示。\n\n**代码清单 21-18.** `Notifications.playground` 文件的内容\n\n```\nimport Foundation;\n\
  \nlet notifier = NSNotificationCenter.defaultCenter();\n\n@objc class NotificationPeer\
  \ {\n    let name:String;\n    init(name:String) {\n        self.name = name;\n\
  \        NSNotificationCenter.defaultCenter().addObserver(self,\n            selector:\
  \ \"receiveMessage:\", name: \"message\", object: nil);\n    }\n    func sendMessage(message:String)\
  \ {\n        NSNotificationCenter.defaultCenter().postNotificationName(\"message\"\
  ,\n            object: message);\n    }\n    func receiveMessage(notification:NSNotification)\
  \ {\n        println(\"Peer \\(name) received message: \\(notification.object)\"\
  );\n    }\n}\n\nlet p1 = NotificationPeer(name: \"peer1\");\nlet p2 = NotificationPeer(name:\
  \ \"peer2\");\nlet p3 = NotificationPeer(name: \"peer3\");\nlet p4 = NotificationPeer(name:\
  \ \"peer4\");\np3.sendMessage(\"Hello!\");\n```\n\n> **注意：** `NSNotificationCenter`\
  \ 类也实现了观察者模式，我将在第 22 章中对此进行描述。\n\n通过类的 `defaultCenter` 属性可以获取 `NSNotificationCenter`\
  \ 类的一个实例，该实例既用于注册对等体以接收消息，也用于发送消息。注册通过 `addObserver` 方法执行，如下所示：\n\n```\nNSNotificationCenter.defaultCenter().addObserver(self,\n\
  \    selector: \"receiveMessage:\", name: \"message\", object: nil);\n```\n\n第一个参数是消息将发送到的对象，这里我指定了当前对象。`selector`\
  \ 参数指定消息将发送到的方法，以 Objective-C 风格的 selector 形式表示，这意味着方法名后应跟一个冒号字符。`name` 参数用于仅选择使用特定标签发送的消息，而\
  \ `object` 参数可用于将消息限制为仅来自特定来源的消息。我将 `name` 设置为 `message`，并将 `object` 参数设置为 `nil`，表示我想接收所有标签为\
  \ `message` 的消息，无论标签和来源如何。\n\n> **提示：** 由 `selector` 参数指定的方法必须使用 `@objc` 属性进行注解，或包含在使用\
  \ `@objc` 注解的类中。\n\n消息通过 `postNotificationName` 方法发送，指定一个标签和一个将发送给对等体的对象，如下所示：\n\
  \n```\nNSNotificationCenter.defaultCenter()\n    .postNotificationName(\"message\"\
  , object: message);\n```\n\n在 playground 中，我定义了一个名为 `NotificationPeer` 的类，该类调用 `addObserver`\
  \ 方法注册消息，以便将消息发送到 `receiveMessage` 方法，并使用 `sendMessage` 方法通过 `NSNotificationCenter`\
  \ 发送消息，并使用标签 `message`。\n\n当你注册接收消息时，由 `selector` 参数指定的方法必须接受一个 `NSNotification`\
  \ 类型的单一参数，该类型用于表示消息，并定义了表 21-2 中所示的属性。\n\n**表 21-2.** `NSNotification` 类定义的属性\n\n\
  | 名称 | 描述 |\n|------|------|\n| `name` | 用于发送消息的标签，示例中设置为 `message` |\n| `object`\
  \ | 与消息关联的可选数据对象，示例中设置为传递给 `sendMessage` 方法的 `message` 参数 |\n| `userInfo` | 一个可选的数据值，以字典形式表达，可以通过\
  \ `postNotificationName` 方法的重载版本发送，未在示例中使用 |\n\n我在 playground 中创建了四个 `NotificationPeer`\
  \ 对象，然后对其中的一个调用 `sendMessage` 方法，这会在控制台中产生以下输出：\n\n```\nPeer peer1 received message:\
  \ Optional(Hello!)\nPeer peer2 received message: Optional(Hello!)\nPeer peer3 received\
  \ message: Optional(Hello!)\nPeer peer4 received message: Optional(Hello!)\n```\n\
  \n`NSNotificationCenter` 可以是一个有用的类，但我发现在许多项目中无法从对等体获取响应是一个限制，因此我通常会实现自己的替代方案，正如本章“中介者模式的变体”一节中所描述的那样。\n\
  \n## 将模式应用于 SportsStore 应用\n\n对于本章，没有现成的示例可以单独将中介者模式应用于 SportsStore。相反，在第 22 章中，我将演示如何将中介者模式和命令模式结合使用，这是一种常见的组合。\n\
  \n## 总结\n\n在本章中，我描述了中介者模式，并解释了如何使用它来处理对等体对象之间的通信，以降低应用程序的复杂性并确保没有对等体对象被遗漏。在下一章中，我将描述观察者模式，该模式用于当一个对象需要在发生有趣的事情时通知其他对象。\n\
  \n"
- "# 22. 观察者模式\n\n观察者模式用于管理一个对象对另一个对象的变化表示兴趣并接收通知的过程。观察者模式允许庞大而复杂的对象组彼此协作，且它们之间的依赖关系很少，并且应用如此广泛，以至于如果你曾使用现代\
  \ UI 组件框架开发过应用程序，很可能已经遇到过它。表 22-1 将观察者模式置于上下文中。\n\n**表 22-1.** 将观察者模式置于上下文\n\n|\
  \ 问题 | 答案 |\n|----------|--------|\n| 它是什么？ | 观察者模式允许一个对象注册以接收关于另一个对象变化的通知，而无需依赖于该对象的实现。\
  \ |\n| 有什么好处？ | 该模式通过允许提供通知的对象以统一方式执行此操作而简化了应用程序设计，无需了解接收方如何处理和执行这些通知。 |\n| 何时应使用此模式？\
  \ | 每当一个对象需要接收关于另一个对象变化的通知，但通知的发送方不依赖于接收方来完成其工作时，使用此模式。 |\n| 何时应避免使用此模式？ | 除非通知的发送方在功能上独立于接收方，使得接收方可以从应用程序中移除而不妨碍发送方执行其工作，否则不要使用此模式。\
  \ |\n| 如何判断是否正确实现了该模式？ | 当一个对象可以接收通知而无需与发送通知的对象紧密耦合时，观察者模式就正确实现了。 |\n| 是否有常见的陷阱？\
  \ | 该模式最大的陷阱是允许发送和接收通知的对象变得相互依赖。 |\n| 是否有相关模式？ | 没有。 |\n\n\n\n## 准备示例项目\n\n本章我创建了一个名为\
  \ `Observer` 的 Xcode OS X 命令行工具项目。我在项目中添加了一个名为 `SystemComponents.swift` 的文件，并利用它定义了清单\
  \ 22-1 中所示的类。\n\n**清单 22-1. `SystemComponents.swift` 文件的内容**\n\n```\nclass ActivityLog\
  \ {\n    func logActivity(activity:String) {\n        println(\"Log: \\(activity)\"\
  );\n    }\n}\n\nclass FileCache {\n    func loadFiles(user:String) {\n        println(\"\
  Load files for \\(user)\");\n    }\n}\n\nclass AttackMonitor {\n    var monitorSuspiciousActivity:\
  \ Bool = false {\n        didSet {\n            println(\"Monitoring for attack:\
  \ \\(monitorSuspiciousActivity)\");\n        }\n    }\n}\n```\n\n我定义的这三个类代表了通用的应用组件。为了演示模式，我无需详细实现这些组件，因此它们都向调试控制台写入消息以表明被调用。`ActivityLog`\
  \ 代表一个日志系统，用于接收系统事件的详细信息；`FileCache` 类代表一个缓存，用于加载属于特定用户的文件；`AttackMonitor` 类则代表一个安全服务，用于在发生可疑事件时监控系统行为。清单\
  \ 22-2 显示了 `Authentication.swift` 文件的内容，我在此文件中定义了一个使用这些系统组件的类。\n\n**清单 22-2. `Authentication.swift`\
  \ 文件的内容**\n\n```\nclass AuthenticationManager {\n    private let log = ActivityLog();\n\
  \    private let cache = FileCache();\n    private let monitor = AttackMonitor();\n\
  \n    func authenticate(user:String, pass:String) -> Bool {\n        var result\
  \ = false;\n        if (user == \"bob\" && pass == \"secret\") {\n            result\
  \ = true;\n            println(\"User \\(user) is authenticated\");\n          \
  \  // 调用系统组件\n            log.logActivity(\"Authenticated \\(user)\");\n       \
  \     cache.loadFiles(user);\n            monitor.monitorSuspiciousActivity = false;\n\
  \        } else {\n            println(\"Failed authentication attempt\");\n   \
  \         // 调用系统组件\n            log.logActivity(\"Failed authentication: \\(user)\"\
  );\n            monitor.monitorSuspiciousActivity = true;\n        }\n        return\
  \ result;\n    }\n}\n```\n\n`AuthenticationManager` 类代表一个通过密码进行用户认证的服务。用户的凭据由调用组件传递给\
  \ `authenticate` 方法，该方法会认证用户并向调试控制台写入消息。为简化示例，`AuthenticationManager` 类只允许一个用户名/密码组合：用户名为\
  \ `bob`，密码为 `secret`。清单 22-3 显示了我添加到 `main.swift` 文件中用于使用 `AuthenticationManager`\
  \ 类的代码。\n\n**清单 22-3. `main.swift` 文件的内容**\n\n```\nlet authM = AuthenticationManager();\n\
  authM.authenticate(\"bob\", pass: \"secret\");\nprintln(\"-----\");\nauthM.authenticate(\"\
  joe\", pass: \"shhh\");\n```\n\n`AuthenticationManager` 类的 `authenticate` 方法会检查凭据并认证用户。认证过程完成后，会调用各个组件类来为用户设置系统环境：记录日志消息、加载用户文件以及禁用安全监视器。\
  \ `main.swift` 文件中的代码两次调用了 `authenticate` 方法：一次使用可认证通过的凭据，另一次使用会导致认证失败的凭据。运行该应用会产生以下结果：\n\
  \n```\nUser bob is authenticated\nLog: Authenticated bob\nLoad files for bob\nMonitoring\
  \ for attack: false\n-----\nFailed authentication attempt\nLog: Failed authentication:\
  \ joe\nMonitoring for attack: true\n```\n\n## 理解模式要解决的问题\n\n示例应用中代码的结构在实际项目中很常见。某事件发生，继而触发一系列后续操作。在示例中，起始事件是用户认证请求，后续操作是记录日志、加载文件和配置监控服务，如图\
  \ 22-1 所示。\n\n![A978-1-4842-0394-1_22_Fig1_HTML.jpg](img/A978-1-4842-0394-1_22_Fig1_HTML.jpg)\n\
  \n**图 22-1. 初始事件及其后续操作**\n\n问题在于，处理初始活动（本例中的 `AuthenticationManager` 类）的类必须详细了解所需的后续操作、负责这些操作的类以及这些操作是如何执行的。系统组件中的任何一个发生变更，都需要修改认证管理器类，这就带来了本书一直在提及的维护和测试问题。更广泛地说，认证管理器类中的代码超越了认证本身的范畴，涉足了完全不同的活动，这使得该类变得比实际需要更复杂，也更难以修改。\n\
  \n## 理解观察者模式\n\n观察者模式通过将对象划分为主题和观察者来改变它们之间的关系。主题对象维护着依赖对象（即观察者）的集合，并在发生重要变更或动作时通知它们。在示例应用中，主题将是认证管理器类，观察者则是系统组件类。\n\
  \n在没有观察者模式的情况下，像 `AuthenticationManager` 这样的类必须知道当认证请求成功或失败时需要调用哪些系统组件、应对每个组件应用哪些变更，以及这些变更应如何执行。\n\
  \n观察者模式重塑了这种模型，使得主题仅通知其观察者初始事件已发生——即一个认证请求被做出——而将如何响应交由观察者自行决定。主题无需知道观察者对象做了什么或如何做——只需知道它们希望被告知重要事件即可。\n\
  \n观察者模式标准化了观察者接收通知的方式，因此无需了解单个观察者的任何细节。每个主题只知道有观察者希望接收通知，并且仅负责将通知发送给所有观察者都实现的、定义良好的方法（通常命名为\
  \ `notify`）。图 22-2 展示了观察者模式，尽管该模式的影响最好通过具体实现来观察。\n\n![A978-1-4842-0394-1_22_Fig2_HTML.jpg](img/A978-1-4842-0394-1_22_Fig2_HTML.jpg)\n\
  \n**图 22-2. 观察者模式**\n\n\n\n## 实现观察者模式\n\n实现观察者模式的关键在于使用协议（protocols）来定义主体（subjects）与观察者（observers）之间的交互。清单\
  \ 22-4 展示了我在一个名为`Observer.swift`的新文件中定义的协议。\n\n清单 22-4. `Observer.swift`文件的内容\n\n\
  ```\nprotocol Observer : class {\n    func notify(user:String, success:Bool);\n\
  }\n\nprotocol Subject {\n    func addObservers(observers:Observer...);\n    func\
  \ removeObserver(observer:Observer);\n}\n```\n\n协议的名称反映了遵循它们的类在观察者模式中所扮演的角色。遵循`Observer`协议的类通过实现`notify`方法来接收来自遵循`Subject`协议的类的通知。在观察者模式中，主体负责跟踪其观察者，因此我定义了`addObservers`和`removeObserver`方法，允许观察者注册和注销接收主体通知的意向。请注意，`addObservers`方法可以接受多个`Observer`对象。这使得设置`Subject`对象更加容易，你将在“消费该模式”部分看到这一点。\n\
  \n**提示：** 请注意，在定义`Observer`协议时，我使用了`class`关键字。这使得我在遵循`Subject`协议的类中管理观察者时，能够比较实现了该协议的对象，如清单\
  \ 22-5 所示。\n\n### 创建基础主体类\n\n在观察者模式中，主体负责跟踪其观察者。为了避免重复编写创建和管理观察者集合的代码，我创建了一个基础类，该类负责管理观察者，并提供一种方法供具体的主体实现类发送通知。由于\
  \ Swift 集合并非线程安全，且观察者集合存在被并发访问的可能性，我使用 Grand Central Dispatch（GCD）来保护观察者集合，如清单 22-5\
  \ 所示。\n\n清单 22-5. 在`Observer.swift`文件中定义基础主体类\n\n```\nimport Foundation;\n\nprotocol\
  \ Observer : class {\n    func notify(user:String, success:Bool);\n}\n\nprotocol\
  \ Subject {\n    func addObservers(observers:Observer...);\n    func removeObserver(observer:Observer);\n\
  }\n\nclass SubjectBase : Subject {\n    private var observers = [Observer]();\n\
  \    private var collectionQueue = dispatch_queue_create(\"colQ\",\n        DISPATCH_QUEUE_CONCURRENT);\n\
  \    \n    func addObservers(observers: Observer...) {\n        dispatch_barrier_sync(self.collectionQueue,\
  \ { () in\n            for newOb in observers {\n                self.observers.append(newOb);\n\
  \            }\n        });\n    }\n    \n    func removeObserver(observer: Observer)\
  \ {\n        dispatch_barrier_sync(self.collectionQueue, { () in\n            self.observers\
  \ = filter(self.observers, {$0 !== observer});\n        });\n    }\n    \n    func\
  \ sendNotification(user:String, success:Bool) {\n        dispatch_sync(self.collectionQueue,\
  \ { () in\n            for ob in self.observers {\n                ob.notify(user,\
  \ success: success);\n            }\n        });\n    }\n}\n```\n\n### 遵循 Subject\
  \ 协议\n\n下一步是更新`AuthenticationManager`类，使其遵循`Subject`协议，并移除对执行后续操作的系统组件类的直接引用。清单\
  \ 22-6 展示了我的修改，这些修改依赖于上一节定义的`SubjectBase`类。\n\n清单 22-6. 在`Authentication.swift`文件中应用该模式\n\
  \n```\nclass AuthenticationManager : SubjectBase {\n    func authenticate(user:String,\
  \ pass:String) -> Bool {\n        var result = false;\n        if (user == \"bob\"\
  \ && pass == \"secret\") {\n            result = true;\n            println(\"User\
  \ \\(user) is authenticated\");\n        } else {\n            println(\"Failed\
  \ authentication attempt\");\n        }\n        sendNotification(user, success:\
  \ result);\n        return result;\n    }\n}\n```\n\n其作用是简化类并使其专注于用户身份验证。对各个组件类的引用已被替换为对`sendNotification`方法的单一调用，该方法进而调用通过`SubjectBase`类提供的`addObservers`方法注册的每个`Observer`对象所定义的`notify`方法。\n\
  \n### 遵循 Observer 协议\n\n下一步是更新各个组件类，使其遵循`Observer`协议，从而能够接收来自`Subject`的通知。清单 22-7\
  \ 展示了我所做的修改。\n\n清单 22-7. 在`SystemComponents.swift`文件中遵循 Observer 协议\n\n```\nclass\
  \ ActivityLog : Observer {\n    func notify(user: String, success: Bool) {\n   \
  \     println(\"Auth request for \\(user). Success: \\(success)\");\n    }\n   \
  \ \n    func logActivity(activity:String) {\n        println(\"Log: \\(activity)\"\
  );\n    }\n}\n\nclass FileCache : Observer {\n    func notify(user: String, success:\
  \ Bool) {\n        if (success) {\n            loadFiles(user);\n        }\n   \
  \ }\n    \n    func loadFiles(user:String) {\n        println(\"Load files for \\\
  (user)\");\n    }\n}\n\nclass AttackMonitor : Observer {\n    func notify(user:\
  \ String, success: Bool) {\n        monitorSuspiciousActivity = !success;\n    }\n\
  \    \n    var monitorSuspiciousActivity: Bool = false {\n        didSet {\n   \
  \         println(\"Monitoring for attack: \\(monitorSuspiciousActivity)\");\n \
  \       }\n    }\n}\n```\n\n这些新增内容使每个类负责自己对身份验证请求成功或失败的响应，从而打破了与身份验证管理器的紧密耦合。\n\n\
  ### 消费该模式\n\n剩下的工作是更新`main.swift`文件中的代码，以创建观察者并将它们注册到主体，如清单 22-8 所示。\n\n清单 22-8.\
  \ 在`main.swift`文件中消费观察者模式\n\n```\nlet log = ActivityLog();\nlet cache = FileCache();\n\
  let monitor = AttackMonitor();\n\nlet authM = AuthenticationManager();\n\nauthM.addObservers(log,\
  \ cache, monitor);\nauthM.authenticate(\"bob\", pass: \"secret\");\nprintln(\"-----\"\
  );\nauthM.authenticate(\"joe\", pass: \"shhh\");\n```\n\n我创建了各个观察者的实例，并将它们传递给`AuthenticationManager`类的`addObservers`方法。`AuthenticationManager`类仅通过`Observer`协议及其定义的`notify`方法来处理观察者，并不了解各个具体类及其在`notify`方法被调用时的行为。运行该应用程序将产生以下结果：\n\
  \n```\nUser bob is authenticated\nAuth request for bob. Success: true\nLoad files\
  \ for bob\nMonitoring for attack: false\n-----\nFailed authentication attempt\n\
  Auth request for joe. Success: false\nMonitoring for attack: true\n```\n\n使用`Observer`协议使得扩展应用程序变得很容易，而无需修改主体；只需将新的`Observer`对象传递给主体的`addObservers`方法即可。\n\
  \n## 观察者模式的变体\n\n观察者模式有许多有用的变体，我将在以下章节中逐一描述。\n\n\n\n### 通用化通知\n\n我在上一节创建的标准模式实现专门用于处理身份验证请求。这一点可以通过\
  \ `Observer` 协议中定义的 `notify` 方法的签名看出来。\n\n```\nfunc notify(user:String, success:Bool);\n\
  ```\n\n`notify` 方法只能用于处理身份验证请求的通知，这在同一应用程序中存在多个主题时可能成为问题，因为每个主题最终会定义自己版本的 `Observer`\
  \ 协议和 `notify` 方法。\n\n一种常见的变体是通用化 `Observer` 协议，使其能够接收更广泛的通知，每个通知可能来自不同的主题。最稳健的方法是定义一个表示通知的类，并封装通知类型及任何相关数据的详细信息，如图\
  \ 22-3 所示。\n\n![A978-1-4842-0394-1_22_Fig3_HTML.jpg](img/A978-1-4842-0394-1_22_Fig3_HTML.jpg)\n\
  \n**图 22-3.** 观察者接收来自多个主题的通知对象\n\n清单 22-9 展示了如何向示例应用程序中添加对通知对象的支持。\n\n**清单 22-9.**\
  \ 在 `Observer.swift` 文件中添加通知对象\n\n```\nimport Foundation;\n\nenum NotificationTypes\
  \ : String {\n    case AUTH_SUCCESS = \"AUTH_SUCCESS\";\n    case AUTH_FAIL = \"\
  AUTH_FAIL\";\n}\n\nstruct Notification {\n    let type:NotificationTypes;\n    let\
  \ data:Any?;\n}\n\nprotocol Observer : class {\n    func notify(notification:Notification);\n\
  }\n\nprotocol Subject {\n    func addObservers(observers:Observer...);\n    func\
  \ removeObserver(observer:Observer);\n}\n\nclass SubjectBase : Subject {\n    private\
  \ var observers = [Observer]();\n    private var collectionQueue = dispatch_queue_create(\"\
  colQ\", DISPATCH_QUEUE_CONCURRENT);\n\n    func addObservers(observers: Observer...)\
  \ {\n        dispatch_barrier_sync(self.collectionQueue, { () in\n            for\
  \ newOb in observers {\n                self.observers.append(newOb);\n        \
  \    }\n        });\n    }\n\n    func removeObserver(observer: Observer) {\n  \
  \      dispatch_barrier_sync(self.collectionQueue, { () in\n            self.observers\
  \ = filter(self.observers, {$0 !== observer});\n        });\n    }\n\n    func sendNotification(notification:Notification)\
  \ {\n        dispatch_sync(self.collectionQueue, { () in\n            for ob in\
  \ self.observers {\n                ob.notify(notification);\n            }\n  \
  \      });\n    }\n}\n```\n\n我定义了一个名为 `Notification` 的结构体，它通过 `NotificationTypes`\
  \ 枚举中的值来指明其类型，并通过一个名为 `data` 的可选常量向观察者提供处理通知所需的数据。我更新了 `Observer` 协议，使 `notify`\
  \ 方法接收一个 `Notification` 对象，并更新了 `SubjectBase` 类中的 `sendNotification` 方法，使其也接收一个\
  \ `Notification` 对象。清单 22-10 展示了如何更新观察者类，使其符合修改后的协议。\n\n> **提示：** 在应用程序中，你无需必须使用枚举来详细描述通知类型。另一种选择是使用\
  \ `String` 来提供通知的名称。我通常从枚举开始，因为它能减少在观察者中错误输入通知名称的可能性，从而避免导致意外的响应。对于较大的项目，我通常会改用字符串值，因为使用单一的枚举来定义所有通知可能会变得难以管理，尤其是在多个开发人员在同一个项目中定义不同通知的情况下。\n\
  \n**清单 22-10.** 在 `SystemComponents.swift` 文件中符合修订后的观察者协议\n\n```\nclass ActivityLog\
  \ : Observer {\n    func notify(notification:Notification) {\n        println(\"\
  Auth request for \\(notification.type.rawValue) \" + \"Success: \\(notification.data!)\"\
  );\n    }\n\n    func logActivity(activity:String) {\n        println(\"Log: \\\
  (activity)\");\n    }\n}\n\nclass FileCache : Observer {\n    func notify(notification:Notification)\
  \ {\n        if (notification.type == NotificationTypes.AUTH_SUCCESS) {\n      \
  \      loadFiles(notification.data! as String);\n        }\n    }\n\n    func loadFiles(user:String)\
  \ {\n        println(\"Load files for \\(user)\");\n    }\n}\n\nclass AttackMonitor\
  \ : Observer {\n    func notify(notification: Notification) {\n        monitorSuspiciousActivity\
  \ = (notification.type == NotificationTypes.AUTH_FAIL);\n    }\n\n    var monitorSuspiciousActivity:\
  \ Bool = false {\n        didSet {\n            println(\"Monitoring for attack:\
  \ \\(monitorSuspiciousActivity)\");\n        }\n    }\n}\n```\n\n最后，我修改了主题类，使其使用\
  \ `Notification` 结构体，如清单 22-11 所示。\n\n**清单 22-11.** 在 `AuthenticationManager.swift`\
  \ 文件中使用通知对象\n\n```\nclass AuthenticationManager : SubjectBase {\n    func authenticate(user:String,\
  \ pass:String) -> Bool {\n        var nType = NotificationTypes.AUTH_FAIL;\n   \
  \     if (user == \"bob\" && pass == \"secret\") {\n            nType = NotificationTypes.AUTH_SUCCESS;\n\
  \            println(\"User \\(user) is authenticated\");\n        } else {\n  \
  \          println(\"Failed authentication attempt\");\n        }\n        sendNotification(Notification(type:\
  \ nType, data: user));\n        return nType == NotificationTypes.AUTH_SUCCESS;\n\
  \    }\n}\n```\n\n运行示例应用程序将产生以下输出：\n\n```\nUser bob is authenticated\nAuth request\
  \ for AUTH_SUCCESS Success: bob\nLoad files for bob\nMonitoring for attack: false\n\
  -----\nFailed authentication attempt\nAuth request for AUTH_FAIL Success: joe\n\
  Monitoring for attack: true\n```\n\n\n\n### 理解通知对象陷阱\n\n这些改动似乎不大，但在应用这种变体时存在一个潜在陷阱。观察者必须知道与通知关联的数据类型，而主体必须遵守这一约定。\n\
  \n以示例应用为例，主体——`AuthenticationManager`类——会发送以`String`值形式表示的、已请求认证的用户名，而观察者必须知道主体使用的类型，以及（同样重要的是）该值的含义。当两个主体使用相同的通知类型但附带不同的数据类型，或者更危险的情况——使用相同的数据类型但意图表达不同的含义时，陷阱就出现了。\n\
  \n避免此问题最可靠的方法是为每个通知定义子类，以明确相关数据值的含义。这并不能保证故意滥用的情况不会发生，但确实能防范意外问题。清单 22-12 展示了我在示例应用中如何定义一个通知子类。\n\
  \n**清单 22-12.** 在`Observers.swift`文件中定义通知子类\n\n```\nimport Foundation;\n\nenum NotificationTypes\
  \ : String {\n  case AUTH_SUCCESS = \"AUTH_SUCCESS\";\n  case AUTH_FAIL = \"AUTH_FAIL\"\
  ;\n  case SUBJECT_CREATED = \"SUBJECT_CREATE\";\n  case SUBJECT_DESTROYED = \"SUBJECT_DESTROYED\"\
  ;\n}\n\nclass Notification {\n  let type:NotificationTypes;\n  let data:Any?;\n\
  \  init(type:NotificationTypes, data:Any?) {\n    self.type = type; self.data =\
  \ data;\n  }\n}\n\nclass AuthenticationNotification: Notification {\n  init(user:String,\
  \ success:Bool) {\n    super.init(type: success ? NotificationTypes.AUTH_SUCCESS\n\
  \      : NotificationTypes.AUTH_FAIL, data: user);\n  }\n  var userName : String?\
  \ {\n    return self.data? as String?;\n  }\n  var requestSuccessed : Bool {\n \
  \   return self.type == NotificationTypes.AUTH_SUCCESS;\n  }\n}\n\nprotocol Observer\
  \ : class {\n  func notify(notification:Notification);\n}\n\nprotocol Subject {\n\
  \  func addObservers(observers:Observer...);\n  func removeObserver(observer:Observer);\n\
  }\n\nclass SubjectBase : Subject {\n  // ...为简洁起见，省略语句...\n}\n```\n\n我将`Notification`从`struct`改为`class`，以便从中派生出`AuthenticationNotification`类，并定义计算属性，以更有用的形式呈现属性值。\n\
  \n你可以创建`Observer`协议更专门的版本，使其仅传递特定于通知的对象，但我发现，接收来自多个主体的多种通知类型的实现类会很快变得复杂，难以实现和测试。相反，我更倾向于使用通用型的`Observer`协议，让实现类自行检测接收到的类型，如清单\
  \ 22-13 所示。\n\n**清单 22-13.** 在`SystemComponents.swift`文件中接收特定于通知的对象\n\n```\n...\n\
  class FileCache : Observer {\n  func notify(notification:Notification) {\n    if\
  \ let authNotification = notification as? AuthenticationNotification {\n      if\
  \ (authNotification.requestSuccessed && authNotification.userName != nil) {\n  \
  \      loadFiles(authNotification.userName!);\n      }\n    }\n  }\n  func loadFiles(user:String)\
  \ {\n    println(\"Load files for \\(user)\");\n  }\n}\n...\n```\n\n这种方法意味着任何观察者仍然可以通过单一方法接收任何通知，但同时可以选择检查更专门化的类型，并在需要时加以利用。`SystemComponents.swift`文件中的其他两个类不会检查`AuthenticationNotification`类型，但它们仍然能够完美地接收和处理认证管理器类发送的通知。\n\
  \n### 处理短生命周期主体\n\n观察者模式的标准实现假设应用达到某种稳定状态，即观察者和主体对象已创建并相互关联，从而允许在应用生命周期内稳定地发送通知。\n\
  \n当然，情况并非总是如此。一种常见的变体是调整该模式，使得观察者能够自动从生命周期相对较短的主体接收通知。在这种情况下，安排观察者在新的主体被创建时收到通知会很有帮助。我处理这种情况的方式是将观察者模式与我在第\
  \ 21 章中描述的调解员模式结合起来。调解员提供了一种便捷的机制，主体可以通过该机制通知观察者它们已被创建——这是一种元观察者模式。第一步是定义两种新的通知类型，我将用它们来指示主体何时被创建和销毁，如清单\
  \ 22-15 所示。\n\n**清单 22-15.** 在`Observer.swift`文件中定义新的通知类型\n\n```\n...\nenum NotificationTypes\
  \ : String {\n  case AUTH_SUCCESS = \"AUTH_SUCCESS\";\n  case AUTH_FAIL = \"AUTH_FAIL\"\
  ;\n  case SUBJECT_CREATED = \"SUBJECT_CREATE\";\n  case SUBJECT_DESTROYED = \"SUBJECT_DESTROYED\"\
  ;\n}\n...\n```\n\n清单 22-16 显示了我添加到示例项目中的`MetaObserver.swift`文件的内容，我使用该文件来定义自动处理短生命周期主体所需的协议和类。\n\
  \n**清单 22-16.** `MetaObserver.swift`文件的内容\n\n```\nprotocol MetaObserver : Observer\
  \ {\n  func notifySubjectCreated(subject:Subject);\n  func notifySubjectDestroyed(subject:Subject);\n\
  }\n\nclass MetaSubject : SubjectBase, MetaObserver {\n  func notifySubjectCreated(subject:\
  \ Subject) {\n    sendNotification(Notification(type: NotificationTypes.SUBJECT_CREATED,\n\
  \      data: subject));\n  }\n  func notifySubjectDestroyed(subject: Subject) {\n\
  \    sendNotification(Notification(type: NotificationTypes.SUBJECT_DESTROYED,\n\
  \      data: subject));\n  }\n  class var sharedInstance:MetaSubject {\n    struct\
  \ singletonWrapper {\n      static let singleton = MetaSubject();\n    }\n    return\
  \ singletonWrapper.singleton;\n  }\n  func notify(notification:Notification) {\n\
  \    // 不做任何操作 - 为满足 Observer 协议要求\n  }\n}\n\nclass ShortLivedSubject : SubjectBase\
  \ {\n  override init() {\n    super.init();\n    MetaSubject.sharedInstance.notifySubjectCreated(self);\n\
  \  }\n  deinit {\n    MetaSubject.sharedInstance.notifySubjectDestroyed(self);\n\
  \  }\n}\n```\n\n这种变体的核心是`MetaObserver`协议，它扩展了`Observer`并添加了在新的短生命周期主体被创建和销毁时会被调用的方法。我需要一个机制来跟踪元观察者并向它们分发通知，因此我以`MetaSubject`类的形式创建了调解员。该类派生自`SubjectBase`（因此继承了线程安全的观察者跟踪功能），并遵循`MetaObserver`协议（以便单个主体可以宣布其创建和销毁）。最后添加的是`ShortLivedSubject`类，它派生自`SubjectBase`，并实现了初始化和反初始化方法，这些方法会调用`MetaSubject`类的方法。清单\
  \ 22-17 展示了我如何更新`AuthenticationManager`类，使其参与到新的功能中。\n\n**清单 22-17.** 在`Authentication.swift`文件中创建一个短生命周期主体\n\
  \n```\nclass AuthenticationManager : ShortLivedSubject {\n  func authenticate(user:String,\
  \ pass:String) -> Bool {\n    var nType = NotificationTypes.AUTH_FAIL;\n    if (user\
  \ == \"bob\" && pass == \"secret\") {\n      nType = NotificationTypes.AUTH_SUCCESS;\n\
  \      println(\"User \\(user) is authenticated\");\n    } else {\n      println(\"\
  Failed authentication attempt\");\n    }\n    sendNotification(Notification(type:\
  \ nType, data: user));\n    return nType == NotificationTypes.AUTH_SUCCESS;\n  }\n\
  }\n```\n\n\n\n### 我只需要修改基类，因为所需的所有行为都已继承。清单 22-18 展示了我将一个观察者类转变为元观察者所做的修改。\n\n**清单\
  \ 22-18.** 在`SystemComponents.swift`文件中创建元观察者\n\n```\n...\nclass AttackMonitor :\
  \ MetaObserver {\n    func notifySubjectCreated(subject: Subject) {\n        if\
  \ (subject is AuthenticationManager) {\n            subject.addObservers(self);\n\
  \        }\n    }\n    func notifySubjectDestroyed(subject: Subject) {\n       \
  \ subject.removeObserver(self);\n    }\n    func notify(notification: Notification)\
  \ {\n        monitorSuspiciousActivity\n            = (notification.type == NotificationTypes.AUTH_FAIL);\n\
  \    }\n    var monitorSuspiciousActivity: Bool = false {\n        didSet {\n  \
  \          println(\"监控攻击行为：\\(monitorSuspiciousActivity)\");\n        }\n    }\n\
  }\n...\n```\n\n`notifySubjectCreated`方法的实现会检查新创建主题的类型，并仅针对`AuthenticationManager`类的实例注册通知。最后一步是修改`main.swift`文件中观察者的创建和应用方式，如清单\
  \ 22-19 所示。\n\n**清单 22-19.** 在`main.swift`文件中使用元观察者\n\n```\n// 创建元观察者\nlet monitor\
  \ = AttackMonitor();\nMetaSubject.sharedInstance.addObservers(monitor);\n\n// 创建常规观察者\n\
  let log = ActivityLog();\nlet cache = FileCache();\nlet authM = AuthenticationManager();\n\
  \n// 仅注册常规观察者\nauthM.addObservers(cache, monitor);\nauthM.authenticate(\"bob\",\
  \ pass: \"secret\");\nprintln(\"-----\");\nauthM.authenticate(\"joe\", pass: \"\
  shhh\");\n```\n\n`AttackMonitor`对象被注册为`MetaSubject`类的元观察者。这确保了当主题对象被创建时，`AttackMonitor`对象会收到通知，并可以选择注册通知。运行应用程序会产生以下输出，表明元观察者确实收到了来自主题的通知：\n\
  \n```\n监控攻击行为：false\n用户 bob 已验证通过\n监控攻击行为：false\n-----\n认证尝试失败\n监控攻击行为：true\n```\n\
  \n## 理解观察者模式的陷阱\n\n观察者模式的标准实现没有严重的陷阱，只要确保观察者仅通过`notify`方法接收通知，并且主题不会试图将观察者强制转换为其实现类型即可。\n\
  \n在创建观察者模式的变体时，应确保不忽视主题与观察者之间的职责划分；很容易创建一种模糊主题与观察者界限的实现，从而削弱该模式的简洁性和直接性。\n\n## Cocoa\
  \ 框架中的观察者模式示例\n\nCocoa 框架中有几个观察者模式的示例。在第 21 章中，我将`NSNotificationCenter`类描述为中介者协议的一个示例，但该类同样实现了观察者模式。这与我在本章前面处理短暂生命周期主题时使用的组合相同。实际上，您可以使用`NSNotificationCenter`来通知元观察者主题已被创建或销毁。在本章后面，我将使用`NSNotificationCenter`将中介者和命令模式应用于\
  \ SportsStore 应用程序。\n\n### 用户界面事件\n\n大多数程序员遇到的 Cocoa 观察者模式实现是在 UI 框架中，其中用户交互和 UI\
  \ 组件状态的变化通过事件（即通知的另一种称呼）来表达。在 Cocoa 框架内，针对不同类别的事件有不同的协议，每个协议都有其对应的`notify`方法——即我在本章\"\
  实现观察者模式\"部分中定义在`Observer`协议中的方法。例如，以下是我添加到 SportsStore 应用程序中的方法，用于响应用户摇晃 iOS 设备执行撤销操作：\n\
  \n```\n...\noverride func motionEnded(motion: UIEventSubtype, withEvent event: UIEvent)\
  \ {\n    if (event.subtype == UIEventSubtype.MotionShake) {\n        println(\"\
  检测到摇晃动作\");\n        undoManager?.undo();\n    }\n}\n...\n```\n\n`motionEnded`方法由`UIResponder`协议定义，`ViewController`类通过其基类遵循该协议。`UIResponder`协议并非通过单一的`notify`方法发送所有\
  \ UI 通知，而是为每种主要类型的用户交互定义了相应的方法，并使用`UIEventSubtype`枚举来指示已执行的具体动作。在所有使用 UI 组件的应用程序中，您都会遇到事件，但通常您只需实现观察者部分，并将组件作为主题。\n\
  \n### 观察属性变化\n\nObjective-C 有一个名为键值观察（KVO）的特性，允许一个对象在另一个对象的属性值发生变化时接收通知。只要两个对象都派生自`NSObject`，并且使用`dynamic`关键字定义被观察的属性，就可以在\
  \ Swift 对象之间使用 KVO 进行通信。\n\n为了演示如何在 Swift 中使用 KVO，我创建了一个名为 KVO 的新 Xcode 命令行工具项目，并使用`main.swift`文件定义了清单\
  \ 22-20 所示的代码。\n\n**清单 22-20.** 在`main.swift`文件中使用 KVO\n\n```\nimport Foundation;\n\
  \nclass Subject : NSObject {\n    dynamic var counter = 0;\n}\n\nclass Observer\
  \ : NSObject {\n    init(subject:Subject) {\n        super.init();\n        subject.addObserver(self,\
  \ forKeyPath: \"counter\",\n            options: NSKeyValueObservingOptions.New,\
  \ context: nil);\n    }\n    override func observeValueForKeyPath(keyPath: String,\
  \ ofObject object: AnyObject,\n        change: [NSObject : AnyObject], context:\
  \ UnsafeMutablePointer<Void>) {\n        println(\"通知：\\(keyPath) = \\(change[NSKeyValueChangeNewKey]!)\"\
  );\n    }\n}\n\nlet subject = Subject();\nlet observer = Observer(subject: subject);\n\
  subject.counter++;\nsubject.counter = 22;\n```\n\n**提示：** 我必须为此简单示例使用 Xcode 项目，因为\
  \ Playground 的限制会导致 KVO 无法正常工作。\n\n`Subject`类使用`dynamic`关键字定义了一个名为`counter`的变量。这是我打算使用\
  \ KVO 观察的属性，`dynamic`关键字可防止编译器对该属性的实现进行优化，从而使 KVO 特性能够在运行时将其替换为等效的计算属性，以便在属性变化时通知其观察者。\n\
  \n`Observer`类使用`addObserver`方法注册其对属性的兴趣，如下所示：\n\n```\n...\nsubject.addObserver(self,\
  \ forKeyPath: \"counter\",\n    options: NSKeyValueObservingOptions.New, context:\
  \ nil);\n...\n```\n\n`addObserver`方法的参数指定了观察者、要观察的属性，以及来自`NSKeyValueObservingOptions`枚举的一个值，该值指定属性变化时应包含在通知中的值。我指定了`New`值，表示应使用分配给主题属性的值。\n\
  \n通知被发送到观察者的`observeValueForKeyPath`方法，包含主题、发生变化的属性以及新值的详细信息。在本例中，我输出了属性名称及其值。运行示例会在\
  \ Xcode 控制台中产生以下输出：\n\n```\n通知：counter = 1\n通知：counter = 22\n```\n\n## 将模式应用于 SportsStore\
  \ 应用程序\n\n在本章中，我打算使用`NSNotificationCenter`类将中介者模式和命令模式应用于 SportsStore 应用程序。\n\n\n\
  \n### 准备示例应用\n\nSportsStore 应用无需额外准备，我将直接从第 20 章结束时的项目状态继续开发。如果你不想手动输入所有修改，别忘了可以从\
  \ [`Apress.com`](https://Apress.com) 获取本书配套的免费源代码下载，其中包含了 SportsStore 项目。\n\n###\
  \ 应用观察者模式\n\n我将把观察者模式应用于产品类，使其充当主体，在库存水平发生变化时发送通知。我将使用 `NSNotificationCenter` 类来处理通知并扮演中介角色，而不是自定义协议和类，这样主体和观察者就能相互找到对方。清单\
  \ 22-21 展示了我对 `Product` 类所做的修改，使其能够发送通知。\n\n**清单 22-21.** 在 `Product.swift` 文件中发送通知\n\
  \n```\n...\nvar stockLevel:Int {\n    get { return stockLevelBackingValue;}\n  \
  \  set {\n        stockLevelBackingValue = max(0, newValue);\n        NSNotificationCenter.defaultCenter().postNotificationName(\"\
  stockUpdate\",\n            object: self);\n    }\n}\n...\n```\n\n使用 `NSNotificationCenter`\
  \ 类的优点在于，可以以最小的代价向应用添加通知，但仍需注意确保应用中不同部分发送的通知不会相互冲突。现在 `Product` 类正在发送通知，我可以在任何关注库存水平信息的地方观察这些通知。清单\
  \ 22-22 展示了我如何修改 `ProductTableCell` 类，使其能够响应库存水平通知并更新其 UI 组件。\n\n**清单 22-22.** 在\
  \ `ViewController.swift` 文件中响应通知\n\n```\n...\nclass ProductTableCell : UITableViewCell\
  \ {\n    @IBOutlet weak var nameLabel: UILabel!\n    @IBOutlet weak var descriptionLabel:\
  \ UILabel!\n    @IBOutlet weak var stockStepper: UIStepper!\n    @IBOutlet weak\
  \ var stockField: UITextField!\n    var product:Product?;\n    required init(coder\
