- "# 4. 对象模板模式\n\n在本章中，我将介绍一种对于面向对象编程极为基础的技术，以至于它通常不被归类为设计模式：直接从类或结构体创建新对象。在后续章节中，我会描述管理对象创建的不同技术，但我想首先解释使用类和结构体作为创建对象的模板所带来的优势。这不仅是一个重要的主题本身，而且有助于阐明不使用模板创建对象时会出现的问题；它也为后续解释更高级模式的优势奠定了基础。表\
  \ 4-1 将对象模板模式置于上下文中。\n\n**表 4-1.** 将对象模板模式置于上下文中\n\n| 问题 | 答案 |\n| --- | --- |\n\
  | 这是什么？ | 对象模板模式使用类或结构体作为规范，为给定数据类型定义数据类型和逻辑。对象使用模板创建，并在初始化期间设置数据值，可以通过使用模板中的默认值，或使用组件提供给类或结构体初始化器（也称为构造器）的值来设置。\
  \ |\n| 有什么好处？ | 对象模板模式为将数据值及其操作逻辑分组提供了基础，这被称为封装。封装允许对象向使用者呈现 API，同时隐藏该 API 的私有实现。这有助于防止组件之间的紧密耦合。\
  \ |\n| 何时应使用此模式？ | 除最简单的项目外，所有项目都应使用此模式。Swift 元组是一个有趣的功能，但它们可能导致长期的维护问题，而创建简单的类或结构体只需稍微多花一点工作。\
  \ |\n| 何时应避免此模式？ | 使用此模式没有缺点，但本书本部分的后续模式将展示更高级的使用技巧。 |\n| 如何判断是否已正确实现该模式？ | 当你可以更改类或结构体的私有实现，而无需对使用它的组件进行相应更改时，说明该模式已正确实现。\
  \ |\n| 有哪些常见陷阱？ | 此模式的唯一陷阱是，当你的本意是使用类时，却将结构体用作模板。结构体和类有很多共同点，但当从它们创建的对象被赋值给新变量时，它们的行为不同，我将在第\
  \ 5 章中解释这一点。（还有其他区别，但与本主题无关。） |\n| 有哪些相关模式？ | 我将在第 5 章中描述的原型模式，提供了另一种创建对象的技术。 |\n\
  \n## 准备示例项目\n\n在本章中，我按照第 3 章中描述的相同过程，创建了一个名为 `ObjectTemplate` 的 Xcode OS X 命令行工具项目。目前无需其他准备。\n\
  \n## 理解该模式解决的问题\n\n在第 3 章中，我使用 Swift 元组来定义 SportsStore 应用处理的数据。以下是该代码中的一个元组示例：\n\
  \n```\n(\"Kayak\", \"A boat for one person\", \"Watersports\", 275.0, 10)\n```\n\
  \n元组是一组组合在一起的值，方便易用，但它们带来了一些问题，意味着应限制其使用。清单 4-1 显示了我添加到 `main.swift` 文件中的语句，Xcode\
  \ 会将该文件添加到命令行工具项目中。\n\n**清单 4-1.** `main.swift` 文件的内容\n\n```\nvar products = [\n\
  \    (\"Kayak\", \"A boat for one person\", 275.0, 10),\n    (\"Lifejacket\", \"\
  Protective and fashionable\", 48.95, 14),\n    (\"Soccer Ball\", \"FIFA-approved\
  \ size and weight\", 19.5, 32)\n];\n\nfunc calculateTax(product:(String, String,\
  \ Double, Int)) -> Double {\n    return product.2 * 0.2;\n}\n\nfunc calculateStockValue(tuples:[(String,\
  \ String, Double, Int)]) -> Double {\n    return tuples.reduce(0, {\n        (total,\
  \ product) -> Double in\n        return total + (product.2 * Double(product.3))\n\
  \    });\n}\n\nprintln(\"Sales tax for Kayak: $\\(calculateTax(products[0]))\");\n\
  println(\"Total value of stock: $\\(calculateStockValue(products))\");\n```\n\n\
  在这段代码中，我定义了一个表示产品的元组数组，以及两个对这些元组进行操作的函数。`calculateTax` 函数定义了一个元组参数，用于计算价格的销售税（我住在伦敦，税率设为\
  \ 20%，这是英国的销售税率）。`calculateStockValue` 函数对该元组数组进行操作，通过将库存数量乘以产品价格来计算总价值。我调用了这两个函数，并使用\
  \ `println` 函数输出结果。运行项目会在 Xcode 调试控制台中产生以下输出：\n\n```\nSales tax for Kayak: $55.0\n\
  Total value of stock: $4059.3\n```\n\n本书反复出现的主题之一是，紧密耦合的组件是设计模式的对立面。当一个组件依赖于另一个组件的内部工作原理时，或者换种说法，当你更改一个组件而无需同时更新另一个组件时，这两个组件就是紧密耦合的。\n\
  \n“组件”这个术语定义较为宽泛，在这里我指的是元组数组以及对其进行操作的函数。图 4-1 展示了 playground 中两个函数与元组之间存在的紧密耦合。\n\
  \n![A978-1-4842-0394-1_4_Fig1_HTML.jpg](img/A978-1-4842-0394-1_4_Fig1_HTML.jpg)\n\
  \n**图 4-1.** playground 中的紧密耦合\n\n这两个函数在定义参数的方式以及函数体内部都与元组紧密耦合。在定义操作元组的函数时，元组值的数量、顺序和类型必须完全匹配。在函数体中对元组进行操作时，用于获取或设置值的索引必须显式定义。以下是\
  \ `calculateSalesTax` 函数，其中我高亮显示了对元组的依赖：\n\n```\nfunc calculateTax(product: (String,\
  \ String, String, Double, Int)) -> Double {\n    return product.3 * 0.2;\n}\n```\n\
  \n以下是 `calculateStockValue` 函数所存在的依赖：\n\n```\nfunc calculateStockValue(tuples:[(String,\
  \ String, Double, Int)]) -> Double {\n    return tuples.reduce(0, {(total, product)\
  \ -> Double in\n        return total + (product.2 * Double(product.3))\n    });\n\
  }\n```\n\n对元组结构的依赖意味着函数和元组是紧密耦合的。紧密耦合最明显的影响是，对元组的更改会迫使所有存在依赖的地方都进行相应更改。在清单 4-2 中，你可以看到当我从元组中删除一个值时会发生什么。\n\
  \n**清单 4-2.** 从 `main.swift` 文件的元组中删除一个值\n\n```\nvar products = [\n    (\"Kayak\"\
  , 275.0, 10),\n    (\"Lifejacket\", 48.95, 14),\n```\n\n\n\n`(\"Soccer Ball\", 19.5,\
  \ 32)];`\n\n`func calculateTax(product:(String, Double, Int)) -> Double {`\n\n`return\
  \ product.1 * 0.2;`\n\n`}`\n\n`func calculateStockValue(tuples:[(String, Double,\
  \ Int)]) -> Double {`\n\n`return tuples.reduce(0, {(total, product) -> Double in`\n\
  \n`return total + (product.1 * Double(product.2))`\n\n`});`\n\n`}`\n\n`println(\"\
  Sales tax for Kayak: $\\(calculateTax(products[0]))\");`\n\n`println(\"Total value\
  \ of stock: $\\(calculateStockValue(products))\");`\n\n## 理解紧耦合为何会成为问题\n\n紧耦合的组件会使代码更难维护，这意味着进行修改和测试其影响需要花费更多精力。如清单\
  \ 4-2 所示，一个组件的变更会要求依赖其实现的组件也随之更改。在包含大量紧耦合的应用中，这些变更会在代码中级联传导，以至于进行一个简单的修复或添加一项新功能就变成了一次实质性的大重写。\n\
  \n松耦合组件是设计模式的一个关键目标，但正如我在第 1 章中解释的，将某种模式应用于应用并不总是合理的。在某些开发场景中，紧耦合是完全合理的，要么是因为它能带来性能提升（例如实时软件），要么是因为该应用不太可能需要任何维护（因为它极为简单或生命周期很短）。在判定你预计不会维护该代码时要谨慎；很少有应用最终符合这种情况，即便这最初就是该意图。\n\
  \n我移除了描述产品的值，且突出显示的语句显示了函数中所需的相应更改。在一个真实项目中，这些更改会逐渐累积，并且如果它们影响了其他紧耦合，那么更改的数量可能导致应用中很大一部分代码被修改。这种程度的更改难以管理，并且需要彻底的测试，以确保更改已一致地应用，并且没有引入任何新错误。\n\
  \n## 理解对象模板模式\n\n对象模板模式使用一个类或结构体来定义一个模板，对象便基于此模板创建。当一个应用组件需要某个对象时，它通过指定模板名称以及运行时所需的用于配置对象的初始化数据值，来调用\
  \ Swift 运行时创建该对象。对象模板模式包含三个操作，如图 4-2 所示。\n\n![A978-1-4842-0394-1_4_Fig2_HTML.jpg](img/A978-1-4842-0394-1_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 对象模板模式\n\n第一个操作是调用组件请求 Swift 运行时创建一个对象，并提供要使用的模板名称以及用于定制将要创建的对象的任何运行时数据值。\n\
  \n在第二个操作中，Swift 运行时分配存储该对象所需的内存，并使用模板创建它。模板包含初始化方法，这些方法用于通过设置对象的初始状态（通过调用组件提供的运行时值、模板中定义的值，或两者皆有）来让对象准备就绪，然后\
  \ Swift 运行时调用该初始化器以准备好对象供使用。在最后一个操作中，Swift 运行时将创建好的对象交给调用组件。这三个步骤可以反复重复，因此单个模板可用于创建多个对象。\n\
  \n### 理解类、结构体、对象和实例\n\n有些面向对象编程术语在日常开发中使用较为随意，但在理解设计模式时可能会令人困惑。此模式的关键术语是类、结构体、对象和实例。\n\
  \n类和结构体都是模板，即 Swift 遵循对象模板模式所需的设计蓝图。Swift 遵循模板中的指令来创建新对象。同一个模板可被重复用于创建多个对象。每个对象都不同，但都是使用相同的指令创建的，就像一份食谱可以制作多个蛋糕一样（添加一个\
  \ `Int`、一个修改其值的方法，等等）。\n\n实例一词与对象含义相同，但用于指代创建该对象所使用的模式的名称，因此一个 `Product` 对象也可以被称为\
  \ `Product` 类的一个实例。\n\n要点在于，类和结构体是你在开发期间编写的指令，而对象是在应用运行时创建的。例如，当你更改对象存储的值时，它并不会更改用于创建它的模板。\n\
  \n## 实现对象模板模式\n\n清单 4-3 展示了一个名为 `Product.swift` 的新文件的内容，我将其添加到了示例项目中，并用它来定义一个名为\
  \ `Product` 的类。\n\n清单 4-3. Product.swift 文件的内容\n\n```\nclass Product {\n    var\
  \ name:String;\n    var description:String;\n    var price:Double;\n    var stock:Int;\n\
  \    init(name:String, description:String, price:Double, stock:Int) {\n        self.name\
  \ = name;\n        self.description = description;\n        self.price = price;\n\
  \        self.stock = stock;\n    }\n}\n```\n\n我在清单中创建了一个简单的类，以便尽可能贴近地复制基于元组的方法，但我稍后会为该类添加功能。清单\
  \ 4-4 展示了我是如何更新 `main.swift` 文件以使用 `Product` 类的。\n\n清单 4-4. 在 main.swift 文件中使用 Product\
  \ 类\n\n```\nvar products = [\n    Product(name: \"Kayak\", description: \"A boat\
  \ for one person\",\n        price: 275, stock: 10),\n    Product(name: \"Lifejacket\"\
  , description: \"Protective and fashionable\",\n        price: 48.95, stock: 14),\n\
  \    Product(name: \"Soccer Ball\", description: \"FIFA-approved size and weight\"\
  ,\n        price: 19.5, stock: 32)];\n\nfunc calculateTax(product:Product) -> Double\
  \ {\n    return product.price * 0.2;\n}\n\nfunc calculateStockValue(productsArray:[Product])\
  \ -> Double {\n    return productsArray.reduce(0, {(total, product) -> Double in\n\
  \        return total + (product.price * Double(product.stock))\n    });\n}\n\n\
  println(\"Sales tax for Kayak: $\\(calculateTax(products[0]))\");\nprintln(\"Total\
  \ value of stock: $\\(calculateStockValue(products))\");\n```\n\n与大多数模式一样，使用一个类来定义对象的模板需要一些额外工作，但它有实质性的好处；事实上，这些好处对于有效的面向对象编程是如此基本，以至于类和结构体的使用通常被视为理所当然，即便存在更快速、更直接的方法（例如元组）也是如此。\n\
  \n使用元组时，数据结构定义和一组值的设置是在一个简单步骤中完成的，而使用模板则有两步：定义模板和使用模板创建对象。\n\n## 理解该模式的优势\n\n使用模板的好处是显著的，并且通常值得为定义模板付出努力，无论它是一个类还是一个结构体。元组是一个很棒的特性，但对于严肃的软件开发人员来说，类和结构体通常更可取，因为它们提供了元组无法匹敌的控制水平和松耦合特性，正如我在以下章节中解释的那样。\n\
  \n\n\n### 解耦的好处\n\n为了让示例尽可能简单，清单 4-4 中的例子并未充分利用类和结构体提供的全部功能，但它足以说明：即使是最简单的模板，也能减少变更带来的影响。清单\
  \ 4-5 展示了如何从 `Product` 类中移除 `description` 属性。\n\n**清单 4-5.** 从 `Product` 类中移除一个属性\n\
  \n```\nclass Product {\n    var name:String;\n    var price:Double;\n    var stock:Int;\n\
  \    init(name:String, price:Double, stock:Int) {\n        self.name = name;\n \
  \       self.price = price;\n        self.stock = stock;\n    }\n}\n```\n\n清单 4-6\
  \ 展示了我在 `main.swift` 文件中做的相应修改。\n\n**清单 4-6.** 更新 `main.swift` 文件以反映 `Product` 类的变更\n\
  \n```\nvar products = [\n    Product(name: \"Kayak\", price: 275, stock: 10),\n\
  \    Product(name: \"Lifejacket\", price: 48.95, stock: 14),\n    Product(name:\
  \ \"Soccer Ball\", price: 19.5, stock: 32)];\n\nfunc calculateTax(product:Product)\
  \ -> Double {\n    return product.price * 0.2;\n}\n\nfunc calculateStockValue(productsArray:[Product])\
  \ -> Double {\n    return productsArray.reduce(0, {\n        (total, product) ->\
  \ Double in\n        return total + (product.price * Double(product.stock))\n  \
  \  });\n}\n\nprintln(\"Sales tax for Kayak: $\\(calculateTax(products[0]))\");\n\
  println(\"Total value of stock: $\\(calculateStockValue(products))\");\n```\n\n\
  我更新了用于创建 `Product` 类实例的语句，使其不再为 `description` 属性提供值。需要注意的重要一点是，我对 `Product` 类所做的修改完全不影响\
  \ `calculateTax` 和 `calculateStockValue` 这两个函数，这是因为类中的每个属性都是独立于其他属性进行定义和访问的，并且这两个函数都不依赖于\
  \ `description` 属性。\n\n使用类和结构体可以将变更的影响范围限制在直接受其影响的代码内，从而避免了在使用结构较松散的数据类型（例如元组）时可能出现的、大范围的连锁变更。\n\
  \n### 封装的好处\n\n使用类或结构体作为数据对象模板最重要的好处在于它对封装的支持。封装是面向对象编程的核心思想之一，其中有两个方面与本章相关。\n\n\
  第一个方面是，封装允许将数据值以及对这些值进行操作的逻辑组合到一个单独的组件中。将数据和逻辑结合起来可以使代码更易于阅读，因为与该数据类型相关的所有内容都定义在同一个位置。清单\
  \ 4-7 展示了如何更新 `Product` 类，使其包含一些逻辑。\n\n**清单 4-7.** 在 `Product.swift` 文件中添加逻辑\n\n\
  ```\nclass Product {\n    var name:String;\n    var price:Double;\n    var stock:Int;\n\
  \    init(name:String, price:Double, stock:Int) {\n        self.name = name;\n \
  \       self.price = price;\n        self.stock = stock;\n    }\n\n    func calculateTax(rate:\
  \ Double) -> Double {\n        return self.price * rate;\n    }\n\n    var stockValue:\
  \ Double {\n        get {\n            return self.price * Double(self.stock);\n\
  \        }\n    }\n}\n```\n\n我添加了一个 `calculateTax` 方法，它接受一个税率作为参数并用于计算销售税，同时还添加了一个\
  \ `stockValue` 计算属性，它实现了一个 getter 子句来计算库存总价值。为了反映这些变更，我更新了 `main.swift` 文件中操作 `Product`\
  \ 对象的代码语句，使其使用新的方法和属性，如清单 4-8 所示。\n\n**清单 4-8.** 更新 `main.swift` 文件中的代码\n\n```\n\
  var products = [\n    Product(name: \"Kayak\", price: 275, stock: 10),\n    Product(name:\
  \ \"Lifejacket\", price: 48.95, stock: 14),\n    Product(name: \"Soccer Ball\",\
  \ price: 19.5, stock: 32)];\n\nfunc calculateStockValue(productsArray:[Product])\
  \ -> Double {\n    return productsArray.reduce(0, {(total, product) -> Double in\n\
  \        return total + product.stockValue;\n    });\n}\n\nprintln(\"Sales tax for\
  \ Kayak: $\\(products[0].calculateTax(0.2))\");\nprintln(\"Total value of stock:\
  \ $\\(calculateStockValue(products))\");\n```\n\n这些看起来可能只是简单的改动，但发生了重要的事情：`Product`\
  \ 类现在拥有了一个公共表现和一个私有实现，如图 4-3 所示。\n\n![A978-1-4842-0394-1_4_Fig3_HTML.jpg](img/A978-1-4842-0394-1_4_Fig3_HTML.jpg)\n\
  \n**图 4-3.** `Product` 类的公共和私有方面\n\n公共表现是其他组件可以使用的 API。任何组件都可以获取或设置 `name`、`price`\
  \ 和 `stock` 属性的值，并以任何需要的方式使用它们。公共表现还包括 `stockValue` 属性和 `calculateTax` 方法，但——这是关键部分——不包括它们的实现。\n\
  \n**提示：** 不要将私有实现的概念与使用 `private` 关键字混淆。`private` 关键字限制了谁能使用类、方法或属性，但即使没有使用 `private`\
  \ 关键字，方法和计算属性的实现对于调用它的组件来说也是不可见的。\n\n在不暴露其实现的情况下展示属性或方法的能力，使得打破紧密耦合变得容易，因为其他组件不可能依赖于实现。例如，清单\
  \ 4-9 展示了如何更改 `calculateTax` 方法的实现来定义一个最高税额。由于计算是在 `Product` 对象的实现内部执行的，因此其他组件无法察觉这个变更，它们相信\
  \ `Product` 类知道如何执行其计算。\n\n**清单 4-9.** 更改 `Product.swift` 文件中的方法实现\n\n```\n...\n\
  \nfunc calculateTax(rate: Double) -> Double {\n    return min(10, self.price * rate);\n\
  }\n\n...\n```\n\n我使用了 Swift 标准库中的 `min` 函数将销售税额上限设定为 10 美元。我在清单 4-9 中只展示了 `calculateTax`\
  \ 方法，因为在 Playground 中无需更改任何其他代码语句来适应新的税额计算；变更发生在 `Product` 类的私有实现部分，其他组件无法与之建立依赖关系。运行应用程序会产生以下结果：\n\
  \n```\nSales tax for Kayak: $10.0\nTotal value of stock: $4059.3\n```\n\n\n\n###\
  \ 公开展示方式演进的益处\n\nSwift 的一个优良特性是，你可以随着应用程序的变化来逐步演进类的公开展示方式。就目前的情况而言，`stock` 属性是一个标准的存储属性，可以被设置为任何`Int`值，但库存中出现负数是不合理的，这样做还会影响由\
  \ `stockValue` 计算型属性返回的结果。\n\nSwift 允许我将 `stock` 存储属性无缝替换为一个计算型属性，该属性的实现可以强制执行验证策略，以确保库存水平永远不会低于零。清单\
  \ 4-10 展示了我为改变属性处理方式所做的修改。\n\n**清单 4-10.** 在 `Product.swift` 文件中添加计算型属性\n\n```\n\
  class Product {\n    var name:String;\n    var price:Double;\n    private var stockBackingValue:Int\
  \ = 0;\n    var stock:Int {\n        get {\n            return stockBackingValue;\n\
  \        }\n        set {\n            stockBackingValue = max(0, newValue);\n \
  \       }\n    }\n    init(name:String, price:Double, stock:Int) {\n        self.name\
  \ = name;\n        self.price = price;\n        self.stock = stock;\n    }\n   \
  \ func calculateTax(rate: Double) -> Double {\n        return min(10, self.price\
  \ * rate);\n    }\n    var stockValue: Double {\n        get {\n            return\
  \ self.price * Double(self.stock);\n        }\n    }\n}\n```\n\n我定义了一个支撑变量来保存 `stock`\
  \ 属性的值，并用一个带有 getter 和 setter 的计算型属性替换了存储属性 `stock`。getter 直接返回支撑属性的值（我将其命名为 `stockBackingValue`），而\
  \ setter 则使用标准库中的 `max` 函数，在尝试用负值设置该属性时，将支撑值设为零。这一修改的效果是，「Product」类的公开部分和私有部分都发生了变化，但这种变化不会影响使用该类的代码，如图\
  \ 4-4 所示。\n\n![A978-1-4842-0394-1_4_Fig4_HTML.jpg](img/A978-1-4842-0394-1_4_Fig4_HTML.jpg)\n\
  \n**图 4-4.** 将存储属性改为计算型属性的效果\n\n清单 4-11 展示了我对 `main.swift` 文件所做的修改，以检验新的验证属性。\n\n\
  **清单 4-11.** 在 `main.swift` 文件中检查验证\n\n```\nvar products = [\n    Product(name:\
  \ \"Kayak\", price: 275, stock: 10),\n    Product(name: \"Lifejacket\", price: 48.95,\
  \ stock: 14),\n    Product(name: \"Soccer Ball\", price: 19.5, stock: 32)];\n\n\
  func calculateStockValue(productsArray:[Product]) -> Double {\n    return productsArray.reduce(0,\
  \ {(total, product) -> Double in\n        return total + product.stockValue;\n \
  \   });\n}\n\nprintln(\"Sales tax for Kayak: $\\(products[0].calculateTax(0.2))\"\
  );\nprintln(\"Total value of stock: $\\(calculateStockValue(products))\");\nproducts[0].stock\
  \ = -50;\nprintln(\"Stock Level for Kayak: \\(products[0].stock)\");\n```\n\n我在\
  \ playground 末尾添加了两条语句，用来测试 `stock` 属性处理负值的能力，除此之外不需要其他任何修改。特别地，那些依赖于 `stock` 属性的代码语句，并不知道该属性已从存储属性变为计算型属性。以下是运行示例应用程序时产生的控制台输出：\n\
  \n```\nSales tax for Kayak: $10.0\nTotal value of stock: $4059.3\nStock Level for\
  \ Kayak: 0\n```\n\n最后一条消息展示了计算型属性的效果：我将 `stock` 属性设置为 `-50`，但获取属性值时，得到的是 `0`。\n\n\
  ## 理解该模式的陷阱\n\n使用此模式时需要避免的陷阱是选择了错误的模板类型，这通常意味着在更适合使用类的地方使用了结构体。Swift 的类和结构体有很多共同点，但在这种模式的上下文中有一个重要区别：结构体是值类型对象，而类是引用类型对象。我将在第\
  \ 5 章（描述原型模式时）更详细地解释这个区别。\n\n### Cocoa 中对象模板模式的示例\n\n由于这是一个非常基础的模式，类和结构体在 Cocoa\
  \ 框架及 Swift 内建类型中随处可见。诸如字符串、数组和字典等基本类型都是作为结构体实现的，而类则用于表示从网络连接到用户界面接口的各种事物。我不打算列出\
  \ iOS 和 Cocoa 框架中使用的所有类和结构体，但如果你想了解这个模式在 iOS 开发中的根深蒂固程度，可以看看我用来创建 SportsStore 应用程序的那些类。除了我在本章创建的\
  \ `Product` 类之外，我还使用了 `NSNumberFormatter` 来格式化货币字符串，使用 `UIViewController` 来管理应用程序呈现的视图，以及使用\
  \ `UILabel`、`UITextField` 和 `UIStepper` 等类来向用户展示布局组件。\n\n## 将模式应用于 SportsStore 应用\n\
  \n在本节中，我将创建并使用一个 `Product` 类，将其用于移除 SportsStore 应用中的元组。如果你没有按照第 3 章中的步骤说明进行操作，也无需担心；你可以从\
