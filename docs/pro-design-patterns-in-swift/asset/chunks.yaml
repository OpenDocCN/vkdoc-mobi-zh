    \ indexPath: NSIndexPath) -> UITableViewCell {\n    let product = productStore.products[indexPath.row];\n\
    \    let cell = tableView.dequeueReusableCellWithIdentifier(\"ProductCell\")\n\
    \        as ProductTableCell;\n    cell.product = productStore.products[indexPath.row];\n\
    \    cell.nameLabel.text = product.name;\n    cell.descriptionLabel.text = product.productDescription;\n\
    \    cell.stockStepper.value = Double(product.stockLevel);\n    cell.stockField.text\
    \ = String(product.stockLevel);\n    CellFormatter.createChain().formatCell(cell);\n\
    \    return cell;\n}\n...\n```\n\n您可以通过运行应用程序来查看应用格式化责任链的效果。效果虽然俗气，但清晰地显示了责任链中的哪个链节接受了每个表格单元格的责任，如图\
    \ 19-2 所示。\n\n![A978-1-4842-0394-1_19_Fig2_HTML.jpg](img/A978-1-4842-0394-1_19_Fig2_HTML.jpg)\n\
    \n**图 19-2.** 格式化表格单元格\n\n## 本章小结\n\n在本章中，我描述了责任链模式，并解释了如何使用它来找到一个愿意为请求承担责任的对象，同时隐藏了选择哪个对象以及选择方式的细节。在下一章中，我将介绍命令模式，该模式用于封装执行方法所需的细节。\n\
    \n# 20. 命令模式\n\n命令模式提供了一种机制，通过该机制可以封装如何调用方法的细节，以便稍后或由不同的组件调用该方法。表 20-1 将命令模式置于上下文中。\n\
    \n**表 20-1.** 将命令模式置于上下文中\n\n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？ | 命令模式用于封装在对象上调用方法的细节，其方式允许在不同时间或由不同组件调用该方法。\
    \ |\n| 有哪些好处？ | 有很多情况下使用命令是有用的，但最常见的是支持撤销操作和创建宏。 |\n| 何时应该使用此模式？ | 当你希望允许那些对将要使用的对象、将要调用的方法或将要提供的参数一无所知的组件调用方法时，请使用此模式。\
    \ |\n| 何时应避免使用此模式？ | 不要将此模式用于常规的方法调用。 |\n| 如何知道正确实现了该模式？ | 当组件可以使用命令在对象上调用方法，而无需了解该对象或方法本身的细节时，就说明该模式被正确实现了。\
    \ |\n| 有哪些常见的陷阱？ | 主要的陷阱是要求执行命令的组件了解将要使用的方法或对象。 |\n| 有哪些相关的模式？ | 备忘录模式提供了一种模型，可以用对象整个状态的快照来代替单个操作。\
    \ |\n\n## 准备示例项目\n\n为了演示命令模式，我创建了一个名为 Command 的 Xcode OS X 命令行工具项目。我添加了一个名为 `Calculator.swift`\
    \ 的文件，其内容如清单 20-1 所示。\n\n**清单 20-1.** `Calculator.swift` 文件的内容\n\n```\nclass Calculator\
    \ {\n    private(set) var total = 0;\n\n    func add(amount:Int) {\n        total\
    \ += amount;\n    }\n\n    func subtract(amount:Int) {\n        total -= amount;\n\
    \    }\n\n    func multiply(amount:Int) {\n        total = total * amount;\n \
    \   }\n\n    func divide(amount:Int) {\n        total = total / amount;\n    }\n\
    }\n```\n\n`Calculator` 类定义了一个名为 `total` 的存储型 `Int` 属性，其值通过调用 `add`、`subtract`、`multiply`\
    \ 和 `divide` 方法来更改。清单 20-2 显示了我添加到 `main.swift` 文件中的代码，该代码使用 `Calculator` 类来确定多个运算产生的值。\n\
    \n**清单 20-2.** `main.swift` 文件的内容\n\n```\nlet calc = Calculator();\ncalc.add(10);\n\
    calc.multiply(4);\ncalc.subtract(2);\nprintln(\"Total: \\(calc.total)\");\n```\n\
    \n运行应用程序会产生以下输出：\n\n```\nTotal: 38\n```\n"
- fmt: "# Understanding the Problem That the Pattern Solves\n\nThe problem that the\
    \ command pattern solves arises when you need to package a method invocation as\
    \ an object so that it can be performed at a later date or be performed by another\
    \ component without that component needing details of the method that will be\
    \ invoked or the object that it will be invoked on.\n\nImagine that you are building\
    \ an application where two components perform operations on the same object, such\
    \ as an instance of the `Calculator` class I defined in the example application.\
    \ Figure [20-1](#A978-1-4842-0394-1_20_Chapter.html#Fig1) shows the basic structure\
    \ of the application, where each component invokes methods that update the `Calculator`\
    \ total.\n\n![A978-1-4842-0394-1_20_Fig1_HTML.jpg](A978-1-4842-0394-1_20_Fig1_HTML.jpg)\n\
    \nFigure 20-1. Two components performing operations on a common object\n\nNow\
    \ imagine that you need to implement support for undoing previous operations.\
    \ One way to implement this is to have each component keep track of the operations\
    \ it has performed so they can be undone in the future. The problem is that each\
    \ component is unaware of the operations the other component has performed, and\
    \ applying an undo operation without this information can corrupt the state of\
    \ the shared object because the operations will be reversed in the wrong order.\n\
    \nI could get the components to coordinate with each other, but that just creates\
    \ couplings between components and complicates the design of the application.\
    \ What I require is a way to express undo operations independently of the components\
    \ that performed them so that I can invoke them in a controlled way to gradually\
    \ roll back the state of the shared object, and that, of course, is where the\
    \ command pattern can help.\n\n# Understanding the Command Pattern\n\nThe command\
    \ pattern represents a method invocation as an object so that it can be used to\
    \ solve the undo problem and a range of related problems I describe in the “Variations\
    \ on the Command Pattern” section. Figure [20-2](#A978-1-4842-0394-1_20_Chapter.html#Fig2)\
    \ illustrates the command pattern.\n\n![A978-1-4842-0394-1_20_Fig2_HTML.jpg](A978-1-4842-0394-1_20_Fig2_HTML.jpg)\n\
    \nFigure 20-2. The command pattern\n\nThe heart of the command pattern is the\
    \ command object, more often referred to simply as the command. Within its private\
    \ implementation, the command has references to a receiver object and instructions\
    \ about how to invoke a method on the receiver. In the context of the example\
    \ application, the receiver object would be an instance of the `Calculator` class,\
    \ and the method invocation instructions would include details of which `Calculator`\
    \ method should be invoked (`add`, `subtract`, `multiply`, or `divide`) and the\
    \ value for the method parameter.\n\nThe receiver and the invocation instructions\
    \ are private and cannot be accessed by components that use the command. The only\
    \ publically accessible facet of a command object is an execution method that\
    \ is invoked by a calling component when the method invocation instructions should\
    \ be executed on the receiver object (that is, call the specified method with\
    \ the specified parameter values). In the language of the command pattern, the\
    \ calling component is known as the invoker because it invokes the execution method.\n\
    \nDon’t worry if this seems overly abstract. The command pattern is used in such\
    \ a wide range of situations that it really begins to make sense only when you\
    \ see it in context. The important point to note is that the method invocation\
    \ instructions are not performed on the receiver object until the invoker calls\
    \ the execution method. If you keep that in mind, everything else will fall into\
    \ place when you see how the pattern is implemented.\n\n# Implementing the Command\
    \ Pattern\n\nFor most people, the easiest way to understand the command pattern\
    \ is to use it to solve a specific problem. In the sections that follow, I apply\
    \ the pattern to create an undo facility for my example application. You may need\
    \ to read through the implementation steps a couple of times to make sense of\
    \ how the pattern fits together, but stick with it because the command pattern\
    \ is worth taking the time to understand.\n\n## Defining the Command Protocol\n\
    \nThe starting point for the command pattern is to define the protocol that provides\
    \ invokers with an execution method. Listing 20-3 shows the contents of the `Commands.swift`\
    \ file, which I added to the example project.\n\nListing 20-3. The Contents of\
    \ the Commands.swift File\n\n```\nprotocol Command {\n\n    func execute();\n\n\
    }\n```\n\nA command allows the invoker to execute the command but not to see details\
    \ of the receiver object or the instructions for invoking a method. To that end,\
    \ the `Command` protocol I have defined in the listing defines an `execute` method\
    \ but does not reveal any other details.\n\n> **Tip:** The convention is to use\
    \ the name `execute` for the execution method, but you can use any name that you\
    \ prefer.\n\n## Defining the Command Implementation Class\n\nThe implementation\
    \ class for the command pattern is simple to implement in Swift because the instructions\
    \ for executing the receiver method can be expressed as a closure. Listing 20-4\
    \ shows the implementation class that I defined for the example project.\n\nListing\
    \ 20-4. Defining the Command Implementation Class in the Commands.swift File\n\
    \n```\nprotocol Command {\n\n    func execute();\n\n}\n\nclass GenericCommand<T>\
    \ : Command {\n\n    private var receiver: T;\n    private var instructions: T\
    \ -> Void;\n\n    init(receiver:T, instructions: T -> Void) {\n        self.receiver\
    \ = receiver; self.instructions = instructions;\n    }\n\n    func execute() {\n\
    \        instructions(receiver);\n    }\n\n    class func createCommand(receiver:T,\
    \ instuctions: T -> Void) -> Command {\n        return GenericCommand(receiver:\
    \ receiver, instructions: instuctions);\n    }\n\n}\n```\n\nI have defined a generic\
    \ implementation class called `GenericCommand` that defines private properties\
    \ that store the receiver object and the invocation instructions. The class conforms\
    \ to the `Command` protocol, and the `execute` method invokes the execution instruction\
    \ on the receiver object. I have also defined, simply as a convenience, a class\
    \ method called `createCommand` that creates instances of `GenericCommand`."
  raw: '## Understanding the Problem That the Pattern Solves


    The problem that the command pattern solves arises when you need to package a
    method invocation as an object so that it can be performed at a later date or
    be performed by another component without that component needing details of the
    method that will be invoked or the object that it will be invoked on.


    Imagine that you are building an application where two components perform operations
    on the same object, such as an instance of the `Calculator` class I defined in
    the example application. Figure [20-1](#A978-1-4842-0394-1_20_Chapter.html#Fig1)
    shows the basic structure of the application, where each component invokes methods
    that update the `Calculator` total.


    ![A978-1-4842-0394-1_20_Fig1_HTML.jpg](A978-1-4842-0394-1_20_Fig1_HTML.jpg)


    Figure 20-1.


    Two components performing operations on a common object


    Now imagine that you need to implement support for undoing previous operations.
    One way to implement this is to have each component keep track of the operations
    it has performed so they can be undone in the future. The problem is that each
    component is unaware of the operations the other component has performed, and
    applying an undo operation without this information can corrupt the state of the
    shared object because the operations will be reversed in the wrong order.


    I could get the components to coordinate with each other, but that just creates
    couplings between components and complicates the design of the application. What
    I require is a way to express undo operations independently of the components
    that performed them so that I can invoke them in a controlled way to gradually
    roll back the state of the shared object, and that, of course, is where the command
    pattern can help.


    ## Understanding the Command Pattern


    The command pattern represents a method invocation as an object so that it can
    be used to solve the undo problem and a range of related problems I describe in
    the “Variations on the Command Pattern” section. Figure [20-2](#A978-1-4842-0394-1_20_Chapter.html#Fig2)
    illustrates the command pattern.


    ![A978-1-4842-0394-1_20_Fig2_HTML.jpg](A978-1-4842-0394-1_20_Fig2_HTML.jpg)


    Figure 20-2.


    The command pattern


    The heart of the command pattern is the command object, more often referred to
    simply as the command. Within its private implementation, the command has references
    to a receiver objectand instructions about how to invoke a method on the receiver.
    In the context of the example application, the receiver object would be an instance
    of the `Calculator` class, and the method invocation instructions would include
    details of which `Calculator` method should be invoked (`add`, `subtract`, `multiply`,
    or `divide`) and the value for the method parameter.


    The receiver and the invocation instructions are private and cannot be accessed
    by components that use the command. The only publically accessible facet of a
    command object is an execution methodthat is invoked by a calling component when
    the method invocation instructions should be executed on the receiver object (that
    is, call the specified method with the specified parameter values). In the language
    of the command pattern, the calling component is known as the invokerbecause it
    invokes the execution method.


    Don’t worry if this seems overly abstract. The command pattern is used in such
    a wide range of situations that it really begins to make sense only when you see
    it in context. The important point to note is that the method invocation instructions
    are not performed on the receiver object until the invoker calls the execution
    method. If you keep that in mind, everything else will fall into place when you
    see how the pattern is implemented.


    ## Implementing the Command Pattern


    For most people, the easiest way to understand the command pattern is to use it
    to solve a specific problem. In the sections that follow, I apply the pattern
    to create an undo facility for my example application. You may need to read through
    the implementation steps a couple of times to make sense of how the pattern fits
    together, but stick with it because the command pattern is worth taking the time
    to understand.


    ### Defining the Command Protocol


    The starting point for the command pattern is to define the protocol that provides
    invokers with an execution method. Listing 20-3 shows the contents of the `Commands.swift`
    file, which I added to the example project.


    Listing 20-3. The Contents of the Commands.swift File


    `protocol Command {`


    `func execute();`


    `}`


    A command allows the invoker to execute the command but not to see details of
    the receiver object or the instructions for invoking a method. To that end, the
    `Command` protocol I have defined in the listing defines an `execute` method but
    does not reveal any other details.


    Tip


    The convention is to use the name `execute` for the execution method, but you
    can use any name that you prefer.


    ### Defining the Command Implementation Class


    The implementation class for the command pattern is simple to implement in Swift
    because the instructions for executing the receiver method can be expressed as
    a closure. Listing 20-4 shows the implementation class that I defined for the
    example project.


    Listing 20-4. Defining the Command Implementation Class in the Commands.swift
    File


    `protocol Command {`


    `func execute();`


    `}`


    `class GenericCommand<T> : Command {`


    `private var receiver: T;`


    `private var instructions: T -> Void;`


    `init(receiver:T, instructions: T -> Void) {`


    `self.receiver = receiver; self.instructions = instructions;`


    `}`


    `func execute() {`


    `instructions(receiver);`


    `}`


    `class func createCommand(receiver:T, instuctions: T -> Void) -> Command {`


    `return GenericCommand(receiver: receiver, instructions: instuctions);`


    `}`


    `}`


    I have defined a generic implementation class called `GenericCommand` that defines
    private properties that store the receiver object and the invocation instructions.
    The class conforms to the `Command` protocol, and the `execute` method invokes
    the execution instruction on the receiver object. I have also defined, simply
    as a convenience, a class method called `createCommand` that creates instances
    of `GenericCommand`.'
  trans: "\n# 理解该模式所解决的问题\n\n当需要将方法调用封装成对象，以便能够在日后执行或由其他组件执行，且无需该组件了解被调用方法及其所属对象的细节时，就会产生命令模式所要解决的问题。\n\
    \n假设你正在构建一个应用程序，其中两个组件对同一个对象执行操作，比如我在示例应用中定义的 `Calculator` 类实例。图 20-1 展示了该应用的基本结构，其中每个组件都调用更新\
    \ `Calculator` 总值的方法。\n\n![A978-1-4842-0394-1_20_Fig1_HTML.jpg](img/A978-1-4842-0394-1_20_Fig1_HTML.jpg)\n\
    \n图 20-1. 两个组件对同一个公共对象执行操作\n\n现在假设你需要实现撤销先前操作的功能。一种实现方法是让每个组件跟踪自己已执行的操作，以便将来能够撤销。问题在于，每个组件并不知道另一个组件执行了哪些操作，而在缺少这一信息的情况下执行撤销操作，可能会破坏共享对象的状态，因为操作会以错误的顺序被撤销。\n\
    \n我本可以让这些组件相互协调，但这只会造成组件间的耦合，并使应用程序的设计复杂化。我需要的是：一种独立于执行操作的组件来表达撤销操作的方式，以便能够以可控的方式调用它们，逐步回滚共享对象的状态。而这，正是命令模式可以发挥作用的地方。\n\
    \n# 理解命令模式\n\n命令模式将方法调用表示为一个对象，从而可以用来解决撤销问题以及我在“命令模式的变体”一节中描述的一系列相关问题。图 20-2 展示了命令模式。\n\
    \n![A978-1-4842-0394-1_20_Fig2_HTML.jpg](img/A978-1-4842-0394-1_20_Fig2_HTML.jpg)\n\
    \n图 20-2. 命令模式\n\n命令模式的核心是命令对象，通常简称为命令。在它的内部实现中，命令持有对接收者对象的引用，以及关于如何在接收者上调用方法的指令。在示例应用的上下文中，接收者对象就是\
    \ `Calculator` 类的一个实例，而方法调用指令则包含应调用哪个 `Calculator` 方法（`add`、`subtract`、`multiply`\
    \ 或 `divide`）以及方法参数的值的详细信息。\n\n接收者和调用指令是私有的，使用命令的组件无法访问它们。命令对象唯一公开的方面是一个执行方法，当需要对接收者对象执行方法调用指令时（即，使用指定的参数值调用指定的方法），调用组件会调用该方法。用命令模式的术语来说，调用组件被称为调用者，因为它会调用执行方法。\n\
    \n如果这看起来过于抽象，不必担心。命令模式应用场景非常广泛，只有在具体情境中才能真正理解它。需要牢记的重要一点是：在调用者调用执行方法之前，方法调用指令并不会在接收者对象上执行。如果你记住了这一点，那么在看到该模式如何实现时，其他一切就都水到渠成了。\n\
    \n# 实现命令模式\n\n对大多数人来说，理解命令模式最简单的方法就是用它来解决一个具体问题。在接下来的几节中，我将应用该模式为我的示例应用创建一个撤销功能。你可能需要阅读实现步骤好几次才能理解模式是如何组合在一起的，但请坚持下去，因为命令模式值得花时间去理解。\n\
    \n## 定义命令协议\n\n命令模式的起点是定义一个协议，该协议为调用者提供一个执行方法。清单 20-3 展示了 `Commands.swift` 文件的内容，我已将其添加到示例项目中。\n\
    \n清单 20-3. Commands.swift 文件的内容\n\n```\nprotocol Command {\n\n    func execute();\n\
    \n}\n```\n\n命令允许调用者执行它，但不能看到接收者对象或调用方法的指令的细节。为此，清单中定义的 `Command` 协议定义了一个 `execute`\
    \ 方法，但没有透露任何其他细节。\n\n> **提示：** 通常约定使用 `execute` 作为执行方法的名称，但你可以使用任何你喜欢的名称。\n\n\
    ## 定义命令实现类\n\n命令模式的实现类在 Swift 中很容易实现，因为执行接收者方法的指令可以表示为一个闭包。清单 20-4 展示了我为示例项目定义的实现类。\n\
    \n清单 20-4. 在 Commands.swift 文件中定义命令实现类\n\n```\nprotocol Command {\n\n    func\
    \ execute();\n\n}\n\nclass GenericCommand<T> : Command {\n\n    private var receiver:\
    \ T;\n    private var instructions: T -> Void;\n\n    init(receiver:T, instructions:\
    \ T -> Void) {\n        self.receiver = receiver; self.instructions = instructions;\n\
    \    }\n\n    func execute() {\n        instructions(receiver);\n    }\n\n   \
    \ class func createCommand(receiver:T, instuctions: T -> Void) -> Command {\n\
    \        return GenericCommand(receiver: receiver, instructions: instuctions);\n\
    \    }\n\n}\n```\n\n我定义了一个名为 `GenericCommand` 的泛型实现类，该类定义了存储接收者对象和调用指令的私有属性。该类遵循\
    \ `Command` 协议，`execute` 方法在接收者对象上执行调用指令。我还定义了一个名为 `createCommand` 的类方法（仅作为便利方法），用于创建\
    \ `GenericCommand` 的实例。\n"
- fmt: "### Applying the Command Pattern\n\nTo apply the command pattern, I have extended\
    \ the `Calculator` class so that it generates an array of `Command` objects that\
    \ form the sequence of past undo operations. Listing 20-5 shows the changes I\
    \ made.\n\n**Listing 20-5.** Adding Undo Support in the `Calculator.swift` File\n\
    \n```swift\nclass Calculator {\n    private(set) var total = 0;\n    private var\
    \ history = [Command]();\n\n    func add(amount:Int) {\n        addUndoCommand(Calculator.subtract,\
    \ amount: amount);\n        total += amount;\n    }\n\n    func subtract(amount:Int)\
    \ {\n        addUndoCommand(Calculator.add, amount: amount);\n        total -=\
    \ amount;\n    }\n\n    func multiply(amount:Int) {\n        addUndoCommand(Calculator.divide,\
    \ amount: amount);\n        total = total * amount;\n    }\n\n    func divide(amount:Int)\
    \ {\n        addUndoCommand(Calculator.multiply, amount: amount);\n        total\
    \ = total / amount;\n    }\n\n    private func addUndoCommand(method:Calculator\
    \ -> Int -> Void, amount:Int) {\n        self.history.append(GenericCommand<Calculator>.createCommand(self,\n\
    \            instuctions: {calc in\n                method(calc)(amount);\n  \
    \          }));\n    }\n\n    func undo() {\n        if self.history.count > 0\
    \ {\n            self.history.removeLast().execute();\n            // temporary\
    \ measure - executing the command adds to the history\n            self.history.removeLast();\n\
    \        }\n    }\n}\n```\n\n> **Tip**  \n> In this example, the receiver executes\
    \ commands on itself. This is not a requirement of the command pattern, as I demonstrate\
    \ in the “Variations on the Command Pattern” section.\n\nEach of the four operation\
    \ methods (`add`, `subtract`, and so on) calls the `addUndoCommand` method, passing\
    \ in the method that will undo the operation and the amount that should be passed\
    \ as the argument to that method. The `addUndoCommand` method creates the `Command`\
    \ object and adds it to an array called `history`. I have also defined an `undo`\
    \ method that removes the most recent `Command` from the `history` array and executes\
    \ it, returning the `Calculator` object to an earlier state. Executing an undo\
    \ `Command` causes a new `Command` to be added to the history, which is not the\
    \ effect I want to create. For that reason, I remove and discard the last item\
    \ in the `history` array after executing a `Command` in the `undo` method. This\
    \ is a temporary measure that I remove in the next section.\n\n### Working with\
    \ Method References\n\nIn Listing 20-5, I pass references to methods as arguments\
    \ to the `addUndoCommand` method, like this:\n\n```\n...\naddUndoCommand(Calculator.add,\
    \ amount: amount);\n...\n```\n\nThe first argument is a reference to the `add`\
    \ method defined by the `Calculator` class. To receive this reference, I defined\
    \ the `addUndoCommand` signature like this:\n\n```\n...\nprivate func addUndoCommand(method:Calculator\
    \ -> Int -> Void, amount:Int) {\n...\n```\n\nThe parameter called `method` is\
    \ defined as a function that takes a `Calculator` object and that returns another\
    \ function. The second function takes an `Int` and doesn’t return a result. This\
    \ can be confusing, but it relates to the way that Swift instance methods are\
    \ implemented behind the scenes. Consider the following code:\n\n```swift\nclass\
    \ Printer {\n    func printMessage(message:String) {\n        println(message);\n\
    \    }\n}\n\nlet printerObject = Printer();\nprinterObject.printMessage(\"Hello\"\
    );\n```\n\nI have defined a class called `Printer` that has a `printMessage` method.\
    \ To use the `Printer` class, I create a new instance and then use that instance\
    \ to call the method. The structure of the final statement is this:\n\n```\n<object\
    \ reference>.<instance method name>(<argument value>)\n```\n\nThis is the normal\
    \ way of invoking a method, but there is an alternative:\n\n```\n...\nPrinter.printMessage(printerObject)(\"\
    Hello\");\n...\n```\n\nThis has the same effect as calling the method via the\
    \ object reference. Here is the structure of this technique:\n\n```\n<class>.<instance\
    \ method name>(<object reference>)(<argument value>)\n```\n\nCurrying is the process\
    \ of creating one function that fixes one or more arguments passed to another\
    \ function. In this case, the first function returns a curried function that invokes\
    \ the instance method on the specified object. The advantage of this approach\
    \ is that the object reference is passed as an argument to the first function,\
    \ which means that I can select the receiver for my commands dynamically and pass\
    \ around references to methods as objects—something that becomes important when\
    \ you want to change the receiver that a command targets (see the “Variations\
    \ on the Command Pattern” section for an example).\n\n### Applying Concurrent\
    \ Protections\n\nThe problem that I described at the start of this chapter included\
    \ multiple components operating on a single `Calculator` object, and now that\
    \ I have an array in the `Calculator` class, I need to add concurrency protection\
    \ to avoid data protection. Listing 20-6 shows how I have used Grand Central Dispatch\
    \ to serialize access to the `history` array.\n\n**Listing 20-6.** Applying Concurrency\
    \ Protections in the `Calculator.swift` File\n\n```swift\nimport Foundation;\n\
    \nclass Calculator {\n    private(set) var total = 0;\n    private var history\
    \ = [Command]();\n    private var queue = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    private var performingUndo = false;\n\n    func add(amount:Int) {\n     \
    \   addUndoCommand(Calculator.subtract, amount: amount);\n        total += amount;\n\
    \    }\n\n    func subtract(amount:Int) {\n        addUndoCommand(Calculator.add,\
    \ amount: amount);\n        total -= amount;\n    }\n\n    func multiply(amount:Int)\
    \ {\n        addUndoCommand(Calculator.divide, amount: amount);\n        total\
    \ = total * amount;\n    }\n\n    func divide(amount:Int) {\n        addUndoCommand(Calculator.multiply,\
    \ amount: amount);\n        total = total / amount;\n    }\n\n    private func\
    \ addUndoCommand(method:Calculator -> Int -> Void, amount:Int) {\n        if (!performingUndo)\
    \ {\n            dispatch_sync(self.queue, {() in\n                self.history.append(GenericCommand<Calculator>.createCommand(self,\n\
    \                    instuctions: {calc in\n                        method(calc)(amount);\n\
    \                    }));\n            });\n        }\n    }\n\n    func undo()\
    \ {\n        dispatch_sync(self.queue, {() in\n            if self.history.count\
    \ > 0 {\n                self.performingUndo = true;\n                self.history.removeLast().execute();\n\
    \                self.performingUndo = false;\n            }\n        });\n  \
    \  }\n}\n```\n\n> **Note**  \n> You don’t have to add concurrency protection when\
    \ implementing the command pattern, but I recommend that you at least consider\
    \ it. As an application matures, the number of components that executes commands\
    \ on a receiver may grow, increasing the chances of concurrent access and data\
    \ corruption.\n\nI have created a serial queue, and I use the `dispatch_sync`\
    \ method in the `addUndoCommand` and `undo` methods to ensure that the `history`\
    \ array is not modified concurrently. I have defined a variable called `performingUndo`\
    \ that I set when executing an undo `Command` to prevent the `addUndoCommand`\
    \ method from adding another command to the `history` array when called from one\
    \ of the operation methods.\n\n> **Tip**  \n> Using a variable to signal whether\
    \ I am executing an undo command prevents the application from locking up. Grand\
    \ Central Dispatch doesn’t support recursive locking, which means that the application\
    \ freezes if I call a method that invokes the `dispatch_sync` function from inside\
    \ a block that was also placed in the queue with the `dispatch_sync` function.\
    \ The second call to `dispatch_async` blocks until the first call completes, which\
    \ doesn’t happen because the first call is waiting for the second one, a classic\
    \ concurrency mistake."
  raw: '### Applying the Command Pattern


    To apply the command pattern, I have extended the `Calculator` class so that it
    generates an array of `Command` objects that form the sequence of past undo operations.
    Listing 20-5 shows the changes I made.


    Listing 20-5. Adding Undo Support in the Calculator.swift File


    `class Calculator {`


    `private(set) var total = 0;`


    `private var history = [Command]();`


    `func add(amount:Int) {`


    `addUndoCommand(Calculator.subtract, amount: amount);`


    `total += amount;`


    `}`


    `func subtract(amount:Int) {`


    `addUndoCommand(Calculator.add, amount: amount);`


    `total -= amount;`


    `}`


    `func multiply(amount:Int) {`


    `addUndoCommand(Calculator.divide, amount: amount);`


    `total = total * amount;`


    `}`


    `func divide(amount:Int) {`


    `addUndoCommand(Calculator.multiply, amount: amount);`


    `total = total / amount;`


    `}`


    `private func addUndoCommand(method:Calculator -> Int -> Void, amount:Int) {`


    `self.history.append(GenericCommand<Calculator>.createCommand(self,`


    `instuctions: {calc in`


    `method(calc)(amount);`


    `}));`


    `}`


    `func undo() {`


    `if self.history.count > 0 {`


    `self.history.removeLast().execute();`


    `// temporary measure - executing the command adds to the history`


    `self.history.removeLast();`


    `}`


    `}`


    `}`


    Tip


    In this example, the receiver executes commands on itself. This is not a requirement
    of the command pattern, as I demonstrate in the “Variations on the Command Pattern”
    section.


    Each of the four operation methods (`add`, `subtract`, and so on) calls the `addUndoCommand`
    method, passing in the method that will undo the operation and the amount that
    should be passed as the argument to that method. The `addUndoCommand` method creates
    the `Command` object and adds it to an array called `history`. I have also defined
    an `undo` method that removes the most recent `Command` from the `history` array
    and executes it, returning the `Calculator` object to an earlier state. Executing
    an undo `Command` causes a new `Command` to be added to the history, which is
    not the effect I want to create. For that reason, I remove and discard the last
    item in the `history` array after executing a `Command` in the `undo` method.
    This is a temporary measure that I remove in the next section.


    WORKING WITH METHOD REFERENCES


    In Listing 20-5, I pass references to methods as arguments to the `addUndoCommand`
    method, like this:


    `...`


    `addUndoCommand(` `Calculator.add` `, amount: amount);`


    `...`


    The first argument is a reference to the `add` method defined by the `Calculator`
    class. To receive this reference, I defined the `addUndoCommand` signature like
    this:


    `...`


    `private func addUndoCommand(` `method:Calculator -> Int -> Void` `, amount:Int)
    {`


    `...`


    The parameter called `method` is defined as a function that takes a `Calculator`
    object and that returns another function. The second function takes an `Int` and
    doesn’t return a result. This can be confusing, but it relates to the way that
    Swift instance methods are implemented behind the scenes. Consider the following
    code:


    `class Printer {`


    `func printMessage(message:String) {`


    `println(message);`


    `}`


    `}`


    `let printerObject = Printer();`


    `printerObject.printMessage("Hello");`


    I have defined a class called `Printer` that has a `printMessage` method. To use
    the `Printer` class, I create a new instance and then use that instance to call
    the method. The structure of the final statement is this:


    `<object reference>.<instance method name>(<argument value>)`


    This is the normal way of invoking a method, but there is an alternative:


    `...`


    `Printer.printMessage(printerObject)("Hello");`


    `...`


    This has the same effect as calling the method via the object reference. Here
    is the structure of this technique:


    `<class>.<instance method name>(<object reference>)(<argument value>)`


    Currying is the process of creating one function that fixes one or more arguments
    passed to another function. In this case, the first function returns a curried
    function that invokes the instance method on the specified object. The advantage
    of this approach is that the object reference is passed as an argument to the
    first function, which means that I can select the receiver for my commands dynamically
    and pass around references to methods as objects—something that becomes important
    when you want to change the receiver that a command targets (see the “Variations
    on the Command Pattern” section for an example).


    ### Applying Concurrent Protections


    The problem that I described at the start of this chapter included multiple components
    operating on a single `Calculator` object, and now that I have an array in the
    `Calculator` class, I need to add concurrency protection to avoid data protection.
    Listing 20-6 shows how I have used Grand Central Dispatch to serialize access
    to the `history` array.


    Listing 20-6. Applying Concurrency Protections in the Calculator.swift File


    `import Foundation;`


    `class Calculator {`


    `private(set) var total = 0;`


    `private var history = [Command]();`


    `private var queue = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_SERIAL);`


    `private var performingUndo = false;`


    `func add(amount:Int) {`


    `addUndoCommand(Calculator.subtract, amount: amount);`


    `total += amount;`


    `}`


    `func subtract(amount:Int) {`


    `addUndoCommand(Calculator.add, amount: amount);`


    `total -= amount;`


    `}`


    `func multiply(amount:Int) {`


    `addUndoCommand(Calculator.divide, amount: amount);`


    `total = total * amount;`


    `}`


    `func divide(amount:Int) {`


    `addUndoCommand(Calculator.multiply, amount: amount);`


    `total = total / amount;`


    `}`


    `private func addUndoCommand(method:Calculator -> Int -> Void, amount:Int) {`


    `if (!performingUndo) {`


    `dispatch_sync(self.queue, {() in`


    `self.history.append(GenericCommand<Calculator>.createCommand(self,`


    `instuctions: {calc in`


    `method(calc)(amount);`


    `}));`


    `});`


    `}`


    `}`


    `func undo() {`


    `dispatch_sync(self.queue, {() in`


    `if self.history.count > 0 {`


    `self.performingUndo = true;`


    `self.history.removeLast().execute();`


    `self.performingUndo = false;`


    `}`


    `});`


    `}`


    `}`


    Note


    You don’t have to add concurrency protection when implementing the command pattern,
    but I recommend that you at least consider it. As an application matures, the
    number of components that executes commands on a receiver may grow, increasing
    the chances of concurrent access and data corruption.


    I have created a serial queue, and I use the `dispatch_` `sync`method in the `addUndoCommand`
    and `undo` methods to ensure that the `history` array is not modified concurrently.
    I have defined a variable called `performingUndo` that I set when executing an
    undo `Command` to prevent the `addUndoCommand` method from adding another command
    to the `history` array when called from one of the operation methods.


    Tip


    Using a variable to signal whether I am executing an undo command prevents the
    application from locking up. Grand Central Dispatch doesn’t support recursive
    locking, which means that the application freezes if I call a method that invokes
    the `dispatch_sync` function from inside a block that was also placed in the queue
    with the `dispatch_sync` function. The second call to `dispatch_async` blocks
    until the first call completes, which doesn’t happen because the first call is
    waiting for the second one, a classic concurrency mistake.'
  trans: "\n### 应用命令模式\n\n为了应用命令模式，我扩展了 `Calculator` 类，使其能生成一个由 `Command` 对象组成的数组，这些对象构成了过去撤消操作的序列。代码清单\
    \ 20-5 显示了我所做的修改。\n\n**代码清单 20-5.** 在 `Calculator.swift` 文件中添加撤消支持\n\n```swift\n\
    class Calculator {\n    private(set) var total = 0;\n    private var history =\
    \ [Command]();\n\n    func add(amount:Int) {\n        addUndoCommand(Calculator.subtract,\
    \ amount: amount);\n        total += amount;\n    }\n\n    func subtract(amount:Int)\
    \ {\n        addUndoCommand(Calculator.add, amount: amount);\n        total -=\
    \ amount;\n    }\n\n    func multiply(amount:Int) {\n        addUndoCommand(Calculator.divide,\
    \ amount: amount);\n        total = total * amount;\n    }\n\n    func divide(amount:Int)\
    \ {\n        addUndoCommand(Calculator.multiply, amount: amount);\n        total\
    \ = total / amount;\n    }\n\n    private func addUndoCommand(method:Calculator\
    \ -> Int -> Void, amount:Int) {\n        self.history.append(GenericCommand<Calculator>.createCommand(self,\n\
    \            instuctions: {calc in\n                method(calc)(amount);\n  \
    \          }));\n    }\n\n    func undo() {\n        if self.history.count > 0\
    \ {\n            self.history.removeLast().execute();\n            // 临时措施 - 执行命令会添加到历史记录中\n\
    \            self.history.removeLast();\n        }\n    }\n}\n```\n\n> **提示**\
    \  \n> 在此示例中，接收者对自己执行命令。这并不是命令模式的要求，我将在“命令模式的变体”一节中演示这一点。\n\n四个操作方法（`add`、`subtract`\
    \ 等）中的每一个都调用了 `addUndoCommand` 方法，传入了用于撤消该操作的方法以及应作为参数传递给该方法的数值。`addUndoCommand`\
    \ 方法会创建 `Command` 对象，并将其添加到一个名为 `history` 的数组中。我还定义了一个 `undo` 方法，该方法从 `history`\
    \ 数组中移除最近的 `Command` 并执行它，从而使 `Calculator` 对象恢复到较早的状态。执行撤消 `Command` 会导致一个新的 `Command`\
    \ 被添加到历史记录中，这不是我想要的效果。因此，在 `undo` 方法中执行 `Command` 之后，我会移除并丢弃 `history` 数组中的最后一项。这是一个临时措施，我将在下一节中移除它。\n\
    \n### 使用方法引用\n\n在代码清单 20-5 中，我将方法引用作为参数传递给 `addUndoCommand` 方法，如下所示：\n\n```\n\
    ...\naddUndoCommand(Calculator.add, amount: amount);\n...\n```\n\n第一个参数是对 `Calculator`\
    \ 类定义的 `add` 方法的引用。为了接收这个引用，我这样定义了 `addUndoCommand` 的签名：\n\n```\n...\nprivate\
    \ func addUndoCommand(method:Calculator -> Int -> Void, amount:Int) {\n...\n```\n\
    \n名为 `method` 的参数被定义为一个函数，该函数接受一个 `Calculator` 对象并返回另一个函数。第二个函数接受一个 `Int` 并且不返回结果。这可能会令人困惑，但这是由\
    \ Swift 实例方法在幕后实现的方式决定的。考虑以下代码：\n\n```swift\nclass Printer {\n    func printMessage(message:String)\
    \ {\n        println(message);\n    }\n}\n\nlet printerObject = Printer();\nprinterObject.printMessage(\"\
    Hello\");\n```\n\n我定义了一个名为 `Printer` 的类，它有一个 `printMessage` 方法。要使用 `Printer` 类，我需要创建一个新实例，然后用这个实例来调用方法。最后一条语句的结构如下：\n\
    \n```\n<对象引用>.<实例方法名>(<参数值>)\n```\n\n这是调用方法的常规方式，但还有一种替代方式：\n\n```\n...\nPrinter.printMessage(printerObject)(\"\
    Hello\");\n...\n```\n\n这与通过对象引用调用方法的效果相同。这种技术结构如下：\n\n```\n<类>.<实例方法名>(<对象引用>)(<参数值>)\n\
    ```\n\n柯里化（Currying）是创建一个函数的过程，该函数固定传递给另一个函数的一个或多个参数。在这种情况下，第一个函数返回一个柯里化函数，该函数在指定对象上调用实例方法。这种方法的好处是对象引用作为参数传递给第一个函数，这意味着我可以动态地为我的命令选择接收者，并将方法引用作为对象传递——当你想要更改命令所针对的接收者时，这一点变得很重要（参见“命令模式的变体”一节中的示例）。\n\
    \n### 应用并发保护\n\n我在本章开头描述的问题包括多个组件操作单个 `Calculator` 对象，现在我在 `Calculator` 类中有了一个数组，我需要添加并发保护以避免数据损坏。代码清单\
    \ 20-6 展示了如何使用 Grand Central Dispatch 序列化对 `history` 数组的访问。\n\n**代码清单 20-6.**\
    \ 在 `Calculator.swift` 文件中应用并发保护\n\n```swift\nimport Foundation;\n\nclass Calculator\
    \ {\n    private(set) var total = 0;\n    private var history = [Command]();\n\
    \    private var queue = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    private var performingUndo = false;\n\n    func add(amount:Int) {\n     \
    \   addUndoCommand(Calculator.subtract, amount: amount);\n        total += amount;\n\
    \    }\n\n    func subtract(amount:Int) {\n        addUndoCommand(Calculator.add,\
    \ amount: amount);\n        total -= amount;\n    }\n\n    func multiply(amount:Int)\
    \ {\n        addUndoCommand(Calculator.divide, amount: amount);\n        total\
    \ = total * amount;\n    }\n\n    func divide(amount:Int) {\n        addUndoCommand(Calculator.multiply,\
    \ amount: amount);\n        total = total / amount;\n    }\n\n    private func\
    \ addUndoCommand(method:Calculator -> Int -> Void, amount:Int) {\n        if (!performingUndo)\
    \ {\n            dispatch_sync(self.queue, {() in\n                self.history.append(GenericCommand<Calculator>.createCommand(self,\n\
    \                    instuctions: {calc in\n                        method(calc)(amount);\n\
    \                    }));\n            });\n        }\n    }\n\n    func undo()\
    \ {\n        dispatch_sync(self.queue, {() in\n            if self.history.count\
    \ > 0 {\n                self.performingUndo = true;\n                self.history.removeLast().execute();\n\
    \                self.performingUndo = false;\n            }\n        });\n  \
    \  }\n}\n```\n\n> **注意**  \n> 在实现命令模式时，你不必添加并发保护，但我建议你至少考虑一下。随着应用程序的成熟，对接收者执行命令的组件数量可能会增加，从而增加并发访问和数据损坏的几率。\n\
    \n我创建了一个串行队列，并在 `addUndoCommand` 和 `undo` 方法中使用 `dispatch_sync` 方法，以确保 `history`\
    \ 数组不会被并发修改。我定义了一个名为 `performingUndo` 的变量，在执行撤消 `Command` 时设置该变量，以防止 `addUndoCommand`\
    \ 方法在从某个操作方法中调用时向 `history` 数组添加另一个命令。\n\n> **提示**  \n> 使用变量来标识我是否正在执行撤消命令，可以防止应用程序锁死。Grand\
    \ Central Dispatch 不支持递归锁，这意味着如果我从一个也已通过 `dispatch_sync` 函数放入队列的块内部调用某个使用了 `dispatch_sync`\
    \ 函数的方法，应用程序就会冻结。第二次对 `dispatch_async` 的调用会一直阻塞，直到第一次调用完成，而第一次调用由于等待第二次调用而无法完成，这是一个经典的并发错误。\n"
- fmt: "### Using the Undo Feature\n\nThe final step is to demonstrate the undo feature\
    \ that I added to the `Calculator` class, as shown in Listing 20-7.\n\nListing\
    \ 20-7. Using the Undo Feature in the `main.swift` File\n\n```\nlet calc = Calculator();\n\
    calc.add(10);\ncalc.multiply(4);\ncalc.subtract(2);\nprintln(\"Total: \\(calc.total)\"\
    );\nfor _ in 0 ..< 3 {\n    calc.undo();\n    println(\"Undo called. Total: \\\
    (calc.total)\");\n}\n```\n\nI use a `for` loop to call the `undo` method on the\
    \ `Calculator` object three times, writing the new value of the `total` property\
    \ to the debug console. Running the application produces the following output:\n\
    \n```\nTotal: 38\nUndo called. Total: 40\nUndo called. Total: 10\nUndo called.\
    \ Total: 0\n```\n\n## Variations on the Command Pattern\n\nThe command pattern\
    \ can be applied in a wide range of situations, but there are three main variations\
    \ on the pattern that you will encounter, each of which I describe in the following\
    \ sections.\n\n### Creating Composite Commands\n\nThe commands that I created\
    \ in the `Calculator` object undo a single operation, but it is a simple matter\
    \ to use the opacity of the `Command` protocol to create commands that perform\
    \ multiple operations by acting as a wrapper around two or more other commands.\
    \ Listing 20-8 shows how I defined a class that conforms to the `Command` protocol\
    \ and that is a wrapper around other commands.\n\nListing 20-8. Defining a Command\
    \ Wrapper in the `Commands.swift` File\n\n```\nprotocol Command {\n    func execute();\n\
    }\n\nclass CommandWrapper : Command {\n    private let commands:[Command];\n \
    \   init(commands:[Command]) {\n        self.commands = commands;\n    }\n   \
    \ func execute() {\n        for command in commands {\n            command.execute();\n\
    \        }\n    }\n}\n\nclass GenericCommand<T> : Command {\n    private var receiver:\
    \ T;\n    private var instructions: T -> Void;\n    init(receiver:T, instructions:\
    \ T -> Void) {\n        self.receiver = receiver; self.instructions = instructions;\n\
    \    }\n    func execute() {\n        instructions(receiver);\n    }\n    class\
    \ func createCommand(receiver:T, instuctions: T -> Void) -> Command {\n      \
    \  return GenericCommand(receiver: receiver, instructions: instuctions);\n   \
    \ }\n}\n```\n\nThe `CommandWrapper` class defines a constant array of `Command`\
    \ objects that are executed in sequence. Listing 20-9 shows how I have used `CommandWrapper`\
    \ in the `Calculator` class to provide a snapshot of the undo commands.\n\nListing\
    \ 20-9. Creating a Composite Command in the `Calculator.swift` File\n\n```\nimport\
    \ Foundation;\n\nclass Calculator {\n    // ...properties and methods omitted\
    \ for brevity...\n    func getHistorySnaphot() -> Command? {\n        var command:Command?;\n\
    \        dispatch_sync(queue, {() in\n            command = CommandWrapper(commands:\
    \ self.history.reverse());\n        });\n        return command;\n    }\n}\n```\n\
    \nThe `getHistorySnapshot` method returns a `Command` that will undo all of the\
    \ operations that have been performed by date. The implementation of the method\
    \ creates an instance of the `CommandWrapper` class that copies the local array\
    \ of undo commands. (See Chapter 5 for details of how Swift and Cocoa arrays are\
    \ copied.)\n\nTip\n\nNotice that I reverse the array of commands that I pass to\
    \ the `CommandWrapper` initializer. This is because the `Calculator` class processes\
    \ its array in tail-first order, but the `CommandWrapper` class uses headfirst\
    \ ordering. Reversing the order of the array means that the undo commands are\
    \ applied in the same sequence as if they had been executed individually through\
    \ the `undo` method.\n\nListing 20-10 shows the changes I made to the `main.swift`\
    \ file to obtain and execute the composite command.\n\nListing 20-10. Using a\
