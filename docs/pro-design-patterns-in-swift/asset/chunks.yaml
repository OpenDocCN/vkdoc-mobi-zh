    \ uses `ChangeRecord` objects to write messages to the console, as shown in Listing\
    \ 11-16.\n\n**Listing 11-16.** Using the Builder Class in the `Logger.swift` File\n\
    \n```swift\nimport Foundation;\n\nlet productLogger = Logger<Product>(callback:\
    \ {p in\n    var builder         = ChangeRecordBuilder();\n    builder.productName\
    \ = p.name;\n    builder.category    = p.category;\n    builder.value       =\
    \ String(p.stockLevel);\n    builder.outerTag    = \"stockChange\";\n    var changeRecord\
    \ = builder.changeRecord;\n    if (changeRecord != nil) {\n        println(builder.changeRecord!);\n\
    \    }\n});\n\nfinal class Logger<T where T:NSObject, T:NSCopying> {\n    // ...statements\
    \ omitted for brevity...\n}\n```\n\nYou can see the effect of the changes by starting\
