    Editor ➤ Show Assistant Editor from the View menu, and Xcode will add a new pane
    to its layout, which will display the contents of the `ViewController.swift` file.


    Tip


    Xcode selects the file that the Assistant Editor displays automatically, but it
    won’t always display the file you want. You can explicitly select a file to display
    in the Assistant Editor pane by Option-clicking a file in the navigator pane.


    Control-click the `Label` in the View Controller Scene hierarchy of components
    and drag it to the Assistant Editor. Position the mouse pointer to be below the
