    \n```\nclass Milkshake {\n    enum Size { case SMALL; case MEDIUM; case LARGE\
    \ };\n    enum Flavor { case CHOCOLATE; case STRAWBERRY; case VANILLA };\n   \
    \ let count:Int;\n    let size:Size;\n    let flavor:Flavor;\n\n    init(flavor:Flavor,\
    \ size:Size, count:Int) {\n        self.count = count;\n        self.size = size;\n\
    \        self.flavor = flavor;\n    }\n}\n```\n\n`Milkshake`类定义了一个包含三个参数的初始化器。这要求调用组件了解这些参数的默认值，并且即使在需要默认值时也要提供值，如下所示：\n\
    \n```\nvar shake = Milkshake(\n    flavor: Milkshake.Flavor.CHOCOLATE,\n    size:\
    \ Milkshake.Size.MEDIUM,\n    count: 1\n);\n```\n\n大多数顾客只想要一份中杯奶昔，只需指定口味即可。伸缩初始化器反模式试图通过提供提供默认值的便捷初始化器来改善这种情况，如下所示：\n\
    \n```\nclass Milkshake {\n    enum Size { case SMALL; case MEDIUM; case LARGE\
    \ };\n    enum Flavor { case CHOCOLATE; case STRAWBERRY; case VANILLA };\n   \
    \ let count:Int;\n    let size:Size;\n    let flavor:Flavor;\n\n    init(flavor:Flavor,\
    \ size:Size, count:Int) {\n        self.count = count;\n        self.size = size;\n\
    \        self.flavor = flavor;\n    }\n\n    convenience init(flavor:Flavor, size:Size)\
    \ {\n        self.init(flavor:flavor, size:size, count:1);\n    }\n\n    convenience\
    \ init(flavor:Flavor) {\n        self.init(flavor:flavor, size:Size.MEDIUM);\n\
    \    }\n}\n```\n\n每个便捷初始化器省略一个附加参数，并调用前一个初始化器并传入一个默认值。这样可以在调用组件不知道未提供的参数的默认值的情况下创建对象，如下所示：\n\
    \n```\nvar shake = Milkshake(flavor: Milkshake.Flavor.CHOCOLATE);\n```\n\n伸缩初始化器被认为是一种反模式，因为它们会导致大量难以阅读和维护的初始化器。在\
    \ Swift 中，你可以通过使用默认参数值来避免伸缩初始化器，如下所示：\n\n```\nclass Milkshake {\n    enum Size\
    \ { case SMALL; case MEDIUM; case LARGE };\n    enum Flavor { case CHOCOLATE;\
    \ case STRAWBERRY; case VANILLA };\n    let count:Int;\n    let size:Size;\n \
    \   let flavor:Flavor;\n\n    init(flavor:Flavor, size:Size = Size.MEDIUM, count:Int\
    \ = 1) {\n        self.count = count;\n        self.size = size;\n        self.flavor\
    \ = flavor;\n    }\n}\n```\n\n当想要创建`Milkshake`对象的组件省略了`size`和`count`参数时，就会使用它们的默认值。这样做的好处是，默认值在`Milkshake`类内部定义，无需定义初始化器的各种排列组合。\n"
- fmt: '# Understanding the Builder Pattern


    The builder pattern solves the problem by introducing an intermediary—called the
    builder—between a component and the object it needs to work with. As Figure [11-1](#A978-1-4842-0394-1_11_Chapter.html#Fig1)
    shows, there are three operations in the builder pattern.


    ![A978-1-4842-0394-1_11_Fig1_HTML.jpg](A978-1-4842-0394-1_11_Fig1_HTML.jpg)


    Figure 11-1. The builder pattern


    In the first operation, the calling component provides the builder with an item
    of data that replaces one of the default values used to create an object. The
    operation is repeated each time the calling component obtains a new value from
    the process it is following. In the case of my burger-ordering process, the calling
    component is able to provide the builder with new data after each stage in the
    sequence.


    In the second operation, the calling component asks the builder to create an object.
    This signals to the builder that there will be no new data and that an object
    should be created using the data values it has received so far, along with default
    values for the data items that were not specified by the calling component.


    In the third operation, the builder creates an object and returns it to the calling
    component with an object.


    The calling component knows what is required—a burger with no ketchup, for example—but
    it doesn''t know how to create it. The builder class knows how to create a burger
    and knows the default configuration, but it doesn''t know what the customer wants
    for any specific order. The builder pattern brings the "what" and the "how" together
    without letting the calling component become tightly coupled to the objects it
    requires.


    ## Implementing the Builder Pattern


    In the sections that follow, I demonstrate how to apply the builder pattern to
    the example project in order to decouple the creation process for the `Burger`
    class from the components that use `Burger` objects.


    ### Defining the Builder Class


    The first step is to define the builder class, which contains the default values
    for the `Burger` initializer parameters and contains the means to allow calling
    components to change those values. Listing 11-4 shows the contents of the `Builder.swift`
    file, which I added to the example project.


    Listing 11-4. The Contents of the `Builder.swift` File


    ```

    class BurgerBuilder {


    private var veggie  = false;

    private var pickles = true;

    private var mayo    = true;

    private var ketchup = true;

    private var lettuce = true;

    private var cooked  = Burger.Cooked.NORMAL;

    private var patties = 2;


    func setVeggie(choice: Bool)  { self.veggie  = choice; }

    func setPickles(choice: Bool) { self.pickles = choice; }

    func setMayo(choice: Bool)    { self.mayo    = choice; }

    func setKetchup(choice: Bool) { self.ketchup = choice; }

    func setLettuce(choice: Bool) { self.lettuce = choice; }

    func setCooked(choice: Burger.Cooked) { self.cooked = choice; }

    func addPatty(choice: Bool)   { self.patties = choice ? 3 : 2; }


    func buildObject(name: String) -> Burger {

    return Burger(name: name, veggie: veggie, patties: patties,

    pickles: pickles, mayo: mayo, ketchup: ketchup,

    lettuce: lettuce, cook: cooked);

    }


    }

    ```


    The `BurgerBuilder` class defines methods that will change the data values used
    to create a `Burger` object. Only the `name` parameter on the `Burger` initializer
    doesn''t have a default value, so the `buildObject` method accepts a `name` argument.
    The class responds to the `buildObject` method being called by creating a `Burger`
    object using the `name` value, the values provided via the other methods, and
    the default values.


    **Tip**


    I could have used properties in the class, but I prefer to use methods because
    I can clearly indicate the values for which there are no defaults by defining
    parameters on the `buildObject` method. I demonstrate how to use properties to
    create a builder when I apply the pattern to the SportsStore application later
    in this chapter.


    There is a direct mapping to the underlying properties for almost all of the methods
    defined by the class. The exception is the `addPatty` method, which allows the
    calling component to specify a number of patties—just by specifying whether an
    extra one should be added. This approach allows me to handle extra patties without
    making the calling component aware of what the default number is.


    ### Consuming the Builder


    The next step is to use the builder to create an object. Listing 11-5 shows the
    changes I made to the `main.swift` file.


    Listing 11-5. Consuming the Builder Pattern in the `main.swift` File


    ```

    var builder = BurgerBuilder();


    // Step 1 - Ask for name

    let name = "Joe";


    // Step 2 - Is veggie meal required?

    builder.setVeggie(false);


    // Step 3 - Customize burger?

    builder.setMayo(false);

    builder.setCooked(Burger.Cooked.WELLDONE);


    // Step 4 - Buy additional patty?

    builder.addPatty(false);


    let order = builder.buildObject(name);

    order.printDescription();

    ```


    This may appear similar to the way I created `Burger` objects without the builder
    pattern, but using the builder as an intermediary leads to improvements in flexibility
    by isolating the impact of change.


    ### Understanding the Impact of the Pattern


    The first improvement is that it is possible to change a default value in the
    builder without having to make changes to the calling component or to the `Burger`
    class. If most customers choose not to have pickles—presumably because they are
    weird and horrible and ruin a good burger—then the restaurant can update its menu
    to make burgers without them. Listing 11-6 shows the change to the builder class.


    Listing 11-6. Disabling Pickles in the `Builder.swift` File


    ```

    class BurgerBuilder {


    private var veggie  = false;

    private var pickles = false;

    private var mayo    = true;

    private var ketchup = true;

    private var lettuce = true;

    private var cooked  = Burger.Cooked.NORMAL;

    private var patties = 2;


    func setVeggie(choice: Bool)  { self.veggie  = choice; }

    func setPickles(choice: Bool) { self.pickles = choice; }

    func setMayo(choice: Bool)    { self.mayo    = choice; }

    func setKetchup(choice: Bool) { self.ketchup = choice; }

    func setLettuce(choice: Bool) { self.lettuce = choice; }

    func setCooked(choice: Burger.Cooked) { self.cooked = choice; }

    func addPatty(choice: Bool)   { self.patties = choice ? 3 : 2; }


    func buildObject(name: String) -> Burger {

    return Burger(name: name, veggie: veggie, patties: patties,

    pickles: pickles, mayo: mayo, ketchup: ketchup,

    lettuce: lettuce, cook: cooked);

    }


    }

    ```


    The calling component isn''t aware that the default has changed, and neither is
    the `Burger` class, but `Burger` objects will now be created without pickles unless
    the customer specifically asks for them. You can see the effect in the output
    produced by running the application.


    ```

    Name Joe

    Veggie: false

    Patties: 2

    Pickles: false

    Mayo: false

    Ketchup: true

    Lettuce: true

    Cook: Well Done

    ```'
