    Note


    The code that creates the data structure, which is in the `main.swift` file for
    the example, still needs to understand the differences between the leaf node and
    composite object in order to create the tree. The composite pattern affects the
    components that consume the tree structure, which no longer depend on being able
    to differentiate between the different types of object.


    Rather than having to duplicate the parts required for a door window, I can simply
