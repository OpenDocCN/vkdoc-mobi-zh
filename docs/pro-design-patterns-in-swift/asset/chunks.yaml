    The final step is to demonstrate the undo feature that I added to the `Calculator`
    class, as shown in Listing 20-7.


    Listing 20-7. Using the Undo Feature in the main.swift File


    `let calc = Calculator();`


    `calc.add(10);`


    `calc.multiply(4);`


    `calc.subtract(2);`


    `println("Total: \(calc.total)");`


    `for _ in 0 ..< 3 {`


    `calc.undo();`


    `println("Undo called. Total: \(calc.total)");`


    `}`


    I use a `for` loop to call the `undo` method on the `Calculator` object three
    times, writing the new value of the `total` property to the debug console. Running
    the application produces the following output:


    `Total: 38`


    `Undo called. Total: 40`


    `Undo called. Total: 10`


    `Undo called. Total: 0`


    ## Variations on the Command Pattern


    The command pattern can be applied in a wide range of situations, but there are
    three main variations on the pattern that you will encounter, each of which I
    describe in the following sections.


    ### Creating Composite Commands


    The commands that I created in the `Calculator` object undo a single operation,
    but it is a simple matter to use the opacity of the `Command` protocol to create
    commands that perform multiple operations by acting as a wrapper around two or
    more other commands. Listing 20-8 shows how I defined a class that conforms to
    the `Command` protocol and that is a wrapper around other commands.


    Listing 20-8. Defining a Command Wrapper in the Commands.swift File


    `protocol Command {`


    `func execute();`


    `}`


    `class CommandWrapper : Command {`


    `private let commands:[Command];`


    `init(commands:[Command]) {`


    `self.commands = commands;`


    `}`


    `func execute() {`


    `for command in commands {`


    `command.execute();`


    `}`


    `}`


    `}`


    `class GenericCommand<T> : Command {`


    `private var receiver: T;`


    `private var instructions: T -> Void;`


    `init(receiver:T, instructions: T -> Void) {`


    `self.receiver = receiver; self.instructions = instructions;`


    `}`


    `func execute() {`


    `instructions(receiver);`


    `}`


    `class func createCommand(receiver:T, instuctions: T -> Void) -> Command {`


    `return GenericCommand(receiver: receiver, instructions: instuctions);`


    `}`


    `}`


    The `CommandWrapper` class defines a constant array of `Command` objects that
    are executed in sequence. Listing 20-9 shows how I have used `CommandWrapper`
    in the `Calculator` class to provide a snapshot of the undo commands.


    Listing 20-9. Creating a Composite Command in the Calculator.swift File


    `import Foundation;`


    `class Calculator {`


    `//` `...properties and methods omitted for brevity...`


    `func getHistorySnaphot() -> Command? {`


    `var command:Command?;`


    `dispatch_sync(queue, {() in`


    `command = CommandWrapper(commands: self.history.reverse());`


    `});`


    `return command;`


    `}`


    `}`


    The `getHistorySnapshot` method returns a `Command` that will undo all of the
    operations that have been performed by date. The implementation of the method
    creates an instance of the `CommandWrapper` class that copies the local array
    of undo commands. (See [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html) for details
    of how Swift and Cocoa arrays are copied.)


    Tip


    Notice that I reverse the array of commands that I pass to the `CommandWrapper`
    initializer. This is because the `Calculator` class processes its array in tail-first
    order, but the `CommandWrapper` class uses headfirst ordering. Reversing the order
    of the array means that the undo commands are applied in the same sequence as
    if they had been executed individually through the `undo` method.


    Listing 20-10 shows the changes I made to the `main.swift` file to obtain and
    execute the composite command.


    Listing 20-10. Using a Composite Command in the main.swift File


    `let calc = Calculator();`


    `calc.add(10);`


    `calc.multiply(4);`


    `calc.subtract(2);`


    `let snapshot = calc.getHistorySnaphot();`


    `println("Pre-Snapshot Total: \(calc.total)");`


    `snapshot?.execute();`


    `println("Post-Snapshot Total: \(calc.total)");`


    Running the example application produces the following output, which demonstrates
    that each of the individual undo commands has been executed through the composite
    command:


    `Pre-Snapshot Total: 38`


    `Post-Snapshot Total: 0`'
  trans: "\n### 使用撤销功能\n\n最后一步是演示我添加到`Calculator`类中的撤销功能，如代码清单 20-7 所示。\n\n代码清单 20-7. 在`main.swift`文件中使用撤销功能\n\
