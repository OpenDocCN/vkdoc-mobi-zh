    \n**Listing 20-1.** The Contents of the `Calculator.swift` File\n\n```\nclass\
    \ Calculator {\n    private(set) var total = 0;\n\n    func add(amount:Int) {\n\
    \        total += amount;\n    }\n\n    func subtract(amount:Int) {\n        total\
    \ -= amount;\n    }\n\n    func multiply(amount:Int) {\n        total = total\
    \ * amount;\n    }\n\n    func divide(amount:Int) {\n        total = total / amount;\n\
    \    }\n}\n```\n\nThe `Calculator` class defines a stored `Int` property called\
    \ `total`, whose value is changed by calling the `add`, `subtract`, `multiple`,\
