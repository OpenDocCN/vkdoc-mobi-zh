    `Sketch Square`


    ## Understanding the Pitfalls of the Adapter Pattern


    The adapter pattern is useful only when integrating components that have similar
    functionality, meaning that the features provided by the classes are compatible
    even though the APIs are not.


    In the example application, there is a component that consumes employee data (the
    `SearchTool` class) and a component that provides employee data (the `NewCoDirectory`
    class). The functionality of these classes is compatible, but I can’t use the
    `NewCoDirectory` class as a source of data because it doesn’t implement the protocol
    that the `SearchTool` class requires.


    The adapter pattern is not helpful when the components provide different functionality.
    For example, the adapter pattern cannot be used to integrate a data source that
    provides details of employee parking spaces because there is no support for that
    data in the application, and no amount of adaptation of the API will change that.
    To use the adapter pattern effectively, focus purely on the API and keep the adaptations
    as simple as possible.


    ## Examples of the Adapter Pattern in Cocoa


    The adapter pattern is not exposed by Cocoa because its components set the standard
    for default behavior. If you want to integrate a component into Cocoa, then you
    implement a protocol. A good example is the `NSCopying` protocol that I used in
    [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html) to implement the prototype pattern:
    if you want to integrate a class into Cocoa’s support for object copying, then
    you make it conform to the `NSCopying` protocol even if it already has a custom
    approach to creating clones. Such is the position of the core API on any platform;
    if an adapter is needed, then it is your responsibility to define it in your code.


    ## Applying the Pattern to the SportsStore Application


    Not all adapters map a single type to integrate a component into an application,
    and to demonstrate this, I am going to create an adapter that implements the abstract
    factory pattern and that conforms to implementation protocols in order to do its
    job.


    ### Preparing the Example Application


    I added a file called `Euro.swift` to the example project and used it to define
    the class shown in Listing 12-13.


    Listing 12-13. The Contents of the Euro.swift File


    `class EuroHandler {`


    `func getDisplayString(amount:Double) -> String {`


    `let formatted = Utils.currencyStringFromNumber(amount);`


    `return "€\(dropFirst(formatted))";`


    `}`


    `func getCurrencyAmount(amount:Double) -> Double {`


    `return 0.76164 * amount;`


    `}`


    `}`


    The `EuroHandler` class converts dollar amounts to euros and creates formatted
    currency strings. This is the same type of functionality that I added to the SportsStore
    application to demonstrate the abstract factory pattern in [Chapter 10](#A978-1-4842-0394-1_10_Chapter.html),
    but the `EuroHandler` class does not fit directly into the model that the application
    expects and so requires an adapter.'
