    `motionEnded`方法由`UIResponder`协议定义，`ViewController`类通过其基类遵循该协议。`UIResponder`协议并非通过单一的`notify`方法发送所有\
    \ UI 通知，而是为每种主要类型的用户交互定义了相应的方法，并使用`UIEventSubtype`枚举来指示已执行的具体动作。在所有使用 UI 组件的应用程序中，您都会遇到事件，但通常您只需实现观察者部分，并将组件作为主题。\n\
    \n### 观察属性变化\n\nObjective-C 有一个名为键值观察（KVO）的特性，允许一个对象在另一个对象的属性值发生变化时接收通知。只要两个对象都派生自`NSObject`，并且使用`dynamic`关键字定义被观察的属性，就可以在\
    \ Swift 对象之间使用 KVO 进行通信。\n\n为了演示如何在 Swift 中使用 KVO，我创建了一个名为 KVO 的新 Xcode 命令行工具项目，并使用`main.swift`文件定义了清单\
    \ 22-20 所示的代码。\n\n**清单 22-20.** 在`main.swift`文件中使用 KVO\n\n```\nimport Foundation;\n\
    \nclass Subject : NSObject {\n    dynamic var counter = 0;\n}\n\nclass Observer\
    \ : NSObject {\n    init(subject:Subject) {\n        super.init();\n        subject.addObserver(self,\
    \ forKeyPath: \"counter\",\n            options: NSKeyValueObservingOptions.New,\
    \ context: nil);\n    }\n    override func observeValueForKeyPath(keyPath: String,\
    \ ofObject object: AnyObject,\n        change: [NSObject : AnyObject], context:\
    \ UnsafeMutablePointer<Void>) {\n        println(\"通知：\\(keyPath) = \\(change[NSKeyValueChangeNewKey]!)\"\
    );\n    }\n}\n\nlet subject = Subject();\nlet observer = Observer(subject: subject);\n\
    subject.counter++;\nsubject.counter = 22;\n```\n\n**提示：** 我必须为此简单示例使用 Xcode 项目，因为\
    \ Playground 的限制会导致 KVO 无法正常工作。\n\n`Subject`类使用`dynamic`关键字定义了一个名为`counter`的变量。这是我打算使用\
    \ KVO 观察的属性，`dynamic`关键字可防止编译器对该属性的实现进行优化，从而使 KVO 特性能够在运行时将其替换为等效的计算属性，以便在属性变化时通知其观察者。\n\
    \n`Observer`类使用`addObserver`方法注册其对属性的兴趣，如下所示：\n\n```\n...\nsubject.addObserver(self,\
    \ forKeyPath: \"counter\",\n    options: NSKeyValueObservingOptions.New, context:\
    \ nil);\n...\n```\n\n`addObserver`方法的参数指定了观察者、要观察的属性，以及来自`NSKeyValueObservingOptions`枚举的一个值，该值指定属性变化时应包含在通知中的值。我指定了`New`值，表示应使用分配给主题属性的值。\n\
    \n通知被发送到观察者的`observeValueForKeyPath`方法，包含主题、发生变化的属性以及新值的详细信息。在本例中，我输出了属性名称及其值。运行示例会在\
    \ Xcode 控制台中产生以下输出：\n\n```\n通知：counter = 1\n通知：counter = 22\n```\n\n## 将模式应用于\
    \ SportsStore 应用程序\n\n在本章中，我打算使用`NSNotificationCenter`类将中介者模式和命令模式应用于 SportsStore\
    \ 应用程序。\n"
- fmt: "### Preparing the Example Application\n\nNo preparation to the SportsStore\
    \ application is required, and I pick up the project as I left it in [Chapter\
    \ 20](#A978-1-4842-0394-1_20_Chapter.html). Don’t forget that you can get the\
    \ SportsStore project from [`Apress.com`](https://Apress.com) as part of the free\
    \ source code download that accompanies this book if you don’t want to type the\
    \ changes yourself.\n\n### Applying the Pattern\n\nI am going to apply the observer\
    \ pattern to the product class so that it acts as a subject that sends out notifications\
    \ when the stock level changes. Rather than define custom protocols and classes,\
    \ I am going to use the `NSNotificationCenter` class to handle the notifications\
    \ and to act as a mediator so that the subjects and observers can find one another.\
    \ Listing 22-21 shows the change I made to the `Product` class so that it sends\
    \ notifications.\n\n**Listing 22-21.** Sending Notifications in the `Product.swift`\
    \ File\n\n```\n...\nvar stockLevel:Int {\n    get { return stockLevelBackingValue;}\n\
    \    set {\n        stockLevelBackingValue = max(0, newValue);\n        NSNotificationCenter.defaultCenter().postNotificationName(\"\
    stockUpdate\",\n            object: self);\n    }\n}\n...\n```\n\nThe advantage\
    \ of using the `NSNotificationCenter` class is that notifications can be added\
    \ to an application with the minimum of effort, although care is still required\
    \ to make sure that notifications sent by different parts of the application don’t\
    \ clash with one another. Now that the `Product` class is sending out notifications,\
    \ I can observe them anywhere the stock level information is of interest. Listing\
    \ 22-22 shows how I have changed the `ProductTableCell` class so that it updates\
    \ its UI components in response to a stock level notification.\n\n**Listing 22-22.** Responding\
    \ to Notifications in the `ViewController.swift` File\n\n```\n...\nclass ProductTableCell\
    \ : UITableViewCell {\n    @IBOutlet weak var nameLabel: UILabel!\n    @IBOutlet\
    \ weak var descriptionLabel: UILabel!\n    @IBOutlet weak var stockStepper: UIStepper!\n\
    \    @IBOutlet weak var stockField: UITextField!\n    var product:Product?;\n\
    \    required init(coder aDecoder: NSCoder) {\n        super.init(coder: aDecoder);\n\
    \        NSNotificationCenter.defaultCenter().addObserver(self,\n            selector:\
    \ \"handleStockLevelUpdate:\", name: \"stockUpdate\", object: nil);\n    }\n \
    \   func handleStockLevelUpdate(notification:NSNotification) {\n        if let\
    \ updatedProduct = notification.object as? Product {\n            if updatedProduct.name\
    \ == self.product?.name {\n                stockStepper.value = Double(updatedProduct.stockLevel);\n\
    \                stockField.text = String(updatedProduct.stockLevel);\n      \
    \      }\n        }\n    }\n}\n...\n```\n\nThe `ProductTableCell` class sets the\
    \ values of the `UIStepper` and `UITextField` components when a notification for\
    \ the `Product` that is being displayed changes. This means I can remove the statements\
    \ that explicitly altered the UI components from the `stockLevelDidChange` method\
    \ in the `ViewController` class, as shown in Listing 22-23.\n\n**Listing 22-23.** Removing\
    \ Statements from the `ViewController.swift` File\n\n```\n...\n@IBAction func\
    \ stockLevelDidChange(sender: AnyObject) {\n    if var currentCell = sender as?\
    \ UIView {\n        while (true) {\n            currentCell = currentCell.superview!;\n\
    \            if let cell = currentCell as? ProductTableCell {\n              \
    \  if let product = cell.product? {\n                    let dict = NSDictionary(objects:\
    \ [product.stockLevel],\n                        forKeys: [product.name]);\n \
    \                   undoManager?.registerUndoWithTarget(self,\n              \
    \          selector: \"undoStockLevel:\", object: dict);\n                   \
    \ if let stepper = sender as? UIStepper {\n                        product.stockLevel\
    \ = Int(stepper.value);\n                    } else if let textfield = sender\
    \ as? UITextField {\n                        if let newValue = textfield.text.toInt()?\
    \ {\n                            product.stockLevel = newValue;\n            \
    \            }\n                    }\n                    //                \
    \  cell.stockStepper.value = Double(product.stockLevel);\n                   \
    \ //                  cell.stockField.text = String(product.stockLevel);\n   \
    \                 productLogger.logItem(product);\n                    StockServerFactory.getStockServer()\n\
    \                        .setStockLevel(product.name,\n                      \
    \      stockLevel: product.stockLevel);\n                }\n                break;\n\
    \            }\n        }\n    }\n    displayStockTotal();\n}\n...\n```\n\n##\
    \ Summary\n\nIn this chapter I described the observer pattern, which is used to\
    \ standardize the process by which objects express interest in and receive notifications\
    \ of changes in other objects. The observer pattern is a powerful tool because\
    \ it allows components to cooperate with one another while remaining loosely coupled,\
    \ which in turn makes it easier to test and make changes to those components.\
    \ In the next chapter, I describe the memento pattern, which is used to manage\
    \ the state of an object.\n\n# 23. The Memento Pattern\n\nThe memento pattern\
    \ is a close relative of the command pattern I described in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html),\
    \ with the important difference that it is used to capture the complete state\
    \ of an object so that it can be subsequently reset. Table [23-1](#A978-1-4842-0394-1_23_Chapter.html#Tab1)\
    \ puts the memento pattern in context.\n\n**Table 23-1.** Putting the Memento\
    \ Pattern into Context\n\n| Question | Answer |\n| --- | --- |\n| What is it?\
    \ | The memento pattern captures the complete state of an object into a memento\
    \ that can be used to reset the object at a later date. |\n| What are the benefits?\
    \ | The memento pattern allows a complete reset of an object without the need\
    \ to track and apply individual undo commands. |\n| When should you use this pattern?\
    \ | Use this pattern when there is a \"known-good\" point in an object's life\
    \ that you may want to return to at some point in the future. |\n| When should\
    \ you avoid this pattern? | This pattern should be used only when you need to\
    \ return an object to an earlier state. Use the command pattern, as described\
    \ in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html), if you need to add support\
    \ for undoing the effect of only the most recent operation. |\n| How do you know\
    \ when you have implemented the pattern correctly? | The pattern is implemented\
    \ correctly if the object can be returned to an earlier state from any starting\
    \ position. |\n| Are there any common pitfalls? | The most common pitfall is to\
    \ not completely capture or set the state. |\n| Are there any related patterns?\
    \ | The memento and command patterns share a common philosophy. |"
  raw: '### Preparing the Example Application


    No preparation to the SportsStore application is required, and I pick up the project
    as I left it in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html). Don’t forget
    that you can get the SportsStore project from [`Apress.com`](https://Apress.com)
    as part of the free source code download that accompanies this book if you don’t
    want to type the changes yourself.


    ### Applying the Pattern


    I am going to apply the observer pattern to the product class so that it acts
    as a subject that sends out notifications when the stock level changes. Rather
    than define custom protocols and classes, I am going to use the `NSNotificationCenter`
    class to handle the notifications and to act as a mediator so that the subjects
    and observers can find one another. Listing 22-21 shows the change I made to the
    `Product` class so that it sends notifications.


    Listing 22-21. Sending Notifications in the Product.swift File


    `...`


    `var stockLevel:Int {`


    `get { return stockLevelBackingValue;}`


    `set {`


    `stockLevelBackingValue = max(0, newValue);`


    `NSNotificationCenter.defaultCenter().postNotificationName("stockUpdate",`


    `object: self);`


    `}`


    `}`


    `...`


    The advantage of using the `NSNotificationCenter` class is that notifications
    can be added to an application with the minimum of effort, although care is still
    required to make sure that notifications sent by different parts of the application
    don’t clash with one another. Now that the `Product` class is sending out notifications,
    I can observe them anywhere the stock level information is of interest. Listing
    22-22 shows how I have changed the `ProductTableCell` class so that it updates
    its UI components in response to a stock level notification.


    Listing 22-22. Responding to Notifications in the ViewController.swift File


    `...`


    `class ProductTableCell : UITableViewCell {`


    `@IBOutlet weak var nameLabel: UILabel!`


    `@IBOutlet weak var descriptionLabel: UILabel!`


    `@IBOutlet weak var stockStepper: UIStepper!`


    `@IBOutlet weak var stockField: UITextField!`


    `var product:Product?;`


    `required init(coder aDecoder: NSCoder) {`


    `super.init(coder: aDecoder);`


    `NSNotificationCenter.defaultCenter().addObserver(self,`


    `selector: "handleStockLevelUpdate:", name: "stockUpdate", object: nil);`


    `}`


    `func handleStockLevelUpdate(notification:NSNotification) {`


    `if let updatedProduct = notification.object as? Product {`


    `if updatedProduct.name == self.product?.name {`


    `stockStepper.value = Double(updatedProduct.stockLevel);`


    `stockField.text = String(updatedProduct.stockLevel);`


    `}`


    `}`


    `}`


    `}`


    `...`


    The `ProductTableCell` class sets the values of the `UIStepper` and `UITextField`
    components when a notification for the `Product` that is being displayed changes.
    This means I can remove the statements that explicitly altered the UI components
    from the `stockLevelDidChange` method in the `ViewController` class, as shown
    in Listing 22-23.


    Listing 22-23. Removing Statements from the ViewController.swift File


    `...`


    `@IBAction func stockLevelDidChange(sender: AnyObject) {`


    `if var currentCell = sender as? UIView {`


    `while (true) {`


    `currentCell = currentCell.superview!;`


    `if let cell = currentCell as? ProductTableCell {`


    `if let product = cell.product? {`


    `let dict = NSDictionary(objects: [product.stockLevel],`


    `forKeys: [product.name]);`


    `undoManager?.registerUndoWithTarget(self,`


    `selector: "undoStockLevel:", object: dict);`


    `if let stepper = sender as? UIStepper {`


    `product.stockLevel = Int(stepper.value);`


    `} else if let textfield = sender as? UITextField {`


    `if let newValue = textfield.text.toInt()? {`


    `product.stockLevel = newValue;`


    `}`


    `}`


    `//                  cell.stockStepper.value = Double(product.stockLevel);`


    `//                  cell.stockField.text = String(product.stockLevel);`


    `productLogger.logItem(product);`


    `StockServerFactory.getStockServer()`


    `.setStockLevel(product.name,`


    `stockLevel: product.stockLevel);`


    `}`


    `break;`


    `}`


    `}`


    `displayStockTotal();`


    `}`


    `}`


    `...`


    ## Summary


    In this chapter I described the observer pattern, which is used to standardize
    the process by which objects express interest in and receive notifications of
    changes in other objects. The observer pattern is a powerful tool because it allows
    components to cooperate with one another while remaining loosely coupled, which
    in turn makes it easier to test and make changes to those components. In the next
    chapter, I describe the memento pattern, which is used to manage the state of
    an object.


    # 23. The Memento Pattern


    The memento pattern is a close relative of the command pattern I described in
    [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html), with the important difference
    that it is used to capture the complete state of an object so that it can be subsequently
    reset. Table [23-1](#A978-1-4842-0394-1_23_Chapter.html#Tab1) puts the memento
    pattern in context.


    Table 23-1.


    Putting the Memento Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The memento pattern captures the complete state of an object into
    a memento that can be used to reset the object at a later date. |

    | What are the benefits? | The memento pattern allows a complete reset of an object
    without the need to track and apply individual undo commands. |

    | When should you use this pattern? | Use this pattern when there is a “known-good”
    point in an object’s life that you may want to return to at some point in the
    future. |

    | When should you avoid this pattern? | This pattern should be used only when
    you need to return an object to an earlier state. Use the command pattern, as
    described in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html), if you need to
    add support for undoing the effect of only the most recent operation. |

    | How do you know when you have implemented the pattern correctly? | The pattern
    is implemented correctly if the object can be returned to an earlier state from
    any starting position. |

    | Are there any common pitfalls? | The most common pitfall is to not completely
    capture or set the state. |

    | Are there any related patterns? | The memento and command patterns share a common
    philosophy. |'
  trans: "\n### 准备示例应用\n\nSportsStore 应用无需额外准备，我将直接从第 20 章结束时的项目状态继续开发。如果你不想手动输入所有修改，别忘了可以从\
    \ [`Apress.com`](https://Apress.com) 获取本书配套的免费源代码下载，其中包含了 SportsStore 项目。\n\n\
    ### 应用观察者模式\n\n我将把观察者模式应用于产品类，使其充当主体，在库存水平发生变化时发送通知。我将使用 `NSNotificationCenter`\
    \ 类来处理通知并扮演中介角色，而不是自定义协议和类，这样主体和观察者就能相互找到对方。清单 22-21 展示了我对 `Product` 类所做的修改，使其能够发送通知。\n\
    \n**清单 22-21.** 在 `Product.swift` 文件中发送通知\n\n```\n...\nvar stockLevel:Int {\n\
    \    get { return stockLevelBackingValue;}\n    set {\n        stockLevelBackingValue\
    \ = max(0, newValue);\n        NSNotificationCenter.defaultCenter().postNotificationName(\"\
    stockUpdate\",\n            object: self);\n    }\n}\n...\n```\n\n使用 `NSNotificationCenter`\
    \ 类的优点在于，可以以最小的代价向应用添加通知，但仍需注意确保应用中不同部分发送的通知不会相互冲突。现在 `Product` 类正在发送通知，我可以在任何关注库存水平信息的地方观察这些通知。清单\
    \ 22-22 展示了我如何修改 `ProductTableCell` 类，使其能够响应库存水平通知并更新其 UI 组件。\n\n**清单 22-22.** 在\
    \ `ViewController.swift` 文件中响应通知\n\n```\n...\nclass ProductTableCell : UITableViewCell\
    \ {\n    @IBOutlet weak var nameLabel: UILabel!\n    @IBOutlet weak var descriptionLabel:\
    \ UILabel!\n    @IBOutlet weak var stockStepper: UIStepper!\n    @IBOutlet weak\
    \ var stockField: UITextField!\n    var product:Product?;\n    required init(coder\
    \ aDecoder: NSCoder) {\n        super.init(coder: aDecoder);\n        NSNotificationCenter.defaultCenter().addObserver(self,\n\
    \            selector: \"handleStockLevelUpdate:\", name: \"stockUpdate\", object:\
    \ nil);\n    }\n    func handleStockLevelUpdate(notification:NSNotification) {\n\
    \        if let updatedProduct = notification.object as? Product {\n         \
    \   if updatedProduct.name == self.product?.name {\n                stockStepper.value\
    \ = Double(updatedProduct.stockLevel);\n                stockField.text = String(updatedProduct.stockLevel);\n\
    \            }\n        }\n    }\n}\n...\n```\n\n当正在显示的 `Product` 对应的通知到来时，`ProductTableCell`\
    \ 类会设置 `UIStepper` 和 `UITextField` 组件的值。这意味着我可以从 `ViewController` 类的 `stockLevelDidChange`\
    \ 方法中删除那些显式更改 UI 组件的语句，如清单 22-23 所示。\n\n**清单 22-23.** 从 `ViewController.swift`\
    \ 文件中删除语句\n\n```\n...\n@IBAction func stockLevelDidChange(sender: AnyObject) {\n\
    \    if var currentCell = sender as? UIView {\n        while (true) {\n      \
    \      currentCell = currentCell.superview!;\n            if let cell = currentCell\
    \ as? ProductTableCell {\n                if let product = cell.product? {\n \
    \                   let dict = NSDictionary(objects: [product.stockLevel],\n \
    \                       forKeys: [product.name]);\n                    undoManager?.registerUndoWithTarget(self,\n\
    \                        selector: \"undoStockLevel:\", object: dict);\n     \
    \               if let stepper = sender as? UIStepper {\n                    \
    \    product.stockLevel = Int(stepper.value);\n                    } else if let\
    \ textfield = sender as? UITextField {\n                        if let newValue\
    \ = textfield.text.toInt()? {\n                            product.stockLevel\
    \ = newValue;\n                        }\n                    }\n            \
    \        //                  cell.stockStepper.value = Double(product.stockLevel);\n\
    \                    //                  cell.stockField.text = String(product.stockLevel);\n\
    \                    productLogger.logItem(product);\n                    StockServerFactory.getStockServer()\n\
    \                        .setStockLevel(product.name,\n                      \
    \      stockLevel: product.stockLevel);\n                }\n                break;\n\
    \            }\n        }\n    }\n    displayStockTotal();\n}\n...\n```\n\n##\
    \ 本章小结\n\n在本章中，我描述了观察者模式，该模式用于标准化对象表达对其他对象变化的兴趣并接收相应通知的过程。观察者模式是一个强大的工具，因为它允许组件在保持松散耦合的同时相互协作，进而使得对这些组件进行测试和修改更加容易。在下一章中，我将介绍备忘录模式，该模式用于管理对象的状态。\n\
    \n# 23. 备忘录模式\n\n备忘录模式与我之前在第 20 章中描述的命令模式关系密切，其重要区别在于它用于捕获对象的完整状态，以便后续可以重置该状态。表\
    \ 23-1 给出了备忘录模式的背景信息。\n\n**表 23-1.** 将备忘录模式置于上下文中\n\n| 问题 | 答案 |\n| --- | ---\
    \ |\n| 它是什么？ | 备忘录模式将对象的完整状态捕获到备忘录中，该备忘录可用于稍后重置对象。 |\n| 有什么好处？ | 备忘录模式允许完全重置对象，而无需跟踪和应用单个撤销命令。\
    \ |\n| 何时应该使用此模式？ | 当对象生命周期中存在一个你可能希望在将来某个时刻返回的“已知良好”点时，使用此模式。 |\n| 何时应避免使用此模式？\
    \ | 此模式仅在你需要将对象恢复到较早状态时使用。如第 20 章所述，如果你需要支持仅撤销最近一次操作的效果，请使用命令模式。 |\n| 如何判断是否正确实现了该模式？\
    \ | 如果对象可以从任何起始位置恢复到较早状态，则说明模式实现正确。 |\n| 是否有常见的陷阱？ | 最常见的陷阱是未能完全捕获或设置状态。 |\n|\
    \ 是否有相关模式？ | 备忘录模式和命令模式共享共同的理念。 |\n"
- fmt: "# Preparing the Example Project\n\nI created an Xcode Command Line Tool project\
    \ called `Memento` for this chapter and added to it a file called `Ledger.swift`,\
    \ the contents of which are shown in Listing 23-1.\n\n**Listing 23-1.** The Contents\
    \ of the `Ledger.swift` File\n\n```\nclass LedgerEntry {\n    let id:Int;\n  \
    \  let counterParty:String;\n    let amount:Float;\n    init(id:Int, counterParty:String,\
    \ amount:Float) {\n        self.id = id; self.counterParty = counterParty; self.amount\
    \ = amount;\n    }\n}\n\nclass LedgerCommand {\n    private let instructions:Ledger\
    \ -> Void;\n    private let receiver:Ledger;\n    init(instructions:Ledger ->\
    \ Void, receiver:Ledger) {\n        self.instructions = instructions; self.receiver\
    \ = receiver;\n    }\n    func execute() {\n        self.instructions(self.receiver);\n\
    \    }\n}\n\nclass Ledger {\n    private var entries = [Int:LedgerEntry]();\n\
    \    private var nextId = 1;\n    var total:Float = 0;\n    func addEntry(counterParty:String,\
    \ amount:Float) -> LedgerCommand {\n        let entry = LedgerEntry(id: nextId++,\
    \ counterParty: counterParty, amount: amount);\n        entries[entry.id] = entry;\n\
    \        total += amount;\n        return createUndoCommand(entry);\n    }\n \
    \   private func createUndoCommand(entry:LedgerEntry) -> LedgerCommand {\n   \
    \     return LedgerCommand(instructions: {target in\n            let removed =\
    \ target.entries.removeValueForKey(entry.id);\n            if (removed != nil)\
    \ {\n                target.total -= removed!.amount;\n            }\n       \
    \ }, receiver: self);\n    }\n    func printEntries() {\n        for id in entries.keys.array.sorted(<)\
    \ {\n            if let entry = entries[id] {\n                println(\"#\\(id):\
    \ \\(entry.counterParty) $\\(entry.amount)\");\n            }\n        }\n   \
    \     println(\"Total: $\\(total)\");\n        println(\"----\");\n    }\n}\n\
    ```\n\nThe `Ledger` class represents an account record of the kind of ledger that\
    \ banks use to record transactions, albeit massively simplified. The `Ledger`\
    \ class defines an `addEntry` method that accepts details of the counterparty\
    \ and an amount and uses them to create a `LedgerEntry` object. With each call\
    \ to the `addEntry` method, a dictionary of `LedgerEntry` objects is built up,\
    \ indexed by a unique ID.\n\nThe `Ledger` class provides support for undoing operations\
    \ using the command pattern that I described in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html).\
    \ A call to the `addEntry` method returns a `LedgerCommand` object, whose `execute`\
    \ method will locate and remove a `LedgerEntry` object. Finally, the `Ledger`\
    \ class defines a `total` property that is updated when entries are added or undone.\
    \ Listing 23-2 shows the code I added to the `main.swift` file to use the `Ledger`\
    \ class.\n\n**Listing 23-2.** The Contents of the `main.swift` File\n\n```\nlet\
    \ ledger = Ledger();\nledger.addEntry(\"Bob\", amount: 100.43);\nledger.addEntry(\"\
    Joe\", amount: 200.20);\nlet undoCommand = ledger.addEntry(\"Alice\", amount:\
    \ 500);\nledger.addEntry(\"Tony\", amount: 20);\nledger.printEntries();\nundoCommand.execute();\n\
    ledger.printEntries();\n```\n\nThe statements in the `main.swift` file create\
    \ a `Ledger` object and call the `addEntry` method to create four entries. I then\
    \ print out the contents of the ledger, execute an undo command for one of the\
    \ four entries, and print out the contents again to see the effect. Running the\
    \ application produces the following output:\n\n```\n#1: Bob $100.43\n#2: Joe\
    \ $200.2\n#3: Alice $500.0\n#4: Tony $20.0\nTotal: $820.63\n----\n#1: Bob $100.43\n\
    #2: Joe $200.2\n#4: Tony $20.0\nTotal: $320.63\n```\n\n## Understanding the Problem\
    \ That the Pattern Solves\n\nI used the command pattern to implement the undo\
    \ feature for the `Ledger` class in the example application, using the same techniques\
    \ I described in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html). I like the\
    \ command pattern because it is endlessly powerful and flexible, but the way that\
    \ I have applied the pattern to create the undo feature has a potential flaw that\
    \ limits its applicability in some applications.\n\nAs things stand, I can undo\
    \ individual operations. When I execute the undo command for the `LedgerEntry`\
    \ whose counterparty is `Alice`, the effect is to reverse the effect of a single\
    \ call to the `addEntry` method. What I can’t easily do, however, is return the\
    \ `Ledger` to an earlier state so that the entry that I have undone and all subsequent\
    \ entries are removed. I have removed the `Alice` entry, but doing so didn’t remove\
    \ the `Tony` entry.\n\nIn some applications, undoing a single operation isn’t\
    \ enough; you need to be able to return the state of an object to a specific point,\
    \ a process referred to as unwinding or rewinding the object’s state. This is\
    \ often the case with transactional data, such as ledgers, where returning to\
    \ a checkpoint or snapshot is needed in order to be sure of the integrity of an\
    \ application and its data.\n\nOne approach is for the calling component to keep\
    \ track of all the undo commands it receives and execute them in reverse order\
    \ to undo the effects of each operation, as shown in Listing 23-3.\n\n**Listing\
    \ 23-3.** Manually Unwinding the State of a `Ledger` in the `main.swift` File\n\
    \n```\nlet ledger = Ledger();\nledger.addEntry(\"Bob\", amount: 100.43);\nledger.addEntry(\"\
    Joe\", amount: 200.20);\nlet aliceUndoCommand = ledger.addEntry(\"Alice\", amount:\
    \ 500);\nlet tonyUndoCommand = ledger.addEntry(\"Tony\", amount: 20);\nledger.printEntries();\n\
    tonyUndoCommand.execute();\naliceUndoCommand.execute();\nledger.printEntries();\n\
    ```\n\nThis is a messy approach because it relies on one component having access\
    \ to all of the undo commands and knowing the order in which they should be applied,\
    \ which is hard to arrange if there are multiple components operating on a single\
    \ `Ledger` object. Each component will have only some of the undo commands, and\
    \ the order in which they should be applied is unknown.\n\nIn short, trying to\
    \ unwind or reset the state of an object using individual undo commands is a problem;\
    \ what I need is a more flexible approach that doesn’t place the burden of responsibility\
    \ on the calling component to keep track of the changes that need to be applied\
    \ to return to a trusted snapshot or checkpoint."
  raw: '## Preparing the Example Project


    I created an Xcode Command Line Tool project called Memento for this chapter and
    added to it a file called `Ledger.swift`, the contents of which are shown in Listing
    23-1.


    Listing 23-1. The Contents of the Ledger.swift File


    `class LedgerEntry {`


    `let id:Int;`


    `let counterParty:String;`


    `let amount:Float;`


    `init(id:Int, counterParty:String, amount:Float) {`


    `self.id = id; self.counterParty = counterParty; self.amount = amount;`


    `}`


    `}`


    `class LedgerCommand {`


    `private let instructions:Ledger -> Void;`


    `private let receiver:Ledger;`


    `init(instructions:Ledger -> Void, receiver:Ledger) {`


    `self.instructions = instructions; self.receiver = receiver;`


    `}`


    `func execute() {`


    `self.instructions(self.receiver);`


    `}`


    `}`


    `class Ledger {`


    `private var entries = [Int:LedgerEntry]();`


    `private var nextId = 1;`


    `var total:Float = 0;`


    `func addEntry(counterParty:String, amount:Float) -> LedgerCommand {`


    `let entry = LedgerEntry(id: nextId++, counterParty: counterParty, amount: amount);`


    `entries[entry.id] = entry;`


    `total += amount;`


    `return createUndoCommand(entry);`


    `}`


    `private func createUndoCommand(entry:LedgerEntry) -> LedgerCommand {`


    `return LedgerCommand(instructions: {target in`


    `let removed = target.entries.removeValueForKey(entry.id);`


    `if (removed != nil) {`


    `target.total -= removed!.amount;`


    `}`


    `}, receiver: self);`


    `}`


    `func printEntries() {`


    `for id in entries.keys.array.sorted(<) {`


    `if let entry = entries[id] {`


    `println("#\(id): \(entry.counterParty) $\(entry.amount)");`


    `}`


    `}`


    `println("Total: $\(total)");`


    `println("----");`


    `}`


    `}`


    The `Ledger` class represents an account record of the kind of ledger that banks
    use to record transactions, albeit massively simplified. The `Ledger` class defines
    an `addEntry` method that accepts details of the counterparty and an amount and
    uses them to create a `LedgerEntry` object. With each call to the `addEntry` method,
    a dictionary of `LedgerEntry` objects is built up, indexed by a unique ID.


    The `Ledger` class provides support for undoing operations using the command pattern
    that I described in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html). A call
    to the `addEntry` method returns a `LedgerCommand` object, whose `execute` method
    will locate and remove a `LedgerEntry` object. Finally, the `Ledger` class defines
    a `total` property that is updated when entries are added or undone. Listing 23-2
    shows the code I added to the `main.swift` file to use the `Ledger` class.


    Listing 23-2. The Contents of the main.swift File


    `let ledger = Ledger();`


    `ledger.addEntry("Bob", amount: 100.43);`


    `ledger.addEntry("Joe", amount: 200.20);`


    `let undoCommand = ledger.addEntry("Alice", amount: 500);`


    `ledger.addEntry("Tony", amount: 20);`


    `ledger.printEntries();`


    `undoCommand.execute();`


    `ledger.printEntries();`


    The statements in the `main.swift` file create a `Ledger` object and call the
    `addEntry` method to create four entries. I then print out the contents of the
    ledger, execute an undo command for one of the four entries, and print out the
    contents again to see the effect. Running the application produces the following
    output:


    `#1: Bob $100.43`


    `#2: Joe $200.2`


    `#3: Alice $500.0`


    `#4: Tony $20.0`


    `Total: $820.63`


    `----`


    `#1: Bob $100.43`


    `#2: Joe $200.2`


    `#4: Tony $20.0`


    `Total: $320.63`


    ## Understanding the Problem That the Pattern Solves


    I used the command pattern to implement the undo feature for the `Ledger` class
    in the example application, using the same techniques I described in [Chapter
    20](#A978-1-4842-0394-1_20_Chapter.html). I like the command pattern because it
    is endlessly powerful and flexible, but the way that I have applied the pattern
    to create the undo feature has a potential flaw that limits its applicability
    in some applications.


    As things stand, I can undo individual operations. When I execute the undo command
    for the `LedgerEntry` whose counterparty is `Alice`, the effect is to reverse
    the effect of a single call to the `addEntry` method. What I can’t easily do,
    however, is return the `Ledger` to an earlier state so that the entry that I have
    undone and all subsequent entries are removed. I have removed the `Alice` entry,
    but doing so didn’t remove the `Tony` entry.


    In some applications, undoing a single operation isn’t enough; you need to be
    able to return the state of an object to a specific point, a process referred
    to as unwinding or rewinding the object’s state. This is often the case with transactional
    data, such as ledgers, where returning to a checkpoint or snapshot is needed in
    order to be sure of the integrity of an application and its data.


    One approach is for the calling component to keep track of all the undo commands
    it receives and execute them in reverse order to undo the effects of each operation,
    as shown in Listing 23-3.


    Listing 23-3. Manually Unwinding the State of a Ledger in the main.swift File


    `let ledger = Ledger();`


    `ledger.addEntry("Bob", amount: 100.43);`


    `ledger.addEntry("Joe", amount: 200.20);`


    `let aliceUndoCommand = ledger.addEntry("Alice", amount: 500);`


    `let tonyUndoCommand = ledger.addEntry("Tony", amount: 20);`


    `ledger.printEntries();`


    `tonyUndoCommand.execute();`


    `aliceUndoCommand.execute();`


    `ledger.printEntries();`


    This is a messy approach because it relies on one component having access to all
    of the undo commands and knowing the order in which they should be applied, which
    is hard to arrange if there are multiple components operating on a single `Ledger`
    object. Each component will have only some of the undo commands, and the order
    in which they should be applied is unknown.


    In short, trying to unwind or reset the state of an object using individual undo
    commands is a problem; what I need is a more flexible approach that doesn’t place
    the burden of responsibility on the calling component to keep track of the changes
    that need to be applied to return to a trusted snapshot or checkpoint.'
