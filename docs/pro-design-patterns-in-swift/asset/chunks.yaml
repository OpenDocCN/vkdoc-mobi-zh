    \n```\nTotal: 38\nUndo called. Total: 40\nUndo called. Total: 10\nUndo called.\
    \ Total: 0\n```\n\n## 命令模式的变体\n\n命令模式可以广泛应用于各种场景，但你会遇到该模式的三种主要变体，我将在以下各节中逐一描述。\n\
    \n### 创建复合命令\n\n我在`Calculator`对象中创建的命令仅能撤销单一操作，但利用`Command`协议的不透明性，可以轻松创建通过包装两个或更多其他命令来执行多项操作的命令。代码清单\
    \ 20-8 展示了如何定义一个遵循`Command`协议、作为其他命令包装器的类。\n\n代码清单 20-8. 在`Commands.swift`文件中定义命令包装器\n\
    \n```\nprotocol Command {\n    func execute();\n}\n\nclass CommandWrapper : Command\
    \ {\n    private let commands:[Command];\n    init(commands:[Command]) {\n   \
    \     self.commands = commands;\n    }\n    func execute() {\n        for command\
    \ in commands {\n            command.execute();\n        }\n    }\n}\n\nclass\
    \ GenericCommand<T> : Command {\n    private var receiver: T;\n    private var\
    \ instructions: T -> Void;\n    init(receiver:T, instructions: T -> Void) {\n\
    \        self.receiver = receiver; self.instructions = instructions;\n    }\n\
    \    func execute() {\n        instructions(receiver);\n    }\n    class func\
