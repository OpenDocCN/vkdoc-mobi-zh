- fmt: "### Creating the Reference\n\nThe storyboard file that I edited with the Interface\
    \ Builder in the previous section is an XML file. This file defines the layout\
    \ and configuration of the user interface components, but an extra step is required\
    \ to access the instances of the components—such as the label—that are created\
    \ at runtime from the application code.\n\n> **Tip:** You can see the XML content\
    \ by right-clicking or Control-clicking the file in the navigator pane and selecting\
    \ **Open As ➤ Source Code** from the pop-up menu.\n\nXcode has a feature called\
    \ the Assistant Editor, which displays content that is logically related to the\
    \ file displayed in the main editor area. Select **Assistant Editor ➤ Show Assistant\
    \ Editor** from the View menu, and Xcode will add a new pane to its layout, which\
    \ will display the contents of the `ViewController.swift` file.\n\n> **Tip:**\
    \ Xcode selects the file that the Assistant Editor displays automatically, but\
    \ it won’t always display the file you want. You can explicitly select a file\
    \ to display in the Assistant Editor pane by Option-clicking a file in the navigator\
    \ pane.\n\nControl-click the `Label` in the View Controller Scene hierarchy of\
    \ components and drag it to the Assistant Editor. Position the mouse pointer to\
    \ be below the `class` definition and the `product` variable and let go. A pop-up\
    \ will appear that lets you configure an outlet, which is the association between\
    \ the instance of the label created for the app layout and the `UIViewController`\
    \ class, as shown in Figure [3-11](#A978-1-4842-0394-1_3_Chapter.html#Fig11).\n\
    \n![A978-1-4842-0394-1_3_Fig11_HTML.jpg](A978-1-4842-0394-1_3_Fig11_HTML.jpg)\n\
    \n**Figure 3-11.** Creating an outlet for a label\n\nSet the `Name` field to `totalStockLabel`\
    \ and click the **Connect** button. Xcode will add a new variable to the `ViewController`\
    \ class, as shown in Listing 3-2. (You can’t add this code statement manually\
    \ because Xcode makes other changes to the project behind the scenes).\n\n**Listing\
    \ 3-2.** Adding an Outlet in the `ViewController.swift` File\n\n```\nimport UIKit\n\
    \nclass ViewController: UIViewController {\n\n    @IBOutlet weak var totalStockLabel:\
    \ UILabel!\n\n    var products = [\n        (\"Kayak\", \"A boat for one person\"\
    , \"Watersports\", 275.0, 10),\n        (\"Lifejacket\", \"Protective and fashionable\"\
    , \"Watersports\", 48.95, 14),\n        (\"Soccer Ball\", \"FIFA-approved size\
    \ and weight\", \"Soccer\", 19.5, 32),\n        (\"Corner Flags\", \"Give your\
    \ playing field a professional touch\",\n        \"Soccer\", 34.95, 1),\n    \
    \    (\"Stadium\", \"Flat-packed 35,000-seat stadium\", \"Soccer\", 79500.0, 4),\n\
    \        (\"Thinking Cap\", \"Improve your brain efficiency by 75%\", \"Chess\"\
    , 16.0, 8),\n        (\"Unsteady Chair\", \"Secretly give your opponent a disadvantage\"\
    ,\n        \"Chess\", 29.95, 3),\n        (\"Human Chess Board\", \"A fun game\
    \ for the family\", \"Chess\", 75.0, 2),\n        (\"Bling-Bling King\", \"Gold-plated,\
    \ diamond-studded King\",\n        \"Chess\", 1200.0, 4)];\n\n    override func\
    \ viewDidLoad() {\n        super.viewDidLoad()\n    }\n\n    override func didReceiveMemoryWarning()\
    \ {\n        super.didReceiveMemoryWarning()\n    }\n}\n```\n\nThe type of the\
    \ variable is `UILabel`, which is the name of the class in the `UIKit` framework\
    \ that implements the label functionality. The `@IBOutlet` attribute identifies\
    \ the new variable as an outlet.\n\n### Updating the Display\n\nListing 3-3 shows\
    \ how I used the outlet to update the text displayed by the label in order to\
    \ display the number of items in stock.\n\n**Listing 3-3.** Displaying the Total\
    \ Stock in the `ViewController.swift` File\n\n```\nimport UIKit\n\nclass ViewController:\
    \ UIViewController {\n\n    @IBOutlet weak var totalStockLabel: UILabel!\n\n \
    \   var products = [\n        (\"Kayak\", \"A boat for one person\", \"Watersports\"\
    , 275.0, 10),\n        (\"Lifejacket\", \"Protective and fashionable\", \"Watersports\"\
    , 48.95, 14),\n        (\"Soccer Ball\", \"FIFA-approved size and weight\", \"\
    Soccer\", 19.5, 32),\n        (\"Corner Flags\", \"Give your playing field a professional\
    \ touch\",\n        \"Soccer\", 34.95, 1),\n        (\"Stadium\", \"Flat-packed\
    \ 35,000-seat stadium\", \"Soccer\", 79500.0, 4),\n        (\"Thinking Cap\",\
    \ \"Improve your brain efficiency by 75%\", \"Chess\", 16.0, 8),\n        (\"\
    Unsteady Chair\", \"Secretly give your opponent a disadvantage\",\n        \"\
    Chess\", 29.95, 3),\n        (\"Human Chess Board\", \"A fun game for the family\"\
    , \"Chess\", 75.0, 2),\n        (\"Bling-Bling King\", \"Gold-plated, diamond-studded\
    \ King\", \"Chess\",\n        1200.0, 4)];\n\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad();\n        displayStockTotal();\n    }\n\n   \
    \ override func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n\
    \    }\n\n    func displayStockTotal() {\n        let stockTotal = products.reduce(0,\n\
    \            {(total, product) -> Int in return total + product.4});\n       \
    \ totalStockLabel.text = \"\\(stockTotal) Products in Stock\";\n    }\n}\n```\n\
    \nI have defined a new method called `displayStockTotal`, which uses the `reduce`\
    \ extension from the Swift standard library. The `reduce` method invokes a function\
    \ for each item in the array. I expressed the function as a closure, which totals\
    \ the value at index 4 for each data tuple.\n\nOnce I have generated the total,\
    \ I set the `text` property of the label, which changes the string displayed by\
    \ the `UILabel` component in the application layout.\n\nI call the `displayStockTotal`\
    \ method from `viewDidLoad`, which is invoked when the application is initialized\
    \ and the view is loaded. To test the changes, click the **Play** button in the\
    \ Xcode toolbar. The effect is shown in Figure [3-12](#A978-1-4842-0394-1_3_Chapter.html#Fig12).\n\
    \n![A978-1-4842-0394-1_3_Fig12_HTML.jpg](A978-1-4842-0394-1_3_Fig12_HTML.jpg)\n\
    \n**Figure 3-12.** Displaying the total number of products\n\n## Implementing\
    \ the Table Cells\n\nIn this section, I am going to implement support for the\
    \ table in order to provide the user with information about the stock level of\
    \ each product and to change the stock level. I will create a custom table cell\
    \ that contains other controls and wire everything up into the `ViewController`\
    \ class, following the premise of creating a single-class application. (However,\
    \ as you will see, I cannot get away with just one class, and I will end up with\
    \ a simple second class that contains some `IBOutlet` properties)."
