    For this chapter, I created an Xcode Command Line Tool project called ChainOfResp.
    I added a file called `Message.swift` to the project and used it to define the
    code shown in Listing 19-1.


    Listing 19-1. The Contents of the Message.swift File


    `struct Message {`


    `let from:String;`


    `let to:String;`


    `let subject:String;`


    `}`


    I defined a struct called `Message` that has constants representing different
    properties of a general message: the sender of the message, who the message is
    to, and the subject of the message. I have not defined a constant for the body
    of the message, which I don’t need to demonstrate the chain of responsibility
    pattern. Listing 19-2 shows the contents of the `Transmitters.swift` file, in
    which I have defined a pair of classes that can process `Message` objects in order
    to transmit them elsewhere.


    Listing 19-2. The Contents of the Transmitters.swift File


    `class LocalTransmitter {`


    `func sendMessage(message: Message) {`


    `println("Message to \(message.to) sent locally");`


    `}`


    `}`


    `class RemoteTransmitter {`


    `func sendMessage(message: Message) {`


    `println("Message to \(message.to) sent remotely");`


    `}`


    `}`


    These classes represent the mechanisms by which messages are sent, either locally
    within a company or remotely to the wider world. Each transmitter class defines
    a `sendMessage` method that processes a `Message` object. I don’t need to implement
    message routing to demonstrate the chain of responsibility pattern, and so the
    `sendMessage` methods write a message to the Xcode debug console. Listing 19-3
    shows the code I added to the `main.swift` file to use the example classes.


    Listing 19-3. The Contents of the main.swift File


    `let messages = [`


    `Message(from: "bob@example.com", to: "joe@example.com",`


    `subject: "Free for lunch?"),`


    `Message(from: "joe@example.com", to: "alice@acme.com",`


    `subject: "New Contracts"),`


    `Message(from: "pete@example.com", to: "all@example.com",`


    `subject: "Priority: All-Hands Meeting"),`


    `];`


    `let localT = LocalTransmitter();`


    `let remoteT = RemoteTransmitter();`


    `for msg in messages {`


    `if let index = find(msg.from, "@") {`


    `if (msg.to.hasSuffix(msg.from[Range<String.Index>(start:`


    `index, end: msg.from.endIndex)])) {`


    `localT.sendMessage(msg);`


    `} else {`


    `remoteT.sendMessage(msg);`


    `}`


    `} else {`


    `println("Error: cannot send message to \(msg.from)");`


    `}`


    `}`


    I define an array of `Message` objects and use a `for` loop to examine each of
    them to choose between a `LocalTransmitter` object and a `RemoteTransmitter` object
    based on whether the `to` and `from` addresses share a common suffix. Running
    the example application produces the following results:


    `Message to joe@example.com sent locally`


    `Message to alice@acme.com sent remotely`


    `Message to all@example.com sent locally`


    ## Understanding the Problem That the Pattern Solves


    The problem in the example application is that the components that use the transmitter
    classes to process `Message` objects have to know about those classes and understand
    when each should be used. This makes it hard to add new message handlers, to change
    the relationship between existing handlers, and to test and maintain the code
    overall. To demonstrate the problem, I have defined a new transmitter class, as
    shown in Listing 19-4.


    Listing 19-4. Defining a New Transmitter Class in the Transmitters.swift File


    `class LocalTransmitter {`


    `func sendMessage(message: Message) {`


    `println("Message to \(message.to) sent locally");`


    `}`


    `}`


    `class RemoteTransmitter {`


    `func sendMessage(message: Message) {`


    `println("Message to \(message.to) sent remotely");`


    `}`


    `}`


    `class PriorityTransmitter {`


    `func sendMessage(message: Message) {`


    `println("Message to \(message.to) sent as priority");`


    `}`


    `}`


    To properly handle `Message` objects, components need to be updated to reflect
    the new `PriorityTransmitter` class and know when it should be used. Listing 19-5
    shows the changes required in the `main.swift` file, but in a real project these
    changes would be duplicated throughout the application.


    Listing 19-5. Reflecting the Definition of a New Transmitter Class in the main.swift
    File


    `let messages = [`


    `Message(from: "bob@example.com", to: "joe@example.com",`


    `subject: "Free for lunch?"),`


    `Message(from: "joe@example.com", to: "alice@acme.com",`


    `subject: "New Contracts"),`


    `Message(from: "pete@example.com", to: "all@example.com",`


    `subject: "Priority: All-Hands Meeting"),`


    `];`


    `let localT = LocalTransmitter();`


    `let remoteT = RemoteTransmitter();`


    `let priorityT = PriorityTransmitter();`


    `for msg in messages {`


    `if (msg.subject.hasPrefix("Priority")) {`


    `priorityT.sendMessage(msg);`


    `} else if let index = find(msg.from, "@") {`


    `if (msg.to.hasSuffix(msg.from[Range<String.Index>(start:`


    `index, end: msg.from.endIndex)])) {`


    `localT.sendMessage(msg);`


    `} else {`


    `remoteT.sendMessage(msg);`


    `}`


    `} else {`


    `println("Error: cannot send message to \(msg.from)");`


    `}`


    `}`


    The changes themselves are simple, but the fact that calling components require
    so much insight into how the transmitter classes relate to one another and when
    to use them is a problem.


    ## Understanding the Chain of Responsibility Pattern


    The chain of responsibility pattern solves these problems by arranging the transmitters
    in a chain (which is where it gets the name). Each transmitter is a link in the
    chain and is able to inspect the `Message` object to determine whether it can
    take responsibility for the request. If a link in the chain is able to handle
    the `Message` request, then it does so. If not, then the request is passed to
    the next link in the chain, and the process is repeated until the request is handled
    or the last link in the chain is reached. Figure [19-1](#A978-1-4842-0394-1_19_Chapter.html#Fig1)
    illustrates the chain of responsibility pattern.


    ![A978-1-4842-0394-1_19_Fig1_HTML.jpg](A978-1-4842-0394-1_19_Fig1_HTML.jpg)


    Figure 19-1.


    The chain of responsibility pattern


    The calling component deals only with the first link in the chain and has no knowledge
    of subsequent links or the basis on which each link decides whether it can take
    responsibility for the request. In the figure, I have shown a chain with three
    links, where the second link takes responsibility for the request. In this situation,
    the third link in the chain doesn’t participate in the process and is unaware
    of the request from the calling component.'
  trans: "\n## 准备示例项目\n\n本章我创建了一个名为 `ChainOfResp` 的 Xcode 命令行工具项目。我在项目中添加了一个名为 `Message.swift`\
