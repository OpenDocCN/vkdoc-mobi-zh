  raw: '## Understanding the Problem That the Pattern Solves


    In [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html), I showed you how the factory
    method pattern can be used to allow calling components to obtain an instance of
    an implementation class without needing to know which class was selected or why
    it was selected.


    The problem for this chapter is similar but applies to groups of related objects
    that do not share a common protocol or base class. In the previous section, I
    defined protocols for three car parts and created three implementation classes
    from them. For each of the values in the `Cars` enumeration, I want to select
    the appropriate product from each category, as shown in Table [10-2](#A978-1-4842-0394-1_10_Chapter.html#Tab2).


    Table 10-2.


    The Car to Product Mappings


    | Car | Floorplan | Suspension | Drivetrain |

    | --- | --- | --- | --- |

    | `COMPACT` | `StandardFloorplan` | `RoadSuspension` | `FrontWheelDrive` |

    | `SPORTS` | `ShortFloorplan` | `RaceSuspension` | `RearWheelDrive` |

    | `SUV` | `LongFloorplan` | `OffRoadSuspension` | `AllWheelDrive` |


    Currently, the only way for a component to create a car is to have knowledge of
    at least part of the table in order to instantiate the classes it requires. Listing
    10-5 shows how I create the implementation objects and use them to set the properties
    of a `Car` struct in the `main.swift` file.


    Listing 10-5. The Contents of the main.swift File


    `var car = Car(carType: Cars.SPORTS,`


    `floor: ShortFloorplan(),`


    `suspension: RaceSuspension(),`


    `drive: RearWheelDrive());`


    `car.printDetails();`


    You will see the following output in the debug console when you run the application:


    `Car type: Porsche Boxter`


    `Seats: 2`


    `Engine: Mid`


    `Suspension: Firm`


    `Drive: Rear`


    The problem presented by this approach is just the same as the one I faced in
    [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html): the decision logic for selecting
    which implementation classes will be diffused and duplicated throughout the application,
    and dependencies are created on the existence of individual implementation classes.
    If there is a change in the product mappings in Table [10-2](#A978-1-4842-0394-1_10_Chapter.html#Tab2),
    then corresponding changes will be required in all of the components that need
    to work with those products. These types of changes are tedious, error-prone,
    and hard to test.


    ## Understanding the Abstract Factory Pattern


    The abstract factory pattern shares a common purpose with the factory method pattern,
    but it is used to create groups of objects whose relationship is not expressed
    through a common protocol or base class. In the case of the example application,
    three objects are required to populate a `Car` struct, and each of those objects
    will implement a different protocol: the `Floorplan`, `Suspension`, and `Drivetrain`
    protocols.


    THE FACTORY METHOD VS. THE ABSTRACT FACTORY PATTERNS


    There is endless debate about the differences between the factory method and abstract
    factory patterns and when each should be used. This debate is made more complicated
    by the way that features of different languages change the implementation and
    emphasize or hide subtle differences.


    My advice is to focus on the intent and not the implementation. If you have a
    product matrix like the one in Table [10-2](#A978-1-4842-0394-1_10_Chapter.html#Tab2)
    and you need to make sure you don’t end up with, for example, the suspension of
    a sports car being used with the floor plan of an SUV, then use the abstract factory
    pattern. The abstract factory pattern hides the details of which objects are in
    a group inside of concrete factory classes, which are in turn hidden from the
    calling component. This extra complexity makes it easy to add new rows to the
    product matrix (by creating a new concrete factory) or change the products in
    an existing row (by modifying a concrete factory).


    The factory method pattern is much simpler because it deals with a single object
    and only has to hide which implementation class is selected. As you will see,
    I implement the abstract factory pattern by combining multiple factory methods
    into a single class.


    So, in short, ignore the semantic debate and focus on the goal. Use the factory
    method pattern to create a single object and use the abstract factory pattern
    if you are trying to manage a set of objects.


    The abstract factory pattern addresses the diffusion of the decision logic by
    consolidating it in one place. The pattern addresses the dependency on specific
    implementation classes by providing the calling component with access only to
    the protocols and not the classes that conform to them. There are four operations
    in the abstract factory pattern, as illustrated by Figure [10-1](#A978-1-4842-0394-1_10_Chapter.html#Fig1).


    ![A978-1-4842-0394-1_10_Fig1_HTML.jpg](A978-1-4842-0394-1_10_Fig1_HTML.jpg)


    Figure 10-1.


    The abstract factory pattern


    The pattern requires the use of an abstract factory class, which defines a method
    that will return an implementation of a protocol or base class. The first operation
    in the pattern occurs when the calling component invokes the abstract factory
    method to obtain an object.


    For the second operation, the abstract factory method examines the request from
    the calling component and selects a concrete factory class, which is a class that
    implements the factory method pattern (as described in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html)).
    An instance of the concrete factory class is created and returned to the caller.


    In the third operation, the calling component invokes the factory methods defined
    by the concrete factory class. This leads to the fourth and final operation, in
    which the implementation classes are instantiated to provide the calling component
    with the objects it requires.


    When trying to understand this pattern, it helps to focus on how knowledge of
    other classes is distributed throughout the pattern. The concrete factory knows
    which implementation classes belong together, and its methods create objects within
    the same group, even though the classes implement different protocols or are derived
    from different base classes.


    The abstract factory doesn’t know about which implementation classes will be used,
    but it does have knowledge of how to select the appropriate concrete factory for
    any given request.


    The calling component knows only about the factories and the protocols or base
    classes used by the implementation classes but not directly about the implementation
    classes. It relies on the abstract factory to provide it with an appropriate concrete
    factory and relies on the concrete factory to select appropriate implementation
    classes.


    ## Implementing the Abstract Factory Pattern


    In the sections that follow, I show you how to implement the abstract factory
    pattern in order to create objects to represent the car products that I defined
    at the start of the chapter.'
  trans: "\n# 理解该模式解决的问题\n\n在第 9 章中，我展示了如何使用工厂方法模式，让调用组件无需知道具体选择或选择原因，即可获取实现类的实例。\n\
    \n本章面临的问题与之类似，但适用于那些不共享通用协议或基类的相关对象组。在上一节中，我定义了三个汽车部件的协议，并从中创建了三个实现类。对于`Cars`枚举中的每个值，我都希望从每个类别中选择合适的产品，如表\
    \ 10-2 所示。\n\n**表 10-2.** 车型与产品映射关系\n\n| 车型 | 底盘布局 | 悬挂系统 | 驱动系统 |\n| --- | ---\
    \ | --- | --- |\n| `COMPACT` | `StandardFloorplan` | `RoadSuspension` | `FrontWheelDrive`\
    \ |\n| `SPORTS` | `ShortFloorplan` | `RaceSuspension` | `RearWheelDrive` |\n|\
    \ `SUV` | `LongFloorplan` | `OffRoadSuspension` | `AllWheelDrive` |\n\n目前，组件要创建一辆汽车的唯一途径是必须至少了解表中部分内容，才能实例化所需的类。代码清单\
    \ 10-5 展示了如何在`main.swift`文件中创建实现对象，并用它们设置`Car`结构的属性。\n\n**代码清单 10-5.** `main.swift`文件的内容\n\
    \n```\nvar car = Car(carType: Cars.SPORTS,\n              floor: ShortFloorplan(),\n\
    \              suspension: RaceSuspension(),\n              drive: RearWheelDrive());\n\
    car.printDetails();\n```\n\n运行应用程序时，你将在调试控制台中看到以下输出：\n\n```\nCar type: Porsche\
    \ Boxter\nSeats: 2\nEngine: Mid\nSuspension: Firm\nDrive: Rear\n```\n\n这种方法带来的问题与我在第\
    \ 9 章中面临的问题相同：选择实现类的决策逻辑将在整个应用程序中分散和重复，并且会形成对单个实现类存在的依赖。如果表 10-2 中的产品映射发生变化，那么所有需要操作这些产品的组件都需要进行相应的修改。这类修改既繁琐、易出错，又难以测试。\n\
    \n# 理解抽象工厂模式\n\n抽象工厂模式与工厂方法模式有着共同的目的，但它是用于创建那些关系无法通过通用协议或基类表达的对象组。在示例应用程序中，需要三个对象来填充`Car`结构，而每个对象将实现不同的协议：`Floorplan`、`Suspension`和`Drivetrain`协议。\n\
    \n## 工厂方法与抽象工厂模式\n\n关于工厂方法模式和抽象工厂模式之间的区别，以及各自的使用时机，存在着无休止的争论。由于不同语言的特性改变了实现方式，并强调或隐藏了细微差别，使得这场争论更加复杂。\n\
    \n我的建议是关注意图而非实现。如果你有一个像表 10-2 这样的产品矩阵，并且需要确保不会出现例如跑车的悬挂系统与 SUV 的底盘布局混用的情况，那么就使用抽象工厂模式。抽象工厂模式将对象组中的具体对象细节隐藏在具体工厂类中，而具体工厂类又对调用组件隐藏。这种额外的复杂性使得很容易向产品矩阵中添加新行（通过创建新的具体工厂）或更改现有行中的产品（通过修改具体工厂）。\n\
    \n工厂方法模式则简单得多，因为它只处理单个对象，并且只需隐藏选择了哪个实现类。正如你将看到的，我通过将多个工厂方法组合到一个类中来实现抽象工厂模式。\n\n\
    简而言之，忽略语义上的争论，专注于目标。使用工厂方法模式来创建单个对象；如果你试图管理一组对象，则使用抽象工厂模式。\n\n抽象工厂模式通过将决策逻辑集中在一个地方来解决其分散化的问题。该模式通过只向调用组件提供协议访问权限（而非符合协议的具体类）来解决对特定实现类的依赖问题。抽象工厂模式包含四个操作，如图\
    \ 10-1 所示。\n\n![A978-1-4842-0394-1_10_Fig1_HTML.jpg](img/A978-1-4842-0394-1_10_Fig1_HTML.jpg)\n\
    \n**图 10-1.** 抽象工厂模式\n\n该模式需要使用一个抽象工厂类，该类定义了一个方法，该方法将返回一个协议或基类的实现。模式中的第一个操作发生在调用组件调用抽象工厂方法获取对象时。\n\
    \n对于第二个操作，抽象工厂方法会检查调用组件的请求，并选择一个具体工厂类，即实现了工厂方法模式的类（如第 9 章所述）。创建具体工厂类的实例并将其返回给调用者。\n\
    \n在第三个操作中，调用组件调用由具体工厂类定义的工厂方法。这引出了第四个也是最后一个操作，在此操作中，实例化实现类，以向调用组件提供其所需的对象。\n\n\
    在尝试理解此模式时，重点关注其他类的知识在整个模式中如何分布会有所帮助。具体工厂知道哪些实现类属于同一组，并且它的方法会创建同一组内的对象，即使这些类实现了不同的协议或源于不同的基类。\n\
    \n抽象工厂不知道将使用哪些实现类，但它确实知道如何为任何给定请求选择合适的工厂类。\n\n调用组件只知道工厂以及实现类使用的协议或基类，而不直接了解实现类。它依赖抽象工厂来提供合适的工厂类，并依赖具体工厂来选择合适的实现类。\n\
    \n# 实现抽象工厂模式\n\n在接下来的几节中，我将向你展示如何实现抽象工厂模式，以创建代表本章开头定义的汽车产品的对象。\n"
- fmt: "### Creating the Abstract Factory\n\nI am going to start by creating the abstract\
    \ factory class. This class is at the heart of the pattern because it is used\
    \ as the base class from which concrete factories are derived. Listing 10-6 shows\
    \ the contents of a file called `Abstract.swift` that I added to the example project.\n\
    \n**Listing 10-6.** The Contents of the `Abstract.swift` File\n\n```\nclass CarFactory\
    \ {\n\n    func createFloorplan() -> Floorplan {\n        fatalError(\"Not implemented\"\
    );\n    }\n\n    func createSuspension() -> Suspension {\n        fatalError(\"\
    Not implemented\");\n    }\n\n    func createDrivetrain() -> Drivetrain {\n  \
    \      fatalError(\"Not implemented\");\n    }\n\n}\n```\n\nThe abstract factory\
    \ is called `CarFactory`, and it defines `createFloorplan`, `createSuspension`,\
    \ and `createDrivetrain` methods that return objects that implement the three\
    \ product protocols: `Floorplan`, `Suspension`, and `Drivetrain`. There is just\
    \ enough functionality in this class for it to be used as a base for the concrete\
    \ factory classes, which I define in the next section. Once the concrete factory\
    \ classes are defined, I will return to this class and complete it so that it\
    \ is capable of selecting and using a concrete factory.\n\n### Creating the Concrete\
    \ Factories\n\nThe next step is to create the concrete factory classes, which\
    \ are responsible for creating a group of product objects that can be used together.\
    \ I added a file called `Concrete.swift` to the project and used it to define\
    \ the classes shown in Listing 10-7.\n\n**Listing 10-7.** The Contents of the\
    \ `Concrete.swift` File\n\n```\nclass CompactCarFactory : CarFactory {\n\n   \
    \ override func createFloorplan() -> Floorplan {\n        return StandardFloorplan();\n\
    \    }\n\n    override func createSuspension() -> Suspension {\n        return\
    \ RoadSuspension();\n    }\n\n    override func createDrivetrain() -> Drivetrain\
    \ {\n        return FrontWheelDrive();\n    }\n\n}\n\nclass SportsCarFactory :\
    \ CarFactory {\n\n    override func createFloorplan() -> Floorplan {\n       \
    \ return ShortFloorplan();\n    }\n\n    override func createSuspension() -> Suspension\
    \ {\n        return RaceSuspension();\n    }\n\n    override func createDrivetrain()\
    \ -> Drivetrain {\n        return RearWheelDrive();\n    }\n\n}\n\nclass SUVCarFactory\
    \ : CarFactory {\n\n    override func createFloorplan() -> Floorplan {\n     \
    \   return LongFloorplan();\n    }\n\n    override func createSuspension() ->\
    \ Suspension {\n        return OffRoadSuspension();\n    }\n\n    override func\
    \ createDrivetrain() -> Drivetrain {\n        return AllWheelDrive();\n    }\n\
    \n}\n```\n\nEach concrete factory class is derived from the `CarFactory` class\
    \ and overrides its methods to create one of the groups of products shown in Table\
    \ [10-2](#A978-1-4842-0394-1_10_Chapter.html#Tab2).\n\n### Completing the Abstract\
    \ Factory\n\nI can now return to the abstract factory class and complete the implementation\
    \ of the pattern. Listing 10-8 shows the changes that select concrete factories\
    \ in order to provide calling components with the means to obtain a concrete factory.\n\
    \n**Listing 10-8.** Completing the Pattern Implementation in the `Abstract.swift`\
    \ File\n\n```\nclass CarFactory {\n\n    func createFloorplan() -> Floorplan {\n\
    \        fatalError(\"Not implemented\");\n    }\n\n    func createSuspension()\
    \ -> Suspension {\n        fatalError(\"Not implemented\");\n    }\n\n    func\
    \ createDrivetrain() -> Drivetrain {\n        fatalError(\"Not implemented\");\n\
    \    }\n\n    final class func getFactory(car:Cars) -> CarFactory? {\n       \
    \ var factory:CarFactory?\n        switch (car) {\n            case .COMPACT:\n\
    \                factory = CompactCarFactory();\n            case .SPORTS:\n \
    \               factory = SportsCarFactory();\n            case .SUV:\n      \
    \          factory = SUVCarFactory();\n        }\n        return factory;\n  \
    \  }\n\n}\n```\n\nI have added a type method called `getFactory` that accepts\
    \ a value from the `Cars` enumeration and that selects a concrete factory and\
    \ returns an instance of it to the calling component. The selected factory is\
    \ presented to the calling component as a `CarFactory` object, and details of\
    \ which concrete factory has been selected—and why—remain private.\n\n### Consuming\
    \ the Abstract Factory Pattern\n\nThe last step is to update the code that creates\
    \ the `Car` object so that it obtains its products through the abstract factory.\
    \ Listing 10-9 shows the changes I made to the `main.swift` file.\n\n**Listing\
    \ 10-9.** Consuming the Abstract Factory Pattern in the `main.swift` File\n\n\
    ```\nlet factory = CarFactory.getFactory(Cars.SPORTS);\nif (factory != nil) {\n\
    \    let car = Car(carType: Cars.SPORTS,\n        floor: factory!.createFloorplan(),\n\
    \        suspension: factory!.createSuspension(),\n        drive: factory!.createDrivetrain());\n\
    \    car.printDetails();\n}\n```\n\nRather than instantiate the implementation\
    \ objects directly, I use the abstract factory class to obtain a concrete factory\
    \ for the type of car I require and then call the `create` methods to obtain the\
    \ implementation objects. If you run the application, you will see the following\
    \ output:\n\n```\nCar type: Porsche Boxter\nSeats: 2\nEngine: Mid\nSuspension:\
    \ Firm\nDrive: Rear\n```\n\nAs the Listing 10-9 shows, there are no dependencies\
    \ between the code in the `main.swift` file and the individual product classes.\
    \ This means that if the matrix shown in Table [10-2](#A978-1-4842-0394-1_10_Chapter.html#Tab2)\
    \ changes, I can update the corresponding concrete factory classes without having\
    \ to make corresponding changes in the components that consume them. In Listing\
    \ 10-10, you can see how I changed the drive train option for the sports car.\n\
    \n**Listing 10-10.** Changing an Implementation Class in the `Concrete.swift`\
    \ File\n\n```\n...\nclass SportsCarFactory : CarFactory {\n\n    override func\
    \ createFloorplan() -> Floorplan {\n        return ShortFloorplan();\n    }\n\n\
    \    override func createSuspension() -> Suspension {\n        return RaceSuspension();\n\
    \    }\n\n    override func createDrivetrain() -> Drivetrain {\n        return\
    \ AllWheelDrive();\n    }\n\n}\n...\n```\n\nThe output produced by running the\
    \ application shows the effect of the change.\n\n```\nCar type: Porsche Boxter\n\
    Seats: 2\nEngine: Mid\nSuspension: Firm\nDrive: 4WD\n```\n\nBy consolidating the\
    \ decisions about which group of products belong together, the concrete factories\
    \ reduce the impact of change in the application, which makes the decision logic\
    \ easier to test and maintain. The abstract factory consolidates the decision\
    \ logic for selecting the concrete factory, further isolating calling components\
    \ from the details of how groups of implementation classes are associated with\
    \ one another.\n\n## Variations on the Abstract Factory Pattern\n\nThere are common\
    \ variations that you can use to adapt the way that the abstract factory is implemented.\
    \ As I explain in the following sections, the basic mechanism remains the same,\
    \ but the implementation is altered to control how objects are created."
