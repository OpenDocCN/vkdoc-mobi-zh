    \n- 服务员询问顾客姓名。\n- 服务员询问顾客是否需要素食餐。\n- 服务员询问顾客是否要定制汉堡。\n- 服务员询问顾客是否要升级并额外购买一个肉饼。\n\
    \n这个过程虽然只有四个步骤，却引发了一些问题。清单 11-3 展示了如何在`main.swift`文件中模拟此过程，从而改变我创建`Burger`对象的方式。\n\
    \n**清单 11-3.** 在 `main.swift` 文件中实现点餐流程\n\n```\n// 第 1 步 - 询问姓名\nlet name = \"\
    Joe\";\n\n// 第 2 步 - 是否需要素食？\nlet veggie = false;\n\n// 第 3 步 - 定制汉堡？\nlet pickles\
