    \ iOS 模拟器的 **Hardware** 菜单中选择 **Shake Gesture**，这些值将被重置。\n\n## 本章小结\n\n在本章中，我向您展示了如何使用备忘录模式来描述和应用对象的状态。这是最少使用的模式之一，并且往往被更通用的命令模式所掩盖，但描述对象整个状态的概念可能非常强大。在下一章中，我将介绍策略模式，该模式定义了可以在不被修改或子类化的情况下进行扩展的类。\n\
    \n# 24. 策略模式\n\n策略模式用于创建功能可以在不被修改或子类化的情况下进行扩展的类，这在您向第三方开发者交付框架时，或者当对关键类进行任何（无论多小的）更改都会触发广泛且昂贵的测试和验证流程时非常有用。表\
    \ 24-1 将策略模式置于上下文中。\n\n**表 24-1.** 策略模式的上下文\n\n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？\
    \ | 策略模式用于创建无需修改即可扩展的类，通过应用符合明确定义协议的算法对象来实现。 |\n| 有什么好处？ | 策略模式允许第三方开发者在不修改类的情况下更改其行为，并且可以在那些对特定类有昂贵且冗长的验证流程的项目中实现低成本的更改。\
    \ |\n| 何时应使用此模式？ | 当您需要可以扩展且无需修改的类时，请使用此模式。 |\n| 何时应避免此模式？ | 没有理由避免此模式。 |\n| 如何判断是否正确实现了该模式？\
    \ | 当您可以通过定义和应用新策略来扩展类的行为，而无需对类本身进行任何更改时，就说明策略模式已正确实现。 |\n| 有什么常见的陷阱吗？ | 没有。策略模式实现起来很简单。\
    \ |\n| 有没有相关的模式？ | 策略模式和访问者模式经常一起使用。 |\n\n## 准备示例项目\n\n在本章中，我创建了一个名为 `Strategy`\
    \ 的 Xcode OS X 命令行工具项目。我添加了一个名为 `Sequence.swift` 的文件，并用于定义代码清单 24-1 中所示的类。\n\n\
    **代码清单 24-1.** `Sequence.swift` 文件的内容\n\n```\nclass Sequence {\n    private var\
    \ numbers:[Int];\n    init(_ numbers:Int...) {\n        self.numbers = numbers;\n\
    \    }\n    func addNumber(value:Int) {\n        self.numbers.append(value);\n\
    \    }\n    func compute() -> Int {\n        return numbers.reduce(0, combine:\
    \ {$0 + $1});\n    }\n}\n```\n\n`Sequence` 类维护一个 `Int` 值的数组，这些值通过初始化器定义，并通过 `addNumber`\
    \ 方法添加。`compute` 方法使用 `reduce` 函数对值进行求和并返回结果。代码清单 24-2 显示了我添加到 `main.swift` 文件中以使用\
    \ `Sequence` 类的代码。\n\n**代码清单 24-2.** `main.swift` 文件的内容\n\n```\nlet sequence =\
    \ Sequence(1, 2, 3, 4);\nsequence.addNumber(10);\nsequence.addNumber(20);\nlet\
    \ sum = sequence.compute();\nprintln(\"Sum: \\(sum)\");\n```\n\n我创建了一个 `Sequence`\
    \ 对象，调用了两次 `addNumber` 方法，然后调用 `compute` 方法计算总和，并将其写入 Xcode 控制台。运行该应用程序会产生以下输出：\n\
    \n```\nSum: 40\n```\n"
- fmt: "# Understanding the Problem That the Pattern Solves\n\nThe `Sequence` class\
    \ that I defined in the example application contains a simple algorithm. When\
    \ the `compute` method is called, the `reduce` method is used to add together\
    \ all of the `Int` values in the collection.\n\nIf I want to add another algorithm,\
    \ then I have a choice. I can modify the code of the `Sequence` class to add the\
    \ new algorithm alongside the existing one, or I can create a new subclass that\
    \ overrides the existing algorithm and effectively replaces it.\n\nModifying or\
    \ subclassing to add features runs counter to the open/closed design principle,\
    \ which states that classes should be open to being extended and should be closed\
    \ to being modified, or, put another way, that is preferable to be able to add\
    \ to the functionality provided by a class without needing to modify it or to\
    \ create a new subclass.\n\nThere is nothing intrinsically wrong with modifying\
    \ source code or creating new subclasses, but for some projects, doing so can\
    \ trigger requirements for extensive unit, system, and integration testing before\
    \ a change can be deployed into a production system. This process is often driven\
    \ by regulatory requirements or sometimes by a corporate policy that places the\
    \ emphasis on quality rather than time to market. To set the scene for the chapter,\
    \ Listing 24-3 shows a simple change applied to the `Sequence` class to define\
    \ a second algorithm.\n\n**Listing 24-3.** Defining a New Algorithm in the `Sequence.swift`\
    \ File\n\n```\nenum ALGORITHM {\n    case ADD; case MULTIPLY;\n}\n\nclass Sequence\
    \ {\n    private var numbers:[Int];\n    init(_ numbers:Int...) {\n        self.numbers\
    \ = numbers;\n    }\n    func addNumber(value:Int) {\n        self.numbers.append(value);\n\
    \    }\n    func compute(algorithm:ALGORITHM) -> Int {\n        switch (algorithm)\
    \ {\n        case .ADD:\n            return numbers.reduce(0, combine: {$0 + $1});\n\
    \        case .MULTIPLY:\n            return numbers.reduce(1, combine: {$0 *\
    \ $1});\n        }\n    }\n}\n```\n\nThere are lots of ways I could have added\
    \ the new algorithm, but I have chosen to define a enumeration that specifies\
    \ the algorithm, which I then use in a `switch` statement in the `compute` method.\
    \ In projects that have a heavy-weight testing and validation process, the simple\
    \ addition of a multiplication algorithm would trigger weeks of expensive testing.\
    \ For completeness, Listing 24-4 shows the corresponding changes to the `main.swift`\
    \ file to use the new `Sequence` feature.\n\n**Listing 24-4.** Using the New Sequence\
    \ Algorithm in the `main.swift` File\n\n```\nlet sequence = Sequence(1, 2, 3,\
    \ 4);\nsequence.addNumber(10);\nsequence.addNumber(20);\nlet sum = sequence.compute(ALGORITHM.ADD);\n\
    println(\"Sum: \\(sum)\");\nlet multiply = sequence.compute(ALGORITHM.MULTIPLY);\n\
    println(\"Multiply: \\(multiply)\");\n```\n\nRunning the example application produces\
    \ the following results:\n\n```\nSum: 40\nMultiply: 4800\n```\n\n# Understanding\
    \ the Strategy Pattern\n\nThe strategy pattern supports the open/closed principle\
    \ by defining a protocol to which different algorithm classes can conform. This\
    \ allows for the algorithm to be selected and changed at runtime and for new algorithms\
    \ to be added to the application without needing to change the class that uses\
    \ them. Figure 24-1 illustrates the strategy pattern.\n\n![A978-1-4842-0394-1_24_Fig1_HTML.jpg](A978-1-4842-0394-1_24_Fig1_HTML.jpg)\n\
    \n**Figure 24-1.** The strategy pattern\n\nIn the strategy pattern, the class\
    \ that is being extended is known as the context class. Rather than implementing\
    \ a feature directly, the context class delegates its implementation to a class\
    \ that conforms to the strategy protocol. The strategy pattern doesn’t specify\
    \ how a specific strategy implementation class is selected, but the most common\
    \ approach is to let the calling component make the choice.\n\n# Implementing\
    \ the Strategy Pattern\n\nThe heart of the strategy pattern is the protocol that\
    \ is used to specify an algorithm. Listing 24-5 shows the contents of the `Strategies.swift`\
    \ file, which I added to the example project.\n\n**Listing 24-5.** The Contents\
    \ of the `Strategies.swift` File\n\n```\nprotocol Strategy {\n    func execute(values:[Int])\
    \ -> Int;\n}\n```\n\nThe strategy protocol doesn’t specify any aspect of an algorithm\
    \ other than the inputs and outputs. In this case, the strategy operates on an\
    \ `Int` array and produces a single `Int` value.\n\n## Defining the Strategies\
    \ and the Context Class\n\nThe next step is to define strategy classes for each\
    \ of the algorithms required by the application. Listing 24-6 shows the classes\
    \ I defined for the example applications.\n\n**Listing 24-6.** Defining the Strategy\
    \ Classes in the `Strategies.swift` File\n\n```\nprotocol Strategy {\n    func\
    \ execute(values:[Int]) -> Int;\n}\n\nclass SumStrategy: Strategy {\n    func\
    \ execute(values: [Int]) -> Int {\n        return values.reduce(0, combine: {$0\
    \ + $1});\n    }\n}\n\nclass MultiplyStrategy: Strategy {\n    func execute(values:\
    \ [Int]) -> Int {\n        return values.reduce(1, combine: {$0 * $1});\n    }\n\
    }\n```\n\nI have defined strategies that sum and multiply the `Int` values, each\
    \ of which conforms to the `Strategy` protocol. You can see how the strategy protocol\
    \ is used in the context class in Listing 24-7, which shows how I replaced the\
    \ directly implementing algorithms with delegation to a strategy that is specified\
    \ as an argument to the `compute` method.\n\n**Listing 24-7.** Delegating to a\
    \ Strategy in the `Sequence.swift` File\n\n```\nfinal class Sequence {\n    private\
    \ var numbers:[Int];\n    init(_ numbers:Int...) {\n        self.numbers = numbers;\n\
    \    }\n    func addNumber(value:Int) {\n        self.numbers.append(value);\n\
    \    }\n    func compute(strategy:Strategy) -> Int {\n        return strategy.execute(self.numbers);\n\
    \    }\n}\n```\n\nThe objective when implementing the strategy pattern is to define\
    \ a context class that doesn’t need to be modified or subclassed. In addition\
    \ to revising the `compute` method, I have marked the class as `final`.\n\n##\
    \ Consuming the Pattern\n\nThe final step is to revise the calling component so\
    \ that it selects strategies. I have followed the most common approach in my implementation,\
    \ which is to have the calling component create instances of the strategy implementation\
    \ objects and pass them to the context class, as shown in Listing 24-8.\n\n**Listing\
    \ 24-8.** Selecting and Using Strategies in the `main.swift` File\n\n```\nlet\
    \ sequence = Sequence(1, 2, 3, 4);\nsequence.addNumber(10);\nsequence.addNumber(20);\n\
    let sumStrategy = SumStrategy();\nlet multiplyStrategy = MultiplyStrategy();\n\
    let sum = sequence.compute(sumStrategy);\nprintln(\"Sum: \\(sum)\");\nlet multiply\
    \ = sequence.compute(multiplyStrategy);\nprintln(\"Multiply: \\(multiply)\");\n\
    ```\n\nRunning the example application produces the following output:\n\n```\n\
    Sum: 40\nMultiply: 4800\n```"
  raw: '## Understanding the Problem That the Pattern Solves


    The `Sequence` class that I defined in the example application contains a simple
    algorithm. When the `compute` method is called, the `reduce` method is used to
    add together all of the `Int` values in the collection.


    If I want to add another algorithm, then I have a choice. I can modify the code
    of the `Sequence` class to add the new algorithm alongside the existing one, or
    I can create a new subclass that overrides the existing algorithm and effectively
    replaces it.


    Modifying or subclassing to add features runs counter to the open/closed design
    principle, which states that classes should be open to being extended and should
    be closed to being modified, or, put another way, that is preferable to be able
    to add to the functionality provided by a class without needing to modify it or
    to create a new subclass.


    There is nothing intrinsically wrong with modifying source code or creating new
    subclasses, but for some projects, doing so can trigger requirements for extensive
    unit, system, and integration testing before a change can be deployed into a production
    system. This process is often driven by regulatory requirements or sometimes by
    a corporate policy that places the emphasis on quality rather than time to market.
    To set the scene for the chapter, Listing 24-3 shows a simple change applied to
    the `Sequence` class to define a second algorithm.


    Listing 24-3. Defining a New Algorithm in the Sequence.swift File


    `enum ALGORITHM {`


    `case ADD; case MULTIPLY;`


    `}`


    `class Sequence {`


    `private var numbers:[Int];`


    `init(_ numbers:Int...) {`


    `self.numbers = numbers;`


    `}`


    `func addNumber(value:Int) {`


    `self.numbers.append(value);`


    `}`


    `func compute(algorithm:ALGORITHM) -> Int {`


    `switch (algorithm) {`


    `case .ADD:`


    `return numbers.reduce(0, combine: {$0 + $1});`


    `case .MULTIPLY:`


    `return numbers.reduce(1, combine: {$0 * $1});`


    `}`


    `}`


    `}`


    There are lots of ways I could have added the new algorithm, but I have chosen
    to define a enumeration that specifies the algorithm, which I then use in a `switch`
    statement in the `compute` method. In projects that have a heavy-weight testing
    and validation process, the simple addition of a multiplication algorithm would
    trigger weeks of expensive testing. For completeness, Listing 24-4 shows the corresponding
    changes to the `main.swift` file to use the new `Sequence` feature.


    Listing 24-4. Using the New Sequence Algorithm in the main.swift File


    `let sequence = Sequence(1, 2, 3, 4);`


    `sequence.addNumber(10);`


    `sequence.addNumber(20);`


    `let sum = sequence.compute(ALGORITHM.ADD);`


    `println("Sum: \(sum)");`


    `let multiply = sequence.compute(ALGORITHM.MULTIPLY);`


    `println("Multiply: \(multiply)");`


    Running the example application produces the following results:


    `Sum: 40`


    `Multiply: 4800`


    ## Understanding the Strategy Pattern


    The strategy pattern supports the open/closed principle by defining a protocol
    to which different algorithm classes can conform. This allows for the algorithm
    to be selected and changed at runtime and for new algorithms to be added to the
    application without needing to change the class that uses them. Figure [24-1](#A978-1-4842-0394-1_24_Chapter.html#Fig1)
    illustrates the strategy pattern.


    ![A978-1-4842-0394-1_24_Fig1_HTML.jpg](A978-1-4842-0394-1_24_Fig1_HTML.jpg)


    Figure 24-1.


    The strategy pattern


    In the strategy pattern, the class that is being extended is known as thecontext
    class. Rather than implementing a feature directly, the context class delegates
    its implementation to a class that conforms to the strategy protocol. The strategy
    pattern doesn’t specify how a specific strategy implementation class is selected,
    but the most common approach is to let the calling component make the choice.


    ## Implementing the Strategy Pattern


    The heart of the strategy pattern is the protocol that is used to specify an algorithm.
    Listing 24-5 shows the contents of the `Strategies.swift` file, which I added
    to the example project.


    Listing 24-5. The Contents of the Strategies.swift File


    `protocol Strategy {`


    `func execute(values:[Int]) -> Int;`


    `}`


    The strategy protocol doesn’t specify any aspect of an algorithm other than the
    inputs and outputs. In this case, the strategy operates on an `Int` array and
    produces a single `Int` value.


    ### Defining the Strategies and the Context Class


    The next step is to define strategy classes for each of the algorithms required
    by the application. Listing 24-6 shows the classes I defined for the example applications.


    Listing 24-6. Defining the Strategy Classes in the Strategies.swift File


    `protocol Strategy {`


    `func execute(values:[Int]) -> Int;`


    `}`


    `class SumStrategy: Strategy {`


    `func execute(values: [Int]) -> Int {`


    `return values.reduce(0, combine: {$0 + $1});`


    `}`


    `}`


    `class MultiplyStrategy: Strategy {`


    `func execute(values: [Int]) -> Int {`


    `return values.reduce(1, combine: {$0 * $1});`


    `}`


    `}`


    I have defined strategies that sum and multiply the `Int` values, each of which
    conforms to the `Strategy` protocol. You can see how the strategy protocol is
    used in the context class in Listing 24-7, which shows how I replaced the directly
    implementing algorithms with delegation to a strategy that is specified as an
    argument to the `compute` method.


    Listing 24-7. Delegating to a Strategy in the Sequence.swift File


    `final class Sequence {`


    `private var numbers:[Int];`


    `init(_ numbers:Int...) {`


    `self.numbers = numbers;`


    `}`


    `func addNumber(value:Int) {`


    `self.numbers.append(value);`


    `}`


    `func compute(strategy:Strategy) -> Int {`


    `return strategy.execute(self.numbers);`


    `}`


    `}`


    The objective when implementing the strategy pattern is to define a context class
    that doesn’t need to be modified or subclassed. In addition to revising the `compute`
    method, I have marked the class as `final`.


    ### Consuming the Pattern


    The final step is to revise the calling component so that it selects strategies.
    I have followed the most common approach in my implementation, which is to have
    the calling component create instances of the strategy implementation objects
    and pass them to the context class, as shown in Listing 24-8.


    Listing 24-8. Selecting and Using Strategies in the main.swift File


    `let sequence = Sequence(1, 2, 3, 4);`


    `sequence.addNumber(10);`


    `sequence.addNumber(20);`


    `let sumStrategy = SumStrategy();`


    `let multiplyStrategy = MultiplyStrategy();`


    `let sum = sequence.compute(sumStrategy);`


    `println("Sum: \(sum)");`


    `let multiply = sequence.compute(multiplyStrategy);`


    `println("Multiply: \(multiply)");`


    Running the example application produces the following output:


    `Sum: 40`


    `Multiply: 4800`'
  trans: "\n# 理解该模式要解决的问题\n\n我在示例应用中定义的 `Sequence` 类包含一个简单的算法。当 `compute` 方法被调用时，会使用\
    \ `reduce` 方法将集合中的所有 `Int` 值相加。\n\n如果我想添加另一个算法，就需要做出选择。我既可以修改 `Sequence` 类的代码，在现有算法旁添加新算法，也可以创建一个新的子类，覆盖并有效替换现有算法。\n\
    \n通过修改或创建子类来添加功能，违背了开闭设计原则。该原则指出，类应该对扩展开放，对修改封闭。换句话说，更可取的做法是能够在不修改类或创建新子类的前提下，扩展类所提供的功能。\n\
    \n修改源代码或创建新子类本身并无本质上的错误，但对于某些项目而言，这样做可能会触发需求，即在将变更部署到生产系统之前，需要进行大量的单元测试、系统测试和集成测试。这一流程通常由监管要求驱动，有时则是因为公司政策更强调质量而非上市速度。为了给本章内容做铺垫，清单\
    \ 24-3 展示了对 `Sequence` 类进行的一项简单修改，以定义第二个算法。\n\n**清单 24-3.** 在 `Sequence.swift`\
    \ 文件中定义新算法\n\n```\nenum ALGORITHM {\n    case ADD; case MULTIPLY;\n}\n\nclass\
    \ Sequence {\n    private var numbers:[Int];\n    init(_ numbers:Int...) {\n \
    \       self.numbers = numbers;\n    }\n    func addNumber(value:Int) {\n    \
    \    self.numbers.append(value);\n    }\n    func compute(algorithm:ALGORITHM)\
    \ -> Int {\n        switch (algorithm) {\n        case .ADD:\n            return\
    \ numbers.reduce(0, combine: {$0 + $1});\n        case .MULTIPLY:\n          \
    \  return numbers.reduce(1, combine: {$0 * $1});\n        }\n    }\n}\n```\n\n\
    我本可以用很多种方式添加新算法，但我选择了定义一个枚举来指定算法，然后在 `compute` 方法中通过 `switch` 语句使用它。在那些测试和验证流程繁重的项目中，仅仅添加一个乘法算法，就可能触发长达数周且成本高昂的测试。为了完整性起见，清单\
    \ 24-4 展示了 `main.swift` 文件中相应的更改，以使用新的 `Sequence` 功能。\n\n**清单 24-4.** 在 `main.swift`\
    \ 文件中使用新的 Sequence 算法\n\n```\nlet sequence = Sequence(1, 2, 3, 4);\nsequence.addNumber(10);\n\
    sequence.addNumber(20);\nlet sum = sequence.compute(ALGORITHM.ADD);\nprintln(\"\
    Sum: \\(sum)\");\nlet multiply = sequence.compute(ALGORITHM.MULTIPLY);\nprintln(\"\
    Multiply: \\(multiply)\");\n```\n\n运行示例应用会得到以下结果：\n\n```\nSum: 40\nMultiply: 4800\n\
    ```\n\n# 理解策略模式\n\n策略模式通过定义一个协议（不同的算法类可以遵循该协议）来支持开闭原则。这使得算法可以在运行时被选择和更改，并且可以在不修改使用算法的类的前提下，将新算法添加到应用程序中。图\
    \ 24-1 展示了策略模式。\n\n![A978-1-4842-0394-1_24_Fig1_HTML.jpg](img/A978-1-4842-0394-1_24_Fig1_HTML.jpg)\n\
    \n**图 24-1.** 策略模式\n\n在策略模式中，被扩展的类被称为上下文类。上下文类不直接实现某个功能，而是将其实现委托给一个遵循策略协议的类。策略模式并未指定如何选择特定的策略实现类，但最常见的方法是让调用组件来做这个选择。\n\
    \n# 实现策略模式\n\n策略模式的核心是用于指定算法的协议。清单 24-5 展示了 `Strategies.swift` 文件的内容，我已将其添加到示例项目中。\n\
    \n**清单 24-5.** `Strategies.swift` 文件的内容\n\n```\nprotocol Strategy {\n    func\
    \ execute(values:[Int]) -> Int;\n}\n```\n\n策略协议除了指定输入和输出之外，并不规定算法的任何其他方面。在这个案例中，策略操作的是一个\
    \ `Int` 数组，并生成一个单一的 `Int` 值。\n\n## 定义策略和上下文类\n\n下一步是为应用程序所需的每个算法定义策略类。清单 24-6\
    \ 展示了我为示例应用定义的类。\n\n**清单 24-6.** 在 `Strategies.swift` 文件中定义策略类\n\n```\nprotocol\
    \ Strategy {\n    func execute(values:[Int]) -> Int;\n}\n\nclass SumStrategy:\
    \ Strategy {\n    func execute(values: [Int]) -> Int {\n        return values.reduce(0,\
    \ combine: {$0 + $1});\n    }\n}\n\nclass MultiplyStrategy: Strategy {\n    func\
    \ execute(values: [Int]) -> Int {\n        return values.reduce(1, combine: {$0\
    \ * $1});\n    }\n}\n```\n\n我定义了求和与求乘积 `Int` 值的策略，两者都遵循 `Strategy` 协议。你可以从清单 24-7\
    \ 中看到策略协议在上下文类中是如何使用的，该清单展示了我如何将直接实现的算法替换为委托给一个作为 `compute` 方法参数的策略。\n\n**清单 24-7.**\
    \ 在 `Sequence.swift` 文件中委托给策略\n\n```\nfinal class Sequence {\n    private var\
    \ numbers:[Int];\n    init(_ numbers:Int...) {\n        self.numbers = numbers;\n\
    \    }\n    func addNumber(value:Int) {\n        self.numbers.append(value);\n\
    \    }\n    func compute(strategy:Strategy) -> Int {\n        return strategy.execute(self.numbers);\n\
    \    }\n}\n```\n\n实现策略模式的目标是定义一个无需修改或创建子类的上下文类。除了修改 `compute` 方法，我还将这个类标记为 `final`。\n\
    \n## 使用该模式\n\n最后一步是修改调用组件，以便它能选择策略。在我的实现中，我采用了最常见的方法，即由调用组件创建策略实现对象的实例，并将它们传递给上下文类，如清单\
    \ 24-8 所示。\n\n**清单 24-8.** 在 `main.swift` 文件中选择并使用策略\n\n```\nlet sequence = Sequence(1,\
    \ 2, 3, 4);\nsequence.addNumber(10);\nsequence.addNumber(20);\nlet sumStrategy\
    \ = SumStrategy();\nlet multiplyStrategy = MultiplyStrategy();\nlet sum = sequence.compute(sumStrategy);\n\
    println(\"Sum: \\(sum)\");\nlet multiply = sequence.compute(multiplyStrategy);\n\
    println(\"Multiply: \\(multiply)\");\n```\n\n运行示例应用会得到以下输出：\n\n```\nSum: 40\n\
    Multiply: 4800\n```\n"
- fmt: "## Variations on the Strategy Pattern\n\nSwift makes it easy to define strategies\
    \ as closures rather than as objects that conform to a protocol. The advantage\
    \ of using closures is that a calling component can close on its own methods and\
    \ properties to define more complex strategies. The drawback of closures is that\
    \ they can be harder to read, and passing them around as objects requires close\
    \ attention to detail.\n\nA compromise approach is to create a class that conforms\
    \ to a strategy protocol but that relies on a closure as its implementation. Listing\
    \ 24-9 shows the addition I made to the `Strategies.swift` file to define such\
    \ a class.\n\nListing 24-9. Defining a Closure Strategy Class in the `Strategies.swift`\
    \ File\n\n```\nprotocol Strategy {\n    func execute(values:[Int]) -> Int;\n}\n\
    \nclass ClosureStrategy : Strategy {\n    private let closure:[Int] -> Int;\n\
    \    init(_ closure:[Int] -> Int) {\n        self.closure = closure;\n    }\n\
    \    func execute(values: [Int]) -> Int {\n        return self.closure(values);\n\
    \    }\n}\n\nclass SumStrategy: Strategy {\n    func execute(values: [Int]) ->\
    \ Int {\n        return values.reduce(0, combine: {$0 + $1});\n    }\n}\n\nclass\
    \ MultiplyStrategy: Strategy {\n    func execute(values: [Int]) -> Int {\n   \
    \     return values.reduce(1, combine: {$0 * $1});\n    }\n}\n```\n\nThe `ClosureStrategy`\
    \ class conforms to the `Strategy` protocol and accepts a closure as its initializer\
    \ argument, which is then used in the implementation of the `execute` method.\
    \ Listing 24-10 shows how I can use the `ClosureStrategy` class to close on a\
    \ property in the `main.swift` file.\n\nListing 24-10. Using a Closure in the\
    \ `main.swift` File\n\n```\nlet sequence = Sequence(1, 2, 3, 4);\nsequence.addNumber(10);\n\
    sequence.addNumber(20);\n\nlet sumStrategy = SumStrategy();\nlet multiplyStrategy\
    \ = MultiplyStrategy();\n\nlet sum = sequence.compute(sumStrategy);\nprintln(\"\
    Sum: \\(sum)\");\n\nlet multiply = sequence.compute(multiplyStrategy);\nprintln(\"\
    Multiply: \\(multiply)\");\n\nlet filterThreshold = 10;\nlet cstrategy = ClosureStrategy({values\
    \ in\n    return values.filter({ $0 < filterThreshold }).reduce(0, {$0 + $1});\n\
    });\nlet filteredSum = sequence.compute(cstrategy);\nprintln(\"Filtered Sum: \\\
    (filteredSum)\");\n```\n\nI use the `ClosureStrategy` class to close on the `filterThreshold`\
    \ constant and use it to select a subset of values to sum. Running the application\
    \ produces the following results:\n\n```\nSum: 40\nMultiply: 4800\nFiltered Sum:\
    \ 10\n```\n\n## Understanding the Pitfalls of the Strategy Pattern\n\nThere are\
    \ no pitfalls associated with the strategy pattern, which is simple to implement\
    \ and use.\n\n## Examples of the Strategy Pattern in Cocoa\n\nThe strategy pattern\
    \ is used extensively in Cocoa to allow the behavior of framework classes to be\
    \ changed without modification or subclassing. The Cocoa implementations of strategies\
    \ tend to fall into two categories: those defined by protocols and those defined\
    \ by selectors. I give an example of each in the sections that follow.\n\n###\
    \ Cocoa Protocol-Based Strategies\n\nCocoa uses protocols to define strategies\
    \ for its UI components, and one of the classic examples is using a protocol to\
    \ define the strategy for generating rows in a table view. The class that implements\
    \ the table view is called `UITableView`, and it relies on a class that conforms\
    \ to the `UITableViewDataSource` protocol to implement the strategy for providing\
    \ data, allowing third-party developers to extend the behavior of the `UITableView`\
    \ class without needing to modify it or to create a subclass. As a simple demonstration,\
    \ I created an Xcode iOS playground called `ProtocolStrategy.playground` and used\
    \ it to define the code shown in Listing 24-11.\n\nListing 24-11. The Contents\
    \ of the `ProtocolStrategy.playground` File\n\n```\nimport UIKit\n\nclass DataSourceStrategy\
    \ : NSObject, UITableViewDataSource {\n    let data:[Printable];\n    init(_ data:Printable...)\
    \ {\n        self.data = data;\n    }\n    func tableView(tableView: UITableView,\n\
    \        numberOfRowsInSection section: Int) -> Int {\n        return data.count;\n\
    \    }\n    func tableView(tableView: UITableView,\n        cellForRowAtIndexPath\
    \ indexPath: NSIndexPath) -> UITableViewCell {\n        let cell = UITableViewCell();\n\
    \        cell.textLabel.text = data[indexPath.row].description;\n        return\
    \ cell;\n    }\n}\n\nlet dataSource = DataSourceStrategy(\"London\", \"New York\"\
    , \"Paris\", \"Rome\");\nlet table = UITableView(frame: CGRectMake(0, 0, 400,\
    \ 200));\ntable.dataSource = dataSource;\ntable.reloadData();\n// required for\
    \ display in assistant editor\ntable;\n```\n\nI have defined a class called `DataSourceStrategy`\
    \ that conforms to the `UITableViewDataSource` protocol and implements the two\
    \ methods required to provide data values from an array of `Printable` objects.\
    \ I create an instance of the strategy class and use it as the data source for\
    \ a `UITableView` object, producing the result shown in Figure 24-2.\n\n![A978-1-4842-0394-1_24_Fig2_HTML.jpg](A978-1-4842-0394-1_24_Fig2_HTML.jpg)\n\
    \nFigure 24-2. Using a protocol-based UIKit strategy\n\n### Cocoa Selector-Based\
    \ Strategies\n\nNot all Cocoa classes rely on protocols to define strategies.\
    \ Some use selectors to specify methods that are called on to extend the functionality\
    \ of a class. As a demonstration, I created an Xcode OS X playground called `SelectorStrategy.playground`,\
    \ which is shown in Listing 24-12.\n\nListing 24-12. The Contents of the `SelectorStrategy.playground`\
    \ File\n\n```\nimport Foundation;\n\n@objc class City {\n    let name:String;\n\
    \    init(_ name:String) {\n        self.name = name;\n    }\n    func compareTo(other:City)\
    \ -> NSComparisonResult {\n        if (self.name == other.name) {\n          \
    \  return NSComparisonResult.OrderedSame;\n        } else if (self.name < other.name)\
    \ {\n            return NSComparisonResult.OrderedDescending;\n        } else\
    \ {\n            return NSComparisonResult.OrderedAscending;\n        }\n    }\n\
    }\n\nlet nsArray = NSArray(array: [City(\"London\"), City(\"New York\"), City(\"\
    Paris\"), City(\"Rome\")]);\nlet sorted = nsArray.sortedArrayUsingSelector(\"\
    compareTo:\");\nfor city in sorted {\n    println(city.name);\n}\n```\n\nThe `NSArray`\
    \ class can be used to sort its contents using a selector to refer to the method\
    \ that defines the strategy for comparing two objects. In the example, I define\
    \ an object called `City` that has a method called `compareTo`. The `compareTo`\
    \ method accepts another `City` object and compares it to the current instance,\
    \ returning a value from the `NSComparisonResult` enumeration.\n\nI define an\
    \ `NSArray` of `City` objects and sort the array by calling the `sortedArrayUsingSelector`\
    \ method, specifying that the `compareTo` method contains the strategy for comparing\
    \ `City` objects. The result is a sorted array of objects written to the console,\
    \ as follows:\n\n```\nRome\nParis\nNew York\nLondon\n```\n\n## Applying the Pattern\
    \ to the SportsStore Application\n\nThe SportsStore application already relies\
    \ on the strategy pattern because the `ViewController` class implements the `UITableViewDataSource`\
    \ protocol in order to provide data items to a `UITableView` component.\n\n```\n\
    ...\nclass ViewController: UIViewController, UITableViewDataSource {\n...\n```\n\
    \n## Summary\n\nI described the strategy design pattern in this chapter, which\
    \ is used to extend the functionality of a class without modifying it or creating\
    \ a new subclass. In the next chapter, I describe the visitor pattern, which allows\
    \ the behavior of collection classes to be extended without modification or subclassing."
  raw: '## Variations on the Strategy Pattern


    Swift makes it easy to define strategies as closures rather than as objects that
    conform to a protocol. The advantage of using closures is that a calling component
    can close on its own methods and properties to define more complex strategies.
    The drawback of closures is that they can be harder to read, and passing them
    around as objects requires close attention to detail.


    A compromise approach is to create a class that conforms to a strategy protocol
    but that relies on a closure as its implementation. Listing 24-9 shows the addition
    I made to the `Strategies.swift` file to define such a class.


    Listing 24-9. Defining a Closure Strategy Class in the Strategies.swift File


    `protocol Strategy {`


    `func execute(values:[Int]) -> Int;`


    `}`


    `class ClosureStrategy : Strategy {`


    `private let closure:[Int] -> Int;`


    `init(_ closure:[Int] -> Int) {`


    `self.closure = closure;`


    `}`


    `func execute(values: [Int]) -> Int {`


    `return self.closure(values);`


    `}`


    `}`


    `class SumStrategy: Strategy {`


    `func execute(values: [Int]) -> Int {`


    `return values.reduce(0, combine: {$0 + $1});`


    `}`


    `}`


    `class MultiplyStrategy: Strategy {`


    `func execute(values: [Int]) -> Int {`


    `return values.reduce(1, combine: {$0 * $1});`


    `}`


    `}`


    The `ClosureStrategy` class conforms to the `Strategy` protocol and accepts a
    closure as its initializer argument, which is then used in the implementation
    of the `execute` method. Listing 24-10 shows how I can use the `ClosureStrategy`
    class to close on a property in the `main.swift` file.


    Listing 24-10. Using a Closure in the main.swift File


    `let sequence = Sequence(1, 2, 3, 4);`


    `sequence.addNumber(10);`


    `sequence.addNumber(20);`


    `let sumStrategy = SumStrategy();`


    `let multiplyStrategy = MultiplyStrategy();`


    `let sum = sequence.compute(sumStrategy);`


    `println("Sum: \(sum)");`


    `let multiply = sequence.compute(multiplyStrategy);`


    `println("Multiply: \(multiply)");`


    `let filterThreshold = 10;`


    `let cstrategy = ClosureStrategy({values in`


    `return values.filter({ $0 < filterThreshold }).reduce(0, {$0 + $1});`


    `});`


    `let filteredSum = sequence.compute(cstrategy);`


    `println("Filtered Sum: \(filteredSum)");`


    I use the `ClosureStrategy` class to close on the `filterThreshold` constant and
    use it to select a subset of values to sum. Running the application produces the
    following results:


    `Sum: 40`


    `Multiply: 4800`


    `Filtered Sum: 10`


    ## Understanding the Pitfalls of the Strategy Pattern


    There are no pitfalls associated with the strategy pattern, which is simple to
    implement and use.


    ## Examples of the Strategy Pattern in Cocoa


    The strategy pattern is used extensively in Cocoa to allow the behavior of framework
    classes to be changed without modification or subclassing. The Cocoa implementations
    of strategies tend to fall into two categories: those defined by protocols and
    those defined by selectors. I give an example of each in the sections that follow.


    ### Cocoa Protocol-Based Strategies


    Cocoa uses protocols to define strategies for its UI components, and one of the
    classic examples is using a protocol to define the strategy for generating rows
    in a table view. The class that implements the table view is called `UITableView`,
    and it relies on a class that conforms to the `UITableViewDataSource` protocol
    to implement the strategy for providing data, allowing third-party developers
    to extend the behavior of the `UITableView` class without needing to modify it
    or to create a subclass. As a simple demonstration, I created an Xcode iOS playground
    called `ProtocolStrategy.playground` and used it to define the code shown in Listing
    24-11.


    Listing 24-11. The Contents of the ProtocolStrategy.playground File


    `import UIKit`


    `class DataSourceStrategy : NSObject, UITableViewDataSource {`


    `let data:[Printable];`


    `init(_ data:Printable...) {`


    `self.data = data;`


    `}`


    `func tableView(tableView: UITableView,`


    `numberOfRowsInSection section: Int) -> Int {`


    `return data.count;`


    `}`


    `func tableView(tableView: UITableView,`


    `cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell {`


    `let cell = UITableViewCell();`


    `cell.textLabel.text = data[indexPath.row].description;`


    `return cell;`


    `}`


    `}`


    `let dataSource = DataSourceStrategy("London", "New York", "Paris", "Rome");`


    `let table = UITableView(frame: CGRectMake(0, 0, 400, 200));`


    `table.dataSource = dataSource;`


    `table.reloadData();`


    `// required for display in assistant editor`


    `table;`


    I have defined a class called `DataSourceStrategy` that conforms to the `UITableViewDataSource`
    protocol and implements the two methods required to provide data values from an
    array of `Printable` objects. I create an instance of the strategy class and use
    it as the data source for a `UITableView` object, producing the result shown in
    Figure [24-2](#A978-1-4842-0394-1_24_Chapter.html#Fig2).


    ![A978-1-4842-0394-1_24_Fig2_HTML.jpg](A978-1-4842-0394-1_24_Fig2_HTML.jpg)


    Figure 24-2.


    Using a protocol-based UIKit strategy


    ### Cocoa Selector-Based Strategies


    Not all Cocoa classes rely on protocols to define strategies. Some use selectors
    to specify methods that are called on to extend the functionality of a class.
    As a demonstration, I created an Xcode OS X playground called `SelectorStrategy.playground`,
    which is shown in Listing 24-12.


    Listing 24-12. The Contents of the SelectorStrategy.playground File


    `import Foundation;`


    `@objc class City {`


    `let name:String;`


    `init(_ name:String) {`


    `self.name = name;`


    `}`


    `func compareTo(other:City) -> NSComparisonResult {`


    `if (self.name == other.name) {`


    `return NSComparisonResult.OrderedSame;`


    `} else if (self.name < other.name) {`


    `return NSComparisonResult.OrderedDescending;`


    `} else {`


    `return NSComparisonResult.OrderedAscending;`


    `}`


    `}`


    `}`


    `let nsArray = NSArray(array: [City("London"), City("New York"), City("Paris"),
    City("Rome")]);`


    `let sorted = nsArray.sortedArrayUsingSelector("compareTo:");`


    `for city in sorted {`


    `println(city.name);`


    `}`


    The `NSArray` class can be used to sort its contents using a selector to refer
    to the method that defines the strategy for comparing two objects. In the example,
    I define an object called `City` that has a method called `compareTo`. The `compareTo`
    method accepts another `City` object and compares it to the current instance,
    returning a value from the `NSComparisonResult` enumeration.


    I define an `NSArray` of `City` objects and sort the array by calling the `sortedArrayUsingSelector`
    method, specifying that the `compareTo` method contains the strategy for comparing
    `City` objects. The result is a sorted array of objects written to the console,
    as follows:


    `Rome`


    `Paris`


    `New York`


    `London`


    ## Applying the Pattern to the SportsStore Application


    The SportsStore application already relies on the strategy pattern because the
    `ViewController` class implements the `UITableViewDataSource` protocol in order
    to provide data items to a `UITableView` component.


    `...`


    `class ViewController: UIViewController,` `UITableViewDataSource` `{`


    `...`


    ## Summary


    I described the strategy design pattern in this chapter, which is used to extend
    the functionality of a class without modifying it or creating a new subclass.
    In the next chapter, I describe the visitor pattern, which allows the behavior
    of collection classes to be extended without modification or subclassing.'
