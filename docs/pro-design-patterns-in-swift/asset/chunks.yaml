  trans: '

    # 量化设计模式的价值


    人们很容易接受设计模式是件好事。每个人都理解那些在无数项目中用来解决棘手问题的成熟方案的吸引力。但要说服团队中的其他程序员在项目中采用某种特定模式则困难得多。


    你可以通过问自己以下问题来评估一份保险是否物有所值：


    - 该保险是否针对我可能遭遇的不利事件？

    - 这种不利事件发生的频率如何？

    - 保费是否只占处理该事件成本的一小部分？


    这些简单的问题让我们明白，如果你没有车，或者你所在的小镇没有偷车贼，那么购买车险就没有意义。它们也突显了为价值 1.1 万美元的汽车每年支付 1 万美元保险费是多么不值，除非你预计会发生多次盗窃（如果是这样，你可能还要考虑搬到另一个地方去住）。


    即使这只是对保险的简单看法，但要点很清楚：不要买一份没有好处的保险。设计模式也是如此：除非它能提供你可以量化并清晰向他人说明的价值，否则不要采用。评估设计模式价值所需的问题类似：


    - 该模式是否识别出我可能遇到的问题？

    - 这个问题出现的频率有多高？

    - 我是否足够在意避免未来修复该问题的风险，以至于现在愿意投入工作来实现这个设计模式？


    回答这些问题可能很困难。软件开发领域没有精算表，而且很难估计未来修复问题所需的工作量（尤其是那些可能根本不会出现的问题）。


    相反，更简单的方法是关注设计模式能立即提供的好处。例如，那些提高应用程序模块化的模式，通常是为了最小化未来变更的影响，但一个模块化的应用程序拥有更少紧耦合的组件，这意味着更容易隔离代码单元。能够隔离代码单元对于有效的单元测试至关重要，因此，采用一种"变更保险"模式能带来立即可见的好处——提高代码的可测试性。


    同样，那些增加应用程序抽象程度的设计模式，允许以更少的代码重复和更少的精力添加新功能。几乎每个人都能认同更快、更简单的开发是件好事，即使他们不认同需要避免设计模式旨在防范的问题。


    然而，没有简单的答案。最终是否采用设计模式的决定，将由开发团队的综合经验、对需求规格完整性的信心以及单个开发人员的能力共同决定。


    # 在问题发生后使用设计模式


    如果你是一个团队中唯一提倡设计模式的人，而团队成员没有相关经验且时间紧张，你将很难推动模式的采用。你很可能无法说服他人。不要灰心。


    我的建议是不要过于强硬。如果你强迫团队遵循新的实践，那么每一次由此导致的延迟和问题都会被归咎于你，尤其是当你试图防范的问题从未发生时，情况会更加困难。可悲的是，设计模式的倡导者常常被视为会预言不祥之事的预言家。


    不要失去希望，但请把这本书放下，等待时机。如果你担心的问题没有发生——例如，数据库模式没有改变——那么可以庆幸项目躲过了一劫，然后继续下一个任务。


    如果问题确实发生了，也不用担心；你仍然可以从设计模式中受益。你的项目现在陷入了你原本希望避免的境地，但你可以利用这些模式作为框架，帮自己摆脱困境。选择最合适的设计模式，并以此为基础构建整洁的代码，围绕它来推动问题的解决。通过这种方式，你可以利用糟糕的局面，让团队了解并采用经过验证的问题解决方案。这当然不如一开始就避免问题那么好，但至少你能创建一个长期解决方案，并为你对设计模式的热情增添一些可信度。


    # 理解设计模式的局限性


    设计模式有很多优点，但它们也有局限性。从本质上讲，设计模式是其他项目上其他人遇到问题的解决方案。设计模式是避免或解决问题的起点，而非精确定制的解决方案。这并不意味着它们没用，但它们确实需要一些调整才能适应你的项目。


    请将设计模式视为菜谱。对模式进行修补、调整和修改，你最终会得到适合你的东西。你可能需要多次完善你的实现，并且随着从多个项目中获得洞察，你对模式的使用可能会变得更好，但你最终会得到一个比起点有所改进的方案，并有助于减轻常见问题的影响。


    有些程序员将设计模式视为不可改变的法则。他们是"模式狂热者"——将模式的使用鼓吹为一种僵化的"最佳实践"，认为必须始终遵循，不能改动。这完全是胡说八道。应用你不需要的模式，或者拒绝调整模式以适应项目，完全没有抓住重点。


    试图与模式狂热者争论毫无意义。他们从引用越来越晦涩的源头中获得乐趣，没有有效的方法让他们的观点接地气。我的建议是忽略他们，专注于通过构建健壮、可扩展且足够灵活以应对变化的优秀软件，而本书描述的设计模式可以帮助你实现所有这些目标。


    # 关于本书


    在本书中，我将描述如何使用`Swift`和`Cocoa`框架来运用最重要的设计模式。`Swift`为苹果平台吸引了许多新的开发者，因此我撰写本书是为了提供关于`Swift`和我所用到的`Cocoa`类的所有必要信息。我还将向你展示如何使用`Xcode`创建示例项目，如果你刚接触`Swift`开发世界，`Xcode`可能会是一个令人困惑的工具。如果你不想自己输入代码，可以从`Apress.com`下载所有示例。


    ## 你需要具备哪些知识？


    你需要是一名有经验的开发者才能理解书中的概念。不需要事先了解`Swift`，但你应该理解面向对象编程的基本概念，并且使用过诸如`Objective-C`、`C#`、`Java`或`JavaScript`等现代语言。


    ## 你需要哪些软件？


    你需要一台运行`OS X 10.10 (Yosemite)`的 Mac 电脑，并已下载安装`Xcode 6.1`。要获取`Xcode`，你需要注册成为苹果开发者，你可以在`https://developer.apple.com`上完成注册。如果你对`Xcode`不熟悉，不用担心；在第
    2 章中，我会向你展示跟随示例所需的一切知识。

    '
- fmt: '### What Is the Structure of This Book?


    This book is split into five parts, each of which covers a set of related topics.
    Part 1 contains this chapter and an Xcode primer for the techniques you will need
    to follow for the example in this book. I also build an example application called
    SportsStore that I return to throughout this book to demonstrate how to apply
    design pattern in context.


    Each of the other four parts of the book focuses on a specific type of pattern.
    Part 2 covers the creational design patterns, which are concerned with how objects
    are created in an application. Part 3 describes the structural design patterns,
    which define and manage the relationship between objects in an application. Part
    4 of this book focuses on the patterns that describe how objects communicate with
    one another. In the final part of this book, I describe the Model/View/Controller
    (MVC) pattern, which applies to the structure of the entire application and is
    commonly used for Mac OS and iOS UI applications.


    ### Where Can You Get the Example Code?


    You can download all the examples for all the chapters in this book from [`www.apress.com`](http://www.apress.com/).
    The download is available without charge and includes everything you need to re-create
    the examples without having to type them in. You don’t have to download the code,
    but it is the easiest way of experimenting with the examples and cutting and pasting
    into your own projects.


    If you do want to re-create the examples from scratch, then you will find that
    every chapter contains detailed listings of all the files that I create and modify.
    I never refer you to an external file or hand-wave about leaving the rest of the
    example as an exercise; every detail you need to re-create every example is contained
    within this book.


    ## Summary


    In this chapter, I outlined the content and structure of this book and set out
    the experience and software required. In the next chapter, I provide a brief primer
    to Xcode and describe the features I rely on in this book.


    # 2. Getting Used to Xcode


    In this chapter, I use Xcode to demonstrate the ways in which I present examples
    throughout this book. Playgrounds, which are one of the most useful features of
    Xcode 6, allow for code experiments to be created and evaluated without needing
    to create an application project. I use playgrounds to help describe the problems
    that patterns are intended to solve and use them to demonstrate simple implementations.


    Many of the design patterns I describe in this book rely on restricting access
    to classes, methods, and properties. Swift supports access protection keywords,
    but they operate on a per-file basis. This is a problem for playgrounds because
    all the code is in a single file, and so access protections are not enforced.
    Many of the design patterns I describe require support for concurrent access,
    which is something that playgrounds do not handle at all well.


    For these reasons, I also use OS X Command Line Tool projects, which are the simplest
    Xcode projects that support multiple files. Command Line Tool projects do not
    present a windowed UI to the user and are limited to reading from and writing
    to the console. The benefit of using such a simple project type is that it allows
    me to focus on just the design pattern I am describing and the code required to
    implement it, without the complexity of dealing with a user interface.


    Few real-world projects are so simple, of course, and in [Chapter 3](#A978-1-4842-0394-1_3_Chapter.html),
    I create an iOS app called SportsStore, which does present a graphical user interface
    and which I use in every chapter to provide additional context for applying the
    patterns I describe.


    ## Working with Xcode Playgrounds


    Xcode playgrounds are a good way to prototype code and test ideas without needing
    to create an iOS application project. Playgrounds are a new feature in Xcode 6,
    and many developers are unfamiliar with them, especially those who have been attracted
    to iOS and Mac OS development by Swift and have not used earlier Xcode releases
    to develop in Objective-C.


    ### Creating a Playground


    When you start Xcode, you will be presented with a splash screen that lets you
    select between creating a new playground, creating a new project, or checking
    out an existing project from a source code repository, as shown in Figure [2-1](#A978-1-4842-0394-1_2_Chapter.html#Fig1).


    ![A978-1-4842-0394-1_2_Fig1_HTML.jpg](A978-1-4842-0394-1_2_Fig1_HTML.jpg)


    Figure 2-1.


    The Xcode 6 splash screen Tip


    Select New ➤ Playground from the File menu if the splash window is not shown.


    Click “Get started with a playground.” Xcode will prompt you for a location to
    name and save the playground file. Change the name to MyFirstPlayground and ensure
    that iOS is selected for Platform, as shown in Figure [2-2](#A978-1-4842-0394-1_2_Chapter.html#Fig2).


    ![A978-1-4842-0394-1_2_Fig2_HTML.jpg](A978-1-4842-0394-1_2_Fig2_HTML.jpg)


    Figure 2-2.


    Naming the playground and selecting the platform


    Click the Next button and select a location where you will be easily able to find
    the playground in the future, as shown in Figure [2-3](#A978-1-4842-0394-1_2_Chapter.html#Fig3).


    ![A978-1-4842-0394-1_2_Fig3_HTML.jpg](A978-1-4842-0394-1_2_Fig3_HTML.jpg)


    Figure 2-3.


    Changing the name of the playground file and selecting a save location


    Xcode will create a file called `MyFirstPlayground.playground` in the location
    you selected, the contents of which are shown in Listing 2-1. If this is the first
    time you have used Xcode, you will be asked to enable developer mode.


    ```

    Listing 2-1. The Contents of the MyFirstPlayground.playground File


    import UIKit


    var str = "Hello, playground"

    ```


    Tip


    I don’t show the comments added by Xcode in the listings in this book or add any
    of my own comments. In real projects I incessantly comment code, but in this book
    I’ll be explaining the effect of the statements I write in the accompanying text.


    A playground provides insights into the code that is entered into the editor.
    There is a comment and two statements in the playground. Comments are ignored,
    and the `import` statement makes classes in the Cocoa `UIKit` framework available.
    It is the second statement that gives a hint of what playgrounds can do.


    ```

    var str = "Hello, playground"

    ```


    This statement creates a variable called `str` and uses a literal string value
    to set its value. If you look to the right of this statement in the playground,
    you will see that the value of the variable is displayed, as illustrated by Figure
    [2-4](#A978-1-4842-0394-1_2_Chapter.html#Fig4).


    ![A978-1-4842-0394-1_2_Fig4_HTML.jpg](A978-1-4842-0394-1_2_Fig4_HTML.jpg)


    Figure 2-4.


    A simple playground


    This is an interesting start but not especially useful. In the sections that follow,
    I’ll show you the different playground features that I rely on in this book.'
