    \ 0, 400, 200));\ntable.dataSource = dataSource;\ntable.reloadData();\n// required\
    \ for display in assistant editor\ntable;\n```\n\n我定义了一个名为 `DataSourceStrategy`\
    \ 的类，它遵循 `UITableViewDataSource` 协议，并实现了从 `Printable` 对象数组中提供数据值所需的两个方法。我创建了一个策略类的实例，并将其用作\
    \ `UITableView` 对象的数据源，得到了如图 24-2 所示的结果。\n\n![A978-1-4842-0394-1_24_Fig2_HTML.jpg](img/A978-1-4842-0394-1_24_Fig2_HTML.jpg)\n\
    \n图 24-2. 使用基于协议的 UIKit 策略\n\n### Cocoa 基于选择器的策略\n\n并非所有 Cocoa 类都依赖协议来定义策略。有些类使用选择器来指定被调用的方法，以扩展类的功能。作为演示，我创建了一个名为\
    \ `SelectorStrategy.playground` 的 Xcode OS X playground，如代码清单 24-12 所示。\n\n**代码清单\
    \ 24-12.** `SelectorStrategy.playground` 文件的内容\n\n```\nimport Foundation;\n\n\
