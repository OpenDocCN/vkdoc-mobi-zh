    \ description:String, category:String,\n        price:Double, stockLevel:Int)\
    \ -> Product {\n        var productType:Product.Type;\n        switch (category)\
    \ {\n            case \"Watersports\":\n                productType = WatersportsProduct.self;\n\
    \            case \"Soccer\":\n                productType = SoccerProduct.self;\n\
    \            default:\n                productType = Product.self;\n        }\n\
    \        return productType(name:name, description: description, category: category,\n\
    \            price: price, stockLevel: stockLevel);\n    }\n}\n...\n```\n\nThe\
    \ factory method is called `createProduct`, and it selects a class using a `switch`\
    \ statement on the `category` parameter. The class is instantiated to produce\
    \ the object that is returned to the caller. The `createProduct` method returns\
    \ an instance of the `Product` class and hides the details of which subclass has\
