- fmt: "### Creating a Two-Way Adapter\n\nThe standard implementation of the adapter\
    \ pattern assumes that the flow of method and property calls will flow in one\
    \ direction: from the application to the component. This is usually the case,\
    \ especially when dealing with third-party components like UI widgets, but there\
    \ are occasions when the component expects to initiate its own actions, typically\
    \ to query the application or to notify it about a change in its state or the\
    \ services it provides. To demonstrate this problem, I created a playground called\
    \ `TwoWayAdapter.playground` and used it to define the classes and protocols shown\
    \ in Listing 12-10. (I have used a playground because demonstrating this problem\
    \ in the example application would require me to list a lot of code for some minor\
    \ changes).\n\n**Listing 12-10.** The Contents of the TwoWayAdapter.playground\
    \ File\n\n```\n// application\nprotocol ShapeDrawer {\n    func drawShape();\n\
    }\n\nclass DrawingApp {\n    let drawer:ShapeDrawer;\n    var cornerRadius:Int\
    \ = 0;\n\n    init(drawer:ShapeDrawer) {\n        self.drawer = drawer;\n    }\n\
    \n    func makePicture() {\n        drawer.drawShape();\n    }\n}\n\n// component\
    \ library\nprotocol AppSettings {\n    var sketchRoundedShapes:Bool { get };\n\
    }\n\nclass SketchComponent {\n    private let settings:AppSettings;\n\n    init(settings:AppSettings)\
    \ {\n        self.settings = settings;\n    }\n\n    func sketchShape() {\n  \
    \      if (settings.sketchRoundedShapes) {\n            println(\"Sketch Circle\"\
    );\n        } else {\n            println(\"Sketch Square\");\n        }\n   \
    \ }\n}\n```\n\nI have broken the code into two sections—one for the application\
    \ and one for the component that needs to be integrated. On the application side,\
    \ the `DrawingApp` class relies on the `ShapeDrawer` protocol to perform its work\
    \ in the `makePicture` method. On the component side, the `SketchComponent` class\
    \ relies on the `AppSettings` protocol to work out what type of shape it should\
    \ draw.\n\nThe goal is to create an adapter that will let a `DrawingApp` object\
    \ use a `SketchComponent` object to create a shape and, in return, let the `SketchComponent`\
    \ query the application through the `AppSettings` protocol.\n\nUsing an adapter\
    \ in a single direction is easy, but it is harder to adapt objects that communicate\
    \ in both directions—not least because I have created the classes to have dueling\
    \ initializers. I can’t create an instance of the `DrawingApp` unless I have an\
    \ object that conforms to the `ShapeDrawer` protocol to use as an initializer\
    \ argument. Equally, I can’t create a `SketchComponent` object unless I can pass\
    \ its initializer an object that conforms to the `AppSettings` protocol. Listing\
    \ 12-11 shows the adapter I created to solve the problem and integrate the classes\
    \ with one another.\n\n**Listing 12-11.** Creating an Adapter in the TwoWayAdapter.playground\
    \ File\n\n```\n// application\nprotocol ShapeDrawer {\n    func drawShape();\n\
    }\n\nclass DrawingApp {\n    // ...statements omitted for brevity...\n}\n\n//\
    \ component library\nprotocol AppSettings {\n    var sketchRoundedShapes:Bool\
    \ { get };\n}\n\nclass SketchComponent {\n    // ...statements omitted for brevity...\n\
    }\n\nclass TwoWayAdapter : ShapeDrawer, AppSettings {\n    var app:DrawingApp?;\n\
    \    var component:SketchComponent?\n\n    func drawShape() {\n        component?.sketchShape();\n\
    \    }\n\n    var sketchRoundedShapes: Bool {\n        return app?.cornerRadius\
    \ > 0;\n    }\n}\n```\n\nThe adapter class—called `TwoWayAdapter`—conforms to\
    \ the `ShapeDrawer` and `AppSettings` protocols and implements the protocol methods\
    \ using optional instances of the `DrawingApp` and `SketchComponent` classes.\
    \ This is the key to working around the competing demands of the initializers,\
    \ as Listing 12-12 shows.\n\n**Listing 12-12.** Using the Adapter in the TwoWayAdapter.playground\
    \ File\n\n```\nprotocol ShapeDrawer {\n    func drawShape();\n}\n\nclass DrawingApp\
    \ {\n    // ...statements omitted for brevity...\n}\n\n// component library\n\
    protocol AppSettings {\n    var sketchRoundedShapes:Bool { get };\n}\n\nclass\
    \ SketchComponent {\n    // ...statements omitted for brevity...\n}\n\nclass TwoWayAdapter\
    \ : ShapeDrawer, AppSettings {\n    // ...statements omitted for brevity...\n\
    }\n\nlet adapter = TwoWayAdapter();\nlet component = SketchComponent(settings:\
    \ adapter);\nlet app = DrawingApp(drawer: adapter);\nadapter.app = app;\nadapter.component\
    \ = component;\napp.makePicture();\n```\n\n> **Note**: This is an adapter that\
    \ cannot be created using Swift extensions because it needs to operate on two\
    \ different classes.\n\nI create an instance of the adapter, which conforms to\
    \ the protocols that I need to create `SketchComponent` and `DrawingApp` objects.\
    \ Then I set the adapter `app` and `component` properties so that the adapter\
    \ has the objects it needs for its methods. The result is that both objects can\
    \ call on the other through the adapter, and you can see the output in the playground\
    \ debug console.\n\n```\nSketch Square\n```\n\n## Understanding the Pitfalls of\
    \ the Adapter Pattern\n\nThe adapter pattern is useful only when integrating components\
    \ that have similar functionality, meaning that the features provided by the classes\
    \ are compatible even though the APIs are not.\n\nIn the example application,\
    \ there is a component that consumes employee data (the `SearchTool` class) and\
    \ a component that provides employee data (the `NewCoDirectory` class). The functionality\
    \ of these classes is compatible, but I can’t use the `NewCoDirectory` class as\
    \ a source of data because it doesn’t implement the protocol that the `SearchTool`\
    \ class requires.\n\nThe adapter pattern is not helpful when the components provide\
    \ different functionality. For example, the adapter pattern cannot be used to\
    \ integrate a data source that provides details of employee parking spaces because\
    \ there is no support for that data in the application, and no amount of adaptation\
    \ of the API will change that. To use the adapter pattern effectively, focus purely\
    \ on the API and keep the adaptations as simple as possible.\n\n## Examples of\
    \ the Adapter Pattern in Cocoa\n\nThe adapter pattern is not exposed by Cocoa\
    \ because its components set the standard for default behavior. If you want to\
    \ integrate a component into Cocoa, then you implement a protocol. A good example\
    \ is the `NSCopying` protocol that I used in Chapter 5 to implement the prototype\
    \ pattern: if you want to integrate a class into Cocoa’s support for object copying,\
    \ then you make it conform to the `NSCopying` protocol even if it already has\
    \ a custom approach to creating clones. Such is the position of the core API on\
    \ any platform; if an adapter is needed, then it is your responsibility to define\
    \ it in your code.\n\n## Applying the Pattern to the SportsStore Application\n\
    \nNot all adapters map a single type to integrate a component into an application,\
    \ and to demonstrate this, I am going to create an adapter that implements the\
    \ abstract factory pattern and that conforms to implementation protocols in order\
    \ to do its job.\n\n### Preparing the Example Application\n\nI added a file called\
    \ `Euro.swift` to the example project and used it to define the class shown in\
    \ Listing 12-13.\n\n**Listing 12-13.** The Contents of the Euro.swift File\n\n\
    ```\nclass EuroHandler {\n    func getDisplayString(amount:Double) -> String {\n\
    \        let formatted = Utils.currencyStringFromNumber(amount);\n        return\
    \ \"€\\(dropFirst(formatted))\";\n    }\n\n    func getCurrencyAmount(amount:Double)\
    \ -> Double {\n        return 0.76164 * amount;\n    }\n}\n```\n\nThe `EuroHandler`\
    \ class converts dollar amounts to euros and creates formatted currency strings.\
    \ This is the same type of functionality that I added to the SportsStore application\
    \ to demonstrate the abstract factory pattern in Chapter 10, but the `EuroHandler`\
    \ class does not fit directly into the model that the application expects and\
    \ so requires an adapter."
