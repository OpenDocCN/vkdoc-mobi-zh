  trans: "\n### 在 Product 类中实现 NSCopying\n\n第一步是更新我在第 4 章中创建的 `Product` 类，使其能够被克隆。为此，我必须将基类设置为\
    \ `NSObject` 并实现 `NSCopying` 协议，但有一些棘手的问题需要处理，如代码清单 5-21 所示。\n\n**代码清单 5-21.** 在\
    \ `Product.swift` 文件中实现 `NSCopying` 协议\n\n```\nimport Foundation\n\nclass Product\
    \ : NSObject, NSCopying {\n\n    private(set) var name:String;\n    private(set)\
    \ var productDescription:String;\n    private(set) var category:String;\n    private\
    \ var stockLevelBackingValue:Int = 0;\n    private var priceBackingValue:Double\
    \ = 0;\n\n    init(name:String, description:String, category:String, price:Double,\n\
    \        stockLevel:Int) {\n        self.name = name;\n        self.productDescription\
    \ = description;\n        self.category = category;\n        super.init();\n \
    \       self.price = price;\n        self.stockLevel = stockLevel;\n    }\n\n\
    \    var stockLevel:Int {\n        get { return stockLevelBackingValue;}\n   \
    \     set { stockLevelBackingValue = max(0, newValue);}\n    }\n\n    private(set)\
    \ var price:Double {\n        get { return priceBackingValue;}\n        set {\
    \ priceBackingValue = max(1, newValue);}\n    }\n\n    var stockValue:Double {\n\
    \        get {\n            return price * Double(stockLevel);\n        }\n  \
    \  }\n\n    func copyWithZone(zone: NSZone) -> AnyObject {\n        return Product(name:\
    \ self.name, description: self.description,\n            category: self.category,\
    \ price: self.price,\n            stockLevel: self.stockLevel);\n    }\n}\n```\n\
    \n代码清单 5-21 中的修改凸显了当对现有类回溯性地添加克隆支持时，会出现的两个常见问题。第一个问题是，我不得不更改描述产品的存储属性名称，因为 `NSObject`\
    \ 类定义了一个名为 `description` 的方法。我按如下方式更改了属性名称：\n\n```\n...\nprivate(set) var productDescription\
    \ :String;\n...\n```\n\n我在应用中尚未使用过这个属性，因此无需额外修改。在实际应用中，则需要进行一些明智的重构。这并非世界末日，但最好在开发过程中尽早应用原型模式，以避免此类问题。\n\
    \n第二个问题也是由基类改为 `NSObject` 引起的。子类的初始化器会调用其父类的初始化器，但这必须在存储属性设置完成之后、计算属性使用之前进行。正是出于这个原因，我在\
    \ `Product` 类的初始化器中间调用了 `super.init`。\n\n### 创建 Logger 类\n\n我需要一种方法来跟踪应用中对 `Product`\
    \ 对象所做的更改。我添加了一个名为 `Logger.swift` 的文件到项目中，其内容如代码清单 5-22 所示。\n\n**代码清单 5-22.** `Logger.swift`\
    \ 文件的内容\n\n```\nimport Foundation\n\nclass Logger<T where T:NSObject, T:NSCopying>\
    \ {\n    var dataItems:[T] = [];\n    var callback:(T) -> Void;\n\n    init(callback:T\
    \ -> Void) {\n        self.callback = callback;\n    }\n\n    func logItem(item:T)\
    \ {\n        dataItems.append(item.copy() as T);\n        callback(item);\n  \
    \  }\n\n    func processItems(callback:T -> Void) {\n        for item in dataItems\
    \ {\n            callback(item);\n        }\n    }\n}\n```\n\n这是我在“实现原型模式”一节中使用的类的泛型版本。我对泛型类型参数施加了一个约束，确保\
    \ `Logger` 类只能用于存储那些继承自 `NSObject` 并实现了 `NSCopying` 协议的对象。`Logger` 类定义了一个初始化器，它接受一个回调函数，当新项目被记录时，该函数会接收这些新项目。这让我能够以一种简单直接的方式分发新项目的详细信息，但在第\
    \ 22 章介绍观察者模式时，我将演示一种更好的方法。\n\n### 在视图控制器中记录更改\n\n现在，我可以通过创建 `Logger` 类的实例，并在用户指定不同的库存水平时用它来存储\
    \ `Product` 对象，从而记录更改。由于我仍在使用一个结构松散的应用，这些更改将进入 `ViewController.swift` 文件，如代码清单\
    \ 5-23 所示（为了简洁起见，我从清单中省略了该文件的大量内容，因为更改虽小，但散布在整个文件中）。我作为 `Logger` 初始化器参数提供的回调函数，会输出发生更改的产品的名称和库存水平。\n\
    \n**代码清单 5-23.** 在 `ViewController.swift` 文件中记录产品更改\n\n```\nimport UIKit\n\n//\
    \ ...为简洁起见，省略了 ProductTableCell 类...\n\nvar handler = { (p:Product) in\n    println(\"\
    Change: \\(p.name) \\(p.stockLevel) items in stock\");\n};\n\nclass ViewController:\
    \ UIViewController, UITableViewDataSource {\n    @IBOutlet weak var totalStockLabel:\
    \ UILabel!\n    @IBOutlet weak var tableView: UITableView!\n    let logger = Logger<Product>(callback:\
    \ handler);\n\n    var products = [\n        Product(name:\"Kayak\", description:\"\
    A boat for one person\",\n            category:\"Watersports\", price:275.0, stockLevel:10),\n\
    \        // ...为简洁起见，省略了其他产品...\n        Product(name:\"Bling-Bling King\",\n\
    \            description:\"Gold-plated, diamond-studded King\",\n            category:\"\
    Chess\", price:1200.0, stockLevel:4)];\n\n    // ...为简洁起见，省略了方法...\n\n    func\
    \ tableView(tableView: UITableView,\n        cellForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCell {\n        let product = products[indexPath.row];\n\
    \        let cell = tableView.dequeueReusableCellWithIdentifier(\"ProductCell\"\
    )\n            as ProductTableCell;\n        cell.product = products[indexPath.row];\n\
    \        cell.nameLabel.text = product.name;\n        cell.descriptionLabel.text\
    \ = product.productDescription;\n        cell.stockStepper.value = Double(product.stockLevel);\n\
    \        cell.stockField.text = String(product.stockLevel);\n        return cell;\n\
    \    }\n\n    @IBAction func stockLevelDidChange(sender: AnyObject) {\n      \
    \  if var currentCell = sender as? UIView {\n            while (true) {\n    \
    \            currentCell = currentCell.superview!;\n                if let cell\
    \ = currentCell as? ProductTableCell {\n                    if let product = cell.product?\
    \ {\n                        if let stepper = sender as? UIStepper {\n       \
    \                     product.stockLevel = Int(stepper.value);\n             \
    \           } else if let textfield = sender as? UITextField {\n             \
    \               if let newValue = textfield.text.toInt()? {\n                \
    \                product.stockLevel = newValue;\n                            }\n\
    \                        }\n                        cell.stockStepper.value =\
    \ Double(product.stockLevel);\n                        cell.stockField.text =\
    \ String(product.stockLevel);\n                        logger.logItem(product);\n\
    \                    }\n                    break;\n                }\n      \
    \      }\n            displayStockTotal();\n        }\n    }\n}\n// ...为简洁起见，省略了方法...\n\
    ```\n\n> **注意**\n>\n> 在代码清单 5-23 中，我将回调闭包定义在了 `ViewController` 类之外。在我撰写本文时，Swift\
    \ 编译器存在一个错误，不允许以内联方式定义这种闭包。\n"
- fmt: "### Testing the Changes\n\nAll that remains is to test the changes. Start\
    \ the application and make changes to the stock levels of the products displayed.\
    \ For each change, you will see a message written to the Xcode debug console,\
    \ similar to the following:\n\n`Change: Kayak 11 items in stock`\n\n`Change: Lifejacket\
    \ 15 items in stock`\n\n`Change: Soccer Ball 31 items in stock`\n\n`Change: Corner\
    \ Flags 2 items in stock`\n\nIt is worth taking a moment to consider the effect\
    \ of the changes that I made. The challenge in creating a generic `Logger` class\
    \ is that it is passed objects that may change in the future, but by implementing\
    \ the prototype pattern, the `Logger` class is able to create clones without knowing\
    \ anything about the nature of the objects other than their base class and—implicitly—their\
    \ implementation of the `NSCopying` protocol.\n\n**Tip**：Select the **Debug Area\
    \ ➤ Activate Console** from the Xcode View menu if the console isn’t visible.\n\
    \nDecoupling the copying of objects from the class that defines them means I can\
    \ change the `Product` initializer or create and use subclasses without needing\
    \ to make corresponding changes in the `Logger` class. The overall effect is to\
    \ simplify the code in the app and make it easier to extend and maintain over\
    \ time.\n\n## Summary\n\nIn this chapter, I described the prototype pattern and\
