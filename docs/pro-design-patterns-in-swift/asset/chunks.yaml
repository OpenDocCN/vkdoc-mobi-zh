    Undoing a stock level change


    ## Summary


    In this chapter I described the command pattern, which is used to encapsulate
    a method invocation so that it can be performed later or by another component.
    I demonstrated how the command pattern can be used to implement undo operations
    and to create sequences of invocations that act as macros. In the next chapter,
    I describe the mediator pattern, which is used to manage communication between
    groups of peer objects.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将以下英文文本翻译成中文。



    ## 理解命令模式的陷阱


    只要不将接收者对象或方法调用指令的细节暴露给调用组件，命令模式的实现就相对简单。在实现细节方面，如果命令可能被多个组件使用，请确保添加并发保护，并确保你的闭包在你期望的对象上运行，而不是错误地关闭了错误的接收者对象。


    ## Cocoa 中命令模式的示例


    `Foundation` 框架包含了 `NSInvocation` 类，它用于在 Objective-C 中实现命令模式。然而，由于 Swift 和 Objective-C
    调用其方法的方式不同，`NSInvocation` 类无法在 Swift 代码中使用。命令模式的一个更具体的实现可以通过 `NSUndoManager` 类获得，我将在下一节中使用它。


    ## 将模式应用于 SportsStore 应用程序


    我将把命令模式应用于 SportsStore 应用程序，以实现库存水平变化的撤销功能。iOS 包含一个内置的易于使用的撤销管理框架，该框架使用了命令模式。


    ### 准备示例应用程序


    触发 iOS 撤销操作的标准机制是摇晃设备。为了准备使用命令模式，我将添加支持，以便在识别到摇晃动作时接收通知。代码清单 20-16 显示了我对 `ViewController`
    类所做的更改。


    **代码清单 20-16.** 在 ViewController.swift 文件中添加摇晃动作支持


    ```

    class ViewController: UIViewController, UITableViewDataSource {


    @IBOutlet weak var totalStockLabel: UILabel!


    @IBOutlet weak var tableView: UITableView!


    let productStore = ProductDataStore();


    override func viewDidLoad() {


    super.viewDidLoad()


    displayStockTotal();


    let bridge = EventBridge(callback: updateStockLevel);


    productStore.callback = bridge.inputCallback;


    }


    override func motionEnded(motion: UIEventSubtype, withEvent event: UIEvent) {


    if (event.subtype == UIEventSubtype.MotionShake) {


    println("Shake motion detected");


    }


    }


    // ...methods omitted for brevity...


    }

    ```


    我重写了 `motionEnded` 方法，以便检查检测到的运动类型，如果运动是摇晃，则在 Xcode 调试控制台中打印出一条消息。要测试此更改，请启动 SportsStore
    应用程序，然后从 iOS 模拟器的硬件菜单中选择摇晃手势。你将在 Xcode 控制台中看到以下信息：


    ```

    Shake motion detected

    ```


    ### 实现撤销功能


    实现命令模式最直接的方式是使用 `NSUndoManager` 类。`NSUndoManager` 类通过 UI 组件类遵循 `NSResponder` 协议的
    `undoManager` 属性自动管理，这意味着为你处理了 `NSUndoManager` 实例的创建。使用撤销管理器有两个阶段，第一个是注册当用户请求撤销操作时将调用的命令。代码清单
    20-17 显示了我对 `ViewController` 类所做的更改。


    **代码清单 20-17.** 在 ViewController.swift 文件中注册撤销命令


    ```

    ...


    @IBAction func stockLevelDidChange(sender: AnyObject) {


    if var currentCell = sender as? UIView {


    while (true) {


    currentCell = currentCell.superview!;


    if let cell = currentCell as? ProductTableCell {


    if let product = cell.product? {


    let dict = NSDictionary(objects: [product.stockLevel],


    forKeys: [product.name]);


    undoManager?.registerUndoWithTarget(self,


    selector: "undoStockLevel:",


    object: dict);


    if let stepper = sender as? UIStepper {


    product.stockLevel = Int(stepper.value);


    } else if let textfield = sender as? UITextField {


    if let newValue = textfield.text.toInt()? {


    product.stockLevel = newValue;


    }


    }


    cell.stockStepper.value = Double(product.stockLevel);


    cell.stockField.text = String(product.stockLevel);


    productLogger.logItem(product);


    StockServerFactory.getStockServer()


    .setStockLevel(product.name,


    stockLevel: product.stockLevel);


    }


    break;


    }


    }


    displayStockTotal();


    }


    }


    func undoStockLevel(data:[String:Int]) {


    let productName = data.keys.first;


    if (productName != nil) {


    let stockLevel = data[productName!];


    if (stockLevel != nil) {


    for nproduct in productStore.products {


    if nproduct.name == productName! {


    nproduct.stockLevel = stockLevel!;


    }


    }


    updateStockLevel(productName!, level: stockLevel!);


    }


    }


    }


    ...

    ```


    `undoManager` 属性是可选的，命令通过 `registerUndoWithTarget` 方法注册。此方法的参数是命令的接收者、将被调用的方法以及将传递给该参数的对象。


    ```

    ...


    undoManager?.registerUndoWithTarget(self, selector: "undoStockLevel:", object:
    dict);


    ...

    ```


    我将视图控制器指定为接收者，并指定了一个名为 `undoStockLevel` 的新方法。对于方法参数，我创建了一个 `NSDictionary`，其中包含了被修改的产品名称和旧的库存水平。


    `NSUndoManager` 暴露了它的一些 Objective-C 根源。首先，当我指定要调用方法的名称时，我需要在名称后面跟一个冒号，像这样：


    ```

    ...


    undoManager?.registerUndoWithTarget(self, selector: " undoStockLevel: ", object:
    dict);


    ...

    ```


    这与在 Objective-C 代码中选择方法的方式有关，省略冒号将在执行命令时导致异常。另一个需要注意的问题是，我必须使用 `NSDictionary`
    作为传递给方法的参数，因为 Swift 内置的字典不受支持。我必须定义 `undoStockLevel` 方法，因为撤销命令只能提供一个对象。我解包字典中的数据，并用它来更新存储库中的产品对象，并调用
    `updateStockLevel` 方法，该方法接受两个参数，因此不能被撤销管理器直接调用。


    #### 触发撤销命令


    调用 `registerUndoWithTarget` 方法的结果是在后台创建了一个命令，等待用户在摇晃设备时执行。代码清单 20-18 显示了我对 `ViewController`
    类的 `motionEnded` 方法所做的更改。


    **代码清单 20-18.** 在 ViewController.swift 文件中触发撤销命令


    ```

    ...


    override func motionEnded(motion: UIEventSubtype, withEvent event: UIEvent) {


    if (event.subtype == UIEventSubtype.MotionShake) {


    println("Shake motion detected");


    undoManager?.undo();


    }


    }


    ...

    ```


    `NSUndoManager` 类定义的 `undo` 方法会触发由 `registerUndoWithTarget` 方法创建的最新的撤销命令。要测试这些更改，请启动应用程序，更改其中一个产品的值，然后从
    iOS 模拟器的硬件菜单中选择摇晃手势。你所做的更改将被撤销，如图 20-3 所示。


    ![A978-1-4842-0394-1_20_Fig3_HTML.jpg](img/A978-1-4842-0394-1_20_Fig3_HTML.jpg)


    **图 20-3.** 撤销库存水平变更


    ## 小结


    在本章中，我描述了命令模式，它用于封装方法调用，以便稍后或由另一个组件执行。我演示了如何使用命令模式来实现撤销操作，并创建了充当宏的调用序列。在下一章中，我将描述中介者模式，它用于管理对等对象组之间的通信。

