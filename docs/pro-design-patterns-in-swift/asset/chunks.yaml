    ;\n        })\n    }\n}\n```\n\n我定义了 `filter` 和 `generate` 属性，它们可用于覆盖算法中过滤和生成步骤的默认行为。我将算法方法的名称修改为\
    \ `generate`，如果未设置新属性，则会回退到默认步骤。\n\n清单 26-4 显示了对 `main.swift` 文件所做的修改，以使用修改后的\
    \ `DonorDatabase` 类并定义新的算法。\n\n**清单 26-4.** 在 `main.swift` 文件中使用模板方法模式\n\n```\n\
    let donorDb = DonorDatabase();\nlet galaInvitations = donorDb.generate(2);\nfor\
    \ invite in galaInvitations {\n    println(invite);\n}\n\ndonorDb.filter = { $0.filter({$0.lastDonation\
