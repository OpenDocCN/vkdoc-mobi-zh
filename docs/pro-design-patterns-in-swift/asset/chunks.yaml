    Hello!\n\nProgram ended with exit code: 0\n```\n\n输出的第一行来自对 `println` 函数的调用。第二行表示示例程序已终止。我通常不会显示第二行，并且我构建的一些示例应用程序不会自行终止。\n\
    \n## 本章小结\n\n在本章中，我解释了如何使用 Xcode 创建 Playground 和命令行工具项目，这是我在本书中介绍设计模式的主要方式。在下一章中，我将介绍创建一个名为\
