  trans: "好的，作为高级文档工程师和翻译员，我已经根据您提供的注意事项和示例，将给定的英文文本翻译成了中文。\n\n---\n\n\n# 8. 对象池变体\n\
    \n在本章中，我将解释如何对 第 7 章 中描述的对象池模式的基本实现进行变体，以管理具有不同特征的对象。每种技术都应用了一种策略来处理池实现的某个方面，以应对需要池对象的调用组件。表\
    \ 8-1 将这些变体置于上下文之中。\n\n**表 8-1.** 将对象池模式变体置于上下文\n\n| 问题 | 答案 |\n| --- | --- |\n\
    | 它们是什么？ | 对象池模式的变体允许您更改对象池的工作方式，以便在不同情况下运行。 |\n| 有什么好处？ | 这些变体改变了池的行为，使其能够为具有不同期望和需求的调用组件提供服务，并管理具有一系列特征和生命周期的对象。\
    \ |\n| 何时应使用这些变体？ | 当我在第 7 章中描述的模式的基本实现无法满足您的需求时，您应该使用这些变体。 |\n| 何时应避免这些变体？ |\
    \ 这些变体需要高级并发技术，除非您能对其进行彻底测试并对 Cocoa 并发有深入理解，否则应避免使用。 |\n| 如何判断您是否已正确实现了这些变体？ |\
    \ 确保您已正确实现这些变体的唯一方法是通过彻底的测试。 |\n| 是否有常见的陷阱？ | 这些是高级技术，很容易误用并发保护来创建一个无法工作或性能低下的池。\
    \ |\n| 是否有任何相关模式？ | 不适用。 |\n\n## 准备示例项目\n\n我继续使用在 第 7 章 中创建的 `ObjectPool` 项目。准备本章无需进行任何更改。\n\
    \n## 理解对象池模式变体\n\n对象池的实现由四个策略组成，它们共同构成了分配对象的行为：\n\n*   对象创建策略\n*   对象重用策略\n* \
    \  空池策略\n*   分配策略\n\n通过更改这些策略，您可以调整对象池模式的实现，以适应您需要管理的对象类型。我将在以下各节中解释每个策略，并演示如何实现它们。\n\
    \n### 理解对象创建策略\n\n对象创建策略决定了池所管理的对象是如何创建的。在上一章中，我实现了一个积极的策略，这意味着对象在使用之前就被创建了。实际上，我在\
    \ `Library` 类中创建了 `Book` 对象，并将它们作为一个数组传递给 `Pool` 初始化器，如下所示：\n\n```\n...\nprivate\
    \ init(stockLevel:Int) {\n    books = [Book]();\n    for count in 1 ... stockLevel\
    \ {\n        books.append(Book(author: \"Dickens, Charles\", title: \"Hard Times\"\
    ,\n            stock: count))\n    }\n    pool = Pool<Book>(items:books);\n}\n\
    ...\n```\n\n这是我处理代表真实世界资源的对象时采用的策略，因为将要管理的对象数量通常事先已知（我的图书馆购买了两本《艰难时世》），并且需要某种程度的配置（分配唯一的库存编号）。\n\
    \n这种方法的缺点是，在产生任何需求之前，创建和配置对象的所有成本都已经发生。我创建了两个 `Book` 对象来代表我的查尔斯·狄更斯系列收藏，但可能很少有读者需求甚至没有，创建和准备\
    \ `Book` 对象的开销将永远不会通过请求得到回报。\n\n这对于代表真实世界对象的对象来说通常是可接受的，因为池的状态反映了真实世界的情况：图书馆预见到读者需求而购买了两本《艰难时世》。但是，如果您使用对象池来避免承担与实际世界无关的对象的昂贵初始化成本，那么这种策略就没有帮助，例如我在\
    \ 第 5 章 中用于演示原型模式的 `Sum` 对象。\n\n另一种选择是使用**懒惰的**创建策略，这意味着对象只有在需要时才会被创建。出于我 `Library`\
    \ 示例的目的，我将创建一个 `BookSeller` 类，从中可以获取 `Book` 对象。我示例中的图书馆将能够在第一次需要时从销售商那里获得所需的书籍。清单\
    \ 8-1 显示了 `BookSources.swift` 文件的内容，我已将其添加到项目中。\n\n**清单 8-1.** `BookSources.swift`\
    \ 文件的内容\n\n```\nimport Foundation\n\nclass BookSeller {\n    class func buyBook(author:String,\
    \ title:String, stockNumber:Int) -> Book {\n        return Book(author: author,\
    \ title: title, stock: stockNumber);\n    }\n}\n```\n\n`BookSeller` 类定义了一个创建 `Book`\
    \ 对象的类型方法。`BookSeller` 类的实现对于示例来说并不重要——重要的是有一个 `Book` 对象的来源，它将被调用以提供池中的项目。清单 8-2\
    \ 显示了我对 `Pool` 类所做的更改，以支持延迟创建项目，直到它们被需要为止。\n\n**清单 8-2.** 在 `Pool.swift` 文件中实现懒惰对象创建\n\
    \n```\nimport Foundation\n\nclass Pool<T> {\n    private var data = [T]();\n \
    \   private let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    private let semaphore:dispatch_semaphore_t;\n    private var itemCount =\
    \ 0;\n    private let maxItemCount:Int;\n    private let itemFactory: () -> T;\n\
    \n    init(maxItemCount:Int, factory:() -> T) {\n        self.itemFactory = factory;\n\
    \        self.maxItemCount = maxItemCount;\n        semaphore = dispatch_semaphore_create(maxItemCount);\n\
    \    }\n\n    func getFromPool() -> T? {\n        var result:T?;\n        if (dispatch_semaphore_wait(semaphore,\
    \ DISPATCH_TIME_FOREVER) == 0) {\n            dispatch_sync(arrayQ, {() in\n \
    \               if (self.data.count == 0 && self.itemCount < self.maxItemCount)\
    \ {\n                    result = self.itemFactory();\n                    self.itemCount++;\n\
    \                } else {\n                    result = self.data.removeAtIndex(0);\n\
    \                }\n            })\n        }\n        return result;\n    }\n\
    \n    func returnToPool(item:T) {\n        dispatch_async(arrayQ, {() in\n   \
    \         self.data.append(item);\n            dispatch_semaphore_signal(self.semaphore);\n\
    \        });\n    }\n\n    func processPoolItems(callback:[T] -> Void) {\n   \
    \     dispatch_barrier_sync(arrayQ, {() in\n            callback(self.data);\n\
    \        });\n    }\n}\n```\n"
- fmt: "我已根据您的要求，对提供的文本进行了排版处理。以下是处理后的 Markdown 格式内容。\n\n---\n\nI have changed the\
    \ `Pool` initializer so that it receives a closure that can be used to create\
    \ new items for the pool and an `Int` parameter that specifies the maximum number\
    \ of times that the closure may be used. I set the initial counter value for the\
    \ Grand Central Dispatch semaphore to the maximum number of items and perform\
    \ a more complex check for the state of the pool in the `getFromPool` method,\
    \ like this:\n\n```\nif (self.data.count == 0 && self.itemCount < self.maxItemCount)\
    \ {\n    result = self.itemFactory();\n    self.itemCount++;\n} else {\n    result\
    \ = self.data.removeAtIndex(0);\n}\n```\n\nTo reach this point in the method,\
    \ a thread has passed through the semaphore, and that means either there is an\
    \ object waiting for use in the `data` array or that I need to call the factory\
    \ closure to create one. This allows me to defer the creation of the items in\
    \ the pool until there is a demand for them.\n\nThe other change to the `Pool`\
    \ class was to implement a type method called `processPoolItems`. In the original\
    \ implementation of the pool, responsibility for creating the objects in the pool\
    \ fell to the `Library` class, which kept references to all the `Book` objects\
    \ it was responsible for and was able to generate a report about them using those\
    \ local references. In this implementation, it is the `Pool` class that creates\
    \ the objects, and the `Library` class has no reference to them at all— so I have\
    \ added the `processPoolItems` method that accepts a callback closure that is\
    \ passed the `data` array within a synchronous GCD barrier block.\n\n> **Tip**\
    \  \n> You can see how I have implemented the `Book` factory closure in Listing\
    \ 8-3. I could have retained a reference to the `Book` objects as they are created,\
    \ but the way that Swift deals with closures defined in initializers makes it\
    \ a difficult process. Instead, I have made the `Pool` class the authoritative\
    \ source for details of the `Book` objects in the example application.\n\nListing\
    \ 8-3 shows the corresponding changes to the `Library` class to complete the implementation\
    \ of the lazy creation strategy.\n\n**Listing 8-3. Implementing Lazy Object Creation\
    \ in the Library.swift File**\n\n```\nimport Foundation\n\nfinal class Library\
    \ {\n    private let pool:Pool<Book>;\n    private init(stockLevel:Int) {\n  \
    \      var stockId = 1;\n        pool = Pool<Book>(maxItemCount: stockLevel, factory:\
    \ {() in\n            return BookSeller.buyBook(\"Dickens, Charles\",\n      \
    \          title: \"Hard Times\", stockNumber: stockId++)\n        });\n    }\n\
    \n    private class var singleton:Library {\n        struct SingletonWrapper {\n\
    \            static let singleton = Library(stockLevel:200);\n        }\n    \
    \    return SingletonWrapper.singleton;\n    }\n\n    class func checkoutBook(reader:String)\
    \ -> Book? {\n        var book = singleton.pool.getFromPool();\n        book?.reader\
    \ = reader;\n        book?.checkoutCount++;\n        return book;\n    }\n\n \
    \   class func returnBook(book:Book) {\n        book.reader = nil;\n        singleton.pool.returnToPool(book);\n\
    \    }\n\n    class func printReport() {\n        singleton.pool.processPoolItems({(books)\
    \ in\n            for book in books {\n                println(\"...Book#\\(book.stockNumber)...\"\
    );\n                println(\"Checked out \\(book.checkoutCount) times\");\n \
    \               if (book.reader != nil) {\n                    println(\"Checked\
    \ out to \\(book.reader!)\");\n                } else {\n                    println(\"\
    In stock\");\n                }\n            }\n            println(\"There are\
    \ \\(books.count) books in the pool\");\n        });\n    }\n}\n```\n\nThe changes\
    \ are minor. I have defined the closure that will be used to create the `Book`\
    \ objects through the `BookSeller` class, and I have updated the `printReport`\
    \ method to get its data items from the pool. I have also increased the maximum\
    \ number of books in the pool to 200, which is far more than is needed to satisfy\
    \ the demand generated by the code in the `main.swift` file.\n\n> **Note**  \n\
    > This simulates a situation where a real-world library has agreed to a line of\
    \ credit with a bookseller that can be called upon as needed. The library holds\
    \ no stock initially, but every time that there is a request for a book and there\
    \ are no books in stock, the bookseller is asked to send a copy up until a predetermined\
    \ limit—200 copies in this case. New copies are asked for only if there are none\
    \ in stock, however—the library will reissue one of its existing copies if available.\n\
    \nYou can see the effect of the lazy strategy by running the application. The\
    \ report generated after all of the requests have been processed, which can take\
    \ 15 to 20 seconds, finished with a statement that notes how many `Book` objects\
    \ are in the pool.\n\n```\n...\nThere are 14 books in the pool\n```\n\nThe exact\
    \ number of books will differ each time you run the application because I add\
    \ a delay to some of the request randomly, and this will affect how many often\
    \ `Book` objects are reused by the pool.\n\nThe worst case is that 20 books will\
    \ be created, which means that the 200 books that the library was willing to buy\
    \ was a gross overestimate. If I had used an eager strategy, all 200 copies would\
    \ have been purchased; with the lazy strategy, I am able to more closely match\
    \ the actual demand."
