    To consume the data sources, I added a file to the project called `EmployeeSearch.swift`
    and used it to define the class shown in Listing 12-3.


    Listing 12-3. The Contents of the EmployeeSearch.swift File


    `class SearchTool {`


    `enum SearchType {`


    `case NAME; case TITLE;`


    `}`


    `private let sources:[EmployeeDataSource];`


    `init(dataSources: EmployeeDataSource...) {`


    `self.sources = dataSources;`


    `}`


    `var employees:[Employee] {`


    `var results = [Employee]();`


    `for source in sources {`


    `results += source.employees;`


    `}`


    `return results;`


    `}`


    `func search(text:String, type:SearchType) -> [Employee] {`


    `var results = [Employee]();`


    `for source in sources {`


    `results += type == SearchType.NAME ? source.searchByName(text)`


    `: source.searchByTitle(text);`


    `}`


    `return results;`


    `}`


    `}`


    The `SearchTool` class operates on a collection of data sources and consolidates
    their contents and search capabilities to provide uniform access to the employee
    data. Listing 12-4 shows the code I added to the `main.swift` file to test the
    functionality.


    Listing 12-4. Testing the Example App in the main.swift File


    `let search = SearchTool(dataSources: SalesDataSource(), DevelopmentDataSource());`


    `println("--List--");`


    `for e in search.employees {`


    `println("Name: \(e.name)");`


    `}`


    `println("--Search--");`


    `for e in search.search("VP", type: SearchTool.SearchType.TITLE) {`


    `println("Name: \(e.name), Title: \(e.title)");`


    `}`


    Running the application produces the following output in the debug console:


    `--List--`


    `Name: Alice`


    `Name: Bob`


    `Name: Joe`


    `Name: Pepe`


    `--Search--`


    `Name: Alice, Title: VP of Sales`


    `Name: Joe, Title: VP of Development`


    ## Understanding the Problem That the Pattern Solves


    The problem that the adapter pattern solves arises when an existing system needs
    to integrate a new component that has a similar function but that doesn’t present
    a common interface and that cannot be modified.


    The example application represents the existing system—an employee directory that
    relies on classes that conform to the `EmployeeDataSource` protocol to provide
    it with search functionality. The problems start when a new source of data needs
    to be integrated into the directory that doesn’t conform to the protocol.


    There are lots of reasons why incompatible code will be introduced into an application.
    In the case of an employee directory, an acquisition or merger may require integration
    of another company’s systems. On a smaller scale, incompatible code can be introduced
    into a project when a third-party component is used or when you depend on the
    code produced by another development team working on a related project.


    To illustrate the problem, imagine that my example company acquires a rival and
    wants to extend the directory to include the staff of the new company. The good
    news is that the new company already has a solid employee directory, but the bad
    news is that it doesn’t use the types needed by the parent company. To represent
    this problem, I added a file to the project called `NewCo.swift` and used it to
    define the simple directory types shown in Listing 12-5.


    Listing 12-5. The Contents of the NewCo.swift File


    `class NewCoStaffMember {`


    `private var name:String;`


    `private var role:String;`


    `init(name:String, role:String) {`


    `self.name = name; self.role = role;`


    `}`


    `func getName() -> String {`


    `return name;`


    `}`


    `func getJob() -> String {`


    `return role;`


    `}`


    `}`


    `class NewCoDirectory {`


    `private var staff:[String: NewCoStaffMember];`


    `init() {`


    `staff = ["Hans": NewCoStaffMember(name: "Hans", role: "Corp Counsel"),`


    `"Greta": NewCoStaffMember(name: "Greta", role: "VP, Legal")];`


    `}`


    `func getStaff() -> [String: NewCoStaffMember] {`


    `return staff;`


    `}`


    `}`


    The `NewCoDirectory` class provides a dictionary of `NewCoStaffMember` objects
    that are keyed on the employee’s name. There is no search capability and no common
    types with the directory I created at the start of the chapter. The problem I
    face is integrating the `NewCoDirectory` class into the existing staff directory.


    WHY NOT JUST CHANGE THE CODE?


    I could solve this problem just by revising the `NewCoDirectory` class, but that
    isn’t always possible in the real world, which is why the adapter pattern is so
    useful. The main reason that code cannot be modified is when a component is purchased
    from a third party, in which case you won’t even see the source code, just the
    API it produces. The component developers are unlikely to adopt your private API
    when you are one customer out of the thousands they sell to.


    You will also encounter code that cannot be changed when working in a large company.
    Common causes include dealing with legacy products (“We don’t know how it works,
    and we are afraid to touch it”), dealing with projects that are under-resourced
    (“We’ll have time to implement your API in about 2 years”), and dealing with politics
    (“You should implement my API instead”).


    Whatever the reason, the result is the same: an API that provides the functionality
    you require but not in a way you want. For the purposes of this chapter, imagine
    that I don’t have the source code to the `NewCoDirectory` class—perhaps because
    it is an off-the-shelf product—and that I need to find a way to integrate the
    employee data it provides without being able to make any changes.


    I could solve this problem by modifying the SearchTool application so that it
    knows how to query the new data source. This means I have to repeat that modification
    process for each component that I integrate and perform the modification for every
    part of the application that needs to query the data sources. The result is a
    complex set of changes required each time a new data source is added or an existing
    one is changed—and this, of course, is what design patterns are intended to avoid.


    ## Understanding the Adapter Pattern


    The adapter pattern allows two incompatible classes to work together by adapting
    the API that one of them presents via mapping the API expected by the application
    to the API provided by the component, as shown in Figure [12-1](#A978-1-4842-0394-1_12_Chapter.html#Fig1).
    In the case of the example application, I need to adapt the API defined by the
    `NewCoDirectory` class so that the `SearchTool` class can use it.


    ![A978-1-4842-0394-1_12_Fig1_HTML.jpg](A978-1-4842-0394-1_12_Fig1_HTML.jpg)


    Figure 12-1.


    The adapter pattern


    There are five operations in the adapter pattern. The first operation is a request
    from the application to the adapter using the API it expects to work with. In
    the second operation, the adapter uses its knowledge of both APIs to select a
    component method or property that can be used to handle the request.


    In the third operation, the component receives the request from the adapter, does
    its work, and returns its result to the adapter.


    For the fourth operation, the adapter uses its knowledge of both APIs to translate
    the result provided by the client into a result that the application is expecting
    and, in the final operation, returns the result.


    The application and the component are unaware of each other. The adapter presents
    the application with an API it knows about and hides the details of how that API
    is mapped to the one provided by the component.'
