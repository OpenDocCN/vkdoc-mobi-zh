    Since the `Appointment` objects have their own `Location` objects, the changes
    that I apply via the `workMeeting` variable have no effect on the object accessed
    via the `beerMeeting` variable.


    ### Copying Arrays


    Swift arrays are implemented as structs, which makes them value types. When you
    assign an array to a new variable, the array itself is copied along with any value
    types it contains. Reference types contained in the array are shallow copied,
    such that the prototype array and the clone array will both contain references
    to the same objects. Listing 5-8 shows the contents of the `ArrayCopy.playground`
    file, which I created to provide a demonstration.


    Listing 5-8. The Contents of the ArrayCopy.playground File


