    \ for a door window, I can simply create one composite object and pass it as an\
    \ argument to the initializer of another. This means I can change the set of parts\
    \ that define a door window in one place. Running the application produces the\
    \ same output as before I implemented the composite pattern.\n\n```\nOrder for\
