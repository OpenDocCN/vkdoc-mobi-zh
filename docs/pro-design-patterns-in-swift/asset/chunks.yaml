    `var calc1 = prototype.Result;`


    `var clone = prototype.copy() as Sum;`


    `clone.firstValue = 3; clone.secondValue = 8;`


    `var calc2 = clone.Result;`


    `println("Calc1: \(calc1) Calc2: \(calc2)");`


    I changed the class declaration so that the base class is `NSObject` (which provides
    the `copy` method) and implemented the `NSCopying` protocol. To support cloning,
    I have added a new initializer that accepts cached data as an argument rather
    than generating the data itself. I have annotated the initializer with the `private`
    keyword so that I can use it in the `copyWithZone` function to clone an object
    using the cached data generated by the prototype but prevent other components
    from providing their own results data.


    ### Separating Object Creation from Object Use


    As I explained earlier in the chapter, three pieces of knowledge are required
    to create an object from its template.


    *   The template that is associated with the object

    *   The initializer that must be called

    *   The names and types of the initializer arguments


    The prototype pattern allows components to create new objects from the prototype
    without needing any information about its template, which means you can change
    the class or struct without having to change the components that need to create
    instances of it. Put another way, you can minimize the number of dependencies
    on the templates you define by separating the way that objects are created from
    the way objects are used. Components that follow the prototype pattern do not
    need to know the type of the prototype objects they clone, which makes it possible
    to limit the amount of knowledge about subclasses in components that need to create
    new objects. This is a benefit that causes some confusion, so I will build up
    the example in stages. Listing 5-12 shows the contents of the `Hiding.playground`
    file, which I created for this example.


    Listing 5-12. The Contents of the Hiding.playground File


    `import Foundation`


    `class Message {`


    `var to:String;`


    `var subject:String;`


    `init(to:String, subject:String) {`


    `self.to = to; self.subject = subject;`


    `}`


    `}`


    `class MessageLogger {`


    `var messages:[Message] = [];`


    `func logMessage(msg:Message) {`


    `messages.append(msg);`


    `}`


    `func processMessages(callback:Message -> Void) {`


    `for msg in messages {`


    `callback(msg);`


    `}`


    `}`


    `}`


    `var logger = MessageLogger();`


    `var message = Message(to: "Joe", subject: "Hello");`


    `logger.logMessage(message);`


    `message.to = "Bob";`


    `message.subject = "Free for dinner?";`


    `logger.logMessage(message);`


    `logger.processMessages({msg -> Void in`


    `println("Message - To: \(msg.to) Subject: \(msg.subject)");`


    `});`


    I have defined a `Message` class that has `to` and `subject` stored properties
    and a `MessageLogger` class that stores `Message` objects passed to its `logMessage`
    method and processes the stored objects using a closure passed to its `processMessages`
    method.


    The problems in this example start with the fact that I am reusing `Message` objects,
    which is a common optimization—albeit for more complex types. (Ignore, if you
    will, the benefit of reusing objects; it is an optimization that is often applied
    almost without thought, even when the cost of creating objects is trivial.)


    `...`


    `message.to = "Bob";`


    `message.subject = "Free for dinner?";`


    `logger.logMessage(message);`


    `...`


    The effect of reusing the `Message` objects is that the array defined by the `MessageLogger`
    class is filled with references to the same object. You can see the effect of
    this problem in the console output, which is generated by the closure I pass to
    the `processMessages` method.


    `Message - To: Bob Subject: Free for dinner?`


    `Message - To: Bob Subject: Free for dinner?`


    #### (Not Really) Solving the Problem


    If you were unfamiliar with the prototype pattern or if you don’t like the way
    that the `NSCopying` protocol works, you might be tempted to modify the `MessageLogger`
    class so that it creates its own `Message` objects using the class initializer,
    as shown in Listing 5-13.


    Listing 5-13. Modifying the MessageLogger Class in the Hiding.playground File


    `...`


    `class MessageLogger {`


    `var messages:[Message] = [];`


    `func logMessage(msg:Message) {`


    `messages.append(Message(to: msg.to, subject: msg.subject));`


    `}`


    `func processMessages(callback:Message -> Void) {`


    `for msg in messages {`


    `callback(msg);`


    `}`


    `}`


    `}`


    `...`


    Tip


    I can’t solve this problem by just storing the data values because the closure
    passed to the process expects to be dealing with `Message` objects. And, as you
    will learn shortly, there is a more serious underlying problem to be solved that
    extracting the data values would not solve.


    This approach solves the problem, as the following console output shows:


    `Message - To: Joe Subject: Hello`


    `Message - To: Bob Subject: Free for dinner?`'
  trans: "\n### 避免昂贵的初始化操作\n\n使用`NSCopying`协议可以让对象自行负责复制，这意味着克隆可以避免昂贵的初始化操作。在本章开头，我使用了`Initialization.playground`文件定义了一个`Sum`类，该类在其初始化器中生成了一个缓存结果数组，如代码清单\
    \ 5-10 所示。\n\n**代码清单 5-10.** `Initialization.playground`文件的内容\n\n```swift\nclass\
    \ Sum {\n    let resultsCache: [[Int]];\n    var firstValue:Int;\n    var secondValue:Int;\n\
    \    init(first:Int, second:Int) {\n        resultsCache = [[Int]](count: 10,\
    \ repeatedValue:\n            Int);\n        for i in 0..<10 {\n            for\
    \ j in 0..<10 {\n                resultsCache[i][j] = i + j;\n            }\n\
    \        }\n        self.firstValue = first;\n        self.secondValue = second;\n\
    \    }\n    var Result:Int {\n        get {\n            return firstValue < resultsCache.count\n\
    \                && secondValue < resultsCache[firstValue].count\n           \
    \     ? resultsCache[firstValue][secondValue]\n                : firstValue +\
    \ secondValue;\n        }\n    }\n}\nvar calc1 = Sum(first:0, second: 9).Result;\n\
    var calc2 = Sum(first:3, second: 8).Result;\nprintln(\"Calc1: \\(calc1) Calc2:\
    \ \\(calc2)\");\n```\n\n每次创建`Sum`对象时，都需要承担分配和填充二维数组`resultsCache`的开销。通过实现`NSCopying`协议，我可以应用原型模式，并在`copyWithZone`方法中选择性地克隆对象，如代码清单\
    \ 5-11 所示。\n\n**代码清单 5-11.** 在`Initialization.playground`文件中应用原型模式\n\n```swift\n\
    import Foundation\n\nclass Sum : NSObject, NSCopying {\n    let resultsCache:\
    \ [[Int]];\n    var firstValue:Int;\n    var secondValue:Int;\n    init(first:Int,\
    \ second:Int) {\n        resultsCache = [[Int]](count: 10, repeatedValue:\n  \
    \          Int);\n        for i in 0..<10 {\n            for j in 0..<10 {\n \
    \               resultsCache[i][j] = i + j;\n            }\n        }\n      \
    \  self.firstValue = first;\n        self.secondValue = second;\n    }\n    private\
    \ init(first:Int, second:Int, cache:[[Int]]) {\n        self.firstValue = first;\n\
    \        self.secondValue = second;\n        resultsCache = cache;\n    }\n  \
    \  var Result:Int {\n        get {\n            return firstValue < resultsCache.count\n\
    \                && secondValue < resultsCache[firstValue].count\n           \
    \     ? resultsCache[firstValue][secondValue]\n                : firstValue +\
    \ secondValue;\n        }\n    }\n    func copyWithZone(zone: NSZone) -> AnyObject\
    \ {\n        return Sum(first:self.firstValue,\n            second: self.secondValue,\n\
    \            cache: self.resultsCache);\n    }\n}\n\nvar prototype = Sum(first:0,\
    \ second:9);\nvar calc1 = prototype.Result;\nvar clone = prototype.copy() as Sum;\n\
    clone.firstValue = 3; clone.secondValue = 8;\nvar calc2 = clone.Result;\nprintln(\"\
    Calc1: \\(calc1) Calc2: \\(calc2)\");\n```\n\n我修改了类声明，使基类变为`NSObject`（它提供了`copy`方法），并实现了`NSCopying`协议。为了支持克隆，我添加了一个新的初始化器，它接受缓存数据作为参数，而不是自行生成数据。我用`private`关键字标注了这个初始化器，这样我就能在`copyWithZone`函数中使用它，通过原型生成的缓存数据克隆对象，同时防止其他组件提供自己的结果数据。\n\
    \n### 分离对象的创建与使用\n\n正如我在本章前面解释的那样，从模板创建对象需要掌握三方面的知识：\n\n- 与对象关联的模板\n- 必须调用的初始化器\n\
    - 初始化器参数的名称和类型\n\n原型模式允许组件从原型创建新对象，而无需了解模板的任何信息，这意味着你可以更改类或结构体，而无需修改需要创建其实例的组件。换句话说，你可以通过将对象的创建方式与使用方式分离，来最小化对已定义模板的依赖数量。遵循原型模式的组件无需知道它们所克隆的原型对象的类型，这使得在需要创建新对象的组件中，可以限制对子类的了解程度。这是一个容易引起混淆的好处，因此我将分阶段构建示例。代码清单\
    \ 5-12 展示了`Hiding.playground`文件的内容，我是为此示例创建的。\n\n**代码清单 5-12.** `Hiding.playground`文件的内容\n\
    \n```swift\nimport Foundation\n\nclass Message {\n    var to:String;\n    var\
    \ subject:String;\n    init(to:String, subject:String) {\n        self.to = to;\
    \ self.subject = subject;\n    }\n}\n\nclass MessageLogger {\n    var messages:[Message]\
    \ = [];\n    func logMessage(msg:Message) {\n        messages.append(msg);\n \
    \   }\n    func processMessages(callback:Message -> Void) {\n        for msg in\
    \ messages {\n            callback(msg);\n        }\n    }\n}\n\nvar logger =\
    \ MessageLogger();\nvar message = Message(to: \"Joe\", subject: \"Hello\");\n\
    logger.logMessage(message);\nmessage.to = \"Bob\";\nmessage.subject = \"Free for\
    \ dinner?\";\nlogger.logMessage(message);\nlogger.processMessages({msg -> Void\
    \ in\n    println(\"Message - To: \\(msg.to) Subject: \\(msg.subject)\");\n});\n\
    ```\n\n我定义了一个`Message`类，它拥有`to`和`subject`存储属性，以及一个`MessageLogger`类，它存储传递给其`logMessage`方法的`Message`对象，并通过传递给`processMessages`方法的闭包处理存储的对象。\n\
    \n本例中的问题始于一个事实：我重复使用了`Message`对象，这是一种常见的优化——尽管是针对更复杂的类型。（请暂时忽略重复使用对象的好处；这是一种通常几乎不加思索就会应用的优化，即使创建对象的成本微不足道。）\n\
    \n```\n...\nmessage.to = \"Bob\";\nmessage.subject = \"Free for dinner?\";\nlogger.logMessage(message);\n\
    ...\n```\n\n重复使用`Message`对象带来的影响是，`MessageLogger`类定义的数组中填满了对同一对象的引用。你可以在控制台输出中看到这个问题的效果，该输出由我传递给`processMessages`方法的闭包生成。\n\
    \n```\nMessage - To: Bob Subject: Free for dinner?\nMessage - To: Bob Subject:\
    \ Free for dinner?\n```\n\n#### （并非真正）解决问题\n\n如果你不熟悉原型模式，或者不喜欢`NSCopying`协议的工作方式，你可能会倾向于修改`MessageLogger`类，使其使用类初始化器创建自己的`Message`对象，如代码清单\
    \ 5-13 所示。\n\n**代码清单 5-13.** 在`Hiding.playground`文件中修改`MessageLogger`类\n\n```swift\n\
    ...\nclass MessageLogger {\n    var messages:[Message] = [];\n    func logMessage(msg:Message)\
    \ {\n        messages.append(Message(to: msg.to, subject: msg.subject));\n   \
    \ }\n    func processMessages(callback:Message -> Void) {\n        for msg in\
    \ messages {\n            callback(msg);\n        }\n    }\n}\n...\n```\n\n**提示**\n\
    \n我无法仅通过存储数据值来解决此问题，因为传递给`process`方法的闭包期望处理的是`Message`对象。而且，正如你稍后将了解的那样，还有一个更严重的潜在问题需要解决，而提取数据值是无法解决的。\n\
    \n这种方法解决了问题，如下面的控制台输出所示：\n\n```\nMessage - To: Joe Subject: Hello\nMessage - To:\
    \ Bob Subject: Free for dinner?\n```\n"
- fmt: "# Revealing the Underlying Problem\n\nThe immediate problem has been solved,\
    \ but I have just stored up trouble for the future because the `MessageLogger`\
    \ class is now dependent on being able to create `Message` objects by invoking\
    \ the `Message` class initializer. My solution falls apart when I subclass `Message`\
    \ to produce a more specialized class, as shown in Listing 5-14.\n\n**Listing\
    \ 5-14.** Adding a Subclass in the `Hiding.playground` File\n\n```\nimport Foundation\n\
    \nclass Message {\n    var to:String;\n    var subject:String;\n\n    init(to:String,\
    \ subject:String) {\n        self.to = to; self.subject = subject;\n    }\n}\n\
    \nclass DetailedMessage : Message {\n    var from:String;\n\n    init(to: String,\
    \ subject: String, from:String) {\n        self.from = from;\n        super.init(to:\
    \ to, subject: subject);\n    }\n}\n\nclass MessageLogger {\n    var messages:[Message]\
    \ = [];\n\n    func logMessage(msg:Message) {\n        messages.append(Message(to:\
    \ msg.to, subject: msg.subject));\n    }\n\n    func processMessages(callback:Message\
    \ -> Void) {\n        for msg in messages {\n            callback(msg);\n    \
    \    }\n    }\n}\n\nvar logger = MessageLogger();\nvar message = Message(to: \"\
    Joe\", subject: \"Hello\");\nlogger.logMessage(message);\nmessage.to = \"Bob\"\
    ;\nmessage.subject = \"Free for dinner?\";\nlogger.logMessage(message);\nlogger.logMessage(DetailedMessage(to:\
    \ \"Alice\", subject: \"Hi!\", from: \"Joe\"));\nlogger.processMessages({msg ->\
    \ Void in\n    if let detailed = msg as? DetailedMessage {\n        println(\"\
    Detailed Message - To: \\(detailed.to) From: \\(detailed.from)\"\n        + \"\
    \ Subject: \\(detailed.subject)\");\n    } else {\n        println(\"Message -\
    \ To: \\(msg.to) Subject: \\(msg.subject)\");\n    }\n});\n```\n\nI have subclassed\
    \ `Message` to define the `DetailedMessage` class, and I created an instance of\
    \ the subclass so that I can pass it to the `logMessage` method defined by `MessageLogger`.\
    \ I have also revised the closure that I pass to the `processMessages` method\
    \ so that it writes the additional property stored by `DetailedMessage` objects.\n\
    \nThe problem is that the `MessageLogger` class receives `Message` and `DetailedMessage`\
    \ objects, but it only adds `Message` objects to its storage array. When the `processMessage`\
    \ method is called, only `to` and `subject` properties are displayed, and the\
    \ additional detail contained in the `from` property is forever lost. Here is\
    \ the console output from Listing 5-14:\n\n```\nMessage - To: Joe Subject: Hello\n\
    Message - To: Bob Subject: Free for dinner?\nMessage - To: Alice Subject: Hi!\n\
    ```\n\n# (Not Really) Solving the Underlying Problem\n\nWithout using the prototype\
    \ pattern, the obvious way to solve the second problem is to make the `MessageLogger`\
    \ class aware that there are `Message` and `DetailedMessage` classes and how to\
    \ create each of them, as shown in Listing 5-15.\n\n**Listing 5-15.** Modifying\
    \ the `MessageLogger` Class in the `Hiding.playground` File\n\n```\n...\nclass\
    \ MessageLogger {\n    var messages:[Message] = [];\n\n    func logMessage(msg:Message)\
    \ {\n        if let detailed = msg as? DetailedMessage {\n            messages.append(DetailedMessage(to:\
    \ detailed.to,\n                subject: detailed.subject, from: detailed.from));\n\
    \        } else {\n            messages.append(Message(to: msg.to, subject: msg.subject));\n\
    \        }\n    }\n\n    func processMessages(callback:Message -> Void) {\n  \
    \      for msg in messages {\n            callback(msg);\n        }\n    }\n}\n\
    ...\n```\n\nThis solves the immediate problem by increasing the amount of knowledge\
    \ that the `MessageLogger` class has about the `Message` class and its subclasses.\
    \ I will need to update the `logMessage` class every time that I create a new\
    \ subclass or when I change any of the initializers, which is an unwelcome increase\
    \ in the work required to maintain the code.\n\n# Applying the Prototype Pattern\n\
    \nI can create a better approach by implementing the `NSCopying` protocol and\
    \ using the prototype pattern to clone the objects handled by the `MessageLogger`\
    \ class, as shown in Listing 5-16.\n\n**Listing 5-16.** Applying the Prototype\
    \ Pattern in the `Hiding.playground` File\n\n```\nimport Foundation\n\nclass Message\
    \ : NSObject, NSCopying {\n    var to:String;\n    var subject:String;\n\n   \
    \ init(to:String, subject:String) {\n        self.to = to; self.subject = subject;\n\
    \    }\n\n    func copyWithZone(zone: NSZone) -> AnyObject {\n        return Message(to:\
    \ self.to, subject: self.subject);\n    }\n}\n\nclass DetailedMessage : Message\
    \ {\n    var from:String;\n\n    init(to: String, subject: String, from:String)\
    \ {\n        self.from = from;\n        super.init(to: to, subject: subject);\n\
    \    }\n\n    override func copyWithZone(zone: NSZone) -> AnyObject {\n      \
    \  return DetailedMessage(to: self.to,\n            subject: self.subject, from:\
    \ self.from);\n    }\n}\n\nclass MessageLogger {\n    var messages:[Message] =\
    \ [];\n\n    func logMessage(msg:Message) {\n        messages.append(msg.copy()\
    \ as Message);\n    }\n\n    func processMessages(callback:Message -> Void) {\n\
    \        for msg in messages {\n            callback(msg);\n        }\n    }\n\
    }\n\nvar logger = MessageLogger();\nvar message = Message(to: \"Joe\", subject:\
    \ \"Hello\");\nlogger.logMessage(message);\nmessage.to = \"Bob\";\nmessage.subject\
    \ = \"Free for dinner?\";\nlogger.logMessage(message);\nlogger.logMessage(DetailedMessage(to:\
    \ \"Alice\", subject: \"Hi!\", from: \"Joe\"));\nlogger.processMessages({msg ->\
    \ Void in\n    if let detailed = msg as? DetailedMessage {\n        println(\"\
    Detailed Message - To: \\(detailed.to) From: \\(detailed.from)\"\n        + \"\
    \ Subject: \\(detailed.subject)\");\n    } else {\n        println(\"Message -\
    \ To: \\(msg.to) Subject: \\(msg.subject)\");\n    }\n});\n```\n\nI have changed\
    \ the base type for the `Message` class to `NSObject` and implemented the `copyWithZone`\
    \ method in the `Message` and `DetailedMessage` classes. This allows me to clone\
    \ the objects passed to the `logMessage` method without needing to worry about\
    \ subclasses or initializers.\n\n**Tip**\n\nNotice that I don’t have to implement\
    \ the `NSCopying` protocol in the `DetailedMessage` class because it is inherited\
    \ from the `Message` class. All I need to do is override the `copyWithZone` method.\n\
    \nThe output shown in the console shows that applying the prototype pattern ensures\
    \ that the additional property defined by the `DetailedMessage` class isn’t lost.\n\
    \n```\nMessage - To: Joe Subject: Hello\nMessage - To: Bob Subject: Free for dinner?\n\
    Detailed Message - To: Alice From: Joe Subject: Hi!\n```\n\nThe advantage of applying\
    \ the prototype pattern is that objects can be cloned as long as they were originally\
    \ created from the `Message` class or one of its subclasses; creating new subclasses\
    \ or modifying the class initializers doesn’t require any changes to the `MessageLogger`\
    \ class, which makes the code more flexible and easier to maintain.\n\n**Tip**\n\
    \nWith a little extra effort, I can break the dependency on the `Message` class\
    \ entirely and create a generic class that can clone objects. See the “Applying\
    \ the Pattern to the SportsStore Application” section for details.\n\n## Understanding\
    \ the Pitfalls of the Prototype Pattern\n\nThere are a few pitfalls to avoid when\
    \ using the prototype pattern, which I describe in the sections that follow.\n\
    \n### Understanding the Deep vs. Shallow Pitfall\n\nThe first pitfall to avoid\
    \ is performing a shallow copy when a deep copy is required. When cloning an object,\
    \ think carefully about whether you need to create a completely separate copy\
    \ or whether a simple reference is sufficient. Creating references is quicker\
    \ and simpler than performing deep copies, but it does mean that two or more references\
    \ will point to the same object.\n\nAlso, don’t forget that you need to consider\
    \ the entire hierarchy of objects that you are cloning and not just the one on\
    \ which you call the `copy` method. For each variable that points to a reference\
    \ type, you must make a shallow versus deep decision. See the “Implementing Deep\
    \ Copying” section earlier in this chapter for details and examples."
