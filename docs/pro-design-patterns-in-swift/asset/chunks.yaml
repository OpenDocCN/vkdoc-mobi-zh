    \n### 定义单例\n\n现在我已经解决了并发问题，接下来我将定义单例对象，并保护`Logger`类，使其无法在应用程序的其他地方被实例化。代码清单 6-17\
    \ 显示了我所做的修改。\n\n**代码清单 6-17.** 在 Logger.swift 文件中创建单例\n\n```swift\nimport Foundation\n\
