    `}`


    `...`


    This approach means that any observer can still receive any notification through
    a single method but can opt to check for more specialized types and take advantage
    of them as required. The other two classes in the `SystemComponents.swift` file
    do not check for the `AuthenticationNotification` type, but they are still perfectly
    able to receive and process the notifications sent by the authentication manager
    class.


    ### Dealing with Short-Lived Subjects


    The standard implementation of the observer pattern assumes that an application
    reaches a sort of steady state, in which the observer and subject objects have
    been created and associated with one another, allowing a steady of flow of notifications
    for the life of the application.


    This isn’t always the case, of course, and a common variation is to adapt the
    pattern so that observers automatically receive notifications from subjects that
    have a relatively short life. In this situation, it is helpful to arrange for
    observers to be notified when a new subject has been created. The way I manage
    this situation is to combine the observer pattern with the mediator pattern I
    described in [Chapter 21](#A978-1-4842-0394-1_21_Chapter.html). The mediator provides
    a handy mechanism through which subjects can notify observers that they have been
    created—a kind of meta-observer pattern. The first step is to define two new types
    of notification, which I will use to indicate when a subject is created and destroyed,
    as shown in Listing 22-15.


    Listing 22-15. Defining New Notification Types in the Observer.swift File


    `...`


    `enum NotificationTypes : String {`


    `case AUTH_SUCCESS = "AUTH_SUCCESS";`


    `case AUTH_FAIL = "AUTH_FAIL";`


    `case SUBJECT_CREATED = "SUBJECT_CREATE";`


    `case SUBJECT_DESTROYED = "SUBJECT_DESTROYED";`


    `}`


    `...`


    Listing 22-16 shows the contents of the `MetaObserver.swift` file that I added
    to the example project and that I used to define the protocol and classes required
    to handle short-lived subjects automatically.


    Listing 22-16. The Contents of the MetaObserver.swift File


    `protocol MetaObserver : Observer {`


    `func notifySubjectCreated(subject:Subject);`


    `func notifySubjectDestroyed(subject:Subject);`


    `}`


    `class MetaSubject : SubjectBase, MetaObserver {`


    `func notifySubjectCreated(subject: Subject) {`


    `sendNotification(Notification(type: NotificationTypes.SUBJECT_CREATED,`


    `data: subject));`


    `}`


    `func notifySubjectDestroyed(subject: Subject) {`


    `sendNotification(Notification(type: NotificationTypes.SUBJECT_DESTROYED,`


    `data: subject));`


    `}`


    `class var sharedInstance:MetaSubject {`


    `struct singletonWrapper {`


    `static let singleton = MetaSubject();`


    `}`


    `return singletonWrapper.singleton;`


    `}`


    `func notify(notification:Notification) {`


    `// do nothing - required for Observer conformance`


    `}`


    `}`


    `class ShortLivedSubject : SubjectBase {`


    `override init() {`


    `super.init();`


    `MetaSubject.sharedInstance.notifySubjectCreated(self);`


    `}`


    `deinit {`


    `MetaSubject.sharedInstance.notifySubjectDestroyed(self);`


    `}`


    `}`


