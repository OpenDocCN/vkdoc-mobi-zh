    ## Applying the Pattern to the SportsStore Application


    In this section, I am going to combine the command and memento patterns to replace
    the undo feature I added in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html)
    with the ability to reset the application entirely.


    Most implementations of the memento pattern are based on taking and returning
    to multiple snapshots, but that is only one interpretation of how a memento should
    work. As I explained, the way that a memento works is entirely down to the implementation,
    and it need not contain the data values that an object contained. It can also
    be a trigger for some other kind of action, including discarding any changes made
    by the user and reloading the original data. In this case, the memento will be
    a command that calls a method that resets the data in the application.


    ### Preparing the Example Application


    In preparation for the pattern, I need to add a method to the `ProductDataStore`
    class that will reset the data and discard any changes made by the user. Listing
