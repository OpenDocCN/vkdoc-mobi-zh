    \    required init(name: String, description: String, category: String,\n    \
    \    price: Double, stockLevel: Int) {\n        super.init(name: name, description:\
    \ description, category: category,\n            price: price, stockLevel: stockLevel);\n\
    \        salesTaxRate = 0.25;\n    }\n    override var upsells:[UpsellOpportunities]\
    \ {\n        return [UpsellOpportunities.SoccerVideos];\n    }\n}\n```\n\n我增强了\
    \ `Product` 类，增加了一个用于计算库存价值的税率。我还定义了一个名为 `UpsellOpportunities` 的枚举，用于列出可能引起客户兴趣的附加产品。\n\
    \n我创建了两个派生自 `Product` 的子类：`WatersportsProduct` 和 `SoccerProduct`。在实现工厂方法模式时，我定义的决策逻辑将根据产品类别选择相应的子类。普通的\
    \ `Product` 对象将代表那些没有专门子类的产品。\n\n### 实现工厂方法模式\n\n为了实现该模式，我在 `Pattern` 类上定义了一个类型方法，其中包含了所有的决策逻辑。SportsStore\
    \ 应用的对象层级结构过于简单，无需将决策逻辑委托出去。列表 9-16 展示了工厂方法。\n\n**列表 9-16.** 在 `Product.swift`\
    \ 文件中实现工厂方法模式\n\n```\n...\nclass Product : NSObject, NSCopying {\n    private(set)\
    \ var name:String;\n    private(set) var productDescription:String;\n    private(set)\
    \ var category:String;\n    private var stockLevelBackingValue:Int = 0;\n    private\
    \ var priceBackingValue:Double = 0;\n    private var salesTaxRate:Double = 0.2;\n\
    \n    required init(name:String, description:String, category:String, price:Double,\n\
    \        stockLevel:Int) {\n        self.name = name;\n        self.productDescription\
    \ = description;\n        self.category = category;\n        super.init();\n \
    \       self.price = price;\n        self.stockLevel = stockLevel;\n    }\n  \
    \  // ...为简洁起见，省略了属性和方法...\n\n    class func createProduct(name:String, description:String,\
    \ category:String,\n        price:Double, stockLevel:Int) -> Product {\n     \
    \   var productType:Product.Type;\n        switch (category) {\n            case\
    \ \"Watersports\":\n                productType = WatersportsProduct.self;\n \
    \           case \"Soccer\":\n                productType = SoccerProduct.self;\n\
    \            default:\n                productType = Product.self;\n        }\n\
    \        return productType(name:name, description: description, category: category,\n\
    \            price: price, stockLevel: stockLevel);\n    }\n}\n...\n```\n\n工厂方法名为\
    \ `createProduct`，它通过 `switch` 语句根据 `category` 参数选择具体的类。然后实例化该类以生成返回给调用者的对象。`createProduct`\
    \ 方法返回 `Product` 类的实例，并隐藏了哪个子类被选中以及选择过程的具体细节。\n\n### 使用工厂方法模式\n\n为了使用工厂方法模式，我将直接实例化\
    \ `Product` 类的操作替换为对工厂方法的调用，如列表 9-17 所示。\n\n**列表 9-17.** 在 `ProductDataStore.swift`\
