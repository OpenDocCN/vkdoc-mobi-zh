    SportsStore 应用中没有适合应用访问者模式的异构集合。\n\n## 总结\n\n我在本章中描述了访问者模式，并解释了如何使用它来扩展异构集合的行为，而无需修改集合类或其子类。在第\
    \ 26 章中，我将描述模板方法模式，该模式允许有选择地替换算法中的步骤。\n\n# 26. 模板方法模式\n\n模板方法模式允许更改算法中的各个步骤，当你在编写具有默认行为的类并希望允许其他开发人员更改这些行为时，此模式非常有用。这个模式易于理解和实现，但被广泛使用，可在大多数公共框架中找到，包括\
    \ Apple 提供的框架。表 26-1 将模板方法模式置于上下文中。\n\n**表 26-1.** 将模板方法模式置于上下文中\n\n| 问题 | 答案\
    \ |\n| --- | --- |\n| 它是什么？ | 模板方法模式允许通过第三方提供的实现来替换算法中的特定步骤，这些实现可以通过将函数指定为闭包或通过创建子类来实现。\
    \ |\n| 它有什么好处？ | 当你在编写希望允许其他开发人员扩展和自定义的框架时，此模式非常有用。 |\n| 何时应使用此模式？ | 当你希望在不修改原始类的情况下，有选择地允许更改算法中的任何步骤时，使用此模式。\
    \ |\n| 何时应避免此模式？ | 如果整个算法都可以更改，则不要使用此模式。请参阅本书这部分中的其他模式以获取替代方案。 |\n| 如何知道是否正确实现了该模式？\
    \ | 当算法中的选定步骤可以在不修改定义算法的类的情况下被更改时，即正确实现了此模式。 |\n| 是否有常见的陷阱？ | 没有。 |\n| 是否有相关模式？\
    \ | 此模式与我之前在第 24 章和第 25 章中描述的策略模式和访问者模式具有相似的目标。 |\n\n## 准备示例项目\n\n在本章中，我创建了一个名为\
    \ `TemplateMethod` 的 Xcode OS X 命令行工具项目。我创建了一个名为 `Donors.swift` 的文件，其内容如清单 26-1\
    \ 所示。\n\n**清单 26-1.** `Donors.swift` 文件的内容\n\n```\nstruct Donor {\n\n    let title:String;\n\
    \n    let firstName:String;\n\n    let familyName:String;\n\n    let lastDonation:Float;\n\
    \n    init (_ title:String, _ first:String, _ family:String, _ last:Float) {\n\
    \n        self.title = title;\n\n        self.firstName = first;\n\n        self.familyName\
    \ = family;\n\n        self.lastDonation = last;\n\n    }\n\n}\n\nclass DonorDatabase\
    \ {\n\n    private var donors:[Donor];\n\n    init() {\n\n        donors = [\n\
    \n            Donor(\"Ms\", \"Anne\", \"Jones\", 0),\n\n            Donor(\"Mr\"\
    , \"Bob\", \"Smith\", 100),\n\n            Donor(\"Dr\", \"Alice\", \"Doe\", 200),\n\
    \n            Donor(\"Prof\", \"Joe\", \"Davis\", 320)];\n\n    }\n\n    func\
    \ generateGalaInvitations(maxNumber:Int) -> [String] {\n\n        // 步骤 1 - 过滤掉非捐赠者\n\
    \n        var targetDonors:[Donor] = donors.filter({$0.lastDonation > 0});\n\n\
    \        // 步骤 2 - 按最近捐赠金额对捐赠者排序\n\n        targetDonors.sort({ $0.lastDonation\
    \ > $1.lastDonation});\n\n        // 步骤 3 - 限制受邀者人数\n\n        if (targetDonors.count\
    \ > maxNumber) {\n\n            targetDonors = Array(targetDonors[0..<maxNumber]);\n\
    \n        }\n\n        // 步骤 4 - 生成邀请函\n\n        return targetDonors.map({ donor\
    \ in\n\n            return \"Dear \\(donor.title). \\(donor.familyName)\";\n\n\
    \        })\n\n    }\n\n}\n```\n\n本章的示例基于一个虚构的慈善机构，该机构向捐赠者募集捐款。每个捐赠者由一个 `Donor`\
    \ 对象表示，一组对象由 `DonorDatabase` 类收集。\n\n`DonorDatabase` 类定义了一个 `generateGalaInvitations`\
    \ 方法，该方法处理 `Donor` 对象以生成盛大音乐会的邀请函称谓。清单 26-2 展示了我添加到 `main.swift` 文件中用于生成称谓集合的代码。\n\
    \n**清单 26-2.** `main.swift` 文件的内容\n\n```\nlet donorDb = DonorDatabase();\n\nlet\
    \ galaInvitations = donorDb.generateGalaInvitations(2);\n\nfor invite in galaInvitations\
    \ {\n\n    println(invite);\n\n}\n```\n\n运行示例会在 Xcode 控制台中产生以下输出：\n\n```\nDear\
    \ Prof. Davis\n\nDear Dr. Doe\n```\n\n## 理解模式解决的问题\n\n生成盛大活动问候语的算法有四个不同的阶段：\n\n\
    - 过滤掉那些未进行捐赠的捐赠者\n- 按最近的捐赠金额对捐赠者进行排序\n- 选择有邀请函的捐赠者人数\n- 生成邀请函的称谓\n\n这些是慈善机构在生成与捐赠者进行任何沟通的问候语时需要执行的四个相同的基本步骤：过滤、排序、选择和生成。模板方法模式解决的问题是我在第\
    \ 24 章和第 25 章中描述的策略模式和访问者模式所解决问题的变体：如何在不修改类的情况下扩展类的行为。\n\n在这种情况下，该问题应用于具有明确定义步骤的算法，这些步骤可以更改以产生不同的结果，例如\
    \ `DonorDatabase` 类中用于生成称谓的算法。然而，与其他模式不同，当你需要确保算法的某些部分可以更改而其他部分保持不变时，模板方法模式非常有用，例如，确保排序和选择总是以相同的方式处理，但过滤和生成步骤可以更改，从而为不同类型的捐赠者沟通创建新的结果。\n\
    \n## 理解模板方法模式\n\n模板方法依赖于一个算法的实现，该实现仅定义要保持不变的部分。算法的其余部分由调用组件提供，以完成算法并生成所需的结果，如图\
    \ 26-1 所示。\n\n![A978-1-4842-0394-1_26_Fig1_HTML.jpg](img/A978-1-4842-0394-1_26_Fig1_HTML.jpg)\n\
    \n**图 26-1.** 模板方法模式\n"
- fmt: "# Implementing the Template Method Pattern\n\nIn other languages, the template\
    \ pattern is implemented by defining a class that requires subclasses to complete\
    \ the algorithm and provide the missing steps. Swift doesn’t support abstract\
    \ classes, but it does allow functions to be treated as objects, which allows\
    \ an implementation of the pattern to be created anyway.\n\nThe first step is\
    \ to generalize the class that contains the algorithm so that only the fixed parts\
    \ of the algorithm are defined and the parts that can be changed are specified\
    \ as functions that can be set using properties. Listing 26-3 shows the changes\
    \ I made to the `Donors.swift` file.\n\n**Listing 26-3.** Redefining the Algorithm\
    \ in the `Donors.swift` File\n\n```\nstruct Donor {\n    let title:String;\n \
    \   let firstName:String;\n    let familyName:String;\n    let lastDonation:Float;\n\
    \n    init (_ title:String, _ first:String, _ family:String, _ last:Float) {\n\
    \        self.title = title;\n        self.firstName = first;\n        self.familyName\
    \ = family;\n        self.lastDonation = last;\n    }\n}\n\nclass DonorDatabase\
    \ {\n    private var donors:[Donor];\n    var filter: ([Donor] -> [Donor])?;\n\
    \    var generate: ([Donor] -> [String])?;\n\n    init() {\n        donors = [\n\
    \            Donor(\"Ms\", \"Anne\", \"Jones\", 0),\n            Donor(\"Mr\"\
    , \"Bob\", \"Smith\", 100),\n            Donor(\"Dr\", \"Alice\", \"Doe\", 200),\n\
    \            Donor(\"Prof\", \"Joe\", \"Davis\", 320)];\n    }\n\n    func generate(maxNumber:Int)\
    \ -> [String] {\n        // step 1 - filter out non-donors\n        var targetDonors:[Donor]\
    \ = filter?(donors)\n            ?? donors.filter({$0.lastDonation > 0});\n  \
    \      // step 2 - order donors by last donation\n        targetDonors.sort({\
    \ $0.lastDonation > $1.lastDonation});\n        // step 3 - limit the number of\
    \ invitees\n        if (targetDonors.count > maxNumber) {\n            targetDonors\
    \ = Array(targetDonors[0..<maxNumber]);\n        }\n        // step 4 - generate\
    \ the invitations\n        return generate?(targetDonors) ?? targetDonors.map({\
    \ donor in\n            return \"Dear \\(donor.title). \\(donor.familyName)\"\
    ;\n        })\n    }\n}\n```\n\nI have defined `filter` and `generate` properties\
    \ that can be used to override the default steps for the filter and generate steps\
    \ in the algorithm. I have changed the name of the algorithm method to `generate`,\
    \ and I fall back to the default steps if the new properties are not set.\n\n\
    Listing 26-4 shows the changes I made to the `main.swift` file to use the modified\
    \ `DonorDatabase` class and to define a new algorithm.\n\n**Listing 26-4.** Consuming\
    \ the Template Method Pattern in the `main.swift` File\n\n```\nlet donorDb = DonorDatabase();\n\
    let galaInvitations = donorDb.generate(2);\nfor invite in galaInvitations {\n\
    \    println(invite);\n}\n\ndonorDb.filter = { $0.filter({$0.lastDonation == 0})};\n\
    donorDb.generate = { $0.map({ \"Hi \\($0.firstName)\"})};\nlet newDonors = donorDb.generate(Int.max);\n\
    for invite in newDonors {\n    println(invite);\n}\n```\n\nI run the standard\
    \ version of the algorithm and then define new functions for the `filter` and\
    \ `generate` properties using closures, selecting those donors who have yet to\
    \ make a contribution and generating a more causal greeting. Running the application\
    \ produces the following output:\n\n```\nDear Prof. Davis\nDear Dr. Doe\nHi Anne\n\
    ```\n\n# Variations on the Template Method Pattern\n\nYou can create a more traditional\
    \ implementation of the template method pattern by implementing each step of the\
    \ algorithm as a method and allowing subclasses to override them, as shown in\
    \ Listing 26-5.\n\n**Listing 26-5.** Using Methods to Define Algorithm Steps in\
    \ the `Donors.swift` File\n\n```\n...\nclass DonorDatabase {\n    private var\
    \ donors:[Donor];\n\n    init() {\n        donors = [\n            Donor(\"Ms\"\
    , \"Anne\", \"Jones\", 0),\n            Donor(\"Mr\", \"Bob\", \"Smith\", 100),\n\
    \            Donor(\"Dr\", \"Alice\", \"Doe\", 200),\n            Donor(\"Prof\"\
    , \"Joe\", \"Davis\", 320)];\n    }\n\n    func filter(donors:[Donor]) -> [Donor]\
    \ {\n        return donors.filter({$0.lastDonation > 0});\n    }\n\n    func generate(donors:[Donor])\
    \ -> [String] {\n        return donors.map({ donor in\n            return \"Dear\
    \ \\(donor.title). \\(donor.familyName)\";\n        })\n    }\n\n    func generate(maxNumber:Int)\
    \ -> [String] {\n        // step 1 - filter out non-donors\n        var targetDonors\
    \ = filter(self.donors);\n        // step 2 - order donors by last donation\n\
    \        targetDonors.sort({ $0.lastDonation > $1.lastDonation});\n        //\
    \ step 3 - limit the number of invitees\n        if (targetDonors.count > maxNumber)\
    \ {\n            targetDonors = Array(targetDonors[0..<maxNumber]);\n        }\n\
    \        // step 4 - generate the invitations\n        return generate(targetDonors);\n\
    \    }\n}\n...\n```\n\nI have defined the `filter` and `generate` steps as separate\
    \ methods that can be overridden by subclasses, as shown in Listing 26-6.\n\n\
    **Listing 26-6.** Creating a Subclass in the `main.swift` File\n\n```\nlet donorDb\
    \ = DonorDatabase();\nlet galaInvitations = donorDb.generate(2);\nfor invite in\
    \ galaInvitations {\n    println(invite);\n}\n\nclass NewDonors : DonorDatabase\
    \ {\n    override func filter(donors: [Donor]) -> [Donor] {\n        return donors.filter({\
    \ $0.lastDonation == 0});\n    }\n    override func generate(donors: [Donor])\
    \ -> [String] {\n        return donors.map({ \"Hi \\($0.firstName)\"});\n    }\n\
    }\n\nlet newDonor = NewDonors();\nfor invite in newDonor.generate(Int.max) {\n\
    \    println(invite);\n}\n```\n\nI prefer the closure-based technique, but it\
    \ is a matter of personal preference, and you should choose whichever approach\
    \ suits your coding style better.\n\n# Understanding the Pitfalls of the Pattern\n\
    \nThere are no pitfalls associated with the template method pattern, which is\
    \ simple to implement and test. If you choose to implement the variation I showed\
    \ in the previous section, take care to define as methods only the steps that\
    \ you want to permit to be changed.\n\n# Examples of the Template Method Pattern\
    \ in Cocoa\n\nThe template method pattern is used throughout Cocoa and is particularly\
    \ visible in the UI components. You can see an example in the SportsStore application\
    \ where the `ViewController` class is derived from the `UIViewController` class\
    \ and overrides the `viewDidLoad` method, which is called when the user interface\
    \ is created, as follows:\n\n```\n...\noverride func viewDidLoad() {\n    super.viewDidLoad();\n\
    \    displayStockTotal();\n    let bridge = EventBridge(callback: updateStockLevel);\n\
    \    productStore.callback = bridge.inputCallback;\n}\n...\n```\n\nYou may not\
    \ think of user interface initialization as an algorithm, but it is one that you\
    \ will have used in all iOS projects in some form, and it allows Apple to define\
    \ a set of fixed classes with default behaviors that can be overridden by third-party\
    \ developers.\n\n# Applying the Pattern to the SportsStore Application\n\nAs noted\
    \ in the previous section, the SportsStore application already relies on the template\
    \ method pattern.\n\n# Summary\n\nI described the template method pattern in this\
    \ chapter and explained how it can be used to allow some steps in an algorithm\
    \ to be modified, either by defining new functions using closures or by creating\
    \ a subclass. I turn my attention to the one of the most important and misunderstood\
    \ patterns in the next part of this book: the Model/View/Controller (MVC) pattern.\n\
    \n# Part V\n\n## The MVC Pattern"
  raw: '## Implementing the Template Method Pattern


    In other languages, the template pattern is implemented by defining a class that
    requires subclasses to complete the algorithm and provide the missing steps. Swift
    doesn’t support abstract classes, but it does allow functions to be treated as
    objects, which allows an implementation of the pattern to be created anyway.


    The first step is to generalize the class that contains the algorithm so that
    only the fixed parts of the algorithm are defined and the parts that can be changed
    are specified as functions that can be set using properties. Listing 26-3 shows
    the changes I made to the `Donors.swift` file.


    Listing 26-3. Redefining the Algorithm in the Donors.swift File


    `struct Donor {`


    `let title:String;`


    `let firstName:String;`


    `let familyName:String;`


    `let lastDonation:Float;`


    `init (_ title:String, _ first:String, _ family:String, _ last:Float) {`


    `self.title = title;`


    `self.firstName = first;`


    `self.familyName = family;`


    `self.lastDonation = last;`


    `}`


    `}`


    `class DonorDatabase {`


    `private var donors:[Donor];`


    `var filter: ([Donor] -> [Donor])?;`


    `var generate: ([Donor] -> [String])?;`


    `init() {`


    `donors = [`


    `Donor("Ms", "Anne", "Jones", 0),`


    `Donor("Mr", "Bob", "Smith", 100),`


    `Donor("Dr", "Alice", "Doe", 200),`


    `Donor("Prof", "Joe", "Davis", 320)];`


    `}`


    `func generate(maxNumber:Int) -> [String] {`


    `// step 1 - filter out non-donors`


    `var targetDonors:[Donor] = filter?(donors)`


    `?? donors.filter({$0.lastDonation > 0});`


    `// step 2 - order donors by last donation`


    `targetDonors.sort({ $0.lastDonation > $1.lastDonation});`


    `// step 3 - limit the number of invitees`


    `if (targetDonors.count > maxNumber) {`


    `targetDonors = Array(targetDonors[0..<maxNumber]);`


    `}`


    `// step 4 - generate the invitations`


    `return generate?(targetDonors) ?? targetDonors.map({ donor in`


    `return "Dear \(donor.title). \(donor.familyName)";`


    `})`


    `}`


    `}`


    I have defined `filter` and `generate` properties that can be used to override
    the default steps for the filter and generate steps in the algorithm. I have changed
    the name of the algorithm method to `generate`, and I fall back to the default
    steps if the new properties are not set.


    Listing 26-4 shows the changes I made to the `main.swift` file to use the modified
    `DonorDatabase` class and to define a new algorithm.


    Listing 26-4. Consuming the Template Method Pattern in the main.swift File


    `let donorDb = DonorDatabase();`


    `let galaInvitations = donorDb.generate(2);`


    `for invite in galaInvitations {`


    `println(invite);`


    `}`


    `donorDb.filter = { $0.filter({$0.lastDonation == 0})};`


    `donorDb.generate = { $0.map({ "Hi \($0.firstName)"})};`


    `let newDonors = donorDb.generate(Int.max);`


    `for invite in newDonors {`


    `println(invite);`


    `}`


    I run the standard version of the algorithm and then define new functions for
    the `filter` and `generate` properties using closures, selecting those donors
    who have yet to make a contribution and generating a more causal greeting. Running
    the application produces the following output:


    `Dear Prof. Davis`


    `Dear Dr. Doe`


    `Hi Anne`


    ## Variations on the Template Method Pattern


    You can create a more traditional implementation of the template method pattern
    by implementing each step of the algorithm as a method and allowing subclasses
    to override them, as shown in Listing 26-5.


    Listing 26-5. Using Methods to Define Algorithm Steps in the Donors.swift File


    `...`


    `class DonorDatabase {`


    `private var donors:[Donor];`


    `init() {`


    `donors = [`


    `Donor("Ms", "Anne", "Jones", 0),`


    `Donor("Mr", "Bob", "Smith", 100),`


    `Donor("Dr", "Alice", "Doe", 200),`


    `Donor("Prof", "Joe", "Davis", 320)];`


    `}`


    `func filter(donors:[Donor]) -> [Donor] {`


    `return donors.filter({$0.lastDonation > 0});`


    `}`


    `func generate(donors:[Donor]) -> [String] {`


    `return donors.map({ donor in`


    `return "Dear \(donor.title). \(donor.familyName)";`


    `})`


    `}`


    `func generate(maxNumber:Int) -> [String] {`


    `// step 1 - filter out non-donors`


    `var targetDonors = filter(self.donors);`


    `// step 2 - order donors by last donation`


    `targetDonors.sort({ $0.lastDonation > $1.lastDonation});`


    `// step 3 - limit the number of invitees`


    `if (targetDonors.count > maxNumber) {`


    `targetDonors = Array(targetDonors[0..<maxNumber]);`


    `}`


    `// step 4 - generate the invitations`


    `return generate(targetDonors);`


    `}`


    `}`


    `...`


    I have defined the `filter` and `generate` steps as separate methods that can
    be overridden by subclasses, as shown in Listing 26-6.


    Listing 26-6. Creating a Subclass in the main.swift File


    `let donorDb = DonorDatabase();`


    `let galaInvitations = donorDb.generate(2);`


    `for invite in galaInvitations {`


    `println(invite);`


    `}`


    `class NewDonors : DonorDatabase {`


    `override func filter(donors: [Donor]) -> [Donor] {`


    `return donors.filter({ $0.lastDonation == 0});`


    `}`


    `override func generate(donors: [Donor]) -> [String] {`


    `return donors.map({ "Hi \($0.firstName)"});`


    `}`


    `}`


    `let newDonor = NewDonors();`


    `for invite in newDonor.generate(Int.max) {`


    `println(invite);`


    `}`


    I prefer the closure-based technique, but it is a matter of personal preference,
    and you should choose whichever approach suits your coding style better.


    ## Understanding the Pitfalls of the Pattern


    There are no pitfalls associated with the template method pattern, which is simple
    to implement and test. If you choose to implement the variation I showed in the
    previous section, take care to define as methods only the steps that you want
    to permit to be changed.


    ## Examples of the Template Method Pattern in Cocoa


    The template method pattern is used throughout Cocoa and is particularly visible
    in the UI components. You can see an example in the SportsStore application where
    the `ViewController` class is derived from the `UIViewController` class and overrides
    the `viewDidLoad` method, which is called when the user interface is created,
    as follows:


    `...`


    `override func viewDidLoad() {`


    `super.viewDidLoad();`


    `displayStockTotal();`


    `let bridge = EventBridge(callback: updateStockLevel);`


    `productStore.callback = bridge.inputCallback;`


    `}`


    `...`


    You may not think of user interface initialization as an algorithm, but it is
    one that you will have used in all iOS projects in some form, and it allows Apple
    to define a set of fixed classes with default behaviors that can be overridden
    by third-party developers.


    ## Applying the Pattern to the SportsStore Application


    As noted in the previous section, the SportsStore application already relies on
    the template method pattern.


    ## Summary


    I described the template method pattern in this chapter and explained how it can
    be used to allow some steps in an algorithm to be modified, either by defining
    new functions using closures or by creating a subclass. I turn my attention to
    the one of the most important and misunderstood patterns in the next part of this
    book: the Model/View/Controller (MVC) pattern.


    # Part V

    The MVC Pattern'
  trans: "\n# 实现模板方法模式\n\n在其他语言中，模板模式通过定义一个类来实现，该类要求子类完成算法并提供缺失的步骤。Swift 不支持抽象类，但它允许将函数视为对象来处理，这使得无论如何都能创建该模式的实现。\n\
    \n第一步是泛化包含算法的类，使其仅定义算法的固定部分，而将可变部分指定为可通过属性设置的函数。清单 26-3 显示了对 `Donors.swift` 文件所做的修改。\n\
    \n**清单 26-3.** 在 `Donors.swift` 文件中重新定义算法\n\n```\nstruct Donor {\n    let title:String;\n\
    \    let firstName:String;\n    let familyName:String;\n    let lastDonation:Float;\n\
    \n    init (_ title:String, _ first:String, _ family:String, _ last:Float) {\n\
    \        self.title = title;\n        self.firstName = first;\n        self.familyName\
    \ = family;\n        self.lastDonation = last;\n    }\n}\n\nclass DonorDatabase\
    \ {\n    private var donors:[Donor];\n    var filter: ([Donor] -> [Donor])?;\n\
    \    var generate: ([Donor] -> [String])?;\n\n    init() {\n        donors = [\n\
    \            Donor(\"Ms\", \"Anne\", \"Jones\", 0),\n            Donor(\"Mr\"\
    , \"Bob\", \"Smith\", 100),\n            Donor(\"Dr\", \"Alice\", \"Doe\", 200),\n\
    \            Donor(\"Prof\", \"Joe\", \"Davis\", 320)];\n    }\n\n    func generate(maxNumber:Int)\
    \ -> [String] {\n        // 第 1 步 - 过滤掉非捐赠者\n        var targetDonors:[Donor]\
    \ = filter?(donors)\n            ?? donors.filter({$0.lastDonation > 0});\n  \
    \      // 第 2 步 - 按最近捐赠额排序\n        targetDonors.sort({ $0.lastDonation > $1.lastDonation});\n\
    \        // 第 3 步 - 限制受邀人数\n        if (targetDonors.count > maxNumber) {\n  \
    \          targetDonors = Array(targetDonors[0..<maxNumber]);\n        }\n   \
    \     // 第 4 步 - 生成邀请函\n        return generate?(targetDonors) ?? targetDonors.map({\
