    The `Spreadsheet` class has a `Dictionary` property that stores a collection of
    `Cell` objects, each of which is indexed by a `Coordinate` object. The `Coordinate`
    stores a column and row value, such as A45, where A is the column and 45 is the
    row, in order to create a grid. The `Cell` object is used to store an `Int` value
    at a given position in the grid and also has details of the coordinate that its
    value relates to. The initializer for the `Spreadsheet` class creates a grid with
    26 columns and 50 rows and sets the `value property` of each `Cell` to the row
    index. The `setValue` method changes the `value` property of a `Cell` at a specified
    `Coordinate`, and the `total` property computes the sum of the `value` properties
    of all the `Cell` objects in the grid.


    Tip


    The global function called `==` compares two `Coordinate` objects for equality,
    which allows them to be used as keys in a `Dictionary` collection.'
  trans: "\n### 应用外观类\n\n应用外观类只需修改 `ViewController` 类中 `displayStockTotal` 方法的代码，如清单\
    \ 16-12 所示。\n\n**清单 16-12.** 在 ViewController.swift 文件中应用外观类\n\n```\n...\nfunc\
    \ displayStockTotal() {\n    let finalTotals:(Int, Double) = productStore.products.reduce((0,\
    \ 0.0),\n    {(totals, product) -> (Int, Double) in\n        return (\n      \
    \      totals.0 + product.stockLevel,\n            totals.1 + product.stockValue\n\
    \        );\n    });\n    let formatted = StockTotalFacade.formatCurrencyAmount(finalTotals.1,\n\
    \        currency: StockTotalFacade.Currency.EUR);\n    totalStockLabel.text =\
    \ \"\\(finalTotals.0) Products in Stock. \"\n        + \"Total Value: \\(formatted!)\"\
    ;\n}\n...\n```\n\n我已删除了处理工厂、转换器和格式化器类的语句，并将其替换为对外观类的单一调用。应用程序仍然会转换并显示库存产品的总价值，如图\
    \ 16-4 所示，但 `ViewController` 现在仅依赖于外观类，而不再依赖底层对象。\n\n![A978-1-4842-0394-1_16_Fig4_HTML.jpg](img/A978-1-4842-0394-1_16_Fig4_HTML.jpg)\n\
    \n**图 16-4.** 使用外观类计算库存总价值\n\n## 本章小结\n\n在本章中，我展示了如何使用外观模式隐藏复杂的 API，以及执行任务所需的对象间协调。外观呈现了一个简化的\
    \ API，供调用组件使用，其效果是将复杂性整合到单个类中。外观模式可用于创建不透明外观和透明外观，它们在处理底层复杂性的方式上有所不同。不透明外观隐藏了所有复杂性，而透明外观则允许调用组件访问部分或全部底层对象，以执行高级任务。在下一章中，我将介绍享元模式，该模式允许在对象之间共享数据，以减少应用程序的内存占用。\n\
    \n# 17. 享元模式\n\n当多个相似对象都依赖同一组数据值时，就会应用享元模式。享元模式不会为每个对象创建一组新的数据值，而是在所有对象之间共享一组数据，从而最大限度地减少存储数据所需的内存量以及创建数据所需的工作量。表\
    \ 17-1 将享元模式置于上下文中。\n\n**表 17-1.** 享元模式上下文\n\n| 问题 | 答案 |\n| --- | --- |\n| 什么是享元模式？\
    \ | 享元模式在多个调用组件之间共享公共数据对象。 |\n| 有什么好处？ | 享元模式减少了创建调用组件所需数据对象所需的内存量，以及创建它们所需的工作量。实现该模式的影响随着共享数据的调用组件数量的增加而增加。\
    \ |\n| 何时应使用此模式？ | 当你能够识别并隔离出调用组件使用的相同数据对象集时，使用此模式。 |\n| 何时应避免此模式？ | 如果没有共享数据，或者共享数据对象数量少且易于创建，则不要使用此模式。\
    \ |\n| 如何知道是否正确实现了该模式？ | 当所有调用组件都依赖同一组不可变的共享数据对象（称为外部数据）并拥有各自独立的状态数据（称为内部数据）时，该模式就正确实现了。调用组件应能安全地并发修改内部数据，且绝不能修改外部数据。\
    \ |\n| 有哪些常见陷阱？ | 常见陷阱包括：无意中创建了多组外部数据对象、未保护内部数据免受并发操作影响、允许修改外部数据，以及过度优化外部对象的创建。\
    \ |\n| 有哪些相关模式？ | 许多结构型模式具有相似的实现但意图不同。请确保从本书本部分描述的各个模式中选择了正确的模式。 |\n\n## 准备示例项目\n\
    \n针对本章，我创建了一个名为 `Flyweight` 的 Xcode OS X 命令行工具项目。我添加了一个名为 `Spreadsheet.swift`\
    \ 的文件，其内容如清单 17-1 所示。\n\n**清单 17-1.** Spreadsheet.swift 文件的内容\n\n```\nfunc ==\
    \ (lhs: Coordinate, rhs: Coordinate) -> Bool {\n    return lhs.col == rhs.col\
    \ && lhs.row == rhs.row;\n}\n\nclass Coordinate : Hashable, Printable {\n    let\
    \ col:Character;\n    let row:Int;\n\n    init(col:Character, row:Int) {\n   \
    \     self.col = col; self.row = row;\n    }\n\n    var hashValue: Int {\n   \
    \     return description.hashValue;\n    }\n\n    var description: String {\n\
    \        return \"\\(col)(\\row)\";\n    }\n}\n\nclass Cell {\n    var coordinate:Coordinate;\n\
    \    var value:Int;\n\n    init(col:Character, row:Int, val:Int) {\n        self.coordinate\
    \ = Coordinate(col: col, row: row);\n        self.value = val;\n    }\n}\n\nclass\
    \ Spreadsheet {\n    var grid = Dictionary<Coordinate, Cell>();\n\n    init()\
    \ {\n        let letters:String = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\";\n        var\
    \ stringIndex = letters.startIndex;\n        let rows = 50;\n        do {\n  \
    \          let colLetter = letters[stringIndex];\n            stringIndex = stringIndex.successor();\n\
    \            for rowIndex in 1 ... rows {\n                let cell = Cell(col:\
    \ colLetter, row: rowIndex, val: rowIndex);\n                grid[cell.coordinate]\
    \ = cell;\n            }\n        } while (stringIndex != letters.endIndex);\n\
    \    }\n\n    func setValue(coord: Coordinate, value:Int) {\n        grid[coord]?.value\
    \ = value;\n    }\n\n    var total:Int {\n        return reduce(grid.values, 0,\n\
    \            {total, cell in return total + cell.value});\n    }\n}\n```\n\n`Spreadsheet`\
    \ 类有一个 `Dictionary` 属性，用于存储 `Cell` 对象的集合，每个 `Cell` 对象都通过 `Coordinate` 对象进行索引。`Coordinate`\
    \ 存储一个列值和行值（例如 `A45`，其中 `A` 是列，`45` 是行），以创建网格。`Cell` 对象用于在网格的给定位置存储一个 `Int` 值，并且还包含其值所对应的坐标详细信息。`Spreadsheet`\
    \ 类的初始化器创建一个包含 26 列和 50 行的网格，并将每个 `Cell` 的 `value` 属性设置为行索引。`setValue` 方法更改指定\
    \ `Coordinate` 处 `Cell` 的 `value` 属性，而 `total` 属性计算网格中所有 `Cell` 对象的 `value` 属性之和。\n\
    \n**提示：** 名为 `==` 的全局函数用于比较两个 `Coordinate` 对象是否相等，这使得它们可以作为 `Dictionary` 集合中的键使用。\n"
- fmt: "# Understanding the Problems That the Pattern Solves\n\nThe problem addressed\
    \ by the flyweight pattern is the impact of creating large numbers of identical\
    \ objects, both in terms of the memory that they consume and the amount of time\
    \ taken to create them. The `Spreadsheet` class that I defined in the previous\
    \ section creates `Cell` and `Coordinate` objects for every position in the grid\
    \ it maintains, which means that each `Spreadsheet` object generates a relatively\
    \ large number of objects. Listing 17-2 shows the code I added to the `main.swift`\
    \ file to demonstrate the problem.\n\n**Listing 17-2.** The Contents of the `main.swift`\
    \ File\n\n```\nlet ss1 = Spreadsheet();\n\nss1.setValue(Coordinate(col: \"A\"\
    , row: 1), value: 100);\n\nss1.setValue(Coordinate(col: \"J\", row: 20), value:\
    \ 200);\n\nprintln(\"SS1 Total: \\(ss1.total)\");\n\nlet ss2 = Spreadsheet();\n\
    \nss2.setValue(Coordinate(col: \"F\", row: 10), value: 200);\n\nss2.setValue(Coordinate(col:\
    \ \"G\", row: 23), value: 250);\n\nprintln(\"SS2 Total: \\(ss2.total)\");\n\n\
    println(\"Cells created: \\(ss1.grid.count + ss2.grid.count)\");\n```\n\nI create\
    \ two `Spreadsheet` objects, set values for different cells, and write out the\
    \ totals. I then write out the total number of `Cell` objects that are in the\
    \ `Dictionary` collections maintained by the `Spreadsheet` objects. Running the\
    \ application produces the following output:\n\n```\nSS1 Total: 33429\n\nSS2 Total:\
    \ 33567\n\nCells created: 2600\n```\n\nI have ended up with a large number of\
    \ `Cell` objects for such a simple operation, and most of them still have the\
    \ default value that was assigned during instantiation.\n\n# Understanding the\
    \ Flyweight Pattern\n\nEach of the 2,600 `Cell` objects that I created in the\
    \ previous section took time to create and memory to store. The flyweight pattern\
    \ minimizes the CPU and memory impact by identifying and separating the data that\
    \ is common across similar objects and sharing it, meaning that only one shared\
    \ object has to be created. Figure [17-1](#A978-1-4842-0394-1_17_Chapter.html#Fig1)\
    \ illustrates the flyweight pattern.\n\n![A978-1-4842-0394-1_17_Fig1_HTML.jpg](A978-1-4842-0394-1_17_Fig1_HTML.jpg)\n\
    \n**Figure 17-1.** The flyweight pattern\n\nIn the flyweight pattern, the calling\
    \ components are the objects that generate and rely on the large number of data\
    \ objects. In the example project, the calling components are the `Spreadsheet`\
    \ objects, and they rely on the `Cell` data objects.\n\nThe pattern uses a flyweight\
    \ object to manage the data objects that the calling component needs. The flyweight\
    \ object splits the data objects into extrinsic and intrinsic categories. The\
    \ extrinsic data is common to all calling components; the intrinsic data is unique\
    \ to each calling component.\n\nThe flyweight pattern minimizes the impact of\
    \ creating objects by sharing the extrinsic state between flyweight objects, meaning\
    \ that all of the calling components share the same set of data objects. Because\
    \ it is shared, the extrinsic data is immutable and cannot be modified by the\
    \ flyweights or the calling components.\n\nThe intrinsic data cannot be shared,\
    \ so the amount of impact that the flyweight pattern has is driven by the ratio\
    \ of extrinsic to intrinsic data objects.\n\nThe flyweight factory provides the\
    \ calling components with a mechanism for obtaining flyweight objects and is responsible\
    \ for providing the flyweights with access to the extrinsic data.\n\n# Implementing\
    \ the Flyweight Pattern\n\nI have chosen a spreadsheet as the example for this\
    \ chapter because it provides some implementation challenges. When a new `Spreadsheet`\
    \ object is created, every `Cell` object is identical and can easily be treated\
    \ as extrinsic data. Each value that is set on a `Spreadsheet` is unique to that\
    \ instance and becomes intrinsic data. My goal in implementing the pattern will\
    \ be to make the transition from extrinsic to intrinsic data as seamless and simple\
    \ as possible.\n\n## Creating the Flyweight Protocol\n\nYou don’t have to define\
    \ a protocol for your flyweights, but I like to do so because it makes it easier\
    \ to introduce different implementations later in the application life cycle.\
    \ I also find that using a protocol makes me pay more attention to the data I\
    \ expose to the calling component because I have to explicitly define each method\
    \ and property. Listing 17-3 shows the contents of the `Flyweight.swift` file\
    \ that I added to the example project.\n\n**Listing 17-3.** The Contents of the\
    \ `Flyweight.swift` File\n\n```\nimport Foundation;\n\nprotocol Flyweight {\n\n\
    \    subscript(index:Coordinate) -> Int? { get set };\n\n    var total:Int { get\
    \ };\n\n    var count:Int { get };\n\n}\n```\n\nThe data objects in the `Spreadsheet`\
    \ class are stored in a `Dictionary` collection, and this is reflected in the\
    \ `Flyweight` protocol. The subscript I have defined allows values to be gotten\
    \ and set using `Coordinate` keys, and the `count` property will return the number\
    \ of intrinsic data objects. (The number of objects is required to implement the\
    \ pattern, but I will use it in the `main.swift` file to illustrate the impact\
    \ of applying the pattern).\n\nI don’t want classes that consume the `Flyweight`\
    \ protocol to have knowledge of the separation of intrinsic and extrinsic data,\
    \ so I have added a `total` property, which will be used to compute the sum of\
    \ the `value` property values of the intrinsic `Cell` objects.\n\n## Creating\
    \ the Flyweight Implementation Class\n\nThe next step is to implement the flyweight\
    \ implementation class that will conform to the `Flyweight` protocol. This is\
    \ the class that will be responsible for managing the intrinsic data and that\
    \ will be provided with access to the extrinsic data by the flyweight factory.\
    \ Listing 17-4 shows the definition of the implementation class.\n\n**Listing\
    \ 17-4.** Defining the Flyweight Implementation Class in the `Flyweight.swift`\
    \ File\n\n```\nimport Foundation;\n\nprotocol Flyweight {\n\n    subscript(index:Coordinate)\
    \ -> Int? { get set };\n\n    var total:Int { get };\n\n    var count:Int { get\
    \ };\n\n}\n\nclass FlyweightImplementation : Flyweight {\n\n    private let extrinsicData:[Coordinate:\
    \ Cell];\n\n    private var intrinsicData:[Coordinate: Cell];\n\n    private init(extrinsic:[Coordinate:\
    \ Cell]) {\n\n        self.extrinsicData = extrinsic;\n\n        self.intrinsicData\
    \ = Dictionary<Coordinate, Cell>();\n\n    }\n\n    subscript(key:Coordinate)\
    \ -> Int? {\n\n        get {\n\n            if let cell = intrinsicData[key] {\n\
    \n                return cell.value;\n\n            } else {\n\n             \
    \   return extrinsicData[key]?.value;\n\n            }\n\n        }\n\n      \
    \  set (value) {\n\n            if (value != nil) {\n\n                intrinsicData[key]\
    \ = Cell(col: key.col,\n\n                    row: key.row, val: value!);\n\n\
    \            }\n\n        }\n\n    }\n\n    var total:Int {\n\n        return\
    \ reduce(extrinsicData.values, 0, {total, cell in\n\n            if let intrinsicCell\
    \ = self.intrinsicData[cell.coordinate] {\n\n                return total + intrinsicCell.value;\n\
    \n            } else {\n\n                return total + cell.value\n\n      \
    \      }\n\n        });\n\n    }\n\n    var count:Int {\n\n        return intrinsicData.count;\n\
    \n    }\n\n}\n```\n\n> **Tip:** Note that the flyweight does not modify the extrinsic\
    \ data or allow the calling component to modify it. This is a critical characteristic\
    \ of the flyweight pattern, and allowing the extrinsic data to be modified is\
    \ a common pitfall.\n\nThe `FlyweightImplementation` class conforms to the `Flyweight`\
    \ protocol and receives the extrinsic data as its initializer argument. The intrinsic\
    \ data is used as an overlay on the extrinsic data, and requests for values fall\
    \ through to the extrinsic data if there is no intrinsic `Cell` for the specified\
    \ `Coordinate`. When a new value is set, a `Cell` object is created as part of\
    \ the intrinsic data.\n\n> **Note:** Not all intrinsic data has to correspond\
    \ to an extrinsic equivalent. It is perfectly acceptable for a flyweight to manage\
    \ intrinsic data that is not related to any extrinsic value. That said, I tend\
    \ to define such data values in the calling component and leave the flyweight\
    \ to focus on those intrinsic values that are related to the extrinsic data in\
    \ some way."
  raw: '## Understanding the Problems That the Pattern Solves


    The problem addressed by the flyweight pattern is the impact of creating large
    numbers of identical objects, both in terms of the memory that they consume and
    the amount of time taken to create them. The `Spreadsheet` class that I defined
    in the previous section creates `Cell` and `Coordinate` objects for every position
    in the grid it maintains, which means that each `Spreadsheet` object generates
    a relatively large number of objects. Listing 17-2 shows the code I added to the
    `main.swift` file to demonstrate the problem.


    Listing 17-2. The Contents of the main.swift File


    `let ss1 = Spreadsheet();`


    `ss1.setValue(Coordinate(col: "A", row: 1), value: 100);`


    `ss1.setValue(Coordinate(col: "J", row: 20), value: 200);`


    `println("SS1 Total: \(ss1.total)");`


    `let ss2 = Spreadsheet();`


    `ss2.setValue(Coordinate(col: "F", row: 10), value: 200);`


    `ss2.setValue(Coordinate(col: "G", row: 23), value: 250);`


    `println("SS2 Total: \(ss2.total)");`


    `println("Cells created: \(ss1.grid.count + ss2.grid.count)");`


    I create two `Spreadsheet` objects, set values for different cells, and write
    out the totals. I then write out the total number of `Cell` objects that are in
    the `Dictionary` collections maintained by the `Spreadsheet` objects. Running
    the application produces the following output:


    `SS1 Total: 33429`


    `SS2 Total: 33567`


    `Cells created: 2600`


    I have ended up with a large number of `Cell` objects for such a simple operation,
    and most of them still have the default value that was assigned during instantiation.


    ## Understanding the Flyweight Pattern


    Each of the 2,600 `Cell` objects that I created in the previous section took time
    to create and memory to store. The flyweight pattern minimizes the CPU and memory
    impact by identifying and separating the data that is common across similar objects
    and sharing it, meaning that only one shared object has to be created. Figure
    [17-1](#A978-1-4842-0394-1_17_Chapter.html#Fig1) illustrates the flyweight pattern.


    ![A978-1-4842-0394-1_17_Fig1_HTML.jpg](A978-1-4842-0394-1_17_Fig1_HTML.jpg)


    Figure 17-1.


    The flyweight pattern


    In the flyweight pattern, the calling components are the objects that generate
    and rely on the large number of data objects. In the example project, the calling
    components are the `Spreadsheet` objects, and they rely on the `Cell` data objects.


    The pattern uses a flyweight object to manage the data objects that the calling
    component needs. The flyweight object splits the data objects into extrinsic and
    intrinsiccategories. The extrinsic data is common to all calling components; the
    intrinsic data is unique to each calling component.


    The flyweight pattern minimizes the impact of creating objects by sharing the
    extrinsic state between flyweight objects, meaning that all of the calling components
    share the same set of data objects. Because it is shared, the extrinsic data is
    immutable and cannot be modified by the flyweights or the calling components.


    The intrinsic data cannot be shared, so the amount of impact that the flyweight
    pattern has is driven by the ratio of extrinsic to intrinsic data objects.


    The flyweight factoryprovides the calling components with a mechanism for obtaining
    flyweight objects and is responsible for providing the flyweights with access
    to the extrinsic data.


    ## Implementing the Flyweight Pattern


    I have chosen a spreadsheet as the example for this chapter because it provides
    some implementation challenges. When a new `Spreadsheet` object is created, every
    `Cell` object is identical and can easily be treated as extrinsic data. Each value
    that is set on a `Spreadsheet` is unique to that instance and becomes intrinsic
    data. My goal in implementing the pattern will be to make the transition from
    extrinsic to intrinsic data as seamless and simple as possible.


    ### Creating the Flyweight Protocol


    You don’t have to define a protocol for your flyweights, but I like to do so because
    it makes it easier to introduce different implementations later in the application
    life cycle. I also find that using a protocol makes me pay more attention to the
    data I expose to the calling component because I have to explicitly define each
    method and property. Listing 17-3 shows the contents of the `Flyweight.swift`
    file that I added to the example project.


    Listing 17-3. The Contents of the Flyweight.swift File


    `import Foundation;`


    `protocol Flyweight {`


    `subscript(index:Coordinate) -> Int? { get set };`


    `var total:Int { get };`


    `var count:Int { get };`


    `}`


    The data objects in the `Spreadsheet` class are stored in a `Dictionary` collection,
    and this is reflected in the `Flyweight` protocol. The subscript I have defined
    allows values to be gotten and set using `Coordinate` keys, and the `count` property
    will return the number of intrinsic data objects. (The number of objects is required
    to implement the pattern, but I will use it in the `main.swift` file to illustrate
    the impact of applying the pattern).


    I don’t want classes that consume the `Flyweight` protocol to have knowledge of
    the separation of intrinsic and extrinsic data, so I have added a `total` property,
    which will be used to compute the sum of the `value` property values of the intrinsic
    `Cell` objects.


    ### Creating the Flyweight Implementation Class


    The next step is to implement the flyweight implementation class that will conform
    to the `Flyweight` protocol. This is the class that will be responsible for managing
    the intrinsic data and that will be provided with access to the extrinsic data
    by the flyweight factory. Listing 17-4 shows the definition of the implementation
    class.


    Listing 17-4. Defining the Flyweight Implementation Class in the Flyweight.swift
    File


    `import Foundation;`


    `protocol Flyweight {`


    `subscript(index:Coordinate) -> Int? { get set };`


    `var total:Int { get };`


    `var count:Int { get };`


    `}`


    `class FlyweightImplementation : Flyweight {`


    `private let extrinsicData:[Coordinate: Cell];`


    `private var intrinsicData:[Coordinate: Cell];`


    `private init(extrinsic:[Coordinate: Cell]) {`


    `self.extrinsicData = extrinsic;`


    `self.intrinsicData = Dictionary<Coordinate, Cell>();`


    `}`


    `subscript(key:Coordinate) -> Int? {`


    `get {`


    `if let cell = intrinsicData[key] {`


    `return cell.value;`


    `} else {`


    `return extrinsicData[key]?.value;`


    `}`


    `}`


    `set (value) {`


    `if (value != nil) {`


    `intrinsicData[key] = Cell(col: key.col,`


    `row: key.row, val: value!);`


    `}`


    `}`


    `}`


    `var total:Int {`


    `return reduce(extrinsicData.values, 0, {total, cell in`


    `if let intrinsicCell = self.intrinsicData[cell.coordinate] {`


    `return total + intrinsicCell.value;`


    `} else {`


    `return total + cell.value`


    `}`


    `});`


    `}`


    `var count:Int {`


    `return intrinsicData.count;`


    `}`


    `}`


    Tip


    Note that the flyweight does not modify the extrinsic data or allow the calling
    component to modify it. This is a critical characteristic of the flyweight pattern,
    and allowing the extrinsic data to be modified is a common pitfall.


    The `FlyweightImplementation` class conforms to the `Flyweight` protocol and receives
    the extrinsic data as its initializer argument. The intrinsic data is used as
    an overlay on the extrinsic data, and requests for values fall through to the
    extrinsic data if there is no intrinsic `Cell` for the specified `Coordinate`.
    When a new value is set, a `Cell` object is created as part of the intrinsic data.


    Note


    Not all intrinsic data has to correspond to an extrinsic equivalent. It is perfectly
    acceptable for a flyweight to manage intrinsic data that is not related to any
    extrinsic value. That said, I tend to define such data values in the calling component
    and leave the flyweight to focus on those intrinsic values that are related to
    the extrinsic data in some way.'
  trans: "好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n# 理解该模式解决的问题\n\n享元模式所解决的问题在于，创建大量相同对象所带来的影响，这既体现在它们消耗的内存上，也体现在创建它们所花费的时间上。我在前一节中定义的\
    \ `Spreadsheet` 类为其维护的网格中的每个位置都创建了 `Cell` 和 `Coordinate` 对象，这意味着每个 `Spreadsheet`\
    \ 对象都会生成相对大量的对象。清单 17-2 展示了我添加到 `main.swift` 文件中用于演示此问题的代码。\n\n**清单 17-2.** `main.swift`\
    \ 文件的内容\n\n```\nlet ss1 = Spreadsheet();\n\nss1.setValue(Coordinate(col: \"A\"\
    , row: 1), value: 100);\n\nss1.setValue(Coordinate(col: \"J\", row: 20), value:\
    \ 200);\n\nprintln(\"SS1 Total: \\(ss1.total)\");\n\nlet ss2 = Spreadsheet();\n\
    \nss2.setValue(Coordinate(col: \"F\", row: 10), value: 200);\n\nss2.setValue(Coordinate(col:\
    \ \"G\", row: 23), value: 250);\n\nprintln(\"SS2 Total: \\(ss2.total)\");\n\n\
    println(\"Cells created: \\(ss1.grid.count + ss2.grid.count)\");\n```\n\n我创建了两个\
    \ `Spreadsheet` 对象，为不同的单元格设置值，并输出总计值。然后我输出了 `Spreadsheet` 对象维护的 `Dictionary` 集合中的\
    \ `Cell` 对象总数。运行该应用程序会产生以下输出：\n\n```\nSS1 Total: 33429\n\nSS2 Total: 33567\n\n\
    Cells created: 2600\n```\n\n对于如此简单的操作，我最终得到了大量的 `Cell` 对象，并且其中大多数仍具有实例化时分配的默认值。\n\
    \n# 理解享元模式\n\n我在上一节中创建的 2,600 个 `Cell` 对象中的每一个都需要时间来创建，也需要内存来存储。享元模式通过识别和分离相似对象之间共有的数据并共享它，来最小化对\
    \ CPU 和内存的影响，这意味着只需创建一个共享对象。图 17-1 展示了享元模式。\n\n![A978-1-4842-0394-1_17_Fig1_HTML.jpg](img/A978-1-4842-0394-1_17_Fig1_HTML.jpg)\n\
    \n**图 17-1.** 享元模式\n\n在享元模式中，调用组件是生成并依赖大量数据对象的对象。在示例项目中，调用组件是 `Spreadsheet` 对象，它们依赖\
    \ `Cell` 数据对象。\n\n该模式使用一个享元对象来管理调用组件所需的数据对象。享元对象将数据对象分为外部状态和内部状态两类。外部状态是所有调用组件共有的；内部状态是每个调用组件所独有的。\n\
    \n享元模式通过在不同享元对象之间共享外部状态，来最小化创建对象所带来的影响，这意味着所有调用组件共享同一组数据对象。由于是共享的，外部状态是不可变的，不能被享元或调用组件修改。\n\
    \n内部状态不能被共享，因此享元模式所产生的影响程度由外部状态与内部状态数据对象的比例决定。\n\n享元工厂为调用组件提供了一种获取享元对象的机制，并负责让享元对象能够访问外部状态数据。\n\
    \n# 实现享元模式\n\n我选择电子表格作为本章的示例，因为它带来了一些实现上的挑战。当创建一个新的 `Spreadsheet` 对象时，每个 `Cell`\
    \ 对象都是相同的，并且可以轻松地作为外部状态处理。在 `Spreadsheet` 上设置的每个值对该实例来说是唯一的，并成为了内部状态。我实现该模式的目标是，使从外部状态到内部状态的转换尽可能无缝且简单。\n\
    \n## 创建享元协议\n\n你不必为你的享元定义一个协议，但我喜欢这样做，因为它使得在应用程序生命周期后期引入不同的实现变得更加容易。我还发现，使用协议能让我更关注暴露给调用组件的数据，因为我必须显式地定义每个方法和属性。清单\
    \ 17-3 展示了我添加到示例项目中的 `Flyweight.swift` 文件的内容。\n\n**清单 17-3.** `Flyweight.swift`\
    \ 文件的内容\n\n```\nimport Foundation;\n\nprotocol Flyweight {\n\n    subscript(index:Coordinate)\
    \ -> Int? { get set };\n\n    var total:Int { get };\n\n    var count:Int { get\
    \ };\n\n}\n```\n\n`Spreadsheet` 类中的数据对象存储在一个 `Dictionary` 集合中，这一点在 `Flyweight`\
    \ 协议中得到了体现。我定义的下标允许使用 `Coordinate` 键来获取和设置值，而 `count` 属性将返回内部状态数据对象的数量。（需要对象数量来实现该模式，但我将在\
    \ `main.swift` 文件中使用它来说明应用该模式的效果）。\n\n我不希望使用 `Flyweight` 协议的类了解内部状态和外部状态的分离，因此我添加了一个\
    \ `total` 属性，它将用于计算内部 `Cell` 对象的 `value` 属性值的总和。\n\n## 创建享元实现类\n\n下一步是实现符合 `Flyweight`\
    \ 协议的享元实现类。这个类将负责管理内部状态数据，并由享元工厂提供对外部状态数据的访问。清单 17-4 展示了实现类的定义。\n\n**清单 17-4.**\
    \ 在 `Flyweight.swift` 文件中定义享元实现类\n\n```\nimport Foundation;\n\nprotocol Flyweight\
    \ {\n\n    subscript(index:Coordinate) -> Int? { get set };\n\n    var total:Int\
    \ { get };\n\n    var count:Int { get };\n\n}\n\nclass FlyweightImplementation\
    \ : Flyweight {\n\n    private let extrinsicData:[Coordinate: Cell];\n\n    private\
    \ var intrinsicData:[Coordinate: Cell];\n\n    private init(extrinsic:[Coordinate:\
    \ Cell]) {\n\n        self.extrinsicData = extrinsic;\n\n        self.intrinsicData\
    \ = Dictionary<Coordinate, Cell>();\n\n    }\n\n    subscript(key:Coordinate)\
    \ -> Int? {\n\n        get {\n\n            if let cell = intrinsicData[key] {\n\
    \n                return cell.value;\n\n            } else {\n\n             \
    \   return extrinsicData[key]?.value;\n\n            }\n\n        }\n\n      \
    \  set (value) {\n\n            if (value != nil) {\n\n                intrinsicData[key]\
    \ = Cell(col: key.col,\n\n                    row: key.row, val: value!);\n\n\
    \            }\n\n        }\n\n    }\n\n    var total:Int {\n\n        return\
    \ reduce(extrinsicData.values, 0, {total, cell in\n\n            if let intrinsicCell\
    \ = self.intrinsicData[cell.coordinate] {\n\n                return total + intrinsicCell.value;\n\
    \n            } else {\n\n                return total + cell.value\n\n      \
    \      }\n\n        });\n\n    }\n\n    var count:Int {\n\n        return intrinsicData.count;\n\
    \n    }\n\n}\n```\n\n> **提示:** 请注意，享元不会修改外部状态数据，也不允许调用组件修改它。这是享元模式的一个关键特征，允许修改外部状态数据是一个常见的陷阱。\n\
    \n`FlyweightImplementation` 类符合 `Flyweight` 协议，并将外部状态数据作为其初始化参数接收。内部状态数据作为外部状态数据之上的一个覆盖层，如果某个指定\
    \ `Coordinate` 没有对应的内部 `Cell`，则对值的请求会回退到外部状态数据。当设置一个新值时，会创建一个 `Cell` 对象作为内部状态数据的一部分。\n\
    \n> **注意:** 并非所有内部状态数据都必须对应于一个外部等效项。一个享元管理与其任何外部值无关的内部状态数据是完全可以接受的。话虽如此，我倾向于在调用组件中定义此类数据值，并让享元专注于那些以某种方式与外部状态数据相关的内部值。\n"
- fmt: "### Adding Concurrency Protections\n\nThe flyweight pattern doesn’t put any\
    \ limitations on how flyweight objects are used once they are obtained from the\
    \ factory. This presents the kind of concurrency risk that I have described for\
    \ other patterns; a flyweight can be shared between multiple threads, each of\
    \ which tries to modify the intrinsic data at the same time. I need to modify\
    \ the flyweight implementation class to protect against corrupting the intrinsic\
    \ data or getting inconsistent results. Listing 17-5 shows how I have used Grand\
    \ Central Dispatch (GCD) to protect the data.\n\n```\nListing 17-5. Protecting\
    \ Against Concurrency in the Flyweight.swift File\n...\nclass FlyweightImplementation\
    \ : Flyweight  {\n    private let extrinsicData:[Coordinate: Cell];\n    private\
    \ var intrinsicData:[Coordinate: Cell];\n    private let queue:dispatch_queue_t;\n\
    \    private init(extrinsic:[Coordinate: Cell]) {\n        self.extrinsicData\
    \ = extrinsic;\n        self.intrinsicData = Dictionary<Coordinate, Cell>();\n\
    \        self.queue = dispatch_queue_create(\"dataQ\", DISPATCH_QUEUE_CONCURRENT);\n\
    \    }\n    subscript(key:Coordinate) -> Int? {\n        get {\n            var\
    \ result:Int?;\n            dispatch_sync(self.queue, {() in\n               \
    \ if let cell = self.intrinsicData[key] {\n                    result = cell.value;\n\
    \                } else {\n                    result = self.extrinsicData[key]?.value;\n\
    \                }\n            });\n            return result;\n        }\n \
    \       set (value) {\n            if (value != nil) {\n                dispatch_barrier_sync(self.queue,\
    \ {() in\n                    self.intrinsicData[key] = Cell(col: key.col,\n \
    \                       row: key.row, val: value!);\n                });\n   \
    \         }\n        }\n    }\n    var total:Int {\n        var result = 0;\n\
    \        dispatch_sync(self.queue, {() in\n            result = reduce(self.extrinsicData.values,\
    \ 0, {total, cell in\n                if let intrinsicCell = self.intrinsicData[cell.coordinate]\
    \ {\n                    return total + intrinsicCell.value;\n               \
    \ } else {\n                    return total + cell.value\n                }\n\
    \            });\n        });\n        return result;\n    }\n    var count:Int\
    \ {\n        var result = 0;\n        dispatch_sync(self.queue, {() in\n     \
    \       result = self.intrinsicData.count;\n        });\n        return result;\n\
    \    }\n}\n...\n```\n\nI want to allow multiple concurrent read operations but\
    \ only one write operation at a time. I have defined a concurrent GCD queue, and\
    \ I use the `dispatch_sync` function for the read operations, meaning those that\
    \ don’t modify the intrinsic data: getting a value with the `subscript` and getting\
    \ the `total` and `count` values. When setting a value with the `subscript`, I\
    \ use the `dispatch_barrier_sync` function, which ensures that no other request\
    \ is processed while I am modifying the intrinsic data collection.\n\n### Creating\
    \ the Flyweight Factory Class\n\nThe final class that I must define is the flyweight\
    \ factory, which is used by calling components to obtain flyweights that have\
    \ access to the extrinsic data. Listing 17-6 shows the definition of the class.\n\
    \n```\nListing 17-6. Creating the Flyweight Factory Class in the Flyweight.swift\
    \ File\nimport Foundation;\n\nprotocol Flyweight {\n    subscript(index:Coordinate)\
    \ -> Int? { get set };\n    var total:Int { get };\n    var count:Int { get };\n\
    }\n\nextension Dictionary {\n    init(setupFunc:(() -> [(Key, Value)])) {\n  \
    \      self.init();\n        for item in setupFunc() {\n            self[item.0]\
    \ = item.1;\n        }\n    }\n}\n\nclass FlyweightFactory {\n    class func createFlyweight()\
    \ -> Flyweight {\n        return FlyweightImplementation(extrinsic: extrinsicData);\n\
    \    }\n    private class var extrinsicData:[Coordinate: Cell] {\n        get\
    \ {\n            struct singletonWrapper {\n                static let singletonData\
    \ = Dictionary<Coordinate, Cell> (\n                    setupFunc: {() in\n  \
    \                      var results = [(Coordinate, Cell)]();\n               \
    \         let letters:String = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\";\n             \
    \           var stringIndex = letters.startIndex;\n                        let\
    \ rows = 50;\n                        do {\n                            let colLetter\
    \ = letters[stringIndex];\n                            stringIndex = stringIndex.successor();\n\
    \                            for rowIndex in 1 ... rows {\n                  \
    \              let cell = Cell(col: colLetter, row: rowIndex,\n              \
    \                      val: rowIndex);\n                                results.append((cell.coordinate,\
    \ cell));\n                            }\n                        } while (stringIndex\
    \ != letters.endIndex);\n                        return results;\n           \
    \         }\n                );\n            }\n            return singletonWrapper.singletonData;\n\
    \        }\n    }\n}\n\nclass FlyweightImplementation : Flyweight  {\n    // ...statements\
    \ omitted for brevity...\n}\n```\n\nThe `FlyweightFactory` class defines a class\
    \ method called `createFlyweight` that returns an object that conforms to the\
    \ `Flyweight` protocol. The implementation of the `createFlyweight` creates a\
    \ `FlyweightImplementation` object and passes the extrinsic data to it as an initializer\
    \ argument. I create the extrinsic data using the singleton pattern that I described\
    \ in [Chapter 6](#A978-1-4842-0394-1_6_Chapter.html). This ensures the extrinsic\
    \ data is created in a lazy and thread-safe way.\n\nTo populate the dictionary\
    \ collection, I have defined an extension that provides an initializer that accepts\
    \ a function. The function is called to produce an array of key-value tuples that\
    \ I add to the dictionary. This approach works around the limited support that\
    \ Swift has for class variables and ensures that I can populate the dictionary\
    \ with the extrinsic data as part of the singleton initialization.\n\n### Applying\
    \ the Flyweight\n\nThe final step is to modify the `Spreadsheet` class so that\
    \ it relies on a flyweight object to manage its data, as shown in Listing 17-7.\n\
    \n```\nListing 17-7. Using a Flyweight in the Spreadsheet.swift File\nfunc ==\
    \ (lhs: Coordinate, rhs: Coordinate) -> Bool {\n    return lhs.col == rhs.col\
    \ && lhs.row == rhs.row;\n}\n\nclass Coordinate : Hashable, Printable {\n    //\
    \ ...statements omitted for brevity...\n}\n\nclass Cell {\n    // ...statements\
    \ omitted for brevity...\n}\n\nclass Spreadsheet {\n    var grid:Flyweight;\n\
    \    init() {\n        grid = FlyweightFactory.createFlyweight();\n    }\n   \
    \ func setValue(coord: Coordinate, value:Int) {\n        grid[coord] = value;\n\
    \    }\n    var total:Int {\n        return grid.total;\n    }\n}\n```\n\nThe\
    \ `Spreadsheet` class obtains a flyweight from the factory and uses it to implement\
    \ its API. Listing 17-8 shows a minor change I made to the `main.swift` file to\
    \ accurately report on the number of `Cell` objects created by taking the extrinsic\
    \ objects into account.\n\n```\nListing 17-8\\. Counting the Extrinsic Cell Objects\
    \ in the main.swift File\nlet ss1 = Spreadsheet();\nss1.setValue(Coordinate(col:\
    \ \"A\", row: 1), value: 100);\nss1.setValue(Coordinate(col: \"J\", row: 20),\
    \ value: 200);\nprintln(\"SS1 Total: \\(ss1.total)\");\n\nlet ss2 = Spreadsheet();\n\
    ss2.setValue(Coordinate(col: \"F\", row: 10), value: 200);\nss2.setValue(Coordinate(col:\
    \ \"G\", row: 23), value: 250);\nprintln(\"SS2 Total: \\(ss2.total)\");\nprintln(\"\
    Cells created: \\(1300 + ss1.grid.count + ss2.grid.count)\");\n```\n\nRunning\
    \ the application produces the following output:\n\n```\nSS1 Total: 33429\nSS2\
    \ Total: 33567\nCells created: 1304\n```\n\nUsing the flyweight pattern leverages\
    \ the same extrinsic data for each `Spreadsheet` object, and its impact increases\
    \ as the number of `Spreadsheet` objects increases."
