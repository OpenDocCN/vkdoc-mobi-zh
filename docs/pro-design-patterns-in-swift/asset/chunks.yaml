    \ URL 以及所需标头值的名称。请注意，`HttpHeaderRequest`方法返回同步结果，而不是依赖回调。远程代理对象在如何呈现其功能方面拥有广泛的自由度，我将定义一个代理对象，它隐藏了我正在使用的`Foundation`框架类是异步执行请求这一事实。\n\
    \n#### 定义代理实现类\n\n下一步是定义遵循该协议并实现访问远程对象机制的类。清单 18-3 显示了我定义的用于发出 HTTP 请求以获取响应标头值的代理类。\n\
    \n**清单 18-3.** 在 `Proxy.swift` 文件中定义实现类\n\n```swift\nimport Foundation;\n\nprotocol\
    \ HttpHeaderRequest {\n    func getHeader(url:String, header:String) -> String?;\n\
    }\n\nclass HttpHeaderRequestProxy : HttpHeaderRequest {\n    private let semaphore\
    \ = dispatch_semaphore_create(0);\n\n    func getHeader(url: String, header: String)\
    \ -> String? {\n        var headerValue:String?;\n        let nsUrl = NSURL(string:\
    \ url);\n        let request = NSURLRequest(URL: nsUrl!);\n        NSURLSession.sharedSession().dataTaskWithRequest(request,\n\
    \            completionHandler: {data, response, error in\n                if\
    \ let httpResponse = response as? NSHTTPURLResponse {\n                    headerValue\
    \ = httpResponse.allHeaderFields[header] as? NSString;\n                }\n  \
    \              dispatch_semaphore_signal(self.semaphore);\n        }).resume();\n\
    \        dispatch_semaphore_wait(self.semaphore, DISPATCH_TIME_FOREVER);\n   \
    \     return headerValue;\n    }\n}\n```\n\n`HttpHeaderRequestProxy`类遵循`HttpHeaderRequest`协议，并且是进行请求的代理。`getHeader`方法的实现使用了本章开头我曾依赖的相同的`Foundation`类，但增加了一个（现在很常见的）GCD\
    \ 信号量，这使我能够向调用组件隐藏 Cocoa 类的异步特性。\n\n**提示** 我不主张在实际项目中将异步操作隐藏在同步方法中，尤其是因为 Swift\
    \ 闭包使得编写处理异步响应的代码很容易。我在此清单中这样做的目的是为了演示，代理可以根据自己的选择，暴露实现细节的多少。\n"
- fmt: '#### Using the Remote Object Proxy


    All that remains is to update the code in the `main.swift` file to use a proxy
    object rather than making HTTP requests directly, as shown in Listing 18-4.


    Listing 18-4. Using a Proxy Object in the `main.swift` File


    ```

    import Foundation;


    let url = "http://www.apress.com";


    let headers = ["Content-Length", "Content-Encoding"];


    let proxy = HttpHeaderRequestProxy();


    for header in headers {


    if let val = proxy.getHeader(url, header:header) {


    println("\(header): \(val)");


    }


    }


    NSFileHandle.fileHandleWithStandardInput().availableData;

    ```


    The example application still makes the same number of HTTP requests, and it still
    uses the same `Foundation` classes to make those requests, but encapsulating the
    logic into a proxy means that I can make similar requests throughout the application
    without having to duplicate the implementation logic and—as you would expect by
    now—allows me to make changes to the manner in which HTTP requests are made without
    needing to make corresponding changes in the components that rely on the proxy.


    ### Implementing the Expensive Operation Proxy


    There are lots of strategies for optimizing the use of expensive resources and
    minimizing the number of expensive operations that are performed. Common examples
    include caching, lazy loading, and using other patterns such as the flyweight
    pattern I described in Chapter 17.


    The expensive operation in the example application is the HTTP request. Reducing
    the number of HTTP requests that my application makes will have a substantial
    impact; the application will be more responsive to the user, consume less bandwidth
    (which can be important if the device is using a cell network), and reduce the
    request throughput at the server.


    The obvious way to optimize the example application is to make a single request
    to service demand for multiple headers. This is a deliberately simple situation,
    but implementing it requires the same set of changes as any optimization. Listing
    18-5 shows the changes I made to the proxy protocol and implementation class.


    Listing 18-5. Optimizing HTTP Requests in the `Proxy.swift` File


    ```

    import Foundation;


    protocol HttpHeaderRequest {


    func getHeader(url:String, header:String) -> String?;


    }


    class HttpHeaderRequestProxy : HttpHeaderRequest {


    private let queue = dispatch_queue_create("httpQ", DISPATCH_QUEUE_SERIAL);


    private let semaphore = dispatch_semaphore_create(0);


    private var cachedHeaders = [String:String]();


    func getHeader(url: String, header: String) -> String? {


    var headerValue:String?;


    dispatch_sync(self.queue, {() in


    if let cachedValue = self.cachedHeaders[header] {


    headerValue = "\(cachedValue) (cached)";


    } else {


    let nsUrl = NSURL(string: url);


    let request = NSURLRequest(URL: nsUrl!);


    NSURLSession.sharedSession().dataTaskWithRequest(request,


    completionHandler: {data, response, error in


    if let httpResponse = response as? NSHTTPURLResponse {


    let headers


    = httpResponse.allHeaderFields as [String: String];


    for (name, value) in headers {


    self.cachedHeaders[name] = value;


    }


    headerValue


    = httpResponse.allHeaderFields[header] as? NSString;


    }


    dispatch_semaphore_signal(self.semaphore);


    }).resume();


    dispatch_semaphore_wait(self.semaphore, DISPATCH_TIME_FOREVER);


    }


    });


    return headerValue;


    }


    }

    ```


    The `getHeader` method creates a cache of response header values that are used
    to satisfy subsequent requests, providing a mechanism by which the number of HTTP
    requests can be reduced. Running the application shows that one of the headers
    is obtained from the values obtained from the cache:


    ```

    Content-Length: 13960

    Content-Encoding: gzip (cached)

    ```


    The changes to the `HttpHeaderRequestProxy` class rely on a GCD queue to ensure
    that one request callback is updating the dictionary of cached data when another
    callback is trying to read it.


    #### Deferring the Operation


    A common alternative implementation is to defer the execution of the expensive
    operation for as long as possible, often in the expectation that the user may
    cancel the task and the operation will not be required.


    The benefit of this approach is that the expense of the operation may be avoided,
    but the drawback is that it requires an API change so that the calling component
    can signal that the operation should begin. Listing 18-6 shows the changes that
    I made to the proxy and its protocol to defer the HTTP request.


    Listing 18-6. Deferring the HTTP Request in the `Proxy.swift` File


    ```

    import Foundation;


    protocol HttpHeaderRequest {


    init(url:String);


    func getHeader(header:String, callback:(String, String?) -> Void );


    func execute();


    }


    class HttpHeaderRequestProxy : HttpHeaderRequest {


    let url:String;


    var headersRequired:[String: (String, String?) -> Void];


    required init(url: String) {


    self.url = url;


    self.headersRequired = Dictionary<String, (String, String?) -> Void>();


    }


    func getHeader(header: String, callback: (String, String?) -> Void) {


    self.headersRequired[header] = callback;


    }


    func execute() {


    let nsUrl = NSURL(string: url);


    let request = NSURLRequest(URL: nsUrl!);


    NSURLSession.sharedSession().dataTaskWithRequest(request,


    completionHandler: {data, response, error in


    if let httpResponse = response as? NSHTTPURLResponse {


    let headers = httpResponse.allHeaderFields as [String: String];


    for (header, callback) in self.headersRequired {


    callback(header, headers[header]);


    }


    }


    }).resume();


    }


    }

    ```


    I have changed the way that the proxy is used so that calling components call
    the `getHeader` method for each header that is required, supplying a callback
    for each of them. I have exposed the asynchronous nature of the underlying classes
    that make the HTTP requests because it is a nice fit with deferring the execution
    of the request itself.


    When all of the headers and their callbacks have been registered, the `execute`
    method is called to perform the request and trigger the callbacks. If the user
    abandons the process before the `execute` method is called, then the HTTP request
    will not be performed, and the expense of the operation will not be incurred.
    The change in the `HttpHeaderRequest` protocol forces changes in the calling components,
    as shown in Listing 18-7.


    Listing 18-7. Using the Revised Protocol in the `main.swift` File


    ```

    import Foundation;


    let url = "http://www.apress.com";


    let headers = ["Content-Length", "Content-Encoding"];


    let proxy = HttpHeaderRequestProxy(url: url);


    for header in headers {


    proxy.getHeader(header, callback: {header, val in


    if (val != nil) {


    println("\(header): \(val!)");


    }


    });


    }


    proxy.execute();


    NSFileHandle.fileHandleWithStandardInput().availableData;

    ```


    Running the application produces the following output:


    ```

    Content-Encoding: gzip

    Content-Length: 13960

    ```


    ### Implementing the Access Restriction Proxy


    Proxies that restrict access to an object are defined as a wrapper around that
    object, which presents a different implementation path from the other proxy types.'
