  raw: '### Testing the Changes


    All that remains is to test the changes. Start the application and make changes
    to the stock levels of the products displayed. For each change, you will see a
    message written to the Xcode debug console, similar to the following:


    `Change: Kayak 11 items in stock`


    `Change: Lifejacket 15 items in stock`


    `Change: Soccer Ball 31 items in stock`


    `Change: Corner Flags 2 items in stock`


    It is worth taking a moment to consider the effect of the changes that I made.
    The challenge in creating a generic `Logger` class is that it is passed objects
    that may change in the future, but by implementing the prototype pattern, the
    `Logger` class is able to create clones without knowing anything about the nature
    of the objects other than their base class and—implicitly—their implementation
    of the `NSCopying` protocol.


    Tip


    Select the Debug Area ➤ Activate Console from the Xcode View menu if the console
    isn’t visible.


    Decoupling the copying of objects from the class that defines them means I can
    change the `Product` initializer or create and use subclasses without needing
    to make corresponding changes in the `Logger` class. The overall effect is to
    simplify the code in the app and make it easier to extend and maintain over time.


    ## Summary


    In this chapter, I described the prototype pattern and demonstrated how it can
    be used to create new objects without having knowledge of the class that is used
    to define them. I explained how objects can be subjected to deep and shallow copying,
    and I explained the most common pitfalls that are associated with that process.
    In the next chapter, I describe the singleton pattern, which ensures that only
    one object of a given type exists in the application.


    # 6. The Singleton Pattern


    I describe the singleton pattern in this chapter, which ensures that only one
    object of a given type exists in the application. This is one of the most commonly
    used design patterns because it solves problems that arise often, either because
    you need an object to represent a real-world resource or because you want to ensure
    that all activity of a certain kind—such as logging—is handled in a consistent
    way. Table [6-1](#A978-1-4842-0394-1_6_Chapter.html#Tab1) puts the singleton pattern
    in context.


    Table 6-1.


    Putting the Singleton Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The singleton pattern ensures that only one object of a given
    type exists in the application. |

    | What are the benefits? | The singleton pattern can be used to manage objects
    that represent real-world resources or to encapsulate a shared resource. |

    | When should you use this pattern? | The singleton pattern should be used when
    creating further objects doesn’t increase the number of real-world resources available
    or when you want to consolidate an activity such as logging. |

    | When should you avoid this pattern? | The singleton pattern isn’t useful if
    there are not multiple components that require access to a shared resource or
    if there are no objects that represent real-world resources in the application.
    |

    | How do you know when you have implemented the pattern correctly? | The pattern
    has been correctly implemented when there is only one instance of a given type
    and when that instance cannot be copied and cloned and when further instances
    cannot be created. |

    | Are there any common pitfalls? | The main pitfalls are using reference types
    (which can be copied) or classes that implement the `NSCopying` protocol (which
    can be cloned). The singleton pattern usually requires some protections against
    concurrent use, which is a common source of problems. |

    | Are there any related patterns? | The object pool pattern, which I describe
    in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html), manages a fixed number of
    objects rather than the single object handled by the singleton pattern. |


    ## Preparing the Example Project


    I created an OS X Command Line Tool project called `Singleton` for this chapter,
    following the same process I described in [Chapter 2](#A978-1-4842-0394-1_2_Chapter.html).
    No further preparation is required.


    ## Understanding the Problem That the Pattern Solves


    The singleton pattern ensures that only one object of a given type exists and
    that all components that depend on that object use the same instance. This is
    different from the prototype pattern I described in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html),
    which makes it easy to make copies of objects. By contrast, the singleton pattern
    permits the existence of just one object and prevents it from being copied.


    The problem addressed by the singleton pattern arises when you have an object
    that you don’t want duplicated throughout an application, either because it represents
    a real-world resource (such as a printer or server) or because you want to consolidate
    a set of related activities in one place. When it comes to real-world resources,
    the ability to create new objects that represent printers or servers is nonsensical
    because creating an object doesn’t magically put new hardware into place.


    Even for more abstract representations, being able to create multiple objects
    can be a problem. Listing 6-1 shows the contents of the `BackupServer.swift` file,
    which I added to the `Singleton` project.


    Listing 6-1. The Contents of the BackupServer.swift File


    `import Foundation`


    `class DataItem {`


    `enum ItemType : String {`


    `case Email = "Email Address";`


    `case Phone = "Telephone Number";`


    `case Card = "Credit Card Number";`


    `}`


    `var type:ItemType;`


    `var data:String;`


    `init(type:ItemType, data:String) {`


    `self.type = type; self.data = data;`


    `}`


    `}`


    `class BackupServer {`


    `let name:String;`


    `private var data = [DataItem]();`


    `init(name:String) {`


    `self.name = name;`


    `}`


    `func backup(item:DataItem) {`


    `data.append(item);`


    `}`


    `func getData() -> [DataItem]{`


    `return data;`


    `}`


    `}`


    I have defined a `BackupServer` class to represent a server that archives data
    items, which are represented by instances of the `DataItem` class. I don’t need
    to get into the details of creating archives to demonstrate the singleton pattern,
    so the `backup` method defined by the `BackupServer` class just appends its `DataItem`
    object to a stored instance property called `data`, which can later be accessed
    through the `getData` method. In Listing 6-2, you can see how I modified the `main.swift`
    file to use the `BackupServer` class.


    Listing 6-2. Using the BackupServer Class in the main.swift File


    `var server = BackupServer(name:"Server#1");`


    `server.backup(DataItem(type: DataItem.ItemType.Email, data: "joe@example.com"));`


    `server.backup(DataItem(type: DataItem.ItemType.Phone, data: "555-123-1133"));`


    `var otherServer = BackupServer(name:"Server#2");`


    `otherServer.backup(DataItem(type: DataItem.ItemType.Email, data: "bob@example.com"));`


    The code in the project compiles and can be executed, but it doesn’t make any
    practical sense. If the purpose of a `BackupServer` object is to represent a real-world
    backup server, then what does it mean when anyone can create a new object and
    start calling the `backup` method? Real servers are not provisioned just because
    a programmer creates a new object (although I admit that I like the sound of that),
    so the outcome is that some of the data that was backed up in Listing 6-2 won’t
    arrive at a real server and won’t be backed up. Even in the world of cloud servers,
    creating a new server instance generally requires more than instantiating a new
    Swift object.


    Put another way, the code in Listing 6-2 doesn’t make sense because an object
    that represents a real-world server can work only when it is associated with a
    server that exists and has been configured beforehand—and that means carefully
    controlling the creation of the object that does correspond to the real-world
    servers and preventing any other instances from being created.


    Tip


