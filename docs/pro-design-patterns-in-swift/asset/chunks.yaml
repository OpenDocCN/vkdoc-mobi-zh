    \            }\n        }\n        return results;\n    }\n}\n```\n\n`Peer`必须遵循`CommandPeer`协议，这既是为了辅助`Command`类的实现，也是为了能够使用`name`属性防止中介者在创建它的对象上执行命令。\n\
