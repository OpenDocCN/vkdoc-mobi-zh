- fmt: "### Creating the Authorization Source\n\nThe first step is to define a source\
    \ of authorization that will be used to check access. Separating the authorization\
    \ check from the proxy allows the proxy to adopt the API of the object it is wrapping,\
    \ which means that access can be restricted without having to propagate details\
    \ of the authorization policy throughout the application. Listing 18-8 shows the\
    \ contents of the `Auth.swift` file that I added to the example project.\n\n**Listing\
    \ 18-8.** The Contents of the `Auth.swift` File\n\n```swift\nclass UserAuthentication\
    \ {\n\n    var user:String?;\n\n    var authenticated:Bool = false;\n\n    private\
    \ init() {\n        // do nothing - stops instances being created\n    }\n\n \
    \   func authenticate(user:String, pass:String) {\n        if (pass == \"secret\"\
    ) {\n            self.user = user;\n            self.authenticated = true;\n \
    \       } else {\n            self.user = nil;\n            self.authenticated\
    \ = false;\n        }\n    }\n\n    class var sharedInstance:UserAuthentication\
    \ {\n        get {\n            struct singletonWrapper {\n                static\
    \ let singleton = UserAuthentication();\n            }\n            return singletonWrapper.singleton;\n\
    \        }\n    }\n}\n```\n\nThe `UserAuthentication` class uses the singleton\
    \ pattern to provide a simple mechanism for authenticating users—so simple, in\
    \ fact, that any user who provides the password `simple` will be authenticated.\
    \ In a real project, authentication is typically handled by a remote service,\
    \ which may itself have its own proxy. For this example, any authenticated user\
    \ is authorized to make HTTP requests.\n\n### Creating the Proxy Object\n\nThe\
    \ next step is to define the proxy object so that it can be used as a seamless\
    \ replacement for the object it wraps but with the enforcement of the authorization\
    \ policy, as shown in Listing 18-9.\n\n**Listing 18-9.** Defining the Access Restriction\
    \ Proxy Class in the `Proxy.swift` File\n\n```swift\nimport Foundation;\n\nprotocol\
    \ HttpHeaderRequest {\n    init(url:String);\n    func getHeader(header:String,\
    \ callback:(String, String?) -> Void );\n    func execute();\n}\n\nclass AccessControlProxy\
    \ : HttpHeaderRequest {\n    private let wrappedObject: HttpHeaderRequest;\n\n\
    \    required init(url:String) {\n        wrappedObject = HttpHeaderRequestProxy(url:\
    \ url);\n    }\n\n    func getHeader(header: String, callback: (String, String?)\
    \ -> Void) {\n        wrappedObject.getHeader(header, callback: callback);\n \
    \   }\n\n    func execute() {\n        if (UserAuthentication.sharedInstance.authenticated)\
    \ {\n            wrappedObject.execute();\n        } else {\n            fatalError(\"\
    Unauthorized\");\n        }\n    }\n}\n\nprivate class HttpHeaderRequestProxy\
    \ : HttpHeaderRequest {\n    let url:String;\n    var headersRequired:[String:\
    \ (String, String?) -> Void];\n    // ...methods omitted for brevity...\n}\n```\n\
    \nThe `AccessControlProxy` class conforms to the `HttpHeaderRequest` protocol\
    \ and is a wrapper around an instance of the `HttpHeaderRequestProxy` class (there\
    \ is no prohibition against proxies being used as stand-ins for objects that are\
    \ themselves proxies). The `AccessControlProxy` implementation of the `execute`\
    \ method calls the `UserAuthentication` class to determine whether value credentials\
    \ have been provided. If the user has been authenticated, then the `execute` method\
    \ of the wrapped object is called, and the `fatalException` method is called otherwise.\n\
    \n> **Tip**  \n> Notice that I have applied the `private` keyword to the `HttpHeaderRequestProxy`\
    \ class. There is no point implementing access restrictions if the proxy can be\
    \ bypassed by creating an instance of the underlying class.\n\n### Applying the\
    \ Proxy\n\nThe final step is to update the calling components so they use the\
    \ new proxy class. In a real project, I would typically provide a factory method\
    \ to hide the details of the proxy class from the calling components (as described\
    \ in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html)), but for this example I\
    \ am going to instantiate the proxy directly, as shown in Listing 18-10.\n\n**Listing\
    \ 18-10.** Using the Access Restriction Proxy in the `main.swift` File\n\n```swift\n\
    import Foundation;\n\nlet url = \"http://www.apress.com\";\nlet headers = [\"\
    Content-Length\", \"Content-Encoding\"];\n\nlet proxy = AccessControlProxy(url:\
    \ url);\n\nfor header in headers {\n    proxy.getHeader(header, callback: {header,\
    \ val in\n        if (val != nil) {\n            println(\"\\(header): \\(val!)\"\
    );\n        }\n    });\n}\n\nUserAuthentication.sharedInstance.authenticate(\"\
    bob\", pass: \"secret\");\nproxy.execute();\n\nNSFileHandle.fileHandleWithStandardInput().availableData;\n\
    ```\n\nNotice that I provide the user credentials before calling the `execute`\
    \ method. In a real project, the credentials are typically obtained from the user\
    \ when the application first starts, and the authentication/authorization status\
    \ is unknown to the components that need to perform restricted operations."
  raw: '#### Creating the Authorization Source


    The first step is to define a source of authorization that will be used to check
    access. Separating the authorization check from the proxy allows the proxy to
    adopt the API of the object it is wrapping, which means that access can be restricted
    without having to propagate details of the authorization policy throughout the
    application. Listing 18-8 shows the contents of the `Auth.swift` file that I added
    to the example project.


    Listing 18-8. The Contents of the Auth.swift File


    `class UserAuthentication {`


    `var user:String?;`


    `var authenticated:Bool = false;`


    `private init() {`


    `// do nothing - stops instances being created`


    `}`


    `func authenticate(user:String, pass:String) {`


    `if (pass == "secret") {`


    `self.user = user;`


    `self.authenticated = true;`


    `} else {`


    `self.user = nil;`


    `self.authenticated = false;`


    `}`


    `}`


    `class var sharedInstance:UserAuthentication {`


    `get {`


    `struct singletonWrapper {`


    `static let singleton = UserAuthentication();`


    `}`


    `return singletonWrapper.singleton;`


    `}`


    `}`


    `}`


    The `UserAuthentication` class uses the singleton pattern to provide a simple
    mechanism for authenticating users—so simple, in fact, that any user who provides
    the password `simple` will be authenticated. In a real project, authentication
    is typically handled by a remote service, which may itself have its own proxy.
    For this example, any authenticated user is authorized to make HTTP requests.


    #### Creating the Proxy Object


    The next step is to define the proxy object so that it can be used as a seamless
    replacement for the object it wraps but with the enforcement of the authorization
    policy, as shown in Listing 18-9.


    Listing 18-9. Defining the Access Restriction Proxy Class in the Proxy.swift File


    `import Foundation;`


    `protocol HttpHeaderRequest {`


    `init(url:String);`


    `func getHeader(header:String, callback:(String, String?) -> Void );`


    `func execute();`


    `}`


    `class AccessControlProxy : HttpHeaderRequest {`


    `private let wrappedObject: HttpHeaderRequest;`


    `required init(url:String) {`


    `wrappedObject = HttpHeaderRequestProxy(url: url);`


    `}`


    `func getHeader(header: String, callback: (String, String?) -> Void) {`


    `wrappedObject.getHeader(header, callback: callback);`


    `}`


    `func execute() {`


    `if (UserAuthentication.sharedInstance.authenticated) {`


    `wrappedObject.execute();`


    `} else {`


    `fatalError("Unauthorized");`


    `}`


    `}`


    `}`


    `private class HttpHeaderRequestProxy : HttpHeaderRequest {`


    `let url:String;`


    `var headersRequired:[String: (String, String?) -> Void];`


    `//` `...methods omitted for brevity...`


    `}`


    The `AccessControlProxy` class conforms to the `HttpHeaderRequest` protocol and
    is a wrapper around an instance of the `HttpHeaderRequestProxy` class (there is
    no prohibition against proxies being used as stand-ins for objects that are themselves
    proxies). The `AccessControlProxy` implementation of the `execute` method calls
    the `UserAuthentication` class to determine whether value credentials have been
    provided. If the user has been authenticated, then the `execute` method of the
    wrapped object is called, and the `fatalException` method is called otherwise.


    Tip


    Notice that I have applied the `private` keyword to the `HttpHeaderRequestProxy`
    class. There is no point implementing access restrictions if the proxy can be
    bypassed by creating an instance of the underlying class.


    #### Applying the Proxy


    The final step is to update the calling components so they use the new proxy class.
    In a real project, I would typically provide a factory method to hide the details
    of the proxy class from the calling components (as described in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html)),
    but for this example I am going to instantiate the proxy directly, as shown in
    Listing 18-10.


    Listing 18-10. Using the Access Restriction Proxy in the main.swift File


    `import Foundation;`


    `let url = "` [`http://www.apress.com`](http://www.apress.com/) `";`


    `let headers = ["Content-Length", "Content-Encoding"];`


    `let proxy = AccessControlProxy(url: url);`


    `for header in headers {`


    `proxy.getHeader(header, callback: {header, val in`


    `if (val != nil) {`


    `println("\(header): \(val!)");`


    `}`


    `});`


    `}`


    `UserAuthentication.sharedInstance.authenticate("bob", pass: "secret");`


    `proxy.execute();`


    `NSFileHandle.fileHandleWithStandardInput().availableData;`


    Notice that I provide the user credentials before calling the `execute` method.
    In a real project, the credentials are typically obtained from the user when the
    application first starts, and the authentication/authorization status is unknown
    to the components that need to perform restricted operations.'
  trans: "\n### 创建授权源\n\n第一步是定义一个用于检查访问权限的授权源。将授权检查与代理分离，使得代理能够采用其所包装对象的 API，这意味着可以在无需将授权策略的细节传播到整个应用程序的情况下限制访问。代码清单\
    \ 18-8 展示了我添加到示例项目中的`Auth.swift`文件的内容。\n\n**代码清单 18-8.** `Auth.swift`文件的内容\n\n\
    ```swift\nclass UserAuthentication {\n\n    var user:String?;\n\n    var authenticated:Bool\
    \ = false;\n\n    private init() {\n        // 不执行任何操作 - 阻止实例被创建\n    }\n\n  \
    \  func authenticate(user:String, pass:String) {\n        if (pass == \"secret\"\
    ) {\n            self.user = user;\n            self.authenticated = true;\n \
    \       } else {\n            self.user = nil;\n            self.authenticated\
    \ = false;\n        }\n    }\n\n    class var sharedInstance:UserAuthentication\
    \ {\n        get {\n            struct singletonWrapper {\n                static\
    \ let singleton = UserAuthentication();\n            }\n            return singletonWrapper.singleton;\n\
    \        }\n    }\n}\n```\n\n`UserAuthentication`类使用单例模式提供了一种简单的用户认证机制——事实上，如此简单以至于任何密码为`simple`的用户都将通过认证。在实际项目中，认证通常由远程服务处理，而该服务本身可能也有自己的代理。在本示例中，任何通过认证的用户都被授权发送\
    \ HTTP 请求。\n\n### 创建代理对象\n\n下一步是定义代理对象，使其可以作为所包装对象的无缝替代品，同时强制实施授权策略，如代码清单 18-9\
    \ 所示。\n\n**代码清单 18-9.** 在`Proxy.swift`文件中定义访问限制代理类\n\n```swift\nimport Foundation;\n\
    \nprotocol HttpHeaderRequest {\n    init(url:String);\n    func getHeader(header:String,\
    \ callback:(String, String?) -> Void );\n    func execute();\n}\n\nclass AccessControlProxy\
    \ : HttpHeaderRequest {\n    private let wrappedObject: HttpHeaderRequest;\n\n\
    \    required init(url:String) {\n        wrappedObject = HttpHeaderRequestProxy(url:\
    \ url);\n    }\n\n    func getHeader(header: String, callback: (String, String?)\
    \ -> Void) {\n        wrappedObject.getHeader(header, callback: callback);\n \
    \   }\n\n    func execute() {\n        if (UserAuthentication.sharedInstance.authenticated)\
    \ {\n            wrappedObject.execute();\n        } else {\n            fatalError(\"\
    Unauthorized\");\n        }\n    }\n}\n\nprivate class HttpHeaderRequestProxy\
    \ : HttpHeaderRequest {\n    let url:String;\n    var headersRequired:[String:\
    \ (String, String?) -> Void];\n    // ...为简洁起见省略了方法...\n}\n```\n\n`AccessControlProxy`类遵循`HttpHeaderRequest`协议，并包装了`HttpHeaderRequestProxy`类的一个实例（代理可以被用作其他代理对象的替代品，这并不违反规定）。`AccessControlProxy`对`execute`方法的实现调用了`UserAuthentication`类以判断是否提供了有效的凭据。如果用户已通过认证，则调用被包装对象的`execute`方法；否则调用`fatalException`方法。\n\
    \n> **提示**  \n> 请注意我对`HttpHeaderRequestProxy`类应用了`private`关键字。如果可以通过创建底层类的实例来绕过代理，那么实施访问限制就毫无意义。\n\
    \n### 应用代理\n\n最后一步是更新调用组件，使其使用新的代理类。在实际项目中，我通常会提供一个工厂方法来向调用组件隐藏代理类的细节（如第 9 章所述），但在本例中，我将直接实例化代理，如代码清单\
    \ 18-10 所示。\n\n**代码清单 18-10.** 在`main.swift`文件中使用访问限制代理\n\n```swift\nimport Foundation;\n\
    \nlet url = \"http://www.apress.com\";\nlet headers = [\"Content-Length\", \"\
    Content-Encoding\"];\n\nlet proxy = AccessControlProxy(url: url);\n\nfor header\
    \ in headers {\n    proxy.getHeader(header, callback: {header, val in\n      \
    \  if (val != nil) {\n            println(\"\\(header): \\(val!)\");\n       \
    \ }\n    });\n}\n\nUserAuthentication.sharedInstance.authenticate(\"bob\", pass:\
    \ \"secret\");\nproxy.execute();\n\nNSFileHandle.fileHandleWithStandardInput().availableData;\n\
    ```\n\n请注意，我是在调用`execute`方法之前提供用户凭据的。在实际项目中，凭据通常是在应用程序首次启动时由用户提供，而执行受限操作的组件并不知晓认证/授权状态。\n"
- fmt: '## Variations on the Proxy Pattern


    Proxy classes can be used to perform reference counting, which can be useful when
    resources require active management and where you need to perform an action of
    some sort when a specific number of references is reached, typically zero. To
    demonstrate this kind of proxy, I created another Xcode OS X Command Line project
    called `ReferenceCounting`. I added a file called `NetworkRequest.swift` to the
    project and used it to define the types shown in Listing 18-11.


    **Listing 18-11.** The Contents of the `NetworkRequest.swift` File


    ```

    import Foundation;


    protocol NetworkConnection {


    func connect();


    func disconnect();


    func sendCommand(command:String);


    }


    class NetworkConnectionFactory {


    class func createNetworkConnection() -> NetworkConnection {


    return NetworkConnectionImplementation();


    }


    }


    private class NetworkConnectionImplementation : NetworkConnection {


    typealias me = NetworkConnectionImplementation;


    func connect() { me.writeMessage("Connect"); }


    func disconnect() { me.writeMessage("Disconnect"); }


    func sendCommand(command:String) {


    me.writeMessage("Command: \(command)");


    NSThread.sleepForTimeInterval(1);


    me.writeMessage("Command completed: \(command)");


    }


    private class func writeMessage(msg:String) {


    dispatch_async(self.queue, {() in


    println(msg);


    });


    }


    private class var queue:dispatch_queue_t {


    get {


    struct singletonWrapper {


    static let singleton = dispatch_queue_create("writeQ",


    DISPATCH_QUEUE_SERIAL);


    }


    return singletonWrapper.singleton;


    }


    }


    }

    ```


    The `NetworkConnection` protocol defines the methods that are used to operate
    on a network connection to a hypothetical server. The `connect` method is called
    to establish a connection, the `sendCommand` connection is used to send work to
    the server, and the `disconnect` method is used to close the connection when the
    work is done.


    The `NetworkConnectionImplementation` class conforms to the protocol and implements
    the methods by writing messages to the debug console. I have used the singleton
    pattern to define a GCD queue that is shared between all instances of the class
    so that messages written to the console are not corrupted when two objects write
    at the same time. The implementation of the `sendCommand` method incurs a one-second
    delay to simulate the server executing the command it has been sent.


    I have used the factory method pattern to provide access to instances of the `NetworkConnectionImplementation`
    class, which is annotated with the `private` keyword and is inaccessible outside
    of the file in which it is defined. Listing 18-12 shows the statements I added
    to the `main.swift` file to create several simultaneous network requests.


    **Listing 18-12.** The Contents of the `main.swift` File


    ```

    import Foundation;


    let queue = dispatch_queue_create("requestQ", DISPATCH_QUEUE_CONCURRENT);


    for count in 0 ..< 3 {


    let connection = NetworkConnectionFactory.createNetworkConnection();


    dispatch_async(queue, {() in


    connection.connect();


    connection.sendCommand("Command: \(count)");


    connection.disconnect();


    });


    }


    NSFileHandle.fileHandleWithStandardInput().availableData;

    ```


    I create three network requests, and on each of them I call the `connect` method
    to establish the connection, call the `sendCommand` method to send a job to the
    server, and then call the `disconnection` method. Running the application will
    produce results similar to the following:


    ```

    Connect

    Connect

    Connect

    Command: Command: 0

    Command: Command: 1

    Command: Command: 2

    Command completed: Command: 0

    Command completed: Command: 1

    Command completed: Command: 2

    Disconnect

    Disconnect

    Disconnect

    ```


    You may see slightly different results because the connections may be processed
    in a different order. The important point to note from the output is that the
    network connections overlap and that a separate connection is used for each command
    that is sent to the server.


    ### Implementing a Reference Counting Proxy


    In this situation, a reference counting proxy can be used to manage the life cycle
    of a network connection so that it can be used to service multiple requests. Listing
    18-13 shows the definition of the proxy class.


    **Listing 18-13.** Defining a Reference Counting Proxy in the `NetworkRequest.swift`
    File


    ```

    import Foundation;


    protocol NetworkConnection {


    func connect();


    func disconnect();


    func sendCommand(command:String);


    }


    class NetworkConnectionFactory {


    class func createNetworkConnection() -> NetworkConnection {


    return connectionProxy;


    }


    private class var connectionProxy:NetworkConnection {


    get {


    struct singletonWrapper {


    static let singleton = NetworkRequestProxy();


    }


    return singletonWrapper.singleton;


    }


    }


    }


    private class NetworkConnectionImplementation : NetworkConnection {


    typealias me = NetworkConnectionImplementation;


    // ...methods omitted for brevity...


    }


    class NetworkRequestProxy : NetworkConnection {


    private let wrappedRequest:NetworkConnection;


    private let queue = dispatch_queue_create("commandQ", DISPATCH_QUEUE_SERIAL);


    private var referenceCount:Int = 0;


    private var connected = false;


    init() {


    wrappedRequest = NetworkConnectionImplementation();


    }


    func connect() { /* do nothing */ }


    func disconnect() { /* do nothing */ }


    func sendCommand(command: String) {


    self.referenceCount++;


    dispatch_sync(self.queue, {() in


    if (!self.connected && self.referenceCount > 0) {


    self.wrappedRequest.connect();


    self.connected = true;


    }


    self.wrappedRequest.sendCommand(command);


    self.referenceCount--;


    if (self.connected && self.referenceCount == 0) {


    self.wrappedRequest.disconnect();


    self.connected = false;


    }


    });


    }


    }

    ```


    I have revised the factory method class so that it uses the singleton pattern
    to return a shared instance of the `NetworkRequestProxy` class. The `NetworkRequestProxy`
    class conforms to the `NetworkRequest` protocol and is a wrapper around a `NetworkConnectionImplementation`
    object.


    The goal with this kind of reference counting proxy is to take the control of
    the `connect` and `disconnect` methods away from the calling components and keep
    a connection open for as long as there are pending commands to be sent. I have
    used a serial GCD queue to ensure that only one command is processed at a time
    and to ensure that the reference counting is not affected by multiple concurrent
    accesses. Running the application will produce output similar to the following:


    ```

    Connect

    Command: Command: 0

    Command completed: Command: 0

    Command: Command: 1

    Command completed: Command: 1

    Command: Command: 2

    Command completed: Command: 2

    Disconnect

    ```


    The commands are now processed serially over a single connection, reflected in
    the fact that there is one `Connect` and one `Disconnect` message. This kind of
    proxy trades one kind of expensive operation for another. Without the proxy, the
    expense is the number of concurrent requests and the demand this puts on the client,
    the network, and the server. The proxy reduces the request concurrency, but it
    serializes the commands sent to the server, which means that the combined workload
    takes longer to perform. The overall effect is to trade bandwidth and server capacity
    for the user’s time.'
