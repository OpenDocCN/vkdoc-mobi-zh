    \ `stockBackingValue`），而 setter 则使用标准库中的 `max` 函数，在尝试用负值设置该属性时，将支撑值设为零。这一修改的效果是，「Product」类的公开部分和私有部分都发生了变化，但这种变化不会影响使用该类的代码，如图\
