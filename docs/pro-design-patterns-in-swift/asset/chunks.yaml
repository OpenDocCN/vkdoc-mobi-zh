    ## Summary


    In this chapter I showed you how the façade pattern can be used to hide complex
    APIs and the coordination between objects required to perform a task. The façade
    presents a simplified API, which is consumed by calling components, and the effect
    is to consolidate the complexity into a single class. The façade pattern can be
    used to create opaque and transparent facades, which take different approaches
    to the way that the underlying complexity is made available. Opaque façades hide
    all of the complexity, while transparent façades allow calling components to access
    some or all of the underlying objects to perform advanced tasks. In the next chapter,
    I describe the flyweight pattern, which allows data to be shared between objects
    to reduce the memory footprint of an application.


    # 17. The Flyweight Pattern


    The flyweight pattern is applied when a number of similar objects all rely on
    the same set of data values. Rather than create a new set of data valued for each
    of the objects, the flyweight pattern shares one set between all of them, minimizing
    the amount of memory required to store the data and the amount of work required
    to create them. Table [17-1](#A978-1-4842-0394-1_17_Chapter.html#Tab1) puts the
    flyweight pattern into context.


    Table 17-1.


    Putting the Flyweight Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The flyweight pattern shares common data objects between multiple
    calling components. |

    | What are the benefits? | The flyweight pattern reduces the amount of memory
    needed to create the data objects required by the calling components and the amount
    of work required to create them. The impact of implementing the pattern increases
    with the number of calling components that share the data. |

    | When should you use this pattern? | Use this pattern when you are able to identify
    and isolate sets of identical data objects that are used by calling components.
    |

    | When should you avoid this pattern? | Do not use this pattern if there is no
    shared data or if the number of shared data objects is small and easy to create.
    |

    | How do you know when you have implemented the pattern correctly? | The pattern
    has been implemented correctly when all of the calling components rely on the
    same set of immutable shared data objects (known as the extrinsic data) and have
    their own individual state data (known as the intrinsic data). The calling components
    should be able to concurrently modify the intrinsic data safely and not be able
    to modify the extrinsic data at all. |

    | Are there any common pitfalls? | The common pitfalls include inadvertently creating
    more than one set of extrinsic data objects, not protecting against concurrent
    operations on the intrinsic data, allowing the extrinsic data to be modified,
    and over-optimizing the creation of extrinsic objects. |

    | Are there any related patterns? | Many of the structural patterns have similar
    implementations but different intents. Ensure that you select the correct pattern
    from the ones I describe in this part of the book. |


