    \                    }\n                    break;\n                }\n      \
    \      }\n        }\n        displayStockTotal();\n    }\n\n    // ...为简洁起见，省略部分代码...\n\
    }\n```\n\n### 本章小结\n\n在本章中，我描述了单例模式，并解释了如何使用它来确保应用程序中只有一个特定类型的对象。单例模式易于理解，但需要仔细关注才能正确实现，尤其是在确保代码对并发使用安全方面。在下一章中，我将描述对象池模式，它与单例模式共享一些共同思想，但作用于同一类型的多个对象。\n"
- fmt: '# 7. The Object Pool Pattern


    The object pool pattern is a variation on the singleton pattern that provides
    access to multiple identical objects rather than a single instance. This is useful
    when you have objects that represent a set of fungible resources, each of which
    can be used by only one component at a time. In this chapter, I describe the basic
    object pool pattern, and in [Chapter 8](#A978-1-4842-0394-1_8_Chapter.html) I
    show you some useful variations that allow object pools to adapt to different
    situations. Table [7-1](#A978-1-4842-0394-1_7_Chapter.html#Tab1) puts the object
    pool pattern in context.


    **Table 7-1.** Putting the Object Pool Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The object pool pattern manages a collection of reusable objects
    that are provided to calling components. A component obtains an object from the
    pool, uses it to perform work, and returns it to the pool so that it can be allocated
    to satisfy future requests. An object that has been allocated to a caller is not
    available for use by other components until it has been returned to the pool.
    |

    | What are the benefits? | The object pool pattern hides the construction of objects
    from the components that use them and allows expensive initializations to be amortized
    through reusing objects repeatedly. |

    | When should you use this pattern? | Use the object pool pattern when you have
    a number of identical objects whose creation you need to manage, either because
    the objects represent real-world resources or because creating new instances is
    expensive. |

    | When should you avoid this pattern? | Do not use this pattern if there can be
    only one object in existence at any moment (use the singleton pattern instead)
    or if there are no limits on the number of objects that can exist (allow calling
    components to create their own instances or use one of the other patterns described
    in this book, such as the factory method pattern). |

    | How do you know when you have implemented the pattern correctly? | The pattern
    is implemented correctly when objects are allocated to calling components without
    the need to create new instances and when an object returned to the pool is used
    to satisfy a subsequent request. |

    | Are there any common pitfalls? | The main pitfall is the implementation of concurrency
    protections that ensure that objects are allocated correctly and without corrupting
    the data structures used to implement the pattern. |

    | Are there any related patterns? | The singleton pattern shares some common ideas
    with the object pool pattern but manages a single object. |


    ## Preparing the Example Project


    For this chapter, I created an OS X Command Line Tool project called `ObjectPool`.
    No further preparation is required.


    ## Understanding the Problem That the Pattern Solves


    In many projects, there will be objects for which the number of instances must
    be restricted but not to the extent where there is just one. To help put this
    problem into a real-world context, I am going to create an example that represents
    the system used by a library to track books. Listing 7-1 shows the contents of
    a file called `Book.swift` that I added to the example project.


    **Listing 7-1.** The Contents of the `Book.swift` File


    ```

    class Book {


    let author:String;


    let title:String;


    let stockNumber:Int;


    var reader:String?


    var checkoutCount = 0;


    init(author:String, title:String, stock:Int) {


    self.author = author;


    self.title = title;


    self.stockNumber = stock;


    }


    }

    ```


    In a system that tracks library books, the creation or cloning of `Book` objects
    won''t magically create real-world books in the library, but equally, it doesn''t
    make sense to manage a `Book` using the singleton pattern because a library will
    have more than one copy of most books, any of which can be used to satisfy someone''s
    desire to read it.


    Each book in a library can be checked out by only one reader at a time and is
    not available for further use until it is returned. Readers can check books out
    immediately when they are in stock, but once the stock is exhausted, anyone who
    wants a copy will have to wait until one is returned or the library adds more
    books to its collection.


    The problem I face is I need a pattern that manages a number of identical, interchangeable
    objects and provides the model by which they can be fairly and equitably used.


    **Tip:** Library books are a real-world example of groups of objects that are
    reusable and interchangeable, but there are also abstract examples that you will
    encounter in software development. The most common examples include threads and
    network connections, but this is a problem that manifests itself with some frequency
    and in a variety of ways.


    ## Understanding the Object Pool Pattern


    The object pool pattern manages a collection of fungible objects, known as the
    object pool—or just the pool. Components that need an object borrow one from the
    pool, use it to perform some work, and then return it to the pool when the work
    has been completed. Returned objects are then used to satisfy subsequent requests,
    either from the same component or from another component.


    The object pool pattern can be used to manage objects that represent real-world
    resources and also to amortize expensive initialization procedures by reusing
    objects to satisfy requests from multiple components.


    An object pool has four important operations, as illustrated by Figure [7-1](#A978-1-4842-0394-1_7_Chapter.html#Fig1).
    The first operation is initialization, in which the collection of objects to be
    managed is prepared.


    The second operation is checkout, in which a component that requires an object
    borrows one from the pool.


    The third operation is the component using the object to perform work of some
    sort. This doesn''t require any activity from the pool, but it does mean that
    there is a period where an object managed by the pool is in use and cannot be
    loaned to other components.


    The fourth and final operation is check-in, where the component returns the object
    to the pool so that it can be used to satisfy future loan requests.


    ![A978-1-4842-0394-1_7_Fig1_HTML.jpg](A978-1-4842-0394-1_7_Fig1_HTML.jpg)


    **Figure 7-1.** The basic operation of an object pool


    In a multithreaded application, the second, third, and fourth operations may happen
    concurrently. Sharing objects between multiple components presents potential concurrency
    problems. Two or more components may ask to borrow or return objects simultaneously,
    and object pools must ensure that each request for a loan is satisfied with a
    different object when checked out and that objects are not lost when they are
    checked in again.


    There will also be times when a request cannot be immediately satisfied because
    all of the objects in the pool have been checked out and are being used. A pool
    must be able to cope with these requests, either by indicating to the component
    that no object is available or by allowing the component to wait until an object
    is returned.


    ## Implementing the Object Pool Pattern


    In this chapter, I create a basic implementation of the pattern to demonstrate
    how the different operations are implemented. A basic object pool manages a fixed
    collection of objects and relies on the components that check objects out of the
    pool to return them when they are done. It is a good place to start because it
    allows me to address the basic concurrency techniques that are at the heart of
    a robust implementation of the pattern. In [Chapter 8](#A978-1-4842-0394-1_8_Chapter.html),
    I show you variations on the pattern that you can use to adapt the basic pool
    to your own projects.'
