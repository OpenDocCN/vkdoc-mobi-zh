- fmt: "### Understanding the Notification Object Pitfall\n\nThe changes seem modest,\
    \ but there is a potential pitfall when applying this variation. The observers\
    \ have to know what data type to expect to be associated with a notification,\
    \ and the subjects have to honor that expectation.\n\nIn the case of the example\
    \ application, the subject — the `AuthenticationManager` class — sends the name\
    \ of the user who has requested authentication expressed as a `String` value,\
    \ and the observers have to know what type the subject uses and, as importantly,\
    \ what that value means. The pitfall arises when two subjects use the same notification\
    \ types with different data types or — more dangerously — use the same data type\
    \ but intend the value to express different meanings.\n\nThe surest way of avoiding\
    \ this problem is to define subclasses for each notification that refine the meaning\
    \ of the associated data value. This is not a guarantee against deliberate misuse,\
    \ but it does guard against accidental problems. Listing 22-12 shows how I have\
    \ defined a notification subclass in the example application.\n\n**Listing 22-12.** Defining\
    \ a Notification Subclass in the `Observers.swift` File\n\n```\nimport Foundation;\n\
    \nenum NotificationTypes : String {\n  case AUTH_SUCCESS = \"AUTH_SUCCESS\";\n\
    \  case AUTH_FAIL = \"AUTH_FAIL\";\n  case SUBJECT_CREATED = \"SUBJECT_CREATE\"\
    ;\n  case SUBJECT_DESTROYED = \"SUBJECT_DESTROYED\";\n}\n\nclass Notification\
    \ {\n  let type:NotificationTypes;\n  let data:Any?;\n  init(type:NotificationTypes,\
    \ data:Any?) {\n    self.type = type; self.data = data;\n  }\n}\n\nclass AuthenticationNotification:\
    \ Notification {\n  init(user:String, success:Bool) {\n    super.init(type: success\
    \ ? NotificationTypes.AUTH_SUCCESS\n      : NotificationTypes.AUTH_FAIL, data:\
    \ user);\n  }\n  var userName : String? {\n    return self.data? as String?;\n\
    \  }\n  var requestSuccessed : Bool {\n    return self.type == NotificationTypes.AUTH_SUCCESS;\n\
    \  }\n}\n\nprotocol Observer : class {\n  func notify(notification:Notification);\n\
    }\n\nprotocol Subject {\n  func addObservers(observers:Observer...);\n  func removeObserver(observer:Observer);\n\
    }\n\nclass SubjectBase : Subject {\n  // ...statements omitted for brevity...\n\
    }\n```\n\nI have changed `Notification` from a `struct` to a class so that I can\
    \ derive the `AuthenticationNotification` class from it and define computed properties\
    \ that present the property values in a more useful manner.\n\nYou can create\
    \ more specialized versions of the `Observer` protocol that deliver only notification-specific\
    \ objects, but I find that implementation classes that receive multiple notification\
    \ types from multiple subjects quickly become complex to implement and test. Instead,\
    \ I prefer to use a general-purpose `Observer` protocol and have the implementation\
    \ classes test to see which types they receive, as shown in Listing 22-13.\n\n\
    **Listing 22-13.** Receiving a Notification-Specific Object in the `SystemComponents.swift`\
    \ File\n\n```\n...\nclass FileCache : Observer {\n  func notify(notification:Notification)\
    \ {\n    if let authNotification = notification as? AuthenticationNotification\
    \ {\n      if (authNotification.requestSuccessed && authNotification.userName\
    \ != nil) {\n        loadFiles(authNotification.userName!);\n      }\n    }\n\
    \  }\n  func loadFiles(user:String) {\n    println(\"Load files for \\(user)\"\
    );\n  }\n}\n...\n```\n\nThis approach means that any observer can still receive\
    \ any notification through a single method but can opt to check for more specialized\
    \ types and take advantage of them as required. The other two classes in the `SystemComponents.swift`\
    \ file do not check for the `AuthenticationNotification` type, but they are still\
    \ perfectly able to receive and process the notifications sent by the authentication\
    \ manager class.\n\n### Dealing with Short-Lived Subjects\n\nThe standard implementation\
    \ of the observer pattern assumes that an application reaches a sort of steady\
    \ state, in which the observer and subject objects have been created and associated\
    \ with one another, allowing a steady flow of notifications for the life of the\
    \ application.\n\nThis isn’t always the case, of course, and a common variation\
    \ is to adapt the pattern so that observers automatically receive notifications\
    \ from subjects that have a relatively short life. In this situation, it is helpful\
    \ to arrange for observers to be notified when a new subject has been created.\
    \ The way I manage this situation is to combine the observer pattern with the\
    \ mediator pattern I described in [Chapter 21](#A978-1-4842-0394-1_21_Chapter.html).\
    \ The mediator provides a handy mechanism through which subjects can notify observers\
    \ that they have been created — a kind of meta-observer pattern. The first step\
    \ is to define two new types of notification, which I will use to indicate when\
    \ a subject is created and destroyed, as shown in Listing 22-15.\n\n**Listing\
    \ 22-15.** Defining New Notification Types in the `Observer.swift` File\n\n```\n\
    ...\nenum NotificationTypes : String {\n  case AUTH_SUCCESS = \"AUTH_SUCCESS\"\
    ;\n  case AUTH_FAIL = \"AUTH_FAIL\";\n  case SUBJECT_CREATED = \"SUBJECT_CREATE\"\
    ;\n  case SUBJECT_DESTROYED = \"SUBJECT_DESTROYED\";\n}\n...\n```\n\nListing 22-16\
    \ shows the contents of the `MetaObserver.swift` file that I added to the example\
    \ project and that I used to define the protocol and classes required to handle\
    \ short-lived subjects automatically.\n\n**Listing 22-16.** The Contents of the\
    \ `MetaObserver.swift` File\n\n```\nprotocol MetaObserver : Observer {\n  func\
    \ notifySubjectCreated(subject:Subject);\n  func notifySubjectDestroyed(subject:Subject);\n\
    }\n\nclass MetaSubject : SubjectBase, MetaObserver {\n  func notifySubjectCreated(subject:\
    \ Subject) {\n    sendNotification(Notification(type: NotificationTypes.SUBJECT_CREATED,\n\
    \      data: subject));\n  }\n  func notifySubjectDestroyed(subject: Subject)\
    \ {\n    sendNotification(Notification(type: NotificationTypes.SUBJECT_DESTROYED,\n\
    \      data: subject));\n  }\n  class var sharedInstance:MetaSubject {\n    struct\
    \ singletonWrapper {\n      static let singleton = MetaSubject();\n    }\n   \
    \ return singletonWrapper.singleton;\n  }\n  func notify(notification:Notification)\
    \ {\n    // do nothing - required for Observer conformance\n  }\n}\n\nclass ShortLivedSubject\
    \ : SubjectBase {\n  override init() {\n    super.init();\n    MetaSubject.sharedInstance.notifySubjectCreated(self);\n\
    \  }\n  deinit {\n    MetaSubject.sharedInstance.notifySubjectDestroyed(self);\n\
    \  }\n}\n```\n\nAt the heart of this variation is the `MetaObserver` protocol,\
    \ which extends `Observer` and adds methods that will be called when new short-lived\
    \ subjects are created and destroyed. I need a mechanism to track meta-observers\
    \ and dispatch notifications to them, so I created the mediator in the form of\
    \ the `MetaSubject` class, which is derived from `SubjectBase` (so I inherit thread-safe\
    \ observer tracking) and conforms to the `MetaObserver` protocol (so that individual\
    \ subjects can announce their creation and destruction). The final addition is\
    \ the `ShortLivedSubject` class, which is derived from `SubjectBase` and implements\
    \ an initializer and de-initializer that calls the methods of the `MetaSubject`\
    \ class. Listing 22-17 shows how I have updated the `AuthenticationManager` class\
    \ so that it participates in the new functionality.\n\n**Listing 22-17.** Creating\
    \ a Short-Lived Subject in the `Authentication.swift` File\n\n```\nclass AuthenticationManager\
    \ : ShortLivedSubject {\n  func authenticate(user:String, pass:String) -> Bool\
    \ {\n    var nType = NotificationTypes.AUTH_FAIL;\n    if (user == \"bob\" &&\
    \ pass == \"secret\") {\n      nType = NotificationTypes.AUTH_SUCCESS;\n     \
    \ println(\"User \\(user) is authenticated\");\n    } else {\n      println(\"\
    Failed authentication attempt\");\n    }\n    sendNotification(Notification(type:\
    \ nType, data: user));\n    return nType == NotificationTypes.AUTH_SUCCESS;\n\
    \  }\n}\n```"
