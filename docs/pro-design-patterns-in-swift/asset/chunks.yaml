    \ `BigBurger` 添加额外的肉饼，或向 `SuperVeggieBurger` 添加培根。\n\n为了利用这些更改，我必须修改点餐流程，让服务员询问顾客需要哪种汉堡，如清单\
    \ 11-12 所示。\n\n**清单 11-12.** 在 `main.swift` 文件中修改点餐流程\n\n```\n// 第 1 步 - 询问姓名\n\
    let name = \"Joe\";\n\n// 第 2 步 - 选择产品\nlet builder = BurgerBuilder.getBuilder(Burgers.BIGBURGER);\n\
    \n// 第 3 步 - 定制汉堡？\nbuilder.setMayo(false);\nbuilder.setCooked(Burger.Cooked.WELLDONE);\n\
    \nlet order = builder.buildObject(name);\norder.printDescription();\n```\n\n##\
    \ 理解建造者模式的陷阱\n\n只要你记住，用于创建对象的默认值应该定义在建造者类中，而不是调用组件中，那么这种模式就没有任何陷阱。\n\n## Cocoa\
    \ 中建造者模式的示例\n\n建造者模式最常用的例子可以在 `Foundation` 框架的 `NSDateComponents` 类中找到。`NSDateComponents`\
    \ 类是一个建造者，它允许调用组件指定设置，用于生成代表日历日期的 `NSDate` 对象。清单 11-13 展示了我创建的一个名为 `DateBuilder.playground`\
    \ 的 Xcode playground 文件内容。\n\n**清单 11-13.** `DateBuilder.playground` 文件的内容\n\n\
    ```\nimport Foundation;\n\nvar builder = NSDateComponents();\n\nbuilder.hour \
    \    = 10;\nbuilder.day      = 6;\nbuilder.month    = 9;\nbuilder.year     = 1940;\n\
    builder.calendar = NSCalendar(calendarIdentifier: NSGregorianCalendar);\n\nvar\
    \ date         = builder.date;\nprintln(date!);\n```\n\n我通过实例化 `NSDateComponents`\
    \ 类来创建建造者，并通过设置其定义的属性来配置将要生成的对象。我为 `hour`、`day`、`month`、`year` 和 `calendar` 属性设置了值，以替换建造者定义的默认值。\n\
    \n为了创建对象，我读取了 `date` 属性的值，并收到一个已根据我提供的值配置好的 `NSDate` 对象。我将该值写入控制台，在 playground\
    \ 控制台中显示以下输出：\n\n```\n1940-09-06 09:00:00 +0000\n```\n\n我没有为建造者提供构成日期的所有组件的值，因此建造者对其分钟、秒和时区组件使用了默认值，这就是这些部分被设置为零的原因。\n\
    \n通过实现建造者模式，`NSDateComponents` 类允许我以适合我的顺序指定有限数量的值来配置一个日期。建造者直到读取 `date` 属性时才会创建\
    \ `NSDate` 对象，这允许我在数据可用时提供它们。\n\n## 将模式应用于 SportsStore 应用程序\n\n在本节中，我将演示建造者模式的一个常见用途：生成对象的序列化表示。我还将向您展示如何使用属性而非方法来创建建造者。\n\
    \n### 准备示例应用程序\n\n我将从第 10 章离开的地方继续处理 SportsStore 应用程序。我将实现建造者模式来创建产品数据更改的序列化表示。我向\
    \ SportsStore 项目添加了一个名为 `ChangeRecord.swift` 的新文件，并用它定义了清单 11-14 所示的类。\n\n**清单\
    \ 11-14.** `ChangeRecord.swift` 文件的内容\n\n```\nclass ChangeRecord : Printable {\n\
    \    private let outerTag:String;\n    private let productName:String;\n    private\
