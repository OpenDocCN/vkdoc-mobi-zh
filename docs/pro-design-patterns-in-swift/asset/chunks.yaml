    \ collect."
  raw: '## Preparing the Example Project


    Following the same approach I used in earlier chapters, I created a new OS X Command
    Line Tool project called Composite. I added a file to the project called `CarParts.swift`,
    the contents of which are shown in Listing 15-1.


    Listing 15-1. The Contents of the CarParts.swift File


    `class Part {`


    `let name:String;`


    `let price:Float;`


    `init(name:String, price:Float) {`


    `self.name = name; self.price = price;`


    `}`


    `}`


    `class CompositePart {`


    `let name:String;`


    `let parts:[Part];`


    `init(name:String, parts:Part...) {`


    `self.name = name; self.parts = parts;`


    `}`


    `}`


    I have defined two classes to represent parts used to repair cars. The `Part`
    class represents a single self-contained part, such as a spark plug or a tire.
    The `CompositePart` class represents parts that are made up of other parts and
    that are typically purchased as a single unit, such as a wheel, which would comprise
    a tire, a wheel alloy, and some fixing nuts. The `CompositePart` class represents
    its constituent elements using a `Part` array. I also added a file called `Orders.swift`,
    the contents of which are shown in Listing 15-2.


    Listing 15-2. The Contents of the Orders.swift File


    `import Foundation`


    `class CustomerOrder {`


    `let customer:String;`


    `let parts:[Part];`


    `let compositeParts:[CompositePart];`


    `init(customer:String, parts:[Part], composites:[CompositePart]) {`


    `self.customer = customer;`


    `self.parts = parts;`


    `self.compositeParts = composites;`


    `}`


    `var totalPrice:Float {`


    `let partReducer = {(subtotal:Float, part:Part) -> Float in`


    `return subtotal + part.price};`


    `var total = reduce(parts, 0, partReducer);`


    `return reduce(compositeParts, total, {(subtotal, cpart) -> Float in`


    `return reduce(cpart.parts, subtotal, partReducer);`


    `});`


    `}`


    `func printDetails() {`


    `println("Order for \(customer): Cost: \(formatCurrencyString(totalPrice))");`


    `}`


    `func formatCurrencyString(number:Float) -> String {`


    `let formatter = NSNumberFormatter();`


    `formatter.numberStyle = NSNumberFormatterStyle.CurrencyStyle;`


    `return formatter.stringFromNumber(number) ?? "";`


    `}`


    `}`


    The `CustomerOrder` class represents an order made up of `Part` and `CompositePart`
    objects. The `printDetails` method writes out the name of the customer and the
    total price of the order, which is obtained from the `totalPrice` property. Listing
    15-3 shows the code I added to the `main.swift` file to create and populate a
    `CustomerOrder` object with `Part` and `CompositePart` objects.


    Listing 15-3. The Contents of the main.swift File


    `let doorWindow = CompositePart(name: "DoorWindow", parts:`


    `Part(name: "Window", price: 100.50),`


    `Part(name: "Window Switch", price: 12));`


    `let door = CompositePart(name: "Door", parts:`


    `Part(name: "Window", price: 100.50),`


    `Part(name: "Door Loom", price: 80),`


    `Part(name: "Window Switch", price: 12),`


    `Part(name: "Door Handles", price: 43.40));`


    `let hood = Part(name: "Hood", price: 320);`


    `let order = CustomerOrder(customer: "Bob", parts: [hood],`


    `composites: [door, doorWindow]);`


    `order.printDetails();`


    The customer is `Bob`, and his order consists of a complete door, a door window,
    and a hood. Running the application produces the following output:


    `Order for Bob: Cost: $668.40`


    ## Understanding the Problem That the Pattern Solves


    The classes in the example application exhibit two different problems, both of
    which stem from the fact that there are different types used to represent car
    parts in an order.


    The first problem is that I am limited to simple hierarchies of parts. When I
    created the `CompositePart` object to represent a car door in Listing 15-3, I
    had to create a `Part` object for the `Window` and another for the `Window Switch`es.
    I had to create the same `Part` objects for the door window, even though the door
    contains a window. This limitation means that I need to keep two lists of parts
    up-to-date, even though one is a superset of the other.


    The second problem is that classes that operate on parts need to know the details
    of the `CompositePart` and `Part` objects and how they relate to one another.
    You can see an example of this problem in the `CustomerAccount` class, in which
    a substantial portion of the code in the class deals with working out the total
    cost of all the `Part` objects that have been ordered.


    `...`


    `var totalPrice:Float {`


    `let partReducer = {(subtotal:Float, part:Part) -> Float in`


    `return subtotal + part.price};`


    `var total = reduce(parts, 0, partReducer);`


    `return reduce(compositeParts, total, {(subtotal, cpart) -> Float in`


    `return reduce(cpart.parts, subtotal, partReducer);`


    `});`


    `}`


    `...`


    The need for the components that operate on parts to understand the relationship
    between the `Part` and `CompositePart` classes means that I have to duplicate
    this kind of code in each of those components.


    ## Understanding the Composite Pattern


    The composite pattern solves the problems I described by arranging objects into
    a tree hierarchy and defining a protocol that allows individual and composite
    objects to be treated consistently. The protocol is presented to the components
    that operate on the objects, which are unaware of which objects are single objects
    and which are collections.


    The protocol is also used within the composite objects, which are then able to
    seamlessly collect together objects that represent individual objects and other
    collections. Figure [15-1](#A978-1-4842-0394-1_15_Chapter.html#Fig1) shows the
    way that the composite pattern is used to arrange objects, but this is a pattern
    that is most readily understood through a working implementation; see the next
    section for details.


    ![A978-1-4842-0394-1_15_Fig1_HTML.jpg](A978-1-4842-0394-1_15_Fig1_HTML.jpg)


    Figure 15-1.


    The composite pattern


    ## Implementing the Composite Pattern


    The objects used to represent individual objects are known as leaf nodes in the
    tree data structure. The objects used to represent a collection are known as composites.
    Both the leaf node and composite objects implement the same protocol, which hides
    the details of how collections are composed from the components that consume them.


    The first step in implementation is to define the protocol, which is the heart
    of the pattern. Listing 15-4 shows the definition of the protocol for the example
    application, and the changes required make the `Part` and `CompositePart` classes
    conform to it.


    Listing 15-4. Defining and Applying a Protocol in the CarParts.swift File


    `protocol CarPart {`


    `var name:String { get };`


    `var price:Float { get };`


    `}`


    `class Part : CarPart {`


    `let name:String;`


    `let price:Float;`


    `init(name:String, price:Float) {`


    `self.name = name; self.price = price;`


    `}`


    `}`


    `class CompositePart : CarPart {`


    `let name:String;`


    `let parts:[CarPart];`


    `init(name:String, parts:CarPart...) {`


    `self.name = name; self.parts = parts;`


    `}`


    `var price:Float {`


    `return reduce(parts, 0, {subtotal, part in`


    `return subtotal + part.price;`


    `});`


    `}`


    `}`


    The `CarPart` protocol defines `name` and `price` properties, which correspond
    to the properties already defined by the `Part` class. This means that the only
    change for `Part` is to declare conformance to the protocol.


    The changes for the `CompositePart` class are more profound. It is important that
    composite objects operate on the protocol and not the classes that conform to
    it, which means I have removed references to the `Part` class and replaced them
    with references to the `CarPart` protocol. In addition, I have defined the `price`
    property specified by the protocol, and its implementation uses the global `reduce`
    function to sum the value of the `price` properties of the `CarPart` objects it
    has been used to collect.'
  trans: "\n# 准备示例项目\n\n沿用前几章的方法，我创建了一个名为 `Composite` 的全新 OS X 命令行工具项目。我在项目中添加了一个名为\
    \ `CarParts.swift` 的文件，其内容如代码清单 15-1 所示。\n\n代码清单 15-1. `CarParts.swift` 文件的内容\n\
    \n```\nclass Part {\n    let name:String;\n    let price:Float;\n    init(name:String,\
    \ price:Float) {\n        self.name = name; self.price = price;\n    }\n}\n\n\
    class CompositePart {\n    let name:String;\n    let parts:[Part];\n    init(name:String,\
    \ parts:Part...) {\n        self.name = name; self.parts = parts;\n    }\n}\n\
    ```\n\n我定义了两个类来表示用于维修汽车的零部件。`Part` 类代表单个独立的零件，例如火花塞或轮胎。`CompositePart` 类代表由其他零件组成且通常整体采购的部件，比如一个车轮，它通常包括轮胎、轮毂和一些固定螺母。`CompositePart`\
    \ 类使用 `Part` 数组来表示其组成元素。我还添加了一个名为 `Orders.swift` 的文件，其内容如代码清单 15-2 所示。\n\n代码清单\
    \ 15-2. `Orders.swift` 文件的内容\n\n```\nimport Foundation\n\nclass CustomerOrder\
    \ {\n    let customer:String;\n    let parts:[Part];\n    let compositeParts:[CompositePart];\n\
    \    init(customer:String, parts:[Part], composites:[CompositePart]) {\n     \
    \   self.customer = customer;\n        self.parts = parts;\n        self.compositeParts\
    \ = composites;\n    }\n    var totalPrice:Float {\n        let partReducer =\
    \ {(subtotal:Float, part:Part) -> Float in\n            return subtotal + part.price};\n\
    \        var total = reduce(parts, 0, partReducer);\n        return reduce(compositeParts,\
    \ total, {(subtotal, cpart) -> Float in\n            return reduce(cpart.parts,\
    \ subtotal, partReducer);\n        });\n    }\n    func printDetails() {\n   \
    \     println(\"Order for \\(customer): Cost: \\(formatCurrencyString(totalPrice))\"\
    );\n    }\n    func formatCurrencyString(number:Float) -> String {\n        let\
    \ formatter = NSNumberFormatter();\n        formatter.numberStyle = NSNumberFormatterStyle.CurrencyStyle;\n\
    \        return formatter.stringFromNumber(number) ?? \"\";\n    }\n}\n```\n\n\
    `CustomerOrder` 类代表一个由 `Part` 和 `CompositePart` 对象组成的订单。`printDetails` 方法输出客户名称和订单总价，总价从\
    \ `totalPrice` 属性获取。代码清单 15-3 展示了我添加到 `main.swift` 文件中的代码，用于创建和填充包含 `Part` 和 `CompositePart`\
    \ 对象的 `CustomerOrder` 对象。\n\n代码清单 15-3. `main.swift` 文件的内容\n\n```\nlet doorWindow\
    \ = CompositePart(name: \"DoorWindow\", parts:\n    Part(name: \"Window\", price:\
    \ 100.50),\n    Part(name: \"Window Switch\", price: 12));\nlet door = CompositePart(name:\
    \ \"Door\", parts:\n    Part(name: \"Window\", price: 100.50),\n    Part(name:\
    \ \"Door Loom\", price: 80),\n    Part(name: \"Window Switch\", price: 12),\n\
    \    Part(name: \"Door Handles\", price: 43.40));\nlet hood = Part(name: \"Hood\"\
    , price: 320);\nlet order = CustomerOrder(customer: \"Bob\", parts: [hood],\n\
    \    composites: [door, doorWindow]);\norder.printDetails();\n```\n\n客户是 `Bob`，他的订单包含一扇完整的车门、一个车门车窗和一个引擎盖。运行该应用程序将输出以下内容：\n\
    \n```\nOrder for Bob: Cost: $668.40\n```\n\n# 理解该模式要解决的问题\n\n示例应用程序中的类存在两个不同的问题，这两个问题都源于在订单中使用了不同类型的对象来表示汽车零部件。\n\
    \n第一个问题是，我只能使用简单的层次结构来表示零部件。当我在代码清单 15-3 中创建 `CompositePart` 对象来表示一个车门时，我必须为 `Window`（车窗）创建一个\
    \ `Part` 对象，再为 `Window Switch`（车窗开关）创建另一个 `Part` 对象。尽管车门已经包含了一个车窗，但我还是得为车门车窗创建相同的\
    \ `Part` 对象。这种限制意味着我需要维护两个零件列表并保持它们同步，即使其中一个列表是另一个列表的超集。\n\n第二个问题是，操作零部件对象的类需要了解\
    \ `CompositePart` 和 `Part` 对象的细节以及它们之间的关联方式。你可以在 `CustomerAccount` 类中看到这个问题的一个例子，该类中相当大一部分代码用于计算所有已订购\
    \ `Part` 对象的总成本。\n\n```\n...\nvar totalPrice:Float {\n    let partReducer = {(subtotal:Float,\
    \ part:Part) -> Float in\n        return subtotal + part.price};\n    var total\
    \ = reduce(parts, 0, partReducer);\n    return reduce(compositeParts, total, {(subtotal,\
    \ cpart) -> Float in\n        return reduce(cpart.parts, subtotal, partReducer);\n\
    \    });\n}\n...\n```\n\n由于操作零部件对象的组件需要理解 `Part` 和 `CompositePart` 类之间的关系，这意味着我必须在每个这样的组件中重复编写这类代码。\n\
    \n# 理解组合模式\n\n组合模式解决了上述问题，它通过将对象排列成树形层次结构，并定义一个协议，使得单个对象和组合对象能够被一致地处理。该协议提供给操作对象的组件，这些组件无需知道哪些对象是单个对象，哪些是集合。\n\
    \n该协议也在组合对象内部使用，从而使它们能够无缝地聚合代表单个对象和其他集合的对象。图 15-1 展示了使用组合模式来排列对象的方式，但这是一个通过实际实现最容易理解的模式；详情请参见下一节。\n\
    \n![A978-1-4842-0394-1_15_Fig1_HTML.jpg](img/A978-1-4842-0394-1_15_Fig1_HTML.jpg)\n\
    \n图 15-1.\n\n组合模式\n\n# 实现组合模式\n\n用于表示单个对象的对象在树形数据结构中被称为叶节点。用于表示集合的对象被称为组合节点。叶节点和组合节点都实现相同的协议，该协议隐藏了消费这些集合的组件所需的集合构成细节。\n\
    \n实现的第一步是定义协议，这是该模式的核心。代码清单 15-4 显示了示例应用程序中协议的定义，以及使 `Part` 和 `CompositePart`\
    \ 类符合该协议所需的更改。\n\n代码清单 15-4. 在 `CarParts.swift` 文件中定义并应用协议\n\n```\nprotocol CarPart\
    \ {\n    var name:String { get };\n    var price:Float { get };\n}\n\nclass Part\
    \ : CarPart {\n    let name:String;\n    let price:Float;\n    init(name:String,\
    \ price:Float) {\n        self.name = name; self.price = price;\n    }\n}\n\n\
    class CompositePart : CarPart {\n    let name:String;\n    let parts:[CarPart];\n\
    \    init(name:String, parts:CarPart...) {\n        self.name = name; self.parts\
    \ = parts;\n    }\n    var price:Float {\n        return reduce(parts, 0, {subtotal,\
    \ part in\n            return subtotal + part.price;\n        });\n    }\n}\n\
    ```\n\n`CarPart` 协议定义了 `name` 和 `price` 属性，这与 `Part` 类已经定义的属性相对应。这意味着对于 `Part`\
    \ 类，唯一的改动就是声明遵守该协议。\n\n对于 `CompositePart` 类的改动更为深远。重要的是，组合节点对象应操作协议本身，而不是操作遵守该协议的具体类，这意味着我移除了对\
    \ `Part` 类的引用，并将其替换为对 `CarPart` 协议的引用。此外，我还实现了协议要求的 `price` 属性，其实现使用全局 `reduce`\
    \ 函数来汇总它所聚合的所有 `CarPart` 对象 `price` 属性的值。\n"
- fmt: "### Applying the Pattern\n\nThe next step is to update the classes that operate\
    \ on the left node and composite objects so that they rely on the protocol rather\
    \ than its implementation classes. Listing 15-5 shows the changes that I made\
    \ to the `CustomerOrder` class.\n\n**Listing 15-5.** Applying the Protocol in\
