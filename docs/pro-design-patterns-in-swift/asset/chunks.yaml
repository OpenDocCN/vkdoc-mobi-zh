- fmt: "### Defining the Data\n\nTo keep the example application simple, I am going\
    \ to define the product data statically. This wouldn’t be useful in a real app\
    \ because the changes the user makes are not persistent, but it is sufficient\
    \ for this book, in which I want to focus on the design patterns rather than setting\
    \ up data services.\n\nI am going to define all of the code in the `ViewController.swift`\
    \ file, which Xcode created when the project was set up. Locate the file in the\
    \ navigation pane and click it. Xcode will switch to its code editor. Listing\
    \ 3-1 shows the contents of the `ViewController.swift` file and the changes I\
    \ made to define the data.\n\n**Listing 3-1.** Adding Data to the `ViewController.swift`\
    \ File\n\n```\nimport UIKit\n\nclass ViewController: UIViewController {\n\n  \
    \  var products = [\n        (\"Kayak\", \"A boat for one person\", \"Watersports\"\
    , 275.0, 10),\n        (\"Lifejacket\", \"Protective and fashionable\", \"Watersports\"\
    , 48.95, 14),\n        (\"Soccer Ball\", \"FIFA-approved size and weight\", \"\
    Soccer\", 19.5, 32),\n        (\"Corner Flags\", \"Give your playing field a professional\
    \ touch\",\n            \"Soccer\", 34.95, 1),\n        (\"Stadium\", \"Flat-packed\
    \ 35,000-seat stadium\", \"Soccer\", 79500.0, 4),\n        (\"Thinking Cap\",\
    \ \"Improve your brain efficiency by 75%\", \"Chess\", 16.0, 8),\n        (\"\
    Unsteady Chair\", \"Secretly give your opponent a disadvantage\",\n          \
    \  \"Chess\", 29.95, 3),\n        (\"Human Chess Board\", \"A fun game for the\
    \ family\", \"Chess\", 75.0, 2),\n        (\"Bling-Bling King\", \"Gold-plated,\
    \ diamond-studded King\",\n            \"Chess\", 1200.0, 4)];\n\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n    }\n\n    override func\
    \ didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n    }\n\
    \n}\n```\n\n> **Tip**  \n> The term **view controller** refers to parts of one\
    \ of the most important patterns for Swift/Cocoa development, called *Model/View/Controller\
    \ (MVC)*. This pattern is woven throughout iOS development, and I describe it\
    \ in depth in Part 5. For this chapter, I am going to ignore the MVC pattern and\
    \ consolidate as much of the code I require into a single class.\n\nI have created\
    \ a variable called `products` and assigned to it an array of tuples that represent\
    \ products. A tuple allows several values to be easily grouped. See the “Working\
    \ with Tuples” sidebar for a quick explanation of how tuples are defined and used.\n\
    \n> **Tip**  \n> Swift assigns literal floating-point values such as `19.5` using\
    \ the `Double` type even when it could have used the smaller `Float` type. I could\
    \ have enforced the use of `Float` values by specifying the type explicitly—in\
    \ other words, `Float(19.5)`—but I am going to accept the use of `Double` values\
    \ in order to keep the example simple.\n\n---\n\n### WORKING WITH TUPLES\n\nTo\
    \ demonstrate the use of tuples, I created a new playground called `Tuples.playground`.\
    \ I have included the playground in the free source code download that accompanies\
    \ this book. It contains the following code:\n\n```\nimport Foundation;\n\nvar\
    \ myProduct = (\"Kayak\", \"A boat for one person\", \"Watersports\", 275.0, 10);\n\
    \nfunc writeProductDetails(product: (String, String, String, Double, Int)) {\n\
    \    println(\"Name: \\(product.0)\");\n    println(\"Description: \\(product.1)\"\
    );\n    println(\"Category: \\(product.2)\");\n    let formattedPrice = NSString(format:\
    \ \"$%.2lf\", product.3);\n    println(\"Price: \\(formattedPrice)\");\n}\n\n\
    writeProductDetails(myProduct);\n```\n\nThe code in this playground defines a\
    \ tuple and a function that prints details of its values to the console. Notice\
    \ that to accept a tuple as a parameter in the function, I specify the types of\
    \ the individual values as a comma-separated list, similar to the way that a tuple\
    \ is created, as follows:\n\n```\n...\nfunc writeProductDetails(product: (String,\
    \ String, String, Double, Int)) {\n...\n```\n\nYou have to be careful when using\
    \ literal numeric values in tuples because Swift will select the type for the\
    \ value automatically. This is why I have specified the price of the product in\
    \ the playground as `275.0`. If I had omitted the decimal fraction, then Swift\
    \ would have created a `(String, String, String, Int, Int)` tuple, which would\
    \ not have been accepted as an argument to the `writeProductDetails` function.\n\
    \nWithin the function, I access the values within the tuple by referring to their\
    \ index, like this:\n\n```\n...\nprintln(\"Description: \\(product.1)\");\n...\n\
    ```\n\nThe expression `product.1` refers to the value at index 1 in the tuple\
    \ passed as the argument to the `writeProductDetails` function. Tuple indexes\
    \ are zero-based, which means that this expression evaluates to `A boat for one\
    \ person`.\n\nI used the `NSString` class to format the price of the product in\
    \ the playground. Swift makes it easy to work with the different Cocoa frameworks,\
    \ including the `Foundation` framework that provides core features such as string\
    \ formatting.\n\nTo see the effect of the code in the playground, select **Assistant\
    \ Editor ➤ Show Assistant Editor** from the View menu. The console output will\
    \ be as follows:\n\n```\nName: Kayak\nDescription: A boat for one person\nCategory:\
    \ Watersports\nPrice: $275.00\n```\n\nTuples are a convenient way of defining\
    \ data types, but they have their limitations, as I explain in [Chapter 4](#A978-1-4842-0394-1_4_Chapter.html).\n\
    \n---\n\n## Creating the Basic Layout\n\nThe next change that I am going to make\
    \ to the example project is to define a basic layout, consisting of a table that\
    \ will display a row for each product and a label that will display the total\
    \ number of products in stock.\n\nIn this section, I use the Xcode Interface Builder\
    \ (IB), which is a drag-and-drop interface layout tool. It can take a while to\
    \ get used to the way that IB works, so I will explain the process I followed\
    \ step by step. If you are an experienced Xcode developer, then you can skip ahead.\n\
    \nThe first step is to open the `Main.storyboard` file for editing by clicking\
    \ it in the navigation pane. This opens the IB window, which shows the views that\
    \ the application will present to the user, as shown in Figure 3-5.\n\n![A978-1-4842-0394-1_3_Fig5_HTML.jpg](A978-1-4842-0394-1_3_Fig5_HTML.jpg)\n\
    \n**Figure 3-5.** Using the Interface Builder to edit a storyboard\n\nThe main\
    \ part of the display shows the view that the application will display to the\
    \ user. There is only one view in this application because I selected the Single\
    \ View Application template when I created the project. The view is shown as an\
    \ empty box because there are no user interface components currently.\n\nOn the\
    \ left is the hierarchy of controls, with **View Controller Scene** as the top-level\
    \ item. There isn’t much there at the moment, but it will be populated as I add\
    \ the components I need for the SportsStore application. The control hierarchy\
    \ is a useful part of the Interface Builder editor because it makes it easy to\
    \ select components and create relationships between them, as you will see as\
    \ I build out the view."
  raw: '### Defining the Data


    To keep the example application simple, I am going to define the product data
    statically. This wouldn’t be useful in a real app because the changes the user
    makes are not persistent, but it is sufficient for this book, in which I want
    to focus on the design patterns rather than setting up data services.


    I am going to define all of the code in the `ViewController.swift` file, which
    Xcode created when the project was set up. Locate the file in the navigation pane
    and click it. Xcode will switch to its code editor. Listing 3-1 shows the contents
    of the `ViewController.swift` file and the changes I made to define the data.


    Listing 3-1. Adding Data to the ViewController.swift File


    `import UIKit`


    `class ViewController: UIViewController {`


    `var products = [`


    `("Kayak", "A boat for one person", "Watersports", 275.0, 10),`


    `("Lifejacket", "Protective and fashionable", "Watersports", 48.95, 14),`


    `("Soccer Ball", "FIFA-approved size and weight", "Soccer", 19.5, 32),`


    `("Corner Flags", "Give your playing field a professional touch",`


    `"Soccer", 34.95, 1),`


    `("Stadium", "Flat-packed 35,000-seat stadium", "Soccer", 79500.0, 4),`


    `("Thinking Cap", "Improve your brain efficiency by 75%", "Chess", 16.0, 8),`


    `("Unsteady Chair", "Secretly give your opponent a disadvantage",`


    `"Chess", 29.95, 3),`


    `("Human Chess Board", "A fun game for the family", "Chess", 75.0, 2),`


    `("Bling-Bling King", "Gold-plated, diamond-studded King",`


    `"Chess", 1200.0, 4)];`


    `override func viewDidLoad() {`


    `super.viewDidLoad()`


    `}`


    `override func didReceiveMemoryWarning() {`


    `super.didReceiveMemoryWarning()`


    `}`


    `}`


    Tip


    The term view controller refers to parts of one of the most important patterns
    for Swift/Cocoa development, called Model/View/Controller (MVC). This pattern
    is woven throughout iOS development, and I describe it in depth in Part 5\. For
    this chapter, I am going to ignore the MVC pattern and consolidate as much of
    the code I require into a single class.


    I have created a variable called `products` and assigned to it an array of tuples
    that represent products. A tuple allows several values to be easily grouped. See
    the “Working with Tuples” sidebar for a quick explanation of how tuples are defined
    and used.


    Tip


    Swift assigns literal floating-point values such as `19.5` using the `Double`
    type even when it could have used the smaller `Float` type. I could have enforced
    the use of `Float` values by specifying the type explicitly—in other words, `Float(19.5)`—but
    I am going to accept the use of `Double` values in order to keep the example simple.


    WORKING WITH TUPLES


    To demonstrate the use of tuples, I created a new playground called `Tuples.playground`.
    I have included the playground in the free source code download that accompanies
    this book. It contains the following code:


    `import Foundation;`


    `var myProduct = ("Kayak", "A boat for one person", "Watersports", 275.0, 10);`


    `func writeProductDetails(product: (String, String, String, Double, Int)) {`


    `println("Name: \(product.0)");`


    `println("Description: \(product.1)");`


    `println("Category: \(product.2)");`


    `let formattedPrice = NSString(format: "$%.2lf", product.3);`


    `println("Price: \(formattedPrice)");`


    `}`


    `writeProductDetails(myProduct);`


    The code in this playground defines a tuple and a function that prints details
    of its values to the console. Notice that to accept a tuple as a parameter in
    the function, I specify the types of the individual values as a comma-separated
    list, similar to the way that a tuple is created, as follows:


    `...`


    `func writeProductDetails(product:` `(String, String, String, Double, Int)` `)
    {`


    `...`


    You have to be careful when using literal numeric values in tuples because Swift
    will select the type for the value automatically. This is why I have specified
    the price of the product in the playground as `275.0`. If I had omitted the decimal
    fraction, then Swift would have created a `(String, String, String, Int, Int)`
    tuple, which would not have been accepted as an argument to the `writeProductDetails`
    function.


    Within the function, I access the values within the tuple by referring to their
    index, like this:


    `...`


    `println("Description: \(` `product.1` `)");`


    `...`


    The expression `product.1` refers to the value at index 1 in the tuple passed
    as the argument to the `writeProductDetails` function. Tuple indexes are zero-based,
    which means that this expression evaluates to `A boat for one person`.


    I used the `NSString` class to format the price of the product in the playground.
    Swift makes it easy to work with the different Cocoa frameworks, including the
    `Foundation` framework that provides core features such as string formatting.


    To see the effect of the code in the playground, select Assistant Editor ➤ Show
    Assistant Editor from the View menu. The console output will be as follows:


    `Name: Kayak`


    `Description: A boat for one person`


    `Category: Watersports`


    `Price: $275.00`


    Tuples are a convenient way of defining data types, but they have their limitations,
    as I explain in [Chapter 4](#A978-1-4842-0394-1_4_Chapter.html).


    ## Creating the Basic Layout


    The next change that I am going to make to the example project is to define a
    basic layout, consisting of a table that will display a row for each product and
    a label that will display the total number of products in stock.


    In this section, I use the Xcode Interface Builder (IB), which is a drag-and-drop
    interface layout tool. It can take a while to get used to the way that IB works,
    so I will explain the process I followed step by step. If you an experienced Xcode
    developer, then you can skip ahead.


    The first step is to open the `Main.storyboard` file for editing by clicking it
    in the navigation pane. This opens the IB window, which shows the views that the
    application will present to the user, as shown in Figure [3-5](#A978-1-4842-0394-1_3_Chapter.html#Fig5).


    ![A978-1-4842-0394-1_3_Fig5_HTML.jpg](A978-1-4842-0394-1_3_Fig5_HTML.jpg)


    Figure 3-5.


    Using the Interface Builder to edit a storyboard


    The main part of the display shows the view that the application will display
    to the user. There is only one view in this application because I selected the
    Single View Application template when I created the project. The view is shown
    as an empty box because there are no user interface components currently.


    One the left is the hierarchy of controls, with View Controller Scene as the top-level
    item. There isn’t much there at the moment, but it will be populated as I add
    the components I need for the SportsStore application. The control hierarchy is
    a useful part of the Interface Builder editor because it makes it easy to select
    components and create relationships between them, as you will see as I build out
    the view.'
