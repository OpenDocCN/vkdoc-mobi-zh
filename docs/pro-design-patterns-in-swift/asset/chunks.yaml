    \ observer classes into a meta-observer.\n\n**Listing 22-18.** Creating a Meta-observer\
    \ in the `SystemComponents.swift` File\n\n```\n...\nclass AttackMonitor : MetaObserver\
    \ {\n    func notifySubjectCreated(subject: Subject) {\n        if (subject is\
    \ AuthenticationManager) {\n            subject.addObservers(self);\n        }\n\
    \    }\n    func notifySubjectDestroyed(subject: Subject) {\n        subject.removeObserver(self);\n\
    \    }\n    func notify(notification: Notification) {\n        monitorSuspiciousActivity\n\
    \            = (notification.type == NotificationTypes.AUTH_FAIL);\n    }\n  \
    \  var monitorSuspiciousActivity: Bool = false {\n        didSet {\n         \
    \   println(\"Monitoring for attack: \\(monitorSuspiciousActivity)\");\n     \
    \   }\n    }\n}\n...\n```\n\nThe implementation of the `notifySubjectCreated`\
    \ method checks the type of the newly created subject and registers for notifications\
    \ only for instances of the `AuthenticationManager` class. The final step is to\
    \ change the way that the observer is created and applied in the `main.swift`\
    \ file, as shown in Listing 22-19.\n\n**Listing 22-19.** Using a Meta-observer\
    \ in the `main.swift` File\n\n```\n// create meta observer\nlet monitor = AttackMonitor();\n\
    MetaSubject.sharedInstance.addObservers(monitor);\n\n// create regular observers\n\
