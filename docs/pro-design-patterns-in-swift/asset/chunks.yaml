- fmt: "### The Quick Singleton Implementation\n\nThe quickest way to implement the\
    \ singleton is to use a Swift global constant. Global constants have some useful\
    \ behaviors that set the foundation for following the rules I listed in the previous\
    \ section. Listing 6-6 shows how I have implemented the singleton pattern based\
    \ on a global constant in the `Logger.swift` file.\n\n**Listing 6-6.** Implementing\
    \ the Singleton Pattern in the `Logger.swift` File\n\n```\nlet globalLogger =\
    \ Logger();\n\nfinal class Logger {\n    private var data = [String]()\n\n   \
    \ private init() {\n        // do nothing - required to stop instances being\n\
    \        // created by code in other files\n    }\n\n    func log(msg:String)\
    \ {\n        data.append(msg);\n    }\n\n    func printLog() {\n        for msg\
    \ in data {\n            println(\"Log: \\(msg)\");\n        }\n    }\n}\n```\n\
    \nThe first change I have made is to define the global constant, which I have\
    \ called `globalLogger`. It may not look like much, but the Swift language makes\
    \ two guarantees about global constants and variables. They will be initialized\
    \ lazily, and that lazy initialization is thread-safe. These guarantees mean that\
    \ the singleton object won’t be created until the value of the `globalLogger`\
    \ constant is read for the first time and that when it is read, only a single\
    \ instance of the `Logger` class will be instantiated even if another thread tries\
    \ to read the value while the singleton is being initialized.\n\nThe other changes\
    \ I made in Listing 6-6 are to the `Logger` class. I marked the class as `final`\
    \ to prevent subclasses from being defined and marked the initializer as `private`\
    \ so that instances cannot be created from outside the `Logger.swift` file. Having\
    \ defined the singleton and protected its class so that other instances cannot\
    \ be created, I can update the `BackupServer` class, as shown in Listing 6-7.\n\
    \n**Listing 6-7.** Using the Singleton in the `BackupServer.swift` File\n\n```\n\
    ...\nclass BackupServer {\n    let name:String;\n    private var data = [DataItem]();\n\
    \n    init(name:String) {\n        self.name = name;\n        globalLogger.log(\"\
    Created new server \\(name)\");\n    }\n\n    func backup(item:DataItem) {\n \
    \       data.append(item);\n        globalLogger.log(\"\\(name) backed up item\
    \ of type \\(item.type.rawValue)\");\n    }\n\n    func getData() -> [DataItem]{\n\
    \        return data;\n    }\n}\n...\n```\n\nI have removed the local `Logger`\
    \ object and added calls to the `log` method of the singleton. The last rule I\
    \ listed in the previous section was that components should be able to locate\
    \ the singleton, and—as you can see—using a global constant makes that a simple\
    \ process.\n\n> **Tip:** This implementation also adheres to the other rules.\
    \ The private initializer and the lazy initialization ensure that there is only\
    \ one instance of the `Logger` class, and using the constant means that the object\
    \ referred to by the `globalLogger` cannot be changed.\n\nI also have to make\
    \ changes to the `main.swift` file, as shown in Listing 6-8.\n\n**Listing 6-8.**\
    \ Using the Singleton in the `main.swift` File\n\n```\nvar server = BackupServer(name:\"\
    Server#1\");\nserver.backup(DataItem(type: DataItem.ItemType.Email, data: \"joe@example.com\"\
    ));\nserver.backup(DataItem(type: DataItem.ItemType.Phone, data: \"555-123-1133\"\
    ));\nglobalLogger.log(\"Backed up 2 items to \\(server.name)\");\n\nvar otherServer\
    \ = BackupServer(name:\"Server#2\");\notherServer.backup(DataItem(type: DataItem.ItemType.Email,\
    \ data: \"bob@example.com\"));\nglobalLogger.log(\"Backed up 1 item to \\(otherServer.name)\"\
    );\n\nglobalLogger.printLog();\n```\n\nIf you run the application, you will see\
    \ that the singleton pattern has allowed me to gather all of the logging messages\
    \ and write them to the console.\n\n```\nLog: Created new server Server#1\nLog:\
    \ Server#1 backed up item of type Email Address\nLog: Server#1 backed up item\
    \ of type Telephone Number\nLog: Backed up 2 items to Server#1\nLog: Created new\
    \ server Server#2\nLog: Server#2 backed up item of type Email Address\nLog: Backed\
    \ up 1 item to Server#2\n```\n\n### Creating a Conventional Singleton Implementation\n\
    \nUsing a global variable works perfectly well, but you will be used to the convention\
    \ of accessing a singleton via its class if you have come to Swift from C# or\
    \ Java. The problem is that Swift doesn’t support type stored properties, and\
    \ some ingenuity is required to apply the singleton pattern in the conventional\
    \ way. Listing 6-9 shows how I have used a struct with a static property to solve\
    \ the problem.\n\n**Listing 6-9.** Implementing the Singleton Pattern in the `BackupServer.swift`\
    \ File\n\n```\n...\nfinal class BackupServer {\n    let name:String;\n    private\
    \ var data = [DataItem]();\n\n    private init(name:String) {\n        self.name\
    \ = name;\n        globalLogger.log(\"Created new server \\(name)\");\n    }\n\
    \n    func backup(item:DataItem) {\n        data.append(item);\n        globalLogger.log(\"\
    \\(name) backed up item of type \\(item.type.rawValue)\");\n    }\n\n    func\
    \ getData() -> [DataItem]{\n        return data;\n    }\n\n    class var server:BackupServer\
    \ {\n        struct SingletonWrapper {\n            static let singleton = BackupServer(name:\"\
    MainServer\");\n        }\n        return SingletonWrapper.singleton;\n    }\n\
    }\n...\n```\n\n> **Note:** The choice between a global constant and a nested struct\
    \ is a personal one. I like the simplicity of the global variable, but years of\
    \ Java and C# development mean that I am more comfortable with the nested struct.\
    \ If you do use global constants, then make sure you use a naming convention that\
    \ is unambiguous and consistent throughout your application.\n\nWithin the computed\
    \ type property `server`, I have defined a struct called `SingletonWrapper` that\
    \ has a static stored property called `singleton`. I create the singleton `BackupServer`\
    \ object and assign it to the `singleton` property. Finally, I return the value\
    \ of the `singleton` property as the value of the `server` property.\n\nDo not\
    \ worry if the last sentence doesn’t make immediate sense. This technique relies\
    \ on the way that Swift processes `struct` definitions and static stored properties\
    \ to ensure that only one instance of the `BackupServer` class is created, even\
    \ though the code is a little mind-bending.\n\nTo access the singleton, I read\
    \ the value of the `BackupServer.server` property, as shown in Listing 6-10.\n\
    \n**Listing 6-10.** Using the Singleton in the `main.swift` File\n\n```\nvar server\
    \ = BackupServer.server;\nserver.backup(DataItem(type: DataItem.ItemType.Email,\
    \ data: \"joe@example.com\"));\nserver.backup(DataItem(type: DataItem.ItemType.Phone,\
    \ data: \"555-123-1133\"));\nglobalLogger.log(\"Backed up 2 items to \\(server.name)\"\
    );\n\nvar otherServer = BackupServer.server;\notherServer.backup(DataItem(type:\
    \ DataItem.ItemType.Email, data: \"bob@example.com\"));\nglobalLogger.log(\"Backed\
    \ up 1 item to \\(otherServer.name)\");\n\nglobalLogger.printLog();\n```\n\nThe\
    \ `server` and `otherServer` variables in the listing refer to the singleton,\
    \ which means that all the `DataItem` objects are sent to the same server."
