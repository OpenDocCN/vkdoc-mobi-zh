    \ 文件中的元组替换为 `Product` 实例，并将对单个元组值的引用替换为相应的 `Product` 属性。清单 4-14 显示了我所做的更改。\n\n\
    **清单 4-14.** 在 `ViewController.swift` 文件中应用 Product 类\n\n```\nimport UIKit\n\n\
    class ProductTableCell : UITableViewCell {\n    @IBOutlet weak var nameLabel:\
