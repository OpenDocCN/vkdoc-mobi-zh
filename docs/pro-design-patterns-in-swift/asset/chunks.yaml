    \ didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n    }\n\
    \n}\n```\n\n> **提示**  \n> **视图控制器**这个术语涉及 Swift/Cocoa 开发中最重要的模式之一，即*模型/视图/控制器（MVC）*。该模式贯穿于\
    \ iOS 开发始终，我将在第 5 部分深入介绍。本章中，我将暂时忽略 MVC 模式，将所需的大部分代码集中到一个类中。\n\n我创建了一个名为 `products`\
    \ 的变量，并为其赋值一个由元组组成的数组，每个元组代表一个产品。元组可以轻松地将多个值组合在一起。有关元组如何定义和使用的快速说明，请参阅“使用元组”边栏。\n\
    \n> **提示**  \n> Swift 在赋值字面浮点值（如 `19.5`）时，会使用 `Double` 类型，即使本可以使用更小的 `Float` 类型。我本可以通过显式指定类型来强制使用\
    \ `Float` 值——即 `Float(19.5)`——但为了保持示例的简洁，我将接受使用 `Double` 值。\n\n---\n\n### 使用元组\n\
    \n为了演示元组的使用，我创建了一个名为 `Tuples.playground` 的新 playground。我已将该 playground 包含在本书附带的免费源代码下载中。它包含以下代码：\n\
    \n```\nimport Foundation;\n\nvar myProduct = (\"Kayak\", \"A boat for one person\"\
    , \"Watersports\", 275.0, 10);\n\nfunc writeProductDetails(product: (String, String,\
    \ String, Double, Int)) {\n    println(\"Name: \\(product.0)\");\n    println(\"\
    Description: \\(product.1)\");\n    println(\"Category: \\(product.2)\");\n  \
    \  let formattedPrice = NSString(format: \"$%.2lf\", product.3);\n    println(\"\
    Price: \\(formattedPrice)\");\n}\n\nwriteProductDetails(myProduct);\n```\n\n该\
    \ playground 中的代码定义了一个元组和一个函数，该函数将其各个值的详细信息打印到控制台。请注意，要在函数中将元组作为参数接受，我需要将各个值的类型指定为逗号分隔的列表，这与创建元组的方式类似，如下所示：\n\
    \n```\n...\nfunc writeProductDetails(product: (String, String, String, Double,\
    \ Int)) {\n...\n```\n\n在元组中使用字面数值时必须小心，因为 Swift 会自动为值选择类型。这就是为什么我在 playground\
    \ 中将产品价格指定为 `275.0`。如果我省略了小数部分，Swift 会创建一个 `(String, String, String, Int, Int)`\
    \ 元组，该元组将无法被 `writeProductDetails` 函数接受为参数。\n\n在函数内部，我通过引用索引来访问元组中的值，如下所示：\n\n\
    ```\n...\nprintln(\"Description: \\(product.1)\");\n...\n```\n\n表达式 `product.1`\
    \ 引用作为参数传递给 `writeProductDetails` 函数的元组中索引 1 处的值。元组索引从零开始，这意味着此表达式的计算结果为 `A boat\
    \ for one person`。\n\n我在 playground 中使用了 `NSString` 类来格式化产品价格。Swift 使得与不同的 Cocoa\
    \ 框架（包括提供字符串格式化等核心功能的 `Foundation` 框架）协同工作变得非常容易。\n\n要查看 playground 中代码的效果，请从“视图”菜单中选择**助理编辑器\
    \ ➤ 显示助理编辑器**。控制台输出将如下所示：\n\n```\nName: Kayak\nDescription: A boat for one person\n\
    Category: Watersports\nPrice: $275.00\n```\n\n元组是定义数据类型的一种便捷方式，但它们也有局限性，我将在第 4\
    \ 章中解释。\n\n---\n\n## 创建基本布局\n\n我接下来要对示例项目做出的更改是定义一个基本布局，包括一个表格（将为每个产品显示一行）和一个标签（将显示库存中的产品总数）。\n\
    \n在本节中，我将使用 Xcode 的 Interface Builder（IB），这是一个拖放式的界面布局工具。熟悉 IB 的工作方式可能需要一些时间，因此我将逐步解释我所遵循的过程。如果您是一位经验丰富的\
    \ Xcode 开发者，则可以跳过此部分。\n\n第一步是点击导航面板中的 `Main.storyboard` 文件以进行编辑。这将打开 IB 窗口，其中显示应用程序将呈现给用户的视图，如图\
    \ 3-5 所示。\n\n![A978-1-4842-0394-1_3_Fig5_HTML.jpg](img/A978-1-4842-0394-1_3_Fig5_HTML.jpg)\n\
    \n**图 3-5.** 使用 Interface Builder 编辑故事板\n\n显示区域的主要部分显示了应用程序将呈现给用户的视图。此应用程序中只有一个视图，因为我在创建项目时选择了“单视图应用程序”模板。该视图目前显示为一个空框，因为其中没有任何用户界面组件。\n\
    \n左侧是控件的层次结构，顶层项目是**视图控制器场景**。目前其中的内容不多，但随着我添加 SportsStore 应用所需的组件，它将会被填充。控件层次结构是\
    \ Interface Builder 编辑器中一个很有用的部分，因为它使得选择组件以及创建组件之间的关系变得容易，您将在构建视图的过程中看到这一点。\n"
- fmt: '### Adding the Basic Components


    To add components to the view, you drag them from the Object Library, which is
    in the bottom-right corner of the Xcode window, onto the view and release them.
    You can then position the component on the layout.


    The first component I require is a `Label`, which I will use to display the number
    of products in stock. You can locate the `Label` component in the Object Library
    by scrolling down the list or by entering the component name in the search box
    at the bottom of the pane. Drag the `Label` to the view. It doesn’t matter where
    it is positioned at the moment.


    Once you have added the `Label`, you can configure it using the inspectors pane,
    which is in the top-right corner of the Xcode window. At the top of the pane,
    there are buttons that allow different inspectors to be selected, as shown in
    Figure [3-6](#A978-1-4842-0394-1_3_Chapter.html#Fig6).


    ![A978-1-4842-0394-1_3_Fig6_HTML.jpg](A978-1-4842-0394-1_3_Fig6_HTML.jpg)


    Figure 3-6.


    The inspector pane selector buttons


    Select the Attributes Inspector using the buttons at the top of the pane and make
    the changes described in Table [3-1](#A978-1-4842-0394-1_3_Chapter.html#Tab1).


    Table 3-1.


    The Configuration Changes Required for the Label Control


    | Attribute | Change |

    | --- | --- |

    | `Color` | This attribute controls the color of the label text. Select white
    for this property. |

    | `Alignment` | This attribute controls the horizontal alignment of the text in
    the label. Click the button that centers the text. |

    | `Background` | This attribute sets the background color for the label. Select
    black for this property. |

    | `Font` | This attribute sets the font used for the text displayed by the label
    and should be set to `System Bold 30`. |


    When you have set the attributes, adjust the position of and size of the label
    so that it is aligned to the bottom edge of the view and touches the left and
    right edges, as shown in Figure [3-7](#A978-1-4842-0394-1_3_Chapter.html#Fig7).
    You can size and position the label by using the Size Inspector or by using the
    grab handles shown by the label in the view. I positioned my label at the `(0,
    550)` coordinate and made the label `600` by `50` pixels.


    The next step is to add the table. Locate the `Table View` component in the Object
    Library, drag it to the view, and release. Resize the table so that it occupies
    all of the space in the view that is not occupied by the label. As you drag the
    top edge upward, you will see it snap to a guide that is just below the battery
    icon. This is the top layout guide, and it allows the application to fit into
    the device window without obscuring the status bar, as shown in Figure [3-7](#A978-1-4842-0394-1_3_Chapter.html#Fig7).


    Caution


    Use the `Table View` component and not the `Table View Controller`.


    ![A978-1-4842-0394-1_3_Fig7_HTML.jpg](A978-1-4842-0394-1_3_Fig7_HTML.jpg)


    Figure 3-7.


    Adding the basic layout components


    ### Configuring Auto Layout


    The next step is to specify how the components will be positioned on the device
    screen. The layout looks fine in the storyboard editor, but iOS devices support
    a range of resolutions, and the application may be displayed in portrait and landscape
    modes. Auto layout is the feature that allows the size and position of a component
    to be specified relative to its container or other components, and in this section,
    I will define the layout for the table.


    Auto layout works by specifying constraints, which fix the position and size of
    components relative to its container or other components. You can specify constraints
    using code statements, but it is simpler to use the drag-and-drop support provided
    by UI Builder.


    The most reliable way to set up constraints is to use the control hierarchy because
    it makes it easy to be sure you are defining constraints for the right components.
    To create the first constraint, hold down the Control key and drag from the `Table
    View` to the `View` item in the hierarchy. You will be presented with a pop-up
    menu when you release the mouse button, as shown in Figure [3-8](#A978-1-4842-0394-1_3_Chapter.html#Fig8),
    which shows the object hierarchy displayed immediately to the left of the view
    in the storyboard.


    ![A978-1-4842-0394-1_3_Fig8_HTML.jpg](A978-1-4842-0394-1_3_Fig8_HTML.jpg)


    Figure 3-8.


    Applying a constraint using the component hierarchy


    Hold the Shift key and select the following items:


    *   Leading Space to Container Margin

    *   Trailing Space to Container Margin

    *   Top Space to Top Layout Guide


    Once you have selected all three menu items, click outside of the pop-up menu
    to dismiss it. A new `Constraints` item will appear in the component hierarchy
    to contain the constraints, which have the effect of ensuring that the top, left,
    and right edges of the table view are always in contact with the edges of the
    container, regardless of the size of the layout.


    Table [3-2](#A978-1-4842-0394-1_3_Chapter.html#Tab2) shows the remaining constraints
    that are required, all of which are created using the same technique.


    Tip


    For the last constraint in the table, Control-drag and release so that both ends
    of the line are within the boundaries of the `Label` item in the control hierarchy.


    Table 3-2.


    The Constraints Required for the Basic Layout


    | Drag From | Drag To | Constraints |

    | --- | --- | --- |

    | `Label` | `View` | `Leading Space to Container Margin` `Trailing Space to Container
    Margin` `Bottom Space to Bottom Layout Guide` |

    | `Table View` | `Label` | `Vertical Spacing` |

    | `Label` | `Label` | `Height` |


    ### Testing the Basic Layout


    Before going any further, I want to check that the layout and its constraints
    are set up correctly. To build and test the application, click the Play button
    in the Xcode toolbar, which runs across the top of the Xcode window, as shown
    in Figure [3-9](#A978-1-4842-0394-1_3_Chapter.html#Fig9). (The button is really
    labeled “Build and then run the current scheme,” but that is an unwieldy name.)


    Tip


    Select `Show Toolbar` from the Xcode View menu if you cannot see the button.


    ![A978-1-4842-0394-1_3_Fig9_HTML.jpg](A978-1-4842-0394-1_3_Fig9_HTML.jpg)


    Figure 3-9.


    The Xcode button that builds and starts the application


    Xcode comes with an iOS simulator, and clicking the Play button will compile the
    code and send it to the simulator. You can change the device that is simulated
    using the selector next to the Play button, and as Figure [3-9](#A978-1-4842-0394-1_3_Chapter.html#Fig9)
    shows, I have selected the iPad 2\. You can use any device, but the iPad 2 is
    convenient for generating compact screenshots, which is useful for page layouts.


    Click the Play button, and Xcode will compile the project and start the simulator,
    as shown in Figure [3-10](#A978-1-4842-0394-1_3_Chapter.html#Fig10).


    Note


    I have shown the simulator in its landscape mode, which is displayed using the
    `Rotate Left` and `Rotate Right` items on the simulator Hardware menu. I usually
    display landscape screenshots in books because they better suit the layout of
    a book and minimize the amount of empty space on the page.


    ![A978-1-4842-0394-1_3_Fig10_HTML.jpg](A978-1-4842-0394-1_3_Fig10_HTML.jpg)


    Figure 3-10.


    Running the example application in the iOS simulator


    ## Implementing the Total Label


    It is time to start implementing the code that will drive the layout, and in this
    section I am going to wire up the label so that it displays the total number of
    products in stock. In the sections that follow, I will walk through the process
    of creating a relationship between the layout and the code.'
