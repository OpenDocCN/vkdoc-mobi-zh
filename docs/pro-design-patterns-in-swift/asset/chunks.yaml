    \ pattern with the factory method or abstract factory pattern (described in [Chapters\
    \ 9](#A978-1-4842-0394-1_9_Chapter.html) and [10](#A978-1-4842-0394-1_10_Chapter.html))\
    \ to vary the links in the chains for different requests. Listing 19-9 shows the\
