    \ = 0;\n    private var salesTaxRate:Double = 0.2;\n\n    required init(name:String,\
    \ description:String, category:String, price:Double,\n        stockLevel:Int)\
    \ {\n        self.name = name;\n        self.productDescription = description;\n\
    \        self.category = category;\n        super.init();\n        self.price\
    \ = price;\n        self.stockLevel = stockLevel;\n    }\n\n    var stockLevel:Int\
