    \    mayo: mayo, ketchup: ketchup, lettuce: lettuce, cook: cooked );\norder.printDescription();\n\
    ```\n\n`Burger`的初始化器要求调用组件在客户不想更改默认值时了解这些默认配置值——例如，要知道标准汉堡包含两个肉饼并加有番茄酱。每个需要`Burger`对象的组件都必须具备这一知识，其结果是默认值的任何更改都必须在每个调用组件中实现。\n\
