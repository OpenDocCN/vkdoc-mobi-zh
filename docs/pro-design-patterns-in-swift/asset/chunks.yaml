    ## Summary


    In this chapter I showed you how to describe and apply the state of an object
    using the memento pattern. This is one of the least used patterns and tends to
    be overshadowed by the more general command pattern, but the idea of describing
    the entire state of an object can be a powerful one. In the next chapter, I describe
    the strategy pattern, which defines classes that can be extended without being
    modified or subclassed.


    # 24. The Strategy Pattern


    The strategy pattern is used to create classes whose functionality can be extended
    without being modified or subclassed, which can be useful when you are delivering
    frameworks to third-party developers or when any changes, however small, to key
    classes will trigger extensive and expensive testing and validation procedures.
    Table [24-1](#A978-1-4842-0394-1_24_Chapter.html#Tab1) puts the strategy pattern
    into context.


    Table 24-1.


    Putting the Strategy Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The strategy pattern is used to create classes that can be extended
    without modification, through the application of algorithm objects that conform
    to a well-defined protocol. |

    | What are the benefits? | The strategy pattern allows third-party developers
    to change the behavior of classes without modifying them and can allow low-cost
    changes to be made in projects that have expensive and lengthy validation procedures
    for specific classes. |

    | When should you use this pattern? | Use this pattern when you need classes that
    can be extended without being modified. |

    | When should you avoid this pattern? | There is no reason to avoid this pattern.
    |

    | How do you know when you have implemented the pattern correctly? | The strategy
    pattern is implemented correctly when you can extend the behavior of a class by
    defining and applying a new strategy without needing to make any changes to the
    class itself. |

    | Are there any common pitfalls? | No. The strategy pattern is simple to implement.
    |

    | Are there any related patterns? | The strategy and visitor patterns are often
    used together. |


