  trans: "\n## Cocoa 中备忘录模式的示例\n\nCocoa 通过`NSCoding`协议提供了备忘录模式的实现。发起人对象遵循该协议，并与`NSCoder`对象协作，生成其状态的快照。`NSCoder`可被子类化以支持不同的数据格式，也可以使用内置的实现。代码清单\
    \ 23-9 展示了如何修改`Ledger`类，使其遵循该协议。\n\n**代码清单 23-9. 在 Ledger.swift 文件中遵循 NSCoding\
    \ 协议**\n\n```\nimport Foundation;\n\nclass LedgerEntry {\n    let id:Int;\n  \
    \  let counterParty:String;\n    let amount:Float;\n\n    init(id:Int, counterParty:String,\
    \ amount:Float) {\n        self.id = id; self.counterParty = counterParty; self.amount\
    \ = amount;\n    }\n}\n\nclass LedgerMemento : Memento {\n    let data:NSData;\n\
    \    init(data:NSData) { self.data = data;}\n}\n\nclass Ledger : NSObject, Originator,\
    \ NSCoding {\n    private var entries = [Int:LedgerEntry]();\n    private var\
    \ nextId = 1;\n    var total:Float = 0;\n\n    override init() {\n        // 不做任何操作\
    \ - 允许在无编码器的情况下创建实例\n    }\n\n    required init(coder aDecoder: NSCoder) {\n \
    \       self.total = aDecoder.decodeFloatForKey(\"total\");\n        self.nextId\
    \ = aDecoder.decodeIntegerForKey(\"nextId\");\n        self.entries.removeAll(keepCapacity:\
    \ true);\n        if let entryArray = aDecoder.decodeDataObject()\n          \
    \  as AnyObject? as? [NSDictionary] {\n                for entryDict in entryArray\
    \ {\n                    let id = entryDict[\"id\"] as Int;\n                \
    \    let counterParty = entryDict[\"counterParty\"] as String;\n             \
    \       let amount = entryDict[\"amount\"] as Float;\n                    self.entries[id]\
    \ = LedgerEntry(id: id, counterParty: counterParty,\n                        amount:\
    \ amount);\n                }\n        }\n    }\n\n    func encodeWithCoder(aCoder:\
    \ NSCoder) {\n        aCoder.encodeFloat(total, forKey: \"total\");\n        aCoder.encodeInteger(nextId,\
    \ forKey: \"nextId\");\n        var entriesArray = [NSMutableDictionary]();\n\
    \        for entry in self.entries.values {\n            var dict = NSMutableDictionary();\n\
    \            dict[\"id\"] = entry.id;\n            dict[\"counterParty\"] = entry.counterParty;\n\
    \            dict[\"amount\"] = entry.amount;\n            entriesArray.append(dict);\n\
    \        }\n        aCoder.encodeObject(entriesArray);\n    }\n\n    func createMemento()\
    \ -> Memento {\n        return LedgerMemento(data:\n            NSKeyedArchiver.archivedDataWithRootObject(self));\n\
    \    }\n\n    func applyMemento(memento: Memento) {\n        if let lmemento =\
    \ memento as? LedgerMemento {\n            if let obj = NSKeyedUnarchiver.unarchiveObjectWithData(lmemento.data)\n\
    \                as? Ledger {\n                    self.total = obj.total;\n \
    \                   self.nextId = obj.nextId;\n                    self.entries\
    \ = obj.entries;\n            }\n        }\n    }\n\n    func addEntry(counterParty:String,\
    \ amount:Float) {\n        let entry = LedgerEntry(id: nextId++, counterParty:\
    \ counterParty,\n            amount: amount);\n        entries[entry.id] = entry;\n\
    \        total += amount;\n    }\n\n    func printEntries() {\n        for id\
    \ in entries.keys.array.sorted(<) {\n            if let entry = entries[id] {\n\
    \                println(\"#\\(id): \\(entry.counterParty) $\\(entry.amount)\"\
    );\n            }\n        }\n        println(\"Total: $\\(total)\");\n      \
    \  println(\"----\");\n    }\n}\n```\n\n注意\n\n`NSCoding`协议并非苹果支持对象持久化的唯一方式。你还可以使用\
    \ Core Data 框架，该框架允许对象被持久化存储和操作。维基百科提供了关于 Core Data 的出色概述，参见[`http://en.wikipedia.org/wiki/Core_Data`](http://en.wikipedia.org/wiki/Core_Data)。\n\
    \n使用`NSCoding`协议意味着将发起人的状态编码为`NSData`对象，因此第一个改动是让`LedgerMemento`类成为`NSData`对象的封装器。我不想向负责人暴露发起人表示其状态的技术，最简单的方法是继续使用`Memento`协议。\n\
    \n一个遵循`NSCoding`协议的类必须继承自`NSObject`，后者提供了创建备忘录所需的一些特性。该协议定义了用于创建备忘录的`encodeWithEncoder`方法。与我本章前面使用的\
    \ JSON 序列化类似，我必须将发起人的内部状态表示为一组键值对，你可以看到方法实现中明显的相似之处，尽管单个对象是通过编码器的方法添加到备忘录中的。\n\
    \n在我定义的`Originator`协议的`createMemento`方法中，我选择了用于表示数据的编码器，如下所示：\n\n```\n...\nfunc\
    \ createMemento() -> Memento {\n    return LedgerMemento(data: NSKeyedArchiver.archivedDataWithRootObject(self));\n\
    }\n...\n```\n\n`NSKeyedArchiver`是苹果提供的内置编码器实现之一，调用其`archivedDataWithRootObject`方法会将发起人的状态编码到`NSData`对象中，我用`LedgerMemento`封装该对象并作为方法结果返回。\n\
    \n`NSCoding`协议指定了一个用于解码备忘录的必需初始化器。该初始化器从备忘录创建发起人类的新实例，而不是设置现有对象的状态，因此我必须在`applyMemento`方法中显式复制数据值，如下所示：\n\
    \n```\n...\nfunc applyMemento(memento: Memento) {\n    if let lmemento = memento\
    \ as? LedgerMemento {\n        if let obj = NSKeyedUnarchiver.unarchiveObjectWithData(lmemento.data)\n\
    \            as? Ledger {\n                self.total = obj.total;\n         \
    \       self.nextId = obj.nextId;\n                self.entries = obj.entries;\n\
    \        }\n    }\n}\n...\n```\n\n我调用`NSKeyedUnarchiver`类的`unarchiveObjectWithData`方法会触发该必需初始化器，该方法接受`NSData`备忘录进行解码，以便我能读取键值对并提取其中包含的状态数据。代码清单\
    \ 23-10 展示了我在`main.swift`文件中为使用修改后的备忘录所做的改动。\n\n**代码清单 23-10. 在 main.swift 文件中使用编码**\n\
    \n```\nlet ledger = Ledger();\nledger.addEntry(\"Bob\", amount: 100.43);\nledger.addEntry(\"\
    Joe\", amount: 200.20);\nlet memento = ledger.createMemento();\nledger.applyMemento(memento);\n\
    ledger.printEntries();\n```\n\n运行示例应用程序会得到以下结果：\n\n```\n#1: Bob $100.43\n#2: Joe\
    \ $200.2\nTotal: $300.63\n```\n\n## 将模式应用于 SportsStore 应用\n\n在本节中，我将结合命令模式和备忘录模式，用完全重置应用的功能替换我在第\
    \ 20 章中添加的撤销功能。\n\n大多数备忘录模式的实现都基于获取和恢复到多个快照，但这只是备忘录工作方式的一种解释。正如我所解释的，备忘录的工作方式完全取决于具体实现，它不必包含对象曾包含的数据值。它也可以触发其他类型的操作，包括丢弃用户所做的任何更改并重新加载原始数据。在本例中，备忘录将是一个命令，调用一个重置应用数据的方法。\n\
    \n### 准备示例应用\n\n为应用该模式，我需要向`ProductDataStore`类添加一个方法，用于重置数据并丢弃用户所做的任何更改。代码清单 23-11\
    \ 展示了我所做的添加。\n\n**代码清单 23-11. 在 ProductDataStore.swift 文件中添加重置方法**\n\n```\nimport\
    \ Foundation\n\nfinal class ProductDataStore {\n    var callback:((Product) ->\
    \ Void)?;\n    private var networkQ:dispatch_queue_t\n    private var uiQ:dispatch_queue_t;\n\
    \    lazy var products:[Product] = self.loadData();\n\n    init() {\n        networkQ\
    \ = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);\n      \
    \  uiQ = dispatch_get_main_queue();\n    }\n\n    func resetState() {\n      \
    \  self.products = loadData();\n    }\n\n    // ...为简洁起见，省略方法和语句...\n}\n```\n"
