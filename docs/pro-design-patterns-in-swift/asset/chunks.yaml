- fmt: "# Part I  \nGetting Ready  \n\n# 1. Understanding Design Patterns  \n\nDesign\
    \ patterns are insurance policies for software development. Insurance policies\
    \ work by trading a little cost now to avoid the possibility of a lot of cost\
    \ later. The premium you pay to insure a car against theft, for example, costs\
    \ a few percent of the value of the car, but when the car is stolen, your overall\
    \ costs are minimized. You still have to go through the inconvenience of having\
    \ your car stolen, but at least you don’t have to bear the financial loss as well.\
    \  \n\nIn software development, design patterns are insurance against the time\
    \ taken to solve problems. The premium is the time it takes to add extra flexibility\
    \ to your code now, and the payout is avoiding a painful and protracted rewrite\
    \ to change the way the application works later. Like real insurance policies,\
    \ you may not benefit from paying the premium because the problem you anticipate\
    \ might never happen, but software development rarely goes smoothly and problems\
    \ often arise, so that additional flexibility is usually a good investment.  \n\
    \nThis is a book for hands-on professional programmers. I focus on the practical\
    \ applications of design patterns and focus on code examples instead of abstract\
    \ descriptions. I describe the most important design patterns and demonstrate\
    \ how they can be applied to iOS using Swift. Some of the patterns I describe\
    \ are already implemented in the Cocoa framework classes, and I show you how use\
    \ them to create more robust and adaptable applications.  \n\nBy the time you\
    \ have finished reading this book, you will understand the most important design\
    \ patterns in contemporary software development, the problems they are intended\
    \ to solve, and how to apply them to your Swift projects.  \n\n## Putting Design\
    \ Patterns into Context  \n\nEvery experienced programmer has a set of informal\
    \ strategies that shape their coding style. These strategies are insurance policies\
    \ against the recurrence of problems from earlier projects. If you have spent\
    \ a week dealing with a last-minute database schema change, for example, then\
    \ you will take a little extra time on future projects making sure that dependencies\
    \ on the schema are not hard-coded throughout the application, even though you\
    \ don’t know for certain that the schema will change this time around. You pay\
    \ a little premium now to avoid the potential for a bigger cost in the future.\
    \ You may still have to make changes, but the process will be more pleasant, just\
    \ like the process of shopping for a replacement car is made more pleasant when\
    \ the insurance company pays for the stolen one.  \n\nThere are two problems with\
    \ informal strategies. The first problem is inconsistency. Programmers with similar\
    \ experiences may have different views about what the nature of a problem is and\
    \ will disagree about the best solution.  \n\nThe second problem is that informal\
    \ strategies are driven by personal experiences, which can be associated with\
    \ strong emotions. Describing the difficulty of fixing a problem rarely conveys\
    \ the pain and misery you endured, and that makes it hard to convince others of\
    \ the need to invest in preventative measures. It also makes it difficult to be\
    \ objective about the importance of the problem. Bad experiences linger, and you\
    \ may find it hard to accept that there is little support for making the changes\
    \ that would avoid problems you have encountered on previous projects.  \n\n###\
    \ Introducing Design Patterns  \n\nA design pattern identifies a common software\
    \ development problem and provides a strategy for dealing with it, rather like\
    \ the informal approach that I described earlier but that is expressed objectively,\
    \ consistently, and free from emotional baggage.  \n\nThe strategies that design\
    \ patterns describe are proven to work, which means you can compare your own approach\
    \ to them. And, since they cover the most common problems, you will find that\
    \ there are design patterns for problems that you have not had to personally endure.\
    \  \n\nMost of the other design patterns in this book originate from a classic\
    \ book called *Design Patterns: Elements of Reusable Object-Oriented Software*\
    \ by Erich Gamma, Richard Helm, Ralph Johnson, and John Vlissides (Addison-Wesley,\
    \ 1995). The authors of this book are referred to as the Gang of Four (GoF), and\
    \ the patterns they describe are some of the most important and fundamental in\
    \ modern software development.  \n\nThe GoF book is worth reading but is somewhat\
    \ academic in nature. Design patterns are expressed abstractly without reference\
    \ to a particular programming language or platform. This abstraction makes them\
    \ hard to use; it can be difficult to figure out whether a pattern describes a\
    \ problem that you are concerned about and difficult to be sure that you have\
    \ correctly implemented the solution.  \n\nMy goal in this book is to put design\
    \ patterns in context and give you all the information you need to easily identify\
    \ and apply the patterns that you need, along with a Swift implementation that\
    \ you can apply directly to your project.  \n\n### Understanding the Structure\
    \ of a Design Pattern  \n\nMost design patterns apply to small groups of objects\
    \ in an application and solve a problem that arises when one object—known as the\
    \ calling component—needs to perform an operation on one or more other objects\
    \ in the application.  \n\nFor each of the design patterns in this book, I describe\
    \ the problem the pattern solves, explain how the pattern works, and show you\
    \ how to implement the pattern using Swift. I also describe common variations\
    \ on the pattern and describe the pitfalls most closely associated with the pattern.\
    \  \n\n**WHERE IS THE UML?**  \n\nThe Unified Modeling Language (UML) is often\
    \ used to describe patterns, but I don’t use it in this book. I am not a fan of\
    \ UML for several reasons. First, most developers don’t completely understand\
    \ UML and take in little information from a UML diagram. There are exceptions,\
    \ of course, and these tend to be people who work in large corporations where\
    \ there is a detailed analysis and design phase before development commences.\
    \ For the rest of the world, UML is a poorly defined and misinterpreted mess of\
    \ boxes and lines.  \n\nI find that UML is good for expressing some kinds of relationship\
    \ but fails dismally at representing others. To a great extent, understanding\
    \ patterns means understanding where logic that represents knowledge of other\
    \ components exists, which is hard to convey using UML.  \n\nFinally, and rather\
    \ less objectively, UML is symptomatic of many aspects of software development\
    \ that I don’t like. All too often, UML is used as a weapon to enforce static\
    \ and inflexible designs and inhibits adapting a development process to meet evolving\
    \ customer needs because the UML becomes an unchanging reference point.  \n\n\
    For these reasons, as subjective as they are, I don’t use UML in this book. Instead,\
    \ I’ll use free-form diagrams to illustrate the points that I want to emphasize."
  raw: '# Part I

    Getting Ready


    # 1. Understanding Design Patterns


    Design patterns are insurance policies for software development. Insurance policies
    work by trading a little cost now to avoid the possibility of a lot of cost later.
    The premium you pay to insure a car against theft, for example, costs a few percent
    of the value of the car, but when the car is stolen, your overall costs are minimized.
    You still have to go through the inconvenience of having your car stolen, but
    at least you don’t have to bear the financial loss as well.


    In software development, design patterns are insurance against the time taken
    to solve problems. The premium is the time it takes to add extra flexibility to
    your code now, and the payout is avoiding a painful and protracted rewrite to
    change the way the application works later. Like real insurance policies, you
    may not benefit from paying the premium because the problem you anticipate might
    never happen, but software development rarely goes smoothly and problems often
    arise, so that additional flexibility is usually a good investment.


    This is a book for hands-on professional programmers. I focus on the practical
    applications of design patterns and focus on code examples instead of abstract
    descriptions. I describe the most important design patterns and demonstrate how
    they can be applied to iOS using Swift. Some of the patterns I describe are already
    implemented in the Cocoa framework classes, and I show you how use them to create
    more robust and adaptable applications.


    By the time you have finished reading this book, you will understand the most
    important design patterns in contemporary software development, the problems they
    are intended to solve, and how to apply them to your Swift projects.


    ## Putting Design Patterns into Context


    Every experienced programmer has a set of informal strategies that shape their
    coding style. These strategies are insurance policies against the recurrence of
    problems from earlier projects. If you have spent a week dealing with a last-minute
    database schema change, for example, then you will take a little extra time on
    future projects making sure that dependencies on the schema are not hard-coded
    throughout the application, even though you don’t know for certain that the schema
    will change this time around. You pay a little premium now to avoid the potential
    for a bigger cost in the future. You may still have to make changes, but the process
    will be more pleasant, just like the process of shopping for a replacement car
    is made more pleasant when the insurance company pays for the stolen one.


    There are two problems with informal strategies. The first problem is inconsistency.
    Programmers with similar experiences may have different views about what the nature
    of a problem is and will disagree about the best solution.


    The second problem is that informal strategies are driven by personal experiences,
    which can be associated with strong emotions. Describing the difficulty of fixing
    a problem rarely conveys the pain and misery you endured, and that makes it hard
    to convince others of the need to invest in preventative measures. It also makes
    it difficult to be objective about the importance of the problem. Bad experiences
    linger, and you may find it hard to accept that there is little support for making
    the changes that would avoid problems you have encountered on previous projects.


    ### Introducing Design Patterns


    A design patternidentifies a common software development problem and provides
    a strategy for dealing with it, rather like the informal approach that I described
    earlier but that is expressed objectively, consistently, and free from emotional
    baggage.


    The strategies that design patterns describe are proven to work, which means you
    can compare your own approach to them. And, since they cover the most common problems,
    you will find that there are design patterns for problems that you have not had
    to personally endure.


    Most of the other design patterns in this book originate from a classic book called
    Design Patterns: Elements of Reusable Object-Oriented Software by Erich Gamma,
    Richard Helm, Ralph Johnson, and John Vlissides (Addison-Wesley, 1995). The authors
    of this book are referred to as the Gang of Four (GoF) , and the patterns they
    describe are some of the most important and fundamental in modern software development.


    The GoF book is worth reading but is somewhat academic in nature. Design patterns
    are expressed abstractly without reference to a particular programming language
    or platform. This abstraction makes them hard to use; it can be difficult to figure
    out whether a pattern describes a problem that you are concerned about and difficult
    to be sure that you have correctly implemented the solution.


    My goal in this book is to put design patterns in context and give you all the
    information you need to easily identify and apply the patterns that you need,
    along with a Swift implementation that you can apply directly to your project.


    ### Understanding the Structure of a Design Pattern


    Most design patterns apply to small groups of objects in an application and solve
    a problem that arises when one object—known as the calling component—needs to
    perform an operation on one or more other objects in the application.


    For each of the design patterns in this book, I describe the problem the pattern
    solves, explain how the pattern works, and show you how to implement the pattern
    using Swift. I also describe common variations on the pattern and describe the
    pitfalls most closely associated with the pattern.


    WHERE IS THE UML?


    The Unified Modeling Language (UML) is often used to describe patterns, but I
    don’t use it in this book. I am not a fan of UML for several reasons. First, most
    developers don’t completely understand UML and take in little information from
    a UML diagram. There are exceptions, of course, and these tend to be people who
    work in large corporations where there is a detailed analysis and design phase
    before development commences. For the rest of the world, UML is a poorly defined
    and misinterpreted mess of boxes and lines.


    I find that UML is good for expressing some kinds of relationship but fails dismally
    at representing others. To a great extent, understanding patterns means understanding
    where logic that represents knowledge of other components exists, which is hard
    to convey using UML.


    Finally, and rather less objectively, UML is symptomatic of many aspects of software
    development that I don’t like. All too often, UML is used as a weapon to enforce
    static and inflexible designs and inhibits adapting a development process to meet
    evolving customer needs because the UML becomes an unchanging reference point.


    For these reasons, as subjective as they are, I don’t use UML in this book. Instead,
    I’ll use free-form diagrams to illustrate the points that I want to emphasize.'
  trans: "\n# 第一部分  \n准备工作  \n\n# 1. 理解设计模式  \n\n设计模式是软件开发的\"保险单\"。保险的运作原理是用当前的小额投入，来避免未来可能产生的高额代价。例如，为汽车购买防盗险所支付的保费，仅占车辆价值的几个百分点，但一旦车辆被盗，你的总体损失就能降到最低。虽然车辆被盗带来的不便仍无法避免，但至少你不需要同时承受经济损失。\
    \  \n\n在软件开发中，设计模式是为解决难题所投入的时间提供保障。这份\"保费\"就是你现在为代码增加额外灵活性所花费的时间，而\"理赔\"则是避免日后因调整应用程序工作方式而进行痛苦且漫长的重写。就像真实的保险单一样，你支付了保费却未必会受益——因为你预想的问题可能永远不会发生。但软件开发很少能一帆风顺，问题总是层出不穷，因此额外的灵活性通常是一项明智的投资。\
    \  \n\n这是一本面向实战型专业程序员的书籍。我专注于设计模式的实际应用，重点放在代码示例而非抽象描述上。我会介绍最重要的设计模式，并演示如何通过 Swift\
    \ 将其应用到 iOS 开发中。我描述的某些模式其实已经在 Cocoa 框架类中实现了，我会向你展示如何利用它们来创建更健壮、适应性更强的应用程序。  \n\
    \n读完本书后，你将理解当代软件开发中最核心的设计模式、它们旨在解决的问题，以及如何将这些模式应用到你的 Swift 项目中。  \n\n## 将设计模式置于具体情境中\
    \  \n\n每位经验丰富的程序员都有一套塑造自身编码风格的非正式策略。这些策略就像是防止以往项目问题再次发生的\"保险单\"。例如，如果你曾花了一周时间处理数据库\
    \ schema 在最后一刻的变更，那么在未来的项目中，你就会多花一点时间确保对 schema 的依赖没有硬编码在整个应用程序中——即使你并不确定这次 schema\
    \ 是否会更改。你现在支付一点\"保费\"，以避免未来潜在的更大代价。你或许仍需进行调整，但整个过程会更加愉快，就像保险公司赔付了被盗车辆后，你选购新车的过程也会更舒心一样。\
    \  \n\n非正式策略存在两个问题。第一个问题是**不一致性**。经验相似的程序员可能对问题的本质有不同看法，在最佳解决方案上也会产生分歧。  \n\n\
    第二个问题是，非正式策略由个人经验驱动，而这些经验往往伴随着强烈的情感。描述解决问题的难度，很难传达出你曾经历的痛苦与煎熬，这就难以说服他人投资于预防措施。同时，这也让你难以客观地看待问题的重要性。糟糕的经历会挥之不去，你可能会发现很难接受这样的现实：在采取避免既往项目问题的变更措施时，几乎得不到支持。\
    \  \n\n### 引入设计模式  \n\n设计模式能够识别出常见的软件开发问题，并提供应对策略。这与我之前描述的非正式方法颇为相似，但设计模式是客观、一致且不带情感包袱的表达。\
    \  \n\n设计模式所描述的策略已被证明是有效的，这意味着你可以将自己的方法与这些策略进行比较。而且，由于它们涵盖了最常见的问题，你会发现，对于那些你未曾亲身经历的问题，设计模式也能提供解决方案。\
    \  \n\n本书中的大多数其他设计模式都源自一本经典著作——《设计模式：可复用面向对象软件的基础》（Erich Gamma、Richard Helm、Ralph\
    \ Johnson 和 John Vlissides 合著，Addison-Wesley，1995 年出版）。这四位作者被称为\"四人组\"（GoF），他们所描述的模式是现代软件开发中最重要、最基础的一部分。\
    \  \n\n\"四人组\"的这本书值得一读，但本质上偏学术化。设计模式以抽象方式表达，不涉及特定编程语言或平台。这种抽象性使得它们难以运用：你很难判断某个模式是否描述了你关心的问题，也难以确定自己是否正确实现了解决方案。\
    \  \n\n我在本书中的目标，是将设计模式置于具体情境中，为你提供轻松识别和应用所需模式的一切信息，并附带可直接用于项目的 Swift 实现。  \n\n\
    ### 理解设计模式的结构  \n\n大多数设计模式适用于应用程序中的小规模对象组，解决的是当一个对象（称为\"调用组件\"）需要对应用程序中一个或多个其他对象执行操作时所出现的问题。\
    \  \n\n对于本书中的每个设计模式，我会描述该模式解决的问题，解释其工作原理，并向你展示如何使用 Swift 实现该模式。我还会介绍常见的模式变体，并指出与该模式最密切相关的陷阱。\
    \  \n\n**统一建模语言（UML）在哪里？**  \n\n通常会用 UML 来描述模式，但本书不会使用。我不用 UML 有几个原因。首先，大多数开发者并不能完全理解\
    \ UML，从 UML 图中获得的信息很有限。当然也有例外，这些人往往在大型企业工作，这些企业在开发开始前会有详细的分析和设计阶段。但对于业界其他人来说，UML\
    \ 不过是一堆定义不清、容易被误解的方框和线条。  \n\n我发现，UML 适合表达某些类型的关系，但在表现其他关系时却糟糕透顶。在很大程度程度上，理解模式意味着要理解代表其他组件知识的逻辑存在于何处，而这用\
    \ UML 很难传达。  \n\n最后，一个相当主观的原因：UML 是软件开发中许多我不喜欢方面的典型症状。UML 常常被用作强制实施静态僵化设计的武器，并阻碍开发流程调整以满足不断变化的客户需求——因为\
    \ UML 会成为一个不可变更的参考点。  \n\n基于这些尽管主观的原因，本书中我不会使用 UML。相反，我将使用自由形式的图表来说明我想强调的要点。 \
    \ \n"
- fmt: '# Quantifying the Value of Design Patterns


    It is easy to accept that design patterns are a good thing. Everyone understands
    the appeal of proven solutions used on countless projects to solve difficult problems.
    It is much harder to convince other programmers on the team that a specific pattern
    should be adopted in a project.


    You can assess whether an insurance policy represents value for money by asking
    yourself some questions:


    - Does the policy address something bad that is likely to happen to me?

    - How often does the bad thing occur?

    - Is the cost of the policy a small fraction of the cost of dealing with the bad
    thing?


    These simple questions make it easy to understand that there is no point in buying
    car insurance if you don’t have a car or if there are no car thieves in your town.
    They also highlight the poor value in paying $10,000 per year to insure an $11,000
    car unless you anticipate multiple thefts (in which case, you might also consider
    moving to a different area).


    The point is clear even though this is a simplistic view of insurance: don’t buy
    a policy unless it offers some benefit. The same is true for design patterns:
    don’t adopt a pattern unless it offers value that you can quantify and articulate
    to others. The questions needed to assess the value for design patterns are similar:


    - Does the pattern identify a problem that I am likely to encounter?

    - How often does this problem occur?

    - Do I care enough about avoiding the risk of having to fix the problem in the
    future to undertake the work of implementing the design pattern today?


    It can be hard to answer these questions. There are no actuarial tables for software
    development, and it can be hard to estimate the amount of future effort that will
    be required to fix a problem (especially one that may not arise).


    Instead, it can be easier to focus on the immediate benefits that a design pattern
    can offer. For example, those patterns that increase the modularity of an application
    generally do so to minimize the effect of a future change, but a modular application
    has fewer tightly coupled components, which means that it is easy to isolate units
    of code. Being able to isolate units of code is essential for effective unit testing,
    and so adopting a change-insurance pattern has an immediate benefit of improving
    the testability of code.


    Equally, design patterns that increase the amount of abstraction in an application
    allow new features to be added with less effort and less code duplication. Almost
    everyone can agree that quicker and easier development is a good thing, even if
    they don’t agree with the need to avoid the problem that a design pattern is intended
    to guard against.


    There are no easy answers, however, and the final decision to adopt a design pattern
    will be driven by the combined experience of the development team, the confidence
    in the completeness of the specification, and the competence of individual developers.


    # Using a Design Pattern After the Problem Occurred


    You will find it hard to drive the adoption of patterns if you are the sole voice
    promoting them in a team that has no experience of them and little time to consider
    them. The chances are that you will fail to convince others. Don’t be frustrated.


    My advice is not to push too hard. If you force the team into following new practices,
    you will be held accountable for every problem and delay they cause, which will
    be especially difficult if the problem you are trying to guard against never happens.
    Advocates for design patterns are, sadly, often seen predictors of unlikely doom.


    Don’t lose hope, but put this book away and wait. If the problem you are concerned
    about doesn’t occur—if, for example, the database schema doesn’t change—then take
    pleasure in that the project dodged a bullet and move on to the next assignment.


    Don’t worry if the problem does occur; you can still benefit from design patterns.
    Your project is now in a situation that you had hoped to avoid, but you can use
    the patterns as a framework for digging yourself out of the hole. Select the most
    appropriate design pattern and use it as a framework to structure the clean code
    around which you drive the resolution of the problem. In this way, you can leverage
    a bad situation to introduce the team to a proven solution to the problem. This
    isn’t as good as avoiding the problem in first place, but at least you will be
    able to create a long-term solution and lend some credibility to your enthusiasm
    for design patterns.


    # Understanding the Limitations of Design Patterns


    There is a lot to like about design patterns, but they have their limitations.
    By their nature, design patterns are solutions to problems that other people have
    encountered on other projects. Design patterns are a starting point for avoiding
    or solving a problem and not a precisely tailored solution. That doesn’t mean
    they are not useful, but they do require some work in order to adapt them to fit
    into your project.


    Treat design patterns as recipes. Tinker, adapt, and adjust a pattern, and you
    will end up with something that works for you. You might need to refine your implementation
    a few times, and your use of a pattern is likely to get better with insight gained
    from several projects, but you’ll end up with something that improves on your
    starting position and that helps minimize the impact of a common problem.


    Some programmers treat design patterns as immutable laws. They are pattern zealots,
    someone who promotes the use of patterns as an inflexible “best practice” that
    should always be followed and cannot be adapted. That’s rubbish. Applying patterns
    that you don’t need or resisting adapting a pattern to fit into a project misses
    the point entirely.


    There is no point trying to argue with a pattern zealot. They get their pleasure
    from being able to reference ever more obscure sources, and there is no effective
    way to ground their views in reality. My advice is to ignore them and focus on
    building good software by making it robust, scalable, and flexible enough to cope
    with changes, all of which can be aided by the design patterns described in this
    book.


    # About This Book


    In this book, I describe how to use the most important design patterns using `Swift`
    and the `Cocoa` frameworks. `Swift` has attracted many new developers to the Apple
    platform, so I have written this book to provide all of the information you will
    need about `Swift` and the `Cocoa` classes I use. I also show you how to create
    the example projects using `Xcode`, which can be a confusing tool if you are new
    to the world of `Swift` development. You can download all of the examples from
    `Apress.com` if you don’t want to type in the code yourself.


    ## What Do You Need to Know?


    You need to be an experienced developer to follow the concepts in book. No prior
    experience of `Swift` is required, but you should understand the basic concepts
    of object-oriented programming and have used a modern language such as `Objective-C`,
    `C#`, `Java`, or `JavaScript`.


    ## What Software Do You Need?


    You need to have a Mac running `OS X 10.10 (Yosemite)` and have downloaded and
    installed `Xcode 6.1`. To get `Xcode`, you will need to sign up as an Apple Developer,
    which you can do at `https://developer.apple.com`. Don’t worry if you are new
    to `Xcode`; I’ll show you everything you need to know to follow the examples in
    Chapter 2.'
