  trans: "\n# 25. 访问者模式\n\n访问者模式与策略模式类似，都允许在不修改类源代码或创建新子类的情况下扩展类的行为，区别在于访问者模式应用于异构对象的集合。表\
    \ 25-1 将访问者模式置于上下文中进行阐述。\n\n**表 25-1.** 访问者模式上下文一览\n\n| 问题 | 答案 |\n| --- | ---\
    \ |\n| 这是什么？ | 访问者模式允许新的算法对异构对象集合进行操作，而无需修改或继承集合类。 |\n| 有哪些优点？ | 当您希望将集合类作为框架的一部分提供，但又不要求第三方开发者修改源代码时，访问者模式非常有用。在修改核心类会触发昂贵测试流程的项目中，此模式也同样适用。\
    \ |\n| 何时应使用此模式？ | 当您的类管理着类型不匹配的对象集合，并且您希望对它们执行操作时，可以使用此模式。 |\n| 何时应避免此模式？ | 当所有对象都属于同一类型，或者可以轻松修改集合类时，则无需使用此模式。\
    \ |\n| 如何判断是否已正确实现该模式？ | 当访问者类能够通过定义处理集合中每种对象类型的方法来扩展集合类的行为时，即表示已正确实现该模式。 |\n\
    | 是否有常见陷阱？ | 唯一的陷阱是试图避免使用双重分派技术，我将在“理解双重分派”边栏中进行描述。 |\n| 是否有相关模式？ | 访问者模式是遵循开闭原则的另一种方式，该原则同样由我在第\
    \ 24 章中描述的策略模式所支持。 |\n\n## 准备示例项目\n\n在本章中，我创建了一个名为 `Visitor` 的 OS X 命令行工具项目。我添加了一个名为\
    \ `Shapes.swift` 的文件，并使用它定义了清单 25-1 中所示的类。\n\n**清单 25-1.** `Shapes.swift` 文件的内容\n\
    \n```\nimport Foundation;\n\nclass Circle {\n    let radius:Float;\n    init(radius:Float)\
    \ {\n        self.radius = radius;\n    }\n}\n\nclass Square {\n    let length:Float;\n\
    \    init(length:Float) {\n        self.length = length;\n    }\n}\n\nclass Rectangle\
    \ {\n    let xLen:Float;\n    let yLen:Float;\n    init(x:Float, y:Float) {\n\
    \        self.xLen = x;\n        self.yLen = y;\n    }\n}\n\nclass ShapeCollection\
    \ {\n    let shapes:[Any];\n    init() {\n        shapes = [\n            Circle(radius:\
    \ 2.5), Square(length: 4), Rectangle(x: 10, y: 2)\n        ];\n    }\n    func\
    \ calculateAreas() -> Float {\n        return shapes.reduce(0, combine: {total,\
    \ shape in\n            if let circle = shape as? Circle {\n                println(\"\
    Found Circle\");\n                return total + (3.14 * powf(circle.radius, 2));\n\
    \            } else if let square = shape as? Square {\n                println(\"\
    Found Square\");\n                return total + powf(square.length, 2);\n   \
    \         } else if let rect = shape as? Rectangle {\n                println(\"\
    Found Rectangle\");\n                return total + (rect.xLen * rect.yLen);\n\
    \            } else {\n                // unknown type - do nothing\n        \
    \        return total;\n            }\n        });\n    }\n}\n```\n\n我定义了三个表示形状的类——`Circle`、`Square`\
    \ 和 `Rectangle`——以及一个名为 `ShapeCollection` 的类，用于管理形状对象的集合。`ShapeCollection` 类包含一个名为\
    \ `calculateAreas` 的方法，该方法枚举集合并计算其中包含的形状的总面积。清单 25-2 展示了我在 `main.swift` 文件中定义的用于演示示例类的代码。\n\
    \n**清单 25-2.** `main.swift` 文件的内容\n\n```\nlet shapes = ShapeCollection();\nlet\
    \ area = shapes.calculateAreas();\nprintln(\"Area: \\(area)\");\n```\n\n运行该应用程序将产生以下结果：\n\
    \n```\nFound Circle\nFound Square\nFound Rectangle\nArea: 55.625\n```\n\n## 理解该模式要解决的问题\n\
    \n在示例应用程序中，`ShapeCollection` 类管理着一个异构对象集合，这些对象既没有共同的基类，也不符合共同的协议。要对集合中的对象执行操作，我必须尝试将每个对象转换为不同的类型，这就导致了像\
    \ `calculateAreas` 方法中那样的一组条件语句。\n\n```\n...\nfunc calculateAreas() -> Float {\n\
    \    return shapes.reduce(0, combine: {total, shape in\n        if let circle\
    \ = shape as? Circle {\n            println(\"Found Circle\");\n            return\
    \ total + (3.14 * powf(circle.radius, 2));\n        } else if let square = shape\
    \ as? Square {\n            println(\"Found Square\");\n            return total\
    \ + powf(square.length, 2);\n        } else if let rect = shape as? Rectangle\
    \ {\n            println(\"Found Rectangle\");\n            return total + (rect.xLen\
    \ * rect.yLen);\n        } else {\n            // unknown type - do nothing\n\
    \            return total;\n        }\n    });\n}\n...\n```\n\n每当我添加一个新功能，我就得修改或继承\
    \ `ShapeCollection` 类，并创建另一组条件语句来转换集合中的每个对象。这不仅会在某些项目中触发全面且昂贵的测试，还会产生重复、不灵活且容易出错的代码。清单\
    \ 25-3 展示了我是如何向 `ShapeCollection` 类添加另一个方法的。\n\n**清单 25-3.** 在 `Shapes.swift`\
    \ 文件中向 `ShapeCollection` 类添加新方法\n\n```\n...\nclass ShapeCollection {\n    let\
    \ shapes:[Any];\n    init() {\n        shapes = [\n            Circle(radius:\
    \ 2.5), Square(length: 4), Rectangle(x: 10, y: 2)\n        ];\n    }\n    func\
    \ calculateAreas() -> Float {\n        return shapes.reduce(0, combine: {total,\
    \ shape in\n            if let circle = shape as? Circle {\n                println(\"\
    Found Circle\");\n                return total + (3.14 * powf(circle.radius, 2));\n\
    \            } else if let square = shape as? Square {\n                println(\"\
    Found Square\");\n                return total + powf(square.length, 2);\n   \
    \         } else if let rect = shape as? Rectangle {\n                println(\"\
    Found Rectangle\");\n                return total + (rect.xLen * rect.yLen);\n\
    \            } else {\n                // unknown type - do nothing\n        \
    \        return total;\n            }\n        });\n    }\n    func countEdges()\
    \ -> Int {\n        return shapes.reduce(0, combine: {total, shape in\n      \
    \      if let circle = shape as? Circle {\n                println(\"Found Circle\"\
    );\n                return total + 1;\n            } else if let square = shape\
    \ as? Square {\n                println(\"Found Square\");\n                return\
    \ total + 4;\n            } else if let rect = shape as? Rectangle {\n       \
    \         println(\"Found Rectangle\");\n                return total + 4;\n \
    \           } else {\n                // unknown type - do nothing\n         \
    \       return total;\n            }\n        });\n    }\n}\n...\n```\n\n新方法名为\
    \ `countEdges`，它计算集合中形状的边总数。清单 25-4 展示了我在 `main.swift` 文件中添加的用于测试新方法的语句。\n\n**清单\
    \ 25-4.** 在 `main.swift` 文件中使用新方法\n\n```\nlet shapes = ShapeCollection();\nlet\
    \ area = shapes.calculateAreas();\nprintln(\"Area: \\(area)\");\nprintln(\"---\"\
    );\nlet edges = shapes.countEdges();\nprintln(\"Edges: \\(edges)\");\n```\n\n\
    运行该应用程序将产生以下结果：\n\n```\nFound Circle\nFound Square\nFound Rectangle\nArea: 55.625\n\
    ---\nFound Circle\nFound Square\nFound Rectangle\nEdges: 9\n```\n\n每次枚举集合中的对象以添加新功能时，都会面临同样的问题，从而产生同样丑陋的代码。\n"
- fmt: "## Understanding the Visitor Pattern\n\nThe visitor pattern solves the problem\
    \ by separating the algorithm that operates on the collection into a separate\
    \ object and ensures that it defines methods that can handle each collected type.\
    \ This allows the algorithm to be selected at runtime, which means that new behavior\
    \ can be defined without having to modify or subclass the type that maintains\
    \ the collection, conforming to the open/closed principle I described in [Chapter\
    \ 23](#A978-1-4842-0394-1_23_Chapter.html).\n\nEnsuring that the algorithm object\
    \ has a method to handle each collected type avoids the conditional casting code\
    \ and relies on the built-in type management features of Swift to select the right\
    \ method to process a collection object. Figure [25-1](#A978-1-4842-0394-1_25_Chapter.html#Fig1)\
    \ illustrates the visitor pattern.\n\n![A978-1-4842-0394-1_25_Fig1_HTML.jpg](A978-1-4842-0394-1_25_Fig1_HTML.jpg)\n\
    \nFigure 25-1. The visitor pattern\n\nThe visitor is a class that defines methods\
    \ called `visit` that receive each of the types in the collection managed by the\
    \ context class. The calling component provides the visitor to the context class,\
    \ which in turn passes it on to the `accept` method defined by each object in\
    \ the collection. Upon receipt of the visitor, each object calls the `visit` method,\
    \ relying on Swift to select the right version of the method; this is a technique\
    \ known as double dispatch. Don’t worry if this double method invocation doesn’t\
    \ make sense; it will become more obvious when you see the implementation code\
    \ in the next section, and I explain the reason that double dispatch works in\
    \ the “Understanding Double Dispatch” sidebar.\n\n## Implementing the Visitor\
    \ Pattern\n\nThe starting point to implementing the visitor pattern is to create\
    \ protocols that define the visitor and ensure that the objects in the collection\
    \ implement an `accept` method. Listing 25-5 shows the contents of the `Visitor.swift`\
    \ file, which I added to the example project.\n\n**Listing 25-5.** The Contents\
    \ of the `Visitor.swift` File\n\n```\nimport Foundation;\n\nprotocol Shape {\n\
    \n    func accept(visitor:Visitor);\n\n}\n\nprotocol Visitor {\n\n    func visit(shape:Circle);\n\
    \n    func visit(shape:Square);\n\n    func visit(shape:Rectangle);\n\n}\n```\n\
    \nThe `Shape` protocol defines the `accept` method, and the `Visitor` protocol\
    \ defines `visit` methods that accept each of the shape types in the application,\
    \ which is essential for double dispatch to work.\n\n## Understanding Double Dispatch\n\
    \nDouble dispatch underpins the visitor pattern, and it relies on Swift to select\
    \ a method based on the parameter type. Consider the following protocol and classes:\n\
    \n```\n...\n\nprotocol MyProtocol {\n\n    func dispatch(handler:Handler);\n\n\
    }\n\nclass FirstClass : MyProtocol {\n\n    func dispatch(handler: Handler) {\n\
    \n        handler.handle(self);\n\n    }\n\n}\n\nclass SecondClass : MyProtocol\
    \ {\n\n    func dispatch(handler: Handler) {\n\n        handler.handle(self)\n\
    \n    }\n\n}\n\n...\n```\n\nThe `FirstClass` and `SecondClass` both conform to\
    \ `MyProtocol`. The `dispatch` method defined by the protocol and implemented\
    \ by the classes is the key to the double dispatch technique, although the best\
    \ way to understand double dispatch is to see what happens without it. Here is\
    \ the definition of the `Handler` class that is accepted by the `dispatch` method:\n\
    \n```\n...\n\nclass Handler {\n\n    func handle(arg:MyProtocol) {\n\n       \
    \ println(\"Protocol\");\n\n    }\n\n    func handle(arg:FirstClass) {\n\n   \
    \     println(\"First Class\");\n\n    }\n\n    func handle(arg:SecondClass) {\n\
    \n        println(\"Second Class\");\n\n    }\n\n}\n\n...\n```\n\nConsider what\
    \ happens when I create an array of `FirstClass` and `SecondClass` objects and\
    \ pass them to a `Handler` object, like this:\n\n```\n...\n\nlet objects:[MyProtocol]\
    \ = [FirstClass(), SecondClass()];\n\nlet handler = Handler();\n\nfor object in\
    \ objects {\n\n    handler.handle(object);\n\n}\n\n...\n```\n\nThis is regular\
    \ single dispatch, in which I simply call the method of the `Handler` object for\
    \ each of the objects in the array. To be able to store a `FirstClass` object\
    \ and a `SecondClass` object in the same array, I have to specify its type as\
    \ `MyProtocol`, and this affects the version of the `handle` method selected by\
    \ Swift in the `for` loop, producing the following results:\n\n```\nProtocol\n\
    Protocol\n```\n\nBoth objects are dealt with using the type of the array. To enable\
    \ double dispatch, I have to change the method call in the `for` loop, like this:\n\
    \n```\n...\n\nfor object in objects {\n\n    object.dispatch(handler);\n\n}\n\n\
    ...\n```\n\nThe `dispatch` method implementations result in the `Handler.handle`\
    \ method being called from within the classes, but with the `self` argument. The\
    \ effect is to call the version of the `handle` method with the most specific\
    \ type, producing the following results:\n\n```\nFirst Class\nSecond Class\n```\n\
    \nCalling the `handle` method from within an objects method has the effect of\
    \ calling the method version with the most specific argument type without needing\
    \ to perform any casts, which is the central technique in the visitor pattern.\n\
    \n### Conforming to the Shape Protocol\n\nThe next step is to update the shape\
    \ classes so they confirm to the `Shape` pattern. As Listing 25-6 shows, each\
    \ shape class has the same implementation of the `accept` method.\n\n**Listing\
    \ 25-6.** Conforming to the `Shape` Protocol in the `Shapes.swift` File\n\n```\n\
    import Foundation;\n\nclass Circle : Shape {\n\n    let radius:Float;\n\n    init(radius:Float)\
    \ {\n\n        self.radius = radius;\n\n    }\n\n    func accept(visitor: Visitor)\
    \ {\n\n        visitor.visit(self);\n\n    }\n\n}\n\nclass Square : Shape {\n\n\
    \    let length:Float;\n\n    init(length:Float) {\n\n        self.length = length;\n\
    \n    }\n\n    func accept(visitor: Visitor) {\n\n        visitor.visit(self);\n\
    \n    }\n\n}\n\nclass Rectangle : Shape {\n\n    let xLen:Float;\n\n    let yLen:Float;\n\
    \n    init(x:Float, y:Float) {\n\n        self.xLen = x;\n\n        self.yLen\
    \ = y;\n\n    }\n\n    func accept(visitor: Visitor) {\n\n        visitor.visit(self);\n\
    \n    }\n\n}\n\nclass ShapeCollection {\n\n    let shapes:[Shape];\n\n    init()\
    \ {\n\n        shapes = [\n\n            Circle(radius: 2.5), Square(length: 4),\
    \ Rectangle(x: 10, y: 2)\n\n        ];\n\n    }\n\n    func accept(visitor: Visitor)\
    \ {\n\n        for shape in shapes {\n\n            shape.accept(visitor);\n\n\
    \        }\n\n    }\n\n}\n```\n\n**Tip:** I have modified the collection classes\
    \ directly to conform to the protocol, but don’t forget you can use Swift extensions\
    \ to add protocol conformance to classes without modifying them.\n\nI have also\
    \ added an `accept` method to the `ShapeCollection` class, which receives a `Visitor`\
    \ object and calls the `accept` method of each object in the collection, which\
    \ I have changed to a `Shape` array.\n\n### Creating the Visitors\n\nWith the\
    \ basic infrastructure in place, I can create the visitor classes that operate\
    \ on the collection of shape objects, as shown in Listing 25-7.\n\n**Listing 25-7.**\
    \ Defining the Visitors in the `Visitor.swift` File\n\n```\nimport Foundation;\n\
    \nprotocol Shape {\n\n    func accept(visitor:Visitor);\n\n}\n\nprotocol Visitor\
    \ {\n\n    func visit(shape:Circle);\n\n    func visit(shape:Square);\n\n    func\
    \ visit(shape:Rectangle);\n\n}\n\nclass AreaVisitor : Visitor {\n\n    var totalArea:Float\
    \ = 0;\n\n    func visit(shape: Circle) {\n\n        totalArea += (3.14 * powf(shape.radius,\
    \ 2));\n\n    }\n\n    func visit(shape: Square) {\n\n        totalArea += powf(shape.length,\
    \ 2);\n\n    }\n\n    func visit(shape: Rectangle) {\n\n        totalArea += (shape.xLen\
    \ * shape.yLen);\n\n    }\n\n}\n\nclass EdgesVisitor : Visitor {\n\n    var totalEdges\
    \ = 0;\n\n    func visit(shape: Circle) {\n\n        totalEdges += 1;\n\n    }\n\
    \n    func visit(shape: Square) {\n\n        totalEdges += 4;\n\n    }\n\n   \
    \ func visit(shape: Rectangle) {\n\n        totalEdges += 4;\n\n    }\n\n}\n```\n\
    \nThe use of double dispatch means that the appropriate version of the `visit`\
    \ method will be called for each object in the collection. This means I can access\
    \ the type-specific properties defined by the shape classes, without having to\
    \ cast from one type to another."
  raw: '## Understanding the Visitor Pattern


    The visitor pattern solves the problem by separating the algorithm that operates
    on the collection into a separate object and ensures that it defines methods that
    can handle each collected type. This allows the algorithm to be selected at runtime,
    which means that new behavior can be defined without having to modify or subclass
    the type that maintains the collection, conforming to the open/closed principle
    I described in [Chapter 23](#A978-1-4842-0394-1_23_Chapter.html).


    Ensuring that the algorithm object has a method to handle each collected type
    avoids the conditional casting code and relies on the built-in type management
    features of Swift to select the right method to process a collection object. Figure
    [25-1](#A978-1-4842-0394-1_25_Chapter.html#Fig1) illustrates the visitor pattern.


    ![A978-1-4842-0394-1_25_Fig1_HTML.jpg](A978-1-4842-0394-1_25_Fig1_HTML.jpg)


    Figure 25-1.


    The visitor pattern


    The visitor is a class that defines methods called `visit` that receive each of
    the types in the collection managed by the context class. The calling component
    provides the visitor to the context class, which in turn passes it on to the `accept`
    method defined by each object in the collection. Upon receipt of the visitor,
    each object calls the `visit` method, relying on Swift to select the right version
    of the method; this is a technique known as double dispatch. Don’t worry if this
    double method invocation doesn’t make sense; it will become more obvious when
    you see the implementation code in the next section, and I explain the reason
    that double dispatch works in the “Understanding Double Dispatch” sidebar.


    ## Implementing the Visitor Pattern


    The starting point to implementing the visitor pattern is to create protocols
    that define the visitor and ensure that the objects in the collection implement
    an `accept` method. Listing 25-5 shows the contents of the `Visitor.swift` file,
    which I added to the example project.


    Listing 25-5. The Contents of the Visitor.swift File


    `import Foundation;`


    `protocol Shape {`


    `func accept(visitor:Visitor);`


    `}`


    `protocol Visitor {`


    `func visit(shape:Circle);`


    `func visit(shape:Square);`


    `func visit(shape:Rectangle);`


    `}`


    The `Shape` protocol defines the `accept` method, and the `Visitor` protocol defines
    `visit` methods that accept each of the shape types in the application, which
    is essential for double dispatch to work.


    UNDERSTANDING DOUBLE DISPATCH


    Double dispatch underpins the visitor pattern, and it relies on Swift to select
    a method based on the parameter type. Consider the following protocol and classes:


    `...`


    `protocol MyProtocol {`


    `func dispatch(handler:Handler);`


    `}`


    `class FirstClass : MyProtocol {`


    `func dispatch(handler: Handler) {`


    `handler.handle(self);`


    `}`


    `}`


    `class SecondClass : MyProtocol {`


    `func dispatch(handler: Handler) {`


    `handler.handle(self)`


    `}`


    `}`


    `...`


    The `FirstClass` and `SecondClass` both conform to `MyProtocol`. The `dispatch`
    method defined by the protocol and implemented by the classes is the key to the
    double dispatch technique, although the best way to understand double dispatch
    is to see what happens without it. Here is the definition of the `Handler` class
    that is accepted by the `dispatch` method:


    `...`


    `class Handler {`


    `func handle(arg:MyProtocol) {`


    `println("Protocol");`


    `}`


    `func handle(arg:FirstClass) {`


    `println("First Class");`


    `}`


    `func handle(arg:SecondClass) {`


    `println("Second Class");`


    `}`


    `}`


    `...`


    Consider what happens when I create an array of `FirstClass` and `SecondClass`
    objects and pass them to a `Handler` object, like this:


    `...`


    `let objects:[MyProtocol] = [FirstClass(), SecondClass()];`


    `let handler = Handler();`


    `for object in objects {`


    `handler.handle(object);`


    `}`


    `...`


    This is regular single dispatch, in which I simply call the method of the `Handler`
    object for each of the objects in the array. To be able to store a `FirstClass`
    object and a `SecondClass` object in the same array, I have to specify its type
    as `MyProtocol`, and this affects the version of the `handle` method selected
    by Swift in the `for` loop, producing the following results:


    `Protocol`


    `Protocol`


    Both objects are dealt with using the type of the array. To enable double dispatch,
    I have to change the method call in the `for` loop, like this:


    `...`


    `for object in objects {`


    `object.dispatch(handler);`


    `}`


    `...`


    The `dispatch` method implementations result in the `Handler.handle` method being
    called from within the classes, but with the `self` argument. The effect is to
    call the version of the `handle` method with the most specific type, producing
    the following results:


    `First Class`


    `Second Class`


    Calling the `handle` method from within an objects method has the effect of calling
    the method version with the most specific argument type without needing to perform
    any casts, which is the central technique in the visitor pattern.


    ### Conforming to the Shape Protocol


    The next step is to update the shape classes so they confirm to the `Shape` pattern.
    As Listing 25-6 shows, each shape class has the same implementation of the `accept`
    method.


    Listing 25-6. Conforming to the Shape Protocol in the Shapes.swift File


    `import Foundation;`


    `class Circle : Shape {`


    `let radius:Float;`


    `init(radius:Float) {`


    `self.radius = radius;`


    `}`


    `func accept(visitor: Visitor) {`


    `visitor.visit(self);`


    `}`


    `}`


    `class Square : Shape {`


    `let length:Float;`


    `init(length:Float) {`


    `self.length = length;`


    `}`


    `func accept(visitor: Visitor) {`


    `visitor.visit(self);`


    `}`


    `}`


    `class Rectangle : Shape {`


    `let xLen:Float;`


    `let yLen:Float;`


    `init(x:Float, y:Float) {`


    `self.xLen = x;`


    `self.yLen = y;`


    `}`


    `func accept(visitor: Visitor) {`


    `visitor.visit(self);`


    `}`


    `}`


    `class ShapeCollection {`


    `let shapes:[Shape];`


    `init() {`


    `shapes = [`


    `Circle(radius: 2.5), Square(length: 4), Rectangle(x: 10, y: 2)`


    `];`


    `}`


    `func accept(visitor: Visitor) {`


    `for shape in shapes {`


    `shape.accept(visitor);`


    `}`


    `}`


    `}`


    Tip


    I have modified the collection classes directly to conform to the protocol, but
    don’t forget you can use Swift extensions to add protocol conformance to classes
    without modifying them.


    I have also added an `accept` method to the `ShapeCollection` class, which receives
    a `Visitor` object and calls the `accept` method of each object in the collection,
    which I have changed to a `Shape` array.


    ### Creating the Visitors


    With the basic infrastructure in place, I can create the visitor classes that
    operate on the collection of shape objects, as shown in Listing 25-7.


    Listing 25-7. Defining the Visitors in the Visitor.swift File


    `import Foundation;`


    `protocol Shape {`


    `func accept(visitor:Visitor);`


    `}`


    `protocol Visitor {`


    `func visit(shape:Circle);`


    `func visit(shape:Square);`


    `func visit(shape:Rectangle);`


    `}`


    `class AreaVisitor : Visitor {`


    `var totalArea:Float = 0;`


    `func visit(shape: Circle) {`


    `totalArea += (3.14 * powf(shape.radius, 2));`


    `}`


    `func visit(shape: Square) {`


    `totalArea += powf(shape.length, 2);`


    `}`


    `func visit(shape: Rectangle) {`


    `totalArea += (shape.xLen * shape.yLen);`


    `}`


    `}`


    `class EdgesVisitor : Visitor {`


    `var totalEdges = 0;`


    `func visit(shape: Circle) {`


    `totalEdges += 1;`


    `}`


    `func visit(shape: Square) {`


    `totalEdges += 4;`


    `}`


    `func visit(shape: Rectangle) {`


    `totalEdges += 4;`


    `}`


    `}`


    The use of double dispatch means that the appropriate version of the `visit` method
    will be called for each object in the collection. This means I can access the
    type-specific properties defined by the shape classes, without having to cast
    from one type to another.'
  trans: "\n## 理解访问者模式\n\n访问者模式通过将作用于集合的算法分离到独立的对象中，并确保该对象定义了能处理每种集合类型的方法，从而解决了这个问题。这使得算法可以在运行时被选择，这意味着无需修改或子类化维护集合的类型即可定义新的行为，这遵循了我在第\
    \ 23 章中描述的开闭原则。\n\n确保算法对象拥有处理每种集合类型的方法，可以避免使用条件类型转换代码，并依靠 Swift 的内置类型管理特性来选择处理集合对象的正确方法。图\
    \ 25-1 展示了访问者模式。\n\n![A978-1-4842-0394-1_25_Fig1_HTML.jpg](img/A978-1-4842-0394-1_25_Fig1_HTML.jpg)\n\
    \n图 25-1. 访问者模式\n\n访问者是一个定义了名为 `visit` 方法的类，这些方法接收由上下文类管理的集合中的每一种类型。调用组件将访问者提供给上下文类，上下文类再将其传递给集合中每个对象定义的\
    \ `accept` 方法。每个对象在收到访问者后，调用 `visit` 方法，并依靠 Swift 来选择该方法的正确版本；这是一种称为双重分派的技术。如果这种双重方法调用让你感到困惑，不必担心；当你看到下一节中的实现代码时，它会变得更加清晰，我将在“理解双重分派”边栏中解释双重分派有效的原因。\n\
    \n## 实现访问者模式\n\n实现访问者模式的起点是创建定义访问者的协议，并确保集合中的对象实现一个 `accept` 方法。清单 25-5 展示了我添加到示例项目中的\
    \ `Visitor.swift` 文件的内容。\n\n**清单 25-5.** `Visitor.swift` 文件的内容\n\n```\nimport\
    \ Foundation;\n\nprotocol Shape {\n\n    func accept(visitor:Visitor);\n\n}\n\n\
    protocol Visitor {\n\n    func visit(shape:Circle);\n\n    func visit(shape:Square);\n\
    \n    func visit(shape:Rectangle);\n\n}\n```\n\n`Shape` 协议定义了 `accept` 方法，`Visitor`\
    \ 协议定义了接受应用程序中每种形状类型的 `visit` 方法，这对于双重分派的实现至关重要。\n\n## 理解双重分派\n\n双重分派是访问者模式的基础，它依靠\
    \ Swift 根据参数类型选择方法。考虑以下协议和类：\n\n```\n...\n\nprotocol MyProtocol {\n\n    func\
    \ dispatch(handler:Handler);\n\n}\n\nclass FirstClass : MyProtocol {\n\n    func\
    \ dispatch(handler: Handler) {\n\n        handler.handle(self);\n\n    }\n\n}\n\
    \nclass SecondClass : MyProtocol {\n\n    func dispatch(handler: Handler) {\n\n\
    \        handler.handle(self)\n\n    }\n\n}\n\n...\n```\n\n`FirstClass` 和 `SecondClass`\
    \ 都遵循 `MyProtocol` 协议。由协议定义并由这些类实现的 `dispatch` 方法是双重分派技术的关键，尽管理解双重分派的最佳方式是看看没有它会发生什么。以下是\
    \ `dispatch` 方法接受的 `Handler` 类的定义：\n\n```\n...\n\nclass Handler {\n\n    func\
    \ handle(arg:MyProtocol) {\n\n        println(\"Protocol\");\n\n    }\n\n    func\
    \ handle(arg:FirstClass) {\n\n        println(\"First Class\");\n\n    }\n\n \
    \   func handle(arg:SecondClass) {\n\n        println(\"Second Class\");\n\n \
    \   }\n\n}\n\n...\n```\n\n考虑当我创建一个包含 `FirstClass` 和 `SecondClass` 对象的数组，并将它们传递给一个\
    \ `Handler` 对象时会发生什么，就像这样：\n\n```\n...\n\nlet objects:[MyProtocol] = [FirstClass(),\
    \ SecondClass()];\n\nlet handler = Handler();\n\nfor object in objects {\n\n \
    \   handler.handle(object);\n\n}\n\n...\n```\n\n这是常规的单重分派，我只是针对数组中的每个对象调用 `Handler`\
    \ 对象的方法。为了能够将 `FirstClass` 对象和 `SecondClass` 对象存储在同一个数组中，我必须将其类型指定为 `MyProtocol`，这会影响\
    \ Swift 在 `for` 循环中选择的 `handle` 方法版本，并产生以下结果：\n\n```\nProtocol\nProtocol\n```\n\
    \n两个对象都使用数组的类型进行处理。为了启用双重分派，我必须更改 `for` 循环中的方法调用，如下所示：\n\n```\n...\n\nfor object\
    \ in objects {\n\n    object.dispatch(handler);\n\n}\n\n...\n```\n\n`dispatch`\
    \ 方法的实现导致从类内部调用 `Handler.handle` 方法，但参数是 `self`。其效果是调用了具有最具体类型的 `handle` 方法版本，并产生以下结果：\n\
    \n```\nFirst Class\nSecond Class\n```\n\n从对象方法内部调用 `handle` 方法的效果是，无需执行任何类型转换，就能调用具有最具体参数类型的方法版本，这是访问者模式的核心技术。\n\
    \n### 遵循 Shape 协议\n\n下一步是更新形状类，使它们遵循 `Shape` 协议。如清单 25-6 所示，每个形状类对 `accept` 方法都有相同的实现。\n\
    \n**清单 25-6.** 在 `Shapes.swift` 文件中遵循 `Shape` 协议\n\n```\nimport Foundation;\n\n\
    class Circle : Shape {\n\n    let radius:Float;\n\n    init(radius:Float) {\n\n\
    \        self.radius = radius;\n\n    }\n\n    func accept(visitor: Visitor) {\n\
    \n        visitor.visit(self);\n\n    }\n\n}\n\nclass Square : Shape {\n\n   \
    \ let length:Float;\n\n    init(length:Float) {\n\n        self.length = length;\n\
    \n    }\n\n    func accept(visitor: Visitor) {\n\n        visitor.visit(self);\n\
    \n    }\n\n}\n\nclass Rectangle : Shape {\n\n    let xLen:Float;\n\n    let yLen:Float;\n\
    \n    init(x:Float, y:Float) {\n\n        self.xLen = x;\n\n        self.yLen\
    \ = y;\n\n    }\n\n    func accept(visitor: Visitor) {\n\n        visitor.visit(self);\n\
    \n    }\n\n}\n\nclass ShapeCollection {\n\n    let shapes:[Shape];\n\n    init()\
    \ {\n\n        shapes = [\n\n            Circle(radius: 2.5), Square(length: 4),\
    \ Rectangle(x: 10, y: 2)\n\n        ];\n\n    }\n\n    func accept(visitor: Visitor)\
    \ {\n\n        for shape in shapes {\n\n            shape.accept(visitor);\n\n\
    \        }\n\n    }\n\n}\n```\n\n**提示：** 我直接修改了集合类以遵循协议，但别忘了你可以使用 Swift 扩展来为类添加协议遵循，而无需修改它们。\n\
    \n我还为 `ShapeCollection` 类添加了一个 `accept` 方法，该方法接收一个 `Visitor` 对象，并调用集合中每个对象的 `accept`\
    \ 方法，我已将集合改为 `Shape` 数组。\n\n### 创建访问者\n\n有了基本的基础设施，我就可以创建操作形状对象集合的访问者类了，如清单 25-7\
    \ 所示。\n\n**清单 25-7.** 在 `Visitor.swift` 文件中定义访问者\n\n```\nimport Foundation;\n\n\
    protocol Shape {\n\n    func accept(visitor:Visitor);\n\n}\n\nprotocol Visitor\
    \ {\n\n    func visit(shape:Circle);\n\n    func visit(shape:Square);\n\n    func\
    \ visit(shape:Rectangle);\n\n}\n\nclass AreaVisitor : Visitor {\n\n    var totalArea:Float\
    \ = 0;\n\n    func visit(shape: Circle) {\n\n        totalArea += (3.14 * powf(shape.radius,\
    \ 2));\n\n    }\n\n    func visit(shape: Square) {\n\n        totalArea += powf(shape.length,\
    \ 2);\n\n    }\n\n    func visit(shape: Rectangle) {\n\n        totalArea += (shape.xLen\
    \ * shape.yLen);\n\n    }\n\n}\n\nclass EdgesVisitor : Visitor {\n\n    var totalEdges\
    \ = 0;\n\n    func visit(shape: Circle) {\n\n        totalEdges += 1;\n\n    }\n\
    \n    func visit(shape: Square) {\n\n        totalEdges += 4;\n\n    }\n\n   \
    \ func visit(shape: Rectangle) {\n\n        totalEdges += 4;\n\n    }\n\n}\n```\n\
    \n使用双重分派意味着将为集合中的每个对象调用相应版本的 `visit` 方法。这意味着我可以访问形状类定义的特定于类型的属性，而无需从一种类型转换到另一种类型。\n"
