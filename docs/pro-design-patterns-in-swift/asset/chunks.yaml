    \n`Command`类表示每个`Peer`将被要求执行的命令。如你在第 20 章中所见，有不同方式来安排命令的定义和执行。我选择的这种方式意味着**中介者**将调用该命令，将每个`Peer`传递给`Command`对象的`execute`方法。我这样做是因为我想捕获执行命令的结果值，并将这些结果的数组呈现给调用方`Peer`。\n\
    \n`CommandMediator`类是我在标准模式实现中所用中介者的变体，它提供了一个`dispatchCommand`方法，该方法接受一个`Command`对象，并将每个`CommandPeer`传递给它对应的函数。在每个`Peer`上执行命令的结果被收集到一个数组中，并作为结果返回给调用方`Peer`。\n\
    \n代码清单 21-13 展示了如何更新`Airplane`类以使用基于命令的中介者。\n\n**代码清单 21-13. 在`Airplane.swift`文件中使用`CommandMediator`**\n\
    \n```swift\nimport Foundation\n\nstruct Position {\n    var distanceFromRunway:Int;\n\
    \    var height:Int;\n}\n\nclass Airplane : CommandPeer {\n    var name:String;\n\
    \    var currentPosition:Position;\n    var mediator:CommandMediator;\n    let\
    \ queue = dispatch_queue_create(\"posQ\", DISPATCH_QUEUE_CONCURRENT);\n\n    init(name:String,\
    \ initialPos:Position, mediator: CommandMediator) {\n        self.name = name;\n\
    \        self.currentPosition = initialPos;\n        self.mediator = mediator;\n\
    \        mediator.registerPeer(self);\n    }\n\n    func otherPlaneDidChangePosition(position:Position)\
    \ -> Bool {\n        var result = false;\n        dispatch_sync(self.queue, {()\
    \ in\n            result = position.distanceFromRunway\n                == self.currentPosition.distanceFromRunway\n\
    \                && abs(position.height - self.currentPosition.height) < 1000;\n\
    \        });\n        return result;\n    }\n\n    func changePosition(newPosition:Position)\
    \ {\n        dispatch_barrier_sync(self.queue, {() in\n            self.currentPosition\
    \ = newPosition;\n            let c = Command(function: {peer in\n           \
    \     if let plane = peer as? Airplane {\n                    return plane.otherPlaneDidChangePosition\
    \ (self.currentPosition);\n                } else {\n                    fatalError(\"\
    Type mismatch\");\n                }\n            });\n            let allResults\
    \ = self.mediator.dispatchCommand(self, command: c);\n            for result in\
    \ allResults {\n                if result as? Bool == true {\n               \
    \     println(\"\\(self.name): Too close! Abort!\");\n                    return;\n\
    \                }\n            }\n            println(\"\\(self.name): Position\
    \ changed\");\n        });\n    }\n\n    func land() {\n        dispatch_barrier_sync(self.queue,\
    \ { () in\n            self.currentPosition = Position(distanceFromRunway: 0,\
    \ height: 0);\n            self.mediator.unregisterPeer(self);\n            println(\"\
    \\(self.name): Landed\");\n        });\n    }\n}\n```\n\n这种方法创建了一个**中介者**，它可以处理任何实例化自遵循`CommandPeer`协议的类的对象组，但需要谨慎，因为`Peer`创建的`Command`对象必须假设命令将对其执行的`Peer`类型。由于任何`Peer`都可以发送命令，这意味着所有`Peer`必须派生自同一个基类，并且你不能使用`CommandMediator`类来调解不同类型的对象，即使它们都是实例化自遵循`CommandPeer`协议的类。\n\
    \n`Airplane`类中`changePosition`方法的实现创建了一个命令，该命令将`Peer`对象转换为`Airplane`类型并调用`otherPlaneDidChangePosition`方法。如果`Peer`无法转换为`Airplane`，我会调用全局的`fatalError`函数，因为在这种情况下中介者的行为是未定义的。\n\
    \n最后的更改在`main.swift`文件中，我必须创建一个`CommandMediator`类的实例，如代码清单 21-14 所示。\n\n**代码清单\
    \ 21-14. 在`main.swift`文件中使用`CommandMediator`类**\n\n```swift\nlet mediator = CommandMediator();\n\
    \n// initial setup\nlet british = Airplane(name: \"BA706\", initialPos:\n    Position(distanceFromRunway:\
    \ 11, height: 21000), mediator:mediator);\n\n// new plane arrives\nlet american\
    \ = Airplane(name: \"AA101\", initialPos:\n    Position(distanceFromRunway: 12,\
    \ height: 22000), mediator:mediator);\n\n// plane approaches airport\nbritish.changePosition(Position(distanceFromRunway:\
    \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2,\
    \ height: 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height:\
    \ 1000));\n\n// new plane arrives\nlet cathay = Airplane(name: \"CX200\", initialPos:\n\
    \    Position(distanceFromRunway: 13, height: 22000), mediator:mediator);\n\n\
    // plane lands\nbritish.land();\n\n// plane moves too close\ncathay.changePosition(Position(distanceFromRunway:\
    \ 12, height: 22000));\n```\n\n你可以运行应用程序以测试更改是否影响输出，输出如下：\n\n```\nBA706: Position\
    \ changed\nBA706: Position changed\nBA706: Position changed\nBA706: Landed\nCX200:\
    \ Too close! Abort!\n```\n"
- fmt: "#### Generalizing the Mediator with Messages\n\nAn alternative approach is\
    \ to target a single method on peer objects and provide sufficient information\
    \ to let the peer work out what response is needed. This avoids the assumptions\
    \ about the type of the peer objects and allows peers of different types to be\
    \ used with a single mediator, but it means that all peers need to have the same\
    \ understanding about the range of messages that will be sent, which presents\
    \ its own problems. Listing 21-15 shows how I have defined the protocol and implementation\
    \ class required for the message-based mediator in a new file called `MessageMediator.swift`\
    \ that I added to the example project.\n\n**Listing 21-15.** The Contents of the\
    \ `MessageMediator.swift` File\n\n```\nprotocol MessagePeer {\n    var name:String\
    \ { get };\n    func handleMessage(messageType:String, data:Any?) -> Any?;\n}\n\
    \nclass MessageMediator {\n    private var peers = [String:MessagePeer]();\n \
    \   \n    func registerPeer(peer:MessagePeer) {\n        peers[peer.name] = peer;\n\
    \    }\n    \n    func unregisterPeer(peer:MessagePeer) {\n        peers.removeValueForKey(peer.name);\n\
    \    }\n    \n    func sendMessage(caller:MessagePeer, messageType:String, data:Any)\
    \ -> [Any?] {\n        var results = [Any?]();\n        for peer in peers.values\
    \ {\n            if (peer.name != caller.name) {\n                results.append(peer.handleMessage(messageType,\
    \ data: data));\n            }\n        }\n        return results;\n    }\n}\n\
    ```\n\nThe `MessagePeer` protocol defines a `name` property so that the mediator\
    \ can identify the sender of a message and defines a `handleMessage` method that\
    \ is passed a string describing the message type and an optional `Any` data value,\
    \ which will be used to provide data about the message to peers. The `MessageMediator`\
    \ class keeps track of peers and also defines a `sendMessage` method that peers\
    \ call to dispatch a message to their counterparts. The mediator gathers the set\
    \ of results from the peers and returns them in an array to the caller. Listing\
    \ 21-16 shows how I changed the implementation of the `Airplane` class to use\
    \ the message-based mediator.\n\n**Listing 21-16.** Using the Message-Based Mediator\
    \ in the `Airplane.swift` File\n\n```\nimport Foundation\n\nstruct Position {\n\
    \    var distanceFromRunway:Int;\n    var height:Int;\n}\n\nclass Airplane : MessagePeer\
    \ {\n    var name:String;\n    var currentPosition:Position;\n    var mediator:MessageMediator;\n\
    \    let queue = dispatch_queue_create(\"posQ\", DISPATCH_QUEUE_CONCURRENT);\n\
    \    \n    init(name:String, initialPos:Position, mediator: MessageMediator) {\n\
    \        self.name = name;\n        self.currentPosition = initialPos;\n     \
    \   self.mediator = mediator;\n        mediator.registerPeer(self);\n    }\n \
    \   \n    func handleMessage(messageType: String, data: Any?) -> Any? {\n    \
    \    var result:Any?;\n        switch (messageType) {\n            case \"changePos\"\
    :\n            if let pos = data as? Position {\n                result = otherPlaneDidChangePosition(pos);\n\
    \            }\n            default:\n            fatalError(\"Unknown message\
    \ type\");\n        }\n        return result;\n    }\n    \n    func otherPlaneDidChangePosition(position:Position)\
    \ -> Bool {\n        var result = false;\n        dispatch_sync(self.queue, {()\
    \ in\n            result = position.distanceFromRunway\n            == self.currentPosition.distanceFromRunway\n\
    \            && abs(position.height - self.currentPosition.height) < 1000;\n \
    \       });\n        return result;\n    }\n    \n    func changePosition(newPosition:Position)\
    \ {\n        dispatch_barrier_sync(self.queue, {() in\n            self.currentPosition\
    \ = newPosition;\n            let allResults = self.mediator.sendMessage(self,\n\
    \                messageType: \"changePos\", data: newPosition);\n           \
    \ for result in allResults {\n                if result as? Bool == true {\n \
    \                   println(\"\\(self.name): Too close! Abort!\");\n         \
    \           return;\n                }\n            }\n            println(\"\\\
    (self.name): Position changed\");\n        });\n    }\n    \n    func land() {\n\
    \        dispatch_barrier_sync(self.queue, { () in\n            self.currentPosition\
    \ = Position(distanceFromRunway: 0, height: 0);\n            self.mediator.unregisterPeer(self);\n\
    \            println(\"\\(self.name): Landed\");\n        });\n    }\n}\n```\n\
    \nThe advantage of this approach is that the `Airplane` class doesn't need to\
    \ make any assumptions about the other peers—but this comes at the cost of needing\
    \ to ensure that all peers know about the same set of message types and respond\
    \ to them in a consistent and useful manner. This is harder than it sounds in\
    \ a complex application, and it is easy to have multiple peer types whose message\
    \ handling drifts apart as the application becomes more complex. To complete this\
    \ implementation, I need to use the `MessageMediator` class in the `main.swift`\
    \ file, as shown in Listing 21-17.\n\n**Listing 21-17.** Using the `MessageMediator`\
    \ Class in the `main.swift` File\n\n```\nlet mediator = MessageMediator();\n\n\
    // initial setup\nlet british = Airplane(name: \"BA706\", initialPos:\n    Position(distanceFromRunway:\
    \ 11, height: 21000), mediator:mediator);\n\n// new plane arrives\nlet american\
    \ = Airplane(name: \"AA101\", initialPos:\n    Position(distanceFromRunway: 12,\
    \ height: 22000), mediator:mediator);\n\n// plane approaches airport\nbritish.changePosition(Position(distanceFromRunway:\
    \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2,\
    \ height: 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height:\
    \ 1000));\n\n// new plane arrives\nlet cathay = Airplane(name: \"CX200\", initialPos:\n\
    \    Position(distanceFromRunway: 13, height: 22000), mediator:mediator);\n\n\
    // plane lands\nbritish.land();\n\n// plane moves too close\ncathay.changePosition(Position(distanceFromRunway:\
    \ 12, height: 22000));\n```\n\n## Understanding the Pitfalls of the Mediator Pattern\n\
    \nThe most important pitfall to avoid is revealing details of one peer to another.\
    \ The mediator should keep its peer collection private and not allow peers to\
    \ locate or depend on one another, other than indirectly through the mediator.\
    \ If you are implementing methods that return result, for example, then you must\
    \ ensure that the peers do not return `self` as the result or, if they do, that\
    \ the mediator doesn't pass the reference back to the calling peer. Programmers\
    \ like shortcuts, and allowing direct peer-to-peer contact allows the lazy programmer\
    \ to bypass the mediator and undermine the pattern implementation.\n\n### The\
    \ Single Protocol Pitfall\n\nA common pitfall is to make the peers and the mediator\
    \ conform to a common protocol, such that the peers do not know that a mediator\
    \ is being used, believing instead that they are dealing with a single peer object.\
    \ This may seem like a clever idea, but it ends in messy and confusing code because\
    \ there is rarely a one-to-one mapping of the methods that the mediator provides\
    \ to the methods that must be exposed by the peers. My advice is to use separate\
    \ protocols for the peers and the mediator, which ensures that implementation\
    \ classes don't have to implement phantom methods or create tortured mappings\
    \ between methods."
  raw: '#### Generalizing the Mediator with Messages


    An alternative approach is to target a single method on peer objects and provide
    sufficient information to let the peer work out what response is needed. This
    avoids the assumptions about the type of the peer objects and allows peers of
    different types to be used with a single mediator, but it means that all peers
    need to have the same understanding about the range of messages that will be sent,
    which presents its own problems. Listing 21-15 shows how I have defined the protocol
    and implementation class required for the message-based mediator in a new file
    called `MessageMediator.swift` that I added to the example project.


    Listing 21-15. The Contents of the MessageMediator.swift File


    `protocol MessagePeer {`


    `var name:String { get };`


    `func handleMessage(messageType:String, data:Any?) -> Any?;`


    `}`


    `class MessageMediator {`


    `private var peers = [String:MessagePeer]();`


    `func registerPeer(peer:MessagePeer) {`


    `peers[peer.name] = peer;`


    `}`


    `func unregisterPeer(peer:MessagePeer) {`


    `peers.removeValueForKey(peer.name);`


    `}`


    `func sendMessage(caller:MessagePeer, messageType:String, data:Any) -> [Any?]
    {`


    `var results = [Any?]();`


    `for peer in peers.values {`


    `if (peer.name != caller.name) {`


    `results.append(peer.handleMessage(messageType, data: data));`


    `}`


    `}`


    `return results;`


    `}`


    `}`


    The `MessagePeer` protocol defines a `name` property so that the mediator can
    identify the sender of a message and defines a `handleMessage` method that is
    passed a string describing the message type and an optional `Any` data value,
    which will be used to provide data about the message to peers. The `MessageMediator`
    class keeps track of peers and also defines a `sendMessage` method that peers
    call to dispatch a message to their counterparts. The mediator gathers the set
    of results from the peers and returns them in an array to the caller. Listing
    21-16 shows how I changed the implementation of the `Airplane` class to use the
    message-based mediator.


    Listing 21-16. Using the Message-Based Mediator in the Airplane.swift File


    `import Foundation`


    `struct Position {`


    `var distanceFromRunway:Int;`


    `var height:Int;`


    `}`


    `class Airplane : MessagePeer {`


    `var name:String;`


    `var currentPosition:Position;`


    `var mediator:MessageMediator;`


    `let queue = dispatch_queue_create("posQ", DISPATCH_QUEUE_CONCURRENT);`


    `init(name:String, initialPos:Position, mediator: MessageMediator) {`


    `self.name = name;`


    `self.currentPosition = initialPos;`


    `self.mediator = mediator;`


    `mediator.registerPeer(self);`


    `}`


    `func handleMessage(messageType: String, data: Any?) -> Any? {`


    `var result:Any?;`


    `switch (messageType) {`


    `case "changePos":`


    `if let pos = data as? Position {`


    `result = otherPlaneDidChangePosition(pos);`


    `}`


    `default:`


    `fatalError("Unknown message type");`


    `}`


    `return result;`


    `}`


    `func otherPlaneDidChangePosition(position:Position) -> Bool {`


    `var result = false;`


    `dispatch_sync(self.queue, {() in`


    `result = position.distanceFromRunway`


    `== self.currentPosition.distanceFromRunway`


    `&& abs(position.height - self.currentPosition.height) < 1000;`


    `});`


    `return result;`


    `}`


    `func changePosition(newPosition:Position) {`


    `dispatch_barrier_sync(self.queue, {() in`


    `self.currentPosition = newPosition;`


    `let allResults = self.mediator.sendMessage(self,`


    `messageType: "changePos", data: newPosition);`


    `for result in allResults {`


    `if result as? Bool == true {`


    `println("\(self.name): Too close! Abort!");`


    `return;`


    `}`


    `}`


    `println("\(self.name): Position changed");`


    `});`


    `}`


    `func land() {`


    `dispatch_barrier_sync(self.queue, { () in`


    `self.currentPosition = Position(distanceFromRunway: 0, height: 0);`


    `self.mediator.unregisterPeer(self);`


    `println("\(self.name): Landed");`


    `});`


    `}`


    `}`


    The advantage of this approach is that the `Airplane` class doesn’t need to make
    any assumptions about the other peers—but this comes at the cost of needing to
    ensure that all peers know about the same set of message types and respond to
    them in a consistent and useful manner. This is harder than it sounds in a complex
    application, and it is easy to have multiple peer types whose message handling
    drifts apart as the application becomes more complex. To complete this implementation,
    I need to use the `MessageMediator` class in the `main.swift` file, as shown in
    Listing 21-17.


    Listing 21-17. Using the MessageMediator Class in the main.swift File


    `let mediator = MessageMediator();`


    `// initial setup`


    `let british = Airplane(name: "BA706", initialPos:`


    `Position(distanceFromRunway: 11, height: 21000), mediator:mediator);`


    `// new plane arrives`


    `let american = Airplane(name: "AA101", initialPos:`


    `Position(distanceFromRunway: 12, height: 22000), mediator:mediator);`


    `// plane approaches airport`


    `british.changePosition(Position(distanceFromRunway: 8, height: 10000));`


    `british.changePosition(Position(distanceFromRunway: 2, height: 5000));`


    `british.changePosition(Position(distanceFromRunway: 1, height: 1000));`


    `// new plane arrives`


    `let cathay = Airplane(name: "CX200", initialPos:`


    `Position(distanceFromRunway: 13, height: 22000), mediator:mediator);`


    `// plane lands`


    `british.land();`


    `// plane moves too close`


    `cathay.changePosition(Position(distanceFromRunway: 12, height: 22000));`


    ## Understanding the Pitfalls of the Mediator Pattern


    The most important pitfall to avoid is revealing details of one peer to another.
    The mediator should keep its peer collection private and not allow peers to locate
    or depend on one another, other than indirectly through the mediator. If you are
    implementing methods that return result, for example, then you must ensure that
    the peers do not return `self` as the result or, if they do, that the mediator
    doesn’t pass the reference back to the calling peer. Programmers like shortcuts,
    and allowing direct peer-to-peer contact allows the lazy programmer to bypass
    the mediator and undermine the pattern implementation.


    ### The Single Protocol Pitfall


    A common pitfall is to make the peers and the mediator conform to a common protocol,
    such that the peers do not know that a mediator is being used, believing instead
    that they are dealing with a single peer object. This may seem like a clever idea,
    but it ends in messy and confusing code because there is rarely a one-to-one mapping
    of the methods that the mediator provides to the methods that must be exposed
    by the peers. My advice is to use separate protocols for the peers and the mediator,
    which ensures that implementation classes don’t have to implement phantom methods
    or create tortured mappings between methods.'
