    ...\nvar totalPrice:Float {\n    let partReducer = {(subtotal:Float, part:Part)\
    \ -> Float in\n        return subtotal + part.price};\n    var total = reduce(parts,\
    \ 0, partReducer);\n    return reduce(compositeParts, total, {(subtotal, cpart)\
    \ -> Float in\n        return reduce(cpart.parts, subtotal, partReducer);\n  \
    \  });\n}\n...\n```\n\nThe need for the components that operate on parts to understand\
    \ the relationship between the `Part` and `CompositePart` classes means that I\
    \ have to duplicate this kind of code in each of those components.\n\n# Understanding\
    \ the Composite Pattern\n\nThe composite pattern solves the problems I described\
