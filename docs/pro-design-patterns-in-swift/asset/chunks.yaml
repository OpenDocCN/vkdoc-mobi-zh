  raw: '## Preparing the Example Project


    For this chapter I created an Xcode OS X Command Line Tool project called Observer.
    I added a file to the project called `SystemComponents.swift` and used it to define
    the classes shown in Listing 22-1.


    Listing 22-1. The Contents of the SystemComponents.swift File


    `class ActivityLog {`


    `func logActivity(activity:String) {`


    `println("Log: \(activity)");`


    `}`


    `}`


    `class FileCache {`


    `func loadFiles(user:String) {`


    `println("Load files for \(user)");`


    `}`


    `}`


    `class AttackMonitor {`


    `var monitorSuspiciousActivity: Bool = false {`


    `didSet {`


    `println("Monitoring for attack: \(monitorSuspiciousActivity)");`


    `}`


    `}`


    `}`


    The three classes I have defined represent generic application components. I don’t
    need to implement the components in any detail to demonstrate the pattern, and
    so they all write messages to the debug console to indicate they are being used.
    The `ActivityLog` represents a logging system that accepts details of system events,
    the `FileCache` class represents a cache that loads the files belonging to a given
    user, and the `AttackMonitor` class represents a security service that monitors
    system behavior when something suspicious has occurred. Listing 22-2 shows the
    contents of the `Authentication.swift` file, in which I defined a class that uses
    the system components.


    Listing 22-2. The Contents of the Authentication.swift File


    `class AuthenticationManager {`


    `private let log = ActivityLog();`


    `private let cache = FileCache();`


    `private let monitor = AttackMonitor();`


    `func authenticate(user:String, pass:String) -> Bool {`


    `var result = false;`


    `if (user == "bob" && pass == "secret") {`


    `result = true;`


    `println("User \(user) is authenticated");`


    `// call system components`


    `log.logActivity("Authenticated \(user)");`


    `cache.loadFiles(user);`


    `monitor.monitorSuspiciousActivity = false;`


    `} else {`


    `println("Failed authentication attempt");`


    `// call system components`


    `log.logActivity("Failed authentication: \(user)");`


    `monitor.monitorSuspiciousActivity = true;`


    `}`


    `return result;`


    `}`


    `}`


    The `AuthenticationManager` class represents a service that authenticates users
    with a password. The user’s credentials are passed by a calling component to the
    `authenticate` method, which authenticates the user and writes a message to the
    debug console. To keep the example simple, the `AuthenticationManager` class allows
    a single username/password combination: the password `bob` with the password `secret`.
    Listing 22-3 shows the code I added to the `main.swift` file to use the `AuthenticationManager`
    class.


    Listing 22-3. The Contents of the main.swift File


    `let authM = AuthenticationManager();`


    `authM.authenticate("bob", pass: "secret");`


    `println("-----");`


    `authM.authenticate("joe", pass: "shhh");`


    The `authenticate` method of the `AuthenticationManager` class checks the credentials
    and authenticates the user. Once the authentication process has been completed,
    the component classes are called to set up the system for the user: logging a
    message, loading the user’s file, and disabling the security monitor. The code
    in the `main.swift` file calls the `authenticate` method twice, once with credentials
    that will be authenticated and once with credentials that will fail. Running the
    application produces the following results:


    `User bob is authenticated`


    `Log: Authenticated bob`


    `Load files for bob`


    `Monitoring for attack: false`


    `-----`


    `Failed authentication attempt`


    `Log: Failed authentication: joe`


    `Monitoring for attack: true`


    ## Understanding the Problem That the Pattern Solves


    The structure of the code in the example application is commonly seen in real-world
    projects. Something happens that leads to a series of follow-on actions being
    performed. In the example, the starting event is a user authentication request,
    and the follow-on actions are logging, loading files, and configuring a monitoring
    service, as shown in Figure [22-1](#A978-1-4842-0394-1_22_Chapter.html#Fig1).


    ![A978-1-4842-0394-1_22_Fig1_HTML.jpg](A978-1-4842-0394-1_22_Fig1_HTML.jpg)


    Figure 22-1.


    An initial event and its follow-on action


    The problem is that the class that handles the initial activity—the `AuthenticationManager`
    class in the example—has to have detailed knowledge of the follow-on actions that
    are required, the classes responsible for those actions, and how those actions
    are performed. A change in one of the system components requires a change in the
    authentication manager class, and this presents the maintenance and testing problems
    that I have been referring to throughout this book. More broadly, the code in
    the authentication manager class spills over from the world of authentication
    and gets involved in completely different activities, something that makes the
    class more complex than it should be and more difficult to change.


    ## Understanding the Observer Pattern


    The observer pattern changes the relationship between objects by dividing them
    into subjects and observers. The subject objects maintain collections of dependent
    objects, the observers, and notify them about important changes or actions. In
    the example application, the subject would be the authentication manager class,
    and the observers would be the system component classes.


    Without the observer pattern, a class like `AuthenticationManager` has to know
    which system components need to be called when an authentication request succeeds
    or fails, what changes should be applied to each of them, and how those changes
    should be performed.


    The observer pattern reshapes this model so that the subject notifies its observers
    that the initial event has occurred—a authentication request was made—and leaves
    it to the observers to respond in whatever way is required. The subject doesn’t
    need to know what the observer objects do or how they do it—just that they want
    to be told about important events.


    The observer pattern standardizes the way that the observers receive notifications
    so that no knowledge of individual observers is required. Each subject knows only
    that there are observers that want to receive notifications and is responsible
    only for sending them to a well-defined method that all of the observers implement
    (conventionally named `notify`). Figure [22-2](#A978-1-4842-0394-1_22_Chapter.html#Fig2)
    illustrates the observer pattern, although the impact of this pattern is best
    seen through an implementation.


    ![A978-1-4842-0394-1_22_Fig2_HTML.jpg](A978-1-4842-0394-1_22_Fig2_HTML.jpg)


    Figure 22-2.


    The observer pattern'
  trans: "\n# 准备示例项目\n\n本章我创建了一个名为 `Observer` 的 Xcode OS X 命令行工具项目。我在项目中添加了一个名为 `SystemComponents.swift`\
    \ 的文件，并利用它定义了清单 22-1 中所示的类。\n\n**清单 22-1. `SystemComponents.swift` 文件的内容**\n\n\
    ```\nclass ActivityLog {\n    func logActivity(activity:String) {\n        println(\"\
    Log: \\(activity)\");\n    }\n}\n\nclass FileCache {\n    func loadFiles(user:String)\
    \ {\n        println(\"Load files for \\(user)\");\n    }\n}\n\nclass AttackMonitor\
    \ {\n    var monitorSuspiciousActivity: Bool = false {\n        didSet {\n   \
    \         println(\"Monitoring for attack: \\(monitorSuspiciousActivity)\");\n\
    \        }\n    }\n}\n```\n\n我定义的这三个类代表了通用的应用组件。为了演示模式，我无需详细实现这些组件，因此它们都向调试控制台写入消息以表明被调用。`ActivityLog`\
    \ 代表一个日志系统，用于接收系统事件的详细信息；`FileCache` 类代表一个缓存，用于加载属于特定用户的文件；`AttackMonitor` 类则代表一个安全服务，用于在发生可疑事件时监控系统行为。清单\
    \ 22-2 显示了 `Authentication.swift` 文件的内容，我在此文件中定义了一个使用这些系统组件的类。\n\n**清单 22-2. `Authentication.swift`\
    \ 文件的内容**\n\n```\nclass AuthenticationManager {\n    private let log = ActivityLog();\n\
    \    private let cache = FileCache();\n    private let monitor = AttackMonitor();\n\
    \n    func authenticate(user:String, pass:String) -> Bool {\n        var result\
    \ = false;\n        if (user == \"bob\" && pass == \"secret\") {\n           \
    \ result = true;\n            println(\"User \\(user) is authenticated\");\n \
    \           // 调用系统组件\n            log.logActivity(\"Authenticated \\(user)\"\
    );\n            cache.loadFiles(user);\n            monitor.monitorSuspiciousActivity\
    \ = false;\n        } else {\n            println(\"Failed authentication attempt\"\
    );\n            // 调用系统组件\n            log.logActivity(\"Failed authentication:\
    \ \\(user)\");\n            monitor.monitorSuspiciousActivity = true;\n      \
    \  }\n        return result;\n    }\n}\n```\n\n`AuthenticationManager` 类代表一个通过密码进行用户认证的服务。用户的凭据由调用组件传递给\
    \ `authenticate` 方法，该方法会认证用户并向调试控制台写入消息。为简化示例，`AuthenticationManager` 类只允许一个用户名/密码组合：用户名为\
    \ `bob`，密码为 `secret`。清单 22-3 显示了我添加到 `main.swift` 文件中用于使用 `AuthenticationManager`\
    \ 类的代码。\n\n**清单 22-3. `main.swift` 文件的内容**\n\n```\nlet authM = AuthenticationManager();\n\
    authM.authenticate(\"bob\", pass: \"secret\");\nprintln(\"-----\");\nauthM.authenticate(\"\
    joe\", pass: \"shhh\");\n```\n\n`AuthenticationManager` 类的 `authenticate` 方法会检查凭据并认证用户。认证过程完成后，会调用各个组件类来为用户设置系统环境：记录日志消息、加载用户文件以及禁用安全监视器。\
    \ `main.swift` 文件中的代码两次调用了 `authenticate` 方法：一次使用可认证通过的凭据，另一次使用会导致认证失败的凭据。运行该应用会产生以下结果：\n\
    \n```\nUser bob is authenticated\nLog: Authenticated bob\nLoad files for bob\n\
    Monitoring for attack: false\n-----\nFailed authentication attempt\nLog: Failed\
    \ authentication: joe\nMonitoring for attack: true\n```\n\n# 理解模式要解决的问题\n\n示例应用中代码的结构在实际项目中很常见。某事件发生，继而触发一系列后续操作。在示例中，起始事件是用户认证请求，后续操作是记录日志、加载文件和配置监控服务，如图\
    \ 22-1 所示。\n\n![A978-1-4842-0394-1_22_Fig1_HTML.jpg](img/A978-1-4842-0394-1_22_Fig1_HTML.jpg)\n\
    \n**图 22-1. 初始事件及其后续操作**\n\n问题在于，处理初始活动（本例中的 `AuthenticationManager` 类）的类必须详细了解所需的后续操作、负责这些操作的类以及这些操作是如何执行的。系统组件中的任何一个发生变更，都需要修改认证管理器类，这就带来了本书一直在提及的维护和测试问题。更广泛地说，认证管理器类中的代码超越了认证本身的范畴，涉足了完全不同的活动，这使得该类变得比实际需要更复杂，也更难以修改。\n\
    \n# 理解观察者模式\n\n观察者模式通过将对象划分为主题和观察者来改变它们之间的关系。主题对象维护着依赖对象（即观察者）的集合，并在发生重要变更或动作时通知它们。在示例应用中，主题将是认证管理器类，观察者则是系统组件类。\n\
    \n在没有观察者模式的情况下，像 `AuthenticationManager` 这样的类必须知道当认证请求成功或失败时需要调用哪些系统组件、应对每个组件应用哪些变更，以及这些变更应如何执行。\n\
    \n观察者模式重塑了这种模型，使得主题仅通知其观察者初始事件已发生——即一个认证请求被做出——而将如何响应交由观察者自行决定。主题无需知道观察者对象做了什么或如何做——只需知道它们希望被告知重要事件即可。\n\
    \n观察者模式标准化了观察者接收通知的方式，因此无需了解单个观察者的任何细节。每个主题只知道有观察者希望接收通知，并且仅负责将通知发送给所有观察者都实现的、定义良好的方法（通常命名为\
    \ `notify`）。图 22-2 展示了观察者模式，尽管该模式的影响最好通过具体实现来观察。\n\n![A978-1-4842-0394-1_22_Fig2_HTML.jpg](img/A978-1-4842-0394-1_22_Fig2_HTML.jpg)\n\
    \n**图 22-2. 观察者模式**\n"
- fmt: "# Implementing the Observer Pattern\n\nThe key to implementing the observer\
    \ pattern is to define the interactions between the subjects and observers using\
    \ protocols. Listing 22-4 shows the protocols I defined in a new file called `Observer.swift`.\n\
    \nListing 22-4. The Contents of the `Observer.swift` File\n\n```\nprotocol Observer\
    \ : class {\n    func notify(user:String, success:Bool);\n}\n\nprotocol Subject\
    \ {\n    func addObservers(observers:Observer...);\n    func removeObserver(observer:Observer);\n\
    }\n```\n\nThe names of the protocols reflect the roles that classes that conform\
    \ to them play in the observer pattern. Classes that conform to the `Observer`\
    \ protocol implement the `notify` method to receive notifications from classes\
    \ that conform to the `Subject` protocol. In the observer pattern, subjects are\
    \ responsible for keeping track of their observers, so I have defined the `addObservers`\
    \ and `removeObserver` methods to allow observers to register and unregister their\
    \ interest in receiving notifications from the subject. Notice that the `addObservers`\
    \ method can accept multiple `Observer` objects. This makes it easier to set up\
    \ the `Subject` object, as you will see in the \"Consuming the Pattern\" section.\n\
    \n**Tip:** Notice that I have used the `class` keyword when defining the `Observer`\
    \ protocol. This will make it possible for me to compare objects that implement\
    \ the protocol when managing the observers in a class that conforms to the `Subject`\
    \ protocol, as shown in Listing 22-5.\n\n### Creating the Base Subject Class\n\
    \nIn the observer pattern, the subject is responsible for keeping track of its\
    \ observers. To avoid duplicating the code that creates and manages the collection\
    \ of observers, I create a base class that manages the observers and provides\
    \ a method that subject implementation classes can use to send a notification.\
    \ Since Swift collections are not thread-safe and there is the potential for the\
    \ collection of observers to be accessed concurrently, I use Grand Central Dispatch\
    \ (GCD) to protect the observer collection, as shown in Listing 22-5.\n\nListing\
    \ 22-5. Defining a Base Subject Class in the `Observer.swift` File\n\n```\nimport\
    \ Foundation;\n\nprotocol Observer : class {\n    func notify(user:String, success:Bool);\n\
    }\n\nprotocol Subject {\n    func addObservers(observers:Observer...);\n    func\
    \ removeObserver(observer:Observer);\n}\n\nclass SubjectBase : Subject {\n   \
    \ private var observers = [Observer]();\n    private var collectionQueue = dispatch_queue_create(\"\
    colQ\",\n        DISPATCH_QUEUE_CONCURRENT);\n    \n    func addObservers(observers:\
    \ Observer...) {\n        dispatch_barrier_sync(self.collectionQueue, { () in\n\
    \            for newOb in observers {\n                self.observers.append(newOb);\n\
    \            }\n        });\n    }\n    \n    func removeObserver(observer: Observer)\
    \ {\n        dispatch_barrier_sync(self.collectionQueue, { () in\n           \
    \ self.observers = filter(self.observers, {$0 !== observer});\n        });\n \
    \   }\n    \n    func sendNotification(user:String, success:Bool) {\n        dispatch_sync(self.collectionQueue,\
    \ { () in\n            for ob in self.observers {\n                ob.notify(user,\
    \ success: success);\n            }\n        });\n    }\n}\n```\n\n### Conforming\
    \ to the Subject Protocol\n\nThe next step is to update the `AuthenticationManager`\
    \ class so that it conforms to the `Subject` protocol and to remove direct references\
    \ to the system component classes that perform the follow-on actions. Listing\
    \ 22-6 shows the changes that I made, relying on the `SubjectBase` class that\
    \ I defined in the previous section.\n\nListing 22-6. Applying the Pattern in\
    \ the `Authentication.swift` File\n\n```\nclass AuthenticationManager : SubjectBase\
    \ {\n    func authenticate(user:String, pass:String) -> Bool {\n        var result\
    \ = false;\n        if (user == \"bob\" && pass == \"secret\") {\n           \
    \ result = true;\n            println(\"User \\(user) is authenticated\");\n \
    \       } else {\n            println(\"Failed authentication attempt\");\n  \
    \      }\n        sendNotification(user, success: result);\n        return result;\n\
    \    }\n}\n```\n\nThe effect is to simplify the class and return its focus to\
    \ authenticating users. The references to individual component classes have been\
    \ replaced with a single call to the `sendNotification` method, which in turn\
    \ calls the `notify` method defined by each of the `Observer` objects that have\
    \ been registered through the `addObservers` method provided by the `SubjectBase`\
    \ class.\n\n### Conforming to the Observer Protocol\n\nThe next step is to update\
    \ the component classes so they conform to the `Observer` protocol and can receive\
    \ notifications from a `Subject`. Listing 22-7 shows the changes I made.\n\nListing\
    \ 22-7. Conforming to the Observer Protocol in the `SystemComponents.swift` File\n\
    \n```\nclass ActivityLog : Observer {\n    func notify(user: String, success:\
    \ Bool) {\n        println(\"Auth request for \\(user). Success: \\(success)\"\
    );\n    }\n    \n    func logActivity(activity:String) {\n        println(\"Log:\
    \ \\(activity)\");\n    }\n}\n\nclass FileCache : Observer {\n    func notify(user:\
    \ String, success: Bool) {\n        if (success) {\n            loadFiles(user);\n\
    \        }\n    }\n    \n    func loadFiles(user:String) {\n        println(\"\
    Load files for \\(user)\");\n    }\n}\n\nclass AttackMonitor : Observer {\n  \
    \  func notify(user: String, success: Bool) {\n        monitorSuspiciousActivity\
    \ = !success;\n    }\n    \n    var monitorSuspiciousActivity: Bool = false {\n\
    \        didSet {\n            println(\"Monitoring for attack: \\(monitorSuspiciousActivity)\"\
    );\n        }\n    }\n}\n```\n\nThe additions make each class responsible for\
    \ its own response to successful and failed authentication requests, which breaks\
    \ the tight coupling with the authentication manager class.\n\n### Consuming the\
    \ Pattern\n\nAll that remains is to update the code in the `main.swift` file to\
    \ create the observers and register them with the subject, as shown in Listing\
    \ 22-8.\n\nListing 22-8. Consuming the Observer Pattern in the `main.swift` File\n\
    \n```\nlet log = ActivityLog();\nlet cache = FileCache();\nlet monitor = AttackMonitor();\n\
    \nlet authM = AuthenticationManager();\n\nauthM.addObservers(log, cache, monitor);\n\
    authM.authenticate(\"bob\", pass: \"secret\");\nprintln(\"-----\");\nauthM.authenticate(\"\
    joe\", pass: \"shhh\");\n```\n\nI create instances of the individual observers\
    \ and pass them to the `addObservers` method of the `AuthenticationManager` class.\
    \ The `AuthenticationManager` class deals only with the observers through the\
    \ `Observer` protocol and the `notify` method it defines and has no knowledge\
    \ of the individual classes and what they do when the `notify` method is called.\
    \ Running the application produces the following results:\n\n```\nUser bob is\
    \ authenticated\nAuth request for bob. Success: true\nLoad files for bob\nMonitoring\
    \ for attack: false\n-----\nFailed authentication attempt\nAuth request for joe.\
    \ Success: false\nMonitoring for attack: true\n```\n\nUsing the `Observer` protocols\
    \ makes it easy to extend the application without having to modify the subject;\
    \ new `Observer` objects are simply passed to the subject's `addObservers` method.\n\
    \n## Variations on the Observer Pattern\n\nThe observer pattern has a number of\
    \ useful variations, each of which I describe in the following sections."
