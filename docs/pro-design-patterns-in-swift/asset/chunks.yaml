    `self.mayo = mayo;`


    `self.ketchup = ketchup;`


    `self.lettuce = lettuce;`


    `self.cook = cook;`


    `}`


    `func printDescription() {`


    `println("Name \(self.customerName)");`


    `println("Veggie: \(self.veggieProduct)");`


    `println("Patties: \(self.patties)");`


    `println("Pickles: \(self.pickles)");`


    `println("Mayo: \(self.mayo)");`


    `println("Ketchup: \(self.ketchup)");`


    `println("Lettuce: \(self.lettuce)");`


    `println("Cook: \(self.cook.rawValue)");`


    `}`


    `}`


    The `Burger` class represents an order in a restaurant and defines constant values
    for the different aspects of the order that are set through the constructor. The
    `printDescription` method writes out the values of the constants to the debug
    console. Listing 11-2 shows how I edited the `main.swift` file to create a `Burger`
    object and call the `printDescription` method.


    Listing 11-2. The Contents of the main.swift File


    `let order = Burger(name: "Joe", veggie: false, patties: 2, pickles: true,`


    `mayo: true, ketchup: true, lettuce: true, cook: Burger.Cooked.NORMAL);`


    `order.printDescription();`


    Running the application produces the following output:


    `Name Joe`


    `Veggie: false`


    `Patties: 2`


    `Pickles: true`


    `Mayo: true`


    `Ketchup: true`


    `Lettuce: true`


    `Cook: Normal`


    ### Understanding the Problems That the Pattern Solves


    The problem addressed by the builder pattern arises when an object requires a
    large number of configuration data values, not all of which the calling component
    has values for. In the case of the `Burger` class, the initializer requires values
    for every aspect of the burger it represents. Here is the ordering process that
    is followed in my imaginary restaurant:


    The server asks the customer for their name.   The server asks the customer whether
    they require a vegetarian meal.   The server asks whether the customer wants to
    customize their burger.   The server asks whether the customer wants to upgrade
    and buy an additional patty.


    There are only four steps in this process, but it throws up some issues. Listing
    11-3 shows how I can model the process in the `main.swift` file to change the
    way I create `Burger` objects.


    Listing 11-3. Implementing the Order Process in the main.swift File


    `// Step 1 - Ask for name`


    `let name = "Joe";`


    `// Step 2 - Is veggie meal required?`


    `let veggie = false;`


    `// Step 3 - Customize burger?`


    `let pickles = true;`


    `let mayo = false;`


    `let ketchup = true;`


    `let lettuce = true;`


    `let cooked = Burger.Cooked.NORMAL;`


    `// Step 4 - Buy additional patty?`


    `let patties = 2;`


    `let order = Burger(` `name: name, veggie: veggie, patties: patties, pickles:
    pickles,`


    `mayo: mayo, ketchup: ketchup, lettuce: lettuce, cook: cooked` `);`


    `order.printDescription();`


    The `Burger` initializer requires calling components to understand the default
    configuration values when the customer doesn’t want to change them—for example,
    knowing that a standard burger comes with two patties and has ketchup. Each component
    that requires a `Burger` object has to have this knowledge, and the effect is
    that a change in the default values must be implemented in every calling component.


    UNDERSTANDING THE TELESCOPING INITIALIZER ANTI-PATTERN


    In other languages, the builder pattern is used as an alternative to the telescoping
    initializer or telescoping constructor anti-pattern. Anti-patterns are commonly
    used techniques that don’t solve the problem they are intended to address or solve
    a problem in a difficult or dangerous way. In some languages, the telescoping
    constructor pattern is a commonly used technique intended to simplify working
    with classes that define a lot of initializer parameters. Consider this class:


    `...`


    `class Milkshake {`


    `enum Size { case SMALL; case MEDIUM; case LARGE };`


    `enum Flavor { case CHOCOLATE; case STRAWBERRY; case VANILLA };`


    `let count:Int;`


    `let size:Size;`


    `let flavor:Flavor;`


    `init(flavor:Flavor, size:Size, count:Int) {`


    `self.count = count;`


    `self.size = size;`


    `self.flavor = flavor;`


    `}`


    `}`


    `...`


    The `Milkshake` class defines an initializer with three parameters. This requires
    calling components to know what the default values are for the parameters and
    to provide values even when the defaults are required, like this:


    `...`


    `var shake = Milkshake(`


    `flavor: Milkshake.Flavor.CHOCOLATE,`


    `size: Milkshake.Size.MEDIUM,`


    `count: 1`


    `);`


    `...`


    Most customers will want a single medium shake and specify only a flavor. The
    telescoping initializer anti-pattern tries to improve the situation by defining
    convenience initializers that provide default values, like this:


    `...`


    `class Milkshake {`


    `enum Size { case SMALL; case MEDIUM; case LARGE };`


    `enum Flavor { case CHOCOLATE; case STRAWBERRY; case VANILLA };`


    `let count:Int;`


    `let size:Size;`


    `let flavor:Flavor;`


    `init(flavor:Flavor, size:Size, count:Int) {`


    `self.count = count;`


    `self.size = size;`


    `self.flavor = flavor;`


    `}`


    `convenience init(flavor:Flavor, size:Size) {`


    `self.init(flavor:flavor, size:size, count:1);`


    `}`


    `convenience init(flavor:Flavor) {`


    `self.init(flavor:flavor, size:Size.MEDIUM);`


    `}`


    `}`


    `...`


    Each convenience initializer omits an additional parameter and calls the preceding
    initializer with a default value. It allows objects to be created without the
    calling component knowing the default values for the parameters that it doesn’t
    provide, like this:


    `...`


    `var shake =` `Milkshake(flavor: Milkshake.Flavor.CHOCOLATE)` `;`


    `...`


    Telescoping initializers are considered to be an anti-pattern because they result
    in a large number of initializers that are hard to read and maintain. You can
    avoid telescoping initializers in Swift by using default parameter values, like
    this:


    `...`


    `class Milkshake {`


    `enum Size { case SMALL; case MEDIUM; case LARGE };`


    `enum Flavor { case CHOCOLATE; case STRAWBERRY; case VANILLA };`


    `let count:Int;`


    `let size:Size;`


    `let flavor:Flavor;`


    `init(flavor:Flavor, size:Size = Size.MEDIUM, count:Int = 1) {`


    `self.count = count;`


    `self.size = size;`


    `self.flavor = flavor;`


    `}`


    `}`


    `...`


    The default values for the `size` and `count` parameters are used whenever the
    component that wants to create a `Milkshake` object omits them. This has the benefit
    of defining the default values within the `Milkshake` class without needing to
    define permutations of initializers.'
