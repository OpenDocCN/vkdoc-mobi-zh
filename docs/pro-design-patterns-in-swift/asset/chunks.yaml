- fmt: "# 8. Object Pool Variations\n\nIn this chapter, I explain how you can vary\
    \ the basic implementation of the object pool pattern I described in [Chapter\
    \ 7](#A978-1-4842-0394-1_7_Chapter.html) to manage objects with different characteristics.\
    \ Each technique applies a strategy to handling an aspect of the pool’s implementation\
    \ to deal with calling components that require pool objects. Table [8-1](#A978-1-4842-0394-1_8_Chapter.html#Tab1)\
    \ puts the variations into context.\n\n**Table 8-1.** Putting the Object Pool\
    \ Pattern Variations into Context\n\n| Question | Answer |\n| --- | --- |\n| What\
    \ are they? | The variations on the object pool pattern allow you to change the\
    \ way that the object pool works to operate in different situations. |\n| What\
    \ are the benefits? | These variations change the behavior of the pool so that\
    \ it can service calling components with different expectations and needs and\
    \ manage objects with a range of characteristics and life cycles. |\n| When should\
    \ you use these variations? | You should use these variations when the basic implementation\
    \ of the pattern I described in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html)\
    \ does not meet your needs. |\n| When should you avoid these variations? | These\
    \ variations require advanced concurrency techniques and should be avoided unless\
    \ you can test them thoroughly and have a solid understanding of Cocoa concurrency.\
    \ |\n| How do you know when you have implemented the variations correctly? | The\
    \ only way to be sure you have implemented these variations correctly is through\
    \ thorough testing. |\n| Are there any common pitfalls? | These are advanced techniques,\
    \ and it is easy to misuse concurrency protections to create a pool that doesn’t\
    \ work or that performs poorly. |\n| Are there any related patterns? | Not applicable.\
    \ |\n\n## Preparing the Example Project\n\nI continue using the `ObjectPool` project\
    \ I created in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html). No changes are\
    \ required to prepare for this chapter.\n\n## Understanding the Object Pool Pattern\
    \ Variations\n\nThe implementation of an object pool consists of four strategies\
    \ that collectively form the behavior for allocating objects:\n\n* The object\
    \ creation strategy\n* The object reuse strategy\n* The empty pool strategy\n\
    * The allocation strategy\n\nBy changing these strategies, you can tailor the\
    \ implementation of the object pool pattern to suit the kind of objects you need\
    \ to manage. I explain each of the strategies in the sections that follow and\
    \ demonstrate how to implement them.\n\n### Understanding the Object Creation\
    \ Strategy\n\nThe object creation strategy governs how the objects that the pool\
    \ manages are created. In the previous chapter, I implemented an eager strategy,\
    \ which means that the objects are created before they are used. In fact, I create\
    \ the `Book` objects in the `Library` class and pass them as an array to the `Pool`\
    \ initializer, like this:\n\n```\n...\nprivate init(stockLevel:Int) {\n    books\
    \ = [Book]();\n    for count in 1 ... stockLevel {\n        books.append(Book(author:\
    \ \"Dickens, Charles\", title: \"Hard Times\",\n            stock: count))\n \
    \   }\n    pool = Pool<Book>(items:books);\n}\n...\n```\n\nThis is the strategy\
    \ I adopt when I am working with objects that represent real-world resources because\
    \ the number of objects that will be managed is typically known in advance (my\
    \ library purchased two copies of Hard Times) and requires some level of configuration\
    \ (allocating a unique stock reference).\n\nThe drawback of this approach is that\
    \ all of the cost involved in creating and configuring the objects is incurred\
    \ before there is any demand for them. I have created two `Book` objects to represent\
    \ my Charles Dickens collection, but there may be little or no reader demand,\
    \ and the overhead of creating and preparing the `Book` objects will never be\
    \ justified by requests.\n\nThat is usually acceptable for objects that represent\
    \ real-world objects because the state of the pool reflects a real-world situation:\
    \ the library has purchased two copies of Hard Times in anticipation of reader\
    \ demands. However, it isn’t helpful if you are using an object pool to avoid\
    \ incurring expensive initializations of objects that are not tied to the real-world,\
    \ such as the `Sum` objects that I used to demonstrate the prototype pattern in\
    \ [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html).\n\nThe alternative is to use\
    \ a lazy creation strategy, which means that objects are not created until they\
    \ are required. For the purposes of my `Library` example, I am going to create\
    \ a `BookSeller` class from which `Book` objects can be obtained. The library\
    \ in my example will be able to obtain the books it needs from the seller the\
    \ first time it is required. Listing 8-1 shows the contents of the `BookSources.swift`\
    \ file, which I added to the project.\n\n**Listing 8-1.** The Contents of the\
    \ `BookSources.swift` File\n\n```\nimport Foundation\n\nclass BookSeller {\n \
    \   class func buyBook(author:String, title:String, stockNumber:Int) -> Book {\n\
    \        return Book(author: author, title: title, stock: stockNumber);\n    }\n\
    }\n```\n\nThe `BookSeller` class defines a type method that creates a `Book` object.\
    \ The implementation of the `BookSeller` class isn’t important for the example—it’s\
    \ only important that there is a source of `Book` objects that will be called\
    \ upon to supply the items in the pool. Listing 8-2 shows the changes that I made\
    \ to the `Pool` class to support delaying the creation of items until they are\
    \ required.\n\n**Listing 8-2.** Implementing Lazy Object Creation in the `Pool.swift`\
    \ File\n\n```\nimport Foundation\n\nclass Pool<T> {\n    private var data = [T]();\n\
    \    private let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    private let semaphore:dispatch_semaphore_t;\n    private var itemCount =\
    \ 0;\n    private let maxItemCount:Int;\n    private let itemFactory: () -> T;\n\
    \n    init(maxItemCount:Int, factory:() -> T) {\n        self.itemFactory = factory;\n\
    \        self.maxItemCount = maxItemCount;\n        semaphore = dispatch_semaphore_create(maxItemCount);\n\
    \    }\n\n    func getFromPool() -> T? {\n        var result:T?;\n        if (dispatch_semaphore_wait(semaphore,\
    \ DISPATCH_TIME_FOREVER) == 0) {\n            dispatch_sync(arrayQ, {() in\n \
    \               if (self.data.count == 0 && self.itemCount < self.maxItemCount)\
    \ {\n                    result = self.itemFactory();\n                    self.itemCount++;\n\
    \                } else {\n                    result = self.data.removeAtIndex(0);\n\
    \                }\n            })\n        }\n        return result;\n    }\n\
    \n    func returnToPool(item:T) {\n        dispatch_async(arrayQ, {() in\n   \
    \         self.data.append(item);\n            dispatch_semaphore_signal(self.semaphore);\n\
    \        });\n    }\n\n    func processPoolItems(callback:[T] -> Void) {\n   \
    \     dispatch_barrier_sync(arrayQ, {() in\n            callback(self.data);\n\
    \        });\n    }\n}\n```"
  raw: '# 8. Object Pool Variations


    In this chapter, I explain how you can vary the basic implementation of the object
    pool pattern I described in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html) to
    manage objects with different characteristics. Each technique applies a strategy
    to handling an aspect of the pool’s implementation to deal with calling components
    that require pool objects. Table [8-1](#A978-1-4842-0394-1_8_Chapter.html#Tab1)
    puts the variations into context.


    Table 8-1.


    Putting the Object Pool Pattern Variations into Context


    | Question | Answer |

    | --- | --- |

    | What are they? | The variations on the object pool pattern allow you to change
    the way that the object pool works to operate in different situations. |

    | What are the benefits? | These variations change the behavior of the pool so
    that it can service calling components with different expectations and needs and
    manage objects with a range of characteristics and life cycles. |

    | When should you use these variations? | You should use these variations when
    the basic implementation of the pattern I described in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html)
    does not meet your needs. |

    | When should you avoid these variations? | These variations require advanced
    concurrency techniques and should be avoided unless you can test them thoroughly
    and have a solid understanding of Cocoa concurrency. |

    | How do you know when you have implemented the variations correctly? | The only
    way to be sure you have implemented these variations correctly is through thorough
    testing. |

    | Are there any common pitfalls? | These are advanced techniques, and it is easy
    to misuse concurrency protections to create a pool that doesn’t work or that performs
    poorly. |

    | Are there any related patterns? | Not applicable. |


    ## Preparing the Example Project


    I continue using the `ObjectPool` project I created in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html).
    No changes are required to prepare for this chapter.


    ## Understanding the Object Pool Pattern Variations


    The implementation of an object pool consists of four strategies that collectively
    form the behavior for allocating objects:


    *   The object creation strategy

    *   The object reuse strategy

    *   The empty pool strategy

    *   The allocation strategy


    By changing these strategies, you can tailor the implementation of the object
    pool pattern to suit the kind of objects you need to manage. I explain each of
    the strategies in the sections that follow and demonstrate how to implement them.


    ### Understanding the Object Creation Strategy


    The object creation strategy governs how the objects that the pool manages are
    created. In the previous chapter, I implemented an eagerstrategy, which means
    that the objects are created before they are used. In fact, I create the `Book`
    objects in the `Library` class and pass them as an array to the `Pool` initializer,
    like this:


    `...`


    `private init(stockLevel:Int) {`


    `books = [Book]();`


    `for count in 1 ... stockLevel {`


    `books.append(Book(author: "Dickens, Charles", title: "Hard Times",`


    `stock: count))`


    `}`


    `pool = Pool<Book>(items:books);`


    `}`


    `...`


    This is the strategy I adopt when I am working with objects that represent real-world
    resources because the number of objects that will be managed is typically known
    in advance (my library purchased two copies of Hard Times) and requires some level
    of configuration (allocating a unique stock reference).


    The drawback of this approach is that all of the cost involved in creating and
    configuring the objects is incurred before there is any demand for them. I have
    created two `Book` objects to represent my Charles Dickens collection, but there
    may be little or no reader demand, and the overhead of creating and preparing
    the `Book` objects will never be justified by requests.


    That is usually acceptable for objects that represent real-world objects because
    the state of the pool reflects a real-world situation: the library has purchased
    two copies of Hard Times in anticipation of reader demands. However, it isn’t
    helpful if you are using an object pool to avoid incurring expensive initializations
    of objects that are not tied to the real-world, such as the `Sum` objects that
    I used to demonstrate the prototype pattern in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html).


    The alternative is to use a lazy creation strategy, which means that objects are
    not created until they are required. For the purposes of my `Library` example,
    I am going to create a `BookSeller` class from which `Book` objects can be obtained.
    The library in my example will be able to obtain the books it needs from the seller
    the first time it is required. Listing 8-1 shows the contents of the `BookSources.swift`
    file, which I added to the project.


    Listing 8-1. The Contents of the BookSources.swift File


    `import Foundation`


    `class BookSeller {`


    `class func buyBook(author:String, title:String, stockNumber:Int) -> Book {`


    `return Book(author: author, title: title, stock: stockNumber);`


    `}`


    `}`


    The `BookSeller` class defines a type method that creates a `Book` object. The
    implementation of the `BookSeller` class isn’t important for the example—it’s
    only important that there is a source of `Book` objects that will be called upon
    to supply the items in the pool. Listing 8-2 shows the changes that I made to
    the `Pool` class to support delaying the creation of items until they are required.


    Listing 8-2. Implementing Lazy Object Creation in the Pool.swift File


    `import Foundation`


    `class Pool<T> {`


    `private var data = [T]();`


    `private let arrayQ = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_SERIAL);`


    `private let semaphore:dispatch_semaphore_t;`


    `private var itemCount = 0;`


    `private let maxItemCount:Int;`


    `private let itemFactory: () -> T;`


    `init(maxItemCount:Int, factory:() -> T) {`


    `self.itemFactory = factory;`


    `self.maxItemCount = maxItemCount;`


    `semaphore = dispatch_semaphore_create(maxItemCount);`


    `}`


    `func getFromPool() -> T? {`


    `var result:T?;`


    `if (dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER) == 0) {`


    `dispatch_sync(arrayQ, {() in`


    `if (self.data.count == 0` `&&` `self.itemCount < self.maxItemCount) {`


    `result = self.itemFactory();`


    `self.itemCount++;`


    `} else {`


    `result = self.data.removeAtIndex(0);`


