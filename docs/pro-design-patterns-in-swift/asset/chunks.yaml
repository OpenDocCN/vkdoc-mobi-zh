  trans: "\n### 改变流程\n\n第二个改进之处在于，我可以在不修改生成器或 `Burger` 类的前提下，变更或精简点餐流程。额外添加肉饼的升级版可能只是限时优惠，而餐厅为了让顾客关注新品，可能会询问所有顾客是否想要素肉汉堡。即使我从流程中省略了这些步骤，我依然可以使用生成器来创建\
    \ `Burger` 对象，如代码清单 11-7 所示。\n\n**代码清单 11-7.** 在 `main.swift` 文件中修改流程\n\n```\n\
    var builder = BurgerBuilder();\n\n// 第 1 步 - 询问姓名\nlet name = \"Joe\";\n\n// 第\
    \ 2 步 - 定制汉堡？\nbuilder.setMayo(false);\nbuilder.setCooked(Burger.Cooked.WELLDONE);\n\
    \nlet order = builder.buildObject(name);\norder.printDescription();\n```\n\n尽管流程发生了变化，顾客仍然会收到相同的订单。不过，这并非普遍适用；因为向流程中添加新步骤可能需要其他修改。\n\
    \n### 改变对象\n\n第三个改进之处在于，我可以修改 `Burger` 类，并将变更的影响吸收到生成器类中，从而避免其传播到调用组件。代码清单 11-8\
    \ 展示了当餐厅在菜单中添加培根后，`Burger` 类的变化。\n\n**代码清单 11-8.** 在 `Food.swift` 文件中添加培根\n\n\
    ```\nclass Burger {\n    let customerName:String;\n    let veggieProduct:Bool;\n\
    \    let patties:Int;\n    let pickles:Bool;\n    let mayo:Bool;\n    let ketchup:Bool;\n\
    \    let lettuce:Bool;\n    let cook:Cooked;\n    let bacon:Bool;\n\n    enum\
    \ Cooked : String {\n        case RARE = \"Rare\";\n        case NORMAL = \"Normal\"\
    ;\n        case WELLDONE = \"Well Done\";\n    }\n\n    init(name:String, veggie:Bool,\
    \ patties:Int, pickles:Bool, mayo:Bool,\n         ketchup:Bool, lettuce:Bool,\
    \ cook:Cooked, bacon:Bool) {\n        self.customerName  = name;\n        self.veggieProduct\
    \ = veggie;\n        self.patties       = patties;\n        self.pickles     \
    \  = pickles;\n        self.mayo          = mayo;\n        self.ketchup      \
    \ = ketchup;\n        self.lettuce       = lettuce;\n        self.cook       \
    \   = cook;\n        self.bacon         = bacon;\n    }\n\n    func printDescription()\
    \ {\n        println(\"Name     \\(self.customerName)\");\n        println(\"\
    Veggie:  \\(self.veggieProduct)\");\n        println(\"Patties: \\(self.patties)\"\
    );\n        println(\"Pickles: \\(self.pickles)\");\n        println(\"Mayo: \
    \   \\(self.mayo)\");\n        println(\"Ketchup: \\(self.ketchup)\");\n     \
    \   println(\"Lettuce: \\(self.lettuce)\");\n        println(\"Cook:    \\(self.cook.rawValue)\"\
    );\n        println(\"Bacon:   \\(self.bacon)\");\n    }\n}\n```\n\n在菜单中添加培根改变了\
    \ `Burger` 的初始化器，这需要对生成器协议和类进行相应的修改，如代码清单 11-9 所示。\n\n**代码清单 11-9.** 在 `Builder.swift`\
    \ 文件中更新生成器协议和类\n\n```\nclass BurgerBuilder {\n    private var veggie  = false;\n\
    \    private var pickles = false;\n    private var mayo    = true;\n    private\
    \ var ketchup = true;\n    private var lettuce = true;\n    private var cooked\
    \  = Burger.Cooked.NORMAL;\n    private var patties = 2;\n    private var bacon\
    \   = true;\n\n    func setVeggie(choice: Bool)  { self.veggie  = choice; }\n\
    \    func setPickles(choice: Bool) { self.pickles = choice; }\n    func setMayo(choice:\
    \ Bool)    { self.mayo    = choice; }\n    func setKetchup(choice: Bool) { self.ketchup\
    \ = choice; }\n    func setLettuce(choice: Bool) { self.lettuce = choice; }\n\
    \    func setCooked(choice: Burger.Cooked) { self.cooked = choice; }\n    func\
    \ addPatty(choice: Bool)   { self.patties = choice ? 3 : 2; }\n    func setBacon(choice:\
    \ Bool)   { self.bacon = choice; }\n\n    func buildObject(name: String) -> Burger\
    \ {\n        return Burger(name: name, veggie: veggie, patties: patties,\n   \
    \                   pickles: pickles, mayo: mayo, ketchup: ketchup,\n        \
    \              lettuce: lettuce, cook: cooked, bacon: bacon);\n    }\n}\n```\n\
    \n**提示** 请注意，培根的默认设置包含在生成器中，而非 `Burger` 类中。\n\n需要 `Burger` 对象的组件可以不加修改地使用生成器，只要它们乐意接收默认带有培根的汉堡即可。\n\
    \n```\nName Joe\nVeggie: false\nPatties: 2\nPickles: false\nMayo: false\nKetchup:\
    \ true\nLettuce: true\nCook: Well Done\nBacon: true\n```\n\n### 避免不一致的配置\n\n最后一个改进之处在于，生成器类可以用来避免不一致的配置，从而防止对象无法创建。例如，默认在所有汉堡中添加培根，对于订购素肉汉堡的顾客来说，很可能不受欢迎。代码清单\
    \ 11-10 展示了如何在生成器类中处理这种情况。\n\n**代码清单 11-10.** 在 `Builder.swift` 文件中处理不一致的配置\n\n\
    ```\n...\nfunc setVeggie(choice: Bool) {\n    self.veggie = choice;\n    if (choice)\
    \ {\n        self.bacon = false;\n    }\n}\n...\n```\n\n我更新了 `setVeggie` 方法，以便在请求素肉汉堡时移除培根。然而，这并不妨碍顾客将培根作为定制选项进行请求，并且调用组件仍然负责主导点餐流程。\n"
- fmt: "# Variations on the Builder Pattern\n\nYou can create variations on the builder\
    \ pattern by combining it with other patterns, usually the factory method or abstract\
    \ factory patterns (which I described in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html)\
    \ and [Chapter 10](#A978-1-4842-0394-1_10_Chapter.html)).\n\nThe combination that\
    \ I use most often is to define multiple builder classes that define different\
    \ sets of default values and apply them through the factory method pattern. Listing\
    \ 11-11 shows how I have added a new builder for a different type of burger and\
    \ added a factory method that allows a builder to be selected.\n\n**Listing 11-11.**\
    \ Combining the Builder and Factory Method Patterns in the `Builder.swift` File\n\
    \n```\nenum Burgers {\n    case STANDARD; case BIGBURGER; case SUPERVEGGIE;\n\
    }\n\nclass BurgerBuilder {\n    private var veggie  = false;\n    private var\
    \ pickles = false;\n    private var mayo    = true;\n    private var ketchup =\
    \ true;\n    private var lettuce = true;\n    private var cooked  = Burger.Cooked.NORMAL;\n\
    \    private var patties = 2;\n    private var bacon   = true;\n\n    private\
    \ init() {\n        // do nothing\n    }\n\n    func setVeggie(choice: Bool) {\n\
    \        self.veggie = choice;\n        if (choice) {\n            self.bacon\
    \ = false;\n        }\n    }\n\n    func setPickles(choice: Bool) { self.pickles\
    \ = choice; }\n    func setMayo(choice: Bool)    { self.mayo    = choice; }\n\
    \    func setKetchup(choice: Bool) { self.ketchup = choice; }\n    func setLettuce(choice:\
    \ Bool) { self.lettuce = choice; }\n    func setCooked(choice: Burger.Cooked)\
    \ { self.cooked = choice; }\n    func addPatty(choice: Bool)   { self.patties\
    \ = choice ? 3 : 2; }\n    func setBacon(choice: Bool)   { self.bacon   = choice;\
    \ }\n\n    func buildObject(name: String) -> Burger {\n        return Burger(name:\
    \ name, veggie: veggie, patties: patties,\n            pickles: pickles, mayo:\
    \ mayo, ketchup: ketchup,\n            lettuce: lettuce, cook: cooked, bacon:\
    \ bacon);\n    }\n\n    class func getBuilder(burgerType:Burgers) -> BurgerBuilder\
    \ {\n        var builder:BurgerBuilder;\n        switch (burgerType) {\n     \
    \       case .BIGBURGER: builder   = BigBurgerBuilder();\n            case .SUPERVEGGIE:\
    \ builder = SuperVeggieBurgerBuilder();\n            case .STANDARD: builder \
    \   = BurgerBuilder();\n        }\n        return builder;\n    }\n}\n\nclass\
    \ BigBurgerBuilder : BurgerBuilder {\n    private override init() {\n        super.init();\n\
    \        self.patties = 4;\n        self.bacon = false;\n    }\n\n    override\
    \ func addPatty(choice: Bool) {\n        fatalError(\"Cannot add patty to Big\
    \ Burger\");\n    }\n}\n\nclass SuperVeggieBurgerBuilder : BurgerBuilder {\n \
    \   private override init() {\n        super.init();\n        self.veggie = true;\n\
    \        self.bacon = false;\n    }\n\n    override func setVeggie(choice: Bool)\
    \ {\n        // do nothing - always veggie\n    }\n\n    override func setBacon(choice:\
    \ Bool) {\n        fatalError(\"Cannot add bacon to this burger\");\n    }\n}\n\
    ```\n\nI have created an enumeration called `Burgers` that details the range of\
    \ burgers that are on offer, and I have defined a factory method in the `BurgerBuilder`\
    \ class that accepts a `Burgers` value and selects a builder that will be returned\
    \ to the caller. The `BurgerBuilder` class will continue to be used for the `STANDARD`\
    \ burger, but I have created subclasses that will handle the new `BigBurger` and\
    \ `SuperVeggieBurger` products.\n\nThe new builders revise the default values\
    \ for the different burger components to create different starting points for\
    \ the ordering process and to restrict the set of possible changes, such as preventing\
    \ an extra patty from being added to the `BigBurger` or adding bacon to a `SuperVeggieBurger`.\n\
    \nTo take advantage of these changes, I have to revise my ordering process so\
    \ that the server asks what kind of burger the customer requires, as shown in\
    \ Listing 11-12.\n\n**Listing 11-12.** Revising the Ordering Process in the `main.swift`\
    \ File\n\n```\n// Step 1 - Ask for name\nlet name = \"Joe\";\n\n// Step 2 - Select\
    \ a Product\nlet builder = BurgerBuilder.getBuilder(Burgers.BIGBURGER);\n\n//\
    \ Step 3 - Customize burger?\nbuilder.setMayo(false);\nbuilder.setCooked(Burger.Cooked.WELLDONE);\n\
    \nlet order = builder.buildObject(name);\norder.printDescription();\n```\n\n##\
    \ Understanding the Pitfalls of the Builder Pattern\n\nThere are no pitfalls to\
    \ this pattern as long as you remember that the default values used to create\
    \ the object should be defined in the builder class and not the calling component.\n\
    \n## Examples of the Builder Pattern in Cocoa\n\nThe most commonly used example\
    \ of the builder pattern can be found in the `NSDateComponents` class in the `Foundation`\
    \ framework. The `NSDateComponents` class is a builder that allows a calling component\
    \ to specify settings that can be used to produce an `NSDate` object that represents\
    \ a calendar date. Listing 11-13 shows the contents of an Xcode playground I created\
    \ called `DateBuilder.playground`.\n\n**Listing 11-13.** The Contents of the `DateBuilder.playground`\
    \ File\n\n```\nimport Foundation;\n\nvar builder = NSDateComponents();\n\nbuilder.hour\
    \     = 10;\nbuilder.day      = 6;\nbuilder.month    = 9;\nbuilder.year     =\
    \ 1940;\nbuilder.calendar = NSCalendar(calendarIdentifier: NSGregorianCalendar);\n\
    \nvar date         = builder.date;\nprintln(date!);\n```\n\nI create the builder\
    \ by instantiating the `NSDateComponents` class, and I configure the object that\
    \ will be produced by setting the properties it defines. I have set values for\
    \ the `hour`, `day`, `month`, `year`, and `calendar` properties to replace the\
    \ default values defined by the builder.\n\nTo create the object, I read the value\
    \ of the `date` property and receive an `NSDate` object that has been configured\
    \ with the values I provided. I write the value to the console, which displays\
    \ the following output in the playground console:\n\n```\n1940-09-06 09:00:00\
    \ +0000\n```\n\nI did not provide the builder with values for all the components\
    \ that make up a date, so the builder has used its defaults for the minutes, seconds,\
    \ and time zone components, which is why those parts of the date are set to zero.\n\
    \nBy implementing the builder pattern, the `NSDateComponents` class allows me\
    \ to configure a date by specifying a limited number of values in the order that\
    \ suits me. The builder doesn’t create the `NSDate` object until the `date` property\
    \ is read, which allows me to provide data as it becomes available.\n\n## Applying\
    \ the Pattern to the SportsStore Application\n\nIn this section, I will demonstrate\
    \ a common use of the builder pattern and produce a serialized representation\
    \ of an object. I’ll also show you how to use properties rather than methods to\
    \ create the builder.\n\n### Preparing the Example Application\n\nI pick up the\
    \ SportsStore application as I left it in [Chapter 10](#A978-1-4842-0394-1_10_Chapter.html).\
    \ I am going to implement the builder pattern to create a serialized representation\
    \ of a change to the product data. I added a new file called `ChangeRecord.swift`\
    \ to the SportsStore project and used it to define the class shown in Listing\
    \ 11-14.\n\n**Listing 11-14.** The Contents of the `ChangeRecord.swift` File\n\
    \n```\nclass ChangeRecord : Printable {\n    private let outerTag:String;\n  \
    \  private let productName:String;\n    private let catName:String;\n    private\
    \ let innerTag:String;\n    private let value:String;\n\n    private init(outer:String,\
    \ name:String, category:String,\n        inner:String, value:String) {\n     \
    \   self.outerTag    = outer;\n        self.productName = name;\n        self.catName\
    \     = category;\n        self.innerTag    = inner;\n        self.value     \
    \  = value;\n    }\n\n    var description : String {\n        return \"<\\(outerTag)><\\\
    (innerTag) name=\\\"\\(productName)\\\"\" +\n            \" category=\\\"\\(catName)\\\
    \">\\(value)</\\(innerTag)></\\(outerTag)>\"\n    }\n}\n```\n\nThe `ChangeRecord`\
    \ class is used to create an XML-style string that represents change. The class\
    \ defines a set of properties that are used to configure the string. The `ChangeRecord`\
    \ class implements the `Printable` protocol, which means that its `description`\
    \ property will be used when an instance of the class is passed to the `println`\
    \ function."
  raw: '## Variations on the Builder Pattern


    You can create variations on the builder pattern by combining it with other patterns,
    usually the factory method or abstract factory patterns (which I described in
    [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html) and [Chapter 10](#A978-1-4842-0394-1_10_Chapter.html)).


    The combination that I use most often is to define multiple builder classes that
    define different sets of default values and apply them through the factory method
    pattern. Listing 11-11 shows how I have added a new builder for a different type
    of burger and added a factory method that allows a builder to be selected.


    Listing 11-11. Combining the Builder and Factory Method Patterns in the Builder.swift
    File


    `enum Burgers {`


    `case STANDARD; case BIGBURGER; case SUPERVEGGIE;`


    `}`


    `class BurgerBuilder {`


    `private var veggie  = false;`


    `private var pickles = false;`


    `private var mayo    = true;`


    `private var ketchup = true;`


    `private var lettuce = true;`


    `private var cooked  = Burger.Cooked.NORMAL;`


    `private var patties = 2;`


    `private var bacon   = true;`


    `private init() {`


    `// do nothing`


    `}`


    `func setVeggie(choice: Bool) {`


    `self.veggie = choice;`


    `if (choice) {`


    `self.bacon = false;`


    `}`


    `}`


    `func setPickles(choice: Bool) { self.pickles = choice; }`


    `func setMayo(choice: Bool)    { self.mayo    = choice; }`


    `func setKetchup(choice: Bool) { self.ketchup = choice; }`


    `func setLettuce(choice: Bool) { self.lettuce = choice; }`


    `func setCooked(choice: Burger.Cooked) { self.cooked = choice; }`


    `func addPatty(choice: Bool)   { self.patties = choice ? 3 : 2; }`


    `func setBacon(choice: Bool)   { self.bacon   = choice; }`


    `func buildObject(name: String) -> Burger {`


    `return Burger(name: name, veggie: veggie, patties: patties,`


    `pickles: pickles, mayo: mayo, ketchup: ketchup,`


    `lettuce: lettuce, cook: cooked, bacon: bacon);`


    `}`


    `class func getBuilder(burgerType:Burgers) -> BurgerBuilder {`


    `var builder:BurgerBuilder;`


    `switch (burgerType) {`


    `case .BIGBURGER: builder   = BigBurgerBuilder();`


    `case .SUPERVEGGIE: builder = SuperVeggieBurgerBuilder();`


    `case .STANDARD: builder    = BurgerBuilder();`


    `}`


    `return builder;`


    `}`


    `}`


    `class BigBurgerBuilder : BurgerBuilder {`


    `private override init() {`


    `super.init();`


    `self.patties = 4;`


    `self.bacon = false;`


    `}`


    `override func addPatty(choice: Bool) {`


    `fatalError("Cannot add patty to Big Burger");`


    `}`


    `}`


    `class SuperVeggieBurgerBuilder : BurgerBuilder {`


    `private override init() {`


    `super.init();`


    `self.veggie = true;`


    `self.bacon = false;`


    `}`


    `override func setVeggie(choice: Bool) {`


    `// do nothing - always veggie`


    `}`


    `override func setBacon(choice: Bool) {`


    `fatalError("Cannot add bacon to this burger");`


    `}`


    `}`


    I have created an enumeration called `Burgers` that details the range of burgers
    that are on offer, and I have defined a factory method in the `BurgerBuilder`
    class that accepts a `Burgers` value and selects a builder that will be returned
    to the caller. The `BurgerBuilder` class will continue to be used for the `STANDARD`
    burger, but I have created subclasses that will handle the new `BigBurger` and
    `SuperVeggieBurger` products.


    The new builders revise the default values for the different burger components
    to create different starting points for the ordering process and to restrict the
    set of possible changes, such as preventing an extra patty from being added to
    the `BigBurger` or adding bacon to a `SuperVeggieBurger`.


    To take advantage of these changes, I have to revise my ordering process so that
    the server asks what kind of burger the customer requires, as shown in Listing
    11-12.


    Listing 11-12. Revising the Ordering Process in the main.swift File


    `// Step 1 - Ask for name`


    `let name = "Joe";`


    `// Step 2 - Select a Product`


    `let builder = BurgerBuilder.getBuilder(Burgers.BIGBURGER);`


    `// Step 3 - Customize burger?`


    `builder.setMayo(false);`


    `builder.setCooked(Burger.Cooked.WELLDONE);`


    `let order = builder.buildObject(name);`


    `order.printDescription();`


    ## Understanding the Pitfalls of the Builder Pattern


    There are no pitfalls to this pattern as long as you remember that the default
    values used to create the object should be defined in the builder class and not
    the calling component.


    ## Examples of the Builder Pattern in Cocoa


    The most commonly used example of the builder pattern can be found in the `NSDateComponents`
    class in the `Foundation` framework. The `NSDateComponents` class is a builder
    that allows a calling component to specify settings that can be used to produce
    an `NSDate` object that represents a calendar date. Listing 11-13 shows the contents
    of an Xcode playground I created called `DateBuilder.playground`.


    Listing 11-13. The Contents of the DateBuilder.playground File


    `import Foundation;`


    `var builder = NSDateComponents();`


    `builder.hour     = 10;`


    `builder.day      = 6;`


    `builder.month    = 9;`


    `builder.year     = 1940;`


    `builder.calendar = NSCalendar(calendarIdentifier: NSGregorianCalendar);`


    `var date         = builder.date;`


    `println(date!);`


    I create the builder by instantiating the `NSDateComponents` class, and I configure
    the object that will be produced by setting the properties it defines. I have
    set values for the `hour`, `day`, `month`, `year`, and `calendar` properties to
    replace the default values defined by the builder.


    To create the object, I read the value of the `date` property and receive an `NSDate`
    object that has been configured with the values I provided. I write the value
    to the console, which displays the following output in the playground console:


    `1940-09-06 09:00:00 +0000`


    I did not provide the builder with values for all the components that make up
    a date, so the builder has used its defaults for the minutes, seconds, and time
    zone components, which is why those parts of the date are set to zero.


    By implementing the builder pattern, the `NSDateComponents` class allows me to
    configure a date by specifying a limited number of values in the order that suits
    me. The builder doesn’t create the `NSDate` object until the `date` property is
    read, which allows me to provide data as it becomes available.


    ## Applying the Pattern to the SportsStore Application


    In this section, I will demonstrate a common use of the builder pattern and produce
    a serialized representation of an object. I’ll also show you how to use properties
    rather than methods to create the builder.


    ### Preparing the Example Application


    I pick up the SportsStore application as I left it in [Chapter 10](#A978-1-4842-0394-1_10_Chapter.html).
    I am going to implement the builder pattern to create a serialized representation
    of a change to the product data. I added a new file called `ChangeRecord.swift`
    to the SportsStore project and used it to define the class shown in Listing 11-14.


    Listing 11-14. The Contents of the ChangeRecord.swift File


    `class ChangeRecord : Printable {`


    `private let outerTag:String;`


    `private let productName:String;`


    `private let catName:String;`


    `private let innerTag:String;`


    `private let value:String;`


    `private init(outer:String, name:String, category:String,`


    `inner:String, value:String) {`


    `self.outerTag    = outer;`


    `self.productName = name;`


    `self.catName     = category;`


    `self.innerTag    = inner;`


    `self.value       = value;`


    `}`


    `var description : String {`


    `return "<\(outerTag)><\(innerTag) name=\"\(productName)\"" +`


    `" category=\"\(catName)\">\(value)</\(innerTag)></\(outerTag)>"`


    `}`


    `}`


    The `ChangeRecord` class is used to create an XML-style string that represents
    change. The class defines a set of properties that are used to configure the string.
    The `ChangeRecord` class implements the `Printable` protocol, which means that
    its `description` property will be used when an instance of the class is passed
    to the `println` function.'
  trans: "\n# 建造者模式的变体\n\n你可以将建造者模式与其它模式结合来创建其变体，通常是工厂方法模式或抽象工厂模式（我在第 9 章和第 10 章中介绍过）。\n\
    \n我最常用的组合方式是定义多个建造者类，这些类设定不同的默认值，并通过工厂方法模式来应用它们。清单 11-11 展示了如何为一种不同类型的汉堡添加一个新的建造者，并添加了一个允许选择建造者的工厂方法。\n\
    \n**清单 11-11.** 在 `Builder.swift` 文件中结合建造者模式和工厂方法模式\n\n```\nenum Burgers {\n \
    \   case STANDARD; case BIGBURGER; case SUPERVEGGIE;\n}\n\nclass BurgerBuilder\
    \ {\n    private var veggie  = false;\n    private var pickles = false;\n    private\
    \ var mayo    = true;\n    private var ketchup = true;\n    private var lettuce\
    \ = true;\n    private var cooked  = Burger.Cooked.NORMAL;\n    private var patties\
    \ = 2;\n    private var bacon   = true;\n\n    private init() {\n        // 不执行任何操作\n\
    \    }\n\n    func setVeggie(choice: Bool) {\n        self.veggie = choice;\n\
    \        if (choice) {\n            self.bacon = false;\n        }\n    }\n\n\
    \    func setPickles(choice: Bool) { self.pickles = choice; }\n    func setMayo(choice:\
    \ Bool)    { self.mayo    = choice; }\n    func setKetchup(choice: Bool) { self.ketchup\
    \ = choice; }\n    func setLettuce(choice: Bool) { self.lettuce = choice; }\n\
    \    func setCooked(choice: Burger.Cooked) { self.cooked = choice; }\n    func\
    \ addPatty(choice: Bool)   { self.patties = choice ? 3 : 2; }\n    func setBacon(choice:\
    \ Bool)   { self.bacon   = choice; }\n\n    func buildObject(name: String) ->\
    \ Burger {\n        return Burger(name: name, veggie: veggie, patties: patties,\n\
    \            pickles: pickles, mayo: mayo, ketchup: ketchup,\n            lettuce:\
    \ lettuce, cook: cooked, bacon: bacon);\n    }\n\n    class func getBuilder(burgerType:Burgers)\
    \ -> BurgerBuilder {\n        var builder:BurgerBuilder;\n        switch (burgerType)\
    \ {\n            case .BIGBURGER: builder   = BigBurgerBuilder();\n          \
    \  case .SUPERVEGGIE: builder = SuperVeggieBurgerBuilder();\n            case\
    \ .STANDARD: builder    = BurgerBuilder();\n        }\n        return builder;\n\
    \    }\n}\n\nclass BigBurgerBuilder : BurgerBuilder {\n    private override init()\
