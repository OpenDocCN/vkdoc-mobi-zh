    \ for details.\n\n![A978-1-4842-0394-1_15_Fig1_HTML.jpg](A978-1-4842-0394-1_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1.\n\nThe composite pattern\n\n# Implementing the Composite Pattern\n\
    \nThe objects used to represent individual objects are known as leaf nodes in\
    \ the tree data structure. The objects used to represent a collection are known\
    \ as composites. Both the leaf node and composite objects implement the same protocol,\
    \ which hides the details of how collections are composed from the components\
    \ that consume them.\n\nThe first step in implementation is to define the protocol,\
    \ which is the heart of the pattern. Listing 15-4 shows the definition of the\
    \ protocol for the example application, and the changes required make the `Part`\
    \ and `CompositePart` classes conform to it.\n\nListing 15-4. Defining and Applying\
    \ a Protocol in the `CarParts.swift` File\n\n```\nprotocol CarPart {\n    var\
