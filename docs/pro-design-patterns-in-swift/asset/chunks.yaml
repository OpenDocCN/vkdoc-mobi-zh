    `Log: Backed up 1 item to Server#2`


    ### Creating a Conventional Singleton Implementation


    Using a global variable works perfectly well, but you will be used to the convention
    of accessing a singleton via its class if you have come to Swift from C# or Java.
    The problem is that Swift doesn’t support type stored properties, and some ingenuity
    is required to apply the singleton pattern in the conventional way. Listing 6-9
    shows how I have used a struct with a static property to solve the problem.


    Listing 6-9. Implementing the Singleton Pattern in the BackupServer.swift File


    `...`


    `final class BackupServer {`


    `let name:String;`


    `private var data = [DataItem]();`


    `private init(name:String) {`


    `self.name = name;`


    `globalLogger.log("Created new server \(name)");`


    `}`


    `func backup(item:DataItem) {`


    `data.append(item);`


    `globalLogger.log("\(name) backed up item of type \(item.type.rawValue)");`


    `}`


    `func getData() -> [DataItem]{`


    `return data;`


    `}`


    `class var server:BackupServer {`


    `struct SingletonWrapper {`


    `static let singleton = BackupServer(name:"MainServer");`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `}`


    `...`


    Note


    The choice between a global constant and a nested struct is a personal one. I
    like the simplicity of the global variable, but years of Java and C# development
    mean that I am more comfortable with the nested struct. If you do use global constants,
    then make sure you use a naming convention that is unambiguous and consistent
    throughout your application.


    Within the computed type property `server`, I have defined a struct called `SingletonWrapper`
    that has a static stored property called `singleton`. I create the singleton `BackupServer`
    object and assign it to the `singleton` property. Finally, I return the value
    of the `singleton` property as the value of the `server` property.


    Do not worry if the last sentence doesn’t make immediate sense. This technique
    relies on the way that Swift processes `struct` definitions and static stored
    properties to ensure that only one instance of the `BackupServer` class is created,
    even though the code is a little mind-bending.


    To access the singleton, I read the value of the `BackupServer.server` property,
    as shown in Listing 6-10.


    Listing 6-10. Using the Singleton in the main.swift File


    `var server = BackupServer.server;`


    `server.backup(DataItem(type: DataItem.ItemType.Email, data: "joe@example.com"));`


    `server.backup(DataItem(type: DataItem.ItemType.Phone, data: "555-123-1133"));`


    `globalLogger.log("Backed up 2 items to \(server.name)");`


    `var otherServer = BackupServer.server;`


    `otherServer.backup(DataItem(type: DataItem.ItemType.Email, data: "bob@example.com"));`


    `globalLogger.log("Backed up 1 item to \(otherServer.name)");`


    `globalLogger.printLog();`


    The `server` and `otherServer` variables in the listing refer to the singleton,
    which means that all the `DataItem` objects are sent to the same server.'
  trans: "\n### 快速单例实现\n\n实现单例最快捷的方式是使用 Swift 全局常量。全局常量具备一些有用的特性，这些特性为遵循我在上一节中列出的规则奠定了基础。代码清单\
    \ 6-6 展示了如何在 `Logger.swift` 文件中基于全局常量来实现单例模式。\n\n**代码清单 6-6.** 在 `Logger.swift`\
    \ 文件中实现单例模式\n\n```\nlet globalLogger = Logger();\n\nfinal class Logger {\n   \
    \ private var data = [String]()\n\n    private init() {\n        // 什么也不做——用于阻止其他文件中的代码创建实例\n\
    \    }\n\n    func log(msg:String) {\n        data.append(msg);\n    }\n\n   \
    \ func printLog() {\n        for msg in data {\n            println(\"Log: \\\
    (msg)\");\n        }\n    }\n}\n```\n\n我做的第一个改动是定义了一个名为 `globalLogger` 的全局常量。这看起来可能没什么大不了的，但\
    \ Swift 语言对全局常量和变量做出了两项保证：它们会被**延迟初始化**，并且这种延迟初始化是**线程安全**的。这些保证意味着，单例对象只有在首次读取\
    \ `globalLogger` 常量的值时才被创建，并且在读取时，即使另一个线程在单例初始化期间尝试读取该值，也只会实例化出 `Logger` 类的单个实例。\n\
    \n我在代码清单 6-6 中做的其他改动是针对 `Logger` 类的。我将该类标记为 `final` ，以防止定义子类，并将初始化器标记为 `private`\
    \ ，这样就不能从 `Logger.swift` 文件外部创建实例了。定义好单例并保护其类以防止创建其他实例之后，我就可以更新 `BackupServer`\
    \ 类了，如代码清单 6-7 所示。\n\n**代码清单 6-7.** 在 `BackupServer.swift` 文件中使用单例\n\n```\n...\n\
    class BackupServer {\n    let name:String;\n    private var data = [DataItem]();\n\
    \n    init(name:String) {\n        self.name = name;\n        globalLogger.log(\"\
    Created new server \\(name)\");\n    }\n\n    func backup(item:DataItem) {\n \
    \       data.append(item);\n        globalLogger.log(\"\\(name) backed up item\
    \ of type \\(item.type.rawValue)\");\n    }\n\n    func getData() -> [DataItem]{\n\
    \        return data;\n    }\n}\n...\n```\n\n我移除了本地的 `Logger` 对象，并添加了对单例的 `log`\
    \ 方法的调用。我在上一节中列出的最后一条规则是，组件应该能够定位到单例，而正如你所见，使用全局常量使得这一过程变得非常简单。\n\n> **提示：** 这种实现方式也遵循了其他规则。私有初始化器和延迟初始化确保了\
    \ `Logger` 类只有一个实例，而使用常量意味着 `globalLogger` 所引用的对象**不能被**更改。\n\n我还需要对 `main.swift`\
    \ 文件进行修改，如代码清单 6-8 所示。\n\n**代码清单 6-8.** 在 `main.swift` 文件中使用单例\n\n```\nvar server\
    \ = BackupServer(name:\"Server#1\");\nserver.backup(DataItem(type: DataItem.ItemType.Email,\
    \ data: \"joe@example.com\"));\nserver.backup(DataItem(type: DataItem.ItemType.Phone,\
