    \ a new class called `ChangeRecordBuilder`, as shown in Listing 11-15.\n\n**Listing\
    \ 11-15.** Defining a Builder Class in the `ChangeRecord.swift` File\n\n```swift\n\
    class ChangeRecord : Printable {\n    // ...statements omitted for brevity...\n\
    }\n\nclass ChangeRecordBuilder {\n    var outerTag:String;\n    var innerTag:String;\n\
    \    var productName:String?;\n    var category:String?;\n    var value:String?;\n\
    \n    init() {\n        outerTag = \"change\";\n        innerTag = \"product\"\
    ;\n    }\n\n    var changeRecord:ChangeRecord? {\n        get {\n            if\
    \ (productName != nil && category != nil && value != nil) {\n                return\
    \ ChangeRecord(outer: outerTag, name: productName!,\n                    category:\
    \ category!, inner: innerTag, value: value!);\n            } else {\n        \
    \        return nil;\n            }\n        }\n    }\n}\n```\n\nI have used properties\
    \ to implement the pattern in the `ChangeRecordBuilder` class, which requires\
    \ a different approach than when using methods. The `ChangeRecordBuilder` provides\
    \ default values for the `outerTag` and `innerTag` properties but requires the\
    \ calling component to provide values for the `productName`, `category`, and `value`\
    \ properties.\n\nThe `changeRecord` property has to check to see that the required\
    \ values are provided before it creates a `ChangeRecord` object, but there is\
    \ no way for the `ChangeRecordBuilder` class to indicate when a required value\
    \ is missing. The best I can do is to return an optional type from the `changeRecord`\
    \ property when a value is missing. (It is for this reason that I prefer to use\
    \ methods to implement the builder pattern.)\n\n### Using the Builder Class\n\n\
