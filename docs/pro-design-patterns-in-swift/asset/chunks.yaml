    \ \"Porsche Boxter\";\n    case SUV = \"Cadillac Escalade\";\n}\n\nstruct Car\
    \ {\n    var carType:Cars;\n    var floor:Floorplan;\n    var suspension:Suspension;\n\
    \    var drive:Drivetrain;\n\n    init(carType:Cars) {\n        let concreteFactory\
    \ = CarFactory.getFactory(carType);\n        self.floor = concreteFactory!.createFloorplan();\n\
    \        self.suspension = concreteFactory!.createSuspension();\n        self.drive\
    \ = concreteFactory!.createDrivetrain();\n        self.carType = carType;\n  \
    \  }\n\n    func printDetails() {\n        println(\"Car type: \\(carType.rawValue)\"\
    );\n        println(\"Seats: \\(floor.seats)\");\n        println(\"Engine: \\\
    (floor.enginePosition.rawValue)\");\n        println(\"Suspension: \\(suspension.suspensionType.rawValue)\"\
    );\n        println(\"Drive: \\(drive.driveType.rawValue)\");\n    }\n}\n```\n\
    \n我添加了一个初始化器，它接受以 `Cars` 值表示的所需汽车类型，并用它来请求抽象工厂生成具体工厂。随后，该具体工厂被用于获取初始化对象所需的 `Floorplan`、`Suspension`\
    \ 和 `Drivetrain` 对象。此更改的影响是显著简化了 `main.swift` 文件中的代码，如清单 10-12 所示。\n\n清单 10-12. 在\
    \ `main.swift` 文件中隐藏工厂的效果\n\n```\nlet car = Car(carType: Cars.SPORTS);\ncar.printDetails();\n\
    ```\n\n**警告**\n\n这种方法对调用组件的目标做了两个假设。它假设调用组件想创建一个 `Car` 对象，并且需要所有三个对象。如果你确实采用这种变体，请确保调用组件仍然可以访问抽象工厂，以便它能为其所需目的创建所需的对象。\n\
    \n### 对具体工厂应用单例模式\n\n另一种常见的变体是对具体工厂应用单例模式。具体工厂非常适合作为单例，因为它们仅包含从实现类创建对象所需的逻辑。应用单例模式的第一步是更新抽象工厂类，即具体工厂的基类。清单\
    \ 10-13 展示了我所做的更改。\n\n清单 10-13. 在 `Abstract.swift` 文件中为单例模式做准备\n\n```\nclass CarFactory\
    \ {\n    required init() {\n        // do nothing\n    }\n\n    func createFloorplan()\
    \ -> Floorplan {\n        fatalError(\"Not implemented\");\n    }\n\n    func\
    \ createSuspension() -> Suspension {\n        fatalError(\"Not implemented\");\n\
    \    }\n\n    func createDrivetrain() -> Drivetrain {\n        fatalError(\"Not\
    \ implemented\");\n    }\n\n    final class func getFactory(car:Cars) -> CarFactory?\
    \ {\n        var factoryType:CarFactory.Type;\n        switch (car) {\n      \
    \  case .COMPACT:\n            factoryType = CompactCarFactory.self;\n       \
    \ case .SPORTS:\n            factoryType = SportsCarFactory.self;\n        case\
    \ .SUV:\n            factoryType = SUVCarFactory.self;\n        }\n\n        var\
    \ factory = factoryType.sharedInstance;\n        if (factory == nil) {\n     \
    \       factory = factoryType();\n        }\n        return factory;\n    }\n\n\
    \    class var sharedInstance:CarFactory? {\n        get {\n            return\
    \ nil;\n        }\n    }\n}\n```\n\n我添加了一个 `sharedInstance` 计算类型属性，具体工厂如果希望被视为单例，可以重写该属性。我修改了\
    \ `getfactory` 方法的实现，使其读取 `sharedInstance` 属性的值，如果有结果则将其返回给调用者。没有重写 `sharedInstance`\
    \ 属性的具体类将继承默认实现，我通过创建一个新的工厂实例来处理请求。清单 10-14 展示了我如何更新其中一个具体工厂，使其被当作单例处理。\n\n清单\
    \ 10-14. 在 `Concrete.swift` 文件中应用单例模式\n\n```\n...\nclass SportsCarFactory : CarFactory\
    \ {\n    override func createFloorplan() -> Floorplan {\n        return ShortFloorplan();\n\
    \    }\n\n    override func createSuspension() -> Suspension {\n        return\
    \ RaceSuspension();\n    }\n\n    override func createDrivetrain() -> Drivetrain\
    \ {\n        return AllWheelDrive();\n    }\n\n    override class var sharedInstance:CarFactory?\
    \ {\n        get {\n            struct SingletonWrapper {\n                static\
    \ let singleton = SportsCarFactory();\n            }\n            return SingletonWrapper.singleton;\n\
    \        }\n    }\n}\n...\n```\n\n我重写了 `SportsCarFactory` 类的 `sharedInstance`\
    \ 属性以实现单例模式，如第 6 章所述。我未对另外两个具体工厂类进行修改，这意味着每次它们被选中处理来自调用组件的请求时，都会创建新的实例。相比之下，`SportsCarFactory`\
    \ 类将只有一个实例，用于处理抽象工厂选择它的所有请求。\n\n### 对实现类应用原型模式\n\n你也可以对实现类应用单例模式，但这意味着所有组件将操作同一组对象，这仅适用于可变状态极少或没有，或者已设置并发保护的情况。\n\
    \n一种更常见的变体是使用原型模式，通过克隆来创建实现对象。在接下来的章节中，我将准备应用程序以使用原型模式，并向你展示如何实现它。\n"
- fmt: "### Preparing the Example Application\n\nThe first step is to update the implementation\
    \ classes so that they can be cloned. This requires more work than you might expect\
    \ because the `NSCopying` protocol that is used to implement the prototype pattern\
    \ won’t operate on Swift enumerations. This means I have to create an Objective-C\
    \ enumeration and import it into Swift to get the behavior I require.\n\nStart\
    \ by right-clicking the `AbstractFactory` item in the Project Navigator and select\
    \ New File from the pop-up menu. Select the Objective-C File template from the\
    \ list, as shown in Figure 10-2.\n\n![A978-1-4842-0394-1_10_Fig2_HTML.jpg](A978-1-4842-0394-1_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2. Adding an Objective-C file to the project\n\nClick the Next button\
    \ and set the name of the file to `SuspensionOption`, as shown in Figure 10-3.\n\
    \n![A978-1-4842-0394-1_10_Fig3_HTML.jpg](A978-1-4842-0394-1_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3. Setting the name for the Objective-C file\n\nClick the Next button\
    \ and save the file alongside the Swift files that are already in the project.\
    \ When you save the file, Xcode will prompt you to create a bridging header file,\
    \ as shown in Figure 10-4.\n\n![A978-1-4842-0394-1_10_Fig4_HTML.jpg](A978-1-4842-0394-1_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4. The Xcode prompt to create the bridging header file\n\nClick the\
    \ Yes button to create the file, which is required to import the Objective-C enumeration\
    \ that I am going to write into Swift. Xcode will create two files. The first\
    \ is `SuspensionOption.m`, which is the Objective-C file. I don’t need to make\
    \ any changes to this file; I just created it to get Xcode to set up the bridging\
    \ header file, which is the other file that Xcode created. The bridging header\
    \ file is called `AbstractFactory-Bridging-Header.h`, and Listing 10-15 shows\
    \ the addition I have made in preparation for the enumeration I am going to define.\n\
    \n**Listing 10-15.** The Contents of the `AbstractFactory-Bridging-Header.h` File\n\
    \n```\n#import \"SuspensionOption.h\"\n```\n\nAdd another file to the project,\
    \ but this time, add a header file called `SuspensionOption.h`. Edit the file\
    \ so that it contains the code shown in Listing 10-16.\n\n**Listing 10-16.** The\
    \ Contents of the `SuspensionOption.h` File\n\n```\n#import <Foundation/Foundation.h>\n\
    \ntypedef NS_ENUM(NSInteger, SuspensionOption) {\n\nSuspensionOptionSTANDARD,\n\
    \nSuspensionOptionSPORTS,\n\nSuspensionOptionSOFT\n\n};\n```\n\nThis enumeration\
    \ will be imported into Swift so that it is a compatible replacement for the one\
    \ that I defined in the `Suspension.swift` file. Listing 10-17 shows how I removed\
    \ the Swift enumeration and prepared for the prototype pattern.\n\n**Listing 10-17.**\
    \ Preparing for the Prototype Pattern in the `Suspension.swift` File\n\n```\n\
    import Foundation\n\n@objc protocol Suspension {\n\nvar suspensionType:SuspensionOption\
    \ { get };\n\n}\n\n//enum SuspensionOption : String {\n\n//    case STANDARD =\
    \ \"Standard\"; case SPORTS = \"Firm\"; case SOFT = \"Soft\";\n\n//}\n\nclass\
    \ RoadSuspension : Suspension {\n\nvar suspensionType = SuspensionOption.STANDARD;\n\
    \n}\n\nclass OffRoadSuspension : Suspension {\n\nvar suspensionType = SuspensionOption.SOFT;\n\
    \n}\n\nclass RaceSuspension : NSObject, NSCopying, Suspension {\n\nvar suspensionType\
    \ = SuspensionOption.SPORTS;\n\nfunc copyWithZone(zone: NSZone) -> AnyObject {\n\
    \nreturn RaceSuspension();\n\n}\n\n}\n```\n\nI have added the `@objc` attribute\
    \ to the `Suspension` enumeration so that I can perform type casting when I implement\
    \ the prototype pattern in the concrete factory class shortly. I have commented\
    \ out the Swift `SuspensionOption` enumeration so that it doesn’t conflict with\
    \ its Objective-C counterpart. Finally, I modified the `RaceSuspension` class\
    \ so that it implements the `NSCopying` protocol, which allows it to be treated\
    \ as a prototype.\n\n**Tip**  \nThe effect of applying the prototype pattern to\
    \ the implementation classes is minimal because they are so simple. See Chapter\
    \ 5 for details of when this pattern has more impact.\n\nIf you run the application,\
    \ you will see the following output:\n\n```\nCar type: Porsche Boxter\nSeats:\
    \ 2\nEngine: Mid\nSuspension: 1\nDrive: 4WD\n```\n\nNotice that the `Suspension`\
    \ value is a number. Objective-C doesn’t allow strings to be used as the underlying\
    \ type for enumerations, so I used an integer when I defined the `SuspensionOption`\
    \ enumeration in Listing 10-16. As a consequence, the output no longer shows a\
    \ descriptive string for the suspension."
  raw: '#### Preparing the Example Application


    The first step is to update the implementation classes so that they can be cloned.
    This requires more work than you might expect because the `NSCopying` protocol
    that is used to implement the prototype pattern won’t operate on Swift enumerations.
    This means I have to create an Objective-C enumeration and import it into Swift
    to get the behavior I require.


    Start by right-clicking the AbstractFactory item in the Project Navigator and
    select New File from the pop-up menu. Select the Objective-C File template from
    the list, as shown in Figure [10-2](#A978-1-4842-0394-1_10_Chapter.html#Fig2).


    ![A978-1-4842-0394-1_10_Fig2_HTML.jpg](A978-1-4842-0394-1_10_Fig2_HTML.jpg)


    Figure 10-2.


    Adding an Objective-C file to the project


    Click the Next button and set the name of the file to SuspensionOption, as shown
    in Figure [10-3](#A978-1-4842-0394-1_10_Chapter.html#Fig3).


    ![A978-1-4842-0394-1_10_Fig3_HTML.jpg](A978-1-4842-0394-1_10_Fig3_HTML.jpg)


    Figure 10-3.


    Setting the name for the Objective-C file


    Click the Next button and save the file alongside the Swift files that are already
    in the project. When you save the file, Xcode will prompt you to create a bridging
    header file, as shown in Figure [10-4](#A978-1-4842-0394-1_10_Chapter.html#Fig4).


    ![A978-1-4842-0394-1_10_Fig4_HTML.jpg](A978-1-4842-0394-1_10_Fig4_HTML.jpg)


    Figure 10-4.


    The Xcode prompt to create the bridging header file


    Click the Yes button to create the file, which is required to import the Objective-C
    enumeration that I am going to write into Swift. Xcode will create two files.
    The first is `SuspensionOption.m`, which is the Objective-C file. I don’t need
    to make any changes to this file; I just created it to get Xcode to set up the
    bridging header file, which is the other file that Xcode created. The bridging
    header file is called `AbstractFactory-Bridging-Header.h`, and Listing 10-15 shows
    the addition I have made in preparation for the enumeration I am going to define.


    Listing 10-15. The Contents of the AbstractFactory-Bridging-Header.h File


    `#import "SuspensionOption.h"`


    Add another file to the project, but this time, add a header file called `SuspensionOption.h`.
    Edit the file so that it contains the code shown in Listing 10-16.


    Listing 10-16. The Contents of the SuspensionOption.h File


    `#import <Foundation/Foundation.h>`


    `typedef NS_ENUM(NSInteger, SuspensionOption) {`


    `SuspensionOptionSTANDARD,`


    `SuspensionOptionSPORTS,`


    `SuspensionOptionSOFT`


    `};`


    This enumeration will be imported into Swift so that it is a compatible replacement
    for the one that I defined in the `Suspension.swift` file. Listing 10-17 shows
    how I removed the Swift enumeration and prepared for the prototype pattern.


    Listing 10-17. Preparing for the Prototype Pattern in the Suspension.swift File


    `import Foundation`


    `@objc protocol Suspension {`


    `var suspensionType:SuspensionOption { get };`


    `}`


    `//enum SuspensionOption : String {`


    `//    case STANDARD = "Standard"; case SPORTS = "Firm"; case SOFT = "Soft";`


    `//}`


    `class RoadSuspension : Suspension {`


    `var suspensionType = SuspensionOption.STANDARD;`


    `}`


    `class OffRoadSuspension : Suspension {`


    `var suspensionType = SuspensionOption.SOFT;`


    `}`


    `class RaceSuspension : NSObject, NSCopying, Suspension {`


    `var suspensionType = SuspensionOption.SPORTS;`


    `func copyWithZone(zone: NSZone) -> AnyObject {`


    `return RaceSuspension();`


    `}`


    `}`


    I have added the `@` `objc`attribute to the `Suspension` enumeration so that I
    can perform type casting when I implement the prototype pattern in the concrete
    factory class shortly. I have commented out the Swift `SuspensionOption` enumeration
    so that it doesn’t conflict with its Objective-C counterpart. Finally, I modified
    the `RaceSuspension` class so that it implements the `NSCopying` protocol, which
    allows it to be treated as a prototype.


    Tip


    The effect of applying the prototype pattern to the implementation classes is
    minimal because they are so simple. See [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html)
    for details of when this pattern has more impact.


    If you run the application, you will see the following output:


    `Car type: Porsche Boxter`


    `Seats: 2`


    `Engine: Mid`


    `Suspension: 1`


    `Drive: 4WD`


    Notice that the `Suspension` value is a number. Objective-C doesn’t allow strings
    to be used as the underlying type for enumerations, so I used an integer when
    I defined the `SuspensionOption` enumeration in Listing 10-16\. As a consequence,
    the output no longer shows a descriptive string for the suspension.'
  trans: "\n### 准备示例应用程序\n\n第一步是更新实现类，使其能够被克隆。这项工作比预期的更复杂，因为用于实现原型模式的 `NSCopying`\
    \ 协议无法在 Swift 枚举上运行。这意味着我必须创建一个 Objective-C 枚举，并将其导入到 Swift 中，以获得所需的行为。\n\n首先，在项目导航器中右键点击\
    \ `AbstractFactory` 项，然后从弹出菜单中选择“新建文件”。从列表中选择 Objective-C 文件模板，如图 10-2 所示。\n\n\
    ![A978-1-4842-0394-1_10_Fig2_HTML.jpg](img/A978-1-4842-0394-1_10_Fig2_HTML.jpg)\n\
    \n图 10-2. 向项目添加 Objective-C 文件\n\n点击“下一步”按钮，将文件名设置为 `SuspensionOption`，如图 10-3\
    \ 所示。\n\n![A978-1-4842-0394-1_10_Fig3_HTML.jpg](img/A978-1-4842-0394-1_10_Fig3_HTML.jpg)\n\
    \n图 10-3. 设置 Objective-C 文件的名称\n\n点击“下一步”按钮，将文件保存到项目中已有的 Swift 文件旁。保存文件时，Xcode\
    \ 会提示你创建一个桥接头文件，如图 10-4 所示。\n\n![A978-1-4842-0394-1_10_Fig4_HTML.jpg](img/A978-1-4842-0394-1_10_Fig4_HTML.jpg)\n\
    \n图 10-4. Xcode 提示创建桥接头文件\n\n点击“是”按钮创建该文件，这是将我要编写的 Objective-C 枚举导入到 Swift 中所必需的。Xcode\
    \ 会创建两个文件。第一个是 `SuspensionOption.m`，即 Objective-C 文件。我无需对此文件做任何修改；创建它只是为了引导 Xcode\
    \ 设置桥接头文件——也就是 Xcode 创建的另一个文件。桥接头文件名为 `AbstractFactory-Bridging-Header.h`，清单 10-15\
    \ 展示了我为准备要定义的枚举所进行的添加操作。\n\n**清单 10-15.** `AbstractFactory-Bridging-Header.h`\
    \ 文件的内容\n\n```\n#import \"SuspensionOption.h\"\n```\n\n向项目添加另一个文件，但这次添加一个名为 `SuspensionOption.h`\
    \ 的头文件。编辑该文件，使其包含清单 10-16 所示的代码。\n\n**清单 10-16.** `SuspensionOption.h` 文件的内容\n\
    \n```\n#import <Foundation/Foundation.h>\n\ntypedef NS_ENUM(NSInteger, SuspensionOption)\
    \ {\n\nSuspensionOptionSTANDARD,\n\nSuspensionOptionSPORTS,\n\nSuspensionOptionSOFT\n\
    \n};\n```\n\n这个枚举将被导入到 Swift 中，作为我在 `Suspension.swift` 文件中定义的枚举的兼容替代品。清单 10-17\
    \ 展示了我是如何移除 Swift 枚举并为原型模式做准备的。\n\n**清单 10-17.** 在 `Suspension.swift` 文件中为原型模式做准备\n\
    \n```\nimport Foundation\n\n@objc protocol Suspension {\n\nvar suspensionType:SuspensionOption\
    \ { get };\n\n}\n\n//enum SuspensionOption : String {\n\n//    case STANDARD =\
    \ \"Standard\"; case SPORTS = \"Firm\"; case SOFT = \"Soft\";\n\n//}\n\nclass\
    \ RoadSuspension : Suspension {\n\nvar suspensionType = SuspensionOption.STANDARD;\n\
    \n}\n\nclass OffRoadSuspension : Suspension {\n\nvar suspensionType = SuspensionOption.SOFT;\n\
    \n}\n\nclass RaceSuspension : NSObject, NSCopying, Suspension {\n\nvar suspensionType\
    \ = SuspensionOption.SPORTS;\n\nfunc copyWithZone(zone: NSZone) -> AnyObject {\n\
    \nreturn RaceSuspension();\n\n}\n\n}\n```\n\n我为 `Suspension` 协议添加了 `@objc` 属性，以便稍后在具体工厂类中实现原型模式时能够进行类型转换。我注释掉了\
    \ Swift 的 `SuspensionOption` 枚举，避免与 Objective-C 的对应枚举冲突。最后，我修改了 `RaceSuspension`\
    \ 类，使其实现 `NSCopying` 协议，从而允许将其视为原型。\n\n**提示**  \n对实现类应用原型模式的效果微乎其微，因为它们非常简单。有关该模式产生更大影响的详细信息，请参阅第\
    \ 5 章。\n\n如果运行该应用程序，你将看到以下输出：\n\n```\nCar type: Porsche Boxter\nSeats: 2\nEngine:\
    \ Mid\nSuspension: 1\nDrive: 4WD\n```\n\n请注意，`Suspension` 的值是一个数字。Objective-C\
    \ 不允许将字符串作为枚举的底层类型，因此我在清单 10-16 中定义 `SuspensionOption` 枚举时使用了整数。因此，输出不再显示悬架的描述性字符串。\n"
- fmt: "### Applying the Prototype Pattern\n\nIt is important to apply the prototype\
    \ pattern to the implementation classes and not the concrete factories. There\
    \ are two reasons for this: the first is that you can end up with multiple prototypes\
    \ unless all of the concrete factories are singletons, which undermines the effect\
    \ of applying the pattern. The second reason is that knowledge about which implementation\
    \ classes are treated as prototypes and which should be instantiated will be duplicated\
    \ throughout the factories, which means that changing the behavior of one implementation\
    \ class will require a corresponding change in all of the concrete factory classes\
    \ that use it. Forgetting to make all of these changes will result in an implementation\
    \ class that is treated inconsistently.\n\nListing 10-18 shows how I sidestep\
    \ these problems by defining a method in `Suspension` protocol that factories\
    \ will use to obtain a conforming object and allow each implementation class to\
    \ decide how that object is created.\n\n**Listing 10-18.** Applying the Prototype\
    \ Pattern in the `Suspension.swift` File\n\n```\nimport Foundation\n\n@objc protocol\
    \ Suspension {\n    var suspensionType:SuspensionOption { get };\n    class func\
    \ getInstance() -> Suspension;\n}\n\nclass RoadSuspension : Suspension {\n   \
    \ var suspensionType = SuspensionOption.STANDARD;\n    private init() {};\n  \
    \  class func getInstance() -> Suspension {\n        return RoadSuspension();\n\
    \    }\n}\n\nclass OffRoadSuspension : Suspension {\n    var suspensionType =\
    \ SuspensionOption.SOFT;\n    private init() {};\n    class func getInstance()\
    \ -> Suspension {\n        return OffRoadSuspension();\n    }\n}\n\nclass RaceSuspension\
    \ : NSObject, NSCopying, Suspension {\n    var suspensionType = SuspensionOption.SPORTS;\n\
    \    private override init() {};\n    func copyWithZone(zone: NSZone) -> AnyObject\
    \ {\n        return RaceSuspension();\n    }\n    private class var prototype:RaceSuspension\
    \ {\n        get {\n            struct SingletonWrapper {\n                static\
    \ let singleton = RaceSuspension();\n            }\n            return SingletonWrapper.singleton;\n\
    \        }\n    }\n    class func getInstance() -> Suspension {\n        return\
    \ prototype.copy() as Suspension;\n    }\n}\n```\n\n**Tip**\n\nYou would apply\
    \ the pattern to all of the implementation classes in a real project, but I am\
    \ changing the suspension classes only to avoid repeating similar changes.\n\n\
    I have added a method called `getInstance` to the `Suspension` protocol. Each\
    \ of the implementation classes is required to define this method, and the `RoadSuspension`\
    \ and `OffRoadSuspension` simply create new objects. The `RaceSuspension` class\
    \ defines a prototype as a singleton and copies it each time the `getInstance`\
    \ method is called.\n\n**Tip**\n\nI have defined empty `private` initializers\
    \ on the implementation classes so they cannot be instantiated directly. Notice\
    \ that I used the `override` keyword for the `RaceSuspension` class because it\
    \ inherits an empty initializer from the `NSObject` class, which is the required\
    \ base class for the `NSCopying` protocol. See [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html)\
    \ for details.\n\nIn Listing 10-19, you can see how I have updated the concrete\
    \ factory classes to reflect the changes in the suspension classes.\n\n**Listing\
    \ 10-19.** Revising the Consumption of Suspension Classes in the `Concrete.swift`\
    \ File\n\n```\nclass CompactCarFactory : CarFactory {\n    override func createFloorplan()\
    \ -> Floorplan {\n        return StandardFloorplan();\n    }\n    override func\
    \ createSuspension() -> Suspension {\n        return RoadSuspension.getInstance();\n\
    \    }\n    override func createDrivetrain() -> Drivetrain {\n        return FrontWheelDrive();\n\
    \    }\n}\n\nclass SportsCarFactory : CarFactory {\n    override func createFloorplan()\
    \ -> Floorplan {\n        return ShortFloorplan();\n    }\n    override func createSuspension()\
    \ -> Suspension {\n        return RaceSuspension.getInstance();\n    }\n    override\
    \ func createDrivetrain() -> Drivetrain {\n        return AllWheelDrive();\n \
    \   }\n    override class var sharedInstance:CarFactory? {\n        get {\n  \
    \          struct SingletonWrapper {\n                static let singleton = SportsCarFactory();\n\
    \            }\n            return SingletonWrapper.singleton;\n        }\n  \
    \  }\n}\n\nclass SUVCarFactory : CarFactory {\n    override func createFloorplan()\
    \ -> Floorplan {\n        return LongFloorplan();\n    }\n    override func createSuspension()\
    \ -> Suspension {\n        return OffRoadSuspension.getInstance();\n    }\n  \
    \  override func createDrivetrain() -> Drivetrain {\n        return AllWheelDrive();\n\
    \    }\n}\n```\n\nWith these changes in place, instances of the `RaceSuspension`\
    \ class are created through the prototype pattern. This fact is hidden from the\
    \ concrete factory classes, which makes it easy to change the behavior of individual\
    \ implementation classes without further changes to the concrete factories.\n\n\
    ## Understanding the Pitfalls of the Pattern\n\nThe main pitfall for this pattern\
    \ is blurring the lines between the different components. Specifically, the abstract\
    \ factory class should contain the decision logic only for selecting a concrete\
    \ factory and not for implementation classes. Equally, the concrete factories\
    \ should contain the logic for selecting implementation classes and not provide\
    \ any of the functionality defined by the product protocols.\n\nThe only other\
    \ pitfall to avoid arises when combining this pattern with the object pool pattern\
    \ that I described in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html). This is\
    \ a disastrous combination if you try to manage separate pools for each implementation\
    \ class and make calling components wait for a combination of objects to become\
    \ available. Object pooling works best when all of the components require the\
    \ same type of object, and trying to queue access to overlapping sets of objects\
    \ will often lead to deadlocks when two components have acquired a free object\
    \ required by the other. If you do try to combine these patterns, ensure that\
    \ your calling components always acquire objects from the pools in the same order\
    \ and that you pay particular attention to avoiding deadlocks.\n\n## Examples\
    \ of the Pattern in Cocoa\n\nIt is not possible to tell whether the factory method\
    \ or abstract factory pattern has been used when you create a Cocoa object. As\
    \ the recipient of the object, you simply don’t know whether you have received\
    \ a concrete factory or just a regular object whose class was selected based on\
    \ your request. It doesn’t help that Apple conflates the factory method and abstract\
    \ factory patterns in its documentation, which is why you will often hear class\
    \ clusters described as an implementation of both patterns.\n\nThis is exactly\
    \ how it should be because both patterns are all about hiding decisions and implementations\
    \ from the calling components, and the only way you can tell which pattern has\
    \ been used is to look at the source code. The implementation of either pattern\
    \ would be flawed if you could tell by any other means.\n\n## Applying the Pattern\
    \ to the SportsStore Application\n\nTo demonstrate how to apply the abstract factory\
    \ pattern, I am going to change the way that the total value of the SportsStore\
    \ stock is produced so that different currencies and currency rates can be selected.\
    \ In the sections that follow, I’ll walk through the process of defining the protocols\
    \ and implementation classes that will convert the stock value and prepare it\
    \ for display and of delivering those classes via abstract and concrete factories.\n\
    \n### Preparing the Example Application\n\nNo preparation is required for this\
    \ chapter; I am going to pick up the project just as I left it in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html).\n\
    \n**Tip**\n\nDo not forget that you can download the source code for every chapter\
    \ from [`Apress.com`](https://Apress.com) in case you don’t want to re-create\
    \ the SportsStore project manually."
  raw: '#### Applying the Prototype Pattern


    It is important to apply the prototype pattern to the implementation classes and
    not the concrete factories. There are two reasons for this: the first is that
    you can end up with multiple prototypes unless all of the concrete factories are
    singletons, which undermines the effect of applying the pattern. The second reason
    is that knowledge about which implementation classes are treated as prototypes
    and which should be instantiated will be duplicated throughout the factories,
    which means that changing the behavior of one implementation class will require
    a corresponding change in all of the concrete factory classes that use it. Forgetting
    to make all of these changes will result in an implementation class that is treated
    inconsistently.


    Listing 10-18 shows how I sidestep these problems by defining a method in `Suspension`
    protocol that factories will use to obtain a conforming object and allow each
    implementation class to decide how that object is created.


    Listing 10-18. Applying the Prototype Pattern in the Suspension.swift File


    `import Foundation`


    `@objc protocol Suspension {`


    `var suspensionType:SuspensionOption { get };`


    `class func getInstance() -> Suspension;`


    `}`


    `class RoadSuspension : Suspension {`


    `var suspensionType = SuspensionOption.STANDARD;`


    `private init() {};`


    `class func getInstance() -> Suspension {`


    `return RoadSuspension();`


    `}`


    `}`


    `class OffRoadSuspension : Suspension {`


    `var suspensionType = SuspensionOption.SOFT;`


    `private init() {};`


    `class func getInstance() -> Suspension {`


    `return OffRoadSuspension();`


    `}`


    `}`


    `class RaceSuspension : NSObject, NSCopying, Suspension {`


    `var suspensionType = SuspensionOption.SPORTS;`


    `private override init() {};`


    `func copyWithZone(zone: NSZone) -> AnyObject {`


    `return RaceSuspension();`


    `}`


    `private class var prototype:RaceSuspension {`


    `get {`


    `struct SingletonWrapper {`


    `static let singleton = RaceSuspension();`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `}`


    `class func getInstance() -> Suspension {`


    `return prototype.copy() as Suspension;`


    `}`


    `}`


    Tip


    You would apply the pattern to all of the implementation classes in a real project,
    but I am changing the suspension classes only to avoid repeating similar changes.


    I have added a method called `getInstance` to the `Suspension` protocol. Each
    of the implementation classes is required to define this method, and the `RoadSuspension`
    and `OffRoadSuspension` simply create new objects. The `RaceSuspension` class
    defines a prototype as a singleton and copies it each time the `getInstance` method
    is called.


    Tip


    I have defined empty `private` initializers on the implementation classes so they
    cannot be instantiated directly. Notice that I used the `override` keyword for
    the `RaceSuspension` class because it inherits an empty initializer from the `NSObject`
    class, which is the required base class for the `NSCopying` protocol. See [Chapter
    5](#A978-1-4842-0394-1_5_Chapter.html) for details.


    In Listing 10-19, you can see how I have updated the concrete factory classes
    to reflect the changes in the suspension classes.


    Listing 10-19. Revising the Consumption of Suspension Classes in the Concrete.swift
    File


    `class CompactCarFactory : CarFactory {`


    `override func createFloorplan() -> Floorplan {`


    `return StandardFloorplan();`


    `}`


    `override func createSuspension() -> Suspension {`


    `return RoadSuspension.getInstance();`


    `}`


    `override func createDrivetrain() -> Drivetrain {`


    `return FrontWheelDrive();`


    `}`


    `}`


    `class SportsCarFactory : CarFactory {`


    `override func createFloorplan() -> Floorplan {`


    `return ShortFloorplan();`


    `}`


    `override func createSuspension() -> Suspension {`


    `return RaceSuspension.getInstance();`


    `}`


    `override func createDrivetrain() -> Drivetrain {`


    `return AllWheelDrive();`


    `}`


    `override class var sharedInstance:CarFactory? {`


    `get {`


    `struct SingletonWrapper {`


    `static let singleton = SportsCarFactory();`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `}`


    `}`


    `class SUVCarFactory : CarFactory {`


    `override func createFloorplan() -> Floorplan {`


    `return LongFloorplan();`


    `}`


    `override func createSuspension() -> Suspension {`


    `return OffRoadSuspension.getInstance();`


    `}`


    `override func createDrivetrain() -> Drivetrain {`


    `return AllWheelDrive();`


    `}`


    `}`


    With these changes in place, instances of the `RaceSuspension` class are created
    through the prototype pattern. This fact is hidden from the concrete factory classes,
    which makes it easy to change the behavior of individual implementation classes
    without further changes to the concrete factories.


    ## Understanding the Pitfalls of the Pattern


    The main pitfall for this pattern is blurring the lines between the different
    components. Specifically, the abstract factory class should contain the decision
    logic only for selecting a concrete factory and not for implementation classes.
    Equally, the concrete factories should contain the logic for selecting implementation
    classes and not provide any of the functionality defined by the product protocols.


    The only other pitfall to avoid arises when combining this pattern with the object
    pool pattern that I described in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html).
    This is a disastrous combination if you try to manage separate pools for each
    implementation class and make calling components wait for a combination of objects
    to become available. Object pooling works best when all of the components require
    the same type of object, and trying to queue access to overlapping sets of objects
    will often lead to deadlocks when two components have acquired a free object required
    by the other. If you do try to combine these patterns, ensure that your calling
    components always acquire objects from the pools in the same order and that you
    pay particular attention to avoiding deadlocks.


    ## Examples of the Pattern in Cocoa


    It is not possible to tell whether the factory method or abstract factory pattern
    has been used when you create a Cocoa object. As the recipient of the object,
    you simply don’t know whether you have received a concrete factory or just a regular
    object whose class was selected based on your request. It doesn’t help that Apple
    conflates the factory method and abstract factory patterns in its documentation,
    which is why you will often hear class clusters described as an implementation
    of both patterns.


    This is exactly how it should be because both patterns are all about hiding decisions
    and implementations from the calling components, and the only way you can tell
    which pattern has been used is to look at the source code. The implementation
    of either pattern would be flawed if you could tell by any other means.


    ## Applying the Pattern to the SportsStore Application


    To demonstrate how to apply the abstract factory pattern, I am going to change
    the way that the total value of the SportsStore stock is produced so that different
    currencies and currency rates can be selected. In the sections that follow, I’ll
    walk through the process of defining the protocols and implementation classes
    that will convert the stock value and prepare it for display and of delivering
    those classes via abstract and concrete factories.


    ### Preparing the Example Application


    No preparation is required for this chapter; I am going to pick up the project
    just as I left it in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html).


    Tip


    Do not forget that you can download the source code for every chapter from [`Apress.com`](https://Apress.com)
    in case you don’t want to re-create the SportsStore project manually.'
  trans: "\n### 应用原型模式\n\n将原型模式应用于实现类而非具体工厂非常重要。这有两个原因：第一，除非所有具体工厂都是单例，否则最终可能会产生多个原型，这会削弱应用该模式的效果。第二，关于哪些实现类被视为原型、哪些应被实例化的知识将在各个工厂中重复，这意味着更改一个实现类的行为将需要所有使用它的具体工厂类进行相应的更改。如果忘记进行所有这些更改，将导致某个实现类的处理方式不一致。\n\
    \n清单 10-18 展示了如何通过在 `Suspension` 协议中定义一个工厂用来获取符合协议对象的方法来规避这些问题，并允许每个实现类自行决定如何创建该对象。\n\
    \n**清单 10-18.** 在 `Suspension.swift` 文件中应用原型模式\n\n```\nimport Foundation\n\n@objc\
    \ protocol Suspension {\n    var suspensionType:SuspensionOption { get };\n  \
    \  class func getInstance() -> Suspension;\n}\n\nclass RoadSuspension : Suspension\
    \ {\n    var suspensionType = SuspensionOption.STANDARD;\n    private init() {};\n\
    \    class func getInstance() -> Suspension {\n        return RoadSuspension();\n\
    \    }\n}\n\nclass OffRoadSuspension : Suspension {\n    var suspensionType =\
    \ SuspensionOption.SOFT;\n    private init() {};\n    class func getInstance()\
    \ -> Suspension {\n        return OffRoadSuspension();\n    }\n}\n\nclass RaceSuspension\
    \ : NSObject, NSCopying, Suspension {\n    var suspensionType = SuspensionOption.SPORTS;\n\
    \    private override init() {};\n    func copyWithZone(zone: NSZone) -> AnyObject\
    \ {\n        return RaceSuspension();\n    }\n    private class var prototype:RaceSuspension\
    \ {\n        get {\n            struct SingletonWrapper {\n                static\
    \ let singleton = RaceSuspension();\n            }\n            return SingletonWrapper.singleton;\n\
    \        }\n    }\n    class func getInstance() -> Suspension {\n        return\
    \ prototype.copy() as Suspension;\n    }\n}\n```\n\n**提示**\n\n在实际项目中，你会将模式应用于所有实现类，但此处我只更改悬挂类以避免重复类似的改动。\n\
    \n我在 `Suspension` 协议中增加了一个名为 `getInstance` 的方法。每个实现类都需要定义此方法，其中 `RoadSuspension`\
    \ 和 `OffRoadSuspension` 只是简单地创建新对象。`RaceSuspension` 类则将原型定义为单例，并在每次调用 `getInstance`\
    \ 方法时复制它。\n\n**提示**\n\n我为实现类定义了空的 `private` 初始化方法，这样它们就不能被直接实例化。请注意，我针对 `RaceSuspension`\
    \ 类使用了 `override` 关键字，因为它从 `NSObject` 类继承了一个空的初始化方法，而 `NSObject` 是 `NSCopying`\
    \ 协议所需的基类。详见第 5 章。\n\n在清单 10-19 中，你可以看到我如何更新具体工厂类以反映悬挂类的变化。\n\n**清单 10-19.** 在\
    \ `Concrete.swift` 文件中修订悬挂类的消费方式\n\n```\nclass CompactCarFactory : CarFactory\
    \ {\n    override func createFloorplan() -> Floorplan {\n        return StandardFloorplan();\n\
    \    }\n    override func createSuspension() -> Suspension {\n        return RoadSuspension.getInstance();\n\
    \    }\n    override func createDrivetrain() -> Drivetrain {\n        return FrontWheelDrive();\n\
    \    }\n}\n\nclass SportsCarFactory : CarFactory {\n    override func createFloorplan()\
    \ -> Floorplan {\n        return ShortFloorplan();\n    }\n    override func createSuspension()\
    \ -> Suspension {\n        return RaceSuspension.getInstance();\n    }\n    override\
    \ func createDrivetrain() -> Drivetrain {\n        return AllWheelDrive();\n \
    \   }\n    override class var sharedInstance:CarFactory? {\n        get {\n  \
    \          struct SingletonWrapper {\n                static let singleton = SportsCarFactory();\n\
    \            }\n            return SingletonWrapper.singleton;\n        }\n  \
    \  }\n}\n\nclass SUVCarFactory : CarFactory {\n    override func createFloorplan()\
    \ -> Floorplan {\n        return LongFloorplan();\n    }\n    override func createSuspension()\
    \ -> Suspension {\n        return OffRoadSuspension.getInstance();\n    }\n  \
    \  override func createDrivetrain() -> Drivetrain {\n        return AllWheelDrive();\n\
    \    }\n}\n```\n\n完成这些改动后，`RaceSuspension` 类的实例通过原型模式创建。这一事实对具体工厂类是隐藏的，这使得更改单个实现类的行为变得容易，而无需进一步更改具体工厂。\n\
    \n## 理解该模式的陷阱\n\n此模式的主要陷阱是模糊了不同组件之间的界限。具体来说，抽象工厂类应仅包含选择具体工厂的决策逻辑，而不应包含实现类的逻辑。同样，具体工厂应包含选择实现类的逻辑，而不应提供产品协议定义的任何功能。\n\
    \n唯一需要避免的另一个陷阱出现在将此模式与第 7 章中描述的对象池模式结合使用时。如果你试图为每个实现类管理独立的池，并让调用组件等待一组对象变得可用，这将是一种灾难性的组合。当所有组件都需要相同类型的对象时，对象池的效果最佳；而试图排队访问重叠的对象集，通常会在两个组件各自获取了对方所需的空闲对象时导致死锁。如果你确实尝试结合这些模式，请确保你的调用组件始终以相同的顺序从池中获取对象，并特别注意避免死锁。\n\
    \n## Cocoa 中该模式的示例\n\n当你创建一个 Cocoa 对象时，无法判断是使用了工厂方法模式还是抽象工厂模式。作为对象的接收者，你根本不知道你收到的是一个具体工厂，还是一个基于你的请求选择了其类的普通对象。苹果在其文档中混淆了工厂方法模式和抽象工厂模式，这无济于事，这就是为什么你经常会听到类簇被描述为这两种模式的实现。\n\
    \n这正应该是这样的，因为这两种模式都是关于向调用组件隐藏决策和实现的，而判断使用了哪种模式的唯一方法是查看源代码。如果你能通过其他方式判断，那么这两种模式的实现都是有缺陷的。\n\
    \n## 将模式应用于 SportsStore 应用程序\n\n为了演示如何应用抽象工厂模式，我将更改 SportsStore 库存总价值的生成方式，以便可以选择不同的货币和汇率。在接下来的小节中，我将逐步介绍定义协议和实现类的过程，这些协议和类将转换库存价值并准备显示，以及通过抽象工厂和具体工厂提供这些类的过程。\n\
    \n### 准备示例应用程序\n\n本章无需准备工作；我将继续使用第 9 章结束时的项目。\n\n**提示**\n\n如果你不想手动重新创建 SportsStore\
    \ 项目，请不要忘记你可以从 [`Apress.com`](https://Apress.com) 下载每一章的源代码。\n"
- fmt: "### Defining the Implementation Protocols and Classes\n\nThe first step is\
    \ to create a file that will contain the definitions for the implementation classes\
    \ and the protocols through which their functionality will be expressed. Listing\
    \ 10-20 shows the contents of the `StockValueImplementations.swift` file, which\
    \ I added to the SportsStore project.\n\n**Listing 10-20.** The Contents of the\
    \ `StockValueImplementations.swift` File\n\n```swift\nimport Foundation\n\nprotocol\
    \ StockValueFormatter {\n    func formatTotal(total: Double) -> String;\n}\n\n\
    class DollarStockValueFormatter: StockValueFormatter {\n    func formatTotal(total:\
    \ Double) -> String {\n        let formatted = Utils.currencyStringFromNumber(total);\n\
    \        return \"\\(formatted)\";\n    }\n}\n\nclass PoundStockValueFormatter:\
    \ StockValueFormatter {\n    func formatTotal(total: Double) -> String {\n   \
    \     let formatted = Utils.currencyStringFromNumber(total);\n        return \"\
    £\\(dropFirst(formatted))\";\n    }\n}\n\nprotocol StockValueConverter {\n   \
    \ func convertTotal(total: Double) -> Double;\n}\n\nclass DollarStockValueConverter:\
    \ StockValueConverter {\n    func convertTotal(total: Double) -> Double {\n  \
    \      return total;\n    }\n}\n\nclass PoundStockValueConverter: StockValueConverter\
    \ {\n    func convertTotal(total: Double) -> Double {\n        return 0.60338\
    \ * total;\n    }\n}\n```\n\nI have defined two protocols and two families of\
    \ implementation classes. The protocols are called `StockValueFormatter` and `StockValueConverter`.\
    \ The `StockValueConverter` protocol is responsible for converting the currency\
    \ amount from dollars, and the `StockValueFormatter` protocol is responsible for\
    \ preparing the currency amount. I have created two families of implementation\
    \ classes, one of which simply passes the dollar amount on without any modification\
    \ and the other converts the amount to British pounds.\n\n### Defining the Abstract\
    \ and Concrete Factory Classes\n\nI defined the abstract factory and concrete\
    \ factory classes in a new file called `StockValueFactories.swift`, the contents\
    \ of which are shown in Listing 10-21.\n\n**Listing 10-21.** The Contents of the\
    \ `StockValueFactories.swift` File\n\n```swift\nimport Foundation\n\nclass StockTotalFactory\
    \ {\n    enum Currency {\n        case USD\n        case GBP\n    }\n\n    private(set)\
    \ var formatter: StockValueFormatter?;\n    private(set) var converter: StockValueConverter?;\n\
    \n    class func getFactory(curr: Currency) -> StockTotalFactory {\n        if\
    \ (curr == Currency.USD) {\n            return DollarStockTotalFactory.sharedInstance;\n\
    \        } else {\n            return PoundStockTotalFactory.sharedInstance;\n\
    \        }\n    }\n}\n\nprivate class DollarStockTotalFactory: StockTotalFactory\
    \ {\n    private override init() {\n        super.init();\n        formatter =\
    \ DollarStockValueFormatter();\n        converter = DollarStockValueConverter();\n\
    \    }\n\n    class var sharedInstance: StockTotalFactory {\n        get {\n \
    \           struct SingletonWrapper {\n                static let singleton =\
    \ DollarStockTotalFactory();\n            }\n            return SingletonWrapper.singleton;\n\
    \        }\n    }\n}\n\nprivate class PoundStockTotalFactory: StockTotalFactory\
    \ {\n    private override init() {\n        super.init();\n        formatter =\
    \ PoundStockValueFormatter();\n        converter = PoundStockValueConverter();\n\
    \    }\n\n    class var sharedInstance: StockTotalFactory {\n        get {\n \
    \           struct SingletonWrapper {\n                static let singleton =\
    \ PoundStockTotalFactory();\n            }\n            return SingletonWrapper.singleton;\n\
    \        }\n    }\n}\n```\n\nThe `StockTotalFactory` class is the abstract factory,\
    \ and it selects between the concrete classes, `DollarStockTotalFactory` and `PoundStockTotalFactory`,\
    \ based on a value from the `Currency` enumeration passed to the `getFactory`\
    \ method. The effect is the matrix shown in Table 10-3.\n\n**Table 10-3.** The\
    \ Currency to Formatter/Converter Mappings\n\n| Currency | StockValueFormatter\
    \ | StockValueConverter |\n|----------|----------------------|----------------------|\n\
    | `USD`    | `DollarStockValueFormatter` | `DollarStockValueConverter` |\n| `GBP`\
    \    | `PoundStockValueFormatter` | `PoundStockValueConverter` |\n\n### Consuming\
    \ the Factories and Implementation Classes\n\nThe last step is to use the abstract\
    \ factory to convert and format the value of the stock. Listing 10-22 shows the\
    \ changes I made to the `ViewController.swift` file.\n\n**Listing 10-22.** Consuming\
    \ the Abstract Factory Pattern in the `ViewController.swift` File\n\n```swift\n\
    ...\n\nfunc displayStockTotal() {\n    let finalTotals: (Int, Double) = productStore.products.reduce((0,\
    \ 0.0),\n        {(totals, product) -> (Int, Double) in\n            return (\n\
    \                totals.0 + product.stockLevel,\n                totals.1 + product.stockValue\n\
    \            );\n        });\n\n    var factory = StockTotalFactory.getFactory(StockTotalFactory.Currency.GBP);\n\
    \    var totalAmount = factory.converter?.convertTotal(finalTotals.1);\n    var\
    \ formatted = factory.formatter?.formatTotal(totalAmount!);\n    totalStockLabel.text\
    \ = \"\\(finalTotals.0) Products in Stock. \"\n        + \"Total Value: \\(formatted!)\"\
    ;\n}\n\n...\n```\n\nI have specified the GBP currency, which selects the implementation\
    \ class family responsible for handling British pounds. When you run the application,\
    \ the total value of the stock will be converted from dollars to pounds and displayed\
    \ in the application, as shown in Figure 10-5.\n\n![A978-1-4842-0394-1_10_Fig5_HTML.jpg](A978-1-4842-0394-1_10_Fig5_HTML.jpg)\n\
    \n**Figure 10-5.** Converting and formatting the value of the stock\n\nThe `ViewController`\
    \ class is able to format the stock value without needing any details about the\
    \ concrete class that has been selected and the implementation classes that it\
    \ provides.\n\n## Summary\n\nIn this chapter, I explained how the abstract factory\
    \ pattern can be used to create objects that are part of a group or family but\
    \ that do not conform to a common protocol or share a common base class. In the\
    \ next chapter, I describe the builder pattern.\n\n# 11. The Builder Pattern\n\
    \nThe builder pattern is used to separate the configuration of an object from\
    \ its creation. The calling component has the configuration data and passes it\
    \ to an intermediary—the builder—that is responsible for creating an object on\
    \ behalf of the component. This separation can reduce the amount of knowledge\
    \ that the calling component has about the objects it uses and concentrates default\
    \ configuration values in the builder class, rather than being required in every\
    \ component that creates objects. Table 11-1 puts the builder pattern in context.\n\
    \n**Table 11-1.** Putting the Builder Pattern into Context\n\n| Question | Answer\
    \ |\n|----------|--------|\n| What is it? | The builder pattern puts the logic\
    \ and default configuration values required to create an object into a builder\
    \ class. This allows calling components to create objects with minimal configuration\
    \ data and without needing to know the default values that will be used to create\
    \ the object. |\n| What are the benefits? | This pattern makes it easier to change\
    \ the default configuration values used to create an object and to change the\
    \ class from which instances are created. |\n| When should you use this pattern?\
    \ | Use this pattern when a complex configuration process is required to create\
    \ an object and you don’t want the default configuration values to be disseminated\
    \ throughout the application. |\n| When should you avoid this pattern? | Don’t\
    \ use this pattern when every data value required to create an object will be\
    \ different for each instance. |\n| How do you know when you have implemented\
    \ the pattern correctly? | The calling component can create objects by providing\
    \ just the data values for which there are no default values (although values\
    \ may also be provided to override some or all of the defaults). |\n| Are there\
    \ any common pitfalls? | No. |\n| Are there any related patterns? | This pattern\
    \ can be combined with the factory method or abstract factory patterns to change\
    \ the implementation class used to create the object based on the configuration\
    \ data provided by the calling component. |"
  raw: '### Defining the Implementation Protocols and Classes


    The first step is to create a file that will contain the definitions for the implementation
    classes and the protocols through which their functionality will be expressed.
    Listing 10-20 shows the contents of the `StockValueImplementations.swift` file,
    which I added to the SportsStore project.


    Listing 10-20. The Contents of the StockValueImplementations.swift File


    `import Foundation`


    `protocol StockValueFormatter {`


    `func formatTotal(total:Double) -> String;`


    `}`


    `class DollarStockValueFormatter : StockValueFormatter {`


    `func formatTotal(total:Double) -> String {`


    `let formatted = Utils.currencyStringFromNumber(total);`


    `return "\(formatted)";`


    `}`


    `}`


    `class PoundStockValueFormatter : StockValueFormatter {`


    `func formatTotal(total:Double) -> String {`


    `let formatted = Utils.currencyStringFromNumber(total);`


    `return "£\(dropFirst(formatted))";`


    `}`


    `}`


    `protocol StockValueConverter {`


    `func convertTotal(total:Double) -> Double;`


    `}`


    `class DollarStockValueConverter : StockValueConverter {`


    `func convertTotal(total:Double) -> Double {`


    `return total;`


    `}`


    `}`


    `class PoundStockValueConverter : StockValueConverter {`


    `func convertTotal(total:Double) -> Double {`


    `return 0.60338 * total;`


    `}`


    `}`


    I have defined two protocols and two families of implementation classes. The protocols
    are called `StockValueFormatter` and `StockValueConverter`. The `StockValueConverter`
    protocol is responsible for converting the currency amount from dollars, and the
    `StockValueFormatter` protocol is responsible for preparing the currency amount.
    I have created two families of implementation classes, one of which simply passes
    the dollar amount on without any modification and the other converts the amount
    to British pounds.


    ### Defining the Abstract and Concrete Factory Classes


    I defined the abstract factory and concrete factory classes in a new file called
    `StockValueFactories.swift`, the contents of which are shown in Listing 10-21.


    Listing 10-21. The Contents of the StockValueFactories.swift File


    `import Foundation`


    `class StockTotalFactory {`


    `enum Currency {`


    `case USD`


    `case GBP`


    `}`


    `private(set) var formatter:StockValueFormatter?;`


    `private(set) var converter:StockValueConverter?;`


    `class func getFactory(curr:Currency) -> StockTotalFactory {`


    `if (curr == Currency.USD) {`


    `return DollarStockTotalFactory.sharedInstance;`


    `} else {`


    `return PoundStockTotalFactory.sharedInstance;`


    `}`


    `}`


    `}`


    `private class DollarStockTotalFactory : StockTotalFactory {`


    `private override init() {`


    `super.init();`


    `formatter = DollarStockValueFormatter();`


    `converter = DollarStockValueConverter();`


    `}`


    `class var sharedInstance:StockTotalFactory {`


    `get {`


    `struct SingletonWrapper {`


    `static let singleton = DollarStockTotalFactory();`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `}`


    `}`


    `private class PoundStockTotalFactory : StockTotalFactory {`


    `private override init() {`


    `super.init();`


    `formatter = PoundStockValueFormatter();`


    `converter = PoundStockValueConverter();`


    `}`


    `class var sharedInstance:StockTotalFactory {`


    `get {`


    `struct SingletonWrapper {`


    `static let singleton = PoundStockTotalFactory();`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `}`


    `}`


    The `StockTotalFactory` class is the abstract factory, and it selects between
    the concrete classes, `DollarStockTotalFactory` and `PoundStockTotalFactory`,
    based on a value from the `Currency` enumeration passed to the `getFactory` method.
    The effect is the matrix shown in Table [10-3](#A978-1-4842-0394-1_10_Chapter.html#Tab3).


    Table 10-3.


    The Currency to Formatter/Converter Mappings


    | Currency | StockValueFormatter | StockValueConverter |

    | --- | --- | --- |

    | `USD` | `DollarStockValueFormatter` | `DollarStockValueConverter` |

    | `GBP` | `PoundStockValueFormatter` | `PoundStockValueConverter` |


    ### Consuming the Factories and Implementation Classes


    The last step is to use the abstract factory to convert and format the value of
    the stock. Listing 10-22 shows the changes I made to the `ViewController.swift`
    file.


    Listing 10-22. Consuming the Abstract Factory Pattern in the ViewController.swift
    File


    `...`


    `func displayStockTotal() {`


    `let finalTotals:(Int, Double) = productStore.products.reduce((0, 0.0),`


    `{(totals, product) -> (Int, Double) in`


    `return (`


    `totals.0 + product.stockLevel,`


    `totals.1 + product.stockValue`


    `);`


    `});`


    `var factory = StockTotalFactory.getFactory(StockTotalFactory.Currency.GBP);`


    `var totalAmount = factory.converter?.convertTotal(finalTotals.1);`


    `var formatted = factory.formatter?.formatTotal(totalAmount!);`


    `totalStockLabel.text = "\(finalTotals.0) Products in Stock. "`


    `+ "Total Value: \(formatted!)";`


    `}`


    `...`


    I have specified the GBP currency, which selects the implementation class family
    responsible for handling British pounds. When you run the application, the total
    value of the stock will be converted from dollars to pounds and displayed in the
    application, as shown in Figure [10-5](#A978-1-4842-0394-1_10_Chapter.html#Fig5).


    ![A978-1-4842-0394-1_10_Fig5_HTML.jpg](A978-1-4842-0394-1_10_Fig5_HTML.jpg)


    Figure 10-5.


    Converting and formatting the value of the stock


    The `ViewController` class is able to format the stock value without needing any
    details about the concrete class that has been selected and the implementation
    classes that it provides.


    ## Summary


    In this chapter, I explained how the abstract factory pattern can be used to create
    objects that are part of a group or family but that do not conform to a common
    protocol or share a common base class. In the next chapter, I describe the builder
    pattern.


    # 11. The Builder Pattern


    The builder pattern is used to separate the configuration of an object from its
    creation. The calling component has the configuration data and passes it to an
    intermediary—the builder—that is responsible for creating an object on behalf
    of the component. This separation can reduce the amount of knowledge that the
    calling component has about the objects it uses and concentrates default configuration
    values in the builder class, rather than being required in every component that
    creates objects. Table [11-1](#A978-1-4842-0394-1_11_Chapter.html#Tab1) puts the
    builder pattern in context.


    Table 11-1.


    Putting the Builder Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The builder pattern puts the logic and default configuration values
    required to create an object into a builder class. This allows calling components
    to create objects with minimal configuration data and without needing to know
    the default values that will be used to create the object. |

    | What are the benefits? | This pattern makes it easier to change the default
    configuration values used to create an object and to change the class from which
    instances are created. |

    | When should you use this pattern? | Use this pattern when a complex configuration
    process is required to create an object and you don’t want the default configuration
    values to be disseminated throughout the application. |

    | When should you avoid this pattern? | Don’t use this pattern when every data
    value required to create an object will be different for each instance. |

    | How do you know when you have implemented the pattern correctly? | The calling
    component can create objects by providing just the data values for which there
    are no default values (although values may also be provided to override some or
    all of the defaults). |

    | Are there any common pitfalls? | No. |

    | Are there any related patterns? | This pattern can be combined with the factory
    method or abstract factory patterns to change the implementation class used to
    create the object based on the configuration data provided by the calling component.
    |'
  trans: "\n### 定义实现协议与类\n\n第一步是创建一个文件，其中包含实现类的定义以及用于表达其功能的协议。清单 10-20 展示了我添加到 SportsStore\
    \ 项目中的`StockValueImplementations.swift`文件的内容。\n\n**清单 10-20.** `StockValueImplementations.swift`文件的内容\n\
    \n```swift\nimport Foundation\n\nprotocol StockValueFormatter {\n    func formatTotal(total:\
    \ Double) -> String;\n}\n\nclass DollarStockValueFormatter: StockValueFormatter\
    \ {\n    func formatTotal(total: Double) -> String {\n        let formatted =\
    \ Utils.currencyStringFromNumber(total);\n        return \"\\(formatted)\";\n\
    \    }\n}\n\nclass PoundStockValueFormatter: StockValueFormatter {\n    func formatTotal(total:\
    \ Double) -> String {\n        let formatted = Utils.currencyStringFromNumber(total);\n\
    \        return \"£\\(dropFirst(formatted))\";\n    }\n}\n\nprotocol StockValueConverter\
    \ {\n    func convertTotal(total: Double) -> Double;\n}\n\nclass DollarStockValueConverter:\
    \ StockValueConverter {\n    func convertTotal(total: Double) -> Double {\n  \
    \      return total;\n    }\n}\n\nclass PoundStockValueConverter: StockValueConverter\
    \ {\n    func convertTotal(total: Double) -> Double {\n        return 0.60338\
    \ * total;\n    }\n}\n```\n\n我定义了两个协议和两组实现类。这两个协议分别称为`StockValueFormatter`和`StockValueConverter`。`StockValueConverter`协议负责将货币金额从美元进行转换，而`StockValueFormatter`协议则负责准备货币金额的格式。我创建了两组实现类，一组直接传递美元金额而不做任何修改，另一组则将金额转换为英镑。\n\
    \n### 定义抽象工厂与具体工厂类\n\n我在一个名为`StockValueFactories.swift`的新文件中定义了抽象工厂和具体工厂类，其内容如清单\
    \ 10-21 所示。\n\n**清单 10-21.** `StockValueFactories.swift`文件的内容\n\n```swift\nimport\
    \ Foundation\n\nclass StockTotalFactory {\n    enum Currency {\n        case USD\n\
    \        case GBP\n    }\n\n    private(set) var formatter: StockValueFormatter?;\n\
    \    private(set) var converter: StockValueConverter?;\n\n    class func getFactory(curr:\
    \ Currency) -> StockTotalFactory {\n        if (curr == Currency.USD) {\n    \
    \        return DollarStockTotalFactory.sharedInstance;\n        } else {\n  \
    \          return PoundStockTotalFactory.sharedInstance;\n        }\n    }\n}\n\
    \nprivate class DollarStockTotalFactory: StockTotalFactory {\n    private override\
    \ init() {\n        super.init();\n        formatter = DollarStockValueFormatter();\n\
    \        converter = DollarStockValueConverter();\n    }\n\n    class var sharedInstance:\
    \ StockTotalFactory {\n        get {\n            struct SingletonWrapper {\n\
    \                static let singleton = DollarStockTotalFactory();\n         \
    \   }\n            return SingletonWrapper.singleton;\n        }\n    }\n}\n\n\
    private class PoundStockTotalFactory: StockTotalFactory {\n    private override\
    \ init() {\n        super.init();\n        formatter = PoundStockValueFormatter();\n\
    \        converter = PoundStockValueConverter();\n    }\n\n    class var sharedInstance:\
    \ StockTotalFactory {\n        get {\n            struct SingletonWrapper {\n\
    \                static let singleton = PoundStockTotalFactory();\n          \
    \  }\n            return SingletonWrapper.singleton;\n        }\n    }\n}\n```\n\
    \n`StockTotalFactory`类是抽象工厂，它根据传递给`getFactory`方法的`Currency`枚举值，在具体类`DollarStockTotalFactory`和`PoundStockTotalFactory`之间进行选择。其效果如表\
    \ 10-3 所示的矩阵。\n\n**表 10-3.** 货币与格式化器/转换器的映射关系\n\n| 货币 | StockValueFormatter |\
    \ StockValueConverter |\n|----------|----------------------|----------------------|\n\
    | `USD`    | `DollarStockValueFormatter` | `DollarStockValueConverter` |\n| `GBP`\
    \    | `PoundStockValueFormatter` | `PoundStockValueConverter` |\n\n### 使用工厂与实现类\n\
    \n最后一步是使用抽象工厂来转换和格式化库存的价值。清单 10-22 展示了我对`ViewController.swift`文件所做的更改。\n\n**清单\
    \ 10-22.** 在`ViewController.swift`文件中使用抽象工厂模式\n\n```swift\n...\n\nfunc displayStockTotal()\
    \ {\n    let finalTotals: (Int, Double) = productStore.products.reduce((0, 0.0),\n\
    \        {(totals, product) -> (Int, Double) in\n            return (\n      \
    \          totals.0 + product.stockLevel,\n                totals.1 + product.stockValue\n\
    \            );\n        });\n\n    var factory = StockTotalFactory.getFactory(StockTotalFactory.Currency.GBP);\n\
    \    var totalAmount = factory.converter?.convertTotal(finalTotals.1);\n    var\
    \ formatted = factory.formatter?.formatTotal(totalAmount!);\n    totalStockLabel.text\
    \ = \"\\(finalTotals.0) Products in Stock. \"\n        + \"Total Value: \\(formatted!)\"\
    ;\n}\n\n...\n```\n\n我指定了 GBP 货币，这将选择负责处理英镑的实现类组。当你运行应用程序时，库存总价值将从美元转换为英镑并显示在应用程序中，如图\
    \ 10-5 所示。\n\n![A978-1-4842-0394-1_10_Fig5_HTML.jpg](img/A978-1-4842-0394-1_10_Fig5_HTML.jpg)\n\
    \n**图 10-5.** 转换并格式化库存价值\n\n`ViewController`类能够格式化库存价值，而无需了解所选择的具体类及其提供的实现类的任何细节。\n\
    \n## 本章小结\n\n在本章中，我解释了如何使用抽象工厂模式来创建属于某个组或系列的对象，但这些对象并不遵循通用协议，也不共享公共基类。在下一章中，我将描述建造者模式。\n\
    \n# 11. 建造者模式\n\n建造者模式用于将对象的配置与其创建过程分离。调用组件拥有配置数据，并将其传递给一个中介——建造者——由后者负责代表该组件创建对象。这种分离可以减少调用组件对其所用对象的了解程度，并将默认配置值集中到建造者类中，而不是要求每个创建对象的组件都拥有这些配置值。表\
    \ 11-1 展示了建造者模式的背景信息。\n\n**表 11-1.** 建造者模式的背景信息\n\n| 问题 | 答案 |\n|----------|--------|\n\
    | 它是什么？ | 建造者模式将创建对象所需的逻辑和默认配置值放入一个建造者类中。这使得调用组件能够以最少的配置数据创建对象，并且无需了解创建对象时将使用的默认值。\
    \ |\n| 有什么好处？ | 此模式使得更改创建对象所使用的默认配置值，以及更改实例化对象所用的类变得更加容易。 |\n| 何时应使用此模式？ | 当创建对象需要复杂的配置过程，并且你不想让默认配置值分散在整个应用程序中时，使用此模式。\
    \ |\n| 何时应避免使用此模式？ | 当创建每个对象所需的每个数据值都各不相同，即无法使用默认值时，不要使用此模式。 |\n| 如何判断实现正确？ |\
    \ 调用组件只需提供那些没有默认值的数据值（虽然也可以提供值来覆盖部分或全部默认值）即可创建对象。 |\n| 有常见的陷阱吗？ | 没有。 |\n| 有相关的模式吗？\
    \ | 此模式可以与工厂方法模式或抽象工厂模式结合使用，以根据调用组件提供的配置数据更改用于创建对象的实现类。 |\n"
- fmt: "# Preparing the Example Project\n\nFor this chapter, I created a new OS X\
    \ Command Line Tool project called `Builder`. I added a file called `Food.swift`\
    \ to the project and used it to define the class shown in Listing 11-1.\n\n**Listing\
    \ 11-1.** The Contents of the `Food.swift` File\n\n```\nclass Burger {\n\n   \
    \ let customerName:String;\n    let veggieProduct:Bool;\n    let patties:Int;\n\
    \    let pickles:Bool;\n    let mayo:Bool;\n    let ketchup:Bool;\n    let lettuce:Bool;\n\
    \    let cook:Cooked;\n\n    enum Cooked : String {\n        case RARE = \"Rare\"\
    ;\n        case NORMAL = \"Normal\";\n        case WELLDONE = \"Well Done\";\n\
    \    }\n\n    init(name:String, veggie:Bool, patties:Int, pickles:Bool, mayo:Bool,\n\
    \        ketchup:Bool, lettuce:Bool, cook:Cooked) {\n        self.customerName\
    \ = name;\n        self.veggieProduct = veggie;\n        self.patties = patties;\n\
    \        self.pickles = pickles;\n        self.mayo = mayo;\n        self.ketchup\
    \ = ketchup;\n        self.lettuce = lettuce;\n        self.cook = cook;\n   \
    \ }\n\n    func printDescription() {\n        println(\"Name \\(self.customerName)\"\
    );\n        println(\"Veggie: \\(self.veggieProduct)\");\n        println(\"Patties:\
    \ \\(self.patties)\");\n        println(\"Pickles: \\(self.pickles)\");\n    \
    \    println(\"Mayo: \\(self.mayo)\");\n        println(\"Ketchup: \\(self.ketchup)\"\
    );\n        println(\"Lettuce: \\(self.lettuce)\");\n        println(\"Cook: \\\
    (self.cook.rawValue)\");\n    }\n}\n```\n\nThe `Burger` class represents an order\
    \ in a restaurant and defines constant values for the different aspects of the\
    \ order that are set through the constructor. The `printDescription` method writes\
    \ out the values of the constants to the debug console. Listing 11-2 shows how\
    \ I edited the `main.swift` file to create a `Burger` object and call the `printDescription`\
    \ method.\n\n**Listing 11-2.** The Contents of the `main.swift` File\n\n```\n\
    let order = Burger(name: \"Joe\", veggie: false, patties: 2, pickles: true,\n\
    \    mayo: true, ketchup: true, lettuce: true, cook: Burger.Cooked.NORMAL);\n\
    order.printDescription();\n```\n\nRunning the application produces the following\
    \ output:\n\n```\nName Joe\nVeggie: false\nPatties: 2\nPickles: true\nMayo: true\n\
    Ketchup: true\nLettuce: true\nCook: Normal\n```\n\n## Understanding the Problems\
    \ That the Pattern Solves\n\nThe problem addressed by the builder pattern arises\
    \ when an object requires a large number of configuration data values, not all\
    \ of which the calling component has values for. In the case of the `Burger` class,\
    \ the initializer requires values for every aspect of the burger it represents.\
    \ Here is the ordering process that is followed in my imaginary restaurant:\n\n\
    - The server asks the customer for their name.\n- The server asks the customer\
    \ whether they require a vegetarian meal.\n- The server asks whether the customer\
    \ wants to customize their burger.\n- The server asks whether the customer wants\
    \ to upgrade and buy an additional patty.\n\nThere are only four steps in this\
    \ process, but it throws up some issues. Listing 11-3 shows how I can model the\
    \ process in the `main.swift` file to change the way I create `Burger` objects.\n\
    \n**Listing 11-3.** Implementing the Order Process in the `main.swift` File\n\n\
    ```\n// Step 1 - Ask for name\nlet name = \"Joe\";\n\n// Step 2 - Is veggie meal\
    \ required?\nlet veggie = false;\n\n// Step 3 - Customize burger?\nlet pickles\
    \ = true;\nlet mayo = false;\nlet ketchup = true;\nlet lettuce = true;\nlet cooked\
    \ = Burger.Cooked.NORMAL;\n\n// Step 4 - Buy additional patty?\nlet patties =\
    \ 2;\n\nlet order = Burger( name: name, veggie: veggie, patties: patties, pickles:\
    \ pickles,\n    mayo: mayo, ketchup: ketchup, lettuce: lettuce, cook: cooked );\n\
    order.printDescription();\n```\n\nThe `Burger` initializer requires calling components\
    \ to understand the default configuration values when the customer doesn't want\
    \ to change them—for example, knowing that a standard burger comes with two patties\
    \ and has ketchup. Each component that requires a `Burger` object has to have\
    \ this knowledge, and the effect is that a change in the default values must be\
    \ implemented in every calling component.\n\n### Understanding the Telescoping\
    \ Initializer Anti-Pattern\n\nIn other languages, the builder pattern is used\
    \ as an alternative to the telescoping initializer or telescoping constructor\
    \ anti-pattern. Anti-patterns are commonly used techniques that don't solve the\
    \ problem they are intended to address or solve a problem in a difficult or dangerous\
    \ way. In some languages, the telescoping constructor pattern is a commonly used\
    \ technique intended to simplify working with classes that define a lot of initializer\
    \ parameters. Consider this class:\n\n```\nclass Milkshake {\n    enum Size {\
    \ case SMALL; case MEDIUM; case LARGE };\n    enum Flavor { case CHOCOLATE; case\
    \ STRAWBERRY; case VANILLA };\n    let count:Int;\n    let size:Size;\n    let\
    \ flavor:Flavor;\n\n    init(flavor:Flavor, size:Size, count:Int) {\n        self.count\
    \ = count;\n        self.size = size;\n        self.flavor = flavor;\n    }\n\
    }\n```\n\nThe `Milkshake` class defines an initializer with three parameters.\
    \ This requires calling components to know what the default values are for the\
    \ parameters and to provide values even when the defaults are required, like this:\n\
    \n```\nvar shake = Milkshake(\n    flavor: Milkshake.Flavor.CHOCOLATE,\n    size:\
    \ Milkshake.Size.MEDIUM,\n    count: 1\n);\n```\n\nMost customers will want a\
    \ single medium shake and specify only a flavor. The telescoping initializer anti-pattern\
    \ tries to improve the situation by defining convenience initializers that provide\
    \ default values, like this:\n\n```\nclass Milkshake {\n    enum Size { case SMALL;\
    \ case MEDIUM; case LARGE };\n    enum Flavor { case CHOCOLATE; case STRAWBERRY;\
    \ case VANILLA };\n    let count:Int;\n    let size:Size;\n    let flavor:Flavor;\n\
    \n    init(flavor:Flavor, size:Size, count:Int) {\n        self.count = count;\n\
    \        self.size = size;\n        self.flavor = flavor;\n    }\n\n    convenience\
    \ init(flavor:Flavor, size:Size) {\n        self.init(flavor:flavor, size:size,\
    \ count:1);\n    }\n\n    convenience init(flavor:Flavor) {\n        self.init(flavor:flavor,\
    \ size:Size.MEDIUM);\n    }\n}\n```\n\nEach convenience initializer omits an additional\
    \ parameter and calls the preceding initializer with a default value. It allows\
    \ objects to be created without the calling component knowing the default values\
    \ for the parameters that it doesn't provide, like this:\n\n```\nvar shake = Milkshake(flavor:\
    \ Milkshake.Flavor.CHOCOLATE);\n```\n\nTelescoping initializers are considered\
    \ to be an anti-pattern because they result in a large number of initializers\
    \ that are hard to read and maintain. You can avoid telescoping initializers in\
    \ Swift by using default parameter values, like this:\n\n```\nclass Milkshake\
    \ {\n    enum Size { case SMALL; case MEDIUM; case LARGE };\n    enum Flavor {\
    \ case CHOCOLATE; case STRAWBERRY; case VANILLA };\n    let count:Int;\n    let\
    \ size:Size;\n    let flavor:Flavor;\n\n    init(flavor:Flavor, size:Size = Size.MEDIUM,\
    \ count:Int = 1) {\n        self.count = count;\n        self.size = size;\n \
    \       self.flavor = flavor;\n    }\n}\n```\n\nThe default values for the `size`\
    \ and `count` parameters are used whenever the component that wants to create\
    \ a `Milkshake` object omits them. This has the benefit of defining the default\
    \ values within the `Milkshake` class without needing to define permutations of\
    \ initializers."
