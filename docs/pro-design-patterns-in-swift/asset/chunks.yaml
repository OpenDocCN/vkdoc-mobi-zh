    \ File\n\n```\n...\nclass func createChain( localOnly:Bool ) -> Transmitter? {\n\
    \    let transmitterClasses:[Transmitter.Type]\n        = localOnly ? [PriorityTransmitter.self,\
    \ LocalTransmitter.self]\n        : [PriorityTransmitter.self, LocalTransmitter.self,\
    \ RemoteTransmitter.self];\n    var link:Transmitter?;\n    for tClass in transmitterClasses.reverse()\
    \ {\n        let existingLink = link;\n        link = tClass();\n        link?.nextLink\
    \ = existingLink;\n    }\n    return link;\n}\n...\n```\n\nThere are lots of ways\
    \ to approach varying the links in the chain, but I have settled on an argument\
    \ to the `createChain` method that allows callers to specify whether the chain\
    \ will be configured to handle local messages only. The effect of the argument\
    \ is to include or exclude the `RemoteTransmitter` in the chain, although this\
    \ difference is hidden from the calling component. Listing 19-10 shows how I use\
    \ the `localOnly` argument in the `main.swift` file.\n\n**Listing 19-10.** Specifying\
    \ the Configuration of the Chain of Responsibility in the `main.swift` File\n\n\
    ```\nlet messages = [\n    Message(from: \"bob@example.com\", to: \"joe@example.com\"\
    ,\n        subject: \"Free for lunch?\"),\n    Message(from: \"joe@example.com\"\
    , to: \"alice@acme.com\",\n        subject: \"New Contracts\"),\n    Message(from:\
    \ \"pete@example.com\", to: \"all@example.com\",\n        subject: \"Priority:\
    \ All-Hands Meeting\"),\n];\n\nif let chain = Transmitter.createChain(true) {\n\
    \    for msg in messages {\n        chain.sendMessage(msg);\n    }\n}\n```\n\n\
    I call the `createChain` method with a `localOnly` value of `true`, which means\
    \ that one of the `Message` objects that I create will not be handled. You can\
    \ see the effect by running the application, which produces the following output:\n\
    \n```\nMessage to joe@example.com sent locally\nEnd of chain reached. Message\
    \ not sent\nMessage to all@example.com sent as priority\n```\n\n### Indicating\
    \ Whether Responsibility Was Taken for the Request\n\nAt the moment, the calling\
    \ component has no insight into whether the chain takes responsibility for a request.\
    \ A common variation is to provide feedback to the calling component so that the\
    \ chain of responsibility isn’t a black hole. Listing 19-11 shows the changes\
    \ I made to provide the calling component with the result.\n\n**Listing 19-11.**\
    \ Indicating Whether Responsibility Was Taken for a Request in the `Transmitters.swift`\
    \ File\n\n```\nclass Transmitter {\n    var nextLink:Transmitter?;\n    required\
    \ init() {}\n\n    func sendMessage(message:Message) -> Bool {\n        if (nextLink\
    \ != nil) {\n            return nextLink!.sendMessage(message);\n        } else\
    \ {\n            println(\"End of chain reached. Message not sent\");\n      \
    \      return false;\n        }\n    }\n    // ...methods omitted for brevity...\n\
    }\n\nclass LocalTransmitter : Transmitter {\n    override func sendMessage(message:\
    \ Message) -> Bool {\n        if (Transmitter.matchEmailSuffix(message)) {\n \
    \           println(\"Message to \\(message.to) sent locally\");\n           \
    \ return true;\n        } else {\n            return super.sendMessage(message);\n\
    \        }\n    }\n}\n\nclass RemoteTransmitter : Transmitter {\n    override\
