- fmt: "This pool uses a GCD semaphore to wait for an object to become available for\
    \ a specified period, which defaults to three seconds. If the `semaphore` `wait`\
    \ operation expires before an item becomes available, then a factory closure is\
    \ used to create a temporary item to cope with demand. (There are two factory\
    \ closures—one for normal lazy object creation and one for creating temporary\
    \ peak items).\n\nThe defining characteristic of an elastic pool is what you do\
    \ with the temporary objects. You can keep them in the pool forever, you can let\
    \ the reference go so that the object will be deleted, or—as I have done here—you\
    \ can define a reaper, which is used to dispose of items when they are longer\
    \ required. In this case, I accept the reaper as an initializer argument and invoke\
    \ it when the demand for objects falls.\n\n> **Tip**\n>\n> You can create sophisticated\
    \ policies for deciding when temporary objects are no longer required, but I recommend\
    \ keeping it as simple as possible. Complex schemes work well during development\
    \ but tend to fall apart in the face of real usage patterns, which are hard to\
    \ predict in advance.\n\nTo use the elastic pool, I need to change the initializer\
    \ in the `Library` class to provide the additional closures and item counts, as\
    \ shown in Listing 8-14.\n\n**Listing 8-14.** Updating the Library Initializer\
    \ in the `Library.swift` File\n\n```\n...\nprivate init(stockLevel:Int) {\n  \
    \  var stockId = 1;\n    pool = Pool<Book>(\n        itemCount:stockLevel,\n \
    \       peakCount: stockLevel * 2,\n        returnCount: stockLevel / 2,\n   \
    \     itemFactory: {() in\n            return BookSeller.buyBook(\"Dickens, Charles\"\
    ,\n                title: \"Hard Times\", stockNumber: stockId++)},\n        peakFactory:\
    \ {() in\n            return LibraryNetwork.borrowBook(\"Dickens, Charles\",\n\
    \                title: \"Hard Times\", stockNumber: stockId++)},\n        reaper:\
    \ LibraryNetwork.returnBook\n    );\n}\n...\n```\n\nThe normal pool items will\
    \ be `Book` objects obtained from the `BookSeller` class. When demand is twice\
    \ the normal level, additional `Book` objects will be obtained from the `LibraryNetwork.borrowBook`\
    \ method, and when the number of objects falls to 50 percent of the normal level,\
    \ the additional objects are reaped by the `LibraryNetwork.returnBook` method.\n\
    \nYou can see the effect of item elasticity by running the application, which\
    \ will produce output like this:\n\n```\n...Starting...\nAll blocks complete\n\
    ...Book#2...\nChecked out 4 times\nIn stock\n...Book#15...\nChecked out 1 times\n\
    In stock\n...Book#19...\nChecked out 1 times\nIn stock\n...Book#17...\nChecked\
    \ out 1 times\nIn stock\n...Book#18...\nChecked out 1 times\nIn stock\nThere are\
    \ 5 books in the pool\n...\n```\n\nThis example borrows `Book` objects to satisfy\
    \ demand, which is reflected in the number of times that the books shown in the\
    \ output have been checked out of the pool. The code in the `main.swift` file\
    \ requests 35 `Book` objects, but the report shows only 8 checkouts. The remaining\
    \ requests have been satisfied using objects obtained from—and subsequently returned\
    \ to—the `LibraryNetwork` class.\n\n## Understanding the Allocation Strategy\n\
    \nThe allocation strategy determines how an available object is selected to service\
    \ a request. The strategy I have been using so far in this chapter is first-in\
    \ first-out, based on treating an array like a queue. The advantage of this approach\
    \ is that it is simple to implement, but it does mean that objects can be allocated\
    \ unevenly so that some are checked out of the pool many more times than others.\n\
    \nFor most applications, the FIFO allocation strategy will be appropriate, but\
    \ some applications will require a different approach to allocating objects. For\
    \ my example application, I am going to allocate the least-used available book,\
    \ but—as you will see—the impact of such a strategy is limited when demand for\
    \ objects is high. Listing 8-15 shows how I have added support for a custom allocation\
    \ strategy in the `Pool` class.\n\n**Listing 8-15.** Adding Support for an Allocation\
    \ Strategy in the `Pool.swift` File\n\n```\nimport Foundation\n\nclass Pool<T:AnyObject>\
    \ {\n    private var data = [T]();\n    private let arrayQ = dispatch_queue_create(\"\
    arrayQ\", DISPATCH_QUEUE_SERIAL);\n    private let semaphore:dispatch_semaphore_t;\n\
    \    private let itemFactory: () -> T;\n    private let itemAllocator:[T] -> Int;\n\
    \    private let maxItemCount:Int;\n    private var createdCount:Int = 0;\n  \
    \  \n    init(itemCount:Int, itemFactory:() -> T, itemAllocator:([T] -> Int))\
    \ {\n        self.maxItemCount = itemCount;\n        self.itemFactory = itemFactory;\n\
    \        self.itemAllocator = itemAllocator;\n        self.semaphore = dispatch_semaphore_create(itemCount);\n\
    \    }\n    \n    func getFromPool() -> T? {\n        var result:T?;\n       \
    \ if (dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER) == 0) {\n    \
    \        dispatch_sync(arrayQ, {() in\n                if (self.data.count ==\
    \ 0) {\n                    result = self.itemFactory();\n                   \
    \ self.createdCount++;\n                } else {\n                    result =\
    \ self.data.removeAtIndex(self.itemAllocator(self.data));\n                }\n\
    \            })\n        }\n        return result;\n    }\n    \n    func returnToPool(item:T)\
    \ {\n        dispatch_async(arrayQ, {() in\n            self.data.append(item);\n\
    \            dispatch_semaphore_signal(self.semaphore);\n        });\n    }\n\
    \    \n    func processPoolItems(callback:[T] -> Void) {\n        dispatch_barrier_sync(arrayQ,\
    \ {() in\n            callback(self.data);\n        });\n    }\n}\n```\n\nThis\
    \ is a fixed-size pool that creates its objects lazily. I have defined an initializer\
    \ parameter called `itemAllocator` that is a closure to which the array of available\
    \ items is passed. The closure returns the position in the array of the item that\
    \ should be allocated to service the request. Listing 8-16 shows how I have updated\
    \ the initializer of the `Library` class to implement an allocation strategy.\n\
    \n**Listing 8-16.** Adding an Allocation Strategy in the `Library.swift` File\n\
    \n```\n...\nprivate init(stockLevel:Int) {\n    var stockId = 1;\n    pool = Pool<Book>(\n\
    \        itemCount:stockLevel,\n        itemFactory: {() in\n            return\
    \ BookSeller.buyBook(\"Dickens, Charles\",\n                title: \"Hard Times\"\
    , stockNumber: stockId++)},\n        itemAllocator: {(var books) in return 0;\
    \ }\n    );\n}\n...\n```\n\nI have started with the FIFO strategy, and the closure\
    \ selects the first item in the array. I recommend that you start with this strategy\
    \ in order to measure the impact of any alternatives. Depending on the pattern\
    \ of requests that are made to the pool, you may well find that the FIFO allocation\
    \ strategy gives you something close to your goal. Here is a formatted version\
    \ of the output from running the application using FIFO:\n\n```\n...\n...Book#4...Checked\
    \ out 10 times\n...Book#3...Checked out 6 times\n...Book#2...Checked out 5 times\n\
    ...Book#1...Checked out 5 times\n...Book#5...Checked out 9 times\n...\n```\n\n\
    There is some variation between how often the objects have been used but not an\
    \ enormous amount. In a real project, I would consider sticking with the FIFO\
    \ strategy with these results (although I would also look at the variation in\
