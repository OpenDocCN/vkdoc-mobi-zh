- fmt: "# 21. The Mediator Pattern\n\nThe mediator pattern is used to simplify and\
    \ rationalize the communication between groups of objects. This is one of the\
    \ least well-known design patterns, but it solves a common problem and can simplify\
    \ the design of an application significantly. Table [21-1](#A978-1-4842-0394-1_21_Chapter.html#Tab1)\
    \ puts the mediator pattern into context.\n\n**Table 21-1.** Putting the Mediator\
    \ Pattern into Context\n\n| Question | Answer |\n| --- | --- |\n| What is it?\
    \ | The mediator pattern simplifies peer-to-peer communication between objects\
    \ by introducing a mediator object that acts as a communications broker between\
    \ the objects. |\n| What are the benefits? | Instead of having to keep track of\
    \ and communicate with all of its peers individually, an object just deals with\
    \ the mediator. |\n| When should you use this pattern? | Use this pattern when\
    \ you are dealing with a group of objects that need to communicate freely between\
    \ one another. |\n| When should you avoid this pattern? | Don’t use this pattern\
    \ if you have one object that needs to send notifications to a range of disparate\
    \ objects; use the observer pattern described in [Chapter 22](#A978-1-4842-0394-1_22_Chapter.html)\
    \ instead. |\n| How do you know when you have implemented the pattern correctly?\
    \ | The mediator pattern is implemented correctly when each object deals only\
    \ with the mediator and has no direct knowledge of its peers. |\n| Are there any\
    \ common pitfalls? | It is important that the mediator not provide peers with\
    \ access to one another so that they might become interdependent. |\n| Are there\
    \ any related patterns? | This pattern is closely related to—and often combined\
    \ with—the observer pattern that I describe in [Chapter 22](#A978-1-4842-0394-1_22_Chapter.html).\
    \ |\n\n## Preparing the Example Project\n\nFor this chapter I created an Xcode\
    \ Command Line Tool project called `Mediator` and added to it a file called `Airplane.swift`,\
    \ the contents of which are shown in Listing 21-1.\n\n**Listing 21-1.** The Contents\
    \ of the `Airplane.swift` File\n\n```\nstruct Position {\n    var distanceFromRunway:Int;\n\
    \    var height:Int;\n}\n\nfunc == (lhs:Airplane, rhs:Airplane) -> Bool {\n  \
    \  return lhs.name == rhs.name;\n}\n\nclass Airplane : Equatable {\n    var name:String;\n\
    \    var currentPosition:Position;\n    private var otherPlanes:[Airplane];\n\n\
    \    init(name:String, initialPos:Position) {\n        self.name = name;\n   \
    \     self.currentPosition = initialPos;\n        self.otherPlanes = [Airplane]();\n\
    \    }\n\n    func addPlanesInArea(planes:Airplane...) {\n        for plane in\
    \ planes {\n            otherPlanes.append(plane);\n        }\n    }\n\n    func\
    \ otherPlaneDidLand(plane:Airplane) {\n        if let index = find(otherPlanes,\
    \ plane) {\n            otherPlanes.removeAtIndex(index);\n        }\n    }\n\n\
    \    func otherPlaneDidChangePosition(plane:Airplane) -> Bool {\n        return\
    \ plane.currentPosition.distanceFromRunway\n            == self.currentPosition.distanceFromRunway\n\
    \            && abs(plane.currentPosition.height\n                - self.currentPosition.height)\
    \ < 1000;\n    }\n\n    func changePosition(newPosition:Position) {\n        self.currentPosition\
    \ = newPosition;\n        for plane in otherPlanes {\n            if (plane.otherPlaneDidChangePosition(self))\
    \ {\n                println(\"\\(name): Too close! Abort!\");\n             \
    \   return;\n            }\n        }\n        println(\"\\(name): Position changed\"\
    );\n    }\n\n    func land() {\n        self.currentPosition = Position(distanceFromRunway:\
    \ 0, height: 0);\n        for plane in otherPlanes {\n            plane.otherPlaneDidLand(self);\n\
    \        }\n        println(\"\\(name): Landed\");\n    }\n}\n```\n\nThe `Airplane`\
    \ class represents the state of an aircraft as it approaches an airport and tracks\
    \ its current position using the `Position` struct. There may be other planes\
    \ approaching the airport, so each `Airplane` object keeps track of those around\
    \ it and ensures that its movements will not bring it too close to another plane.\
    \ Listing 21-2 shows the statements that I added to the `main.swift` file to create\
    \ and manipulate an instance of the `Airplane` class.\n\n**Listing 21-2.** The\
    \ Contents of the `main.swift` File\n\n```\n// initial setup\nlet british = Airplane(name:\
    \ \"BA706\", initialPos: Position(distanceFromRunway: 11, height: 21000));\n\n\
    // plane approaches airport\nbritish.changePosition(Position(distanceFromRunway:\
    \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2,\
    \ height: 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height:\
    \ 1000));\n\n// plane lands\nbritish.land();\n```\n\nI create an `Airplane` object\
    \ to represent a British Airways flight and then call the `changePosition` method\
    \ several times to reflect its progress toward the airport and then call the `land`\
    \ method. Running the example application produces the following output:\n\n```\n\
    BA706: Position changed\nBA706: Position changed\nBA706: Position changed\nBA706:\
    \ Landed\n```\n\n## Understanding the Problem That the Pattern Solves\n\nThe problem\
    \ with the example application becomes apparent when there are several `Airplane`\
    \ objects used to represent approaches to the airport. Listing 21-3 shows the\
    \ changes that I made to the `main.swift` file to add two additional `Airplane`\
    \ objects.\n\n**Listing 21-3.** Using Additional `Airplane` Objects in the `main.swift`\
    \ File\n\n```\n// initial setup\nlet british = Airplane(name: \"BA706\", initialPos:\n\
    \    Position(distanceFromRunway: 11, height: 21000));\n\n// new plane arrives\n\
    let american = Airplane(name: \"AA101\", initialPos: Position(distanceFromRunway:\
    \ 12, height: 22000));\nbritish.addPlanesInArea(american);\namerican.addPlanesInArea(british);\n\
    \n// plane approaches airport\nbritish.changePosition(Position(distanceFromRunway:\
    \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2,\
    \ height: 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height:\
    \ 1000));\n\n// new plane arrives\nlet cathay = Airplane(name: \"CX200\", initialPos:\
    \ Position(distanceFromRunway: 13, height: 22000));\nbritish.addPlanesInArea(cathay);\n\
    american.addPlanesInArea(cathay);\ncathay.addPlanesInArea(british, american);\n\
    \n// plane lands\nbritish.land();\n\n// plane moves too close\ncathay.changePosition(Position(distanceFromRunway:\
    \ 12, height: 22000));\n```\n\nRunning the application produces the following\
    \ output:\n\n```\nBA706: Position changed\nBA706: Position changed\nBA706: Position\
    \ changed\nBA706: Landed\nCX200: Too close! Abort!\n```\n\nThere are only three\
    \ `Airplane` objects, but the complexity of the code in the `main.swift` file\
    \ has increased sharply because each `Airplane` has to keep track of every other\
    \ `Airplane`. Taking into account the amount of code required to keep track of\
    \ the other aircraft inside the `Airplane` object, a substantial percentage of\
    \ the application is given over just to managing the communication between `Airplane`\
    \ objects. The result is a set of `Airplane` objects that know about each other\
    \ and communicate by invoking methods directly on one another, as shown in Figure\
    \ [21-1](#A978-1-4842-0394-1_21_Chapter.html#Fig1).\n\n![A978-1-4842-0394-1_21_Fig1_HTML.jpg](A978-1-4842-0394-1_21_Fig1_HTML.jpg)\n\
    \n**Figure 21-1.** The peer communications problem\n\nThis is a problem that gets\
    \ worse as the number of objects increases because every `Airplane` object has\
    \ to be made aware of every other instance, creating an ever more complex set\
    \ of dependencies in which it is easy to forget to establish a new connection,\
    \ as shown in Figure [21-2](#A978-1-4842-0394-1_21_Chapter.html#Fig2).\n\n![A978-1-4842-0394-1_21_Fig2_HTML.jpg](A978-1-4842-0394-1_21_Fig2_HTML.jpg)\n\
    \n**Figure 21-2.** The effect of forgetting to establish a new connection\n\n\
    This kind of omission is nasty because it manifests itself as a problem when a\
    \ feature relies on the missing connection. In this case, the collision-avoidance\
    \ code in the `changePosition` method will always work unless the Qantas flight\
    \ tries to move into the space occupied by the American Airlines flight. If this\
    \ happens, the position of the American Airlines flight won’t be checked, and\
    \ collision-avoidance will have failed."
  raw: '# 21. The Mediator Pattern


    The mediator pattern is used to simplify and rationalize the communication between
    groups of objects. This is one of the least well-known design patterns, but it
    solves a common problem and can simplify the design of an application significantly.
    Table [21-1](#A978-1-4842-0394-1_21_Chapter.html#Tab1) puts the mediator pattern
    into context.


    Table 21-1.


    Putting the Mediator Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The mediator pattern simplifies peer-to-peer communication between
    objects by introducing a mediator object that acts as a communications broker
    between the objects. |

    | What are the benefits? | Instead of having to keep track of and communicate
    with of all of its peers individually, an object just deals with the mediator.
    |

    | When should you use this pattern? | Use this pattern when you are dealing with
    a group of objects that need to communicate freely between one another. |

    | When should you avoid this pattern? | Don’t use this pattern if you have one
    object that needs to send notifications to a range of disparate objects; use the
    observer pattern described in [Chapter 22](#A978-1-4842-0394-1_22_Chapter.html)
    instead. |

    | How do you know when you have implemented the pattern correctly? | The mediator
    pattern is implemented correctly when each object deals only with the mediator
    and has no direct knowledge of its peers. |

    | Are there any common pitfalls? | It is important that the mediator not provide
    peers with access to one another so that they might become interdependent. |

    | Are there any related patterns? | This pattern is closely related to—and often
    combined with—the observer pattern that I describe in [Chapter 22](#A978-1-4842-0394-1_22_Chapter.html).
    |


    ## Preparing the Example Project


    For this chapter I created an Xcode Command Line Tool project called Mediator
    and added to it a file called `Airplane.swift`, the contents of which are shown
    in Listing 21-1.


    Listing 21-1. The Contents of the Airplane.swift File


    `struct Position {`


    `var distanceFromRunway:Int;`


    `var height:Int;`


    `}`


    `func == (lhs:Airplane, rhs:Airplane) -> Bool {`


    `return lhs.name == rhs.name;`


    `}`


    `class Airplane : Equatable {`


    `var name:String;`


    `var currentPosition:Position;`


    `private var otherPlanes:[Airplane];`


    `init(name:String, initialPos:Position) {`


    `self.name = name;`


    `self.currentPosition = initialPos;`


    `self.otherPlanes = [Airplane]();`


    `}`


    `func addPlanesInArea(planes:Airplane...) {`


    `for plane in planes {`


    `otherPlanes.append(plane);`


    `}`


    `}`


    `func otherPlaneDidLand(plane:Airplane) {`


    `if let index = find(otherPlanes, plane) {`


    `otherPlanes.removeAtIndex(index);`


    `}`


    `}`


    `func otherPlaneDidChangePosition(plane:Airplane) -> Bool {`


    `return plane.currentPosition.distanceFromRunway`


    `== self.currentPosition.distanceFromRunway`


    `&& abs(plane.currentPosition.height`


    `- self.currentPosition.height) < 1000;`


    `}`


    `func changePosition(newPosition:Position) {`


    `self.currentPosition = newPosition;`


    `for plane in otherPlanes {`


    `if (plane.otherPlaneDidChangePosition(self)) {`


    `println("\(name): Too close! Abort!");`


    `return;`


    `}`


    `}`


    `println("\(name): Position changed");`


    `}`


    `func land() {`


    `self.currentPosition = Position(distanceFromRunway: 0, height: 0);`


    `for plane in otherPlanes {`


    `plane.otherPlaneDidLand(self);`


    `}`


    `println("\(name): Landed");`


    `}`


    `}`


    The `Airplane` class represents the state of an aircraft as it approaches an airport
    and tracks its current position using the `Position` struct. There may be other
    planes approaching the airport, so each `Airplane` objects keeps track of those
    around it and ensures that its movements will not bring it too close to another
    plane. Listing 21-2 shows the statements that I added to the `main.swift` file
    to create and manipulate an instance of the `Airplane` class.


    Listing 21-2. The Contents of the main.swift File


    `// initial setup`


    `let british = Airplane(name: "BA706", initialPos: Position(distanceFromRunway:
    11, height: 21000));`


    `// plane approaches airport`


    `british.changePosition(Position(distanceFromRunway: 8, height: 10000));`


    `british.changePosition(Position(distanceFromRunway: 2, height: 5000));`


    `british.changePosition(Position(distanceFromRunway: 1, height: 1000));`


    `// plane lands`


    `british.land();`


    I create an `Airplane` object to represent a British Airways flight and then call
    the `changePosition` method several times to reflect its progress toward the airport
    and then call the `land` method. Running the example application produces the
    following output:


    `BA706: Position changed`


    `BA706: Position changed`


    `BA706: Position changed`


    `BA706: Landed`


    ## Understanding the Problem That the Pattern Solves


    The problem with the example application becomes apparent when there are several
    `Airplane` objects used to represent approaches to the airport. Listing 21-3 shows
    the changes that I made to the `main.swift` file to add two additional `Airplane`
    objects.


    Listing 21-3. Using Additional Airplane Objects in the main.swift File


    `// initial setup`


    `let british = Airplane(name: "BA706", initialPos:`


    `Position(distanceFromRunway: 11, height: 21000));`


    `// new plane arrives`


    `let american = Airplane(name: "AA101", initialPos: Position(distanceFromRunway:
    12, height: 22000));`


    `british.addPlanesInArea(american);`


    `american.addPlanesInArea(british);`


    `// plane approaches airport`


    `british.changePosition(Position(distanceFromRunway: 8, height: 10000));`


    `british.changePosition(Position(distanceFromRunway: 2, height: 5000));`


    `british.changePosition(Position(distanceFromRunway: 1, height: 1000));`


    `// new plane arrives`


    `let cathay = Airplane(name: "CX200", initialPos: Position(distanceFromRunway:
    13, height: 22000));`


    `british.addPlanesInArea(cathay);`


    `american.addPlanesInArea(cathay);`


    `cathay.addPlanesInArea(british, american);`


    `// plane lands`


    `british.land();`


    `// plane moves too close`


    `cathay.changePosition(Position(distanceFromRunway: 12, height: 22000));`


    Running the application produces the following output:


    `BA706: Position changed`


    `BA706: Position changed`


    `BA706: Position changed`


    `BA706: Landed`


    `CX200: Too close! Abort!`


    There are only three `Airplane` objects, but the complexity of the code in the
    `main.swift` file has increased sharply because each `Airplane` has to keep track
    of every other `Airplane`. Taking into account the amount of code required to
    keep track of the other aircraft inside the `Airplane` object, a substantial percentage
    of the application is given over just to managing the communication between `Airplane`
    objects. The result is a set of `Airplane` objects that know about each other
    and communicate by invoking methods directly on one another, as shown in Figure
    [21-1](#A978-1-4842-0394-1_21_Chapter.html#Fig1).


    ![A978-1-4842-0394-1_21_Fig1_HTML.jpg](A978-1-4842-0394-1_21_Fig1_HTML.jpg)


    Figure 21-1.


    The peer communications problem


    This is a problem that gets worse as the number of objects increases because every
    `Airplane` object has to be made aware of every other instance, creating an ever
    more complex set of dependencies in which it is easy to forget to establish a
    new connection, as shown in Figure [21-2](#A978-1-4842-0394-1_21_Chapter.html#Fig2).


    ![A978-1-4842-0394-1_21_Fig2_HTML.jpg](A978-1-4842-0394-1_21_Fig2_HTML.jpg)


    Figure 21-2.


    The effect of forgetting to establish a new connection


    This kind of omission is nasty because it manifests itself as a problem when a
    feature relies on the missing connection. In this case, the collision-avoidance
    code in the `changePosition` method will always work unless the Qantas flight
    tries to move into the space occupied by the American Airlines flight. If this
    happens, the position of the American Airlines flight won’t be checked, and collision-avoidance
    will have failed.'
  trans: "\n# 21. 中介者模式\n\n中介者模式用于简化和优化对象组之间的通信。这是最不为人知的设计模式之一，但它解决了一个常见问题，并能显著简化应用程序的设计。表\
    \ 21-1 将中介者模式置于上下文中。\n\n**表 21-1.** 中介者模式上下文\n\n| 问题 | 答案 |\n| --- | --- |\n|\
    \ 是什么？ | 中介者模式通过引入一个作为对象间通信代理的中介者对象，来简化对象之间的点对点通信。 |\n| 有哪些优点？ | 对象只需与中介者打交道，而无需单独跟踪并与其所有对等方通信。\
    \ |\n| 何时应使用此模式？ | 当处理一组需要彼此自由通信的对象时，请使用此模式。 |\n| 何时应避免此模式？ | 如果你有一个对象需要向一系列不同的对象发送通知，则不要使用此模式；应改用第\
    \ 22 章中描述的观察者模式。 |\n| 如何判断是否正确实现了该模式？ | 当每个对象只与中介者打交道，并且对其对等方没有直接认知时，中介者模式就正确实现了。\
    \ |\n| 有哪些常见陷阱？ | 中介者绝不能为对等方提供互相访问的权限，这一点非常重要，否则它们可能会变得相互依赖。 |\n| 是否有相关模式？ | 该模式与我在第\
    \ 22 章中描述的观察者模式密切相关，并且经常与之结合使用。 |\n\n## 准备示例项目\n\n在本章中，我创建了一个名为 `Mediator` 的 Xcode\
    \ 命令行工具项目，并向其中添加了一个名为 `Airplane.swift` 的文件，其内容如列表 21-1 所示。\n\n**列表 21-1.** `Airplane.swift`\
    \ 文件的内容\n\n```\nstruct Position {\n    var distanceFromRunway:Int;\n    var height:Int;\n\
    }\n\nfunc == (lhs:Airplane, rhs:Airplane) -> Bool {\n    return lhs.name == rhs.name;\n\
    }\n\nclass Airplane : Equatable {\n    var name:String;\n    var currentPosition:Position;\n\
    \    private var otherPlanes:[Airplane];\n\n    init(name:String, initialPos:Position)\
    \ {\n        self.name = name;\n        self.currentPosition = initialPos;\n \
    \       self.otherPlanes = [Airplane]();\n    }\n\n    func addPlanesInArea(planes:Airplane...)\
    \ {\n        for plane in planes {\n            otherPlanes.append(plane);\n \
    \       }\n    }\n\n    func otherPlaneDidLand(plane:Airplane) {\n        if let\
    \ index = find(otherPlanes, plane) {\n            otherPlanes.removeAtIndex(index);\n\
    \        }\n    }\n\n    func otherPlaneDidChangePosition(plane:Airplane) -> Bool\
    \ {\n        return plane.currentPosition.distanceFromRunway\n            == self.currentPosition.distanceFromRunway\n\
    \            && abs(plane.currentPosition.height\n                - self.currentPosition.height)\
    \ < 1000;\n    }\n\n    func changePosition(newPosition:Position) {\n        self.currentPosition\
    \ = newPosition;\n        for plane in otherPlanes {\n            if (plane.otherPlaneDidChangePosition(self))\
    \ {\n                println(\"\\(name): Too close! Abort!\");\n             \
    \   return;\n            }\n        }\n        println(\"\\(name): Position changed\"\
    );\n    }\n\n    func land() {\n        self.currentPosition = Position(distanceFromRunway:\
    \ 0, height: 0);\n        for plane in otherPlanes {\n            plane.otherPlaneDidLand(self);\n\
    \        }\n        println(\"\\(name): Landed\");\n    }\n}\n```\n\n`Airplane`\
    \ 类表示飞机接近机场时的状态，并使用 `Position` 结构体跟踪其当前位置。可能还有其他飞机正在接近机场，因此每个 `Airplane` 对象都会跟踪其周围的飞机，并确保其移动不会离另一架飞机太近。列表\
    \ 21-2 显示了我添加到 `main.swift` 文件中的语句，用于创建和操作 `Airplane` 类的一个实例。\n\n**列表 21-2.**\
    \ `main.swift` 文件的内容\n\n```\n// initial setup\nlet british = Airplane(name: \"\
    BA706\", initialPos: Position(distanceFromRunway: 11, height: 21000));\n\n// plane\
    \ approaches airport\nbritish.changePosition(Position(distanceFromRunway: 8, height:\
    \ 10000));\nbritish.changePosition(Position(distanceFromRunway: 2, height: 5000));\n\
    british.changePosition(Position(distanceFromRunway: 1, height: 1000));\n\n// plane\
    \ lands\nbritish.land();\n```\n\n我创建了一个 `Airplane` 对象来表示英国航空公司的航班，然后多次调用 `changePosition`\
    \ 方法来反映其向机场的进近过程，最后调用 `land` 方法。运行示例应用程序会产生以下输出：\n\n```\nBA706: Position changed\n\
    BA706: Position changed\nBA706: Position changed\nBA706: Landed\n```\n\n## 理解该模式要解决的问题\n\
    \n当使用多个 `Airplane` 对象来表示机场进近时，示例应用程序的问题就变得明显了。列表 21-3 显示了我对 `main.swift` 文件所做的更改，以添加两个额外的\
    \ `Airplane` 对象。\n\n**列表 21-3.** 在 `main.swift` 文件中使用额外的 `Airplane` 对象\n\n```\n\
    // initial setup\nlet british = Airplane(name: \"BA706\", initialPos:\n    Position(distanceFromRunway:\
    \ 11, height: 21000));\n\n// new plane arrives\nlet american = Airplane(name:\
    \ \"AA101\", initialPos: Position(distanceFromRunway: 12, height: 22000));\nbritish.addPlanesInArea(american);\n\
    american.addPlanesInArea(british);\n\n// plane approaches airport\nbritish.changePosition(Position(distanceFromRunway:\
    \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2,\
    \ height: 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height:\
    \ 1000));\n\n// new plane arrives\nlet cathay = Airplane(name: \"CX200\", initialPos:\
    \ Position(distanceFromRunway: 13, height: 22000));\nbritish.addPlanesInArea(cathay);\n\
    american.addPlanesInArea(cathay);\ncathay.addPlanesInArea(british, american);\n\
    \n// plane lands\nbritish.land();\n\n// plane moves too close\ncathay.changePosition(Position(distanceFromRunway:\
    \ 12, height: 22000));\n```\n\n运行应用程序会产生以下输出：\n\n```\nBA706: Position changed\n\
    BA706: Position changed\nBA706: Position changed\nBA706: Landed\nCX200: Too close!\
    \ Abort!\n```\n\n这里只有三个 `Airplane` 对象，但 `main.swift` 文件中代码的复杂性却急剧增加，因为每个 `Airplane`\
    \ 都必须跟踪其他所有 `Airplane`。考虑到在 `Airplane` 对象内部跟踪其他飞机所需的代码量，应用程序的很大一部分都被用于管理 `Airplane`\
    \ 对象之间的通信。这导致了一组 `Airplane` 对象相互了解，并通过直接调用彼此的方法进行通信，如图 21-1 所示。\n\n![A978-1-4842-0394-1_21_Fig1_HTML.jpg](img/A978-1-4842-0394-1_21_Fig1_HTML.jpg)\n\
    \n**图 21-1.** 对等通信问题\n\n随着对象数量的增加，这个问题会变得更糟，因为每个 `Airplane` 对象都必须知晓所有其他实例，从而创建出日益复杂的依赖关系，在这种关系下很容易忘记建立新的连接，如图\
    \ 21-2 所示。\n\n![A978-1-4842-0394-1_21_Fig2_HTML.jpg](img/A978-1-4842-0394-1_21_Fig2_HTML.jpg)\n\
    \n**图 21-2.** 忘记建立新连接的影响\n\n这种遗漏非常讨厌，因为当某个功能依赖于缺失的连接时，它就会表现为一个问题。在本例中，除非澳洲航空的航班试图进入美国航空航班占据的空间，否则\
    \ `changePosition` 方法中的防撞代码将始终有效。如果发生这种情况，美国航空航班的位置将不会被检查，防撞措施就会失败。\n"
- fmt: "# Understanding the Mediator Pattern\n\nThe mediator pattern solves the problem\
    \ by introducing a mediator object that eases communication between two or more\
    \ peer objects, often referred to as colleagues. The mediator keeps track of the\
    \ peer objects and facilities the communication between them in order to break\
    \ the dependencies between objects, avoid problems caused by omitted relationships,\
    \ and simplify the overall application. Figure [21-3](#A978-1-4842-0394-1_21_Chapter.html#Fig3)\
    \ illustrates the way that the mediator pattern transforms the `Airplane` problem.\n\
    \n![A978-1-4842-0394-1_21_Fig3_HTML.jpg](A978-1-4842-0394-1_21_Fig3_HTML.jpg)\n\
    \nFigure 21-3.\n\nThe mediator pattern\n\nEach `Airplane` has a relationship with\
    \ the mediator, rather than with its peers. It sends its messages to the mediator,\
    \ and the mediator keeps track of the other `Airplane` objects and forwards the\
    \ messages to them. The mediator reduces the number of dependencies in the application\
    \ and ensures that all of the messages are dispatched to all of the peers, avoiding\
    \ the missed connection problem.\n\n## Implementing the Mediator Pattern\n\nThe\
    \ core of the mediator pattern is a pair of protocols: one that defines the functionality\
    \ provided by the peers and one that defines the functionality for the mediator.\
    \ You can see how I have defined the protocols in Listing 21-4, which shows the\
    \ contents of the `Mediator.swift` file that I added to the example project.\n\
    \nListing 21-4. The Contents of the Mediator.swift File\n\n```\nprotocol Peer\
    \ {\n    var name:String {get};\n    func otherPlaneDidChangePosition(position:Position)\
    \ -> Bool;\n}\nprotocol Mediator {\n    func registerPeer(peer:Peer);\n    func\
    \ unregisterPeer(peer:Peer);\n    func changePosition(peer:Peer, pos:Position)\
    \ -> Bool;\n}\n```\n\nThe `Peer` protocol defines a `name` property for identification\
    \ purposes and an `otherPlaneDidChangePosition` method that is called to check\
    \ to see whether it is safe for another aircraft to move. The `Mediator` protocol\
    \ defines `registerPeer` and `unregisterPeer` methods to add and remove objects\
    \ from the set it mediates and defines a `changePosition` method that will call\
    \ the `otherPlaneDidChangePosition` method of the peers it mediates.\n\n### Defining\
    \ the Mediator Class\n\nThe next step is to define a class that conforms to the\
    \ `Mediator` protocol and that can be used to mediate the communication between\
    \ a set of `Peer` objects. Listing 21-5 shows the class I defined.\n\nListing\
    \ 21-5. Defining the Mediator Implementation in the Mediator.swift File\n\n```\n\
    protocol Peer {\n    var name:String {get};\n    func otherPlaneDidChangePosition(position:Position)\
    \ -> Bool;\n}\nprotocol Mediator {\n    func registerPeer(peer:Peer);\n    func\
    \ unregisterPeer(peer:Peer);\n    func changePosition(peer:Peer, pos:Position)\
    \ -> Bool;\n}\nclass AirplaneMediator : Mediator {\n    private var peers:[String:Peer];\n\
    \    init() {\n        peers = [String:Peer]();\n    }\n    func registerPeer(peer:\
    \ Peer) {\n        self.peers[peer.name] = peer;\n    }\n    func unregisterPeer(peer:\
    \ Peer) {\n        self.peers.removeValueForKey(peer.name);\n    }\n    func changePosition(peer:Peer,\
    \ pos:Position) -> Bool {\n        for storedPeer in peers.values {\n        \
    \    if (peer.name != storedPeer.name\n                && storedPeer.otherPlaneDidChangePosition(pos))\
    \ {\n                return true;\n            }\n        }\n        return false;\n\
    \    }\n}\n```\n\nThe implementation of the `AirplaneMediator` class is simple.\
    \ I store the collection of `Peer` objects using a dictionary, which eases the\
    \ implementation of the `changePosition` methods that must ensure that the caller\
    \ of the method doesn’t have its `otherPlaneDidChangePosition` method called for\
    \ its own position change.\n\n### Conforming to the Peer Protocol\n\nThe next\
    \ step is to update the `Airplane` class so that it conforms to the `Peer` protocol\
    \ and no longer manages a list of its peers. Listing 21-6 shows the changes that\
    \ I made.\n\nListing 21-6. Conforming to the Peer Protocol in the Airplane.swift\
    \ File\n\n```\nstruct Position {\n    var distanceFromRunway:Int;\n    var height:Int;\n\
    }\nclass Airplane : Peer {\n    var name:String;\n    var currentPosition:Position;\n\
    \    var mediator:Mediator;\n    init(name:String, initialPos:Position, mediator:\
    \ Mediator) {\n        self.name = name;\n        self.currentPosition = initialPos;\n\
    \        self.mediator = mediator;\n        mediator.registerPeer(self);\n   \
    \ }\n    func otherPlaneDidChangePosition(position:Position) -> Bool {\n     \
    \   return position.distanceFromRunway\n            == self.currentPosition.distanceFromRunway\n\
    \            && abs(position.height - self.currentPosition.height) < 1000;\n \
    \   }\n    func changePosition(newPosition:Position) {\n        self.currentPosition\
    \ = newPosition;\n        if (mediator.changePosition(self, pos: self.currentPosition)\
    \ == true) {\n            println(\"\\(name): Too close! Abort!\");\n        \
    \    return;\n        }\n        println(\"\\(name): Position changed\");\n  \
    \  }\n    func land() {\n        self.currentPosition = Position(distanceFromRunway:\
    \ 0, height: 0);\n        mediator.unregisterPeer(self);\n        println(\"\\\
    (name): Landed\");\n    }\n}\n```\n\nThe overall effect is to focus the class\
    \ on its own state and rely on the mediator to manage the relationship with other\
    \ peers on its behalf. Listing 21-7 shows how I updated the code in the `main.swift`\
    \ file to use the mediator.\n\nListing 21-7. Using the Mediator in the main.swift\
    \ File\n\n```\nlet mediator:Mediator = AirplaneMediator();\n// initial setup\n\
    let british = Airplane(name: \"BA706\", initialPos:\n    Position(distanceFromRunway:\
    \ 11, height: 21000), mediator:mediator);\n// new plane arrives\nlet american\
    \ = Airplane(name: \"AA101\", initialPos: Position(distanceFromRunway: 12, height:\
    \ 22000), mediator:mediator);\n// plane approaches airport\nbritish.changePosition(Position(distanceFromRunway:\
    \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2,\
    \ height: 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height:\
    \ 1000));\n// new plane arrives\nlet cathay = Airplane(name: \"CX200\", initialPos:\
    \ Position(distanceFromRunway: 13, height: 22000), mediator:mediator);\n// plane\
    \ lands\nbritish.land();\n// plane moves too close\ncathay.changePosition(Position(distanceFromRunway:\
    \ 12, height: 22000));\n```\n\nI no longer need to notify each `Airplane` when\
    \ I create another instance because the mediator will automatically keep track\
    \ for me and ensure that I don’t forget to create all of the connections required\
    \ before the mediator was applied. Running the application produces the following\
    \ output:\n\n```\nBA706: Position changed\nBA706: Position changed\nBA706: Position\
    \ changed\nBA706: Landed\nCX200: Too close! Abort!\n```\n\n### Implementing Concurrency\
    \ Protections\n\nLike with many of the patterns I describe in this book, implementing\
    \ the mediator pattern means considering whether the peer objects will need to\
    \ communicate with each other concurrently or whether peers will be registered\
    \ or unregistered simultaneously. This won’t be the case in all applications,\
    \ but if there is likely to be concurrent use, then concurrency protections are\
    \ required, as described in the following sections."
  raw: '## Understanding the Mediator Pattern


    The mediator pattern solves the problem by introducing a mediator object that
    eases communication between two or more peer objects, often referred to as colleagues.
    The mediator keeps track of the peer objects and facilities the communication
    between them in order to break the dependencies between objects, avoid problems
    caused by omitted relationships, and simplify the overall application. Figure
    [21-3](#A978-1-4842-0394-1_21_Chapter.html#Fig3) illustrates the way that the
    mediator pattern transforms the `Airplane` problem.


    ![A978-1-4842-0394-1_21_Fig3_HTML.jpg](A978-1-4842-0394-1_21_Fig3_HTML.jpg)


    Figure 21-3.


    The mediator pattern


    Each `Airplane` has a relationship with the mediator, rather than with its peers.
    It sends its messages to the mediator, and the mediator keeps track of the other
    `Airplane` objects and forwards the messages to them. The mediator reduces the
    number of dependencies in the application and ensures that all of the messages
    are dispatched to all of the peers, avoiding the missed connection problem.


    ## Implementing the Mediator Pattern


    The core of the mediator pattern is a pair of protocols: one that defines the
    functionality provided by the peers and one that defines the functionality for
    the mediator. You can see how I have defined the protocols in Listing 21-4, which
    shows the contents of the `Mediator.swift` file that I added to the example project.


    Listing 21-4. The Contents of the Mediator.swift File


    `protocol Peer {`


    `var name:String {get};`


    `func otherPlaneDidChangePosition(position:Position) -> Bool;`


    `}`


    `protocol Mediator {`


    `func registerPeer(peer:Peer);`


    `func unregisterPeer(peer:Peer);`


    `func changePosition(peer:Peer, pos:Position) -> Bool;`


    `}`


    The `Peer` protocol defines a `name` property for identification purposes and
    an `otherPlaneDidChangePosition` method that is called to check to see whether
    it is safe for another aircraft to move. The `Mediator` protocol defines `registerPeer`
    and `unregisterPeer` methods to add and remove objects from the set it mediates
    and defines a `changePosition` method that will call the `otherPlanChangePosition`
    method of the peers it mediates.


    ### Defining the Meditator Class


    The next step is to define a class that conforms to the `Mediator` protocol and
    that can be used to mediate the communication between a set of `Peer` objects.
    Listing 21-5 shows the class I defined.


    Listing 21-5. Defining the Mediator Implementation in the Mediator.swift File


    `protocol Peer {`


    `var name:String {get};`


    `func otherPlaneDidChangePosition(position:Position) -> Bool;`


    `}`


    `protocol Mediator {`


    `func registerPeer(peer:Peer);`


    `func unregisterPeer(peer:Peer);`


    `func changePosition(peer:Peer, pos:Position) -> Bool;`


    `}`


    `class AirplaneMediator : Mediator {`


    `private var peers:[String:Peer];`


    `init() {`


    `peers = [String:Peer]();`


    `}`


    `func registerPeer(peer: Peer) {`


    `self.peers[peer.name] = peer;`


    `}`


    `func unregisterPeer(peer: Peer) {`


    `self.peers.removeValueForKey(peer.name);`


    `}`


    `func changePosition(peer:Peer, pos:Position) -> Bool {`


    `for storedPeer in peers.values {`


    `if (peer.name != storedPeer.name`


    `&&` `storedPeer.otherPlaneDidChangePosition(pos)) {`


    `return true;`


    `}`


    `}`


    `return false;`


    `}`


    `}`


    The implementation of the `AirplaneMediator` class is simple. I store the collection
    of `Peer` objects using a dictionary, which eases the implementation of the `changePosition`
    methods that must ensure that the caller of the method doesn’t have its `otherPlaneDidchangePosition`
    method called for its own position change.


    ### Conforming to the Peer Protocol


    The next step is to update the `Airplane` class so that it conforms to the `Peer`
    protocol and no longer manages a list of its peers. Listing 21-6 shows the changes
    that I made.


    Listing 21-6. Conforming to the Peer Protocol in the Airplane.swift File


    `struct Position {`


    `var distanceFromRunway:Int;`


    `var height:Int;`


    `}`


    `class Airplane : Peer {`


    `var name:String;`


    `var currentPosition:Position;`


    `var mediator:Mediator;`


    `init(name:String, initialPos:Position, mediator: Mediator) {`


    `self.name = name;`


    `self.currentPosition = initialPos;`


    `self.mediator = mediator;`


    `mediator.registerPeer(self);`


    `}`


    `func otherPlaneDidChangePosition(position:Position) -> Bool {`


    `return position.distanceFromRunway`


    `== self.currentPosition.distanceFromRunway`


    `&& abs(position.height - self.currentPosition.height) < 1000;`


    `}`


    `func changePosition(newPosition:Position) {`


    `self.currentPosition = newPosition;`


    `if (mediator.changePosition(self, pos: self.currentPosition) == true) {`


    `println("\(name): Too close! Abort!");`


    `return;`


    `}`


    `println("\(name): Position changed");`


    `}`


    `func land() {`


    `self.currentPosition = Position(distanceFromRunway: 0, height: 0);`


    `mediator.unregisterPeer(self);`


    `println("\(name): Landed");`


    `}`


    `}`


    The overall effect is to focus the class on its own state and rely on the meditator
    to manage the relationship with other peers on its behalf. Listing 21-7 shows
    how I updated the code in the `main.swift` file to use the mediator.


    Listing 21-7. Using the Mediator in the main.swift File


    `let mediator:Mediator = AirplaneMediator();`


    `// initial setup`


    `let british = Airplane(name: "BA706", initialPos:`


    `Position(distanceFromRunway: 11, height: 21000), mediator:mediator);`


    `// new plane arrives`


    `let american = Airplane(name: "AA101", initialPos: Position(distanceFromRunway:
    12, height: 22000), mediator:mediator);`


    `// plane approaches airport`


    `british.changePosition(Position(distanceFromRunway: 8, height: 10000));`


    `british.changePosition(Position(distanceFromRunway: 2, height: 5000));`


    `british.changePosition(Position(distanceFromRunway: 1, height: 1000));`


    `// new plane arrives`


    `let cathay = Airplane(name: "CX200", initialPos: Position(distanceFromRunway:
    13, height: 22000), mediator:mediator);`


    `// plane lands`


    `british.land();`


    `// plane moves too close`


    `cathay.changePosition(Position(distanceFromRunway: 12, height: 22000));`


    I no longer need to notify each `Airplane` when I create another instance because
    the mediator will automatically keep track for me and ensure that I don’t forget
    to create all of the connections required before the mediator was applied. Running
    the application produces the following output:


    `BA706: Position changed`


    `BA706: Position changed`


    `BA706: Position changed`


    `BA706: Landed`


    `CX200: Too close! Abort!`


    ### Implementing Concurrency Protections


    Like with many of the patterns I describe in this book, implementing the mediator
    pattern means considering whether the peer objects will need to communicate with
    each other concurrently or whether peers will be registered or unregistered simultaneously.
    This won’t be the case in all applications, but if there is likely to be concurrent
    use, then concurrency protections are required, as described in the following
    sections.'
  trans: "\n# 理解中介者模式\n\n中介者模式通过引入一个中介者对象来解决这个问题，该对象用于简化两个或多个对等对象（通常称为同事）之间的通信。中介者负责跟踪对等对象并促进它们之间的通信，以打破对象间的依赖关系，避免因疏忽关系而引发的问题，并简化整个应用程序。图\
    \ 21-3 展示了中介者模式如何转换`Airplane`问题。\n\n![A978-1-4842-0394-1_21_Fig3_HTML.jpg](img/A978-1-4842-0394-1_21_Fig3_HTML.jpg)\n\
    \n图 21-3.\n\n中介者模式\n\n每个`Airplane`都与中介者建立关系，而不是与其对等对象建立关系。它将消息发送给中介者，中介者负责跟踪其他`Airplane`对象，并将消息转发给它们。中介者减少了应用程序中的依赖数量，并确保所有消息都能发送给所有对等对象，从而避免了连接遗漏的问题。\n\
    \n## 实现中介者模式\n\n中介者模式的核心是一对协议：一个定义对等对象提供的功能，另一个定义中介者的功能。你可以在清单 21-4 中看到我如何定义这些协议，该清单显示了我添加到示例项目中的`Mediator.swift`文件的内容。\n\
    \n清单 21-4. Mediator.swift 文件的内容\n\n```\nprotocol Peer {\n    var name:String {get};\n\
    \    func otherPlaneDidChangePosition(position:Position) -> Bool;\n}\nprotocol\
    \ Mediator {\n    func registerPeer(peer:Peer);\n    func unregisterPeer(peer:Peer);\n\
    \    func changePosition(peer:Peer, pos:Position) -> Bool;\n}\n```\n\n`Peer`协议定义了一个用于标识的`name`属性，以及一个`otherPlaneDidChangePosition`方法，该方法被调用以检查另一架飞机移动是否安全。`Mediator`协议定义了`registerPeer`和`unregisterPeer`方法，用于在其中介的对象集合中添加和移除对象，并定义了一个`changePosition`方法，该方法将调用其中介的所有对等对象的`otherPlaneDidChangePosition`方法。\n\
    \n### 定义中介者类\n\n下一步是定义一个符合`Mediator`协议的类，该类可用于中介一组`Peer`对象之间的通信。清单 21-5 显示了我定义的类。\n\
    \n清单 21-5. 在 Mediator.swift 文件中定义中介者实现\n\n```\nprotocol Peer {\n    var name:String\
    \ {get};\n    func otherPlaneDidChangePosition(position:Position) -> Bool;\n}\n\
    protocol Mediator {\n    func registerPeer(peer:Peer);\n    func unregisterPeer(peer:Peer);\n\
    \    func changePosition(peer:Peer, pos:Position) -> Bool;\n}\nclass AirplaneMediator\
    \ : Mediator {\n    private var peers:[String:Peer];\n    init() {\n        peers\
    \ = [String:Peer]();\n    }\n    func registerPeer(peer: Peer) {\n        self.peers[peer.name]\
    \ = peer;\n    }\n    func unregisterPeer(peer: Peer) {\n        self.peers.removeValueForKey(peer.name);\n\
    \    }\n    func changePosition(peer:Peer, pos:Position) -> Bool {\n        for\
    \ storedPeer in peers.values {\n            if (peer.name != storedPeer.name\n\
    \                && storedPeer.otherPlaneDidChangePosition(pos)) {\n         \
    \       return true;\n            }\n        }\n        return false;\n    }\n\
    }\n```\n\n`AirplaneMediator`类的实现很简单。我使用字典存储`Peer`对象的集合，这简化了`changePosition`方法的实现，该方法必须确保方法的调用者不会因为自身位置变化而被调用其`otherPlaneDidChangePosition`方法。\n\
    \n### 符合 Peer 协议\n\n下一步是更新`Airplane`类，使其符合`Peer`协议，并且不再管理其对等对象的列表。清单 21-6 显示了我所做的更改。\n\
    \n清单 21-6. 在 Airplane.swift 文件中符合 Peer 协议\n\n```\nstruct Position {\n    var distanceFromRunway:Int;\n\
    \    var height:Int;\n}\nclass Airplane : Peer {\n    var name:String;\n    var\
    \ currentPosition:Position;\n    var mediator:Mediator;\n    init(name:String,\
    \ initialPos:Position, mediator: Mediator) {\n        self.name = name;\n    \
    \    self.currentPosition = initialPos;\n        self.mediator = mediator;\n \
    \       mediator.registerPeer(self);\n    }\n    func otherPlaneDidChangePosition(position:Position)\
    \ -> Bool {\n        return position.distanceFromRunway\n            == self.currentPosition.distanceFromRunway\n\
    \            && abs(position.height - self.currentPosition.height) < 1000;\n \
    \   }\n    func changePosition(newPosition:Position) {\n        self.currentPosition\
    \ = newPosition;\n        if (mediator.changePosition(self, pos: self.currentPosition)\
    \ == true) {\n            println(\"\\(name): Too close! Abort!\");\n        \
    \    return;\n        }\n        println(\"\\(name): Position changed\");\n  \
    \  }\n    func land() {\n        self.currentPosition = Position(distanceFromRunway:\
    \ 0, height: 0);\n        mediator.unregisterPeer(self);\n        println(\"\\\
    (name): Landed\");\n    }\n}\n```\n\n总体效果是让类专注于自身状态，并依赖中介者来管理其与其他对等对象的关系。清单 21-7\
    \ 显示了我如何更新`main.swift`文件中的代码以使用中介者。\n\n清单 21-7. 在 main.swift 文件中使用中介者\n\n```\n\
    let mediator:Mediator = AirplaneMediator();\n// initial setup\nlet british = Airplane(name:\
    \ \"BA706\", initialPos:\n    Position(distanceFromRunway: 11, height: 21000),\
    \ mediator:mediator);\n// new plane arrives\nlet american = Airplane(name: \"\
    AA101\", initialPos: Position(distanceFromRunway: 12, height: 22000), mediator:mediator);\n\
    // plane approaches airport\nbritish.changePosition(Position(distanceFromRunway:\
    \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2,\
    \ height: 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height:\
    \ 1000));\n// new plane arrives\nlet cathay = Airplane(name: \"CX200\", initialPos:\
    \ Position(distanceFromRunway: 13, height: 22000), mediator:mediator);\n// plane\
    \ lands\nbritish.land();\n// plane moves too close\ncathay.changePosition(Position(distanceFromRunway:\
    \ 12, height: 22000));\n```\n\n创建另一个`Airplane`实例时，我不再需要通知每一个`Airplane`，因为中介者会自动为我跟踪，并确保我不会忘记在应用中介者之前创建所有必需的连接。运行该应用程序会生成以下输出：\n\
    \n```\nBA706: Position changed\nBA706: Position changed\nBA706: Position changed\n\
    BA706: Landed\nCX200: Too close! Abort!\n```\n\n### 实现并发保护\n\n与我在这本书中描述的许多模式一样，实现中介者模式意味着需要考虑对等对象是否需要并发地相互通信，或者是否需要同时注册或注销对等对象。并非所有应用程序都会出现这种情况，但如果可能存在并发使用的情况，则需要并发保护，如下面几节所述。\n"
- fmt: "#### Implementing Concurrency Protections in the Mediator\n\nConcurrency protection\
    \ in the mediator ensures that the collection of peers isn’t corrupted and that\
    \ results returned by the mediator’s methods are consistent. Listing 21-8 shows\
    \ how I have used Grand Central Dispatch (GCD) to protect the mediator class.\n\
    \nListing 21-8. Implementing Concurrency Protections in the Mediator.swift File\n\
    \n```\nimport Foundation;\n\nprotocol Peer {\n\nvar name:String {get};\n\nfunc\
    \ otherPlaneDidChangePosition(position:Position) -> Bool;\n\n}\n\nprotocol Mediator\
    \ {\n\nfunc registerPeer(peer:Peer);\n\nfunc unregisterPeer(peer:Peer);\n\nfunc\
    \ changePosition(peer:Peer, pos:Position) -> Bool;\n\n}\n\nclass AirplaneMediator\
    \ : Mediator {\n\nprivate var peers:[String:Peer];\n\nprivate let queue = dispatch_queue_create(\"\
    dictQ\", DISPATCH_QUEUE_CONCURRENT);\n\ninit() {\n\npeers = [String:Peer]();\n\
    \n}\n\nfunc registerPeer(peer: Peer) {\n\ndispatch_barrier_sync(self.queue, {\
    \ () in\n\nself.peers[peer.name] = peer;\n\n});\n\n}\n\nfunc unregisterPeer(peer:\
    \ Peer) {\n\ndispatch_barrier_sync(self.queue, { () in\n\nlet removed = self.peers.removeValueForKey(peer.name);\n\
    \n});\n\n}\n\nfunc changePosition(peer:Peer, pos:Position) -> Bool {\n\nvar result\
    \ = false;\n\ndispatch_sync(self.queue, { () in\n\nfor storedPeer in self.peers.values\
    \ {\n\nif (peer.name != storedPeer.name\n\n&& storedPeer.otherPlaneDidChangePosition(pos))\
    \ {\n\nresult = true;\n\n}\n\n}\n\n});\n\nreturn result;\n\n}\n\n}\n```\n\nI want\
    \ to allow multiple operations to read the data in the `peers` dictionary unless\
    \ I am about to modify it. I have used a concurrent GCD queue with a call to the\
    \ `dispatch_sync` function for read operations and with calls to the `dispatch_barrier_sync`\
    \ function in the `registerPeer` and `unregisterPeer` method to gain exclusive\
    \ access to the dictionary for making changes.\n\n> **Tip**  \n> Notice that I\
    \ have assigned the result of the call to the `removeValueForKey` method to a\
    \ constant in the implementation of the `unregisterPeer` method. Swift tries to\
    \ be helpful and takes the result returned from the call to the dictionary method\
    \ as the result to return from the closure—which is a problem because closures\
    \ used as GCD blocks may not return results. Assigning the result to a constant\
    \ captures the value and prevents it from being treated as a result.\n\n#### Implementing\
    \ Concurrency Protections in the Peer\n\nThe concurrency protections I added to\
    \ the mediator do not make any assumptions about the implementation of the peer\
    \ objects and allow multiple simultaneous calls to the `otherPlanDidChangePosition`\
    \ method. This means I need to modify the `Airplane` class so as to protect the\
    \ integrity of its internal state data, as shown in Listing 21-9.\n\nListing 21-9. Adding\
    \ Concurrency Protections in the Airplane.swift File\n\n```\nimport Foundation\n\
    \nstruct Position {\n\nvar distanceFromRunway:Int;\n\nvar height:Int;\n\n}\n\n\
    class Airplane : Peer {\n\nvar name:String;\n\nvar currentPosition:Position;\n\
    \nvar mediator:Mediator;\n\nlet queue = dispatch_queue_create(\"posQ\", DISPATCH_QUEUE_CONCURRENT);\n\
    \ninit(name:String, initialPos:Position, mediator: Mediator) {\n\nself.name =\
    \ name;\n\nself.currentPosition = initialPos;\n\nself.mediator = mediator;\n\n\
    mediator.registerPeer(self);\n\n}\n\nfunc otherPlaneDidChangePosition(position:Position)\
    \ -> Bool {\n\nvar result = false;\n\ndispatch_sync(self.queue, {() in\n\nresult\
    \ = position.distanceFromRunway\n\n== self.currentPosition.distanceFromRunway\n\
    \n&& abs(position.height - self.currentPosition.height) < 1000;\n\n});\n\nreturn\
    \ result;\n\n}\n\nfunc changePosition(newPosition:Position) {\n\ndispatch_barrier_sync(self.queue,\
    \ {() in\n\nself.currentPosition = newPosition;\n\nif (self.mediator.changePosition(self,\
    \ pos:\n\nself.currentPosition) == true) {\n\nprintln(\"\\(self.name): Too close!\
    \ Abort!\");\n\nreturn;\n\n}\n\nprintln(\"\\(self.name): Position changed\");\n\
    \n});\n\n}\n\nfunc land() {\n\ndispatch_barrier_sync(self.queue, { () in\n\nself.currentPosition\
    \ = Position(distanceFromRunway: 0, height: 0);\n\nself.mediator.unregisterPeer(self);\n\
    \nprintln(\"\\(self.name): Landed\");\n\n});\n\n}\n\n}\n```\n\nThe concurrency\
    \ protection that I added to the class allows multiple concurrent calls to the\
    \ `otherPlaneDidChangePosition` method, but calls to the `changePosition` and\
    \ `land` methods use a barrier to ensure that they have exclusive access to make\
    \ modifications.\n\n## Variations on the Mediator Pattern\n\nThe standard implementation\
    \ of the mediator pattern is focused on managing the relationships with peers,\
    \ but common variations extend the role of the mediator, as I describe in the\
    \ following sections.\n\n### Putting More Logic Into the Mediator\n\nThe first\
    \ variation is to add logic into the mediator implementation class to more actively\
    \ manage the flow of messages between peers or to provide additional features.\
    \ To demonstrate this variation, I am going to reduce the number of peer objects\
    \ that are called by the mediator `changePosition` method by adding some basic\
    \ logic to filter out those that are farther away from the airport than the airplane\
    \ that wants to be (on the basis that all of the planes are trying to land and\
    \ are moving in the same direction). The first step is to expand the information\
    \ revealed by the `Peer` protocol so that the mediator can access its location\
    \ data, as shown in Listing 21-10.\n\nListing 21-10. Revealing Additional Information\
    \ in the Mediator.swift File\n\n```\n...\n\nprotocol Peer {\n\nvar name:String\
    \ {get};\n\nvar currentPosition:Position {get};\n\nfunc otherPlaneDidChangePosition(position:Position)\
    \ -> Bool;\n\n}\n\n...\n```\n\nExposing the `currentPosition` property allows\
    \ the mediator to be more selective about the peers whose methods it invokes,\
    \ as shown in Listing 21-11.\n\nListing 21-11. Selectively Targeting Peers in\
    \ the Mediator.swift File\n\n```\n...\n\nfunc changePosition(peer:Peer, pos:Position)\
    \ -> Bool {\n\nvar result = false;\n\ndispatch_sync(self.queue, { () in\n\nlet\
    \ closerPeers = self.peers.values.filter({p in\n\nreturn p.currentPosition.distanceFromRunway\n\
    \n<= pos.distanceFromRunway;\n\n});\n\nfor storedPeer in closerPeers {\n\nif (peer.name\
    \ != storedPeer.name\n\n&& storedPeer.otherPlaneDidChangePosition(pos)) {\n\n\
    result = true;\n\n}\n\n}\n\n});\n\nreturn result;\n\n}\n\n...\n```\n\nI use the\
    \ `filter` method to eliminate those planes that are farther away and then invoke\
    \ the `otherPlaneDidChangePosition` method on the remaining objects. Running the\
    \ application produces the following output, which is the same as previous examples:\n\
    \n```\nBA706: Position changed\nBA706: Position changed\nBA706: Position changed\n\
    BA706: Landed\nCX200: Too close! Abort!\n```\n\nThe benefit of this variation\
    \ is that I make fewer calls to peer objects, and in doing so, I hope to speed\
    \ up the process of changing the position of an airplane. The drawback of this\
    \ approach is that I have now codified a behavior into the mediator that will\
    \ need to be changed if the application is extended to include planes that are\
    \ departing from the airport and not just those that are arriving.\n\n### Generalizing\
    \ the Mediator-Peer Relationship\n\nThe standard implementation of the mediator\
    \ pattern means that the mediator has some knowledge into the methods defined\
    \ by the peers in order that it can call those methods as needed. This makes it\
    \ difficult to reuse a mediator class for a different set of peers.\n\nIf you\
    \ expect to need multiple mediators in an application, a common variation is to\
    \ generalize the implementation of the pattern and create a mediator class that\
    \ doesn’t require any knowledge of the peers it is used with. There are two broad\
    \ approaches to addressing this problem, although, as I explain in the following\
    \ sections, both have their limitations."
