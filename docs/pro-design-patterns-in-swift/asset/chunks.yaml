    \n当用户选择一条命令时，将调用 `handleCommand` 方法。控制器可以选择处理该命令，或者将其传递给职责链中的下一个控制器。如果职责链中没有控制器处理该命令，则\
    \ `handleCommand` 方法的基类实现将返回 `nil`。`handleCommand` 方法返回一个 `View`，这正是控制器充当模型（通过仓库初始化参数）与视图之间链接的方式。控制器选定的\
