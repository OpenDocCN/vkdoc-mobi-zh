    The effect of the euro adapter


    ## Summary


    In this chapter, I explained how the adapter pattern is used to make two classes
    with incompatible APIs work together. I demonstrated how to define an adapter
    by using an extension and creating a class that wraps around the object being
    adapted. In the next chapter, I describe the bridge pattern.


    # 13. The Bridge Pattern


    The bridge pattern can be confusing. It looks similar to the adapter pattern I
    described in [Chapter 12](#A978-1-4842-0394-1_12_Chapter.html), but its use can
    seem counterintuitive. In this chapter, I focus on the problem that the bridge
    pattern is most commonly used to resolve and explain why the biggest difference
    between the bridge and adapter patterns is intent rather than implementation.
    Table [13-1](#A978-1-4842-0394-1_13_Chapter.html#Tab1) puts the bridge pattern
    into context.


    Table 13-1.


