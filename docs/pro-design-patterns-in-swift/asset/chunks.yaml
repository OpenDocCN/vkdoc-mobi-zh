  trans: "\n# 定义全局工厂方法\n\n实现该模式最简单的方法是定义一个全局函数。全局函数在整个应用程序中都可使用，这使得调用组件能够轻松地找到并调用它们，如代码清单\
    \ 9-7 所示。\n\n**代码清单 9-7.** 在 `RentalCar.swift` 文件中实现工厂方法模式\n\n```\nfunc createRentalCar(passengers:Int)\
    \ -> RentalCar? {\n    var car:RentalCar?;\n    switch (passengers) {\n      \
    \  case 0...1:\n            car = Sports();\n        case 2...3:\n           \
    \ car = Compact();\n        case 4...8:\n            car = SUV();\n        case\
    \ 9...14:\n            car = Minivan();\n        default:\n            car = nil;\n\
    \    }\n    return car;\n}\n\nprotocol RentalCar {\n    var name:String { get\
    \ };\n    var passengers:Int { get };\n    var pricePerDay:Float { get };\n}\n\
    \nclass Compact : RentalCar {\n    var name = \"VW Golf\";\n    var passengers\
    \ = 3;\n    var pricePerDay:Float = 20;\n}\n\n// ...为简洁起见，省略了实现类...\n```\n\n这看起来可能只是一个小改动，因为名为\
    \ `createRentalCar` 的全局函数包含了与 `CarSelector` 和 `PriceCalculator` 类相同的决策逻辑。即便如此，它对调用组件产生的影响是深远的。代码清单\
    \ 9-8 展示了 `CarSelector` 类为使用该全局函数所做的更改。\n\n**代码清单 9-8.** 在 `CarSelector.swift`\
    \ 文件中调用全局函数\n\n```\nclass CarSelector {\n    class func selectCar(passengers:Int)\
    \ -> String? {\n        return createRentalCar(passengers)?.name;\n    }\n}\n\
    ```\n\n不仅代码量大大减少，而且 `CarSelector` 类只依赖于全局工厂函数和 `RentalCar` 协议。它不再了解任何关于实现类及其之间关系的信息——它只知道调用全局函数\
    \ `createRentalCar` 会生成一个符合该协议的对象。代码清单 9-9 展示了 `PriceCalculator` 类相应的更改。\n\n**代码清单\
    \ 9-9.** 在 `PriceCalculator.swift` 文件中调用全局函数\n\n```\nclass PriceCalculator {\n\
    \    class func calculatePrice(passengers:Int, days:Int) -> Float? {\n       \
    \ var car = createRentalCar(passengers);\n        return car == nil ? nil : car!.pricePerDay\
    \ * Float(days);\n    }\n}\n```\n\n每个类所提供的附加价值都保持不变，而且不会将决策逻辑和实现类扩散到整个应用程序中。\n\
    \n# 使用基类\n\n全局函数的方法是可行的，但可能会感觉与它操作的协议和类有些脱节。另一种方法是用一个定义了工厂函数的基类来替代协议。代码清单 9-10\
    \ 展示了实现此方法所需的更改。（为了简化示例并为将来的改动做准备，我还减少了实现类的数量。）\n\n**代码清单 9-10.** 在 `RentalCar.swift`\
    \ 文件中使用基类实现模式\n\n```\nclass RentalCar {\n    private var nameBV:String;\n    private\
    \ var passengersBV:Int;\n    private var priceBV:Float;\n\n    private init(name:String,\
    \ passengers:Int, price:Float) {\n        self.nameBV = name;\n        self.passengersBV\
    \ = passengers;\n        self.priceBV = price;\n    }\n\n    final var name:String\
    \ {\n        get { return nameBV; }\n    }\n\n    final var passengers:Int {\n\
    \        get { return passengersBV; }\n    };\n\n    final var pricePerDay:Float\
    \ {\n        get { return priceBV; }\n    };\n\n    class func createRentalCar(passengers:Int)\
    \ -> RentalCar? {\n        var car:RentalCar?;\n        switch (passengers) {\n\
    \            case 0...3:\n                car = Compact();\n            case 4...8:\n\
    \                car = SUV();\n            default:\n                car = nil;\n\
    \        }\n        return car;\n    }\n}\n\nclass Compact : RentalCar {\n   \
    \ private init() {\n        super.init(name: \"VW Golf\", passengers: 3, price:\
    \ 20);\n    }\n    // 紧凑型汽车特有的功能在此处实现\n}\n\nclass SUV : RentalCar {\n    private\
    \ init() {\n        super.init(name: \"Cadillac Escalade\", passengers: 8, price:\
    \ 75);\n    }\n    // SUV 特有的功能在此处实现\n}\n```\n\n**提示**\n\n这只是实现风格上的差异。我更喜欢这种方式，因为我习惯于在其他语言中使用抽象类，而这在\
    \ Swift 中是能最接近该方法的做法。你可以选择最适合自己编码风格的方法。\n\n我已经用 `RentalCar` 类替代了 `RentalCar` 协议。我想用这个类来捕获协议对其实现施加的实现契约，因此我定义了\
    \ `final` 计算属性来暴露名称、乘客数量和价格，并定义了由 `private` 构造函数设置的私有后备存储属性。子类必须调用 `RentalCar`\
    \ 的初始化器，这需要提供计算属性所使用的后备存储值，从而产生类似于使用协议的效果。\n\n`RentalCar` 类定义了一个名为 `createRentalCar`\
    \ 的类型方法，该方法包含决策逻辑，并负责创建返回给调用组件的对象。代码清单 9-11 展示了如何更新 `CarSelector` 类以使用新的实现。\n\n\
    **代码清单 9-11.** 在 `CarSelector.swift` 文件中消费基类\n\n```\nclass CarSelector {\n   \
