- fmt: "# The Transition to Using the `Product` Class\n\nThe transition to using the\
    \ `Product` class is simple. In preparing the code for Listing 4-14, I started\
    \ by using the class in the `products` data array and then fixed all of the compiler\
    \ errors until all references to the tuples had been replaced. This is a dull\
    \ and error-prone process, which is why it is a good idea to start a project with\
    \ classes and structs if you can (something that, sadly, isn’t always possible\
    \ when taking over existing code).\n\n## Ensuring View and Model Separation\n\n\
    There are a couple of points to note about the code in Listing 4-14. The first\
    \ is that the `ViewController.swift` file defines a class called `ProductTableCell`\
    \ that I used to contain the references to the UI components that represent a\
    \ product in the app layout and to locate a product when the user changes a stock\
    \ level. In Listing 4-14, I replaced a variable that referred to the index position\
    \ of a tuple in the `products` array with references to a `Product` object instead,\
    \ like this:\n\n```\nclass ProductTableCell : UITableViewCell {\n    @IBOutlet\
    \ weak var nameLabel: UILabel!\n    @IBOutlet weak var descriptionLabel: UILabel!\n\
    \    @IBOutlet weak var stockStepper: UIStepper!\n    @IBOutlet weak var stockField:\
    \ UITextField!\n    var product:Product?;\n}\n```\n\nYou may be wondering why\
    \ I didn’t combine the `ProductTableCell` with the `Product` class and have a\
    \ single entity that represents a product and the UI components that are used\
    \ to display it. I explain the reasons in detail in Part 5 when I describe the\
    \ Model/View/Controller (MVC) pattern, but the short answer is that it is good\
    \ practice to separate the data in the application from the way it is presented\
    \ to the user (in MVC parlance, separating the model from the view). Enforcing\
    \ this separation allows the same data to be displayed in different ways more\
    \ easily. I might need to add a second view to the app that presents the products\
    \ in a grid, and without separation between the model and the view, the combined\
    \ class would need to have references to every UI component that is involved in\
    \ both views, which quickly becomes unwieldy and makes applying changes a tricky\
    \ and error-prone process.\n\n## Expanding the Summary Display\n\nI have been\
    \ critical of tuples throughout this chapter, but they can be a useful language\
    \ feature when they are used in a self-contained way, rather than to represent\
    \ application-wide data.\n\nIn Listing 4-15, you can see an example of how I like\
    \ to use tuples. I have changed the implementation of the `displayStockTotal`\
    \ method of the `ViewController` class so that a single call to the global `reduce`\
    \ function is used to calculate the number of items in stock and the total value\
    \ of that stock (which I format using the `currencyStringFromNumber` method I\
    \ defined in Listing 4-12).\n\n**Listing 4-15.** Using Tuples in the ViewController.swift\
    \ File\n\n```\nfunc displayStockTotal() {\n    let finalTotals:(Int, Double) =\
    \ products.reduce((0, 0.0),\n        {(totals, product) -> (Int, Double) in\n\
    \            return (\n                totals.0 + product.stockLevel,\n      \
    \          totals.1 + product.stockValue\n            );\n        });\n    totalStockLabel.text\
    \ = \"\\(finalTotals.0) Products in Stock. \"\n        + \"Total Value: \\(Utils.currencyStringFromNumber(finalTotals.1))\"\
    ;\n}\n```\n\nTuples allow me to generate two total values (one for the number\
    \ of items in stock and one for the value of that stock) for each iteration of\
    \ the `reduce` function. I could have achieved this in different ways—such as\
    \ by defining a struct that has two properties or by using a `for` loop to enumerate\
    \ the array and update two local variables—but using tuples works nicely with\
    \ Swift closures and produces code that is simple and easy to read. This kind\
    \ of use, where creating a class or struct would be overkill since the data isn’t\
    \ exported outside the method, plays to the strengths of the tuples and doesn’t\
    \ cause the tight coupling and maintenance problems that arise when passing tuples\
    \ more widely within the application.\n\nYou can see the effect of the additional\
    \ total I calculate by starting the application. The label at the bottom of the\
    \ layout will display the number and value of the items in stock, as illustrated\
    \ by Figure 4-7.\n\n![A978-1-4842-0394-1_4_Fig7_HTML.jpg](A978-1-4842-0394-1_4_Fig7_HTML.jpg)\n\
    \n**Figure 4-7.** Adding to the information summary displayed by the SportsStore\
    \ app\n\n## Summary\n\nIn this chapter, I described a pattern that is at the heart\
    \ of Swift development: defining a template that is used to create objects. The\
    \ benefit of this pattern is that it provides the basic tools that can be used\
    \ to break tightly coupled components apart, allowing a public API to be presented\
    \ to the consumers of an object and a hidden private implementation. In the next\
    \ chapter, I turn to a different way of creating objects: using a prototype.\n\
    \n# 5. The Prototype Pattern\n\nIn this chapter I describe the prototype pattern,\
    \ in which you create new objects by copying an existing object, known as the\
    \ prototype. The prototype itself is created using a template, as described in\
    \ Chapter 4, but subsequent instances are clones. Table 5-1 puts the prototype\
    \ pattern in context.\n\n**Table 5-1.** Putting the Prototype Pattern into Context\n\
    \n| Question | Answer |\n| --- | --- |\n| What is it? | The prototype pattern\
    \ creates new objects by copying an existing object, known as the prototype. |\n\
    | What are the benefits? | The main benefit is to hide the code that creates objects\
    \ from the components that use them; this means that components don’t need to\
    \ know which class or struct is required to create a new object, don’t need to\
    \ know the details of initializers, and don’t need to change when subclasses are\
    \ created and instantiated. This pattern can also be used to avoid repeating expensive\
    \ initialization each time a new object of a specific type is created. |\n| When\
    \ should you use this pattern? | This pattern is useful when you are writing a\
    \ component that needs to create new instances of objects without creating a dependency\
    \ on the class initializer. |\n| When should you avoid this pattern? | There are\
    \ no drawbacks to using this pattern, but you should understand the other patterns\
    \ in this part of the book to ensure that you pick the most suitable for your\
    \ application. |\n| How do you know when you have implemented the pattern correctly?\
    \ | To test for an effective implementation of this pattern, change the initializer\
    \ for the class or struct used for the prototype object and check to see whether\
    \ a corresponding change is required in the component that creates clones. As\
    \ a second test, create a subclass of the prototype’s class and ensure that the\
    \ component can clone it without requiring any changes. See the “Implementing\
    \ the Prototype Pattern” section. |\n| Are there any common pitfalls? | The main\
    \ pitfall is selecting the wrong style of copying when cloning the prototype object.\
    \ There are two kinds of copying available—shallow and deep—and it is important\
    \ to select the correct kind for your application. See the “Understanding Shallow\
    \ and Deep Copying” section for details. |\n| Are there any related patterns?\
    \ | The most closely related pattern is the object template pattern, which I describe\
    \ in Chapter 4. Also see the singleton pattern, which provides a means by which\
    \ a single object can be shared to avoid needing to create additional instances.\
    \ |\n\n## Understanding the Problem Addressed by the Pattern\n\nIn Chapter 4,\
    \ I explained how to use templates to create objects, but this is an approach\
    \ that has its own drawbacks, as I describe in the sections that follow."
