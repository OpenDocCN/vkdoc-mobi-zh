  trans: "  \n### 应用工厂方法模式\n\n目前，所有对 `Transmitters.createChain` 方法的调用都会获得一条包含相同链接对象集合的责任链。然而，我可以将责任链模式与工厂方法或抽象工厂模式（在第\
    \ 9 章和第 10 章中描述）结合使用，以针对不同请求改变链中的链接。代码清单 19-9 展示了我对 `Transmitter` 类所做的更改，以支持不同的链配置。\n\
    \n**代码清单 19-9.** 在 `Transmitters.swift` 文件中改变责任链\n\n```\n...\nclass func createChain(\
    \ localOnly:Bool ) -> Transmitter? {\n    let transmitterClasses:[Transmitter.Type]\n\
    \        = localOnly ? [PriorityTransmitter.self, LocalTransmitter.self]\n   \
    \     : [PriorityTransmitter.self, LocalTransmitter.self, RemoteTransmitter.self];\n\
    \    var link:Transmitter?;\n    for tClass in transmitterClasses.reverse() {\n\
    \        let existingLink = link;\n        link = tClass();\n        link?.nextLink\
    \ = existingLink;\n    }\n    return link;\n}\n...\n```\n\n改变链中链接的方法有很多，但我最终决定为\
    \ `createChain` 方法添加一个参数，允许调用者指定该链是否仅配置为处理本地消息。该参数的作用是决定链中是否包含 `RemoteTransmitter`，不过这一差异对调用组件是透明的。代码清单\
    \ 19-10 展示了我在 `main.swift` 文件中如何使用这个 `localOnly` 参数。\n\n**代码清单 19-10.** 在 `main.swift`\
    \ 文件中指定责任链的配置\n\n```\nlet messages = [\n    Message(from: \"bob@example.com\"\
    , to: \"joe@example.com\",\n        subject: \"Free for lunch?\"),\n    Message(from:\
    \ \"joe@example.com\", to: \"alice@acme.com\",\n        subject: \"New Contracts\"\
    ),\n    Message(from: \"pete@example.com\", to: \"all@example.com\",\n       \
    \ subject: \"Priority: All-Hands Meeting\"),\n];\n\nif let chain = Transmitter.createChain(true)\
    \ {\n    for msg in messages {\n        chain.sendMessage(msg);\n    }\n}\n```\n\
    \n我调用 `createChain` 方法时传入了 `localOnly` 值为 `true`，这意味着我创建的 `Message` 对象之一将不会被处理。你可以通过运行应用程序看到效果，输出如下：\n\
    \n```\nMessage to joe@example.com sent locally\nEnd of chain reached. Message\
    \ not sent\nMessage to all@example.com sent as priority\n```\n\n### 指示是否已处理请求\n\
    \n目前，调用组件无法了解责任链是否处理了某个请求。一种常见的变体是向调用组件提供反馈，这样责任链就不会成为一个“黑洞”。代码清单 19-11 展示了我为向调用组件提供结果所做的更改。\n\
    \n**代码清单 19-11.** 在 `Transmitters.swift` 文件中指示是否已处理请求\n\n```\nclass Transmitter\
    \ {\n    var nextLink:Transmitter?;\n    required init() {}\n\n    func sendMessage(message:Message)\
    \ -> Bool {\n        if (nextLink != nil) {\n            return nextLink!.sendMessage(message);\n\
    \        } else {\n            println(\"End of chain reached. Message not sent\"\
    );\n            return false;\n        }\n    }\n    // ...为简洁起见，省略了方法...\n}\n\
    \nclass LocalTransmitter : Transmitter {\n    override func sendMessage(message:\
    \ Message) -> Bool {\n        if (Transmitter.matchEmailSuffix(message)) {\n \
    \           println(\"Message to \\(message.to) sent locally\");\n           \
    \ return true;\n        } else {\n            return super.sendMessage(message);\n\
    \        }\n    }\n}\n\nclass RemoteTransmitter : Transmitter {\n    override\
    \ func sendMessage(message: Message) -> Bool {\n        if (!Transmitter.matchEmailSuffix(message))\
    \ {\n            println(\"Message to \\(message.to) sent remotely\");\n     \
    \       return true;\n        } else {\n            return super.sendMessage(message);\n\
    \        }\n    }\n}\n\nclass PriorityTransmitter : Transmitter {\n    override\
    \ func sendMessage(message: Message) -> Bool {\n        if (message.subject.hasPrefix(\"\
    Priority\")) {\n            println(\"Message to \\(message.to) sent as priority\"\
    );\n            return true;\n        } else {\n            return super.sendMessage(message);\n\
    \        }\n    }\n}\n```\n\n链中的每个链接只知道它自己能否处理该消息，对其他链接的能力一无所知。这种隔离带来的效果是，要得出一个确定的\
    \ `false` 结果（表示没有任何链接处理该请求），需要征询链中的所有链接。而一旦某个链接接手并处理了 `Message` 对象，则会立即生成一个确定的\
    \ `true` 结果。代码清单 19-12 展示了我在 `main.swift` 文件中如何使用 `sendMessage` 方法返回的结果。\n\n**代码清单\
    \ 19-12.** 在 `main.swift` 文件中接收来自责任链的响应\n\n```\nlet messages = [\n    Message(from:\
    \ \"bob@example.com\", to: \"joe@example.com\",\n        subject: \"Free for lunch?\"\
    ),\n    Message(from: \"joe@example.com\", to: \"alice@acme.com\",\n        subject:\
    \ \"New Contracts\"),\n    Message(from: \"pete@example.com\", to: \"all@example.com\"\
    ,\n        subject: \"Priority: All-Hands Meeting\"),\n];\n\nif let chain = Transmitter.createChain(true)\
    \ {\n    for msg in messages {\n        let handled = chain.sendMessage(msg);\n\
    \        println(\"Message sent: \\(handled)\");\n    }\n}\n```\n\n运行该应用程序会产生以下输出，展示了向调用组件提供响应的效果：\n\
    \n```\nMessage to joe@example.com sent locally\nMessage sent: true\nEnd of chain\
    \ reached. Message not sent\nMessage sent: false\nMessage to all@example.com sent\
    \ as priority\nMessage sent: true\n```"
- fmt: "### Notifying All Links in the Chain\n\nIn the standard implementation of\
    \ the chain of responsibility pattern, links in the chain are consulted only until\
    \ one of them takes responsibility for the request. Links in the chain after the\
    \ one that takes responsibility are unaware of the request.\n\nA variation on\
    \ the standard implementation is to notify all of the links in a chain about a\
    \ request, even the ones that appear after the link that has accepted responsibility\
    \ for the request. This is a variation that I rarely use but that can be helpful\
    \ when links in the chain need to know when they have been preempted. Listing\
    \ 19-13 shows the changes I made to implement the variation in `Transmitter` and\
    \ its subclasses.\n\n**Listing 19-13.** Notifying All Links in the `Transmitters.swift`\
    \ File\n\n```\nclass Transmitter {\n    var nextLink:Transmitter?;\n    required\
    \ init() {}\n    func sendMessage(message:Message, handled: Bool = false) -> Bool\
    \ {\n        if (nextLink != nil) {\n            return nextLink!.sendMessage(message,\
    \ handled: handled);\n        } else if (!handled) {\n            println(\"End\
    \ of chain reached. Message not sent\");\n        }\n        return handled;\n\
    \    }\n    // ...methods omitted for brevity...\n}\n\nclass LocalTransmitter\
    \ : Transmitter {\n    override func sendMessage(message: Message, var handled:Bool)\
    \ -> Bool {\n        if (!handled && Transmitter.matchEmailSuffix(message)) {\n\
    \            println(\"Message to \\(message.to) sent locally\");\n          \
    \  handled = true;\n        }\n        return super.sendMessage(message, handled:\
    \ handled);\n    }\n}\n\nclass RemoteTransmitter : Transmitter {\n    override\
    \ func sendMessage(message: Message, var handled: Bool) -> Bool {\n        if\
    \ (!handled && !Transmitter.matchEmailSuffix(message)) {\n            println(\"\
    Message to \\(message.to) sent remotely\");\n            handled = true;\n   \
    \     }\n        return super.sendMessage(message, handled: handled);\n    }\n\
    }\n\nclass PriorityTransmitter : Transmitter {\n    var totalMessages = 0;\n \
    \   var handledMessages = 0;\n    override func sendMessage(message: Message,\
    \ var handled:Bool) -> Bool {\n        totalMessages++;\n        if (!handled\
    \ && message.subject.hasPrefix(\"Priority\")) {\n            handledMessages++;\n\
    \            println(\"Message to \\(message.to) sent as priority\");\n      \
    \      println(\"Stats: Handled \\(handledMessages) of \\(totalMessages)\");\n\
    \            handled = true;\n        }\n        return super.sendMessage(message,\
    \ handled: handled);\n    }\n}\n```\n\nI have changed the signature of the `sendMessage`\
    \ method to define a `handled` parameter that I use to signal whether a link in\
    \ the chain is being asked to take responsibility for a request or being notified\
    \ about a request for which another link has already taken responsibility. I have\
    \ also modified the `PriorityTransmitter` class so that it keeps track of the\
    \ requests it handles and the total number of requests it processes. Running the\
    \ application produces the following output:\n\n```\nMessage to joe@example.com\
    \ sent locally\nMessage sent: true\nEnd of chain reached. Message not sent\nMessage\
    \ sent: false\nMessage to all@example.com sent as priority\nStats: Handled 1 of\
    \ 3\nMessage sent: true\n```\n\n### Understanding the Pitfalls of the Pattern\n\
    \nThe only pitfall when implementing the pattern is leaking details about the\
    \ objects in the chain, either to the calling component or from one link in the\
    \ chain to another. This pattern works by containing knowledge about the way that\
    \ the chain has been created to a single method or class, and allowing the implementation\
    \ detail to leak creates dependencies on a specific chain configuration that makes\
    \ it difficult to change the chain later. Ensure that you present the calling\
    \ components with a base class or protocol, and use the same base class or protocol\
    \ when setting the `nextLink` properties of links in the chain.\n\nIf you are\
    \ implementing the variation that returns a result to the calling component, then\
    \ you must ensure that you do not inadvertently leak knowledge of the chain in\
    \ the result. The chain of responsibility pattern works best with simple result\
    \ types (like the `Bool` I used in the example), but if you use more complex types,\
    \ then you must not include a reference to the link in the chain that has accepted\
    \ responsibility for the request.\n\n### Examples of the Pattern in Cocoa\n\n\
    Cocoa relies on the chain of responsibility to handle user interface events. All\
    \ UI components are derived from the `UIResponder` class (or the equivalent `NSResponder`\
    \ for OS X apps). The links in the chain are individual UI components, arranged\
    \ to reflect the hierarchy of interface components with the top-level view as\
    \ the last link in the chain.\n\nWhen the user interacts with a component—by clicking\
    \ the mouse, for example—Cocoa sends the interaction event to the link in the\
    \ chain that represents the component that has been clicked. The component is\
    \ provided with the opportunity to take responsibility for handling the event,\
    \ and the event moves along the chain until a component is found that will handle\
    \ the event or the end of the chain is reached (which indicates that the application\
    \ does not want or need to handle the event and it can be ignored).\n\n### Applying\
    \ the Pattern to the SportsStore Application\n\nTo demonstrate the use of the\
    \ chain of responsibility pattern, I will define a set of classes that format\
    \ the background color of the table cells that display products in the SportsStore\
    \ application.\n\n#### Preparing the Example Application\n\nI pick up the SportsStore\
    \ project as I left it in [Chapter 18](#A978-1-4842-0394-1_18_Chapter.html), and\
    \ no preparation for this chapter is required."
