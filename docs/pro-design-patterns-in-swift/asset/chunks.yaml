    \ mediator:mediator);\n\n// 飞机接近机场\nbritish.changePosition(Position(distanceFromRunway:\
    \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2,\
    \ height: 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height:\
    \ 1000));\n\n// 新飞机到达\nlet cathay = Airplane(name: \"CX200\", initialPos:\n  \
    \  Position(distanceFromRunway: 13, height: 22000), mediator:mediator);\n\n//\
    \ 飞机着陆\nbritish.land();\n\n// 飞机移动得过近\ncathay.changePosition(Position(distanceFromRunway:\
    \ 12, height: 22000));\n```\n\n## 理解中介者模式的陷阱\n\n最重要的陷阱是避免向一个对等对象暴露另一个对等对象的细节。中介者应保持其对等对象集合的私有性，除通过中介者间接交互外，不允许对等对象定位或依赖彼此。例如，如果你正在实现返回结果的方法，则必须确保对等对象不会将\
    \ `self` 作为结果返回，或者如果它们这样做了，中介者不会将该引用传回给调用方对等对象。程序员喜欢走捷径，允许直接的对等对象间联系，会让懒惰的程序员绕过中介者，从而破坏模式的实现。\n\
    \n### 单一协议陷阱\n\n一个常见的陷阱是让对等对象和中介者都遵循同一个通用协议，这样对等对象就不会意识到使用了中介者，而误以为它们是在与一个单一的对等对象通信。这看似是个巧妙的主意，但最终会导致代码混乱且难以理解，因为中介者提供的方法与对等对象必须暴露的方法之间，很少存在一对一的映射关系。我的建议是为对等对象和中介者使用独立的协议，这可以确保实现类不必实现虚假的方法，也不必在方法之间创建扭曲的映射关系。\n"
- fmt: "## Examples of the Mediator Pattern in Cocoa\n\nThe `Foundation` framework\
    \ includes a ready-made mediator called `NSNotificationCenter` that can be used\
    \ to send notifications between objects. The `NSNotificationCenter` class is a\
    \ message-based mediator; the class allows peers to specify the kinds of messages\
    \ they want to receive and to restrict the peers from which messages can originate—but\
    \ there is no support for receiving responses from peers. Messages flow in one\
    \ direction only. I created an Xcode playground called `Notfications.playground`\
    \ to demonstrate the use of the `NSNotificationCenter` class, as shown in Listing\
    \ 21-18.\n\n**Listing 21-18.** The Contents of the `Notifications.playground`\
    \ File\n\n```\nimport Foundation;\n\nlet notifier = NSNotificationCenter.defaultCenter();\n\
    \n@objc class NotificationPeer {\n    let name:String;\n    init(name:String)\
    \ {\n        self.name = name;\n        NSNotificationCenter.defaultCenter().addObserver(self,\n\
    \            selector: \"receiveMessage:\", name: \"message\", object: nil);\n\
    \    }\n    func sendMessage(message:String) {\n        NSNotificationCenter.defaultCenter().postNotificationName(\"\
    message\",\n            object: message);\n    }\n    func receiveMessage(notification:NSNotification)\
    \ {\n        println(\"Peer \\(name) received message: \\(notification.object)\"\
    );\n    }\n}\n\nlet p1 = NotificationPeer(name: \"peer1\");\nlet p2 = NotificationPeer(name:\
    \ \"peer2\");\nlet p3 = NotificationPeer(name: \"peer3\");\nlet p4 = NotificationPeer(name:\
    \ \"peer4\");\np3.sendMessage(\"Hello!\");\n```\n\n> **Note:** The `NSNotificationCenter`\
    \ class also implements the observer pattern, which I describe in [Chapter 22](#A978-1-4842-0394-1_22_Chapter.html).\n\
    \nAn instance of the `NSNotificationCenter` class is obtained through the class\
    \ `defaultCenter` property and is used both to register peers to receive and send\
    \ messages. Registration is performed using the `addObserver` method, like this:\n\
    \n```\nNSNotificationCenter.defaultCenter().addObserver(self,\n    selector: \"\
    receiveMessage:\", name: \"message\", object: nil);\n```\n\nThe first argument\
    \ is the object that messages will be sent to, for which I have specified the\
    \ current object. The `selector` argument specifies the method that the messages\
    \ will be sent to, expressed as an Objective-C style selector, which means that\
    \ the method name should be followed with a colon character. The `name` argument\
    \ is used to select only messages that are sent using a specific label, and the\
    \ `object` argument can be used to limit messages to those sent from a specific\
    \ source. I have set the `name` to `message` and `object` arguments to `nil`,\
    \ indicating that I want to receive all of the messages with the label `message`,\
    \ regardless of the label and source.\n\n> **Tip:** The method that is specified\
    \ by the `selector` argument must be annotated with the `@objc` attribute or contained\
    \ within a class that is annotated with `@objc`.\n\nMessages are sent using the\
    \ `postNotificationName` method, specifying a label and an object that will be\
    \ sent to the peers, like this:\n\n```\nNSNotificationCenter.defaultCenter()\n\
    \    .postNotificationName(\"message\", object: message);\n```\n\nIn the playground,\
    \ I define a class called `NotificationPeer` that calls the `addObserver` method\
    \ to register for messages to be sent to the `receiveMessage` method, and I use\
    \ the `sendMessage` method to send messages via the `NSNotificationCenter`, using\
    \ the label `message`.\n\nWhen you register to receive messages, the method specified\
    \ by the `selector` argument must take a single argument of the `NSNotification`\
    \ type, which is used to represent messages and which defines the properties shown\
    \ in Table 21-2.\n\n**Table 21-2.** The Properties Defined by the `NSNotification`\
    \ Class\n\n| Name | Description |\n|------|-------------|\n| `name` | The label\
    \ used to send the message, set to `message` in the example |\n| `object` | The\
    \ optional data object associated with the message, set to the `message` parameter\
    \ passed to the `sendMessage` method in the example |\n| `userInfo` | An optional\
    \ data value expressed as a dictionary that can be sent with an overloaded version\
    \ of the `postNotificationName` method, not used in the example |\n\nI create\
    \ four `NotificationPeer` objects in the playground and then call the `sendMessage`\
    \ method on one of them, which produces the following output in the console:\n\
    \n```\nPeer peer1 received message: Optional(Hello!)\nPeer peer2 received message:\
    \ Optional(Hello!)\nPeer peer3 received message: Optional(Hello!)\nPeer peer4\
    \ received message: Optional(Hello!)\n```\n\nThe `NSNotificationCenter` can be\
    \ a useful class, but I find not being able to obtain responses from peers to\
    \ be a limitation in many projects, so I generally implement my own alternative,\
    \ as described in the \"Variations on the Mediator Pattern\" section of this chapter.\n\
    \n## Applying the Pattern to the SportsStore Application\n\nThere isn't a ready\
    \ example for applying the mediator pattern on its own to the SportsStore for\
    \ this chapter. Instead, in [Chapter 22](#A978-1-4842-0394-1_22_Chapter.html),\
    \ I demonstrate how to use the mediator pattern and the command pattern together,\
    \ which is a common combination.\n\n## Summary\n\nIn this chapter I described\
    \ the mediator pattern and explained how it is used to handle communication between\
    \ peer objects in order to reduce the complexity of an application and to ensure\
    \ that no peer objects are left out. In the next chapter, I describe the observer\
    \ pattern, which is used when an object needs to notify other objects when something\
    \ interesting happens.\n\n# 22. The Observer Pattern\n\nThe observer pattern is\
    \ used to manage the process by which one object expresses interest in—and receives\
    \ notification of—changes in another. The observer pattern allows large and complex\
    \ groups of objects to cooperate with one another with few dependencies between\
    \ them and is so widely used that you are likely to have come across it if you\
    \ have developed an application using a modern UI component framework. Table 22-1\
    \ puts the observer pattern in context.\n\n**Table 22-1.** Putting the Observer\
    \ Pattern into Context\n\n| Question | Answer |\n|----------|--------|\n| What\
    \ is it? | The observer pattern allows one object to register to receive notifications\
    \ about changes in another object without needing to depend on the implementation\
    \ of that object. |\n| What are the benefits? | This pattern simplifies application\
    \ design by allowing objects that provide notifications to do so in a uniform\
    \ way without needing to know how those notifications are processed and acted\
    \ on by the recipients. |\n| When should you use this pattern? | Use this pattern\
    \ whenever one object needs to receive notifications about changes in another\
    \ object but where the sender of the notifications does not depend on the recipient\
    \ to complete its work. |\n| When should you avoid this pattern? | Do not use\
    \ this pattern unless the sender of the notifications is functionally dependent\
    \ from the recipients, such that the recipients could be removed from the application\
    \ without preventing the sender from performing its work. |\n| How do you know\
    \ when you have implemented the pattern correctly? | The observer pattern is implemented\
    \ correctly when an object can receive notifications without being tightly coupled\
    \ to the object that sends them. |\n| Are there any common pitfalls? | The biggest\
    \ pitfall with this pattern is allowing the objects that send and receive notifications\
    \ to become interdependent. |\n| Are there any related patterns? | No. |"
  raw: '## Examples of the Mediator Pattern in Cocoa


    The `Foundation` framework includes a ready-made mediator called `NSNotificationCenter`
    that can be used to send notifications between objects. The `NSNotificationCenter`class
    is a message-based mediator; the class allows peers to specify the kinds of messages
    they want to receive and to restrict the peers from which messages can originate—but
    there is no support for receiving responses from peers. Messages flow in one direction
    only. I created an Xcode playground called `Notfications.playground` to demonstrate
    the use of the `NSNotificationCenter` class, as shown in Listing 21-18.


    Listing 21-18. The Contents of the Notifications.playground File


    `import Foundation;`


    `let notifier = NSNotificationCenter.defaultCenter();`


    `@objc class NotificationPeer {`


    `let name:String;`


    `init(name:String) {`


    `self.name = name;`


    `NSNotificationCenter.defaultCenter().addObserver(self,`


    `selector: "receiveMessage:", name: "message", object: nil);`


    `}`


    `func sendMessage(message:String) {`


    `NSNotificationCenter.defaultCenter().postNotificationName("message",`


    `object: message);`


    `}`


    `func receiveMessage(notification:NSNotification) {`


    `println("Peer \(name) received message: \(notification.object)");`


    `}`


    `}`


    `let p1 = NotificationPeer(name: "peer1");`


    `let p2 = NotificationPeer(name: "peer2");`


    `let p3 = NotificationPeer(name: "peer3");`


    `let p4 = NotificationPeer(name: "peer4");`


    `p3.sendMessage("Hello!");`


    Note


    The `NSNotificationCenter` class also implements the observer pattern, which I
    describe in [Chapter 22](#A978-1-4842-0394-1_22_Chapter.html).


    An instance of the `NSNotificationCenter` class is obtained through the class
    `defaultCenter` property and is used both to register peers to receive and send
    messages. Registration is performed using the `addObserver` method, like this:


    `...`


    `NSNotificationCenter.defaultCenter().` `addObserver(self,`


    `selector: "receiveMessage:", name: "message", object: nil)` `;`


    `...`


    The first argument is the object that messages will be sent to, for which I have
    specified the current object. The `selector` argument specifies the method that
    the messages will be sent to, expressed as an Objective-C style selector, which
    means that the method name should be followed with a colon character. The `name`
    argument is used to select only messages that are sent using a specific label,
    and the `object` argument can be used to limit messages to those sent from a specific
    source. I have set the `name` to `message` and `object` arguments to `nil`, indicating
    that I want to receive all of the messages with the label `message`, regardless
    of the label and source.


    Tip


    The method that is specified by the `selector` argument must be annotated with
    the `@` `objc`attribute or contained within a class that is annotated with `@objc`.


    Messages are sent using the `postNotificationName` method, specifying a label
    and an object that will be sent to the peers, like this:


    `...`


    `NSNotificationCenter.defaultCenter()`


    `.postNotificationName("message", object: message);`


    `...`


    In the playground, I define a class called `NotificationPeer` that calls the `addObserver`
    method to register for messages to be sent to the `receiveMessage` method, and
    I use the `sendMessage` method to send messages via the `NSNotificationCenter`,
    using the label `message`.


    When you register to receive messages, the method specified by the `selector`
    argument must take a single argument of the `NSNotification` type, which is used
    to represent messages and which defines the properties shown in Table [21-2](#A978-1-4842-0394-1_21_Chapter.html#Tab2).


    Table 21-2.


    The Properties Defined by the NSNotification Class


    | Name | Description |

    | --- | --- |

    | `name` | The label used to send the message, set to `message` in the example
    |

    | `object` | The optional data object associated with the message, set to the
    `message` parameter passed to the `sendMessage` method in the example |

    | `userInfo` | An optional data value expressed as a dictionary that can be sent
    with an overloaded version of the `postNotificationName` method, not used in the
    example |


    I create four `NotificationPeer` objects in the playground and then call the `sendMessage`
    method on one of them, which produces the following output in the console:


    `Peer peer1 received message: Optional(Hello!)`


    `Peer peer2 received message: Optional(Hello!)`


    `Peer peer3 received message: Optional(Hello!)`


    `Peer peer4 received message: Optional(Hello!)`


    The `NSNotificationCenter` can be a useful class, but I find not being able to
    obtain responses from peers to be a limitation in many projects, so I generally
    implement my own alternative, as described in the “Variations on the Mediator
    Pattern” section of this chapter.


    ## Applying the Pattern to the SportsStore Application


    There isn’t a ready example for applying the mediator pattern on its own to the
    SportsStore for this chapter. Instead, in [Chapter 22](#A978-1-4842-0394-1_22_Chapter.html),
    I demonstrate how to use the mediator pattern and the command pattern together,
    which is a common combination.


    ## Summary


    In this chapter I described the mediator pattern and explained how it is used
    to handle communication between peer objects in order to reduce the complexity
    of an application and to ensure that no peer objects are left out. In the next
    chapter, I describe the observer pattern, which is used when an object needs to
    notify other objects when something interesting happens.


    # 22. The Observer Pattern


    The observer pattern is used to manage the process by which one object expresses
    interest in—and receives notification of—changes in another. The observer pattern
    allows large and complex groups of objects to cooperate with one another with
    few dependencies between them and is so widely used that you are likely to have
    come across it if you have developed an application using a modern UI component
    framework. Table [22-1](#A978-1-4842-0394-1_22_Chapter.html#Tab1) puts the observer
    pattern in context.


    Table 22-1.


    Putting the Observer Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The observer pattern allows one object to register to receive
    notifications about changes in another object without needing to depend on the
    implementation of that object. |

    | What are the benefits? | This pattern simplifies application design by allowing
    objects that provide notifications to do so in a uniform way without needing to
    know how those notifications are processed and acted on by the recipients. |

    | When should you use this pattern? | Use this pattern whenever one object needs
    to receive notifications about changes in another object but where the sender
    of the notifications does not depend on the recipient to complete its work. |

    | When should you avoid this pattern? | Do not use this pattern unless the sender
    of the notifications is functionally dependent from the recipients, such that
    the recipients could be removed from the application without preventing the sender
    from performing its work. |

    | How do you know when you have implemented the pattern correctly? | The observer
    pattern is implemented correctly when an object can receive notifications without
    being tightly coupled to the object that sends them. |

    | Are there any common pitfalls? | The biggest pitfall with this pattern is allowing
    the objects that send and receive notifications to become interdependent. |

    | Are there any related patterns? | No. |'
  trans: "\n## Cocoa 中中介者模式的示例\n\n`Foundation` 框架包含一个名为 `NSNotificationCenter` 的现成中介者，可用于在对象之间发送通知。`NSNotificationCenter`\
    \ 类是一个基于消息的中介者；该类允许对等体指定它们想要接收的消息类型，并限制消息来源的对等体——但不支持接收来自对等体的响应。消息仅单向流动。我创建了一个名为\
    \ `Notfications.playground` 的 Xcode playground，用于演示 `NSNotificationCenter` 类的使用，如代码清单\
    \ 21-18 所示。\n\n**代码清单 21-18.** `Notifications.playground` 文件的内容\n\n```\nimport\
    \ Foundation;\n\nlet notifier = NSNotificationCenter.defaultCenter();\n\n@objc\
    \ class NotificationPeer {\n    let name:String;\n    init(name:String) {\n  \
    \      self.name = name;\n        NSNotificationCenter.defaultCenter().addObserver(self,\n\
    \            selector: \"receiveMessage:\", name: \"message\", object: nil);\n\
    \    }\n    func sendMessage(message:String) {\n        NSNotificationCenter.defaultCenter().postNotificationName(\"\
    message\",\n            object: message);\n    }\n    func receiveMessage(notification:NSNotification)\
    \ {\n        println(\"Peer \\(name) received message: \\(notification.object)\"\
    );\n    }\n}\n\nlet p1 = NotificationPeer(name: \"peer1\");\nlet p2 = NotificationPeer(name:\
    \ \"peer2\");\nlet p3 = NotificationPeer(name: \"peer3\");\nlet p4 = NotificationPeer(name:\
    \ \"peer4\");\np3.sendMessage(\"Hello!\");\n```\n\n> **注意：** `NSNotificationCenter`\
    \ 类也实现了观察者模式，我将在第 22 章中对此进行描述。\n\n通过类的 `defaultCenter` 属性可以获取 `NSNotificationCenter`\
    \ 类的一个实例，该实例既用于注册对等体以接收消息，也用于发送消息。注册通过 `addObserver` 方法执行，如下所示：\n\n```\nNSNotificationCenter.defaultCenter().addObserver(self,\n\
    \    selector: \"receiveMessage:\", name: \"message\", object: nil);\n```\n\n\
    第一个参数是消息将发送到的对象，这里我指定了当前对象。`selector` 参数指定消息将发送到的方法，以 Objective-C 风格的 selector\
    \ 形式表示，这意味着方法名后应跟一个冒号字符。`name` 参数用于仅选择使用特定标签发送的消息，而 `object` 参数可用于将消息限制为仅来自特定来源的消息。我将\
    \ `name` 设置为 `message`，并将 `object` 参数设置为 `nil`，表示我想接收所有标签为 `message` 的消息，无论标签和来源如何。\n\
    \n> **提示：** 由 `selector` 参数指定的方法必须使用 `@objc` 属性进行注解，或包含在使用 `@objc` 注解的类中。\n\n\
    消息通过 `postNotificationName` 方法发送，指定一个标签和一个将发送给对等体的对象，如下所示：\n\n```\nNSNotificationCenter.defaultCenter()\n\
    \    .postNotificationName(\"message\", object: message);\n```\n\n在 playground\
    \ 中，我定义了一个名为 `NotificationPeer` 的类，该类调用 `addObserver` 方法注册消息，以便将消息发送到 `receiveMessage`\
    \ 方法，并使用 `sendMessage` 方法通过 `NSNotificationCenter` 发送消息，并使用标签 `message`。\n\n当你注册接收消息时，由\
    \ `selector` 参数指定的方法必须接受一个 `NSNotification` 类型的单一参数，该类型用于表示消息，并定义了表 21-2 中所示的属性。\n\
    \n**表 21-2.** `NSNotification` 类定义的属性\n\n| 名称 | 描述 |\n|------|------|\n| `name`\
    \ | 用于发送消息的标签，示例中设置为 `message` |\n| `object` | 与消息关联的可选数据对象，示例中设置为传递给 `sendMessage`\
    \ 方法的 `message` 参数 |\n| `userInfo` | 一个可选的数据值，以字典形式表达，可以通过 `postNotificationName`\
    \ 方法的重载版本发送，未在示例中使用 |\n\n我在 playground 中创建了四个 `NotificationPeer` 对象，然后对其中的一个调用\
    \ `sendMessage` 方法，这会在控制台中产生以下输出：\n\n```\nPeer peer1 received message: Optional(Hello!)\n\
    Peer peer2 received message: Optional(Hello!)\nPeer peer3 received message: Optional(Hello!)\n\
    Peer peer4 received message: Optional(Hello!)\n```\n\n`NSNotificationCenter` 可以是一个有用的类，但我发现在许多项目中无法从对等体获取响应是一个限制，因此我通常会实现自己的替代方案，正如本章“中介者模式的变体”一节中所描述的那样。\n\
    \n## 将模式应用于 SportsStore 应用\n\n对于本章，没有现成的示例可以单独将中介者模式应用于 SportsStore。相反，在第 22 章中，我将演示如何将中介者模式和命令模式结合使用，这是一种常见的组合。\n\
    \n## 总结\n\n在本章中，我描述了中介者模式，并解释了如何使用它来处理对等体对象之间的通信，以降低应用程序的复杂性并确保没有对等体对象被遗漏。在下一章中，我将描述观察者模式，该模式用于当一个对象需要在发生有趣的事情时通知其他对象。\n\
    \n# 22. 观察者模式\n\n观察者模式用于管理一个对象对另一个对象的变化表示兴趣并接收通知的过程。观察者模式允许庞大而复杂的对象组彼此协作，且它们之间的依赖关系很少，并且应用如此广泛，以至于如果你曾使用现代\
    \ UI 组件框架开发过应用程序，很可能已经遇到过它。表 22-1 将观察者模式置于上下文中。\n\n**表 22-1.** 将观察者模式置于上下文\n\n\
    | 问题 | 答案 |\n|----------|--------|\n| 它是什么？ | 观察者模式允许一个对象注册以接收关于另一个对象变化的通知，而无需依赖于该对象的实现。\
    \ |\n| 有什么好处？ | 该模式通过允许提供通知的对象以统一方式执行此操作而简化了应用程序设计，无需了解接收方如何处理和执行这些通知。 |\n| 何时应使用此模式？\
    \ | 每当一个对象需要接收关于另一个对象变化的通知，但通知的发送方不依赖于接收方来完成其工作时，使用此模式。 |\n| 何时应避免使用此模式？ | 除非通知的发送方在功能上独立于接收方，使得接收方可以从应用程序中移除而不妨碍发送方执行其工作，否则不要使用此模式。\
    \ |\n| 如何判断是否正确实现了该模式？ | 当一个对象可以接收通知而无需与发送通知的对象紧密耦合时，观察者模式就正确实现了。 |\n| 是否有常见的陷阱？\
    \ | 该模式最大的陷阱是允许发送和接收通知的对象变得相互依赖。 |\n| 是否有相关模式？ | 没有。 |\n"
- fmt: "# Preparing the Example Project\n\nFor this chapter I created an Xcode OS\
    \ X Command Line Tool project called `Observer`. I added a file to the project\
    \ called `SystemComponents.swift` and used it to define the classes shown in Listing\
    \ 22-1.\n\nListing 22-1. The Contents of the `SystemComponents.swift` File\n\n\
    ```\nclass ActivityLog {\n    func logActivity(activity:String) {\n        println(\"\
    Log: \\(activity)\");\n    }\n}\n\nclass FileCache {\n    func loadFiles(user:String)\
    \ {\n        println(\"Load files for \\(user)\");\n    }\n}\n\nclass AttackMonitor\
    \ {\n    var monitorSuspiciousActivity: Bool = false {\n        didSet {\n   \
    \         println(\"Monitoring for attack: \\(monitorSuspiciousActivity)\");\n\
    \        }\n    }\n}\n```\n\nThe three classes I have defined represent generic\
    \ application components. I don’t need to implement the components in any detail\
    \ to demonstrate the pattern, and so they all write messages to the debug console\
    \ to indicate they are being used. The `ActivityLog` represents a logging system\
    \ that accepts details of system events, the `FileCache` class represents a cache\
    \ that loads the files belonging to a given user, and the `AttackMonitor` class\
    \ represents a security service that monitors system behavior when something suspicious\
    \ has occurred. Listing 22-2 shows the contents of the `Authentication.swift`\
    \ file, in which I defined a class that uses the system components.\n\nListing\
    \ 22-2. The Contents of the `Authentication.swift` File\n\n```\nclass AuthenticationManager\
    \ {\n    private let log = ActivityLog();\n    private let cache = FileCache();\n\
    \    private let monitor = AttackMonitor();\n\n    func authenticate(user:String,\
    \ pass:String) -> Bool {\n        var result = false;\n        if (user == \"\
