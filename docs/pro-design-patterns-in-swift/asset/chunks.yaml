    \n你可以通过启动应用来查看我计算的额外总值的效果。布局底部的标签将显示库存中的商品数量和总值，如图 4-7 所示。\n\n![A978-1-4842-0394-1_4_Fig7_HTML.jpg](img/A978-1-4842-0394-1_4_Fig7_HTML.jpg)\n\
    \n**图 4-7.** 向 SportsStore 应用的信息摘要添加内容\n\n## 本章小结\n\n在本章中，我描述了一个位于 Swift 开发核心的模式：定义一个用于创建对象的模板。这种模式的好处是它提供了基本工具，可用于拆分紧密耦合的组件，允许向对象的消费者呈现公共\
    \ API，并隐藏私有实现。在下一章中，我将介绍一种不同的对象创建方式：使用原型。\n\n# 5. 原型模式\n\n在本章中，我将介绍原型模式，该模式通过复制一个现有对象（称为原型）来创建新对象。原型本身是使用模板创建的（如第\
    \ 4 章所述），但后续实例都是克隆体。表 5-1 将原型模式置于上下文中。\n\n**表 5-1.** 将原型模式置于上下文中\n\n| 问题 | 答案\
    \ |\n| --- | --- |\n| 它是什么？ | 原型模式通过复制一个现有对象（称为原型）来创建新对象。 |\n| 有什么好处？ | 主要好处是向使用对象的组件隐藏创建对象的代码；这意味着组件不需要知道创建新对象需要哪个类或结构体，不需要知道初始化器的细节，并且在创建和实例化子类时也不需要更改。此模式还可用于避免每次创建特定类型的新对象时重复昂贵的初始化。\
    \ |\n| 何时应该使用此模式？ | 当你编写一个需要创建对象新实例，但又不想依赖类初始化器的组件时，此模式非常有用。 |\n| 何时应该避免此模式？ |\
    \ 使用此模式没有缺点，但你应该了解本书本部分中的其他模式，以确保为你的应用选择最合适的模式。 |\n| 如何知道你是否正确实现了该模式？ | 要测试此模式的有效实现，请更改用于原型对象的类或结构体的初始化器，并检查在创建克隆的组件中是否需要相应的更改。作为第二个测试，为原型类创建一个子类，并确保组件可以克隆它而无需任何更改。请参阅“实现原型模式”一节。\
    \ |\n| 有哪些常见陷阱？ | 主要陷阱是在克隆原型对象时选择了错误的复制方式。有两种可用的复制方式——浅复制和深复制——为你的应用选择正确的类型非常重要。有关详细信息，请参阅“理解浅复制和深复制”一节。\
    \ |\n| 是否有任何相关模式？ | 最相关的模式是我在第 4 章中描述的对象模板模式。另请参阅单例模式，它提供了一种共享单个对象的方法，以避免需要创建额外的实例。\
    \ |\n\n## 理解该模式解决的问题\n\n在第 4 章中，我解释了如何使用模板创建对象，但这种方法也有其自身的缺点，我将在以下部分中描述。\n"
- fmt: "### Incurring Expensive Initializations\n\nSome class or struct templates\
    \ are expensive to use, meaning that initializing a new instance of an object\
    \ can consume a substantial amount of memory or computation in order to prepare\
    \ the object for use. To demonstrate this kind of problem, I created the `Initialization.playground`\
    \ file, the contents of which are shown in Listing 5-1.\n\n**Listing 5-1.** The\
    \ Contents of the `Initialization.playground` File\n\n```\nclass Sum {\n    let\
    \ resultsCache: [[Int]];\n    var firstValue:Int;\n    var secondValue:Int;\n\
    \    init(first:Int, second:Int) {\n        resultsCache = [[Int]](count: 10,\
    \ repeatedValue:\n            [Int](count:10, repeatedValue: 0));\n        for\
    \ i in 0..<10 {\n            for j in 0..<10 {\n                resultsCache[i][j]\
    \ = i + j;\n            }\n        }\n        self.firstValue = first;\n     \
    \   self.secondValue = second;\n    }\n    var Result:Int {\n        get {\n \
    \           return firstValue < resultsCache.count\n                && secondValue\
    \ < resultsCache[firstValue].count\n                ? resultsCache[firstValue][secondValue]\n\
    \                : firstValue + secondValue;\n        }\n    }\n}\nvar calc1 =\
    \ Sum(first:0, second: 9).Result;\nvar calc2 = Sum(first:3, second: 8).Result;\n\
    println(\"Calc1: \\(calc1) Calc2: \\(calc2)\");\n```\n\nI have defined a class\
    \ called `Sum` that produces the sum of two integer values passed to its initializer.\
    \ As an optimization, the initializer for the `Sum` class creates a two-dimensional\
    \ `Int` array and populates it with precalculated values with the intention of\
    \ trading time spent during initialization against faster calculations later.\n\
    \nHaving defined the `Sum` class, I then create two instances and use them to\
    \ perform calculations. Each time that I create a new `Sum` object, I incur the\
    \ cost of creating and populating the two-dimensional array—a cost that can be\
    \ measured both in terms of memory required to store the calculated values and\
    \ in computation. I finish by writing the results of the two calculations to the\
    \ console, producing the following output:\n\n```\nCalc1: 9 Calc2: 11\n```\n\n\
    This may seem like an unrealistic example, but this style of coding is surprisingly\
    \ common and is usually a result of premature optimization, where a programmer\
    \ tries to speculatively improve the performance of code as it is being written,\
    \ rather than as a result of subsequent performance testing—something that usually\
    \ results in worse performance and less readable code. There are, however, two\
    \ aspects of this example that are unrealistic. The first is that the work performed\
    \ by the `Sum` class is so simple that even the most enthusiastic optimizer is\
    \ unlikely to see the cost of adding two integers as being worth caching. The\
    \ second aspect is that the playground shows the `Sum` class and the two statements\
    \ that create instances from it in the same file. In a real project, the initialization\
    \ code is lost in a deep hierarchy of classes, and the statements that use the\
    \ class will be in entirely different parts of the app.\n\n### Creating Template\
    \ Dependencies\n\nTo create a new object from a template, a component must possess\
    \ three pieces of information.\n\n- The template that is associated with the object\n\
    - The initializer that must be called\n- The names and types of the initializer\
    \ arguments\n\nThis information becomes disseminated throughout an app wherever\
    \ a new instance of an object is required. The problem this presents is that it\
    \ creates a dependency on the template, such that when the template changes, all\
    \ of the components that use the template to create new objects must be updated\
    \ to reflect that change. You can see this in Listing 5-2, where I have reworked\
    \ the `Sum` class so that it defines an additional initializer parameter.\n\n\
    **Listing 5-2.** Adding an Initializer in the `Initialization.playground` File\n\
    \n```\nclass Sum {\n    let resultsCache: [[Int]];\n    var firstValue:Int;\n\
    \    var secondValue:Int;\n    init(first:Int, second:Int, cacheSize:Int) {\n\
    \        resultsCache = [[Int]](count: cacheSize, repeatedValue:\n           \
    \ [Int](count:cacheSize, repeatedValue: 0));\n        for i in 0 ..< cacheSize\
    \ {\n            for j in 0 ..< cacheSize {\n                resultsCache[i][j]\
    \ = i + j;\n            }\n        }\n        self.firstValue = first;\n     \
    \   self.secondValue = second;\n    }\n    var Result:Int {\n        get {\n \
    \           return firstValue < resultsCache.count\n                && secondValue\
    \ < resultsCache[firstValue].count\n                ? resultsCache[firstValue][secondValue]\n\
    \                : firstValue + secondValue;\n        }\n    }\n}\nvar calc1 =\
    \ Sum(first:0, second: 9, cacheSize:100).Result;\nvar calc2 = Sum(first:3, second:\
    \ 8, cacheSize:20).Result;\nprintln(\"Calc1: \\(calc1) Calc2: \\(calc2)\");\n\
    ```\n\nThe initializer parameter is used to control the number of cached results\
    \ that are generated. As the listing demonstrates, I have had to update the statements\
    \ that create `Sum` objects to use the revised initializer. The changes are trivial\
    \ when the only two statements that create `Sum` objects are next to each other,\
    \ but these construction statements can be distributed throughout a real project,\
    \ and each one is required to have enough knowledge about the implementation of\
    \ the `Sum` class to provide a sensible value for the `cacheSize` initializer\
    \ parameter.\n\n> **Tip**  \n> My goal in this chapter is to showcase the prototype\
    \ pattern, but there are other ways to solve this kind of problem. I could, for\
    \ example, have defined a convenience initializer that calls the designated initializer\
    \ and provided a default value for the `cacheSize` parameter. As I explained in\
    \ [Chapter 1](#A978-1-4842-0394-1_1_Chapter.html), patterns are not always the\
    \ only solution to a problem.\n\n## Understanding the Prototype Pattern\n\nThe\
    \ prototype pattern uses an existing object—rather than a class or struct—to create\
    \ new objects. This is often referred to as cloning, since the new object is an\
    \ identical copy of the existing one, including any changes made to the object’s\
    \ stored properties that have been made since it was created. Figure [5-1](#A978-1-4842-0394-1_5_Chapter.html#Fig1)\
    \ shows how the prototype pattern works.\n\n![A978-1-4842-0394-1_5_Fig1_HTML.jpg](A978-1-4842-0394-1_5_Fig1_HTML.jpg)\n\
    \n**Figure 5-1.** The prototype pattern\n\nThere are three operations in the prototype\
    \ pattern. First, the component that needs an object calls on the original object\
    \ (known as the prototype) to copy itself. The second operation is the copying\
    \ process in which a new object (known as the clone) is created. In the final\
    \ operation, the prototype gives the calling component the clone, completing the\
    \ copying process."
  raw: '### Incurring Expensive Initializations


    Some class or struct templates are expensive to use, meaning that initializing
    a new instance of an object can consume a substantial amount of memory or computation
    in order to prepare the object for use. To demonstrate this kind of problem, I
    created the `Initialization.playground` file, the contents of which are shown
    in Listing 5-1.


    Listing 5-1. The Contents of the Initialization.playground File


    `class Sum {`


    `let resultsCache: [[Int]];`


    `var firstValue:Int;`


    `var secondValue:Int;`


    `init(first:Int, second:Int) {`


    `resultsCache = [[Int]](count: 10, repeatedValue:`


    `[Int](count:10, repeatedValue: 0));`


    `for i in 0..<10 {`


    `for j in 0..<10 {`


    `resultsCache[i][j] = i + j;`


    `}`


    `}`


    `self.firstValue = first;`


    `self.secondValue = second;`


    `}`


    `var Result:Int {`


    `get {`


    `return firstValue < resultsCache.count`


    `&& secondValue < resultsCache[firstValue].count`


    `? resultsCache[firstValue][secondValue]`


    `: firstValue + secondValue;`


    `}`


    `}`


    `}`


    `var calc1 = Sum(first:0, second: 9).Result;`


    `var calc2 = Sum(first:3, second: 8).Result;`


    `println("Calc1: \(calc1) Calc2: \(calc2)");`


    I have defined a class called `Sum` that produces the sum of two integer values
    passed to its initializer. As an optimization, the initializer for the `Sum` class
    creates a two-dimensional `Int` array and populates it with precalculated values
    with the intention of trading time spent during initialization against faster
    calculations later.


    Having defined the `Sum` class, I then create two instances and use them to perform
    calculations. Each time that I create a new `Sum` object, I incur the cost of
    creating and populating the two-dimensional array—a cost that can be measured
    both in terms of memory required to store the calculated values and in computation.
    I finish by writing the results of the two calculations to the console, producing
    the following output:


    `Calc1: 9 Calc2: 11`


    This may seem like an unrealistic example, but this style of coding is surprisingly
    common and is usually a result of premature optimization, where a programmer tries
    to speculatively improve the performance of code as it is being written, rather
    than as a result of subsequent performance testing—something that usually results
    in worse performance and less readable code. There are, however, two aspects of
    this example that are unrealistic. The first is that the work performed by the
    `Sum` class is so simple that even the most enthusiastic optimizer is unlikely
    to see the cost of adding two integers as being worth caching. The second aspect
    is that the playground shows the `Sum` class and the two statements that create
    instances from it in the same file. In a real project, the initialization code
    is lost in a deep hierarchy of classes, and the statements that use the class
    will be in entirely different parts of the app.


    ### Creating Template Dependencies


    To create a new object from a template, a component must possess three pieces
    of information.


    *   The template that is associated with the object

    *   The initializer that must be called

    *   The names and types of the initializer arguments


    This information becomes disseminated throughout an app wherever a new instance
    of an object is required. The problem this presents is that it creates a dependency
    on the template, such that when the template changes, all of the components that
    use the template to create new objects must be updated to reflect that change.
    You can see this in Listing 5-2, where I have reworked the `Sum` class so that
    it defines an additional initializer parameter.


    Listing 5-2. Adding an Initializer in the Initialization.playground File


    `class Sum {`


    `let resultsCache: [[Int]];`


    `var firstValue:Int;`


    `var secondValue:Int;`


    `init(first:Int, second:Int, cacheSize:Int) {`


    `resultsCache = [[Int]](count: cacheSize, repeatedValue:`


    `[Int](count:cacheSize, repeatedValue: 0));`


    `for i in 0 ..< cacheSize {`


    `for j in 0 ..< cacheSize {`


    `resultsCache[i][j] = i + j;`


    `}`


    `}`


    `self.firstValue = first;`


    `self.secondValue = second;`


    `}`


    `var Result:Int {`


    `get {`


    `return firstValue < resultsCache.count`


    `&& secondValue < resultsCache[firstValue].count`


    `? resultsCache[firstValue][secondValue]`


    `: firstValue + secondValue;`


    `}`


    `}`


    `}`


    `var calc1 = Sum(first:0, second: 9, cacheSize:100).Result;`


    `var calc2 = Sum(first:3, second: 8, cacheSize:20).Result;`


    `println("Calc1: \(calc1) Calc2: \(calc2)");`


    The initializer parameter is used to control the number of cached results that
    are generated. As the listing demonstrates, I have had to update the statements
    that create `Sum` objects to use the revised initializer. The changes are trivial
    when the only two statements that create `Sum` objects are next to each other,
    but these construction statements can be distributed throughout a real project,
    and each one is required to have enough knowledge about the implementation of
    the `Sum` class to provide a sensible value for the `cacheSize` initializer parameter.


    Tip


    My goal in this chapter is to showcase the prototype pattern, but there are other
    ways to solve this kind of problem. I could, for example, have defined a convenience
    initializer that calls the designated initializer and provided a default value
    for the `cacheSize` parameter. As I explained in [Chapter 1](#A978-1-4842-0394-1_1_Chapter.html),
    patterns are not always the only solution to a problem.


    ## Understanding the Prototype Pattern


    The prototype pattern uses an existing object—rather than a class or struct—to
    create new objects. This is often referred to as cloning, since the new object
    is an identical copy of the existing one, including any changes made to the object’s
    stored properties that have been made since it was created. Figure [5-1](#A978-1-4842-0394-1_5_Chapter.html#Fig1)
    shows how the prototype pattern works.


    ![A978-1-4842-0394-1_5_Fig1_HTML.jpg](A978-1-4842-0394-1_5_Fig1_HTML.jpg)


    Figure 5-1.


    The prototype pattern


    There are three operations in the prototype pattern. First, the component that
    needs an object calls on the original object (known as the prototype) to copy
    itself. The second operation is the copying process in which a new object (known
    as the clone) is created. In the final operation, the prototype gives the calling
    component the clone, completing the copying process.'
  trans: "\n### 承担高昂的初始化成本\n\n某些类或结构体模板的使用成本很高，这意味着初始化对象的新实例可能需要消耗大量内存或计算资源，才能让该对象准备好被使用。为了演示这类问题，我创建了\
    \ `Initialization.playground` 文件，其内容如代码清单 5-1 所示。\n\n**代码清单 5-1.** `Initialization.playground`\
    \ 文件的内容\n\n```\nclass Sum {\n    let resultsCache: [[Int]];\n    var firstValue:Int;\n\
    \    var secondValue:Int;\n    init(first:Int, second:Int) {\n        resultsCache\
    \ = [[Int]](count: 10, repeatedValue:\n            Int);\n        for i in 0..<10\
    \ {\n            for j in 0..<10 {\n                resultsCache[i][j] = i + j;\n\
    \            }\n        }\n        self.firstValue = first;\n        self.secondValue\
    \ = second;\n    }\n    var Result:Int {\n        get {\n            return firstValue\
    \ < resultsCache.count\n                && secondValue < resultsCache[firstValue].count\n\
    \                ? resultsCache[firstValue][secondValue]\n                : firstValue\
    \ + secondValue;\n        }\n    }\n}\nvar calc1 = Sum(first:0, second: 9).Result;\n\
    var calc2 = Sum(first:3, second: 8).Result;\nprintln(\"Calc1: \\(calc1) Calc2:\
    \ \\(calc2)\");\n```\n\n我定义了一个名为 `Sum` 的类，它负责计算传入其初始化器的两个整数值之和。作为一种优化手段，`Sum`\
    \ 类的初始化器创建了一个二维 `Int` 数组，并用预计算的值填充它，旨在用初始化期间的时间开销来换取后续更快速的计算。\n\n定义好 `Sum` 类之后，我创建了两个实例并使用它们进行计算。每次创建新的\
    \ `Sum` 对象时，我都需要承担创建并填充那个二维数组的开销——这种开销既体现在存储计算值所需的内存上，也体现在计算资源上。最后，我将两个计算结果输出到控制台，得到如下输出：\n\
    \n```\nCalc1: 9 Calc2: 11\n```\n\n这看起来可能是一个不切实际的例子，但这种编码风格却出奇地常见，通常是过早优化的结果——程序员在编写代码时试图推测性地提升性能，而不是基于后续的性能测试——这通常会导致性能更差且代码可读性更低。不过，这个例子中有两个方面不太现实。第一，`Sum`\
    \ 类执行的工作非常简单，即使是最热衷于优化的程序员也不太可能认为缓存两个整数相加的开销是值得的。第二，playground 将 `Sum` 类以及创建其实例的两条语句放在了同一个文件中。在真实项目中，初始化代码埋藏在深层的类继承层级中，而使用该类的语句则位于应用程序完全不同的部分。\n\
    \n### 创建模板依赖关系\n\n若想根据模板创建新对象，组件必须掌握三条信息：\n\n- 与该对象关联的模板\n- 必须调用的初始化器\n- 初始化器参数的名称和类型\n\
    \n这些信息会在整个应用中散布开来，只要某处需要创建对象的新实例，就会用到它们。这带来的问题是，它会形成对模板的依赖：一旦模板发生变化，所有使用该模板创建对象的组件都必须更新，以反映这种变化。你可以在代码清单\
    \ 5-2 中看到这一点，我在其中重新定义了 `Sum` 类，为其新增了一个初始化器参数。\n\n**代码清单 5-2.** 在 `Initialization.playground`\
    \ 文件中添加一个初始化器\n\n```\nclass Sum {\n    let resultsCache: [[Int]];\n    var firstValue:Int;\n\
    \    var secondValue:Int;\n    init(first:Int, second:Int, cacheSize:Int) {\n\
    \        resultsCache = [[Int]](count: cacheSize, repeatedValue:\n           \
    \ Int);\n        for i in 0 ..< cacheSize {\n            for j in 0 ..< cacheSize\
    \ {\n                resultsCache[i][j] = i + j;\n            }\n        }\n \
    \       self.firstValue = first;\n        self.secondValue = second;\n    }\n\
    \    var Result:Int {\n        get {\n            return firstValue < resultsCache.count\n\
    \                && secondValue < resultsCache[firstValue].count\n           \
    \     ? resultsCache[firstValue][secondValue]\n                : firstValue +\
    \ secondValue;\n        }\n    }\n}\nvar calc1 = Sum(first:0, second: 9, cacheSize:100).Result;\n\
    var calc2 = Sum(first:3, second: 8, cacheSize:20).Result;\nprintln(\"Calc1: \\\
    (calc1) Calc2: \\(calc2)\");\n```\n\n这个初始化器参数用于控制生成的缓存结果数量。如清单所示，我必须更新创建 `Sum`\
    \ 对象的语句，以使用修改后的初始化器。当创建 `Sum` 对象的仅有两条语句彼此紧挨着时，修改微不足道；但在真实项目中，这些构造语句可能分散在各处，每处语句都需对\
    \ `Sum` 类的实现有足够了解，才能为 `cacheSize` 初始化器参数提供一个合理的值。\n\n> **提示**  \n> 本章的目标是介绍原型模式，但解决这类问题还有其他方式。例如，我可以定义一个便利初始化器，它调用指定的初始化器，并为\
    \ `cacheSize` 参数提供一个默认值。正如我在第 1 章中解释的，模式并不总是问题的唯一解决方案。\n\n## 理解原型模式\n\n原型模式使用**现有对象**（而非类或结构体）来创建新对象。这通常被称为**克隆**，因为新对象是现有对象的完全副本，包括对象自创建以来对其存储属性所做的任何修改。图\
    \ 5-1 展示了原型模式的工作原理。\n\n![A978-1-4842-0394-1_5_Fig1_HTML.jpg](img/A978-1-4842-0394-1_5_Fig1_HTML.jpg)\n\
    \n**图 5-1.** 原型模式\n\n原型模式包含三个操作。首先，需要对象的组件调用原始对象（称为**原型**）复制自身。第二个操作是复制过程，在此过程中创建一个新对象（称为**克隆体**）。在最后一个操作中，原型将克隆体交给调用组件，完成复制过程。\n"
- fmt: "# Implementing the Prototype Pattern\n\nSwift automatically applies the prototype\
    \ pattern when you assign a value type to a new variable. Values types are defined\
    \ using `structs`, and all of the built-in Swift types are implemented as `structs`\
    \ behind the scenes, meaning that you can clone strings, Booleans, collections,\
    \ enumerations, tuples, and numeric types just by assigning them to a new variable.\
    \ Swift will copy the value of the prototype and use it to create a clone. Listing\
    \ 5-3 shows the contents of the `ValueTypes.playground` file, which I created\
    \ to demonstrate how value types are cloned.\n\n## Listing 5-3. The Contents of\
    \ the `ValueTypes.playground` File\n\n```\nstruct Appointment {\n    var name:String;\n\
    \    var day:String;\n    var place:String;\n    func printDetails(label:String)\
    \ {\n        println(\"\\(label) with \\(name) on \\(day) at \\(place)\");\n \
    \   }\n}\n\nvar beerMeeting = Appointment(name: \"Bob\", day: \"Mon\", place:\
    \ \"Joe's Bar\");\nvar workMeeting = beerMeeting;\nworkMeeting.name = \"Alice\"\
    ;\nworkMeeting.day = \"Fri\";\nworkMeeting.place = \"Conference Rm 2\";\nbeerMeeting.printDetails(\"\
    Social\");\nworkMeeting.printDetails(\"Work\");\n```\n\nI have defined a `struct`\
    \ called `Appointment` that has stored `name`, `day`, and `place` properties and\
    \ a `printDetails` method that writes these values to the console. I start by\
    \ using the struct as a template for creating a new object like this:\n\n```\n\
    var beerMeeting = Appointment(name: \"Bob\", day: \"Mon\", place: \"Joe's Bar\"\
    );\n```\n\nThe prototype pattern relies on there being—obviously enough—a prototype\
    \ object, which is commonly created from a template. This may seem counterintuitive,\
    \ but you have to be able to get the prototype somehow. Once I have the prototype,\
    \ I create a copy by assigning it to a new variable, like this:\n\n```\nvar workMeeting\
    \ = beerMeeting;\n```\n\nAt this point, I have two separate `Appointment` objects\
    \ that are assigned to the `beerMeeting` and `workMeeting` variables. The `name`,\
    \ `day`, and `place` properties for both objects have the same values, as shown\
    \ in Figure 5-2.\n\n![A978-1-4842-0394-1_5_Fig2_HTML.jpg](A978-1-4842-0394-1_5_Fig2_HTML.jpg)\n\
    \n**Figure 5-2.** The effect of cloning a struct prototype\n\nOnce I have created\
    \ the clone, I assign new values to the `name`, `day`, and `place` properties,\
    \ configuring the clone to represent a different appointment from the one represented\
    \ by the prototype, as shown in Figure 5-3.\n\n![A978-1-4842-0394-1_5_Fig3_HTML.jpg](A978-1-4842-0394-1_5_Fig3_HTML.jpg)\n\
    \n**Figure 5-3.** Configuring the clone\n\nI finish by calling the `printDetails`\
    \ method on both of the `Appointment` objects, which produces the following results:\n\
    \n```\nSocial with Bob on Mon at Joe's Bar\nWork with Alice on Fri at Conference\
    \ Rm 2\n```\n\nOnce I have created the prototype, I can create and configure as\
    \ many clones as I need without incurring the overhead associated with using the\
    \ struct template.\n\n## Cloning Reference Types\n\nObjects created using classes\
    \ are reference types, and Swift doesn’t copy these objects when you assign them\
    \ to a new variable. Instead, a new reference to the object is created so that\
    \ both variables refer to the same object. Listing 5-4 shows the content of the\
    \ `ReferenceTypes.playground` file, in which I have reworked the `Appointment`\
    \ example from the previous chapter to use a class as the template instead of\
    \ a struct.\n\n## Listing 5-4. The Contents of the `ReferenceTypes.playground`\
    \ File\n\n```\nclass Appointment {\n    var name:String;\n    var day:String;\n\
    \    var place:String;\n    init(name:String, day:String, place:String) {\n  \
    \      self.name = name; self.day = day; self.place = place;\n    }\n    func\
    \ printDetails(label:String) {\n        println(\"\\(label) with \\(name) on \\\
    (day) at \\(place)\");\n    }\n}\n\nvar beerMeeting = Appointment(name: \"Bob\"\
    , day: \"Mon\", place: \"Joe's Bar\");\nvar workMeeting = beerMeeting;\nworkMeeting.name\
    \ = \"Alice\";\nworkMeeting.day = \"Fri\";\nworkMeeting.place = \"Conference Rm\
    \ 2\";\nbeerMeeting.printDetails(\"Social\");\nworkMeeting.printDetails(\"Work\"\
    );\n```\n\nIn addition to using the `class` keyword, I have added an initializer\
    \ to the `Appointment` class. Swift creates a default initializer for structs\
    \ but not for classes. Aside from using a class to define the `Appointment` type,\
    \ this example contains the same code as Listing 5-3. The results shown in the\
    \ console, however, are different.\n\n```\nSocial with Alice on Fri at Conference\
    \ Rm 2\nWork with Alice on Fri at Conference Rm 2\n```\n\nThe problem here is\
    \ that there is one `Appointment` object, and it is referred to by both the `workMeeting`\
    \ and `beerMeeting` variables, as shown in Figure 5-4.\n\n![A978-1-4842-0394-1_5_Fig4_HTML.jpg](A978-1-4842-0394-1_5_Fig4_HTML.jpg)\n\
    \n**Figure 5-4.** Assigning a reference object to a new variable\n\nSince there\
    \ is only one `Appointment` object, the changes that I make to the stored properties\
    \ via the `workMeeting` variable are read back when I access the properties via\
    \ the `beerMeeting` variable, which is why I get the unexpected—and unhelpful—output\
    \ in the console.\n\n### Implementing the `NSCopying` Protocol\n\nAssigning new\
    \ references to existing objects is an important part of object-oriented programming,\
    \ but it doesn’t help with the prototype pattern. To support cloning, the `Foundation`\
    \ framework defines the `NSCopying` protocol, which lets you specify how an object\
    \ should be cloned. Listing 5-5 shows how I updated the `Appointment` class to\
    \ implement the `NSCopying` protocol.\n\n## Listing 5-5. Implementing the `NSCopying`\
    \ Protocol in the `ReferenceTypes.playground` File\n\n```\nimport Foundation\n\
    \nclass Appointment : NSObject, NSCopying {\n    var name:String;\n    var day:String;\n\
    \    var place:String;\n    init(name:String, day:String, place:String) {\n  \
    \      self.name = name; self.day = day; self.place = place;\n    }\n    func\
    \ printDetails(label:String) {\n        println(\"\\(label) with \\(name) on \\\
    (day) at \\(place)\");\n    }\n    func copyWithZone(zone: NSZone) -> AnyObject\
    \ {\n        return Appointment(name:self.name, day:self.day, place:self.place);\n\
    \    }\n}\n\nvar beerMeeting = Appointment(name: \"Bob\", day: \"Mon\", place:\
    \ \"Joe's Bar\");\nvar workMeeting = beerMeeting.copy() as Appointment;\nworkMeeting.name\
    \ = \"Alice\";\nworkMeeting.day = \"Fri\";\nworkMeeting.place = \"Conference Rm\
    \ 2\";\nbeerMeeting.printDetails(\"Social\");\nworkMeeting.printDetails(\"Work\"\
    );\n```\n\n**Tip:** You can implement the `NSCopying` protocol only on classes\
    \ and not structs. Structs are always subject to shallow copying.\n\nThe `NSCopying`\
    \ protocol defines the `copyWithZone` method, which is called when the object\
    \ is copied. The mechanism that is used to copy the object is left to the class\
    \ to implement, and in this case, I create a new instance of the `Appointment`\
    \ class using the stored property values from the current object.\n\n**Tip:**\
    \ You can ignore the `NSZone` argument when implementing the `copyWithZone` method.\n\
    \nTo take advantage of the `NSCopying` protocol, I have to change the `Appointment`\
    \ class so that it is derived from `NSObject`, which defines the `copy` method.\
    \ To copy an `Appointment`, I call the `copy` method—and not `copyWithZone`—on\
    \ the prototype, like this:\n\n```\nvar workMeeting = beerMeeting.copy() as Appointment;\n\
    ```\n\nThe `copyWithZone` method returns `AnyObject`, which means that I have\
    \ to downcast the object created by the `copy` method with the `as` keyword so\
    \ that the `workMeeting` variable is correctly typed.\n\n**Caution:** Implementing\
    \ the `NSCopying` protocol doesn’t change a reference type into a value type.\
    \ You must call the `copy` method to clone the prototype. If you simply assign\
    \ the prototype to a new variable, you will end up with a new reference to the\
    \ prototype and not a new object."
  raw: '## Implementing the Prototype Pattern


    Swift automatically applies the prototype pattern when you assign a value type
    to a new variable. Values types are defined using structs, and all of the built-in
    Swift types are implemented as structs behind the scenes, meaning that you can
    clone strings, Booleans, collections, enumerations, tuples, and numeric types
    just by assigning them to a new variable. Swift will copy the value of the prototype
    and use it to create a clone. Listing 5-3 shows the contents of the `ValueTypes.playground`
    file, which I created to demonstrate how value types are cloned.


    Listing 5-3. The Contents of the ValueTypes.playground File


    `struct Appointment {`


    `var name:String;`


    `var day:String;`


    `var place:String;`


    `func printDetails(label:String) {`


    `println("\(label) with \(name) on \(day) at \(place)");`


    `}`


    `}`


    `var beerMeeting = Appointment(name: "Bob", day: "Mon", place: "Joe''s Bar");`


    `var workMeeting = beerMeeting;`


    `workMeeting.name = "Alice";`


    `workMeeting.day = "Fri";`


    `workMeeting.place = "Conference Rm 2";`


    `beerMeeting.printDetails("Social");`


    `workMeeting.printDetails("Work");`


    I have defined a struct called `Appointment` that has stored `name`, `day`, and
    `place` properties and a `printDetails` method that writes these values to the
    console. I start by using the struct as a template for creating a new object like
    this:


    `...`


    `var beerMeeting =` `Appointment(name: "Bob", day: "Mon", place: "Joe''s Bar")`
    `;`


    `...`


    The prototype pattern relies on there being—obviously enough—a prototype object,
    which is commonly created from a template. This may seem counterintuitive, but
    you have to be able to get the prototype somehow. Once I have the prototype, I
    create a copy by assigning it to a new variable, like this:


    `...`


    `var` `workMeeting = beerMeeting` `;`


    `...`


    At this point, I have two separate `Appointment` objects that are assigned to
    the `beerMeeting` and `workMeeting` variables. The `name`, `day`, and `place`
    properties for both objects have the same values, as shown in Figure [5-2](#A978-1-4842-0394-1_5_Chapter.html#Fig2).


    ![A978-1-4842-0394-1_5_Fig2_HTML.jpg](A978-1-4842-0394-1_5_Fig2_HTML.jpg)


    Figure 5-2.


    The effect of cloning a struct prototype


    Once I have created the clone, I assign new values to the `name`, `day`, and `place`
    properties, configuring the clone to represent a different appointment from the
    one represented by the prototype, as shown in Figure [5-3](#A978-1-4842-0394-1_5_Chapter.html#Fig3).


    ![A978-1-4842-0394-1_5_Fig3_HTML.jpg](A978-1-4842-0394-1_5_Fig3_HTML.jpg)


    Figure 5-3.


    Configuring the clone


    I finish by calling the `printDetails` method on both of the `Appointment` objects,
    which produces the following results:


    `Social with Bob on Mon at Joe''s Bar`


    `Work with Alice on Fri at Conference Rm 2`


    Once I have created the prototype, I can create and configure as many clones as
    I need without incurring the overhead associated with using the struct template.


    ### Cloning Reference Types


    Objects created using classes are reference types, and Swift doesn’t copy these
    objects when you assign them to a new variable. Instead, a new reference to the
    object is created so that both variables refer to the same object. Listing 5-4
    shows the content of the `ReferenceTypes.playground` file, in which I have reworked
    the `Appointment` example from the previous chapter to use a class as the template
    instead of a struct.


    Listing 5-4. The Contents of the ReferenceTypes.playground File


    `class Appointment {`


    `var name:String;`


    `var day:String;`


    `var place:String;`


    `init(name:String, day:String, place:String) {`


    `self.name = name; self.day = day; self.place = place;`


    `}`


    `func printDetails(label:String) {`


    `println("\(label) with \(name) on \(day) at \(place)");`


    `}`


    `}`


    `var beerMeeting = Appointment(name: "Bob", day: "Mon", place: "Joe''s Bar");`


    `var workMeeting = beerMeeting;`


    `workMeeting.name = "Alice";`


    `workMeeting.day = "Fri";`


    `workMeeting.place = "Conference Rm 2";`


    `beerMeeting.printDetails("Social");`


    `workMeeting.printDetails("Work");`


    In addition to using the `class` keyword, I have added an initializer to the `Appointment`
    class. Swift creates a default initializer for structs but not for classes. Aside
    from using a class to define the `Appointment` type, this example contains the
    same code as Listing 5-3\. The results shown in the consoler, however, are different.


    `Social with Alice on Fri at Conference Rm 2`


    `Work with Alice on Fri at Conference Rm 2`


    The problem here is that there is one `Appointment` object, and it is referred
    to by both the `workMeeting` and `beerMeeting` variables, as shown in Figure [5-4](#A978-1-4842-0394-1_5_Chapter.html#Fig4).


    ![A978-1-4842-0394-1_5_Fig4_HTML.jpg](A978-1-4842-0394-1_5_Fig4_HTML.jpg)


    Figure 5-4.


    Assigning a reference object to a new variable


    Since there is only one `Appointment` object, the changes that I make to the stored
    properties via the `workMeeting` variable are read back when I access the properties
    via the `beerMeeting` variable, which is why I get the unexpected—and unhelpful—output
    in the console.


    #### Implementing the NSCopying Protocol


    Assigning new references to existing objects is an important part of object-oriented
    programming, but it doesn’t help with the prototype pattern. To support cloning,
    the `Foundation` framework defines the `NSCopying` protocol, which lets you specify
    how an object should be cloned. Listing 5-5 shows how I updated the `Appointment`
    class to implement the `NSCopying` protocol.


    Listing 5-5. Implementing the NSCopying Protocol in the ReferenceTypes.playground
    File


    `import Foundation`


    `class Appointment : NSObject, NSCopying {`


    `var name:String;`


    `var day:String;`


    `var place:String;`


    `init(name:String, day:String, place:String) {`


    `self.name = name; self.day = day; self.place = place;`


    `}`


    `func printDetails(label:String) {`


    `println("\(label) with \(name) on \(day) at \(place)");`


    `}`


    `func copyWithZone(zone: NSZone) -> AnyObject {`


    `return Appointment(name:self.name, day:self.day, place:self.place);`


    `}`


    `}`


    `var beerMeeting = Appointment(name: "Bob", day: "Mon", place: "Joe''s Bar");`


    `var workMeeting = beerMeeting.copy() as Appointment;`


    `workMeeting.name = "Alice";`


    `workMeeting.day = "Fri";`


    `workMeeting.place = "Conference Rm 2";`


    `beerMeeting.printDetails("Social");`


    `workMeeting.printDetails("Work");`


    Tip


    You can implement the `NSCopying` protocol only on classes and not structs. Structs
    are always subject to shallow copying.


    The `NSCopying` protocol defines the `copyWithZone` method, which is called when
    the object is copied. The mechanism that is used to copy the object is left to
    the class to implement, and in this case, I create a new instance of the `Appointment`
    class using the stored property values from the current object.


    Tip


    You can ignore the `NSZone` argument when implementing the `copyWithZone` method.


    To take advantage of the `NSCopying` protocol, I have to change the `Appointment`
    class so that it is derived from `NSObject`, which defines the `copy` method.
    To copy an `Appointment`, I call the `copy` method—and not `copyWithZone`—on the
    prototype, like this:


    `...`


    `var workMeeting = beerMeeting.copy() as Appointment;`


    `...`


    The `copyWithZone` method returns `AnyObject`, which means that I have to downcast
    the object created by the `copy` method with the `as` keyword so that the `workMeeting`
    variable is correctly typed.


    Caution


    Implementing the `NSCopying` protocol doesn’t change a reference type into a value
    type. You must call the `copy` method to clone the prototype. If you simply assign
    the prototype to a new variable, you will end up with a new reference to the prototype
    and not a new object.'
  trans: "\n# 实现原型模式\n\n当你将值类型赋值给新变量时，Swift 会自动应用原型模式。值类型通过`structs`（结构体）定义，所有 Swift\
    \ 内置类型在底层都是以`structs`形式实现的。这意味着只需将字符串、布尔值、集合、枚举、元组和数值类型赋值给新变量，就能完成克隆。Swift 会复制该原型（prototype）的值，并以此创建一个克隆。清单\
    \ 5-3 展示了`ValueTypes.playground`文件的内容，我创建此文件是为了演示值类型如何被克隆。\n\n## 清单 5-3. `ValueTypes.playground`文件的内容\n\
    \n```\nstruct Appointment {\n    var name:String;\n    var day:String;\n    var\
    \ place:String;\n    func printDetails(label:String) {\n        println(\"\\(label)\
    \ with \\(name) on \\(day) at \\(place)\");\n    }\n}\n\nvar beerMeeting = Appointment(name:\
    \ \"Bob\", day: \"Mon\", place: \"Joe's Bar\");\nvar workMeeting = beerMeeting;\n\
    workMeeting.name = \"Alice\";\nworkMeeting.day = \"Fri\";\nworkMeeting.place =\
    \ \"Conference Rm 2\";\nbeerMeeting.printDetails(\"Social\");\nworkMeeting.printDetails(\"\
    Work\");\n```\n\n我定义了一个名为`Appointment`的结构体，它拥有存储属性`name`、`day`、`place`，以及一个将属性值输出到控制台的`printDetails`方法。首先，我将该结构体作为模板来创建一个新对象，如下所示：\n\
    \n```\nvar beerMeeting = Appointment(name: \"Bob\", day: \"Mon\", place: \"Joe's\
    \ Bar\");\n```\n\n原型模式显然需要一个原型对象，该对象通常从模板创建而来。这看似有悖直觉，但你总得先获得原型。一旦有了原型，我通过将其赋值给一个新变量来创建副本，如下所示：\n\
    \n```\nvar workMeeting = beerMeeting;\n```\n\n此时，我有两个独立的`Appointment`对象，分别赋值给了`beerMeeting`和`workMeeting`变量。两个对象的`name`、`day`和`place`属性拥有相同的值，如图\
    \ 5-2 所示。\n\n![A978-1-4842-0394-1_5_Fig2_HTML.jpg](img/A978-1-4842-0394-1_5_Fig2_HTML.jpg)\n\
    \n**图 5-2.** 克隆结构体原型的效果\n\n创建克隆后，我为其`name`、`day`和`place`属性赋予新值，将其配置为代表与原型不同的另一项预约，如图\
    \ 5-3 所示。\n\n![A978-1-4842-0394-1_5_Fig3_HTML.jpg](img/A978-1-4842-0394-1_5_Fig3_HTML.jpg)\n\
    \n**图 5-3.** 配置克隆对象\n\n最后，我在两个`Appointment`对象上分别调用`printDetails`方法，得到如下输出：\n\n\
    ```\nSocial with Bob on Mon at Joe's Bar\nWork with Alice on Fri at Conference\
    \ Rm 2\n```\n\n一旦创建了原型，我就可以根据需求创建和配置任意数量的克隆，而无需承担使用结构体模板带来的额外开销。\n\n## 克隆引用类型\n\
    \n使用类创建的对象是引用类型。当你将引用类型赋值给新变量时，Swift 不会复制这些对象，而是会创建该对象的一个新引用，使得两个变量指向同一个对象。清单\
    \ 5-4 展示了`ReferenceTypes.playground`文件的内容。在该文件中，我重写了上一章的`Appointment`示例，使用类而非结构体作为模板。\n\
    \n## 清单 5-4. `ReferenceTypes.playground`文件的内容\n\n```\nclass Appointment {\n  \
    \  var name:String;\n    var day:String;\n    var place:String;\n    init(name:String,\
    \ day:String, place:String) {\n        self.name = name; self.day = day; self.place\
    \ = place;\n    }\n    func printDetails(label:String) {\n        println(\"\\\
    (label) with \\(name) on \\(day) at \\(place)\");\n    }\n}\n\nvar beerMeeting\
    \ = Appointment(name: \"Bob\", day: \"Mon\", place: \"Joe's Bar\");\nvar workMeeting\
    \ = beerMeeting;\nworkMeeting.name = \"Alice\";\nworkMeeting.day = \"Fri\";\n\
    workMeeting.place = \"Conference Rm 2\";\nbeerMeeting.printDetails(\"Social\"\
    );\nworkMeeting.printDetails(\"Work\");\n```\n\n除了使用`class`关键字外，我还为`Appointment`类添加了一个初始化器。Swift\
    \ 会为结构体创建默认初始化器，但不会为类创建。除了使用类来定义`Appointment`类型外，此示例的代码与清单 5-3 完全相同。然而，控制台显示的结果却不同。\n\
    \n```\nSocial with Alice on Fri at Conference Rm 2\nWork with Alice on Fri at\
    \ Conference Rm 2\n```\n\n问题在于只有一个`Appointment`对象，而`workMeeting`和`beerMeeting`变量都指向它，如图\
    \ 5-4 所示。\n\n![A978-1-4842-0394-1_5_Fig4_HTML.jpg](img/A978-1-4842-0394-1_5_Fig4_HTML.jpg)\n\
    \n**图 5-4.** 将引用对象赋值给新变量\n\n由于只有一个`Appointment`对象，我通过`workMeeting`变量对存储属性所做的更改，在通过`beerMeeting`变量访问这些属性时也会被读取到，这就是为什么控制台输出了意料之外且无用的结果。\n\
    \n### 实现`NSCopying`协议\n\n为现有对象分配新引用是面向对象编程的重要组成部分，但这对于原型模式并无帮助。为了支持克隆，`Foundation`框架定义了`NSCopying`协议，它允许你指定对象应如何被克隆。清单\
    \ 5-5 展示了我如何更新`Appointment`类以实现`NSCopying`协议。\n\n## 清单 5-5. 在`ReferenceTypes.playground`文件中实现`NSCopying`协议\n\
    \n```\nimport Foundation\n\nclass Appointment : NSObject, NSCopying {\n    var\
    \ name:String;\n    var day:String;\n    var place:String;\n    init(name:String,\
    \ day:String, place:String) {\n        self.name = name; self.day = day; self.place\
    \ = place;\n    }\n    func printDetails(label:String) {\n        println(\"\\\
    (label) with \\(name) on \\(day) at \\(place)\");\n    }\n    func copyWithZone(zone:\
    \ NSZone) -> AnyObject {\n        return Appointment(name:self.name, day:self.day,\
    \ place:self.place);\n    }\n}\n\nvar beerMeeting = Appointment(name: \"Bob\"\
    , day: \"Mon\", place: \"Joe's Bar\");\nvar workMeeting = beerMeeting.copy() as\
    \ Appointment;\nworkMeeting.name = \"Alice\";\nworkMeeting.day = \"Fri\";\nworkMeeting.place\
    \ = \"Conference Rm 2\";\nbeerMeeting.printDetails(\"Social\");\nworkMeeting.printDetails(\"\
    Work\");\n```\n\n**提示：** 你只能在类上实现`NSCopying`协议，而不能在结构体上实现。结构体始终只进行浅拷贝。\n\n`NSCopying`协议定义了`copyWithZone`方法，该方法在对象被复制时调用。复制对象所使用的机制留给类来实现。在此例中，我使用当前对象的存储属性值创建了一个`Appointment`类的新实例。\n\
    \n**提示：** 在实现`copyWithZone`方法时，可以忽略`NSZone`参数。\n\n为了利用`NSCopying`协议，我必须修改`Appointment`类，使其继承自定义了`copy`方法的`NSObject`。要复制一个`Appointment`对象，我需要在原型上调用`copy`方法（而不是`copyWithZone`），如下所示：\n\
    \n```\nvar workMeeting = beerMeeting.copy() as Appointment;\n```\n\n`copyWithZone`方法返回`AnyObject`，这意味着我必须使用`as`关键字将`copy`方法创建的对象向下转型，以便`workMeeting`变量具有正确的类型。\n\
    \n**注意：** 实现`NSCopying`协议并不会将引用类型转变为值类型。你必须调用`copy`方法来克隆原型。如果只是简单地将原型赋值给一个新变量，你得到的将是指向原型的另一个引用，而不是一个新对象。"
- fmt: "### Understanding Shallow and Deep Copying\n\nAn important aspect of the prototype\
    \ pattern is whether objects are cloned using deep copying or shallow copying,\
    \ which relates to how stored properties that refer to other reference types are\
    \ handled. In Listing 5-6, I have defined a new class in the `ReferenceTypes`\
    \ playground and added a new property to the `Appoinment` class that refers to\
    \ an instance of it.\n\n**Listing 5-6.** Adding a Reference Type Property in the\
    \ `ReferenceTypes.playground` File\n\n```\nimport Foundation\n\nclass Location\
    \ {\n    var name:String;\n    var address:String;\n\n    init(name:String, address:String)\
    \ {\n        self.name = name; self.address = address;\n    }\n}\n\nclass Appointment\
    \ : NSObject, NSCopying {\n    var name:String;\n    var day:String;\n    var\
    \ place:Location;\n\n    init(name:String, day:String, place:Location) {\n   \
    \     self.name = name; self.day = day; self.place = place;\n    }\n\n    func\
    \ printDetails(label:String) {\n        println(\"\\(label) with \\(name) on \\\
    (day) at \\(place.name), \"\n            + \"\\(place.address)\");\n    }\n\n\
    \    func copyWithZone(zone: NSZone) -> AnyObject {\n        return Appointment(name:self.name,\
    \ day:self.day,\n            place:self.place);\n    }\n}\n\nvar beerMeeting =\
    \ Appointment(name: \"Bob\", day: \"Mon\",\n    place: Location(name:\"Joe's Bar\"\
    , address: \"123 Main St\"));\nvar workMeeting = beerMeeting.copy() as Appointment;\n\
    workMeeting.name = \"Alice\";\nworkMeeting.day = \"Fri\";\nworkMeeting.place.name\
    \ = \"Conference Rm 2\";\nworkMeeting.place.address = \"Company HQ\";\nbeerMeeting.printDetails(\"\
    Social\");\nworkMeeting.printDetails(\"Work\");\n```\n\nI have created a simple\
    \ `Location` class and used it for the `place` property of the `Appointment` object.\
    \ Here is the output shown in the console:\n\n```\nSocial with Bob on Mon at Conference\
    \ Rm 2, Company HQ\nWork with Alice on Fri at Conference Rm 2, Company HQ\n```\n\
    \nOnce again, the changes that I have applied through the `workMeeting` variable\
    \ have affected the stored values available through the `workMeeting` variable.\
    \ This is because I changed the type for the `place` property from a value type\
    \ (`String`) to a reference type (`Location`) and my implementation of the `NSCopying`\
    \ protocol creates a new reference to the prototype’s `Location` object, as illustrated\
    \ in Figure [5-5](#A978-1-4842-0394-1_5_Chapter.html#Fig5).\n\n![A978-1-4842-0394-1_5_Fig5_HTML.jpg](A978-1-4842-0394-1_5_Fig5_HTML.jpg)\n\
    \n**Figure 5-5.** The effect of copying references when cloning a prototype\n\n\
    This is known as a shallow copy, in which references to objects are copied, not\
    \ the objects themselves. As Figure [5-5](#A978-1-4842-0394-1_5_Chapter.html#Fig5)\
    \ shows, there are two `Appointment` objects, but their `place` properties refer\
    \ to the same `Location` object. This is why the changes that I applied via the\
    \ `workMeeting.place` property affect the values I got through the `beerMeeting.place`\
    \ property.\n\n> **Tip:** Related to the `NSCopying` protocol is the `@NSCopying`\
    \ property attribute, which can be applied to stored properties. The `@NSCopying`\
    \ attribute automatically invokes the `copyWithZone` method of objects that are\
    \ assigned to the annotated property, and I demonstrate its use in the “Examples\
    \ of the Prototype Pattern in Cocoa” section later in this chapter.\n\n#### Implementing\
    \ Deep Copying\n\nDeep copying creates copies of all the objects referred to by\
    \ the prototype, which in this case will ensure that each `Appointment` object\
    \ refers to a different `Location` object via its `place` property. Listing 5-7\
    \ shows how I implemented deep copying in the `ReferenceTypes` playground.\n\n\
    **Listing 5-7.** Implementing Deep Copying in the `ReferenceTypes.playground`\
    \ File\n\n```\nimport Foundation\n\nclass Location : NSObject, NSCopying {\n \
    \   var name:String;\n    var address:String;\n\n    init(name:String, address:String)\
    \ {\n        self.name = name; self.address = address;\n    }\n\n    func copyWithZone(zone:\
    \ NSZone) -> AnyObject {\n        return Location(name: self.name, address:self.address);\n\
    \    }\n}\n\nclass Appointment : NSObject, NSCopying {\n    var name:String;\n\
    \    var day:String;\n    var place:Location;\n\n    init(name:String, day:String,\
    \ place:Location) {\n        self.name = name; self.day = day; self.place = place;\n\
    \    }\n\n    func printDetails(label:String) {\n        println(\"\\(label) with\
    \ \\(name) on \\(day) at \\(place.name), \"\n            + \"\\(place.address)\"\
    );\n    }\n\n    func copyWithZone(zone: NSZone) -> AnyObject {\n        return\
    \ Appointment(name:self.name, day:self.day,\n            place:self.place.copy()\
    \ as Location);\n    }\n}\n\nvar beerMeeting = Appointment(name: \"Bob\", day:\
    \ \"Mon\",\n    place: Location(name:\"Joe's Bar\", address: \"123 Main St\"));\n\
    var workMeeting = beerMeeting.copy() as Appointment;\nworkMeeting.name = \"Alice\"\
    ;\nworkMeeting.day = \"Fri\";\nworkMeeting.place.name = \"Conference Rm 2\";\n\
    workMeeting.place.address = \"Company HQ\";\nbeerMeeting.printDetails(\"Social\"\
    );\nworkMeeting.printDetails(\"Work\");\n```\n\nTo create a deep copy, I have\
    \ to implement the `NSCopying` protocol on the `Location` class, change the base\
    \ class to `NSObject`, and define the `copyWithZone` method. All the reference\
    \ types that you want to deep-copy must implement the `NSCopying` protocol, so\
    \ you must repeat this process throughout the classes referred to by your prototype,\
    \ including those that are referred to via other references.\n\n#### Choosing\
    \ Shallow or Deep Copying\n\nThere are no hard-and-fast rules for choosing between\
    \ shallow and deep copying, and the decision has to be made on a class-by-class\
    \ basis. You should consider three factors: the amount of work required to copy\
    \ an object, the amount of memory required to store the copy, and the way that\
    \ the copied object will be used.\n\nIt is the last factor—how the copied object\
    \ will be used—that is the most important. In the case of the `Location` class\
    \ in Listing 5-7, sharing objects between `Appointment` objects doesn’t make any\
    \ sense because a change made to the location of one appointment is unlikely to\
    \ apply to the other appointments that refer to the same `Location` object, especially\
    \ when social and work appointments are mixed together.\n\nIt is possible that\
    \ there is a group of related appointments that would benefit from a shared location.\
    \ Imagine, as an example, a daylong series of meetings that are all held in the\
    \ same conference room—your application might benefit from optimizing the creation\
    \ of `Location` objects for related meetings. In such cases, you should balance\
    \ the amount of computation and memory required to create and store a new object\
    \ against the complexity of managing references to a shared object. In the `Appointment`/`Location`\
    \ example, the `Location` objects are so easily created and require such little\
    \ storage (just two `String` values) that the overhead and complexity of having\
    \ to work out when `Location` objects can be shared and when they can’t just isn’t\
    \ justified.\n\nThe best advice I can give is to think through the purpose of\
    \ objects and figure out which ones are intended to be common across all of the\
    \ copies you create from the prototype. If you are unsure, then start with shallow\
    \ copying because it is the simplest to perform—it won’t always be the right technique,\
    \ but it allows you to test the effect of changes without having to implement\
    \ the `NSCopying` protocol throughout your application."
  raw: '### Understanding Shallow and Deep Copying


    An important aspect of the prototype pattern is whether objects are cloned using
    deep copying or shallow copying, which relates to how stored properties that refer
    to other reference types are handled. In Listing 5-6, I have defined a new class
    in the `ReferenceTypes` playground and added a new property to the `Appoinment`
    class that refers to an instance of it.


    Listing 5-6. Adding a Reference Type Property in the ReferenceTypes.playground
    File


    `import Foundation`


    `class Location {`


    `var name:String;`


    `var address:String;`


    `init(name:String, address:String) {`


    `self.name = name; self.address = address;`


    `}`


    `}`


    `class Appointment : NSObject, NSCopying {`


    `var name:String;`


    `var day:String;`


    `var place:Location;`


    `init(name:String, day:String, place:Location) {`


    `self.name = name; self.day = day; self.place = place;`


    `}`


    `func printDetails(label:String) {`


    `println("\(label) with \(name) on \(day) at \(place.name), "`


    `+ "\(place.address)");`


    `}`


    `func copyWithZone(zone: NSZone) -> AnyObject {`


    `return Appointment(name:self.name, day:self.day,`


    `place:self.place);`


    `}`


    `}`


    `var beerMeeting = Appointment(name: "Bob", day: "Mon",`


    `place: Location(name:"Joe''s Bar", address: "123 Main St"));`


    `var workMeeting = beerMeeting.copy() as Appointment;`


    `workMeeting.name = "Alice";`


    `workMeeting.day = "Fri";`


    `workMeeting.place.name = "Conference Rm 2";`


    `workMeeting.place.address = "Company HQ";`


    `beerMeeting.printDetails("Social");`


    `workMeeting.printDetails("Work");`


    I have created a simple `Location` class and used it for the `place` property
    of the `Appointment` object. Here is the output shown in the console:


    `Social with Bob on Mon at Conference Rm 2, Company HQ`


    `Work with Alice on Fri at Conference Rm 2, Company HQ`


    Once again, the changes that I have applied through the `workMeeting` variable
    have affected the stored values available through the `workMeeting` variable.
    This is because I changed the type for the `place` property from a value type
    (`String`) to a reference type (`Location`) and my implementation of the `NSCopying`
    protocol creates a new reference to the prototype’s `Location` object, as illustrated
    in Figure [5-5](#A978-1-4842-0394-1_5_Chapter.html#Fig5).


    ![A978-1-4842-0394-1_5_Fig5_HTML.jpg](A978-1-4842-0394-1_5_Fig5_HTML.jpg)


    Figure 5-5.


    The effect of copying references when cloning a prototype


    This is known as a shallow copy, in which references to objects are copied, not
    the objects themselves. As Figure [5-5](#A978-1-4842-0394-1_5_Chapter.html#Fig5)
    shows, there are two `Appointment` objects, but their `place` properties refer
    to the same `Location` object. This is why the changes that I applied via the
    `workMeeting.place` property affect the values I got through the `beerMeeting.place`
    property.


    Tip


    Related to the `NSCopying` protocol is the `@NSCopying` property attribute, which
    can be applied to stored properties. The `@NSCopying` attribute automatically
    invokes the `copyWithZone` method of objects that are assigned to the annotated
    property, and I demonstrate its use in the “Examples of the Prototype Pattern
    in Cocoa” section later in this chapter.


    #### Implementing Deep Copying


    Deep copying creates copies of all the objects referred to by the prototype, which
    in this case will ensure that each `Appointment` object refers to a different
    `Location` object via its `place` property. Listing 5-7 shows how I implemented
    deep copying in the `ReferenceTypes` playground.


    Listing 5-7. Implementing Deep Copying in the ReferenceTypes.playground File


    `import Foundation`


    `class Location : NSObject, NSCopying {`


    `var name:String;`


    `var address:String;`


    `init(name:String, address:String) {`


    `self.name = name; self.address = address;`


    `}`


    `func copyWithZone(zone: NSZone) -> AnyObject {`


    `return Location(name: self.name, address:self.address);`


    `}`


    `}`


    `class Appointment : NSObject, NSCopying {`


    `var name:String;`


    `var day:String;`


    `var place:Location;`


    `init(name:String, day:String, place:Location) {`


    `self.name = name; self.day = day; self.place = place;`


    `}`


    `func printDetails(label:String) {`


    `println("\(label) with \(name) on \(day) at \(place.name), "`


    `+ "\(place.address)");`


    `}`


    `func copyWithZone(zone: NSZone) -> AnyObject {`


    `return Appointment(name:self.name, day:self.day,`


    `place:self.place.copy() as Location);`


    `}`


    `}`


    `var beerMeeting = Appointment(name: "Bob", day: "Mon",`


    `place: Location(name:"Joe''s Bar", address: "123 Main St"));`


    `var workMeeting = beerMeeting.copy() as Appointment;`


    `workMeeting.name = "Alice";`


    `workMeeting.day = "Fri";`


    `workMeeting.place.name = "Conference Rm 2";`


    `workMeeting.place.address = "Company HQ";`


    `beerMeeting.printDetails("Social");`


    `workMeeting.printDetails("Work");`


    To create a deep copy, I have to implement the `NSCopying` protocol on the `Location`
    class, change the base class to `NSObject`, and define the `copyWithZone` method.
    All the reference types that you want to deep-copy must implement the `NSCopying`
    protocol, so you must repeat this process throughout the classes referred to by
    your prototype, including those that are referred to via other references.


    CHOOSING SHALLOW OR DEEP COPYING


    There are no hard-and-fast rules for choosing between shallow and deep copying,
    and the decision has to be made on a class-by-class basis. You should consider
    three factors: the amount of work required to copy an object, the amount of memory
    required to store the copy, and the way that the copied object will be used.


    It is the last factor—how the copied object will be used—that is the most important.
    In the case of the `Location` class in Listing 5-7, sharing objects between `Appointment`
    objects doesn’t make any sense because a change made to the location of one appointment
    is unlikely to apply to the other appointments that refer to the same `Location`
    object, especially when social and work appointments are mixed together.


    It is possible that there is a group of related appointments that would benefit
    from a shared location. Imagine, as an example, a daylong series of meetings that
    are all held in the same conference room—your application might benefit from optimizing
    the creation of `Location` objects for related meetings. In such cases, you should
    balance the amount of computation and memory required to create and store a new
    object against the complexity of managing references to a shared object. In the
    `Appointment`/`Location` example, the `Location` objects are so easily created
    and require such little storage (just two `String` values) that the overhead and
    complexity of having to work out when `Location` objects can be shared and when
    they can’t just isn’t justified.


    The best advice I can give is to think through the purpose of objects and figure
    out which ones are intended to be common across all of the copies you create from
    the prototype. If you are unsure, then start with shallow copying because it is
    the simplest to perform—it won’t always be the right technique, but it allows
    you to test the effect of changes without having to implement the `NSCopying`
    protocol throughout your application.'
  trans: "\n### 理解浅拷贝与深拷贝\n\n原型模式的一个重要方面是对象是通过深拷贝还是浅拷贝来克隆的，这涉及到如何处理指向其他引用类型的存储属性。在代码清单\
    \ 5-6 中，我在 `ReferenceTypes`  playground 中定义了一个新类，并为 `Appointment` 类添加了一个新属性，该属性指向该类的一个实例。\n\
    \n**代码清单 5-6.** 在 `ReferenceTypes.playground` 文件中添加引用类型属性\n\n```\nimport Foundation\n\
    \nclass Location {\n    var name:String;\n    var address:String;\n\n    init(name:String,\
    \ address:String) {\n        self.name = name; self.address = address;\n    }\n\
    }\n\nclass Appointment : NSObject, NSCopying {\n    var name:String;\n    var\
    \ day:String;\n    var place:Location;\n\n    init(name:String, day:String, place:Location)\
    \ {\n        self.name = name; self.day = day; self.place = place;\n    }\n\n\
    \    func printDetails(label:String) {\n        println(\"\\(label) with \\(name)\
    \ on \\(day) at \\(place.name), \"\n            + \"\\(place.address)\");\n  \
    \  }\n\n    func copyWithZone(zone: NSZone) -> AnyObject {\n        return Appointment(name:self.name,\
    \ day:self.day,\n            place:self.place);\n    }\n}\n\nvar beerMeeting =\
    \ Appointment(name: \"Bob\", day: \"Mon\",\n    place: Location(name:\"Joe's Bar\"\
    , address: \"123 Main St\"));\nvar workMeeting = beerMeeting.copy() as Appointment;\n\
    workMeeting.name = \"Alice\";\nworkMeeting.day = \"Fri\";\nworkMeeting.place.name\
    \ = \"Conference Rm 2\";\nworkMeeting.place.address = \"Company HQ\";\nbeerMeeting.printDetails(\"\
    Social\");\nworkMeeting.printDetails(\"Work\");\n```\n\n我创建了一个简单的 `Location` 类，并将其用于\
    \ `Appointment` 对象的 `place` 属性。以下是控制台显示的输出：\n\n```\nSocial with Bob on Mon at\
    \ Conference Rm 2, Company HQ\nWork with Alice on Fri at Conference Rm 2, Company\
    \ HQ\n```\n\n同样，我通过 `workMeeting` 变量所做的更改，也影响了通过 `beerMeeting` 变量可以访问的存储值。这是因为我将\
    \ `place` 属性的类型从值类型（`String`）更改为引用类型（`Location`），并且我的 `NSCopying` 协议实现为原型的 `Location`\
    \ 对象创建了一个新的引用，如图 5-5 所示。\n\n![A978-1-4842-0394-1_5_Fig5_HTML.jpg](img/A978-1-4842-0394-1_5_Fig5_HTML.jpg)\n\
    \n**图 5-5.** 克隆原型时拷贝引用所产生的影响\n\n这被称为浅拷贝，即拷贝的是对象的引用，而非对象本身。如图 5-5 所示，存在两个 `Appointment`\
    \ 对象，但它们的 `place` 属性指向的是同一个 `Location` 对象。这就是为什么我通过 `workMeeting.place` 属性所做的更改会影响到通过\
    \ `beerMeeting.place` 属性获取的值。\n\n> **提示：** 与 `NSCopying` 协议相关的是 `@NSCopying` 属性特性，它可以应用于存储属性。`@NSCopying`\
    \ 特性会自动调用分配给该注解属性的对象的 `copyWithZone` 方法，我将在本章后面的“Cocoa 中原型模式的示例”一节中演示其用法。\n\n\
    #### 实现深拷贝\n\n深拷贝会创建原型所有引用对象的副本，在本例中，这将确保每个 `Appointment` 对象通过其 `place` 属性指向不同的\
    \ `Location` 对象。代码清单 5-7 展示了如何在 `ReferenceTypes` playground 中实现深拷贝。\n\n**代码清单\
    \ 5-7.** 在 `ReferenceTypes.playground` 文件中实现深拷贝\n\n```\nimport Foundation\n\n\
    class Location : NSObject, NSCopying {\n    var name:String;\n    var address:String;\n\
    \n    init(name:String, address:String) {\n        self.name = name; self.address\
    \ = address;\n    }\n\n    func copyWithZone(zone: NSZone) -> AnyObject {\n  \
    \      return Location(name: self.name, address:self.address);\n    }\n}\n\nclass\
    \ Appointment : NSObject, NSCopying {\n    var name:String;\n    var day:String;\n\
    \    var place:Location;\n\n    init(name:String, day:String, place:Location)\
    \ {\n        self.name = name; self.day = day; self.place = place;\n    }\n\n\
    \    func printDetails(label:String) {\n        println(\"\\(label) with \\(name)\
    \ on \\(day) at \\(place.name), \"\n            + \"\\(place.address)\");\n  \
    \  }\n\n    func copyWithZone(zone: NSZone) -> AnyObject {\n        return Appointment(name:self.name,\
    \ day:self.day,\n            place:self.place.copy() as Location);\n    }\n}\n\
    \nvar beerMeeting = Appointment(name: \"Bob\", day: \"Mon\",\n    place: Location(name:\"\
    Joe's Bar\", address: \"123 Main St\"));\nvar workMeeting = beerMeeting.copy()\
    \ as Appointment;\nworkMeeting.name = \"Alice\";\nworkMeeting.day = \"Fri\";\n\
    workMeeting.place.name = \"Conference Rm 2\";\nworkMeeting.place.address = \"\
    Company HQ\";\nbeerMeeting.printDetails(\"Social\");\nworkMeeting.printDetails(\"\
    Work\");\n```\n\n为了创建深拷贝，我必须在 `Location` 类上实现 `NSCopying` 协议，将基类改为 `NSObject`，并定义\
    \ `copyWithZone` 方法。你想要深拷贝的所有引用类型都必须实现 `NSCopying` 协议，因此你必须在原型所引用的所有类中重复此过程，包括那些通过其他引用间接引用的类。\n\
    \n#### 选择浅拷贝还是深拷贝\n\n在浅拷贝和深拷贝之间进行选择并没有硬性规定，必须根据具体的类逐个做出决定。你应该考虑三个因素：拷贝一个对象所需的工作量、存储副本所需的内存量，以及拷贝对象的使用方式。\n\
    \n最后一个因素——拷贝对象将如何使用——是最重要的。以代码清单 5-7 中的 `Location` 类为例，在 `Appointment` 对象之间共享对象是毫无意义的，因为对一个预约地点所做的更改不太可能适用于引用同一个\
    \ `Location` 对象的其他预约，尤其是在社交预约和工作预约混在一起的情况下。\n\n可能存在一组相关的预约，它们共享一个地点会带来好处。例如，设想一整天的系列会议都在同一个会议室举行——你的应用程序可能会从优化相关会议的\
    \ `Location` 对象创建中受益。在这种情况下，你应该权衡创建和存储新对象所需的计算量和内存，与管理共享对象引用的复杂性之间的利弊。在 `Appointment`/`Location`\
    \ 示例中，`Location` 对象非常容易创建，并且需要的存储空间极小（仅两个 `String` 值），因此，为了确定何时可以共享 `Location`\
    \ 对象以及何时不能而付出的开销和复杂性是完全不合理的。\n\n我能给出的最佳建议是，仔细思考对象的用途，并弄清楚哪些对象是打算在你从原型创建的所有副本中通用的。如果你不确定，那么先从浅拷贝开始，因为它是最简单的实现方式——它并不总是正确的技术，但它能让你在不需在整个应用程序中实现\
    \ `NSCopying` 协议的情况下测试更改带来的影响。\n"
- fmt: "如前所述，实现`NSCopying`协议并不会将引用类型转换为值类型，因此我必须调用`copy`方法来创建`Appointment`原型的`Location`对象的克隆，这正是我在`Appointment`类定义的`copyWithZone`方法中所做的。\n\
    \n```\nfunc copyWithZone(zone: NSZone) -> AnyObject {\n    return Appointment(name:self.name,\
    \ day:self.day,\n        place:self.place.copy() as Location);\n}\n```\n\n这些改动意味着`Appointment`原型及其`Location`对象都被克隆了，如图[5-6](#A978-1-4842-0394-1_5_Chapter.html#Fig6)所示。\n\
    \n![A978-1-4842-0394-1_5_Fig6_HTML.jpg](A978-1-4842-0394-1_5_Fig6_HTML.jpg)\n\n\
    图5-6. 深拷贝的效果\n\n你可以通过查看示例代码的控制台输出来观察深拷贝的效果，如下所示：\n\n```\nSocial with Bob on Mon\
    \ at Joe's Bar, 123 Main St\nWork with Alice on Fri at Conference Rm 2, Company\
    \ HQ\n```\n\n由于`Appointment`对象拥有各自的`Location`对象，因此通过`workMeeting`变量应用的更改不会影响到通过`beerMeeting`变量访问的对象。\n\
    \n### 拷贝数组\n\nSwift 数组被实现为结构体，这使其成为值类型。当你将数组赋值给一个新变量时，数组本身以及其中包含的任何值类型都会被拷贝。数组中包含的引用类型会被浅拷贝，因此原型数组和克隆数组都将包含对相同对象的引用。清单5-8展示了`ArrayCopy.playground`文件的内容，我创建该文件用于演示。\n\
    \n**清单5-8.** `ArrayCopy.playground`文件的内容\n\n```\nimport Foundation\n\nclass Person\
    \ : NSObject, NSCopying {\n    var name:String;\n    var country:String;\n   \
    \ init(name:String, country:String) {\n        self.name = name; self.country\
    \ = country;\n    }\n    func copyWithZone(zone: NSZone) -> AnyObject {\n    \
    \    return Person(name: self.name, country: self.country);\n    }\n}\n\nvar people\
    \ = [Person(name:\"Joe\", country:\"France\"),\n    Person(name:\"Bob\", country:\"\
    USA\")];\nvar otherpeople = people;\npeople[0].country = \"UK\";\nprintln(\"Country:\
    \ \\(otherpeople[0].country)\");\n```\n\n> **提示：** 作为一种性能优化，Swift 数组只有在被修改时才会被拷贝，这被称为惰性拷贝。在日常使用中你无需担心这一点，因为它在后台无缝进行，但这意味着如果你只是读取数组内容，克隆数组的行为就像引用类型；一旦你进行修改，它就会表现得像值类型。\n\
