    `}`


    `//` `...code omitted for brevity...`


    `}`


    ## Summary


    In this chapter, I described the singleton pattern and explained how it can be
    used to ensure that there is only one object of a specific type in the application.
    The singleton pattern is easy to understand but requires careful attention to
    implement correctly, especially when it comes to ensuring that the code is safe
    for concurrent use. In the next chapter, I describe the object pool pattern, which
    shares some common ideas with the singleton pattern but operates on several objects
    of the same type.'
  trans: "\n### 保护回调函数\n\n第二个问题需要更深入的思考。我通过使用屏障来允许多个读取者，这意味着通过初始化器设置的回调函数可能会被并发调用。这就出现了一个常见的并发难题。\n\
    \n我有几个选择。第一个选择是不做任何处理——也就是当前代码的状态——并假设提供回调的代码已经意识到了并发风险，并采取了必要的预防措施。从`Logger`类的角度来看，这是最简单的选择，因为它将负担转移到了别处。这并非完全不可取，因为`Logger`类无法了解回调的实现方式，最终可能会在`Logger`类和定义回调的组件中都加入并发保护。冗余的并发保护可能导致应用程序所写不当时发生死锁。另一个问题是，我可能最终完全没有保护，从而面临数据损坏的风险。这是最简单的选择，但也是最不确定的。\n\
    \n第二个选择是由`Logger`类承担起责任。这是一种安全的选择，但同样可能产生冗余保护；不过，这确实意味着数据损坏可以避免。\n\n第三个选择——也是我将在本例中遵循的做法——是让组件在选择何时提供回调。你可以从代码清单\
    \ 6-16 中看到我是如何修改`Logger`类以支持此功能的。\n\n**代码清单 6-16.** 在 Logger.swift 文件中添加可选的并发保护\n\
    \n```swift\nimport Foundation\n\nclass Logger<T where T:NSObject, T:NSCopying>\
    \ {\n\n    var dataItems:[T] = [];\n    var callback:(T) -> Void;\n    var arrayQ\
    \ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_CONCURRENT);\n    var callbackQ\
    \ = dispatch_queue_create(\"callbackQ\", DISPATCH_QUEUE_SERIAL);\n\n    init(callback:T\
    \ -> Void, protect:Bool = true) {\n        self.callback = callback;\n       \
