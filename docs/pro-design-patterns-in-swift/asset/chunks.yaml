    \ I need to update the `NetworkConnection` class, as shown in Listing 18-17.\n\
    \n**Listing 18-17.** Adding a New Command in the `NetworkConnection.swift` File\n\
    \n```\nimport Foundation\n\nclass NetworkConnection {\n\n    private let flyweight:NetConnFlyweight;\n\
    \n    init() {\n        self.flyweight = NetConnFlyweightFactory.createFlyweight();\n\
    \    }\n\n    func getStockLevel(name:String) -> Int? {\n        NSThread.sleepForTimeInterval(Double(rand()\
    \ % 2));\n        return self.flyweight.getStockLevel(name);\n    }\n\n    func\
    \ setStockLevel(name:String, level:Int) {\n        println(\"Stock update: \\\
    (name) = \\(level)\");\n    }\n\n}\n```\n\nI don’t have a real server to update,\
    \ so the implementation of the `setStockLevel` method prints out a message to\
    \ the debug console. With the update to the `NetworkConnection` class, I can complete\
    \ the implementation of the proxy class, as shown in Listing 18-18.\n\n**Listing\
    \ 18-18.** Completing the Proxy Class in the `Proxy.swift` File\n\n```\n...\n\n\
    class StockServerProxy : StockServer {\n\n    func getStockLevel(product: String,\
    \ callback: (String, Int) -> Void) {\n        let stockConn = NetworkPool.getConnection();\n\
    \        let level = stockConn.getStockLevel(product);\n        if (level != nil)\
    \ {\n            callback(product, level!);\n        }\n        NetworkPool.returnConnecton(stockConn);\n\
    \    }\n\n    func setStockLevel(product: String, stockLevel: Int) {\n       \
    \ let stockConn = NetworkPool.getConnection();\n        stockConn.setStockLevel(product,\
    \ level: stockLevel);\n        NetworkPool.returnConnecton(stockConn);\n    }\n\
    \n}\n\n...\n```\n\nThe final step is to call the proxy `setStockLevel` method\
    \ from the `ViewController` class when the user makes a change, as shown in Listing\
    \ 18-19.\n\n**Listing 18-19.** Using the Proxy in the `ViewController.swift` File\n\
    \n```\n...\n\n@IBAction func stockLevelDidChange(sender: AnyObject) {\n    if\
    \ var currentCell = sender as? UIView {\n        while (true) {\n            currentCell\
    \ = currentCell.superview!;\n            if let cell = currentCell as? ProductTableCell\
    \ {\n                if let product = cell.product? {\n                    if\
    \ let stepper = sender as? UIStepper {\n                        product.stockLevel\
    \ = Int(stepper.value);\n                    } else if let textfield = sender\
    \ as? UITextField {\n                        if let newValue = textfield.text.toInt()?\
    \ {\n                            product.stockLevel = newValue;\n            \
    \            }\n                    }\n                    cell.stockStepper.value\
    \ = Double(product.stockLevel);\n                    cell.stockField.text = String(product.stockLevel);\n\
    \                    productLogger.logItem(product);\n                    StockServerFactory.getStockServer()\n\
    \                        .setStockLevel(product.name, stockLevel: product.stockLevel);\n\
    \                }\n                break;\n            }\n        }\n    }\n\
    \    displayStockTotal();\n}\n\n...\n```\n\nI have added a statement to the `stockLevelDidChange`\
    \ method that uses the proxy to update the stock level. The effect of defining\
    \ the proxy is that the implementation of the (simulated) network connection is\
    \ known only to the proxy class and can be changed without needing to change the\
    \ `ProductDataStore` or `ViewController` class. To test the changes, start the\
    \ application and change one of the stock levels. You will see output similar\
    \ to the following in the Xcode debug console:\n\n`Stock update: Thinking Cap\
    \ = 9`\n\n## Summary\n\nIn this chapter, I described how the proxy pattern is\
    \ used to create stand-ins for objects and resources. I explained the three different\
    \ ways in which proxies can be applied and showed you an example implementation\
    \ of each of them. In the next part of the book, I show you the behavioral patterns,\
    \ which increase the flexibility in the ways that objects work with one another.\n\
    \n# Part IV\nThe Behavioral Patterns\n\n# 19. The Chain of Responsibility Pattern\n\
    \nThe chain of responsibility pattern is useful when there are multiple objects\
    \ that could take responsibility for a request but you don’t want to expose details\
    \ of those objects to the calling component. Table [19-1](#A978-1-4842-0394-1_19_Chapter.html#Tab1)\
    \ puts the chain of responsibility pattern into context.\n\n**Table 19-1.** Putting\
    \ the Chain of Responsibility Pattern into Context\n\n| Question | Answer |\n\
    | --- | --- |\n| What is it? | The chain of responsibility pattern organizes sequentially\
    \ a set of objects that may be able to take responsibility for a request from\
    \ a calling component. The sequence of objects is referred to as a chain, and\
    \ each object in the chain is asked to take responsibility for the request. The\
    \ request moves along the chain until one of the objects takes responsibility\
    \ or the end of the chain is reached. |\n| What are the benefits? | The chain\
    \ of responsibility allows objects that can process requests to be ordered into\
    \ a preferential sequence that can be reordered, extended, or reduced without\
    \ any impact on the calling component, which has no insight into the objects that\
    \ comprise the chain. |\n| When should you use this pattern? | Use this pattern\
    \ when there are several objects that can handle a request, only one of which\
    \ should be used. |\n| When should you avoid this pattern? | Do not use this pattern\
    \ when there is only one object that can handle a request or when the calling\
    \ component needs to select the object. |\n| How do you know when you have implemented\
    \ the pattern correctly? | The pattern is implemented correctly when the set of\
    \ objects that can take responsibility for a request are arranged sequentially\
    \ and each is offered the chance to take responsibility in turn. The individual\
    \ objects in the chain have no knowledge of one another (other than the next link\
    \ in the chain). |\n| Are there any common pitfalls? | The pitfall is leaking\
    \ details of the objects in the chain, either to one another or to the calling\
    \ component. |\n| Are there any related patterns? | The chain of responsibility\
    \ pattern shares some common concepts with the command pattern, described in [Chapter\
    \ 20](#A978-1-4842-0394-1_20_Chapter.html). |"
