  trans: "\n### 创建 Product 类\n\n正如我在“理解 Swift 访问控制”边栏中解释的那样，`private` 关键字并不会限制对同一类文件中定义代码的访问。由于我想强调该模式所提供的公开/私有分离，我将创建一个新文件并用它来定义\
    \ `Product` 类。按照我在上一节中描述的过程，在 SportsStore 项目中添加一个名为 `Product.swift` 的文件，并用它来定义清单\
    \ 4-13 所示的类。\n\n**清单 4-13.** `Product.swift` 文件的内容\n\n```\nclass Product {\n\n\
    \    private(set) var name:String;\n    private(set) var description:String;\n\
    \    private(set) var category:String;\n    private var stockLevelBackingValue:Int\
    \ = 0;\n    private var priceBackingValue:Double = 0;\n\n    init(name:String,\
    \ description:String, category:String, price:Double,\n        stockLevel:Int)\
    \ {\n        self.name = name;\n        self.description = description;\n    \
    \    self.category = category;\n        self.price = price;\n        self.stockLevel\
    \ = stockLevel;\n    }\n\n    var stockLevel:Int {\n        get { return stockLevelBackingValue;}\n\
    \        set { stockLevelBackingValue = max(0, newValue);}\n    }\n\n    private(set)\
    \ var price:Double {\n        get { return priceBackingValue;}\n        set {\
    \ priceBackingValue = max(1, newValue);}\n    }\n\n    var stockValue:Double {\n\
    \        get {\n            return price * Double(stockLevel);\n        }\n  \
    \  }\n}\n```\n\n清单 4-13 中所示的 `Product` 类强调将公开表示与私有实现分离，我通过几种方式实现了这一点。第一种方式是用 `private`\
    \ 或 `private(set)` 注释属性。`private` 关键字将当前文件外部的代码隐藏其所应用的内容，这导致 `priceBackingValue`\
    \ 和 `stockLevelBackingValue` 属性对 SportsStore 应用程序的其余部分完全不可见，因为 `Product.swift`\
    \ 文件中只有 `Product` 类。\n\n用 `private(set)` 注释属性意味着该属性可以被同一模块中其他文件的代码读取，但只能由 `Product.swift`\
    \ 文件中的代码设置。我在清单 4-13 中对大部分属性使用了 `private(set)`，这使得属性的值可以通过传递给类初始化器的参数进行设置，但无法以其他方式设置。\n\
    \n> **提示**\n> \n> 我本可以使用常量达到类似的效果，但在本章中我想强调对象模板模式，而 `private(set)` 是一个更有用的例子。\n\
    \n我使用的另一种技术是只定义了一个 `get` 子句的计算属性。计算属性的实现是私有的，尽管该属性本身在整个当前模块中都是可用的。\n\n### 理解 Swift\
    \ 访问控制\n\nSwift 采用了一种不寻常的访问控制方法，这可能会让粗心的人措手不及。访问控制有三个级别，通过 `public`、`private`\
    \ 和 `internal` 关键字来应用。`private` 关键字限制性最强；它将类、结构体、方法和属性的访问限制在同一文件中定义的代码。基于单个文件限制访问是一种与大多数语言不同的方法，这意味着\
    \ `private` 在 Xcode playground 中没有效果。\n\n`internal` 关键字表示允许在当前模块内进行访问。这是默认的访问控制级别，如果未应用任何关键字，则使用该级别。对于大多数\
    \ iOS 开发者来说，`internal` 保护将允许一个类、结构体、方法、函数或属性在整个项目中使用。\n\n`public` 关键字应用限制性最弱的控制级别，允许从任何地方进行访问，包括当前模块外部。这对于创建框架并且需要使用\
