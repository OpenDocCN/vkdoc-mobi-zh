    the method shown in Listing 3-8 to the `ViewController` class.


    Listing 3-8. Adding an Action Method to the ViewController.swift File


    `...`


    `@IBAction func stockLevelDidChange(sender: AnyObject) {`


    `}`


    `...`


    The `IBAction` attribute indicates that this is a method that will be invoked
    in response to a change in a layout component—in this case, whenever the text
    field is edited.


    I want the same method to be invoked when the value of the stepper changes, so
    click the `Stepper` item in the component hierarchy, move to the Connections Inspector,
    and drag from the `Value Changed` connection well.


    Position the pointer over the method `stockLevelDidChange` so that the method
