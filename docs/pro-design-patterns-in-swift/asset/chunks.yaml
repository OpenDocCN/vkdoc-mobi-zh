- fmt: "### Understanding the Exposure Distortion Pitfall\n\nA common pitfall is to\
    \ enforce the existence of a single prototype objects from which all clones are\
    \ created. This can lead to a distorted code structure, where the prototype is\
    \ exposed to every component in the app, just in case copies are required. Don’t\
    \ be afraid to have multiple prototypes in each logical section of your app, and\
    \ don’t forget that you can make copies from clones.\n\n**Tip:** Some proponents\
    \ of the prototype pattern believe that you shouldn’t use the prototype object\
    \ exception to create clones. I don’t agree with this restriction and believe\
    \ that there is no harm in cloning any object that supports the prototype pattern,\
    \ including objects that are being used to perform work and objects that are clones.\n\
    \n### Understanding the Nonstandard Protocol Pitfall\n\nThe standard iOS way to\
    \ implement the prototype pattern is by implementing the `NSCopying` protocol\
    \ and to ensure that the prototype’s base class is `NSObject`. This `NSCopying`\
    \ protocol isn’t especially Swift-friendly, so you may be tempted to create a\
    \ more elegant solution by defining your own protocol or by defining copy constructors\
    \ (which are initializers that accept an instance of the class and clone it).\n\
    \nEither approach will work, but one of the benefits of `NSCopying` is that it\
    \ is well understood and used in the iOS frameworks. Departing from the standard\
    \ protocol will limit the scope of the prototype pattern to your custom classes\
    \ and makes it difficult to work with third-party code that expects the `NSCopying`\
    \ protocol to be adopted. My advice is to stick with `NSObject` and `NSCopying`.\
    \ They may be slightly awkward, but they work, and they are widely used.\n\n##\
    \ Examples of the Prototype Pattern in Cocoa\n\nThe prototype pattern is used\
    \ throughout Cocoa, especially in the `Foundation` framework, where you will find\
    \ many classes that implement `NSCopying`. I describe one useful instance in the\
    \ next section and explain how you can make using the `NSCopying` protocol more\
    \ Swift-like by using a property attribute.\n\n### Using Cocoa Arrays\n\nOf particular\
    \ interest are the `NSArray` class and its subclass `NSMutableArray`. You will\
    \ often receive data from Objective-C modules using these classes, and they follow\
    \ a different path than the built-in Swift arrays. Listing 5-17 shows the contents\
    \ of the `NSArray.playground` file, which I created to provide a demonstration.\n\
    \n**Listing 5-17.** The Contents of the NSArray.playground File\n\n```\nimport\
    \ Foundation\n\nclass Person : NSObject, NSCopying {\n    var name:String\n  \
    \  var country: String\n\n    init(name:String, country:String) {\n        self.name\
    \ = name; self.country = country;\n    }\n\n    func copyWithZone(zone: NSZone)\
    \ -> AnyObject {\n        return Person(name: self.name, country: self.country);\n\
    \    }\n}\n\nvar data = NSMutableArray(objects: 10, \"iOS\", Person(name:\"Joe\"\
    , country:\"USA\"));\nvar copiedData = data;\ndata[0] = 20;\ndata[1] = \"MacOS\"\
    ;\n(data[2] as Person).name = \"Alice\"\n\nprintln(\"Identity: \\(data === copiedData)\"\
    );\nprintln(\"0: \\(copiedData[0]) 1: \\(copiedData[1]) 2: \\(copiedData[2].name)\"\
    );\n```\n\n**Tip:** The `NSArray` class creates an immutable array, which cannot\
    \ be modified. The `NSMutableArray`, which is a subclass of `NSArray`, does allow\
    \ modifications. I have used the `NSMutableArray` class because I want to demonstrate\
    \ how arrays and their contents are copied.\n\nI have created an `NSMutableArray`\
    \ object that contains an `Int`, a `String`, and a `Person` object, which I create\
    \ from the `Person` class I defined in the playground and which implements the\
    \ `NSCopying` protocol. (`NSArray` and `NSMutableArray` are not strongly typed,\
    \ unlike the Swift built-in arrays.)\n\nI assign the array to a new variable called\
    \ `copiedData` and then modify each of the `data` array values. To complete the\
    \ example, I use the Swift identity operator to see whether the `data` and `copiedData`\
    \ variables reference the same object and print out the items in the `copiedData`\
    \ array. Here is the console output produced by the playground:\n\n```\nIdentity:\
    \ true\n0: 20 1: MacOS 2: Alice\n```\n\nSwift arrays are implemented as structs,\
    \ which means that assigning a Swift array to a new variable creates a new array\
    \ and duplicates its value objects. But that is not what has happened here. Instead,\
    \ both the `data` and `copiedData` variables reference the same `NSMutableArray`\
    \ object, and changing values in one of the variables affects the data obtained\
    \ through both of them. `NSArray` and `NSMutableArray` are both reference types,\
    \ which produces a different behavior than when using the built-in Swift arrays.\n\
    \n#### Shallow Copying a Cocoa Array\n\nI can apply the prototype pattern and\
    \ duplicate the array, which performs a shallow copy. In addition to the `copy`\
    \ method that I have been using throughout this chapter, there is another prototype-related\
    \ method to consider when working with `Foundation` classes: `mutableCopy`. Table\
    \ [5-2](#A978-1-4842-0394-1_5_Chapter.html#Tab2) describes these methods.\n\n\
    **Table 5-2.** The Prototype Methods Defined by the NSArray and NSMutableArray\
    \ Classes\n\n| Name | Description |\n| --- | --- |\n| `copy()` | Returns an instance\
    \ of `NSArray`, which cannot be modified |\n| `mutableCopy()` | Returns an instance\
    \ of `NSMutableArray`, which allows modifications |\n\nThese methods represent\
    \ a clash between the way that Swift handles mutable and immutable arrays—which\
    \ is dealt with by using the `let` and `var` keywords—and the approach taken by\
    \ Cocoa and Objective-C. Listing 5-18 shows how I create a clone of the `NSMutableArray`\
    \ object by calling the `mutableCopy` method, producing another `NSMutableArray`\
    \ as the clone.\n\n**Listing 5-18.** Cloning a Cocoa Array in the NSArray.playground\
    \ File\n\n```\n...\nvar data = NSMutableArray(objects: 10, \"iOS\", Person(name:\"\
    Joe\", country:\"USA\"));\nvar copiedData = data.mutableCopy() as NSArray;\n...\n\
    ```\n\nThe effect of the cloning operation is that I have two separate `NSMutableArray`\
    \ objects. The contents of the array are shallow-copied, which means that the\
    \ value types are duplicated but that both arrays reference the same `Person`\
    \ object, which can be seen in the console output.\n\n```\nIdentity: false\n0:\
    \ 10 1: iOS 2: Alice\n```"
  raw: '### Understanding the Exposure Distortion Pitfall


    A common pitfall is to enforce the existence of a single prototype objects from
    which all clones are created. This can lead to a distorted code structure, where
    the prototype is exposed to every component in the app, just in case copies are
    required. Don’t be afraid to have multiple prototypes in each logical section
    of your app, and don’t forget that you can make copies from clones.


    Tip


    Some proponents of the prototype pattern believe that you shouldn’t use the prototype
    object exception to create clones. I don’t agree with this restriction and believe
    that there is no harm in cloning any object that supports the prototype pattern,
    including objects that are being used to perform work and objects that are clones.


    ### Understanding the Nonstandard Protocol Pitfall


    The standard iOS way to implement the prototype pattern is by implementing the
    `NSCopying` protocol and to ensure that the prototype’s base class is `NSObject`.
    This `NSCopying` protocol isn’t especially Swift-friendly, so you may be tempted
    to create a more elegant solution by defining your own protocol or by defining
    copy constructors (which are initializers that accept an instance of the class
    and clone it).


    Either approach will work, but one of the benefits of `NSCopying` is that it is
    well understood and used in the iOS frameworks. Departing from the standard protocol
    will limit the scope of the prototype pattern to your custom classes and makes
    it difficult to work with third-party code that expects the `NSCopying` protocol
    to be adopted. My advice is to stick with `NSObject` and `NSCopying`. They may
    be slightly awkward, but they work, and they are widely used.


    ## Examples of the Prototype Pattern in Cocoa


    The prototype pattern is used throughout Cocoa, especially in the `Foundation`
    framework, where you will find many classes that implement `NSCopying`. I describe
    one useful instance in the next section and explain how you can make using the
    `NSCopying` protocol more Swift-like by using a property attribute.


    ### Using Cocoa Arrays


    Of particular interest are the `NSArray` class and its subclass `NSMutableArray`.
    You will often receive data from Objective-C modules using these classes, and
    they follow a different path than the built-in Swift arrays. Listing 5-17 shows
    the contents of the `NSArray.playground` file, which I created to provide a demonstration.


    Listing 5-17. The Contents of the NSArray.playground File


    `import Foundation`


    `class Person : NSObject, NSCopying {`


    `var name:String`


    `var country: String`


    `init(name:String, country:String) {`


    `self.name = name; self.country = country;`


    `}`


    `func copyWithZone(zone: NSZone) -> AnyObject {`


    `return Person(name: self.name, country: self.country);`


    `}`


    `}`


    `var data = NSMutableArray(objects: 10, "iOS", Person(name:"Joe", country:"USA"));`


    `var copiedData = data;`


    `data[0] = 20;`


    `data[1] = "MacOS";`


    `(data[2] as Person).name = "Alice"`


    `println("Identity: \(data === copiedData)");`


    `println("0: \(copiedData[0]) 1: \(copiedData[1]) 2: \(copiedData[2].name)");`


    Tip


    The `NSArray` class creates an immutable array, which cannot be modified. The
    `NSMutableArray`, which is a subclass of `NSArray`, does allow modifications.
    I have used the `NSMutableArray` class because I want to demonstrate how arrays
    and their contents are copied.


    I have created an `NSMutableArray` object that contains an `Int`, a `String`,
    and a `Person` object, which I create from the `Person` class I defined in the
    playground and which implements the `NSCopying` protocol. (`NSArray` and `NSMutableArray`
    are not strongly typed, unlike the Swift built-in arrays.)


    I assign the array to a new variable called `copiedData` and then modify each
    of the `data` array values. To complete the example, I use the Swift identity
    operator to see whether the `data` and `copiedData` variables reference the same
    object and print out the items in the `copiedData` array. Here is the console
    output produced by the playground:


    `Identity: true`


    `0: 20 1: MacOS 2: Alice`


    Swift arrays are implemented as structs, which means that assigning a Swift array
    to a new variable creates a new array and duplicates its value objects. But that
    is not what has happened here. Instead, both the `data` and `copiedData` variables
    reference the same `NSMutableArray` object, and changing values in one of the
    variables affects the data obtained through both of them. `NSArray` and `NSMutableArray`
    are both reference types, which produces a different behavior than when using
    the built-in Swift arrays.


    #### Shallow Copying a Cocoa Array


    I can apply the prototype pattern and duplicate the array, which performs a shallow
    copy. In addition to the `copy` method that I have been using throughout this
    chapter, there is another prototype-related method to consider when working with
    `Foundation` classes: `mutableCopy`. Table [5-2](#A978-1-4842-0394-1_5_Chapter.html#Tab2)
    describes these methods.


    Table 5-2.


    The Prototype Methods Defined by the NSArray and NSMutableArray Classes


    | Name | Description |

    | --- | --- |

    | `copy()` | Returns an instance of `NSArray`, which cannot be modified |

    | `mutableCopy()` | Returns an instance of `NSMutableArray`, which allows modifications
    |


    These methods represent a clash between the way that Swift handles mutable and
    immutable arrays—which is dealt with by using the `let` and `var` keywords—and
    the approach taken by Cocoa and Objective-C. Listing 5-18 shows how I create a
    clone of the `NSMutableArray` object by calling the `mutableCopy` method, producing
    another `NSAMutableArray` as the clone.


    Listing 5-18. Cloning a Cocoa Array in the NSArray.playground File


    `...`


    `var data = NSMutableArray(objects: 10, "iOS", Person(name:"Joe", country:"USA"));`


    `var copiedData =` `data.mutableCopy() as NSArray;`


    `...`


    The effect of the cloning operation is that I have two separate `NSMutableArray`
    objects. The contents of the array are shallow-copied, which means that the value
    types are duplicated but that both arrays reference the same `Person` object,
    which can be seen in the console output.


    `Identity:` `false`


    `0:` `10` `1:` `iOS` `2: Alice`'
  trans: "\n### 理解“暴露原型陷阱”\n\n一个常见的陷阱是强制要求存在一个用于创建所有克隆对象的单一原型对象。这会导致扭曲的代码结构，使得原型为了防范复制需求而暴露给应用中的每一个组件。不要害怕在你的应用的每个逻辑部分中拥有多个原型，也不要忘记你可以从克隆体创建副本。\n\
    \n**提示：** 原型模式的一些拥护者认为，你不应该使用原型对象异常来创建克隆。我不同意这种限制，并且认为克隆任何支持原型模式的对象都没有害处，包括正在用于执行工作的对象和克隆对象本身。\n\
    \n### 理解“非标准协议陷阱”\n\n实现原型模式的 iOS 标准方式是实现 `NSCopying` 协议，并确保原型的基类是 `NSObject`。这个\
    \ `NSCopying` 协议对 Swift 并不特别友好，因此你可能会倾向于通过定义自己的协议或定义复制构造器（即接受类实例并克隆它的初始化器）来创建更优雅的解决方案。\n\
    \n这两种方法都可行，但 `NSCopying` 的好处之一是它在 iOS 框架中被广泛理解和应用。偏离标准协议会将原型模式的应用范围限制在你的自定义类中，并且会使与期望采用\
    \ `NSCopying` 协议的第三方代码协作变得困难。我的建议是坚持使用 `NSObject` 和 `NSCopying`。它们可能有些笨拙，但它们是有效的，并且被广泛使用。\n\
    \n## Cocoa 中原型模式的例子\n\n原型模式在 Cocoa 中随处可见，尤其是在 `Foundation` 框架中，你会发现许多类都实现了 `NSCopying`。我在下一节中描述一个有用的实例，并解释如何通过使用属性特性使\
    \ `NSCopying` 协议更符合 Swift 风格。\n\n### 使用 Cocoa 数组\n\n特别值得注意的是 `NSArray` 类及其子类 `NSMutableArray`。你经常会从\
    \ Objective-C 模块中使用这些类接收数据，它们遵循与内置 Swift 数组不同的路径。清单 5-17 展示了 `NSArray.playground`\
    \ 文件的内容，我创建该文件用于演示。\n\n**清单 5-17.** NSArray.playground 文件的内容\n\n```\nimport Foundation\n\
    \nclass Person : NSObject, NSCopying {\n    var name:String\n    var country:\
    \ String\n\n    init(name:String, country:String) {\n        self.name = name;\
    \ self.country = country;\n    }\n\n    func copyWithZone(zone: NSZone) -> AnyObject\
    \ {\n        return Person(name: self.name, country: self.country);\n    }\n}\n\
    \nvar data = NSMutableArray(objects: 10, \"iOS\", Person(name:\"Joe\", country:\"\
    USA\"));\nvar copiedData = data;\ndata[0] = 20;\ndata[1] = \"MacOS\";\n(data[2]\
    \ as Person).name = \"Alice\"\n\nprintln(\"Identity: \\(data === copiedData)\"\
    );\nprintln(\"0: \\(copiedData[0]) 1: \\(copiedData[1]) 2: \\(copiedData[2].name)\"\
    );\n```\n\n**提示：** `NSArray` 类创建一个不可变数组，该数组无法修改。`NSMutableArray` 是 `NSArray` 的子类，它允许修改。我使用了\
    \ `NSMutableArray` 类，因为我想演示数组及其内容是如何被复制的。\n\n我创建了一个包含一个 `Int`、一个 `String` 和一个\
    \ `Person` 对象的 `NSMutableArray` 对象，其中 `Person` 对象来自我在 playground 中定义的 `Person`\
    \ 类，该类实现了 `NSCopying` 协议。（`NSArray` 和 `NSMutableArray` 不是强类型的，这与 Swift 内置数组不同。）\n\
    \n我将该数组赋值给一个名为 `copiedData` 的新变量，然后修改 `data` 数组中的每个值。为了完成这个示例，我使用 Swift 恒等运算符来检查\
    \ `data` 和 `copiedData` 变量是否引用同一个对象，并打印出 `copiedData` 数组中的项目。以下是 playground 产生的控制台输出：\n\
    \n```\nIdentity: true\n0: 20 1: MacOS 2: Alice\n```\n\nSwift 数组是作为结构体实现的，这意味着将一个\
    \ Swift 数组赋值给一个新变量会创建一个新数组并复制其值对象。但这里的情况并非如此。相反，`data` 和 `copiedData` 变量都引用同一个\
    \ `NSMutableArray` 对象，并且修改其中一个变量中的值会影响通过两者获取的数据。`NSArray` 和 `NSMutableArray` 都是引用类型，这产生了与使用内置\
    \ Swift 数组时不同的行为。\n\n#### 对 Cocoa 数组进行浅拷贝\n\n我可以应用原型模式来复制该数组，这将执行浅拷贝。除了我一直在本章中使用的\
    \ `copy` 方法外，在处理 `Foundation` 类时，还有另一个与原型的相关的方法需要考虑：`mutableCopy`。表 5-2 描述了这些方法。\n\
    \n**表 5-2.** NSArray 和 NSMutableArray 类定义的原型方法\n\n| 名称 | 描述 |\n| --- | --- |\n\
    | `copy()` | 返回一个 `NSArray` 实例，该实例不可修改 |\n| `mutableCopy()` | 返回一个 `NSMutableArray`\
    \ 实例，该实例允许修改 |\n\n这些方法代表了 Swift 处理可变和不可变数组的方式（通过使用 `let` 和 `var` 关键字来处理）与 Cocoa\
    \ 和 Objective-C 所采取的方法之间的冲突。清单 5-18 展示了如何通过调用 `mutableCopy` 方法来创建 `NSMutableArray`\
    \ 对象的克隆，从而生成另一个 `NSMutableArray` 作为克隆体。\n\n**清单 5-18.** 在 NSArray.playground 文件中克隆一个\
    \ Cocoa 数组\n\n```\n...\nvar data = NSMutableArray(objects: 10, \"iOS\", Person(name:\"\
    Joe\", country:\"USA\"));\nvar copiedData = data.mutableCopy() as NSArray;\n...\n\
    ```\n\n克隆操作的效果是，我得到了两个独立的 `NSMutableArray` 对象。数组的内容被浅拷贝，这意味着值类型被复制，但两个数组都引用同一个\
    \ `Person` 对象，这可以从控制台输出中看到。\n\n```\nIdentity: false\n0: 10 1: iOS 2: Alice\n```\n"
- fmt: "# Creating a Deep Copy of a Cocoa Array\n\nThe `NSArray` and `NSMutableArray`\
    \ classes define copy constructors that duplicate the array and, optionally, perform\
    \ a deep copy on the contents of the prototype array. I advised against copy constructors\
    \ when I described the potential pitfalls of the prototype pattern, but they are\
    \ a common Objective-C technique, and you will find them in key Cocoa classes.\
    \ `Listing 5-19` shows how I performed a deep copy on the data array in the `NSArray.playground`\
    \ file.\n\n**Listing 5-19.** Performing a Deep Copy in the `NSArray.playground`\
    \ File\n\n```\nvar data = NSMutableArray(objects: 10, \"iOS\", Person(name:\"\
    Joe\", country:\"USA\"));\nvar copiedData = NSMutableArray(array: data, copyItems:\
    \ true);\n```\n\nThe arguments to the copy constructor are the prototype array\
    \ and a `Bool` value that specifies whether objects that implement the `NSCopyable`\
    \ protocol are cloned. I have specified `true` for the `copyItems` argument, which\
    \ ensures that I end up with a separate `Person` object in each array, as confirmed\
    \ by the console output.\n\n`Identity: false`\n\n`0: 10 1: iOS 2: Joe`\n\n## One-Level\
    \ Deep Copies and the `NSCoding` Protocol\n\nThe `copy` and `mutableCopy` methods\
    \ that I described in Table [5-2](#A978-1-4842-0394-1_5_Chapter.html#Tab2) perform\
    \ a top-level deep copy, which means that the array class takes responsibility\
    \ for cloning only the objects that it contains and not the nested objects. Some\
    \ programmers don't consider this to be a true deep copy because it doesn't create\
    \ clones of any objects that the array may refer to. As an alternative, you will\
    \ sometimes see the `NSCoding` protocol recommended, which does force a complete\
    \ deep copy.\n\nThere are two pitfalls here. The first is that the `NSCoding`\
    \ protocol is responsible for serializing and deserializing objects, and using\
    \ it to apply the prototype pattern is an expensive operation—the prototype has\
    \ to be rendered into a serialized form and then restored and assigned to a new\
    \ variable. This is a big job for large, complex objects with lots of nested references.\n\
    \nThe more serious problem is that using `NSCoding` assumes that the programmer\
    \ performing the deep copy knows more about the structure, purpose, and implementation\
    \ of the objects than the programmer who wrote the original classes. Forcing a\
    \ deep copy is often a bad idea because the private implementations of the objects\
    \ that are being serialized may make assumptions about references being shared,\
    \ and that can cause odd and unexpected defects when separate instances are created.\n\
    \nMy advice is to trust the implementation of the `copyWithZone` method of the\
    \ objects you are cloning to be the authoritative source of knowledge about how\
    \ an object should be cloned and avoid imposing your own views without a compelling\
    \ reason and a substantial amount of testing.\n\n## Using the `NSCopying` Property\
    \ Attribute\n\nSwift supports changing the behavior of properties by decorating\
    \ them with attributes. One such attribute is `@NSCopying`, which can be applied\
    \ to any stored property in order to synthesize a setter that calls the `copy`\
    \ method for objects derived from `NSObject` and that implement the `NSCopying`\
    \ protocol. The value used to call the property setter is treated as the prototype\
    \ and is cloned in order to obtain a value to be stored. `Listing 5-20` shows\
    \ the contents of the `NSCopyingAttribute.playground` file, which I created to\
    \ provide a demonstration.\n\n**Listing 5-20.** The Contents of the `NSCopyingAttribute.playground`\
    \ File\n\n```\nimport Foundation\n\nclass LogItem {\n\n    var from:String?;\n\
    \    @NSCopying var data:NSArray?\n}\n\nvar dataArray = NSMutableArray(array:\
    \ [1, 2, 3, 4]);\nvar logitem = LogItem()\nlogitem.from = \"Alice\";\nlogitem.data\
    \ = dataArray;\ndataArray[1] = 10;\nprintln(\"Value: \\(logitem.data![1])\");\n\
    ```\n\nIn this example, I have defined a class called `LogItem` that has optional\
    \ `from` and `data` variables. I have applied the `@NSCopying` attribute to the\
    \ `data` variable so that the array value is shallow-copied when the property\
    \ is set.\n\nTo demonstrate that the array is copied when the property is set,\
    \ I create an `NSMutableArray` object that I use to set the `data` property of\
    \ the `LogItem` object. I then modify one of the items in the array and print\
    \ out the corresponding value from the array assigned to the `data` property of\
    \ the `LogItem` object. The playground produces the following console output,\
    \ confirming that the prototype pattern has been applied and the array was copied:\n\
    \n`Value: 2`\n\nThere are some limitations to the `@NSCopying` attribute. The\
    \ first is that values set during initialization are not cloned, which is why\
    \ I defined the `data` property of the `LogItem` class as optional so that I don't\
    \ have to set values for them in an initializer.\n\nThe other limitation is that\
    \ the `@NSCopying` attribute will call the `copy` method, even when the object\
    \ supports the `mutableCopy` method. This means that my `NSMutableArray` object\
    \ was converted into an immutable `NSArray` object when I assigned it to the `data`\
    \ property of the `LogItem` method, preventing me from performing further modifications.\n\
    \n# Applying the Pattern to the SportsStore App\n\nIn this section, I will apply\
    \ the prototype pattern to the SportsStore application in order to put the pattern\
    \ into a broader context. I am going to create a variation of one of the classes\
    \ I introduced earlier to log changes to the `Product` objects, which I will do\
    \ by writing a message to the debug console.\n\n## Preparing the Example Application\n\
    \nNo preparation is required for this chapter, and I will pick up the SportsStore\
    \ application as I left it in [Chapter 4](#A978-1-4842-0394-1_4_Chapter.html).\n\
    \n> **Tip**  \n> You can download the SportsStore project from [`Apress.com`](https://Apress.com),\
    \ along with all of the source code for this book."
  raw: '#### Creating a Deep Copy of a Cocoa Array


    The `NSArray` and `NSMutable` array classes define copy constructors that duplicate
    the array and, optionally, perform a deep copy on the contents of the prototype
    array. I advised against copy constructors when I described the potential pitfalls
    of the prototype pattern, but they are a common Objective-C technique, and you
    will find them in key Cocoa classes. Listing 5-19 shows how I performed a deep
    copy on the data array in the `NSArray.playground` file.


    Listing 5-19. Performing a Deep Copy in the NSArray.playground File


    `...`


    `var data = NSMutableArray(objects: 10, "iOS", Person(name:"Joe", country:"USA"));`


    `var copiedData = NSMutableArray(array: data, copyItems: true);`


    `...`


    The arguments to the copy constructor are the prototype array and a `Bool` value
    that specifies whether objects that implement the `NSCopyable` protocol are cloned.
    I have specified `true` for the `copyItems` argument, which ensures that I end
    up with a separate `Person` object in each array, as confirmed by the console
    output.


    `Identity: false`


    `0: 10 1: iOS 2: Joe`


    ONE-LEVEL DEEP COPIES AND THE NSCODING PROTOCOL


    The `copy` and `mutableCopy` methods that I described in Table [5-2](#A978-1-4842-0394-1_5_Chapter.html#Tab2)
    perform a top-level deep copy, which means that the array class takes responsibility
    for cloning only the objects that it contains and not the nested objects. Some
    programmers don’t consider this to be a true deep copy because it doesn’t create
    clones of any objects that the array may refer to. As an alternative, you will
    sometimes see the `NSCoding` protocol recommended, which does force a complete
    deep copy.


    There are two pitfalls here. The first is that the `NSCoding` protocol is responsible
    for serializing and deserializing objects, and using it to apply the prototype
    pattern is an expensive operation—the prototype has to be rendered into a serialized
    form and then restored and assigned to a new variable. This is a big job for large,
    complex objects with lots of nested references.


    The more serious problem is that using `NSCoding` assumes that the programmer
    performing the deep copy knows more about the structure, purpose, and implementation
    of the objects than the programmer who wrote the original classes. Forcing a deep
    copy is often a bad idea because the private implementations of the objects that
    are being serialized may make assumptions about references being shared, and that
    can cause odd and unexpected defects when separate instances are created.


    My advice is to trust the implementation of the `copyWithZone` method of the objects
    you are cloning to be the authoritative source of knowledge about how an object
    should be cloned and avoid imposing your own views without a compelling reason
    and a substantial amount of testing.


    ### Using the NSCopying Property Attribute


    Swift supports changing the behavior of properties by decorating them with attributes.
    One such attribute is `@NSCopying`, which can be applied to any stored property
    in order to synthesize a setter that calls the `copy` method for objects derived
    from `NSObject` and that implement the `NSCopying` protocol. The value used to
    call the property setter is treated as the prototype and is cloned in order to
    obtain a value to be stored. Listing 5-20 shows the contents of the `NSCopyingAttribute.playground`
    file, which I created to provide a demonstration.


    Listing 5-20. The Contents of the NSCopyingAttribute.playground File


    `import Foundation`


    `class LogItem {`


    `var from:String?;`


    `@NSCopying var data:NSArray?`


    `}`


    `var dataArray = NSMutableArray(array: [1, 2, 3, 4]);`


    `var logitem = LogItem()`


    `logitem.from = "Alice";`


    `logitem.data = dataArray;`


    `dataArray[1] = 10;`


    `println("Value: \(logitem.data![1])");`


    In this example, I have defined a class called `LogItem` that has optional `from`
    and `data` variables. I have applied the `@NSCopying` attribute to the `data`
    variable so that the array value is shallow-copied when the property is set.


    To demonstrate that the array is copied when the property is set, I create an
    `NSMutableArray` object that I use to set the `data` property of the `LogItem`
    object. I then modify one of the items in the array and print out the corresponding
    value from the array assigned to the `data` property of the `LogItem` object.
    The playground produces the following console output, confirming that the prototype
    pattern has been applied and the array was copied:


    `Value: 2`


    There are some limitations to the `@NSCopying` attribute. The first is that values
    set during initialization are not cloned, which is why I defined the `data` property
    of the `LogItem` class as optional so that I don’t have to set values for them
    in an initializer.


    The other limitation is that the `@NSCopying` attribute will call the `copy` method,
    even when the object supports the `mutableCopy` method. This means that my `NSMutableArray`
    object was converted into an immutable `NSArray` object when I assigned it to
    the `data` property of the `LogItem` method, preventing me from performing further
    modifications.


    ## Applying the Pattern to the SportsStore App


    In this section, I will apply the prototype pattern to the SportsStore application
    in order to put the pattern into a broader context. I am going to create a variation
    of one of the classes I introduced earlier to log changes to the `Product` objects,
    which I will do by writing a message to the debug console.


    ### Preparing the Example Application


    No preparation is required for this chapter, and I will pick up the SportsStore
    application as I left it in [Chapter 4](#A978-1-4842-0394-1_4_Chapter.html).


    Tip


    You can download the SportsStore project from [`Apress.com`](https://Apress.com)
    , along with all of the source code for this book.'
  trans: "\n# 创建 Cocoa 数组的深拷贝\n\n`NSArray` 和 `NSMutableArray` 类定义了复制构造器，用于复制数组，并可选地对原型数组的内容执行深拷贝。尽管我在描述原型模式潜在陷阱时建议不要使用复制构造器，但它们是\
    \ Objective-C 的常见技术，你会在关键的 Cocoa 类中找到它们。`代码清单 5-19` 展示了如何在 `NSArray.playground`\
    \ 文件中对数据数组执行深拷贝。\n\n**代码清单 5-19.** 在 `NSArray.playground` 文件中执行深拷贝\n\n```\nvar\
    \ data = NSMutableArray(objects: 10, \"iOS\", Person(name:\"Joe\", country:\"\
    USA\"));\nvar copiedData = NSMutableArray(array: data, copyItems: true);\n```\n\
    \n复制构造器的参数包括原型数组和一个 `Bool` 值，该值指定是否克隆实现了 `NSCopyable` 协议的对象。我将 `copyItems` 参数指定为\
    \ `true`，这确保每个数组最终都包含一个独立的 `Person` 对象，控制台输出已证实了这一点。\n\n`Identity: false`\n\n\
    `0: 10 1: iOS 2: Joe`\n\n## 单层深拷贝与 `NSCoding` 协议\n\n我在表 5-2 中描述的 `copy` 和 `mutableCopy`\
    \ 方法执行的是顶层深拷贝，这意味着数组类只负责克隆其包含的对象，而不处理嵌套对象。一些程序员并不认为这是真正的深拷贝，因为它不会克隆数组可能引用的任何对象。作为一种替代方案，你有时会看到推荐使用\
    \ `NSCoding` 协议，该协议确实能强制进行完整的深拷贝。\n\n这里有两个陷阱。首先，`NSCoding` 协议负责对象的序列化和反序列化，用它来实现原型模式是一种开销很大的操作——原型需要被渲染成序列化形式，然后恢复并赋值给一个新变量。对于具有大量嵌套引用的大型复杂对象来说，这是一项繁重的工作。\n\
    \n更严重的问题是，使用 `NSCoding` 假定执行深拷贝的程序员比编写原始类的程序员更了解对象的结构、用途和实现。强制深拷贝通常是一个坏主意，因为被序列化的对象的私有实现可能依赖于共享引用，当创建独立的实例时，这可能会导致奇怪且意想不到的缺陷。\n\
    \n我的建议是，相信你所克隆对象的 `copyWithZone` 方法的实现，将其作为关于对象应如何克隆的权威知识来源，并避免在没有充分理由和大量测试的情况下强加自己的观点。\n\
    \n## 使用 `NSCopying` 属性特性\n\nSwift 支持通过用特性修饰属性来改变其行为。其中一种特性是 `@NSCopying`，它可以应用于任何存储属性，以合成一个设置器，该设置器会为派生自\
    \ `NSObject` 并实现了 `NSCopying` 协议的对象调用 `copy` 方法。用于调用属性设置器的值被视为原型，并被克隆以获得要存储的值。`代码清单\
    \ 5-20` 显示了 `NSCopyingAttribute.playground` 文件的内容，我创建该文件是为了进行演示。\n\n**代码清单 5-20.**\
    \ `NSCopyingAttribute.playground` 文件的内容\n\n```\nimport Foundation\n\nclass LogItem\
    \ {\n\n    var from:String?;\n    @NSCopying var data:NSArray?\n}\n\nvar dataArray\
    \ = NSMutableArray(array: [1, 2, 3, 4]);\nvar logitem = LogItem()\nlogitem.from\
    \ = \"Alice\";\nlogitem.data = dataArray;\ndataArray[1] = 10;\nprintln(\"Value:\
    \ \\(logitem.data![1])\");\n```\n\n在这个示例中，我定义了一个名为 `LogItem` 的类，它包含可选的 `from`\
    \ 和 `data` 变量。我对 `data` 变量应用了 `@NSCopying` 特性，这样当设置属性时，数组值会被浅拷贝。\n\n为了演示设置属性时数组被拷贝，我创建了一个\
    \ `NSMutableArray` 对象，用它来设置 `LogItem` 对象的 `data` 属性。然后我修改了数组中的一个元素，并打印出赋给 `LogItem`\
    \ 对象 `data` 属性的数组中对应的值。Playground 产生以下控制台输出，证实已应用原型模式且数组已被拷贝：\n\n`Value: 2`\n\n\
    `@NSCopying` 特性存在一些限制。首先，在初始化期间设置的值不会被克隆，这就是为什么我将 `LogItem` 类的 `data` 属性定义为可选类型，这样就不必在初始化器中为它们设置值。\n\
    \n另一个限制是，即使对象支持 `mutableCopy` 方法，`@NSCopying` 特性也会调用 `copy` 方法。这意味着当我将 `NSMutableArray`\
    \ 对象赋给 `LogItem` 方法的 `data` 属性时，它被转换成了不可变的 `NSArray` 对象，从而阻止我执行进一步的修改。\n\n# 将模式应用于\
    \ SportsStore 应用\n\n在本节中，我将把原型模式应用于 SportsStore 应用，以便将模式置于更广泛的上下文中。我将对我之前介绍的其中一个类进行变体设计，用于记录对\
    \ `Product` 对象的更改，方法是在调试控制台写入一条消息。\n\n## 准备示例应用\n\n本章无需任何准备，我将直接接着 第 4 章 结束的地方继续讲解\
    \ SportsStore 应用。\n\n> **提示**  \n> 你可以从 [`Apress.com`](https://Apress.com) 下载\
    \ SportsStore 项目，以及本书的所有源代码。\n"
- fmt: "### Implementing NSCopying in the Product Class\n\nThe first step is to update\
    \ the `Product` class that I created in [Chapter 4](#A978-1-4842-0394-1_4_Chapter.html)\
    \ so that it can be cloned. To do this, I must set the base class to `NSObject`\
    \ and implement the `NSCopying` protocol, but there are some wrinkles to be worked\
    \ around, as Listing 5-21 illustrates.\n\nListing 5-21. Implementing the `NSCopying`\
    \ Protocol in the `Product.swift` File\n\n```\nimport Foundation\n\nclass Product\
    \ : NSObject, NSCopying {\n\n    private(set) var name:String;\n    private(set)\
    \ var productDescription:String;\n    private(set) var category:String;\n    private\
    \ var stockLevelBackingValue:Int = 0;\n    private var priceBackingValue:Double\
    \ = 0;\n\n    init(name:String, description:String, category:String, price:Double,\n\
    \        stockLevel:Int) {\n        self.name = name;\n        self.productDescription\
    \ = description;\n        self.category = category;\n        super.init();\n \
    \       self.price = price;\n        self.stockLevel = stockLevel;\n    }\n\n\
    \    var stockLevel:Int {\n        get { return stockLevelBackingValue;}\n   \
    \     set { stockLevelBackingValue = max(0, newValue);}\n    }\n\n    private(set)\
    \ var price:Double {\n        get { return priceBackingValue;}\n        set {\
    \ priceBackingValue = max(1, newValue);}\n    }\n\n    var stockValue:Double {\n\
    \        get {\n            return price * Double(stockLevel);\n        }\n  \
    \  }\n\n    func copyWithZone(zone: NSZone) -> AnyObject {\n        return Product(name:\
    \ self.name, description: self.description,\n            category: self.category,\
    \ price: self.price,\n            stockLevel: self.stockLevel);\n    }\n}\n```\n\
    \nThe changes in Listing 5-21 highlight two common issues that arise when support\
    \ for cloning is applied retrospectively to an existing class. The first is that\
    \ I have had to change the name of the stored property that describes the product\
    \ because the `NSObject` class defines a method called `description`. I change\
    \ the name of the property as follows:\n\n```\n...\nprivate(set) var productDescription\
    \ :String;\n...\n```\n\nI have not used this property in the application yet,\
    \ so no additional changes are required. In a real application, some judicious\
    \ refactoring would be required. This isn’t the end of the world, but it is preferable\
    \ to apply the prototype pattern as early as possible in the development process\
    \ to avoid this kind of issue.\n\nThe second issue is also caused by the change\
    \ to the `NSObject` base class. Initializers of subclasses invoke the initializer\
    \ of their superclass, but this must be done after the stored properties have\
    \ been set and before the computed properties are used. It is for this reason\
    \ that I have called `super.init` in the middle of the `Product` class initializer.\n\
    \n### Creating the Logger Class\n\nI need a way of tracking the changes that are\
    \ made to the `Product` objects in the application. I added a file called `Logger.swift`\
    \ to the project, the contents of which are shown in Listing 5-22.\n\nListing\
    \ 5-22. The Contents of the `Logger.swift` File\n\n```\nimport Foundation\n\n\
    class Logger<T where T:NSObject, T:NSCopying> {\n    var dataItems:[T] = [];\n\
    \    var callback:(T) -> Void;\n\n    init(callback:T -> Void) {\n        self.callback\
    \ = callback;\n    }\n\n    func logItem(item:T) {\n        dataItems.append(item.copy()\
    \ as T);\n        callback(item);\n    }\n\n    func processItems(callback:T ->\
    \ Void) {\n        for item in dataItems {\n            callback(item);\n    \
    \    }\n    }\n}\n```\n\nThis is a generic version of the class I used in the\
    \ “Implementing the Prototype Pattern” section. I have applied a constraint to\
    \ the generic type parameter that ensures that the `Logger` class can be used\
    \ to store only objects that are derived from `NSObject` and implement the `NSCopying`\
    \ protocol. The `Logger` class defines an initializer that takes a callback function\
    \ that is passed new items as they are logged. This allows me to dispatch details\
    \ of new items in a rough and ready way, but I’ll demonstrate a better approach\
    \ in [Chapter 22](#A978-1-4842-0394-1_22_Chapter.html), when I describe the observer\
    \ pattern.\n\n### Logging Changes in the View Controller\n\nI can now log changes\
    \ by creating an instance of the `Logger` class and using it to store `Product`\
    \ objects when the user specifies a different stock level. Since I am still working\
    \ with an unstructured app, these changes go into the `ViewController.swift` file,\
    \ as shown in Listing 5-23. (I have omitted a lot of the content of this file\
    \ from the listing because the changes are small but spread throughout the file.)\
    \ The callback function I have provided as the `Logger` initializer argument writes\
    \ out the name and stock level of the changed product.\n\nListing 5-23. Logging\
    \ Product Changes in the `ViewController.swift` File\n\n```\nimport UIKit\n\n\
    // ...ProductTableCell class omitted for brevity...\n\nvar handler = { (p:Product)\
    \ in\n    println(\"Change: \\(p.name) \\(p.stockLevel) items in stock\");\n};\n\
    \nclass ViewController: UIViewController, UITableViewDataSource {\n    @IBOutlet\
    \ weak var totalStockLabel: UILabel!\n    @IBOutlet weak var tableView: UITableView!\n\
    \    let logger = Logger<Product>(callback: handler);\n\n    var products = [\n\
    \        Product(name:\"Kayak\", description:\"A boat for one person\",\n    \
    \        category:\"Watersports\", price:275.0, stockLevel:10),\n        // ...other\
    \ products omitted for brevity...\n        Product(name:\"Bling-Bling King\",\n\
    \            description:\"Gold-plated, diamond-studded King\",\n            category:\"\
    Chess\", price:1200.0, stockLevel:4)];\n\n    // ...methods omitted for brevity...\n\
    \n    func tableView(tableView: UITableView,\n        cellForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCell {\n        let product = products[indexPath.row];\n\
    \        let cell = tableView.dequeueReusableCellWithIdentifier(\"ProductCell\"\
    )\n            as ProductTableCell;\n        cell.product = products[indexPath.row];\n\
    \        cell.nameLabel.text = product.name;\n        cell.descriptionLabel.text\
    \ = product.productDescription;\n        cell.stockStepper.value = Double(product.stockLevel);\n\
    \        cell.stockField.text = String(product.stockLevel);\n        return cell;\n\
    \    }\n\n    @IBAction func stockLevelDidChange(sender: AnyObject) {\n      \
    \  if var currentCell = sender as? UIView {\n            while (true) {\n    \
    \            currentCell = currentCell.superview!;\n                if let cell\
    \ = currentCell as? ProductTableCell {\n                    if let product = cell.product?\
    \ {\n                        if let stepper = sender as? UIStepper {\n       \
    \                     product.stockLevel = Int(stepper.value);\n             \
    \           } else if let textfield = sender as? UITextField {\n             \
    \               if let newValue = textfield.text.toInt()? {\n                \
    \                product.stockLevel = newValue;\n                            }\n\
    \                        }\n                        cell.stockStepper.value =\
    \ Double(product.stockLevel);\n                        cell.stockField.text =\
    \ String(product.stockLevel);\n                        logger.logItem(product);\n\
    \                    }\n                    break;\n                }\n      \
    \      }\n            displayStockTotal();\n        }\n    }\n}\n// ...methods\
    \ omitted for brevity...\n```\n\nNote\n\nIn Listing 5-23, I have defined the callback\
    \ closure outside the `ViewController` class. As I write this, there is a bug\
    \ in the Swift compiler that will not allow this kind of closure to be defined\
    \ inline."
