- fmt: "# Understanding the Pitfalls of the Proxy Pattern\n\nThe pitfalls associated\
    \ with the proxy pattern depend on how it is being implemented, but the common\
    \ theme is not to allow details of the implementation to leak out of the proxy\
    \ class into the calling component. For remote object proxies, this means ensuring\
    \ that no unnecessary details of the mechanism used to access the remote object\
    \ are revealed. For proxies used to manage expensive operations, you should avoid\
    \ exposing details of how the cost of the operation is being mitigated as far\
    \ as it possible. For access restriction proxies, you should take care not to\
    \ allow calling components to bypass the proxy and access the underlying object\
    \ directly.\n\nThere are two specific pitfalls if you use the proxy pattern to\
    \ implement the reference counting variation. First, do not use proxies to manage\
    \ the life cycle of objects. Leave this to the built-in Swift support for automatic\
    \ reference counting (ARC), which ensures that objects are destroyed when they\
    \ are no longer required.\n\nSecond, do not use proxies to implement concurrency\
    \ protections such as locks and semaphores. This is a reasonable thing to do if\
    \ you are working with a language that doesn’t have concurrency features, but\
    \ Swift provides access to Grand Central Dispatch for high-level concurrency control,\
    \ and if you don’t like GCD, you can access a range of lower-level concurrency\
    \ mechanisms. Writing your own concurrency code is stupid, dangerous, and almost\
    \ impossible to get right. If you think you need to create your own concurrency\
    \ protections, then you have either misunderstood the built-in features or misunderstood\
    \ the problem you face in your project.\n\n## Examples of the Proxy Pattern in\
    \ Cocoa\n\nThe framework provides excellent support for the proxy pattern through\
    \ the `NSProxy` class, but it is available only to Objective-C programmers and\
    \ cannot be used in Swift.\n\nYou don’t call methods in Objective-C code. Instead,\
    \ you send messages to objects. In most situations, this distinction doesn’t have\
    \ any real significance, and many Objective-C programmers are unaware of the difference.\
    \ The `NSProxy` class is used to create classes that receive messages and forward\
    \ them on to the resources or object for which they are proxies, which provides\
    \ a nice mechanism by which messages can be changed or redirected on the fly.\n\
    \nNone of this is available to Swift programmers, sadly, and attempting to derive\
    \ a Swift class from `NSProxy` will generate a compiler error because it is impossible\
    \ to call `super.init` from the derived class (because `NSProxy` doesn’t define\
    \ an initializer).\n\n## Applying the Pattern to the SportsStore Application\n\
    \nTo demonstrate the use of the proxy pattern in the SportsStore application,\
    \ I am going to create a proxy object that represents the product data on a remote\
    \ server and then use the proxy to send stock level updates and to consolidate\
    \ the code that gets the initial stock data when the application starts.\n\n###\
    \ Preparing the Example Application\n\nNo preparation is required for this chapter,\
    \ and I pick up the SportsStore application just as I left it in Chapter 17. Don’t\
    \ forget that you can download all of the code examples for this book, including\
    \ projects for each chapter’s version of the SportsStore application, from `Apress.com`.\n\
    \n### Defining the Protocol, Factory Method, and Proxy Class\n\nAs I explained\
    \ earlier, you don’t need to define a protocol when creating a proxy, but I usually\
    \ do. This is partly habit but mainly because it allows me to draw a clean line\
    \ separating the functionality exposed to calling components from the implementation\
    \ of the proxy class. Listing 18-14 shows the contents of the `Proxy.swift` file,\
    \ which I added to the SportsStore project.\n\n**Listing 18-14.** The Contents\
    \ of the `Proxy.swift` File\n\n```\nprotocol StockServer {\n    func getStockLevel(product:\
    \ String, callback: (String, Int) -> Void);\n    func setStockLevel(product: String,\
    \ stockLevel: Int);\n}\n\nclass StockServerFactory {\n    class func getStockServer()\
    \ -> StockServer {\n        return server;\n    }\n    private class var server:\
    \ StockServer {\n        struct singletonWrapper {\n            static let singleton:\
    \ StockServer = StockServerProxy();\n        }\n        return singletonWrapper.singleton;\n\
    \    }\n}\n\nclass StockServerProxy : StockServer {\n    func getStockLevel(product:\
    \ String, callback: (String, Int) -> Void) {\n        // TODO - implement this\
    \ method\n    }\n    func setStockLevel(product: String, stockLevel: Int) {\n\
    \        // TODO - implement this method\n    }\n}\n```\n\nI have defined the\
    \ `StockServer` protocol so that it contains `getStockLevel` and `setStockLevel`\
    \ methods and created the `StockServerProxy` class, which acts as the proxy for\
    \ the remote server. The glue between the protocol and the proxy class is the\
    \ `StockServerFactory` class, which uses the singleton pattern to provide callers\
    \ with a reference to a single proxy object. I have not yet implemented the proxy\
    \ methods. I’ll complete the proxy class once some of the other changes are in\
    \ place.\n\n### Updating the Product Data Store\n\nThe `ProductDataStore` class\
    \ supplies product data for the rest of the application and is the natural point\
    \ at which to integrate the proxy, replacing the direct access to the `NetworkConnection`\
    \ and `NetworkPool` classes that are currently in place. Listing 18-15 shows how\
    \ I updated the `ProductDataStore` class to obtain its initial stock value data\
    \ from the proxy.\n\n**Listing 18-15.** Integrating the Proxy in the `ProductDataStore.swift`\
    \ File\n\n```\nimport Foundation\n\nfinal class ProductDataStore {\n    var callback:\
    \ ((Product) -> Void)?;\n    private var networkQ: dispatch_queue_t\n    private\
    \ var uiQ: dispatch_queue_t;\n    lazy var products: [Product] = self.loadData();\n\
    \n    init() {\n        networkQ = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND,\
    \ 0);\n        uiQ = dispatch_get_main_queue();\n    }\n\n    private func loadData()\
    \ -> [Product] {\n        var products = [Product]();\n        for product in\
    \ productData {\n            var p: Product = LowStockIncreaseDecorator(product:\
    \ product);\n            if (p.category == \"Soccer\") {\n                p =\
    \ SoccerDecreaseDecorator(product: p);\n            }\n            dispatch_async(self.networkQ,\
