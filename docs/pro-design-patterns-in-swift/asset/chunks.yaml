    To solve this problem, I need to ensure that only one block at a time is allowed
    to call the `append` method on the array. Listing 6-12 shows how I have used GCD
    to solve the problem. (I explain the GCD features I have used in the second “Understanding
    Grand Central Dispatch: Part 2” sidebar.)


    Listing 6-12. Serializing Access to the Array in the BackupServer.swift File


    `import Foundation`


    `class DataItem {`


    `enum ItemType : String {`


    `case Email = "Email Address";`


    `case Phone = "Telephone Number";`


    `case Card = "Credit Card Number";`


    `}`


    `var type:ItemType;`


    `var data:String;`


    `init(type:ItemType, data:String) {`


    `self.type = type; self.data = data;`


    `}`


    `}`


    `final class BackupServer {`


    `let name:String;`


    `private var data = [DataItem]();`


    `private let arrayQ = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_SERIAL);`


    `private init(name:String) {`


    `self.name = name;`


    `globalLogger.log("Created new server \(name)");`


    `}`


    `func backup(item:DataItem) {`


    `dispatch_sync(arrayQ, {() in`


    `self.data.append(item);`


    `globalLogger.log(`


    `"\(self.name) backed up item of type \(item.type.rawValue)");`


    `})`


    `}`


    `func getData() -> [DataItem]{`


    `return data;`


    `}`


    `class var server:BackupServer {`


    `struct SingletonWrapper {`


    `static let singleton = BackupServer(name:"MainServer");`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `}`


    In this listing, I perform the opposite action of the one in Listing 6-11: I take
    a set of asynchronous blocks and force them to be performed serially in order
    to ensure that only one block calls the `append` method on the array at any one
    time.


    This may appear self-defeating, but in a real application multiple components
    will create the blocks, rather than a single `for` loop. These components won’t
    be able to coordinate their activities and usually won’t know anything about each
    other, so it falls to the singleton to protect the resources it relies on.


    UNDERSTANDING GRAND CENTRAL DISPATCH—PART 2


    In Listing 6-12, I create a queue using the `dispatch_queue_create` function,
    like this:


    `...`


    `private let arrayQ = dispatch_queue_create("arrayQ",` `DISPATCH_QUEUE_SERIAL`
    `);`


    `...`


    The first argument is the name of the queue, and the second argument—the `DISPATCH_QUEUE_`
    `SERIAL`value—specifies that the blocks will be taken from the queue and executed
    one after the other, such that a block won’t be started until the previous one
    has been completed.


    Within the `backup` method I use the `dispatch_sync` function to add blocks to
    the queue.


    `...`


    `dispatch_sync` `(arrayQ, {() in`


    `self.data.append(item);`


    `globalLogger.log(`


    `"\(self.name) backed up item of type \(item.type.toRaw())");`


    `})`


    `...`


    The `dispatch_sync` function adds work to the queue just like the `dispatch_group_async`
    function I used in Listing 6-11, but it waits until the block has been completed
    before it returns, whereas the `dispatch_group_async` function returns immediately,
    leaving the block to be executed at some future point when it reached the front
    of the queue. (It also doesn’t specify a group. The asynchronous equivalent of
    `dispatch_sync` is `dispatch_async`.)


    The function used to add a block to the method doesn’t affect the way that the
    block is processed—just whether the function returns immediately after adding
    the block to the queue or blocks until it has been processed.


    The effect I have created is that calling the `backup` method is a synchronous
    operation that will not return until the data has been added to the array, and
    since I have specified a serial queue, this means that the method won’t return
    until all of the other backups ahead in the queue are processed too.


    The changes I made in Listing 6-12 ensure that the array used in the `BackupServer`
    singleton is protected, but the `backup` method uses the `Logger` class, and that
    presents a similar problem. Although calls to the `log` method are serialized
    within the `BackupServer` class, another component could use the singleton and
    call the `log` method at the same time, which would lead to the same kind of data
    corruption I described earlier. For completeness, I have used GCD to protect the
    data array in the `Logger` class, as shown in Listing 6-13.


    Listing 6-13. Adding Concurrency Protection in the Logger.swift File


    `import Foundation;`


    `let globalLogger = Logger();`


    `final class Logger {`


    `private var data = [String]()`


    `private let arrayQ = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_SERIAL);`


    `private init() {`


    `// do nothing - required to stop instances being`


    `// created by code in other files`


    `}`


    `func log(msg:String) {`


    `dispatch_sync(arrayQ, {() in`


    `self.data.append(msg);`


    `});`


    `}`


    `func printLog() {`


    `for msg in data {`


    `println("Log: \(msg)");`


    `}`


    `}`


    `}`


    The `Logger` class exposes its singleton using the global constant technique,
    but the technique for protecting the data array from corruption is just the same—I
    create a serial GCD queue and use the `dispatch_sync` method to ensure that array
    modifications are performed only once at a time. If you run the application, there
    will be no data corruption, and the following output will be shown in the console
    window:


    `100 items were backed up`


    ## Understanding the Pitfalls of the Singleton Pattern


    There are several pitfalls to avoid when implementing the singleton pattern, and
    it is important to think through your implementation carefully in order to ensure
    you adhere to the rules I described earlier in the chapter. In the sections that
    follow, I highlight the most common problems.


    ### Understanding the Leakage Pitfall


    The most common problem when implementing a singleton is producing an object that
    can be copied, either because it was created from a struct (or one of the built-in
    reference types) or because it was created from a class that implements the `NSCopying`
    protocol (which I described in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html)).


    Structs do not work as singletons because they are copied whenever they are assigned
    to a new variable or constant or passed as an argument, but you may be tempted
    to use a class that implements the `NSCopying` protocol because you trust that
    the components that will consume the singleton will not make copies. I advise
    caution: other developers may not realize the importance of not copying the singleton,
    and you should take steps to create a strict implementation of the pattern. Allowing
    other components to copy or clone the prototype breaks the first of the three
    singleton rules.


    Tip


    You can apply the decorator pattern if you don’t have control over the class definition
    of the object that you need as a singleton in order to prevent an object from
    being treated like a prototype. See [Chapter 14](#A978-1-4842-0394-1_14_Chapter.html)
    for details.


    ### Understanding the Shared Code File Pitfall


    The Swift access protection keywords operate at the file level, which means that
    applying the `private` keyword to an initializer affects only code outside of
    the file that contains the singleton. You should always define the singleton and
    the global constant—if you are using one—in their own file so that no other component
    is able to create its own instances of the singleton class, which breaks the first
    singleton rule.


    ### Understanding the Concurrency Pitfalls


    The most intractable problems with the singleton pattern are related to concurrency,
    which can be a difficult topic even for experience programmers. In the sections
    that follow, I describe the most common problems.'
