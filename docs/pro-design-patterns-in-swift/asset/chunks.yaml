    \ `NewCoDirectory` 类集成到现有的员工目录中。\n\n**为什么不仅仅是修改代码？**\n\n我可以通过修改 `NewCoDirectory`\
    \ 类来解决这个问题，但这在现实世界中并不总是可行的，这也是适配器模式如此有用的原因。代码无法修改的主要原因是，当组件是从第三方购买时，你甚至可能看不到源代码，只能看到它暴露的\
    \ API。当你是他们销售的数千名客户之一时，组件开发者不太可能采用你私有的 API。\n\n你还会在大型公司工作时遇到无法更改的代码。常见的原因包括处理遗留产品（“我们不知道它如何工作，也不敢碰它”）、处理资源不足的项目（“我们大约需要\
    \ 2 年时间才能实现你的 API”），以及处理政治问题（“你应该实现我的 API”）。\n\n无论原因是什么，结果都一样：一个提供了你所需功能但不以你想要的方式提供的\
    \ API。出于本章的目的，假设我没有 `NewCoDirectory` 类的源代码（也许因为它是一个现成的产品），并且我需要在无法进行任何更改的情况下，找到一种方法来集成它提供的员工数据。\n\
    \n我可以通过修改 `SearchTool` 应用程序来解决这个问题，使其知道如何查询新的数据源。这意味着，对于我集成的每一个组件，以及需要查询数据源的每一个应用程序部分，我都必须重复这个修改过程。结果是，每次添加新的数据源或更改现有数据源时，都需要进行一系列复杂的更改——而这正是设计模式旨在避免的情况。\n\
    \n## 理解适配器模式\n\n适配器模式允许两个不兼容的类协同工作，它通过适配其中一个类所呈现的 API，将应用程序期望的 API 映射到组件提供的 API，如图\
    \ 12-1 所示。在示例应用程序中，我需要适配 `NewCoDirectory` 类定义的 API，以便 `SearchTool` 类能够使用它。\n\n\
    ![A978-1-4842-0394-1_12_Fig1_HTML.jpg](img/A978-1-4842-0394-1_12_Fig1_HTML.jpg)\n\
    \n**图 12-1.** 适配器模式\n\n适配器模式中有五个操作。第一个操作是应用程序使用它期望的 API 向适配器发起一个请求。在第二个操作中，适配器利用它对两个\
    \ API 的了解，选择一个能够处理该请求的组件方法或属性。\n\n在第三个操作中，组件接收来自适配器的请求，执行其工作，并将结果返回给适配器。\n\n在第四个操作中，适配器利用它对两个\
    \ API 的了解，将客户端提供的结果转换为应用程序期望的结果，并在最后一个操作中返回该结果。\n\n应用程序和组件彼此不知道对方的存在。适配器向应用程序呈现一个它已知的\
    \ API，并隐藏了该 API 如何映射到组件所提供的 API 的细节。\n"
- fmt: "# Implementing the Adapter Pattern\n\nThe most elegant way to implement the\
    \ adapter pattern is with a Swift extension. Extensions allow you to add functionality\
    \ to classes that you are unable to modify. This functionality includes adding\
    \ conformance to a protocol, which is perfectly suited to implementing the adapter\
    \ pattern. Listing 12-6 shows the contents of the `Adapter.swift` file that I\
    \ added to the example file and that I used to implement the pattern with an extension.\n\
    \n**Listing 12-6. The Contents of the Adapter.swift File**\n\n```\nimport Foundation\n\
    \nextension NewCoDirectory : EmployeeDataSource {\n\n    var employees:[Employee]\
    \ {\n        return map(getStaff().values, { sv -> Employee in\n            return\
    \ Employee(name: sv.getName(), title: sv.getJob());\n        });\n    }\n\n  \
    \  func searchByName(name:String) -> [Employee] {\n        return createEmployees(filter:\
    \ {(sv:NewCoStaffMember) -> Bool in\n            return sv.getName().rangeOfString(name)\
    \ != nil;\n        });\n    }\n\n    func searchByTitle(title:String) -> [Employee]\
    \ {\n        return createEmployees(filter: {(sv:NewCoStaffMember) -> Bool in\n\
    \            return sv.getJob().rangeOfString(title) != nil;\n        });\n  \
    \  }\n\n    private func createEmployees(filter filterClosure:(NewCoStaffMember\
    \ -> Bool))\n        -> [Employee] {\n            return map(filter(getStaff().values,\
    \ filterClosure), {entry -> Employee in\n                return Employee(name:\
    \ entry.getName(), title: entry.getJob());\n            });\n    }\n\n}\n```\n\
    \nI have defined an extension that makes the `NewCoDirectory` class conform to\
    \ the `EmployeeDataSource` protocol. The process of adapting an API is often more\
    \ complex than just mapping between methods and properties and usually requires\
    \ some logic in the adapter to handle type conversion and to plug small gaps in\
    \ functionality. In Listing 12-6, you can see that I have to add the ability to\
    \ search for names and titles as well as convert the `NewCoStaffMember` objects\
    \ produced by the `NewCoDirectory` class into the `Employee` objects that the\
    \ `EmployeeDataSource` protocol expects.\n\n**Tip**\n\nExtensions can operate\
    \ only on the accessible properties and methods defined by the class being extended.\
    \ This is why I get details of the staff members through the `getStaff` method\
    \ defined by the `NewCoDirectory` class and not the `private` property called\
    \ `staff`.\n\nUsing an extension means that an instance of the `NewCoDirectory`\
    \ class can be passed to the `SearchTool` initializer and be treated like any\
    \ other data source, as shown in Listing 12-7. The methods and properties defined\
    \ by the extension—as well as any protocols it conforms to—are applied to the\
    \ class automatically, even though the class itself has not been modified.\n\n\
    **Listing 12-7. Using the Adapter in the main.swift File**\n\n```\nlet search\
    \ = SearchTool(dataSources: SalesDataSource(),\n    DevelopmentDataSource(), NewCoDirectory());\n\
    println(\"--List--\");\nfor e in search.employees {\n    println(\"Name: \\(e.name)\"\
    );\n}\nprintln(\"--Search--\");\nfor e in search.search(\"VP\", type: SearchTool.SearchType.TITLE)\
    \ {\n    println(\"Name: \\(e.name), Title: \\(e.title)\");\n}\n```\n\nNo changes\
    \ to the `SearchTool` class are required, and you can see how the directory includes\
    \ the `NewCo` employees by running the application.\n\n```\n--List--\nName: Alice\n\
    Name: Bob\nName: Joe\nName: Pepe\nName: Greta\nName: Hans\n--Search--\nName: Alice,\
    \ Title: VP of Sales\nName: Joe, Title: VP of Development\nName: Greta, Title:\
    \ VP, Legal\n```\n\n## Why Not Just Migrate the Data?\n\nIn my example, an alternative\
    \ approach would be to migrate the data from the acquired company’s systems to\
    \ those of the parent company. This isn’t always a solution, of course, and it\
    \ won’t help when you are trying to integrate third-party code into your application.\n\
    \nData migration has a lot of attractions over the long term, but it is hard to\
    \ achieve quickly, especially for applications such as employee directories that\
    \ are deeply tied into complex business processes and legacy applications. Migrating\
    \ all the data to a single platform will eventually drive out cost by eliminating\
    \ one of the systems—something that is important in mergers and acquisitions—but\
    \ it requires a lot of effort and puts demands on key staff who are likely to\
    \ be focused on other issues. Patterns such as adapter can help reduce the number\
    \ of complex projects that get kicked off in the days following the deal and buy\
    \ some time to see how other business processes are going to be changed.\n\nImplementing\
    \ a long-term strategic solution is always desirable, but getting some short-term\
    \ benefit by using an adapter is often more pragmatic and more likely to succeed.\n\
    \n# Variations on the Adapter Pattern\n\nThere are two useful variations in how\
    \ the adapter pattern is implemented, which I describe in the sections that follow.\n\
    \n## Defining an Adapter as a Wrapper Class\n\nIf you don’t like using extensions,\
    \ then you can implement an adapter as a class that wraps around the component.\
    \ Listing 12-8 shows how I replaced the extension adapter with a class.\n\n**Listing\
    \ 12-8. Implementing the Adapter as a Wrapper Class in the Adapter.swift File**\n\
    \n```\nclass NewCoDirectoryAdapter : EmployeeDataSource {\n    private let directory:NewCoDirectory;\n\
    \n    init() {\n        directory = NewCoDirectory();\n    }\n\n    var employees:[Employee]\
    \ {\n        return map(directory.getStaff().values, { sv -> Employee in\n   \
    \         return Employee(name: sv.getName(), title: sv.getJob());\n        });\n\
    \    }\n\n    func searchByName(name:String) -> [Employee] {\n        return createEmployees(filter:\
    \ {(sv:NewCoStaffMember) -> Bool in\n            return sv.getName().rangeOfString(name)\
    \ != nil;\n        });\n    }\n\n    func searchByTitle(title:String) -> [Employee]\
    \ {\n        return createEmployees(filter: {(sv:NewCoStaffMember) -> Bool in\n\
    \            return sv.getJob().rangeOfString(title) != nil;\n        });\n  \
    \  }\n\n    private func createEmployees(filter filterClosure:(NewCoStaffMember\
    \ -> Bool))\n        -> [Employee] {\n            return map(filter(directory.getStaff().values,\
    \ filterClosure),\n                {entry -> Employee in\n                   \
    \ return Employee(name: entry.getName(), title: entry.getJob());\n           \
    \ });\n    }\n\n}\n```\n\n**Tip**\n\nThere is no advantage in using a wrapper\
    \ class, but there are some advanced adaptions that can’t be implemented using\
    \ extensions, as I describe in the next section.\n\nThe logic contained in the\
    \ adapter is the same as for an extension-based implementation, and only the way\
    \ that the adapter is written is changed. I still have to implement support for\
    \ performing searches, and I still have to map between the result types.\n\nThis\
    \ approach requires that the adapter class be instantiated and used, rather than\
    \ the (extended) component, as shown in Listing 12-9.\n\n**Listing 12-9. Using\
    \ the Adapter Wrapper Class in the main.swift File**\n\n```\nlet search = SearchTool(dataSources:\
    \ SalesDataSource(),\n    DevelopmentDataSource(), NewCoDirectoryAdapter());\n\
    println(\"--List--\");\nfor e in search.employees {\n    println(\"Name: \\(e.name)\"\
    );\n}\nprintln(\"--Search--\");\nfor e in search.search(\"VP\", type: SearchTool.SearchType.TITLE)\
    \ {\n    println(\"Name: \\(e.name), Title: \\(e.title)\");\n}\n```"
  raw: '## Implementing the Adapter Pattern


    The most elegant way to implement the adapter pattern is with a Swift extension.
    Extensions allow you to add functionality to classes that you are unable to modify.
    This functionality includes adding conformance to a protocol, which is perfectly
    suited to implementing the adapter pattern. Listing 12-6 shows the contents of
    the `Adapter.swift` file that I added to the example file and that I used to implement
    the pattern with an extension.


    Listing 12-6. The Contents of the Adapter.swift File


    `import Foundation`


    `extension NewCoDirectory : EmployeeDataSource {`


    `var employees:[Employee] {`


    `return map(getStaff().values, { sv -> Employee in`


    `return Employee(name: sv.getName(), title: sv.getJob());`


    `});`


    `}`


    `func searchByName(name:String) -> [Employee] {`


    `return createEmployees(filter: {(sv:NewCoStaffMember) -> Bool in`


    `return sv.getName().rangeOfString(name) != nil;`


    `});`


    `}`


    `func searchByTitle(title:String) -> [Employee] {`


    `return createEmployees(filter: {(sv:NewCoStaffMember) -> Bool in`


    `return sv.getJob().rangeOfString(title) != nil;`


    `});`


    `}`


    `private func createEmployees(filter filterClosure:(NewCoStaffMember -> Bool))`


    `-> [Employee] {`


    `return map(filter(getStaff().values, filterClosure), {entry -> Employee in`


    `return Employee(name: entry.getName(), title: entry.getJob());`


    `});`


    `}`


    `}`


    I have defined an extension that makes the `NewCoDirectory` class conform to the
    `EmployeeDataSource` protocol. The process of adapting an API is often more complex
    than just mapping between methods and properties and usually requires some logic
    in the adapter to handle type conversion and to plug small gaps in functionality.
    In Listing 12-6, you can see that I have to add the ability to search for names
    and titles as well as convert the `NewCoStaffMember` objects produced by the `NewCoDirectory`
    class into the `Employee` objects that the `EmployeeDataSource` protocol expects.


    Tip


    Extensions can operate only on the accessible properties and methods defined by
    the class being extended. This is why I get details of the staff members through
    the `getStaff` method defined by the `NewCoDirectory` class and not the `private`
    property called `staff`.


    Using an extension means that an instance of the `NewCoDirectory` class can be
    passed to the `SearchTool` initializer and be treated like any other data source,
    as shown in Listing 12-7\. The methods and properties defined by the extension—as
    well as any protocols it conforms to—are applied to the class automatically, even
    though the class itself has not been modified.


    Listing 12-7. Using the Adapter in the main.swift File


    `let search = SearchTool(dataSources: SalesDataSource(),`


    `DevelopmentDataSource(), NewCoDirectory());`


    `println("--List--");`


    `for e in search.employees {`


    `println("Name: \(e.name)");`


    `}`


    `println("--Search--");`


    `for e in search.search("VP", type: SearchTool.SearchType.TITLE) {`


    `println("Name: \(e.name), Title: \(e.title)");`


    `}`


    No changes to the `SearchTool` class are required, and you can see how the directory
    includes the `NewCo` employees by running the application.


    `--List--`


    `Name: Alice`


    `Name: Bob`


    `Name: Joe`


    `Name: Pepe`


    `Name: Greta`


    `Name: Hans`


    `--Search--`


    `Name: Alice, Title: VP of Sales`


    `Name: Joe, Title: VP of Development`


    `Name: Greta, Title: VP, Legal`


    WHY NOT JUST MIGRATE THE DATA?


    In my example, an alternative approach would be to migrate the data from the acquired
    company’s systems to those of the parent company. This isn’t always a solution,
    of course, and it won’t help when you are trying to integrate third-party code
    into your application.


    Data migration has a lot of attractions over the long term, but it is hard to
    achieve quickly, especially for applications such as employee directories that
    are deeply tied into complex business processes and legacy applications. Migrating
    all the data to a single platform will eventually drive out cost by eliminating
    one of the systems—something that is important in mergers and acquisitions—but
    it requires a lot of effort and puts demands on key staff who are likely to be
    focused on other issues. Patterns such as adapter can help reduce the number of
    complex projects that get kicked off in the days following the deal and buy some
    time to see how other business processes are going to be changed.


    Implementing a long-term strategic solution is always desirable, but getting some
    short-term benefit by using an adapter is often more pragmatic and more likely
    to succeed.


    ## Variations on the Adapter Pattern


    There are two useful variations in how the adapter pattern is implemented, which
    I describe in the sections that follow.


    ### Defining an Adapter as a Wrapper Class


    If you don’t like using extensions, then you can implement an adapter as a class
    that wraps around the component. Listing 12-8 shows how I replaced the extension
    adapter with a class.


    Listing 12-8. Implementing the Adapter as a Wrapper Class in the Adapter.swift
    File


    `class NewCoDirectoryAdapter : EmployeeDataSource {`


    `private let directory:NewCoDirectory;`


    `init() {`


    `directory = NewCoDirectory();`


    `}`


    `var employees:[Employee] {`


    `return map(directory.getStaff().values, { sv -> Employee in`


    `return Employee(name: sv.getName(), title: sv.getJob());`


    `});`


    `}`


    `func searchByName(name:String) -> [Employee] {`


    `return createEmployees(filter: {(sv:NewCoStaffMember) -> Bool in`


    `return sv.getName().rangeOfString(name) != nil;`


    `});`


    `}`


    `func searchByTitle(title:String) -> [Employee] {`


    `return createEmployees(filter: {(sv:NewCoStaffMember) -> Bool in`


    `return sv.getJob().rangeOfString(title) != nil;`


    `});`


    `}`


    `private func createEmployees(filter filterClosure:(NewCoStaffMember -> Bool))`


    `-> [Employee] {`


    `return map(filter(directory.getStaff().values, filterClosure),`


    `{entry -> Employee in`


    `return Employee(name: entry.getName(), title: entry.getJob());`


    `});`


    `}`


    `}`


    Tip


    There is no advantage in using a wrapper class, but there are some advanced adaptions
    that can’t be implemented using extensions, as I describe in the next section.


    The logic contained in the adapter is the same as for an extension-based implementation,
    and only the way that the adapter is written is changed. I still have to implement
    support for performing searches, and I still have to map between the result types.


    This approach requires that the adapter class be instantiated and used, rather
    than the (extended) component, as shown in Listing 12-9.


    Listing 12-9. Using the Adapter Wrapper Class in the main.swift File


    `let search = SearchTool(dataSources: SalesDataSource(),`


    `DevelopmentDataSource(), NewCoDirectoryAdapter());`


    `println("--List--");`


    `for e in search.employees {`


    `println("Name: \(e.name)");`


    `}`


    `println("--Search--");`


    `for e in search.search("VP", type: SearchTool.SearchType.TITLE) {`


    `println("Name: \(e.name), Title: \(e.title)");`


    `}`'
  trans: "\n# 实现适配器模式\n\n最优雅地实现适配器模式的方式是使用 Swift 扩展。扩展允许你为无法修改的类添加功能。这些功能包括添加对某个协议的遵循，这非常适合实现适配器模式。代码清单\
    \ 12-6 展示了 `Adapter.swift` 文件的内容，该文件已添加到示例文件中，我使用它来通过扩展实现该模式。\n\n**代码清单 12-6.\
    \ Adapter.swift 文件的内容**\n\n```\nimport Foundation\n\nextension NewCoDirectory\
    \ : EmployeeDataSource {\n\n    var employees:[Employee] {\n        return map(getStaff().values,\
    \ { sv -> Employee in\n            return Employee(name: sv.getName(), title:\
    \ sv.getJob());\n        });\n    }\n\n    func searchByName(name:String) -> [Employee]\
    \ {\n        return createEmployees(filter: {(sv:NewCoStaffMember) -> Bool in\n\
    \            return sv.getName().rangeOfString(name) != nil;\n        });\n  \
    \  }\n\n    func searchByTitle(title:String) -> [Employee] {\n        return createEmployees(filter:\
    \ {(sv:NewCoStaffMember) -> Bool in\n            return sv.getJob().rangeOfString(title)\
    \ != nil;\n        });\n    }\n\n    private func createEmployees(filter filterClosure:(NewCoStaffMember\
    \ -> Bool))\n        -> [Employee] {\n            return map(filter(getStaff().values,\
    \ filterClosure), {entry -> Employee in\n                return Employee(name:\
    \ entry.getName(), title: entry.getJob());\n            });\n    }\n\n}\n```\n\
    \n我定义了一个扩展，使 `NewCoDirectory` 类遵循 `EmployeeDataSource` 协议。适配 API 的过程通常比仅仅在方法和属性之间进行映射要复杂，通常需要在适配器中加入一些逻辑来处理类型转换，并填补功能上的微小缺口。在代码清单\
    \ 12-6 中，你可以看到我必须添加按姓名和标题搜索的功能，以及将 `NewCoDirectory` 类产生的 `NewCoStaffMember` 对象转换为\
    \ `EmployeeDataSource` 协议所期望的 `Employee` 对象。\n\n**提示**\n\n扩展只能操作被扩展类中可访问的属性和方法。这就是为什么我通过\
    \ `NewCoDirectory` 类定义的 `getStaff` 方法来获取员工详细信息，而不是通过一个名为 `staff` 的 `private` 属性。\n\
    \n使用扩展意味着 `NewCoDirectory` 类的实例可以传递给 `SearchTool` 初始化器，并像任何其他数据源一样被处理，如代码清单 12-7\
    \ 所示。扩展定义的属性和方法——以及它所遵循的任何协议——会自动应用于该扩展的类，即使该类本身没有被修改。\n\n**代码清单 12-7. 在 main.swift\
    \ 文件中使用适配器**\n\n```\nlet search = SearchTool(dataSources: SalesDataSource(),\n\
    \    DevelopmentDataSource(), NewCoDirectory());\nprintln(\"--List--\");\nfor\
    \ e in search.employees {\n    println(\"Name: \\(e.name)\");\n}\nprintln(\"--Search--\"\
    );\nfor e in search.search(\"VP\", type: SearchTool.SearchType.TITLE) {\n    println(\"\
    Name: \\(e.name), Title: \\(e.title)\");\n}\n```\n\n不需要对 `SearchTool` 类进行任何修改，通过运行应用程序，你可以看到目录如何包含\
    \ `NewCo` 的员工。\n\n```\n--List--\nName: Alice\nName: Bob\nName: Joe\nName: Pepe\n\
    Name: Greta\nName: Hans\n--Search--\nName: Alice, Title: VP of Sales\nName: Joe,\
    \ Title: VP of Development\nName: Greta, Title: VP, Legal\n```\n\n## 为什么不直接迁移数据？\n\
    \n在我的示例中，另一种方法是将数据从被收购公司的系统迁移到母公司的系统中。当然，这并不总是一个解决方案，而且在尝试将第三方代码集成到你的应用程序中时，这种方法也无济于事。\n\
    \n从长远来看，数据迁移有很多吸引人的地方，但很难快速实现，尤其是对于像员工目录这样与复杂业务流程和遗留应用程序深度绑定的应用程序。将所有数据迁移到一个单一平台，最终会通过淘汰其中一个系统来降低成本——这在并购中非常重要——但这需要大量的努力，并且对关键员工提出了要求，而这些员工很可能正专注于其他问题。像适配器这样的模式可以帮助减少在交易完成后的日子里启动的复杂项目数量，并争取一些时间来看看其他业务流程将如何变化。\n\
    \n实现一个长期的战略解决方案总是可取的，但通过使用适配器来获得一些短期利益，往往更务实，也更有可能成功。\n\n# 适配器模式的变体\n\n在实现适配器模式时，有两种有用的变体，我将在下面的章节中进行描述。\n\
    \n## 将适配器定义为包装类\n\n如果你不喜欢使用扩展，那么你可以将适配器实现为一个包装组件的类。代码清单 12-8 展示了如何用类替换扩展适配器。\n\
    \n**代码清单 12-8. 在 Adapter.swift 文件中将适配器实现为包装类**\n\n```\nclass NewCoDirectoryAdapter\
    \ : EmployeeDataSource {\n    private let directory:NewCoDirectory;\n\n    init()\
    \ {\n        directory = NewCoDirectory();\n    }\n\n    var employees:[Employee]\
    \ {\n        return map(directory.getStaff().values, { sv -> Employee in\n   \
    \         return Employee(name: sv.getName(), title: sv.getJob());\n        });\n\
    \    }\n\n    func searchByName(name:String) -> [Employee] {\n        return createEmployees(filter:\
    \ {(sv:NewCoStaffMember) -> Bool in\n            return sv.getName().rangeOfString(name)\
    \ != nil;\n        });\n    }\n\n    func searchByTitle(title:String) -> [Employee]\
    \ {\n        return createEmployees(filter: {(sv:NewCoStaffMember) -> Bool in\n\
    \            return sv.getJob().rangeOfString(title) != nil;\n        });\n  \
    \  }\n\n    private func createEmployees(filter filterClosure:(NewCoStaffMember\
    \ -> Bool))\n        -> [Employee] {\n            return map(filter(directory.getStaff().values,\
    \ filterClosure),\n                {entry -> Employee in\n                   \
    \ return Employee(name: entry.getName(), title: entry.getJob());\n           \
    \ });\n    }\n\n}\n```\n\n**提示**\n\n使用包装类并没有什么优势，但有一些高级适配无法通过扩展实现，我将在下一节中进行描述。\n\
    \n适配器中包含的逻辑与基于扩展的实现相同，只是适配器的编写方式发生了变化。我仍然需要实现执行搜索的支持，并且仍然需要在结果类型之间进行映射。\n\n这种方法要求适配器类被实例化并使用，而不是使用（扩展后的）组件本身，如代码清单\
    \ 12-9 所示。\n\n**代码清单 12-9. 在 main.swift 文件中使用适配器包装类**\n\n```\nlet search = SearchTool(dataSources:\
