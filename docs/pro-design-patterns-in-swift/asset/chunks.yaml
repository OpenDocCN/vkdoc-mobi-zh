    \        Product.createProduct(\"Kayak\", description:\"A boat for one person\"\
    ,\n            category:\"Watersports\", price:275.0, stockLevel:0),\n       \
    \ Product.createProduct(\"Lifejacket\",\n            description:\"Protective\
    \ and fashionable\",\n            category:\"Watersports\", price:48.95, stockLevel:0),\n\
    \        Product.createProduct(\"Soccer Ball\",\n            description:\"FIFA-approved\
    \ size and weight\",\n            category:\"Soccer\", price:19.5, stockLevel:0),\n\
    \        Product.createProduct(\"Corner Flags\",\n            description:\"Give\
    \ your playing field a professional touch\",\n            category:\"Soccer\"\
    , price:34.95, stockLevel:0),\n        Product.createProduct(\"Stadium\",\n  \
    \          description:\"Flat-packed 35,000-seat stadium\",\n            category:\"\
    Soccer\", price:79500.0, stockLevel:0),\n        Product.createProduct(\"Thinking\
    \ Cap\",\n            description:\"Improve your brain efficiency\",\n       \
    \     category:\"Chess\", price:16.0, stockLevel:0),\n        Product.createProduct(\"\
    Unsteady Chair\",\n            description:\"Secretly give your opponent a disadvantage\"\
    ,\n            category: \"Chess\", price: 29.95, stockLevel:0),\n        Product.createProduct(\"\
    Human Chess Board\",\n            description:\"A fun game for the family\",\n\
    \            category:\"Chess\", price:75.0, stockLevel:0),\n        Product.createProduct(\"\
    Bling-Bling King\",\n            description:\"Gold-plated, diamond-studded King\"\
    ,\n            category:\"Chess\", price:1200.0, stockLevel:0)];\n}\n```\n\n当你运行应用程序时，将会为每个产品选择合适的类，并且你会看到库存总价值会发生变化，以反映每个产品类别不同的销售税率。\n\
    \n## 本章小结\n\n在本章中，我向你展示了如何应用工厂方法模式，将选择实例化哪个子类以满足调用组件需求的逻辑整合起来。在下一章中，我将向你展示如何使用抽象工厂模式来创建一系列相关的对象。\n"
- fmt: "# 10. Abstract Factory Pattern\n\nIn this chapter, I describe the abstract\
    \ factory pattern. This pattern is similar to the factory method pattern that\
    \ I described in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html) but allows a\
    \ calling component to obtain a family or group of related objects without needing\
    \ to know which classes were used to create them. Table [10-1](#A978-1-4842-0394-1_10_Chapter.html#Tab1)\
    \ puts the abstract factory pattern in context.\n\nTable 10-1. Putting the Abstract\
    \ Factory Pattern into Context\n\n| Question | Answer |\n| --- | --- |\n| What\
    \ is it? | The abstract factory pattern allows a calling component to create a\
    \ group of related objects. The pattern hides the details of which classes are\
    \ used to create the objects and the reason why they were selected from the calling\
    \ component. This pattern is similar to the factory method pattern I described\
    \ in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html) but presents the calling\
    \ component with a set of objects. |\n| What are the benefits? | The calling component\
    \ doesn’t know which classes are used to create the objects or why they were selected,\
    \ which makes it possible to change the classes that are used without needing\
    \ to change the components that consume them. |\n| When should you use this pattern?\
    \ | Use this pattern when you need to ensure that multiple compatible objects\
    \ are used by a calling component without the component needing to know which\
    \ objects are able to work together. |\n| When should you avoid this pattern?\
    \ | Do not use this pattern to create a single object; the factory method pattern\
    \ is a simpler alternative that should be used instead. |\n| How do you know when\
    \ you have implemented the pattern correctly? | This pattern is implemented correctly\
    \ when a calling component receives a set of objects without knowing which classes\
    \ were used to instantiate them. The calling component should be able to access\
    \ the object’s functionality only through the protocols they implement or the\
    \ base classes from which they are derived. |\n| Are there any common pitfalls?\
    \ | The main pitfall is to leak details of the classes that are used to the calling\
    \ component, either creating a dependency on the decision-making process that\
    \ selects classes or creating a dependency on specific classes. |\n| Are there\
    \ any related patterns? | The factory method pattern (Chapter 9) is a simpler\
    \ pattern when only a single object is required. The abstract factory method is\
    \ often combined with the singleton and prototype patterns (see the “Variations\
    \ on the Abstract Factory Pattern” section). |\n\n## Preparing the Example Project\n\
    \nFor this chapter, I created a new OS X Command Line Tool project called `AbstractFactory`.\
    \ The example in this chapter is based on creating the parts required for different\
    \ models of car. To get started, I added a file called `Floorplans.swift`, the\
    \ contents of which are shown in Listing 10-1.\n\nListing 10-1. The Contents of\
    \ the `Floorplans.swift` File\n\n```\nprotocol Floorplan {\n    var seats:Int\
    \ { get }\n    var enginePosition:EngineOption { get }\n}\n\nenum EngineOption\
    \ : String {\n    case FRONT = \"Front\"\n    case MID = \"Mid\"\n}\n\nclass ShortFloorplan:\
    \ Floorplan {\n    var seats = 2\n    var enginePosition = EngineOption.MID\n\
    }\n\nclass StandardFloorplan: Floorplan {\n    var seats = 4\n    var enginePosition\
    \ = EngineOption.FRONT\n}\n\nclass LongFloorplan: Floorplan {\n    var seats =\
    \ 8\n    var enginePosition = EngineOption.FRONT\n}\n```\n\nI have defined a protocol\
    \ called `Floorplan` that represents the foundation for a car. It has a number\
    \ of seats, expressed by the `Int` property `seats` and an engine mounted in a\
    \ position expressed by the `enginePosition` property, which is a value from the\
    \ `EngineOption` enumeration. I have defined three classes that conform to the\
    \ protocol, each of which represents a different floor plan configuration: `ShortFloorplan`,\
    \ `StandardFloorplan`, and `LongFloorplan`.\n\nI repeated this process with another\
    \ file called `Suspension.swift`, the contents of which are shown in Listing 10-2.\n\
    \nListing 10-2. The Contents of the `Suspension.swift` File\n\n```\nprotocol Suspension\
    \ {\n    var suspensionType:SuspensionOption { get }\n}\n\nenum SuspensionOption\
    \ : String {\n    case STANDARD = \"Standard\"\n    case SPORTS = \"Firm\"\n \
    \   case SOFT = \"Soft\"\n}\n\nclass RoadSuspension : Suspension {\n    var suspensionType\
    \ = SuspensionOption.STANDARD\n}\n\nclass OffRoadSuspension : Suspension {\n \
    \   var suspensionType = SuspensionOption.SOFT\n}\n\nclass RaceSuspension : Suspension\
    \ {\n    var suspensionType = SuspensionOption.SPORTS\n}\n```\n\nThe protocol\
    \ in this case is called `Suspension`, and it defines a property called `suspensionType`,\
    \ which is set to a value from `SuspensionOption`. Like before, I have created\
    \ three classes that conform to the protocol to represent three different suspension\
    \ products.\n\nI created a file called `Drivetrains.swift` for the last set of\
    \ products, as shown in Listing 10-3.\n\nListing 10-3. The Contents of the `Drivetrains.swift`\
    \ File\n\n```\nprotocol Drivetrain {\n    var driveType:DriveOption { get }\n\
    }\n\nenum DriveOption : String {\n    case FRONT = \"Front\"\n    case REAR =\
    \ \"Rear\"\n    case ALL = \"4WD\"\n}\n\nclass FrontWheelDrive : Drivetrain {\n\
    \    var driveType = DriveOption.FRONT\n}\n\nclass RearWheelDrive : Drivetrain\
    \ {\n    var driveType = DriveOption.REAR\n}\n\nclass AllWheelDrive : Drivetrain\
    \ {\n    var driveType = DriveOption.ALL\n}\n```\n\nThe protocol represents a\
    \ drive train and defines a property that takes a value from the `DriveOption`\
    \ enumeration. The implementation classes represent three different types of drive\
    \ train that can be used in the production of cars.\n\nTo finish the preparation,\
    \ I added a file called `CarsParts.swift`, the contents of which are shown in\
    \ Listing 10-4.\n\nListing 10-4. The Contents of the `CarsParts.swift` File\n\n\
    ```\nenum Cars: String {\n    case COMPACT = \"VW Golf\"\n    case SPORTS = \"\
    Porsche Boxter\"\n    case SUV = \"Cadillac Escalade\"\n}\n\nstruct Car {\n  \
    \  var carType:Cars\n    var floor:Floorplan\n    var suspension:Suspension\n\
    \    var drive:Drivetrain\n\n    func printDetails() {\n        println(\"Car\
    \ type: \\(carType.rawValue)\")\n        println(\"Seats: \\(floor.seats)\")\n\
    \        println(\"Engine: \\(floor.enginePosition.rawValue)\")\n        println(\"\
    Suspension: \\(suspension.suspensionType.rawValue)\")\n        println(\"Drive:\
    \ \\(drive.driveType.rawValue)\")\n    }\n}\n```\n\nI have defined an enumeration\
    \ called `Cars` that has values for each model of car that I am going to create\
    \ and a struct called `Car` that represents a completed car with properties for\
    \ each type of product in the example. The `printDetails` function writes out\
    \ details of the car settings to the debug console.\n\nTip\n\nNotice that I have\
    \ used `String` as the base type for all of the enumerations in this project.\
    \ This isn’t something you would do in a real project, but it is helpful in an\
    \ example because it allows me to easily indicate which values have been selected\
    \ by writing the raw values to the debug console."
  raw: '# 10. Abstract Factory Pattern


    In this chapter, I describe the abstract factory pattern. This pattern is similar
    to the factory method pattern that I described in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html)
    but allows a calling component to obtain a family or group of related objects
    without needing to know which classes were used to create them. Table [10-1](#A978-1-4842-0394-1_10_Chapter.html#Tab1)
    puts the abstract factory pattern in context.


    Table 10-1.


    Putting the Abstract Factory Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The abstract factory pattern allows a calling component to create
    a group of related objects. The pattern hides the details of which classes are
    used to create the objects and the reason why they were selected from the calling
    component. This pattern is similar to the factory method pattern I described in
    [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html) but presents the calling component
    with a set of objects. |

    | What are the benefits? | The calling component doesn’t know which classes are
    used to create the objects or why they were selected, which makes it possible
    to change the classes that are used without needing to change the components that
    consume them. |

    | When should you use this pattern? | Use this pattern when you need to ensure
    that multiple compatible objects are used by a calling component without the component
    needing to know which objects are able to work together. |

    | When should you avoid this pattern? | Do not use this pattern to create a single
    object; the factory method pattern is a simpler alternative that should be used
    instead. |

    | How do you know when you have implemented the pattern correctly? | This pattern
    is implemented correctly when a calling component receives a set of objects without
    knowing which classes were used to instantiate them. The calling component should
    be able to access the object’s functionality only through the protocols they implement
    or the base classes from which they are derived. |

    | Are there any common pitfalls? | The main pitfall is to leak details of the
    classes that are used to the calling component, either creating a dependency on
    the decision-making process that selects classes or creating a dependency on specific
    classes. |

    | Are there any related patterns? | The factory method pattern (Chapter 9) is
    a simpler pattern when only a single object is required. The abstract factory
    method is often combined with the singleton and prototype patterns (see the “Variations
    on the Abstract Factory Pattern” section). |


    ## Preparing the Example Project


    For this chapter, I created a new OS X Command Line Tool project called AbstractFactory.
    The example in this chapter is based on creating the parts required for different
    models of car. To get started, I added a file called `Floorplans.swift`, the contents
    of which are shown in Listing 10-1.


    Listing 10-1. The Contents of the Floorplans.swift File


    `protocol Floorplan {`


    `var seats:Int { get }`


    `var enginePosition:EngineOption { get };`


    `}`


    `enum EngineOption : String {`


    `case FRONT = "Front"; case MID = "Mid";`


    `}`


    `class ShortFloorplan: Floorplan {`


    `var seats = 2;`


    `var enginePosition = EngineOption.MID`


    `}`


    `class StandardFloorplan: Floorplan {`


    `var seats = 4;`


    `var enginePosition = EngineOption.FRONT;`


    `}`


    `class LongFloorplan: Floorplan {`


    `var seats = 8;`


    `var enginePosition = EngineOption.FRONT;`


    `}`


    I have defined a protocol called `Floorplan` that represents the foundation for
    a car. It has a number of seats, expressed by the `Int` property `seats` and an
    engine mounted in a position expressed by the `enginePosition` property, which
    is a value from the `EngineOption` enumeration. I have defined three classes that
    conform to the protocol, each of which represents a different floor plan configuration:
    `ShortFloorplan`, `StandardFloorplan`, and `LongFloorplan`.


    I repeated this process with another file called `Suspension.swift`, the contents
    of which are shown in Listing 10-2.


    Listing 10-2. The Contents of the Suspension.swift File


    `protocol Suspension {`


    `var suspensionType:SuspensionOption { get };`


    `}`


    `enum SuspensionOption : String {`


    `case STANDARD = "Standard"; case SPORTS = "Firm"; case SOFT = "Soft";`


    `}`


    `class RoadSuspension : Suspension {`


    `var suspensionType = SuspensionOption.STANDARD;`


    `}`


    `class OffRoadSuspension : Suspension {`


    `var suspensionType = SuspensionOption.SOFT;`


    `}`


    `class RaceSuspension : Suspension {`


    `var suspensionType = SuspensionOption.SPORTS;`


    `}`


    The protocol in this case is called `Suspension`, and it defines a property called
    `suspensionType`, which is set to a value from `SuspensionOption`. Like before,
    I have created three classes that conform to the protocol to represent three different
    suspension products.


    I created a file called `Drivetrains.swift` for the last set of products, as shown
    in Listing 10-3.


    Listing 10-3. The Contents of the Drivetrains.swift File


    `protocol Drivetrain {`


    `var driveType:DriveOption { get };`


    `}`


    `enum DriveOption : String {`


    `case FRONT = "Front"; case REAR = "Rear"; case ALL = "4WD";`


    `}`


    `class FrontWheelDrive : Drivetrain {`


    `var driveType = DriveOption.FRONT;`


    `}`


    `class RearWheelDrive : Drivetrain {`


    `var driveType = DriveOption.REAR;`


    `}`


    `class AllWheelDrive : Drivetrain {`


    `var driveType = DriveOption.ALL;`


    `}`


    The protocol represents a drive train and defines a property that takes a value
    from the `DriveOption` enumeration. The implementation classes represent three
    different types of drive train that can be used in the production of cars.


    To finish the preparation, I added a file called `CarsParts.swift`, the contents
    of which are shown in Listing 10-4.


    Listing 10-4. The Contents of the CarsParts.swift File


    `enum Cars: String {`


    `case COMPACT = "VW Golf";`


    `case SPORTS = "Porsche Boxter";`


    `case SUV = "Cadillac Escalade";`


    `}`


    `struct Car {`


    `var carType:Cars;`


    `var floor:Floorplan;`


    `var suspension:Suspension;`


    `var drive:Drivetrain;`


    `func printDetails() {`


    `println("Car type: \(carType.rawValue)");`


    `println("Seats: \(floor.seats)");`


    `println("Engine: \(floor.enginePosition.rawValue)");`


    `println("Suspension: \(suspension.suspensionType.rawValue)");`


    `println("Drive: \(drive.driveType.rawValue)");`


    `}`


    `}`


    I have defined an enumeration called `Cars` that has values for each model of
    car that I am going to create and a struct called `Car` that represents a completed
    car with properties for each type of product in the example. The `printDetails`
    function writes out details of the car settings to the debug console.


    Tip


    Notice that I have used `String` as the base type for all of the enumerations
    in this project. This isn’t something you would do in a real project, but it is
    helpful in an example because it allows me to easily indicate which values have
    been selected by writing the raw values to the debug console.'
  trans: "\n# 10. 抽象工厂模式\n\n在本章中，我将介绍抽象工厂模式。该模式与我在第 9 章中描述的工厂方法模式类似，但它允许调用组件获取一族或一组相关对象，而无需知道具体使用了哪些类来创建它们。表\
    \ 10-1 将抽象工厂模式置于上下文中进行说明。\n\n表 10-1. 将抽象工厂模式置于上下文中\n\n| 问题 | 答案 |\n| --- | ---\
    \ |\n| 是什么？ | 抽象工厂模式允许调用组件创建一组相关对象。该模式隐藏了用于创建对象的类以及从调用组件中选择这些原因的全部细节。此模式与我之前在第\
    \ 9 章描述的工厂方法模式类似，但它向调用组件提供一组对象。 |\n| 有什么好处？ | 调用组件无需知道用于创建对象的类或选择它们的原因，这使得在不更改使用这些对象的组件的情况下，可以更改所使用的类。\
    \ |\n| 何时使用此模式？ | 当需要确保调用组件使用多个兼容对象，而该组件无需知道哪些对象能够协同工作时，使用此模式。 |\n| 何时应避免使用此模式？\
    \ | 不要使用此模式来创建单个对象；工厂方法模式是更简单的替代方案，应优先使用。 |\n| 如何判断是否已正确实现该模式？ | 当调用组件接收到一组对象，却不知道用于实例化它们的类是哪些时，即视为正确实现了此模式。调用组件应仅能通过对象实现的协议或其派生自的基类来访问对象的功能。\
    \ |\n| 有哪些常见陷阱？ | 主要的陷阱是将所用类的细节泄露给调用组件，这要么会创建对选择类的决策过程的依赖，要么会创建对特定类的依赖。 |\n| 有哪些相关模式？\
    \ | 当仅需要单个对象时，工厂方法模式（第 9 章）是一种更简单的模式。抽象工厂方法通常与单例模式和原型模式结合使用（参见“抽象工厂模式的变体”部分）。\
    \ |\n\n## 准备示例项目\n\n对于本章，我创建了一个名为`AbstractFactory`的新 OS X 命令行工具项目。本章的示例基于为不同车型创建所需的零件。首先，我添加了一个名为`Floorplans.swift`的文件，其内容如代码清单\
    \ 10-1 所示。\n\n代码清单 10-1. `Floorplans.swift`文件的内容\n\n```\nprotocol Floorplan {\n\
    \    var seats:Int { get }\n    var enginePosition:EngineOption { get }\n}\n\n\
    enum EngineOption : String {\n    case FRONT = \"Front\"\n    case MID = \"Mid\"\
    \n}\n\nclass ShortFloorplan: Floorplan {\n    var seats = 2\n    var enginePosition\
    \ = EngineOption.MID\n}\n\nclass StandardFloorplan: Floorplan {\n    var seats\
    \ = 4\n    var enginePosition = EngineOption.FRONT\n}\n\nclass LongFloorplan:\
    \ Floorplan {\n    var seats = 8\n    var enginePosition = EngineOption.FRONT\n\
    }\n```\n\n我定义了一个名为`Floorplan`的协议，它代表汽车的基础结构。它包含一个由`Int`类型属性`seats`表示的车座数量，以及一个安装在由`EngineOption`枚举值表示的特定位置的发动机，该位置由`enginePosition`属性表示。我定义了三个遵循该协议的类，每个类代表一种不同的地板布局配置：`ShortFloorplan`、`StandardFloorplan`和`LongFloorplan`。\n\
    \n我用另一个名为`Suspension.swift`的文件重复了此过程，其内容如代码清单 10-2 所示。\n\n代码清单 10-2. `Suspension.swift`文件的内容\n\
    \n```\nprotocol Suspension {\n    var suspensionType:SuspensionOption { get }\n\
    }\n\nenum SuspensionOption : String {\n    case STANDARD = \"Standard\"\n    case\
    \ SPORTS = \"Firm\"\n    case SOFT = \"Soft\"\n}\n\nclass RoadSuspension : Suspension\
    \ {\n    var suspensionType = SuspensionOption.STANDARD\n}\n\nclass OffRoadSuspension\
    \ : Suspension {\n    var suspensionType = SuspensionOption.SOFT\n}\n\nclass RaceSuspension\
    \ : Suspension {\n    var suspensionType = SuspensionOption.SPORTS\n}\n```\n\n\
    此处的协议称为`Suspension`，它定义了一个名为`suspensionType`的属性，该属性被设置为`SuspensionOption`中的一个值。与之前类似，我创建了三个遵循该协议的类，以代表三种不同的悬挂产品。\n\
    \n我为最后一组产品创建了一个名为`Drivetrains.swift`的文件，如代码清单 10-3 所示。\n\n代码清单 10-3. `Drivetrains.swift`文件的内容\n\
    \n```\nprotocol Drivetrain {\n    var driveType:DriveOption { get }\n}\n\nenum\
    \ DriveOption : String {\n    case FRONT = \"Front\"\n    case REAR = \"Rear\"\
    \n    case ALL = \"4WD\"\n}\n\nclass FrontWheelDrive : Drivetrain {\n    var driveType\
    \ = DriveOption.FRONT\n}\n\nclass RearWheelDrive : Drivetrain {\n    var driveType\
    \ = DriveOption.REAR\n}\n\nclass AllWheelDrive : Drivetrain {\n    var driveType\
    \ = DriveOption.ALL\n}\n```\n\n该协议代表一个驱动系统，并定义了一个属性，该属性接受`DriveOption`枚举中的一个值。实现类代表了可用于汽车生产的三种不同类型的驱动系统。\n\
    \n为了完成准备工作，我添加了一个名为`CarsParts.swift`的文件，其内容如代码清单 10-4 所示。\n\n代码清单 10-4. `CarsParts.swift`文件的内容\n\
    \n```\nenum Cars: String {\n    case COMPACT = \"VW Golf\"\n    case SPORTS =\
    \ \"Porsche Boxter\"\n    case SUV = \"Cadillac Escalade\"\n}\n\nstruct Car {\n\
    \    var carType:Cars\n    var floor:Floorplan\n    var suspension:Suspension\n\
    \    var drive:Drivetrain\n\n    func printDetails() {\n        println(\"Car\
    \ type: \\(carType.rawValue)\")\n        println(\"Seats: \\(floor.seats)\")\n\
    \        println(\"Engine: \\(floor.enginePosition.rawValue)\")\n        println(\"\
    Suspension: \\(suspension.suspensionType.rawValue)\")\n        println(\"Drive:\
    \ \\(drive.driveType.rawValue)\")\n    }\n}\n```\n\n我定义了一个名为`Cars`的枚举，它为我要创建的每种车型设置了值，以及一个名为`Car`的结构体，它代表一辆完整的汽车，其属性对应示例中的每种产品。`printDetails`函数将汽车设置的详细信息输出到调试控制台。\n\
    \n提示\n\n请注意，我将`String`用作此项目中所有枚举的基类型。在实际项目中你不会这样做，但在示例中它很有帮助，因为它允许我通过将原始值写入调试控制台来轻松指示选择了哪些值。\n"
- fmt: "# Understanding the Problem That the Pattern Solves\n\nIn [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html),\
    \ I showed you how the factory method pattern can be used to allow calling components\
    \ to obtain an instance of an implementation class without needing to know which\
    \ class was selected or why it was selected.\n\nThe problem for this chapter is\
    \ similar but applies to groups of related objects that do not share a common\
    \ protocol or base class. In the previous section, I defined protocols for three\
    \ car parts and created three implementation classes from them. For each of the\
    \ values in the `Cars` enumeration, I want to select the appropriate product from\
    \ each category, as shown in Table [10-2](#A978-1-4842-0394-1_10_Chapter.html#Tab2).\n\
    \n**Table 10-2.** The Car to Product Mappings\n\n| Car | Floorplan | Suspension\
    \ | Drivetrain |\n| --- | --- | --- | --- |\n| `COMPACT` | `StandardFloorplan`\
    \ | `RoadSuspension` | `FrontWheelDrive` |\n| `SPORTS` | `ShortFloorplan` | `RaceSuspension`\
    \ | `RearWheelDrive` |\n| `SUV` | `LongFloorplan` | `OffRoadSuspension` | `AllWheelDrive`\
    \ |\n\nCurrently, the only way for a component to create a car is to have knowledge\
    \ of at least part of the table in order to instantiate the classes it requires.\
    \ Listing 10-5 shows how I create the implementation objects and use them to set\
    \ the properties of a `Car` struct in the `main.swift` file.\n\n**Listing 10-5.**\
    \ The Contents of the `main.swift` File\n\n```\nvar car = Car(carType: Cars.SPORTS,\n\
    \              floor: ShortFloorplan(),\n              suspension: RaceSuspension(),\n\
    \              drive: RearWheelDrive());\ncar.printDetails();\n```\n\nYou will\
    \ see the following output in the debug console when you run the application:\n\
    \n```\nCar type: Porsche Boxter\nSeats: 2\nEngine: Mid\nSuspension: Firm\nDrive:\
    \ Rear\n```\n\nThe problem presented by this approach is just the same as the\
    \ one I faced in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html): the decision\
    \ logic for selecting which implementation classes will be diffused and duplicated\
    \ throughout the application, and dependencies are created on the existence of\
    \ individual implementation classes. If there is a change in the product mappings\
    \ in Table [10-2](#A978-1-4842-0394-1_10_Chapter.html#Tab2), then corresponding\
    \ changes will be required in all of the components that need to work with those\
    \ products. These types of changes are tedious, error-prone, and hard to test.\n\
    \n# Understanding the Abstract Factory Pattern\n\nThe abstract factory pattern\
    \ shares a common purpose with the factory method pattern, but it is used to create\
    \ groups of objects whose relationship is not expressed through a common protocol\
    \ or base class. In the case of the example application, three objects are required\
    \ to populate a `Car` struct, and each of those objects will implement a different\
    \ protocol: the `Floorplan`, `Suspension`, and `Drivetrain` protocols.\n\n## The\
    \ Factory Method vs. the Abstract Factory Patterns\n\nThere is endless debate\
    \ about the differences between the factory method and abstract factory patterns\
    \ and when each should be used. This debate is made more complicated by the way\
    \ that features of different languages change the implementation and emphasize\
    \ or hide subtle differences.\n\nMy advice is to focus on the intent and not the\
    \ implementation. If you have a product matrix like the one in Table [10-2](#A978-1-4842-0394-1_10_Chapter.html#Tab2)\
    \ and you need to make sure you don’t end up with, for example, the suspension\
    \ of a sports car being used with the floor plan of an SUV, then use the abstract\
    \ factory pattern. The abstract factory pattern hides the details of which objects\
    \ are in a group inside of concrete factory classes, which are in turn hidden\
    \ from the calling component. This extra complexity makes it easy to add new rows\
    \ to the product matrix (by creating a new concrete factory) or change the products\
    \ in an existing row (by modifying a concrete factory).\n\nThe factory method\
    \ pattern is much simpler because it deals with a single object and only has to\
    \ hide which implementation class is selected. As you will see, I implement the\
    \ abstract factory pattern by combining multiple factory methods into a single\
    \ class.\n\nSo, in short, ignore the semantic debate and focus on the goal. Use\
    \ the factory method pattern to create a single object and use the abstract factory\
    \ pattern if you are trying to manage a set of objects.\n\nThe abstract factory\
    \ pattern addresses the diffusion of the decision logic by consolidating it in\
    \ one place. The pattern addresses the dependency on specific implementation classes\
    \ by providing the calling component with access only to the protocols and not\
    \ the classes that conform to them. There are four operations in the abstract\
    \ factory pattern, as illustrated by Figure [10-1](#A978-1-4842-0394-1_10_Chapter.html#Fig1).\n\
    \n![A978-1-4842-0394-1_10_Fig1_HTML.jpg](A978-1-4842-0394-1_10_Fig1_HTML.jpg)\n\
    \n**Figure 10-1.** The abstract factory pattern\n\nThe pattern requires the use\
    \ of an abstract factory class, which defines a method that will return an implementation\
    \ of a protocol or base class. The first operation in the pattern occurs when\
    \ the calling component invokes the abstract factory method to obtain an object.\n\
    \nFor the second operation, the abstract factory method examines the request from\
    \ the calling component and selects a concrete factory class, which is a class\
    \ that implements the factory method pattern (as described in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html)).\
    \ An instance of the concrete factory class is created and returned to the caller.\n\
    \nIn the third operation, the calling component invokes the factory methods defined\
    \ by the concrete factory class. This leads to the fourth and final operation,\
    \ in which the implementation classes are instantiated to provide the calling\
    \ component with the objects it requires.\n\nWhen trying to understand this pattern,\
    \ it helps to focus on how knowledge of other classes is distributed throughout\
    \ the pattern. The concrete factory knows which implementation classes belong\
    \ together, and its methods create objects within the same group, even though\
    \ the classes implement different protocols or are derived from different base\
