    The changes seem modest, but there is a potential pitfall when applying this variation.
    The observers have to know what data type to expect to be associated with a notification,
    and the subjects have to honor that expectation.


    In the case of the example application, the subject—the `AuthenticationManager`
    class—sends the name of the user who has requested authentication expressed as
    a `String` value, and the observers have to know what type the subject uses and,
    as importantly, what that value means. The pitfall arises when two subjects use
    the same notification types with different data types or—more dangerously—use
    the same data type but intend the value to express different meanings.


    The surest way of avoiding this problem is to define subclasses for each notification
    that refine the meaning of the associated data value. This is not a guarantee
    against deliberate misuse, but it does guard against accidental problems. Listing
    22-12 shows how I have defined a notification subclass in the example application.


    Listing 22-12. Defining a Notification Subclass in the Observers.swift File


    `import Foundation;`


    `enum NotificationTypes : String {`


    `case AUTH_SUCCESS = "AUTH_SUCCESS";`


    `case AUTH_FAIL = "AUTH_FAIL";`


    `case SUBJECT_CREATED = "SUBJECT_CREATE";`


    `case SUBJECT_DESTROYED = "SUBJECT_DESTROYED";`


    `}`


    `class Notification {`


    `let type:NotificationTypes;`


    `let data:Any?;`


    `init(type:NotificationTypes, data:Any?) {`


    `self.type = type; self.data = data;`


    `}`


    `}`


    `class AuthenticationNotification: Notification {`


    `init(user:String, success:Bool) {`


    `super.init(type: success ? NotificationTypes.AUTH_SUCCESS`


    `: NotificationTypes.AUTH_FAIL, data: user);`


    `}`


    `var userName : String? {`


    `return self.data? as String?;`


    `}`


    `var requestSuccessed : Bool {`


    `return self.type == NotificationTypes.AUTH_SUCCESS;`


    `}`


    `}`


    `protocol Observer : class {`


    `func notify(notification:Notification);`


    `}`


    `protocol Subject {`


    `func addObservers(observers:Observer...);`


    `func removeObserver(observer:Observer);`


    `}`


    `class SubjectBase : Subject {`


    `// ...statements omitted for brevity...`


    `}`


    I have changed `Notification` from a `struct` to a class so that I can derive
    the `AuthenticationNotification` class from it and define computed properties
    that present the property values in a more useful manner.


    You can create more specialized versions of the `Observer` protocol that deliver
    only notification-specific objects, but I find that implementation classes that
    receive multiple notification types from multiple subjects quickly become complex
    to implement and test. Instead, I prefer to use a general-purpose `Observer` protocol
    and have the implementation classes test to see which types they receive, as shown
    in Listing 22-13.


    Listing 22-13. Receiving a Notification-Specific Object in the SystemComponents.swift
    File


    `...`


