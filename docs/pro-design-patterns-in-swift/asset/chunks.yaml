    \n### 更新产品数据存储\n\n`ProductDataStore`类为应用其他部分提供产品数据，这是集成代理的自然切入点，用以替代当前直接访问`NetworkConnection`和`NetworkPool`类的方式。清单\
    \ 18-15 展示了如何更新`ProductDataStore`类，使其从代理获取初始库存数据。\n\n**清单 18-15.** 在`ProductDataStore.swift`文件中集成代理\n\
    \n```\nimport Foundation\n\nfinal class ProductDataStore {\n    var callback:\
