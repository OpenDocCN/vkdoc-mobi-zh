  trans: '

    # 27. 模型/视图/控制器模式


    模型/视图/控制器（MVC）模式近年来日益普及，是现代软件开发（包括 iOS 应用项目）的重要基础。本章将介绍 MVC 模式的背景，阐述其重要性，并说明它与我书中其他设计模式的关系。表
    27-1 对 MVC 模式进行了背景说明。


    **表 27-1. MVC 模式背景说明**


    | 问题 | 答案 |

    | --- | --- |

    | 这是什么？ | MVC 模式为整个应用程序，而非单个组件，增加了结构。 |

    | 有什么好处？ | 应用程序的各部分可以更轻松地进行开发、测试和维护。 |

    | 何时使用此模式？ | 任何复杂项目都适合使用此模式。 |

    | 何时应避免使用此模式？ | 对于短期或简单项目，实施此模式所需的规划和基础设施成本不划算。 |

    | 如何判断是否正确实施了该模式？ | 实施 MVC 模式很大程度上依赖判断和个人偏好，因此很难给出确切的判断标准。通常来说，应用程序的各个部分（模型、视图和控制器）应松散耦合，以便能够轻松独立出来进行测试，并且对某一部分的实现进行更改时，无需对其他部分进行相应修改。
    |

    | 有哪些常见陷阱？ | 唯一陷阱是将功能放入错误的部分，导致实施效果欠佳。判断正确的部分取决于经验和偏好，很少有绝对的对错之分。 |

    | 有哪些相关模式？ | MVC 模式的实现通常依赖于本书其他章节描述的模式。 |


    ## 准备示例项目


    在本章中，我创建了一个名为 `MVC` 的 Xcode OS X 命令行工具项目。除了创建项目外，无需其他准备工作。


    ## 理解该模式解决的问题


    MVC 模式为项目增加结构，以简化开发、测试和维护。然而，MVC 模式并非专注于特定对象或类型之间的关系或交互，而是应用于整个应用程序。


    ## 理解 MVC 模式


    如果你有空闲时间且想做个实验，可以找两三个开发者，请他们描述 MVC 模式。深入了解细节后，你会发现关于 MVC 模式的两个重要事实。第一个事实是，每位开发者对
    MVC 模式的理解都不同。第二个事实是，大多数开发者对 MVC 的理解由一系列模糊的概念组成，通常围绕“关注点分离”这一说法展开。


    MVC 模式在不同平台和框架中的表现形式极其多样。使用微软 MVC 框架构建过 Web 应用的开发者，与使用苹果 `UIKit` 框架构建过 iOS 应用的开发者，他们的理解会有所不同。这两个框架都遵循
    MVC 模式，但在如何安排组件以构建设计良好的应用程序方面，却有着不同的视角。而且，构建 Web 应用所需的组件与构建 iOS 应用所需的组件不同，这导致了更多差异。MVC
    模式有如此多的不同表现形式和变体，难怪十几个开发者会得出（至少）十几种不同的解释。


    **注意**


    争论 MVC 模式的应用，是任何不想写代码的开发者首选的消遣活动。如果不加以控制，这种争论可能会导致你成为软件架构师，极端情况下甚至成为企业架构师。作为一个曾领导过一些全球最大公司的企业架构工作的人，我只想说，写代码远比整天谈论代码有趣得多。


    MVC 模式的核心是关注点分离，这就是为什么这个短语经常被提及。关注点分离就是将应用程序的不同部分彼此分开，目的是让这些部分更容易开发、维护和测试。


    此时，关注点分离对你来说应该是一个熟悉的概念，因为它是我在本书中描述的许多设计模式中共同的主题。MVC 模式遵循在应用程序中使用四个不同部分的惯例：


    -   模型（Model），即 MVC 中的 M。模型包含应用程序的数据。

    -   视图（View），即 MVC 中的 V。视图根据模型生成输出，显示给用户。

    -   控制器（Controller），即 MVC 中的 C。控制器响应用户交互，并负责更新模型和视图，以反映应用程序状态的变化。

    -   横切关注点（Cross-cutting concerns）。正如你将了解到的，并非所有内容都能完美地归入模型的模型、视图和控制器部分，横切关注点是跨越两个或多个其他部分的应用程序部分。


    正如你将了解到的，当将模式应用于实际项目时，我为 MVC 模式每个部分给出的清晰定义会变得模糊得多，但牢记这些简单的定义会有所帮助，理解各个部分之间的交互也是如此，如图
    27-1 所示。


    ![A978-1-4842-0394-1_27_Fig1_HTML.jpg](img/A978-1-4842-0394-1_27_Fig1_HTML.jpg)


    **图 27-1. 模型/视图/控制器模式**


    用户的交互由控制器接收，控制器包含更新模型中数据以反映交互所需的逻辑。更新后的应用程序状态由控制器传递给视图，视图生成显示给用户的表示，反映原始交互的效果。


    举一个简单的例子，想象一个显示姓名列表的应用程序。一切都得有个开头，所以用户的第一个指令是列出所有姓名。这将产生以下序列：

    '
- fmt: '控制器接收来自用户的指令。控制器向模型请求所有名称。模型从其存储机制中获取所请求的数据并将其返回给控制器。控制器将名称列表提供给视图，并请求其向用户呈现这些名称。视图生成列表的表示以及可对其执行的命令的详细信息。


    每个交互都会执行相同的基本操作序列。假设用户执行从列表中删除名称的操作。以下是执行的操作序列：


    控制器接收来自用户的指令，其中包含要删除的名称的详细信息。控制器请求模型删除指定的名称。模型从存储机制中删除该名称，并将修改后的列表返回给控制器。控制器将修订后的名称列表提供给视图，并请求其向用户呈现这些名称。视图生成列表的表示以及可对其执行的命令的详细信息。


    关注点分离意味着应用程序的每个部分都有特定的角色，并与其他部分有明确界定的关系。每个部分都依赖其他部分来执行其角色，但对其实现方式没有任何了解或依赖，这意味着一个部分的实现可以更改，而无需对其他部分进行相应更改。最好的例子是模型用于持久化存储应用程序数据的机制。这通常是一个关系数据库，但具体是哪一个以及数据如何表示是模型实现的一部分，并且对控制器和视图部分完全不可知。关系数据库可以替换为完全不同的存储类型，而无需对控制器进行任何更改（控制器仅处理数据对象，不关心它们如何存储），也无需对视图进行任何更改（视图根本不直接与模型交互）。


    ### 理解MVC应用程序的组成部分


    应用MVC模式起初可能是一个令人生畏的过程，但如果你始终关注MVC模式试图实现的目标，就不必如此。MVC模式的目标——与本书中描述的所有设计模式一样——是创建更易于编写、修改和维护的代码。实现这一目标是在实施MVC模式时唯一的宗旨。它不是为了遵从他人对MVC含义的僵化定义。关于如何决定应用程序的哪些部分属于模型、视图和控制器部分，并没有固定的规则——只有指导原则，你需要根据这些原则做出最佳判断。


    与本书中描述的所有模式一样，有效应用MVC需要灵活性和对当前项目的适应。应用程序中的某些部分会比其他部分更容易处理，但每个项目都有一些功能或特性可以合理地放置在至少两个部分中。


    > **提示**

    >

    > 如果以下部分不能立即理解，请不要担心。理解MVC模式的结构可能需要一些时间。你可能会发现我在“实现MVC模式”部分创建的简单示例应用程序有助于将一些概念置于上下文中。


    #### 理解模型


    模型包含用户处理的数据。模型有两种广泛的类型。第一种模型类型是领域模型（`domain model`），它包含应用程序数据以及用于创建、存储和操作这些数据的操作、转换和规则，这些统称为模型逻辑（`model
    logic`）。这是图[27-1](A978-1-4842-0394-1_27_Chapter.html#Fig1)中所示的模型类型，通常是提到“模型”一词时所指的对象。


    许多刚接触MVC模式的开发人员会对在数据模型中包含逻辑感到困惑，认为MVC模式的目标是将数据与逻辑分离。这是一种误解；MVC框架的目标是将应用程序划分为三个功能区域，每个区域都可能包含逻辑和数据。目标不是从模型中消除逻辑。相反，是确保模型仅包含用于创建和管理模型数据的逻辑。使用MVC模式构建的应用程序中的领域模型应执行以下操作：


    *   包含领域数据

    *   包含用于创建、管理和修改领域数据的逻辑（即使这意味着通过Web服务执行远程逻辑）

    *   提供一个干净的API，用于暴露模型数据及其操作


    领域模型不应执行以下操作：


    *   暴露模型数据的获取或管理方式的细节（即，数据存储机制或远程Web服务的细节不应暴露给控制器和视图）

    *   包含基于用户交互转换模型的逻辑（这是控制器的工作）

    *   包含向用户显示数据的逻辑（这是视图的工作）


    确保领域模型与控制器和视图隔离的好处是，你可以更轻松地测试逻辑，并且增强和维护整个应用程序更简单、更容易。


    **搞错方向**


    许多开发人员对应用MVC模式犹豫不决，因为他们担心“搞错方向”，这通常意味着将特性放到了错误的部分。换句话说，本应属于控制器的代码最终出现在了视图中。


    我的建议是不要担心。直接开始尝试，并尽快犯错误。你能够对MVC模式形成扎实理解的唯一方法是权衡关于特定应用程序结构的决策，当你做出后来意识到会做出不同选择的决定时，同样会学到很多东西。


    代码是流动且可塑的，在大多数项目中你都有机会重构应用程序。这可能是一个繁琐的过程，但这不是世界末日，也能给你带来有用的见解。即使你没有时间重构也不必担心，因为你希望修改的决定的影响很小，而且大多数“错误”的决定实际上只是与你不断变化的偏好和经验相悖的决定。


    第二种模型是视图模型（`view model`），它表示从控制器传递给视图的数据，以便向用户呈现。通常，视图模型只是领域模型数据的一个子集，例如查询结果，但视图模型也可以包含视图需要的、不属于领域模型的额外信息，例如关于当前用户会话状态的提示。


    #### 理解控制器


    控制器是MVC应用中的连接组织，负责响应用户交互，并在模型和视图之间充当管道。使用MVC构建的控制器应执行以下操作：


    *   包含初始化模型所需的逻辑

    *   包含视图呈现模型数据所需的逻辑/行为

    *   包含基于用户交互更新模型所需的逻辑/行为


    控制器不应执行以下操作：


    *   包含向用户显示数据的逻辑（这是视图的工作）

    *   包含管理数据持久化的逻辑（这是模型的工作）

    *   在范围之外操作数据


    控制器实现应用程序的逻辑，通常称为领域逻辑（`domain logic`）或业务逻辑（`business logic`）。此逻辑被分解为用户可以调用的操作（`actions`）或命令（`commands`），这些操作对模型执行操作，然后使用视图向用户呈现操作的效果。'
  raw: 'The controller receives the instruction from the user.   The controller asks
    the model for all of the names.   The model obtains the requested data from its
    storage mechanism and returns it to the controller.   The controller gives the
    list of names to the view and asks it to present them to the user.   The view
    generates a representation of the list along with details of the commands that
    can be performed on it.


    The same basic sequence of actions is played out for every interaction. Imagine
    that the user performs the action to delete a name from the list. Here is the
    sequence of actions that plays out:


    The controller receives the instruction from the user, which includes details
    of the name to be deleted.   The controller asks the model to delete the specified
    name.   The model deletes the name from its storage mechanism and returns the
    modified list to the controller.   The controller gives the revised list of names
    to the view and asks it to present them to the user.   The view generates a representation
    of the list along with details of the commands that can be performed on it.


    The separation of concerns means that each section of the application has a particular
    role and well-defined relationship with the other sections. Each section relies
    on the others to perform its role but doesn’t have any knowledge or dependency
    on how it is implemented, which means that the implementation of one section can
    be changed without requiring corresponding changes in the other sections. The
    best example of this is the mechanism that the model uses to persistently store
    the application’s data. This is typically a relational database, but details of
    which one and how the data is represented are part of the model’s implementation
    and are entirely unknown to the controller and view sections. The relational database
    could be replaced with a completely different type of storage without requiring
    any changes to the controller, which just deals with data objects and doesn’t
    care how they are stored, or to the view, which doesn’t directly interact with
    the model at all.


    ### Understanding the MVC Application Sections


    Applying the MVC pattern can be an intimidating process at first, but it need
    not be if you keep focused on what the MVC pattern tries to achieve. The goal
    of the MVC pattern—like all of the design patterns I have described in this book—is
    to create code that is simpler to write, modify, and maintain, and achieving this
    goal is your only objective when implementing the MVC pattern. It is not to conform
    to someone else’s rigid definition of what MVC means. There are no fixed rules
    about how to decide which bits of an application belong in the model, view, and
    controller sections—just guidelines that you have to interpret to make the best
    judgments you can.


    Like all of the patterns I have described in this book, applying MVC effectively
    requires flexibility and adaptations to the current project. Some pieces of an
    application will be easier to deal with than others, but every project has some
    features or functions that could reasonably be placed in at least two sections.


    Tip


    Don’t worry if these following sections don’t make immediate sense. It can take
    a while to process the structure of the MVC pattern. You may find the simple example
    application that I create in the “Implementing the MVC Pattern” section helpful
    for putting some of the ideas into context.


    #### Understanding the Model


    Models contain the data that users work with. There are two broad types of model.
    The first model type is the domain model, which contains the application data
    along with the operations, transformations, and rules for creating, storing, and
    manipulating that data, collectively referred to as the model logic. This is the
    kind of model shown in Figure [27-1](#A978-1-4842-0394-1_27_Chapter.html#Fig1)
    and is what usually is being referred to when the word model is used.


    Many developers new to the MVC pattern get confused with the idea of including
    logic in the data model, believing that the goal of the MVC pattern is to separate
    data from logic. This is a misapprehension; the goal of the MVC framework is to
    divide an application into three functional areas, each of which may contain both
    logic and data. The goal isn’t to eliminate logic from the model. Rather, it is
    to ensure that the model contains only the logic for creating and managing the
    model data. The domain model in an application built using the MVC pattern should
    do the following:


    *   Contain the domain data

    *   Contain the logic for creating, managing, and modifying the domain data (even
    if that means executing remote logic via web services)

    *   Provide a clean API that exposes the model data and operations on it


    The domain model should not do the following:


    *   Expose details of how the model data is obtained or managed (that is, details
    of the data storage mechanism or the remote web service should not be exposed
    to controllers and views)

    *   Contain logic that transforms the model based on user interaction (this is
    the controller’s job)

    *   Contain logic for displaying data to the user (this is the view’s job)


    The benefit of ensuring that the domain model is isolated from the controller
    and views is that you can test your logic more easily and that enhancing and maintaining
    the overall application is simpler and easier.


    GETTING IT WRONG


    Many developers are hesitant to apply the MVC pattern because they worry about
    “getting it wrong,” which generally means putting features into the wrong section.
    In other words, code that belongs in a controller ends up in a view.


    My advice is not to worry. Dive right in and start making mistakes as quickly
    as you can. The only way you can develop a solid understanding of the MVC pattern
    is to weigh the decisions about the structure of specific applications, and you
    learn just as much when you make decisions that you later come to realize you
    would make differently.


    Code is fluid and malleable, and in most projects you will have the opportunity
    to refactor the application. This can be a tedious process, but it isn’t the end
    of the world and can give you useful insights as well. Don’t worry even if you
    don’t have time to refactor because the impact of a decision you would like to
    revise is minimal, and most “wrong” decisions are really decisions that run counter
    to your evolving preferences and experiences.


    The second kind of model is the view model, which represents data passed from
    the controller to the view in order that it can be represented to the user. Usually,
    view models are just a subset of the data in the domain model, such as the results
    of a query, but a view model can also contain extra information that the view
    needs that is not part of the domain model, such as hints about the state of the
    current user session.


    #### Understanding Controllers


    Controllers are the connective tissue in an MVC application, responding to user
    interaction and acting as a conduit between the model and views. A controller
    built using the MVC should do the following:


    *   Contain the logic required to initialize the model

    *   Contain the logic/behaviors required by the view to present data from the
    model

    *   Contain the logic/behaviors required to update the model based on user interaction


    The controller should not do the following:


    *   Contain logic that displays data to the user (that is the job of the view)

    *   Contain logic that manages the persistence of data (that is the job of the
    model)

    *   Manipulate data outside of the scope


    Controllers implement the logic of the application, often referred to as the domain
    logic or the business logic. This logic is broken up into actions or commands
    that the user can invoke, which perform operations on the model and then use a
    view to represent the effect of the action to the user.'
