- fmt: "### Understanding Views\n\nViews are responsible for displaying a view model\
    \ to the user. The means by which this is done varies, and it can be anything\
    \ from generating an HTML page to creating or updating a set of `UIKit` components,\
    \ depending on the application.\n\nViews are usually created using a framework,\
    \ such as `UIKit`, because creating the infrastructure required to display data\
    \ is a complex process and does not need to be re-created from scratch for every\
    \ application. Views should do the following:\n\n* Contain the logic and markup\
    \ required to present data to the user\n\nViews should not do the following:\n\
    \n* Contain complex logic (this is better placed in a controller)\n* Contain logic\
    \ that creates, stores, or manipulates the model\n\nViews can contain logic, but\
    \ it should be simple and used sparingly. Putting anything but the most simple\
    \ method calls or expressions in a view makes the overall application harder to\
    \ test and maintain.\n\n### Understanding Cross-Cutting Concerns\n\nCross-cutting\
    \ concerns are those parts of the application that do not fit into the other sections.\
    \ The classic examples are logging and authorization, which are generally required\
    \ throughout an application. It doesn’t make sense to create duplicate logging\
    \ or security features for different sections, and so a single implementation\
    \ is used by multiple sections so that, for example, once a user has been authenticated,\
    \ the user’s identity is propagated through the different sections without the\
    \ need for further verification.\n\nThe danger with cross-cutting concerns is\
    \ that features and functions that more properly belong in the model, view, or\
    \ controller end up being defined as cross-cutting concerns, distorting the shape\
    \ of the application and undermining the clean separation between the sections\
    \ of the application.\n\nThere are few genuine cross-cutting concerns in any application,\
    \ which means that once you have implemented logging and security, you should\
    \ treat any other features implemented as cross-cutting concerns with suspicion\
    \ and consider whether the feature may actually belong in the model, view, or\
    \ controller.\n\n## Implementing the MVC Pattern\n\nThe best way to learn about\
    \ the MVC pattern is to implement it. The more experience you have in separating\
    \ the concerns in an application into models, views, and controllers, the more\
    \ natural the process will become. In the sections that follow, I am going to\
    \ use the MVC pattern to create a simple command-line application. I walk through\
    \ the process and explain the decisions I made along the way. As I explained earlier,\
    \ the MVC pattern leaves a lot of room for personal style and interpretation,\
    \ and inevitably the implementation will reflect the way that I think about software\
    \ and development and be shaped by the kinds of projects I usually work on. This\
    \ doesn’t mean you should slavishly follow my techniques. Instead, you should\
    \ feel free to follow your own path and make the decisions that have the most\
    \ beneficial impact in your development environment and on the kinds of projects\
    \ you develop.\n\nThe example application will manage a list of people and the\
    \ cities they live in. This isn’t especially useful as an application in its own\
    \ right, but there is just enough complexity to allow me to implement the MVC\
    \ pattern without the application features getting in the way.\n\n### Defining\
    \ the Common Code\n\nIn any project, there are functions that you need to use\
    \ throughout an application. Common code isn’t the same thing as a cross-cutting\
    \ concern. As a rule of thumb, functions and static methods that you define to\
    \ avoid duplication are common code; features that have common state across sections\
    \ are cross-cutting concerns.\n\nI started defining the application by defining\
    \ extensions that I will rely on to manipulate strings into arrays, to remove\
    \ duplicate objects in arrays, and to find the first object in an array that matches\
    \ a specified test. I added a file called `Extensions.swift` to the example project,\
    \ the contents of which are shown in Listing 27-1.\n\n**Listing 27-1.** The Contents\
    \ of the `Extensions.swift` File\n\n```\nimport Foundation\n\nextension String\
    \ {\n\nfunc split() -> [String] { \nreturn self.componentsSeparatedByCharactersInSet(\n\
    NSCharacterSet.whitespaceAndNewlineCharacterSet())\n.filter({$0 != \"\"});\n}\n\
    \n}\n\nextension Array {\n\nfunc unique<T: Equatable>() -> [T] {\nvar uniqueValues\
    \ = [T]();\nfor value in self {\nif !contains(uniqueValues, value as T) {\nuniqueValues.append(value\
    \ as T);\n}\n}\nreturn uniqueValues;\n}\n\nfunc first<T>(test:T -> Bool) -> T?\
    \ {\nfor value in self {\nif test(value as T) {\nreturn value as? T;\n}\n}\nreturn\
    \ nil;\n}\n\n}\n```\n\nThese extensions are not related to the structure of the\
    \ MVC pattern, and I have defined them to avoid code duplication in the project.\n\
    \n### Defining the Framework\n\nThe model, views, and controllers do not exist\
    \ in isolation. They need a framework of some sort to connect the sections to\
    \ one another, to receive and process interactions from the user, and to display\
    \ content on the screen. Without an underlying framework, every application would\
    \ have to re-create the same set of low-level functions, which would be extremely\
    \ tedious. As a Swift developer, the frameworks that you are likely to use most\
    \ often are `UIKit` and `AppKit`, which include all of the low-level features,\
    \ such as translating mouse clicks into events and drawing complex UI components\
    \ on the screen.\n\nThere is no handy MVC framework for Command Line Tool projects,\
    \ so I am going to have to create one. This would be a serious (and unwise) undertaking\
    \ in a real project, but one of the advantages of book examples is simplicity,\
    \ and creating a basic framework is a useful means of demonstrating how the sections\
    \ of the MVC pattern fit together.\n\nThe example application will read commands\
    \ from the Xcode console, which will also be used to display data to the user.\
    \ Listing 27-2 shows the contents of the `Commands.swift` file, which I have used\
    \ to define the commands that the application will support.\n\n**Listing 27-2.**\
    \ The Contents of the `Commands.swift` File\n\n```\nimport Foundation\n\nenum\
    \ Command : String { \ncase LIST_PEOPLE = \"L: List People\";\ncase ADD_PERSON\
    \ = \"A: Add Person\";\ncase DELETE_PERSON = \"D: Delete Person\";\ncase UPDATE_PERSON\
    \ = \"U: Update Person\";\ncase SEARCH = \"S: Search\";\n\nstatic let ALL = [Command.LIST_PEOPLE,\
    \ Command.ADD_PERSON,\nCommand.DELETE_PERSON, Command.UPDATE_PERSON, Command.SEARCH];\n\
    \nstatic func getFromInput(input:String) -> Command? {\nswitch (input.lowercaseString)\
    \ {\ncase \"l\":\nreturn Command.LIST_PEOPLE;\ncase \"a\":\nreturn Command.ADD_PERSON;\n\
    case \"d\":\nreturn Command.DELETE_PERSON;\ncase \"u\":\nreturn Command.UPDATE_PERSON;\n\
    case \"s\":\nreturn Command.SEARCH;\ndefault:\nreturn nil;\n}\n}\n}\n```\n\nThe\
    \ `Command` enumeration defines values for each of the commands that the application\
    \ will support, allowing the user to list all of the people in the application,\
    \ add or delete people, modify a person’s detail, and perform a simple search.\n\
    \nSwift enumerations don’t make it easy to get a list of all defined values, so\
    \ I have defined a static constant called `ALL`, which is set to an array of the\
    \ enumeration values. I have also defined a static method called `getFromInput`,\
    \ which maps a `String` to an enumeration value. I’ll use the `getFromInput` method\
    \ to select a command based on values read from the command line."
