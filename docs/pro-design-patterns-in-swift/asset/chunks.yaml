- fmt: "第二个问题涉及处理对象池耗尽前到达的未完成请求。发起请求的线程将等待GCD信号量，并在收到信号前持续等待。不幸的是，GCD信号量没有提供唤醒所有等待线程的方法，因此我在实现`flushQueue`方法时不得不采用间接方式。\n\
    \n我创建了一个独立的GCD队列，并向其中添加了两个块。第一个块等待信号量，当信号量允许其通过时，将名为`backlogCleared`的局部变量设置为`true`。\n\
    \n```\ndispatch_async(dQueue, {() in\n    dispatch_semaphore_wait(self.semaphore,\
    \ DISPATCH_TIME_FOREVER);\n    backlogCleared = true;\n});\n```\n\nGCD信号量允许线程按先进先出顺序通过，这意味着在对象池耗尽前到达的所有等待请求都被允许通过之前，这个块将无法通过信号量。\n\
    \n第二个块重复发送信号量，直到`backlogCleared`属性的值发生变化。\n\n```\ndispatch_async(dQueue, {() in\n\
    \    while (!backlogCleared) {\n        dispatch_semaphore_signal(self.semaphore);\n\
    \    }\n});\n```\n\n我添加这些块的队列是并发的，信号量将持续发送直到积压清除。我希望防止正在等待信号量的调用向数组修改队列添加块，这就是为什么在`getFromPool`方法中等待信号量前后检查`poolExhausted`属性的值。\n\
    \n```\nif (!poolExhausted) {\n    if (dispatch_semaphore_wait(semaphore, waitTime)\
    \ == 0) {\n        if (!poolExhausted) {\n            ...\n```\n\n为了更轻松地测试新功能，我将`getFromPool`方法中`maxWaitSeconds`参数的默认值改为`-1`；仅在对象池耗尽时请求才会被拒绝。运行应用程序，你会看到与之前示例类似的输出——但这种实现方式防止了愿意等待对象的调用者在对象池耗尽时被锁定。\n\
    \n#### 创建弹性对象池\n\n如果对象池能够根据需要创建所需数量的对象，则不必拒绝请求。这被称为弹性对象池，它适用于有首选数量和单独最大数量的场景。\n\
    \n在软件开发方面，弹性对象池可用于任何通过创建额外对象来应对需求增长的场景。一个常见例子是网络连接，在正常操作时有首选连接数，在高峰期有一定余量。\n\n\
    从现实图书馆的角度看，热门书籍的高峰需求可以通过从附近分馆借书来满足。这并非理想方案，因为它会降低图书馆网络其他地方的可用性，但意味着在特殊情况下无需长时间等待就能满足借书请求。为了将这个场景映射到我的示例中，我在`BookSources.swift`文件中添加了一个名为`LibraryNetwork`的类，如代码清单8-12所示。\n\
    \n**代码清单8-12. BookSources.swift文件内容**\n\n```swift\nimport Foundation\n\nclass\
    \ BookSeller {\n    class func buyBook(author:String, title:String, stockNumber:Int)\
    \ -> Book {\n        return Book(author: author, title: title, stock: stockNumber);\n\
    \    }\n}\n\nclass LibraryNetwork {\n    class func borrowBook(author:String,\
    \ title:String, stockNumber:Int) -> Book {\n        return Book(author: author,\
    \ title: title, stock: stockNumber);\n    }\n    class func returnBook(book:Book)\
    \ {\n        // do nothing\n    }\n}\n```\n\n`LibraryNetwork`类是一个占位符，用于演示临时获取额外书籍。我不会在这个类中实现任何逻辑，因为我的重点是对象池。代码清单8-13展示了如何在`Pool`类中实现弹性。\n\
    \n**代码清单8-13. 在Pool.swift文件中添加对象弹性**\n\n```swift\nimport Foundation\n\nclass Pool<T:AnyObject>\
    \ {\n    private var data = [T]();\n    private let arrayQ = dispatch_queue_create(\"\
    arrayQ\", DISPATCH_QUEUE_SERIAL);\n    private let semaphore:dispatch_semaphore_t;\n\
    \    private let itemFactory: () -> T;\n    private let peakFactory: () -> T;\n\
    \    private let peakReaper:(T) -> Void;\n    private var createdCount:Int = 0;\n\
    \    private let normalCount:Int;\n    private let peakCount:Int;\n    private\
    \ let returnCount:Int;\n    private let waitTime:Int;\n    \n    init(itemCount:Int,\
    \ peakCount:Int, returnCount: Int, waitTime:Int = 2,\n        itemFactory:() ->\
    \ T, peakFactory:() -> T, reaper:(T) -> Void) {\n        self.normalCount = itemCount;\
    \ self.peakCount = peakCount;\n        self.waitTime   = waitTime; self.returnCount\
    \ = returnCount;\n        self.itemFactory = itemFactory; self.peakFactory = peakFactory;\n\
    \        self.peakReaper  = reaper;\n        self.semaphore   = dispatch_semaphore_create(itemCount);\n\
    \    }\n    \n    func getFromPool() -> T? {\n        var result:T?;\n       \
    \ let expiryTime = dispatch_time(DISPATCH_TIME_NOW,\n            (Int64(waitTime)\
    \ * Int64(NSEC_PER_SEC)));\n        if (dispatch_semaphore_wait(semaphore, expiryTime)\
    \ == 0) {\n            dispatch_sync(arrayQ, {() in\n                if (self.data.count\
    \ == 0) {\n                    result = self.itemFactory();\n                \
    \    self.createdCount++;\n                } else {\n                    result\
    \ = self.data.removeAtIndex(0);\n                }\n            })\n        }\
    \ else {\n            dispatch_sync(arrayQ, {() in\n                result = self.peakFactory();\n\
    \                self.createdCount++;\n            });\n        }\n        return\
    \ result;\n    }\n    \n    func returnToPool(item:T) {\n        dispatch_async(arrayQ,\
    \ {() in\n            if (self.data.count > self.returnCount\n               \
    \ && self.createdCount > self.normalCount) {\n                self.peakReaper(item);\n\
    \                self.createdCount--;\n            } else {\n                self.data.append(item);\n\
    \                dispatch_semaphore_signal(self.semaphore);\n            }\n \
    \       });\n    }\n    \n    func processPoolItems(callback:[T] -> Void) {\n\
    \        dispatch_barrier_sync(arrayQ, {() in\n            callback(self.data);\n\
    \        });\n    }\n}\n```\n\n> **注意**：我已移除处理对象池耗尽和剔除对象的代码，以简化示例，并且这些功能通常不与弹性一起使用（因为代码会变得复杂且难以维护）。"
  raw: 'The second problem is dealing with the outstanding requests for objects that
    arrived before the pool became exhausted. The threads making the requests will
    be waiting for the GCD semaphore and will continue to do so until they are signaled.
    Unfortunately, the GCD semaphore doesn’t provide a means for me to wake up all
    of the waiting threads, so I have had to take an indirect route when implementing
    the `flushQueue` method.


    I create a separate GCD queue and add two blocks to it. The first block waits
    for the semaphore and sets the value of a local variable called `backLogCleared`
    to `true` when the semaphore lets it pass.


    `...`


    `dispatch_async(dQueue, {() in`


    `dispatch_semaphore_wait(self.semaphore, DISPATCH_TIME_FOREVER);`


    `backlogCleared = true;`


    `});`


    `...`


    GCD semaphores allow threads to pass in first-in first-out (FIFO) order, which
    means that this block won’t be allowed to pass the semaphore until all of the
    waiting requests that arrived before the queue was exhausted have also been allowed
    to pass.


    The second block repeatedly signals the semaphore until the value of the `backLogCleared`
    property changes.


    `...`


    `dispatch_async(dQueue, {() in`


    `while (!backlogCleared) {`


    `dispatch_semaphore_signal(self.semaphore);`


    `}`


    `});`


    `...`


    The queue to which I add these blocks is concurrent, and the semaphore will be
    signaled until the backlog is cleared. I want to prevent calls that were waiting
    for the semaphore from adding blocks to the array modification queue, which is
    why I check the value of the `poolExhausted` property before and after waiting
    for the semaphore in the `getFromPool` method.


    `...`


    `if (!poolExhausted) {`


    `if (dispatch_semaphore_wait(semaphore, waitTime) == 0) {`


    `if (!poolExhausted) {`


    `...`


    I changed the default value of the `maxWaitSeconds` parameter in the `getFromPool`
    method to `-1` to test the new functionality easier; a request for an object will
    be rejected only when the pool is exhausted. Run the application, and you will
    see output similar to the previous example—but this implementation of the code
    prevents callers who are willing to wait for an object being locked up when the
    pool is exhausted.


    #### Creating an Elastic Pool


    You don’t have to reject requests for objects if the pool is able to create the
    number it needs to meet demand. This is known as an elastic pool, and it can be
    used where there is a preferred number of objects and a separate maximum number.


    In terms of software development, elastic pools can be used in any situation where
    it is feasible to create additional objects to cope with increased demand. A common
    example is network connections, where there is a preferred number of connections
    for normal operation and some headroom for peak periods.


    In terms of a real-world library, peak demand for a popular title may be satisfied
    by borrowing books from nearby branches. This isn’t ideal because it reduces availability
    elsewhere in the library network, but it means that requests for books can be
    satisfied without long waits under exceptional circumstances. To map this into
    my example, I have added a class called `LibraryNetwork` to the `BookSources.swift`
    file, as shown in Listing 8-12.


