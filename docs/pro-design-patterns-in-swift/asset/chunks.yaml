    }\n```\n\n在这个列表中，我执行了与列表 6-11 相反的操作：我获取了一组异步块，并强制它们按顺序串行执行，以确保在任何时候只有一个块调用数组的\
    \ `append` 方法。\n\n这看起来可能有些自相矛盾，但在实际应用中，多个组件会创建这些块，而不是单个 `for` 循环。这些组件无法协调它们的活动，通常也不了解彼此，因此，单例模式就需要承担起保护其所依赖资源的责任。\n\
    \n## 理解 Grand Central Dispatch——第二部分\n\n在列表 6-12 中，我使用 `dispatch_queue_create`\
    \ 函数创建了一个队列，如下所示：\n\n```\n...\nprivate let arrayQ = dispatch_queue_create(\"arrayQ\"\
    , DISPATCH_QUEUE_SERIAL);\n...\n```\n\n第一个参数是队列的名称，第二个参数——`DISPATCH_QUEUE_SERIAL`\
    \ 值——指定了将从队列中取出块并逐一执行，也就是说，在前一个块完成之前，不会开始执行下一个块。\n\n在 `backup` 方法中，我使用 `dispatch_sync`\
    \ 函数将块添加到队列中。\n\n```\n...\ndispatch_sync(arrayQ, {() in\n    self.data.append(item);\n\
    \    globalLogger.log(\n        \"\\(self.name) backed up item of type \\(item.type.toRaw())\"\
    );\n})\n...\n```\n\n`dispatch_sync` 函数与我在列表 6-11 中使用的 `dispatch_group_async` 函数一样，都会将工作添加到队列中，但它会等待块执行完毕后才返回，而\
    \ `dispatch_group_async` 函数则会立即返回，将块留待将来某个时刻到达队列前端时再执行。（它也不指定组。`dispatch_sync`\
    \ 的异步等价物是 `dispatch_async`。）\n\n用于将块添加到方法中的函数并不影响块的执行方式——影响的只是函数在将块添加到队列后是立即返回，还是阻塞直到块被处理完毕。\n\
    \n我所创造的效果是：调用 `backup` 方法是一个同步操作，它只有在数据被添加到数组后才会返回，并且由于我指定了一个串行队列，这意味着该方法必须等到队列中所有排在前面的备份任务都处理完毕后才会返回。\n\
    \n我在列表 6-12 中所做的更改确保了 `BackupServer` 单例中使用的数组受到保护，但 `backup` 方法使用了 `Logger` 类，这同样带来了类似的问题。尽管对\
    \ `log` 方法的调用在 `BackupServer` 类内部是串行化的，但其他组件仍可能同时使用该单例并调用 `log` 方法，这将导致我之前描述的那类数据损坏。为了完整性，我使用\
    \ GCD 保护了 `Logger` 类中的数据数组，如列表 6-13 所示。\n\n**列表 6-13.** 在 `Logger.swift` 文件中添加并发保护\n\
    \n```\nimport Foundation;\n\nlet globalLogger = Logger();\n\nfinal class Logger\
    \ {\n    private var data = [String]()\n    private let arrayQ = dispatch_queue_create(\"\
    arrayQ\", DISPATCH_QUEUE_SERIAL);\n    private init() {\n        // do nothing\
    \ - required to stop instances being\n        // created by code in other files\n\
    \    }\n    func log(msg:String) {\n        dispatch_sync(arrayQ, {() in\n   \
    \         self.data.append(msg);\n        });\n    }\n    func printLog() {\n\
    \        for msg in data {\n            println(\"Log: \\(msg)\");\n        }\n\
    \    }\n}\n```\n\n`Logger` 类通过全局常量技术暴露其单例，但保护数据数组免遭损坏的技术是相同的——我创建了一个串行 GCD 队列，并使用\
    \ `dispatch_sync` 方法确保数组修改操作一次只执行一个。如果你运行该应用程序，将不会出现数据损坏，控制台窗口会显示以下输出：\n\n```\n\
    100 items were backed up\n```\n\n## 理解单例模式的陷阱\n\n在实现单例模式时，有几个需要避免的陷阱，仔细考量你的实现以确保遵循本章前面描述的规则至关重要。在接下来的小节中，我将指出最常见的问题。\n\
    \n### 理解泄露陷阱\n\n实现单例时最常见的问题是产生一个可被复制的对象，这要么是因为它是由结构体（或内置引用类型之一）创建的，要么是因为它是由实现了\
    \ `NSCopying` 协议（我在第 5 章中描述过）的类创建的。\n\n结构体不能作为单例工作，因为每当它们被赋给一个新变量或常量，或作为参数传递时，它们都会被复制。但你可能倾向于使用一个实现了\
    \ `NSCopying` 协议的类，因为你相信使用该单例的组件不会进行复制。我建议谨慎行事：其他开发者可能没有意识到不复制单例的重要性，你应该采取措施创建一个严格的模式实现。允许其他组件复制或克隆该原型会打破单例三条规则中的第一条。\n\
    \n> **提示：** 如果你无法控制需要作为单例的对象的类定义，可以使用装饰模式来防止对象被当作原型对待。详见第 14 章。\n\n### 理解共享代码文件陷阱\n\
    \nSwift 的访问保护关键字是在文件级别生效的，这意味着将 `private` 关键字应用于初始化器只影响包含该单例的文件之外的代码。你应该始终将单例和全局常量（如果你使用了的话）定义在它们自己的文件中，这样其他组件就无法创建单例类的自己的实例，这打破了单例的第一条规则。\n\
    \n### 理解并发陷阱\n\n单例模式中最棘手的问题与并发相关，即使对于经验丰富的程序员来说，这也可能是一个困难的主题。在接下来的小节中，我将描述最常见的问题。\n"
- fmt: "#### Not Applying Concurrency Protections\n\nThe first problem is not applying\
    \ concurrency protections when they are needed. Not every singleton faces concurrency\
    \ problems, but it is something that you should give serious consideration to.\
    \ If you are relying on shared data structures, such as arrays, or on global functions,\
    \ such as `println`, then you need to ensure that your singleton’s code cannot\
    \ be accessed by multiple threads concurrently. If in doubt, assume that there\
    \ will be a problem because the overhead of serializing access to shared resources\
    \ is less of an issue than an app that crashed once it has been deployed to customers.\n\
    \n#### Applying Concurrency Protections Consistently\n\nConcurrency protections\
    \ must be applied throughout a singleton so that all of the code that operates\
    \ on a common resource, such as an array, is serialized in the same way. If you\
    \ leave just one method or block of code that accesses the array without serialization,\
    \ then you run the risk of two threads conflicting and corrupting the data. If\
    \ you are finding it hard to track down all of the code that modifies a shared\
    \ resource, then you should reconsider the design of your code and extract the\
    \ resource—and the code that manipulates it—into its own class so that you can\
    \ apply concurrency protections in a more focused way.\n\n#### Bad Optimization\n\
    \nThere is a common belief that concurrency mechanisms like GCD offer poor performance\
    \ and that concurrent protections should be low-level and applied minimally. I\
    \ think this is nonsense. There are some applications where every CPU cycle counts,\
    \ but these are few and far between, and the actual overhead of applying any concurrency—even\
    \ higher-level abstractions like GCD—is minimal on modern operating systems.\n\
    \nThe perception of performance problems usually arises because concurrency protections\
    \ expose poor code design. If you have 200 threads queuing up to access the same\
    \ array, then you should consider whether the number of threads and the ratio\
    \ of threads to arrays makes sense, rather than decide to start messing around\
    \ with low-level operating system locks. (One pattern that can help redress this\
    \ kind of ratio is the object pool pattern, which I describe in [Chapters 7](#A978-1-4842-0394-1_7_Chapter.html)\
    \ and [8](#A978-1-4842-0394-1_8_Chapter.html).)\n\nMy advice is to use GCD because\
    \ it is relatively simple to understand and easy to work with and makes good use\
    \ of Swift closures. If you do have performance problems, then you should consider\
    \ why this is the case and whether applying the patterns described in this book\
    \ would allow you to minimize the points of contention in the application.\n\n\
    ## Examples of the Singleton Pattern in Cocoa\n\nThere are several singletons\
    \ used in the Cocoa frameworks, and they are usually used to represent the top-level\
    \ component in an application. The most commonly encountered example is the `UIApplication`\
    \ class, which provides features that control the overall behavior of an app and\
    \ provide integration into iOS features. The `UIApplication` singleton is accessed\
    \ through the type method `sharedApplication`.\n\n## Applying the Pattern to the\
    \ SportsStore Application\n\nIn this section, I will apply the singleton pattern\
    \ to the SportsStore application in order to put the pattern into a broader context.\
    \ There is only one area of the application that would benefit from the singleton\
    \ pattern, and that is the `Logger` class that I created in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html)\
    \ to demonstrate the prototype pattern and which is similar to the class of the\
    \ same name that I used in this chapter to demonstrate using the singleton pattern\
    \ to solve the shared resource encapsulation problem. Listing 6-14 shows the existing\
    \ definition of the `Logger` class in the SportsStore project.\n\nListing 6-14. The\
    \ Contents of the Logger.swift File in the SportsStore Project\n\n```\nimport\
    \ Foundation\n\nclass Logger<T where T:NSObject, T:NSCopying> {\n\n    var dataItems:[T]\
    \ = [];\n\n    var callback:(T) -> Void;\n\n    init(callback:T -> Void) {\n \
    \       self.callback = callback;\n    }\n\n    func logItem(item:T) {\n     \
    \   dataItems.append(item.copy() as T);\n        callback(item);\n    }\n\n  \
    \  func processItems(callback:T -> Void) {\n        for item in dataItems {\n\
    \            callback(item);\n        }\n    }\n}\n```\n\nTip\n\nYou can download\
    \ the SportsStore project and the source for all the listings in this chapter\
    \ from [`Apress.com`](https://Apress.com).\n\nI am going apply the singleton pattern\
    \ by starting with the concurrency issues and then creating the singleton. There\
    \ are two potential concurrency issues presented by the SportsStore `Logger` class.\
    \ The first issue is that the `dataItems` array is used in the `logItem` and `processItems`\
    \ methods, and it is possible that multiple threads may try to add new items to\
    \ the array in the `logItem` method, maybe even while other threads try to read\
    \ the contents of the array in the `processItems` method.\n\n### Protecting the\
    \ Data Array\n\nI am going to use GCD to protect the array, but I am going to\
    \ vary the technique that I used in earlier examples in order to differentiate\
    \ between threads that are reading the contents of the array and those that are\
    \ writing them. Allowing multiple threads to simultaneously read the contents\
    \ of the array doesn’t present any concurrency hazards, as long as no threads\
    \ are modifying the array at the same time. You can see how I have solved this\
    \ problem in Listing 6-15.\n\nListing 6-15. Applying Concurrency Protections in\
    \ the Logger.swift File\n\n```\nimport Foundation\n\nclass Logger<T where T:NSObject,\
    \ T:NSCopying> {\n\n    var dataItems:[T] = [];\n\n    var callback:(T) -> Void;\n\
    \n    var arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_CONCURRENT);\n\
    \n    init(callback:T -> Void) {\n        self.callback = callback;\n    }\n\n\
    \    func logItem(item:T) {\n        dispatch_barrier_async(arrayQ, {() in\n \
    \           self.dataItems.append(item.copy() as T);\n            self.callback(item);\n\
    \        });\n    }\n\n    func processItems(callback:T -> Void) {\n        dispatch_sync(arrayQ,\
    \ {() in\n            for item in self.dataItems {\n                callback(item);\n\
    \            }\n        });\n    }\n}\n```\n\nI use the `dispatch_sync` function\
    \ in the `processItems` method to add a block of work that enumerates the array,\
    \ waiting until the block has completed before allowing the method to return.\
    \ The difference is that I have used the `dispatch_barrier_async` function in\
    \ the `logItem` method to create a block of work that adds an item to the array.\
    \ The `dispatch_barrier_async` function adds a special block to the queue that\
    \ changes its behavior. The queue will not start executing the barrier block until\
    \ all of the blocks ahead of it have completed and will not process any subsequent\
    \ blocks until the barrier itself has completed.\n\nUNDERSTANDING GRAND CENTRAL\
    \ DISPATCH: PART 3\n\nIn the context of the `Logger` class, read operations are\
    \ contained in ordinary blocks, and write operations are in barrier blocks. When\
    \ a barrier block reaches the head of the queue, GCD waits until all of the read\
    \ operations that are still in process have completed. Once they are all done,\
    \ GCD executes the barrier block—which modifies the array—and does not process\
    \ any subsequent blocks until the barrier block has completed. Once the barrier\
    \ block is complete, the following items in the queue are processed as normal\
    \ and in parallel until the next barrier block comes along.\n\nPut another way,\
    \ using a barrier changes a concurrent queue into a serial queue for as long as\
    \ it takes to process the barrier block, after which it returns to being a concurrent\
    \ queue again. Whichever way you prefer to think of it, using a GCD barrier makes\
    \ it easy to create a reader/writer lock."
  raw: '#### Not Applying Concurrency Protections


    The first problem is not applying concurrency protections when they are needed.
    Not every singleton faces concurrency problems, but it is something that you should
    give serious consideration to. If you are relying on shared data structures, such
    as arrays, or on global functions, such as `println`, then you need to ensure
    that your singleton’s code cannot be accessed by multiple threads concurrently.
    If in doubt, assume that there will be a problem because the overhead of serializing
    access to shared resources is less of an issue than an app that crashed once it
    has been deployed to customers.


    #### Applying Concurrency Protections Consistently


    Concurrency protections must be applied throughout a singleton so that all of
    the code that operates on a common resource, such as an array, is serialized in
    the same way. If you leave just one method or block of code that accesses the
    array without serialization, then you run the risk of two threads conflicting
    and corrupting the data. If you are finding it hard to track down all of the code
    that modifies a shared resource, then you should reconsider the design of your
    code and extract the resource—and the code that manipulates it—into its own class
    so that you can apply concurrency protections in a more focused way.


    #### Bad Optimization


    There is a common belief that concurrency mechanisms like GCD offer poor performance
    and that concurrent protections should be low-level and applied minimally. I think
    this is nonsense. There are some applications where every CPU cycle counts, but
    these are few and far between, and the actual overhead of applying any concurrency—even
    higher-level abstractions like GCD—is minimal on modern operating systems.


    The perception of performance problems usually arises because concurrency protections
    expose poor code design. If you have 200 threads queuing up to access the same
    array, then you should consider whether the number of threads and the ratio of
    threads to arrays makes sense, rather than decide to start messing around with
    low-level operating system locks. (One pattern that can help redress this kind
    of ratio is the object pool pattern, which I describe in [Chapters 7](#A978-1-4842-0394-1_7_Chapter.html)
    and [8](#A978-1-4842-0394-1_8_Chapter.html).)


    My advice is to use GCD because it is relatively simple to understand and easy
    to work with and makes good use of Swift closures. If you do have performance
    problems, then you should consider why this is the case and whether applying the
    patterns described in this book would allow you to minimize the points of contention
    in the application.


    ## Examples of the Singleton Pattern in Cocoa


    There are several singletons used in the Cocoa frameworks, and they are usually
    used to represent the top-level component in an application. The most commonly
    encountered example is the `UIApplication` class, which provides features that
    control the overall behavior of an app and provide integration into iOS features.
    The `UIApplication` singleton is accessed through the type method `sharedApplication`.


    ## Applying the Pattern to the SportsStore Application


    In this section, I will apply the singleton pattern to the SportsStore application
    in order to put the pattern into a broader context. There is only one area of
    the application that would benefit from the singleton pattern, and that is the
    `Logger` class that I created in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html)
    to demonstrate the prototype pattern and which is similar to the class of the
    same name that I used in this chapter to demonstrate using the singleton pattern
    to solve the shared resource encapsulation problem. Listing 6-14 shows the existing
    definition of the `Logger` class in the SportsStore project.


    Listing 6-14. The Contents of the Logger.swift File in the SportsStore Project


    `import Foundation`


    `class Logger<T where T:NSObject, T:NSCopying> {`


    `var dataItems:[T] = [];`


    `var callback:(T) -> Void;`


    `init(callback:T -> Void) {`


    `self.callback = callback;`


    `}`


    `func logItem(item:T) {`


    `dataItems.append(item.copy() as T);`


    `callback(item);`


    `}`


    `func processItems(callback:T -> Void) {`


    `for item in dataItems {`


    `callback(item);`


    `}`


    `}`


    `}`


    Tip


    You can download the SportsStore project and the source for all the listings in
    this chapter from [`Apress.com`](https://Apress.com) .


    I am going apply the singleton pattern by starting with the concurrency issues
    and then creating the singleton. There are two potential concurrency issues presented
    by the SportsStore `Logger` class. The first issue is that the `dataItems` array
    is used in the `logItem` and `processItems` methods, and it is possible that multiple
    threads may try to add new items to the array in the `logItem` method, maybe even
    while other threads try to read the contents of the array in the `processItems`
    method.


    ### Protecting the Data Array


    I am going to use GCD to protect the array, but I am going to vary the technique
    that I used in earlier examples in order to differentiate between threads that
    are reading the contents of the array and those that are writing them. Allowing
    multiple threads to simultaneously read the contents of the array doesn’t present
    any concurrency hazards, as long as no threads are modifying the array at the
    same time. You can see how I have solved this problem in Listing 6-15.


    Listing 6-15. Applying Concurrency Protections in the Logger.swift File


    `import Foundation`


    `class Logger<T where T:NSObject, T:NSCopying> {`


    `var dataItems:[T] = [];`


    `var callback:(T) -> Void;`


    `var arrayQ = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_CONCURRENT);`


    `init(callback:T -> Void) {`


    `self.callback = callback;`


    `}`


    `func logItem(item:T) {`


    `dispatch_barrier_async(arrayQ, {() in`


    `self.dataItems.append(item.copy() as T);`


    `self.callback(item);`


    `});`


    `}`


    `func processItems(callback:T -> Void) {`


    `dispatch_sync(arrayQ, {() in`


    `for item in self.dataItems {`


    `callback(item);`


    `}`


    `});`


    `}`


    `}`


    I use the `dispatch_sync` function in the `processItems` method to add a block
    of work that enumerates the array, waiting until the block has completed before
    allowing the method to return. The difference is that I have used the `dispatch_barrier_`
    `async`function in the `logItem` method to create a block of work that adds an
    item to the array. The `dispatch_barrier_async` function adds a special block
    to the queue that changes its behavior. The queue will not start executing the
    barrier block until all of the blocks ahead of it have completed and will not
    process any subsequent blocks until the barrier itself has completed.


    UNDERSTANDING GRAND CENTRAL DISPATCH: PART 3


    In the context of the `Logger` class, read operations are contained in ordinary
    blocks, and write operations are in barrier blocks. When a barrier block reaches
    the head of the queue, GCD waits until all of the read operations that are still
    in process have completed. Once they are all done, GCD executes the barrier block—which
    modifies the array—and does not process any subsequent blocks until the barrier
    block has completed. Once the barrier block is complete, the following items in
    the queue are processed as normal and in parallel until the next barrier block
    comes along.


    Put another way, using a barrier changes a concurrent queue into a serial queue
    for as long as it takes to process the barrier block, after which it returns to
    being a concurrent queue again. Whichever way you prefer to think of it, using
    a GCD barrier makes it easy to create a reader/writer lock.'
  trans: "\n#### 未应用并发保护\n\n第一个问题是在需要时未应用并发保护。并非每个单例都会面临并发问题，但这是你需要认真考虑的事情。如果你依赖于共享数据结构（如数组）或全局函数（如\
    \ `println`），那么就需要确保单例的代码不会被多个线程同时访问。如有疑问，应假定存在潜在问题，因为对共享资源的访问进行序列化所带来的开销，总比应用部署到客户手中后发生崩溃要小得多。\n\
    \n#### 一致地应用并发保护\n\n并发保护必须贯穿整个单例，这样所有操作公共资源（如数组）的代码才能以相同的方式被序列化。只要有一个方法或代码块在访问数组时未进行序列化，就可能面临两个线程冲突并破坏数据的风险。如果你发现很难追踪所有修改共享资源的代码，那么就应该重新考虑代码的设计，将资源以及操作它的代码提取到单独的类中，以便更集中地应用并发保护。\n\
    \n#### 错误的优化\n\n有一种普遍看法认为，像 GCD 这样的并发机制性能不佳，因此并发保护应该采用底层方式并尽量少用。我认为这种观点毫无道理。确实有些应用场景中每个\
    \ CPU 周期都至关重要，但这样的场景少之又少，而在现代操作系统上，应用任何并发机制（即使是像 GCD 这样的高级抽象）带来的实际开销都是微乎其微的。\n\
    \n对性能问题的感知，通常源于并发保护暴露了糟糕的代码设计。如果你有 200 个线程排队访问同一个数组，那么你应该考虑的是线程数量以及线程与数组的比例是否合理，而不是开始折腾底层的操作系统锁。（有助于改善这种比例的一种模式是对象池模式，我将在第\
    \ 7 章和第 8 章中介绍。）\n\n我的建议是使用 GCD，因为它相对易于理解、使用方便，并且能很好地利用 Swift 闭包。如果你确实遇到了性能问题，那么应该思考问题出现的原因，并考虑应用本书中描述的模式是否能最大程度地减少应用中的争用点。\n\
    \n## Cocoa 中的单例模式示例\n\nCocoa 框架中使用了多个单例，它们通常用于表示应用中的顶层组件。最常见的示例是 `UIApplication`\
    \ 类，它提供了控制应用整体行为并与 iOS 功能集成的特性。通过类型方法 `sharedApplication` 可以访问 `UIApplication`\
    \ 单例。\n\n## 将模式应用于 SportsStore 应用\n\n在本节中，我将把单例模式应用于 SportsStore 应用，以便将该模式置于更广泛的上下文中。应用中只有一个区域适合应用单例模式，那就是我在第\
    \ 5 章中为演示原型模式而创建的 `Logger` 类，它与我本章中用来演示使用单例模式解决共享资源封装问题的同名类相似。清单 6-14 展示了 SportsStore\
    \ 项目中 `Logger` 类的现有定义。\n\n**清单 6-14.** SportsStore 项目中 Logger.swift 文件的内容\n\n\
    ```\nimport Foundation\n\nclass Logger<T where T:NSObject, T:NSCopying> {\n\n\
    \    var dataItems:[T] = [];\n\n    var callback:(T) -> Void;\n\n    init(callback:T\
    \ -> Void) {\n        self.callback = callback;\n    }\n\n    func logItem(item:T)\
    \ {\n        dataItems.append(item.copy() as T);\n        callback(item);\n  \
    \  }\n\n    func processItems(callback:T -> Void) {\n        for item in dataItems\
    \ {\n            callback(item);\n        }\n    }\n}\n```\n\n提示\n\n你可以从 [`Apress.com`](https://Apress.com)\
    \ 下载 SportsStore 项目以及本章所有清单的源代码。\n\n我将从并发问题入手来应用单例模式，然后创建单例。SportsStore 的 `Logger`\
    \ 类存在两个潜在的并发问题。第一个问题是 `dataItems` 数组在 `logItem` 和 `processItems` 方法中都被使用，有可能多个线程试图在\
    \ `logItem` 方法中向数组添加新项，甚至可能在其他线程试图在 `processItems` 方法中读取数组内容时发生。\n\n### 保护数据数组\n\
    \n我将使用 GCD 来保护数组，但我会对前面示例中使用的方法进行一些变化，以便区分读取数组内容的线程和写入数组内容的线程。允许多个线程同时读取数组内容不会带来任何并发风险，只要没有线程同时修改数组即可。你可以在清单\
    \ 6-15 中看到我是如何解决这个问题的。\n\n**清单 6-15.** 在 Logger.swift 文件中应用并发保护\n\n```\nimport\
    \ Foundation\n\nclass Logger<T where T:NSObject, T:NSCopying> {\n\n    var dataItems:[T]\
    \ = [];\n\n    var callback:(T) -> Void;\n\n    var arrayQ = dispatch_queue_create(\"\
    arrayQ\", DISPATCH_QUEUE_CONCURRENT);\n\n    init(callback:T -> Void) {\n    \
    \    self.callback = callback;\n    }\n\n    func logItem(item:T) {\n        dispatch_barrier_async(arrayQ,\
    \ {() in\n            self.dataItems.append(item.copy() as T);\n            self.callback(item);\n\
    \        });\n    }\n\n    func processItems(callback:T -> Void) {\n        dispatch_sync(arrayQ,\
    \ {() in\n            for item in self.dataItems {\n                callback(item);\n\
    \            }\n        });\n    }\n}\n```\n\n我在 `processItems` 方法中使用 `dispatch_sync`\
    \ 函数添加一个枚举数组的工作块，并等待该块完成后再让方法返回。不同之处在于，我在 `logItem` 方法中使用了 `dispatch_barrier_async`\
    \ 函数来创建一个向数组添加项的工作块。`dispatch_barrier_async` 函数会向队列中添加一个特殊的块，从而改变队列的行为。队列会等待其之前的所有块都完成后，才会开始执行这个屏障块；并且在该屏障块完成之前，不会处理后续的任何块。\n\
    \n**理解 Grand Central Dispatch：第 3 部分**\n\n在 `Logger` 类的上下文中，读取操作包含在普通块中，写入操作则包含在屏障块中。当屏障块到达队列头部时，GCD\
    \ 会等待所有仍在进行中的读取操作完成。一旦它们全部完成，GCD 就会执行屏障块（它会修改数组），并且在该屏障块完成之前不会处理任何后续块。屏障块完成后，队列中的后续项将像往常一样被并行处理，直到遇到下一个屏障块。\n\
    \n换句话说，使用屏障可以将并发队列临时转换为串行队列，其持续时间就是处理屏障块所需的时间，之后队列又会变回并发队列。无论你更喜欢哪种理解方式，使用 GCD\
    \ 屏障都可以轻松创建读写锁。\n"
- fmt: "### Protecting the Callback\n\nThe second problem requires more thought. My\
    \ use of a barrier to allow multiple readers means that the callback function\
    \ that is set through the initializer may be called concurrently. This presents\
    \ a common concurrency dilemma.\n\nI have several choices. The first choice is\
    \ to do nothing—which is the current state of the code—and assume that the code\
    \ that has provided the callback is aware of the concurrency risk and has taken\
    \ the required precautions. From the perspective of the `Logger` class, this is\
    \ the simplest option because it shifts the burden elsewhere. This isn’t an entirely\
    \ bad idea because the `Logger` class has no insights into how the callback is\
    \ implemented, and I may end up with concurrency protections in the `Logger` class\
    \ and in the component that defines the callback. The risk with redundant concurrency\
    \ protection is that the application can deadlock if written inexpertly. The other\
    \ problem is that I may end up with no protection at all and risk data corruption.\
    \ This is the simplest choice but is also the most uncertain.\n\nThe second choice\
    \ is to assume responsibility in the `Logger` class. This is the safe option,\
    \ but once again I may end up with redundant protections; however, it does mean\
    \ that data corruption is avoided.\n\nThe third choice—and the one that I am going\
    \ to follow in this example—is to allow the component to chose when it provides\
    \ the callback. You can see how I have modified the `Logger` class to support\
    \ this feature in Listing 6-16.\n\n**Listing 6-16.** Adding Optional Concurrency\
    \ Protection in the Logger.swift File\n\n```swift\nimport Foundation\n\nclass\
    \ Logger<T where T:NSObject, T:NSCopying> {\n\n    var dataItems:[T] = [];\n \
    \   var callback:(T) -> Void;\n    var arrayQ = dispatch_queue_create(\"arrayQ\"\
    , DISPATCH_QUEUE_CONCURRENT);\n    var callbackQ = dispatch_queue_create(\"callbackQ\"\
    , DISPATCH_QUEUE_SERIAL);\n\n    init(callback:T -> Void, protect:Bool = true)\
    \ {\n        self.callback = callback;\n        if (protect) {\n            self.callback\
    \ = {(item:T) in\n                dispatch_sync(self.callbackQ, {() in\n     \
    \               callback(item);\n                });\n            };\n       \
    \ }\n    }\n\n    func logItem(item:T) {\n        dispatch_barrier_async(arrayQ,\
    \ {() in\n            self.dataItems.append(item.copy() as T);\n            self.callback(item);\n\
    \        });\n    }\n\n    func processItems(callback:T -> Void) {\n        dispatch_sync(arrayQ,\
    \ {() in\n            for item in self.dataItems {\n                callback(item);\n\
    \            }\n        });\n    }\n}\n```\n\nI have defined a separate queue\
    \ and added an initializer parameter that has a default value, allowing me to\
    \ apply the protections without changing code elsewhere in the application. If\
    \ protection is required—or the caller omits the new argument—then I wrap the\
    \ callback in the closure that adds a block to the new queue.\n\n### Defining\
    \ the Singleton\n\nNow that I have addressed the concurrency issues, I am going\
    \ to define the singleton object and protect the `Logger` class so that it can’t\
    \ be instantiated elsewhere in the application. Listing 6-17 shows the changes\
    \ that I made.\n\n**Listing 6-17.** Creating the Singleton in the Logger.swift\
    \ File\n\n```swift\nimport Foundation\n\nlet productLogger = Logger<Product>(callback:\
    \ {p in\n    println(\"Change: \\(p.name) \\(p.stockLevel) items in stock\");\n\
    });\n\nfinal class Logger<T where T:NSObject, T:NSCopying> {\n\n    var dataItems:[T]\
    \ = [];\n    var callback:(T) -> Void;\n    var arrayQ = dispatch_queue_create(\"\
    arrayQ\", DISPATCH_QUEUE_CONCURRENT);\n    var callbackQ = dispatch_queue_create(\"\
    callbackQ\", DISPATCH_QUEUE_SERIAL);\n\n    private init(callback:T -> Void, protect:Bool\
    \ = true) {\n        self.callback = callback;\n        if (protect) {\n     \
    \       self.callback = {(item:T) in\n                dispatch_sync(self.callbackQ,\
    \ {() in\n                    callback(item);\n                });\n         \
    \   };\n        }\n    }\n\n    func logItem(item:T) {\n        dispatch_barrier_async(arrayQ,\
    \ {() in\n            self.dataItems.append(item.copy() as T);\n            self.callback(item);\n\
    \        });\n    }\n\n    func processItems(callback:T -> Void) {\n        dispatch_sync(arrayQ,\
    \ {() in\n            for item in self.dataItems {\n                callback(item);\n\
    \            }\n        });\n    }\n}\n```\n\nIt isn’t possible to create the\
    \ singleton using the struct for generic types, so I have had to define a global\
    \ constant that instantiates the `Logger` class with the `Product` type. I prefer\
    \ the struct approach, but I like being able to use generic classes with a range\
    \ of types and will happily use the global constant approach in this situation.\
    \ The remaining change is to update the only component that uses the `Logger`\
    \ class in the application, as shown in Listing 6-18.\n\n**Listing 6-18.** Using\
    \ the Singleton in the ViewController.swift File\n\n```swift\nimport UIKit\n\n\
    class ProductTableCell: UITableViewCell {\n    @IBOutlet weak var nameLabel: UILabel!\n\
    \    @IBOutlet weak var descriptionLabel: UILabel!\n    @IBOutlet weak var stockStepper:\
    \ UIStepper!\n    @IBOutlet weak var stockField: UITextField!\n    var product:\
    \ Product?;\n}\n\nclass ViewController: UIViewController, UITableViewDataSource\
    \ {\n    @IBOutlet weak var totalStockLabel: UILabel!\n    @IBOutlet weak var\
    \ tableView: UITableView!\n\n    //let logger = Logger<Product>(callback: handler);\n\
    \n    var products = [\n        Product(name:\"Kayak\", description:\"A boat for\
    \ one person\",\n                category:\"Watersports\", price:275.0, stockLevel:10),\n\
    \        // ...code omitted for brevity...\n    ]\n\n    @IBAction func stockLevelDidChange(sender:\
    \ AnyObject) {\n        if var currentCell = sender as? UIView {\n           \
    \ while (true) {\n                currentCell = currentCell.superview!;\n    \
    \            if let cell = currentCell as? ProductTableCell {\n              \
    \      if let product = cell.product? {\n                        if let stepper\
    \ = sender as? UIStepper {\n                            product.stockLevel = Int(stepper.value);\n\
    \                        } else if let textfield = sender as? UITextField {\n\
    \                            if let newValue = textfield.text.toInt()? {\n   \
    \                             product.stockLevel = newValue;\n               \
    \             }\n                        }\n                        cell.stockStepper.value\
    \ = Double(product.stockLevel);\n                        cell.stockField.text\
    \ = String(product.stockLevel);\n                        productLogger.logItem(product);\n\
    \                    }\n                    break;\n                }\n      \
    \      }\n        }\n        displayStockTotal();\n    }\n\n    // ...code omitted\
    \ for brevity...\n}\n```\n\n### Summary\n\nIn this chapter, I described the singleton\
    \ pattern and explained how it can be used to ensure that there is only one object\
    \ of a specific type in the application. The singleton pattern is easy to understand\
    \ but requires careful attention to implement correctly, especially when it comes\
    \ to ensuring that the code is safe for concurrent use. In the next chapter, I\
    \ describe the object pool pattern, which shares some common ideas with the singleton\
    \ pattern but operates on several objects of the same type."
  raw: '### Protecting the Callback


    The second problem requires more thought. My use of a barrier to allow multiple
    readers means that the callback function that is set through the initializer may
    be called concurrently. This presents a common concurrency dilemma.


    I have several choices. The first choice is to do nothing—which is the current
    state of the code—and assume that the code that has provided the callback is aware
    of the concurrency risk and has taken the required precautions. From the perspective
    of the `Logger` class, this is the simplest option because it shifts the burden
    elsewhere. This isn’t an entirely bad idea because the `Logger` class has no insights
    into how the callback is implemented, and I may end up with concurrency protections
    in the `Logger` class and in the component that defines the callback. The risk
    with redundant concurrency protection is that the application can deadlock if
    written inexpertly. The other problem is that I may end up with no protection
    at all and risk data corruption. This is the simplest choice but is also the most
    uncertain.


    The second choice is to assume responsibility in the `Logger` class. This is the
    safe option, but once again I may end up with redundant protections; however,
    it does mean that data corruption is avoided.


    The third choice—and the one that I am going to follow in this example—is to allow
    the component to chose when it provides the callback. You can see how I have modified
    the `Logger` class to support this feature in Listing 6-16.


    Listing 6-16. Adding Optional Concurrency Protection in the Logger.swift File


    `import Foundation`


    `class Logger<T where T:NSObject, T:NSCopying> {`


    `var dataItems:[T] = [];`


    `var callback:(T) -> Void;`


    `var arrayQ = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_CONCURRENT);`


    `var callbackQ = dispatch_queue_create("callbackQ", DISPATCH_QUEUE_SERIAL);`


    `init(callback:T -> Void, protect:Bool = true) {`


    `self.callback = callback;`


    `if (protect) {`


    `self.callback = {(item:T) in`


    `dispatch_sync(self.callbackQ, {() in`


    `callback(item);`


    `});`


    `};`


    `}`


    `}`


    `func logItem(item:T) {`


    `dispatch_barrier_async(arrayQ, {() in`


    `self.dataItems.append(item.copy() as T);`


    `self.callback(item);`


    `});`


    `}`


    `func processItems(callback:T -> Void) {`


    `dispatch_sync(arrayQ, {() in`


    `for item in self.dataItems {`


    `callback(item);`


    `}`


    `});`


    `}`


    `}`


    I have defined a separate queue and added an initializer parameter that has a
    default value, allowing me to apply the protections without changing code elsewhere
    in the application. If protection is required—or the caller omits the new argument—then
    I wrap the callback in the closure that adds a block to the new queue.


    ### Defining the Singleton


    Now that I have addressed the concurrency issues, I am going to define the singleton
    object and protect the `Logger` class so that it can’t be instantiated elsewhere
    in the application. Listing 6-17 shows the changes that I made.


    Listing 6-17. Creating the Singleton in the Logger.swift File


    `import Foundation`


    `let productLogger = Logger<Product>(callback: {p in`


    `println("Change: \(p.name) \(p.stockLevel) items in stock");`


    `});`


    `final class Logger<T where T:NSObject, T:NSCopying> {`


    `var dataItems:[T] = [];`


    `var callback:(T) -> Void;`


    `var arrayQ = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_CONCURRENT);`


    `var callbackQ = dispatch_queue_create("callbackQ", DISPATCH_QUEUE_SERIAL);`


    `private init(callback:T -> Void, protect:Bool = true) {`


    `self.callback = callback;`


    `if (protect) {`


    `self.callback = {(item:T) in`


    `dispatch_sync(self.callbackQ, {() in`


    `callback(item);`


    `});`


    `};`


    `}`


    `}`


    `func logItem(item:T) {`


    `dispatch_barrier_async(arrayQ, {() in`


    `self.dataItems.append(item.copy() as T);`


    `self.callback(item);`


    `});`


    `}`


    `func processItems(callback:T -> Void) {`


    `dispatch_sync(arrayQ, {() in`


    `for item in self.dataItems {`


    `callback(item);`


    `}`


    `});`


    `}`


    `}`


    It isn’t possible to create the singleton using the struct for generic types,
    so I have had to define a global constant that instantiates the `Logger` class
    with the `Product` type. I prefer the struct approach, but I like being able to
    use generic classes with a range of types and will happily use the global constant
    approach in this situation. The remaining change is to update the only component
    that uses the `Logger` class in the application, as shown in Listing 6-18.


    Listing 6-18. Using the Singleton in the ViewController.swift File


    `import UIKit`


    `class ProductTableCell: UITableViewCell {`


    `@IBOutlet weak var nameLabel: UILabel!`


    `@IBOutlet weak var descriptionLabel: UILabel!`


