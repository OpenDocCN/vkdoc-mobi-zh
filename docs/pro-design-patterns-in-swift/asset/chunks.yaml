  raw: 'This pool uses a GCD semaphore to wait for an object to become available for
    a specified period, which defaults to three seconds. If the `semaphore` `wait`operation
    expires before an item becomes available, then a factory closure is used to create
    a temporary item to cope with demand. (There are two factory closures—one for
    normal lazy object creation and one for creating temporary peak items).


    The defining characteristic of an elastic pool is what you do with the temporary
    objects. You can keep them in the pool forever, you can let the reference go so
    that the object will be deleted, or—as I have done here—you can define areaper,
    which is used to dispose of items when they are longer required. In this case,
    I accept the reaper as an initializer argument and invoke it when the demand for
    objects falls.


    Tip


    You can create sophisticated policies for deciding when temporary objects are
    no longer required, but I recommend keeping it as simple as possible. Complex
    schemes work well during development but tend to fall apart in the face of real
    usage patterns, which are hard to predict in advance.


    To use the elastic pool, I need to change the initializer in the `Library` class
    to provide the additional closures and item counts, as shown in Listing 8-14.


    Listing 8-14. Updating the Library Initializer in the Library.swift File


    `...`


    `private init(stockLevel:Int) {`


    `var stockId = 1;`


    `pool = Pool<Book>(`


    `itemCount:stockLevel,`


    `peakCount: stockLevel * 2,`


    `returnCount: stockLevel / 2,`


    `itemFactory: {() in`


    `return BookSeller.buyBook("Dickens, Charles",`


    `title: "Hard Times", stockNumber: stockId++)},`


    `peakFactory: {() in`


    `return LibraryNetwork.borrowBook("Dickens, Charles",`


    `title: "Hard Times", stockNumber: stockId++)},`


    `reaper: LibraryNetwork.returnBook`


    `);`


    `}`


    `...`


    The normal pool items will be `Book` objects obtained from the `BookSeller` class.
    When demand is twice the normal level, additional `Book` objects will be obtained
    from the `LibraryNetwork.borrowBook` method, and when the number of objects falls
    to 50 percent of the normal level, the additional objects are reaped by the `LibraryNetwork.return`
    book method.


    You can see the effect of item elasticity by running the application, which will
    produce output like this:


    `...Starting...`


    `All blocks complete`


    `...Book#2...`


    `Checked out 4 times`


    `In stock`


    `...Book#15...`


    `Checked out 1 times`


    `In stock`


    `...Book#19...`


    `Checked out 1 times`


    `In stock`


    `...Book#17...`


    `Checked out 1 times`


    `In stock`


    `...Book#18...`


    `Checked out 1 times`


    `In stock`


    `There are 5 books in the pool`


    `...`


    This example borrows `Book` objects to satisfy demand, which is reflected in the
    number of times that the books shown in the output have been checked out of the
    pool. The code in the `main.swift` file requests 35 `Book` objects, but the report
    shows only 8 checkouts. The remaining requests have been satisfied using objects
    obtained from—and subsequently returned to—the `LibraryNetwork` class.


    ### Understanding the Allocation Strategy


    The allocation strategy determines how an available object is selected to service
    a request. The strategy I have been using so far in this chapter is first-in first-out,
    based on treating an array like a queue. The advantage of this approach is that
    it is simple to implement, but it does mean that objects can be allocated unevenly
    so that some are checked out of the pool many more times than others.


    For most applications, the FIFO allocation strategy will be appropriate, but some
    applications will require a different approach to allocating objects. For my example
    application, I am going to allocate the least-used available book, but—as you
    will see—the impact of such a strategy is limited when demand for objects is high.
    Listing 8-15 shows how I have added support for a custom allocation strategy in
    the `Pool` class.


    Listing 8-15. Adding Support for an Allocation Strategy in the Pool.swift File


    `import Foundation`


    `class Pool<T:AnyObject> {`


    `private var data = [T]();`


    `private let arrayQ = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_SERIAL);`


    `private let semaphore:dispatch_semaphore_t;`


    `private let itemFactory: () -> T;`


    `private let itemAllocator:[T] -> Int;`


    `private let maxItemCount:Int;`


    `private var createdCount:Int = 0;`


    `init(itemCount:Int, itemFactory:() -> T, itemAllocator:([T] -> Int)) {`


    `self.maxItemCount = itemCount;`


    `self.itemFactory = itemFactory;`


    `self.itemAllocator = itemAllocator;`


    `self.semaphore = dispatch_semaphore_create(itemCount);`


    `}`


    `func getFromPool() -> T? {`


    `var result:T?;`


    `if (dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER) == 0) {`


    `dispatch_sync(arrayQ, {() in`


    `if (self.data.count == 0) {`


    `result = self.itemFactory();`


    `self.createdCount++;`


    `} else {`


    `result = self.data.removeAtIndex(self.itemAllocator(self.data));`


    `}`


    `})`


    `}`


    `return result;`


    `}`


    `func returnToPool(item:T) {`


    `dispatch_async(arrayQ, {() in`


    `self.data.append(item);`


    `dispatch_semaphore_signal(self.semaphore);`


    `});`


    `}`


    `func processPoolItems(callback:[T] -> Void) {`


    `dispatch_barrier_sync(arrayQ, {() in`


    `callback(self.data);`


    `});`


    `}`


    `}`


    This is a fixed-size pool that creates its objects lazily. I have defined an initializer
    parameter called `itemAllocator` that is a closure to which the array of available
    items is passed. The closure returns the position in the array of the item that
    should be allocated to service the request. Listing 8-16 shows how I have updated
    the initializer of the `Library` class to implement an allocation strategy.


    Listing 8-16. Adding an Allocation Strategy in the Library.swift File


    `...`


    `private init(stockLevel:Int) {`


    `var stockId = 1;`


    `pool = Pool<Book>(`


    `itemCount:stockLevel,`


    `itemFactory: {() in`


    `return BookSeller.buyBook("Dickens, Charles",`


    `title: "Hard Times", stockNumber: stockId++)},`


    `itemAllocator: {(var books) in return 0; }`


    `);`


    `}`


    `...`


    I have started with the FIFO strategy, and the closure selects the first item
    in the array. I recommend that you start with this strategy in order to measure
    the impact of any alternatives. Depending on the pattern of requests that are
    made to the pool, you may well find that the FIFO allocation strategy gives you
    something close to your goal. Here is a formatted version of the output from running
    the application using FIFO:


    `...`


    `...Book#4...Checked out 10 times`


    `...Book#3...Checked out 6 times`


    `...Book#2...Checked out 5 times`


    `...Book#1...Checked out 5 times`


    `...Book#5...Checked out 9 times`


    `...`


    There is some variation between how often the objects have been used but not an
    enormous amount. In a real project, I would consider sticking with the FIFO strategy
    with these results (although I would also look at the variation in production
    to ensure that my tests are realistic).'
  trans: "\n该对象池使用 GCD 信号量等待一段指定时间内有对象可用，默认等待时间为三秒。如果在有对象可用之前，`semaphore` 的 `wait`\
    \ 操作超时，则会使用一个工厂闭包创建临时对象来满足需求。（这里有两个工厂闭包——一个用于常规的惰性对象创建，另一个用于创建临时峰值对象）。\n\n弹性对象池的核心特征在于对临时对象的处理方式。你可以将它们永久保留在池中，也可以释放引用使其被删除，或者——就像我在此处所做的——定义一个回收器，用于在不再需要这些对象时进行处置。在本例中，我接受将回收器作为初始化参数传入，并在对对象的需求下降时调用它。\n\
    \n> **提示**\n>\n> 你可以制定复杂的策略来决定何时不再需要临时对象，但我建议尽可能保持简单。复杂的方案在开发期间效果良好，但面对难以提前预测的实际使用模式时，往往容易崩溃。\n\
    \n要使用弹性对象池，我需要修改 `Library` 类中的初始化器，以提供额外的闭包和对象数量，如代码清单 8-14 所示。\n\n**代码清单 8-14.** 在\
    \ `Library.swift` 文件中更新 Library 初始化器\n\n```\n...\nprivate init(stockLevel:Int)\
    \ {\n    var stockId = 1;\n    pool = Pool<Book>(\n        itemCount:stockLevel,\n\
    \        peakCount: stockLevel * 2,\n        returnCount: stockLevel / 2,\n  \
    \      itemFactory: {() in\n            return BookSeller.buyBook(\"Dickens, Charles\"\
    ,\n                title: \"Hard Times\", stockNumber: stockId++)},\n        peakFactory:\
    \ {() in\n            return LibraryNetwork.borrowBook(\"Dickens, Charles\",\n\
    \                title: \"Hard Times\", stockNumber: stockId++)},\n        reaper:\
    \ LibraryNetwork.returnBook\n    );\n}\n...\n```\n\n常规对象池中的对象是从 `BookSeller` 类获取的\
    \ `Book` 对象。当需求达到正常水平的两倍时，会通过 `LibraryNetwork.borrowBook` 方法获取额外的 `Book` 对象；当对象数量降至正常水平的\
    \ 50% 时，这些额外对象将由 `LibraryNetwork.returnBook` 方法回收。\n\n运行应用程序可以看到对象弹性特性的效果，其输出如下：\n\
    \n```\n...Starting...\nAll blocks complete\n...Book#2...\nChecked out 4 times\n\
    In stock\n...Book#15...\nChecked out 1 times\nIn stock\n...Book#19...\nChecked\
    \ out 1 times\nIn stock\n...Book#17...\nChecked out 1 times\nIn stock\n...Book#18...\n\
    Checked out 1 times\nIn stock\nThere are 5 books in the pool\n...\n```\n\n此示例借用了\
    \ `Book` 对象来满足需求，这体现在输出中显示的书籍被从对象池中借出的次数。`main.swift` 文件中的代码请求了 35 个 `Book` 对象，但报告仅显示\
    \ 8 次借出。其余请求是通过从 `LibraryNetwork` 类获取对象来满足的，后续这些对象又被归还给了该类。\n\n## 理解分配策略\n\n分配策略决定了如何选择一个可用对象来服务请求。本章到目前为止使用的策略是先进先出，其原理是将数组当作队列来处理。这种方法的优点是实现简单，但缺点是可能导致对象分配不均，使得某些对象被借出的次数远多于其他对象。\n\
    \n对于大多数应用来说，FIFO 分配策略是合适的，但某些应用需要不同的对象分配方法。以我的示例应用为例，我打算分配使用次数最少的可用书籍，但——正如你将看到的——当对对象的需求很高时，这种策略的影响是有限的。代码清单\
    \ 8-15 展示了如何在 `Pool` 类中添加对自定义分配策略的支持。\n\n**代码清单 8-15.** 在 `Pool.swift` 文件中添加对分配策略的支持\n\
    \n```\nimport Foundation\n\nclass Pool<T:AnyObject> {\n    private var data =\
    \ [T]();\n    private let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    private let semaphore:dispatch_semaphore_t;\n    private let itemFactory:\
    \ () -> T;\n    private let itemAllocator:[T] -> Int;\n    private let maxItemCount:Int;\n\
    \    private var createdCount:Int = 0;\n    \n    init(itemCount:Int, itemFactory:()\
    \ -> T, itemAllocator:([T] -> Int)) {\n        self.maxItemCount = itemCount;\n\
    \        self.itemFactory = itemFactory;\n        self.itemAllocator = itemAllocator;\n\
    \        self.semaphore = dispatch_semaphore_create(itemCount);\n    }\n    \n\
    \    func getFromPool() -> T? {\n        var result:T?;\n        if (dispatch_semaphore_wait(semaphore,\
    \ DISPATCH_TIME_FOREVER) == 0) {\n            dispatch_sync(arrayQ, {() in\n \
    \               if (self.data.count == 0) {\n                    result = self.itemFactory();\n\
    \                    self.createdCount++;\n                } else {\n        \
    \            result = self.data.removeAtIndex(self.itemAllocator(self.data));\n\
    \                }\n            })\n        }\n        return result;\n    }\n\
    \    \n    func returnToPool(item:T) {\n        dispatch_async(arrayQ, {() in\n\
    \            self.data.append(item);\n            dispatch_semaphore_signal(self.semaphore);\n\
    \        });\n    }\n    \n    func processPoolItems(callback:[T] -> Void) {\n\
    \        dispatch_barrier_sync(arrayQ, {() in\n            callback(self.data);\n\
    \        });\n    }\n}\n```\n\n这是一个固定大小的对象池，采用惰性创建对象的方式。我定义了一个名为 `itemAllocator`\
    \ 的初始化参数，它是一个闭包，会接收可用对象的数组。该闭包返回数组中应被分配用于服务请求的对象所在位置。代码清单 8-16 展示了如何更新 `Library`\
    \ 类的初始化器来实现分配策略。\n\n**代码清单 8-16.** 在 `Library.swift` 文件中添加分配策略\n\n```\n...\nprivate\
    \ init(stockLevel:Int) {\n    var stockId = 1;\n    pool = Pool<Book>(\n     \
    \   itemCount:stockLevel,\n        itemFactory: {() in\n            return BookSeller.buyBook(\"\
    Dickens, Charles\",\n                title: \"Hard Times\", stockNumber: stockId++)},\n\
    \        itemAllocator: {(var books) in return 0; }\n    );\n}\n...\n```\n\n我从\
    \ FIFO 策略开始，该闭包选择数组中的第一个对象。我建议你从该策略入手，以便衡量任何替代方案的影响。根据向对象池发出的请求模式，你很可能会发现 FIFO\
    \ 分配策略能带来接近你目标的效果。以下是使用 FIFO 运行应用程序时输出的格式化版本：\n\n```\n...\n...Book#4...Checked\
    \ out 10 times\n...Book#3...Checked out 6 times\n...Book#2...Checked out 5 times\n\
    ...Book#1...Checked out 5 times\n...Book#5...Checked out 9 times\n...\n```\n\n\
    各个对象的使用次数存在一些差异，但幅度不大。在实际项目中，根据这些结果，我会考虑坚持使用 FIFO 策略（不过我也会观察生产环境中的差异，以确保我的测试符合实际情况）。\n"
- fmt: "# Listing 8-17 shows a least-used strategy. This strategy selects the least-used\
    \ available object. There could be objects that are checked out that have been\
    \ used less. Taking into account all of the objects is called a perfect allocation\
    \ strategy, but it is rarely useful because it means you block a request until\
    \ the absolute least-used object becomes available, which may not happen for some\
    \ time.\n\n## Listing 8-17. Implementing a Different Allocation Strategy in the\
    \ `Library.swift` File\n\n```\n...\nprivate init(stockLevel:Int) {\n    var stockId\
    \ = 1;\n    pool = Pool<Book>(\n        itemCount:stockLevel,\n        itemFactory:\
    \ {() in\n            return BookSeller.buyBook(\"Dickens, Charles\",\n      \
    \          title: \"Hard Times\", stockNumber: stockId++)},\n        itemAllocator:\
    \ {(var books) in\n            var selected = 0;\n            for index in 1 ..<\
    \ books.count {\n                if (books[index].checkoutCount < books[selected].checkoutCount)\
    \ {\n                    selected = index;\n                }\n            }\n\
    \            return selected;\n        }\n    );\n}\n...\n```\n\nIn the new closure,\
    \ I check each of the available objects and select the one with the lowest `checkoutCount`\
    \ property value. Here is the edited output from using this strategy:\n\n```\n\
    ...\n...Book#2...Checked out 8 times\n...Book#3...Checked out 5 times\n...Book#5...Checked\
    \ out 8 times\n...Book#4...Checked out 8 times\n...Book#1...Checked out 6 times\n\
    ...\n```\n\nThe exact results will vary because of the randomness in the `main.swift`\
    \ code, but the overall effect is to allocate the objects more evenly. This is\
    \ a more balanced allocation strategy, but it requires more work each time an\
    \ object is allocated, and (at least for my test code) the impact is relatively\
    \ small. That doesn’t mean you should always use the FIFO allocation strategy,\
    \ but you should make sure that the additional work is justified by the results.\n\
    \n## Understanding the Pitfalls of the Pattern Variations\n\nThe main danger presented\
    \ by these variations is complexity, which can manifest itself in concurrency\
    \ problems and in code that is harder to read and harder to maintain. Beyond these\
    \ problems, there are specific pitfalls that these strategies can lead to, as\
    \ described in the following sections.\n\n### Understanding the Expectation Gap\
    \ Pitfall\n\nAs this chapter has demonstrated, it is possible to create object\
    \ pools that look superficially similar but that implement different strategies\
    \ behind the scenes. You must ensure that the external impact of these strategies\
    \ is obvious to calling components because otherwise you will find that the efficacy\
    \ of the object pool is undermined.\n\nFor example, you may choose to deal with\
    \ an empty pool by rejecting requests for objects. If you do this, ensure that\
    \ the return type of the pool object checkout method is an optional type, such\
    \ as `Book?` and not simply `Book`. Using optional results makes it clear that\
    \ it is possible that a call to the method will not yield an object.\n\nNot every\
    \ behavior can be expressed using language features, and I recommend you provide\
    \ API documentation that describes how the pool operates in some detail. For example,\
    \ you will need to document the fact that you deal with an exhausted pool by rejecting\
    \ requests in order to avoid calling components using a `for` loop until they\
    \ receive an object—a behavior that can lead to the application locking up.\n\n\
    ### Understanding the Over- and Under-utilization Pitfalls\n\nOnce you start implementing\
    \ the object pool pattern, it is easy to become emotionally invested in selecting\
    \ and creating the strategies you need and making them fit together. A well-written\
    \ implementation of the object pool pattern is a thing of beauty, but you must\
    \ keep one eye on how the pool performs during testing and deployment because\
    \ it is easy to create a pool that is perfect in implementation but that impairs\
    \ the performance of the application or consumes too many resources.\n\nAn over-utilized\
    \ pool is a performance hazard because it spends most of its time empty and has\
    \ a long queue of calling components waiting for objects. An under-utilized pool\
    \ is a resource hazard because it manages a collection of objects that are rarely\
    \ used. Balancing the size and behavior of an object pool against its workload\
    \ requires some trial and error—and realistic usage data for testing. Also, you\
    \ must be prepared to change the size and behavior of your pool to match the application\
    \ needs, even if that means discarding a strategy of which you are particularly\
    \ proud.\n\n## Examples of the Pattern Variations in Cocoa\n\nThere are no obvious\
    \ uses of these pattern variations in the Cocoa frameworks, although it is hard\
    \ to be sure because Apple does not publish the source code.\n\n## Applying a\
    \ Pattern Variation to SportsStore\n\nTo finish this chapter, I am going to change\
    \ the object creation strategy to the pool that I added to the SportsStore application\
    \ in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html). Currently, the `NetworkPool`\
    \ class eagerly creates its objects.\n\n```\n...\nprivate init() {\n    for _\
    \ in 0 ..< connectionCount {\n        connections.append(NetworkConnection());\n\
    \    }\n    semaphore = dispatch_semaphore_create(connectionCount);\n    queue\
    \ = dispatch_queue_create(\"networkpoolQ\", DISPATCH_QUEUE_SERIAL);\n}\n...\n\
    ```\n\nI am going to switch to a lazy strategy. I used a closure to do this for\
    \ the generic pool class earlier in the chapter because I didn’t want the pool\
    \ to have directly knowledge of how the objects it manages are created. By contrast,\
    \ the SportsStore `NetworkPool` class is already aware of the `NetworkConnection`\
    \ class and how it is created, which simplifies the implementation of the strategy.\
    \ Listing 8-18 shows the changes I made to implement the new strategy.\n\n## Listing\
    \ 8-18. Changing the Object Creation Strategy in the `NetworkPool.swift` File\n\
    \n```\nimport Foundation\n\nfinal class NetworkPool {\n    private let connectionCount\
    \ = 3;\n    private var connections = [NetworkConnection]();\n    private var\
    \ semaphore:dispatch_semaphore_t;\n    private var queue:dispatch_queue_t;\n \
    \   private var itemsCreated = 0;\n\n    private init() {\n        semaphore =\
    \ dispatch_semaphore_create(connectionCount);\n        queue = dispatch_queue_create(\"\
    networkpoolQ\", DISPATCH_QUEUE_SERIAL);\n    }\n\n    private func doGetConnection()\
    \ -> NetworkConnection {\n        dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER);\n\
    \        var result:NetworkConnection? = nil;\n        dispatch_sync(queue, {()\
    \ in\n            if (self.connections.count > 0) {\n                result =\
    \ self.connections.removeAtIndex(0);\n            } else if (self.itemsCreated\
    \ < self.connectionCount) {\n                result = NetworkConnection();\n \
    \               self.itemsCreated++;\n            }\n        });\n        return\
    \ result!;\n    }\n\n    private func doReturnConnection(conn:NetworkConnection)\
    \ {\n        dispatch_async(queue, {() in\n            self.connections.append(conn);\n\
    \            dispatch_semaphore_signal(self.semaphore);\n        });\n    }\n\n\
    \    class func getConnection() -> NetworkConnection {\n        return sharedInstance.doGetConnection();\n\
    \    }\n\n    class func returnConnecton(conn:NetworkConnection) {\n        sharedInstance.doReturnConnection(conn);\n\
    \    }\n\n    private class var sharedInstance:NetworkPool {\n        get {\n\
    \            struct SingletonWrapper {\n                static let singleton =\
    \ NetworkPool();\n            }\n            return SingletonWrapper.singleton;\n\
    \        }\n    }\n}\n```\n\nThe changes are simple. I have removed the code that\
    \ eagerly creates the `NetworkConnection` objects from the initializer and added\
    \ code that lazily creates them in the `doGetConnection` method. It is always\
    \ easier to work on a pool class that manages a specific type, but I still prefer\
    \ to use generic pool classes because it means I always get a consistent pool\
    \ implementation because I copy the code from one project to another, and to me,\
    \ that is worth the additional complexity.\n\n## Summary\n\nIn this chapter, I\
    \ showed you how you can change the four strategies that define the way an object\
    \ pool works so that you can use different implementations of the pattern to handle\
    \ a variety of objects. Few patterns require as much detail as the object pool\
    \ pattern, and I return to simpler territory in the next chapter, in which I describe\
    \ the factory method pattern."
