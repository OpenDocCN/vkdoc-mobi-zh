    \ patterns, and in Part 3 I describe a different type of pattern: the structural\
    \ patterns.\n\n# Part III: The Structural Patterns\n\n## 12. The Adapter Pattern\n\
    \nIn this chapter, I describe the first of the structural patterns: the adapter\
    \ pattern. This pattern allows two objects that provide related functionality\
    \ to work together even when they have incompatible APIs. Table 12-1 puts the\
    \ adapter pattern in context.\n\n**Table 12-1.** Putting the Adapter Pattern into\
    \ Context\n\n| Question | Answer |\n| --- | --- |\n| What is it? | The adapter\
    \ pattern allows two components with incompatible APIs to work together by introducing\
    \ an adapter that maps from one component to the other. |\n| What are the benefits?\
    \ | This pattern allows you to integrate components for which you cannot modify\
    \ the source code into your application. This is a common problem when you use\
    \ a third-party framework or when you are consuming the output from another project.\
    \ |\n| When should you use this pattern? | Use this pattern when you need to integrate\
    \ a component that provides similar functionality to other components in the application\
    \ but that uses an incompatible API to do so. |\n| When should you avoid this\
    \ pattern? | Do not use this pattern when you are able to modify the source code\
    \ of the component that you want to integrate or when it is possible to migrate\
    \ the data provided by the component directly into your application. |\n| How\
    \ do you know when you have implemented the pattern correctly? | The pattern is\
    \ implemented correctly when the adapter allows the component to be integrated\
    \ into the application without requiring modification of the application or the\
    \ component. |\n| Are there any common pitfalls? | The only pitfall is trying\
    \ to extend the pattern to force integration of a component that does not provide\
