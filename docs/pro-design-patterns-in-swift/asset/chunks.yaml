    `func addObservers(observers:Observer...);`


    `func removeObserver(observer:Observer);`


    `}`


    The names of the protocols reflect the roles that classes that conform to them
    play in the observer pattern. Classes that conform to the `Observer` protocol
    implement the `notify` method to receive notifications from classes that conform
    to the `Subject` protocol. In the observer pattern, subjects are responsible for
    keeping track of their observers, so I have defined the `addObservers` and `removeObserver`
    methods to allow observers to register and unregister their interest in receiving
    notifications from the subject. Notice that the `addObservers` method can accept
    multiple `Observer` objects. This makes it easier to set up the `Subject` object,
    as you will see in the “Consuming the Pattern” section.


    Tip


    Notice that I have used the `class`keyword when defining the `Observer` protocol.
    This will make it possible for me to compare objects that implement the protocol
    when managing the observers in a class that conforms to the `Subject` protocol,
    as shown in Listing 22-5.


    ### Creating the Base Subject Class


    In the observer pattern, the subject is responsible for keeping track of its observers.
    To avoid duplicating the code that creates and manages the collection of observers,
    I create a base class that manages the observers and provides a method that subject
    implementation classes can use to send a notification. Since Swift collections
    are not thread-safe and there is the potential for the collection of observers
    to be accessed concurrently, I use Grand Central Dispatch (GCD) to protect the
    observer collection, as shown in Listing 22-5.


    Listing 22-5. Defining a Base Subject Class in the Observer.swift File


    `import Foundation;`


    `protocol Observer : class {`


    `func notify(user:String, success:Bool);`


    `}`


    `protocol Subject {`


    `func addObservers(observers:Observer...);`


    `func removeObserver(observer:Observer);`


    `}`


    `class SubjectBase : Subject {`


    `private var observers = [Observer]();`


    `private var collectionQueue = dispatch_queue_create("colQ",`


    `DISPATCH_QUEUE_CONCURRENT);`


    `func addObservers(observers: Observer...) {`


    `dispatch_barrier_sync(self.collectionQueue, { () in`


    `for newOb in observers {`


    `self.observers.append(newOb);`


    `}`


    `});`


    `}`


    `func removeObserver(observer: Observer) {`


    `dispatch_barrier_sync(self.collectionQueue, { () in`


    `self.observers = filter(self.observers, {$0 !== observer});`


    `});`


    `}`


    `func sendNotification(user:String, success:Bool) {`


    `dispatch_sync(self.collectionQueue, { () in`


    `for ob in self.observers {`


    `ob.notify(user, success: success);`


    `}`


    `});`


    `}`


    `}`


    ### Conforming to the Subject Protocol


    The next step is to update the `AuthenticationManager` class so that it conforms
    to the `Subject` protocol and to remove direct references to the system component
    classes that perform the follow-on actions. Listing 22-6 shows the changes that
    I made, relying on the `SubjectBase` class that I defined in the previous section.


    Listing 22-6. Applying the Pattern in the Authentication.swift File


    `class AuthenticationManager : SubjectBase {`


    `func authenticate(user:String, pass:String) -> Bool {`


    `var result = false;`


    `if (user == "bob" && pass == "secret") {`


    `result = true;`


    `println("User \(user) is authenticated");`


    `} else {`


    `println("Failed authentication attempt");`


    `}`


    `sendNotification(user, success: result);`


    `return result;`


    `}`


    `}`


    The effect is to simplify the class and return its focus to authenticating users.
    The references to individual component classes have been replaced with a single
    call to the `sendNotification` method, which in turn calls the `notify` method
    defined by each of the `Observer` objects that have been registered through the
    `addObservers` method provided by the `SubjectBase` class.


    ### Conforming to the Observer Protocol


    The next step is to update the component classes so they conform to the `Observer`
    protocol and can receive notifications from a `Subject`. Listing 22-7 shows the
    changes I made.


    Listing 22-7. Conforming to the Observer Protocol in the SystemComponents.swift
    File


    `class ActivityLog : Observer {`


    `func notify(user: String, success: Bool) {`


    `println("Auth request for \(user). Success: \(success)");`


    `}`


    `func logActivity(activity:String) {`


    `println("Log: \(activity)");`


    `}`


    `}`


    `class FileCache : Observer {`


    `func notify(user: String, success: Bool) {`


    `if (success) {`


    `loadFiles(user);`


    `}`


    `}`


    `func loadFiles(user:String) {`


    `println("Load files for \(user)");`


    `}`


    `}`


    `class AttackMonitor : Observer {`


    `func notify(user: String, success: Bool) {`


    `monitorSuspiciousActivity = !success;`


    `}`


    `var monitorSuspiciousActivity: Bool = false {`


    `didSet {`


    `println("Monitoring for attack: \(monitorSuspiciousActivity)");`


    `}`


    `}`


    `}`


    The additions make each class responsible for its own response to successful and
    failed authentication requests, which breaks the tight coupling with the authentication
    manager class.


    ### Consuming the Pattern


    All that remains is to update the code in the `main.swift` file to create the
    observers and register them with the subject, as shown in Listing 22-8.


    Listing 22-8. Consuming the Observer Pattern in the main.swift File


    `let log = ActivityLog();`


    `let cache = FileCache();`


    `let monitor = AttackMonitor();`


    `let authM = AuthenticationManager();`


    `authM.addObservers(log, cache, monitor);`


    `authM.authenticate("bob", pass: "secret");`


    `println("-----");`


    `authM.authenticate("joe", pass: "shhh");`


    I create instances of the individual observers and pass them to the `addObservers`
    method of the `AuthenticationManager` class. The `AuthenticationManager` class
    deals only with the observers through the `Observer` protocol and the `notify`
    method it defines and has no knowledge of the individual classes and what they
    do when the `notify` method is called. Running the application produces the following
    results:


    `User bob is authenticated`


    `Auth request for bob. Success: true`


    `Load files for bob`


    `Monitoring for attack: false`


    `-----`


    `Failed authentication attempt`


    `Auth request for joe. Success: false`


    `Monitoring for attack: true`


    Using the `Observer` protocols makes it easy to extend the application without
    having to modify the subject; new `Observer` objects are simply passed to the
    subject’s `addObservers` method.


    ## Variations on the Observer Pattern


    The observer pattern has a number of useful variations, each of which I describe
    in the following sections.'
