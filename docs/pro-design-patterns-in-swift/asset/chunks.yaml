    \    }\n}\n```\n\n代码清单 9-12 展示了 `PriceCalculator` 类相应的更改。\n\n**代码清单 9-12.** 在\
    \ `PriceCalculator.swift` 文件中消费基类\n\n```\nclass PriceCalculator {\n    class func\
    \ calculatePrice(passengers:Int, days:Int) -> Float? {\n        var car = RentalCar.createRentalCar(passengers);\n\
    \        return car == nil ? nil : car!.pricePerDay * Float(days);\n    }\n}\n\
    ```\n"
- fmt: "#### Delegating Decisions for Deeper Class Hierarchies\n\nIf you are dealing\
    \ with a deep hierarchy of implementation classes, then it can be useful to delegate\
    \ some of the decision logic into the classes themselves, as shown in Listing\
    \ 9-13.\n\n**Listing 9-13.** Delegating Decision Logic in the `RentalCar.swift`\
    \ File\n\n```\nclass RentalCar {\n    private var nameBV:String;\n    private\
    \ var passengersBV:Int;\n    private var priceBV:Float;\n    \n    private init(name:String,\
    \ passengers:Int, price:Float) {\n        self.nameBV = name;\n        self.passengersBV\
    \ = passengers;\n        self.priceBV = price;\n    }\n    \n    final var name:String\
    \ { get { return nameBV; }}\n    final var passengers:Int { get { return passengersBV;\
    \ }};\n    final var pricePerDay:Float { get { return priceBV; }};\n    \n   \
    \ class func createRentalCar(passengers:Int) -> RentalCar? {\n        var carImpl:RentalCar.Type?;\n\
    \        switch (passengers) {\n        case 0...3:\n            carImpl = Compact.self;\n\
    \        case 4...8:\n            carImpl = SUV.self\n        default:\n     \
    \       carImpl = nil;\n        }\n        return carImpl?.createRentalCar(passengers);\n\
    \    }\n}\n\nclass Compact : RentalCar {\n    private convenience init() {\n \
    \       self.init(name: \"VW Golf\", passengers: 3, price: 20);\n    }\n    \n\
    \    private override init(name: String, passengers: Int, price: Float) {\n  \
    \      super.init(name: name, passengers: passengers, price: price);\n    }\n\
    \    \n    override class func createRentalCar(passengers:Int) -> RentalCar? {\n\
    \        if (passengers < 2) {\n            return Compact();\n        } else\
    \ {\n            return SmallCompact();\n        }\n    }\n}\n\nclass SmallCompact\
    \ : Compact {\n    private init() {\n        super.init(name: \"Ford Fiesta\"\
    , passengers: 3, price: 15);\n    }\n}\n\nclass SUV : RentalCar {\n    private\
    \ init() {\n        super.init(name: \"Cadillac Escalade\", passengers: 8, price:\
    \ 75);\n    }\n    \n    override class func createRentalCar(passengers:Int) ->\
    \ RentalCar? {\n        return SUV();\n    }\n}\n```\n\n> **Note**  \n> There\
    \ are some who believe that delegating object creation to the implementation classes\
    \ is an essential part of the factory method pattern. I take a more relaxed view\
    \ and generally use delegation only when dealing with complex hierarchies of classes.\
    \ For simpler situations, I prefer to consolidate the decision logic in one place,\
    \ as I did in the previous section, because I find it easier to test and maintain.\n\
    \nI have expanded the range of rental cars available by subclassing `Compact`\
    \ to create the `SmallCompact` class. I could have included the decision logic\
    \ for choosing between `Compact` or `SmallCompact` in the `RentalCar` class, but\
    \ this can become awkward to maintain for deep hierarchies of classes (much deeper\
    \ than the two classes I have used here).\n\nThe alternative approach is to push\
    \ the decision into the implementation classes, on the basis that the `Compact`\
    \ class, for example, is best placed to understand when it should be used and\
    \ when the `SmallCompact` class is more appropriate, as illustrated by Figure\
    \ [9-2](#A978-1-4842-0394-1_9_Chapter.html#Fig2).\n\n![A978-1-4842-0394-1_9_Fig2_HTML.jpg](A978-1-4842-0394-1_9_Fig2_HTML.jpg)\n\
    \n**Figure 9-2.** Delegating the decision into subclasses\n\nWhen delegating the\
    \ decision, the factory method has to break its work into two separate operations\
    \ that were previously conflated. The first operation is to identify the type\
    \ that will be instantiated to satisfy the request, like this:\n\n```\n...\nvar\
    \ carImpl:RentalCar.Type?;\nswitch (passengers) {\ncase 0...3:\n    carImpl =\
    \ Compact.self;\ncase 4...8:\n    carImpl = SUV.self\ndefault:\n    carImpl =\
    \ nil;\n}\n...\n```\n\nThe `carImpl` variable is defined as an optional `RentalCar.Type`.\
    \ The `Type` suffix specifies that this variable will be a metatype and not an\
    \ object (meaning the implementation class and not an instance of it). The logic\
    \ in the `RentalCar` factory method selects one of the top-level implementation\
    \ classes and then invokes its `createRentalCar` method to create the result that\
    \ will be returned to the caller.\n\n```\n...\nreturn carImpl?.createRentalCar(passengers);\n\
    ...\n```\n\nIn part, the choice of where to place the decision logic is a matter\
    \ of personal preference. I generally start by consolidating the decision logic\
    \ in the factory method and start to delegate only once the conditional statements\
    \ are hard to manage or when my unit tests for validating the decisions become\
    \ unwieldy—at which point I start pushing the decisions down into the classes\
    \ themselves. Bear in mind, however, that putting all of the logic in the factory\
    \ method creates dependencies on all of the implementation classes and their subclasses,\
    \ which can undermine the benefit of applying the pattern when there is a complex\
    \ class hierarchy to deal with."
