    the `addPart` and `removePart` methods. A component that calls these methods will
    expect the data structure to be modified, but, of course, nothing will happen,
    and the result is either data loss or an error.


    ## Examples of the Composite Pattern in Cocoa


    The most important use of the composite pattern in the Cocoa framework is the
    `UIView` class, which defines the common behavior for all the elements in an app
    layout. Individual view objects in the view hierarchy can be left nodes (like
    labels) or composites that contain collections of other views (like table view
    controllers).


    ## Applying the Pattern to the SportsStore Application


    To apply the composite pattern to the SportsStore application, I am going to create
    product sets that are comprised of individual products and that will be sold as
