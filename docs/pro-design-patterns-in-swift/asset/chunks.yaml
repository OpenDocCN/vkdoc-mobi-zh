    New York\"), City(\"Paris\"), City(\"Rome\")]);\nlet sorted = nsArray.sortedArrayUsingSelector(\"\
    compareTo:\");\nfor city in sorted {\n    println(city.name);\n}\n```\n\n`NSArray`\
    \ 类可以使用选择器来引用定义比较两个对象策略的方法，从而对其内容进行排序。在示例中，我定义了一个名为 `City` 的对象，它有一个名为 `compareTo`\
    \ 的方法。`compareTo` 方法接受另一个 `City` 对象，并将其与当前实例进行比较，返回 `NSComparisonResult` 枚举中的一个值。\n\
    \n我定义了一个包含 `City` 对象的 `NSArray`，并通过调用 `sortedArrayUsingSelector` 方法对该数组进行排序，指定\
    \ `compareTo` 方法中包含比较 `City` 对象的策略。结果是排序后的对象数组输出到控制台，如下所示：\n\n```\nRome\nParis\n\
    New York\nLondon\n```\n\n## 将模式应用于 SportsStore 应用\n\nSportsStore 应用已经依赖于策略模式，因为\
    \ `ViewController` 类实现了 `UITableViewDataSource` 协议，以便向 `UITableView` 组件提供数据项。\n\
    \n```\n...\nclass ViewController: UIViewController, UITableViewDataSource {\n\
    ...\n```\n\n## 小结\n\n本章我描述了策略设计模式，它用于在不修改类或创建新子类的情况下扩展类的功能。在下一章中，我将介绍访问者模式，它允许在不修改集合类或创建子类的情况下扩展其行为。\n"
- fmt: "# 25. The Visitor Pattern\n\nThe visitor pattern is similar to the strategy\
    \ pattern in that it allows the behavior of a class to be extended without modifying\
    \ its source code or creating a new subclass, except that the visitor pattern\
    \ is applied to collections of heterogeneous objects. Table [25-1](#A978-1-4842-0394-1_25_Chapter.html#Tab1)\
    \ puts the visitor pattern into context.\n\n**Table 25-1.** Putting the Visitor\
    \ Pattern into Context\n\n| Question | Answer |\n| --- | --- |\n| What is it?\
    \ | The visitor pattern allows new algorithms to operate on collections of heterogeneous\
    \ objects without needing to modify or subclass the collection class. |\n| What\
    \ are the benefits? | The visitor pattern is useful when you want to provide collection\
    \ classes as part of frameworks without requiring third-party developers to modify\
    \ the source code. This pattern is also useful in projects where modifying core\
    \ classes triggers expensive testing procedures. |\n| When should you use this\
    \ pattern? | Use this pattern when you have classes that manage collections of\
    \ mismatched objects and you want to perform operations on them. |\n| When should\
    \ you avoid this pattern? | There is no need to use this pattern when all of the\
    \ objects are of the same type or when the collection class can be readily modified.\
    \ |\n| How do you know when you have implemented the pattern correctly? | The\
    \ pattern is implemented correctly when a visitor class can extend the behavior\
    \ of the collection class by defining methods that handle each type of object\
    \ in the collection. |\n| Are there any common pitfalls? | The only pitfall is\
    \ trying to avoid using the double dispatch technique, which I describe in the\
    \ “Understanding Double Dispatch” sidebar. |\n| Are there any related patterns?\
    \ | The visitor pattern is another way to conform to the open/closed principle\
    \ supported by the strategy pattern I described in [Chapter 24](#A978-1-4842-0394-1_24_Chapter.html).\
    \ |\n\n## Preparing the Example Project\n\nFor this chapter I created an OS X\
    \ Command Line Tool project called `Visitor`. I added a file called `Shapes.swift`\
    \ and used it to define the classes shown in Listing 25-1.\n\n**Listing 25-1.** The\
    \ Contents of the `Shapes.swift` File\n\n```\nimport Foundation;\n\nclass Circle\
    \ {\n    let radius:Float;\n    init(radius:Float) {\n        self.radius = radius;\n\
    \    }\n}\n\nclass Square {\n    let length:Float;\n    init(length:Float) {\n\
    \        self.length = length;\n    }\n}\n\nclass Rectangle {\n    let xLen:Float;\n\
    \    let yLen:Float;\n    init(x:Float, y:Float) {\n        self.xLen = x;\n \
    \       self.yLen = y;\n    }\n}\n\nclass ShapeCollection {\n    let shapes:[Any];\n\
    \    init() {\n        shapes = [\n            Circle(radius: 2.5), Square(length:\
    \ 4), Rectangle(x: 10, y: 2)\n        ];\n    }\n    func calculateAreas() ->\
    \ Float {\n        return shapes.reduce(0, combine: {total, shape in\n       \
    \     if let circle = shape as? Circle {\n                println(\"Found Circle\"\
    );\n                return total + (3.14 * powf(circle.radius, 2));\n        \
    \    } else if let square = shape as? Square {\n                println(\"Found\
    \ Square\");\n                return total + powf(square.length, 2);\n       \
    \     } else if let rect = shape as? Rectangle {\n                println(\"Found\
    \ Rectangle\");\n                return total + (rect.xLen * rect.yLen);\n   \
    \         } else {\n                // unknown type - do nothing\n           \
    \     return total;\n            }\n        });\n    }\n}\n```\n\nI have defined\
    \ three classes that represent shapes—`Circle`, `Square`, and `Rectangle`—and\
    \ a class called `ShapeCollection` that manages a collection of shape objects.\
    \ The `ShapeCollection` class contains a method called `calculateAreas` that enumerates\
    \ the collection and calculates the total area of the shapes it contains. Listing\
    \ 25-2 shows the code I defined in the `main.swift` file to demonstrate the example\
    \ classes.\n\n**Listing 25-2.** The Contents of the `main.swift` File\n\n```\n\
    let shapes = ShapeCollection();\nlet area = shapes.calculateAreas();\nprintln(\"\
    Area: \\(area)\");\n```\n\nRunning the application produces the following results:\n\
    \n```\nFound Circle\nFound Square\nFound Rectangle\nArea: 55.625\n```\n\n## Understanding\
    \ the Problem That the Pattern Solves\n\nIn the example application, the `ShapeCollection`\
    \ class manages a heterogeneous collection of objects that do not share a common\
    \ base class or conform to a common protocol. To perform operations on the objects\
    \ in the collection, I have to try to cast each object to different types, which\
    \ leads to a set of conditional statements like the one in the `calculateAreas`\
    \ method.\n\n```\n...\nfunc calculateAreas() -> Float {\n    return shapes.reduce(0,\
    \ combine: {total, shape in\n        if let circle = shape as? Circle {\n    \
    \        println(\"Found Circle\");\n            return total + (3.14 * powf(circle.radius,\
    \ 2));\n        } else if let square = shape as? Square {\n            println(\"\
    Found Square\");\n            return total + powf(square.length, 2);\n       \
    \ } else if let rect = shape as? Rectangle {\n            println(\"Found Rectangle\"\
    );\n            return total + (rect.xLen * rect.yLen);\n        } else {\n  \
    \          // unknown type - do nothing\n            return total;\n        }\n\
    \    });\n}\n...\n```\n\nEach time I add a new feature, I have to modify or subclass\
    \ the `ShapeCollection` class and create another set of conditional statements\
    \ that cast each object in the collection. Not only will this trigger comprehensive\
    \ and expensive testing in some projects, but it will also produce code that is\
    \ duplicative, inflexible, and error-prone. Listing 25-3 shows how I added another\
    \ method to the `ShapeCollection` class.\n\n**Listing 25-3.** Adding a New Method\
    \ to the `ShapeCollection` Class in the `Shapes.swift` File\n\n```\n...\nclass\
    \ ShapeCollection {\n    let shapes:[Any];\n    init() {\n        shapes = [\n\
    \            Circle(radius: 2.5), Square(length: 4), Rectangle(x: 10, y: 2)\n\
    \        ];\n    }\n    func calculateAreas() -> Float {\n        return shapes.reduce(0,\
    \ combine: {total, shape in\n            if let circle = shape as? Circle {\n\
    \                println(\"Found Circle\");\n                return total + (3.14\
    \ * powf(circle.radius, 2));\n            } else if let square = shape as? Square\
    \ {\n                println(\"Found Square\");\n                return total\
    \ + powf(square.length, 2);\n            } else if let rect = shape as? Rectangle\
    \ {\n                println(\"Found Rectangle\");\n                return total\
    \ + (rect.xLen * rect.yLen);\n            } else {\n                // unknown\
    \ type - do nothing\n                return total;\n            }\n        });\n\
    \    }\n    func countEdges() -> Int {\n        return shapes.reduce(0, combine:\
    \ {total, shape in\n            if let circle = shape as? Circle {\n         \
    \       println(\"Found Circle\");\n                return total + 1;\n      \
    \      } else if let square = shape as? Square {\n                println(\"Found\
    \ Square\");\n                return total + 4;\n            } else if let rect\
    \ = shape as? Rectangle {\n                println(\"Found Rectangle\");\n   \
    \             return total + 4;\n            } else {\n                // unknown\
    \ type - do nothing\n                return total;\n            }\n        });\n\
    \    }\n}\n...\n```\n\nThe new method is called `countEdges`, and it totals the\
    \ number of shape edges in the collection. Listing 25-4 shows the statements I\
    \ added to the `main.swift` file to test the new method.\n\n**Listing 25-4.** Using\
    \ the New Method in the `main.swift` File\n\n```\nlet shapes = ShapeCollection();\n\
    let area = shapes.calculateAreas();\nprintln(\"Area: \\(area)\");\nprintln(\"\
    ---\");\nlet edges = shapes.countEdges();\nprintln(\"Edges: \\(edges)\");\n```\n\
    \nRunning the application produces the following results:\n\n```\nFound Circle\n\
    Found Square\nFound Rectangle\nArea: 55.625\n---\nFound Circle\nFound Square\n\
    Found Rectangle\nEdges: 9\n```\n\nEach new feature faces the same problem when\
    \ enumerating the objects in the collection, producing similarly ugly code."
  raw: '# 25. The Visitor Pattern


    The visitor pattern is similar to the strategy pattern in that it allows the behavior
    of a class to be extended without modifying its source code or creating a new
    subclass, except that the visitor pattern is applied to collections of heterogeneous
    objects. Table [25-1](#A978-1-4842-0394-1_25_Chapter.html#Tab1) puts the visitor
    pattern into context.


    Table 25-1.


    Putting the Visitor Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The visitor pattern allows new algorithms to operate on collections
    of heterogeneous objects without needing to modify or subclass the collection
    class. |

    | What are the benefits? | The visitor pattern is useful when you want to provide
    collection classes as part of frameworks without requiring third-party developers
    to modify the source code. This pattern is also useful in projects where modifying
    core classes triggers expensive testing procedures. |

    | When should you use this pattern? | Use this pattern when you have classes that
    manage collections of mismatched objects and you want to perform operations on
    them. |

    | When should you avoid this pattern? | There is no need to use this pattern when
    all of the objects are of the same type or when the collection class can be readily
    modified. |

    | How do you know when you have implemented the pattern correctly? | The pattern
    is implemented correctly when a visitor class can extend the behavior of the collection
    class by defining methods that handle each type of object in the collection. |

    | Are there any common pitfalls? | The only pitfall is trying to avoid using the
    double dispatch technique, which I describe in the “Understanding Double Dispatch”
    sidebar. |

    | Are there any related patterns? | The visitor pattern is another way to conform
    to the open/closed principle supported by the strategy pattern I described in
    [Chapter 24](#A978-1-4842-0394-1_24_Chapter.html). |


    ## Preparing the Example Project


    For this chapter I created an OS X Command Line Tool project called Visitor. I
    added a file called `Shapes.swift` and used it to define the classes shown in
    Listing 25-1.


    Listing 25-1. The Contents of the Shapes.swift File


    `import Foundation;`


    `class Circle {`


    `let radius:Float;`


    `init(radius:Float) {`


    `self.radius = radius;`


    `}`


    `}`


    `class Square {`


    `let length:Float;`


    `init(length:Float) {`


    `self.length = length;`


    `}`


    `}`


    `class Rectangle {`


    `let xLen:Float;`


    `let yLen:Float;`


    `init(x:Float, y:Float) {`


    `self.xLen = x;`


    `self.yLen = y;`


    `}`


    `}`


    `class ShapeCollection {`


    `let shapes:[Any];`


    `init() {`


    `shapes = [`


    `Circle(radius: 2.5), Square(length: 4), Rectangle(x: 10, y: 2)`


    `];`


    `}`


    `func calculateAreas() -> Float {`


    `return shapes.reduce(0, combine: {total, shape in`


    `if let circle = shape as? Circle {`


    `println("Found Circle");`


    `return total + (3.14 * powf(circle.radius, 2));`


    `} else if let square = shape as? Square {`


    `println("Found Square");`


    `return total + powf(square.length, 2);`


    `} else if let rect = shape as? Rectangle {`


    `println("Found Rectangle");`


    `return total + (rect.xLen * rect.yLen);`


    `} else {`


    `// unknown type - do nothing`


    `return total;`


    `}`


    `});`


    `}`


    `}`


    I have defined three classes that represent shapes—`Circle`, `Square`, and `Rectangle`—and
    a class called `ShapeCollection` that manages a collection of shape objects. The
    `ShapeCollection` class contains a method called `calculateAreas` that enumerates
    the collection and calculates the total area of the shapes it contains. Listing
    25-2 shows the code I defined in the `main.swift` file to demonstrate the example
    classes.


    Listing 25-2. The Contents of the main.swift File


    `let shapes = ShapeCollection();`


    `let area = shapes.calculateAreas();`


    `println("Area: \(area)");`


    Running the application produces the following results:


    `Found Circle`


    `Found Square`


    `Found Rectangle`


    `Area: 55.625`


    ## Understanding the Problem That the Pattern Solves


    In the example application, the `ShapeCollection` class manages a heterogeneous
    collection of objects that do not share a common base class or conform to a common
    protocol. To perform operations on the objects in the collection, I have to try
    to cast each object to different types, which leads to a set of conditional statements
    like the one in the `calculateAreas` method.


    `...`


    `func calculateAreas() -> Float {`


    `return shapes.reduce(0, combine: {total, shape in`


    `if let circle = shape as? Circle {`


    `println("Found Circle");`


    `return total + (3.14 * powf(circle.radius, 2));`


    `} else if let square = shape as? Square {`


    `println("Found Square");`


    `return total + powf(square.length, 2);`


    `} else if let rect = shape as? Rectangle {`


    `println("Found Rectangle");`


    `return total + (rect.xLen * rect.yLen);`


    `} else {`


    `// unknown type - do nothing`


    `return total;`


    `}`


