- fmt: "# 4. The Object Template Pattern\n\nIn this chapter I describe a technique\
    \ that is so fundamental to object-oriented programming that it isn’t usually\
    \ classified as a design pattern at all: creating new objects directly from classes\
    \ or structs. In later chapters, I describe different techniques for managing\
    \ the creation of objects, but I want to start by explaining the benefit of using\
    \ classes and structs as templates from which objects are created. Not only is\
    \ it an important topic in its own right, but it allows me to illustrate the problems\
    \ that arise when templates are not used to create objects; it also sets the foundation\
    \ for explaining the benefits of more advanced patterns later. Table [4-1](#A978-1-4842-0394-1_4_Chapter.html#Tab1)\
    \ puts the object template pattern into context.\n\n**Table 4-1.** Putting the\
    \ Object Template Pattern into Context\n\n| Question | Answer |\n| --- | --- |\n\
    | What is it? | The object template pattern uses a class or struct as the specification\
    \ for the data types and logic for a given data type. Objects are created using\
    \ the template, and values for the data are set during initialization, either\
    \ through the use of default values in the template or using values provided by\
    \ the component to the class or struct initializer, also known as the constructor.\
    \ |\n| What are the benefits? | The object template pattern provides the foundation\
    \ for grouping data values and the logic that manipulates them together, known\
    \ as encapsulation. Encapsulation allows an object to present an API to its consumers\
    \ while hiding the private implementation of that API. This helps prevent the\
    \ tight coupling of components. |\n| When should you use this pattern? | You should\
    \ use this pattern in all but the simplest of projects. Swift tuples are an interesting\
    \ feature, but they can present a long-term maintenance problem, and only a little\
    \ extra work is required to create a simple class or struct instead. |\n| When\
    \ should you avoid this pattern? | These are no drawbacks in using this pattern,\
    \ but later patterns in this part of the book will show you more advanced techniques\
    \ for its use. |\n| How do you know when you have implemented the pattern correctly?\
    \ | The pattern is implemented correctly when you can make changes to the private\
    \ implementation of a class or struct without making corresponding changes to\
    \ the components that use it. |\n| Are there any common pitfalls? | The only pitfall\
    \ with this pattern is using a struct as a template when you intended to use a\
    \ class. Structs and classes have a lot in common, but they behave differently\
    \ when objects created from them are assigned to new variables, as I explain in\
    \ [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html). (There are other differences,\
    \ but they are not pertinent for this chapter.) |\n| Are there any related patterns?\
    \ | The prototype pattern, which I describe in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html),\
    \ provides an alternative technique for creating objects. |\n\n## Preparing the\
    \ Example Project\n\nFor this chapter, I created an Xcode OS X Command Line Tool\
    \ project called `ObjectTemplate` following the same process I described in [Chapter\
    \ 3](#A978-1-4842-0394-1_3_Chapter.html). No other preparation is required at\
    \ the moment.\n\n## Understanding the Problem Addressed by the Pattern\n\nIn [Chapter\
    \ 3](#A978-1-4842-0394-1_3_Chapter.html), I used Swift tuples to define the data\
    \ that the SportsStore application works with. Here is an example of a tuple from\
    \ that code:\n\n```\n(\"Kayak\", \"A boat for one person\", \"Watersports\", 275.0,\
    \ 10)\n```\n\nTuples are a set of values grouped together and are convenient and\
    \ easy to use, but they present problems that mean their use should be limited.\
    \ Listing 4-1 shows the statements I added to the `main.swift` file, which Xcode\
    \ adds to Command Line Tool projects.\n\n**Listing 4-1.** The Contents of the\
    \ `main.swift` File\n\n```\nvar products = [\n    (\"Kayak\", \"A boat for one\
    \ person\", 275.0, 10),\n    (\"Lifejacket\", \"Protective and fashionable\",\
    \ 48.95, 14),\n    (\"Soccer Ball\", \"FIFA-approved size and weight\", 19.5,\
    \ 32)\n];\n\nfunc calculateTax(product:(String, String, Double, Int)) -> Double\
    \ {\n    return product.2 * 0.2;\n}\n\nfunc calculateStockValue(tuples:[(String,\
    \ String, Double, Int)]) -> Double {\n    return tuples.reduce(0, {\n        (total,\
    \ product) -> Double in\n        return total + (product.2 * Double(product.3))\n\
    \    });\n}\n\nprintln(\"Sales tax for Kayak: $\\(calculateTax(products[0]))\"\
    );\nprintln(\"Total value of stock: $\\(calculateStockValue(products))\");\n```\n\
    \nIn this code, I defined an array of tuples representing products and two functions\
    \ that operate on them. The `calculateTax` function defines a tuple parameter\
    \ that it uses to calculate the sales tax on a price (I live in London and have\
    \ set the rate to 20 percent, which is the sales tax for the United Kingdom).\
    \ The `calculateStockValue` function operates on the array of tuples to calculate\
    \ the total value of the products by multiplying the number of items in stock\
    \ by the price of the product. I call both functions and write out the results\
    \ using the `println` function. Running the project produces the following output\
    \ in the Xcode debug console:\n\n```\nSales tax for Kayak: $55.0\nTotal value\
    \ of stock: $4059.3\n```\n\nOne of the recurring themes in this book is that tightly\
    \ coupled components are the antithesis of design patterns. Two components are\
    \ tightly coupled when one depends on the inner workings of another, or, put another\
    \ way, when you can make a change to one component without also updating the other.\n\
    \nThe term component is loosely defined, and in this case I am using it to refer\
    \ to the array of tuples and the functions that operate on it. Figure [4-1](#A978-1-4842-0394-1_4_Chapter.html#Fig1)\
    \ shows the tight couplings from the playground that exist between two functions\
    \ and the tuples.\n\n![A978-1-4842-0394-1_4_Fig1_HTML.jpg](A978-1-4842-0394-1_4_Fig1_HTML.jpg)\n\
    \n**Figure 4-1.** The tight couplings in the playground\n\nBoth functions are\
    \ tightly coupled to the tuples, both in the way they define their parameters\
    \ and in the function bodies. When defining parameters for functions that operate\
    \ on tuples, the number, order, and types of the tuple values have to match exactly.\
    \ When operating on tuples in a function body, the index values used to get or\
    \ set values have to be defined explicitly. Here is the `calculateSalesTax` function,\
    \ in which I have highlighted the dependencies on the tuples:\n\n```\nfunc calculateTax(product:\
    \ (String, String, String, Double, Int)) -> Double {\n    return product.3 * 0.2;\n\
    }\n```\n\nAnd here are the dependencies that the `calculateStockValue` function\
    \ has:\n\n```\nfunc calculateStockValue(tuples:[(String, String, Double, Int)])\
    \ -> Double {\n    return tuples.reduce(0, {(total, product) -> Double in\n  \
    \      return total + (product.2 * Double(product.3))\n    });\n}\n```\n\nThe\
    \ dependency on the structure of the tuples means that the functions and the tuples\
    \ are tightly coupled. The most obvious impact of tight coupling is that a change\
    \ to the tuples forces corresponding changes wherever there is a dependency. In\
    \ Listing 4-2, you can see what happens when I remove a value from the tuples.\n\
    \n**Listing 4-2.** Removing a Value from the Tuples in the `main.swift` File\n\
    \n```\nvar products = [\n    (\"Kayak\", 275.0, 10),\n    (\"Lifejacket\", 48.95,\
    \ 14),\n```"
