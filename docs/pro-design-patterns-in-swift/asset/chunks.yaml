    \ = -50;\nprintln(\"Stock Level for Kayak: \\(products[0].stock)\");\n```\n\n\
    我在 playground 末尾添加了两条语句，用来测试 `stock` 属性处理负值的能力，除此之外不需要其他任何修改。特别地，那些依赖于 `stock`\
    \ 属性的代码语句，并不知道该属性已从存储属性变为计算型属性。以下是运行示例应用程序时产生的控制台输出：\n\n```\nSales tax for Kayak:\
