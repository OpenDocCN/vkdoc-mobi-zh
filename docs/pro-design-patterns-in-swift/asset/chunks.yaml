    `("Bling-Bling King", "Gold-plated, diamond-studded King",`


    `"Chess", 1200.0, 4)];`


    `override func viewDidLoad() {`


    `super.viewDidLoad();`


    `displayStockTotal();`


    `}`


    `override func didReceiveMemoryWarning() {`


