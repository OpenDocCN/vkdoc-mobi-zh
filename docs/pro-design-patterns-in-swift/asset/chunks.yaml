  raw: '### Understanding the Xcode Layout


    When Xcode shows the project, you will see a layout that is similar to the one
    shown in Figure [2-11](#A978-1-4842-0394-1_2_Chapter.html#Fig11). You may see
    a slightly different layout, but I’ll explain how to open each panel.


    ![A978-1-4842-0394-1_2_Fig11_HTML.jpg](A978-1-4842-0394-1_2_Fig11_HTML.jpg)


    Figure 2-11.


    The Xcode layout for a Command Line Tool project


    I have numbered the main panes that Xcode presents, and I describe them in Table
    [2-1](#A978-1-4842-0394-1_2_Chapter.html#Tab1) for readers who are new to Xcode.
    The content of some panes changes based on the task being performed by Xcode,
    so I have included details of how the content can be selected.


    Table 2-1.


    The Default Xcode Panes


    | Number | Description |

    | --- | --- |

    | 1 | This is the navigator pane, which presents the contents of the project in
    different views that are selected using the row of buttons at the top edge. I
    use the Project Navigator view, which is displayed by clicking the first button
    in the row. The visibility of the navigator pane is controlled through the View
    ➤ Navigators menu. |

    | 2 | This is the main editor window, which adapts to the file being edited. Different
    editors are available, includes one for project settings (which is what is shown
    when the project is first created), a code editor for `.swift` files, and a drag-and-drop
    editor called UI Builder that deals with `.storyboard` files. (I use `.storyboard`
    files in [Chapter 3](#A978-1-4842-0394-1_3_Chapter.html).) Select View ➤ Standard
    Editor ➤ Show Standard Editor to open the code editor. |

    | 3 | This is the inspector pane, which reveals information about components in
    the application and is used when creating the application layout. I describe this
    pane further in [Chapter 3](#A978-1-4842-0394-1_3_Chapter.html). |

    | 4 | This is the utility pane. The content of this pane is set using the four
    buttons at the top edge, and the view shown in the figure is the Object Library,
    which contains the UI controls used to create an application layout, which I use
    in [Chapter 3](#A978-1-4842-0394-1_3_Chapter.html). You can display the Object
    Library by selecting the View ➤ Utilities ➤ Show Object Library menu. |

    | 5 | This is the Debug pane, which is used to interact with the debugger and
    to display console messages written using the Swift `println` function. This is
    where the output from Command Line Tool applications appears. This pane is controlled
    through the View ➤ Debug Area menu. |


    ### Adding a New Swift File


    The reason that I use Command Line Tool projects is so I can create multiple code
    files and enforce access protection with keywords such as `private`. To add a
    new file to the project, select the Project Navigator view in the navigator pane
    and right-click the `MyCommandLine` folder item, which currently contains a file
    called `main.swift`, as shown in Figure [2-12](#A978-1-4842-0394-1_2_Chapter.html#Fig12).


    ![A978-1-4842-0394-1_2_Fig12_HTML.jpg](A978-1-4842-0394-1_2_Fig12_HTML.jpg)


    Figure 2-12.


    Adding a new file to the example project


    Xcode will display the set of file templates available for new files. Select the
    Swift File template, as shown in Figure [2-13](#A978-1-4842-0394-1_2_Chapter.html#Fig13).


    ![A978-1-4842-0394-1_2_Fig13_HTML.jpg](A978-1-4842-0394-1_2_Fig13_HTML.jpg)


    Figure 2-13.


    Selecting the Swift file template


    Click the Next button and set the name of the new file to `MyCode.swift`, as shown
    in Figure [2-14](#A978-1-4842-0394-1_2_Chapter.html#Fig14).


    ![A978-1-4842-0394-1_2_Fig14_HTML.jpg](A978-1-4842-0394-1_2_Fig14_HTML.jpg)


    Figure 2-14.


    Setting the name of the code file


    Click the Create button, and Xcode will create the file and open it for editing.
    Replace the default content with the statements shown in Listing 2-5.


    Listing 2-5. The Contents of the MyCode.swift File


    `class MyClass {`


    `func writeHello() {`


    `println("Hello!");`


    `}`


    `private func writePassword() {`


    `println("secret");`


    `}`


    `}`


    I have defined a class called `MyClass` and added two methods. The `writeHello`
    method has no access control keyword and can be called from anywhere in the same
    module or project. The `writePassword` method is decorated with the `private`
    keyword, which means it can be accessed only from types that are defined in the
    `MyCode.swift` file.


    The `main.swift` file contains the statements that will be executed when the application
    is executed. In most of the examples in this book, I will add statements to the
    `main.swift` file to represent the calling component in a design pattern. Listing
    2-6 shows the statements I added to the file for this example.


    Listing 2-6. The Contents of the main.swift File


    `let myObject = MyClass();`


    `myObject.writeHello();`


    I create an object from the `MyClass` class and call the `writeHello` method.
    To compile and run the application, click the play icon at the top of the Xcode
    window, as shown in Figure [2-15](#A978-1-4842-0394-1_2_Chapter.html#Fig15).


    Tip


    If you don’t see the button shown in the figure, then select Show Toolbar from
    the Xcode View menu. You can also control the compilation and execution of the
    project using the Product menu.


    ![A978-1-4842-0394-1_2_Fig15_HTML.jpg](A978-1-4842-0394-1_2_Fig15_HTML.jpg)


    Figure 2-15.


    The Xcode button that compiles and runs the application


    Xcode will compile the code and run the application, and the following output
    will appear in the debug console window:


    `Hello!`


    `Program ended with exit code: 0`


    The first line of the output comes from the call to the `println` function. The
    second line indicates that the example program has terminated. I won’t usually
    show the second line, and some of the example applications that I build won’t
    terminate on their own.


    ## Summary


    In this chapter, I explained how Xcode can be used to create playgrounds and Command
    Line Tool projects, which are the main ways in which I introduce design patterns
    in this book. In the next chapter, I walk through the process of creating an iOS
    application called SportsStore, to which I apply every pattern in this book, in
    order to provide as many examples as possible and to put the patterns into a more
    realistic setting.


    # 3. Creating the SportsStore App


    In the previous chapter, I showed you how Xcode can be used to create playgrounds
    and command-line tools, which are how I introduce each of the design patterns
    in the chapters that follow.


    I like to provide as many code examples as I can in my books, so in this chapter
    I create an iOS app called SportsStore. The app I create is entirely unstructured,
    which means I simply bolt the code and the UI together as directly as possible
    without any thought to the long-term consequences. This is, of course, the antithesis
    to design patterns, but it is a surprisingly common development style. Throughout
    this book, I apply the design patterns to the unstructured application to provide
    additional context for their use.'
