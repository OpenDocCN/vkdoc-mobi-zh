    \        }\n        return PersonListView(data: repository.People);\n    }\n}\n\
    ```\n\n`CityController` 类遵循与现有控制器相同的模式，并使用 `handleCommand` 方法来选择特定的 `private`\
    \ 命令处理方法，这些方法通过仓库对模型进行操作并选择一个视图。\n\n请注意，只有 `listAll` 方法使用了新定义的视图，而 `search` 和\
    \ `delete` 方法仍然依赖于原始的 `PersonListView` 类。视图和控制器之间没有绑定关系，在大多数 MVC 应用程序中，控制器可以选择任何能够显示所处理命令生成数据的视图。\n\
    \n#### 更新框架\n\n最后一步是将新控制器添加到 `main.swift` 文件中由框架维护的责任链中，以便 `CityController` 对象有机会处理命令，如清单\
