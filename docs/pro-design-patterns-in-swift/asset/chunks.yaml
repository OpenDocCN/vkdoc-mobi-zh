    ## Understanding the Object Template Pattern


    The object template patternuses a class or struct to define a template from which
    objects are created. When an application component requires an object, it calls
    on the Swift runtime to create it by specifying the name of the template and any
    runtime initialization data values that are required to configure the object.
    There are three operations that make up the object template pattern, as illustrated
    by Figure [4-2](#A978-1-4842-0394-1_4_Chapter.html#Fig2).


    ![A978-1-4842-0394-1_4_Fig2_HTML.jpg](A978-1-4842-0394-1_4_Fig2_HTML.jpg)


    Figure 4-2.


    The object template pattern


    The first operation is the calling component asking the Swift runtime to create
    an object, providing the name of the template to use and any runtime data values
    that are required to customize the object that will be created.


    In the second operation, the Swift runtime allocates the memory required to store
    the object and uses the template to create it. Templates contain initializer methods
    that are used to prepare the object for use by settings its initial state, through
    either the runtime values supplied by the calling component or the values defined
    in the template (or both), and the Swift runtime calls the initializer to prepare
    the object for use. In the final operation, the Swift runtime gives the object
    it has created to the calling component. This three-step process can be repeated
    over and over again so that a single template can be used to create multiple objects.


    UNDERSTANDING CLASSES STRUCTS, OBJECTS, AND INSTANCES


    There are some object-oriented programing terms that are used loosely in day-to-day
    development but that can be confusing when it comes to understanding design patterns.
    The critical terms for this pattern are class, struct, object, and instance.


    Classes and structs are both templates, which are the recipes that Swift follows
    for the object template pattern. Swift follows the instructions in the template
    to create new objects. The same template can be reused to create multiple objects.
    Each object is different, but it is created using the same instructions, just
    like a recipe can be used to create multiple cakes (add one `Int`, a method to
    change its value, and so on).


    The word instance has the same meaning as object, but it is used to refer to the
    name of the pattern used to create that object so that a `Product` object can
    also be called an instance of the `Product` class.


    The important point is that classes and structs are the instructions you write
    during development and objects are created when the application. When you change
    the value stored by an object, for example, it doesn’t change the pattern used
    to create it.


    ## Implementing the Object Template Pattern


    Listing 4-3 shows the contents of a new file called `Product.swift` that I added
    to the example project and used to define a class called `Product`.


