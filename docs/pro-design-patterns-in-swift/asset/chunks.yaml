    I have expanded the range of rental cars available by subclassing `Compact` to
    create the `SmallCompact` class. I could have included the decision logic for
    choosing between `Compact` or `SmallCompact` in the `RentalCar` class, but this
    can become awkward to maintain for deep hierarchies of classes (much deeper than
    the two classes I have used here).


    The alternative approach is to push the decision into the implementation classes,
    on the basis that the `Compact` class, for example, is best placed to understand
    when it should be used and when the `SmallCompact` class is more appropriate,
    as illustrated by Figure [9-2](#A978-1-4842-0394-1_9_Chapter.html#Fig2).


    ![A978-1-4842-0394-1_9_Fig2_HTML.jpg](A978-1-4842-0394-1_9_Fig2_HTML.jpg)


    Figure 9-2.


    Delegating the decision into subclasses


    When delegating the decision, the factory method has to break its work into two
    separate operations that were previously conflated. The first operation is to
    identify the type that will be instantiated to satisfy the request, like this:


    `...`


    `var carImpl:RentalCar.Type?;`


    `switch (passengers) {`


    `case 0...3:`


    `carImpl = Compact.self;`


    `case 4...8:`


    `carImpl = SUV.self`


    `default:`


    `carImpl = nil;`


    `}`


    `...`


    The `carImpl` variable is defined as an optional `RentalCar.Type`. The `Type`
    suffix specifies that this variable will be a metatype and not an object (meaning
    the implementation class and not an instance of it). The logic in the `RentalCar`
    factory method selects one of the top-level implementation classes and then invokes
    its `createRentalCar` method to create the result that will be returned to the
    caller.


    `...`


    `return carImpl?.` `createRentalCar` `(passengers);`


    `...`


    In part, the choice of where to place the decision logic is a matter of personal
    preference. I generally start by consolidating the decision logic in the factory
    method and start to delegate only once the conditional statements are hard to
    manage or when my unit tests for validating the decisions become unwieldy—at which
    point I start pushing the decisions down into the classes themselves. Bear in
    mind, however, that putting all of the logic in the factory method creates dependencies
    on all of the implementation classes and their subclasses, which can undermine
    the benefit of applying the pattern when there is a complex class hierarchy to
    deal with.'
  trans: "\n#### 为深层类层次结构委派决策\n\n如果你正在处理一个深度嵌套的实现类层次结构，那么将部分决策逻辑委派给类本身会非常有用，如代码清单\
    \ 9-13 所示。\n\n**代码清单 9-13.** 在 `RentalCar.swift` 文件中委派决策逻辑\n\n```\nclass RentalCar\
    \ {\n    private var nameBV:String;\n    private var passengersBV:Int;\n    private\
    \ var priceBV:Float;\n    \n    private init(name:String, passengers:Int, price:Float)\
    \ {\n        self.nameBV = name;\n        self.passengersBV = passengers;\n  \
    \      self.priceBV = price;\n    }\n    \n    final var name:String { get { return\
    \ nameBV; }}\n    final var passengers:Int { get { return passengersBV; }};\n\
    \    final var pricePerDay:Float { get { return priceBV; }};\n    \n    class\
    \ func createRentalCar(passengers:Int) -> RentalCar? {\n        var carImpl:RentalCar.Type?;\n\
    \        switch (passengers) {\n        case 0...3:\n            carImpl = Compact.self;\n\
    \        case 4...8:\n            carImpl = SUV.self\n        default:\n     \
    \       carImpl = nil;\n        }\n        return carImpl?.createRentalCar(passengers);\n\
    \    }\n}\n\nclass Compact : RentalCar {\n    private convenience init() {\n \
    \       self.init(name: \"VW Golf\", passengers: 3, price: 20);\n    }\n    \n\
    \    private override init(name: String, passengers: Int, price: Float) {\n  \
    \      super.init(name: name, passengers: passengers, price: price);\n    }\n\
    \    \n    override class func createRentalCar(passengers:Int) -> RentalCar? {\n\
    \        if (passengers < 2) {\n            return Compact();\n        } else\
    \ {\n            return SmallCompact();\n        }\n    }\n}\n\nclass SmallCompact\
    \ : Compact {\n    private init() {\n        super.init(name: \"Ford Fiesta\"\
    , passengers: 3, price: 15);\n    }\n}\n\nclass SUV : RentalCar {\n    private\
    \ init() {\n        super.init(name: \"Cadillac Escalade\", passengers: 8, price:\
    \ 75);\n    }\n    \n    override class func createRentalCar(passengers:Int) ->\
    \ RentalCar? {\n        return SUV();\n    }\n}\n```\n\n> **注意**  \n> 有些人认为将对象创建委派给实现类是工厂方法模式的核心部分。我持有更宽松的观点，通常只在处理复杂的类层次结构时才使用委派。对于更简单的情况，我倾向于将决策逻辑集中在一个地方，就像我在上一节中所做的那样，因为我觉得这样更容易测试和维护。\n\
    \n我通过继承 `Compact` 类来创建 `SmallCompact` 类，从而扩展了可用的租车范围。我本可以将选择 `Compact` 或 `SmallCompact`\
    \ 的决策逻辑放在 `RentalCar` 类中，但对于深层嵌套的类层次结构（远比我这里使用的两个类要深），这种方法会变得难以维护。\n\n另一种方法是将决策下推到实现类中，例如，基于这样的原则：`Compact`\
    \ 类最适合判断何时应该使用它自身，以及何时使用 `SmallCompact` 类更合适，如图 9-2 所示。\n\n![A978-1-4842-0394-1_9_Fig2_HTML.jpg](img/A978-1-4842-0394-1_9_Fig2_HTML.jpg)\n\
    \n**图 9-2.** 将决策委派给子类\n\n在委派决策时，工厂方法必须将之前合并在一起的工作拆分为两个独立操作。第一个操作是确定将实例化哪个类型来满足请求，如下所示：\n\
    \n```\n...\nvar carImpl:RentalCar.Type?;\nswitch (passengers) {\ncase 0...3:\n\
    \    carImpl = Compact.self;\ncase 4...8:\n    carImpl = SUV.self\ndefault:\n\
    \    carImpl = nil;\n}\n...\n```\n\n`carImpl` 变量被定义为一个可选的 `RentalCar.Type` 类型。`Type`\
    \ 后缀表明该变量将是一个元类型而非对象（即指实现类本身，而非其实例）。`RentalCar` 工厂方法中的逻辑会选择一个顶层实现类，然后调用其 `createRentalCar`\
    \ 方法来创建结果并返回给调用者。\n\n```\n...\nreturn carImpl?.createRentalCar(passengers);\n\
    ...\n```\n\n部分而言，将决策逻辑放在何处是个人偏好的问题。我通常会先将决策逻辑集中在工厂方法中，只有当条件语句难以管理，或者用于验证决策的单元测试变得笨拙时，才开始进行委派——到那时，我才会开始将决策下推到类本身中。但请记住，将所有逻辑放在工厂方法中会创建对所有实现类及其子类的依赖，当处理复杂的类层次结构时，这可能会削弱应用该模式所带来的好处。"
- fmt: "# Variations on the Factory Method Pattern\n\nThe factory method pattern can\
    \ be combined with other patterns to add structure to more complex applications\
    \ by consolidating the decision logic. The most common combination is to use the\
    \ factory method pattern to select different singleton objects that all implement\
    \ a common protocol or that are all derived from a common base class. In Listing\
    \ 9-14, you can see how I have modified the implementation classes in the example\
    \ project to be singletons.\n\nListing 9-14. Combining the Singleton and Factory\
    \ Method Patterns in the `RentalCar.swift` File\n\n```\nclass RentalCar {\n  \
    \  private var nameBV:String;\n    private var passengersBV:Int;\n    private\
    \ var priceBV:Float;\n    \n    private init(name:String, passengers:Int, price:Float)\
    \ {\n        self.nameBV = name;\n        self.passengersBV = passengers;\n  \
    \      self.priceBV = price;\n    }\n    \n    final var name:String { get { return\
    \ nameBV; }}\n    final var passengers:Int { get { return passengersBV; }};\n\
    \    final var pricePerDay:Float { get { return priceBV; }};\n    \n    class\
    \ func createRentalCar(passengers:Int) -> RentalCar? {\n        var carImpl:RentalCar.Type?;\n\
    \        switch (passengers) {\n        case 0...3:\n            carImpl = Compact.self;\n\
    \        case 4...8:\n            carImpl = SUV.self\n        default:\n     \
    \       carImpl = nil;\n        }\n        return carImpl?.createRentalCar(passengers);\n\
    \    }\n}\n\nclass Compact : RentalCar {\n    private convenience init() {\n \
    \       self.init(name: \"VW Golf\", passengers: 3, price: 20);\n    }\n    \n\
    \    private override init(name: String, passengers: Int, price: Float) {\n  \
    \      super.init(name: name, passengers: passengers, price: price);\n    }\n\
    \    \n    override class func createRentalCar(passengers:Int) -> RentalCar? {\n\
    \        if (passengers < 2) {\n            return sharedInstance;\n        }\
    \ else {\n            return SmallCompact.sharedInstance;\n        }\n    }\n\
    \    \n    class var sharedInstance:RentalCar {\n        get {\n            struct\
    \ SingletonWrapper {\n                static let singleton = Compact();\n    \
    \        }\n            return SingletonWrapper.singleton;\n        }\n    }\n\
    }\n\nclass SmallCompact : Compact {\n    private init() {\n        super.init(name:\
    \ \"Ford Fiesta\", passengers: 3, price: 15);\n    }\n    \n    override class\
    \ var sharedInstance:RentalCar {\n        get {\n            struct SingletonWrapper\
    \ {\n                static let singleton = SmallCompact();\n            }\n \
    \           return SingletonWrapper.singleton;\n        }\n    }\n}\n\nclass SUV\
    \ : RentalCar {\n    private init() {\n        super.init(name: \"Cadillac Escalade\"\
    , passengers: 8, price: 75);\n    }\n    \n    override class func createRentalCar(passengers:Int)\
    \ -> RentalCar? {\n        return SUV();\n    }\n}\n```\n\nI have modified the\
    \ `Compact` and `Subcompact` classes so that they define singletons using the\
    \ struct technique I described in [Chapter 6](#A978-1-4842-0394-1_6_Chapter.html).\
    \ These singletons are used by the modifications I applied to the implementation\
    \ of the `Compact.createRentalCar` method, which returns the shared instances\
    \ rather than creating new ones.\n\nThe outcome of combining the singleton and\
    \ factory methods patterns is that knowledge about the singleton is tightly contained\
    \ to the implementation classes. The calling component of the factory method doesn’t\
    \ know—or care—if it receives a new instance or a singleton and nor does the factory\
    \ method itself. You can also mix singletons with new instances. This is illustrated\
    \ by the `SUV` class, which does not employ a singleton and whose implementation\
    \ of the `createRentalCar` method creates a new instance every time it is called.\n\
    \n**Tip** You can also use the factory method to manage access to a group of related\
    \ object pools. If you do so, remember to create a pool for each class of implementation\
    \ object. If you use a single pool for all objects, callers will receive the wrong\
    \ kind of implementation.\n\n## Understanding the Pitfalls of the Pattern\n\n\
    There are no serious pitfalls with this pattern, other than to ensure that the\
    \ factory method doesn’t reveal any details of which implementation class has\
    \ been selected to satisfy a request.\n\n## Examples of the Factory Method Pattern\
    \ in Cocoa\n\nThe Objective-C Cocoa classes make extensive use of the factory\
    \ method pattern, referring to classes that implement the pattern as class clusters.\
    \ Class clusters are managed through factory methods, but these methods are mapped\
    \ to convenience initializers for use in Swift, which hides the details away.\n\
    \nFor example, the `NSNumber` class in the `Foundation` framework defines an Objective-C\
    \ factory method called `numberWithBool` that accepts a `BOOL` value and returns\
    \ an `NSNumber` object that represents it (with the numeric value `0` or `1`).\n\
    \nThis `numberWithBool` method is presented as a Swift convenience initializer\
    \ that accepts a `Bool` value, like this:\n\n```\nvar number = NSNumber(bool:\
    \ true);\n```\n\nThe result of calling this initializer is that an `NSBoolNumber`\
    \ object is created, but this is hidden from the caller and presented as an `NSNumber`\
    \ object.\n\n**Note** It isn’t possible to use Swift initializers to implement\
    \ the factory method pattern for your own classes. Only Objective-C factory methods\
    \ are handled this way.\n\n## Applying the Pattern to the SportsStore Application\n\
    \nTo complete this chapter, I am going to apply the factory method pattern to\
    \ the SportsStore application in order to create variations on the `Product` class.\n\
    \n**Tip** Remember that you can download the source code for all the projects\
    \ in this book—including the SportsStore application in its different stages—from\
    \ [`Apress.com`](https://Apress.com)."
  raw: '## Variations on the Factory Method Pattern


    The factory method pattern can be combined with other patterns to add structure
    to more complex applications by consolidating the decision logic. The most common
    combination is to use the factory method pattern to select different singleton
    objects that all implement a common protocol or that are all derived from a common
    base class. In Listing 9-14, you can see how I have modified the implementation
    classes in the example project to be singletons.


    Listing 9-14. Combining the Singleton and Factory Method Patterns in the RentalCar.swift
    File


    `class RentalCar {`


    `private var nameBV:String;`


    `private var passengersBV:Int;`


    `private var priceBV:Float;`


    `private init(name:String, passengers:Int, price:Float) {`


    `self.nameBV = name;`


    `self.passengersBV = passengers;`


    `self.priceBV = price;`


    `}`


    `final var name:String { get { return nameBV; }}`


    `final var passengers:Int { get { return passengersBV; }};`


    `final var pricePerDay:Float { get { return priceBV; }};`


    `class func createRentalCar(passengers:Int) -> RentalCar? {`


    `var carImpl:RentalCar.Type?;`


    `switch (passengers) {`


    `case 0...3:`


    `carImpl = Compact.self;`


    `case 4...8:`


    `carImpl = SUV.self`


    `default:`


    `carImpl = nil;`


    `}`


    `return carImpl?.createRentalCar(passengers);`


    `}`


    `}`


    `class Compact : RentalCar {`


    `private convenience init() {`


    `self.init(name: "VW Golf", passengers: 3, price: 20);`


    `}`


    `private override init(name: String, passengers: Int, price: Float) {`


    `super.init(name: name, passengers: passengers, price: price);`


    `}`


    `override class func createRentalCar(passengers:Int) -> RentalCar? {`


    `if (passengers < 2) {`


    `return sharedInstance;`


    `} else {`


    `return SmallCompact.sharedInstance;`


    `}`


    `}`


    `class var sharedInstance:RentalCar {`


    `get {`


    `struct SingletonWrapper {`


    `static let singleton = Compact();`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `}`


    `}`


    `class SmallCompact : Compact {`


    `private init() {`


    `super.init(name: "Ford Fiesta", passengers: 3, price: 15);`


    `}`


    `override class var sharedInstance:RentalCar {`


    `get {`


    `struct SingletonWrapper {`


    `static let singleton = SmallCompact();`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `}`


    `}`


    `class SUV : RentalCar {`


    `private init() {`


    `super.init(name: "Cadillac Escalade", passengers: 8, price: 75);`


    `}`


    `override class func createRentalCar(passengers:Int) -> RentalCar? {`


    `return SUV();`


    `}`


    `}`


    I have modified the `Compact` and `Subcompact` classes so that they define singletons
    using the struct technique I described in [Chapter 6](#A978-1-4842-0394-1_6_Chapter.html).
    These singletons are used by the modifications I applied to the implementation
    of the `Compact.createRentalCar` method, which returns the shared instances rather
    than creating new ones.


    The outcome of combining the singleton and factory methods patterns is that knowledge
    about the singleton is tightly contained to the implementation classes. The calling
    component of the factory method doesn’t know—or care—if it receives a new instance
    or a singleton and nor does the factory method itself. You can also mix singletons
    with new instances. This is illustrated by the `SUV` class, which does not employ
    a singleton and whose implementation of the `createRentalCar` method creates a
    new instance every time it is called.


    Tip


    You can also use the factory method to manage access to a group of related object
    pools. If you do so, remember to create a pool for each class of implementation
    object. If you use a single pool for all objects, callers will receive the wrong
    kind of implementation.


    ## Understanding the Pitfalls of the Pattern


    There are no serious pitfalls with this pattern, other than to ensure that the
    factory method doesn’t reveal any details of which implementation class has been
    selected to satisfy a request.


    ## Examples of the Factory Method Pattern in Cocoa


    The Objective-C Cocoa classes make extensive use of the factory method pattern,
    referring to classes that implement the pattern as class clusters. Class clusters
    are managed through factory methods, but these methods are mapped to convenience
    initializers for use in Swift, which hides the details away.


    For example, the `NSNumber` class in the `Foundation` framework defines an Objective-C
    factory method called `numberWithBool` that accepts a `BOOL` value and returns
    an `NSNumber` object that represents it (with the numeric value `0` or `1`).


    This `numberWithBool` method is presented as a Swift convenience initializer that
    accepts a `Bool` value, like this:


    `...`


    `var number = NSNumber(bool: true);`


    `...`


    The result of calling this initializer is that an `NSBoolNumber` object is created,
    but this is hidden from the caller and presented as an `NSNumber` object.


    Note


    It isn’t possible to use Swift initializers to implement the factory method pattern
    for your own classes. Only Objective-C factory methods are handled this way.


    ## Applying the Pattern to the SportsStore Application


    To complete this chapter, I am going to apply the factory method pattern to the
    SportsStore application in order to create variations on the `Product` class.


    Tip


    Remember that you can download the source code for all the projects in this book—including
    the SportsStore application in its different stages—from [`Apress.com`](https://Apress.com)
    .'
  trans: "\n# 工厂方法模式的变体\n\n工厂方法模式可以与其他模式结合，通过整合决策逻辑来为更复杂的应用程序增加结构。最常见的组合是使用工厂方法模式选择不同的单例对象，这些对象要么实现同一个通用协议，要么都派生自同一个基类。在代码清单\
    \ 9-14 中，你可以看到我如何将示例项目中的实现类修改为单例。\n\n代码清单 9-14. 在 `RentalCar.swift` 文件中结合单例模式与工厂方法模式\n\
    \n```\nclass RentalCar {\n    private var nameBV:String;\n    private var passengersBV:Int;\n\
    \    private var priceBV:Float;\n    \n    private init(name:String, passengers:Int,\
    \ price:Float) {\n        self.nameBV = name;\n        self.passengersBV = passengers;\n\
    \        self.priceBV = price;\n    }\n    \n    final var name:String { get {\
    \ return nameBV; }}\n    final var passengers:Int { get { return passengersBV;\
    \ }};\n    final var pricePerDay:Float { get { return priceBV; }};\n    \n   \
    \ class func createRentalCar(passengers:Int) -> RentalCar? {\n        var carImpl:RentalCar.Type?;\n\
    \        switch (passengers) {\n        case 0...3:\n            carImpl = Compact.self;\n\
    \        case 4...8:\n            carImpl = SUV.self\n        default:\n     \
    \       carImpl = nil;\n        }\n        return carImpl?.createRentalCar(passengers);\n\
    \    }\n}\n\nclass Compact : RentalCar {\n    private convenience init() {\n \
    \       self.init(name: \"VW Golf\", passengers: 3, price: 20);\n    }\n    \n\
    \    private override init(name: String, passengers: Int, price: Float) {\n  \
    \      super.init(name: name, passengers: passengers, price: price);\n    }\n\
    \    \n    override class func createRentalCar(passengers:Int) -> RentalCar? {\n\
    \        if (passengers < 2) {\n            return sharedInstance;\n        }\
    \ else {\n            return SmallCompact.sharedInstance;\n        }\n    }\n\
    \    \n    class var sharedInstance:RentalCar {\n        get {\n            struct\
    \ SingletonWrapper {\n                static let singleton = Compact();\n    \
    \        }\n            return SingletonWrapper.singleton;\n        }\n    }\n\
    }\n\nclass SmallCompact : Compact {\n    private init() {\n        super.init(name:\
    \ \"Ford Fiesta\", passengers: 3, price: 15);\n    }\n    \n    override class\
    \ var sharedInstance:RentalCar {\n        get {\n            struct SingletonWrapper\
    \ {\n                static let singleton = SmallCompact();\n            }\n \
    \           return SingletonWrapper.singleton;\n        }\n    }\n}\n\nclass SUV\
    \ : RentalCar {\n    private init() {\n        super.init(name: \"Cadillac Escalade\"\
    , passengers: 8, price: 75);\n    }\n    \n    override class func createRentalCar(passengers:Int)\
    \ -> RentalCar? {\n        return SUV();\n    }\n}\n```\n\n我修改了 `Compact` 和 `Subcompact`\
    \ 类，使它们使用第 6 章中描述的结构体技术来定义单例。这些单例被应用于 `Compact.createRentalCar` 方法的修改实现中，该方法返回共享实例，而不是创建新实例。\n\
    \n结合单例模式与工厂方法模式的结果是，关于单例的知识被紧密封装在实现类内部。工厂方法的调用组件不知道——也不关心——它接收到的是新实例还是单例，工厂方法本身也同样不关心。你还可以将单例与新实例混合使用。`SUV`\
    \ 类就说明了这一点，它没有使用单例，其 `createRentalCar` 方法的实现每次被调用时都会创建一个新实例。\n\n**提示** 你还可以使用工厂方法来管理对一组相关对象池的访问。如果这样做，请记住为每个实现对象类创建一个对象池。如果对所有对象使用单个对象池，调用者将收到错误的实现类型。\n\
    \n## 理解该模式的陷阱\n\n该模式没有严重的陷阱，只需确保工厂方法不会透露任何关于选择了哪个实现类来满足请求的细节。\n\n## Cocoa 中的工厂方法模式示例\n\
    \nObjective-C 的 Cocoa 类广泛使用了工厂方法模式，将实现该模式的类称为类簇。类簇通过工厂方法进行管理，但这些方法在 Swift 中被映射为便捷初始化器，从而隐藏了底层细节。\n\
    \n例如，`Foundation` 框架中的 `NSNumber` 类定义了一个名为 `numberWithBool` 的 Objective-C 工厂方法，它接受一个\
    \ `BOOL` 值并返回一个表示该值的 `NSNumber` 对象（数值为 `0` 或 `1`）。\n\n这个 `numberWithBool` 方法在\
    \ Swift 中表现为一个接受 `Bool` 值的便捷初始化器，如下所示：\n\n```\nvar number = NSNumber(bool: true);\n\
    ```\n\n调用此初始化器的结果是创建了一个 `NSBoolNumber` 对象，但这对调用者来说是隐藏的，并以 `NSNumber` 对象的形式呈现。\n\
    \n**注意** 无法使用 Swift 的初始化器为你自己的类实现工厂方法模式。只有 Objective-C 的工厂方法才会以这种方式处理。\n\n## 将模式应用于\
    \ SportsStore 应用程序\n\n为了完成本章，我将把工厂方法模式应用于 SportsStore 应用程序，以创建 `Product` 类的变体。\n\
    \n**提示** 请记住，你可以从 [`Apress.com`](https://Apress.com) 下载本书所有项目的源代码——包括不同阶段的 SportsStore\
    \ 应用程序。\n"
- fmt: "### Preparing the Example Application\n\nTo prepare for the pattern, I need\
    \ to create implementation classes that will represent different kinds of product.\
    \ Listing 9-15 shows the additional classes I created.\n\n**Listing 9-15.** Defining\
    \ Subclasses in the `Product.swift` File\n\n```\nimport Foundation\n\nclass Product\
    \ : NSObject, NSCopying {\n\n    private(set) var name:String;\n    private(set)\
    \ var productDescription:String;\n    private(set) var category:String;\n    private\
    \ var stockLevelBackingValue:Int = 0;\n    private var priceBackingValue:Double\
    \ = 0;\n    private var salesTaxRate:Double = 0.2;\n\n    required init(name:String,\
    \ description:String, category:String, price:Double,\n        stockLevel:Int)\
    \ {\n        self.name = name;\n        self.productDescription = description;\n\
    \        self.category = category;\n        super.init();\n        self.price\
    \ = price;\n        self.stockLevel = stockLevel;\n    }\n\n    var stockLevel:Int\
    \ {\n        get { return stockLevelBackingValue;}\n        set { stockLevelBackingValue\
    \ = max(0, newValue);}\n    }\n\n    private(set) var price:Double {\n       \
    \ get { return priceBackingValue;}\n        set { priceBackingValue = max(1, newValue);}\n\
    \    }\n\n    var stockValue:Double {\n        get {\n            return (price\
    \ * (1 + salesTaxRate)) * Double(stockLevel);\n        }\n    }\n\n    func copyWithZone(zone:\
    \ NSZone) -> AnyObject {\n        return Product(name: self.name, description:\
    \ self.description,\n            category: self.category, price: self.price,\n\
    \            stockLevel: self.stockLevel);\n    }\n\n    var upsells:[UpsellOpportunities]\
    \ {\n        get {\n            return Array();\n        }\n    }\n}\n\nenum UpsellOpportunities\
    \ {\n    case SwimmingLessons;\n    case MapOfLakes;\n    case SoccerVideos;\n\
    }\n\nclass WatersportsProduct : Product {\n    required init(name: String, description:\
    \ String, category: String,\n        price: Double, stockLevel: Int) {\n     \
    \   super.init(name: name, description: description, category: category,\n   \
    \         price: price, stockLevel: stockLevel);\n        salesTaxRate = 0.10;\n\
    \    }\n    override var upsells:[UpsellOpportunities] {\n        return [UpsellOpportunities.SwimmingLessons,\
    \ UpsellOpportunities.MapOfLakes];\n    }\n}\n\nclass SoccerProduct: Product {\n\
    \    required init(name: String, description: String, category: String,\n    \
    \    price: Double, stockLevel: Int) {\n        super.init(name: name, description:\
    \ description, category: category,\n            price: price, stockLevel: stockLevel);\n\
    \        salesTaxRate = 0.25;\n    }\n    override var upsells:[UpsellOpportunities]\
    \ {\n        return [UpsellOpportunities.SoccerVideos];\n    }\n}\n```\n\nI have\
    \ enhanced the `Product` class by adding a tax rate that is used to calculate\
    \ the stock value. I also defined an enumeration called `UpsellOpportunities`\
    \ that lists additional products that may interest customers.\n\nI have created\
    \ two subclasses derived from `Product`: `WatersportsProduct` and `SoccerProduct`.\
    \ The decision logic I define when I implement the factory method pattern will\
    \ select a subclass based on the product category. Vanilla `Product` objects will\
    \ represent products that have no specialized subclass.\n\n### Implementing the\
    \ Factory Method Pattern\n\nTo implement the pattern, I defined a type method\
    \ on the `Pattern` class that contains all of the decision logic. The object hierarchy\
    \ for the SportsStore application is too simple to require delegating the decisions.\
    \ Listing 9-16 shows the factory method.\n\n**Listing 9-16.** Implementing the\
    \ Factory Method Pattern in the `Product.swift` File\n\n```\n...\nclass Product\
    \ : NSObject, NSCopying {\n    private(set) var name:String;\n    private(set)\
    \ var productDescription:String;\n    private(set) var category:String;\n    private\
    \ var stockLevelBackingValue:Int = 0;\n    private var priceBackingValue:Double\
    \ = 0;\n    private var salesTaxRate:Double = 0.2;\n\n    required init(name:String,\
