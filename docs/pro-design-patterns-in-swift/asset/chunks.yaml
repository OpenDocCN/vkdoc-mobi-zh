    \n    private init(outer:String, name:String, category:String,\n        inner:String,\
    \ value:String) {\n        self.outerTag    = outer;\n        self.productName\
    \ = name;\n        self.catName     = category;\n        self.innerTag    = inner;\n\
    \        self.value       = value;\n    }\n\n    var description : String {\n\
    \        return \"<\\(outerTag)><\\(innerTag) name=\\\"\\(productName)\\\"\" +\n\
    \            \" category=\\\"\\(catName)\\\">\\(value)</\\(innerTag)></\\(outerTag)>\"\
    \n    }\n}\n```\n\n`ChangeRecord` 类用于创建一个表示更改的 XML 风格字符串。该类定义了一组用于配置该字符串的属性。`ChangeRecord`\
    \ 类实现了 `Printable` 协议，这意味着当该类的实例被传递给 `println` 函数时，将使用其 `description` 属性。\n"
