    for the `id`, `counterParty`, and `amount` properties. The result is a JSON string
    like this, which I have formatted to make it easier to read:


    `{ "total": 300.63,`


    `"nextId": 3,`


    `"entries": [`


    `{ "id": 2, "counterParty": "Joe", "amount": 200.2 },`


    `{ "id": 1,"counterParty": "Bob", "amount": 100.43}]`


    `}`


    The process of parsing a JSON string to re-create the state of a `Ledger` object
    is equally awkward. The string is converted into a dictionary that is then processed
    to extract the data values. Overall, the process is difficult and error-prone,
    but I expect the JSON support for Swift to improve in future versions of Swift
    because it has become so prevalent as a data format. Listing 23-8 shows the changes
    that I made to the `main.swift` file to get hold of the JSON data and use it to
    set the state of an originator object.


    Listing 23-8. Using a Persistent Memento in the main.swift File


    `let ledger = Ledger();`


    `ledger.addEntry("Bob", amount: 100.43);`


    `ledger.addEntry("Joe", amount: 200.20);`


    `let memento = ledger.createMemento() as LedgerMemento;`


    `let newMemento = LedgerMemento(json: memento.jsonData);`


    `ledger.applyMemento(newMemento);`


    `ledger.printEntries();`


    I have used two `LedgerMemento` objects to demonstrate how the JSON string can
    be used as a persistent representation of an object’s state. Running the example
    application produces the following output:


    `#1: Bob $100.43`


    `#2: Joe $200.2`


    `Total: $300.63`


    ## Understanding the Pitfalls of the Memento Pattern


    Most problems with the memento pattern arise when the implementation doesn’t conform
    to the two rules I listed earlier in the chapter, such that the caretaker is able
    to change the state stored by the memento or the memento doesn’t correctly set
    every aspect of the originator’s state. As long as you bear these two rules in
    mind, you should not encounter any problems implementing the memento pattern.


    Test carefully if you are using a data format such as JSON to persistently store
    mementos. As Listing 23-7 showed, generating and parsing the persistent representation
    for even a simple object can be complex and can produce hard-to-read code.'
  trans: "\n### 备忘录模式的变体\n\n备忘录模式唯一的常见变体是表示发起者的状态，以便能够持久化存储。这使得备忘录数据可以发送到远程服务器或存储在数据库中，直到再次需要时使用。\n\
    \n你可以使用任何适合项目的的数据格式，但我倾向于使用 JSON，因为它已成为表示对象的事实标准，尤其是在 Web 服务中。Apple 通过 `NSJSONSerialization`\
    \ 类提供了 JSON 支持，但将 Swift 对象与 JSON 相互转换的过程很繁琐。清单 23-7 展示了我对 `LedgerMemento` 类所做的修改，使其能够将状态数据表示为\
