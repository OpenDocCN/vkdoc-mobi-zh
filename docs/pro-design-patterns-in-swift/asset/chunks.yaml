    As I explain in the “Understanding Swift Access Control” sidebar, the `private`
    keyword doesn’t restrict access to code defined in the same class file. Since
    I want to emphasize the public/private separation provided by this pattern, I
    am going to create a new file and use it to define the `Product` class. Following
    the process I described in the previous section, add a file called `Product.swift`
    to the SportsStore project and use it to define the class shown in Listing 4-13.


    Listing 4-13. The Contents of the Product.swift File


    `class Product {`


    `private(set) var name:String;`


    `private(set) var description:String;`


    `private(set) var category:String;`


    `private var stockLevelBackingValue:Int = 0;`


    `private var priceBackingValue:Double = 0;`


    `init(name:String, description:String, category:String, price:Double,`


    `stockLevel:Int) {`


    `self.name = name;`


    `self.description = description;`


    `self.category = category;`


    `self.price = price;`


    `self.stockLevel = stockLevel;`


    `}`


    `var stockLevel:Int {`


    `get { return stockLevelBackingValue;}`


    `set { stockLevelBackingValue = max(0, newValue);}`


    `}`


    `private(set) var price:Double {`


    `get { return priceBackingValue;}`


    `set { priceBackingValue = max(1, newValue);}`


    `}`


    `var stockValue:Double {`


    `get {`


    `return price * Double(stockLevel);`


    `}`


    `}`


    `}`


    The `Product` class shown in Listing 4-13 puts emphasis on the separation of the
    public presentation from the private implementation, which I have achieved in
    a couple of ways. The first way is by annotating the properties with `private`
    or `private(set)`. The `private` keyword hides whatever it is applied to from
    code outside of the current file, and this has the effect of making the `priceBackingValue`
    and `stockLevelBackingValue` properties entirely invisible to the rest of the
    SportsStore application because the `Product` class is the only thing in the `Product.swift`
    file.


    Annotating a property with `private(set)` means that a property can be read from
    code in other files in the same module but set by code only in the `Product.swift`
    file. I have used `private(set)` for most of the properties in Listing 4-13, which
    has the effect of allowing the values to be set using the arguments passed to
    the class initializer but not otherwise.


    Tip


    I could have achieved a similar effect using constants, but I want to emphasize
    the object template pattern in this chapter, and `private(set)` is a more useful
    example.


    The other technique I used is a calculated property that defines only a `get`
    clause. The implementation of the calculated property is private even though the
    property itself is available throughout the current module.


    UNDERSTANDING SWIFT ACCESS CONTROL


    Swift takes an unusual approach to access control, which can catch out the unwary.
    There are three levels of access control, which are applied using the `public`,
    `private`, and `internal` keywords. The `private` keyword is the most restrictive;
    it restricts access to the classes, structs methods, and properties to code defined
    in the same file. Restricting access on a per-file basis is a different approach
    from most languages and means that `private` has no effect in Xcode playgrounds.


    The `internal` keyword denotes that access is allowed within the current module.
    This is the default level of access control that is used if no keyword is applied.
    For most iOS developers, `internal` protection will have the effect of allowing
    a class, struct, method, function, or property to be used throughout a project.


    The `public` keyword applies the least restrictive level of control and allows
    access from anywhere, including outside the current module. This is of most use
    to developers who are creating frameworks and who will need to use the `public`
    keyword to define the API that the framework presents to other developers.


    If you have moved to Swift from a language such as C# or Java, then you can most
    closely re-create the access controls you are used to by defining each class or
    struct in its own `.swift` file and using the `private` and `internal` access
    levels.


    ### Applying the Product Class


