  trans: "\n### 定义适配器类\n\n为了将 `EuroHandler` 类适配到 SportsStore 应用程序中，我需要定义一个具体的工厂类，用于生成\
    \ `StockValueConverter` 和 `StockValueFormatter` 对象。清单 12-14 展示了我对 `StockValueFactories.swift`\
    \ 文件所做的修改。\n\n**清单 12-14.** 在 `StockValueFactories.swift` 文件中定义适配器\n\n```\nimport\
    \ Foundation\n\nclass StockTotalFactory {\n\n    enum Currency {\n        case\
    \ USD\n        case GBP\n        case EUR\n    }\n\n    private(set) var formatter:StockValueFormatter?;\n\
    \    private(set) var converter:StockValueConverter?;\n\n    class func getFactory(curr:Currency)\
    \ -> StockTotalFactory {\n        if (curr == Currency.USD) {\n            return\
    \ DollarStockTotalFactory.sharedInstance;\n        } else if (curr == Currency.GBP){\n\
    \            return PoundStockTotalFactory.sharedInstance;\n        } else {\n\
    \            return EuroHandlerAdapter.sharedInstance;\n        }\n    }\n}\n\n\
    // ...为简洁起见，省略了其他工厂...\n\nclass EuroHandlerAdapter : StockTotalFactory,\n    StockValueConverter,\
    \ StockValueFormatter {\n    private let handler:EuroHandler;\n\n    override\
    \ init() {\n        self.handler = EuroHandler();\n        super.init();\n   \
    \     super.formatter = self;\n        super.converter = self;\n    }\n\n    func\
    \ formatTotal(total:Double) -> String {\n        return handler.getDisplayString(total);\n\
    \    }\n\n    func convertTotal(total:Double) -> Double {\n        return handler.getCurrencyAmount(total);\n\
    \    }\n\n    class var sharedInstance:EuroHandlerAdapter {\n        get {\n \
    \           struct SingletonWrapper {\n                static let singleton =\
    \ EuroHandlerAdapter();\n            }\n            return SingletonWrapper.singleton;\n\
    \        }\n    }\n}\n```\n\n**提示** 我必须将工厂类定义在 `StockValueFactories.swift` 文件中，因为需要为\
    \ `StockTotalFactory` 类中的 `private` 属性设置值，这意味着要将适配器放在同一个文件中。\n\n我已经更新了 `StockTotalFactory`\
    \ 类，添加了对欧元处理的支持，并定义了一个名为 `EuroHandlerAdapter` 的适配器。该适配器派生自 `StockTotalFactory`\
    \ 类，并同时遵循 `StockValueConverter` 和 `StockValueFormatter` 协议。它通过创建 `EuroHandler`\
    \ 实例并将其提供的功能映射到协议指定的方法，从而适配了 `EuroHandler` 类。我也可以通过定义扩展来处理协议，但我更倾向于在可能的情况下将适配器保持为单一类型。\n\
    \n### 使用适配后的功能\n\n在清单 12-15 中，你可以看到我如何更新了 `ViewController` 类的 `displayStockTotal`\
    \ 方法，以便欧元成为选定的货币。\n\n**清单 12-15.** 在 `ViewController.swift` 文件中使用适配器\n\n```\n\
    ...\n\nfunc displayStockTotal() {\n    let finalTotals:(Int, Double) = productStore.products.reduce((0,\
    \ 0.0),\n        {(totals, product) -> (Int, Double) in\n            return (\n\
    \                totals.0 + product.stockLevel,\n                totals.1 + product.stockValue\n\
    \            );\n    });\n\n    var factory = StockTotalFactory.getFactory(StockTotalFactory.Currency.EUR);\n\
    \    var totalAmount = factory.converter?.convertTotal(finalTotals.1);\n    var\
    \ formatted = factory.formatter?.formatTotal(totalAmount!);\n    totalStockLabel.text\
    \ = \"\\(finalTotals.0) Products in Stock. \"\n        + \"Total Value: \\(formatted!)\"\
    ;\n}\n\n...\n```\n\n结果是库存总价值将被转换为欧元并显示在应用程序布局的底部，如图 12-2 所示。\n\n![A978-1-4842-0394-1_12_Fig2_HTML.jpg](img/A978-1-4842-0394-1_12_Fig2_HTML.jpg)\n\
    \n**图 12-2.** 欧元适配器的效果\n\n### 本章小结\n\n在本章中，我解释了如何使用适配器模式使两个接口不兼容的类协同工作。我演示了如何通过使用扩展以及创建一个包装被适配对象的类来定义适配器。在下一章中，我将描述桥接模式。\n\
    \n# 13. 桥接模式\n\n桥接模式可能令人困惑。它看起来类似于我在第 12 章中描述的适配器模式，但其用途可能看起来有违直觉。在本章中，我将重点介绍桥接模式最常用于解决的问题，并解释为什么桥接模式和适配器模式最大的区别在于意图而非实现。表\
    \ 13-1 展示了桥接模式的上下文。\n\n**表 13-1.** 桥接模式上下文\n\n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？\
    \ | 桥接模式将抽象与其实现分离，以便两者可以独立更改，而无需相互对应地修改。更常见的是，桥接模式用于解决称为“爆炸式类层次结构”的问题，该问题通常源于重复但欠考虑的代码重构，并导致需要不断增加类来为应用程序添加新功能。\
    \ |\n| 有什么好处？ | 当桥接模式应用于爆炸式类层次结构问题时，其好处是添加新功能到应用程序只需要一个类。更广泛地说，该模式在抽象或其实现发生变化时，能隔离变更的影响。\
    \ |\n| 何时使用此模式？ | 使用此模式来解决爆炸式类层次结构问题，或在两个 API 之间建立桥梁。 |\n| 何时应避免此模式？ | 在尝试集成第三方组件时不要使用此模式；请改用我在第\
    \ 12 章中描述的适配器模式。 |\n| 如何知道是否正确实现了该模式？ | 针对爆炸式类层次结构问题，当添加新功能或添加对新平台的支持只需一个类即可完成时，即表示正确实现了该模式。更广泛地说，当你能够更改抽象（例如协议或闭包签名）而无需相应地更改其实现时，即表示正确实现了该模式。\
    \ |\n| 是否有常见的陷阱？ | 如果通用代码未能与平台特定代码分离，爆炸式类层次结构将无法解决。 |\n| 是否有相关的模式？ | 许多结构型模式具有相似的实现但意图不同。请确保从我在本书这部分描述的模式中选择正确的模式。\
    \ |\n"
- fmt: "# Preparing the Example Project\n\nFor this chapter I created a new OS X Command\
    \ Line Tool project called `Bridge`. To prepare for this chapter, I added a file\
    \ called `Comms.swift` and used it to define the types shown in Listing 13-1.\n\
    \nListing 13-1. The Contents of the `Comms.swift` File\n\n```\nprotocol ClearMessageChannel\
    \ {\n    func send(message:String);\n}\n\nprotocol SecureMessageChannel {\n  \
    \  func sendEncryptedMessage(encryptedText:String);\n}\n\nclass Communicator {\n\
    \    private let clearChannel:ClearMessageChannel;\n    private let secureChannel:SecureMessageChannel;\n\
    \n    init (clearChannel:ClearMessageChannel, secureChannel:SecureMessageChannel)\
    \ {\n        self.clearChannel = clearChannel;\n        self.secureChannel = secureChannel;\n\
    \    }\n\n    func sendCleartextMessage(message:String) {\n        self.clearChannel.send(message);\n\
    \    }\n\n    func sendSecureMessage(message:String) {\n        self.secureChannel.sendEncryptedMessage(message);\n\
    \    }\n}\n```\n\nThe `Communicator` class provides methods that allow standard\
    \ and secure messages to be sent. The mechanisms by which these messages are processed\
    \ are defined by the `ClearMessageChannel` and `SecureMessageChannel` protocols,\
    \ each of which defines the methods required to handle one type of communication.\n\
    \nI am going to support two different networking mechanisms that can be used to\
    \ transmit messages: landline and wireless. I created a file called `Channels.swift`\
    \ and used it to create the classes shown in Listing 13-2.\n\nListing 13-2. The\
    \ Contents of the `Channels.swift` File\n\n```\nclass Landline : ClearMessageChannel\
    \ {\n    func send(message: String) {\n        println(\"Landline: \\(message)\"\
    );\n    }\n}\n\nclass SecureLandLine : SecureMessageChannel {\n    func sendEncryptedMessage(message:\
    \ String) {\n        println(\"Secure Landline: \\(message)\");\n    }\n}\n\n\
    class Wireless : ClearMessageChannel {\n    func send(message: String) {\n   \
    \     println(\"Wireless: \\(message)\");\n    }\n}\n\nclass SecureWireless :\
    \ SecureMessageChannel {\n    func sendEncryptedMessage(message: String) {\n \
    \       println(\"Secure Wireless: \\(message)\");\n    }\n}\n```\n\nTo complete\
    \ the preparations, I added code to the `main.swift` file that creates the channels\
    \ it requires to send messages and uses them to create a `Communicator` object,\
    \ as shown in Listing 13-3.\n\nListing 13-3. The Contents of the `main.swift`\
    \ File\n\n```\nvar clearChannel = Landline();\nvar secureChannel = SecureLandLine();\n\
    var comms = Communicator(clearChannel: clearChannel, secureChannel: secureChannel);\n\
    comms.sendCleartextMessage(\"Hello!\");\ncomms.sendSecureMessage(\"This is a secret\"\
    );\n```\n\nRunning the project produces the following output in the Xcode debug\
    \ console:\n\n```\nLandline: Hello!\nSecure Landline: This is a secret\n```\n\n\
    # Understanding the Problem That the Pattern Solves\n\nIf the code I added to\
    \ the example application seems poorly thought out, it is because I added all\
    \ of the classes in one go. The problem that the bridge pattern solves is one\
    \ that usually manifests itself gradually as features are added to an application\
    \ and code is refactored.\n\nWhat I have ended up with is two features (clear\
    \ and secure messages) and two platforms on which those features are implemented\
    \ (landlines and wireless networks). No one sets out to create this kind of hierarchy,\
    \ and it usually gets created through the best of intentions. An application usually\
    \ started with one feature and one platform, as shown in Figure 13-1.\n\n![Figure\
    \ 13-1](A978-1-4842-0394-1_13_Fig1_HTML.jpg)\n\nFigure 13-1. The simple starting\
    \ point for an application\n\nAt some point, another platform is required, and\
    \ the selection of that platform will need to change based on how the application\
    \ is configured. Some judicious refactoring adds a protocol that identifies what\
    \ the platform needs to do, and implementation classes that handle the details\
    \ of the platform are created, as shown in Figure 13-2.\n\n![Figure 13-2](A978-1-4842-0394-1_13_Fig2_HTML.jpg)\n\
    \nFigure 13-2. Dealing with multiple platforms\n\nLater, there is a need to add\
    \ a new feature—secure messaging—and so another protocol is added and implementation\
    \ objects are created, as shown in Figure 13-3. This is the state of the application\
    \ that I created in the previous section.\n\n![Figure 13-3](A978-1-4842-0394-1_13_Fig3_HTML.jpg)\n\
    \nFigure 13-3. Dealing with multiple features\n\nThe problem is that the number\
    \ of implementation classes increases sharply each time I add a new feature or\
    \ a new platform. In fact, the total number of implementation classes is the product\
    \ of the number and platforms, meaning that if I add a third feature to the application,\
    \ the number of implementation classes will be six (the product of 3 and 2). Another\
    \ platform will give require nine implementation classes (the product of 3 and\
    \ 3).\n\nThis is known as the exploding class hierarchy problem, and it produces\
    \ an unmanageable mess of protocols and implementation classes that are hard to\
    \ keep track of and even harder to maintain. Exploding class hierarchies are usually\
    \ not intentional, but they are easy to create when there is time pressure to\
    \ add new features and keep the project moving along."
