  raw: '### Defining a Global Factory Method


    The simplest way to implement the pattern is to define a global function. Global
    functions are available throughout an application, which makes it easy for calling
    components to find and call them, as shown in Listing 9-7.


    Listing 9-7. Implementing the Factory Method Pattern in the RentalCar.swift File


    `func createRentalCar(passengers:Int) -> RentalCar? {`


    `var car:RentalCar?;`


    `switch (passengers) {`


    `case 0...1:`


    `car = Sports();`


    `case 2...3:`


    `car = Compact();`


    `case 4...8:`


    `car = SUV();`


    `case 9...14:`


    `car = Minivan();`


    `default:`


    `car = nil;`


    `}`


    `return car;`


    `}`


    `protocol RentalCar {`


    `var name:String { get };`


    `var passengers:Int { get };`


    `var pricePerDay:Float { get };`


    `}`


    `class Compact : RentalCar {`


    `var name = "VW Golf";`


    `var passengers = 3;`


    `var pricePerDay:Float = 20;`


    `}`


    `// ...implementation classes omitted for brevity...`


    This may seem like a small change because the global function—called `createRentalCar`—contains
    the same decision logic that the `CarSelector` and `PriceCalculator` classes use.
    Even so, the effect it has on the calling components is profound. Listing 9-8
    shows the changes to the `CarSelector` class to use the global function.


    Listing 9-8. Calling the Global Function in the CarSelector.swift File


    `class CarSelector {`


    `class func selectCar(passengers:Int) -> String? {`


    `return createRentalCar(passengers)?.name;`


    `}`


    `}`


    Not only is there a lot less code, but the `CarSelector` class has dependencies
    only on the global factory function and the `RentalCar` protocol. It no longer
    knows anything about the implementation classes and the relationship between them—it
    just knows that calling the `createRentalCar` global function will produce an
    object that conforms to the protocol. Listing 9-9 shows the corresponding changes
    to the `PriceCalculator` class.


    Listing 9-9. Calling the Global Function in the PriceCalculator.swift File


    `class PriceCalculator {`


    `class func calculatePrice(passengers:Int, days:Int) -> Float? {`


    `var car = createRentalCar(passengers);`


    `return car == nil ? nil : car!.pricePerDay * Float(days);`


    `}`


    `}`


    The added value that each class provides is intact, but exists without diffusing
    the decision logic and implementation classes throughout the application.


    ### Using a Base Class


    The global function approach works, but it can feel a little disconnected from
    the protocol and classes it operates on. An alternative approach is to replace
