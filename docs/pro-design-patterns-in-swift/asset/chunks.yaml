    that provides a simple API for using the complex classes. The façade class should
    not expose any of the details of the underlying classes or require the calling
    component to have any knowledge of them. Listing 16-5 shows the contents of the
    `Facade.swift` file, which I added to the example project in order to define a
    façade class.


    Listing 16-5. The Contents of the Facade.swift File


    `import Foundation`


    `enum TreasureTypes {`


    `case SHIP; case BURIED; case SUNKEN;`


    `}`


    `class PirateFacade {`


    `private let map = TreasureMap();`


    `private let ship = PirateShip();`


    `private let crew = PirateCrew();`


    `func getTreasure(type:TreasureTypes) -> Int? {`


    `var prizeAmount:Int?;`


    `// select the treasure type`


    `var treasureMapType:TreasureMap.Treasures;`


    `var crewWorkType:PirateCrew.Actions;`


    `switch (type) {`


    `case .SHIP:`


    `treasureMapType = TreasureMap.Treasures.GALLEON;`


    `crewWorkType = PirateCrew.Actions.ATTACK_SHIP;`


    `case .BURIED:`


    `treasureMapType = TreasureMap.Treasures.BURIED_GOLD;`


    `crewWorkType = PirateCrew.Actions.DIG_FOR_GOLD;`


    `case .SUNKEN:`


    `treasureMapType = TreasureMap.Treasures.SUNKEN_JEWELS;`


    `crewWorkType = PirateCrew.Actions.DIVE_FOR_JEWELS;`


    `}`


    `let treasureLocation = map.findTreasure(treasureMapType);`


    `// convert from map to ship coordinates`


    `let sequence:[Character] = ["A", "B", "C", "D", "E", "F", "G"];`


    `let eastWestPos = find(sequence, treasureLocation.gridLetter);`


    `let shipTarget = PirateShip.ShipLocation(NorthSouth:`


    `Int(treasureLocation.gridNumber), EastWest: eastWestPos!);`


    `let semaphore = dispatch_semaphore_create(0);`


    `// relocate ship`


    `ship.moveToLocation(shipTarget, callback: {location in`


    `self.crew.performAction(crewWorkType, {prize in`


    `prizeAmount = prize;`


    `dispatch_semaphore_signal(semaphore);`


    `});`


    `});`


    `dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER);`


    `return prizeAmount;`


    `}`


    `}`


    The `PirateFacade` class defines a method called `getTreasure` that is the façade
    for the `TreasureMap`, `PirateShip`, and `PirateCrew` classes. The implementation
    of the `getTreasure` method contains largely the same code but with two important
    differences.


    The first difference is that the `PirateFacade` class relies on the `TreasureTypes`
    enumeration to work out what kind of treasure and what kind of crew work will
    be required. I could have relied on one of the enumerations defined by the classes
    behind the façade, but that would create a dependency on one of those classes,
    which is something that I want to avoid. Including an enumeration in the façade
    allows me to completely hide the implementation of the classes behind the façade.


    The other difference is that the `getTreasure` method is synchronous and blocks
    while the calls to the asynchronous methods in the classes behind the façade are
    completed. This isn’t required to implement the façade pattern, which can happily
    incorporate asynchronous methods, but I wanted to completely hide the underlying
    implementation details, which I have done using a Grand Central Dispatch semaphore.
    (I introduced the GCD semaphore in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html).)


    ### Applying the Façade


    All that remains is to revise the code in the `main.swift` file to take advantage
    of the façade class, as shown in Listing 16-6.


    Listing 16-6. Using the Façade Class in the main.swift File


    `let facade = PirateFacade();`


    `let prize = facade.getTreasure(TreasureTypes.SHIP);`


    `if (prize != nil) {`


    `println("Prize: \(prize!) pieces of eight");`


    `}`


    All of the complexity involved in using the `TreasureMap`, `PirateShip`, and `PirateCrew`
    classes is hidden away, and any component that needs to use these classes need
    deal only with the façade. Running the application produces the following output
    in the Xcode debug console:


    `Prize: 10000 pieces of eight`


    ## Variations on the Façade Pattern


    The class I created in the previous section is an opaque façade, which means that
    no details of the underlying objects are exposed to the calling components. A
    variation on the pattern is to create a transparent façade, in which some or all
    of the underlying objects are exposed for calling components that require advanced
    features or finer-grained control over the work that is being done. In Swift,
    transparent façade classes simply provide access to the properties that store
    the underlying objects, as shown in Listing 16-7.


    Listing 16-7. Creating a Transparent Façade in the Facade.swift File


    `import Foundation`


    `enum TreasureTypes {`


    `case SHIP; case BURIED; case SUNKEN;`


    `}`


    `class PirateFacade {`


    `let map = TreasureMap();`


    `let ship = PirateShip();`


    `let crew = PirateCrew();`


    `func getTreasure(type:TreasureTypes) -> Int? {`


    `//` `...statements omitted for brevity...`


    `}`


    `}`


    I have removed the `private` keywords that were protecting the `map`, `ship`,
    and `crew` properties, and the effect is that calling components can choose to
    access those objects directly, rather than relying solely on the `getTreasure`
    method, as shown in Listing 16-8.


    Listing 16-8. Using a Transparent Façade in the main.swift File


    `import Foundation;`


    `let facade = PirateFacade();`


    `let prize = facade.getTreasure(TreasureTypes.SHIP);`


    `if (prize != nil) {`


    `facade.crew.performAction(PirateCrew.Actions.DIVE_FOR_JEWELS,`


    `callback: {secondPrize in`


    `println("Prize: \(prize! + secondPrize) pieces of eight");`


    `});`


    `}`


    `NSFileHandle.fileHandleWithStandardInput().availableData;`


    By accessing the `crew` property of the façade class, I am able to issue a second
    instruction without calling the `getTreasure` method, which would consult the
    map and move the ship. This is an advanced operation. Most of the time, the pirates
    attack a ship and move on, but in this instance, they also dive for sunken treasure
    at the same location. Creating a transparent façade allows me to deal with this
    advanced, and unusual, situation without adding additional complexity to the façade
    class.


    The drawback of this approach is that it undermines the isolation offered by the
    façade class. The code in the `main.swift` file, which represents the calling
    component in this example, now needs to know about how the `PirateCrew` class
    is implemented, about its dependency on the `Actions` enumeration, and about the
    fact that the `performAction` method is implemented asynchronously. For this reason,
    the transparent variation on the façade pattern should be used sparingly and carefully.
    Running the application produces the following output:


    `Prize: 11000 pieces of eight`'
