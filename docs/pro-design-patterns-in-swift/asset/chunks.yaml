    \ `Bridge.swift` 文件中添加对新消息类型的支持\n\n```\nclass CommunicatorBridge : ClearMessageChannel,\n\
    \    SecureMessageChannel, PriorityMessageChannel {\n    private var channel:Channel;\n\
    \    init(channel:Channel) {\n        self.channel = channel;\n    }\n    func\
    \ send(message: String) {\n        let msg = ClearMessage(message: message);\n\
    \        sendMessage(msg);\n    }\n    func sendEncryptedMessage(encryptedText:\
    \ String) {\n        let msg = EncryptedMessage(message: encryptedText);\n   \
    \     sendMessage(msg);\n    }\n    func sendPriority(message: String) {\n   \
    \     sendMessage(PriorityMessage(message: message));\n    }\n    private func\
    \ sendMessage(msg:Message) {\n        msg.prepareMessage();\n        channel.sendMessage(msg);\n\
    \    }\n}\n```\n\n现在我可以更改 `main.swift` 文件中的代码来测试新功能，如清单 13-11 所示。\n\n**清单 13-11.** 在\
    \ `main.swift` 文件中测试新消息类型\n\n```\nvar bridge = CommunicatorBridge(channel: SatelliteChannel());\n\
    var comms = Communicator(clearChannel: bridge, secureChannel: bridge,\n      \
    \                   priorityChannel: bridge);\ncomms.sendCleartextMessage(\"Hello!\"\
    );\ncomms.sendSecureMessage(\"This is a secret\");\ncomms.sendPriorityMessage(\"\
    This is important\");\n```\n\n运行应用程序会产生以下输出，这展示了新的消息类型和通道：\n\n```\nSatellite:\
    \ Hello!\nSatellite: terces a si sihT\nSatellite: Important: This is important\n\
    ```\n"
- fmt: "# Variations on the Bridge Pattern\n\nThe platform is selected at runtime\
    \ and is usually set using a configuration file or some external setting. In the\
    \ case of the example application, the platform is the channel over which messages\
    \ are sent, and the choice of platform would be driven by the available networking\
    \ hardware. In practice, I select the platform explicitly, like this:\n\n```\n\
    ...\nvar bridge = CommunicatorBridge(channel: SatelliteChannel());\n...\n```\n\
    \nThis is unrealistic because the platform-specific implementation is selected\
    \ at compile time, and I have to change the code and recompile to change the platform.\
    \ I have done this because I don’t want to create a configuration system or detect\
    \ different kinds of networks to demonstrate the use of the pattern.\n\nThe simplest\
    \ way to vary the pattern is to apply the factory method pattern so that the selection\
    \ of the platform-specific implementation is hidden from the bridge class and\
    \ from the rest of the application. Listing 13-12 shows how I have implemented\
    \ the factory method—which I described in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html)—in\
    \ the example application.\n\n**Listing 13-12.** Applying the Factory Method Pattern\
    \ in the `Channels.swift` File\n\n```\nclass Channel {\n    enum Channels {\n\
    \        case Landline;\n        case Wireless;\n        case Satellite;\n   \
    \ }\n\n    class func getChannel(channelType:Channels) -> Channel {\n        switch\
    \ channelType {\n            case .Landline:\n                return LandlineChannel();\n\
    \            case .Wireless:\n                return WirelessChannel();\n    \
    \        case .Satellite:\n                return SatelliteChannel();\n      \
    \  }\n    }\n\n    func sendMessage(msg:Message) {\n        fatalError(\"Not implemented\"\
    );\n    }\n}\n\nclass LandlineChannel : Channel {\n    override func sendMessage(msg:\
    \ Message) {\n        println(\"Landline: \\(msg.contentToSend)\");\n    }\n}\n\
    \nclass WirelessChannel : Channel {\n    override func sendMessage(msg: Message)\
    \ {\n        println(\"Wireless: \\(msg.contentToSend)\");\n    }\n}\n```\n\n\
    I have changed the definition of the `Channel` type so that it is a class rather\
    \ than a protocol and have defined a nested `enum` called `Channels` that enumerates\
    \ the set of platforms available: landline, wireless, and satellite. I have defined\
    \ a class method called `getChannel` that accepts a `Channels` value and instantiates\
    \ the class that represents the platform.\n\nI had to apply the `override` keyword\
    \ to the `sendMessage` method defined by the `LandlineChannel` and `WirelessChannel`\
    \ classes because `Channel` has changed from a protocol to a class, and Listing\
    \ 13-13 shows the corresponding change for the satellite implementation class.\n\
    \n**Listing 13-13.** Modifying a Method Declaration in the `NewFeatures.swift`\
    \ File\n\n```\nclass SatelliteChannel : Channel {\n    override func sendMessage(msg:\
    \ Message) {\n        println(\"Satellite: \\(msg.contentToSend)\");\n    }\n\
    }\n\nclass PriorityMessage : ClearMessage {\n    override var contentToSend:String\
    \ {\n        return \"Important: \\(super.contentToSend)\";\n    }\n}\n```\n\n\
    Listing 13-14 shows the changes to the `CommunicatorBridge` class so that the\
    \ initializer accepts a value from the enumeration rather than an instance of\
    \ an implementation class.\n\n**Listing 13-14.** Changing the Initializer in the\
    \ `Bridge.swift` File\n\n```\nclass CommunicatorBridge : ClearMessageChannel,\
    \ SecureMessageChannel,\n    PriorityMessageChannel {\n    private var channel:Channel;\n\
    \n    init(channel:Channel.Channels) {\n        self.channel = Channel.getChannel(channel);\n\
    \    }\n\n    func send(message: String) {\n        let msg = ClearMessage(message:\
    \ message);\n        sendMessage(msg);\n    }\n\n    func sendEncryptedMessage(encryptedText:\
    \ String) {\n        let msg = EncryptedMessage(message: encryptedText);\n   \
    \     sendMessage(msg);\n    }\n\n    func sendPriority(message: String) {\n \
    \       sendMessage(PriorityMessage(message: message));\n    }\n\n    private\
    \ func sendMessage(msg:Message) {\n        msg.prepareMessage();\n        channel.sendMessage(msg);\n\
    \    }\n}\n```\n\nFinally, I need to update the code that selects the platform\
    \ in the `main.swift` file, as shown in Listing 13-15.\n\n**Listing 13-15.** Updating\
    \ the `main.swift` File\n\n```\nvar bridge = CommunicatorBridge(channel: Channel.Channels.Satellite);\n\
    var comms = Communicator(clearChannel: bridge,\n    secureChannel: bridge, priorityChannel:\
    \ bridge);\ncomms.sendCleartextMessage(\"Hello!\");\ncomms.sendSecureMessage(\"\
    This is a secret\");\ncomms.sendPriorityMessage(\"This is important\");\n```\n\
    \n## Collapsing the Bridge\n\nWhen applying the bridge pattern, the standard assumption\
    \ is that the protocols that are being bridged will be used elsewhere in the application.\
    \ In the case of the example, this means there would be other classes similar\
    \ to `Communicator` that will rely on the `ClearMessageChannel`, `SecureMessageChannel`,\
    \ and `PriorityMessageChannel` protocols, which is why I left these—and the `Communicator`\
    \ class—intact and applied the bridge to them.\n\nIn some applications, there\
    \ will be only one class that relies on the protocols, and this allows it and\
    \ the bridge to be merged and the redundant protocols removed.\n\nThe first step\
    \ is to remove the `Bridge.swift` file from the project. The `CommunicatorBridge`\
    \ class that it contains will not longer be required and will prevent Xcode from\
    \ being able to build the project because it depends on protocols that I am going\
    \ to remove. The next step is to add the bridge functionality to the `Communicator`\
    \ class, as shown in Listing 13-16.\n\n**Listing 13-16.** Adding the Bridge Functionality\
    \ in the `Comms.swift` File\n\n```\n//protocol ClearMessageChannel {\n//    func\
    \ send(message:String);\n//}\n//\n//protocol SecureMessageChannel {\n//    func\
    \ sendEncryptedMessage(message:String);\n//}\n//\n//protocol PriorityMessageChannel\
    \ {\n//    func sendPriority(message:String);\n//}\n\nclass Communicator {\n \
    \   private let channnel:Channel;\n\n    init (channel:Channel.Channels) {\n \
    \       self.channnel = Channel.getChannel(channel);\n    }\n\n    private func\
    \ sendMessage(msg:Message) {\n        msg.prepareMessage();\n        channnel.sendMessage(msg);\n\
    \    }\n\n    func sendCleartextMessage(message:String) {\n        self.sendMessage(ClearMessage(message:\
    \ message));\n    }\n\n    func sendSecureMessage(message:String) {\n        self.sendMessage(EncryptedMessage(message:\
    \ message));\n    }\n\n    func sendPriorityMessage(message:String) {\n      \
    \  self.sendMessage(PriorityMessage(message: message));\n    }\n}\n```\n\nI have\
    \ commented out the old protocols and changed the `Communicator` class so that\
    \ it operates directly on the `Message` and `Channel` protocols and no longer\
    \ depends on a separate bridge class.\n\n**Caution**\n\nThis variation is useful\
    \ only when a single class uses the bridge. If you find that you have to make\
    \ changes similar to the ones in Listing 13-16 to multiple classes, you have misapplied\
    \ the pattern. The result may still be an improvement on the previous application\
    \ structure, but you won’t have applied the bridge pattern, and you won’t benefit\
    \ from isolating the implementation of the common and platform-specific functionality\
    \ from the rest of the application.\n\nI also have to update the code in the `main.swift`\
    \ file that selects the platform and sends the messages, as shown in Listing 13-17.\n\
    \n**Listing 13-17.** Using the Collapsed Bridge in the `main.swift` File\n\n```\n\
    var comms = Communicator(channel: Channel.Channels.Satellite);\ncomms.sendCleartextMessage(\"\
    Hello!\");\ncomms.sendSecureMessage(\"This is a secret\");\ncomms.sendPriorityMessage(\"\
    This is important\");\n```\n\n**Note**\n\nYou won’t be able to build the project\
    \ if you have not removed the `Bridge.swift` file or at least commented out its\
    \ contents."
  raw: '## Variations on the Bridge Pattern


    The platform is selected at runtime and is usually set using a configuration file
    or some external setting. In the case of the example application, the platform
    is the channel over which messages are sent, and the choice of platform would
    be driven by the available networking hardware. In practice, I select the platform
    explicitly, like this:


    `...`


    `var bridge = CommunicatorBridge(channel:` `SatelliteChannel` `());`


    `...`


    This is unrealistic because the platform-specific implementation is selected at
    compile time, and I have to change the code and recompile to change the platform.
    I have done this because I don’t want to create a configuration system or detect
    different kinds of networks to demonstrate the use of the pattern.


    The simplest way to vary the pattern is to apply the factory method pattern so
    that the selection of the platform-specific implementation is hidden from the
    bridge class and from the rest of the application. Listing 13-12 shows how I have
    implemented the factory method—which I described in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html)—in
    the example application.


    Listing 13-12. Applying the Factory Method Pattern in the Channels.swift File


    `class Channel {`


    `enum Channels {`


    `case Landline;`


    `case Wireless;`


    `case Satellite;`


    `}`


    `class func getChannel(channelType:Channels) -> Channel {`


    `switch channelType {`


    `case .Landline:`


    `return LandlineChannel();`


    `case .Wireless:`


    `return WirelessChannel();`


    `case .Satellite:`


    `return SatelliteChannel();`


    `}`


    `}`


    `func sendMessage(msg:Message) {`


    `fatalError("Not implemented");`


    `}`


    `}`


    `class LandlineChannel : Channel {`


    `override func sendMessage(msg: Message) {`


    `println("Landline: \(msg.contentToSend)");`


    `}`


    `}`


    `class WirelessChannel : Channel {`


    `override func sendMessage(msg: Message) {`


    `println("Wireless: \(msg.contentToSend)");`


    `}`


    `}`


    I have changed the definition of the `Channel` type so that it is a class rather
    than a protocol and have defined a nested `enum` called `Channels` that enumerates
    the set of platforms available: landline, wireless, and satellite. I have defined
    a class method called `getChannel` that accepts a `Channels` value and instantiates
    the class that represents the platform.


    I had to apply the `override` keyword to the `sendMessage` method defined by the
    `LandlineChannel` and `WirelessChannel` classes because `Channel` has changed
    from a protocol to a class, and Listing 13-13 shows the corresponding change for
    the satellite implementation class.


    Listing 13-13. Modifying a Method Declaration in the NewFeatures.swift File


    `class SatelliteChannel : Channel {`


    `override func sendMessage(msg: Message) {`


    `println("Satellite: \(msg.contentToSend)");`


    `}`


    `}`


    `class PriorityMessage : ClearMessage {`


    `override var contentToSend:String {`


    `return "Important: \(super.contentToSend)";`


    `}`


    `}`


    Listing 13-14 shows the changes to the `CommunicatorBridge` class so that the
    initializer accepts a value from the enumeration rather than an instance of an
    implementation class.


    Listing 13-14. Changing the Initializer in the Bridge.swift File


    `class CommunicatorBridge : ClearMessageChannel, SecureMessageChannel,`


    `PriorityMessageChannel {`


    `private var channel:Channel;`


    `init(channel:Channel.Channels) {`


    `self.channel = Channel.getChannel(channel);`


    `}`


    `func send(message: String) {`


    `let msg = ClearMessage(message: message);`


    `sendMessage(msg);`


    `}`


    `func sendEncryptedMessage(encryptedText: String) {`


    `let msg = EncryptedMessage(message: encryptedText);`


    `sendMessage(msg);`


    `}`


    `func sendPriority(message: String) {`


    `sendMessage(PriorityMessage(message: message));`


    `}`


    `private func sendMessage(msg:Message) {`


    `msg.prepareMessage();`


    `channel.sendMessage(msg);`


    `}`


    `}`


    Finally, I need to update the code that selects the platform in the `main.swift`
    file, as shown in Listing 13-15.


    Listing 13-15. Updating the main.swift File


    `var bridge = CommunicatorBridge(channel: Channel.Channels.Satellite);`


    `var comms = Communicator(clearChannel: bridge,`


    `secureChannel: bridge, priorityChannel: bridge);`


    `comms.sendCleartextMessage("Hello!");`


    `comms.sendSecureMessage("This is a secret");`


    `comms.sendPriorityMessage("This is important");`


    ### Collapsing the Bridge


    When applying the bridge pattern, the standard assumption is that the protocols
    that are being bridged will be used elsewhere in the application. In the case
    of the example, this means there would be other classes similar to `Communicator`
    that will rely on the `ClearMessageChannel`, `SecureMessageChannel`, and `PriorityMessageChannel`
    protocols, which is why I left these—and the `Communicator` class—intact and applied
    the bridge to them.


    In some applications, there will be only one class that relies on the protocols,
    and this allows it and the bridge to be merged and the redundant protocols removed.


    The first step is to remove the `Bridge.swift` file from the project. The `CommunicatorBridge`
    class that it contains will not longer be required and will prevent Xcode from
    being able to build the project because it depends on protocols that I am going
    to remove. The next step is to add the bridge functionality to the `Communicator`
    class, as shown in Listing 13-16.


    Listing 13-16. Adding the Bridge Functionality in the Comms.swift File


    `//protocol ClearMessageChannel {`


    `//    func send(message:String);`


    `//}`


    `//`


    `//protocol SecureMessageChannel {`


    `//    func sendEncryptedMessage(message:String);`


    `//}`


    `//`


    `//protocol PriorityMessageChannel {`


    `//    func sendPriority(message:String);`


    `//}`


    `class Communicator {`


    `private let channnel:Channel;`


    `init (channel:Channel.Channels) {`


    `self.channnel = Channel.getChannel(channel);`


    `}`


    `private func sendMessage(msg:Message) {`


    `msg.prepareMessage();`


    `channnel.sendMessage(msg);`


    `}`


    `func sendCleartextMessage(message:String) {`


    `self.sendMessage(ClearMessage(message: message));`


    `}`


    `func sendSecureMessage(message:String) {`


    `self.sendMessage(EncryptedMessage(message: message));`


    `}`


    `func sendPriorityMessage(message:String) {`


    `self.sendMessage(PriorityMessage(message: message));`


    `}`


    `}`


    I have commented out the old protocols and changed the `Communicator` class so
    that it operates directly on the `Message` and `Channel` protocols and no longer
    depends on a separate bridge class.


    Caution


    This variation is useful only when a single class uses the bridge. If you find
    that you have to make changes similar to the ones in Listing 13-16 to multiple
    classes, you have misapplied the pattern. The result may still be an improvement
    on the previous application structure, but you won’t have applied the bridge pattern,
    and you won’t benefit from isolating the implementation of the common and platform-specific
    functionality from the rest of the application.


    I also have to update the code in the `main.swift` file that selects the platform
    and sends the messages, as shown in Listing 13-17.


    Listing 13-17. Using the Collapsed Bridge in the main.swift File


    `var comms = Communicator(channel: Channel.Channels.Satellite);`


    `comms.sendCleartextMessage("Hello!");`


    `comms.sendSecureMessage("This is a secret");`


    `comms.sendPriorityMessage("This is important");`


    Note


    You won’t be able to build the project if you have not removed the `Bridge.swift`
    file or at least commented out its contents.'
  trans: "\n# 桥接模式的变体\n\n平台是在运行时选择的，通常通过配置文件或某些外部设置来指定。在示例应用程序中，平台是消息发送的通道，而平台的选择取决于可用的网络硬件。在实践中，我会像这样显式选择平台：\n\
    \n```\n...\nvar bridge = CommunicatorBridge(channel: SatelliteChannel());\n...\n\
    ```\n\n这种做法并不现实，因为平台特定的实现是在编译时选择的，我必须更改代码并重新编译才能切换平台。我之所以这样做，是因为我不想为了演示桥接模式的用法而去创建配置系统或检测不同类型的网络。\n\
    \n最简单的变体方式是应用工厂方法模式，这样平台特定实现的选择对桥接类以及应用程序的其他部分都是隐藏的。清单 13-12 展示了我在示例应用程序中如何实现工厂方法模式——该方法已在第\
    \ 9 章中描述。\n\n**清单 13-12.** 在`Channels.swift`文件中应用工厂方法模式\n\n```\nclass Channel\
    \ {\n    enum Channels {\n        case Landline;\n        case Wireless;\n   \
    \     case Satellite;\n    }\n\n    class func getChannel(channelType:Channels)\
    \ -> Channel {\n        switch channelType {\n            case .Landline:\n  \
    \              return LandlineChannel();\n            case .Wireless:\n      \
    \          return WirelessChannel();\n            case .Satellite:\n         \
    \       return SatelliteChannel();\n        }\n    }\n\n    func sendMessage(msg:Message)\
    \ {\n        fatalError(\"Not implemented\");\n    }\n}\n\nclass LandlineChannel\
    \ : Channel {\n    override func sendMessage(msg: Message) {\n        println(\"\
    Landline: \\(msg.contentToSend)\");\n    }\n}\n\nclass WirelessChannel : Channel\
    \ {\n    override func sendMessage(msg: Message) {\n        println(\"Wireless:\
    \ \\(msg.contentToSend)\");\n    }\n}\n```\n\n我将`Channel`类型的定义从协议改为了类，并定义了一个名为`Channels`的嵌套枚举，用于列举可用的平台集合：有线（Landline）、无线（Wireless）和卫星（Satellite）。我还定义了一个类方法`getChannel`，它接受一个`Channels`值，并实例化表示该平台的类。\n\
    \n我必须对`LandlineChannel`和`WirelessChannel`类中定义的`sendMessage`方法使用`override`关键字，因为`Channel`已从协议变为类。清单\
    \ 13-13 展示了卫星实现类的相应更改。\n\n**清单 13-13.** 在`NewFeatures.swift`文件中修改方法声明\n\n```\n\
    class SatelliteChannel : Channel {\n    override func sendMessage(msg: Message)\
    \ {\n        println(\"Satellite: \\(msg.contentToSend)\");\n    }\n}\n\nclass\
    \ PriorityMessage : ClearMessage {\n    override var contentToSend:String {\n\
    \        return \"Important: \\(super.contentToSend)\";\n    }\n}\n```\n\n清单 13-14\
    \ 展示了`CommunicatorBridge`类的更改，初始化方法现在接受枚举值，而不是实现类的实例。\n\n**清单 13-14.** 在`Bridge.swift`文件中更改初始化方法\n\
    \n```\nclass CommunicatorBridge : ClearMessageChannel, SecureMessageChannel,\n\
    \    PriorityMessageChannel {\n    private var channel:Channel;\n\n    init(channel:Channel.Channels)\
    \ {\n        self.channel = Channel.getChannel(channel);\n    }\n\n    func send(message:\
    \ String) {\n        let msg = ClearMessage(message: message);\n        sendMessage(msg);\n\
    \    }\n\n    func sendEncryptedMessage(encryptedText: String) {\n        let\
    \ msg = EncryptedMessage(message: encryptedText);\n        sendMessage(msg);\n\
    \    }\n\n    func sendPriority(message: String) {\n        sendMessage(PriorityMessage(message:\
    \ message));\n    }\n\n    private func sendMessage(msg:Message) {\n        msg.prepareMessage();\n\
    \        channel.sendMessage(msg);\n    }\n}\n```\n\n最后，我需要更新`main.swift`文件中平台选择的代码，如清单\
    \ 13-15 所示。\n\n**清单 13-15.** 更新`main.swift`文件\n\n```\nvar bridge = CommunicatorBridge(channel:\
    \ Channel.Channels.Satellite);\nvar comms = Communicator(clearChannel: bridge,\n\
    \    secureChannel: bridge, priorityChannel: bridge);\ncomms.sendCleartextMessage(\"\
    Hello!\");\ncomms.sendSecureMessage(\"This is a secret\");\ncomms.sendPriorityMessage(\"\
    This is important\");\n```\n\n## 折叠桥接\n\n应用桥接模式时，通常假设被桥接的协议会在应用程序的其他地方使用。在示例中，这意味着会有其他类似于`Communicator`的类依赖于`ClearMessageChannel`、`SecureMessageChannel`和`PriorityMessageChannel`协议，这也是我保留这些协议以及`Communicator`类，并在它们之上应用桥接的原因。\n\
    \n在某些应用程序中，可能只有一个类依赖于这些协议，这样就可以将这个类与桥接合并，并移除多余的协议。\n\n第一步是从项目中移除`Bridge.swift`文件。其中包含的`CommunicatorBridge`类将不再需要，并且它会阻止\
    \ Xcode 构建项目，因为它依赖于我将要移除的协议。下一步是将桥接功能添加到`Communicator`类中，如清单 13-16 所示。\n\n**清单\
    \ 13-16.** 在`Comms.swift`文件中添加桥接功能\n\n```\n//protocol ClearMessageChannel {\n\
    //    func send(message:String);\n//}\n//\n//protocol SecureMessageChannel {\n\
    //    func sendEncryptedMessage(message:String);\n//}\n//\n//protocol PriorityMessageChannel\
    \ {\n//    func sendPriority(message:String);\n//}\n\nclass Communicator {\n \
    \   private let channnel:Channel;\n\n    init (channel:Channel.Channels) {\n \
    \       self.channnel = Channel.getChannel(channel);\n    }\n\n    private func\
    \ sendMessage(msg:Message) {\n        msg.prepareMessage();\n        channnel.sendMessage(msg);\n\
    \    }\n\n    func sendCleartextMessage(message:String) {\n        self.sendMessage(ClearMessage(message:\
    \ message));\n    }\n\n    func sendSecureMessage(message:String) {\n        self.sendMessage(EncryptedMessage(message:\
    \ message));\n    }\n\n    func sendPriorityMessage(message:String) {\n      \
    \  self.sendMessage(PriorityMessage(message: message));\n    }\n}\n```\n\n我注释掉了旧的协议，并更改了`Communicator`类，使其直接操作`Message`和`Channel`协议，不再依赖单独的桥接类。\n\
    \n**注意**\n\n这种变体仅当单个类使用桥接时才有用。如果你发现需要对多个类进行类似清单 13-16 的更改，那么说明你错误地应用了该模式。结果可能仍是对之前应用程序结构的改进，但你并未应用桥接模式，也无法享受到将通用与平台特定功能的实现与应用程序其他部分隔离所带来的好处。\n\
    \n我还必须更新`main.swift`文件中用于选择平台和发送消息的代码，如清单 13-17 所示。\n\n**清单 13-17.** 在`main.swift`文件中使用折叠后的桥接\n\
    \n```\nvar comms = Communicator(channel: Channel.Channels.Satellite);\ncomms.sendCleartextMessage(\"\
    Hello!\");\ncomms.sendSecureMessage(\"This is a secret\");\ncomms.sendPriorityMessage(\"\
    This is important\");\n```\n\n**注意**\n\n如果你没有移除`Bridge.swift`文件或至少注释掉其内容，你将无法构建该项目。\n"
- fmt: "# Understanding the Pitfalls of the Bridge Pattern\n\nThe only pitfall is\
    \ not recognizing which features are common across all platforms and which are\
    \ platform-specific. A successful implementation of the bridge pattern separates\
    \ common and specific functionality into different hierarchies, and it can be\
    \ difficult to identify this split correctly.\n\nAs a rule of thumb, if you see\
    \ groups of statements that are repeated in each platform class, they are candidates\
    \ for being considered common functionality. Equally, control flow statements\
    \ that deal with different platforms are platform-specific. That may seem like\
    \ obvious advice, but it can be hard to figure out what is going on in a complex\
    \ type hierarchy that has been poorly refactored several times and turned into\
    \ a mess of cut-and-paste statements, hacks, and workarounds.\n\n# Examples of\
    \ the Bridge Pattern in Cocoa\n\nThe bridge pattern hides the implementation details\
    \ behind a public API, so it is not possible to know whether the pattern is used\
    \ in the Cocoa frameworks.\n\n# Applying the Pattern to the SportsStore Application\n\
    \nAlthough the bridge pattern is generally applied to tidy up an exploding class\
    \ hierarchy, it can be used to separate any abstraction from its implementation.\
    \ In this section, I use this broader application of the pattern to create a bridge\
    \ that makes the purpose of an API more obvious.\n\n## Preparing the Example Application\n\
    \nNo preparation is required for this chapter, and I pick up the project from\
    \ [Chapter 12](#A978-1-4842-0394-1_12_Chapter.html). Remember that you can download\
    \ the SportsStore application and all of the other examples in this book from\
    \ [`Apress.com`](https://Apress.com) .\n\n## Understanding the Problem\n\nIn [Chapter\
    \ 8](#A978-1-4842-0394-1_8_Chapter.html), I added a feature that simulated getting\
    \ the initial level of stock for a product from a remote server. The data that\
    \ this process returns for each product becomes available after the product details\
    \ have been displayed in the app layout, which led me to define a callback in\
    \ the `ProductDataStore` class that is used to signal an update. Here is the signature\
    \ of the callback:\n\n```\n...\nvar callback:((Product) -> Void)?;\n...\n```\n\
    \nThe definition is simple: the `Product` object for which a stock level value\
    \ is available is passed to the callback, which is not required to define a result.\n\
    \nThis is a common way to define a notification callback, and it reflects the\
    \ way that many developers focus their attention; at the time a new feature is\
    \ being written, it is the most important feature in the application. Sadly, the\
    \ style of callback doesn’t consider that the recipient of the notification may\
    \ have signed up with other event sources, each of which has also defined an egocentric\
    \ callback. It becomes hard to figure out exactly what the change notification\
    \ is for without having to define separate closures to deal with each one, which\
    \ means that the source of the notification is implicit in directing the implementation\
    \ of the recipient.\n\nThe bridge pattern can help address this problem by bridging\
    \ the callback required by the event source and a more useful API that provides\
    \ additional context to the recipient of the notification.\n\n## Defining the\
    \ Bridge Class\n\nThe bridge class that I require is simple, and it has only to\
    \ receive events using the callback whose signature I showed you in the previous\
    \ section and map it to a more useful callback that provides more context information\
    \ to the eventual recipient of the notification. Listing 13-18 shows the contents\
    \ of the `EventBridge.swift` file that I added to the SportsStore project.\n\n\
    **Listing 13-18.** The Contents of the EventBridge.swift File\n\n```\nclass EventBridge\
    \ {\n\n    private let outputCallback:(String, Int) -> Void;\n\n    init(callback:(String,Int)\
    \ -> Void) {\n        self.outputCallback = callback;\n    }\n\n    var inputCallback:(Product)\
    \ -> Void {\n        return { p in self.outputCallback(p.name, p.stockLevel);\
    \ }\n    }\n\n}\n```\n\nThe `EventBridge` class is simple, but it separates the\
    \ source of the events from the destination and provides the means by which either\
    \ can be changed without needing to modify other. The key is that the `Product`\
    \ object in the incoming notification isn’t passed along as part of the outgoing\
    \ notification—instead, just the name of the product and the new stock level are\
    \ passed. This simpler notification suits the `ViewController` class, which doesn’t\
    \ really care about `Product` objects and is better focused on updating the value\
    \ displayed to the client. Listing 13-19 shows how I have used the `EventBridge`\
    \ class to simplify the `ViewController` code.\n\n**Listing 13-19.** Applying\
    \ the Bridge in the ViewController.swift File\n\n```\nimport UIKit\n\n// ...ProductTableCell\
    \ class omitted for brevity...\n\nclass ViewController: UIViewController, UITableViewDataSource\
    \ {\n\n    @IBOutlet weak var totalStockLabel: UILabel!\n    @IBOutlet weak var\
    \ tableView: UITableView!\n\n    var productStore = ProductDataStore();\n\n  \
    \  override func viewDidLoad() {\n        super.viewDidLoad();\n        displayStockTotal();\n\
    \        let bridge = EventBridge(callback: updateStockLevel);\n        productStore.callback\
    \ = bridge.inputCallback;\n    }\n\n    func updateStockLevel(name:String, level:Int)\
    \ {\n        for cell in self.tableView.visibleCells() {\n            if let pcell\
    \ = cell as? ProductTableCell {\n                if pcell.product?.name == name\
    \ {\n                    pcell.stockStepper.value = Double(level);\n         \
    \           pcell.stockField.text = String(level);\n                }\n      \
    \      }\n        }\n        self.displayStockTotal();\n    }\n\n    override\
    \ func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning();\n\
    \    }\n\n    // ...other methods omitted for brevity...\n}\n```\n\nThis may not\
    \ seem like a substantial change, but it means I am able to define a single method—`updateStockLevel`—to\
    \ capture all stock level updates regardless of where in the application they\
    \ originate. I may have to use a bridge in order to transform the original events\
    \ so that the `updateStockLevel` can be called, but I no longer have to define\
    \ closures for each individual event source that just sends me a `Product` object.\n\
    \n# Summary\n\nI described the bridge pattern in this chapter and explained how\
    \ it can be used to deal with an exploding hierarchy of classes by separating\
    \ common and platform-specific code. I also explained that the bridge pattern\
    \ has a more general role of separating an abstraction from its implementation\
    \ and demonstrated how this can be used to change the API used to receive events.\
    \ In the next chapter, I describe the decorator pattern."
  raw: '## Understanding the Pitfalls of the Bridge Pattern


    The only pitfall is not recognizing which features are common across all platforms
    and which are platform-specific. A successful implementation of the bridge pattern
    separates common and specific functionality into different hierarchies, and it
    can be difficult to identify this split correctly.


    As a rule of thumb, if you see groups of statements that are repeated in each
    platform class, they are candidates for being considered common functionality.
    Equally, control flow statements that deal with different platforms are platform-specific.
    That may seem like obvious advice, but it can be hard to figure out what is going
    on in a complex type hierarchy that has been poorly refactored several times and
    turned into a mess of cut-and-paste statements, hacks, and workarounds.


    ## Examples of the Bridge Pattern in Cocoa


    The bridge pattern hides the implementation details behind a public API, so it
    is not possible to know whether the pattern is used in the Cocoa frameworks.


    ## Applying the Pattern to the SportsStore Application


    Although the bridge pattern is generally applied to tidy up an exploding class
    hierarchy, it can be used to separate any abstraction from its implementation.
    In this section, I use this broader application of the pattern to create a bridge
    that makes the purpose of an API more obvious.


    ### Preparing the Example Application


    No preparation is required for this chapter, and I pick up the project from [Chapter
    12](#A978-1-4842-0394-1_12_Chapter.html). Remember that you can download the SportsStore
    application and all of the other examples in this book from [`Apress.com`](https://Apress.com)
    .


    ### Understanding the Problem


    In [Chapter 8](#A978-1-4842-0394-1_8_Chapter.html), I added a feature that simulated
    getting the initial level of stock for a product from a remote server. The data
    that this process returns for each product becomes available after the product
    details have been displayed in the app layout, which led me to define a callback
    in the `ProductDataStore` class that is used to signal an update. Here is the
    signature of the callback:


    `...`


    `var callback:((Product) -> Void)?;`


    `...`


    The definition is simple: the `Product` object for which a stock level value is
    available is passed to the callback, which is not required to define a result.


    This is a common way to define a notification callback, and it reflects the way
    that many developers focus their attention; at the time a new feature is being
    written, it is the most important feature in the application. Sadly, the style
    of callback doesn’t consider that the recipient of the notification may have signed
    up with other event sources, each of which has also defined an egocentric callback.
    It becomes hard to figure out exactly what the change notification is for without
    having to define separate closures to deal with each one, which means that the
    source of the notification is implicit in directing the implementation of the
    recipient.


    The bridge pattern can help address this problem by bridging the callback required
    by the event source and a more useful API that provides additional context to
    the recipient of the notification.


    ### Defining the Bridge Class


    The bridge class that I require is simple, and it has only to receive events using
    the callback whose signature I showed you in the previous section and map it to
    a more useful callback that provides more context information to the eventual
    recipient of the notification. Listing 13-18 shows the contents of the `EventBridge.swift`
    file that I added to the SportsStore project.


    Listing 13-18. The Contents of the EventBridge.swift File


    `class EventBridge {`


    `private let outputCallback:(String, Int) -> Void;`


    `init(callback:(String,Int) -> Void) {`


    `self.outputCallback = callback;`


    `}`


    `var inputCallback:(Product) -> Void {`


    `return { p in self.outputCallback(p.name, p.stockLevel); }`


    `}`


    `}`


    The `EventBridge` class is simple, but it separates the source of the events from
    the destination and provides the means by which either can be changed without
    needing to modify other. The key is that the `Product` object in the incoming
    notification isn’t passed along as part of the outgoing notification—instead,
    just the name of the product and the new stock level are passed. This simpler
    notification suits the `ViewController` class, which doesn’t really care about
    `Product` objects and is better focused on updating the value displayed to the
    client. Listing 13-19 shows how I have used the `EventBridge` class to simplify
    the `ViewController` code.


    Listing 13-19. Applying the Bridge in the ViewController.swift File


    `import UIKit`


    `//` `...ProductTableCell class omitted for brevity...`


    `class ViewController: UIViewController, UITableViewDataSource {`


    `@IBOutlet weak var totalStockLabel: UILabel!`


    `@IBOutlet weak var tableView: UITableView!`


    `var productStore = ProductDataStore();`


    `override func viewDidLoad() {`


    `super.viewDidLoad();`


    `displayStockTotal();`


    `let bridge = EventBridge(callback: updateStockLevel);`


    `productStore.callback = bridge.inputCallback;`


    `}`


    `func updateStockLevel(name:String, level:Int) {`


    `for cell in self.tableView.visibleCells() {`


    `if let pcell = cell as? ProductTableCell {`


    `if pcell.product?.name == name {`


    `pcell.stockStepper.value = Double(level);`


    `pcell.stockField.text = String(level);`


    `}`


    `}`


    `}`


    `self.displayStockTotal();`


    `}`


    `override func didReceiveMemoryWarning() {`


    `super.didReceiveMemoryWarning();`


    `}`


    `//` `...other methods omitted for brevity...`


    `}`


    This may not seem like a substantial change, but it means I am able to define
    a single method—`updateStockLevel`—to capture all stock level updates regardless
    of where in the application they originate. I may have to use a bridge in order
    to transform the original events so that the `updateStockLevel` can be called,
    but I no longer have to define closures for each individual event source that
    just sends me a `Product` object.


    ## Summary


    I described the bridge pattern in this chapter and explained how it can be used
    to deal with an exploding hierarchy of classes by separating common and platform-specific
    code. I also explained that the bridge pattern has a more general role of separating
    an abstraction from its implementation and demonstrated how this can be used to
    change the API used to receive events. In the next chapter, I describe the decorator
    pattern.'
  trans: "\n# 理解桥接模式的陷阱\n\n唯一的陷阱在于未能识别哪些功能是所有平台共有的，哪些是特定于平台的。成功实现桥接模式需要将通用功能和特定功能分离到不同的层级中，而正确识别这种划分可能相当困难。\n\
    \n根据经验法则，如果在每个平台类中都看到重复的语句组，它们就属于候选的通用功能。同样，处理不同平台的控制流语句则是特定于平台的。这看似显而易见的建议，但在一个经过多次糟糕重构、充斥着复制粘贴语句、hack\
    \ 和变通方案的复杂类型层级中，要理清头绪往往非常困难。\n\n# Cocoa 中的桥接模式示例\n\n桥接模式将实现细节隐藏在公共 API 之后，因此无法确定\
    \ Cocoa 框架中是否使用了该模式。\n\n# 将模式应用于 SportsStore 应用\n\n虽然桥接模式通常用于整理不断膨胀的类层级，但它也可以用于将任何抽象与其实现分离。在本节中，我将利用该模式的这种更广泛的应用来创建一个桥接，使\
    \ API 的目的更加明确。\n\n## 准备示例应用\n\n本章无需进行任何准备工作，我将直接从第 12 章的项目开始。请记住，你可以从 [`Apress.com`](https://Apress.com)\
    \ 下载 SportsStore 应用以及本书中的所有其他示例。\n\n## 理解问题\n\n在第 8 章中，我添加了一个模拟从远程服务器获取产品初始库存水平的功能。该过程为每个产品返回的数据在产品详情显示在应用布局中之后才可用，这促使我在\
    \ `ProductDataStore` 类中定义了一个用于发出更新信号的回调。以下是该回调的签名：\n\n```\n...\nvar callback:((Product)\
    \ -> Void)?;\n...\n```\n\n这个定义很简单：将具有库存水平值的 `Product` 对象传递给回调，回调无需定义返回结果。\n\n\
    这是一种定义通知回调的常见方式，它反映了许多开发者关注问题的方式：在编写新功能时，它被认为是应用中最重要的功能。遗憾的是，这种回调风格没有考虑到通知的接收者可能已经注册了其他事件源，而每个事件源也定义了以自我为中心的回调。这样一来，如果不为每个事件源定义单独的闭包来处理，就很难准确判断变更通知的目的，这意味着通知源在隐式地引导接收者的实现逻辑。\n\
    \n桥接模式可以帮助解决这个问题，它可以在事件源所需的回调与一个更有用的 API 之间建立桥梁，从而为通知的接收者提供额外的上下文信息。\n\n## 定义桥接类\n\
    \n我所需的桥接类很简单，它只需要使用上一节中我展示签名的回调来接收事件，并将其映射到一个更有用的回调上，该回调为通知的最终接收者提供更多上下文信息。代码清单\
    \ 13-18 显示了我添加到 SportsStore 项目中的 `EventBridge.swift` 文件的内容。\n\n**代码清单 13-18.**\
    \ EventBridge.swift 文件的内容\n\n```\nclass EventBridge {\n\n    private let outputCallback:(String,\
    \ Int) -> Void;\n\n    init(callback:(String,Int) -> Void) {\n        self.outputCallback\
    \ = callback;\n    }\n\n    var inputCallback:(Product) -> Void {\n        return\
    \ { p in self.outputCallback(p.name, p.stockLevel); }\n    }\n\n}\n```\n\n`EventBridge`\
    \ 类很简单，但它将事件源与目标分离开来，并提供了一种方式，使得两者中的任何一个都可以在不修改另一个的情况下进行更改。关键在于，传入通知中的 `Product`\
    \ 对象不会随传出通知一起传递——相反，只传递产品名称和新的库存水平。这种更简单的通知更适合 `ViewController` 类，它实际上并不关心 `Product`\
    \ 对象，而更专注于更新显示给客户端的数值。代码清单 13-19 显示了我如何使用 `EventBridge` 类来简化 `ViewController`\
    \ 代码。\n\n**代码清单 13-19.** 在 ViewController.swift 文件中应用桥接\n\n```\nimport UIKit\n\
    \n// ...为简洁起见，省略了 ProductTableCell 类...\n\nclass ViewController: UIViewController,\
    \ UITableViewDataSource {\n\n    @IBOutlet weak var totalStockLabel: UILabel!\n\
    \    @IBOutlet weak var tableView: UITableView!\n\n    var productStore = ProductDataStore();\n\
    \n    override func viewDidLoad() {\n        super.viewDidLoad();\n        displayStockTotal();\n\
    \        let bridge = EventBridge(callback: updateStockLevel);\n        productStore.callback\
    \ = bridge.inputCallback;\n    }\n\n    func updateStockLevel(name:String, level:Int)\
    \ {\n        for cell in self.tableView.visibleCells() {\n            if let pcell\
    \ = cell as? ProductTableCell {\n                if pcell.product?.name == name\
    \ {\n                    pcell.stockStepper.value = Double(level);\n         \
    \           pcell.stockField.text = String(level);\n                }\n      \
    \      }\n        }\n        self.displayStockTotal();\n    }\n\n    override\
    \ func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning();\n\
    \    }\n\n    // ...为简洁起见，省略了其他方法...\n}\n```\n\n这看起来可能不是一个实质性的变化，但它意味着我可以定义一个单一的方法——`updateStockLevel`——来捕获所有库存水平的更新，无论它们在应用中的哪个位置产生。我可能需要使用一个桥接来转换原始事件，以便能够调用\
    \ `updateStockLevel`，但我不再需要为每个只向我发送 `Product` 对象的单个事件源定义闭包。\n\n# 总结\n\n在本章中，我描述了桥接模式，并解释了如何通过分离通用代码和特定于平台的代码来处理不断膨胀的类层级。我还解释了桥接模式具有更通用的作用，即将抽象与其实现分离，并演示了如何利用这一点来更改用于接收事件的\
    \ API。在下一章中，我将描述装饰器模式。\n"
- fmt: "# 14. The Decorator Pattern\n\nIn this chapter, I describe the decorator pattern,\
    \ which allows the behavior of an object to be selectively modified at runtime.\
    \ This pattern has a number of uses but has the most impact when working with\
    \ classes that cannot be modified. The idea of selective modification means that\
    \ you can choose which objects are changed and which retain their original functionality.\
    \ Table [14-1](#A978-1-4842-0394-1_14_Chapter.html#Tab1) puts the decorator pattern\
    \ into context.\n\nTable 14-1. Putting the Decorator Pattern into Context\n\n\
    | Question | Answer |\n| --- | --- |\n| What is it? | The decorator pattern allows\
    \ the behavior of individual objects to be changed without requiring changes to\
    \ the classes that are used to create them or the components that consume them.\
    \ |\n| What are the benefits? | The changes in behavior defined with the decorator\
    \ pattern can be combined to create complex effects without needing to create\
    \ large numbers of subclasses. |\n| When should you use this pattern? | Use this\
    \ pattern when you need to change the behavior of objects without changing the\
    \ class they are created from or the components that use them. |\n| When should\
    \ you avoid this pattern? | Do not use this pattern when you are able to change\
    \ the class that creates the objects you want to modify. It is usually simpler\
    \ and easier to modify the class directly. |\n| How do you know when you have\
    \ implemented the pattern correctly? | The pattern has been implemented correctly\
    \ when you can select some of the objects created from a class to be modified\
    \ without affecting all of them and without requiring changes to the class. |\n\
    | Are there any common pitfalls? | The main pitfall is implementing the pattern\
    \ so that it affects all of the objects created from a given class rather than\
    \ allowing changes to be applied selectively. A less common pitfall is implementing\
    \ the pattern so that it has hidden side effects that are not related to the original\
    \ purpose of the objects being modified. |\n| Are there any related patterns?\
    \ | Many of the structural patterns have similar implementations but different\
    \ intents. Ensure that you select the correct pattern from the ones I describe\
    \ in this part of the book. |\n\n## Preparing the Example Project\n\nFollowing\
    \ the same approach I used in earlier chapters, I created a new OS X Command Line\
    \ Tool project called `Decorator`. I added a file to the project called `Purchase.swift`,\
    \ the contents of which are shown in Listing 14-1.\n\nListing 14-1. The Contents\
    \ of the `Purchase.swift` File\n\n```\nclass Purchase : Printable {\n    private\
    \ let product:String;\n    private let price:Float;\n    init(product:String,\
    \ price:Float) {\n        self.product = product;\n        self.price = price;\n\
    \    }\n    var description:String {\n        return product;\n    }\n    var\
    \ totalPrice:Float {\n        return price;\n    }\n}\n```\n\nThe `Purchase` class\
    \ represents a product selection made by a customer in a store. The class defines\
    \ properties that store the name of the product and presents these publically\
    \ through the calculated `description` and `totalPrice` properties. Next, I added\
    \ a file called `CustomerAccount.swift` to the example project and used it to\
    \ define the class shown in Listing 14-2.\n\nListing 14-2. The Contents of the\
    \ `CustomerAccount.swift` File\n\n```\nimport Foundation\n\nclass CustomerAccount\
    \ {\n    let customerName:String;\n    var purchases = [Purchase]();\n    init(name:String)\
    \ {\n        self.customerName = name;\n    }\n    func addPurchase(purchase:Purchase)\
    \ {\n        self.purchases.append(purchase);\n    }\n    func printAccount()\
    \ {\n        var total:Float = 0;\n        for p in purchases {\n            total\
    \ += p.totalPrice;\n            println(\"Purchase \\(p), Price \\(formatCurrencyString(p.totalPrice))\"\
    );\n        }\n        println(\"Total due: \\(formatCurrencyString(total))\"\
    );\n    }\n    func formatCurrencyString(number:Float) -> String {\n        let\
    \ formatter = NSNumberFormatter();\n        formatter.numberStyle = NSNumberFormatterStyle.CurrencyStyle;\n\
    \        return formatter.stringFromNumber(number) ?? \"\";\n    }\n}\n```\n\n\
    The `CustomerAccount` class maintains a collection of `Purchase` objects to represent\
    \ the purchases made by a customer. New purchases are added to the account through\
    \ the `addPurchase` method, and the `printAccount` method writes a summary of\
    \ the account to the Xcode debug console. Listing 14-3 shows the statements that\
    \ I added to the `main.swift` file to use the `Purchase` and `CustomerAccount`\
    \ classes.\n\nListing 14-3. The Contents of the `main.swift` File\n\n```\nlet\
    \ account = CustomerAccount(name:\"Joe\");\naccount.addPurchase(Purchase(product:\
    \ \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product: \"Scarf\",\
    \ price: 20));\naccount.printAccount();\n```\n\nThe `Purchase` class conforms\
    \ to the `Printable` protocol, which means that the value of the `description`\
    \ property is used when the object is passed to the `println` method. Running\
    \ the example application produces the following output:\n\n```\nPurchase Red\
    \ Hat, Price $10.00\nPurchase Scarf, Price $20.00\nTotal due: $30.00\n```"
  raw: '# 14. The Decorator Pattern


    In this chapter, I describe the decorator pattern, which allows the behavior of
    an object to be selectively modified at runtime. This pattern has a number of
    uses but has the most impact when working with classes that cannot be modified.
    The idea of selective modification means that you can choose which objects are
    changed and which retain their original functionality. Table [14-1](#A978-1-4842-0394-1_14_Chapter.html#Tab1)
    puts the decorator pattern into context.


    Table 14-1.


    Putting the Decorator Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The decorator pattern allows the behavior of individual objects
    to be changed without requiring changes to the classes that are used to create
    them or the components that consume them. |

    | What are the benefits? | The changes in behavior defined with the decorator
    pattern can be combined to create complex effects without needing to create large
    numbers of subclasses. |

    | When should you use this pattern? | Use this pattern when you need to change
    the behavior of objects without changing the class they are created from or the
    components that use them. |

    | When should you avoid this pattern? | Do not use this pattern when you are able
    to change the class that creates the objects you want to modify. It is usually
    simpler and easier to modify the class directly. |

    | How do you know when you have implemented the pattern correctly? | The pattern
    has been implemented correctly when you can select some of the objects created
    from a class to be modified without affecting all of them and without requiring
    changes to the class. |

    | Are there any common pitfalls? | The main pitfall is implementing the pattern
    so that it affects all of the objects created from a given class rather than allowing
    changes to be applied selectively. A less common pitfall is implementing the pattern
    so that it has hidden side effects that are not related to the original purpose
    of the objects being modified. |

    | Are there any related patterns? | Many of the structural patterns have similar
    implementations but different intents. Ensure that you select the correct pattern
    from the ones I describe in this part of the book. |


    ## Preparing the Example Project


    Following the same approach I used in earlier chapters, I created a new OS X Command
    Line Tool project called Decorator. I added a file to the project called `Purchase.swift`,
    the contents of which are shown in Listing 14-1.


    Listing 14-1. The Contents of the Purchase.swift File


    `class Purchase : Printable {`


    `private let product:String;`


    `private let price:Float;`


    `init(product:String, price:Float) {`


    `self.product = product;`


    `self.price = price;`


    `}`


    `var description:String {`


    `return product;`


    `}`


    `var totalPrice:Float {`


    `return price;`


    `}`


    `}`


    The `Purchase` class represents a product selection made by a customer in a store.
    The class defines properties that store the name of the product and presents these
    publically through the calculated `description` and `totalPrice` properties. Next,
    I added a file called `CustomerAccount.swift` to the example project and used
    it to define the class shown in Listing 14-2.


    Listing 14-2. The Contents of the CustomerAccount.swift File


    `import Foundation`


    `class CustomerAccount {`


    `let customerName:String;`


    `var purchases = [Purchase]();`


    `init(name:String) {`


    `self.customerName = name;`


    `}`


    `func addPurchase(purchase:Purchase) {`


    `self.purchases.append(purchase);`


    `}`


    `func printAccount() {`


    `var total:Float = 0;`


    `for p in purchases {`


    `total += p.totalPrice;`


    `println("Purchase \(p), Price \(formatCurrencyString(p.totalPrice))");`


    `}`


    `println("Total due: \(formatCurrencyString(total))");`


    `}`


    `func formatCurrencyString(number:Float) -> String {`


    `let formatter = NSNumberFormatter();`


    `formatter.numberStyle = NSNumberFormatterStyle.CurrencyStyle;`


    `return formatter.stringFromNumber(number) ?? "";`


    `}`


    `}`


    The `CustomerAccount` class maintains a collection of `Purchase` objects to represent
    the purchases made by a customer. New purchases are added to the account through
    the `addPurchase` method, and the `printAccount` method writes a summary of the
    account to the Xcode debug console. Listing 14-3 shows the statements that I added
    to the `main.swift` file to use the `Purchase` and `CustomerAccount` classes.


    Listing 14-3. The Contents of the main.swift File


    `let account = CustomerAccount(name:"Joe");`


    `account.addPurchase(Purchase(product: "Red Hat", price: 10));`


    `account.addPurchase(Purchase(product: "Scarf", price: 20));`


    `account.printAccount();`


    The `Purchase` class conforms to the `Printable` protocol, which means that the
    value of the `description` property is used when the object is passed to the `println`
    method. Running the example application produces the following output:


    `Purchase Red Hat, Price $10.00`


    `Purchase Scarf, Price $20.00`


    `Total due: $30.00`'
  trans: "\n# 14. 装饰器模式\n\n在本章中，我将介绍装饰器模式，它允许在运行时选择性地修改对象的行为。这种模式有多种用途，但在处理无法修改的类时效果最为显著。选择性修改意味着你可以选择哪些对象被更改，哪些保留其原始功能。表\
    \ 14-1 将装饰器模式置于具体语境中。\n\n表 14-1. 装饰器模式语境说明\n\n| 问题 | 答案 |\n| --- | --- |\n| 这是什么？\
    \ | 装饰器模式允许改变单个对象的行为，而无需修改用于创建这些对象的类或使用它们的组件。 |\n| 优点是什么？ | 用装饰器模式定义的行为变化可以组合起来，产生复杂的效果，而无需创建大量子类。\
    \ |\n| 何时使用此模式？ | 当你需要改变对象的行为，但又不改变创建它们的类或使用它们的组件时，可使用此模式。 |\n| 何时应避免此模式？ | 当你能够修改创建所需对象的类时，不应使用此模式。直接修改类通常更简单、更容易。\
    \ |\n| 如何判断是否正确实现了该模式？ | 当你能够选择某个类创建的部分对象进行修改，而不影响所有对象，且无需修改该类时，就说明正确实现了该模式。 |\n\
    | 有哪些常见陷阱？ | 主要陷阱是实现该模式时影响了某个类创建的所有对象，而不是允许选择性应用更改。一个不太常见的陷阱是，实现该模式时引入了与修改对象原始目的无关的隐藏副作用。\
    \ |\n| 是否有相关模式？ | 许多结构型模式有相似的实现，但意图不同。请确保从本书这一部分描述的模式中选出正确的一个。 |\n\n## 准备示例项目\n\
    \n按照我在前面章节中使用的方法，我创建了一个名为 `Decorator` 的新 OS X 命令行工具项目。我在项目中添加了一个名为 `Purchase.swift`\
    \ 的文件，其内容如代码清单 14-1 所示。\n\n代码清单 14-1. `Purchase.swift` 文件的内容\n\n```\nclass Purchase\
    \ : Printable {\n    private let product:String;\n    private let price:Float;\n\
    \    init(product:String, price:Float) {\n        self.product = product;\n  \
    \      self.price = price;\n    }\n    var description:String {\n        return\
    \ product;\n    }\n    var totalPrice:Float {\n        return price;\n    }\n\
    }\n```\n\n`Purchase` 类表示顾客在商店中选择的商品。该类定义了存储产品名称的属性，并通过计算属性 `description` 和 `totalPrice`\
    \ 将其公开。接下来，我在示例项目中添加了一个名为 `CustomerAccount.swift` 的文件，并用它定义了代码清单 14-2 中所示的类。\n\
    \n代码清单 14-2. `CustomerAccount.swift` 文件的内容\n\n```\nimport Foundation\n\nclass\
    \ CustomerAccount {\n    let customerName:String;\n    var purchases = [Purchase]();\n\
    \    init(name:String) {\n        self.customerName = name;\n    }\n    func addPurchase(purchase:Purchase)\
    \ {\n        self.purchases.append(purchase);\n    }\n    func printAccount()\
    \ {\n        var total:Float = 0;\n        for p in purchases {\n            total\
    \ += p.totalPrice;\n            println(\"Purchase \\(p), Price \\(formatCurrencyString(p.totalPrice))\"\
    );\n        }\n        println(\"Total due: \\(formatCurrencyString(total))\"\
    );\n    }\n    func formatCurrencyString(number:Float) -> String {\n        let\
    \ formatter = NSNumberFormatter();\n        formatter.numberStyle = NSNumberFormatterStyle.CurrencyStyle;\n\
    \        return formatter.stringFromNumber(number) ?? \"\";\n    }\n}\n```\n\n\
    `CustomerAccount` 类维护一个 `Purchase` 对象的集合，用于表示顾客的购买记录。新的购买记录通过 `addPurchase` 方法添加到账户中，`printAccount`\
    \ 方法会将账户摘要输出到 Xcode 调试控制台。代码清单 14-3 展示了我在 `main.swift` 文件中添加的语句，用于使用 `Purchase`\
    \ 和 `CustomerAccount` 类。\n\n代码清单 14-3. `main.swift` 文件的内容\n\n```\nlet account\
    \ = CustomerAccount(name:\"Joe\");\naccount.addPurchase(Purchase(product: \"Red\
    \ Hat\", price: 10));\naccount.addPurchase(Purchase(product: \"Scarf\", price:\
    \ 20));\naccount.printAccount();\n```\n\n`Purchase` 类遵循 `Printable` 协议，这意味着当对象被传递给\
    \ `println` 方法时，会使用 `description` 属性的值。运行示例应用程序将产生以下输出：\n\n```\nPurchase Red Hat,\
    \ Price $10.00\nPurchase Scarf, Price $20.00\nTotal due: $30.00\n```\n"
- fmt: "# Understanding the Problem That the Pattern Solves\n\nImagine that I want\
    \ to add some gift options to my customers, but I need to do so without modifying\
    \ the `Purchase` or `CustomerAccount` class I defined in the previous section.\
    \ There are lots of reasons why classes cannot be modified, but the most frequent\
    \ is when they are part of a framework provided by a third party. In the case\
    \ of my example application, the `Purchase` and `CustomerAccount` classes might\
    \ be part of an off-the-shelf sales management system.\n\nThe customer can mix\
    \ and match the gift options, each of which has a different price and can be applied\
    \ independently. Table [14-2](#A978-1-4842-0394-1_14_Chapter.html#Tab2) shows\
    \ the options and their costs.\n\nTable 14-2. The Gift Options for Purchases\n\
    \n| Gift Options | Cost |\n| --- | --- |\n| Gift wrap | $2 |\n| Ribbon | $1 |\n\
    | Gift delivery | $5 |\n\nThe obvious way of adding support for the gift options\
    \ is to create subclasses of the `Purchase` class, which will allow me to define\
    \ new behaviors without needing to change the `Purchase` class or the `CustomerAccount`\
    \ class, which expects to operate on `Purchase` objects.\n\nListing 14-4 shows\
    \ the contents of the `Options.swift` file, which I added to the example project\
    \ and used to define subclasses for the gift options.\n\nListing 14-4. The Contents\
    \ of the `Options.swift` File\n\n```swift\nclass PurchaseWithGiftWrap : Purchase\
    \ {\n    override var description:String { return \"\\(super.description) + giftwrap\"\
    ; }\n    override var totalPrice:Float { return super.totalPrice + 2;}\n}\n\n\
    class PurchaseWithRibbon : Purchase {\n    override var description:String { return\
    \ \"\\(super.description) + ribbon\"; }\n    override var totalPrice:Float { return\
    \ super.totalPrice + 1; }\n}\n\nclass PurchaseWithDelivery : Purchase {\n    override\
    \ var description:String { return \"\\(super.description) + delivery\"; }\n  \
    \  override var totalPrice:Float { return super.totalPrice + 5; }\n}\n```\n\n\
    Each of the three classes I have defined represents one of the options from Table\
    \ [14-2](#A978-1-4842-0394-1_14_Chapter.html#Tab2) and overrides the `description`\
    \ and `totalPrice` properties. Listing 14-5 shows how I can specify an option\
    \ by using one of the subclasses rather than the `Purchase` base class.\n\nListing\
    \ 14-5. Using a `Purchase` Subclass in the `main.swift` File\n\n```swift\nlet\
    \ account = CustomerAccount(name:\"Joe\");\naccount.addPurchase(Purchase(product:\
    \ \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product: \"Scarf\",\
    \ price: 20));\naccount.addPurchase(PurchaseWithGiftWrap(product: \"Sunglasses\"\
    , price: 25));\naccount.printAccount();\n```\n\nRunning the application produces\
    \ the following output in the debug console:\n\n```\nPurchase Red Hat, Price $10.00\n\
    Purchase Scarf, Price $20.00\nPurchase Sunglasses + giftwrap, Price $27.00\nTotal\
    \ due: $57.00\n```\n\nThese subclasses work, but they don’t meet my business requirements:\
    \ customers cannot mix and match the options. Each subclass represents only a\
    \ single option, and I have no way to represent a purchase that the customer wants\
    \ gift wrapped and delivered. Clearly, I need another subclass to represent this\
    \ combination, as shown in Listing 14-6.\n\nListing 14-6. Adding a Subclass for\
    \ a Gift Option Combination in the `Options.swift` File\n\n```swift\nclass PurchaseWithGiftWrap\
    \ : Purchase {\n    override var description:String { return \"\\(super.description)\
    \ + giftwrap\"; }\n    override var totalPrice:Float { return super.totalPrice\
    \ + 2;}\n}\n\nclass PurchaseWithRibbon : Purchase {\n    override var description:String\
    \ { return \"\\(super.description) + ribbon\"; }\n    override var totalPrice:Float\
    \ { return super.totalPrice + 1; }\n}\n\nclass PurchaseWithDelivery : Purchase\
    \ {\n    override var description:String { return \"\\(super.description) + delivery\"\
    ; }\n    override var totalPrice:Float { return super.totalPrice + 5; }\n}\n\n\
    class PurchaseWithGiftWrapAndDelivery : Purchase {\n    override var description:String\
    \ {\n        return \"\\(super.description) + giftwrap + delivery\"; }\n    override\
    \ var totalPrice:Float { return super.totalPrice + 5 + 2; }\n}\n```\n\nThis is\
    \ only one of the possible combinations. To allow the customer a full range of\
    \ choices, I need to create subclasses for all of the following combinations:\n\
    \n- Gift wrap\n- Ribbon\n- Delivery\n- Gift wrap + Ribbon\n- Gift wrap + Delivery\n\
    - Ribbon + Delivery\n- Gift wrap + Ribbon + Delivery\n\nThe number of classes\
    \ will keep increasing as I add options because I need to address all of the permutations\
    \ that can exist. The volume of classes presents an error risk and makes maintenance\
    \ difficult. As an example, changing the price of an option can require a massive\
    \ number of changes, and it is easy to miss one or more classes that should be\
    \ updated.\n\n# Understanding the Decorator Pattern\n\nThe decorator solves the\
    \ permutation problem by creating decorator classes, which are wrappers around\
    \ the original class that change its behavior. A decorator presents the same API\
    \ as the wrapped class, and decorators can wrap other decorators in order to create\
    \ permutations. Figure [14-1](#A978-1-4842-0394-1_14_Chapter.html#Fig1) illustrates\
    \ the decorator pattern.\n\n![A978-1-4842-0394-1_14_Fig1_HTML.jpg](A978-1-4842-0394-1_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1. The decorator pattern\n\nThe decorators present the same methods\
    \ and properties as the original class, which allows them to be used as substitutes\
    \ without needing to modify the calling components. Decorators usually call the\
    \ methods and properties of the objects they are wrapping, as shown in the figure.\
    \ Since all of the objects involved present the same methods and properties, a\
    \ decorator is unaware if the object it wraps is an instance of the original class\
    \ or another decorator."
  raw: '## Understanding the Problem That the Pattern Solves


    Imagine that I want to add some gift options to my customers, but I need to do
    so without modifying the `Purchase` or `CustomerAccount` class I defined in the
    previous section. There are lots of reasons why classes cannot be modified, but
    the most frequent is when they are part of a framework provided by a third party.
    In the case of my example application, the `Purchase` and `CustomerAccount` classes
    might be part of an off-the-shelf sales management system.


    The customer can mix and match the gift options, each of which has a different
    price and can be applied independently. Table [14-2](#A978-1-4842-0394-1_14_Chapter.html#Tab2)
    shows the options and their costs.


    Table 14-2.


    The Gift Options for Purchases


    | Gift Options | Cost |

    | --- | --- |

    | Gift wrap | $2 |

    | Ribbon | $1 |

    | Gift delivery | $5 |


    The obvious way of adding support for the gift options is to create subclasses
    of the `Purchase` class, which will allow me to define new behaviors without needing
    to change the `Purchase` class or the `CustomerAccount` class, which expects to
    operate on `Purchase` objects.


    Listing 14-4 shows the contents of the `Options.swift` file, which I added to
    the example project and used to define subclasses for the gift options.


    Listing 14-4. The Contents of the Options.swift File


    `class PurchaseWithGiftWrap : Purchase {`


    `override var description:String { return "\(super.description) + giftwrap"; }`


    `override var totalPrice:Float { return super.totalPrice + 2;}`


    `}`


    `class PurchaseWithRibbon : Purchase {`


    `override var description:String { return "\(super.description) + ribbon"; }`


    `override var totalPrice:Float { return super.totalPrice + 1; }`


    `}`


    `class PurchaseWithDelivery : Purchase {`


    `override var description:String { return "\(super.description) + delivery"; }`


    `override var totalPrice:Float { return super.totalPrice + 5; }`


    `}`


    Each of the three classes I have defined represents one of the options from Table
    [14-2](#A978-1-4842-0394-1_14_Chapter.html#Tab2) and overrides the `description`
    and `totalPrice` properties. Listing 14-5 shows how I can specify an option by
    using one of the subclasses rather than the `Purchase` base class.


    Listing 14-5. Using a Purchase Subclass in the main.swift File


    `let account = CustomerAccount(name:"Joe");`


    `account.addPurchase(Purchase(product: "Red Hat", price: 10));`


    `account.addPurchase(Purchase(product: "Scarf", price: 20));`


    `account.addPurchase(PurchaseWithGiftWrap(product: "Sunglasses", price: 25));`


    `account.printAccount();`


    Running the application produces the following output in the debug console:


    `Purchase Red Hat, Price $10.00`


    `Purchase Scarf, Price $20.00`


    `Purchase Sunglasses + giftwrap, Price $27.00`


    `Total due: $57.00`


    These subclasses work, but they don’t meet my business requirements: customers
    cannot mix and match the options. Each subclass represents only a single option,
    and I have no way to represent a purchase that the customer wants gift wrapped
    and delivered. Clearly, I need another subclass to represent this combination,
    as shown in Listing 14-6.


    Listing 14-6. Adding a Subclass for a Gift Option Combination in the Options.swift
    File


    `class PurchaseWithGiftWrap : Purchase {`


    `override var description:String { return "\(super.description) + giftwrap"; }`


    `override var totalPrice:Float { return super.totalPrice + 2;}`


    `}`


    `class PurchaseWithRibbon : Purchase {`


    `override var description:String { return "\(super.description) + ribbon"; }`


    `override var totalPrice:Float { return super.totalPrice + 1; }`


    `}`


    `class PurchaseWithDelivery : Purchase {`


    `override var description:String { return "\(super.description) + delivery"; }`


    `override var totalPrice:Float { return super.totalPrice + 5; }`


    `}`


    `class PurchaseWithGiftWrapAndDelivery : Purchase {`


    `override var description:String {`


    `return "\(super.description) + giftwrap + delivery"; }`


    `override var totalPrice:Float { return super.totalPrice + 5 + 2; }`


    `}`


    This is only one of the possible combinations. To allow the customer a full range
    of choices, I need to create subclasses for all of the following combinations:


    *   Gift wrap

    *   Ribbon

    *   Delivery

    *   Gift wrap + Ribbon

    *   Gift wrap + Delivery

    *   Ribbon + Delivery

    *   Gift wrap + Ribbon + Delivery


    The number of classes will keep increasing as I add options because I need to
    address all of the permutations that can exist. The volume of classes presents
    an error risk and makes maintenance difficult. As an example, changing the price
    of an option can require a massive number of changes, and it is easy to miss one
    or more classes that should be updated.


    ## Understanding the Decorator Pattern


    The decorator solves the permutation problem by creating decorator classes, which
    are wrappers around the original class that change its behavior. A decorator presents
    the same API as the wrapped class, and decorators can wrap other decorators in
    order to create permutations. Figure [14-1](#A978-1-4842-0394-1_14_Chapter.html#Fig1)
    illustrates the decorator pattern.


    ![A978-1-4842-0394-1_14_Fig1_HTML.jpg](A978-1-4842-0394-1_14_Fig1_HTML.jpg)


    Figure 14-1.


    The decorator pattern


    The decorators present the same methods and properties as the original class,
    which allows them to be used as substitutes without needing to modify the calling
    components. Decorators usually call the methods and properties of the objects
    they are wrapping, as shown in the figure. Since all of the objects involved present
    the same methods and properties, a decorator is unaware if the object it wraps
    is an instance of the original class or another decorator.'
  trans: "\n# 理解该模式所解决的问题\n\n假设我想为客户添加一些礼品选项，但又不能修改上一节中定义的 `Purchase` 或 `CustomerAccount`\
    \ 类。导致类无法被修改的原因有很多，但最常见的情况是，这些类是第三方提供的框架的一部分。在我这个示例应用中，`Purchase` 和 `CustomerAccount`\
    \ 类可能属于一个现成的销售管理系统。\n\n客户可以自由组合搭配这些礼品选项，每个选项价格不同，且可独立应用。表 14-2 列出了这些选项及其成本。\n\n\
    表 14-2. 购买时的礼品选项\n\n| 礼品选项 | 成本 |\n| --- | --- |\n| 礼品包装 | $2 |\n| 丝带 | $1 |\n\
    | 礼品配送 | $5 |\n\n为礼品选项添加支持最直接的方式是创建 `Purchase` 类的子类，这样我就可以在不修改 `Purchase` 类或原本期望操作\
    \ `Purchase` 对象的 `CustomerAccount` 类的情况下，定义新的行为。\n\n代码清单 14-4 展示了我添加到示例项目中、用于为礼品选项定义子类的\
    \ `Options.swift` 文件的内容。\n\n代码清单 14-4. `Options.swift` 文件的内容\n\n```swift\nclass\
    \ PurchaseWithGiftWrap : Purchase {\n    override var description:String { return\
    \ \"\\(super.description) + giftwrap\"; }\n    override var totalPrice:Float {\
    \ return super.totalPrice + 2;}\n}\n\nclass PurchaseWithRibbon : Purchase {\n\
    \    override var description:String { return \"\\(super.description) + ribbon\"\
    ; }\n    override var totalPrice:Float { return super.totalPrice + 1; }\n}\n\n\
    class PurchaseWithDelivery : Purchase {\n    override var description:String {\
    \ return \"\\(super.description) + delivery\"; }\n    override var totalPrice:Float\
    \ { return super.totalPrice + 5; }\n}\n```\n\n我定义的这三个类分别代表表 14-2 中的一个选项，并重写了 `description`\
    \ 和 `totalPrice` 属性。代码清单 14-5 展示了如何通过使用这些子类而非 `Purchase` 基类来指定一个选项。\n\n代码清单 14-5.\
    \ 在 `main.swift` 文件中使用 `Purchase` 子类\n\n```swift\nlet account = CustomerAccount(name:\"\
    Joe\");\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
    \ \"Scarf\", price: 20));\naccount.addPurchase(PurchaseWithGiftWrap(product: \"\
    Sunglasses\", price: 25));\naccount.printAccount();\n```\n\n运行该应用会在调试控制台产生以下输出：\n\
    \n```\nPurchase Red Hat, Price $10.00\nPurchase Scarf, Price $20.00\nPurchase\
    \ Sunglasses + giftwrap, Price $27.00\nTotal due: $57.00\n```\n\n这些子类虽然能用，但无法满足我的业务需求：客户不能自由组合搭配选项。每个子类仅代表单个选项，我无法表示客户既要礼品包装又要配送的购买情况。显然，我需要为这种组合创建另一个子类，如代码清单\
    \ 14-6 所示。\n\n代码清单 14-6. 在 `Options.swift` 文件中为礼品选项组合添加子类\n\n```swift\nclass PurchaseWithGiftWrap\
    \ : Purchase {\n    override var description:String { return \"\\(super.description)\
    \ + giftwrap\"; }\n    override var totalPrice:Float { return super.totalPrice\
    \ + 2;}\n}\n\nclass PurchaseWithRibbon : Purchase {\n    override var description:String\
    \ { return \"\\(super.description) + ribbon\"; }\n    override var totalPrice:Float\
    \ { return super.totalPrice + 1; }\n}\n\nclass PurchaseWithDelivery : Purchase\
    \ {\n    override var description:String { return \"\\(super.description) + delivery\"\
    ; }\n    override var totalPrice:Float { return super.totalPrice + 5; }\n}\n\n\
    class PurchaseWithGiftWrapAndDelivery : Purchase {\n    override var description:String\
    \ {\n        return \"\\(super.description) + giftwrap + delivery\"; }\n    override\
    \ var totalPrice:Float { return super.totalPrice + 5 + 2; }\n}\n```\n\n这只是其中一种可能的组合。为了让客户有完整的选择范围，我需要为以下所有组合创建子类：\n\
    \n- 礼品包装\n- 丝带\n- 配送\n- 礼品包装 + 丝带\n- 礼品包装 + 配送\n- 丝带 + 配送\n- 礼品包装 + 丝带 + 配送\n\n\
    随着我添加更多选项，类的数量会不断增加，因为我必须处理所有可能的排列组合。大量的类增加了出错风险，也使维护变得困难。例如，更改某个选项的价格可能会导致大规模的修改，并且很容易遗漏一个或多个本应更新的类。\n\
    \n# 理解装饰器模式\n\n装饰器通过创建装饰器类来解决排列组合问题。装饰器是原始类的包装器，可以改变其行为。装饰器提供与被包装类相同的 API，并且装饰器可以包裹其他装饰器，从而创建各种排列组合。图\
    \ 14-1 说明了装饰器模式。\n\n![A978-1-4842-0394-1_14_Fig1_HTML.jpg](img/A978-1-4842-0394-1_14_Fig1_HTML.jpg)\n\
    \n图 14-1. 装饰器模式\n\n装饰器提供与原始类相同的方法和属性，因此它们可以作为替代品使用，无需修改调用组件。如图所示，装饰器通常会调用其包装对象的方法和属性。由于所有涉及的对象都具有相同的方法和属性，装饰器并不知道它包装的对象是原始类的实例，还是另一个装饰器。\n"
- fmt: "# Implementing the Decorator Pattern\n\nThe decorator pattern is implemented\
    \ by deriving from the class that cannot be changed in order to create a class\
    \ that defines the same properties and methods and that can be used as a transparent\
    \ substitute. The decorator class defines a `private` property that is the wrapped\
    \ object and uses it to provide the base functionality that is decorated. Listing\
    \ 14-7 shows how I replaced the individual classes from the previous section with\
    \ decorators in the `Options.swift` file.\n\n**Listing 14-7.** Defining Decorator\
    \ Classes in the Options.swift File\n\n```\nclass BasePurchaseDecorator : Purchase\
    \ {\n    private let wrappedPurchase:Purchase;\n    init(purchase:Purchase) {\n\
    \        wrappedPurchase = purchase;\n        super.init(product: purchase.description,\
    \ price: purchase.totalPrice);\n    }\n}\n\nclass PurchaseWithGiftWrap : BasePurchaseDecorator\
    \ {\n    override var description:String { return \"\\(super.description) + giftwrap\"\
    ; }\n    override var totalPrice:Float { return super.totalPrice + 2;}\n}\n\n\
    class PurchaseWithRibbon : BasePurchaseDecorator {\n    override var description:String\
    \ { return \"\\(super.description) + ribbon\"; }\n    override var totalPrice:Float\
    \ { return super.totalPrice + 1; }\n}\n\nclass PurchaseWithDelivery : BasePurchaseDecorator\
    \ {\n    override var description:String { return \"\\(super.description) + delivery\"\
    ; }\n    override var totalPrice:Float { return super.totalPrice + 5; }\n}\n```\n\
    \nTo reduce duplication, I have defined a `BasePurchaseDecorator` class that is\
    \ derived from `Purchase` and defines an initializer that accepts a `Purchase`\
    \ object and assigns it to a private stored variable.\n\nThe individual decorators\
    \ inherit the `Purchase` variable and the initializer and override the `description`\
    \ and `totalPrice` properties. Each decorator property calls the corresponding\
    \ property of the wrapped `Purchase` object, manipulates the result, and then\
    \ returns it to the caller. In the case of the `totalPrice` property, for example,\
    \ each decorator gets the price from the wrapped object and adds the cost of the\
    \ option it represents.\n\n> **Tip:** Some objects that require decoration will\
    \ be defined by a protocol, and the implementation classes will not be exposed\
    \ to you. This doesn’t change the way that decorators are implemented. The decorator\
    \ conforms to the protocol and wraps around an object that also conforms to the\
    \ protocol.\n\nThe decorators are derived from the `Purchase` class and define\
    \ an initializer that is wrapped that accepts a `Purchase` object, which means\
    \ they can be combined to create permutations of objects, as shown in Listing\
    \ 14-8.\n\n**Listing 14-8.** Using the Decorator Classes in the main.swift File\n\
    \n```\nlet account = CustomerAccount(name:\"Joe\");\naccount.addPurchase(Purchase(product:\
    \ \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product: \"Scarf\",\
    \ price: 20));\naccount.addPurchase(PurchaseWithDelivery(purchase:\n    PurchaseWithGiftWrap(purchase:\n\
    \        Purchase(product: \"Sunglasses\", price:25))));\naccount.printAccount();\n\
    ```\n\nI create a `Purchase` object to represent the purchase of sunglasses and\
    \ pass it to the initializer of the `PurchaseWithGiftWrap` decorator. I pass the\
    \ decorator object to the initializer to the `PurchaseWithDelivery` to add a second\
    \ decorator and add the twice-decorated purchase to the customer’s account. I\
    \ made no changes to the `Purchase` or `CustomerAccount` class, but the output\
    \ produced by running the application shows that the decorator classes have allowed\
    \ me to define the gift options:\n\n```\nPurchase Red Hat, Price $10.00\nPurchase\
    \ Scarf, Price $20.00\nPurchase Sunglasses + giftwrap + delivery, Price $32.00\n\
    Total due: $62.00\n```\n\nThe description of the purchase includes the options\
    \ that have been selected, and the cost of those options is reflected in the price.\n\
    \n# Variations on the Decorator Pattern\n\nThere are two variations on the decorator\
    \ pattern, which I describe in the sections that follow.\n\n## Creating Decorators\
    \ with New Functionality\n\nThe decorators that I defined in earlier sections\
    \ presented the same API as the objects they decorated. This means decorators\
    \ are essentially invisible to the classes that consume decorated objects, letting\
    \ the application benefit from additional functionality—gift options in this case—without\
    \ the need to make modifications.\n\nThe first pattern variation is to create\
    \ decorators that define additional methods or properties beyond those defined\
    \ by the original objects. This allows more flexibility in the kinds of enhancements\
    \ that decorators can implement but does so by reducing the flexibility with which\
    \ those enhancements can be applied. To demonstrate, I added a new file called\
    \ `Discounts.swift` to the example project and used it to define the decorators\
    \ shown in Listing 14-9.\n\n**Listing 14-9.** The Contents of the Discounts.swift\
    \ File\n\n```\nclass DiscountDecorator: Purchase {\n    private let wrappedPurchase:Purchase;\n\
    \    init(purchase:Purchase) {\n        self.wrappedPurchase = purchase;\n   \
    \     super.init(product: purchase.description, price: purchase.totalPrice);\n\
    \    }\n    override var description:String {\n        return super.description;\n\
    \    }\n    var discountAmount:Float {\n        return 0;\n    }\n    func countDiscounts()\
    \ -> Int {\n        var total = 1;\n        if let discounter = wrappedPurchase\
    \ as? DiscountDecorator {\n            total += discounter.countDiscounts();\n\
    \        }\n        return total;\n    }\n}\n\nclass BlackFridayDecorator : DiscountDecorator\
    \ {\n    override var totalPrice:Float {\n        return super.totalPrice - discountAmount;\n\
    \    }\n    override var discountAmount:Float {\n        return super.totalPrice\
    \ * 0.20;\n    }\n}\n\nclass EndOfLineDecorator : DiscountDecorator {\n    override\
    \ var totalPrice:Float {\n        return super.totalPrice - discountAmount;\n\
    \    }\n    override var discountAmount:Float {\n        return super.totalPrice\
    \ * 0.70;\n    }\n}\n```\n\nI have defined the `DiscountDecorator` that wraps\
    \ a `Purchase` object and exposes its `description` and `totalPrice` properties.\
    \ The decorator also defines the `discountAmount` property, which returns the\
    \ amount by which a price is discounted in a sale. The implementation of the `totalPrice`\
    \ property uses the `discountAmount` value to reduce the price of a purchase.\
    \ The `countDiscounts` method works out how many discounts have been applied to\
    \ the purchase by looking to see whether the wrapped object is a discount decorator\
    \ and working its way through the chain of wrapped objects to work out the total.\n\
    \nI have derived two decorator classes from `DiscountDecorator` that represent\
    \ different sale conditions. Listing 14-10 shows how I applied the decorators\
    \ to a purchase.\n\n**Listing 14-10.** Applying the Discount Decorators in the\
    \ swift.main File\n\n```\nlet account = CustomerAccount(name:\"Joe\");\naccount.addPurchase(Purchase(product:\
    \ \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product: \"Scarf\",\
    \ price: 20));\naccount.addPurchase(EndOfLineDecorator(purchase:\n    BlackFridayDecorator(purchase:\
    \ PurchaseWithDelivery(purchase:\n        PurchaseWithGiftWrap(purchase:Purchase(product:\
    \ \"Sunglasses\", price:25))))));\naccount.printAccount();\n```\n\nI used both\
    \ the `EndOfLineDecorator` and the `BlackFridayDecorator` to combine discounts\
    \ on the sunglasses purchase. Running the application produces the following results:\n\
    \n```\nPurchase Red Hat, Price $10.00\nPurchase Scarf, Price $20.00\nPurchase\
    \ Sunglasses + giftwrap + delivery, Price $7.68\nTotal due: $37.68\n```\n\nThe\
    \ new decorators don’t modify the description of the product, but they reduce\
    \ the price from $32 to $25.60."
  raw: '## Implementing the Decorator Pattern


    The decorator pattern is implemented by deriving from the class that cannot be
    changed in order to create a class that defines the same properties and methods
    and that can be used as a transparent substitute. The decorator class defines
    a `private`property that is the wrapped object and uses it to provide the base
    functionality that is decorated. Listing 14-7 shows how I replaced the individual
    classes from the previous section with decorators in the `Options.swift` file.


    Listing 14-7. Defining Decorator Classes in the Options.swift File


    `class BasePurchaseDecorator : Purchase {`


    `private let wrappedPurchase:Purchase;`


    `init(purchase:Purchase) {`


    `wrappedPurchase = purchase;`


    `super.init(product: purchase.description, price: purchase.totalPrice);`


    `}`


    `}`


    `class PurchaseWithGiftWrap : BasePurchaseDecorator {`


    `override var description:String { return "\(super.description) + giftwrap"; }`


    `override var totalPrice:Float { return super.totalPrice + 2;}`


    `}`


    `class PurchaseWithRibbon : BasePurchaseDecorator {`


    `override var description:String { return "\(super.description) + ribbon"; }`


    `override var totalPrice:Float { return super.totalPrice + 1; }`


    `}`


    `class PurchaseWithDelivery : BasePurchaseDecorator {`


    `override var description:String { return "\(super.description) + delivery"; }`


    `override var totalPrice:Float { return super.totalPrice + 5; }`


    `}`


    To reduce duplication, I have defined a `BasePurchaseDecorator` class that is
    derived from `Purchase` and defines an initializer that accepts a `Purchase` object
    and assigns it to a private stored variable.


    The individual decorators inherit the `Purchase` variable and the initializer
    and override the `description` and `totalPrice` properties. Each decorator property
    calls the corresponding property of the wrapped `Purchase` object, manipulates
    the result, and then returns it to the caller. In the case of the `totalPrice`
    property, for example, each decorator gets the price from the wrapped object and
    adds the cost of the option it represents.


    Tip


    Some objects that require decoration will be defined by a protocol, and the implementation
    classes will not be exposed to you. This doesn’t change the way that decorators
    are implemented. The decorator conforms to the protocol and wraps around an object
    that also conforms to the protocol.


    The decorators are derived from the `Purchase` class and define an initializer
    that is wrapped that accepts a `Purchase` object, which means they can be combined
    to create permutations of objects, as shown in Listing 14-8.


    Listing 14-8. Using the Decorator Classes in the main.swift File


    `let account = CustomerAccount(name:"Joe");`


    `account.addPurchase(Purchase(product: "Red Hat", price: 10));`


    `account.addPurchase(Purchase(product: "Scarf", price: 20));`


    `account.addPurchase(PurchaseWithDelivery(purchase:`


    `PurchaseWithGiftWrap(purchase:`


    `Purchase(product: "Sunglasses", price:25))));`


    `account.printAccount();`


    I create a `Purchase` object to represent the purchase of sunglasses and pass
    it to the initializer of the `PurchaseWithGiftWrap` decorator. I pass the decorator
    object to the initializer to the `PurchaseWithDelivery` to add a second decorator
    and add the twice-decorated purchase to the customer’s account. I made no changes
    to the `Purchase` or `CustomerAccount` class, but the output produced by running
    the application shows that the decorator classes have allowed me to define the
    gift options:


    `Purchase Red Hat, Price $10.00`


    `Purchase Scarf, Price $20.00`


    `Purchase Sunglasses + giftwrap + delivery, Price $32.00`


    `Total due: $62.00`


    The description of the purchase includes the options that have been selected,
    and the cost of those options is reflected in the price.


    ## Variations on the Decorator Pattern


    There are two variations on the decorator pattern, which I describe in the sections
    that follow.


    ### Creating Decorators with New Functionality


    The decorators that I defined in earlier sections presented the same API as the
    objects they decorated. This means decorators are essentially invisible to the
    classes that consume decorated objects, letting the application benefit from additional
    functionality—gift options in this case—without the need to make modifications.


    The first pattern variation is to create decorators that define additional methods
    or properties beyond those defined by the original objects. This allows more flexibility
    in the kinds of enhancements that decorators can implement but does so by reducing
    the flexibility with which those enhancements can be applied. To demonstrate,
    I added a new file called `Discounts.swift` to the example project and used it
    to define the decorators shown in Listing 14-9.


    Listing 14-9. The Contents of the Discounts.swift File


    `class DiscountDecorator: Purchase {`


    `private let wrappedPurchase:Purchase;`


    `init(purchase:Purchase) {`


    `self.wrappedPurchase = purchase;`


    `super.init(product: purchase.description, price: purchase.totalPrice);`


    `}`


    `override var description:String {`


    `return super.description;`


    `}`


    `var discountAmount:Float {`


    `return 0;`


    `}`


    `func countDiscounts() -> Int {`


    `var total = 1;`


    `if let discounter = wrappedPurchase as? DiscountDecorator {`


    `total += discounter.countDiscounts();`


    `}`


    `return total;`


    `}`


    `}`


    `class BlackFridayDecorator : DiscountDecorator {`


    `override var totalPrice:Float {`


    `return super.totalPrice - discountAmount;`


    `}`


    `override var discountAmount:Float {`


    `return super.totalPrice * 0.20;`


    `}`


    `}`


    `class EndOfLineDecorator : DiscountDecorator {`


    `override var totalPrice:Float {`


    `return super.totalPrice - discountAmount;`


    `}`


    `override var discountAmount:Float {`


    `return super.totalPrice * 0.70;`


    `}`


    `}`


    I have defined the `DiscountDecorator` that wraps a `Purchase` object and exposes
    its `description` and `totalPrice` properties. The decorator also defines the
    `discountAmount` property, which returns the amount by which a price is discounted
    in a sale. The implementation of the `totalPrice` property uses the `discountAmount`
    value to reduce the price of a purchase. The `countDiscounts` method works out
    how many discounts have been applied to the purchase by looking to see whether
    the wrapped object is a discount decorator and working its way through the chain
    of wrapped objects to work out the total.


    I have derived two decorator classes from `DiscountDecorator` that represent different
    sale conditions. Listing 14-10 shows how I applied the decorators to a purchase.


    Listing 14-10. Applying the Discount Decorators in the swift.main File


    `let account = CustomerAccount(name:"Joe");`


    `account.addPurchase(Purchase(product: "Red Hat", price: 10));`


    `account.addPurchase(Purchase(product: "Scarf", price: 20));`


    `account.addPurchase(EndOfLineDecorator(purchase:`


    `BlackFridayDecorator(purchase: PurchaseWithDelivery(purchase:`


    `PurchaseWithGiftWrap(purchase:Purchase(product: "Sunglasses", price:25))))));`


    `account.printAccount();`


    I used both the `EndOfLineDecorator` and the `BlackFridayDecorator` to combine
    discounts on the sunglasses purchase. Running the application produces the following
    results:


    `Purchase Red Hat, Price $10.00`


    `Purchase Scarf, Price $20.00`


    `Purchase Sunglasses + giftwrap + delivery, Price $7.68`


    `Total due: $37.68`


    The new decorators don’t modify the description of the product, but they reduce
    the price from $32 to $25.60.'
  trans: "\n# 实现装饰器模式\n\n装饰器模式通过继承无法修改的类来实现，以创建一个定义相同属性和方法、并可作为透明替代品的类。装饰器类定义一个`private`属性来存储被包装的对象，并利用该对象提供待装饰的基础功能。清单\
    \ 14-7 展示了如何在`Options.swift`文件中用装饰器替代前一节的独立类。\n\n**清单 14-7.** 在 Options.swift\
    \ 文件中定义装饰器类\n\n```\nclass BasePurchaseDecorator : Purchase {\n    private let\
    \ wrappedPurchase:Purchase;\n    init(purchase:Purchase) {\n        wrappedPurchase\
    \ = purchase;\n        super.init(product: purchase.description, price: purchase.totalPrice);\n\
    \    }\n}\n\nclass PurchaseWithGiftWrap : BasePurchaseDecorator {\n    override\
    \ var description:String { return \"\\(super.description) + giftwrap\"; }\n  \
    \  override var totalPrice:Float { return super.totalPrice + 2;}\n}\n\nclass PurchaseWithRibbon\
    \ : BasePurchaseDecorator {\n    override var description:String { return \"\\\
    (super.description) + ribbon\"; }\n    override var totalPrice:Float { return\
    \ super.totalPrice + 1; }\n}\n\nclass PurchaseWithDelivery : BasePurchaseDecorator\
    \ {\n    override var description:String { return \"\\(super.description) + delivery\"\
    ; }\n    override var totalPrice:Float { return super.totalPrice + 5; }\n}\n```\n\
    \n为减少重复，我定义了一个`BasePurchaseDecorator`类，它继承自`Purchase`，并定义一个接收`Purchase`对象的初始化器，将其赋值给一个私有存储变量。\n\
    \n各个装饰器继承了`Purchase`变量及初始化器，并重写了`description`和`totalPrice`属性。每个装饰器属性都会调用被包装`Purchase`对象的对应属性，对结果进行处理，然后将其返回给调用者。例如，在`totalPrice`属性中，每个装饰器都从被包装对象获取价格，再加上自身所代表选项的成本。\n\
    \n> **提示：** 某些需要装饰的对象可能由协议定义，且实现类不会暴露给开发者。但这并不改变装饰器的实现方式。装饰器应遵循该协议，并包装一个同样遵循该协议的对象。\n\
    \n这些装饰器继承自`Purchase`类，并定义了接收`Purchase`对象的初始化器，这意味着它们可以组合起来创建多种对象排列组合，如清单 14-8\
    \ 所示。\n\n**清单 14-8.** 在 main.swift 文件中使用装饰器类\n\n```\nlet account = CustomerAccount(name:\"\
    Joe\");\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
    \ \"Scarf\", price: 20));\naccount.addPurchase(PurchaseWithDelivery(purchase:\n\
    \    PurchaseWithGiftWrap(purchase:\n        Purchase(product: \"Sunglasses\"\
    , price:25))));\naccount.printAccount();\n```\n\n我创建了一个`Purchase`对象代表太阳镜的购买，并将其传递给`PurchaseWithGiftWrap`装饰器的初始化器。接着将这个装饰器对象传递给`PurchaseWithDelivery`的初始化器以添加第二个装饰器，并将经过两次装饰的购买项添加到客户账户中。我没有对`Purchase`或`CustomerAccount`类做任何修改，但运行应用产生的输出表明，装饰器类已成功实现礼品选项的定义：\n\
    \n```\nPurchase Red Hat, Price $10.00\nPurchase Scarf, Price $20.00\nPurchase\
    \ Sunglasses + giftwrap + delivery, Price $32.00\nTotal due: $62.00\n```\n\n购买项的描述中包含了已选选项，且这些选项的成本已反映在价格中。\n\
    \n# 装饰器模式的变体\n\n装饰器模式有两种变体，我将在后续章节中介绍。\n\n## 创建具有新功能的装饰器\n\n我在前面章节中定义的装饰器，其 API\
    \ 与被装饰对象相同。这意味着装饰器对使用装饰后对象的类而言基本透明，让应用程序无需修改即可获得额外功能（本例中为礼品选项）。\n\n第一种模式变体是创建在原始对象定义之外，增加额外方法或属性的装饰器。这为装饰器可实现的功能增强类型提供了更大灵活性，但代价是降低了这些增强功能应用的灵活性。为演示这一点，我在示例项目中添加了一个名为`Discounts.swift`的新文件，并用其定义了清单\
    \ 14-9 所示的装饰器。\n\n**清单 14-9.** Discounts.swift 文件的内容\n\n```\nclass DiscountDecorator:\
    \ Purchase {\n    private let wrappedPurchase:Purchase;\n    init(purchase:Purchase)\
    \ {\n        self.wrappedPurchase = purchase;\n        super.init(product: purchase.description,\
    \ price: purchase.totalPrice);\n    }\n    override var description:String {\n\
    \        return super.description;\n    }\n    var discountAmount:Float {\n  \
    \      return 0;\n    }\n    func countDiscounts() -> Int {\n        var total\
    \ = 1;\n        if let discounter = wrappedPurchase as? DiscountDecorator {\n\
    \            total += discounter.countDiscounts();\n        }\n        return\
    \ total;\n    }\n}\n\nclass BlackFridayDecorator : DiscountDecorator {\n    override\
    \ var totalPrice:Float {\n        return super.totalPrice - discountAmount;\n\
    \    }\n    override var discountAmount:Float {\n        return super.totalPrice\
    \ * 0.20;\n    }\n}\n\nclass EndOfLineDecorator : DiscountDecorator {\n    override\
    \ var totalPrice:Float {\n        return super.totalPrice - discountAmount;\n\
    \    }\n    override var discountAmount:Float {\n        return super.totalPrice\
    \ * 0.70;\n    }\n}\n```\n\n我定义了`DiscountDecorator`，它包装一个`Purchase`对象，并暴露其`description`和`totalPrice`属性。该装饰器还定义了`discountAmount`属性，用于返回商品在促销时的折扣金额。`totalPrice`属性的实现利用`discountAmount`值来降低购买价格。`countDiscounts`方法通过检查包装对象是否为打折装饰器，并沿着包装链追溯，从而计算出该购买项已应用了多少个折扣。\n\
    \n我从`DiscountDecorator`派生出了两个装饰器类，分别代表不同的促销条件。清单 14-10 展示了如何将这些装饰器应用于购买项。\n\n\
    **清单 14-10.** 在 swift.main 文件中应用折扣装饰器\n\n```\nlet account = CustomerAccount(name:\"\
    Joe\");\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
    \ \"Scarf\", price: 20));\naccount.addPurchase(EndOfLineDecorator(purchase:\n\
    \    BlackFridayDecorator(purchase: PurchaseWithDelivery(purchase:\n        PurchaseWithGiftWrap(purchase:Purchase(product:\
    \ \"Sunglasses\", price:25))))));\naccount.printAccount();\n```\n\n我同时使用了`EndOfLineDecorator`和`BlackFridayDecorator`来对太阳镜购买项组合应用折扣。运行应用程序会产生以下结果：\n\
    \n```\nPurchase Red Hat, Price $10.00\nPurchase Scarf, Price $20.00\nPurchase\
    \ Sunglasses + giftwrap + delivery, Price $7.68\nTotal due: $37.68\n```\n\n新的装饰器并未修改产品的描述，但将价格从\
    \ 32 美元降低到了 25.60 美元。\n"
- fmt: "#### Using the New Functionality\n\nThe `countDiscounts` method that the new\
    \ decorators present allows me to get information about the number of discounts\
    \ that have been applied to a purchase, as shown in Listing 14-11.\n\n**Listing\
    \ 14-11.** Displaying the Number of Discounts in the `main.swift` File\n\n```\n\
    let account = CustomerAccount(name:\"Joe\");\naccount.addPurchase(Purchase(product:\
    \ \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product: \"Scarf\",\
    \ price: 20));\naccount.addPurchase(EndOfLineDecorator(purchase:\n    BlackFridayDecorator(purchase:\
    \ PurchaseWithDelivery(purchase:\n        PurchaseWithGiftWrap(purchase:Purchase(product:\
    \ \"Sunglasses\", price:25))))));\naccount.printAccount();\nfor p in account.purchases\
    \ {\n    if let d = p as? DiscountDecorator {\n        println(\"\\(p) has \\\
    (d.countDiscounts()) discounts\");\n    } else {\n        println(\"\\(p) has\
    \ no discounts\");\n    }\n}\n```\n\nI check to see whether each of the `Purchase`\
    \ objects stored by the `CustomerAccount` object is an instance of the `DiscountDecorator`\
    \ class and call the `countDiscounts` method if it is. Running the application\
    \ produces the following output:\n\n```\nPurchase Red Hat, Price $10.00\nPurchase\
    \ Scarf, Price $20.00\nPurchase Sunglasses + giftwrap + delivery, Price $7.68\n\
    Total due: $37.68\nRed Hat has no discounts\nScarf has no discounts\nSunglasses\
    \ + giftwrap + delivery has 2 discounts\n```\n\n#### Understanding the Limitations\
    \ of Decorators with New Functionality\n\nDecorators that implement new functionality\
    \ place limits on the way that decoration can be applied. To expose the new functionality,\
    \ each instance of the decorator class requires at least one other component to\
    \ be able to find it—either the calling component or the decorator that acts as\
    \ a wrapper in the case of nested decorators.\n\nThe discount decorators I defined\
    \ are sensitive to the order in which they are applied. In Listing 14-11, both\
    \ discounts are applied to the total cost of the purchase, including the gift\
    \ options that have been selected, like this:\n\n```\naccount.addPurchase(EndOfLineDecorator(purchase:\n\
    \    BlackFridayDecorator(purchase: PurchaseWithDelivery(purchase:\n        PurchaseWithGiftWrap(purchase:Purchase(product:\
    \ \"Sunglasses\", price:25))))));\n```\n\nListing 14-12 shows how this statement\
    \ changes if I want one of the discounts to apply only to the product price and\
    \ exclude the options.\n\n**Listing 14-12.** Changing the Application of a Discount\
    \ in the `main.swift` File\n\n```\nlet account = CustomerAccount(name:\"Joe\"\
    );\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
    \ \"Scarf\", price: 20));\naccount.addPurchase(EndOfLineDecorator(purchase:\n\
    \    PurchaseWithDelivery(purchase:PurchaseWithGiftWrap(purchase:\n        BlackFridayDecorator(purchase:\n\
    \            Purchase(product: \"Sunglasses\", price:25))))));\naccount.printAccount();\n\
    for p in account.purchases {\n    if let d = p as? DiscountDecorator {\n     \
    \   println(\"\\(p) has \\(d.countDiscounts()) discounts\");\n    } else {\n \
    \       println(\"\\(p) has no discounts\");\n    }\n}\n```\n\nThe `BlackFridayDecorator`\
    \ reduces the price of the sunglasses only and does not affect the price of the\
    \ gift options. Here is the output from running the application:\n\n```\nPurchase\
    \ Scarf, Price $20.00\nPurchase Sunglasses + giftwrap + delivery, Price $8.10\n\
    Total due: $38.10\nRed Hat has no discounts\nScarf has no discounts\nSunglasses\
    \ + giftwrap + delivery has 1 discounts\n```\n\nThe price has been calculated\
    \ correctly, but notice that only one discount is displayed by the summary. This\
    \ happens because the gift option decorators have no knowledge of the discount\
    \ decorators and the additional functionality they provide.\n\nThis kind of inflexibility\
    \ doesn’t mean you should avoid defining new features with decorators, but you\
    \ should do so carefully and consider the impact it will have on the rest of the\
    \ application, especially if there are other decorators already in use.\n\n###\
    \ Creating Consolidated Decorators\n\nSo far, I have defined simple decorator\
    \ classes because I wanted to emphasize how the pattern works and show how decorators\
    \ can be selected and applied without modifying the classes they decorate or those\
    \ that rely on them.\n\nDecorators need not be so simple, and the pattern allows\
    \ for any implementation of the methods and properties that the original class\
    \ defines. A common variation is to create consolidated decorators that apply\
    \ multiple changes to an object. Listing 14-13 shows how I have consolidated the\
    \ gift option decorators into a single class.\n\n**Caution**\n\nDecorators are\
    \ free to create their own implementations of methods and properties, but you\
    \ should use them to perform only the same tasks as the original class’s implementations.\
    \ A good decorated implementation might apply sales tax to the `totalPrice` property\
    \ in the example application, but a bad implementation would return the number\
    \ of items in stock. Decorators should enhance or extend the functionality of\
    \ the original class and not sneak new features into an existing API.\n\n**Listing\
    \ 14-13.** Creating a Single Decorator for Multiple Purchase Options in the `Options.swift`\
    \ File\n\n```\nclass GiftOptionDecorator : Purchase {\n    private let wrappedPurchase:Purchase;\n\
    \    private let options:[OPTION];\n    enum OPTION {\n        case GIFTWRAP;\n\
    \        case RIBBON;\n        case DELIVERY;\n    }\n    init(purchase:Purchase,\
    \ options:OPTION...) {\n        self.wrappedPurchase = purchase;\n        self.options\
    \ = options;\n        super.init(product: purchase.description, price: purchase.totalPrice);\n\
    \    }\n    override var description:String {\n        var result = wrappedPurchase.description;\n\
    \        for option in options {\n            switch (option) {\n            case\
    \ .GIFTWRAP:\n                result = \"\\(result) + giftwrap\";\n          \
    \  case .RIBBON:\n                result = \"\\(result) + ribbon\";\n        \
    \    case .DELIVERY:\n                result = \"\\(result) + delivery\";\n  \
    \          }\n        }\n        return result;\n    }\n    override var totalPrice:Float\
    \ {\n        var result = wrappedPurchase.totalPrice;\n        for option in options\
    \ {\n            switch (option) {\n            case .GIFTWRAP:\n            \
    \    result += 2;\n            case .RIBBON:\n                result += 1;\n \
    \           case .DELIVERY:\n                result += 5;\n            }\n   \
    \     }\n        return result;\n    }\n}\n```\n\nThis is still a decorator; it\
    \ allows me to selectively modify the behavior of `Purchase` objects, and it allows\
    \ me to create combinations of gift options. The difference is that it consolidates\
    \ the options so they can be applied in a single object. Listing 14-14 shows how\
    \ I updated the code that creates the purchases to use the new decorator.\n\n\
    **Tip**\n\nI prefer to use separate decorator classes for small projects. I find\
    \ them more elegant and pleasant to work with. They are harder to maintain, however,\
    \ and for more complex projects I switch to consolidated decorators that group\
    \ related enhancements together. I find consolidated decorators less elegant but\
    \ easier to manage.\n\n**Listing 14-14.** Using the Consolidated Decorator in\
    \ the `main.swift` File\n\n```\nlet account = CustomerAccount(name:\"Joe\");\n\
    account.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
    \ \"Scarf\", price: 20));\naccount.addPurchase(EndOfLineDecorator(purchase: BlackFridayDecorator(purchase:\n\
    \    GiftOptionDecorator(purchase: Purchase(product: \"Sunglasses\", price:25),\n\
    \        options: GiftOptionDecorator.OPTION.GIFTWRAP,\n        GiftOptionDecorator.OPTION.DELIVERY))));\n\
    account.printAccount();\nfor p in account.purchases {\n    if let d = p as? DiscountDecorator\
    \ {\n        println(\"\\(p) has \\(d.countDiscounts()) discounts\");\n    } else\
    \ {\n        println(\"\\(p) has no discounts\");\n    }\n}\n```\n\nThe code looks\
    \ a little ugly because of the way that it has to be formatted to fit on the page,\
    \ but the result is just the same as when I applied two of the individual decorator\
    \ classes in the previous section."
