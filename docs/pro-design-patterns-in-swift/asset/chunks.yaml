    ## Implementing the Table Cells


    In this section, I am going to implement support for the table in order to provide
    the user with information about the stock level of each product and to change
    the stock level. I will create a custom table cell that contains other controls
    and wire everything up into the `ViewController` class, following the premise
    of creating a single-class application. (However, as you will see, I cannot get
    away with just one class, and I will end up with a simple second class that contains
    some `IBOutlet` properties).'
  trans: "\n### 创建引用\n\n我在上一节中使用 Interface Builder 编辑的故事板文件是一个 XML 文件。这个文件定义了用户界面组件的布局和配置，但还需要一个额外的步骤，才能从应用程序代码中访问那些在运行时创建的组件实例（例如标签）。\n\
    \n> **提示：** 您可以通过在导航器面板中右键单击或按住 Control 键单击该文件，然后从弹出菜单中选择 **打开方式 ➤ 源代码** 来查看 XML\
    \ 内容。\n\nXcode 有一个名为“助理编辑器”的功能，它会显示与主编辑器区域中显示的文件在逻辑上相关的内容。从“视图”菜单中选择 **助理编辑器 ➤\
    \ 显示助理编辑器**，Xcode 会向布局中添加一个新的窗格，该窗格将显示 `ViewController.swift` 文件的内容。\n\n> **提示：**\
    \ Xcode 会自动选择要在助理编辑器中显示的文件，但它并不总是能显示您想要的文件。您可以通过 Option 键单击导航器面板中的某个文件，来明确选择要在助理编辑器窗格中显示的文件。\n\
    \n按住 Control 键单击视图控制器场景组件层次结构中的 `Label`，并将其拖拽到助理编辑器中。将鼠标指针定位到 `class` 定义和 `product`\
    \ 变量下方，然后松开鼠标。会弹出一个窗口，允许您配置一个输出口，该输出口是应用程序布局所创建的标签实例与 `UIViewController` 类之间的关联，如图\
    \ 3-11 所示。\n\n![A978-1-4842-0394-1_3_Fig11_HTML.jpg](img/A978-1-4842-0394-1_3_Fig11_HTML.jpg)\n\
    \n**图 3-11.** 为标签创建输出口\n\n将 `名称` 字段设置为 `totalStockLabel`，然后点击 **连接** 按钮。Xcode\
    \ 将会向 `ViewController` 类添加一个新变量，如代码清单 3-2 所示。（您无法手动添加此代码语句，因为 Xcode 会在幕后对项目进行其他更改）。\n\
    \n**代码清单 3-2.** 在 `ViewController.swift` 文件中添加输出口\n\n```\nimport UIKit\n\nclass\
    \ ViewController: UIViewController {\n\n    @IBOutlet weak var totalStockLabel:\
    \ UILabel!\n\n    var products = [\n        (\"Kayak\", \"A boat for one person\"\
    , \"Watersports\", 275.0, 10),\n        (\"Lifejacket\", \"Protective and fashionable\"\
    , \"Watersports\", 48.95, 14),\n        (\"Soccer Ball\", \"FIFA-approved size\
    \ and weight\", \"Soccer\", 19.5, 32),\n        (\"Corner Flags\", \"Give your\
    \ playing field a professional touch\",\n        \"Soccer\", 34.95, 1),\n    \
    \    (\"Stadium\", \"Flat-packed 35,000-seat stadium\", \"Soccer\", 79500.0, 4),\n\
    \        (\"Thinking Cap\", \"Improve your brain efficiency by 75%\", \"Chess\"\
    , 16.0, 8),\n        (\"Unsteady Chair\", \"Secretly give your opponent a disadvantage\"\
    ,\n        \"Chess\", 29.95, 3),\n        (\"Human Chess Board\", \"A fun game\
    \ for the family\", \"Chess\", 75.0, 2),\n        (\"Bling-Bling King\", \"Gold-plated,\
    \ diamond-studded King\",\n        \"Chess\", 1200.0, 4)];\n\n    override func\
    \ viewDidLoad() {\n        super.viewDidLoad()\n    }\n\n    override func didReceiveMemoryWarning()\
    \ {\n        super.didReceiveMemoryWarning()\n    }\n}\n```\n\n该变量的类型是 `UILabel`，这是\
    \ `UIKit` 框架中实现标签功能的类的名称。`@IBOutlet` 属性将该新变量标识为一个输出口。\n\n### 更新显示\n\n代码清单 3-3\
    \ 展示了我如何使用该输出口来更新标签显示的文本，以显示库存中的商品数量。\n\n**代码清单 3-3.** 在 `ViewController.swift`\
    \ 文件中显示总库存\n\n```\nimport UIKit\n\nclass ViewController: UIViewController {\n\n\
    \    @IBOutlet weak var totalStockLabel: UILabel!\n\n    var products = [\n  \
    \      (\"Kayak\", \"A boat for one person\", \"Watersports\", 275.0, 10),\n \
    \       (\"Lifejacket\", \"Protective and fashionable\", \"Watersports\", 48.95,\
    \ 14),\n        (\"Soccer Ball\", \"FIFA-approved size and weight\", \"Soccer\"\
    , 19.5, 32),\n        (\"Corner Flags\", \"Give your playing field a professional\
    \ touch\",\n        \"Soccer\", 34.95, 1),\n        (\"Stadium\", \"Flat-packed\
    \ 35,000-seat stadium\", \"Soccer\", 79500.0, 4),\n        (\"Thinking Cap\",\
    \ \"Improve your brain efficiency by 75%\", \"Chess\", 16.0, 8),\n        (\"\
    Unsteady Chair\", \"Secretly give your opponent a disadvantage\",\n        \"\
    Chess\", 29.95, 3),\n        (\"Human Chess Board\", \"A fun game for the family\"\
    , \"Chess\", 75.0, 2),\n        (\"Bling-Bling King\", \"Gold-plated, diamond-studded\
    \ King\", \"Chess\",\n        1200.0, 4)];\n\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad();\n        displayStockTotal();\n    }\n\n   \
    \ override func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n\
    \    }\n\n    func displayStockTotal() {\n        let stockTotal = products.reduce(0,\n\
    \            {(total, product) -> Int in return total + product.4});\n       \
    \ totalStockLabel.text = \"库存 \\(stockTotal) 件商品\";\n    }\n}\n```\n\n我定义了一个名为\
    \ `displayStockTotal` 的新方法，它使用了 Swift 标准库中的 `reduce` 扩展。`reduce` 方法为数组中的每个条目调用一个函数。我将该函数表示为一个闭包，该闭包对每个数据元组中索引\
    \ 4 的值进行求和。\n\n生成总数后，我设置了标签的 `text` 属性，这会更改 `UILabel` 组件在应用程序布局中显示的字符串。\n\n我从\
    \ `viewDidLoad` 方法中调用 `displayStockTotal` 方法，该方法在应用程序初始化且视图加载时被调用。要测试这些更改，请点击\
    \ Xcode 工具栏中的 **播放** 按钮。效果显示在图 3-12 中。\n\n![A978-1-4842-0394-1_3_Fig12_HTML.jpg](img/A978-1-4842-0394-1_3_Fig12_HTML.jpg)\n\
    \n**图 3-12.** 显示产品总数\n\n## 实现表格单元格\n\n在本节中，我将实现对表格的支持，以便向用户提供有关每种产品库存水平的信息，并允许更改库存水平。我将创建一个包含其他控件的自定义表格单元格，并将所有内容连接到\
    \ `ViewController` 类中，遵循创建单类应用程序的前提。（但是，您将看到，我无法仅使用一个类来完成所有工作，最终我将创建一个简单的第二个类，其中包含一些\
    \ `IBOutlet` 属性）。\n"
- fmt: "### Defining the Custom Table Cell and Layout\n\nClick the `Main.storyboard`\
    \ file in the navigator pane to open the Interface Builder editor. Ensure that\
    \ the hierarchy is expanded so that you can see the components in the layout.\
    \ Locate the `Table View` `Cell` component in the Object Library, drag it to the\
    \ `Table View` component in the hierarchy, and release the mouse.\n\nA new `Content\
    \ View` item will appear in the hierarchy, which corresponds to a `Prototype Cells`\
    \ object in the main IB view—this is the template that will be used to generate\
    \ table cells.\n\nLocate the `Text Field` item in the Object Library and drag\
    \ it to the `Content View` item in the hierarchy. The `Text Field` component presents\
    \ an editable text field. Position and resize the text field so that it occupies\
    \ the right side of the table cell, as shown in Figure [3-13](#A978-1-4842-0394-1_3_Chapter.html#Fig13).\
    \ The dotted blue lines in the figure are layout guides that Xcode provides to\
    \ help position components.\n\n> **Tip:** You can drag the labels directly to\
    \ the layout in the main part of the editor pane, but it is easy to add components\
    \ to the wrong part of the layout. I find using the hierarchy to be more reliable,\
    \ especially for complex layouts.\n\n![A978-1-4842-0394-1_3_Fig13_HTML.jpg](A978-1-4842-0394-1_3_Fig13_HTML.jpg)\n\
    \n**Figure 3-13.** Positioning the first label in the custom table cell\n\nEnsure\
    \ that the text field is selected, either in the main editor pane or in the component\
    \ hierarchy, and use the Attributes Inspector to set the values shown in Table\
    \ [3-3](#A978-1-4842-0394-1_3_Chapter.html#Tab3).\n\n**Table 3-3.** The Configuration\
    \ Changes Required for the `Text Field`\n\n| Attribute | Change |\n| --- | ---\
    \ |\n| `Font` | Set this attribute to `System 20.0`. |\n| `Alignment` | Set this\
    \ attribute so that the text is aligned to the right edge of the component. |\n\
    \nNow drag `Label` and `Stepper` items in the Object Library to create the layout\
    \ shown in Figure [3-14](#A978-1-4842-0394-1_3_Chapter.html#Fig14), dragging the\
    \ components to the `Content View` item in the hierarchy.\n\n> **Tip:** Don’t\
    \ worry about getting the layout pixel-perfect—a rough approximation will do.\
    \ I enabled the blue lines in the figure to show the bounds of each component\
    \ by selecting **Canvas** > **Show Bounds Rectangles** from the **Editor** menu.\n\
    \n![A978-1-4842-0394-1_3_Fig14_HTML.jpg](A978-1-4842-0394-1_3_Fig14_HTML.jpg)\n\
    \n**Figure 3-14.** Adding the remaining components to the custom table cell layout\n\
    \nYou will have to select the `Table View Cell` item in the hierarchy and use\
    \ the grab bars to increase the height of the table cell to make everything fit.\n\
    \nTo make it easier to differentiate between the two `Label` components, click\
    \ the entry in the hierarchy for the topmost one and change its name to `Name\
    \ Label`. Click the other `Label` and change its name to `Description Label`.\
    \ Finally, click the entry for the `Text Field` and change its name to `Text Field`\
    \ (the default name includes details of the style of the field).\n\nThe final\
    \ step is to configure the components. Table [3-4](#A978-1-4842-0394-1_3_Chapter.html#Tab4)\
    \ lists the new names for the components and the attributes that should be changed\
    \ using the Attributes Inspector.\n\n**Table 3-4.** The Attribute Changes Required\
    \ for the Custom Table Cell Components\n\n| Component | Attribute | Value |\n\
    | --- | --- | --- |\n| `Name Label` | `Font` | `System Bold 30` |\n| `Description\
    \ Label` | `Font` | `System 25` |\n| `Text Field` | `Font` | `System 30` |\n\n\
    ### Setting the Table Cell Layout Constraints\n\nUse the component hierarchy to\
    \ set the layout constraints shown in Table [3-5](#A978-1-4842-0394-1_3_Chapter.html#Tab5).\
    \ These ensure that the contents of the table cell will be visible regardless\
    \ of the device and orientation used to display the app.\n\n**Table 3-5.** The\
    \ Constraints Required for the Custom Table Cell Components\n\n| Drag From | Drag\
    \ To | Constraints |\n| --- | --- | --- |\n| `Text Field` | `Content View` | `Trailing\
    \ Space to Container Margin` `Top Space to Container Margin` |\n| `Text Field`\
    \ | `Text Field` | `Width` |\n| `Stepper` | `Content View` | `Top Space to Container\
    \ Margin` |\n| `Stepper` | `Text Field` | `Horizontal Spacing` |\n| `Name Label`\
    \ | `Content View` | `Leading Space to Container Margin` `Top Space to Container\
    \ Margin` |\n| `Name Label` | `Stepper` | `Horizontal Spacing` |\n| `Name Label`\
    \ | `Name Label` | `Height` |\n| `Description Label` | `Content View` | `Leading\
    \ Space to Container Margin` `Trailing Space to Container Margin` `Bottom Space\
    \ to Container Margin` |\n\n### Creating the Table Cell Class and Outlets\n\n\
    To be able to display details of each product in a table cell, I need to be able\
    \ to refer to the components added to the layout in the previous section. I do\
    \ this by creating variables that are decorated with the `IBOutlet` attribute,\
    \ just as I did for the `UILabel` component that displays the total number of\
    \ items in stock. There is a wrinkle, however: I need to define a class that will\
    \ be used to instantiate each cell in the table, which I can then use as a container\
    \ for the outlets. I can’t handle this in the `ViewController` class because custom\
    \ data cell classes must be derived from `UITableViewCell` and Swift doesn’t support\
    \ multiple class inheritance. Listing 3-4 shows the addition of a new class to\
    \ the `ViewController.swift` file.\n\n**Listing 3-4.** Adding a Table Cell Class\
    \ to the `ViewController.swift` File\n\n```\nimport UIKit\n\nclass ProductTableCell\
    \ : UITableViewCell {\n\n}\n\nclass ViewController: UIViewController {\n    //\
    \ ...statements omitted for brevity...\n}\n```\n\nI have defined a new class called\
    \ `ProductTableCell`, which will be instantiated for the cells in the table. To\
    \ apply this class, select the `Table View Cell` item in the component hierarchy\
    \ and use the Identity Inspector to change the value of the `Class` attribute\
    \ to `ProductTableCell` and the value of the `Module` attribute to `SportsStore`.\n\
    \nNext, switch to the Attributes Inspector and set the `Identifier` attribute\
    \ to `ProductCell`.\n\n> **Tip:** Changing the `Class` attribute tells iOS to\
    \ use the `ProductTableCell` class when it needs table cells. Setting the `Identifier`\
    \ will allow me to request `ProductTableCell` objects to be created automatically,\
    \ which I do in the next section.\n\nControl-drag each of the four components\
    \ added in the previous section—two labels, a text field, and a stepper—in turn\
    \ to the new `ProductTableCell` class in the code editor to create new outlet\
    \ properties; you can drag the items in the component hierarchy or the ones in\
    \ the storyboard. Table [3-6](#A978-1-4842-0394-1_3_Chapter.html#Tab6) shows the\
    \ mapping between the names of the components and the names I used for the outlets.\n\
    \n> **Tip:** Restart Xcode if you see an error telling you that there is no information\
    \ available for the `ProductTableCell` class when you create an outlet.\n\n**Table\
    \ 3-6.** The Mapping of Components Names to Outlet Property Names in the `ProductTableCell`\
    \ Class\n\n| Name | Description |\n| --- | --- |\n| `Name Label` | `nameLabel`\
    \ |\n| `Description Label` | `descriptionLabel` |\n| `Stepper` | `stockStepper`\
    \ |\n| `Text Field` | `stockField` |\n\nWhen you have created all four outlets,\
    \ the `ProductTableCell` class should match Listing 3-5.\n\n**Listing 3-5.** Adding\
    \ Outlet Properties to the `ProductTableCell` Class in the `ViewController.swift`\
    \ File\n\n```\n...\n\nclass ProductTableCell : UITableViewCell {\n\n    @IBOutlet\
    \ weak var nameLabel: UILabel!\n    @IBOutlet weak var descriptionLabel: UILabel!\n\
    \    @IBOutlet weak var stockStepper: UIStepper!\n    @IBOutlet weak var stockField:\
    \ UITextField!\n}\n\n...\n```\n\nThe order of the properties doesn’t matter as\
    \ long as you have defined all four and they correspond to the components shown\
    \ in the table."
  raw: '### Defining the Custom Table Cell and Layout


    Click the `Main.storyboard` file in the navigator pane to open the Interface Builder
    editor. Ensure that the hierarchy is expanded so that you can see the components
    in the layout. Locate the `Table View` `Cell`component in the Object Library,
    drag it to the `Table View` component in the hierarchy, and release the mouse.


    A new `Content View` item will appear in the hierarchy, which corresponds to a
    `Prototype Cells` object in the main IB view—this is the template that will be
    used to generate table cells.


    Locate the `Text Field` item in the Object Library and drag it to the `Content
    View` item in the hierarchy. The `Text Field` component presents an editable text
    field. Position and resize the text field so that it occupies the right side of
    the table cell, as shown in Figure [3-13](#A978-1-4842-0394-1_3_Chapter.html#Fig13).
    The dotted blue lines in the figure are layout guides that Xcode provides to help
    position components.


    Tip


    You can drag the labels directly to the layout in the main part of the editor
    pane, but it is easy to add components to the wrong part of the layout. I find
    using the hierarchy to be more reliable, especially for complex layouts.


    ![A978-1-4842-0394-1_3_Fig13_HTML.jpg](A978-1-4842-0394-1_3_Fig13_HTML.jpg)


    Figure 3-13.


    Positioning the first label in the custom table cell


    Ensure that the text field is selected, either in the main editor pane or in the
    component hierarchy, and use the Attributes Inspector to set the values shown
    in Table [3-3](#A978-1-4842-0394-1_3_Chapter.html#Tab3).


    Table 3-3.


    The Configuration Changes Required for the Text Field


    | Attribute | Change |

    | --- | --- |

    | `Font` | Set this attribute to `System 20.0`. |

    | `Alignment` | Set this attribute so that the text is aligned to the right edge
    of the component. |


    Now drag `Label` and `Stepper` items in the Object Library to create the layout
    shown in Figure [3-14](#A978-1-4842-0394-1_3_Chapter.html#Fig14), dragging the
    components to the `Content View` item in the hierarchy.


    Tip


    Don’t worry about getting the layout pixel-perfect—a rough approximation will
    do. I enabled the blue lines in the figure to show the bounds of each component
    by selecting Canvas ➤ Show Bounds Rectangles from the Editor menu.


    ![A978-1-4842-0394-1_3_Fig14_HTML.jpg](A978-1-4842-0394-1_3_Fig14_HTML.jpg)


    Figure 3-14.


    Adding the remaining components to the custom table cell layout


    You will have to select the `Table View Cell` item in the hierarchy and use the
    grab bars to increase the height of the table cell to make everything fit.


    To make it easier to differentiate between the two `Label` components, click the
    entry in the hierarchy for the topmost one and change its name to `Name Label`.
    Click the other `Label` and change its name to `Description Label`. Finally, click
    the entry for the `Text Field` and change its name to `Text Field` (the default
    name includes details of the style of the field).


    The final step is to configure the components. Table [3-4](#A978-1-4842-0394-1_3_Chapter.html#Tab4)
    lists the new names for the components and the attributes that should be changed
    using the Attributes Inspector.


    Table 3-4.


    The Attribute Changes Required for the Custom Table Cell Components


    | Component | Attribute | Value |

    | --- | --- | --- |

    | `Name Label` | `Font` | `System Bold 30` |

    | `Description Label` | `Font` | `System 25` |

    | `Text Field` | `Font` | `System 30` |


    ### Setting the Table Cell Layout Constraints


    Use the component hierarchy to set the layout constraints shown in Table [3-5](#A978-1-4842-0394-1_3_Chapter.html#Tab5).
    These ensure that the contents of the table cell will be visible regardless of
    the device and orientation used to display the app.


    Table 3-5.


    The Constraints Required for the Custom Table Cell Components


    | Drag From | Drag To | Constraints |

    | --- | --- | --- |

    | `Text Field` | `Content View` | `Trailing Space to Container Margin` `Top Space
    to Container Margin` |

    | `Text Field` | `Text Field` | `Width` |

    | `Stepper` | `Content View` | `Top Space to Container Margin` |

    | `Stepper` | `Text Field` | `Horizontal Spacing` |

    | `Name Label` | `Content View` | `Leading Space to Container Margin` `Top Space
    to Container Margin` |

    | `Name Label` | `Stepper` | `Horizontal Spacing` |

    | `Name Label` | `Name Label` | `Height` |

    | `Description Label` | `Content View` | `Leading Space to Container Margin` `Trailing
    Space to Container Margin` `Bottom Space to Container Margin` |


    ### Creating the Table Cell Class and Outlets


    To be able to display details of each product in a table cell, I need to be able
    to refer to the components added to the layout in the previous section. I do this
    by creating variables that are decorated with the `IBOutlet` attribute, just as
    I did for the `UILabel` component that displays the total number of items in stock.
    There is a wrinkle, however: I need to define a class that will be used to instantiate
    each cell in the table, which I can then use as a container for the outlets. I
    can’t handle this in the `ViewController` class because custom data cell classes
    must be derived from `UITableViewCell` and Swift doesn’t support multiple class
    inheritance. Listing 3-4 shows the addition of a new class to the `ViewController.swift`
    file.


    Listing 3-4. Adding a Table Cell Class to the ViewController.swift File


    `import UIKit`


    `class ProductTableCell : UITableViewCell {`


    `}`


    `class ViewController: UIViewController {`


    `//` `...statements omitted for brevity...`


    `}`


    I have defined a new class called `ProductTableCell`, which will be instantiated
    for the cells in the table. To apply this class, select the `Table View Cell`
    item in the component hierarchy and use the Identity Inspector to change the value
    of the `Class` attribute to `ProductTableCell` and the value of the `Module` attribute
    to `SportsStore`.


    Next, switch to the Attributes Inspector and set the `Identifier` attribute to
    `ProductCell`.


    Tip


    Changing the `Class` attribute tells iOS to use the `ProductTableCell` class when
    it needs table cells. Setting the `Identifier` will allow me to request `ProductTableCell`
    objects to be created automatically, which I do in the next section.


    Control-drag each of the four components added in the previous section—two labels,
    a text field, and a stepper—in turn to the new `ProductTableCell` class in the
    code editor to create new outlet properties; you can drag the items in the component
    hierarchy or the ones in the storyboard. Table [3-6](#A978-1-4842-0394-1_3_Chapter.html#Tab6)
    shows the mapping between the names of the components and the names I used for
    the outlets.


    Tip


    Restart Xcode if you see an error telling you that there is no information available
    for the `ProductTableCell` class when you create an outlet.


    Table 3-6.


    The Mapping of Components Names to Outlet Property Names in the ProductTableCell
    Class


    | Name | Description |

    | --- | --- |

    | `Name Label` | `nameLabel` |

    | `Description Label` | `descriptionLabel` |

    | `Stepper` | `stockStepper` |

    | `Text Field` | `stockField` |


    When you have created all four outlets, the `ProductTableCell` class should match
    Listing 3-5.


    Listing 3-5. Adding Outlet Properties to the ProductTableCell Class in the ViewController.swift
    File


    `...`


    `class ProductTableCell : UITableViewCell {`


    `@IBOutlet weak var nameLabel: UILabel!`


    `@IBOutlet weak var descriptionLabel: UILabel!`


    `@IBOutlet weak var stockStepper: UIStepper!`


    `@IBOutlet weak var stockField: UITextField!`


    `}`


    `...`


    The order of the properties doesn’t matter as long as you have defined all four
    and they correspond to the components shown in the table.'
  trans: "\n### 定义自定义表格单元格与布局\n\n在导航窗格中点击 `Main.storyboard` 文件以打开界面构建器编辑器。确保层级结构已展开，以便你能看到布局中的各个组件。在对象库中找到\
    \ `Table View` `Cell` 组件，将其拖拽至层级结构中的 `Table View` 组件上，然后松开鼠标。\n\n层级结构中将出现一个新的\
    \ `Content View` 项，它对应于主 IB 视图中的一个 `Prototype Cells` 对象——这将是用于生成表格单元格的模板。\n\n\
    在对象库中找到 `Text Field` 项，并将其拖拽至层级结构中的 `Content View` 项上。`Text Field` 组件呈现一个可编辑文本字段。调整文本字段的位置和大小，使其占据表格单元格的右侧，如图\
    \ 3-13 所示。图中的蓝色虚线是 Xcode 提供的布局参考线，用于帮助定位组件。\n\n> **提示：** 你可以直接将标签拖拽到编辑器窗格主体部分的布局中，但这样很容易将组件添加到布局的错误位置。我发现使用层级结构更可靠，尤其是在处理复杂布局时。\n\
    \n![A978-1-4842-0394-1_3_Fig13_HTML.jpg](img/A978-1-4842-0394-1_3_Fig13_HTML.jpg)\n\
    \n**图 3-13.** 在自定义表格单元格中定位第一个标签\n\n确保文本字段已选中（在主编辑器窗格或组件层级结构中均可），然后使用属性检查器设置表 3-3\
    \ 中显示的值。\n\n**表 3-3.** `Text Field` 所需的配置更改\n\n| 属性 | 更改 |\n| --- | --- |\n| `Font`\
    \ | 将此属性设置为 `System 20.0`。 |\n| `Alignment` | 设置此属性，使文本与组件右边缘对齐。 |\n\n现在，将对象库中的\
    \ `Label` 和 `Stepper` 项拖拽到层级结构中的 `Content View` 项上，以创建图 3-14 所示的布局。\n\n> **提示：**\
    \ 不必追求像素级完美的布局——大致接近即可。我通过在**编辑器**菜单中选择**画布** > **显示边界矩形**，启用了图中显示每个组件边界的蓝色线条。\n\
    \n![A978-1-4842-0394-1_3_Fig14_HTML.jpg](img/A978-1-4842-0394-1_3_Fig14_HTML.jpg)\n\
    \n**图 3-14.** 将剩余组件添加到自定义表格单元格布局中\n\n你需要在层级结构中选择 `Table View Cell` 项，并使用拖拽手柄增加表格单元格的高度，以便所有内容都能容纳。\n\
    \n为了更容易区分两个 `Label` 组件，点击层级结构中上方标签的条目，将其名称改为 `Name Label`。点击另一个 `Label`，将其名称改为\
    \ `Description Label`。最后，点击 `Text Field` 的条目，将其名称改为 `Text Field`（默认名称包含字段样式的详细信息）。\n\
    \n最后一步是配置组件。表 3-4 列出了组件的新名称以及应使用属性检查器更改的属性。\n\n**表 3-4.** 自定义表格单元格组件所需的属性更改\n\n\
    | 组件 | 属性 | 值 |\n| --- | --- | --- |\n| `Name Label` | `Font` | `System Bold 30`\
    \ |\n| `Description Label` | `Font` | `System 25` |\n| `Text Field` | `Font` |\
    \ `System 30` |\n\n### 设置表格单元格布局约束\n\n使用组件层级结构设置表 3-5 中所示的布局约束。这些约束确保无论用于显示应用的设备和方向如何，表格单元格的内容都将保持可见。\n\
    \n**表 3-5.** 自定义表格单元格组件所需的约束\n\n| 拖拽自 | 拖拽至 | 约束 |\n| --- | --- | --- |\n| `Text\
    \ Field` | `Content View` | `尾部空间到容器边距` `顶部空间到容器边距` |\n| `Text Field` | `Text\
    \ Field` | `宽度` |\n| `Stepper` | `Content View` | `顶部空间到容器边距` |\n| `Stepper` |\
    \ `Text Field` | `水平间距` |\n| `Name Label` | `Content View` | `前导空间到容器边距` `顶部空间到容器边距`\
    \ |\n| `Name Label` | `Stepper` | `水平间距` |\n| `Name Label` | `Name Label` | `高度`\
    \ |\n| `Description Label` | `Content View` | `前导空间到容器边距` `尾部空间到容器边距` `底部空间到容器边距`\
    \ |\n\n### 创建表格单元格类与出口\n\n为了能够在表格单元格中显示每个产品的详细信息，我需要能够引用上一节添加到布局中的组件。为此，我创建了带有\
    \ `IBOutlet` 属性的变量，就像我为显示库存总件数的 `UILabel` 组件所做的那样。但这里有个小问题：我需要定义一个用于实例化表格中每个单元格的类，然后将其用作出口的容器。我无法在\
    \ `ViewController` 类中处理这个问题，因为自定义数据单元格类必须派生自 `UITableViewCell`，而 Swift 不支持多重类继承。代码清单\
    \ 3-4 显示了在 `ViewController.swift` 文件中添加一个新类的操作。\n\n**代码清单 3-4.** 在 `ViewController.swift`\
    \ 文件中添加表格单元格类\n\n```\nimport UIKit\n\nclass ProductTableCell : UITableViewCell\
    \ {\n\n}\n\nclass ViewController: UIViewController {\n    // ...为简洁起见，省略了语句...\n\
    }\n```\n\n我定义了一个名为 `ProductTableCell` 的新类，它将用于实例化表格中的单元格。要应用此类，请在组件层级结构中选择 `Table\
    \ View Cell` 项，然后使用身份检查器将 `Class` 属性的值更改为 `ProductTableCell`，并将 `Module` 属性的值更改为\
    \ `SportsStore`。\n\n接下来，切换到属性检查器，并将 `Identifier` 属性设置为 `ProductCell`。\n\n> **提示：**\
    \ 更改 `Class` 属性会告诉 iOS 在需要表格单元格时使用 `ProductTableCell` 类。设置 `Identifier` 将允许我请求自动创建\
    \ `ProductTableCell` 对象，我将在下一节中执行此操作。\n\n按住 Control 键，依次将上一节添加的四个组件——两个标签、一个文本字段和一个步进器——拖拽到代码编辑器中的新\
    \ `ProductTableCell` 类中，以创建新的出口属性；你可以从组件层级结构或故事板中拖拽这些项目。表 3-6 显示了组件名称与我为出口使用的名称之间的映射关系。\n\
    \n> **提示：** 如果在创建出口时看到错误，提示没有 `ProductTableCell` 类的可用信息，请重启 Xcode。\n\n**表 3-6.**\
    \ `ProductTableCell` 类中组件名称到出口属性名称的映射\n\n| 名称 | 描述 |\n| --- | --- |\n| `Name Label`\
    \ | `nameLabel` |\n| `Description Label` | `descriptionLabel` |\n| `Stepper` |\
    \ `stockStepper` |\n| `Text Field` | `stockField` |\n\n当你创建完所有四个出口后，`ProductTableCell`\
    \ 类应与代码清单 3-5 一致。\n\n**代码清单 3-5.** 在 `ViewController.swift` 文件的 `ProductTableCell`\
    \ 类中添加出口属性\n\n```\n...\n\nclass ProductTableCell : UITableViewCell {\n\n    @IBOutlet\
    \ weak var nameLabel: UILabel!\n    @IBOutlet weak var descriptionLabel: UILabel!\n\
    \    @IBOutlet weak var stockStepper: UIStepper!\n    @IBOutlet weak var stockField:\
    \ UITextField!\n}\n\n...\n```\n\n只要定义了所有四个属性，并且它们与表中所示的组件对应，属性的顺序无关紧要。\n"
- fmt: "### Implementing the Data Source Protocol\n\nTo provide a table with data,\
    \ I must implement two methods from the `UITableViewDataSource` protocol that\
    \ give me the opportunity to tell the table how many rows there are and to generate\
    \ each cell. Before I do that, I need to create an outlet property so that I can\
    \ refer to the table view from the `ViewController` class.\n\nControl-drag the\
    \ `Table View` item in the component hierarchy to the `ViewController` class and\
    \ release the mouse so that Xcode creates the property under the `totalStockOutlet`\
    \ property. Set the name of the property to `tableView`. The result should be\
    \ the addition of the property shown in Listing 3-6.\n\n**Listing 3-6.** Adding\
