    \n```xml\n<stockChange>\n<product name=\"Lifejacket\" category=\"Watersports\"\
    >15</product>\n</stockChange>\n```\n\n## 本章小结\n\n在本章中，我描述了构建器模式，并向你展示了当直接实例化会导致调用方需要了解对象的默认配置值，以及当配置数据是逐步获取时，如何使用它来控制对象的创建。\n\
    \n构建器模式是创建型模式中的最后一个，在第三部分中，我将描述一种不同类型的模式：结构型模式。\n\n# 第三部分：结构型模式\n\n## 12. 适配器模式\n\
    \n在本章中，我将介绍第一个结构型模式：适配器模式。该模式允许两个提供相关功能的对象即使拥有不兼容的 API 也能协同工作。表 12-1 将适配器模式置于上下文中。\n\
    \n**表 12-1.** 将适配器模式置于情境中\n\n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？ | 适配器模式通过引入一个从一个组件映射到另一个组件的适配器，使得拥有不兼容\
    \ API 的两个组件能够协同工作。 |\n| 有什么好处？ | 该模式允许你将无法修改其源码的组件集成到你的应用程序中。当你使用第三方框架或消费另一个项目的输出时，这是一个常见问题。\
    \ |\n| 何时应该使用此模式？ | 当你需要集成一个提供与应用程序中其他组件类似功能，但使用不兼容 API 的组件时，请使用此模式。 |\n| 何时应该避免此模式？\
    \ | 当你能够修改要集成的组件源代码时，或者当可以将其提供的数据直接迁移到你的应用程序时，请不要使用此模式。 |\n| 如何知道是否正确实现了该模式？ |\
    \ 当适配器允许在不修改应用程序或组件的情况下将该组件集成到应用程序中时，该模式就被正确实现了。 |\n| 是否有常见的陷阱？ | 唯一的陷阱是，若试图扩展该模式，强行集成一个未能提供适配目标\
    \ API 所期望功能的组件。 |\n| 是否有相关的模式？ | 许多结构型模式具有相似的实现但意图不同。请确保你从我本书本部分描述的模式中选择了正确的模式。\
    \ |\n\n### 准备示例项目\n\n针对本章，我创建了一个名为 `Adapter` 的新 OS X 命令行工具项目。我向该项目添加了一个名为 `Employees.swift`\
    \ 的新文件，并使用它来定义代码清单 12-1 中所示的类型。\n\n**代码清单 12-1.** `Employees.swift` 文件的内容\n\n\
    ```swift\nstruct Employee {\n    var name:String;\n    var title:String;\n}\n\n\
    protocol EmployeeDataSource {\n    var employees:[Employee] { get };\n    func\
    \ searchByName(name:String) -> [Employee];\n    func searchByTitle(title:String)\
    \ -> [Employee];\n}\n```\n\n本章的示例将是一个简单的员工目录，`Employee` 结构体将用于表示单个员工。提供员工数据的类需要实现\
    \ `EmployeeDataSource` 协议。\n\n#### 创建数据源\n\n我向项目添加了一个名为 `DataSources.swift` 的文件，并使用它来定义代码清单\
    \ 12-2 中所示的类。\n\n**代码清单 12-2.** `DataSources.swift` 文件的内容\n\n```swift\nimport\
    \ Foundation\n\nclass DataSourceBase : EmployeeDataSource {\n    var employees\
    \ = [Employee]();\n\n    func searchByName(name: String) -> [Employee] {\n   \
    \     return search({e -> Bool in\n            return e.name.rangeOfString(name)\
    \ != nil;\n        });\n    }\n\n    func searchByTitle(title: String) -> [Employee]\
    \ {\n        return search({e -> Bool in\n            return e.title.rangeOfString(title)\
    \ != nil;\n        })\n    }\n\n    private func search(selector:(Employee ->\
    \ Bool)) -> [Employee] {\n        var results = [Employee]();\n        for e in\
    \ employees {\n            if (selector(e)) {\n                results.append(e);\n\
    \            }\n        }\n        return results;\n    }\n}\n\nclass SalesDataSource\
    \ : DataSourceBase {\n    override init() {\n        super.init();\n        employees.append(Employee(name:\
    \ \"Alice\", title: \"VP of Sales\"));\n        employees.append(Employee(name:\
    \ \"Bob\", title: \"Account Exec\"));\n    }\n}\n\nclass DevelopmentDataSource\
    \ : DataSourceBase {\n    override init() {\n        super.init();\n        employees.append(Employee(name:\
    \ \"Joe\", title: \"VP of Development\"));\n        employees.append(Employee(name:\
    \ \"Pepe\", title: \"Developer\"));\n    }\n}\n```\n\n`DataSourceBase` 类遵循 `EmployeeDataSource`\
    \ 协议，并提供了数据源功能的实现，我可以轻松地派生该类以向应用程序添加新数据。我创建了两个数据源类——`SalesDataSource` 和 `DevelopmentDataSource`——它们为两个部门提供员工信息。\n"
- fmt: "### Defining the Application\n\nTo consume the data sources, I added a file\
    \ to the project called `EmployeeSearch.swift` and used it to define the class\
    \ shown in Listing 12-3.\n\n**Listing 12-3.** The Contents of the `EmployeeSearch.swift`\
    \ File\n\n```\nclass SearchTool {\n    enum SearchType {\n        case NAME; case\
    \ TITLE;\n    }\n    private let sources:[EmployeeDataSource];\n    init(dataSources:\
    \ EmployeeDataSource...) {\n        self.sources = dataSources;\n    }\n    var\
    \ employees:[Employee] {\n        var results = [Employee]();\n        for source\
    \ in sources {\n            results += source.employees;\n        }\n        return\
    \ results;\n    }\n    func search(text:String, type:SearchType) -> [Employee]\
    \ {\n        var results = [Employee]();\n        for source in sources {\n  \
    \          results += type == SearchType.NAME ? source.searchByName(text)\n  \
    \              : source.searchByTitle(text);\n        }\n        return results;\n\
    \    }\n}\n```\n\nThe `SearchTool` class operates on a collection of data sources\
    \ and consolidates their contents and search capabilities to provide uniform access\
    \ to the employee data. Listing 12-4 shows the code I added to the `main.swift`\
    \ file to test the functionality.\n\n**Listing 12-4.** Testing the Example App\
    \ in the `main.swift` File\n\n```\nlet search = SearchTool(dataSources: SalesDataSource(),\
    \ DevelopmentDataSource());\nprintln(\"--List--\");\nfor e in search.employees\
    \ {\n    println(\"Name: \\(e.name)\");\n}\nprintln(\"--Search--\");\nfor e in\
    \ search.search(\"VP\", type: SearchTool.SearchType.TITLE) {\n    println(\"Name:\
    \ \\(e.name), Title: \\(e.title)\");\n}\n```\n\nRunning the application produces\
    \ the following output in the debug console:\n\n```\n--List--\nName: Alice\nName:\
    \ Bob\nName: Joe\nName: Pepe\n--Search--\nName: Alice, Title: VP of Sales\nName:\
    \ Joe, Title: VP of Development\n```\n\n## Understanding the Problem That the\
    \ Pattern Solves\n\nThe problem that the adapter pattern solves arises when an\
    \ existing system needs to integrate a new component that has a similar function\
    \ but that doesn’t present a common interface and that cannot be modified.\n\n\
    The example application represents the existing system—an employee directory that\
    \ relies on classes that conform to the `EmployeeDataSource` protocol to provide\
    \ it with search functionality. The problems start when a new source of data needs\
    \ to be integrated into the directory that doesn’t conform to the protocol.\n\n\
    There are lots of reasons why incompatible code will be introduced into an application.\
    \ In the case of an employee directory, an acquisition or merger may require integration\
    \ of another company’s systems. On a smaller scale, incompatible code can be introduced\
    \ into a project when a third-party component is used or when you depend on the\
    \ code produced by another development team working on a related project.\n\n\
    To illustrate the problem, imagine that my example company acquires a rival and\
    \ wants to extend the directory to include the staff of the new company. The good\
    \ news is that the new company already has a solid employee directory, but the\
    \ bad news is that it doesn’t use the types needed by the parent company. To represent\
    \ this problem, I added a file to the project called `NewCo.swift` and used it\
    \ to define the simple directory types shown in Listing 12-5.\n\n**Listing 12-5.** The\
    \ Contents of the `NewCo.swift` File\n\n```\nclass NewCoStaffMember {\n    private\
    \ var name:String;\n    private var role:String;\n    init(name:String, role:String)\
    \ {\n        self.name = name; self.role = role;\n    }\n    func getName() ->\
    \ String {\n        return name;\n    }\n    func getJob() -> String {\n     \
    \   return role;\n    }\n}\nclass NewCoDirectory {\n    private var staff:[String:\
    \ NewCoStaffMember];\n    init() {\n        staff = [\"Hans\": NewCoStaffMember(name:\
    \ \"Hans\", role: \"Corp Counsel\"),\n            \"Greta\": NewCoStaffMember(name:\
    \ \"Greta\", role: \"VP, Legal\")];\n    }\n    func getStaff() -> [String: NewCoStaffMember]\
    \ {\n        return staff;\n    }\n}\n```\n\nThe `NewCoDirectory` class provides\
    \ a dictionary of `NewCoStaffMember` objects that are keyed on the employee’s\
    \ name. There is no search capability and no common types with the directory I\
    \ created at the start of the chapter. The problem I face is integrating the `NewCoDirectory`\
    \ class into the existing staff directory.\n\n**WHY NOT JUST CHANGE THE CODE?**\n\
    \nI could solve this problem just by revising the `NewCoDirectory` class, but\
    \ that isn’t always possible in the real world, which is why the adapter pattern\
    \ is so useful. The main reason that code cannot be modified is when a component\
    \ is purchased from a third party, in which case you won’t even see the source\
    \ code, just the API it produces. The component developers are unlikely to adopt\
    \ your private API when you are one customer out of the thousands they sell to.\n\
    \nYou will also encounter code that cannot be changed when working in a large\
    \ company. Common causes include dealing with legacy products (“We don’t know\
    \ how it works, and we are afraid to touch it”), dealing with projects that are\
    \ under-resourced (“We’ll have time to implement your API in about 2 years”),\
    \ and dealing with politics (“You should implement my API instead”).\n\nWhatever\
    \ the reason, the result is the same: an API that provides the functionality you\
    \ require but not in a way you want. For the purposes of this chapter, imagine\
    \ that I don’t have the source code to the `NewCoDirectory` class—perhaps because\
    \ it is an off-the-shelf product—and that I need to find a way to integrate the\
    \ employee data it provides without being able to make any changes.\n\nI could\
    \ solve this problem by modifying the `SearchTool` application so that it knows\
    \ how to query the new data source. This means I have to repeat that modification\
    \ process for each component that I integrate and perform the modification for\
    \ every part of the application that needs to query the data sources. The result\
    \ is a complex set of changes required each time a new data source is added or\
    \ an existing one is changed—and this, of course, is what design patterns are\
    \ intended to avoid.\n\n## Understanding the Adapter Pattern\n\nThe adapter pattern\
    \ allows two incompatible classes to work together by adapting the API that one\
    \ of them presents via mapping the API expected by the application to the API\
    \ provided by the component, as shown in Figure 12-1. In the case of the example\
    \ application, I need to adapt the API defined by the `NewCoDirectory` class so\
    \ that the `SearchTool` class can use it.\n\n![A978-1-4842-0394-1_12_Fig1_HTML.jpg](A978-1-4842-0394-1_12_Fig1_HTML.jpg)\n\
    \n**Figure 12-1.** The adapter pattern\n\nThere are five operations in the adapter\
    \ pattern. The first operation is a request from the application to the adapter\
    \ using the API it expects to work with. In the second operation, the adapter\
    \ uses its knowledge of both APIs to select a component method or property that\
    \ can be used to handle the request.\n\nIn the third operation, the component\
    \ receives the request from the adapter, does its work, and returns its result\
    \ to the adapter.\n\nFor the fourth operation, the adapter uses its knowledge\
    \ of both APIs to translate the result provided by the client into a result that\
    \ the application is expecting and, in the final operation, returns the result.\n\
    \nThe application and the component are unaware of each other. The adapter presents\
    \ the application with an API it knows about and hides the details of how that\
    \ API is mapped to the one provided by the component."
