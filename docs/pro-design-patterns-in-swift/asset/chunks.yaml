    \ {\n                parts.removeAtIndex(index);\n                break;\n   \
    \         }\n        }\n    }\n}\n...\n```\n\n这些更改非常简单。我将常量 `CarPart` 数组重新定义为变量，并添加了\
    \ `addPart` 和 `removePart` 方法。然而，这些更改意味着，修改数据结构的组件需要知道 `CompositePart` 类定义了 `addPart`\
    \ 和 `removePart` 方法，并且需要理解 `CompositePart` 和 `Part` 类之间的区别，才能添加和删除部件。\n\n清单 15-7\
    \ 中的更改削弱了组合模式的优势。解决此问题的一个常见尝试是将这些方法包含在协议中，以统一叶节点和组合对象实现的 API，如清单 15-8 所示。\n\n\
    **清单 15-8.** 尝试在 `CarParts.swift` 文件中统一 API\n\n```\nprotocol CarPart {\n    var\
