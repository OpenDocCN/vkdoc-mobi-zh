    `&& storedPeer.otherPlaneDidChangePosition(pos)) {`


    `result = true;`


    `}`


    `}`


    `});`


    `return result;`


    `}`


    `...`


    I use the `filter` method to eliminate those planes that are farther away and
    then invoke the `otherPlaneDidChangePosition` method on the remaining objects.
    Running the application produces the following output, which is the same as previous
    examples:


    `BA706: Position changed`


    `BA706: Position changed`


    `BA706: Position changed`


    `BA706: Landed`


    `CX200: Too close! Abort!`


    The benefit of this variation is that I make fewer calls to peer objects, and
    in doing so, I hope to speed up the process of changing the position of an airplane.
    The drawback of this approach is that I have now codified a behavior into the
    mediator that will need to be changed if the application is extended to include
    planes that are departing from the airport and not just those that are arriving.


    ### Generalizing the Mediator-Peer Relationship


    The standard implementation of the mediator pattern means that the mediator has
    some knowledge into the methods defined by the peers in order that it can call
    those methods as needed. This makes it difficult to reuse a mediator class for
    a different set of peers.


    If you expect to need multiple mediators in an application, a common variation
    is to generalize the implementation of the pattern and create a mediator class
    that doesn’t require any knowledge of the peers it is used with. There are two
    broad approaches to addressing this problem, although, as I explain in the following
    sections, both have their limitations.'
  trans: "\n#### 在调解器中实现并发保护\n\n调解器中的并发保护确保对同伴集合的操作不会导致数据损坏，并且调解器方法返回的结果保持一致。代码清单\
    \ 21-8 展示了如何使用 Grand Central Dispatch (GCD) 来保护调解器类。\n\n**代码清单 21-8. 在 Mediator.swift\
    \ 文件中实现并发保护**\n\n```\nimport Foundation;\n\nprotocol Peer {\n\nvar name:String\
    \ {get};\n\nfunc otherPlaneDidChangePosition(position:Position) -> Bool;\n\n}\n\
    \nprotocol Mediator {\n\nfunc registerPeer(peer:Peer);\n\nfunc unregisterPeer(peer:Peer);\n\
    \nfunc changePosition(peer:Peer, pos:Position) -> Bool;\n\n}\n\nclass AirplaneMediator\
    \ : Mediator {\n\nprivate var peers:[String:Peer];\n\nprivate let queue = dispatch_queue_create(\"\
    dictQ\", DISPATCH_QUEUE_CONCURRENT);\n\ninit() {\n\npeers = [String:Peer]();\n\
    \n}\n\nfunc registerPeer(peer: Peer) {\n\ndispatch_barrier_sync(self.queue, {\
    \ () in\n\nself.peers[peer.name] = peer;\n\n});\n\n}\n\nfunc unregisterPeer(peer:\
    \ Peer) {\n\ndispatch_barrier_sync(self.queue, { () in\n\nlet removed = self.peers.removeValueForKey(peer.name);\n\
    \n});\n\n}\n\nfunc changePosition(peer:Peer, pos:Position) -> Bool {\n\nvar result\
    \ = false;\n\ndispatch_sync(self.queue, { () in\n\nfor storedPeer in self.peers.values\
    \ {\n\nif (peer.name != storedPeer.name\n\n&& storedPeer.otherPlaneDidChangePosition(pos))\
    \ {\n\nresult = true;\n\n}\n\n}\n\n});\n\nreturn result;\n\n}\n\n}\n```\n\n我希望在不对\
    \ `peers` 字典进行修改时，允许多个操作同时读取其中的数据。为此，我使用了一个并发 GCD 队列：对于读取操作，调用 `dispatch_sync`\
    \ 函数；在 `registerPeer` 和 `unregisterPeer` 方法中，则调用 `dispatch_barrier_sync` 函数，以获得对字典进行修改的独占访问权限。\n\
    \n> **提示**  \n> 请注意，在 `unregisterPeer` 方法的实现中，我将 `removeValueForKey` 方法的调用结果赋值给了一个常量。Swift\
    \ 会试图提供帮助，它将字典方法调用的返回结果视为闭包的返回结果——但这是一个问题，因为用作 GCD 块的闭包不能返回结果。将结果赋值给一个常量可以捕获该值，并防止它被当作闭包的返回结果。\n\
    \n#### 在同伴中实现并发保护\n\n我为调解器添加的并发保护并未对同伴对象的实现作出任何假设，并允许多个同时调用 `otherPlanDidChangePosition`\
    \ 方法。这意味着我需要修改 `Airplane` 类，以保护其内部状态数据的完整性，如代码清单 21-9 所示。\n\n**代码清单 21-9. 在 Airplane.swift\
    \ 文件中添加并发保护**\n\n```\nimport Foundation\n\nstruct Position {\n\nvar distanceFromRunway:Int;\n\
    \nvar height:Int;\n\n}\n\nclass Airplane : Peer {\n\nvar name:String;\n\nvar currentPosition:Position;\n\
    \nvar mediator:Mediator;\n\nlet queue = dispatch_queue_create(\"posQ\", DISPATCH_QUEUE_CONCURRENT);\n\
    \ninit(name:String, initialPos:Position, mediator: Mediator) {\n\nself.name =\
    \ name;\n\nself.currentPosition = initialPos;\n\nself.mediator = mediator;\n\n\
    mediator.registerPeer(self);\n\n}\n\nfunc otherPlaneDidChangePosition(position:Position)\
    \ -> Bool {\n\nvar result = false;\n\ndispatch_sync(self.queue, {() in\n\nresult\
    \ = position.distanceFromRunway\n\n== self.currentPosition.distanceFromRunway\n\
    \n&& abs(position.height - self.currentPosition.height) < 1000;\n\n});\n\nreturn\
    \ result;\n\n}\n\nfunc changePosition(newPosition:Position) {\n\ndispatch_barrier_sync(self.queue,\
    \ {() in\n\nself.currentPosition = newPosition;\n\nif (self.mediator.changePosition(self,\
    \ pos:\n\nself.currentPosition) == true) {\n\nprintln(\"\\(self.name): Too close!\
    \ Abort!\");\n\nreturn;\n\n}\n\nprintln(\"\\(self.name): Position changed\");\n\
    \n});\n\n}\n\nfunc land() {\n\ndispatch_barrier_sync(self.queue, { () in\n\nself.currentPosition\
    \ = Position(distanceFromRunway: 0, height: 0);\n\nself.mediator.unregisterPeer(self);\n\
    \nprintln(\"\\(self.name): Landed\");\n\n});\n\n}\n\n}\n```\n\n我为该类添加的并发保护允许多个同时调用\
    \ `otherPlaneDidChangePosition` 方法，但对 `changePosition` 和 `land` 方法的调用则使用屏障，以确保它们拥有进行修改的独占访问权限。\n\
    \n## 调解器模式的变体\n\n调解器模式的标准实现侧重于管理与同伴的关系，但常见的变体扩展了调解器的角色，如下所述。\n\n### 将更多逻辑放入调解器\n\
    \n第一种变体是将逻辑添加到调解器实现类中，以更积极地管理同伴之间的消息流，或提供额外的功能。为了演示这种变体，我将在调解器的 `changePosition`\
    \ 方法中添加一些基本逻辑，用于过滤掉那些比要改变位置的飞机距离机场更远的同伴对象（前提是所有飞机都试图降落并朝同一方向移动）。第一步是扩展 `Peer`\
    \ 协议所暴露的信息，使调解器能够访问其位置数据，如代码清单 21-10 所示。\n\n**代码清单 21-10. 在 Mediator.swift 文件中暴露额外信息**\n\
    \n```\n...\n\nprotocol Peer {\n\nvar name:String {get};\n\nvar currentPosition:Position\
    \ {get};\n\nfunc otherPlaneDidChangePosition(position:Position) -> Bool;\n\n}\n\
    \n...\n```\n\n暴露 `currentPosition` 属性使得调解器可以更有选择性地调用同伴的方法，如代码清单 21-11 所示。\n\n\
    **代码清单 21-11. 在 Mediator.swift 文件中选择性定位同伴**\n\n```\n...\n\nfunc changePosition(peer:Peer,\
    \ pos:Position) -> Bool {\n\nvar result = false;\n\ndispatch_sync(self.queue,\
    \ { () in\n\nlet closerPeers = self.peers.values.filter({p in\n\nreturn p.currentPosition.distanceFromRunway\n\
    \n<= pos.distanceFromRunway;\n\n});\n\nfor storedPeer in closerPeers {\n\nif (peer.name\
    \ != storedPeer.name\n\n&& storedPeer.otherPlaneDidChangePosition(pos)) {\n\n\
    result = true;\n\n}\n\n}\n\n});\n\nreturn result;\n\n}\n\n...\n```\n\n我使用 `filter`\
    \ 方法剔除那些距离较远的飞机，然后对剩余的对象调用 `otherPlaneDidChangePosition` 方法。运行应用程序会产生以下输出，与之前的示例相同：\n\
    \n```\nBA706: Position changed\nBA706: Position changed\nBA706: Position changed\n\
    BA706: Landed\nCX200: Too close! Abort!\n```\n\n这种变体的好处是减少了对同伴对象的调用次数，从而希望加快飞机改变位置的过程。这种方法的缺点在于，我现在将一种行为固化到了调解器中，如果应用程序扩展到包含从机场起飞的飞机（而不仅仅是降落的飞机），则需要更改该行为。\n\
    \n### 泛化调解器-同伴关系\n\n调解器模式的标准实现意味着调解器需要了解同伴定义的方法，以便在需要时调用这些方法。这使得将调解器类重用于不同的同伴集变得困难。\n\
    \n如果你预计在应用程序中需要多个调解器，一种常见的变体是泛化模式的实现，创建一个不要求了解其使用同伴的任何信息的调解器类。解决这个问题有两种主要方法，不过，如下所述，它们都有各自的局限性。\n"
- fmt: "## 用命令模式泛化中介者\n\n一种方法是将中介者模式与命令模式结合，让中介者扮演我在[第20章](#A978-1-4842-0394-1_20_Chapter.html)中描述的调用者角色。代码清单21-12展示了如何在`CommandMediator.swift`文件中定义一个泛化的基于命令的中介者类，我已将其添加到示例项目中。\n\
    \n**代码清单21-12. 在`CommandMediator.swift`文件中定义泛化中介者类**\n\n```swift\nprotocol CommandPeer\
    \ {\n    var name:String { get };\n}\n\nclass Command {\n    let function:CommandPeer\
    \ -> Any;\n    init(function:CommandPeer -> Any) {\n        self.function = function;\n\
    \    }\n    func execute(peer:CommandPeer) -> Any {\n        return function(peer);\n\
    \    }\n}\n\nclass CommandMediator {\n    private var peers = [String:CommandPeer]();\n\
    \    func registerPeer(peer:CommandPeer) {\n        peers[peer.name] = peer;\n\
    \    }\n    func unregisterPeer(peer:CommandPeer) {\n        peers.removeValueForKey(peer.name);\n\
    \    }\n    func dispatchCommand(caller:CommandPeer, command:Command) -> [Any]\
    \ {\n        var results = [Any]();\n        for peer in peers.values {\n    \
    \        if (peer.name != caller.name) {\n                results.append(command.execute(peer));\n\
    \            }\n        }\n        return results;\n    }\n}\n```\n\n`Peer`必须遵循`CommandPeer`协议，这既是为了辅助`Command`类的实现，也是为了能够使用`name`属性防止中介者在创建它的对象上执行命令。\n\
    \n> **注意**\n> \n> 为简单起见，我实现的`CommandMediator`类没有包含并发保护。使用命令模式并不能保护`peers`集合，如果可能发生并发使用，你应该对所有中介者应用保护。详情请参阅“实现并发保护”一节。\n\
    \n`Command`类表示每个`Peer`将被要求执行的命令。如你在[第20章](#A978-1-4842-0394-1_20_Chapter.html)中所见，有不同方式来安排命令的定义和执行。我选择的这种方式意味着中介者将调用该命令，将每个`Peer`传递给`Command`对象的`execute`方法。我这样做是因为我想捕获执行命令的结果值，并将这些结果的数组呈现给调用方`Peer`。\n\
    \n`CommandMediator`类是我在标准模式实现中所用中介者的变体，它提供了一个`dispatchCommand`方法，该方法接受一个`Command`对象，并将每个`CommandPeer`传递给它对应的函数。在每个`Peer`上执行命令的结果被收集到一个数组中，并作为结果返回给调用方`Peer`。\n\
    \n代码清单21-13展示了如何更新`Airplane`类以使用基于命令的中介者。\n\n**代码清单21-13. 在`Airplane.swift`文件中使用`CommandMediator`**\n\
    \n```swift\nimport Foundation\n\nstruct Position {\n    var distanceFromRunway:Int;\n\
    \    var height:Int;\n}\n\nclass Airplane : CommandPeer {\n    var name:String;\n\
    \    var currentPosition:Position;\n    var mediator:CommandMediator;\n    let\
    \ queue = dispatch_queue_create(\"posQ\", DISPATCH_QUEUE_CONCURRENT);\n\n    init(name:String,\
    \ initialPos:Position, mediator: CommandMediator) {\n        self.name = name;\n\
    \        self.currentPosition = initialPos;\n        self.mediator = mediator;\n\
    \        mediator.registerPeer(self);\n    }\n\n    func otherPlaneDidChangePosition(position:Position)\
    \ -> Bool {\n        var result = false;\n        dispatch_sync(self.queue, {()\
    \ in\n            result = position.distanceFromRunway\n                == self.currentPosition.distanceFromRunway\n\
    \                && abs(position.height - self.currentPosition.height) < 1000;\n\
    \        });\n        return result;\n    }\n\n    func changePosition(newPosition:Position)\
    \ {\n        dispatch_barrier_sync(self.queue, {() in\n            self.currentPosition\
    \ = newPosition;\n            let c = Command(function: {peer in\n           \
    \     if let plane = peer as? Airplane {\n                    return plane.otherPlaneDidChangePosition\
    \ (self.currentPosition);\n                } else {\n                    fatalError(\"\
    Type mismatch\");\n                }\n            });\n            let allResults\
    \ = self.mediator.dispatchCommand(self, command: c);\n            for result in\
    \ allResults {\n                if result as? Bool == true {\n               \
    \     println(\"\\(self.name): Too close! Abort!\");\n                    return;\n\
    \                }\n            }\n            println(\"\\(self.name): Position\
    \ changed\");\n        });\n    }\n\n    func land() {\n        dispatch_barrier_sync(self.queue,\
    \ { () in\n            self.currentPosition = Position(distanceFromRunway: 0,\
    \ height: 0);\n            self.mediator.unregisterPeer(self);\n            println(\"\
    \\(self.name): Landed\");\n        });\n    }\n}\n```\n\n这种方法创建了一个中介者，它可以处理任何实例化自遵循`CommandPeer`协议的类的对象组，但需要谨慎，因为`Peer`创建的`Command`对象必须假设命令将对其执行的`Peer`类型。由于任何`Peer`都可以发送命令，这意味着所有`Peer`必须派生自同一个基类，并且你不能使用`CommandMediator`类来调解不同类型的对象，即使它们都是实例化自遵循`CommandPeer`协议的类。\n\
    \n`Airplane`类中`changePosition`方法的实现创建了一个命令，该命令将`Peer`对象转换为`Airplane`类型并调用`otherPlaneDidChangePosition`方法。如果`Peer`无法转换为`Airplane`，我会调用全局的`fatalError`函数，因为在这种情况下中介者的行为是未定义的。\n\
    \n最后的更改在`main.swift`文件中，我必须创建一个`CommandMediator`类的实例，如代码清单21-14所示。\n\n**代码清单21-14. 在`main.swift`文件中使用`CommandMediator`类**\n\
    \n```swift\nlet mediator = CommandMediator();\n\n// initial setup\nlet british\
    \ = Airplane(name: \"BA706\", initialPos:\n    Position(distanceFromRunway: 11,\
    \ height: 21000), mediator:mediator);\n\n// new plane arrives\nlet american =\
    \ Airplane(name: \"AA101\", initialPos:\n    Position(distanceFromRunway: 12,\
    \ height: 22000), mediator:mediator);\n\n// plane approaches airport\nbritish.changePosition(Position(distanceFromRunway:\
    \ 8, height: 10000));\nbritish.changePosition(Position(distanceFromRunway: 2,\
    \ height: 5000));\nbritish.changePosition(Position(distanceFromRunway: 1, height:\
    \ 1000));\n\n// new plane arrives\nlet cathay = Airplane(name: \"CX200\", initialPos:\n\
    \    Position(distanceFromRunway: 13, height: 22000), mediator:mediator);\n\n\
    // plane lands\nbritish.land();\n\n// plane moves too close\ncathay.changePosition(Position(distanceFromRunway:\
    \ 12, height: 22000));\n```\n\n你可以运行应用程序以测试更改是否影响输出，输出如下：\n\n```\nBA706: Position\
    \ changed\nBA706: Position changed\nBA706: Position changed\nBA706: Landed\nCX200:\
    \ Too close! Abort!\n```"
  raw: '#### Generalizing the Mediator with the Command Pattern


    One approach is to combine the mediator pattern with the command pattern and have
    the mediator play the role of the invoker I described in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html).
    Listing 21-12 shows how I have defined a generalized command-based mediator class
    in a file called `CommandMediator.swift` that I added to the example project.


    Listing 21-12. Defining a Generalized Mediator Class in the CommandMediator.swift
    File


    `protocol CommandPeer {`


    `var name:String { get };`


    `}`


    `class Command {`


    `let function:CommandPeer -> Any;`


    `init(function:CommandPeer -> Any) {`


    `self.function = function;`


    `}`


    `func execute(peer:CommandPeer) -> Any {`


    `return function(peer);`


    `}`


    `}`


    `class CommandMediator {`


    `private var peers = [String:CommandPeer]();`


    `func registerPeer(peer:CommandPeer) {`


    `peers[peer.name] = peer;`


    `}`


    `func unregisterPeer(peer:CommandPeer) {`


    `peers.removeValueForKey(peer.name);`


    `}`


    `func dispatchCommand(caller:CommandPeer, command:Command) -> [Any] {`


    `var results = [Any]();`


    `for peer in peers.values {`


    `if (peer.name != caller.name) {`


    `results.append(command.execute(peer));`


    `}`


    `}`


    `return results;`


    `}`


    `}`


    Peers must conform to the `CommandPeer` protocol, in part to aid the implementation
    of the `Command` class and in part so that I can use the `name` property to prevent
    the mediator from executing a command on the object that created it.


    Caution


    For simplicity I have implemented the `CommandMediator` class without concurrency
    protections. Using the command pattern doesn’t protect the collection of peers,
    and you should apply protections to all mediators if concurrent use is possible.
    See the “Implementing Concurrency Protections” section for details.


    The `Command` class represents the command that each peer will be asked to execute.
    As you saw in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html), there are different
    ways to arrange the definition and execution of a command, and the one that I
    have chosen to use means that the mediator will invoke the command, passing each
    peer into the `execute` method of the `Command` object. I have done this because
    I want to capture a result value from executing the command and present an array
    of those results to the calling peer.


    The `CommandMediator` class is a variation of the mediator I used in the standard
    implementation of the pattern that presents a `dispatchCommand` method that accepts
    a `Command` object and passes each `CommandPeer` to its function. The results
    from executing the command on each peer are collected into an array and returned
    as the result to the calling peer.


    Listing 21-13 shows how I updated the `Airplane` class to use the command-based
    mediator.


    Listing 21-13. Using the CommandMediator in the Airplane.swift File


    `import Foundation`


    `struct Position {`


    `var distanceFromRunway:Int;`


    `var height:Int;`


    `}`


    `class Airplane : CommandPeer {`


    `var name:String;`


    `var currentPosition:Position;`


    `var mediator:CommandMediator;`


    `let queue = dispatch_queue_create("posQ", DISPATCH_QUEUE_CONCURRENT);`


    `init(name:String, initialPos:Position, mediator: CommandMediator) {`


    `self.name = name;`


    `self.currentPosition = initialPos;`


    `self.mediator = mediator;`


    `mediator.registerPeer(self);`


    `}`


    `func otherPlaneDidChangePosition(position:Position) -> Bool {`


    `var result = false;`


    `dispatch_sync(self.queue, {() in`


    `result = position.distanceFromRunway`


    `== self.currentPosition.distanceFromRunway`


    `&& abs(position.height - self.currentPosition.height) < 1000;`


    `});`


    `return result;`


    `}`


    `func changePosition(newPosition:Position) {`


    `dispatch_barrier_sync(self.queue, {() in`


    `self.currentPosition = newPosition;`


    `let c = Command(function: {peer in`


    `if let plane = peer as? Airplane {`


    `return plane.otherPlaneDidChangePosition (self.currentPosition);`


    `} else {`


    `fatalError("Type mismatch");`


    `}`


    `});`


    `let allResults = self.mediator.dispatchCommand(self, command: c);`


    `for result in allResults {`


    `if result as? Bool == true {`


    `println("\(self.name): Too close! Abort!");`


    `return;`


    `}`


    `}`


    `println("\(self.name): Position changed");`


    `});`


    `}`


    `func land() {`


    `dispatch_barrier_sync(self.queue, { () in`


    `self.currentPosition = Position(distanceFromRunway: 0, height: 0);`


    `self.mediator.unregisterPeer(self);`


    `println("\(self.name): Landed");`


    `});`


    `}`


    `}`


    This approach creates a mediator that can handle any group of objects instantiated
    from a class that conforms to the `CommandPeer` protocol, but some caution is
    required because the `Command` objects that a peer creates have to make an assumption
    about the type of the peers against which the command will be executed. Since
    any peer can send a command, this means that all peers have to be derived from
    the same base class and that you cannot use the `CommandMediator` class to mediate
    between objects of differing types, even if they are all instantiated from classes
    that conform to the `CommandPeer` protocol.


    The implementation of the `changePosition` method in the `Airplane` class creates
    a command that casts peer objects to the `Airplane` type and calls the `otherPlaneDidChangePosition`
    method. I call the global `fatalError` function if the peer cannot be cast as
    an `Airplane` because the behavior of a mediator in this situation is undefined.


    The final change is to the `main.swift` file, in which I must create an instance
    of the `CommandMediator` class, as shown in Listing 21-14.


    Listing 21-14. Using the CommandMediator Class in the main.swift File


    `let mediator = CommandMediator();`


    `// initial setup`


    `let british = Airplane(name: "BA706", initialPos:`


    `Position(distanceFromRunway: 11, height: 21000), mediator:mediator);`


    `// new plane arrives`


    `let american = Airplane(name: "AA101", initialPos:`


    `Position(distanceFromRunway: 12, height: 22000), mediator:mediator);`


    `// plane approaches airport`


    `british.changePosition(Position(distanceFromRunway: 8, height: 10000));`


    `british.changePosition(Position(distanceFromRunway: 2, height: 5000));`


    `british.changePosition(Position(distanceFromRunway: 1, height: 1000));`


    `// new plane arrives`


    `let cathay = Airplane(name: "CX200", initialPos:`


    `Position(distanceFromRunway: 13, height: 22000), mediator:mediator);`


    `// plane lands`


    `british.land();`


    `// plane moves too close`


    `cathay.changePosition(Position(distanceFromRunway: 12, height: 22000));`


    You can run the application to test that the changes don’t affect the output,
    which is as follows:


    `BA706: Position changed`


    `BA706: Position changed`


    `BA706: Position changed`


    `BA706: Landed`


    `CX200: Too close! Abort!`'
  trans: "\n## 用命令模式泛化中介者\n\n一种方法是将中介者模式与命令模式结合，让中介者扮演我在第 20 章中描述的调用者角色。代码清单 21-12\
    \ 展示了如何在`CommandMediator.swift`文件中定义一个泛化的基于命令的**中介者**类，我已将其添加到示例项目中。\n\n**代码清单\
