    \ Double, Int)) -> Double {`\n\n`return product.1 * 0.2;`\n\n`}`\n\n`func calculateStockValue(tuples:[(String,\
    \ Double, Int)]) -> Double {`\n\n`return tuples.reduce(0, {(total, product) ->\
    \ Double in`\n\n`return total + (product.1 * Double(product.2))`\n\n`});`\n\n\
    `}`\n\n`println(\"Sales tax for Kayak: $\\(calculateTax(products[0]))\");`\n\n\
    `println(\"Total value of stock: $\\(calculateStockValue(products))\");`\n\n##\
    \ 理解紧耦合为何会成为问题\n\n紧耦合的组件会使代码更难维护，这意味着进行修改和测试其影响需要花费更多精力。如清单 4-2 所示，一个组件的变更会要求依赖其实现的组件也随之更改。在包含大量紧耦合的应用中，这些变更会在代码中级联传导，以至于进行一个简单的修复或添加一项新功能就变成了一次实质性的大重写。\n\
    \n松耦合组件是设计模式的一个关键目标，但正如我在第 1 章中解释的，将某种模式应用于应用并不总是合理的。在某些开发场景中，紧耦合是完全合理的，要么是因为它能带来性能提升（例如实时软件），要么是因为该应用不太可能需要任何维护（因为它极为简单或生命周期很短）。在判定你预计不会维护该代码时要谨慎；很少有应用最终符合这种情况，即便这最初就是该意图。\n\
    \n我移除了描述产品的值，且突出显示的语句显示了函数中所需的相应更改。在一个真实项目中，这些更改会逐渐累积，并且如果它们影响了其他紧耦合，那么更改的数量可能导致应用中很大一部分代码被修改。这种程度的更改难以管理，并且需要彻底的测试，以确保更改已一致地应用，并且没有引入任何新错误。\n\
    \n## 理解对象模板模式\n\n对象模板模式使用一个类或结构体来定义一个模板，对象便基于此模板创建。当一个应用组件需要某个对象时，它通过指定模板名称以及运行时所需的用于配置对象的初始化数据值，来调用\
    \ Swift 运行时创建该对象。对象模板模式包含三个操作，如图 4-2 所示。\n\n![A978-1-4842-0394-1_4_Fig2_HTML.jpg](img/A978-1-4842-0394-1_4_Fig2_HTML.jpg)\n\
    \n图 4-2. 对象模板模式\n\n第一个操作是调用组件请求 Swift 运行时创建一个对象，并提供要使用的模板名称以及用于定制将要创建的对象的任何运行时数据值。\n\
    \n在第二个操作中，Swift 运行时分配存储该对象所需的内存，并使用模板创建它。模板包含初始化方法，这些方法用于通过设置对象的初始状态（通过调用组件提供的运行时值、模板中定义的值，或两者皆有）来让对象准备就绪，然后\
    \ Swift 运行时调用该初始化器以准备好对象供使用。在最后一个操作中，Swift 运行时将创建好的对象交给调用组件。这三个步骤可以反复重复，因此单个模板可用于创建多个对象。\n\
    \n### 理解类、结构体、对象和实例\n\n有些面向对象编程术语在日常开发中使用较为随意，但在理解设计模式时可能会令人困惑。此模式的关键术语是类、结构体、对象和实例。\n\
    \n类和结构体都是模板，即 Swift 遵循对象模板模式所需的设计蓝图。Swift 遵循模板中的指令来创建新对象。同一个模板可被重复用于创建多个对象。每个对象都不同，但都是使用相同的指令创建的，就像一份食谱可以制作多个蛋糕一样（添加一个\
    \ `Int`、一个修改其值的方法，等等）。\n\n实例一词与对象含义相同，但用于指代创建该对象所使用的模式的名称，因此一个 `Product` 对象也可以被称为\
    \ `Product` 类的一个实例。\n\n要点在于，类和结构体是你在开发期间编写的指令，而对象是在应用运行时创建的。例如，当你更改对象存储的值时，它并不会更改用于创建它的模板。\n\
    \n## 实现对象模板模式\n\n清单 4-3 展示了一个名为 `Product.swift` 的新文件的内容，我将其添加到了示例项目中，并用它来定义一个名为\
    \ `Product` 的类。\n\n清单 4-3. Product.swift 文件的内容\n\n```\nclass Product {\n    var\
    \ name:String;\n    var description:String;\n    var price:Double;\n    var stock:Int;\n\
    \    init(name:String, description:String, price:Double, stock:Int) {\n      \
    \  self.name = name;\n        self.description = description;\n        self.price\
    \ = price;\n        self.stock = stock;\n    }\n}\n```\n\n我在清单中创建了一个简单的类，以便尽可能贴近地复制基于元组的方法，但我稍后会为该类添加功能。清单\
    \ 4-4 展示了我是如何更新 `main.swift` 文件以使用 `Product` 类的。\n\n清单 4-4. 在 main.swift 文件中使用\
    \ Product 类\n\n```\nvar products = [\n    Product(name: \"Kayak\", description:\
    \ \"A boat for one person\",\n        price: 275, stock: 10),\n    Product(name:\
    \ \"Lifejacket\", description: \"Protective and fashionable\",\n        price:\
    \ 48.95, stock: 14),\n    Product(name: \"Soccer Ball\", description: \"FIFA-approved\
    \ size and weight\",\n        price: 19.5, stock: 32)];\n\nfunc calculateTax(product:Product)\
    \ -> Double {\n    return product.price * 0.2;\n}\n\nfunc calculateStockValue(productsArray:[Product])\
    \ -> Double {\n    return productsArray.reduce(0, {(total, product) -> Double\
    \ in\n        return total + (product.price * Double(product.stock))\n    });\n\
    }\n\nprintln(\"Sales tax for Kayak: $\\(calculateTax(products[0]))\");\nprintln(\"\
    Total value of stock: $\\(calculateStockValue(products))\");\n```\n\n与大多数模式一样，使用一个类来定义对象的模板需要一些额外工作，但它有实质性的好处；事实上，这些好处对于有效的面向对象编程是如此基本，以至于类和结构体的使用通常被视为理所当然，即便存在更快速、更直接的方法（例如元组）也是如此。\n\
    \n使用元组时，数据结构定义和一组值的设置是在一个简单步骤中完成的，而使用模板则有两步：定义模板和使用模板创建对象。\n\n## 理解该模式的优势\n\n\
    使用模板的好处是显著的，并且通常值得为定义模板付出努力，无论它是一个类还是一个结构体。元组是一个很棒的特性，但对于严肃的软件开发人员来说，类和结构体通常更可取，因为它们提供了元组无法匹敌的控制水平和松耦合特性，正如我在以下章节中解释的那样。\n"
- fmt: "### The Benefit of Decoupling\n\nI made the example in Listing 4-4 as simple\
    \ as possible. It doesn’t take advantage of the features that classes and structs\
    \ provide, but it does allow me to demonstrate that even the simplest template\
    \ reduces the impact of changes. Listing 4-5 shows how I removed the `description`\
    \ property from the `Product` class.\n\n**Listing 4-5.** Removing a Property from\
    \ the `Product` Class\n\n```\nclass Product {\n    var name:String;\n    var price:Double;\n\
    \    var stock:Int;\n    init(name:String, price:Double, stock:Int) {\n      \
    \  self.name = name;\n        self.price = price;\n        self.stock = stock;\n\
    \    }\n}\n```\n\nListing 4-6 shows the corresponding changes I made to the `main.swift`\
    \ file.\n\n**Listing 4-6.** Updating the `main.swift` File to Reflect the `Product`\
    \ Class Change\n\n```\nvar products = [\n    Product(name: \"Kayak\", price: 275,\
    \ stock: 10),\n    Product(name: \"Lifejacket\", price: 48.95, stock: 14),\n \
    \   Product(name: \"Soccer Ball\", price: 19.5, stock: 32)];\n\nfunc calculateTax(product:Product)\
    \ -> Double {\n    return product.price * 0.2;\n}\n\nfunc calculateStockValue(productsArray:[Product])\
    \ -> Double {\n    return productsArray.reduce(0, {\n        (total, product)\
    \ -> Double in\n        return total + (product.price * Double(product.stock))\n\
    \    });\n}\n\nprintln(\"Sales tax for Kayak: $\\(calculateTax(products[0]))\"\
    );\nprintln(\"Total value of stock: $\\(calculateStockValue(products))\");\n```\n\
    \nI have updated the statements that create instances of the `Product` class so\
    \ they no longer provide a value for the `description` property. The important\
    \ point to note is that the change I made to the `Product` class has no impact\
    \ on the `calculateTax` and `calculateStockValue` functions at all, and that's\
    \ because each property in the class is defined and accessed independently of\
    \ the other properties and because neither of the functions relies on the `description`\
    \ property.\n\nThe use of classes and structs limits the scope of changes to just\
    \ the code that is directly impacted by the change and prevents the widespread\
    \ change cascades that can arise when using less structured data types, such as\
    \ tuples.\n\n### The Benefit of Encapsulation\n\nThe most important benefit from\
    \ using classes or structs as templates for data objects is the support for encapsulation.\
    \ Encapsulation is one of the core ideas behind object-oriented programming, and\
    \ there are two aspects of this idea that have a bearing on this chapter.\n\n\
    The first aspect is that encapsulation allows data values and the logic that operates\
    \ on those values to be combined in a single component. Combining the data and\
    \ logic makes it easier to read the code because everything related to the data\
    \ type is defined in the same place. Listing 4-7 shows how I have updated the\
    \ `Product` class so that it includes some logic.\n\n**Listing 4-7.** Adding Logic\
    \ in the `Product.swift` File\n\n```\nclass Product {\n    var name:String;\n\
    \    var price:Double;\n    var stock:Int;\n    init(name:String, price:Double,\
    \ stock:Int) {\n        self.name = name;\n        self.price = price;\n     \
    \   self.stock = stock;\n    }\n\n    func calculateTax(rate: Double) -> Double\
    \ {\n        return self.price * rate;\n    }\n\n    var stockValue: Double {\n\
    \        get {\n            return self.price * Double(self.stock);\n        }\n\
    \    }\n}\n```\n\nI have added a `calculateTax` method, which accepts a tax rate\
    \ as an argument and uses it to calculate the sales tax, and a `stockValue` computed\
    \ property, which implements a getter clause that calculates the total value of\
    \ the stock. To reflect these changes, I updated the code statements in the `main.swift`\
    \ file that operate on `Product` objects to use the new method and property, as\
    \ shown in Listing 4-8.\n\n**Listing 4-8.** Updating the Code in the `main.swift`\
    \ File\n\n```\nvar products = [\n    Product(name: \"Kayak\", price: 275, stock:\
    \ 10),\n    Product(name: \"Lifejacket\", price: 48.95, stock: 14),\n    Product(name:\
    \ \"Soccer Ball\", price: 19.5, stock: 32)];\n\nfunc calculateStockValue(productsArray:[Product])\
    \ -> Double {\n    return productsArray.reduce(0, {(total, product) -> Double\
    \ in\n        return total + product.stockValue;\n    });\n}\n\nprintln(\"Sales\
    \ tax for Kayak: $\\(products[0].calculateTax(0.2))\");\nprintln(\"Total value\
    \ of stock: $\\(calculateStockValue(products))\");\n```\n\nThese may seem like\
    \ simple changes, but something important has happened: the `Product` class now\
    \ has a public presentation and a private implementation, as illustrated by Figure\
    \ [4-3](#A978-1-4842-0394-1_4_Chapter.html#Fig3).\n\n![A978-1-4842-0394-1_4_Fig3_HTML.jpg](A978-1-4842-0394-1_4_Fig3_HTML.jpg)\n\
    \n**Figure 4-3.** The public and private aspects of the `Product` class\n\nThe\
    \ public presentation is the API that other components can use. Any component\
    \ can get or set the values of the `name`, `price`, and `stock` properties and\
    \ use them in any way they need. The public presentation also includes the `stockValue`\
    \ property and the `calculateTax` method, but—and this is the important part—not\
    \ their implementations.\n\n**Tip:** Don't confuse the idea of a private implementation\
    \ with the use of the `private` keyword. The `private` keyword limits who can\
    \ use a class, method, or property, but even when the `private` keyword isn't\
    \ used, the implementation of methods and computed properties isn't visible to\
    \ calling components.\n\nThe ability to present a property or method without exposing\
    \ its implementation makes it easy to break tight couplings because it is impossible\
    \ for another component to depend on the implementation. As an example, Listing\
    \ 4-9 shows how I have changed the implementation of the `calculateTax` method\
    \ to define a maximum tax amount. Because the calculation is performed in the\
    \ implementation of the `Product` object, the change is invisible to other components,\
    \ which trust that the `Product` class knows how to perform its calculations.\n\
    \n**Listing 4-9.** Changing a Method Implementation in the `Product.swift` File\n\
    \n```\n...\n\nfunc calculateTax(rate: Double) -> Double {\n    return min(10,\
    \ self.price * rate);\n}\n\n...\n```\n\nI have used the `min` function from the\
    \ Swift standard library to cap the amount of sales tax at $10. I have shown only\
    \ the `calculateTax` method in Listing 4-9 because no other code statement in\
    \ the playground has to change to accommodate the new tax calculation; the change\
    \ is in the private implementation part of the `Product` class, with which other\
    \ components are unable to create dependencies. Running the application produces\
    \ the following results:\n\n```\nSales tax for Kayak: $10.0\nTotal value of stock:\
    \ $4059.3\n```"
  raw: '### The Benefit of Decoupling


    I made the example in Listing 4-4 as simple as possible. It doesn’t take advantage
    of the features that classes and structs provide, but it does allow me to demonstrate
    that even the simplest template reduces the impact of changes. Listing 4-5 shows
    how I removed the `description` property from the `Product` class.


    Listing 4-5. Removing a Property from the Product Class


    `class Product {`


    `var name:String;`


    `var price:Double;`


    `var stock:Int;`


    `init(name:String, price:Double, stock:Int) {`


    `self.name = name;`


    `self.price = price;`


    `self.stock = stock;`


    `}`


    `}`


    Listing 4-6 shows the corresponding changes I made to the `main.swift` file.


    Listing 4-6. Updating the main.swift File to Reflect the Product Class Change


    `var products = [`


    `Product(name: "Kayak", price: 275, stock: 10),`


    `Product(name: "Lifejacket", price: 48.95, stock: 14),`


    `Product(name: "Soccer Ball", price: 19.5, stock: 32)];`


    `func calculateTax(product:Product) -> Double {`


    `return product.price * 0.2;`


    `}`


    `func calculateStockValue(productsArray:[Product]) -> Double {`


    `return productsArray.reduce(0, {`


    `(total, product) -> Double in`


    `return total + (product.price * Double(product.stock))`


    `});`


    `}`


    `println("Sales tax for Kayak: $\(calculateTax(products[0]))");`


    `println("Total value of stock: $\(calculateStockValue(products))");`


    I have updated the statements that create instances of the `Product` class so
    they no longer provide a value for the `description` property. The important point
    to note is that the change I made to the `Product` class has no impact on the
    `calculateTax` and `calculateStockValue` functions at all, and that’s because
    each property in the class is defined and accessed independently of the other
    properties and because neither of the functions relies on the `description` property.


    The use of classes and structs limits the scope of changes to just the code that
    is directly impacted by the change and prevents the widespread change cascades
    that can arise when using less structured data types, such as tuples.


    ### The Benefit of Encapsulation


    The most important benefit from using classes or structs as templates for data
    objects is the support for encapsulation. Encapsulation is one of the core ideas
    behind object-oriented programming, and there are two aspects of this idea that
    have a bearing on this chapter.


    The first aspect is that encapsulation allows data values and the logic that operates
    on those values to be combined in a single component. Combining the data and logic
    makes it easier to read the code because everything related to the data type is
    defined in the same place. Listing 4-7 shows how I have updated the `Product`
    class so that it includes some logic.


    Listing 4-7. Adding Logic in the Product.swift File


    `class Product {`


    `var name:String;`


    `var price:Double;`


    `var stock:Int;`


    `init(name:String, price:Double, stock:Int) {`


    `self.name = name;`


    `self.price = price;`


    `self.stock = stock;`


    `}`


    `func calculateTax(rate: Double) -> Double {`


    `return self.price * rate;`


    `}`


    `var stockValue: Double {`


    `get {`


    `return self.price * Double(self.stock);`


    `}`


    `}`


    `}`


    I have added a `calculateTax` method, which accepts a tax rate as an argument
    and uses it to calculate the sales tax, and a `stockValue` computed property,
    which implements a getter clause that calculates the total value of the stock.
    To reflect these changes, I updated the code statements in the `main.swift` file
    that operate on `Product` objections to use the new method and property, as shown
    in Listing 4-8.


    Listing 4-8. Updating the Code in the main.swift File


    `var products = [`


    `Product(name: "Kayak", price: 275, stock: 10),`


    `Product(name: "Lifejacket", price: 48.95, stock: 14),`


    `Product(name: "Soccer Ball", price: 19.5, stock: 32)];`


    `func calculateStockValue(productsArray:[Product]) -> Double {`


    `return productsArray.reduce(0, {(total, product) -> Double in`


    `return total + product.stockValue;`


    `});`


    `}`


    `println("Sales tax for Kayak: $\(products[0].calculateTax(0.2))");`


    `println("Total value of stock: $\(calculateStockValue(products))");`


    These may seem like simple changes, but something important has happened: the
    `Product` class now has a public presentation and a private implementation, as
    illustrated by Figure [4-3](#A978-1-4842-0394-1_4_Chapter.html#Fig3).


    ![A978-1-4842-0394-1_4_Fig3_HTML.jpg](A978-1-4842-0394-1_4_Fig3_HTML.jpg)


    Figure 4-3.


    The public and private aspects of the Product class


    The public presentation is the API that other components can use. Any component
    can get or set the values of the `name`, `price`, and `stock` properties and use
    them in any way they need. The public presentation also includes the `stockValue`
    property and the `calculateTax` method, but—and this is the important part—not
    their implementations.


    Tip


    Don’t confuse the idea of a private implementation with the use of the `private`
    keyword. The `private` keyword limits who can use a class, method, or property,
    but even when the `private` keyword isn’t used, the implementation of methods
    and computed properties isn’t visible to calling components.


    The ability to present a property or method without exposing its implementation
    makes it easy to break tight couplings because it is impossible for another component
    to depend on the implementation. As an example, Listing 4-9 shows how I have changed
    the implementation of the `calculateTax` method to define a maximum tax amount.
    Because the calculation is performed in the implementation of the `Product` object,
    the change is invisible to other components, which trust that the `Product` class
    knows how to perform its calculations.


    Listing 4-9. Changing a Method Implementation in the Product.swift File


    `...`


    `func calculateTax(rate: Double) -> Double {`


    `return min(10, self.price * rate);`


    `}`


    `...`


    I have used the `min` function from the Swift standard library to cap the amount
    of sales tax at $10\. I have shown only the `calculateTax` method in Listing 4-9
    because no other code statement in the playground has to change to accommodate
    the new tax calculation; the change is in the private implementation part of the
    `Product` class, with which other components are unable to create dependencies.
    Running the application produces the following results:


    `Sales tax for Kayak: $10.0`


    `Total value of stock: $4059.3`'
  trans: "\n### 解耦的好处\n\n为了让示例尽可能简单，清单 4-4 中的例子并未充分利用类和结构体提供的全部功能，但它足以说明：即使是最简单的模板，也能减少变更带来的影响。清单\
    \ 4-5 展示了如何从 `Product` 类中移除 `description` 属性。\n\n**清单 4-5.** 从 `Product` 类中移除一个属性\n\
    \n```\nclass Product {\n    var name:String;\n    var price:Double;\n    var stock:Int;\n\
    \    init(name:String, price:Double, stock:Int) {\n        self.name = name;\n\
    \        self.price = price;\n        self.stock = stock;\n    }\n}\n```\n\n清单\
    \ 4-6 展示了我在 `main.swift` 文件中做的相应修改。\n\n**清单 4-6.** 更新 `main.swift` 文件以反映 `Product`\
    \ 类的变更\n\n```\nvar products = [\n    Product(name: \"Kayak\", price: 275, stock:\
    \ 10),\n    Product(name: \"Lifejacket\", price: 48.95, stock: 14),\n    Product(name:\
    \ \"Soccer Ball\", price: 19.5, stock: 32)];\n\nfunc calculateTax(product:Product)\
    \ -> Double {\n    return product.price * 0.2;\n}\n\nfunc calculateStockValue(productsArray:[Product])\
    \ -> Double {\n    return productsArray.reduce(0, {\n        (total, product)\
    \ -> Double in\n        return total + (product.price * Double(product.stock))\n\
    \    });\n}\n\nprintln(\"Sales tax for Kayak: $\\(calculateTax(products[0]))\"\
    );\nprintln(\"Total value of stock: $\\(calculateStockValue(products))\");\n```\n\
    \n我更新了用于创建 `Product` 类实例的语句，使其不再为 `description` 属性提供值。需要注意的重要一点是，我对 `Product`\
    \ 类所做的修改完全不影响 `calculateTax` 和 `calculateStockValue` 这两个函数，这是因为类中的每个属性都是独立于其他属性进行定义和访问的，并且这两个函数都不依赖于\
    \ `description` 属性。\n\n使用类和结构体可以将变更的影响范围限制在直接受其影响的代码内，从而避免了在使用结构较松散的数据类型（例如元组）时可能出现的、大范围的连锁变更。\n\
    \n### 封装的好处\n\n使用类或结构体作为数据对象模板最重要的好处在于它对封装的支持。封装是面向对象编程的核心思想之一，其中有两个方面与本章相关。\n\
    \n第一个方面是，封装允许将数据值以及对这些值进行操作的逻辑组合到一个单独的组件中。将数据和逻辑结合起来可以使代码更易于阅读，因为与该数据类型相关的所有内容都定义在同一个位置。清单\
    \ 4-7 展示了如何更新 `Product` 类，使其包含一些逻辑。\n\n**清单 4-7.** 在 `Product.swift` 文件中添加逻辑\n\
