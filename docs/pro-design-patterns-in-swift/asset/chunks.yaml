    `}`


    `...`


    The new method is called `countEdges`, and it totals the number of shape edges
    in the collection. Listing 25-4 shows the statements I added to the `main.swift`
    file to test the new method.


    Listing 25-4. Using the New Method in the main.swift File


    `let shapes = ShapeCollection();`


    `let area = shapes.calculateAreas();`


    `println("Area: \(area)");`


    `println("---");`


    `let edges = shapes.countEdges();`


