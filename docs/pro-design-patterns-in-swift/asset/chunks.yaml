    , to: \"alice@acme.com\",\n        subject: \"New Contracts\"),\n    Message(from:\
    \ \"pete@example.com\", to: \"all@example.com\",\n        subject: \"Priority:\
    \ All-Hands Meeting\"),\n];\n\nlet localT = LocalTransmitter();\nlet remoteT =\
    \ RemoteTransmitter();\n\nfor msg in messages {\n    if let index = find(msg.from,\
    \ \"@\") {\n        if (msg.to.hasSuffix(msg.from[Range<String.Index>(start:\n\
    \            index, end: msg.from.endIndex)])) {\n            localT.sendMessage(msg);\n\
    \        } else {\n            remoteT.sendMessage(msg);\n        }\n    } else\
    \ {\n        println(\"Error: cannot send message to \\(msg.from)\");\n    }\n\
    }\n```\n\n我定义了一个 `Message` 对象数组，并使用 `for` 循环检查每个对象，根据 `to` 和 `from` 地址是否共享相同的后缀，在\
    \ `LocalTransmitter` 对象和 `RemoteTransmitter` 对象之间进行选择。运行示例应用会得到以下结果：\n\n```\n\
    Message to joe@example.com sent locally\nMessage to alice@acme.com sent remotely\n\
    Message to all@example.com sent locally\n```\n\n## 理解模式要解决的问题\n\n示例应用中的问题在于，使用发射器类处理\
    \ `Message` 对象的组件必须了解这些类，并理解何时应该使用它们。这使得添加新的消息处理程序、更改现有处理程序之间的关系以及整体测试和维护代码变得困难。为了演示这个问题，我定义了一个新的发射器类，如清单\
    \ 19-4 所示。\n\n**清单 19-4.** 在 `Transmitters.swift` 文件中定义一个新的发射器类\n\n```\nclass\
    \ LocalTransmitter {\n    func sendMessage(message: Message) {\n        println(\"\
    Message to \\(message.to) sent locally\");\n    }\n}\n\nclass RemoteTransmitter\
    \ {\n    func sendMessage(message: Message) {\n        println(\"Message to \\\
    (message.to) sent remotely\");\n    }\n}\n\nclass PriorityTransmitter {\n    func\
    \ sendMessage(message: Message) {\n        println(\"Message to \\(message.to)\
    \ sent as priority\");\n    }\n}\n```\n\n为了正确处理 `Message` 对象，需要更新组件以反映新的 `PriorityTransmitter`\
    \ 类，并了解何时使用它。清单 19-5 展示了 `main.swift` 文件中所需的更改，但在实际项目中，这些更改会在整个应用中重复出现。\n\n**清单\
    \ 19-5.** 在 `main.swift` 文件中反映新发射器类的定义\n\n```\nlet messages = [\n    Message(from:\
    \ \"bob@example.com\", to: \"joe@example.com\",\n        subject: \"Free for lunch?\"\
    ),\n    Message(from: \"joe@example.com\", to: \"alice@acme.com\",\n        subject:\
    \ \"New Contracts\"),\n    Message(from: \"pete@example.com\", to: \"all@example.com\"\
    ,\n        subject: \"Priority: All-Hands Meeting\"),\n];\n\nlet localT = LocalTransmitter();\n\
    let remoteT = RemoteTransmitter();\nlet priorityT = PriorityTransmitter();\n\n\
    for msg in messages {\n    if (msg.subject.hasPrefix(\"Priority\")) {\n      \
    \  priorityT.sendMessage(msg);\n    } else if let index = find(msg.from, \"@\"\
    ) {\n        if (msg.to.hasSuffix(msg.from[Range<String.Index>(start:\n      \
    \      index, end: msg.from.endIndex)])) {\n            localT.sendMessage(msg);\n\
    \        } else {\n            remoteT.sendMessage(msg);\n        }\n    } else\
    \ {\n        println(\"Error: cannot send message to \\(msg.from)\");\n    }\n\
    }\n```\n\n更改本身很简单，但调用组件需要深入了解发射器类之间的关系以及何时使用它们，这本身就是一个问题。\n\n## 理解职责链模式\n\n职责链模式通过将发射器排列成一个链（这也是其名称的由来）来解决这些问题。每个发射器是链中的一个环节，能够检查\
    \ `Message` 对象以确定是否可以承担对该请求的责任。如果链中的某个环节能够处理 `Message` 请求，则进行处理。如果不能，则将请求传递给链中的下一个环节，重复此过程，直到请求被处理或到达链中的最后一个环节。图\
    \ 19-1 展示了职责链模式。\n\n![A978-1-4842-0394-1_19_Fig1_HTML.jpg](img/A978-1-4842-0394-1_19_Fig1_HTML.jpg)\n\
    \n**图 19-1.** 职责链模式\n\n调用组件只与链中的第一个环节交互，对后续环节以及每个环节如何决定是否承担请求的依据一无所知。在图中，我展示了一个包含三个环节的链，其中第二个环节承担了请求的责任。在这种情况下，链中的第三个环节不参与此过程，也不知道来自调用组件的请求。\n"
- fmt: "# Implementing the Chain of Responsibility Pattern\n\nThe implementation of\
    \ the chain of responsibility pattern relies on hiding the details of the individual\
    \ links that make up the chain from the calling components—something that is most\
    \ readily achieved by defining a protocol or a base class. I usually rely on a\
    \ base class because I like to deal with the next link in the chain using an optional\
    \ property, which cannot be assigned new values when defined by a protocol. Listing\
    \ 19-6 shows the base class I defined and applied to the transmitter classes.\n\
    \n**Listing 19-6.** Defining and Implementing a Base Class in the `Transmitters.swift`\
    \ File\n\n```\nclass Transmitter {\n    var nextLink:Transmitter?;\n    required\
    \ init() {}\n    func sendMessage(message:Message) {\n        if (nextLink !=\
    \ nil) {\n            nextLink!.sendMessage(message);\n        } else {\n    \
    \        println(\"End of chain reached. Message not sent\");\n        }\n   \
    \ }\n    private class func matchEmailSuffix(message:Message) -> Bool {\n    \
    \    if let index = find(message.from, \"@\") {\n            return message.to.hasSuffix(message.from[Range<String.Index>(start:\n\
    \                index, end: message.from.endIndex)]);\n        }\n        return\
    \ false;\n    }\n}\n\nclass LocalTransmitter : Transmitter {\n    override func\
    \ sendMessage(message: Message) {\n        if (Transmitter.matchEmailSuffix(message))\
    \ {\n            println(\"Message to \\(message.to) sent locally\");\n      \
    \  } else {\n            super.sendMessage(message);\n        }\n    }\n}\n\n\
    class RemoteTransmitter : Transmitter {\n    override func sendMessage(message:\
    \ Message) {\n        if (!Transmitter.matchEmailSuffix(message)) {\n        \
    \    println(\"Message to \\(message.to) sent remotely\");\n        } else {\n\
    \            super.sendMessage(message);\n        }\n    }\n}\n\nclass PriorityTransmitter\
    \ : Transmitter {\n    override func sendMessage(message: Message) {\n       \
    \ if (message.subject.hasPrefix(\"Priority\")) {\n            println(\"Message\
    \ to \\(message.to) sent as priority\");\n        } else {\n            super.sendMessage(message);\n\
    \        }\n    }\n}\n```\n\nThe `Transmitter` class defines the basic behavior\
    \ of a transmitter, including referring a request to the next link in the chain.\
    \ I have defined the code that checks e-mail suffixes in this class. (The `required`\
    \ initializer is there so I can create instances of my transmitters from their\
    \ types, which I do in the next section.)\n\nEach of the individual transmitter\
    \ classes is derived from `Transmitter` and overrides the `sendMessage` method.\
    \ Each implementation checks to see whether the transmitter can take responsibility\
    \ for the `Message` request. If the transmitter cannot take responsibility, it\
    \ calls the base class implementation, which advances to the next link in the\
    \ chain or reports an error if there are no further links.\n\n## Creating and\
    \ Providing the Chain of Responsibility\n\nThe next step is to create the chain,\
    \ instantiating the objects that I need and arranging them in the order in which\
    \ they will be asked to take responsibility for a `Message`. You can use several\
    \ of the design patterns that I described in Part 2 of this book to create the\
    \ chain, but I am going to keep the example simple and implement a class method\
    \ that creates a new chain each time it is called. Listing 19-7 shows the changes\
    \ that I made to the `Transmitter` class to create the chain.\n\n**Listing 19-7.** Creating\
    \ the Chain in the `Transmitters.swift` File\n\n```\n...\nclass Transmitter {\n\
    \    var nextLink:Transmitter?;\n    required init() {}\n\n    func sendMessage(message:Message)\
    \ {\n        if (nextLink != nil) {\n            nextLink!.sendMessage(message);\n\
    \        } else {\n            println(\"End of chain reached. Message not sent\"\
    );\n        }\n    }\n\n    class func createChain() -> Transmitter? {\n     \
    \   let transmitterClasses:[Transmitter.Type] = [\n            PriorityTransmitter.self,\n\
    \            LocalTransmitter.self,\n            RemoteTransmitter.self\n    \
    \    ];\n        var link:Transmitter?;\n        for tClass in transmitterClasses.reverse()\
    \ {\n            let existingLink = link;\n            link = tClass();\n    \
    \        link?.nextLink = existingLink;\n        }\n        return link;\n   \
    \ }\n\n    private class func matchEmailSuffix(message:Message) -> Bool {\n  \
    \      if let index = find(message.from, \"@\") {\n            return message.to.hasSuffix(message.from[Range<String.Index>(start:\n\
    \                index, end: message.from.endIndex)]);\n        }\n        return\
    \ false;\n    }\n}\n...\n```\n\nI have defined an array of `Transmitter` types\
    \ to make it easy to add new transmitters or to change the order in which they\
    \ appear in the chain. When I create the chain, I start with the last link and\
    \ work my way back through the array of classes, creating each in turn and setting\
    \ up the relationships between them.\n\n> **Tip** You don’t need to use metatypes\
    \ to create objects in a chain. I find this the clearest way to express the set\
    \ of types in the chain, but I could have simply created the objects directly\
    \ and explicitly set the `nextLink` property values.\n\n## Applying the Chain\
    \ of Responsibility Pattern\n\nThe final step is to use the chain of responsibility\
    \ to handle `Message` objects. Listing 19-8 shows the changes I made to the `main.swift`\
    \ file.\n\n**Listing 19-8.** Using the Chain of Responsibility in the `main.swift`\
    \ File\n\n```\nlet messages = [\n    Message(from: \"bob@example.com\", to: \"\
    joe@example.com\",\n        subject: \"Free for lunch?\"),\n    Message(from:\
    \ \"joe@example.com\", to: \"alice@acme.com\",\n        subject: \"New Contracts\"\
    ),\n    Message(from: \"pete@example.com\", to: \"all@example.com\",\n       \
    \ subject: \"Priority: All-Hands Meeting\"),\n];\n\nif let chain = Transmitter.createChain()\
    \ {\n    for msg in messages {\n        chain.sendMessage(msg);\n    }\n}\n```\n\
    \nApplying the pattern simplifies the code in the calling components and hides\
    \ the details of which objects will be asked to take responsibility for the `Message`\
    \ object. When I need to add new transmitters to the application, I can do so\
    \ by modifying just the `createChain` method of the `Transmitter` class; no changes\
    \ are required in the calling components. Running the example application produces\
    \ the following output:\n\n```\nMessage to joe@example.com sent locally\nMessage\
    \ to alice@acme.com sent remotely\nMessage to all@example.com sent as priority\n\
    ```\n\n## Variations on the Chain of Responsibility Pattern\n\nThere are several\
    \ common variations on the chain of responsibility pattern, each of which I describe\
    \ in the following sections."
  raw: '## Implementing the Chain of Responsibility Pattern


    The implementation of the chain of responsibility pattern relies on hiding the
    details of the individual links that make up the chain from the calling components—something
    that is most readily achieved by defining a protocol or a base class. I usually
    rely on a base class because I like to deal with the next link in the chain using
    an optional property, which cannot be assigned new values when defined by a protocol.
    Listing 19-6 shows the base class I defined and applied to the transmitter classes.


    Listing 19-6. Defining and Implementing a Base Class in the Transmitters.swift
    File


    `class Transmitter {`


    `var nextLink:Transmitter?;`


    `required init() {}`


    `func sendMessage(message:Message) {`


    `if (nextLink != nil) {`


    `nextLink!.sendMessage(message);`


    `} else {`


    `println("End of chain reached. Message not sent");`


    `}`


    `}`


    `private class func matchEmailSuffix(message:Message) -> Bool {`


    `if let index = find(message.from, "@") {`


    `return message.to.hasSuffix(message.from[Range<String.Index>(start:`


    `index, end: message.from.endIndex)]);`


    `}`


    `return false;`


    `}`


    `}`


    `class LocalTransmitter : Transmitter {`


    `override func sendMessage(message: Message) {`


    `if (Transmitter.matchEmailSuffix(message)) {`


    `println("Message to \(message.to) sent locally");`


    `} else {`


    `super.sendMessage(message);`


    `}`


    `}`


    `}`


    `class RemoteTransmitter : Transmitter {`


    `override func sendMessage(message: Message) {`


    `if (!Transmitter.matchEmailSuffix(message)) {`


    `println("Message to \(message.to) sent remotely");`


    `} else {`


    `super.sendMessage(message);`


    `}`


    `}`


    `}`


    `class PriorityTransmitter : Transmitter {`


    `override func sendMessage(message: Message) {`


    `if (message.subject.hasPrefix("Priority")) {`


    `println("Message to \(message.to) sent as priority");`


    `} else {`


    `super.sendMessage(message);`


    `}`


    `}`


    `}`


    The `Transmitter` class defines the basic behavior of a transmitter, including
    referring a request to the next link in the chain. I have defined the code that
    checks e-mail suffixes in this class. (The `required` initializer is there so
    I can create instances of my transmitters from their types, which I do in the
    next section.)


    Each of the individual transmitter classes is derived from `Transmitter` and overrides
    the `sendMessage` method. Each implementation checks to see whether the transmitter
    can take responsibility for the `Message` request. If the transmitter cannot take
    responsibility, it calls the base class implementation, which advances to the
    next link in the chain or reports an error if there are no further links.


    ### Creating and Providing the Chain of Responsibility


    The next step is to create the chain, instantiating the objects that I need and
    arranging them in the order in which they will be asked to take responsibility
    for a `Message`. You can use several of the design patterns that I described in
    Part 2 of this book to create the chain, but I am going to keep the example simple
    and implement a class method that creates a new chain each time it is called.
    Listing 19-7 shows the changes that I made to the `Transmitter` class to create
    the chain.


    Listing 19-7. Creating the Chain in the Transmitters.swift File


    `...`


    `class Transmitter {`


    `var nextLink:Transmitter?;`


    `required init() {}`


    `func sendMessage(message:Message) {`


    `if (nextLink != nil) {`


    `nextLink!.sendMessage(message);`


    `} else {`


    `println("End of chain reached. Message not sent");`


    `}`


    `}`


    `class func createChain() -> Transmitter? {`


    `let transmitterClasses:[Transmitter.Type] = [`


    `PriorityTransmitter.self,`


    `LocalTransmitter.self,`


    `RemoteTransmitter.self`


    `];`


    `var link:Transmitter?;`


    `for tClass in transmitterClasses.reverse() {`


    `let existingLink = link;`


    `link = tClass();`


    `link?.nextLink = existingLink;`


    `}`


    `return link;`


    `}`


    `private class func matchEmailSuffix(message:Message) -> Bool {`


    `if let index = find(message.from, "@") {`


    `return message.to.hasSuffix(message.from[Range<String.Index>(start:`


    `index, end: message.from.endIndex)]);`


    `}`


    `return false;`


    `}`


    `}`


    `...`


    I have defined an array of `Transmitter` types to make it easy to add new transmitters
    or to change the order in which they appear in the chain. When I create the chain,
    I start with the last link and work my way back through the array of classes,
    creating each in turn and setting up the relationships between them.


    Tip


    You don’t need to use metatypes to create objects in a chain. I find this the
    clearest way to express the set of types in the chain, but I could have simply
    created the objects directly and explicitly set the `nextLink` property values.


    ### Applying the Chain of Responsibility Pattern


    The final step is to use the chain of responsibility to handle `Message` objects.
    Listing 19-8 shows the changes I made to the `main.swift` file.


    Listing 19-8. Using the Chain of Responsibility in the main.swift File


    `let messages = [`


    `Message(from: "bob@example.com", to: "joe@example.com",`


    `subject: "Free for lunch?"),`


    `Message(from: "joe@example.com", to: "alice@acme.com",`


    `subject: "New Contracts"),`


    `Message(from: "pete@example.com", to: "all@example.com",`


    `subject: "Priority: All-Hands Meeting"),`


    `];`


    `if let chain = Transmitter.createChain() {`


    `for msg in messages {`


    `chain.sendMessage(msg);`


    `}`


    `}`


    Applying the pattern simplifies the code in the calling components and hides the
    details of which objects will be asked to take responsibility for the `Message`
    object. When I need to add new transmitters to the application, I can do so by
    modifying just the `createChain` method of the `Transmitter` class; no changes
    are required in the calling components. Running the example application produces
    the following output:


    `Message to joe@example.com sent locally`


    `Message to alice@acme.com sent remotely`


    `Message to all@example.com sent as priority`


    ## Variations on the Chain of Responsibility Pattern


    There are several common variations on the chain of responsibility pattern, each
    of which I describe in the following sections.'
  trans: "\n# 实现责任链模式\n\n责任链模式的实现依赖于向调用组件隐藏构成链条的各个独立环节的细节——最简便的方式是通过定义协议或基类来实现。我通常倾向于使用基类，因为我想通过可选属性来处理链条中的下一个环节，而协议定义的属性无法被赋予新值。清单\
    \ 19-6 展示了我定义并应用于发送器类的基类。\n\n**清单 19-6.** 在`Transmitters.swift`文件中定义并实现基类\n\n\
    ```\nclass Transmitter {\n    var nextLink:Transmitter?;\n    required init()\
    \ {}\n    func sendMessage(message:Message) {\n        if (nextLink != nil) {\n\
    \            nextLink!.sendMessage(message);\n        } else {\n            println(\"\
    End of chain reached. Message not sent\");\n        }\n    }\n    private class\
    \ func matchEmailSuffix(message:Message) -> Bool {\n        if let index = find(message.from,\
    \ \"@\") {\n            return message.to.hasSuffix(message.from[Range<String.Index>(start:\n\
    \                index, end: message.from.endIndex)]);\n        }\n        return\
    \ false;\n    }\n}\n\nclass LocalTransmitter : Transmitter {\n    override func\
    \ sendMessage(message: Message) {\n        if (Transmitter.matchEmailSuffix(message))\
    \ {\n            println(\"Message to \\(message.to) sent locally\");\n      \
    \  } else {\n            super.sendMessage(message);\n        }\n    }\n}\n\n\
    class RemoteTransmitter : Transmitter {\n    override func sendMessage(message:\
    \ Message) {\n        if (!Transmitter.matchEmailSuffix(message)) {\n        \
    \    println(\"Message to \\(message.to) sent remotely\");\n        } else {\n\
    \            super.sendMessage(message);\n        }\n    }\n}\n\nclass PriorityTransmitter\
    \ : Transmitter {\n    override func sendMessage(message: Message) {\n       \
    \ if (message.subject.hasPrefix(\"Priority\")) {\n            println(\"Message\
    \ to \\(message.to) sent as priority\");\n        } else {\n            super.sendMessage(message);\n\
    \        }\n    }\n}\n```\n\n`Transmitter`类定义了发送器的基本行为，包括将请求转发至链条中的下一个环节。我将检查电子邮件后缀的代码也定义在这个类中。（`required`初始化器的作用是让我能够根据发送器的类型创建其实例，这一点将在下一节中展示。）\n\
    \n每个独立的发送器类都继承自`Transmitter`，并重写了`sendMessage`方法。每个实现都会检查该发送器是否能承担对`Message`请求的责任。如果发送器无法承担责任，它会调用基类实现，从而将请求传递给链条中的下一个环节；若没有更多环节，则报告错误。\n\
    \n## 创建并提供责任链\n\n下一步是创建责任链，实例化所需的对象，并按它们将被询问承担`Message`责任的顺序排列。你可以使用本书第二部分描述的多种设计模式来创建链条，但我会保持示例简洁，实现一个每次调用时创建新链条的类方法。清单\
    \ 19-7 展示了我为创建链条而对`Transmitter`类所做的修改。\n\n**清单 19-7.** 在`Transmitters.swift`文件中创建链条\n\
    \n```\n...\nclass Transmitter {\n    var nextLink:Transmitter?;\n    required\
    \ init() {}\n\n    func sendMessage(message:Message) {\n        if (nextLink !=\
    \ nil) {\n            nextLink!.sendMessage(message);\n        } else {\n    \
    \        println(\"End of chain reached. Message not sent\");\n        }\n   \
    \ }\n\n    class func createChain() -> Transmitter? {\n        let transmitterClasses:[Transmitter.Type]\
    \ = [\n            PriorityTransmitter.self,\n            LocalTransmitter.self,\n\
    \            RemoteTransmitter.self\n        ];\n        var link:Transmitter?;\n\
    \        for tClass in transmitterClasses.reverse() {\n            let existingLink\
    \ = link;\n            link = tClass();\n            link?.nextLink = existingLink;\n\
    \        }\n        return link;\n    }\n\n    private class func matchEmailSuffix(message:Message)\
    \ -> Bool {\n        if let index = find(message.from, \"@\") {\n            return\
    \ message.to.hasSuffix(message.from[Range<String.Index>(start:\n             \
    \   index, end: message.from.endIndex)]);\n        }\n        return false;\n\
    \    }\n}\n...\n```\n\n我定义了一个`Transmitter`类型的数组，以便轻松添加新的发送器或改变它们在链条中的顺序。创建链条时，我从最后一个环节开始，逆向遍历类数组，依次创建每个环节并建立它们之间的关联关系。\n\
    \n> **提示** 你不需要使用元类型来创建链条中的对象。我认为这是表达链条中类型集合最清晰的方式，但也可以直接创建对象并显式设置`nextLink`属性值。\n\
    \n## 应用责任链模式\n\n最后一步是使用责任链来处理`Message`对象。清单 19-8 展示了我在`main.swift`文件中所做的修改。\n\n\
    **清单 19-8.** 在`main.swift`文件中使用责任链\n\n```\nlet messages = [\n    Message(from:\
    \ \"bob@example.com\", to: \"joe@example.com\",\n        subject: \"Free for lunch?\"\
    ),\n    Message(from: \"joe@example.com\", to: \"alice@acme.com\",\n        subject:\
    \ \"New Contracts\"),\n    Message(from: \"pete@example.com\", to: \"all@example.com\"\
    ,\n        subject: \"Priority: All-Hands Meeting\"),\n];\n\nif let chain = Transmitter.createChain()\
    \ {\n    for msg in messages {\n        chain.sendMessage(msg);\n    }\n}\n```\n\
    \n应用该模式简化了调用组件中的代码，并隐藏了哪些对象将被询问承担`Message`责任的细节。当需要向应用程序添加新的发送器时，只需修改`Transmitter`类的`createChain`方法即可，调用组件无需任何改动。运行示例应用程序将产生以下输出：\n\
    \n```\nMessage to joe@example.com sent locally\nMessage to alice@acme.com sent\
    \ remotely\nMessage to all@example.com sent as priority\n```\n\n## 责任链模式的变体\n\n\
