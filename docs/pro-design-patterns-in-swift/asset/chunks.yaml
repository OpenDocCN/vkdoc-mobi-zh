  trans: '

    # 7. 对象池模式


    对象池模式是单例模式的一种变体，它提供对多个相同对象的访问，而非单个实例。当你拥有代表一组可互换资源的对象，且每个资源在任意时刻只能被一个组件使用时，该模式会非常有用。在本章中，我将描述基本的对象池模式，并在第
    8 章中向你展示一些有用的变体，使对象池能够适应不同的场景。表 7-1 将对象池模式置于上下文中进行了说明。


    **表 7-1.** 将对象池模式置于上下文中


    | 问题 | 答案 |

    | --- | --- |

    | 它是什么？ | 对象池模式管理一组可重用的对象，这些对象被提供给调用组件。一个组件从池中获取一个对象，用它来执行工作，然后将其返还给池，以便它可以被重新分配以满足未来的请求。已分配给调用者的对象在返回到池之前，其他组件无法使用。
    |

    | 有什么好处？ | 对象池模式向使用对象的组件隐藏了对象的构造过程，并允许通过重复使用对象来分摊昂贵的初始化成本。 |

    | 何时应使用此模式？ | 当你拥有许多相同的对象，且需要管理它们的创建时，应使用对象池模式。这种情况可能是因为这些对象代表了现实世界中的资源，或者创建新实例的成本很高。
    |

    | 何时应避免此模式？ | 如果在任何时刻只能存在一个对象（应使用单例模式），或者对可存在的对象数量没有限制（应允许调用组件创建自己的实例，或使用本书中描述的其他模式，如工厂方法模式），则不应使用此模式。
    |

    | 如何判断是否正确实现了此模式？ | 当对象被分配给调用组件而无需创建新实例，并且当返还给池的对象被用于满足后续请求时，就说明该模式已正确实现。 |

    | 有哪些常见陷阱？ | 主要陷阱是实现并发保护，以确保对象被正确分配，并且不会损坏用于实现该模式的数据结构。 |

    | 有哪些相关模式？ | 单例模式与对象池模式有一些共同思路，但它管理的是单个对象。 |


    ## 准备示例项目


    对于本章，我创建了一个名为 `ObjectPool` 的 OS X 命令行工具项目。无需进一步准备。


    ## 理解该模式解决的问题


    在许多项目中，会有一些对象其实例数量必须受到限制，但又不至于仅仅只有一个实例。为了帮助将此问题置于现实世界的背景下，我将创建一个示例，代表图书馆用来追踪书籍的系统。清单
    7-1 显示了我添加到示例项目中的名为 `Book.swift` 的文件内容。


    **清单 7-1.** `Book.swift` 文件的内容


    ```

    class Book {


    let author:String;


    let title:String;


    let stockNumber:Int;


    var reader:String?


    var checkoutCount = 0;


    init(author:String, title:String, stock:Int) {


    self.author = author;


    self.title = title;


    self.stockNumber = stock;


    }


    }

    ```


    在追踪图书馆书籍的系统中，创建或克隆 `Book` 对象并不会神奇地创建出图书馆中的实体书，但同样地，使用单例模式来管理 `Book` 也没有意义，因为图书馆对大多数书籍都会拥有不止一份副本，而且其中任何一本都可以满足某人的阅读愿望。


    图书馆中的每本书一次只能由一位读者借出，并且在归还之前不能再次使用。读者可以在书籍有库存时立即借阅，但一旦库存耗尽，任何想借阅的人都需要等到有书被归还或图书馆增加馆藏。


    我面临的问题是需要一种模式来管理大量相同且可互换的对象，并提供一种让它们能够被公平和合理地使用的模型。


    **提示：** 图书馆书籍是可重用和可互换对象组的现实世界例子，但在软件开发中，你也会遇到一些抽象的例子。最常见的例子包括线程和网络连接，但这是一个会以多种方式频繁出现的问题。


    ## 理解对象池模式


    对象池模式管理一组可互换的对象，称为对象池——或者简称为池。需要对象的组件从池中借用一个对象，用它来执行一些工作，然后在工作完成后将其返还给池。返还的对象随后将用于满足后续的请求，这些请求可能来自同一个组件或另一个组件。


    对象池模式可用于管理代表现实世界资源的对象，也可用于通过重用对象来满足多个组件的请求，从而分摊昂贵的初始化过程。


    对象池有四个重要操作，如图 7-1 所示。第一个操作是初始化，为准备待管理的对象集合。


    第二个操作是借出，需要对象的组件从池中借用一个对象。


    第三个操作是组件使用该对象执行某种工作。这不需要池进行任何操作，但这确实意味着池所管理的对象会在一段时间内处于使用中，并且不能借给其他组件。


    第四个也是最后一个操作是归还，组件将对象返还给池，以便它可以用来满足未来的借用请求。


    ![A978-1-4842-0394-1_7_Fig1_HTML.jpg](img/A978-1-4842-0394-1_7_Fig1_HTML.jpg)


    **图 7-1.** 对象池的基本操作


    在多线程应用程序中，第二、第三和第四个操作可能同时发生。在多个组件之间共享对象会带来潜在的并发问题。两个或多个组件可能同时请求借出或归还对象，对象池必须确保每次借用请求在借出时都能获得不同的对象，并且确保归还时对象不会丢失。


    有时也会出现请求无法立即被满足的情况，因为池中的所有对象都已被借出并使用中。池必须能够处理这些请求，要么向组件指示没有可用对象，要么允许组件等待直到有对象被归还。


    ## 实现对象池模式


    在本章中，我将创建该模式的一个基本实现，以演示不同操作是如何实现的。一个基本的对象池管理一组固定的对象，并依赖于从池中借出对象的组件在完成后将其归还。这是一个很好的起点，因为它让我能够解决基本的并发技术，而这些技术是该模式健壮实现的核心。在第
    8 章中，我将向你展示该模式的一些变体，你可以使用它们将基本池调整为你自己的项目。

    '
- fmt: "### Defining the Pool Class\n\nThe first step is to create a generic `Pool`\
    \ class that will manage a collection of objects of a given type. This need not\
    \ be a generic class, but the need to manage a pool is a common one, and a generic\
    \ class makes it easy to reuse the code in different projects. I added a file\
    \ called `Pool.swift` to the example project, the contents of which are shown\
    \ in Listing 7-2.\n\n**Listing 7-2.** The Contents of the `Pool.swift` File\n\n\
    ```\nimport Foundation\n\nclass Pool<T> {\n\n    private var data = [T]();\n\n\
    \    init(items:[T]) {\n        data.reserveCapacity(data.count);\n        for\
    \ item in items {\n            data.append(item);\n        }\n    }\n\n    func\
    \ getFromPool() -> T? {\n        var result:T?;\n        if (data.count > 0) {\n\
    \            result = self.data.removeAtIndex(0);\n        }\n        return result;\n\
    \    }\n\n    func returnToPool(item:T) {\n        self.data.append(item);\n \
    \   }\n\n}\n```\n\nThe `Pool` class—more correctly referred to as `Pool<T>`—is\
    \ initialized with the collection of objects that it is to manage. The initializer\
    \ copies the items into a local `data` array, which I use like a simple queue\
    \ collection containing the objects that are available for use. When the `getFromPool`\
    \ method is called, I return the object at the head of the array by calling the\
    \ `removeAtIndex` method. The `returnToPool` method is called when a previously\
    \ obtained object is finished, and I add it to the `data` array using the `append`\
    \ method so that it is available for use for subsequent calls to the `getFromPool`\
    \ method.\n\n#### Protecting the Data Array\n\nHandling concurrent requests is\
    \ important in the object pool pattern, and there are two problems that I need\
    \ to solve. The first problem is the same one I encountered when dealing with\
    \ singleton pattern: the `getFromPool` and `returnToPool` methods contain statements\
    \ that modify the `data` array, and I need to ensure that no two threads use these\
    \ methods simultaneously. Listing 7-3 shows how I have added a Grand Central Dispatch\
    \ (GCD) queue and applied the `dispatch_sync` function to protect the array from\
    \ concurrent modifications.\n\n**Listing 7-3.** Protecting the Array from Concurrent\
    \ Modifications in the `Pool.swift` File\n\n```\nimport Foundation\n\nclass Pool<T>\
    \ {\n\n    private var data = [T]();\n    private let arrayQ = dispatch_queue_create(\"\
    arrayQ\", DISPATCH_QUEUE_SERIAL);\n\n    init(items:[T]) {\n        data.reserveCapacity(data.count);\n\
    \        for item in items {\n            data.append(item);\n        }\n    }\n\
    \n    func getFromPool() -> T? {\n        var result:T?;\n        if (data.count\
    \ > 0) {\n            dispatch_sync(arrayQ, {() in\n                result = self.data.removeAtIndex(0);\n\
    \            })\n        }\n        return result;\n    }\n\n    func returnToPool(item:T)\
    \ {\n        dispatch_async(arrayQ, {() in\n            self.data.append(item);\n\
    \        });\n    }\n\n}\n```\n\n> **Tip**  \n> You can implement the object pool\
    \ pattern without adding concurrency protections, but only if you are sure that\
    \ your application will only ever use one thread to access the objects in the\
    \ pool. Be careful, though: applications have a habit of needing concurrency as\
    \ they get more complicated, and an unprotected object pool will cause problems\
    \ when that happens. My advice is to always add concurrency protections even if\
    \ you don't expect to need them.\n\nI have used the `dispatch_sync` and `dispatch_async`\
    \ functions to create blocks using closures that contain the operations that manipulate\
    \ the array. I add them to a queue I created with the `dispatch_queue_create`\
    \ function, which I configured with the `DISPATCH_QUEUE_SERIAL` value so that\
    \ only one block is executed at a time. This protects the array from corruption\
    \ by ensuring that only one thread at a time can modify the array.\n\n#### Ensuring\
    \ Objects Are Available to Be Checked Out\n\nThere is a second concurrency problem\
    \ in the `Pool` class, which means that the code may still encounter problems.\
    \ In the `getFromPool` method, I check to see whether there are any free objects\
    \ in the `data` array before adding a block to the queue to obtain an object,\
    \ like this:\n\n```\n...\nfunc getFromPool() -> T? {\n    var result:T?;\n   \
    \ if (data.count > 0) {\n        dispatch_sync(arrayQ, {() in\n            result\
    \ = self.data.removeAtIndex(0);\n        })\n    }\n    return result;\n}\n...\n\
    ```\n\nThis is a classic concurrency problem. Imagine that there is one free object\
    \ in the `data` array and that two threads call the `getFromPool` method a few\
    \ milliseconds apart. The first thread checks the `data.count` value, finds that\
    \ there is a free object, and uses the `dispatch_sync` method to queue up a block\
    \ that will remove it from the array so it can be used.\n\nShortly afterward,\
    \ the second thread does the same thing. It, too, believes that there is a free\
    \ object in the array because the block that the first thread created has yet\
    \ to be executed. The second thread queues its own block in the expectation that\
    \ it too will be able to obtain the object. The first thread's block executes\
    \ and successfully removes the free object. The second thread's block is then\
    \ executed and gets an error because the array is now empty.\n\nTo solve this\
    \ problem, I need to ensure that a thread that calls the `getFromPool` method\
    \ doesn't schedule a block to get a free object unless it is guaranteed to get\
    \ one. Listing 7-4 shows how I solved this problem using the GCD semaphore feature.\n\
    \n**Listing 7-4.** Applying a Semaphore in the `Pool.swift` File\n\n```\nimport\
    \ Foundation\n\nclass Pool<T> {\n\n    private var data = [T]();\n    private\
    \ let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n   \
    \ private let semaphore:dispatch_semaphore_t;\n\n    init(items:[T]) {\n     \
    \   data.reserveCapacity(data.count);\n        for item in items {\n         \
    \   data.append(item);\n        }\n        semaphore = dispatch_semaphore_create(items.count);\n\
    \    }\n\n    func getFromPool() -> T? {\n        var result:T?;\n        if (dispatch_semaphore_wait(semaphore,\
    \ DISPATCH_TIME_FOREVER) == 0) {\n            dispatch_sync(arrayQ, {() in\n \
    \               result = self.data.removeAtIndex(0);\n            })\n       \
    \ }\n        return result;\n    }\n\n    func returnToPool(item:T) {\n      \
    \  dispatch_async(arrayQ, {() in\n            self.data.append(item);\n      \
    \      dispatch_semaphore_signal(self.semaphore);\n        });\n    }\n\n}\n```\n\
    \nAt the heart of a semaphore is a counter, as you can see in the following statement\
    \ that I used to create one:\n\n```\n...\nsemaphore = dispatch_semaphore_create(items.count);\n\
    ...\n```\n\nThe `dispatch_semaphore_create` function accepts an `Int` value that\
    \ sets the initial value of the counter. The counter is decremented each time\
    \ the `dispatch_semaphore_wait` function is called, like this:\n\n```\n...\nif\
    \ (dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER) == 0) {\n    dispatch_sync(arrayQ,\
    \ {() in\n        result = self.data.removeAtIndex(0);\n    });\n}\n...\n```\n\
    \nWhen the counter reaches zero, calls to the `dispatch_semaphore_wait` function\
    \ will block. By calling the `dispatch_semaphore_wait` function in the `getFromPool`\
    \ method, I decrement the counter each time an object is removed from the `data`\
    \ array and cause calls to the method to block when there are no more items in\
    \ the array to give out.\n\nThe counter is incremented by calling the `dispatch_semaphore_signal`\
    \ function, which I do in the `returnToPool` method, after I have added the object\
    \ to the `data` array.\n\n```\n...\ndispatch_async(arrayQ, {() in\n    self.data.append(item);\n\
    \    dispatch_semaphore_signal(self.semaphore);\n});\n...\n```\n\nThis increases\
    \ the counter, allowing one of the threads blocking on the `dispatch_semaphore_wait`\
    \ function to continue execution. The calls to the semaphore functions balance\
    \ the number of requests to get and return pool objects and prevent calls to the\
    \ `getFromPool` method from adding a block to the queue unless there is definitely\
    \ an object waiting for it when it is executed."
  raw: '### Defining the Pool Class


    The first step is to create a generic `Pool` class that will manage a collection
    of objects of a given type. This need not be a generic class, but the need to
    manage a pool is a common one, and a generic class makes it easy to reuse the
    code in different projects. I added a file called `Pool.swift` to the example
    project, the contents of which are shown in Listing 7-2.


    Listing 7-2. The Contents of the Pool.swift File


    `import Foundation`


    `class Pool<T> {`


    `private var data = [T]();`


    `init(items:[T]) {`


    `data.reserveCapacity(data.count);`


    `for item in items {`


    `data.append(item);`


    `}`


    `}`


    `func getFromPool() -> T? {`


    `var result:T?;`


    `if (data.count > 0) {`


    `result = self.data.removeAtIndex(0);`


    `}`


    `return result;`


    `}`


    `func returnToPool(item:T) {`


    `self.data.append(item);`


    `}`


    `}`


    The `Pool` class—more correctly referred to as `Pool<T>`—is initialized with the
    collection of objects that it is to manage. The initializer copies the items into
    a local `data` array, which I use like a simple queue collection containing the
    objects that are available for use. When the `getFromPool` method is called, I
    return the object at the head of the array by calling the `removeAtIndex` method.
    The `returnToPool` method is called when a previously obtained object is finished,
    and I add it to the `data` array using the `append` method so that it is available
    for use for subsequent calls to the `getFromPool` method.


    #### Protecting the Data Array


    Handling concurrent requests is important in the object pool pattern, and there
    are two problems that I need to solve. The first problem is the same one I encountered
    when dealing with singleton pattern: the `getFromPool` and `returnToPool` methods
    contain statements that modify the `data` array, and I need to ensure that no
    two threads use these methods simultaneously. Listing 7-3 shows how I have added
    a Grand Central Dispatch (GCD) queue and applied the `dispatch_sync` function
    to protect the array from concurrent modifications.


    Listing 7-3. Protecting the Array from Concurrent Modifications in the Pool.swift
    File


    `import Foundation`


    `class Pool<T> {`


    `private var data = [T]();`


    `private let arrayQ = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_SERIAL);`


    `init(items:[T]) {`


    `data.reserveCapacity(data.count);`


    `for item in items {`


    `data.append(item);`


    `}`


    `}`


    `func getFromPool() -> T? {`


    `var result:T?;`


    `if (data.count > 0) {`


    `dispatch_sync(arrayQ, {() in`


    `result = self.data.removeAtIndex(0);`


    `})`


    `}`


    `return result;`


    `}`


    `func returnToPool(item:T) {`


    `dispatch_async(arrayQ, {() in`


    `self.data.append(item);`


    `});`


    `}`


    `}`


    Tip


    You can implement the object pool pattern without adding concurrency protections,
    but only if you are sure that your application will only ever use one thread to
    access the objects in the pool. Be careful, though: applications have a habit
    of needing concurrency as they get more complicated, and an unprotected object
    pool will cause problems when that happens. My advice is to always add concurrency
    protections even if you don’t expect to need them.


    I have used the `dispatch_sync` and `dispatch_` `async`functions to create blocks
    using closures that contain the operations that manipulate the array. I add them
    to a queue I created with the `dispatch_queue_` `create`function, which I configured
    with the `DISPATCH_QUEUE_` `SERIAL`value so that only one block is executed at
    a time. This protects the array from corruption by ensuring that only one thread
    at a time can modify the array.


    #### Ensuring Objects Are Available to Be Checked Out


    There is a second concurrency problem in the `Pool` class, which means that the
    code may still encounter problems. In the `getFromPool` method, I check to see
    whether there are any free objects in the `data` array before adding a block to
    the queue to obtain an object, like this:


    `...`


    `func getFromPool() -> T? {`


    `var result:T?;`


    `if (data.count > 0) {`


    `dispatch_sync(arrayQ, {() in`


    `result = self.data.removeAtIndex(0);`


    `})`


    `}`


    `return result;`


    `}`


    `...`


    This is a classic concurrency problem. Imagine that there is one free object in
    the `data` array and that two threads call the `getFromPool` method a few milliseconds
    apart. The first thread checks the `data.count` value, finds that there is a free
    object, and uses the `dispatch_sync` method to queue up a block that will remove
    it from the array so it can be used.


    Shortly afterward, the second thread does the same thing. It, too, believes that
    there is a free object in the array because the block that the first thread created
    has yet to be executed. The second thread queues its own block in the expectation
    that it too will be able to obtain the object. The first thread’s block executes
    and successfully removes the free object. The second thread’s block is then executed
    and gets an error because the array is now empty.


    To solve this problem, I need to ensure that a thread that calls the `getFromPool`
    method doesn’t schedule a block to get a free object unless it is guaranteed to
    get one. Listing 7-4 shows how I solved this problem using the GCD semaphore feature.


    Listing 7-4. Applying a Semaphore in the Pool.swift File


    `import Foundation`


    `class Pool<T> {`


    `private var data = [T]();`


    `private let arrayQ = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_SERIAL);`


    `private let semaphore:dispatch_semaphore_t;`


    `init(items:[T]) {`


    `data.reserveCapacity(data.count);`


    `for item in items {`


    `data.append(item);`


    `}`


    `semaphore = dispatch_semaphore_create(items.count);`


    `}`


    `func getFromPool() -> T? {`


    `var result:T?;`


    `if (dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER) == 0) {`


    `dispatch_sync(arrayQ, {() in`


    `result = self.data.removeAtIndex(0);`


    `})`


    `}`


    `return result;`


    `}`


    `func returnToPool(item:T) {`


    `dispatch_async(arrayQ, {() in`


    `self.data.append(item);`


    `dispatch_semaphore_signal(self.semaphore);`


    `});`


    `}`


    `}`


    At the heart of a semaphore is a counter, as you can see in the following statement
    that I used to create one:


    `...`


    `semaphore = dispatch_semaphore_create(` `items.count` `);`


    `...`


    The `dispatch_semaphore_create` function accepts an `Int` value that sets the
    initial value of the counter. The counter is decremented each time the `dispatch_semaphore_wait`
    function is called, like this:


    `...`


    `if (` `dispatch_semaphore_wait` `(semaphore, DISPATCH_TIME_FOREVER) == 0) {`


    `dispatch_sync(arrayQ, {() in`


    `result = self.data.removeAtIndex(0);`


    `});`


    `}`


    `...`


    When the counter reaches zero, calls to the `dispatch_semaphore_wait` function
    will block. By calling the `dispatch_semaphore_wait` function in the `getFromPool`
    method, I decrement the counter each time an object is removed from the `data`
    array and cause calls to the method to block when there are no more items in the
    array to give out.


    The counter is incremented by calling the `dispatch_semaphore_` `signal`function,
    which I do in the `returnToPool` method, after I have added the object to the
    `data` array.


    `...`


    `dispatch_async(arrayQ, {() in`


    `self.data.append(item);`


    `dispatch_semaphore_signal` `(self.semaphore);`


    `});`


    `...`


    This increases the counter, allowing one of the threads blocking on the `dispatch_semaphore_wait`
    function to continue execution. The calls to the semaphore functions balance the
    number of requests to get and return pool objects and prevent calls to the `getFromPool`
    method from adding a block to the queue unless there is definitely an object waiting
    for it when it is executed.'
  trans: "\n### 定义池类\n\n第一步是创建一个通用的 `Pool` 类，用于管理指定类型的对象集合。这并非必须是一个泛型类，但管理对象池是一种常见需求，而泛型类可以轻松地在不同项目中复用代码。我给示例项目添加了一个名为\
    \ `Pool.swift` 的文件，其内容如代码清单 7-2 所示。\n\n**代码清单 7-2.** `Pool.swift` 文件的内容\n\n```\n\
    import Foundation\n\nclass Pool<T> {\n\n    private var data = [T]();\n\n    init(items:[T])\
    \ {\n        data.reserveCapacity(data.count);\n        for item in items {\n\
    \            data.append(item);\n        }\n    }\n\n    func getFromPool() ->\
    \ T? {\n        var result:T?;\n        if (data.count > 0) {\n            result\
    \ = self.data.removeAtIndex(0);\n        }\n        return result;\n    }\n\n\
    \    func returnToPool(item:T) {\n        self.data.append(item);\n    }\n\n}\n\
    ```\n\n`Pool` 类——更准确地说是 `Pool<T>`——在初始化时接收它要管理的对象集合。初始化器将这些项目复制到一个本地 `data` 数组中，我将其用作一个简单的队列集合，其中包含可供使用的对象。当调用\
    \ `getFromPool` 方法时，我通过调用 `removeAtIndex` 方法返回数组头部的对象。当之前获取的对象使用完毕后，会调用 `returnToPool`\
    \ 方法，我使用 `append` 方法将其添加到 `data` 数组中，以便后续调用 `getFromPool` 方法时可以再次使用。\n\n#### 保护数据数组\n\
    \n在对象池模式中，处理并发请求非常重要，我需要解决两个问题。第一个问题与我在处理单例模式时遇到的一样：`getFromPool` 和 `returnToPool`\
    \ 方法中包含修改 `data` 数组的语句，我需要确保没有两个线程同时使用这些方法。代码清单 7-3 展示了如何添加一个 Grand Central Dispatch\
    \ (GCD) 队列，并应用 `dispatch_sync` 函数来保护数组免受并发修改的影响。\n\n**代码清单 7-3.** 在 `Pool.swift`\
    \ 文件中保护数组免受并发修改\n\n```\nimport Foundation\n\nclass Pool<T> {\n\n    private var\
    \ data = [T]();\n    private let arrayQ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
    \n    init(items:[T]) {\n        data.reserveCapacity(data.count);\n        for\
    \ item in items {\n            data.append(item);\n        }\n    }\n\n    func\
    \ getFromPool() -> T? {\n        var result:T?;\n        if (data.count > 0) {\n\
    \            dispatch_sync(arrayQ, {() in\n                result = self.data.removeAtIndex(0);\n\
    \            })\n        }\n        return result;\n    }\n\n    func returnToPool(item:T)\
    \ {\n        dispatch_async(arrayQ, {() in\n            self.data.append(item);\n\
    \        });\n    }\n\n}\n```\n\n> **提示**  \n> 你可以在不添加并发保护的情况下实现对象池模式，但前提是确保你的应用程序只会使用单个线程来访问池中的对象。不过要小心：应用程序随着复杂度增加往往需要处理并发，届时未受保护的对象池会引发问题。我的建议是，即使你预计不需要，也始终添加并发保护。\n\
    \n我使用了 `dispatch_sync` 和 `dispatch_async` 函数，通过闭包创建了包含数组操作代码的代码块。我将这些代码块添加到一个由\
    \ `dispatch_queue_create` 函数创建的队列中，并将该队列配置为 `DISPATCH_QUEUE_SERIAL` 值，这样一次只执行一个代码块。这通过确保同一时间只有一个线程能修改数组来保护其免受损坏。\n\
    \n#### 确保对象可被取出\n\n`Pool` 类中还存在着第二个并发问题，这意味着代码仍可能遇到麻烦。在 `getFromPool` 方法中，我在向队列添加获取对象的代码块之前，会检查\
    \ `data` 数组中是否有空闲对象，如下所示：\n\n```\n...\nfunc getFromPool() -> T? {\n    var result:T?;\n\
    \    if (data.count > 0) {\n        dispatch_sync(arrayQ, {() in\n           \
    \ result = self.data.removeAtIndex(0);\n        })\n    }\n    return result;\n\
    }\n...\n```\n\n这是一个经典的并发问题。假设 `data` 数组中有一个空闲对象，并且两个线程在相差几毫秒的时间内调用了 `getFromPool`\
    \ 方法。第一个线程检查 `data.count` 值，发现有一个空闲对象，于是使用 `dispatch_sync` 方法将一个会从数组中移除该对象以便使用的代码块排入队列。\n\
    \n随后不久，第二个线程也执行了同样的操作。它同样认为数组中有一个空闲对象，因为第一个线程创建的代码块尚未执行。第二个线程将自身的代码块排入队列，期望也能获取该对象。第一个线程的代码块执行并成功移除了空闲对象。接着第二个线程的代码块被执行，但由于数组此时已为空，导致出现错误。\n\
    \n为了解决这个问题，我需要确保调用 `getFromPool` 方法的线程在无法保证获取到对象时，不会调度代码块去获取空闲对象。代码清单 7-4 展示了如何使用\
    \ GCD 的信号量特性解决此问题。\n\n**代码清单 7-4.** 在 `Pool.swift` 文件中应用信号量\n\n```\nimport Foundation\n\
    \nclass Pool<T> {\n\n    private var data = [T]();\n    private let arrayQ = dispatch_queue_create(\"\
    arrayQ\", DISPATCH_QUEUE_SERIAL);\n    private let semaphore:dispatch_semaphore_t;\n\
    \n    init(items:[T]) {\n        data.reserveCapacity(data.count);\n        for\
    \ item in items {\n            data.append(item);\n        }\n        semaphore\
    \ = dispatch_semaphore_create(items.count);\n    }\n\n    func getFromPool() ->\
    \ T? {\n        var result:T?;\n        if (dispatch_semaphore_wait(semaphore,\
    \ DISPATCH_TIME_FOREVER) == 0) {\n            dispatch_sync(arrayQ, {() in\n \
    \               result = self.data.removeAtIndex(0);\n            })\n       \
    \ }\n        return result;\n    }\n\n    func returnToPool(item:T) {\n      \
    \  dispatch_async(arrayQ, {() in\n            self.data.append(item);\n      \
    \      dispatch_semaphore_signal(self.semaphore);\n        });\n    }\n\n}\n```\n\
    \n信号量的核心是一个计数器，你可以在下面用于创建信号量的语句中看到这一点：\n\n```\n...\nsemaphore = dispatch_semaphore_create(items.count);\n\
    ...\n```\n\n`dispatch_semaphore_create` 函数接受一个 `Int` 值，用于设置计数器的初始值。每次调用 `dispatch_semaphore_wait`\
    \ 函数时，计数器都会递减，如下所示：\n\n```\n...\nif (dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER)\
    \ == 0) {\n    dispatch_sync(arrayQ, {() in\n        result = self.data.removeAtIndex(0);\n\
    \    });\n}\n...\n```\n\n当计数器归零时，对 `dispatch_semaphore_wait` 函数的调用将会阻塞。通过在 `getFromPool`\
    \ 方法中调用 `dispatch_semaphore_wait` 函数，每次从 `data` 数组中移除一个对象时，计数器就会递减，并且当数组中没有更多可分配的对象时，对该方法的调用将会阻塞。\n\
    \n计数器通过调用 `dispatch_semaphore_signal` 函数递增，我在 `returnToPool` 方法中将对象添加到 `data`\
    \ 数组后执行此操作。\n\n```\n...\ndispatch_async(arrayQ, {() in\n    self.data.append(item);\n\
    \    dispatch_semaphore_signal(self.semaphore);\n});\n...\n```\n\n这会增加计数器，允许一个阻塞在\
    \ `dispatch_semaphore_wait` 函数上的线程继续执行。对信号量函数的调用平衡了获取和归还池对象的请求数量，并且除非在代码块执行时确实有对象在等待，否则可以防止\
    \ `getFromPool` 方法向队列添加代码块。\n"
- fmt: "### Consuming the Pool Class\n\nNow that I have created a generic pool class,\
    \ I can complete my application of the object pool pattern by applying it to manage\
    \ a collection of `Book` objects. Listing 7-5 shows the definition of a class\
    \ called `Library` that I defined in a new file called `Library.swift`.\n\n**Listing\
    \ 7-5.** Consuming the Pool Class in the `Library.swift` File\n\n```\nimport Foundation\n\
    \nfinal class Library {\n\n    private let books:[Book];\n    private let pool:Pool<Book>;\n\
    \n    private init(stockLevel:Int) {\n        books = [Book]();\n        for count\
    \ in 1 ... stockLevel {\n            books.append(Book(author: \"Dickens, Charles\"\
    , title: \"Hard Times\",\n                stock: count))\n        }\n        pool\
    \ = Pool<Book>(items:books);\n    }\n\n    private class var singleton:Library\
    \ {\n        struct SingletonWrapper {\n            static let singleton = Library(stockLevel:2);\n\
    \        }\n        return SingletonWrapper.singleton;\n    }\n\n    class func\
    \ checkoutBook(reader:String) -> Book? {\n        var book = singleton.pool.getFromPool();\n\
    \        book?.reader = reader;\n        book?.checkoutCount++;\n        return\
    \ book;\n    }\n\n    class func returnBook(book:Book) {\n        book.reader\
    \ = nil;\n        singleton.pool.returnToPool(book);\n    }\n\n    class func\
    \ printReport() {\n        for book in singleton.books {\n            println(\"\
    ...Book#\\(book.stockNumber)...\");\n            println(\"Checked out \\(book.checkoutCount)\
    \ times\");\n            if (book.reader != nil) {\n                println(\"\
    Checked out to \\(book.reader!)\");\n            } else {\n                println(\"\
    In stock\");\n            }\n        }\n    }\n}\n```\n\nThe `Library` class implements\
    \ the object pool pattern by combining the `Pool` class I defined in Listing 7-4\
    \ with the singleton pattern I described in [Chapter 6](#A978-1-4842-0394-1_6_Chapter.html).\
    \ I need to use the singleton because there should be only one `Library` in this\
    \ example, although the `Library` itself could have multiple pools, each of which\
    \ manages copies of a single title. The code in Listing 7-5 represents a rather\
    \ depressing library whose entire stock consists of two copies of a Charles Dickens\
    \ novel.\n\nWhen you visit a real library, you can borrow a copy of the book you\
    \ want if one is available, and if it is not, you can join the queue and wait\
    \ for one to be returned by another reader. The library provides these services\
    \ but does so without making you understand how the process works behind the scenes.\
    \ You are not, for example, required to find the other people waiting for a copy\
    \ of the book and figure out the order in which returned copies should be distributed.\n\
    \n### A Relaxed Object Creation Policy\n\nNotice that I have defined the `Library`\
    \ and `Book` classes in different files and that I have not protected the `Book`\
    \ class from being instantiated outside of the `Library`. When implementing the\
    \ singleton pattern, I used a `private` constructor and defined the access class\
    \ because I wanted to demonstrate how to control the creation of the singleton\
    \ completely. In this chapter, I am taking a more relaxed approach because I am\
    \ modeling an environment where there could be many sources of `Book` objects,\
    \ representing the many real-world sources of books (publishers, book wholesalers,\
    \ and online stores could all supply a library with books, for example). I am\
    \ not going to build all of the possible sources into the example, but I wanted\
    \ to demonstrate that you can use this pattern to manage objects without having\
    \ to restrict the supply of them. My model remains true to the real world as long\
    \ as the `Book` objects associated with the `Library` object cannot be altered\
    \ without its consent.\n\nThe details of how a real-world library manages its\
    \ books are hidden, and this is the approach that I have taken when implementing\
    \ the `Library` class, too. Rather than expose the `Pool<Book>` object via the\
    \ singleton, I have defined type methods called `checkoutBook` and `returnBook`\
    \ that interact with the pool on behalf of callers. These methods also allow me\
    \ to prepare a `Book` when it is checked out: I set the value of the `reader`\
    \ property and increment the `checkoutCount` property. When a `Book` is returned,\
    \ I clear the `reader` property.\n\nThe `checkoutCount` and `reader` properties\
    \ are both used by the `printReport` method, which details each of the `Book`\
    \ objects that the `Library` created, noting how many times the book has been\
    \ checked out and whether it is currently in the pool. This is a diagnostic method\
    \ that will allow me to see the state of the books being managed by the pool during\
    \ testing. Listing 7-6 shows the code I used to test the `Library` class and its\
    \ use of the `Pool` class in the `main.swift` file.\n\n**Listing 7-6.** Testing\
    \ the Library and Pool in the `main.swift` File\n\n```\nimport Foundation\n\n\
    var queue = dispatch_queue_create(\"workQ\", DISPATCH_QUEUE_CONCURRENT);\nvar\
    \ group = dispatch_group_create();\n\nprintln(\"Starting...\");\n\nfor i in 1\
    \ ... 20 {\n    dispatch_group_async(group, queue, {() in\n        var book =\
    \ Library.checkoutBook(\"reader#\\(i)\");\n        if (book != nil) {\n      \
    \      NSThread.sleepForTimeInterval(Double(rand() % 2));\n            Library.returnBook(book!);\n\
    \        }\n    });\n}\n\ndispatch_group_wait(group, DISPATCH_TIME_FOREVER);\n\
    \nprintln(\"All blocks complete\");\n\nLibrary.printReport();\n```\n\nThis code\
    \ uses a `for` loop to create asynchronous GCD blocks that check out and return\
    \ `Book` objects from the `Library`. To make the example a little more realistic,\
    \ I have added a delay after the `Book` is obtained from the `Library` and before\
    \ it is returned again, like this:\n\n```\n...\nNSThread.sleepForTimeInterval(Double(rand()\
    \ % 2));\n...\n```\n\nThe `NSThread.sleepForTimeInterval` puts the thread executing\
    \ the statement to sleep. I control the duration of the sleep so that it is randomly\
    \ generated and forced to be either zero or one second, meaning that some blocks\
    \ will return a book immediately and others will wait for a second before returning\
    \ a book. I have done this because I want the use of the objects in the pool to\
    \ overlap. Without this, the objects would be checked out and returned in strict\
    \ rotation, which isn’t how pool objects are used in real projects (or, of course,\
    \ in the real world).\n\nStart the application to see the results. It will take\
    \ a few seconds to run, so be patient. When all of the blocks generated in the\
    \ `main.swift` file have executed, you will see output similar to the following:\n\
    \n```\nStarting...\nAll blocks complete\n...Book#1...\nChecked out 13 times\n\
    In stock\n...Book#2...\nChecked out 7 times\nIn stock\n```\n\nYour results may\
    \ be different because the random nature of the delay I added will vary the sequence\
    \ in which objects are taken from and returned to the pool.\n\nAlthough your results\
    \ may differ, the total number of times that the books were checked out should\
    \ be `20`, which is the same number of GCD blocks created in the `main.swift`\
    \ file. In my case, one `Book` object was checked out 13 times and the other was\
    \ checked out 7 times. The difference is caused by the delay I added, which has\
    \ led to the first `Book` object cycling through the pool several times while\
    \ slower readers were holding onto the other object.\n\n## Understanding the Pitfalls\
    \ of the Object Pool Pattern\n\nCare is required when implementing the object\
    \ pool pattern because it is easy to create a pool that doesn’t work or doesn’t\
    \ suit the application to which it has been applied. It is easy to get carried\
    \ away trying to create the perfect pool, especially when considering the variations\
    \ that I describe in [Chapter 8](#A978-1-4842-0394-1_8_Chapter.html). The result\
    \ can be code that is difficult to maintain and an unstable object pool that behaves\
    \ unpredictably once it has been deployed.\n\nCare is also required when protecting\
    \ an object pool against concurrent access in order to avoid creating a pool that\
    \ locks up unexpectedly, even if it works during your development tests. Be conservative\
    \ and give preference to safety over performance—and, most importantly, test your\
    \ code with as many different usage scenarios as you can. I recommend keeping\
    \ object pools as simple as you can and focus on producing something that works\
    \ and can be easily tested."
  raw: '### Consuming the Pool Class


    Now that I have created a generic pool class, I can complete my application of
    the object pool pattern by applying it to manage a collection of `Book` objects.
    Listing 7-5 shows the definition of a class called `Library` that I defined in
    a new file called `Library.swift`.


    Listing 7-5. Consuming the Pool Class in the Library.swift File


    `import Foundation`


    `final class Library {`


    `private let books:[Book];`


    `private let pool:Pool<Book>;`


    `private init(stockLevel:Int) {`


    `books = [Book]();`


    `for count in 1 ... stockLevel {`


    `books.append(Book(author: "Dickens, Charles", title: "Hard Times",`


    `stock: count))`


    `}`


    `pool = Pool<Book>(items:books);`


    `}`


    `private class var singleton:Library {`


    `struct SingletonWrapper {`


    `static let singleton = Library(stockLevel:2);`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `class func checkoutBook(reader:String) -> Book? {`


    `var book = singleton.pool.getFromPool();`


    `book?.reader = reader;`


    `book?.checkoutCount++;`


    `return book;`


    `}`


    `class func returnBook(book:Book) {`


    `book.reader = nil;`


    `singleton.pool.returnToPool(book);`


    `}`


    `class func printReport() {`


    `for book in singleton.books {`


    `println("...Book#\(book.stockNumber)...");`


    `println("Checked out \(book.checkoutCount) times");`


    `if (book.reader != nil) {`


    `println("Checked out to \(book.reader!)");`


    `} else {`


    `println("In stock");`


    `}`


    `}`


    `}`


    `}`


    The `Library` class implements the object pool pattern by combining the `Pool`
    class I defined in Listing 7-4 with the singleton pattern I described in [Chapter
    6](#A978-1-4842-0394-1_6_Chapter.html). I need to use the singleton because there
    should be only one `Library` in this example, although the `Library` itself could
    have multiple pools, each of which manages copies of a single title. The code
    in Listing 7-5 represents a rather depressing library whose entire stock consists
    of two copies of a Charles Dickens novel.


    When you visit a real library, you can borrow a copy of the book you want if one
    is available, and if it is not, you can join the queue and wait for one to be
    returned by another reader. The library provides these services but does so without
    making you understand how the process works behind the scenes. You are not, for
    example, required to find the other people waiting for a copy of the book and
    figure out the order in which returned copies should be distributed.


    A RELAXED OBJECT CREATION POLICY


    Notice that I have defined the `Library` and `Book` classes in different files
    and that I have not protected the `Book` class from being instantiated outside
    of the `Library`. When implementing the singleton pattern, I used a `private`
    constructor and defined the access class because I wanted to demonstrate how to
    control the creation of the singleton completely. In this chapter, I am taking
    a more relaxed approach because I am modeling an environment where there could
    be many sources of `Book` objects, representing the many real-world sources of
    books (publishers, book wholesalers, and online stores could all supply a library
    with books, for example). I am not going to build all of the possible sources
    into the example, but I wanted to demonstrate that you can use this pattern to
    manage objects without having to restrict the supply of them. My model remains
    true to the real world as long as the `Books` objects associated with the `Library`
    object cannot be altered without its consent.


    The details of how a real-world library manages its books are hidden, and this
    is the approach that I have taken when implementing the `Library` class, too.
    Rather than expose the `Pool<Book>` object via the singleton, I have defined type
    methods called `checkoutBook` and `returnBook` that interact with the pool on
    behalf of callers. These methods also allow me to prepare a `Book` when it is
    checked out: I set the value of the `reader` property and increment the `checkoutCount`
    property. When a `Book` is returned, I clear the `reader` property.


    The `checkoutCount` and `reader` properties are both used by the `printReport`
    method, which details each of the `Book` objects that the `Library` created, noting
    how many times the book has been checked out and whether it is currently in the
    pool. This is a diagnostic method that will allow me to see the state of the books
    being managed by the pool during testing. Listing 7-6 shows the code I used to
    test the `Library` class and its use of the `Pool` class in the `main.swift` file.


    Listing 7-6. Testing the Library and Pool in the main.swift File


    `import Foundation`


    `var queue = dispatch_queue_create("workQ", DISPATCH_QUEUE_CONCURRENT);`


    `var group = dispatch_group_create();`


    `println("Starting...");`


    `for i in 1 ... 20 {`


    `dispatch_group_async(group, queue, {() in`


    `var book = Library.checkoutBook("reader#\(i)");`


    `if (book != nil) {`


    `NSThread.sleepForTimeInterval(Double(rand() % 2));`


    `Library.returnBook(book!);`


    `}`


    `});`


    `}`


    `dispatch_group_wait(group, DISPATCH_TIME_FOREVER);`


    `println("All blocks complete");`


    `Library.printReport();`


    This code uses a `for` loop to create asynchronous GCD blocks that check out and
    return `Book` objects from the `Library`. To make the example a little more realistic,
    I have added a delay after the `Book` is obtained from the `Library` and before
    it is returned again, like this:


    `...`


    `NSThread.sleepForTimeInterval(Double(rand() % 2));`


    `...`


    The `NSThread.` `sleepForTimeInterval`puts the thread executing the statement
    to sleep. I control the duration of the sleep so that it is randomly generated
    and forced to be either zero or one second, meaning that some blocks will return
    a book immediately and others will wait for a second before returning a book.
    I have done this because I want the use of the objects in the pool to overlap.
    Without this, the objects would be checked out and returned in strict rotation,
    which isn’t how pool objects are used in real projects (or, of course, in the
    real world).


    Start the application to see the results. It will take a few seconds to run, so
    be patient. When all of the blocks generated in the `main.swift` file have executed,
    you will see output similar to the following:


    `Starting...`


    `All blocks complete`


    `...Book#1...`


    `Checked out 13 times`


    `In stock`


    `...Book#2...`


    `Checked out 7 times`


    `In stock`


    Your results may be different because the random nature of the delay I added will
    vary the sequence in which objects are taken from and returned to the pool.


    Although your results may differ, the total number of times that the books were
    checked out should be `20`, which is the same number of GCD blocks created in
    the `main.swift` file. In my case, one `Book` object was checked out 13 times
    and the other was checked out 7 times. The difference is caused by the delay I
    added, which has led to the first `Book` object cycling through the pool several
    times while slower readers were holding onto the other object.


    ## Understanding the Pitfalls of the Object Pool Pattern


    Care is required when implementing the object pool pattern because it is easy
    to create a pool that doesn’t work or doesn’t suit the application to which it
    has been applied. It is easy to get carried away trying to create the perfect
    pool, especially when considering the variations that I describe in [Chapter 8](#A978-1-4842-0394-1_8_Chapter.html).
    The result can be code that is difficult to maintain and an unstable object pool
    that behaves unpredictably once it has been deployed.


    Care is also required when protecting an object pool against concurrent access
    in order to avoid creating a pool that locks up unexpectedly, even if it works
    during your development tests. Be conservative and give preference to safety over
    performance—and, most importantly, test your code with as many different usage
    scenarios as you can. I recommend keeping object pools as simple as you can and
    focus on producing something that works and can be easily tested.'
  trans: "\n### 消费池类\n\n既然已经创建了一个通用的池类，我就可以通过将其应用于管理一个`Book`对象集合，来完成对象池模式的应用。清单 7-5\
    \ 展示了我在名为`Library.swift`的新文件中定义的`Library`类的定义。\n\n**清单 7-5.** 在`Library.swift`文件中消费池类\n\
    \n```\nimport Foundation\n\nfinal class Library {\n\n    private let books:[Book];\n\
    \    private let pool:Pool<Book>;\n\n    private init(stockLevel:Int) {\n    \
    \    books = [Book]();\n        for count in 1 ... stockLevel {\n            books.append(Book(author:\
    \ \"Dickens, Charles\", title: \"Hard Times\",\n                stock: count))\n\
    \        }\n        pool = Pool<Book>(items:books);\n    }\n\n    private class\
    \ var singleton:Library {\n        struct SingletonWrapper {\n            static\
    \ let singleton = Library(stockLevel:2);\n        }\n        return SingletonWrapper.singleton;\n\
    \    }\n\n    class func checkoutBook(reader:String) -> Book? {\n        var book\
    \ = singleton.pool.getFromPool();\n        book?.reader = reader;\n        book?.checkoutCount++;\n\
    \        return book;\n    }\n\n    class func returnBook(book:Book) {\n     \
    \   book.reader = nil;\n        singleton.pool.returnToPool(book);\n    }\n\n\
    \    class func printReport() {\n        for book in singleton.books {\n     \
    \       println(\"...Book#\\(book.stockNumber)...\");\n            println(\"\
    Checked out \\(book.checkoutCount) times\");\n            if (book.reader != nil)\
    \ {\n                println(\"Checked out to \\(book.reader!)\");\n         \
    \   } else {\n                println(\"In stock\");\n            }\n        }\n\
    \    }\n}\n```\n\n`Library`类通过将我在清单 7-4 中定义的`Pool`类与我在第 6 章中描述的单例模式相结合，实现了对象池模式。我需要使用单例，因为在这个例子中应该只有一个`Library`，尽管`Library`本身可以有多个池，每个池管理单个书名下的多个副本。清单\
    \ 7-5 中的代码描绘了一个相当萧条的图书馆，其全部馆藏仅为查尔斯·狄更斯小说的两本副本。\n\n当你访问一个真实的图书馆时，如果有可用的书，你可以借阅所需副本；如果没有，你可以排队等候其他读者归还。图书馆提供了这些服务，但并不会让你了解其背后流程的运作方式。例如，你无需找到其他正在等待该书副本的人，并弄清楚归还的副本应如何分配。\n\
    \n### 宽松的对象创建策略\n\n请注意，我在不同的文件中定义了`Library`和`Book`类，并且没有阻止`Book`类在`Library`外部被实例化。在实现单例模式时，我使用了`private`构造函数并定义了访问类，因为我希望展示如何完全控制单例的创建。在本章中，我采取了更宽松的方法，因为我正在建模一个可能存在多个`Book`对象来源的环境，这代表了现实世界中书籍的多种来源（例如，出版商、图书批发商和在线商店都可以为图书馆提供书籍）。我不会在示例中构建所有可能的来源，但我想说明你可以使用此模式来管理对象，而无需限制其供应。只要与`Library`对象关联的`Book`对象未经其同意就不能被修改，我的模型就与现实世界保持一致。\n\
    \n现实世界中的图书馆如何管理其书籍的细节是隐藏的，这也是我在实现`Library`类时所采用的方法。我没有通过单例暴露`Pool<Book>`对象，而是定义了名为`checkoutBook`和`returnBook`的类型方法，这些方法代表调用者与池进行交互。这些方法还允许我在书籍被借出时对其进行预处理：我设置了`reader`属性的值，并递增了`checkoutCount`属性。当书籍被归还时，我会清除`reader`属性。\n\
    \n`checkoutCount`和`reader`属性都由`printReport`方法使用，该方法详细列出了`Library`创建的每个`Book`对象，记录了这本书被借出的次数以及它当前是否在池中。这是一个诊断方法，允许我在测试期间查看池所管理的书籍状态。清单\
    \ 7-6 展示了我在`main.swift`文件中用于测试`Library`类及其对`Pool`类使用的代码。\n\n**清单 7-6.** 在`main.swift`文件中测试\
    \ Library 和 Pool\n\n```\nimport Foundation\n\nvar queue = dispatch_queue_create(\"\
    workQ\", DISPATCH_QUEUE_CONCURRENT);\nvar group = dispatch_group_create();\n\n\
    println(\"Starting...\");\n\nfor i in 1 ... 20 {\n    dispatch_group_async(group,\
    \ queue, {() in\n        var book = Library.checkoutBook(\"reader#\\(i)\");\n\
    \        if (book != nil) {\n            NSThread.sleepForTimeInterval(Double(rand()\
    \ % 2));\n            Library.returnBook(book!);\n        }\n    });\n}\n\ndispatch_group_wait(group,\
    \ DISPATCH_TIME_FOREVER);\n\nprintln(\"All blocks complete\");\n\nLibrary.printReport();\n\
    ```\n\n这段代码使用一个`for`循环创建异步 GCD 块，这些块从`Library`借出并归还`Book`对象。为了使示例更逼真一些，我在获取到`Book`之后、归还它之前添加了一个延迟，如下所示：\n\
    \n```\n...\nNSThread.sleepForTimeInterval(Double(rand() % 2));\n...\n```\n\n`NSThread.sleepForTimeInterval`会暂停执行该语句的线程。我控制了休眠的持续时间，使其随机生成并强制为零秒或一秒，这意味着某些块会立即归还图书，而其他块则会在等待一秒钟后才归还图书。我这样做是因为我希望池中对象的使用能够重叠。如果没有延迟，这些对象将严格轮换地被借出和归还，这并非真实项目（当然，也非现实世界）中使用池对象的方式。\n\
    \n启动应用程序以查看结果。运行需要几秒钟，请耐心等待。当`main.swift`文件中生成的所有块都执行完毕后，你将看到类似于下面的输出：\n\n```\n\
    Starting...\nAll blocks complete\n...Book#1...\nChecked out 13 times\nIn stock\n\
    ...Book#2...\nChecked out 7 times\nIn stock\n```\n\n你的结果可能不同，因为我添加的延迟的随机性质会改变对象从池中取出和归还的顺序。\n\
    \n虽然你的结果可能不同，但书籍被借出的总次数应为`20`，这与`main.swift`文件中创建的 GCD 块数量相同。在我的例子中，一个`Book`对象被借出了\
    \ 13 次，另一个被借出了 7 次。这种差异是由我添加的延迟引起的，这导致第一个`Book`对象在池中循环了多次，而速度较慢的读者则持有了另一个对象。\n\
    \n## 理解对象池模式的陷阱\n\n实现对象池模式时需要小心，因为很容易创建一个不起作用或不适合其所用应用程序的池。很容易被创建完美池的想法冲昏头脑，尤其是在考虑到我在第\
    \ 8 章中描述的变体时。结果可能是代码难以维护，以及一个部署后行为不可预测的不稳定对象池。\n\n在保护对象池免受并发访问时也需要小心，以避免创建一个会意外锁死的池，即使它在你的开发测试期间能正常运行。要保守一点，优先考虑安全性而非性能——最重要的是，尽可能用多种不同的使用场景测试你的代码。我建议尽可能保持对象池的简单，专注于产生一个能够工作且易于测试的东西。\n"
- fmt: "# Examples of the Object Pool Pattern in Cocoa\n\nThe Cocoa frameworks do\
    \ not expose objects pools in their public APIs, with one commonly encountered\
    \ exception: table cell objects. You can see an example in the SportsStore application,\
    \ where `UITableViewCell` objects are used to display rows in the table view.\
    \ Listing 7-7 shows the implementation of the `tableView` method in the `ViewController.swift`\
    \ file from the `SportsStore` project.\n\nListing 7-7. Getting a (Potentially)\
    \ Pooled `UITableViewCell` in the `ViewController.swift` File\n\n```\n...\n\n\
    func tableView(tableView: UITableView,\ncellForRowAtIndexPath indexPath: NSIndexPath)\
    \ -> UITableViewCell {\n    let product = products[indexPath.row];\n    let cell\
    \ = tableView.dequeueReusableCellWithIdentifier(\"ProductCell\")\n        as ProductTableCell;\n\
    \    cell.product = products[indexPath.row];\n    cell.nameLabel.text = product.name;\n\
    \    cell.descriptionLabel.text = product.productDescription;\n    cell.stockStepper.value\
    \ = Double(product.stockLevel);\n    cell.stockField.text = String(product.stockLevel);\n\
    \    return cell;\n}\n\n...\n```\n\nThis is the method that is called to obtain\
    \ a `UITableViewCell` object for display, and the highlighted statement shows\
    \ that I obtain the `UITableView` object by making a call to the `dequeueReusableCellWithIdentifier`\
    \ method defined by the `UITableView` class. The `UIKit` framework manages the\
    \ creation and allocation of `UITableViewCell` objects so they can be reused.\
    \ Apple doesn't publish the source code to the `UIKit` framework, so it is not\
    \ possible to see how the pool is implemented, but this is an example of a pool\
    \ being used to offset an expensive initialization by reusing the object.\n\n\
    Tip\n\nThe `dequeueReusableCellWithIdentifier` method combines the object pool\
    \ and factory method patterns. I describe the factory method pattern in [Chapter\
    \ 9](#A978-1-4842-0394-1_9_Chapter.html), but the short description is that tables\
    \ can be populated with different types of table cells, and the method argument—`ProductCell`\
    \ in this case—is used to differentiate between them.\n\n# Applying the Pattern\
    \ to the SportsStore Application\n\nI am going to apply the object pool pattern\
    \ to the SportsStore application in order to manage a pool of network request\
    \ objects. Currently, the SportsStore application has a static array of `Product`\
    \ objects that are displayed to the user, and I am going to replace this with\
    \ a series of network calls that get details of the products and update the server\
    \ when the stock level changes.\n\n## Preparing the Example Application\n\nI am\
    \ going to pick up the SportsStore project as I left it at the end of [Chapter\
    \ 6](#A978-1-4842-0394-1_6_Chapter.html), and no preparation is required for this\
    \ chapter.\n\nTip\n\nRemember that you can download the source code for every\
    \ stage of the SportsStore project—along with every other example in this book—from\
    \ [`Apress.com`](https://Apress.com).\n\n## Creating the (Fake) Server\n\nI don't\
    \ want to get into the details of creating and setting up a server, so I am going\
    \ to simulate the request and responses, but the demonstration of creating and\
    \ applying the pool will be unaffected. I added a file called `NetworkConnection.swift`\
    \ to the SportsStore project and used it to define the class shown in Listing\
    \ 7-8.\n\nListing 7-8. The Contents of the `NetworkConnection.swift` File\n\n\
    ```\nimport Foundation\n\nclass NetworkConnection {\n    private let stockData:\
    \ [String: Int] = [\n        \"Kayak\" : 10, \"Lifejacket\": 14, \"Soccer Ball\"\
    : 32,\"Corner Flags\": 1,\n        \"Stadium\": 4, \"Thinking Cap\": 8, \"Unsteady\
    \ Chair\": 3,\n        \"Human Chess Board\": 2, \"Bling-Bling King\":4\n    ];\n\
    \n    func getStockLevel(name:String) -> Int? {\n        NSThread.sleepForTimeInterval(Double(rand()\
    \ % 2));\n        return stockData[name];\n    }\n}\n```\n\nThe `NetworkConnection`\
    \ class is the template for the objects that I manage in the object pool. There\
    \ is a private `stockData` property that is set to the dictionary containing the\
    \ initial stock levels for the SportsStore products, indexed by name. The `getStockLevel`\
    \ method looks up a product in the dictionary and returns the stock level value.\
    \ I have used the `NSThread.sleepForTimeInterval` method to add a random delay\
    \ of one second to some requests.\n\n## Creating the Object Pool\n\nThe pools\
    \ I demonstrated in earlier examples were all generic classes, which make it easy\
    \ to reuse classes in different projects. For variety I have implemented the object\
    \ pool for the SportsStore to operate on a specific type: the `NetworkConnection`\
    \ class. Listing 7-9 shows the contents of the `NetworkPool.swift` file, which\
    \ I added to the SportsStore project.\n\nListing 7-9. The Contents of the `NetworkPool.swift`\
    \ File\n\n```\nimport Foundation\n\nfinal class NetworkPool {\n    private let\
    \ connectionCount = 3;\n    private var connections = [NetworkConnection]();\n\
    \    private var semaphore:dispatch_semaphore_t;\n    private var queue:dispatch_queue_t;\n\
    \n    private init() {\n        for _ in 0 ..< connectionCount {\n           \
    \ connections.append(NetworkConnection());\n        }\n        semaphore = dispatch_semaphore_create(connectionCount);\n\
    \        queue = dispatch_queue_create(\"networkpoolQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    }\n\n    private func doGetConnection() -> NetworkConnection {\n        dispatch_semaphore_wait(semaphore,\
    \ DISPATCH_TIME_FOREVER);\n        var result:NetworkConnection? = nil;\n    \
    \    dispatch_sync(queue, {() in\n            result = self.connections.removeAtIndex(0);\n\
    \        });\n        return result!;\n    }\n\n    private func doReturnConnection(conn:NetworkConnection)\
    \ {\n        dispatch_async(queue, {() in\n            self.connections.append(conn);\n\
    \            dispatch_semaphore_signal(self.semaphore);\n        });\n    }\n\n\
    \    class func getConnection() -> NetworkConnection {\n        return sharedInstance.doGetConnection();\n\
    \    }\n\n    class func returnConnecton(conn:NetworkConnection) {\n        sharedInstance.doReturnConnection(conn);\n\
    \    }\n\n    private class var sharedInstance:NetworkPool {\n        get {\n\
    \            struct SingletonWrapper {\n                static let singleton =\
    \ NetworkPool();\n            }\n            return SingletonWrapper.singleton;\n\
    \        }\n    }\n}\n```\n\nThis is a pool that manages a collection of `NetworkConnection`\
    \ objects, following the basic pattern I created earlier in the chapter. The `NetworkPool`\
    \ class implements the object pool pattern, but it also uses the singleton pattern\
    \ from [Chapter 6](#A978-1-4842-0394-1_6_Chapter.html) so that other components\
    \ in the application can locate the pool easily."
  raw: '## Examples of the Object Pool Pattern in Cocoa


    The Cocoa frameworks do not expose objects pools in their public APIs, with one
    commonly encountered exception: table cell objects. You can see an example in
    the SportsStore application, where `UITableViewCell` objects are used to display
    rows in the table view. Listing 7-7 shows the implementation of the `tableView`
    method in the `ViewController.swift` file from the `SportsStore` project.


    Listing 7-7. Getting a (Potentially) Pooled UITableViewCell in the ViewController.swift
    File


    `...`


    `func tableView(tableView: UITableView,`


    `cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell {`


    `let product = products[indexPath.row];`


    `let cell = tableView.dequeueReusableCellWithIdentifier("ProductCell")`


    `as ProductTableCell;`


    `cell.product = products[indexPath.row];`


    `cell.nameLabel.text = product.name;`


    `cell.descriptionLabel.text = product.productDescription;`


    `cell.stockStepper.value = Double(product.stockLevel);`


    `cell.stockField.text = String(product.stockLevel);`


    `return cell;`


    `}`


    `...`


    This is the method that is called to obtain a `UITableViewCell` object for display,
    and the highlighted statement shows that I obtain the `UITableView` object by
    making a call to the `dequeueReusableCellWithIdentifier` method defined by the
    `UITableView` class. The `UIKit` framework manages the creation and allocation
    of `UITableViewCell` objects so they can be reused. Apple doesn’t publish the
    source code to the `UIKit` framework, so it is not possible to see how the pool
    is implemented, but this is an example of a pool being used to offset an expensive
    initialization by reusing the object.


    Tip


    The `dequeueReusableCellWithIdentifier method` combines the object pool and factory
    method patterns. I describe the factory method pattern in [Chapter 9](#A978-1-4842-0394-1_9_Chapter.html),
    but the short description is that tables can be populated with different types
    of table cells, and the method argument—`ProductCell` in this case—is used to
    differentiate between them.


    ## Applying the Pattern to the SportsStore Application


    I am going to apply the object pool pattern to the SportsStore application in
    order to manage a pool of network request objects. Currently, the SportsStore
    application has a static array of `Product` objects that are displayed to the
    user, and I am going to replace this with a series of network calls that get details
    of the products and update the server when the stock level changes.


    ### Preparing the Example Application


    I am going to pick up the SportsStore project as I left it as the end of [Chapter
    6](#A978-1-4842-0394-1_6_Chapter.html), and no preparation is required for this
    chapter.


    Tip


    Remember that you can download the source code for every stage of the SportsStore
    project—along with every other example in this book—from [`Apress.com`](https://Apress.com)
    .


    ### Creating the (Fake) Server


    I don’t want to get into the details of creating and setting up a server, so I
    am going to simulate the request and responses, but the demonstration of creating
    and applying the pool will be unaffected. I added a file called `NetworkConnection.swift`
    to the SportsStore project and used it to define the class shown in Listing 7-8.


    Listing 7-8. The Contents of the NetworkConnection.swift File


    `import Foundation`


    `class NetworkConnection {`


    `private let stockData: [String: Int] = [`


    `"Kayak" : 10, "Lifejacket": 14, "Soccer Ball": 32,"Corner Flags": 1,`


    `"Stadium": 4, "Thinking Cap": 8, "Unsteady Chair": 3,`


    `"Human Chess Board": 2, "Bling-Bling King":4`


    `];`


    `func getStockLevel(name:String) -> Int? {`


    `NSThread.sleepForTimeInterval(Double(rand() % 2));`


    `return stockData[name];`


    `}`


    `}`


    The `NetworkConnection` class is the template for the objects that I manage in
    the object pool. There is a private `stockData` property that is set to the dictionary
    containing the initial stock levels for the SportsStore products, indexed by name.
    The `getStockLevel` method looks up a product in the dictionary and returns the
    stock level value. I have used the `NSThread.sleepForTimeInterval` method to add
    a random delay of one second to some requests.


    ### Creating the Object Pool


    The pools I demonstrated in earlier examples were all generic classes, which make
    it easy to reuse classes in different projects. For variety I have implemented
    the object pool for the SportsStore to operate on a specific type: the `NetworkConnection`
    class. Listing 7-9 shows the contents of the `NetworkPool.swift` file, which I
    added to the SportsStore project.


    Listing 7-9. The Contents of the NetworkPool.swift File


    `import Foundation`


    `final class NetworkPool {`


    `private let connectionCount = 3;`


    `private var connections = [NetworkConnection]();`


    `private var semaphore:dispatch_semaphore_t;`


    `private var queue:dispatch_queue_t;`


    `private init() {`


    `for _ in 0 ..< connectionCount {`


    `connections.append(NetworkConnection());`


    `}`


    `semaphore = dispatch_semaphore_create(connectionCount);`


    `queue = dispatch_queue_create("networkpoolQ", DISPATCH_QUEUE_SERIAL);`


    `}`


    `private func doGetConnection() -> NetworkConnection {`


    `dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER);`


    `var result:NetworkConnection? = nil;`


    `dispatch_sync(queue, {() in`


    `result = self.connections.removeAtIndex(0);`


    `});`


    `return result!;`


    `}`


    `private func doReturnConnection(conn:NetworkConnection) {`


    `dispatch_async(queue, {() in`


    `self.connections.append(conn);`


    `dispatch_semaphore_signal(self.semaphore);`


    `});`


    `}`


    `class func getConnection() -> NetworkConnection {`


    `return sharedInstance.doGetConnection();`


    `}`


    `class func returnConnecton(conn:NetworkConnection) {`


    `sharedInstance.doReturnConnection(conn);`


    `}`


    `private class var sharedInstance:NetworkPool {`


    `get {`


    `struct SingletonWrapper {`


    `static let singleton = NetworkPool();`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `}`


    `}`


    This is a pool that manages a collection of `NetworkConnection` objects, following
    the basic pattern I created earlier in the chapter. The `NetworkPool` class implements
    the object pool pattern, but it also uses the singleton pattern from [Chapter
    6](#A978-1-4842-0394-1_6_Chapter.html) so that other components in the application
    can locate the pool easily.'
  trans: "\n# Cocoa 中对象池模式的示例\n\nCocoa 框架在其公开 API 中并未暴露对象池，唯有一个常见的例外：表格单元格对象。你可以在\
    \ SportsStore 应用中看到相关示例，其中使用 `UITableViewCell` 对象来显示表格视图中的行。清单 7-7 展示了 SportsStore\
    \ 项目中 `ViewController.swift` 文件里 `tableView` 方法的实现。\n\n清单 7-7 在 `ViewController.swift`\
    \ 文件中获取（潜在）池化的 `UITableViewCell`\n\n```\n...\n\nfunc tableView(tableView: UITableView,\n\
    cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell {\n    let product\
    \ = products[indexPath.row];\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    ProductCell\")\n        as ProductTableCell;\n    cell.product = products[indexPath.row];\n\
    \    cell.nameLabel.text = product.name;\n    cell.descriptionLabel.text = product.productDescription;\n\
    \    cell.stockStepper.value = Double(product.stockLevel);\n    cell.stockField.text\
    \ = String(product.stockLevel);\n    return cell;\n}\n\n...\n```\n\n这是为显示而获取 `UITableViewCell`\
    \ 对象时调用的方法。高亮语句显示，我通过调用 `UITableView` 类定义的 `dequeueReusableCellWithIdentifier`\
    \ 方法来获取 `UITableView` 对象。`UIKit` 框架管理着 `UITableViewCell` 对象的创建和分配，以便它们可以被复用。苹果并未公开\
    \ `UIKit` 框架的源代码，因此无法查看池的具体实现，但这正是一个通过复用对象来抵消昂贵初始化的池化示例。\n\n提示\n\n`dequeueReusableCellWithIdentifier`\
    \ 方法结合了对象池和工厂方法模式。我在第 9 章中描述了工厂方法模式，简而言之，表格可以通过不同类型的表格单元格来填充，而方法参数（此处为 `ProductCell`）用于区分它们。\n\
    \n# 将模式应用于 SportsStore 应用\n\n我打算将对象池模式应用于 SportsStore 应用，以管理网络请求对象池。目前，SportsStore\
    \ 应用有一个静态的 `Product` 对象数组展示给用户，我将用一系列网络调用来替换它，这些调用会获取产品详情，并在库存水平变化时更新服务器。\n\n\
    ## 准备示例应用\n\n我将从第 6 章结束时的 SportsStore 项目继续，本章无需任何前期准备。\n\n提示\n\n请记住，你可以从 [`Apress.com`](https://Apress.com)\
    \ 下载 SportsStore 项目每个阶段以及本书所有其他示例的源代码。\n\n## 创建（虚拟）服务器\n\n我不想深入探讨创建和设置服务器的细节，因此我将模拟请求和响应，但这不会影响创建和应用池的演示。我在\
    \ SportsStore 项目中添加了一个名为 `NetworkConnection.swift` 的文件，并用它来定义清单 7-8 所示的类。\n\n\
    清单 7-8 `NetworkConnection.swift` 文件的内容\n\n```\nimport Foundation\n\nclass NetworkConnection\
    \ {\n    private let stockData: [String: Int] = [\n        \"Kayak\" : 10, \"\
    Lifejacket\": 14, \"Soccer Ball\": 32,\"Corner Flags\": 1,\n        \"Stadium\"\
    : 4, \"Thinking Cap\": 8, \"Unsteady Chair\": 3,\n        \"Human Chess Board\"\
    : 2, \"Bling-Bling King\":4\n    ];\n\n    func getStockLevel(name:String) ->\
    \ Int? {\n        NSThread.sleepForTimeInterval(Double(rand() % 2));\n       \
    \ return stockData[name];\n    }\n}\n```\n\n`NetworkConnection` 类是我在对象池中管理的对象的模板。它有一个私有的\
    \ `stockData` 属性，该属性被设置为包含 SportsStore 产品初始库存水平的字典，并以产品名称作为索引。`getStockLevel`\
    \ 方法在字典中查找产品并返回库存水平值。我使用了 `NSThread.sleepForTimeInterval` 方法为某些请求添加了一秒的随机延迟。\n\
    \n## 创建对象池\n\n我在前面示例中演示的对象池都是泛型类，这使得在不同的项目中复用类变得容易。为了增加多样性，我为 SportsStore 实现了一个针对特定类型（`NetworkConnection`\
    \ 类）的对象池。清单 7-9 显示了我添加到 SportsStore 项目中的 `NetworkPool.swift` 文件的内容。\n\n清单 7-9\
    \ `NetworkPool.swift` 文件的内容\n\n```\nimport Foundation\n\nfinal class NetworkPool\
    \ {\n    private let connectionCount = 3;\n    private var connections = [NetworkConnection]();\n\
    \    private var semaphore:dispatch_semaphore_t;\n    private var queue:dispatch_queue_t;\n\
    \n    private init() {\n        for _ in 0 ..< connectionCount {\n           \
    \ connections.append(NetworkConnection());\n        }\n        semaphore = dispatch_semaphore_create(connectionCount);\n\
    \        queue = dispatch_queue_create(\"networkpoolQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    }\n\n    private func doGetConnection() -> NetworkConnection {\n        dispatch_semaphore_wait(semaphore,\
    \ DISPATCH_TIME_FOREVER);\n        var result:NetworkConnection? = nil;\n    \
    \    dispatch_sync(queue, {() in\n            result = self.connections.removeAtIndex(0);\n\
    \        });\n        return result!;\n    }\n\n    private func doReturnConnection(conn:NetworkConnection)\
    \ {\n        dispatch_async(queue, {() in\n            self.connections.append(conn);\n\
    \            dispatch_semaphore_signal(self.semaphore);\n        });\n    }\n\n\
    \    class func getConnection() -> NetworkConnection {\n        return sharedInstance.doGetConnection();\n\
    \    }\n\n    class func returnConnecton(conn:NetworkConnection) {\n        sharedInstance.doReturnConnection(conn);\n\
    \    }\n\n    private class var sharedInstance:NetworkPool {\n        get {\n\
    \            struct SingletonWrapper {\n                static let singleton =\
    \ NetworkPool();\n            }\n            return SingletonWrapper.singleton;\n\
    \        }\n    }\n}\n```\n\n这是一个管理 `NetworkConnection` 对象集合的池，遵循我在本章前面创建的基本模式。`NetworkPool`\
    \ 类实现了对象池模式，但它也使用了第 6 章中的单例模式，以便应用中的其他组件能够轻松定位到此池。\n"
- fmt: "### Applying the Object Pool\n\nTo apply the pool, I have created a class\
    \ called `ProductDataStore`, into which I have moved the statically defined product\
    \ data—albeit without stock level information. Listing 7-10 shows the contents\
    \ of the `ProductDataStore.swift` file, which I added to the SportsStore project.\n\
    \n**Listing 7-10.** The Contents of the `ProductDataStore.swift` File\n\n```\n\
    import Foundation\n\nfinal class ProductDataStore {\n\n    var callback:((Product)\
    \ -> Void)?;\n\n    private var networkQ:dispatch_queue_t\n\n    private var uiQ:dispatch_queue_t;\n\
    \n    lazy var products:[Product] = self.loadData();\n\n    init() {\n       \
    \ networkQ = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);\n\
    \        uiQ = dispatch_get_main_queue();\n    }\n\n    private func loadData()\
    \ -> [Product] {\n        for p in productData {\n            dispatch_async(self.networkQ,\
    \ {() in\n                let stockConn = NetworkPool.getConnection();\n     \
    \           let level = stockConn.getStockLevel(p.name);\n                if (level\
    \ != nil) {\n                    p.stockLevel = level!;\n                    dispatch_async(self.uiQ,\
    \ {() in\n                        if (self.callback != nil) {\n              \
    \              self.callback!(p);\n                        }\n               \
    \     })\n                }\n                NetworkPool.returnConnecton(stockConn);\n\
    \            });\n        }\n        return productData;\n    }\n\n    private\
    \ var productData:[Product] = [\n        Product(name:\"Kayak\", description:\"\
    A boat for one person\",\n            category:\"Watersports\", price:275.0, stockLevel:0),\n\
    \        Product(name:\"Lifejacket\", description:\"Protective and fashionable\"\
    ,\n            category:\"Watersports\", price:48.95, stockLevel:0),\n       \
    \ Product(name:\"Soccer Ball\", description:\"FIFA-approved size and weight\"\
    ,\n            category:\"Soccer\", price:19.5, stockLevel:0),\n        Product(name:\"\
    Corner Flags\",\n            description:\"Give your playing field a professional\
    \ touch\",\n            category:\"Soccer\", price:34.95, stockLevel:0),\n   \
    \     Product(name:\"Stadium\", description:\"Flat-packed 35,000-seat stadium\"\
    ,\n            category:\"Soccer\", price:79500.0, stockLevel:0),\n        Product(name:\"\
    Thinking Cap\", description:\"Improve your brain efficiency\",\n            category:\"\
    Chess\", price:16.0, stockLevel:0),\n        Product(name:\"Unsteady Chair\",\n\
    \            description:\"Secretly give your opponent a disadvantage\",\n   \
    \         category: \"Chess\", price: 29.95, stockLevel:0),\n        Product(name:\"\
    Human Chess Board\", description:\"A fun game for the family\",\n            category:\"\
    Chess\", price:75.0, stockLevel:0),\n        Product(name:\"Bling-Bling King\"\
    ,\n            description:\"Gold-plated, diamond-studded King\",\n          \
    \  category:\"Chess\", price:1200.0, stockLevel:0)];\n}\n```\n\nThe `ProductDataStore`\
    \ has become the authoritative source for `Product` objects in the SportsStore\
    \ app. `Product` objects are obtained through the `products` property, which returns\
    \ the contents of a private array. The `Product` objects are defined with zero\
    \ `stockLevel` values, but the `products` property is lazily computed and uses\
    \ the `NetworkPool` class to request the current stock levels for each product.\
    \ When the request completes, the `Product` object is updated, and an optional\
    \ callback is invoked to provide notification of the new information.\n\n**Tip**\
    \  \nIn a real project, it would make sense to get all of the stock levels in\
    \ a single request, but for the purposes of this chapter I want to exercise the\
    \ pool with more requests than there are pooled objects.\n\nNotice that I have\
    \ used two GCD queues in this class. I obtain a global queue—one that is created\
    \ automatically by GCD—with background priority in order to execute the simulated\
    \ network requests. Using background priority means that delays in getting the\
    \ stock information don’t prevent more important tasks from being performed, such\
    \ as responding to user interaction. When I handle the callback, I use the main\
    \ application queue to ensure that updates are performed immediately and not deferred\
    \ until the background tasks are complete.\n\nListing 7-11 shows the changes I\
    \ have made to the `ViewController.swift` file to use the `ProductDataStore` class,\
    \ rather than define the data locally.\n\n**Listing 7-11.** Using the `ProductDataSource`\
    \ Class in the `ViewController.swift` File\n\n```\nimport UIKit\n\nclass ProductTableCell:\
    \ UITableViewCell {\n    // ...statements omitted for brevity...\n}\n\nclass ViewController:\
    \ UIViewController, UITableViewDataSource {\n    @IBOutlet weak var totalStockLabel:\
    \ UILabel!\n    @IBOutlet weak var tableView: UITableView!\n\n    var productStore\
    \ = ProductDataStore();\n\n    override func viewDidLoad() {\n        super.viewDidLoad();\n\
    \        displayStockTotal();\n\n        productStore.callback = {(p:Product)\
    \ in\n            for cell in self.tableView.visibleCells() {\n              \
    \  if let pcell = cell as? ProductTableCell {\n                    if pcell.product?.name\
    \ == p.name {\n                        pcell.stockStepper.value = Double(p.stockLevel);\n\
    \                        pcell.stockField.text = String(p.stockLevel);\n     \
    \               }\n                }\n            }\n            self.displayStockTotal();\n\
    \        }\n    }\n\n    override func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning();\n\
    \    }\n\n    func tableView(tableView: UITableView,\n        numberOfRowsInSection\
    \ section: Int) -> Int {\n            return productStore.products.count;\n  \
    \  }\n\n    func tableView(tableView: UITableView,\n        cellForRowAtIndexPath\
    \ indexPath: NSIndexPath) -> UITableViewCell {\n            let product = productStore.products[indexPath.row];\n\
    \            let cell = tableView.dequeueReusableCellWithIdentifier(\"ProductCell\"\
    )\n                as ProductTableCell;\n            cell.product = product;\n\
    \            cell.nameLabel.text = product.name;\n            cell.descriptionLabel.text\
    \ = product.productDescription;\n            cell.stockStepper.value = Double(product.stockLevel);\n\
    \            cell.stockField.text = String(product.stockLevel);\n            return\
    \ cell;\n    }\n\n    @IBAction func stockLevelDidChange(sender: AnyObject) {\n\
    \        // ...statements omitted for brevity...\n    }\n\n    func displayStockTotal()\
    \ {\n        let finalTotals:(Int, Double) = productStore.products.reduce((0,\
    \ 0.0),\n            {(totals, product) -> (Int, Double) in\n                return\
    \ (\n                    totals.0 + product.stockLevel,\n                    totals.1\
    \ + product.stockValue\n                );\n        });\n        totalStockLabel.text\
    \ = \"\\(finalTotals.0) Products in Stock. \"\n            + \"Total Value: \\\
    (Utils.currencyStringFromNumber(finalTotals.1))\";\n    }\n}\n```\n\nI have defined\
    \ a `productStore` property that is assigned a `ProductDataStore` object and from\
    \ which the `Product` objects are obtained for display. I have also defined the\
    \ callback closure that locates the table cell being used to display the `Product`—if\
    \ it is visible—and updates the stock level it displays.\n\nThe effect you will\
    \ see when running the app is that the stock values will be initially displayed\
    \ as zero and then updated as objects are checked out from the pool and used to\
    \ make (simulated) network requests. The random delay that I added in the `NetworkConnection`\
    \ class means that the updates will arrive gradually as the pool limits the number\
    \ of concurrent requests.\n\n## Summary\n\nIn this chapter I explained how to\
    \ apply the basic object pool pattern to manage a collection of objects. In the\
    \ next chapter, I show you how to vary the way that the object pool works to manage\
    \ objects with different usage patterns."
