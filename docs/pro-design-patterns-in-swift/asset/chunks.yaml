    The changes are simple enough. I redefined the constant `CarPart` array as a variable
    and added `addPart` and `removePart` methods. However, these changes mean that
    components that change the data structure need to know that the `CompositePart`
    class defines `addPart` and `removePart` methods and need to understand the difference
    between the `CompositePart` and `Part` classes in order to add and remove parts.


    The changes in Listing 15-7 undermine the benefit of the composite pattern. A
    common attempt to address this problem is to include the methods in the protocol
    in order to harmonize the API implemented by the leaf node and composite objects,
    as shown in Listing 15-8.


    Listing 15-8. Attempting to Harmonize the API in the CarParts.swift File


    `protocol CarPart {`


    `var name:String { get };`


    `var price:Float { get };`


    `func addPart(part:CarPart) -> Void;`


    `func removePart(part:CarPart) -> Void;`


    `}`


    `class Part : CarPart {`


