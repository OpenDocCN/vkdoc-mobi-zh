    \n## Summary\n\nIn this chapter I showed you how the façade pattern can be used\
    \ to hide complex APIs and the coordination between objects required to perform\
    \ a task. The façade presents a simplified API, which is consumed by calling components,\
    \ and the effect is to consolidate the complexity into a single class. The façade\
    \ pattern can be used to create opaque and transparent facades, which take different\
    \ approaches to the way that the underlying complexity is made available. Opaque\
    \ façades hide all of the complexity, while transparent façades allow calling\
    \ components to access some or all of the underlying objects to perform advanced\
    \ tasks. In the next chapter, I describe the flyweight pattern, which allows data\
    \ to be shared between objects to reduce the memory footprint of an application.\n\
    \n# 17. The Flyweight Pattern\n\nThe flyweight pattern is applied when a number\
    \ of similar objects all rely on the same set of data values. Rather than create\
    \ a new set of data valued for each of the objects, the flyweight pattern shares\
    \ one set between all of them, minimizing the amount of memory required to store\
    \ the data and the amount of work required to create them. Table [17-1](#A978-1-4842-0394-1_17_Chapter.html#Tab1)\
    \ puts the flyweight pattern into context.\n\n**Table 17-1.** Putting the Flyweight\
    \ Pattern into Context\n\n| Question | Answer |\n| --- | --- |\n| What is it?\
    \ | The flyweight pattern shares common data objects between multiple calling\
    \ components. |\n| What are the benefits? | The flyweight pattern reduces the\
    \ amount of memory needed to create the data objects required by the calling components\
    \ and the amount of work required to create them. The impact of implementing the\
    \ pattern increases with the number of calling components that share the data.\
    \ |\n| When should you use this pattern? | Use this pattern when you are able\
    \ to identify and isolate sets of identical data objects that are used by calling\
    \ components. |\n| When should you avoid this pattern? | Do not use this pattern\
    \ if there is no shared data or if the number of shared data objects is small\
    \ and easy to create. |\n| How do you know when you have implemented the pattern\
    \ correctly? | The pattern has been implemented correctly when all of the calling\
    \ components rely on the same set of immutable shared data objects (known as the\
    \ extrinsic data) and have their own individual state data (known as the intrinsic\
    \ data). The calling components should be able to concurrently modify the intrinsic\
    \ data safely and not be able to modify the extrinsic data at all. |\n| Are there\
    \ any common pitfalls? | The common pitfalls include inadvertently creating more\
    \ than one set of extrinsic data objects, not protecting against concurrent operations\
    \ on the intrinsic data, allowing the extrinsic data to be modified, and over-optimizing\
    \ the creation of extrinsic objects. |\n| Are there any related patterns? | Many\
    \ of the structural patterns have similar implementations but different intents.\
    \ Ensure that you select the correct pattern from the ones I describe in this\
    \ part of the book. |\n\n## Preparing the Example Project\n\nFor this chapter,\
    \ I created an Xcode OS X Command Line Tool project called `Flyweight`. I added\
    \ a file called `Spreadsheet.swift`, the contents of which are shown in Listing\
    \ 17-1.\n\nListing 17-1. The Contents of the Spreadsheet.swift File\n\n```\nfunc\
    \ == (lhs: Coordinate, rhs: Coordinate) -> Bool {\n    return lhs.col == rhs.col\
    \ && lhs.row == rhs.row;\n}\n\nclass Coordinate : Hashable, Printable {\n    let\
    \ col:Character;\n    let row:Int;\n\n    init(col:Character, row:Int) {\n   \
    \     self.col = col; self.row = row;\n    }\n\n    var hashValue: Int {\n   \
    \     return description.hashValue;\n    }\n\n    var description: String {\n\
    \        return \"\\(col)(\\row)\";\n    }\n}\n\nclass Cell {\n    var coordinate:Coordinate;\n\
    \    var value:Int;\n\n    init(col:Character, row:Int, val:Int) {\n        self.coordinate\
    \ = Coordinate(col: col, row: row);\n        self.value = val;\n    }\n}\n\nclass\
    \ Spreadsheet {\n    var grid = Dictionary<Coordinate, Cell>();\n\n    init()\
    \ {\n        let letters:String = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\";\n        var\
    \ stringIndex = letters.startIndex;\n        let rows = 50;\n        do {\n  \
    \          let colLetter = letters[stringIndex];\n            stringIndex = stringIndex.successor();\n\
    \            for rowIndex in 1 ... rows {\n                let cell = Cell(col:\
    \ colLetter, row: rowIndex, val: rowIndex);\n                grid[cell.coordinate]\
    \ = cell;\n            }\n        } while (stringIndex != letters.endIndex);\n\
    \    }\n\n    func setValue(coord: Coordinate, value:Int) {\n        grid[coord]?.value\
    \ = value;\n    }\n\n    var total:Int {\n        return reduce(grid.values, 0,\n\
    \            {total, cell in return total + cell.value});\n    }\n}\n```\n\nThe\
    \ `Spreadsheet` class has a `Dictionary` property that stores a collection of\
    \ `Cell` objects, each of which is indexed by a `Coordinate` object. The `Coordinate`\
    \ stores a column and row value, such as `A45`, where `A` is the column and `45`\
    \ is the row, in order to create a grid. The `Cell` object is used to store an\
    \ `Int` value at a given position in the grid and also has details of the coordinate\
    \ that its value relates to. The initializer for the `Spreadsheet` class creates\
    \ a grid with 26 columns and 50 rows and sets the `value` property of each `Cell`\
    \ to the row index. The `setValue` method changes the `value` property of a `Cell`\
    \ at a specified `Coordinate`, and the `total` property computes the sum of the\
    \ `value` properties of all the `Cell` objects in the grid.\n\n**Tip:** The global\
    \ function called `==` compares two `Coordinate` objects for equality, which allows\
    \ them to be used as keys in a `Dictionary` collection."
