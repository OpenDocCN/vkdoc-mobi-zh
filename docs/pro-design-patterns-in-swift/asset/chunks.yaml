    `}`


    `}`


    The `Communicator` class provides methods that allow standard and secure messages
    to be sent. The mechanisms by which these messages are processed are defined by
    the `ClearMessageChannel` and `SecureMessageChannel` protocols, each of which
    defines the methods required to handle one type of communication.


    I am going to support two different networking mechanisms that can be used to
    transmit messages: landline and wireless. I created a file called `Channels.swift`
    and used it to create the classes shown in Listing 13-2.


    Listing 13-2. The Contents of the Channels.swift File


    `class Landline : ClearMessageChannel {`


    `func send(message: String) {`


    `println("Landline: \(message)");`


    `}`


    `}`


    `class SecureLandLine : SecureMessageChannel {`


    `func sendEncryptedMessage(message: String) {`


    `println("Secure Landline: \(message)");`


    `}`


    `}`


    `class Wireless : ClearMessageChannel {`


    `func send(message: String) {`


    `println("Wireless: \(message)");`


    `}`


    `}`


    `class SecureWireless : SecureMessageChannel {`


    `func sendEncryptedMessage(message: String) {`


    `println("Secure Wireless: \(message)");`


    `}`


    `}`


    To complete the preparations, I added code to the `main.swift` file that creates
    the channels it requires to send messages and uses them to create a `Communicator`
    object, as shown in Listing 13-3.


    Listing 13-3. The Contents of the main.swift File


    `var clearChannel = Landline();`


    `var secureChannel = SecureLandLine();`


    `var comms = Communicator(clearChannel: clearChannel, secureChannel: secureChannel);`


    `comms.sendCleartextMessage("Hello!");`


    `comms.sendSecureMessage("This is a secret");`


    Running the project produces the following output in the Xcode debug console:


    `Landline: Hello!`


    `Secure Landline: This is a secret`


    ## Understanding the Problem That the Pattern Solves


    If the code I added to the example application seems poorly thought out, it is
    because I added all of the classes in one go. The problem that the bridge pattern
    solves is one that usually manifests itself gradually as features are added to
    an application and code is refactored.


    What I have ended up with is two features (clear and secure messages) and two
    platforms on which those features are implemented (landlines and wireless networks).
    No one sets out to create this kind of hierarchy, and it usually gets created
    through the best of intentions. An application usually started with one feature
    and one platform, as shown in Figure [13-1](#A978-1-4842-0394-1_13_Chapter.html#Fig1).


    ![A978-1-4842-0394-1_13_Fig1_HTML.jpg](A978-1-4842-0394-1_13_Fig1_HTML.jpg)


    Figure 13-1.


    The simple starting point for an application


    At some point, another platform is required, and the selection of that platform
    will need to change based on how the application is configured. Some judicious
    refactoring adds a protocol that identifies what the platform needs to do, and
    implementation classes that handle the details of the platform are created, as
    shown in Figure [13-2](#A978-1-4842-0394-1_13_Chapter.html#Fig2).


    ![A978-1-4842-0394-1_13_Fig2_HTML.jpg](A978-1-4842-0394-1_13_Fig2_HTML.jpg)


    Figure 13-2.


    Dealing with multiple platforms


    Later, there is a need to add a new feature—secure messaging—and so another protocol
    is added and implementation objects are created, as shown in Figure [13-3](#A978-1-4842-0394-1_13_Chapter.html#Fig3).
    This is the state of the application that I created in the previous section.


    ![A978-1-4842-0394-1_13_Fig3_HTML.jpg](A978-1-4842-0394-1_13_Fig3_HTML.jpg)


    Figure 13-3.


    Dealing with multiple features


    The problem is that the number of implementation classes increases sharply each
    time I add a new feature or a new platform. In fact, the total number of implementation
    classes is the product of the number and platforms, meaning that if I add a third
    feature to the application, the number of implementation classes will be six (the
    product of 3 and 2). Another platform will give require nine implementation classes
    (the product of 3 and 3).


    This is known as the exploding class hierarchy problem, and it produces an unmanageable
    mess of protocols and implementation classes that are hard to keep track of and
    even harder to maintain. Exploding class hierarchies are usually not intentional,
    but they are easy to create when there is time pressure to add new features and
    keep the project moving along.'
  trans: "\n# 准备示例项目\n\n本章我创建了一个新的 OS X 命令行工具项目，命名为 `Bridge`。为此项目的准备工作，我添加了一个名为 `Comms.swift`\
    \ 的文件，并在其中定义了清单 13-1 所示的类型。\n\n清单 13-1. `Comms.swift` 文件的内容\n\n```\nprotocol ClearMessageChannel\
    \ {\n    func send(message:String);\n}\n\nprotocol SecureMessageChannel {\n  \
    \  func sendEncryptedMessage(encryptedText:String);\n}\n\nclass Communicator {\n\
    \    private let clearChannel:ClearMessageChannel;\n    private let secureChannel:SecureMessageChannel;\n\
    \n    init (clearChannel:ClearMessageChannel, secureChannel:SecureMessageChannel)\
    \ {\n        self.clearChannel = clearChannel;\n        self.secureChannel = secureChannel;\n\
    \    }\n\n    func sendCleartextMessage(message:String) {\n        self.clearChannel.send(message);\n\
    \    }\n\n    func sendSecureMessage(message:String) {\n        self.secureChannel.sendEncryptedMessage(message);\n\
    \    }\n}\n```\n\n`Communicator` 类提供了一些方法，用于发送普通消息和安全消息。处理这些消息的机制由 `ClearMessageChannel`\
    \ 和 `SecureMessageChannel` 协议定义，这两个协议各自规定了处理一种通信类型所需的方法。\n\n我打算支持两种不同的网络传输机制：有线网络和无线网络。我创建了一个名为\
    \ `Channels.swift` 的文件，并在其中创建了清单 13-2 所示的类。\n\n清单 13-2. `Channels.swift` 文件的内容\n\
    \n```\nclass Landline : ClearMessageChannel {\n    func send(message: String)\
    \ {\n        println(\"Landline: \\(message)\");\n    }\n}\n\nclass SecureLandLine\
    \ : SecureMessageChannel {\n    func sendEncryptedMessage(message: String) {\n\
    \        println(\"Secure Landline: \\(message)\");\n    }\n}\n\nclass Wireless\
    \ : ClearMessageChannel {\n    func send(message: String) {\n        println(\"\
    Wireless: \\(message)\");\n    }\n}\n\nclass SecureWireless : SecureMessageChannel\
    \ {\n    func sendEncryptedMessage(message: String) {\n        println(\"Secure\
    \ Wireless: \\(message)\");\n    }\n}\n```\n\n为了完成准备工作，我在 `main.swift` 文件中添加了代码，该代码创建了发送消息所需的通道，并使用这些通道创建了一个\
    \ `Communicator` 对象，如清单 13-3 所示。\n\n清单 13-3. `main.swift` 文件的内容\n\n```\nvar clearChannel\
    \ = Landline();\nvar secureChannel = SecureLandLine();\nvar comms = Communicator(clearChannel:\
    \ clearChannel, secureChannel: secureChannel);\ncomms.sendCleartextMessage(\"\
    Hello!\");\ncomms.sendSecureMessage(\"This is a secret\");\n```\n\n运行该项目会在 Xcode\
    \ 调试控制台中输出以下内容：\n\n```\nLandline: Hello!\nSecure Landline: This is a secret\n\
    ```\n\n# 理解该模式要解决的问题\n\n如果觉得我添加到示例应用程序中的代码考虑不周，那是因为我一次性添加了所有类。桥接模式解决的问题，通常是在向应用程序添加功能并重构代码时逐渐显现出来的。\n\
    \n最终我得到了两个特性（普通消息和安全消息）以及实现这些特性的两个平台（有线网络和无线网络）。没有人会一开始就计划创建这种层次结构，它通常是在良好的初衷下逐渐形成的。一个应用程序通常从一个特性和一个平台开始，如图\
    \ 13-1 所示。\n\n![图 13-1](img/A978-1-4842-0394-1_13_Fig1_HTML.jpg)\n\n图 13-1. 应用程序的简单起点\n\
    \n在某个时候，需要添加另一个平台，并且该平台的选择将根据应用程序的配置方式而改变。一些明智的重构添加了一个协议，该协议标识了平台需要做什么，并创建了处理平台细节的实现类，如图\
    \ 13-2 所示。\n\n![图 13-2](img/A978-1-4842-0394-1_13_Fig2_HTML.jpg)\n\n图 13-2. 处理多个平台\n\
    \n之后，需要添加一个新特性——安全消息——因此又添加了一个协议，并创建了实现对象，如图 13-3 所示。这就是我在上一节中创建的应用程序状态。\n\n![图\
    \ 13-3](img/A978-1-4842-0394-1_13_Fig3_HTML.jpg)\n\n图 13-3. 处理多个特性\n\n问题在于，每当我添加一个新特性或一个新平台时，实现类的数量就会急剧增加。事实上，实现类的总数是特性数量与平台数量的乘积，这意味着如果我向应用程序添加第三个特性，实现类的数量将是六个（3\
    \ 和 2 的乘积）。再增加一个平台将需要九个实现类（3 和 3 的乘积）。\n\n这被称为类层次结构爆炸问题，它会产生一大堆难以跟踪、更难以维护的协议和实现类。类层次结构爆炸通常并非有意为之，但在时间紧迫、需要添加新特性并推动项目前进时，却很容易产生。\n"
- fmt: "# Understanding the Bridge Pattern\n\nThe bridge pattern separates an abstraction\
    \ from its implementation so that the two can be changed independently from one\
    \ another. It may sound counterintuitive, but the bridge pattern solves the exploding\
    \ class hierarchy problem by creating two different hierarchies, separating the\
    \ functionality that is specific to each platform from the functionality that\
    \ is shared between them. A bridge class is created, which brings together both\
    \ hierarchies.\n\n**Tip**\n\nSeparating common and platform-specific functionality\
    \ is the most frequent—and useful—way that the bridge pattern is applied, but\
    \ it can be used to separate any abstraction from its implementation. See the\
    \ \"Applying the Pattern to the SportsStore Application\" section for a more general\
    \ example.\n\nIn the example application, the functionality that is specific to\
    \ each platform is the transmission of a message over a particular type of network.\
    \ The functionality that is common is the preparation of the message. The first\
    \ step is to define protocols that describe each area—messaging and transmission—and\
    \ then create implementation classes for them. Figure [13-4](#A978-1-4842-0394-1_13_Chapter.html#Fig4)\
    \ shows the new hierarchies and the bridge class that brings them together.\n\n\
    **Tip**\n\nDon't worry if an abstract description doesn't make immediate sense.\
    \ The bridge pattern can be hard to parse. If you are struggling to make sense\
    \ of what's going on, then read the next sections to see how the pattern is implemented\
    \ and then come back and read this description again.\n\n![A978-1-4842-0394-1_13_Fig4_HTML.jpg](A978-1-4842-0394-1_13_Fig4_HTML.jpg)\n\
    \n*Figure 13-4. The bridge pattern*\n\nThe bridge class is responsible for combining\
    \ the `Channel` and `Message` protocols to provide the functionality that the\
    \ `Communicator` requires, using the protocols that the `Communicator` class relies\
    \ on.\n\n**Note**\n\nNotice that I have not changed the `Communicator` class.\
    \ The bridge class supports the API expected by the `Communicator` class and maps—or\
    \ rather, bridges—to the new message and channel hierarchies. The `Communicator`\
    \ class remains unmodified because the default assumption when implementing the\
    \ bridge pattern is that there will be several other classes in the application\
    \ that expect the same protocols. See the \"Collapsing the Bridge\" section for\
    \ an alternative approach.\n\n## Isn't the Bridge Just an Adapter?\n\nThe bridge\
    \ pattern can look a lot like the adapter pattern I described in [Chapter 12](#A978-1-4842-0394-1_12_Chapter.html).\
    \ After all, doesn't the bridge class adapt the `Channel` and `Message` protocols\
    \ for the `Communicator` class, which relies on the `ClearChannel` and `SecureChannel`\
    \ protocols?\n\nThe bridge and adapter patterns are similar, but they are used\
    \ in different situations. The adapter pattern is used when you need to integrate\
    \ a component whose code you cannot change, such as a third-party widget. You\
    \ add the adapter to make the third-party component usable through an API that\
    \ your application expects, but you can't change the way that the component works\
    \ because you have only runtime components (or because your changes will be overwritten\
    \ by the next release from the team that produces the component).\n\nThe bridge\
    \ pattern is used when you can change the source code and can change the way that\
    \ the components work and is applied when you have a class hierarchy that mixes\
    \ common and platform-specific functionality. Applying the bridge pattern doesn't\
    \ just involve creating the bridge class; it also requires refactoring the components\
    \ to separate the common and platform-specific code.\n\n# Implementing the Bridge\
    \ Pattern\n\nDescribing the bridge pattern can be useful, but a code example helps\
    \ demonstrate how the pattern works. In the sections that follow, I'll refactor\
    \ the example application to apply the bridge pattern and prevent the exploding\
    \ class hierarchy.\n\n## Dealing with the Messages\n\nThe first step is to deal\
    \ with the functionality that is common regardless of the network that is being\
    \ used, which is the creation and preparation of a message. Listing 13-4 shows\
    \ the contents of the `Messages.swift` file, which I added to the example project.\n\
    \n**Listing 13-4.** The Contents of the Messages.swift File\n\n```\nprotocol Message\
    \ {\n    init (message:String);\n    func prepareMessage();\n    var contentToSend:String\
    \ { get };\n}\n\nclass ClearMessage : Message {\n    private var message:String;\n\
    \    required init(message:String) {\n        self.message = message;\n    }\n\
    \    func prepareMessage() {\n        // no action required\n    }\n    var contentToSend:String\
    \ {\n        return message;\n    }\n}\n\nclass EncryptedMessage : Message {\n\
    \    private var clearText:String;\n    private var cipherText:String?;\n    required\
    \ init(message:String) {\n        self.clearText = message;\n    }\n    func prepareMessage()\
    \ {\n        cipherText = String(reverse(clearText));\n    }\n    var contentToSend:String\
    \ {\n        return cipherText!;\n    }\n}\n```\n\nI have defined a protocol called\
    \ `Message`. The protocol defines a required initializer that accepts the text\
    \ of the message and defines a `prepareMessage` method that will be called so\
    \ that classes that conform to the protocol have an opportunity to process the\
    \ message text. The get-only `contentToSend` property will be used to get whatever\
    \ text needs to be transmitted over a network.\n\nI defined two classes that conform\
    \ to the protocol. The first class is `ClearMessage`, which I will use to represent\
    \ messages that do not require encryption. I will use the `EncryptedMessage` class\
    \ for those messages for which encryption is needed. (Encryption, in this case,\
    \ consists of simply reversing the characters in the string—something that would\
    \ not be adequate for a real project but will be sufficient for an example application.)\n\
    \n## Dealing with the Channels\n\nThe next step is to define the functionality\
    \ that is unique to each network, which is the transmission of messages. Listing\
    \ 13-5 shows the changes I made to the `Channels.swift` file.\n\n**Listing 13-5.**\
    \ Revising the Contents of the Channels.swift File\n\n```\nprotocol Channel {\n\
    \    func sendMessage(msg:Message);\n}\n\nclass LandlineChannel : Channel {\n\
    \    func sendMessage(msg: Message) {\n        println(\"Landline: \\(msg.contentToSend)\"\
    );\n    }\n}\n\nclass WirelessChannel : Channel {\n    func sendMessage(msg: Message)\
    \ {\n        println(\"Wireless: \\(msg.contentToSend)\");\n    }\n}\n```\n\n\
    I defined a protocol called `Channel` that has a method called `sendMessage`.\
    \ Unlike the original version of the application, the channel is no longer responsible\
    \ for dealing with different kinds of messages. Instead, the `sendMessage` method\
    \ will be called with a `Message` object whose `contentToSend` property returns\
    \ the content that should be transmitted. Channels are unaware of what type of\
    \ message they are sending and can focus only on dealing with transmission.\n\n\
    I defined two classes that conform to the `Channel` protocol, reflecting landline\
    \ and wireless networks. The implementation of the `sendMessage` method for both\
    \ classes writes a message to the debug console indicating the channel and the\
    \ content."
  raw: '## Understanding the Bridge Pattern


    The bridge pattern separates an abstraction from its implementation so that the
    two can be changed independently from one another. It may sound counterintuitive,
    but the bridge pattern solves the exploding class hierarchy problem by creating
    two different hierarchies, separating the functionality that is specific to each
    platform from the functionality that is shared between them. A bridge class is
    created, which brings together both hierarchies.


    Tip


    Separating common and platform-specific functionality is the most frequent—and
    useful—way that the bridge pattern is applied, but it can be used to separate
    any abstraction from its implementation. See the “Applying the Pattern to the
    SportsStore Application” section for a more general example.


    In the example application, the functionality that is specific to each platform
    is the transmission of a message over a particular type of network. The functionality
    that is common is the preparation of the message. The first step is to define
    protocols that describe each area—messaging and transmission—and then create implementation
    classes for them. Figure [13-4](#A978-1-4842-0394-1_13_Chapter.html#Fig4) shows
    the new hierarchies and the bridge class that brings them together.


    Tip


    Don’t worry if an abstract description doesn’t make immediate sense. The bridge
    pattern can be hard to parse. If you are struggling to make sense of what’s going
    on, then read the next sections to see how the pattern is implemented and then
    come back and read this description again.


    ![A978-1-4842-0394-1_13_Fig4_HTML.jpg](A978-1-4842-0394-1_13_Fig4_HTML.jpg)


    Figure 13-4.


    The bridge pattern


    The bridge class is responsible for combining the `Channel` and `Message` protocols
    to provide the functionality that the `Communicator` requires, using the protocols
    that the `Communicator` class relies on.


    Note


    Notice that I have not changed the `Communicator` class. The bridge class supports
    the API expected by the `Communicator` class and maps—or rather, bridges—to the
    new message and channel hierarchies. The `Communicator` class remains unmodified
    because the default assumption when implementing the bridge pattern is that there
    will be several other classes in the application that expect the same protocols.
    See the “Collapsing the Bridge” section for an alternative approach.


    ISN’T THE BRIDGE JUST AN ADAPTER?


    The bridge pattern can look a lot like the adapter pattern I described in [Chapter
    12](#A978-1-4842-0394-1_12_Chapter.html). After all, doesn’t the bridge class
    adapt the `Channel` and `Message` protocols for the `Communicator` class, which
    relies on the `ClearChannel` and `SecureChannel` protocols?


    The bridge and adapter patterns are similar, but they are used in different situations.
    The adapter pattern is used when you need to integrate a component whose code
    you cannot change, such as a third-party widget. You add the adapter to make the
    third-party component usable through an API that your application expects, but
    you can’t change the way that the component works because you have only runtime
    components (or because your changes will be overwritten by the next release from
    the team that produces the component).


    The bridge pattern is used when you can change the source code and can change
    the way that the components work and is applied when you have a class hierarchy
    that mixes common and platform-specific functionality. Applying the bridge pattern
    doesn’t just involve creating the bridge class; it also requires refactoring the
    components to separate the common and platform-specific code.


    ## Implementing the Bridge Pattern


    Describing the bridge pattern can be useful, but a code example helps demonstrate
    how the pattern works. In the sections that follow, I’ll refactor the example
    application to apply the bridge pattern and prevent the exploding class hierarchy.


    ### Dealing with the Messages


    The first step is to deal with the functionality that is common regardless of
    the network that is being used, which is the creation and preparation of a message.
    Listing 13-4 shows the contents of the `Messages.swift` file, which I added to
    the example project.


    Listing 13-4. The Contents of the Messages.swift File


    `protocol Message {`


    `init (message:String);`


    `func prepareMessage();`


    `var contentToSend:String { get };`


    `}`


    `class ClearMessage : Message {`


    `private var message:String;`


    `required init(message:String) {`


    `self.message = message;`


    `}`


    `func prepareMessage() {`


    `// no action required`


    `}`


    `var contentToSend:String {`


    `return message;`


    `}`


    `}`


    `class EncryptedMessage : Message {`


    `private var clearText:String;`


    `private var cipherText:String?;`


    `required init(message:String) {`


    `self.clearText = message;`


    `}`


    `func prepareMessage() {`


    `cipherText = String(reverse(clearText));`


    `}`


    `var contentToSend:String {`


    `return cipherText!;`


    `}`


    `}`


    I have defined a protocol called `Message`. The protocol defines a required initializer
    that accepts the text of the message and defines a `prepareMessage` method that
    will be called so that classes that conform to the protocol have an opportunity
    to process the message text. The get-only `contentToSend` property will be used
    to get whatever text needs to be transmitted over a network.


    I defined two classes that conform to the protocol. The first class is `ClearMessage`,
    which I will use to represent messages that do not require encryption. I will
    use the `EncryptedMessage` class for those messages for which encryption is needed.
    (Encryption, in this case, consists of simply reversing the characters in the
    string—something that would not be adequate for a real project but will be sufficient
    for an example application.)


    ### Dealing with the Channels


    The next step is to define the functionality that is unique to each network, which
    is the transmission of messages. Listing 13-5 shows the changes I made to the
    `Channels.swift` file.


    Listing 13-5. Revising the Contents of the Channels.swift File


    `protocol Channel {`


    `func sendMessage(msg:Message);`


    `}`


    `class LandlineChannel : Channel {`


    `func sendMessage(msg: Message) {`


    `println("Landline: \(msg.contentToSend)");`


    `}`


    `}`


    `class WirelessChannel : Channel {`


    `func sendMessage(msg: Message) {`


    `println("Wireless: \(msg.contentToSend)");`


    `}`


    `}`


    I defined a protocol called `Channel` that has a method called `sendMessage`.
    Unlike the original version of the application, the channel is no longer responsible
    for dealing with different kinds of messages. Instead, the `sendMessage` method
    will be called with a `Message` object whose `contentToSend` property returns
    the content that should be transmitted. Channels are unaware of what type of message
    they are sending and can focus only on dealing with transmission.


    I defined two classes that conform to the `Channel` protocol, reflecting landline
    and wireless networks. The implementation of the `sendMessage` method for both
    classes writes a message to the debug console indicating the channel and the content.'
  trans: "\n# 理解桥接模式\n\n桥接模式将抽象与其实现分离，使得二者可以独立地发生变化。这听起来可能有悖常理，但桥接模式通过创建两个独立的层级结构，将各平台特有的功能与跨平台共用的功能分离开，从而解决了类层级结构爆炸的问题。并由此创建了一个能将两个层级结构关联起来的桥接类。\n\
    \n**提示**\n\n将通用功能与平台特有功能分离是桥接模式最常用且最有效的应用方式，但它也可以用于分离任意抽象与其实现。参见“将模式应用于 SportsStore\
    \ 应用”章节以获取更通用的示例。\n\n在示例应用中，各平台特有的功能是通过特定类型网络传输消息。通用功能则是消息的准备工作。第一步是定义描述各领域（消息发送与传输）的协议，然后为其创建实现类。图\
    \ 13-4 展示了新的层级结构以及将它们关联起来的桥接类。\n\n**提示**\n\n如果抽象描述难以立即理解，不必担心。桥接模式确实可能难以解析。如果你正在努力理解其原理，可先阅读后续章节了解模式的具体实现，再回头重读本描述。\n\
    \n![A978-1-4842-0394-1_13_Fig4_HTML.jpg](img/A978-1-4842-0394-1_13_Fig4_HTML.jpg)\n\
    \n*图 13-4. 桥接模式*\n\n桥接类负责组合`Channel`和`Message`协议，利用`Communicator`类依赖的协议，提供其所需的功能。\n\
    \n**注意**\n\n请注意我并未修改`Communicator`类。桥接类支持`Communicator`类所期望的 API，并将该 API 映射（更准确说是桥接）到新的消息和通道层级结构。`Communicator`类保持原样，因为实现桥接模式的默认前提是应用中还有其他多个类期望相同的协议。参见\"\
    折叠桥接\"章节以了解替代方案。\n\n## 桥接模式难道不就是适配器模式吗？\n\n桥接模式与我在第 12 章描述的适配器模式非常相似。毕竟，桥接类不就是在为依赖`ClearChannel`和`SecureChannel`协议的`Communicator`类适配`Channel`和`Message`协议吗？\n\
    \n桥接模式和适配器模式确实相似，但它们应用于不同场景。当需要集成无法修改代码的组件（如第三方控件）时，使用适配器模式。你添加适配器使第三方组件能通过应用期望的\
    \ API 使用，但无法改变组件的工作方式（因为只有运行时组件，或修改会被组件开发团队的下一版本覆盖）。\n\n当可以修改源代码、能改变组件工作方式时，使用桥接模式，适用于混合了通用功能与平台特有功能的类层级结构。应用桥接模式不仅涉及创建桥接类，还需要重构组件以分离通用代码和平台特有代码。\n\
    \n# 实现桥接模式\n\n描述桥接模式固然有用，但代码示例更能演示其运作方式。在后续章节中，我将重构示例应用以应用桥接模式，防止类层级结构爆炸。\n\n\
    ## 处理消息\n\n第一步是处理与网络类型无关的通用功能，即消息的创建和准备工作。列表 13-4 展示了添加到示例项目中的`Messages.swift`文件内容。\n\
    \n**列表 13-4.** Messages.swift 文件内容\n\n```\nprotocol Message {\n    init (message:String);\n\
    \    func prepareMessage();\n    var contentToSend:String { get };\n}\n\nclass\
    \ ClearMessage : Message {\n    private var message:String;\n    required init(message:String)\
    \ {\n        self.message = message;\n    }\n    func prepareMessage() {\n   \
    \     // 无需操作\n    }\n    var contentToSend:String {\n        return message;\n\
    \    }\n}\n\nclass EncryptedMessage : Message {\n    private var clearText:String;\n\
    \    private var cipherText:String?;\n    required init(message:String) {\n  \
    \      self.clearText = message;\n    }\n    func prepareMessage() {\n       \
    \ cipherText = String(reverse(clearText));\n    }\n    var contentToSend:String\
    \ {\n        return cipherText!;\n    }\n}\n```\n\n我定义了一个名为`Message`的协议。该协议定义了一个接受消息文本的必需初始化器，并定义了一个`prepareMessage`方法，该方法将被调用以便符合协议的各类的实例有机会处理消息文本。只读属性`contentToSend`将用于获取需要通过网络传输的文本内容。\n\
    \n我定义了两个符合该协议的类。第一个类是`ClearMessage`，用于表示不需要加密的消息。第二个类是`EncryptedMessage`，用于需要加密的消息（此处的加密仅将字符串字符反转——虽然不足以用于实际项目，但对示例应用已足够）。\n\
    \n## 处理通道\n\n下一步是定义各网络特有的功能，即消息传输。列表 13-5 展示了我对`Channels.swift`文件所做的修改。\n\n**列表\
    \ 13-5.** 修订 Channels.swift 文件内容\n\n```\nprotocol Channel {\n    func sendMessage(msg:Message);\n\
    }\n\nclass LandlineChannel : Channel {\n    func sendMessage(msg: Message) {\n\
    \        println(\"Landline: \\(msg.contentToSend)\");\n    }\n}\n\nclass WirelessChannel\
    \ : Channel {\n    func sendMessage(msg: Message) {\n        println(\"Wireless:\
    \ \\(msg.contentToSend)\");\n    }\n}\n```\n\n我定义了一个名为`Channel`的协议，其中包含一个`sendMessage`方法。与原始版本不同，通道不再负责处理不同类型的消息。`sendMessage`方法将被传入一个`Message`对象，其`contentToSend`属性返回需要传输的内容。通道无需知道它们正在发送何种类型的消息，只需专注于传输处理。\n\
    \n我定义了两个符合`Channel`协议的类，分别对应有线网络和无线网络。两个类的`sendMessage`方法实现都会向调试控制台输出一条消息，指示所使用的通道和传输内容。\n"
- fmt: "### Creating the Bridge\n\nFinally, I need to create a class that will act\
    \ as a bridge between the `Communicator` class and the new `Message` and `Channel`\
    \ protocols. Listing 13-6 shows the contents of the `Bridge.swift` file, which\
    \ I added to the example project.\n\n**Listing 13-6.** The Contents of the `Bridge.swift`\
    \ File\n\n```\nclass CommunicatorBridge : ClearMessageChannel, SecureMessageChannel\
    \ {\n    private var channel:Channel;\n    init(channel:Channel) {\n        self.channel\
    \ = channel;\n    }\n    func send(message: String) {\n        let msg = ClearMessage(message:\
    \ message);\n        sendMessage(msg);\n    }\n    func sendEncryptedMessage(encryptedText:\
    \ String) {\n        let msg = EncryptedMessage(message: encryptedText);\n   \
    \     sendMessage(msg);\n    }\n    private func sendMessage(msg:Message) {\n\
    \        msg.prepareMessage();\n        channel.sendMessage(msg);\n    }\n}\n\
    ```\n\nThe `CommunicatorBridge` class implements the `ClearMessageChannel` and\
    \ `SecureMessageChannel` protocols that the `Communicator` class relies on. It\
    \ implements these protocols using the new `Message` and `Channel` protocols.\
    \ The `CommunicatorBridge` class selects the appropriate `Message` implementation\
    \ class based on which of its methods has been called and passes the `Message`\
    \ object it creates to the `Channel` object given to its initializer.\n\nListing\
    \ 13-7 shows how I have updated the `main.swift` file to use the `CommunicatorBridge`\
    \ class to configure a `Communicator` object.\n\n**Listing 13-7.** Using the `CommunicatorBridge`\
    \ Class in the `main.swift` File\n\n```\nvar bridge = CommunicatorBridge(channel:\
    \ LandlineChannel());\nvar comms = Communicator(clearChannel: bridge, secureChannel:\
    \ bridge);\ncomms.sendCleartextMessage(\"Hello!\");\ncomms.sendSecureMessage(\"\
    This is a secret\");\n```\n\nRunning the application results in the following\
    \ output:\n\n```\nLandline: Hello!\nLandline: terces a si sihT\n```\n\n### Adding\
    \ a New Message Type and Channel\n\nTo demonstrate the effect of the builder pattern,\
    \ I am going to add a new type of message and a new channel to the application.\
    \ The new messages will be for high-priority communications, and the new channel\
    \ will be for satellite networks. To get started, I have added support for priority\
    \ messages to the `Communicator` class, as shown in Listing 13-8. These are changes\
    \ that would have to be applied regardless of whether the bridge pattern has been\
    \ applied.\n\n**Listing 13-8.** Adding Support for a New Message Type in the `Comms.swift`\
    \ File\n\n```\nprotocol ClearMessageChannel {\n    func send(message:String);\n\
    }\nprotocol SecureMessageChannel {\n    func sendEncryptedMessage(message:String);\n\
    }\nprotocol PriorityMessageChannel {\n    func sendPriority(message:String);\n\
    }\nclass Communicator {\n    private let clearChannel:ClearMessageChannel;\n \
    \   private let secureChannel:SecureMessageChannel;\n    private let priorityChannel:PriorityMessageChannel;\n\
    \    init (clearChannel:ClearMessageChannel, secureChannel:SecureMessageChannel,\n\
    \          priorityChannel:PriorityMessageChannel) {\n        self.clearChannel\
    \ = clearChannel;\n        self.secureChannel = secureChannel;\n        self.priorityChannel\
    \ = priorityChannel;\n    }\n    func sendCleartextMessage(message:String) {\n\
    \        self.clearChannel.send(message);\n    }\n    func sendSecureMessage(message:String)\
    \ {\n        self.secureChannel.sendEncryptedMessage(message);\n    }\n    func\
    \ sendPriorityMessage(message:String) {\n        self.priorityChannel.sendPriority(message);\n\
    \    }\n}\n```\n\nUnder the original class hierarchy—without the bridge pattern—the\
    \ addition of a new message and channel would have required five new classes,\
    \ as shown in Figure 13-5.\n\n![A978-1-4842-0394-1_13_Fig5_HTML.jpg](A978-1-4842-0394-1_13_Fig5_HTML.jpg)\n\
    \n**Figure 13-5.** Adding new features to the application without the bridge pattern\n\
    \nThis is the heart of the matter. Without the bridge pattern, I have to create\
    \ even more classes when I add new features to the application. Adding the same\
    \ message type and channel after the bridge pattern has been applied required\
    \ only two new classes—one for the message type and one for the channel, as shown\
    \ in Figure 13-6.\n\n![A978-1-4842-0394-1_13_Fig6_HTML.jpg](A978-1-4842-0394-1_13_Fig6_HTML.jpg)\n\
    \n**Figure 13-6.** Adding new features to the application with the bridge pattern\n\
    \nThe diagram looks more complicated, but that is because the bridge pattern puts\
    \ more structure into the application (the bridge pattern is a structural pattern\
    \ after all). In terms of the work required for the new features, much less effort\
    \ is needed. Listing 13-9 shows the contents of the `NewFeatures.swift` file,\
    \ which I added to the example project in order to implement the new message type\
    \ and channel.\n\n**Listing 13-9.** The Contents of the `NewFeatures.swift` File\n\
    \n```\nclass SatelliteChannel : Channel {\n    func sendMessage(msg: Message)\
    \ {\n        println(\"Satellite: \\(msg.contentToSend)\");\n    }\n}\nclass PriorityMessage\
    \ : ClearMessage {\n    override var contentToSend:String {\n        return \"\
    Important: \\(super.contentToSend)\";\n    }\n}\n```\n\nHaving defined the new\
    \ classes, I have to update the bridge so that it accepts the new message type\
    \ from the `Communicator` class, as shown in Listing 13-10.\n\n**Listing 13-10.** Adding\
    \ Support for a New Message Type in the `Bridge.swift` File\n\n```\nclass CommunicatorBridge\
    \ : ClearMessageChannel,\n    SecureMessageChannel, PriorityMessageChannel {\n\
    \    private var channel:Channel;\n    init(channel:Channel) {\n        self.channel\
    \ = channel;\n    }\n    func send(message: String) {\n        let msg = ClearMessage(message:\
    \ message);\n        sendMessage(msg);\n    }\n    func sendEncryptedMessage(encryptedText:\
    \ String) {\n        let msg = EncryptedMessage(message: encryptedText);\n   \
    \     sendMessage(msg);\n    }\n    func sendPriority(message: String) {\n   \
    \     sendMessage(PriorityMessage(message: message));\n    }\n    private func\
    \ sendMessage(msg:Message) {\n        msg.prepareMessage();\n        channel.sendMessage(msg);\n\
    \    }\n}\n```\n\nAnd now I can change the code in the `main.swift` file to test\
    \ the new functionality, as shown in Listing 13-11.\n\n**Listing 13-11.** Testing\
    \ the New Message Type in the `main.swift` File\n\n```\nvar bridge = CommunicatorBridge(channel:\
    \ SatelliteChannel());\nvar comms = Communicator(clearChannel: bridge, secureChannel:\
    \ bridge,\n                         priorityChannel: bridge);\ncomms.sendCleartextMessage(\"\
    Hello!\");\ncomms.sendSecureMessage(\"This is a secret\");\ncomms.sendPriorityMessage(\"\
    This is important\");\n```\n\nRunning the application produces the following output,\
    \ which demonstrates the new message type and channel:\n\n```\nSatellite: Hello!\n\
    Satellite: terces a si sihT\nSatellite: Important: This is important\n```"
  raw: '### Creating the Bridge


    Finally, I need to create a class that will act as a bridge between the `Communicator`
    class and the new `Message` and `Channel` protocols. Listing 13-6 shows the contents
    of the `Bridge.swift` file, which I added to the example project.


    Listing 13-6. The Contents of the Bridge.swift File


    `class CommunicatorBridge : ClearMessageChannel, SecureMessageChannel {`


    `private var channel:Channel;`


    `init(channel:Channel) {`


    `self.channel = channel;`


    `}`


    `func send(message: String) {`


    `let msg = ClearMessage(message: message);`


    `sendMessage(msg);`


    `}`


    `func sendEncryptedMessage(encryptedText: String) {`


    `let msg = EncryptedMessage(message: encryptedText);`


    `sendMessage(msg);`


    `}`


    `private func sendMessage(msg:Message) {`


    `msg.prepareMessage();`


    `channel.sendMessage(msg);`


    `}`


    `}`


    The `CommunicatorBridge` class implements the `ClearMessageChannel` and `SecureMessageChannel`
    protocols that the `Communicator` class relies on. It implements these protocols
    using the new `Message` and `Channel` protocols. The `CommunicatorBridge` class
    selects the appropriate `Message` implementation class based on which of its methods
    has been called and passes the `Message` object it creates to the `Channel` object
    given to its initializer.


    Listing 13-7 shows how I have updated the `main.swift` file to use the `CommunicatorBridge`
    class to configure a `Communicator` object.


    Listing 13-7. Using the CommunicatorBridge Class in the main.swift File


    `var bridge = CommunicatorBridge(channel: LandlineChannel());`


    `var comms = Communicator(clearChannel: bridge, secureChannel:` `bridge);`


    `comms.sendCleartextMessage("Hello!");`


    `comms.sendSecureMessage("This is a secret");`


    Running the application results in the following output:


    `Landline: Hello!`


    `Landline: terces a si sihT`


    ### Adding a New Message Type and Channel


    To demonstrate the effect of the builder pattern, I am going to add a new type
    of message and a new channel to the application. The new messages will be for
    high-priority communications, and the new channel will be for satellite networks.
    To get started, I have added support for priority messages to the `Communicator`
    class, as shown in Listing 13-8\. These are changes that would have to be applied
    regardless of whether the bridge pattern has been applied.


    Listing 13-8. Adding Support for a New Message Type in the Comms.swift File


    `protocol ClearMessageChannel {`


    `func send(message:String);`


    `}`


    `protocol SecureMessageChannel {`


    `func sendEncryptedMessage(message:String);`


    `}`


    `protocol PriorityMessageChannel {`


    `func sendPriority(message:String);`


    `}`


    `class Communicator {`


    `private let clearChannel:ClearMessageChannel;`


    `private let secureChannel:SecureMessageChannel;`


    `private let priorityChannel:PriorityMessageChannel;`


    `init (clearChannel:ClearMessageChannel, secureChannel:SecureMessageChannel,`


    `priorityChannel:PriorityMessageChannel) {`


    `self.clearChannel = clearChannel;`


    `self.secureChannel = secureChannel;`


    `self.priorityChannel = priorityChannel;`


    `}`


    `func sendCleartextMessage(message:String) {`


    `self.clearChannel.send(message);`


    `}`


    `func sendSecureMessage(message:String) {`


    `self.secureChannel.sendEncryptedMessage(message);`


    `}`


    `func sendPriorityMessage(message:String) {`


    `self.priorityChannel.sendPriority(message);`


    `}`


    `}`


    Under the original class hierarchy—without the bridge pattern—the addition of
    a new message and channel would have required five new classes, as shown in Figure
    [13-5](#A978-1-4842-0394-1_13_Chapter.html#Fig5).


    ![A978-1-4842-0394-1_13_Fig5_HTML.jpg](A978-1-4842-0394-1_13_Fig5_HTML.jpg)


    Figure 13-5.


    Adding new features to the application without the bridge pattern


    This is the heart of the matter. Without the bridge pattern, I have to create
    even more classes when I add new features to the application. Adding the same
    message type and channel after the bridge pattern has been applied required only
    two new classes—one for the message type and one for the channel, as shown in
    Figure [13-6](#A978-1-4842-0394-1_13_Chapter.html#Fig6).


    ![A978-1-4842-0394-1_13_Fig6_HTML.jpg](A978-1-4842-0394-1_13_Fig6_HTML.jpg)


    Figure 13-6.


    Adding new features to the application with the bridge pattern


    The diagram looks more complicated, but that is because the bridge pattern puts
    more structure into the application (the bridge pattern is a structural pattern
    after all). In terms of the work required for the new features, much less effort
    is needed. Listing 13-9 shows the contents of the `NewFeatures.swift` file, which
    I added to the example project in order to implement the new message type and
    channel.


    Listing 13-9. The Contents of the NewFeatures.swift File


    `class SatelliteChannel : Channel {`


    `func sendMessage(msg: Message) {`


    `println("Satellite: \(msg.contentToSend)");`


    `}`


    `}`


    `class PriorityMessage : ClearMessage {`


    `override var contentToSend:String {`


    `return "Important: \(super.contentToSend)";`


    `}`


    `}`


    Having defined the new classes, I have to update the bridge so that it accepts
    the new message type from the `Communicator` class, as shown in Listing 13-10.


    Listing 13-10. Adding Support for a New Message Type in the Bridge.swift File


    `class CommunicatorBridge : ClearMessageChannel,`


    `SecureMessageChannel, PriorityMessageChannel {`


    `private var channel:Channel;`


    `init(channel:Channel) {`


    `self.channel = channel;`


    `}`


    `func send(message: String) {`


    `let msg = ClearMessage(message: message);`


    `sendMessage(msg);`


    `}`


    `func sendEncryptedMessage(encryptedText: String) {`


    `let msg = EncryptedMessage(message: encryptedText);`


    `sendMessage(msg);`


    `}`


    `func sendPriority(message: String) {`


    `sendMessage(PriorityMessage(message: message));`


    `}`


    `private func sendMessage(msg:Message) {`


    `msg.prepareMessage();`


    `channel.sendMessage(msg);`


    `}`


    `}`


    And now I can change the code in the `main.swift` file to test the new functionality,
    as shown in Listing 13-11.


    Listing 13-11. Testing the New Message Type in the main.swift File


    `var bridge = CommunicatorBridge(channel: SatelliteChannel());`


    `var comms = Communicator(clearChannel: bridge,secureChannel: bridge,`


    `priorityChannel: bridge);`


    `comms.sendCleartextMessage("Hello!");`


    `comms.sendSecureMessage("This is a secret");`


    `comms.sendPriorityMessage("This is important");`


    Running the application produces the following output, which demonstrates the
    new message type and channel:


    `Satellite: Hello!`


    `Satellite: terces a si sihT`


    `Satellite: Important: This is important`'
