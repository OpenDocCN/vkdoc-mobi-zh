  trans: "\n### 测试更改\n\n剩下的工作就是测试这些更改。启动应用，并对显示的商品库存数量进行修改。每次修改后，你都会在 Xcode 调试控制台中看到类似如下的消息：\n\
    \n`Change: Kayak 11 items in stock`\n\n`Change: Lifejacket 15 items in stock`\n\
    \n`Change: Soccer Ball 31 items in stock`\n\n`Change: Corner Flags 2 items in\
    \ stock`\n\n值得花点时间思考一下我所做的更改带来的影响。创建通用 `Logger` 类的挑战在于，它接收的对象将来可能会发生变化，但通过实现原型模式，`Logger`\
    \ 类能够在不了解对象本质（除了它们的基类以及——隐含地——它们对 `NSCopying` 协议的实现）的情况下创建克隆。\n\n**提示**：如果控制台不可见，请从\
    \ Xcode 的 **View** 菜单中选择 **Debug Area ➤ Activate Console**。\n\n将对象的复制操作与其定义类解耦，意味着我可以修改\
    \ `Product` 的初始化器，或者创建并使用其子类，而无需在 `Logger` 类中进行相应的更改。总体效果是简化了应用中的代码，并使其更易于扩展和长期维护。\n\
    \n## 总结\n\n在本章中，我描述了原型模式，并演示了如何利用它在不了解对象定义类的情况下创建新对象。我解释了对象如何进行深拷贝和浅拷贝，并阐述了与此过程相关的最常见陷阱。在下一章中，我将描述单例模式，该模式确保应用中仅存在给定类型的单个对象。\n\
    \n# 6. 单例模式\n\n本章我将介绍单例模式，该模式确保应用中仅存在给定类型的单个对象。这是最常用的设计模式之一，因为它能解决经常出现的问题——要么是需要一个对象来表示真实世界的资源，要么是希望确保所有特定类型的活动（例如日志记录）都以一致的方式处理。表\
    \ 6-1 将单例模式置于上下文中。\n\n**表 6-1. 单例模式上下文**\n\n| 问题 | 答案 |\n| --- | --- |\n| 这是什么？\
    \ | 单例模式确保应用中仅存在给定类型的单个对象。 |\n| 有什么好处？ | 单例模式可用于管理表示真实世界资源的对象，或封装共享资源。 |\n| 何时应使用此模式？\
    \ | 当创建更多对象并不会增加可用的真实世界资源数量，或者当您希望整合某项活动（如日志记录）时，应使用单例模式。 |\n| 何时应避免此模式？ | 如果没有多个组件需要访问共享资源，或者应用中没有表示真实世界资源的对象，则单例模式用处不大。\
    \ |\n| 如何判断是否正确实现了该模式？ | 当给定类型只有一个实例，并且该实例不能被复制和克隆，也无法创建更多实例时，就表明正确实现了该模式。 |\n\
    | 是否存在常见陷阱？ | 主要陷阱是使用了引用类型（可被复制）或实现了 `NSCopying` 协议（可被克隆）的类。单例模式通常需要针对并发使用采取一些保护措施，这是问题的常见来源。\
    \ |\n| 是否有相关模式？ | 对象池模式（我将在第 7 章中描述）管理固定数量的对象，而不是单例模式处理的单个对象。 |\n\n## 准备示例项目\n\
    \n我为本章创建了一个名为 `Singleton` 的 OS X 命令行工具项目，遵循了我在第 2 章中描述的相同流程。无需进一步准备。\n\n## 理解模式解决的问题\n\
    \n单例模式确保给定类型仅存在一个对象，并且所有依赖该对象的组件都使用同一个实例。这与我在第 5 章中描述的原型模式不同，该模式使得复制对象变得容易。相比之下，单例模式只允许存在一个对象，并阻止其被复制。\n\
    \n单例模式解决的问题出现在您拥有一个不希望在整个应用中被复制的对象时，要么因为它代表真实世界的资源（如打印机或服务器），要么因为您希望将一组相关活动整合到一处。对于真实世界的资源来说，能够创建新的代表打印机或服务器的对象是毫无意义的，因为创建对象并不能神奇地添加新的硬件设备。\n\
    \n即使对于更抽象的表达，能够创建多个对象也可能成为问题。清单 6-1 显示了 `BackupServer.swift` 文件的内容，我已将其添加到 `Singleton`\
    \ 项目中。\n\n**清单 6-1. BackupServer.swift 文件的内容**\n\n```\nimport Foundation\n\nclass\
    \ DataItem {\n\n    enum ItemType : String {\n        case Email = \"Email Address\"\
    ;\n        case Phone = \"Telephone Number\";\n        case Card = \"Credit Card\
    \ Number\";\n    }\n\n    var type:ItemType;\n    var data:String;\n\n    init(type:ItemType,\
    \ data:String) {\n        self.type = type; self.data = data;\n    }\n}\n\nclass\
    \ BackupServer {\n    let name:String;\n    private var data = [DataItem]();\n\
    \n    init(name:String) {\n        self.name = name;\n    }\n\n    func backup(item:DataItem)\
    \ {\n        data.append(item);\n    }\n\n    func getData() -> [DataItem]{\n\
    \        return data;\n    }\n}\n```\n\n我定义了一个 `BackupServer` 类，用于表示归档数据项的服务器，数据项由\
    \ `DataItem` 类的实例表示。我无需深入探讨创建归档的细节来演示单例模式，因此 `BackupServer` 类定义的 `backup` 方法只是将其\
    \ `DataItem` 对象追加到一个名为 `data` 的存储实例属性中，该属性稍后可以通过 `getData` 方法访问。在清单 6-2 中，您可以看到我如何修改\
    \ `main.swift` 文件以使用 `BackupServer` 类。\n\n**清单 6-2. 在 main.swift 文件中使用 BackupServer\
    \ 类**\n\n```\nvar server = BackupServer(name:\"Server#1\");\nserver.backup(DataItem(type:\
    \ DataItem.ItemType.Email, data: \"joe@example.com\"));\nserver.backup(DataItem(type:\
    \ DataItem.ItemType.Phone, data: \"555-123-1133\"));\nvar otherServer = BackupServer(name:\"\
    Server#2\");\notherServer.backup(DataItem(type: DataItem.ItemType.Email, data:\
    \ \"bob@example.com\"));\n```\n\n项目中的代码可以编译并执行，但这在实际中没有任何意义。如果 `BackupServer`\
    \ 对象的目的是代表一个真实的备份服务器，那么任何人都可以创建一个新对象并开始调用 `backup` 方法，这又意味着什么呢？真实服务器不会仅仅因为程序员创建了一个新对象就被配置好（尽管我承认我喜欢这种说法），因此结果是清单\
    \ 6-2 中备份的部分数据不会到达真实的服务器，也就不会被备份。即使在云服务器的世界里，创建一个新的服务器实例通常也需要比实例化一个新的 Swift 对象更多的工作。\n\
    \n换句话说，清单 6-2 中的代码没有意义，因为代表真实世界服务器的对象只有在与一个已存在并预先配置好的服务器关联时才能工作——这意味着需要仔细控制与真实服务器对应对象的创建，并防止创建任何其他实例。\n\
    \n**提示**：目前示例项目没有产生任何输出。\n"
- fmt: "# Understanding the Shared Resource Encapsulation Problem\n\nNot all of the\
    \ objects that can benefit from the singleton pattern represent real-world objects.\
    \ There will be occasions where you want to create an object that can be used\
    \ by all of the components in an application in a simple and consistent way. To\
    \ demonstrate, Listing 6-3 shows the contents of the `Logger.swift` file, which\
    \ I added to the example project.\n\n**Listing 6-3.** The Contents of the `Logger.swift`\
    \ File\n\n```\nclass Logger {\n\n    private var data = [String]()\n\n    func\
    \ log(msg:String) {\n        data.append(msg);\n    }\n\n    func printLog() {\n\
    \        for msg in data {\n            println(\"Log: \\(msg)\");\n        }\n\
    \    }\n}\n```\n\nThis is a simple logging class of the kind I use to debug problems\
    \ in my own projects. I like the modern debuggers like the one that comes with\
    \ Xcode, but I often fall back on old-school techniques like this because you\
    \ can learn a lot just by looking at the order in which messages appear in the\
    \ console.\n\nThe `Logger` class defines a `log(msg:)` method that accepts `String`\
    \ message arguments and appends them to an array. The `printLog()` method is called\
    \ to display the messages, which it does by calling the global `println()` function.\
    \ Listing 6-4 shows how I updated the `main.swift` file to log details about the\
    \ data items I back up.\n\n**Listing 6-4.** Using the `Logger` Class in the `main.swift`\
    \ File\n\n```\nlet logger = Logger();\nvar server = BackupServer(name:\"Server#1\"\
    );\nserver.backup(DataItem(type: DataItem.ItemType.Email, data: \"joe@example.com\"\
    ));\nserver.backup(DataItem(type: DataItem.ItemType.Phone, data: \"555-123-1133\"\
    ));\nlogger.log(\"Backed up 2 items to \\(server.name)\");\nvar otherServer =\
    \ BackupServer(name:\"Server#2\");\notherServer.backup(DataItem(type: DataItem.ItemType.Email,\
    \ data: \"bob@example.com\"));\nlogger.log(\"Backed up 1 item to \\(otherServer.name)\"\
    );\nlogger.printLog();\n```\n\nIf you run the application, you will see this output\
    \ shown in the console:\n\n```\nLog: Backed up 2 items to Server#1\nLog: Backed\
    \ up 1 item to Server#2\n```\n\nThat all works as expected: I log some debugging\
    \ messages using a local instance of the `Logger` class and call the `printLog()`\
    \ method to write out the messages once I have backed up all my data. The problem\
    \ arises when I want to log some debug messages in the `BackupServer` class, as\
    \ shown in Listing 6-5.\n\n**Listing 6-5.** Adding Logging in the `BackupServer.swift`\
    \ File\n\n```\n...\nclass BackupServer {\n    let name:String;\n    private var\
    \ data = [DataItem]();\n    let logger = Logger();\n\n    init(name:String) {\n\
