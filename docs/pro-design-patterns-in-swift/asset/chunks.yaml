    Command \\(command.rawValue) Data \\(data)\");\n}\n```\n\n我添加的代码从标准输入读取字符串，并将其分解为命令（转换为`Command`枚举中的一个值）和数据值。命令和数据值都传递给职责链中的第一个控制器，尽管目前只有一个控制器。\n\
    \n这种交互、控制器选择和视图选择的循环是 MVC 模型的核心，尽管它很少被看到，因为很少有项目需要创建托管 MVC 部分的框架。\n\n### 运行应用程序\n\
    \n运行项目以测试应用程序。框架将在 Xcode 控制台中显示模型中的初始数据对象集，以及可选择的命令集，如下所示：\n\n```\nName: Bob,\
    \ City: New York\nName: Alice, City: London\nName: Joe, City: Paris\n--Commands--\n\
    L: List People\nA: Add Person\nD: Delete Person\nU: Update Person\nS: Search\n\
    ```\n\n您可以通过在 Xcode 控制台中单击并键入上一条输出中显示的某个命令字母，后跟命令所使用的数据来输入命令。表 27-2 展示了使用应用程序所支持的每个命令的示例。\n\
    \n**表 27-2.** 使用示例应用程序支持的命令\n\n| 命令 | 示例 | 说明 |\n| --- | --- | --- |\n| `L` |\
    \ `L` | 打印模型中所有`Person`对象 |\n| `A <name> <city>` | `A Anne Berlin` | 使用指定的`name`和`city`属性值向模型添加一个新的`Person`\
    \ |\n| `D <name>` | `D Joe` | 删除`name`属性与指定值匹配的`Person` |\n| `U <name> <city>`\
    \ | `U Joe Paris` | 更改`name`属性具有指定值的`Person`对象的`city`属性 |\n| `S <term>` | `S ari`\
    \ | 搜索`name`或`city`属性包含指定术语的`Person`对象 |\n\n无法清除 Xcode 控制台中显示的文本，因此每个命令都会增加应用程序显示的输出。以下是使用搜索命令时的输出：\n\
    \n```\ns n\nCommand S: Search Data [n]\nName: Bob, City: New York\nName: Alice,\
    \ City: London\n--Commands--\nL: List People\nA: Add Person\nD: Delete Person\n\
    U: Update Person\nS: Search\n```\n\n我输入了`s n`并按回车键，这指定了搜索字母 N。搜索结果匹配了`Bob`和`Alice`这两个模型对象，它们的`city`属性都包含搜索词。\n\
    \n### 扩展应用程序\n\nMVC 模式的全部意义在于创建易于测试和维护的应用程序。我不打算在本书中详细介绍有效测试的细节，但我将演示如何扩展示例应用程序，使其包含多个控制器和视图。我将添加到项目中的新功能将聚焦于`Person`类定义的`city`属性。\n\
    \n#### 定义新命令\n\n第一步是扩展应用程序支持的命令集，如清单 27-11 所示。\n\n```\nimport Foundation\n\nenum\
    \ Command : String {\n    case LIST_PEOPLE = \"L: List People\";\n    case ADD_PERSON\
    \ = \"A: Add Person\";\n    case DELETE_PERSON = \"D: Delete Person\";\n    case\
    \ UPDATE_PERSON = \"U: Update Person\";\n    case SEARCH = \"S: Search\";\n  \
    \  case LIST_CITIES = \"LC: List Cities\";\n    case SEARCH_CITIES = \"SC: Search\
    \ Cities\";\n    case DELETE_CITY = \"DC: Delete City\";\n    \n    static let\
    \ ALL = [Command.LIST_PEOPLE, Command.ADD_PERSON,\n        Command.DELETE_PERSON,\
    \ Command.UPDATE_PERSON, Command.SEARCH,\n        Command.LIST_CITIES, Command.SEARCH_CITIES,\
    \ Command.DELETE_CITY];\n    \n    static func getFromInput(input:String) -> Command?\
    \ {\n        switch (input.lowercaseString) {\n        case \"l\":\n         \
    \   return Command.LIST_PEOPLE;\n        case \"a\":\n            return Command.ADD_PERSON;\n\
    \        case \"d\":\n            return Command.DELETE_PERSON;\n        case\
    \ \"u\":\n            return Command.UPDATE_PERSON;\n        case \"s\":\n   \
    \         return Command.SEARCH;\n        case \"lc\":\n            return Command.LIST_CITIES;\n\
    \        case \"sc\":\n            return Command.SEARCH_CITIES;\n        case\
    \ \"dc\":\n            return Command.DELETE_CITY;\n        default:\n       \
    \     return nil;\n        }\n    }\n}\n```\n\n我添加了新的命令：搜索城市、删除所有具有特定`city`值的`Person`对象，以及列出模型中所有唯一的城市值。\n"
- fmt: "#### Defining the New View\n\nThe new view will accept a collection of `Person`\
    \ objects and write out a list of the `city` property values when executed, as\
    \ shown in Listing 27-12.\n\nListing 27-12. Adding a View in the Views.swift File\n\
    \n```\nprotocol View {\n    func execute();\n}\n\nclass PersonListView : View\
    \ {\n    private let people:[Person];\n    init(data:[Person]) {\n        self.people\
    \ = data;\n    }\n    func execute() {\n        for person in people {\n     \
    \       println(person);\n        }\n    }\n}\n\nclass CityListView : View {\n\
    \    private let cities:[String];\n    init(data:[String]) {\n        self.cities\
    \ = data;\n    }\n    func execute() {\n        for city in self.cities {\n  \
    \          println(\"City: \\(city)\");\n        }\n    }\n}\n```\n\n#### Defining\
    \ the New Controller\n\nThe view I created in the previous section displays the\
    \ city information, but I need a controller to handle the new commands I defined,\
    \ as shown in Listing 27-13.\n\nListing 27-13. Defining a New Controller in the\
    \ Controllers.swift File\n\n```\nclass ControllerBase {\n    private let repository:Repository;\n\
    \    private let nextController:ControllerBase?;\n    init(repo:Repository, nextController:ControllerBase?)\
    \ {\n        self.repository = repo;\n        self.nextController = nextController;\n\
    \    }\n    func handleCommand(command:Command, data:[String]) -> View? {\n  \
    \      return nextController?.handleCommand(command, data:data);\n    }\n}\n\n\
    class PersonController : ControllerBase {\n    // ...statements omitted for brevity...\n\
    }\n\nclass CityController : ControllerBase {\n    override func handleCommand(command:\
    \ Command, data: [String]) -> View? {\n        switch command {\n        case\
    \ .LIST_CITIES:\n            return listAll();\n        case .SEARCH_CITIES:\n\
    \            return search(data[0]);\n        case .DELETE_CITY:\n           \
    \ return delete(data[0]);\n        default:\n            return super.handleCommand(command,\
    \ data: data);\n        }\n    }\n    private func listAll() -> View {\n     \
    \   return CityListView(data: repository.People.map({$0.city}).unique());\n  \
    \  }\n    private func search(city:String) -> View {\n        let cityLower =\
    \ city.lowercaseString;\n        let matches:[Person] = repository.People\n  \
    \          .filter({ $0.city.lowercaseString == cityLower });\n        return\
    \ PersonListView(data: matches);\n    }\n    private func delete(city:String)\
    \ -> View {\n        let cityLower = city.lowercaseString;\n        let toDelete\
    \ = repository.People.filter({ $0.city.lowercaseString == cityLower });\n    \
    \    for person in toDelete {\n            repository.removePerson(person.name);\n\
    \        }\n        return PersonListView(data: repository.People);\n    }\n}\n\
    ```\n\nThe `CityController` class follows the same pattern as the existing controller\
    \ and uses the `handleCommand` method to select one of the `private` command-specific\
    \ methods, which operate on the model through the repository and select a view.\n\
    \nNotice that only the `listAll` method uses the newly defined view, while the\
    \ `search` and `delete` methods rely on the original `PersonListView` class. There\
    \ is no tie between views and controllers, and in most MVC applications controllers\
    \ can select any view that can display the data generated by the command being\
    \ processed.\n\n#### Updating the Framework\n\nThe final step is to add the new\
    \ controller to the chain of responsibility maintained by the framework in the\
    \ `main.swift` file so that a `CityController` object is offered the chance to\
    \ handle commands, as shown in Listing 27-14.\n\nListing 27-14. Extending the\
    \ Chain of Responsibility in the main.swift File\n\n```\n...\nlet repository =\
    \ MemoryRepository();\nlet controllerChain = PersonController(repo: repository,\
    \ nextController:\n    CityController(repo: repository, nextController: nil));\n\
    var stdIn = NSFileHandle.fileHandleWithStandardInput();\nvar command = Command.LIST_PEOPLE;\n\
    var data = [String]();\n...\n```\n\n#### Testing the Changes\n\nYou can test the\
    \ changes by running the application and entering commands into the Xcode debug\
    \ console. As an example, here is the output shown when I search for a `city`\
    \ value:\n\n```\nsc london\nCommand SC: Search Cities Data [london]\nName: Alice,\
    \ City: London\n--Commands--\nL: List People\nA: Add Person\nD: Delete Person\n\
    U: Update Person\nS: Search\nLC: List Cities\nSC: Search Cities\nDC: Delete City\n\
    ```\n\nNotice how I have been able to extend the functionality of the example\
    \ application without needing to change any of the existing model, view, or controller\
    \ code. I defined a new set of commands and then added new code to respond to\
    \ them and display the data that was generated. Each of the components in the\
    \ application is focused on a narrow range of tasks and is loosely coupled to\
    \ the other components, making it easy to isolate a component for testing or to\
    \ add or change features.\n\n## Variations on the MVC Pattern\n\nThere are many\
    \ variations in the way that the MVC pattern is implemented and variations on\
    \ the pattern itself. The only variation that matters to Swift developers is using\
    \ a predefined MVC framework. The most commonly used frameworks are `UIKit` and\
    \ `AppKit`. Creating your own MVC framework is an interesting experiment, and\
    \ it reveals a lot about how the different sections of the pattern fit together,\
    \ but for real applications, stick to the MVC frameworks provided by Apple, which\
    \ provide a lot of ready-made functionality and which have been thoroughly tested.\n\
    \n## Understanding the Pitfalls of the MVC Pattern\n\nThe most common pitfall\
    \ is to define code in one section that belongs in another. As I explained at\
    \ the start of the chapter, this isn't always a clear-cut decision, and the best\
    \ way to avoid this pitfall is through experience. Implementing the MVC pattern\
    \ successfully depends on understanding the way that your development processes\
    \ work, and the more often you apply the MVC pattern, the better your understanding\
    \ of what works for your projects and what doesn't. Take your time to think through\
    \ what you are doing, be prepared to refactor when you change your mind about\
    \ a feature, and leave yourself opportunities to experiment.\n\n## Examples of\
    \ the MVC Pattern in Cocoa\n\nThe most obvious examples of the MVC pattern are\
    \ the `AppKit` and `UIKit` frameworks, which use MVC to enforce structure in UI\
    \ applications.\n\n## Summary\n\nIn this chapter I described the MVC pattern and\
    \ explained how it is used to add structure to a complete application. I explained\
    \ the different sections that make up the MVC pattern and created an example application\
    \ and framework as an example implementation.\n\nAnd that is all I have to teach\
    \ you about design patterns. I have described each of the most important design\
    \ patterns that you can apply to a Swift project and explained that you should\
    \ use the implementations I provided as a starting point for your own applications,\
    \ adapting the patterns as needed to suit your needs, preferences, and coding\
    \ style. I wish you every success in your Swift project, and I can only hope you\
    \ have enjoyed reading this book as much as I have enjoyed writing it."
