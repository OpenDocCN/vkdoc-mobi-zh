    | Are there any common pitfalls? | The main pitfalls are using reference types\
    \ (which can be copied) or classes that implement the `NSCopying` protocol (which\
    \ can be cloned). The singleton pattern usually requires some protections against\
    \ concurrent use, which is a common source of problems. |\n| Are there any related\
    \ patterns? | The object pool pattern, which I describe in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html),\
    \ manages a fixed number of objects rather than the single object handled by the\
    \ singleton pattern. |\n\n## Preparing the Example Project\n\nI created an OS\
    \ X Command Line Tool project called `Singleton` for this chapter, following the\
    \ same process I described in [Chapter 2](#A978-1-4842-0394-1_2_Chapter.html).\
    \ No further preparation is required.\n\n## Understanding the Problem That the\
    \ Pattern Solves\n\nThe singleton pattern ensures that only one object of a given\
    \ type exists and that all components that depend on that object use the same\
    \ instance. This is different from the prototype pattern I described in [Chapter\
    \ 5](#A978-1-4842-0394-1_5_Chapter.html), which makes it easy to make copies of\
    \ objects. By contrast, the singleton pattern permits the existence of just one\
    \ object and prevents it from being copied.\n\nThe problem addressed by the singleton\
    \ pattern arises when you have an object that you don’t want duplicated throughout\
    \ an application, either because it represents a real-world resource (such as\
    \ a printer or server) or because you want to consolidate a set of related activities\
    \ in one place. When it comes to real-world resources, the ability to create new\
