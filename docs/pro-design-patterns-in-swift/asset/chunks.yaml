    \ 18-2 展示了如何使用代理来表示远程资源。\n\n![A978-1-4842-0394-1_18_Fig2_HTML.jpg](img/A978-1-4842-0394-1_18_Fig2_HTML.jpg)\n\
    图 18-2. 使用代理模式表示远程资源\n\n代理对象隐藏了访问远程资源的细节，仅呈现其数据，在示例应用程序中，这些数据就是 HTTP 标头的值。使用代理将远程请求的机制整合到应用程序中的单个类中，并允许在不更改使用代理的组件的情况下更改实现——例如，使用其他\
    \ Cocoa 类。\n\n### 解决高开销操作问题\n\n代理可以通过将操作与其使用解耦，来最大程度地降低高开销操作的成本。就示例应用程序而言，我可以将多个标头值的请求合并为单个请求，如图\
    \ 18-3 所示。\n\n![A978-1-4842-0394-1_18_Fig3_HTML.jpg](img/A978-1-4842-0394-1_18_Fig3_HTML.jpg)\n\
    图 18-3. 使用代理合并操作\n\n显然，我占了选择适配模式的示例的便宜，但高开销操作通常可以合并，或者至少可以延迟到执行成本较低时再进行。\n\n###\
    \ 解决访问受限问题\n\n代理可以用作对象的包装器，添加额外的逻辑以强制执行某种使用限制，如图 18-4 所示。\n\n![A978-1-4842-0394-1_18_Fig4_HTML.jpg](img/A978-1-4842-0394-1_18_Fig4_HTML.jpg)\n\
    图 18-4. 使用代理限制访问\n\n代理通常遵循与被包装对象共享的公共协议，这意味着可以无缝地使用代理对象进行替换，而无需修改调用组件。代理拦截对底层对象属性和方法的访问请求，并且仅在满足访问控制策略时才将这些请求传递下去。\n\
    \n## 实现代理模式\n\n代理模式的实现因要解决的问题类型而异。在接下来的章节中，我将向您展示如何针对本章前面描述的三个问题分别实现该模式。\n\n###\
    \ 实现远程对象代理\n\n实现代理模式以访问远程对象或资源的关键在于，将对调用组件提供的服务或功能与执行远程操作的机制分离开来。\n\n对于某些应用程序，这意味着要向调用组件隐藏网络传输和协议的细节。对于表示\
    \ RESTful 服务的代理对象，代理对象可能会隐藏 HTTP 传输的细节，以及用于对远程数据对象执行操作的一组 URL。\n\n我选择在本章的示例中读取\
    \ HTTP 标头值，因为这呈现了一种不同的情况：HTTP 传输的使用无法隐藏，因为其使用是既定事实。相反，代理对象隐藏了如何使用`Foundation`框架中的类来执行\
    \ HTTP 请求并获取标头值。\n\n#### 定义代理协议\n\n在实现远程对象的代理模式时，您不必非要定义一个协议，但我发现这会迫使我更清晰地思考如何向调用组件公开功能（当然，如果需要，它还可以让我创建替代实现）。清单\
    \ 18-2 显示了我定义的用于表示 Web 请求的协议，该协议定义在我添加到示例项目的一个名为`Proxy.swift`的文件中。\n\n**清单 18-2.**\
    \ `Proxy.swift` 文件的内容\n\n```swift\nprotocol HttpHeaderRequest {\n    func getHeader(url:String,\
