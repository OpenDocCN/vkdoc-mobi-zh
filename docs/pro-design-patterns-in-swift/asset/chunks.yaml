    ## Summary


    I described the builder pattern in this chapter and showed you how it can be used
    to control the creation of objects when direct instantiation would cause calling
    components to know the default configuration values for an object and when configuration
    data is obtained gradually.


    The builder pattern is the last of the construction patterns, and in Part 3 I
    describe a different type of pattern: the structural patterns.


    # Part III

    The Structural Patterns


    # 12. The Adapter Pattern


    In this chapter, I describe the first of the structural patterns: the adapter
    pattern. This pattern allows two objects that provide related functionality to
    work together even when they have incompatible APIs. Table [12-1](#A978-1-4842-0394-1_12_Chapter.html#Tab1)
    puts the adapter pattern in context.


    Table 12-1.


    Putting the Adapter Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The adapter pattern allows two components with incompatible APIs
    to work together by introducing an adapter that maps from one component to the
    other. |

    | What are the benefits? | This pattern allows you to integrate components for
    which you cannot modify the source code into your application. This is a common
    problem when you use a third-party framework or when you are consuming the output
    from another project. |

    | When should you use this pattern? | Use this pattern when you need to integrate
    a component that provides similar functionality to other components in the application
    but that uses an incompatible API to do so. |

    | When should you avoid this pattern? | Do not use this pattern when you are able
    to modify the source code of the component that you want to integrate or when
    it is possible to migrate the data provided by the component directly into your
    application. |

    | How do you know when you have implemented the pattern correctly? | The pattern
    is implemented correctly when the adapter allows the component to be integrated
    into the application without requiring modification of the application or the
    component. |

    | Are there any common pitfalls? | The only pitfall is trying to extend the pattern
    to force integration of a component that does not provide the functionality intended
    by the API for which it is being adapted. |

    | Are there any related patterns? | Many of the structural patterns have similar
    implementations but different intents. Ensure that you select the correct pattern
    from the ones I describe in this part of the book. |


