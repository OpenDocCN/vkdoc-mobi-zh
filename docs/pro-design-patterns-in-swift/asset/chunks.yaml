    \nFor this chapter, I created a new OS X Command Line Tool project called `Adapter`.\
    \ I added a new file called `Employees.swift` to the project and used it to define\
    \ the types shown in Listing 12-1.\n\n**Listing 12-1.** The Contents of the `Employees.swift`\
    \ File\n\n```swift\nstruct Employee {\n    var name:String;\n    var title:String;\n\
    }\n\nprotocol EmployeeDataSource {\n    var employees:[Employee] { get };\n  \
    \  func searchByName(name:String) -> [Employee];\n    func searchByTitle(title:String)\
    \ -> [Employee];\n}\n```\n\nThe example for this chapter will be a simple employee\
    \ directory, and the `Employee` struct will be used to represent individual members\
    \ of staff. Classes that provide employee data implement the `EmployeeDataSource`\
