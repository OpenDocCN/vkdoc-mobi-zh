    \ 数据数组中使用该类，然后修复所有编译器错误，直到所有对元组的引用都被替换。这是一个枯燥且容易出错的过程，因此，如果可能的话，最好从一开始就使用类和结构体来启动项目（遗憾的是，在接手现有代码时这并不总是可行）。\n\
    \n## 确保视图与模型分离\n\n关于代码清单 4-14 中的代码，有几点需要注意。首先，`ViewController.swift` 文件定义了一个名为\
