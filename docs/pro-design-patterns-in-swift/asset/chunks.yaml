    `self.name = name; self.country = country;`


    `}`


    `func copyWithZone(zone: NSZone) -> AnyObject {`


    `return Person(name: self.name, country: self.country);`


    `}`


    `}`


    `func deepCopy(data:[AnyObject]) -> [AnyObject] {`


    `return data.map({item -> AnyObject in`


    `if (item is NSCopying` `&&` `item is NSObject) {`


    `return (item as NSObject).copy();`


    `} else {`


    `return item;`


    `}`


    `})`


    `}`


    `var people = [Person(name:"Joe", country:"France"),`


    `Person(name:"Bob", country:"USA")];`


    `var otherpeople = deepCopy(people) as [Person];`


    `people[0].country = "UK";`


    `println("Country: \(otherpeople[0].country)");`


    Tip


    In the “Examples of the Prototype Pattern in Cocoa” section, I explain how to
    copy Cocoa arrays, which are implemented by the `NSArray` and `NSMutableArray`
    classes. These classes behave differently to the built-in Swift arrays I describe
    in this section, and understanding how they work can be useful when working with
    Objective-C code.


    I have defined a function called `deepCopy` that accepts an array and uses the
    `map` method to copy the array. The closure that I pass to the `map` method checks
    to see whether the object can be deep-copied and, if it can, calls the `copy`
    method. Other objects are added to the result array without modification. As this
    console output shows, the deeply copied arrays no longer contain references to
    the same objects:


    `Country: France`


    ## Understanding the Benefits of the Prototype Pattern


    In the following sections, I describe the benefits that the prototype pattern
    provides. Some of them address the problems I identified at the start of the chapter,
    but there are additional benefits that arise from the way that objects are copied
    through the `NSCopying` protocol.'
