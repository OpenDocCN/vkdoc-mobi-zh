    \ 应用程序的那些类。除了我在本章创建的 `Product` 类之外，我还使用了 `NSNumberFormatter` 来格式化货币字符串，使用 `UIViewController`\
    \ 来管理应用程序呈现的视图，以及使用 `UILabel`、`UITextField` 和 `UIStepper` 等类来向用户展示布局组件。\n\n###\
    \ 将模式应用于 SportsStore 应用\n\n在本节中，我将创建并使用一个 `Product` 类，将其用于移除 SportsStore 应用中的元组。如果你没有按照第\
    \ 3 章中的步骤说明进行操作，也无需担心；你可以从 [Apress.com](https://Apress.com) 下载该项目的源代码，以及本书的所有源代码。\n\
    \n#### 准备示例应用\n\n本章的准备工作是创建一个 Swift 文件，我将使用它来定义与设计模式无直接关联的实用函数。要向项目添加新文件，请按住 Control\
    \ 键并单击项目导航器中的 SportsStore 文件夹，然后从菜单中选择新文件。Xcode 会呈现不同文件类型的选择，如图 4-5 所示。\n\n![A978-1-4842-0394-1_4_Fig5_HTML.jpg](img/A978-1-4842-0394-1_4_Fig5_HTML.jpg)\n\
    \n**图 4-5.** 选择新文件的类型\n\n从 iOS ➤ 源类别中选择 Swift 文件，然后单击下一步按钮。将文件名设置为 `Utils.swift`，并确保在目标列表中勾选了\
    \ SportsStore，如图 4-6 所示。\n\n![A978-1-4842-0394-1_4_Fig6_HTML.jpg](img/A978-1-4842-0394-1_4_Fig6_HTML.jpg)\n\
    \n**图 4-6.** 创建 `Product.swift` 文件\n\nXcode 将创建新文件并打开以供编辑。清单 4-12 展示了我如何使用该文件定义\
    \ `Utils` 类。\n\n**清单 4-12.** `Utils.swift` 文件的内容\n\n```\nimport Foundation;\n\n\
    class Utils {\n    class func currencyStringFromNumber(number:Double) -> String\
    \ {\n        let formatter = NSNumberFormatter();\n        formatter.numberStyle\
    \ = NSNumberFormatterStyle.CurrencyStyle;\n        return formatter.stringFromNumber(number)\
    \ ?? \"\";\n    }\n}\n```\n\n我定义了一个类型方法（也称为静态方法），名为 `currencyStringFromNumber`，它接受一个`Double`值，并返回一个格式化为货币值的字符串。例如，值\
    \ `1000.1` 会被格式化为字符串 `$1,000.10`。（货币符号会根据设备的区域设置而应用。在美国以外的地区，美元符号可能会被其他符号替换，例如欧元符号或英镑符号。）\n\
    \n字符串格式化并非我在本表中描述的模式的一部分，因此我将这段代码定义在 `Utils.swift` 文件中，以避免干扰。当我在 SportsStore 布局底部标签所显示的信息中添加内容时，将使用这个新的类型方法。\n"
- fmt: "### Creating the Product Class\n\nAs I explain in the “Understanding Swift\
    \ Access Control” sidebar, the `private` keyword doesn’t restrict access to code\
    \ defined in the same class file. Since I want to emphasize the public/private\
    \ separation provided by this pattern, I am going to create a new file and use\
    \ it to define the `Product` class. Following the process I described in the previous\
    \ section, add a file called `Product.swift` to the SportsStore project and use\
    \ it to define the class shown in Listing 4-13.\n\n**Listing 4-13.** The Contents\
    \ of the `Product.swift` File\n\n```\nclass Product {\n\n    private(set) var\
    \ name:String;\n    private(set) var description:String;\n    private(set) var\
    \ category:String;\n    private var stockLevelBackingValue:Int = 0;\n    private\
    \ var priceBackingValue:Double = 0;\n\n    init(name:String, description:String,\
    \ category:String, price:Double,\n        stockLevel:Int) {\n        self.name\
    \ = name;\n        self.description = description;\n        self.category = category;\n\
    \        self.price = price;\n        self.stockLevel = stockLevel;\n    }\n\n\
    \    var stockLevel:Int {\n        get { return stockLevelBackingValue;}\n   \
    \     set { stockLevelBackingValue = max(0, newValue);}\n    }\n\n    private(set)\
    \ var price:Double {\n        get { return priceBackingValue;}\n        set {\
    \ priceBackingValue = max(1, newValue);}\n    }\n\n    var stockValue:Double {\n\
    \        get {\n            return price * Double(stockLevel);\n        }\n  \
    \  }\n}\n```\n\nThe `Product` class shown in Listing 4-13 puts emphasis on the\
    \ separation of the public presentation from the private implementation, which\
    \ I have achieved in a couple of ways. The first way is by annotating the properties\
    \ with `private` or `private(set)`. The `private` keyword hides whatever it is\
    \ applied to from code outside of the current file, and this has the effect of\
    \ making the `priceBackingValue` and `stockLevelBackingValue` properties entirely\
    \ invisible to the rest of the SportsStore application because the `Product` class\
    \ is the only thing in the `Product.swift` file.\n\nAnnotating a property with\
    \ `private(set)` means that a property can be read from code in other files in\
    \ the same module but set by code only in the `Product.swift` file. I have used\
    \ `private(set)` for most of the properties in Listing 4-13, which has the effect\
    \ of allowing the values to be set using the arguments passed to the class initializer\
    \ but not otherwise.\n\n> **Tip**\n> \n> I could have achieved a similar effect\
    \ using constants, but I want to emphasize the object template pattern in this\
    \ chapter, and `private(set)` is a more useful example.\n\nThe other technique\
    \ I used is a calculated property that defines only a `get` clause. The implementation\
    \ of the calculated property is private even though the property itself is available\
    \ throughout the current module.\n\n### Understanding Swift Access Control\n\n\
    Swift takes an unusual approach to access control, which can catch out the unwary.\
    \ There are three levels of access control, which are applied using the `public`,\
    \ `private`, and `internal` keywords. The `private` keyword is the most restrictive;\
    \ it restricts access to the classes, structs, methods, and properties to code\
    \ defined in the same file. Restricting access on a per-file basis is a different\
    \ approach from most languages and means that `private` has no effect in Xcode\
    \ playgrounds.\n\nThe `internal` keyword denotes that access is allowed within\
    \ the current module. This is the default level of access control that is used\
    \ if no keyword is applied. For most iOS developers, `internal` protection will\
    \ have the effect of allowing a class, struct, method, function, or property to\
    \ be used throughout a project.\n\nThe `public` keyword applies the least restrictive\
    \ level of control and allows access from anywhere, including outside the current\
    \ module. This is of most use to developers who are creating frameworks and who\
    \ will need to use the `public` keyword to define the API that the framework presents\
    \ to other developers.\n\nIf you have moved to Swift from a language such as C#\
    \ or Java, then you can most closely re-create the access controls you are used\
    \ to by defining each class or struct in its own `.swift` file and using the `private`\
    \ and `internal` access levels.\n\n### Applying the Product Class\n\nApplying\
    \ the `Product` class is a simple process. To use the `Product` class, I need\
    \ to replace the tuples in the `ViewController.swift` file with `Product` instances\
    \ and replace the references to individual tuple values with the corresponding\
    \ `Product` properties. Listing 4-14 shows the changes I made.\n\n**Listing 4-14.**\
    \ Applying the Product Class in the `ViewController.swift` File\n\n```\nimport\
    \ UIKit\n\nclass ProductTableCell : UITableViewCell {\n    @IBOutlet weak var\
    \ nameLabel: UILabel!\n    @IBOutlet weak var descriptionLabel: UILabel!\n   \
    \ @IBOutlet weak var stockStepper: UIStepper!\n    @IBOutlet weak var stockField:\
    \ UITextField!\n    var product:Product?;\n}\n\nclass ViewController: UIViewController,\
    \ UITableViewDataSource {\n    @IBOutlet weak var totalStockLabel: UILabel!\n\
    \    @IBOutlet weak var tableView: UITableView!\n    var products = [\n      \
    \  Product(name:\"Kayak\", description:\"A boat for one person\",\n          \
    \  category:\"Watersports\", price:275.0, stockLevel:10),\n        Product(name:\"\
    Lifejacket\", description:\"Protective and fashionable\",\n            category:\"\
    Watersports\", price:48.95, stockLevel:14),\n        Product(name:\"Soccer Ball\"\
    , description:\"FIFA-approved size and weight\",\n            category:\"Soccer\"\
    , price:19.5, stockLevel:32),\n        Product(name:\"Corner Flags\",\n      \
    \      description:\"Give your playing field a professional touch\",\n       \
    \     category:\"Soccer\", price:34.95, stockLevel:1),\n        Product(name:\"\
    Stadium\", description:\"Flat-packed 35,000-seat stadium\",\n            category:\"\
    Soccer\", price:79500.0, stockLevel:4),\n        Product(name:\"Thinking Cap\"\
    ,\n            description:\"Improve your brain efficiency by 75%\",\n       \
    \     category:\"Chess\", price:16.0, stockLevel:8),\n        Product(name:\"\
    Unsteady Chair\",\n            description:\"Secretly give your opponent a disadvantage\"\
    ,\n            category: \"Chess\", price: 29.95, stockLevel:3),\n        Product(name:\"\
    Human Chess Board\",\n            description:\"A fun game for the family\", category:\"\
    Chess\",\n            price:75.0, stockLevel:2),\n        Product(name:\"Bling-Bling\
    \ King\",\n            description:\"Gold-plated, diamond-studded King\",\n  \
    \          category:\"Chess\", price:1200.0, stockLevel:4)];\n\n    override func\
    \ viewDidLoad() {\n        super.viewDidLoad()\n        displayStockTotal();\n\
    \    }\n\n    override func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n\
    \    }\n\n    func tableView(tableView: UITableView,\n        numberOfRowsInSection\
    \ section: Int) -> Int {\n        return products.count;\n    }\n\n    func tableView(tableView:\
    \ UITableView,\n        cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell\
    \ {\n        let product = products[indexPath.row];\n        let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    ProductCell\")\n            as ProductTableCell;\n        cell.product = products[indexPath.row];\n\
    \        cell.nameLabel.text = product.name;\n        cell.descriptionLabel.text\
    \ = product.description;\n        cell.stockStepper.value = Double(product.stockLevel);\n\
    \        cell.stockField.text = String(product.stockLevel);\n        return cell;\n\
    \    }\n\n    @IBAction func stockLevelDidChange(sender: AnyObject) {\n      \
    \  if var currentCell = sender as? UIView {\n            while (true) {\n    \
    \            currentCell = currentCell.superview!;\n                if let cell\
    \ = currentCell as? ProductTableCell {\n                    if let product = cell.product?\
    \ {\n                        if let stepper = sender as? UIStepper {\n       \
    \                     product.stockLevel = Int(stepper.value);\n             \
    \           } else if let textfield = sender as? UITextField {\n             \
    \               if let newValue = textfield.text.toInt()? {\n                \
    \                product.stockLevel = newValue;\n                            }\n\
    \                        }\n                        cell.stockStepper.value =\
    \ Double(product.stockLevel);\n                        cell.stockField.text =\
    \ String(product.stockLevel);\n                    }\n                    break;\n\
    \                }\n            }\n        }\n        displayStockTotal();\n \
    \   }\n\n    func displayStockTotal() {\n        let stockTotal = products.reduce(0,\n\
    \            {(total, product) -> Int in return total + product.stockLevel});\n\
    \        totalStockLabel.text = \"\\(stockTotal) Products in Stock\";\n    }\n\
    }\n```"
