    ## Understanding the Pitfalls of the Observer Pattern


    There are no serious pitfalls for the standard implementation of the observer
    pattern as long as you ensure that your observers receive notifications only through
    the `notify` method and that the subject doesn’t try to cast the observers to
    their implementation types.


    When creating variations on the observer pattern, you should make sure you don’t
    lose sight of the division of responsibilities between the subject and the observer;
    it is easy to create an implementation that blurs the lines between subject and
    observer and that undermines the simplicity and directness of the pattern.


    ## Examples of the Observer Pattern in Cocoa


    There are several examples of the observer pattern in the Cocoa frameworks. In
    [Chapter 21](#A978-1-4842-0394-1_21_Chapter.html), I described the `NSNotificationCenter`
    class as an example of the mediator protocol, but this class also implements the
    observer pattern. This is the same combination that I used to handle short-lived
    subjects earlier in the chapter, and, in fact, you can use the `NSNotificationCenter`
    as a way to notify meta-observers that subjects have been created or destroyed.
    I use the `NSNotificationCenter` to apply the mediator and command patterns to
    the SportsStore application later in this chapter.


    ### User Interface Events


    The Cocoa implementation of the observer pattern that most programmers encounter
    is in the UI frameworks, where user interactions and changes in UI component state
    are expressed using events, which are notifications by another name. Within the
    Cocoa frameworks, there are protocols for different categories of event, each
    of which has its equivalent of the `notify` method that I defined in the `Observer`
    protocol in the “Implementing the Observer Pattern” section of this chapter. As
    an example, here is the method I added to the SportsStore application to respond
    when the user shakes the iOS device to perform an undo operation:


    `...`


    `override func motionEnded(motion: UIEventSubtype, withEvent event: UIEvent) {`


    `if (event.subtype == UIEventSubtype.MotionShake) {`


    `println("Shake motion detected");`


    `undoManager?.undo();`


    `}`


    `}`


    `...`


    The `motionEnded` method is defined by the `UIResponder` protocol, to which the
    `ViewController` class conforms through its base class. Rather than signal all
    UI notifications through a single `notify` method, the `UIResponder` protocol
    defines methods for each major type of user interaction, and the `UIEventSubtype`
    enumeration is used to indicate the specific motion has been performed. You will
    encounter events in all applications that use UI components, but you will typically
    implement only the observer and rely on the components as subjects.


    ### Observing Property Changes


    Objective-C has a feature called key-value observing (KVO) that allows one object
    to receive notifications when the value of another object’s property changes.
    You can use KVO to communicate between Swift objects as long as both of them are
    derived from `NSObject`, and you use the `dynamic` keyword when defining the property
    that will be observed.


    To demonstrate how to use KVO in Swift, I created a new Xcode Command Line Tool
    project called KVO and used the `main.swift` file to define the code shown in
    Listing 22-20.


    Listing 22-20. Using KVO in the main.swift File


    `import Foundation;`


    `class Subject : NSObject {`


    `dynamic var counter = 0;`


    `}`


    `class Observer : NSObject {`


    `init(subject:Subject) {`


    `super.init();`


    `subject.addObserver(self, forKeyPath: "counter",`


    `options: NSKeyValueObservingOptions.New, context: nil);`


    `}`


    `override func observeValueForKeyPath(keyPath: String, ofObject object: AnyObject,`


    `change: [NSObject : AnyObject], context: UnsafeMutablePointer<Void>) {`


    `println("Notification: \(keyPath) = \(change[NSKeyValueChangeNewKey]!)");`


    `}`


    `}`


    `let subject = Subject();`


    `let observer = Observer(subject: subject);`


    `subject.counter++;`


    `subject.counter = 22;`


    Tip


    I had to use an Xcode project for this simple example because the limitations
    of playgrounds prevent KVO from working properly.


    The `Subject` class uses the `dynamic` keyword to define a variable called `counter`.
    This is the property that I will observe using KVO, and the `dynamic` keyword
    prevents the implementation of the property from being optimized by the compiler,
    allowing the KVO feature to replace it at runtime with the equivalent of a computed
    property that notifies its observers of changes.


    The `Observer` class registers its interest in the property using the `addObserver`
    method, like this:


    `...`


    `subject.addObserver(self, forKeyPath: "counter",`


    `options: NSKeyValueObservingOptions.New, context: nil);`


    `...`


    The arguments to the `addObserver` method specify the observer, the property to
    be observed, and a value from the `NSKeyValueObservingOptions` enumeration that
    specifies which value should be included in the notification when there is a change.
    I specified the `New` value, indicating that the value assigned to the subject
    property should be used.


    Notifications are sent to the observer’s `observeValueForKeyPath` method, containing
    details of the subject, the property that changed, and the new value. In this
    example, I write out the name of the property and its value. Running the example
    produces the following output in the Xcode console:


    `Notification: counter = 1`


    `Notification: counter = 22`


    ## Applying the Pattern to the SportsStore Application


    In this chapter, I am going to use the `NSNotificationCenter` class to apply both
    the mediator and command patterns to the SportsStore application.'
