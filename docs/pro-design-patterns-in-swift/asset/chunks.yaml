    );\n\nvar otherServer = BackupServer(name:\"Server#2\");\notherServer.backup(DataItem(type:\
    \ DataItem.ItemType.Email, data: \"bob@example.com\"));\nglobalLogger.log(\"Backed\
    \ up 1 item to \\(otherServer.name)\");\n\nglobalLogger.printLog();\n```\n\n如果你运行该应用程序，你会看到单例模式让我能够收集所有的日志消息并将它们写入控制台。\n\
    \n```\nLog: Created new server Server#1\nLog: Server#1 backed up item of type\
    \ Email Address\nLog: Server#1 backed up item of type Telephone Number\nLog: Backed\
    \ up 2 items to Server#1\nLog: Created new server Server#2\nLog: Server#2 backed\
    \ up item of type Email Address\nLog: Backed up 1 item to Server#2\n```\n\n###\
    \ 创建传统的单例实现\n\n使用全局变量效果很好，但如果你是从 C# 或 Java 转到 Swift，你可能会习惯于通过其类来访问单例的约定。问题在于 Swift\
    \ 不支持类型存储属性，因此需要一些巧思才能以传统方式应用单例模式。代码清单 6-9 展示了如何使用带有静态属性的结构体来解决这个问题。\n\n**代码清单\
    \ 6-9.** 在 `BackupServer.swift` 文件中实现单例模式\n\n```\n...\nfinal class BackupServer\
    \ {\n    let name:String;\n    private var data = [DataItem]();\n\n    private\
    \ init(name:String) {\n        self.name = name;\n        globalLogger.log(\"\
    Created new server \\(name)\");\n    }\n\n    func backup(item:DataItem) {\n \
    \       data.append(item);\n        globalLogger.log(\"\\(name) backed up item\
    \ of type \\(item.type.rawValue)\");\n    }\n\n    func getData() -> [DataItem]{\n\
    \        return data;\n    }\n\n    class var server:BackupServer {\n        struct\
    \ SingletonWrapper {\n            static let singleton = BackupServer(name:\"\
    MainServer\");\n        }\n        return SingletonWrapper.singleton;\n    }\n\
    }\n...\n```\n\n> **注意：** 在全局常量和嵌套结构体之间做选择是个人喜好问题。我喜欢全局变量的简洁性，但多年的 Java 和 C# 开发经验让我对嵌套结构体感觉更舒适。如果你确实使用全局常量，那么请确保在整个应用程序中使用明确且一致的命名约定。\n\
    \n在计算类型属性 `server` 内部，我定义了一个名为 `SingletonWrapper` 的结构体，它有一个名为 `singleton` 的静态存储属性。我创建了单例\
    \ `BackupServer` 对象并将其赋值给 `singleton` 属性。最后，我返回 `singleton` 属性的值作为 `server` 属性的值。\n\
    \n如果你一时没看懂上一句话，别担心。这项技术依赖于 Swift 处理 `struct` 定义和静态存储属性的方式，以确保只创建 `BackupServer`\
    \ 类的一个实例，尽管这段代码有点烧脑。\n\n要访问该单例，我读取了 `BackupServer.server` 属性的值，如代码清单 6-10 所示。\n\
    \n**代码清单 6-10.** 在 `main.swift` 文件中使用单例\n\n```\nvar server = BackupServer.server;\n\
    server.backup(DataItem(type: DataItem.ItemType.Email, data: \"joe@example.com\"\
    ));\nserver.backup(DataItem(type: DataItem.ItemType.Phone, data: \"555-123-1133\"\
    ));\nglobalLogger.log(\"Backed up 2 items to \\(server.name)\");\n\nvar otherServer\
    \ = BackupServer.server;\notherServer.backup(DataItem(type: DataItem.ItemType.Email,\
    \ data: \"bob@example.com\"));\nglobalLogger.log(\"Backed up 1 item to \\(otherServer.name)\"\
    );\n\nglobalLogger.printLog();\n```\n\n代码清单中的 `server` 和 `otherServer` 变量都引用同一个单例，这意味着所有的\
    \ `DataItem` 对象都被发送到了同一台服务器。\n"
- fmt: "### Dealing with Concurrency\n\nIf you are using a singleton in a multithreaded\
    \ application, then you need to think through the consequences of different components\
    \ performing simultaneous operations on the singleton and make sure you guard\
    \ against any potential problems.\n\n**Caution**  \nEffective concurrent programming\
    \ requires careful thought and experience. It is easy to set out with the best\
    \ of intentions but end up with an app that is substantially slower or freezes\
    \ up. Take the time to learn the concepts that underpin concurrency before you\
    \ embark on a multithreaded project, and give yourself enough development time\
    \ to get the code right and to test thoroughly.\n\nPotential concurrency problems\
    \ are common, and even my simple `Logger` and `BackupServer` classes have them\
    \ because Swift arrays are not thread-safe. This means two more threads can call\
    \ the `append` method on an array at the same time and corrupt the data structure.\
    \ To demonstrate the problem, I made some changes to the `main.swift` file, as\
    \ shown in Listing 6-11.\n\n**Listing 6-11.** Performing Concurrent Requests in\
    \ the `main.swift` File\n\n```\nimport Foundation\n\nvar server = BackupServer.server;\n\
    \nlet queue = dispatch_queue_create(\"workQueue\", DISPATCH_QUEUE_CONCURRENT);\n\
    \nlet group = dispatch_group_create();\n\nfor count in 0 ..< 100 {\n\n    dispatch_group_async(group,\
    \ queue, {() in\n\n        BackupServer.server.backup(DataItem(type: DataItem.ItemType.Email,\n\
    \n            data: \"bob@example.com\"))\n\n    });\n\n}\n\ndispatch_group_wait(group,\
    \ DISPATCH_TIME_FOREVER);\n\nprintln(\"\\(server.getData().count) items were backed\
    \ up\");\n```\n\nThis listing uses Grand Central Dispatch (GCD) to asynchronously\
    \ call the `backup` method on the `BackupServer` singleton 100 times. If you are\
    \ not familiar with GCD, see the “Understanding Grand Central Dispatch” sidebars\
    \ for a brief explanation of the code in this and subsequent listings. There are\
    \ several GCD sidebars in this chapter, and I use GCD to implement many of the\
    \ patterns in this book. I explain how each feature I use works, but I don’t get\
    \ into a great deal of detail because concurrent programming—and GCD—is a topic\
    \ beyond the scope of this book. For full details of GCD, see [https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html](https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html).\n\
    \n**UNDERSTANDING GRAND CENTRAL DISPATCH: PART 1**\n\nSeveral techniques are available\
    \ for Cocoa concurrent programming, but the one that I have used in this book\
    \ is Grand Central Dispatch, which I find the easiest to work with. Concurrent\
    \ programming is an advanced topic, and I am not going to describe GCD in detail,\
    \ but I will briefly explain how I use GCD in the examples in this chapter. For\
    \ more information about GCD, see [https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html](https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html).\n\
    \nGCD is a standard part of the `Foundation` framework and is based around the\
    \ idea of queues of blocks, where each block performs some item of work. You select\
    \ or create a queue and use create the blocks—expressed as Swift closures—that\
    \ represent the concurrent tasks that will be performed. GCD is a C API, and the\
    \ syntax isn’t especially Swift-like, but it is simple enough to use once you\
    \ get the hang of it. In Listing 6-11, I created a new queue like this:\n\n```\n\
    let queue = dispatch_queue_create(\"workQueue\", DISPATCH_QUEUE_CONCURRENT);\n\
    ```\n\nThe `dispatch_queue_create` function takes two arguments that set the name\
    \ and type of the queue. I have called the queue `workQueue` and used the `DISPATCH_QUEUE_CONCURRENT`\
    \ constant to specify that the blocks in the queue should be processed by concurrently\
    \ by multiple threads. I assign the object that represents the queue to a constant\
    \ called `queue`. (The queue type is `dispatch_queue_t`, which you will see me\
    \ use in some of the later examples in this chapter and in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html).)\n\
    \nI can group blocks together in order to receive a notification when all of them\
    \ have been executed. Groups are created using the `dispatch_group_create` function\
    \ like this:\n\n```\nlet group = dispatch_group_create();\n```\n\nTo submit work\
    \ to be performed asynchronously, I use the `dispatch_group_async` function to\
    \ add the block to a queue, like this:\n\n```\ndispatch_group_async(group, queue,\
    \ {() in\n\n    BackupServer.server.backup(DataItem(type: DataItem.ItemType.Email,\n\
    \n        data: \"bob@example.com\"))\n\n});\n```\n\nThe first argument is the\
    \ group that the block is associated with, the second argument is the queue to\
    \ which the block will be added, and the final argument is the block itself, expressed\
    \ as a closure. The closure takes no arguments and returns no results. GCD will\
    \ take each block of work from the queue and execute it asynchronously—although,\
    \ as you will learn, queues can also be used to serialize work.\n\nThe final step\
    \ is to wait until all 100 blocks have been completed, which I do like this:\n\
    \n```\ndispatch_group_wait(group, DISPATCH_TIME_FOREVER);\n```\n\nThe `dispatch_group_wait`\
    \ function blocks the current thread until all of the blocks in the specified\
    \ group have been completed. The first argument is the group to monitor, and the\
    \ second argument is the duration to wait. By using the `DISPATCH_TIME_FOREVER`\
    \ value, I specify that I want to wait indefinitely for the blocks in the group\
    \ to complete.\n\nTo see the problem, simply start the application. Concurrency\
    \ problems are all about timing and require two or more threads to be performing\
    \ conflicting operations simultaneously. You might be lucky when you run the application\
    \ and no such conflict will occur—but the likelihood is that two calls overlapping\
    \ calls to the `backup` method will result in two threads trying to add data to\
    \ an array through the `append` method at the same time, causing an error. When\
    \ this happens, the debugger will break on the `backup` method, as shown in Figure\
    \ 6-2.\n\n**Tip**  \nIf you are fortunate enough not to encounter an error, then\
    \ run the application again. Many factors affect concurrency problems, but the\
    \ code in the example is likely to fail most of the time.\n\n![A978-1-4842-0394-1_6_Fig2_HTML.jpg](A978-1-4842-0394-1_6_Fig2_HTML.jpg)\n\
    \n**Figure 6-2.** A concurrency problem\n\nThe exact error reported by the debugger\
    \ will differ, but the problem remains the same: manipulating the contents of\
    \ a Swift array isn’t a thread-safe operation, and singletons that use arrays\
    \ need concurrency protections."
  raw: '### Dealing with Concurrency


    If you are using a singleton in a multithreaded application, then you need to
    think through the consequences of different components performing simultaneous
    operations on the singleton and make sure you guard against any potential problems.


    Caution


    Effective concurrent programming requires careful thought and experience. It is
    easy to set out with the best of intentions but end up with an app that is substantially
    slower or freezes up. Take the time to learn the concepts that underpin concurrency
    before you embark on a multithreaded project, and give yourself enough development
    time to get the code right and to test thoroughly.


    Potential concurrency problems are common, and even my simple `Logger` and `BackupServer`
    classes have them because Swift arrays are not thread-safe. This means two more
    threads can call the `append` method on an array at the same time and corrupt
    the data structure. To demonstrate the problem, I made some changes to the `main.swift`
    file, as shown in Listing 6-11.


    Listing 6-11. Performing Concurrent Requests in the main.swift File


    `import Foundation`


    `var server = BackupServer.server;`


    `let queue = dispatch_queue_create("workQueue", DISPATCH_QUEUE_CONCURRENT);`


    `let group = dispatch_group_create();`


    `for count in 0 ..< 100 {`


    `dispatch_group_async(group, queue, {() in`


    `BackupServer.server.backup(DataItem(type: DataItem.ItemType.Email,`


    `data: "bob@example.com"))`


    `});`


    `}`


    `dispatch_group_wait(group, DISPATCH_TIME_FOREVER);`


    `println("\(server.getData().count) items were backed up");`


    This listing uses Grand Central Dispatch (GCD) to asynchronously call the `backup`
    method on the `BackupServer` singleton 100 times. If you are not familiar with
    GCD, see the “Understanding Grand Central Dispatch” sidebars for a brief explanation
    of the code in this and subsequent listings. There are several GCD sidebars in
    this chapter, and I use GCD to implement many of the patterns in this book. I
    explain how each feature I use works, but I don’t get into a great deal of detail
    because concurrent programming—and GCD—is a topic beyond the scope of this book.
    For full details of GCD, see [`https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html`](https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html)
    .


    UNDERSTANDING GRAND CENTRAL DISPATCH: PART 1


    Several techniques are available for Cocoa concurrent programming, but the one
    that I have used in this book is Grand Central Dispatch, which I find the easiest
    to work with. Concurrent programming is an advanced topic, and I am not going
    to describe GCD in detail, but I will briefly explain how I use GCD in the examples
    in this chapter. For more information about GCD, see [`https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html`](https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html)
    .


    GCD is a standard part of the `Foundation` framework and is based around the idea
    of queues of blocks, where each block performs some item of work. You select or
    create a queue and use create the blocks—expressed as Swift closures—that represent
    the concurrent tasks that will be performed. GCD is a C API, and the syntax isn’t
    especially Swift-like, but it is simple enough to use once you get the hang of
    it. In Listing 6-11, I created a new queue like this:


    `...`


    `let queue =` `dispatch_queue_create` `("workQueue", DISPATCH_QUEUE_CONCURRENT);`


    `...`


    The `dispatch_queue_` `create`function takes two arguments that set the name and
    type of the queue. I have called the queue `workQueue` and used the `DISPATCH_QUEUE_`
    `CONCURRENT` constant to specify that the blocks in the queue should be processed
    by concurrently by multiple threads. I assign the object that represents the queue
    to a constant called `queue`. (The queue type is `dispatch_queue_` `t`, which
    you will see me use in some of the later examples in this chapter and in [Chapter
    7](#A978-1-4842-0394-1_7_Chapter.html).)


    I can group blocks together in order to receive a notification when all of them
    have been executed. Groups are created using the `dispatch_group_` `create` function
    like this:


    `...`


    `let group =` `dispatch_group_create()` `;`


    `...`


    To submit work to be performed asynchronously, I use the `dispatch_group_` `async`function
    to add the block to a queue, like this:


    `...`


    `dispatch_group_async` `(group, queue, {() in`


    `BackupServer.server.backup(DataItem(type: DataItem.ItemType.Email,`


    `data: "bob@example.com"))`


    `});`


    `...`


    The first argument is the group that the block is associated with, the second
    argument is the queue to which the block will be added, and the final argument
    is the block itself, expressed as a closure. The closure takes no arguments and
    returns no results. GCD will take each block of work from the queue and execute
    it asynchronously—although, as you will learn, queues can also be used to serialize
    work.


    The final step is to wait until all 100 blocks have been completed, which I do
    like this:


    `...`


    `dispatch_group_wait` `(group, DISPATCH_TIME_FOREVER);`


    `...`


    The `dispatch_group_` `wait`function blocks the current thread until all of the
    blocks in the specified group have been completed. The first argument is the group
    to monitor, and the second argument is the duration to wait. By using the `DISPATCH_TIME_`
    `FOREVER`value, I specify that I want to wait indefinitely for the blocks in the
    group to complete.


    To see the problem, simply start the application. Concurrency problems are all
    about timing and require two or more threads to be performing conflicting operations
    simultaneously. You might be lucky when you run the application and no such conflict
    will occur—but the likelihood is that two calls overlapping calls to the `backup`
    method will result in two threads trying to add data to an array through the `append`
    method at the same time, causing an error. When this happens, the debugger will
    break on the `backup` method, as shown in Figure [6-2](#A978-1-4842-0394-1_6_Chapter.html#Fig2).


    Tip


    If you are fortunate enough not to encounter an error, then run the application
    again. Many factors affect concurrency problems, but the code in the example is
    likely to fail most of the time.


    ![A978-1-4842-0394-1_6_Fig2_HTML.jpg](A978-1-4842-0394-1_6_Fig2_HTML.jpg)


    Figure 6-2.


    A concurrency problem


    The exact error reported by the debugger will differ, but the problem remains
    the same: manipulating the contents of a Swift array isn’t a thread-safe operation,
    and singletons that use arrays need concurrency protections.'
  trans: "\n### 处理并发问题\n\n如果在多线程应用中使用单例，就需要仔细思考不同组件同时对单例执行操作会带来什么后果，并确保能防范任何潜在问题。\n\
    \n**警告**  \n高效的并发编程需要深思熟虑和丰富的经验。人们往往怀着美好的初衷开始，最终却得到一个运行缓慢甚至卡死的应用。在着手多线程项目之前，请花时间学习并发编程的基础概念，并给自己留出足够的开发时间来编写正确代码并进行全面测试。\n\
    \n潜在的并发问题很常见，就连我简单的 `Logger` 和 `BackupServer` 类也存在这些问题，因为 Swift 的数组并非线程安全。这意味着两个或更多线程可能同时调用数组的\
    \ `append` 方法，从而破坏数据结构。为了演示该问题，我对 `main.swift` 文件做了一些修改，如代码清单 6-11 所示。\n\n**代码清单\
    \ 6-11.** 在 `main.swift` 文件中执行并发请求\n\n```\nimport Foundation\n\nvar server = BackupServer.server;\n\
    \nlet queue = dispatch_queue_create(\"workQueue\", DISPATCH_QUEUE_CONCURRENT);\n\
    \nlet group = dispatch_group_create();\n\nfor count in 0 ..< 100 {\n\n    dispatch_group_async(group,\
    \ queue, {() in\n\n        BackupServer.server.backup(DataItem(type: DataItem.ItemType.Email,\n\
    \n            data: \"bob@example.com\"))\n\n    });\n\n}\n\ndispatch_group_wait(group,\
    \ DISPATCH_TIME_FOREVER);\n\nprintln(\"\\(server.getData().count) items were backed\
    \ up\");\n```\n\n此代码清单使用 Grand Central Dispatch (GCD) 异步调用 `BackupServer` 单例的\
    \ `backup` 方法 100 次。如果你不熟悉 GCD，可参阅“理解 Grand Central Dispatch”边栏，其中简要解释了本清单及后续清单中的代码。本章中有多处\
    \ GCD 边栏，我在本书中大量使用 GCD 来实现在多种模式。我会解释我所用的每个功能的工作原理，但不会深入细节，因为并发编程（包括 GCD）超出了本书的讨论范围。GCD\
    \ 的完整细节请参见 [`developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html`](https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html)。\n\
    \n**理解 GRAND CENTRAL DISPATCH：第 1 部分**\n\nCocoa 并发编程有多种技术可用，但我在本书中使用的是 Grand Central\
    \ Dispatch，我认为它是最容易使用的。并发编程是一个高级主题，我不会详细描述 GCD，但会简要说明我在本章示例中如何使用 GCD。有关 GCD 的更多信息，请参见\
    \ [`developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html`](https://developer.apple.com/library/ios/documentation/Performance/Reference/GCD_libdispatch_Ref/index.html)。\n\
    \nGCD 是 `Foundation` 框架的标准组成部分，其核心思想是块队列，每个块执行一些工作。你选择或创建一个队列，然后创建表示并发任务的块（以 Swift\
    \ 闭包形式表示）。GCD 是一个 C API，语法并不特别像 Swift，但一旦掌握其要领，使用起来就很简单。在代码清单 6-11 中，我像这样创建了一个新队列：\n\
    \n```\nlet queue = dispatch_queue_create(\"workQueue\", DISPATCH_QUEUE_CONCURRENT);\n\
    ```\n\n`dispatch_queue_create` 函数接受两个参数，用于设置队列的名称和类型。我将队列命名为 `workQueue`，并使用 `DISPATCH_QUEUE_CONCURRENT`\
    \ 常量指定队列中的块应由多个线程并发处理。我将表示队列的对象赋值给一个名为 `queue` 的常量。（队列类型是 `dispatch_queue_t`，你会在本章后面以及第\
    \ 7 章的示例中看到我使用它。）\n\n我可以将多个块分组，以便在所有块执行完毕时收到通知。使用 `dispatch_group_create` 函数创建组，如下所示：\n\
    \n```\nlet group = dispatch_group_create();\n```\n\n为了提交要异步执行的工作，我使用 `dispatch_group_async`\
    \ 函数将块添加到队列中，如下所示：\n\n```\ndispatch_group_async(group, queue, {() in\n\n    BackupServer.server.backup(DataItem(type:\
    \ DataItem.ItemType.Email,\n\n        data: \"bob@example.com\"))\n\n});\n```\n\
    \n第一个参数是该块关联的组，第二个参数是将要添加块的队列，最后一个参数是块本身，以闭包形式表示。该闭包不接受参数，也不返回结果。GCD 会从队列中取出每个工作块并异步执行——不过，正如你将了解到的，队列也可用于序列化工作。\n\
    \n最后一步是等待所有 100 个块完成，我像这样操作：\n\n```\ndispatch_group_wait(group, DISPATCH_TIME_FOREVER);\n\
    ```\n\n`dispatch_group_wait` 函数会阻塞当前线程，直到指定组中的所有块完成。第一个参数是要监听的组，第二个参数是等待的持续时间。通过使用\
    \ `DISPATCH_TIME_FOREVER` 值，我指定要无限期等待组中的块完成。\n\n要观察问题，只需启动应用程序。并发问题都与时机有关，需要两个或更多线程同时执行冲突操作。运行应用时你也许运气好，不会发生这样的冲突——但更可能的情况是，两次调用\
    \ `backup` 方法重叠，导致两个线程同时尝试通过 `append` 方法向数组添加数据，从而引发错误。发生这种情况时，调试器会在 `backup`\
    \ 方法处中断，如图 6-2 所示。\n\n**提示**  \n如果你幸运地没有遇到错误，请再次运行应用程序。许多因素会影响并发问题，但示例中的代码大多数时候都会失败。\n\
    \n![A978-1-4842-0394-1_6_Fig2_HTML.jpg](img/A978-1-4842-0394-1_6_Fig2_HTML.jpg)\n\
    \n**图 6-2.** 并发问题\n\n调试器报告的具体错误可能不同，但问题是一样的：操作 Swift 数组的内容并非线程安全操作，使用数组的单例需要添加并发保护机制。\n"
- fmt: "#### Serializing Access\n\nTo solve this problem, I need to ensure that only\
    \ one block at a time is allowed to call the `append` method on the array. Listing\
    \ 6-12 shows how I have used GCD to solve the problem. (I explain the GCD features\
    \ I have used in the second “Understanding Grand Central Dispatch: Part 2” sidebar.)\n\
    \n**Listing 6-12.** Serializing Access to the Array in the `BackupServer.swift`\
    \ File\n\n```\nimport Foundation\n\nclass DataItem {\n    enum ItemType : String\
    \ {\n        case Email = \"Email Address\";\n        case Phone = \"Telephone\
    \ Number\";\n        case Card = \"Credit Card Number\";\n    }\n    var type:ItemType;\n\
    \    var data:String;\n    init(type:ItemType, data:String) {\n        self.type\
    \ = type; self.data = data;\n    }\n}\n\nfinal class BackupServer {\n    let name:String;\n\
    \    private var data = [DataItem]();\n    private let arrayQ = dispatch_queue_create(\"\
    arrayQ\", DISPATCH_QUEUE_SERIAL);\n    private init(name:String) {\n        self.name\
    \ = name;\n        globalLogger.log(\"Created new server \\(name)\");\n    }\n\
    \    func backup(item:DataItem) {\n        dispatch_sync(arrayQ, {() in\n    \
    \        self.data.append(item);\n            globalLogger.log(\n            \
    \    \"\\(self.name) backed up item of type \\(item.type.rawValue)\");\n     \
    \   })\n    }\n    func getData() -> [DataItem]{\n        return data;\n    }\n\
    \    class var server:BackupServer {\n        struct SingletonWrapper {\n    \
    \        static let singleton = BackupServer(name:\"MainServer\");\n        }\n\
    \        return SingletonWrapper.singleton;\n    }\n}\n```\n\nIn this listing,\
    \ I perform the opposite action of the one in Listing 6-11: I take a set of asynchronous\
    \ blocks and force them to be performed serially in order to ensure that only\
    \ one block calls the `append` method on the array at any one time.\n\nThis may\
    \ appear self-defeating, but in a real application multiple components will create\
    \ the blocks, rather than a single `for` loop. These components won’t be able\
    \ to coordinate their activities and usually won’t know anything about each other,\
    \ so it falls to the singleton to protect the resources it relies on.\n\n## Understanding\
    \ Grand Central Dispatch—Part 2\n\nIn Listing 6-12, I create a queue using the\
    \ `dispatch_queue_create` function, like this:\n\n```\n...\nprivate let arrayQ\
    \ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n...\n```\n\nThe\
    \ first argument is the name of the queue, and the second argument—the `DISPATCH_QUEUE_SERIAL`\
    \ value—specifies that the blocks will be taken from the queue and executed one\
    \ after the other, such that a block won’t be started until the previous one has\
    \ been completed.\n\nWithin the `backup` method I use the `dispatch_sync` function\
    \ to add blocks to the queue.\n\n```\n...\ndispatch_sync(arrayQ, {() in\n    self.data.append(item);\n\
    \    globalLogger.log(\n        \"\\(self.name) backed up item of type \\(item.type.toRaw())\"\
    );\n})\n...\n```\n\nThe `dispatch_sync` function adds work to the queue just like\
    \ the `dispatch_group_async` function I used in Listing 6-11, but it waits until\
    \ the block has been completed before it returns, whereas the `dispatch_group_async`\
    \ function returns immediately, leaving the block to be executed at some future\
    \ point when it reached the front of the queue. (It also doesn’t specify a group.\
    \ The asynchronous equivalent of `dispatch_sync` is `dispatch_async`.)\n\nThe\
    \ function used to add a block to the method doesn’t affect the way that the block\
    \ is processed—just whether the function returns immediately after adding the\
    \ block to the queue or blocks until it has been processed.\n\nThe effect I have\
    \ created is that calling the `backup` method is a synchronous operation that\
    \ will not return until the data has been added to the array, and since I have\
    \ specified a serial queue, this means that the method won’t return until all\
    \ of the other backups ahead in the queue are processed too.\n\nThe changes I\
    \ made in Listing 6-12 ensure that the array used in the `BackupServer` singleton\
    \ is protected, but the `backup` method uses the `Logger` class, and that presents\
    \ a similar problem. Although calls to the `log` method are serialized within\
    \ the `BackupServer` class, another component could use the singleton and call\
    \ the `log` method at the same time, which would lead to the same kind of data\
    \ corruption I described earlier. For completeness, I have used GCD to protect\
    \ the data array in the `Logger` class, as shown in Listing 6-13.\n\n**Listing\
    \ 6-13.** Adding Concurrency Protection in the `Logger.swift` File\n\n```\nimport\
    \ Foundation;\n\nlet globalLogger = Logger();\n\nfinal class Logger {\n    private\
    \ var data = [String]()\n    private let arrayQ = dispatch_queue_create(\"arrayQ\"\
    , DISPATCH_QUEUE_SERIAL);\n    private init() {\n        // do nothing - required\
    \ to stop instances being\n        // created by code in other files\n    }\n\
    \    func log(msg:String) {\n        dispatch_sync(arrayQ, {() in\n          \
    \  self.data.append(msg);\n        });\n    }\n    func printLog() {\n       \
    \ for msg in data {\n            println(\"Log: \\(msg)\");\n        }\n    }\n\
    }\n```\n\nThe `Logger` class exposes its singleton using the global constant technique,\
    \ but the technique for protecting the data array from corruption is just the\
    \ same—I create a serial GCD queue and use the `dispatch_sync` method to ensure\
    \ that array modifications are performed only once at a time. If you run the application,\
    \ there will be no data corruption, and the following output will be shown in\
    \ the console window:\n\n```\n100 items were backed up\n```\n\n## Understanding\
    \ the Pitfalls of the Singleton Pattern\n\nThere are several pitfalls to avoid\
    \ when implementing the singleton pattern, and it is important to think through\
    \ your implementation carefully in order to ensure you adhere to the rules I described\
    \ earlier in the chapter. In the sections that follow, I highlight the most common\
    \ problems.\n\n### Understanding the Leakage Pitfall\n\nThe most common problem\
    \ when implementing a singleton is producing an object that can be copied, either\
    \ because it was created from a struct (or one of the built-in reference types)\
    \ or because it was created from a class that implements the `NSCopying` protocol\
    \ (which I described in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html)).\n\n\
    Structs do not work as singletons because they are copied whenever they are assigned\
    \ to a new variable or constant or passed as an argument, but you may be tempted\
    \ to use a class that implements the `NSCopying` protocol because you trust that\
    \ the components that will consume the singleton will not make copies. I advise\
    \ caution: other developers may not realize the importance of not copying the\
    \ singleton, and you should take steps to create a strict implementation of the\
    \ pattern. Allowing other components to copy or clone the prototype breaks the\
    \ first of the three singleton rules.\n\n> **Tip:** You can apply the decorator\
    \ pattern if you don’t have control over the class definition of the object that\
    \ you need as a singleton in order to prevent an object from being treated like\
    \ a prototype. See [Chapter 14](#A978-1-4842-0394-1_14_Chapter.html) for details.\n\
    \n### Understanding the Shared Code File Pitfall\n\nThe Swift access protection\
    \ keywords operate at the file level, which means that applying the `private`\
    \ keyword to an initializer affects only code outside of the file that contains\
    \ the singleton. You should always define the singleton and the global constant—if\
    \ you are using one—in their own file so that no other component is able to create\
    \ its own instances of the singleton class, which breaks the first singleton rule.\n\
    \n### Understanding the Concurrency Pitfalls\n\nThe most intractable problems\
    \ with the singleton pattern are related to concurrency, which can be a difficult\
    \ topic even for experience programmers. In the sections that follow, I describe\
    \ the most common problems."
