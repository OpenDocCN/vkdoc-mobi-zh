    12](#A978-1-4842-0394-1_12_Chapter.html) instead. |

    | How do you know when you have implemented the pattern correctly? | In the case
    of the exploding class hierarchy problem, the pattern is correctly implemented
    when adding a new feature or when support for a new platform can be done with
    a single class. More broadly, the pattern is implemented correctly when you can
    change an abstraction (such as a protocol or a closure signature) without having
    to make a corresponding change in its implementation. |

    | Are there any common pitfalls? | The exploding class hierarchy will not be resolved
    if the common code is not separated from the platform-specific code. |

