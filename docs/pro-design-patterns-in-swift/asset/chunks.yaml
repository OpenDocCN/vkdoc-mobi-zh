    dataQ\", DISPATCH_QUEUE_CONCURRENT);\n    }\n    subscript(key:Coordinate) ->\
    \ Int? {\n        get {\n            var result:Int?;\n            dispatch_sync(self.queue,\
    \ {() in\n                if let cell = self.intrinsicData[key] {\n          \
    \          result = cell.value;\n                } else {\n                  \
    \  result = self.extrinsicData[key]?.value;\n                }\n            });\n\
    \            return result;\n        }\n        set (value) {\n            if\
    \ (value != nil) {\n                dispatch_barrier_sync(self.queue, {() in\n\
    \                    self.intrinsicData[key] = Cell(col: key.col,\n          \
    \              row: key.row, val: value!);\n                });\n            }\n\
    \        }\n    }\n    var total:Int {\n        var result = 0;\n        dispatch_sync(self.queue,\
    \ {() in\n            result = reduce(self.extrinsicData.values, 0, {total, cell\
    \ in\n                if let intrinsicCell = self.intrinsicData[cell.coordinate]\
    \ {\n                    return total + intrinsicCell.value;\n               \
    \ } else {\n                    return total + cell.value\n                }\n\
    \            });\n        });\n        return result;\n    }\n    var count:Int\
    \ {\n        var result = 0;\n        dispatch_sync(self.queue, {() in\n     \
    \       result = self.intrinsicData.count;\n        });\n        return result;\n\
    \    }\n}\n...\n```\n\n我希望允许多个并发读取操作，但每次只允许一个写入操作。我定义了一个并发的 GCD 队列，并对读取操作（即那些不修改内在数据的操作：通过\
    \ `subscript` 获取值、获取 `total` 和 `count` 值）使用 `dispatch_sync` 函数。在通过 `subscript`\
    \ 设置值时，我使用 `dispatch_barrier_sync` 函数，这确保在我修改内在数据集合时，没有其他请求被处理。\n\n### 创建享元工厂类\n\
    \n我必须定义的最后一个类是享元工厂，它由调用组件用来获取可以访问外在数据的享元。清单 17-6 展示了该类的定义。\n\n```\n清单 17-6. 在\
    \ Flyweight.swift 文件中创建享元工厂类\nimport Foundation;\n\nprotocol Flyweight {\n   \
    \ subscript(index:Coordinate) -> Int? { get set };\n    var total:Int { get };\n\
    \    var count:Int { get };\n}\n\nextension Dictionary {\n    init(setupFunc:(()\
    \ -> [(Key, Value)])) {\n        self.init();\n        for item in setupFunc()\
    \ {\n            self[item.0] = item.1;\n        }\n    }\n}\n\nclass FlyweightFactory\
    \ {\n    class func createFlyweight() -> Flyweight {\n        return FlyweightImplementation(extrinsic:\
    \ extrinsicData);\n    }\n    private class var extrinsicData:[Coordinate: Cell]\
    \ {\n        get {\n            struct singletonWrapper {\n                static\
    \ let singletonData = Dictionary<Coordinate, Cell> (\n                    setupFunc:\
    \ {() in\n                        var results = [(Coordinate, Cell)]();\n    \
    \                    let letters:String = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\";\n  \
    \                      var stringIndex = letters.startIndex;\n               \
    \         let rows = 50;\n                        do {\n                     \
    \       let colLetter = letters[stringIndex];\n                            stringIndex\
    \ = stringIndex.successor();\n                            for rowIndex in 1 ...\
    \ rows {\n                                let cell = Cell(col: colLetter, row:\
    \ rowIndex,\n                                    val: rowIndex);\n           \
    \                     results.append((cell.coordinate, cell));\n             \
    \               }\n                        } while (stringIndex != letters.endIndex);\n\
    \                        return results;\n                    }\n            \
    \    );\n            }\n            return singletonWrapper.singletonData;\n \
    \       }\n    }\n}\n\nclass FlyweightImplementation : Flyweight  {\n    // ...为简洁起见，省略了语句...\n\
    }\n```\n\n`FlyweightFactory` 类定义了一个名为 `createFlyweight` 的类方法，该方法返回一个符合 `Flyweight`\
    \ 协议的对象。`createFlyweight` 的实现创建了一个 `FlyweightImplementation` 对象，并将外在数据作为初始化参数传递给它。我使用第\
    \ 6 章中描述的单例模式创建外在数据。这确保了外在数据以懒加载和线程安全的方式创建。\n\n为了填充字典集合，我定义了一个扩展，该扩展提供了一个接受函数作为参数的初始化器。调用该函数生成一个键值元组数组，然后我将其添加到字典中。这种方法绕过了\
    \ Swift 对类变量支持的局限性，并确保我可以在单例初始化过程中用外在数据填充字典。\n\n### 应用享元\n\n最后一步是修改 `Spreadsheet`\
    \ 类，使其依赖享元对象来管理其数据，如清单 17-7 所示。\n\n```\n清单 17-7. 在 Spreadsheet.swift 文件中使用享元\n\
    func == (lhs: Coordinate, rhs: Coordinate) -> Bool {\n    return lhs.col == rhs.col\
    \ && lhs.row == rhs.row;\n}\n\nclass Coordinate : Hashable, Printable {\n    //\
    \ ...为简洁起见，省略了语句...\n}\n\nclass Cell {\n    // ...为简洁起见，省略了语句...\n}\n\nclass Spreadsheet\
    \ {\n    var grid:Flyweight;\n    init() {\n        grid = FlyweightFactory.createFlyweight();\n\
    \    }\n    func setValue(coord: Coordinate, value:Int) {\n        grid[coord]\
    \ = value;\n    }\n    var total:Int {\n        return grid.total;\n    }\n}\n\
    ```\n\n`Spreadsheet` 类从工厂获取一个享元，并使用它来实现其 API。清单 17-8 展示了我对 `main.swift` 文件所做的一个小改动，通过考虑外在对象来准确报告创建的\
    \ `Cell` 对象数量。\n\n```\n清单 17-8\\. 在 main.swift 文件中计算外在 Cell 对象\nlet ss1 = Spreadsheet();\n\
    ss1.setValue(Coordinate(col: \"A\", row: 1), value: 100);\nss1.setValue(Coordinate(col:\
    \ \"J\", row: 20), value: 200);\nprintln(\"SS1 Total: \\(ss1.total)\");\n\nlet\
    \ ss2 = Spreadsheet();\nss2.setValue(Coordinate(col: \"F\", row: 10), value: 200);\n\
    ss2.setValue(Coordinate(col: \"G\", row: 23), value: 250);\nprintln(\"SS2 Total:\
    \ \\(ss2.total)\");\nprintln(\"Cells created: \\(1300 + ss1.grid.count + ss2.grid.count)\"\
    );\n```\n\n运行应用程序会产生以下输出：\n\n```\nSS1 Total: 33429\nSS2 Total: 33567\nCells created:\
    \ 1304\n```\n\n使用享元模式可以让每个 `Spreadsheet` 对象复用相同的外在数据，并且其影响会随着 `Spreadsheet` 对象数量的增加而增大。\n"
- fmt: "# Variations on the Flyweight Pattern\n\nThe copy-on-write technique is a\
    \ variation on the flyweight pattern that relies on an extrinsic object until\
    \ the calling component wants to modify it. At this point, the extrinsic object\
    \ is copied and then modified, and the flyweight no longer uses the extrinsic\
    \ data. One part of the extrinsic data can be copied or the entire thing, as dictated\
    \ by the needs of the application. The copy-on-write technique combines the flyweight\
    \ pattern with the prototype pattern that I described in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html).\
    \ Listing 17-9 shows the contents of the `CopyOnWrite.playground` file, which\
    \ I created as a demonstration.\n\n```\nimport Foundation;\n\nclass Owner : NSObject,\
    \ NSCopying {\n\n    var name:String;\n    var city:String;\n\n    init(name:String,\
    \ city:String) {\n        self.name = name; self.city = city;\n    }\n\n    func\
    \ copyWithZone(zone: NSZone) -> AnyObject {\n        println(\"Copy\");\n    \
    \    return Owner(name: self.name, city: self.city);\n    }\n}\n\nclass FlyweightFactory\
    \ {\n\n    class func createFlyweight() -> Flyweight {\n        return Flyweight(owner:\
    \ ownerSingleton);\n    }\n\n    private class var ownerSingleton:Owner {\n  \
    \      get {\n            struct singletonWrapper {\n                static let\
    \ singleon = Owner(name: \"Anonymous\", city: \"Anywhere\");\n            }\n\
    \            return singletonWrapper.singleon;\n        }\n    }\n}\n\nclass Flyweight\
    \ {\n\n    private let extrinsicOwner:Owner;\n    private var intrinsicOwner:Owner?;\n\
    \n    init(owner:Owner) {\n        self.extrinsicOwner = owner;\n    }\n\n   \
    \ var name:String {\n        get {\n            return intrinsicOwner?.name ??\
    \ extrinsicOwner.name;\n        }\n        set (value) {\n            decoupleFromExtrinsic();\n\
    \            intrinsicOwner?.name = value;\n        }\n    }\n\n    var city:String\
    \ {\n        get {\n            return intrinsicOwner?.city ?? extrinsicOwner.city;\n\
    \        }\n        set (value) {\n            decoupleFromExtrinsic();\n    \
    \        intrinsicOwner?.city = value;\n        }\n    }\n\n    private func decoupleFromExtrinsic()\
    \ {\n        if (intrinsicOwner == nil) {\n            intrinsicOwner = extrinsicOwner.copyWithZone(nil)\
    \ as? Owner;\n        }\n    }\n}\n```\n\nThe `FlyweightFactory` class uses the\
    \ singleton pattern to define the extrinsic `Owner`, which is passed to new `Flyweight`\
    \ objects. The `Flyweight` class uses the extrinsic `Owner` object to provide\
    \ values for its `name` and `city` properties until either of the property setters\
    \ is used. At this point, the prototype pattern is applied to copy the extrinsic\
    \ object in order to create an intrinsic clone, to which the setter value is applied.\
    \ Once a property setter has been used, the `Flyweight` object no longer uses\
    \ the extrinsic object.\n\n# Understanding the Pitfalls of the Flyweight Pattern\n\
    \nThere are several pitfalls to avoid when implementing the flyweight pattern.\
    \ The flyweight pattern is not especially complex, especially compared to a pattern\
    \ such as the object pool, which I described in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html),\
    \ but it is easy to create an implementation that causes more problems than it\
    \ solves.\n\n## Understanding the Extrinsic Duplication Pitfall\n\nThe easiest\
    \ pitfall to fall victim to is creating more extrinsic data than you intended,\
    \ undermining the efficacy of the flyweight pattern. In Swift, this will happen\
    \ most often because of the difficulty in creating class variables and the limitations\
    \ of doing so using a struct. You must ensure that the extrinsic data is created\
    \ as part of the singleton initialization and that the data is created in a thread-safe\
    \ way. It is for this reason that I defined an extension for the `Dictionary`\
    \ class that allows me to specify a closure that will populate the extrinsic data\
    \ collection in the example application.\n\n## Understanding the Mutable Extrinsic\
    \ Data Pitfall\n\nIf you allow a calling component to modify the extrinsic data,\
    \ you will create two different problems: the risk of concurrent accesses corrupting\
    \ the data and flyweights getting inconsistent data. The extrinsic data used by\
    \ a flyweight must be immutable, and letting it be modified is a common pitfall\
    \ that causes odd behavior and runtime errors.\n\n## Understanding the Concurrent\
    \ Access Pitfall\n\nAs I explained earlier in the chapter, the flyweight pattern\
    \ doesn’t apply any limits on how flyweight objects can be used, so it is important\
    \ to protect the intrinsic data from concurrent access in the event that a calling\
    \ component allows a flyweight to be used by multiple threads. You don’t have\
    \ to use the barrier-based approach I applied to the example flyweight class,\
    \ and you don’t even have to use GCD, but you must add some form of protection\
    \ because many single-threaded applications are transformed into multithreaded\
    \ applications at some point.\n\n> **Tip**  \n> You don’t need to add protections\
    \ for the extrinsic data, which should be immutable. Concurrency problems with\
    \ the extrinsic data are an indication that your flyweight implementation is flawed.\n\
    \n## Understanding the Over-optimization Pitfall\n\nIt is easy to get carried\
    \ away with optimizing the creation of objects, to the extent that you end up\
    \ with an implementation that makes it hard to modify the extrinsic data. The\
    \ most common form of this pitfall arises when the values that the extrinsic objects\
    \ represent are generated from a predictable algorithm. In the example application,\
    \ I set the value of each `Cell` object to be the index of the row, which means\
    \ that I could go further in my implementation of the flyweight factory class\
    \ and create `Cell` objects only on request, using the row number to generate\
    \ the object on the fly.\n\nThere are a couple of problems with this approach.\
    \ The first is inflexibility. Algorithms used to generate values are rarely as\
    \ simple as the one in my example, and the process for generating the values can\
    \ be so complicated that the resulting code is hard to change when a different\
    \ algorithm is implemented.\n\nThe second problem is that the flyweight class\
    \ and the calling component must be able to carry out their business without knowing\
    \ that objects are being created on demand. In the case of my example application,\
    \ this would mean allowing flyweight classes to be able to get the total number\
    \ of `Cell` objects and the sum of the `value` properties without needing to create\
    \ all of the objects these tasks would usually require. The flyweight factory\
    \ can provide this information only if it has deep insights into the extrinsic\
    \ data, which further adds to the complexity and inflexibility of the code.\n\n\
    My advice is to accept that one set of shared extrinsic objects is a big enough\
    \ optimization and that going any further yields little benefit but adds a lot\
    \ of complexity and maintenance risk.\n\n## Understanding the Misapplication Pitfall\n\
    \nThe final pitfall is to apply the flyweight pattern when it isn’t required.\
    \ To make the additional development time and testing worthwhile, the flyweight\
    \ should be applied only in situations where a number of similar objects rely\
    \ on a large common set of data values. If the extrinsic data isn’t large or doesn’t\
    \ require substantial effort to create, then the work required to implement the\
    \ flyweight pattern is unlikely to be justified."
  raw: '## Variations on the Flyweight Pattern


    The copy-on-write technique is a variation on the flyweight pattern that relies
    on an extrinsic object until the calling component wants to modify it. At this
    point, the extrinsic object is copied and then modified, and the flyweight no
    longer uses the extrinsic data. One part of the extrinsic data can be copied or
    the entire thing, as dictated by the needs of the application. The copy-on-write
    technique combines the flyweight pattern with the prototype pattern that I described
    in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html). Listing 17-9 shows the contents
    of the `CopyOnWrite.playground` file, which I created as a demonstration.


    Listing 17-9. The Contents of the CopyOnWrite.playground File


    `import Foundation;`


    `class Owner : NSObject, NSCopying {`


    `var name:String;`


    `var city:String;`


    `init(name:String, city:String) {`


    `self.name = name; self.city = city;`


    `}`


    `func copyWithZone(zone: NSZone) -> AnyObject {`


    `println("Copy");`


    `return Owner(name: self.name, city: self.city);`


    `}`


    `}`


    `class FlyweightFactory {`


    `class func createFlyweight() -> Flyweight {`


    `return Flyweight(owner: ownerSingleton);`


    `}`


    `private class var ownerSingleton:Owner {`


    `get {`


    `struct singletonWrapper {`


    `static let singleon = Owner(name: "Anonymous", city: "Anywhere");`


    `}`


    `return singletonWrapper.singleon;`


    `}`


    `}`


    `}`


    `class Flyweight {`


    `private let extrinsicOwner:Owner;`


    `private var intrinsicOwner:Owner?;`


    `init(owner:Owner) {`


    `self.extrinsicOwner = owner;`


    `}`


    `var name:String {`


    `get {`


    `return intrinsicOwner?.name ?? extrinsicOwner.name;`


    `}`


    `set (value) {`


    `decoupleFromExtrinsic();`


    `intrinsicOwner?.name = value;`


    `}`


    `}`


    `var city:String {`


    `get {`


    `return intrinsicOwner?.city ?? extrinsicOwner.city;`


    `}`


    `set (value) {`


    `decoupleFromExtrinsic();`


    `intrinsicOwner?.city = value;`


    `}`


    `}`


    `private func decoupleFromExtrinsic() {`


    `if (intrinsicOwner == nil) {`


    `intrinsicOwner = extrinsicOwner.copyWithZone(nil) as? Owner;`


    `}`


    `}`


    `}`


    The `FlyweightFactory` class uses the singleton pattern to define the extrinsic
    `Owner`, which is passed to new `Flyweight` objects. The `Flyweight` class uses
    the extrinsic `Owner` object to provide values for its `name` and `city` properties
    until either of the property setters is used. At this point, the prototype pattern
    is applied to copy the extrinsic object in order to create an intrinsic clone,
    to which the setter value is applied. Once a property setter has been used, the
    `Flyweight` object no longer uses the extrinsic object.


    ## Understanding the Pitfalls of the Flyweight Pattern


    There are several pitfalls to avoid when implementing the flyweight pattern. The
    flyweight pattern is not especially complex, especially compared to a pattern
    such as the object pool, which I described in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html),
    but it is easy to create an implementation that causes more problems than it solves.


    ### Understanding the Extrinsic Duplication Pitfall


    The easiest pitfall to fall victim to is creating more extrinsic data than you
    intended, undermining the efficacy of the flyweight pattern. In Swift, this will
    happen most often because of the difficulty in creating class variables and the
    limitations of doing so using a struct. You must ensure that the extrinsic data
    is created as part of the singleton initialization and that the data is created
    in a thread-safe way. It is for this reason that I defined an extension for the
    `Dictionary` class that allows me to specify a closure that will populate the
    extrinsic data collection in the example application.


    ### Understanding the Mutable Extrinsic Data Pitfall


    If you allow a calling component to modify the extrinsic data, you will create
    two different problems: the risk of concurrent accesses corrupting the data and
    flyweights getting inconsistent data. The extrinsic data used by a flyweight must
    be immutable, and letting it be modified is a common pitfall that causes odd behavior
    and runtime errors.


    ### Understanding the Concurrent Access Pitfall


    As I explained earlier in the chapter, the flyweight pattern doesn’t apply any
    limits on how flyweight objects can be used, so it is important to protect the
    intrinsic data from concurrent access in the event that a calling component allows
    a flyweight to be used by multiple threads. You don’t have to use the barrier-based
    approach I applied to the example flyweight class, and you don’t even have to
    use GCD, but you must add some form of protection because many single-threaded
    applications are transformed into multithreaded applications at some point.


    Tip


    You don’t need to add protections for the extrinsic data, which should be immutable.
    Concurrency problems with the extrinsic data are an indication that your flyweight
    implementation is flawed.


    ### Understanding the Over-optimization Pitfall


    It is easy to get carried away with optimizing the creation of objects, to the
    extent that you end up with an implementation that makes it hard to modify the
    extrinsic data. The most common form of this pitfall arises when the values that
    the extrinsic objects represent are generated from a predictable algorithm. In
    the example application, I set the value of each `Cell` object to be the index
    of the row, which means that I could go further in my implementation of the flyweight
    factory class and create `Cell` objects only on request, using the row number
    to generate the object on the fly.


    There are a couple of problems with this approach. The first is inflexibility.
    Algorithms used to generate values are rarely as simple as the one in my example,
    and the process for generating the values can be so complicated that the resulting
    code is hard to change when a different algorithm is implemented.


    The second problem is that the flyweight class and the calling component must
    be able to carry out their business without knowing that objects are being created
    on demand. In the case of my example application, this would mean allowing flyweight
    classes to be able to get the total number of `Cell` objects and the sum of the
    `value` properties without needing to create all of the objects these tasks would
    usually require. The flyweight factory can provide this information only if it
    has deep insights into the extrinsic data, which further adds to the complexity
    and inflexibility of the code.


    My advice is to accept that one set of shared extrinsic objects is a big enough
    optimization and that going any further yields little benefit but adds a lot of
    complexity and maintenance risk.


    ### Understanding the Misapplication Pitfall


    The final pitfall is to apply the flyweight pattern when it isn’t required. To
    make the additional development time and testing worthwhile, the flyweight should
    be applied only in situations where a number of similar objects rely on a large
    common set of data values. If the extrinsic data isn’t large or doesn’t require
    substantial effort to create, then the work required to implement the flyweight
    pattern is unlikely to be justified.'
  trans: "\n# 享元模式的变体\n\n写时复制技术是享元模式的一种变体，它依赖一个外部对象，直到调用组件想要修改该对象。此时，该外部对象会被复制并随后修改，享元不再使用该外部数据。根据应用程序的需求，可以复制外部数据的一部分或全部内容。写时复制技术将享元模式与我在第\
    \ 5 章中描述的原型模式结合了起来。清单 17-9 显示了`CopyOnWrite.playground`文件的内容，我创建此文件作为演示。\n\n```\n\
    import Foundation;\n\nclass Owner : NSObject, NSCopying {\n\n    var name:String;\n\
    \    var city:String;\n\n    init(name:String, city:String) {\n        self.name\
    \ = name; self.city = city;\n    }\n\n    func copyWithZone(zone: NSZone) -> AnyObject\
    \ {\n        println(\"Copy\");\n        return Owner(name: self.name, city: self.city);\n\
    \    }\n}\n\nclass FlyweightFactory {\n\n    class func createFlyweight() -> Flyweight\
    \ {\n        return Flyweight(owner: ownerSingleton);\n    }\n\n    private class\
    \ var ownerSingleton:Owner {\n        get {\n            struct singletonWrapper\
    \ {\n                static let singleon = Owner(name: \"Anonymous\", city: \"\
    Anywhere\");\n            }\n            return singletonWrapper.singleon;\n \
    \       }\n    }\n}\n\nclass Flyweight {\n\n    private let extrinsicOwner:Owner;\n\
    \    private var intrinsicOwner:Owner?;\n\n    init(owner:Owner) {\n        self.extrinsicOwner\
    \ = owner;\n    }\n\n    var name:String {\n        get {\n            return\
    \ intrinsicOwner?.name ?? extrinsicOwner.name;\n        }\n        set (value)\
    \ {\n            decoupleFromExtrinsic();\n            intrinsicOwner?.name =\
    \ value;\n        }\n    }\n\n    var city:String {\n        get {\n         \
    \   return intrinsicOwner?.city ?? extrinsicOwner.city;\n        }\n        set\
    \ (value) {\n            decoupleFromExtrinsic();\n            intrinsicOwner?.city\
    \ = value;\n        }\n    }\n\n    private func decoupleFromExtrinsic() {\n \
    \       if (intrinsicOwner == nil) {\n            intrinsicOwner = extrinsicOwner.copyWithZone(nil)\
    \ as? Owner;\n        }\n    }\n}\n```\n\n`FlyweightFactory`类使用单例模式来定义外部的`Owner`对象，该对象会被传递给新的`Flyweight`对象。`Flyweight`类使用外部的`Owner`对象来提供其`name`和`city`属性的值，直到这两个属性中的设置器被使用。此时，会应用原型模式来复制外部对象，以创建一个内部克隆，然后将设置器的值应用于该克隆。一旦属性设置器被使用，`Flyweight`对象就不再使用外部对象。\n\
    \n# 理解享元模式的陷阱\n\n在实现享元模式时，有几个陷阱需要避免。享元模式并**不特别复杂**，尤其与我在第 7 章中描述的对象池等模式相比，但很容易创建出一种引发更多问题而非解决问题的实现。\n\
    \n## 理解外部数据重复陷阱\n\n最容易掉入的陷阱是创建了超出预期的*过多*外部数据，从而破坏了享元模式的效率。在 Swift 中，这通常是因为创建类变量的困难以及使用结构体实现类变量的局限性所导致的。你必须确保外部数据作为单例初始化的一部分被创建，并且数据是以线程安全的方式创建的。正是出于这个原因，我为`Dictionary`类定义了一个扩展，允许我指定一个闭包，用于在示例应用中填充外部数据集合。\n\
    \n## 理解可变外部数据陷阱\n\n如果你允许调用组件修改外部数据，将会产生两个不同的问题：并发访问破坏数据的风险，以及享元获取到不一致的数据。享元使用的外部数据必须是不可变的，允许其被修改是一个常见的陷阱，会导致奇怪的行为和运行时错误。\n\
    \n## 理解并发访问陷阱\n\n正如本章前面所述，享元模式并未对享元对象的使用方式施加任何限制，因此，在调用组件允许享元被多个线程使用的情况下，保护内部数据免受并发访问*至关重要*。你不必使用我应用于示例享元类的那种基于屏障的方法，甚至不必使用\
    \ GCD，但你必须添加某种形式的保护，因为许多单线程应用程序在某个时候会转变为多线程应用程序。\n\n> **提示**  \n> 你无需为外部数据添加保护，这些数据应该是不可变的。外部数据出现并发问题是你的享元实现存在缺陷的一个迹象。\n\
    \n## 理解过度优化陷阱\n\n很容易在优化对象创建的过程中迷失方向，以至于最终得到的实现使得修改外部数据变得困难。这种陷阱最常见的形式是，当外部对象所代表的值是由一个可预测的算法生成时。在示例应用中，我将每个`Cell`对象的值设置为行的索引，这意味着我可以在享元工厂类的实现中更进一步，仅按需创建`Cell`对象，利用行号即时生成该对象。\n\
    \n这种方法有几个问题。首先是缺乏*灵活性*。用于生成值的算法很少像我的例子中那样简单，而且生成值的过程可能非常复杂，以至于当实现不同算法时，生成的代码很难更改。\n\
    \n第二个问题是，享元类和调用组件必须能够在不知晓对象是按需创建的情况下执行业务。以我的示例应用为例，这意味着要允许享元类能够获取`Cell`对象的总数以及`value`属性的总和，而无需创建这些任务通常所需的所有对象。享元工厂只有在对外部数据有深入洞察的情况下才能提供这些信息，这进一步增加了代码的复杂性和*不*灵活性。\n\
    \n我的建议是，接受一组共享的外部对象已经是足够大的优化，而*进一*步优化收效甚微，但会*增加*大量复杂性和维护风险。\n\n## 理解误用陷阱\n\n最后一个陷阱是*在不需要*时应用享元模式。为了使额外的开发时间和测试物有所值，享元只应应用于大量相似对象依赖一组庞大公共数据集的情况。如果外部数据不大，或者创建它不需要太多工作，那么实现享元模式所需的工作可能是不值得的。\n"
- fmt: "# Examples of the Flyweight Pattern in Cocoa\n\nThere are several flyweight\
    \ implementations in the Cocoa frameworks. The one that I find most interesting\
    \ is the `NSNumber` class, which is used to represent numeric values. Two `NSNumber`\
    \ objects created with the same value will be managed so that the value is an\
    \ extrinsic data item—something that can trip the unwary. Listing 17-10 shows\
    \ the contents of the `Numbers.playground` file, which I created as a demonstration.\n\
    \nListing 17-10. The Contents of the `Numbers.playground` File\n\n```\nimport\
    \ Foundation;\n\nlet num1 = NSNumber(int: 10);\n\nlet num2 = NSNumber(int: 10);\n\
    \nprintln(\"Comparison: \\(num1 == num2)\");\n\nprintln(\"Identity:   \\(num1\
    \ === num2)\");\n```\n\nI create two `NSNumber` objects, both of which store the\
    \ integer value `10`. I print out the results of using the comparison and identity\
    \ operators. The debug console shows the following output:\n\n```\nComparison:\
    \ true\n\nIdentity: true\n```\n\nThe result from the comparison operator makes\
    \ sense, but the result from the identity operator may surprise you. Cocoa minimizes\
    \ the amount of memory required for `NSNumber` objects by sharing them. This is\
    \ a technique that many languages apply to string values, using a process known\
    \ as string interning that reduces the amount of memory used to store strings\
    \ and that speeds up string comparison. Cocoa does implement string interning\
    \ for the `NSString` class, but it is difficult to use in Swift, and the `NSNumber`\
    \ class provides simpler example.\n\n## Applying the Pattern to the SportsStore\
    \ Application\n\nThe SportsStore application contains the `NetworkConnection`\
    \ class, which I use to simulate network queries for stock level data. Each `NetworkConnection`\
    \ instance contains a dictionary of stock values that it uses to satisfy the request\
    \ for data. Here is the definition of the `NetworkConnection` class:\n\n```\n\
    ...\n\nclass NetworkConnection {\n\n    private let stockData: [String: Int] =\
    \ [\n\n        \"Kayak\" : 10, \"Lifejacket\": 14, \"Soccer Ball\": 32,\"Corner\
    \ Flags\": 1,\n\n        \"Stadium\": 4, \"Thinking Cap\": 8, \"Unsteady Chair\"\
    : 3,\n\n        \"Human Chess Board\": 2, \"Bling-Bling King\":4\n\n    ];\n\n\
    \    func getStockLevel(name:String) -> Int? {\n\n        NSThread.sleepForTimeInterval(Double(rand()\
    \ % 2));\n\n        return stockData[name];\n\n    }\n\n}\n\n...\n```\n\nIn this\
    \ section I am going to apply the flyweight pattern so that all of the `NetworkConnection`\
    \ objects share the same dictionary object. The dictionary that I will be sharing\
    \ isn’t complicated to create and doesn’t occupy much memory, but it still provides\
    \ a foundation to which the flyweight pattern can be applied.\n\n### Preparing\
    \ the Example Application\n\nNo preparation is required for this chapter, and\
    \ I will pick up the SportsStore project as I left it at the end of [Chapter 16](#A978-1-4842-0394-1_16_Chapter.html).\n\
    \n### Creating the Flyweight Protocol and Implementation Class\n\nI always follow\
    \ the same process when implementing the flyweight pattern: I define the protocol\
    \ that will be used by the calling component, followed by the flyweight implementation\
    \ class. This allows me to focus on the API that will be consumed publically in\
    \ the protocol and separate the intrinsic and extrinsic data in the implementation\
    \ class. Listing 17-11 shows the contents of the `NetworkConnectionFlyweight.swift`\
    \ file that I added to the SportsStore project to implement the flyweight pattern.\n\
    \nListing 17-11. The Contents of the `NetworkConnectionFlyweight.swift` File\n\
    \n```\nprotocol NetConnFlyweight {\n\n    func getStockLevel(name:String) -> Int?;\n\
    \n}\n\nclass NetConnFlyweightImpl : NetConnFlyweight {\n\n    private let extrinsicData:[String:\
    \ Int];\n\n    private init(data:[String: Int]) {\n\n        self.extrinsicData\
    \ = data;\n\n    }\n\n    func getStockLevel(name: String) -> Int? {\n\n     \
    \   return extrinsicData[name];\n\n    }\n\n}\n```\n\nThis implementation of the\
    \ pattern is simple, but I have chosen to expose the data values through a method\
    \ rather than by providing a property that allows access to the dictionary. I\
    \ have done this because it means I can change the way that the data is stored\
    \ without having to update the protocol (and the components that consume it) and\
    \ because it helps to ensure that I don’t inadvertently allow the extrinsic data\
    \ to be modified (which is easy to do when you allow direct access to the extrinsic\
    \ data structures).\n\n### Creating the Flyweight Factory\n\nOne I have defined\
    \ the protocol and implementation class, I complete the flyweight pattern by defining\
    \ the factory and the extrinsic data that it manages. Listing 17-12 shows the\
    \ definition of the factory class.\n\nListing 17-12. Defining the Flyweight Factory\
    \ Class in the `NetworkConnectionFlyweight.swift` File\n\n```\nprotocol NetConnFlyweight\
    \ {\n\n    func getStockLevel(name:String) -> Int?;\n\n}\n\nclass NetConnFlyweightImpl\
    \ : NetConnFlyweight {\n\n    // ...statements omitted for brevity...\n\n}\n\n\
    class NetConnFlyweightFactory {\n\n    class func createFlyweight() -> NetConnFlyweight\
    \ {\n\n        return NetConnFlyweightImpl(data: stockData);\n\n    }\n\n    private\
    \ class var stockData:[String: Int] {\n\n        get {\n\n            struct singletonWrapper\
    \ {\n\n                static let singleton = [\"Kayak\" : 10, \"Lifejacket\"\
    : 14,\n\n                    \"Soccer Ball\": 32,\"Corner Flags\": 1, \"Stadium\"\
    : 4,\n\n                    \"Thinking Cap\": 8, \"Unsteady Chair\": 3,\n\n  \
    \                  \"Human Chess Board\": 2, \"Bling-Bling King\":4\n\n      \
    \          ];\n\n            }\n\n            return singletonWrapper.singleton;\n\
    \n        }\n\n    }\n\n}\n```\n\nThe `NetConnFlyweightFactory` class uses the\
    \ singleton pattern to ensure that the extrinsic data is created once and defines\
    \ a `createFlyweight` method that uses the extrinsic data to create instances\
    \ of the implementation class.\n\n### Applying the Flyweight\n\nThe final step\
    \ is to update the `NetworkConnection` class so that it uses the flyweight and\
    \ shares a single immutable array of intrinsic stock data, as shown in Listing\
    \ 17-13.\n\nListing 17-13. Using the Flyweight in the `NetworkConnection.swift`\
    \ File\n\n```\nimport Foundation\n\nclass NetworkConnection {\n\n    private let\
    \ flyweight:NetConnFlyweight;\n\n    init() {\n\n        self.flyweight = NetConnFlyweightFactory.createFlyweight();\n\
    \n    }\n\n    func getStockLevel(name:String) -> Int? {\n\n        NSThread.sleepForTimeInterval(Double(rand()\
    \ % 2));\n\n        return self.flyweight.getStockLevel(name);\n\n    }\n\n}\n\
    ```\n\nI have removed the local data array and changed the implementation of the\
    \ `getStockLevel` method so that a flyweight is used to obtain the data value.\n\
    \n## Summary\n\nIn this chapter, I explained how the flyweight pattern is used\
    \ to share extrinsic data between objects in order to reduce the memory footprint\
    \ of an application and the amount of work required to generate identical sets\
    \ of data objects. In the next chapter, I describe the proxy pattern, which is\
    \ used when an object is required to act as a representative of a resource or\
    \ another object."
  raw: '## Examples of the Flyweight Pattern in Cocoa


    There are several flyweight implementations in the Cocoa frameworks. The one that
    I find most interesting is the `NSNumber` class, which is used to represent numeric
    values. Two `NSNumber` objects created with the same value will be managed so
    that the value is an extrinsic data item—something that can trip the unwary. Listing
    17-10 shows the contents of the `Numbers.playground` file, which I created as
    a demonstration.


    Listing 17-10. The Contents of the Numbers.playground File


    `import Foundation;`


    `let num1 = NSNumber(int: 10);`


    `let num2 = NSNumber(int: 10);`


    `println("Comparison: \(num1 == num2)");`


    `println("Identity:   \(num1 === num2)");`


    I create two `NSNumber` objects, both of which store the integer value `10`. I
    print out the results of using the comparison and identity operators. The debug
    console shows the following output:


    `Comparison: true`


    `Identity: true`


    The result from the comparison operator makes sense, but the result from the identity
    operator may surprise you. Cocoa minimizes the amount of memory required for `NSNumber`
    objects by sharing them. This is a technique that many languages apply to string
    values, using a process known as string interning that reduces the amount of memory
    used to store strings and that speeds up string comparison. Cocoa does implement
    string interning for the `NSString` class, but it is difficult to use in Swift,
    and the `NSNumber` class provides simpler example.


    ## Applying the Pattern to the SportsStore Application


    The SportsStore application contains the `NetworkConnection` class, which I use
    to simulate network queries for stock level data. Each `NetworkConnection` instance
    contains a dictionary of stock values that it uses to satisfy the request for
    data. Here is the definition of the `NetworkConnection` class:


    `...`


    `class NetworkConnection {`


    `private let stockData: [String: Int] = [`


    `"Kayak" : 10, "Lifejacket": 14, "Soccer Ball": 32,"Corner Flags": 1,`


    `"Stadium": 4, "Thinking Cap": 8, "Unsteady Chair": 3,`


    `"Human Chess Board": 2, "Bling-Bling King":4`


    `];`


    `func getStockLevel(name:String) -> Int? {`


    `NSThread.sleepForTimeInterval(Double(rand() % 2));`


    `return stockData[name];`


    `}`


    `}`


    `...`


    In this section I am going to apply the flyweight pattern so that all of the `NetworkConnection`
    objects share the same dictionary object. The dictionary that I will be sharing
    isn’t complicated to create and doesn’t occupy much memory, but it still provides
    a foundation to which the flyweight pattern can be applied.


    ### Preparing the Example Application


    No preparation is required for this chapter, and I will pick up the SportsStore
    project as I left it at the end of [Chapter 16](#A978-1-4842-0394-1_16_Chapter.html).


    ### Creating the Flyweight Protocol and Implementation Class


    I always follow the same process when implementing the flyweight pattern: I define
    the protocol that will be used by the calling component, followed by the flyweight
    implementation class. This allows me to focus on the API that will be consumed
    publically in the protocol and separate the intrinsic and extrinsic data in the
    implementation class. Listing 17-11 shows the contents of the `NetworkConnectionFlyweight.swift`
    file that I added to the SportsStore project to implement the flyweight pattern.


    Listing 17-11. The Contents of the NetworkConnectionFlyweight.swift File


    `protocol NetConnFlyweight {`


    `func getStockLevel(name:String) -> Int?;`


    `}`


    `class NetConnFlyweightImpl : NetConnFlyweight {`


    `private let extrinsicData:[String: Int];`


    `private init(data:[String: Int]) {`


    `self.extrinsicData = data;`


    `}`


    `func getStockLevel(name: String) -> Int? {`


    `return extrinsicData[name];`


    `}`


    `}`


    This implementation of the pattern is simple, but I have chosen to expose the
    data values through a method rather than by providing a property that allows access
    to the dictionary. I have done this because it means I can change the way that
    the data is stored without having to update the protocol (and the components that
    consume it) and because it helps to ensure that I don’t inadvertently allow the
    extrinsic data to be modified (which is easy to do when you allow direct access
    to the extrinsic data structures).


    ### Creating the Flyweight Factory


    One I have defined the protocol and implementation class, I complete the flyweight
    pattern by defining the factory and the extrinsic data that it manages. Listing
    17-12 shows the definition of the factory class.


    Listing 17-12. Defining the Flyweight Factory Class in the NetworkConnectionFlyweight.swift
    File


    `protocol NetConnFlyweight {`


    `func getStockLevel(name:String) -> Int?;`


    `}`


    `class NetConnFlyweightImpl : NetConnFlyweight {`


    `//` `...statements omitted for brevity...`


    `}`


    `class NetConnFlyweightFactory {`


    `class func createFlyweight() -> NetConnFlyweight {`


    `return NetConnFlyweightImpl(data: stockData);`


    `}`


    `private class var stockData:[String: Int] {`


    `get {`


    `struct singletonWrapper {`


    `static let singleton = ["Kayak" : 10, "Lifejacket": 14,`


    `"Soccer Ball": 32,"Corner Flags": 1, "Stadium": 4,`


    `"Thinking Cap": 8, "Unsteady Chair": 3,`


    `"Human Chess Board": 2, "Bling-Bling King":4`


    `];`


    `}`


    `return singletonWrapper.singleton;`


    `}`


    `}`


    `}`


    The `NetConnFlyweightFactory` class uses the singleton pattern to ensure that
    the extrinsic data is created once and defines a `createFlyweight` method that
    uses the extrinsic data to create instances of the implementation class.


    ### Applying the Flyweight


    The final step is to update the `NetworkConnection` class so that it uses the
    flyweight and shares a single immutable array of intrinsic stock data, as shown
    in Listing 17-13.


    Listing 17-13\. Using the Flyweight in the NetworkConnection.swift File


    `import Foundation`


    `class NetworkConnection {`


    `private let flyweight:NetConnFlyweight;`


    `init() {`


    `self.flyweight = NetConnFlyweightFactory.createFlyweight();`


    `}`


    `func getStockLevel(name:String) -> Int? {`


    `NSThread.sleepForTimeInterval(Double(rand() % 2));`


    `return self.flyweight.getStockLevel(name);`


    `}`


    `}`


    I have removed the local data array and changed the implementation of the `getStockLevel`
    method so that a flyweight is used to obtain the data value.


    ## Summary


    In this chapter, I explained how the flyweight pattern is used to share extrinsic
    data between objects in order to reduce the memory footprint of an application
    and the amount of work required to generate identical sets of data objects. In
    the next chapter, I describe the proxy pattern, which is used when an object is
    required to act as a representative of a resource or another object.'
  trans: "\n# Cocoa 中享元模式的示例\n\nCocoa 框架中有几个享元模式的实现。我觉得最有趣的是 `NSNumber` 类，它用于表示数值。通过管理两个使用相同值创建的\
    \ `NSNumber` 对象，该值成为了一个外在数据项——这可能会让粗心的人出错。清单 17-10 展示了我创建的用于演示的 `Numbers.playground`\
    \ 文件的内容。\n\n**清单 17-10. `Numbers.playground` 文件的内容**\n\n```\nimport Foundation;\n\
    \nlet num1 = NSNumber(int: 10);\n\nlet num2 = NSNumber(int: 10);\n\nprintln(\"\
    Comparison: \\(num1 == num2)\");\n\nprintln(\"Identity:   \\(num1 === num2)\"\
    );\n```\n\n我创建了两个 `NSNumber` 对象，它们都存储了整数值 `10`。然后我打印出了使用比较运算符和身份运算符的结果。调试控制台显示以下输出：\n\
    \n```\nComparison: true\n\nIdentity: true\n```\n\n比较运算符的结果合乎情理，但身份运算符的结果可能会让你感到惊讶。Cocoa\
    \ 通过共享 `NSNumber` 对象来最小化其所需的内存。这是一种许多语言应用于字符串值的技巧，使用一个称为字符串驻留（string interning）的进程，该进程能减少用于存储字符串的内存，并加快字符串比较的速度。Cocoa\
    \ 确实为 `NSString` 类实现了字符串驻留，但在 Swift 中使用比较困难，而 `NSNumber` 类则提供了一个更简单的示例。\n\n##\
    \ 将模式应用于 SportsStore 应用程序\n\nSportsStore 应用程序包含 `NetworkConnection` 类，我用它来模拟对库存水平数据的网络查询。每个\
    \ `NetworkConnection` 实例都包含一个库存值的字典，用于满足数据请求。以下是 `NetworkConnection` 类的定义：\n\n\
    ```\n...\n\nclass NetworkConnection {\n\n    private let stockData: [String: Int]\
    \ = [\n\n        \"Kayak\" : 10, \"Lifejacket\": 14, \"Soccer Ball\": 32,\"Corner\
    \ Flags\": 1,\n\n        \"Stadium\": 4, \"Thinking Cap\": 8, \"Unsteady Chair\"\
    : 3,\n\n        \"Human Chess Board\": 2, \"Bling-Bling King\":4\n\n    ];\n\n\
    \    func getStockLevel(name:String) -> Int? {\n\n        NSThread.sleepForTimeInterval(Double(rand()\
    \ % 2));\n\n        return stockData[name];\n\n    }\n\n}\n\n...\n```\n\n在本节中，我将应用享元模式，以便所有\
    \ `NetworkConnection` 对象都共享同一个字典对象。我要共享的字典创建起来并不复杂，也不占用太多内存，但它仍然为享元模式的应用提供了一个基础。\n\
    \n### 准备示例应用程序\n\n本章不需要做任何准备，我将直接从第 16 章结束的地方开始，继续处理 SportsStore 项目。\n\n### 创建享元协议和实现类\n\
    \n在实现享元模式时，我总是遵循相同的流程：先定义调用组件将要使用的协议，然后是享元实现类。这使我能够专注于协议中将被公开使用的 API，并在实现类中区分内在数据和外在数据。清单\
    \ 17-11 展示了 `NetworkConnectionFlyweight.swift` 文件的内容，我将其添加到 SportsStore 项目中以实现享元模式。\n\
    \n**清单 17-11. `NetworkConnectionFlyweight.swift` 文件的内容**\n\n```\nprotocol NetConnFlyweight\
    \ {\n\n    func getStockLevel(name:String) -> Int?;\n\n}\n\nclass NetConnFlyweightImpl\
    \ : NetConnFlyweight {\n\n    private let extrinsicData:[String: Int];\n\n   \
    \ private init(data:[String: Int]) {\n\n        self.extrinsicData = data;\n\n\
    \    }\n\n    func getStockLevel(name: String) -> Int? {\n\n        return extrinsicData[name];\n\
    \n    }\n\n}\n```\n\n这种模式的实现很简单，但我选择通过一个方法来暴露数据值，而不是提供一个允许访问字典的属性。我这样做是因为，这意味着我可以更改数据的存储方式，而无需更新协议（以及使用它的组件），并且这有助于确保我不会无意中允许修改外在数据（当你允许直接访问外在数据结构时，很容易发生这种情况）。\n\
    \n### 创建享元工厂\n\n定义了协议和实现类之后，我通过定义工厂及其管理的外在数据来完成享元模式。清单 17-12 展示了工厂类的定义。\n\n**清单\
    \ 17-12. 在 `NetworkConnectionFlyweight.swift` 文件中定义享元工厂类**\n\n```\nprotocol NetConnFlyweight\
    \ {\n\n    func getStockLevel(name:String) -> Int?;\n\n}\n\nclass NetConnFlyweightImpl\
    \ : NetConnFlyweight {\n\n    // ...为简洁起见省略了语句...\n\n}\n\nclass NetConnFlyweightFactory\
    \ {\n\n    class func createFlyweight() -> NetConnFlyweight {\n\n        return\
    \ NetConnFlyweightImpl(data: stockData);\n\n    }\n\n    private class var stockData:[String:\
    \ Int] {\n\n        get {\n\n            struct singletonWrapper {\n\n       \
    \         static let singleton = [\"Kayak\" : 10, \"Lifejacket\": 14,\n\n    \
    \                \"Soccer Ball\": 32,\"Corner Flags\": 1, \"Stadium\": 4,\n\n\
    \                    \"Thinking Cap\": 8, \"Unsteady Chair\": 3,\n\n         \
    \           \"Human Chess Board\": 2, \"Bling-Bling King\":4\n\n             \
    \   ];\n\n            }\n\n            return singletonWrapper.singleton;\n\n\
    \        }\n\n    }\n\n}\n```\n\n`NetConnFlyweightFactory` 类使用单例模式来确保外在数据只被创建一次，并定义了一个\
    \ `createFlyweight` 方法，该方法使用外在数据来创建实现类的实例。\n\n### 应用享元\n\n最后一步是更新 `NetworkConnection`\
    \ 类，使其使用享元并共享一个不可变的单一外部库存数据数组，如清单 17-13 所示。\n\n**清单 17-13. 在 `NetworkConnection.swift`\
    \ 文件中使用享元**\n\n```\nimport Foundation\n\nclass NetworkConnection {\n\n    private\
    \ let flyweight:NetConnFlyweight;\n\n    init() {\n\n        self.flyweight =\
    \ NetConnFlyweightFactory.createFlyweight();\n\n    }\n\n    func getStockLevel(name:String)\
    \ -> Int? {\n\n        NSThread.sleepForTimeInterval(Double(rand() % 2));\n\n\
    \        return self.flyweight.getStockLevel(name);\n\n    }\n\n}\n```\n\n我移除了本地的数据数组，并修改了\
    \ `getStockLevel` 方法的实现，使其使用享元来获取数据值。\n\n## 总结\n\n在本章中，我解释了如何使用享元模式在对象之间共享外在数据，以减少应用程序的内存占用以及生成相同数据对象集所需的工作量。在下一章中，我将描述代理模式，当一个对象需要作为某个资源或另一个对象的代表时，会使用该模式。\n"
- fmt: '# 18. The Proxy Pattern


    I describe the proxy pattern in this chapter, which is used when an object is
    required to act as an interface to another object or resource. There are three
    main ways in which the proxy pattern is applied, and I describe each of them and
    show you how to implement them. Table [18-1](#A978-1-4842-0394-1_18_Chapter.html#Tab1)
    puts the proxy pattern into context.


    **Table 18-1.** Putting the Proxy Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The proxy pattern defines an object—the proxy—that represents
    some other resource, such as another object or a remote service. Calling components
    operate on the proxy, which in turn operates on the underlying resource. |

    | What are the benefits? | Proxies allow close control over the way that the underlying
    resource is accessed, which is useful when you need to intercept and adapt operations.
    |

    | When should you use this pattern? | Proxies are used in three main situations:
    to define an interface to a remote resource such as a web page or RESTful service,
    to manage the execution of expensive operations, and to restrict access to the
    methods and properties of other objects. |

    | When should you avoid this pattern? | Do not use this pattern when the problem
    falls outside of the three situations that I describe in this chapter. Instead,
    use one of the other structural patterns. |

    | How do you know when you have implemented the pattern correctly? | The pattern
    is implemented correctly when the proxy object can be used to perform operations
    on the resource it represents. |

    | Are there any common pitfalls? | The only pitfall is allowing instances of the
    underlying class to be instantiated when a proxy is used to restrict access to
    an object. |

    | Are there any related patterns? | Many of the structural patterns have similar
    implementations but different intents. Ensure that you select the correct pattern
    from the ones I describe in this part of the book. |


    ## Preparing the Example Project


    For this chapter, I created an Xcode OS X Command Line Tool project called `Proxy`.
    Listing 18-1 shows the statements I added to the `main.swift` file to prepare
    for this chapter.


    **Listing 18-1.** The Contents of the `main.swift` File


    ```

    import Foundation;


    func getHeader(header:String) {


    let url = NSURL(string: "http://www.apress.com");


    let request = NSURLRequest(URL: url!);


    NSURLSession.sharedSession().dataTaskWithRequest(request,


    completionHandler: {data, response, error in


    if let httpResponse = response as? NSHTTPURLResponse {


    if let headerValue


    = httpResponse.allHeaderFields[header] as? NSString {


    println("\(header): \(headerValue)");


    }


    }


    }).resume();


    }


    let headers = ["Content-Length", "Content-Encoding"];


    for header in headers {


    getHeader(header);


    }


    NSFileHandle.fileHandleWithStandardInput().availableData;

    ```


    The code in the `main.swift` file makes HTTP requests to the Apress home page
    and prints the value of the `Content-Length` and `Content-Encoding` headers to
    the debug console. Running the application produces the following output:


    ```

    Content-Encoding: gzip

    Content-Length: 13960

    ```


    You may see the `Content-Length` header displayed first. This is because the `Foundation`
    framework classes that perform the HTTP requests are asynchronous and the requests
    are performed concurrently, meaning that either request may complete first and
    write its result to the console. You will almost certainly see a different header
    values when you run the example application because Apress often changes the content
    on the home page of its website.


    ## Understanding the Problems That the Pattern Solves


    The proxy pattern is used to solve three different problems, each of which I explain
    in the sections that follow.


    ### Understanding the Remote Object Problem


    The remote object problem arises whenever you are dealing with resources that
    are accessed over a network, such as a web page or a RESTful web service. The
    code in the `main.swift` file accesses a web page, but it doesn’t separate the
    feature it provides (getting an HTTP response header) from the mechanism used
    to make the request (the `NSURL`, `NSURLRequest`, and `NSURLSession` classes).
    There is no abstraction or encapsulation in this code, and changing the implementation
    will affect the way that the feature is consumed—something that is made worse
    if this kind of code is copied into any component that needs to read HTTP headers.


    ### Understanding the Expensive Operation Problem


    Tasks such as making HTTP requests are classified as expensive operations. The
    word expensive is used to refer to any aspect of an operation that should be minimized,
    such as the amount of computation required, the memory needed, the load on the
    device battery, the bandwidth consumed, and the elapsed time that the user has
    to wait.


    For an HTTP request, the major expenses are elapsed time, bandwidth, and the work
    the server has to perform to generate the response. The code in the `main.swift`
    file doesn’t attempt to optimize the way that the HTTP requests are performed
    to minimize the cost of the operation, and no thought has been given to the impact
    that this has on the user, the network, or the server that receives the requests.


    ### Understanding the Restricted Access Problem


    The need to restrict access to an object usually arises when a single-user framework
    is incorporated into a multiuser application. You can’t change the definition
    of the objects that you need to protect because you don’t have access to the source
    code or because there is already a dependency on the type elsewhere in the application,
    but equally, you cannot afford to let any user perform the operations that the
    object encapsulates.


    ## Understanding the Proxy Pattern


    The proxy pattern can be used whenever an object is required to represent some
    other resource. As you will see, the resource can be something abstract, such
    as a web page, or something local to the application, such as another object.
    Figure [18-1](#A978-1-4842-0394-1_18_Chapter.html#Fig1) shows the general form
    of the proxy pattern.


    ![A978-1-4842-0394-1_18_Fig1_HTML.jpg](A978-1-4842-0394-1_18_Fig1_HTML.jpg)


    **Figure 18-1.** The proxy pattern


    The general form of the proxy pattern lacks specificity, but that is because the
    pattern can be used in a wide range of situations. To put the pattern in context,
    in the following sections I explain how the pattern is used to solve the three
    common problems I described earlier in the chapter.'
