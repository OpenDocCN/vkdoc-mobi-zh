    `func setLettuce(choice: Bool) { self.lettuce = choice; }`


    `func setCooked(choice: Burger.Cooked) { self.cooked = choice; }`


    `func addPatty(choice: Bool)   { self.patties = choice ? 3 : 2; }`


    `func buildObject(name: String) -> Burger {`


    `return Burger(name: name, veggie: veggie, patties: patties,`


    `pickles: pickles, mayo: mayo, ketchup: ketchup,`


    `lettuce: lettuce, cook: cooked);`


    `}`


    `}`


    The `BurgerBuilder` class defines methods that will change the data values used
    to create a `Burger` object. Only the `name` parameter on the `Burger` initializer
    doesn’t have a default value, so the `buildObject` method accepts a `name` argument.
    The class responds to the `buildObject` method being called by creating a `Burger`
    object using the `name` value, the values provided via the other methods, and
    the default values.


    Tip


    I could have used properties in the class, but I prefer to use methods because
    I can clearly indicate the values for which there are no defaults by defining
    parameters on the `buildObject` method. I demonstrate how to use properties to
    create a builder when I apply the pattern to the SportsStore application later
    in this chapter.


    There is a direct mapping to the underlying properties for almost all of the methods
    defined by the class. The exception is the `addPatty` method, which allows the
    calling component to specify a number of patties—just by specifying whether an
    extra one should be added. This approach allows me to handle extra patties without
    making the calling component aware of what the default number is.


    ### Consuming the Builder


    The next step is to use the builder to create an object. Listing 11-5 shows the
    changes I made to the `main.swift` file.


    Listing 11-5. Consuming the Builder Pattern in the main.swift File


    `var builder = BurgerBuilder();`


    `// Step 1 - Ask for name`


    `let name = "Joe";`


    `// Step 2 - Is veggie meal required?`


    `builder.setVeggie(false);`


    `// Step 3 - Customize burger?`


    `builder.setMayo(false);`


    `builder.setCooked(Burger.Cooked.WELLDONE);`


    `// Step 4 - Buy additional patty?`


    `builder.addPatty(false);`


    `let order = builder.buildObject(name);`


    `order.printDescription();`


    This may appear similar to the way I created `Burger` objects without the builder
    pattern, but using the builder as an intermediary leads to improvements in flexibility
    by isolating the impact of change.


    ### Understanding the Impact of the Pattern


    The first improvement is that it is possible to change a default value in the
    builder without having to make changes to the calling component or to the `Burger`
    class. If most customers choose not to have pickles—presumably because they are
    weird and horrible and ruin a good burger—then the restaurant can update its menu
    to make burgers without them. Listing 11-6 shows the change to the builder class.


    Listing 11-6. Disabling Pickles in the Builder.swift File


    `class BurgerBuilder {`


    `private var veggie  = false;`


    `private var pickles = false;`


    `private var mayo    = true;`


    `private var ketchup = true;`


    `private var lettuce = true;`


    `private var cooked  = Burger.Cooked.NORMAL;`


    `private var patties = 2;`


    `func setVeggie(choice: Bool)  { self.veggie  = choice; }`


    `func setPickles(choice: Bool) { self.pickles = choice; }`


    `func setMayo(choice: Bool)    { self.mayo    = choice; }`


    `func setKetchup(choice: Bool) { self.ketchup = choice; }`


    `func setLettuce(choice: Bool) { self.lettuce = choice; }`


    `func setCooked(choice: Burger.Cooked) { self.cooked = choice; }`


    `func addPatty(choice: Bool)   { self.patties = choice ? 3 : 2; }`


    `func buildObject(name: String) -> Burger {`


    `return Burger(name: name, veggie: veggie, patties: patties,`


    `pickles: pickles, mayo: mayo, ketchup: ketchup,`


    `lettuce: lettuce, cook: cooked);`


    `}`


    `}`


    The calling component isn’t aware that the default has changed, and neither is
    the `Burger` class, but `Burger` objects will now be created without pickles unless
    the customer specifically asks for them. You can see the effect in the output
    produced by running the application.


    `Name Joe`


    `Veggie: false`


    `Patties: 2`


    `Pickles: false`


    `Mayo: false`


    `Ketchup: true`


    `Lettuce: true`


    `Cook: Well Done`'
  trans: '

    # 理解建造者模式


    建造者模式通过在组件及其需要操作的对象之间引入一个中介——称为建造者——来解决问题。如图 11-1 所示，建造者模式包含三个操作。


    ![A978-1-4842-0394-1_11_Fig1_HTML.jpg](img/A978-1-4842-0394-1_11_Fig1_HTML.jpg)


    图 11-1. 建造者模式


    在第一个操作中，调用组件向建造者提供一条数据，用于替换创建对象时使用的某个默认值。每次调用组件从其所遵循的流程中获取新值时，该操作都会重复执行。以我的点餐流程为例，调用组件能够在序列的每个阶段之后向建造者提供新的数据。


    在第二个操作中，调用组件要求建造者创建一个对象。这向建造者表明，将不会再有新数据，并且应该使用它已接收到的数据值以及调用组件未指定的数据项的默认值来创建一个对象。


    在第三个操作中，建造者创建一个对象，并将其作为对象返回给调用组件。


    调用组件知道需要什么——例如，一个不加番茄酱的汉堡——但它不知道如何创建它。建造者类知道如何创建汉堡，也知道默认配置，但它不知道顾客在任何特定订单中的需求。建造者模式将“需要什么”和“如何创建”结合在一起，同时避免调用组件与其所需对象之间产生紧密耦合。


    ## 实现建造者模式


    在接下来的章节中，我将演示如何将建造者模式应用到示例项目中，以便将 `Burger` 类的创建过程与使用 `Burger` 对象的组件解耦。


    ### 定义建造者类


    第一步是定义建造者类，其中包含 `Burger` 初始化器参数的默认值，并提供了允许调用组件更改这些值的方法。代码清单 11-4 展示了我添加到示例项目中的
    `Builder.swift` 文件的内容。


    代码清单 11-4. `Builder.swift` 文件的内容


    ```

    class BurgerBuilder {


    private var veggie  = false;

    private var pickles = true;

    private var mayo    = true;

    private var ketchup = true;

    private var lettuce = true;

    private var cooked  = Burger.Cooked.NORMAL;

    private var patties = 2;


    func setVeggie(choice: Bool)  { self.veggie  = choice; }

    func setPickles(choice: Bool) { self.pickles = choice; }

    func setMayo(choice: Bool)    { self.mayo    = choice; }

    func setKetchup(choice: Bool) { self.ketchup = choice; }

    func setLettuce(choice: Bool) { self.lettuce = choice; }

    func setCooked(choice: Burger.Cooked) { self.cooked = choice; }

    func addPatty(choice: Bool)   { self.patties = choice ? 3 : 2; }


    func buildObject(name: String) -> Burger {

    return Burger(name: name, veggie: veggie, patties: patties,

    pickles: pickles, mayo: mayo, ketchup: ketchup,

    lettuce: lettuce, cook: cooked);

    }


    }

    ```


    `BurgerBuilder` 类定义了用于更改创建 `Burger` 对象时所使用的数据值的方法。`Burger` 初始化器中只有 `name` 参数没有默认值，因此
    `buildObject` 方法接受一个 `name` 参数。该类通过使用 `name` 值、通过其他方法提供的值以及默认值创建一个 `Burger` 对象来响应
    `buildObject` 方法的调用。


    **提示**


    我本来可以在类中使用属性，但我更倾向于使用方法，因为通过在 `buildObject` 方法上定义参数，我可以清楚地指出那些没有默认值的参数。在本章稍后部分将建造者模式应用于
    SportsStore 应用时，我将演示如何使用属性来创建建造者。


    该类定义的所有方法几乎都与底层属性直接对应。唯一例外的是 `addPatty` 方法，它允许调用组件指定肉饼的数量——只需指定是否需要额外添加一个即可。这种方法使我能够处理额外肉饼的情况，而无需让调用组件了解默认数量是多少。


    ### 消费建造者


    下一步是使用建造者来创建一个对象。代码清单 11-5 展示了我对 `main.swift` 文件所做的更改。


    代码清单 11-5. 在 `main.swift` 文件中消费建造者模式


    ```

    var builder = BurgerBuilder();


    // 第 1 步 - 询问姓名

    let name = "Joe";


    // 第 2 步 - 是否需要素食餐？

    builder.setVeggie(false);


    // 第 3 步 - 定制汉堡？

    builder.setMayo(false);

    builder.setCooked(Burger.Cooked.WELLDONE);


    // 第 4 步 - 购买额外肉饼？

    builder.addPatty(false);


    let order = builder.buildObject(name);

    order.printDescription();

    ```


    这看起来可能与我之前不使用建造者模式创建 `Burger` 对象的方式相似，但使用建造者作为中介，通过隔离变化的影响，提高了灵活性。


    ### 理解模式的影响


    第一个改进是，可以在不修改调用组件或 `Burger` 类的情况下更改建造者中的默认值。如果大多数顾客选择不要酸黄瓜——大概是因为它们古怪、可怕，并且破坏了美味的汉堡——那么餐厅可以更新菜单，制作不添加酸黄瓜的汉堡。代码清单
    11-6 展示了对建造者类的更改。


    代码清单 11-6. 在 `Builder.swift` 文件中禁用酸黄瓜


    ```

    class BurgerBuilder {


    private var veggie  = false;

    private var pickles = false;

    private var mayo    = true;

    private var ketchup = true;

    private var lettuce = true;

    private var cooked  = Burger.Cooked.NORMAL;

    private var patties = 2;


    func setVeggie(choice: Bool)  { self.veggie  = choice; }

    func setPickles(choice: Bool) { self.pickles = choice; }

    func setMayo(choice: Bool)    { self.mayo    = choice; }

    func setKetchup(choice: Bool) { self.ketchup = choice; }

    func setLettuce(choice: Bool) { self.lettuce = choice; }

    func setCooked(choice: Burger.Cooked) { self.cooked = choice; }

    func addPatty(choice: Bool)   { self.patties = choice ? 3 : 2; }


    func buildObject(name: String) -> Burger {

    return Burger(name: name, veggie: veggie, patties: patties,

    pickles: pickles, mayo: mayo, ketchup: ketchup,

    lettuce: lettuce, cook: cooked);

    }


    }

    ```


    调用组件不知道默认值已经更改，`Burger` 类也不知道，但现在除非顾客明确要求，否则创建的 `Burger` 对象将不包含酸黄瓜。你可以从运行应用程序产生的输出中看到效果。


    ```

    Name Joe

    Veggie: false

    Patties: 2

    Pickles: false

    Mayo: false

    Ketchup: true

    Lettuce: true

    Cook: Well Done

    ```

