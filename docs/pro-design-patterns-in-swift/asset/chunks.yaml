    \ Delete City\n```\n\n请注意，我能够扩展示例应用程序的功能，而无需更改任何现有的模型、视图或控制器代码。我定义了一组新命令，然后添加新代码来响应这些命令并显示生成的数据。应用程序中的每个组件都专注于狭窄的任务范围，并且与其他组件松散耦合，从而可以轻松隔离组件进行测试，或添加/更改功能。\n\
    \n## MVC 模式的变体\n\nMVC 模式的实现方式有很多种变体，模式本身也存在变体。对于 Swift 开发者而言，唯一重要的变体是使用预定义的 MVC\
    \ 框架。最常用的框架是 `UIKit` 和 `AppKit`。创建自己的 MVC 框架是一个有趣的实验，它会揭示模式的各个部分如何协同工作，但对于实际应用，请坚持使用\
    \ Apple 提供的 MVC 框架，这些框架提供了大量现成的功能，并且经过了充分测试。\n\n## 理解 MVC 模式的陷阱\n\n最常见的陷阱是将本应属于另一部分的代码定义在错误的部分。正如我在本章开头所解释的，这并非总是界限分明的事情，避免这个陷阱的最佳方法是通过经验积累。成功实现\
    \ MVC 模式取决于理解你的开发流程是如何运作的，并且你应用 MVC 模式的次数越多，就越能理解什么对你的项目有效，什么无效。花时间思考你正在做什么，准备好在改变对某个功能的看法时进行重构，并给自己留下尝试的机会。\n\
    \n## Cocoa 中的 MVC 模式示例\n\nMVC 模式最明显的例子是 `AppKit` 和 `UIKit` 框架，它们使用 MVC 来强制 UI\
    \ 应用程序的结构化。\n\n## 总结\n\n在本章中，我描述了 MVC 模式，并解释了如何用它来为完整的应用程序添加结构。我解释了构成 MVC 模式的不同部分，并创建了一个示例应用程序和框架作为实现示例。\n\
    \n这就是我要教给你的关于设计模式的全部内容。我描述了每个你可以应用到 Swift 项目中的最重要的设计模式，并解释了你应该将我提供的实现作为你自己应用程序的起点，根据需要调整模式以适合你的需求、偏好和编码风格。祝愿你在\
    \ Swift 项目中一切顺利，我只希望你和我一样享受阅读这本书的乐趣。"
