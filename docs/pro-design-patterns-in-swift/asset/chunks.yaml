    defining the template and creating objects using the template.


    ## Understanding the Benefits of the Pattern


    The benefits of using a template are significant and are generally worth the effort
    required to define the template, whether it is a class or a struct. Tuples are
    a nice feature, but for the serious software developer, classes and structs are
    usually preferable because they provide a level of control and loose coupling
    that tuples can’t match, as I explain in the sections that follow.'
