    \          targetDonors = Array(targetDonors[0..<maxNumber]);\n        }\n   \
    \     // 第 4 步 - 生成邀请函\n        return generate(targetDonors);\n    }\n}\n...\n\
    ```\n\n我将 `filter` 和 `generate` 步骤定义为可被子类覆盖的独立方法，如清单 26-6 所示。\n\n**清单 26-6.** 在\
    \ `main.swift` 文件中创建子类\n\n```\nlet donorDb = DonorDatabase();\nlet galaInvitations\
    \ = donorDb.generate(2);\nfor invite in galaInvitations {\n    println(invite);\n\
