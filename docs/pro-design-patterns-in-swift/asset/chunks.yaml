    \  self.productDescription = description;\n        self.category = category;\n\
    \        super.init();\n        self.price = price;\n        self.stockLevel =\
    \ stockLevel;\n    }\n    var stockLevel:Int {\n        get { return stockLevelBackingValue;}\n\
    \        set { stockLevelBackingValue = max(0, newValue);}\n    }\n    private(set)\
    \ var price:Double {\n        get { return priceBackingValue;}\n        set {\
    \ priceBackingValue = max(1, newValue);}\n    }\n    var stockValue:Double {\n\
    \        get {\n            return price * Double(stockLevel);\n        }\n  \
    \  }\n    func copyWithZone(zone: NSZone) -> AnyObject {\n        return Product(name:\
    \ self.name, description: self.description,\n            category: self.category,\
    \ price: self.price,\n            stockLevel: self.stockLevel);\n    }\n    class\
    \ func createProduct(name:String, description:String, category:String,\n     \
    \   price:Double, stockLevel:Int) -> Product {\n        return Product(name:name,\
    \ description: description, category: category,\n            price: price, stockLevel:\
    \ stockLevel);\n    }\n}\n```\n\n我已从 `Product.swift` 文件中移除了特定于类别的子类，并简化了 `Product`\
    \ 类本身，使其不再处理销售税或追加销售机会（这些是由子类提供的特殊功能）。\n"
- fmt: "### Defining the Composite Class\n\nWhen applying the composite pattern to\
    \ an existing application, it isn’t always possible to create a protocol to which\
    \ both the leaf node and composite objects can conform. In these situations, I\
    \ treat the existing class as both the definition of the common functionality\
    \ and the template for the leaf nodes. This allows me to define the composite\
    \ class as a subclass, as shown in Listing 15-10.\n\n**Listing 15-10.** Defining\
    \ the Composite Class in the `Product.swift` File\n\n```\nimport Foundation\n\n\
    class Product : NSObject, NSCopying {\n    // ...statements omitted for brevity...\n\
    }\n\nclass ProductComposite : Product {\n    private let products:[Product];\n\
    \n    required init(name:String, description:String, category:String,\n      \
    \            price:Double, stockLevel:Int) {\n        fatalError(\"Not implemented\"\
    );\n    }\n\n    init(name:String, description:String, category:String, stockLevel:Int,\n\
    \         products:Product...) {\n        self.products = products;\n        super.init(name:\
    \ name, description: description, category: category,\n                   price:\
    \ 0, stockLevel: stockLevel);\n    }\n\n    override var price:Double {\n    \
    \    get { return reduce(products, 0, {total, p in return total + p.price}); }\n\
    \        set { /* do nothing */ }\n    }\n}\n```\n\nThis approach is not as elegant\
    \ as using a separate protocol, but it minimizes the number of changes that are\
    \ required to implement the pattern. The `ProductComposite` class consists of\
    \ subclasses from `Product` and maintains an immutable array of `Product` objects.\
    \ The `price` property is overridden so that the value returned is calculated\
    \ from the collected `Product` objects.\n\n### Applying the Pattern\n\nThe last\
    \ step is to add a product set to the SportsStore catalog. Listing 15-11 shows\
    \ the changes I made to the `ProductDataStore` class.\n\n**Listing 15-11.** Defining\
    \ Product Sets in the `ProductDataStore.swift` File\n\n```\nimport Foundation\n\
    \nfinal class ProductDataStore {\n    var callback:((Product) -> Void)?;\n   \
    \ private var networkQ:dispatch_queue_t\n    private var uiQ:dispatch_queue_t;\n\
    \    lazy var products:[Product] = self.loadData();\n\n    init() {\n        networkQ\
    \ = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);\n      \
    \  uiQ = dispatch_get_main_queue();\n    }\n\n    private func loadData() -> [Product]\
    \ {\n        // ...statements omitted for brevity...\n    }\n\n    private var\
    \ productData:[Product] = [\n        ProductComposite(name: \"Running Pack\",\n\
    \                         description: \"Complete Running Outfit\", category:\
    \ \"Running\",\n                         stockLevel: 10, products:\n         \
    \   Product.createProduct(\"Shirt\", description: \"Running Shirt\",\n       \
    \                           category: \"Running\", price: 42, stockLevel: 10),\n\
    \            Product.createProduct(\"Shorts\", description: \"Running Shorts\"\
    ,\n                                  category: \"Running\", price: 30, stockLevel:\
    \ 10),\n            Product.createProduct(\"Shoes\", description: \"Running Shoes\"\
    ,\n                                  category: \"Running\", price: 120, stockLevel:\
    \ 10),\n            ProductComposite(name: \"Headgear\", description: \"Hat, etc\"\
    ,\n                             category: \"Running\", stockLevel: 10, products:\n\
    \                Product.createProduct(\"Hat\", description: \"Running Hat\",\n\
    \                                      category: \"Running\", price: 10, stockLevel:\
    \ 10),\n                Product.createProduct(\"Sunglasses\", description: \"\
    Glasses\",\n                                      category: \"Running\", price:\
    \ 10, stockLevel: 10))\n        ),\n        Product.createProduct(\"Kayak\", description:\"\
    A boat for one person\",\n                              category:\"Watersports\"\
    , price:275.0, stockLevel:0),\n        Product.createProduct(\"Lifejacket\",\n\
    \                              description:\"Protective and fashionable\",\n \
    \                             category:\"Watersports\", price:48.95, stockLevel:0),\n\
    \        // ...statements omitted for brevity...\n    ]\n}\n```\n\nI have defined\
    \ a new product called `Running Pack` that is made up of individual products.\
    \ One of the products, `Headgear`, is itself a product set. Running the application\
    \ shows the addition of the product to the catalog, as shown in Figure 15-2.\n\
    \n![A978-1-4842-0394-1_15_Fig2_HTML.jpg](A978-1-4842-0394-1_15_Fig2_HTML.jpg)\n\
    \n**Figure 15-2.** A product set in the SportsStore catalog\n\n### Summary\n\n\
    In this chapter I showed you how the composite pattern can be used so that different\
    \ kinds of objects in a tree data structure can be treated consistently. In the\
    \ next chapter, I describe the façade pattern, which allows complex APIs to be\
    \ simplified for common tasks.\n\n# 16. The Façade Pattern\n\nThe façade pattern\
    \ is used to simplify the API presented by one or more classes so that common\
    \ tasks can be performed more easily and the complexity required to use the API\
    \ is consolidated in one part of the application. Table 16-1 puts the façade pattern\
    \ into context.\n\n**Table 16-1.** Putting the Façade Pattern into Context\n\n\
    | Question | Answer |\n| --- | --- |\n| What is it? | The façade pattern simplifies\
    \ the use of complex APIs to perform common tasks. |\n| What are the benefits?\
    \ | The complexity required to use an API is consolidated into a single class,\
    \ which minimizes the impact of changes in the API and simplifies the components\
    \ that consume the API functionality. |\n| When should you use this pattern? |\
    \ Use the façade pattern when you are working with classes that need to be used\
    \ together but that don’t have compatible APIs. |\n| When should you avoid this\
    \ pattern? | Do not use the façade pattern when integrating single components\
    \ into the application; use the adapter pattern instead. |\n| How do you know\
    \ when you have implemented the pattern correctly? | The façade pattern is implemented\
    \ when common tasks can be performed without calling components having any dependency\
    \ on the underlying objects or their supporting data types. |\n| Are there any\
    \ common pitfalls? | The pitfall when implementing the façade pattern is to leak\
    \ details of the underlying objects. This means that the calling components are\
    \ still dependent on the underlying classes or supporting types and will require\
    \ modification when they change. |\n| Are there any related patterns? | Many of\
    \ the structural patterns have similar implementations but different intents.\
    \ Ensure that you select the correct pattern from the ones that I describe in\
    \ this part of the book. |"
  raw: '### Defining the Composite Class


    When applying the composite pattern to an existing application, it isn’t always
    possible to create a protocol to which both the leaf node and composite objects
    can conform. In these situations, I treat the existing class as both the definition
    of the common functionality and the template for the leaf nodes. This allows me
    to define the composite class as a subclass, as shown in Listing 15-10.


    Listing 15-10. Defining the Composite Class in the Product.swift File


    `import Foundation`


    `class Product : NSObject, NSCopying {`


    `//` `...statements omitted for brevity...`


    `}`


    `class ProductComposite : Product {`


    `private let products:[Product];`


    `required init(name:String, description:String, category:String,`


    `price:Double, stockLevel:Int) {`


    `fatalError("Not implemented");`


    `}`


    `init(name:String, description:String, category:String, stockLevel:Int,`


    `products:Product...) {`


    `self.products = products;`


    `super.init(name: name, description: description, category: category,`


    `price: 0, stockLevel: stockLevel);`


    `}`


    `override var price:Double {`


    `get { return reduce(products, 0, {total, p in return total + p.price}); }`


    `set { /* do nothing */ }`


    `}`


    `}`


    This approach is not as elegant as using a separate protocol, but it minimizes
    the number of changes that are required to implement the pattern. The `ProductComposite`
    class consists of subclasses from `Product` and maintains an immutable array of
    `Product` objects. The `price` property is overridden so that the value returned
    is calculated from the collected `Product` objects.


    ### Applying the Pattern


    The last step is to add a product set to the SportsStore catalog. Listing 15-11
    shows the changes I made to the `ProductDataStore` class.


    Listing 15-11. Defining Product Sets in the ProductDataStore.swift File


    `import Foundation`


    `final class ProductDataStore {`


    `var callback:((Product) -> Void)?;`


    `private var networkQ:dispatch_queue_t`


    `private var uiQ:dispatch_queue_t;`


    `lazy var products:[Product] = self.loadData();`


    `init() {`


    `networkQ = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);`


    `uiQ = dispatch_get_main_queue();`


    `}`


    `private func loadData() -> [Product] {`


    `//` `...statements omitted for brevity...`


    `}`


    `private var productData:[Product] = [`


    `ProductComposite(name: "Running Pack",`


    `description: "Complete Running Outfit", category: "Running",`


    `stockLevel: 10, products:`


    `Product.createProduct("Shirt", description: "Running Shirt",`


    `category: "Running", price: 42, stockLevel: 10),`


    `Product.createProduct("Shorts", description: "Running Shorts",`


    `category: "Running", price: 30, stockLevel: 10),`


    `Product.createProduct("Shoes", description: "Running Shoes",`


    `category: "Running", price: 120, stockLevel: 10),`


    `ProductComposite(name: "Headgear", description: "Hat, etc",`


    `category: "Running", stockLevel: 10, products:`


    `Product.createProduct("Hat", description: "Running Hat",`


    `category: "Running", price: 10, stockLevel: 10),`


    `Product.createProduct("Sunglasses", description: "Glasses",`


    `category: "Running", price: 10, stockLevel: 10))`


    `),`


    `Product.createProduct("Kayak", description:"A boat for one person",`


    `category:"Watersports", price:275.0, stockLevel:0),`


    `Product.createProduct("Lifejacket",`


    `description:"Protective and fashionable",`


    `category:"Watersports", price:48.95, stockLevel:0),`


    `//` `...statements omitted for brevity...`


    `}`


    I have defined a new product called `Running Pack` that is made up of individual
    products. One of the products, `Headgear`, is itself a product set. Running the
    application shows the addition of the product to the catalog, as shown in Figure
    [15-2](#A978-1-4842-0394-1_15_Chapter.html#Fig2).


    ![A978-1-4842-0394-1_15_Fig2_HTML.jpg](A978-1-4842-0394-1_15_Fig2_HTML.jpg)


    Figure 15-2.


    A product set in the SportsStore catalog


    ## Summary


    In this chapter I showed you how the composite pattern can be used so that different
    kinds of objects in a tree data structure can be treated consistently. In the
    next chapter, I describe the façade pattern, which allows complex APIs to be simplified
    for common tasks.


    # 16. The Façade Pattern


    The façade pattern is used to simplify the API presented by one or more classes
    so that common tasks can be performed more easily and the complexity required
    to use the API is consolidated in one part of the application. Table [16-1](#A978-1-4842-0394-1_16_Chapter.html#Tab1)
    puts the façade pattern into context.


    Table 16-1.


    Putting the Façade Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The façade pattern simplifies the use of complex APIs to perform
    common tasks. |

    | What are the benefits? | The complexity required to use an API is consolidated
    into a single class, which minimizes the impact of changes in the API and simplifies
    the components that consume the API functionality. |

    | When should you use this pattern? | Use the façade pattern when you are working
    with classes that need to be used together but that don’t have compatible APIs.
    |

    | When should you avoid this pattern? | Do not use the façade pattern when integrating
    single components into the application; use the adapter pattern instead. |

    | How do you know when you have implemented the pattern correctly? | The façade
    pattern is implemented when common tasks can be performed without calling components
    having any dependency on the underlying objects or their supporting data types.
    |

    | Are there any common pitfalls? | The pitfall when implementing the façade pattern
    is to leak details of the underlying objects. This means that the calling components
    are still dependent on the underlying classes or supporting types and will require
    modification when they change. |

    | Are there any related patterns? | Many of the structural patterns have similar
    implementations but different intents. Ensure that you select the correct pattern
    from the ones that I describe in this part of the book. |'
  trans: "\n### 定义组合类\n\n当将组合模式应用于现有应用程序时，通常无法创建一个让叶节点和组合对象都遵循的协议。在这种情况下，我将现有类既视为通用功能定义，又视为叶节点的模板。这使我能够将组合类定义为一个子类，如代码清单\
    \ 15-10 所示。\n\n**代码清单 15-10.** 在`Product.swift`文件中定义组合类\n\n```\nimport Foundation\n\
    \nclass Product : NSObject, NSCopying {\n    // ...为简洁起见，省略了语句...\n}\n\nclass\
    \ ProductComposite : Product {\n    private let products:[Product];\n\n    required\
    \ init(name:String, description:String, category:String,\n                  price:Double,\
    \ stockLevel:Int) {\n        fatalError(\"Not implemented\");\n    }\n\n    init(name:String,\
    \ description:String, category:String, stockLevel:Int,\n         products:Product...)\
    \ {\n        self.products = products;\n        super.init(name: name, description:\
    \ description, category: category,\n                   price: 0, stockLevel: stockLevel);\n\
    \    }\n\n    override var price:Double {\n        get { return reduce(products,\
    \ 0, {total, p in return total + p.price}); }\n        set { /* do nothing */\
    \ }\n    }\n}\n```\n\n这种方法不如使用单独的协议那样优雅，但它最大程度地减少了实现该模式所需的更改次数。`ProductComposite`\
    \ 类继承自 `Product`，并维护了一个不可变的 `Product` 对象数组。`price` 属性被重写，以便从收集到的 `Product` 对象计算返回值。\n\
    \n### 应用模式\n\n最后一步是向 SportsStore 目录中添加一个产品集。代码清单 15-11 展示了我对 `ProductDataStore`\
    \ 类所做的更改。\n\n**代码清单 15-11.** 在`ProductDataStore.swift`文件中定义产品集\n\n```\nimport\
    \ Foundation\n\nfinal class ProductDataStore {\n    var callback:((Product) ->\
    \ Void)?;\n    private var networkQ:dispatch_queue_t\n    private var uiQ:dispatch_queue_t;\n\
    \    lazy var products:[Product] = self.loadData();\n\n    init() {\n        networkQ\
    \ = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);\n      \
    \  uiQ = dispatch_get_main_queue();\n    }\n\n    private func loadData() -> [Product]\
    \ {\n        // ...为简洁起见，省略了语句...\n    }\n\n    private var productData:[Product]\
    \ = [\n        ProductComposite(name: \"跑步套装\",\n                         description:\
    \ \"完整的跑步装备\", category: \"跑步\",\n                         stockLevel: 10, products:\n\
    \            Product.createProduct(\"衬衫\", description: \"跑步衬衫\",\n          \
    \                        category: \"跑步\", price: 42, stockLevel: 10),\n     \
    \       Product.createProduct(\"短裤\", description: \"跑步短裤\",\n               \
    \                   category: \"跑步\", price: 30, stockLevel: 10),\n          \
    \  Product.createProduct(\"鞋子\", description: \"跑步鞋\",\n                     \
    \             category: \"跑步\", price: 120, stockLevel: 10),\n            ProductComposite(name:\
    \ \"头部装备\", description: \"帽子等\",\n                             category: \"跑步\"\
    , stockLevel: 10, products:\n                Product.createProduct(\"帽子\", description:\
    \ \"跑步帽\",\n                                      category: \"跑步\", price: 10,\
    \ stockLevel: 10),\n                Product.createProduct(\"太阳镜\", description:\
    \ \"眼镜\",\n                                      category: \"跑步\", price: 10,\
    \ stockLevel: 10))\n        ),\n        Product.createProduct(\"皮划艇\", description:\"\
    单人船\",\n                              category:\"水上运动\", price:275.0, stockLevel:0),\n\
    \        Product.createProduct(\"救生衣\",\n                              description:\"\
    既保护又时尚\",\n                              category:\"水上运动\", price:48.95, stockLevel:0),\n\
    \        // ...为简洁起见，省略了语句...\n    ]\n}\n```\n\n我定义了一个名为“跑步套装”的新产品，它由多个独立产品组成。其中一个产品“头部装备”本身也是一个产品集。运行应用程序将看到该产品已添加到目录中，如图\
    \ 15-2 所示。\n\n![A978-1-4842-0394-1_15_Fig2_HTML.jpg](img/A978-1-4842-0394-1_15_Fig2_HTML.jpg)\n\
    \n**图 15-2.** SportsStore 目录中的产品集\n\n### 本章小结\n\n在本章中，我展示了如何使用组合模式，以便能够一致地处理树形数据结构中的不同类型对象。在下一章中，我将描述外观模式，该模式能够简化复杂\
    \ API，以便更轻松地执行常见任务。\n\n# 16. 外观模式\n\n外观模式用于简化由一个或多个类提供的 API，以便更轻松地执行常见任务，并将使用\
    \ API 所需的复杂性集中到应用程序的一个部分。表 16-1 将外观模式置于上下文中。\n\n**表 16-1.** 将外观模式置于上下文中\n\n| 问题\
    \ | 答案 |\n| --- | --- |\n| 它是什么？ | 外观模式简化了执行常见任务时使用复杂 API 的过程。 |\n| 好处是什么？ | 使用\
    \ API 所需的复杂性被集中到一个类中，从而最大限度地降低了 API 变更的影响，并简化了使用 API 功能的组件。 |\n| 何时应使用此模式？ | 当处理需要一起使用但\
    \ API 不兼容的类时，应使用外观模式。 |\n| 何时应避免此模式？ | 当将单个组件集成到应用程序中时，不应使用外观模式；而应使用适配器模式。 |\n\
    | 如何判断是否正确实现了该模式？ | 当无需调用组件依赖于底层对象或其支持数据类型即可执行常见任务时，即实现了外观模式。 |\n| 有哪些常见的陷阱？ |\
    \ 实现外观模式时的陷阱是泄漏底层对象的细节。这意味着调用组件仍然依赖于底层类或支持类型，并在它们发生变化时需要修改。 |\n| 有哪些相关模式？ | 许多结构模式具有相似的实现但不同的意图。请确保从我本书本部分描述的模式中选择正确的模式。\
    \ |\n"
- fmt: "## Preparing the Example Project\n\nFor this chapter, I created an Xcode OS\
    \ X Command Line Tool project called `Facade`. I am going to create three classes\
    \ on the theme of pirates. For the first, I created the `TreasureMap.swift` file,\
    \ the contents of which are shown in Listing 16-1.\n\n**Listing 16-1.** The Contents\
    \ of the `TreasureMap.swift` File\n\n```\nclass TreasureMap {\n\n    enum Treasures\
    \ {\n        case GALLEON; case BURIED_GOLD; case SUNKEN_JEWELS;\n    }\n\n  \
    \  struct MapLocation {\n        let gridLetter: Character;\n        let gridNumber:\
    \ UInt;\n    }\n\n    func findTreasure(type:Treasures) -> MapLocation {\n   \
    \     switch type {\n        case .GALLEON:\n            return MapLocation(gridLetter:\
    \ \"D\", gridNumber: 6);\n        case .BURIED_GOLD:\n            return MapLocation(gridLetter:\
    \ \"C\", gridNumber: 2);\n        case .SUNKEN_JEWELS:\n            return MapLocation(gridLetter:\
    \ \"F\", gridNumber: 12);\n        }\n    }\n}\n```\n\nThe `TreasureMap` class\
    \ defines the `findTreasure` method, which accepts a value from the nested `Treasures`\
    \ enumeration and returns a `MapLocation` that represents the location at which\
    \ the specified type of treasure can be found. The second file I created is called\
    \ `PirateShip.swift`, and its contents are shown in Listing 16-2.\n\n**Listing\
    \ 16-2.** The Contents of the `PirateShip.swift` File\n\n```\nimport Foundation;\n\
    \nclass PirateShip {\n\n    struct ShipLocation {\n        let NorthSouth:Int;\n\
    \        let EastWest:Int;\n    }\n\n    var currentPosition:ShipLocation;\n \
    \   var movementQueue = dispatch_queue_create(\"shipQ\", DISPATCH_QUEUE_SERIAL);\n\
    \n    init() {\n        currentPosition = ShipLocation(NorthSouth: 5, EastWest:\
    \ 5);\n    }\n\n    func moveToLocation(location:ShipLocation, callback:(ShipLocation)\
    \ -> Void) {\n        dispatch_async(movementQueue, {() in\n            self.currentPosition\
    \ = location;\n            callback(self.currentPosition);\n        });\n    }\n\
    }\n```\n\nAs its name suggests, the `PirateShip` class represents a ship, which\
    \ can be moved to new locations. Locations are specified using the nested `ShipLocation`\
    \ struct and passed to the `moveToLocation` method. Ships take time to move to\
    \ new locations, so the implementation of the `moveToLocation` method is asynchronous\
    \ and uses a callback to send a notification when the ship is in the specified\
    \ location. The asynchronous implementation is performed using a Grand Central\
    \ Dispatch queue and block, which I described in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html).\
    \ I have not added any delays to moving the ship, so the callback will be invoked\
    \ immediately; that’s enough for this chapter, where my emphasis is on dealing\
    \ with complex APIs. The final file I added to the project is called `PirateCrew.swift`,\
    \ and its contents are shown in Listing 16-3.\n\n**Listing 16-3.** The Contents\
    \ of the `PirateCrew.swift` File\n\n```\nimport Foundation;\n\nclass PirateCrew\
    \ {\n\n    let workQueue = dispatch_queue_create(\"crewWorkQ\", DISPATCH_QUEUE_SERIAL);\n\
    \n    enum Actions {\n        case ATTACK_SHIP; case DIG_FOR_GOLD; case DIVE_FOR_JEWELS;\n\
    \    }\n\n    func performAction(action:Actions, callback:(Int) -> Void) {\n \
    \       dispatch_async(workQueue, {() in\n            var prizeValue = 0;\n  \
    \          switch (action) {\n            case .ATTACK_SHIP:\n               \
    \ prizeValue = 10000;\n            case .DIG_FOR_GOLD:\n                prizeValue\
    \ = 5000;\n            case .DIVE_FOR_JEWELS:\n                prizeValue = 1000;\n\
    \            }\n            callback(prizeValue);\n        });\n    }\n}\n```\n\
    \nThe `PirateCrew` class represents the crew of the ship, which can be assigned\
    \ work through the `performAction` method. The work to be performed is expressed\
    \ as a value from the `Actions` enumeration. The work itself is performed asynchronously,\
    \ and a callback is used to signal when it has been completed. An `Int` value\
    \ is passed to the callback that represents the worth of the treasure obtained\
    \ as a result of the work.\n\n## Understanding the Problem That the Pattern Solves\n\
    \nThe three classes in the example application have to be used together in order\
    \ to generate any profit for the pirates. The `TreasureMap` class provides information\
    \ on where there is treasure to be found, the `PirateShip` class provides the\
    \ means for transporting the labor force required to retrieve the treasure, and\
    \ the `PirateCrew` class provides the means to direct the labor force once it\
    \ is in position.\n\nThese classes have to be used in a specific order. There\
    \ is no point moving the ship until the location of treasure has been obtained\
    \ from the map, and there is no point giving the crew work until the ship is in\
    \ position.\n\nTo make the situation worse, the classes use different data types\
    \ to represent their inputs and outputs. The `TreasureMap` class uses a different\
    \ coordinate data type from the `PirateShip` class and a different enumeration\
    \ from the `PirateCrew` class. And, finally, the methods defined by these classes\
    \ have different characteristics; some produce results immediately, and others\
    \ are asynchronous.\n\nThe problem this creates is that a degree of complexity\
    \ is incurred to coordinate the use of these three classes in order to make any\
    \ money. Listing 16-4 shows the code I defined in the `main.swift` file as a demonstration.\n\
    \n**Listing 16-4.** The Contents of the `main.swift` File\n\n```\nimport Foundation;\n\
    \nlet map = TreasureMap();\nlet ship = PirateShip();\nlet crew = PirateCrew();\n\
    \nlet treasureLocation = map.findTreasure(TreasureMap.Treasures.GALLEON);\n\n\
    // convert from map to ship coordinates\nlet sequence:[Character] = [\"A\", \"\
    B\", \"C\", \"D\", \"E\", \"F\", \"G\"];\nlet eastWestPos = find(sequence, treasureLocation.gridLetter);\n\
    let shipTarget = PirateShip.ShipLocation(NorthSouth:\n    Int(treasureLocation.gridNumber),\
    \ EastWest: eastWestPos!);\n\n// relocate ship\nship.moveToLocation(shipTarget,\
    \ callback: {location in\n    // get the crew to work\n    crew.performAction(PirateCrew.Actions.ATTACK_SHIP,\
    \ {prize in\n        println(\"Prize: \\(prize) pieces of eight\");\n    });\n\
    });\n\nNSFileHandle.fileHandleWithStandardInput().availableData;\n```\n\nThe code\
    \ in the `main.swift` file creates the `map`, `ship`, and `crew` objects and uses\
    \ them in sequence to find and attack a treasure galleon. The code converts between\
    \ the coordinates used by the map into the coordinates used by the ship and ensures\
    \ that the instruction given to the crew (`ATTACK_SHIP`) corresponds with the\
    \ map object at the ship’s location (`GALLEON`). This code uses closures for the\
    \ asynchronous callback methods to ensure that the crew is not given orders until\
    \ the ship is in position and to get information about the prize money that is\
    \ obtained.\n\n**Tip:** I have used the `NSFileHandle` class in Listing 16-4 to\
    \ stop the application from exiting before the asynchronous method calls made\
    \ to the `PirateShip` and `PirateCrew` objects have completed. Applications don’t\
    \ wait for asynchronous GCD operations to complete, and `NSFileHandle` keeps the\
    \ application alive by waiting to read data from the console.\n\nThis complexity\
    \ will be duplicated throughout the application whenever the `TreasureMap`, `PirateShip`,\
    \ and `PirateCrew` objects are used. The duplicated code will have to be carefully\
    \ changed if any of the individual objects, the relationship between them, or\
    \ the data types they use change. This kind of dependency leads to errors and\
    \ produces code that is difficult to test effectively. Running the application\
    \ produces the following output:\n\n```\nPrize: 10000 pieces of eight\n```"
  raw: '## Preparing the Example Project


    For this chapter, I created an Xcode OS X Command Line Tool project called Facade.
    I am going to create three classes on the theme of pirates. For the first, I created
    the `TreasureMap.swift` file, the contents of which are shown in Listing 16-1.


    Listing 16-1. The Contents of the TreasureMap.swift File


    `class TreasureMap {`


    `enum Treasures {`


    `case GALLEON; case BURIED_GOLD; case SUNKEN_JEWELS;`


    `}`


    `struct MapLocation {`


    `let gridLetter: Character;`


    `let gridNumber: UInt;`


    `}`


    `func findTreasure(type:Treasures) -> MapLocation {`


    `switch type {`


    `case .GALLEON:`


    `return MapLocation(gridLetter: "D", gridNumber: 6);`


    `case .BURIED_GOLD:`


    `return MapLocation(gridLetter: "C", gridNumber: 2);`


    `case .SUNKEN_JEWELS:`


    `return MapLocation(gridLetter: "F", gridNumber: 12);`


    `}`


    `}`


    `}`


    The `TreasureMap` class defines the `findTreasure` method, which accepts a value
    from the nested `Treasures` enumeration and returns a `MapLocation` that represents
    the location at which the specified type of treasure can be found. The second
    file I created is called `PirateShip.swift`, and its contents are shown in Listing
    16-2.


    Listing 16-2. The Contents of the PirateShip.swift File


    `import Foundation;`


    `class PirateShip {`


    `struct ShipLocation {`


    `let NorthSouth:Int;`


    `let EastWest:Int;`


    `}`


    `var currentPosition:ShipLocation;`


    `var movementQueue = dispatch_queue_create("shipQ", DISPATCH_QUEUE_SERIAL);`


    `init() {`


    `currentPosition = ShipLocation(NorthSouth: 5, EastWest: 5);`


    `}`


    `func moveToLocation(location:ShipLocation, callback:(ShipLocation) -> Void) {`


    `dispatch_async(movementQueue, {() in`


    `self.currentPosition = location;`


    `callback(self.currentPosition);`


    `});`


    `}`


    `}`


    As its name suggests, the `PirateShip` class represents a ship, which can be moved
    to new locations. Locations are specified using the nested `ShipLocation` struct
    and passed to the `moveToLocation` method. Ships take time to move to new locations,
    so the implementation of the `moveToLocation` method is asynchronous and uses
    a callback to send a notification when the ship is in the specified location.
    The asynchronous implementation is performed using a Grand Central Dispatch queue
    and block, which I described in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html).
    I have not added any delays to moving the ship, so the callback will be invoked
    immediately; that’s enough for this chapter, where my emphasis is on dealing with
    complex APIs. The final file I added to the project is called `PirateCrew.swift`,
    and its contents are shown in Listing 16-3.


    Listing 16-3. The Contents of the PirateCrew.swift File


    `import Foundation;`


    `class PirateCrew {`


    `let workQueue = dispatch_queue_create("crewWorkQ", DISPATCH_QUEUE_SERIAL);`


    `enum Actions {`


    `case ATTACK_SHIP; case DIG_FOR_GOLD; case DIVE_FOR_JEWELS;`


    `}`


    `func performAction(action:Actions, callback:(Int) -> Void) {`


    `dispatch_async(workQueue, {() in`


    `var prizeValue = 0;`


    `switch (action) {`


    `case .ATTACK_SHIP:`


    `prizeValue = 10000;`


    `case .DIG_FOR_GOLD:`


    `prizeValue = 5000;`


    `case .DIVE_FOR_JEWELS:`


    `prizeValue = 1000;`


    `}`


    `callback(prizeValue);`


    `});`


    `}`


    `}`


    The `PirateCrew` class represents the crew of the ship, which can be assigned
    work through the `performAction` method. The work to be performed is expressed
    as a value from the `Actions` enumeration. The work itself is performed asynchronously,
    and a callback is used to signal when it has been completed. An `Int` value is
    passed to the callback that represents the worth of the treasure obtained as a
    result of the work.


    ## Understanding the Problem That the Pattern Solves


    The three classes in the example application have to be used together in order
    to generate any profit for the pirates. The `TreasureMap` class provides information
    on where there is treasure to be found, the `PirateShip` class provides the means
    for transporting the labor force required to retrieve the treasure, and the `PirateCrew`
    class provides the means to direct the labor force once it is in position.


    These classes have to be used in a specific order. There is no point moving the
    ship until the location of treasure has been obtained from the map, and there
    is no point giving the crew work until the ship is in position.


    To make the situation worse, the classes use different data types to represent
    their inputs and outputs. The `TreasureMap` class uses a different coordinate
    data type from the `PirateShip` class and a different enumeration from the `PirateCrew`
    class. And, finally, the methods defined by these classes have different characteristics;
    some produce results immediately, and others are asynchronous.


    The problem this creates is that a degree of complexity is incurred to coordinate
    the use of these three classes in order to make any money. Listing 16-4 shows
    the code I defined in the `main.swift` file as a demonstration.


    Listing 16-4. The Contents of the main.swift File


    `import Foundation;`


    `let map = TreasureMap();`


    `let ship = PirateShip();`


    `let crew = PirateCrew();`


    `let treasureLocation = map.findTreasure(TreasureMap.Treasures.GALLEON);`


    `// convert from map to ship coordinates`


    `let sequence:[Character] = ["A", "B", "C", "D", "E", "F", "G"];`


    `let eastWestPos = find(sequence, treasureLocation.gridLetter);`


    `let shipTarget = PirateShip.ShipLocation(NorthSouth:`


    `Int(treasureLocation.gridNumber), EastWest: eastWestPos!);`


    `// relocate ship`


    `ship.moveToLocation(shipTarget, callback: {location in`


    `// get the crew to work`


    `crew.performAction(PirateCrew.Actions.ATTACK_SHIP, {prize in`


    `println("Prize: \(prize) pieces of eight");`


    `});`


    `});`


    `NSFileHandle.fileHandleWithStandardInput().availableData;`


    The code in the `main.swift` file creates the `map`, `ship`, and `crew` objects
    and uses them in sequence to find and attack a treasure galleon. The code converts
    between the coordinates used by the map into the coordinates used by the ship
    and ensures that the instruction given to the crew (`ATTACK_SHIP`) corresponds
    with the map object at the ship’s location (`GALLEON`). This code uses closures
    for the asynchronous callback methods to ensure that the crew is not given orders
    until the ship is in position and to get information about the prize money that
    is obtained.


    Tip


    I have used the `NSFileHandle` class in Listing 16-4 to stop the application from
    exiting before the asynchronous method calls made to the `PirateShip` and `PirateCrew`
    objects have completed. Applications don’t wait for asynchronous GCD operations
    to complete, and `NSFileHandle` keeps the application alive by waiting to read
    data from the console.


    This complexity will be duplicated throughout the application whenever the `TreasureMap`,
    `PirateShip`, and `PirateCrew` objects are used. The duplicated code will have
    to be carefully changed if any of the individual objects, the relationship between
    them, or the data types they use change. This kind of dependency leads to errors
    and produces code that is difficult to test effectively. Running the application
    produces the following output:


    `Prize: 10000 pieces of eight`'
  trans: "\n## 准备示例项目\n\n针对本章内容，我创建了一个名为`Facade`的 Xcode OS X 命令行工具项目。我将以海盗为主题创建三个类。首先创建了`TreasureMap.swift`文件，其内容如代码清单\
    \ 16-1 所示。\n\n**代码清单 16-1.**`TreasureMap.swift`文件的内容\n\n```\nclass TreasureMap\
    \ {\n\n    enum Treasures {\n        case GALLEON; case BURIED_GOLD; case SUNKEN_JEWELS;\n\
    \    }\n\n    struct MapLocation {\n        let gridLetter: Character;\n     \
    \   let gridNumber: UInt;\n    }\n\n    func findTreasure(type:Treasures) -> MapLocation\
    \ {\n        switch type {\n        case .GALLEON:\n            return MapLocation(gridLetter:\
    \ \"D\", gridNumber: 6);\n        case .BURIED_GOLD:\n            return MapLocation(gridLetter:\
    \ \"C\", gridNumber: 2);\n        case .SUNKEN_JEWELS:\n            return MapLocation(gridLetter:\
    \ \"F\", gridNumber: 12);\n        }\n    }\n}\n```\n\n`TreasureMap`类定义了`findTreasure`方法，该方法接收嵌套枚举`Treasures`中的一个值，并返回一个`MapLocation`实例，表示指定类型宝藏的所在地。我创建的第二个文件名为`PirateShip.swift`，其内容如代码清单\
    \ 16-2 所示。\n\n**代码清单 16-2.**`PirateShip.swift`文件的内容\n\n```\nimport Foundation;\n\
    \nclass PirateShip {\n\n    struct ShipLocation {\n        let NorthSouth:Int;\n\
    \        let EastWest:Int;\n    }\n\n    var currentPosition:ShipLocation;\n \
    \   var movementQueue = dispatch_queue_create(\"shipQ\", DISPATCH_QUEUE_SERIAL);\n\
    \n    init() {\n        currentPosition = ShipLocation(NorthSouth: 5, EastWest:\
    \ 5);\n    }\n\n    func moveToLocation(location:ShipLocation, callback:(ShipLocation)\
    \ -> Void) {\n        dispatch_async(movementQueue, {() in\n            self.currentPosition\
    \ = location;\n            callback(self.currentPosition);\n        });\n    }\n\
    }\n```\n\n顾名思义，`PirateShip`类代表一艘可以移动到新位置的船。位置通过嵌套的`ShipLocation`结构体指定，并传递给`moveToLocation`方法。船只移动到新位置需要时间，因此`moveToLocation`方法的实现是异步的，并使用回调在船只到达指定位置时发送通知。异步实现使用了\
    \ Grand Central Dispatch 队列和块，我在第 7 章中对此进行了描述。我没有为船只移动添加任何延迟，因此回调会立即被调用；这对于本章的重点——处理复杂\
    \ API——来说已经足够了。我添加到项目中的最后一个文件名为`PirateCrew.swift`，其内容如代码清单 16-3 所示。\n\n**代码清单\
    \ 16-3.**`PirateCrew.swift`文件的内容\n\n```\nimport Foundation;\n\nclass PirateCrew\
    \ {\n\n    let workQueue = dispatch_queue_create(\"crewWorkQ\", DISPATCH_QUEUE_SERIAL);\n\
    \n    enum Actions {\n        case ATTACK_SHIP; case DIG_FOR_GOLD; case DIVE_FOR_JEWELS;\n\
    \    }\n\n    func performAction(action:Actions, callback:(Int) -> Void) {\n \
    \       dispatch_async(workQueue, {() in\n            var prizeValue = 0;\n  \
    \          switch (action) {\n            case .ATTACK_SHIP:\n               \
    \ prizeValue = 10000;\n            case .DIG_FOR_GOLD:\n                prizeValue\
    \ = 5000;\n            case .DIVE_FOR_JEWELS:\n                prizeValue = 1000;\n\
    \            }\n            callback(prizeValue);\n        });\n    }\n}\n```\n\
    \n`PirateCrew`类代表船员，可以通过`performAction`方法为船员分配工作。要执行的工作由`Actions`枚举中的一个值表示。工作本身是异步执行的，并通过回调来通知任务已完成。回调接收一个`Int`值，代表工作所得的宝藏价值。\n\
    \n## 理解该模式解决的问题\n\n示例应用中的三个类必须协同使用，才能为海盗创造收益。`TreasureMap`类提供宝藏位置信息，`PirateShip`类提供运输劳动力以获取宝藏所需的手段，而`PirateCrew`类则提供在就位后指挥劳动力的方式。\n\
    \n这些类必须按特定顺序使用。在从地图上获得宝藏位置之前，移动船只毫无意义；在船只就位之前，给船员分配工作也毫无意义。\n\n更糟糕的是，这些类使用不同的数据类型来表示其输入和输出。`TreasureMap`类使用的坐标数据类型与`PirateShip`类不同，使用的枚举也与`PirateCrew`类不同。最后，这些类定义的方法具有不同的特性：有些方法立即返回结果，而另一些则是异步的。\n\
    \n由此产生的问题是，为了协调使用这三个类来赚钱，会带来一定的复杂性。代码清单 16-4 展示了我在`main.swift`文件中定义的演示代码。\n\n\
    **代码清单 16-4.**`main.swift`文件的内容\n\n```\nimport Foundation;\n\nlet map = TreasureMap();\n\
    let ship = PirateShip();\nlet crew = PirateCrew();\n\nlet treasureLocation = map.findTreasure(TreasureMap.Treasures.GALLEON);\n\
    \n// convert from map to ship coordinates\nlet sequence:[Character] = [\"A\",\
    \ \"B\", \"C\", \"D\", \"E\", \"F\", \"G\"];\nlet eastWestPos = find(sequence,\
    \ treasureLocation.gridLetter);\nlet shipTarget = PirateShip.ShipLocation(NorthSouth:\n\
    \    Int(treasureLocation.gridNumber), EastWest: eastWestPos!);\n\n// relocate\
    \ ship\nship.moveToLocation(shipTarget, callback: {location in\n    // get the\
    \ crew to work\n    crew.performAction(PirateCrew.Actions.ATTACK_SHIP, {prize\
    \ in\n        println(\"Prize: \\(prize) pieces of eight\");\n    });\n});\n\n\
    NSFileHandle.fileHandleWithStandardInput().availableData;\n```\n\n`main.swift`文件中的代码创建了`map`、`ship`和`crew`对象，并按顺序使用它们来寻找并攻击一艘宝藏帆船。代码将地图使用的坐标转换为船只使用的坐标，并确保给船员下达的指令（`ATTACK_SHIP`）与船只所在位置的地图对象（`GALLEON`）相对应。这段代码为异步回调方法使用了闭包，以确保在船只就位之前不会向船员下达命令，并获取所得奖金的信息。\n\
    \n**提示：** 我在代码清单 16-4 中使用了`NSFileHandle`类，以防止在向`PirateShip`和`PirateCrew`对象发出异步方法调用完成之前退出应用。应用不会等待异步\
    \ GCD 操作完成，而`NSFileHandle`通过等待从控制台读取数据来保持应用存活。\n\n每当使用`TreasureMap`、`PirateShip`和`PirateCrew`对象时，这种复杂性会在整个应用中重复出现。如果任何单个对象、它们之间的关系或它们使用的数据类型发生变化，都必须仔细修改重复的代码。这种依赖关系会导致错误，并产生难以有效测试的代码。运行应用会产生以下输出：\n\
    \n```\nPrize: 10000 pieces of eight\n```\n"
- fmt: "# Understanding the Façade Pattern\n\nThe façade pattern addresses the problem\
    \ by creating a class that consolidates the complexity into a single location\
    \ in the application and presents a simplified API to other components, as shown\
    \ in Figure [16-1](#A978-1-4842-0394-1_16_Chapter.html#Fig1).\n\n![A978-1-4842-0394-1_16_Fig1_HTML.jpg](A978-1-4842-0394-1_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1. The façade pattern\n\nThe `Facade` class takes care of the hard\
    \ work and allows the calling component to take advantage of the functionality\
    \ provided by the underlying classes without needing to know about them, the way\
    \ they relate to one another, or the types they use to support their features.\
    \ Changes in the underlying classes need be reflected only in the `Facade` class,\
    \ and the code in the calling classes is simpler and more focused on the task\
    \ it needs to achieve.\n\n# Implementing the Façade Pattern\n\nThe façade pattern\
    \ is simple to implement and requires the definition of a class that provides\
    \ a simple API for using the complex classes. The `Facade` class should not expose\
    \ any of the details of the underlying classes or require the calling component\
    \ to have any knowledge of them. Listing 16-5 shows the contents of the `Facade.swift`\
    \ file, which I added to the example project in order to define a façade class.\n\
    \n**Listing 16-5.** The Contents of the `Facade.swift` File\n\n```swift\nimport\
    \ Foundation\n\nenum TreasureTypes {\n  case SHIP; case BURIED; case SUNKEN;\n\
    }\n\nclass PirateFacade {\n  private let map = TreasureMap();\n  private let ship\
    \ = PirateShip();\n  private let crew = PirateCrew();\n\n  func getTreasure(type:TreasureTypes)\
    \ -> Int? {\n    var prizeAmount:Int?;\n    // select the treasure type\n    var\
    \ treasureMapType:TreasureMap.Treasures;\n    var crewWorkType:PirateCrew.Actions;\n\
    \    switch (type) {\n      case .SHIP:\n        treasureMapType = TreasureMap.Treasures.GALLEON;\n\
    \        crewWorkType = PirateCrew.Actions.ATTACK_SHIP;\n      case .BURIED:\n\
    \        treasureMapType = TreasureMap.Treasures.BURIED_GOLD;\n        crewWorkType\
    \ = PirateCrew.Actions.DIG_FOR_GOLD;\n      case .SUNKEN:\n        treasureMapType\
    \ = TreasureMap.Treasures.SUNKEN_JEWELS;\n        crewWorkType = PirateCrew.Actions.DIVE_FOR_JEWELS;\n\
    \    }\n    let treasureLocation = map.findTreasure(treasureMapType);\n    //\
    \ convert from map to ship coordinates\n    let sequence:[Character] = [\"A\"\
    , \"B\", \"C\", \"D\", \"E\", \"F\", \"G\"];\n    let eastWestPos = find(sequence,\
    \ treasureLocation.gridLetter);\n    let shipTarget = PirateShip.ShipLocation(NorthSouth:\n\
    \      Int(treasureLocation.gridNumber), EastWest: eastWestPos!);\n    let semaphore\
    \ = dispatch_semaphore_create(0);\n    // relocate ship\n    ship.moveToLocation(shipTarget,\
    \ callback: {location in\n      self.crew.performAction(crewWorkType, {prize in\n\
    \        prizeAmount = prize;\n        dispatch_semaphore_signal(semaphore);\n\
    \      });\n    });\n    dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER);\n\
    \    return prizeAmount;\n  }\n}\n```\n\nThe `PirateFacade` class defines a method\
    \ called `getTreasure` that is the façade for the `TreasureMap`, `PirateShip`,\
    \ and `PirateCrew` classes. The implementation of the `getTreasure` method contains\
    \ largely the same code but with two important differences.\n\nThe first difference\
    \ is that the `PirateFacade` class relies on the `TreasureTypes` enumeration to\
    \ work out what kind of treasure and what kind of crew work will be required.\
    \ I could have relied on one of the enumerations defined by the classes behind\
    \ the façade, but that would create a dependency on one of those classes, which\
    \ is something that I want to avoid. Including an enumeration in the façade allows\
    \ me to completely hide the implementation of the classes behind the façade.\n\
    \nThe other difference is that the `getTreasure` method is synchronous and blocks\
    \ while the calls to the asynchronous methods in the classes behind the façade\
    \ are completed. This isn’t required to implement the façade pattern, which can\
    \ happily incorporate asynchronous methods, but I wanted to completely hide the\
    \ underlying implementation details, which I have done using a Grand Central Dispatch\
    \ semaphore. (I introduced the GCD semaphore in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html).)\n\
    \n## Applying the Façade\n\nAll that remains is to revise the code in the `main.swift`\
    \ file to take advantage of the façade class, as shown in Listing 16-6.\n\n**Listing\
    \ 16-6.** Using the `Façade` Class in the `main.swift` File\n\n```swift\nlet facade\
    \ = PirateFacade();\nlet prize = facade.getTreasure(TreasureTypes.SHIP);\n\nif\
    \ (prize != nil) {\n  println(\"Prize: \\(prize!) pieces of eight\");\n}\n```\n\
    \nAll of the complexity involved in using the `TreasureMap`, `PirateShip`, and\
    \ `PirateCrew` classes is hidden away, and any component that needs to use these\
    \ classes need deal only with the façade. Running the application produces the\
    \ following output in the Xcode debug console:\n\n```\nPrize: 10000 pieces of\
    \ eight\n```\n\n# Variations on the Façade Pattern\n\nThe class I created in the\
    \ previous section is an opaque façade, which means that no details of the underlying\
    \ objects are exposed to the calling components. A variation on the pattern is\
    \ to create a transparent façade, in which some or all of the underlying objects\
    \ are exposed for calling components that require advanced features or finer-grained\
    \ control over the work that is being done. In Swift, transparent façade classes\
    \ simply provide access to the properties that store the underlying objects, as\
    \ shown in Listing 16-7.\n\n**Listing 16-7.** Creating a Transparent Façade in\
    \ the `Facade.swift` File\n\n```swift\nimport Foundation\n\nenum TreasureTypes\
    \ {\n  case SHIP; case BURIED; case SUNKEN;\n}\n\nclass PirateFacade {\n  let\
    \ map = TreasureMap();\n  let ship = PirateShip();\n  let crew = PirateCrew();\n\
    \n  func getTreasure(type:TreasureTypes) -> Int? {\n    // ...statements omitted\
    \ for brevity...\n  }\n}\n```\n\nI have removed the `private` keywords that were\
    \ protecting the `map`, `ship`, and `crew` properties, and the effect is that\
    \ calling components can choose to access those objects directly, rather than\
    \ relying solely on the `getTreasure` method, as shown in Listing 16-8.\n\n**Listing\
    \ 16-8.** Using a Transparent Façade in the `main.swift` File\n\n```swift\nimport\
    \ Foundation;\n\nlet facade = PirateFacade();\nlet prize = facade.getTreasure(TreasureTypes.SHIP);\n\
    \nif (prize != nil) {\n  facade.crew.performAction(PirateCrew.Actions.DIVE_FOR_JEWELS,\n\
    \    callback: {secondPrize in\n      println(\"Prize: \\(prize! + secondPrize)\
    \ pieces of eight\");\n  });\n}\n\nNSFileHandle.fileHandleWithStandardInput().availableData;\n\
    ```\n\nBy accessing the `crew` property of the façade class, I am able to issue\
    \ a second instruction without calling the `getTreasure` method, which would consult\
    \ the map and move the ship. This is an advanced operation. Most of the time,\
    \ the pirates attack a ship and move on, but in this instance, they also dive\
    \ for sunken treasure at the same location. Creating a transparent façade allows\
    \ me to deal with this advanced, and unusual, situation without adding additional\
    \ complexity to the façade class.\n\nThe drawback of this approach is that it\
    \ undermines the isolation offered by the façade class. The code in the `main.swift`\
    \ file, which represents the calling component in this example, now needs to know\
    \ about how the `PirateCrew` class is implemented, about its dependency on the\
    \ `Actions` enumeration, and about the fact that the `performAction` method is\
    \ implemented asynchronously. For this reason, the transparent variation on the\
    \ façade pattern should be used sparingly and carefully. Running the application\
    \ produces the following output:\n\n```\nPrize: 11000 pieces of eight\n```"
