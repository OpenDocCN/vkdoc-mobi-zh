  raw: '### The Benefit of an Evolving Public Presentation


    A nice feature of Swift is the way that you can evolve the public presentation
    of a class over time as the application changes. As matters stand, the `stock`
    property is a standard stored property that can be set to any `Int` value, but
    it doesn’t make sense to have a negative number of items in stock, and doing so
    will affect the result returned by the `stockValue` calculated property.


    Swift allows me to seamlessly replace the `stock`-stored property with a calculated
    property whose implementation can enforce a validation policy to ensure that the
    stock level is never less than zero. Listing 4-10 shows the change that I made
    to alter the way the property is handled.


    Listing 4-10. Adding a Calculated Property in the Product.swift File


    `class Product {`


    `var name:String;`


    `var price:Double;`


    `private var stockBackingValue:Int = 0;`


    `var stock:Int {`


    `get {`


    `return stockBackingValue;`


    `}`


    `set {`


    `stockBackingValue = max(0, newValue);`


    `}`


    `}`


    `init(name:String, price:Double, stock:Int) {`


    `self.name = name;`


    `self.price = price;`


    `self.stock = stock;`


    `}`


    `func calculateTax(rate: Double) -> Double {`


    `return min(10, self.price * rate);`


    `}`


    `var stockValue: Double {`


    `get {`


    `return self.price * Double(self.stock);`


    `}`


    `}`


    `}`


    I have defined a backing variable that will hold the value of the `stock` property
    and have replaced the stored `stock` property with a calculated property that
    has a getter and setter. The getter simply returns the value of the backing property,
    which I have named `stockBackingValue`, but the setter uses the `max` function
    from the standard library to set the backing value to zero when a negative value
    is used to set the property. The effect of this change is that the public and
    private parts of the `Product` class have changed, but in a way that does not
    impact the code that uses the class, as shown in Figure [4-4](#A978-1-4842-0394-1_4_Chapter.html#Fig4).


    ![A978-1-4842-0394-1_4_Fig4_HTML.jpg](A978-1-4842-0394-1_4_Fig4_HTML.jpg)


    Figure 4-4.


    The effect of changing a stored property to a calculated property


    Listing 4-11 shows the changes I made to the `main.swift` file to check the new
    validation property.


    Listing 4-11. Checking Validation in the main.swift File


    `var products = [`


    `Product(name: "Kayak", price: 275, stock: 10),`


    `Product(name: "Lifejacket", price: 48.95, stock: 14),`


    `Product(name: "Soccer Ball", price: 19.5, stock: 32)];`


    `func calculateStockValue(productsArray:[Product]) -> Double {`


    `return productsArray.reduce(0, {(total, product) -> Double in`


    `return total + product.stockValue;`


    `});`


    `}`


    `println("Sales tax for Kayak: $\(products[0].calculateTax(0.2))");`


    `println("Total value of stock: $\(calculateStockValue(products))");`


    `products[0].stock = -50;`


    `println("Stock Level for Kayak: \(products[0].stock)");`


    I added two statements to the end of the playground to test the `stock` property’s
    ability to deal with negative values, but no other changes are required. In particular,
    the code statements that rely on the `stock` property are unaware of the change
    from a stored property to a calculated one. Here is the console output that is
    produced when the example application is run:


    `Sales tax for Kayak: $10.0`


    `Total value of stock: $4059.3`


    `Stock Level for Kayak: 0`


    The last message shows the effect of the calculated property: I set the `stock`
    property to `-50`, but when I get the property value, I receive `0`.


    ## Understanding the Pitfalls of the Pattern


    The pitfall to avoid with this pattern is choosing the wrong kind of template,
    and that usually means using a struct when a class would be more appropriate.
    Swift classes and structs have a lot in common, but there is one important difference
    in the context of this pattern: structs are value objects, and classes are reference
    objects. I explain this difference in more detail in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html),
    in which I describe the prototype pattern.


    ## Examples of the Object Template Pattern in Cocoa


    Because this is such a fundamental pattern, classes and structs can be found throughout
    the Cocoa frameworks and the built-in Swift types. Basic types such as strings,
    arrays, and dictionaries are implemented as structs, and classes are used to represent
    everything from network connections to user interface components. I am not going
    to list all of the classes and structs that are used in iOS and the Cocoa frameworks,
    but if you want to get a sense of how deeply rooted this pattern is in iOS development,
    take a look at the classes I used to create the SportsStore application. In addition
    to the `Product` class I created in this chapter, I have relied on `NSNumberFormatter`
    to format currency strings, `UIViewController` to manage the view presented by
    the app, and classes such as `UILabel`, `UITextField`, and `UIStepper` to preset
    layout components to the user.


    ## Applying the Pattern to the SportsStore App


    In this section, I will create and apply a `Product` class and use it to remove
    the tuples from the SportsStore app. Don’t worry if you didn’t follow the step-by-step
    instructions in [Chapter 3](#A978-1-4842-0394-1_3_Chapter.html); you can download
    the project from [`Apress.com`](https://Apress.com) along with all of the source
    code for this book.


    ### Preparing the Example Application


    The preparation for this chapter is to create a Swift file that I will use to
    define utility functions that are not directly related to design patterns. To
    add a new file to the project, Control-click the SportsStore folder in the project
    navigator and select New File from the menu. Xcode will present a choice of different
    files types, as illustrated in Figure [4-5](#A978-1-4842-0394-1_4_Chapter.html#Fig5).


    ![A978-1-4842-0394-1_4_Fig5_HTML.jpg](A978-1-4842-0394-1_4_Fig5_HTML.jpg)


    Figure 4-5.


    Selecting the type of a new file


    Select Swift File from the iOS ➤ Source category and click the Next button. Set
    the file name to `Utils.swift` and ensure that SportsStore is checked in the Targets
    list, as shown in Figure [4-6](#A978-1-4842-0394-1_4_Chapter.html#Fig6).


    ![A978-1-4842-0394-1_4_Fig6_HTML.jpg](A978-1-4842-0394-1_4_Fig6_HTML.jpg)


    Figure 4-6.


    Creating the Product.swift file


    Xcode will create the new file and open it for editing. Listing 4-12 shows how
    I used the file to define the `Utils` class.


    Listing 4-12. The Contents of the Utils.swift File


    `import Foundation;`


    `class Utils {`


    `class func currencyStringFromNumber(number:Double) -> String {`


    `let formatter = NSNumberFormatter();`


    `formatter.numberStyle = NSNumberFormatterStyle.CurrencyStyle;`


    `return formatter.stringFromNumber(number) ?? "";`


    `}`


    `}`


    I have defined a type method (also known as a static method) called `currencyStringFromNumber`
    that accepts a `Double` value and returns a number formatted as a currency value.
    For example, the value `1000.1` would be formatted into the string `$1,000.10`.
    (The currency sign is applied based on the locale settings of the device. Outside
    of the United States, the dollar sign may be replaced with another symbol, such
    as those for the euro or the British pound.)


    String formatting isn’t part of the patterns I describe in this table, so I have
    defined this code in the `Utils.swift` file to keep it out of the way. I’ll use
    the new type method when I add to the information displayed by the label at the
    bottom of the SportsStore layout.'
