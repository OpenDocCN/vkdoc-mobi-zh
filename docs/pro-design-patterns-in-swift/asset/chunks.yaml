- fmt: "### Variations on the Memento Pattern\n\nThe only common variation on the\
    \ memento pattern is to represent the state of the originator so that it can be\
    \ stored persistently. This allows the memento data to be sent to a remote server\
    \ or stored in a database until it is required again.\n\nYou can use any data\
    \ format that suits your project, but I tend to use JSON because it has become\
    \ the de facto standard for representing objects, especially in web services.\
    \ Apple provides JSON support through the `NSJSONSerialization` class, but the\
    \ process of converting a Swift object to and from JSON is awkward. Listing 23-7\
    \ shows the changes I made to the `LedgerMemento` class so that it expresses the\
    \ state data as JSON.\n\n**Listing 23-7.** Expressing State as JSON in the `Ledger.swift`\
    \ File\n\n```\n...\n\nclass LedgerMemento : Memento {\n    let jsonData:String?;\n\
    \n    init(ledger:Ledger) {\n        self.jsonData = stringify(ledger);\n    }\n\
    \n    init(json:String?) {\n        self.jsonData = json;\n    }\n\n    private\
    \ func stringify(ledger:Ledger) -> String? {\n        var dict = NSMutableDictionary();\n\
    \        dict[\"total\"] = ledger.total;\n        dict[\"nextId\"] = ledger.nextId;\n\
    \        dict[\"entries\"] = ledger.entries.values.array;\n        var entryArray\
    \ = [NSDictionary]();\n        for entry in ledger.entries.values {\n        \
    \    var entryDict = NSMutableDictionary();\n            entryArray.append(entryDict);\n\
    \            entryDict[\"id\"] = entry.id;\n            entryDict[\"counterParty\"\
    ] = entry.counterParty;\n            entryDict[\"amount\"] = entry.amount;\n \
    \       }\n        dict[\"entries\"] = entryArray;\n        if let jsonData =\
    \ NSJSONSerialization.dataWithJSONObject(dict,\n            options: nil, error:\
    \ nil) {\n            return NSString(data: jsonData, encoding: NSUTF8StringEncoding);\n\
    \        }\n        return nil;\n    }\n\n    func apply (ledger:Ledger) {\n \
    \       if let data = jsonData?.dataUsingEncoding(NSUTF8StringEncoding,\n    \
    \        allowLossyConversion: false) {\n            if let dict = NSJSONSerialization.JSONObjectWithData(data,\
    \ options: nil,\n                error: nil) as? NSDictionary {\n            \
    \    ledger.total = dict[\"total\"] as Float;\n                ledger.nextId =\
    \ dict[\"nextId\"] as Int;\n                ledger.entries.removeAll(keepCapacity:\
    \ true);\n                if let entryDicts = dict[\"entries\"] as? [NSDictionary]\
    \ {\n                    for dict in entryDicts {\n                        let\
    \ id = dict[\"id\"] as Int;\n                        let counterParty = dict[\"\
    counterParty\"] as String;\n                        let amount = dict[\"amount\"\
    ] as Float;\n                        ledger.entries[id] = LedgerEntry(id: id,\n\
    \                            counterParty: counterParty, amount: amount);\n  \
    \                  }\n                }\n            }\n        }\n    }\n}\n\n\
    ...\n```\n\nUnfortunately, the `NSJSONSerialization` class operates only on foundation\
    \ types, which means that I have to convert the state of a `Ledger` object into\
    \ an `NSMutableDictionary` containing key-value pairs for each data item. I define\
    \ keys for `total` and `nextId` and assign their values directly. To represent\
    \ the ledger entries, I create an array of `NSMutableDictionary` objects, each\
    \ of which contains key-value pairs for the `id`, `counterParty`, and `amount`\
    \ properties. The result is a JSON string like this, which I have formatted to\
    \ make it easier to read:\n\n```\n{ \"total\": 300.63,\n  \"nextId\": 3,\n  \"\
    entries\": [\n    { \"id\": 2, \"counterParty\": \"Joe\", \"amount\": 200.2 },\n\
    \    { \"id\": 1,\"counterParty\": \"Bob\", \"amount\": 100.43}]\n}\n```\n\nThe\
    \ process of parsing a JSON string to re-create the state of a `Ledger` object\
    \ is equally awkward. The string is converted into a dictionary that is then processed\
    \ to extract the data values. Overall, the process is difficult and error-prone,\
    \ but I expect the JSON support for Swift to improve in future versions of Swift\
    \ because it has become so prevalent as a data format. Listing 23-8 shows the\
    \ changes that I made to the `main.swift` file to get hold of the JSON data and\
    \ use it to set the state of an originator object.\n\n**Listing 23-8.** Using\
    \ a Persistent Memento in the `main.swift` File\n\n```\nlet ledger = Ledger();\n\
    ledger.addEntry(\"Bob\", amount: 100.43);\nledger.addEntry(\"Joe\", amount: 200.20);\n\
    \nlet memento = ledger.createMemento() as LedgerMemento;\nlet newMemento = LedgerMemento(json:\
    \ memento.jsonData);\n\nledger.applyMemento(newMemento);\nledger.printEntries();\n\
    ```\n\nI have used two `LedgerMemento` objects to demonstrate how the JSON string\
    \ can be used as a persistent representation of an object’s state. Running the\
    \ example application produces the following output:\n\n```\n#1: Bob $100.43\n\
    #2: Joe $200.2\nTotal: $300.63\n```\n\n### Understanding the Pitfalls of the Memento\
    \ Pattern\n\nMost problems with the memento pattern arise when the implementation\
    \ doesn’t conform to the two rules I listed earlier in the chapter, such that\
    \ the caretaker is able to change the state stored by the memento or the memento\
    \ doesn’t correctly set every aspect of the originator’s state. As long as you\
    \ bear these two rules in mind, you should not encounter any problems implementing\
    \ the memento pattern.\n\nTest carefully if you are using a data format such as\
    \ JSON to persistently store mementos. As Listing 23-7 showed, generating and\
    \ parsing the persistent representation for even a simple object can be complex\
    \ and can produce hard-to-read code."
