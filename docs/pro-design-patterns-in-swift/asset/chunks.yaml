    `}`


    `func addPerson(person: Person) {`


    `self.peopleArray.append(person);`


    `}`


    `func removePerson(name: String) {`


    `let nameLower = name.lowercaseString;`


    `self.peopleArray = peopleArray .filter({$0.name.lowercaseString != nameLower});`


    `}`


    `func updatePerson(name: String, newCity: String) {`


    `let nameLower = name.lowercaseString;`


    `let test:Person -> Bool = {p in return p.name.lowercaseString == nameLower};`


    `if let person = peopleArray.first(test) {`


    `person.city = newCity;`


    `}`


    `}`


    `}`


    `...`


    The repository uses a standard Swift array to store its model objects, and the
    array is populated with some sample objects in the class initializer. As I explained
    in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html), Swift arrays are value types,
    which means that a copy of the array is created when a calling component assigns
    the array returned by the `People` property to a local variable or constant. It
    is for this reason that I have implemented separate methods for adding, removing,
    or modifying data objects because the array that a calling component operates
    on will be different.


    Note


    I have explained the importance of concurrency protections in many of the chapters
    in this book. This project is a rare example of an application that doesn’t need
    them. It will be accessed by only one thread at a time because I will be reading
    instructions from the command line and then executing them. In a real project,
    however, you must ensure that your repository is thread-safe, either because you
    use a mechanism like Grand Central Dispatch in your implementation class or because
    the storage mechanism you are relying on is inherently thread-safe.'
  trans: "\n### 创建模型\n\n我已经建立了足够的基础设施，可以开始实现 MVC 的各部分。在实现 MVC 时，模型是最佳的起点，因为模型类型会在整个应用程序中使用。清单\
    \ 27-3 展示了我添加到示例项目中的 `Model.swift` 文件的内容。\n\n**清单 27-3.** `Model.swift` 文件的内容\n\
    \n```\nimport Foundation\n\nfunc == (lhs:Person, rhs:Person) -> Bool {\n    return\
    \ lhs.name == rhs.name && lhs.city == rhs.city;\n}\n\nclass Person : Equatable,\
    \ Printable {\n    var name:String;\n    var city:String;\n    \n    init(_ name:String,\
    \ _ city:String) {\n        self.name = name;\n        self.city = city;\n   \
    \ }\n    \n    var description: String {\n        return \"Name: \\(self.name),\
    \ City: \\(self.city)\";\n    }\n}\n```\n\n在一个真实项目中，可能会有多种模型类型来表示应用程序处理的不同数据对象，但示例应用中只有\
    \ `Person` 这一种模型类型。`Person` 类定义了两个存储属性，我将分别用于存储人员姓名及其所在城市。\n\n#### 实现仓储模式\n\n\
    在编写 MVC 应用程序时，我喜欢实现仓储模式，在这种模式下，数据类型与存储和检索数据的机制（即模型仓储）是分开定义的。这就是 `Person` 类如此简单的原因：它只需要存储数据值，无需关注这些值是如何获取或持久化的。\n\
    \n仓储模式的优势在于，它允许更改存储机制，而无需对应用程序的模型类型进行相应修改。这对于测试应用程序很有帮助，因为你可以将真实的仓储替换为使用内存中预定义测试值的仓储。在开始一个新的\
    \ MVC 应用程序时，我通常会先创建一个内存仓储，只有当应用程序的核心功能就绪后，才会将其替换为将数据持久化到数据库的实现。\n\n一个好的仓储的关键在于从一个协议入手，应用程序中的其他组件将通过该协议执行数据操作。清单\
    \ 27-4 展示了我在示例应用程序中定义的仓储协议。\n\n**清单 27-4.** 在 `Model.swift` 文件中定义仓储协议\n\n```\n\
    import Foundation\n\nfunc == (lhs:Person, rhs:Person) -> Bool {\n    return lhs.name\
    \ == rhs.name && lhs.city == rhs.city;\n}\n\nclass Person : Equatable, Printable\
    \ {\n    var name:String;\n    var city:String;\n    \n    init(_ name:String,\
    \ _ city:String) {\n        self.name = name;\n        self.city = city;\n   \
    \ }\n    \n    var description: String {\n        return \"Name: \\(self.name),\
    \ City: \\(self.city)\";\n    }\n}\n\nprotocol Repository {\n    var People:[Person]\
    \ { get };\n    func addPerson(person:Person);\n    func removePerson(name:String);\n\
    \    func updatePerson(name:String, newCity:String);\n}\n```\n\n**提示** 清单 27-4\
    \ 中定义的 `Person` 类实现了 `Equatable` 和 `Printable` 协议。`Equatable` 协议与我在清单中创建的 `==`\
    \ 函数配合使用，使得 `Person` 对象之间可以相互比较。当对象被传递给 `println` 函数时，会使用 `Printable` 协议，该函数会输出\
    \ `description` 属性的值。\n\n我定义了一个名为 `People` 的只读属性，它将返回仓储中存储的所有 `Person` 对象，同时还定义了添加、删除和修改对象的方法。\n\
    \n**提示** 将所有的模型对象以集合（如数组）的形式暴露出来，可以方便应用程序的其他部分消费这些数据，但这样做的前提是数据能够被高效检索。只有在应用程序中数据量较小，或者存储机制仅在访问集合中元素时才提供内容的情况下，才应采用此方法。\n\
    \n在本章中，我将仅实现一个非持久化的内存仓储，其优点是简单，且每次应用程序重启时都会重置为已知状态。清单 27-5 展示了我是如何定义仓储实现类的。\n\n\
    **清单 27-5.** 在 `Model.swift` 文件中定义仓储实现\n\n```\n...\n\nprotocol Repository {\n\
    \    var People:[Person] { get };\n    func addPerson(person:Person);\n    func\
    \ removePerson(name:String);\n    func updatePerson(name:String, newCity:String);\n\
    }\n\nclass MemoryRepository : Repository {\n    private var peopleArray:[Person];\n\
    \    \n    init() {\n        peopleArray = [\n            Person(\"Bob\", \"New\
    \ York\"),\n            Person(\"Alice\", \"London\"),\n            Person(\"\
    Joe\", \"Paris\")];\n    }\n    \n    var People:[Person] {\n        return self.peopleArray;\n\
    \    }\n    \n    func addPerson(person: Person) {\n        self.peopleArray.append(person);\n\
    \    }\n    \n    func removePerson(name: String) {\n        let nameLower = name.lowercaseString;\n\
    \        self.peopleArray = peopleArray.filter({$0.name.lowercaseString != nameLower});\n\
    \    }\n    \n    func updatePerson(name: String, newCity: String) {\n       \
    \ let nameLower = name.lowercaseString;\n        let test:Person -> Bool = {p\
    \ in return p.name.lowercaseString == nameLower};\n        if let person = peopleArray.first(test)\
    \ {\n            person.city = newCity;\n        }\n    }\n}\n\n...\n```\n\n该仓储使用标准的\
    \ Swift 数组来存储模型对象，并在类的初始化方法中填充了一些示例对象。正如我在第 5 章中解释的，Swift 数组是值类型，这意味着当调用组件将 `People`\
    \ 属性返回的数组赋值给局部变量或常量时，会创建该数组的一份拷贝。正因如此，我实现了独立的添加、删除或修改数据对象的方法，因为调用组件所操作的数组将是不同的拷贝。\n\
    \n**注意** 我在本书的许多章节中都解释了并发保护的重要性。本项目的应用是一个罕见的无需并发保护的例子。它每次只会被一个线程访问，因为我将从命令行读取指令然后执行它们。然而，在真实项目中，你必须确保你的仓储是线程安全的——要么通过在你的实现类中使用\
    \ Grand Central Dispatch 等机制，要么因为你所依赖的存储机制本身是线程安全的。"
- fmt: "### Defining the View\n\nViews are used to display data to the user and, typically,\
    \ provide the user with the controls or commands used for interaction, such as\
    \ buttons and text fields. It usually makes sense for the view to display the\
    \ controls because the set of interactions that are allowed depends on the data\
    \ that is being displayed. A view that gathers the values required to create a\
    \ new model object may display `Create` and `Cancel` buttons, whereas a view that\
    \ displays a list of model objects may just have a `Reload` button.\n\nI have\
    \ taken a different approach for the example application because the user will\
    \ be able to use the same set of interactions throughout the life of the application,\
    \ something that is possible only because the project is so simple. This means\
    \ that the views in the application are responsible only for displaying data to\
    \ the user. I started by defining a protocol that all views in the application\
    \ will conform to. Listing 27-6 shows the protocol, which I defined in a new file\
    \ called `Views.swift`.\n\n**Listing 27-6.** The Contents of the `Views.swift`\
    \ File\n\n```\nprotocol View {\n    func execute();\n}\n```\n\nThe `View` protocol\
    \ defines a single method called `execute` that will be invoked to display content\
    \ to the user. A project usually contains views that display the application data\
    \ in different ways, and views are selected by a controller in response to user\
    \ interaction, a process that will make sense once I define a controller in the\
    \ “Defining the Controller” section.\n\nI need only one view to get started, which\
    \ I will use to display a list of `Person` objects. Listing 27-7 shows the view\
    \ class I created.\n\n**Listing 27-7.** Defining a View Class in the `Views.swift`\
    \ File\n\n```\nprotocol View {\n    func execute();\n}\n\nclass PersonListView\
    \ : View {\n    private let people:[Person];\n    init(data:[Person]) {\n    \
    \    self.people = data;\n    }\n    func execute() {\n        for person in people\
    \ {\n            println(person);\n        }\n    }\n}\n```\n\nThe `PersonListView`\
    \ class is simple; it accepts an array of `Person` objects as its initializer\
    \ argument, and the `execute` method prints out each of them in turn using the\
    \ global `println` function. (The `Person` class conforms to the `Printable` protocol,\
    \ which means that the `String` returned by the `description` property is written\
    \ to the console by the `println` function.)\n\nNotice that the view doesn’t deal\
    \ directly with the repository; its only knowledge of the `Person` objects it\
    \ operates on comes from the initializer argument. This reflects the separation\
    \ of concerns principle and means that the same class can be used to display different\
    \ data sets, which you will see when I implement the controller in the next section.\n\
    \n### Defining the Controller\n\nThe final MVC section to implement is the controller,\
    \ but the reality is that I tend to develop the initial views and controllers\
    \ in an application in parallel, moving between them to get the basic behavior\
    \ I am looking for. A book chapter doesn’t lend itself to describing this kind\
    \ of development process and makes example projects look linear, but I find that\
    \ implementing the MVC pattern is easiest when I implement the model and then\
    \ work on the other sections simultaneously. But, in linear book chapter style,\
    \ I have defined a controller that acts as the connective tissue between the model\
    \ and the view. Listing 27-8 shows the contents of the `Controllers.swift` file,\
    \ in which I have defined a common base class for controllers in the example application.\n\
    \n**Listing 27-8.** The Contents of the `Controllers.swift` File\n\n```\nclass\
    \ ControllerBase {\n    private let repository:Repository;\n    private let nextController:ControllerBase?;\n\
    \    init(repo:Repository, nextController:ControllerBase?) {\n        self.repository\
    \ = repo;\n        self.nextController = nextController;\n    }\n    func handleCommand(command:Command,\
    \ data:[String]) -> View? {\n        return nextController?.handleCommand(command,\
    \ data:data);\n    }\n}\n```\n\nI have used a base class rather than a protocol\
    \ because I am going to use the chain of responsibility pattern (as described\
    \ in [Chapter 19](#A978-1-4842-0394-1_19_Chapter.html)) to find a controller that\
    \ can handle a command selected by the user. The initializer accepts a `Repository`\
    \ object so that the controller has access to the model data and the next controller\
    \ in the chain.\n\nThe `handleCommand` method will be called when the user selects\
    \ a command. Controllers can elect to handle the command or pass it on to the\
    \ next controller in the chain. If none of the controllers in the chain handles\
    \ the command, then `nil` will be returned by the base class implementation of\
    \ the `handleCommand` method. The `handleCommand` returns a `View`, which is how\
    \ controllers act as the link between the model (via the repository initializer\
    \ argument) and the views. The `View` object selected by the controller will be\
    \ executed by the framework, which I’ll set up in the “Completing the Framework”\
    \ section.\n\n**Tip**\n\nThe mechanism that the application framework uses to\
    \ find a controller to respond to a command varies based on the type of application\
    \ that is being built. There is usually a predefined map of URLs to controllers\
    \ in web applications, and native GUI applications usually send commands to the\
    \ controller most closely associated with the currently displayed view.\n\nHaving\
    \ defined the base functionality for a controller, I can now create a concrete\
    \ implementation that will respond to the commands I defined in the `Command`\
    \ enumeration. I am going to start with a single controller that will handle all\
    \ of the commands defined in the `Command` enumeration, but I’ll lay the foundation\
    \ for additional controllers in the “Completing the Framework” section and add\
    \ a second controller that follows the same pattern in the “Extending the Application”\
    \ section. Listing 27-9 shows the controller I created.\n\n**Listing 27-9.** Defining\
    \ a Concrete Controller in the `Controllers.swift` File\n\n```\nclass ControllerBase\
    \ {\n    private let repository:Repository;\n    private let nextController:ControllerBase?;\n\
    \    init(repo:Repository, nextController:ControllerBase?) {\n        self.repository\
    \ = repo;\n        self.nextController = nextController;\n    }\n    func handleCommand(command:Command,\
    \ data:[String]) -> View? {\n        return nextController?.handleCommand(command,\
    \ data:data);\n    }\n}\n\nclass PersonController : ControllerBase {\n    override\
    \ func handleCommand(command: Command, data:[String]) -> View? {\n        switch\
    \ command {\n            case .LIST_PEOPLE:\n                return listAll();\n\
    \            case .ADD_PERSON:\n                return addPerson(data[0], city:\
    \ data[1]);\n            case .DELETE_PERSON:\n                return deletePerson(data[0]);\n\
    \            case .UPDATE_PERSON:\n                return updatePerson(data[0],\
    \ newCity:data[1]);\n            case .SEARCH:\n                return search(data[0]);\n\
    \            default:\n                return super.handleCommand(command, data:\
    \ data);\n        }\n    }\n}\n```"
  raw: '### Defining the View


    Views are used to display data to the user and, typically, provide the user with
    the controls or commands used for interaction, such as buttons and text fields.
    It usually makes sense for the view to display the controls because the set of
    interactions that are allowed depends on the data that is being displayed. A view
    that gathers the values required to create a new model object may display Create
    and Cancel buttons, whereas a view that displays a list of model objects may just
    have a Reload button.


    I have taken a different approach for the example application because the user
    will be able to use the same set of interactions throughout the life of the application,
    something that is possible only because the project is so simple. This means that
    the views in the application are responsible only for displaying data to the user.
    I started by defining a protocol that all views in the application will conform
    to. Listing 27-6 shows the protocol, which I defined in a new file called `Views.swift`.


    Listing 27-6. The Contents of the Views.swift File


    `protocol View {`


    `func execute();`


    `}`


    The `View` protocol defines a single method called `execute` that will be invoked
    to display content to the user. A project usually contains views that display
    the application data in different ways, and views are selected by a controller
    in response to user interaction, a process that will make sense once I define
    a controller in the “Defining the Controller” section.


    I need only one view to get started, which I will use to display a list of `Person`
    objects. Listing 27-7 shows the view class I created.


    Listing 27-7. Defining a View Class in the Views.swift File


    `protocol View {`


    `func execute();`


    `}`


    `class PersonListView : View {`


    `private let people:[Person];`


    `init(data:[Person]) {`


    `self.people = data;`


    `}`


    `func execute() {`


    `for person in people {`


    `println(person);`


    `}`


    `}`


    `}`


    The `PersonListView` class is simple; it accepts an array of `Person` objects
    as its initializer argument, and the `execute` method prints out each of them
    in turn using the global `println` function. (The `Person` class conforms to the
    `Printable` protocol, which means that the String returned by the `description`
    property is written to the console by the `println` function.)


    Notice that the view doesn’t deal directly with the repository; its only knowledge
    of the `Person` objects it operates on comes from the initializer argument. This
    reflects the separation of concerns principle and means that the same class can
    be used to display different data sets, which you will see when I implement the
    controller in the next section.


    ### Defining the Controller


    The final MVC section to implement is the controller, but the reality is that
    I tend to develop the initial views and controllers in an application in parallel,
    moving between them to get the basic behavior I am looking for. A book chapter
    doesn’t lend itself to describing this kind of development process and makes example
    projects look linear, but I find that implementing the MVC pattern is easiest
    when I implement the model and then work on the other sections simultaneously.
    But, in linear book chapter style, I have defined a controller that acts as the
    connective tissue between the model and the view. Listing 27-8 shows the contents
    of the `Controllers.swift` file, in which I have defined a common base class for
    controllers in the example application.


    Listing 27-8. The Contents of the Controllers.swift File


    `class ControllerBase {`


    `private let repository:Repository;`


    `private let nextController:ControllerBase?;`


    `init(repo:Repository, nextController:ControllerBase?) {`


    `self.repository = repo;`


    `self.nextController = nextController;`


    `}`


    `func handleCommand(command:Command, data:[String]) -> View? {`


    `return nextController?.handleCommand(command, data:data);`


    `}`


    `}`


    I have used a base class rather than a protocol because I am going to use the
    chain of responsibility pattern (as described in [Chapter 19](#A978-1-4842-0394-1_19_Chapter.html))
    to find a controller that can handle a command selected by the user. The initializer
    accepts a `Repository` object so that the controller has access to the model data
    and the next controller in the chain.


    The `handleCommand` method will be called when the user selects a command. Controllers
    can elect to handle the command or pass it on to the next controller in the chain.
    If none of the controllers in the chain handles the command, then `nil` will be
    returned by the base class implementation of the `handleCommand` method. The `handleCommand`
    returns a `View`, which is how controllers act as the link between the model (via
    the repository initializer argument) and the views. The `View` object selected
    by the controller will be executed by the framework, which I’ll set up in the
    “Completing the Framework” section.


    Tip


    The mechanism that the application framework uses to find a controller to respond
    to a command varies based on the type of application that is being built. There
    is usually a predefined map of URLs to controllers in web applications, and native
    GUI applications usually send commands to the controller most closely associated
    with the currently displayed view.


    Having defined the base functionality for a controller, I can now create a concrete
    implementation that will respond to the commands I defined in the `Command` enumeration.
    I am going to start with a single controller that will handle all of the commands
    defined in the `Command` enumeration, but I’ll lay the foundation for additional
    controllers in the “Completing the Framework” section and add a second controller
    that follows the same pattern in the “Extending the Application” section. Listing
    27-9 shows the controller I created.


    Listing 27-9. Defining a Concrete Controller in the Controllers.swift File


    `class ControllerBase {`


    `private let repository:Repository;`


    `private let nextController:ControllerBase?;`


    `init(repo:Repository, nextController:ControllerBase?) {`


    `self.repository = repo;`


    `self.nextController = nextController;`


    `}`


    `func handleCommand(command:Command, data:[String]) -> View? {`


    `return nextController?.handleCommand(command, data:data);`


    `}`


    `}`


    `class PersonController : ControllerBase {`


    `override func handleCommand(command: Command, data:[String]) -> View? {`


    `switch command {`


    `case .LIST_PEOPLE:`


    `return listAll();`


    `case .ADD_PERSON:`


    `return addPerson(data[0], city: data[1]);`


    `case .DELETE_PERSON:`


    `return deletePerson(data[0]);`


    `case .UPDATE_PERSON:`


    `return updatePerson(data[0], newCity:data[1]);`


    `case .SEARCH:`


    `return search(data[0]);`


    `default:`


    `return super.handleCommand(command, data: data);`


    `}`


    `}`'
  trans: "\n### 定义视图（View）\n\n视图用于向用户展示数据，通常还会为用户提供用于交互的控件或命令，例如按钮和文本字段。让视图显示这些控件通常是合理的，因为允许的交互操作集取决于当前显示的数据。一个用于收集创建新模型对象所需值的视图，可能会显示“创建”和“取消”按钮；而一个用于显示模型对象列表的视图，可能只需要一个“重新加载”按钮。\n\
    \n我在示例应用中采用了不同的方法，因为用户在应用的整个生命周期中都能使用同一套交互操作——这之所以可行，纯粹是因为这个项目非常简单。这意味着应用中的视图仅负责向用户显示数据。我首先定义了一个协议，应用中所有视图都将遵循该协议。清单\
    \ 27-6 展示了我在一个名为 `Views.swift` 的新文件中定义的协议。\n\n**清单 27-6.** `Views.swift` 文件的内容\n\
    \n```\nprotocol View {\n    func execute();\n}\n```\n\n`View` 协议定义了一个名为 `execute`\
    \ 的单个方法，该方法将被调用来向用户显示内容。一个项目通常包含以不同方式显示应用数据的多个视图，视图由控制器根据用户交互来选择。这个过程在我于“定义控制器（Controller）”一节中定义控制器后就会变得清晰明了。\n\
    \n我只需一个视图即可开始，这个视图将用于显示 `Person` 对象列表。清单 27-7 展示了我创建的视图类。\n\n**清单 27-7.** 在 `Views.swift`\
    \ 文件中定义一个视图类\n\n```\nprotocol View {\n    func execute();\n}\n\nclass PersonListView\
    \ : View {\n    private let people:[Person];\n    init(data:[Person]) {\n    \
    \    self.people = data;\n    }\n    func execute() {\n        for person in people\
    \ {\n            println(person);\n        }\n    }\n}\n```\n\n`PersonListView`\
    \ 类很简单：它接受一个 `Person` 对象数组作为初始化参数，`execute` 方法会使用全局的 `println` 函数依次打印每一个对象。（`Person`\
    \ 类遵循 `Printable` 协议，这意味着 `description` 属性返回的 `String` 会通过 `println` 函数输出到控制台。）\n\
    \n请注意，视图并不直接与仓库打交道；它对所操作的 `Person` 对象的全部了解都来自初始化参数。这体现了关注点分离原则，并且意味着同一个类可以用于显示不同的数据集——在我于下一节实现控制器时，您将会看到这一点。\n\
    \n### 定义控制器（Controller）\n\nMVC 模式中最后一个要实现的部分是控制器。但实际上，我在应用开发中往往倾向于同时开发初始的视图和控制器，在两者之间来回切换，直到达到我所寻找的基本行为。书本章节不太适合描述这种开发过程，而且会让示例项目看起来是线性的，但我发现，当我先实现模型，然后同时处理其他部分时，实现\
    \ MVC 模式最为简单。不过，按照线性书本章节的风格，我定义了一个控制器，它充当模型和视图之间的连接组织。清单 27-8 展示了 `Controllers.swift`\
    \ 文件的内容，我在其中为示例应用中的控制器定义了一个公共基类。\n\n**清单 27-8.** `Controllers.swift` 文件的内容\n\n\
    ```\nclass ControllerBase {\n    private let repository:Repository;\n    private\
    \ let nextController:ControllerBase?;\n    init(repo:Repository, nextController:ControllerBase?)\
    \ {\n        self.repository = repo;\n        self.nextController = nextController;\n\
    \    }\n    func handleCommand(command:Command, data:[String]) -> View? {\n  \
    \      return nextController?.handleCommand(command, data:data);\n    }\n}\n```\n\
