    I have defined a `productStore` property that is assigned a `ProductDataStore`
    object and from which the `Product` objects are obtained for display. I have also
    defined the callback closure that locates the table cell being used to display
    the `Product`—if it is visible—and updates the stock level it displays.


    The effect you will see when running the app is that the stock values will be
    initially displayed as zero and then updated as objects are checked out from the
    pool and used to make (simulated) network requests. The random delay that I added
    in the `NetworkConnection` class means that the updates will arrive gradually
    as the pool limits the number of concurrent requests.


    ## Summary


