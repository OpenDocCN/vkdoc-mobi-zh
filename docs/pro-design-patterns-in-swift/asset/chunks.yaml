- fmt: "### Using Commands as Macros\n\nCommands are often used to create macros,\
    \ which allows the same set of operations to be performed on different receive\
    \ objects. To use commands as objects, the receiver must be passed to the `execute`\
    \ method, rather than to the command object initializer. Listing 20-11 shows the\
    \ changes I made to allow the receiver to be specified as an argument.\n\n**Listing\
    \ 20-11.** Modifying the Command Protocol and Implementation Classes in the `Commands.swift`\
    \ File\n\n```\nprotocol Command {\n    func execute(receiver:Any);\n}\n\nclass\
    \ CommandWrapper : Command {\n    private let commands:[Command];\n    init(commands:[Command])\
    \ {\n        self.commands = commands;\n    }\n    func execute(receiver:Any)\
    \ {\n        for command in commands {\n            command.execute(receiver);\n\
    \        }\n    }\n}\n\nclass GenericCommand<T> : Command {\n    private var instructions:\
    \ T -> Void;\n    init(instructions: T -> Void) {\n        self.instructions =\
    \ instructions;\n    }\n    func execute(receiver:Any) {\n        if let safeReceiver\
    \ = receiver as? T {\n            instructions(safeReceiver);\n        } else\
    \ {\n            fatalError(\"Receiver is not expected type\");\n        }\n \
    \   }\n    class func createCommand(instuctions: T -> Void) -> Command {\n   \
    \     return GenericCommand(instructions: instuctions);\n    }\n}\n```\n\nI have\
    \ added an `Any` parameter to the `execute` method defined by the `Command` protocol.\
    \ I enforce type conformance in the execute method of the `GenericCommand` class\
    \ by calling the global `fatalError` function if the object passed to the `execute`\
    \ method doesn’t match the generic type parameter. This isn’t ideal because errors\
    \ will be reported at runtime rather than by the compiler, but Swift makes it\
    \ difficult to create and apply generic protocols.\n\nIn Listing 20-12, you can\
    \ see how I have modified the `Calculator` class to remove the undo feature and\
    \ replaced it with support for generating a macro command that will apply the\
    \ operations that have been performed.\n\n**Listing 20-12.** Adding Support for\
    \ Macros in the `Calculator.swift` File\n\n```\nimport Foundation;\n\nclass Calculator\
    \ {\n    private(set) var total = 0;\n    private var history = [Command]();\n\
    \    private var queue = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    func add(amount:Int) {\n        addMacro(Calculator.add, amount: amount);\n\
    \        total += amount;\n    }\n    func subtract(amount:Int) {\n        addMacro(Calculator.subtract,\
    \ amount: amount);\n        total -= amount;\n    }\n    func multiply(amount:Int)\
    \ {\n        addMacro(Calculator.multiply, amount: amount);\n        total = total\
    \ * amount;\n    }\n    func divide(amount:Int) {\n        addMacro(Calculator.divide,\
    \ amount: amount);\n        total = total / amount;\n    }\n    private func addMacro(method:Calculator\
    \ -> Int -> Void, amount:Int) {\n        dispatch_sync(self.queue, {() in\n  \
    \          self.history.append(GenericCommand<Calculator>.createCommand(\n   \
    \             { calc in method(calc)(amount); }\n            ));\n        });\n\
    \    }\n    func getMacroCommand() -> Command? {\n        var command:Command?;\n\
    \        dispatch_sync(queue, {() in\n            command = CommandWrapper(commands:\
    \ self.history);\n        });\n        return command;\n    }\n}\n```\n\nEach\
    \ operation method now calls the `addMacro` method, which builds up this history\
    \ of the operations that have been performed on the `Calculator` instance (rather\
    \ than the counter operations that were required for the undo feature). The important\
    \ difference is that the `Calculator` object itself is not included in the `Command`\
    \ objects that are created and subsequently packaged up by the `getMacroCommand`\
    \ method. Instead, each command contains details of the operation method that\
    \ will be invoked and the argument that will be passed to it, and it is the responsibility\
    \ of the calling component to specify the `Calculator` object that will be the\
    \ receiver for the commands. Listing 20-13 shows how I have used the macro feature\
    \ in the `main.swift` file.\n\n**Listing 20-13.** Creating and Applying a Macro\
    \ in the `main.swift` File\n\n```\nlet calc = Calculator();\ncalc.add(10);\ncalc.multiply(4);\n\
    calc.subtract(2);\nprintln(\"Calc 1 Total: \\(calc.total)\");\n\nlet macro = calc.getMacroCommand();\n\
    let calc2 = Calculator();\nmacro?.execute(calc2);\nprintln(\"Calc 2 Total: \\\
    (calc2.total)\");\n```\n\nI apply a series of operations on one `Calculator` object\
    \ and then use those commands as a macro to apply the same operations to a different\
    \ `Calculator` object. Running the example application produces the following\
    \ results:\n\n```\nCalc 1 Total: 38\nCalc 2 Total: 38\n```\n\n### Using Closures\
    \ as Commands\n\nThe command pattern specifies the use of a command object, which\
    \ is what I have used in all of the implementations so far in this chapter. However,\
    \ a command is just a container for details of a method that should be invoked,\
    \ the values for its argument, and—optionally—the receiver that will be targeted.\
    \ All of these details can be encapsulated in Swift closures, without the need\
    \ to define and use a `Command` protocol and its implementation.\n\nI prefer to\
    \ use `Command` objects. I find it makes the purpose of the pattern more obvious\
    \ and produces code that it easier to read and maintain. You may feel differently,\
    \ however, and in Listing 20-14, you can see how I have modified the `Calculator`\
    \ class so that it uses closures to express commands and no longer relies on the\
    \ `Command` protocol and the `GenericCommand` class.\n\n**Listing 20-14.** Using\
    \ Closures as Commands in the `Calculator.swift` File\n\n```\nimport Foundation;\n\
    \nclass Calculator {\n    private(set) var total = 0;\n    typealias CommandClosure\
    \ = (Calculator -> Void);\n    private var history = [CommandClosure]();\n   \
    \ private var queue = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    func add(amount:Int) {\n        addMacro(Calculator.add, amount: amount);\n\
    \        total += amount;\n    }\n    func subtract(amount:Int) {\n        addMacro(Calculator.subtract,\
    \ amount: amount);\n        total -= amount;\n    }\n    func multiply(amount:Int)\
    \ {\n        addMacro(Calculator.multiply, amount: amount);\n        total = total\
    \ * amount;\n    }\n    func divide(amount:Int) {\n        addMacro(Calculator.divide,\
    \ amount: amount);\n        total = total / amount;\n    }\n    private func addMacro(method:Calculator\
    \ -> Int -> Void, amount:Int) {\n        dispatch_sync(self.queue, {() in\n  \
    \          self.history.append({ calc in method(calc)(amount)});\n        });\n\
    \    }\n    func getMacroCommand() -> (Calculator -> Void) {\n        var commands\
    \ = [CommandClosure]();\n        dispatch_sync(queue, {() in\n            commands\
    \ = self.history\n        });\n        return { calc in\n            if (commands.count\
    \ > 0) {\n                for index in 0 ..< commands.count {\n              \
    \      commands[index](calc);\n                }\n            }\n        };\n\
    \    }\n}\n```\n\nThe changes in this listing may look minor, but writing this\
    \ kind of code is mind-bending as you sort through the variables on which you\
    \ want to close and those that you don’t and figure out whether you need to curry\
    \ from `Calculator -> Int -> Void` to `Calculator -> Void` or to `Int -> Void`.\n\
    \nIf you are committed to this style of command, then notice that I used the `typealias`\
    \ keyword to define an alias for use in arrays, like this:\n\n```\n...\ntypealias\
    \ CommandClosure = (Calculator -> Void);\nprivate var history = [CommandClosure]();\n\
    ...\n```\n\nThe Swift compiler doesn’t like dealing with closure signatures as\
    \ the data type for arrays but can be placated with an alias. Listing 20-15 shows\
    \ the changes in the `main.swift` file to use the closure-based `Calculator` class.\n\
    \n**Listing 20-15.** Using the Closure-Based Calculator Class in the `main.swift`\
    \ File\n\n```\nlet calc = Calculator();\ncalc.add(10);\ncalc.multiply(4);\ncalc.subtract(2);\n\
    println(\"Calc 1 Total: \\(calc.total)\");\n\nlet macro = calc.getMacroCommand();\n\
    let calc2 = Calculator();\nmacro(calc2);\nprintln(\"Calc 2 Total: \\(calc2.total)\"\
    );\n```\n\nThe only change is to invoke the closure returned by the `getMacroCommand`\
    \ method directly, rather than invoking an execute method defined by a `Command`\
    \ object. Running the application produces the following output, showing that\
    \ the closures work in just the same way as separate command objects:\n\n```\n\
    Calc 1 Total: 38\nCalc 2 Total: 38\n```"
