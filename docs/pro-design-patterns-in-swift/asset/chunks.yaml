    Running the application produces the following results:


    `Area: 55.625`


    `---`


    `Edges: 9`


    New algorithms can be defined by creating new visitors and passing them to the
    `accept` method. In this way, new behaviors and features can be created without
    needing to modify or subclass the collection class.


    ## Variations on the Visitor Pattern


    There are no common variations on the visitor pattern.


    ## Understanding the Pitfalls of the Visitor Pattern


    The only pitfall when implementing the visitor pattern is to try to sidestep the
    use of double dispatch. Although this technique looks awkward, it is not possible
    to implement the visitor pattern without it.


    ## Examples of the Visitor Pattern in Cocoa


    The Cocoa frameworks do not contain examples of the visitor pattern.


    ## Applying the Pattern to the SportsStore Application


    There is no suitable heterogeneous collection in the SportsStore application to
    which the visitor pattern can be applied.


    ## Summary


    I described the visitor pattern in this chapter and explained how it can be used
    to extend the behavior of heterogeneous collections without having to modify or
    subclass the collection class. In [Chapter 26](#A978-1-4842-0394-1_26_Chapter.html),
    I describe the template method pattern, which allows steps in an algorithm to
    be selectively replaced.


    # 26. The Template Method Pattern


    The template method pattern allows for individual steps in an algorithm to be
    changed, which is useful when you are writing classes with default behavior that
    you want to allow to be changed by other developers. This is a simple pattern
    to understand and to implement, but it is widely used and can be found throughout
    most public frameworks, including those provided by Apple. Table [26-1](#A978-1-4842-0394-1_26_Chapter.html#Tab1)
    puts the template method pattern into context.


    Table 26-1.


    Putting the Template Method Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The template method pattern allows specific steps in an algorithm
    to be replaced by implementations provided by a third-party, either by specifying
    functions as closures or by creating a subclass. |

    | What are the benefits? | This pattern is useful when you are writing frameworks
    that you want to allow other developers to extend and customize. |

    | When should you use this pattern? | Use this pattern to selectively permit steps
    in any algorithm to be changed without modifying the original class. |

    | When should you avoid this pattern? | Do not use this pattern if the entire
    algorithm can be changed. See the other patterns in this part of the book for
    alternatives. |

    | How do you know when you have implemented the pattern correctly? | This pattern
    is implemented correctly when selected steps in an algorithm can be changed without
    modifying the class that defines the algorithm. |

    | Are there any common pitfalls? | No. |

    | Are there any related patterns? | This pattern has similar goals to the strategy
    and visitor patterns I described in [Chapters 24](#A978-1-4842-0394-1_24_Chapter.html)
    and [25](#A978-1-4842-0394-1_25_Chapter.html). |


    ## Preparing the Example Project


    For this chapter I created an Xcode OS X Command Line Tool project called TemplateMethod.
    I created a file called `Donors.swift`, the contents of which are shown in Listing
    26-1.


    Listing 26-1. The Contents of the Donors.swift File


    `struct Donor {`


    `let title:String;`


    `let firstName:String;`


    `let familyName:String;`


    `let lastDonation:Float;`


    `init (_ title:String, _ first:String, _ family:String, _ last:Float) {`


    `self.title = title;`


    `self.firstName = first;`


    `self.familyName = family;`


    `self.lastDonation = last;`


    `}`


    `}`


    `class DonorDatabase {`


    `private var donors:[Donor];`


    `init() {`


    `donors = [`


    `Donor("Ms", "Anne", "Jones", 0),`


    `Donor("Mr", "Bob", "Smith", 100),`


    `Donor("Dr", "Alice", "Doe", 200),`


    `Donor("Prof", "Joe", "Davis", 320)];`


    `}`


    `func generateGalaInvitations(maxNumber:Int) -> [String] {`


    `// step 1 - filter out non-donors`


    `var targetDonors:[Donor] = donors.filter({$0.lastDonation > 0});`


    `// step 2 - order donors by last donation`


    `targetDonors.sort({ $0.lastDonation > $1.lastDonation});`


    `// step 3 - limit the number of invitees`


    `if (targetDonors.count > maxNumber) {`


    `targetDonors = Array(targetDonors[0..<maxNumber]);`


    `}`


    `// step 4 - generate the invitations`


    `return targetDonors.map({ donor in`


    `return "Dear \(donor.title). \(donor.familyName)";`


    `})`


    `}`


    `}`


    The example for this chapter is based on an imaginary charity that solicits contributions
    from donors. Each donor is represented by a `Donor` object, and the set of objects
    is collected by the `DonorDatabase` class.


    The `DonorDatabase` class defines a `generateGalaInvitations` method that processes
    the `Donor` objects to generate salutations for invitations to a gala concert.
    Listing 26-2 shows the code I added to the `main.swift` file to generate the set
    of salutations.


    Listing 26-2. The Contents of the main.swift File


    `let donorDb = DonorDatabase();`


    `let galaInvitations = donorDb.generateGalaInvitations(2);`


    `for invite in galaInvitations {`


    `println(invite);`


    `}`


    Running the example produces the following output in the Xcode console:


    `Dear Prof. Davis`


    `Dear Dr. Doe`


    ## Understanding the Problem That the Pattern Solves


    The algorithm for generating greetings for the gala has four distinct stages.


    Filtering out those donors who have not made a donation   Sorting the donors by
    their recent donations   Selecting the number of donors for which there are invitations
      Generating the salutations for the invitations  


    These are the same four basic steps that the charity will need to perform in order
    to generate greetings for any communication with the donors: filter, sort, select,
    and generate. The problem addressed by the template method pattern is a variation
    of the problem addressed by the strategy and visitor patterns I described in [Chapters
    24](#A978-1-4842-0394-1_24_Chapter.html) and [25](#A978-1-4842-0394-1_25_Chapter.html):
    how to extend the behavior of a class without modifying it.


    In this case, the problem is applied to algorithms that have well-defined steps
    that can be varied to create different results, such as the algorithm used to
    generate salutations in the `DonorDatabase` class. Unlike the other patterns,
    however, the template method pattern is useful when you need to ensure that some
    parts of an algorithm can be varied while other parts remain fixed, ensuring that,
    say, sorting and selecting are always handled in the same way but that the filtering
    and generating steps can be changed to create new results for different kinds
    of donor communication.


    ## Understanding the Template Method Pattern


    The template method relies on an implementation of an algorithm that defines only
    the parts that are to remain fixed. The remaining parts of the algorithm are provided
    by the calling component to complete the algorithm and generate the required results,
    as illustrated by Figure [26-1](#A978-1-4842-0394-1_26_Chapter.html#Fig1).


    ![A978-1-4842-0394-1_26_Fig1_HTML.jpg](A978-1-4842-0394-1_26_Fig1_HTML.jpg)


