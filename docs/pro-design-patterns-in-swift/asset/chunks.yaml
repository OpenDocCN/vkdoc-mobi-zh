    \n### 创建具体工厂\n\n下一步是创建具体工厂类，这些类负责创建一组可以协同使用的产品对象。我向项目中添加了一个名为 `Concrete.swift`\
    \ 的文件，并用它定义了清单 10-7 中所示的类。\n\n**清单 10-7.** `Concrete.swift` 文件的内容\n\n```\nclass\
    \ CompactCarFactory : CarFactory {\n\n    override func createFloorplan() -> Floorplan\
    \ {\n        return StandardFloorplan();\n    }\n\n    override func createSuspension()\
    \ -> Suspension {\n        return RoadSuspension();\n    }\n\n    override func\
    \ createDrivetrain() -> Drivetrain {\n        return FrontWheelDrive();\n    }\n\
    \n}\n\nclass SportsCarFactory : CarFactory {\n\n    override func createFloorplan()\
    \ -> Floorplan {\n        return ShortFloorplan();\n    }\n\n    override func\
    \ createSuspension() -> Suspension {\n        return RaceSuspension();\n    }\n\
    \n    override func createDrivetrain() -> Drivetrain {\n        return RearWheelDrive();\n\
    \    }\n\n}\n\nclass SUVCarFactory : CarFactory {\n\n    override func createFloorplan()\
    \ -> Floorplan {\n        return LongFloorplan();\n    }\n\n    override func\
    \ createSuspension() -> Suspension {\n        return OffRoadSuspension();\n  \
    \  }\n\n    override func createDrivetrain() -> Drivetrain {\n        return AllWheelDrive();\n\
    \    }\n\n}\n```\n\n每个具体工厂类都派生自 `CarFactory` 类，并重写其方法以创建表 10-2 中所示的产品组之一。\n\n\
    ### 完善抽象工厂\n\n现在我可以回到抽象工厂类并完成模式的实现。清单 10-8 展示了选择具体工厂的变化，以便为调用方提供获取具体工厂的途径。\n\n\
    **清单 10-8.** 在 `Abstract.swift` 文件中完成模式实现\n\n```\nclass CarFactory {\n\n    func\
    \ createFloorplan() -> Floorplan {\n        fatalError(\"Not implemented\");\n\
    \    }\n\n    func createSuspension() -> Suspension {\n        fatalError(\"Not\
    \ implemented\");\n    }\n\n    func createDrivetrain() -> Drivetrain {\n    \
    \    fatalError(\"Not implemented\");\n    }\n\n    final class func getFactory(car:Cars)\
    \ -> CarFactory? {\n        var factory:CarFactory?\n        switch (car) {\n\
    \            case .COMPACT:\n                factory = CompactCarFactory();\n\
    \            case .SPORTS:\n                factory = SportsCarFactory();\n  \
    \          case .SUV:\n                factory = SUVCarFactory();\n        }\n\
    \        return factory;\n    }\n\n}\n```\n\n我添加了一个名为 `getFactory` 的类型方法，它接受一个来自\
    \ `Cars` 枚举的值，选择一个具体工厂，并将其实例返回给调用方。被选中的工厂以 `CarFactory` 对象的形式呈现给调用方，而关于哪个具体工厂被选中及其原因等细节则保持私有。\n\
    \n### 使用抽象工厂模式\n\n最后一步是更新创建 `Car` 对象的代码，使其通过抽象工厂获取产品。清单 10-9 展示了我在 `main.swift`\
    \ 文件中所做的更改。\n\n**清单 10-9.** 在 `main.swift` 文件中使用抽象工厂模式\n\n```\nlet factory = CarFactory.getFactory(Cars.SPORTS);\n\
    if (factory != nil) {\n    let car = Car(carType: Cars.SPORTS,\n        floor:\
    \ factory!.createFloorplan(),\n        suspension: factory!.createSuspension(),\n\
    \        drive: factory!.createDrivetrain());\n    car.printDetails();\n}\n```\n\
    \n我没有直接实例化实现对象，而是使用抽象工厂类来获取所需车型的具体工厂，然后调用 `create` 方法来获取实现对象。如果运行应用程序，你将看到以下输出：\n\
    \n```\nCar type: Porsche Boxter\nSeats: 2\nEngine: Mid\nSuspension: Firm\nDrive:\
    \ Rear\n```\n\n如清单 10-9 所示，`main.swift` 文件中的代码与各个产品类之间没有依赖关系。这意味着，如果表 10-2 中所示的矩阵发生变化，我可以更新相应的具体工厂类，而无需在使用这些工厂的组件中进行相应的更改。在清单\
    \ 10-10 中，你可以看到我如何更改了跑车的驱动系统选项。\n\n**清单 10-10.** 在 `Concrete.swift` 文件中更改实现类\n\
    \n```\n...\nclass SportsCarFactory : CarFactory {\n\n    override func createFloorplan()\
    \ -> Floorplan {\n        return ShortFloorplan();\n    }\n\n    override func\
    \ createSuspension() -> Suspension {\n        return RaceSuspension();\n    }\n\
    \n    override func createDrivetrain() -> Drivetrain {\n        return AllWheelDrive();\n\
    \    }\n\n}\n...\n```\n\n运行应用程序产生的输出显示了更改的效果。\n\n```\nCar type: Porsche Boxter\n\
    Seats: 2\nEngine: Mid\nSuspension: Firm\nDrive: 4WD\n```\n\n通过将哪些产品组应归属于一起的决策集中起来，具体工厂降低了变更对应用程序的影响，这使得决策逻辑更易于测试和维护。抽象工厂则集中了选择具体工厂的决策逻辑，进一步将调用组件与实现类组如何相互关联的细节隔离开来。\n\
    \n## 抽象工厂模式的变体\n\n有一些常见的变体可用于调整抽象工厂的实现方式。正如我在以下章节中解释的，基本机制保持不变，但实现方式会有所改动，以控制对象的创建方式。\n"
- fmt: "### Hiding the Abstract Factory Class\n\nThe first variation, and the most\
    \ common, is to hide the implementation of the abstract factory pattern inside\
    \ the class or struct that calling components use to store the implementation\
    \ objects. In the case of the example application, this means the `Car` struct,\
    \ and Listing 10-11 shows how I have modified it to deal directly with the abstract\
    \ and concrete factory classes.\n\nListing 10-11. Hiding the Pattern in the `CarParts.swift`\
    \ File\n\n```\nenum Cars: String {\n    case COMPACT = \"VW Golf\";\n    case\
    \ SPORTS = \"Porsche Boxter\";\n    case SUV = \"Cadillac Escalade\";\n}\n\nstruct\
    \ Car {\n    var carType:Cars;\n    var floor:Floorplan;\n    var suspension:Suspension;\n\
    \    var drive:Drivetrain;\n\n    init(carType:Cars) {\n        let concreteFactory\
    \ = CarFactory.getFactory(carType);\n        self.floor = concreteFactory!.createFloorplan();\n\
    \        self.suspension = concreteFactory!.createSuspension();\n        self.drive\
    \ = concreteFactory!.createDrivetrain();\n        self.carType = carType;\n  \
    \  }\n\n    func printDetails() {\n        println(\"Car type: \\(carType.rawValue)\"\
    );\n        println(\"Seats: \\(floor.seats)\");\n        println(\"Engine: \\\
    (floor.enginePosition.rawValue)\");\n        println(\"Suspension: \\(suspension.suspensionType.rawValue)\"\
    );\n        println(\"Drive: \\(drive.driveType.rawValue)\");\n    }\n}\n```\n\
    \nI have added an initializer that accepts the type of car that is required as\
    \ a `Cars` value, which is used to ask the abstract factory for a concrete factory.\
    \ The concrete factory is then used to obtain the `Floorplan`, `Suspension`, and\
    \ `Drivetrain` objects that are required to initialize the object. The effect\
    \ of this change is to drastically simplify the code in the `main.swift` file,\
    \ as shown in Listing 10-12.\n\nListing 10-12. The Effect of Hiding the Factories\
    \ in the `main.swift` File\n\n```\nlet car = Car(carType: Cars.SPORTS);\ncar.printDetails();\n\
    ```\n\n**Caution**\n\nThis approach makes two assumptions about what the calling\
    \ component is trying to achieve. It assumes that it wants to create a `Car` object\
    \ and that it requires all three objects. If you do adopt this variation, then\
    \ ensure that the calling component can still access the abstract factory so that\
    \ it can create the objects it needs for whatever purpose it requires them.\n\n\
    ### Applying the Singleton Pattern to the Concrete Factories\n\nAnother common\
    \ variation is to apply the singleton pattern to the concrete factories. The concrete\
    \ factories make good singletons because they contain only the logic that is required\
    \ to create objects from the implementation classes. The first step in applying\
    \ the singleton pattern is to update the abstract factory class, which is the\
    \ base class for the concrete factories. Listing 10-13 shows the changes that\
    \ I made.\n\nListing 10-13. Preparing for the Singleton Pattern in the `Abstract.swift`\
    \ File\n\n```\nclass CarFactory {\n    required init() {\n        // do nothing\n\
    \    }\n\n    func createFloorplan() -> Floorplan {\n        fatalError(\"Not\
    \ implemented\");\n    }\n\n    func createSuspension() -> Suspension {\n    \
    \    fatalError(\"Not implemented\");\n    }\n\n    func createDrivetrain() ->\
    \ Drivetrain {\n        fatalError(\"Not implemented\");\n    }\n\n    final class\
    \ func getFactory(car:Cars) -> CarFactory? {\n        var factoryType:CarFactory.Type;\n\
    \        switch (car) {\n        case .COMPACT:\n            factoryType = CompactCarFactory.self;\n\
    \        case .SPORTS:\n            factoryType = SportsCarFactory.self;\n   \
    \     case .SUV:\n            factoryType = SUVCarFactory.self;\n        }\n\n\
    \        var factory = factoryType.sharedInstance;\n        if (factory == nil)\
    \ {\n            factory = factoryType();\n        }\n        return factory;\n\
    \    }\n\n    class var sharedInstance:CarFactory? {\n        get {\n        \
    \    return nil;\n        }\n    }\n}\n```\n\nI have added a `sharedInstance`\
    \ computed type property that the concrete factories can override if they want\
    \ to be dealt with as singletons. I have changed the implementation of the `getfactory`\
    \ method so that it reads the value of the `sharedInstance` property and returns\
    \ the result, if there is one, to the caller. Concrete classes that don't override\
    \ the `sharedInstance` property will inherit the default implementation, which\
    \ I deal with by creating a new factory instance to deal with requests. Listing\
    \ 10-14 shows how I have updated one of the concrete factories so that it will\
    \ be treated as a singleton.\n\nListing 10-14. Applying the Singleton Pattern\
    \ in the `Concrete.swift` File\n\n```\n...\nclass SportsCarFactory : CarFactory\
    \ {\n    override func createFloorplan() -> Floorplan {\n        return ShortFloorplan();\n\
    \    }\n\n    override func createSuspension() -> Suspension {\n        return\
    \ RaceSuspension();\n    }\n\n    override func createDrivetrain() -> Drivetrain\
    \ {\n        return AllWheelDrive();\n    }\n\n    override class var sharedInstance:CarFactory?\
    \ {\n        get {\n            struct SingletonWrapper {\n                static\
    \ let singleton = SportsCarFactory();\n            }\n            return SingletonWrapper.singleton;\n\
    \        }\n    }\n}\n...\n```\n\nI have overridden the `sharedInstance` property\
    \ of the `SportsCarFactory` class to implement the singleton pattern, as described\
    \ in [Chapter 6](#A978-1-4842-0394-1_6_Chapter.html). I have left the other two\
    \ concrete factory classes unchanged, which means that new instances of those\
    \ classes will be created each time they are selected to deal with a request from\
    \ a calling component. By contrast, there will be only one instance of the `SportsCarFactory`\
    \ class, which will be used to deal with all requests for which the abstract factory\
    \ selects it.\n\n### Applying the Prototype Pattern to the Implementation Classes\n\
    \nYou could also apply the singleton pattern to the implementation classes, but\
    \ that means all components will operate on the same set of objects, which is\
    \ suitable only when there is little or no mutable state or when concurrency protections\
    \ are in place.\n\nA more common variation is to use the prototype pattern to\
    \ create implementation objects by cloning. In the sections that follow, I prepare\
    \ the application for use with the prototype pattern and then show you how to\
    \ implement it."
