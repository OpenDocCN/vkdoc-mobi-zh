    `...Book#3...Checked out 5 times`


    `...Book#5...Checked out 8 times`


    `...Book#4...Checked out 8 times`


    `...Book#1...Checked out 6 times`


    `...`


    The exact results will vary because of the randomness in the `main.swift` code,
    but the overall effect is to allocate the objects more evenly. This is a more
    balanced allocation strategy, but it requires more work each time an object is
    allocated, and (at least for my test code) the impact is relatively small. That
    doesn’t mean you should always use the FIFO allocation strategy, but you should
    make sure that the additional work is justified by the results.


    ## Understanding the Pitfalls of the Pattern Variations


    The main danger presented by these variations is complexity, which can manifest
    itself in concurrency problems and in code that is harder to read and harder to
    maintain. Beyond these problems, there are specific pitfalls that these strategies
    can lead to, as described in the following sections.


    ### Understanding the Expectation Gap Pitfall


    As this chapter has demonstrated, it is possible to create object pools that look
    superficially similar but that implement different strategies behind the scenes.
    You must ensure that the external impact of these strategies is obvious to calling
    components because otherwise you will find that the efficacy of the object pool
    is undermined.


    For example, you may choose to deal with an empty pool by rejecting requests for
    objects. If you do this, ensure that the return type of the pool object checkout
    method is an optional type, such as `Book?` and not simply `Book`. Using optional
    results makes it clear that it is possible that a call to the method will not
    yield an object.


    Not every behavior can be expressed using language features, and I recommend you
    provide API documentation that describes how the pool operates in some detail.
    For example, you will need to document the fact that you deal with an exhausted
    pool by rejecting requests in order to avoid calling components using a `for`
    loop until they receive an object—a behavior that can lead to the application
    locking up.


    ### Understanding the Over- and Under-utilization Pitfalls


    Once you start implementing the object pool pattern, it is easy to become emotionally
    invested in selecting and creating the strategies you need and making them fit
    together. A well-written implementation of the object pool pattern is a thing
    of beauty, but you must keep one eye on how the pool performs during testing and
    deployment because it is easy to create a pool that is perfect in implementation
    but that impairs the performance of the application or consumes too many resources.


    An over-utilized pool is a performance hazard because it spends most of its time
    empty and has a long queue of calling components waiting for objects. An under-utilized
    pool is a resource hazard because it manages a collection of objects that are
    rarely used. Balancing the size and behavior of an object pool against its workload
    requires some trial and error—and realistic usage data for testing. Also, you
    must be prepared to change the size and behavior of your pool to match the application
    needs, even if that means discarding a strategy of which you are particularly
    proud.


    ## Examples of the Pattern Variations in Cocoa


    There are no obvious uses of these pattern variations in the Cocoa frameworks,
    although it is hard to be sure because Apple does not publish the source code.


    ## Applying a Pattern Variation to SportsStore


    To finish this chapter, I am going to change the object creation strategy to the
    pool that I added to the SportsStore application in [Chapter 7](#A978-1-4842-0394-1_7_Chapter.html).
    Currently, the `NetworkPool` class eagerly creates its objects.


    `...`


    `private init() {`


    `for _ in 0 ..< connectionCount {`


    `connections.append(NetworkConnection());`


    `}`


    `semaphore = dispatch_semaphore_create(connectionCount);`


    `queue = dispatch_queue_create("networkpoolQ", DISPATCH_QUEUE_SERIAL);`


    `}`


    `...`


    I am going to switch to a lazy strategy. I used a closure to do this for the generic
    pool class earlier in the chapter because I didn’t want the pool to have directly
    knowledge of how the objects it manages are created. By contrast, the SportsStore
    `NetworkPool` class is already aware of the `NetworkConnection` class and how
    it is created, which simplifies the implementation of the strategy. Listing 8-18
    shows the changes I made to implement the new strategy.


    Listing 8-18. Changing the Object Creation Strategy in the NetworkPool.swift File


    `import Foundation`


    `final class NetworkPool {`


    `private let connectionCount = 3;`


    `private var connections = [NetworkConnection]();`


    `private var semaphore:dispatch_semaphore_t;`


    `private var queue:dispatch_queue_t;`


    `private var itemsCreated = 0;`


    `private init() {`


    `semaphore = dispatch_semaphore_create(connectionCount);`


    `queue = dispatch_queue_create("networkpoolQ", DISPATCH_QUEUE_SERIAL);`


    `}`


    `private func doGetConnection() -> NetworkConnection {`


    `dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER);`


    `var result:NetworkConnection? = nil;`


    `dispatch_sync(queue, {() in`


    `if (self.connections.count > 0) {`


    `result = self.connections.removeAtIndex(0);`


    `} else if (self.itemsCreated < self.connectionCount) {`


    `result = NetworkConnection();`


    `self.itemsCreated++;`


    `}`


    `});`


    `return result!;`


    `}`


    `private func doReturnConnection(conn:NetworkConnection) {`


    `dispatch_async(queue, {() in`


    `self.connections.append(conn);`


    `dispatch_semaphore_signal(self.semaphore);`


    `});`


    `}`


    `class func getConnection() -> NetworkConnection {`


    `return sharedInstance.doGetConnection();`


    `}`


    `class func returnConnecton(conn:NetworkConnection) {`


    `sharedInstance.doReturnConnection(conn);`


    `}`


    `private class var sharedInstance:NetworkPool {`


    `get {`


    `struct SingletonWrapper {`


    `static let singleton = NetworkPool();`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `}`


    `}`


    The changes are simple. I have removed the code that eagerly creates the `NetworkConnection`
    objects from the initializer and added code that lazily creates them in the `doGetConnection`
    method. It is always easier to work on a pool class that manages a specific type,
    but I still prefer to use generic pool classes because it means I always get a
    consistent pool implementation because I copy the code from one project to another,
    and to me, that is worth the additional complexity.


    ## Summary


    In this chapter, I showed you how you can change the four strategies that define
    the way an object pool works so that you can use different implementations of
    the pattern to handle a variety of objects. Few patterns require as much detail
    as the object pool pattern, and I return to simpler territory in the next chapter,
    in which I describe the factory method pattern.'
  trans: "\n# 清单 8-17 展示了一种最少使用策略。该策略会选择可用的对象中使用次数最少的那个。可能存在一些已被借出但使用次数更少的对象。将所有对象都考虑在内的策略被称为完美分配策略，但这种策略几乎没什么用，因为它意味着你需要阻塞一个请求，直到绝对最少使用的对象变得可用，而这可能在相当长一段时间内都不会发生。\n\
    \n## 清单 8-17 在`Library.swift`文件中实现不同的分配策略\n\n```\n...\nprivate init(stockLevel:Int)\
    \ {\n    var stockId = 1;\n    pool = Pool<Book>(\n        itemCount:stockLevel,\n\
    \        itemFactory: {() in\n            return BookSeller.buyBook(\"Dickens,\
    \ Charles\",\n                title: \"Hard Times\", stockNumber: stockId++)},\n\
    \        itemAllocator: {(var books) in\n            var selected = 0;\n     \
    \       for index in 1 ..< books.count {\n                if (books[index].checkoutCount\
    \ < books[selected].checkoutCount) {\n                    selected = index;\n\
    \                }\n            }\n            return selected;\n        }\n \
    \   );\n}\n...\n```\n\n在新的闭包中，我检查了每个可用的对象，并选择了`checkoutCount`属性值最低的那个。以下是使用此策略后的输出结果：\n\
    \n```\n...\n...Book#2...Checked out 8 times\n...Book#3...Checked out 5 times\n\
    ...Book#5...Checked out 8 times\n...Book#4...Checked out 8 times\n...Book#1...Checked\
    \ out 6 times\n...\n```\n\n由于`main.swift`代码中的随机性，具体结果会有所不同，但总体效果是更均匀地分配对象。这是一种更均衡的分配策略，但每次分配对象时需要做更多工作，并且（至少对于我的测试代码而言）影响相对较小。这并不意味着你应该始终使用\
    \ FIFO 分配策略，但你应该确保额外的工作是值得的。\n\n## 理解模式变种的陷阱\n\n这些变种带来的主要风险是复杂性，这可能会表现为并发问题，以及代码更难阅读和维护。除了这些问题之外，这些策略还可能导致一些特定的陷阱，如下文所述。\n\
    \n### 理解预期差距陷阱\n\n正如本章所展示的，可以创建在表面上看相似，但在幕后实现不同策略的对象池。你必须确保这些策略的外部影响对调用组件是显而易见的，否则你会发现对象池的有效性会受到损害。\n\
    \n例如，你可能会选择通过拒绝对象请求来处理空池。如果你这样做，请确保池对象的`checkout`方法的返回类型是可选类型，例如`Book?`，而不仅仅是`Book`。使用可选结果可以清楚地表明，对该方法的调用可能无法获得对象。\n\
    \n并非所有行为都能用语言特性来表达，我建议你提供 API 文档，详细描述池的工作方式。例如，你需要记录这样一个事实：当池耗尽时，你通过拒绝请求来处理，以避免调用组件使用`for`循环直到获得对象——这种行为可能导致应用程序死锁。\n\
    \n### 理解过度使用与使用不足陷阱\n\n一旦你开始实现对象池模式，就很容易在情感上投入过多精力，去选择和创建你需要的策略，并让它们完美配合。一个编写良好的对象池模式实现堪称艺术品，但你必须时刻关注池在测试和部署期间的表现，因为很容易创建一个实现完美但会损害应用程序性能或消耗过多资源的池。\n\
    \n过度使用的池是一个性能隐患，因为它大部分时间都处于空池状态，并且有一长串调用组件在等待对象。使用不足的池是一个资源隐患，因为它管理着一组很少被使用的对象。平衡对象池的大小和行为与其工作负载需要一些反复试验——以及用于测试的真实使用数据。此外，你必须准备好根据应用程序的需求改变池的大小和行为，即使这意味着要放弃一个你特别引以为傲的策略。\n\
    \n## Cocoa 中模式变种的示例\n\n在 Cocoa 框架中，没有明显的这些模式变种的使用实例，不过很难确定，因为苹果没有发布源代码。\n\n##\
    \ 将模式变种应用于 SportsStore\n\n作为本章的结尾，我将更改第 7 章中添加到 SportsStore 应用程序的池的对象创建策略。目前，`NetworkPool`类会急切地创建其对象。\n\
    \n```\n...\nprivate init() {\n    for _ in 0 ..< connectionCount {\n        connections.append(NetworkConnection());\n\
    \    }\n    semaphore = dispatch_semaphore_create(connectionCount);\n    queue\
    \ = dispatch_queue_create(\"networkpoolQ\", DISPATCH_QUEUE_SERIAL);\n}\n...\n\
    ```\n\n我将切换为延迟创建策略。在本章前面部分，我对通用池类使用了闭包来实现这一点，因为我不想让池直接了解其管理的对象是如何创建的。相比之下，SportsStore\
    \ 的`NetworkPool`类已经知道`NetworkConnection`类及其创建方式，这简化了策略的实现。清单 8-18 展示了为实现新策略所做的更改。\n\
    \n## 清单 8-18 在`NetworkPool.swift`文件中更改对象创建策略\n\n```\nimport Foundation\n\nfinal\
    \ class NetworkPool {\n    private let connectionCount = 3;\n    private var connections\
    \ = [NetworkConnection]();\n    private var semaphore:dispatch_semaphore_t;\n\
    \    private var queue:dispatch_queue_t;\n    private var itemsCreated = 0;\n\n\
    \    private init() {\n        semaphore = dispatch_semaphore_create(connectionCount);\n\
    \        queue = dispatch_queue_create(\"networkpoolQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    }\n\n    private func doGetConnection() -> NetworkConnection {\n        dispatch_semaphore_wait(semaphore,\
    \ DISPATCH_TIME_FOREVER);\n        var result:NetworkConnection? = nil;\n    \
    \    dispatch_sync(queue, {() in\n            if (self.connections.count > 0)\
    \ {\n                result = self.connections.removeAtIndex(0);\n           \
    \ } else if (self.itemsCreated < self.connectionCount) {\n                result\
    \ = NetworkConnection();\n                self.itemsCreated++;\n            }\n\
    \        });\n        return result!;\n    }\n\n    private func doReturnConnection(conn:NetworkConnection)\
    \ {\n        dispatch_async(queue, {() in\n            self.connections.append(conn);\n\
    \            dispatch_semaphore_signal(self.semaphore);\n        });\n    }\n\n\
    \    class func getConnection() -> NetworkConnection {\n        return sharedInstance.doGetConnection();\n\
    \    }\n\n    class func returnConnecton(conn:NetworkConnection) {\n        sharedInstance.doReturnConnection(conn);\n\
    \    }\n\n    private class var sharedInstance:NetworkPool {\n        get {\n\
    \            struct SingletonWrapper {\n                static let singleton =\
    \ NetworkPool();\n            }\n            return SingletonWrapper.singleton;\n\
    \        }\n    }\n}\n```\n\n这些改动很简单。我移除了初始化器中急切创建`NetworkConnection`对象的代码，并添加了在`doGetConnection`方法中延迟创建它们的代码。操作一个管理特定类型的池类总是更容易，但我仍然更喜欢使用通用池类，因为这意味着我总能获得一致的池实现（因为我从一个项目到另一个项目复制代码），对我来说，这值得增加额外的复杂性。\n\
    \n## 本章小结\n\n在本章中，我向你展示了如何更改定义对象池工作方式的四个策略，以便你可以使用模式的不同实现来处理各种对象。很少有模式像对象池模式那样需要如此多的细节，我将在下一章回到更简单的领域，描述工厂方法模式。\n"
- fmt: "# 9. The Factory Method Pattern\n\nThe factory method pattern is used when\
    \ there is a choice to be made between classes that implement a common protocol\
    \ or share a common base class. This pattern allows implementation subclasses\
    \ to provide specializations without requiring the components that rely on them\
    \ to know any details of those classes and how they relate to each other. Table\
    \ [9-1](#A978-1-4842-0394-1_9_Chapter.html#Tab1) puts the factory method into\
    \ context.\n\n**Note**\n\nThe factory method pattern is closely related to the\
    \ abstract factory pattern. See [Chapter 10](#A978-1-4842-0394-1_10_Chapter.html)\
    \ for details of the abstract factory pattern and guidance for choosing between\
    \ them.\n\n**Table 9-1.** Putting the Factory Method Pattern into Context\n\n\
    | Question | Answer |\n| --- | --- |\n| What is it? | The factory method pattern\
    \ selects an implementation class to satisfy a calling component’s request without\
    \ requiring the component to know anything about the implementation classes or\
    \ the way they relate to one another. |\n| What are the benefits? | This pattern\
    \ consolidates the logic that decides which implementation class is selected and\
    \ prevents it from being diffused throughout the application. This also means\
    \ that calling components rely only on the top-level protocol or base class and\
    \ do not need any knowledge about the implementation classes or the process by\
    \ which they are selected. |\n| When should you use this pattern? | Use this pattern\
    \ when you have several classes that implement a common protocol or that are derived\
    \ from the same base class. |\n| When should you avoid this pattern? | Do not\
    \ use this pattern when there is no common protocol or shared base class because\
    \ this pattern works by having the calling component rely on only a single type.\
    \ |\n| How do you know when you have implemented the pattern correctly? | This\
    \ pattern is implemented correctly when the appropriate class is instantiated\
    \ without the calling component knowing which class was used or how it was selected.\
    \ |\n| Are there any common pitfalls? | No. The factory method pattern is simple\
    \ to implement. |\n| Are there any related patterns? | The factory method pattern\
    \ is often combined with the singleton and object pool patterns. |\n\n## Preparing\
    \ the Example Project\n\nFor this chapter, I created an OS X Command Line Tool\
    \ project called `FactoryMethod`. I added a file called `RentalCar.swift` to the\
    \ project, the contents of which are shown in Listing 9-1.\n\n**Listing 9-1.**\
    \ The Contents of the `RentalCar.swift` File\n\n```\nprotocol RentalCar {\n  \
    \  var name:String { get };\n    var passengers:Int { get };\n    var pricePerDay:Float\
    \ { get };\n}\n\nclass Compact : RentalCar {\n    var name = \"VW Golf\";\n  \
    \  var passengers = 3;\n    var pricePerDay:Float = 20;\n}\n\nclass Sports : RentalCar\
    \ {\n    var name = \"Porsche Boxter\";\n    var passengers = 1;\n    var pricePerDay:Float\
    \ = 100;\n}\n\nclass SUV : RentalCar {\n    var name = \"Cadillac Escalade\";\n\
    \    var passengers = 8;\n    var pricePerDay:Float = 75;\n}\n```\n\nThis file\
    \ contains a protocol called `RentalCar` and three conforming classes: `Compact`,\
    \ `Sports`, and `SUV`. Listing 9-2 shows the contents of the `CarSelector.swift`\
    \ file, which I added to the project and which defines a class that relies on\
    \ the `RentalCar` protocol and its implementations.\n\n**Listing 9-2.** The Contents\
    \ of the `CarSelector.swift` File\n\n```\nclass CarSelector {\n    class func\
    \ selectCar(passengers:Int) -> String? {\n        var car:RentalCar?;\n      \
    \  switch (passengers) {\n        case 0...1:\n            car = Sports();\n \
    \       case 2...3:\n            car = Compact();\n        case 4...8:\n     \
    \       car = SUV();\n        default:\n            car = nil;\n        }\n  \
    \      return car?.name;\n    }\n}\n```\n\nThe `CarSelector` class defines a type\
    \ method called `selectCar` that instantiates an implementation of the `RentalCar`\
    \ protocol that can accommodate the number of passengers (excluding the driver)\
    \ specified by the `passengers` parameter. The result of the `selectCar` method\
    \ is the value of the `name` property of the `RentalCar` implementation class\
    \ that is selected and instantiated. I also added the statements shown in Listing\
    \ 9-3 to the `main.swift` file.\n\n**Listing 9-3.** The Contents of the `main.swift`\
    \ File\n\n```\nimport Foundation\n\nlet passengers = [1, 3, 5];\n\nfor p in passengers\
    \ {\n    println(\"\\(p) passengers: \\(CarSelector.selectCar(p)!)\");\n}\n```\n\
    \nThe code in the `main.swift` file calls the `CarSelector.selectCar` method for\
    \ different numbers of passengers and writes the results to the debug console.\
    \ You will see the following output when you run the application:\n\n```\n1 passengers:\
    \ Porsche Boxter\n3 passengers: VW Golf\n5 passengers: Cadillac Escalade\n```"
  raw: '# 9. The Factory Method Pattern


    The factory method pattern is used when there is a choice to be made between classes
    that implement a common protocol or share a common base class. This pattern allows
    implementation subclasses to provide specializations without requiring the components
    that rely on them to know any details of those classes and how they relate to
    each other. Table [9-1](#A978-1-4842-0394-1_9_Chapter.html#Tab1) puts the factory
    method into context.


    Note


    The factory method pattern is closely related to the abstract factory pattern.
    See [Chapter 10](#A978-1-4842-0394-1_10_Chapter.html) for details of the abstract
    factory pattern and guidance for choosing between them.


    Table 9-1.


    Putting the Factory Method Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The factory method pattern selects an implementation class to
    satisfy a calling component’s request without requiring the component to know
    anything about the implementation classes or the way they relate to one another.
    |

    | What are the benefits? | This pattern consolidates the logic that decides which
    implementation class is selected and prevents it from being diffused throughout
    the application. This also means that calling components rely only on the top-level
    protocol or base class and do not need any knowledge about the implementation
    classes or the process by which they are selected. |

    | When should you use this pattern? | Use this pattern when you have several classes
    that implement a common protocol or that are derived from the same base class.
    |

    | When should you avoid this pattern? | Do not use this pattern when there is
    no common protocol or shared base class because this pattern works by having the
    calling component rely on only a single type. |

    | How do you know when you have implemented the pattern correctly? | This pattern
    is implemented correctly when the appropriate class is instantiated without the
    calling component knowing which class was used or how it was selected. |

    | Are there any common pitfalls? | No. The factory method pattern is simple to
    implement. |

    | Are there any related patterns? | The factory method pattern is often combined
    with the singleton and object pool patterns. |


    ## Preparing the Example Project


    For this chapter, I created an OS X Command Line Tool project called FactoryMethod.
    I added a file called `RentalCar.swift` to the project, the contents of which
    are shown in Listing 9-1.


    Listing 9-1. The Contents of the RentalCar.swift File


    `protocol RentalCar {`


    `var name:String { get };`


    `var passengers:Int { get };`


    `var pricePerDay:Float { get };`


    `}`


    `class Compact : RentalCar {`


    `var name = "VW Golf";`


    `var passengers = 3;`


    `var pricePerDay:Float = 20;`


    `}`


    `class Sports : RentalCar {`


    `var name = "Porsche Boxter";`


    `var passengers = 1;`


    `var pricePerDay:Float = 100;`


    `}`


    `class SUV : RentalCar {`


    `var name = "Cadillac Escalade";`


    `var passengers = 8;`


    `var pricePerDay:Float = 75;`


    `}`


    This file contains a protocol called `RentalCar` and three conforming classes:
    `Compact`, `Sports`, and `SUV`. Listing 9-2 shows the contents of the `CarSelector.swift`
    file, which I added to the project and which defines a class that relies on the
    `RentalCar` protocol and its implementations.


    Listing 9-2. The Contents of the CarSelector.swift File


    `class CarSelector {`


    `class func selectCar(passengers:Int) -> String? {`


    `var car:RentalCar?;`


    `switch (passengers) {`


    `case 0...1:`


    `car = Sports();`


    `case 2...3:`


    `car = Compact();`


    `case 4...8:`


    `car = SUV();`


    `default:`


    `car = nil;`


    `}`


    `return car?.name;`


    `}`


    `}`


    The `CarSelector` class defines a type method called `selectCar` that instantiates
    an implementation of the `RentalCar` protocol that can accommodate the number
    of passengers (excluding the driver) specified by the `passengers` parameter.
    The result of the `selectCar` method is the value of the `name` property of the
    `RentalCar` implementation class that is selected and instantiated. I also added
    the statements shown in Listing 9-3 to the `main.swift` file.


    Listing 9-3. The Contents of the main.swift File


    `import Foundation`


    `let passengers = [1, 3, 5];`


    `for p in passengers {`


    `println("\(p) passengers: \(CarSelector.selectCar(p)!)");`


    `}`


    The code in the `main.swift` file calls the `CarSelector.selectCar` method for
    different numbers of passengers and writes the results to the debug console. You
    will see the following output when you run the application:


    `1 passengers: Porsche Boxter`


    `3 passengers: VW Golf`


    `5 passengers: Cadillac Escalade`'
  trans: "\n# 9. 工厂方法模式\n\n工厂方法模式用于在多个实现同一协议或共享同一基类的类之间进行选择。该模式允许实现子类提供特化功能，而依赖这些子类的组件无需了解这些类的任何细节以及它们之间的关联方式。表\
    \ 9-1 将工厂方法模式置于上下文中。\n\n**注意**\n\n工厂方法模式与抽象工厂模式密切相关。有关抽象工厂模式的详细信息以及如何在两者之间做出选择，请参阅第\
    \ 10 章。\n\n**表 9-1.** 将工厂方法模式置于上下文中\n\n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？ | 工厂方法模式选择一个实现类来满足调用组件的请求，而无需该组件了解实现类或其相互关联方式的任何信息。\
    \ |\n| 有什么好处？ | 该模式整合了决定选择哪个实现类的逻辑，并防止该逻辑分散在整个应用程序中。这也意味着调用组件仅依赖于顶层协议或基类，无需了解实现类或选择它们的过程的任何信息。\
    \ |\n| 何时使用此模式？ | 当你有多个实现同一协议或派生自同一基类的类时，使用此模式。 |\n| 何时应避免此模式？ | 当没有公共协议或共享基类时，不要使用此模式，因为此模式的工作原理是让调用组件仅依赖于单一类型。\
    \ |\n| 如何知道是否正确实现了此模式？ | 当适当的类被实例化，而调用组件不知道使用了哪个类或如何选择它时，就正确实现了此模式。 |\n| 有哪些常见陷阱？\
    \ | 没有。工厂方法模式实现简单。 |\n| 有哪些相关模式？ | 工厂方法模式通常与单例模式和对象池模式结合使用。 |\n\n## 准备示例项目\n\n\
    在本章中，我创建了一个名为 `FactoryMethod` 的 OS X 命令行工具项目。我向项目添加了一个名为 `RentalCar.swift` 的文件，其内容如代码清单\
    \ 9-1 所示。\n\n**代码清单 9-1.**`RentalCar.swift` 文件的内容\n\n```\nprotocol RentalCar {\n\
    \    var name:String { get };\n    var passengers:Int { get };\n    var pricePerDay:Float\
    \ { get };\n}\n\nclass Compact : RentalCar {\n    var name = \"VW Golf\";\n  \
    \  var passengers = 3;\n    var pricePerDay:Float = 20;\n}\n\nclass Sports : RentalCar\
    \ {\n    var name = \"Porsche Boxter\";\n    var passengers = 1;\n    var pricePerDay:Float\
    \ = 100;\n}\n\nclass SUV : RentalCar {\n    var name = \"Cadillac Escalade\";\n\
    \    var passengers = 8;\n    var pricePerDay:Float = 75;\n}\n```\n\n该文件包含一个名为\
    \ `RentalCar` 的协议以及三个遵循该协议的类：`Compact`、`Sports` 和 `SUV`。代码清单 9-2 展示了 `CarSelector.swift`\
    \ 文件的内容，我将其添加到项目中，该文件定义了一个依赖于 `RentalCar` 协议及其实现的类。\n\n**代码清单 9-2.**`CarSelector.swift`\
    \ 文件的内容\n\n```\nclass CarSelector {\n    class func selectCar(passengers:Int)\
    \ -> String? {\n        var car:RentalCar?;\n        switch (passengers) {\n \
    \       case 0...1:\n            car = Sports();\n        case 2...3:\n      \
    \      car = Compact();\n        case 4...8:\n            car = SUV();\n     \
    \   default:\n            car = nil;\n        }\n        return car?.name;\n \
    \   }\n}\n```\n\n`CarSelector` 类定义了一个名为 `selectCar` 的类型方法，该方法实例化一个 `RentalCar`\
    \ 协议的实现，该实现能够容纳由 `passengers` 参数指定的乘客数量（不包括驾驶员）。`selectCar` 方法的结果是被选中并实例化的 `RentalCar`\
    \ 实现类的 `name` 属性的值。我还将代码清单 9-3 中所示的语句添加到了 `main.swift` 文件中。\n\n**代码清单 9-3.**`main.swift`\
    \ 文件的内容\n\n```\nimport Foundation\n\nlet passengers = [1, 3, 5];\n\nfor p in passengers\
    \ {\n    println(\"\\(p) passengers: \\(CarSelector.selectCar(p)!)\");\n}\n```\n\
    \n`main.swift` 文件中的代码针对不同的乘客数量调用了 `CarSelector.selectCar` 方法，并将结果写入调试控制台。运行应用程序时，你将看到以下输出：\n\
    \n```\n1 passengers: Porsche Boxter\n3 passengers: VW Golf\n5 passengers: Cadillac\
    \ Escalade\n```\n"
- fmt: "# Understanding the Problem That the Pattern Solves\n\nThe factory method\
    \ pattern solves a problem that arises when there are multiple classes that conform\
    \ to a protocol and you need to select the one that should be instantiated. You\
    \ can see this at work in Listing 9-2, in which the `CarSelector.selectCar` method\
    \ selects and instantiates one of the classes that conforms to the `RentalCar`\
    \ protocol based on the value of the `passengers` parameter.\n\nThis approach\
    \ has two related issues. The first issue is that by needing to instantiate the\
    \ implementation classes, the `CarSelector` class doesn’t benefit from the abstraction\
    \ offered by the `RentalCar` protocol. In fact, the `RentalCar` protocol doesn’t\
    \ deliver any real benefit at all, which you can see when I add a new implementation\
    \ class, as shown in Listing 9-4.\n\nListing 9-4. Adding a New Implementation\
    \ Class in the `RentalCar.swift` File\n\n```\nprotocol RentalCar {\n    var name:String\
    \ { get };\n    var passengers:Int { get };\n    var pricePerDay:Float { get };\n\
    }\n\n// ...other implementation classes omitted for brevity...\n\nclass Minivan\
    \ : RentalCar {\n    var name = \"Chevrolet Express\";\n    var passengers = 14;\n\
    \    var pricePerDay:Float = 40;\n}\n```\n\nThe listing shows the addition of\
    \ the `Minivan` class, and you can see the impact it has on the `CarSelector`\
    \ class in Listing 9-5.\n\nListing 9-5. Adding Support for a New Implementation\
    \ Class in the `CarSelector.swift` File\n\n```\nclass CarSelector {\n    class\
    \ func selectCar(passengers:Int) -> String? {\n        var car:RentalCar?;\n \
    \       switch (passengers) {\n        case 0...1:\n            car = Sports();\n\
    \        case 2...3:\n            car = Compact();\n        case 4...8:\n    \
    \        car = SUV();\n        case 9...14:\n            car = Minivan();\n  \
    \      default:\n            car = nil;\n        }\n        return car?.name;\n\
    \    }\n}\n```\n\nThe `CarSelector` class has to know about every implementation\
    \ of the `RentalCar` protocol that it wants to use, and it has to know when each\
    \ should be created. This is different from tight coupling because the `CarSelector`\
    \ class doesn’t depend on the implementation of the classes it uses, but it is\
    \ still a problem because it depends on knowledge about the classes that implement\
    \ the protocol. New implementation classes require updates to the `CarSelector`\
    \ class, as do changes in the circumstances for which a specific implementation\
    \ class is appropriate. For example, if I change the car model used for the `Sports`\
    \ class so that it has four seats, then I must update the `CarSelector` class\
    \ so that it knows it can be used for one to three passengers.\n\nThe second issue\
    \ is that the knowledge about how to select an implementation class will become\
    \ diffused throughout the application as I add components that need to select\
    \ implementations of the `RentalCar` protocol. In Listing 9-6, you can see the\
    \ contents of the `PriceCalculator.swift` file that I added to the project.\n\n\
    Listing 9-6. The Contents of the `PriceCalculator.swift` File\n\n```\nclass PriceCalculator\
    \ {\n    class func calculatePrice(passengers:Int, days:Int) -> Float? {\n   \
    \     var car:RentalCar?;\n        switch (passengers) {\n        case 0...1:\n\
    \            car = Sports();\n        case 2...3:\n            car = Compact();\n\
    \        case 4...8:\n            car = SUV();\n        case 9...14:\n       \
    \     car = Minivan();\n        default:\n            car = nil;\n        }\n\
    \        return car == nil ? nil : car!.pricePerDay * Float(days);\n    }\n}\n\
    ```\n\nThe `PriceCalculator` class defines a type method called `calculatePrice`\
    \ that works out what it costs to rent a car for a given number of passengers\
    \ and days. The code for selecting the `RentalCar` implementation class is just\
    \ the same as in the `CarSelector` class and suffers from the same dependency\
    \ on understanding the relationship between those classes.\n\n> **Note**: Duplicating\
    \ the code like this seems obviously wrong in such a simple example, but in a\
    \ complex project with multiple developers it is easy to end up with this situation\
    \ because there is no other way of getting an instance of an implementation class.\n\
    \nBoth of these problems are barriers to creating robust and easily maintained\
    \ software. A diffused dependency on the relationship between classes causes cascades\
    \ of changes throughout an application whenever you need to alter the relationships,\
    \ and it is all too easy to omit a required change and create a bug that is hard\
    \ to test for.\n\n# Understanding the Factory Method Pattern\n\nThe factory method\
    \ pattern encapsulates the logic required to select an implementation class within\
    \ a single method that is accessible to calling components. The factory method\
    \ exposes only the protocol or base class to its callers and does not reveal the\
    \ details of the implementation classes or the relationship between them. There\
    \ are three operations in the factory method pattern, as illustrated by Figure\
    \ 9-1.\n\n![A978-1-4842-0394-1_9_Fig1_HTML.jpg](A978-1-4842-0394-1_9_Fig1_HTML.jpg)\n\
    \n**Figure 9-1.** The factory pattern method\n\nThe first operation occurs when\
    \ the calling component invokes the factory method, supplying it with the arguments\
    \ needed to decide which implement class should be instantiated.\n\nFor the second\
    \ operation, the factory method applies its decision logic to the arguments supplied\
    \ by the calling component to decide which of the implementation classes will\
    \ be instantiated. The final operation creates an instance of the implementation\
    \ class and returns it to the calling component, completing the process and providing\
    \ the caller with the object it needs to do its work.\n\nThe calling component\
    \ does not need to understand the relationship between the implementation classes.\
    \ In fact, it doesn’t even need to know that they exist because the return type\
    \ from the factory method is the protocol or base type and not the implementation\
    \ that has been created (you will see how this works in the following section).\n\
    \n# Implementing the Factory Method Pattern\n\nThe heart of the factory method\
    \ pattern is—as the name suggests—a method. The method encapsulates the decision\
    \ logic that selects the implementation class, it defines the parameters needed\
    \ to execute the logic, and it returns an implementation of the protocol it operates\
    \ on.\n\nThe standard mechanism used to implement the factory method in languages\
    \ such as Java and C# is the abstract class, which is a type that defines some\
    \ concrete functionality but which must be subclassed in order to be instantiated.\
    \ There are two basic approaches to implementing the factory method in Swift,\
    \ although they are somewhat less elegant, as I demonstrate in the sections that\
    \ follow."
  raw: '## Understanding the Problem That the Pattern Solves


    The factory method pattern solves a problem that arises when there are multiple
    classes that conform to a protocol and you need to select the one that should
    be instantiated. You can see this at work in Listing 9-2, in which the `CarSelector.selectCar`
    method selects and instantiates one of the classes that conforms to the `RentalCar`
    protocol based on the value of the `passengers` parameter.


    This approach has two related issues. The first issue is that by needing to instantiate
    the implementation classes, the `CarSelector` class doesn’t benefit from the abstraction
    offered by the `RentalCar` protocol. In fact, the `RentalCar` protocol doesn’t
    deliver any real benefit at all, which you can see when I add a new implementation
    class, as shown in Listing 9-4.


    Listing 9-4. Adding a New Implementation Class in the RentalCar.swift File


    `protocol RentalCar {`


    `var name:String { get };`


    `var passengers:Int { get };`


    `var pricePerDay:Float { get };`


    `}`


    `//` `...other implementation classes omitted for brevity...`


    `class Minivan : RentalCar {`


    `var name = "Chevrolet Express";`


    `var passengers = 14;`


    `var pricePerDay:Float = 40;`


    `}`


    The listing shows the addition of the `Minivan` class, and you can see the impact
    it has on the `CarSelector` class in Listing 9-5.


    Listing 9-5. Adding Support for a New Implementation Class in the CarSelector.swift
    File


    `class CarSelector {`


    `class func selectCar(passengers:Int) -> String? {`


    `var car:RentalCar?;`


    `switch (passengers) {`


    `case 0...1:`


    `car = Sports();`


    `case 2...3:`


    `car = Compact();`


    `case 4...8:`


    `car = SUV();`


    `case 9...14:`


    `car = Minivan();`


    `default:`


    `car = nil;`


    `}`


    `return car?.name;`


    `}`


    `}`


    The `CarSelector` class has to know about every implementation of the `RentalCar`
    protocol that it wants to use, and it has to know when each should be created.
    This is different from tight coupling because the `CarSelector` class doesn’t
    depend on the implementation of the classes it uses, but it is still a problem
    because it depends on knowledge about the classes that implement the protocol.
    New implementation classes require updates to the `CarSelector` class, as do changes
    in the circumstances for which a specific implementation class is appropriate.
    For example, if I change the car model used for the `Sports` class so that it
    has four seats, then I must update the `CarSelector` class so that it knows it
    can be used for one to three passengers.


    The second issue is that the knowledge about how to select an implementation class
    will become diffused throughout the application as I add components that need
    to select implementations of the `RentalCar` protocol. In Listing 9-6, you can
    see the contents of the `PriceCalculator.swift` file that I added to the project.


    Listing 9-6. The Contents of the PriceCalculator.swift File


    `class PriceCalculator {`


    `class func calculatePrice(passengers:Int, days:Int) -> Float? {`


    `var car:RentalCar?;`


    `switch (passengers) {`


    `case 0...1:`


    `car = Sports();`


    `case 2...3:`


    `car = Compact();`


    `case 4...8:`


    `car = SUV();`


    `case 9...14:`


    `car = Minivan();`


    `default:`


    `car = nil;`


    `}`


    `return car == nil ? nil : car!.pricePerDay * Float(days);`


    `}`


    `}`


    The `PriceCalculator` class defines a type method called `calculatePrice` that
    works out what it costs to rent a car for a given number of passengers and days.
    The code for selecting the `RentalCar` implementation class is just the same as
    in the `CarSelector` class and suffers from the same dependency on understanding
    the relationship between those classes.


    Note


    Duplicating the code like this seems obviously wrong in such a simple example,
    but in a complex project with multiple developers it is easy to end up with this
    situation because there is no other way of getting an instance of an implementation
    class.


    Both of these problems are barriers to creating robust and easily maintained software.
    A diffused dependency on the relationship between classes causes cascades of changes
    throughout an application whenever you need to alter the relationships, and it
    is all too easy to omit a required change and create a bug that is hard to test
    for.


    ## Understanding the Factory Method Pattern


    The factory method pattern encapsulates the logic required to select an implementation
    class within a single method that is accessible to calling components. The factory
    method exposes only the protocol or base class to its callers and does not reveal
    the details of the implementation classes or the relationship between them. There
    are three operations in the factory method pattern, as illustrated by Figure [9-1](#A978-1-4842-0394-1_9_Chapter.html#Fig1).


    ![A978-1-4842-0394-1_9_Fig1_HTML.jpg](A978-1-4842-0394-1_9_Fig1_HTML.jpg)


    Figure 9-1.


    The factory pattern method


    The first operation occurs when the calling component invokes the factory method,
    supplying it with the arguments needed to decide which implement class should
    be instantiated.


    For the second operation, the factory method applies its decision logic to the
    arguments supplied by the calling component to decide which of the implementation
    classes will be instantiated. The final operation creates an instance of the implementation
    class and returns it to the calling component, completing the process and providing
    the caller with the object it needs to do its work.


    The calling component does not need to understand the relationship between the
    implementation classes. In fact, it doesn’t even need to know that they exist
    because the return type from the factory method is the protocol or base type and
    not the implementation that has been created (you will see how this works in the
    following section).


    ## Implementing the Factory Method Pattern


    The heart of the factory method pattern is—as the name suggests—a method. The
    method encapsulates the decision logic that selects the implementation class,
    it defines the parameters needed to execute the logic, and it returns an implementation
    of the protocol it operates on.


    The standard mechanism used to implement the factory method in languages such
    as Java and C# is theabstract class, which is a type that defines some concrete
    functionality but which must be subclassed in order to be instantiated. There
    are two basic approaches to implementing the factory method in Swift, although
    they are somewhat less elegant, as I demonstrate in the sections that follow.'
  trans: "\n# 理解该模式要解决的问题\n\n工厂方法模式解决了一个常见问题：当存在多个遵循同一协议的类，且需要选择实例化哪一个时。你可以在代码清单 9-2\
    \ 中看到具体应用，其中`CarSelector.selectCar`方法根据`passengers`参数的值，从遵循`RentalCar`协议的类中选择并实例化一个。\n\
    \n这种方法存在两个相关问题。第一个问题是，由于需要实例化具体实现类，`CarSelector`类并未从`RentalCar`协议提供的抽象中受益。事实上，`RentalCar`协议并未带来任何实际好处——当添加新的实现类时就能看出这一点，如代码清单\
    \ 9-4 所示。\n\n**代码清单 9-4.** 在`RentalCar.swift`文件中添加新实现类\n\n```\nprotocol RentalCar\
    \ {\n    var name:String { get };\n    var passengers:Int { get };\n    var pricePerDay:Float\
    \ { get };\n}\n\n// ...为简洁起见，省略其他实现类...\n\nclass Minivan : RentalCar {\n    var\
    \ name = \"Chevrolet Express\";\n    var passengers = 14;\n    var pricePerDay:Float\
    \ = 40;\n}\n```\n\n该清单展示了`Minivan`类的添加，代码清单 9-5 则显示了它对`CarSelector`类的影响。\n\n**代码清单\
    \ 9-5.** 在`CarSelector.swift`文件中添加对新实现类的支持\n\n```\nclass CarSelector {\n    class\
    \ func selectCar(passengers:Int) -> String? {\n        var car:RentalCar?;\n \
    \       switch (passengers) {\n        case 0...1:\n            car = Sports();\n\
    \        case 2...3:\n            car = Compact();\n        case 4...8:\n    \
    \        car = SUV();\n        case 9...14:\n            car = Minivan();\n  \
    \      default:\n            car = nil;\n        }\n        return car?.name;\n\
    \    }\n}\n```\n\n`CarSelector`类必须了解它想使用的每一个`RentalCar`协议实现，并知道何时创建它们。这不同于紧耦合，因为`CarSelector`类不依赖于所使用类的实现细节，但问题依然存在——它依赖于对实现协议类的了解。新增实现类需要更新`CarSelector`类；同样，当某个具体实现类的适用条件发生变化时，也需要更新。例如，如果我将`Sports`类使用的车型改为四座，就必须更新`CarSelector`类，使其知道该车型可用于\
    \ 1 到 3 名乘客。\n\n第二个问题是，随着我添加需要选择`RentalCar`协议实现的组件，关于如何选择实现类的知识会分散到整个应用程序中。在代码清单\
    \ 9-6 中，你可以看到添加到项目中的`PriceCalculator.swift`文件的内容。\n\n**代码清单 9-6.** `PriceCalculator.swift`文件的内容\n\
    \n```\nclass PriceCalculator {\n    class func calculatePrice(passengers:Int,\
    \ days:Int) -> Float? {\n        var car:RentalCar?;\n        switch (passengers)\
    \ {\n        case 0...1:\n            car = Sports();\n        case 2...3:\n \
    \           car = Compact();\n        case 4...8:\n            car = SUV();\n\
    \        case 9...14:\n            car = Minivan();\n        default:\n      \
    \      car = nil;\n        }\n        return car == nil ? nil : car!.pricePerDay\
    \ * Float(days);\n    }\n}\n```\n\n`PriceCalculator`类定义了一个名为`calculatePrice`的类型方法，用于计算给定乘客数和天数下的租车费用。选择`RentalCar`实现类的代码与`CarSelector`类完全相同，并且同样依赖于对这些类之间关系的理解。\n\
    \n> **注意**：在如此简单的示例中，这样重复代码显然不合理；但在一个多开发者的复杂项目中，由于没有其他方式获取实现类的实例，这种情况很容易出现。\n\n\
    这两个问题都是创建健壮且易于维护的软件的障碍。对类之间关系的分散依赖意味着，每当需要调整关系时，都会在整个应用程序中引发连锁变更，而且很容易遗漏某个必要的修改，从而产生难以测试的\
    \ bug。\n\n# 理解工厂方法模式\n\n工厂方法模式将选择实现类所需的逻辑封装在一个单一方法中，供调用组件访问。工厂方法仅向调用者暴露协议或基类，而不透露实现类的细节或它们之间的关系。工厂方法模式包含三个操作，如图\
    \ 9-1 所示。\n\n![A978-1-4842-0394-1_9_Fig1_HTML.jpg](img/A978-1-4842-0394-1_9_Fig1_HTML.jpg)\n\
    \n**图 9-1.** 工厂方法模式\n\n第一个操作发生在调用组件调用工厂方法时，它向工厂方法提供用于决定实例化哪个实现类的参数。\n\n在第二个操作中，工厂方法将决策逻辑应用于调用组件提供的参数，以决定实例化哪个实现类。最终操作会创建实现类的一个实例，并将其返回给调用组件，完成整个过程，为调用者提供其工作所需的对象。\n\
    \n调用组件无需理解实现类之间的关系。事实上，它甚至不需要知道这些实现类的存在，因为工厂方法的返回类型是协议或基类型，而不是已创建的具体实现（你将在下一节中看到具体工作原理）。\n\
    \n# 实现工厂方法模式\n\n工厂方法模式的核心——顾名思义——是一个方法。该方法封装了选择实现类的决策逻辑，定义了执行逻辑所需的参数，并返回其所操作协议的一个实现。\n\
    \n在 Java 和 C# 等语言中，实现工厂方法的标准机制是抽象类——一种定义了具体功能但必须通过子类化才能实例化的类型。在 Swift 中，实现工厂方法有两种基本方式，但略显不够优雅，我将在后续章节中演示。"
- fmt: "# Defining a Global Factory Method\n\nThe simplest way to implement the pattern\
    \ is to define a global function. Global functions are available throughout an\
    \ application, which makes it easy for calling components to find and call them,\
    \ as shown in Listing 9-7.\n\nListing 9-7. Implementing the Factory Method Pattern\
    \ in the RentalCar.swift File\n\n```\nfunc createRentalCar(passengers:Int) ->\
    \ RentalCar? {\n    var car:RentalCar?;\n    switch (passengers) {\n        case\
    \ 0...1:\n            car = Sports();\n        case 2...3:\n            car =\
    \ Compact();\n        case 4...8:\n            car = SUV();\n        case 9...14:\n\
    \            car = Minivan();\n        default:\n            car = nil;\n    }\n\
    \    return car;\n}\n\nprotocol RentalCar {\n    var name:String { get };\n  \
    \  var passengers:Int { get };\n    var pricePerDay:Float { get };\n}\n\nclass\
    \ Compact : RentalCar {\n    var name = \"VW Golf\";\n    var passengers = 3;\n\
    \    var pricePerDay:Float = 20;\n}\n\n// ...implementation classes omitted for\
    \ brevity...\n```\n\nThis may seem like a small change because the global function—called\
    \ `createRentalCar`—contains the same decision logic that the `CarSelector` and\
    \ `PriceCalculator` classes use. Even so, the effect it has on the calling components\
