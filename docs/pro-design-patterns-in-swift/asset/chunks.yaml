    \ objects.\n\nListing 15-3. The Contents of the `main.swift` File\n\n```\nlet\
    \ doorWindow = CompositePart(name: \"DoorWindow\", parts:\n    Part(name: \"Window\"\
    , price: 100.50),\n    Part(name: \"Window Switch\", price: 12));\nlet door =\
