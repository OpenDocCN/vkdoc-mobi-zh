- fmt: "### Avoiding Expensive Initializations\n\nUsing the `NSCopying` protocol allows\
    \ objects to take responsibility for copying themselves, which means that cloning\
    \ can avoid expensive initialization operations. At the start of the chapter,\
    \ I used the `Initialization.playground` file to define a `Sum` class that generated\
    \ an array of cached results in its initializer, which I have repeated in Listing\
    \ 5-10.\n\n**Listing 5-10.** The Contents of the `Initialization.playground` File\n\
    \n```swift\nclass Sum {\n    let resultsCache: [[Int]];\n    var firstValue:Int;\n\
    \    var secondValue:Int;\n    init(first:Int, second:Int) {\n        resultsCache\
    \ = [[Int]](count: 10, repeatedValue:\n            [Int](count:10, repeatedValue:\
    \ 0));\n        for i in 0..<10 {\n            for j in 0..<10 {\n           \
    \     resultsCache[i][j] = i + j;\n            }\n        }\n        self.firstValue\
    \ = first;\n        self.secondValue = second;\n    }\n    var Result:Int {\n\
    \        get {\n            return firstValue < resultsCache.count\n         \
    \       && secondValue < resultsCache[firstValue].count\n                ? resultsCache[firstValue][secondValue]\n\
    \                : firstValue + secondValue;\n        }\n    }\n}\nvar calc1 =\
    \ Sum(first:0, second: 9).Result;\nvar calc2 = Sum(first:3, second: 8).Result;\n\
    println(\"Calc1: \\(calc1) Calc2: \\(calc2)\");\n```\n\nEach time I create a `Sum`\
    \ object, I incur the cost of allocating and populating the two-dimensional `resultsCache`\
    \ array. By implementing the `NSCopying` protocol, I can apply the prototype pattern\
    \ and selectively clone the object in the `copyWithZone` method, as shown in Listing\
    \ 5-11.\n\n**Listing 5-11.** Applying the Prototype Pattern in the `Initialization.playground`\
    \ File\n\n```swift\nimport Foundation\n\nclass Sum : NSObject, NSCopying {\n \
    \   let resultsCache: [[Int]];\n    var firstValue:Int;\n    var secondValue:Int;\n\
    \    init(first:Int, second:Int) {\n        resultsCache = [[Int]](count: 10,\
    \ repeatedValue:\n            [Int](count:10, repeatedValue: 0));\n        for\
    \ i in 0..<10 {\n            for j in 0..<10 {\n                resultsCache[i][j]\
    \ = i + j;\n            }\n        }\n        self.firstValue = first;\n     \
    \   self.secondValue = second;\n    }\n    private init(first:Int, second:Int,\
    \ cache:[[Int]]) {\n        self.firstValue = first;\n        self.secondValue\
    \ = second;\n        resultsCache = cache;\n    }\n    var Result:Int {\n    \
    \    get {\n            return firstValue < resultsCache.count\n             \
    \   && secondValue < resultsCache[firstValue].count\n                ? resultsCache[firstValue][secondValue]\n\
    \                : firstValue + secondValue;\n        }\n    }\n    func copyWithZone(zone:\
    \ NSZone) -> AnyObject {\n        return Sum(first:self.firstValue,\n        \
    \    second: self.secondValue,\n            cache: self.resultsCache);\n    }\n\
    }\n\nvar prototype = Sum(first:0, second:9);\nvar calc1 = prototype.Result;\n\
    var clone = prototype.copy() as Sum;\nclone.firstValue = 3; clone.secondValue\
    \ = 8;\nvar calc2 = clone.Result;\nprintln(\"Calc1: \\(calc1) Calc2: \\(calc2)\"\
    );\n```\n\nI changed the class declaration so that the base class is `NSObject`\
    \ (which provides the `copy` method) and implemented the `NSCopying` protocol.\
    \ To support cloning, I have added a new initializer that accepts cached data\
    \ as an argument rather than generating the data itself. I have annotated the\
    \ initializer with the `private` keyword so that I can use it in the `copyWithZone`\
    \ function to clone an object using the cached data generated by the prototype\
    \ but prevent other components from providing their own results data.\n\n### Separating\
    \ Object Creation from Object Use\n\nAs I explained earlier in the chapter, three\
    \ pieces of knowledge are required to create an object from its template.\n\n\
    - The template that is associated with the object\n- The initializer that must\
    \ be called\n- The names and types of the initializer arguments\n\nThe prototype\
    \ pattern allows components to create new objects from the prototype without needing\
    \ any information about its template, which means you can change the class or\
    \ struct without having to change the components that need to create instances\
    \ of it. Put another way, you can minimize the number of dependencies on the templates\
    \ you define by separating the way that objects are created from the way objects\
    \ are used. Components that follow the prototype pattern do not need to know the\
    \ type of the prototype objects they clone, which makes it possible to limit the\
    \ amount of knowledge about subclasses in components that need to create new objects.\
    \ This is a benefit that causes some confusion, so I will build up the example\
    \ in stages. Listing 5-12 shows the contents of the `Hiding.playground` file,\
    \ which I created for this example.\n\n**Listing 5-12.** The Contents of the `Hiding.playground`\
    \ File\n\n```swift\nimport Foundation\n\nclass Message {\n    var to:String;\n\
    \    var subject:String;\n    init(to:String, subject:String) {\n        self.to\
    \ = to; self.subject = subject;\n    }\n}\n\nclass MessageLogger {\n    var messages:[Message]\
    \ = [];\n    func logMessage(msg:Message) {\n        messages.append(msg);\n \
    \   }\n    func processMessages(callback:Message -> Void) {\n        for msg in\
    \ messages {\n            callback(msg);\n        }\n    }\n}\n\nvar logger =\
    \ MessageLogger();\nvar message = Message(to: \"Joe\", subject: \"Hello\");\n\
    logger.logMessage(message);\nmessage.to = \"Bob\";\nmessage.subject = \"Free for\
    \ dinner?\";\nlogger.logMessage(message);\nlogger.processMessages({msg -> Void\
    \ in\n    println(\"Message - To: \\(msg.to) Subject: \\(msg.subject)\");\n});\n\
    ```\n\nI have defined a `Message` class that has `to` and `subject` stored properties\
    \ and a `MessageLogger` class that stores `Message` objects passed to its `logMessage`\
    \ method and processes the stored objects using a closure passed to its `processMessages`\
    \ method.\n\nThe problems in this example start with the fact that I am reusing\
    \ `Message` objects, which is a common optimization—albeit for more complex types.\
    \ (Ignore, if you will, the benefit of reusing objects; it is an optimization\
    \ that is often applied almost without thought, even when the cost of creating\
    \ objects is trivial.)\n\n```\n...\nmessage.to = \"Bob\";\nmessage.subject = \"\
    Free for dinner?\";\nlogger.logMessage(message);\n...\n```\n\nThe effect of reusing\
    \ the `Message` objects is that the array defined by the `MessageLogger` class\
    \ is filled with references to the same object. You can see the effect of this\
    \ problem in the console output, which is generated by the closure I pass to the\
    \ `processMessages` method.\n\n```\nMessage - To: Bob Subject: Free for dinner?\n\
    Message - To: Bob Subject: Free for dinner?\n```\n\n#### (Not Really) Solving\
    \ the Problem\n\nIf you were unfamiliar with the prototype pattern or if you don’t\
    \ like the way that the `NSCopying` protocol works, you might be tempted to modify\
    \ the `MessageLogger` class so that it creates its own `Message` objects using\
    \ the class initializer, as shown in Listing 5-13.\n\n**Listing 5-13.** Modifying\
    \ the `MessageLogger` Class in the `Hiding.playground` File\n\n```swift\n...\n\
    class MessageLogger {\n    var messages:[Message] = [];\n    func logMessage(msg:Message)\
    \ {\n        messages.append(Message(to: msg.to, subject: msg.subject));\n   \
    \ }\n    func processMessages(callback:Message -> Void) {\n        for msg in\
    \ messages {\n            callback(msg);\n        }\n    }\n}\n...\n```\n\n**Tip**\n\
    \nI can’t solve this problem by just storing the data values because the closure\
    \ passed to the process expects to be dealing with `Message` objects. And, as\
    \ you will learn shortly, there is a more serious underlying problem to be solved\
    \ that extracting the data values would not solve.\n\nThis approach solves the\
    \ problem, as the following console output shows:\n\n```\nMessage - To: Joe Subject:\
    \ Hello\nMessage - To: Bob Subject: Free for dinner?\n```"
