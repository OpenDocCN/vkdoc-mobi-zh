    `}`


    `}`


    `func processMessages(callback:Message -> Void) {`


    `for msg in messages {`


    `callback(msg);`


    `}`


    `}`


    `}`


    `...`


    This solves the immediate problem by increasing the amount of knowledge that the
    `MessageLogger` class has about the `Message` class and its subclasses. I will
    need to update the `logMessage` class every time that I create a new subclass
    or when I change any of the initializers, which is an unwelcome increase in the
    work required to maintain the code.


    #### Applying the Prototype Pattern


    I can create a better approach by implementing the `NSCopying` protocol and using
    the prototype pattern to clone the objects handled by the `MessageLogger` class,
    as shown in Listing 5-16.


    Listing 5-16. Applying the Prototype Pattern in the Hiding.playground File


    `import Foundation`


    `class Message : NSObject, NSCopying {`


    `var to:String;`


    `var subject:String;`


    `init(to:String, subject:String) {`


    `self.to = to; self.subject = subject;`


    `}`


    `func copyWithZone(zone: NSZone) -> AnyObject {`


    `return Message(to: self.to, subject: self.subject);`


    `}`


    `}`


    `class DetailedMessage : Message {`


    `var from:String;`


    `init(to: String, subject: String, from:String) {`


    `self.from = from;`


    `super.init(to: to, subject: subject);`


    `}`


    `override func copyWithZone(zone: NSZone) -> AnyObject {`


    `return DetailedMessage(to: self.to,`


    `subject: self.subject, from: self.from);`


    `}`


    `}`


    `class MessageLogger {`


    `var messages:[Message] = [];`


    `func logMessage(msg:Message) {`


    `messages.append(msg.copy() as Message);`


    `}`


    `func processMessages(callback:Message -> Void) {`


    `for msg in messages {`


    `callback(msg);`


    `}`


    `}`


    `}`


    `var logger = MessageLogger();`


    `var message = Message(to: "Joe", subject: "Hello");`


    `logger.logMessage(message);`


    `message.to = "Bob";`


    `message.subject = "Free for dinner?";`


    `logger.logMessage(message);`


    `logger.logMessage(DetailedMessage(to: "Alice", subject: "Hi!", from: "Joe"));`


    `logger.processMessages({msg -> Void in`


    `if let detailed = msg as? DetailedMessage {`


    `println("Detailed Message - To: \(detailed.to) From: \(detailed.from)"`


    `+ " Subject: \(detailed.subject)");`


    `} else {`


    `println("Message - To: \(msg.to) Subject: \(msg.subject)");`


    `}`


    `});`


    I have changed the base type for the `Message` class to `NSObject` and implemented
    the `copyWithZone` method in the `Message` and `DetailedMessage` classes. This
    allows me to clone the objects passed to the `logMessage` method without needing
    to worry about subclasses or initializers.


    Tip


    Notice that I don’t have to implement the `NSCopying` protocol in the `DetailedMessage`
    class because it is inherited from the `Message` class. All I need to do is override
    the `copyWithZone` method.


    The output shown in the console shows that applying the prototype pattern ensures
    that the additional property defined by the `DetailedMessage` class isn’t lost.


    `Message - To: Joe Subject: Hello`


    `Message - To: Bob Subject: Free for dinner?`


    `Detailed Message - To: Alice` `From: Joe` `Subject: Hi!`


    The advantage of applying the prototype pattern is that objects can be cloned
    as long as they were originally created from the `Message` class or one of its
    subclasses; creating new subclasses or modifying the class initializers doesn’t
    require any changes to the `MessageLogger` class, which makes the code more flexible
    and easier to maintain.


    Tip


    With a little extra effort, I can break the dependency on the `Message` class
    entirely and create a generic class that can clone objects. See the “Applying
    the Pattern to the SportsStore Application” section for details.


    ## Understanding the Pitfalls of the Prototype Pattern


    There are a few pitfalls to avoid when using the prototype pattern, which I describe
    in the sections that follow.


    ### Understanding the Deep vs. Shallow Pitfall


    The first pitfall to avoid is performing a shallow copy when a deep copy is required.
    When cloning an object, think carefully about whether you need to create a completely
    separate copy or whether a simple reference is sufficient. Creating references
    is quicker and simpler than performing deep copies, but it does mean that two
    or more references will point to the same object.


    Also, don’t forget that you need to consider the entire hierarchy of objects that
    you are cloning and not just the one on which you call the `copy` method. For
    each variable that points to a reference type, you must make a shallow versus
    deep decision. See the “Implementing Deep Copying” section earlier in this chapter
    for details and examples.'
