    `}`


    `}`


    `displayStockTotal();`


    `}`


    `}`


    `...`


    I have added a statement to the `stockLevelDidChange` method that uses the proxy
    to update the stock level. The effect of defining the proxy is that the implementation
    of the (simulated) network connection is known only to the proxy class and can
    be changed without needing to change the `ProductDataStore` or `ViewController`
    class. To test the changes, start the application and change one of the stock
    levels. You will see output similar to the following in the Xcode debug console:


    `Stock update: Thinking Cap = 9`


    ## Summary


    In this chapter, I described how the proxy pattern is used to create stand-ins
    for objects and resources. I explained the three different ways in which proxies
    can be applied and showed you an example implementation of each of them. In the
    next part of the book, I show you the behavioral patterns, which increase the
    flexibility in the ways that objects work with one another.


    # Part IV

    The Behavioral Patterns


    # 19. The Chain of Responsibility Pattern


    The chain of responsibility pattern is useful when there are multiple objects
    that could take responsibility for a request but you don’t want to expose details
    of those objects to the calling component. Table [19-1](#A978-1-4842-0394-1_19_Chapter.html#Tab1)
    puts the chain of responsibility pattern into context.


    Table 19-1.


    Putting the Chain of Responsibility Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The chain of responsibility pattern organizes sequentially a set
    of objects that may be able to take responsibility for a request from a calling
    component. The sequence of objects is referred to as a chain, and each object
    in the chain is asked to take responsibility for the request. The request moves
    along the chain until one of the objects takes responsibility or the end of the
    chain is reached. |

    | What are the benefits? | The chain of responsibility allows objects that can
    process requests to be ordered into a preferential sequence that can be reordered,
    extended, or reduced without any impact on the calling component, which has no
    insight into the objects that comprise the chain. |

    | When should you use this pattern? | Use this pattern when there are several
    objects that can handle a request, only one of which should be used. |

    | When should you avoid this pattern? | Do not use this pattern when there is
    only one object that can handle a request or when the calling component needs
    to select the object. |

    | How do you know when you have implemented the pattern correctly? | The pattern
    is implemented correctly when the set of objects that can take responsibility
    for a request are arranged sequentially and each is offered the chance to take
    responsibility in turn. The individual objects in the chain have no knowledge
    of one another (other than the next link in the chain). |

    | Are there any common pitfalls? | The pitfall is leaking details of the objects
    in the chain, either to one another or to the calling component. |

    | Are there any related patterns? | The chain of responsibility pattern shares
    some common concepts with the command pattern, described in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html).
    |'
  trans: "\n### 发送库存水平更新\n\n为了使用代理发送库存水平变更，我需要更新 `NetworkConnection` 类，如代码清单 18-17\
    \ 所示。\n\n**代码清单 18-17.** 在 `NetworkConnection.swift` 文件中添加新命令\n\n```\nimport Foundation\n\
    \nclass NetworkConnection {\n\n    private let flyweight:NetConnFlyweight;\n\n\
    \    init() {\n        self.flyweight = NetConnFlyweightFactory.createFlyweight();\n\
    \    }\n\n    func getStockLevel(name:String) -> Int? {\n        NSThread.sleepForTimeInterval(Double(rand()\
    \ % 2));\n        return self.flyweight.getStockLevel(name);\n    }\n\n    func\
    \ setStockLevel(name:String, level:Int) {\n        println(\"Stock update: \\\
    (name) = \\(level)\");\n    }\n\n}\n```\n\n我没有真实的服务器可更新，因此 `setStockLevel` 方法的实现仅向调试控制台输出一条消息。完成\
    \ `NetworkConnection` 类的更新后，我就可以完善代理类的实现了，如代码清单 18-18 所示。\n\n**代码清单 18-18.** 在\
    \ `Proxy.swift` 文件中完成代理类\n\n```\n...\n\nclass StockServerProxy : StockServer {\n\
    \n    func getStockLevel(product: String, callback: (String, Int) -> Void) {\n\
    \        let stockConn = NetworkPool.getConnection();\n        let level = stockConn.getStockLevel(product);\n\
    \        if (level != nil) {\n            callback(product, level!);\n       \
    \ }\n        NetworkPool.returnConnecton(stockConn);\n    }\n\n    func setStockLevel(product:\
    \ String, stockLevel: Int) {\n        let stockConn = NetworkPool.getConnection();\n\
    \        stockConn.setStockLevel(product, level: stockLevel);\n        NetworkPool.returnConnecton(stockConn);\n\
    \    }\n\n}\n\n...\n```\n\n最后一步，当用户进行修改时，需要从 `ViewController` 类中调用代理的 `setStockLevel`\
    \ 方法，如代码清单 18-19 所示。\n\n**代码清单 18-19.** 在 `ViewController.swift` 文件中使用代理\n\n```\n\
    ...\n\n@IBAction func stockLevelDidChange(sender: AnyObject) {\n    if var currentCell\
    \ = sender as? UIView {\n        while (true) {\n            currentCell = currentCell.superview!;\n\
    \            if let cell = currentCell as? ProductTableCell {\n              \
    \  if let product = cell.product? {\n                    if let stepper = sender\
    \ as? UIStepper {\n                        product.stockLevel = Int(stepper.value);\n\
    \                    } else if let textfield = sender as? UITextField {\n    \
    \                    if let newValue = textfield.text.toInt()? {\n           \
    \                 product.stockLevel = newValue;\n                        }\n\
    \                    }\n                    cell.stockStepper.value = Double(product.stockLevel);\n\
    \                    cell.stockField.text = String(product.stockLevel);\n    \
    \                productLogger.logItem(product);\n                    StockServerFactory.getStockServer()\n\
    \                        .setStockLevel(product.name, stockLevel: product.stockLevel);\n\
    \                }\n                break;\n            }\n        }\n    }\n\
    \    displayStockTotal();\n}\n\n...\n```\n\n我在 `stockLevelDidChange` 方法中添加了一条语句，用于通过代理更新库存水平。定义代理的效果是，（模拟的）网络连接的实现只有代理类知道，并且可以在不修改\
    \ `ProductDataStore` 或 `ViewController` 类的情况下进行更改。要测试这些更改，请启动应用程序并更改某个库存水平。你将在\
    \ Xcode 调试控制台中看到类似下面的输出：\n\n`Stock update: Thinking Cap = 9`\n\n## 总结\n\n在本章中，我描述了如何使用代理模式为对象和资源创建替代者。我解释了代理的三种不同应用方式，并向你展示了每种方式的示例实现。在本书的下一部分，我将介绍行为型模式，这些模式增加了对象之间协作方式的灵活性。\n\
    \n# 第四部分\n行为型模式\n\n# 19. 责任链模式\n\n当有多个对象可以处理请求，但你不想向调用组件暴露这些对象的细节时，责任链模式非常有用。表\
    \ 19-1 将责任链模式置于上下文中。\n\n**表 19-1.** 责任链模式上下文\n\n| 问题 | 答案 |\n| --- | --- |\n|\
    \ 它是什么？ | 责任链模式将一组可能处理调用组件请求的对象按顺序组织起来。这组对象被称为“链”，链中的每个对象会被请求是否要处理该请求。请求沿着链依次传递，直到某个对象处理了请求，或者到达链的末端。\
    \ |\n| 有什么好处？ | 责任链模式允许将能够处理请求的对象按照优先顺序排列，该顺序可以重新排列、扩展或缩减，而不会对调用组件产生任何影响，因为调用组件并不了解构成链的对象。\
    \ |\n| 何时使用此模式？ | 当有多个对象可以处理某个请求，且仅应使用其中一个时，使用此模式。 |\n| 何时应避免此模式？ | 当只有一个对象可以处理请求，或者调用组件需要选择对象时，不要使用此模式。\
    \ |\n| 如何判断是否正确实现了该模式？ | 当能够处理请求的一组对象按顺序排列，并且每个对象都依次获得处理请求的机会时，该模式就正确实现了。链中的各个对象彼此之间互不了解（除了链中的下一个链接）。\
    \ |\n| 是否有常见的陷阱？ | 陷阱在于泄露链中对象的细节，无论是泄露给彼此还是泄露给调用组件。 |\n| 是否有相关模式？ | 责任链模式与第 20\
    \ 章中描述的命令模式有一些共同概念。 |\n"
- fmt: "## Preparing the Example Project\n\nFor this chapter, I created an Xcode Command\
    \ Line Tool project called `ChainOfResp`. I added a file called `Message.swift`\
    \ to the project and used it to define the code shown in Listing 19-1.\n\n**Listing\
    \ 19-1.** The Contents of the `Message.swift` File\n\n```\nstruct Message {\n\
    \    let from:String;\n    let to:String;\n    let subject:String;\n}\n```\n\n\
    I defined a struct called `Message` that has constants representing different\
    \ properties of a general message: the sender of the message, who the message\
    \ is to, and the subject of the message. I have not defined a constant for the\
    \ body of the message, which I don’t need to demonstrate the chain of responsibility\
    \ pattern. Listing 19-2 shows the contents of the `Transmitters.swift` file, in\
    \ which I have defined a pair of classes that can process `Message` objects in\
    \ order to transmit them elsewhere.\n\n**Listing 19-2.** The Contents of the `Transmitters.swift`\
    \ File\n\n```\nclass LocalTransmitter {\n    func sendMessage(message: Message)\
    \ {\n        println(\"Message to \\(message.to) sent locally\");\n    }\n}\n\n\
    class RemoteTransmitter {\n    func sendMessage(message: Message) {\n        println(\"\
    Message to \\(message.to) sent remotely\");\n    }\n}\n```\n\nThese classes represent\
    \ the mechanisms by which messages are sent, either locally within a company or\
    \ remotely to the wider world. Each transmitter class defines a `sendMessage`\
    \ method that processes a `Message` object. I don’t need to implement message\
    \ routing to demonstrate the chain of responsibility pattern, and so the `sendMessage`\
    \ methods write a message to the Xcode debug console. Listing 19-3 shows the code\
    \ I added to the `main.swift` file to use the example classes.\n\n**Listing 19-3.**\
    \ The Contents of the `main.swift` File\n\n```\nlet messages = [\n    Message(from:\
    \ \"bob@example.com\", to: \"joe@example.com\",\n        subject: \"Free for lunch?\"\
    ),\n    Message(from: \"joe@example.com\", to: \"alice@acme.com\",\n        subject:\
    \ \"New Contracts\"),\n    Message(from: \"pete@example.com\", to: \"all@example.com\"\
    ,\n        subject: \"Priority: All-Hands Meeting\"),\n];\n\nlet localT = LocalTransmitter();\n\
    let remoteT = RemoteTransmitter();\n\nfor msg in messages {\n    if let index\
    \ = find(msg.from, \"@\") {\n        if (msg.to.hasSuffix(msg.from[Range<String.Index>(start:\n\
    \            index, end: msg.from.endIndex)])) {\n            localT.sendMessage(msg);\n\
    \        } else {\n            remoteT.sendMessage(msg);\n        }\n    } else\
    \ {\n        println(\"Error: cannot send message to \\(msg.from)\");\n    }\n\
    }\n```\n\nI define an array of `Message` objects and use a `for` loop to examine\
    \ each of them to choose between a `LocalTransmitter` object and a `RemoteTransmitter`\
    \ object based on whether the `to` and `from` addresses share a common suffix.\
    \ Running the example application produces the following results:\n\n```\nMessage\
    \ to joe@example.com sent locally\nMessage to alice@acme.com sent remotely\nMessage\
    \ to all@example.com sent locally\n```\n\n## Understanding the Problem That the\
    \ Pattern Solves\n\nThe problem in the example application is that the components\
    \ that use the transmitter classes to process `Message` objects have to know about\
    \ those classes and understand when each should be used. This makes it hard to\
    \ add new message handlers, to change the relationship between existing handlers,\
    \ and to test and maintain the code overall. To demonstrate the problem, I have\
    \ defined a new transmitter class, as shown in Listing 19-4.\n\n**Listing 19-4.**\
    \ Defining a New Transmitter Class in the `Transmitters.swift` File\n\n```\nclass\
    \ LocalTransmitter {\n    func sendMessage(message: Message) {\n        println(\"\
    Message to \\(message.to) sent locally\");\n    }\n}\n\nclass RemoteTransmitter\
    \ {\n    func sendMessage(message: Message) {\n        println(\"Message to \\\
    (message.to) sent remotely\");\n    }\n}\n\nclass PriorityTransmitter {\n    func\
    \ sendMessage(message: Message) {\n        println(\"Message to \\(message.to)\
    \ sent as priority\");\n    }\n}\n```\n\nTo properly handle `Message` objects,\
    \ components need to be updated to reflect the new `PriorityTransmitter` class\
    \ and know when it should be used. Listing 19-5 shows the changes required in\
    \ the `main.swift` file, but in a real project these changes would be duplicated\
    \ throughout the application.\n\n**Listing 19-5.** Reflecting the Definition of\
    \ a New Transmitter Class in the `main.swift` File\n\n```\nlet messages = [\n\
    \    Message(from: \"bob@example.com\", to: \"joe@example.com\",\n        subject:\
    \ \"Free for lunch?\"),\n    Message(from: \"joe@example.com\", to: \"alice@acme.com\"\
    ,\n        subject: \"New Contracts\"),\n    Message(from: \"pete@example.com\"\
    , to: \"all@example.com\",\n        subject: \"Priority: All-Hands Meeting\"),\n\
    ];\n\nlet localT = LocalTransmitter();\nlet remoteT = RemoteTransmitter();\nlet\
    \ priorityT = PriorityTransmitter();\n\nfor msg in messages {\n    if (msg.subject.hasPrefix(\"\
    Priority\")) {\n        priorityT.sendMessage(msg);\n    } else if let index =\
    \ find(msg.from, \"@\") {\n        if (msg.to.hasSuffix(msg.from[Range<String.Index>(start:\n\
    \            index, end: msg.from.endIndex)])) {\n            localT.sendMessage(msg);\n\
    \        } else {\n            remoteT.sendMessage(msg);\n        }\n    } else\
    \ {\n        println(\"Error: cannot send message to \\(msg.from)\");\n    }\n\
    }\n```\n\nThe changes themselves are simple, but the fact that calling components\
    \ require so much insight into how the transmitter classes relate to one another\
    \ and when to use them is a problem.\n\n## Understanding the Chain of Responsibility\
    \ Pattern\n\nThe chain of responsibility pattern solves these problems by arranging\
    \ the transmitters in a chain (which is where it gets the name). Each transmitter\
    \ is a link in the chain and is able to inspect the `Message` object to determine\
    \ whether it can take responsibility for the request. If a link in the chain is\
    \ able to handle the `Message` request, then it does so. If not, then the request\
    \ is passed to the next link in the chain, and the process is repeated until the\
    \ request is handled or the last link in the chain is reached. Figure [19-1](#A978-1-4842-0394-1_19_Chapter.html#Fig1)\
    \ illustrates the chain of responsibility pattern.\n\n![A978-1-4842-0394-1_19_Fig1_HTML.jpg](A978-1-4842-0394-1_19_Fig1_HTML.jpg)\n\
    \n**Figure 19-1.** The chain of responsibility pattern\n\nThe calling component\
    \ deals only with the first link in the chain and has no knowledge of subsequent\
    \ links or the basis on which each link decides whether it can take responsibility\
    \ for the request. In the figure, I have shown a chain with three links, where\
    \ the second link takes responsibility for the request. In this situation, the\
    \ third link in the chain doesn’t participate in the process and is unaware of\
    \ the request from the calling component."
