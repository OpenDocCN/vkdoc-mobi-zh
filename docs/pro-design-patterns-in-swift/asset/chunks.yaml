  raw: '### Understanding the Shared Resource Encapsulation Problem


    Not all of the objects that can benefit from the singleton pattern represent real-world
    objects. There will be occasions where you want to create an object that can be
    used by all of the components in an application in a simple and consistent way.
    To demonstrate, Listing 6-3 shows the contents of the `Logger.swift` file, which
    I added to the example project.


    Listing 6-3. The Contents of the Logger.swift File


    `class Logger {`


    `private var data = [String]()`


    `func log(msg:String) {`


    `data.append(msg);`


    `}`


    `func printLog() {`


    `for msg in data {`


    `println("Log: \(msg)");`


    `}`


    `}`


    `}`


    This is a simple logging class of the kind I use to debug problems in my own projects.
    I like the modern debuggers like the one that comes with Xcode, but I often fall
    back on old-school techniques like this because you can learn a lot just by looking
    at the order in which messages appear in the console.


    The `Logger` class defines a `log` method that accepts `String` message arguments
    and appends them to an array. The `printLog` method is called to display the messages,
    which it does by calling the global `println` function. Listing 6-4 shows how
    I updated the `main.swift` file to log details about the data items I back up.


    Listing 6-4. Using the Logger Class in the main.swift File


    `let logger = Logger();`


    `var server = BackupServer(name:"Server#1");`


    `server.backup(DataItem(type: DataItem.ItemType.Email, data: "joe@example.com"));`


    `server.backup(DataItem(type: DataItem.ItemType.Phone, data: "555-123-1133"));`


    `logger.log("Backed up 2 items to \(server.name)");`


    `var otherServer = BackupServer(name:"Server#2");`


    `otherServer.backup(DataItem(type: DataItem.ItemType.Email, data: "bob@example.com"));`


    `logger.log("Backed up 1 item to \(otherServer.name)");`


    `logger.printLog();`


    If you run the application, you will see this output shown in the console:


    `Log: Backed up 2 items to Server#1`


    `Log: Backed up 1 item to Server#2`


    That all works as expected: I log some debugging messages using a local instance
    of the `Logger` class and call the `printLog` method to write out the messages
    once I have backed up all my data. The problem arises when I want to log some
    debug messages in the `BackupServer` class, as shown in Listing 6-5.


    Listing 6-5. Adding Logging in the BackupServer.swift File


    `...`


    `class BackupServer {`


    `let name:String;`


    `private var data = [DataItem]();`


    `let logger = Logger();`


    `init(name:String) {`


    `self.name = name;`


    `logger.log("Created new server \(name)");`


    `}`


    `func backup(item:DataItem) {`


    `data.append(item);`


    `logger.log("\(name) backed up item of type \(item.type.rawValue)");`


    `}`


    `func getData() -> [DataItem]{`


    `return data;`


    `}`


    `}`


    `...`


    There are now two `Logger` objects, each of which maintains a set of messages.
    My call to the `printLog` method on the `Logger` object in the `main.swift` file
    doesn’t print out the messages logged to the `BackupServer` class. What I require
    is a single `Logger` object that I can use to capture all of the debug messages
    in the application and a means for application components to locate that `Logger`
    object without creating tight coupling—known as encapsulating a shared resource.


    ## Understanding the Singleton Pattern


    The singleton pattern solves both the real-world object and shared resource encapsulation
    problems by ensuring that there is only ever one instance of a class in an application.
    This object—known as the singleton—is shared between all of the components that
    require its functionality, as shown in Figure [6-1](#A978-1-4842-0394-1_6_Chapter.html#Fig1).


    ![A978-1-4842-0394-1_6_Fig1_HTML.jpg](A978-1-4842-0394-1_6_Fig1_HTML.jpg)


    Figure 6-1.


    The singleton pattern


    The figure looks simple, but the singleton pattern is unusual in that its implementation
    is closely tied to the language being used. Swift doesn’t have some features that
    would be used to implement the pattern in languages such as C# and Java, and some
    ingenuity is required.


    ## Implementing the Singleton Pattern


    When implementing the singleton pattern, there are some important rules to follow:


    *   The singleton must be the only instance of its type that exists.

    *   The singleton cannot be replaced by another object, even of the same type.

    *   The singleton must be locatable by the components that need to use it.


    There can never be more than one instance of the singleton, either because the
    object represents real-world resources or because you want to funnel all activity,
    such as logging, through the same object. In the sections that follow, I describe
    how to implement the singleton pattern in Swift.


    Note


    The singleton pattern works only with reference types, which means that only classes
    are supported. Structs and other values types don’t work because they are copied
    when they are assigned to a new variable. The only way to copy a reference type
    is to create a new instance via its initializer or to rely on it implementing
    the `NSCopying` protocol. See [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html)
    for details.'
