    \    override func generate(donors: [Donor]) -> [String] {\n        return donors.map({\
    \ \"Hi \\($0.firstName)\"});\n    }\n}\n\nlet newDonor = NewDonors();\nfor invite\
    \ in newDonor.generate(Int.max) {\n    println(invite);\n}\n```\n\n我更喜欢基于闭包的技术，但这属于个人偏好，你应该选择更符合自己编码风格的方法。\n\
    \n# 理解该模式的陷阱\n\n模板方法模式没有相关的陷阱，它易于实现和测试。如果你选择实现我在上一节中展示的变体，请注意仅将你希望允许更改的步骤定义为方法。\n\
    \n# 模板方法模式在 Cocoa 中的示例\n\n模板方法模式在 Cocoa 中广泛使用，在 UI 组件中尤为明显。你可以在 SportsStore 应用中看到示例，其中\
    \ `ViewController` 类派生自 `UIViewController` 类并覆盖了 `viewDidLoad` 方法，该方法在用户界面创建时被调用，如下所示：\n\
    \n```\n...\noverride func viewDidLoad() {\n    super.viewDidLoad();\n    displayStockTotal();\n\
    \    let bridge = EventBridge(callback: updateStockLevel);\n    productStore.callback\
    \ = bridge.inputCallback;\n}\n...\n```\n\n你可能不认为用户界面初始化是一种算法，但它是你将在所有 iOS 项目中以某种形式使用的方法，它允许\
    \ Apple 定义一组固定的具有默认行为的类，这些行为可以被第三方开发者覆盖。\n\n# 将模式应用于 SportsStore 应用\n\n如上一节所述，SportsStore\
    \ 应用已经依赖于模板方法模式。\n\n# 总结\n\n在本章中，我描述了模板方法模式，并解释了如何使用它来允许修改算法中的某些步骤，既可以通过使用闭包定义新函数，也可以通过创建子类来实现。在本书的下一部分中，我将把注意力转向最重要且最容易被误解的模式之一：模型/视图/控制器（MVC）模式。\n\
    \n# 第五部分\n\n## MVC 模式\n"
- fmt: '# 27. The Model/View/Controller Pattern


    The Model/View/Controller (MVC) pattern has become increasingly prevalent in recent
    years and underpins a lot of modern software development, including iOS app projects.
    In this chapter, I put the MVC pattern into context, explain why it is important,
    and describe how it relates to the other design patterns I have described in this
    book. Table [27-1](#A978-1-4842-0394-1_27_Chapter.html#Tab1) puts the MVC pattern
    into context.


    Table 27-1. Putting the MVC Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The MVC pattern adds structure to an entire application rather
    than to an individual component. |

    | What are the benefits? | The sections of an application can be developed, tested,
    and maintained more easily. |

    | When should you use this pattern? | Use this pattern for any complex project.
    |

    | When should you avoid this pattern? | The amount of planning and infrastructure
    required to implement this pattern isn’t justified for short-lived or simple projects.
    |

    | How do you know when you have implemented the pattern correctly? | Implementing
    the MVC pattern involves a lot of judgment and the expression of personal preferences,
    which means that it is hard to give a definitive explanation of when the pattern
    is implemented correctly. In general terms, the individual sections of the application—the
    model, the views, and the controllers—should be loosely coupled to the extent
    that they can be readily isolated for testing, and changes can be made to the
    implementation of one section without requiring corresponding changes in the other
    sections. |

    | Are there any common pitfalls? | The only pitfall is to create a suboptimal
    implementation by putting functionality into the wrong section. Identifying the
    correct section is a matter of experience and preference, and there are few absolute
    right and wrong decisions. |

    | Are there any related patterns? | The implementation of the MVC pattern often
    relies on the patterns described elsewhere in this book. |


    ## Preparing the Example Project


    For this chapter I created an Xcode OS X Command Line Tool project called `MVC`.
    No other preparation is required other than to create the project.


    ## Understanding the Problem That the Pattern Solves


    The MVC pattern adds structure to a project in order to simplify development,
    testing, and maintenance. However, rather than focusing on the relationship or
    interaction between specific objects and types, the MVC pattern is applied to
    the entire application.


    ## Understanding the MVC Pattern


    If you have some spare time and find yourself in the mood to experiment, find
    two or three developers and ask them to describe the MVC pattern. Push for details
    and you will realize two important facts about the MVC pattern. The first fact
    is that every developer has a different understanding of the MVC pattern. The
    second fact is that most developers’ understanding of MVC comprises of a vague
    collection of ideas, usually built around the phrase “separation of concerns.”


    The MVC pattern is expressed with incredible variety in different platforms and
    frameworks. A developer who has built a web application using Microsoft’s MVC
    framework will have a different understanding from a developer who has used Apple’s
    `UIKit` framework to build an iOS app. Both frameworks follow the MVC pattern
    but have different perspectives on how components are arranged to make a well-designed
    application. And the components needed to build a web application are different
    from the components required for an iOS app, which leads to further differences.
    There are so many different expressions of the MVC pattern and so many different
    variations that it can hardly be surprising that a dozen developers will produce
    (at least) a dozen different interpretations.


    Caution


    Arguing about the application of the MVC pattern is the go-to activity of any
    developer who isn’t in the mood to write code. This can, if left unchecked, lead
    to a job as a software architect and, in extreme cases, an enterprise architect.
    As one who has led enterprise architecture in some of the world’s largest companies,
    let me just say that writing code is a lot more interesting than spending all
    day talking about it.


    At the heart of the MVC pattern is the idea of separation of concerns, which is
    why this phrase often comes up. Separation of concerns just means keeping the
    different sections of an application apart from one another and is done to make
    those parts easier to develop, maintain, and test.


    Separation of concerns will seem like a familiar idea by this point because it
    is a theme that emerges from many of the design patterns that I have described
    in this book. The MVC pattern follows a convention of using four different sections
    in an application:


    - The model, which is the M in MVC. The model contains the application’s data.

    - The view, which is the V in MVC. The view generates the output from the model
    that is shown to the user.

    - The controller, which is the C in MVC. The controller responds to user interaction
    and is responsible for updating the model and the view to reflect change in the
    application state.

    - The cross-cutting concerns. As you will learn, not everything can fit neatly
    into the model, view, and controller sections of the application, and the cross-cutting
    concerns are sections of the application that span two or more other sections.


    As you will learn, the crisp definitions I have given for each section of the
    MVC pattern become a lot more blurred when it comes to applying the pattern to
    a real project, but keeping these simple definitions in mind can be helpful, as
    is understanding the interactions between each section, which I have shown in
    Figure [27-1](#A978-1-4842-0394-1_27_Chapter.html#Fig1).


    ![A978-1-4842-0394-1_27_Fig1_HTML.jpg](A978-1-4842-0394-1_27_Fig1_HTML.jpg)


    Figure 27-1. The Model/View/Controller pattern


    User interaction is received by the controller, which contains the logic required
    to update the data in the model to reflect the interaction. The updated application
    state is passed by the controller to the view, which generates the representation
    shown to the user, reflecting the effect of the original interaction.


    As a simple example, imagine an application that displays a list of names. There
    has to be a beginning, so the first instruction from the user is to list all of
    the names. This produces the following sequence:'
