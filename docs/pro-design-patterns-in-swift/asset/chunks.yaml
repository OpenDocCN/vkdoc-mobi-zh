    `Product(name:"Human Chess Board", description:"A fun game for the family",`


    `category:"Chess", price:75.0, stockLevel:0),`


    `Product(name:"Bling-Bling King",`


    `description:"Gold-plated, diamond-studded King",`


    `category:"Chess", price:1200.0, stockLevel:0)];`


    `}`


    The `ProductDataStore` has become the authoritative source for `Product` objects
    in the SportsStore app. `Product` objects are obtained through the `products`
    property, which returns the contents of a private array. The `Product` objects
    are defined with zero `stockLevel` values, but the `products` property is lazily
    computed and uses the `NetworkPool` class to request the current stock levels
    for each product. When the request completes, the `Product` object is updated,
    and an optional callback is invoked to provide notification of the new information.


    Tip


    In a real project, it would make sense to get all of the stock levels in a single
    request, but for the purposes of this chapter I want to exercise the pool with
    more requests than there are pooled objects.


    Notice that I have used two GCD queues in this class. I obtain a global queue—one
    that is created automatically by GCD—with background priority in order to execute
    the simulated network requests. Using background priority means that delays in
    getting the stock information don’t prevent more important tasks from being performed,
    such as responding to user interaction. When I handle the callback, I use the
    main application queue to ensure that updates are performed immediately and not
    deferred until the background tasks are complete.


    Listing 7-11 shows the changes I have made to the `ViewController.swift` file
    to use the `ProductDataStore` class, rather than define the data locally.


