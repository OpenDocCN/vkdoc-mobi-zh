    `class StockServerFactory {`


    `class func getStockServer() -> StockServer {`


    `return server;`


    `}`


    `private class var server:StockServer {`


    `struct singletonWrapper {`


    `static let singleton:StockServer = StockServerProxy();`


    `}`


    `return singletonWrapper.singleton;`


    `}`


    `}`


    `class StockServerProxy : StockServer {`


    `func getStockLevel(product: String, callback: (String, Int) -> Void) {`


    `// TODO - implement this method`


    `}`


    `func setStockLevel(product: String, stockLevel: Int) {`


    `// TODO - implement this method`


    `}`


    `}`


    I have defined the `StockServer` protocol so that it contains `getStockLevel`
    and `setStockLevel` methods and created the `StockServerProxy` class, which acts
    as the proxy for the remote server. The glue between the protocol and the proxy
    class is the `StockServerFactory` class, which uses the singleton pattern to provide
    callers with a reference to a single proxy object. I have not yet implemented
    the proxy methods. I’ll complete the proxy class once some of the other changes
    are in place.


    ### Updating the Product Data Store


    The `ProductDataStore` class supplies product data for the rest of the application
    and is the natural point at which to integrate the proxy, replacing the direct
    access to the `NetworkConnection` and `NetworkPool` classes that are currently
    in place. Listing 18-15 shows how I updated the `ProductDataStore` class to obtain
    its initial stock value data from the proxy.


    Listing 18-15. Integrating the Proxy in the ProductDataStore.swift File


