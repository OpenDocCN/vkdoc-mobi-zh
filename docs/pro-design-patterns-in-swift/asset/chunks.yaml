- fmt: "### Solving the Remote Object Problem\n\nThe use of the proxy pattern to represent\
    \ remote objects and resources has its roots in distributed systems such as CORBA,\
    \ which provided a local object that exposes the same methods as a corresponding\
    \ remote object on a server. The local object was the proxy, and calling one of\
    \ its methods caused the corresponding method to be invoked on the remote object.\
    \ CORBA took care of mapping the proxy object to the remote object and dealing\
    \ with arguments and results.\n\nCORBA isn’t widely used anymore, but the proxy\
    \ pattern has taken on a new importance as HTTP has become the transport of choice\
    \ and RESTful services have become more popular. The proxy pattern can be applied\
    \ to make it easy to work with remote resource and hide the implementation details\
    \ from the functionality that the remote resource offers. This is the kind of\
    \ thing that design patterns are especially good at solving: abstracting functionality\
    \ so that the implementation mechanism can be altered without needing to change\
    \ the way the feature is consumed and packaging up features so the implementation\
    \ isn’t repeated throughout an application. Figure [18-2](#A978-1-4842-0394-1_18_Chapter.html#Fig2)\
    \ shows how a proxy can be used to represent a remote resource.\n\n![A978-1-4842-0394-1_18_Fig2_HTML.jpg](A978-1-4842-0394-1_18_Fig2_HTML.jpg)\n\
    Figure 18-2. Using the proxy pattern to represent a remote resource\n\nThe proxy\
    \ object hides the details of how the remote resource is accessed and just presents\
    \ its data, which in the case of the example application is the value of HTTP\
    \ headers. The use of the proxy consolidates the mechanism by which remote requests\
    \ are made to a single class in the application and allows the implementation\
    \ to be changed—to use alternative Cocoa classes, for example—without needing\
    \ corresponding changes in the components that use the proxy.\n\n### Solving the\
    \ Expensive Operation Problem\n\nA proxy can be used to minimize the cost of expensive\
    \ operations by decoupling the operation from its use. In the case of the example\
    \ application, I can combine requests for multiple header values into a single\
    \ request, as Figure [18-3](#A978-1-4842-0394-1_18_Chapter.html#Fig3) illustrates.\n\
    \n![A978-1-4842-0394-1_18_Fig3_HTML.jpg](A978-1-4842-0394-1_18_Fig3_HTML.jpg)\n\
    Figure 18-3. Using a proxy to combine operations\n\nObviously, I have the advantage\
    \ of picking the example to suit the pattern, but expensive operations can often\
    \ be combined or at least deferred until the cost of performing them is lower.\n\
    \n### Solving the Restricted Access Problem\n\nA proxy can be used as a wrapper\
    \ around an object, adding additional logic to enforce some kind of restriction\
    \ on its use, as shown in Figure [18-4](#A978-1-4842-0394-1_18_Chapter.html#Fig4).\n\
    \n![A978-1-4842-0394-1_18_Fig4_HTML.jpg](A978-1-4842-0394-1_18_Fig4_HTML.jpg)\n\
    Figure 18-4. Restricting access with a proxy\n\nThe proxy usually conforms to\
    \ a common protocol shared with the wrapped object, which means that proxy objects\
    \ can be used as seamless replacements without having to modify the calling components.\
    \ The proxy intercepts requests to access the properties and methods of the underlying\
    \ object and will pass them on only if an access control policy has been satisfied.\n\
    \n## Implementing the Proxy Pattern\n\nThe implementation of the proxy pattern\
    \ varies based on the kind of problem that it is being used to solve. In the following\
    \ sections, I show you how to implement the pattern for each of the three problems\
    \ I described earlier in the chapter.\n\n### Implementing the Remote Object Proxy\n\
    \nThe key to implementing the proxy pattern to access a remote object or pattern\
    \ is to separate out the mechanism by which the remote operation is performed\
    \ from the service or features that it provides to calling components.\n\nFor\
    \ some applications, this will mean hiding the details of the network transport\
    \ and protocol from the calling components. In the case of a proxy object that\
    \ represents a RESTful service, the proxy object might hide details of the HTTP\
    \ transport and the set of URLs that perform operations on the remote data objects.\n\
    \nI chose reading HTTP header values for the example in this chapter because doing\
    \ so presents a different situation; the use of the HTTP transport can’t be hidden\
    \ since its use is a given. Instead, the proxy object hides away how the classes\
    \ in the `Foundation` framework are used to perform HTTP requests and obtain header\
    \ values.\n\n#### Defining the Proxy Protocol\n\nYou don’t have to define a protocol\
    \ when implementing the proxy pattern for a remote object, but I find that it\
    \ forces me to think more clearly about how I expose functionality to calling\
    \ components (and, of course, it allows me to create alternative implementations\
    \ should the need arise). Listing 18-2 shows the protocol that I defined to represent\
    \ a web request, defined in a file called `Proxy.swift` that I added to the example\
    \ project.\n\n**Listing 18-2.** The Contents of the `Proxy.swift` File\n\n```swift\n\
    protocol HttpHeaderRequest {\n    func getHeader(url:String, header:String) ->\
    \ String?;\n}\n```\n\nThe `HttpHeaderRequest` protocol defines a `getHeader` method\
    \ that accepts the URL that will be targeted and the name of the header whose\
    \ value is required. Notice that the `HttpHeaderRequest` method returns a synchronous\
    \ result, rather than relying on a callback. Remote proxy objects have wide discretion\
    \ in how they present their functionality, and I am going to define a proxy object\
    \ that hides the fact that the `Foundation` framework classes I am using perform\
    \ the request asynchronously.\n\n#### Defining the Proxy Implementation Class\n\
    \nThe next step is to define the class that conforms to the protocol and implements\
    \ the mechanism by which the remote object is accessed. Listing 18-3 shows the\
    \ proxy class I defined to make HTTP requests in order to get response header\
    \ values.\n\n**Listing 18-3.** Defining the Implementation Class in the `Proxy.swift`\
    \ File\n\n```swift\nimport Foundation;\n\nprotocol HttpHeaderRequest {\n    func\
    \ getHeader(url:String, header:String) -> String?;\n}\n\nclass HttpHeaderRequestProxy\
    \ : HttpHeaderRequest {\n    private let semaphore = dispatch_semaphore_create(0);\n\
    \n    func getHeader(url: String, header: String) -> String? {\n        var headerValue:String?;\n\
    \        let nsUrl = NSURL(string: url);\n        let request = NSURLRequest(URL:\
    \ nsUrl!);\n        NSURLSession.sharedSession().dataTaskWithRequest(request,\n\
    \            completionHandler: {data, response, error in\n                if\
    \ let httpResponse = response as? NSHTTPURLResponse {\n                    headerValue\
    \ = httpResponse.allHeaderFields[header] as? NSString;\n                }\n  \
    \              dispatch_semaphore_signal(self.semaphore);\n        }).resume();\n\
    \        dispatch_semaphore_wait(self.semaphore, DISPATCH_TIME_FOREVER);\n   \
    \     return headerValue;\n    }\n}\n```\n\nThe `HttpHeaderRequestProxy` class\
    \ conforms to the `HttpHeaderRequest` protocol and is the proxy for making requests.\
    \ The implementation of the `getHeader` method uses the same `Foundation` classes\
    \ I relied on at the start of this chapter, but with the addition of a (now familiar)\
    \ GCD semaphore that allows me to hide the asynchronous nature of the Cocoa classes\
    \ from calling components.\n\n**Tip** I don’t advocate hiding asynchronous operations\
    \ in synchronous methods in real projects, not least because Swift closures make\
    \ it easy to write code that handles asynchronous responses. The reason I have\
    \ done so in this listing is to demonstrate that proxies can reveal as much or\
    \ as little of their implementation detail as they choose."
  raw: '### Solving the Remote Object Problem


    The use of the proxy pattern to represent remote objects and resources has its
    roots in distributed systems such as CORBA, which provided a local object that
    exposes the same methods as a corresponding remote object on a server. The local
    object was the proxy, and calling one of its methods caused the corresponding
    method to be invoked on the remote object. CORBA took care of mapping the proxy
    object to the remote object and dealing with arguments and results.


    CORBA isn’t widely used anymore, but the proxy pattern has taken on a new importance
    as HTTP has become the transport of choice and RESTful services have become more
    popular. The proxy pattern can be applied to make it easy to work with remote
    resource and hide the implementation details from the functionality that the remote
    resource offers. This is the kind of thing that design patterns are especially
    good at solving: abstracting functionality so that the implementation mechanism
    can be altered without needing to change the way the feature is consumed and packaging
    up features so the implementation isn’t repeated throughout an application. Figure
    [18-2](#A978-1-4842-0394-1_18_Chapter.html#Fig2) shows how a proxy can be used
    to represent a remote resource.


    ![A978-1-4842-0394-1_18_Fig2_HTML.jpg](A978-1-4842-0394-1_18_Fig2_HTML.jpg)


    Figure 18-2.


    Using the proxy pattern to represent a remote resource


    The proxy object hides the details of how the remote resource is accessed and
    just presents its data, which in the case of the example application is the value
    of HTTP headers. The use of the proxy consolidates the mechanism by which remote
    requests are made to a single class in the application and allows the implementation
    to be changed—to use alternative Cocoa classes, for example—without needing corresponding
    changes in the components that use the proxy.


    ### Solving the Expensive Operation Problem


    A proxy can be used to minimize the cost of expensive operations by decoupling
    the operation from its use. In the case of the example application, I can combine
    requests for multiple header values into a single request, as Figure [18-3](#A978-1-4842-0394-1_18_Chapter.html#Fig3)
    illustrates.


    ![A978-1-4842-0394-1_18_Fig3_HTML.jpg](A978-1-4842-0394-1_18_Fig3_HTML.jpg)


    Figure 18-3.


    Using a proxy to combine operations


    Obviously, I have the advantage of picking the example to suit the pattern, but
    expensive operations can often be combined or at least deferred until the cost
    of performing them is lower.


    ### Solving the Restricted Access Problem


    A proxy can be used as a wrapper around an object, adding additional logic to
    enforce some kind of restriction on its use, as shown in Figure [18-4](#A978-1-4842-0394-1_18_Chapter.html#Fig4).


    ![A978-1-4842-0394-1_18_Fig4_HTML.jpg](A978-1-4842-0394-1_18_Fig4_HTML.jpg)


    Figure 18-4.


    Restricting access with a proxy


    The proxy usually conforms to a common protocol shared with the wrapped object,
    which means that proxy objects can be used as seamless replacements without having
    to modify the calling components. The proxy intercepts requests to access the
    properties and methods of the underlying object and will pass them on only if
    an access control policy has been satisfied.


    ## Implementing the Proxy Pattern


    The implementation of the proxy pattern varies based on the kind of problem that
    it is being used to solve. In the following sections, I show you how to implement
    the pattern for each of the three problems I described earlier in the chapter.


    ### Implementing the Remote Object Proxy


    The key to implementing the proxy pattern to access a remote object or pattern
    is to separate out the mechanism by which the remote operation is performed from
    the service or features that it provides to calling components.


    For some applications, this will mean hiding the details of the network transport
    and protocol from the calling components. In the case of a proxy object that represents
    a RESTful service, the proxy object might hide details of the HTTP transport and
    the set of URLs that perform operations on the remote data objects.


    I chose reading HTTP header values for the example in this chapter because doing
    so presents a different situation; the use of the HTTP transport can’t be hidden
    since its use is a given. Instead, the proxy object hides away how the classes
    in the `Foundation` framework are used to perform HTTP requests and obtain header
    values.


    #### Defining the Proxy Protocol


    You don’t have to define a protocol when implementing the proxy pattern for a
    remote object, but I find that it forces me to think more clearly about how I
    expose functionality to calling components (and, of course, it allows me to create
    alternative implementations should the need arise). Listing 18-2 shows the protocol
    that I defined to represent a web request, defined in a file called `Proxy.swift`
    that I added to the example project.


    Listing 18-2. The Contents of the Proxy.swift File


    `protocol HttpHeaderRequest {`


    `func getHeader(url:String, header:String) -> String?;`


    `}`


    The `HttpHeaderRequest` protocol defines a `getHeader` method that accepts the
    URL that will be targeted and the name of the header whose value is required.
    Notice that the `HttpHeaderRequest` method returns a synchronous result, rather
    than relying on a callback. Remote proxy objects have wide discretion in how they
    present their functionality, and I am going to define a proxy object that hides
    the fact that the `Foundation` framework classes I am using perform the request
    asynchronously.


    #### Defining the Proxy Implementation Class


    The next step is to define the class that conforms to the protocol and implements
    the mechanism by which the remote object is accessed. Listing 18-3 shows the proxy
    class I defined to make HTTP requests in order to get response header values.


    Listing 18-3. Defining the Implementation Class in the Proxy.swift File


    `import Foundation;`


    `protocol HttpHeaderRequest {`


    `func getHeader(url:String, header:String) -> String?;`


    `}`


    `class HttpHeaderRequestProxy : HttpHeaderRequest {`


    `private let semaphore = dispatch_semaphore_create(0);`


    `func getHeader(url: String, header: String) -> String? {`


    `var headerValue:String?;`


    `let nsUrl = NSURL(string: url);`


    `let request = NSURLRequest(URL: nsUrl!);`


    `NSURLSession.sharedSession().dataTaskWithRequest(request,`


    `completionHandler: {data, response, error in`


    `if let httpResponse = response as? NSHTTPURLResponse {`


    `headerValue = httpResponse.allHeaderFields[header] as? NSString;`


    `}`


    `dispatch_semaphore_signal(self.semaphore);`


    `}).resume();`


    `dispatch_semaphore_wait(self.semaphore, DISPATCH_TIME_FOREVER);`


    `return headerValue;`


    `}`


    `}`


    The `HttpHeaderRequestProxy` class conforms to the `HttpHeaderRequest` protocol
    and is the proxy for making requests. The implementation of the `getHeader` method
    uses the same `Foundation` classes I relied on at the start of this chapter, but
    with the addition of a (now familiar) GCD semaphore that allows me to hide the
    asynchronous nature of the Cocoa classes from calling components.


    Tip


    I don’t advocate hiding asynchronous operations in synchronous methods in real
    projects, not least because Swift closures make it easy to write code that handles
    asynchronous responses. The reason I have done so in this listing is to demonstrate
    that proxies can reveal as much or as little of their implementation detail as
    they choose.'
