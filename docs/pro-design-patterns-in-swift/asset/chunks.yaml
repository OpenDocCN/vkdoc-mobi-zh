    ...\n```\n\n不幸的是，`NSJSONSerialization` 类仅能操作 Foundation 类型，这意味着我必须将 `Ledger` 对象的状态转换为一个包含每个数据项键值对的\
    \ `NSMutableDictionary`。我为 `total` 和 `nextId` 定义了键并直接赋值。为了表示分类账条目，我创建了一个 `NSMutableDictionary`\
    \ 对象数组，每个对象都包含 `id`、`counterParty` 和 `amount` 属性的键值对。结果是一个如下所示的 JSON 字符串，我对其进行了格式化以便于阅读：\n\
