    so that either can be changed without a corresponding change in the other. More
    commonly, the bridge pattern is used to resolve a problem known as an exploding
    class hierarchy, which usually arises through repeated but poorly thought-out
    refactoring and requires an ever-increasing number of classes to add new features
    to the application. |

    | What are the benefits? | When the bridge pattern is applied to the exploding
    class hierarchy problem, the benefit is that adding a new feature to the application
    requires only a single class. More broadly, the pattern isolates the impact of
    a change when an abstraction or its implementation changes. |

    | When should you use this pattern? | Use this pattern to resolve the exploding
    class hierarchy problem or to bridge between one API and another. |

    | When should you avoid this pattern? | Do not use this pattern when attempting
