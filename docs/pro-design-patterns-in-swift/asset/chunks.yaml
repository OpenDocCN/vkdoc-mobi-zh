    `}`


    `return super.sendMessage(message, handled: handled);`


    `}`


    `}`


    `class RemoteTransmitter : Transmitter {`


    `override func sendMessage(message: Message, var handled: Bool) -> Bool {`


    `if (!handled` `&&` `!Transmitter.matchEmailSuffix(message)) {`


    `println("Message to \(message.to) sent remotely");`


    `handled = true;`


    `}`


    `return super.sendMessage(message, handled: handled);`


    `}`


    `}`


    `class PriorityTransmitter : Transmitter {`


    `var totalMessages = 0;`


    `var handledMessages = 0;`


    `override func sendMessage(message: Message, var handled:Bool) -> Bool {`


    `totalMessages++;`


    `if (!handled` `&&` `message.subject.hasPrefix("Priority")) {`


    `handledMessages++;`


    `println("Message to \(message.to) sent as priority");`


    `println("Stats: Handled \(handledMessages) of \(totalMessages)");`


    `handled = true;`


    `}`


    `return super.sendMessage(message, handled: handled);`


    `}`


    `}`


    I have changed the signature of the `sendMessage` method to define a `handled`
    parameter that I use to signal whether a link in the chain is being asked to take
    responsibility for a request or being notified about a request for which another
    link has already taken responsibility. I have also modified the `PriorityTransmitter`
    class so that it keeps track of the requests it handles and the total number of
    requests it processes. Running the application produces the following output:


    `Message to joe@example.com sent locally`


    `Message sent: true`


    `End of chain reached. Message not sent`


    `Message sent: false`


    `Message to all@example.com sent as priority`


    `Stats: Handled 1 of 3`


    `Message sent: true`


    ## Understanding the Pitfalls of the Pattern


    The only pitfall when implementing the pattern is leaking details about the objects
    in the chain, either to the calling component or from one link in the chain to
    another. This pattern works by containing knowledge about the way that the chain
    has been created to a single method or class, and allowing the implementation
    detail to leak creates dependencies on a specific chain configuration that makes
    it difficult to change the chain later. Ensure that you present the calling components
    with a base class or protocol, and use the same base class or protocol when setting
    the `nextLink` properties of links in the chain.


    If you are implementing the variation that returns a result to the calling component,
    then you must ensure that you do not inadvertently leak knowledge of the chain
    in the result. The chain of responsibility pattern works best with simple result
    types (like the `Bool` I used in the example), but if you use more complex types,
    then you must not include a reference to the link in the chain that has accepted
    responsibility for the request.


    ## Examples of the Pattern in Cocoa


    Cocoa relies on the chain of responsibility to handle user interface events. All
    UI components are derived from the `UIResponder` class (or the equivalent `NSResponder`
    for OS X apps). The links in the chain are individual UI components, arranged
    to reflect the hierarchy of interface components with the top-level view as the
    last link in the chain.


    When the user interacts with a component—by clicking the mouse, for example—Cocoa
    sends the interaction event to the link in the chain that represents the component
    that has been clicked. The component is provided with the opportunity to take
    responsibility for handling the event, and the event moves along the chain until
    a component is found that will handle the event or the end of the chain is reached
    (which indicates that the application does not want or need to handle the event
    and it can be ignored).


    ## Applying the Pattern to the SportsStore Application


    To demonstrate the use of the chain of responsibility pattern, I will define a
    set of classes that format the background color of the table cells that display
    products in the SportsStore application.


    ### Preparing the Example Application


    I pick up the SportsStore project as I left it in [Chapter 18](#A978-1-4842-0394-1_18_Chapter.html),
    and no preparation for this chapter is required.'
  trans: "\n### 通知链中的所有节点\n\n在责任链模式的标准实现中，链中的节点只有在其中一个节点承担请求责任时才会被查询。承担责任节点之后的链中节点并不知晓该请求。\n\
    \n标准实现的一种变体是，通知链中所有节点某个请求的相关信息，即使这些节点位于接受该请求的节点之后。这是一种我很少使用但很有用的变体，当链中的节点需要知道自己是否被抢占时尤为实用。代码清单\
    \ 19-13 展示了我对 `Transmitter` 及其子类所做修改的实现方式。\n\n**代码清单 19-13.** 在 `Transmitters.swift`\
    \ 文件中通知链中所有节点\n\n```\nclass Transmitter {\n    var nextLink:Transmitter?;\n  \
    \  required init() {}\n    func sendMessage(message:Message, handled: Bool = false)\
    \ -> Bool {\n        if (nextLink != nil) {\n            return nextLink!.sendMessage(message,\
    \ handled: handled);\n        } else if (!handled) {\n            println(\"End\
    \ of chain reached. Message not sent\");\n        }\n        return handled;\n\
    \    }\n    // ...为简洁起见省略方法...\n}\n\nclass LocalTransmitter : Transmitter {\n\
    \    override func sendMessage(message: Message, var handled:Bool) -> Bool {\n\
    \        if (!handled && Transmitter.matchEmailSuffix(message)) {\n          \
    \  println(\"Message to \\(message.to) sent locally\");\n            handled =\
    \ true;\n        }\n        return super.sendMessage(message, handled: handled);\n\
    \    }\n}\n\nclass RemoteTransmitter : Transmitter {\n    override func sendMessage(message:\
    \ Message, var handled: Bool) -> Bool {\n        if (!handled && !Transmitter.matchEmailSuffix(message))\
    \ {\n            println(\"Message to \\(message.to) sent remotely\");\n     \
    \       handled = true;\n        }\n        return super.sendMessage(message,\
    \ handled: handled);\n    }\n}\n\nclass PriorityTransmitter : Transmitter {\n\
    \    var totalMessages = 0;\n    var handledMessages = 0;\n    override func sendMessage(message:\
    \ Message, var handled:Bool) -> Bool {\n        totalMessages++;\n        if (!handled\
    \ && message.subject.hasPrefix(\"Priority\")) {\n            handledMessages++;\n\
    \            println(\"Message to \\(message.to) sent as priority\");\n      \
    \      println(\"Stats: Handled \\(handledMessages) of \\(totalMessages)\");\n\
    \            handled = true;\n        }\n        return super.sendMessage(message,\
    \ handled: handled);\n    }\n}\n```\n\n我修改了 `sendMessage` 方法的签名，定义了一个 `handled`\
    \ 参数，用于指示链中某个节点是被要求承担请求责任，还是因其他节点已承担该请求责任而被通知。我还修改了 `PriorityTransmitter` 类，使其能跟踪自己处理的请求数量以及处理的总请求数。运行应用程序会产生以下输出：\n\
    \n```\nMessage to joe@example.com sent locally\nMessage sent: true\nEnd of chain\
    \ reached. Message not sent\nMessage sent: false\nMessage to all@example.com sent\
    \ as priority\nStats: Handled 1 of 3\nMessage sent: true\n```\n\n### 理解该模式的潜在缺陷\n\
    \n实现该模式时唯一的缺陷是，将链中对象的详细信息泄露给调用组件或链中其他节点。该模式通过将链的创建方式封装在单个方法或类中来工作，而泄露实现细节会导致对特定链配置产生依赖，从而使后续修改链变得困难。请确保向调用组件提供基类或协议，并在设置链中节点的\
    \ `nextLink` 属性时使用相同的基类或协议。\n\n如果你实现了向调用组件返回结果的变体，则必须确保不会无意中在结果中泄露链的相关信息。责任链模式最适合使用简单的结果类型（例如我示例中使用的\
    \ `Bool`），但如果你使用更复杂的类型，则一定不要包含对已承担请求责任的链中节点的引用。\n\n### Cocoa 中的模式示例\n\nCocoa 依靠责任链模式来处理用户界面事件。所有\
    \ UI 组件都派生自 `UIResponder` 类（对于 OS X 应用则对应 `NSResponder` 类）。链中的节点是独立的 UI 组件，其排列方式反映了界面组件的层级结构，顶层视图作为链中的最后一个节点。\n\
    \n当用户与某个组件交互时（例如点击鼠标），Cocoa 会将交互事件发送到代表被点击组件的链中节点。该组件有机会承担处理事件的责任，事件会沿着链传递，直到找到能够处理该事件的组件，或到达链末尾（这意味着应用程序不希望或不需要处理该事件，因此可以忽略）。\n\
    \n### 将模式应用于 SportsStore 应用程序\n\n为了演示责任链模式的使用，我将定义一组类，用于格式化 SportsStore 应用中显示产品的表格单元格的背景颜色。\n\
    \n#### 准备示例应用\n\n我接续第 18 章中 SportsStore 项目的进度，本章无需其他准备。\n"
- fmt: "### Defining the Chain and its Links\n\nMy chain is going to consist of a\
    \ set of objects that will accept responsibility for formatting a table cell based\
    \ on the category of the product that it displays. Listing 19-14 shows the contents\
    \ of the `FormatterChain.swift` file that I added to the SportsStore project and\
    \ used to implement the pattern.\n\n**Listing 19-14.** The Contents of the `FormatterChain.swift`\
    \ File\n\n```\nimport UIKit;\n\nclass CellFormatter {\n    var nextLink:CellFormatter?;\n\
    \n    func formatCell(cell: ProductTableCell) {\n        nextLink?.formatCell(cell);\n\
    \    }\n\n    class func createChain() -> CellFormatter {\n        let formatter\
    \ = ChessFormatter();\n        formatter.nextLink = WatersportsFormatter();\n\
    \        formatter.nextLink?.nextLink = DefaultFormatter();\n        return formatter;\n\
    \    }\n}\n\nclass ChessFormatter : CellFormatter {\n    override func formatCell(cell:\
    \ ProductTableCell) {\n        if (cell.product?.category == \"Chess\") {\n  \
    \          cell.backgroundColor = UIColor.lightGrayColor();\n        } else {\n\
    \            super.formatCell(cell);\n        }\n    }\n}\n\nclass WatersportsFormatter\
    \ : CellFormatter {\n    override func formatCell(cell: ProductTableCell) {\n\
    \        if (cell.product?.category == \"Watersports\") {\n            cell.backgroundColor\
    \ = UIColor.greenColor();\n        } else {\n            super.formatCell(cell);\n\
    \        }\n    }\n}\n\nclass DefaultFormatter : CellFormatter {\n    override\
    \ func formatCell(cell: ProductTableCell) {\n        cell.backgroundColor = UIColor.yellowColor();\n\
    \    }\n}\n```\n\nAll implementations of this pattern look alike, and the listing\
    \ shows the common foundation that is shared with the earlier example. I have\
    \ defined a base class (`CellFormatter`) that provides a class method for creating\
    \ the chain and that provides the default behavior for navigating through the\
    \ chain. The links in the chain are derived from the `CellFormatter` class, and\
    \ they accept responsibility based on the product category. The formatting they\
    \ perform is to change the background color of the cell. The `DefaultFormatter`\
    \ class always sets the cell background to yellow and must be used to create the\
    \ last link in the chain. Listing 19-15 shows how I use the chain of responsibility\
    \ in the `ViewController` class.\n\n**Listing 19-15.** Using the Chain of Responsibility\
    \ in the `ViewController.swift` File\n\n```\n...\nfunc tableView(tableView: UITableView,\n\
    \    cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell {\n    let\
    \ product = productStore.products[indexPath.row];\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    ProductCell\")\n        as ProductTableCell;\n    cell.product = productStore.products[indexPath.row];\n\
    \    cell.nameLabel.text = product.name;\n    cell.descriptionLabel.text = product.productDescription;\n\
    \    cell.stockStepper.value = Double(product.stockLevel);\n    cell.stockField.text\
    \ = String(product.stockLevel);\n    CellFormatter.createChain().formatCell(cell);\n\
    \    return cell;\n}\n...\n```\n\nYou can see the effect of applying the formatting\
    \ chain by running the application. The effect is garish but clearly indicates\
    \ which link in the chain has accepted responsibility for each table cell, as\
    \ shown in Figure [19-2](#A978-1-4842-0394-1_19_Chapter.html#Fig2).\n\n![A978-1-4842-0394-1_19_Fig2_HTML.jpg](A978-1-4842-0394-1_19_Fig2_HTML.jpg)\n\
    \n**Figure 19-2.** Formatting table cells\n\n## Summary\n\nI described the chain\
    \ of responsibility pattern in this chapter and explained how it can be used to\
    \ find an object that will take responsibility for a request, while hiding details\
    \ of which object is selected and the means by which the selection happens. In\
    \ the next chapter, I describe the command pattern, which is used to encapsulate\
    \ the details required to execute a method.\n\n# 20. The Command Pattern\n\nThe\
    \ command pattern provides a mechanism by which details of how to invoke a method\
    \ can be encapsulated so that the method can be invoked later or by a different\
    \ component. Table [20-1](#A978-1-4842-0394-1_20_Chapter.html#Tab1) puts the command\
    \ pattern into context.\n\n**Table 20-1.** Putting the Command Pattern into Context\n\
    \n| Question | Answer |\n| --- | --- |\n| What is it? | The command pattern is\
    \ used to encapsulate details of how to invoke a method on an object in a way\
    \ that allows the method to be invoked at a different time or by a different component.\
    \ |\n| What are the benefits? | There are lots of situations in which using a\
    \ command is useful, but the most common ones are supporting undo operations and\
    \ creating macros. |\n| When should you use this pattern? | Use this pattern when\
    \ you want to allow methods to be invoked by components that otherwise have no\
    \ information about the object that will be used, the method that will be invoked,\
    \ or the arguments that will be provided. |\n| When should you avoid this pattern?\
    \ | Do not use this pattern for regular method invocation. |\n| How do you know\
    \ when you have implemented the pattern correctly? | The pattern is implemented\
    \ correctly when a component can use a command to invoke a method on an object\
    \ without needing details of that object or the method itself. |\n| Are there\
    \ any common pitfalls? | The main pitfall is to require the component that executes\
    \ the command to have knowledge of the method or object that will be used. |\n\
    | Are there any related patterns? | The memento pattern provides a model by which\
    \ snapshots of an object’s entire state can be used instead of individual operations.\
    \ |\n\n## Preparing the Example Project\n\nTo demonstrate the command pattern,\
    \ I created an Xcode OS X Command Line Tool project called Command. I added a\
