    `fatalError("Not implemented");`


    `}`


    `final class func getFactory(car:Cars) -> CarFactory? {`


    `var factory:CarFactory?`


    `switch (car) {`


    `case .COMPACT:`


    `factory = CompactCarFactory();`


    `case .SPORTS:`


    `factory = SportsCarFactory();`


    `case .SUV:`


    `factory = SUVCarFactory();`


    `}`


    `return factory;`


    `}`


    `}`


    I have added a type method called `getFactory` that accepts a value from the `Cars`
    enumeration and that selects a concrete factory and returns an instance of it
    to the calling component. The selected factory is presented to the calling component
    as a `CarFactory` object, and details of which concrete factory has been selected—and
    why—remain private.


    ### Consuming the Abstract Factory Pattern


    The last step is to update the code that creates the `Car` object so that it obtains
    its products through the abstract factory. Listing 10-9 shows the changes I made
    to the `main.swift` file.


    Listing 10-9. Consuming the Abstract Factory Pattern in the main.swift File


    `let factory = CarFactory.getFactory(Cars.SPORTS);`


    `if (factory != nil) {`


    `let car = Car(carType: Cars.SPORTS,`


    `floor: factory!.createFloorplan(),`


    `suspension: factory!.createSuspension(),`


    `drive: factory!.createDrivetrain());`


    `car.printDetails();`


    `}`


    Rather than instantiate the implementation objects directly, I use the abstract
    factory class to obtain a concrete factory for the type of car I require and then
    call the `create` methods to obtain the implementation objects. If you run the
    application, you will see the following output:


    `Car type: Porsche Boxter`


    `Seats: 2`


    `Engine: Mid`


    `Suspension: Firm`


    `Drive: Rear`


    As the Listing 10-9 shows, there are no dependencies between the code in the `main.swift`
    file and the individual product classes. This means that if the matrix shown in
    Table [10-2](#A978-1-4842-0394-1_10_Chapter.html#Tab2) changes, I can update the
    corresponding concrete factory classes without having to make corresponding changes
    in the components that consume them. In Listing 10-10, you can see how I changed
    the drive train option for the sports car.


    Listing 10-10. Changing an Implementation Class in the Concrete.swift File


    `...`


    `class SportsCarFactory : CarFactory {`


    `override func createFloorplan() -> Floorplan {`


    `return ShortFloorplan();`


    `}`


    `override func createSuspension() -> Suspension {`


    `return RaceSuspension();`


    `}`


    `override func createDrivetrain() -> Drivetrain {`


    `return AllWheelDrive();`


    `}`


    `}`


    `...`


    The output produced by running the application shows the effect of the change.


    `Car type: Porsche Boxter`


    `Seats: 2`


    `Engine: Mid`


    `Suspension: Firm`


    `Drive: 4WD`


    By consolidating the decisions about which group of products belong together,
    the concrete factories reduce the impact of change in the application, which makes
    the decision logic easier to test and maintain. The abstract factory consolidates
    the decision logic for selecting the concrete factory, further isolating calling
    components from the details of how groups of implementation classes are associated
    with one another.


    ## Variations on the Abstract Factory Pattern


    There are common variations that you can use to adapt the way that the abstract
    factory is implemented. As I explain in the following sections, the basic mechanism
    remains the same, but the implementation is altered to control how objects are
    created.'
