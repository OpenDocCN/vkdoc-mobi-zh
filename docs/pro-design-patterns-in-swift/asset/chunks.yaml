  raw: '## Understanding the Pitfalls of the Proxy Pattern


    The pitfalls associated with the proxy pattern depend on how it is being implemented,
    but the common theme is not to allow details of the implementation to leak out
    of the proxy class into the calling component. For remote object proxies, this
    means ensuring that no unnecessary details of the mechanism used to access the
    remote object are revealed. For proxies used to manage expensive operations, you
    should avoid exposing details of how the cost of the operation is being mitigated
    as far as it possible. For access restriction proxies, you should take care not
    to allow calling components to bypass the proxy and access the underlying object
    directly.


    There are two specific pitfalls if you use the proxy pattern to implement the
    reference counting variation. First, do not use proxies to manage the life cycle
    of objects. Leave this to the built-in Swift support for automatic reference counting
    (ARC), which ensures that objects are destroyed when they are no longer required.


    Second, do not use proxies to implement concurrency protections such as locks
    and semaphores. This is a reasonable thing to do if you are working with a language
    that doesn’t have concurrency features, but Swift provides access to Grand Central
    Dispatch for high-level concurrency control, and if you don’t like GCD, you can
    access a range of lower-level concurrency mechanisms. Writing your own concurrency
    code is stupid, dangerous, and almost impossible to get right. If you think you
    need to create your own concurrency protections, then you have either misunderstood
    the built-in features or misunderstood the problem you face in your project.


    ## Examples of the Proxy Pattern in Cocoa


    The framework provides excellent support for the proxy pattern through the `NSProxy`
    class, but it is available only to Objective-C programmers and cannot be used
    in Swift.


    You don’t call methods in Objective-C code. Instead, you send messages to objects.
    In most situations, this distinction doesn’t have any real significance, and many
    Objective-C programmers are unaware of the difference. The `NSProxy`class is used
    to create classes that receive messages and forward them on to the resources or
    object for which they are proxies, which provides a nice mechanism by which messages
    can be changed or redirected on the fly.


    None of this is available to Swift programmers, sadly, and attempting to derive
    a Swift class from `NSProxy` will generate a compiler error because it is impossible
    to call `super.init` from the derived class (because `NSProxy` doesn’t define
    an initializer).


    ## Applying the Pattern to the SportsStore Application


    To demonstrate the use of the proxy pattern in the SportsStore application, I
    am going to create a proxy object that represents the product data on a remote
    server and then use the proxy to send stock level updates and to consolidate the
    code that gets the initial stock data when the application starts.


    ### Preparing the Example Application


    No preparation is required for this chapter, and I pick up the SportsStore application
    just as I left it in [Chapter 17](#A978-1-4842-0394-1_17_Chapter.html). Don’t
    forget that you can download all of the code examples for this book, including
    projects for each chapter’s version of the SportsStore application, from [`Apress.com`](https://Apress.com)
    .


    ### Defining the Protocol, Factory Method, and Proxy Class


    As I explained earlier, you don’t need to define a protocol when creating a proxy,
    but I usually do. This is partly habit but mainly because it allows me to draw
    a clean line separating the functionality exposed to calling components from the
    implementation of the proxy class. Listing 18-14 shows the contents of the `Proxy.swift`
    file, which I added to the SportsStore project.


    Listing 18-14. The Contents of the Proxy.swift File


    `protocol StockServer {`


    `func getStockLevel(product:String, callback: (String, Int) -> Void);`


    `func setStockLevel(product:String, stockLevel:Int);`


