    \n**图 3-16.** 测试 SportsStore 应用\n\n## 处理编辑操作\n\n在本节中，我将通过连接`Stepper`和`Text Field`组件来完善\
    \ SportsStore 应用，以便用户能够更改产品的库存量。为了直观地确认更改，我将更新屏幕底部`Label`组件显示的文本。\n\n切换到连接检查器，然后点击组件层级中的`Text\
    \ Field`元素。检查器会显示支持的事件列表。从`Editing Changed`事件右侧的圆形（即连接井）拖动到助理编辑器中的`ViewController`类，并将线条定位在`displayStockTotal`方法定义的上方。松开鼠标，会出现一个弹出菜单，如图\
    \ 3-17 所示。\n\n![A978-1-4842-0394-1_3_Fig17_HTML.jpg](img/A978-1-4842-0394-1_3_Fig17_HTML.jpg)\n\
    \n**图 3-17.** 创建操作方法\n\n将`Name`设置为`stockLevelDidChange`，然后点击 Connect 按钮。Xcode\
    \ 会将清单 3-8 所示的方法添加到`ViewController`类中。\n\n**清单 3-8.** 在 ViewController.swift 文件中添加操作方法\n\
    \n```\n...\n@IBAction func stockLevelDidChange(sender: AnyObject) {\n}\n...\n\
    ```\n\n`IBAction`属性表明这是一个将在布局组件发生更改时被调用的方法——本例中，是在文本字段被编辑时触发。\n\n我希望当步进器的值发生变化时也能调用相同的方法，因此点击组件层级中的`Stepper`元素，转到连接检查器，然后从`Value\
    \ Changed`连接井处拖动。\n\n将指针定位到`stockLevelDidChange`方法上，直到该方法高亮显示，并且文本气泡从`Insert Action`变为`Connection\
    \ Action`，然后松开鼠标按钮。\n\n**提示：** Xcode 在连接到现有事件时可能不可靠。如果你没有看到方法高亮显示，那么只需创建一个新的操作方法，并将其名称设置为`stockLevelDidChange`，就像对文本字段所做的那样。这会在代码文件中创建两个同名的方法。删除其中一个方法——删除哪个都无所谓。组件和方法之间的关系是通过方法名来处理的，因此这种替代方法可以用来绕开\
    \ Xcode 的一个限制。\n"
- fmt: '### Handling the Events


    The `stockLevelDidChange` method will be invoked when the user interacts with
    the `Stepper` or `Text Field` components and that allows me to update the stock
    levels accordingly. Listing 3-9 shows the changes I made to the `ViewController`
    class to handle the events.


    **Listing 3-9. Handling Events in the ViewController.swift File**


    ```swift

    import UIKit


    class ProductTableCell : UITableViewCell {


    @IBOutlet weak var nameLabel: UILabel!

    @IBOutlet weak var descriptionLabel: UILabel!

    @IBOutlet weak var stockStepper: UIStepper!

    @IBOutlet weak var stockField: UITextField!


    var productId:Int?;


    }


    class ViewController: UIViewController, UITableViewDataSource {


    @IBOutlet weak var totalStockLabel: UILabel!

    @IBOutlet weak var tableView: UITableView!


    var products = [

    ("Kayak", "A boat for one person", "Watersports", 275.0, 10),

    ("Lifejacket", "Protective and fashionable", "Watersports", 48.95, 14),

    ("Soccer Ball", "FIFA-approved size and weight", "Soccer", 19.5, 32),

    ("Corner Flags", "Give your playing field a professional touch",

    "Soccer", 34.95, 1),

    ("Stadium", "Flat-packed 35,000-seat stadium", "Soccer", 79500.0, 4),

    ("Thinking Cap", "Improve your brain efficiency by 75%", "Chess", 16.0, 8),

    ("Unsteady Chair", "Secretly give your opponent a disadvantage",

    "Chess", 29.95, 3),

    ("Human Chess Board", "A fun game for the family", "Chess", 75.0, 2),

    ("Bling-Bling King", "Gold-plated, diamond-studded King",

    "Chess", 1200.0, 4)];


    override func viewDidLoad() {

    super.viewDidLoad()

    displayStockTotal();

    }


    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    }


    func tableView(tableView: UITableView,

    numberOfRowsInSection section: Int) -> Int {

    return products.count;

    }


    func tableView(tableView: UITableView,

    cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell {

    let product = products[indexPath.row];

    let cell = tableView.dequeueReusableCellWithIdentifier("ProductCell")

    as ProductTableCell;

    cell.productId = indexPath.row;

    cell.nameLabel.text = product.0;

    cell.descriptionLabel.text = product.1;

    cell.stockStepper.value = Double(product.4);

    cell.stockField.text = String(product.4);

    return cell;

    }


    @IBAction func stockLevelDidChange(sender: AnyObject) {

    if var currentCell = sender as? UIView {

    while (true) {

    currentCell = currentCell.superview!;

    if let cell = currentCell as? ProductTableCell {

    if let id = cell.productId? {

    var newStockLevel:Int?;

    if let stepper = sender as? UIStepper {

    newStockLevel = Int(stepper.value);

    } else if let textfield = sender as? UITextField {

    if let newValue = textfield.text.toInt()? {

    newStockLevel = newValue;

    }

    }

    if let level = newStockLevel {

    products[id].4 = level;

    cell.stockStepper.value = Double(level);

    cell.stockField.text = String(level);

    }

    }

    break;

    }

    }

    displayStockTotal();

    }

    }


    func displayStockTotal() {

    let stockTotal = products.reduce(0,

    {(total, product) -> Int in return total + product.4});

    totalStockLabel.text = "\(stockTotal) Products in Stock";

    }

    }

    ```


    The first change I made was to add a `productId` property to the `ProductTableCell`
    class, which I set in the `tableView` method that creates the table cells. I use
    this property in the `stockLevelDidChange` to map between the component that has
    invoked the method and the product whose stock level has to be changed. The argument
    to the `setLevelDidChange` method is the component that triggered the event, which
    I use to figure out how to get the new stock level and update the display to the
    user. At the end of the `stockLevelDidChange` method, I call `displayStockTotal`
    to provide visual reinforcement of the change to the user.


