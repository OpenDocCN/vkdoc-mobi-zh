    \ `processPoolItems` 方法，该方法接收一个回调闭包，并在同步 GCD 屏障代码块中将 `data` 数组传递给它。\n\n> **提示**\
    \  \n> 你可以在代码清单 8-3 中看到我是如何实现 `Book` 工厂闭包的。我本可以在对象创建时保留对它们的引用，但 Swift 处理初始化器中定义的闭包的方式使得这一过程较为困难。因此，我让\
    \ `Pool` 类成为示例应用中 `Book` 对象详细信息的权威来源。\n\n代码清单 8-3 展示了 `Library` 类相应的改动，以完成懒加载创建策略的实现。\n\
    \n**代码清单 8-3. 在 Library.swift 文件中实现懒加载对象创建**\n\n```\nimport Foundation\n\nfinal\
    \ class Library {\n    private let pool:Pool<Book>;\n    private init(stockLevel:Int)\
    \ {\n        var stockId = 1;\n        pool = Pool<Book>(maxItemCount: stockLevel,\
    \ factory: {() in\n            return BookSeller.buyBook(\"Dickens, Charles\"\
    ,\n                title: \"Hard Times\", stockNumber: stockId++)\n        });\n\
    \    }\n\n    private class var singleton:Library {\n        struct SingletonWrapper\
    \ {\n            static let singleton = Library(stockLevel:200);\n        }\n\
    \        return SingletonWrapper.singleton;\n    }\n\n    class func checkoutBook(reader:String)\
    \ -> Book? {\n        var book = singleton.pool.getFromPool();\n        book?.reader\
    \ = reader;\n        book?.checkoutCount++;\n        return book;\n    }\n\n \
    \   class func returnBook(book:Book) {\n        book.reader = nil;\n        singleton.pool.returnToPool(book);\n\
    \    }\n\n    class func printReport() {\n        singleton.pool.processPoolItems({(books)\
    \ in\n            for book in books {\n                println(\"...Book#\\(book.stockNumber)...\"\
    );\n                println(\"Checked out \\(book.checkoutCount) times\");\n \
    \               if (book.reader != nil) {\n                    println(\"Checked\
    \ out to \\(book.reader!)\");\n                } else {\n                    println(\"\
    In stock\");\n                }\n            }\n            println(\"There are\
    \ \\(books.count) books in the pool\");\n        });\n    }\n}\n```\n\n改动幅度较小。我定义了将通过\
    \ `BookSeller` 类用于创建 `Book` 对象的闭包，并更新了 `printReport` 方法，使其从对象池中获取数据项。此外，我将对象池中书籍的最大数量增加到了\
    \ 200 本，这远高于 `main.swift` 文件中的代码所产生的需求。\n\n> **注意**  \n> 这模拟了现实世界中图书馆与书商约定信用额度，并按需调用的场景。图书馆最初没有任何库存，但每当有借书请求且库存中没有书籍时，书商就会应要求送来一本，直到达到预设上限——在本例中是\
    \ 200 本。然而，只有在库存中没有书时才会要求送来新书——如果已有副本可用，图书馆会重新借出现有副本。\n\n通过运行应用程序，你可以看到懒加载策略的效果。在所有请求处理完毕后（可能需要\
    \ 15 到 20 秒），生成的报告结尾会声明对象池中有多少 `Book` 对象。\n\n```\n...\nThere are 14 books in the\
    \ pool\n```\n\n每次运行应用程序时，具体的书籍数量都会有所不同，因为我会随机给部分请求添加延迟，这会影响对象池对 `Book` 对象的复用频率。\n\
    \n最坏情况下会创建 20 本书，这意味着图书馆愿意购买的 200 本书是一个严重的高估。如果采用积极策略，全部 200 本副本都会被购买；而采用懒加载策略，我能够更贴近实际需求。"
- fmt: "### Understanding the Object Reuse Strategy\n\nThe nature of the object pool\
    \ pattern means that the objects managed by a pool will be allocated to consumers\
    \ repeatedly, and this presents the risk that an object is returned in a poor\
    \ state. In terms of a real-world library, this could mean torn or missing book\
    \ pages. In software, it means an object that has inconsistent state or that has\
    \ encountered an unrecoverable error.\n\nThe simplest approach is the trusting\
    \ strategy, which is where you trust that objects will be returned to the pool\
    \ in a reusable state. This isn’t always a bad idea because not all objects have\
    \ to deal with this kind of problem. The `Book` objects that the pool has managed\
    \ so far are good examples because they present little mutable public state.\n\
    \nThe alternative is an untrusting strategy, in which objects are inspected before\
    \ they are returned to the pool to make sure they can be used again. Objects that\
    \ cannot be reused are ejected from the pool.\n\n**Caution**\n\nAn untrusting\
    \ strategy should be used only on pools that have the ability to replace ejected\
    \ objects. Without the ability to replace the objects, the pool may run out of\
    \ items, and the application can grind to a halt. See the “Understanding the Empty\
    \ Pool Strategy” section for details.\n\nI am going to change the way that my\
    \ `Book` objects are used so that they can be checked out of the pool only a certain\
    \ number of times, reflecting that fact that books sustain wear and tear and eventually\
    \ reach the point of being unreadable. I don’t want to build any knowledge of\
    \ the `Book` class into my generic `Pool` class, so I have defined a protocol\
    \ called `PoolItem` in a new file called `PoolItem.swift`, the contents of which\
    \ are shown in Listing 8-4.\n\n**Listing 8-4. The Contents of the `PoolItem.swift`\
    \ File**\n\n```\n@objc protocol PoolItem {\n    var canReuse:Bool {get}\n}\n```\n\
    \nThis `PoolItem` protocol defines a get-only property called `canReuse`. I will\
    \ read this property when items are returned to the pool and discard any objects\
    \ that return `false`. Listing 8-5 shows the corresponding changes in the `Pool`\
    \ class.\n\n**Tip**\n\nNotice that I have applied the `@objc` attribute to the\
    \ protocol. This will allow me to downcast objects to the protocol so I can read\
    \ the `canReuse` property in the pool class.\n\n**Listing 8-5. Adding Support\
    \ for the `PoolItem` Protocol in the `Pool.swift` File**\n\n```\nimport Foundation\n\
    \nclass Pool<T:AnyObject> {\n    private var data = [T]();\n    private let arrayQ\
    \ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n    private let\
    \ semaphore:dispatch_semaphore_t;\n    private var itemCount = 0;\n    private\
    \ let maxItemCount:Int;\n    private let itemFactory: () -> T;\n\n    init(maxItemCount:Int,\
    \ factory:() -> T) {\n        self.itemFactory = factory;\n        self.maxItemCount\
    \ = maxItemCount;\n        semaphore = dispatch_semaphore_create(maxItemCount);\n\
    \    }\n\n    func getFromPool() -> T? {\n        var result:T?;\n        if (dispatch_semaphore_wait(semaphore,\
    \ DISPATCH_TIME_FOREVER) == 0) {\n            dispatch_sync(arrayQ, {() in\n \
    \               if (self.data.count == 0 && self.itemCount < self.maxItemCount)\
    \ {\n                    result = self.itemFactory();\n                    self.itemCount++;\n\
    \                } else {\n                    result = self.data.removeAtIndex(0);\n\
    \                }\n            })\n        }\n        return result;\n    }\n\
    \n    func returnToPool(item:T) {\n        dispatch_async(arrayQ, {() in\n   \
    \         let pitem = item as AnyObject as? PoolItem;\n            if (pitem ==\
    \ nil || pitem!.canReuse) {\n                self.data.append(item);\n       \
    \         dispatch_semaphore_signal(self.semaphore);\n            }\n        });\n\
    \    }\n\n    func processPoolItems(callback:[T] -> Void) {\n        dispatch_barrier_sync(arrayQ,\
    \ {() in\n            callback(self.data);\n        });\n    }\n}\n```\n\nI don’t\
    \ want to limit the range of objects that the pool can work with, so I check for\
    \ reusability only if the `PoolItem` protocol is implemented. Checking protocol\
    \ conformance can be done only when the protocol is decorated with the `@objc`\
    \ attribute, and applying the attribute means that it can be implemented only\
    \ by classes and not structs. To give Swift the type information it needs to check\
    \ conformance, I have restricted the `Pool` generic type parameter.\n\n```\n...\n\
    class Pool<T:AnyObject> {\n...\n```\n\nThe `AnyObject` protocol means that the\
    \ `Pool` can work only with class-based objects, which is not a significant limitation\
    \ because pooling value types doesn’t make any sense given that they are copied\
    \ when assigned to a variable. To check for conformance to the `PoolItem` protocol,\
    \ I have to give Swift a helping hand.\n\n```\n...\nlet pitem = item as AnyObject\
    \ as? PoolItem;\nif (pitem == nil || pitem!.canReuse) {\n    self.data.append(item);\n\
    \    dispatch_semaphore_signal(self.semaphore);\n}\n...\n```\n\nIf I used the\
    \ `as?` operator directly on the item object (which is of type `T`—the generic\
    \ type in the `Pool` class), then the compiler generates an error. I need to first\
    \ cast to `AnyObject` (which is guaranteed to work because the type `T` is restricted\
    \ to classes that implement the `AnyObject` protocol) and then use the `as?` operator\
    \ to see whether the `PoolItem` protocol has been implemented.\n\nThe effect is\
    \ that an item is returned to the pool if the `PoolItem` protocol isn’t implemented\
    \ or—if it is—the value of the `canReuse` property is `true`.\n\n#### Applying\
    \ the Protocol\n\nThe next step is to apply the `PoolItem` protocol so that `Book`\
    \ objects can be loaned out a fixed number of times before they are ejected from\
    \ the pool. Listing 8-6 shows how I have modified the `Book` class to implement\
    \ the protocol.\n\n**Tip**\n\nNotice that I have added the `@objc` attribute to\
    \ the `Book` class. This is required to support conformance to the `PoolItem`\
    \ protocol in the `Pool` class.\n\n**Listing 8-6. Implementing the Protocol in\
    \ the `Book.swift` File**\n\n```\nimport Foundation;\n\n@objc class Book : PoolItem\
    \ {\n    let author:String;\n    let title:String;\n    let stockNumber:Int;\n\
    \    var reader:String?\n    var checkoutCount = 0;\n\n    init(author:String,\
    \ title:String, stock:Int) {\n        self.author = author;\n        self.title\
    \ = title;\n        self.stockNumber = stock;\n    }\n\n    var canReuse:Bool\
    \ {\n        get {\n            let reusable = checkoutCount < 5\n           \
    \ if (!reusable) {\n                println(\"Eject: Book#\\(self.stockNumber)\"\
    );\n            }\n            return reusable;\n        }\n    }\n}\n```\n\n\
    I return `false` from the `canReuse` property if a `Book` object has been checked\
    \ out of the pool more than five times, and, so that I can see when items are\
    \ being ejected, I write a message to the console.\n\n#### Testing the Strategy\n\
    \nTo test the strategy of ejecting items from the pool, I need to balance the\
    \ maximum number of items that the pool will contain against the number of requests\
    \ that will be made by the code in the `main.swift` file. I need to have enough\
    \ books to allow some of them to be ejected while leaving enough slack in the\
    \ system to service all of the requests. In the “Understanding the Empty Pool\
    \ Strategy” section, I’ll show you how to approach this properly by formalizing\
    \ a strategy, but for the moment I will set the maximum number of items in the\
    \ pool to `5` (which I settled on through trial and error). Listing 8-7 shows\
    \ how I changed the limit in the `Library` class.\n\n**Listing 8-7. Changing the\
    \ Maximum Number of Items in the Pool in the `Library.swift` File**\n\n```\n...\n\
    private class var singleton:Library {\n    struct SingletonWrapper {\n       \
    \ static let singleton = Library(stockLevel:5);\n    }\n    return SingletonWrapper.singleton;\n\
    }\n...\n```\n\nRunning the application will produce output similar to the following:\n\
    \n```\nStarting...\nEject: Book#1\nEject: Book#2\nAll blocks complete\n...Book#3...\n\
    Checked out 3 times\nIn stock\n...Book#4...\nChecked out 4 times\nIn stock\n...Book#5...\n\
    Checked out 3 times\nIn stock\nThere are 3 books in the pool\nProgram ended with\
    \ exit code: 0\n```\n\nYou may get different results because of the random delays\
    \ before items are returned to the pool, but the basic outcome should be the same:\
    \ some of the `Book` objects are checked out more than others, and they are ejected\
    \ from the pool when they have been checked out five times and replaced with new\
    \ objects created by the pool."
  raw: '### Understanding the Object Reuse Strategy


    The nature of the object pool pattern means that the objects managed by a pool
    will be allocated to consumers repeatedly, and this presents the risk that an
    object is returned in a poor state. In terms of a real-world library, this could
    mean torn or missing book pages. In software, it means an object that has inconsistent
    state or that has encountered an unrecoverable error.


    The simplest approach is the trusting strategy, which is where you trust that
    objects will be returned to the pool in a reusable state. This isn’t always a
    bad idea because not all objects have to deal with this kind of problem. The `Book`
    objects that the pool has managed so far are good examples because they present
    little mutable public state.


    The alternative is an untrusting strategy, in which objects are inspected before
    they are returned to the pool to make sure they can be used again. Objects that
    cannot be reused are ejected from the pool.


    Caution


    An untrusting strategy should be used only on pools that have the ability to replace
    ejected objects. Without the ability to replace the objects, the pool may run
    out of items, and the application can grind to a halt. See the “Understanding
    the Empty Pool Strategy” section for details.


    I am going to change the way that my `Book` objects are used so that they can
    be checked out of the pool only a certain number of times, reflecting that fact
    that books sustain wear and tear and eventually reach the point of being unreadable.
    I don’t want to build any knowledge of the `Book` class into my generic `Pool`
    class, so I have defined a protocol called `PoolItem` in a new file called `PoolItem.swift`,
    the contents of which are shown in Listing 8-4.


    Listing 8-4. The Contents of the PoolItem.swift File


    `@objc protocol PoolItem {`


    `var canReuse:Bool {get}`


    `}`


    This `PoolItem` protocol defines a get-only property called `canReuse`. I will
    read this property when items are returned to the pool and discard any objects
    that return `false`. Listing 8-5 shows the corresponding changes in the `Pool`
    class.


    Tip


    Notice that I have applied the `@` `objc`attribute to the protocol. This will
    allow me to downcast objects to the protocol so I can read the `canReuse` property
    in the pool class.


    Listing 8-5. Adding Support for the PoolItem Protocol in the Pool.swift File


    `import Foundation`


    `class Pool<T:AnyObject> {`


    `private var data = [T]();`


    `private let arrayQ = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_SERIAL);`


    `private let semaphore:dispatch_semaphore_t;`


    `private var itemCount = 0;`


    `private let maxItemCount:Int;`


    `private let itemFactory: () -> T;`


    `init(maxItemCount:Int, factory:() -> T) {`


    `self.itemFactory = factory;`


    `self.maxItemCount = maxItemCount;`


    `semaphore = dispatch_semaphore_create(maxItemCount);`


    `}`


    `func getFromPool() -> T? {`


    `var result:T?;`


    `if (dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER) == 0) {`


    `dispatch_sync(arrayQ, {() in`


    `if (self.data.count == 0 && self.itemCount < self.maxItemCount) {`


    `result = self.itemFactory();`


    `self.itemCount++;`


    `} else {`


    `result = self.data.removeAtIndex(0);`


    `}`


    `})`


    `}`


    `return result;`


    `}`


    `func returnToPool(item:T) {`


    `dispatch_async(arrayQ, {() in`


    `let pitem = item as AnyObject as? PoolItem;`


    `if (pitem == nil || pitem!.canReuse) {`


    `self.data.append(item);`


    `dispatch_semaphore_signal(self.semaphore);`


    `}`


    `});`


    `}`


    `func processPoolItems(callback:[T] -> Void) {`


    `dispatch_barrier_sync(arrayQ, {() in`


    `callback(self.data);`


    `});`


    `}`


    `}`


    I don’t want to limit the range of objects that the pool can work with, so I check
    for reusability only if the `PoolItem` protocol is implemented. Checking protocol
    conformance can be done only when the protocol is decorated with the `@objc` attribute,
    and applying the attribute means that it can be implemented only by classes and
    not structs. To give Swift the type information it needs to check conformance,
    I have restricted the `Pool` generic type parameter.


    `...`


    `class Pool<T` `:AnyObject` `> {`


    `...`


    The `AnyObject` protocol means that the `Pool` can work only with class-based
    objects, which is not a significant limitation because pooling value types doesn’t
    make any sense given that they are copied when assigned to a variable. To check
    for conformance to the `PoolItem` protocol, I have to give Swift a helping hand.


    `...`


    `let pitem = item as AnyObject as? PoolItem;`


    `if (pitem == nil || pitem!.canReuse) {`


    `self.data.append(item);`


    `dispatch_semaphore_signal(self.semaphore);`


    `}`


    `...`


    If I used the `as?` operator directly on the item object (which is of type `T`—the
    generic type in the `Pool` class), then the compiler generates an error. I need
    to first cast to `AnyObject` (which is guaranteed to work because the type `T`
    is restricted to classes that implement the `AnyObject` protocol) and then use
    the `as?` operator to see whether the `PoolItem` protocol has been implemented.


    The effect is that an item is returned to the pool if the `PoolItem` protocol
    isn’t implemented or—if it is—the value of the `canReuse` property is `true`.


    #### Applying the Protocol


    The next step is to apply the `PoolItem` protocol so that `Book` objects can be
    loaned out a fixed number of times before they are ejected from the pool. Listing
    8-6 shows how I have modified the `Book` class to implement the protocol.


    Tip


    Notice that I have added the `@` `objc`attribute to the `Book` class. This is
    required to support conformance to the `PoolItem` protocol in the `Pool` class.


    Listing 8-6. Implementing the Protocol in the Book.swift File


    `import Foundation;`


    `@objc class Book : PoolItem {`


    `let author:String;`


    `let title:String;`


    `let stockNumber:Int;`


    `var reader:String?`


    `var checkoutCount = 0;`


    `init(author:String, title:String, stock:Int) {`


    `self.author = author;`


    `self.title = title;`


    `self.stockNumber = stock;`


    `}`


    `var canReuse:Bool {`


    `get {`


    `let reusable = checkoutCount < 5`


    `if (!reusable) {`


    `println("Eject: Book#\(self.stockNumber)");`


    `}`


    `return reusable;`


    `}`


    `}`


    `}`


    I return `false` from the `canReuse` property if a `Book` object has been checked
    out of the pool more than five times, and, so that I can see when items are being
    ejected, I write a message to the console.


    #### Testing the Strategy


    To test the strategy of ejecting items from the pool, I need to balance the maximum
    number of items that the pool will contain against the number of requests that
    will be made by the code in the `main.swift` file. I need to have enough books
    to allow some of them to be ejected while leaving enough slack in the system to
    service all of the requests. In the “Understanding the Empty Pool Strategy” section,
    I’ll show you how to approach this properly by formalizing a strategy, but for
    the moment I will set the maximum number of items in the pool to `5` (which I
    settled on through trial and error). Listing 8-7 shows how I changed the limit
    in the `Library` class.


    Listing 8-7. Changing the Maximum Number of Items in the Pool in the Library.swift
    File


    `...`


    `private class var singleton:Library {`


    `struct SingletonWrapper {`


    `static let singleton = Library(stockLevel:5);`


    `}`


    `return SingletonWrapper.singleton;`


    `}`


    `...`


    Running the application will produce output similar to the following:


    `Starting...`


    `Eject: Book#1`


    `Eject: Book#2`


    `All blocks complete`


    `...Book#3...`


    `Checked out 3 times`


    `In stock`


    `...Book#4...`


    `Checked out 4 times`


    `In stock`


    `...Book#5...`


    `Checked out 3 times`


    `In stock`


    `There are 3 books in the pool`


    `Program ended with exit code: 0`


    You may get different results because of the random delays before items are returned
    to the pool, but the basic outcome should be the same: some of the `Book` objects
    are checked out more than others, and they are ejected from the pool when they
    have been checked out five times and replaced with new objects created by the
    pool.'
  trans: "\n### 理解对象复用策略\n\n对象池模式的本质意味着由池管理的对象会被重复分配给使用者，这带来了对象以不良状态返回的风险。以现实世界的图书馆为例，这可能意味着书页被撕毁或缺失。在软件中，这意味着对象的状态不一致，或遇到了无法恢复的错误。\n\
    \n最简单的方法是信任策略，即你信任对象会以可复用的状态返回池中。这并不总是一个坏主意，因为并非所有对象都需要处理这类问题。目前由池管理的 `Book` 对象就是很好的例子，因为它们几乎不暴露可变公共状态。\n\
    \n另一种方法是怀疑策略，即在对象返回池中之前对其进行检查，以确保它们能被再次使用。无法复用的对象将从池中被剔除。\n\n**注意**\n\n怀疑策略应仅用于有能力替换被剔除对象的池。如果没有替换对象的能力，池可能会耗尽条目，应用程序也可能陷入停滞。详情请参见“理解空池策略”一节。\n\
    \n我将改变 `Book` 对象的使用方式，使它们只能从池中被借出特定次数，这反映了书籍会磨损并最终达到无法阅读状态的事实。我不想在通用的 `Pool` 类中构建任何关于\
    \ `Book` 类的知识，因此在一个名为 `PoolItem.swift` 的新文件中定义了一个名为 `PoolItem` 的协议，其内容如代码清单 8-4\
    \ 所示。\n\n**代码清单 8-4. `PoolItem.swift` 文件的内容**\n\n```\n@objc protocol PoolItem\
    \ {\n    var canReuse:Bool {get}\n}\n```\n\n这个 `PoolItem` 协议定义了一个名为 `canReuse`\
    \ 的只读属性。当条目被返回到池中时，我将读取此属性，并丢弃任何返回 `false` 的对象。代码清单 8-5 展示了 `Pool` 类中的相应更改。\n\n\
    **提示**\n\n请注意，我已将 `@objc` 属性应用于此协议。这将允许我将对象向下转型为协议类型，以便在池类中读取 `canReuse` 属性。\n\
    \n**代码清单 8-5. 在 `Pool.swift` 文件中添加对 `PoolItem` 协议的支持**\n\n```\nimport Foundation\n\
    \nclass Pool<T:AnyObject> {\n    private var data = [T]();\n    private let arrayQ\
    \ = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n    private let\
    \ semaphore:dispatch_semaphore_t;\n    private var itemCount = 0;\n    private\
    \ let maxItemCount:Int;\n    private let itemFactory: () -> T;\n\n    init(maxItemCount:Int,\
    \ factory:() -> T) {\n        self.itemFactory = factory;\n        self.maxItemCount\
    \ = maxItemCount;\n        semaphore = dispatch_semaphore_create(maxItemCount);\n\
    \    }\n\n    func getFromPool() -> T? {\n        var result:T?;\n        if (dispatch_semaphore_wait(semaphore,\
    \ DISPATCH_TIME_FOREVER) == 0) {\n            dispatch_sync(arrayQ, {() in\n \
    \               if (self.data.count == 0 && self.itemCount < self.maxItemCount)\
    \ {\n                    result = self.itemFactory();\n                    self.itemCount++;\n\
    \                } else {\n                    result = self.data.removeAtIndex(0);\n\
    \                }\n            })\n        }\n        return result;\n    }\n\
    \n    func returnToPool(item:T) {\n        dispatch_async(arrayQ, {() in\n   \
    \         let pitem = item as AnyObject as? PoolItem;\n            if (pitem ==\
    \ nil || pitem!.canReuse) {\n                self.data.append(item);\n       \
    \         dispatch_semaphore_signal(self.semaphore);\n            }\n        });\n\
    \    }\n\n    func processPoolItems(callback:[T] -> Void) {\n        dispatch_barrier_sync(arrayQ,\
    \ {() in\n            callback(self.data);\n        });\n    }\n}\n```\n\n我不想限制池可以处理的对象范围，因此仅当实现了\
    \ `PoolItem` 协议时，我才会检查可复用性。检查协议一致性只能在对协议应用 `@objc` 属性时进行，而应用该属性意味着它只能由类而非结构体实现。为了给\
    \ Swift 提供检查一致性所需的类型信息，我限制了 `Pool` 的泛型参数。\n\n```\n...\nclass Pool<T:AnyObject>\
    \ {\n...\n```\n\n`AnyObject` 协议意味着 `Pool` 只能处理基于类的对象，这并非重大限制，因为对值类型进行池化毫无意义，毕竟在赋值给变量时它们会被复制。要检查对\
    \ `PoolItem` 协议的一致性，我需要给 Swift 一点帮助。\n\n```\n...\nlet pitem = item as AnyObject\
    \ as? PoolItem;\nif (pitem == nil || pitem!.canReuse) {\n    self.data.append(item);\n\
    \    dispatch_semaphore_signal(self.semaphore);\n}\n...\n```\n\n如果我将 `as?` 运算符直接用于\
    \ item 对象（其类型为 `T`——即 `Pool` 类中的泛型类型），则编译器会生成错误。我需要先将其转换为 `AnyObject`（这可以保证成功，因为类型\
    \ `T` 被限制为实现 `AnyObject` 协议的类），然后使用 `as?` 运算符来查看 `PoolItem` 协议是否已实现。\n\n其效果是，如果未实现\
    \ `PoolItem` 协议，或者实现了且 `canReuse` 属性的值为 `true`，则条目会返回池中。\n\n#### 应用协议\n\n下一步是应用\
    \ `PoolItem` 协议，以便 `Book` 对象在被从池中剔除之前可以被借出固定次数。代码清单 8-6 展示了我如何修改 `Book` 类以实现该协议。\n\
    \n**提示**\n\n请注意，我已将 `@objc` 属性添加到 `Book` 类。这是为了在 `Pool` 类中支持对 `PoolItem` 协议的一致性。\n\
    \n**代码清单 8-6. 在 `Book.swift` 文件中实现协议**\n\n```\nimport Foundation;\n\n@objc class\
    \ Book : PoolItem {\n    let author:String;\n    let title:String;\n    let stockNumber:Int;\n\
    \    var reader:String?\n    var checkoutCount = 0;\n\n    init(author:String,\
    \ title:String, stock:Int) {\n        self.author = author;\n        self.title\
    \ = title;\n        self.stockNumber = stock;\n    }\n\n    var canReuse:Bool\
    \ {\n        get {\n            let reusable = checkoutCount < 5\n           \
    \ if (!reusable) {\n                println(\"Eject: Book#\\(self.stockNumber)\"\
    );\n            }\n            return reusable;\n        }\n    }\n}\n```\n\n\
    如果某个 `Book` 对象被从池中借出超过五次，我会从 `canReuse` 属性返回 `false`，并且为了能看到条目何时被剔除，我会在控制台写一条消息。\n\
    \n#### 测试该策略\n\n为了测试从池中剔除条目的策略，我需要平衡池中将包含的最大条目数与 `main.swift` 文件中代码将发出的请求数量。我需要有足够的书籍来允许其中一些被剔除，同时在系统中留出足够的余量来处理所有请求。在“理解空池策略”一节中，我将通过形式化一种策略来展示如何正确处理这个问题，但当前我会将池中的最大条目数设置为\
    \ `5`（这是通过反复试验确定的）。代码清单 8-7 展示了我在 `Library` 类中更改限制的方法。\n\n**代码清单 8-7. 在 `Library.swift`\
    \ 文件中更改池中的最大条目数**\n\n```\n...\nprivate class var singleton:Library {\n    struct\
    \ SingletonWrapper {\n        static let singleton = Library(stockLevel:5);\n\
    \    }\n    return SingletonWrapper.singleton;\n}\n...\n```\n\n运行该应用程序将产生类似于以下内容的输出：\n\
    \n```\nStarting...\nEject: Book#1\nEject: Book#2\nAll blocks complete\n...Book#3...\n\
    Checked out 3 times\nIn stock\n...Book#4...\nChecked out 4 times\nIn stock\n...Book#5...\n\
    Checked out 3 times\nIn stock\nThere are 3 books in the pool\nProgram ended with\
    \ exit code: 0\n```\n\n由于条目返回池前的随机延迟，你可能会得到不同的结果，但基本结果应该相同：部分 `Book` 对象被借出的次数多于其他对象，当它们被借出五次时，会被从池中剔除，并由池创建的新对象替换。\n"
- fmt: "### Understanding the Empty Pool Strategy\n\nAs its name suggests, the empty\
    \ pool strategy specifies how a pool responds when there are no items in the pool\
    \ available to service new requests for objects. The simplest strategy is the\
    \ one used by my example pool, which is the blocking strategy that forces the\
    \ calling thread to wait until an object is returned to the pool.\n\nA blocking\
    \ strategy is simple, but it can cause an application to slow down if there is\
    \ a mismatch between the number of objects in the pool and the level of demand\
    \ for those objects. The application can also lock up if a blocking strategy is\
    \ combined with the untrusting statement management strategy I described in the\
    \ previous section.\n\nIn the previous example, I settled on the maximum number\
    \ of `Books` objects that the pool could create by trial and error. It took only\
    \ a moment because I was able to run the application several times to get a sense\
    \ for how the requests for objects from the `main.swift` file affected the rate\
    \ at which objects were ejected from the pool. In real applications, you can only\
    \ guess at the demand, and some allowances have to be made for unusual periods\
    \ of high demand, which puts additional pressure on the pool objects. To see the\
    \ kind of problem that arises, I have increased the number of times that objects\
    \ are requested from the pool, as shown in Listing 8-8.\n\n**Listing 8-8.** Increasing\
    \ the Number of Requests in the `main.swift` File\n\n```\n...\nfor i in 1 ...\
    \ 35 {\n    dispatch_group_async(group, queue, {() in\n        var book = Library.checkoutBook(\"\
    reader#\\(i)\");\n        if (book != nil) {\n            NSThread.sleepForTimeInterval(Double(rand()\
    \ % 2));\n            Library.returnBook(book!);\n        }\n    });\n}\n...\n\
    ```\n\nI have increased the number of requests to 35 because it exceeds the number\
    \ of times that the objects in the pool can be used. The pool is allowed to create\
    \ a maximum of five items, and each can be used a maximum of five times. That\
    \ means the pool won’t have any objects to use for the 26th and all subsequent\
    \ requests. You can see the effect by running the application, which will produce\
    \ output like this:\n\n```\nStarting...\nEject: Book#4\nEject: Book#5\nEject:\
    \ Book#1\nEject: Book#3\nEject: Book#2\n```\n\nNotice that there is no summary\
    \ of the state of each book. That is because all five books have been ejected\
    \ from the pool and the GCD blocks trying to get objects cannot get past the semaphore\
    \ in the `getFromPool` method. The application is deadlocked: the GCD blocks won’t\
    \ be executed until the pool signals the semaphore to indicate that there are\
    \ free objects, but the pool has reached the limit of the number of objects it\
    \ can create.\n\n#### Implementing the Failing Request Strategy\n\nThe failing\
    \ request strategy deals with an empty pool by shifting responsibility to the\
    \ components that request objects. The component has to specify how long it is\
    \ willing to wait for an object to become available before its request should\
    \ fail. A failed request means that the component has to be prepared for situations\
    \ in which it will not receive the object it wanted and have some plan for continuing\
    \ its operation or reporting an error. Listing 8-9 shows how I revised the implementation\
    \ of the `getFromPool` method in the `Pool` class to implement this strategy.\n\
    \n**Listing 8-9.** Implementing the Strategy in the `Pool.swift` File\n\n```\n\
    ...\nfunc getFromPool(maxWaitSeconds:Int = 5) -> T? {\n    var result:T?;\n  \
    \  let waitTime = (maxWaitSeconds == -1)\n        ? DISPATCH_TIME_FOREVER\n  \
    \      : dispatch_time(DISPATCH_TIME_NOW,\n            (Int64(maxWaitSeconds)\
    \ * Int64(NSEC_PER_SEC)));\n    if (dispatch_semaphore_wait(semaphore, waitTime)\
    \ == 0) {\n        dispatch_sync(arrayQ, {() in\n            if (self.data.count\
    \ == 0 && self.itemCount < self.maxItemCount) {\n                result = self.itemFactory();\n\
    \                self.itemCount++;\n            } else {\n                result\
    \ = self.data.removeAtIndex(0);\n            }\n        })\n    }\n    return\
    \ result;\n}\n...\n```\n\n> **Caution**\n> This strategy should be used with caution\
    \ because the components that consume objects from the pool have to be written\
    \ to deal with requests that fail. I sometimes see components that wrap their\
    \ requests for objects in a loop so they keep requesting objects until they get\
    \ one. This is equivalent to making a request that waits forever, and the application\
    \ still locks up—just in a different and more CPU-intensive way.\n\nI have added\
    \ a parameter called `maxWaitSeconds` with a default value to the `getFromPool`\
    \ method that allows the caller to specify how many seconds they are prepared\
    \ to wait for an object to become available. I interpret a value of `-1` to mean\
    \ wait forever and interpret any other value to be the number of seconds from\
    \ the current time.\n\nGCD defines the `DISPATCH_TIME_FOREVER` constant to represent\
    \ an indefinite wait, and I create the value for any other duration using the\
    \ `dispatch_time` function, whose arguments are an initial time and an additional\
    \ number of nanoseconds that should be added to it:\n\n```\n...\nlet waitTime\
    \ = (maxWaitSeconds == -1)\n    ? DISPATCH_TIME_FOREVER\n    : dispatch_time(DISPATCH_TIME_NOW,\n\
    \        (Int64(maxWaitSeconds) * Int64(NSEC_PER_SEC)));\n...\n```\n\nI use the\
    \ `DISPATCH_TIME_NOW` constant for the first argument to specify that I want the\
    \ time to be relative to the present moment, and I multiply the number of seconds\
    \ specified by the caller by the `NSEC_PER_SEC` constant (which defines how many\
    \ nanoseconds there are in a second) to get the number of nanoseconds.\n\n> **Caution**\n\
    > You can use the `DISPATCH_TIME_NOW` constant only as an argument to the `dispatch_time`\
    \ function. If you use it outside of the function, it returns a value of zero.\n\
    \nI pass the `waitTime` value as the second argument to the `dispatch_semaphore_wait`\
    \ function.\n\n```\n...\nif (dispatch_semaphore_wait(semaphore, waitTime) == 0)\
    \ {\n...\n```\n\nThe `dispatch_semaphore_wait` function will block until the semaphore\
    \ is signaled in the `returnToPool` method or until the specified time is reached.\
    \ If the `DISPATCH_TIME_FOREVER` value is used, then the semaphore will block\
    \ forever, which is the behavior I relied on in previous sections. For other `waitTime`\
    \ values, the `dispatch_semaphore_wait` function will let the thread continue\
    \ after the time period has elapsed."
  raw: '### Understanding the Empty Pool Strategy


    As its name suggests, the empty pool strategy specifies how a pool responds when
    there are no items in the pool available to service new requests for objects.
    The simplest strategy is the one used by my example pool, which is the blocking
    strategythat forces the calling thread to wait until an object is returned to
    the pool.


    A blocking strategy is simple, but it can cause an application to slow down if
    there is a mismatch between the number of objects in the pool and the level of
    demand for those objects. The application can also lock up if a blocking strategy
    is combined with the untrusting statement management strategy I described in the
    previous section.


    In the previous example, I settled on the maximum number of `Books` objects that
    the pool could create by trial and error. It took only a moment because I was
    able to run the application several times to get a sense for how the requests
    for objects from the `main.swift` file affected the rate at which objects were
    ejected from the pool. In real applications, you can only guess at the demand,
    and some allowances have to be made for unusual periods of high demand, which
    puts additional pressure on the pool objects. To see the kind of problem that
    arises, I have increased the number of times that objects are requested from the
    pool, as shown in Listing 8-8.


    Listing 8-8. Increasing the Number of Requests in the main.swift File


    `...`


    `for i in 1 ... 35 {`


    `dispatch_group_async(group, queue, {() in`


    `var book = Library.checkoutBook("reader#\(i)");`


    `if (book != nil) {`


    `NSThread.sleepForTimeInterval(Double(rand() % 2));`


    `Library.returnBook(book!);`


    `}`


    `});`


    `}`


    `...`


    I have increased the number of requests to 35 because it is exceeds the number
    of times that the objects in the pool can be used. The pool is allowed to create
    a maximum of five items, and each can be used a maximum of five times. That means
    the pool won’t have any objects to use for the 26th and all subsequent requests.
    You can see the effect by running the application, which will produce output like
    this:


    `Starting...`


    `Eject: Book#4`


    `Eject: Book#5`


    `Eject: Book#1`


    `Eject: Book#3`


    `Eject: Book#2`


    Notice that there is no summary of the state of each book. That is because all
    five books have been ejected from the pool and the GCD blocks trying to get objects
    cannot get past the semaphore in the `getFromPool` method. The application is
    deadlocked: the GCD blocks won’t be executed until the pool signals the semaphore
    to indicate that there are free objects, but the pool has reached the limit of
    the number of objects it can create.


    #### Implementing the Failing Request Strategy


    The failing request strategy deals with an empty pool by shifting responsibility
    to the components that request objects. The component has to specify how long
    it is willing to wait for an object to become available before its request should
    fail. A failed request means that the component has to be prepared for situations
    in which it will not receive the object it wanted and have some plan for continuing
    its operation or reporting an error. Listing 8-9 shows how I revised the implementation
    of the `getFromPool` method in the `Pool` class to implement this strategy.


    Listing 8-9. Implementing the Strategy in the Pool.swift File


    `...`


    `func getFromPool(maxWaitSeconds:Int = 5) -> T? {`


    `var result:T?;`


    `let waitTime = (maxWaitSeconds == -1)`


    `? DISPATCH_TIME_FOREVER`


    `: dispatch_time(DISPATCH_TIME_NOW,`


    `(Int64(maxWaitSeconds) * Int64(NSEC_PER_SEC)));`


    `if (dispatch_semaphore_wait(semaphore, waitTime) == 0) {`


    `dispatch_sync(arrayQ, {() in`


    `if (self.data.count == 0 && self.itemCount < self.maxItemCount) {`


    `result = self.itemFactory();`


    `self.itemCount++;`


    `} else {`


    `result = self.data.removeAtIndex(0);`


    `}`


    `})`


    `}`


    `return result;`


    `}`


    `...`


    Caution


    This strategy should be used with caution because the components that consume
    objects from the pool have to be written to deal with requests that fail. I sometimes
    see components that wrap their requests for objects in a loop so they keep requesting
    objects until they get one. This is equivalent to making a request that waits
    forever, and the application still locks up—just in a different and more CPU-intensive
    way.


    I have added a parameter called `maxWaitSeconds` with a default value to the `getFromPool`
    method that allows the caller to specify how many seconds they are prepared to
    wait for an object to become available. I interpret a value of `-1` to mean wait
    forever and interpret any other value to be the number of seconds from the current
    time.


    GCD defines the `DISPATCH_TIME_` `FOREVER`constant to represent an indefinite
    wait, and I create the value for any other duration using the `dispatch_` `time`function,
    whose arguments are an initial time and an additional number of nanoseconds that
    should be added to it:


    `...`


    `let waitTime = (maxWaitSeconds == -1)`


    `? DISPATCH_TIME_FOREVER`


    `:` `dispatch_time(DISPATCH_TIME_NOW,`


    `(Int64(maxWaitSeconds) * Int64(NSEC_PER_SEC)));`


    `...`


    I use the `DISPATCH_TIME_NOW` constant for the first argument to specify that
    I want the time to be relative to the present moment, and I multiply the number
    of seconds specified by the caller by the `NSEC_PER_SEC`constant (which defines
    how many nanoseconds there are in a second) to get the number of nanoseconds.


    Caution


    You can use the `DISPATCH_TIME_NOW` constant only as an argument to the `dispatch_time`
    function. If you use it outside of the function, it returns a value of zero.


    I pass the `waitTime` value as the second argument to the `dispatch_semaphore_wait`
    function.


    `...`


    `if (dispatch_semaphore_wait(semaphore,` `waitTime` `) == 0) {`


    `...`


    The `dispatch_semaphore_wait`function will block until the semaphore is signaled
    in the `returnToPool` method or until the specified time is reached. If the `DISPATCH_TIME_FOREVER`
    value is used, then the semaphore will block forever, which is the behavior I
    relied on in previous sections. For other `waitTime` values, the `dispatch_semaphore_wait`
    function will let the thread continue after the time period has elapsed.'
  trans: "\n### 理解空池策略\n\n顾名思义，空池策略规定了当池中没有可用对象来服务于新对象请求时的应对方式。最简单的策略就是我的示例池所使用的阻塞策略，该策略强制调用线程等待，直到有对象被归还到池中。\n\
    \n阻塞策略虽然简单，但如果池中对象的数量与对这些对象的需求水平不匹配，可能会导致应用程序性能下降。如果阻塞策略与我在上一节中描述的不信任语句管理策略结合使用，还可能导致应用程序锁死。\n\
    \n在前面的示例中，我通过试错法确定了池可以创建的 `Books` 对象的最大数量。这只需片刻时间，因为我能够多次运行应用程序，从而了解来自 `main.swift`\
    \ 文件的对象请求如何影响对象从池中被弹出的速率。在实际应用中，你只能猜测需求，并且必须为突发的高需求时期留出余量，这会给池对象带来额外压力。为了查看可能出现的这种问题，我增加了从池中请求对象的次数，如代码清单\
    \ 8-8 所示。\n\n**代码清单 8-8.** 在 `main.swift` 文件中增加请求次数\n\n```\n...\nfor i in 1 ...\
    \ 35 {\n    dispatch_group_async(group, queue, {() in\n        var book = Library.checkoutBook(\"\
    reader#\\(i)\");\n        if (book != nil) {\n            NSThread.sleepForTimeInterval(Double(rand()\
    \ % 2));\n            Library.returnBook(book!);\n        }\n    });\n}\n...\n\
    ```\n\n我将请求次数增加到了 35 次，因为这会超过池中对象可被使用的次数。池最多允许创建五个对象，每个对象最多可使用五次。这意味着从第 26 次请求开始，后续所有请求都将无法获得可用对象。运行应用程序即可看到效果，输出如下：\n\
    \n```\nStarting...\nEject: Book#4\nEject: Book#5\nEject: Book#1\nEject: Book#3\n\
    Eject: Book#2\n```\n\n请注意，这里没有每本书的状态摘要。这是因为所有五本书都已被弹出了池，而尝试获取对象的 GCD 块无法通过 `getFromPool`\
    \ 方法中的信号量。应用程序已陷入死锁：在池发出信号量指示有空闲对象之前，GCD 块不会被执行，但池已达到其可创建对象数量的上限。\n\n#### 实现请求失败策略\n\
    \n请求失败策略通过将责任转移给请求对象的组件来处理空池情况。该组件必须指定在请求失败之前，它愿意等待对象变为可用的最长时间。请求失败意味着组件必须为无法获取所需对象的情况做好准备，并制定继续操作或报告错误的计划。代码清单\
    \ 8-9 展示了如何修改 `Pool` 类中 `getFromPool` 方法的实现来实施此策略。\n\n**代码清单 8-9.** 在 `Pool.swift`\
    \ 文件中实现该策略\n\n```\n...\nfunc getFromPool(maxWaitSeconds:Int = 5) -> T? {\n   \
    \ var result:T?;\n    let waitTime = (maxWaitSeconds == -1)\n        ? DISPATCH_TIME_FOREVER\n\
    \        : dispatch_time(DISPATCH_TIME_NOW,\n            (Int64(maxWaitSeconds)\
    \ * Int64(NSEC_PER_SEC)));\n    if (dispatch_semaphore_wait(semaphore, waitTime)\
    \ == 0) {\n        dispatch_sync(arrayQ, {() in\n            if (self.data.count\
    \ == 0 && self.itemCount < self.maxItemCount) {\n                result = self.itemFactory();\n\
    \                self.itemCount++;\n            } else {\n                result\
    \ = self.data.removeAtIndex(0);\n            }\n        })\n    }\n    return\
    \ result;\n}\n...\n```\n\n> **警告**\n> 此策略应谨慎使用，因为从池中消费对象的组件必须编写相应代码来处理失败的请求。我有时会看到组件将对对象的请求包裹在循环中，以便不断请求直到获取到对象。这等同于发出一个永远等待的请求，应用程序仍然会锁死——只是换了一种不同且更耗费\
    \ CPU 的方式而已。\n\n我为 `getFromPool` 方法添加了一个名为 `maxWaitSeconds` 的参数，并设置了默认值，允许调用者指定他们愿意等待对象变为可用的秒数。我将值\
    \ `-1` 解释为永远等待，并将任何其他值解释为从当前时间起算的秒数。\n\nGCD 定义了 `DISPATCH_TIME_FOREVER` 常量来表示无限期等待，而对于任何其他时长，我使用\
    \ `dispatch_time` 函数来创建相应值，该函数的参数是一个初始时间和要增加纳秒数：\n\n```\n...\nlet waitTime = (maxWaitSeconds\
    \ == -1)\n    ? DISPATCH_TIME_FOREVER\n    : dispatch_time(DISPATCH_TIME_NOW,\n\
    \        (Int64(maxWaitSeconds) * Int64(NSEC_PER_SEC)));\n...\n```\n\n我使用 `DISPATCH_TIME_NOW`\
    \ 常量作为第一个参数，以指定我希望时间相对于当前时刻，然后将调用者指定的秒数乘以 `NSEC_PER_SEC` 常量（该常量定义了一秒中有多少纳秒）来获得纳秒数。\n\
    \n> **警告**\n> `DISPATCH_TIME_NOW` 常量只能用作 `dispatch_time` 函数的参数。如果在函数外部使用它，它将返回零值。\n\
    \n我将 `waitTime` 值作为第二个参数传递给 `dispatch_semaphore_wait` 函数。\n\n```\n...\nif (dispatch_semaphore_wait(semaphore,\
    \ waitTime) == 0) {\n...\n```\n\n`dispatch_semaphore_wait` 函数将阻塞，直到 `returnToPool`\
    \ 方法中发出信号量信号，或者达到指定时间。如果使用 `DISPATCH_TIME_FOREVER` 值，那么信号量将永久阻塞，这是我在前面章节中所依赖的行为。对于其他\
    \ `waitTime` 值，`dispatch_semaphore_wait` 函数将在指定时间段过后允许线程继续执行。\n"
- fmt: "我需要知道信号量为何允许线程继续执行。如果是因为池中有可用对象，那么我想获取该对象并将其返回给调用者；如果是因为时间已到，那么我希望方法不向可选的`result`变量赋值就返回。通过检查`dispatch_semaphore_wait`函数返回的结果，我可以判断发生了什么情况。返回值为`0`表示信号量已被触发，非零值表示时间已到。\n\
    \n`getFromPool`方法的签名已经返回一个可选的`Book`对象，这意味着`Library`类已经准备好处理对`checkoutBook`方法的调用，即使该方法无法从池中获取`Book`对象。\n\
    \n```\nclass func checkoutBook(reader:String) -> Book? {\n    var book = singleton.pool.getFromPool();\n\
    \    book?.reader = reader;\n    book?.checkoutCount++;\n    return book;\n}\n\
    ```\n\n`checkoutBook`方法的返回结果也是一个可选的`Book`对象，这使得在`main.swift`文件中检测超时请求变得容易，如清单8-10所示。\n\
    \n**清单 8-10. 在 main.swift 文件中处理过期请求**\n\n```\nimport Foundation\n\nvar queue =\
    \ dispatch_queue_create(\"workQ\", DISPATCH_QUEUE_CONCURRENT);\nvar group = dispatch_group_create();\n\
    println(\"Starting...\");\nfor i in 1 ... 35 {\n    dispatch_group_async(group,\
    \ queue, {() in\n        var book = Library.checkoutBook(\"reader#\\(i)\");\n\
    \        if (book != nil) {\n            NSThread.sleepForTimeInterval(Double(rand()\
    \ % 2));\n            Library.returnBook(book!);\n        } else {\n         \
    \   dispatch_barrier_async(queue, {() in\n                println(\"Request \\\
    (i) failed\");\n            });\n        }\n    });\n}\ndispatch_group_wait(group,\
    \ DISPATCH_TIME_FOREVER);\ndispatch_barrier_sync(queue, {() in\n    println(\"\
    All blocks complete\");\n    Library.printReport();\n});\n```\n\n如果我没有从`Library`类接收到`Book`对象，那么我会向控制台写入一条消息，指示请求失败。`println`函数用于将消息写入控制台，但它不是并发安全的，因此我将该函数调用封装在一个\
    \ GCD 块中。我使用了 barrier，因为队列是并发的，我不希望两个失败的请求导致同时调用`println`函数，这会产生混乱的输出。\n\n> **提示**\n\
    > \n> 请注意，我也将对`Library.printReport`方法的调用封装在了 GCD 块中。该方法使用`println`函数将报告写入调试控制台，因此我使用了相同的\
    \ GCD 队列来确保生成报告时不会与正在写入的失败请求消息同时调用`println`函数。\n\n如果你运行该应用程序，将会看到类似如下的输出：\n\n\
    ```\nStarting...\nEject: Book#4\nEject: Book#1\nEject: Book#5\nEject: Book#2\n\
    Eject: Book#3\nAll blocks complete\nRequest 26 failed\nRequest 30 failed\nRequest\
    \ 28 failed\nRequest 31 failed\nRequest 29 failed\nRequest 27 failed\nRequest\
    \ 32 failed\nRequest 33 failed\nRequest 34 failed\nRequest 35 failed\nThere are\
    \ 0 books in the pool\n```\n\n这次应用程序运行完成，无法获取对象的请求会失败。应用程序不再死锁，但这意味着`Library`类的使用者必须被编写成能够处理`Book`对象可能不可用的情况，并知道如何应对。\n\
    \n#### 处理池资源耗尽\n\n我在上一节中实施的策略存在一个问题：即使池已耗尽，它也会要求调用者等待。此处的“耗尽”是指所有对象都已被弹出，并且由于已达到初始化时设置的限制，池无法再创建更多对象。这远非理想情况，因为即使池永久性耗尽，那些希望等到对象可用的调用仍然被允许继续等待。清单8-11展示了如何增强`Pool`类，使其在池耗尽时拒绝请求。\n\
    \n**清单 8-11. 在 Pool.swift 文件中处理池枯竭**\n\n```\nimport Foundation\n\nclass Pool<T:AnyObject>\
    \ {\n    private var data = [T]();\n    private let arrayQ = dispatch_queue_create(\"\
    arrayQ\", DISPATCH_QUEUE_SERIAL);\n    private let semaphore:dispatch_semaphore_t;\n\
    \    private var itemCount = 0;\n    private let maxItemCount:Int;\n    private\
    \ let itemFactory: () -> T;\n    private var ejectedItems = 0;\n    private var\
    \ poolExhausted = false;\n\n    init(maxItemCount:Int, factory:() -> T) {\n  \
    \      self.itemFactory = factory;\n        self.maxItemCount = maxItemCount;\n\
    \        semaphore = dispatch_semaphore_create(maxItemCount);\n    }\n\n    func\
    \ getFromPool(maxWaitSeconds:Int = -1) -> T? {\n        var result:T?;\n     \
    \   let waitTime = (maxWaitSeconds == -1)\n            ? DISPATCH_TIME_FOREVER\n\
    \            : dispatch_time(DISPATCH_TIME_NOW,\n                (Int64(maxWaitSeconds)\
    \ * Int64(NSEC_PER_SEC)));\n        if (!poolExhausted) {\n            if (dispatch_semaphore_wait(semaphore,\
    \ waitTime) == 0) {\n                if (!poolExhausted) {\n                 \
    \   dispatch_sync(arrayQ, {() in\n                        if (self.data.count\
    \ == 0\n                            && self.itemCount < self.maxItemCount) {\n\
    \                            result = self.itemFactory();\n                  \
    \          self.itemCount++;\n                        } else {\n             \
    \               result = self.data.removeAtIndex(0);\n                       \
    \ }\n                    })\n                }\n            }\n        }\n   \
    \     return result;\n    }\n\n    func returnToPool(item:T) {\n        dispatch_async(arrayQ,\
    \ {() in\n            if let pitem = item as AnyObject as? PoolItem {\n      \
    \          if (pitem.canReuse) {\n                    self.data.append(item);\n\
    \                    dispatch_semaphore_signal(self.semaphore);\n            \
    \    } else {\n                    self.ejectedItems++;\n                    if\
    \ (self.ejectedItems == self.maxItemCount) {\n                        self.poolExhausted\
    \ = true;\n                        self.flushQueue();\n                    }\n\
    \                }\n            } else {\n                self.data.append(item);\n\
    \            }\n        });\n    }\n\n    private func flushQueue() {\n      \
    \  var dQueue = dispatch_queue_create(\"drainer\", DISPATCH_QUEUE_CONCURRENT);\n\
    \        var backlogCleared = false;\n        dispatch_async(dQueue, {() in\n\
    \            dispatch_semaphore_wait(self.semaphore, DISPATCH_TIME_FOREVER);\n\
    \            backlogCleared = true;\n        });\n        dispatch_async(dQueue,\
    \ {() in\n            while (!backlogCleared) {\n                dispatch_semaphore_signal(self.semaphore);\n\
    \            }\n        });\n    }\n\n    func processPoolItems(callback:[T] ->\
    \ Void) {\n        dispatch_barrier_sync(arrayQ, {() in\n            callback(self.data);\n\
    \        });\n    }\n}\n```\n\n清单中的更改解决了两个问题：识别池何时耗尽以及拒绝所有待处理的请求。为了识别池何时耗尽，我在`returnToPool`方法中跟踪从池中被拒绝的对象数量，当池能够创建的所有对象都已被弹出时，我将一个名为`poolExhausted`的实例变量设置为`true`，并调用一个名为`flushQueue`的新方法。\n\
    \n> **提示**\n> \n> 我必须重写`returnToPool`方法以处理三种可能的情况。第一种是对象实现了`PoolItem`协议并且可以重用。第二种是对象实现了`PoolItem`协议但无法重用——并且可能是最后一个被弹出的对象。最后一种情况是该对象未实现`PoolItem`协议，这种情况下弹出和耗尽无关紧要，该对象可以直接加回池中。\n\
    \n我修改了`getFromPool`方法，使得请求在等待信号量之前会检查`poolExhausted`属性的值，这意味着池耗尽之后到达的任何新请求都会立即返回。"
  raw: 'I need to know why the semaphore has allowed the thread to continue. If it
    is because there is an object available in the pool, then I want to get the object
    and return it to the caller If it is because the time period has elapsed, then
    I want to allow the method to return without assigning a value to the optional
    `result` variable. I can figure out what has happened by looking at the result
    returned by the `dispatch_semaphore_wait` function. A value of `0` means that
    the semaphore has been signaled, and a nonzero value means that the time has expired.


    The signature of the `getFromPool` method already returns an optional `Book` object,
    which means that the `Library` class is already set up to deal with a call to
    the `checkoutBook` method that doesn’t yield a `Book` object from the pool.


    `...`


    `class func checkoutBook(reader:String) ->` `Book?` `{`


    `var book = singleton.pool.getFromPool();`


    `book?.reader = reader;`


    `book?.checkoutCount++;`


    `return book;`


    `}`


    `...`


    The result from the `checkoutBook` method is also an optional `Book` object, which
    makes it easy for me to detect timed-out requests in the `main.swift` file, as
    shown in Listing 8-10.


    Listing 8-10. Dealing with Expired Requests in the main.swift File


    `import Foundation`


    `var queue = dispatch_queue_create("workQ", DISPATCH_QUEUE_CONCURRENT);`


    `var group = dispatch_group_create();`


    `println("Starting...");`


    `for i in 1 ... 35 {`


    `dispatch_group_async(group, queue, {() in`


    `var book = Library.checkoutBook("reader#\(i)");`


    `if (book != nil) {`


    `NSThread.sleepForTimeInterval(Double(rand() % 2));`


    `Library.returnBook(book!);`


    `} else {`


    `dispatch_barrier_async(queue, {() in`


    `println("Request \(i) failed");`


    `});`


    `}`


    `});`


    `}`


    `dispatch_group_wait(group, DISPATCH_TIME_FOREVER);`


    `dispatch_barrier_sync(queue, {() in`


    `println("All blocks complete");`


    `Library.printReport();`


    `});`


    If I do not receive a `Book` object from the `Library` class, then I write a message
    to the console indicating that the request has failed. The `println`function,
    which writes the message to the console, is not safe for concurrent use, so I
    have enclosed the function call in a GCD block. I have used a barrier because
    the queue is concurrent, and I don’t want two failed requests to result in simultaneous
    calls to the `println` function, which would produce garbled output.


    Tip


    Notice that I have enclosed the call to the `Library.printReport` method in a
    GCD block as well. This method uses the `println` function to write a report to
    the debug console, so I have used the same GCD queue to ensure that producing
    the report doesn’t call the `println` function at the same time as a failed request
    message is being written.


    If you run the application, you will see output like this:


    `Starting...`


    `Eject: Book#4`


    `Eject: Book#1`


    `Eject: Book#5`


    `Eject: Book#2`


    `Eject: Book#3`


    `All blocks complete`


    `Request 26 failed`


    `Request 30 failed`


    `Request 28 failed`


    `Request 31 failed`


    `Request 29 failed`


    `Request 27 failed`


    `Request 32 failed`


    `Request 33 failed`


    `Request 34 failed`


    `Request 35 failed`


    `There are 0 books in the pool`


    The application runs to completion this time, and requests that are unable to
    obtain an object fail. The application no longer locks up, but it does mean that
    the consumers of the `Library` class have to be written to deal with the possibility
    that a `Book` object may not be available and know how to cope when this happens.


    #### Dealing with Exhausted Pools


    The problem with the strategy I implemented in the previous section is that it
    requires callers to wait even when the pool is exhausted, by which I mean that
    all of the objects have been ejected and the pool cannot create more because it
    has reached the limit set during initialization. This is far from ideal because
    calls that want to wait until an object is available will be allowed to do so,
    even though the pool is permanently exhausted. Listing 8-11 shows how I have enhanced
    the `Pool` class to fail requests when the pool is exhausted.


    Listing 8-11. Handling Pool Expiry in the Pool.swift File


    `import Foundation`


    `class Pool<T:AnyObject> {`


    `private var data = [T]();`


    `private let arrayQ = dispatch_queue_create("arrayQ", DISPATCH_QUEUE_SERIAL);`


    `private let semaphore:dispatch_semaphore_t;`


    `private var itemCount = 0;`


    `private let maxItemCount:Int;`


    `private let itemFactory: () -> T;`


    `private var ejectedItems = 0;`


    `private var poolExhausted = false;`


    `init(maxItemCount:Int, factory:() -> T) {`


    `self.itemFactory = factory;`


    `self.maxItemCount = maxItemCount;`


    `semaphore = dispatch_semaphore_create(maxItemCount);`


    `}`


    `func getFromPool(maxWaitSeconds:Int = -1) -> T? {`


    `var result:T?;`


    `let waitTime = (maxWaitSeconds == -1)`


    `? DISPATCH_TIME_FOREVER`


    `: dispatch_time(DISPATCH_TIME_NOW,`


    `(Int64(maxWaitSeconds) * Int64(NSEC_PER_SEC)));`


    `if (!poolExhausted) {`


    `if (dispatch_semaphore_wait(semaphore, waitTime) == 0) {`


    `if (!poolExhausted) {`


    `dispatch_sync(arrayQ, {() in`


    `if (self.data.count == 0`


    `&& self.itemCount < self.maxItemCount) {`


    `result = self.itemFactory();`


    `self.itemCount++;`


    `} else {`


    `result = self.data.removeAtIndex(0);`


    `}`


    `})`


    `}`


    `}`


    `}`


    `return result;`


    `}`


    `func returnToPool(item:T) {`


    `dispatch_async(arrayQ, {() in`


    `if let pitem = item as AnyObject as? PoolItem {`


    `if (pitem.canReuse) {`


    `self.data.append(item);`


    `dispatch_semaphore_signal(self.semaphore);`


    `} else {`


    `self.ejectedItems++;`


    `if (self.ejectedItems == self.maxItemCount) {`


    `self.poolExhausted = true;`


    `self.flushQueue();`


    `}`


    `}`


    `} else {`


    `self.data.append(item);`


    `}`


    `});`


    `}`


    `private func flushQueue() {`


    `var dQueue = dispatch_queue_create("drainer", DISPATCH_QUEUE_CONCURRENT);`


    `var backlogCleared = false;`


    `dispatch_async(dQueue, {() in`


    `dispatch_semaphore_wait(self.semaphore, DISPATCH_TIME_FOREVER);`


    `backlogCleared = true;`


    `});`


    `dispatch_async(dQueue, {() in`


    `while (!backlogCleared) {`


    `dispatch_semaphore_signal(self.semaphore);`


    `}`


    `});`


    `}`


    `func processPoolItems(callback:[T] -> Void) {`


    `dispatch_barrier_sync(arrayQ, {() in`


    `callback(self.data);`


    `});`


    `}`


    `}`


    The changes in the listing address two problems: recognizing when the pool is
    exhausted and rejecting any pending requests. To recognize when the pool is exhausted,
    I keep track of the number of objects that are rejected from the pool in the `returnToPool`
    method, and when all of the objects that the pool is able to create have been
    ejected, I set an instance variable called `poolExhausted` to `true` and invoke
    a new method called `flushQueue`.


    Tip


    I have had to rewrite the `returnToPool` method to deal with three possible conditions.
    The first is that the object implements the `PoolItem` protocol and can be reused.
    The second is that the object implements the `PoolItem` protocol and cannot be
    reused—and may be the last object to be ejected. The final condition is that the
    item doesn’t implement the `PoolItem` protocol, in which case ejection and exhaustion
    are not of concern and the item can be added back into the pool.


    I have modified the `getFromPool` method so that requests check the value of the
    `poolExhausted` property before waiting for the semaphore, which means that any
    new requests that arrive after the pool has been exhausted return immediately.'
