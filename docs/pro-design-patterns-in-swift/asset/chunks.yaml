  trans: "\n# 理解代理模式的陷阱\n\n代理模式的相关陷阱取决于其实现方式，但共同原则是不允许将实现细节从代理类泄露到调用组件中。对于远程对象代理，这意味着确保不会暴露访问远程对象所用机制的任何不必要细节。对于用于管理昂贵操作的代理，应尽可能避免暴露操作成本如何被降低的细节。对于访问限制代理，应注意不让调用组件绕过代理直接访问底层对象。\n\
    \n如果使用代理模式实现引用计数变体，有两个特定陷阱。首先，不要使用代理管理对象的生命周期。将此任务留给 Swift 内置的自动引用计数（ARC）支持，它能确保对象在不再需要时被销毁。\n\
    \n其次，不要使用代理实现锁和信号量等并发保护。如果你使用的语言没有并发特性，这样做是合理的，但 Swift 提供了对 Grand Central Dispatch\
    \ 的高级并发控制访问权限；如果你不喜欢 GCD，还可以访问一系列更底层的并发机制。编写自己的并发代码是愚蠢、危险且几乎不可能正确的。如果你认为自己需要创建自定义并发保护，那么要么是你误解了内置特性，要么是误解了项目中面临的问题。\n\
    \n## Cocoa 中的代理模式示例\n\n框架通过`NSProxy`类为代理模式提供了出色支持，但它仅适用于 Objective-C 程序员，不能在 Swift\
    \ 中使用。\n\n在 Objective-C 代码中，你不调用方法，而是向对象发送消息。在大多数情况下，这种区别并无实际意义，许多 Objective-C\
    \ 程序员甚至不知道其中的差异。`NSProxy`类用于创建接收消息并将其转发给代理所代表的资源或对象的类，这提供了一种可以在运行时动态更改或重定向消息的绝佳机制。\n\
    \n遗憾的是，Swift 程序员无法使用这些功能，尝试从`NSProxy`派生 Swift 类会生成编译器错误，因为无法从派生类调用`super.init`（因为`NSProxy`未定义初始化器）。\n\
    \n## 将模式应用于 SportsStore 应用\n\n为了演示代理模式在 SportsStore 应用中的使用，我将创建一个表示远程服务器上产品数据的代理对象，然后使用该代理发送库存水平更新，并整合应用启动时获取初始库存数据的代码。\n\
    \n### 准备示例应用\n\n本章无需准备，我将从第 17 章结束时的 SportsStore 应用继续。别忘了你可以从`Apress.com`下载本书所有代码示例，包括每个章节对应\
    \ SportsStore 应用版本的项目。\n\n### 定义协议、工厂方法和代理类\n\n如前所述，创建代理时并不需要定义协议，但我通常会这样做。这既是习惯使然，更主要的原因是它让我能清晰地将暴露给调用组件的功能与代理类的实现分隔开。清单\
    \ 18-14 展示了添加到 SportsStore 项目中的`Proxy.swift`文件内容。\n\n**清单 18-14.** `Proxy.swift`文件内容\n\
    \n```\nprotocol StockServer {\n    func getStockLevel(product: String, callback:\
