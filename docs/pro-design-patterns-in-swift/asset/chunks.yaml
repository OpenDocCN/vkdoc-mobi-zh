- fmt: "# Understanding the Pitfalls of the Façade Pattern\n\nThere is only one pitfall\
    \ when implementing the façade pattern: inadvertently exposing details of the\
    \ underlying objects to the calling component. In an opaque façade class, exposing\
    \ any detail is a problem. The façade should hide every detail, including associated\
    \ data types, custom error messages, and anything else that would create a dependency\
    \ between the component and the objects that the façade is hiding.\n\nThe situation\
    \ is more complicated for transparent façades, which deliberately reveal at least\
    \ some implementation details. Careful consideration should be given to which\
    \ aspects of the underlying objects are exposed, and every effort should be taken\
    \ to minimize the extent of the dependencies that will be created.\n\n**Caution**\n\
    \nI see the transparent variation of the pattern used most often as a retrospective\
    \ reclassification of an opaque façade that has been hacked in order to implement\
    \ last-minute changes. Façades should be classified as transparent during the\
    \ design phase and not used as a label to mask problems in the application structure\
    \ caused by time pressures. If you have to compromise a façade in order to get\
    \ a product out the door, then do so, but don’t pretend that it was supposed to\
    \ be a transparent façade all along. You are only storing up trouble. Make the\
    \ change, ship the product, and make sure you rework the code in a more considered\
    \ manner when there is more time available.\n\n## Examples of the Façade Pattern\
    \ in Cocoa\n\nThere are several examples of the façade pattern in the Cocoa frameworks,\
    \ and the one that it used most commonly is the `UITextView` class, which provides\
    \ a transparent façade for a set of complex classes used to manage the display\
    \ of text. As a demonstration, I created a playground called `TextFacade.playground`,\
    \ the contents of which are shown in Listing 16-9.\n\n**Listing 16-9.** The Contents\
    \ of the `TextFacade.playground` File\n\n```\nimport UIKit\n\nlet textView = UITextView(frame:\
    \ CGRectMake(0, 0, 200, 100));\n\ntextView.text = \"The Quick Brown Fox\";\n\n\
    textView;\n```\n\nThe `UITextView` class provides a simplified API for displaying\
    \ text. I have specified the frame associated with the view so that it will work\
    \ in a playground, but otherwise, all I have to do is set the value of the `text`\
    \ property to the text I want to display. Figure 16-2 shows how the text is displayed\
    \ by default.\n\n![A978-1-4842-0394-1_16_Fig2_HTML.jpg](A978-1-4842-0394-1_16_Fig2_HTML.jpg)\n\
    \n**Figure 16-2.** The basic text view provided by the `UITextView` class\n\n\
    The `UITextView` class is a transparent façade, and I can take more control over\
    \ how text is displayed by using the properties that provide access to the underlying\
    \ objects that are doing the work behind the scenes. One of these objects is an\
    \ instance of the `NSLayoutManager` class, which is accessed through the `layoutManager`\
    \ property. The `NSLayoutManager` class provides different configuration options,\
    \ including setting whether hidden characters are displayed. In Listing 16-10,\
    \ you can see how I have used the façade transparency to change the visibility\
    \ of hidden characters by directly accessing the `NSLayoutManager` object.\n\n\
    **Listing 16-10.** Accessing Advanced Features in the `TextFacade.playground`\
    \ File\n\n```\nimport UIKit\n\nlet textView = UITextView(frame: CGRectMake(0,\
    \ 0, 200, 100));\n\ntextView.text = \"The Quick Brown Fox\";\n\ntextView.layoutManager.showsInvisibleCharacters\
    \ = true;\n\ntextView;\n```\n\nI have changed the value of the `showInvisibleCharacters`\
    \ property to `true`, and Figure 16-3 shows the effect on the way that the text\
    \ is displayed.\n\n![A978-1-4842-0394-1_16_Fig3_HTML.jpg](A978-1-4842-0394-1_16_Fig3_HTML.jpg)\n\
    \n**Figure 16-3.** The effect of setting an advanced configuration object\n\n\
    Most of the time, applications won’t need to display hidden characters, and the\
    \ features provided by the `UITextView` façade class are sufficient. For those\
    \ situations where hidden characters should be shown, calling components can use\
    \ the transparency provided by `UITextView` to change the layout configuration,\
    \ albeit at the cost of creating a dependency on the `NSLayoutManager` class.\n\
    \n## Applying the Pattern to the SportsStore Application\n\nI am going to apply\
    \ the façade pattern to the SportsStore application to simplify the process of\
    \ converting and formatting the total value of the stock. At the moment, several\
    \ different steps are required. Here is the `displayStockTotal` method from the\
    \ `ViewController` class:\n\n```\n...\n\nfunc displayStockTotal() {\n    let finalTotals:(Int,\
    \ Double) = productStore.products.reduce((0, 0.0),\n    {(totals, product) ->\
    \ (Int, Double) in\n        return (\n            totals.0 + product.stockLevel,\n\
    \            totals.1 + product.stockValue\n        );\n    });\n    var factory\
    \ = StockTotalFactory.getFactory(StockTotalFactory.Currency.EUR);\n    var totalAmount\
    \ = factory.converter?.convertTotal(finalTotals.1);\n    var formatted = factory.formatter?.formatTotal(totalAmount!);\n\
    \    totalStockLabel.text = \"\\(finalTotals.0) Products in Stock. \"\n      \
    \  + \"Total Value: \\(formatted!)\";\n}\n\n...\n```\n\nTo display the total value,\
    \ a component has to obtain a factory and then use a converter and a formatter\
    \ to produce a string that can be shown to the user. I will create a simple façade\
    \ that hides the details of the factory and the implementation object it provides.\n\
    \n### Preparing the Example Application\n\nNo preparation is required for this\
    \ chapter, and I pick up the SportsStore project just as I left it in Chapter\
    \ 15.\n\n**Tip** Remember that you don’t have to build up the project step by\
    \ step. The source code for every example is available as a free download from\
    \ [`Apress.com`](https://Apress.com).\n\n### Creating the Façade Class\n\nI added\
    \ a file called `StockTotalFacade.swift` to the SportsStore project and used it\
    \ to define the class shown in Listing 16-11.\n\n**Listing 16-11.** The Contents\
    \ of the `StockTotalFacade.swift` File\n\n```\nclass StockTotalFacade {\n    enum\
    \ Currency {\n        case USD; case GBP; case EUR;\n    }\n    \n    class func\
    \ formatCurrencyAmount(amount:Double, currency: Currency) -> String? {\n     \
    \   var stfCurrency:StockTotalFactory.Currency;\n        switch (currency) {\n\
    \        case .EUR:\n            stfCurrency = StockTotalFactory.Currency.EUR;\n\
    \        case .GBP:\n            stfCurrency = StockTotalFactory.Currency.GBP;\n\
    \        case .USD:\n            stfCurrency = StockTotalFactory.Currency.USD;\n\
    \        }\n        let factory = StockTotalFactory.getFactory(stfCurrency);\n\
    \        let totalAmount = factory.converter?.convertTotal(amount);\n        if\
    \ (totalAmount != nil) {\n            let formattedValue = factory.formatter?.formatTotal(totalAmount!);\n\
    \            if (formattedValue != nil) {\n                return formattedValue!;\n\
    \            }\n        }\n        return nil;\n    }\n}\n```\n\nI have defined\
    \ an opaque façade class called `StockTotalFacade` that provides a nested `Currency`\
    \ enumeration so that currencies can be selected and a class method called `formatCurrencyAmount`\
    \ that performs the conversion and formatting."
