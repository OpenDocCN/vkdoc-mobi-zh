    \    Part(name: \"Door Loom\", price: 80),\n    Part(name: \"Window Switch\",\
    \ price: 12),\n    Part(name: \"Door Handles\", price: 43.40));\nlet hood = Part(name:\
    \ \"Hood\", price: 320);\nlet order = CustomerOrder(customer: \"Bob\", parts:\
    \ [hood],\n    composites: [door, doorWindow]);\norder.printDetails();\n```\n\n\
    The customer is `Bob`, and his order consists of a complete door, a door window,\
    \ and a hood. Running the application produces the following output:\n\n```\n\
    Order for Bob: Cost: $668.40\n```\n\n# Understanding the Problem That the Pattern\
    \ Solves\n\nThe classes in the example application exhibit two different problems,\
    \ both of which stem from the fact that there are different types used to represent\
