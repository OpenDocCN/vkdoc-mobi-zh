    \ UIKit\n\nclass ProductTableCell : UITableViewCell {\n    // ...为简洁起见省略了语句...\n\
    }\n\nclass ViewController: UIViewController {\n    @IBOutlet weak var totalStockLabel:\
    \ UILabel!\n    @IBOutlet weak var tableView: UITableView!\n    // ...为简洁起见省略了语句...\n\
    }\n```\n\n现在我可以将协议添加到`UIViewController`类中，并实现`UITableViewDataSource`协议中的两个方法，如清单\
    \ 3-7 所示。\n\n**清单 3-7.** 在 ViewController.swift 文件中实现数据源协议方法\n\n```\nimport UIKit\n\
    \nclass ProductTableCell: UITableViewCell {\n    @IBOutlet weak var nameLabel:\
    \ UILabel!\n    @IBOutlet weak var descriptionLabel: UILabel!\n    @IBOutlet weak\
    \ var stockStepper: UIStepper!\n    @IBOutlet weak var stockField: UITextField!\n\
    }\n\nclass ViewController: UIViewController, UITableViewDataSource {\n    @IBOutlet\
    \ weak var totalStockLabel: UILabel!\n    @IBOutlet weak var tableView: UITableView!\n\
    \    var products = [\n        (\"Kayak\", \"A boat for one person\", \"Watersports\"\
    , 275.0, 10),\n        (\"Lifejacket\", \"Protective and fashionable\", \"Watersports\"\
    , 48.95, 14),\n        (\"Soccer Ball\", \"FIFA-approved size and weight\", \"\
    Soccer\", 19.5, 32),\n        (\"Corner Flags\", \"Give your playing field a professional\
