    The `countDiscounts` method that the new decorators present allows me to get information
    about the number of discounts that have been applied to a purchase, as shown in
    Listing 14-11.


    Listing 14-11. Displaying the Number of Discounts in the main.swift File


    `let account = CustomerAccount(name:"Joe");`


    `account.addPurchase(Purchase(product: "Red Hat", price: 10));`


    `account.addPurchase(Purchase(product: "Scarf", price: 20));`


    `account.addPurchase(EndOfLineDecorator(purchase:`


    `BlackFridayDecorator(purchase: PurchaseWithDelivery(purchase:`


    `PurchaseWithGiftWrap(purchase:Purchase(product: "Sunglasses", price:25))))));`


    `account.printAccount();`


    `for p in account.purchases {`


    `if let d = p as? DiscountDecorator {`


    `println("\(p) has \(d.countDiscounts()) discounts");`


    `} else {`


    `println("\(p) has no discounts");`


    `}`


    `}`


    I check to see whether each of the `Purchase` objects stored by the `CustomerAccount`
    object is an instance of the `DiscountDecorator` class and call the `countDiscounts`
    method if it is. Running the application produces the following output:


    `Purchase Red Hat, Price $10.00`


    `Purchase Scarf, Price $20.00`


    `Purchase Sunglasses + giftwrap + delivery, Price $7.68`


    `Total due: $37.68`


    `Red Hat has no discounts`


    `Scarf has no discounts`


    `Sunglasses + giftwrap + delivery has 2 discounts`


    #### Understanding the Limitations of Decorators with New Functionality


    Decorators that implement new functionality place limits on the way that decoration
    can be applied. To expose the new functionality, each instance of the decorator
    class requires at least one other component to be able to find it—either the calling
    component or the decorator that acts as a wrapper in the case of nested decorators.


    The discount decorators I defined are sensitive to the order in which they are
    applied. In Listing 14-11, both discounts are applied to the total cost of the
    purchase, including the gift options that have been selected, like this:


    `...`


    `account.addPurchase(` `EndOfLineDecorator` `(purchase:`


    `BlackFridayDecorator` `(purchase: PurchaseWithDelivery(purchase:`


    `PurchaseWithGiftWrap(purchase:Purchase(product: "Sunglasses", price:25))))));`


    `...`


    Listing 14-12 shows how this statement changes if I want one of the discounts
    to apply only to the product price and exclude the options.


    Listing 14-12. Changing the Application of a Discount in the main.swift File


    `let account = CustomerAccount(name:"Joe");`


    `account.addPurchase(Purchase(product: "Red Hat", price: 10));`


    `account.addPurchase(Purchase(product: "Scarf", price: 20));`


    `account.addPurchase(EndOfLineDecorator(purchase:`


    `PurchaseWithDelivery(purchase:PurchaseWithGiftWrap(purchase:`


    `BlackFridayDecorator(purchase:`


    `Purchase(product: "Sunglasses", price:25))))));`


    `account.printAccount();`


    `for p in account.purchases {`


    `if let d = p as? DiscountDecorator {`


    `println("\(p) has \(d.countDiscounts()) discounts");`


    `} else {`


    `println("\(p) has no discounts");`


    `}`


    `}`


    The `BlackFridayDecorator` reduces the price of the sunglasses only and does not
    affect the price of the gift options. Here is the output from running the application:


    `Purchase Scarf, Price $20.00`


    `Purchase Sunglasses + giftwrap + delivery, Price $8.10`


    `Total due: $38.10`


    `Red Hat has no discounts`


    `Scarf has no discounts`


    `Sunglasses + giftwrap + delivery has 1 discounts`


    The price has been calculated correctly, but notice that only one discount is
    displayed by the summary. This happens because the gift option decorators have
    no knowledge of the discount decorators and the additional functionality they
    provide.


    This kind of inflexibility doesn’t mean you should avoid defining new features
    with decorators, but you should do so carefully and consider the impact it will
    have on the rest of the application, especially if there are other decorators
    already in use.


    ### Creating Consolidated Decorators


    So far, I have defined simple decorator classes because I wanted to emphasize
    how the pattern works and show how decorators can be selected and applied without
    modifying the classes they decorate or those that rely on them.


    Decorators need not be so simple, and the pattern allows for any implementation
    of the methods and properties that the original class defines. A common variation
    is to create consolidated decorators that apply multiple changes to an object.
    Listing 14-13 shows how I have consolidated the gift option decorators into a
    single class.


    Caution


    Decorators are free to create their own implementations of methods and properties,
    but you should use them to perform only the same tasks as the original class’s
    implementations. A good decorated implementation might apply sales tax to the
    `totalPrice` property in the example application, but a bad implementation would
    return the number of items in stock. Decorators should enhance or extend the functionality
    of the original class and not sneak new features into an existing API.


    Listing 14-13. Creating a Single Decorator for Multiple Purchase Options in the
    Options.swift File


    `class GiftOptionDecorator : Purchase {`


    `private let wrappedPurchase:Purchase;`


    `private let options:[OPTION];`


    `enum OPTION {`


    `case GIFTWRAP;`


    `case RIBBON;`


    `case DELIVERY;`


    `}`


    `init(purchase:Purchase, options:OPTION...) {`


    `self.wrappedPurchase = purchase;`


    `self.options = options;`


    `super.init(product: purchase.description, price: purchase.totalPrice);`


    `}`


    `override var description:String {`


    `var result = wrappedPurchase.description;`


    `for option in options {`


    `switch (option) {`


    `case .GIFTWRAP:`


    `result = "\(result) + giftwrap";`


    `case .RIBBON:`


    `result = "\(result) + ribbon";`


    `case .DELIVERY:`


    `result = "\(result) + delivery";`


    `}`


    `}`


    `return result;`


    `}`


    `override var totalPrice:Float {`


    `var result = wrappedPurchase.totalPrice;`


    `for option in options {`


    `switch (option) {`


    `case .GIFTWRAP:`


    `result += 2;`


    `case .RIBBON:`


    `result += 1;`


    `case .DELIVERY:`


    `result += 5;`


    `}`


    `}`


    `return result;`


    `}`


    `}`


    This is still a decorator; it allows me to selectively modify the behavior of
    `Purchase` objects, and it allows me to create combinations of gift options. The
    difference is that it consolidates the options so they can be applied in a single
    object. Listing 14-14 shows how I updated the code that creates the purchases
    to use the new decorator.


    Tip


    I prefer to use separate decorator classes for small projects. I find them more
    elegant and pleasant to work with. They are harder to maintain, however, and for
    more complex projects I switch to consolidated decorators that group related enhancements
    together. I find consolidated decorators less elegant but easier to manage.


    Listing 14-14. Using the Consolidated Decorator in the main.swift File


    `let account = CustomerAccount(name:"Joe");`


    `account.addPurchase(Purchase(product: "Red Hat", price: 10));`


    `account.addPurchase(Purchase(product: "Scarf", price: 20));`


    `account.addPurchase(EndOfLineDecorator(purchase: BlackFridayDecorator(purchase:`


    `GiftOptionDecorator(purchase: Purchase(product: "Sunglasses", price:25),`


    `options: GiftOptionDecorator.OPTION.GIFTWRAP,`


    `GiftOptionDecorator.OPTION.DELIVERY))));`


    `account.printAccount();`


    `for p in account.purchases {`


    `if let d = p as? DiscountDecorator {`


    `println("\(p) has \(d.countDiscounts()) discounts");`


    `} else {`


    `println("\(p) has no discounts");`


    `}`


    `}`


    The code looks a little ugly because of the way that it has to be formatted to
    fit on the page, but the result is just the same as when I applied two of the
    individual decorator classes in the previous section.'
  trans: "\n#### 使用新功能\n\n新的装饰器所提供的 `countDiscounts` 方法让我能够获取已应用于购买商品上的折扣数量信息，如代码清单\
    \ 14-11 所示。\n\n**代码清单 14-11.** 在 `main.swift` 文件中显示折扣数量\n\n```\nlet account =\
    \ CustomerAccount(name:\"Joe\");\naccount.addPurchase(Purchase(product: \"Red\
    \ Hat\", price: 10));\naccount.addPurchase(Purchase(product: \"Scarf\", price:\
    \ 20));\naccount.addPurchase(EndOfLineDecorator(purchase:\n    BlackFridayDecorator(purchase:\
    \ PurchaseWithDelivery(purchase:\n        PurchaseWithGiftWrap(purchase:Purchase(product:\
    \ \"Sunglasses\", price:25))))));\naccount.printAccount();\nfor p in account.purchases\
    \ {\n    if let d = p as? DiscountDecorator {\n        println(\"\\(p) has \\\
    (d.countDiscounts()) discounts\");\n    } else {\n        println(\"\\(p) has\
    \ no discounts\");\n    }\n}\n```\n\n我检查了 `CustomerAccount` 对象存储的每个 `Purchase`\
    \ 对象是否为 `DiscountDecorator` 类的实例，如果是，则调用 `countDiscounts` 方法。运行该应用程序会产生以下输出：\n\
    \n```\nPurchase Red Hat, Price $10.00\nPurchase Scarf, Price $20.00\nPurchase\
    \ Sunglasses + giftwrap + delivery, Price $7.68\nTotal due: $37.68\nRed Hat has\
    \ no discounts\nScarf has no discounts\nSunglasses + giftwrap + delivery has 2\
    \ discounts\n```\n\n#### 理解具有新功能的装饰器的局限性\n\n实现新功能的装饰器对装饰的应用方式施加了限制。为了暴露新功能，装饰器类的每个实例都需要至少另一个组件能够找到它——要么是调用组件，要么是在嵌套装饰器情况下作为包装器的装饰器。\n\
    \n我定义的折扣装饰器对它们的应用顺序很敏感。在代码清单 14-11 中，两个折扣都应用于购买的总成本，包括已选择的礼品选项，如下所示：\n\n```\n\
    account.addPurchase(EndOfLineDecorator(purchase:\n    BlackFridayDecorator(purchase:\
    \ PurchaseWithDelivery(purchase:\n        PurchaseWithGiftWrap(purchase:Purchase(product:\
    \ \"Sunglasses\", price:25))))));\n```\n\n代码清单 14-12 展示了如果我想要其中一个折扣仅适用于商品价格而不包括选项，该语句将如何变化。\n\
    \n**代码清单 14-12.** 在 `main.swift` 文件中更改折扣的应用\n\n```\nlet account = CustomerAccount(name:\"\
    Joe\");\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
    \ \"Scarf\", price: 20));\naccount.addPurchase(EndOfLineDecorator(purchase:\n\
    \    PurchaseWithDelivery(purchase:PurchaseWithGiftWrap(purchase:\n        BlackFridayDecorator(purchase:\n\
    \            Purchase(product: \"Sunglasses\", price:25))))));\naccount.printAccount();\n\
    for p in account.purchases {\n    if let d = p as? DiscountDecorator {\n     \
    \   println(\"\\(p) has \\(d.countDiscounts()) discounts\");\n    } else {\n \
    \       println(\"\\(p) has no discounts\");\n    }\n}\n```\n\n`BlackFridayDecorator`\
    \ 仅降低了太阳镜的价格，并不影响礼品选项的价格。以下是运行该应用程序的输出：\n\n```\nPurchase Scarf, Price $20.00\n\
    Purchase Sunglasses + giftwrap + delivery, Price $8.10\nTotal due: $38.10\nRed\
    \ Hat has no discounts\nScarf has no discounts\nSunglasses + giftwrap + delivery\
    \ has 1 discounts\n```\n\n价格计算正确，但请注意，摘要中仅显示了一个折扣。发生这种情况是因为礼品选项装饰器不了解折扣装饰器及其提供的附加功能。\n\
    \n这种不灵活性并不意味着你应该避免使用装饰器定义新功能，但你应该谨慎行事，并考虑它对应用程序其余部分的影响，尤其是在已经使用了其他装饰器的情况下。\n\n\
    ### 创建合并型装饰器\n\n到目前为止，我定义了简单的装饰器类，因为我希望强调该模式的工作原理，并展示如何选择和应用装饰器，而无需修改它们所装饰的类或依赖这些类的类。\n\
    \n装饰器不必如此简单，该模式允许对原始类定义的方法和属性进行任何实现。一种常见的变体是创建合并型装饰器，它将多个更改应用于一个对象。代码清单 14-13\
    \ 展示了我是如何将礼品选项装饰器合并到一个类中的。\n\n**警告**\n\n装饰器可以自由创建自己的方法和属性实现，但你应该只使用它们来执行与原始类实现相同的任务。一个好的装饰器实现可能会在示例应用程序中对\
    \ `totalPrice` 属性应用销售税，但一个糟糕的实现会返回库存中的商品数量。装饰器应增强或扩展原始类的功能，而不是将新功能偷偷塞入现有 API。\n\
    \n**代码清单 14-13.** 在 `Options.swift` 文件中为多个购买选项创建单个装饰器\n\n```\nclass GiftOptionDecorator\
    \ : Purchase {\n    private let wrappedPurchase:Purchase;\n    private let options:[OPTION];\n\
    \    enum OPTION {\n        case GIFTWRAP;\n        case RIBBON;\n        case\
    \ DELIVERY;\n    }\n    init(purchase:Purchase, options:OPTION...) {\n       \
    \ self.wrappedPurchase = purchase;\n        self.options = options;\n        super.init(product:\
    \ purchase.description, price: purchase.totalPrice);\n    }\n    override var\
    \ description:String {\n        var result = wrappedPurchase.description;\n  \
    \      for option in options {\n            switch (option) {\n            case\
    \ .GIFTWRAP:\n                result = \"\\(result) + giftwrap\";\n          \
    \  case .RIBBON:\n                result = \"\\(result) + ribbon\";\n        \
    \    case .DELIVERY:\n                result = \"\\(result) + delivery\";\n  \
    \          }\n        }\n        return result;\n    }\n    override var totalPrice:Float\
    \ {\n        var result = wrappedPurchase.totalPrice;\n        for option in options\
    \ {\n            switch (option) {\n            case .GIFTWRAP:\n            \
    \    result += 2;\n            case .RIBBON:\n                result += 1;\n \
    \           case .DELIVERY:\n                result += 5;\n            }\n   \
    \     }\n        return result;\n    }\n}\n```\n\n这仍然是一个装饰器；它允许我选择性地修改 `Purchase`\
    \ 对象的行为，并允许我创建礼品选项的组合。不同之处在于，它合并了这些选项，因此它们可以应用于单个对象。代码清单 14-14 展示了我如何更新创建购买的代码以使用这个新的装饰器。\n\
    \n**提示**\n\n对于小型项目，我更倾向于使用单独的装饰器类。我发现它们更优雅，使用起来也更愉快。然而，它们更难维护，对于更复杂的项目，我会切换到将相关增强功能组合在一起的合并型装饰器。我发现合并型装饰器不那么优雅，但更易于管理。\n\
    \n**代码清单 14-14.** 在 `main.swift` 文件中使用合并型装饰器\n\n```\nlet account = CustomerAccount(name:\"\
    Joe\");\naccount.addPurchase(Purchase(product: \"Red Hat\", price: 10));\naccount.addPurchase(Purchase(product:\
    \ \"Scarf\", price: 20));\naccount.addPurchase(EndOfLineDecorator(purchase: BlackFridayDecorator(purchase:\n\
    \    GiftOptionDecorator(purchase: Purchase(product: \"Sunglasses\", price:25),\n\
    \        options: GiftOptionDecorator.OPTION.GIFTWRAP,\n        GiftOptionDecorator.OPTION.DELIVERY))));\n\
    account.printAccount();\nfor p in account.purchases {\n    if let d = p as? DiscountDecorator\
    \ {\n        println(\"\\(p) has \\(d.countDiscounts()) discounts\");\n    } else\
    \ {\n        println(\"\\(p) has no discounts\");\n    }\n}\n```\n\n由于需要调整格式以适合页面，这段代码看起来有点丑陋，但结果与我之前在上一节中应用两个单独装饰器类时完全相同。\n"
- fmt: "# Understanding the Pitfalls of the Decorator Pattern\n\nThere are two pitfalls\
    \ to avoid when implementing the decorator pattern. The first is to try to decorate\
    \ objects using Swift extensions. One of the main characteristics of the decorator\
    \ pattern is that decoration is applied selectively to individual objects, but\
    \ extensions change all objects of a specified type.\n\n## The Side-Effect Pitfall\n\
    \nThe second pitfall arises when you are writing a decorator and you realize that\
    \ you can use it to do more than just decorate the methods and properties of an\
    \ object. It can be an appealing idea. For example, I could modify the decorator\
    \ used to indicate the delivery option to automatically schedule the delivery.\n\
    \nThis is a side effect because it isn’t part of the original purpose of the object\
    \ that was decorated. Side effects usually end up causing more problems than they\
    \ solve and are the second pitfall associated with the decorator pattern.\n\n\
    Side effect decorators are hard to maintain, especially in a team development\
    \ environment. Another programmer who sees the name of your `DeliveryDecorator`\
    \ class is unlikely to realize it does anything more than to decorate an object.\
    \ Problems with deliveries will start when the class is carelessly modified or\
    \ reused elsewhere in the application.\n\nKeep a narrow focus for your decorator\
    \ classes and deal with related activities—such as deliveries—using separate classes.\n\
    \n# Examples of the Decorator Pattern in Cocoa\n\nThe best-known use of the decorator\
    \ pattern in Cocoa to handle scrolling windows. Rather than define scroll bars\
    \ and the scrolling mechanism for every UI component that can be shown to the\
    \ user, Cocoa decorates objects with `NSClipView`, which is in turn decorated\
    \ by `NSScrollView`. `NSScrollView` displays the scroll bars and deals with user\
    \ interaction and manages the `NSClipView` to determine which part of the UI component\
    \ is visible to the user.\n\n# Applying the Pattern to the SportsStore Application\n\
    \nTo put the decorator pattern into a broader context, I am going to apply it\
    \ to the `Product` class in the SportsStore application to reduce the price of\
    \ all products in the `Soccer` category and increase the price of any item for\
    \ which there are four or fewer items in stock.\n\n## Preparing the Example Application\n\
    \nNo preparation is required for this chapter, and I am going to pick up the SportsStore\
    \ project as I left it in [Chapter 13](#A978-1-4842-0394-1_13_Chapter.html).\n\
    \nTip\n\nRemember that all of the examples in this book are available as a free\
    \ download from [`Apress.com`](https://Apress.com).\n\n## Creating the Decorators\n\
    \nOnce you know how the decorator pattern works, creating decorator classes is\
    \ a simple process. Listing 14-15 shows the contents of the `ProductDecorators.swift`\
    \ file, which I added to the SportsStore project.\n\nListing 14-15. The Contents\
    \ of the `ProductDecorators.swift` File\n\n```\nclass PriceDecorator : Product\
    \ {\n    private let wrappedProduct:Product;\n    required init(name:String, description:String,\
    \ category:String,\n                  price:Double, stockLevel:Int) {\n      \
    \  fatalError(\"Not supported\");\n    }\n    init(product:Product) {\n      \
    \  self.wrappedProduct = product;\n        super.init(name: product.name, description:\
    \ product.productDescription,\n                   category: product.category,\
    \ price: product.price,\n                   stockLevel: product.stockLevel);\n\
    \    }\n}\n\nclass LowStockIncreaseDecorator : PriceDecorator {\n    override\
    \ var price:Double {\n        var price = wrappedProduct.price;\n        if (stockLevel\
    \ <= 4) {\n            price = price * 1.5;\n        }\n        return price;\n\
    \    }\n}\n\nclass SoccerDecreaseDecorator : PriceDecorator {\n    override var\
    \ price:Double {\n        return super.wrappedProduct.price * 0.5;\n    }\n}\n\
    ```\n\nThe `PriceDecorator` class is the base for my decorators and is a subclass\
    \ of the `Product` class. The `Product` class defines a `required` initializer\
    \ that I have to add to `PriceDecorator` but don’t want to use. I have used the\
    \ `fatalError` function so that I don’t have to implement the `required` initializer\
    \ and defined a new initializer that accepts a `Product` object that will be decorated.\n\
    \nThe `LowStockIncreaseDecorator` and `SoccerDecreaseDecorator` classes are the\
    \ decorator classes, and they override the `price` property to change the prices\
    \ of the products.\n\n## Applying the Decorators\n\nI want to apply the decorators\
    \ to `Product` objects as they are created. Listing 14-16 shows how I changed\
    \ the `loadData` method in the `ProductDataStore` class.\n\nListing 14-16. Applying\
    \ the Decorators in the `ProductDataStore.swift` File\n\n```\n...\nprivate func\
    \ loadData() -> [Product] {\n    var products = [Product]();\n    for product\
    \ in productData {\n        var p:Product = LowStockIncreaseDecorator(product:\
    \ product);\n        if (p.category == \"Soccer\") {\n            p = SoccerDecreaseDecorator(product:\
    \ p);\n        }\n        dispatch_async(self.networkQ, {() in\n            let\
    \ stockConn = NetworkPool.getConnection();\n            let level = stockConn.getStockLevel(p.name);\n\
    \            if (level != nil) {\n                p.stockLevel = level!;\n   \
    \             dispatch_async(self.uiQ, {() in\n                    if (self.callback\
    \ != nil) {\n                        self.callback!(p);\n                    }\n\
    \                })\n            }\n            NetworkPool.returnConnecton(stockConn);\n\
    \        });\n        products.append(p);\n    }\n    return products;\n}\n...\n\
    ```\n\nI decorate all `Product` objects with the `LowStockIncreaseDecorator` class\
    \ but apply the `SoccerDecreaseDecorator` only to `Product` objects in the `Soccer`\
    \ category. The effect is that the prices of all soccer products are permanently\
    \ reduced, and those products whose stock level drops below five items will be\
    \ increased.\n\n# Summary\n\nIn this chapter, I described the decorator pattern\
    \ and explained how it can be used to change the behavior of objects at runtime.\
    \ The decorator pattern is especially useful when dealing with classes that cannot\
    \ be modified and makes it easy to enhance applications even when working with\
    \ third-party or legacy frameworks. In the next chapter, I describe the composite\
    \ pattern, which allows single instances and collections of objects to be treated\
    \ consistently.\n\n# 15. The Composite Pattern\n\nThe composite pattern is not\
    \ as broadly applicable as some of the other design patterns I describe in this\
    \ book, but it remains an important pattern because of the way it applies consistency\
    \ to a data structure that contains different types of object. Table [15-1](#A978-1-4842-0394-1_15_Chapter.html#Tab1)\
    \ puts the composite pattern in context.\n\n**Table 15-1.** Putting the Composite\
    \ Pattern into Context\n\n| Question | Answer |\n| --- | --- |\n| What is it?\
    \ | The composite pattern allows a tree of individual objects and collections\
    \ of objects to be treated consistently. |\n| What are the benefits? | The consistency\
    \ that the composite pattern brings means that components that operate on the\
    \ tree structure are simpler and do not need to have knowledge of the different\
    \ objects types that are in use. |\n| When should you use this pattern? | Use\
    \ this pattern when you have a tree structure that contains leaf nodes and collections\
    \ of objects. |\n| When should you avoid this pattern? | This pattern is applicable\
    \ only to tree data structures. |\n| How do you know when you have implemented\
    \ the pattern correctly? | The pattern is implemented correctly when components\
    \ that use the tree structure can treat all of the objects it contains using the\
    \ same type or protocol. |\n| Are there any common pitfalls? | This pattern is\
    \ best suited to tree structures that are not modified once they have been created.\
    \ Adding support for modifying the tree undermines the benefit of the pattern.\
    \ |\n| Are there any related patterns? | Many of the structural patterns have\
    \ similar implementations but different intents. Ensure that you select the correct\
    \ pattern from the ones I describe in this part of the book. |"
  raw: '## Understanding the Pitfalls of the Decorator Pattern


    There are two pitfalls to avoid when implementing the decorator pattern. The first
    is to try to decorate objects using Swift extensions. One of the main characteristics
    of the decorator pattern is that decoration is applied selectively to individual
    objects, but extensions change all objects of a specified type.


    ### The Side-Effect Pitfall


    The second pitfall arises when you are writing a decorator and you realize that
    you can use it to do more than just decorate the methods and properties of an
    object. It can be an appealing idea. For example, I could modify the decorator
    used to indicate the delivery option to automatically schedule the delivery.


    This is a side effect because it isn’t part of the original purpose of the object
    that was decorated. Side effects usually end up causing more problems than they
    solve and are the second pitfall associated with the decorator pattern.


    Side effect decorators are hard to maintain, especially in a team development
    environment. Another programmer who sees the name of your `DeliveryDecorator`
    class is unlikely to realize it does anything more than to decorate an object.
    Problems with deliveries will start when the class is carelessly modified or reused
    elsewhere in the application.


    Keep a narrow focus for your decorator classes and deal with related activities—such
    as deliveries—using separate classes.


    ## Examples of the Decorator Pattern in Cocoa


    The best-known use of the decorator pattern in Cocoa to handle scrolling windows.
    Rather than define scroll bars and the scrolling mechanism for every UI component
    that can be shown to the user, Cocoa decorates objects with `NSClipView`, which
    is in turn decorated by `NSScrollView. NSScrollView` displays the scroll bars
    and deals with user interaction and manages the `NSClipView` to determine which
    part of the UI component is visible to the user.


    ## Applying the Pattern to the SportsStore Application


    To put the decorator pattern into a broader context, I am going to apply it to
    the `Product` class in the SportsStore application to reduce the price of all
    products in the `Soccer` category and increase the price of any item for which
    there are four or fewer items in stock.


    ### Preparing the Example Application


    No preparation is required for this chapter, and I am going to pick up the SportsStore
    project as I left it in [Chapter 13](#A978-1-4842-0394-1_13_Chapter.html).


    Tip


    Remember that all of the examples in this book are available as a free download
    from [`Apress.com`](https://Apress.com) .


    ### Creating the Decorators


    Once you know how the decorator pattern works, creating decorator classes is a
    simple process. Listing 14-15 shows the contents of the `ProductDecorators.swift`
    file, which I added to the SportsStore project.


    Listing 14-15. The Contents of the ProductDecorators.swift File


    `class PriceDecorator : Product {`


    `private let wrappedProduct:Product;`


    `required init(name:String, description:String, category:String,`


    `price:Double, stockLevel:Int) {`


    `fatalError("Not supported");`


    `}`


    `init(product:Product) {`


    `self.wrappedProduct = product;`


    `super.init(name: product.name, description: product.productDescription,`


    `category: product.category, price: product.price,`


    `stockLevel: product.stockLevel);`


    `}`


    `}`


    `class LowStockIncreaseDecorator : PriceDecorator {`


    `override var price:Double {`


    `var price = wrappedProduct.price;`


    `if (stockLevel <= 4) {`


    `price = price * 1.5;`


    `}`


    `return price;`


    `}`


    `}`


    `class SoccerDecreaseDecorator : PriceDecorator {`


    `override var price:Double {`


    `return super.wrappedProduct.price * 0.5;`


    `}`


    `}`


    The `PriceDecorator` class is the base for my decorators and is a subclass of
    the `Product` class. The `Product` class defines a `required` initializer that
    I have to add to `PriceDecorator` but don’t want to use. I have used the `fatalError`
    function so that I don’t have to implement the `required` initializer and defined
    a new initializer that accepts a `Product` object that will be decorated.


    The `LowStockIncreaseDecorator` and `SoccerDecreaseDecorator` classes are the
    decorator classes, and they override the `price` property to change the prices
    of the products.


    ### Applying the Decorators


    I want to apply the decorators to `Product` objects as they are created. Listing
    14-16 shows how I changed the `loadData` method in the `ProductDataStore` class.


    Listing 14-16. Applying the Decorators in the ProductDataStore.swift File


    `...`


    `private func loadData() -> [Product] {`


    `var products = [Product]();`


    `for product in productData {`


    `var p:Product = LowStockIncreaseDecorator(product: product);`


    `if (p.category == "Soccer") {`


    `p = SoccerDecreaseDecorator(product: p);`


    `}`


    `dispatch_async(self.networkQ, {() in`


    `let stockConn = NetworkPool.getConnection();`


    `let level = stockConn.getStockLevel(p.name);`


    `if (level != nil) {`


    `p.stockLevel = level!;`


    `dispatch_async(self.uiQ, {() in`


    `if (self.callback != nil) {`


    `self.callback!(p);`


    `}`


    `})`


    `}`


    `NetworkPool.returnConnecton(stockConn);`


    `});`


    `products.append(p);`


    `}`


    `return products;`


    `}`


    `...`


    I decorate all `Product` objects with the `LowStockIncreaseDecorator` class but
    apply the `SoccerDecreaseDecorator` only to `Product` objects in the `Soccer`
    category. The effect is that the prices of all soccer products are permanently
    reduced, and those products whose stock level drops below five items will be increased.


    ## Summary


    In this chapter, I described the decorator pattern and explained how it can be
    used to change the behavior of objects at runtime. The decorator pattern is especially
    useful when dealing with classes that cannot be modified and makes it easy to
    enhance applications even when working with third-party or legacy frameworks.
    In the next chapter, I describe the composite pattern, which allows single instances
    and collections of objects to be treated consistently.


    # 15. The Composite Pattern


    The composite pattern is not as broadly applicable as some of the other design
    patterns I describe in this book, but it remains an important pattern because
    of the way it applies consistency to a data structure that contains different
    types of object. Table [15-1](#A978-1-4842-0394-1_15_Chapter.html#Tab1) puts the
    composite pattern in context.


    Table 15-1.


    Putting the Composite Pattern into Context


    | Question | Answer |

    | --- | --- |

    | What is it? | The composite pattern allows a tree of individual objects and
    collections of objects to be treated consistently. |

    | What are the benefits? | The consistency that the composite pattern brings means
    that components that operate on the tree structure are simpler and do not need
    to have knowledge of the different objects types that are in use. |

    | When should you use this pattern? | Use this pattern when you have a tree structure
    that contains leaf nodes and collections of objects. |

    | When should you avoid this pattern? | This pattern is applicable only to tree
    data structures. |

    | How do you know when you have implemented the pattern correctly? | The pattern
    is implemented correctly when components that use the tree structure can treat
    all of the objects it contains using the same type or protocol. |

    | Are there any common pitfalls? | This pattern is best suited to tree structures
    that are not modified once they have been created. Adding support for modifying
    the tree undermines the benefit of the pattern. |

    | Are there any related patterns? | Many of the structural patterns have similar
    implementations but different intents. Ensure that you select the correct pattern
    from the ones I describe in this part of the book. |'
  trans: "\n# 理解装饰器模式的陷阱\n\n实现装饰器模式时需避免两个陷阱。第一个陷阱是尝试使用 Swift 扩展来装饰对象。装饰器模式的主要特性之一是装饰可以被有选择性地应用于单个对象，而扩展则会更改指定类型的所有对象。\n\
    \n## 副作用陷阱\n\n第二个陷阱出现在编写装饰器时——你可能会发现可以用它来执行超出装饰对象方法和属性范围的操作。这种想法颇具吸引力。例如，我可以修改用于指示配送选项的装饰器，使其自动安排配送时间。\n\
    \n这会产生副作用，因为它并非被装饰对象原本用途的一部分。副作用通常带来的问题比解决的问题更多，这也正是与装饰器模式相关的第二个陷阱。\n\n副作用装饰器难以维护，尤其是在团队开发环境中。另一位看到你的\
    \ `DeliveryDecorator` 类名的程序员，不太可能意识到它除了装饰对象之外还做了其他事情。当这个类被随意修改或在应用的其他地方重用时，配送问题就会开始出现。\n\
    \n请为你的装饰器类保持专注的职责范围，并使用独立的类处理诸如配送之类的相关活动。\n\n# Cocoa 中装饰器模式的示例\n\nCocoa 中最著名的装饰器模式应用是处理滚动窗口。Cocoa\
    \ 并没有为每个可展示给用户的 UI 组件定义滚动条和滚动机制，而是使用 `NSClipView` 装饰对象，再通过 `NSScrollView` 对 `NSClipView`\
    \ 进行装饰。`NSScrollView` 显示滚动条、处理用户交互，并管理 `NSClipView` 以确定 UI 组件的哪一部分对用户可见。\n\n#\
    \ 将模式应用于 SportsStore 应用\n\n为了将装饰器模式放在更广泛的背景下，我将把它应用于 SportsStore 应用中的 `Product`\
    \ 类，以降低所有 `Soccer` 类别产品的价格，并提高库存量不超过四件的任何商品的价格。\n\n## 准备示例应用\n\n本章无需任何准备工作，我将直接沿用第\
    \ 13 章结束时的 SportsStore 项目。\n\n提示\n\n请记住，本书中的所有示例均可从 [`Apress.com`](https://Apress.com)\
    \ 免费下载。\n\n## 创建装饰器\n\n一旦理解了装饰器模式的工作原理，创建装饰器类就是一个简单的过程。清单 14-15 展示了 `ProductDecorators.swift`\
    \ 文件的内容，我已将其添加到 SportsStore 项目中。\n\n清单 14-15. `ProductDecorators.swift` 文件的内容\n\
    \n```\nclass PriceDecorator : Product {\n    private let wrappedProduct:Product;\n\
    \    required init(name:String, description:String, category:String,\n       \
    \           price:Double, stockLevel:Int) {\n        fatalError(\"Not supported\"\
    );\n    }\n    init(product:Product) {\n        self.wrappedProduct = product;\n\
    \        super.init(name: product.name, description: product.productDescription,\n\
    \                   category: product.category, price: product.price,\n      \
    \             stockLevel: product.stockLevel);\n    }\n}\n\nclass LowStockIncreaseDecorator\
    \ : PriceDecorator {\n    override var price:Double {\n        var price = wrappedProduct.price;\n\
    \        if (stockLevel <= 4) {\n            price = price * 1.5;\n        }\n\
    \        return price;\n    }\n}\n\nclass SoccerDecreaseDecorator : PriceDecorator\
    \ {\n    override var price:Double {\n        return super.wrappedProduct.price\
    \ * 0.5;\n    }\n}\n```\n\n`PriceDecorator` 类是我的装饰器基类，它是 `Product` 类的子类。`Product`\
    \ 类定义了一个 `required` 初始化器，我必须将其添加到 `PriceDecorator` 中，但不想使用它。我使用了 `fatalError`\
    \ 函数，这样就不必实现 `required` 初始化器，并定义了一个新的初始化器，该初始化器接受一个将被装饰的 `Product` 对象。\n\n`LowStockIncreaseDecorator`\
    \ 和 `SoccerDecreaseDecorator` 类是装饰器类，它们重写了 `price` 属性以更改产品的价格。\n\n## 应用装饰器\n\n\
    我希望在产品创建时就将装饰器应用于 `Product` 对象。清单 14-16 展示了我是如何更改 `ProductDataStore` 类中 `loadData`\
    \ 方法的。\n\n清单 14-16. 在 `ProductDataStore.swift` 文件中应用装饰器\n\n```\n...\nprivate func\
    \ loadData() -> [Product] {\n    var products = [Product]();\n    for product\
    \ in productData {\n        var p:Product = LowStockIncreaseDecorator(product:\
    \ product);\n        if (p.category == \"Soccer\") {\n            p = SoccerDecreaseDecorator(product:\
    \ p);\n        }\n        dispatch_async(self.networkQ, {() in\n            let\
    \ stockConn = NetworkPool.getConnection();\n            let level = stockConn.getStockLevel(p.name);\n\
    \            if (level != nil) {\n                p.stockLevel = level!;\n   \
    \             dispatch_async(self.uiQ, {() in\n                    if (self.callback\
    \ != nil) {\n                        self.callback!(p);\n                    }\n\
    \                })\n            }\n            NetworkPool.returnConnecton(stockConn);\n\
    \        });\n        products.append(p);\n    }\n    return products;\n}\n...\n\
    ```\n\n我用 `LowStockIncreaseDecorator` 类装饰所有 `Product` 对象，但仅将 `SoccerDecreaseDecorator`\
    \ 应用于 `Soccer` 类别中的 `Product` 对象。效果是：所有足球产品的价格被永久降低，而库存量降至五件以下的产品价格将上涨。\n\n# 总结\n\
    \n在本章中，我描述了装饰器模式，并解释了如何用它来在运行时改变对象的行为。装饰器模式在处理无法修改的类时尤其有用，即使在处理第三方或遗留框架时，也能轻松增强应用功能。在下一章中，我将介绍组合模式，该模式允许将单个实例和对象集合进行一致处理。\n\
    \n# 15. 组合模式\n\n组合模式并不像我在本书中描述的其他一些设计模式那样具有广泛的适用性，但由于它为包含不同类型对象的数据结构提供了一致性，因此它仍然是一个重要的模式。表\
    \ 15-1 将组合模式置于具体背景中。\n\n**表 15-1.** 组合模式背景概述\n\n| 问题 | 答案 |\n| --- | --- |\n|\
    \ 这是什么？ | 组合模式允许将单个对象和对象集合构成的树结构进行一致处理。 |\n| 有什么好处？ | 组合模式带来的一致性意味着，操作树结构的组件更简单，且无需了解所涉及的不同对象类型。\
    \ |\n| 何时应使用此模式？ | 当树结构包含叶子节点和对象集合时，应使用此模式。 |\n| 何时应避免此模式？ | 此模式仅适用于树形数据结构。 |\n\
    | 如何判断是否正确实现了该模式？ | 当使用树结构的组件能够通过相同类型或协议处理其中包含的所有对象时，该模式即正确实现。 |\n| 有哪些常见陷阱？ |\
    \ 此模式最适合创建后不再修改的树结构。添加对树结构修改的支持会削弱该模式的优势。 |\n| 是否有相关模式？ | 许多结构性模式的实现方式相似但意图不同。请确保从我在这部分书中描述的模式中选择正确的模式。\
    \ |\n"
- fmt: "# Preparing the Example Project\n\nFollowing the same approach I used in earlier\
    \ chapters, I created a new OS X Command Line Tool project called `Composite`.\
    \ I added a file to the project called `CarParts.swift`, the contents of which\
    \ are shown in Listing 15-1.\n\nListing 15-1. The Contents of the `CarParts.swift`\
    \ File\n\n```\nclass Part {\n    let name:String;\n    let price:Float;\n    init(name:String,\
    \ price:Float) {\n        self.name = name; self.price = price;\n    }\n}\n\n\
    class CompositePart {\n    let name:String;\n    let parts:[Part];\n    init(name:String,\
    \ parts:Part...) {\n        self.name = name; self.parts = parts;\n    }\n}\n\
    ```\n\nI have defined two classes to represent parts used to repair cars. The\
    \ `Part` class represents a single self-contained part, such as a spark plug or\
    \ a tire. The `CompositePart` class represents parts that are made up of other\
    \ parts and that are typically purchased as a single unit, such as a wheel, which\
    \ would comprise a tire, a wheel alloy, and some fixing nuts. The `CompositePart`\
    \ class represents its constituent elements using a `Part` array. I also added\
