    \n无需重复定义车门窗所需的部件，我可以直接创建一个组合对象，并将其作为参数传递给另一个对象的初始化器。这意味着我可以在一个地方修改组成车门窗的部件集合。运行应用程序会产生与实现组合模式之前相同的输出。\n\
    \n```\nOrder for Bob: Cost: $668.40\n```\n\n## 理解组合模式的陷阱\n\n当创建的树结构是固定不变时，组合模式的效果最佳。组合模式的主要陷阱在于，当需要在创建后改变结构时就会出现问题。清单\
    \ 15-7 展示了我对 `CompositePart` 类所做的更改，以支持结构变化。\n\n**清单 15-7.** 在 `CarParts.swift`\
    \ 文件中添加对组合集合变化的支持\n\n```\n...\nclass CompositePart : CarPart {\n    let name:String;\n\
