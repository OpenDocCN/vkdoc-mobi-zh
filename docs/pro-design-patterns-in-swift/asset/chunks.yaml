    \ 方法时，都会构建一个 `LedgerEntry` 对象的字典，该字典由唯一 ID 索引。\n\n`Ledger` 类提供对撤销操作的支持，使用的是我在第\
    \ 20 章中描述的命令模式。调用 `addEntry` 方法会返回一个 `LedgerCommand` 对象，该对象的 `execute` 方法会定位并移除一个\
