  trans: "\n### 将命令用作宏\n\n命令常用于创建宏，这样就能对不同的接收对象执行同一组操作。要将命令用作对象，接收者必须传递给 `execute`\
    \ 方法，而不是命令对象的初始化器。代码清单 20-11 展示了我所做的修改，使接收者可以作为一个参数指定。\n\n**代码清单 20-11.** 在 `Commands.swift`\
    \ 文件中修改命令协议和实现类\n\n```\nprotocol Command {\n    func execute(receiver:Any);\n\
    }\n\nclass CommandWrapper : Command {\n    private let commands:[Command];\n \
    \   init(commands:[Command]) {\n        self.commands = commands;\n    }\n   \
    \ func execute(receiver:Any) {\n        for command in commands {\n          \
    \  command.execute(receiver);\n        }\n    }\n}\n\nclass GenericCommand<T>\
    \ : Command {\n    private var instructions: T -> Void;\n    init(instructions:\
    \ T -> Void) {\n        self.instructions = instructions;\n    }\n    func execute(receiver:Any)\
    \ {\n        if let safeReceiver = receiver as? T {\n            instructions(safeReceiver);\n\
    \        } else {\n            fatalError(\"Receiver is not expected type\");\n\
    \        }\n    }\n    class func createCommand(instuctions: T -> Void) -> Command\
    \ {\n        return GenericCommand(instructions: instuctions);\n    }\n}\n```\n\
    \n我在 `Command` 协议定义的 `execute` 方法中添加了一个 `Any` 参数。如果传递给 `execute` 方法的对象与泛型类型参数不匹配，我会在\
    \ `GenericCommand` 类的 execute 方法中通过调用全局 `fatalError` 函数来强制进行类型一致性检查。这并不理想，因为错误将在运行时而非编译时报告，但\
    \ Swift 很难创建和应用泛型协议。\n\n在代码清单 20-12 中，你可以看到我如何修改 `Calculator` 类以移除撤销功能，并替换为支持生成宏命令，该宏命令将应用已执行的操作。\n\
    \n**代码清单 20-12.** 在 `Calculator.swift` 文件中添加宏支持\n\n```\nimport Foundation;\n\n\
    class Calculator {\n    private(set) var total = 0;\n    private var history =\
    \ [Command]();\n    private var queue = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    func add(amount:Int) {\n        addMacro(Calculator.add, amount: amount);\n\
    \        total += amount;\n    }\n    func subtract(amount:Int) {\n        addMacro(Calculator.subtract,\
    \ amount: amount);\n        total -= amount;\n    }\n    func multiply(amount:Int)\
    \ {\n        addMacro(Calculator.multiply, amount: amount);\n        total = total\
    \ * amount;\n    }\n    func divide(amount:Int) {\n        addMacro(Calculator.divide,\
    \ amount: amount);\n        total = total / amount;\n    }\n    private func addMacro(method:Calculator\
    \ -> Int -> Void, amount:Int) {\n        dispatch_sync(self.queue, {() in\n  \
    \          self.history.append(GenericCommand<Calculator>.createCommand(\n   \
    \             { calc in method(calc)(amount); }\n            ));\n        });\n\
    \    }\n    func getMacroCommand() -> Command? {\n        var command:Command?;\n\
    \        dispatch_sync(queue, {() in\n            command = CommandWrapper(commands:\
    \ self.history);\n        });\n        return command;\n    }\n}\n```\n\n每个操作方法现在都调用\
    \ `addMacro` 方法，该方法构建了在 `Calculator` 实例上执行过的操作历史（而不是撤销功能所需的逆向操作）。重要的区别在于，`Calculator`\
    \ 对象本身并未包含在创建并由 `getMacroCommand` 方法随后打包的 `Command` 对象中。相反，每个命令包含了将被调用的操作方法的详细信息以及将传递给它的参数，而指定将成为命令接收者的\
    \ `Calculator` 对象是调用组件的职责。代码清单 20-13 展示了我在 `main.swift` 文件中如何使用宏功能。\n\n**代码清单\
    \ 20-13.** 在 `main.swift` 文件中创建和应用宏\n\n```\nlet calc = Calculator();\ncalc.add(10);\n\
    calc.multiply(4);\ncalc.subtract(2);\nprintln(\"Calc 1 Total: \\(calc.total)\"\
    );\n\nlet macro = calc.getMacroCommand();\nlet calc2 = Calculator();\nmacro?.execute(calc2);\n\
    println(\"Calc 2 Total: \\(calc2.total)\");\n```\n\n我对一个 `Calculator` 对象应用一系列操作，然后将这些命令作为宏，用于对另一个不同的\
    \ `Calculator` 对象执行相同的操作。运行示例应用程序会产生以下结果：\n\n```\nCalc 1 Total: 38\nCalc 2 Total:\
    \ 38\n```\n\n### 使用闭包作为命令\n\n命令模式指定使用命令对象，这也是我在本章目前所有实现中所采用的方式。然而，命令只是一个容器，用于存储要调用的方法的详细信息、其参数值，以及（可选）目标接收者。所有这些细节都可以封装在\
    \ Swift 闭包中，而无需定义和使用 `Command` 协议及其实现。\n\n我更喜欢使用 `Command` 对象。我发现这能更清晰地体现模式的目的，并生成更易于阅读和维护的代码。不过，你可能会有不同的看法。在代码清单\
    \ 20-14 中，你可以看到我如何修改 `Calculator` 类，使其使用闭包来表达命令，并且不再依赖 `Command` 协议和 `GenericCommand`\
    \ 类。\n\n**代码清单 20-14.** 在 `Calculator.swift` 文件中使用闭包作为命令\n\n```\nimport Foundation;\n\
    \nclass Calculator {\n    private(set) var total = 0;\n    typealias CommandClosure\
    \ = (Calculator -> Void);\n    private var history = [CommandClosure]();\n   \
    \ private var queue = dispatch_queue_create(\"arrayQ\", DISPATCH_QUEUE_SERIAL);\n\
    \    func add(amount:Int) {\n        addMacro(Calculator.add, amount: amount);\n\
    \        total += amount;\n    }\n    func subtract(amount:Int) {\n        addMacro(Calculator.subtract,\
    \ amount: amount);\n        total -= amount;\n    }\n    func multiply(amount:Int)\
    \ {\n        addMacro(Calculator.multiply, amount: amount);\n        total = total\
    \ * amount;\n    }\n    func divide(amount:Int) {\n        addMacro(Calculator.divide,\
    \ amount: amount);\n        total = total / amount;\n    }\n    private func addMacro(method:Calculator\
    \ -> Int -> Void, amount:Int) {\n        dispatch_sync(self.queue, {() in\n  \
    \          self.history.append({ calc in method(calc)(amount)});\n        });\n\
    \    }\n    func getMacroCommand() -> (Calculator -> Void) {\n        var commands\
    \ = [CommandClosure]();\n        dispatch_sync(queue, {() in\n            commands\
    \ = self.history\n        });\n        return { calc in\n            if (commands.count\
    \ > 0) {\n                for index in 0 ..< commands.count {\n              \
    \      commandsindex;\n                }\n            }\n        };\n    }\n}\n\
    ```\n\n此清单中的更改可能看起来不大，但编写这类代码非常烧脑，因为你需要在想要闭包的变量和不想要的变量之间进行梳理，并弄清楚是否需要从 `Calculator\
    \ -> Int -> Void` 柯里化到 `Calculator -> Void` 或 `Int -> Void`。\n\n如果你坚持使用这种命令风格，那么请注意我使用了\
    \ `typealias` 关键字为数组中的使用定义了一个别名，如下所示：\n\n```\n...\ntypealias CommandClosure =\
    \ (Calculator -> Void);\nprivate var history = [CommandClosure]();\n...\n```\n\
    \nSwift 编译器不喜欢将闭包签名作为数组的数据类型，但可以通过别名来安抚它。代码清单 20-15 展示了在 `main.swift` 文件中的更改，以使用基于闭包的\
    \ `Calculator` 类。\n\n**代码清单 20-15.** 在 `main.swift` 文件中使用基于闭包的 Calculator 类\n\n\
    ```\nlet calc = Calculator();\ncalc.add(10);\ncalc.multiply(4);\ncalc.subtract(2);\n\
    println(\"Calc 1 Total: \\(calc.total)\");\n\nlet macro = calc.getMacroCommand();\n\
    let calc2 = Calculator();\nmacro(calc2);\nprintln(\"Calc 2 Total: \\(calc2.total)\"\
    );\n```\n\n唯一的更改是直接调用 `getMacroCommand` 方法返回的闭包，而不是调用由 `Command` 对象定义的 execute\
    \ 方法。运行应用程序会产生以下输出，表明闭包的工作方式与单独的命令对象完全相同：\n\n```\nCalc 1 Total: 38\nCalc 2 Total:\
    \ 38\n```\n"
- fmt: '## Understanding the Pitfalls of the Command Pattern


    The command pattern is relatively simple to implement as long as you don’t expose
    details of the receiver object or the method invocation instructions to the calling
    component. When it comes to the implementation detail, ensure that you add concurrency
    protection if the commands may be used by multiple components and ensure that
    your closures operate on the object that you expect and are not closing on the
    wrong receiver objects.


    ## Examples of the Command Pattern in Cocoa


    The `Foundation` framework includes the `NSInvocation` class, which is used to
    implement the command pattern in Objective-C. However, because of the different
    ways that Swift and Objective-C invoke their methods, the `NSInvocation` class
    cannot be used in Swift code. A more specific implementation of the command pattern
    is available through the `NSUndoManager` class, which I use in the next section.


    ## Applying the Pattern to the SportsStore Application


    I am going to apply the command pattern to the SportsStore application to implement
    an undo feature for stock level changes. iOS includes a built-in undo management
    framework that is easy to use and that uses the command pattern.


    ### Preparing the Example Application


    The standard mechanism for triggering an iOS undo operation is to shake the device.
    To prepare for the command pattern, I am going to add support for receiving a
    notification when the shake motion is recognized. Listing 20-16 shows the change
    I made to the `ViewController` class.


    **Listing 20-16.** Adding Shake Motion Support in the ViewController.swift File


    ```

    class ViewController: UIViewController, UITableViewDataSource {


    @IBOutlet weak var totalStockLabel: UILabel!


    @IBOutlet weak var tableView: UITableView!


    let productStore = ProductDataStore();


    override func viewDidLoad() {


    super.viewDidLoad()


    displayStockTotal();


    let bridge = EventBridge(callback: updateStockLevel);


    productStore.callback = bridge.inputCallback;


    }


    override func motionEnded(motion: UIEventSubtype, withEvent event: UIEvent) {


    if (event.subtype == UIEventSubtype.MotionShake) {


    println("Shake motion detected");


    }


    }


    // ...methods omitted for brevity...


    }

    ```


    I have overridden the `motionEnded` method so that I check the type of the motion
    that has been detected and print out a message to the Xcode debug console if the
    motion is a shake. To test the change, start the SportsStore application and select
    Shake Gesture from the Hardware menu of the iOS simulator. You will see the following
    message displayed in the Xcode console:


    ```

    Shake motion detected

    ```


    ### Implementing the Undo Feature


    The most direct way to implement the command pattern is to work with the `NSUndoManager`
    class. The `NSUndoManager` class is managed automatically through the `undoManager`
    property of the UI component classes’ conformance to the `NSResponder` protocol,
    which means that creating an instance of the `NSUndoManager` is handled for you.
    There are two stages to working with the undo manager, and the first is to register
    the commands that will be invoked when the user requests an undo operation. Listing
    20-17 shows the changes I made to the `ViewController` class.


    **Listing 20-17.** Registering Undo Commands in the ViewController.swift File


    ```

    ...


    @IBAction func stockLevelDidChange(sender: AnyObject) {


    if var currentCell = sender as? UIView {


    while (true) {


    currentCell = currentCell.superview!;


    if let cell = currentCell as? ProductTableCell {


    if let product = cell.product? {


    let dict = NSDictionary(objects: [product.stockLevel],


    forKeys: [product.name]);


    undoManager?.registerUndoWithTarget(self,


    selector: "undoStockLevel:",


    object: dict);


    if let stepper = sender as? UIStepper {


    product.stockLevel = Int(stepper.value);


    } else if let textfield = sender as? UITextField {


    if let newValue = textfield.text.toInt()? {


    product.stockLevel = newValue;


    }


    }


    cell.stockStepper.value = Double(product.stockLevel);


    cell.stockField.text = String(product.stockLevel);


    productLogger.logItem(product);


    StockServerFactory.getStockServer()


    .setStockLevel(product.name,


    stockLevel: product.stockLevel);


    }


    break;


    }


    }


    displayStockTotal();


    }


    }


    func undoStockLevel(data:[String:Int]) {


    let productName = data.keys.first;


    if (productName != nil) {


    let stockLevel = data[productName!];


    if (stockLevel != nil) {


    for nproduct in productStore.products {


    if nproduct.name == productName! {


    nproduct.stockLevel = stockLevel!;


    }


    }


    updateStockLevel(productName!, level: stockLevel!);


    }


    }


    }


    ...

    ```


    The `undoManager` property is optional, and commands are registered with the `registerUndoWithTarget`
    method. The parameters for this method are the receiver of the command, the method
    that will be invoked, and an object that will be passed to that argument.


    ```

    ...


    undoManager?.registerUndoWithTarget(self, selector: "undoStockLevel:", object:
    dict);


    ...

    ```


    I have specified the view controller as the receiver, and I have specified a new
    method, called `undoStockLevel`. For the method argument, I have created an `NSDictionary`
    that contains the name of the product that has been modified and the old stock
    level.


    `NSUndoManager` exposes some of its Objective-C roots. First, when I specify the
    name of the method to invoke, I follow the name with a colon, like this:


    ```

    ...


    undoManager?.registerUndoWithTarget(self, selector: " undoStockLevel: ", object:
    dict);


    ...

    ```


    This relates to how methods are selected in Objective-C code, and omitting the
    colon will cause an exception when the command is executed. The other issue to
    be aware of is that I had to use an `NSDictionary` as the argument to be passed
    to the method because Swift built-in dictionaries are not supported. I had to
    define the `undoStockLevel` method because undo commands can provide only a single
    object. I unpack the data in the dictionary and use it to update the product object
    in the repository and to call the `updateStockLevel` method, which takes two arguments
    and therefore cannot be called directly by the undo manager.


    #### Triggering an Undo Command


    The result of calling the `registerUndoWithTarget` method is that a command is
    created behind the scenes, waiting to be executed when the user shakes the device.
    Listing 20-18 shows the change I made to the `motionEnded` method on the `ViewController`
    class.


    **Listing 20-18.** Triggering Undo Commands in the ViewController.swift File


    ```

    ...


    override func motionEnded(motion: UIEventSubtype, withEvent event: UIEvent) {


    if (event.subtype == UIEventSubtype.MotionShake) {


    println("Shake motion detected");


    undoManager?.undo();


    }


    }


    ...

    ```


    The `undo` method defined by the `NSUndoManager` class triggers the most recent
    undo command created by the `registerUndoWithTarget` method. To test the changes,
    start the application, change the value of one of the products, and then select
    Shake Gesture from the iOS simulator Hardware menu. The change that you made will
    be reversed, as illustrated by Figure 20-3.


    ![A978-1-4842-0394-1_20_Fig3_HTML.jpg](A978-1-4842-0394-1_20_Fig3_HTML.jpg)


    **Figure 20-3.** Undoing a stock level change


    ## Summary


    In this chapter I described the command pattern, which is used to encapsulate
    a method invocation so that it can be performed later or by another component.
    I demonstrated how the command pattern can be used to implement undo operations
    and to create sequences of invocations that act as macros. In the next chapter,
    I describe the mediator pattern, which is used to manage communication between
    groups of peer objects.'
