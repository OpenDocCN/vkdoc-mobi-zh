    `return Person(name: self.name, country: self.country);`


    `}`


    `}`


    `var people = [Person(name:"Joe", country:"France"),`


    `Person(name:"Bob", country:"USA")];`


    `var otherpeople = people;`


    `people[0].country = "UK";`


    `println("Country: \(otherpeople[0].country)");`


    Tip


    As a performance optimization, Swift arrays are not copied until you modify them,
    known as lazy copying. This isn’t something you need to worry about on a day-to-day
    basis because it happens seamlessly behind the scenes, but it means that cloned
    arrays behave like reference types if you are just reading the contents of the
    array and behave like value types once you make a modification.


    I create an array called `people` containing two `Person` objects. I assign the
    array to a variable called `otherpeople` and then modify the first object in the
    `people` array. Here is the console output, which shows that the contents of the
    array are shallow copied, even though the array itself is a struct:


    `Country: UK`


    To deeply copy an array, you must inspect each item in the array and look for
    objects whose classes are derived from `NSObject` and that implement the `NSCopying`
    protocol, as shown in Listing 5-9.


    Listing 5-9. Deep Copying an Array in the ArrayCopy.playground File


    `import Foundation`


    `class Person : NSObject, NSCopying {`


    `var name:String;`


    `var country:String;`


