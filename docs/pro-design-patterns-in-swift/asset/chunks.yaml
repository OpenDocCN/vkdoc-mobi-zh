    are generally required throughout an application. It doesn’t make sense to create
    duplicate logging or security features for different sections, and so a single
    implementation is used by multiple sections so that, for example, once a user
    has been authenticated, the user’s identity is propagated through the different
    sections without the need to further verification.


    The danger with cross-cutting concerns is that features and functions that more
    properly belong in the model, view, or controller end up being defined as cross-cutting
    concerns, distorting the shape of the application and undermining the clean separation
    between the sections of the application.


    There are few genuine cross-cutting concerns in any application, which means that
    once you have implemented logging and security, you should treat any other features
    implemented as cross-cutting concerns with suspicion and consider whether the
    feature may actually belong in the model, view, or controller.


    ## Implementing the MVC Pattern


    The best way to learn about the MVC pattern is to implement it. The more experience
    you have in separating the concerns in an application into models, views, and
    controllers, the more natural the process will become. In the sections that follow,
    I am going to use the MVC pattern to create a simple command-line application.
    I walk through the process and explain the decisions I made along the way. As
    I explained earlier, the MVC pattern leaves a lot of room for personal style and
    interpretation, and inevitably the implementation will reflect the way that I
    think about software and development and be shaped by the kinds of projects I
    usually work on. This doesn’t mean you should slavishly follow my techniques.
    Instead, you should feel free to follow your own path and make the decisions that
    have the most beneficial impact in your development environment and on the kinds
    of projects you develop.


    The example application will manage a list of people and the cities they live
    in. This isn’t especially useful as an application in its own right, but there
    is just enough complexity to allow me to implement the MVC pattern without the
    application features getting in the way.


    ### Defining the Common Code


    In any project, there are functions that you need to use throughout an application.
    Common code isn’t the same thing as a cross-cutting concern. As a rule of thumb,
    functions and static methods that you define to avoid duplication are common code;
    features that have common state across sections are cross-cutting concerns.


    I started defining the application by defining extensions that I will rely on
    to manipulate strings into arrays, to remove duplicate objects in arrays, and
    to find the first object in an array that matches a specified test. I added a
    file called `Extensions.swift` to the example project, the contents of which are
    shown in Listing 27-1.


    Listing 27-1. The Contents of the Extensions.swift File


    `import Foundation`


    `extension String {`


    `func split() -> [String] {`


    `return self.componentsSeparatedByCharactersInSet(`


    `NSCharacterSet.whitespaceAndNewlineCharacterSet())`


    `.filter({$0 != ""});`


    `}`


    `}`


    `extension Array {`


    `func unique<T: Equatable>() -> [T] {`


    `var uniqueValues = [T]();`


    `for value in self {`


    `if !contains(uniqueValues, value as T) {`


    `uniqueValues.append(value as T);`


    `}`


    `}`


    `return uniqueValues;`


    `}`


    `func first<T>(test:T -> Bool) -> T? {`


    `for value in self {`


    `if test(value as T) {`


    `return value as? T;`


    `}`


    `}`


    `return nil;`


    `}`


    `}`


    These extensions are not related to the structure of the MVC pattern, and I have
    defined them to avoid code duplication in the project.


    ### Defining the Framework


    The model, views, and controllers do not exist in isolation. They need a framework
    of some sort to connect the sections to one another, to receive and process interactions
    from the user, and to display content on the screen. Without an underlying framework,
    every application would have to re-create the same set of low-level functions,
    which would be extremely tedious. As a Swift developer, the frameworks that you
    are likely to use most often are `UIKit` and `AppKit`, which include all of the
    low-level features, such as translating mouse clicks into events and drawing complex
    UI components on the screen.


    There is no handy MVC framework for Command Line Tool projects, so I am going
    to have to create one. This would be a serious (and unwise) undertaking in a real
    project, but one of the advantages of book examples is simplicity, and creating
    a basic framework is a useful means of demonstrating how the sections of the MVC
    pattern fit together.


    The example application will read commands from the Xcode console, which will
    also be used to display data to the user. Listing 27-2 shows the contents of the
    `Commands.swift` file, which I have used to define the commands that the application
    will support.


    Listing 27-2. The Contents of the Commands.swift File


    `import Foundation`


    `enum Command : String {`


    `case LIST_PEOPLE = "L: List People";`


    `case ADD_PERSON = "A: Add Person";`


    `case DELETE_PERSON = "D: Delete Person";`


    `case UPDATE_PERSON = "U: Update Person";`


    `case SEARCH = "S: Search";`


    `static let ALL = [Command.LIST_PEOPLE, Command.ADD_PERSON,`


    `Command.DELETE_PERSON, Command.UPDATE_PERSON, Command.SEARCH];`


    `static func getFromInput(input:String) -> Command? {`


    `switch (input.lowercaseString) {`


    `case "l":`


    `return Command.LIST_PEOPLE;`


    `case "a":`


    `return Command.ADD_PERSON;`


    `case "d":`


    `return Command.DELETE_PERSON;`


    `case "u":`


    `return Command.UPDATE_PERSON;`


    `case "s":`


    `return Command.SEARCH;`


    `default:`


    `return nil;`


    `}`


    `}`


    `}`


    The `Command` enumeration defines values for each of the commands that the application
    will support, allowing the user to list all of the people in the application,
    add or delete people, modify a person’s detail, and perform a simple search.


    Swift enumerations don’t make it easy to get a list of all defined values, so
    I have defined a static constant called `ALL`, which is set to an array of the
    enumeration values. I have also defined a static method called `getFromInput`,
    which maps a `String` to an enumeration value. I’ll use the `getFromInput` method
    to select a command based on values read from the command line.'
  trans: "\n### 理解视图\n\n视图负责向用户展示视图模型。实现这一目标的方式多种多样，可能涉及生成 HTML 页面，也可能根据应用程序的需要创建或更新一组\
    \ `UIKit` 组件。\n\n视图通常通过框架创建，例如 `UIKit`，因为构建显示数据所需的基础设施是一个复杂的过程，不需要为每个应用程序从头开始重新创建。视图应执行以下操作：\n\
    \n*   包含向用户呈现数据所需的逻辑和标记\n\n视图不应执行以下操作：\n\n*   包含复杂的逻辑（这更适合放在控制器中）\n*   包含创建、存储或操作模型的逻辑\n\
    \n视图可以包含逻辑，但逻辑应简洁明了，并谨慎使用。在视图中放置除最简单的函数调用或表达式之外的任何内容，都会使整个应用程序更难以测试和维护。\n\n###\
    \ 理解横切关注点\n\n横切关注点是应用程序中不属于其他部分的那些部分。经典的例子是日志记录和授权，它们通常是整个应用程序所必需的。为不同部分创建重复的日志记录或安全功能是没有意义的，因此多个部分会使用同一个实现，例如，一旦用户通过身份验证，用户身份就可以在不同部分之间传播，而无需进一步的验证。\n\
    \n横切关注点的风险在于，那些本来更适合放在模型、视图或控制器中的功能和特性最终被定义为横切关注点，这会扭曲应用程序的形态，并破坏应用程序各部分之间的清晰分离。\n\
    \n在任何应用程序中，真正的横切关注点都很少，这意味着一旦你实现了日志记录和安全功能，就应该对其他作为横切关注点实现的任何特性持怀疑态度，并考虑该特性实际上是否应该属于模型、视图或控制器。\n\
    \n## 实现 MVC 模式\n\n学习 MVC 模式的最佳方式就是实现它。你在将应用程序中的关注点分离为模型、视图和控制器方面积累的经验越多，这个过程就会变得越自然。在接下来的几个小节中，我将使用\
    \ MVC 模式创建一个简单的命令行应用程序。我会逐步讲解整个过程，并解释沿途所做的决策。正如我之前提到的，MVC 模式为个人风格和诠释留下了很大空间，并且实现方式不可避免地会反映我对软件和开发的思考方式，并受到我通常从事的项目类型的影响。这并不意味着你应该盲目遵循我的方法。相反，你应该随意走自己的路，做出对你的开发环境和你开发的项目类型最有利的决策。\n\
    \n示例应用程序将管理一个人员名单及其所在的城市。作为一个独立的应用程序，它本身并不是特别有用，但其复杂性恰好足够让我实现 MVC 模式，同时应用程序的特性不会造成干扰。\n\
    \n### 定义公共代码\n\n在任何项目中，都有些函数需要在应用程序中全局使用。公共代码与横切关注点不同。根据经验法则，为避免重复而定义的函数和静态方法是公共代码；跨部分具有公共状态的特性是横切关注点。\n\
    \n我开始通过定义一些扩展来构建应用程序，这些扩展将用于将字符串拆分为数组、移除数组中的重复对象以及查找数组中第一个匹配指定测试的对象。我向示例项目添加了一个名为\
    \ `Extensions.swift` 的文件，其内容如列表 27-1 所示。\n\n**列表 27-1.** `Extensions.swift` 文件的内容\n\
    \n```\nimport Foundation\n\nextension String {\n\nfunc split() -> [String] { \n\
    return self.componentsSeparatedByCharactersInSet(\nNSCharacterSet.whitespaceAndNewlineCharacterSet())\n\
    .filter({$0 != \"\"});\n}\n\n}\n\nextension Array {\n\nfunc unique<T: Equatable>()\
    \ -> [T] {\nvar uniqueValues = [T]();\nfor value in self {\nif !contains(uniqueValues,\
    \ value as T) {\nuniqueValues.append(value as T);\n}\n}\nreturn uniqueValues;\n\
    }\n\nfunc first<T>(test:T -> Bool) -> T? {\nfor value in self {\nif test(value\
    \ as T) {\nreturn value as? T;\n}\n}\nreturn nil;\n}\n\n}\n```\n\n这些扩展与 MVC 模式的结构无关，我定义它们是为了避免项目中的代码重复。\n\
    \n### 定义框架\n\n模型、视图和控制器并非孤立存在。它们需要某种框架来将各个部分连接起来，接收和处理用户的交互，并在屏幕上显示内容。如果没有底层框架，每个应用程序都必须重新创建同一组底层函数，这将极其繁琐。作为\
    \ Swift 开发者，你最常使用的框架可能是 `UIKit` 和 `AppKit`，它们包含了所有底层特性，例如将鼠标点击转换为事件并在屏幕上绘制复杂的\
    \ UI 组件。\n\n命令行工具项目没有现成的 MVC 框架，所以我需要自己创建一个。在实际项目中，这将是一项严肃（且不明智）的任务，但书籍示例的优势之一就是简单，创建一个基础框架是展示\
    \ MVC 模式各部分如何协同工作的有用方法。\n\n示例应用程序将从 Xcode 控制台读取命令，该控制台也将用于向用户显示数据。列表 27-2 显示了\
    \ `Commands.swift` 文件的内容，我用它来定义应用程序将支持的命令。\n\n**列表 27-2.** `Commands.swift` 文件的内容\n\
    \n```\nimport Foundation\n\nenum Command : String { \ncase LIST_PEOPLE = \"L:\
    \ 列出人员\";\ncase ADD_PERSON = \"A: 添加人员\";\ncase DELETE_PERSON = \"D: 删除人员\";\n\
    case UPDATE_PERSON = \"U: 更新人员\";\ncase SEARCH = \"S: 搜索\";\n\nstatic let ALL\
    \ = [Command.LIST_PEOPLE, Command.ADD_PERSON,\nCommand.DELETE_PERSON, Command.UPDATE_PERSON,\
    \ Command.SEARCH];\n\nstatic func getFromInput(input:String) -> Command? {\nswitch\
    \ (input.lowercaseString) {\ncase \"l\":\nreturn Command.LIST_PEOPLE;\ncase \"\
    a\":\nreturn Command.ADD_PERSON;\ncase \"d\":\nreturn Command.DELETE_PERSON;\n\
    case \"u\":\nreturn Command.UPDATE_PERSON;\ncase \"s\":\nreturn Command.SEARCH;\n\
    default:\nreturn nil;\n}\n}\n}\n```\n\n`Command` 枚举为应用程序将支持的每个命令定义了值，允许用户列出应用程序中的所有人员、添加或删除人员、修改人员的详细信息以及执行简单的搜索。\n\
    \nSwift 枚举不容易获取所有已定义值的列表，所以我定义了一个名为 `ALL` 的静态常量，它被设置为一个包含枚举值的数组。我还定义了一个名为 `getFromInput`\
    \ 的静态方法，它将一个 `String` 映射到一个枚举值。我将使用 `getFromInput` 方法根据从命令行读取的值来选择命令。\n"
- fmt: "### Creating the Model\n\nI have put enough of the infrastructure in place\
    \ to allow me to start implementing the MVC sections. The model is the best place\
    \ to start when implementing MVC because the model types are used throughout the\
    \ application. Listing 27-3 shows the contents of the `Model.swift` file, which\
    \ I added to the example project.\n\n**Listing 27-3.** The Contents of the `Model.swift`\
    \ File\n\n```\nimport Foundation\n\nfunc == (lhs:Person, rhs:Person) -> Bool {\n\
    \    return lhs.name == rhs.name && lhs.city == rhs.city;\n}\n\nclass Person :\
    \ Equatable, Printable {\n    var name:String;\n    var city:String;\n    \n \
    \   init(_ name:String, _ city:String) {\n        self.name = name;\n        self.city\
    \ = city;\n    }\n    \n    var description: String {\n        return \"Name:\
    \ \\(self.name), City: \\(self.city)\";\n    }\n}\n```\n\nIn a real project, there\
    \ can be a wide range of model types to represent the different data objects that\
    \ an application handles, but the `Person` class is the only model type in the\
    \ example application. The `Person` class defines two stored properties, which\
    \ I will use for the name of a person and the city in which they live.\n\n####\
    \ Implementing the Repository Pattern\n\nI like to implement the repository pattern\
    \ when writing MVC applications, in which the data types are defined separately\
    \ from the mechanism that is used to store and retrieve them, which is known as\
    \ the model repository. This is why the `Person` class is so simple; it only needs\
    \ to store its data values and doesn’t need to pay attention about how those values\
    \ are obtained or persisted.\n\nThe advantage of the repository pattern is that\
    \ it allows the storage mechanism to be changed without needing to make corresponding\
    \ changes in the application’s model types. This can be helpful for testing the\
    \ application because you can replace the real repository with one that uses predefined\
    \ test values that are stored in memory. When starting a new MVC application,\
    \ I usually create an in-memory repository and only replace it with an implementation\
    \ that persists data to a database when the core functionality of the application\
    \ is in place.\n\nThe key to a good repository is to start with a protocol through\
    \ which the other components in the application will perform data operations,\
    \ and Listing 27-4 shows the repository protocol I defined in the example application.\n\
    \n**Listing 27-4.** Defining the Repository Protocol in the `Model.swift` File\n\
    \n```\nimport Foundation\n\nfunc == (lhs:Person, rhs:Person) -> Bool {\n    return\
    \ lhs.name == rhs.name && lhs.city == rhs.city;\n}\n\nclass Person : Equatable,\
    \ Printable {\n    var name:String;\n    var city:String;\n    \n    init(_ name:String,\
    \ _ city:String) {\n        self.name = name;\n        self.city = city;\n   \
    \ }\n    \n    var description: String {\n        return \"Name: \\(self.name),\
    \ City: \\(self.city)\";\n    }\n}\n\nprotocol Repository {\n    var People:[Person]\
    \ { get };\n    func addPerson(person:Person);\n    func removePerson(name:String);\n\
    \    func updatePerson(name:String, newCity:String);\n}\n```\n\n**Tip** The `Person`\
    \ class that I define in Listing 27-4 implements the `Equatable` and `Printable`\
    \ protocols. The `Equatable` protocol works with the `==` function I create in\
    \ the listing to allow `Person` objects to be compared to one another. The `Printable`\
    \ protocol is used when an object is passed to the `println` function, which writes\
    \ out the value of the `description` property.\n\nI have defined a read-only property\
    \ called `People` that will return all of the `Person` objects stored in the repository,\
    \ as well as methods that add, remove, and modify objects.\n\n**Tip** Exposing\
    \ all of the model objects as a collection such as an array makes it easy to consume\
    \ the data in other sections of the application, but doing so assumes that the\
    \ data can be retrieved efficiently. This should be done only if there are small\
    \ amounts of data in the application or if the storage mechanism is capable of\
    \ delivering content only when the elements in the collection are accessed.\n\n\
    In this chapter, I am only going to implement a nonpersistent in-memory repository,\
    \ which has the benefit of being simple and being reset to a known state each\
    \ time the application is restarted. Listing 27-5 shows how I defined the repository\
    \ implementation class.\n\n**Listing 27-5.** Defining the Repository Implementation\
    \ in the `Model.swift` File\n\n```\n...\n\nprotocol Repository {\n    var People:[Person]\
    \ { get };\n    func addPerson(person:Person);\n    func removePerson(name:String);\n\
    \    func updatePerson(name:String, newCity:String);\n}\n\nclass MemoryRepository\
    \ : Repository {\n    private var peopleArray:[Person];\n    \n    init() {\n\
    \        peopleArray = [\n            Person(\"Bob\", \"New York\"),\n       \
    \     Person(\"Alice\", \"London\"),\n            Person(\"Joe\", \"Paris\")];\n\
    \    }\n    \n    var People:[Person] {\n        return self.peopleArray;\n  \
    \  }\n    \n    func addPerson(person: Person) {\n        self.peopleArray.append(person);\n\
    \    }\n    \n    func removePerson(name: String) {\n        let nameLower = name.lowercaseString;\n\
    \        self.peopleArray = peopleArray.filter({$0.name.lowercaseString != nameLower});\n\
    \    }\n    \n    func updatePerson(name: String, newCity: String) {\n       \
    \ let nameLower = name.lowercaseString;\n        let test:Person -> Bool = {p\
    \ in return p.name.lowercaseString == nameLower};\n        if let person = peopleArray.first(test)\
    \ {\n            person.city = newCity;\n        }\n    }\n}\n\n...\n```\n\nThe\
    \ repository uses a standard Swift array to store its model objects, and the array\
    \ is populated with some sample objects in the class initializer. As I explained\
    \ in [Chapter 5](#A978-1-4842-0394-1_5_Chapter.html), Swift arrays are value types,\
    \ which means that a copy of the array is created when a calling component assigns\
    \ the array returned by the `People` property to a local variable or constant.\
    \ It is for this reason that I have implemented separate methods for adding, removing,\
    \ or modifying data objects because the array that a calling component operates\
    \ on will be different.\n\n**Note** I have explained the importance of concurrency\
    \ protections in many of the chapters in this book. This project is a rare example\
    \ of an application that doesn’t need them. It will be accessed by only one thread\
    \ at a time because I will be reading instructions from the command line and then\
    \ executing them. In a real project, however, you must ensure that your repository\
    \ is thread-safe, either because you use a mechanism like Grand Central Dispatch\
    \ in your implementation class or because the storage mechanism you are relying\
    \ on is inherently thread-safe."
