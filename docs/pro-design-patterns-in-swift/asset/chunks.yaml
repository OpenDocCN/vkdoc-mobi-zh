    \ UI 组件的引用，这会很快变得笨拙，并使应用修改变得棘手且容易出错。\n\n## 扩展摘要显示\n\n在本章中，我一直对元组持批评态度，但当它们以自包含的方式使用时，而不是用来表示应用全局数据时，它们可以是一种有用的语言特性。\n\
