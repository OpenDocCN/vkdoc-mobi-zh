- fmt: "## Examples of the Memento Pattern in Cocoa\n\nCocoa provides an implementation\
    \ of the memento pattern through the `NSCoding` protocol. An originator object\
    \ conforms to the protocol and works with an `NSCoder` object to produce a snapshot\
    \ of its state. `NSCoder` can be subclassed to support different data formats,\
    \ or the built-in implementations can be used. Listing 23-9 shows how I have changed\
    \ the `Ledger` class so that it conforms to the protocol.\n\nListing 23-9. Conforming\
    \ to the NSCoding Protocol in the Ledger.swift File\n\n```\nimport Foundation;\n\
    \nclass LedgerEntry {\n    let id:Int;\n    let counterParty:String;\n    let\
    \ amount:Float;\n\n    init(id:Int, counterParty:String, amount:Float) {\n   \
    \     self.id = id; self.counterParty = counterParty; self.amount = amount;\n\
    \    }\n}\n\nclass LedgerMemento : Memento {\n    let data:NSData;\n    init(data:NSData)\
    \ { self.data = data;}\n}\n\nclass Ledger : NSObject, Originator, NSCoding {\n\
    \    private var entries = [Int:LedgerEntry]();\n    private var nextId = 1;\n\
    \    var total:Float = 0;\n\n    override init() {\n        // do nothing - required\
    \ to allow instances\n        // to be created without a coder\n    }\n\n    required\
    \ init(coder aDecoder: NSCoder) {\n        self.total = aDecoder.decodeFloatForKey(\"\
    total\");\n        self.nextId = aDecoder.decodeIntegerForKey(\"nextId\");\n \
    \       self.entries.removeAll(keepCapacity: true);\n        if let entryArray\
    \ = aDecoder.decodeDataObject()\n            as AnyObject? as? [NSDictionary]\
    \ {\n                for entryDict in entryArray {\n                    let id\
    \ = entryDict[\"id\"] as Int;\n                    let counterParty = entryDict[\"\
    counterParty\"] as String;\n                    let amount = entryDict[\"amount\"\
    ] as Float;\n                    self.entries[id] = LedgerEntry(id: id, counterParty:\
    \ counterParty,\n                        amount: amount);\n                }\n\
    \        }\n    }\n\n    func encodeWithCoder(aCoder: NSCoder) {\n        aCoder.encodeFloat(total,\
    \ forKey: \"total\");\n        aCoder.encodeInteger(nextId, forKey: \"nextId\"\
    );\n        var entriesArray = [NSMutableDictionary]();\n        for entry in\
    \ self.entries.values {\n            var dict = NSMutableDictionary();\n     \
    \       dict[\"id\"] = entry.id;\n            dict[\"counterParty\"] = entry.counterParty;\n\
    \            dict[\"amount\"] = entry.amount;\n            entriesArray.append(dict);\n\
    \        }\n        aCoder.encodeObject(entriesArray);\n    }\n\n    func createMemento()\
    \ -> Memento {\n        return LedgerMemento(data:\n            NSKeyedArchiver.archivedDataWithRootObject(self));\n\
    \    }\n\n    func applyMemento(memento: Memento) {\n        if let lmemento =\
    \ memento as? LedgerMemento {\n            if let obj = NSKeyedUnarchiver.unarchiveObjectWithData(lmemento.data)\n\
    \                as? Ledger {\n                    self.total = obj.total;\n \
    \                   self.nextId = obj.nextId;\n                    self.entries\
    \ = obj.entries;\n            }\n        }\n    }\n\n    func addEntry(counterParty:String,\
    \ amount:Float) {\n        let entry = LedgerEntry(id: nextId++, counterParty:\
    \ counterParty,\n            amount: amount);\n        entries[entry.id] = entry;\n\
    \        total += amount;\n    }\n\n    func printEntries() {\n        for id\
    \ in entries.keys.array.sorted(<) {\n            if let entry = entries[id] {\n\
    \                println(\"#\\(id): \\(entry.counterParty) $\\(entry.amount)\"\
    );\n            }\n        }\n        println(\"Total: $\\(total)\");\n      \
    \  println(\"----\");\n    }\n}\n```\n\nNote\n\nThe `NSCoding` protocol isn’t\
    \ the only way that Apple supports object persistence. You can also use the Core\
    \ Data framework, which is a framework that allows objects to be stored persistently\
    \ and manipulated. Wikipedia provides a nice overview of Core Data at [`http://en.wikipedia.org/wiki/Core_Data`](http://en.wikipedia.org/wiki/Core_Data).\n\
    \nUsing the `NSCoding` protocol means encoding the originator’s state as an `NSData`\
    \ object, so the first change is to make the `LedgerMemento` class a wrapper around\
    \ an `NSData` object. I don’t want to expose the technique the originator uses\
    \ to represent its state to the caretaker, and the easiest way to do this is to\
    \ keep using the `Memento` protocol.\n\nA class that conforms to the `NSCoding`\
    \ protocol must be derived from `NSObject`, which provides some of the features\
    \ that are required to create mementos. The protocol defines the `encodeWithEncoder`\
    \ method, which is used to create mementos. Rather like the JSON serialization\
    \ I used earlier in the chapter, I have to represent the internal state of the\
    \ originator as a set of key-value pairs, and you can see the obvious similarities\
    \ in the method implementation, although individual objects are added to the memento\
    \ through the methods of the encoder.\n\nIn the `createMemento` method specified\
    \ by my `Originator` protocol, I select the coder that will be used to represent\
    \ the data, like this:\n\n```\n...\nfunc createMemento() -> Memento {\n    return\
    \ LedgerMemento(data: NSKeyedArchiver.archivedDataWithRootObject(self));\n}\n\
    ...\n```\n\nThe `NSKeyedArchiver` is one of the built-in coder implementations\
    \ provided by Apple, and calling its `archivedDataWithRootObject` method encodes\
    \ the state of the originator within an `NSData` object that I wrap in a `LedgerMemento`\
    \ and return as the method result.\n\nThe `NSCoding` protocol specifies a required\
    \ initializer for decoding a memento. The initializer creates a new instance of\
    \ the originator class from the memento rather than setting the state of an existing\
    \ object, so I have to explicitly copy the data values in the `applyMemento` method,\
    \ like this:\n\n```\n...\nfunc applyMemento(memento: Memento) {\n    if let lmemento\
    \ = memento as? LedgerMemento {\n        if let obj = NSKeyedUnarchiver.unarchiveObjectWithData(lmemento.data)\n\
    \            as? Ledger {\n                self.total = obj.total;\n         \
    \       self.nextId = obj.nextId;\n                self.entries = obj.entries;\n\
    \        }\n    }\n}\n...\n```\n\nThe required initializer is invoked by my call\
    \ to the `unarchiveObjectWithData` method of the `NSKeyedUnarchiver` class, which\
    \ accepts the `NSData` memento and decodes it so that I can read the key-value\
    \ pairs and extract the state data it contains. Listing 23-10 shows the changes\
    \ I made to the `main.swift` file to use the modified memento.\n\nListing 23-10.\
    \ Using Coding in the main.swift File\n\n```\nlet ledger = Ledger();\nledger.addEntry(\"\
    Bob\", amount: 100.43);\nledger.addEntry(\"Joe\", amount: 200.20);\nlet memento\
    \ = ledger.createMemento();\nledger.applyMemento(memento);\nledger.printEntries();\n\
    ```\n\nRunning the example application produces the following results:\n\n```\n\
    #1: Bob $100.43\n#2: Joe $200.2\nTotal: $300.63\n```\n\n## Applying the Pattern\
    \ to the SportsStore Application\n\nIn this section, I am going to combine the\
    \ command and memento patterns to replace the undo feature I added in [Chapter\
    \ 20](#A978-1-4842-0394-1_20_Chapter.html) with the ability to reset the application\
    \ entirely.\n\nMost implementations of the memento pattern are based on taking\
    \ and returning to multiple snapshots, but that is only one interpretation of\
    \ how a memento should work. As I explained, the way that a memento works is entirely\
    \ down to the implementation, and it need not contain the data values that an\
    \ object contained. It can also be a trigger for some other kind of action, including\
    \ discarding any changes made by the user and reloading the original data. In\
    \ this case, the memento will be a command that calls a method that resets the\
    \ data in the application.\n\n### Preparing the Example Application\n\nIn preparation\
    \ for the pattern, I need to add a method to the `ProductDataStore` class that\
    \ will reset the data and discard any changes made by the user. Listing 23-11\
    \ shows the addition I made.\n\nListing 23-11. Adding a Reset Method in the ProductDataStore.swift\
    \ File\n\n```\nimport Foundation\n\nfinal class ProductDataStore {\n    var callback:((Product)\
    \ -> Void)?;\n    private var networkQ:dispatch_queue_t\n    private var uiQ:dispatch_queue_t;\n\
    \    lazy var products:[Product] = self.loadData();\n\n    init() {\n        networkQ\
    \ = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);\n      \
    \  uiQ = dispatch_get_main_queue();\n    }\n\n    func resetState() {\n      \
    \  self.products = loadData();\n    }\n\n    // ...method and statements omitted\
    \ for brevity...\n}\n```"
