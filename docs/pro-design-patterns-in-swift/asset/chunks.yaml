- fmt: '# Creating an Unstructured iOS App Project


    In this section, I create a simple iOS app that allows a user to buy products
    from a retailer called SportsStore. I am going to implement only part of the shopping
    process in order to create an easy-to-understand example that doesn’t require
    complex visual layouts and lets me focus on the structure of the code.


    This is fortunate because I am one of the worst interface designers in the world.
    You will get a sense of my lack of aesthetic when you see the iOS layout I create—let’s
    just call it minimalistic chic and move on. (In my own projects, I work with a
    professional designer, and I encourage you to do the same if you are similarly
    style-challenged).


    The style of development I use in this section is known as a single-class application,
    which has no structure or design. This is a common development style, especially
    for programmers who have little experience of object-oriented languages.


    This is the “before” in my proposition for the value of design patterns, and I
    introduce the “after” as I show you each pattern. I have, therefore, built this
    app so that I can emphasize the impact of the design patterns I describe, but
    this style of development is pretty common, and you can see code like this in
    just about any project, especially from developers who have recently made the
    transition to object-oriented languages. I am confident that if you think about
    the programmers you know, there will be at least person you can think of who writes
    similar code.


    **Tip:** I describe the process for creating the application step by step because
    many readers will be new to the world of Xcode and Swift. If you are an experienced
    Xcode user, then you can skip to [Chapter 4](#A978-1-4842-0394-1_4_Chapter.html)
    and just download the project from Apress.com.


    The application that I am going to create is a simple stock management tool for
    an imaginary sports equipment retailer called SportsStore. I use SportsStore in
    one form or another in most of my books, and it lets me highlight the way that
    common problems can be addressed using different languages, platforms, and patterns.
    Figure [3-1](#A978-1-4842-0394-1_3_Chapter.html#Fig1) shows a mock-up of the initial
    interface that I will create for the SportsStore application.


    ![A978-1-4842-0394-1_3_Fig1_HTML.jpg](A978-1-4842-0394-1_3_Fig1_HTML.jpg)


    **Figure 3-1.** The mock-up for the SportsStore example application


    The user will be presented with a list of products displayed in a table. For each
    product, the name and a description will be displayed along with the current number
    of items in stock. The user will be able to edit the stock level directly using
    a text field or increment and decrement the value with a stepper.


    **THE VALUE OF EXAMPLE APPLICATIONS**


    I am not for a second going to pretend that the SportsStore application is useful
    in its own right—but that is not the point of an example. The goal is to give
    me a framework that I can use to demonstrate different patterns in a broader context
    than just a fragment of code in a playground or command-line tool.


    The SportsStore example is just complex enough to me to demonstrate how to apply
    patterns without causing me to deal with difficult issues such as data persistence,
    security, data validation, and all of the other matters that have to be taken
    into account in a real project.


    The problem with creating a more realistic application is that too much of the
    book is then given over to writing code that isn’t directly related to the subject
    at hand. That is not the kind of book I want to write and, I hope, not the kind
    you want to read.


    ### Creating the Project


    To create a new project, select **New** ➤ **Project** from the Xcode **File**
    menu. You will be presented with the range of project types that Xcode supports.
    Select **Single View Application** from the **iOS** ➤ **Application** section,
    as shown in Figure [3-2](#A978-1-4842-0394-1_3_Chapter.html#Fig2).


    ![A978-1-4842-0394-1_3_Fig2_HTML.jpg](A978-1-4842-0394-1_3_Fig2_HTML.jpg)


    **Figure 3-2.** Selecting the Xcode project type


    Click the **Next** button, and you will be asked to choose options for the new
    project. Set **Product Name** to `SportsStore` and enter `Apress` and `com.apress`
    for **Organization Name** and **Identifier**, respectively. Ensure that `Swift`
    is selected for **Language**, that `iPad` is selected for the **Devices** option,
    and that the **Use Core Data** option unchecked, as shown in Figure [3-3](#A978-1-4842-0394-1_3_Chapter.html#Fig3).


    ![A978-1-4842-0394-1_3_Fig3_HTML.jpg](A978-1-4842-0394-1_3_Fig3_HTML.jpg)


    **Figure 3-3.** Choosing options for the new Xcode project


    Click the **Next** button, and you will be prompted for a save location for the
    project files. Select a convenient location and click the **Create** button to
    generate the initial content for the project.


    ### Understanding the Xcode Layout


    Xcode will create the project, and you will be presented with the default view
    of the project, which I have shown in Figure [3-4](#A978-1-4842-0394-1_3_Chapter.html#Fig4).
    The layout and the panes it contains are the same ones I described in [Chapter
    2](#A978-1-4842-0394-1_2_Chapter.html).


    ![A978-1-4842-0394-1_3_Fig4_HTML.jpg](A978-1-4842-0394-1_3_Fig4_HTML.jpg)


    **Figure 3-4.** The Xcode project layout'
