    `Order for Bob: Cost: $668.40`


    ## Understanding the Pitfalls of the Composite Pattern


    The composite pattern works best when the tree structure that is created is fixed.
    The main pitfall for the composite pattern occurs when you need to be able to
    change the structure after it has been created. Listing 15-7 shows the changes
    I made to the `CompositePart` class to support changes.


    Listing 15-7. Adding Support for Composite Collection Changes in the CarParts.swift
    File


    `...`


    `class CompositePart : CarPart {`


    `let name:String;`


