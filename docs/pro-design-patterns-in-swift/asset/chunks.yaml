    `}`


    #### Defining the New Controller


    The view I created in the previous section displays the city information, but
    I need a controller to handle the new commands I defined, as shown in Listing
    27-13.


    Listing 27-13. Defining a New Controller in the Controllers.swift File


    `class ControllerBase {`


    `private let repository:Repository;`


    `private let nextController:ControllerBase?;`


    `init(repo:Repository, nextController:ControllerBase?) {`


    `self.repository = repo;`


    `self.nextController = nextController;`


    `}`


    `func handleCommand(command:Command, data:[String]) -> View? {`


    `return nextController?.handleCommand(command, data:data);`


    `}`


    `}`


    `class PersonController : ControllerBase {`


    `//` `...statements omitted for brevity...`


    `}`


    `class CityController : ControllerBase {`


    `override func handleCommand(command: Command, data: [String]) -> View? {`


    `switch command {`


    `case .LIST_CITIES:`


    `return listAll();`


    `case .SEARCH_CITIES:`


    `return search(data[0]);`


    `case .DELETE_CITY:`


    `return delete(data[0]);`


    `default:`


    `return super.handleCommand(command, data: data);`


    `}`


    `}`


    `private func listAll() -> View {`


    `return CityListView(data: repository.People.map({$0.city}).unique());`


    `}`


    `private func search(city:String) -> View {`


    `let cityLower = city.lowercaseString;`


    `let matches:[Person] = repository.People`


    `.filter({ $0.city.lowercaseString == cityLower });`


    `return PersonListView(data: matches);`


    `}`


    `private func delete(city:String) -> View {`


    `let cityLower = city.lowercaseString;`


    `let toDelete = repository.People .filter({ $0.city.lowercaseString == cityLower
    });`


    `for person in toDelete {`


    `repository.removePerson(person.name);`


    `}`


    `return PersonListView(data: repository.People);`


    `}`


    `}`


    The `CityController` class follows the same pattern as the existing controller
    and uses the `handleCommand` method to select one of the `private` command-specific
    methods, which operate on the model through the repository and select a view.


    Notice that only the `listAll` method uses the newly defined view, while the `search`
    and `delete` methods rely on the original `PersonListView` class. There is no
    tie between views and controllers, and in most MVC applications controllers can
    select any view that can display the data generated by the command being processed.


    #### Updating the Framework


    The final step is to add the new controller to the chain of responsibility maintained
    by the framework in the `main.swift` file so that a `CityController` object is
    offered the chance to handle commands, as shown in Listing 27-14.


    Listing 27-14. Extending the Chain of Responsibility in the main.swift File


    `...`


    `let repository = MemoryRepository();`


    `let controllerChain = PersonController(repo: repository, nextController:`


    `CityController(repo: repository, nextController: nil));`


    `var stdIn = NSFileHandle.fileHandleWithStandardInput();`


    `var command = Command.LIST_PEOPLE;`


    `var data = [String]();`


    `...`


    #### Testing the Changes


    You can test the changes by running the application and entering commands into
    the Xcode debug console. As an example, here is the output shown when I search
    for a `city` value:


    `sc london`


    `Command SC: Search Cities Data [london]`


    `Name: Alice, City: London`


    `--Commands--`


    `L: List People`


    `A: Add Person`


    `D: Delete Person`


    `U: Update Person`


    `S: Search`


    `LC: List Cities`


    `SC: Search Cities`


    `DC: Delete City`


    Notice how I have been able to extend the functionality of the example application
    without needing to change any of the existing model, view, or controller code.
    I defined a new set of commands and then added new code to respond to them and
    display the data that was generated. Each of the components in the application
    is focused on a narrow range of tasks and is loosely coupled to the other components,
    making it easy to isolate a component for testing or to add or change features.


    ## Variations on the MVC Pattern


    There are many variations in the way that the MVC pattern is implemented and variations
    on the pattern itself. The only variation that matters to Swift developers is
    using a predefined MVC framework. The most commonly used frameworks are `UIKit`
    and `AppKit`. Creating your own MVC framework is an interesting experiment, and
    it reveals a lot about how the different sections of the pattern fit together,
    but for real applications, stick to the MVC frameworks provided by Apple, which
    provide a lot of ready-made functionality and which have been thoroughly tested.


    ## Understanding the Pitfalls of the MVC Pattern


    The most common pitfall is to define code in one section that belongs in another.
    As I explained at the start of the chapter, this isn’t always a clear-cut decision,
    and the best way to avoid this pitfall is through experience. Implementing the
    MVC pattern successfully depends on understanding the way that your development
    processes work, and the more often you apply the MVC pattern, the better your
    understanding of what works for your projects and what doesn’t. Take your time
    to think through what you are doing, be prepared to refactor when you change your
    mind about a feature, and leave yourself opportunities to experiment.


    ## Examples of the MVC Pattern in Cocoa


    The most obvious examples of the MVC pattern are the `AppKit` and `UIKit` frameworks,
    which use MVC to enforce structure in UI applications.


    ## Summary


    In this chapter I described the MVC pattern and explained how it is used to add
    structure to a complete application. I explained the different sections that make
    up the MVC pattern and created an example application and framework as an example
    implementation.


    And that is all I have to teach you about design patterns. I have described each
    of the most important design patterns that you can apply to a Swift project and
    explained that you should use the implementations I provided as a starting point
    for your own applications, adapting the patterns as needed to suit your needs,
    preferences, and coding style. I wish you every success in your Swift project,
    and I can only hope you have enjoyed reading this book as much as I have enjoyed
    writing it.'
