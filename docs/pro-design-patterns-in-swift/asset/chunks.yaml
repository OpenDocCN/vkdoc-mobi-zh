    The first step is to update the `Product` class that I created in [Chapter 4](#A978-1-4842-0394-1_4_Chapter.html)
    so that it can be cloned. To do this, I must set the base class to `NSObject`
    and implement the `NSCopying` protocol, but there are some wrinkles to be worked
    around, as Listing 5-21 illustrates.


    Listing 5-21. Implementing the NSCopying Protocol in the Product.swift File


    `import Foundation`


    `class Product : NSObject, NSCopying {`


    `private(set) var name:String;`


    `private(set) var productDescription:String;`


    `private(set) var category:String;`


    `private var stockLevelBackingValue:Int = 0;`


    `private var priceBackingValue:Double = 0;`


    `init(name:String, description:String, category:String, price:Double,`


    `stockLevel:Int) {`


    `self.name = name;`


    `self.productDescription = description;`


    `self.category = category;`


    `super.init();`


    `self.price = price;`


    `self.stockLevel = stockLevel;`


    `}`


    `var stockLevel:Int {`


    `get { return stockLevelBackingValue;}`


    `set { stockLevelBackingValue = max(0, newValue);}`


    `}`


    `private(set) var price:Double {`


    `get { return priceBackingValue;}`


    `set { priceBackingValue = max(1, newValue);}`


    `}`


    `var stockValue:Double {`


    `get {`


    `return price * Double(stockLevel);`


    `}`


    `}`


    `func copyWithZone(zone: NSZone) -> AnyObject {`


    `return Product(name: self.name, description: self.description,`


    `category: self.category, price: self.price,`


    `stockLevel: self.stockLevel);`


    `}`


    `}`


    The changes in Listing 5-21 highlight two common issues that arise when support
    for cloning is applied retrospectively to an existing class. The first is that
    I have had to change the name of the stored property that describes the product
    because the `NSObject` class defines a method called `description`. I change the
    name of the property as follows:


    `...`


    `private(set) var` `productDescription` `:String;`


    `...`


    I have not used this property in the application yet, so no additional changes
    are required. In a real application, some judicious refactoring would be required.
    This isn’t the end of the world, but it is preferable to apply the prototype pattern
    as early as possible in the development process to avoid this kind of issue.


    The second issue is also caused by the change to the `NSObject` base class. Initializers
    of subclasses invoke the initializer of their superclass, but this must be done
    after the stored properties have been set and before the computed properties are
    used. It is for this reason that I have called `super.init` in the middle of the
    `Product` class initializer.


    ### Creating the Logger Class


    I need a way of tracking the changes that are made to the `Product` objects in
    the application. I added a file called `Logger.swift` to the project, the contents
    of which are shown in Listing 5-22.


    Listing 5-22. The Contents of the Logger.swift File


    `import Foundation`


    `class Logger<T where T:NSObject, T:NSCopying> {`


    `var dataItems:[T] = [];`


    `var callback:(T) -> Void;`


    `init(callback:T -> Void) {`


    `self.callback = callback;`


    `}`


    `func logItem(item:T) {`


    `dataItems.append(item.copy() as T);`


    `callback(item);`


    `}`


    `func processItems(callback:T -> Void) {`


    `for item in dataItems {`


    `callback(item);`


    `}`


    `}`


    `}`


    This is a generic version of the class I used in the “Implementing the Prototype
    Pattern” section. I have applied a constraint to the generic type parameter that
    ensures that the `Logger` class can be used to store only objects that are derived
    from `NSObject` and implement the `NSCopying` protocol. The `Logger` class defines
    an initializer that takes a callback function that is passed new items as they
    are logged. This allows me to dispatch details of new items in a rough and ready
    way, but I’ll demonstrate a better approach in [Chapter 22](#A978-1-4842-0394-1_22_Chapter.html),
    when I describe the observer pattern.


    ### Logging Changes in the View Controller


    I can now log changes by creating an instance of the `Logger` class and using
    it to store `Product` objects when the user specifies a different stock level.
    Since I am still working with an unstructured app, these changes go into the `ViewController.swift`
    file, as shown in Listing 5-23\. (I have omitted a lot of the content of this
    file from the listing because the changes are small but spread throughout the
    file.) The callback function I have provided as the `Logger` initializer argument
    writes out the name and stock level of the changed product.


    Listing 5-23. Logging Product Changes in the ViewController.swift File


    `import UIKit`


    `//` `...ProductTableCell class omitted for brevity...`


    `var handler = { (p:Product) in`


    `println("Change: \(p.name) \(p.stockLevel) items in stock");`


    `};`


    `class ViewController: UIViewController, UITableViewDataSource {`


    `@IBOutlet weak var totalStockLabel: UILabel!`


    `@IBOutlet weak var tableView: UITableView!`


    `let logger = Logger<Product>(callback: handler);`


    `var products = [`


    `Product(name:"Kayak", description:"A boat for one person",`


    `category:"Watersports", price:275.0, stockLevel:10),`


    `//` `...other products omitted for brevity...`


    `Product(name:"Bling-Bling King",`


    `description:"Gold-plated, diamond-studded King",`


    `category:"Chess", price:1200.0, stockLevel:4)];`


    `//` `...methods omitted for brevity...`


    `func tableView(tableView: UITableView,`


    `cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell {`


    `let product = products[indexPath.row];`


    `let cell = tableView.dequeueReusableCellWithIdentifier("ProductCell")`


    `as ProductTableCell;`


    `cell.product = products[indexPath.row];`


    `cell.nameLabel.text = product.name;`


    `cell.descriptionLabel.text = product.productDescription;`


    `cell.stockStepper.value = Double(product.stockLevel);`


    `cell.stockField.text = String(product.stockLevel);`


    `return cell;`


    `}`


    `@IBAction func stockLevelDidChange(sender: AnyObject) {`


