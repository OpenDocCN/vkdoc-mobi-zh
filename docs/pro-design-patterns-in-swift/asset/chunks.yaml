    Bob\", amount: 100.43);\nledger.addEntry(\"Joe\", amount: 200.20);\nlet aliceUndoCommand\
    \ = ledger.addEntry(\"Alice\", amount: 500);\nlet tonyUndoCommand = ledger.addEntry(\"\
    Tony\", amount: 20);\nledger.printEntries();\ntonyUndoCommand.execute();\naliceUndoCommand.execute();\n\
    ledger.printEntries();\n```\n\n这是一种混乱的方法，因为它依赖于一个组件能够访问所有撤销命令并知道它们应该被应用的顺序，这在多个组件操作同一个\
    \ `Ledger` 对象时很难实现。每个组件只会有部分撤销命令，而它们的应用顺序是未知的。\n\n简而言之，尝试使用单个撤销命令来展开或重置对象的状态是有问题的；我需要一种更灵活的方法，不必将跟踪需要应用的更改以恢复到可信快照或检查点的责任全部压在调用组件身上。\n"
- fmt: '# Understanding the Memento Pattern


    There are two participants in the memento patterns: the originator and the caretaker.
    The originator is the object whose state may be unwound, such as the `Ledger`
    in the example application. The caretaker is the calling component that will tell
    the originator when its state should be unwound, which is the code in the `main.swift`
    file in the example.


    The originator provides the caretaker with a memento, which is an object that
    contains instructions or data required to return the originator to an earlier
    state. The details of the memento are hidden from the caretaker, which cannot
    modify or manipulate the state it contains. At some point in the future, the caretaker
    returns the memento to the originator, which uses the instructions or data to
    unwind its state. Figure [23-1](#A978-1-4842-0394-1_23_Chapter.html#Fig1) illustrates
    the memento pattern.


    ![A978-1-4842-0394-1_23_Fig1_HTML.jpg](A978-1-4842-0394-1_23_Fig1_HTML.jpg)


    Figure 23-1. The memento pattern


    The easiest way to understand the memento pattern is to focus on the four phases
    that underpin it, as numbered in the figure.


    In the first phase, the caretaker performs normal operations on the originator,
    each of which modifies its state. In the second phase, the caretaker requests
    a memento from the originator. The creation of the memento object doesn’t change
    the state of the originator; it just captures the present state so that the originator
    can return to it later.


    In the third phase, the caretaker performs further operations on the originator,
    which further modify its state. In the fourth and final phase, the caretaker returns
    the memento object to the originator, which uses it to restore its state to the
    point at which the memento was created.


    By encapsulating a snapshot of the originator’s state into an object, the memento
    pattern avoids the problems I encountered when using undo commands to unwind state.
    The caretaker doesn’t need to keep track of the operations that have been performed
    or worry about operations performed by other components; it simply returns the
    memento to the originator when it wants the state to be unwound.


    Using a memento allows for a lot of flexibility. The memento object can be used
    by a different component than the original caretaker, it can be used to repeatedly
    unwind the state to the same point, and it can be used to transfer the state of
    one object to another.


    # Implementing the Memento Pattern


    The implementation of the memento pattern is based on two protocols: one for the
    originator and one for the memento. The caretaker doesn’t require its own protocol
    since it is just a calling component that takes advantage of the functionality
    provided by the originator. Listing 23-4 shows the contents of the `Memento.swift`
    file, which I added to the example project.


    Listing 23-4. The Contents of the Memento.swift File


    ```

    import Foundation


    protocol Memento {


    // no methods or properties defined


    }


    protocol Originator {


    func createMemento() -> Memento;


    func applyMemento(memento:Memento);


    }

    ```


    The `Memento` protocol doesn’t define any methods or properties, and that’s because
    all of its implementation details are private, meaning that the only purpose of
    the protocol is to denote that an object is a memento.


    The `Originator` protocol defines a `createMemento()` that will produce a memento
    of the current state and an `applyMemento()` method that accepts a memento and
    uses it to restore the originator to the state it defines.


    ## Implementing the Memento Class


    The implementation detail of a memento is entirely at the discretion of the originator
    as long as two basic conditions are met. The first condition is that the caretaker
    should not be able to modify the state that the memento contains in any way. The
    second condition is that the memento should always work, regardless of the current
    state of the originator.


    In practice, this means an originator either contains a static snapshot of the
    state data or consists of a set of operations that reset the state and are then
    applied in sequence, rather like the command macros I described in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html).
    Listing 23-5 shows how I have the pattern in the example project. (I have also
    removed the undo commands to keep the example simple, but there is no reason why
    the command and memento patterns cannot coexist in an application).


    Listing 23-5. Creating the Memento and Originator in the Ledger.swift File


    ```

    import Foundation


    class LedgerEntry {


    let id:Int;


    let counterParty:String;


    let amount:Float;


    init(id:Int, counterParty:String, amount:Float) {


    self.id = id; self.counterParty = counterParty; self.amount = amount;


    }


    }


    class LedgerMemento : Memento {


    private let entries = [LedgerEntry]();


    private let total:Float;


    private let nextId:Int;


    init(ledger:Ledger) {


    self.entries = ledger.entries.values.array;


    self.total = ledger.total;


    self.nextId = ledger.nextId;


    }


    func apply(ledger:Ledger) {


    ledger.total = self.total;


    ledger.nextId = self.nextId;


    ledger.entries.removeAll(keepCapacity: true);


    for entry in self.entries {


    ledger.entries[entry.id] = entry;


    }


    }


    }


    class Ledger : Originator {


    private var entries = [Int:LedgerEntry]();


    private var nextId = 1;


    var total:Float = 0;


    func addEntry(counterParty:String, amount:Float) {


    let entry = LedgerEntry(id: nextId++, counterParty: counterParty, amount: amount);


    entries[entry.id] = entry;


    total += amount;


    }


    func createMemento() -> Memento {


    return LedgerMemento(ledger: self);


    }


    func applyMemento(memento: Memento) {


    if let m = memento as? LedgerMemento {


    m.apply(self);


    }


    }


    func printEntries() {


    for id in entries.keys.array.sorted(<) {


    if let entry = entries[id] {


    println("#\(id): \(entry.counterParty) $\(entry.amount)");


    }


    }


    println("Total: $\(total)");


    println("----");


    }


    }

    ```


    It is important that the memento sets or re-creates every aspect of the state
    of the originator. In the case of the example application, this means I need to
    set the `nextId` and `total` properties directly and populate the dictionary of
    ledger entries.


    ## Using the Memento


    The final step is to obtain and use a memento in the `main.swift` file, which
    plays the role of the caretaker in the example. Listing 23-6 shows the changes
    I made.


    Listing 23-6. Using a Memento in the main.swift File


    ```

    let ledger = Ledger();


    ledger.addEntry("Bob", amount: 100.43);


    ledger.addEntry("Joe", amount: 200.20);


    let memento = ledger.createMemento();


    ledger.addEntry("Alice", amount: 500);


    ledger.addEntry("Tony", amount: 20);


    ledger.printEntries();


    ledger.applyMemento(memento);


    ledger.printEntries();

    ```


    The memento restores the ledger to its earlier state. Running the application
    produces the following output:


    ```

    #1: Bob $100.43


    #2: Joe $200.2


    #3: Alice $500.0


    #4: Tony $20.0


    Total: $820.63


    ----


    #1: Bob $100.43


    #2: Joe $200.2


    Total: $300.63

    ```


    The effect is the same as when I used the command pattern to create individual
    undo commands, but the implementation is more robust and flexible.'
  raw: '## Understanding the Memento Pattern


    There are two participants in the memento patterns: the originator and the caretaker.
    The originator is the object whose state may be unwound, such as the `Ledger`
    in the example application. The caretaker is the calling component that will tell
    the originator when its state should be unwound, which is the code in the `main.swift`
    file in the example.


    The originator provides the caretaker with amemento, which is an object that contains
    instructions or data required to return the originator to an earlier state. The
    details of the memento are hidden from the caretaker, which cannot modify or manipulate
    the state it contains. At some point in the future, the caretaker returns the
    memento to the originator, which uses the instructions or data to unwind its state.
    Figure [23-1](#A978-1-4842-0394-1_23_Chapter.html#Fig1) illustrates the memento
    pattern.


    ![A978-1-4842-0394-1_23_Fig1_HTML.jpg](A978-1-4842-0394-1_23_Fig1_HTML.jpg)


    Figure 23-1.


    The memento pattern


    The easiest way to understand the memento pattern is to focus on the four phases
    that underpin it, as numbered in the figure.


    In the first phase, the caretaker performs normal operations on the originator,
    each of which modifies its state. In the second phase, the caretaker requests
    a memento from the originator. The creation of the memento object doesn’t change
    the state of the originator; it just captures the present state so that the originator
    can return to it later.


    In the third phase, the caretaker performs further operations on the originator,
    which further modify its state. In the fourth and final phase, the caretaker returns
    the memento object to the originator, which uses it to restore its state to the
    point at which the memento was created.


    By encapsulating a snapshot of the originator’s state into an object, the memento
    pattern avoids the problems I encountered when using undo commands to unwind state.
    The caretaker doesn’t need to keep track of the operations that have been performed
    or worry about operations performed by other components; it simply returns the
    memento to the originator when it wants the state to be unwound.


    Using a memento allows for a lot of flexibility. The memento object can be used
    by a different component than the original caretaker, it can be used to repeatedly
    unwind the state to the same point, and it can be used to transfer the state of
    one object to another.


    ## Implementing the Memento Pattern


    The implementation of the memento pattern is based on two protocols: one for the
    originator and one for the memento. The caretaker doesn’t require its own protocol
    since it is just a calling component that takes advantage of the functionality
    provided by the originator. Listing 23-4 shows the contents of the `Memento.swift`
    file, which I added to the example project.


    Listing 23-4. The Contents of the Memento.swift File


    `import Foundation`


    `protocol Memento {`


    `// no methods or properties defined`


    `}`


    `protocol Originator {`


    `func createMemento() -> Memento;`


    `func applyMemento(memento:Memento);`


    `}`


    The `Memento` protocol doesn’t define any methods or properties, and that’s because
    all of its implementation details are private, meaning that the only purpose of
    the protocol is to denote that an object is a memento.


    The `Originator` protocol defines a `createMemento` that will produce a memento
    of the current state and an `applyMemento` method that accepts a memento and uses
    it to restore the originator to the state it defines.


    ### Implementing the Memento Class


    The implementation detail of a memento is entirely at the discretion of the originator
    as long as two basic conditions are met. The first condition is that the caretaker
    should not be able to modify the state that the memento contains in any way. The
    second condition is that the memento should always work, regardless of the current
    state of the originator.


    In practice, this means an originator either contains a static snapshot of the
    state data or consists of a set of operations that reset the state and are then
    applied in sequence, rather like the command macros I described in [Chapter 20](#A978-1-4842-0394-1_20_Chapter.html).
    Listing 23-5 shows how I have the pattern in the example project. (I have also
    removed the undo commands to keep the example simple, but there is no reason why
    the command and memento patterns cannot coexist in an application).


    Listing 23-5. Creating the Memento and Originator in the Ledger.swift File


    `import Foundation`


    `class LedgerEntry {`


    `let id:Int;`


    `let counterParty:String;`


    `let amount:Float;`


    `init(id:Int, counterParty:String, amount:Float) {`


    `self.id = id; self.counterParty = counterParty; self.amount = amount;`


    `}`


    `}`


    `class LedgerMemento : Memento` `{`


    `private let entries = [LedgerEntry]();`


    `private let total:Float;`


    `private let nextId:Int;`


    `init(ledger:Ledger) {`


    `self.entries = ledger.entries.values.array;`


    `self.total = ledger.total;`


    `self.nextId = ledger.nextId;`


    `}`


    `func apply(ledger:Ledger) {`


    `ledger.total = self.total;`


    `ledger.nextId = self.nextId;`


    `ledger.entries.removeAll(keepCapacity: true);`


    `for entry in self.entries {`


    `ledger.entries[entry.id] = entry;`


    `}`


    `}`


    `}`


    `class Ledger : Originator {`


    `private var entries = [Int:LedgerEntry]();`


    `private var nextId = 1;`


    `var total:Float = 0;`


    `func addEntry(counterParty:String, amount:Float) {`


    `let entry = LedgerEntry(id: nextId++, counterParty: counterParty, amount: amount);`


    `entries[entry.id] = entry;`


    `total += amount;`


    `}`


    `func createMemento() -> Memento {`


    `return LedgerMemento(ledger: self);`


    `}`


    `func applyMemento(memento: Memento) {`


    `if let m = memento as? LedgerMemento {`


    `m.apply(self);`


    `}`


    `}`


    `func printEntries() {`


    `for id in entries.keys.array.sorted(<) {`


    `if let entry = entries[id] {`


    `println("#\(id): \(entry.counterParty) $\(entry.amount)");`


    `}`


    `}`


    `println("Total: $\(total)");`


    `println("----");`


    `}`


    `}`


    It is important that the memento sets or re-creates every aspect of the state
    of the originator. In the case of the example application, this means I need to
    set the `nextId` and `total` properties directly and populate the dictionary of
    ledger entries.


    ### Using the Memento


    The final step is to obtain and use a memento in the `main.swift` file, which
    plays the role of the caretaker in the example. Listing 23-6 shows the changes
    I made.


    Listing 23-6. Using a Memento in the main.swift File


    `let ledger = Ledger();`


    `ledger.addEntry("Bob", amount: 100.43);`


    `ledger.addEntry("Joe", amount: 200.20);`


    `let memento = ledger.createMemento();`


    `ledger.addEntry("Alice", amount: 500);`


    `ledger.addEntry("Tony", amount: 20);`


    `ledger.printEntries();`


    `ledger.applyMemento(memento);`


    `ledger.printEntries();`


    The memento restores the ledger to its earlier state. Running the application
    produces the following output:


    `#1: Bob $100.43`


    `#2: Joe $200.2`


    `#3: Alice $500.0`


    `#4: Tony $20.0`


    `Total: $820.63`


    `----`


    `#1: Bob $100.43`


    `#2: Joe $200.2`


    `Total: $300.63`


    The effect is the same as when I used the command pattern to create individual
    undo commands, but the implementation is more robust and flexible.'
  trans: '

    # 理解备忘录模式


    备忘录模式包含两个参与者：原发器和管理者。原发器是其状态可以被回滚的对象，例如示例应用中的 `Ledger`。管理者是负责通知原发器何时应回滚其状态的调用组件，在示例中对应
    `main.swift` 文件中的代码。


    原发器会向管理者提供一个备忘录，该备忘录是一个包含将原发器恢复到先前状态所需指令或数据的对象。备忘录的细节对管理者是隐藏的，管理者无法修改或操作其中包含的状态。在未来的某个时间点，管理者将备忘录返还给原发器，原发器利用其中的指令或数据来回滚其状态。图
    23-1 展示了备忘录模式。


    ![A978-1-4842-0394-1_23_Fig1_HTML.jpg](img/A978-1-4842-0394-1_23_Fig1_HTML.jpg)


    图 23-1. 备忘录模式


    理解备忘录模式最简单的方法是关注支撑该模式的四个阶段，如图中编号所示。


    在第一阶段，管理者对原发器执行常规操作，每次操作都会修改其状态。在第二阶段，管理者向原发器请求一个备忘录。创建备忘录对象不会改变原发器的状态；它只是捕捉当前状态，以便原发器将来能恢复到该状态。


    在第三阶段，管理者对原发器执行进一步操作，这些操作会继续修改其状态。在第四阶段（即最后阶段），管理者将备忘录对象返还给原发器，原发器利用它将状态恢复到创建备忘录时的那个时间点。


    通过将原发器状态的一个快照封装到对象中，备忘录模式避免了我在使用撤销命令回滚状态时遇到的问题。管理者无需追踪已执行的操作，也无需担心其他组件执行的操作；当它想要回滚状态时，只需将备忘录返还给原发器即可。


    使用备忘录提供了极大的灵活性。备忘录对象可以被不同于原始管理者的其他组件使用，可以用于反复将状态恢复到同一时间点，还可以用于将一个对象的状态转移到另一个对象。


    # 实现备忘录模式


    备忘录模式的实现基于两个协议：一个用于原发器，一个用于备忘录。管理者不需要自己的协议，因为它只是一个利用原发器提供功能的调用组件。清单 23-4 展示了 `Memento.swift`
    文件的内容，我已将其添加到示例项目中。


    **清单 23-4. Memento.swift 文件的内容**


    ```

    import Foundation


    protocol Memento {


    // 未定义任何方法或属性


    }


    protocol Originator {


    func createMemento() -> Memento;


    func applyMemento(memento:Memento);


    }

    ```


    `Memento` 协议未定义任何方法或属性，这是因为其所有实现细节都是私有的，意味着该协议的唯一目的就是表明某个对象是一个备忘录。


    `Originator` 协议定义了一个 `createMemento()` 方法，用于生成当前状态的备忘录；以及一个 `applyMemento()` 方法，该方法接收一个备忘录并利用它将原发器恢复到该备忘录所定义的状态。


    ## 实现备忘录类


    备忘录的实现细节完全由原发器决定，只要满足两个基本条件即可。第一个条件是管理者不得以任何方式修改备忘录中包含的状态。第二个条件是无论原发器当前状态如何，备忘录都应始终有效。


    在实践中，这意味着原发器要么包含状态数据的静态快照，要么由一组操作组成，这些操作先重置状态，然后按顺序应用，这与我在第 20 章中描述的命令宏类似。清单 23-5
    展示了我在示例项目中实现该模式的方式。（我还移除了撤销命令以保持示例简单，但命令模式和备忘录模式完全可以在一个应用中共存）。


    **清单 23-5. 在 Ledger.swift 文件中创建备忘录和原发器**


    ```

    import Foundation


    class LedgerEntry {


    let id:Int;


    let counterParty:String;


    let amount:Float;


    init(id:Int, counterParty:String, amount:Float) {


    self.id = id; self.counterParty = counterParty; self.amount = amount;


    }


    }


    class LedgerMemento : Memento {


    private let entries = [LedgerEntry]();


    private let total:Float;


    private let nextId:Int;


    init(ledger:Ledger) {


    self.entries = ledger.entries.values.array;


    self.total = ledger.total;


    self.nextId = ledger.nextId;


    }


    func apply(ledger:Ledger) {


    ledger.total = self.total;


    ledger.nextId = self.nextId;


    ledger.entries.removeAll(keepCapacity: true);


    for entry in self.entries {


    ledger.entries[entry.id] = entry;


    }


    }


    }


    class Ledger : Originator {


    private var entries = [Int:LedgerEntry]();


    private var nextId = 1;


    var total:Float = 0;


    func addEntry(counterParty:String, amount:Float) {


    let entry = LedgerEntry(id: nextId++, counterParty: counterParty, amount: amount);


    entries[entry.id] = entry;


    total += amount;


    }


    func createMemento() -> Memento {


    return LedgerMemento(ledger: self);


    }


    func applyMemento(memento: Memento) {


    if let m = memento as? LedgerMemento {


    m.apply(self);


    }


    }


    func printEntries() {


    for id in entries.keys.array.sorted(<) {


    if let entry = entries[id] {


    println("#\(id): \(entry.counterParty) $\(entry.amount)");


    }


    }


    println("Total: $\(total)");


    println("----");


    }


    }

    ```


    重要的是，备忘录必须设置或重新创建原发器状态的每个方面。在示例应用的情况下，这意味着我需要直接设置 `nextId` 和 `total` 属性，并填充分类账条目字典。


    ## 使用备忘录


    最后一步是在 `main.swift` 文件中获取并使用备忘录，该文件在示例中扮演管理者的角色。清单 23-6 展示了我所做的更改。


    **清单 23-6. 在 main.swift 文件中使用备忘录**


    ```

    let ledger = Ledger();


    ledger.addEntry("Bob", amount: 100.43);


    ledger.addEntry("Joe", amount: 200.20);


    let memento = ledger.createMemento();


    ledger.addEntry("Alice", amount: 500);


    ledger.addEntry("Tony", amount: 20);


    ledger.printEntries();


    ledger.applyMemento(memento);


    ledger.printEntries();

    ```


    备忘录将分类账恢复到其较早的状态。运行应用会产生以下输出：


    ```

    #1: Bob $100.43


    #2: Joe $200.2


    #3: Alice $500.0


    #4: Tony $20.0


    Total: $820.63


    ----


    #1: Bob $100.43


    #2: Joe $200.2


    Total: $300.63

    ```


    效果与我使用命令模式创建单个撤销命令时相同，但实现更加健壮和灵活。

