  trans: '

    ### 本书的结构是怎样的？


    本书分为五个部分，每个部分涵盖一系列相关主题。第一部分包含本章以及一个针对你将需要遵循的示例技巧的 Xcode 入门指南，这些技巧将帮助你在本书的示例中应用。我还构建了一个名为
    SportsStore 的示例应用程序，我将在本书中反复引用它，以演示如何在具体情境中应用设计模式。


    本书的其他四个部分各自专注于一种特定类型的模式。第二部分涵盖创建型设计模式，这些模式关注的是应用程序中对象的创建方式。第三部分描述结构型设计模式，这些模式定义并管理应用程序中对象之间的关系。本书的第四部分重点介绍描述对象之间如何进行通信的模式。在本书的最后一部分，我描述了模型/视图/控制器（MVC）模式，该模式适用于整个应用程序的结构，并且常用于
    Mac OS 和 iOS 的 UI 应用程序。


    ### 从哪里可以获得示例代码？


    你可以从 [`www.apress.com`](http://www.apress.com/) 下载本书所有章节的示例代码。该下载免费提供，包含你需要重现示例所需的一切内容，无需手动输入。你不必下载代码，但这是体验示例以及将代码剪切粘贴到你自己的项目中最简单的方法。


    如果你确实想从头开始重现示例，那么你会发现每一章都包含了我创建和修改的所有文件的详细清单。我从未让你去参考外部文件，或者含糊其辞地将示例的其余部分留作练习；重现每一个示例所需的每一个细节都包含在本书中。


    ## 总结


    在本章中，我概述了本书的内容和结构，并说明了所需的经验和软件。在下一章中，我提供了一份关于 Xcode 的简要入门指南，并描述了我在本书中依赖的功能。


    # 2. 熟悉 Xcode


    在本章中，我将使用 Xcode 来演示我在整本书中展示示例的方式。Playground 是 Xcode 6 最有用的功能之一，它允许在无需创建应用程序项目的情况下创建和评估代码实验。我使用
    Playground 来帮助描述模式旨在解决的问题，并用它们来演示简单的实现。


    我在本书中描述的许多设计模式依赖于对类、方法和属性的访问限制。Swift 支持访问保护关键字，但它们是按文件进行操作的。这对 Playground 来说是一个问题，因为所有代码都在一个文件中，因此访问保护无法强制执行。我描述的许多设计模式需要支持并发访问，而
    Playground 在这方面处理得并不好。


    出于这些原因，我还使用了 OS X 命令行工具项目，这是支持多文件的最简单的 Xcode 项目。命令行工具项目不会向用户呈现窗口化的用户界面，仅限于从控制台读取和写入。使用这种简单项目类型的好处在于，它使我能够专注于我所描述的设计模式以及实现它所需的代码，而无需处理用户界面的复杂性。


    当然，很少有真实世界的项目会如此简单，在第 3 章中，我将创建一个名为 SportsStore 的 iOS 应用程序，它确实提供了一个图形用户界面，并且我将在每一章中使用它来为应用我所描述的模式提供额外的上下文。


    ## 使用 Xcode Playground


    Xcode Playground 是一种很好的方法，可以在无需创建 iOS 应用程序项目的情况下对代码进行原型设计和测试想法。Playground 是 Xcode
    6 的一个新功能，许多开发者对它并不熟悉，尤其是那些被 Swift 吸引到 iOS 和 Mac OS 开发领域，并且没有使用过早期 Xcode 版本来开发
    Objective-C 的开发者。


    ### 创建 Playground


    当你启动 Xcode 时，你会看到一个启动屏幕，允许你选择是创建一个新的 Playground、创建一个新项目，还是从源代码仓库中检出现有项目，如图 2-1
    所示。


    ![A978-1-4842-0394-1_2_Fig1_HTML.jpg](img/A978-1-4842-0394-1_2_Fig1_HTML.jpg)


    图 2-1.


    Xcode 6 启动屏幕 提示


    如果启动窗口未显示，请从“文件”菜单中选择新建 ➤ Playground。


    点击“开始使用 Playground”。Xcode 会提示你选择一个位置来命名和保存 Playground 文件。将名称更改为 MyFirstPlayground，并确保为平台选择了
    iOS，如图 2-2 所示。


    ![A978-1-4842-0394-1_2_Fig2_HTML.jpg](img/A978-1-4842-0394-1_2_Fig2_HTML.jpg)


    图 2-2.


    命名 Playground 并选择平台


    点击“下一步”按钮，选择一个你将来容易找到 Playground 的位置，如图 2-3 所示。


    ![A978-1-4842-0394-1_2_Fig3_HTML.jpg](img/A978-1-4842-0394-1_2_Fig3_HTML.jpg)


    图 2-3.


    更改 Playground 文件的名称并选择保存位置


    Xcode 会在你选择的位置创建一个名为 `MyFirstPlayground.playground` 的文件，其内容如清单 2-1 所示。如果这是你第一次使用
    Xcode，系统会要求你启用开发者模式。


    ```

    Listing 2-1. The Contents of the MyFirstPlayground.playground File


    import UIKit


    var str = "Hello, playground"

    ```


    提示


    我不会在本书的清单中显示 Xcode 添加的注释，也不会添加我自己的注释。在实际项目中，我会不停地写注释，但在本书中，我会在随附的文字中解释我所写语句的效果。


    Playground 提供了对输入到编辑器中的代码的洞察。Playground 中有一条注释和两个语句。注释会被忽略，而 `import` 语句使 Cocoa
    的 `UIKit` 框架中的类可用。正是第二个语句暗示了 Playground 的能力。


    ```

    var str = "Hello, playground"

    ```


    这个语句创建了一个名为 `str` 的变量，并使用一个字符串字面量设置了它的值。如果你在 Playground 中查看该语句的右侧，你会看到该变量的值被显示出来，如图
    2-4 所示。


    ![A978-1-4842-0394-1_2_Fig4_HTML.jpg](img/A978-1-4842-0394-1_2_Fig4_HTML.jpg)


    图 2-4.


    一个简单的 Playground


    这是一个有趣的开始，但并不是特别有用。在接下来的章节中，我将向你展示我在本书中依赖的不同的 Playground 功能。

    '
- fmt: "### Displaying the Value History of a Variable\n\nModify the code in the playground\
    \ to match Listing 2-2, and you will get a sense of the power of a playground.\n\
    \nListing 2-2. Defining a Loop in the `MyFirstPlayground.playground` File\n\n\
    ```\nimport UIKit\nvar str = \"Hello, playground\"\nvar counter = 0;\nfor (var\
    \ i = 0; i < 10; i++) {\n    counter += i;\n    println(\"Counter: \\(counter)\"\
    );\n}\n```\n\n**Tip:** You don’t have to compile—or even save—the playground file\
    \ to see the effect of changes. The code statements are automatically evaluated\
    \ after every edit.\n\nI have defined a `counter` variable with an initial value\
    \ of `0` and a `for` loop that increases the `counter` value with each iteration\
    \ and writes the current value to the console using the `println` function. The\
    \ right-hand panel updates, displaying `(10 times)` next to the statement that\
    \ changes the `counter` value. To the right of the `(10 times)` message is a small\
    \ circular plus button, as shown in Figure [2-5](#A978-1-4842-0394-1_2_Chapter.html#Fig5).\n\
    \n**Tip:** Be sure to click the button next to the statement that changes the\
    \ value of the `counter` variable and not the one that calls the `println` function.\n\
    \n![A978-1-4842-0394-1_2_Fig5_HTML.jpg](A978-1-4842-0394-1_2_Fig5_HTML.jpg)\n\n\
    Figure 2-5. The button that shows value history\n\nThis symbol is labeled Value\
    \ History, and clicking it opens a panel that shows how the value of the `counter`\
    \ variable changed as the code was executed and shows the console output generated\
    \ through the `println` function. Figure [2-6](#A978-1-4842-0394-1_2_Chapter.html#Fig6)\
    \ illustrates the view.\n\n![A978-1-4842-0394-1_2_Fig6_HTML.jpg](A978-1-4842-0394-1_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6. Displaying the value history in a playground\n\nThe chart shows\
    \ how the value of the `counter` variable changes for each iteration of the `for`\
    \ loop. You can display the value history for any variable defined in the playground,\
    \ but numeric values are the most usefully presented.\n\n### A Note About Coding\
    \ Style\n\nYou will notice that I use semicolons to terminate statements throughout\
    \ this book, even though Swift doesn’t require the use of semicolons after statements\
    \ unless you need to separate multiple statements on the same line.\n\nAlthough\
    \ it’s not a requirement of Swift, I have been writing code for decades with languages\
    \ that do require semicolons, and—try as I might—I can’t break the habit. There\
    \ is something about an unterminated statement that just looks wrong to me, and\
    \ I hit the semicolon key automatically. I considered going through each chapter\
    \ and removing the semicolons, but that is a path that leads to broken examples,\
    \ which I work hard to avoid in my books. And so, with a note of apology, I decided\
    \ to let my preferences manifest themselves and use semicolons in the listings.\
    \ You don’t have to follow my style, however: one of the nice features of Swift\
    \ is its relaxed approach to code style, and you are entirely free to express\
    \ your own preferences and habits (including, if you want, the addition of unneeded\
    \ semicolons).\n\n### Using the Value Timeline\n\nAt the bottom of the Value History\
    \ panel is a slider that you can use to see how the value of variables changed\
    \ during the execution of the code. The effect of this slider is easier to see\
    \ when there are multiple variables to look at, and in Listing 2-3 I have updated\
    \ the playground with some additional statements.\n\nListing 2-3. Adding Additional\
    \ Statements to the `MyFirstPlayground.playground` File\n\n```\nimport UIKit\n\
    var str = \"Hello, playground\"\nvar counter = 0;\nvar secondCounter = 0;\nfor\
    \ (var i = 0; i < 10; i++) {\n    counter += i;\n    println(\"Counter: \\(counter)\"\
    );\n    for j in 1...10 {\n        secondCounter += j;\n    }\n}\n```\n\nDisplay\
    \ the value histories for the `counter` and `secondCounter` variables by clicking\
    \ the circular button to the right of the statements in the `for` loops. You will\
    \ see two separate charts, and you can see the relationship between the values\
    \ of the variables by dragging the playback head (the red vertical bar at the\
    \ bottom of the panel) left and right to move to different points in the execution\
    \ of the code, as shown in Figure [2-7](#A978-1-4842-0394-1_2_Chapter.html#Fig7).\n\
    \n![A978-1-4842-0394-1_2_Fig7_HTML.jpg](A978-1-4842-0394-1_2_Fig7_HTML.jpg)\n\n\
    Figure 2-7. Reviewing the variable value timelines in a playground\n\n### Displaying\
    \ UI Components in a Playground\n\nPlaygrounds can also be used to display UI\
    \ components, which I rely on to demonstrate how Cocoa implements some patterns.\
    \ Listing 2-4 shows how I modified the playground to show a text field.\n\nListing\
    \ 2-4. Adding a UI Component to the `MyFirstPlayground.playground` File\n\n```\n\
    import UIKit\nvar str = \"Hello, playground\"\nvar counter = 0;\nvar secondCounter\
    \ = 0;\nfor (var i = 0; i < 10; i++) {\n    counter += i;\n    println(\"Counter:\
    \ \\(counter)\");\n    for j in 1...10 {\n        secondCounter += j;\n    }\n\
    }\nlet textField = UITextField(frame: CGRectMake(0, 0, 200, 50));\ntextField.text\
    \ = \"Hello\";\ntextField.borderStyle = UITextBorderStyle.Bezel;\ntextField;\n\
    ```\n\nThere are two important differences when using UI components in a playground\
    \ from a regular Xcode project. The first is that you must use the initializer\
    \ with the `frame` argument and generate a frame to contain the component using\
    \ the `CGRectMake` function, like this:\n\n```\n...\nlet textField = UITextField(frame:\
    \ CGRectMake(0, 0, 200, 50));\n...\n```\n\nThe arguments to the `CGRectMake` functions\
    \ are the bounds of the frame that will contain the component, where the third\
    \ and fourth values define the width and height. I have specified a frame that\
    \ is 200 pixels wide and 50 high, which is sufficient for a text field.\n\nThe\
    \ second difference is the last statement in the playground, which simply contains\
    \ the name of the variable to which I have assigned the UI component.\n\n```\n\
    ...\ntextField;\n...\n```\n\nThis is required so that Xcode will provide the plus\
    \ icon to the right of the statement; clicking the icon displays the component\
    \ in the assistant editor, as shown in Figure [2-8](#A978-1-4842-0394-1_2_Chapter.html#Fig8).\
    \ The assistant editor panels display the result of statements, so a statement\
    \ that returns the configured UI component object is required.\n\n![A978-1-4842-0394-1_2_Fig8_HTML.jpg](A978-1-4842-0394-1_2_Fig8_HTML.jpg)\n\
    \nFigure 2-8. Displaying a UI component in a playground\n\n## Working with OS\
    \ X Command Line Tool Projects\n\nOS X Command Line Tool projects are ideally\
    \ suited to demonstrating design patterns in Swift. This kind of project supports\
    \ multiple files and concurrency, which makes it possible to demonstrate the effect\
    \ of access protections and the effect of working with multiple threads.\n\n###\
    \ Creating a Command-Line Project\n\nClick “Create a new Xcode project” on the\
    \ Xcode splash screen or select New ➤ Project from the Xcode File menu if the\
    \ splash screen isn’t visible. Select the Command Line Tool template, which is\
    \ found in the OS X ➤ Application category, as shown in Figure [2-9](#A978-1-4842-0394-1_2_Chapter.html#Fig9).\n\
    \n![A978-1-4842-0394-1_2_Fig9_HTML.jpg](A978-1-4842-0394-1_2_Fig9_HTML.jpg)\n\n\
    Figure 2-9. Selecting the Command Line Tool template\n\nClick the Next button,\
    \ and Xcode will prompt you for details of the project you want to create. Set\
    \ the name to `MyCommandLine` and ensure that the Language option is set to Swift,\
    \ as shown in Figure [2-10](#A978-1-4842-0394-1_2_Chapter.html#Fig10). I have\
    \ specified Apress as the organization for the project, but I don’t rely on these\
    \ values in this book, and you can set them to your own organization.\n\n![A978-1-4842-0394-1_2_Fig10_HTML.jpg](A978-1-4842-0394-1_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10. Specifying details for the project\n\nClick the Next button, and\
    \ Xcode will prompt you to specify a location for the project. Select a convenient\
    \ location and click the Create button. Xcode will create the project files and\
    \ open the main project window."
  raw: '### Displaying the Value History of a Variable


    Modify the code in the playground to match Listing 2-2, and you will get a sense
    of the power of a playground.


    Listing 2-2. Defining a Loop in the MyFirstPlayground.playground File


    `import UIKit`


    `var str = "Hello, playground"`


    `var counter = 0;`


    `for (var i = 0; i < 10; i++) {`


    `counter += i;`


    `println("Counter: \(counter)");`


    `}`


    Tip


    You don’t have to compile—or even save—the playground file to see the effect of
    changes. The code statements are automatically evaluated after every edit.


    I have defined a `counter` variable with an initial value of `0` and a `for` loop
    that increases the `counter` value with each iteration and writes the current
    value to the console using the `println` function. The right-hand panel updates,
    displaying `(10 times)` next to the statement that changes the `counter` value.
    To the right of the `(10 times)` message is a small circular plus button, as shown
    in Figure [2-5](#A978-1-4842-0394-1_2_Chapter.html#Fig5).


    Tip


    Be sure to click the button next to the statement that changes the value of the
    `counter` variable and not the one that calls the `println` function.


    ![A978-1-4842-0394-1_2_Fig5_HTML.jpg](A978-1-4842-0394-1_2_Fig5_HTML.jpg)


    Figure 2-5.


    The button that shows value history


    This symbol is labeled Value History, and clicking it opens a panel that shows
    how the value of the `counter` variable changed as the code was executed and shows
    the console output generated through the `println` function. Figure [2-6](#A978-1-4842-0394-1_2_Chapter.html#Fig6)
    illustrates the view.


    ![A978-1-4842-0394-1_2_Fig6_HTML.jpg](A978-1-4842-0394-1_2_Fig6_HTML.jpg)


    Figure 2-6.


    Displaying the value history in a playground


    The chart shows how the value of the `counter` variable changes for each iteration
    of the `for` loop. You can display the value history for any variable defined
    in the playground, but numeric values are the most usefully presented.


    A NOTE ABOUT CODING STYLE


    You will notice that I use semicolons to terminate statements throughout this
    book, even though Swift doesn’t require the use of semicolons after statements
    unless you need to separate multiple statements on the same line.


    Although it’s not a requirement of Swift, I have been writing code for decades
    with languages that do require semicolons, and—try as I might—I can’t break the
    habit. There is something about an unterminated statement that just looks wrong
    to me, and I hit the semicolon key automatically. I considered going through each
    chapter and removing the semicolons, but that is a path that leads to broken examples,
    which I work hard to avoid in my books. And so, with a note of apology, I decided
    to let my preferences manifest themselves and use semicolons in the listings.
    You don’t have to follow my style, however: one of the nice features of Swift
    is its relaxed approach to code style, and you are entirely free to express your
    own preferences and habits (including, if you want, the addition of unneeded semicolons).


    ### Using the Value Timeline


    At the bottom of the Value History panel is a slider that you can use to see how
    the value of variables changed during the execution of the code. The effect of
    this slider is easier to see when there are multiple variables to look at, and
    in Listing 2-3 I have updated the playground with some additional statements.


    Listing 2-3. Adding Additional Statements to the MyFirstPlayground.playground
    File


    `import UIKit`


    `var str = "Hello, playground"`


    `var counter = 0;`


    `var secondCounter = 0;`


    `for (var i = 0; i < 10; i++) {`


    `counter += i;`


    `println("Counter: \(counter)");`


    `for j in 1...10 {`


    `secondCounter += j;`


    `}`


    `}`


    Display the value histories for the counter and `secondCounter` variables by clicking
    the circular button to the right of the statements in the `for` loops. You will
    see two separate charts, and you can see the relationship between the values of
    the variables by dragging the playback head (the red vertical bar at the bottom
    of the panel) left and right to move to different points in the execution of the
    code, as shown in Figure [2-7](#A978-1-4842-0394-1_2_Chapter.html#Fig7).


    ![A978-1-4842-0394-1_2_Fig7_HTML.jpg](A978-1-4842-0394-1_2_Fig7_HTML.jpg)


    Figure 2-7.


    Reviewing the variable value timelines in a playground


    ### Displaying UI Components in a Playground


    Playgrounds can also be used to display UI components, which I rely on to demonstrate
    how Cocoa implements some patterns. Listing 2-4 shows how I modified the playground
    to show a text field.


    Listing 2-4. Adding a UI Component to the MyFirstPlayground.playground File


    `import UIKit`


    `var str = "Hello, playground"`


    `var counter = 0;`


    `var secondCounter = 0;`


    `for (var i = 0; i < 10; i++) {`


    `counter += i;`


    `println("Counter: \(counter)");`


    `for j in 1...10 {`


    `secondCounter += j;`


    `}`


    `}`


    `let textField = UITextField(frame: CGRectMake(0, 0, 200, 50));`


    `textField.text = "Hello";`


    `textField.borderStyle = UITextBorderStyle.Bezel;`


    `textField;`


    There are two important differences when using UI components in a playground from
    a regular Xcode project. The first is that you must use the initializer with the
    `frame` argument and generate a frame to contain the component using the `CGRectMake`
    function, like this:


    `...`


    `let textField = UITextField(` `frame: CGRectMake(0, 0, 200, 50)` `);`


    `...`


    The arguments to the `GCRectMake` functions are the bounds of the frame that will
    contain the component, where the third and fourth values define the width and
    height. I have specified a frame that is 200 pixels wide and 50 high, which is
    sufficient for a text field.


    The second difference is the last statement in the playground, which simply contains
    the name of the variable to which I have assigned the UI component.


    `...`


    `textField` `;`


    `...`


    This is required so that Xcode will provide the plus icon to the right of the
    statement; clicking the icon displays the component in the assistant editor, as
    shown in Figure [2-8](#A978-1-4842-0394-1_2_Chapter.html#Fig8). The assistant
    editor panels display the result of statements, so a statement that returns the
    configured UI component object is required.


    ![A978-1-4842-0394-1_2_Fig8_HTML.jpg](A978-1-4842-0394-1_2_Fig8_HTML.jpg)


    Figure 2-8.


    Displaying a UI component in a playground


    ## Working with OS X Command Line Tool Projects


    OS X Command Line Tool projects are ideally suited to demonstrating design patterns
    in Swift. This kind of project supports multiple files and concurrency, which
    makes it possible to demonstrate the effect of access protections and the effect
    of working with multiple threads.


    ### Creating a Command-Line Project


    Click “Create a new Xcode project” on the Xcode splash screen or select New ➤
    Project from the Xcode File menu if the splash screen isn’t visible. Select the
    Command Line Tool template, which is found in the OS X ➤ Application category,
    as shown in Figure [2-9](#A978-1-4842-0394-1_2_Chapter.html#Fig9).


    ![A978-1-4842-0394-1_2_Fig9_HTML.jpg](A978-1-4842-0394-1_2_Fig9_HTML.jpg)


    Figure 2-9.


    Selecting the Command Line Tool template


    Click the Next button, and Xcode will prompt you for details of the project you
    want to create. Set the name to MyCommandLine and ensure that the Language option
    is set to Swift, as shown in Figure [2-10](#A978-1-4842-0394-1_2_Chapter.html#Fig10).
    I have specified Apress as the organization for the project, but I don’t rely
    on these values in this book, and you can set them to your own organization.


    ![A978-1-4842-0394-1_2_Fig10_HTML.jpg](A978-1-4842-0394-1_2_Fig10_HTML.jpg)


    Figure 2-10.


    Specifying details for the project


    Click the Next button, and Xcode will prompt you to specify a location for the
    project. Select a convenient location and click the Create button. Xcode will
    create the project files and open the main project window.'
  trans: "\n### 显示变量的值历史\n\n修改 playground 中的代码以匹配列表 2-2，你将体会到 playground 的强大之处。\n\n\
    列表 2-2. 在 `MyFirstPlayground.playground` 文件中定义循环\n\n```\nimport UIKit\nvar str\
    \ = \"Hello, playground\"\nvar counter = 0;\nfor (var i = 0; i < 10; i++) {\n\
    \    counter += i;\n    println(\"Counter: \\(counter)\");\n}\n```\n\n**提示：**\
    \ 你无需编译（甚至无需保存）playground 文件即可看到更改的效果。每次编辑后，代码语句会自动被评估。\n\n我定义了一个初始值为 `0` 的 `counter`\
    \ 变量，以及一个 `for` 循环，该循环在每次迭代中增加 `counter` 的值，并使用 `println` 函数将当前值写入控制台。右侧面板会更新，在更改\
    \ `counter` 值的语句旁边显示 `(10 times)`。在 `(10 times)` 消息的右侧有一个小的圆形加号按钮，如图 2-5 所示。\n\
    \n**提示：** 请确保点击更改 `counter` 变量值的语句旁边的按钮，而不是调用 `println` 函数的语句旁边的按钮。\n\n![A978-1-4842-0394-1_2_Fig5_HTML.jpg](img/A978-1-4842-0394-1_2_Fig5_HTML.jpg)\n\
    \n图 2-5. 显示值历史的按钮\n\n此符号标记为“值历史”，点击它会打开一个面板，显示 `counter` 变量值在代码执行过程中如何变化，并显示通过\
    \ `println` 函数生成的控制台输出。图 2-6 展示了该视图。\n\n![A978-1-4842-0394-1_2_Fig6_HTML.jpg](img/A978-1-4842-0394-1_2_Fig6_HTML.jpg)\n\
    \n图 2-6. 在 playground 中显示值历史\n\n图表显示了 `counter` 变量的值在 `for` 循环的每次迭代中如何变化。你可以显示\
    \ playground 中定义的任何变量的值历史，但数值类型的数据展示效果最好。\n\n### 关于编码风格的一点说明\n\n你会注意到，我在整本书中都使用分号来结束语句，尽管\
    \ Swift 并不要求在语句后使用分号，除非你需要在一行中分隔多个语句。\n\n虽然这不是 Swift 的要求，但我几十年来一直使用需要分号的语言编写代码，而且——尽管我尝试过——我无法改掉这个习惯。对我来说，未结束的语句看起来总是不对劲，我会自动按下分号键。我曾考虑过通读每一章并删除分号，但那会导致示例出错，而我努力在书中避免这种情况。因此，带着歉意，我决定让我的偏好自然体现，在列表中使用分号。不过，你不必遵循我的风格：Swift\
    \ 的优点之一是其对代码风格宽松的处理方式，你完全可以自由地表达自己的偏好和习惯（如果你愿意，也可以添加不必要的分号）。\n\n### 使用值时间线\n\n\
    在“值历史”面板的底部有一个滑块，你可以用它来查看变量值在代码执行期间的变化情况。当有多个变量需要查看时，这个滑块的效果更容易体现。在列表 2-3 中，我向\
    \ playground 添加了一些额外的语句。\n\n列表 2-3. 向 `MyFirstPlayground.playground` 文件中添加额外语句\n\
    \n```\nimport UIKit\nvar str = \"Hello, playground\"\nvar counter = 0;\nvar secondCounter\
    \ = 0;\nfor (var i = 0; i < 10; i++) {\n    counter += i;\n    println(\"Counter:\
    \ \\(counter)\");\n    for j in 1...10 {\n        secondCounter += j;\n    }\n\
    }\n```\n\n通过点击 `for` 循环中语句右侧的圆形按钮，显示 `counter` 和 `secondCounter` 变量的值历史。你将看到两个独立的图表，通过左右拖动播放头（面板底部的红色竖条）可以移动到代码执行的不同时间点，从而查看变量值之间的关系，如图\
    \ 2-7 所示。\n\n![A978-1-4842-0394-1_2_Fig7_HTML.jpg](img/A978-1-4842-0394-1_2_Fig7_HTML.jpg)\n\
    \n图 2-7. 在 playground 中查看变量值时间线\n\n### 在 Playground 中显示 UI 组件\n\nPlayground 还可用于显示\
    \ UI 组件，我依靠它来演示 Cocoa 如何实现一些模式。列表 2-4 展示了我如何修改 playground 以显示一个文本字段。\n\n列表 2-4. 向\
    \ `MyFirstPlayground.playground` 文件中添加 UI 组件\n\n```\nimport UIKit\nvar str = \"\
    Hello, playground\"\nvar counter = 0;\nvar secondCounter = 0;\nfor (var i = 0;\
    \ i < 10; i++) {\n    counter += i;\n    println(\"Counter: \\(counter)\");\n\
    \    for j in 1...10 {\n        secondCounter += j;\n    }\n}\nlet textField =\
    \ UITextField(frame: CGRectMake(0, 0, 200, 50));\ntextField.text = \"Hello\";\n\
    textField.borderStyle = UITextBorderStyle.Bezel;\ntextField;\n```\n\n在 playground\
    \ 中使用 UI 组件与常规 Xcode 项目有两个重要区别。第一个区别是你必须使用带有 `frame` 参数的初始化器，并使用 `CGRectMake`\
    \ 函数生成一个包含该组件的框架，如下所示：\n\n```\n...\nlet textField = UITextField(frame: CGRectMake(0,\
    \ 0, 200, 50));\n...\n```\n\n`CGRectMake` 函数的参数是包含组件的框架边界，其中第三和第四个值定义了宽度和高度。我指定了一个宽\
    \ 200 像素、高 50 像素的框架，这对于一个文本字段来说足够了。\n\n第二个区别是 playground 中的最后一条语句，它只包含了我为其分配 UI\
    \ 组件的变量名。\n\n```\n...\ntextField;\n...\n```\n\n这是必需的，以便 Xcode 会在语句右侧提供加号图标；点击该图标会在辅助编辑器中显示该组件，如图\
    \ 2-8 所示。辅助编辑器面板显示语句的结果，因此需要一个返回已配置 UI 组件对象的语句。\n\n![A978-1-4842-0394-1_2_Fig8_HTML.jpg](img/A978-1-4842-0394-1_2_Fig8_HTML.jpg)\n\
    \n图 2-8. 在 playground 中显示 UI 组件\n\n## 使用 OS X 命令行工具项目\n\nOS X 命令行工具项目非常适合演示 Swift\
    \ 中的设计模式。这类项目支持多文件和并发性，这使得演示访问保护的效果以及多线程工作的效果成为可能。\n\n### 创建命令行项目\n\n在 Xcode 启动屏幕上点击“Create\
    \ a new Xcode project”，或者如果启动屏幕不可见，从 Xcode 的 File 菜单中选择 New ➤ Project。选择命令行工具模板，该模板位于\
    \ OS X ➤ Application 类别中，如图 2-9 所示。\n\n![A978-1-4842-0394-1_2_Fig9_HTML.jpg](img/A978-1-4842-0394-1_2_Fig9_HTML.jpg)\n\
    \n图 2-9. 选择命令行工具模板\n\n点击 Next 按钮，Xcode 将提示你输入要创建的项目的详细信息。将名称设置为 `MyCommandLine`，并确保\
    \ Language 选项设置为 Swift，如图 2-10 所示。我将 Apress 指定为项目组织，但本书中我不依赖这些值，你可以将它们设置为你自己的组织。\n\
    \n![A978-1-4842-0394-1_2_Fig10_HTML.jpg](img/A978-1-4842-0394-1_2_Fig10_HTML.jpg)\n\
    \n图 2-10. 指定项目的详细信息\n\n点击 Next 按钮，Xcode 将提示你指定项目的位置。选择一个方便的位置，然后点击 Create 按钮。Xcode\
    \ 将创建项目文件并打开主项目窗口。\n"
- fmt: "### Understanding the Xcode Layout\n\nWhen Xcode shows the project, you will\
    \ see a layout that is similar to the one shown in Figure [2-11](#A978-1-4842-0394-1_2_Chapter.html#Fig11).\
    \ You may see a slightly different layout, but I’ll explain how to open each panel.\n\
    \n![A978-1-4842-0394-1_2_Fig11_HTML.jpg](A978-1-4842-0394-1_2_Fig11_HTML.jpg)\n\
    \nFigure 2-11.  \nThe Xcode layout for a Command Line Tool project\n\nI have numbered\
    \ the main panes that Xcode presents, and I describe them in Table [2-1](#A978-1-4842-0394-1_2_Chapter.html#Tab1)\
    \ for readers who are new to Xcode. The content of some panes changes based on\
    \ the task being performed by Xcode, so I have included details of how the content\
    \ can be selected.\n\nTable 2-1.  \nThe Default Xcode Panes\n\n| Number | Description\
    \ |\n| --- | --- |\n| 1 | This is the navigator pane, which presents the contents\
    \ of the project in different views that are selected using the row of buttons\
    \ at the top edge. I use the Project Navigator view, which is displayed by clicking\
    \ the first button in the row. The visibility of the navigator pane is controlled\
    \ through the `View ➤ Navigators` menu. |\n| 2 | This is the main editor window,\
    \ which adapts to the file being edited. Different editors are available, including\
    \ one for project settings (which is what is shown when the project is first created),\
    \ a code editor for `.swift` files, and a drag-and-drop editor called UI Builder\
    \ that deals with `.storyboard` files. (I use `.storyboard` files in [Chapter\
    \ 3](#A978-1-4842-0394-1_3_Chapter.html).) Select `View ➤ Standard Editor ➤ Show\
    \ Standard Editor` to open the code editor. |\n| 3 | This is the inspector pane,\
    \ which reveals information about components in the application and is used when\
    \ creating the application layout. I describe this pane further in [Chapter 3](#A978-1-4842-0394-1_3_Chapter.html).\
    \ |\n| 4 | This is the utility pane. The content of this pane is set using the\
    \ four buttons at the top edge, and the view shown in the figure is the Object\
    \ Library, which contains the UI controls used to create an application layout,\
    \ which I use in [Chapter 3](#A978-1-4842-0394-1_3_Chapter.html). You can display\
    \ the Object Library by selecting the `View ➤ Utilities ➤ Show Object Library`\
    \ menu. |\n| 5 | This is the Debug pane, which is used to interact with the debugger\
    \ and to display console messages written using the Swift `println` function.\
    \ This is where the output from Command Line Tool applications appears. This pane\
    \ is controlled through the `View ➤ Debug Area` menu. |\n\n### Adding a New Swift\
    \ File\n\nThe reason that I use Command Line Tool projects is so I can create\
    \ multiple code files and enforce access protection with keywords such as `private`.\
    \ To add a new file to the project, select the Project Navigator view in the navigator\
    \ pane and right-click the `MyCommandLine` folder item, which currently contains\
    \ a file called `main.swift`, as shown in Figure [2-12](#A978-1-4842-0394-1_2_Chapter.html#Fig12).\n\
    \n![A978-1-4842-0394-1_2_Fig12_HTML.jpg](A978-1-4842-0394-1_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12.  \nAdding a new file to the example project\n\nXcode will display\
    \ the set of file templates available for new files. Select the Swift File template,\
    \ as shown in Figure [2-13](#A978-1-4842-0394-1_2_Chapter.html#Fig13).\n\n![A978-1-4842-0394-1_2_Fig13_HTML.jpg](A978-1-4842-0394-1_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13.  \nSelecting the Swift file template\n\nClick the Next button and\
    \ set the name of the new file to `MyCode.swift`, as shown in Figure [2-14](#A978-1-4842-0394-1_2_Chapter.html#Fig14).\n\
