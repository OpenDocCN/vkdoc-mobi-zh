  ## 利用 iOS 能力实现最佳用户体验


  苹果的 iOS 是一个极佳的设计平台。在当今市场上的所有移动平台中，它为渲染用户体验以及通常涉及的高度精细的视觉交互提供了最好的支持。苹果出色地提供了多种专门技术，使开发团队能够克服设计师提出的甚至最复杂的挑战。


  交互设计社区中围绕“设计师-开发者工作流程”的概念已有许多讨论。许多推动当代网络用户体验的新技术，为设计素材在设计领域和开发领域之间的无缝过渡提供了支持。这使得创建复杂的用户体验变得更为精简，团队沟通成本更低，并且所创造体验的设计保真度更高。此外，随着越来越多的设计师不再局限于用户体验的规范，开始直接实现前端代码，传统的项目角色也发生了革命性的转变。


  项目团队已经认识到，拥有具备实现其工作所需技术实用知识的设计人员是极其宝贵的。实际上，这需要的不仅仅是简单熟悉相关概念和术语。在理想情况下，设计师应深入了解特定技术的优势和劣势，并能够设计出考虑这些能力的解决方案。这意味着设计师可能需要对特定技术有第一手的了解。期望一位设计师或设计团队在特定平台拥有强大的开发技能和丰富的编码经验是不合理的。然而，如果设计师自己尝试过某项技术，或将其作为内部培训计划的一部分，他们在设计可行的解决方案时会高效得多。即使只是花一天时间审阅任何与前端体验实现相关的支持文档，也有助于确保开发工作更精简。如果那些文档不能立即理解，设计师应与开发团队合作，以帮助确定所有可能影响设计执行的关键软件问题。所有这些都说明，设计师需要开始将自己视为技术专家，在他们努力定义的体验所依赖的主要技术领域，将自己确立为专家。


  话虽如此，我将带您了解负责在 iOS 内实现视觉交互的核心技术。每一项技术都有特定的能力和设计优势，我将逐一回顾。当你开始思考你的用户体验时，请将这些技术牢记于心，并考虑每一项技术如何帮助你实现设计目标。


  除此之外，我将回顾其他一些每个设计师都需要了解的 iOS 平台相关重要主题。其中大多数是反复出现的主题，似乎在任何关于创建 iPhone 或 iPad 应用的初步讨论中都会出现。这些主题将围绕自定义皮肤、iPhone
  和 iPad 开发支持，以及理解原生应用功能与移动网页功能对用户体验的影响。




  ### 关键技术


  作为设计师，你需要了解我确定的四项关键技术。这些技术可以归为两大类：第一类是在 iOS 中支持原生渲染的苹果技术；第二类是 `OpenGL`，这是一种支持底层
  GPU 使用的第三方技术。从设计的角度来看，理解这些技术的最佳方式是将原生渲染与常见的经典用户界面控件关联起来。将 `OpenGL` 与那些你可能在游戏场景中看到的高性能图形渲染、动画和交互关联起来。


  需要注意的是，这些技术并不仅限于其最初设定的使用场景。通过理解每种技术的本质，你可以知道如何最好地将你设计的体验变为现实。当你开始为应用构思独特的交互机制细节时，这一点将变得越来越重要。当你了解每种技术能实现什么功能时，你就会明白
  iOS 有多么强大，以及它作为设计师为你提供了无限可能。


  #### UIKit


  `UIKit` 是为任何 iOS 设备构建应用体验的核心框架。它本质上提供了所有在触摸屏设备上构建用户界面的工具和资源，并因此涵盖了你的应用可能需要的一切关键用户交互点。


  很有可能，`UIKit` 能实现你试图创建的 95% 的用户体验。该框架包含了你在使用 iOS 设备时通常会遇到的所有 UI 控件。这包括基本的按钮控件、滑块、文本字段、切换控件等等。除了我们都熟悉的标准控件外观外，`UIKit`
  还提供了大量根据需要自定义对象的机会，所以永远不要受到默认提供内容的限制。使用我将介绍的其他图形技术实现的自定义 UI 方案，最终都会由 `UIKit` 管理，因此它是一个非常灵活的框架，值得深入了解。


  除了能够使用你在设计中指定的所有成品图形（例如 `PNG` 文件这类光栅对象）外，`UIKit` 还能够程序化地渲染对象。换句话说，它可以按需按规范绘制对象。这些技术与你可能已经熟悉的许多矢量图形方法更为相似。在大多数情况下，这涉及定义一些基本的几何图形或路径，并对这些路径应用视觉属性以达到你想要的外观。对于那些考虑使用此方法的人，需要提醒一句：虽然使用程序化图形可以简化应用资源的生产工作，但你将需要与开发团队花费大量时间来定义属性并确保对象按需渲染。根据你希望创建的体验性质，以这种方式渲染某些
  UI 元素可能更有效。你需要与你的开发伙伴合作，决定在何时何地使用程序化技术最为合理。


  #### Core Graphics


  `Core Graphics` 是另一项非常有趣的技术，可用于为你的用户体验增加价值。`Core Graphics` 的核心是名为 `Quartz 2D` 的二维渲染引擎，它可用于驱动应用内部的多种不同图形功能。它不仅可以用来动态绘制某些类型的图形，还可以作为一个功能齐全的图像引擎，为应用增加图形创建和编辑能力。


  从根本上讲，`Core Graphics` 是一项让你扩展应用功能的技术。然而，由于它提供了比 `UIKit` 更复杂的图形支持，如有需要，它也可用于创建用户界面元素。考虑到
  `UIKit` 为支持自定义图形提供了高度的灵活性，只有当你的设计需要某种复杂的图形变换、处理或实时合成时，`Core Graphics` 才会显得有用。


  #### Core Animation


  `Core Animation` 是一项专门为开发人员提供简单易行方案的技术，用于创建和渲染动态的视觉交互属性。换句话说，它就是让你的用户体验活起来。由于它专注于将动画集成到现有的用户界面对象中，`Core
  Animation` 与 `UIKit` 紧密协作，因此响应式控件和过渡的集成相对无缝。


  就其为开发人员提供的能力范围而言，`Core Animation` 实际上是一个非常强大的工具。我们都体验过许多应用中常见的美妙状态转换，但不要认为你只能局限于你目前在其他应用中看到的那些效果。这项技术让开发者能够在许多不同层面创建和控制可动画化的属性，因此，作为设计师，你应该认识到，创建独特且高度自定义的动画的可能性几乎是无限的。


  #### OpenGL ES


  `OpenGL ES` 与我这里回顾的其他技术不同，它是唯一正在使用的非苹果技术。`OpenGL ES` 本质上是一个 API，让你能够利用 iOS 设备中嵌入的硬件加速来渲染图形。它本身不能独立提供用户体验，必须与
  `Core Animation` 结合使用才能将内容呈现到屏幕上。


  同样，这是另一项用于渲染图形的强大技术，否则这些图形可能会给设备管理带来极大的负担。在大多数情况下，当需要实时渲染 3D 对象时，`OpenGL ES` 主要用于游戏场景。然而，由于它与其他上述技术的集成，不要认为它仅限于游戏图形的渲染。如果需要，完全可以在三维（3D）环境中渲染
  UI 对象，甚至是整个应用程序。


  是否需要在你的应用中集成这项技术，完全取决于你想要生成的视觉效果类型。有许多无需实时渲染对象就能创建 3D 图形外观的方法。除非你设计了一种需要在不受限的 3D
  空间中与 3D 对象进行实时交互的体验，否则你可能需要考虑其他方案。另一方面，你也许可以尝试使用这项技术，仅仅是为了了解那些尚未被充分探索或开发的新型视觉交互。在这种情况下，这项技术将为你提供一些非常有趣的、可供实验的能力。




  ### 自定义外观设计


  或许这一节的标题应该写成“自定义外观，做还是不做”，因为这在考虑开发 iPhone 或 iPad 应用时似乎是一个永恒的问题。我认为，这个问题在 App Store
  刚上线时可能更为常见。为了急于将产品上架，产品经理们似乎愿意放弃任何重要的设计活动，以压缩开发周期。现在情况虽已有所好转，但对于许多初次涉足 App Store
  的组织来说，这仍然是一个问题。


  理解自定义视觉外观的价值对某些团队来说可能是一个需要跨越的障碍。然而，决定创建并使用自定义资源的理由其实相当简单。使用 SDK 提供的默认对象来构建应用，意味着你将在使用苹果的视觉标识来创建你的应用。当一切尘埃落定时，你的用户本质上是获得了一种苹果式的体验。这并非坏事，但如果你希望你的体验能清晰地代表你自己的品牌，那么这或许不是正确的道路。


  除了出于理念或策略上的原因而避免采用自定义设计方案外，根据我目前所描述的，其实并没有技术上的理由来阻止你在整个应用中集成自定义图形。苹果为开发者提供了多种实现方法，自定义图形也是整个开发流程中自然而然的一部分。


  需要明确的是，这真的不是一个非黑即白的讨论。你可以在应用的每个区域集成自定义图形，但这并不意味着你必须自定义所有内容。在某些情况下，利用 SDK 默认提供的控件可能更有意义。然而，整个设计系统需要考虑到你将如何管理默认控件与自定义外观控件的集成。这并非技术问题，而是关乎用户的感知。你只需要确保用户不会将自定义控件视为与标准外观控件不同的东西，除非这正是你想要达到的效果。


  除了简单地为通用控件替换新图形外，你还可以设计和创建全新的、支持独特输入和交互的 UI 对象。这与其说是“换肤”，不如说是彻底地“重塑”。HIG 在某种程度上不鼓励这样做，这并不是因为它困难且耗时，而是因为如果用户从未见过这种控件，它就会成为理解的障碍。一般来说，这是个很好的指导原则，但一个被重塑的控件的成败，实际上仅取决于设计方案本身。无论看起来多酷，晦涩的设计方案显然会让用户感到沮丧，而一个操作上易于识别的优雅方案则不会成为问题。


  ### 通用性考量


  过去几年中 iOS 设备的演进和扩展创造了一个不断变化的格局，给应用设计师和开发者带来了许多挑战。早期情况很简单：我们只需要为一个设备设计方案。随着 iPad
  的推出，情况变得复杂了一些，我们得搞清楚如何利用所有额外的屏幕空间。抛开设计挑战不谈，这给开发团队带来了困境，因为当需要同时部署两个应用时，他们的工作量基本翻倍了。


  最近，我们看到 App Store 中引入了通用应用。这类应用可以在任何 iOS 设备上运行，因为它们包含了为两种设备环境渲染 UI 所需的代码。通用应用能自动识别其在哪种设备上运行，并相应地调整用户体验。这不仅体现在
  UI 的渲染方式上，也体现在设备上可用的功能上。


  从开发角度来看，这是个好消息，因为它为开发流程带来了显著的效率提升。从设计角度来看，你仍然需要精确定义这两种不同的体验是什么，并确保你的设计方案适合各自的平台。然而，知道你可能会为两个平台同时进行设计，也确实提供了一些独特的优势。与其试图将一个设计强行塞入一个新平台（无论方向如何），并思考各种设计元素和交互将如何映射进去，不如在设计之初就考虑到适当的一致性和适当的差异。如果你的目标用户可能会在两个设备上体验你的应用，这种方法就很重要。


  ### 原生应用与移动网页考量


  组织内部对于是否真的需要原生 iOS 应用可能会有很多争论。鉴于目前移动市场碎片化的现状，为每个相关平台投入资源创建原生应用非常具有挑战性。对许多人来说，移动网页体验是解决此问题的可行方案。然而，在继续推进之前，必须考虑与移动网页解决方案相关的许多重要问题。


  首先必须认识到的一个问题是，网页提供的体验与设备原生渲染的体验之间缺乏对等性。尽管有许多技术能够在浏览器环境中呈现相当引人入胜的用户体验，但没有一种能与原生环境下的表现相媲美。正如我之前回顾过的，苹果让你能够使用一些非常强大的技术，这些技术不仅让你可以提供高度定制化和独特的交互，而且能以无与伦比的性能水平交付这些交互。移动网页解决方案只能支持原生体验所能提供的一小部分可视化交互，并且其性能也远不及原生应用。这并非否定性的观点，你只需要确保你的设计方案考虑到了这些限制。


  我还应该指出，原生应用与移动网页之争其实并非一个二选一的情况。iOS 的特性使得这些体验可以混合在一起。原生应用的用户体验可以跨越原生元素和基于网页的元素，构成一个统一的整体体验。这让你在需要时能够两全其美：既能拥有原生
  UI 渲染的强大和动态性，又能享有基于网页的体验的灵活性和易于维护性。


  你的最终方案将取决于应用的功能需求，以及实现这些功能所需的理想用户体验。任何关于应用体验实施方式的讨论，都应首先从这个角度出发，而不是因为对某种技术存在武断的偏见。




  ### 摘要


  Apple 提供了四项关键技术，用于实现驱动应用程序用户体验的交互：


  - `UIKit`：该框架将负责实现绝大部分的用户体验。

  - `Core Graphics`：一个二维渲染引擎，可为应用程序添加图形创建和编辑功能。在适当情况下，它也可用于支持用户界面元素的渲染。

  - `Core Animation`：`Core Animation` 与 `UIKit` 紧密协作，为用户界面元素添加动态视觉交互。

  - `OpenGL ES`：一项第三方技术，可利用 iOS 设备内置的集成硬件加速功能。`OpenGL ES` 为 2D 和 3D 对象渲染提供高性能图形处理能力。


  鉴于 iOS 所固有的全部图形处理能力，请不要害怕定制图形、设计独特的交互或尝试对象行为。


  Apple 现在允许您将 iPhone 和 iPad 的用户体验合并到一个应用程序中，以简化部署和维护。然而，您仍然需要投入设计工作来定义两种不同的用户体验。主要的设计优势在于能够从一开始就为两种设备定义更大的用户体验连续性，而不是将一种设计方案改造到另一种设备上。


  ![images](img/ch06.jpg)


  ## 交互建模与新颖概念的创造


  本章真正触及了本书的核心。到目前为止，我已经提供了必要的背景信息，用于理解那些将决定您应用程序用户体验的设计决策。现在的问题是，您如何着手做出能让自己应用与众不同的设计决策？以及您如何获得那些能让您脱颖而出的突破性想法？本章将引导您了解基本流程、关键考虑点以及关键技巧，这些最终将帮助您获得所追求的“惊艳”效果。


  这并不是一个简单的公式，您也不可能在读完本章后就能自动设计出一款神奇而令人惊叹的应用。这个过程需要艰苦的工作、分析性思维，以及一点创造力。如果您愿意付出这一切，那么您就很有可能创造出一款突破性的应用。


  ### 什么才算“惊艳”？


  我们首先需要尝试定义什么是“惊艳因素”。这个词在设计词汇中并非一个真正可行的概念；相反，它是对用户对一款独特或特别吸引人的应用所产生积极反应的一种表达。虽然从设计角度看，使用这个词可能有问题，但它确实很好地反映了用户的本能反应，而且这通常是一种我们都能在某种程度上感同身受的反应。但这仍然没有回答这个问题。


  就 iOS 应用的交互而言，“惊艳因素”可以定义为您应用程序的交互层的一种表现，当这种交互超越了用户的某个关键情感阈值时。该阈值最终取决于用户，因此，如果没有清晰地了解目标用户画像，就很难预测或确定。然而，我们可以讨论这种情感阈值的本质以及跨越该阈值所需的关键因素。这些因素如下：


  - **影响的即时性：** 设计必须能够立即引起用户的反应。

  - **新颖性或可识别差异的识别：** 用户必须能够识别给定设计的新颖性，或者至少能识别出它与更传统体验的不同之处。

  - **积极回应：** 解决方案必须具有内在吸引力，以减轻可能因陌生或全新体验带来的冲击。


  当这三个因素都具备时，用户将轻松跨越达到“惊艳”情感质量所需的情感阈值。


  认识到“惊艳”这个概念及其决定因素会受到特定设计方案所展现属性的影响，这一点很重要。这些属性通常协同作用以产生更大的效果，并且通常不会单独负责产生您想要的反应。然而，我们可以将这些属性分离出来，以确定它们对用户体验的独特贡献：


  - **外观：** 这描述了给定设计方案的视觉属性，通过屏幕结构、布局、渲染以及其他构成应用静态视觉的元素来表达。

  - **交互机制与行为：** 这指的是与应用用户界面元素交互所需的物理交互、独特手势和一般输入方式。

  - **视觉交互、动效与动画：** 这些指的是设计方案中让应用“活”起来的响应式或动态元素。它们可能通过与用户输入的反馈或响应性与特定的交互紧密相关，但也涵盖了设计中的环境特质，甚至是与交互不直接相关的过渡状态。


  仅专注于其中一个维度并将其做到极致，也有可能实现“惊艳”的效果。这样的例子确实存在。一个应用可能缺乏任何引人入胜的交互性，但其外观可能如此精美，以至于其他属性在用户感知中不占任何明显分量。另一方面，一个应用可能外观极简，本身没有明显的视觉吸引力，但其交互机制或视觉交互特性可能非常引人注目，仅凭这些属性便能获得预期的用户反应。


  依赖单一属性来跨越用户的情感阈值，是一个高风险的主张。重要的是要认识到，在 iOS 设备上，刚刚描述的三种属性并不一定具有同等权重。一个外观吸引人的应用对用户来说只是基础要求（入局筹码），因此很难在这方面超越他们的期望。此外，iOS
  平台本身并没有什么特殊之处，能为体验应用的视觉特性提供差异化的手段。尽管与其他智能手机相比，其显示屏非常出色，但与品质不错的桌面显示器相比并没有显著差异。


  最能提供“惊艳”机会的属性，是您的应用体验固有的交互机制和行为。这是基于这样一个事实：iOS 设备提供的控制和交互方式，与用户可能熟悉的其他类型的数字体验有着根本的不同。正如我在第三章中讨论的，用户渴望用这些设备体验新鲜和不同的事物，通过密切关注交互机制，您就可以为他们提供他们想要的体验。


  然而，请记住，虽然交互机制是应当重点关注的属性，但您仍然不能忽视外观和视觉交互，因为它们都是同一体验连续体的一部分。主要观点是，您应该首先关注交互机制或行为，而这将有助于指导您如何解决其他两个属性。




  '
- '# 交互建模：流程概览


  交互建模是一种方法，通过它你可以制定基本的交互机制和关键视觉交互，这些将构成应用体验的基础。交互建模流程包含四项关键任务，其中三项是必要的先导活动，第四项则是交互建模本身。我先从宏观层面逐一介绍这些任务，然后再深入探讨建模的考量因素、具体任务和示例。


  ## 需求定义


  首先，你必须至少对应用的功能需求有基本了解。这些需求可以表现为用户体验策略的一部分，也可以作为正式需求规格说明书的详细内容被记录下来。这些信息构成你所有后续设计活动的基础，因此你需要确保其处于稳定状态，并得到团队的一致认可。如果你在更敏捷的环境中工作，可以假设这些信息不那么固定，但在开始工作之前，你仍然需要掌握定义功能的关键需求。有了需求在手，你就可以开始构建合适的用例。


  ## 用例与场景开发


  用例，尤其是那些更偏向场景驱动的用例，是该流程的重要组成部分。一个好的用例应能让团队了解用户将经历的一般工作流程，以及各种需求如何在使用场景中被满足。有些用例可能会通过描述应用体验中不同节点的关键交互的场景叙述，提供明确的指导。请记住，一个用例——无论是否以场景形式表达——都只是一个起点。如果你对你的应用以及它如何向用户表现行为有愿景，那么你可以将其描述到你认为有助于指导后续流程的详细程度。如果你目前没有这些细节，只要能描述用户执行的一般活动，那也并非大问题。完成这一步后，你就可以进入下一阶段。


  ## 应用工作流


  处理应用工作流的方式有很多种，每种都有其独特的用途和价值。从设计角度来看，我们更关注的是能够识别决策逻辑、关键交互点以及将用户从 A 点导航至 B 点所需导航结构的工作流。这是一种以用户为中心的视角，通过建立向用户呈现的特性与功能之间的关系来定义应用结构。一个定义良好的工作流能为你提供一张准确的应用地图，但它不会对驱动应用的交互机制或功能如何呈现做出任何假设。


  #### 交互建模


  这是关键所在。一旦你理解了应用的基本工作流以及这些功能关系在概念上如何组织，你就可以开始思考这些交互点如何呈现给用户。


  交互建模定义了应用的总体行为，以及用户为完成工作流中确定的关键任务所需的核心交互。这可能包括通过可视化用户界面模式（例如由设备方向变化驱动的功能切换）来管理屏幕空间、导航的呈现、基本手势，以及与用户界面常规操作相关的任何其他信息。换句话说，交互建模定义了你的应用将如何运行，而不具体确定应用会做什么。


  正是通过这项活动，你可以开始打造应用体验。一个工作流可以衍生出无数种不同的交互模型，每种模型功能上相似，但应用却融入了截然不同的体验层次。在本章后续内容中，你将看到相关示例。


  '
- '# 流程细节


  现在，我将带你深入了解流程的细节，包括如何构思工作流、制定交互模型、解决问题的方法，以及如何通过打造标志性交互让你的用户体验设计脱颖而出等更多内容。


  ## 构思工作流


  工作流的定义是所有交互设计活动的核心。它规定了用户将如何与你的应用进行交互。问题是，工作流的定义可以根据你想要达到的目标在不同的层级上进行。在某些情况下，你可能只需要在最为抽象的意义上定义工作流，忽略功能细节以及驱动它们的特定交互。这对于勾勒功能集群之间的关系及其之间的通用流程可能很有价值。而在另一个极端，你可能需要定义用户可能经历的所有交互、事件和状态变化的逻辑，以便清晰地描绘出应用的操作方式。


  出于交互建模活动的目的，你需要比抽象的、高层级的工作流更详细的信息，尽管你可能也不需要过于细碎。充实交互模型所需的详细程度取决于你应用的性质。




  '
- '# 构建交互模型


  正如我先前所述，交互建模旨在梳理定义应用整体行为的概念，并理解如何应用或整合这些整体行为，从而为用户创建一个一致且易于理解的模型。在第 2 章中，我回顾了"iOS
  的奇异拓扑结构"，分解了构成 iOS 用户体验基础的概念模型和空间模型。分层平面的概念以及用户在其中移动的空间模型，共同构成了 iOS 整体的基本交互模型。从这个例子中，你能看到，当以正确的方式处理这一思路时，它会产生多么强大的效果（见图
  6-1）。


  ![images](img/0601.jpg)


  **图 6-1**. 在 iPhone 上体验到的 iOS 空间模型


  开始进行交互建模时，你需要刻意地以抽象的方式进行思考。在不涉及具体功能或内容细节的情况下，你需要思考你的应用可能采用的各种不同行为，以了解如何利用它们来控制屏幕上的元素。iOS
  为你提供了一个令人难以置信的选择空间。缩放、平移、轻拂、滑动和滚动等概念，无论是单独使用还是作为复合效果，都能创造出非常独特的交互体验。


  到目前为止，我已经多次谈到差异化。你将面临的最大挑战之一是，弄清楚在何处以及如何最好地实现应用内交互的差异化。理解如何运用这些概念，正是交互建模的核心益处；在这个阶段，你可以自由试验，并深入思考如何将这些概念应用到你的设计问题中。达成一个差异化的解决方案并不十分困难，但要创建一个可扩展、可维护，并且最重要的是能被用户理解的解决方案，则需要付出更多努力。


  让我们快速做一个小练习，来理解如何打破常规，思考一些差异化的交互方式。首先，考虑一个简单的用户界面组件，比如一个项目列表。列表对象在任何用户体验或用户界面设计工作中都相当常见，可用于多种目的。传统上，列表是文本对象的垂直排列，每个文本对象在单列中与其上下的对象清晰区分（见图
  6-2）。


  ![images](img/0602.jpg)


  **图 6-2.** 一个典型的列表


  现在退一步，从最抽象的意义上思考一下列表是什么。它基本上只是一个你可以从中进行选择的数组。仔细想来，这是一个非常基础的概念。然而，如果你进一步思考，你会发


  现，垂直排列并非其固有特性，单列组织也并非其内在优势。因此，你必须问自己：是否存在另一种格式，能为你正在解决的问题增加价值？这一点可能不那么显而易见，所以值得仔细梳理各种选项，看看是否有有趣的可能性出现。为了这个练习的目的，我们来看看这会如何发展。


  如果我们知道（甚至只是相信）列表的垂直方面没有内在价值，那么水平解决方案会是什么样子（见图 6-3）？


  ![images](img/0603.jpg)


  **图 6-3**. 实验性的水平列表方案


  嗯，这很有意思，但我们开始看到，当设备垂直握持时，可用的水平空间可能会带来一些问题。这是否是一个巨大的问题？在没有任何特定上下文的情况下，不是，但考虑到你无法同时看到很多列表项，这对于快速浏览来说可能效率不高。当设备水平放置时，效果会好一些，但仍然不理想。


  让我们再扩展一下思路，看看会有什么结果。单列列表对象的概念同样值得质疑。如果我们将列表扩展为对象数组或某种网格配置，这会给我们带来什么优势（见图 6-4）？


  ![images](img/0604.jpg)


  **图 6-4.** 将列表重新构想为网格或对象数组


  这开始变得更有趣了。这种配置提供了同时查看多个项目的优势，这似乎是对传统列表的一种改进。但我们也需要应对一些缺点。文本对象的可用区域减少了，但如果我们愿意改变文本对象的大小，这似乎是可控的。


  哇！我们只是从列表的基本概念出发，看看我们最终走到了哪里。仅通过一些简单的试验，我们就能够彻底改变这个组件的基本概念。这个想法的发展也不必止步于此；我们还可以探索其他维度。让我们思考一下与列表和列表类对象相关的交互行为。在
  iOS 中，一个经典的列表对象可以通过快速向上或向下轻拂来导航，或者通过缓慢拖动来滚动到屏幕边界之外的条目。这种行为仍然适用吗？能否将其应用到我们的网格实验中（见图
  6-5）？


  ![images](img/0605.jpg)


  **图 6-5.** 垂直滚动适用于两种解决方案


  当然可以！在这个特定案例中，滚动行为的适用性近乎常识，但情况并非总是如此。你始终需要评估你所依赖的现有交互行为，以确保它在新的模型中仍然有效。


  这个例子还没完。现在，让我们将抽象方法应用于列表的行为。一个标准的 iOS 列表对象在需要时支持滚动，并且由于文本对象在垂直列中的方向，这种滚动被限制在单一轴上。既然我们不再局限于单一垂直列的项目，我们如何将滚动行为应用于这个基本概念呢？


  ![images](img/0606.jpg)


  **图 6-6.** 网格上的多轴滚动和行滚动


  有许多种方式可以将滚动行为应用于这个概念，它们可能同样有效（见图 6-6）。从这一系列例子中，你可以看到基于现有组件和交互来构思新想法是多么容易。以列表作为灵感仅仅是个开始；还有许多其他想法、组件和元素可以用同样的方式来处理。解构这些元素，可以成为设计和完善应用中一些极具吸引力的交互的强大方法。




  #### 附加问题解决技巧


  我们刚刚演示了如何从一个相当基础的控制方式中推导出一个新概念。这是为应用程序定义新交互模型的一个绝佳起点，但仅靠它可能无法达到你所需的终点。在过程中某个阶段，你可能会遇到潜在的僵局。某种特定技巧或格式可能无法扩展到你所期望的程度，或者你可能会发现解决方案中的某个优点在应用于应用程序的其他领域时反而成了限制。在这些情况下，你需要一些基础的问题解决技巧，帮助自己从困境中解脱出来。


  我们已经讨论过 iOS 提供的强大功能，它帮助设计师创造出令人惊叹的用户体验。其中最强大的技术之一是 `Core Animation`，它为开发者提供了在应用中集成高度定制动画的工具。动画不仅仅是为了视觉效果而将花哨的运动应用于随机元素；它也是一种极其强大的沟通工具。


  为了理解动画如何为我们创造价值，让我们分解一下动画的本质。在最基本的层面上，动画是随时间改变或调整对象属性或特征的能力。这里的关键概念是**时间**。时间是你能够用来解决关键交互设计问题的最强大工具之一。


  当你空间有限时，时间变得极为有用。当空间受限时，传达复杂想法或显示复杂信息会非常困难。在有限空间内工作时会出现两种情况：要么信息密度极高，要么为了适应可用空间而截断或减少信息量。这两种情况都有问题。高密度信息可能让用户难以消化和理解；而截断的信息则不完整，无法令人满意地满足设计需求。


  我们的列表实验很好地证明了这一点。为了让文本适应网格单元，我们只是将其缩小到既能容纳又能保持清晰的程度。但显然，如果我们不缩放它，就会出现下面展示的情况（参见图
  6-7）。


  ![images](img/0607.jpg)


  **图 6-7.** 可选中对象网格内缩放文本与截断文本的对比


  缩放文本的例子还算成功，但截断文本的例子显然不是一个理想的解决方案。为了本示例的目的，我们假设缩放文本以适应网格元素不是我们希望采用的方式。那么，如何利用时间来解决文本字符串长度的问题呢？我们可以回顾一下小屏智能手机和功能手机的年代来寻找答案。


  ![images](img/0608.jpg)


  **图 6-8.** 截断文本与跑马灯文本在网格元素可视区域内移动的对比


  几年前，跑马灯文本曾是一个非常流行的解决方案。时间在这里发挥了作用，因为解决方案通过动画让文本随时间在可视区域内移动。当文本从右向左移动时，用户可以阅读整个字符串（参见图
  6-8）。这解决了截断问题。将时间作为一个额外的维度引入，提供了一种解决空间受限问题的方法。


  这是一个有趣的解决方案，在某些情况下可能适用，但由于几个原因，它并不是这个网格布局的理想方案。想象一下这个屏幕首次加载时，每个网格单元内都有文本在平移。可以肯定的是，你会被扑面而来的动画文本搞得不知所措。聚焦于单个网格元素将是一项挑战，而且你必须刻意安排查看网格元素的时间，才能完整地观看单个文本字符串从头到尾的循环。否则，你最终会遇到与截断文本相同的问题——每个字符串只能看到一部分。缺少的元素是什么呢？是**用户控制**，它可以通过多种方式发挥作用。


  用户控制的想法显而易见，因为本次讨论的重点是创建交互设计解决方案，而没有某种形式的用户控制，你当然无法实现交互（至少在本实验中是这样；在第 8 章中，我会讨论情况可能并非如此）。但在这里，我想让你通过“**状态**”这个概念，以略有不同的方式思考用户控制。


  `State`（状态）在思考潜在交互模型时是一个非常重要的概念。它是另一种可用于解决设计方案中问题区域的问题解决技巧。与时间类似，状态开辟了在静态解决方案中不可能实现的可能性。从某种意义上说，状态——像时间一样——可以被视为另一个维度，允许你修改屏幕上管理的元素和信息。


  状态到底是什么？状态指的是一个对象所有现存的属性、特征和特性，这些属性可以被用户观察到和/或被控制系统管理。


  到目前为止，我们一直在思考我们为演化后的列表解决方案所构建的交互模型，并且只定义了一种状态。也就是说，它只有一种形态，且这种形态不会改变。但情况未必如此。如果我们能够操纵状态并改变我们模型的构造，那么我们就应该能够解决在交互模型中观察到的任何问题区域。


  将这一点与用户控制的概念联系起来，我们可以说，我们能够通过用户输入的机制来实例化用户界面的不同状态。


  那么，我们如何应用用户控制和状态的概念来解决交互建模实验中固有的问题呢？我们上一个解决方案存在几个问题。我们喜欢网格在显示更多文本项方面提供的效率，但通过增加列表中的项数，我们开始牺牲用于显示文本的可用空间。我们尝试了基于时间的解决方案，但将动画普遍应用于整个网格存在一些特殊性。考虑到这一点，让我们看看一个整合了用户控制的类似解决方案。


  ![images](img/0609.jpg)


  **图 6-9.** 滑动以显示隐藏文本


  这种技巧利用了直接操作的概念，允许用户在他们选择的时机和位置显示更多文本。用户不再面对满屏的动画文本字符串，而是可以采取行动，阅读他们想要的任何部分文本（参见图
  6-9）。


  向文本对象应用一些交互性是一个有效的解决方案，但它相对简单。如果我们扩展这个思路，得出更具革命性的方案呢？让我们不要只关注文本对象本身，而是思考整个网格单元如何随着用户的输入改变状态。


  ![images](img/0610.jpg)


  **图 6-10.** 捏合打开一个网格元素以显示更多信息，然后弹回原尺寸




  现在我们有了一个交互示例，它展示了模型中更高程度的动态性。用户只需一个简单手势，就能展开网格中的元素，从而获得更大的信息查看区域（参见图 6-10）。这不仅使文本对象完全可读，还腾出了更多空间，我们可以用额外的增值信息来填充它。


  曾经这只是一个围绕基本列表的想法，如今却可能成为一种极具魅力的用户体验。在我看来，模型的这一方面似乎增添了一些实用价值——或许远不止是展示一段文本字符串那么简单。但我们为什么要利用这一点，以及如何利用呢？


  在进行此类流程时，需要注意的主要事项之一是，你绝不能孤立地思考这些想法。交互模型是完整系统的模型，是定义应用程序运作方式的系统。如果你认为自己拥有一个足够强大的交互概念来驱动应用程序，那么你就需要考虑如何将该概念映射到用户体验的其他方面。这就是我在本章前面讨论可扩展性和可伸缩性问题时提到过的。如果你有一个引人入胜的交互，但它不适用于应用程序的其他方面，那也没关系。你可能心中有一个更大的交互模型，能够囊括这个概念，并为用户提供一个清晰连贯的模型。然而，一个拥有许多独特交互的应用程序——每个交互都特殊且彼此不同——只会让用户感到困惑和沮丧。实际上，这种方法恰恰与你最初的目标背道而驰。到那时，你拥有的将不是一个交互模型，而只是一堆古怪交互的集合。


  要避免这种情况，你需要不断思考你的交互在应用程序大部分区域中的适用性。这是一种系统层面的思维，对你的应用程序大有裨益。要理解特定交互在多种情境下的适用性，关键在于将你的思维提升到抽象层面。你需要看待你的交互，不是因为它提供的即时解决方案，而是因为它所展示的基本行为以及这可能带来的可能性。将你的交互视为一个基本的行为模板或模式，可以在多个地方以多种方式使用。


  你在构建应用程序时使用的独特行为实例和交互越少，你的交互模型就越健壮。在设计应用程序时，少即是多。你的目标始终应该是通过利用用户已在应用程序中接触过的交互模式的知识和经验，来降低用户的整体认知负荷。


  然而，你也不应该强迫自己在不合理的地方使用某种行为或模式。将你已有的交互映射到用户体验的方方面面是很有诱惑力的，但当你发现自己花费过多时间试图解决某个特定问题的设计方案时，你就会知道这种方法行不通了。如果解决方案对你来说都不显而易见，那么它对用户来说很可能也不显而易见。


  你可能已经注意到，我交替使用了 `interaction`、`behavior` 和 `pattern` 这些概念。我认为这些术语之间有着独特的关系，这一点或许应该澄清一下。


  *   **交互：** 我将它视为交互性的基本单位，例如点击按钮或划过屏幕。它本质上是用户根据系统提示所采取的输入操作。

  *   **行为：** 这是由用户输入和系统反馈所引发的第二层级复杂性。它是系统所展示出的、可被感知的交互完形效应（gestalt effect）。

  *   **模式：** 我将其定义为复合行为以可预测且组织良好的方式运作所产生的累积效应。


  你的交互模型可能致力于在以上任何一个层级建立一致性。这可以通过全面利用大规模模式来实现，也可以采用更细粒度的方法，确保与构成应用程序的对象在交互层面的一致性。你在交互建模方面的努力将决定适合你特定情况的方法。



  #### 打造标志性交互


  主动寻求与潜在竞争对手差异化的思路，自然引出了对“标志性交互”的探讨。所谓标志性交互，是指一种独一无二且经过特意设计，让人能识别出你的应用、品牌或组织的交互方式。着手创造标志性交互是一项战略决策，需要作为整体用户体验战略的一部分来确定。本质上，此前所有关于交互建模方法的讨论，同样适用于定义标志性交互。


  实现标志性交互并非要在整个流程中应用额外技巧，它更多是一种针对最终解决方案的心态和设计目标。通过寻求差异化，你其实已经在着手定义标志性交互了，但截至目前，所有的思考都仅限于单个应用。如果你的组织规模较小，产品组合仅限于一款应用，那么方向是正确的。但如果你所在的组织拥有多款产品，就需要将系统级思维扩展到涵盖其他应用及其功能。这意味着，在交互建模活动中，你需要扩大解决问题的范围，以便了解你的决策对整个应用家族的影响。


  回顾我们之前完成的交互建模示例，可以说网格单元展开及其关联手势，或许能作为标志性交互。目前我们只考虑了解决文字对象截断问题，但让我们思考一些可能适用于更广泛概念的其他选项。假设我们现在正为一款应用进行设计，那么这种交互还能在哪些地方、以什么方式发挥作用？一个选择是将其用于导航。比方说，网格中的项目数组代表了应用中的主要功能节点。我们能否将网格单元的展开和展示作为导航机制？当然可以。


  ![图片](img/0611.jpg)


  **图 6-11.** 使用双指张开进行选择与导航。当超过特定阈值后，网格元素会持续展开，无需用户继续操作。


  这里的基本理念是“展开”这一概念。用户可以通过手指张开来展开一个网格单元，从而显示单元内隐藏的更多信息（见图 6-11）。如果用户的展开操作未超过预设阈值，当手指移开屏幕时，网格单元将自动回弹至原始大小。但如果用户将网格元素展开到超过预设阈值，该网格单元便会自动扩展至全屏大小，并显示该节点的功能（或者成为通往子节点的通道，从这种意义上说）。传统的导航方式可能只需用户点击网格中的某个单元，即可导航至应用中相应的节点。我认为我们可以同时支持这种操作：假设轻轻一点也能达到将网格单元展开至超过阈值的同样效果。


  现在我们开始在为该应用构建独特的交互模型。不同于 iPhone 操作系统层那种既包含离散节点又包含连续节点式体验的线性空间模型，我们现在拥有了一种由某些关键区域的弹性所定义的空间模型。用户无需在应用内从
  A 点移动到 B 点进行导航，而是仅在需要时、在需要的位置展现出功能。从工作流的角度看，这两种方式并无区别；但从体验的角度看，差异是彻底的。


  #### 文档记录


  记录交互模型是这一流程中的重要环节。你需要将想法记录下来，以便与设计及开发团队的其他成员分享和沟通。这有助于确保在执行概念、产出更详细的用户界面交付物时，你的愿景能被充分理解。


  你可以采用任何你喜欢的形式来记录文档，但务必确保涵盖两个基本要点：


  *  以清晰简洁的方式，直观地展示你的交互模型的特性。

  *  对交互模型中难以通过可视化轻松传达的细节，提供详尽的注释说明。


  请记住，你所展示的并非明确的用户界面处理方式，也不是像线框图中那样对控件的映射。这类交付物有意避免达到线框文档中那种细节程度。交互模型的焦点仅在于描述应用的整体行为，以便你能带着清晰的愿景，进入更细致的交互设计活动。


  以下是我们所完成示例的文档可能呈现的样子（见图 6-12）。


  ![图片](img/0612.jpg)


