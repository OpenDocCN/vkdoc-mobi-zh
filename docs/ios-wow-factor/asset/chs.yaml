- '# 引言


  如今的竞争环境异常残酷，相信你也清楚，你的应用想要在 App Store 中脱颖而出极为困难。当前可供下载的应用数以十万计，无论有趣与否都应有尽有。仅从开发角度打造功能完善且稳定流畅的应用，远不足以让作品获得主流认可。用户期待在
  iOS 应用中感受到"惊艳"，这或许正是你曾亲身体验过的感受。如你所知，正是初次使用时的"惊艳感"抓住了用户，促使他们沉浸在你或开发团队倾注心血打造的功能特性中。正是这种"惊艳感"催生了朋友间的口碑推荐和
  App Store 中的五星好评。正是这种"惊艳感"驱动应用实现病毒式传播，最终为你带来实现提前退休的财富！关键问题在于：什么是"惊艳感"？又如何获得它？


  这些问题并不容易回答，但好消息是答案确实存在——我将在本书后续章节中详细阐述。但你需要明白，只要你愿意开始密切关注应用体验的每个细节，就一定能抵达"惊艳"的境地。毋庸置疑，缜密的批判性思维、卓越的问题解决能力以及扎实的设计方法，是一切卓越用户体验的基石。将你的设计实践提升到更高层次，是获得理想中"惊艳感"的必经之路，这正是本书的核心要义。但"惊艳"远不止于优秀的设计实践，它更根植于你如何审视或构建设计问题，这要求你对即将做出的设计决策所涉及的更广阔背景有更深刻的理解。


  我坚信，若不了解来路，便无法真正明确去向。iPhone 虽非市场上首款智能手机，但它无疑是最具影响力和成功的产品之一。作为应用设计师或开发者，你或多或少都能意识到这个新平台带来的巨大机遇，显然你也想抓住它。通过回顾历史，我们能够理解
  iPhone 为何呈现出如今的形态，又为何被奉为杰出用户体验的耀眼标杆。


  在思考你的应用时，你或许需要建立在 iOS 核心体验背后的某些基础概念之上，但另一方面，也可能选择彻底摒弃它们。本书的核心理念极为纯粹——为你，无论是设计师还是开发者，提供关于
  iOS 用户体验本质的实践性洞见，同时赋予你创造卓越应用所需的智慧。对许多人而言，苹果的《人机界面指南》是理解 iOS 能为用户带来何种可能性的起点。但当需要超越这些基础指南时，你该如何应对？因为这些指南终究只是基础——它们根本不足以满足你的需求！本书旨在推动你超越对
  iOS 应用的常规认知，为你提供能深化自身洞察、释放个人创造力的理念与技巧。


  打造一款成功的 iOS 应用绝非易事，但我由衷希望本书能助你将应用提升至新高度，助其获得应有的关注。


  ![images](img/ch01.jpg)


  ## 在语境中理解 iOS 人机界面指南


  苹果的《iOS 人机界面指南》(HIG)旨在成为平台新设计师与开发者的权威起点。苹果制定这份指南的方式简明扼要——提供足够的关键信息、技巧与基础方法，使个人或开发团队能尽快开始构建应用。


  这些指南旨在让读者认识到该平台带来的革命性交互模式。当苹果为第三方应用开发开放设备时，最初面临的挑战是如何让该平台成为应用分发与部署的可行载体。


  2008 年夏季苹果 App Store 上线时，已存在一个成熟的专注于移动设备与消费电子产品的专业团队社群，他们完全有能力迁移至该平台并为其开发软件。然而，成功所需的技术与专长仍被视为相对小众的领域。苹果需要更庞大的开发团队基础来为
  App Store 充实优质软件，才能使其战略获得成功。




  ### 回顾往昔


  2008 年之前，移动应用程序的设计还颇为原始——至少以今天的标准来看是这样。这并非开发者不够努力，而是受限于当时设备的技术水平。那个时代的“功能手机”以便携性著称，小巧的尺寸是产品成功的关键标准之一。因此，这些设备的屏幕极小，色彩深度低，分辨率也低。处理器性能和内存容量同样是严重的制约因素。这意味着移动应用的设计必须遵循极简和克制的原则。在那个环境下，人们对移动应用应具备何种功能、如何运作以及外观如何，期望值并不高。市场碎片化也带来了自身的一系列挑战，迫使设计师和开发者不得不以输入和显示的最低标准为目标，以确保应用能在大量不同设备上运行。这种设计思路在很大程度上导致这些设备上的应用用户体验欠佳。


  “智能手机”则带来了截然不同的挑战。它们通常拥有更大、质量更好的屏幕和更强的计算能力。然而，这些设备的输入方式往往独具特色，不同制造商之间差异巨大。一些较为普遍的输入形式包括：


  *   转轮

  *   四向或五向控制器

  *   专用按钮或硬键

  *   可变按钮或软键

  *   触控笔输入

  *   触控输入


  特定设备的设计会包含这些控制方式的任意组合。在许多情况下，这种输入特性被视为一种“标志性交互”，用以识别特定设备品牌。这在很大程度上是因为早期的大多数智能手机都是由其前身——广受欢迎的
  PDA（个人数字助理）直接演变而来。因此，这类新型手机自然会继承其交互特性，以便利用这种标志性交互的价值和认知度。


  随着功能手机和智能手机市场的成熟，针对这些设备的软件设计与开发出现了高度专业化和精细化的趋势。智能手机市场的碎片化以及每个平台的独特性，将这些知识推向了设计实践中日益小众和专业的领域。


  苹果的 iPhone 挑战了这些既定认知。此前关于手机是什么、能做什么、如何操作的信条需要彻底改变，因此，拥有相关领域专长的人需要被引导着转变思维模式。


  如今，我们已对 iPad 和 iPhone 这样的设备习以为常，但必须记住，iPhone 最初发布时，关于其`Home`键和整体外形设计曾引发过一些争议。该设备简洁的设计、硕大（在当时）的屏幕以及缺少专用实体控制键的特点，与当时几乎所有其他智能手机形成了鲜明对比。人们立刻对`Home`键的功能性和可用性提出了质疑。有些人甚至认为这款产品的成败系于此单一控制键。将众多控制功能从专用实体按键迁移到触屏上显示为像素点，也成了一个主要的争论焦点。


  正是通过这个视角，我们开始理解`HIG`的本质。在回顾这份文档时，我们可以看到历史反映在两大主题中：


  *   理解平台特性，特别是关于输入和控制，包括被动传感能力

  *   在平台技术能力和物理特性的背景下，对精心执行的用户体验具有敏锐的意识和感知


  本质上，这就是`HIG`中“平台特性”部分的目的，它提出了很多观点，旨在帮助团队轻松理解这个平台与他们过去可能接触过的平台有多么不同。


  这是必要的，因为如果不摒弃当时行业中的先入为主观念，就不可能达到该设备所需的执行水准。对苹果来说，这是一种明智的做法，因为它强化了将设备打造成具有大众市场吸引力的主流平台的战略。


  ### 局限性


  然而，`HIG`也有其缺点和局限性。尽管苹果小心地区分了“人机界面原则”和“用户体验指南”，但这两个领域在范围上都有些局限。交互设计师可能认为这些章节价值不大，因为其中陈述的内容过于具体；缺乏抽象概念或建议背后的基本原理，使得交互设计师难以在此基础上进行构建。因此，文档的设计内容过于笼统，缺乏赋能复杂用户体验设计活动所需的深度。


  `HIG`还对流程做出了一些敷衍式的陈述，这些陈述明显是针对经验不足的团队。虽然这些流程陈述在某些场景下是有效的，但它们并未清晰阐述一种能够适应多种需求和情况的综合性设计方法论。


  考虑到目标受众的性质，对于首次尝试打造一款不错甚至优秀的 iOS 应用来说，这些局限性未必是严重问题。苹果将屏幕尺寸、屏幕方向以及电容式触屏界面输入的动态特性放在优先位置，这一事实表明，他们意图通过让设计和开发团队聚焦于输入和输出（将其视为理解用户界面解决方案的最重要因素），来普及移动应用（和移动网络）专业知识。


  我们不能期望苹果提供一个包罗万象的资源来创造优秀的软件。`HIG`是一个绝佳的起点，但如果我们退一步来看，就会发现它实际上是为了解决向第三方开发者开放设备所带来的风险——保护苹果的品牌形象以及
  iOS 设备在市场上的认知度，以确保其持续成功。苹果抱有这种“私心”是完全合理的，因为任何第三方应用的成功都会转化为苹果组织的成功。从表面上看，苹果似乎是在努力普及优秀的设计，但`HIG`的目的也在于通过以下策略来维护和延续其品牌：


  *   为消费者营造一种专属感和文化声望

  *   维持与 iOS 设备及品牌本身相关联的令人向往的光环

  *   在以其微薄利润空间著称的市场中，为高定价提供合理性


  当然，这对任何人来说都不应该感到意外，但我们应该认识到，这些正是 iOS 人机界面指南的一些基本驱动因素。




  ### 超越 HIG 指南


  成功的移动应用不仅仅需要理解用户体验和设计相关问题。随着几代 iOS 应用在市场中更替，为打造引人入胜的设备交互体验，以及如何借此为特定软件产品建立恰当水平的竞争差异化，界定并记录具体信息变得至关重要。而且，除了
  HIG 指南所概述的基础“审美完整性”之外，打造富有冲击力的视觉体验如何能助力你追求的引人入胜的设备交互和差异化呢？这些问题并未得到充分解答——至少未达到易于理解的程度。


  本书旨在更深入地探究 iOS 的运作机制，帮助你理解那些可用于超越基础应用的方法和技巧。我将避开关于自定义控件的争论，为你展示从头开始设计一款精彩应用，或对现有应用进行彻底重构所需的工具和策略。


  本书后续章节深入探讨的主题，更侧重于那些最终会让用户爱上你软件的、引人入胜的交互机制。经典的或更典型的可用性主题也将从这个角度进行探讨。然而，你应该明白，尽管经典的可用性概念是成功软件的基石，但在某些情况下，为设计“欲望”而设定不同的优先级可能是必要的。本书将审视这类设计选择所带来的影响，旨在让你理解，在试图做出正确决策时，需要权衡哪些因素。


  你应当对 HIG 指南已有一定了解，并具备为 iPhone 或 iPad 设计、规划或构建应用的经验。本书假定你具备用户体验设计实践的实用知识，或至少对此类思维方式有一定接触。但即便如此，如果你不具备这些条件，你仍会发现本书的价值，并掌握提升你的
  iOS 应用、让用户产生“哇塞！”赞叹感所需的概念工具。


  ![图片](img/ch02.jpg)


  ### 解构 iOS 用户体验


  认识到 iOS 用户体验之所以如此成功和受欢迎，并非源于单一的设计元素或交互，这一点很重要。所有的用户体验都可以表现为一种“格式塔效应”。换言之，我们所体验到的整体，大于我们所感知的各个组成部分的特质之和。如果不将
  iOS（及其应用）逐一拆解，你无法真正理解它为何如此吸引人。因此，让我们更深入地审视 iOS，剖析定义该操作系统本质和 iOS 应用基础框架的若干基本用户体验要素。


  本次解构的第一部分将聚焦于更高层面的议题，包括呈现隐喻、直接操控概念以及 Home 键的中心地位。稍后，我将从应用的呈现方式及其为用户构建的心智模型入手，剖析所有
  iOS 应用固有的部分交互机制。除此之外，我还将探讨 iOS 背后的一些核心哲学及其应用方式，甚至这种哲学如何时常被矛盾或忽视。最后，我将涵盖体验中的美学组成部分，并解释视觉设计如何提供连贯性，将这些看似分离的元素有机整合。


  #### 隐喻 vs. 实用性


  iOS 体验中一个更有趣的方面在于，该设备的操作系统层从根本上缺乏视觉隐喻。在 iPhone 最初发布时，这一点从未成为其感知可用性的障碍，这充分说明了近十多年来用户特征的演变。如前所述，关于设备的物理设计以及仅配备一个用于操作用户界面（UI）的实体按键，曾引发一些不安。这清晰地表明媒体（很可能也包括广大民众）持有相当保守的观点。那么，为何屏幕上的用户界面没有引发负面反应呢？它与前代设备截然不同，并且与桌面端
  UI 也没有明确的关联。


  理解 iPhone UI 成功的关键，在于认识到其设计强调的是实用性，而非隐喻。为何做出这样的决定？苹果公司此前已经通过富含隐喻的图形用户界面彻底改变了个人计算领域，这一设计方案在个人电脑的迅速普及中扮演了基础性角色。像“桌面”、“文件”和“文件夹”这样极易理解的概念，以及它们在可直接查看和交互的图形框架中的呈现方式，如今已深深植根于我们的集体意识中。如果你将
  iPhone 与其同时代的竞品进行比较，就会发现脱离高度隐喻化的交互模式并不一定是有意为之。智能手机和功能手机当时已经拥有了一套从日益复杂的功能（功能数量不断增加，导航这些功能的手段也日益精巧）演变而来的、根深蒂固的设计理念。在许多情况下，这种演变导致了由某种四向控制器导航的图标矩阵。这是一种非常功利主义的
  UI 设计方法。用户快速扫视屏幕，找到当前任务对应的功能，选择该功能，然后执行任务。速度和效率是决定因素，并且对必须由用户先“解读”的复杂隐喻环境容忍度极低。


  iOS 设备也不例外。在操作系统层缺乏公开或总括性的视觉隐喻，但与此同时，它本质上仍然非常图形化。我们需要认识到，在操作系统的根基层面，用户面对的是一个本质上抽象的空间，其中充满了代表设备上可用应用的类按钮控件。其中一些控件的图稿极简且具有标志性，而另一些则非常丰富且具有说明性。有时图稿代表底层功能，有时则不然。除了界定它们的基本几何形状外，图标唯一的共同特征是一些微小的渲染属性，这些属性向用户暗示这些控件可能是可触摸的。在大多数情况下，用户首先会根据视觉外观识别应用图标。阅读应用图标的标签完全是次要动作。当在多个应用屏幕间滑动时，这种行为变得非常明显；用户在决定再次滑动前，必须快速扫视当前屏幕。当应用图标的视觉特性得以发挥时，操作系统层这种简化的呈现模型就变得可用了。




