  trans: '

    ### 回顾往昔


    2008 年之前，移动应用程序的设计还颇为原始——至少以今天的标准来看是这样。这并非开发者不够努力，而是受限于当时设备的技术水平。那个时代的“功能手机”以便携性著称，小巧的尺寸是产品成功的关键标准之一。因此，这些设备的屏幕极小，色彩深度低，分辨率也低。处理器性能和内存容量同样是严重的制约因素。这意味着移动应用的设计必须遵循极简和克制的原则。在那个环境下，人们对移动应用应具备何种功能、如何运作以及外观如何，期望值并不高。市场碎片化也带来了自身的一系列挑战，迫使设计师和开发者不得不以输入和显示的最低标准为目标，以确保应用能在大量不同设备上运行。这种设计思路在很大程度上导致这些设备上的应用用户体验欠佳。


    “智能手机”则带来了截然不同的挑战。它们通常拥有更大、质量更好的屏幕和更强的计算能力。然而，这些设备的输入方式往往独具特色，不同制造商之间差异巨大。一些较为普遍的输入形式包括：


    *   转轮

    *   四向或五向控制器

    *   专用按钮或硬键

    *   可变按钮或软键

    *   触控笔输入

    *   触控输入


    特定设备的设计会包含这些控制方式的任意组合。在许多情况下，这种输入特性被视为一种“标志性交互”，用以识别特定设备品牌。这在很大程度上是因为早期的大多数智能手机都是由其前身——广受欢迎的
    PDA（个人数字助理）直接演变而来。因此，这类新型手机自然会继承其交互特性，以便利用这种标志性交互的价值和认知度。


    随着功能手机和智能手机市场的成熟，针对这些设备的软件设计与开发出现了高度专业化和精细化的趋势。智能手机市场的碎片化以及每个平台的独特性，将这些知识推向了设计实践中日益小众和专业的领域。


    苹果的 iPhone 挑战了这些既定认知。此前关于手机是什么、能做什么、如何操作的信条需要彻底改变，因此，拥有相关领域专长的人需要被引导着转变思维模式。


    如今，我们已对 iPad 和 iPhone 这样的设备习以为常，但必须记住，iPhone 最初发布时，关于其`Home`键和整体外形设计曾引发过一些争议。该设备简洁的设计、硕大（在当时）的屏幕以及缺少专用实体控制键的特点，与当时几乎所有其他智能手机形成了鲜明对比。人们立刻对`Home`键的功能性和可用性提出了质疑。有些人甚至认为这款产品的成败系于此单一控制键。将众多控制功能从专用实体按键迁移到触屏上显示为像素点，也成了一个主要的争论焦点。


    正是通过这个视角，我们开始理解`HIG`的本质。在回顾这份文档时，我们可以看到历史反映在两大主题中：


    *   理解平台特性，特别是关于输入和控制，包括被动传感能力

    *   在平台技术能力和物理特性的背景下，对精心执行的用户体验具有敏锐的意识和感知


    本质上，这就是`HIG`中“平台特性”部分的目的，它提出了很多观点，旨在帮助团队轻松理解这个平台与他们过去可能接触过的平台有多么不同。


    这是必要的，因为如果不摒弃当时行业中的先入为主观念，就不可能达到该设备所需的执行水准。对苹果来说，这是一种明智的做法，因为它强化了将设备打造成具有大众市场吸引力的主流平台的战略。


    ### 局限性


    然而，`HIG`也有其缺点和局限性。尽管苹果小心地区分了“人机界面原则”和“用户体验指南”，但这两个领域在范围上都有些局限。交互设计师可能认为这些章节价值不大，因为其中陈述的内容过于具体；缺乏抽象概念或建议背后的基本原理，使得交互设计师难以在此基础上进行构建。因此，文档的设计内容过于笼统，缺乏赋能复杂用户体验设计活动所需的深度。


    `HIG`还对流程做出了一些敷衍式的陈述，这些陈述明显是针对经验不足的团队。虽然这些流程陈述在某些场景下是有效的，但它们并未清晰阐述一种能够适应多种需求和情况的综合性设计方法论。


    考虑到目标受众的性质，对于首次尝试打造一款不错甚至优秀的 iOS 应用来说，这些局限性未必是严重问题。苹果将屏幕尺寸、屏幕方向以及电容式触屏界面输入的动态特性放在优先位置，这一事实表明，他们意图通过让设计和开发团队聚焦于输入和输出（将其视为理解用户界面解决方案的最重要因素），来普及移动应用（和移动网络）专业知识。


    我们不能期望苹果提供一个包罗万象的资源来创造优秀的软件。`HIG`是一个绝佳的起点，但如果我们退一步来看，就会发现它实际上是为了解决向第三方开发者开放设备所带来的风险——保护苹果的品牌形象以及
    iOS 设备在市场上的认知度，以确保其持续成功。苹果抱有这种“私心”是完全合理的，因为任何第三方应用的成功都会转化为苹果组织的成功。从表面上看，苹果似乎是在努力普及优秀的设计，但`HIG`的目的也在于通过以下策略来维护和延续其品牌：


    *   为消费者营造一种专属感和文化声望

    *   维持与 iOS 设备及品牌本身相关联的令人向往的光环

    *   在以其微薄利润空间著称的市场中，为高定价提供合理性


    当然，这对任何人来说都不应该感到意外，但我们应该认识到，这些正是 iOS 人机界面指南的一些基本驱动因素。

    '
- fmt: '### Beyond the HIG


    Successful mobile applications require more than a basic understanding of user
    experience and design-related issues. Now that a few generations of iOS applications
    have cycled through the market, it is important to define and document concrete
    information related to the development of compelling device interaction and how
    that can work to establish the right level of competitive differentiation for
    a particular software product. And beyond the basic “Aesthetic Integrity” outlined
    by the HIG, how can creating impactful visual experiences contribute to the compelling
    device interaction and the differentiation you may be striving for? These are
    issues that are not fully addressed—at least not at a level that is easy to understand.


    This book intends to dive a bit deeper into the mechanics of iOS to help you understand
    the methods and techniques that can be employed to move beyond a basic application.
    I will bypass any argument for or against custom controls and show you the tools
    and tactics required to design an amazing application from scratch, or undertake
    the wholesale reinvention of an existing application.


    The topics covered in depth later in this book are more concerned with the mechanics
    of compelling interaction that will ultimately make people love your software.
    Classic or more typical usability themes will be approached from this perspective
    as well. However, you should understand that while classic usability concepts
    are fundamental to successful software, in some cases it may be necessary to set
    different priorities when designing for “desire.” The impact of those types of
    design choices will be reviewed in an effort to give you an understanding of what’s
    in the balance when trying to make the right decision.


    You should already have some familiarity with the HIG as well as some experience
    designing, specifying, or building apps for either the iPhone or the iPad. A working
    knowledge of user experience design practice, or at least some degree of exposure
    to that type of thinking is assumed as well. However, if that’s not the case,
    you still will find value in this book and have at your disposal the means to
    develop the concepts that will elevate your iOS app and engender a sense of Wow!
    with your users.


    ![images](images/ch02.jpg)


    ### Deconstructing the iOS User Experience


    It is important to recognize that it’s not a single design element or interaction
    that makes the iOS user experience so successful and popular. All user experience
    can be expressed as a gestalt effect. In other words, that which we experience
    is greater than the qualities of the individual components we perceive. You can’t
    truly understand what it is about iOS (and subsequent applications) that makes
    it so attractive without pulling it apart piece by piece. So let’s take a deeper
    look into iOS and break down some of the fundamental elements of user experience
    that define the nature of the operating system and the fundamental framework of
    iOS applications.


    The first part of this deconstruction will focus on higher-level issues including
    the presentation metaphor, the concept of direct manipulation, and the centrality
    of the Home button. Later on I will break down some of the interaction mechanics
    inherent to all iOS applications in terms of their presentation and the mental
    model that presentation suggests for users. Beyond that, I’ll look at some of
    the core philosophy behind iOS and how that philosophy is applied, and even how
    that philosophy is often contradicted or ignored. And finally, I’ll cover the
    aesthetic components of the experience and explain how visual design can provide
    the continuity that pulls all of these disparate elements together.


    #### Metaphor vs. Utility


    One of the more interesting aspects of the iOS experience is how the OS layer
    of the device fundamentally lacks a visual metaphor. The fact that this was never
    an obstacle to the perceived usability of the iPhone when it was initially released
    tells us a lot about the changing nature of users over the past decade or so.
    As stated earlier, there was some consternation regarding the physical design
    of the device, and the inclusion of a single hard control for operating the user
    interface (UI). This is a clear indicator of a fairly conservative view of the
    media, and likely the populace at large too. So why didn’t the on-screen user
    interface result in a negative reaction? It was a departure from preceding devices,
    and it certainly did not have a clear relationship to desktop UIs.


    The key to understanding the success of the iPhone UI lies in recognizing the
    emphasis the design places on utility, rather than metaphor. Why was this decision
    made? Apple had already revolutionized personal computing with the metaphor-rich
    graphical user interface, a design solution that played a fundamental role in
    the rapid adoption of the PC. Highly accessible ideas like “desktop,” “files,”
    and “folders,” and their representation within a graphical framework that you
    could see and interact with directly, are now ingrained in our communal consciousness.
    A departure from a highly metaphorical interaction model was not necessarily a
    deliberate move when you look at the iPhone in comparison to its contemporaries
    at the time of its release. Smartphones and feature phones already had a well-established
    design ethos that evolved from the increasing complexity of their functionality—an
    increasing number of features and an increasingly sophisticated means by which
    to navigate those features. In many cases this evolution resulted in a matrix
    of icons navigated by some kind of four-way control. This is a very utilitarian
    approach to the design of a UI. One quickly scans a screen for the appropriate
    function for the task at hand, selects that function, and executes the task. Speed
    and efficiency are the determining factors here, and there is very little tolerance
    to complex metaphorical environments that must first be deciphered by the user.


    iOS devices are no different. There is a lack of overt or overarching visual metaphor
    at the OS layer, yet at the same time it is still very graphical in nature. What
    we need to recognize is that at the root level of the OS, the user is presented
    with an inherently abstract space populated with button-like controls that represent
    the applications available on the device. Some of these controls contain artwork
    that is minimal and iconic, while others are very rich and illustrative. Sometimes
    the artwork is representative of the underlying functionality and sometimes it
    is not. Beyond the basic geometry that bounds them, the icons’ only shared characteristics
    are a few minor rendering attributes that give the user an indication that these
    controls may be touchable. In most cases, a user will first identify an app icon
    by its visual appearance. Reading the app icon’s label is entirely a secondary
    action. This behavior becomes very evident when swiping through multiple screens
    of applications; a user must quickly scan the screen before making the decision
    to swipe again. The simplistic presentation model at the OS level becomes usable
    when it is enabled by the visual nature of the app icons.'
  raw: '### Beyond the HIG


    Successful mobile applications require more than a basic understanding of user
    experience and design-related issues. Now that a few generations of iOS applications
    have cycled through the market, it is important to define and document concrete
    information related to the development of compelling device interaction and how
    that can work to establish the right level of competitive differentiation for
    a particular software product. And beyond the basic “Aesthetic Integrity” outlined
    by the HIG, how can creating impactful visual experiences contribute to the compelling
    device interaction and the differentiation you may be striving for? These are
    issues that are not fully addressed—at least not at a level that is easy to understand.


    This book intends to dive a bit deeper into the mechanics of iOS to help you understand
    the methods and techniques that can be employed to move beyond a basic application.
    I will bypass any argument for or against custom controls and show you the tools
    and tactics required to design an amazing application from scratch, or undertake
    the wholesale reinvention of an existing application.


    The topics covered in depth later in this book are more concerned with the mechanics
    of compelling interaction that will ultimately make people love your software.
    Classic or more typical usability themes will be approached from this perspective
    as well. However, you should understand that while classic usability concepts
    are fundamental to successful software, in some cases it may be necessary to set
    different priorities when designing for “desire.” The impact of those types of
    design choices will be reviewed in an effort to give you an understanding of what’s
    in the balance when trying to make the right decision.


    You should already have some familiarity with the HIG as well as some experience
    designing, specifying, or building apps for either the iPhone or the iPad. A working
    knowledge of user experience design practice, or at least some degree of exposure
    to that type of thinking is assumed as well. However, if that’s not the case,
    you still will find value in this book and have at your disposal the means to
    develop the concepts that will elevate your iOS app and engender a sense of Wow!
    with your users.


    ## ![images](images/ch02.jpg)


    ## **Deconstructing the iOS User Experience**


    It is important to recognize that it’s not a single design element or interaction
    that makes the iOS user experience so successful and popular. All user experience
    can be expressed as a gestalt effect. In other words, that which we experience
    is greater than the qualities of the individual components we perceive. You can’t
    truly understand what it is about iOS (and subsequent applications) that makes
    it so attractive without pulling it apart piece by piece. So let’s take a deeper
    look into iOS and break down some of the fundamental elements of user experience
    that define the nature of the operating system and the fundamental framework of
    iOS applications.


    The first part of this deconstruction will focus on higher-level issues including
    the presentation metaphor, the concept of direct manipulation, and the centrality
    of the Home button. Later on I will break down some of the interaction mechanics
    inherent to all iOS applications in terms of their presentation and the mental
    model that presentation suggests for users. Beyond that, I’ll look at some of
    the core philosophy behind iOS and how that philosophy is applied, and even how
    that philosophy is often contradicted or ignored. And finally, I’ll cover the
    aesthetic components of the experience and explain how visual design can provide
    the continuity that pulls all of these disparate elements together.


    ### Metaphor vs. Utility


    One of the more interesting aspects of the iOS experience is how the OS layer
    of the device fundamentally lacks a visual metaphor. The fact that this was never
    an obstacle to the perceived usability of the iPhone when it was initially released
    tells us a lot about the changing nature of users over the past decade or so.
    As stated earlier, there was some consternation regarding the physical design
    of the device, and the inclusion of a single hard control for operating the user
    interface (UI). This is a clear indicator of a fairly conservative view of the
    media, and likely the populace at large too. So why didn’t the on-screen user
    interface result in a negative reaction? It was a departure from preceding devices,
    and it certainly did not have a clear relationship to desktop UIs.


    The key to understanding the success of the iPhone UI lies in recognizing the
    emphasis the design places on utility, rather than metaphor. Why was this decision
    made? Apple had already revolutionized personal computing with the metaphor-rich
    graphical user interface, a design solution that played a fundamental role in
    the rapid adoption of the PC. Highly accessible ideas like “desktop,” “files,”
    and “folders,” and their representation within a graphical framework that you
    could see and interact with directly, are now ingrained in our communal consciousness.
    A departure from a highly metaphorical interaction model was not necessarily a
    deliberate move when you look at the iPhone in comparison to its contemporaries
    at the time of its release. Smartphones and feature phones already had a well-established
    design ethos that evolved from the increasing complexity of their functionality—an
    increasing number of features and an increasingly sophisticated means by which
    to navigate those features. In many cases this evolution resulted in a matrix
    of icons navigated by some kind of four-way control. This is a very utilitarian
    approach to the design of a UI. One quickly scans a screen for the appropriate
    function for the task at hand, selects that function, and executes the task. Speed
    and efficiency are the determining factors here, and there is very little tolerance
    to complex metaphorical environments that must first be deciphered by the user.


    iOS devices are no different. There is a lack of overt or overarching visual metaphor
    at the OS layer, yet at the same time it is still very graphical in nature. What
    we need to recognize is that at the root level of the OS, the user is presented
    with an inherently abstract space populated with button-like controls that represent
    the applications available on the device. Some of these controls contain artwork
    that is minimal and iconic, while others are very rich and illustrative. Sometimes
    the artwork is representative of the underlying functionality and sometimes it
    is not. Beyond the basic geometry that bounds them, the icons’ only shared characteristics
    are a few minor rendering attributes that give the user an indication that these
    controls may be touchable. In most cases, a user will first identify an app icon
    by its visual appearance. Reading the app icon’s label is entirely a secondary
    action. This behavior becomes very evident when swiping through multiple screens
    of applications; a user must quickly scan the screen before making the decision
    to swipe again. The simplistic presentation model at the OS level becomes usable
    when it is enabled by the visual nature of the app icons.'
  trans: '

    ### 超越 HIG 指南


    成功的移动应用不仅仅需要理解用户体验和设计相关问题。随着几代 iOS 应用在市场中更替，为打造引人入胜的设备交互体验，以及如何借此为特定软件产品建立恰当水平的竞争差异化，界定并记录具体信息变得至关重要。而且，除了
    HIG 指南所概述的基础“审美完整性”之外，打造富有冲击力的视觉体验如何能助力你追求的引人入胜的设备交互和差异化呢？这些问题并未得到充分解答——至少未达到易于理解的程度。


    本书旨在更深入地探究 iOS 的运作机制，帮助你理解那些可用于超越基础应用的方法和技巧。我将避开关于自定义控件的争论，为你展示从头开始设计一款精彩应用，或对现有应用进行彻底重构所需的工具和策略。


    本书后续章节深入探讨的主题，更侧重于那些最终会让用户爱上你软件的、引人入胜的交互机制。经典的或更典型的可用性主题也将从这个角度进行探讨。然而，你应该明白，尽管经典的可用性概念是成功软件的基石，但在某些情况下，为设计“欲望”而设定不同的优先级可能是必要的。本书将审视这类设计选择所带来的影响，旨在让你理解，在试图做出正确决策时，需要权衡哪些因素。


    你应当对 HIG 指南已有一定了解，并具备为 iPhone 或 iPad 设计、规划或构建应用的经验。本书假定你具备用户体验设计实践的实用知识，或至少对此类思维方式有一定接触。但即便如此，如果你不具备这些条件，你仍会发现本书的价值，并掌握提升你的
    iOS 应用、让用户产生“哇塞！”赞叹感所需的概念工具。


    ![图片](img/ch02.jpg)


    ### 解构 iOS 用户体验


    认识到 iOS 用户体验之所以如此成功和受欢迎，并非源于单一的设计元素或交互，这一点很重要。所有的用户体验都可以表现为一种“格式塔效应”。换言之，我们所体验到的整体，大于我们所感知的各个组成部分的特质之和。如果不将
    iOS（及其应用）逐一拆解，你无法真正理解它为何如此吸引人。因此，让我们更深入地审视 iOS，剖析定义该操作系统本质和 iOS 应用基础框架的若干基本用户体验要素。


    本次解构的第一部分将聚焦于更高层面的议题，包括呈现隐喻、直接操控概念以及 Home 键的中心地位。稍后，我将从应用的呈现方式及其为用户构建的心智模型入手，剖析所有
    iOS 应用固有的部分交互机制。除此之外，我还将探讨 iOS 背后的一些核心哲学及其应用方式，甚至这种哲学如何时常被矛盾或忽视。最后，我将涵盖体验中的美学组成部分，并解释视觉设计如何提供连贯性，将这些看似分离的元素有机整合。


    #### 隐喻 vs. 实用性


    iOS 体验中一个更有趣的方面在于，该设备的操作系统层从根本上缺乏视觉隐喻。在 iPhone 最初发布时，这一点从未成为其感知可用性的障碍，这充分说明了近十多年来用户特征的演变。如前所述，关于设备的物理设计以及仅配备一个用于操作用户界面（UI）的实体按键，曾引发一些不安。这清晰地表明媒体（很可能也包括广大民众）持有相当保守的观点。那么，为何屏幕上的用户界面没有引发负面反应呢？它与前代设备截然不同，并且与桌面端
    UI 也没有明确的关联。


    理解 iPhone UI 成功的关键，在于认识到其设计强调的是实用性，而非隐喻。为何做出这样的决定？苹果公司此前已经通过富含隐喻的图形用户界面彻底改变了个人计算领域，这一设计方案在个人电脑的迅速普及中扮演了基础性角色。像“桌面”、“文件”和“文件夹”这样极易理解的概念，以及它们在可直接查看和交互的图形框架中的呈现方式，如今已深深植根于我们的集体意识中。如果你将
    iPhone 与其同时代的竞品进行比较，就会发现脱离高度隐喻化的交互模式并不一定是有意为之。智能手机和功能手机当时已经拥有了一套从日益复杂的功能（功能数量不断增加，导航这些功能的手段也日益精巧）演变而来的、根深蒂固的设计理念。在许多情况下，这种演变导致了由某种四向控制器导航的图标矩阵。这是一种非常功利主义的
    UI 设计方法。用户快速扫视屏幕，找到当前任务对应的功能，选择该功能，然后执行任务。速度和效率是决定因素，并且对必须由用户先“解读”的复杂隐喻环境容忍度极低。


    iOS 设备也不例外。在操作系统层缺乏公开或总括性的视觉隐喻，但与此同时，它本质上仍然非常图形化。我们需要认识到，在操作系统的根基层面，用户面对的是一个本质上抽象的空间，其中充满了代表设备上可用应用的类按钮控件。其中一些控件的图稿极简且具有标志性，而另一些则非常丰富且具有说明性。有时图稿代表底层功能，有时则不然。除了界定它们的基本几何形状外，图标唯一的共同特征是一些微小的渲染属性，这些属性向用户暗示这些控件可能是可触摸的。在大多数情况下，用户首先会根据视觉外观识别应用图标。阅读应用图标的标签完全是次要动作。当在多个应用屏幕间滑动时，这种行为变得非常明显；用户在决定再次滑动前，必须快速扫视当前屏幕。当应用图标的视觉特性得以发挥时，操作系统层这种简化的呈现模型就变得可用了。

    '
- fmt: '# iOS 文件系统与交互设计


    iOS 设备上没有文件系统的概念，这强化了非隐喻式的方法。如果没有桌面和文件夹，那么文件的概念无疑会变得非常难以管理。内容类型以非常明确的方式处理——它们作为创建或发现它们的应用程序工作流程的一部分无缝运行。用户无需承担在文件系统层级中组织文件的负担，也无需在需要时寻找或搜索这些文件。每个应用程序都以自己的方式管理其相关的“内容对象”。内容对象的性质通常决定了用户的组织方法和浏览交互方式。以下是一些应用、它们的内容类型及其组织方法的示例：


    - **相机**：“相机胶卷”：图像阵列或单张滑动浏览

    - **iPod**：基于列表的媒体对象浏览或旋转木马浏览

    - **iBooks**：“书库”：书籍/文档阵列或基于列表的浏览


    还有无数其他示例可以列举。虽然存在许多共享的交互模式和流行技术，但你会发现每个应用程序都以与其用户当前操作最相关的方式管理其特定的内容对象。


    从这些示例中，我们开始看到操作系统层的高度抽象性质并未延伸到应用体验中。应用可以是（而且在许多情况下确实是）高度隐喻式的体验。通常，较小尺寸的设备不太适合视觉复杂的隐喻式用户界面。小屏幕在吸引用户参与这一层面带来了许多挑战，正如我之前所解释的，移动设备往往偏向于实用性。然而，这并不意味着成功的、高度隐喻式的界面是不可能的。目前
    iPhone 上可用的许多优秀设计解决方案都采用了这种方法，但我们真正开始看到这类设计解决方案在 iPad 上发挥出最大效果。


    iPad 代表了一个新的产品类别，没有超实用性的历史包袱。它的焦点集中在休闲用例上。速度和效率已让位于参与感和娱乐性。虽然 iPad 和 iPhone 共享相同的基础操作系统，但其应用的呈现方面却大相径庭。显然，显示比例是驱动分化的主要平台特性，但许多
    iPad 应用呈现出的一个显著特质是高度丰富的隐喻式方法，这在很多情况下接近于模拟。不仅存在具有高度视觉保真度的对象的字面表示，而且这些对象对输入的反应也具有高度的物理保真度。虽然在
    iPad 之前其他计算环境也能实现这一点，但这些设备的触觉特性赋予了新的真实感维度，使得这种方法变得可取。


    在构思应用时，隐喻和实用性只是两个考虑因素，但请注意，它们并非相互排斥。看看你今天珍视的应用。它们是如何构建的？它们采用了哪些概念？它们似乎更偏向实用性而非隐喻，还是相反？这些问题将帮助你理解这两种方法的价值，以便你开始形成自己的观点，判断哪种对你的用户是正确的。


    ## 直接操作


    直接操作是任何触摸驱动用户界面的一个绝对基本概念。基本概念是这样的：你直接触摸你想要交互的对象。而间接操作则依赖于输入设备来间接移动光标，或通过其他方式将焦点引导到你想要交互的对象上。但这不仅仅是关于手指或鼠标。直接操作的关键在于，你与对象交互的结果与你的输入紧密关联，以至于你感知不到虚拟与现实之间的障碍。这一理解对于
    iOS 体验非常重要。你在 iOS 设备上可能发现的许多令人兴奋或新颖的交互都完全依赖于这一理念。


    用户天生理解直接操作的概念，因为它反映了他们与物理世界交互的方式。你拖动东西来移动它们，按钮在触摸时看起来会被按下。没有需要学习的硬件控制组合，也没有需要学习的复杂命令集。对象倾向于以与你对世界的认知一致的可预测方式做出反应。


    直接操作也存在一些挑战。对于 iPhone 和 iPad 这样的设备，屏幕空间总是非常宝贵。人们倾向于通过创建较小的触摸控件来优化空间，而在某些情况下这些控件小到难以使用。当直接操作是一个基本原则时，尺寸可能成为触摸屏可用性的重大挑战。触摸目标越小，访问和操作就越困难。紧密相邻的小触摸目标通过提供错误输入的机会，极大地增加了用户出错的可能性。当被手指遮挡时，小目标可能难以识别。这也可能抵消对特定交互可能很重要的视觉反馈。


    我们可以在 iPhone 上看到所有这些挑战，它尝试构建一个强大的触摸操作系统是一个相对极端的环境。许多 iPhone 的触摸控件推动甚至超越了有效人体工程学的界限。最好的例子是
    iPhone 键盘及其各种变体。苹果面临的挑战是在非常有限的空间内创建一个功能完整的键盘，尤其是在垂直方向（屏幕水平宽度最小时）。按键太小，它们靠得太近，而且你无法看到你触摸了哪个按键。那么为什么这个键盘能如此好用呢？苹果集成了多种不同的技术来缓解内在的人体工程学和可用性问题，使这个设计获得成功。以下是他们所做的：


    - **目标太小**：提供触摸按键的视觉反馈，该反馈延伸出手指的接触点之外。

    - **目标靠得太近**：提供一个预测文本算法，建议预期的单词，即使它并非用户所输入的内容。

    - **目标靠得太近**：提供一个内联拼写检查算法，用于额外的用户控制和输入修正。


    这代表了一个非常强大的交互设计解决方案和复杂的技术解决方案，用于处理直接操作和触屏中最棘手的问题之一：在非常小的空间内挤在一起的微小按钮。这是一个非常危险的设计方案，并且除非你有资源来创建解决方法来增强核心交互并使其成功，否则请避免这种情况。'
  raw: 'There is no notion of a file system on iOS devices, which reinforces the non-metaphorical
    approach. If there is no desktop and no folders, then the concept of files certainly
    becomes a very difficult concept to manage. Content types are dealt with in a
    very unambiguous manner—they run seamlessly as part of the application workflow
    that led to their creation or discovery. The user isn’t burdened with having to
    organize files within a file system hierarchy, and subsequently having to find
    or search for those files when they are needed again. Each application manages
    its relevant “content objects” in its own way. The nature of the content object
    often defines the method of organization and browsing interaction for the user.
    Here are a few examples of apps, their content types, and their method of organization:


    *   Camera: Camera Roll: image array or one-up swipe-able browsing

    *   iPod: List-based media object browsing or carousel browsing

    *   iBooks: Library: book/document array or list-based browsing


    There are numerous other examples that I could point to as well. And while there
    are many shared interaction patterns and popular techniques, you’ll find that
    each application manages its particular content object in the most relevant way
    for whatever it is the user is doing.


    From these examples we begin to see that the highly abstracted nature of the OS
    layer does not extend into the application experience. Apps can be, and in many
    cases are, highly metaphorical experiences. Generally, smaller-scale devices are
    less suitable for visually complex metaphorical UIs. Small screens present many
    challenges to engaging users at that level, and as I explained earlier, mobile
    devices tend to bias towards utility. However, that is not to say a successful,
    highly metaphorical interface is impossible. There are many great design solutions
    in apps available now for the iPhone that take this approach, but we really begin
    to see this kind of design solution taken to its fullest effect on the iPad.


    The iPad, representing a new product category, does not have the historical legacy
    of hyper-utility. Its focus is centered on the leisure use-case. Speed and efficiency
    have taken a back seat to engagement and entertainment. And while the iPad and
    the iPhone share the same fundamental OS, the presentation aspects of their applications
    diverge significantly. Obviously, display scale is the main platform characteristic
    driving divergence, but one of the distinct qualities that have emerged with many
    iPad apps is a very rich, metaphorical approach that in many cases borders on
    simulation. Not only is there a literal representation of an object with a high
    degree of visual fidelity, but the objects also react to input with a high degree
    of physical fidelity. While this has been possible in other computing environments
    before the iPad, the tangible aspect of these devices have imparted a new dimension
    of realism that makes this kind of approach desirable.


    Metaphor and utility are only two considerations when conceptualizing your application,
    but be aware that they are not exclusive of one another. Take a look at the applications
    that you value today. How are they structured and what concepts do they employ?
    Do they appear to be biased more toward utility than metaphor, or is it the other
    way around? These questions will help you understand the value of the two approaches
    so you can begin to formulate your own ideas about what you believe is right for
    your users.


    ### Direct Manipulation


    Direct manipulation is an absolutely fundamental concept for any touch-driven
    UI. The basic concept is this: You directly touch the objects that you wish to
    interact with. Whereas with indirect manipulation you are dependent on an input
    device to indirectly navigate a cursor, or by other means to direct focus to an
    object with which you want to interact. But this is about more than fingers or
    mice. The key to direct manipulation is the notion that the result of your interaction
    with an object is so closely associated with your input that you perceive no barrier
    between the virtual and the real. This understanding is very important to the
    iOS experience. Many interactions that you may find exciting or novel on iOS devices
    are entirely dependent on this idea.


    Users inherently understand the concept of direct manipulation because it is a
    reflection of how they interact with the physical world. You drag things to move
    them around and buttons appear to be depressed when touched. There is no hardware
    control set to learn, or complex set of commands to learn. Objects tend to behave
    in a predictable manner consistent with what you know about your world.


    There are some challenges with direct manipulation. With devices like the iPhone
    and iPad, screen real estate is always at a premium. There is a tendency to optimize
    that space by creating touch controls that are small, and in some cases too small
    to be easily usable. Size can be a significant challenge to usability on touch
    screens when direct manipulation is a fundamental principle. The smaller the touch
    target, the more difficult it is access and operate. Small touch targets in close
    proximity dramatically increase the possibility of user error by providing the
    opportunity for mistaken input. Small targets can be difficult to identify when
    obscured by fingers. This can also have the effect of negating any visual feedback
    that may be important to a particular interaction.


    We can see all of these challenges arise on the iPhone, which is a relatively
    extreme environment in which to attempt a robust touch-based OS. Many iPhone touch-based
    controls push or even exceed the boundaries of the effective ergonomics. The best
    example of this is the iPhone keyboard in all its variations. Apple was challenged
    to create a fully operational keyboard in a very limited amount of space, especially
    in the vertical orientation when horizontal screen width is at its minimum. The
    keys are too small, they are too close together, and you can’t see what key that
    you have touched. So why does this keyboard work so well? Apple integrated a number
    of different techniques to mitigate the inherent ergonomic and usability issues
    and make this design successful. Here’s what they did:


    *   **Target too small:** Provide visual feedback of the touched key that extends
    beyond the contact point of the finger.

    *   **Targets in close proximity:** Provide a predictive text algorithm that suggests
    an intended word, even if it wasn’t what was typed.

    *   **Targets in close proximity:** Provide an inline spellcheck algorithm for
    additional user control and refinement of input.


    This represents a very robust interaction design solution and complex technical
    solution for one of the most problematic aspects of direct manipulation and touch
    screens in general: tiny buttons, squeezed together in a very small space. It’s
    a very dangerous proposition, and unless you have the resources to create the
    workaround solutions to augment the core interactions and make it successful,
    then avoid this situation.'
