    ## About the Author


    **Tim Wood** is currently Director of User Experience at EffectiveUI, where he
    leads an award winning design team specializing in the creation of custom applications
    for the web, mobile, and desktop environments.


    For more than a decade, Tim has persistently focused on the radical transformation
    of business through user experience. From next-generation consumer electronics
    to highly specialized mobile applications, his passion for design has fueled an
    inherent desire to innovate and promote progressive methods of interaction design.
    Tim holds an MFA in Computer Graphics and Interactive Media Development from the
    Rochester Institute of Technology and is an internationally recognized speaker
    on the topics of user experience design, user interface design and interaction
    design.


    Tim lives in upstate New York with his partner Lynne, their cat Elysium and a
    random assortment of feral cats and other urban wildlife. When not designing,
    Tim can usually be found bounding quickly and quietly through the forests of the
    northeast on his mountain bike… only getting out of hand and crashing some of
    the time.


    ## About the Technical Reviewer


    **Adam Smith** is a Rochester Institute of Technology Associate Professor and
    chairs its New Media Design program in the College of Imaging Arts and Sciences
    (CIAS). He has led key efforts to incorporate industry collaboration in the department''s
    undergraduate design education. Graphics Live Magazine, Graphic Design USA, STC
    conferences, and [Adobe.com](http://Adobe.com) have all featured this focus and
    the interactive design, user experience, and cross-device-development educational
    processes he initiated at RIT. The New Media Program has helped create an award
    winning and internationally recognized design program at RIT.'
