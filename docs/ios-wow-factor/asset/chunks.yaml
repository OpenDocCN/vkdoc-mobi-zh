    # 主页按钮的演进


    前两个操作可以通过`轻扫`手势完成，但使用`主页`按钮能使这些交互更加高效。`应用切换器`则不同，它的运行依赖于`主页`按钮。


    我认为这清晰地展示了`主页`按钮作为一种专用于支持导航行为的控件，其演进模式。这种模式存在少数例外，但这些例外也遵循着清晰的规律。从休眠模式唤醒设备，或者在锁定屏幕上调用`iPod`控制，都发生在核心用户界面的上下文之外。在用户与设备交互的此时，导航并非相关功能，因此`主页`按钮正好可以派上用场。尽管如此，苹果公司已为
    iPhone 最常见的若干使用场景提供了相当不错的解决方案。例如，通过在锁定状态下双击`主页`按钮来访问`iPod`控制，另一个例子是能够通过单次长按（3
    秒）来访问`语音控制`。因此，在锁定状态下针对关键用例的交互也成了该控件的一种有效用途。导航支持的最后一个例外，是能够为`主页`按钮配置辅助功能选项，这可通过三次点击来调用。


    未来 iOS 版本的发布可能会为`主页`按钮增加更多用途，但这仍有待观察。我们甚至可能看到`主页`按钮最终消失。一些有趣的场景可能会促成这一点。我们可能会看到引入屏幕外电容式控件来替代`主页`按钮，或者甚至可能出现新的手势来控制当前与`主页`按钮相关的功能。请放心，苹果公司将继续在其设备上对这个方面进行演进。


    ## iOS 的奇特拓扑结构


    在本书的后面部分，我将深入探讨用于创建可应用于 iOS 设备应用的有趣且独特的交互模型的方法和技巧。在达到这一目标之前，我们有必要花些时间来解构 iOS 中一些尚未被清晰定义，或者至少没有以有助于我们理解为何
    iOS 能被用户轻易接受的方式记录下来的方面。iOS 交互模型的核心是一个“空间”的概念，用户在其中流畅移动以完成任务。我们可以将这个空间想象成一个微小的宇宙，操作系统功能和应用程序都居住其中。如同任何宇宙一样，它有其固有的规则、限制和属性，这些都会从根本上影响其中存在的事物。当我们理解了这些基本机制，我们就能设计出更高效地利用这些机制的解决方案，或者完全绕开它们，开始定义我们自己的规则。


    iOS 本质上是一个平面环境，但也有少数例外。当我说“平面环境”时，我的意思是核心的用户体验呈现是一个二维的命题。你可能会觉得这是句废话，因为我们看到的是设备上的屏幕，而屏幕上的内容本质上是二维的。没错，但我所指的，是界面元素如何呈现，以及用户如何在概念上穿越这些元素所占据的空间。认识到这种二维性很重要，因为从技术上讲，我们已不再局限于创建仅限于二维的用户体验。iPhone
    和 iPad 能够渲染非常复杂的图形，创建一个立体 UI 也完全可行，因此苹果公司是有意识地决定不朝这个方向发展的（字面意义上的）。


    尽管 UI 是平面的，但其操作并非严格意义上的二维。iOS 实际上是在三个相互依赖或共存的面板之间运作。你可以将 iOS 视为三个用户界面层，每一层都专门用于特定类型的交互。这些层之间的移动由该层特定的交互机制集所定义。


    这三个用户界面层或面板的划分如下，按操作的重要性排序（见图 2-1）：


    *   **默认面板：** 这一层由应用图标和图标停靠栏占据，是用户交互最活跃的面板。

    *   **底层面板：** 这一层专用于`应用切换器`和显示内容。这个空间纯粹是一个辅助性结构，用于支持组织、定位和导航。

    *   **叠加面板：** 这一层用于对话框、警告、模态控件和弹出视图。


    ![图片](img/0201.jpg)


    **图 2-1.** 用户界面的三个面板。


    这些面板共存于一个非常浅的视觉空间中。从外观角度来看，这些面板彼此之间仅相距几毫米。虽然这仅仅是图形渲染方式的问题，但这些面板的视觉呈现暗示了这些空间之间密切的关系。就好像外观上的接近性补充了这些功能最初为获得用户接受所需的认知关联。底层面板的概念强化了一种错觉，即这个
    UI 之下始终有更多内容，就在表面之下！

    '
- fmt: '# iOS 交互模型中的空间平面与导航


    iOS 核心 UI 元素的默认平面自然受到最频繁的使用，并且在定义上支持最大程度的交互活动。相比之下，其他两个平面的交互非常有限，因为它们只支持有限的功能。底层平面的存在仅仅是为了支持组织和导航。这个平面为
    Apple 提供了解决我之前审查的紧急应用管理问题所需的 UI 可扩展性程度。底层平面作为默认平面的状态变化而显现，因此交互模型的这两个方面更准确地构成了我所说的
    iOS 核心 UI。


    叠加平面包含的对象与填充其他两个平面的应用图标截然不同。有几种方式可以思考这些对象：它们故意具有破坏性，它们是临时的，并且它们在核心 UI 中没有“家”。我指的是诸如警报、对话框以及各种类型的模态控件之类的对象。我认为我们想当然地接受了
    iOS 交互模型，因为叠加平面上的交互对我们来说感觉如此自然。然而，这些对象中的每一个都可能以多种不同方式在核心 UI 中得到处理。它们本可以预留一部分屏幕空间来管理，但
    Apple 确定将这些对象呈现在更高层次的平面是一个更优的解决方案。这是为什么呢？显然，在任何类型的用户界面中，警报和对话框都是关键的交互点，将这些对象提升并叠加在所有其他元素之上是一种标准方法。对话框本质上是模态的，因此它们需要中断核心
    UI 中的活动。Apple 将对话框的设计模式应用于警报，这一事实有助于强化对这些对象如何运作以及用户在其出现时需要做什么的理解。叠加状态下的 UI 对象受到的交互最少，但由于其性质，它们在屏幕上出现时会受到最大程度的关注。


    既有的空间模型有一个主要的例外。当使用 iPod 功能时，用户在查看某些类型的列表时可以访问经典的“旋转木马”浏览模式。当用户在查看歌曲、专辑或其他媒体对象列表时将设备水平旋转时，会调用旋转木马视图。当设备旋转回垂直方向时，旋转木马视图会恢复为传统列表。


    旋转木马视图的空间模型与我目前审查过的任何内容都截然不同。它在一个看似三维的空间中呈现对象。该空间内的交互仅限于在水平视图的固定框架内，对象沿一个轴移动（参见[图
    2-2](#Chapter02.html#fig_2_2)）。固定参考系的概念与 OS 顶层所使用的模型非常不同。在顶层，用户的感知是在浏览应用屏幕时从 A
    点移动到 B 点。正是这种感知的运动建立（甚至定义了）空间的概念。当与旋转木马交互时，用户的视图不会移动！用户通过一个固定的视点移动对象，并且无论该特定框架填充了多少对象，这个固定的视点都保持不变。这本质上是用户在整个
    OS 中体验到的视觉交互的一种反转。


    ![images](images/0202.jpg)


    **图 2-2.** 旋转木马视图空间模型。


    既然我们已经回顾了 OS 交互的三个平面的基本视觉结构，我们现在可以更详细地回顾用户如何在该空间中移动。我们需要确定的第一件事是，这三个主要的交互平面在 z
    轴上是排序的，但用户不需要做出明确的选择来在这些平面之间导航。这三个层次实际上只是用户当前所参与的 UI 视图状态的一个方面，并且仅在需要时才会显现。iOS
    空间模型的动态性实际上是由设备操作所必需的导航和浏览行为所定义的。


    我们可以分析两种基本类型的移动：x 轴上的移动和 y 轴上的移动。在 iOS 中，这两种移动类型反映了非常不同类型的交互行为。x 轴上的移动与导航最密切相关，而
    y 轴上的移动与内容消费相关。x 轴指的是左右方向性，当你思考时，几乎所有的导航都是通过向左或向右的运动发生的。从主屏幕浏览应用需要向左轻扫以将下一屏应用带入视野。向右轻扫会带您到搜索屏幕。OS
    在顶层可以被描述为由一组有限的离散屏幕组成，这些屏幕向左延伸一屏，向右延伸 11 屏。用户向左或向右移动，穿过被认为是离散的相邻空间——每个相邻空间由填充它的固定图标阵列定义。


    ![images](images/0203.jpg)


    **图 2-3.** 移动与交互行为。


    x 轴也与通过 OS 的层级移动相关联。让我们以“设置”为例来演示这是如何工作的：从主屏幕开始，您向左轻扫直到找到“设置”应用。打开“设置”，您会在屏幕上看到一系列高级选项。每个设置的右侧都有一个指向右的箭头。选择一个设置类别，如“通用”，会启动一个过渡，将您的当前视图向左滑出屏幕，同时将右侧的相邻屏幕带入视野。您可以继续以这种方式移动，直到到达层级结构的底部。当向上返回层级结构时（按屏幕左上角的提示操作），视觉交互是反向的。


    一致地使用左右移动简化了用户本可能复杂的心理模型。传统的层级导航方法通常为用户提供一些非线性方法或快捷方式，以加速在该空间中的移动。然而，许多这些快捷方式依赖于层级层级的更全面显示，或者引入了额外的交互点，这两者都增加了设计解决方案的复杂性。像
    iPhone 这样的设备受到其尺寸的限制，因此简化的层级导航解决方案是非常合适的。然而，我应该指出，iOS 的“一条路径向下，反向路径返回”的方法并不适用于深层的层级结构，但
    Apple 在 HIG 中明确指出，正是由于这个原因，层级结构需要受到限制。'
  raw: 'The default plane of the core UI elements naturally receives the most frequent
    use, and by definition supports the greatest degree of interaction activity. In
    contrast to that, the other two planes are very limited in their interactions
    because they only support a limited amount of functionality. The underlying plane
    exists solely as a support mechanism for organization and navigation. This plane
    gives Apple the degree of UI scalability needed to resolve the emerging app management
    issues that I reviewed earlier. The underlying plane is revealed as a state change
    of the default plane, so those two aspects of the interaction model more accurately
    constitute what I would refer to as the core UI in iOS.


    The superimposed plane contains objects that are very different from the app icons
    that populate the other two planes. There are a few ways to think about these
    objects; they are deliberately disruptive, they are temporary, and they do not
    have a “home” within the core UI. I am referring to objects such as alerts, dialog
    boxes, and modal controls of various types. Again, I think we take the iOS interaction
    model for granted, because interaction on the superimposed plane feels so natural
    to us. However, each of those objects could have been accounted for in the core
    UI in a lot of different ways. They could have reserved a portion of screen real
    estate to manage, but Apple determined that presenting these objects in a higher-level
    plane was a superior solution. Why was that? Obviously, alerts and dialogs are
    critical points of interaction in any kind of user interface, and bubbling those
    objects up and superimposing them above all other elements is a standard approach.
    Dialog boxes are inherently modal in nature, so they would need to disrupt activities
    in the core UI. Apple leverages the design pattern of the dialog for the alert,
    and that fact helps reinforce the understanding of how these objects operate and
    what users need to do when they appear. UI objects in superposition receive the
    least amount of interaction, but due to their nature they do receive the greatest
    amount of attention when they are on screen.


    There is one major exception to the established spatial model. When using the
    iPod functions, a user has access to the classic carousel browse mode when viewing
    certain types of lists. The carousel view is invoked when a user rotates the device
    horizontally while viewing a list of songs, albums, or other media objects. The
    carousel view reverts to a traditional list when the device is rotated back to
    a vertical orientation.


    The carousel view’s spatial model is very different from anything I have reviewed
    so far. It presents objects in what appears to be a three-dimensional space. The
    interaction within that space is limited to the movement of objects on only one
    axis within a fixed frame of the horizontal view (see [Figure 2-2](#Chapter02.html#fig_2_2)).
    The notion of a fixed frame of reference is very different from the model that
    is in use at the top levels of the OS. The perception at that level is that a
    user is going from point A to point B while browsing the screens of apps. It is
    the perceived movement that establishes (and even defines) the concept of space.
    When interacting with the carousel, the user’s view does not move! The user moves
    objects through a fixed point of view, and that fixed point of view remains unchanged
    no matter how many objects populate that particular frame. This is essentially
    an inversion of the kind of visual interaction that the user experiences with
    the OS as a whole.


    ![images](images/0202.jpg)


    **Figure 2-2.** The carousel view spatial model.


    Now that we have reviewed the basic visual construct of the three planes of OS
    interaction, we can now get into a more detailed review of how a user moves through
    that space. The first thing we need to establish is that those three main planes
    of interaction are ordered on the z axis, but the user is not required to make
    an explicit choice to navigate between those planes. Those three layers are really
    just an aspect of state pertaining to the view of the UI with which they are currently
    engaged, and are revealed only as needed. The dynamics of iOS spatial model are
    really defined by the navigation and browsing behaviors essential to device operation.


    There are two basic types of movement that we can analyze: movement on the x axis
    and movement on the y axis. Within iOS, these two types of movements reflect very
    different types of interaction behavior. Movement on the x axis is most closely
    associated with navigation and movement on the y axis is associated with content
    consumption. X axis refers to right/left directionality, and when you think about
    it, almost all navigation happens with motion to the left or right. Browsing apps
    from the home screen requires a swipe to the left to bring the next screen of
    apps into view. A swipe to the right brings you to the search screen. The OS,
    at the top level, can be described as being composed of a limited set of discrete
    screens that extends one screen to the left, and 11 screens to the right. A user
    moves to the left or right through what are perceived of as discrete adjacent
    spaces—each adjacent space being defined by the fixed array of icons that populate
    it.


    ![images](images/0203.jpg)


    **Figure 2-3.** Movement & interaction behavior.


    The x axis is also associated with hierarchical movement through the OS. Let’s
    use Settings as an example to demonstrate how this works: Starting from the home
    screen, one swipes left till the Settings app is located. Settings is opened and
    you see a list of high-level options on the screen. To the right of each setting
    is an arrow that points to the right. Selecting a settings category, like General,
    initiates a transition that slides your current view to the left and off screen,
    while bringing the adjacent screen to right into view. You can continue to move
    in this fashion till you reach the bottom of the hierarchy. When going back up
    the hierarchy (as prompted in the upper left of the screen) the visual interaction
    is reversed.


    The consistent use of left-right movement simplifies what would otherwise be a
    complex mental model for the user. Traditional approaches to hierarchical navigation
    often present the user with a few nonlinear methods, or shortcuts, to accelerate
    movement through that space. However, many of those shortcuts depend on a more
    comprehensive display of the hierarchical tiers, or they introduce additional
    points of interaction, both of which add complexity to the design solution. A
    device like the iPhone is limited by what it can display due to its size, so a
    simplified solution to hierarchical navigation is perfectly appropriate. However,
    I should point out that the iOS approach of one path down and the reverse path
    out does not hold up to deep hierarchical structures, but Apple makes it clear
    in the HIG that hierarchies need to be restrained for this very reason.'
  trans: '

    # Spatial Planes and Navigation in the iOS Interaction Model


    The default plane of iOS core UI elements is naturally subject to the most frequent
    use and, by definition, supports the greatest degree of interactive activity.
    In contrast, the interaction on the other two planes is very limited, as they
    only support a restricted set of functions. The sole purpose of the bottom plane
    is to support organization and navigation. This plane provides Apple with the
    degree of UI extensibility needed to address the urgent application management
    issues I reviewed earlier. The bottom plane manifests as a state change of the
    default plane, so these two aspects of the interaction model more accurately constitute
    what I call the iOS Core UI.


    The overlay plane contains objects that are distinctly different from the application
    icons filling the other two planes. There are several ways to think about these
    objects: they are intentionally disruptive, they are temporary, and they have
    no “home” in the core UI. I am referring to objects such as alerts, dialogs, and
    various types of modal controls. I think we take the iOS interaction model for
    granted because the interactions on the overlay plane feel so natural to us. However,
    each of these objects could have been handled in many different ways within the
    core UI. They could have reserved a portion of the screen space for management,
    but Apple determined that presenting these objects on a higher-level plane was
    a superior solution. Why is this? Obviously, alerts and dialogs are critical interaction
    points in any type of user interface, and elevating these objects to overlay on
    top of all other elements is a standard approach. Dialogs are inherently modal,
    so they require interrupting activities within the core UI. The fact that Apple
    applies the dialog design pattern to alerts helps reinforce the understanding
    of how these objects function and what users need to do when they appear. UI objects
    in the overlay state receive the least amount of interaction, but by their nature,
    they command the most attention when they appear on screen.


    There is one major exception to the established spatial model. When using the
    iPod feature, users can access the classic “Cover Flow” browsing mode while viewing
    certain types of lists. The Cover Flow view is invoked when users rotate the device
    horizontally while viewing a list of songs, albums, or other media objects. When
    the device rotates back to the vertical orientation, the Cover Flow view reverts
    to the traditional list.


    The spatial model of the Cover Flow view is entirely different from anything I
    have reviewed so far. It presents objects in a seemingly three-dimensional space.
    Interaction within this space is limited to objects moving along one axis, within
    the fixed frame of the horizontal view (see Figure 2-2). The concept of a fixed
    frame of reference is very different from the model used at the top level of the
    OS. At the top level, the user’s perception is of moving from point A to point
    B while browsing application screens. It is this perceived motion that establishes
    (or even defines) the concept of space. When interacting with Cover Flow, the
    user’s view does not move! The user moves objects through a fixed viewpoint, and
    this fixed viewpoint remains constant regardless of how many objects populate
    that particular frame. This is essentially an inversion of the visual interaction
    the user experiences throughout the rest of the OS.


    ![images](img/0202.jpg)


    **Figure 2-2.** Cover Flow View Spatial Model.


    Now that we have reviewed the basic visual structure of the OS’s three interaction
    planes, we can review in more detail how the user moves within that space. The
    first thing we need to establish is that these three main interaction planes are
    ordered on the z-axis, but the user does not need to make an explicit choice to
    navigate between them. The three levels are essentially just an aspect of the
    UI view state the user is currently engaged in and become apparent only when needed.
    The dynamic nature of the iOS spatial model is actually defined by the navigation
    and browsing behaviors required for device operation.


    We can analyze two basic types of movement: movement on the x-axis and movement
    on the y-axis. In iOS, these two types of movement reflect very different types
    of interaction behavior. Movement on the x-axis is most closely related to navigation,
    while movement on the y-axis is related to content consumption. The x-axis refers
    to left-right directionality. When you think about it, almost all navigation occurs
    through left or right movements. Browsing apps from the home screen requires a
    left swipe to bring the next screen of applications into view. A right swipe takes
    you to the search screen. The OS, at the top level, can be described as consisting
    of a limited set of discrete screens, extending one screen to the left and 11
    screens to the right. The user moves left or right, traversing what are perceived
    as discrete adjacent spaces—each defined by the fixed array of icons that populate
    it.


    ![images](img/0203.jpg)


    **Figure 2-3.** Movement and Interaction Behavior.


    The x-axis is also associated with moving through the OS hierarchy. Let’s use
    the “Settings” app as an example to demonstrate how this works: Starting from
    the home screen, you swipe left until you find the Settings app. Opening Settings,
    you see a series of high-level options on the screen. Each setting has a right-pointing
    arrow on its right side. Selecting a settings category, such as “General,” initiates
    a transition that slides your current view off-screen to the left while bringing
    the adjacent screen on the right into view. You can continue moving in this way
    until you reach the bottom of the hierarchy. When navigating back up the hierarchy
    (by following the prompt at the top-left of the screen), the visual interaction
    is reversed.


    The consistent use of left-right movement simplifies what could otherwise be a
    complex mental model for the user. Traditional methods of hierarchical navigation
    often provide users with some non-linear methods or shortcuts to accelerate movement
    within that space. However, many of these shortcuts rely on a more comprehensive
    display of the hierarchical levels or introduce additional interaction points,
    both of which increase the complexity of the design solution. Devices like the
    iPhone are limited by their size, so a simplified hierarchical navigation solution
    is very appropriate. However, I should point out that iOS’s “one path down, reverse
    path back” approach is not suitable for deep hierarchical structures, but Apple
    explicitly states in the HIG that hierarchies need to be limited precisely for
    this reason.

