    # 引言


    如今的竞争环境异常残酷，相信你也清楚，你的应用想要在 App Store 中脱颖而出极为困难。当前可供下载的应用数以十万计，无论有趣与否都应有尽有。仅从开发角度打造功能完善且稳定流畅的应用，远不足以让作品获得主流认可。用户期待在
    iOS 应用中感受到"惊艳"，这或许正是你曾亲身体验过的感受。如你所知，正是初次使用时的"惊艳感"抓住了用户，促使他们沉浸在你或开发团队倾注心血打造的功能特性中。正是这种"惊艳感"催生了朋友间的口碑推荐和
    App Store 中的五星好评。正是这种"惊艳感"驱动应用实现病毒式传播，最终为你带来实现提前退休的财富！关键问题在于：什么是"惊艳感"？又如何获得它？


    这些问题并不容易回答，但好消息是答案确实存在——我将在本书后续章节中详细阐述。但你需要明白，只要你愿意开始密切关注应用体验的每个细节，就一定能抵达"惊艳"的境地。毋庸置疑，缜密的批判性思维、卓越的问题解决能力以及扎实的设计方法，是一切卓越用户体验的基石。将你的设计实践提升到更高层次，是获得理想中"惊艳感"的必经之路，这正是本书的核心要义。但"惊艳"远不止于优秀的设计实践，它更根植于你如何审视或构建设计问题，这要求你对即将做出的设计决策所涉及的更广阔背景有更深刻的理解。


    我坚信，若不了解来路，便无法真正明确去向。iPhone 虽非市场上首款智能手机，但它无疑是最具影响力和成功的产品之一。作为应用设计师或开发者，你或多或少都能意识到这个新平台带来的巨大机遇，显然你也想抓住它。通过回顾历史，我们能够理解
    iPhone 为何呈现出如今的形态，又为何被奉为杰出用户体验的耀眼标杆。


    在思考你的应用时，你或许需要建立在 iOS 核心体验背后的某些基础概念之上，但另一方面，也可能选择彻底摒弃它们。本书的核心理念极为纯粹——为你，无论是设计师还是开发者，提供关于
    iOS 用户体验本质的实践性洞见，同时赋予你创造卓越应用所需的智慧。对许多人而言，苹果的《人机界面指南》是理解 iOS 能为用户带来何种可能性的起点。但当需要超越这些基础指南时，你该如何应对？因为这些指南终究只是基础——它们根本不足以满足你的需求！本书旨在推动你超越对
    iOS 应用的常规认知，为你提供能深化自身洞察、释放个人创造力的理念与技巧。


    打造一款成功的 iOS 应用绝非易事，但我由衷希望本书能助你将应用提升至新高度，助其获得应有的关注。


    ![images](img/ch01.jpg)


    ## 在语境中理解 iOS 人机界面指南


    苹果的《iOS 人机界面指南》(HIG)旨在成为平台新设计师与开发者的权威起点。苹果制定这份指南的方式简明扼要——提供足够的关键信息、技巧与基础方法，使个人或开发团队能尽快开始构建应用。


    这些指南旨在让读者认识到该平台带来的革命性交互模式。当苹果为第三方应用开发开放设备时，最初面临的挑战是如何让该平台成为应用分发与部署的可行载体。


    2008 年夏季苹果 App Store 上线时，已存在一个成熟的专注于移动设备与消费电子产品的专业团队社群，他们完全有能力迁移至该平台并为其开发软件。然而，成功所需的技术与专长仍被视为相对小众的领域。苹果需要更庞大的开发团队基础来为
    App Store 充实优质软件，才能使其战略获得成功。

    '
- fmt: '### Looking Back


    Before 2008, mobile applications were a somewhat primitive affair—at least by
    today’s standards. This was not due to any lack of trying on the part of developers;
    it was because of the technological limitations imposed by devices. “Feature phones”
    of the era were known for their portability, with small size being among the top
    criteria for success. Subsequently, these devices had very small displays with
    both low bit-depth color support and low resolution for their scale. Processor
    capability and memory availability were other significant constraints. This meant
    that the design of a mobile application was an exercise in minimalism and restraint.
    In that environment, the expectations for what a mobile application could be,
    how it would work, and what it looked like were not very high. Market fragmentation
    presented its own set of challenges as well, driving designers and developers
    to target a lowest common denominator of input and display to ensure success across
    a large variety of devices. This approach contributed significantly to a suboptimal
    user experience for applications running on those devices.


    “Smartphones” presented a different set of challenges. They usually had larger,
    higher-quality screens and much greater computational capacity. However, these
    devices often had unique input characteristics that varied significantly from
    manufacturer to manufacturer. Some of the more prevalent forms of input included:


    *   Jog dials

    *   Four- and five-way controllers

    *   Dedicated buttons or hard keys

    *   Variable buttons or soft keys

    *   Stylus input

    *   Touch input


    A given device incorporated any combination of these controls as a part of its
    design. In many cases the nature of the input was considered a “signature interaction”
    from which a device’s particular brand could be identified. Much of this was due
    to the fact that most early smartphones were a direct evolution from the popular
    PDAs (personal digital assistants) that preceded them. So naturally, these new
    types of phones inherited those interaction characteristics in order to leverage
    the value and recognition of the signature interaction.


    With the maturation of the feature phone and smartphone markets, there was a high
    degree of specialization and focus surrounding the design and development of software
    for those devices. Fragmentation of the smartphone market and the idiosyncrasies
    of each platform pushed that knowledge into increasingly esoteric enclaves of
    design practice.


    Apple’s iPhone challenged those expectations. Previously held beliefs about what
    a mobile phone was, what it could do, and how it could operate needed to change
    radically, so individuals with previous domain expertise needed to be prompted
    to change their mindsets.


    We take devices like the iPad and iPhone for granted now, but we have to remember
    that when the iPhone was originally released there was some controversy about
    the `Home` button and the phone’s general form factor. The simplicity of the device,
    its large screen (at the time), and lack of dedicated hard controls were in stark
    contrast to virtually all other smartphones of the day. People immediately questioned
    the functionality and usability of the `Home` button. Some even thought that the
    success of the product hinged on that single control. The migration of many controls
    from dedicated hard buttons to pixels displayed on the touch screen were also
    a significant point of contention.


    It’s through that lens that we begin to understand the nature of the `HIG`. We
    can see that history reflected in two main themes that emerge when reviewing the
    documentation:


    *   Understanding the platform implications, particularly around input and control,
    including the passive sensing capabilities

    *   Awareness and sensitivity to well-executed user experience in the context
    of the platform’s technical capabilities and physical attributes


    Essentially, this is the purpose of the “Platform Characteristics” section of
    the `HIG`, which makes a number of points intended to ease teams into understanding
    how different this platform is from what they may have worked on in the past.


    This was necessary because without eliminating the preconceived notions of the
    industry at that time, it would not have been possible to achieve the level of
    execution the device required. This was a sensible approach for Apple, as it reinforced
    the strategy of establishing the device as a mainstream platform with mass-market
    appeal.


    ### Limitations


    However, the `HIG` has its drawbacks and limitations. While Apple is careful to
    delineate Human Interface Principles and User Experience Guidelines, both of these
    areas are somewhat limited in scope. Interaction designers may not find much value
    in these sections owing to the concrete nature of the statements made there; the
    lack of abstraction or underlying rationale behind the recommendations provides
    little on which interaction designers can build. The design content of the document
    is thus too general, lacking the depth to empower sophisticated user experience
    design activities.


    The `HIG` also makes some perfunctory statements about process that are clearly
    targeted toward less-experienced teams, and while the process statements are valid
    for certain scenarios, they don’t provide a clear understanding of a comprehensive
    design methodology that can be adapted to many needs and situations.


    The limitations are not necessarily problematic for a first attempt at creating
    a good or even great iOS application, given the nature of the target audience.
    The fact that Apple has prioritized display size, display orientation, and the
    dynamics of capacitive touch screen interface input tells us that they are intent
    on democratizing mobile application (and mobile web) expertise by having design
    and development teams focus on input and output as the most important factors
    for understanding a user interface solution.


    We can’t expect Apple to provide an all-inclusive resource for creating great
    software. The `HIG` is an excellent starting point, but if we take a step back
    we can see that it is really about addressing the risks of opening up the device
    to third-party developers—protecting Apple’s brand image and perception of iOS
    devices within the market to ensure their continuing success. Apple is completely
    justified in having ulterior motives since the success of any given third-party
    application becomes a success for their organization. By outward appearances it
    seems that Apple is trying to democratize good design, but the `HIG` also aims
    to preserve and perpetuate the brand through the following strategy:


    *   Creating a sense of exclusivity and cultural cachet for consumers

    *   Maintaining the aspirational aura associated with iOS devices and the brand
    itself

    *   Justifying premium pricing within a market known for its razor-thin margins


    Of course, this should not be a surprise to anyone, but we should recognize that
    these are some of the fundamental driving factors of the iOS Human Interface Guidelines.'
