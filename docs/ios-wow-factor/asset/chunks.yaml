- fmt: '# Design Principles for User Interface Simplicity


    ## Core Principles


    **Finite Navigation:** Providing users with redundant means of navigation, or
    enhanced nonlinear navigation, is unnecessary at best, and at worst can be confusing
    or distracting. The ease of interaction with the device allows you to focus on
    creating a single clear path through your content or functionality.


    **Constrained Control Mapping:** It’s more effective to identify and isolate the
    limited regions of your application to contain user interface elements. The controls
    themselves (buttons, etc.) should be perceived as secondary elements, especially
    in situations when application content needs to have the most prominence.


    **Constrained Control Quantity:** Limit or reduce the number of controls that
    you present to the user at any given point in time. To manage complex applications,
    distribute functions across screens and seek to group like tasks together.


    **Control Clarity:** Limit the number of unique control types when possible to
    avoid confusing the user. This applies not only to control type, but also to control
    rendering. Control functions should be identifiable by short labels and/or easily
    understood icons.


    **OS Offloading:** In certain situations, functionality can be removed from an
    application and managed at the OS level. Application settings can migrate to the
    iOS settings screen, helping reduce potential UI complexity.


    **User Interface Suppression:** Control elements do not necessarily need to be
    omnipresent. A simple gesture or touch event can invoke a control set as it is
    needed in the interface. The key is to provide the user with a mechanism that
    suggests the temporal nature of these controls and how to re-invoke them once
    they leave the screen.


    **Progressive Disclosure:** Strive to provide functionality only where and when
    it is needed within the flow of an application. It’s very likely that not every
    feature needs to be universally available, so use that to your advantage to reduce
    the complexity of your screens.


    **Brand and Identity De-emphasis:** It’s not necessary to hit users over the head
    over and over again with your brand. Identify the key points in your application
    where a significant brand and identity statement makes the most sense, and tone
    it down to an acceptable volume everywhere else.


    **State Persistence and Restoration:** Expect users to frequently engage with
    your application, but know that that engagement will be fractured. Mobile users
    are chronically multitasking, and may open and close your application many times
    while moving through your workflow to complete a task. Thus, you need to ensure
    that the state of your app is maintained as users leave it, and that the task
    can easily be resumed when the app is restarted.


    **Implicit Saving:** As with the issue of state persistence, any content creation
    tasks must be preserved and the notion of “saved” should be implicit to any workflow.


    **Gestural Restraint:** Limit the number of unique gestures required to interact
    with your application. Understanding gesture usage or having to learn new gestures
    can be a significant barrier to the adoption of your application.


    **Hierarchical Restraint:** Restraint of hierarchical depth is really an aspect
    of the successful implementation of finite navigation. A high degree of hierarchical
    structure makes it difficult to design a simple and easily understood path through
    an application. That doesn’t mean that it is impossible, it just means that you
    will be challenged with managing user orientation or challenged with trying to
    eliminate the tedium of moving through that hierarchy.


    **App Modality:** A user can really only view and interact with one application
    at time. The App Switcher suggests that there may be multiple apps running concurrently,
    but even in that case a user is required to toggle between apps to do anything.
    At this point there is no such thing as simultaneous app viewing, but that may
    be a possibility in the future with larger format devices like the iPod.


    ## Tensions and Contradictions


    All of these topics point toward the theme or directive of simplicity, and in
    doing so cross over or complement one another considerably. However, there are
    also various topics that seem to contradict this direction too. These ideas are
    sprinkled throughout the HIG and have interesting implications for how you may
    think about your application.


    The first few issues I want to raise pertain to the topics reviewed in this section.
    I first want to call out that while the concept of UI suppression can be used
    to manage screen complexity, it potentially shifts a greater cognitive load over
    to the user. When the UI elements are not on screen, the user is required understand
    where they went, how they got there, and what they need to do to bring them back.
    This isn’t necessarily a problem when managed in a simple and direct way, but
    if this requires any kind of complex interaction it can lead to significant problems
    for the user.


    I’d also like to point out that universal labeling of controls can become problematic
    in cases where you are unable to limit control quantity on screen. Labels require
    room, and sometimes there is just not enough room for a legible label. And there
    are cases that even when there may be room to account for a label, the presence
    of labels can increase the perceived complexity of the elements on screen.


    Another interesting point within the HIG is an emphasis on high information density
    and high functional density for applications. This seems to fly in face almost
    every topic that I reviewed before. The HIG states that app authors should


    > *…strive to provide as much information or functionality as possible for each
    piece of information people give you. That way, people feel they are making progress
    and are not being delayed as they move through your application.*


    At face value this seems contradictory, but I think Apple is trying to make the
    point that you should provide the user with a high degree of interaction efficiency
    to avoid frustration.'
