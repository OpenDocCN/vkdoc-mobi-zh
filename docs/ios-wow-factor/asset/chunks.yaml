  trans: '

    # 构建交互模型


    正如我先前所述，交互建模旨在梳理定义应用整体行为的概念，并理解如何应用或整合这些整体行为，从而为用户创建一个一致且易于理解的模型。在第 2 章中，我回顾了"iOS
    的奇异拓扑结构"，分解了构成 iOS 用户体验基础的概念模型和空间模型。分层平面的概念以及用户在其中移动的空间模型，共同构成了 iOS 整体的基本交互模型。从这个例子中，你能看到，当以正确的方式处理这一思路时，它会产生多么强大的效果（见图
    6-1）。


    ![images](img/0601.jpg)


    **图 6-1**. 在 iPhone 上体验到的 iOS 空间模型


    开始进行交互建模时，你需要刻意地以抽象的方式进行思考。在不涉及具体功能或内容细节的情况下，你需要思考你的应用可能采用的各种不同行为，以了解如何利用它们来控制屏幕上的元素。iOS
    为你提供了一个令人难以置信的选择空间。缩放、平移、轻拂、滑动和滚动等概念，无论是单独使用还是作为复合效果，都能创造出非常独特的交互体验。


    到目前为止，我已经多次谈到差异化。你将面临的最大挑战之一是，弄清楚在何处以及如何最好地实现应用内交互的差异化。理解如何运用这些概念，正是交互建模的核心益处；在这个阶段，你可以自由试验，并深入思考如何将这些概念应用到你的设计问题中。达成一个差异化的解决方案并不十分困难，但要创建一个可扩展、可维护，并且最重要的是能被用户理解的解决方案，则需要付出更多努力。


    让我们快速做一个小练习，来理解如何打破常规，思考一些差异化的交互方式。首先，考虑一个简单的用户界面组件，比如一个项目列表。列表对象在任何用户体验或用户界面设计工作中都相当常见，可用于多种目的。传统上，列表是文本对象的垂直排列，每个文本对象在单列中与其上下的对象清晰区分（见图
    6-2）。


    ![images](img/0602.jpg)


    **图 6-2.** 一个典型的列表


    现在退一步，从最抽象的意义上思考一下列表是什么。它基本上只是一个你可以从中进行选择的数组。仔细想来，这是一个非常基础的概念。然而，如果你进一步思考，你会发


    现，垂直排列并非其固有特性，单列组织也并非其内在优势。因此，你必须问自己：是否存在另一种格式，能为你正在解决的问题增加价值？这一点可能不那么显而易见，所以值得仔细梳理各种选项，看看是否有有趣的可能性出现。为了这个练习的目的，我们来看看这会如何发展。


    如果我们知道（甚至只是相信）列表的垂直方面没有内在价值，那么水平解决方案会是什么样子（见图 6-3）？


    ![images](img/0603.jpg)


    **图 6-3**. 实验性的水平列表方案


    嗯，这很有意思，但我们开始看到，当设备垂直握持时，可用的水平空间可能会带来一些问题。这是否是一个巨大的问题？在没有任何特定上下文的情况下，不是，但考虑到你无法同时看到很多列表项，这对于快速浏览来说可能效率不高。当设备水平放置时，效果会好一些，但仍然不理想。


    让我们再扩展一下思路，看看会有什么结果。单列列表对象的概念同样值得质疑。如果我们将列表扩展为对象数组或某种网格配置，这会给我们带来什么优势（见图 6-4）？


    ![images](img/0604.jpg)


    **图 6-4.** 将列表重新构想为网格或对象数组


    这开始变得更有趣了。这种配置提供了同时查看多个项目的优势，这似乎是对传统列表的一种改进。但我们也需要应对一些缺点。文本对象的可用区域减少了，但如果我们愿意改变文本对象的大小，这似乎是可控的。


    哇！我们只是从列表的基本概念出发，看看我们最终走到了哪里。仅通过一些简单的试验，我们就能够彻底改变这个组件的基本概念。这个想法的发展也不必止步于此；我们还可以探索其他维度。让我们思考一下与列表和列表类对象相关的交互行为。在
    iOS 中，一个经典的列表对象可以通过快速向上或向下轻拂来导航，或者通过缓慢拖动来滚动到屏幕边界之外的条目。这种行为仍然适用吗？能否将其应用到我们的网格实验中（见图
    6-5）？


    ![images](img/0605.jpg)


    **图 6-5.** 垂直滚动适用于两种解决方案


    当然可以！在这个特定案例中，滚动行为的适用性近乎常识，但情况并非总是如此。你始终需要评估你所依赖的现有交互行为，以确保它在新的模型中仍然有效。


    这个例子还没完。现在，让我们将抽象方法应用于列表的行为。一个标准的 iOS 列表对象在需要时支持滚动，并且由于文本对象在垂直列中的方向，这种滚动被限制在单一轴上。既然我们不再局限于单一垂直列的项目，我们如何将滚动行为应用于这个基本概念呢？


    ![images](img/0606.jpg)


    **图 6-6.** 网格上的多轴滚动和行滚动


    有许多种方式可以将滚动行为应用于这个概念，它们可能同样有效（见图 6-6）。从这一系列例子中，你可以看到基于现有组件和交互来构思新想法是多么容易。以列表作为灵感仅仅是个开始；还有许多其他想法、组件和元素可以用同样的方式来处理。解构这些元素，可以成为设计和完善应用中一些极具吸引力的交互的强大方法。

    '
- fmt: '#### Additional Problem-Solving Techniques


    We’ve just walked through the process of deriving a new concept from a fairly
    basic control. This is a great technique to get started on defining a new interaction
    model for your application, but it may not get you to the end point that you need.
    At some point in the process you will encounter potential dead-ends. A particular
    technique or format may not scale to the degree that you expected it to, or you
    might find that one of the positive aspects of your solution winds up boxing you
    in when applied to other areas of an application. In those situations you need
    some basic problem-solving techniques to help you think yourself back out of the
    corner.


    We’ve talked about the amazing capabilities that iOS provides to help designers
    create amazing user experiences. One of the most powerful technologies is `Core
    Animation`, which gives developers the tools to integrate highly customized animations
    throughout an application. Animation is not just about applying whiz-bang motion
    to random elements for a specific visual effect; it is also an incredibly powerful
    tool for communication.


    To understand how animation can be of value to us, let’s breakdown what animation
    is. At the most basic level, animation is the ability to change or alter the attributes
    or characteristics of an object over time. The key idea here is time. Time is
    one of the most powerful tools you can bring to bear to resolve key interaction
    design problems.


    Time becomes extremely useful in situations when you have a limited amount of
    space. When space is constrained, it can be very difficult to communicate complex
    ideas or display complex information. Two situations arise when working within
    constrained space. You end up with either an extremely high level of information
    density, or you end up truncating or reducing the amount of information to fit
    within the available space. Both scenarios are problematic. Extremely dense information
    can be difficult for a user to consume and comprehend. Truncated information is
    incomplete, and will not satisfactorily resolve the design need or requirement.


    Our list experiment does a great job of demonstrating this. In order to make the
    text work within a grid unit we just scaled it down to the point where it would
    fit and still be legible. But obviously, if we didn’t scale it, we’d have the
    situation illustrated next (see [Figure 6-7](#Chapter06.html#fig_6_7)).


    ![images](images/0607.jpg)


    **Figure 6-7**. Scaled text compared to truncated text within a grid of selectable
    objects


    The example with the scaled text is somewhat successful, but clearly the example
    with the truncated text is not a desirable solution. Let’s assume for the sake
    of this example that scaling the text to fit within the grid element is not something
    that we want to pursue. How can time be applied to help resolve the issue of text
    string length? We can look back to the day of small-screen smartphones and feature
    phones for the answer.


    ![images](images/0608.jpg)


    **Figure 6-8.** Truncated text compared to marquee text moving through the viewable
    region of grid element


    Marquee text used to be quite a popular solution a few years back. Time comes
    into play here because the solution animates the text through the viewable area
    over time. As the text marches from right to left the user can read the entire
    string (see [Figure 6-8](#Chapter06.html#fig_6_8)). This resolves the issue of
    truncation. The introduction of time, as an additional dimension to work with,
    provides one way to resolve the issue of constrained space.


    This is an interesting solution that might be applicable in certain situations,
    but for a couple of reasons it’s not an ideal solution for this grid layout. Imagine
    this screen loading for the first time, with text panning and within every grid
    unit. It’s safe to say that you would be overwhelmed with the onslaught of animated
    text. It would be a challenge to focus on an individual grid element, and you
    would have to deliberately time the viewing of a grid element to watch a single
    text string cycle from beginning to end. Otherwise, you end up with the same problem
    seen with the truncated text, where only a snippet of each string is visible.
    What is the missing element here? The missing element is user control, which can
    come into a play in a number of different ways.


    The idea of user control is obvious given that the thrust of this discussion is
    how to create an interaction design solution, and you certainly cannot have interaction
    without some form of user control (not for the purposes of this experiment, at
    any rate; in [Chapter 8](#Chapter08.html#ch8) I’ll address how this might not
    necessarily be the case). But here I want you to think about user control in a
    slightly different way, through the idea of “state.”


    `State` is a very important idea when it comes to thinking through a potential
    interaction model. It is another problem-solving technique that can be applied
    to problematic areas of a design solution. Much like time, state opens up possibilities
    that would otherwise be impossible in a static solution. In a sense, state—like
    time—can be thought of as another dimension that allows you to modify elements
    and information being managed on screen.


    What exactly is state? State refers to all the extant properties, characteristics,
    and attributes of an object as they are observed by a user and/or managed by the
    controlling system.


    Up to this point we have been thinking about our emerging interaction model for
    our evolved list solution with only a single state defined. That is, it only has
    one form, and that form does not change. But this doesn’t have to be the case.
    If we can manipulate state and change the construct of our model, then we should
    be able to resolve any of the problematic areas that we observe in our interaction
    model.


    To link this back to the idea of user control, we can say that we have the ability
    to instance different states of a user interface through the mechanism of user
    input.


    So, how can we apply the ideas of user control and state to resolve the issues
    inherent to our experiment in interaction modeling? We left off with a solution
    that had a few different issues. We liked the efficiency that the grid provided
    for displaying a greater quantity of text items, but by increasing the number
    of items in the list we started to compromise the amount of real estate available
    for the display of text. We experimented with a time-based solution, but there
    were some idiosyncrasies associated with applying animation universally to the
    grid. With this in mind, let’s look at a similar solution that integrates user
    control.


    ![images](images/0609.jpg)


    **Figure 6-9.** Swiping to reveal hidden text


    This technique leverages the concept of direct manipulation to allow the user
    to expose more text when and where they choose. Instead of being confronted with
    a screen full of animated text strings, the user can now take action and read
    whichever portions of text are desired (see [Figure 6-9](#Chapter06.html#fig_6_9)).


    Applying some interactivity to a text object is a solution that works, but it’s
    a relatively simple one. What if we expand that thinking to arrive at something
    a bit more revolutionary? Instead of concerning ourselves with the text object
    by itself, let’s think about the entire grid unit and how that might change state
    with a user’s input.


    ![images](images/0610.jpg)


    **Figure 6-10.** Pinching open a grid element to reveal more information, then
    snapping back to size'
  raw: '#### Additional Problem-Solving Techniques


    We’ve just walked through the process of deriving a new concept from a fairly
    basic control. This is a great technique to get started on defining a new interaction
    model for your application, but it may not get you to the end point that you need.
    At some point in the process you will encounter potential dead-ends. A particular
    technique or format may not scale to the degree that you expected it to, or you
    might find that one of the positive aspects of your solution winds up boxing you
    in when applied to other areas of an application. In those situations you need
    some basic problem-solving techniques to help you think yourself back out of the
    corner.


    We’ve talked about the amazing capabilities that iOS provides to help designers
    create amazing user experiences. One of the most powerful technologies is Core
    Animation, which gives developers the tools to integrate highly customized animations
    throughout an application. Animation is not just about applying whiz-bang motion
    to random elements for a specific visual effect; it is also an incredibly powerful
    tool for communication.


    To understand how animation can be of value to us, let’s breakdown what animation
    is. At the most basic level, animation is the ability to change or alter the attributes
    or characteristics of an object over time. The key idea here is time. Time is
    one of the most powerful tools you can bring to bear to resolve key interaction
    design problems.


    Time becomes extremely useful in situations when you have a limited amount of
    space. When space is constrained, it can be very difficult to communicate complex
    ideas or display complex information. Two situations arise when working within
    constrained space. You end up with either an extremely high level of information
    density, or you end up truncating or reducing the amount of information to fit
    within the available space. Both scenarios are problematic. Extremely dense information
    can be difficult for a user to consume and comprehend. Truncated information is
    incomplete, and will not satisfactorily resolve the design need or requirement.


    Our list experiment does a great job of demonstrating this. In order to make the
    text work within a grid unit we just scaled it down to the point where it would
    fit and still be legible. But obviously, if we didn’t scale it, we’d have the
    situation illustrated next (see [Figure 6-7](#Chapter06.html#fig_6_7)).


    ![images](images/0607.jpg)


    **Figure 6-7**. Scaled text compared to truncated text within a grid of selectable
    objects


