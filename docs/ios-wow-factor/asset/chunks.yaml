  trans: '

    #### 附加问题解决技巧


    我们刚刚演示了如何从一个相当基础的控制方式中推导出一个新概念。这是为应用程序定义新交互模型的一个绝佳起点，但仅靠它可能无法达到你所需的终点。在过程中某个阶段，你可能会遇到潜在的僵局。某种特定技巧或格式可能无法扩展到你所期望的程度，或者你可能会发现解决方案中的某个优点在应用于应用程序的其他领域时反而成了限制。在这些情况下，你需要一些基础的问题解决技巧，帮助自己从困境中解脱出来。


    我们已经讨论过 iOS 提供的强大功能，它帮助设计师创造出令人惊叹的用户体验。其中最强大的技术之一是 `Core Animation`，它为开发者提供了在应用中集成高度定制动画的工具。动画不仅仅是为了视觉效果而将花哨的运动应用于随机元素；它也是一种极其强大的沟通工具。


    为了理解动画如何为我们创造价值，让我们分解一下动画的本质。在最基本的层面上，动画是随时间改变或调整对象属性或特征的能力。这里的关键概念是**时间**。时间是你能够用来解决关键交互设计问题的最强大工具之一。


    当你空间有限时，时间变得极为有用。当空间受限时，传达复杂想法或显示复杂信息会非常困难。在有限空间内工作时会出现两种情况：要么信息密度极高，要么为了适应可用空间而截断或减少信息量。这两种情况都有问题。高密度信息可能让用户难以消化和理解；而截断的信息则不完整，无法令人满意地满足设计需求。


    我们的列表实验很好地证明了这一点。为了让文本适应网格单元，我们只是将其缩小到既能容纳又能保持清晰的程度。但显然，如果我们不缩放它，就会出现下面展示的情况（参见图
    6-7）。


    ![images](img/0607.jpg)


    **图 6-7.** 可选中对象网格内缩放文本与截断文本的对比


    缩放文本的例子还算成功，但截断文本的例子显然不是一个理想的解决方案。为了本示例的目的，我们假设缩放文本以适应网格元素不是我们希望采用的方式。那么，如何利用时间来解决文本字符串长度的问题呢？我们可以回顾一下小屏智能手机和功能手机的年代来寻找答案。


    ![images](img/0608.jpg)


    **图 6-8.** 截断文本与跑马灯文本在网格元素可视区域内移动的对比


    几年前，跑马灯文本曾是一个非常流行的解决方案。时间在这里发挥了作用，因为解决方案通过动画让文本随时间在可视区域内移动。当文本从右向左移动时，用户可以阅读整个字符串（参见图
    6-8）。这解决了截断问题。将时间作为一个额外的维度引入，提供了一种解决空间受限问题的方法。


    这是一个有趣的解决方案，在某些情况下可能适用，但由于几个原因，它并不是这个网格布局的理想方案。想象一下这个屏幕首次加载时，每个网格单元内都有文本在平移。可以肯定的是，你会被扑面而来的动画文本搞得不知所措。聚焦于单个网格元素将是一项挑战，而且你必须刻意安排查看网格元素的时间，才能完整地观看单个文本字符串从头到尾的循环。否则，你最终会遇到与截断文本相同的问题——每个字符串只能看到一部分。缺少的元素是什么呢？是**用户控制**，它可以通过多种方式发挥作用。


    用户控制的想法显而易见，因为本次讨论的重点是创建交互设计解决方案，而没有某种形式的用户控制，你当然无法实现交互（至少在本实验中是这样；在第 8 章中，我会讨论情况可能并非如此）。但在这里，我想让你通过“**状态**”这个概念，以略有不同的方式思考用户控制。


    `State`（状态）在思考潜在交互模型时是一个非常重要的概念。它是另一种可用于解决设计方案中问题区域的问题解决技巧。与时间类似，状态开辟了在静态解决方案中不可能实现的可能性。从某种意义上说，状态——像时间一样——可以被视为另一个维度，允许你修改屏幕上管理的元素和信息。


    状态到底是什么？状态指的是一个对象所有现存的属性、特征和特性，这些属性可以被用户观察到和/或被控制系统管理。


    到目前为止，我们一直在思考我们为演化后的列表解决方案所构建的交互模型，并且只定义了一种状态。也就是说，它只有一种形态，且这种形态不会改变。但情况未必如此。如果我们能够操纵状态并改变我们模型的构造，那么我们就应该能够解决在交互模型中观察到的任何问题区域。


    将这一点与用户控制的概念联系起来，我们可以说，我们能够通过用户输入的机制来实例化用户界面的不同状态。


    那么，我们如何应用用户控制和状态的概念来解决交互建模实验中固有的问题呢？我们上一个解决方案存在几个问题。我们喜欢网格在显示更多文本项方面提供的效率，但通过增加列表中的项数，我们开始牺牲用于显示文本的可用空间。我们尝试了基于时间的解决方案，但将动画普遍应用于整个网格存在一些特殊性。考虑到这一点，让我们看看一个整合了用户控制的类似解决方案。


    ![images](img/0609.jpg)


    **图 6-9.** 滑动以显示隐藏文本


    这种技巧利用了直接操作的概念，允许用户在他们选择的时机和位置显示更多文本。用户不再面对满屏的动画文本字符串，而是可以采取行动，阅读他们想要的任何部分文本（参见图
    6-9）。


    向文本对象应用一些交互性是一个有效的解决方案，但它相对简单。如果我们扩展这个思路，得出更具革命性的方案呢？让我们不要只关注文本对象本身，而是思考整个网格单元如何随着用户的输入改变状态。


    ![images](img/0610.jpg)


    **图 6-10.** 捏合打开一个网格元素以显示更多信息，然后弹回原尺寸

    '
- fmt: 'Now we have an interaction that demonstrates a higher degree of dynamism in
    the model. With a simple gesture, the user can expand a grid element to create
    a larger area in which to view information (see [Figure 6-10](#Chapter06.html#fig_6_10)).
    Not only is the text object readable in its entirety, but there’s now more area
    that we can populate with additional value-added information.


    What was once just an idea around a basic list, is now a potentially very compelling
    user experience. From my perspective this aspect of the model appears to add some
    practical utility—probably more than just the ability to expose a text string.
    But why and how can we take advantage of this?


    One of the main things to be aware of when undertaking a process like this is
    that you need to avoid thinking about these ideas in a vacuum. An interaction
    model is a model of a complete system, a system that defines the operation of
    your application. If you believe that you have an interaction concept that is
    robust enough to drive your application, then you need to think about how that
    concept can be mapped into the other aspects of the user experience. This is what
    I referred to earlier in this chapter when I addressed issue of scalability and
    extensibility. If you have a compelling interaction that is not applicable to
    other aspects of your application, that’s OK. You may have a larger interaction
    model in mind that can encapsulate that concept and provide a clear and coherent
    model for the user. However, an application with many unique interactions—each
    specialized and different from the next—does nothing but confuse and frustrate
    the user. In effect, that approach accomplishes precisely the opposite of what
    you set out to do. You won’t have an interaction model at that point, just an
    agglomeration of odd interactions.


    Avoiding that situation requires you to continually think through the applicability
    of your interaction across a large swath of your app. This is a form of systems-level
    thinking that will serve your application extremely well. The key to understanding
    the applicability of a given interaction across multiple contexts requires you
    to elevate your thinking to an abstract level. You need to view your interaction
    not for the immediate solution that it provides, but rather for the basic behavior
    that the interaction illustrates and the possibilities of what that may enable.
    Think of your interaction as a basic behavioral template or pattern that can be
    used in multiple places and in multiple ways.


    The fewer the unique behavioral instances and interactions you use to formulate
    your application, the more robust your interaction model will be. Less is definitely
    more when it comes to designing your application. Your goal should always be to
    reduce the overall cognitive load for the user by leveraging their knowledge and
    experience with the interaction patterns they have already encountered in the
    application.


    However, you don’t want to force yourself to use a behavior or pattern where it
    doesn’t make sense. It can be very tempting to map your established interactions
    across all aspects of your user experience, but you’ll know when this isn’t working
    when you find yourself spending an inordinate amount of time trying to resolve
    a design solution for a particular problem. If the solution isn’t patently obvious
    to you, then it likely will not be obvious to the user, either.


    As you may have noticed, I’ve use the concepts of `interaction`, `behavior`, and
    `pattern` interchangeably. I think of these terms as having a distinct relationship
    to one another that should probably be clarified.


    *   **Interaction:** I view this as the unit level of interactivity, such as the
    click of a button or a swipe across the screen. It’s essentially the action taken
    for input by the user as prompted by the system.

    *   **Behavior:** This is second order of complexity arising from the input of
    the user and the resulting feedback of the system. It is the perceived gestalt
    effect of interaction as demonstrated by the system.

    *   **Pattern:** I defined this as the cumulative effect of compound behaviors
    working in a predicable and well-organized manner.


    Your interaction model may seek to develop consistency at any one of these levels.
    This can be accomplished by leveraging large-scale patterns across the board,
    or by taking a more granular approach and ensuring interaction-level consistency
    with the objects that populate your application. Your effort in interaction modeling
    will determine the right approach for your particular situation.'
