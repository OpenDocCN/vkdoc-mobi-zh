- fmt: '# Direct Manipulation and Scale


    The reason I raise this issue within the context of direct manipulation is because
    scale and proximity are only really problematic when direct manipulation is the
    driving principle. Remember, you have to interact directly with an object in order
    to affect the state or condition of that object. The object is the target. But
    there are possible design solutions where you don’t have to interact directly
    with an object in order to affect its condition. There may be a scenario in which
    a very tiny button is desirable (for whatever reason), maybe so tiny that by its
    appearance it is somewhat problematic. You could create a control whereby the
    graphic that represents it is far exceeded in scale by a “target region” that
    encompasses it. A user could affect that control by interacting with the target
    region without necessarily making contact with the actual graphical representation
    at the center of that target region. You can even take that concept a step further
    by creating situations where a target region is disassociated from its representational
    graphic. This is a good point from which to segue into the next topic!


    ## Gestures


    The term “gesture” is in wide use today, and depending on the context it can have
    very different interpretations. Sometimes the definition can be literal, as when
    thinking about devices that use complex machine vision to interpret the physical
    motion of your body as input into the computing system. When Apple refers to gestures
    they are specifically referencing touch interactions that allow Apple to expand
    their palette of input events beyond the basic input that direct manipulation
    might allow. In some cases this involves the simultaneous compounding of touch
    events (multi-touch) to invoke a particular response. But there are also examples
    of gestures that reside strictly in the realm of direct manipulation. At an abstract
    level, many gestures are the same, or at least only differentiated by subtleties
    of input or context of use.


    The most common gestures in iOS are as follows:


    - **Tap:** This is the most basic selection behavior in the OS.

    - **Drag:** During a persistent touch event, an object tracks with your finger
    until you remove your finger from the screen.

    - **Flick:** Very similar to the drag gesture, but done with greater speed. The
    key to this gesture is really the behavior inherent to the object itself. On release,
    “flickable” objects tend to display and model inertial characteristics that make
    the flick action relevant.

    - **Swipe:** A linear brush with a finger, no direct manipulation implied, often
    used to reveal a hidden control.

    - **Double Tap:** Two taps in short succession to designate the point of origin
    for image or content scaling—often a predetermined scale factor.

    - **Open Pinch:** User defined up-scaling determined by how much you “open” your
    pinch.

    - **Close Pinch:** User defined down-scaling determined by how much you “close”
    your pinch.

    - **Long Touch:** Usually associated with invoking some form of secondary control,
    as with editable text to invoke the magnified view, but many other uses are possible.


    There are also some newer gestures on the horizon for iOS. It will be interesting
    to see how quickly these are adopted and how other app developers begin to employ
    them. Most of these newer gestures are natural extensions of what I have listed
    above, and pertain more to OS level navigation and control. By that I mean they
    are concerned with movement through the OS, and not necessarily relevant to individual
    component control within a running application. The OS-level focus seems to be
    achieved by true multi-finger interaction (more than two fingers) to separate
    them from the classic set of gestures used to control applications.


    Application designers and developers can do a lot with standard gesture input
    to add value and excitement to their products. But many gestures can be used in
    nonstandard ways that can still be usable, but with more compelling results. This
    will be covered in depth when I discuss the development of novel concepts later
    in this book.


    ## The Invisible Button


    The Home button, once a controversial control, is now so widely adopted and so
    frequently used that it is almost invisible. In previous releases of iOS, the
    Home button could be customized to some extent. A double click of the Home button
    could be configured to access the home screen, the search UI, “phone favorites,”
    the camera, and the iPod app. Subsequent releases eliminated this functionality
    and have focused the Home button on the more utilitarian aspects of navigating
    the OS.


    To understand the rethinking of the Home button for being more focused on navigation
    we need to look at the changing nature of iPhone usage. One of the primary drivers
    for the evolution of iOS has been the need to support the ever-increasing quantity
    of apps that users are loading onto their devices. We are seeing devices come
    to market with greater storage capacities designed to meet this same user demand,
    and this demand is in turn driven by the success of the App Store and the highly
    specialized nature of the apps themselves. Apple may have expected people to download
    a lot of apps, but they were not prepared for the very high average quantity of
    applications most users have. A high quantity of anything often suggests the need
    for an efficient means to organize as well as an efficient means to navigate that
    organization.


    Finding an app and putting it to work was once a fairly simple proposition. All
    you had to do was quickly scan an array of virtual buttons on the screen. You
    may have had a second screen of apps that you could quickly flick over to, but
    with a few simple gestures you could usually find what you sought. Fast-forward
    a few years and instead of having one or two screens of apps, you now have five!
    The relatively simple behavior of flicking back and forth between a couple of
    screens has now become problematic. As you move between anything more than three
    screens, orientation starts to become very challenging. The quick flick behavior
    that once made everything so easy now becomes a source of confusion as screen
    after screen of app icons moves past you in a rapid blur. Are you at the home
    screen, or are you four pages in? It can get very frustrating very quickly.


    As iOS progressed, Apple designers created a number of great solutions to assist
    users with the challenge presented by a large number of installed apps. We can
    now group apps into a second-level hierarchy of user-definable app collections.
    We have access to an “App Switcher” that prioritizes apps by most recent use,
    and we can navigate directly to application via search results. We can also quickly
    reorient ourselves back to the home screen.


    That brings us back to understanding the evolving nature of the Home button. With
    the increased level of functionality associated with navigation and orientation,
    the significance of the Home button really begins to grow. The simplistic nature
    of the OS-layer UI, home screen and beyond, does not allow for the addition of
    a navigation control set. This is very different from application-layer UI which
    (via the HIG) demands explicit consideration for these types of controls and a
    consistent model for designers and developers to follow. Without GUI components
    to prompt the user, ancillary navigation and orientation controls must be managed
    by the Home button. Within the context of the unlocked device the Home button
    manages the following functions:


    - **Return to Home Screen:** This is the fundamental function of the Home button,
    and the aspect of the Home button that receives the most use.

    - **Go to Spotlight:** Once the user is at the home screen, a single click takes
    the user to the Spotlight UI.

    - **Reveal App Switcher:** The App Switcher can be revealed at any point in the
    OS layer or application layer.'
