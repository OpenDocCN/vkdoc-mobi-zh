    ## 关于作者


    **Tim Wood** 现任 EffectiveUI 用户体验总监，领导一支屡获殊荣的设计团队，专注于为网页、移动和桌面环境创建定制应用程序。


    十多年来，Tim 始终致力于通过用户体验推动业务的根本性变革。从下一代消费电子产品到高度专业化的移动应用程序，他对设计的热情激发了他内在的创新欲望，并不断推动交互设计的先进方法。Tim
    拥有罗切斯特理工学院计算机图形与交互媒体发展硕士学位，是用户体验设计、用户界面设计和交互设计领域的国际知名演讲者。


    Tim 与伴侣 Lynne、他们的猫 Elysium 以及一群杂居的流浪猫和其他城市野生动物居住在纽约州北部。不从事设计工作时，Tim 通常会骑着山地自行车在东北部的森林中快速而安静地穿行……偶尔也会失控摔倒。


    ## 关于技术审稿人


    **Adam Smith** 是罗切斯特理工学院副教授，并担任影像艺术与科学学院（CIAS）的新媒体设计专业主任。他领导了将行业合作融入学院本科设计教育的关键工作。《Graphics
    Live Magazine》、《Graphic Design USA》、STC 会议以及 [Adobe.com](http://Adobe.com) 都曾专题报道过这一重点，以及他在
    RIT 发起的交互设计、用户体验和跨设备开发教育流程。新媒体项目帮助 RIT 创建了一个屡获殊荣且国际知名的设计项目。'
- fmt: '# Introduction


    It''s a tough market out there, and as I''m sure you know, it can be very difficult
    for your application to get noticed in the App Store. There are literally hundreds
    of thousands of both interesting and not so interesting applications available
    for download now. Just having a highly functional and stable application from
    a development perspective isn''t enough to get your app the recognition it needs
    to go mainstream. Users expect to be ‘Wowed’ with their iOS apps, this is probably
    something that you have experienced yourself. As you probably know, it''s the
    ‘Wow Factor’ of that initial app experience that sets the hook and gets users
    engaged with the features and functions that you or your development team have
    been working so hard to create. It''s ‘Wow Factor’ that gets you world of mouth
    recommendations between friends and great reviews in the app store. It''s ‘Wow
    Factor’ that can drive the viral adoption of the application that ends up funding
    your early retirement! The big question is, what is Wow Factor, and how do you
    get it?


    Those are not easy questions to answer, but the good news is that there are answers,
    and I certainly will address those later in this book - but you need to know that
    you can get to ‘Wow’ if you are willing to start paying close attention to the
    details of your application experience. There''s no doubt about it, critical thinking,
    excellent problem solving skills, and solid design methods are behind any great
    user experience. Elevating your design practice to a higher level is absolutely
    necessary to get that ‘Wow’ that you are looking for, and that''s at the heart
    of what this book is about. But ‘Wow’ takes more than good design practice. It''s
    also rooted in how you think about, or frame up your design problems and that
    requires a greater understanding of the wider context for the design decisions
    you are going to make.


    It''s my firm belief that you can''t truly know where you are going without a
    good understanding of where you have been. The iPhone isn''t the first smartphone
    to appear in the market, although it is one of the most successful and influential.
    As an application designer, or developer, you understand at some level the huge
    opportunity this new platform presents and obviously you''d like to take advantage
    of it. By looking into the past we can understand why the iPhone is the way it
    is and why it is held up as a shining beacon of great user experience.


    As you think about your application, you may need to build upon some of the fundamental
    concepts behind that experience the core experience of iOS, but on the other hand,
    you may just want to toss them aside. The idea behind this book is fairly simple,
    to give you, designer and developer, practical insights into the nature of the
    iOS user experience, while empowering you with information to create your own
    exceptional applications. For many people, Apple''s Human Interface Guidelines
    is the starting point for understanding the possibilities that iOS enables for
    users. But what do you do if you need to go beyond those rudimentary guidelines?
    Because they are just that, rudimentary - and that''s just not going to cut it
    for you! This book intends to help push you beyond the basic assumptions you may
    have about iOS applications provide you with the ideas and techniques that will
    help you build upon your own insights and free your personal creativity.


    Creating a successful iOS application isn''t easy, but it''s my hope that this
    book will help you take your application to the next level and help it get the
    attention that it deserves.


    ![images](images/ch01.jpg)


    ## Putting the iOS Human Interface Guidelines in Context


    Apple’s iOS Human Interface Guidelines (HIG) aim to be the definitive starting
    point for designers and developers new to the platform. The company’s approach
    to the guide is simple—provide a critical mass of information, techniques, and
    basic methods to get an individual or development team building applications as
    quickly as possible.


    The guidelines set out to make the reader aware of the radically new interaction
    model that the platform presents. The initial challenge for Apple, when the device
    was opened up for third-party application development, was to get the platform
    adopted as a viable vehicle for the distribution and deployment of applications.


    At the time of Apple’s App Store launch in the summer of 2008, there was a well-established
    community of specialized teams focused on mobile devices and consumer electronics
    that were well-positioned to migrate to this platform and to begin creating software
    for it. However, the skills and expertise required for success were still considered
    a relatively niche domain. Apple needed a much broader base of development teams
    populating the App Store with great software in order for their strategy to succeed.'
