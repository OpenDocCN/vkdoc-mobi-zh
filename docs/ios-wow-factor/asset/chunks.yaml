- fmt: '# Application Details


    To better understand the nature of content browsing, you decide to investigate
    Company X’s desktop application in more detail. You see that they guide the user
    through the browsing process by providing some general top-tier categories, about
    ten in total. Within each of these top-tier categories there are about 100 subcategories.
    Once you select a subcategory you can see the content objects, which from what
    you can tell, number in the thousands.


    The interaction model used by the desktop application is very straightforward.
    You are presented with a grid of options where each major category is represented
    in a unit of the grid. Selecting a category refreshes the grid with subcategory
    items. Selecting a subcategory refreshes the grid with content objects that you
    can continue to browse visually, at which point you can navigate through multiple
    pages of content objects contained with that subcategory.


    You also notice that the application manages navigation through this space somewhat
    awkwardly. There is a notion of global navigation, but it only appears when you
    are at least one layer deep in the experience. When diving down to the content
    level, you only have access to the top-level categories. It looks to you like
    a major oversight that a user cannot navigate back to the previous level or to
    other categories without backing out completely. On top of that, there’s a lack
    of context for the user at the content level; when browsing content objects it’s
    not obvious which subcategory you are in.


    It’s important to note that when you go through a process like this, where you
    are reviewing an existing application or some other user experience, you should
    remember to take the time to document your observations and thoughts. Your notes
    may go a long way toward informing the development of the new interaction model.
    As we saw with our experiment in early part of this chapter, even a seemingly
    insignificant seed of a thought can be expanded into a much larger concept without
    too much effort. In some cases you may want to include some of your foundational
    thinking as derived from these observations in your interaction modeling documentation
    to support the ideas you may be presenting.


    For the purposes of this case study, you would want to make special note of the
    nature of Company X’s content hierarchy since that will likely have a significant
    impact on the nature of your solution. So, after reviewing the app you get a sense
    that their content structure can be understood like this (see [Figure 6-15](#Chapter06.html#fig_6_15)):


    ![images](images/0615.jpg)


    **Figure 6-15.** Company X’s content structure & its implications for object browsing


    This seems to be an accurate representation of the overall structure. You notice
    that one of the fundamental issues with the current interaction model is that
    the user must always back out of the third tier of the hierarchy to get back to
    sub-categorical, or categorical navigation. That just doesn’t seem right. But
    that’s only the tip of the iceberg. You’re still not sure if this grid model is
    even valid for an iPhone experience, but given the visual nature of the navigation
    model you give it a shot.


    Given that we’ve already conceptualized a grid concept, let’s take a stab at recycling
    that concept. Let’s use the same mechanics of interaction that we tried before
    and just apply that to the concept of moving through a hierarchy (see [Figure
    6-16](#Chapter06.html#fig_6_16)).


    ![images](images/0616.jpg)


    **Figure 6-16**. Grid concept showing navigation to tier 2 objects


    This model has a very close relationship to the existing application experience
    with its explicit use of a grid of objects. This may be of benefit to users who
    are already familiar with the desktop application. However, in this model we have
    to contend with the constraints of the platform, particularly screen size, so
    we have limited the main view to a two-by-two configuration. In the desktop application
    the grid is ten by at least 15, depending on how wide you make your application
    window.


    Like the other example that we created, this model could support a spread gesture
    or a basic tap to navigate down through the categories. In this case we’ll use
    the idea of an expansion threshold a bit differently. Instead of having that threshold
    relatively high to create an intermediary state, we want the threshold of expansion
    to be very low. As soon as the system interprets the gesture, we want to transition
    to the next category.


    The key to this interaction model is the visual transitions presented as the user
    moves through the hierarchy. We want the content to feel as if it is nested within
    its subcategory, and subcategories nested within their top-level category. As
    you spread open a unit you will see the underlying content emerge and fill the
    space. It’s very much a direct representation of how information is organized
    within the app, and it goes a long way toward presenting a very clear model to
    the user.


    Unfortunately this model has a few issues, the least of which concerns navigation
    back up the hierarchy. It’s possible that you could use a reverse gesture to navigate
    back up a tier, but that seems untidy and awkward to say the least. So while this
    concept has the potential for some very interesting visual interaction, the interactions
    don’t map well to the needs of the app. In other words, the solution is not extensible;
    this is one of the big red flags we need to keep our eyes out for.


    The other concern is that the model represents a two-handed solution, meaning
    that the user would have to hold the phone with one hand and use the free hand
    to navigate the app. This isn’t necessarily a bad thing, but given the context
    of mobility that we are ultimately designing for, it’s not an ideal solution.


    So what other alternatives can we work through? Let’s take a step back again and
    think through the possibilities of a list. Lists are very convenient for one-handed
    control, and they can be structured to manage the navigation through hierarchical
    tiers very simply. This fact makes their use on the iPhone almost a universally
    applicable solution, but it would be a solution that represents a very low degree
    of differentiation. Is there a different way to treat this new list concept?


    We pushed the list concept to the extreme before, so maybe this time we can be
    a bit more literal and figure out a way to include some additional value. We don’t
    need to differentiate just for the sake of being different, at least not when
    there are still issues that we need to address. The previous interaction model
    didn’t support navigation back up the hierarchy effectively, so that’s something
    that we’ll want to address this time. There was also the issue of categorical
    context observed in the desktop application; that is, it was hard to determine
    where you were, not to mention the fact that you had to back all the way out to
    the top level to dive into another category. Let’s walk through a model that may
    address these issues.


    ![images](images/0617.jpg)


    **Figure 6-17.** A typical list with unique interactions. The user can swipe left
    to reveal a list of tier 2 objects hidden under the original list element.


    Ok, we have a solution here that at first glance appears to be a fairly straightforward
    list of categories that can be browsed by scrolling up and down. However, this
    one departs from the standard iOS list treatment in many ways. Navigation through
    the first two tiers is managed within the same basic view. If a user selects a
    list element, instead of navigating to another screen, the next tier of subcategories
    is revealed within the list element itself (see [Figure 6-17](#Chapter06.html#fig_6_17)).
    So basically we just implemented a state change to the list item to expose another
    tier of navigation within the available area. A user can scroll within that region
    to browse the subcategories, while context is maintained by the category label
    that appears above the region. At the same time the user still has visibility
    of and access to the top-level categories.


    Triggering the state change to the list element could be accomplished with a deliberate
    swipe to the left directly on the list item itself, or we could designate a discrete
    target to trigger the reveal animation that displays the subcategories. If we
    decide to implement this design it would be worth exploring both options to get
    a sense of which interaction feels more natural and which is less prone to user
    error.


    This model presents a very efficient browsing technique, with the main benefit
    of providing a user access to the first two tiers in the hierarchy simultaneously,
    but there are some significant challenges here as well. Constraining the browsing
    of subcategories to a smaller portion of the screen is not inherently efficient,
    especially if we can only see a maximum of two items at a time. To add to that,
    this particular model only addresses navigation to the subcategory level; the
    content tier would need to use another model that could leverage the maximum amount
    of real estate. So again, this solution may not be viable for Company X’s application.


    Is there a way to deliver the same level of navigational flexibility to the user,
    while allowing for the greater prominence of the available content? The previous
    design solution also uses a disproportionate amount of real estate to display
    the top-level categories, which feels a bit counterintuitive. And let’s also try
    to shoot for a solution that provides convenient one-handed access. Remember,
    the requirement states that we need to provide the user with a means to quickly
    and efficiently browse their content.


    Let’s continue to work with the list concept, but this time let’s think about
    adding some different properties to the list that may make browsing a bit more
    fluid. In this case, there isn’t a notion of a discrete state change on the screen.
    It’s a more dynamic solution that is responsive to interaction from the user.


    ![images](images/0618.jpg)


    **Figure 6-18.** Combining tier 1 & tier 2 objects to provide faster access to
    content. A user scrolls vertically through tier 1 and horizontally through tier
    2.


    This concept is a bit different from the others in that in its initial state we
    reserved some space for both dedicated navigation and the other core functionality
    that needs to be accounted for. You’ll notice that I do not illustrate those particular
    features in the model. The reason for this is straightforward: an interaction
    modeling exercise does not and should not need to demonstrate all details of the
    application. The main purpose of the effort is to help you begin to formulate
    the high-level interactions that will form the basis of your application experience.
    With that in mind, you need to focus your efforts on resolving content browsing
    first, while providing high-level considerations for the ancillary interactions.


    This model begins with an initial state that displays a limited amount of top-level
    categories, leaving room for a utility region that will come in handy when we
    map out the rest of the user interface later in the project. Top-level categories
    are only treated as a labels in this model, giving users immediate access to second-tier
    organization. User can quickly move among all top-level categories while viewing
    the second level (see [Figure 6-18](#Chapter06.html#fig_6_18)). This gives users
    nonlinear access to all categorical organization.


    Exposing additional categories from the initial state of the app only requires
    a user to scroll the array of objects to the top of the screen. As the categories
    reach their boundary limit on the screen they collapse to make room for the display
    of additional categories. The user does not have to take any direct action to
    cause a category to collapse; categories will collapse automatically based on
    their position on the screen. The effect is something like the bellows on an accordion.


    Content browsing at the subcategory level maps nicely to this model too. When
    the user selects a subcategory in the first view, they are transitioned to grid
    of content that can either support additional content categorization like we see
    in the top level, or an unlabeled grid (see [Figure 6-19](#Chapter06.html#fig_6_19)).
    Viewing content only requires the user to make a selection on the grid, at which
    point they are taken to a full-screen view of the content.


    ![images](images/0619.jpg)


    **Figure 6-19.** In this model, content can be exposed with a single touch.


    Navigation back up the hierarchy is managed at the top of the screen. For the
    purposes of this model it could be as simple as a back button, or as complex as
    a breadcrumb trail. The important thing is, from the perspective of an interaction
    model, that we have a mechanism to account for navigation controls.


    With this solution in hand, we can now go back to the key stakeholders at Company
    X and walk them through this model. The interaction model documentation does an
    excellent job explaining the benefits of these interactions from a user’s perspective,
    and at the same time demonstrates how this application can be differentiated from
    the competition. This is all accomplished without having to produce detailed wireframes,
    design mockups, or functional prototypes.


    Now that you understand the basic process, and have seen what it can enable, please
    work through some concepts on your own and see where it takes you.'
