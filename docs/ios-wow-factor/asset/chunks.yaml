  trans: '

    # 了解你的用户


    决定应用程序发展方向的最大因素，取决于你对用户了解多少。这些用户可能是现有用户，也可能针对全新应用设定的假想用户。你对用户了解得越多，就越清楚如何制定用户体验策略的细节。


    在着手开发应用程序之前，精心进行一些关于用户本质的基础研究，能带来巨大益处。在许多情况下，最佳的起点是尝试定义用户画像。你可能对应用的本质已有构想，其中包含一些关于该应用将吸引谁、为何会受到欢迎的假设。利用这些假设来构建一个假想用户的画像。画像应包含足够的信息，让你和设计团队成员能在某种程度上与用户产生共鸣。年龄、性别、收入水平和职位是重要细节，但你还应包含家庭与亲属信息，以完善整体图景。生活方式信息也很关键；你越能明确其兴趣、爱好和社交活动，画像就越精准。作为拼图的最后一块，你还需要包含一些关于其动机与目标的信息。对目标和动机的概括性陈述即可，但你或许希望将其应用于特定用例。如果试图从零开始捏造用户画像，这听起来像是艰巨的任务，但如果你以某个你认识的人为基础来构建画像，就可以抢占先机。你可以尽可能准确地描绘那个人，但也始终可以选择修饰细节、补充信息，确保画像是你所针对用户类型的典型代表。


    你可能会对自己勾勒出的一个或多个画像能准确反映所寻求的用户类型充满信心。如果你缺乏信心，或者觉得细节不够充分，那么你可能需要考虑在某种程度上验证这些画像。有几种不同的方法可以做到这一点。如果你想保持流程更非正式，可以邀请团队其他成员来确认你的假设或补充更多细节。你也可以选择更正式地验证用户画像，在这种情况下，你需要招募并筛选具有相同基本特征的个人进行访谈。你的提问方式应能帮助你判断关于画像的假设是否准确。你很可能会从这些访谈对象那里学到许多额外细节，这些细节对于完善已建立的画像将非常有价值。


    一旦确立了画像，你就可以利用这些信息来模拟与应用程序使用相关的不同类型场景。将画像映射到场景中，让你能够进行角色扮演，并通过目标受众的视角体验假想的应用程序。要有效做到这一点，你需要根据你所记录的特定用户的信息来思考和行动。这说起来容易做起来难，但如果你对自己设计的画像有很好的把握，就能理解他们会看重何种用户体验。详细记录这些场景可能很重要。场景可以采用简短的书面叙述形式，也可以在一系列故事板中可视化呈现。将场景与特定功能或功能集被突出的特定用例对齐，也可能很有价值。


    # 评估竞争对手


    在建立了用户画像并确定了场景之后，是时候向外审视市场，深入了解你的竞争对手在做什么了。评估竞争对手并不困难，而且既然你已对应用程序的形态有了构想，你可能已经感知到竞争对手的优势和劣势。这假设你知道你的竞争对手是谁。如果你不知道，那么第一步就是识别你的竞争对手。就此项工作而言，这包括任何提供类似功能的应用。有了`App
    Store`，寻找竞争对手是件简单的事。只需输入适当的搜索条件，然后查看相关应用的搜索结果。根据应用的性质，你可能会在`App Store`中找到许多竞争对手。你不需要考虑所有对手。你只需对标最好的应用，而`App
    Store`也使得这一点非常容易。按星级评价过滤搜索结果，找到评论出色的应用。你最终需要将范围缩小到三到五个应用。


    现在你已确定了竞争对手，就需要开始深入探索这些应用。在此过程中，记录你的观察和体验。甚至注意你在使用各种功能和执行任务时的感受。有些应用可能提供出色的功能，而另一些则支持优秀的交互。任何细节都不应被忽视，但你可能需要重点关注对你的应用至关重要的特定问题。记录任何你觉得有吸引力或有价值的东西。对于任何你觉得不吸引人或执行不佳的部分也应如此。一旦积累了足够多的观察结果，就在宏观主题下对相关观察进行分组和归类。这些观察结果和主题可以显著影响你的整体策略，并且你可以将其作为验证或反驳应用用户体验各个方面的依据。


    # 引领市场


    实现“惊艳”效果的一个巨大组成部分，是确保在恰当的时机将你的应用交到用户手中。用户对你应用体验的感知可能会受到市场上已有且受欢迎的产品影响。如果竞争对手率先以类似的用户体验进入市场，你精心打造的差异化方法和独特的交互方式可能很快就会变得无关紧要。如果竞争对手紧随其后发布了与你类似的应用，你应用的影响力也可能被稀释。避免这些情况可能比较棘手，但如果你进行相应的规划，是可以做到的。一个有效的用户体验策略需要处理应用的定位以及用户期望的感知——不是针对当前的市场状态，而是针对预测的未来状态。我指的不是你可能规划的应用发布时间点。我谈论的是试图通过你的用户体验，在明确的时间段内引领市场。


    走在市场前列需要你的设计团队具备专业素养，我肯定会回顾如何达成优秀设计解决方案的流程，但你的策略也需要勾勒出这种领导地位的愿景。无论愿景或目标是什么，如果你针对正确的用户进行测试，就可以预测你的设计解决方案能否实现目标。在这种情况下，你需要找到那些将自己定义为同龄人中的“影响者”的人。影响者并非倾向于追随潮流，而是更善于引领潮流。这些用户将自己视为同龄人群体的文化策展人。与这类用户一起测试概念，能让你走在采用曲线的前端，摆脱可能阻碍你创造下一个伟大应用的大众市场传统思维。这些人需要与已定义的画像保持一致，并且需要根据各种影响者特征进行筛选。

    '
- fmt: '### Summary


    Users and user experience technology have evolved considerably over the past 20
    years. Expectations around what software should be and how it should work have
    shifted significantly. Users not only expect highly differentiated, innovative
    user interfaces, they embrace them wholeheartedly when those experiences are executed
    thoughtfully.


    Successful interaction design solutions of the past were defined almost entirely
    by their usability. Usability at that time was an engineering mindset focused
    on improving products through quantitative user input. As the market evolved,
    it became necessary to look beyond usability and understand other aspects of an
    application experience to remain competitive. The mindset of "user experience"
    addresses this by taking a comprehensive view of aesthetics, perception, and emotional
    engagement.


    Usability is now a table stakes consideration. In order to drive adoption with
    users you need to make a determination about other the factors of user experience
    that will make your application more desirable. You can''t ignore usability by
    any means, but desire needs to be the focus of your design solution.


    Having a user experience strategy in place will ensure that you make the right
    decisions as you progress through the design process.


    - It will provide an excellent point of unification for the diverse teams involved
    in the development of the product.

    - It will ensure customer satisfaction by helping teams maintain sharp focus on
    the user.

    - It will provide a consistent experience through the lifecycle of your product,
    maintaining established user expectations.

    - It will almost certainly improve the quality of your product and help mitigate
    any deployment risks.


    Your user experience strategy should include the following information:


    - Well-defined user personas that include details about their motivations and
    goals.

    - How features are determined, managed, or organized based on how the user perceives
    value.

    - How use-cases and workflows are formulated and how they are relevant to the
    lifestyle attributes, motivations, and goals of a particular user.

    - How to manage the maturation of user experience over time, beyond just a feature
    road map, but by also accounting for how the core interactions need to evolve.

    - A broad view of the higher-level user experience continuum, either for the acquisition
    and download lifecycle and/or an applications relationship and integration with
    other product family members.

    - Competitive insights that can guide, validate, and inform various aspects of
    your user experience as it is formulated.


    With all these items in place, you can feel confident that your strategy will
    provide enough guidance and direction for how you want to shape your user experience.


    ## The Killer App


    Designing for the Mobile Context


    You may already have a well-defined application targeted for iOS devices that
    you''d like to build. If you''ve reviewed [Chapter 3](#Chapter03.html#ch3) you
    know that your application may be refined or made more robust by thinking in terms
    of a more comprehensive user experience strategy. As you start to think through
    specific use-cases and as you start to flesh out profile-based scenarios, it becomes
    increasingly important to get your head around the usage context for mobile devices.
    Armed with that knowledge you can validate and elaborate on your existing idea
    and really focus on the creation of a "killer app" for an iPhone or iPad.


    To provide you with a solid foundation, I''m going to review the importance of
    the mobile space for application developers, and give you a framework for thinking
    about the behavioral differences between the iPad and iPhone that will help you
    shape those experiences in the right way for your users. I''ll then walk through
    some guidance on targeting specific use-cases to help ensure that your application
    hits your user''s sweet spot.


    ### The Importance of Mobile


    Okay, we all know that the mobile space is red-hot right now, and if you have
    picked up this book you understand the potential that mobile devices have for
    delivering some very interesting apps and experiences. But why is mobile so important
    and what is driving the enthusiasm around the mobile app space?


    The core value of mobile computing in any context is the idea of anytime, anywhere
    access to data and functionality. It''s really that simple. Over a very short
    time we have seen the evolution of these "phones" go from an exclusive focus on
    telephony, to a point where telephony is virtually a fringe use-case in what is
    otherwise a universal computing appliance. The success and popularity of devices
    like the iPhone is based on the fact that they have made computing and the digital
    experience much more relevant through their universal accessibility.


    In the past, working with software or accessing the internet were chair-bound
    activities that limited you to a specific place and time. You had to be at home
    or at work to take advantage of applications or to browse the internet. Even while
    at home, the setting and mode of interaction with the computing environment was
    a highly formalized affair, with keyboard and mouse arranged just so in a special
    room or nook dedicated to the activity. Generally speaking, computer usage at
    home or at work was primarily task driven, with only a small portion of that time
    open to leisure activities. Obviously, I''m speaking in generalities here, but
    the point is that before now, our physical and environmental interactions with
    computing environments like a desktop PC were incredibly constrained.


    By eliminating the limitations of place and time you can start to open up entirely
    new possibilities, new use-cases, and new apps to explore. This is the core value
