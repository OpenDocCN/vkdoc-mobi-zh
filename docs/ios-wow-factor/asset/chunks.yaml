  trans: '

    ### 商务


    商务是另一个对任何平台而言都近乎通用的关键用例。它之所以值得一提，是因为这是一个不应被忽视的领域，而且与我讨论过的其他用例类似，它有许多值得思考的方式。首先浮现在脑海的，可能是我们在桌面/网络环境中非常熟悉的基本电子商务模式。浏览商品、阅读评论、将商品加入购物车，如今对我们来说几乎已是第二天性。在移动环境中直接应用商务模式的挑战在于，需要理解如何将平台特定的交互方式应用到通用工作流程中。除此之外，还要优化关键交互（例如商品浏览），以提升速度、效率并节省屏幕空间。


    如果只从这些方面来看待商务用例，其视角相对简单。如果你能跳脱出支持基本交易场景的思维，从更广阔的角度思考商务，那么这个用例的潜力要大得多。有许多“增强型场景”才刚刚开始被探索。这些用例旨在支持或增强现有的购物行为或其他商务活动，而无需明确的交易支持。


    我将这些场景分为两大类别：


    - **精选（Curation）：** 利用第三方来源，帮助用户在复杂的产品选择中导航，提供推荐并影响购买行为。

    - **聚合（Aggregation）：** 根据用户定义的一组参数，对来自不同来源的内容（此处指产品）进行自动过滤和管理。


    这只是冰山一角。你的用户体验策略定义以及与目标用户画像相关的细节，都将有助于发掘你可能会想要利用的其他有趣的商务增强型用例。


    ### 实用性


    在第 2 章中，我讨论了驱动整体用户体验设计的那种普遍的实用主义精神。这也是影响用户对设备上已安装应用价值感知的一个高度相关因素。实用性的概念与我之前讨论的“娱乐”类别形成了鲜明对比，并且从某种意义上说，它对于
    iPhone 的真正移动用途（而非我之前为 iPad 概述的便携场景）具有更重要的意义。回顾一下我们对这两种设备在用户心目中如何产生差异的理解，这一点就非常说得通了。能够实现高度功能性或实用性的应用，即便缺乏精致的图形或动态交互，也能取得巨大成功。如果一个应用能帮助用户快速高效地完成任务，那么它一定会被频繁使用。


    实用性的概念相当宽泛，但同样，在移动场景的背景下，你可以开始构思你的应用，使其能够应对这个用例。


    如果你的应用目标是追求实用性，那么它需要满足两个维度的要求：


    - **正确的功能（Right Function）：** 提供能够执行任务所需的功能密度。

    - **任务效率（Task Efficiency）：** 提供执行任务的最简单方式。


    如果实用性是你的目标，那么这两个方面就是你首先需要关注的焦点。


    ### 综合分析与移动相关性


    我分别阐述了每一个用例，但这可能不是思考它们的最佳方式。你可能希望或需要专门针对其中一个用例，这没问题，但也可以将它们视为一个属性矩阵。如果你觉得你的应用已经有了一定的基础，但又想确保其在移动领域的相关性，那么这种方法可能更有意义。请根据每个用例所代表的价值来审视你的应用。没有必要面面俱到，你可能会发现，其中的一个或多个属性有助于你将应用聚焦在更能提升移动相关性的方向上。在进行这个评估的过程中，你或许还能创造额外的价值，并有可能挖掘出新的、尚未被识别的用例，从而有助于提高你应用的采纳率。


    运用`正确的功能`和`任务效率`这两个概念来思考应用的整体实用性，绝不是一个坏主意。根据你应用的性质，这些可能不一定是首要任务，但它们总是会在某种程度上适用。


    基于位置的服务也应该始终放在考虑之列，无论这是不是你应用的核心。你需要问自己，是否存在可应用的位置功能维度，能为用户在移动中增加价值。


    通信是另一个值得在宏观层面考虑的用例。这可能简单到在你的应用中的适当位置集成“点击通话”功能，而通信的复杂性只会在此基础上增加。从用户和商业的角度来看，与社交媒体的集成正变得日益重要。这种一对多的通信可以在整个应用中以多种不同方式集成。由你来决定在何处以及如何应用这些功能类型，但需要知道的是，你的决策过程应源于明确的用户需求。


    你对各种交叉用例的关注程度，也在一定程度上取决于设备类型。iPhone 和 iPad 之间的行为模式偏好，可以帮助你理解如何在你的应用中最好地支持这些用例。

    '
- fmt: '### Translation into Mobile


    I touched on the idea of translating existing applications, use-cases, and functionality
    a bit in the previous section, but it is a topic that’s worth exploring a bit
    deeper because it is a common situation for many organizations.


    If you are thinking about translating an application into the mobile space there
    are a few basic steps you should take to get started.


    - **Identify your feature superset:** The application you may be translating may
    be functionally robust in its current state. Identify and list all the possible
    features.

    - **Group and cluster:** Review your feature list and group or cluster like or
    related features together. You can also do this with a particular use-case or
    workflow in mind; just label and organize as needed.

    - **Review and analyze:** Take a look at how your feature groupings are starting
    to resolve and look at if they are applicable to the mobile context at a high
    level, and if they may speak to specific use-case at a more detailed level.

    - **Filter:** Remove or isolate features that are not relevant, based on the what
    you have identified as the primary use-cases from your user experience strategy
    and by what is appropriate or possible for the platform.

    - **Identify areas of critical mass:** It may make sense to translate an application
    as a unified experience into a mobile app, but you should be looking at your grouped
    features to determine whether or not they can stand alone as applications unto
    themselves, and if it makes sense to fragment your application into multi-sub
    applications.


    What I’m describing here is essentially a triage type effort that ultimately you
    would want to front load into your overall strategy. This won’t give you all the
    answers, but it will help you ensure the relevance of your application for mobile
    users.


    The last bullet really speaks to the optimization of user experience for more
    complex applications. High functional density is always a challenge for smaller-scale
    devices, not just in terms of UI mapping and layout, but because of the deeper
    hierarchical navigational structure that functional complexity implies. This may
    be less of an issue for a device like the iPad, but even there you may still have
    some significant challenges trying to replicate a desktop experience in a way
    that makes sense for the platform.


    ### Summary


    The notion of anytime, anywhere access to data and functionality is the core value
    of mobile computing. The fact that users are no longer limited to a fixed place
    and time to access a computing environment has radically changed how they think
    about what is possible. New use-cases and scenarios are emerging that are contributing
    to the accelerating adoption of devices like the iPhone.


    There are nuances to mobile device behavior that will have an impact on design
    decisions for your application. Whereas the iPhone is a truly mobile platform,
    the iPad is not. We can differentiate between the two by stating that the iPad
    really represents more of a portable use-case because it is not universally present
    with the user, and it’s use is often limited to situations where the user is stationary
    and prepared to be engaged for longer durations. iPhone usage is higher in frequency,
    but the engagement period is often very short. There are also differences in personal
    affinity between the two devices. Whereas the users have an extremely close affinity
    with their iPhones, the iPad has more opportunity to be a shared device.


    I’ve identified five critical use-cases for mobile:


    - Communication

    - Entertainment

    - Location-Based Services

    - Commerce

    - Utility


    These use-cases cover a wide array of applications and functions. They should
    be used to either identify areas of opportunity, or they can be used to help increase
    the relevance and add value to an existing application as it is transitioned into
    the mobile space.


    Translating existing applications into mobile can be challenging, but there five
    simple tasks you can perform to help make this transition seamless and drive relevance
    for mobile uses.


    Addressing mobile use-cases from this perspective will have a significant impact
    on improving your user experience and will help ensure that your application is
    useful, relevant, and engaging.


    ![images](images/ch05.jpg)


    ## Leveraging iOS Capabilities for Optimal User Experience


    Apple’s iOS is a fantastic platform to design for. Out of all the mobile platforms
    on the market today, it provides the best support for the rendering of user experience
    and all the highly nuanced visual interaction that often entails. Apple has done
    an excellent job of providing a variety of specialized technologies to enable
    a development team to overcome even the most complex challenges that a designer
    can bring to the table.


    There’s been much discussion in the interaction design community around the notion
    of “designer-developer workflow.” Many of the new technologies driving contemporary
    web user experience provide a seamless transition for design material moving between
    the design and development domains. This has had the effect of making the creation
    of sophisticated user experiences a much more streamlined affair, with less communication
    overhead for teams and greater design fidelity for the experiences being created.
    Additionally, there has been a revolutionary shift in traditional project roles
    as more designers move beyond just the specification of user experience, and begin
    to directly implement front-end code.


    There’s been a recognition within project teams that it’s extremely valuable to
    have design staff that possess a working knowledge of the technologies being used
    to implement their work. In reality this needs to be more than just a basic familiarity
    with ideas and terminology. In an ideal situation, a designer would be intimately
    familiar with the strengths and weaknesses of a particular technology and be able
    to design a solution that takes those capabilities into account. This implies
    that it may be necessary for a designer to have firsthand knowledge of a specific
    technology. It’s not reasonable to expect that a designer, or design team, has
    robust development skills and extensive experience coding for a particular platform.
    However, if a designer has either experimented with a technology on their own,
    or as a part of an internal training initiative, they can be much more efficient
    when designing a viable solution. Even just taking a day to review any supporting
    documentation applicable to the execution of front-end experience can help ensure
    a more streamlined development effort. If that documentation is not immediately
    understood, designers should work with their development team to help identify
    all the key software issues that may influence design execution. This all speaks
    to the need for designers to start thinking about themselves as technologists,
    wherein they establish themselves as experts on the primary technologies used
    to manifest the experiences that they are working hard to define.


    With all of that said, I’m going to walk through the core technologies responsible
    for delivering visual interaction within iOS. Each one of these has specific capabilities
    and design benefits that I will review. As you start to think about your user
    experience, keep these technologies in the back of your mind and consider how
    each may help you accomplish your design goals.


    Beyond that I’m going to review a few other iOS platform-related topics important
    for every designer to know. Most of these are recurring topics that seem to pop
    up during any initial discussion about the creation of an iPhone or iPad application.
    These topics will revolve around custom skinning, iPhone and iPad development
    support, and understanding the user experience implications of native app capabilities
    versus mobile web capabilities.'
