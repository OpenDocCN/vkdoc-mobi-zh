- fmt: '### Defining Your Strategy


    What exactly does a user experience strategy entail? At the highest level it is
    about establishing a set of perceptual goals targeted at a specific group(s) of
    users and understanding how those goals can be addressed by different aspects
    of the application experience. Those goals may address a particular feature set
    relevant to how users may perceive the value or usefulness of an app. They may
    pertain to a series of critical use-cases from a purely functional perspective,
    or they may address how features support or reflect the user’s lifestyle.


    All of this is highly dependent on the nature of the application, but in all cases
    a strategy should define how those features are presented to the user in a way
    that speaks to the stated goals.


    There are other dimensions of complexity that should not be overlooked. A good
    strategy should address the maturation of user experience over time through the
    periodic reevaluation of goals, users, and market conditions. If the development
    team is operating under an Agile methodology, then it may be easier to integrate
    this kind of design thinking into the overall process and integrate revisions
    to user experience by way of a product backlog. This approach would be the type
    of thing that would be documented in the user experience strategy.


    No user experience stands alone anymore. Thinking about user experience as being
    isolated to just your application can get you into a lot of trouble. In many cases
    user experience needs to be accounted for across many touch points in a larger
    continuum. This would be true for large, complex product families where systematic
    user experience dependencies need to be tracked or managed. Even applications
    that stand alone need to be understood from an end-to-end experience. Be sensitive
    to all aspects of your users’ journey; from the discovery of your application
    via search engine, App Store, or product page, through the install and update
    process, even to how you may ultimately sunset your product.


    It’s also worth taking a look at the larger ecosystem that may ultimately be responsible
    for the distribution of your app. For the purposes of this book, that would be
    Apple’s App Store in its various incarnations. You don’t have control over the
    App Store workflow, but you do control the content on your product page and other
    small but highly relevant details. Do your best to leverage the aspects of the
    App Store that Apple lets you control. Always look for opportunities to use those
    capabilities to your advantage by seeking to reinforce your user experience strategy.
    There are limited opportunities to do this, but a first step is how you approach
    your app icon, and how that relates to the elements you select to be displayed
    on screen. Establishing some baseline criteria for the screens you want to display
    and making sure those criteria align with or support your strategy is also very
    important. Even the tone and voice of your text description can play a role in
    reinforcing your overall user experience strategy.


    This is a lot to account for, and you may not get it all right on the first try,
    but ultimately your strategy will pay off as users start to engage with your product
    and move through each of those touch points.


    ### Thinking Through Differentiation


    Product differentiation can be a significant factor in achieving a high degree
    of impact, or “Wow.” We’ve covered the rationale for this kind of thinking, but
    there are many nuances that need to be understood before beginning any design
    activities. A good user experience strategy needs to outline these nuances in
    a clear and coherent way.


    The first thing that needs to be understood is that differentiation can be viewed
    along a continuum. The nature of that continuum is up to you, but you should approach
    differentiation as a range of possible options between two opposing points. One
    approach would be to think about one point being *similar* and the other *divergent*
    (see [Figure 3-1](#Chapter03.html#fig_3_1)). Similar and divergent are just abstract
    ideas to give you a framework for thinking about where your design solution needs
    to reside. In this case, similar speaks to a more traditional approach, one that
    has its basis in conventional wisdom. It represents a low-risk, follower mentality.
    At the other end of the scale, divergent refers to an unorthodox approach that
    may be higher-risk, but demonstrates innovation. The actual scale depends on what
    your strategy states as the desired goals for your product. The question is, where
    on that scale does your app need to be positioned to be competitive or desirable,
    assuming those are goals? Your application’s position on that scale can provide
    some indication of whether to consider an incremental enhancement of existing
    functionality, or a radical reinvention.


    ![images](images/0301.jpg)


    **Figure 3-1.** Continuum of differentiation.


    You can apply this approach to any aspect of your user experience. The example
    that I just used could be looking at that scale in terms of functional differentiation,
    but you may want to apply this same method to your thinking about a potential
    interaction model, independent of functional concerns. If functionality is unchanged
    between possible options, you may want to identify that your primary differentiation
    is focused on interaction. You can plot where you think the interaction model
    needs to be on that scale and use that as another guidepost to help direct your
    interaction design activities.


    This kind of thinking isn’t limited to one dimension. Concepts can be plotted
    on multiple axes to converge on a specific kind of perception on the part of the
    user. But at the very least you can start by addressing the level of differentiation
    you are trying to achieve on that basic, two-dimensional continuum.


    How do you go about determining the right direction for your app? The first point
    to consider is whether you are creating a new application or working with an existing
    application. A new application doesn’t carry the burden of a legacy user experience
    and can be a blank slate for the design team. If you are working with an existing
    application, the nature of your release is an important factor in the decision-making
    process. With existing applications, try to reserve significant alterations to
    a user experience for major releases.'
