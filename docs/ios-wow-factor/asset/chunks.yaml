  trans: '

    ### 定义你的策略


    用户体验策略究竟包含哪些内容？在最高层面上，它关乎为特定用户群体设定一组感知目标，并理解如何通过应用体验的不同方面来实现这些目标。这些目标可能针对与用户感知应用价值或实用性相关的特定功能集，也可能从纯粹功能角度涉及一系列关键用例，或者关注功能如何支持或反映用户的生活方式。


    所有这些都高度依赖于应用的性质，但在所有情况下，战略都应定义如何以符合既定目标的方式将这些功能呈现给用户。


    还有其他不容忽视的复杂性维度。一个好的策略应通过定期重新评估目标、用户和市场状况，来应对用户体验随时间的成熟过程。如果开发团队采用敏捷方法论，那么将这种设计思维整合到整体流程中，并通过产品待办事项列表集成用户体验修订可能会更容易。这种方法正是用户体验策略中需要记录的内容。


    如今，没有任何用户体验是孤立存在的。将用户体验局限于你的应用可能会带来很多麻烦。在许多情况下，需要在更广泛的连续性中的多个接触点上考虑用户体验。这对于需要跟踪或管理系统性用户体验依赖关系的大型复杂产品系列而言更是如此。即使是独立的应用，也需要从端到端的体验来理解。请对用户旅程的所有方面保持敏感：从通过搜索引擎、App
    Store 或产品页面发现你的应用，到安装和更新过程，甚至包括你最终如何淘汰产品。


    同时，审视最终可能负责分发你的应用的更大生态系统也很有价值。就本书而言，那就是苹果的各种形态的 App Store。你无法控制 App Store 的工作流程，但你可以控制产品页面上的内容以及其他虽小但高度相关的细节。尽力利用苹果允许你控制的
    App Store 方面。始终寻找机会，通过强化你的用户体验策略来利用这些能力为你服务。虽然这样做的机会有限，但第一步是如何处理你的应用图标，以及它与你选择在屏幕上显示的元素之间的关系。为你要显示的屏幕建立一些基线标准，并确保这些标准与你的策略保持一致或支持你的策略，这同样非常重要。甚至你的文本描述的语气和措辞也能在强化整体用户体验策略中发挥作用。


    需要考虑的方面很多，你可能无法在第一次尝试中就全部做对，但最终，当用户开始使用你的产品并经历每一个接触点时，你的策略将获得回报。


    ### 思考差异化


    产品差异化可能是实现高度影响力或“惊艳”效果的重要因素。我们已经涵盖了这种思维的基本原理，但在开始任何设计活动之前，有许多细微差别需要理解。一个优秀的用户体验策略需要清晰连贯地概述这些细微差别。


    首先需要理解的是，差异化可以在一个连续谱上被看待。这个连续谱的性质由你决定，但你应该将差异化视为两个对立点之间的一系列可能选项。一种方法是将其中的一个点视为*相似*，另一个点视为*不同*（见图
    3-1）。相似和不同只是抽象概念，为你提供一个框架来思考你的设计解决方案需要处于什么位置。在这种情况下，相似指的是更传统的方法，其基础是传统智慧。它代表了一种低风险的追随者心态。而在范围另一端，不同指的是可能风险较高但体现创新的非正统方法。实际的标度取决于你的策略中规定的产品目标。问题是，假设目标是具有竞争力或令人向往，你的应用需要在这个标度上处于什么位置？你的应用在该标度上的位置可以提供一些指示，表明是考虑对现有功能进行增量增强，还是进行彻底的重新发明。


    ![图像](img/0301.jpg)


    **图 3-1.** 差异化连续谱。


    你可以将这种方法应用于用户体验的任何方面。我刚才使用的例子可能是从功能差异化的角度来看待这个标度，但你可能希望将同样的方法应用于对潜在交互模型的思考，而不考虑功能问题。如果不同选项之间的功能没有变化，你可能需要明确你的主要差异化集中在交互上。你可以绘制出你认为交互模型需要在该标度上的位置，并将其用作另一个路标，以指导你的交互设计活动。


    这种思维并不局限于一个维度。概念可以在多个轴上绘制，以收敛于用户在特定方面的感知。但至少，你可以从解决你试图在基本的二维连续谱上实现的差异化程度开始。


    如何着手为你的应用确定正确的方向？首先需要考虑的是你是在创建新应用还是处理现有应用。新应用没有传统用户体验的负担，对设计团队来说是一张白纸。如果你是在处理现有应用，那么发布的性质是决策过程中的一个重要因素。对于现有应用，尝试将用户体验的重大修改保留给主要版本。'
- fmt: '# Know Your Users


    The biggest factor in determining what direction to take with your application
    is based on what you know about your users. These could be existing users, or
    these could be the hypothetical users you are targeting with an entirely new app.
    The more you understand about your users, the more you will know about how to
    craft the details of your user experience strategy.


    There is a huge benefit in putting together some fundamental research about the
    nature of your users well before you engage in developing your application. In
    many cases, the best way to start is to take a stab at defining a user persona.
    You may already have a vision about the nature of your application, and that might
    include some assumptions about who that app will appeal to and why it will be
    desirable. Use those assumptions to craft a persona about a hypothetical user.
    A persona should contain enough information for you and members of the design
    team to identify with the user at some level. Age, gender, income level, and job
    title are important details, but you should also include domestic and familial
    information to help complete the picture. Lifestyle information is also important;
    the more you can define interests, hobbies, and social activities, the better
    the persona will be. For the last piece of the puzzle, you need to include some
    information about their motivations and goals. A generalized statement about goals
    and motivation is fine, but you may want to apply those to a particular use-case.
    This sounds like a daunting task if you are trying to fabricate a user persona
    from scratch, but you can get a head start on the process if you base a persona
    on someone you already know. You may want to represent that person accurately,
    but you always have the option to embellish details and add information to make
    sure the persona is representative of the type of user you target.


    You may feel highly confident that the persona or personas that you outlined are
    an accurate snapshot of the type of user(s) that you seek. If you are not confident,
    or if you feel that you may not have enough detail in place, then you may want
    to consider validating the persona at one level or another. There are a few different
    ways to do this. If you want to keep the process more informal, you can engage
    other members of the team to confirm your assumptions or contribute additional
    details. You also have the option to validate your user personas more formally,
    in which case you’ll need to recruit and screen for individuals with the same
    basic attributes and interview them. Your line of questioning should be such that
    you can make a determination as to the accuracy of your assumptions around the
    personas. You will likely find yourself learning many additional details from
    these individuals that will be valuable to include in personas you have already
    established.


    Once you have a persona in place you can use that information to model different
    types of scenarios related to the use of your application. Mapping a persona to
    a scenario allows you to role-play and experience a hypothetical application through
    the eyes of your target audience. To do this effectively you need to think and
    behave in accordance with what you have documented about a particular user. It’s
    not as easy as it sounds, but with a good grasp of the persona you are designing
    for, you can understand the type of user experience that they would value. It
    may be important to document these scenarios in detail. Scenarios can take the
    form of a short written narrative, or you may visualize a scenario in a sequence
    of storyboards. It may also be valuable to align your scenarios with specific
    use-cases where specific features or feature sets are highlighted.


    # Evaluating Competitors


    With your user personas established and scenarios in place, it’s time to look
    outward to the market and get some insight into to what your competitors are doing.
    Evaluating your competition isn’t difficult and since you already have a vision
    for what you app is going to be, you may already have a sense of your competition’s
    strengths and weaknesses. This assumes that you know who your competition is.
    If you don’t know, then your first step is to identify your competitors. For the
    purposes of this effort this includes any app that provides similar functionality.
    With the `App Store` in place, finding competitors is simple task. Just enter
    the appropriate search criteria and review the results for relevant applications.
    Depending on the nature of the app, you might have a number of competitors available
    in the `App Store`. You do not need to account for all these. You only want to
    benchmark the best applications, and again, the `App Store` store makes this very
    easy. Filter your search results by star rating, and find apps with excellent
    reviews. You’ll ultimately want to narrow your set down to three to five applications.


    Now that you have your competition identified, you’ll want to start exploring
    these apps in detail. While doing so, document your observations and experiences.
    Even make note of how you feel as you use the various functions and execute tasks.
    Some apps may provide great features, while others support great interaction.
    No detail should go unexamined, but you may want to focus on specific issues of
    importance to your app. Document anything that you find to be appealing or of
    value. The same is true for anything that you find unappealing or poorly executed.
    Once you have a critical mass of observations in place, group and cluster related
    observations under high-level themes. These observations and themes can significantly
    inform your overall strategy, and you can refer to them as points of validation
    for or against various aspects of your app’s user experience.


    # Leading the Market


    A huge component of achieving the “Wow” is making sure that you get your app in
    users’ hands at the right time. The perception of your app’s experience can be
    affected by what’s already in the market and popular with users. Your differentiation
    approach and unique interactions that you worked so hard to create can quickly
    become irrelevant if a competitor beats you to market with a similar user experience.
    The impact of your app can also be diffused if the competition releases an app
    shortly after yours. Avoiding these situations can be tricky, but if you plan
    accordingly it can be done. An effective user experience strategy needs to address
    the positioning of an app and the desired perceptions on the part of the user—not
    for the current state of the market, but for the predicted future state. I not
    referring to the point in time that may be planned for your app’s release. I’m
    talking about trying to lead the market by a defined period of time with your
    user experience.


    Getting out in front of the market requires sophistication on the part of your
    design team, and I’ll certainly be reviewing the process by which you can get
    to a great design solution, but your strategy needs to outline the vision for
    this leadership too. No matter what the vision or goals are, you can predict if
    your design solutions will achieve your goals if you test against the right users.
    In this case, you will want to find individuals who define themselves as influencers
    to their peers. Influencers are not predisposed to follow trends, but more apt
    to establish trends. These are users who see themselves as cultural curators to
    their peer group. Testing concepts with these types of users gets you out in front
    of the adoption curve, and away from the conventional wisdom of the mass market
    that may be holding you back from creating the next great app. These people need
    to be consistent with the personas that have been defined, just screened for the
    various influencer characteristics.'
