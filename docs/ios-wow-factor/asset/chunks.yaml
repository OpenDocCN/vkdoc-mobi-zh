  trans: '

    ### 反馈与响应


    我想补充几点关于时机和响应的内容，因为它们可能适用于设计中的交互。我之前已经探讨了如何运用时间概念来解决潜在的设计问题，以及为什么动画始终是需要考虑的重要因素。但在此，我将更详细地探讨如何思考对输入的响应。


    为用户的操作提供有效反馈是任何完善设计解决方案的基础。反馈确认事件已发生，并且系统已捕捉到该事件。通常，这表现为对代表特定控件交互点的图形应用简单的状态变化。从这个意义上说，反馈服务于一个非常实用的目的，在任何交互场景中都有效。


    然而，反馈也提供了另一个设计差异化的点，如果处理得当，可以为应用增添一层情感共鸣。因此，除了交互模型的差异化方法之外，还要对模型本身嵌入的单元级交互保持敏感。我这么说的意思是，你仍然需要意识到特定交互（例如点击按钮）的细节如何影响你的整体设计方案。


    我从首次转向移动领域的设计师那里听到的最常见抱怨之一是缺少"经过"或"悬停"状态。设计师认为这是个问题，因为`over`状态带来了一些有趣的创意可能性。事实是，`over`只是一种反馈机制，在其他地方还有很多机会融入优雅且富有创意的反馈。让我们想想触摸屏场景中最基本的事件：触摸本身。大多数情况下，传统触摸事件反馈方法只是对控件外观进行简单的状态更改。我认为，缺乏超越基本外观切换的创造性思维，是先前技术的遗留问题——在那些技术中，"鼠标按下"或"鼠标点击"事件凌驾于所有其他系统活动之上，从而限制了可能发生的视觉交互。iOS
    通过将状态设为控件本身的固有属性，允许轻松实现基本反馈，从而加剧了这种惯例。


    现实世界中的触摸概念意味着反应和反馈。我们生活在一个由既定物理定律支配的世界。我们应该借鉴自己在这个世界中的经验，为界面设计中的响应性质提供依据。认识到这一点，我们可以对设备上的触摸事件应用更多东西，为用户增加真实感或趣味性。我们不仅可以改变控件的外观，还能随时间推移改变这种外观。你能将动画反应应用到你的单元级交互中吗？当然可以。我们能在执行手势操作时，为屏幕上的接触点提供实时的视觉反馈吗？当然。


    如果你计划将更强大的反馈和响应集成到设计中，请始终对时机保持敏感。时机指事件触发的速度、显示的速度以及显示效果的持续时间。这些都是非常重要的因素，因为你需要了解动画或效果如何影响任务的整体流程。如果用户必须等待一个序列结束，系统才能过渡到工作流程的下一个点，那么用户可能会感到沮丧。与其他任何事物一样，沮丧和投入之间可能只有一线之隔，所以始终准备好完善你的解决方案，以求恰到好处。


    ### 隐藏控件的提示


    总会有一些用户界面解决方案要求你主动管理屏幕上控件的呈现。我指的是高度状态驱动的用户界面，用户必须先调用控件集合，然后才能对这些控件执行操作。这类用户界面解决方案可能存在问题，因为它们向用户隐藏了控件。从可用性的角度来看，这似乎违反直觉，但在许多合理的情况下，这种做法很有用。


    让这类解决方案成功的关键在于，认识到必须为显示控件的操作提供某种提示或暗示。这可能很简单，比如在应用首次启动时让所有隐藏的控件集可见，让用户知道它们的存在，然后以某种方式将它们动画移出屏幕。你甚至可以在初始启动状态下向用户提供明确指示，描述这些功能以及将它们重新召唤到屏幕上所需的交互。这在用户需要执行特定手势（而不仅仅是轻点屏幕）的情况下尤其有用。


    当控件处于隐藏状态时，包含一个微妙的、透明的图标或其他视觉指示器来标识控件的位置可能会很有用。你还可以利用时间和状态，因此提示可能在工作流程的关键点出现，或按预设的时间间隔出现。


    一旦用户熟悉了你的应用，这些提示将不再需要，因此可以考虑在应用内或"设置"应用中提供一些用户控制来管理此功能。记得告知用户他们可以控制这一点，以免日后感到沮丧。


    ### 总结


    让我们回顾一下本章关于控件映射与触摸屏人体工程学的内容：


    -   始终考虑你所设计设备的物理属性，以及这些属性可能如何影响应用程序的使用。

    -   在应用内映射控件时，注意控件的尺寸和间距。触摸目标之间的间距应与相邻目标的尺寸成反比，以最大程度减少用户出错的可能性。

    -   将动态视觉反馈集成到应用中有许多方法。不要忽视单元级交互；该层面可以应用许多创造性的可能性。

    -   如果你的设计方案包含隐藏控件的可能性，请始终提供提示机制，以传达能显示该控件集的行为。


    ## 易用性与功能自动化


    这最后一章将讨论自动化，我认为这是过去几年用户体验设计中一个非常有趣的方面。自动化的想法引人注目，因为它主动尝试向用户隐藏与应用程序操作相关的关键细节。广泛的自动化正开始进入各种类型的消费类应用，并且它是一种新兴技术，与移动和便携式使用场景都有高度相关性。


    我将概述一些基本指导，以帮助你了解在何处以及如何将功能自动化应用于用户体验，以及在此过程中需要考虑哪些因素。

    '
- fmt: '### Why Automation?


    We are in an era that is seeing significant technological change at an extremely
    rapid pace. As reviewed in [Chapter 3](#Chapter03.html#ch3), this is causing a
    significant shift of user perceptions and user expectations, and for the most
    part we have seen users become more sophisticated as the market evolves.


    One of the emergent trends arising from this is the desire for increased user
    control in software of all types. This control can occur at a fairly granular
    level within an app, where there is greater exposure of feature detail, or at
    a higher level, where users determine what features appear within the app while
    they use it. In many cases, as the user gains in familiarity and sophistication
    with the use of an application, they naturally seek more control over the application
    and to streamline their workflow. From a user experience perspective, interaction
    designers often find themselves exposing a greater degree of user-definable parameters
    within applications to address users’ increased desire for control.


    However, this is just one end of the spectrum. At the other end of the spectrum
    is the situation where increased amounts of automation work behind the scenes
    to vastly simplify—or at least clarify—our interaction with technology. In the
    never-ending quest to make products easier to use, automation stands to be the
    apotheosis of interaction design, wherein interaction fades into the background
    as the system assumes more control. Let’s be honest, though; this isn’t a universal
    axiom quite yet.


    The increased degree of automation inherent to many iOS applications is directly
    related to the extremely high technological density of the devices themselves.
    I say “high technological density” because these devices not only contain all
    the necessary components for computation and interaction, but also multiple communications
    technologies. Add to that a vast array of additional input and sensing technologies
    and you have a device with a very high technological density. When you combine
    computation and communication with all the other data passing in and out of the
    device you can begin to do some very interesting things, the least of which is
    optimizing a workflow for a user.


    Throughout this chapter, I’ll refer to ancillary technologies in an abstract sense,
    but it’s worth outlining what those technologies are so you can consider how they
    may impact your user experience. These are as follows:


    ##### GPS Satellite Data


    - User location in both space and time

    - Macro movement, speed, and acceleration over long durations

    - Vector of movement


    ##### Three-Axis Accelerometer


    - Device orientation and rotation

    - Micro movement, speed, and acceleration relative to previous position and at
    a much more granular level than GPS


    ##### Gyroscopic Sensor


    - Device orientation


    ##### Digital Compass


    - Device orientation relative the magnetic field of the Earth

    - Vector of movement


    ##### Proximity Sensor


    - Proximity of objects to the surface of the device


    ##### Cameras


    - Image capture

    - Video capture


    ##### Microphone


    - Audio capture


    To be clear, automation provides a number of distinct benefits to the user, and
    when done in the right way it can help in getting users to cross the emotional
    threshold and experience the wow factor of your application.


    ### When It Is Applicable


    When I talk about automation in the context of an application I refer to the elimination
    of discrete steps, tasks, or decision points required of the user to perform a
    particular workflow. The removal of these elements is done with the intent of
    simplifying the overall workflow for the user. I think it’s safe to say that in
    general, a simplified workflow is an easier workflow, and “easier” is a goal toward
    which you should continually strive.


    However, a workflow that has been simplified from the user’s perspective does
    not imply that it was simple for the designer to arrive at that solution. From
    a design perspective it’s easy enough to remove a step from a workflow diagram
    and call it done, but that’s not how you go about it.


    Automation only becomes applicable when the ancillary sensing and input technologies
    allow you to make some very educated guesses about a user’s intentions with respect
    to their particular position within a given workflow. In almost all cases, resolving
    the system assumptions about user behavior is a significantly challenging technical
    task—so much so that it may not be worth doing. It’s up to you, as the interaction
    designer, to work closely with your developers and engineers to identify points
    in your workflow that may be assisted by the ancillary technologies.


    How and where this idea is applied to your application should be outlined as a
    part of your user experience strategy. Be aware that automation can be used in
    many different ways and at many different levels of a design solution. You may
    have an application whose fundamental value proposition lies in its ability to
    display weather information based on the current location of the device, with
    no user interaction required. In this situation, the idea of automation is fundamental
    to your value proposition. But you can use automated techniques at a more granular
    level too. Let’s use iOS as an example. A user can hold an iOS device in many
    different ways (see [Chapter 7](#Chapter07.html#ch7)). As the user changes the
    orientation of the device, the content viewed reorients and reformats itself automatically
    to the new orientation. It’s automatic.


    Let’s think about the alternative for a moment. Even without accelerometers or
    a compass, the reorientation task could be achieved by including an orientation
    toggle control embedded in the UI. But since we do have the ability to determine
    orientation, we can make the assumption that when a physical orientation change
    occurs, a user wishes to view their content in that new view. In this case automation
    is not a core driver of a value proposition; rather, it’s just a single feature
    that does not require interaction with a specific control.


    Apart from critical workflow enhancements, one of the key indicators for the inclusion
    of automated features is a high degree of functional detail. Again, this is very
    much a context-oriented issue, but if you are designing for a consumer-based persona
    that lacks technical sophistication, you will almost always want to reduce the
    amount of functional detail apparent in your application. For example, if you
    are designing a camera app, you might have the technical ability to expose ISO
    settings and aperture control at a very granular level. That’s great, but the
    end user targeted by this app may be unfamiliar with the operation of these settings.
    In this situation you may want to think about collapsing functionality to predetermined
    presets that may be applicable to common photography scenarios. To take this a
    step further, you may want to look for ways to automate the activation of presets
    based on environmental factors and the nature of imagery being captured by the
    camera.'
