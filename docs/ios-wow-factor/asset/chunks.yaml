  trans: '

    # 移动设备的关键用例


    有许多方法可以让你的应用在移动和便携设备上实现最佳体验，但我们首先要假设你心中已经有一些基本特性和功能设想。根据我此前提供的指南，你在考虑平台时可能已经纳入了移动特有的用例，然而，从宏观层面审视一些关键用例同样重要，以便理解你的应用如何与之关联，或可能需要与之关联。


    我确定了五个主要的用例，它们已被证明能在多种情境和场景中为用户创造价值。我不至于说它们是普适的，但我相信你能找出许多自己目前装在 iPhone 或 iPad
    上、生活中不可或缺的应用。


    我将这些定位为用例，但它们也可以被视为应用类别或功能集。采用用例的视角是合理的，因为它暗示了以用户为中心的倾向，而从为设计活动奠定成熟的用户体验策略基础的角度来看，这也说得通。正如你将看到的，类别和功能集的概念将在接下来的概述中发挥作用。


    在思考你的应用时，需要留意以下五个关键用例：


    -   沟通

    -   娱乐

    -   基于位置的服务

    -   商务

    -   实用工具


    很可能在某种程度上，这些类别几乎涵盖了所有现存的应用——无论是移动、便携还是其他类型的。但让我们逐一了解每个用例在整体移动环境中所代表的意义。


    ## 1 沟通


    我认为公平地说，沟通是入门的必备用例。显然，对于 iPhone 而言，这是设备感知价值的根本，因为通过电话进行的一对一沟通正是推动该平台诞生的原动力。然而，沟通远不止电话和移动平台相关的强大功能那么简单。你需要从最广泛的意义上思考沟通。一种方法是将沟通分解为两种基本模式。第一种模式是“一对一”沟通，第二种模式是“一对多”沟通。我将概述属于这些类别的功能类型，你就会明白为什么这是一个需要始终牢记在心的用例。


    ### 一对一沟通


    这四种模式并不完全是严格的一对一沟通，因为每种模式都带有额外的功能，使你能与不止一个人进行互动。需要重点注意的是，其核心本质是实现一对一的连接。


    -   基本通话/语音

    -   电子邮件

    -   短信

    -   即时通讯


    ### 一对多沟通


    我们假设上述列表中的项目也可以包含在这里，但列出此列表的目的是为了说明，沟通的定义可能比你目前所想的更宽泛、更深入。


    -   社交网络频道（Facebook, Google+, Twitter）

    -   媒体分享频道（YouTube, Flickr, Vimeo 等）

    -   音视频播客

    -   博客文章

    -   评论

    -   论坛


    你可以看到，当你将这个用例分解为各种模式和功能时，其价值就变得非常明显。许多最成功的应用都直接处理了这些沟通模式，将其功能直接映射到移动应用上，或者将它们功能的某些方面作为增值点整合到自己的核心功能集中。


    ## 2 娱乐


    这是一个巨大的、包罗万象的用例，可以从许多不同的角度进行诠释。作为一个类别，娱乐本身已经足够模糊，但在抽象层面上，它必须被认定为另一个绝对关键的用例。这里的主要因素是，娱乐这个维度实际上是对用户感知和态度的一种考量，它可以应用于任何用例。例如，在合适的条件下，即便是查看你的财务投资组合和当前股票报价也可以被认为是娱乐性的。


    这固然不错，但在功能建模或理解你的应用如何应对这个用例方面，它并没有提供太多依据。为了给你更具体的内容，让我们将“娱乐”分解为两个已知在推动 iOS 设备普及方面扮演重要角色的子类别。


    -   游戏

    -   内容消费


    手机游戏显然是娱乐类别中最容易识别的关键用例。游戏在移动领域的定位方式关联着许多复杂的考量，并且关于哪种游戏玩法在各种移动平台上最成功，也存在多种学派。出于本书的目的，我们不会深入探讨游戏交互的深奥层面，尽管我之前讨论过的许多想法也适用于创建
    iOS 游戏。


    除了游戏，你还必须认识到，内容消费——以其各种形式——是任何以娱乐为导向的用例中非常庞大的一部分。观看视频、听音乐、阅读书籍、浏览网页以及许多其他活动都包含在这个类别中。许多最受欢迎的
    iPhone 和 iPad 应用几乎完全专注于内容消费，每个应用都通过其增值的用户体验，让这种消费对用户来说更具娱乐性或吸引力。显然，其他人已经看到了这个用例的价值并正在从中获利。即便如此，消费者仍然对更多帮助用户以新颖有趣方式消费内容的应用有着大量的需求。


    ## 3 基于位置的服务


    基于位置的服务是移动环境中的一个关键类别，实际上也是唯一明确专属移动设备的用例。基于位置的服务是一个新兴因素，源于当今移动设备上多种不同的支持技术的组合。集成的
    GPS、数字罗盘技术和移动网络信息，在用户的位置和方向方面提供了令人难以置信的细节精度。


    App Store 中有许多应用以有趣的方式集成了基于位置的服务，其中一些非常成功，一些则不然。在很大程度上，这仍然是一个非常初期的用例，应用开发者对于这些技术的可能性只是触及了皮毛。大多数应用似乎要么专注于帮助用户广播自己的位置（与位置相关的一对一和一对多沟通），要么专注于帮助用户从
    A 点到达 B 点。关键问题是：基于位置的服务的固有价值是什么？对于你心目中的应用，应该如何思考这个用例？答案很简单：基于位置的服务及其所蕴含的所有能力，都是为了给内容和/或功能增加相关性和意义。

    '
- fmt: '### Commerce


    Commerce is another one of those critical use-cases that is just about universal
    to any platform. It’s worth mentioning because it is something that shouldn’t
    be ignored, and like some of the other use-cases I’ve reviewed, there are many
    ways to think about it. The first thing that probably comes to mind is the basic
    ecommerce model that we are intimately familiar with in the desktop/web environment.
    Browsing for products, reading reviews and adding items to a shopping cart is
    practically second nature to us all now. The challenge with straightforward commerce
    applications in the mobile context is understanding how platform-specific interactions
    need to be applied to the general workflow. Beyond that, it’s about optimizing
    critical interactions, like product browsing, for speed, efficiency, and screen
    economy.


    That’s a relatively simplistic view of what the commerce use-case could address.
    There’s much more potential with this use-case if you look beyond being able to
    support a basic transactional situation and think about commerce in a much broader
    sense. There are a number of “augmentation scenarios” that are just beginning
    to be explored. These are use-cases that seek to support or augment existing shopping
    behavior or other commerce activities, without the need for explicit transaction
    support.


    I’ve broken these down into two main categories:


    - **Curation:** Leveraging third-party sources to help navigate complex product
    choices to provide recommendations and influence purchasing behavior.

    - **Aggregation:** Automated filtering and management of content (in this case
    products) from disparate sources by a set of user-defined parameters.


    This is just the tip of the iceberg. The definition of your user experience strategy
    and details associated with the personas you are designing for will help expose
    other interesting commerce augmentation use-cases that you may want to take advantage
    of.


    ### Utility


    In [Chapter 2](#Chapter02.html#ch2), I reviewed the general utilitarian ethos
    driving the design of the overall user experience. This is also a highly relevant
    factor in the perception of value for applications installed on the device. The
    idea of utility is in stark contrast to the entertainment category that I reviewed
    previously, and in a sense, has more weighted relevance for the true mobile use
    of an iPhone, rather than the portable scenario that I outlined for the iPad.
    Going back to our understanding of how those devices are differentiated in the
    mind of the user, this makes a lot of sense. Applications that can achieve a high
    degree of function, or utility can be very successful, despite a lack of sophisticated
    graphics or dynamic interactions. If an application can help a user execute a
    task quickly and efficiently, it will definitely see a lot of use.


    The idea of utility is pretty broad, but again, in the context of mobility you
    can begin to frame your application in a way to address this use-case.


    If this is where you are targeting your application, there are two dimensions
    that your application need fulfill:


    - **Right Function:** Providing the right functional density from which a task
    may be executed.

    - **Task Efficiency:** Providing the simplest means by which a task may be executed.


    If utility is the goal, then those two points are where you need to focus first.


    ### Synthesis and Mobile Relevance


    I’ve presented each of these use-cases in isolation, but that may not be the best
    way to think about them. You may want or need to address one of these use-cases
    specifically, which is fine, but you can also think about them as a matrix of
    attributes too. This approach may make more sense if you feel that you already
    have a foundation for your application, but you want to ensure that it is relevant
    for mobile space. Review your application in terms of the value that each of these
    cases represents. It’s not necessary to address each one explicitly, you may find
    that there are aspects of one or more of these attributes that helps you focus
    your application in a way that improves its relevance for mobile. You may find
    that in the process of doing this you may be able to create additional value and
    potentially carve out new, unidentified use-cases that will help increase the
    adoption of your application.


    It’s never a bad idea to be thinking through the general utility of your application
    by applying the concepts of `Right Function` and `Task Efficiency`. Depending
    on the nature of your app, these may not necessarily be the priority, but they
    are always applicable to one degree or another.


    Location-based services should always be on the table too, whether this is the
    focus of your app or not. You need to ask yourself if there is a dimension of
    location functionality that can be applied to add value for the user while they
    are on the go.


    Communication is another use-case that deserves consideration at a high level.
    This may be as simple as integrating “click to call” functionality in the appropriate
    place in your application, and communication complexity only goes up from there.
    Integration with social media is becoming increasingly important, both from a
    user’s perspective and from a business perspective. This kind of one-to-many communication
    can be integrated in many different ways throughout an application. It’s up to
    you to determine where and how to apply those types of functions, just know that
    your process for figuring that out should be driven by an explicit user need.


    The degree to which you focus on various crossover use-cases is also somewhat
    dependent on device type. The bias of behavior types between the iPhone and iPad
    can help you understand how to best to support these use-cases in your application.'
