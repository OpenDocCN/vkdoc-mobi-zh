  trans: '

    ### 为何需要自动化？


    我们正处于一个技术变革极其迅猛的时代。正如第 3 章所回顾的，这正导致用户认知和期望发生重大转变，并且从整体来看，随着市场的发展，用户已变得愈发成熟。


    由此产生的显著趋势之一，便是用户渴望在所有类型的软件中获得更强的控制力。这种控制既可以发生在应用内相当精细的层面（例如功能细节得到更充分的展现），也可以发生在更高层面（例如用户在使用过程中自行决定应用内显示哪些功能）。在许多情况下，随着用户对应用的使用变得愈发熟悉和娴熟，他们自然会寻求对应用拥有更多控制权，并希望优化自己的工作流程。从用户体验的角度来看，交互设计师常常发现自己需要在应用中暴露更多可由用户定义的参数，以满足用户日益增长的掌控欲。


    然而，这只是问题的一个方面。另一方面，则是后台自动化运作的程度不断提高，极大地简化——或至少澄清了——我们与技术的交互。在让产品更易用的不懈追求中，自动化堪称交互设计的巅峰，它让交互退居幕后，让系统承担起更多控制责任。但坦白说，这目前还不是一条普遍适用的公理。


    许多 iOS 应用所固有的自动化程度，与设备本身极高的技术密度直接相关。我之所以说“高技术密度”，是因为这些设备不仅包含计算和交互所需的全部组件，还集成了多种通信技术。再加上大量的额外输入与传感技术，就构成了一台技术密度极高的设备。当你将计算、通信与进出设备的其他所有数据结合起来时，就能开始做一些非常有趣的事情，而其中最基本的，就是为用户优化工作流程。


    在本章中，我会从抽象层面提及辅助技术，但仍有必要概述一下这些技术是什么，以便你思考它们可能对你的用户体验产生何种影响。这些技术包括：


    ##### GPS 卫星数据


    -   用户的空间和时间位置

    -   长时间跨度下的宏观运动、速度与加速度

    -   运动矢量


    ##### 三轴加速度计


    -   设备的方向与旋转

    -   相对于先前位置的微观运动、速度与加速度，其精度远超 GPS


    ##### 陀螺仪传感器


    -   设备方向


    ##### 数字指南针


    -   相对于地球磁场的设备方向

    -   运动矢量


    ##### 距离传感器


    -   物体与设备表面的距离


    ##### 摄像头


    -   图像捕捉

    -   视频捕捉


    ##### 麦克风


    -   音频捕捉


    需要明确的是，自动化为用户提供了许多显著的好处，如果运用得当，它可以帮助用户跨越情感门槛，体验到应用令人惊艳的元素。


    ### 何时适用自动化


    当我在应用的语境中谈论自动化时，我指的是消除用户为执行特定工作流程所需执行的离散步骤、任务或决策点。消除这些元素的目的，是为了简化用户的整体工作流程。我认为可以这么说，一般而言，简化后的工作流程更容易操作，而“更容易”正是你应该持续追求的目标。


    然而，从用户角度来看已经简化的工作流程，并不意味着设计师达成这个解决方案很容易。从设计角度看，从工作流程图中移除一个步骤并宣告完成是件容易的事，但这不是正确的做法。


    只有当辅助传感和输入技术允许你对用户在特定工作流程中的特定位置处的意图做出非常合理的推测时，自动化才会变得适用。在几乎所有情况下，解析系统对用户行为的假设都是一项极具挑战性的技术任务——以至于可能根本不值得去做。作为交互设计师，你需要与你的开发人员和工程师密切合作，识别出工作流程中那些可能由辅助技术支持的点位。


    这个想法如何以及应用于应用的何处，应该作为你用户体验策略的一部分来加以规划。请注意，自动化可以在多种不同层面、以多种不同方式应用于设计方案。你可能有一款应用，其核心价值主张就在于无需用户干预，仅凭设备当前位置就能显示天气信息。这种情况下，自动化的理念是其价值主张的基础。但你也可以在更精细的层面使用自动化技术。我们以
    iOS 为例。用户可以通过多种方式持握 iOS 设备（参见第 7 章）。当用户改变设备方向时，所查看的内容会自动重新调整方向并排版，以适应新的持握方式。这就是自动化的体现。


    让我们考虑一下另一种情况。即使没有加速度计或指南针，重新定向的任务也可以通过界面中包含的方向切换控件来实现。但由于我们确实具备判断方向的能力，我们可以假设：当物理方向发生变化时，用户希望以新的视角查看内容。在这种情况下，自动化并非价值主张的核心驱动力；它只是一个无需与特定控件交互的单一特性。


    除了关键的工作流程改进之外，是否加入自动化特性的关键指标之一，是功能细节的高度复杂性。同样，这很大程度上也是一个与具体上下文相关的问题，但如果你正在为缺乏技术素养的消费者用户画像进行设计，你几乎总是希望减少应用中呈现的功能细节数量。例如，如果你正在设计一款相机应用，你或许在技术上具备暴露非常精细的
    ISO 设置和光圈控制的能力。这很好，但该应用的目标最终用户可能不熟悉这些设置的操作。在这种情况下，你可能需要考虑将功能整合成适用于常见摄影场景的预设方案。更进一步，你或许需要寻找方法，根据环境因素和相机捕捉到的图像特性，来自动激活相应的预设。

    '
- fmt: 'As always, the mobile context of iPhone usage should provide you with the
    lens to help shape your design decisions. Being on the go, multitasking, and leveraging
    impulsive behavior all suggest a very streamlined approach to your presentation
    of functionality. In addition to that, the iPhone lacks the physical real estate
    required expose a high degree of functional density. So it’s likely you would
    want to bias toward more automation whenever possible.


    The iPad’s larger form factor and associated usage patterns suggest that a different
    mentality is likely relevant, but your prerogative as an interaction designer
    should always lead you to more elegant solutions that will likely include enhancements
    enabled by the use of the ancillary sensing technologies.


    Keep in mind that network connectivity can play a significant role here as well.
    Both the iPad and the iPhone have significant computational abilities, but the
    synthesis of information arriving from the ancillary sensing technologies may
    be more than app can handle on its own. Connectivity to larger-scale systems may
    be required for complex automation to occur. Certain actions, such as complex
    image processing, may need to be offloaded to cloud-based services in order to
    provide the desired level of performance within the app.


    ## How to Approach Feature Automation


    Most of what I have reviewed so far has really only been focused on one approach
    to the automation of features. This is the situation where we seek opportunities
    to bypass user control at the appropriate point in a workflow. However, there
    is a more nuanced approach that may be just as relevant.


    To break it down, there are two basic ways to think about the automation of features
    within your application:


    - **Bypassing user control**: The outright removal of specific input required
    of the user based on key assumptions regarding user intent

    - **Augmenting user control**: The active simplification or active guidance of
    user control–based key assumptions regarding user intent


    Both methods require you to make an explicit analysis in a few key areas to fully
    understand the degree to which you can automate a feature. Start by looking into
    these details:


    - The user’s workflow position within the application

    - All possible user intent relative to the workflow or task

    - The available data as supplied by the device relative to user intent

    - The data processing required to validate intent or synthesize application results
    based on known intent


    As you can see, these activities are focused on understanding how much you can
    establish regarding the intent of the user. When intent is known, or when it’s
    feasible to deduce intent, you can apply the appropriate degree of feature automation
    to your application.


    ### Summary


    While application complexity and user sophistication are on the rise, ease of
    use is still a priority. From an interaction design perspective, it will always
    make sense to simplify and optimize an interaction, workflow, or application if
    the opportunity is there. This is especially true for mobile applications, which
    can benefit significantly from a streamlined approach to their operation.


    The abundant technologies available on iOS devices provide an unparalleled amount
    of data that can be used to help automate many aspects of an application. This
    can be technically challenging, but the challenge must be weighed against the
    potential benefit that the automation provides to the user.


    Feature automation has the potential to create a high degree of emotional impact.
    When used in conjunction with differentiated appearance, visual interaction, and
    behavior, you are almost guaranteed to achieve the wow factor that you seek.


