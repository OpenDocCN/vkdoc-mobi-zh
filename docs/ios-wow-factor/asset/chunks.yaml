- fmt: '# iOS 空间模型与用户体验分析


    沿`y`轴的运动不像`x`轴那样具有多重含义。在大多数情况下，这种类型的运动仅限于需要垂直滚动行为的场景。我特别想指出的一点是，可滚动列表的长度没有限制。这意味着几乎所有`y`轴运动都包含在一个连续的单一空间内。作为整体空间模型的一个重要方面，`y`轴与`x`轴的行为形成了鲜明对比。如前所述，`x`轴运动关乎离散屏幕或刻意划分的空间区域的呈现，你必须增量地穿越这些空间；而`y`轴则关乎一种流畅得多的体验。


    定义空间模型的一个重要部分，基于我们如何感知构成既定空间的对象、屏幕、控件及其他元素的物理性。这些元素的行为可以强化或破坏该模型。在 iOS 中，Apple
    在其设计的所有元素的行为上保持了极高的一致性。对于空间模型的定义至关重要且最具普适性的行为之一，是他们使用了我称之为“滑动”（`slide`）过渡的机制。在用户体验的语境下，过渡是向用户指示状态变化的视觉机制。我们迄今为止回顾的关于空间感知的大部分内容，要么完全依赖于关键的视觉过渡，要么至少因视觉过渡而得到了显著增强。当未采用直接操作时，过渡的使用尤其有用。


    从主屏幕浏览应用或滑动到“聚焦”（`Spotlight`）界面，是由你对屏幕的直接触摸驱动的。随着你的手指或拇指从左向右移动，下方的屏幕会实时跟随你的触摸而移动。当你探索空间并在屏幕之间移动时，你会形成对空间如何定义的直觉式理解。总会有无法应用直接操作的情况，但在这些情况下，过渡可以自动执行视觉交互，以模拟或复制可能有助于为用户建立一致感的核心行为。iOS
    在我为“设置”功能回顾的分层步骤导航中使用了这种技术。当用户有多个可用选择时，将屏幕向左或向右滑动以进入另一个层级并不适用。相反，Apple 让你选择一个选项，然后自动执行一个过渡，该过渡在直接操作屏幕时与相同的滑动视觉交互完全一致。


    到目前为止，我所回顾的一切几乎都只与 iOS 的核心用户界面相关。应用的空间模型则完全是另一回事。总的来说，运行在操作系统之上的应用在交互模型和设计执行方面不受限制。人机界面指南（`HIG`）确实建议了一些最佳实践，但这并不意味着你必须遵循这些最佳实践。这意味着应用可能会也可能不会复制或镜像操作系统核心界面本身的空间模型，并且可以肯定的是，许多应用明确地打算自行其是。既然知道有大量各种各样的应用存在，我们仍然可以观察到一些普遍的行为。最容易识别这一点的地方是我称之为应用体验的入口与出口点，因为这对所有应用来说都是共通的。从操作系统的几个不同点都可以打开应用，并且每个点都有不同的空间含义：


    *   **从主屏幕及其后续页面：** 这是用户启动应用最可能的方式，与之相关的视觉过渡描绘了应用从图标阵列后方浮现而出，并将这些对象推开。给人的错觉是，应用正在移动到图标之前占据的同一个平面上。

    *   **从聚焦（`Spotlight`）界面：** 我认为对典型的 iOS 用户来说，这可能是三种入口点中使用最少的。在这种情况下，聚焦界面首先向空间中的一个点退却，紧接着所选应用从同一个消失点向空间前方移动。

    *   **从应用切换器（`App Switcher`）：** 应用切换有其独特的行为。一旦在切换器中选定了应用，整个活动视图（包括切换器本身）会沿`z`轴旋转出视野，紧接着所需的应用旋转进入。当应用退出和进入屏幕时，所有旋转似乎共享同一个锚点。这种独特视觉行为有几层含义：首先，它支持了“切换”（即在两种状态间切换）的概念；其次，它支持了多任务的概念，因为退出的应用似乎只是旋转出视野——而不是消失得无影无踪。


    由“主屏幕”（`Home`）按钮发起的应用退出操作始终是相同的。应用会退回到它浮现而出的那个消失点。从打开的应用中没有直接路径到聚焦界面，因此该场景不适用。通过应用切换器的退出发生方式如上所述。


    这些不同交互的共同主题是什么？它们都倾向于与核心界面的平面化呈现以及在该空间中导航时所暗示的线性空间布局区分开来。从用户的角度来看，这有助于建立一种预期：从功能角度来看，他们即将进入的体验与核心界面是完全分开的……在某种意义上，意味着一切皆有可能！


    我知道这一切似乎显而易见，但分析和理解构成 iOS 用户体验的所有微妙因素，以及它为何本质上易于使用，是至关重要的。就像我所描述的那样，描绘并理解空间模型，能让你洞察用户体验的一个重要方面。


    ## 简单与显而易见


    要恰当地解构 iOS 用户体验，我需要审视并尝试解读那些驱动了体验中许多重要设计决策的哲学基础。Apple 在人机界面指南（`HIG`）中对这些理念做了出色的界定，但审视它们在哪里、如何被应用，以及在何处、如何可能被忽视，仍然是有价值的。与任何类型的指导一样，总会有值得注意的例外情况需要审视。


    通读人机界面指南（`HIG`）时，一些模式和主题会非常清晰地浮现出来。其中一个主要主题是`Simplicity`（简洁）。同样，这可能看起来显而易见，但理解不同主题如何被统一并共同服务于一个单一目标，能让你对
    iOS 有深入的了解。


    作为概念，`Simplicity`（简洁）看似直接且易于实现——定义如此。但怀着简洁的理念来设计复杂的交互系统则是另一回事。更复杂的是，对简洁的感知并不等同于简洁本身。我的意思是，有时看似简单的东西，实际上是许多复杂或精妙技术的成果，而这些技术对于与系统交互的人来说并不明显。我将尝试根据人机界面指南（`HIG`）中确定的几个关键指令，来解构
    iOS 中那种完形性质的简洁特征。


    我已经识别出这个主题的许多构成要素，但我确信还能找到更多。需要明确的是，其中许多要素并非在`HIG`中明确列出。我所做的是将`HIG`中的一些关键陈述抽象到其核心，以便你可以理解这些概念在你正在设计和/或构建的应用中的应用方式。'
  raw: 'Movement along the y axis is not weighed down with quite as many implications
    as the x axis. For the most part, this type of movement is reserved for vertical
    scrolling behavior wherever it is required. The one observation I would call out
    is that there is no limitation to the length of a scrollable list. This means
    that virtually all y axis movement is contained within a single contiguous space.
    The y axis is a significant aspect of the overall spatial model and is in stark
    contrast to the behavior of the x axis. As I stated before, x axis movement is
    all about the presentation of discrete screens or deliberate chunks of space that
    you must move through in increments, while “y” is all about a much more fluid
    experience.


    A significant part of what defines the spatial model is based on how we perceive
    the physicality of the objects, screens, controls, and other elements that populate
    the established space. The behavior of those items can either reinforce or undermine
    that model. In iOS, Apple is extremely consistent with the behavior they have
    imparted to all the various elements of the design. One of the most important
    and universal behaviors that is critical for the definition of the spatial model
    is their use of what I’m calling the “slide” transition. Transitions, within the
    context of user experience, are the visual mechanisms that denote state change
    to the user. Much of what we have reviewed so far in terms any perception of space
    has been either entirely dependent on key visual transitions or at least significantly
    enhanced by visual transitions. The use of transitions becomes especially useful
    when direct manipulation is not being employed.


    Browsing applications from the home screen or sliding over to the Spotlight UI
    is driven directly by your touch of the screen. As your finger or thumb moves
    from left to right, the screen underneath tracks directly with your touch. As
    you explore the space and move between screens you develop an intuitive level
    of understanding about how that space is defined. There will always be points
    where direct manipulation cannot be applied, but in those situations transitions
    can automate visual interaction to simulate or replicate core behaviors that may
    be beneficial to establishing a sense of consistency for the user. iOS uses this
    technique in the hierarchical step navigation that I reviewed for settings. When
    a user has more than one choice available, it’s not applicable to slide the screen
    to the left or right to get to another level. Instead, Apple lets you select an
    option, then automates a transition that is identical to the same sliding visual
    interaction when directly manipulating the screen.


    Everything that I have reviewed so far pertains almost exclusively to the core
    UI of iOS. The spatial model for applications is another story altogether. Generally
    speaking, applications that run on top of the OS are unrestricted in terms of
    interaction model and design execution. The HIG certainly suggests some best practices,
    but that doesn’t mean that you are required to follow those best practices. This
    means that applications may or may not replicate or mirror the spatial model inherent
    to the core UI of the OS, and to be sure, many applications have set out explicitly
    to do their own thing. Knowing that there is huge variety of apps out there, there
    are still some generalized behaviors that we can observe. The easiest place to
    identify this is on what I call the entry and exit points of the application experience,
    since this is common to all applications. Opening an app can happen from a few
    different points in the OS, and for each point there are different spatial implications:


    *   **From the home screen and its subsequent pages:** By far the most likely
    point from which a user may launch an application, the visual transition associated
    with this event portrays an app emerging from behind the icon array and pushing
    those objects away. The illusion is that the app is moving into the same plane
    that the icons had previously populated.

    *   **From the Spotlight interface:** I expect that this is likely the least used
    entry point of the three for the typical iOS user. In this case the Spotlight
    interface recedes to a point in space first, quickly followed by the selected
    app moving forward in space from the same vanishing point.

    *   **From the App Switcher:** App switching has its own unique behavior. Once
    an app is selected in the switcher, the entire active view (including the switcher)
    rotates out of view on the z axis, quickly followed by the desired app. All rotation
    appears to share the same anchor point when apps exit and enter the screen. There
    are few connotations of this unique visual behavior: first, it supports the idea
    of switching (as in toggling between two states), and second, the idea of multitasking,
    since the exiting app seems to be rotating just out of view—and not vanishing
    into oblivion.


    The app exit action, as initiated by the Home button, is always the same. An app
    recedes back to the vanishing point from which it emerged. There isn’t a direct
    path to Spotlight from an open app, so that scenario does not apply. Exit via
    app switching happens as I described it above.


    What’s the common theme through each of these different interactions? They all
    tend to stand apart from the planar presentation of the core UI and linear arrangement
    of space that is suggested when navigating that space. From a user’s perspective,
    this helps establish the expectation that what they are about to embark on, from
    a functional perspective, is an entirely separate experience from the core UI…and
    in a sense that all bets are off!


    I know that all of this seems obvious, but it’s important to analyze and understand
    all of the subtle factors comprising the iOS user experience and why it is fundamentally
    intuitive to use. Mapping out and understanding the spatial model, at least how
    I have described it, gives you insight into a significant aspect of the user experience.


    ### The Easy and the Obvious


    A proper deconstruction of the iOS user experience requires me to examine and
    attempt to translate the philosophical underpinnings that have driven many of
    the important design decisions throughout the experience. Apple has done a great
    job of defining many of these ideas within the HIG, but it’s worth taking a look
    at where and how they’ve been applied, and where and how they may have been ignored.
    As with any kind of guidance, there are always going to be notable exceptions
    that need to be reviewed.


    When reading through the HIG, some patterns and themes come through loud and clear.
    One of the major themes is simplicity. Again, this may seem obvious, but understanding
    how various topics are unified and work together toward single goal tells you
    a lot about iOS.


    Simplicity, as concept, appears to be straightforward and easily achievable—by
    definition. But the reality of designing complex interactive systems with simplicity
    in mind is another thing altogether. To compound this, the perception of simplicity
    does not equate to simplicity itself. What I mean is that what sometimes appears
    to be simple is really the result of many complex or sophisticated techniques
    that aren’t readily apparent to the person interacting with the system. I’ll try
    to deconstruct that gestalt quality of simplicity in iOS in terms of a few key
    directives identified within the HIG.


    I’ve identified many constituent topics of this theme, but I’m certain that more
    could be found as well. To be clear, many of these aren’t explicitly outlined
    in the HIG. What I’ve done is abstracted some key statements made in the HIG to
    their core so that you can understand the application of these concepts in terms
    of the application you are designing and/or building.'
