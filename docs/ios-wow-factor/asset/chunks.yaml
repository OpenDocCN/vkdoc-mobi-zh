  trans: '

    ### 摘要


    在本章中，我探讨了许多旨在解构 iOS 用户体验微妙之处的主题。从概述中，你可以看到有多少不同的概念和技术被协同运用，以真正吸引用户，并主动管理他们的感知。


    iOS 倾向于更实用的方法，这似乎是过去智能手机时代遗产的理性演变，但这可能正日益局限于 iPhone 等小型设备领域。随着 iPad 和其他中等尺寸设备逐渐成熟，围绕实用性和效率的传统考量将变得不再那么重要。


    直接操作的理念是所有触控交互的基础。用户面对的模型是：与某个对象交互的结果与他们的输入或动作密切相关，以至于在虚拟与现实之间感觉不到任何障碍。


    手势将触控界面的能力扩展到超越直接操作所涵盖的基础交互。


    `Home` 按钮是唯一能直接控制 iOS 核心 UI 的硬件输入。认识到其操作的局限性，以及这如何融入 iOS 整体的交互模型，这一点很重要。它在支持导航和方向感方面扮演着主要角色，并且随着操作系统的演进，这一核心功能始终是其关注的焦点。


    iOS 为用户提供了一个易于理解的空间模型，这是促成其易用性感知的重要因素。该空间模型通过一致地使用视觉交互和自然过渡来建立，使用户能够以可预测的方式进行导航。


    “保持简洁”的哲学理念驱动了许多设计决策，使 iOS 易于使用和理解。在 HIG（人机交互指南）中，你可以在多个乍看之下似乎不相关的地方识别出这种理念。然而，所有这些要点都协同作用，共同帮助管理功能复杂性和交互复杂性。


    ## 用户体验差异化与策略


    本书的前两章几乎完全致力于在细节层面理解 iOS 的本质。了解特定交互背后的基本原理，与理解其工作机制同样重要。对 HIG 的回顾以及对 iOS 工作机制的解构，为你提供了一个坚实的、基础性的理解，让你明白苹果希望为其用户提供何种类型的体验。HIG
    的存在本身告诉我们，苹果高度重视提升 iOS 应用程序的执行水准，其意图是让第三方开发者能够满足苹果用户的高期望。


    我们知道苹果希望你做什么，我们也知道他们为什么希望你这样做。但是，是否存在偏离 HIG 才是合理的情况？你如何知道你的设计方案可以走多远？本书的目的之一，就是为你提供工具和指导，帮助你做出这些决策，从而在众多应用中脱颖而出，并赢得对你的应用成功至关重要的“惊叹”反应。


    为了与众不同而与众不同，可能足以让你起步，并可能带你走上创造一款令人惊叹的应用之路。然而，这对所有人来说可能都不足以开始，当然，如果你最终需要向首席财务官或投资者负责，这肯定也不足以证明你的设计决策是合理的。一个简单的思维实验将开始帮助你论证你的观点。假设你有兴趣为
    iPad 或 iPhone 创建一个新应用。你会对自己说，“嘿，我有一


    个关于应用的好主意！而且它将和竞争对手的产品一模一样！”吗？当然不会。从这个角度来看，你可以发现，与众不同应该是你商业模式、营销计划和用户体验策略中的一个关键方面。


    ### 感知与期望的转变


    除了潜在的商业模式、营销计划和其他“上市”策略之外，认识到你即将进入一个高度竞争的环境非常重要，在这个环境中，仅仅是被注意到就已经是一项重大成就。即使你的应用被注意到，当有更好玩的新应用出现时，用户也会迅速而愉快地转移注意力。这种情况因用户对与技术交互的普遍期望的演变而加剧。


    在过去几年里，我们看到极具颠覆性的新型交互行为被迅速采用。我们往往对此习以为常，因为这些行为已迅速成为主流。iPhone 和 iPad 就是很好的例子。在这些设备上市之前，电容式触摸屏界面技术并不是普通大众所理解或渴望的。在没有需求的情况下，除了少数实验性案例或执行不佳的商业产品之外，实际上并没有什么动力将这项技术整合到产品中。随后
    iPhone 上市，展示了该技术与简单直观交互相结合所产生的力量。这些多点触控交互的最初影响在消费者的意识中引起了巨大反响。如今，4 年多过去了，我们正处于这样的局面：这项技术及其相关的交互方式已被视为惯例。


    另一个经典例子是任天堂 Wii 及其相关游戏手柄，通常被称为 `WiiMote`。将加速度计与其他传感技术集成到控制机制中，使任天堂能够创造出一种全新的游戏类型。尽管
    `WiiMote` 启用的交互与之前的任何产品都截然不同，但人们仍蜂拥至商店购买这种新主机，并且它很快就超过了市场上的所有其他产品。索尼和微软等竞争对手被迫迅速开发类似技术，以应对消费者对主机游戏期望的转变。


    这些例子展示了大众市场对人们如何与技术互动的期望发生了重大转变——这一切都是由加速度计和电容式触摸屏等各种使能技术的出现所驱动的。其中一些技术本身就对交互的设计和规范有着重大影响，但也存在一些场景，更普通的技术被结合起来，综合出新的体验类型。我所描述的转变是一种围绕对“不同”的期望和接受而形成的文化临界质量。消费者期望产品具有某种他们从未见过的、新的、引人注目的交互方式，在许多情况下，这一因素正在推动购买决策。


    数字产品（消费电子产品、软件等）市场正经历着*体验*——我们设计和创造的东西，与*体验者*——我们正在设计的产品用户或消费者——之间快速的共同进化。这本质上是一个反馈循环。随着更具吸引力或独特性的交互方式（与各种产品发布相关联）被引入市场，我们看到对越来越独特和引人注目的交互的需求和接受度也在增长。我预计在某个时候我们会开始看到这种趋势趋于平稳，但由于当代社会是一个由消费者驱动的文化，我们可以预期这种反馈循环将持续一段时间。底线是，新的交互行为和技巧是众望所归，而这些因素对于实现任何程度的市场差异化都至关重要。

    '
- fmt: '### Usability and Adoption


    The environment I just described presents another shift in how to view the creation
    of interaction design solutions. Classically, the success of any given interaction
    design solution has been measured by its usability. This was a very sensible approach
    during the era where we saw the initial introduction of digital technologies to
    mass-market consumers. Transitioning consumers from well-established and culturally
    entrenched analog behavior in the real world, to its counterpart in a highly abstract
    computational environment, was a huge challenge. Looking back to the 20-year span
    from the early 1980s to the early 2000s, the amount of technological change in
    the consumer space has been phenomenal. Technological progress in that period
    was mirrored by the increasing quality of user experience, which at that point
    was almost always expressed in terms of usability.


    `Usability` at that time was an engineering mindset, and the usability of a system
    was established by quantitative means through a number of different product design
    and development techniques. This was all well and good, but as the market for
    digital products began to explode at the turn of the century, it became necessary
    to explore other means by which one could compete in the market. This led to the
    emergence of the more comprehensive `user experience` mindset and its gestalt
    approach to product design. That mindset included usability, but also encompassed
    aesthetics, perception, and emotional engagement on the part of the user.


    #### An Argument For Desire


    Now that the user experience mindset is well-established, the emphasis on usability
    has changed somewhat. It hasn''t gone away at all, nor should it, but it really
    needs to be approached as a basic consideration. You must assume that all of your
    competitors will come to market with a fundamentally usable product, so you need
    to make a determination about the other factors of user experience that will make
    your product more desirable. This begins to touch on the main points for this
    chapter; that the benchmark for success is really more about the adoption of a
    design solution (in this case an application). Usability plays a significant role
    in driving adoption, but desire in many respects is much more important. Effectively
    solving for desire means being cognizant of all the factors I have described so
    far:


    *   Understanding the evolving state of users, including their expectations and
    perceptions of contemporary interaction

    *   Understanding how the user experience of your product can be different from
    that provided by your competitors

    *   Understanding that you may need to focus on engendering desire if adoption
    is your priority

    *   Engendering desire, given the environment we design for today, may require
    the exploration of unorthodox solutions


    ### User Experience Strategy


    Understanding the context for your user experience decisions is very important,
    but it''s really only a starting point on your way to a more comprehensive strategy.
    A good user experience strategy is all about establishing a clear vision and plan
    for your organization. Providing an understanding or definition for an approach
    to user experience is more important than addressing specific design details at
    this point. A good strategy should provide a substantial framework that will help
    guide your decisions as you progress through the design process. It''s not so
    much about the *what*, as it is about the *how*. Knowing that technologies, user
    needs, and user desires will be in a constant state of flux, it''s important to
    have a clear plan about how that state of flux be resolved. Tactical details are
    an aspect of execution as it has been defined in your strategy.


    Putting an effective strategy in place has a number of benefits:


    *   It will provide an excellent point of unification for the diverse teams involved
    in the development of the product.

    *   It will ensure customer satisfaction by helping teams maintain intense focus
    on the user.

    *   It provides a consistent experience through the lifecycle of your product,
    maintaining established user expectations or helping evolve those expectations
    when necessary.

    *   It will almost certainly improve the quality of your product and help mitigate
    any deployment risks.


    These are all particularly important points when trying to achieve a high degree
    of impact or `Wow` with a unique design solution for your app. High-impact user
    experiences are very likely to present a number of engineering and design challenges
    that will have to be managed in a highly coordinated way. Having a shared vision
    around the solution is critical, and a well-crafted strategy should provide this.
    Your strategy becomes even more important if a product portfolio expands and needs
    to evolve over time.'
  raw: '### Usability and Adoption


    The environment I just described presents another shift in how to view the creation
    of interaction design solutions. Classically, the success of any given interaction
    design solution has been measured by its usability. This was a very sensible approach
    during the era where we saw the initial introduction of digital technologies to
    mass-market consumers. Transitioning consumers from well-established and culturally
    entrenched analog behavior in the real world, to its counterpart in a highly abstract
    computational environment, was a huge challenge. Looking back to the 20-year span
    from the early 1980s to the early 2000s, the amount of technological change in
    the consumer space has been phenomenal. Technological progress in that period
    was mirrored by the increasing quality of user experience, which at that point
    was almost always expressed in terms of usability.


    “Usability” at that time was an engineering mindset, and the usability of a system
    was established by quantitative means through a number of different product design
    and development techniques. This was all well and good, but as the market for
    digital products began to explode at the turn of the century, it became necessary
    to explore other means by which one could compete in the market. This led to the
    emergence of the more comprehensive “user experience” mindset and its gestalt
    approach to product design. That mindset included usability, but also encompassed
    aesthetics, perception, and emotional engagement on the part of the user.


    ###### An Argument For Desire


    Now that the user experience mindset is well-established, the emphasis on usability
    has changed somewhat. It hasn’t gone away at all, nor should it, but it really
    needs to be approached as a basic consideration. You must assume that all of your
    competitors will come to market with a fundamentally usable product, so you need
    to make a determination about the other factors of user experience that will make
    your product more desirable. This begins to touch on the main points for this
    chapter; that the benchmark for success is really more about the adoption of a
    design solution (in this case an application). Usability plays a significant role
    in driving adoption, but desire in many respects is much more important. Effectively
    solving for desire means being cognizant of all the factors I have described so
    far:


    *   Understanding the evolving state of users, including their expectations and
    perceptions of contemporary interaction

    *   Understanding how the user experience of your product can be different from
    that provided by your competitors

    *   Understanding that you may need to focus on engendering desire if adoption
    is your priority

    *   Engendering desire, given the environment we design for today, may require
    the exploration of unorthodox solutions


    ### User Experience Strategy


    Understanding the context for your user experience decisions is very important,
    but it’s really only a starting point on your way to a more comprehensive strategy.
    A good user experience strategy is all about establishing a clear vision and plan
    for your organization. Providing an understanding or definition for an approach
    to user experience is more important than addressing specific design details at
    this point. A good strategy should provide a substantial framework that will help
    guide your decisions as you progress through the design process. It’s not so much
    about the *what*, as it is about the *how*. Knowing that technologies, user needs,
    and user desires will be in a constant state of flux, it’s important to have a
    clear plan about how that state of flux be resolved. Tactical details are an aspect
    of execution as it has been defined in your strategy.


    Putting an effective strategy in place has a number of benefits:


    *   It will provide an excellent point of unification for the diverse teams involved
    in the development of the product.

    *   It will ensure customer satisfaction by helping teams maintain intense focus
    on the user.

    *   It provides a consistent experience through the lifecycle of your product,
    maintaining established user expectations or helping evolve those expectations
    when necessary.

    *   It will almost certainly improve the quality of your product and help mitigate
    any deployment risks.


    These are all particularly important points when trying to achieve a high degree
    of impact or “Wow” with a unique design solution for your app. High-impact user
    experiences are very likely to present a number of engineering and design challenges
    that will have to be managed in a highly coordinated way. Having a shared vision
    around the solution is critical, and a well-crafted strategy should provide this.
    Your strategy becomes even more important if a product portfolio expands and needs
    to evolve over time.'
  trans: '

    ### 可用性与采纳度


    我刚刚描述的环境，呈现了我们在看待交互设计解决方案创建方式上的又一次转变。传统上，任何交互设计解决方案的成功与否，都是以它的**可用性**来衡量的。在数字技术最初面向大众消费市场推出的时代，这是一种非常明智的做法。将消费者从现实世界中根深蒂固的传统模拟行为，过渡到高度抽象的计算环境中的对应行为，是一个巨大的挑战。回顾从
    20 世纪 80 年代初到 21 世纪初的这 20 年，消费领域的技术变革可谓空前绝后。这一时期的技术进步，伴随着用户体验质量的不断提升，而当时的用户体验几乎总是用可用性来衡量。


    `可用性`在当时的是一种工程思维，系统的可用性是通过一系列不同的产品设计与开发技术，用定量方法建立的。这本身无可厚非，但随着世纪之交数字产品市场的爆发式增长，探索其他市场竞争手段变得必要。这便催生了更全面的`用户体验`思维及其在产品设计上的整体论方法。这种思维包含了可用性，但也涵盖了美学、感知以及用户的情感投入。


    #### 渴望之辩


    如今，用户体验思维已深入人心，对可用性的强调发生了些许变化。可用性并未消失，也不应该消失，但它确实需要被视作一项基本考量。你必须假设你的所有竞争对手都能推出具有基本可用性的产品，因此你需要判断用户体验中哪些其他因素能让你的产品更具吸引力。这便开始触及本章的要点：成功的基准实际上更多在于设计解决方案（在此处指应用程序）的**采纳度**。可用性在推动采纳方面起着重要作用，但在很多方面，**渴望**更为关键。有效解决渴望问题意味着要认识到我目前描述的所有因素：


    *   理解用户状态的演变，包括他们对当代交互的期望和感知

    *   理解你的产品用户体验如何能与竞争对手提供的有所不同

    *   理解如果你的首要目标是提高采纳度，你可能需要专注于激发渴望

    *   鉴于我们今天所设计的应用环境，激发渴望可能需要探索非传统的解决方案


    ### 用户体验策略


    理解你做出用户体验决策的上下文非常重要，但这仅仅是你走向更全面策略的起点。一个好的用户体验策略，核心在于为你的组织确立清晰的愿景和计划。在现阶段，为处理用户体验的方法提供一种理解或定义，比解决具体的设计细节更为重要。一个好的策略应提供一个坚实的框架，指导你在设计过程中的决策。它关注的更多是“*如何做*”，而不是“*做什么*”。认识到技术、用户需求和用户渴望将处于持续变化的状态，对于如何应对这种变化有一个清晰的计划至关重要。战术细节是执行层面的一部分，正如你在策略中所定义的那样。


    制定有效的策略有诸多益处：


    *   为参与产品开发的多元团队提供一个绝佳的统一基点。

    *   帮助团队保持对用户的强烈关注，从而确保客户满意度。

    *   在产品的整个生命周期中提供一致的体验，维持已建立的用户期望，或在必要时帮助引导这些期望的演变。

    *   几乎可以肯定能提升产品质量，并有助于降低任何部署风险。


    当你试图为你的应用打造一个具有高度影响力或“`Wow`”效果的独特设计解决方案时，这些要点都尤为重要。高影响力的用户体验很可能会带来一系列工程和设计上的挑战，这些挑战需要高度协调地加以管理。围绕解决方案拥有共同的愿景至关重要，而精心制定的策略应能提供这一点。如果一个产品组合需要不断扩展和演进，你的策略就会变得更加重要。

