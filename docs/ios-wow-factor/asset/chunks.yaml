    # 用户界面简洁性的设计原则


    ## 核心原则


    **有限导航：** 为用户提供冗余的导航方式或增强的非线性导航，充其量是不必要的，最坏的情况则可能造成困惑或分散注意力。与设备交互的简便性使你能够专注于创建一条贯穿内容或功能的清晰路径。


    **约束控制映射：** 识别并隔离应用程序中的有限区域以容纳用户界面元素，是更有效的方法。控件本身（按钮等）应被视为次要元素，尤其是在应用程序内容需要最突出显示的情况下。


    **约束控制数量：** 限制或减少在任何特定时间点呈现给用户的控件数量。为了管理复杂的应用程序，应将功能分散到不同屏幕，并尝试将类似的任务组合在一起。


    **控制清晰度：** 尽可能限制独特控件类型的数量，以避免让用户感到困惑。这不仅适用于控件类型，也适用于控件渲染。控件功能应能通过简短标签和/或易于理解的图标来识别。


    **操作系统功能分担：** 在某些情况下，功能可以从应用程序中移除，并在操作系统层面进行管理。应用程序设置可以迁移到 iOS 设置屏幕，这有助于降低潜在的
    UI 复杂性。


    **用户界面隐藏：** 控制元素不必无处不在。一个简单的手势或触摸事件，便可在需要时在界面中调用一组控件。关键在于为用户提供一个机制，让他们了解这些控件的临时性以及如何在它们离开屏幕后重新调用。


    **渐进式展示：** 力求仅在应用程序流程中需要的地方和时间为用户提供功能。很可能并非每个功能都需要全局可用，利用这一点可以降低你屏幕的复杂性。


    **品牌与身份弱化：** 没有必要反复用你的品牌来轰炸用户。识别出你应用程序中需要突出品牌和身份声明的最关键环节，在其他地方则将其调低到可接受的程度。


    **状态持久化与恢复：** 期望用户频繁地使用你的应用程序，但要认识到这种使用是碎片化的。移动用户经常同时处理多项任务，在完成一个任务的工作流程中，可能会多次打开和关闭你的应用程序。因此，你需要确保当你应用程序的状态得以保留，并且当应用重新启动时，任务可以轻松地从中断处继续。


    **隐式保存：** 与状态持久化问题类似，任何内容创建任务都必须得到保留，并且“已保存”的概念应当对任何工作流程而言是隐式的。


    **手势克制：** 限制与你的应用程序交互所需的基本手势数量。理解手势用法或必须学习新的手势，可能会成为用户采用你应用程序的重大障碍。


    **层级克制：** 克制层级深度实际上是成功实现有限导航的一个方面。高度的层级结构会使设计一条简单易懂的应用程序路径变得困难。这并不意味着不可能，只是意味着你将面临管理用户方向感的挑战，或者需要努力消除在层级中浏览的乏味感。


    **应用单任务性：** 用户实际上一次只能查看并与一个应用程序交互。应用切换器表明可能有多个应用在同时运行，但即便如此，用户也需要在应用间切换才能进行任何操作。目前还没有真正意义上的同时查看多个应用，但随着像
    iPod touch 这样大尺寸设备的出现，未来这可能会成为可能。


    ## 张力与矛盾


    所有这些话题都指向了“简洁性”这一主题或指导方针，并且在此过程中相互交叉或显著互补。然而，也有各种话题似乎与这一方向相矛盾。这些想法散见于《人机界面指南》（HIG）中，并对你如何思考你的应用程序有着有趣的启示。


    我想提出的前几个问题与本节所讨论的话题相关。我首先要指出的是，虽然 UI 隐藏的概念可以用来管理屏幕复杂性，但它可能潜在地将更大的认知负担转移到用户身上。当
    UI 元素不在屏幕上时，用户需要理解它们去了哪里、如何到达那里，以及需要做什么才能让它们回来。如果以简单直接的方式管理，这不一定是问题，但如果这需要任何复杂的交互，就可能导致用户面临重大困难。


    我还想指出，在你无法限制屏幕上控件数量（密度）的情况下，通用的控件标签可能会成为问题。标签需要空间，有时确实没有足够的空间来放置一个清晰可读的标签。并且在某些情况下，即使有空间放置标签，标签的存在本身也可能增加屏幕上元素的感知复杂度。


    《人机界面指南》中另一个有趣的观点是，强调应用程序应具有高信息密度和高功能密度。这似乎与我之前回顾的几乎所有话题都背道而驰。《人机界面指南》指出，应用作者应该


    > *“……力求为用户所提供的每一条信息，都尽可能多地呈现信息或功能。这样，用户在浏览你的应用程序时，会感觉到自己在不断取得进展，而不会受到延误。”*


    从表面上看，这似乎是矛盾的，但我认为苹果是想强调，你应该为用户提供高度的交互效率，以避免他们产生挫败感。

    '
- fmt: '### Summary


    In this chapter I covered a number of topics intended to deconstruct many of the
    subtleties of the iOS user experience. From the overview you can see how many
    discrete ideas and techniques are utilized in concert to really engage the user
    in a way that actively manages their perceptions.


    The iOS bias toward a more utilitarian approach appears to be a rational evolution
    from the smartphone legacy of days gone by, but this may increasingly be limited
    to the domain of smaller-scale devices like the iPhone. As the iPad and other
    medium-format devices come into their own, legacy concerns around utility and
    efficiency will become less relevant.


    The idea of direct manipulation is the foundation for all touch interactions.
    Users are presented with a model where the result of interaction with an object
    is so closely associated with their input or action that no barrier is perceived
    between the virtual and the real.


    Gestures evolve the capabilities of touch interfaces beyond the baseline interactions
    accounted for with direct manipulation.


    The `Home` button is the only hardware input to directly control the core UI of
    iOS. It’s important to recognize the limits of its operation and how that folds
    into the interaction model of iOS as a whole. The role it plays in supporting
    navigation and orientation as its primary function has remained its focus as the
    OS evolves.


    iOS presents the user with an easily understood spatial model, and this is a significant
    factor contributing to the perception of ease of use. The spatial model is established
    by the consistent use of visual interactions and passive transitions that allow
    users to navigate in a predictable manner.


    A philosophical imperative to keep things simple drives many of the design decisions
    that have made iOS easy to use and understand. This philosophy can be identified
    at various points in the HIG that at first glance may seem to be unrelated. However,
    all of these points work in concert to help manage functional complexity and interaction
    complexity.


    ## User Experience Differentiation and Strategy


    The first two chapters of this book were dedicated almost entirely to understanding
    the nature of iOS at a detailed level. Knowing the rationale for a particular
    interaction is just as important as understanding its mechanics. The review of
    the HIG and the deconstruction of the mechanics of iOS give you a solid, baseline
    understanding of the type of experience that Apple wants to deliver to their users.
    The mere existence of the HIG tells us that Apple places a high priority on raising
    the level of execution for iOS applications, with the intention that third-party
    developers will meet the high expectations of Apple’s users.


    We know what Apple wants you to do and we know why they want it that way. But
    are there situations where it makes sense to diverge from the HIG? How do you
    know how far to push your design solution? One of the purposes of this book is
    to provide you with the tools and guidance to help make those decisions, stand
    out in a crowd, and get that “WOW” reaction critical to the success of your application.


    Being different for the sake of being different may be enough to get you started,
    and it may take you down a path to creating an amazing app. However, that may
    not be enough for everyone to get started and certainly it may not be enough to
    justify your design decisions if you ultimately answer to a chief financial officer
    or to investors. A simple thought experiment will begin to help you make your
    case. Let’s assume that you are interested in creating a new application for an
    iPad or iPhone. Do you say to yourself, “Hey, I’ve got a great idea for an app!
    And it’s going to be just like the competition!”? Of course not. When you look
    at it that way you can see that being different should be a critical aspect of
    your business model, marketing plan, and user experience strategy.


    ### Shifting Perceptions and Expectations


    Outside of potential business models, marketing plans, and other “go to market”
    strategies, it is important to recognize that you are about to enter a highly
    competitive environment where just getting noticed is a significant achievement.
    Even when your app is noticed, users quickly and happily move on to the next great
    thing when it becomes available. This situation has been exacerbated by the evolution
    of user expectations around their interaction with technology in general.


    Over the past few years we’ve seen the rapid adoption of radically new interaction
    behaviors. We tend to take this for granted because these behaviors have quickly
    become mainstream. The iPhone and iPad are excellent examples of this. Before
    those devices came to market, capacitive touchscreen interface technology was
    not something that the general public understood or desired. Without any demand,
    there really wasn’t any push to integrate that technology into products beyond
    a few experimental instances or poorly executed commercial products. Then the
    iPhone came to market and demonstrated the power of that technology when combined
    with simple and straightforward interaction. The initial impact of those multitouch
    interactions generated quite a splash in the consciousness of the consumer. Now,
    over 4 years later we are in a situation were that technology and its associated
    interactions are considered de rigueur.


    Another classic example is the Nintendo Wii and its associated game controller,
    often called the `WiiMote`. The integration of accelerometers into the control
    mechanism combined with other sensing technologies enabled Nintendo to create
    an entirely new category of gameplay. Even though the interactions enabled by
    the `WiiMote` were radically different from anything that had preceded it, people
    flocked to stores to buy the new console and it soon outsold everything else on
    the market. Competitors like Sony and Microsoft were forced to quickly develop
    similar technologies to address the shift in consumer expectations around console
    gameplay.


    These examples demonstrate a significant shift in mass-market expectations about
    how people can interact with technology—all of which is being driven by the emergence
    of various types of enabling technologies such as accelerometers and capacitive
    touch screens. Some of these technologies have significant implications for the
    design and specification of interaction on their own, but there are also scenarios
    where more mundane technologies have been combined to synthesize new types of
    experiences as well. The shift that I describe is a kind of cultural critical
    mass emerging around the expectation and acceptance of the “different.” The consumer
    expects that products will have some new kind of new, compelling interaction that
    they’ve never seen before, and in many cases this factor is helping drive purchasing
    decisions.


    The market for digital products (consumer electronics, software, etc.) is seeing
    a rapid co-evolution of *experience*—that which we design and create, and *those
    who experience*—the users or consumers of the products we are designing. This
    is essentially a feedback loop. As more compelling or unique interactions are
    introduced to the market (as associated with various product releases), we see
    greater demand and increased acceptance for increasingly unique and compelling
    interaction. I would expect that at some point we would begin to see this trend
    level off, but since contemporary society is a consumer-driven culture we can
    expect this feedback loop to continue for some time. The bottom line is that new
    interaction behaviors and techniques are expected, and these factors are critical
    to achieving any level of market differentiation.'
