  trans: '

    现在我们有了一个交互示例，它展示了模型中更高程度的动态性。用户只需一个简单手势，就能展开网格中的元素，从而获得更大的信息查看区域（参见图 6-10）。这不仅使文本对象完全可读，还腾出了更多空间，我们可以用额外的增值信息来填充它。


    曾经这只是一个围绕基本列表的想法，如今却可能成为一种极具魅力的用户体验。在我看来，模型的这一方面似乎增添了一些实用价值——或许远不止是展示一段文本字符串那么简单。但我们为什么要利用这一点，以及如何利用呢？


    在进行此类流程时，需要注意的主要事项之一是，你绝不能孤立地思考这些想法。交互模型是完整系统的模型，是定义应用程序运作方式的系统。如果你认为自己拥有一个足够强大的交互概念来驱动应用程序，那么你就需要考虑如何将该概念映射到用户体验的其他方面。这就是我在本章前面讨论可扩展性和可伸缩性问题时提到过的。如果你有一个引人入胜的交互，但它不适用于应用程序的其他方面，那也没关系。你可能心中有一个更大的交互模型，能够囊括这个概念，并为用户提供一个清晰连贯的模型。然而，一个拥有许多独特交互的应用程序——每个交互都特殊且彼此不同——只会让用户感到困惑和沮丧。实际上，这种方法恰恰与你最初的目标背道而驰。到那时，你拥有的将不是一个交互模型，而只是一堆古怪交互的集合。


    要避免这种情况，你需要不断思考你的交互在应用程序大部分区域中的适用性。这是一种系统层面的思维，对你的应用程序大有裨益。要理解特定交互在多种情境下的适用性，关键在于将你的思维提升到抽象层面。你需要看待你的交互，不是因为它提供的即时解决方案，而是因为它所展示的基本行为以及这可能带来的可能性。将你的交互视为一个基本的行为模板或模式，可以在多个地方以多种方式使用。


    你在构建应用程序时使用的独特行为实例和交互越少，你的交互模型就越健壮。在设计应用程序时，少即是多。你的目标始终应该是通过利用用户已在应用程序中接触过的交互模式的知识和经验，来降低用户的整体认知负荷。


    然而，你也不应该强迫自己在不合理的地方使用某种行为或模式。将你已有的交互映射到用户体验的方方面面是很有诱惑力的，但当你发现自己花费过多时间试图解决某个特定问题的设计方案时，你就会知道这种方法行不通了。如果解决方案对你来说都不显而易见，那么它对用户来说很可能也不显而易见。


    你可能已经注意到，我交替使用了 `interaction`、`behavior` 和 `pattern` 这些概念。我认为这些术语之间有着独特的关系，这一点或许应该澄清一下。


    *   **交互：** 我将它视为交互性的基本单位，例如点击按钮或划过屏幕。它本质上是用户根据系统提示所采取的输入操作。

    *   **行为：** 这是由用户输入和系统反馈所引发的第二层级复杂性。它是系统所展示出的、可被感知的交互完形效应（gestalt effect）。

    *   **模式：** 我将其定义为复合行为以可预测且组织良好的方式运作所产生的累积效应。


    你的交互模型可能致力于在以上任何一个层级建立一致性。这可以通过全面利用大规模模式来实现，也可以采用更细粒度的方法，确保与构成应用程序的对象在交互层面的一致性。你在交互建模方面的努力将决定适合你特定情况的方法。'
- fmt: '#### Crafting Signature Interaction


    The idea of actively seeking to differentiate from potential competitors leads
    naturally to the discussion of “signature interaction.” A signature interaction
    is an interaction that is uniquely and deliberately identifiable with your application,
    your brand, or your organization. Moving to create a signature interaction is
    a strategic decision that needs to be determined as a part of your overall user
    experience strategy. Essentially, everything covered thus far regarding the methods
    applied to interaction modeling can also be used to define a signature interaction.


    Getting to a signature interaction isn’t about applying additional techniques
    to the overall process, it’s more of a mindset and design goal for the resulting
    solution. By seeking to differentiate you are already looking to define a signature
    interaction, but up to this point all of this has been thought through only for
    a single application. If your organization is small and your product portfolio
    is limited to one app, then you are on the right track. If you are part of an
    organization with more than one product in its portfolio, then you need to expand
    your system-level thinking to encompass other applications and their functionality.
    What this means is that you need to increase the scope of your problem solving
    during the interaction modeling activities such that you understand the impact
    of your decision across a family of applications.


    If we take a look at the interaction modeling example we have worked out so far,
    we could say that the grid unit expansion and the correlated gesture driving it
    might be suitable as a signature interaction. So far we’ve only thought in terms
    of resolving the text object truncation problem, but let’s think through some
    options as they may be applied to a more generalized concept. Assuming that we
    are now thinking through an app, how and where else could this interaction be
    put to work? One option would be to consider it for navigation. Let’s say that
    the grid array of items represents major functional nodes in the application.
    Could we use the idea of expansion and exposition of the grid unit as mechanism
    for navigation? Of course.


    ![images](images/0611.jpg)


    **Figure 6-11.** Using a pinch open to select and navigate. Past a certain threshold,
    the grid element continues to open up unaided by the user.


    The basic idea here is the notion of expansion. A user can expand a grid unit
    with the spread of the fingers to reveal more information concealed within the
    unit (see [Figure 6-11](#Chapter06.html#fig_6_11)). If the user does not exceed
    a predetermined threshold of expansion, the grid unit would snap back to its original
    size when the user’s fingers are removed from the screen. If the user expands
    the grid element past the predetermined threshold the grid unit then automatically
    expands to the full size of the screen and displays the functionality of that
    node (or becomes a gateway to sub-nodes, for that matter). A conventional approach
    to navigation would likely just require the user to touch one of the grid units
    to navigate to its corresponding node in the app. I think we can assume that we’d
    support that as well and assume that a quick tap has the same effect of expanding
    a grid unit past the threshold.


    We’re now starting to establish a distinct interaction model for the application.
    Instead of presenting a linear spatial model with both discrete and contiguous
    node-like experiences like that of the OS layer of the iPhone, we now have a spatial
    model defined by the elasticity of certain key regions. The user doesn’t navigate
    by moving from point A to point B within the app, but instead exposes functionality
    where and when it’s needed. From a workflow perspective there’s no difference
    between the two, but from an experiential perspective the difference is radical.


    #### Documentation


    Documenting an interaction model is an important part of the process. You will
    want to capture your ideas so that they can be shared and communicated to other
    members of your design and development team. This will help ensure that your vision
    is well-understood when it comes time to execute the concepts as more detailed
    user interface deliverables.


    Your documentation can take any form that you like. You just need to make sure
    that you account for two basic things:


    * Demonstrate the nature of your interaction model visually, in a clear and concise
    manner.

    * Provide extensive notation for the details of your interaction model that cannot
    be easily communicated visually.


    Remember, what you are showing is not an explicit user interface treatment or
    the mapping of controls like you might see in a wireframe. This kind of deliverable
    intentionally lacks the level of detail that you would explore in your wireframe
    documentation. The focus of the interaction model is only to describe the gross
    behavior of the application such that you can move into more detailed interaction
    design activities with a clear vision.


    Here’s an example of how this documentation might look for the example that we
    worked through (see [Figure 6-12](#Chapter06.html#fig_6_12)).


    ![images](images/0612.jpg)


    **Figure 6-12.** Documenting an interaction model and its consituent interactions


    ### Case Study and Example


    In order to understand how these ideas can be applied to a design problem, let’s
    apply them to a case study that we can use as a working model for the general
    process. I’ll set up a hypothetical organization and a hypothetical software product
    and walk through the thinking, general problem solving, and overall process to
    arrive at a compelling interaction model.


    #### Company X


    Let’s assume that we have a client called Company X, which already has an established
    desktop application that is fairly successful in their little corner of the market.
    Company X recognizes that in order to grow their business, they need to break
    into the mobile market with an iPhone application. On top of that, their users
    and their investors have been pressuring them to get something into the App Store
    as soon as possible.


    The company has come to you—interaction designer extraordinaire—to help them design
    their application. They explain to you the need to make a big splash in the App
    Store. One of their main competitors just released an iPhone App, and Company
    X needs to release to market a superior application.


    Company X focuses on entertainment, and their desktop application allows users
    to browse and consume content from many different sources. For the most part the
    content consists of videos, but there are audio files and still images that need
    to be accounted for too. Company X takes great pride in their ability to curate
    and organize the content in their application so that their users can easily find
    what they are looking for. It’s what sets them apart from the competition.


    However, Company X has a problem: while their desktop application looks great
    and performs well for users, it cannot be easily translated to an iPhone app.
    There are just too many controls, buttons, and other user interface widgets, all
    of which are oriented for mouse and cursor interaction. Adding to the complexity
    of the user experience is that fact that there are way too many options for navigating
    the content. For the most part the hierarchy of organization is three tiers deep,
    but you have noticed several exceptions that go a few layers deeper.'
