- fmt: '### Key Technologies


    I’ve identified four key technologies that you need to be aware of as a designer.
    These can be broken down and grouped into two basic categories, the first being
    Apple technologies which support native rendering within iOS, and the second being
    `OpenGL`, a third-party technology that supports low-level GPU usage. The best
    way to think about this from a design standpoint is to associate native rending
    with the presentation of classic user interface widgets as they are commonly understood.
    Associate `OpenGL` with high-performance graphics rendering for the kinds of animation
    and interaction that you might see in a gaming context.


    The important thing to note is that these technologies do not have to be exclusively
    applied to the original contexts for which they were intended. By understanding
    the nature of each of these technologies you can understand how the experience
    you are designing can be best brought to life. This will become increasingly important
    as you begin to think through the details of unique interaction mechanics as they
    may be applied to your application. When you know what each of these technologies
    enables, you will see just how powerful iOS is and the unlimited possibilities
    iOS gives you as a designer.


    #### UIKit


    `UIKit` is the meat and potatoes framework used to flesh out the application experience
    for any iOS device. It essentially provides all the tools and resources to assemble
    a user interface for a touch screen device and as such, accounts for all the critical
    points of user interaction that your application might need.


    In all likelihood `UIKit` will deliver 95% of the user experience that you are
    trying to create. The framework encompasses all the UI widgets that you typically
    encounter while using an iOS device. This includes basic button controls, sliders,
    text fields, toggle controls, and the like. Along with the standard control appearances
    that we are all familiar with, `UIKit` provides plenty of opportunities to customize
    objects as needed, so never feel constrained by what is provided by default. Customized
    UI solutions that use the other graphics technologies I’ll be reviewing will all
    ultimately be managed by `UIKit`, so it is an extremely flexible framework and
    worth getting to know.


    Besides being able to consume any production graphics (i.e., raster objects like
    `PNG` files) that you specify in your designs, `UIkit` has the ability to render
    objects procedurally. In other words it can draw objects as needed and as specified.
    These techniques are more akin to many of the vector graphics methods that you
    might already be familiar with. In most cases this will involve the definition
    of some basic geometry or path, and the application of visual attributes to those
    paths to achieve the appearance you desire. Just a word of warning for those of
    you considering this option: Although the use of procedural graphics will streamline
    your production effort for application assets, you will need to spend a considerable
    amount of time with the development team defining attributes and making sure objects
    are rendering as you need them to. Depending on the nature of the experience you
    would like to create, it may be more effective to render certain UI elements in
    this way. You’ll need to work with your development partners to decide where and
    when procedural techniques make the most sense.


    #### Core Graphics


    `Core Graphics` is another really interesting technology that may be used to add
    value to your user experience. At the heart of `Core Graphics` is the two-dimensional
    rendering engine called `Quartz 2D` which can be used to drive many different
    kinds of graphics capabilities within an application. Not only can it be used
    to draw certain kinds of graphics dynamically, but it can be used as a fully featured
    imaging engine to add graphic creation and editing capabilities to an app.


    Think of `Core Graphics` fundamentally as a technology that lets you expand the
    functionality of an application. However, because it provides more complex graphics
    support than what is available in `UIKit`, it can be used to create user interface
    elements if needed. Considering that `UIKit` enables a high degree of flexibility
    for the support of custom graphics, `Core Graphics` may only be useful if the
    experience that you are designing demands some kind of complex graphic transform,
    processing, or realtime compositing.


    #### Core Animation


    `Core Animation` is a technology dedicated to giving developers a simple and easy
    solution for the creation and rendering of dynamic visual interaction attributes.
    In other words, it’s all about bringing your user experience to life. Because
    it is focused on integration of animation into existing user interface objects,
    `Core Animation` works in close conjunction with `UIKit`, so the integration of
    reactive controls and transitions is relatively seamless.


    `Core Animation` is actually quite a powerful tool in terms of the range of capabilities
    that it gives to developers. We’ve all experienced the beautiful state transitions
    common to many applications, but don’t think that you are limited to what you
    can do based on what you’ve seen in other applications so far. This technology
    gives developers the ability to create and control animatable attributes at many
    different levels, so you, as the designer should consider that the possibilities
    for unique and highly customized animation are virtually unlimited.


    #### OpenGL ES


    `OpenGL ES` stands out from the other technologies that I’ve reviewed here in
    that it is the only non-Apple technology in use. `OpenGL ES` is essentially the
    API that let’s you tap into the hardware acceleration embedded in iOS devices
    for the rendering of graphics. It cannot stand alone to deliver a user experience
    per se, but must be used in conjunction with `Core Animation` to deliver content
    to the screen.


    Again, this is another powerful technology that is used to render graphics that
    might otherwise be extremely taxing for the device to manage. For the most part,
    `OpenGL ES` is used in the gaming context when 3D objects need to be rendered
    on the fly. However, because of it’s integration with the other technologies above,
    do not consider it limited to the rendering of game graphics. It is entirely possible
    to render UI objects, or even an entire application within a three-dimensional
    (3D) environment if desired.


    The need to integrate this technology with your application will be entirely dependent
    on the types of visuals you are trying to produce. There are many ways to create
    the appearance of 3D graphics without needing to render objects on the fly. Unless
    you have designed an experience that requires real-time reactivity with 3D objects
    in an unconstrained 3D space, you may want to consider some other options. On
    the other hand, you may want to experiment with this technology just to understand
    new types of visual interaction that may not be fully explored or developed yet.
    In which case, this technology will give you some very interesting capabilities
    to experiment with.'
