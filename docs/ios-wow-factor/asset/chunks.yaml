  trans: '

    ### 移动体验 vs 便携体验


    在谈论移动时，我明确指的是`iPhone`及其所代表的一切。然而，我们还有另一类设备需要纳入考量，这类设备实际上无法严格归入我们通常理解的“移动”定义范畴。


    当苹果在 2010 年推出第一代`iPad`时，其明确意图是创造一种介于笔记本电脑或上网本与智能手机之间的全新设备类别。与苹果产品发布前惯常的炒作和热情相伴而来的，是一些质疑该设备价值的批评者。在他们看来，`iPad`不过是个放大了的`iPhone`。这些批评者未能认识到的是，`iPad`更大的外形尺寸本身蕴含着显著影响，这将契合各种有趣的用例场景，而这些场景对于`iPhone`或任何尺寸的笔记本电脑（包括`MacBook`或其他产品）来说都不太实用。


    `iPhone`和`iPad`都比典型的笔记本电脑“移动”得多，但由于尺寸差异，它们各自关联着显著不同的使用行为。首先，我们要认识到手机本质上是个人设备。你的手机直接与你个人关联。打你的电话就是针对你个人的呼叫，在很多方面，人们将你的手机视为你本人的代理。人们通常会说“我打电话给你……”，而不是更字面地表达“我打你的电话……”。这开始表明这些设备与我们身份的关联有多么紧密。


    我们的手机陪伴我们去任何地方。它们是我们形影不离的常伴。其中最大的因素在于`iPhone`足够小巧，使得这种陪伴成为可能且切实可行。而`iPad`的尺寸则削弱了这种价值。它虽然便于携带，但其尺寸使其无法实现`iPhone`所具备的真正移动性。


    `iPad`的劣势也是其优势所在。尽管其尺寸使得随身携带不便，但`iPad`的大屏幕为许多在`iPhone`小屏幕上可能令人感到不便的活动提供了更佳的体验。在`iPhone`上阅读文字、浏览网页和观看视频固然可行，但`iPad`的大屏幕却能将那些原本繁琐的任务变成用户的愉悦享受。市场不断强化这种偏向，因此`iPad`已成为定义明确的“休闲计算”设备。休闲计算的概念并不新鲜，但随着`iPad`的出现，这一理念带上了休闲导向的意味，并由此影响了我们今天所能获得的数字内容和体验类型。


    这开始为我们指明`iPhone`和`iPad`之间的一个关键区别。如果我们知道`iPad`的使用是休闲的，并且通常侧重娱乐，那么我们可以推断这些活动的持续时间相对较长。在`iPad`上看电影或电视节目需要相当的空闲时间和不间断的注意力。阅读你最喜欢的报纸或最新畅销小说也是如此。相比之下，用`iPhone`查看最新股票报价、当前天气或你所选社交网络的最新动态，则是快速、短时的交互。然而，由于你随时随身携带此设备，你可以在任何时刻投入到这些体验中，即使同时还在进行其他活动。任何`iPhone`用户都知道，一有机会就掏出手机查看很快就会变成一种习惯性动作。从这个意义上说，两者之间的使用行为几乎是截然相反的。我将其重述如下：


    -   **`iPhone`:** 使用频率高，但每次使用时间短。

    -   **`iPad`:** 使用频率低，但每次使用时间长。


    这并非普遍真理，但作为一般性观察，这是区分两种设备使用行为的准确方式。


    这些使用模式对移动性概念的影响非常有趣。我们现在需要明确区分用户使用这些设备的方式。我认为可以说，`iPhone`真正代表了我们今天所理解的移动性概念，但`iPad`则完全是另一回事。它本身并非移动设备；它代表了一种“便携”式计算模式，可能有别于之前任何设备。我之所以说便携，是指它常随你出行，带在身边也不算负担，但它不具备你的`iPhone`那样的普遍存在感或个人亲和度。


    便携性作为移动计算的一个微妙分支，其理念在`iPad`日常使用场景中显而易见。记住，`iPad`使用频率较低，但用户一旦使用便会持续相当一段时间。因此，用户需要待在一个可以静坐一段时间的地方。家是此类行为的完美场所。所以当我谈到便携性时，很多情况下只是描述设备在家中的各个房间之间移动。用户确实会带着
    iPad 去任何地方，但实际使用行为与在家时无异：坐着，以放松的姿态将`iPad`放在膝盖上。再考虑到使用频率，虽然家可能是`iPad`使用频率最高的地方，但随着用户携带设备前往新地点，使用频率会下降。理由是在家以外的地方，舒适且可以静坐的休闲活动机会开始减少。


    `iPad`还呈现出另一种行为差异。虽然`iPhone`具有深度的个人亲和度，但`iPad`的情况则不同，因为它缺乏完全集成的电话功能。这是用户如何看待该设备的一个重要因素。由于它不像手机那样明确与个人关联，用户更倾向于与他人共享此设备的使用。当用户已拥有`iPhone`，或拥有`iPhone`加笔记本电脑，而将`iPad`视为辅助设备时，这种效应会更加明显。另外两种设备更可能被视为通信和效率提升的主要设备，从而让用户更愿意与他人共用`iPad`。家庭环境就是一个很好的例子。每个家庭成员可能都有自己的手机甚至笔记本电脑，但`iPad`的使用则会在家庭中因各种目的而共享。'
- fmt: '# Critical Use-Cases for Mobile


    There are many ways to target your application for optimal use on mobile and portable
    devices, but let’s first start by assuming that you already have some baseline
    features and functionality in mind. Your consideration of platform might already
    account for mobile-specific use-cases based on the guidance that I have already
    provided, however it’s also important to look at some critical use-cases at a
    high level to understand how your application relates, or may need to relate to
    them.


    I have identified five major use-cases that have proven to provide value to users
    across many contexts and scenarios. I wouldn’t go so far as to say they are universal,
    but I’m sure that you can identify many applications that you personally could
    not live without, and that you currently have on your iPhone or iPad.


    I am positioning these as use-cases, but they could also be considered application
    categories or even thought of as feature sets. Taking the position of use-case
    is relevant because it suggests a user-centered bias, and that makes sense from
    the perspective of having an established user experience strategy as foundation
    for your design activities. As you will see, the notions of categories and feature
    sets will play a role in the overview that follows.


    There are five critical use-cases that you need to be aware of when thinking about
    your app:


    - Communication

    - Entertainment

    - Location-Based Services

    - Commerce

    - Utility


    It’s likely that at one level or another, these categories probably cover just
    about every application in existence, mobile, portable, or otherwise, but let’s
    walk through what each of these use-cases represents for the overall mobile context.


    ## 1 Communication


    I think it’s fair to say that communication is a table-stakes use-case. Obviously,
    with an iPhone this is fundamental to the perceived value of the device, considering
    that 1:1 communication via telephony is really what drove the creation of that
    platform. However, communication goes much farther than just telephony and the
    robust features associated with the mobile platform. You need to be thinking about
    communication in it’s broadest sense. One way to do that is to break down communication
    into two basic modalities. The first mode being “one-to-one” communication, and
    second mode being “one-to-many” communication. I’ll outline the types of functionality
    that fall into each of those categories and you’ll see why this is a use-case
    to always keep in the forefront of your mind.


    ### One-to-One Communication


    Each of these four modes are not exclusively one to one because there are additional
    functions associated with each that let you engage with more than one individual.
    The important thing to note is that at their core they enable a one-to-one connection.


    - Basic Telephony / Voice

    - Email

    - SMS

    - Instant Messaging


    ### One-to-Many Communication


    Let’s assume that the list above can be included here, but the point of this list
    is to demonstrate that the definition of communication may be broader and deeper
    than how you are thinking about it today.


    - Social networking channels (Facebook, Google+, Twitter)

    - Media sharing channels (YouTube, Flickr, Vimeo, etc.)

    - A/V Podcasts

    - Blog Posts

    - Comments

    - Forums


    You can see that when you break down the use-case into the various modes and capabilities,
    the value becomes very apparent. Many of the most successful applications address
    these communication modes directly, mapping their functionality directly to a
    mobile app, or they integrate some aspect of that functionality as a value add
    to their own core feature set.


    ## 2 Entertainment


    This is a huge catchall use-case that can be interpreted in many different ways.
    Entertainment as a category is ambiguous enough, but at the abstract level it
    has to be recognized as another absolutely critical use case. The main factor
    here is that the dimension of entertainment is really a consideration of user
    perception and attitude as applied to any use-case. For example, even reviewing
    your financial portfolio and current stock quotes can be considered entertaining
    under the right conditions.


    That’s all well and good, but it doesn’t give you much to go on in terms of modeling
    functions or understanding how your app may address the use-case. To give you
    something more concrete, let’s break “entertainment” down into the two subcategories
    that we know have a significant role helping drive the adoption of iOS devices.


    - Gaming

    - Content Consumption


    Mobile gaming is obviously the easiest identifiable critical use-case in the entertainment
    category. There is a lot of sophistication associated with how games are positioned
    in the mobile space, and there are many schools of thought around what kind of
    gameplay is most successful on the various mobile platforms. For the purposes
    of this book, we won’t delve into the esoteric aspects of gaming interactions,
    though many of the ideas that I have reviewed so far are applicable to the creation
    of games for iOS.


    Aside from gaming, you have to recognize that content consumption, in all it’s
    various forms, is a very large component of any entertainment-oriented use-case.
    Watching videos, listening to music, reading books, browsing the web, and many
    other activities are all encapsulated within that category. Many of the most popular
    apps for both the iPhone and the iPad are almost exclusively focused on content
    consumption, each with its own value-added user experience to make that consumption
    more entertaining or more attractive to users. Clearly others have seen the value
    of this use-case and are capitalizing on it already. Even with that being the
    case, there is still plenty of consumer demand for more apps focused on helping
    users consume content in new and interesting ways.


    ## 3 Location-Based Services


    Location-based services are a critical category in the mobile context, and really
    the only use-case explicitly unique to mobile. Location-based services are an
    emergent factor derived from the combination of many different enabling technologies
    available on mobile devices today. Integrated GPS, digital compass technology,
    and mobile network information provide an incredible level of detail and accuracy
    regarding the location and orientation of the user.


    There are a number of applications in the App Store that integrate location-based
    services in interesting ways, some of which are very successful, and some that
    are not. For the most part this is still a very nascent use-case and app developers
    are only scratching the surface on what is possible with these technologies. Most
    applications seem to focus on either helping the user broadcast where they are
    (one-to-one and one-to-many communication tied to location), or they are focused
    on helping users go from point A to point B. The big question is: What is the
    inherent value of location-based services, and how should you be thinking about
    this use-case for the application that you have in mind? The answer is simple,
    location-based services and all the capability that implies are about adding relevance
    and meaning to the content and/or functionality.'
