    workflows when a user’s path through an application has a direct impact on your
    design decisions at the user interface level. If you know that the inherent structure
    of your workflow may be simplified by your design decisions at the user interface
    level, then it makes sense to collapse those details to a single node and not
    worry about including those details at the workflow level.


    In the case of Company X’s iPhone app, there is a requirement to provide a mechanism
    for users to quickly and efficiently browse and discover new content. So you know
    that at some point you are going to need to resolve the issue of hierarchy with
    a solution that is more appropriate for an iPhone. For the purposes of this application
    it makes sense to collapse browsing and content viewing down to single node (see
    [Figure 6-14](#Chapter06.html#fig_6_14)). This begins to make more sense when
    we start to think through possible interaction models. With that said, let’s use
    this basic workflow to guide our modeling efforts.


    ![images](images/0614.jpg)


    **Figure 6-14.** Collapsing navigation to a single node knowing that the explicit
    navigation through a hierarchy may be simplified.


    With this basic workflow now in hand, we understand that one of the biggest design
    challenges for Company X is to figure out how to get users to the content in a
    way that makes sense for an iPhone app. This is where our interaction modeling
    activities come into play.'
  trans: '

    ### 公司 X 的需求


    掌握了这些知识后，你就可以开始着手解决设计问题了。正如我之前回顾的那样，流程的第一步是明确应用程序需要具备哪些功能的需求定义。在审查了公司 X 的桌面应用程序并采访了该项目的主要利益相关者后，你了解到
    iPhone 应用需要实现以下功能：


    * 允许用户访问该公司的完整内容库。

    * 提供一种机制，让用户能够快速高效地浏览和发现新内容。

    * 允许用户与朋友分享内容。

    * 允许用户对内容进行评论。

    * 提供一种机制，让用户能够将他们用自己的 iPhone 拍摄或创建的内容添加到公司 X 的内容库中，并与全世界分享。


    通过需求收集流程以及与利益相关者随后的讨论，团队得出结论，这些是需要在 iPhone 应用中展示的正确功能。虽然这并未涵盖桌面应用程序的所有功能，但通过理解移动情境下特定于用户角色和场景的用户需求，有助于你将所有功能筛选到这些基本功能上。


    现在，既然已经明确了这些需求，你就可以开始思考如何组织这个应用的工作流程了。为了充分领会交互建模所带来的可能性，有必要花些时间深入探讨如何得出你的工作流程定义，以及这个定义需要细化到什么程度。


    审视公司 X 对 iPhone 应用的需求，揭示了该应用本质上一个重要方面。绝大多数需求直接与浏览和消费内容相关。像分享和评论这样的辅助功能，则直接依赖于屏幕上有内容供用户进行操作。因此，你得出结论：内容是这种用户体验的核心组成部分。因此，需要非常仔细地考虑内容与应用基本功能之间的关系。此外，在与客户的讨论中，你逐渐感受到了这个设计问题的难度。用户执行的绝大多数交互都集中在通过层次化的组织层级进行导航，以获取内容。


    这就到了事情变得有些主观的地方。你可以选择在流程中包含内容组织的层级性质以及用户需要遵循的路径，也可以简化工作流程的这一方面，将浏览功能隔离到一个单独的节点。让我们通过一个反映我们对公司
    X 需求理解的简单工作流程（见图 6-13），快速看一下两者的区别：


    ![图片](img/0613.jpg)


    **图 6-13.** 显式工作流程与简化后工作流程的对比


    这提出了一个有趣的问题：在工作流程文档中，是更详细还是更概括，其背后的理据是什么？当用户在应用程序中的路径会直接影响你在用户界面层面的设计决策时，你总是希望创建显式的工作流程。如果你知道，你在用户界面层面的设计决策可以简化工作流程的内在结构，那么将这些细节归结到一个单独节点，而不必纠结于在工作流程层面包含这些细节，就是有意义的。


    以公司 X 的 iPhone 应用为例，其中有一项需求是提供一种机制，让用户能够快速高效地浏览和发现新内容。因此，你知道在某个时刻，你需要用一种更适合 iPhone
    的解决方案来解决层级问题。就本应用而言，将浏览和内容查看合并到一个单独的节点是有意义的（见图 6-14）。当我们开始思考可能的交互模型时，这就会显得更加合理。话虽如此，让我们用这个基本工作流程来指导我们的建模工作。


    ![图片](img/0614.jpg)


    **图 6-14.** 将导航折叠到一个单独的节点，并意识到通过层级进行显式导航可能会被简化。


    现在，有了这个基本的工作流程，我们了解到公司 X 面临的最大设计挑战之一，就是找到一种适合 iPhone 应用的方式来引导用户获取内容。而这正是我们的交互建模活动发挥作用的地方。

