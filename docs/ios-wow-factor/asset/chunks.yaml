    # 直接操控与比例


    我在直接操控的语境下提出这个问题，是因为只有当直接操控成为主导原则时，比例和邻近性才会真正成为问题。请记住，你必须直接与某个对象交互，才能影响该对象的状态或条件。该对象就是目标。但可能存在这样的设计方案：你无需直接与对象交互，就能影响其状态。在某些场景下，可能需要一个非常小的按钮（无论出于何种原因），小到其外观本身就有些问题。你可以创建一个控件，其代表它的图形在比例上被一个包含它的“目标区域”远远超过。用户可以通过与目标区域交互来影响该控件，而不必接触目标区域中心的实际图形表示。你甚至可以更进一步，创造出目标区域与其表示图形分离的情境。这是一个很好的切入点，可以过渡到下一个主题！


    ## 手势


    “手势”这个术语如今被广泛使用，根据上下文的不同，它可能有截然不同的解释。有时其定义是字面意义上的，例如考虑那些使用复杂机器视觉将你身体的物理运动解释为计算系统输入的设备。当苹果公司提及手势时，特指那些允许苹果将其输入事件调色板扩展到直接操控可能允许的基本输入之外的触摸交互。在某些情况下，这涉及同时复合触摸事件（多点触控）以调用特定响应。但也有完全停留在直接操控领域的手势示例。在抽象层面上，许多手势是相同的，或者至少仅通过输入的细微差别或使用上下文来区分。


    iOS 中最常见的手势如下：


    - **轻点：** 这是操作系统中最基本的选择行为。

    - **拖拽：** 在持续触摸事件中，对象会跟随你的手指移动，直到你将手指从屏幕上移开。

    - **轻扫：** 与拖拽手势非常相似，但速度更快。此手势的关键在于对象本身固有的行为。松开时，“可轻扫”对象往往会显示并模拟惯性特征，从而使轻扫动作具有意义。

    - **滑动：** 用手指进行线性滑动，不暗示直接操控，常用于显示隐藏的控件。

    - **双击：** 短时间内连续两次轻点，以指定图像或内容缩放的原点——通常是预定的缩放比例因子。

    - **张开捏合：** 用户定义放大，由你“张开”捏合的程度决定。

    - **闭合捏合：** 用户定义缩小，由你“闭合”捏合的程度决定。

    - **长按：** 通常与调用某种形式的辅助控件相关，例如在可编辑文本上调用放大视图，但还有许多其他用途。


    iOS 上还有一些较新的手势即将出现。观察它们被采纳的速度以及其他应用开发者如何开始使用它们，将会很有趣。这些较新的手势大多是我上面列出的手势的自然延伸，并且更适用于操作系统级别的导航和控制。我的意思是，它们关乎在操作系统中的移动，而不一定与运行应用中单个组件的控制相关。这种对操作系统级别的关注似乎是通过真正的多指交互（超过两根手指）来实现的，以便将它们与用于控制应用的经典手势集区分开来。


    应用设计者和开发者可以利用标准手势输入做很多事情，为他们的产品增加价值和趣味。但许多手势也可以以非标准方式使用，这些方式仍然可用，但能产生更引人注目的结果。本书后续章节在讨论新颖概念开发时，将对此进行深入探讨。


    ## 隐形按钮


    Home 按钮，曾是一个颇具争议的控件，如今已被广泛采用且使用频繁，以至于几乎隐形。在早期版本的 iOS 中，Home 按钮可以在一定程度上进行自定义。双击
    Home 按钮可配置为进入主屏幕、搜索界面、“电话收藏”、“相机”和 iPod 应用。后续版本取消了此功能，并将 Home 按钮的功能集中于操作系统导航的实用方面。


    要理解 Home 按钮重新定位为更专注于导航，我们需要审视 iPhone 使用性质的不断变化。iOS 演变的主要驱动力之一是需要支持用户加载到设备上的、不断增长的应用数量。我们看到市场上出现了存储容量更大的设备，旨在满足相同的用户需求，而这种需求反过来又是由
    App Store 的成功以及应用本身高度专业化的特性所驱动的。苹果可能预料到人们会下载大量应用，但他们没有预料到大多数用户拥有非常高的平均应用数量。任何东西数量庞大，通常都意味着既需要有效的组织方式，也需要有效的导航方式来管理该组织。


    寻找应用并使用它曾经是一件相当简单的事情。你所要做的只是快速扫视屏幕上的一排排虚拟按钮。你可能有一个可以通过快速轻扫切换过去的第二屏应用，但通常只需几个简单的手势就能找到你要找的东西。时间快进几年，现在你不再只有一两屏应用，而是有整整五屏！在几个屏幕之间来回轻扫这一相对简单的行为现在变得问题重重。当你在超过三个屏幕之间移动时，定位感开始变得极具挑战性。曾经让一切变得轻而易举的快速轻扫行为，现在却成了混乱的源头，因为一屏又一屏的应用图标在你眼前快速模糊地掠过。你是在主屏幕，还是已经翻到了第四页？这种情况很快就会变得非常令人沮丧。


    随着 iOS 的发展，苹果的设计师们创建了许多出色的解决方案，来帮助用户应对大量已安装应用带来的挑战。我们现在可以将应用分组到用户可自定义的应用集合这一二级层级中。我们可以访问一个“应用切换器”，它会根据最近使用情况优先显示应用，并且我们可以通过搜索结果直接导航到应用。我们还可以快速将方向定位回主屏幕。


    这让我们回到理解 Home 按钮不断演变的性质上来。随着与导航和定位相关的功能级别提升，Home 按钮的重要性真正开始增长。操作系统层级 UI（主屏幕及之外）的简单性，不允许添加一组导航控件。这与应用层级
    UI 截然不同，应用层级 UI（通过人机界面指南）要求明确考虑这些类型的控件，并为设计者和开发者提供一个一致的模型。如果没有图形用户界面组件来提示用户，辅助导航和定位控件必须由
    Home 按钮来管理。在已解锁设备的上下文中，Home 按钮管理以下功能：


    - **返回主屏幕：** 这是 Home 按钮的基本功能，也是 Home 按钮使用最频繁的方面。

    - **进入 Spotlight 搜索：** 一旦用户位于主屏幕，单击一次即可进入 Spotlight 搜索界面。

    - **显示应用切换器：** 可以在操作系统层级或应用层级的任何点显示应用切换器。

    '
- fmt: '# The Evolution of the Home Button


    The first two actions can be accomplished with the use of the `flick` gesture,
    but the use of the `Home` button makes those interactions much more efficient.
    The `App Switcher` is different in that it is dependent on the `Home` button for
    its operation.


    I think this clearly shows a pattern for how the `Home` button is evolving as
    a control dedicated to support navigation behavior. There are a few exceptions
    to this model, but those exceptions follow a clear pattern as well. Waking a device
    from its dormant mode or invoking `iPod` controls from the locked screen occur
    outside of the context of the core UI. Navigation is not a relevant function at
    that point in your interaction with the device, so the `Home` button might as
    well be put to good use. With that said, Apple has provided some pretty decent
    solutions to some of the most common use cases associated with the iPhone. Access
    to the `iPod` controls from the locked state via a double-click on the `Home`
    button is one example, another would be the ability to access `Voice Control`
    with a single long press (3 seconds). So it appears that locked-state interactions
    for critical use-cases is a valid use for this control too. One last exception
    to navigation support is the ability to configure accessibility options for the
    `Home` button that can be invoked with a triple-click.


    Future releases of iOS may provide additional uses for the `Home` button, but
    that remains to be seen. We may even see the `Home` button eventually disappear.
    There are some interesting scenarios that might enable this. We may see the introduction
    of off-screen capacitive controls that may act as a replacement for the `Home`
    button, or we may even see new gestures emerge to control the functionality currently
    associated with the `Home` button. Rest assured, Apple will continue to evolve
    this aspect of their devices.


    ## The Strange Topology of iOS


    Later in this book I will delve into methods and techniques used to create interesting
    and unique interaction models that can be applied to iOS device apps. Before we
    reach that point it’s worth taking some time to deconstruct some aspects of iOS
    that really haven’t been clearly codified, or at least documented in way that
    helps us understand why iOS is so easily adopted by users. At the root of the
    iOS interaction model is a notion of a “space” through which users move fluidly
    to accomplish tasks. We can think about this space as a tiny little universe that
    the OS functionality and applications all inhabit. Like any universe, it has certain
    rules, limitations, and attributes that inherently affect the things that populate
    it. When we understand those basic mechanics we can design solutions that either
    use those mechanics more efficiently, or sidestep them entirely and begin to define
    our own rules.


    iOS is essentially a planar environment, with a few exceptions. When I say “planar
    environment,” what I mean is that the presentation of user experience at the core
    is a two-dimensional proposition. You may think that this is an obvious statement,
    since we view a screen on the device, and by their very nature the things presented
    on the screen are two-dimensional. That is true, but what I refer to is how interface
    elements are presented and how a user moves conceptually through the space inhabited
    by those elements. This two-dimensionality is important to recognize because we
    are no longer technically constrained to create user experiences that are limited
    to two dimensions. iPhones and iPads can render very sophisticated graphics and
    a volumetric UI is entirely possible, so Apple has made a conscious decision not
    to go in this direction (literally).


    While the UI is planar, it’s not strictly two-dimensional in its operation. iOS
    really operates between three dependent or coexistent planes. You can think of
    iOS as three layers of user interface, where each layer is reserved for a specific
    type of interaction. The movement between those layers is defined by specific
    set of interaction mechanics particular to the layer.


    The three layers or planes of user interface break down like this, by order of
    importance of operation (see [Figure 2-1](#Chapter02.html#fig_2_1)):


    *   **Default Plane:** This layer is inhabited by app icons and the icon dock,
    and is the plane of interaction that receives the most activity from users.

    *   **Underlying Plane:** This is reserved for the `App Switcher` and for displaying
    contents. This space is purely a supplemental construct that supports organization,
    orientation, and navigation.

    *   **Superimposed Plane:** This layer used for dialog boxes, alerts, modal controls,
    and pop-overs.


    ![images](images/0201.jpg)


    **Figure 2-1.** The three planes of user interface.


    These planes all coexist in a very shallow visual space. From an appearance perspective
    these planes all lie within a few millimeters of each other. While this is simply
    a matter of how the graphics are rendered, the visual presentation of these planes
    connotes a close relationship between these spaces. It’s as if the appearance
    of proximity supplements the cognitive association these features initially required
    to gain acceptance by the users. The idea of an underlying plane asserts the illusion
    that there was always more to this UI, literally below the surface!'
