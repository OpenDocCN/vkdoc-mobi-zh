- fmt: '### Mobile Experience versus Portable Experience


    When talking about mobile, I’m clearly referring to the `iPhone` and all that
    it entails. However, we have another category of device that must be put into
    context as well, which for all practical purposes cannot be strictly referred
    to within the “mobile” definition that is part of our common understanding.


    When Apple launched the first-generation `iPad` in 2010, they did so with the
    clear intention of creating a new category of device to reside somewhere between
    a laptop or netbook and a smartphone. Along with the usual hype and enthusiasm
    that precedes any Apple product release, there were some detractors that questioned
    the value of a device. From their perspective, the `iPad` was just a giant `iPhone`.
    What these detractors failed to recognize was that there were significant implications
    inherent to the larger form factor of the `iPad` that would align with all sorts
    of interesting use-cases that were just not practical for either an `iPhone` or
    laptop of any size (`MacBook` or otherwise).


    Both the `iPhone` and the `iPad` are much more “mobile” than a typical laptop,
    but because of their size difference there are significantly different behaviors
    associated with each device. First let’s recognize that mobile phones are inherently
    personal devices. Your phone is directly associated with you. A call to your phone
    is a call targeted at you, and in many ways people view your phone as a proxy
    for yourself. People commonly will say, “I called you...,” as opposed to being
    more literal and saying, “I called your phone...”. This starts to suggest how
    tightly correlated these devices are to our identities.


    Our mobile phones are with us everywhere we go. They are a constant companion
    that never leaves our side. The biggest factor contributing to this is that fact
    that iPhones are small enough to make this feasible and practical. The size of
    the `iPad` negates this value. It is carried easily enough, but it’s size precludes
    it from the type of true mobility that the `iPhone` enables.


    The `iPad`’s weakness is also its strength. Although the size of it makes it impractical
    to carry with you everywhere you go, the `iPad`’s large screen provides a much
    better experience for many types of activities that one may find challenging on
    the `iPhone`’s small display. Reading text, browsing the web, and watching videos
    are possible on an `iPhone`, but the large display of the `iPad` makes those otherwise
    tedious tasks a joy for the user to perform. The market continues to reinforce
    this bias and subsequently the `iPad` as emerged as the definitive “casual computing”
    device. The notion of casual computing is not new, but with the `iPad` the idea
    has taken on the connotation of leisure orientation and all that implies for the
    types of digital content and experiences available to us today.


    This starts to point us to one of the key differentiators between the `iPhone`
    and the `iPad`. If we know that `iPad` usage is casual and very often leisure
    focused, we can infer that the period of engagement with those activities is relatively
    long. Watching a movie or TV show on an `iPad` requires some available time and
    uninterrupted focus. The same is true for reading your favorite newspaper or the
    latest bestselling novel. In contrast to that, checking your `iPhone` for the
    latest stock quotes, current weather, or the latest updates on your social network
    of choice are quick, short-term interactions. However, because you have this device
    with you everywhere you go, you can dive in to those experiences at any time,
    even while simultaneously engaging in other activities. As any `iPhone` user knows,
    it quickly becomes force of habit to pull out your phone and check it at every
    available opportunity. In that sense, usage behavior between the two devices is
    almost diametrically opposed. I’ll restate it like this:


    - **`iPhone`:** High frequency of use, but the engagement is short in duration.

    - **`iPad`:** Low frequency of use, but the engagement is much longer in duration.


    This isn’t universally true, but as a general observation it is an accurate way
    to differentiate behaviors between the two devices.


    The implications of these usage patterns for the idea of mobility are very interesting.
    We now need to make a point of distinction between how users approach these devices.
    I think it is fair to say that the `iPhone` truly represents the idea of mobility
    in the sense that we understand it today, but the `iPad` is a different thing
    altogether. It is not a mobile device as such; it represents a “portable” model
    of computing that may be different from anything that has preceded it. I say portable,
    in the sense that it often travels with you and it is not a burden to have it
    by your side, but it does not have the universal presence or level of personal
    affinity that your `iPhone` has.


    The idea of portability as a nuanced subset of mobile computing is evident in
    the kind of scenarios we see emerging with everyday `iPad` use. Remember, `iPad`
    usage is lower in frequency, but when users do engage with the device they do
    so for quite a while. So users need to be somewhere where they are going to be
    stationary for a while. The home is the perfect setting for this kind of behavior.
    So when I talk about portability, in many cases this is just describing the movement
    of the device from room to room within the home. Users certainly take their iPads
    everywhere, but the actual behavior for usage is identical to what they would
    do at home: sitting, in a relaxed position with the `iPad` in the lap. Again,
    thinking about frequency of use, while the home is the place where an `iPad` probably
    sees the greatest degree of usage, the frequency of usage will drop as a user
    moves with the device to new locations. The logic being that outside of the home,
    the opportunities for casual engagement in a comfortable and stationary setting
    start to decrease.


    The `iPad` presents another behavioral difference as well. Although the `iPhone`
    possesses a deep level of personal affinity, the `iPad` is a different situation
    because of the lack of fully integrated telephony. This is a considerable factor
    in how users perceive this device. Because it is not explicitly associated with
    an individual, the way a phone is, users are more apt to share the usage of this
    device with others. This effect is amplified when the `iPad` is viewed as a secondary
    device in situations where users may already own an `iPhone`, or an `iPhone` plus
    a laptop. These other two devices are more likely to be perceived as the primary
    devices for communication and productivity, thereby making owners more comfortable
    with communal `iPad` use. A good example of this may be the home environment.
    Individual family members may have their own phones or even their own laptops,
    but the use of the `iPad` is shared among the family for various purposes.'
