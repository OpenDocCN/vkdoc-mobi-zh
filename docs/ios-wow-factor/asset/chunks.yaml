    ### 摘要


    Apple 提供了四项关键技术，用于实现驱动应用程序用户体验的交互：


    - `UIKit`：该框架将负责实现绝大部分的用户体验。

    - `Core Graphics`：一个二维渲染引擎，可为应用程序添加图形创建和编辑功能。在适当情况下，它也可用于支持用户界面元素的渲染。

    - `Core Animation`：`Core Animation` 与 `UIKit` 紧密协作，为用户界面元素添加动态视觉交互。

    - `OpenGL ES`：一项第三方技术，可利用 iOS 设备内置的集成硬件加速功能。`OpenGL ES` 为 2D 和 3D 对象渲染提供高性能图形处理能力。


    鉴于 iOS 所固有的全部图形处理能力，请不要害怕定制图形、设计独特的交互或尝试对象行为。


    Apple 现在允许您将 iPhone 和 iPad 的用户体验合并到一个应用程序中，以简化部署和维护。然而，您仍然需要投入设计工作来定义两种不同的用户体验。主要的设计优势在于能够从一开始就为两种设备定义更大的用户体验连续性，而不是将一种设计方案改造到另一种设备上。


    ![images](img/ch06.jpg)


    ## 交互建模与新颖概念的创造


    本章真正触及了本书的核心。到目前为止，我已经提供了必要的背景信息，用于理解那些将决定您应用程序用户体验的设计决策。现在的问题是，您如何着手做出能让自己应用与众不同的设计决策？以及您如何获得那些能让您脱颖而出的突破性想法？本章将引导您了解基本流程、关键考虑点以及关键技巧，这些最终将帮助您获得所追求的“惊艳”效果。


    这并不是一个简单的公式，您也不可能在读完本章后就能自动设计出一款神奇而令人惊叹的应用。这个过程需要艰苦的工作、分析性思维，以及一点创造力。如果您愿意付出这一切，那么您就很有可能创造出一款突破性的应用。


    ### 什么才算“惊艳”？


    我们首先需要尝试定义什么是“惊艳因素”。这个词在设计词汇中并非一个真正可行的概念；相反，它是对用户对一款独特或特别吸引人的应用所产生积极反应的一种表达。虽然从设计角度看，使用这个词可能有问题，但它确实很好地反映了用户的本能反应，而且这通常是一种我们都能在某种程度上感同身受的反应。但这仍然没有回答这个问题。


    就 iOS 应用的交互而言，“惊艳因素”可以定义为您应用程序的交互层的一种表现，当这种交互超越了用户的某个关键情感阈值时。该阈值最终取决于用户，因此，如果没有清晰地了解目标用户画像，就很难预测或确定。然而，我们可以讨论这种情感阈值的本质以及跨越该阈值所需的关键因素。这些因素如下：


    - **影响的即时性：** 设计必须能够立即引起用户的反应。

    - **新颖性或可识别差异的识别：** 用户必须能够识别给定设计的新颖性，或者至少能识别出它与更传统体验的不同之处。

    - **积极回应：** 解决方案必须具有内在吸引力，以减轻可能因陌生或全新体验带来的冲击。


    当这三个因素都具备时，用户将轻松跨越达到“惊艳”情感质量所需的情感阈值。


    认识到“惊艳”这个概念及其决定因素会受到特定设计方案所展现属性的影响，这一点很重要。这些属性通常协同作用以产生更大的效果，并且通常不会单独负责产生您想要的反应。然而，我们可以将这些属性分离出来，以确定它们对用户体验的独特贡献：


    - **外观：** 这描述了给定设计方案的视觉属性，通过屏幕结构、布局、渲染以及其他构成应用静态视觉的元素来表达。

    - **交互机制与行为：** 这指的是与应用用户界面元素交互所需的物理交互、独特手势和一般输入方式。

    - **视觉交互、动效与动画：** 这些指的是设计方案中让应用“活”起来的响应式或动态元素。它们可能通过与用户输入的反馈或响应性与特定的交互紧密相关，但也涵盖了设计中的环境特质，甚至是与交互不直接相关的过渡状态。


    仅专注于其中一个维度并将其做到极致，也有可能实现“惊艳”的效果。这样的例子确实存在。一个应用可能缺乏任何引人入胜的交互性，但其外观可能如此精美，以至于其他属性在用户感知中不占任何明显分量。另一方面，一个应用可能外观极简，本身没有明显的视觉吸引力，但其交互机制或视觉交互特性可能非常引人注目，仅凭这些属性便能获得预期的用户反应。


    依赖单一属性来跨越用户的情感阈值，是一个高风险的主张。重要的是要认识到，在 iOS 设备上，刚刚描述的三种属性并不一定具有同等权重。一个外观吸引人的应用对用户来说只是基础要求（入局筹码），因此很难在这方面超越他们的期望。此外，iOS
    平台本身并没有什么特殊之处，能为体验应用的视觉特性提供差异化的手段。尽管与其他智能手机相比，其显示屏非常出色，但与品质不错的桌面显示器相比并没有显著差异。


    最能提供“惊艳”机会的属性，是您的应用体验固有的交互机制和行为。这是基于这样一个事实：iOS 设备提供的控制和交互方式，与用户可能熟悉的其他类型的数字体验有着根本的不同。正如我在第三章中讨论的，用户渴望用这些设备体验新鲜和不同的事物，通过密切关注交互机制，您就可以为他们提供他们想要的体验。


    然而，请记住，虽然交互机制是应当重点关注的属性，但您仍然不能忽视外观和视觉交互，因为它们都是同一体验连续体的一部分。主要观点是，您应该首先关注交互机制或行为，而这将有助于指导您如何解决其他两个属性。

    '
- fmt: '# Interaction Modeling: Process Overview


    Interaction modeling is a method by which you can formulate fundamental interaction
    mechanics and key visual interactions that will serve as the basis for your application
    experience. The interaction modeling process is composed of four key tasks, three
    of which are necessary precursor activities and the fourth is the interaction
    modeling itself. I walk through each of these at a high level first before diving
    into the details of the modeling considerations, tasks, and examples.


    ## Requirements Definition


    To start with, there must be at least some rudimentary understanding of the functional
    requirements of your application. These may be expressed as part of your user
    experience strategy or captured in detail as a part of a formalized requirements
    specification. This information forms the basis for all of your design activities
    moving forward, so you need to make sure that it is in a stable state and firmly
    agreed upon by the team. If you work within a more Agile environment there is
    an assumption that this information may be a bit less fixed, but you should still
    have a critical mass of requirements defining the functionality before you begin
    your work. With requirements in hand, you can begin to craft the appropriate use-cases.


    ## Use-Case and Scenario Development


    Use-cases, especially those that are more scenario-driven, are an important part
    of the process. A good use-case should provide the team with a sense of the general
    workflow that a user will experience as well as an understanding of how various
    requirements are intended to be addressed within a context of use. Some use-cases
    may provide explicit guidance through the narrative of a scenario that describes
    key interactions at various points in the application experience. Keep in mind
    that a use-case, expressed as a scenario or not, is intended to be just a starting
    point. If you have a vision for your application and how it may express behavior
    to the user, then you can describe it to the level of detail you think will be
    helpful for informing the later stages of the process. If you don’t have those
    details at this point that’s not really an issue, provided you can describe the
    general activities undertaken by the user. With this in place you can move on
    to the next step.


    ## Application Workflow


    There are many different ways to address the workflow of an application and each
    has its own unique purpose and value. From a design standpoint we are more concerned
    with workflow that identifies the decision logic, key interaction points, and
    navigational constructs required to move the user from point A to B. This is a
    user-centric view that defines the structure of an application by establishing
    the relationships of features and functionality as they are presented to the user.
    A well-defined workflow gives you an accurate map of your application, but it
    does not make any assumptions about the mechanics of the interactions that may
    drive it, or how functionality will be presented.


    ## Interaction Modeling


    This is where the rubber meets the road. Once you understand the basic workflow
    of your application and how those functional relationships are conceptually organized
    you can begin thinking through how these points of interaction are presented to
    the user.


    Interaction modeling defines the gross behavior of the application with the core
    interactions required of the user to accomplish the key tasks identified in your
    workflow. This may include management of screen real estate through visual user
    interface modalities (such as functional shifts driven by device orientation),
    the presentation of navigation, fundamental gestures, and any other information
    pertaining to the general operation of the user interface. To put it another way,
    interaction modeling defines how your application will operate, without determining
    specifically what the application will do.


    It’s through this activity that you can begin to craft the experience of your
    application. One workflow could spawn an infinite number of different interaction
    models, each functionally similar but with radically different experience layered
    into the application. You’ll see examples of this later in this chapter.


    # Process Details


    Now I’ll take you through the details of process, from thinking through your workflow,
    working out an interaction model, problem solving techniques, and more details
    on how to set the user experience you create apart from the crowd through the
    crafting of signature interaction.


    ## Thinking Through Workflow


    The definition of workflow is the essence of all interaction design activities.
    It is where you specify how the user will interact with your application. The
    problem is, workflow definition can be done at many different levels depending
    on what you are trying to achieve. There are circumstances where you may only
    need to define workflow in the most abstract sense, ignoring functional details
    and the specific interactions that may drive them. This may be valuable for mapping
    out the relationships of feature clusters and the general flow between them. On
    the opposite end of the spectrum are situations where you may need to define the
    logic of all interactions, events, and state changes the user may experience in
    an effort to provide a very clear picture of the operation of your application.


    For the purpose of the interaction modeling activities you want to have more detail
    than an abstract, high-level workflow, though you may not need to get too highly
    detailed either. The level of detail required for fleshing out your interaction
    model varies according to the nature of your application.'
