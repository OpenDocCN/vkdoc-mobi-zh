    computational experiences with entirely new scenarios where one is not limited
    to the home or office. There is an incredible opportunity to rethink how these
    devices, their software, and the data that feeds into them can augment various
    aspects of our lives—and not just limit their use to individual segments of our
    day. It is precisely this synthesis that is helping drive the extremely rapid
    growth and adoption of the iPhone and the powerful applications that it puts in
    the palm of your hand. It is through the understanding of this technological and
