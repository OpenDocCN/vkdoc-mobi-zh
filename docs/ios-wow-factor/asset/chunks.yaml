  trans: '

    #### 打造标志性交互


    主动寻求与潜在竞争对手差异化的思路，自然引出了对“标志性交互”的探讨。所谓标志性交互，是指一种独一无二且经过特意设计，让人能识别出你的应用、品牌或组织的交互方式。着手创造标志性交互是一项战略决策，需要作为整体用户体验战略的一部分来确定。本质上，此前所有关于交互建模方法的讨论，同样适用于定义标志性交互。


    实现标志性交互并非要在整个流程中应用额外技巧，它更多是一种针对最终解决方案的心态和设计目标。通过寻求差异化，你其实已经在着手定义标志性交互了，但截至目前，所有的思考都仅限于单个应用。如果你的组织规模较小，产品组合仅限于一款应用，那么方向是正确的。但如果你所在的组织拥有多款产品，就需要将系统级思维扩展到涵盖其他应用及其功能。这意味着，在交互建模活动中，你需要扩大解决问题的范围，以便了解你的决策对整个应用家族的影响。


    回顾我们之前完成的交互建模示例，可以说网格单元展开及其关联手势，或许能作为标志性交互。目前我们只考虑了解决文字对象截断问题，但让我们思考一些可能适用于更广泛概念的其他选项。假设我们现在正为一款应用进行设计，那么这种交互还能在哪些地方、以什么方式发挥作用？一个选择是将其用于导航。比方说，网格中的项目数组代表了应用中的主要功能节点。我们能否将网格单元的展开和展示作为导航机制？当然可以。


    ![图片](img/0611.jpg)


    **图 6-11.** 使用双指张开进行选择与导航。当超过特定阈值后，网格元素会持续展开，无需用户继续操作。


    这里的基本理念是“展开”这一概念。用户可以通过手指张开来展开一个网格单元，从而显示单元内隐藏的更多信息（见图 6-11）。如果用户的展开操作未超过预设阈值，当手指移开屏幕时，网格单元将自动回弹至原始大小。但如果用户将网格元素展开到超过预设阈值，该网格单元便会自动扩展至全屏大小，并显示该节点的功能（或者成为通往子节点的通道，从这种意义上说）。传统的导航方式可能只需用户点击网格中的某个单元，即可导航至应用中相应的节点。我认为我们可以同时支持这种操作：假设轻轻一点也能达到将网格单元展开至超过阈值的同样效果。


    现在我们开始在为该应用构建独特的交互模型。不同于 iPhone 操作系统层那种既包含离散节点又包含连续节点式体验的线性空间模型，我们现在拥有了一种由某些关键区域的弹性所定义的空间模型。用户无需在应用内从
    A 点移动到 B 点进行导航，而是仅在需要时、在需要的位置展现出功能。从工作流的角度看，这两种方式并无区别；但从体验的角度看，差异是彻底的。


    #### 文档记录


    记录交互模型是这一流程中的重要环节。你需要将想法记录下来，以便与设计及开发团队的其他成员分享和沟通。这有助于确保在执行概念、产出更详细的用户界面交付物时，你的愿景能被充分理解。


    你可以采用任何你喜欢的形式来记录文档，但务必确保涵盖两个基本要点：


    *  以清晰简洁的方式，直观地展示你的交互模型的特性。

    *  对交互模型中难以通过可视化轻松传达的细节，提供详尽的注释说明。


    请记住，你所展示的并非明确的用户界面处理方式，也不是像线框图中那样对控件的映射。这类交付物有意避免达到线框文档中那种细节程度。交互模型的焦点仅在于描述应用的整体行为，以便你能带着清晰的愿景，进入更细致的交互设计活动。


    以下是我们所完成示例的文档可能呈现的样子（见图 6-12）。


    ![图片](img/0612.jpg)


    **图 6-12.** 记录交互模型及其构成交互


    ### 案例研究与示例


    为了理解这些想法如何应用于设计问题，让我们将其应用于一个案例研究，并将其作为通用流程的工作模型。我将构建一个假设的组织和一款假设的软件产品，然后逐步讲解其思考过程、通用问题解决方法以及整体流程，最终得出一个引人注目的交互模型。


    #### X 公司


    假设我们有一个客户名为 X 公司，他们已经拥有一款成熟的桌面应用，在该利基市场中相当成功。X 公司认识到，要拓展业务，他们需要凭借一款 iPhone 应用进军移动市场。更为重要的是，他们的用户和投资者一直在施压，要求他们尽快在
    App Store 上架产品。


    这家公司找到了你——一位卓越的交互设计师——来帮助他们设计应用。他们向你阐述了需要在 App Store 一鸣惊人的需求。他们的一位主要竞争对手刚刚发布了一款
    iPhone 应用，因此 X 公司必须推出一款更优秀的应用来抢占市场。


    X 公司专注于娱乐领域，他们的桌面应用允许用户浏览和消费来自多个不同来源的内容。内容大部分是视频，但也需要涵盖音频文件和静态图片。X 公司非常自豪于他们能够精心策划并组织应用内的内容，以便用户轻松找到所需信息。这正是他们在竞争中脱颖而出的优势所在。


    然而，X 公司面临一个问题：虽然他们的桌面应用外观出色、性能良好，却难以轻松移植到 iPhone 应用上。因为应用中有太多的控件、按钮及其他用户界面组件，而这些全部是针对鼠标和光标交互设计的。导航内容的选项过多，这更是增加了用户体验的复杂性。内容组织的层级结构大部分为三层，但你也注意到有几个例外情况，其层级更深。

    '
- fmt: '### Company X’s Requirements


    With this knowledge in place you can begin to tackle the design problem. As I
    reviewed earlier, the first step in the process is about getting definition around
    the requirements for what the application needs to be able to do. After reviewing
    Company X’s desktop application and interviewing the key stakeholders for this
    project you learn that the iPhone app needs to do the following things:


    * Give users access to the company’s complete library of content.

    * Provide a mechanism for users to quickly and efficiently browse and discover
    new content.

    * Allow users to share content with their friends.

    * Allow users to comment on content.

    * Provide a mechanism for users to add their own content—captured or created on
    their iPhone—to Company X’s library to be shared with the world.


    Through the process of gathering requirements and the subsequent discussions with
    stakeholders, the team concludes that these are the right features to showcase
    in the iPhone app. And while this doesn’t represent all the functionality available
    from the desktop application, understanding the desires of the user through the
    personas and scenarios specific to the mobile context helps you filter everything
    down to these basic features.


    Now that you have these requirements in place, you can start thinking through
    how to organize the workflow for this app. To fully appreciate the possibilities
    enabled by interaction modeling, it’s worth spending some time getting into the
    details of how to arrive at your workflow definition and how far it needs to be
    developed.


    Reviewing Company X’s requirements for the iPhone app reveals something significant
    about the nature of the app. The vast majority of the requirements relate directly
    to browsing and consuming content. Ancillary features like sharing and commenting
    are directly dependent on there being content on screen for users to take action
    on. So you come to the conclusion that content is the central component to this
    user experience, and as such the relationship between content and the basic functionality
    of the app needs to be considered very carefully. Furthermore, in your discussions
    with the client you are getting a sense of the difficulty of the design problem.
    The vast majority of the interaction performed by the user focuses on navigating
    through hierarchical tiers of organization to get to the content.


    This is where things get a bit subjective. You can decide to include the hierarchical
    nature of the content organization and the required path that the user needs to
    take, or you can simplify that aspect of the workflow and isolate the browsing
    feature to a single node. Let’s take a quick look at the difference with a simple
    workflow reflecting what we understand about Company X’s requirements (see [Figure
    6-13](#Chapter06.html#fig_6_13)):


    ![images](images/0613.jpg)


    **Figure 6-13.** An explicit workflow compared to one that has been simplified


    This presents an interesting question: What is the rationale for being more explicit
    or less explicit in your workflow documentation? You always want to create explicit
    workflows when a user’s path through an application has a direct impact on your
    design decisions at the user interface level. If you know that the inherent structure
    of your workflow may be simplified by your design decisions at the user interface
    level, then it makes sense to collapse those details to a single node and not
    worry about including those details at the workflow level.


    In the case of Company X’s iPhone app, there is a requirement to provide a mechanism
    for users to quickly and efficiently browse and discover new content. So you know
    that at some point you are going to need to resolve the issue of hierarchy with
    a solution that is more appropriate for an iPhone. For the purposes of this application
    it makes sense to collapse browsing and content viewing down to a single node
    (see [Figure 6-14](#Chapter06.html#fig_6_14)). This begins to make more sense
    when we start to think through possible interaction models. With that said, let’s
    use this basic workflow to guide our modeling efforts.


    ![images](images/0614.jpg)


    **Figure 6-14.** Collapsing navigation to a single node knowing that the explicit
    navigation through a hierarchy may be simplified.


    With this basic workflow now in hand, we understand that one of the biggest design
    challenges for Company X is to figure out how to get users to the content in a
    way that makes sense for an iPhone app. This is where our interaction modeling
    activities come into play.'
  raw: '#### Company X’s Requirements


    With this knowledge in place you can begin to tackle the design problem. As I
    reviewed earlier, the first step in the processes is about getting definition
    around the requirements for what the application needs to be able to do. After
    reviewing Company X’s desktop application and interviewing the key stakeholders
    for this project you learn that the iPhone app needs to do the following things:


    *   Give users access to the company’s complete library of content.

    *   Provide a mechanism for users to quickly and efficiently browse and discover
    new content.

    *   Allow users to share content with their friends.

    *   Allow users to comment on content.

    *   Provide a mechanism for users to add their own content—captured or created
    on their iPhone—to Company X’s library to be shared with the world.


    Through the process of gathering requirements and the subsequent discussions with
    stakeholders, the team concludes that these are the right features to showcase
    in the iPhone app. And while this doesn’t represent all the functionality available
    from the desktop application, understanding the desires of the user through the
    personas and scenarios specific to the mobile context helps you filter everything
    down to these basic features.


    Now that you have these requirements in place, you can start thinking through
    how to organize the workflow for this app. To fully appreciate the possibilities
    enabled by interaction modeling, it’s worth spending some time getting into the
    details of how to arrive at your workflow definition and how far it needs to be
    developed.


    Reviewing Company X’s requirements for the iPhone app reveals something significant
    about the nature of the app. The vast majority of the requirements relate directly
    to browsing and consuming content. Ancillary features like sharing and commenting
    are directly dependent on there being content on screen for users to take action
    on. So you come to the conclusion that content is the central component to this
    user experience, and as such the relationship between content and the basic functionality
    of the app needs to be considered very carefully. Furthermore, in your discussions
    with the client you are getting a sense of the difficulty of the design problem.
    The vast majority of the interaction performed by the user focuses on navigating
    through hierarchical tiers of organization to get to the content.


    This is where things get a bit subjective. You can decide to include the hierarchical
    nature of the content organization and the required path that the user needs to
    take, or you can simplify that aspect of the workflow and isolate the browsing
    feature to a single node. Let’s take a quick look at the difference with a simple
    workflow reflecting what we understand about Company X’s requirements (see [Figure
