    # 交互建模：流程概览


    交互建模是一种方法，通过它你可以制定基本的交互机制和关键视觉交互，这些将构成应用体验的基础。交互建模流程包含四项关键任务，其中三项是必要的先导活动，第四项则是交互建模本身。我先从宏观层面逐一介绍这些任务，然后再深入探讨建模的考量因素、具体任务和示例。


    ## 需求定义


    首先，你必须至少对应用的功能需求有基本了解。这些需求可以表现为用户体验策略的一部分，也可以作为正式需求规格说明书的详细内容被记录下来。这些信息构成你所有后续设计活动的基础，因此你需要确保其处于稳定状态，并得到团队的一致认可。如果你在更敏捷的环境中工作，可以假设这些信息不那么固定，但在开始工作之前，你仍然需要掌握定义功能的关键需求。有了需求在手，你就可以开始构建合适的用例。


    ## 用例与场景开发


    用例，尤其是那些更偏向场景驱动的用例，是该流程的重要组成部分。一个好的用例应能让团队了解用户将经历的一般工作流程，以及各种需求如何在使用场景中被满足。有些用例可能会通过描述应用体验中不同节点的关键交互的场景叙述，提供明确的指导。请记住，一个用例——无论是否以场景形式表达——都只是一个起点。如果你对你的应用以及它如何向用户表现行为有愿景，那么你可以将其描述到你认为有助于指导后续流程的详细程度。如果你目前没有这些细节，只要能描述用户执行的一般活动，那也并非大问题。完成这一步后，你就可以进入下一阶段。


    ## 应用工作流


    处理应用工作流的方式有很多种，每种都有其独特的用途和价值。从设计角度来看，我们更关注的是能够识别决策逻辑、关键交互点以及将用户从 A 点导航至 B 点所需导航结构的工作流。这是一种以用户为中心的视角，通过建立向用户呈现的特性与功能之间的关系来定义应用结构。一个定义良好的工作流能为你提供一张准确的应用地图，但它不会对驱动应用的交互机制或功能如何呈现做出任何假设。


    ## 交互建模


    这是关键所在。一旦你理解了应用的基本工作流以及这些功能关系在概念上如何组织，你就可以开始思考这些交互点如何呈现给用户。


    交互建模定义了应用的总体行为，以及用户为完成工作流中确定的关键任务所需的核心交互。这可能包括通过可视化用户界面模式（例如由设备方向变化驱动的功能切换）来管理屏幕空间、导航的呈现、基本手势，以及与用户界面常规操作相关的任何其他信息。换句话说，交互建模定义了你的应用将如何运行，而不具体确定应用会做什么。


    正是通过这项活动，你可以开始打造应用体验。一个工作流可以衍生出无数种不同的交互模型，每种模型功能上相似，但应用却融入了截然不同的体验层次。在本章后续内容中，你将看到相关示例。


    # 流程细节


    现在，我将带你深入了解流程的细节，包括如何构思工作流、制定交互模型、解决问题的方法，以及如何通过打造标志性交互让你的用户体验设计脱颖而出等更多内容。


    ## 构思工作流


    工作流的定义是所有交互设计活动的核心。它规定了用户将如何与你的应用进行交互。问题是，工作流的定义可以根据你想要达到的目标在不同的层级上进行。在某些情况下，你可能只需要在最为抽象的意义上定义工作流，忽略功能细节以及驱动它们的特定交互。这对于勾勒功能集群之间的关系及其之间的通用流程可能很有价值。而在另一个极端，你可能需要定义用户可能经历的所有交互、事件和状态变化的逻辑，以便清晰地描绘出应用的操作方式。


    出于交互建模活动的目的，你需要比抽象的、高层级的工作流更详细的信息，尽管你可能也不需要过于细碎。充实交互模型所需的详细程度取决于你应用的性质。

    '
- fmt: '# Working Out an Interaction Model


    As I stated previously, interaction modeling is about working through concepts
    that define the gross behavior of the application and understanding how those
    gross behaviors may be applied or formulated to create a consistent and understandable
    model for the user. In [Chapter 2](#Chapter02.html#ch2) I reviewed “The Strange
    Topology of iOS,” which broke down the conceptual model and spatial model that
    are fundamental to the iOS user experience. The idea of the layered planes and
    the spatial model that the user moves through are what constitute the basic interaction
    model for iOS as a whole, and you can see from that example how powerful that
    thinking can be when approached in the right way (see [Figure 6-1](#Chapter06.html#fig_6_1)).


    ![images](images/0601.jpg)


    **Figure 6-1**. The iOS spatial model as experienced on an iPhone


    Getting started with interaction modeling requires you to start thinking in a
    deliberately abstract way. Without getting into the specifics of functionality
    or content, you need to think through the different behaviors that might be employed
    by your app to get an idea about how they may be used to control elements on the
    screen. iOS gives you an incredible palette of options to begin working with.
    Ideas like zoom, pan, flicking, sliding, and scrolling can all be applied to interesting
    effect, either by themselves or as compound effects to create some very different
    interactions.


    I’ve talked a lot about differentiation up to this point, and one of the biggest
    challenges that you will face is figuring out where and how to best differentiate
    the interactions contained within your app. Understanding how these types of ideas
    can be used is the essential benefit of interaction modeling; it’s the point where
    you are free to experiment and think through how those ideas can be applied to
    your design problem. Arriving at a differentiated solution is not all that difficult,
    but creating a solution that is scalable, extensible, and most importantly, understood
    by the user, takes a bit more effort.


    Let’s do a quick little exercise to understand how to break out of the box and
    think through some differentiated interactions. Start by thinking about a simple
    user interface widget; say, a list of items. List objects are fairly common to
    any user experience or user interface design effort and can be used for a number
    of purposes. Traditionally, a list is a vertical arrangement of text objects,
    where each text object is clearly delineated from the objects above and below
    it within a single column (see [Figure 6-2](#Chapter06.html#fig_6_2)).


    ![images](images/0602.jpg)


    **Figure 6-2.** A typical list


    Take a step back now and think about what a list is in the most abstract sense.
    It’s basically just an array of objects from which you can make a selection. It’s
    a pretty basic idea if you think about it. However, if you think about it some
    more, you’ll see that there’s nothing inherently critical to it being vertically
    arranged, nor is there any inherent value to it being organized in a single column.
    So you have to ask yourself, is there is an alternative format that can add value
    to the problem you are trying to solve? This may not be readily apparent, so it’s
    worth thinking through the options to see if anything interesting arises. For
    the purposes of this exercise let’s take a look at how this might play out.


    If we know or even just believe there’s no inherent value in the vertical aspect
    of a list, what would a horizontal solution look like (see [Figure 6-3](#Chapter06.html#fig_6_3))?


    ![images](images/0603.jpg)


    **Figure 6-3**. Experimental horizontal list options


    OK, this is interesting, but we can begin to see that there may be some issues
    with the amount of horizontal real estate available to us when the device is being
    held vertically. Is this a huge problem? Outside of any specific context, no,
    but it may not be very efficient for quick browsing given that you can’t see as
    many list items at once. It works a little better when the device is oriented
    horizontally, but it’s still not ideal.


    Let’s expand our thinking a bit and see where that takes us. The notion of a single
    column of list objects could be questioned too. If we expanded a list to be an
    array of objects or some kind of grid configuration, what advantages does that
    give us (see [Figure 6-4](#Chapter06.html#fig_6_4))?


    ![images](images/0604.jpg)


    **Figure 6-4.** Rethinking a list as a grid or array of objects


    This is now starting to get a bit more interesting. This configuration provides
    the advantage of being able to view many things simultaneously, which seems to
    be an improvement over a more conventional list. There are some drawbacks that
    we have to contend with here too. The amount of available area for the text objects
    is diminished, but that appears to manageable if we are willing to change the
    size of the text objects.


    Wow! We started with just the basic idea of the list and look where we ended up.
    With just some simple experimentation we were able to radically transform the
    basic idea of the widget. The development of this idea doesn’t need to end here,
    either; there are other dimensions we can begin to explore as well. Let’s think
    about the interaction behaviors associated with lists and list-type objects. In
    iOS a classic list object can be navigated with a quick flick up or down, or a
    slow drag to scroll to items beyond the boundaries of the screen. Is this behavior
    still relevant, and can it be applied to our grid experiment (see [Figure 6-5](#Chapter06.html#fig_6_5))?


    ![images](images/0605.jpg)


    **Figure 6-5.** Vertical scrolling applies to both solutions


    Sure it can! In this particular case the applicability of scrolling behavior is
    common sense, but that won’t always be the case. You will always need to evaluate
    the extant behavior of the interaction you are building upon to make sure that
    it is still valid within the new model.


    We’re still not done with this example. Now let’s apply the abstraction method
    to the behavior of the list. A standard iOS list object supports scrolling when
    needed, and that scrolling is limited to a single axis because of the orientation
    of the text objects in a vertical column. Given that we are no longer limiting
    ourselves to single vertical column of items, how can we apply scrolling behavior
    to this basic concept?


    ![images](images/0606.jpg)


    **Figure 6-6.** Multi-axis scrolling & row scrolling on a grid


    There are many ways scrolling behavior can be applied to this concept, all of
    which may be equally valid (see [Figure 6-6](#Chapter06.html#fig_6_6)). You can
    see from this series of examples how easy it is to formulate new ideas based on
    existing widgets and interactions. Using a list as your inspiration is just a
    start; there are many other ideas, widgets, and other elements that can be used
    in the same way. Deconstructing these can be a powerful way to design and flesh
    out some very compelling interactions for your application.'
