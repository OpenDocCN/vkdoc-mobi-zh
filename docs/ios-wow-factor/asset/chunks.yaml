  trans: '

    ### 关键技术


    作为设计师，你需要了解我确定的四项关键技术。这些技术可以归为两大类：第一类是在 iOS 中支持原生渲染的苹果技术；第二类是 `OpenGL`，这是一种支持底层
    GPU 使用的第三方技术。从设计的角度来看，理解这些技术的最佳方式是将原生渲染与常见的经典用户界面控件关联起来。将 `OpenGL` 与那些你可能在游戏场景中看到的高性能图形渲染、动画和交互关联起来。


    需要注意的是，这些技术并不仅限于其最初设定的使用场景。通过理解每种技术的本质，你可以知道如何最好地将你设计的体验变为现实。当你开始为应用构思独特的交互机制细节时，这一点将变得越来越重要。当你了解每种技术能实现什么功能时，你就会明白
    iOS 有多么强大，以及它作为设计师为你提供了无限可能。


    #### UIKit


    `UIKit` 是为任何 iOS 设备构建应用体验的核心框架。它本质上提供了所有在触摸屏设备上构建用户界面的工具和资源，并因此涵盖了你的应用可能需要的一切关键用户交互点。


    很有可能，`UIKit` 能实现你试图创建的 95% 的用户体验。该框架包含了你在使用 iOS 设备时通常会遇到的所有 UI 控件。这包括基本的按钮控件、滑块、文本字段、切换控件等等。除了我们都熟悉的标准控件外观外，`UIKit`
    还提供了大量根据需要自定义对象的机会，所以永远不要受到默认提供内容的限制。使用我将介绍的其他图形技术实现的自定义 UI 方案，最终都会由 `UIKit` 管理，因此它是一个非常灵活的框架，值得深入了解。


    除了能够使用你在设计中指定的所有成品图形（例如 `PNG` 文件这类光栅对象）外，`UIKit` 还能够程序化地渲染对象。换句话说，它可以按需按规范绘制对象。这些技术与你可能已经熟悉的许多矢量图形方法更为相似。在大多数情况下，这涉及定义一些基本的几何图形或路径，并对这些路径应用视觉属性以达到你想要的外观。对于那些考虑使用此方法的人，需要提醒一句：虽然使用程序化图形可以简化应用资源的生产工作，但你将需要与开发团队花费大量时间来定义属性并确保对象按需渲染。根据你希望创建的体验性质，以这种方式渲染某些
    UI 元素可能更有效。你需要与你的开发伙伴合作，决定在何时何地使用程序化技术最为合理。


    #### Core Graphics


    `Core Graphics` 是另一项非常有趣的技术，可用于为你的用户体验增加价值。`Core Graphics` 的核心是名为 `Quartz 2D`
    的二维渲染引擎，它可用于驱动应用内部的多种不同图形功能。它不仅可以用来动态绘制某些类型的图形，还可以作为一个功能齐全的图像引擎，为应用增加图形创建和编辑能力。


    从根本上讲，`Core Graphics` 是一项让你扩展应用功能的技术。然而，由于它提供了比 `UIKit` 更复杂的图形支持，如有需要，它也可用于创建用户界面元素。考虑到
    `UIKit` 为支持自定义图形提供了高度的灵活性，只有当你的设计需要某种复杂的图形变换、处理或实时合成时，`Core Graphics` 才会显得有用。


    #### Core Animation


    `Core Animation` 是一项专门为开发人员提供简单易行方案的技术，用于创建和渲染动态的视觉交互属性。换句话说，它就是让你的用户体验活起来。由于它专注于将动画集成到现有的用户界面对象中，`Core
    Animation` 与 `UIKit` 紧密协作，因此响应式控件和过渡的集成相对无缝。


    就其为开发人员提供的能力范围而言，`Core Animation` 实际上是一个非常强大的工具。我们都体验过许多应用中常见的美妙状态转换，但不要认为你只能局限于你目前在其他应用中看到的那些效果。这项技术让开发者能够在许多不同层面创建和控制可动画化的属性，因此，作为设计师，你应该认识到，创建独特且高度自定义的动画的可能性几乎是无限的。


    #### OpenGL ES


    `OpenGL ES` 与我这里回顾的其他技术不同，它是唯一正在使用的非苹果技术。`OpenGL ES` 本质上是一个 API，让你能够利用 iOS 设备中嵌入的硬件加速来渲染图形。它本身不能独立提供用户体验，必须与
    `Core Animation` 结合使用才能将内容呈现到屏幕上。


    同样，这是另一项用于渲染图形的强大技术，否则这些图形可能会给设备管理带来极大的负担。在大多数情况下，当需要实时渲染 3D 对象时，`OpenGL ES` 主要用于游戏场景。然而，由于它与其他上述技术的集成，不要认为它仅限于游戏图形的渲染。如果需要，完全可以在三维（3D）环境中渲染
    UI 对象，甚至是整个应用程序。


    是否需要在你的应用中集成这项技术，完全取决于你想要生成的视觉效果类型。有许多无需实时渲染对象就能创建 3D 图形外观的方法。除非你设计了一种需要在不受限的
    3D 空间中与 3D 对象进行实时交互的体验，否则你可能需要考虑其他方案。另一方面，你也许可以尝试使用这项技术，仅仅是为了了解那些尚未被充分探索或开发的新型视觉交互。在这种情况下，这项技术将为你提供一些非常有趣的、可供实验的能力。

    '
- fmt: '### Custom Skinning


    Maybe the section title should read, “To Custom Skin or Not To Custom Skin” because
    that seems to be a perennial question when considering the creation of an iPhone
    or iPad app. I think that this question may have been more common when the App
    Store originally launched. In a rush to get something into the App Store, product
    managers seemed to be willing to forego any significant design activities in an
    effort to compress development schedules. This is not so much the case now, but
    this still seems to be an issue for many organizations dipping their toes into
    the App Store for the first time.


    Understanding the value of a customized visual appearance can be a hurdle for
    some teams to get over. However, the rationale for making the decision to create
    and use customized assets is fairly simple. Building an application using the
    default objects provided by the SDK means that you will be using Apple’s visual
    identity to create your app. Your users will essentially have an Apple experience
    when all is said and done. This isn’t a bad thing, but if you want your experience
    to be recognizably representative of your own brand then this is probably not
    the right path to take.


    Apart from any philosophical or strategic reason to avoid a custom design solution,
    from what I’ve described so far, there really is no technical reason to avoid
    the integration of custom graphics throughout your app. Apple gives developers
    a number of different methods by which to do so and custom graphics are natural
    part of the overall development workflow.


    To be clear, this really isn’t a black and white discussion. You can integrate
    custom graphics in every area of your application, but that doesn’t mean that
    you have to customize everything. There will be situations where it may make more
    sense to leverage what the SDK provides by default. However, the design system
    as a whole will need to account for how you manage the integration of default
    controls with controls that have a custom appearance. This is not a technical
    issue, but rather one of user perception. You just need to make sure that the
    user does not see customized controls as being something apart from controls with
    a standard appearance, unless that is the effect you are trying to achieve.


    Beyond the simple re-skinning of common controls with new graphics, you also have
    the ability to design and create entirely new UI objects that support unique input
    and interaction. This isn’t so much about re-skinning as it is about wholesale
    reinvention. The HIG discourages this to a degree, not because it is difficult
    and time consuming to do, but because it introduces a barrier to understanding
    if the user has never encountered the control before. Generally speaking, that
    is good guidance, but the success or failure of a reinvented control is really
    only dependent on the design solution itself. Cryptic design solutions are obviously
    going to frustrate users no matter how cool they look, but an elegant solution
    that is easily identifiable in it’s operation will not be a problem.


    ### Universal Considerations


    The evolution and expansion of iOS devices over the past few years has created
    a shifting landscape that has presented a number of challengers for app designers
    and developers to contend with. Early on life was simple; we only had to design
    a solution for one device. With the introduction of the iPad things got a bit
    more complicated and we had to figure out how to put all that extra screen real
    estate to use. Design challenges notwithstanding, this presented a difficult situation
    for development teams because their efforts were essentially doubled when the
    need arose to deploy two apps simultaneously.


    Recently we’ve seen the introduction of Universal Apps within the app store. These
    are applications that can be run on any iOS device because they contain the necessary
    code to render the UI for both contexts. Universal Apps automatically know what
    device they are being run on and can reflect changes in the user experience accordingly.
    This is not only true for how the UI is rendered, but also by what functionality
    is available on the device.


    From a development perspective this is great news because this introduces significant
    efficiencies into the development process. From a design perspective you will
    still have to define precisely what those two different experiences are and make
    sure that your design solutions are appropriate for their respective platforms.
    However, knowing that you may be designing for two platforms simultaneously does
    provide some distinct advantages. Instead of trying to retrofit a design into
    a new platform (going either way) and thinking through how various design elements
    and interactions will be mapped in, you can account for appropriate consistency
    and appropriate variation up front. This approach can be important if you are
    targeting users who may experience your application on both devices.


    ### App versus Mobile Web Considerations


    There can be a lot of debate within organizations about the actual need for a
    native iOS application. With the current fragmentation of the mobile market it
    can be very challenging to dedicate resources to the creation of native applications
    for every relevant platform. For many, a mobile web experience is a viable solution
    to this problem. However, there are many significant issues associated with a
    mobile web solution that must be considered before moving forward.


    The first issue that must be recognized is the fact that there is a lack of parity
    between experiences delivered by the web and those rendered natively on the device.
    Although there are many technologies capable of rendering fairly compelling user
    experiences within the browser environment, none of them compare to what can be
    done in the native context. As I’ve reviewed before, Apple gives you access to
    some very powerful technologies that not only allow you to deliver highly customized
    and unique interactions, but it delivers those interactions at an unparalleled
    level of performance. A mobile web solution can only provide support for a limited
    subset of visual interactions that a native experience can deliver, and it does
    so at a fraction of the performance that a native app can provide. This isn’t
    necessarily a negative point, you’ll just have to make sure that your design solution
    is accounting for these limitations.


    I should also point out that the native versus mobile web argument is really not
    an either/or situation. The nature of iOS is such that these experiences can be
    hybridized. A user experience for a native application may span both native elements
    and web-based elements as a single cohesive experience. This allows you, when
    needed, to access to best of both worlds: the power and dynamism of native UI
    rendering and the flexibility and ease of maintenance of web-based experiences.


    Your solution will ultimately depend on the functional requirements of your application
    and the desired user experience needed to manifest those functions. Any discussion
    about the implementation of your application experience should be done from that
    perspective first, and not because of any arbitrary bias toward one technology
    or another.'
