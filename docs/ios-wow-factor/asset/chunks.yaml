  trans: '

    ### 自定义外观设计


    或许这一节的标题应该写成“自定义外观，做还是不做”，因为这在考虑开发 iPhone 或 iPad 应用时似乎是一个永恒的问题。我认为，这个问题在 App Store
    刚上线时可能更为常见。为了急于将产品上架，产品经理们似乎愿意放弃任何重要的设计活动，以压缩开发周期。现在情况虽已有所好转，但对于许多初次涉足 App Store
    的组织来说，这仍然是一个问题。


    理解自定义视觉外观的价值对某些团队来说可能是一个需要跨越的障碍。然而，决定创建并使用自定义资源的理由其实相当简单。使用 SDK 提供的默认对象来构建应用，意味着你将在使用苹果的视觉标识来创建你的应用。当一切尘埃落定时，你的用户本质上是获得了一种苹果式的体验。这并非坏事，但如果你希望你的体验能清晰地代表你自己的品牌，那么这或许不是正确的道路。


    除了出于理念或策略上的原因而避免采用自定义设计方案外，根据我目前所描述的，其实并没有技术上的理由来阻止你在整个应用中集成自定义图形。苹果为开发者提供了多种实现方法，自定义图形也是整个开发流程中自然而然的一部分。


    需要明确的是，这真的不是一个非黑即白的讨论。你可以在应用的每个区域集成自定义图形，但这并不意味着你必须自定义所有内容。在某些情况下，利用 SDK 默认提供的控件可能更有意义。然而，整个设计系统需要考虑到你将如何管理默认控件与自定义外观控件的集成。这并非技术问题，而是关乎用户的感知。你只需要确保用户不会将自定义控件视为与标准外观控件不同的东西，除非这正是你想要达到的效果。


    除了简单地为通用控件替换新图形外，你还可以设计和创建全新的、支持独特输入和交互的 UI 对象。这与其说是“换肤”，不如说是彻底地“重塑”。HIG 在某种程度上不鼓励这样做，这并不是因为它困难且耗时，而是因为如果用户从未见过这种控件，它就会成为理解的障碍。一般来说，这是个很好的指导原则，但一个被重塑的控件的成败，实际上仅取决于设计方案本身。无论看起来多酷，晦涩的设计方案显然会让用户感到沮丧，而一个操作上易于识别的优雅方案则不会成为问题。


    ### 通用性考量


    过去几年中 iOS 设备的演进和扩展创造了一个不断变化的格局，给应用设计师和开发者带来了许多挑战。早期情况很简单：我们只需要为一个设备设计方案。随着 iPad
    的推出，情况变得复杂了一些，我们得搞清楚如何利用所有额外的屏幕空间。抛开设计挑战不谈，这给开发团队带来了困境，因为当需要同时部署两个应用时，他们的工作量基本翻倍了。


    最近，我们看到 App Store 中引入了通用应用。这类应用可以在任何 iOS 设备上运行，因为它们包含了为两种设备环境渲染 UI 所需的代码。通用应用能自动识别其在哪种设备上运行，并相应地调整用户体验。这不仅体现在
    UI 的渲染方式上，也体现在设备上可用的功能上。


    从开发角度来看，这是个好消息，因为它为开发流程带来了显著的效率提升。从设计角度来看，你仍然需要精确定义这两种不同的体验是什么，并确保你的设计方案适合各自的平台。然而，知道你可能会为两个平台同时进行设计，也确实提供了一些独特的优势。与其试图将一个设计强行塞入一个新平台（无论方向如何），并思考各种设计元素和交互将如何映射进去，不如在设计之初就考虑到适当的一致性和适当的差异。如果你的目标用户可能会在两个设备上体验你的应用，这种方法就很重要。


    ### 原生应用与移动网页考量


    组织内部对于是否真的需要原生 iOS 应用可能会有很多争论。鉴于目前移动市场碎片化的现状，为每个相关平台投入资源创建原生应用非常具有挑战性。对许多人来说，移动网页体验是解决此问题的可行方案。然而，在继续推进之前，必须考虑与移动网页解决方案相关的许多重要问题。


    首先必须认识到的一个问题是，网页提供的体验与设备原生渲染的体验之间缺乏对等性。尽管有许多技术能够在浏览器环境中呈现相当引人入胜的用户体验，但没有一种能与原生环境下的表现相媲美。正如我之前回顾过的，苹果让你能够使用一些非常强大的技术，这些技术不仅让你可以提供高度定制化和独特的交互，而且能以无与伦比的性能水平交付这些交互。移动网页解决方案只能支持原生体验所能提供的一小部分可视化交互，并且其性能也远不及原生应用。这并非否定性的观点，你只需要确保你的设计方案考虑到了这些限制。


    我还应该指出，原生应用与移动网页之争其实并非一个二选一的情况。iOS 的特性使得这些体验可以混合在一起。原生应用的用户体验可以跨越原生元素和基于网页的元素，构成一个统一的整体体验。这让你在需要时能够两全其美：既能拥有原生
    UI 渲染的强大和动态性，又能享有基于网页的体验的灵活性和易于维护性。


    你的最终方案将取决于应用的功能需求，以及实现这些功能所需的理想用户体验。任何关于应用体验实施方式的讨论，都应首先从这个角度出发，而不是因为对某种技术存在武断的偏见。

    '
- fmt: '### Summary


    Apple provides four key technologies for delivering the interactions that drive
    the user experience of applications:


    - `UIKit`: This is the framework that will be responsible for delivering the vast
    majority of your user experience.

    - `Core Graphics`: A two-dimensional rendering engine that can add graphic creation
    and editing functionality to an app. It may also be used to support the rendering
    of user interface elements when appropriate.

    - `Core Animation`: `Core Animation` works closely with `UIKit` to add dynamic
    visual interaction to user interface elements.

    - `OpenGL ES`: A third-party technology that taps into the integrated hardware
    acceleration embedded in iOS devices. `OpenGL ES` provides high-performance graphics
    capabilities for 2D and 3D object rendering.


    With all of the graphics capabilities inherent to iOS, do not be afraid to customize
    graphics, design unique interactions, or experiment with object behaviors.


    Apple now gives you the ability to combine iPhone and iPad user experiences into
    a single application to simplify deployment and maintenance. However, you will
    still need to undertake design efforts to define the two different user experiences.
    The main design advantage being the ability to define greater UX continuity for
    both devices up front, as opposed to retrofitting one design solution to another
    device.


    ![images](images/ch06.jpg)


    ## Interaction Modeling and the Creation of Novel Concepts


    This chapter really gets to the heart of what this book is about. Up to this point
    I have provided the background information necessary for understanding the design
    decisions that will determine the user experience of your application. The questions
    now are, how do you go about making the design decisions that will differentiate
    your application from those of your competitors, and how do you arrive at the
    breakthrough ideas that will set you apart? This chapter will walk you through
    the basic process, the key points of consideration, and the critical techniques
    that will ultimately get you the Wow factor that you seek.


    This is not a simple formula, and you will not automatically arrive at a magical
    and amazing application when you are done. The process requires hard work, analytical
    thinking, and a touch of creativity. If you are willing to provide all of that,
    you have a great shot a creating a breakthrough application.


    ### What Is Wow?


    We need to start by trying to define what "Wow factor" actually is. The term is
    not really a working concept in the design lexicon; rather, it''s an expression
    of users'' favorable reaction to a unique or especially engaging application.
    While the use of this term may be problematic from a design perspective, it does
    a decent job of reflecting the gut response that users experience, and it is generally
    a reaction that we can all relate to at one level or another. But that still doesn''t
    answer the question.


    In relation to the interaction of an iOS app, Wow factor can be defined as being
    an expression of the engagement layer of your application when that engagement
    exceeds a critical emotional threshold for the user. That threshold is ultimately
    dependent on the user, and as such is difficult to predict or determine without
    clearly understanding the personas to be targeted. However, we can discuss the
    nature of that emotional threshold and the key factors needed for that threshold
    to be crossed. These factors are as follows:


    - **Immediacy of impact:** A design must be able to elicit an immediate response
    from the user.

    - **Recognition of novelty or identifiable difference:** A user must be able to
    recognize the novelty of a given design, or at least identify it as being different
    from a more conventional experience.

    - **Positive response:** There must be an inherent appeal to the solution that
    mitigates the shock of a potentially strange or foreign experience.


    When these three factors are in place the user will easily cross the emotional
    threshold required to achieve the affective quality of Wow.


    It''s important to recognize that the idea of Wow and the contributing factors
    that determine it can be influenced by the attributes exhibited by a particular
    design solution. These attributes often work in concert toward a greater effect
    and often are not solely responsible for creating the response that you want.
    However, we can isolate these attributes in order to identify their unique contributions
    to user experience:


    - **Appearance:** This describes the cosmetic attributes of a given design solution
    as expressed through the screen structure, layout, rendering, and other elements
    comprising the static-state visuals of an app.

    - **Interaction mechanics and behavior:** This refers to the physical interaction,
    unique gestures, and general input required to engage with the user interface
    elements of an application.

    - **Visual interaction, motion, and animation:** These refer to the reactive or
    dynamic elements of a design solution that bring it to life. These may be closely
    associated with a particular interaction through feedback or reactivity to user
    input, but this also accounts for ambient qualities within a design, or even transitory
    states not directly related to an interaction.


    It is possible to achieve a Wow reaction by focusing on only one of these dimensions
    and executing it very well. There are certainly examples out there where this
    is the case. An application may lack any kind of compelling interactivity, but
    may be so beautiful in its appearance that the other attributes don''t factor
    into a user''s perception in any appreciable way. On the other hand, an application
    may have a minimal appearance that on its own has no overt visual appeal, yet
    it may also offer such compelling interaction mechanics or visual interaction
    characteristics that it achieves the desired response from the user on those attributes
    alone.


    It is a high-risk proposition to depend on a single attribute to get you across
    that emotional threshold with users. It''s important to note that the three attributes
    just described are not necessarily equally weighted when it comes to iOS devices.
    An attractive-looking application is a table stakes proposition for the user,
    so it will be difficult to exceed their expectations on this front. Additionally,
    there is nothing inherent to the iOS platform that presents a differentiated means
    of experiencing the visual nature of your app. While their displays are fantastic
    compared with other smart phones, they are not significantly different from a
    decent-quality desktop display.


    The attributes that provide the most opportunity for Wow are the interaction mechanics
    and behavior inherent to your application experience. This is based on the fact
    that iOS devices provide methods of control and interaction that are fundamentally
    different from other types of digital experiences that the user might be familiar
    with. As I discussed in [Chapter 3](#Chapter03.html#ch3), users have a desire
    to experience something new and different with these devices, and by paying close
    attention to interaction mechanics, you can give them the experience they want.


    However, bearing in mind that the interaction mechanics of an app is the attribute
    to focus on, you still can''t ignore appearance and visual interaction since they
    are all part of the same experiential continuum. The main point is that you should
    focus on mechanics or behavior first, and that will help inform how you solve
    for the other two remaining attributes.'
  raw: '### Summary


    Apple provides four key technologies for delivering the interactions that drive
    the user experience of applications:


    *   **UIKit:** This is the framework that will be responsible for delivering the
    vast majority of your user experience.

    *   **Core Graphics:** A two-dimensional rendering engine that can add graphic
    creation and editing functionality to an app. It may also be used to support the
    rendering of user interface elements when appropriate.

    *   **Core Animation:** Core Animation works closely with UIKit to add dynamic
    visual interaction to user interface elements.

    *   **OpenGL ES:** A third-party technology that taps into the integrated hardware
    acceleration embedded in iOS devices. OpenGL ES provides high-performance graphics
    capabilities for 2D and 3D object rendering.


    With all of the graphics capabilities inherent to iOS, do not be afraid to customize
    graphics, design unique interactions, or experiment with object behaviors.


    Apple now gives you the ability to combine iPhone and iPad user experiences into
    a single application to simplify deployment and maintenance. However, you will
    still need to undertake design efforts to define the two different user experiences.
    The main design advantage being the ability to define greater UX continuity for
    both devices up front, as opposed to retrofitting one design solution to another
    device.


    ## ![images](images/ch06.jpg)


    ## **Interaction Modeling and the Creation of Novel Concepts**


    This chapter really gets to the heart of what this book is about. Up to this point
    I have provided the background information necessary for understanding the design
    decisions that will determine the user experience of your application. The questions
    now are, how do you go about making the design decisions that will differentiate
    your application from those of your competitors, and how do you arrive at the
    breakthrough ideas that will set you apart? This chapter will walk you through
    the basic process, the key points of consideration, and the critical techniques
    that will ultimately get you the Wow factor that you seek.


    This is not a simple formula, and you will not automatically arrive at a magical
    and amazing application when you are done. The process requires hard work, analytical
    thinking, and a touch of creativity. If you are willing to provide all of that,
    you have a great shot a creating a breakthrough application.


    ### What Is Wow?


    We need to start by trying to define what “Wow factor” actually is. The term is
    not really a working concept in the design lexicon; rather, it’s an expression
    of users’ favorable reaction to a unique or especially engaging application. While
    the use of this term may be problematic from a design perspective, it does a decent
    job of reflecting the gut response that users experience, and it is generally
    a reaction that we can all relate to at one level or another. But that still doesn’t
    answer the question.


    In relation to the interaction of an iOS app, Wow factor can be defined as being
    an expression of the engagement layer of your application when that engagement
    exceeds a critical emotional threshold for the user. That threshold is ultimately
    dependent on the user, and as such is difficult to predict or determine without
    clearly understanding the personas to be targeted. However, we can discuss the
    nature of that emotional threshold and the key factors needed for that threshold
    to be crossed. These factors are as follows:


    *   **Immediacy of impact:** A design must be able to elicit an immediate response
    from the user.

    *   **Recognition of novelty or identifiable difference:** A user must be able
    to recognize the novelty of a given design, or at least identify it as being different
    from a more conventional experience.

    *   **Positive response:** There must be an inherent appeal to the solution that
    mitigates the shock of a potentially strange or foreign experience.


    When these three factors are in place the user will easily cross the emotional
    threshold required to achieve the affective quality of Wow.


    It’s important to recognize that the idea of Wow and the contributing factors
    that determine it can be influenced by the attributes exhibited by a particular
    design solution. These attributes often work in concert toward a greater effect
    and often are not solely responsible for creating the response that you want.
    However, we can isolate these attributes in order to identify their unique contributions
    to user experience:


    *   **Appearance:** This describes the cosmetic attributes of a given design solution
    as expressed through the screen structure, layout, rendering, and other elements
    comprising the static-state visuals of an app.

    *   **Interaction mechanics and behavior:** This refers to the physical interaction,
    unique gestures, and general input required to engage with the user interface
    elements of an application.

    *   **Visual interaction, motion, and animation:** These refer to the reactive
    or dynamic elements of a design solution that bring it to life. These may be closely
    associated with a particular interaction through feedback or reactivity to user
    input, but this also accounts for ambient qualities within a design, or even transitory
    states not directly related to an interaction.


    It is possible to achieve a Wow reaction by focusing on only one of these dimensions
    and executing it very well. There are certainly examples out there where this
    is the case. An application may lack any kind of compelling interactivity, but
    may be so beautiful in its appearance that the other attributes don’t factor into
    a user’s perception in any appreciable way. On the other hand, an application
    may have a minimal appearance that on its own has no overt visual appeal, yet
    it may also offer such compelling interaction mechanics or visual interaction
    characteristics that it achieves the desired response from the user on those attributes
    alone.


    It is a high-risk proposition to depend on a single attribute to get you across
    that emotional threshold with users. It’s important to note that the three attributes
    just described are not necessarily equally weighted when it comes to iOS devices.
    An attractive-looking application is a table stakes proposition for the user,
    so it will be difficult to exceed their expectations on this front. Additionally,
    there is nothing inherent to the iOS platform that presents a differentiated means
    of experiencing the visual nature of your app. While their displays are fantastic
    compared with other smart phones, they are not significantly different from a
    decent-quality desktop display.


    The attributes that provide the most opportunity for Wow are the interaction mechanics
    and behavior inherent to your application experience. This is based on the fact
    that iOS devices provide methods of control and interaction that are fundamentally
    different from other types of digital experiences that the user might be familiar
    with. As I discussed in [Chapter 3](#Chapter03.html#ch3), users have a desire
    to experience something new and different with these devices, and by paying close
    attention to interaction mechanics, you can give them the experience they want.


    However, bearing in mind that the interaction mechanics of an app is the attribute
    to focus on, you still can’t ignore appearance and visual interaction since they
    are all part of the same experiential continuum. The main point is that you should
    focus on mechanics or behavior first, and that will help inform how you solve
    for the other two remaining attributes.'
