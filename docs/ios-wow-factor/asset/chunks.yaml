    there are still issues that we need to address. The previous interaction model
    didn’t support navigation back up the hierarchy effectively, so that’s something
    that we’ll want to address this time. There was also the issue of categorical
    context observed in the desktop application; that is, it was hard to determine
    where you were, not to mention the fact that you had to back all the way out to
    the top level to dive into another category. Let’s walk through a model that may
    address these issues.


    ![images](images/0617.jpg)


    **Figure 6-17.** A typical list with unique interactions. The user can swipe left
    to reveal a list of tier 2 objects hidden under the original list element.


    Ok, we have a solution here that at first glance appears to be a fairly straightforward
    list of categories that can be browsed by scrolling up and down. However, this
    one departs from the standard iOS list treatment in many ways. Navigation through
    the first two tiers is managed within the same basic view. If a user selects a
    list element, instead of navigating to another screen, the next tier of subcategories
    is revealed within the list element itself (see [figure 6-17](#Chapter06.html#fig_6_17)).
    So basically we just implemented a state change to the list item to expose another
    tier of navigation within the available area. A user can scroll within that region
    to browse the subcategories, while context is maintained by the category label
    that appears above the region. At the same time the user still has visibility
    of and access to the top-level categories.


    Triggering the state change to the list element could be accomplished with a deliberate
    swipe to the left directly on the list item itself, or we could designate a discrete
    target to trigger the reveal animation that displays the subcategories. If we
    decide to implement this design it would be worth exploring both options to get
    a sense of which interaction feels more natural and which is less prone to user
    error.


    This model presents a very efficient browsing technique, with the main benefit
    of providing a user access to the first two tiers in the hierarchy simultaneously,
    but there are some significant challenges here as well. Constraining the browsing
    of subcategories to a smaller portion of the screen is not inherently efficient,
    especially if we can only see a maximum of two items at a time. To add to that,
    this particular model only addresses navigation to the subcategory level; the
    content tier would need to use another model that could leverage the maximum amount
    of real estate. So again, this solution may not be viable for Company X’s application.


    Is there a way to deliver the same level of navigational flexibility to the user,
    while allowing for the greater prominence of the available content? The previous
    design solution also uses a disproportionate amount of real estate to display
    the top-level categories, which feels a bit counterintuitive. And let’s also try
    to shoot for a solution that provides convenient one-handed access. Remember,
    the requirement states that we need to provide the user with a means to quickly
    and efficiently browse their content.


    Let’s continue to work with the list concept, but this time let’s think about
    adding some different properties to the list that may make browsing a bit more
    fluid. In this case, there isn’t a notion of a discrete state change on the screen.
    It’s a more dynamic solution that is responsive to interaction from the user.


    ![images](images/0618.jpg)


    **Figure 6-18.** Combining tier 1 & tier 2 objects to provide faster access to
    content. A user scrolls vertically through tier 1 and horizontally through tier
    2.


    This concept is a bit different from the others in that in its initial state we
    reserved some space for both dedicated navigation and the other core functionality
    that needs to be accounted for. You’ll notice that I do not illustrate those particular
    features in the model. The reason for this is straightforward: an interaction
    modeling exercise does not and should not need to demonstrate all details of the
    application. The main purpose of the effort is to help you begin to formulate
    the high-level interactions that will form the basis of your application experience.
    With that in mind, you need to focus your efforts on resolving content browsing
    first, while providing high-level considerations for the ancillary interactions.


    This model begins with an initial state that displays a limited amount of top-level
    categories, leaving room for a utility region that will come in handy when we
    map out the rest of the user interface later in the project. Top-level categories
    are only treated as a labels in this model, giving users immediate access to second-tier
    organization. User can quickly move among all top-level categories while viewing
    the second level (see [Figure 6-18](#Chapter06.html#fig_6_18)). This gives users
    nonlinear access to all categorical organization.


    Exposing additional categories from the initial state of the app only requires
    a user to scroll the array of objects to the top of the screen. As the categories
    reach their boundary limit on the screen they collapse to make room for the display
    of additional categories. The user does not have to take any direct action to
    cause a category to collapse; categories will collapse automatically based on
    their position on the screen. The effect is something like the bellows on an accordion.


    Content browsing at the subcategory level maps nicely to this model too. When
    the user selects a subcategory in the first view, they are transitioned to grid
    of content that can either support additional content categorization like we see
    in the top level, or an unlabeled grid (see [Figure 6-19](#Chapter06.html#fig_6_19)).
    Viewing content only requires the user to make a selection on the grid, at which
    point they are taken to a full-screen view of the content.


    ![images](images/0619.jpg)


    **Figure 6-19.** In this model, content can be exposed with a single touch.


    Navigation back up the hierarchy is managed at the top of the screen. For the
    purposes of this model it could be as simple as a back button, or as complex as
    a breadcrumb trail. The important thing is, from the perspective of an interaction
    model, that we have a mechanism to account for navigation controls.


    With this solution in hand, we can now go back to the key stakeholders at Company
    X and walk them through this model. The interaction model documentation does an
    excellent job explaining the benefits of these interactions from a user’s perspective,
    and at the same time demonstrates how this application can be differentiated from
    the competition. This is all accomplished without having to produce detailed wireframes,
    design mockups, or functional prototypes.


    Now that you understand the basic process, and have seen what it can enable, please
    work through some concepts on your own and see where it takes you.'
  trans: '

    # 应用详情


    为了更深入地理解内容浏览的性质，你决定调查公司 X 的桌面应用。你发现他们通过提供大约十个通用顶级类别来引导用户完成浏览过程。在每个顶级类别下，大约有 100
    个子类别。选择子类别后，你可以看到内容对象，据你观察，数量可达数千个。


    桌面应用使用的交互模型非常直接。你看到一个选项网格，每个主要类别都占据网格中的一个单元。选择一个类别后，网格会刷新，显示子类别项目。选择一个子类别后，网格再次刷新，显示你可继续可视化浏览的内容对象，此时你可以在该子类别所含内容对象的多个页面之间导航。


    你还注意到，该应用在管理这种空间导航时有些笨拙。虽然有全局导航的概念，但它只在你至少深入一层体验时才出现。当深入到内容级别时，你只能访问顶级类别。在你看来，这是一个重大疏忽：用户如果不完全退出，就无法导航回上一级或切换到其他类别。此外，在内容级别，用户缺乏上下文信息；浏览内容对象时，并不清楚你当前处于哪个子类别。


    需要特别指出的是，当你经历这样的过程（例如审查现有应用或其他用户体验）时，你应该记得花时间记录你的观察和想法。你的笔记可能对指导新交互模型的开发大有裨益。正如我们在本章早期的实验中看到的，即便是看似微不足道的想法种子，也可以毫不费力地扩展成一个更大的概念。在某些情况下，你可能希望将基于这些观察得出的一些基础性思考纳入你的交互建模文档中，以支持你可能提出的想法。


    就本案例研究而言，你应特别记录公司 X 内容层次结构的性质，因为这很可能对你的解决方案的性质产生重大影响。因此，在审查应用后，你感觉到他们的内容结构可以这样理解（参见图
    6-15）：


    ![images](img/0615.jpg)


    **图 6-15.** 公司 X 的内容结构及其对对象浏览的影响


    这似乎是整体结构的准确呈现。你注意到当前交互模型的一个根本问题是，用户必须始终退出层次结构的第三层，才能回到子类别或类别导航。这似乎不太对劲。但这只是冰山一角。你仍然不确定这种网格模型是否适用于
    iPhone 体验，但鉴于导航模型的视觉特性，你决定尝试一下。


    鉴于我们已经构想了一个网格概念，让我们尝试重复利用这个概念。让我们使用之前尝试过的相同的交互机制，并将其应用于在层次结构中移动的概念（参见图 6-16）。


    ![images](img/0616.jpg)


    **图 6-16.** 显示导航到第二层对象的网格概念


    这个模型与现有应用体验有非常密切的关系，因为它明确使用了对象网格。这可能对已经熟悉桌面应用的用户有利。然而，在这个模型中，我们必须应对平台的限制，特别是屏幕尺寸，因此我们将主视图限制为二乘二的配置。在桌面应用中，网格是十乘至少十五，具体取决于你应用窗口的宽度。


    与我们创建的其他示例一样，这个模型可以支持展开手势或简单的点击来向下导航类别。在这种情况下，我们稍微不同地使用了展开阈值。我们不是将该阈值设置得相对较高以创建中间状态，而是希望展开阈值非常低。一旦系统解读到手势，我们就希望过渡到下一个类别。


    这个交互模型的关键在于用户穿越层次结构时呈现的视觉过渡。我们希望内容感觉像是嵌套在其子类别中，而子类别又嵌套在其顶级类别中。当你展开一个单元时，你会看到底层内容浮现并填充空间。这非常直接地代表了信息在应用内的组织方式，并且极大地帮助向用户呈现一个非常清晰的模型。


    不幸的是，这个模型存在一些问题，其中最不严重的是关于向上导航回层次结构的问题。你可以使用反向手势向上导航一层，但这至少可以说显得不整洁且笨拙。因此，尽管这个概念具有一些非常有趣的视觉交互潜力，但这些交互并不能很好地映射到应用的需求上。换句话说，这个解决方案不可扩展；这是我们需要警惕的重大危险信号之一。


    另一个担忧是，该模型代表了一个双手操作的解决方案，意味着用户必须一只手拿着手机，用另一只手来导航应用。这未必是坏事，但考虑到我们最终为之设计的移动场景，这并非理想解决方案。


    那么，我们还可以探索哪些其他替代方案呢？让我们再次退后一步，思考一下列表的可能性。列表非常适合单手操作，并且可以结构化地非常简单地管理层次级别的导航。这一事实使得它们在
    iPhone 上的应用几乎是普遍适用的解决方案，但这将是一种差异化程度非常低的解决方案。有没有不同的方式来处理这个新的列表概念？


    我们之前将列表概念推向了极端，所以也许这次我们可以更直接一些，想办法包含一些额外的价值。我们不需要为了与众不同而差异化，至少在还有需要解决的问题时不必如此。之前的交互模型没有有效地支持向上返回层次结构的导航，所以这次我们需要解决这个问题。桌面应用中还观察到类别上下文的问题；也就是说，很难确定你当前的位置，更不用说你必须完全退回到顶层才能进入另一个类别了。让我们仔细分析一个可能解决这些问题的模型。


    ![images](img/0617.jpg)


    **图 6-17.** 一个具有独特交互的典型列表。用户可以向左滑动，以显示隐藏在原始列表元素下的第二层对象列表。


    好的，我们这里有一个解决方案，乍一看是一个相当简单的类别列表，可以通过上下滚动来浏览。然而，这个方案在许多方面偏离了标准的 iOS 列表处理方式。前两层的导航在同一个基本视图中管理。如果用户选择一个列表元素，不会导航到另一个屏幕，而是列表元素本身会显示下一层子类别（参见图
    6-17）。所以，基本上我们只是对列表项实现了一个状态变化，以在可用区域内暴露另一层导航。用户可以在这个区域内滚动浏览子类别，同时通过出现在该区域上方的类别标签来保持上下文。与此同时，用户仍然可以看到并访问顶级类别。


    触发列表元素的状态变化可以通过直接在列表项上向左滑动来完成，或者我们可以指定一个离散的目标来触发显示子类别的展开动画。如果我们决定实现这个设计，有必要探索这两种选项，以了解哪种交互感觉更自然，哪种更不容易出错。


    这个模型呈现了一种非常高效的浏览技术，其主要优点是使用户能够同时访问层次结构的前两层，但这里也存在一些显著的挑战。将子类别的浏览限制在屏幕的较小部分本身效率不高，尤其是当我们一次最多只能看到两个项目时。除此之外，这个特定的模型只处理到子类别级别的导航；内容层需要使用另一个可以利用最大可用空间的模型。因此，这个解决方案可能同样不适用于公司
    X 的应用。


    有没有一种方法既能向用户提供同样级别的导航灵活性，又能让可用内容占据更显著的位置？先前的设计方案还使用了不成比例的屏幕空间来显示顶级类别，这感觉有点违反直觉。让我们也尝试找到一个提供方便单手操作的解决方案。请记住，需求说明我们需要为用户提供一种快速高效浏览其内容的方法。


    让我们继续在列表概念上工作，但这一次，我们来思考为列表添加一些不同的属性，这些属性可能使浏览更流畅。在这种情况下，屏幕上没有离散状态变化的概念。这是一个更动态的解决方案，能够响应用户的交互。


    ![images](img/0618.jpg)


    **图 6-18.** 结合第一层和第二层对象以提供更快的内容访问。用户垂直滚动浏览第一层，水平滚动浏览第二层。


    这个概念与其他概念略有不同，因为在其初始状态中，我们为专用导航和其他需要考虑的核心功能预留了一些空间。你会注意到我没有在该模型中说明那些特定的功能。原因很简单：交互建模练习并不需要也不应该展示应用的所有细节。这项工作的主要目的是帮助你开始构思将构成应用体验基础的高级交互。考虑到这一点，你需要集中精力首先解决内容浏览问题，同时为辅助交互提供高级考虑。


    这个模型从一个初始状态开始，显示有限数量的顶级类别，为一个实用区域留出空间，该区域在我们项目后期规划其余用户界面时会派上用场。在这个模型中，顶级类别仅被视为标签，为用户提供对第二层组织的即时访问。用户可以在查看第二层的同时快速浏览所有顶级类别（参见图
    6-18）。这为用户提供了对所有类别组织的非线性访问。


    要从应用的初始状态暴露更多类别，用户只需将对象数组滚动到屏幕顶部。当类别到达其在屏幕上的边界极限时，它们会折叠起来，为显示其他类别腾出空间。用户无需采取任何直接操作来让类别折叠；类别会根据其在屏幕上的位置自动折叠。其效果类似于手风琴的风箱。


    子类别级别的内容浏览也能很好地映射到这个模型。当用户在第一视图中选择一个子类别时，他们会被过渡到一个内容网格，该网格可以支持像我们在顶层看到的额外内容分类，也可以是一个无标签的网格（参见图
    6-19）。查看内容只需用户在网格上做出选择，然后他们就会进入内容的全屏视图。


    ![images](img/0619.jpg)


    **图 6-19.** 在这个模型中，只需一次触摸即可展示内容。


    向上返回层次结构的导航在屏幕顶部管理。就本模型而言，这可以简单如一个返回按钮，也可以复杂如一个面包屑导航路径。重要的是，从交互模型的角度来看，我们有一个机制来处理导航控制。


    有了这个解决方案，我们现在可以回到公司 X 的关键利益相关者那里，向他们详细解释这个模型。交互模型文档出色地从用户角度解释了这些交互的好处，同时展示了该应用如何与竞争对手区分开来。所有这些都是在无需制作详细线框图、设计原型或功能原型的情况下完成的。


    既然你已经了解了基本流程，并看到了它能实现什么，请自行练习一些概念，看看它能带你走到哪里。

    '
- fmt: '### Summary


    #### Wow Factor


    Achieving a sense of Wow for your application means that you are attempting to
    produce a design solution that evokes a specific response from the user. That
    response can be defined as the point at which the user’s engagement with your
    app exceeds a critical emotional threshold. There are three basic objectives that
    your design must satisfy to ensure that the emotional threshold is crossed:


    - **Immediacy of impact:** A design must be able to elicit an immediate response
    from the user.

    - **Recognition of novelty or identifiable difference:** A user must be able to
    recognize the novelty of a given design, or at least identify it as being different
    from a more conventional experience.

    - **Positive response:** There must be an inherent appeal to the solution that
    mitigates the shock of a potentially strange or foreign experience.


    Those objectives can be achieved when your design executes well on at least one
    of these three attributes:


    - **Appearance:** This describes the cosmetic attributes of a given design solution
    as expressed through the screen structure, layout, rendering, and other elements
    comprising the static-state visuals of an app.

    - **Interaction mechanics and behavior:** This refers to the physical interaction
    or unique gestures and other actions required to engage with the user interface
    elements of an application.

    - **Visual interaction, motion, and animation:** These refer to the reactive or
    dynamic elements of a design solution that bring it to life. These may be closely
    associated with a particular interaction mechanic or behavior by way of feedback
    or reactivity to user input, but they also account for ambient qualities within
    a design or even transitory states not directly related to an interaction.


    It’s possible to achieve your goal by focusing on just one attribute, but you
    are more likely to have success by striving to address all three.


    #### Interaction Modeling


    Interaction modeling is a method by which you can formulate fundamental interaction
    mechanics and key visual interactions that will serve as the basis for your application
    experience. This can be broken down into four key linear activities, where the
    first three activities must be established before continuing with the interaction
    modeling itself:


    - **Requirement definition**

    - **Use-case and/or scenario development**

    - **Application workflow**

    - **Interaction modeling**


    It can be a challenge to create a highly differentiated interaction model, but
    there are some basic techniques to make the process more productive:


    - **Abstract:** Reduce known interactions, user interface widgets, and other interactive
    components to their base-level logic.

    - **Reformulate and reapply:** Use the base-level logic to reformulate a visual
    interaction and explore how that can be put to use by your application.

    - **Validate:** Explore the validity of that interaction against an existing workflow.

    - **Resolve:** Address any conceptual conflict and interaction limitations of
    your interaction by thinking through alternative mappings to space, time, and
    state, and modify them accordingly.

    - **Extend:** Look for means by which your interaction can be extended across
    all functional areas of your application.

    - **Record:** Document your thought process and notate your explorations extensively.

    - **Repeat:** Repeat the process until you are satisfied.

    - **Document:** Create clear documentation that describes and visually illustrates
    your emerging interaction model.


    ![images](images/ch07.jpg)


    ### Control Mapping and Touchscreen Ergonomics


    Touchscreens are certainly much more commonplace than they were a few years ago,
    but even with their mainstream adoption there is still a lack of understanding
    as to how to properly account for the physical interaction with these devices.
    There are many apps out there that have very cool features, but which are so poorly
    designed from an ergonomic perspective that it astounds me. These apps might seem
    intriguing enough to download, but are so awkward and uncomfortable to use that
    they will quickly be deleted off the user’s device. Don’t let that happen to you!
    It’s worth spending some time reviewing a few basic considerations to keep in
    mind when designing for an iPhone or iPad. If you take the time to understand
    the ideas outlined in this chapter, you’ll have a solid foundation for making
    the right design decisions moving forward.


    #### Awareness of Physicality


    Much that has been reviewed in this book so far has been concerned with creating
    breakthrough ideas and concepts, but this chapter diverges from those concerns
    to address some basic principles that will help ensure the success of your application.


    Many of you may be designing for the mobile space for the first time, but are
    otherwise fairly experienced in application design in other environments. Apart
    from a comprehensive understanding of input and output constraints, designing
    for mobile devices means that you have to be aware of the physicality and kinesiology
    associated with the manipulation of these devices. If you have designed or developed
    for the Web, or designed client-side applications, I would imagine that you never
    gave a thought to how a user’s physical interaction with the input devices would
    affect your design. This is because the interaction with desktop systems is largely
    taken for granted. The basic format of keyboard, display, and mouse hasn’t changed
    much at all in the past 30 years. Those are essentially fixed hardware inputs
    that you have had little or no control over, so there was certainly no need to
    account for the ergonomics of the mouse while worrying about the workflow of your
    application.


    Transitioning to mobile devices requires you to expand your design thinking beyond
    traditional boundaries. Instead of using fixed hardware inputs to control an application,
    we now have a situation where we can manifest controls in a virtual environment
    with a high degree of flexibility. The basic input is touch, but that touch can
    be directed at any number of controls, taking any form, at any location. It’s
    almost as if in addition to your design activities focused on the application,
    you are now responsible for redesigning the keyboard and mouse—for every application
    you create! This opens up a lot of options to you as a designer, and not all of
    those options are good.'
  raw: '### Summary


    #### Wow Factor


    Achieving a sense of Wow for your application means that you are attempting to
    produce a design solution that evokes a specific response from the user. That
    response can be defined as the point at which the user’s engagement with your
    app exceeds a critical emotional threshold. There are three basic objectives that
    your design must satisfy to ensure that the emotional threshold is crossed. These
    are as follows:


    *   **Immediacy of impact:** A design must be able to elicit an immediate response
    from the user.

    *   **Recognition of novelty or identifiable difference:** A user must be able
    to recognize the novelty of a given design, or at least identify it as being different
    from a more conventional experience.

    *   **Positive response:** There must be an inherent appeal to the solution that
    mitigates the shock of a potentially strange or foreign experience.


    Those objectives can be achieved when your design executes well on at least one
    of these three attributes:


    *   **Appearance:** This describes the cosmetic attributes of a given design solution
    as expressed through the screen structure, layout, rendering, and other elements
    comprising the static-state visuals of an app.

    *   **Interaction mechanics and behavior:** This refers to the physical interaction
    or unique gestures and other actions required to engage with the user interface
    elements of an application.

    *   **Visual interaction, motion, and animation:** These refer to the reactive
    or dynamic elements of a design solution that bring it to life. These may be closely
    associated with a particular interaction mechanic or behavior by way of feedback
    or reactivity to user input, but they also account for ambient qualities within
    a design or even transitory states not directly related to an interaction.


    It’s possible to achieve your goal by focusing on just one attribute, but you
    are more likely to have success by striving to address all three.


    #### Interaction Modeling


    Interaction modeling is a method by which you can formulate fundamental interaction
    mechanics and key visual interactions that will serve as the basis for your application
    experience. This can be broken down into four key linear activities, where the
    first three activities must be established before continuing with the interaction
    modeling itself.


    *   **Requirement definition**

    *   **Use-case and/or scenario development**

    *   **Application workflow**

    *   **Interaction modeling**


    It can be a challenge to create a highly differentiated interaction model, but
    there are some basic techniques to make the process more productive.


    *   **Abstract:** Reduce known interactions, user interface widgets, and other
    interactive components to their base-level logic.

    *   **Reformulate and reapply:** Use the base-level logic to reformulate a visual
    interaction and explore how that can be put to use by your application.

    *   **Validate:** Explore the validity of that interaction against an existing
    workflow.

    *   **Resolve:** Address any conceptual conflict and interaction limitations of
    your interaction by thinking through alternative mappings to space, time, and
    state, and modify them accordingly.

    *   **Extend:** Look for means by which your interaction can be extended across
    all functional areas of your application.

    *   **Record:** Document your thought process and notate your explorations extensively.

    *   **Repeat:** Repeat the process until you are satisfied.

    *   **Document:** Create clear documentation that describes and visually illustrates
    your emerging interaction model.


    ## ![images](images/ch07.jpg)


    ## **Control Mapping and Touchscreen Ergonomics**


    Touchscreens are certainly much more commonplace than they were a few years ago,
    but even with their mainstream adoption there is still a lack of understanding
    as to how to properly account for the physical interaction with these devices.
    There are many apps out there that have very cool features, but which are so poorly
    designed from an ergonomic perspective that it astounds me. These apps might seem
    intriguing enough to download, but are so awkward and uncomfortable to use that
    they will quickly be deleted off the user’s device. Don’t let that happen to you!
    It’s worth spending some time reviewing a few basic considerations to keep in
    mind when designing for an iPhone or iPad. If you take the time to understand
    the ideas outlined in this chapter, you’ll have a solid foundation for making
    the right design decisions moving forward.


    ### Awareness of Physicality


    Much that has been reviewed in this book so far has been concerned with creating
    breakthrough ideas and concepts, but this chapter diverges from those concerns
    to address some basic principles that will help ensure the success of your application.


    Many of you may be designing for the mobile space for the first time, but are
    otherwise fairly experienced in application design in other environments. Apart
    from a comprehensive understanding of input and output constraints, designing
    for mobile devices means that you have to be aware of the physicality and kinesiology
    associated with the manipulation of these devices. If you have designed or developed
    for the Web, or designed client-side applications, I would imagine that you never
    gave a thought to how a user’s physical interaction with the input devices would
    affect your design. This is because the interaction with desktop systems is largely
    taken for granted. The basic format of keyboard, display, and mouse hasn’t changed
    much at all in the past 30 years. Those are essentially fixed hardware inputs
    that you have had little or no control over, so there was certainly no need to
    account for the ergonomics of the mouse while worrying about the workflow of your
    application.


    Transitioning to mobile devices requires you to expand your design thinking beyond
    traditional boundaries. Instead of using fixed hardware inputs to control an application,
    we now have a situation where we can manifest controls in virtual environment
    with a high degree of flexibility. The basic input is touch, but that touch can
    be directed at any number of controls, taking any form, at any location. It’s
    almost as if in addition to your design activities focused on the application,
    you are now responsible for redesigning the keyboard and mouse—for every application
    you create! This opens up a lot of options to you as a designer, and not all of
    those options are good.'
  trans: '

    ### 摘要


    #### 惊艳因素


    为你的应用营造惊艳感，意味着你正在尝试设计一种能够引发用户特定反馈的解决方案。这种反馈可以定义为用户与应用的互动超越某个关键情感阈值的时刻。要确保跨越这一情感阈值，你的设计必须满足三个基本目标：


    - **即时冲击力：** 设计必须能够立即引发用户的反应。

    - **新颖性或可辨识差异的认知：** 用户必须能够识别出特定设计的新颖性，或至少察觉其与传统体验的不同之处。

    - **积极反馈：** 解决方案必须具有内在吸引力，以缓解可能因陌生或奇特体验带来的冲击。


    当你的设计在以下三个属性中至少有一个表现出色时，就能实现上述目标：


    - **外观：** 这描述了特定设计方案的美学属性，通过屏幕结构、布局、渲染以及其他构成应用静态视觉的元素来体现。

    - **交互机制与行为：** 这指的是与应用程序界面元素交互所需的物理操作、独特手势或其他动作。

    - **视觉交互、动态与动画：** 这些指代设计方案中赋予其生命力的响应式或动态元素。它们可能通过用户输入的反馈或响应，与特定的交互机制或行为紧密相关，但也涵盖了设计中的环境氛围，甚至与交互无直接关联的过渡状态。


    专注于单个属性也能实现目标，但力求兼顾三者则更有可能成功。


    #### 交互建模


    交互建模是一种方法，通过它你可以制定出构成应用体验基础的基本交互机制和关键视觉交互。这可以分解为四个关键的线性活动，在进行交互建模本身之前，必须先完成前三项：


    - **需求定义**

    - **用例和/或场景开发**

    - **应用工作流**

    - **交互建模**


    创建一个高度差异化的交互模型颇具挑战，但有一些基本技巧可以使过程更高效：


    - **抽象化：** 将已知的交互、用户界面控件及其他交互组件还原至其基础逻辑层面。

    - **重构与复用：** 利用基础逻辑重构视觉交互，并探索如何在你的应用中加以运用。

    - **验证：** 对照现有工作流检验该交互的可行性。

    - **解决：** 通过思考空间、时间和状态的其他映射方案，解决交互中的概念冲突及限制，并相应地进行修改。

    - **扩展：** 寻找能够将你的交互扩展到应用所有功能领域的方法。

    - **记录：** 记录你的思考过程，并广泛地记录你的探索。

    - **重复：** 重复此过程，直到满意为止。

    - **归档：** 创建清晰的文档，以文字描述并辅以视觉方式说明你逐渐成型的交互模型。


    ![images](img/ch07.jpg)


    ### 控件映射与触摸屏人体工学


    触摸屏无疑比几年前更为普及，但即便已成为主流，对于如何正确处理与这些设备的物理交互，人们仍然缺乏足够的理解。市面上许多应用拥有非常酷的功能，但从人体工学角度来看，其设计之糟糕令人震惊。这些应用或许看起来足够吸引人而让人下载，但使用起来却如此别扭和不舒服，以至于很快就会被用户从设备上删除。别让这种情况发生在你身上！在为
    iPhone 或 iPad 进行设计时，花点时间回顾一些基本的考量因素是非常值得的。如果你花时间理解了本章概述的概念，你将拥有一个坚实的基础，从而做出正确的设计决策。


    #### 对物理性的认知


    本书到目前为止所讨论的内容，大多关注于创造突破性的想法和概念，但本章将偏离这些关注点，转而探讨一些基本原则，这些原则将有助于确保你的应用成功。


    你们许多人可能是首次为移动领域进行设计，但在其他环境下的应用设计方面已有相当丰富的经验。除了全面了解输入和输出的限制之外，为移动设备进行设计还意味着你必须意识到与操作这些设备相关的物理性和运动机能学。如果你曾为
    Web 或客户端应用进行过设计或开发，我想你大概从未考虑过用户与输入设备的物理交互会如何影响你的设计。这是因为与桌面系统的交互在很大程度上被视为理所当然。键盘、显示器和鼠标的基本形态在过去
    30 年间几乎没有改变。这些基本上是固定的硬件输入，你对此几乎没有控制权，因此你当然无需在担心应用工作流的同时，还要考虑鼠标的人体工学。


    过渡到移动设备要求你将设计思维拓展到传统边界之外。我们现在面对的情况是，不再使用固定的硬件输入来控制应用，而是在虚拟环境中以高度灵活性来呈现控件。基本输入方式是触摸，但这种触摸可以指向任意数量的、任何形式、任何位置的控件。这几乎相当于，除了专注于应用本身的设计活动之外，你现在还需要为所创建的每一个应用重新设计键盘和鼠标！这为设计师打开了众多可能性，但并非所有这些选择都是好的。

    '
- fmt: '### iPhone


    iPhone 小巧的外形使其易于单手掌握，它是当代移动计算的精髓。用户可单手操控所有实体按键。设备上四个按钮和一个开关的物理控件布局经过了深思熟虑。这些实体控件的摆放位置暗示了设备只有一种主要握持方式，尽管我们知道实际情况并非如此。


    鉴于你正试图创建差异化的交互模型，你很有可能找到一个能满足所有目标、但最终使用起来并不舒适或实用的潜在方案。如图 7-1 至 7-6 所示，iPhone 存在六种基本握持模式，你在设计应用时应始终加以考虑。这并不意味着你的应用布局需要适配每一种模式（尽管能做到会很好），而是说你的设计至少应针对一种握持模式进行优化。


    ![images](images/0701.jpg)


    图 7-1：单手竖持iPhone。


    ![images](images/0702.jpg)


    图 7-2：单手辅助竖持iPhone。


    ![images](images/0703.jpg)


    图 7-3：双手竖持iPhone。


    ![images](images/0704.jpg)


    图 7-4：单手横持iPhone。


    ![images](images/0705.jpg)


    图 7-5：单手辅助横持iPhone。


    ![images](images/0706.jpg)


    图 7-6：双手横持iPhone。


    显然，握持和操作iPhone的方式远不止这六种，但我认为它们代表了最可能遇到的典型场景。每种握持方式都可能影响控件的布局或手势机制的设计。用户手部位置和设备方向会对交互的整体效率产生巨大影响。尽早并频繁地尝试所有这些握持姿势，以了解它们如何影响或改变你的设计方案。


    ### iPad


    在物理交互方面，iPad 呈现出略有不同的情况。iPad 明显大于 iPhone，正如我在第 4 章中介绍的那样，它针对的是不同的使用场景，这很可能对其最终形态起到了决定性作用。我们知道
    iPad 更侧重于休闲导向的计算体验。这种体验通常需要用户投入更长的使用时间，这给我们带来了以下需要应对的场景：


    - 这是一款更大的设备

    - 它被用于更长时间的使用


    这两个因素意味着，很少有 iPad 会被单手使用的场景。我并不是说不可能单手使用（尤其是在放在平面上时），但所有双手使用的场景要重要得多。让我们看看图 7-7
    至 7-10 中所展示的双手使用模式：


    ![images](images/0707.jpg)


    图 7-7：竖持 iPad（单手辅助）。


    ![images](images/0708.jpg)


    图 7-8：竖持 iPad（双手握持）。


    ![images](images/0709.jpg)


    图 7-9：横持 iPad（单手辅助）。


    ![images](images/0710.jpg)


    图 7-10：横持 iPad（双手握持）。


    与 iPhone 一样，在设计时需要留意控件位置与用户可能握持设备方式之间的关系。


    ### 基本布局考量


    我在第 2 章中简要提到了尺寸和间距的概念，但由于这是一个非常重要的主题，值得更详细地回顾，以便你能就用户界面的布局和控件的呈现方式做出明智决策。澄清一下，我所说的“控件”是指所有出现在
    iOS 设备屏幕上的可交互对象。


    在设计任何基于触摸的控件时，有两个基本因素需要考虑：


    - **尺寸**：所设计控件的触摸区域大小

    - **间距**：该控件与周围其他用户界面元素的接近程度


    这些概念同样适用于 iPhone 和 iPad，并且在某种程度上与显示分辨率无关。之所以说“某种程度上”，是因为 iPad 和 iPhone 的整体分辨率密度已经足够高，分辨率不再是一个关键因素。


    因此，我们有两个基本关注点：目标尺寸和目标间距。在 iPhone 时代之前，我会对触摸目标的大小给出非常明确的建议。直到几年前，传统的观点还认为，触摸目标不能小于某个特定的最小尺寸，否则会给用户带来严重的可用性问题。这个最小尺寸通常被定为
    1 cm² 到 1.5 cm² 之间。想想看，那是一个相当大的按钮，比 iOS 的应用图标还要大。此外，当时的建议还要求触摸目标之间也应间隔相同的最小面积；也就是说，每个轴向上至少有
    1 厘米的间隙。这有其原因。驱动某些较旧触摸屏系统的技术并不那么精确。在许多情况下，触摸感应机制在空间上与实际显示屏存在偏移。为了拥有可用的系统，你必须考虑各种可能的差异，包括触摸传感器未对齐以及偏移表面带来的视差。此外，用户也需要心理上的保障，即控件足够大，看起来易于触摸。


    幸运的是，我们不再需要处理所有这些问题了。然而，你仍然需要注意尺寸和间距，以免给用户带来过多挑战。尺寸本身并不是一个大问题。iOS 设备中使用的电容式触摸技术高度精确且分辨率高。你可能在
    iPhone 上浏览网页时已经注意到了这一点。即使不放大视图，你也能用小指边缘点击网页上那些很小的链接。因此，我并不想对触摸目标的最小尺寸过于教条，至少不能脱离实际情况。理解间距才是关键所在。


    间距之所以重要，是因为触摸目标彼此越近，用户出错的可能性就越大。这应该是常识。但同样，我认为我们也不需要对手间距绝对教条，因为在我看来，绝对数值既不实用也不相关。


    以下是考虑控件间距的方式：


    - **触摸目标之间的间距应与相邻目标的大小成反比（见图 7-11）。**


    ![images](images/0711.jpg)


    图 7-11：触摸目标之间的间距应与相邻目标的大小成反比。


    也就是说，触摸目标越大，它们之间的排列可以越紧密。反之，触摸目标越小，它们之间的间距应该越大。较小的目标更难点击，当密集排列在一起时，容易导致用户操作失误。大的目标易于点击，因此可以排列得更紧密，用户出错的概率也更低。


    所以，尽管去尝试：把按钮做成单个像素那么大也可以，只是要知道，当一切尘埃落定时，它很可能就是屏幕上唯一的按钮！'
  raw: '#### iPhone


    The iPhone’s smaller-scale form factor is easily held in hand. It is the essence
    of contemporary mobile computing. A user can hold the device and manipulate all
    of the hard controls with one hand. Much thought went into the placement of the
    four buttons and one switch that constitute the physical controls on the device.
    The placement of those hard controls suggests that there is only one primary modality
    for holding the device, although we know that actually isn’t the case.


    Given the fact that you are trying to create a differentiated interaction model,
    there’s a good chance that you could arrive at a potential solution that meets
    all of your objectives, but is ultimately uncomfortable or impractical to use.
    There are six basic grip patterns, shown in [Figures 7-1](#Chapter07.html#fig_7_1)
    to [7-6](#Chapter07.html#fig_7_6), for an iPhone that you always want to consider
    when designing your app. This doesn’t mean that your application layout needs
    to account for each one of these, though that would be great if it could. It just
    means that your design should work well with at least one grip in mind.


    ![images](images/0701.jpg)


    Figure 7-1\. One handed vertical iPhone use.


    ![images](images/0702.jpg)


    Figure 7-2\. Vertical iPhone use with a free hand.


    ![images](images/0703.jpg)


    Figure 7-3\. Vertical iPhone use with two hands.


    ![images](images/0704.jpg)


    Figure 7-4\. One handed horizontal iPhone use.


    ![images](images/0705.jpg)


    Figure 7-5\. Horizontal iPhone use with a free hand.


    ![images](images/0706.jpg)


    Figure 7-6\. Horizontal iPhone use with two hands.


    Obviously there are more ways to hold and interact with an iPhone than just the
    six positions outlined here, but I believe these six are representative of the
    most likely scenarios that you can expect to encounter. Each of these grips may
    influence the placement of controls or how you decide to structure the mechanics
    of a gesture. The position of the user’s hands and the orientation of the device
    can make a huge difference in the overall efficiency of an interaction. Experiment
    early and often with all of these different positions to get an understanding
    of how they might influence or alter your design solution.


    #### iPad


    The iPad presents a slightly different situation when it comes to physical interaction.
    An iPad is significantly larger than an iPhone, and as I reviewed in [Chapter
    4](#Chapter04.html#ch4), it’s targeted toward a different use-case that likely
    contributed significantly to determining its final form factor. We know that the
    iPad is focused more on a leisure-oriented computing experience. That type of
    experience often requires longer periods of engagement on the part of the user.
    This gives us the following scenario to contend with:


    *   It’s a larger device.

    *   It’s used for longer periods of time.


    These two factors imply that there are very few scenarios where an iPad will be
    used with just one hand. I’m not saying that it’s impossible to use with one hand,
    especially if it’s resting on a surface, but all of the two-handed scenarios are
    much more relevant. Let’s take a look at what those are in [Figures 7-7](#Chapter07.html#fig_7_7)
    to [7-10](#Chapter07.html#fig_7_10):


    ![images](images/0707.jpg)


    Figure 7-7\. Vertical iPad use with a free hand..


    ![images](images/0708.jpg)


    Figure 7-8\. Vertical iPad use with two hands.


    ![images](images/0709.jpg)


    Figure 7-9\. Horizontal iPad use with a free hand.


    ![images](images/0710.jpg)


    Figure 7-10\. Horizontal iPad use with two hands.


    As with the iPhone, be cognizant of your control positioning relative to how a
    user may be handling the device.


    ### Basic Layout Considerations


    I touched briefly on the ideas of scale and proximity in [Chapter 2](#Chapter02.html#ch2),
    but since this is such an important topic it’s worth reviewing in greater detail
    so you can make an informed decision about the layout of your user interface and
    how you manage the presentation of controls. Just to clarify, when I say control,
    I’m referring to any interactive object that appears on the screen of an iOS device.


    There are two basic factors you need to take into consideration when designing
    any touch-based control:


    *   **Scale:** The size of the target area for the control that you are designing.

    *   **Proximity:** How close that control is to the other user interface elements
    surrounding it.


    These ideas apply equally to both the iPhone and the iPad and are somewhat independent
    of display resolution. I say “somewhat” because the overall resolution density
    of the iPad and iPhone is high enough that resolution isn’t really a factor anymore.


    So we have these two basic concerns, target size and target proximity. Before
    the iPhone era, I would be making some pretty explicit recommendations about the
    size of your touch targets. Up until just a few years ago it was conventional
    wisdom up that touch targets could not be smaller than a specific minimum size
    without causing significant usability issues for the user. This minimum size was
    usually quoted to be something between 1 cm² to 1.5 cm². If you think about it,
    that’s a pretty big button, bigger than the app icons in iOS. To add to this,
    it was often recommended that touch targets be spaced apart by that same minimal
    area as well; in other words, spaced with a minimum gap of 1 cm on each axis.
    There was a reason for this. The technologies that drove some of the older touchscreen
    systems were not all that accurate. In many cases, the mechanism sensing touch
    was offset spatially from the actual display itself. To have a usable system you
    had to account for all kinds of possible discrepancies, including misaligned touch
    sensors and the parallax associated with an offset surface. Adding to that was
    the concern that users needed the psychological assurance of larger controls that
    appeared comfortably touchable.


    Luckily we don’t have to deal with all that anymore. However, you still want to
    be considerate of scale and proximity so as not to create too many challenges
    for the user. Scale is not so much an issue unto itself. The capacitive technology
    used in iOS devices is highly accurate and highly resolved. You’ve probably noticed
    this when browsing the Web on your iPhone. Even without enlarging the view, you
    can still tap those tiny little links on a web page with the edge of your pinkie
    finger. So I don’t necessarily want to be dogmatic about the minimum size of a
    touch target, at least not in a vacuum. The key to this is the understanding of
    proximity.


    Proximity is important just for the fact that the closer touch targets are to
    one another, the greater the chance of error on the part of the user. I think
    that’s pretty much common sense. But again, I don’t think we need to get dogmatic
    about spacing distance either because I don’t believe absolute values are useful
    or even relevant, for that matter.


    Here’s how you need to think about control spacing:


    *   **The spacing between touch targets should be inversely proportional to the
    size of the adjacent targets (see [Figure 7-11](#Chapter07.html#fig_7_11)).**


    ![images](images/0711.jpg)


    Figure 7-11\. The spacing between touch targets should be inversely proportional
    to the size of the adjacent targets.


    That is, the greater the size of your touch targets, the closer they can be grouped
    together. Conversely, as your touch targets get smaller, they should be spaced
    farther apart. Smaller targets are more difficult to hit, and when mapped together
    in a dense configuration they will be prone to user error. Large targets are easy
    to hit, so they can be spaced closer together with less risk of user error.


    So have at it: make a button as big a single pixel, just know that it may be the
    only button on the screen when all is said and done!'
  trans: '

    ### iPhone


    iPhone 小巧的外形使其易于单手掌握，它是当代移动计算的精髓。用户可单手操控所有实体按键。设备上四个按钮和一个开关的物理控件布局经过了深思熟虑。这些实体控件的摆放位置暗示了设备只有一种主要握持方式，尽管我们知道实际情况并非如此。


    鉴于你正试图创建差异化的交互模型，你很有可能找到一个能满足所有目标、但最终使用起来并不舒适或实用的潜在方案。如图 7-1 至 7-6 所示，iPhone 存在六种基本握持模式，你在设计应用时应始终加以考虑。这并不意味着你的应用布局需要适配每一种模式（尽管能做到会很好），而是说你的设计至少应针对一种握持模式进行优化。


    ![images](img/0701.jpg)


    图 7-1：单手竖持 iPhone。


    ![images](img/0702.jpg)


    图 7-2：单手辅助竖持 iPhone。


    ![images](img/0703.jpg)


    图 7-3：双手竖持 iPhone。


    ![images](img/0704.jpg)


    图 7-4：单手横持 iPhone。


    ![images](img/0705.jpg)


    图 7-5：单手辅助横持 iPhone。


    ![images](img/0706.jpg)


    图 7-6：双手横持 iPhone。


    显然，握持和操作 iPhone 的方式远不止这六种，但我认为它们代表了最可能遇到的典型场景。每种握持方式都可能影响控件的布局或手势机制的设计。用户手部位置和设备方向会对交互的整体效率产生巨大影响。尽早并频繁地尝试所有这些握持姿势，以了解它们如何影响或改变你的设计方案。


    ### iPad


    在物理交互方面，iPad 呈现出略有不同的情况。iPad 明显大于 iPhone，正如我在第 4 章中介绍的那样，它针对的是不同的使用场景，这很可能对其最终形态起到了决定性作用。我们知道
    iPad 更侧重于休闲导向的计算体验。这种体验通常需要用户投入更长的使用时间，这给我们带来了以下需要应对的场景：


    - 这是一款更大的设备

    - 它被用于更长时间的使用


    这两个因素意味着，很少有 iPad 会被单手使用的场景。我并不是说不可能单手使用（尤其是在放在平面上时），但所有双手使用的场景要重要得多。让我们看看图 7-7
    至 7-10 中所展示的双手使用模式：


    ![images](img/0707.jpg)


    图 7-7：竖持 iPad（单手辅助）。


    ![images](img/0708.jpg)


    图 7-8：竖持 iPad（双手握持）。


    ![images](img/0709.jpg)


    图 7-9：横持 iPad（单手辅助）。


    ![images](img/0710.jpg)


    图 7-10：横持 iPad（双手握持）。


    与 iPhone 一样，在设计时需要留意控件位置与用户可能握持设备方式之间的关系。


    ### 基本布局考量


    我在第 2 章中简要提到了尺寸和间距的概念，但由于这是一个非常重要的主题，值得更详细地回顾，以便你能就用户界面的布局和控件的呈现方式做出明智决策。澄清一下，我所说的“控件”是指所有出现在
    iOS 设备屏幕上的可交互对象。


    在设计任何基于触摸的控件时，有两个基本因素需要考虑：


    - **尺寸**：所设计控件的触摸区域大小

    - **间距**：该控件与周围其他用户界面元素的接近程度


    这些概念同样适用于 iPhone 和 iPad，并且在某种程度上与显示分辨率无关。之所以说“某种程度上”，是因为 iPad 和 iPhone 的整体分辨率密度已经足够高，分辨率不再是一个关键因素。


    因此，我们有两个基本关注点：目标尺寸和目标间距。在 iPhone 时代之前，我会对触摸目标的大小给出非常明确的建议。直到几年前，传统的观点还认为，触摸目标不能小于某个特定的最小尺寸，否则会给用户带来严重的可用性问题。这个最小尺寸通常被定为
    1 cm² 到 1.5 cm² 之间。想想看，那是一个相当大的按钮，比 iOS 的应用图标还要大。此外，当时的建议还要求触摸目标之间也应间隔相同的最小面积；也就是说，每个轴向上至少有
    1 厘米的间隙。这有其原因。驱动某些较旧触摸屏系统的技术并不那么精确。在许多情况下，触摸感应机制在空间上与实际显示屏存在偏移。为了拥有可用的系统，你必须考虑各种可能的差异，包括触摸传感器未对齐以及偏移表面带来的视差。此外，用户也需要心理上的保障，即控件足够大，看起来易于触摸。


    幸运的是，我们不再需要处理所有这些问题了。然而，你仍然需要注意尺寸和间距，以免给用户带来过多挑战。尺寸本身并不是一个大问题。iOS 设备中使用的电容式触摸技术高度精确且分辨率高。你可能在
    iPhone 上浏览网页时已经注意到了这一点。即使不放大视图，你也能用小指边缘点击网页上那些很小的链接。因此，我并不想对触摸目标的最小尺寸过于教条，至少不能脱离实际情况。理解间距才是关键所在。


    间距之所以重要，是因为触摸目标彼此越近，用户出错的可能性就越大。这应该是常识。但同样，我认为我们也不需要对手间距绝对教条，因为在我看来，绝对数值既不实用也不相关。


    以下是考虑控件间距的方式：


    - **触摸目标之间的间距应与相邻目标的大小成反比（见图 7-11）。**


    ![images](img/0711.jpg)


    图 7-11：触摸目标之间的间距应与相邻目标的大小成反比。


    也就是说，触摸目标越大，它们之间的排列可以越紧密。反之，触摸目标越小，它们之间的间距应该越大。较小的目标更难点击，当密集排列在一起时，容易导致用户操作失误。大的目标易于点击，因此可以排列得更紧密，用户出错的概率也更低。


    所以，尽管去尝试：把按钮做成单个像素那么大也可以，只是要知道，当一切尘埃落定时，它很可能就是屏幕上唯一的按钮！

    '
- fmt: '### Feedback and Reactivity


    I want to add a few points about timing and reactivity as they may be applied
    to the interactions in your design. I already reviewed how the concept of time
    can be applied to resolve potential design problems and why animation is always
    an important consideration. But in this case I’ll be getting into a bit more detail
    about how to think about the response to input.


    Providing users with effective feedback for their system input is fundamental
    to any thorough design solution. Feedback confirms that an event has taken place,
    and that the system has captured the event. Typically this takes the form of simple
    state changes applied to the graphics that represent the point of interaction
    for any given control. In this sense, feedback serves a very pragmatic purpose
    that is valid in any interactive context.


    However, feedback presents another point of design differentiation that can add
    a layer of emotional engagement to an app when approached in the right way. So
    apart from the differentiated approach to your interaction model, be sensitive
    to the unit-level interactions embedded in the model itself. What I mean by this
    is that you still need to be aware of how the details of a specific interaction,
    like the touch of a button, affect your overall design solution.


    One of the most common complaints I hear from designers who are transitioning
    into the mobile space for the first time is the lack of an "over" or "hover" state.
    Designers see this as an issue because `over` presents some interesting creative
    possibilities. The thing is, `over` is just a feedback mechanism and there are
    plenty of opportunities to incorporate elegant and creative feedback elsewhere.
    Let’s just think about the most basic event in a touchscreen scenario: the touch
    itself. For the most part, the conventional approach to feedback on a touch event
    is just to do a simple state change in the appearance of the control. I think
    the lack of creative thinking beyond the basic appearance swap is a holdover from
    previous technologies where the "mouse down" or "mouse click" event superseded
    any other system activity, thereby limiting the visual interaction that could
    occur. iOS exacerbates this convention by making state an inherent attribute of
    the control itself, allowing for the easy implementation of basic feedback.


    The idea of touch in the real world implies reaction and feedback. We live in
    a world governed by well-established physical laws. We should look to our experience
    in the world to inform the nature of reactivity in our interface designs. Knowing
    this, there is much more that can be applied to the touch event on the device
    to either add realism or interest for the user. Not only can we change the appearance
    of a control, we have the capability to change that appearance over time as well.
    Are there animated reactions to your unit-level interactions that you can apply
    to your design? Sure there are. Can we provide visual feedback, in real time,
    for our contact points on the screen while performing gestures? Of course.


    If you plan to integrate more robust feedback and reactivity into your designs,
    always be sensitive to timing. Timing refers to how quickly an event is triggered,
    how quickly it is displayed, and the duration of the displayed effect. These are
    all very important factors because you need to be aware of how an animation or
    effect may impact the overall flow of a task. If a user has to wait for a sequence
    to finish before the system transitions to the next point in the workflow, then
    there is a chance that the user may get frustrated. Like anything else, there
    can be a fine line between frustration and engagement, so always be prepared to
    refine your solution in order to get this right.


    ### Prompting for Hidden Controls


    There are always going to be user interface solutions that require you to actively
    manage the presentation of controls on screen. I’m referring here to highly state-driven
    user interfaces where a control set must first be invoked by the user, before
    they are able to take action on the controls themselves. These types of user interface
    solutions can be problematic because they hide controls from the user. This seems
    counterintuitive from a usability perspective, but there are many valid situations
    where this is useful.


    The key to making these types of solutions successful is recognizing that you
    must provide some kind of prompt or hint for the action that reveals the control.
    This could be as simple as making all your hidden control sets visible when the
    app initially launches, making the user aware of their existence, then animating
    them off screen in some manner. You could even provide the user with explicit
    instructions in that initial launch state that describes the functions and the
    interaction required to bring them back onto the screen. This is especially useful
    for situations where the user is required to perform a specific gesture, rather
    than just a simple tap on the screen.


    When controls are in their hidden state, it may be useful to include a subtle,
    transparent icon or other visual indicator identifying the location of the control.
    You have time and state to work with as well, so maybe prompts can appear at critical
    points in a workflow, or appear at predefined intervals.


    Once a user becomes familiar with your app, these prompts will not be required,
    so consider providing some user control within the app or in the Settings application
    to manage this. Remember to communicate to the user that they can control this,
    so they don’t become frustrated down the road.


    ### Summary


    Let’s review what you’ve learned in this chapter on Control Mapping and Touch
    Screen Ergonomics:


    - Always consider the physical attributes of the device that you are designing
    for and how that may impact the usage of your application.

    - Be conscientious of the scale and proximity of your controls as you map them
    out across your application. The spacing between touch targets should be inversely
    proportional to the size of the adjacent targets to minimize the possibility of
    user error.

    - There are many ways to integrate dynamic visual feedback into your application.
    Don’t ignore the unit-level interactions; many creative possibilities can be applied
    at that level.

    - If your design solution includes the possibility of hidden controls, always
    provide a prompting mechanism to communicate the behavior that reveals the control
    set.


    ## Ease of Use and Feature Automation


    This last chapter addresses automation, which I consider a very interesting aspect
    of user experience design that has emerged over the past few years. The idea of
    automation is compelling because it actively tries to hide from the user critical
    details pertaining to the operation of an application. Extensive automation is
    starting to make its way into all different kinds of consumer applications, and
    it is an emerging technique that has a high degree of relevance for both the mobile
    and portable use-cases.


    I’ll be outlining some basic guidance to help you understand where and how the
    automation of features can be applied to user experience, and what considerations
    apply when doing so.'
